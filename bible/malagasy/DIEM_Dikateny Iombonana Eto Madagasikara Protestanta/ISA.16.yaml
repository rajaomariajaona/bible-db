    children:
    - type: text
      text: Miantso vonjy amin’i Jerosalema i Môaba
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Avy ao Sela any an-taniefitra no alefaso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ondrilahin’ilay mpifehy ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana toa ao atsimon’ny faritr’i Joda (jereo Mpits 1.36). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ondrilahin’ilay mpifehy ny tany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa fanomezana ho mari-panajana ataon’ny mpanjakan’i Môaba amin’ny mpanjakan’i Joda izay nifehy ny tanin’ny Môabita; hangataham-piarovana no anton’izany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ho any amin’ny tendrombohitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: .»
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsahatra ny koranam-pifaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eny amin’ny saha famokaram-boankazo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy re intsony ny horakora-pihobiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny tanimboaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy misy mpanosihosy voaloboka intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny toeram-pamiazam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tsy ahitan-divay ao anaty barika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa nitsahatra ny akoram-pifaliana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 48.33.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaraina toy ny feon-dokanga ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’i Môaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mitaraina ny ato anatiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’i Kira-Heresa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 48.36. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lokanga:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo ny naoty tandrifin’ny Sal 137.2. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kira-Heresa:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 15.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hita ho sasa-poana tokoa i Môaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miakatra eny amin’ny toeram-panasinany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miditra ao amin’ny tempoliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitalaho amin’ny sampiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy nisy vokany izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany àry no teny nataon’ny TOMPO fahiny momba an’i Môaba. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny dia hoy ny TOMPO hoe: «Raha afaka telo taona androany, na ny olo-mangan’i Môaba na ny sarambabem-bahoakany dia samy ho tsinontsinona. Izay sisa tavela aminy dia vitsy kely tsy misy lanjany akory.»'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo vehivavin’i Môaba dia very hevitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-pitana ao Arnôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Arnôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranon-driaka mivarina ao amin’ny Ranomasina Maty ary mamaritra ny sisintany avaratr’i Môaba.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vorona mivezivezy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voaroaka tao amin’ny akaniny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nangataka tamin’i Jerosalema ny Môabita hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Manaova fivoriana ary manapaha hevitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao antoandro be izao ny fiarovanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ataovy mihanaka aminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ampielezan’ny alina ny haizina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afeno ireo olona voaroaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza aseho ireo mandositra avy atỳ aminay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelao hitoetra ao aminao izay voaroaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ho fierena ho azy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny mpandringana azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rehefa hitsahatra ny famoretana sy ny fandringanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hisy amin’ny tany intsony ny mpampahory,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fitiavana nasehonao no hanorenana mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay sezafiandrianana ho an’ny taranak’i Davida;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisy mpitsara hipetraka eo sady hombàm-pahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitandro ny rariny sy ho fatra-pandala ny hitsiny.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy azon’i Jerosalema atao ho an’i Môaba
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa renay ny avonavon’i Môaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mpiavonavona mihoa-pampana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa renay ny fireharehany sy ny fizahozahoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vava tafahoatra sy ny rediredim-poana ataony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ankehitriny dia midradradradra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny amin’i Môaba ny Môabita.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, samy mitaraina izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny amin’ny ampempam-boalobok’i Kira-Heresa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kira-Heresa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 15.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitoloko fa tena voa mafy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Simba ny zaridaina ao Hesbôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny voly voaloboka ao Sibmà,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa ny divainy no nahamamo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny andrian’ireo firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitatra hatrany Jahizera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany voly voaloboka izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nisandrahaka hatrany an-taniefitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sampany nandadilady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany ampitan’ny Ranomasina Maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hesbôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 15.4 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sibmà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jer 48.32; tanàna eo akaikin’i Hesbôna. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jahizera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: any avaratr’i Môaba, eo anilan’ny sisintany hamônita. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taniefitra; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: any atsinanan’i Môaba.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no itomaniako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voly voaloboka any Sibmà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaraka amin’ny mponin’i Jahizera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko kotsan’ny ranomasoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo, ry Hesbôna sy Elehale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa niharan’ny akoran’ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny fiotazanareo sy ny fijinjànareo:'
