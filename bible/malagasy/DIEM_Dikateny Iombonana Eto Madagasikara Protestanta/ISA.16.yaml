document_id: ISA.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miantso vonjy amin’i Jerosalema i Môaba
  - type: text
    content: «Avy ao Sela any an-taniefitra no alefaso
  - type: text
    content: ny ondrilahin’ilay mpifehy ny tany
  - type: note
    content: 'Sela: toerana toa ao atsimon’ny faritr’i Joda (jereo Mpits 1.36). –ondrilahin’ilay mpifehy ny tany: toa fanomezana ho mari-panajana ataon’ny mpanjakan’i Môaba amin’ny mpanjakan’i Joda izay nifehy ny tanin’ny Môabita; hangataham-piarovana no anton’izany.'
  - type: text
    content: 'ho any amin’ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: .»
  '10':
  - type: text
    content: Nitsahatra ny koranam-pifaliana
  - type: text
    content: avy eny amin’ny saha famokaram-boankazo;
  - type: text
    content: ary tsy re intsony ny horakora-pihobiana
  - type: text
    content: eny amin’ny tanimboaloboka;
  - type: text
    content: sady tsy misy mpanosihosy voaloboka intsony
  - type: text
    content: ao amin’ny toeram-pamiazam-boaloboka
  - type: text
    content: no tsy ahitan-divay ao anaty barika,
  - type: text
    content: fa efa nitsahatra ny akoram-pifaliana
  - type: note
    content: Jereo Jer 48.33.
  - type: text
    content: .
  '11':
  - type: text
    content: Mitaraina toy ny feon-dokanga ny foko
  - type: text
    content: noho ny amin’i Môaba;
  - type: text
    content: eny, mitaraina ny ato anatiko
  - type: text
    content: noho ny amin’i Kira-Heresa
  - type: note
    content: 'Jereo Jer 48.36. –lokanga: jereo ny naoty tandrifin’ny Sal 137.2. –Kira-Heresa: jereo 15.1 sy nta.'
  - type: text
    content: .
  '12':
  - type: text
    content: Hita ho sasa-poana tokoa i Môaba
  - type: text
    content: miakatra eny amin’ny toeram-panasinany
  - type: text
    content: sy miditra ao amin’ny tempoliny
  - type: text
    content: mba hitalaho amin’ny sampiny,
  - type: text
    content: nefa tsy nisy vokany izany.
  '13':
  - type: text
    content: 'Izany àry no teny nataon’ny TOMPO fahiny momba an’i Môaba. '
  '14':
  - type: text
    content: 'Fa ankehitriny dia hoy ny TOMPO hoe: «Raha afaka telo taona androany, na ny olo-mangan’i Môaba na ny sarambabem-bahoakany dia samy ho tsinontsinona. Izay sisa tavela aminy dia vitsy kely tsy misy lanjany akory.»'
  '2':
  - type: text
    content: Ireo vehivavin’i Môaba dia very hevitra
  - type: text
    content: eo am-pitana ao Arnôna
  - type: note
    content: 'Arnôna: ranon-driaka mivarina ao amin’ny Ranomasina Maty ary mamaritra ny sisintany avaratr’i Môaba.'
  - type: text
    content: toy ny vorona mivezivezy
  - type: text
    content: voaroaka tao amin’ny akaniny.
  '3':
  - type: text
    content: 'Nangataka tamin’i Jerosalema ny Môabita hoe:'
  - type: text
    content: «Manaova fivoriana ary manapaha hevitra.
  - type: text
    content: Izao antoandro be izao ny fiarovanao
  - type: text
    content: dia ataovy mihanaka aminay
  - type: text
    content: toy ny ampielezan’ny alina ny haizina;
  - type: text
    content: ka afeno ireo olona voaroaka
  - type: text
    content: ary aza aseho ireo mandositra avy atỳ aminay.
  '4':
  - type: text
    content: Avelao hitoetra ao aminao izay voaroaka
  - type: text
    content: ary aoka ho fierena ho azy ianao
  - type: text
    content: eo anoloan’ny mpandringana azy!
  - type: text
    content: Fa rehefa hitsahatra ny famoretana sy ny fandringanana
  - type: text
    content: ary tsy hisy amin’ny tany intsony ny mpampahory,
  '5':
  - type: text
    content: dia ny fitiavana nasehonao no hanorenana mafy
  - type: text
    content: ilay sezafiandrianana ho an’ny taranak’i Davida;
  - type: text
    content: hisy mpitsara hipetraka eo sady hombàm-pahamarinana
  - type: text
    content: ka hitandro ny rariny sy ho fatra-pandala ny hitsiny.»
  - type: heading
    content: Tsy misy azon’i Jerosalema atao ho an’i Môaba
  '6':
  - type: text
    content: Efa renay ny avonavon’i Môaba
  - type: text
    content: izay mpiavonavona mihoa-pampana;
  - type: text
    content: efa renay ny fireharehany sy ny fizahozahoany
  - type: text
    content: ary ny vava tafahoatra sy ny rediredim-poana ataony.
  '7':
  - type: text
    content: Nefa ankehitriny dia midradradradra
  - type: text
    content: ny amin’i Môaba ny Môabita.
  - type: text
    content: Eny, samy mitaraina izy rehetra
  - type: text
    content: ny amin’ny ampempam-boalobok’i Kira-Heresa
  - type: note
    content: 'Kira-Heresa: jereo 15.1 sy nta.'
  - type: text
    content: ','
  - type: text
    content: ka mitoloko fa tena voa mafy.
  '8':
  - type: text
    content: Simba ny zaridaina ao Hesbôna
  - type: text
    content: sy ny voly voaloboka ao Sibmà,
  - type: text
    content: kanefa ny divainy no nahamamo
  - type: text
    content: ny andrian’ireo firenena.
  - type: text
    content: Nitatra hatrany Jahizera
  - type: text
    content: izany voly voaloboka izany,
  - type: text
    content: ka nisandrahaka hatrany an-taniefitra;
  - type: text
    content: ary ny sampany nandadilady
  - type: text
    content: hatrany ampitan’ny Ranomasina Maty
  - type: note
    content: 'Hesbôna: jereo 15.4 sy nta. –Sibmà: jereo Jer 48.32; tanàna eo akaikin’i Hesbôna. –Jahizera: any avaratr’i Môaba, eo anilan’ny sisintany hamônita. –taniefitra; any atsinanan’i Môaba.'
  - type: text
    content: .
  '9':
  - type: text
    content: Koa izany no itomaniako
  - type: text
    content: ny voly voaloboka any Sibmà
  - type: text
    content: miaraka amin’ny mponin’i Jahizera.
  - type: text
    content: Hataoko kotsan’ny ranomasoko
  - type: text
    content: ianareo, ry Hesbôna sy Elehale,
  - type: text
    content: fa niharan’ny akoran’ady
  - type: text
    content: 'ny fiotazanareo sy ny fijinjànareo:'
