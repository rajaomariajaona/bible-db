document_id: JOS.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafatra farany nataon’i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fotoana ela taorian’ny nanomezan’ny TOMPO fandriampahalemana ho an’i Israely ka nanafahany azy tamin’ireo fahavalo rehetra nanodidina azy, dia efa antitra be i Josoa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'koa nantsoiny avokoa ny Israelita rehetra, anisan’izany ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholony
  - type: text
    text: ' sy lehibeny ary mpitsarany sy manamboninahiny, ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa antitra be aho izao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hitanareo avokoa izay nataon’ny TOMPO Andriamanitrareo tamin’ireo firenena rehetra teo anoloanareo, fa ny TOMPO Andriamanitrareo mihitsy no niady ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indreo efa voazarako antsapaka taminareo mba ho lovan’ny fokonareo na ny firenena izay mbola tavela na ny firenena rehetra izay efa nofongorako, manomboka eo Jôrdàna any atsinanana ka miafara eo amin’ny Ranomasina Mediteranea any andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny TOMPO Andriamanitrareo mihitsy no handroaka ireo firenena mbola tavela ireo sy hampandositra azy eo anoloanareo; ka hanjary ho fanananareo ny taniny araka izay efa nampanantenain’ny TOMPO Andriamanitrareo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany aoka ho hentitra mihitsy ianareo hitandrina sy hanatanteraka izay rehetra voasoratra ao amin’ilay bokin’ny lalànan’i Mosesy, ka aza misy anaovana tsirambina na kely aza. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza mifangaro amin’ireo firenena izay mbola tavela eo aminareo; aza miantso ny anaran’andriamaniny na mampiasa izany hianianana; aza mivavaka aminy na miankohoka eo anatrehany; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa ny TOMPO Andriamanitrareo ihany no ifikiro, tahaka izay efa nataonareo mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Firenena lehibe sy mahery no efa noroahin’ny TOMPO teo anoloanareo, ka tsy nisy olona nahatohitra anareo mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa lehilahy iray taminareo no nampandositra fahavalo arivo satria ny TOMPO Andriamanitrareo mihitsy no niady ho anareo, araka izay efa nampanantenainy anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa mitandrema tena ianareo mba hitia ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha tàhiny miodina aminy ianareo ka mikambana amin’ireo firenena izay mbola tavela eo aminareo, raha mifanambady aminy ianareo ka mifangaro aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia fantaro tsara fa tsy hanohy handroaka azy eo anoloanareo intsony ny TOMPO Andriamanitrareo. Hanjary fandrika sy tonta ho anareo ireny firenena ireny, ary ho karavasy mamely eo an-damosinareo sy ho tsilo eo amin’ny masonareo ambara-pahalany ritra anareo tsy ho eto amin’ity tany soa nomen’ny TOMPO Andriamanitrareo anareo ity. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro ankehitriny efa ho faty tsy ho ela aho. Koa aoka ho fantatrareo amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo fa tsy nisy latsaka na iray aza ny zava-tsoa rehetra nampanantenain’ny TOMPO Andriamanitrareo taminareo; tanteraka taminareo avokoa izy rehetra fa tsy nisy latsaka mihitsy na iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saingy tahaka izay nahatanterahan’ny zava-tsoa rehetra nampanantenain’ny TOMPO Andriamanitrareo taminareo no hampiavy aminareo ny loza rehetra, mandra-paharingany anareo tsy ho eto amin’ity tany soa nomeny anareo ity, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: raha tàhiny ialànareo ny fanekempihavanana izay efa nandidian’Izy TOMPO Andriamanitrareo anareo; ary raha mandeha manompo andriamani-kafa ianareo ka hiankohoka eo anatrehan’ireo, dia hirehitra aminareo ny fahatezeran’ny TOMPO ka ho levona faingana tsy ho eto amin’ity tany soa nomeny anareo ity ianareo.
