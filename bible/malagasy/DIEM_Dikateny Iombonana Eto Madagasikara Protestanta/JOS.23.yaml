document_id: JOS.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafatra farany nataon’i Josoa
  - type: text
    content: 'Fotoana ela taorian’ny nanomezan’ny TOMPO fandriampahalemana ho an’i Israely ka nanafahany azy tamin’ireo fahavalo rehetra nanodidina azy, dia efa antitra be i Josoa. '
  '10':
  - type: text
    content: 'Fa lehilahy iray taminareo no nampandositra fahavalo arivo satria ny TOMPO Andriamanitrareo mihitsy no niady ho anareo, araka izay efa nampanantenainy anareo. '
  '11':
  - type: text
    content: 'Koa mitandrema tena ianareo mba hitia ny TOMPO Andriamanitrareo. '
  '12':
  - type: text
    content: 'Fa raha tàhiny miodina aminy ianareo ka mikambana amin’ireo firenena izay mbola tavela eo aminareo, raha mifanambady aminy ianareo ka mifangaro aminy, '
  '13':
  - type: text
    content: 'dia fantaro tsara fa tsy hanohy handroaka azy eo anoloanareo intsony ny TOMPO Andriamanitrareo. Hanjary fandrika sy tonta ho anareo ireny firenena ireny, ary ho karavasy mamely eo an-damosinareo sy ho tsilo eo amin’ny masonareo ambara-pahalany ritra anareo tsy ho eto amin’ity tany soa nomen’ny TOMPO Andriamanitrareo anareo ity. '
  '14':
  - type: text
    content: 'Indro ankehitriny efa ho faty tsy ho ela aho. Koa aoka ho fantatrareo amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo fa tsy nisy latsaka na iray aza ny zava-tsoa rehetra nampanantenain’ny TOMPO Andriamanitrareo taminareo; tanteraka taminareo avokoa izy rehetra fa tsy nisy latsaka mihitsy na iray aza. '
  '15':
  - type: text
    content: 'Saingy tahaka izay nahatanterahan’ny zava-tsoa rehetra nampanantenain’ny TOMPO Andriamanitrareo taminareo no hampiavy aminareo ny loza rehetra, mandra-paharingany anareo tsy ho eto amin’ity tany soa nomeny anareo ity, '
  '16':
  - type: text
    content: raha tàhiny ialànareo ny fanekempihavanana izay efa nandidian’Izy TOMPO Andriamanitrareo anareo; ary raha mandeha manompo andriamani-kafa ianareo ka hiankohoka eo anatrehan’ireo, dia hirehitra aminareo ny fahatezeran’ny TOMPO ka ho levona faingana tsy ho eto amin’ity tany soa nomeny anareo ity ianareo.
  '2':
  - type: text
    content: 'koa nantsoiny avokoa ny Israelita rehetra, anisan’izany ireo '
  - type: text
    content: loholony
  - type: text
    content: ' sy lehibeny ary mpitsarany sy manamboninahiny, ka nilazany hoe:'
  - type: text
    content: '–Efa antitra be aho izao. '
  '3':
  - type: text
    content: 'Hitanareo avokoa izay nataon’ny TOMPO Andriamanitrareo tamin’ireo firenena rehetra teo anoloanareo, fa ny TOMPO Andriamanitrareo mihitsy no niady ho anareo. '
  '4':
  - type: text
    content: 'Indreo efa voazarako antsapaka taminareo mba ho lovan’ny fokonareo na ny firenena izay mbola tavela na ny firenena rehetra izay efa nofongorako, manomboka eo Jôrdàna any atsinanana ka miafara eo amin’ny Ranomasina Mediteranea any andrefana. '
  '5':
  - type: text
    content: 'Ary ny TOMPO Andriamanitrareo mihitsy no handroaka ireo firenena mbola tavela ireo sy hampandositra azy eo anoloanareo; ka hanjary ho fanananareo ny taniny araka izay efa nampanantenain’ny TOMPO Andriamanitrareo anareo. '
  '6':
  - type: text
    content: 'Noho izany aoka ho hentitra mihitsy ianareo hitandrina sy hanatanteraka izay rehetra voasoratra ao amin’ilay bokin’ny lalànan’i Mosesy, ka aza misy anaovana tsirambina na kely aza. '
  '7':
  - type: text
    content: 'Aza mifangaro amin’ireo firenena izay mbola tavela eo aminareo; aza miantso ny anaran’andriamaniny na mampiasa izany hianianana; aza mivavaka aminy na miankohoka eo anatrehany; '
  '8':
  - type: text
    content: 'fa ny TOMPO Andriamanitrareo ihany no ifikiro, tahaka izay efa nataonareo mandraka androany. '
  '9':
  - type: text
    content: 'Firenena lehibe sy mahery no efa noroahin’ny TOMPO teo anoloanareo, ka tsy nisy olona nahatohitra anareo mandraka androany. '
