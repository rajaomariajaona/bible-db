  - type: text
    content: Hampiarahina amin’ny jejilava. Salamo nataon’ny terak’i Kôra.
  '10':
  - type: text
    content: Andriamanitra ô, mba jereo ny mpanjaka
  - type: text
    content: izay toy ny ampinga miaro anay;
  - type: text
    content: tsinjovy ilay olona voahosotrao.
  '11':
  - type: text
    content: Ny indray andro eo an-kianjan’ny tempolinao
  - type: text
    content: dia tsara kokoa noho ny arivo any an-toeran-kafa;
  - type: text
    content: koa eo am-baravaran’ny tranonao
  - type: text
    content: no aleoko ipetrahana, Andriamanitro ô,
  - type: text
    content: toy izay hitoetra ao amin’ny fonenan’ny olon-dratsy.
  '12':
  - type: text
    content: Eny, ny TOMPO Andriamanitra
  - type: text
    content: no manda sy ampinga ho antsika.
  - type: text
    content: 'Fitiavana sy '
  - type: text
    content: voninahitra
  - type: text
    content: ' no omen’ny TOMPO;'
  - type: text
    content: tsy mba misy zava-tsoa laviny
  - type: text
    content: amin’izay madio fitondrantena.
  '13':
  - type: text
    content: Ry TOMPOn’izao rehetra izao ô,
  - type: text
    content: sambatra ny olona mitoky aminao!
