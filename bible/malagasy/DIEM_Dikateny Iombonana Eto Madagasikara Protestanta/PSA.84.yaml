    content: Rehefa mandalo ny lohasahan’ny Balsama
  - type: note
    content: 'Ny lohasahan’ny Balsama: dia toa tany karankaina tokoa; avy ao no ihazoana ny Vavahady Andrefana idirana mankao Jerosalema. Voateny ao amin’ny 2 Sam 5.24-25 ny hazo antsoina hoe balsama.'
  - type: text
