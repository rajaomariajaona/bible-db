    content: 'Ny loha orana: tenenina eto dia amin’ny fararano no ilatsahany ka ahazoana manombana fa ny mpivavaka mihira ity salamo ity dia miakatra hankalaza ny fetin’ny Tranotomboka (jereo Deot 16.13.).'
  - type: text
