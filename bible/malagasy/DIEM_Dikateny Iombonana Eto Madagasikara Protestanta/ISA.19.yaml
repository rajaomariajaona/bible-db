segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hevi-dravin’ny Ejiptianina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hafatra momba an’i Ejipta.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro tonga any Ejipta ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: nitaingina rahona haingam-pandeha.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangorohoro ny andriamani-tsiizy eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nihaketraka anakampo ny Ejiptianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ejiptianina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dia jereo Jer 46.2-26; Ezek 29–32.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy ny Tompo hoe: «Hampirisihiko hifandramatra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny samy Ejiptianina, ka hiady ny mpianakavy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy hiady amin’ny namany avy ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tanàna hiady amin’ny tanàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanjakana hiady amin’ny fanjakana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teo amin’ny vaninandro nahafatesan’i Ahaza mpanjaka (jereo 14.28 sy nta) no niady an-trano ny tao Ejipta Ambany ka nahafahan’ireo mpanjaka etiôpianina (jereo toko 18) nampihatra fahefana taminy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho very hevitra ny Ejiptianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hampisavorovoroiko ny pôlitikany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ny fanahin’ny maty sy ny mpimasy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpamoha angatra sy ny mpisikidy no hanontaniany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa ny Ejiptianina dia hatolotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo an-tanan’ireo tompo maherisetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mpanjaka masiaka no hanapaka azy.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny Tompo ANDRIAMANITR’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny rano amin’i Neily dia ho ritra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tankina sy ho maina io ony io.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho maimbo ireo lakan-drano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sakeli-dranon’i Ejipta
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihena sy ho tankina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny volotara sy ny zozoro halazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny zava-maniry eo amin’ny vinanin’i Neily
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny fambolena rehetra eny amoron’io ony io
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho maina avokoa sy ho lasan’ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy na inona na inona intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Misento sy mitomany ny mpanjono,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy talanjona ireo mpamintana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ireo mpandatsaka harato amin’ny ony Neily.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Diso fanantenana ireo mpanao lamba rongony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ireo vehivavy mpamoly
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ireo lehilahy mpanenona
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia samy hatsatry ny fanahiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Trotraka ireo mpanao zava-pisotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary variana ireo mpamboatra labiera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tena adala mihitsy ireo printsy ao Tsôhàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsôhàna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Tanisy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tanàna teo atsinanan’ny vinanin’i Neily.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary tena very saina ireo olon-kendrin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ahoana no samy ilazanareo amin’ny Farao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izaho dia zanak’olon-kendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady taranak’ireo mpanjaka fahagola?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aiza ireo olon-kendrinao, ry Farao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy hampahalala anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hampahafantatra anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay notapahin’ny TOMPOn’izao rehetra izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamelezana an’i Ejipta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lasa adala ny printsin’i Tsôhàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tena voafitaka ny ao Memfisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Memfisa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: renivohitr’i Ejipta-Ambany tamin’ny andro fahizay, niorina 20 km teo atsimon’i Caire.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo filohan’ny faritaniny ireo ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nampivembena an’i Ejipta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa nandatsahan’ny TOMPO fanahy mampivembena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia nampivembena an’i Ejipta hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny asa rehetra ataon’io firenena io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tahaka ny mamo mivembena sady mandoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samy tsy mahavita ny asany ny Ejiptianina, na ny any an-tampony na ny any am-potony, na ny sampandrofia na ny zozoro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hoavin’ny Ejiptianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Amin’izany andro izany, dia ho tahaka ny olona vavivavy toetra ny Ejiptianina, ka hangovitra noho ny tahotra raha vao maninji-tanana handrahona azy ny TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho fahatsiarovana mampihoron-koditra azy ireo ny tanin’i Joda. Koa isaky ny misy miresaka izany aminy, dia hangovitra ny Ejiptianina noho izay hotapahin’ny Tompon’izao rehetra izao mba hamelezana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany, dia hisy tanàna dimy hiteny hebreo any Ejipta sady hianiana hiraiki-po amin’ny TOMPOn’izao rehetra izao. Ka ny anaran’ny tanàna anankiray dia hatao hoe Tanànan’ny masoandro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hiteny hebreo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na hoe hiteny ny fitenin’i Kanahàna. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tanànan’ny masoandro '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Heliôpôly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '): tanàna eo amin’ny fanombohan’ny vinanin’i Neily. –Momba ny and manontolo, dia jereo Jer 44.1; Is 45.23.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Amin’izany andro izany, dia hisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' iray hatokana ho an’ny TOMPOn’izao rehetra izao ao afovoan’ny tany Ejipta ary tsangambato iray ho an’ny TOMPO any amin’ny sisintaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izany no famantarana sy vavolombelona ho an’ny TOMPOn’izao rehetra izao fa eo anivon’ny tany Ejipta Izy izao. Koa rehefa miantso vonjy amin’ny TOMPO ny Ejiptianina noho ny mpampahory azy, dia hanirahany mpamonjy izay hiaro sy hanafaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hampahafantatra ny tenany amin’ny Ejiptianina ny TOMPO mba hahafantarany AZY amin’izany andro izany sady hanompoany Azy amin’ny alalan’ny sorona sy fanatitra; ary hanao voady amin’ny TOMPO izy ka hanefa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehefa avy namely ny Ejiptianina ny TOMPO, dia hanasitrana azy: ary izy ireo mihitsy no hiverina amin’ny TOMPO ka hoekeny vavaka sady hositraniny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’izany andro izany, dia hisy lalambe hampitohy an’i Ejipta sy i Asiria. Ny Asirianina hankany Ejipta, ary ny Ejiptianina hankany Asiria, ka hiara-manompo ny TOMPO izy roa tonta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Amin’izany andro izany, dia ho fahatelo, miaraka amin’ny Ejipta sy i Asiria, i Israely amin’ny fitahiana hotononin’Andriamanitra eto an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hotahin’ny TOMPOn’izao rehetra izao tokoa izy telo tonta ireo ka hataony hoe: «Hotahîna anie i Ejipta vahoakako sy i Asiria asan’ny tanako ary i Israely anjara fananako!»'
