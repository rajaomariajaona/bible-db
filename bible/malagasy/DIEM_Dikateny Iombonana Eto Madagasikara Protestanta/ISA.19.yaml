document_id: ISA.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hevi-dravin’ny Ejiptianina
  - type: text
    content: Hafatra momba an’i Ejipta.
  - type: text
    content: Indro tonga any Ejipta ny TOMPO
  - type: text
    content: nitaingina rahona haingam-pandeha.
  - type: text
    content: Mangorohoro ny andriamani-tsiizy eo anatrehany
  - type: text
    content: ka nihaketraka anakampo ny Ejiptianina
  - type: note
    content: Ny amin’ny Ejiptianina , dia jereo Jer 46.2-26; Ezek 29–32.
  - type: text
    content: .
  '10':
  - type: text
    content: Trotraka ireo mpanao zava-pisotro
  - type: text
    content: ary variana ireo mpamboatra labiera.
  '11':
  - type: text
    content: Tena adala mihitsy ireo printsy ao Tsôhàna
  - type: note
    content: 'Tsôhàna na hoe Tanisy: tanàna teo atsinanan’ny vinanin’i Neily.'
  - type: text
    content: .
  - type: text
    content: 'Ary tena very saina ireo olon-kendrin’ny '
  - type: text
    content: Farao
  - type: text
    content: .
  - type: text
    content: 'Ahoana no samy ilazanareo amin’ny Farao hoe:'
  - type: text
    content: «Izaho dia zanak’olon-kendry
  - type: text
    content: sady taranak’ireo mpanjaka fahagola?»
  '12':
  - type: text
    content: Aiza ireo olon-kendrinao, ry Farao?
  - type: text
    content: Aoka izy hampahalala anao
  - type: text
    content: ary hampahafantatra anao
  - type: text
    content: izay notapahin’ny TOMPOn’izao rehetra izao
  - type: text
    content: mba hamelezana an’i Ejipta.
  '13':
  - type: text
    content: Lasa adala ny printsin’i Tsôhàna
  - type: text
    content: ary tena voafitaka ny ao Memfisa
  - type: note
    content: 'Memfisa: renivohitr’i Ejipta-Ambany tamin’ny andro fahizay, niorina 20 km teo atsimon’i Caire.'
  - type: text
    content: ;
  - type: text
    content: ireo filohan’ny faritaniny ireo ihany
  - type: text
    content: no nampivembena an’i Ejipta.
  '14':
  - type: text
    content: Fa nandatsahan’ny TOMPO fanahy mampivembena izy,
  - type: text
    content: ka dia nampivembena an’i Ejipta hatrany
  - type: text
    content: eo amin’ny asa rehetra ataon’io firenena io,
  - type: text
    content: izay tahaka ny mamo mivembena sady mandoa.
  '15':
  - type: text
    content: Samy tsy mahavita ny asany ny Ejiptianina, na ny any an-tampony na ny any am-potony, na ny sampandrofia na ny zozoro.
  - type: heading
    content: Ny hoavin’ny Ejiptianina
  '16':
  - type: text
    content: 'Amin’izany andro izany, dia ho tahaka ny olona vavivavy toetra ny Ejiptianina, ka hangovitra noho ny tahotra raha vao maninji-tanana handrahona azy ny TOMPOn’izao rehetra izao. '
  '17':
  - type: text
    content: Ho fahatsiarovana mampihoron-koditra azy ireo ny tanin’i Joda. Koa isaky ny misy miresaka izany aminy, dia hangovitra ny Ejiptianina noho izay hotapahin’ny Tompon’izao rehetra izao mba hamelezana azy.
  '18':
  - type: text
    content: Amin’izany andro izany, dia hisy tanàna dimy hiteny hebreo any Ejipta sady hianiana hiraiki-po amin’ny TOMPOn’izao rehetra izao. Ka ny anaran’ny tanàna anankiray dia hatao hoe Tanànan’ny masoandro
  - type: note
    content: 'hiteny hebreo: na hoe hiteny ny fitenin’i Kanahàna. –Tanànan’ny masoandro (na hoe Heliôpôly): tanàna eo amin’ny fanombohan’ny vinanin’i Neily. –Momba ny and manontolo, dia jereo Jer 44.1; Is 45.23.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Amin’izany andro izany, dia hisy '
  - type: text
    content: alitara
  - type: text
    content: ' iray hatokana ho an’ny TOMPOn’izao rehetra izao ao afovoan’ny tany Ejipta ary tsangambato iray ho an’ny TOMPO any amin’ny sisintaniny. '
  '2':
  - type: text
    content: 'Hoy ny Tompo hoe: «Hampirisihiko hifandramatra'
  - type: text
    content: ny samy Ejiptianina, ka hiady ny mpianakavy.
  - type: text
    content: Samy hiady amin’ny namany avy ny olona;
  - type: text
    content: ny tanàna hiady amin’ny tanàna
  - type: text
    content: ary ny fanjakana hiady amin’ny fanjakana
  - type: note
    content: Teo amin’ny vaninandro nahafatesan’i Ahaza mpanjaka (jereo 14.28 sy nta) no niady an-trano ny tao Ejipta Ambany ka nahafahan’ireo mpanjaka etiôpianina (jereo toko 18) nampihatra fahefana taminy.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Izany no famantarana sy vavolombelona ho an’ny TOMPOn’izao rehetra izao fa eo anivon’ny tany Ejipta Izy izao. Koa rehefa miantso vonjy amin’ny TOMPO ny Ejiptianina noho ny mpampahory azy, dia hanirahany mpamonjy izay hiaro sy hanafaka azy. '
  '21':
  - type: text
    content: 'Dia hampahafantatra ny tenany amin’ny Ejiptianina ny TOMPO mba hahafantarany AZY amin’izany andro izany sady hanompoany Azy amin’ny alalan’ny sorona sy fanatitra; ary hanao voady amin’ny TOMPO izy ka hanefa izany. '
  '22':
  - type: text
    content: 'Rehefa avy namely ny Ejiptianina ny TOMPO, dia hanasitrana azy: ary izy ireo mihitsy no hiverina amin’ny TOMPO ka hoekeny vavaka sady hositraniny.'
  '23':
  - type: text
    content: Amin’izany andro izany, dia hisy lalambe hampitohy an’i Ejipta sy i Asiria. Ny Asirianina hankany Ejipta, ary ny Ejiptianina hankany Asiria, ka hiara-manompo ny TOMPO izy roa tonta.
  '24':
  - type: text
    content: 'Amin’izany andro izany, dia ho fahatelo, miaraka amin’ny Ejipta sy i Asiria, i Israely amin’ny fitahiana hotononin’Andriamanitra eto an-tany. '
  '25':
  - type: text
    content: 'Fa hotahin’ny TOMPOn’izao rehetra izao tokoa izy telo tonta ireo ka hataony hoe: «Hotahîna anie i Ejipta vahoakako sy i Asiria asan’ny tanako ary i Israely anjara fananako!»'
  '3':
  - type: text
    content: Ho very hevitra ny Ejiptianina
  - type: text
    content: fa hampisavorovoroiko ny pôlitikany;
  - type: text
    content: koa ny fanahin’ny maty sy ny mpimasy
  - type: text
    content: ary ny mpamoha angatra sy ny mpisikidy no hanontaniany.
  '4':
  - type: text
    content: Kanefa ny Ejiptianina dia hatolotro
  - type: text
    content: eo an-tanan’ireo tompo maherisetra;
  - type: text
    content: ary mpanjaka masiaka no hanapaka azy.»
  - type: text
    content: Izany no teny hentitry ny Tompo ANDRIAMANITR’izao rehetra izao.
  '5':
  - type: text
    content: Ny rano amin’i Neily dia ho ritra,
  - type: text
    content: ka ho tankina sy ho maina io ony io.
  '6':
  - type: text
    content: Ho maimbo ireo lakan-drano;
  - type: text
    content: ary ny sakeli-dranon’i Ejipta
  - type: text
    content: dia hihena sy ho tankina;
  - type: text
    content: ny volotara sy ny zozoro halazo.
  '7':
  - type: text
    content: Ny zava-maniry eo amin’ny vinanin’i Neily
  - type: text
    content: mbamin’ny fambolena rehetra eny amoron’io ony io
  - type: text
    content: dia ho maina avokoa sy ho lasan’ny rivotra
  - type: text
    content: ka tsy hisy na inona na inona intsony.
  '8':
  - type: text
    content: Misento sy mitomany ny mpanjono,
  - type: text
    content: samy talanjona ireo mpamintana rehetra
  - type: text
    content: sy ireo mpandatsaka harato amin’ny ony Neily.
  '9':
  - type: text
    content: Diso fanantenana ireo mpanao lamba rongony;
  - type: text
    content: na ireo vehivavy mpamoly
  - type: text
    content: na ireo lehilahy mpanenona
  - type: text
    content: dia samy hatsatry ny fanahiana.
