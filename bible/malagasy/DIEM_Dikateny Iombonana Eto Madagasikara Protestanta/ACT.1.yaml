document_id: ACT.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampanantenaina ny Fanahy Masina ny apôstôly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Any ianao ry Teôfily,
- type: usfm
  marker: p
  children:
  - type: text
    text: Ilay boky voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Lk 1.1-4; ny '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Asan’ny apôstôly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tohin’ny Vaovao Mahafaly araka an’i Lioka.'
    marker-yv: yv-n
  - type: text
    text: ' dia nanoratako ny zavatra rehetra nataon’i Jesoa sy nampianariny, hatrany am-panombohany '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hatramin’ny andro nampiakarana Azy ho any an-danitra. Talohan’ny nampiakarana Azy, dia namelany baiko tamin’ny herin’ny Fanahy Masina ireo nofidiny ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'namelany... ho apôstôly: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: namelany baiko ireo nofidiny ho apôstôly tamin’ny herin’ny Fanahy Masina.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Misy mampitohy ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tamin’ny herin’ny Fanahy Masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nampiakarana Azy (talohan’ny nampiakarana Azy tamin’ny herin’ny Fanahy Masina).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Porofo maro no nentin’i Jesoa nanambara tena fa velona Izy taorian’ny nahafatesany: niseho tamin’ny apôstôly Izy nandritra ny efapolo andro sady nidinidinika taminy momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary indray andro i Jesoa dia niara-nisakafo taminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'niara-nisakafo taminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tafaraka taminy.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Momba io tenin’i Jesoa io, dia jereo Lk 24.49.'
    marker-yv: yv-n
  - type: text
    text: ' ka nanafatrafatra azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza miala eto Jerosalema, fa andraso ilay fanomezana nampanantenain’ny Ray, izay efa renareo tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I Jôhany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôhany, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'i Jôhany Mpanao batisa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mt 3.11; Mk 1.8; Lk 3.15; Jôh 1.33.'
    marker-yv: yv-n
  - type: text
    text: ' dia nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' tamin’ny rano; fa ianareo kosa, rehefa afaka andro vitsivitsy, dia hatao batisa amin’ny Fanahy Masina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miakatra any an-danitra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa izay tafangona teo amin’i Jesoa dia nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, izao ve no fotoana hanarenanao indray ny fanjakana ho an’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ham 9.11-12; Lk 19.11.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy anjaranareo ny mahalala ny fotoana na ny vaninandro voatendrin’ny Ray araka ny fahefàny manokana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mk 13.32.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hahazo hery ianareo rehefa hilatsahan’ny Fanahy Masina, ka ho vavolombelona hanambara Ahy eto Jerosalema sy eran’i Jodea mbamin’i Samaria ary hatrany amin’ny faran’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 28.19; Mk 16.15; Lk 24.47-48.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nony avy nilaza izany i Jesoa, dia nakarina any an-danitra teo imason’izy ireo; ary nisy rahona nanakona an’i Jesoa ka tonga tsy hitan’izy ireo intsony Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 16.19; Lk 24.50-51.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mbola nibanjina ny lanitra niakaran’i Jesoa teo iny izy ireo, dia indreo nisy roa lahy nanao fitafiana fotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lk 24.4.
    marker-yv: yv-n
  - type: text
    text: ' tafajoro tampoka teo anilany '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry lehilahy galileanina, nahoana no mijanona eto mijery ny lanitra ianareo? Iny Jesoa Izay nalaina teo aminareo hakarina any an-danitra iny, dia mbola ho avy indray tahaka ny nahitanareo Azy nankany an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny solon’i Jodasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niverina nankany Jerosalema ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ', rehefa niala teo amin’ilay tendrombohitra atao hoe Analanôliva, tendrombohitra akaiky an’i Jerosalema tokony ho iray kilaometatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 11.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' (halaviran-dalana azo aleha amin’ny sabata). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka nony tonga tao an-tanàna izy ireo, dia niakatra tao amin’ny efitrano ambony rihana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efitrano ambony rihana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efitrano fahita eo an-tafon-trano marin-tampona tamin’ny trano tany Palestinina fahizany. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Petera... zanakalahin’i Jakôba:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Mt 10.2-4; Mk 3.16-19; Lk 6.14-16.'
    marker-yv: yv-n
  - type: text
    text: ' fitoerany: dia i Petera, i Jôhany, i Jakôba, i Andrea, i Filipo, i Tômà, i Bartôlômeo, i Matio, i Jakôba zanakalahin’i Halfeo, i Simôna Zelôta ary i Jodasy zanakalahin’i Jakôba. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Niray fo izy rehetra sady nazoto nivavaka niaraka tamin’ny vehivavy mpino sy i Maria renin’i Jesoa mbamin’ireo rahalahin’i Jesoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rahalahin’i Jesoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voateny ombieniombieny izany ao amin’ny 1Kôr 9.5; Mk 6.3; Mt 12.46.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Andro vitsivitsy taorian’izany nony tafavory ny mpino miisa tokony ho 120, dia nitsangana teo afovoan’izy rehetra i Petera ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '–Ry havako, tsy maintsy notanterahina izay nambaran’ny Fanahy Masina mialoha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ; fa niteny tamin’ny alalan’i Davida Izy ny amin’i Jodasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 41.40.
    marker-yv: yv-n
  - type: text
    text: ' izay tonga mpitarika ireo nisambotra an’i Jesoa; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'anisanay apôstôly ihany i Jodasy ary nandray anjara tamin’izao fanompoanay izao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa izany lehilahy izany dia efa nahavidy saha ho an’ny tenany tamin’ny vola azony, tambin’ny heloka vitany; potraka nihohoka izy, nipoaka ny kibony ka nivaroraka daholo ny tsinainy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fantatry ny mponina rehetra eto Jerosalema izany, hany ka io saha io dia nantsoin-dry zareo amin’ny fiteniny hoe Hakeldamà, izany hoe Sahan-dra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 18-19, jereo Mt 27.3-10. Naverin’i Jodasy ny vola azony ka nividianan’ireo lohandoha-mpisorona ilay saha.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa izao no voalazan’ny Soratra Masina ao amin’ny bokin’ny Salamo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ho lao ny tranony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka tsy honenan’olona akory!»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary izao koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aoka ho lasan’olon-kafa ny andraikiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 69.25; 109.8.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ao ireo lehilahy mpiara-dia taminay nandritra ny andro rehetra nifaneraseran’i Jesoa Tompo taminay, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: hatramin’ny andro nanaovan’i Jôhany batisa an’i Jesoa ka hatramin’ny andro nanalana Azy taminay sy nampiakarana Azy any an-danitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nanaovan’i Jôhany batisa an’i Jesoa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanaovan’i Jôhany batisa.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Mt 3.16; Mk 1.9; Lk 3.21. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nampiakarana Azy any an-danitra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1.9 sy nta.'
    marker-yv: yv-n
  - type: text
    text: . Koa amin’ireo no tokony hisy anankiray ho namanay mba ho vavolombelona hanambara fa nitsangana velona i Jesoa Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nisy roa lahy natokana hifidianana, dia i Jôsefa atao hoe Barsabasy, izay nampiana anarana hoe Imarina, sy i Matià. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary niara-nivavaka izy rehetra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao no mahalala ny fon’ny olona tsy an-kanavaka, Tompo ô, ka asehoy izay nofidinao tamin’izy roa lahy ireto, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'handray ny toerana amin’izao fanompoana maha apôstôly izao, fa nilaozan’i Jodasy izany hankanesany any amin’ny toerany manokana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nanaovana antsapaka izy roa lahy, ary voatendrin’ny antsapaka i Matià, ka dia izy no lany ho naman’ny apôstôly 11 lahy.
