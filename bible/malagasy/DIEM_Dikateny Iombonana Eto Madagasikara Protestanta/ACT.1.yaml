document_id: ACT.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampanantenaina ny Fanahy Masina ny apôstôly
  - type: text
    content: Any ianao ry Teôfily,
  - type: text
    content: Ilay boky voalohany
  - type: note
    content: Jereo Lk 1.1-4; ny Asan’ny apôstôly dia tohin’ny Vaovao Mahafaly araka an’i Lioka.
  - type: text
    content: ' dia nanoratako ny zavatra rehetra nataon’i Jesoa sy nampianariny, hatrany am-panombohany '
  '10':
  - type: text
    content: Raha mbola nibanjina ny lanitra niakaran’i Jesoa teo iny izy ireo, dia indreo nisy roa lahy nanao fitafiana fotsy
  - type: note
    content: Ampit Lk 24.4.
  - type: text
    content: ' tafajoro tampoka teo anilany '
  '11':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: –Ry lehilahy galileanina, nahoana no mijanona eto mijery ny lanitra ianareo? Iny Jesoa Izay nalaina teo aminareo hakarina any an-danitra iny, dia mbola ho avy indray tahaka ny nahitanareo Azy nankany an-danitra.
  - type: heading
    content: Ny solon’i Jodasy
  '12':
  - type: text
    content: 'Dia niverina nankany Jerosalema ny '
  - type: text
    content: apôstôly
  - type: text
    content: ', rehefa niala teo amin’ilay tendrombohitra atao hoe Analanôliva, tendrombohitra akaiky an’i Jerosalema tokony ho iray kilaometatra'
  - type: note
    content: Jereo Mt 11.1 sy nta.
  - type: text
    content: ' (halaviran-dalana azo aleha amin’ny sabata). '
  '13':
  - type: text
    content: Ka nony tonga tao an-tanàna izy ireo, dia niakatra tao amin’ny efitrano ambony rihana
  - type: note
    content: 'efitrano ambony rihana: efitrano fahita eo an-tafon-trano marin-tampona tamin’ny trano tany Palestinina fahizany. –i Petera... zanakalahin’i Jakôba: ampit Mt 10.2-4; Mk 3.16-19; Lk 6.14-16.'
  - type: text
    content: ' fitoerany: dia i Petera, i Jôhany, i Jakôba, i Andrea, i Filipo, i Tômà, i Bartôlômeo, i Matio, i Jakôba zanakalahin’i Halfeo, i Simôna Zelôta ary i Jodasy zanakalahin’i Jakôba. '
  '14':
  - type: text
    content: Niray fo izy rehetra sady nazoto nivavaka niaraka tamin’ny vehivavy mpino sy i Maria renin’i Jesoa mbamin’ireo rahalahin’i Jesoa
  - type: note
    content: 'rahalahin’i Jesoa: voateny ombieniombieny izany ao amin’ny 1Kôr 9.5; Mk 6.3; Mt 12.46.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Andro vitsivitsy taorian’izany nony tafavory ny mpino miisa tokony ho 120, dia nitsangana teo afovoan’izy rehetra i Petera ka nanao hoe:'
  '16':
  - type: text
    content: '–Ry havako, tsy maintsy notanterahina izay nambaran’ny Fanahy Masina mialoha ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ; fa niteny tamin’ny alalan’i Davida Izy ny amin’i Jodasy
  - type: note
    content: Ampit Sal 41.40.
  - type: text
    content: ' izay tonga mpitarika ireo nisambotra an’i Jesoa; '
  '17':
  - type: text
    content: 'anisanay apôstôly ihany i Jodasy ary nandray anjara tamin’izao fanompoanay izao. '
  '18':
  - type: text
    content: 'Koa izany lehilahy izany dia efa nahavidy saha ho an’ny tenany tamin’ny vola azony, tambin’ny heloka vitany; potraka nihohoka izy, nipoaka ny kibony ka nivaroraka daholo ny tsinainy. '
  '19':
  - type: text
    content: Fantatry ny mponina rehetra eto Jerosalema izany, hany ka io saha io dia nantsoin-dry zareo amin’ny fiteniny hoe Hakeldamà, izany hoe Sahan-dra
  - type: note
    content: Momba ny and 18-19, jereo Mt 27.3-10. Naverin’i Jodasy ny vola azony ka nividianan’ireo lohandoha-mpisorona ilay saha.
  - type: text
    content: .
  '2':
  - type: text
    content: 'ka hatramin’ny andro nampiakarana Azy ho any an-danitra. Talohan’ny nampiakarana Azy, dia namelany baiko tamin’ny herin’ny Fanahy Masina ireo nofidiny ho '
  - type: text
    content: apôstôly
  - type: note
    content: 'namelany... ho apôstôly: dkt hafa namelany baiko ireo nofidiny ho apôstôly tamin’ny herin’ny Fanahy Masina. Misy mampitohy ny hoe tamin’ny herin’ny Fanahy Masina amin’ny hoe nampiakarana Azy (talohan’ny nampiakarana Azy tamin’ny herin’ny Fanahy Masina).'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Fa izao no voalazan’ny Soratra Masina ao amin’ny bokin’ny Salamo:'
  - type: text
    content: «Aoka ho lao ny tranony,
  - type: text
    content: ary aoka tsy honenan’olona akory!»
  - type: text
    content: 'Ary izao koa:'
  - type: text
    content: «Aoka ho lasan’olon-kafa ny andraikiny
  - type: note
    content: Sal 69.25; 109.8.
  - type: text
    content: '!»'
  '21':
  - type: text
    content: 'Ao ireo lehilahy mpiara-dia taminay nandritra ny andro rehetra nifaneraseran’i Jesoa Tompo taminay, '
  '22':
  - type: text
    content: hatramin’ny andro nanaovan’i Jôhany batisa an’i Jesoa ka hatramin’ny andro nanalana Azy taminay sy nampiakarana Azy any an-danitra
  - type: note
    content: 'nanaovan’i Jôhany batisa an’i Jesoa: dkt hafa nanaovan’i Jôhany batisa. Jereo Mt 3.16; Mk 1.9; Lk 3.21. –nampiakarana Azy any an-danitra: jereo 1.9 sy nta.'
  - type: text
    content: . Koa amin’ireo no tokony hisy anankiray ho namanay mba ho vavolombelona hanambara fa nitsangana velona i Jesoa Tompo.
  '23':
  - type: text
    content: 'Nisy roa lahy natokana hifidianana, dia i Jôsefa atao hoe Barsabasy, izay nampiana anarana hoe Imarina, sy i Matià. '
  '24':
  - type: text
    content: 'Ary niara-nivavaka izy rehetra nanao hoe:'
  - type: text
    content: '–Ianao no mahalala ny fon’ny olona tsy an-kanavaka, Tompo ô, ka asehoy izay nofidinao tamin’izy roa lahy ireto, '
  '25':
  - type: text
    content: 'handray ny toerana amin’izao fanompoana maha apôstôly izao, fa nilaozan’i Jodasy izany hankanesany any amin’ny toerany manokana. '
  '26':
  - type: text
    content: Dia nanaovana antsapaka izy roa lahy, ary voatendrin’ny antsapaka i Matià, ka dia izy no lany ho naman’ny apôstôly 11 lahy.
  '3':
  - type: text
    content: 'Porofo maro no nentin’i Jesoa nanambara tena fa velona Izy taorian’ny nahafatesany: niseho tamin’ny apôstôly Izy nandritra ny efapolo andro sady nidinidinika taminy momba ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '4':
  - type: text
    content: Ary indray andro i Jesoa dia niara-nisakafo taminy
  - type: note
    content: 'niara-nisakafo taminy: dkt hafa tafaraka taminy. –Momba io tenin’i Jesoa io, dia jereo Lk 24.49.'
  - type: text
    content: ' ka nanafatrafatra azy hoe:'
  - type: text
    content: '–Aza miala eto Jerosalema, fa andraso ilay fanomezana nampanantenain’ny Ray, izay efa renareo tamiko. '
  '5':
  - type: text
    content: I Jôhany
  - type: note
    content: 'Jôhany, izany hoe i Jôhany Mpanao batisa: jereo Mt 3.11; Mk 1.8; Lk 3.15; Jôh 1.33.'
  - type: text
    content: ' dia nanao '
  - type: text
    content: batisa
  - type: text
    content: ' tamin’ny rano; fa ianareo kosa, rehefa afaka andro vitsivitsy, dia hatao batisa amin’ny Fanahy Masina.'
  - type: heading
    content: Miakatra any an-danitra i Jesoa
  '6':
  - type: text
    content: 'Koa izay tafangona teo amin’i Jesoa dia nanontany Azy hoe:'
  - type: text
    content: –Tompo ô, izao ve no fotoana hanarenanao indray ny fanjakana ho an’i Israely
  - type: note
    content: Ampit Ham 9.11-12; Lk 19.11.
  - type: text
    content: '?'
  '7':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Tsy anjaranareo ny mahalala ny fotoana na ny vaninandro voatendrin’ny Ray araka ny fahefàny manokana
  - type: note
    content: Ampit Mk 13.32.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Fa hahazo hery ianareo rehefa hilatsahan’ny Fanahy Masina, ka ho vavolombelona hanambara Ahy eto Jerosalema sy eran’i Jodea mbamin’i Samaria ary hatrany amin’ny faran’ny tany
  - type: note
    content: Ampit Mt 28.19; Mk 16.15; Lk 24.47-48.
  - type: text
    content: .
  '9':
  - type: text
    content: Nony avy nilaza izany i Jesoa, dia nakarina any an-danitra teo imason’izy ireo; ary nisy rahona nanakona an’i Jesoa ka tonga tsy hitan’izy ireo intsony Izy
  - type: note
    content: Ampit 16.19; Lk 24.50-51.
  - type: text
    content: .
