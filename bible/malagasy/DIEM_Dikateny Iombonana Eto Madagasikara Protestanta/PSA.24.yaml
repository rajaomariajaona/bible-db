document_id: PSA.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Miditra ao an-Tempoly ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida
  - type: text
    content: An’ny TOMPO izao tontolo izao sy izay eo aminy.
  - type: text
    content: Azy koa ny tany sy ny mponina ao aminy
  - type: note
    content: And voatsiahy ao amin’ny 1Kôr 10.26.
  - type: text
    content: ':'
  '10':
  - type: text
    content: –Iza moa izany mpanjaka be voninahitra izany?
  - type: text
    content: –Ilay TOMPOn’izao rehetra izao,
  - type: text
    content: Izy no mpanjaka be voninahitra!
  - type: text
    content: Fiatoana
  '2':
  - type: text
    content: Izy no nanorina azy teo ambony ranomasina
  - type: text
    content: ka mampaharitra azy eo ambonin’ny onja.
  '3':
  - type: text
    content: –Iza àry no hiakatra ny tendrombohitry ny TOMPO
  - type: note
    content: Jereo Sal 2.6.
  - type: text
    content: '?'
  - type: text
    content: 'Zovy no hahajoro ao amin’ny '
  - type: text
    content: Toeramasiny
  - type: text
    content: '?'
  '4':
  - type: text
    content: –Izay madio tanana sy mahitsy fo
  - type: note
    content: 'mahitsy fo: jereo Mt 5.8; Eks 20.7.'
  - type: text
    content: ','
  - type: text
    content: izay tsy nirona tamin’ny lainga
  - type: text
    content: na nianiana hoenti-mamitaka.
  '5':
  - type: text
    content: 'Ireo no handray ny '
  - type: text
    content: fitahian
  - type: text
    content: ’ny Tompo,
  - type: text
    content: sy hoeken’Andriamanitra Mpamonjy ho marina.
  '6':
  - type: text
    content: Izany no karazan’olona mitady an’Andriamanitra,
  - type: text
    content: te hiatrika an’ilay Andriamanitr’i Jakôba!
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Akaro ny tataonareo, ry vavahady;
  - type: text
    content: misandrata, ry varavarana fahagola,
  - type: text
    content: mba hidiran’ny mpanjaka be voninahitra!
  '8':
  - type: text
    content: –Iza moa izany mpanjaka be voninahitra izany?
  - type: text
    content: –Ilay TOMPO mahefa sy mahery,
  - type: text
    content: ilay TOMPO mahery an’ady!
  '9':
  - type: text
    content: Akaro ny tataonareo, ry vavahady;
  - type: text
    content: misandrata, ry varavarana fahagola,
  - type: text
    content: mba hidiran’ny mpanjaka be voninahitra!
