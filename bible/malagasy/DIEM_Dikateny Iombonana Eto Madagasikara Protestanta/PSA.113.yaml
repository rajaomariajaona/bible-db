document_id: PSA.113,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Be fiandrianana ny Tompo sady mahay mangoraka
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Ry mpanompon’ny TOMPO, miderà,
  - type: text
    content: eny, miderà ny anaran’ny TOMPO.
  '2':
  - type: text
    content: Hisaorana anie ny anarany
  - type: text
    content: hatrizao ka ho mandrakizay!
  '3':
  - type: text
    content: Hatrany atsinanana ka hatrany andrefana,
  - type: text
    content: hoderaina anie ny anaran’ny TOMPO!
  '4':
  - type: text
    content: Ambonin’ny firenen-drehetra ny TOMPO;
  - type: text
    content: 'ambonin’ny lanitra ny '
  - type: text
    content: voninahiny
  - type: text
    content: .
  '5':
  - type: text
    content: Iza no tahaka ny TOMPO Andriamanitsika?
  - type: text
    content: Mipetraka eo an-tsezafiandrianany ao ambony Izy
  '6':
  - type: text
    content: kanefa miondrika mba hitazana
  - type: text
    content: izay eny an-danitra sy etỳ an-tany,
  '7':
  - type: text
    content: manarina ny malahelo hiala amin’ny vovoka
  - type: text
    content: sy manandratra ny mahantra hiala amin’ny fako
  '8':
  - type: text
    content: mba hampiray toerana azy amin’ny mpifehy,
  - type: text
    content: dia ireo mpifehy mitondra ny vahoakany
  - type: note
    content: 'And 7-8: ampit 1 Sam 2-8; jereo koa Lk 1.52-53.'
  - type: text
    content: ;
  '9':
  - type: text
    content: mahatonga ny momba ho heni-kafaliana Izy
  - type: text
    content: satria manome azy trano honenana sy zaza maro.
