document_id: JER.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nafatotra tamin’ny tsatòka i Jeremià
  - type: text
    content: 'Ary i Pasehora, zanakalahin’i Imera sady mpisorona mpiandraikitra ny tranon’ny TOMPO, dia nandre an’i Jeremià nanambara ireo hafatra ireo. '
  '10':
  - type: text
    content: Reko ny besinimaro miteny ratsy ahy
  - type: text
    content: 'ka manome anaram-bosotra hoe:'
  - type: text
    content: «Fihorohoroana hatraiza hatraiza
  - type: note
    content: Teny ambaran’i Jeremià matetika amin’ny olona na amin’ny toe-javatra maro izany, ary afotitra aminy ho fanarabiana azy; izy rahateo koa ianjadian’ny tahotra mafy satria anaovan’ny sasany herisetra na esoesoiny.
  - type: text
    content: .»
  - type: text
    content: «Torio izy», hoy ny sasany;
  - type: text
    content: «Eny, hotorintsika izy», hoy ny hafa.
  - type: text
    content: Ireo sakaiza tiako indrindra aza
  - type: text
    content: 'dia miandry kendry tohina hahavoa ahy:'
  - type: text
    content: «Izay angamba no hahavoafitaka azy
  - type: text
    content: sy haharesentsika azy, hoy ireo,
  - type: text
    content: ka hisamborantsika azy hanaovana valifaty
  '11':
  - type: text
    content: Kanefa Ianao, TOMPO ô,
  - type: text
    content: dia miaraka amiko hatrany
  - type: text
    content: toy ny mpiady ikoizana.
  - type: text
    content: Koa ireo mpanenjika ahy no ho lavo
  - type: text
    content: fa tsy haharesy ahy.
  - type: text
    content: Ho menatra izy satria tsy hahomby;
  - type: text
    content: fahafaham-baràka mandrakizay
  - type: text
    content: tsy hohadinoina izany.
  '12':
  - type: text
    content: Ry TOMPOn’izao rehetra izao ô,
  - type: text
    content: Ianao no mamantatra ny olo-marina
  - type: text
    content: sy mahita ny ao an’eritreriny sy ao am-pony.
  - type: text
    content: Ho hitako ny famalinao ireo mpanenjika ahy,
  - type: text
    content: satria efa nankiniko taminao ny adiko.
  '13':
  - type: text
    content: Mihirà ho an’ny TOMPO;
  - type: text
    content: eny, ankalazao ny TOMPO,
  - type: text
    content: satria Izy no nanafaka ny malahelo
  - type: text
    content: teo an-tanan’ny olon-dratsy.
  - type: heading
    content: '*'
  '14':
  - type: text
    content: Ho voaozona anie ny andro nahaterahako
  - type: note
    content: 'And 14-18: ampit Jôb 3.1-19.'
  - type: text
    content: ','
  - type: text
    content: dia ny andro izay niterahan’i Neny ahy;
  - type: text
    content: eny, enga anie tsy hisy olona
  - type: text
    content: hilaza izany hoe ombàm-pitahiana!
  '15':
  - type: text
    content: Ho voaozona anie ny olona
  - type: text
    content: izay nameno hafaliana ny raiko
  - type: text
    content: 'tamin’ny nitenenany hoe: «Tera-dahy ianao!»'
  '16':
  - type: text
    content: Enga anie izany olona izany
  - type: text
    content: ho tahaka ireo tanàna noravan’ny TOMPO
  - type: text
    content: fa tsy azo nivalozana
  - type: note
    content: Filazana an-kolaka ny fandravana an’i Sôdôma sy i Gômôra (Gen 19.23-25).
  - type: text
    content: .
  - type: text
    content: Aoka handre antso vonjy izy nony maraina,
  - type: text
    content: ary akoran’ady nony mitataovovonana.
  '17':
  - type: text
    content: Nahoana Andriamanitra
  - type: note
    content: 'Andriamanitra: mpisolo anarana izy no ao amin’ny rijan-teny, ka tsy voafaritra mazava. Misy mampifandray io mpisolo anarana io amin’izany olona izany (and 16) ary misy mampifandray azy amin’ny andro (and 14).'
  - type: text
    content: ' no tsy namela ahy'
  - type: text
    content: ho faty hatrany am-bohoka?
  - type: text
    content: Dia ho nahatonga an’i Neny ho fasako izany,
  - type: text
    content: ka ho izy no ilay Ambatobevohòka.
  '18':
  - type: text
    content: Nahoana ny tenako no tafavoaka
  - type: text
    content: avy tao an-kibon-dreniko,
  - type: text
    content: raha hahita fahoriana sy fijaliana aho
  - type: text
    content: ka ho voakikin’ny henatra isan’andro izao?
  '2':
  - type: text
    content: 'Koa namely tehamaina an’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' izy sady namatotra azy tamin’ny tsatòka teo anilan’ny vavahadin’i Benjamîna, dia ilay vavahady ambony mankao an-tranon’ny TOMPO'
  - type: note
    content: 'namatotra azy tamin’ny tsatòka: ny famatorana tongotra aman-tanana toy izany dia fanao amin’ny olona voaheloka aseho vahoaka. –ilay vavahady...tranon’ny TOMPO: ireo fanamarihana ireo dia manondro mazava ny maha samy hafa azy amin’izay voalaza eo amin’ny 37.13 sy 38.7.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Nony ampitso vao novahan’i Pasehora, teo amin’ny tsatòka i Jeremià. Ary hoy i Jeremià taminy:'
  - type: text
    content: –Tsy i Pasehora intsony no anarana hiantsoan’ny TOMPO anao fa Magôra-Misabiba, izany hoe «Fihorohoroana hatraiza hatraiza
  - type: note
    content: Jereo 6.25 sy nta.
  - type: text
    content: '». '
  '4':
  - type: text
    content: 'Satria izao no lazain’ny TOMPO: «Indro hatolotro ho amin’ny fihorohoroana ianao sy ny namanao rehetra. Ho fatin’ny sabatry ny fahavalony manko ireo namanao; ary ny masonao no hahita izany. Hatolotro eo an-tanan’ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' ny vahoakan’i Joda rehetra ka hoentiny ho babo any Babilôna na hovonoiny ho faty amin’ny sabatra. '
  '5':
  - type: text
    content: 'Ny haren’ny mponin’ity tanàna ity sy ny vokatry ny asany ary ny zava-tsoa ananany, mbamin’ireo raki-tsarobidin’ny mpanjakan’i Joda dia samy hatolotro avokoa ho eo an-tanan’ny fahavalony, ka horobainy sy halainy ary hoentiny any Babilôna. '
  '6':
  - type: text
    content: Ary ianao koa, ry Pasehora, mbamin’izay rehetra mitoetra ao an-tranonao dia hobaboina. Ary rehefa tonga any Babilôna ianao, dia ho faty any sy halevina any; ho faty sy halevina any ny tenanao mbamin’ny namanao rehetra izay naminanianao lainga.
  - type: heading
    content: Mitaraina amin’Andriamanitra i Jeremià
  '7':
  - type: text
    content: TOMPO ô, notaominao aho ka voataona;
  - type: text
    content: ary nahery tamiko Ianao ka resy aho.
  - type: text
    content: Fihomehezana aho isan’andro
  - type: text
    content: sady fanebaky ny olona rehetra.
  '8':
  - type: text
    content: Fa isaky ny tsy maintsy miteny aho,
  - type: text
    content: dia voatery miantso vonjy
  - type: text
    content: 'ary mihorakoraka hoe:'
  - type: text
    content: Herisetra sy famoretana e!
  - type: text
    content: Satria ny fampitako ny teninao, TOMPO ô,
  - type: text
    content: no anakorana sy ihomehezana ahy isan’andro.
  '9':
  - type: text
    content: 'Ary raha hoy aho anakampoko hoe:'
  - type: text
    content: «Tsy hisaintsaina izany intsony aho
  - type: text
    content: na hiteny amin’ny anaran’ny Tompo intsony»,
  - type: text
    content: dia misy toy ny afo mandoro ato am-poko,
  - type: text
    content: toy ny afo mihanaka ato anatin’ny tenako.
  - type: text
    content: Reraka mamono azy aho fa tsy vitako.
