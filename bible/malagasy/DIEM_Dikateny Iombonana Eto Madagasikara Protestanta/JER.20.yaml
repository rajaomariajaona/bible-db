document_id: JER.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nafatotra tamin’ny tsatòka i Jeremià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Pasehora, zanakalahin’i Imera sady mpisorona mpiandraikitra ny tranon’ny TOMPO, dia nandre an’i Jeremià nanambara ireo hafatra ireo. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reko ny besinimaro miteny ratsy ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka manome anaram-bosotra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fihorohoroana hatraiza hatraiza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Teny ambaran’i Jeremià matetika amin’ny olona na amin’ny toe-javatra maro izany, ary afotitra aminy ho fanarabiana azy; izy rahateo koa ianjadian’ny tahotra mafy satria anaovan’ny sasany herisetra na esoesoiny.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Torio izy», hoy ny sasany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Eny, hotorintsika izy», hoy ny hafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo sakaiza tiako indrindra aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia miandry kendry tohina hahavoa ahy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izay angamba no hahavoafitaka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy haharesentsika azy, hoy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hisamborantsika azy hanaovana valifaty
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miaraka amiko hatrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mpiady ikoizana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ireo mpanenjika ahy no ho lavo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy haharesy ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho menatra izy satria tsy hahomby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahafaham-baràka mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hohadinoina izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry TOMPOn’izao rehetra izao ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no mamantatra ny olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahita ny ao an’eritreriny sy ao am-pony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hitako ny famalinao ireo mpanenjika ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nankiniko taminao ny adiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho an’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ankalazao ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy no nanafaka ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo an-tanan’ny olon-dratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie ny andro nahaterahako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 14-18: ampit Jôb 3.1-19.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny andro izay niterahan’i Neny ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, enga anie tsy hisy olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hilaza izany hoe ombàm-pitahiana!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nameno hafaliana ny raiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny nitenenany hoe: «Tera-dahy ianao!»'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie izany olona izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ireo tanàna noravan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy azo nivalozana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Filazana an-kolaka ny fandravana an’i Sôdôma sy i Gômôra (Gen 19.23-25).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka handre antso vonjy izy nony maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary akoran’ady nony mitataovovonana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mpisolo anarana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: izy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no ao amin’ny rijan-teny, ka tsy voafaritra mazava. Misy mampifandray io mpisolo anarana io amin’'
      - type: usfm
        marker: it
        children:
        - type: text
          text: izany olona izany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 16) ary misy mampifandray azy amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: andro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 14).'
      marker-yv: yv-n
    - type: text
      text: ' no tsy namela ahy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho faty hatrany am-bohoka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho nahatonga an’i Neny ho fasako izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho izy no ilay Ambatobevohòka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana ny tenako no tafavoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy tao an-kibon-dreniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha hahita fahoriana sy fijaliana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho voakikin’ny henatra isan’andro izao?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa namely tehamaina an’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' izy sady namatotra azy tamin’ny tsatòka teo anilan’ny vavahadin’i Benjamîna, dia ilay vavahady ambony mankao an-tranon’ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'namatotra azy tamin’ny tsatòka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny famatorana tongotra aman-tanana toy izany dia fanao amin’ny olona voaheloka aseho vahoaka. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ilay vavahady...tranon’ny TOMPO:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ireo fanamarihana ireo dia manondro mazava ny maha samy hafa azy amin’izay voalaza eo amin’ny 37.13 sy 38.7.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ampitso vao novahan’i Pasehora, teo amin’ny tsatòka i Jeremià. Ary hoy i Jeremià taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy i Pasehora intsony no anarana hiantsoan’ny TOMPO anao fa Magôra-Misabiba, izany hoe «Fihorohoroana hatraiza hatraiza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.25 sy nta.
      marker-yv: yv-n
    - type: text
      text: '». '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satria izao no lazain’ny TOMPO: «Indro hatolotro ho amin’ny fihorohoroana ianao sy ny namanao rehetra. Ho fatin’ny sabatry ny fahavalony manko ireo namanao; ary ny masonao no hahita izany. Hatolotro eo an-tanan’ny mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ' ny vahoakan’i Joda rehetra ka hoentiny ho babo any Babilôna na hovonoiny ho faty amin’ny sabatra. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny haren’ny mponin’ity tanàna ity sy ny vokatry ny asany ary ny zava-tsoa ananany, mbamin’ireo raki-tsarobidin’ny mpanjakan’i Joda dia samy hatolotro avokoa ho eo an-tanan’ny fahavalony, ka horobainy sy halainy ary hoentiny any Babilôna. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary ianao koa, ry Pasehora, mbamin’izay rehetra mitoetra ao an-tranonao dia hobaboina. Ary rehefa tonga any Babilôna ianao, dia ho faty any sy halevina any; ho faty sy halevina any ny tenanao mbamin’ny namanao rehetra izay naminanianao lainga.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitaraina amin’Andriamanitra i Jeremià
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, notaominao aho ka voataona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahery tamiko Ianao ka resy aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fihomehezana aho isan’andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady fanebaky ny olona rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa isaky ny tsy maintsy miteny aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voatery miantso vonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary mihorakoraka hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Herisetra sy famoretana e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny fampitako ny teninao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anakorana sy ihomehezana ahy isan’andro.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary raha hoy aho anakampoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy hisaintsaina izany intsony aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hiteny amin’ny anaran’ny Tompo intsony»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia misy toy ny afo mandoro ato am-poko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny afo mihanaka ato anatin’ny tenako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reraka mamono azy aho fa tsy vitako.
