document_id: ISA.58,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fifadiana sitrak’Andriamanitra
  - type: text
    content: Miantsoa mafy, fa aza atao malemy.
  - type: text
    content: Ataovy avo toy ny trompetra ny feonao.
  - type: text
    content: Vakio bantsilana amin’ny vahoakako ny fikomiany
  - type: text
    content: ary amin’ny taranak’i Jakôba ny fahotany.
  '10':
  - type: text
    content: raha zarainao ho an’ny noana ny haninao
  - type: text
    content: ka manome sakafo ireo sahirana ianao,
  - type: text
    content: dia hamirapiratra ao amin’ny haizina ny fahazavànao
  - type: text
    content: ary ho toy ny mitataovovonana ny haizim-pitonao.
  '11':
  - type: text
    content: Hitari-dalana anao hatrany ny TOMPO;
  - type: text
    content: na dia ao amin’ny tany karakaina aza ianao,
  - type: text
    content: dia hovokisany hanina sy hampahatanjahiny.
  - type: text
    content: Hanjary mahate hijery toy ny saha vonton-drano ianao
  - type: text
    content: na toy ny loharano miboiboika tsy mety ritra.
  '12':
  - type: text
    content: Noho ny ezakao, dia haorina indray
  - type: text
    content: ireo zavatra rava fahiny
  - type: text
    content: ary hatsangana indray ny fanorenana
  - type: text
    content: izay efa nilaozana hatry ny elabe;
  - type: text
    content: 'ary ianao dia hantsoina hoe:'
  - type: text
    content: «Vahoaka mpamboatra ny manda simba
  - type: text
    content: sy mpamelona ny lalankely efa maty
  - type: text
    content: mba ho tsara honenana ao an-tanàna.»
  - type: heading
    content: Ny sabata ankasitrahîn’Andriamanitra
  '13':
  - type: text
    content: 'Hoy koa ny TOMPO hoe:'
  - type: text
    content: '«Raha atsahatrao ny fanosihosena ny '
  - type: text
    content: sabata
  - type: text
    content: ','
  - type: text
    content: ka tsy ny tombontsoanao no enjehinao
  - type: text
    content: amin’ny andro voatokana ho Ahy,
  - type: text
    content: raha ny sabata no lazainao hoe andro mahafinaritra,
  - type: text
    content: raha ny andro voatokana ho Ahy no lazainao hoe mendrika hohajaina,
  - type: text
    content: raha hajainao tokoa izany ka fadînao ny fanaonao
  - type: text
    content: na ny manenjika ny tombontsoanao na ny miteniteny foana,
  '14':
  - type: text
    content: dia ho tonga loharanom-pifaliana ho anao Aho.
  - type: text
    content: Izaho TOMPO no hitondra anao ho mpandresy
  - type: text
    content: eny an-tendron-kavoan’ilay tany
  - type: text
    content: ka hampanaram-po anao amin’ny lovan’i Jakôba razanao.
  - type: text
    content: Fa ny vavako no mampanantena izany.»
  '2':
  - type: text
    content: Isan’andro isan’andro dia mitady Ahy izy
  - type: text
    content: ary maniry hahafantatra ny lalako,
  - type: text
    content: tahaka ny firenena iray manao ny marina
  - type: text
    content: ka tsy nanary ny fitsipik’Andriamaniny.
  - type: text
    content: Ny fitsarana araka ny rariny no angatahiny amiko
  - type: text
    content: ary ny fanatrehako azy no zavatra irîny.
  '3':
  - type: text
    content: 'Kanefa manontany Ahy izy manao hoe:'
  - type: text
    content: '«Soa inona ho anay ny '
  - type: text
    content: mifady hanina
  - type: text
    content: ','
  - type: text
    content: raha tsy hitanao akory izany?
  - type: text
    content: Soa inona ho anay ny mampahory tena,
  - type: text
    content: raha tsy ahoanao akory izany?»
  - type: text
    content: 'Izao kosa no amaliako azy:'
  - type: text
    content: Indro fa amin’ny andro ifadianareo hanina
  - type: text
    content: dia manenjika ny tombontsoanareo ihany ianareo
  - type: text
    content: ka manjakazaka amin’ny mpiasa rehetra eo aminareo.
  '4':
  - type: text
    content: Indro sady mifady hanina ianareo
  - type: text
    content: no mbola miady sy mifanditra ihany
  - type: text
    content: ary mamely totohondry mahery vaika.
  - type: text
    content: Tsy ny fifadianareo hanina tahaka izany
  - type: text
    content: no handrenesako ny feonareo any amin’ny avo.
  '5':
  - type: text
    content: Moa fifadian-kanina toy izany ve no tiako,
  - type: text
    content: amin’ny andro ampahorîn’ny olona tena?
  - type: text
    content: Ny hampilofika ny lohany toy ny zozoro
  - type: text
    content: sy ny hitafy lamba fisaonana
  - type: text
    content: ary ny hatory mihosin-davenona!
  - type: text
    content: Izany ve no ataonareo hoe fifadian-kanina
  - type: text
    content: sy andro ankasitrahina eo amiko TOMPO?
  '6':
  - type: text
    content: 'Tsia, fa ny fifadian-kanina tiako dia izao:'
  - type: text
    content: ny mamaha ny olona voafatotra tsy an-drariny,
  - type: text
    content: ny manaisotra ny zioga mitambesatra aminy,
  - type: text
    content: ny manafaka ireo ampahorîna
  - type: text
    content: ka manapatapaka izay zioga rehetra mangeja azy.
  '7':
  - type: text
    content: Ny hizarànao ny haninao ho an’ny noana
  - type: text
    content: sy hampiantranoanao ireo mahantra mirenireny,
  - type: text
    content: ny hampitafînao izay hitanao fa miboridana
  - type: text
    content: ka tsy hampihirimbelona anao eo anatrehan’ny namanao
  - type: note
    content: Ampit Mt 25.35-36.
  - type: text
    content: .
  '8':
  - type: text
    content: Amin’izay dia hiposaka toy ny maraina ny fahazavànao
  - type: text
    content: ary ho tonga haingana ny fahasitrananao.
  - type: text
    content: Ny fanafahana anao no hialoha lalana anao,
  - type: text
    content: ary ny TOMPO mihitsy no ho vodilalanao
  - type: note
    content: Ampit 52.12.
  - type: text
    content: .
  '9':
  - type: text
    content: Rehefa miantso ianao, dia hamaly anao ny TOMPO;
  - type: text
    content: 'rehefa mitady vonjy ianao, dia hovaliany hoe: «Inty Aho.»'
  - type: text
    content: Raha foananao eo aminao ny ziogam-pamoretana
  - type: text
    content: mbamin’ny fanendrikendrehana sy ny fitenenan-dratsy,
