document_id: ISA.58
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifadiana sitrak’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miantsoa mafy, fa aza atao malemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy avo toy ny trompetra ny feonao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vakio bantsilana amin’ny vahoakako ny fikomiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny taranak’i Jakôba ny fahotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Isan’andro isan’andro dia mitady Ahy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary maniry hahafantatra ny lalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny firenena iray manao ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nanary ny fitsipik’Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fitsarana araka ny rariny no angatahiny amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanatrehako azy no zavatra irîny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanefa manontany Ahy izy manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Soa inona ho anay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mifady hanina
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy hitanao akory izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soa inona ho anay ny mampahory tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy ahoanao akory izany?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao kosa no amaliako azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro fa amin’ny andro ifadianareo hanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manenjika ny tombontsoanareo ihany ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manjakazaka amin’ny mpiasa rehetra eo aminareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro sady mifady hanina ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mbola miady sy mifanditra ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamely totohondry mahery vaika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ny fifadianareo hanina tahaka izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no handrenesako ny feonareo any amin’ny avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa fifadian-kanina toy izany ve no tiako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro ampahorîn’ny olona tena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hampilofika ny lohany toy ny zozoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hitafy lamba fisaonana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hatory mihosin-davenona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany ve no ataonareo hoe fifadian-kanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy andro ankasitrahina eo amiko TOMPO?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsia, fa ny fifadian-kanina tiako dia izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mamaha ny olona voafatotra tsy an-drariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manaisotra ny zioga mitambesatra aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manafaka ireo ampahorîna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manapatapaka izay zioga rehetra mangeja azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny hizarànao ny haninao ho an’ny noana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampiantranoanao ireo mahantra mirenireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hampitafînao izay hitanao fa miboridana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hampihirimbelona anao eo anatrehan’ny namanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 25.35-36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin’izay dia hiposaka toy ny maraina ny fahazavànao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho tonga haingana ny fahasitrananao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanafahana anao no hialoha lalana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny TOMPO mihitsy no ho vodilalanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 52.12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa miantso ianao, dia hamaly anao ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'rehefa mitady vonjy ianao, dia hovaliany hoe: «Inty Aho.»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha foananao eo aminao ny ziogam-pamoretana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny fanendrikendrehana sy ny fitenenan-dratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: raha zarainao ho an’ny noana ny haninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manome sakafo ireo sahirana ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hamirapiratra ao amin’ny haizina ny fahazavànao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho toy ny mitataovovonana ny haizim-pitonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hitari-dalana anao hatrany ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ao amin’ny tany karakaina aza ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hovokisany hanina sy hampahatanjahiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanjary mahate hijery toy ny saha vonton-drano ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na toy ny loharano miboiboika tsy mety ritra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Noho ny ezakao, dia haorina indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zavatra rava fahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatsangana indray ny fanorenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nilaozana hatry ny elabe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ianao dia hantsoina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Vahoaka mpamboatra ny manda simba
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpamelona ny lalankely efa maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho tsara honenana ao an-tanàna.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sabata ankasitrahîn’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy koa ny TOMPO hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Raha atsahatrao ny fanosihosena ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ny tombontsoanao no enjehinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro voatokana ho Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ny sabata no lazainao hoe andro mahafinaritra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha ny andro voatokana ho Ahy no lazainao hoe mendrika hohajaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha hajainao tokoa izany ka fadînao ny fanaonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny manenjika ny tombontsoanao na ny miteniteny foana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia ho tonga loharanom-pifaliana ho anao Aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO no hitondra anao ho mpandresy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tendron-kavoan’ilay tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hampanaram-po anao amin’ny lovan’i Jakôba razanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavako no mampanantena izany.»
