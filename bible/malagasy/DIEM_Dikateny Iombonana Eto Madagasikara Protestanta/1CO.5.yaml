document_id: 1CO.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitondrantena tsy mendrika ao amin’ny Fiangonana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Re laza hatraiza hatraiza ankehitriny fa misy fanambadiana mifotitra ao aminareo, dia fanambadiana mifotitra mahatsiravina izay tsy fahita na dia any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' akory aza: misy anankiray aminareo manambady renikely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voararan’ny lalàna jiosy ny fanambadiana toy izany (jereo Fisor 18.8; Deot 23.1), sady voararan’ny lalàna rômanina koa.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hoe izay mpijangajanga, na mpitia harena, na mpanao an-keriny, na mpanompo sampy eto amin’izao tontolo izao amin’ny ankapobeny; fa raha izany, dia tsy maintsy miala amin’izao tontolo izao ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao kosa no voasoratro: aoka ianareo tsy hifanerasera amin’olona mitonon-tena ho kristianina nefa mpijangajanga, na mpitia harena, na mpanompo sampy, na mpanendrikendrika, na mpidoroka, na mpanao an-keriny; aoka ianareo tsy hiara-misakafo amin’ny kristianina toy izany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy anjarako ny hanafay an’izay tsy kristianina, fa Andriamanitra no hanafay azy ireo. Tsy hofaizinareo kosa ve ny kristianina namanareo? Fa izao no tenin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ': «Esory aminareo ilay olon-dratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 17.7, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ianareo mbola mirehareha ihany. Tsy tokony ho feno alahelo ve ianareo, ka ilay lehilahy namoafady nahavita izany dia ho nakifakareo tsy ho eo aminareo? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho, na dia lavitra anareo am-batana aza, dia akaikinareo am-panahy; ka tamin’ny anaran’i Jesoa Tompontsika no nitsarako sahady an’ilay namoa-tsampona. Raha hivory ianareo ka ho tafaraka aminareo am-panahy aho, dia homba antsika ny herin’i Jesoa Tompontsika: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa atolory an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fehezanteny mitovy firafitra amin’ny ao 1 Tim 1.26. Izany fomba fiteny mahery vaika izany no ilazana ny fanakifihana an’ilay meloka hiala tao amin’ny Fiangonana mandritra ny fotoana vitsivitsy ahay.
      marker-yv: yv-n
    - type: text
      text: ' izany lehilahy izany, mba horavana ny maha olona mpanota azy ka hovonjena ny fanahiny amin’ilay andro hiavian’ny Tompo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mety ve ny fireharehànareo! Tsy fantatrareo ve ilay ohabolana hoe: «'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Leviora
    - type: text
      text: ' kely foana dia mampibohaka ny koba manontolo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gal 5.9.
      marker-yv: yv-n
    - type: text
      text: '»? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esory io leviora tranainy io, izany hoe ny fahotana, mba ho madio tokoa ianareo; dia ho tonga koba vaovao tsy misy leviora, satria izany rahateo ianareo. Eny, efa voavono i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ilay Zanakondrin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' ho antsika: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka dia aoka isika hankalaza ny Paska tsy amin’ny mofo misy leviora tranainy, dia ny leviora manambara fitondrantena tsy valahara sy toe-dratsy; fa amin’ny mofo tsy misy leviora, dia ny mofo manambara fitondrantena madio sy toetra mahitsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 7:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 12.3, 5, 21. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 8:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Eks 13.7.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin’ilay taratasy nalefako taminareo, dia izao no voasoratro: aoka ianareo tsy hifanerasera amin’ny olona mpijangajanga. '
