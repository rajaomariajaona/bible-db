document_id: 1CO.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitondrantena tsy mendrika ao amin’ny Fiangonana
  - type: text
    content: 'Re laza hatraiza hatraiza ankehitriny fa misy fanambadiana mifotitra ao aminareo, dia fanambadiana mifotitra mahatsiravina izay tsy fahita na dia any amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' akory aza: misy anankiray aminareo manambady renikely'
  - type: note
    content: Voararan’ny lalàna jiosy ny fanambadiana toy izany (jereo Fisor 18.8; Deot 23.1), sady voararan’ny lalàna rômanina koa.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Tsy hoe izay mpijangajanga, na mpitia harena, na mpanao an-keriny, na mpanompo sampy eto amin’izao tontolo izao amin’ny ankapobeny; fa raha izany, dia tsy maintsy miala amin’izao tontolo izao ianareo. '
  '11':
  - type: text
    content: 'Fa izao kosa no voasoratro: aoka ianareo tsy hifanerasera amin’olona mitonon-tena ho kristianina nefa mpijangajanga, na mpitia harena, na mpanompo sampy, na mpanendrikendrika, na mpidoroka, na mpanao an-keriny; aoka ianareo tsy hiara-misakafo amin’ny kristianina toy izany.'
  '12':
  - type: text
    content: 'Tsy anjarako ny hanafay an’izay tsy kristianina, fa Andriamanitra no hanafay azy ireo. Tsy hofaizinareo kosa ve ny kristianina namanareo? Fa izao no tenin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Esory aminareo ilay olon-dratsy'
  - type: note
    content: Deot 17.7, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Nefa ianareo mbola mirehareha ihany. Tsy tokony ho feno alahelo ve ianareo, ka ilay lehilahy namoafady nahavita izany dia ho nakifakareo tsy ho eo aminareo? '
  '3':
  - type: text
    content: 'Fa izaho, na dia lavitra anareo am-batana aza, dia akaikinareo am-panahy; ka tamin’ny anaran’i Jesoa Tompontsika no nitsarako sahady an’ilay namoa-tsampona. Raha hivory ianareo ka ho tafaraka aminareo am-panahy aho, dia homba antsika ny herin’i Jesoa Tompontsika: '
  '5':
  - type: text
    content: 'koa atolory an’i '
  - type: text
    content: Satàna
  - type: note
    content: Fehezanteny mitovy firafitra amin’ny ao 1 Tim 1.26. Izany fomba fiteny mahery vaika izany no ilazana ny fanakifihana an’ilay meloka hiala tao amin’ny Fiangonana mandritra ny fotoana vitsivitsy ahay.
  - type: text
    content: ' izany lehilahy izany, mba horavana ny maha olona mpanota azy ka hovonjena ny fanahiny amin’ilay andro hiavian’ny Tompo.'
  '6':
  - type: text
    content: 'Tsy mety ve ny fireharehànareo! Tsy fantatrareo ve ilay ohabolana hoe: «'
  - type: text
    content: Leviora
  - type: text
    content: ' kely foana dia mampibohaka ny koba manontolo'
  - type: note
    content: Ampit Gal 5.9.
  - type: text
    content: '»? '
  '7':
  - type: text
    content: 'Esory io leviora tranainy io, izany hoe ny fahotana, mba ho madio tokoa ianareo; dia ho tonga koba vaovao tsy misy leviora, satria izany rahateo ianareo. Eny, efa voavono i '
  - type: text
    content: Kristy
  - type: text
    content: ' ilay Zanakondrin’ny '
  - type: text
    content: Paska
  - type: text
    content: ' ho antsika: '
  '8':
  - type: text
    content: ka dia aoka isika hankalaza ny Paska tsy amin’ny mofo misy leviora tranainy, dia ny leviora manambara fitondrantena tsy valahara sy toe-dratsy; fa amin’ny mofo tsy misy leviora, dia ny mofo manambara fitondrantena madio sy toetra mahitsy
  - type: note
    content: 'And 7: ampit Eks 12.3, 5, 21. –And 8: ampit Eks 13.7.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tao amin’ilay taratasy nalefako taminareo, dia izao no voasoratro: aoka ianareo tsy hifanerasera amin’ny olona mpijangajanga. '
