document_id: EXO.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpiasa hanao ny Toeramasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy koa ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Jereonao fa nofidiko i Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary nofenoiko ny Fanahiko mba ho tena kinga sy marani-tsaina ka mahalala ny haitao isan-karazany: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'hainy ny manao vinavinan’asa, ny miasa volamena sy volafotsy ary halimo, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ny mandidy ny vatosoa sy mandrafitra azy, ny manao sokitra ny hazo, izany hoe hainy atao ny asa kanto samihafa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary indro nomeko ho lefiny i Ôhôliaba, zanakalahin’i Ahisamàka, avy amin’ny fokon’i Dana, sady efa nomeko ny fahakingana lehibe izay an’ireo mpahay taozavatra hafa koa. Izy ireo no hiaraka hanatanteraka izay rehetra nandidiako anao hatao: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
  - type: text
    text: ', ny saron’ny Vatamasina, ny fitaovana rehetra momba ny tranolay masina, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny latabatra voatokana, ny fitoeran-jiro volamena madio sy ny fitaovana rehetra miaraka aminy, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fandoroana vovo-javamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny alitara fanaovana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' sy ny fitaovana rehetra miaraka aminy, ny tavy fidiovana sy ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ny lamba fandrakofana ny fanaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lamba fandrakofana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy azo antoka ny hevitry ny voambolana hebreo nadika eto.
    marker-yv: yv-n
  - type: text
    text: ', ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ny ilomasina fampiasa amin’ny fanokanana, ary ny vovo-javamanitra voatokana ho an’ny Toeramasina. Hanaraka tanteraka ny torolalana izay nandidiako anao ny mpahay taozavatra amin’ny fanaovana ireo rehetra ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanajana ny sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy maintsy hajainareo mihitsy ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ', satria ny sabata no mariky ny fifandraisako aminareo isaky ny taranaka mifandimby, ka hiekena fa Izaho no TOMPO Izay nifidy anareo ho vahoakako. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa manajà ny sabata, fa andro voatokana aminareo izany. Fa izay tsy manaja ny andro sabata fa manao raharaha amin’io andro io dia hoesorina tsy ho anisan’ny firenena israelita ary hovonoina ho faty mihitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Misy andro enina hiasana isan-kerinandro, fa ny andro fahafito dia sabata, andro fitsaharana voatokana ho Ahy TOMPO. Koa izay olona rehetra miasa amin’ny andro sabata dia hovonoina ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy maintsy hajain’ny Israelita isaky ny taranaka mifandimby ny sabata satria fanekempihavanana raikitra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Io andro io hatrany hatrany no ho mariky ny fifandraisana amiko sy amin’ny Israelita; enina andro manko no namoronako ny lanitra sy ny tany, fa tamin’ny andro fahafito dia nitsahatra Aho ary niala sasatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.17 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 12-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 20.8-11; 23.12; 34.21; 35.2; Gen 2.13; Lev 23.3; Deot 5.13-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rehefa vitan’Andriamanitra ny resaka nataony tamin’i Mosesy tao an-tendrombohitra Sinay, dia nomeny an’i Mosesy ny vatofisaka misy ny lalàna izay nosoratan’ny rantsan-tanan’Andriamanitra.
