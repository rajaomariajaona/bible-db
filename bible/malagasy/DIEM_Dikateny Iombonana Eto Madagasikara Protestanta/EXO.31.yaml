document_id: EXO.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpiasa hanao ny Toeramasina
  - type: text
    content: 'Hoy koa ny TOMPO tamin’i Mosesy:'
  '10':
  - type: text
    content: ny lamba fandrakofana ny fanaka
  - type: note
    content: 'lamba fandrakofana: tsy azo antoka ny hevitry ny voambolana hebreo nadika eto.'
  - type: text
    content: ', ny fanamiana voatokana hiakanjoan’i Aharôna sy ny zanany lahy eo am-panaovana ny raharahany, '
  '11':
  - type: text
    content: ny ilomasina fampiasa amin’ny fanokanana, ary ny vovo-javamanitra voatokana ho an’ny Toeramasina. Hanaraka tanteraka ny torolalana izay nandidiako anao ny mpahay taozavatra amin’ny fanaovana ireo rehetra ireo.
  - type: heading
    content: Ny fanajana ny sabata
  '12':
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO, '
  '13':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '–Tsy maintsy hajainareo mihitsy ny andro '
  - type: text
    content: sabata
  - type: text
    content: ', satria ny sabata no mariky ny fifandraisako aminareo isaky ny taranaka mifandimby, ka hiekena fa Izaho no TOMPO Izay nifidy anareo ho vahoakako. '
  '14':
  - type: text
    content: 'Koa manajà ny sabata, fa andro voatokana aminareo izany. Fa izay tsy manaja ny andro sabata fa manao raharaha amin’io andro io dia hoesorina tsy ho anisan’ny firenena israelita ary hovonoina ho faty mihitsy. '
  '15':
  - type: text
    content: 'Misy andro enina hiasana isan-kerinandro, fa ny andro fahafito dia sabata, andro fitsaharana voatokana ho Ahy TOMPO. Koa izay olona rehetra miasa amin’ny andro sabata dia hovonoina ho faty. '
  '16':
  - type: text
    content: 'Tsy maintsy hajain’ny Israelita isaky ny taranaka mifandimby ny sabata satria fanekempihavanana raikitra izany. '
  '17':
  - type: text
    content: Io andro io hatrany hatrany no ho mariky ny fifandraisana amiko sy amin’ny Israelita; enina andro manko no namoronako ny lanitra sy ny tany, fa tamin’ny andro fahafito dia nitsahatra Aho ary niala sasatra
  - type: note
    content: 'And 12-17: jereo 20.8-11; 23.12; 34.21; 35.2; Gen 2.13; Lev 23.3; Deot 5.13-14.'
  - type: text
    content: .
  '18':
  - type: text
    content: Rehefa vitan’Andriamanitra ny resaka nataony tamin’i Mosesy tao an-tendrombohitra Sinay, dia nomeny an’i Mosesy ny vatofisaka misy ny lalàna izay nosoratan’ny rantsan-tanan’Andriamanitra.
  '2':
  - type: text
    content: '–Jereonao fa nofidiko i Betsalela, zanakalahin’i Orỳ sady zafikelin’i Hora, avy amin’ny fokon’i Joda, '
  '3':
  - type: text
    content: 'ary nofenoiko ny Fanahiko mba ho tena kinga sy marani-tsaina ka mahalala ny haitao isan-karazany: '
  '4':
  - type: text
    content: 'hainy ny manao vinavinan’asa, ny miasa volamena sy volafotsy ary halimo, '
  '5':
  - type: text
    content: 'ny mandidy ny vatosoa sy mandrafitra azy, ny manao sokitra ny hazo, izany hoe hainy atao ny asa kanto samihafa. '
  '6':
  - type: text
    content: 'Ary indro nomeko ho lefiny i Ôhôliaba, zanakalahin’i Ahisamàka, avy amin’ny fokon’i Dana, sady efa nomeko ny fahakingana lehibe izay an’ireo mpahay taozavatra hafa koa. Izy ireo no hiaraka hanatanteraka izay rehetra nandidiako anao hatao: '
  '7':
  - type: text
    content: 'dia ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ny '
  - type: text
    content: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
  - type: text
    content: ', ny saron’ny Vatamasina, ny fitaovana rehetra momba ny tranolay masina, '
  '8':
  - type: text
    content: 'ny latabatra voatokana, ny fitoeran-jiro volamena madio sy ny fitaovana rehetra miaraka aminy, ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana vovo-javamanitra, '
  '9':
  - type: text
    content: 'ny alitara fanaovana '
  - type: text
    content: sorona
  - type: text
    content: ' sy ny fitaovana rehetra miaraka aminy, ny tavy fidiovana sy ny faladiany, '
