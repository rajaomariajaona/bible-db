document_id: JOB.40,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An’i Jôba indray no mamaly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany an’i Jôba ny Tompo ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miravaha voninahitra sy fahalehibeazana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitafia famirapiratana sy fiandrianana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'famirapiratana sy fiandrianana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Sal 96.6; 104.1; 111.3.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fijery mitsipalotra no amafazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahatezeranao misamboaravoara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ampietreo ny mpiavonavona rehetra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fijery mitsipalotra no anongany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’ireo mpiavonavona rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo amin’ny toerany eo ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ataovy montsana ny olon-dratsy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asitriho ao amin’ny tany miaraka izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hidio ao amin’ny tranomaizim-pahafatesana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho mihitsy no hiarahaba anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny herinao no nampandresy anao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lalomena
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ange ny lalomena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa samy noarîko na izy na ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihinana ahitra tahaka ny omby izy;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa jereo ity hery ananany eo an-tehezany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ity tanjany eo amin’ny hoza-kibony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henjaniny toa hazo sedera ny rambony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifaniditra eo amin’ny feny kosa ny hozabe.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taolany dia mafy toa fantsom-barahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taolan-tehezany dia miendrika baravy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anisan’ny sangan’asako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izaho Andriamanitra nanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanome sabatra azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Andriamanitra Tsitoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no niadianao sy nifandiranao, ry Jôba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola hitsikera Ahy ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia valio izay rehetra voalazako izay?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamoka-bilona ho an’ny lalomena ireo havoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay filalaovan’ny bibidia rehetra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandry anaty kirihitra feno tsilo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miafina anaty zozoro eny an-keniheny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manalokaloka azy ny kirihitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manarona azy ny hazomalahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amoron’ny ranon-driaka eny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia misafoaka aza ny onjan-drano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba mihetsika akory ny lalomena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mampiraika azy akory i Jôrdàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia mitroatra hatreny am-bavany aza.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza moa no hahasambotra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanapotsitra ny masony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no hahavoafandrika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahaketoka ny orony?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voay na ny dragona lehibe
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahajono ny voay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny voay:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny dragona lehibe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 3.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fintana va ianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahafatotra ny lelany amin’ny tadim-pintana?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsofoka harefo amin’ny orony va ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahagorobaka ny valanoranony amim-parango?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifon-jato hifona arivo aminao va izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hanambitamby anao amin’ny teny mamy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao fifanekena aminao ve izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho azonao andevozina mandra-pahafatiny?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hilalao azy toy ny filalao voronkely ve ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamatotra azy ho fialambolin’ny zanakavavinao?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa namaly ny Tompo i Jôba ka nanao hoe:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikambana hivarotra ny voay ve ny mpanjono
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitsinjara azy amin’ny mpivarotra?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahaloadoaka ny hodiny amin’ny tsilo ve ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mahatrobaka ny lohany amin’ny firombaka?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa kasiho tanana ange izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotsaroanao ny ady taminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hanindroa intsony ianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinontsinona aho ka tsy manan-kavaly Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitampim-bava no ataoko izao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa sahy niteny matetika aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hamaly intsony, fa aoka izay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mihevitra ny tenany ho Andriamanitra ve i Jôba?
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy ao anaty tafio-drivotra ny Tompo no namaly an’i Jôba ka nanao hoe:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misikîna àry ho tena lehilahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hanontany anao Aho ka valio.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sahinao lavina tokoa ve ny fitsaràko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka Izaho no diso fa ianao no marina?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-kery tahaka Ahy ve ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mitalakotro-peo tahaka Ahy?
