document_id: JOB.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An’i Jôba indray no mamaly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nanontany an’i Jôba ny Tompo ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho Andriamanitra Tsitoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niadianao sy nifandiranao, ry Jôba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola hitsikera Ahy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia valio izay rehetra voalazako izay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa namaly ny Tompo i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsinontsinona aho ka tsy manan-kavaly Anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitampim-bava no ataoko izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa sahy niteny matetika aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hamaly intsony, fa aoka izay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihevitra ny tenany ho Andriamanitra ve i Jôba?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy ao anaty tafio-drivotra ny Tompo no namaly an’i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misikîna àry ho tena lehilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hanontany anao Aho ka valio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sahinao lavina tokoa ve ny fitsaràko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka Izaho no diso fa ianao no marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manan-kery tahaka Ahy ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mitalakotro-peo tahaka Ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa miravaha voninahitra sy fahalehibeazana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitafia famirapiratana sy fiandrianana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'famirapiratana sy fiandrianana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Sal 96.6; 104.1; 111.3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fijery mitsipalotra no amafazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezeranao misamboaravoara
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ampietreo ny mpiavonavona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, fijery mitsipalotra no anongany
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’ireo mpiavonavona rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo amin’ny toerany eo ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ataovy montsana ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Asitriho ao amin’ny tany miaraka izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hidio ao amin’ny tranomaizim-pahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa Izaho mihitsy no hiarahaba anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny herinao no nampandresy anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalomena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jereo ange ny lalomena
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa samy noarîko na izy na ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinana ahitra tahaka ny omby izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: kanefa jereo ity hery ananany eo an-tehezany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ity tanjany eo amin’ny hoza-kibony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Henjaniny toa hazo sedera ny rambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifaniditra eo amin’ny feny kosa ny hozabe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny taolany dia mafy toa fantsom-barahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taolan-tehezany dia miendrika baravy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Anisan’ny sangan’asako izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka Izaho Andriamanitra nanao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanome sabatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mamoka-bilona ho an’ny lalomena ireo havoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay filalaovan’ny bibidia rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandry anaty kirihitra feno tsilo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miafina anaty zozoro eny an-keniheny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manalokaloka azy ny kirihitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manarona azy ny hazomalahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amoron’ny ranon-driaka eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa na dia misafoaka aza ny onjan-drano
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mba mihetsika akory ny lalomena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mampiraika azy akory i Jôrdàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mitroatra hatreny am-bavany aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa iza moa no hahasambotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanapotsitra ny masony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no hahavoafandrika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahaketoka ny orony?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voay na ny dragona lehibe
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mahajono ny voay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny voay:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny dragona lehibe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fintana va ianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahafatotra ny lelany amin’ny tadim-pintana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mahatsofoka harefo amin’ny orony va ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahagorobaka ny valanoranony amim-parango?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hifon-jato hifona arivo aminao va izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanambitamby anao amin’ny teny mamy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hanao fifanekena aminao ve izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho azonao andevozina mandra-pahafatiny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hilalao azy toy ny filalao voronkely ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hamatotra azy ho fialambolin’ny zanakavavinao?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hikambana hivarotra ny voay ve ny mpanjono
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsinjara azy amin’ny mpivarotra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mahaloadoaka ny hodiny amin’ny tsilo ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahatrobaka ny lohany amin’ny firombaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa kasiho tanana ange izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hotsaroanao ny ady taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanindroa intsony ianao.
