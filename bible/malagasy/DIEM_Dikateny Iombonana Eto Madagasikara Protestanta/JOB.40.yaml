document_id: JOB.40,396
type_code: plt
verses:
  '1':
  - type: heading
    content: An’i Jôba indray no mamaly
  - type: text
    content: 'Dia nanontany an’i Jôba ny Tompo ka nanao hoe:'
  '10':
  - type: text
    content: Koa miravaha voninahitra sy fahalehibeazana
  - type: text
    content: ary mitafia famirapiratana sy fiandrianana
  - type: note
    content: 'famirapiratana sy fiandrianana: ampit Sal 96.6; 104.1; 111.3.'
  - type: text
    content: .
  '11':
  - type: text
    content: Fijery mitsipalotra no amafazo
  - type: text
    content: ny fahatezeranao misamboaravoara
  - type: text
    content: dia ampietreo ny mpiavonavona rehetra.
  '12':
  - type: text
    content: Eny, fijery mitsipalotra no anongany
  - type: text
    content: an’ireo mpiavonavona rehetra;
  - type: text
    content: ary eo amin’ny toerany eo ihany
  - type: text
    content: no ataovy montsana ny olon-dratsy.
  '13':
  - type: text
    content: Asitriho ao amin’ny tany miaraka izy rehetra
  - type: text
    content: ary hidio ao amin’ny tranomaizim-pahafatesana.
  '14':
  - type: text
    content: Fa Izaho mihitsy no hiarahaba anao
  - type: text
    content: satria ny herinao no nampandresy anao.
  - type: heading
    content: Ny lalomena
  '15':
  - type: text
    content: Jereo ange ny lalomena
  - type: text
    content: fa samy noarîko na izy na ianao!
  - type: text
    content: Mihinana ahitra tahaka ny omby izy;
  '16':
  - type: text
    content: kanefa jereo ity hery ananany eo an-tehezany
  - type: text
    content: ary koa ity tanjany eo amin’ny hoza-kibony.
  '17':
  - type: text
    content: Henjaniny toa hazo sedera ny rambony;
  - type: text
    content: mifaniditra eo amin’ny feny kosa ny hozabe.
  '18':
  - type: text
    content: Ny taolany dia mafy toa fantsom-barahina
  - type: text
    content: ary ny taolan-tehezany dia miendrika baravy.
  '19':
  - type: text
    content: Anisan’ny sangan’asako izy
  - type: text
    content: ka Izaho Andriamanitra nanao azy
  - type: text
    content: no nanome sabatra azy.
  '2':
  - type: text
    content: Izaho Andriamanitra Tsitoha
  - type: text
    content: no niadianao sy nifandiranao, ry Jôba.
  - type: text
    content: Raha mbola hitsikera Ahy ianao,
  - type: text
    content: dia valio izay rehetra voalazako izay?
  '20':
  - type: text
    content: Mamoka-bilona ho an’ny lalomena ireo havoana
  - type: text
    content: izay filalaovan’ny bibidia rehetra.
  '21':
  - type: text
    content: Mandry anaty kirihitra feno tsilo izy
  - type: text
    content: ary miafina anaty zozoro eny an-keniheny.
  '22':
  - type: text
    content: Manalokaloka azy ny kirihitra
  - type: text
    content: ary manarona azy ny hazomalahelo
  - type: text
    content: eny amoron’ny ranon-driaka eny.
  '23':
  - type: text
    content: Fa na dia misafoaka aza ny onjan-drano
  - type: text
    content: dia tsy mba mihetsika akory ny lalomena;
  - type: text
    content: tsy mampiraika azy akory i Jôrdàna
  - type: text
    content: na dia mitroatra hatreny am-bavany aza.
  '24':
  - type: text
    content: Fa iza moa no hahasambotra azy
  - type: text
    content: ka hanapotsitra ny masony?
  - type: text
    content: Iza moa no hahavoafandrika azy
  - type: text
    content: ka hahaketoka ny orony?
  - type: heading
    content: Ny voay na ny dragona lehibe
  '25':
  - type: text
    content: Mahajono ny voay
  - type: note
    content: 'ny voay: na ny dragona lehibe, jereo 3.8 sy nta.'
  - type: text
    content: ' amin’ny fintana va ianao'
  - type: text
    content: na mahafatotra ny lelany amin’ny tadim-pintana?
  '26':
  - type: text
    content: Mahatsofoka harefo amin’ny orony va ianao
  - type: text
    content: na mahagorobaka ny valanoranony amim-parango?
  '27':
  - type: text
    content: Hifon-jato hifona arivo aminao va izy
  - type: text
    content: na hanambitamby anao amin’ny teny mamy?
  '28':
  - type: text
    content: Hanao fifanekena aminao ve izy
  - type: text
    content: ka ho azonao andevozina mandra-pahafatiny?
  '29':
  - type: text
    content: Hilalao azy toy ny filalao voronkely ve ianao
  - type: text
    content: ka hamatotra azy ho fialambolin’ny zanakavavinao?
  - type: heading
    content: '*'
  '3':
  - type: text
    content: 'Fa namaly ny Tompo i Jôba ka nanao hoe:'
  '30':
  - type: text
    content: Hikambana hivarotra ny voay ve ny mpanjono
  - type: text
    content: ka hitsinjara azy amin’ny mpivarotra?
  '31':
  - type: text
    content: Mahaloadoaka ny hodiny amin’ny tsilo ve ianao
  - type: text
    content: na mahatrobaka ny lohany amin’ny firombaka?
  '32':
  - type: text
    content: Fa kasiho tanana ange izy
  - type: text
    content: dia hotsaroanao ny ady taminy
  - type: text
    content: ary tsy hanindroa intsony ianao.
  '4':
  - type: text
    content: Tsinontsinona aho ka tsy manan-kavaly Anao.
  - type: text
    content: Hitampim-bava no ataoko izao.
  '5':
  - type: text
    content: Efa sahy niteny matetika aho,
  - type: text
    content: ka tsy hamaly intsony, fa aoka izay.
  - type: heading
    content: Mihevitra ny tenany ho Andriamanitra ve i Jôba?
  '6':
  - type: text
    content: 'Avy ao anaty tafio-drivotra ny Tompo no namaly an’i Jôba ka nanao hoe:'
  '7':
  - type: text
    content: Misikîna àry ho tena lehilahy,
  - type: text
    content: fa hanontany anao Aho ka valio.
  '8':
  - type: text
    content: Sahinao lavina tokoa ve ny fitsaràko
  - type: text
    content: ka Izaho no diso fa ianao no marina?
  '9':
  - type: text
    content: Manan-kery tahaka Ahy ve ianao
  - type: text
    content: na mitalakotro-peo tahaka Ahy?
