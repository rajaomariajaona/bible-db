document_id: 2SA.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afa-baràka ireo minisitr’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 19.1-5)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorian’izany, dia maty ny mpanjakan’ny Hamônita, ka i Hanòna zanany lahy no nanjaka nandimby azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny miaramila sisa kosa nankininy tamin’i Abisay rahalahiny ka nalahany teo anoloan’ny Hamônita. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy i Jôaba tamin’ity rahalahiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha mahery noho izaho ny Sirianina, dia aoka ianao hamonjy ahy; fa raha ny Hamônita kosa no mahery noho ianao, dia izaho no ho avy hamonjy anao. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mahereza ianao, ary aoka isika hahery miady ho an’ny firenentsika sy ireo tanànan’Andriamanitsika. Ary aoka ny TOMPO hanao izay heveriny ho tsara.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nandroso hiady amin’ny Sirianina i Jôaba sy ny tafiny ka vaky nandositra teo anoloan’ny Israelita ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rehefa hitan’ny Hamônita fa nandositra ny Sirianina, dia mba nandositra teo anoloan’i Abisay koa ry zareo ka nitsofoka tao an-tanàna. Ary nitsahatra nanafika ny Hamônita i Jôaba ka niverina ho any Jerosalema.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireto Sirianina ireto, dia nivory nitambatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Naniraka olona i Hadadehezera mba hanetsika ny Sirianina izay tany am-pitan’ny ony Eofrata. Dia tonga tao Helama ireo; ary i Sôbàka filohan’ny tafik’i Hadadehezera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hadadehezera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 8.3. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Helama:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tanàna any atsinanan’i Jôrdàna, saingy tsy tena azo antoka ny toerana misy azy.'
      marker-yv: yv-n
    - type: text
      text: ' no nitarika azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nambara tamin’i Davida izany; koa namory ny tafika israelita manontolo izy, dia nita an’i Jôrdàna ary tonga tany Helama. Nitandahatra teo anoloan’i Davida ny Sirianina ka nandrafitra ady taminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vaky nandositra teo anoloan’ny Israelita ireo Sirianina, ka nahafatesan-dry i Davida olona tao an-kalesy fitonjato sy mpitaingin-tsoavaly 40 000. Naratrany koa i Sôbàka filohan-tafika, ka maty teo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireo mpanjaka rehetra mpanoa an’i Hadadehezera, dia nandrindra fihavanana tamin’i Israelita ka nanoa azy. Ary tsy sahy namonjy ny Hamônita intsony ny Sirianina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy i Davida anakampony: «Hanao soa amin’i Hanòna zanakalahin’i Nahasy aho, tahaka izay nataon-drainy tamiko.» Dia naniraka minisitra i Davida mba hitsapa alahelo an’i Hanòna noho ny nahafatesan-drainy. Rehefa tonga tany amin’ny tanin’ny Hamônita ireo minisitr’i Davida, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia hoy kosa ireo andrianan’ny Hamônita tamin’i Hanòna tompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataonao ve fa ho fanomezan’i Davida voninahitra an-drainao ihany no anirahany olona hitsapa alahelo anao? Moa ve tsy hizaha ny tanàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny tanàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Rabà renivohitry ny Hamônita, jereo 11.1.
      marker-yv: yv-n
    - type: text
      text: ' sy hitsikilo azy mba hahazoany mandrava azy no anirahan’i Davida minisitra hankatỳ aminao?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nampisamborin’i Hanòna ireo minisitr’i Davida, ka noharatana ny ila-volombavany sady notapahina manasa-pe ny akanjony, ary noroahina nody. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nisy nampandre izany tamin’i Davida; dia naniraka olona izy mba hitsena azy, satria afa-baràka loatra ireo lehilahy ireo; ka hoy ny hafatry ny mpanjaka hoe: «Mijanòna any Jerikao aloha mandra-panirin’ny volombavanareo; izay ianareo vao mody.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ady tamin’ny Hamônita sy ny Sirianina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 19.6-19)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsapan’i Hamônita fa tonga halan’i Davida izy. Koa naniraka olona ireo mba hanarama Sirianina avy any Bety-Rehôba sy avy any Tsôbà, dia miaramila an-tongotra miisa antokony roapolo; nokaramainy koa ny lehilahy antokony iray avy amin’ny mpanjakan’i Mahekà ary ny lehilahy antokony 12 avy any Tôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsôbà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 8.3; 1 Sam 14.47 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Bety-Rehôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Mahekà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tôba:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toerana tsy dia fantatra mazava ny misy azy, na dia voavinany hoe any Siria avaratra any aza.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony ren’i Davida izany, dia nirahiny ho any an-toerana i Jôaba sy ny miaramila mahery fo rehetra izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niainga ny Hamônita ka nilahatra hiady teo akaikin’ny vavahadin-drenivohiny, fa ny Sirianina avy any Tsôbà sy avy any Rehôba mbamin’ny miaramila avy any Tôba sy avy any Mahekà kosa naka toerana teny an-tsaha. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rehefa hitan’i Jôaba fa sady teo anoloany no teo ivohony ny vava ady, dia nifantina izay miaramila israelita mendrika indrindra izy ka nandahatra azy teo anoloan’ny Sirianina. '
