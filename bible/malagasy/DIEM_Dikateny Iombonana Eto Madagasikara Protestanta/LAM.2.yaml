document_id: LAM.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nirotsaka ho fahavalon’i Jerosalema ny Tompo
  - type: text
    content: Indrisy! Tezitra ny Tompo
  - type: text
    content: 'ka nanaron-draho-mainty an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  - type: text
    content: Avy any an-danitra no nanjerany amin’ny tany
  - type: text
    content: 'izay natao ho '
  - type: text
    content: voninahitr’i Israely
  - type: text
    content: .
  - type: text
    content: Tamin’ny androm-pahatezerany dia hadinony
  - type: text
    content: fa i Tsiôna no fandiavan-tongony
  - type: note
    content: 'fandiavan-tongony (ampit Sal 99.5; Mt 5.35): na hoe fonenany masina.'
  - type: text
    content: .
  '10':
  - type: text
    content: Mitorovoka amin’ny tany
  - type: text
    content: sady mangina ny loholon’i Tsiôna;
  - type: text
    content: norarahany vovoka ny lohany
  - type: text
    content: sady mitafy gony izy.
  - type: text
    content: Mitanondrika amin’ny tany
  - type: text
    content: ireo tovovavin’i Jerosalema.
  - type: heading
    content: '*'
  '11':
  - type: text
    content: Jembin-dranomaso ny masoko
  - type: text
    content: ary mandevilevy ny fiontanako;
  - type: text
    content: azon’ny famoizam-po aho
  - type: text
    content: noho ny fahavoazan’ilay firenena mamiko,
  - type: text
    content: fa matin-ketaheta ny zaza madinika sy minono
  - type: text
    content: eny amin’ny kianjan’ny tanàna eny.
  '12':
  - type: text
    content: Raha mitolefika toy ny olona maratra
  - type: text
    content: eny an-kianjan’ny tanàna eny izy
  - type: text
    content: na koa miala aina
  - type: text
    content: eo am-pofoan-dreniny,
  - type: text
    content: 'dia manontany an-dreniny hoe:'
  - type: text
    content: «Aiza izay hanina e?»
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Tsy haiko intsony izay holazaiko anao,
  - type: text
    content: ry Jerosalema mamiko;
  - type: text
    content: fa tsy misy azo anoharana izay manjo anao!
  - type: text
    content: Inona no hampitahaiko aminao
  - type: text
    content: mba hampiononako anao, ry Tsiôna mahonena?
  - type: text
    content: Midadasika toy ny ranomasina ny ratranao;
  - type: text
    content: ka tsy misy mahasitrana anao amin’izany.
  '14':
  - type: text
    content: Hafatra mamitaka sy poaka aty
  - type: text
    content: no nambaran’ny mpaminaninao taminao.
  - type: text
    content: Tsy namaky bantsilana ny helokao izy
  - type: text
    content: mba hiarovana anao tsy ho babo;
  - type: text
    content: fa hafatra mamitaka sy manodoka
  - type: text
    content: no nambarany taminao.
  '15':
  - type: text
    content: Mitehaka noho ny faharavanao
  - type: text
    content: izay rehetra mandalo amin’ity lalana ity,
  - type: text
    content: velon-tsioka sy mihifikifi-doha izy
  - type: note
    content: Momba ny fihetsika maneso; jereo Sal 22.8; 109.25.
  - type: text
    content: 'maneso anao, ry Jerosalema mamiko:'
  - type: text
    content: «Ity tokoa ve ilay tanàna natao hoe
  - type: text
    content: ‹fanaperana amin’ny hatsaran-tarehy›
  - type: text
    content: sy ‹fifalian’ny tany tontolo›?»
  '16':
  - type: text
    content: Misoka-bava hankaloza anao
  - type: text
    content: ny fahavalonao rehetra,
  - type: text
    content: velon-tsioka sy mihidy vazana izy
  - type: text
    content: 'ary miteny hoe: «Nataontsika levona io!'
  - type: text
    content: Tonga izao ny andro nandrasantsika;
  - type: text
    content: tratrantsika izany ary hitantsika ihany!»
  '17':
  - type: text
    content: Nataon’ny TOMPO izay efa nosaintsaininy,
  - type: text
    content: notanterahiny izay nambarany,
  - type: text
    content: 'dia izay efa notapahiny hatry ny ela:'
  - type: text
    content: nandravarava Izy ka tsy niantra.
  - type: text
    content: Nampitotorebika ny fahavalo Izy noho ny nanjo anao
  - type: text
    content: ary nampiakatra ny reharehan’ny mpandrafy anao
  - type: note
    content: 'rehareha: dkt hafa hery.'
  - type: text
    content: .
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Ny fon’ireo mponin’i Jerosalema
  - type: text
    content: dia mitaraina amin’ny Tompo.
  - type: text
    content: Andro aman’alina, ry mandan’i Tsiôna,
  - type: text
    content: avelao ny ranomasonao hikoriana toy ny riaka.
  - type: text
    content: Aza miato mihitsy ianao;
  - type: text
    content: ary aza atsahatrao ny tomany
  - type: note
    content: 'Ny mandan’i Tsiôna eto dia tsy rindrina fitomanian’ny olona fa rindrina mitomany: ekena fa ohatra matavy tapaka izany aseho an-tsary izay.'
  - type: text
    content: .
  '19':
  - type: text
    content: Mitsangàna, miantsoantsoa fitarainana
  - type: text
    content: isan’ora fiambenana amin’ny alina.
  - type: text
    content: Toy ny rano atosaka no amborahy
  - type: text
    content: ny ao am-ponao eo anatrehan’ny Tompo.
  - type: text
    content: Asandrato aminy ny tananao
  - type: note
    content: 'Asandrato aminy ny tananao: fihetsika fanao amin’ny vavaka; Jereo Sal 28.2 sy nta.'
  - type: text
    content: hiangavy ho an’ny ain’ireo zanakao madinika
  - type: text
    content: izay manary aina noho ny hanoanana
  - type: text
    content: eny an-joron-dalana rehetra eny.
  - type: heading
    content: '*'
  '2':
  - type: text
    content: Naripaky ny Tompo tsy nisy indrafo avokoa
  - type: text
    content: ny fonenan’ireo taranak’i Jakôba.
  - type: text
    content: Noravany tam-pahavinirana
  - type: text
    content: ny tanànamimandan’i Joda.
  - type: text
    content: Nazerany amin’ny tany sy nalany baràka
  - type: text
    content: ny fanjakana sy ny mpitondrany.
  '20':
  - type: text
    content: TOMPO ô, jereo ka diniho
  - type: text
    content: ity nanaovanao ny vahoakanao!
  - type: text
    content: Vehivavy ve no handeha hihinana
  - type: text
    content: ny zanany naterany sy nokoloiny?
  - type: text
    content: 'Ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' ve'
  - type: text
    content: 'dia hovonoina eo amin’ny '
  - type: text
    content: Toeramasinao
  - type: text
    content: '?'
  '21':
  - type: text
    content: Na antitra na tanora dia maty
  - type: text
    content: mitsitsitra eny an-dalambe.
  - type: text
    content: Ny tovolahiko sy ny tovovaviko
  - type: text
    content: dia samy matin’ny sabatra.
  - type: text
    content: Novonoinao tamin’ny androm-pahatezeranao izy,
  - type: text
    content: naringanao tsy nisy fiantrana.
  '22':
  - type: text
    content: Toy ny amin’ny andro fety, TOMPO ô,
  - type: text
    content: dia nantsoinao ireo mpampihorohoro manodidina ahy;
  - type: text
    content: ka tamin’ny androm-pahatezeranao
  - type: text
    content: dia tsy nisy sisa velona na afa-nitsoaka,
  - type: text
    content: fa ireo ankizy notezaiko sy nokoloiko
  - type: text
    content: dia naripaky ny fahavaloko avokoa.
  '3':
  - type: text
    content: Tamim-pahatezerana mirehitra no nanapotehany
  - type: text
    content: izay rehetra nampirehareha an’i Israely.
  - type: text
    content: Nihemotra tsy niditra an-tsehatra Izy
  - type: text
    content: teo anatrehan’ny fahavalo.
  - type: text
    content: Nandrehitra afom-pahatezerana Izy
  - type: text
    content: hamelezana ireo taranak’i Jakôba,
  - type: text
    content: ka toa afo miredareda nandevona manodidina.
  '4':
  - type: text
    content: Nanenjan-tsipîka toy ny fahavalo Izy
  - type: text
    content: ary naninji-tanana ankavanana hitifitra.
  - type: text
    content: Niseho toy ny rafilahy Izy ka nandripaka
  - type: text
    content: ny zavatra rehetra mahafinaritra ny masonay.
  - type: text
    content: Ny fahatezerany dia nararany toy ny afo
  - type: text
    content: 'teo ambonin’ny '
  - type: text
    content: tempoli
  - type: text
    content: n’i Tsiôna.
  '5':
  - type: text
    content: Tonga toy ny fahavalonay ny Tompo,
  - type: text
    content: ka nandripaka an’i Israely;
  - type: text
    content: nandripaka ireo lapany rehetra Izy
  - type: text
    content: ary nandrodana ireo mandany
  - type: text
    content: ka nampitombo sento sy taraina
  - type: text
    content: manerana ny vahoakan’i Joda.
  '6':
  - type: text
    content: Noravany ny zaridaina sy ny tranobongony,
  - type: text
    content: nosimbany ny toeram-pihaonany
  - type: note
    content: 'Izao no tian-kambara: ny zaridaina dia i Palestinina; ny tranobongony dia i Jerosalema; ary ny toeram-pihaonany dia ao an-tempoly eo akaikin’ny Vatamasina mirakitra ny Fanekempihavanana.'
  - type: text
    content: .
  - type: text
    content: Nataon’ny TOMPO hadino tao Tsiôna
  - type: text
    content: 'ny andro fety sy ny '
  - type: text
    content: sabata
  - type: text
    content: .
  - type: text
    content: Tamin-katezerana mirehitra no nanesorany
  - type: text
    content: ny mpanjaka mbamin’ny mpisorona.
  '7':
  - type: text
    content: 'Nolavin’ny Tompo ny '
  - type: text
    content: alitarany
  - type: text
    content: ','
  - type: text
    content: nilaozany ny Toeramasiny,
  - type: text
    content: ary natolony ho eo an-tanam-pahavalo
  - type: text
    content: ny mandan’ireo lapan’i Tsiôna.
  - type: text
    content: Nisy akora lava tao an-tranon’ny TOMPO
  - type: text
    content: tahaka ny amin’ny andro fety!
  '8':
  - type: text
    content: Nanapa-kevitra ny TOMPO
  - type: text
    content: fa handrava ny mandan’i Tsiôna.
  - type: text
    content: Nampitoviany tantana ny rindrina voazera,
  - type: text
    content: ka tsy nisalasala nandrodana Izy.
  - type: text
    content: Nitrosina ny manda roa sosona
  - type: text
    content: izay samy miara-mihasimba.
  '9':
  - type: text
    content: Tototry ny tany ireo vavahadin’i Tsiôna;
  - type: text
    content: nopotehina sy nomontsanina ny hidiny.
  - type: text
    content: Ny mpanjaka sy ireo mpitondra
  - type: text
    content: dia eo an-tanan’ny hafa firenena.
  - type: text
    content: Tsy misy fampianaran’ny mpisorona intsony;
  - type: text
    content: 'ary na ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' aza tsy mandray'
  - type: text
    content: hafatra avy amin’ny TOMPO.
