    - type: text
      text: ry Jerosalema mamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy azo anoharana izay manjo anao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no hampitahaiko aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampiononako anao, ry Tsiôna mahonena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midadasika toy ny ranomasina ny ratranao;
  - type: usfm
    marker: q1
    children:
