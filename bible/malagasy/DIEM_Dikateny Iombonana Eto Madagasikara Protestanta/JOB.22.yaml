document_id: JOB.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Tenin’i Elifaza: tena meloka i Jôba'
  - type: text
    content: 'Dia niteny i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: Izany no mahatonga anao ho voahodidim-pandrika
  - type: text
    content: sy ho voafahiranon-korohoro tampoka.
  '11':
  - type: text
    content: Na hoe rakotry ny haizina ianao
  - type: text
    content: ka tsy mahita na inona na inona intsony;
  - type: text
    content: fa rendrika ao anaty onjan-drano.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Tsy any an-danitra avo any ve Andriamanitra?
  - type: text
    content: Igagana ny halaviran’ny kintana ambony indrindra.
  '13':
  - type: text
    content: 'Ka hoy ianao hoe: «Inona no fantatr’Andriamanitra?'
  - type: text
    content: Afa-maninteraka ny raho-mainty ve Izy mba hitsara antsika?
  '14':
  - type: text
    content: Takon’ny raho-matevina Izy ka tsy mahita,
  - type: text
    content: rehefa mandehandeha mitety ny lanitra.»
  '15':
  - type: text
    content: Tianao hizorana ve ny lalam-pahagola
  - type: text
    content: izay falehan’ireo olon-dratsy,
  '16':
  - type: text
    content: dia ireo voailika alohan’ny fotoana
  - type: text
    content: ka lasan’ny riaka hatramin’ny fanorenany?
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Eny, ireo olon-dratsy ireo indrindra
  - type: text
    content: 'no nanao tamin’Andriamanitra hoe: «Mialà aminay!'
  - type: text
    content: Fa afaka ny hanao inona aminay moa ilay Tsitoha?»
  '18':
  - type: text
    content: Kanefa Izy no nampanankarena ny ankohonany.
  - type: text
    content: Ho lavitra ahy anie ny fisainan’ny olon-dratsy
  - type: note
    content: Jereo 21.14-16.
  - type: text
    content: .
  '19':
  - type: text
    content: Ny marina mahita ny fahavoazany ka faly
  - type: text
    content: 'ary ny tsy manan-tsiny mba maneso azy hoe:'
  '2':
  - type: text
    content: Mba mahasoa an’Andriamanitra ve ny olona?
  - type: text
    content: Tsia, fa mahasoa ny tenany izy raha hendry.
  '20':
  - type: text
    content: «Indreo fa ringana ny fahavalontsika!
  - type: text
    content: Efa kilan’ny afo avokoa ny fananany.»
  - type: heading
    content: '*'
  '21':
  - type: text
    content: Ifankazaro sy ihavano re Andriamanitra
  - type: text
    content: dia hiverina aminao ny fahasambarana.
  '22':
  - type: text
    content: Mbola raiso ny fampianarana omeny anao
  - type: text
    content: ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: text
    content: Miverena am-panetren-tena amin’ilay Tsitoha,
  - type: text
    content: ampanalaviro ny lainao ny tsy fahamarinana.
  '24':
  - type: text
    content: Ario amin’ny tany ny vongam-bolamenanao
  - type: text
    content: na avelao eny amin’ny vaton-driaka;
  '25':
  - type: text
    content: fa ilay Tsitoha no ho volamenanao
  - type: text
    content: sy ho volafotsy miavosa ho anao.
  - type: heading
    content: '*'
  '26':
  - type: text
    content: Koa dia hifaly amin’ilay Tsitoha ianao
  - type: text
    content: ary hanandra-tava mitoky amin’Andriamanitra.
  '27':
  - type: text
    content: Raha mivavaka aminy ianao, dia hohenoiny;
  - type: text
    content: 'ary hefainao aminy ny '
  - type: text
    content: voadinao
  - type: text
    content: .
  '28':
  - type: text
    content: Fa ho tanteraka aminao izay kasainao hatao;
  - type: text
    content: ary ny mazava hamiratra eo amin’ny lalanao.
  '29':
  - type: text
    content: Fa Andriamanitra manetry ny miavonavom-pisainana,
  - type: text
    content: nefa kosa mamonjy ny manetry tena.
  '3':
  - type: text
    content: Mampaninona an’ilay Tsitoha moa ny fahamarinanao?
  - type: text
    content: Inona no soa azony na dia mahatoky aza ianao
  - type: note
    content: 'And 2-3: jereo Jôb 35.6-8.'
  - type: text
    content: '?'
  '30':
  - type: text
    content: Satria manafaka na dia ny olo-meloka aza Izy;
  - type: text
    content: eny, ny fahadiovan’ny tananao no hanafaka azy.
  '4':
  - type: text
    content: Ny fanajànao Azy ve no hiarovany anao
  - type: text
    content: sy hiandaniany aminao amin’ny fitsarana?
  '5':
  - type: text
    content: Tsia, satria be loatra ny faharatsianao
  - type: text
    content: ary tsy hita fetra ny helokao.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: Fa naka antoka tsy an-drariny tamin’ny rahalahinao ianao
  - type: text
    content: ka nanendaka ny hany fitafiana teny an-kodiny
  - type: note
    content: Ampit Eks 22.25-26; Deot 24.6,12-13.
  - type: text
    content: .
  '7':
  - type: text
    content: Tsy nanome rano ho an’ny mangetaheta ianao
  - type: text
    content: ary tsy nahafoy mofo kely ho an’ny noana.
  '8':
  - type: text
    content: Fa ny be sandry no navelanao hahazo ny tany
  - type: text
    content: ary ny mpiandranandrana no nekenao hitoetra eo.
  '9':
  - type: text
    content: Noroahinao hitondra tanam-polo ny mpitondratena
  - type: text
    content: ary norobainao ny teo an-tanan’ny kamboty.
