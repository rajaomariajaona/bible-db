document_id: JOB.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tenin’i Elifaza: tena meloka i Jôba'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny i Elifaza avy any Temàna ka nanao tamin’i Jôba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mba mahasoa an’Andriamanitra ve ny olona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa mahasoa ny tenany izy raha hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mampaninona an’ilay Tsitoha moa ny fahamarinanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no soa azony na dia mahatoky aza ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Jôb 35.6-8.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fanajànao Azy ve no hiarovany anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hiandaniany aminao amin’ny fitsarana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsia, satria be loatra ny faharatsianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hita fetra ny helokao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa naka antoka tsy an-drariny tamin’ny rahalahinao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanendaka ny hany fitafiana teny an-kodiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 22.25-26; Deot 24.6,12-13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy nanome rano ho an’ny mangetaheta ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nahafoy mofo kely ho an’ny noana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny be sandry no navelanao hahazo ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mpiandranandrana no nekenao hitoetra eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noroahinao hitondra tanam-polo ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary norobainao ny teo an-tanan’ny kamboty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izany no mahatonga anao ho voahodidim-pandrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho voafahiranon-korohoro tampoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Na hoe rakotry ny haizina ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahita na inona na inona intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa rendrika ao anaty onjan-drano.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy any an-danitra avo any ve Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Igagana ny halaviran’ny kintana ambony indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka hoy ianao hoe: «Inona no fantatr’Andriamanitra?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afa-maninteraka ny raho-mainty ve Izy mba hitsara antsika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Takon’ny raho-matevina Izy ka tsy mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa mandehandeha mitety ny lanitra.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tianao hizorana ve ny lalam-pahagola
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay falehan’ireo olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia ireo voailika alohan’ny fotoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka lasan’ny riaka hatramin’ny fanorenany?
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, ireo olon-dratsy ireo indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no nanao tamin’Andriamanitra hoe: «Mialà aminay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa afaka ny hanao inona aminay moa ilay Tsitoha?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Kanefa Izy no nampanankarena ny ankohonany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavitra ahy anie ny fisainan’ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 21.14-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny marina mahita ny fahavoazany ka faly
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny tsy manan-tsiny mba maneso azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: «Indreo fa ringana ny fahavalontsika!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa kilan’ny afo avokoa ny fananany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ifankazaro sy ihavano re Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiverina aminao ny fahasambarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mbola raiso ny fampianarana omeny anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary alatsaho ao am-ponao ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Miverena am-panetren-tena amin’ilay Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampanalaviro ny lainao ny tsy fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ario amin’ny tany ny vongam-bolamenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na avelao eny amin’ny vaton-driaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: fa ilay Tsitoha no ho volamenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho volafotsy miavosa ho anao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Koa dia hifaly amin’ilay Tsitoha ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanandra-tava mitoky amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha mivavaka aminy ianao, dia hohenoiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hefainao aminy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voadinao
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa ho tanteraka aminao izay kasainao hatao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mazava hamiratra eo amin’ny lalanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa Andriamanitra manetry ny miavonavom-pisainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa kosa mamonjy ny manetry tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Satria manafaka na dia ny olo-meloka aza Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny fahadiovan’ny tananao no hanafaka azy.
