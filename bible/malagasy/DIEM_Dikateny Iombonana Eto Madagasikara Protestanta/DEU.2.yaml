document_id: DEU.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Avy eo niverin-dia kely isika, ka nandeha an-taniefitra nizotra ny lalana mankany amin’ny Ranomasin’ny Volotara
  - type: note
    content: Jereo Nom 21.4.
  - type: text
    content: ', araka izay nolazain’ny TOMPO tamiko; ary naharitra ela ihany isika teny amin’ny manodidina ny tendrombohitra Sehîra.'
  - type: heading
    content: Famakivakiana ny faritry ny Edômita sy ny Môabita ary ny Hamônita
  '10':
  - type: text
    content: Ny mponina tao Môaba fahiny dia ny Emîta, izay firenena lehibe sy maro isa ary olona ranjanana tahaka ny Hanakita
  - type: note
    content: Jereo Nom 13.22 sy nta.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Nisy nihevitra azy ireo ho Refaîta
  - type: note
    content: Ny Refaîta dia mponina tranainy tao Kanahàna (jereo and 20-21).
  - type: text
    content: ', tahaka ny Hanakita; fa ny Môabita no niantso azy hoe Emîta. '
  '12':
  - type: text
    content: Ny faritany Sehîra kosa fahiny dia nonenan’ny Hôrita, saingy ny taranak’i Hesao no nandroaka azy ka nandringana azy tsy ho eo anoloany ary nonina nisolo azy. Toy izany koa no nataon’ny Israelita teo amin’ny tany nomen’ny TOMPO azy ho fananany.
  '13':
  - type: text
    content: «Ankehitriny, miaingà ianareo ka mandehana mita ny lohasahan-driaka Zahareda
  - type: note
    content: I Zahareda dia ranon-driaka ao atsimo atsinanan’ny Ranomasina Maty sady mivarina ao amin’io ranomasina io.
  - type: text
    content: '.» Dia nita ny lohasahan-driaka Zahareda isika. '
  '14':
  - type: text
    content: Naharitra 38 taona ny diantsika niainga hatreo Kadesy-Barnea ka hatramin’ny nitantsika ny lohasahan-driaka Zahareda, izany hoe mandra-pahalany ritra tsy hisy eo an-toby intsony ny mpiantafika rehetra tamin’izany taranaka izany, araka izay efa nianianan’ny TOMPO taminy
  - type: note
    content: Jereo Nom 14.28-35.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ary ny TOMPO mihitsy no namely azy mba handringana azy tsy ho eo amin’ny toby, mandra-pahalany ritra azy.
  '16':
  - type: text
    content: 'Rehefa lany ritra tsy teo anivon’ny vahoaka israelita intsony ny mpiantafika rehetra, '
  '17':
  - type: text
    content: 'dia niteny tamiko ny TOMPO nanao hoe: '
  '18':
  - type: text
    content: '«Izao ianareo no hiampita ny sisintanin’i Môaba ka hamaky ny faritr’i Hara. '
  '19':
  - type: text
    content: Dia ho tonga ao akaikin’ny Hamônita ianareo, kanefa aza mandrafy azy na mila ady aminy; fa tsy hanomezako ho fanananareo ny taniny, satria nomeko ho fananan’ny taranak’i Lôta izany
  - type: note
    content: Jereo and 9 sy nta.
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Dia niteny tamiko ny TOMPO nanao hoe: '
  '20':
  - type: text
    content: '(Nisy nihevitra izany faritany izany ho tanin’ny Refaîta. Fahiny manko dia nonina tao ny Refaîta izay nantsoin’ny Hamônita hoe Zamzomita. '
  '21':
  - type: text
    content: 'Firenena lehibe sy maro isa ary olona ranjanana tahaka ny Hanakita ireo, nefa naringan’ny TOMPO tsy ho eo anoloan’ny Hamônita; dia nandroaka ny Zamzomita ka nonina nisolo azy ny Hamônita. '
  '22':
  - type: text
    content: 'Toy izany koa no nataon’ny TOMPO ho an’ny Edômita taranak’i Hesao, izay nonina tany Sehîra, fa naringany tsy ho eo anoloan’ny Edômita ireo Hôrita; dia nandroaka ny Hôrita ny Edômita ka nonina nisolo azy mandraka androany. '
  '23':
  - type: text
    content: Ny amin’ny Havita izay nonina tamin’ireo tanàna mipaka hatrany Gazà kosa, dia ny Kaftôrita avy tany Kaftôra
  - type: note
    content: 'Gazà: tanàna akaikin’ny morontsiraky ny Ranomasina Mediteranea, amin’iny atsimo andrefan’i Palestinina iny. –Kaftôra: jereo Jer 47.4 sy nta.'
  - type: text
    content: ' no nandringana azy ka nonina nisolo azy.)'
  '24':
  - type: text
    content: 'Avy eo dia hoy ny TOMPO hoe: «Mitsangàna ianareo, miaingà ka mità ny lohasahan-driaka Arnôna. Jereonareo fa hatolotro eo an-tananareo i Sihôna, mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' ao Hesbôna, mbamin’ny taniny. Santaro ny fakàna izany tany izany, ka tafiho i Sihôna! '
  '25':
  - type: text
    content: Manomboka anio, dia hataoko mahazo ny firenena rehetra ambany lanitra ny horohoro sy tahotra anareo; ka vantany vao reny ny lazanareo, dia hangovitra sy hipararetra noho ny aminareo izy.»
  - type: heading
    content: Fakana ny fanjakan’i Sihôna
  '26':
  - type: text
    content: Avy teo an-taniefitra Kedemôta
  - type: note
    content: Io taniefitra io dia eo avaratra andrefan’ny ranon-driaka Arnôna.
  - type: text
    content: ' no nandefasako iraka hankany amin’i Sihôna, mpanjaka tao Hesbôna, ombàn’ny teny fihavanana hoe: '
  '27':
  - type: text
    content: '«Aoka mba hamaky ny taninao izahay; ny lalambe ihany no halehanay ka tsy hivilivily ho amin’ny ankavanana na ho amin’ny ankavia izahay. '
  '28':
  - type: text
    content: 'Hamidinao vola aminay ny hanin-kohaninay; hatakalonao vola aminay ny rano hosotroinay; ary handalo fotsiny mandeha an-tongotra izahay. '
  '29':
  - type: text
    content: Efa navelan’ireo taranak’i Hesao monina any Sehîra sy ireo Môabita monina any Hara hanao toy izany izahay
  - type: note
    content: 'Sehîra: jereo 1.2 sy nta. –Hara: jereo and 9 sy nta.'
  - type: text
    content: '. Handalo fotsiny izahay mandra-pahatonganay eo amin’ny toerana hitànay ny ony Jôrdàna ho any amin’ny tany izay omen’ny TOMPO Andriamanitray anay.» '
  '3':
  - type: text
    content: '«Ampy izay nahateto amin’ny manodidina ity tendrombohitra ity izay, fa mizora mianavaratra ianareo. '
  '30':
  - type: text
    content: 'Tsy nety namela antsika hamaky ny taniny anefa i Sihôna mpanjaka tao Hesbôna; fa ilay TOMPO Andriamanitrareo efa nahatonga azy hidrikina sy ho mafy fo mba hanolorany azy eo an-tananareo, tamin’izany andro izany. '
  '31':
  - type: text
    content: 'Dia niteny tamiko ny TOMPO hoe: «Jereo fa manomboka nanolotra an’i Sihôna sy ny taniny aminareo Aho. Santaro ny fakàna izany tany izany mba hanananareo azy.» '
  '32':
  - type: text
    content: 'Dia niainga i Sihôna mbamin’ny tafiny manontolo hiady amintsika tao Jahatsà, '
  '33':
  - type: text
    content: 'fa natolotry ny TOMPO Andriamanitsika ho eo ambany fahefàntsika ry i Sihôna sy ny zanany lahy mbamin’ny tafiny manontolo ka noresentsika. '
  '34':
  - type: text
    content: 'Ary afatsika tamin’izay ny tanànany rehetra, ka noravantsika tanteraka; naringantsika ny lehilahy mbamin’ny zaza amam-behivavy isan-tanàna ka tsy nasiantsika niangana na iray akory aza. '
  '35':
  - type: text
    content: 'Ny biby fiompiny sy ny fananany, tao amin’ny tanàna izay afatsika ihany, no nobabointsika. '
  '36':
  - type: text
    content: 'Manomboka hatreo Harôhera izay amoron’ny lohasahan-driaka Arnôna sy ilay tanàna hafa anatin’io lohasaha io ihany, ka miafara any Gilehada, dia tsy nisy tanàna tsy afatsika; fa natolotry ny TOMPO Andriamanitsika eo ambany fahefàntsika ny tanàna rehetra. '
  '37':
  - type: text
    content: Kanefa ny tanin’ny Hamônita kosa tsy nakekezintsika, dia ny faritra rehetra manamorona ny lohasahan-driaka Jabôka sy ireo tanàna ao amin’ny havoana, toy ny toerana rehetra nosakanan’ny TOMPO Andriamanitsika tsy hakekezintsika.
  '4':
  - type: text
    content: 'Koa izao no baiko homenao ny vahoaka: ‹Efa tomorinareo ny tanin’ny taranak’i Hesao havanareo izay eo amin’ny faritr’i Sehîra'
  - type: note
    content: 'Taranak’i Hesao: jereo Gen 36.8. –Sehîra: jereo 1.2 sy nta.'
  - type: text
    content: '. Atahorany ianareo; nefa mitandrema tsara '
  '5':
  - type: text
    content: 'mba tsy hila ady aminy, fa tsy hanomezako anareo ny taniny na eram-paladia akory aza, satria efa nomeko ho fananan’ny taranak’i Hesao ny faritra havoanan’i Sehîra. '
  '6':
  - type: text
    content: 'Koa ny sakafonareo hovidinareo vola aminy, ary na dia ny rano hosotroinareo aza.› '
  '7':
  - type: text
    content: 'Eny, Izaho TOMPO Andriamanitrareo efa '
  - type: text
    content: nitahy
  - type: text
    content: ' anareo tamin’izay rehetra nataonareo. Fantatro ny nandehananareo namaky ity taniefitra midadasika ity; satria efapolo taona izay no momba anareo Aho TOMPO Andriamanitrareo, ka tsy nanan-java-mahory ianareo.»'
  '8':
  - type: text
    content: Dia nialantsika ny taranak’i Hesao havantsika mponina any Sehîra; nandalovantsika ny lalana amin’ny lohasaha Harabà, izany hoe ny lalana miakatra avy any Elata sy Hetsiôny-Gebera; ary nivily nihazo ny lalana mankany amin’ny taniefitr’i Môaba isika
  - type: note
    content: 'Io lohasaha io dia ilay mampitohy ny Helodranomasina Akabà sy ny Ranomasina Maty. –Elata, Hetsiôny-Gebera: tanàna eo amin’ny tendron’ny Helodranomasina Akabà. –taniefitr’i Môaba: eo atsinanan’ny faritany Môaba.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Dia hoy ny TOMPO tamiko: «Aza mandrafy ny Môabita ianareo na mila ady aminy fa tsy hanomezako ho fanananareo ny taniny, satria ny faritr’i Hara dia nomeko ho fananan’ny taranak’i Lôta'
  - type: note
    content: I Hara dia tanàna ao Môaba; ka ny hoe faritr’i Hara dia manondro ny faritany Môaba. –Ireo taranak’i Lôta dia ny Môabita sy ny Hamônita; jereo Gen 19.37-38.
  - type: text
    content: .»
