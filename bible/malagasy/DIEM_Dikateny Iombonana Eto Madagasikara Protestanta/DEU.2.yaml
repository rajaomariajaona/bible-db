      children:
      - type: text
        text: '1'
    - type: text
      text: Avy eo niverin-dia kely isika, ka nandeha an-taniefitra nizotra ny lalana mankany amin’ny Ranomasin’ny Volotara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 21.4.
      marker-yv: yv-n
    - type: text
      text: ', araka izay nolazain’ny TOMPO tamiko; ary naharitra ela ihany isika teny amin’ny manodidina ny tendrombohitra Sehîra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famakivakiana ny faritry ny Edômita sy ny Môabita ary ny Hamônita
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny mponina tao Môaba fahiny dia ny Emîta, izay firenena lehibe sy maro isa ary olona ranjanana tahaka ny Hanakita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 13.22 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nisy nihevitra azy ireo ho Refaîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Refaîta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mponina tranainy tao Kanahàna (jereo and 20-21).'
      marker-yv: yv-n
    - type: text
      text: ', tahaka ny Hanakita; fa ny Môabita no niantso azy hoe Emîta. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny faritany Sehîra kosa fahiny dia nonenan’ny Hôrita, saingy ny taranak’i Hesao no nandroaka azy ka nandringana azy tsy ho eo anoloany ary nonina nisolo azy. Toy izany koa no nataon’ny Israelita teo amin’ny tany nomen’ny TOMPO azy ho fananany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: «Ankehitriny, miaingà ianareo ka mandehana mita ny lohasahan-driaka Zahareda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zahareda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ranon-driaka ao atsimo atsinanan’ny Ranomasina Maty sady mivarina ao amin’io ranomasina io.'
      marker-yv: yv-n
    - type: text
      text: '.» Dia nita ny lohasahan-driaka Zahareda isika. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Naharitra 38 taona ny diantsika niainga hatreo Kadesy-Barnea ka hatramin’ny nitantsika ny lohasahan-driaka Zahareda, izany hoe mandra-pahalany ritra tsy hisy eo an-toby intsony ny mpiantafika rehetra tamin’izany taranaka izany, araka izay efa nianianan’ny TOMPO taminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 14.28-35.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ny TOMPO mihitsy no namely azy mba handringana azy tsy ho eo amin’ny toby, mandra-pahalany ritra azy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa lany ritra tsy teo anivon’ny vahoaka israelita intsony ny mpiantafika rehetra, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'dia niteny tamiko ny TOMPO nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Izao ianareo no hiampita ny sisintanin’i Môaba ka hamaky ny faritr’i Hara. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia ho tonga ao akaikin’ny Hamônita ianareo, kanefa aza mandrafy azy na mila ady aminy; fa tsy hanomezako ho fanananareo ny taniny, satria nomeko ho fananan’ny taranak’i Lôta izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo and 9 sy nta.
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niteny tamiko ny TOMPO nanao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '(Nisy nihevitra izany faritany izany ho tanin’ny Refaîta. Fahiny manko dia nonina tao ny Refaîta izay nantsoin’ny Hamônita hoe Zamzomita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Firenena lehibe sy maro isa ary olona ranjanana tahaka ny Hanakita ireo, nefa naringan’ny TOMPO tsy ho eo anoloan’ny Hamônita; dia nandroaka ny Zamzomita ka nonina nisolo azy ny Hamônita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Toy izany koa no nataon’ny TOMPO ho an’ny Edômita taranak’i Hesao, izay nonina tany Sehîra, fa naringany tsy ho eo anoloan’ny Edômita ireo Hôrita; dia nandroaka ny Hôrita ny Edômita ka nonina nisolo azy mandraka androany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny amin’ny Havita izay nonina tamin’ireo tanàna mipaka hatrany Gazà kosa, dia ny Kaftôrita avy tany Kaftôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gazà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna akaikin’ny morontsiraky ny Ranomasina Mediteranea, amin’iny atsimo andrefan’i Palestinina iny. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Kaftôra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Jer 47.4 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' no nandringana azy ka nonina nisolo azy.)'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Avy eo dia hoy ny TOMPO hoe: «Mitsangàna ianareo, miaingà ka mità ny lohasahan-driaka Arnôna. Jereonareo fa hatolotro eo an-tananareo i Sihôna, mpanjaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: amôrita
    - type: text
      text: ' ao Hesbôna, mbamin’ny taniny. Santaro ny fakàna izany tany izany, ka tafiho i Sihôna! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Manomboka anio, dia hataoko mahazo ny firenena rehetra ambany lanitra ny horohoro sy tahotra anareo; ka vantany vao reny ny lazanareo, dia hangovitra sy hipararetra noho ny aminareo izy.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fakana ny fanjakan’i Sihôna
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Avy teo an-taniefitra Kedemôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taniefitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' io dia eo avaratra andrefan’ny ranon-driaka Arnôna.'
      marker-yv: yv-n
    - type: text
      text: ' no nandefasako iraka hankany amin’i Sihôna, mpanjaka tao Hesbôna, ombàn’ny teny fihavanana hoe: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '«Aoka mba hamaky ny taninao izahay; ny lalambe ihany no halehanay ka tsy hivilivily ho amin’ny ankavanana na ho amin’ny ankavia izahay. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hamidinao vola aminay ny hanin-kohaninay; hatakalonao vola aminay ny rano hosotroinay; ary handalo fotsiny mandeha an-tongotra izahay. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Efa navelan’ireo taranak’i Hesao monina any Sehîra sy ireo Môabita monina any Hara hanao toy izany izahay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sehîra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1.2 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hara:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo and 9 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. Handalo fotsiny izahay mandra-pahatonganay eo amin’ny toerana hitànay ny ony Jôrdàna ho any amin’ny tany izay omen’ny TOMPO Andriamanitray anay.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '«Ampy izay nahateto amin’ny manodidina ity tendrombohitra ity izay, fa mizora mianavaratra ianareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Tsy nety namela antsika hamaky ny taniny anefa i Sihôna mpanjaka tao Hesbôna; fa ilay TOMPO Andriamanitrareo efa nahatonga azy hidrikina sy ho mafy fo mba hanolorany azy eo an-tananareo, tamin’izany andro izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia niteny tamiko ny TOMPO hoe: «Jereo fa manomboka nanolotra an’i Sihôna sy ny taniny aminareo Aho. Santaro ny fakàna izany tany izany mba hanananareo azy.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia niainga i Sihôna mbamin’ny tafiny manontolo hiady amintsika tao Jahatsà, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'fa natolotry ny TOMPO Andriamanitsika ho eo ambany fahefàntsika ry i Sihôna sy ny zanany lahy mbamin’ny tafiny manontolo ka noresentsika. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary afatsika tamin’izay ny tanànany rehetra, ka noravantsika tanteraka; naringantsika ny lehilahy mbamin’ny zaza amam-behivavy isan-tanàna ka tsy nasiantsika niangana na iray akory aza. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny biby fiompiny sy ny fananany, tao amin’ny tanàna izay afatsika ihany, no nobabointsika. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Manomboka hatreo Harôhera izay amoron’ny lohasahan-driaka Arnôna sy ilay tanàna hafa anatin’io lohasaha io ihany, ka miafara any Gilehada, dia tsy nisy tanàna tsy afatsika; fa natolotry ny TOMPO Andriamanitsika eo ambany fahefàntsika ny tanàna rehetra. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Kanefa ny tanin’ny Hamônita kosa tsy nakekezintsika, dia ny faritra rehetra manamorona ny lohasahan-driaka Jabôka sy ireo tanàna ao amin’ny havoana, toy ny toerana rehetra nosakanan’ny TOMPO Andriamanitsika tsy hakekezintsika.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa izao no baiko homenao ny vahoaka: ‹Efa tomorinareo ny tanin’ny taranak’i Hesao havanareo izay eo amin’ny faritr’i Sehîra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Taranak’i Hesao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 36.8. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Sehîra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1.2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. Atahorany ianareo; nefa mitandrema tsara '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'mba tsy hila ady aminy, fa tsy hanomezako anareo ny taniny na eram-paladia akory aza, satria efa nomeko ho fananan’ny taranak’i Hesao ny faritra havoanan’i Sehîra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa ny sakafonareo hovidinareo vola aminy, ary na dia ny rano hosotroinareo aza.› '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Eny, Izaho TOMPO Andriamanitrareo efa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitahy
    - type: text
      text: ' anareo tamin’izay rehetra nataonareo. Fantatro ny nandehananareo namaky ity taniefitra midadasika ity; satria efapolo taona izay no momba anareo Aho TOMPO Andriamanitrareo, ka tsy nanan-java-mahory ianareo.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nialantsika ny taranak’i Hesao havantsika mponina any Sehîra; nandalovantsika ny lalana amin’ny lohasaha Harabà, izany hoe ny lalana miakatra avy any Elata sy Hetsiôny-Gebera; ary nivily nihazo ny lalana mankany amin’ny taniefitr’i Môaba isika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lohasaha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' io dia ilay mampitohy ny Helodranomasina Akabà sy ny Ranomasina Maty. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –Elata, Hetsiôny-Gebera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàna eo amin’ny tendron’ny Helodranomasina Akabà. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –taniefitr’i Môaba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': eo atsinanan’ny faritany Môaba.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy ny TOMPO tamiko: «Aza mandrafy ny Môabita ianareo na mila ady aminy fa tsy hanomezako ho fanananareo ny taniny, satria ny faritr’i Hara dia nomeko ho fananan’ny taranak’i Lôta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tanàna ao Môaba; ka ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: faritr’i Hara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manondro ny faritany Môaba. –Ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taranak’i Lôta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ny Môabita sy ny Hamônita; jereo Gen 19.37-38.'
      marker-yv: yv-n
    - type: text
      text: .»
