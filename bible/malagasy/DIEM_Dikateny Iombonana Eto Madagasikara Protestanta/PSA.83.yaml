document_id: PSA.83
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Vavaka handresena ny fahavalon’i Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tononkira. Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra ô, aza mangina Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza mihenahena sy mijanom-potsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indreo misafoaka ny fahavalonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary miandranandrana ny mpankahala Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mikotrika fiokoana hamelezana ny vahoakanao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mifandinika hanohitra ny olona arovanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ireo hoe: «Andeha holevonintsika'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho firenena izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hotsarovana intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anarana hoe Israely.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa niray tetika tokoa ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka nifanaiky hanohitra Anao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia ny Edômita sy ny Jismahelita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny Moâbita sy ny Hagirita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny Gebalita sy ny Hamônita sy ny Hamalekita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Filistinina miaraka amin’ny mponina any Tiro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 7-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edômita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 7) dia mponina ao atsimon’i Palestinina; ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jismahelita sy ny Hagirita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 7) dia foko arabo (jereo Gen 21.9-21; 1 Tan 5.19-20); ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Môabita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 7) sy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hamônita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 8) dia mponin’ireo fanjakana kely anankiroa eo atsinanan’ny Ranomasina Maty sy eo atsinanan’ny ony Jôrdàna; ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hamalekita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mponina mpifindrafindra toeram-ponenana ao amin’ny faritr’i Negeba, ka matetika aroso ho fahavalon’i Israely (Eks 17.8-16) hatramin’ny fahagola; ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Filistinina sy ny mponina any Tiro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manondro ireo olona mipetraka amin’ny morontsirak’i Palestinina.'
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: nikambana taminy koa ny Asirianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hifarimbona amin’ny taranak’i Lôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny taranak’i Lôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ireo Môabita sy Hamônita voateny ao amin’ny an 7 sy 8 (jereo Gen 19.30-38) sady heverina ho fahavalon’i Israely koa hatramin’ny fahagola.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Andriamanitra ô, ataovy tahaka an’i Siserà ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy tahaka an’i Siserà sy i Jabîna
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo amin’ny renirano Kisôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsiahy momba ny zava-nitranga voatantara ao amin’ny Mpits 4.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ataovy tahaka ny Midianita
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: izay naringana tao Haîna-Harôda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Haîna-Harôda: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa izany no rijan-teny mitombina, araka ny Mpits 7.1.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanjary zeziky ny tanimboly;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ataovy tahaka an’i Hôreba sy i Zeeba ny andriandahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tahaka an’i Zebà sy i Tsalmonà ny lehibeny rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 11-12 eto dia mampahatsiaro ny fandresen’i Gidehôna ny Midianita, araka ny Mpits 7–8.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia ireo olona nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Andeha halaina ho antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay fonenan’Andriamanitra.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Andriamanitro ô, ataovy fanina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny vovoka atambolin’ny tadio
- type: usfm
  marker: q1
  children:
  - type: text
    text: na tahaka ny akofa paohin’ny rivotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toy ny afo mandoro ala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny lelafo mandrehitra tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: no anenjeho azy amin’ny tafio-drivotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ampitahory azy amin’ny rambon-danitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Saròny henatra ny tavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitadiavany Anao, TOMPO ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka ho menatra sy ho raiki-tahotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany amin’ny mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hangaihay sy ho ringana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary aoka ho fantany fa Ianao ihany no TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay Avo Indrindra, eto ambonin’ny tany tontolo!
