document_id: PSA.83,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka handresena ny fahavalon’i Israely
  - type: text
    content: ' '
  - type: text
    content: Tononkira. Salamo nataon’i Asafa.
  '10':
  - type: text
    content: Andriamanitra ô, ataovy tahaka an’i Siserà ireo,
  - type: text
    content: ataovy tahaka an’i Siserà sy i Jabîna
  - type: text
    content: teo amin’ny renirano Kisôna
  - type: note
    content: Tsiahy momba ny zava-nitranga voatantara ao amin’ny Mpits 4.
  - type: text
    content: ','
  - type: text
    content: na ataovy tahaka ny Midianita
  '11':
  - type: text
    content: izay naringana tao Haîna-Harôda
  - type: note
    content: 'Haîna-Harôda: toa izany no rijan-teny mitombina, araka ny Mpits 7.1.'
  - type: text
    content: ka nanjary zeziky ny tanimboly;
  '12':
  - type: text
    content: ataovy tahaka an’i Hôreba sy i Zeeba ny andriandahiny
  - type: text
    content: ary tahaka an’i Zebà sy i Tsalmonà ny lehibeny rehetra
  - type: note
    content: Ny and 11-12 eto dia mampahatsiaro ny fandresen’i Gidehôna ny Midianita, araka ny Mpits 7–8.
  - type: text
    content: ','
  '13':
  - type: text
    content: 'dia ireo olona nilaza hoe:'
  - type: text
    content: «Andeha halaina ho antsika
  - type: text
    content: ilay fonenan’Andriamanitra.»
  '14':
  - type: text
    content: Andriamanitro ô, ataovy fanina izy
  - type: text
    content: tahaka ny vovoka atambolin’ny tadio
  - type: text
    content: na tahaka ny akofa paohin’ny rivotra.
  '15':
  - type: text
    content: Toy ny afo mandoro ala,
  - type: text
    content: toy ny lelafo mandrehitra tendrombohitra
  '16':
  - type: text
    content: no anenjeho azy amin’ny tafio-drivotrao
  - type: text
    content: sy ampitahory azy amin’ny rambon-danitrao.
  '17':
  - type: text
    content: Saròny henatra ny tavany
  - type: text
    content: mba hitadiavany Anao, TOMPO ô.
  '18':
  - type: text
    content: Aoka ho menatra sy ho raiki-tahotra izy
  - type: text
    content: hatrany amin’ny mandrakizay
  - type: text
    content: ka hangaihay sy ho ringana!
  '19':
  - type: text
    content: Ary aoka ho fantany fa Ianao ihany no TOMPO,
  - type: text
    content: ilay Avo Indrindra, eto ambonin’ny tany tontolo!
  '2':
  - type: text
    content: Andriamanitra ô, aza mangina Ianao,
  - type: text
    content: aza mihenahena sy mijanom-potsiny.
  '3':
  - type: text
    content: Indreo misafoaka ny fahavalonao
  - type: text
    content: ary miandranandrana ny mpankahala Anao.
  '4':
  - type: text
    content: Mikotrika fiokoana hamelezana ny vahoakanao ireo
  - type: text
    content: ary mifandinika hanohitra ny olona arovanao.
  '5':
  - type: text
    content: 'Hoy ireo hoe: «Andeha holevonintsika'
  - type: text
    content: tsy ho firenena izy;
  - type: text
    content: dia tsy hotsarovana intsony
  - type: text
    content: ny anarana hoe Israely.»
  '6':
  - type: text
    content: Efa niray tetika tokoa ireo
  - type: text
    content: 'ka nifanaiky hanohitra Anao:'
  '7':
  - type: text
    content: dia ny Edômita sy ny Jismahelita,
  - type: text
    content: mbamin’ny Moâbita sy ny Hagirita,
  '8':
  - type: text
    content: ny Gebalita sy ny Hamônita sy ny Hamalekita,
  - type: text
    content: ary ny Filistinina miaraka amin’ny mponina any Tiro
  - type: note
    content: 'And 7-8: ny Edômita (and 7) dia mponina ao atsimon’i Palestinina; ny Jismahelita sy ny Hagirita (and 7) dia foko arabo (jereo Gen 21.9-21; 1 Tan 5.19-20); ny Môabita (and 7) sy ny Hamônita (and 8) dia mponin’ireo fanjakana kely anankiroa eo atsinanan’ny Ranomasina Maty sy eo atsinanan’ny ony Jôrdàna; ny Hamalekita dia mponina mpifindrafindra toeram-ponenana ao amin’ny faritr’i Negeba, ka matetika aroso ho fahavalon’i Israely (Eks 17.8-16) hatramin’ny fahagola; ny Filistinina sy ny mponina any Tiro dia manondro ireo olona mipetraka amin’ny morontsirak’i Palestinina.'
  - type: text
    content: ;
  '9':
  - type: text
    content: nikambana taminy koa ny Asirianina
  - type: text
    content: mba hifarimbona amin’ny taranak’i Lôta
  - type: note
    content: 'ny taranak’i Lôta: dia ireo Môabita sy Hamônita voateny ao amin’ny an 7 sy 8 (jereo Gen 19.30-38) sady heverina ho fahavalon’i Israely koa hatramin’ny fahagola.'
  - type: text
    content: .
  - type: text
    content: Fiatoana
