document_id: ROM.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiainam-baovao anompoana an’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry havana, satria efa nanehoan’Andriamanitra ny hatsaram-pony isika, dia manainga anareo aho, mba samy hanolotra ny tenanareo ho sorona velona, voatokana ho an’Andriamanitra sady ankasitrahany. Izany no fanompoam-pivavahana tokony hataonareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifankatiava toy ny mpiray tampo; miezaha amin’ny fifanajana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mazotoa fa aza malaina. Aoka hafana fo amin’ny fanompoana ny Tompo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifalia amin’ny fanantenana; miareta amin’ny fahoriana, mahareta amin’ny fivavahana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mandraisa anjara amin’ny fanampiana ireo sahirana amin’ny samy vahoakan’Andriamanitra; mazotoa mandray vahiny.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miraria soa an’izay manenjika anareo; miraria soa fa aza manozona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mk 5.44; Lk 6.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaraha mifaly amin’izay mifaly, miaraha mitomany amin’izay mitomany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miraisa hina; aza matimatim-boninahitra fa ny fanetren-tena ankamamiana. Aza manao ny tenanareo ho hendry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 5.21.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mamaly ratsy ny ratsy, na amin’iza na amin’iza. Miezaha hanao ny tsara eo imason’ny olona rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha azo atao, dia ataovy izay hihavananareo amin’ny olona rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mamaly faty, ry hava-malala, fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fahatezeran’Andriamanitra
    - type: text
      text: ' no avelao hiasa, satria izao no voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ': «Ahy ny famaliana, Izaho no hamaly, hoy ny Tompo.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza miray lasitra amin’izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Pt 1.14.
      marker-yv: yv-n
    - type: text
      text: '; fa meteza hovan’Andriamanitra ka hihavao saina tanteraka, mba hahaizanareo mamantatra ny sitrapon’Andriamanitra: dia izay tsara sy ankasitrahiny ary lavorary.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa «raha noana ny fahavalonao, dia omeo hanina; raha mangetaheta, dia omeo rano hosotroiny; fa raha manao izany ianao, dia hanangona vainafo eo an-dohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba ny and 19-20: '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'and 19:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Deot 32.35. –'
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 20:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Ohab 25.21-22, voatsiahy araka ny dkt grika tranainy Septoazinta. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vainafo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' vainafon-kenatra izany; ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hanala vainafo (=vainafom-pahoriana) eo an-dohany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mety ho resin’ny ratsy, fa reseo amin’ny tsara ny ratsy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny tombon-tsoa nomen’Andriamanitra ahy, dia izao lazaiko aminareo tsirairay avy: aza mihevi-tena mihoatra ny tokony hiheverana ny tena, fa aoka samy hihevi-tena amim-pahendrena, araka ny anjara finoana nomen’Andriamanitra azy avy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ao amin’ny vatana iray, dia misy zavatra maro anisan’izany vatana izany kanefa tsy mitovy asa avokoa ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany koa: na maro aza isika, dia vatana iray ihany noho isika tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', ka mifampiankina toy ny ifampiankinan’ireo zavatra anisan’ny vatana iray ihany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana fanomezana samihafa isika, araka ny tombon-tsoa nomen’Andriamanitra antsika. Raha misy manana ny fanomezana hilaza hafatra avy amin’Andriamanitra, dia aoka hanao izany mifanaraka amin’ny finoana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy manana ny fanomezana hanompo, dia aoka hanompo. Ny mpampianatra, aoka hampianatra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpananatra, aoka hananatra. Ny mpizara, aoka hizara amim-pahatsoram-po. Ny mpahafoy harena, aoka hahafoy amin-jotom-po. Ny mpanao asa fiantrana, aoka hanao ny asany an-kafaliana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit ny 4-8 sy 1Kôr 12.4-12.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny fitiavana tsy hisy fihatsarambelatsihy. Mankahalà ny ratsy; mifikira amin’ny tsara. '
