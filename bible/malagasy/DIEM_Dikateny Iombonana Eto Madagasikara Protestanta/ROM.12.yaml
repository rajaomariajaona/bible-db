document_id: ROM.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiainam-baovao anompoana an’Andriamanitra
  - type: text
    content: 'Ry havana, satria efa nanehoan’Andriamanitra ny hatsaram-pony isika, dia manainga anareo aho, mba samy hanolotra ny tenanareo ho sorona velona, voatokana ho an’Andriamanitra sady ankasitrahany. Izany no fanompoam-pivavahana tokony hataonareo. '
  '10':
  - type: text
    content: 'Mifankatiava toy ny mpiray tampo; miezaha amin’ny fifanajana. '
  '11':
  - type: text
    content: 'Mazotoa fa aza malaina. Aoka hafana fo amin’ny fanompoana ny Tompo. '
  '12':
  - type: text
    content: 'Mifalia amin’ny fanantenana; miareta amin’ny fahoriana, mahareta amin’ny fivavahana, '
  '13':
  - type: text
    content: mandraisa anjara amin’ny fanampiana ireo sahirana amin’ny samy vahoakan’Andriamanitra; mazotoa mandray vahiny.
  '14':
  - type: text
    content: Miraria soa an’izay manenjika anareo; miraria soa fa aza manozona
  - type: note
    content: Ampit Mk 5.44; Lk 6.28.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Miaraha mifaly amin’izay mifaly, miaraha mitomany amin’izay mitomany. '
  '16':
  - type: text
    content: Miraisa hina; aza matimatim-boninahitra fa ny fanetren-tena ankamamiana. Aza manao ny tenanareo ho hendry
  - type: note
    content: Ampit Is 5.21.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Aza mamaly ratsy ny ratsy, na amin’iza na amin’iza. Miezaha hanao ny tsara eo imason’ny olona rehetra. '
  '18':
  - type: text
    content: 'Ary raha azo atao, dia ataovy izay hihavananareo amin’ny olona rehetra. '
  '19':
  - type: text
    content: 'Aza mamaly faty, ry hava-malala, fa ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' no avelao hiasa, satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Ahy ny famaliana, Izaho no hamaly, hoy ny Tompo.» '
  '2':
  - type: text
    content: Aza miray lasitra amin’izao tontolo izao
  - type: note
    content: Ampit 1Pt 1.14.
  - type: text
    content: '; fa meteza hovan’Andriamanitra ka hihavao saina tanteraka, mba hahaizanareo mamantatra ny sitrapon’Andriamanitra: dia izay tsara sy ankasitrahiny ary lavorary.'
  '20':
  - type: text
    content: Fa «raha noana ny fahavalonao, dia omeo hanina; raha mangetaheta, dia omeo rano hosotroiny; fa raha manao izany ianao, dia hanangona vainafo eo an-dohany
  - type: note
    content: 'Momba ny and 19-20: and 19: Deot 32.35. –And 20: Ohab 25.21-22, voatsiahy araka ny dkt grika tranainy Septoazinta. vainafo: vainafon-kenatra izany; ny RM kosa manao hoe hanala vainafo (=vainafom-pahoriana) eo an-dohany.'
  - type: text
    content: '.» '
  '21':
  - type: text
    content: Aza mety ho resin’ny ratsy, fa reseo amin’ny tsara ny ratsy.
  '3':
  - type: text
    content: 'Noho ny tombon-tsoa nomen’Andriamanitra ahy, dia izao lazaiko aminareo tsirairay avy: aza mihevi-tena mihoatra ny tokony hiheverana ny tena, fa aoka samy hihevi-tena amim-pahendrena, araka ny anjara finoana nomen’Andriamanitra azy avy. '
  '4':
  - type: text
    content: 'Eny, ao amin’ny vatana iray, dia misy zavatra maro anisan’izany vatana izany kanefa tsy mitovy asa avokoa ireo. '
  '5':
  - type: text
    content: 'Dia toy izany koa: na maro aza isika, dia vatana iray ihany noho isika tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ', ka mifampiankina toy ny ifampiankinan’ireo zavatra anisan’ny vatana iray ihany. '
  '6':
  - type: text
    content: 'Manana fanomezana samihafa isika, araka ny tombon-tsoa nomen’Andriamanitra antsika. Raha misy manana ny fanomezana hilaza hafatra avy amin’Andriamanitra, dia aoka hanao izany mifanaraka amin’ny finoana. '
  '7':
  - type: text
    content: 'Raha misy manana ny fanomezana hanompo, dia aoka hanompo. Ny mpampianatra, aoka hampianatra. '
  '8':
  - type: text
    content: Ny mpananatra, aoka hananatra. Ny mpizara, aoka hizara amim-pahatsoram-po. Ny mpahafoy harena, aoka hahafoy amin-jotom-po. Ny mpanao asa fiantrana, aoka hanao ny asany an-kafaliana
  - type: note
    content: Ampit ny 4-8 sy 1Kôr 12.4-12.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Aoka ny fitiavana tsy hisy fihatsarambelatsihy. Mankahalà ny ratsy; mifikira amin’ny tsara. '
