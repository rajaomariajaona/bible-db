    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia ny ranomasimbe aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahafaty ny afon’ny fitiavana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ranoben’ireo ony
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahasarona azy ho rendrika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia misy aza olona hanome
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fananany rehetra ao an-tranony
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hividianana ny fitiavana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho afa-baràka fotsiny izy.
