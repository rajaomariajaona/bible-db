  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataovy eo ambonin’ny fonao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'toy ny '
  - type: usfm
