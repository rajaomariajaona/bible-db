  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo ambanin’ny hazo paoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: no amohazako anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa toerana nahatorontoronina anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy toerana niterahan-dreninao anao.
- type: usfm
  marker: q1
  children:
