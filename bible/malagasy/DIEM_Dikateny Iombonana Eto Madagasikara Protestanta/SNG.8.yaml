    text: ary tazony eo an-tsandrinao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny vato voasokitra ho anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahery toy ny fahafatesana ny fitiavana,
- type: usfm
  marker: q1
  children:
  - type: text
