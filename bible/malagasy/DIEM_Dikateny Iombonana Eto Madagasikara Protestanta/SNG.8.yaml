document_id: SNG.8,396
type_code: plt
verses:
  '1':
  - type: text
    content: Raha mba no anadahiko moa ianao,
  - type: text
    content: ka ninono tamin’ny nonon’i neny!
  - type: text
    content: Ho afaka manoroka anao aho,
  - type: text
    content: rehefa tojo anao eny ivelany eny,
  - type: text
    content: ary tsy hisy sahy hanakiana ahy.
  '10':
  - type: text
    content: Manda fiarovana aho;
  - type: text
    content: ireo nonoko no toa tilikambo.
  - type: text
    content: Eo imason’ny malalako aho
  - type: text
    content: dia ilay hampiadam-pinaritra azy.
  - type: heading
    content: (Ralehilahy)
  '11':
  - type: text
    content: Manan-tanimboaloboka iray
  - type: text
    content: ao Bahala-Hamôna
  - type: note
    content: 'Bahala-Hamôna: toerana tsy fantatra.'
  - type: text
    content: ' i Salômôna;'
  - type: text
    content: nahofany tamin’ny mpiandry voly izany
  - type: text
    content: ka sekela volafotsy arivo no sandany.
  '12':
  - type: text
    content: Masi-mandidy amin’ny ahy aho,
  - type: text
    content: dia ny tanimboaloboko izany;
  - type: text
    content: ny sekela arivo kosa no anao, ry Salômôna,
  - type: text
    content: ary ny sekela roanjato ho an’ireo mpiandry voly.
  '13':
  - type: text
    content: Ry ilay tsaratarehiko
  - type: text
    content: izay mitoetra ao an-jaridaina,
  - type: text
    content: misy namako te hihaino ny feonao;
  - type: text
    content: kanefa dia izaho ihany
  - type: text
    content: 'no ampandreneso anao miteny hoe:'
  '14':
  - type: text
    content: «Mandosira, ry malalako;
  - type: text
    content: ary aoka ianao ho mailamailaka
  - type: text
    content: toy ny gazela na ny diera tanora
  - type: text
    content: no manketỳ Ambohimanitra
  - type: note
    content: 'Ambohimanitra na hoe an-tendrombohitry ny zava-manitra: enti-milaza ny tenan’ny ampakarina izany. Jereo 2.17 sy nta.'
  - type: text
    content: .»
  '2':
  - type: text
    content: Hoentiko any an-tranon’i Neny ianao
  - type: text
    content: mba hampianatra ahy ny fitiavana;
  - type: text
    content: dia divay nolaroina zava-manitra
  - type: text
    content: sy ranon’ampongabendanitro
  - type: text
    content: no hampisotroiko anao.
  '3':
  - type: text
    content: Manondana ahy ny sandriny ankavia
  - type: text
    content: ary mamihina ahy ny sandriny ankavanana.
  '4':
  - type: text
    content: «Ry tovovavin’i Jerosalema ô,
  - type: text
    content: 'miangavy mafy anareo aho hoe:'
  - type: text
    content: Aza tairina na fohazina ilay tiako
  - type: note
    content: Jereo 2.7 sy nta.
  - type: text
    content: raha tsy efa sitrapony!»
  - type: heading
    content: (Ireo tovovavy)
  '5':
  - type: text
    content: Iza moa irỳ miakatra avy any an-taniefitra
  - type: text
    content: mitehina amin’ny malalany?
  - type: heading
    content: Ny herin’ny fitiavana
  - type: heading
    content: (Ravehivavy)
  - type: text
    content: Eo ambanin’ny hazo paoma
  - type: text
    content: no amohazako anao,
  - type: text
    content: fa toerana nahatorontoronina anao
  - type: text
    content: sy toerana niterahan-dreninao anao.
  '6':
  - type: text
    content: Ataovy eo ambonin’ny fonao aho
  - type: text
    content: 'toy ny '
  - type: text
    content: tombokasenao
  - type: text
    content: ' manokana;'
  - type: text
    content: ary tazony eo an-tsandrinao aho
  - type: text
    content: toy ny vato voasokitra ho anao.
  - type: text
    content: Fa mahery toy ny fahafatesana ny fitiavana,
  - type: text
    content: tsy mifaditrovana toy ny toeran’ny maty
  - type: text
    content: ny fitiavana mirehidrehitra.
  - type: text
    content: Lelafo miredareda tokoa izy
  - type: text
    content: ary mahery vaika toy ny varatra
  - type: note
    content: ny varatra na hoe ny lelafon’ny Tompo.
  - type: text
    content: .
  '7':
  - type: text
    content: Na dia ny ranomasimbe aza
  - type: text
    content: tsy mahafaty ny afon’ny fitiavana;
  - type: text
    content: ary ny ranoben’ireo ony
  - type: text
    content: tsy mahasarona azy ho rendrika.
  - type: text
    content: Na dia misy aza olona hanome
  - type: text
    content: ny fananany rehetra ao an-tranony
  - type: text
    content: mba hividianana ny fitiavana,
  - type: text
    content: dia ho afa-baràka fotsiny izy.
  - type: heading
    content: (Ireo anadahin-dravehivavy)
  '8':
  - type: text
    content: Manana anabavy iray izahay,
  - type: text
    content: saingy mbola kely tsy misy nono izy.
  - type: text
    content: Hataonay ahoana ny anabavinay,
  - type: text
    content: raha tonga ny andro hangatahana azy?
  '9':
  - type: text
    content: Raha no manda fiarovana izy,
  - type: text
    content: dia tilikambo volafotsy
  - type: text
    content: no hatsanganay eo an-tampony;
  - type: text
    content: Fa raha no varavara-mivoha izy,
  - type: text
    content: dia bara hazofisaka sedera no hanidianay azy.
  - type: heading
    content: (Ravehivavy)
