    - type: text
      text: '1'
  - type: text
    text: Raha mba no anadahiko moa ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ninono tamin’ny nonon’i neny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho afaka manoroka anao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa tojo anao eny ivelany eny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hisy sahy hanakiana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hoentiko any an-tranon’i Neny ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampianatra ahy ny fitiavana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia divay nolaroina zava-manitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ranon’ampongabendanitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampisotroiko anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manondana ahy ny sandriny ankavia
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamihina ahy ny sandriny ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
