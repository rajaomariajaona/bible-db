    marker-yv: yv-n
  - type: text
    text: ' i Salômôna;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahofany tamin’ny mpiandry voly izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka sekela volafotsy arivo no sandany.
- type: usfm
