    - type: text
      text: '11'
  - type: text
    text: Manan-tanimboaloboka iray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao Bahala-Hamôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bahala-Hamôna: '
