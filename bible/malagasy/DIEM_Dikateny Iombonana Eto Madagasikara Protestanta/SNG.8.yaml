    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa irỳ miakatra avy any an-taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitehina amin’ny malalany?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny herin’ny fitiavana
  marker-yv: yv-h
