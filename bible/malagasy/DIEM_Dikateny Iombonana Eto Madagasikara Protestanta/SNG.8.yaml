  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Ry tovovavin’i Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'miangavy mafy anareo aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza tairina na fohazina ilay tiako
  - type: usfm
    marker: f
    children:
