    text: Manda fiarovana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo nonoko no toa tilikambo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo imason’ny malalako aho
- type: usfm
  marker: q1
  children:
  - type: text
