  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Masi-mandidy amin’ny ahy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny tanimboaloboko izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sekela arivo kosa no anao, ry Salômôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny sekela roanjato ho an’ireo mpiandry voly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ry ilay tsaratarehiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitoetra ao an-jaridaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy namako te hihaino ny feonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa dia izaho ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no ampandreneso anao miteny hoe:'
