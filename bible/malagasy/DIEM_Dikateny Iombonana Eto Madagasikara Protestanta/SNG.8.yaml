    - type: text
      text: '8'
  - type: text
    text: Manana anabavy iray izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy mbola kely tsy misy nono izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataonay ahoana ny anabavinay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tonga ny andro hangatahana azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha no manda fiarovana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tilikambo volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hatsanganay eo an-tampony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha no varavara-mivoha izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia bara hazofisaka sedera no hanidianay azy.
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
