    - type: text
      text: 'Mbola nanopy maso indray aho, ka indreo hitako nisy kalesy efatra nipoitra avy teo anelanelan’ny tendrombohitra varahina roa. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raiso ny fanomezana entin’i Helday sy i Tôbià ary Jedahià, ka mankanesa izao anio izao any an-tranon’i Jôsià zanakalahin’i Tsefanià, ilay novantanin’izy telo lahy raha vao tonga avy tany Babilôna izy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary hakànao volafotsy sy volamena izany, dia hanaovanao satroboninahitra ka hapetrakao eo an-dohan’i Josoa mpisorombe zanakalahin’i Jôtsadaky; '
