document_id: ZEC.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahavalo: ny kalesy efatra'
  - type: text
    content: 'Mbola nanopy maso indray aho, ka indreo hitako nisy kalesy efatra nipoitra avy teo anelanelan’ny tendrombohitra varahina roa. '
  '10':
  - type: text
    content: '–Raiso ny fanomezana entin’i Helday sy i Tôbià ary Jedahià, ka mankanesa izao anio izao any an-tranon’i Jôsià zanakalahin’i Tsefanià, ilay novantanin’izy telo lahy raha vao tonga avy tany Babilôna izy. '
  '11':
  - type: text
    content: 'Ary hakànao volafotsy sy volamena izany, dia hanaovanao satroboninahitra ka hapetrakao eo an-dohan’i Josoa mpisorombe zanakalahin’i Jôtsadaky; '
  '12':
  - type: text
    content: 'avy eo izy dia hitenenanao hoe:'
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: Indro misy lehilahy atao hoe Itsimoka
  - type: note
    content: Jereo 3.8 sy ny nta. Itsimoka dia enti-manondro an’i Zerobabela; ilay mpisorona ao amin’ny 6.13 kosa dia i Josoa.
  - type: text
    content: ;
  - type: text
    content: fa hitsimoham-piainana izay lalovany,
  - type: text
    content: sady izy no hanorina indray ny tempoliko;
  '13':
  - type: text
    content: eny, izy no hanorina indray ny tempoliko.
  - type: text
    content: Ary hisalotra ny fanamiana maha mpanjaka izy,
  - type: text
    content: ka eo amin’ny sezafiandrianany
  - type: text
    content: no hipetrahany hanapaka ny vahoaka.
  - type: text
    content: Eo ankavanan’io lehilahy io kosa
  - type: text
    content: dia hisy mpisorona anankiray,
  - type: text
    content: izay eo amin’ny sezafiandrianany manokana;
  - type: text
    content: ka fisainana mifanaraka tsara
  - type: text
    content: no hisy amin’izy roalahy ireo.»
  '14':
  - type: text
    content: Ary hijanona eo amin’ny tempolin’ny TOMPO ilay satroboninahitra ho fampahatsiarovana an’i Helday
  - type: note
    content: 'Helday: araka ny and 9; ny RM kosa dia manao hoe Helema.'
  - type: text
    content: sy i Tôbià ary i Jedahià, ary koa ho fampahatsiarovana ny fahalalaham-pon’ilay zanakalahin’i Tsefanià.
  '15':
  - type: text
    content: Hisy koa olona avy lavitra ho tonga hanampy amin’ny fanamboarana ny tempolin’ny TOMPO. Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo. Ho tonga izany, raha mankatò ny TOMPO Andriamanitrareo ianareo.
  '2':
  - type: text
    content: 'Soavaly mena no tamin’ny kalesy voalohany; soavaly mainty no tamin’ny faharoa; '
  '3':
  - type: text
    content: 'soavaly fotsy no tamin’ny fahatelo; ary soavaly sadamena no tamin’ny kalesy fahefatra. '
  '4':
  - type: text
    content: 'Dia nanontaniako ilay '
  - type: text
    content: anjely
  - type: text
    content: ' niresaka tamiko hoe:'
  - type: text
    content: –Inona moa no dikan’ireo kalesy ireo, tompoko?
  '5':
  - type: text
    content: 'Dia hoy izy namaly ahy:'
  - type: text
    content: –Ireo kalesy efatra ireo dia hiroso ho any amin’ny vazan-tany efatra rehefa avy niseho teo anatrehan’ilay Tompon’ny tany tontolo.
  '6':
  - type: text
    content: Niroso nankamin’ny faritany avaratra ny kalesy tarihin’ireo soavaly mainty; niroso nankamin’ny faritany andrefana ireo soavaly fotsy
  - type: note
    content: 'ny faritany avaratra: jereo 2.10 sy nta. Ireo Israelita voasesitany tany Babilôna any Mezôpôtamia no mety ho tian’izany fomba teny izany holazaina (jereo and 8 sy nta). –niroso... andrefana ireo soavaly fotsy: dkt hafa manaraka kosa.'
  - type: text
    content: ' ary niroso nankamin’ny faritany atsimo ireo soavaly sada. '
  '7':
  - type: text
    content: Ireo soavaly manja
  - type: note
    content: Azo eritreretina fa ireto soavaly manja ireto no misolo ireo soavaly mena amin’ny and 2.
  - type: text
    content: ' koa niroso amin’ny lalany; fa samy maimay izy rehetra ireo handeha hitety ny tany.'
  - type: text
    content: 'Dia hoy ny TOMPO taminy:'
  - type: text
    content: –Mandehana mitety ny tany ianareo.
  - type: text
    content: 'Ka dia lasa nitety ny tany ireto kalesy ireto. '
  '8':
  - type: text
    content: 'Fa niantso ahy ny Tompo ka nanao tamiko hoe:'
  - type: text
    content: –Jereo fa ireo niroso nankamin’ny faritany avaratra dia hampidina ny Fanahiko
  - type: note
    content: Ny teny nadika hoe Fanahiko dia mety midika koa hoe fahatezerako; noho izany, na Andriamanitra amin’ny alalan’ny Fanahiny, hampirisika ireo voasesitany handefa fanomezana na hiverina hanao indray ny tempoly* (and 10,15) na koa Izy haneho ny fahatezerany amin’ny Babilônianina, dia azo andraisana ity andalana ity.
  - type: text
    content: ' amin’io faritany io.'
  - type: heading
    content: Fampisatroham-boninahitra an’i Josoa
  '9':
  - type: text
    content: 'Ary nisy baikon’ny TOMPO tamiko nanao hoe:'
