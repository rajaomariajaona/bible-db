  - type: usfm
    marker: p
    children:
    - type: text
      text: Hisy koa olona avy lavitra ho tonga hanampy amin’ny fanamboarana ny tempolin’ny TOMPO. Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo. Ho tonga izany, raha mankatò ny TOMPO Andriamanitrareo ianareo.
