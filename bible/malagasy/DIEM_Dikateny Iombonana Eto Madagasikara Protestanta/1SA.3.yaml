document_id: 1SA.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa i Samoela kely kosa nanompo ny TOMPO teo ambany fitantanan’i Helỳ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Atsangan’Andriamanitra ho mpaminany i Samoela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fotoana izany, dia efa nahalana ny fitenenan’ny TOMPO mivantana tamin’olona ary efa vitsy koa ny fahitana avy aminy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary avy ny TOMPO, dia nitsangana teo, ka niantso toy ny fanaony hoe: «Ry Samoela, ry Samoela!» Dia hoy izy namaly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitenena fa mihaino ny mpanomponao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy ny TOMPO tamin’i Samoela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro hanao zavatra amin’i Israely Aho, dia zavatra hampangirintsina ny sofin’izay rehetra mandre azy. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hampihariko amin’i Helỳ sy ny taranany amin’izany andro izany ny loza rehetra, efa nambarako hamelezana azy; eny, hampihariko hatramin’ny voalohany ka hatramin’ny farany izany. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Efa nampitandrina azy Aho manko fa hohelohiko mandrakizay ny fianakaviany noho ny fahotan-janany izay fantany tsara nefa tsy mba nosakanany. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa izany no nianianako tamin’ny fianakavian’i Helỳ fa tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' na fanatitra hahafa-pahotana azy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nandry mandra-maraina i Samoela; ary novohany avy eo ireo varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ', nefa dia natahotra ny hilaza amin’i Helỳ ny fahitàny i Samoela; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'kanjo niantso azy i Helỳ ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Samoela zanako ô!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Samoela namaly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana izay, tompoko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Helỳ nanontany hoe:'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: –Ahoana, hoy ny TOMPO taminao? Aza misy afeninao ahy. Fa raha misy afeninao ahy na dia teny iray fotsiny amin’izay nambarany taminao aza ianao, dia hosazîn’Andriamanitra mafy tokoa anie ianao!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia notaterin’i Samoela tamin’i Helỳ avokoa tsy nisy nafenina azy ny zava-drehetra. Ka hoy i Helỳ hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izy no TOMPO, hataony anie izay heveriny fa tsara!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nihalehibe i Samoela sady nomba azy ny TOMPO; ka tsy nisy tsy tanteraka izay teny rehetra nasainy nambaran’i Samoela. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Indray alina dia natory teo amin’ny toerana nahazatra azy i Helỳ izay efa akaiky ho jamba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izany no nahafantaran’i Israely manontolo, manomboka any Dana ka mipaka any Beera-Seba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'manomboka... Beera-Seba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mpits 20.1.
      marker-yv: yv-n
    - type: text
      text: ', fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanin
    - type: text
      text: '’ny TOMPO i Samoela. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia mbola niseho hatrany ny TOMPO tao Silao; satria tao no fisehoan’ny TOMPO mivantana tamin’i Samoela mba hampahafantatra azy ny teniny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I Samoela koa mba natory tao an-tranon’ny TOMPO, tao amin’izay nisy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: '. Nony hadiva haraina ny andro, raha mbola nirehitra ny jiro tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'teo anilan’ny Vatamasina:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny Eks 25.22 dia avy eo ambonin’ny Vatamasina no itenenan’Andriamanitra amin’ireo olona ao anatin’ny Toeramasina. –Ny amin’ilay '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: jiron’ny Toeramasina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (mirehitra mandritra ny alina), dia jereo Eks 27.20-21.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia niantso an’i Samoela ny TOMPO, ary izy namaly hoe: «Inty aho, tompoko»; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'avy teo dia nihazakazaka nankany amin’i Helỳ i Samoela ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Niantso ahy ianao, koa intỳ aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Helỳ hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy niantso anao aho, fa ’ndeha miverina matory.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa niverina natory i Samoela. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Niantso azy fanindroany ny TOMPO hoe: «Ry Samoela!» Dia nitsangana i Samoela ka nankany amin’i Helỳ ary niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Niantso ahy ianao, koa intỳ aho!
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy niantso anao aho, anaka, fa miverena matory.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary i Samoela tsy mbola nahalala ny TOMPO, satria tsy mbola nitenenany mivantana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Niantso fanintelony an’i Samoela ny TOMPO, koa dia nitsangana indray izy nankany amin’i Helỳ ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Niantso ahy ianao, koa intỳ aho!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay vao fantatr’i Helỳ fa ny TOMPO no niantso ny zaza. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–’Ndeha miverina matory; fa raha toa mbola misy miantso anao, dia valio hoe: «Mitenena, TOMPO ô, fa mihaino ny mpanomponao!» Dia lasa natory teo amin’ny fatoriany indray i Samoela.'
