document_id: 1SA.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fa i Samoela kely kosa nanompo ny TOMPO teo ambany fitantanan’i Helỳ.
  - type: heading
    content: Atsangan’Andriamanitra ho mpaminany i Samoela
  - type: text
    content: Tamin’izany fotoana izany, dia efa nahalana ny fitenenan’ny TOMPO mivantana tamin’olona ary efa vitsy koa ny fahitana avy aminy.
  '10':
  - type: text
    content: 'Ary avy ny TOMPO, dia nitsangana teo, ka niantso toy ny fanaony hoe: «Ry Samoela, ry Samoela!» Dia hoy izy namaly:'
  - type: text
    content: –Mitenena fa mihaino ny mpanomponao.
  '11':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Samoela:'
  - type: text
    content: '–Indro hanao zavatra amin’i Israely Aho, dia zavatra hampangirintsina ny sofin’izay rehetra mandre azy. '
  '12':
  - type: text
    content: 'Hampihariko amin’i Helỳ sy ny taranany amin’izany andro izany ny loza rehetra, efa nambarako hamelezana azy; eny, hampihariko hatramin’ny voalohany ka hatramin’ny farany izany. '
  '13':
  - type: text
    content: 'Efa nampitandrina azy Aho manko fa hohelohiko mandrakizay ny fianakaviany noho ny fahotan-janany izay fantany tsara nefa tsy mba nosakanany. '
  '14':
  - type: text
    content: 'Koa izany no nianianako tamin’ny fianakavian’i Helỳ fa tsy misy '
  - type: text
    content: sorona
  - type: text
    content: ' na fanatitra hahafa-pahotana azy.'
  '15':
  - type: text
    content: 'Dia nandry mandra-maraina i Samoela; ary novohany avy eo ireo varavaran’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', nefa dia natahotra ny hilaza amin’i Helỳ ny fahitàny i Samoela; '
  '16':
  - type: text
    content: 'kanjo niantso azy i Helỳ ary nanao taminy hoe:'
  - type: text
    content: –Samoela zanako ô!
  - type: text
    content: 'Dia hoy i Samoela namaly:'
  - type: text
    content: –Ahoana izay, tompoko?
  - type: text
    content: 'Ary i Helỳ nanontany hoe:'
  '17':
  - type: text
    content: –Ahoana, hoy ny TOMPO taminao? Aza misy afeninao ahy. Fa raha misy afeninao ahy na dia teny iray fotsiny amin’izay nambarany taminao aza ianao, dia hosazîn’Andriamanitra mafy tokoa anie ianao!
  '18':
  - type: text
    content: 'Dia notaterin’i Samoela tamin’i Helỳ avokoa tsy nisy nafenina azy ny zava-drehetra. Ka hoy i Helỳ hoe:'
  - type: text
    content: –Izy no TOMPO, hataony anie izay heveriny fa tsara!
  '19':
  - type: text
    content: 'Ary nihalehibe i Samoela sady nomba azy ny TOMPO; ka tsy nisy tsy tanteraka izay teny rehetra nasainy nambaran’i Samoela. '
  '2':
  - type: text
    content: 'Indray alina dia natory teo amin’ny toerana nahazatra azy i Helỳ izay efa akaiky ho jamba. '
  '20':
  - type: text
    content: Izany no nahafantaran’i Israely manontolo, manomboka any Dana ka mipaka any Beera-Seba
  - type: note
    content: 'manomboka... Beera-Seba: jereo Mpits 20.1.'
  - type: text
    content: ', fa '
  - type: text
    content: mpaminanin
  - type: text
    content: '’ny TOMPO i Samoela. '
  '21':
  - type: text
    content: Dia mbola niseho hatrany ny TOMPO tao Silao; satria tao no fisehoan’ny TOMPO mivantana tamin’i Samoela mba hampahafantatra azy ny teniny.
  '3':
  - type: text
    content: 'I Samoela koa mba natory tao an-tranon’ny TOMPO, tao amin’izay nisy ny '
  - type: text
    content: Vatamasina
  - type: text
    content: '. Nony hadiva haraina ny andro, raha mbola nirehitra ny jiro tao amin’ny '
  - type: text
    content: Toeramasin’ny TOMPO
  - type: note
    content: 'teo anilan’ny Vatamasina: araka ny Eks 25.22 dia avy eo ambonin’ny Vatamasina no itenenan’Andriamanitra amin’ireo olona ao anatin’ny Toeramasina. –Ny amin’ilay jiron’ny Toeramasina (mirehitra mandritra ny alina), dia jereo Eks 27.20-21.'
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'dia niantso an’i Samoela ny TOMPO, ary izy namaly hoe: «Inty aho, tompoko»; '
  '5':
  - type: text
    content: 'avy teo dia nihazakazaka nankany amin’i Helỳ i Samoela ka nanao taminy hoe:'
  - type: text
    content: –Niantso ahy ianao, koa intỳ aho!
  - type: text
    content: 'Fa hoy i Helỳ hoe:'
  - type: text
    content: –Tsy niantso anao aho, fa ’ndeha miverina matory.
  - type: text
    content: 'Dia lasa niverina natory i Samoela. '
  '6':
  - type: text
    content: 'Niantso azy fanindroany ny TOMPO hoe: «Ry Samoela!» Dia nitsangana i Samoela ka nankany amin’i Helỳ ary niteny taminy hoe:'
  - type: text
    content: –Niantso ahy ianao, koa intỳ aho!
  - type: text
    content: –Tsy niantso anao aho, anaka, fa miverena matory.
  '7':
  - type: text
    content: Ary i Samoela tsy mbola nahalala ny TOMPO, satria tsy mbola nitenenany mivantana.
  '8':
  - type: text
    content: 'Niantso fanintelony an’i Samoela ny TOMPO, koa dia nitsangana indray izy nankany amin’i Helỳ ka nanao taminy hoe:'
  - type: text
    content: –Niantso ahy ianao, koa intỳ aho!
  - type: text
    content: 'Izay vao fantatr’i Helỳ fa ny TOMPO no niantso ny zaza. '
  '9':
  - type: text
    content: 'Ary hoy izy taminy:'
  - type: text
    content: '–’Ndeha miverina matory; fa raha toa mbola misy miantso anao, dia valio hoe: «Mitenena, TOMPO ô, fa mihaino ny mpanomponao!» Dia lasa natory teo amin’ny fatoriany indray i Samoela.'
