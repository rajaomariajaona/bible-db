segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nisaraka akory Andriamanitra sy ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no fanontaniana ataon’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Aiza izay taratasy fisaoram-bady manaporofo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa noroahiko i Jerosalema reninareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa iza no nivarotako anareo ho andevo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'taratasy fisaoram-bady: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 24.1-4; Mt 19.7. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nivarotako... andevo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hanefana trosa: jereo Eks 21.7; 2 Mp 4.1; Ne 5.5; Mt 18.25.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho fanefana ny trosako aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro ny helokareo ihany no nivarotana anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fikomianareo ihany no nandroahana an-dreninareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana, fony tonga Aho, no tsy nahita olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nahoana, fony niantso Aho, no tsy nisy namaly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tanako ve no fohy loatra ka tsy mahavonjy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa Izaho no tsy manan-kery hoenti-manafaka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro mandrahona fotsiny Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia maina ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: na manjary taniefitra ny ony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izay, noho ny tsy fisian’ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia matin-ketaheta ny trondro ka maimbo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Azoko atao ihany koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mandrakotra mainty ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mampitafy azy lamba fisaonana.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ilay Mpanompon’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: (tononkira fahatelo)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny Tompo ANDRIANANAHARY no nampianatra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tokony holazaiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahaizako mamoaka teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampahery ny reraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isa-maraina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manabe ahy hatrany hihaino
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'araka izay tokony hataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny Tompo ANDRIANANAHARY no nanokatra ny sofiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy manohitra Azy aho ary tsy mihemotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lamosiko atolotro amin’ireo mpikapoka ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny takolako amin’ireo mpanongo-bolom-bava.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tavako tsy nafeniko ho difin’ny fanevatevana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fandrorana natao tamiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 26.67; Mk 14.65.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny Tompo ANDRIANANAHARY no hamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsy resin’ny fanevatevana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nohamafisiko ho toy ny afovato ny tavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria fantatro fa tsy ho menatra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eo akaikiko ny TOMPO, Ilay mpanamarina ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hiady amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika hiara-miseho
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’ny mpitsara!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no ho mpanohitra ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy hanatona hifanatrika amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eny, ny Tompo ANDRIANANAHARY no hamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka iza no hanameloka ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 8.33-34.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro izy rehetra mpanohitra ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hihasimba toy ny lamba mihatonta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny lamba lanin’ny kalalao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Henoy ilay Mpanompon’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza aminareo no manaja ny TOMPO?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy hihaino ny feon’ny mpanompony!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha misy mandeha amin’ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ahitam-pahazavana mihitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka izy hitoky sy hiankina
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny TOMPO Andriamaniny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny aminareo rehetra izay mandrehitra afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy mirongo zana-tsipîka mandoro, dia izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny afo natsanganareo ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny zana-tsipîka narehitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anjara omanin’ny TOMPO ho anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho faty amin’ny fahoriana mafy ianareo.
