document_id: ISA.50,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy nisaraka akory Andriamanitra sy ny vahoakany
  - type: text
    content: 'Izao no fanontaniana ataon’ny TOMPO:'
  - type: text
    content: «Aiza izay taratasy fisaoram-bady manaporofo
  - type: text
    content: fa noroahiko i Jerosalema reninareo?
  - type: text
    content: Sa iza no nivarotako anareo ho andevo
  - type: note
    content: 'taratasy fisaoram-bady: jereo Deot 24.1-4; Mt 19.7. –nivarotako... andevo: hanefana trosa: jereo Eks 21.7; 2 Mp 4.1; Ne 5.5; Mt 18.25.'
  - type: text
    content: mba ho fanefana ny trosako aminy?
  - type: text
    content: Indro ny helokareo ihany no nivarotana anareo
  - type: text
    content: ary ny fikomianareo ihany no nandroahana an-dreninareo.
  '10':
  - type: text
    content: Iza aminareo no manaja ny TOMPO?
  - type: text
    content: Aoka izy hihaino ny feon’ny mpanompony!
  - type: text
    content: Raha misy mandeha amin’ny maizina
  - type: text
    content: tsy ahitam-pahazavana mihitsy,
  - type: text
    content: aoka izy hitoky sy hiankina
  - type: text
    content: amin’ny TOMPO Andriamaniny!
  '11':
  - type: text
    content: Fa ny aminareo rehetra izay mandrehitra afo
  - type: text
    content: 'sy mirongo zana-tsipîka mandoro, dia izao:'
  - type: text
    content: ny afo natsanganareo ihany
  - type: text
    content: sy ny zana-tsipîka narehitrareo
  - type: text
    content: no anjara omanin’ny TOMPO ho anareo.
  - type: text
    content: Ho faty amin’ny fahoriana mafy ianareo.
  '2':
  - type: text
    content: Nahoana, fony tonga Aho, no tsy nahita olona;
  - type: text
    content: nahoana, fony niantso Aho, no tsy nisy namaly?
  - type: text
    content: Ny tanako ve no fohy loatra ka tsy mahavonjy?
  - type: text
    content: Sa Izaho no tsy manan-kery hoenti-manafaka?
  - type: text
    content: Indro mandrahona fotsiny Aho,
  - type: text
    content: dia maina ny ranomasina
  - type: text
    content: na manjary taniefitra ny ony.
  - type: text
    content: Amin’izay, noho ny tsy fisian’ny rano,
  - type: text
    content: dia matin-ketaheta ny trondro ka maimbo.
  '3':
  - type: text
    content: Azoko atao ihany koa
  - type: text
    content: ny mandrakotra mainty ny lanitra
  - type: text
    content: ka mampitafy azy lamba fisaonana.
  - type: heading
    content: Ilay Mpanompon’ny Tompo
  - type: heading
    content: (tononkira fahatelo)
  '4':
  - type: text
    content: Ny Tompo ANDRIANANAHARY no nampianatra ahy
  - type: text
    content: izay tokony holazaiko,
  - type: text
    content: mba hahaizako mamoaka teny
  - type: text
    content: hampahery ny reraka.
  - type: text
    content: Isa-maraina Izy
  - type: text
    content: dia manabe ahy hatrany hihaino
  - type: text
    content: 'araka izay tokony hataon’ny '
  - type: text
    content: mpianatra
  - type: text
    content: .
  '5':
  - type: text
    content: Ny Tompo ANDRIANANAHARY no nanokatra ny sofiko,
  - type: text
    content: ka tsy manohitra Azy aho ary tsy mihemotra.
  '6':
  - type: text
    content: Ny lamosiko atolotro amin’ireo mpikapoka ahy,
  - type: text
    content: ary ny takolako amin’ireo mpanongo-bolom-bava.
  - type: text
    content: Ny tavako tsy nafeniko ho difin’ny fanevatevana
  - type: text
    content: sy ny fandrorana natao tamiko
  - type: note
    content: Ampit Mt 26.67; Mk 14.65.
  - type: text
    content: .
  '7':
  - type: text
    content: Ny Tompo ANDRIANANAHARY no hamonjy ahy,
  - type: text
    content: koa tsy resin’ny fanevatevana aho;
  - type: text
    content: ary nohamafisiko ho toy ny afovato ny tavako,
  - type: text
    content: satria fantatro fa tsy ho menatra Aho.
  '8':
  - type: text
    content: Eo akaikiko ny TOMPO, Ilay mpanamarina ahy.
  - type: text
    content: Iza no hiady amiko?
  - type: text
    content: Andeha isika hiara-miseho
  - type: text
    content: eo anoloan’ny mpitsara!
  - type: text
    content: Iza no ho mpanohitra ahy?
  - type: text
    content: Aoka izy hanatona hifanatrika amiko!
  '9':
  - type: text
    content: Eny, ny Tompo ANDRIANANAHARY no hamonjy ahy,
  - type: text
    content: ka iza no hanameloka ahy
  - type: note
    content: Ampit Rm 8.33-34.
  - type: text
    content: '?'
  - type: text
    content: Indro izy rehetra mpanohitra ahy
  - type: text
    content: fa hihasimba toy ny lamba mihatonta,
  - type: text
    content: toy ny lamba lanin’ny kalalao.
  - type: heading
    content: Henoy ilay Mpanompon’ny Tompo
