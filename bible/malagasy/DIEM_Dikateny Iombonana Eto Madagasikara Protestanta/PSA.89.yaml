document_id: PSA.89,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Aiza ireo fampanantenana nataonao tamin’i Davida?
  - type: text
    content: ' '
  - type: text
    content: Tononkalo fananarana nataon’i Etàna zanakalahin’i Zerà
  - type: text
    content: ' '
  - type: note
    content: 'Etàna zanakalahin’i Zerà: jereo Sal 88.1 sy nta. Araka ny 1 Tan 6.16-29; 15.17-19, i Etàna dia anankiray amin’ireo mpiandraikitra ny hira sy ny mozika litorjîka tao an-tempolin’i Jerosalema, faha-Davida.'
  - type: text
    content: .
  '10':
  - type: text
    content: Ianao no mamolaka ny avonavon’ny ranomasina
  - type: text
    content: sy mampangina ny hatezeran’ny onjany.
  '11':
  - type: text
    content: Ianao no nahafaty sy nanorotoro an-dRahaba
  - type: note
    content: 'Rahaba: ao amin’ny tantara tranainy babilônianina momba ny fahariana an’izao tontolo izao dia trozonabe an-dranomasina no antsoina hoe Rahaba, ka resin’ilay Andriamanitra mpahary izy io. Eto amin’ny Sal 89 kosa dia ny Tompo no lazaina fa nandresy azy.'
  - type: text
    content: ;
  - type: text
    content: ary ny herinao mahefa no nentinao
  - type: text
    content: hampielezana ny fahavalonao.
  '12':
  - type: text
    content: Anao ny lanitra, Anao koa ny tany;
  - type: text
    content: Ianao no nanorina izao tontolo izao
  - type: text
    content: sy izay rehetra mameno azy.
  '13':
  - type: text
    content: Ianao no namorona ny avaratra sy ny atsimo;
  - type: text
    content: mihoby Anao ny tendrombohitra Tabôra sy Hermôna
  - type: note
    content: 'Tabôra sy Hermôna: dia tendrombohitra roa nivavahan’ny Kanahanîta.'
  - type: text
    content: .
  '14':
  - type: text
    content: Anao ny hery tsy hay tohaina;
  - type: text
    content: azo antoka ny fifehezanao,
  - type: text
    content: tsy refesi-mandidy ny fahefànao
  - type: note
    content: Tamin’ny fivavahana kanahanîta dia ny andriamanitra Bahala mazàna no aseho ho tsy refesi-mandidy amin’izy manangan-tanana ankavanana; eto amin’ity Sal 89 ity kosa dia ny Tompo no lazaina fa tsy refesi-mandidy ny fahefàny.
  - type: text
    content: .
  '15':
  - type: text
    content: Rariny sy hitsiny no fototry ny fanjakanao;
  - type: text
    content: fitiavana sy toetra mahatoky no mandeha eo alohanao.
  '16':
  - type: text
    content: Sambatra ny vahoaka mahay mankalaza Anao;
  - type: text
    content: TOMPO ô, ao anatin’ny hazavanao no hiainany;
  '17':
  - type: text
    content: ny aminao no hifalifaliany isan’andro,
  - type: text
    content: ary ny fahamarinanao no hampitraka azy.
  '18':
  - type: text
    content: Ianao no hery lehibe ho anay
  - type: text
    content: ary ny fitiavanao no hireharehanay,
  '19':
  - type: text
    content: satria miankina aminao TOMPO ilay mpanjaka ampinganay,
  - type: text
    content: miankina aminao izy, ry ilay Masin’i Israely.
  '2':
  - type: text
    content: Ireo mari-pitiavanao, TOMPO ô,
  - type: text
    content: no hohiraiko mandrakizay;
  - type: text
    content: ho an’ny taranaka rehetra ho avy
  - type: text
    content: no hampahafantarako ny toetranao mahatoky.
  '20':
  - type: text
    content: Indray andro dia niteny tamin-tsindrimandry Ianao
  - type: text
    content: 'ka nilaza tamin’ireo mpivavaka aminao hoe:'
  - type: text
    content: «Nanaiky hanampy sy hanandratra olo-mahery fo iray aho,
  - type: text
    content: dia tovolahy anankiray avy tao amin’ny vahoakako.
  '21':
  - type: text
    content: I Davida mpanompoko no efa hitako
  - type: text
    content: ka nohosorako ilo masina ho mpanjaka
  - type: note
    content: Jereo 1 Sam 13.14; Asa 13.22; 1 Sam 16.12-13.
  - type: text
    content: .
  '22':
  - type: text
    content: Ny fiarovako no homba azy
  - type: text
    content: ary ny heriko no hampahatanjaka azy.
  '23':
  - type: text
    content: Tsy hahatratra azy ny fahavalo
  - type: text
    content: ary tsy hampahory azy ny mpikomy.
  '24':
  - type: text
    content: Eo imasony no hanapotehako ny mpanohitra azy
  - type: text
    content: ary hamelezako izay mankahala azy.
  '25':
  - type: text
    content: Ny toetrako mahatoky sy ny fitiavako no hiaraka aminy
  - type: text
    content: ary Izaho no hampitombo ny fahefàny.
  '26':
  - type: text
    content: Homeko azy ny fifehezam-panjakana
  - type: text
    content: hatramin’ny ranomasina sy ny ony.
  '27':
  - type: text
    content: 'Izy hiantso Ahy hoe: ‹Raiko Ianao,'
  - type: text
    content: Andriamanitro, Vatolampy mamonjy ahy›,
  '28':
  - type: text
    content: Izaho kosa hanao azy ho lahimatoako,
  - type: text
    content: sady ambony indrindra amin’ireo mpanjakan’ny tany
  - type: note
    content: Jereo Apôk 1.5.
  - type: text
    content: .
  '29':
  - type: text
    content: Hitahirizako mandrakizay ny fitiavako izy
  - type: text
    content: 'ary hitazonako izao fanekempihavanako izao:'
  '3':
  - type: text
    content: Hambarako fa miorina mandrakizay ny fitiavanao,
  - type: text
    content: mamahatra any an-danitra ny toetranao mahatoky.
  '30':
  - type: text
    content: Hisy hajoroko ho mpanjaka hatrany ny taranany;
  - type: text
    content: ary haharitra toy ny lanitra ny sezafiandrianany.
  '31':
  - type: text
    content: Raha mahafoy ny lalànako ny taranany
  - type: text
    content: ka tsy manaraka ny fitsipiko,
  '32':
  - type: text
    content: raha manevateva ny baiko avy amiko
  - type: text
    content: ka tsy mitandrina ny didiko,
  '33':
  - type: text
    content: dia hofaiziko tsorakazo ny fikomiany
  - type: text
    content: ary hosazîko kapoka ny heloka vitany;
  '34':
  - type: text
    content: kanefa tsy hofoanako ny fitiavako azy
  - type: text
    content: ary tsy hivadihako ny toetrako mahatoky.
  '35':
  - type: text
    content: Tsy hotsoahako ny fanekempihavanako
  - type: text
    content: ary tsy hovako izay nampanantenaiko.
  '36':
  - type: text
    content: Efa nanao izao fianianana izao Aho fahiny;
  - type: text
    content: tamin’ny fahamasinako no nanaovako izany
  - type: text
    content: 'fa tsy hamitaka velively an’i Davida Aho:'
  '37':
  - type: text
    content: Hisy hatrany hatrany ny taranany;
  - type: text
    content: ary tahaka ny aharetan’ny masoandro
  - type: text
    content: no haharetan’ny sezafiandrianany eo anatrehako;
  '38':
  - type: text
    content: hitombina hatrany izany, raha mbola eo koa ny volana
  - type: text
    content: izay vavolombelona mahatoky eny amin’ny rahona.»
  - type: text
    content: Fiatoana
  '39':
  - type: text
    content: Saingy narianao sy nolavinao
  - type: text
    content: ilay mpanjaka voahosotrao,
  - type: text
    content: satria tezitra taminy Ianao.
  '4':
  - type: text
    content: 'Fa hoy Ianao hoe:'
  - type: text
    content: '«Nanaovako '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' ilay voafidiko,'
  - type: text
    content: 'dia i Davida mpanompoko izay nianianako hoe:'
  '40':
  - type: text
    content: Nofoananao ilay fanekempihavanana
  - type: text
    content: izay nataonao tamin’ity mpanomponao;
  - type: text
    content: natsipinao tamin’ny tany ny satroboninahiny
  - type: text
    content: ka nolotoinao hahavery fahefana azy.
  '41':
  - type: text
    content: Narodanao ny fefiny rehetra
  - type: text
    content: ary noravanao ny màndany.
  '42':
  - type: text
    content: Norobain’ny vahiny rehetra mandalo izy,
  - type: text
    content: ary lasa fihomehezan’ireo firenena mifanila.
  '43':
  - type: text
    content: Nampirisika ny fahavalony Ianao
  - type: text
    content: ary nampifaly ny mpifanandrina aminy.
  '44':
  - type: text
    content: Nataonao tsy nahomby ny fiadian’ilay voahosotrao
  - type: text
    content: ary tsy notohananao akory tamin’ny ady izy.
  '45':
  - type: text
    content: Notapahinao ny tehim-panjakàny
  - type: text
    content: ary naonganao ny sezafiandrianany,
  - type: text
    content: ka nadabokao ho amin’ny tany.
  '46':
  - type: text
    content: Nohafohezinao ny androm-pahatanorany
  - type: text
    content: ary norakofanao henatra izy.
  - type: text
    content: Fiatoana
  '47':
  - type: text
    content: TOMPO ô, mbola ho ela ve no hiafenanao?
  - type: text
    content: Mandra-pahoviana ny fahatezeranao
  - type: text
    content: no mbola hirehitra tahaka ny afo?
  '48':
  - type: text
    content: Tsarovy fa fohy loatra ny fiainako!
  - type: text
    content: Toa zava-poana dia zava-poana
  - type: text
    content: no naharianao anay olombelona.
  '49':
  - type: text
    content: Olona iza no velona ka tsy hiharam-pahafatesana,
  - type: text
    content: na hahavotra aina tsy voatanan’ny toeran’ny maty?
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Hisy taranakao hajoroko
  - type: text
    content: ho mpanjaka hatrany hatrany;
  - type: text
    content: amin’ny taona rehetra ho avy
  - type: text
    content: no hanorenako ny fiandriananao
  - type: note
    content: Jereo 2 Sam 7.12-16l 1 Tan 17.11-14; Sal 132.11-12; Asa 2.30.
  - type: text
    content: .»
  - type: text
    content: Fiatoana
  '50':
  - type: text
    content: Tompo ô, nankaiza irony mari-pitiavanao fahiny
  - type: text
    content: izay nianiananao marimarina tamin’i Davida?
  '51':
  - type: text
    content: Tompo ô, diniho ny latsa manjo ahy mpanomponao
  - type: text
    content: izay itambesaran’ny fanalam-baràkan’ireo vahoaka,
  '52':
  - type: text
    content: satria latsain’ny fahavalonao, TOMPO ô,
  - type: text
    content: izaho mpanjaka voahosotrao;
  - type: text
    content: eny, latsain’ny fahavalonao aho
  - type: text
    content: na aiza na aiza andehanako.
  '53':
  - type: text
    content: Hisaorana mandrakizay anie ny TOMPO!
  - type: text
    content: Amen
  - type: text
    content: '! Amen!'
  '6':
  - type: text
    content: 'TOMPO ô, aoka hidera Anao ny '
  - type: text
    content: anjely
  - type: text
    content: ' any an-danitra'
  - type: text
    content: noho izany zava-mahagaga nataonao izany;
  - type: text
    content: aoka hidera Anao ireo amin’ny fivoriany,
  - type: text
    content: indrindra koa noho ny toetranao mahatoky!
  '7':
  - type: text
    content: TOMPO ô, tsy misy tahaka Anao any an-danitra;
  - type: text
    content: ary tsy misy mitovy aminao ireo andriamanitra.
  '8':
  - type: text
    content: Fa Andriamanitra mampitolagaga Ianao
  - type: text
    content: eo amin’ny fivorian’ny anjely,
  - type: text
    content: ka lehibe sy hajaina kokoa
  - type: text
    content: noho ireo rehetra manodidina Anao.
  '9':
  - type: text
    content: Ry TOMPO Andriamanitr’izao rehetra izao ô,
  - type: text
    content: iza moa no mahery toa Anao?
  - type: text
    content: Ny toetranao mahatoky no mipariaka manodidina Anao.
