    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izany koa no itenenan’Andriamanitra ao amin’ny Salamo hafa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy havelanao ho tratry ny fahalòvana Ilay voatokana ho Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.35 '
    - type: usfm
      marker: ft
