document_id: ACT.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irahina i Barnabà sy i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy mpampianatra maro tao amin’ny Fiangonana tany Antiôkia: dia i Barnabà, i Simehôna (izay atao hoe Imainty), i Losio avy any Sirena, i Manahema (izay niolo-nono sy niara-nilalao tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ' mpanjaka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Herôda mpanjaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia i Herôda Antipasy nifehy an’i Galilea sy i Perea (jereo Lk 3.1).
    marker-yv: yv-n
  - type: text
    text: ') ary i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray andro raha nanao fanompoam-pivavahana tamin’ny Tompo sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nifady hanina
  - type: text
    text: ' ny iray Fiangonana, dia hoy ny Fanahy Masina:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Atokàny ho Ahy i Barnabà mbamin’i Saoly hanao ny asa izay niantsoako azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tamin’izay, rehefa nifady hanina sy nivavaka ny iray Fiangonana, dia nametra-tanana tamin’izy roa lahy ary nandefa azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Barnabà sy i Saoly tao Sipra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nirahin’ny Fanahy Masina àry i Barnabà mbamin’i Saoly ka dia nankany Seleosia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Seleosia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia seranan-tsambon’i Antiôkia, tandrifin’ny nosy Sipra.
    marker-yv: yv-n
  - type: text
    text: ' ary niondrana an-tsambo tao ho any amin’ny nosy Sipra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tonga tao Salamîna izy roa lahy, dia nitory ny tenin’Andriamanitra eran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' fivavahan’ny Jiosy, ary nentiny koa i Jôhany Marka ho mpanampy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Namakivaky ny nosy manontolo izy roa lahy mandra-pahatongany tany Pafo. Tao no nahitany mpanao majika atao hoe Barjesoa, lehilahy nihambo ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Io Barjesoa io dia niara-nitoetra tamin’i Serzy Paoly, izay governoran’ny nosy Sipra sady lehilahy hendry. Nampiantso an’i Barnabà mbamin’i Saoly ilay governora satria naniry mafy handre ny tenin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa nanohitra azy roa lahy kosa i Barjesoa Elimà, ilay mpanao majîka (fa izany no dikan’ny anarana hoe Elimà), ka nitady hampiverina ilalana an’ilay governora tsy hirosoany amin’ny finoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tamin’izay i Saoly, atao koa hoe Paoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Saoly: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'anarana jiosy niantsoana an’i Paoly apôstôly fa ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paoly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anarana rômanina (jereo 22.27-29).'
    marker-yv: yv-n
  - type: text
    text: ', dia tonga feno Fanahy Masina ka nibanjina an’i Elimà '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry ilay andevozin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' ity! Feno fitaka sy faharatsiana isan-karazany ianao, ary mpanohitra ny marina rehetra nosoritan’Andriamanitra! Mbola te hisompatra foana ny lala-mahitsin’ny Tompo ve ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ankehitriny, indro hasian’ny tanan’ny Tompo ianao ka ho jamba tsy hahita ny fahazavan’ny masoandro mandritra ny fotoana voafetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niaraka tamin’izay dia sarona haizina ny mason’i Elimà, ka niraparapa izy nitady olona hitantana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nony nahita ny zava-nitranga ilay governora, dia tonga mpino sady talanjona fatratra tamin’ny fampianarana momba ny Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Paoly sy i Barnabà tao Antiôkia any Pisidia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Niondrana an-tsambo tao Pafo i Paoly sy ny mpiara-dia taminy ka nankany Perga any Pamfilia. Tao Perga i Jôhany Marka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Perga: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna amin’ny morontsiraka atsimo atsinanan’i Azia Minôra. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôhany Marka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 12.12, 25; 13.5.'
    marker-yv: yv-n
  - type: text
    text: ' no nandao an’i Paoly sy i Barnabà ka lasa niverina tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avy ao Perga kosa i Paoly sy i Barnabà dia nandroso ihany ka tonga tany Antiôkia any Pisidia. Ary niditra tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' izy roa lahy tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' ka nipetraka teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony vita ny famakiana ny teny tao amin’ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' sy ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', dia nanirahan’ireo lohandohan’ny sinagôga olona izy roa lahy hilaza aminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry havana, azonareo atao izao ny miteny raha manana teny fampaherezana holazaina amin’ny vahoaka mpiangona ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nitsangana i Paoly ka nanofahofa tanana hampangina ny mpiangona ary nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' sy ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena mpanaja an’Andriamanitra
  - type: text
    text: ', henoy aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny Andriamanitr’ilay vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' dia nifidy ny razantsika. Nataony tonga firenen-dehibe io vahoaka io fony izy nivahiny tany amin’ny tany Ejipta, ary tamin-kery lehibe no nitondrany azy hiala avy any Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tany an-taniefitra dia nahari-po taminy nandritra ny 40 taona eo ho eo Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nahari-po taminy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: namelona azy, nanome hanina azy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 17-18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 1.7; 12.51; Nom 14.34; Deot 1.31.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary nandrava firenena fito tany Kanahàna ka nanolotra ny tanin’ireo ho fananan’i Israely vahoakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 7.1; Jos 14.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nandritra ny 450 taona eo ho eo izany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Taorian’izany, dia nomen’Andriamanitra mpitsara ny razantsika, mandra-pahatongan’ny andron’i Samoela mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nandritra ny 450 taona eo ho eo izany; 400 taona eo ho eo tany Ejipta (Gen 15.13; Eks 12.40-41) ary 40 taona eo ho eo tany an-taniefitra (Deot 2.7). Misy krônôlojia na fanisàn-taona samihafa arakaraka ny lovantsofina niely teo amin’ny Jiosy (jereo Gal 3.17). –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpitsara:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mpits 2.16. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Samoela:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1 Sam 3.20.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy eo nangataka mpanjaka izy ireo ka dia nomeny azy nandritra ny efapolo taona i Saoly, zanakalahin’i Kisy sady avy tamin’ny fokon’i Benjamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nesorin’Andriamanitra i Saoly, fa notendreny ho mpanjakan’izy ireo kosa i Davida, ilay nijoroany ho vavolombelona ka nilazany hoe: «Efa hitako i Davida, zanak’i Jisay; lehilahy araka izay niriko i Davida ka hanatontosa ny sitrapoko rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 21-22:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Sam 8.5, 19; 10.21; 13.14; 16.12. Ampit Sal 89.21.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I Jesoa dia napoitran’Andriamanitra avy amin’ny taranak’i Davida mba ho Mpamonjy ny vahoaka Israely, araka izay efa nampanantenainy rahateo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Talohan’ny nahatongavan’i Jesoa anefa, dia nanao antso avo i Jôhany hanainga ny vahoaka Israely rehetra hiala amin’ny toe-dratsy ka hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hiala amin’ny toe-dratsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA. Jereo koa Mk 1.4; Lk 3.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin’ny faramparan’ny andro niainan’i Jôhany, dia hoy izy hoe: «Ataonareo ho iza moa aho? Tsy izaho no Ilay andrasanareo. Fa indro Izy tamy aoriako, ary tsy mendrika hamaha ny kapa eo amin’ny tongony akory aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jôh 1.20; Mt 3.11; Mk 1.7; Lk 3.16; Jôh 1.27.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ry havako, taranak’i Abrahama sy hafa firenena mpanaja an’Andriamanitra, ho antsika no nampitondrana izao hafatra momba ny famonjena izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa ny mponin’i Jerosalema sy ireo filohany dia tsy nahafantatra an’i Jesoa ary tsy nahazo ny tenin’ny mpaminany vakîna isaky ny andro sabata, kanefa nanatanteraka ireo teny ireo tamin’ny nanamelohany an’i Jesoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary na dia tsy nahita antony hanamelohana Azy ho faty aza ry zareo, dia nangataka tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' ny hamonoana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa avy nahatanteraka izay rehetra nambaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' momba Azy ry zareo, dia nesorina teo amin’ny hazofijaliana Izy ary nalevina tao am-pasana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.29 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 28-29:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 27.22-23, 57-61; Mk 15.13-14, 42.47; Lk 23.21-23, 50-56; Jôh 19.15, 38, 42.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa Andriamanitra kosa nanangana Azy ho velona avy tany amin’ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mandritra ny andro maro, dia niseho tamin’ireo niara-niakatra taminy avy tany Galilea ho any Jerosalema i Jesoa, ka ireo ankehitriny no vavolombelona manambara Azy amin’ny vahoaka Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izahay koa dia mitory aminareo izao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny zavatra efa nampanantenain’Andriamanitra tamin’ny razantsika dia notanterahin’Andriamanitra tamintsika ankehitriny, fony Izy nanangana an’i Jesoa ho velona, araka izay voalazan’ny Soratra Masina ao amin’ny Salamo faharoa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Zanako Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ray niteraka Anao Aho manomboka anio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 2.7.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '–Nambaran’Andriamanitra koa fa natsangany ho velona i Jesoa ka tsy hiverina amin’ny fahalòvana intsony, araka ny teny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Homeko anareo ny fanambinana masina sy azo antoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: efa nampanantenaiko an’i Davida
  - type: usfm
    marker: f
