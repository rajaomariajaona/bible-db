- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Nony tafavoaka ny sinagôga i Paoly sy i Barnabà, dia nangatahin’ny olona hiverina indray rehetra miherina ny sabata hilazalaza ny amin’izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tamin’ny firavàn’ny mpiangona, dia maro ny Jiosy mbamin’ny hafa firenena mpanaja an’Andriamanitra no nanaraka an’i Paoly sy i Barnabà; ary izy roa lahy kosa niteny taminy ka nampirisika azy haharitra amin’ny fahasoavan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary tamin’ny sabata herin’io, dia saika tafangona avokoa ny mponina rehetra ao an-tanàna mba hihaino ny tenin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tonga feno fialonana ny Jiosy nony nahita ny vahoaka maro, ka sady nanohitra ny teny voalazan’i Paoly no nanevateva azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Feno fahasahiana kosa i Paoly sy i Barnabà ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo aloha no tsy maintsy nitoriana ny tenin’Andriamanitra. Nolavinareo anefa izany ary ohatra ny ataonareo ho tsy mendrika ny fiaina-maharitra mandrakizay ny tenanareo, koa indro hitodika hankany amin’ny hafa firenena izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa izao no nandidian’ny Tompo anay:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Notendreko ho fanazavana ny hafa firenena ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitondranao ny famonjena hatrany am-paran’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 49.6.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Nandre izany ny hafa firenena ka faly sady nanome voninahitra ny tenin’ny Tompo; ary izay rehetra voalahatra hanana ny fiaina-maharitra mandrakizay dia tonga mpino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia niely manerana izany faritany izany ny tenin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nomen’ny Jiosy fo anefa ireo vehivavy mpanaja an’Andriamanitra sady ambony toerana ary koa ireo lehibe tao an-tanàna; dia nahatonga fanenjehana an’i Paoly sy i Barnabà ry zareo ka nandroaka azy roa lahy hiala tamin’ny faritany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Nahintsan’i Paoly sy i Barnabà ny vovoka teny amin’ny tongony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 6.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ho fiampangana azy ireo, dia lasa izy roa lahy nankany Ikôniôma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary heni-kafaliana sy feno Fanahy Masina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tao Antiôkia.'
