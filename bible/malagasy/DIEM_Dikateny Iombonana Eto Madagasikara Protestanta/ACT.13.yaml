document_id: ACT.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Irahina i Barnabà sy i Saoly
  - type: text
    content: 'Nisy '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy mpampianatra maro tao amin’ny Fiangonana tany Antiôkia: dia i Barnabà, i Simehôna (izay atao hoe Imainty), i Losio avy any Sirena, i Manahema (izay niolo-nono sy niara-nilalao tamin’i '
  - type: text
    content: Herôda
  - type: text
    content: ' mpanjaka'
  - type: note
    content: 'Herôda mpanjaka: dia i Herôda Antipasy nifehy an’i Galilea sy i Perea (jereo Lk 3.1).'
  - type: text
    content: ') ary i Saoly. '
  '10':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: '–Ry ilay andevozin’ny '
  - type: text
    content: devoly
  - type: text
    content: ' ity! Feno fitaka sy faharatsiana isan-karazany ianao, ary mpanohitra ny marina rehetra nosoritan’Andriamanitra! Mbola te hisompatra foana ny lala-mahitsin’ny Tompo ve ianao? '
  '11':
  - type: text
    content: Ankehitriny, indro hasian’ny tanan’ny Tompo ianao ka ho jamba tsy hahita ny fahazavan’ny masoandro mandritra ny fotoana voafetra.
  - type: text
    content: 'Niaraka tamin’izay dia sarona haizina ny mason’i Elimà, ka niraparapa izy nitady olona hitantana azy. '
  '12':
  - type: text
    content: Nony nahita ny zava-nitranga ilay governora, dia tonga mpino sady talanjona fatratra tamin’ny fampianarana momba ny Tompo.
  - type: heading
    content: I Paoly sy i Barnabà tao Antiôkia any Pisidia
  '13':
  - type: text
    content: Niondrana an-tsambo tao Pafo i Paoly sy ny mpiara-dia taminy ka nankany Perga any Pamfilia. Tao Perga i Jôhany Marka
  - type: note
    content: 'Perga: tanàna amin’ny morontsiraka atsimo atsinanan’i Azia Minôra. –Jôhany Marka: jereo 12.12, 25; 13.5.'
  - type: text
    content: ' no nandao an’i Paoly sy i Barnabà ka lasa niverina tany Jerosalema. '
  '14':
  - type: text
    content: 'Avy ao Perga kosa i Paoly sy i Barnabà dia nandroso ihany ka tonga tany Antiôkia any Pisidia. Ary niditra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' izy roa lahy tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ka nipetraka teo. '
  '15':
  - type: text
    content: 'Nony vita ny famakiana ny teny tao amin’ny bokin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' sy ny bokin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ', dia nanirahan’ireo lohandohan’ny sinagôga olona izy roa lahy hilaza aminy hoe:'
  - type: text
    content: –Ry havana, azonareo atao izao ny miteny raha manana teny fampaherezana holazaina amin’ny vahoaka mpiangona ianareo.
  '16':
  - type: text
    content: 'Dia nitsangana i Paoly ka nanofahofa tanana hampangina ny mpiangona ary nanao hoe:'
  - type: text
    content: '–Ry '
  - type: text
    content: Israelita
  - type: text
    content: ' sy ry '
  - type: text
    content: hafa firenena mpanaja an’Andriamanitra
  - type: text
    content: ', henoy aho! '
  '17':
  - type: text
    content: 'Ny Andriamanitr’ilay vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' dia nifidy ny razantsika. Nataony tonga firenen-dehibe io vahoaka io fony izy nivahiny tany amin’ny tany Ejipta, ary tamin-kery lehibe no nitondrany azy hiala avy any Ejipta. '
  '18':
  - type: text
    content: Tany an-taniefitra dia nahari-po taminy nandritra ny 40 taona eo ho eo Andriamanitra
  - type: note
    content: 'Nahari-po taminy: misy stf sasany ahitana hoe namelona azy, nanome hanina azy. –And 17-18: jereo Eks 1.7; 12.51; Nom 14.34; Deot 1.31.'
  - type: text
    content: ', '
  '19':
  - type: text
    content: ary nandrava firenena fito tany Kanahàna ka nanolotra ny tanin’ireo ho fananan’i Israely vahoakany
  - type: note
    content: Jereo Deot 7.1; Jos 14.1.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Indray andro raha nanao fanompoam-pivavahana tamin’ny Tompo sady '
  - type: text
    content: nifady hanina
  - type: text
    content: ' ny iray Fiangonana, dia hoy ny Fanahy Masina:'
  - type: text
    content: –Atokàny ho Ahy i Barnabà mbamin’i Saoly hanao ny asa izay niantsoako azy.
  '20':
  - type: text
    content: Nandritra ny 450 taona eo ho eo izany.
  - type: text
    content: Taorian’izany, dia nomen’Andriamanitra mpitsara ny razantsika, mandra-pahatongan’ny andron’i Samoela mpaminany
  - type: note
    content: 'Nandritra ny 450 taona eo ho eo izany; 400 taona eo ho eo tany Ejipta (Gen 15.13; Eks 12.40-41) ary 40 taona eo ho eo tany an-taniefitra (Deot 2.7). Misy krônôlojia na fanisàn-taona samihafa arakaraka ny lovantsofina niely teo amin’ny Jiosy (jereo Gal 3.17). –mpitsara: jereo Mpits 2.16. –Samoela: jereo 1 Sam 3.20.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Avy eo nangataka mpanjaka izy ireo ka dia nomeny azy nandritra ny efapolo taona i Saoly, zanakalahin’i Kisy sady avy tamin’ny fokon’i Benjamîna. '
  '22':
  - type: text
    content: 'Nesorin’Andriamanitra i Saoly, fa notendreny ho mpanjakan’izy ireo kosa i Davida, ilay nijoroany ho vavolombelona ka nilazany hoe: «Efa hitako i Davida, zanak’i Jisay; lehilahy araka izay niriko i Davida ka hanatontosa ny sitrapoko rehetra'
  - type: note
    content: 'And 21-22: 1 Sam 8.5, 19; 10.21; 13.14; 16.12. Ampit Sal 89.21.'
  - type: text
    content: '.» '
  '23':
  - type: text
    content: 'I Jesoa dia napoitran’Andriamanitra avy amin’ny taranak’i Davida mba ho Mpamonjy ny vahoaka Israely, araka izay efa nampanantenainy rahateo. '
  '24':
  - type: text
    content: 'Talohan’ny nahatongavan’i Jesoa anefa, dia nanao antso avo i Jôhany hanainga ny vahoaka Israely rehetra hiala amin’ny toe-dratsy ka hatao '
  - type: text
    content: batisa
  - type: note
    content: 'hiala amin’ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA. Jereo koa Mk 1.4; Lk 3.3.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Ary tamin’ny faramparan’ny andro niainan’i Jôhany, dia hoy izy hoe: «Ataonareo ho iza moa aho? Tsy izaho no Ilay andrasanareo. Fa indro Izy tamy aoriako, ary tsy mendrika hamaha ny kapa eo amin’ny tongony akory aho'
  - type: note
    content: Jereo Jôh 1.20; Mt 3.11; Mk 1.7; Lk 3.16; Jôh 1.27.
  - type: text
    content: .»
  '26':
  - type: text
    content: 'Ry havako, taranak’i Abrahama sy hafa firenena mpanaja an’Andriamanitra, ho antsika no nampitondrana izao hafatra momba ny famonjena izao. '
  '27':
  - type: text
    content: 'Fa ny mponin’i Jerosalema sy ireo filohany dia tsy nahafantatra an’i Jesoa ary tsy nahazo ny tenin’ny mpaminany vakîna isaky ny andro sabata, kanefa nanatanteraka ireo teny ireo tamin’ny nanamelohany an’i Jesoa; '
  '28':
  - type: text
    content: 'ary na dia tsy nahita antony hanamelohana Azy ho faty aza ry zareo, dia nangataka tamin’i '
  - type: text
    content: Pilato
  - type: text
    content: ' ny hamonoana Azy. '
  '29':
  - type: text
    content: 'Rehefa avy nahatanteraka izay rehetra nambaran’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' momba Azy ry zareo, dia nesorina teo amin’ny hazofijaliana Izy ary nalevina tao am-pasana'
  - type: note
    content: 'And 28-29: jereo Mt 27.22-23, 57-61; Mk 15.13-14, 42.47; Lk 23.21-23, 50-56; Jôh 19.15, 38, 42.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: Tamin’izay, rehefa nifady hanina sy nivavaka ny iray Fiangonana, dia nametra-tanana tamin’izy roa lahy ary nandefa azy.
  - type: heading
    content: I Barnabà sy i Saoly tao Sipra
  '30':
  - type: text
    content: 'Fa Andriamanitra kosa nanangana Azy ho velona avy tany amin’ny maty. '
  '31':
  - type: text
    content: Mandritra ny andro maro, dia niseho tamin’ireo niara-niakatra taminy avy tany Galilea ho any Jerosalema i Jesoa, ka ireo ankehitriny no vavolombelona manambara Azy amin’ny vahoaka Israely
  - type: note
    content: Jereo 1.3.
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Ary izahay koa dia mitory aminareo izao '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izao: '
  '33':
  - type: text
    content: 'Ny zavatra efa nampanantenain’Andriamanitra tamin’ny razantsika dia notanterahin’Andriamanitra tamintsika ankehitriny, fony Izy nanangana an’i Jesoa ho velona, araka izay voalazan’ny Soratra Masina ao amin’ny Salamo faharoa hoe:'
  - type: text
    content: «Zanako Ianao,
  - type: text
    content: Ray niteraka Anao Aho manomboka anio
  - type: note
    content: Sal 2.7.
  - type: text
    content: .»
  '34':
  - type: text
    content: '–Nambaran’Andriamanitra koa fa natsangany ho velona i Jesoa ka tsy hiverina amin’ny fahalòvana intsony, araka ny teny hoe:'
  - type: text
    content: «Homeko anareo ny fanambinana masina sy azo antoka
  - type: text
    content: efa nampanantenaiko an’i Davida
  - type: note
    content: Is 55.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '35':
  - type: text
    content: 'Izany koa no itenenan’Andriamanitra ao amin’ny Salamo hafa hoe:'
  - type: text
    content: «Tsy havelanao ho tratry ny fahalòvana Ilay voatokana ho Anao
  - type: note
    content: Sal 16.10.
  - type: text
    content: .»
  '36':
  - type: text
    content: Eny, i Davida, rehefa nanatanteraka ny fikasan’Andriamanitra hahasoa ny mpiara-belona taminy, dia nodimandry ka nalevina mifanila amin’ireo razany ary tratry ny fahalòvana
  - type: note
    content: Jereo 1 Mp 2.10.
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Fa Ilay natsangan’Andriamanitra ho velona kosa dia tsy mba tratry ny fahalòvana. '
  '38':
  - type: text
    content: 'Ry havako, izao àry no aoka ho fantatrareo: amin’ny alalan’i Jesoa no itoriana famelan-keloka aminareo. Tsy nanafaka ny helokareo velively ny lalànan’i Mosesy ary tsy nahatonga anareo ho olo-marina eo anatrehan’Andriamanitra; fa ao amin’i Jesoa, izay rehetra mino dia afaka amin’ny heloka rehetra ary tonga olo-marina eo anatrehan’Andriamanitra. '
  '4':
  - type: text
    content: Nirahin’ny Fanahy Masina àry i Barnabà mbamin’i Saoly ka dia nankany Seleosia
  - type: note
    content: I Seleosia dia seranan-tsambon’i Antiôkia, tandrifin’ny nosy Sipra.
  - type: text
    content: ' ary niondrana an-tsambo tao ho any amin’ny nosy Sipra. '
  '40':
  - type: text
    content: Koa mitandrema mba tsy hiharan’izay
  - type: note
    content: 'mba tsy hiharan’izay...: misy stf sasany ahitana hoe mba tsy hihatra izay....'
  - type: text
    content: ' voalazan’ny Tompo ao amin’ny bokin’ny mpaminany hoe:'
  '41':
  - type: text
    content: «Mijere, ry mpaniratsira,
  - type: text
    content: dia migagà ka manjavòna!
  - type: text
    content: Fa ny zavatra hotanterahiko amin’ny andronareo
  - type: text
    content: dia zavatra tsy hinoanareo akory na dia hotantarain’olona aminareo aza
  - type: note
    content: Hab 1.5, araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '42':
  - type: text
    content: 'Nony tafavoaka ny sinagôga i Paoly sy i Barnabà, dia nangatahin’ny olona hiverina indray rehetra miherina ny sabata hilazalaza ny amin’izany zavatra izany. '
  '43':
  - type: text
    content: Tamin’ny firavàn’ny mpiangona, dia maro ny Jiosy mbamin’ny hafa firenena mpanaja an’Andriamanitra no nanaraka an’i Paoly sy i Barnabà; ary izy roa lahy kosa niteny taminy ka nampirisika azy haharitra amin’ny fahasoavan’Andriamanitra.
  '44':
  - type: text
    content: 'Ary tamin’ny sabata herin’io, dia saika tafangona avokoa ny mponina rehetra ao an-tanàna mba hihaino ny tenin’Andriamanitra. '
  '45':
  - type: text
    content: 'Tonga feno fialonana ny Jiosy nony nahita ny vahoaka maro, ka sady nanohitra ny teny voalazan’i Paoly no nanevateva azy. '
  '46':
  - type: text
    content: 'Feno fahasahiana kosa i Paoly sy i Barnabà ka niteny taminy hoe:'
  - type: text
    content: '–Ianareo aloha no tsy maintsy nitoriana ny tenin’Andriamanitra. Nolavinareo anefa izany ary ohatra ny ataonareo ho tsy mendrika ny fiaina-maharitra mandrakizay ny tenanareo, koa indro hitodika hankany amin’ny hafa firenena izahay. '
  '47':
  - type: text
    content: 'Fa izao no nandidian’ny Tompo anay:'
  - type: text
    content: «Notendreko ho fanazavana ny hafa firenena ianao,
  - type: text
    content: mba hitondranao ny famonjena hatrany am-paran’ny tany
  - type: note
    content: Is 49.6.
  - type: text
    content: '!»'
  '48':
  - type: text
    content: Nandre izany ny hafa firenena ka faly sady nanome voninahitra ny tenin’ny Tompo; ary izay rehetra voalahatra hanana ny fiaina-maharitra mandrakizay dia tonga mpino.
  '49':
  - type: text
    content: 'Dia niely manerana izany faritany izany ny tenin’ny Tompo. '
  '5':
  - type: text
    content: 'Tonga tao Salamîna izy roa lahy, dia nitory ny tenin’Andriamanitra eran’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' fivavahan’ny Jiosy, ary nentiny koa i Jôhany Marka ho mpanampy.'
  '50':
  - type: text
    content: 'Nomen’ny Jiosy fo anefa ireo vehivavy mpanaja an’Andriamanitra sady ambony toerana ary koa ireo lehibe tao an-tanàna; dia nahatonga fanenjehana an’i Paoly sy i Barnabà ry zareo ka nandroaka azy roa lahy hiala tamin’ny faritany. '
  '51':
  - type: text
    content: Nahintsan’i Paoly sy i Barnabà ny vovoka teny amin’ny tongony
  - type: note
    content: Jereo Mk 6.11 sy nta.
  - type: text
    content: ' ho fiampangana azy ireo, dia lasa izy roa lahy nankany Ikôniôma. '
  '52':
  - type: text
    content: 'Ary heni-kafaliana sy feno Fanahy Masina ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' tao Antiôkia.'
  '6':
  - type: text
    content: 'Namakivaky ny nosy manontolo izy roa lahy mandra-pahatongany tany Pafo. Tao no nahitany mpanao majika atao hoe Barjesoa, lehilahy nihambo ho '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Io Barjesoa io dia niara-nitoetra tamin’i Serzy Paoly, izay governoran’ny nosy Sipra sady lehilahy hendry. Nampiantso an’i Barnabà mbamin’i Saoly ilay governora satria naniry mafy handre ny tenin’Andriamanitra. '
  '8':
  - type: text
    content: 'Fa nanohitra azy roa lahy kosa i Barjesoa Elimà, ilay mpanao majîka (fa izany no dikan’ny anarana hoe Elimà), ka nitady hampiverina ilalana an’ilay governora tsy hirosoany amin’ny finoana. '
  '9':
  - type: text
    content: Tamin’izay i Saoly, atao koa hoe Paoly
  - type: note
    content: 'Saoly: anarana jiosy niantsoana an’i Paoly apôstôly fa ny hoe Paoly dia anarana rômanina (jereo 22.27-29).'
  - type: text
    content: ', dia tonga feno Fanahy Masina ka nibanjina an’i Elimà '
