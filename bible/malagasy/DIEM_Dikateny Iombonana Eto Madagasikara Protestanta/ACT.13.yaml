    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Eny, i Davida, rehefa nanatanteraka ny fikasan’Andriamanitra hahasoa ny mpiara-belona taminy, dia nodimandry ka nalevina mifanila amin’ireo razany ary tratry ny fahalòvana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 2.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa Ilay natsangan’Andriamanitra ho velona kosa dia tsy mba tratry ny fahalòvana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: 'Ry havako, izao àry no aoka ho fantatrareo: amin’ny alalan’i Jesoa no itoriana famelan-keloka aminareo. Tsy nanafaka ny helokareo velively ny lalànan’i Mosesy ary tsy nahatonga anareo ho olo-marina eo anatrehan’Andriamanitra; fa ao amin’i Jesoa, izay rehetra mino dia afaka amin’ny heloka rehetra ary tonga olo-marina eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Koa mitandrema mba tsy hiharan’izay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.40 '
    - type: usfm
