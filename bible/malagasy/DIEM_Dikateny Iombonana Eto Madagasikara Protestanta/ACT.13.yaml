  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: «Mijere, ry mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia migagà ka manjavòna!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny zavatra hotanterahiko amin’ny andronareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zavatra tsy hinoanareo akory na dia hotantarain’olona aminareo aza
  - type: usfm
    marker: f
