document_id: JOS.17,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no zaratany navoakan’ny antsapaka ho an’ny fokon’i Manase izay lahimatoan’i Jôsefa. Teny atsinanan’i Jôrdàna, ny tarik’i Makira, lahimatoan’i Manase sady rain’i Gilehada, dia nomena ny faritany Gilehada sy '
  - type: text
    content: Basàna
  - type: text
    content: ', satria miaramila mahery fo i Makira. '
  '10':
  - type: text
    content: 'Ny tanin’i Efraîma dia mitomandavana mianatsimo fa ny an’i Manase kosa mianavaratra; ary ny Ranomasina Mediteranea no samy sisiny andrefana. Ny fokon’i Asera no eo avaratra andrefan’ny fokon’i Manase ary ny an’i Jisakara no eo avaratra atsinanana. '
  '11':
  - type: text
    content: 'Tao amin’ny faritanin’i Jisakara sy i Asera dia nahazoan’ny fokon’i Manase an’ireto tanàna ireto: i Bety-Seana sy i Iblehama mbamin’ireo tanàna kely miankina aminy; i Dôra sy i Haîna-Dôra ary i Tahenàka sy i Megidao mbamin’ny mponina ao aminy avy sy ny tanàna kely samy miankina aminy, izany hoe ny faritanin’i Dôra'
  - type: note
    content: 'Ny faritanin’i Dôra: dkt hafa ny faritany telo na ny havoana telo.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Tsy naharoaka an’ireo Kanahanita hiala tamin’ireo tanàna ireo anefa ny taranak’i Manase; koa mbola nipetrahan’ny Kanahanita ihany izany faritany izany. '
  '13':
  - type: text
    content: Ary na dia efa nihanatanjaka aza ny Israelita, dia tsy naharoaka ny Kanahanita mihitsy saingy nampanao azy asa fanompoana.
  '14':
  - type: text
    content: 'Ary nitaraina tamin’i Josoa ny taranak’i Jôsefa nanao hoe:'
  - type: text
    content: '–Nahoana no anjara iray ihany tamin’ny antsapaka no mba nomenao anay, kanefa izahay efa tonga vahoaka marobe araka izay '
  - type: text
    content: nitahian
  - type: text
    content: ’ny TOMPO anay?
  '15':
  - type: text
    content: 'Dia novalian’i Josoa hoe:'
  - type: text
    content: –Raha tàhiny vahoaka marobe ianareo ka tery ho anareo ny havoanan’i Efraîma, dia mandehana any amin’ny tanin’ny Perizita sy ny Refaîta ka tevezo ny ala any hipetrahanareo
  - type: note
    content: Ny faritra be havoana nisy ny Perizita sy ny Refaîta dia tokony ho teny atsinanan’i Jôrdàna.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Hoy kosa ny taranak’i Jôsefa hoe:'
  - type: text
    content: –Tsy ampy ho anay tokoa ny havoana, kanefa manana kalesy vy ireo Kanahanita rehetra monina ao amin’ny tany lemaka, na izay any Bety-Seana sy amin’ireo tanàna kely miankina aminy na izay any amin’ny lohasahan’i Jizrehela
  - type: note
    content: 'Kalesy vy: kalesy fitondra miady ka nofonosina vy ny kodiarany roa toy ny an’ny sarety. Ny kalesy vy dia nahatonga ny Kanahanita hanana fahombiazana kokoa tamin’ny ady an-tany lemaka. Izany no nakan’ny Israelita tamin’ny voalohany ireo faritra be havoana. –Jizrehela: jereo 19.18 sy nta.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Fa hoy i Josoa tamin’ny taranak’i Jôsefa, dia ny fokon’i Efraîma sy ny antsasa-pokon’i Manase tany andrefana:'
  - type: text
    content: '–Vahoaka marobe sady matanjaka tokoa ianareo, ka tsy anjara iray ihany no ho anareo. '
  '18':
  - type: text
    content: Ho anareo koa ny havoana rakotra ala, dia hotevenareo ny ala ka halainareo ny vava ala; fa ho voaroakanareo ny Kanahanita na dia matanjaka sy manana kalesy vy aza ry zareo.
  '2':
  - type: text
    content: 'Ny tany teny andrefan’i Jôrdàna kosa dia nomena ny Manasita sisa ho an’ireo tarika ao anatiny: dia ny tarik’i Abihezera, ny tarik’i Heleka, ny tarik’i Asriela, ny tarik’i Sekema, ny tarik’i Hefera, ny tarik’i Semidà. Tera-dehilahy taranak’i Manase izay zanakalahin’i Jôsefa ireo, samy araka ny tarika misy azy avy.'
  '3':
  - type: text
    content: 'Fa i Tselofehada, zanakalahin’i Hefera sy zafikelin’i Gilehada ary zafiafin’i Makira sy zafin-dohalik’i Manase, dia tsy mba niteraka zazalahy fa zazavavy ihany. Ka ireto avy no anarany: i Mahalà, i Nôhà, i Hôglà, i Milkà ary i Tiritsà. '
  '4':
  - type: text
    content: 'Nanatona an’i Elehazara mpisorona sy i Josoa zanakalahin’i Nona ary ireo loholom-bahoaka izy dimy mirahavavy ka nanao hoe:'
  - type: text
    content: –Ny TOMPO efa nandidy an’i Mosesy mba hanome anay zaratany eo anivon’ireo lehilahy mpiray foko aminay.
  - type: text
    content: 'Dia nisy zaratany nomena azy teo anivon’ireo lehilahy mpiray foko aminy araka ny didin’ny TOMPO. '
  '5':
  - type: text
    content: 'Koa nanana tsinjara folo ny fokon’i Manase ankoatry ny faritany Gilehada sy Basàna izay eny ampita atsinanan’i Jôrdàna, '
  '6':
  - type: text
    content: satria ny vehivavy taranak’i Manase dia nomena zaratany koa fa tsy ny lehilahy ihany. (Ny faritany Gilehada dia an’ireo Manasita hafa).
  '7':
  - type: text
    content: 'Ny velaran-tanin’i Manase dia mahafaoka hatreo Asera ka hatrany Mikmetata, any atsinanan’i Sekema; avy eo dia midina mianatsimo any amin’ny mponin’i Haîna-Tapoa. '
  '8':
  - type: text
    content: 'Ny faritanin’i Tapoa dia an’i Manase; fa ny tanànan’i Tapao izay eo amin’ny sisintany kosa dia an’ny Efraîmita. '
  '9':
  - type: text
    content: 'Avy eo ny sisin-tany dia midina atsimon’ny lohasahan-driakan’i Kanà, kanefa an’ny Efraîmita ireo tanàna eo atsimon’ny lohasahan-driaka na dia ao anatin’ny faritanin’i Manase aza. Dia mandalo any avaratry ny lohasahan-driaka indray ny sisin-tanin’i Manase ary mipaka amin’ny Ranomasina Mediteranea. '
