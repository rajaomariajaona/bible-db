document_id: JOS.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no zaratany navoakan’ny antsapaka ho an’ny fokon’i Manase izay lahimatoan’i Jôsefa. Teny atsinanan’i Jôrdàna, ny tarik’i Makira, lahimatoan’i Manase sady rain’i Gilehada, dia nomena ny faritany Gilehada sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ', satria miaramila mahery fo i Makira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny tany teny andrefan’i Jôrdàna kosa dia nomena ny Manasita sisa ho an’ireo tarika ao anatiny: dia ny tarik’i Abihezera, ny tarik’i Heleka, ny tarik’i Asriela, ny tarik’i Sekema, ny tarik’i Hefera, ny tarik’i Semidà. Tera-dehilahy taranak’i Manase izay zanakalahin’i Jôsefa ireo, samy araka ny tarika misy azy avy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Tselofehada, zanakalahin’i Hefera sy zafikelin’i Gilehada ary zafiafin’i Makira sy zafin-dohalik’i Manase, dia tsy mba niteraka zazalahy fa zazavavy ihany. Ka ireto avy no anarany: i Mahalà, i Nôhà, i Hôglà, i Milkà ary i Tiritsà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanatona an’i Elehazara mpisorona sy i Josoa zanakalahin’i Nona ary ireo loholom-bahoaka izy dimy mirahavavy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO efa nandidy an’i Mosesy mba hanome anay zaratany eo anivon’ireo lehilahy mpiray foko aminay.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nisy zaratany nomena azy teo anivon’ireo lehilahy mpiray foko aminy araka ny didin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa nanana tsinjara folo ny fokon’i Manase ankoatry ny faritany Gilehada sy Basàna izay eny ampita atsinanan’i Jôrdàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: satria ny vehivavy taranak’i Manase dia nomena zaratany koa fa tsy ny lehilahy ihany. (Ny faritany Gilehada dia an’ireo Manasita hafa).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny velaran-tanin’i Manase dia mahafaoka hatreo Asera ka hatrany Mikmetata, any atsinanan’i Sekema; avy eo dia midina mianatsimo any amin’ny mponin’i Haîna-Tapoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny faritanin’i Tapoa dia an’i Manase; fa ny tanànan’i Tapao izay eo amin’ny sisintany kosa dia an’ny Efraîmita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avy eo ny sisin-tany dia midina atsimon’ny lohasahan-driakan’i Kanà, kanefa an’ny Efraîmita ireo tanàna eo atsimon’ny lohasahan-driaka na dia ao anatin’ny faritanin’i Manase aza. Dia mandalo any avaratry ny lohasahan-driaka indray ny sisin-tanin’i Manase ary mipaka amin’ny Ranomasina Mediteranea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny tanin’i Efraîma dia mitomandavana mianatsimo fa ny an’i Manase kosa mianavaratra; ary ny Ranomasina Mediteranea no samy sisiny andrefana. Ny fokon’i Asera no eo avaratra andrefan’ny fokon’i Manase ary ny an’i Jisakara no eo avaratra atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tao amin’ny faritanin’i Jisakara sy i Asera dia nahazoan’ny fokon’i Manase an’ireto tanàna ireto: i Bety-Seana sy i Iblehama mbamin’ireo tanàna kely miankina aminy; i Dôra sy i Haîna-Dôra ary i Tahenàka sy i Megidao mbamin’ny mponina ao aminy avy sy ny tanàna kely samy miankina aminy, izany hoe ny faritanin’i Dôra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny faritanin’i Dôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny faritany telo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny havoana telo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy naharoaka an’ireo Kanahanita hiala tamin’ireo tanàna ireo anefa ny taranak’i Manase; koa mbola nipetrahan’ny Kanahanita ihany izany faritany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary na dia efa nihanatanjaka aza ny Israelita, dia tsy naharoaka ny Kanahanita mihitsy saingy nampanao azy asa fanompoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nitaraina tamin’i Josoa ny taranak’i Jôsefa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no anjara iray ihany tamin’ny antsapaka no mba nomenao anay, kanefa izahay efa tonga vahoaka marobe araka izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitahian
  - type: text
    text: ’ny TOMPO anay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia novalian’i Josoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tàhiny vahoaka marobe ianareo ka tery ho anareo ny havoanan’i Efraîma, dia mandehana any amin’ny tanin’ny Perizita sy ny Refaîta ka tevezo ny ala any hipetrahanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny faritra be havoana nisy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Perizita sy ny Refaîta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tokony ho teny atsinanan’i Jôrdàna.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy kosa ny taranak’i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ampy ho anay tokoa ny havoana, kanefa manana kalesy vy ireo Kanahanita rehetra monina ao amin’ny tany lemaka, na izay any Bety-Seana sy amin’ireo tanàna kely miankina aminy na izay any amin’ny lohasahan’i Jizrehela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kalesy vy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kalesy fitondra miady ka nofonosina vy ny kodiarany roa toy ny an’ny sarety. Ny kalesy vy dia nahatonga ny Kanahanita hanana fahombiazana kokoa tamin’ny ady an-tany lemaka. Izany no nakan’ny Israelita tamin’ny voalohany ireo faritra be havoana. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jizrehela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 19.18 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy i Josoa tamin’ny taranak’i Jôsefa, dia ny fokon’i Efraîma sy ny antsasa-pokon’i Manase tany andrefana:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Vahoaka marobe sady matanjaka tokoa ianareo, ka tsy anjara iray ihany no ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ho anareo koa ny havoana rakotra ala, dia hotevenareo ny ala ka halainareo ny vava ala; fa ho voaroakanareo ny Kanahanita na dia matanjaka sy manana kalesy vy aza ry zareo.
