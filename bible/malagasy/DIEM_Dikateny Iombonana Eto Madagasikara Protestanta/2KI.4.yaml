document_id: 2KI.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Elisà nanampy vehivavy mpitondratena iray
  - type: text
    content: Indray andro dia nisy vehivavy vadina lehilahy anisan’ny andia-
  - type: text
    content: mpaminany
  - type: text
    content: ', tonga nitaraina tamin’i Elisà nanao hoe:'
  - type: text
    content: –Maty ny vadiko mpanomponao, ary fantatrao fa nanaja ny TOMPO izy. Tonga ao anefa ny tompon-trosa haka ny zanako roa lahy mba handevoziny.
  '10':
  - type: text
    content: Tokony hanaovantsika efitrano
  - type: note
    content: Ampit 1 Mp 17.19 sy nta.
  - type: text
    content: ' kely ao ambony tafo marin-tampona ao ka hasiantsika farafara sy latabatra sy seza ary fitoeran-jiro ho azy. Ao no hipetrahany isaky ny mandalo eto amintsika.'
  '11':
  - type: text
    content: 'Indray andro dia tonga tao amin-dry zareo i Elisà ary niakatra tany amin’ilay efitrano ambony ka natory tao. '
  '12':
  - type: text
    content: 'Dia hoy izy tamin’i Gehazỳ mpanompony:'
  - type: text
    content: –Antsoy ilay vehivavy sonemita.
  - type: text
    content: 'Rehefa nantsoiny ravehivavy, dia tonga teo anoloan’ilay efitrano; '
  '13':
  - type: text
    content: 'ary niangavian’i Elisà i Gehazỳ hilaza aminy hoe:'
  - type: text
    content: –Efa nisahirana betsaka taminay ianao; koa inona kosa no hataonay ho anao? Tianao ve ny hiresahanay anao amin’ny mpanjaka na amin’ny filohan-tafika?
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Tsia! Fa eto anivon’ny mpiray foko amiko aho, ka monina feizay.
  '14':
  - type: text
    content: 'Ka hoy i Elisà:'
  - type: text
    content: –Fa mba inona àry no hatao ho azy?
  - type: text
    content: 'Dia namaly i Gehazỳ hoe:'
  - type: text
    content: –Indrisy fa tsy manan-janaka izy sady efa antitra ny vadiny.
  '15':
  - type: text
    content: 'Ary hoy i Elisà:'
  - type: text
    content: –Antsoy indray àry izy.
  - type: text
    content: 'Rehefa nantsoiny ravehivavy, dia tonga teo anoloan’ny varavaran’ilay efitrano '
  '16':
  - type: text
    content: 'ary nilazan’i Elisà hoe:'
  - type: text
    content: –Amin’ny herintaona tahaka izao dia hitrotro zazalahy ianao.
  - type: text
    content: 'Fa hoy kosa ravehivavy:'
  - type: text
    content: –Tsia, tompoko ô! Olon’Andriamanitra ianao ka aza mandainga amiko!
  '17':
  - type: text
    content: Bevohòka tokoa anefa ravehivavy; ka nony niherina ny taona, dia tera-dahy izy araka ny fotoanandro nolazain’i Elisà taminy.
  - type: heading
    content: Novelomin’i Elisà indray ny zanak’ilay vehivavy sonemita
  '18':
  - type: text
    content: 'Nihalehibe ny zaza; koa indray andro dia nankany amin-drainy tany am-pijinjam-barimbazaha izy, '
  '19':
  - type: text
    content: 'ary vetivety eo dia niteny taminy hoe:'
  - type: text
    content: –Dada ô! Maharary ahy loatra izany lohako izany!
  - type: text
    content: 'Ary hoy ny rainy tamin’ny mpanompony anankiray:'
  - type: text
    content: –Ento haingana any amin-dreniny izy.
  '2':
  - type: text
    content: 'Dia hoy i Elisà taminy:'
  - type: text
    content: –Inona àry no hataoko ho anao? Lazao ahy izay anananao ao an-trano.
  - type: text
    content: 'Fa hoy ny navalin’ilay vehivavy:'
  - type: text
    content: –Tsy manana na inona na inona aho afa-tsy ilomanitra indray mihosotra ihany.
  '20':
  - type: text
    content: 'Dia notrotroin’ilay mpanompo izy ka nentiny ho any amin-dreniny; ary nampofoin-dravehivavy izy mandra-pitataovovonan’ny andro, dia maty. '
  '21':
  - type: text
    content: 'Ary niakatra tao amin’ny efitranon’i Elisà ravehivavy ka nampandry ny zaza teo am-parafarany; dia nakatony ny varavarana. Avy teo izy lasa '
  '22':
  - type: text
    content: 'ka niantso ny vadiny nanao hoe:'
  - type: text
    content: '–Mba andefaso mpanompo iray miaraka amin’ny borikivavy iray aho; fa handeha faingana ho any amin’ilay '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' aho, dia hiverina indray.'
  '23':
  - type: text
    content: 'Fa hoy ny vadiny taminy:'
  - type: text
    content: '–Nahoana ianao no hankany aminy anio, nefa tsy fetin’ny tsinam-bolana na '
  - type: text
    content: sabata
  - type: text
    content: ' akory ny andro?'
  - type: text
    content: 'Hoy kosa ny navaliny:'
  - type: text
    content: –Aza manahy ianao!
  '24':
  - type: text
    content: 'Dia nanisy lasely ny borikivavy izy ary niteny tamin’ny mpanompony hoe:'
  - type: text
    content: –Andeha tariho ny boriky, ka aza mijanona mihitsy raha tsy baiko avy amiko.
  '25':
  - type: text
    content: Ary lasa ravehivavy nankany amin’ilay olon’Andriamanitra any an-tendrombohitra Karmela
  - type: note
    content: Jereo 2.25.
  - type: text
    content: '. Raha vao tazan’ilay olon’Andriamanitra avy lavitra ravehivavy, dia hoy i Elisà tamin’i Gehazỳ mpanompony:'
  - type: text
    content: '–Jereo fa ilay vehivavy sonemita iry. '
  '26':
  - type: text
    content: Mba mihazakazaha ianao hitsena azy ary anontanio raha toa ka tsara ihany izy sy ny vady aman-janany.
  - type: text
    content: 'Dia namaly an’i Gehazỳ ilay vehivavy fa tsara ihany izy mianakavy. '
  '27':
  - type: text
    content: 'Rehefa tonga teo akaikin’i Elisà teo an-tendrombohitra anefa izy, dia niantoraka teo an-tongony; nanatona hampiala azy i Gehazỳ, saingy nitenenan’i Elisà hoe:'
  - type: text
    content: –Aoka ihany izy, fa vonton’alahelo; ary nafenin’ny TOMPO ahy ny anton’izany fa tsy nampahafantariny ahy.
  '28':
  - type: text
    content: 'Tamin’izay indrindra, dia hoy ilay vehivavy:'
  - type: text
    content: '–Moa nangataka zanaka taminao va aho, tompoko? Tsy efa nilazako ve ianao hoe: «Aza mampanantena volana ahy.»'
  '29':
  - type: text
    content: 'Hoy i Elisà tamin’i Gehazỳ:'
  - type: text
    content: '–Mivonòna ianao handeha! Raiso ny tehiko maha '
  - type: text
    content: mpaminany
  - type: text
    content: ' ahy, dia mankanesa any Sonema. Raha mifanena amin’olona ianao eny an-dalana, dia aza mijanona hiarahaba azy; ary raha misy miarahaba anao, dia aza mamaly akory. Rehefa mby any ianao, dia atehefo eo amin’ny tavan’ny zaza ny tehiko.'
  '3':
  - type: text
    content: 'Ary hoy indray i Elisà:'
  - type: text
    content: '–Mandehana mindrana tavoara foana amin’izay mpiara-monina aminao rehetra, kanefa aza atao vitsy. '
  '30':
  - type: text
    content: 'Fa hoy ny renin’ny zaza tamin’i Elisà:'
  - type: text
    content: –Velona ny TOMPO ary velona ny ainao, ka manizingizina aho fa tsy hiala eto raha tsy tafaraka aminao.
  - type: text
    content: 'Ary lasa tokoa ilay olon’Andriamanitra ka niara-dia taminy. '
  '31':
  - type: text
    content: 'Efa tonga talohany kosa i Gehazỳ ka nametraka ny tehin’i Elisà teo amin’ny tavan’ny zaza, nefa tsy nisy feo na koa fihetsehana. Dia niverina tany amin’ny mpaminany izy ka tojo azy ary nilaza taminy hoe:'
  - type: text
    content: –Tsy nahatsiaro akory ny zaza.
  '32':
  - type: text
    content: 'Rehefa tonga tao an-trano i Elisà, dia mbola mivalampatra eo ambony farafara ilay zaza maty. '
  '33':
  - type: text
    content: 'Dia niditra izy ka nihidy aman-trano niaraka tamin’ny zaza ary nivavaka tamin’ny TOMPO. '
  '34':
  - type: text
    content: 'Dia nandry teo ambonin’ny zaza izy ka vava tandrifin’ny vavany sy maso tandrifin’ny masony ary tanana tandrifin’ny tanany. Koa raha mbola nijanona teo amboniny izy dia nihanafana ny tenan’ilay zaza. '
  '35':
  - type: text
    content: 'Nitsangana i Elisà ka niasa dia eran-trano ary niverina niampatra indray teo ambonin’ny zaza. Tampoka teo anefa dia nievina impito ilay zaza ka nihiratra. '
  '36':
  - type: text
    content: 'Nantsoin’i Elisà i Gehazỳ ka nitenenany hoe:'
  - type: text
    content: –Ndeha antsoy ilay Sonemita!
  - type: text
    content: 'Dia laza izy niantso azy; koa nony nankao amin’i Elisà ravehivavy dia nilazany hoe:'
  - type: text
    content: –Raiso ny zanakao.
  '37':
  - type: text
    content: Dia nandroso ravehivavy ka niantoraka teo an-tongotry ny mpaminany sady niankohoka nitehi-tany ho fanajana azy. Noraisiny ny zanany ary lasa izy nivoaka ny efitrano.
  - type: heading
    content: Ilay lasopy tsy azo nohanina
  '38':
  - type: text
    content: Niverina nankany Gilgala i Elisà. Nanjakan’ny mosary
  - type: note
    content: 'ny mosary: mety ho ilay mosary fito taona voalaza ao amin’ny 8.1. –Gilgala: jereo 2.1.'
  - type: text
    content: ' ny tany tamin’izay ka novoriny teo anatrehany ny andia-mpaminany; sady hoy izy tamin’ny mpanompony:'
  - type: text
    content: –Ataingeno eo ambony fatana ny vilany lehibe ary manaova lasopy ho an’ny andia-
  - type: text
    content: mpaminany
  - type: text
    content: .
  '39':
  - type: text
    content: Dia lasa hitsongo anana tany an-tsaha ny mpaminany iray, ka nahita zava-maniry mandadina niotazany voatangom-bazaha
  - type: note
    content: Ny voatangom-bazaha dia boribory, mangidy sady mahery mampivalana.
  - type: text
    content: '; dia nahangona iray trotroana tamin’izany izy. Ary nony tafaverina izy, dia notetehiny madinika ireo ka narotsany am-bilany fa tsy nisy nahafantatra. '
  '4':
  - type: text
    content: Rahefa izany, dia mihidia aman-trano miaraka amin’ireo zanakao; koa aidino amin’ireo tavoara rehetra ireo ny ilomanitra, ary atokano izay feno.
  '40':
  - type: text
    content: 'Rehefa naroso anefa izany lasopy izany, ka samy nanandrana ny olona, dia nitaraina hoe:'
  - type: text
    content: –Voapoizina ny lasopy, ry olon’Andriamanitra ô!
  - type: text
    content: 'Ary tsy azo nohanina tokoa izany. '
  '41':
  - type: text
    content: 'Fa niangavian’i Elisà kosa ny hitondrana lafarinina. Dia nandrotsaka izany tao am-bilany izy, vao niteny hoe:'
  - type: text
    content: –Andoary amin’izay ny olona ary aoka izy hihinana!
  - type: text
    content: Koa nanjary fihinana indray ny tao am-bilany.
  - type: heading
    content: I Elisà namahana olona zato
  '42':
  - type: text
    content: Nisy lehilahy tonga avy any Bahala-Salisà
  - type: note
    content: Toerana tsy fantatra mazava ao amin’ny fokon’i Efraîma tokony ho tao amin’ny faritr’i Salisà izany; jereo 1 Sam 9.4.
  - type: text
    content: ' izay nitondra mofo ôrza roapolo sy varim-bazaha iray kitapo santa-bokatra ho an’ity '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: '. Dia nilazan’i Elisà ny mpanompony mba hizara ireo hohanin’ny olona; '
  '43':
  - type: text
    content: 'fa hoy kosa ilay mpanompony:'
  - type: text
    content: –Fomba ahoana no hamahanako olona zato amin’ireo?
  - type: text
    content: 'Ary hoy indray i Elisà:'
  - type: text
    content: '–Zarao amin’ny olona rehetra ireo hohaniny, satria izao no lazain’ny TOMPO: «Hihinana sahaza ny olona ary mbola hisy aza sisa tsy lany.»'
  '44':
  - type: text
    content: Dia notsinjarain’ilay mpanompo tamin’ny olona ny mofo ka samy nihinana avokoa ny tsirairay ary mbola nisy aza sisa tsy lany araka ny voalazan’ny TOMPO.
  '5':
  - type: text
    content: 'Dia lasa ravehivavy nihidy aman-trano niaraka tamin’ny zanany; ary ireto zanany nanolotra ny tavoara, fa izy kosa nameno izany. '
  '6':
  - type: text
    content: 'Rehefa elaela, dia hoy ravehivavy tamin’ny zanany anankiray:'
  - type: text
    content: –Mbola itondray tavoara hafa koa aho.
  - type: text
    content: 'Kanjo feno avokoa ireo tavoara teo, ka hoy izy hoe:'
  - type: text
    content: –Tsy misy intsony!
  - type: text
    content: 'Dia tankina teo koa ny ilomanitra. '
  '7':
  - type: text
    content: 'Ary lasa ravehivavy nitantara ny zava-nitranga tamin’ilay olon’Andriamanitra, izay nilaza taminy hoe:'
  - type: text
    content: –Andeha amidio izany ilomanitra izany hanefanao ny trosan’olona; fa izay vola sisa kosa dia hivelomanao sy ireo zanakao.
  - type: heading
    content: I Elisà tao an-tanànan’i Sonema
  '8':
  - type: text
    content: Indray andro dia nandalo tao Sonema
  - type: note
    content: 'Sonema: jereo 1 Mp 1.3-4 sy nta.'
  - type: text
    content: ' i Elisà. Nisy vehivavy mpanankarena iray tao izay nanery azy mafy mba hisakafo ao aminy. Ary isaky ny mandalo eo izy, dia nivily ao aminy mba hisakafo.'
  '9':
  - type: text
    content: 'Ary hoy izany vehivavy izany tamin’ny vadiny:'
  - type: text
    content: '–Fantatro fa tena '
  - type: text
    content: mpaminany
  - type: text
    content: ' masin’Andriamanitra iny lehilahy mpankàto amintsika matetika iny. '
