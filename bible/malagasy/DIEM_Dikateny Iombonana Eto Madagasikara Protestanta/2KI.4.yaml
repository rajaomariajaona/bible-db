document_id: 2KI.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisà nanampy vehivavy mpitondratena iray
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indray andro dia nisy vehivavy vadina lehilahy anisan’ny andia-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', tonga nitaraina tamin’i Elisà nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Maty ny vadiko mpanomponao, ary fantatrao fa nanaja ny TOMPO izy. Tonga ao anefa ny tompon-trosa haka ny zanako roa lahy mba handevoziny.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tokony hanaovantsika efitrano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1 Mp 17.19 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' kely ao ambony tafo marin-tampona ao ka hasiantsika farafara sy latabatra sy seza ary fitoeran-jiro ho azy. Ao no hipetrahany isaky ny mandalo eto amintsika.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indray andro dia tonga tao amin-dry zareo i Elisà ary niakatra tany amin’ilay efitrano ambony ka natory tao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy izy tamin’i Gehazỳ mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Antsoy ilay vehivavy sonemita.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nantsoiny ravehivavy, dia tonga teo anoloan’ilay efitrano; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary niangavian’i Elisà i Gehazỳ hilaza aminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nisahirana betsaka taminay ianao; koa inona kosa no hataonay ho anao? Tianao ve ny hiresahanay anao amin’ny mpanjaka na amin’ny filohan-tafika?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia! Fa eto anivon’ny mpiray foko amiko aho, ka monina feizay.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ka hoy i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa mba inona àry no hatao ho azy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly i Gehazỳ hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indrisy fa tsy manan-janaka izy sady efa antitra ny vadiny.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Antsoy indray àry izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nantsoiny ravehivavy, dia tonga teo anoloan’ny varavaran’ilay efitrano '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary nilazan’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amin’ny herintaona tahaka izao dia hitrotro zazalahy ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tompoko ô! Olon’Andriamanitra ianao ka aza mandainga amiko!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Bevohòka tokoa anefa ravehivavy; ka nony niherina ny taona, dia tera-dahy izy araka ny fotoanandro nolazain’i Elisà taminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Novelomin’i Elisà indray ny zanak’ilay vehivavy sonemita
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nihalehibe ny zaza; koa indray andro dia nankany amin-drainy tany am-pijinjam-barimbazaha izy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary vetivety eo dia niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dada ô! Maharary ahy loatra izany lohako izany!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny rainy tamin’ny mpanompony anankiray:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento haingana any amin-dreniny izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy i Elisà taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona àry no hataoko ho anao? Lazao ahy izay anananao ao an-trano.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navalin’ilay vehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy manana na inona na inona aho afa-tsy ilomanitra indray mihosotra ihany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia notrotroin’ilay mpanompo izy ka nentiny ho any amin-dreniny; ary nampofoin-dravehivavy izy mandra-pitataovovonan’ny andro, dia maty. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary niakatra tao amin’ny efitranon’i Elisà ravehivavy ka nampandry ny zaza teo am-parafarany; dia nakatony ny varavarana. Avy teo izy lasa '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ka niantso ny vadiny nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mba andefaso mpanompo iray miaraka amin’ny borikivavy iray aho; fa handeha faingana ho any amin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: ' aho, dia hiverina indray.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa hoy ny vadiny taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianao no hankany aminy anio, nefa tsy fetin’ny tsinam-bolana na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' akory ny andro?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza manahy ianao!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nanisy lasely ny borikivavy izy ary niteny tamin’ny mpanompony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha tariho ny boriky, ka aza mijanona mihitsy raha tsy baiko avy amiko.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary lasa ravehivavy nankany amin’ilay olon’Andriamanitra any an-tendrombohitra Karmela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.25.
      marker-yv: yv-n
    - type: text
      text: '. Raha vao tazan’ilay olon’Andriamanitra avy lavitra ravehivavy, dia hoy i Elisà tamin’i Gehazỳ mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Jereo fa ilay vehivavy sonemita iry. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mba mihazakazaha ianao hitsena azy ary anontanio raha toa ka tsara ihany izy sy ny vady aman-janany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Gehazỳ ilay vehivavy fa tsara ihany izy mianakavy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rehefa tonga teo akaikin’i Elisà teo an-tendrombohitra anefa izy, dia niantoraka teo an-tongony; nanatona hampiala azy i Gehazỳ, saingy nitenenan’i Elisà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ihany izy, fa vonton’alahelo; ary nafenin’ny TOMPO ahy ny anton’izany fa tsy nampahafantariny ahy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tamin’izay indrindra, dia hoy ilay vehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa nangataka zanaka taminao va aho, tompoko? Tsy efa nilazako ve ianao hoe: «Aza mampanantena volana ahy.»'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hoy i Elisà tamin’i Gehazỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mivonòna ianao handeha! Raiso ny tehiko maha '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ahy, dia mankanesa any Sonema. Raha mifanena amin’olona ianao eny an-dalana, dia aza mijanona hiarahaba azy; ary raha misy miarahaba anao, dia aza mamaly akory. Rehefa mby any ianao, dia atehefo eo amin’ny tavan’ny zaza ny tehiko.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy indray i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mindrana tavoara foana amin’izay mpiara-monina aminao rehetra, kanefa aza atao vitsy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa hoy ny renin’ny zaza tamin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ary velona ny ainao, ka manizingizina aho fa tsy hiala eto raha tsy tafaraka aminao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lasa tokoa ilay olon’Andriamanitra ka niara-dia taminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Efa tonga talohany kosa i Gehazỳ ka nametraka ny tehin’i Elisà teo amin’ny tavan’ny zaza, nefa tsy nisy feo na koa fihetsehana. Dia niverina tany amin’ny mpaminany izy ka tojo azy ary nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy nahatsiaro akory ny zaza.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Rehefa tonga tao an-trano i Elisà, dia mbola mivalampatra eo ambony farafara ilay zaza maty. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia niditra izy ka nihidy aman-trano niaraka tamin’ny zaza ary nivavaka tamin’ny TOMPO. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia nandry teo ambonin’ny zaza izy ka vava tandrifin’ny vavany sy maso tandrifin’ny masony ary tanana tandrifin’ny tanany. Koa raha mbola nijanona teo amboniny izy dia nihanafana ny tenan’ilay zaza. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nitsangana i Elisà ka niasa dia eran-trano ary niverina niampatra indray teo ambonin’ny zaza. Tampoka teo anefa dia nievina impito ilay zaza ka nihiratra. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nantsoin’i Elisà i Gehazỳ ka nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha antsoy ilay Sonemita!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia laza izy niantso azy; koa nony nankao amin’i Elisà ravehivavy dia nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ny zanakao.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Dia nandroso ravehivavy ka niantoraka teo an-tongotry ny mpaminany sady niankohoka nitehi-tany ho fanajana azy. Noraisiny ny zanany ary lasa izy nivoaka ny efitrano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lasopy tsy azo nohanina
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Niverina nankany Gilgala i Elisà. Nanjakan’ny mosary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny mosary: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho ilay mosary fito taona voalaza ao amin’ny 8.1. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gilgala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 2.1.'
      marker-yv: yv-n
    - type: text
      text: ' ny tany tamin’izay ka novoriny teo anatrehany ny andia-mpaminany; sady hoy izy tamin’ny mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataingeno eo ambony fatana ny vilany lehibe ary manaova lasopy ho an’ny andia-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Dia lasa hitsongo anana tany an-tsaha ny mpaminany iray, ka nahita zava-maniry mandadina niotazany voatangom-bazaha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny voatangom-bazaha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia boribory, mangidy sady mahery mampivalana.
      marker-yv: yv-n
    - type: text
      text: '; dia nahangona iray trotroana tamin’izany izy. Ary nony tafaverina izy, dia notetehiny madinika ireo ka narotsany am-bilany fa tsy nisy nahafantatra. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rahefa izany, dia mihidia aman-trano miaraka amin’ireo zanakao; koa aidino amin’ireo tavoara rehetra ireo ny ilomanitra, ary atokano izay feno.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Rehefa naroso anefa izany lasopy izany, ka samy nanandrana ny olona, dia nitaraina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Voapoizina ny lasopy, ry olon’Andriamanitra ô!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy azo nohanina tokoa izany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Fa niangavian’i Elisà kosa ny hitondrana lafarinina. Dia nandrotsaka izany tao am-bilany izy, vao niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andoary amin’izay ny olona ary aoka izy hihinana!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nanjary fihinana indray ny tao am-bilany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisà namahana olona zato
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Nisy lehilahy tonga avy any Bahala-Salisà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toerana tsy fantatra mazava ao amin’ny fokon’i Efraîma tokony ho tao amin’ny faritr’i Salisà izany; jereo 1 Sam 9.4.
      marker-yv: yv-n
    - type: text
      text: ' izay nitondra mofo ôrza roapolo sy varim-bazaha iray kitapo santa-bokatra ho an’ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: '. Dia nilazan’i Elisà ny mpanompony mba hizara ireo hohanin’ny olona; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'fa hoy kosa ilay mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fomba ahoana no hamahanako olona zato amin’ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Zarao amin’ny olona rehetra ireo hohaniny, satria izao no lazain’ny TOMPO: «Hihinana sahaza ny olona ary mbola hisy aza sisa tsy lany.»'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Dia notsinjarain’ilay mpanompo tamin’ny olona ny mofo ka samy nihinana avokoa ny tsirairay ary mbola nisy aza sisa tsy lany araka ny voalazan’ny TOMPO.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia lasa ravehivavy nihidy aman-trano niaraka tamin’ny zanany; ary ireto zanany nanolotra ny tavoara, fa izy kosa nameno izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Rehefa elaela, dia hoy ravehivavy tamin’ny zanany anankiray:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola itondray tavoara hafa koa aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo feno avokoa ireo tavoara teo, ka hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy misy intsony!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tankina teo koa ny ilomanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary lasa ravehivavy nitantara ny zava-nitranga tamin’ilay olon’Andriamanitra, izay nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha amidio izany ilomanitra izany hanefanao ny trosan’olona; fa izay vola sisa kosa dia hivelomanao sy ireo zanakao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisà tao an-tanànan’i Sonema
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Indray andro dia nandalo tao Sonema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sonema: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 1.3-4 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' i Elisà. Nisy vehivavy mpanankarena iray tao izay nanery azy mafy mba hisakafo ao aminy. Ary isaky ny mandalo eo izy, dia nivily ao aminy mba hisakafo.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy izany vehivavy izany tamin’ny vadiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatro fa tena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' masin’Andriamanitra iny lehilahy mpankàto amintsika matetika iny. '
