document_id: 3JN.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity taratasy ity dia avy amin’ilay loholona ihany koa (and 1; jereo 2 Jôh 1) ary alefany ho an’ny olona anankiray atao hoe Gaio. Tsy misy zavatra fantatsika ny amin’i Gaio, afa-tsy hoe izy mifikitra amin’ny hafatra marim-pototra. Izany toetrany izany dia mifanohitra amin’ny an’i Diôtrèfa izay kristianina to teny teo amin’ny Fiangonana misy an’i Gaio, kanefa miampanga lainga ilay loholona mpanoratra sady tsy mazoto mampiantrano ireo havana iray finoana sendra mivahiny.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Araka izany àry dia midera an’i Gaio ny mpanoratra noho izy io mifikitra amin’ny hafatra marim-pototra ary koa manao asa soa amin’ny mpino (1-8); velon-taraina kosa ny mpanoratra noho ny fitondrantena asehon’i Diôtrèfa (9-10); ary ambarany avy eo ny laza tsara ananan’ny kristianina anankiray hafa atao hoe Demètry. Ny amaranan’ny mpanoratra ny taratasiny dia filazana ny hahatongavany hitsidika sy fampitana ny famangian’ireo sakaiza (13-5).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Azo marihina, araka ity taratasy ity, fa ny mampiantrano vahiny sy ny mandray tsara ireo havana iray finoana dia isan’ny endrika isehoan’ny fitiavana sy isehoan’ny toe-panahy mifikitra amin’ny hafatra marim-pototra.
