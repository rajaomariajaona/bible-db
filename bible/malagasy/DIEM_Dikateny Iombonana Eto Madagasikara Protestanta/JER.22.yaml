  - type: text
    text: Nilamina erỳ ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: niteronterona teny Libano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanana akany tao anatin’ny sedera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fisian’ny andry sy fanaka sedera tao amin’ny lapan’ny mpanjaka tao Jerosalema (jereo 21.14; 22.6-7) dia nitarika ny mpaminany hanao sary an’ohatra amin’ny tendrombohitra mitomandavana any Libano.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo akory izato sentonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nahazo anao tampoka ny fanaintainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fahararin’ny vehivavy miteraka!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Momba an’i Kônià, zanakalahin’i Jôiakima
  marker-yv: yv-h
