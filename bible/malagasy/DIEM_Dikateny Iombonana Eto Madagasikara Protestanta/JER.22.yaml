  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hoy ny teny hentitry ny TOMPO hoe: «Velona Aho ka mianiana fa na dia toy ny peratra fanombohan-kase eo an-tanako havanana aza ianao, ry Kônià'
  - type: usfm
