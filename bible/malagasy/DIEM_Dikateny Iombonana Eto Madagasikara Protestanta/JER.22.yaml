segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no voalazan’ny TOMPO tamin’i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Midîna any an-dapan’ny mpanjakan’i Joda ianao ka ambarao any ity hafatra ity '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary lazao hoe: «Mihainoa ny tenin’ny TOMPO ianao, ry mpanjakan’i Joda izay mipetraka eo amin’ny sezafiandrianan’i Davida, dia ianao sy ny manamboninahitrao ary ny vahoakanao izay miditra amin’ireto vavahadin’ny lapa ireto.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’ny TOMPO: Mampihara ny rariny sy ny hitsiny, afaho eny an-tanan’ny mpitsentsitra ireo olona volosany. Aza mampijaly na misetrasetra ny vahiny sy ny kamboty ary ny mpitondratena; ary aza mamono ho faty ny tsy manan-tsiny amin’ity toerana ity. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha manaraka tokoa izao teny izao ianareo, dia mbola hisy ihany mpanjaka hipetraka eo amin’ny sezafiandrianan’i Davida, ka handehandeha mitaingin-tsoavaly na kalesy. Ho afaka mandalo hatrany amin’ny vavahadin’ity lapa ity izy sy ny manamboninahiny ary ny vahoakany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha tsy hihaino izany hafatra izany kosa ianareo, dia ny tenako no ianianako ary Izaho TOMPO no miteny hentitra, fa ho rava tokoa ity lapa ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 23.38; Lk 13.35.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny, izao no lazaiko momba ny lapan’ny mpanjakan’i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia tsara tahaka ny alan’i Gilehada,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny tendron’i Libano aza ianao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hataoko tonga taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tanàna tsy misy mponina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanetsika mpandrava hamely anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mpandrava izay samy ary fitaovana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hokapainy ny sederanao voafantina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatsipiny any anaty afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Firenena maro no handalo eo akaikin’ity tanàna ity ka hifanontany hoe: inona no antony nahatonga ny TOMPO hamely ity tanàna ity tahaka izao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hovaliana hoe: «Satria nandao ny fanekempihavanan’ny TOMPO Andriamaniny izy, ka niankohoka tamin’ny andriamani-kafa sady nivavaka tamin’ireny.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’i Salòma, mpandimby an’i Josià
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry olon’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza itomanianareo ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia i Jôsià mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza anaovanareo fisaonana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa itomanio dia itomanio kosa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Maty tamin’ny ady tao Megidao tamin’ny 609 tal J.K i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôsià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 2 Mp 23.29-30). Ny zanany lahy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joahaza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', nantsoina koa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salòma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 11; 1 Tan 3.15), no nanjaka nandimby nandritra ny telo volana mialoha ny nanondranana azy ho sesi-tany tany Ejipta (jereo 2 Mp 23.30-34; 2 Tan 36.1-4).'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay handeha, dia i Salòma mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy hiverina intsony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hahita intsony ny tany nahaterahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, izao no lazain’ny TOMPO ny amin’i Salòma mpanjakan’i Joda izay nandimby an’i Jôsià rainy ary vao nandao ity toerana ity: «Tsy hiverina intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho faty any amin’ny toerana izay nitondrana azy ho babo any izy, fa tsy hahita ity tany ity intsony.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsikerana an’i Jôiakima
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lozanao, ry Jôiakima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôiakima, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanakalahin’i Jôsià iray hafa koa izay notendren’ny Farao Nekao ho mpanjaka hisolo an’i Joahaza-Salòma. Nanjaka nandritra ny taona 609-598 tal J.K izy (jereo 2 Mp 23.34–24.6; 2 Tan 36.5-7).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nanorina ny lapanao ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy araka ny hitsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nanampy rihana ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy araka ny rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nampiasainao maina ny namanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nomenao ny karamany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hoy ianao anakamponao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Manorina lapa miezinezina ho ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ny rihana malalaka».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia loahanao hisy varavaran-kely izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady petahanao valin-drihana sedera
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nasainao nolokoana mena ny rindriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Te haneho ny maha mpanjaka ve ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nifidy ny hazo sedera
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hampaningana anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy nihinana sy nisotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny besinimaro ve ny rainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nampihatra ny rariny sy ny hitsiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahitany hasambarana izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Notsarainy ara-drariny tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mahantra sy ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahitany hasambarana izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy izay manao toy izany ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tena mahalala marina Ahy TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra ambarako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ianao kosa tsy nijery
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny tombontsoanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao kosa tsy nieritreritra
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny hamono ny tsy manan-tsiny ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hanao famoretana sy herisetra.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noho izany, dia izao no lazain’ny TOMPO ny amin’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha maty izy, dia tsy hisaonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na hifampitenenan’ny olona hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Loza ity, ry rahalahy! Loza ity, ranadahy!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Loza ity, ry rahavavy! Loza ity, ranabavy!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsy hisy hitomany azy ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indrisy, ry tompokolahy!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indrisy, ry ilay hajaina!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Halevina toy ny fandevina boriky izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fatiny hotaritarihina sy hariana
- type: usfm
  marker: q1
  children:
  - type: text
    text: any ivelan’ny vavahadin’i Jerosalema.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Henatra sy fahafaham-baràka ho an’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Miakara any an-tampon’i Libano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manaova koka lava, ry Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ataovy re any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' ny feonao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaova koka lava
- type: usfm
  marker: q1
  children:
  - type: text
