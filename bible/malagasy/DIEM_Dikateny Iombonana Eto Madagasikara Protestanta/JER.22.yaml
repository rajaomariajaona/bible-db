    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kônià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fanafohezana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jekônià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (24.1), anarana hafa niantsoana ny mpanjaka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jôiakina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Efa nanjaka telo volana izy raha tonga ny fiondranam-babo voalohany tamin’ny 597 tal J.K; jereo 2 Mp 24.8-16; 2 Tan 36.8-10.
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Jôiakima sady mpanjakan’i Joda, dia hoesoriko hiala eo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hatolotro ho eo an-tanan’ireo mitady hahafaty anao ianao, dia ireo olona atahoranao fatratra, izany hoe i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' sy ny andian-tafiny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Horoahiko ianao sy ny reninao ho any amin’ny tany izay hafa noho ny tany nahaterahanareo, ka any no hahafatesanareo mianaka. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Haniry mafy hiverina atỳ amin’ny taninareo ianareo, nefa tsy ho tafaverina atỳ intsony.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ao ny manontany hoe: «Moa vilany vaky tsy ilaina ve na fanaka tsy misy vidiny intsony ity lehilahy atao hoe Kônià ity? Nahoana no nakifika izy sy ny taranany ka noroahina ho any amin’ny tany tsy fantany akory?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '–Ry taniko ô, ry taniko ô, ry taniko ô, henoy ny tenin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izao no lazainy: «Aoka iny lehilahy iny hosoratana ho toy ny tsy niteraka sady tsy nahomby tamin’ny androm-piainany. Fa tsy hisy taranany hahazo hipetraka hanjaka eo amin’ny sezafiandrianan’i Davida na hifehy an’i Joda intsony.»'
