  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Miakara... Jerosalema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'eto, toy ny any an-toeran-kafa dia aseho ho miendrika olona amin’ny toetran’ny vehivavy tanora iray i Jerosalema. –Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: havoanan’i Habarima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tangoron-tendrombohitra misy ny tendrombohitra Nebao (ampit Nom 27.12; Deot 32.49), any avaratry ny faritanin’i Môaba.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
