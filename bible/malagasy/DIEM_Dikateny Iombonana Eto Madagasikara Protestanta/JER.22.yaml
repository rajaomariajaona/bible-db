document_id: JER.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no voalazan’ny TOMPO tamin’i Jeremià:'
  - type: text
    content: '–Midîna any an-dapan’ny mpanjakan’i Joda ianao ka ambarao any ity hafatra ity '
  '10':
  - type: text
    content: Ry olon’i Joda,
  - type: text
    content: Aza itomanianareo ny maty,
  - type: text
    content: dia i Jôsià mpanjaka;
  - type: text
    content: ary aza anaovanareo fisaonana izy;
  - type: text
    content: fa itomanio dia itomanio kosa
  - type: note
    content: Maty tamin’ny ady tao Megidao tamin’ny 609 tal J.K i Jôsià (jereo 2 Mp 23.29-30). Ny zanany lahy Joahaza, nantsoina koa hoe Salòma (jereo and 11; 1 Tan 3.15), no nanjaka nandimby nandritra ny telo volana mialoha ny nanondranana azy ho sesi-tany tany Ejipta (jereo 2 Mp 23.30-34; 2 Tan 36.1-4).
  - type: text
    content: ilay handeha, dia i Salòma mpanjaka,
  - type: text
    content: satria tsy hiverina intsony izy
  - type: text
    content: ka tsy hahita intsony ny tany nahaterahany.
  '11':
  - type: text
    content: 'Eny, izao no lazain’ny TOMPO ny amin’i Salòma mpanjakan’i Joda izay nandimby an’i Jôsià rainy ary vao nandao ity toerana ity: «Tsy hiverina intsony izy. '
  '12':
  - type: text
    content: Ho faty any amin’ny toerana izay nitondrana azy ho babo any izy, fa tsy hahita ity tany ity intsony.»
  - type: heading
    content: Fitsikerana an’i Jôiakima
  '13':
  - type: text
    content: Lozanao, ry Jôiakima
  - type: note
    content: I Jôiakima, zanakalahin’i Jôsià iray hafa koa izay notendren’ny Farao Nekao ho mpanjaka hisolo an’i Joahaza-Salòma. Nanjaka nandritra ny taona 609-598 tal J.K izy (jereo 2 Mp 23.34–24.6; 2 Tan 36.5-7).
  - type: text
    content: ','
  - type: text
    content: fa nanorina ny lapanao ianao
  - type: text
    content: nefa tsy araka ny hitsiny,
  - type: text
    content: ary nanampy rihana ianao
  - type: text
    content: nefa tsy araka ny rariny
  - type: text
    content: fa nampiasainao maina ny namanao
  - type: text
    content: ka tsy nomenao ny karamany.
  '14':
  - type: text
    content: 'Hoy ianao anakamponao hoe:'
  - type: text
    content: «Manorina lapa miezinezina ho ahy aho
  - type: text
    content: miaraka amin’ny rihana malalaka».
  - type: text
    content: Dia loahanao hisy varavaran-kely izy
  - type: text
    content: sady petahanao valin-drihana sedera
  - type: text
    content: ary nasainao nolokoana mena ny rindriny.
  '15':
  - type: text
    content: Te haneho ny maha mpanjaka ve ianao
  - type: text
    content: ka nifidy ny hazo sedera
  - type: text
    content: mba hampaningana anao?
  - type: text
    content: Moa tsy nihinana sy nisotro
  - type: text
    content: tahaka ny besinimaro ve ny rainao
  - type: text
    content: sady nampihatra ny rariny sy ny hitsiny?
  - type: text
    content: Ary nahitany hasambarana izany.
  '16':
  - type: text
    content: Notsarainy ara-drariny tokoa
  - type: text
    content: ny mahantra sy ny malahelo;
  - type: text
    content: ary nahitany hasambarana izany.
  - type: text
    content: Moa tsy izay manao toy izany ve
  - type: text
    content: no tena mahalala marina Ahy TOMPO,
  - type: text
    content: hoy ny teny hentitra ambarako?
  '17':
  - type: text
    content: Fa ianao kosa tsy nijery
  - type: text
    content: afa-tsy ny tombontsoanao,
  - type: text
    content: ianao kosa tsy nieritreritra
  - type: text
    content: afa-tsy ny hamono ny tsy manan-tsiny ho faty
  - type: text
    content: ary ny hanao famoretana sy herisetra.»
  '18':
  - type: text
    content: 'Noho izany, dia izao no lazain’ny TOMPO ny amin’i Jôiakima, zanakalahin’i Jôsià sady mpanjakan’i Joda:'
  - type: text
    content: Raha maty izy, dia tsy hisaonana,
  - type: text
    content: 'na hifampitenenan’ny olona hoe:'
  - type: text
    content: «Loza ity, ry rahalahy! Loza ity, ranadahy!»
  - type: text
    content: «Loza ity, ry rahavavy! Loza ity, ranabavy!»
  - type: text
    content: 'Tsy hisy hitomany azy ka hanao hoe:'
  - type: text
    content: «Indrisy, ry tompokolahy!»
  - type: text
    content: «Indrisy, ry ilay hajaina!»
  '19':
  - type: text
    content: Halevina toy ny fandevina boriky izy;
  - type: text
    content: ka ny fatiny hotaritarihina sy hariana
  - type: text
    content: any ivelan’ny vavahadin’i Jerosalema.
  - type: heading
    content: Henatra sy fahafaham-baràka ho an’i Jerosalema.
  '2':
  - type: text
    content: 'ary lazao hoe: «Mihainoa ny tenin’ny TOMPO ianao, ry mpanjakan’i Joda izay mipetraka eo amin’ny sezafiandrianan’i Davida, dia ianao sy ny manamboninahitrao ary ny vahoakanao izay miditra amin’ireto vavahadin’ny lapa ireto.» '
  '20':
  - type: text
    content: Miakara any an-tampon’i Libano
  - type: text
    content: ka manaova koka lava, ry Jerosalema;
  - type: text
    content: 'ataovy re any '
  - type: text
    content: Basàna
  - type: text
    content: ' ny feonao'
  - type: text
    content: manaova koka lava
  - type: text
    content: eny amin’ny havoanan’i Habarima
  - type: note
    content: 'Miakara... Jerosalema: eto, toy ny any an-toeran-kafa dia aseho ho miendrika olona amin’ny toetran’ny vehivavy tanora iray i Jerosalema. –Ny havoanan’i Habarima: tangoron-tendrombohitra misy ny tendrombohitra Nebao (ampit Nom 27.12; Deot 32.49), any avaratry ny faritanin’i Môaba.'
  - type: text
    content: fa potika ny sakaizanao rehetra.
  '21':
  - type: text
    content: Efa nampitandrina anao Aho
  - type: text
    content: fony ianao nandry fahalemana
  - type: text
    content: 'nefa novalianao hoe: «Tsy te hihaino aho.»'
  - type: text
    content: Fanaonao hatramin’ny fahazazana izany
  - type: text
    content: ka tsy nety nihaino ny feoko mihitsy ianao.
  '22':
  - type: text
    content: Indaosin’ny rivotra
  - type: text
    content: ny mpitondra anao rehetra
  - type: text
    content: ary lasan-ko babo ireo sakaizanao.
  - type: text
    content: Ho menatra sy ho afa-baràka ianao
  - type: text
    content: noho ny ratsy rehetra nataonao.
  '23':
  - type: text
    content: Nilamina erỳ ianao
  - type: text
    content: niteronterona teny Libano,
  - type: text
    content: nanana akany tao anatin’ny sedera
  - type: note
    content: Ny fisian’ny andry sy fanaka sedera tao amin’ny lapan’ny mpanjaka tao Jerosalema (jereo 21.14; 22.6-7) dia nitarika ny mpaminany hanao sary an’ohatra amin’ny tendrombohitra mitomandavana any Libano.
  - type: text
    content: ;
  - type: text
    content: kanjo akory izato sentonao
  - type: text
    content: fa nahazo anao tampoka ny fanaintainana
  - type: text
    content: tahaka ny fahararin’ny vehivavy miteraka!
  - type: heading
    content: Momba an’i Kônià, zanakalahin’i Jôiakima
  '24':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe: «Velona Aho ka mianiana fa na dia toy ny peratra fanombohan-kase eo an-tanako havanana aza ianao, ry Kônià'
  - type: note
    content: 'Kônià: fanafohezana ny hoe Jekônià (24.1), anarana hafa niantsoana ny mpanjaka Jôiakina. Efa nanjaka telo volana izy raha tonga ny fiondranam-babo voalohany tamin’ny 597 tal J.K; jereo 2 Mp 24.8-16; 2 Tan 36.8-10.'
  - type: text
    content: ' zanakalahin’i Jôiakima sady mpanjakan’i Joda, dia hoesoriko hiala eo. '
  '25':
  - type: text
    content: 'Hatolotro ho eo an-tanan’ireo mitady hahafaty anao ianao, dia ireo olona atahoranao fatratra, izany hoe i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' sy ny andian-tafiny. '
  '26':
  - type: text
    content: 'Horoahiko ianao sy ny reninao ho any amin’ny tany izay hafa noho ny tany nahaterahanareo, ka any no hahafatesanareo mianaka. '
  '27':
  - type: text
    content: Haniry mafy hiverina atỳ amin’ny taninareo ianareo, nefa tsy ho tafaverina atỳ intsony.»
  '28':
  - type: text
    content: 'Ao ny manontany hoe: «Moa vilany vaky tsy ilaina ve na fanaka tsy misy vidiny intsony ity lehilahy atao hoe Kônià ity? Nahoana no nakifika izy sy ny taranany ka noroahina ho any amin’ny tany tsy fantany akory?»'
  '29':
  - type: text
    content: '–Ry taniko ô, ry taniko ô, ry taniko ô, henoy ny tenin’ny TOMPO. '
  '3':
  - type: text
    content: 'Izao no lazain’ny TOMPO: Mampihara ny rariny sy ny hitsiny, afaho eny an-tanan’ny mpitsentsitra ireo olona volosany. Aza mampijaly na misetrasetra ny vahiny sy ny kamboty ary ny mpitondratena; ary aza mamono ho faty ny tsy manan-tsiny amin’ity toerana ity. '
  '30':
  - type: text
    content: 'Izao no lazainy: «Aoka iny lehilahy iny hosoratana ho toy ny tsy niteraka sady tsy nahomby tamin’ny androm-piainany. Fa tsy hisy taranany hahazo hipetraka hanjaka eo amin’ny sezafiandrianan’i Davida na hifehy an’i Joda intsony.»'
  '4':
  - type: text
    content: 'Raha manaraka tokoa izao teny izao ianareo, dia mbola hisy ihany mpanjaka hipetraka eo amin’ny sezafiandrianan’i Davida, ka handehandeha mitaingin-tsoavaly na kalesy. Ho afaka mandalo hatrany amin’ny vavahadin’ity lapa ity izy sy ny manamboninahiny ary ny vahoakany. '
  '5':
  - type: text
    content: Fa raha tsy hihaino izany hafatra izany kosa ianareo, dia ny tenako no ianianako ary Izaho TOMPO no miteny hentitra, fa ho rava tokoa ity lapa ity
  - type: note
    content: Ampit Mt 23.38; Lk 13.35.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Eny, izao no lazaiko momba ny lapan’ny mpanjakan’i Joda:'
  - type: text
    content: Na dia tsara tahaka ny alan’i Gilehada,
  - type: text
    content: sy ny tendron’i Libano aza ianao amiko,
  - type: text
    content: dia hataoko tonga taniefitra
  - type: text
    content: sy tanàna tsy misy mponina.
  '7':
  - type: text
    content: Hanetsika mpandrava hamely anao Aho,
  - type: text
    content: dia mpandrava izay samy ary fitaovana.
  - type: text
    content: Hokapainy ny sederanao voafantina
  - type: text
    content: ka hatsipiny any anaty afo.
  '8':
  - type: text
    content: 'Firenena maro no handalo eo akaikin’ity tanàna ity ka hifanontany hoe: inona no antony nahatonga ny TOMPO hamely ity tanàna ity tahaka izao? '
  '9':
  - type: text
    content: 'Dia hovaliana hoe: «Satria nandao ny fanekempihavanan’ny TOMPO Andriamaniny izy, ka niankohoka tamin’ny andriamani-kafa sady nivavaka tamin’ireny.»'
  - type: heading
    content: Ny amin’i Salòma, mpandimby an’i Josià
