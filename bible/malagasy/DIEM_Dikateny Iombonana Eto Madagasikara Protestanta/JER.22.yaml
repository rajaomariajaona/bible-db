  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Indaosin’ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpitondra anao rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary lasan-ko babo ireo sakaizanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho menatra sy ho afa-baràka ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny ratsy rehetra nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
