document_id: GEN.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo mponina teto ambonin’ny tany
  - type: text
    content: Taorian’ny safo-drano dia niteraka zanakalahy maro i Sema sy i Hama ary i Jafeta zanak’i Noà. Ireto no lisitry ny taranany
  - type: note
    content: Ity lisitry ny taranak’i Noà ity dia mamaritra sy mizara ho ara-poko sy ara-jeografia ny mponina fantatra fahagola.
  - type: text
    content: ':'
  '10':
  - type: text
    content: 'Ny tanàna lehibe tao amin’ny fanjakany dia i Babèla sy i Ereka ary i Akada sy i Kalne ao amin’ny tany Sinehara. '
  '11':
  - type: text
    content: 'Niala tamin’izany tany izany i Nimrôda ho any Asiria ary nanangana tanàna, dia i Ninive sy i Rehôbôta-Hiry, i Kela, '
  '12':
  - type: text
    content: ilay tanàna lehibe, ary i Resèna izay teo anelanelan’i Ninive sy i Kela.
  '13':
  - type: text
    content: 'I Mitsiraîma no razamben’ireo olona tao Loda sy tao Henama, tao Lehava sy tao Neftoà '
  '14':
  - type: text
    content: ary tao Patrosy mbamin’ireo Kaslohita sy Kaftôrita izay niavian’ny Filistinina
  - type: note
    content: Rijan-teny heverina ho manakaiky ny marina kokoa; amin’ny RM dia Kaslo, izay niavian’ny Filistinina sy ny Kaftôra.
  - type: text
    content: .
  '15':
  - type: text
    content: 'I Kanahàna no rain’i Tsidôna lahimatoany sy i Heta '
  '16':
  - type: text
    content: 'razamben’ireto foko ireto: dia ny Jebosita sy ny Amôrita, ny Girgasita '
  '17':
  - type: text
    content: 'sy ny Hivita, ny Harkita sy ny Sinita, '
  '18':
  - type: text
    content: 'ny Arvadita sy ny Tsemarita ary ny Hamatita. Taorian’izany dia niparitaka ireo foko kanahanita, '
  '19':
  - type: text
    content: 'ka ny faritaniny dia nanomboka hatreo Tsidôna mihazo an’i Gerara ka hatrany Gazà, ary mankany Sôdôma sy Gômôra ary Admà sy Tsebôima ka hatrany Lesà. '
  '2':
  - type: text
    content: 'Ny zanakalahin’i Jafeta dia i Gômera sy i Magôga, i Maday sy Javàna, i Tobala sy i Mesèka ary i Tirasa. '
  '20':
  - type: text
    content: Ireo no zanakalahin’i Hama voatsinjara araka ny fokony sy ny fiteniny avy, ary ao amin’ny taniny sy ny fireneny avy.
  '21':
  - type: text
    content: 'I Sema zokin’i Jafeta dia mba niteraka ihany koa, fa izy no razamben’i Hebera sy ny taranany. '
  '22':
  - type: text
    content: 'Ny zanakalahin’i Sema dia i Helama sy i Asora, i Arpaksàda sy i Loda ary i Arama. '
  '23':
  - type: text
    content: 'Ny zanakalahin’i Arama dia i Hotsa sy i Hola ary i Getera sy i Masa. '
  '24':
  - type: text
    content: 'I Arpaksàda no rain’i Sela, ary i Sela no rain’i Hebera. '
  '25':
  - type: text
    content: 'I Hebera dia nanan-janaka roa lahy: ny anankiray dia nantsoina hoe Pegela na «Fizaràna» satria tamin’ny androny no nizara ny mponina teto an-tany, ary ny rahalahiny kosa dia nantsoina hoe Jôktàna. '
  '26':
  - type: text
    content: 'I Jôktàna no rain-dry i Almôdada sy i Selefa, i Hatsarmavèty sy i Jerà, '
  '27':
  - type: text
    content: 'i Hadorama sy i Ozàla, i Diklà '
  '28':
  - type: text
    content: 'sy i Hobàla, i Abimaela sy i Seba, '
  '29':
  - type: text
    content: 'i Ofira sy i Havila, ary i Jôbaba. Ireo rehetra ireo no zanakalahin’i Jôktàna. '
  '3':
  - type: text
    content: 'Ny zanakalahin’i Gômera dia i Askenaza sy i Rifata ary i Tôgarmà. '
  '30':
  - type: text
    content: 'Ny fonenan’izy ireo dia manomboka eo Mesà ka hatrany amin’ny tendrombohitra atsinanana mankany Sefara. '
  '31':
  - type: text
    content: Ireo no zanakalahin’i Sema voatsinjara araka ny fokony sy ny fiteniny avy, ary ao amin’ny taniny sy ny fireneny avy.
  '32':
  - type: text
    content: Ireo no foko avy amin’ny zanakalahin’i Noà araka ny lisitry ny taranany isaky ny fireneny avy. Avy amin’ireo no niavian’ny firenena rehetra niparitaka eran-tany taorian’ny safo-drano.
  '4':
  - type: text
    content: Ny zanakalahin’i Javàna dia i Elisà sy i Tarsisy ary i Kitima sy i Rôdanima
  - type: note
    content: i Tarsisy dia lasa tanàn-dehiben’i Espaina manamorona ny ranomasina Mediteranea; i Kitima dia anarana hafa nilazana ny nosy Sipra; i Rôdanima dia anarana nilazana ny nosy grika atao hoe Rôdo (misy stf hafa manao hoe Dôdanima). Ampit 1 Tan 1.7.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Ireo no zanakalahin’i Jafeta sady niavian’ny firenen-tsamihafa niparitaka any amin’ny nosy maro; ka samy nanana ny taniny araka ny fiteniny avy sy nanana ny fireneny araka ny fokony avy izy.
  '6':
  - type: text
    content: 'Ny zanakalahin’i Hama dia i Kosy sy i Mitsiraîma ary i Poto sy i Kanahàna. '
  '7':
  - type: text
    content: 'Ary ny zanakalahin’i Kosy dia i Sebà sy i Havilà, i Sabtà sy i Rahemà ary i Sabtekà. Ny zanakalahin’i Rahemà dia i Saba sy i Dedàna. '
  '8':
  - type: text
    content: 'I Kosy no rain’i Nimrôda izay lehilahy mahery voalohany teto an-tany. '
  '9':
  - type: text
    content: 'I Nimrôda dia mpihaza mahery teo imason’ny TOMPO, ka niavian’ny ohabolana hoe: «Sahala amin’i Nimrôda, mpihaza mahery teo imason’ny TOMPO.» '
