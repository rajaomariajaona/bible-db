- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho avy hanaraka azy tsy akory ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fony izy velona no miarahaba tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady noderain’ny olona satria nahomby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanjo lasa tafaray amin’ny razany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hahita hazavana na oviana na oviana.
- type: usfm
  marker: q1
  children:
