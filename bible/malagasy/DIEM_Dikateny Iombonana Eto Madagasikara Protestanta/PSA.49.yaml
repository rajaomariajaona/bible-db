verses:
  '1':
  - type: heading
    content: SALAMO Tsy hitondra na inona na inona ny olona, rehefa maty
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’ireo terak’i Kôra
  - type: note
    content: Jereo Sal 42.1 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: mba hahavelomana mandrakizay
  - type: text
    content: sy tsy hahitana ny fasana...
  '11':
  - type: text
    content: Samy iaraha-mahita tokoa
  - type: text
    content: fa ny olon-kendry dia maty,
  - type: text
    content: ny adala sy ny ketrina koa levona,
  - type: text
    content: ka mamela ny hareny ho an’ny hafa.
  '12':
  - type: text
    content: Ny fasana no tranony mandrakizay
  - type: text
    content: sy fonenany amin’ny taona mifandimby,
  - type: text
    content: na ohatra aza ka ny anarany
  - type: text
    content: no niantsoana ireo taniny fahiny.
  '13':
  - type: text
    content: Eny, rehefa ao anaty voninahitra ny olona,
  - type: text
    content: dia tsy mahatsapa fa mbola ho faty
  - type: text
    content: ka ho tahaka ny biby ihany.
  '14':
  - type: text
    content: Izao no hanjo ny mpitoky tena
  - type: text
    content: 'sy hiafaran’ny olona mpirehaka:'
  - type: text
    content: Fiatoana
  '15':
  - type: text
    content: horoahina toa andian’ondry izy
  - type: text
    content: mba ho any amin’ny toeran’ny maty
  - type: text
    content: 'ka Rafahafatesana no '
  - type: text
    content: mpiandry
  - type: text
    content: ' hampiraotra azy;'
  - type: text
    content: hanitsy izy no midina am-pasana
  - type: text
    content: ka tsy hotsaroana ny bikany;
  - type: text
    content: ary ny toeran’ny maty no fonenany.
  '16':
  - type: text
    content: Hotsimbinin’Andriamanitra kosa ny aiko
  - type: text
    content: mba ho afaka amin’ny herin’ny fahafatesana,
  - type: text
    content: satria Izy Andriamanitra no handray ahy.
  - type: text
    content: Fiatoana
  '17':
  - type: text
    content: Aza mba mialona raha misy tonga mpanana,
  - type: text
    content: raha mitombo voninahitra ny tranony.
  '18':
  - type: text
    content: Fa tsy hitondra na inona na inona izy, rehefa maty
  - type: note
    content: Jereo 1Tim 6.7.
  - type: text
    content: ;
  - type: text
    content: tsy ho avy hanaraka azy tsy akory ny voninahiny.
  '19':
  - type: text
    content: Fony izy velona no miarahaba tena
  - type: text
    content: sady noderain’ny olona satria nahomby.
  '2':
  - type: text
    content: Mandrenesa, ry olombelona rehetra;
  - type: text
    content: mihainoa, ry mponina eran-tany,
  '20':
  - type: text
    content: Kanjo lasa tafaray amin’ny razany izy,
  - type: text
    content: tsy hahita hazavana na oviana na oviana.
  '21':
  - type: text
    content: Eny, rehefa ao anaty voninahitra ny olona,
  - type: text
    content: dia tsy mahatsapa fa mbola ho faty
  - type: text
    content: ka ho tahaka ny biby ihany.
  '3':
  - type: text
    content: na olona ambony na sarambabem-bahoaka,
  - type: text
    content: na ny mpanankarena na ny mahantra;
  '4':
  - type: text
    content: fa hilaza fahendrena ny vavako,
  - type: text
    content: hametsovetso fahalalana ny foko.
  '5':
  - type: text
    content: Atongilako hihaino oha-teny ny sofiko;
  - type: text
    content: arahin-dokanga no hivoasako ny ankamantatra.
  '6':
  - type: text
    content: Inona moa no hatahorako amin’ny andro fahoriana,
  - type: text
    content: raha manodidina ahy ny mpisompatra mandoza
  '7':
  - type: text
    content: izay mitoky amin’ny hareny miavosa
  - type: text
    content: sy mirehareha amin’ny fananam-beny?
  '8':
  - type: text
    content: Tsy misy olona mahavotra ny hafa tsy akory
  - type: text
    content: na mahaloa tamby ho azy amin’Andriamanitra;
  '9':
  - type: text
    content: satria lafo loatra ny avotra aina,
  - type: text
    content: tsy ho voaloa na oviana na oviana
