    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandrenesa, ry olombelona rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihainoa, ry mponina eran-tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: na olona ambony na sarambabem-bahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny mpanankarena na ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa hilaza fahendrena ny vavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hametsovetso fahalalana ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Atongilako hihaino oha-teny ny sofiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: arahin-dokanga no hivoasako ny ankamantatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Inona moa no hatahorako amin’ny andro fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha manodidina ahy ny mpisompatra mandoza
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: izay mitoky amin’ny hareny miavosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mirehareha amin’ny fananam-beny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy misy olona mahavotra ny hafa tsy akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: na mahaloa tamby ho azy amin’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: satria lafo loatra ny avotra aina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho voaloa na oviana na oviana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba hahavelomana mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tsy hahitana ny fasana...
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Samy iaraha-mahita tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny olon-kendry dia maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny adala sy ny ketrina koa levona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamela ny hareny ho an’ny hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fasana no tranony mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fonenany amin’ny taona mifandimby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ohatra aza ka ny anarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niantsoana ireo taniny fahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, rehefa ao anaty voninahitra ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mahatsapa fa mbola ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho tahaka ny biby ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izao no hanjo ny mpitoky tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy hiafaran’ny olona mpirehaka:'
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: horoahina toa andian’ondry izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho any amin’ny toeran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka Rafahafatesana no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' hampiraotra azy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanitsy izy no midina am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hotsaroana ny bikany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toeran’ny maty no fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hotsimbinin’Andriamanitra kosa ny aiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho afaka amin’ny herin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izy Andriamanitra no handray ahy.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mba mialona raha misy tonga mpanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mitombo voninahitra ny tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa tsy hitondra na inona na inona izy, rehefa maty
  - type: usfm
