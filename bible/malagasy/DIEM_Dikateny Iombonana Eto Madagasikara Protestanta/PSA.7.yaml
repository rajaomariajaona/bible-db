    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Fitarainana nataon’i Davida. Nohirainy teo anatrehan’ny TOMPO noho ny amin’i Kosy ilay Benjaminita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no fialofako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba vonjeo re aho ary afaho
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay rehetra manenjika ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha tsy izany, dia hamiravira ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny fanaon’ny liona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hanafaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanaisotra ahy eny aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: TOMPO Andriamanitro ô, raha nahavita
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany anaratsiany ahy izany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha nanao heloka ny tanako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: raha namaly ratsy ny mpanasoa ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: na nandroba an’ireo mpampahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandrafy ahy tsy amin’antony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia aoka ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanenjika ahy ka hahatratra ahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hohoseny an-tany mbola velona aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 18.39 sy nta.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hotarihiny am-bovoka ny hajako!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: TOMPO ô, mirotsaha an-tsehatra Ianao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hirehitra tokoa ny fahatezeranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tohero ireo fahavaloko misafoaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mijoroa re Ianao mba hanampy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fitsarana marina avoakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ireo firenena hivory hanotrona Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary makà toerana hanerinerina azy Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ilay sezafiandriananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: TOMPO ô, Ianao no mpitsara ireo firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa tsarao aho, ry TOMPO Avo Indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tia rariny aho ary tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ampitsaharo ny haratsian’ireo olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampioreno mafy kosa izay tia rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Andriamanitra marina Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahalala ny ao am-po tsy miloaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Apôk 2.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny ampinga miaro ahy dia Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay Mpamonjy an’ireo mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mpitsara mitandro ny rariny Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka rahonany mandrakariva ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha tsy miala amin’ny ratsy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handrani-tsabatra Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hanenjan-tsipîka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hikendry hamely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fiadiana mahafaty no omaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia zana-tsipîka mandoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indreo kosa ny mpiteti-dratsy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: loza no saintsaininy
- type: usfm
  marker: q1
  children:
  - type: text
    text: lainga sy fitaka no aterany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mihady lavaka lalina tokoa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa izy ihany no mianjera ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny loza nomaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitsingerina eo an-dohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny herisetra notetehiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia miantonta eo an-tampon-dohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hidera Anao aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mitandro ny rariny Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hankalaza ny anaranao amin-kira aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry TOMPO Avo Indrindra ô.
