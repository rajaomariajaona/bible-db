document_id: PSA.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, omeo rariny aho
  - type: text
    content: ' '
  - type: text
    content: Fitarainana nataon’i Davida. Nohirainy teo anatrehan’ny TOMPO noho ny amin’i Kosy ilay Benjaminita.
  '10':
  - type: text
    content: Ampitsaharo ny haratsian’ireo olon-dratsy,
  - type: text
    content: ampioreno mafy kosa izay tia rariny;
  - type: text
    content: fa Andriamanitra marina Ianao
  - type: text
    content: no mahalala ny ao am-po tsy miloaka
  - type: note
    content: Jereo Apôk 2.23.
  - type: text
    content: .
  '11':
  - type: text
    content: Ny ampinga miaro ahy dia Andriamanitra,
  - type: text
    content: ilay Mpamonjy an’ireo mahitsy fo.
  '12':
  - type: text
    content: Mpitsara mitandro ny rariny Andriamanitra,
  - type: text
    content: ka rahonany mandrakariva ny olon-dratsy.
  '13':
  - type: text
    content: Koa raha tsy miala amin’ny ratsy ireo,
  - type: text
    content: dia handrani-tsabatra Andriamanitra
  - type: text
    content: sady hanenjan-tsipîka
  - type: text
    content: ka hikendry hamely.
  '14':
  - type: text
    content: Fiadiana mahafaty no omaniny,
  - type: text
    content: dia zana-tsipîka mandoro.
  '15':
  - type: text
    content: 'Indreo kosa ny mpiteti-dratsy:'
  - type: text
    content: loza no saintsaininy
  - type: text
    content: lainga sy fitaka no aterany.
  '16':
  - type: text
    content: Mihady lavaka lalina tokoa izy,
  - type: text
    content: nefa izy ihany no mianjera ao.
  '17':
  - type: text
    content: Ny loza nomaniny
  - type: text
    content: dia mitsingerina eo an-dohany;
  - type: text
    content: ary ny herisetra notetehiny
  - type: text
    content: dia miantonta eo an-tampon-dohany.
  '18':
  - type: text
    content: Hidera Anao aho, TOMPO ô,
  - type: text
    content: fa mitandro ny rariny Ianao;
  - type: text
    content: ary hankalaza ny anaranao amin-kira aho,
  - type: text
    content: ry TOMPO Avo Indrindra ô.
  '2':
  - type: text
    content: TOMPO Andriamanitro ô,
  - type: text
    content: Ianao no fialofako.
  - type: text
    content: Mba vonjeo re aho ary afaho
  - type: text
    content: amin’izay rehetra manenjika ahy.
  '3':
  - type: text
    content: Raha tsy izany, dia hamiravira ahy
  - type: text
    content: tahaka ny fanaon’ny liona izy,
  - type: text
    content: ka tsy hisy hanafaka
  - type: text
    content: na hanaisotra ahy eny aminy.
  '4':
  - type: text
    content: TOMPO Andriamanitro ô, raha nahavita
  - type: text
    content: izany anaratsiany ahy izany aho,
  - type: text
    content: raha nanao heloka ny tanako,
  '5':
  - type: text
    content: raha namaly ratsy ny mpanasoa ahy aho
  - type: text
    content: na nandroba an’ireo mpampahory
  - type: text
    content: izay mandrafy ahy tsy amin’antony,
  '6':
  - type: text
    content: dia aoka ny fahavaloko
  - type: text
    content: hanenjika ahy ka hahatratra ahy!
  - type: text
    content: Aoka hohoseny an-tany mbola velona aho
  - type: note
    content: Ampit Sal 18.39 sy nta.
  - type: text
    content: ','
  - type: text
    content: ka hotarihiny am-bovoka ny hajako!
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: TOMPO ô, mirotsaha an-tsehatra Ianao.
  - type: text
    content: Aoka hirehitra tokoa ny fahatezeranao!
  - type: text
    content: Tohero ireo fahavaloko misafoaka;
  - type: text
    content: mijoroa re Ianao mba hanampy ahy,
  - type: text
    content: amin’ny fitsarana marina avoakanao.
  '8':
  - type: text
    content: Aoka ireo firenena hivory hanotrona Anao;
  - type: text
    content: ary makà toerana hanerinerina azy Ianao
  - type: text
    content: eo amin’ilay sezafiandriananao.
  '9':
  - type: text
    content: TOMPO ô, Ianao no mpitsara ireo firenena;
  - type: text
    content: koa tsarao aho, ry TOMPO Avo Indrindra,
  - type: text
    content: fa tia rariny aho ary tsy manan-tsiny.
