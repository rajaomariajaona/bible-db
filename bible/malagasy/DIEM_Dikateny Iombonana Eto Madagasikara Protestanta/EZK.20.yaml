  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, nentiko niala tany Ejipta izy ary notarihiko hankany an-taniefitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeko azy ny lalànako ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manatanteraka ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeko azy koa ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabatako
    - type: text
      text: ' mba ho mariky ny fifandraisany amiko sy mba hiekeny fa Izaho TOMPO no nanokana azy Israelita ho Ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nikomy tamiko tany an-taniefitra ireo! Tsy noraharahainy ny lalànako ary nohamavoiny ny fitsipiko izay mahavelona ny olona manatanteraka ireny. Nozimbazimbainy mihitsy ny andro sabatako. Koa nihevitra indray Aho ny hampitosaka ny fahatezerako aminy tany an-taniefitra mba hahalany ringana azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ireo firenen-kafa nahita ny namoahako ny Israelita hiala tany Ejipta. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nianiana taminy koa Aho tany an-taniefitra fa tsy hitondra azy hiditra ao amin’ny tany efa nomeko azy, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny nanaovako izany fianianana izany dia satria nanamavo ny fitsipiko izy sady tsy nanaraka ny lalànako ary nanimbazimba ny andro sabatako, noho izy niraiki-po tamin’ny sampiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy niantra fijery azy ihany Aho ka tsy nandringana azy na nandevona azy tany an-taniefitra
