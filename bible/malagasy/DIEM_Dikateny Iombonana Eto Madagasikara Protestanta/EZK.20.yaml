  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoesoriko tsy ho eo aminareo ireo nikomy sy niodina tamiko. Hoentiko miala amin’ny tany izay ivahiniany izy, nefa tsy hiverina intsony any amin’ny tanin’i Israely. Amin’izay dia hoekenareo fa Izaho no TOMPO.› '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny aminareo Israelita kosa dia izao no lazain’ny Tompo ANDRIANANAHARY: ‹Samia miroso manompo ny sampiny avy ianareo! Nefa any aoriana any dia hankatò Ahy mihitsy ianareo, ary tsy hanimbazimba ny anarako masina intsony amin’ny fanolorana fanatitra ho an’ny sampinareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ary ianao, ry ilay taranak’olombelona, miomàna hitsara azy, eny, tsarao mihitsy izy. Ampahafantaro azy ny asa maharikoriko nataon’ny razany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa teny hentitra avy amiko Tompo ANDRIANANAHARY izao: ny Israelita rehetra eo amin’ny tany dia hanao fanompoam-pivavahana Amiko eo an-tendrombohitra voatokana ho Ahy, dia ilay tendrombohitra avo any Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tendrombohitra voatokana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho an’Andriamanitra dia manondro ny fitambaran’ireo havoana izay nanorenana an’i Jerosalema, izany hoe manondro an’i Jerosalema mihitsy.
      marker-yv: yv-n
    - type: text
      text: '. Eo no handraisako tsara anareo sy hiangaviako hitondranareo izay rehetra voatokanareo ho Ahy, dia ny fanomezana sy fanatitra amin’izay tsara indrindra anananareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaraka amin’ny sorona manetona hanitra ankasitrahiko no handraisako tsara anareo, rehefa havoakako avy eo anivon’ny firenen-kafa ianareo sy hovoriko avy any amin’ny tany izay nampielezako anareo. Ka ny hataoko aminareo no hanehoako ny maha Andriamanitra Masina Ahy eo imason’ny firenen-kafa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa tafaveriko ao amin’ny tanin’i Israely izay nianianako homeko ny razanareo. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao ianareo no hisaintsaina ny fitondrantenanareo tamin’ny lasa sy ireo asa nampahaloto anareo. Haharikoriko anareo ny tenanareo noho ny ratsy rehetra efa nataonareo. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy araka ny toe-dratsinareo sy ny asa tsy mendrika nataonareo no havaliko anareo, ry Israelita, fa mba ho fitandroako ny lazako. Amin’izay dia hoekenareo fa Izaho no TOMPO. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tamin’ny andro nifidianako ny vahoaka Israely, dia izy rehetra no nianianako. Niseho taminy Aho tany Ejipta ary nampanantena azy mafy ho TOMPO Andriamaniny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany andro izany no nianianako fa hampamoaka azy hiala any Ejipta Aho mba hitondra azy ho amin’ny tany nomaniko ho azy manokana, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 5-6: jereo Eks 6.2-8.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nibaiko azy Aho samy hiala amin’ny sampy maharikoriko izay manintona azy, ka tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: handoto
    - type: text
      text: ' tena amin’ny fanompoana ireo sampy ejiptianina. Izaho no TOMPO Andriamaniny.›'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Kanjo nikomy tamiko izy, ary tsy nanaiky hihaino Ahy. Tsy nisy nanary ireo sampy maharikoriko izay nanintona azy izy, ary tsy nisy nandao ny sampy ejiptianina. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy tao Ejipta ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ny firenen-kafa niarahany nonina. Fa teo imason’ireo firenena ireo no nanaovako izay hahafantaran’ny Israelita Ahy tamin’ny namoahako azy hiala tany Ejipta. '
