      marker-yv: yv-n
    - type: text
      text: ' mba hampivarahontsana azy ka hiekeny fa Izaho no TOMPO.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hofaranan’ny Tompo ny fanompoan-tsampin’ny Israelita
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Noho izany, ry ilay taranak’olombelona, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Ny razanareo dia nanamavo Ahy hatrany hatrany tamin’ny fivadihany tamiko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitarika azy ho ao amin’ny tany izay nianianako homena azy Aho. Nefa nony nahita ireo tendron-kavoana misy hazo matevina izy, dia nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' teo. Nanolotra fanatitra sy zava-manitra fampitoniana izy sady nandraraka divay teny ka nampirongatra ny hatezerako. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany azy Aho hoe: Inona ireo toeram-panasinana izay alehanareo ireo? Koa nanomboka teo no niantsoana ireny toerana ireny hoe toeram-panasinana.› '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ry ilay taranak’olombelona, ambarao amin’ireo loholon’i Israely fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Moa hanontany Ahy ve no nahatongavanareo? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo mihitsy!›'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Nahoana no manaraka ny fanaon-drazanareo ianareo, ka ny fanompoana ireo sampiny maharikoriko ireo no '
    - type: usfm
      marker: w
      children:
      - type: text
        text: andotoanareo
    - type: text
      text: ' tena sy ivadihanareo amiko? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mandraka ankehitriny dia mbola mandoto tena ihany ianareo fa mitondra fanatitra sy manao sorona ny zanakareo amin’ny sampinareo. Manoloana izany ve Aho, ry Israelita, dia mbola hanaiky hanontanianareo ihany? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo Aho. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihevitra angaha ianareo fa ho afaka hanompo ireo vato aman-kazo tahaka ny hafa firenena, dia ireo vahoakan’ny tany hafa? Tsia, tsy ho tanteraka mihitsy izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa hampihatra hery mafonja sy fahefana tsy hay tohaina Aho ary hampitosaka ny hatezerako mba hanjakako aminareo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hery mafonja sy fahefana tsy hay tohaina ary fahatezerana mitosaka no hamoahako anareo avy any amin’ny firenena sy hamoriako anareo avy any amin’ny tany izay nampielezana anareo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hoentiko any an-taniefitra hihataka amin’ny firenen-kafa ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Any an-taniefitra hihataka amin’ny firenen-kafa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy toerana ara-jeografia ny hoe taniefitra eto, fa sarintsarin’ny toerana na sehatra ahazoan’Andriamanitra miresaka amin’ny vahoakany irery, ka tsy misy fanelingelenan’ny firenena hafa, ampit Hos 2.16.
      marker-yv: yv-n
    - type: text
      text: ', ka any no hitsarako anareo mifanatrika amiko. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny nanamelohako ny razanareo tany an-taniefitra akaikin’i Ejipta no hanamelohako anareo koa. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hampandaloviko eo ambany tehina maha-
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' ahy ianareo ka hampidiriko ho anisan’ny ondry'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hampidiriko... ondry: '
      - type: usfm
