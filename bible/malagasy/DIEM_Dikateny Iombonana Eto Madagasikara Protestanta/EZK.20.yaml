document_id: EZK.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notarihin’Andriamanitra i Israely na teo aza ny fikomiany.
  - type: text
    content: Tamin’ny taona fahafito taorian’ny fahababoana, nony andro fahafolon’ny volana fahadimy
  - type: note
    content: Izany hoe ny volana Jolay-Aogositra tamin’ny taona fahafito nanjakan’i Tsedekià, na hoe taona 591-590 tal J.K.
  - type: text
    content: ', dia tonga nanatona ahy ireo '
  - type: text
    content: loholona
  - type: text
    content: ' israelita vitsivitsy mba hanontany ny TOMPO, ka nipetraka teo anatrehako. '
  '10':
  - type: text
    content: 'Eny, nentiko niala tany Ejipta izy ary notarihiko hankany an-taniefitra. '
  '11':
  - type: text
    content: 'Nomeko azy ny lalànako ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manatanteraka ireny. '
  '12':
  - type: text
    content: 'Nomeko azy koa ny andro '
  - type: text
    content: sabatako
  - type: text
    content: ' mba ho mariky ny fifandraisany amiko sy mba hiekeny fa Izaho TOMPO no nanokana azy Israelita ho Ahy. '
  '13':
  - type: text
    content: 'Kanjo nikomy tamiko tany an-taniefitra ireo! Tsy noraharahainy ny lalànako ary nohamavoiny ny fitsipiko izay mahavelona ny olona manatanteraka ireny. Nozimbazimbainy mihitsy ny andro sabatako. Koa nihevitra indray Aho ny hampitosaka ny fahatezerako aminy tany an-taniefitra mba hahalany ringana azy. '
  '14':
  - type: text
    content: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ireo firenen-kafa nahita ny namoahako ny Israelita hiala tany Ejipta. '
  '15':
  - type: text
    content: 'Ary nianiana taminy koa Aho tany an-taniefitra fa tsy hitondra azy hiditra ao amin’ny tany efa nomeko azy, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra; '
  '16':
  - type: text
    content: 'ny nanaovako izany fianianana izany dia satria nanamavo ny fitsipiko izy sady tsy nanaraka ny lalànako ary nanimbazimba ny andro sabatako, noho izy niraiki-po tamin’ny sampiny. '
  '17':
  - type: text
    content: Saingy niantra fijery azy ihany Aho ka tsy nandringana azy na nandevona azy tany an-taniefitra
  - type: note
    content: 'And 13-17: jereo ohatra Nom 14.1-4, 20-30.'
  - type: text
    content: .»
  - type: heading
    content: Tsy nitsahatra nikomy tamin’Andriamanitra i Israely
  '18':
  - type: text
    content: '«Fa hoy Aho tamin’ireo zanany tany an-taniefitra: ‹Aza manaraka ny fanaon-drazanareo ianareo na mitandrina ny fitsipiny na '
  - type: text
    content: mandoto
  - type: text
    content: ' tena amin’ny fanompoana ny sampiny. '
  '19':
  - type: text
    content: 'Izaho no TOMPO Andriamanitrareo! Koa araho ny lalànako ary tandremo ny fitsipiko. '
  '2':
  - type: text
    content: 'Dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '20':
  - type: text
    content: 'Atokany ho Ahy ny andro '
  - type: text
    content: sabatako
  - type: text
    content: ' mba ho mariky ny fifandraisanareo amiko ary mba hiekenareo fa Izaho no TOMPO Andriamanitrareo.› '
  '21':
  - type: text
    content: 'Kanjo nikomy tamiko koa ireo zanany. Tsy narahiny ny lalànako ary tsy notandroviny hotanterahina ny fitsipiko izay mahavelona ny olona manatanteraka ireny, sady nozimbazimbainy ny andro sabatako. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy any an-taniefitra. '
  '22':
  - type: text
    content: 'Nefa tsy nanao izany Aho ary nitandro ny lazako mba tsy hozimbazimbain’ny firenen-kafa izay nahita ny namoahako ny Israelita niala tany Ejipta. '
  '23':
  - type: text
    content: 'Ary nianiana taminy tany an-taniefitra indray Aho fa hampiely azy any amin’ireo hafa firenena ary hampiparitaka azy any an-tany samy hafa; '
  '24':
  - type: text
    content: 'ny nanaovako izany fianianana izany dia satria tsy nanatanteraka ny fitsipiko izy fa nanamavo ny lalànako sady nanimbazimba ny andro sabatako, ary voasinton’ny sampin’ireo razany. '
  '25':
  - type: text
    content: Ankoatra izany, dia nomeko lalàna tsy nahasoa azy sy fitsipika tsy nahavelona azy izy
  - type: note
    content: Ny lazain’i Ezekiela an-kolaka eto dia ny lalàna momba ny fanolorana ny voalohan-teraka (jereo and 26 sy Eks 13.1) izay noraisin’ny sasany ara-bakiteny ka tsy niraharahany akory ny lalàna momba ny fanavotana, jereo Eks 13.12-13.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Navelako handoto tena tamin’ny fanolorana ny voalohan-terany rehetra hovonoina ho faty izy
  - type: note
    content: Jereo 16.20 sy nta.
  - type: text
    content: ' mba hampivarahontsana azy ka hiekeny fa Izaho no TOMPO.»'
  - type: heading
    content: Hofaranan’ny Tompo ny fanompoan-tsampin’ny Israelita
  '27':
  - type: text
    content: '«Noho izany, ry ilay taranak’olombelona, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Ny razanareo dia nanamavo Ahy hatrany hatrany tamin’ny fivadihany tamiko. '
  '28':
  - type: text
    content: 'Nitarika azy ho ao amin’ny tany izay nianianako homena azy Aho. Nefa nony nahita ireo tendron-kavoana misy hazo matevina izy, dia nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' teo. Nanolotra fanatitra sy zava-manitra fampitoniana izy sady nandraraka divay teny ka nampirongatra ny hatezerako. '
  '29':
  - type: text
    content: 'Dia nanontany azy Aho hoe: Inona ireo toeram-panasinana izay alehanareo ireo? Koa nanomboka teo no niantsoana ireny toerana ireny hoe toeram-panasinana.› '
  '3':
  - type: text
    content: '«Ry ilay taranak’olombelona, ambarao amin’ireo loholon’i Israely fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Moa hanontany Ahy ve no nahatongavanareo? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo mihitsy!›'
  '30':
  - type: text
    content: 'Noho izany, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Nahoana no manaraka ny fanaon-drazanareo ianareo, ka ny fanompoana ireo sampiny maharikoriko ireo no '
  - type: text
    content: andotoanareo
  - type: text
    content: ' tena sy ivadihanareo amiko? '
  '31':
  - type: text
    content: 'Ary mandraka ankehitriny dia mbola mandoto tena ihany ianareo fa mitondra fanatitra sy manao sorona ny zanakareo amin’ny sampinareo. Manoloana izany ve Aho, ry Israelita, dia mbola hanaiky hanontanianareo ihany? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo Aho. '
  '32':
  - type: text
    content: 'Mihevitra angaha ianareo fa ho afaka hanompo ireo vato aman-kazo tahaka ny hafa firenena, dia ireo vahoakan’ny tany hafa? Tsia, tsy ho tanteraka mihitsy izany. '
  '33':
  - type: text
    content: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa hampihatra hery mafonja sy fahefana tsy hay tohaina Aho ary hampitosaka ny hatezerako mba hanjakako aminareo. '
  '34':
  - type: text
    content: 'Hery mafonja sy fahefana tsy hay tohaina ary fahatezerana mitosaka no hamoahako anareo avy any amin’ny firenena sy hamoriako anareo avy any amin’ny tany izay nampielezana anareo. '
  '35':
  - type: text
    content: Hoentiko any an-taniefitra hihataka amin’ny firenen-kafa ianareo
  - type: note
    content: 'Any an-taniefitra hihataka amin’ny firenen-kafa: tsy toerana ara-jeografia ny hoe taniefitra eto, fa sarintsarin’ny toerana na sehatra ahazoan’Andriamanitra miresaka amin’ny vahoakany irery, ka tsy misy fanelingelenan’ny firenena hafa, ampit Hos 2.16.'
  - type: text
    content: ', ka any no hitsarako anareo mifanatrika amiko. '
  '36':
  - type: text
    content: 'Tahaka ny nanamelohako ny razanareo tany an-taniefitra akaikin’i Ejipta no hanamelohako anareo koa. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '37':
  - type: text
    content: Hampandaloviko eo ambany tehina maha-
  - type: text
    content: mpiandry
  - type: text
    content: ' ahy ianareo ka hampidiriko ho anisan’ny ondry'
  - type: note
    content: 'hampidiriko... ondry: araka ny dkt grika izany, fa ny RM kosa manao hoe hampidiriko hofehezin’ny fanekempihavanana.'
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Hoesoriko tsy ho eo aminareo ireo nikomy sy niodina tamiko. Hoentiko miala amin’ny tany izay ivahiniany izy, nefa tsy hiverina intsony any amin’ny tanin’i Israely. Amin’izay dia hoekenareo fa Izaho no TOMPO.› '
  '39':
  - type: text
    content: 'Ary ny aminareo Israelita kosa dia izao no lazain’ny Tompo ANDRIANANAHARY: ‹Samia miroso manompo ny sampiny avy ianareo! Nefa any aoriana any dia hankatò Ahy mihitsy ianareo, ary tsy hanimbazimba ny anarako masina intsony amin’ny fanolorana fanatitra ho an’ny sampinareo. '
  '4':
  - type: text
    content: '«Ary ianao, ry ilay taranak’olombelona, miomàna hitsara azy, eny, tsarao mihitsy izy. Ampahafantaro azy ny asa maharikoriko nataon’ny razany. '
  '40':
  - type: text
    content: 'Fa teny hentitra avy amiko Tompo ANDRIANANAHARY izao: ny Israelita rehetra eo amin’ny tany dia hanao fanompoam-pivavahana Amiko eo an-tendrombohitra voatokana ho Ahy, dia ilay tendrombohitra avo any Israely'
  - type: note
    content: Ny tendrombohitra voatokana ho an’Andriamanitra dia manondro ny fitambaran’ireo havoana izay nanorenana an’i Jerosalema, izany hoe manondro an’i Jerosalema mihitsy.
  - type: text
    content: '. Eo no handraisako tsara anareo sy hiangaviako hitondranareo izay rehetra voatokanareo ho Ahy, dia ny fanomezana sy fanatitra amin’izay tsara indrindra anananareo. '
  '41':
  - type: text
    content: 'Miaraka amin’ny sorona manetona hanitra ankasitrahiko no handraisako tsara anareo, rehefa havoakako avy eo anivon’ny firenen-kafa ianareo sy hovoriko avy any amin’ny tany izay nampielezako anareo. Ka ny hataoko aminareo no hanehoako ny maha Andriamanitra Masina Ahy eo imason’ny firenen-kafa. '
  '42':
  - type: text
    content: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa tafaveriko ao amin’ny tanin’i Israely izay nianianako homeko ny razanareo. '
  '43':
  - type: text
    content: 'Ao ianareo no hisaintsaina ny fitondrantenanareo tamin’ny lasa sy ireo asa nampahaloto anareo. Haharikoriko anareo ny tenanareo noho ny ratsy rehetra efa nataonareo. '
  '44':
  - type: text
    content: Tsy araka ny toe-dratsinareo sy ny asa tsy mendrika nataonareo no havaliko anareo, ry Israelita, fa mba ho fitandroako ny lazako. Amin’izay dia hoekenareo fa Izaho no TOMPO. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '5':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tamin’ny andro nifidianako ny vahoaka Israely, dia izy rehetra no nianianako. Niseho taminy Aho tany Ejipta ary nampanantena azy mafy ho TOMPO Andriamaniny. '
  '6':
  - type: text
    content: Tamin’izany andro izany no nianianako fa hampamoaka azy hiala any Ejipta Aho mba hitondra azy ho amin’ny tany nomaniko ho azy manokana, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra
  - type: note
    content: 'And 5-6: jereo Eks 6.2-8.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary nibaiko azy Aho samy hiala amin’ny sampy maharikoriko izay manintona azy, ka tsy '
  - type: text
    content: handoto
  - type: text
    content: ' tena amin’ny fanompoana ireo sampy ejiptianina. Izaho no TOMPO Andriamaniny.›'
  '8':
  - type: text
    content: '«Kanjo nikomy tamiko izy, ary tsy nanaiky hihaino Ahy. Tsy nisy nanary ireo sampy maharikoriko izay nanintona azy izy, ary tsy nisy nandao ny sampy ejiptianina. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy tao Ejipta ihany. '
  '9':
  - type: text
    content: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ny firenen-kafa niarahany nonina. Fa teo imason’ireo firenena ireo no nanaovako izay hahafantaran’ny Israelita Ahy tamin’ny namoahako azy hiala tany Ejipta. '
