      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny lazain’i Ezekiela an-kolaka eto dia ny lalàna momba ny fanolorana ny voalohan-teraka (jereo and 26 sy Eks 13.1) izay noraisin’ny sasany ara-bakiteny ka tsy niraharahany akory ny lalàna momba ny fanavotana, jereo Eks 13.12-13.
      marker-yv: yv-n
