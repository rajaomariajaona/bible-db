document_id: EZK.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Notarihin’Andriamanitra i Israely na teo aza ny fikomiany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona fahafito taorian’ny fahababoana, nony andro fahafolon’ny volana fahadimy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe ny volana Jolay-Aogositra tamin’ny taona fahafito nanjakan’i Tsedekià, na hoe taona 591-590 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia tonga nanatona ahy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' israelita vitsivitsy mba hanontany ny TOMPO, ka nipetraka teo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Ry ilay taranak’olombelona, ambarao amin’ireo loholon’i Israely fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Moa hanontany Ahy ve no nahatongavanareo? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo mihitsy!›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ary ianao, ry ilay taranak’olombelona, miomàna hitsara azy, eny, tsarao mihitsy izy. Ampahafantaro azy ny asa maharikoriko nataon’ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tamin’ny andro nifidianako ny vahoaka Israely, dia izy rehetra no nianianako. Niseho taminy Aho tany Ejipta ary nampanantena azy mafy ho TOMPO Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’izany andro izany no nianianako fa hampamoaka azy hiala any Ejipta Aho mba hitondra azy ho amin’ny tany nomaniko ho azy manokana, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 5-6: jereo Eks 6.2-8.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nibaiko azy Aho samy hiala amin’ny sampy maharikoriko izay manintona azy, ka tsy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: handoto
  - type: text
    text: ' tena amin’ny fanompoana ireo sampy ejiptianina. Izaho no TOMPO Andriamaniny.›'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Kanjo nikomy tamiko izy, ary tsy nanaiky hihaino Ahy. Tsy nisy nanary ireo sampy maharikoriko izay nanintona azy izy, ary tsy nisy nandao ny sampy ejiptianina. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy tao Ejipta ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ny firenen-kafa niarahany nonina. Fa teo imason’ireo firenena ireo no nanaovako izay hahafantaran’ny Israelita Ahy tamin’ny namoahako azy hiala tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, nentiko niala tany Ejipta izy ary notarihiko hankany an-taniefitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nomeko azy ny lalànako ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manatanteraka ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nomeko azy koa ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabatako
  - type: text
    text: ' mba ho mariky ny fifandraisany amiko sy mba hiekeny fa Izaho TOMPO no nanokana azy Israelita ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanjo nikomy tamiko tany an-taniefitra ireo! Tsy noraharahainy ny lalànako ary nohamavoiny ny fitsipiko izay mahavelona ny olona manatanteraka ireny. Nozimbazimbainy mihitsy ny andro sabatako. Koa nihevitra indray Aho ny hampitosaka ny fahatezerako aminy tany an-taniefitra mba hahalany ringana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa notandroviko ny lazako mba tsy hozimbazimbain’ireo firenen-kafa nahita ny namoahako ny Israelita hiala tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nianiana taminy koa Aho tany an-taniefitra fa tsy hitondra azy hiditra ao amin’ny tany efa nomeko azy, dia tany izay tondra-dronono sy tantely sady mahafinaritra noho ny tany hafa rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny nanaovako izany fianianana izany dia satria nanamavo ny fitsipiko izy sady tsy nanaraka ny lalànako ary nanimbazimba ny andro sabatako, noho izy niraiki-po tamin’ny sampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Saingy niantra fijery azy ihany Aho ka tsy nandringana azy na nandevona azy tany an-taniefitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'And 13-17: jereo ohatra Nom 14.1-4, 20-30.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nitsahatra nikomy tamin’Andriamanitra i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Fa hoy Aho tamin’ireo zanany tany an-taniefitra: ‹Aza manaraka ny fanaon-drazanareo ianareo na mitandrina ny fitsipiny na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mandoto
  - type: text
    text: ' tena amin’ny fanompoana ny sampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izaho no TOMPO Andriamanitrareo! Koa araho ny lalànako ary tandremo ny fitsipiko. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Atokany ho Ahy ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabatako
  - type: text
    text: ' mba ho mariky ny fifandraisanareo amiko ary mba hiekenareo fa Izaho no TOMPO Andriamanitrareo.› '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Kanjo nikomy tamiko koa ireo zanany. Tsy narahiny ny lalànako ary tsy notandroviny hotanterahina ny fitsipiko izay mahavelona ny olona manatanteraka ireny, sady nozimbazimbainy ny andro sabatako. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy any an-taniefitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nefa tsy nanao izany Aho ary nitandro ny lazako mba tsy hozimbazimbain’ny firenen-kafa izay nahita ny namoahako ny Israelita niala tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nianiana taminy tany an-taniefitra indray Aho fa hampiely azy any amin’ireo hafa firenena ary hampiparitaka azy any an-tany samy hafa; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny nanaovako izany fianianana izany dia satria tsy nanatanteraka ny fitsipiko izy fa nanamavo ny lalànako sady nanimbazimba ny andro sabatako, ary voasinton’ny sampin’ireo razany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ankoatra izany, dia nomeko lalàna tsy nahasoa azy sy fitsipika tsy nahavelona azy izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lazain’i Ezekiela an-kolaka eto dia ny lalàna momba ny fanolorana ny voalohan-teraka (jereo and 26 sy Eks 13.1) izay noraisin’ny sasany ara-bakiteny ka tsy niraharahany akory ny lalàna momba ny fanavotana, jereo Eks 13.12-13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Navelako handoto tena tamin’ny fanolorana ny voalohan-terany rehetra hovonoina ho faty izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 16.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' mba hampivarahontsana azy ka hiekeny fa Izaho no TOMPO.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hofaranan’ny Tompo ny fanompoan-tsampin’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Noho izany, ry ilay taranak’olombelona, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Ny razanareo dia nanamavo Ahy hatrany hatrany tamin’ny fivadihany tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nitarika azy ho ao amin’ny tany izay nianianako homena azy Aho. Nefa nony nahita ireo tendron-kavoana misy hazo matevina izy, dia nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' teo. Nanolotra fanatitra sy zava-manitra fampitoniana izy sady nandraraka divay teny ka nampirongatra ny hatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanontany azy Aho hoe: Inona ireo toeram-panasinana izay alehanareo ireo? Koa nanomboka teo no niantsoana ireny toerana ireny hoe toeram-panasinana.› '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noho izany, ambarao amin’ny Israelita fa Izao no lazain’ny Tompo ANDRIANANAHARY : ‹Nahoana no manaraka ny fanaon-drazanareo ianareo, ka ny fanompoana ireo sampiny maharikoriko ireo no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: andotoanareo
  - type: text
    text: ' tena sy ivadihanareo amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary mandraka ankehitriny dia mbola mandoto tena ihany ianareo fa mitondra fanatitra sy manao sorona ny zanakareo amin’ny sampinareo. Manoloana izany ve Aho, ry Israelita, dia mbola hanaiky hanontanianareo ihany? Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy hanaiky hanontanianareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mihevitra angaha ianareo fa ho afaka hanompo ireo vato aman-kazo tahaka ny hafa firenena, dia ireo vahoakan’ny tany hafa? Tsia, tsy ho tanteraka mihitsy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa hampihatra hery mafonja sy fahefana tsy hay tohaina Aho ary hampitosaka ny hatezerako mba hanjakako aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hery mafonja sy fahefana tsy hay tohaina ary fahatezerana mitosaka no hamoahako anareo avy any amin’ny firenena sy hamoriako anareo avy any amin’ny tany izay nampielezana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hoentiko any an-taniefitra hihataka amin’ny firenen-kafa ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Any an-taniefitra hihataka amin’ny firenen-kafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy toerana ara-jeografia ny hoe taniefitra eto, fa sarintsarin’ny toerana na sehatra ahazoan’Andriamanitra miresaka amin’ny vahoakany irery, ka tsy misy fanelingelenan’ny firenena hafa, ampit Hos 2.16.
    marker-yv: yv-n
  - type: text
    text: ', ka any no hitsarako anareo mifanatrika amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tahaka ny nanamelohako ny razanareo tany an-taniefitra akaikin’i Ejipta no hanamelohako anareo koa. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Hampandaloviko eo ambany tehina maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ahy ianareo ka hampidiriko ho anisan’ny ondry'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hampidiriko... ondry: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt grika izany, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hampidiriko hofehezin’ny fanekempihavanana.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hoesoriko tsy ho eo aminareo ireo nikomy sy niodina tamiko. Hoentiko miala amin’ny tany izay ivahiniany izy, nefa tsy hiverina intsony any amin’ny tanin’i Israely. Amin’izay dia hoekenareo fa Izaho no TOMPO.› '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny aminareo Israelita kosa dia izao no lazain’ny Tompo ANDRIANANAHARY: ‹Samia miroso manompo ny sampiny avy ianareo! Nefa any aoriana any dia hankatò Ahy mihitsy ianareo, ary tsy hanimbazimba ny anarako masina intsony amin’ny fanolorana fanatitra ho an’ny sampinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa teny hentitra avy amiko Tompo ANDRIANANAHARY izao: ny Israelita rehetra eo amin’ny tany dia hanao fanompoam-pivavahana Amiko eo an-tendrombohitra voatokana ho Ahy, dia ilay tendrombohitra avo any Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tendrombohitra voatokana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho an’Andriamanitra dia manondro ny fitambaran’ireo havoana izay nanorenana an’i Jerosalema, izany hoe manondro an’i Jerosalema mihitsy.
    marker-yv: yv-n
  - type: text
    text: '. Eo no handraisako tsara anareo sy hiangaviako hitondranareo izay rehetra voatokanareo ho Ahy, dia ny fanomezana sy fanatitra amin’izay tsara indrindra anananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Miaraka amin’ny sorona manetona hanitra ankasitrahiko no handraisako tsara anareo, rehefa havoakako avy eo anivon’ny firenen-kafa ianareo sy hovoriko avy any amin’ny tany izay nampielezako anareo. Ka ny hataoko aminareo no hanehoako ny maha Andriamanitra Masina Ahy eo imason’ny firenen-kafa. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Amin’izay dia hoekenareo fa Izaho no TOMPO, rehefa tafaveriko ao amin’ny tanin’i Israely izay nianianako homeko ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ao ianareo no hisaintsaina ny fitondrantenanareo tamin’ny lasa sy ireo asa nampahaloto anareo. Haharikoriko anareo ny tenanareo noho ny ratsy rehetra efa nataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tsy araka ny toe-dratsinareo sy ny asa tsy mendrika nataonareo no havaliko anareo, ry Israelita, fa mba ho fitandroako ny lazako. Amin’izay dia hoekenareo fa Izaho no TOMPO. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
