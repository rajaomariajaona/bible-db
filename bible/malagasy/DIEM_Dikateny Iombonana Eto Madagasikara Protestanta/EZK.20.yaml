    - type: text
      text: Tsy nitsahatra nikomy tamin’Andriamanitra i Israely
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fa hoy Aho tamin’ireo zanany tany an-taniefitra: ‹Aza manaraka ny fanaon-drazanareo ianareo na mitandrina ny fitsipiny na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mandoto
    - type: text
      text: ' tena amin’ny fanompoana ny sampiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no TOMPO Andriamanitrareo! Koa araho ny lalànako ary tandremo ny fitsipiko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atokany ho Ahy ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabatako
    - type: text
      text: ' mba ho mariky ny fifandraisanareo amiko ary mba hiekenareo fa Izaho no TOMPO Andriamanitrareo.› '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nikomy tamiko koa ireo zanany. Tsy narahiny ny lalànako ary tsy notandroviny hotanterahina ny fitsipiko izay mahavelona ny olona manatanteraka ireny, sady nozimbazimbainy ny andro sabatako. Koa nihevitra Aho ny hampihatra sy hampitosaka ny fahavinirako amam-pahatezerako aminy any an-taniefitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nanao izany Aho ary nitandro ny lazako mba tsy hozimbazimbain’ny firenen-kafa izay nahita ny namoahako ny Israelita niala tany Ejipta. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nianiana taminy tany an-taniefitra indray Aho fa hampiely azy any amin’ireo hafa firenena ary hampiparitaka azy any an-tany samy hafa; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny nanaovako izany fianianana izany dia satria tsy nanatanteraka ny fitsipiko izy fa nanamavo ny lalànako sady nanimbazimba ny andro sabatako, ary voasinton’ny sampin’ireo razany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ankoatra izany, dia nomeko lalàna tsy nahasoa azy sy fitsipika tsy nahavelona azy izy
    - type: usfm
