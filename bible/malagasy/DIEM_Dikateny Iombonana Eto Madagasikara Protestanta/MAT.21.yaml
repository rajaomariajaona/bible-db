document_id: MAT.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miditra ao Jerosalema i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 11.1-11; Lk 19.28-38; Jôh 12.12-19)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary nanakaiky an’i Jerosalema i Jesoa mbamin’ny mpianany sy ny vahoaka tafaraka taminy, ka tonga teo anilan’ny tanàna Betifage, eo amin’ny tendrombohitra atao hoe Analanôliva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 11.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. Dia naniraka roa lahy tamin’ny mpianany i Jesoa ka nanao taminy hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nony efa tafiditra tao Jerosalema i Jesoa, dia nihotakotaka avokoa ny iray tanàna ka nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa io lehilahy io?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia novalian’ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Io no Jesoa mpaminany, Izay avy any Nazareta tanànan’i Galilea!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tandrovin’i Jesoa ny hajan’ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 11.15-19; Lk 19.45-48; Jôh 2.13-22)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia namantana tao an-kianjan’ny tempoly i Jesoa; ka ireo mpivarotra sy mpividy teo dia noroahiny avokoa, ny latabatr’ireo mpanakalo vola sy ny sezan’ireo mpivaro-boromahailala nazerany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary hoy i Jesoa tamin’ireo olona ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no voalazan’ny Soratra Masina: «Ny tranoko dia hantsoina hoe trano fivavahana.» Nefa he ity izy ataonareo zohy fieren’ny mpangalatra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 56.7; Jer 7.11.
      marker-yv: yv-n
    - type: text
      text: '!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nisy jamba sy mandringa nanatona an’i Jesoa tao an-kianjan’ny tempoly ka dia nositraniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa tezitra mafy kosa ireo lohandoha-mpisorona sy ireo mpahay lalàna nony nahita ny zava-mahagaga nataony sy nahita ny ankizy madinika niantsoantso tao an-kianjan’ny tempoly hoe: «Dera anie ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’i Davida
    - type: text
      text: '!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ka hoy ry zareo tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Renao ve izay lazain’ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Eny, reko tokoa! Sady tsy mbola novakînareo ve ny andinin’ny Soratra Masina hoe: «Ny vavan’ny ankizy madinika aman-jaza minono avy no nataonao hahazoan-dera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 8.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: »?
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia nilaozan’i Jesoa ry zareo; ary niala tao an-tanàna Izy hankany Betania, ka nandry tany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy hamoa intsony ilay aviavy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 11.12-14, 20-24)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia niverina maraina ho any an-tanàna i Jesoa ary nahatsiaro noana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nahatazana aviavy anankiray teo amoron-dalana Izy, dia lasa nankeo; kanjo tsy nahita na inona na inona teo aminy afa-tsy raviny fotsiny. Dia hoy i Jesoa tamin’ilay aviavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hamoa intsony ianao na oviana na oviana!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vetivety foana dia maina ilay aviavy. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '–Mankanesa amin’itsy tanàna manoloana anareo itsy. Vantany vao migadona ao ianareo, dia hahita boriky vavy mifatotra sy ny zanany miaraka aminy: vahao ilay boriky vavy dia ento atỳ amiko ombàn-janany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Gaga ny mpianatra nahita izany ka vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana re no nahamaina vetivety io aviavy io?
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazaiko marina aminareo; raha manam-pinoana ianareo ka tsy misalasala, dia tsy izao nataoko tamin’ny aviavy izao ihany no ho vitanareo, fa na itsy tendrombohitra itsy aza hitenenanareo hoe: «Mialà eo ary mianjerà any an-dranomasina», dia ho tonga izany. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Raha mino ianareo, na inona na inona hangatahinareo amin’ny fivavahana dia ho azonareo avokoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avy aiza ny fahefàn’i Jesoa?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 11.27-33; Lk 20.1-18)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nony tafiditra tao an-kianjan’ny tempoly i Jesoa, dia nampianatra. Ary nanatona Azy ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’ny vahoaka jiosy ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fahefana ahoana moa no anaovanao an’izao? Ary iza no nanome anao izany fahefana izany?
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho koa mba hanontany anareo zavatra anankiray monja; ka raha omenareo valiny Aho, dia holazaiko anareo koa ny fahefana anaovako an’izao zavatra izao. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Iza no naniraka an’i Jôhany hanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.6.
      marker-yv: yv-n
    - type: text
      text: ', Andriamanitra sa olombelona?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia velona ady hevitra ry zareo ka nifampiresaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha lazaintsika hoe: «Andriamanitra no naniraka azy», dia isika no hataony hoe: «Koa nahoana no tsy ninoanareo i Jôhany?» '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha lazaintsika hoe: «Olombelona no naniraka azy», dia ny vahoaka no atahorantsika satria nankatoavin’izy rehetra ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminani
    - type: text
      text: n’Andriamanitra i Jôhany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Koa dia izao no navalin-dry zareo an’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hitanay izay holazaina!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho koa tsy hilaza aminareo ny fahefana anaovako an’izao zavatra izao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’izy mirahalahy
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy indray i Jesoa tamin’ireo lohandoha-mpisorona sy ireo loholona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ahoana kosa ny hevitrareo ny amin’ity? Nisy lehilahy nanan-janaka roa lahy. Dia nankeo amin’ny voalohany izy ka niteny taminy hoe: «Ndeha, anaka, miasa any amin’ny tanimboaloboko anio!» '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy ny navaliny: «Izao dia izao ihany aho dia handeha, tompoko»; kanjo tsy nandeha ilay io. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary raha misy olona manontany anareo, dia valio hoe: «Misy ilàn’ny Tompo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Tompony.
      marker-yv: yv-n
    - type: text
      text: azy!» Dia havelany hoentinareo miaraka amin’izay ny boriky vavy sy ny zanany.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nankeo amin’ny faharoa izy ka niteny taminy toy izany koa. Ary hoy ny navaliny: «Tsy handeha aho»; kanjo nanenina izy taorian’izany ka nandeha ihany. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Iza moa amin’izy mirahalahy no nanao ny sitrapon-drainy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ilay faharoa!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jesoa nanao tamin-dry zareo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Lazaiko marina aminareo fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' sy ny vehivavy mpivarotena dia efa nialoha anareo ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Eny, tonga teo aminareo i Jôhany Mpanao batisa, ary naneho taminareo ny lala-marina voasoritr’Andriamanitra, saingy tsy nino an’i Jôhany ianareo, fa ireo mpamory hetra sy vehivavy mpivarotena no nino azy; ary ianareo kosa, na dia efa nahita azy ireny aza, dia mbola tsy nanenina ihany taorian’izany mba hinoanareo an’i Jôhany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanoharana ny amin’ilay tompona tanimboaloboka
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 12.1-12; Lk 20.9-19)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '–Mihainoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanoharana
    - type: text
      text: ' hafa koa: Nisy mpanan-tany nanamboatra tanimboaloboka sy namefy azy manodidina ary nanao lavaka famiazam-bokatra sy tilikambo fiambenana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Is 5.1-2.
      marker-yv: yv-n
    - type: text
      text: '; dia nampanofa azy tamina mpamboly ary lasa nankany an-tany hafa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nony tonga ny fotoam-pahavokarana, dia nirahiny ho any amin’ireo mpamboly ny mpiasany handray ny vokatra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa nosamborin’ireo mpamboly ny mpiasany ka ny anankiray nokapohiny, ny anankiray novonoiny ary ny anankiray notorahany vato. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia mpiasa hafa, maro noho ny teo indray, no nirahiny; kanefa nataon’ireo mpamboly toy izany koa. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tamin’ny farany dia ny zanany no nirahiny ho any amin’ireo mpamboly, fa hoy ilay tompon’ny tanimboaloboka: «Hananan’ireo hena-maso ny zanako!» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Vao nahita ity zanany kosa ireo mpamboly, dia nifampiresaka hoe: «Ny mpandova ity, ka ndeha hovonoina dia ho lasantsika ny lovany.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Dia nosamborin’ireo mpamboly izy ka natosiny tany ivelan’ny tanimboaloboka ary novonoiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izany dia tonga mba ho tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia hoy i Jesoa nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tonga àry ilay tompon’ny tanimboaloboka, inona moa no hataony amin’ireo mpamboly ireo?
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia hoy ry zareo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ireo olona tsy manana antra ireo dia haringany tsy hananany antra ary ny tanimboaloboka dia hahofany amina mpamboly hafa izay hanome azy ny vokatra isaky ny fotoam-pahavokarana.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary izao no tenin’i Jesoa tamin’ny lohandoha-mpisorona sy ny Farisianina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy novakînareo angaha ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny vato nolavin’ny mpanao trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanjary vato fehizoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ny Tompo izao,
