document_id: MAT.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miditra ao Jerosalema i Jesoa
  - type: heading
    content: (Jereo Mk 11.1-11; Lk 19.28-38; Jôh 12.12-19)
  - type: text
    content: Ary nanakaiky an’i Jerosalema i Jesoa mbamin’ny mpianany sy ny vahoaka tafaraka taminy, ka tonga teo anilan’ny tanàna Betifage, eo amin’ny tendrombohitra atao hoe Analanôliva
  - type: note
    content: Jereo Mk 11.1 sy nta.
  - type: text
    content: '. Dia naniraka roa lahy tamin’ny mpianany i Jesoa ka nanao taminy hoe:'
  '10':
  - type: text
    content: 'Ary nony efa tafiditra tao Jerosalema i Jesoa, dia nihotakotaka avokoa ny iray tanàna ka nanontany hoe:'
  - type: text
    content: –Iza moa io lehilahy io?
  '11':
  - type: text
    content: 'Dia novalian’ny vahoaka hoe:'
  - type: text
    content: –Io no Jesoa mpaminany, Izay avy any Nazareta tanànan’i Galilea!
  - type: heading
    content: Tandrovin’i Jesoa ny hajan’ny tempoly
  - type: heading
    content: (Jereo Mk 11.15-19; Lk 19.45-48; Jôh 2.13-22)
  '12':
  - type: text
    content: 'Dia namantana tao an-kianjan’ny tempoly i Jesoa; ka ireo mpivarotra sy mpividy teo dia noroahiny avokoa, ny latabatr’ireo mpanakalo vola sy ny sezan’ireo mpivaro-boromahailala nazerany; '
  '13':
  - type: text
    content: 'ary hoy i Jesoa tamin’ireo olona ireo:'
  - type: text
    content: '–Izao no voalazan’ny Soratra Masina: «Ny tranoko dia hantsoina hoe trano fivavahana.» Nefa he ity izy ataonareo zohy fieren’ny mpangalatra'
  - type: note
    content: Ampit Is 56.7; Jer 7.11.
  - type: text
    content: '!'
  '14':
  - type: text
    content: 'Ary nisy jamba sy mandringa nanatona an’i Jesoa tao an-kianjan’ny tempoly ka dia nositraniny. '
  '15':
  - type: text
    content: 'Fa tezitra mafy kosa ireo lohandoha-mpisorona sy ireo mpahay lalàna nony nahita ny zava-mahagaga nataony sy nahita ny ankizy madinika niantsoantso tao an-kianjan’ny tempoly hoe: «Dera anie ho an’ny '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: '!» '
  '16':
  - type: text
    content: 'Ka hoy ry zareo tamin’i Jesoa:'
  - type: text
    content: –Renao ve izay lazain’ireo?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Eny, reko tokoa! Sady tsy mbola novakînareo ve ny andinin’ny Soratra Masina hoe: «Ny vavan’ny ankizy madinika aman-jaza minono avy no nataonao hahazoan-dera'
  - type: note
    content: Sal 8.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: »?
  '17':
  - type: text
    content: Dia nilaozan’i Jesoa ry zareo; ary niala tao an-tanàna Izy hankany Betania, ka nandry tany.
  - type: heading
    content: Tsy hamoa intsony ilay aviavy
  - type: heading
    content: (Jereo Mk 11.12-14, 20-24)
  '18':
  - type: text
    content: 'Dia niverina maraina ho any an-tanàna i Jesoa ary nahatsiaro noana. '
  '19':
  - type: text
    content: 'Nahatazana aviavy anankiray teo amoron-dalana Izy, dia lasa nankeo; kanjo tsy nahita na inona na inona teo aminy afa-tsy raviny fotsiny. Dia hoy i Jesoa tamin’ilay aviavy:'
  - type: text
    content: –Tsy hamoa intsony ianao na oviana na oviana!
  - type: text
    content: 'Ary vetivety foana dia maina ilay aviavy. '
  '2':
  - type: text
    content: '–Mankanesa amin’itsy tanàna manoloana anareo itsy. Vantany vao migadona ao ianareo, dia hahita boriky vavy mifatotra sy ny zanany miaraka aminy: vahao ilay boriky vavy dia ento atỳ amiko ombàn-janany. '
  '20':
  - type: text
    content: 'Gaga ny mpianatra nahita izany ka vaky vava hoe:'
  - type: text
    content: –Ahoana re no nahamaina vetivety io aviavy io?
  '21':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Izao no lazaiko marina aminareo; raha manam-pinoana ianareo ka tsy misalasala, dia tsy izao nataoko tamin’ny aviavy izao ihany no ho vitanareo, fa na itsy tendrombohitra itsy aza hitenenanareo hoe: «Mialà eo ary mianjerà any an-dranomasina», dia ho tonga izany. '
  '22':
  - type: text
    content: Raha mino ianareo, na inona na inona hangatahinareo amin’ny fivavahana dia ho azonareo avokoa.
  - type: heading
    content: Avy aiza ny fahefàn’i Jesoa?
  - type: heading
    content: (Jereo Mk 11.27-33; Lk 20.1-18)
  '23':
  - type: text
    content: 'Nony tafiditra tao an-kianjan’ny tempoly i Jesoa, dia nampianatra. Ary nanatona Azy ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholon
  - type: text
    content: '’ny vahoaka jiosy ka nanontany Azy hoe:'
  - type: text
    content: –Fahefana ahoana moa no anaovanao an’izao? Ary iza no nanome anao izany fahefana izany?
  '24':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Izaho koa mba hanontany anareo zavatra anankiray monja; ka raha omenareo valiny Aho, dia holazaiko anareo koa ny fahefana anaovako an’izao zavatra izao. '
  '25':
  - type: text
    content: 'Iza no naniraka an’i Jôhany hanao '
  - type: text
    content: batisa
  - type: note
    content: Jereo 3.6.
  - type: text
    content: ', Andriamanitra sa olombelona?'
  - type: text
    content: 'Dia velona ady hevitra ry zareo ka nifampiresaka hoe:'
  - type: text
    content: '–Raha lazaintsika hoe: «Andriamanitra no naniraka azy», dia isika no hataony hoe: «Koa nahoana no tsy ninoanareo i Jôhany?» '
  '26':
  - type: text
    content: 'Raha lazaintsika hoe: «Olombelona no naniraka azy», dia ny vahoaka no atahorantsika satria nankatoavin’izy rehetra ho '
  - type: text
    content: mpaminani
  - type: text
    content: n’Andriamanitra i Jôhany.
  '27':
  - type: text
    content: 'Koa dia izao no navalin-dry zareo an’i Jesoa:'
  - type: text
    content: –Tsy hitanay izay holazaina!
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Izaho koa tsy hilaza aminareo ny fahefana anaovako an’izao zavatra izao.
  - type: heading
    content: Fanoharana ny amin’izy mirahalahy
  '28':
  - type: text
    content: 'Dia hoy indray i Jesoa tamin’ireo lohandoha-mpisorona sy ireo loholona hoe:'
  - type: text
    content: '–Ahoana kosa ny hevitrareo ny amin’ity? Nisy lehilahy nanan-janaka roa lahy. Dia nankeo amin’ny voalohany izy ka niteny taminy hoe: «Ndeha, anaka, miasa any amin’ny tanimboaloboko anio!» '
  '29':
  - type: text
    content: 'Ary hoy ny navaliny: «Izao dia izao ihany aho dia handeha, tompoko»; kanjo tsy nandeha ilay io. '
  '3':
  - type: text
    content: 'Ary raha misy olona manontany anareo, dia valio hoe: «Misy ilàn’ny Tompo'
  - type: note
    content: 'ny Tompo: dkt hafa ny Tompony.'
  - type: text
    content: azy!» Dia havelany hoentinareo miaraka amin’izay ny boriky vavy sy ny zanany.
  '30':
  - type: text
    content: 'Dia nankeo amin’ny faharoa izy ka niteny taminy toy izany koa. Ary hoy ny navaliny: «Tsy handeha aho»; kanjo nanenina izy taorian’izany ka nandeha ihany. '
  '31':
  - type: text
    content: Iza moa amin’izy mirahalahy no nanao ny sitrapon-drainy?
  - type: text
    content: 'Dia hoy ireo:'
  - type: text
    content: –Ilay faharoa!
  - type: text
    content: 'Ary i Jesoa nanao tamin-dry zareo hoe:'
  - type: text
    content: '–Lazaiko marina aminareo fa ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' sy ny vehivavy mpivarotena dia efa nialoha anareo ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '32':
  - type: text
    content: Eny, tonga teo aminareo i Jôhany Mpanao batisa, ary naneho taminareo ny lala-marina voasoritr’Andriamanitra, saingy tsy nino an’i Jôhany ianareo, fa ireo mpamory hetra sy vehivavy mpivarotena no nino azy; ary ianareo kosa, na dia efa nahita azy ireny aza, dia mbola tsy nanenina ihany taorian’izany mba hinoanareo an’i Jôhany.
  - type: heading
    content: Fanoharana ny amin’ilay tompona tanimboaloboka
  - type: heading
    content: (Jereo Mk 12.1-12; Lk 20.9-19)
  '33':
  - type: text
    content: '–Mihainoa '
  - type: text
    content: fanoharana
  - type: text
    content: ' hafa koa: Nisy mpanan-tany nanamboatra tanimboaloboka sy namefy azy manodidina ary nanao lavaka famiazam-bokatra sy tilikambo fiambenana'
  - type: note
    content: Ampit Is 5.1-2.
  - type: text
    content: '; dia nampanofa azy tamina mpamboly ary lasa nankany an-tany hafa. '
  '34':
  - type: text
    content: 'Nony tonga ny fotoam-pahavokarana, dia nirahiny ho any amin’ireo mpamboly ny mpiasany handray ny vokatra. '
  '35':
  - type: text
    content: 'Fa nosamborin’ireo mpamboly ny mpiasany ka ny anankiray nokapohiny, ny anankiray novonoiny ary ny anankiray notorahany vato. '
  '36':
  - type: text
    content: 'Dia mpiasa hafa, maro noho ny teo indray, no nirahiny; kanefa nataon’ireo mpamboly toy izany koa. '
  '37':
  - type: text
    content: 'Tamin’ny farany dia ny zanany no nirahiny ho any amin’ireo mpamboly, fa hoy ilay tompon’ny tanimboaloboka: «Hananan’ireo hena-maso ny zanako!» '
  '38':
  - type: text
    content: 'Vao nahita ity zanany kosa ireo mpamboly, dia nifampiresaka hoe: «Ny mpandova ity, ka ndeha hovonoina dia ho lasantsika ny lovany.» '
  '39':
  - type: text
    content: Dia nosamborin’ireo mpamboly izy ka natosiny tany ivelan’ny tanimboaloboka ary novonoiny.
  '4':
  - type: text
    content: 'Izany dia tonga mba ho tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  '40':
  - type: text
    content: 'Dia hoy i Jesoa nanontany hoe:'
  - type: text
    content: –Raha tonga àry ilay tompon’ny tanimboaloboka, inona moa no hataony amin’ireo mpamboly ireo?
  '41':
  - type: text
    content: 'Dia hoy ry zareo taminy:'
  - type: text
    content: –Ireo olona tsy manana antra ireo dia haringany tsy hananany antra ary ny tanimboaloboka dia hahofany amina mpamboly hafa izay hanome azy ny vokatra isaky ny fotoam-pahavokarana.
  '42':
  - type: text
    content: 'Ary izao no tenin’i Jesoa tamin’ny lohandoha-mpisorona sy ny Farisianina:'
  - type: text
    content: '–Tsy novakînareo angaha ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' manao hoe:'
  - type: text
    content: «Ny vato nolavin’ny mpanao trano
  - type: text
    content: no nanjary vato fehizoro;
  - type: text
    content: avy amin’ny Tompo izao,
  - type: text
    content: ary dia zava-mahagaga eto ambany masontsika
  - type: note
    content: Sal 118.22-23.
  - type: text
    content: '!»'
  '43':
  - type: text
    content: 'Noho izany, dia lazaiko aminareo fa hoesorina aminareo ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ', ka homena izay firenena hampahavokatra azy. [ '
  '44':
  - type: text
    content: Izay mianjera amin’izany vato izany dia ho torotoro; ary izay ianjerany kosa ho montsamontsana
  - type: note
    content: Jereo Lk 20.18.
  - type: text
    content: .]
  '45':
  - type: text
    content: 'Nony nandre ireo fanoharana nataon’i Jesoa ireo ny lohandoha-mpisorona sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia nahatsiaro tena ho lazainy amin’izany. '
  '46':
  - type: text
    content: 'Ary nitady hisambotra Azy ry zareo, saingy natahotra ny vahoaka izay nankatò an’i Jesoa ho '
  - type: text
    content: mpaminanin’Andriamanitra
  - type: text
    content: .
  '5':
  - type: text
    content: '«Izao lazaina amin’ny mponina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ':'
  - type: text
    content: Indro ny mpanjakanareo fa tonga eo aminareo,
  - type: text
    content: feno halemem-panahy sady mitaingina boriky vavy
  - type: text
    content: dia boriky vavy ombàn-janany, zanaky ny mitondra zioga
  - type: note
    content: Za 9.9.
  - type: text
    content: .»
  '6':
  - type: text
    content: 'Dia nandeha ireto mpianatra ka nanao araka ny nandidian’i Jesoa azy. '
  '7':
  - type: text
    content: 'Nentin’izy roa lahy ny boriky vavy ombàn-janany; ary ny mpianatra rehetra dia samy nametraka ny lambany teo ambonin’ny boriky vavy ombàn-janany, ka tambony lamba i Jesoa no nitaingina. '
  '8':
  - type: text
    content: Be tokoa ny vahoaka namelatra ny lambany teny amin’ny lalan’i Jesoa; ny sasany kosa rantsan-kazo tinapaka no naparitany teny amin’ny lalan’i Jesoa
  - type: note
    content: Ampit 2 Mp 9.13.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia samy niantsoantso hoe:'
  - type: text
    content: '«Dera anie ho an’ny '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: '!'
  - type: text
    content: Hombam-pitahiana amin’ny anaran’ny Tompo anie
  - type: text
    content: Ilay avy!
  - type: text
    content: Dera anie ho an’Andriamanitra any amin’ny avo indrindra
  - type: note
    content: 'Ampit Sal 118.25-26. –Dera anie: ny rijan-teny grika fototra dia ahitana ny hoe hôsannà, izay voambolana hebreo midika hoe tongava hamonjy anay (Sal 118.25); kanefa nanjary fiteny fihobiana sy fiderana izany tatỳ aoriana.'
  - type: text
    content: '!»'
