  - type: text
    text: 'Ny andiany faharoa amin’ireo bokin’ny Testamenta Taloha hebreo voalahatra araka ny Baiboly grika Septoazinta dia ireo boky ara-tantara manomboka eo amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josoa
  - type: text
    text: ' ka miafara amin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Estera
  - type: text
    text: '. Ao anatin’ireo boky ireo no ahitana ny tantaran’ilay Israely vahoakan’Andriamanitra, indrindra hatreo amin’ny nidirany tao amin’ny tany nampanantenaina ka hatrany amin’ny niverenany avy any amin’ny fahababoana tany Babilônia. Ireto avy ireo boky ara-tantara amin’ity edisiona ity: '
