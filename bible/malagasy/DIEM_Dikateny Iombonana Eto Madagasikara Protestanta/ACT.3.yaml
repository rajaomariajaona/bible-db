document_id: ACT.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitrana ilay mpangataka malemy tongotra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tamin’ny telo tolakandro, fotoana fivavahana, dia niakatra ho any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' i Petera sy i Jôhany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ka nony nahafantatra fa io indrindra ilay nipetraka nangataka teo amin’ny vavahady Itsaraendrika, dia tolagaga sy talanjona noho ny zava-nitranga tamin-dralehilahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lahatenin’i Petera tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tsy nisaraka tamin’i Petera sy i Jôhany ralehilahy, koa sady tolagaga ny vahoaka rehetra no nirohotra nanatona azy telo lahy teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lala-mitafo
    - type: text
      text: ' atao hoe «lala-mitafon’i Salômôna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Io '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lala-mitafo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' io dia ilay mitandavana tamin’ny ilany atsinanan’ny kianja azon’ny hafa firenena ivezivezena tao amin’ny tempolin’i Jerosalema. Ampit Jôh 10.23; Asa 5.12.'
      marker-yv: yv-n
    - type: text
      text: '». '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha nahita izany i Petera, dia niteny tamin’ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: israelita
    - type: text
      text: ', nahoana no gaga amin’izany ianareo? Nahoana izahay no banjininareo hoatra ny hoe herinay manokana na ny fitiavam-bavakay no nampandeha io lehilahy io? '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, Andriamanitry ny razantsika, no nanome voninahitra an’i Jesoa ilay Mpanompony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 3.15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jesoa ilay Mpanompony:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toa tondroina ho ilay mpanompo voalaza ao amin’ny Is 52.13–53.12 i Jesoa etoana.'
      marker-yv: yv-n
    - type: text
      text: '. Natolotrareo tamin’ny manampahefana i Jesoa ary nolavinareo teo anatrehan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: text
      text: ', izay efa tapa-kevitra handefa Azy; '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ilay Masina sy Marina dia nolavinareo, ary lehilahy mpamono olona no nitakianareo famotsoran-keloka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 27.15-23; Mk 15.6-14; Lk 23.13-23; Jôh 18.38-40; 19.12-15.
      marker-yv: yv-n
    - type: text
      text: '; '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ilay Mpitari-dalana ho amin’ny fiainana dia novonoinareo, nefa natsangan’Andriamanitra ho velona avy any amin’ny maty; ary vavolombelona manambara izany izahay. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nino ny anaran’i Jesoa ralehilahy izay hitanareo sy fantatrareo io, ka ny herin’ny anaran’i Jesoa no nampanjaka azy; ny finoana avy amin’i Jesoa no nahatomady azy tanteraka indray araka izao atrehinareo rehetra izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny anaran’i Jesoa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'matetika ao amin’ny Baiboly ny hoe anarana dia tsy hafa fa ilay olona tompon’anarana ihany. Fahita matetika ao amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Asan’ny apôstôly
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany fomba fiteny izany (jereo Asa 4.10, sns) ka ilazana an’i Jesoa tenany efa nitsangan-ko velona. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny finoana avy amin’i Jesoa:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit 1 Pt 1.21.'
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fantatro kosa, ry havako, fa tsy fahalalana no nahatonga anareo hanao izay nataonareo tamin’i Jesoa ary toraka izany koa ny manampahefana teo aminareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Notanterahin’Andriamanitra tamin’izany anefa izay voalazany tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' rehetra fahiny hoe: tsy maintsy hijaly ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 24.26-27.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Noho izany, ialao ny toe-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ialao ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ', ary miverena amin’Andriamanitra mba ho foana ny helokareo; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Teo anoloan’ny vavahadin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ', ilay antsoina hoe Itsaraendrika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Vavahady Itsaraendrika:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa ilay vavahady be, fidirana ao amin’ny kianja voatokana ho an’ny vehivavy jiosy.
      marker-yv: yv-n
    - type: text
      text: ', dia nisy lehilahy malemy tongotra hatrany an-kibon-dreniny. Nentin’ny olona isan’andro ka napetrany teo izy mba hangataka fiantrana amin’izay olona miditra ao an-kianjan’ny tempoly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia ho tonga aminareo ny vaninandro famelombelomana avy amin’ny Tompo ary hirahiny ho anareo ilay Mesia efa voatendriny, dia i Jesoa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Kanefa tsy maintsy horaisin’ny lanitra aloha Izy mandra-piavin’ny fotoana hanavaozana izao rehetra izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hanavaozana izao rehetra izao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2Pt 3.13; Apôk 21.1-15.
      marker-yv: yv-n
    - type: text
      text: ', araka izay nambaran’Andriamanitra tamin’ny alalan’ny mpaminany masina hatramin’ny fahagola. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa hoy i Mosesy: «Hisy mpaminany tahaka ahy hajoron’ny Tompo Andriamanitrareo ho anareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hisy mpaminany... ho anareo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hisy mpaminany hajoron’ny Tompo Andriamanitra ho anareo tahaka ny nampijoroany ahy.
      marker-yv: yv-n
    - type: text
      text: ', dia mpaminany avy aminareo samy ianareo; aoka hohenoinareo izay rehetra holazainy aminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Izay rehetra tsy hihaino izany mpaminany izany dia haringana tsy ho eo amin’ny vahoakan’Andriamanitra intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 22-23, jereo Deot 18.15, 18, 19; Lev 23.29.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny mpaminany rehetra izay niteny, hatramin’ny andron’i Samoela no mankatỳ, dia samy nitory izao andro izao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ho anareo ny fampanantenana nataon’Andriamanitra tamin’ny alalan’ny mpaminany, ary iombonanareo anjara ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' nataon’Andriamanitra tamin’ny razanareo fony Izy niteny tamin’i Abrahama hoe: «Ny taranakao no hitahiana ny firenena rehetra eto an-tany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 22.18.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ho anareo aloha no nampijoroan’Andriamanitra ny Mpanompony sady nanirahany Azy mba hitahy anareo, dia ny hampiala anareo tsirairay avy amin’ny asa ratsinareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hitan-dralehilahy i Petera sy i Jôhany efa ndeha hiditra ka nangatahany fiantrana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izy roa lahy kosa nibanjina ilay kilemaina ary hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereo izahay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nanao tsara jery azy roa lahy ity mpangataka satria nanantena handray zavatra avy aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy ananako na ny volafotsy na ny volamena, fa izay ananako no omeko anao: amin’ny anaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' avy any Nazareta, mitsangàna ka mandehana!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia noraisin’i Petera ny tanan-kavanan’ilay kilemaina ary nasainy nitsangana izy. Natanjaka niaraka tamin’izay ny tongony sy ny kitrokeliny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'niantsambotra izy dia nijoro ary nandeha. Niara-niditra tamin’i Petera sy i Jôhany tao an-kianjan’ny tempoly ralehilahy, sady nandeha no niantsambotsambotra ary nidera an’Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nahita azy nandeha sy nidera an’Andriamanitra toy izany ny vahoaka rehetra, '
