document_id: ACT.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitrana ilay mpangataka malemy tongotra
  - type: text
    content: Tamin’ny telo tolakandro, fotoana fivavahana, dia niakatra ho any an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Petera sy i Jôhany. '
  '10':
  - type: text
    content: ka nony nahafantatra fa io indrindra ilay nipetraka nangataka teo amin’ny vavahady Itsaraendrika, dia tolagaga sy talanjona noho ny zava-nitranga tamin-dralehilahy.
  - type: heading
    content: Lahatenin’i Petera tao an-kianjan’ny tempoly
  '11':
  - type: text
    content: 'Tsy nisaraka tamin’i Petera sy i Jôhany ralehilahy, koa sady tolagaga ny vahoaka rehetra no nirohotra nanatona azy telo lahy teo amin’ny '
  - type: text
    content: lala-mitafo
  - type: text
    content: ' atao hoe «lala-mitafon’i Salômôna'
  - type: note
    content: 'Io lala-mitafo: io dia ilay mitandavana tamin’ny ilany atsinanan’ny kianja azon’ny hafa firenena ivezivezena tao amin’ny tempolin’i Jerosalema. Ampit Jôh 10.23; Asa 5.12.'
  - type: text
    content: '». '
  '12':
  - type: text
    content: 'Raha nahita izany i Petera, dia niteny tamin’ny vahoaka hoe:'
  - type: text
    content: '–Ry vahoaka '
  - type: text
    content: israelita
  - type: text
    content: ', nahoana no gaga amin’izany ianareo? Nahoana izahay no banjininareo hoatra ny hoe herinay manokana na ny fitiavam-bavakay no nampandeha io lehilahy io? '
  '13':
  - type: text
    content: Ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba, Andriamanitry ny razantsika, no nanome voninahitra an’i Jesoa ilay Mpanompony
  - type: note
    content: 'Jereo Eks 3.15. –Jesoa ilay Mpanompony: toa tondroina ho ilay mpanompo voalaza ao amin’ny Is 52.13–53.12 i Jesoa etoana.'
  - type: text
    content: '. Natolotrareo tamin’ny manampahefana i Jesoa ary nolavinareo teo anatrehan’i '
  - type: text
    content: Pilato
  - type: text
    content: ', izay efa tapa-kevitra handefa Azy; '
  '14':
  - type: text
    content: ilay Masina sy Marina dia nolavinareo, ary lehilahy mpamono olona no nitakianareo famotsoran-keloka
  - type: note
    content: Jereo Mt 27.15-23; Mk 15.6-14; Lk 23.13-23; Jôh 18.38-40; 19.12-15.
  - type: text
    content: '; '
  '15':
  - type: text
    content: 'ilay Mpitari-dalana ho amin’ny fiainana dia novonoinareo, nefa natsangan’Andriamanitra ho velona avy any amin’ny maty; ary vavolombelona manambara izany izahay. '
  '16':
  - type: text
    content: Nino ny anaran’i Jesoa ralehilahy izay hitanareo sy fantatrareo io, ka ny herin’ny anaran’i Jesoa no nampanjaka azy; ny finoana avy amin’i Jesoa no nahatomady azy tanteraka indray araka izao atrehinareo rehetra izao
  - type: note
    content: 'ny anaran’i Jesoa: matetika ao amin’ny Baiboly ny hoe anarana dia tsy hafa fa ilay olona tompon’anarana ihany. Fahita matetika ao amin’ny Asan’ny apôstôly izany fomba fiteny izany (jereo Asa 4.10, sns) ka ilazana an’i Jesoa tenany efa nitsangan-ko velona. –ny finoana avy amin’i Jesoa: ampit 1 Pt 1.21.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Fantatro kosa, ry havako, fa tsy fahalalana no nahatonga anareo hanao izay nataonareo tamin’i Jesoa ary toraka izany koa ny manampahefana teo aminareo. '
  '18':
  - type: text
    content: 'Notanterahin’Andriamanitra tamin’izany anefa izay voalazany tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' rehetra fahiny hoe: tsy maintsy hijaly ilay '
  - type: text
    content: Mesiany
  - type: note
    content: Ampit Lk 24.26-27.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Noho izany, ialao ny toe-dratsy
  - type: note
    content: 'ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', ary miverena amin’Andriamanitra mba ho foana ny helokareo; '
  '2':
  - type: text
    content: 'Teo anoloan’ny vavahadin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ', ilay antsoina hoe Itsaraendrika'
  - type: note
    content: 'Vavahady Itsaraendrika: toa ilay vavahady be, fidirana ao amin’ny kianja voatokana ho an’ny vehivavy jiosy.'
  - type: text
    content: ', dia nisy lehilahy malemy tongotra hatrany an-kibon-dreniny. Nentin’ny olona isan’andro ka napetrany teo izy mba hangataka fiantrana amin’izay olona miditra ao an-kianjan’ny tempoly. '
  '20':
  - type: text
    content: 'dia ho tonga aminareo ny vaninandro famelombelomana avy amin’ny Tompo ary hirahiny ho anareo ilay Mesia efa voatendriny, dia i Jesoa. '
  '21':
  - type: text
    content: Kanefa tsy maintsy horaisin’ny lanitra aloha Izy mandra-piavin’ny fotoana hanavaozana izao rehetra izao
  - type: note
    content: 'hanavaozana izao rehetra izao: jereo 2Pt 3.13; Apôk 21.1-15.'
  - type: text
    content: ', araka izay nambaran’Andriamanitra tamin’ny alalan’ny mpaminany masina hatramin’ny fahagola. '
  '22':
  - type: text
    content: 'Fa hoy i Mosesy: «Hisy mpaminany tahaka ahy hajoron’ny Tompo Andriamanitrareo ho anareo'
  - type: note
    content: Hisy mpaminany... ho anareo na hoe hisy mpaminany hajoron’ny Tompo Andriamanitra ho anareo tahaka ny nampijoroany ahy.
  - type: text
    content: ', dia mpaminany avy aminareo samy ianareo; aoka hohenoinareo izay rehetra holazainy aminareo. '
  '23':
  - type: text
    content: Izay rehetra tsy hihaino izany mpaminany izany dia haringana tsy ho eo amin’ny vahoakan’Andriamanitra intsony
  - type: note
    content: Momba ny and 22-23, jereo Deot 18.15, 18, 19; Lev 23.29.
  - type: text
    content: '.» '
  '24':
  - type: text
    content: 'Ary ny mpaminany rehetra izay niteny, hatramin’ny andron’i Samoela no mankatỳ, dia samy nitory izao andro izao. '
  '25':
  - type: text
    content: 'Ho anareo ny fampanantenana nataon’Andriamanitra tamin’ny alalan’ny mpaminany, ary iombonanareo anjara ilay '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataon’Andriamanitra tamin’ny razanareo fony Izy niteny tamin’i Abrahama hoe: «Ny taranakao no hitahiana ny firenena rehetra eto an-tany'
  - type: note
    content: Gen 22.18.
  - type: text
    content: '.» '
  '26':
  - type: text
    content: Ho anareo aloha no nampijoroan’Andriamanitra ny Mpanompony sady nanirahany Azy mba hitahy anareo, dia ny hampiala anareo tsirairay avy amin’ny asa ratsinareo.
  '3':
  - type: text
    content: 'Hitan-dralehilahy i Petera sy i Jôhany efa ndeha hiditra ka nangatahany fiantrana. '
  '4':
  - type: text
    content: 'Izy roa lahy kosa nibanjina ilay kilemaina ary hoy i Petera taminy:'
  - type: text
    content: –Jereo izahay.
  '5':
  - type: text
    content: 'Dia nanao tsara jery azy roa lahy ity mpangataka satria nanantena handray zavatra avy aminy. '
  '6':
  - type: text
    content: 'Fa hoy i Petera taminy:'
  - type: text
    content: '–Tsy ananako na ny volafotsy na ny volamena, fa izay ananako no omeko anao: amin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' avy any Nazareta, mitsangàna ka mandehana!'
  '7':
  - type: text
    content: 'Dia noraisin’i Petera ny tanan-kavanan’ilay kilemaina ary nasainy nitsangana izy. Natanjaka niaraka tamin’izay ny tongony sy ny kitrokeliny; '
  '8':
  - type: text
    content: 'niantsambotra izy dia nijoro ary nandeha. Niara-niditra tamin’i Petera sy i Jôhany tao an-kianjan’ny tempoly ralehilahy, sady nandeha no niantsambotsambotra ary nidera an’Andriamanitra. '
  '9':
  - type: text
    content: 'Nahita azy nandeha sy nidera an’Andriamanitra toy izany ny vahoaka rehetra, '
