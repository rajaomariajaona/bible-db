document_id: JOS.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fizarana ny tany Kanahàna
  - type: text
    content: 'Ireto no zaratany izay nomena ny Israelita tao amin’ny tany Kanahàna. I Elehazara mpisorona sy i Josoa zanakalahin’i Nona ary ireo filohan-tarika teo amin’ny foko israelita no nizara azy. '
  '10':
  - type: text
    content: 'Efa 45 taona izao no nanomezan’ny TOMPO izany baiko izany tamin’i Mosesy fony ny Israelita namakivaky ny taniefitra. Hatramin’izay aho mbola novelomin’ny TOMPO araka ny teniny, ka jereo ankehitriny fa efa 85 taona aho izao. '
  '11':
  - type: text
    content: 'Kanefa mbola matanjaka ihany aho izao tahaka ny tamin’ny andro nanirahan’i Mosesy ahy hisafo ny tany. Eny, mbola manana hery tahaka ny fahizany tokoa aho na hiady na hanao asa hafa. '
  '12':
  - type: text
    content: Koa ankehitriny àry, omeo ahy irỳ tendrombohitra irỳ izay efa nampanantenain’ny TOMPO ahy tamin’izany fotoana izany; satria efa henonao tamin’izay fa ao ny Hanakita
  - type: note
    content: Jereo Nom 13.22 sy nta.
  - type: text
    content: ' no mipetraka anaty tanàna lehibe sady misy manda. Raha momba ahy ny TOMPO, dia horoahiko tao ireo, araka izay efa nolazain’Izy TOMPO.'
  '13':
  - type: text
    content: 'Dia '
  - type: text
    content: nitsodrano
  - type: text
    content: ' an’i Kaleba zanakalahin’i Jefonè i Josoa ka nanome an’i Hebrôna ho lovany. '
  '14':
  - type: text
    content: 'Izany no nahatonga an’i Hebrôna ho lovan’ny taranak’i Kaleba mandraka androany; satria i Kaleba, zanakalahin’i Jefonè sady anisan’ny tarik’i Kenaza, dia nifikitra tanteraka tamin’ny TOMPO Andriamanitr’i Israely; '
  '15':
  - type: text
    content: Fa ny anaran’i Hebrôna, talohan’ny nahazoan’i Kaleba azy, dia Kiriata-Arbà na hoe tanànan’i Arbà, satria i Arbà no olo-malaza indrindra tamin’ny Hanakita.
  - type: text
    content: Dia nitsahatra ny ady ka nandry feizay ny tany.
  '2':
  - type: text
    content: 'Antsapaka no nanaovana ny fizaràna ho an’ireo foko sivy sy ilay antsasa-pokon’i Manase, araka izay nandidian’ny TOMPO an’i Mosesy. '
  '3':
  - type: text
    content: 'I Mosesy manko efa nanome zara tany ho an’ireo foko anankiroa sy ho an’ny antsasa-pokon’i Manase tany am-pita atsinanan’i Jôrdàna; fa ny Levita ihany tamin’izy tany am-pita atsinanan’i Jôrdàna; fa ny Levita ihany tamin’izy rehetra no tsy mba nomeny, '
  '4':
  - type: text
    content: 'satria ny taranak’i Jôsefa dia efa foko roa: ny fokon’i Manase sy ny fokon’i Efraîma. Koa tsy nomena zaratany ny '
  - type: text
    content: levita
  - type: text
    content: ' afa-tsy tanàna honenana sy kijàna manodidina azy ho an’ny biby fiompiny mbamin’ny fananany hafa. '
  '5':
  - type: text
    content: Izay efa nandidian’ny TOMPO an’i Mosesy no narahin’ny Israelita fony ireo nizara ny tany.
  '6':
  - type: text
    content: 'Indray andro dia nanatona an’i Josoa tany Gilgala ny olona sasany avy amin’ny fokon’i Joda; isan’ireny i Kaleba zanakalahin’i Jefonè, avy amin’ny tarik’i Kenaza. Dia hoy i Kaleba tamin’i Josoa:'
  - type: text
    content: '–Tsaroanao tsara ny teny izay nolazain’ny TOMPO tamin’i Mosesy lehilahin’Andriamanitra ny momba ahy sy ianao tany Kadesy-Barnea. '
  '7':
  - type: text
    content: 'Efapolo taona aho tamin’izay no nirahin’Andriamanitra raha nirahin’i Mosesy, mpanompon’ny TOMPO, avy tao Kadesy-Barnea mba hisafo ity tany ity; ary nony niverina aho, dia nanao tatitra taminy araka izay tao am-poko, '
  '8':
  - type: text
    content: 'Ireo namana izay niara-niakatra tamiko dia nanaketraka ny fon’ny vahoaka, fa izaho kosa nifikitra tanteraka tamin’ny TOMPO Andriamanitro. '
  '9':
  - type: text
    content: 'Tamin’izay andro izay dia nianianan’i Mosesy aho fa ho anjara roa lova ho ahy sy ny taranako mandrakizay ny tany izay noteteziko, noho izaho nifikitra tanteraka tamin’ny TOMPO Andriamanitro. '
