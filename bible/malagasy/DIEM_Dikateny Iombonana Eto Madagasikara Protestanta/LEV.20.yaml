document_id: LEV.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sazy mihatra amin’ireo Israelita mpanompo sampy
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '10':
  - type: text
    content: «Raha misy lehilahy maka ny vadin’ny mpiray firenena aminy, dia samy hatao maty tokoa na ralehilahy mpaka vadin’olona na ravehivavy nalainy
  - type: note
    content: Jereo 18.20 sy nta.
  - type: text
    content: .
  '11':
  - type: text
    content: «Ny lehilahy, izay miray amin’ny vadin-drainy, dia manala baràka ny rainy; ary samy hatao maty tokoa na io lehilahy io na ny vadin-drainy, ka hozakain’izy roroa ny ho faty
  - type: note
    content: Jereo 18.8 sy nta.
  - type: text
    content: .
  '12':
  - type: text
    content: «Raha misy lehilahy miray amin’ny vinantovaviny, dia samy hatao maty tokoa izy roroa satria firaisana mifamotitra izany, ka hozakain’izy roroa ny ho faty
  - type: note
    content: Jereo 18.15 sy nta.
  - type: text
    content: .
  '13':
  - type: text
    content: «Raha misy lehilahy miray amin’ny lehilahy hafa tahaka ny firay amin’ny vehivavy, dia manao zavatra mamoafady izy roa lahy; samy hatao maty tokoa izy, ka hozakainy ny ho faty
  - type: note
    content: Jereo 18.22 sy nta.
  - type: text
    content: .
  '14':
  - type: text
    content: «Raha misy lehilahy manambady vehivavy mianaka, dia fanambadiana mampifamotitra izany; ka samy hodorana izy telo, mba hisakanana ny fisian’izany haratsiam-pitondrantena izany eo aminareo
  - type: note
    content: Jereo 18.17 sy nta.
  - type: text
    content: .
  '15':
  - type: text
    content: '«Raha misy lehilahy miray amin’ny biby, dia hatao maty tokoa izy ary hovonoinareo koa ilay biby. '
  '16':
  - type: text
    content: Raha misy vehivavy mety hiray amin’ny biby, dia samy hovonoina na ravehivavy na ilay biby; hatao maty tokoa izy roroa ka hozakainy ny ho faty
  - type: note
    content: 'And 15-16: jereo 18.23 sy nta.'
  - type: text
    content: .
  '17':
  - type: text
    content: «Raha misy lehilahy manambady anabavy zanakavavy nentin-drainy na nentin-dreniny, ka miray tokoa izy roroa, dia zavatra mahamenatra izany; eo imason’ny mpiray firenena aminy no hofongorana tsy ho anisan’ny vahoaka israelita izy roroa, satria niray tamin’ny anabaviny ralehilahy ka itambesaran-keloka
  - type: note
    content: Jereo 18.9 sy nta.
  - type: text
    content: .
  '18':
  - type: text
    content: «Raha misy lehilahy mandry sy miray amin’ny vehivavy mararin’ny fadimbolany, dia nifanaraka hampihanjahanja ny ipoiran’ny ran-dravehivavy izy roroa, ka samy hofongorana tsy ho anisan’ny vahoaka israelita
  - type: note
    content: Jereo 18.19 sy nta.
  - type: text
    content: .
  '19':
  - type: text
    content: «Aza miray amin’ny rahavavin-dreninao na ny anabavin-drainao; satria raha misy lehilahy miray amin’ny havana akaiky dia akaiky toy izany, dia samy itambesaran-keloka izy roroa.
  '2':
  - type: text
    content: '«Izao no lazao amin’ny Israelita. Na iza na iza, Israelita na vahiny valovotaka eo aminy, manolotra ny iray amin’ny zanany ho '
  - type: text
    content: sorona
  - type: text
    content: ' amin’ny sampy Môlôka'
  - type: note
    content: Jereo 18.21 sy nta.
  - type: text
    content: ', dia hatao maty tokoa; ka torabato no hamonoan’ny mponina tompontany azy. '
  '20':
  - type: text
    content: «Raha misy lehilahy miray amin’ny vadin’ny rahalahin-drainy, dia manala baràka ny rahalahin-drainy izy; samy hitambesaran-keloka izy roroa, ka ho faty momba
  - type: note
    content: 'And 19-20: jereo 18.12-14.'
  - type: text
    content: .
  '21':
  - type: text
    content: «Raha misy lehilahy maka ny vadin-drahalahiny, dia zavatra mamoafady izany; noho io lehilahy io nanala baràka ny rahalahiny, dia samy ho momba izy roroa
  - type: note
    content: Jereo 18.16 sy nta.
  - type: text
    content: .
  '22':
  - type: text
    content: '«Imasoy hotanterahinareo ny lalàna amam-pitsipiko rehetra, dia tsy handoa anareo ny tany izay itondrako anareo honenana. '
  '23':
  - type: text
    content: 'Aza manaraka ny fanaon’ny firenena izay horoahiko eo anoloanareo; fa noho izy manao ireny ratsy rehetra ireny no nahatonga azy ho halako '
  '24':
  - type: text
    content: 'ary nahatonga Ahy hilaza aminareo hoe:'
  - type: text
    content: ‹Ianareo no handova ny tany,
  - type: text
    content: ary Izaho no hanome azy ho lovanareo,
  - type: text
    content: dia tany tondra-dronono sy tantely
  - type: note
    content: Jereo Eks 3.8 sy nta.
  - type: text
    content: '!› Izaho no TOMPO Andriamanitrareo, Izay nanavaka anareo tamin’ny firenena samy hafa. '
  '25':
  - type: text
    content: 'Koa tandrovy ny fanavahana momba ny biby '
  - type: text
    content: madio
  - type: text
    content: ' sy maloto ary ny vorona madio sy maloto; aza mandoto tena amin’ny fikasihana biby maloto na vorona maloto na biby madinika mifanaretsaka ambonin’ny tany, satria efa navahako ho maloto aminareo ireny.'
  '26':
  - type: text
    content: «Aoka ho masina sady voatokana ho Ahy ianareo, satria Izaho TOMPO dia masina ary efa nanavaka anareo tamin’ny firenena samy hafa mba ho Ahy.
  '27':
  - type: text
    content: «Izay lehilahy na vehivavy mamoha angatra na tsindrian-javatra tompoina, dia samy hatao maty tokoa ka torabato no hamonoana azy. Hozakain’izy ireo ny ho faty.»
  '3':
  - type: text
    content: 'Ary Izaho mihitsy no hanandrina izany olona izany ka hofongorako tsy ho anisan’ny vahoaka israelita izy satria natolony ho sorona tamin’i Môlôka ny iray amin’ny zanany; izany no '
  - type: text
    content: andotoana
  - type: text
    content: ' ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako sy analam-baràka ny anarako masina. '
  '4':
  - type: text
    content: 'Raha mody tsy mahita izany olona izany ny mponina tompontany mba tsy hahafaty azy noho ny zanany natolony tamin’i Môlôka, '
  '5':
  - type: text
    content: dia Izaho mihitsy no hanandrina izany olona izany sy ny ankohonany ka hofongorako tsy ho anisan’ny vahoaka israelita izy mbamin’ireo nanaraka azy hanompo ny sampy Môlôka.
  '6':
  - type: text
    content: '«Raha misy olona mivily hanaraka izay mpamoha angatra sy izay tsindrian-javatra ka hanao fombafomba fanompoan-tsampy dia hohandriniko izy ka hofongorako tsy ho anisan’ny vahoaka israelita. '
  '7':
  - type: text
    content: Manokàna tena ho Ahy ianareo, ary aoka ho masina fa Izaho no TOMPO Andriamanitrareo.
  - type: heading
    content: Sazy mihatra rehefa manao firaisam-batana voarara
  '8':
  - type: text
    content: «Imasoy hotanterahinareo ny lalànako rehetra. Izaho no TOMPO Izay nanokana anareo mba ho vahoakako.
  '9':
  - type: text
    content: «Na iza na iza manozona ny rainy na ny reniny, dia hatao maty tokoa; hozakain’io olona io ny ho faty, noho izy efa nanozona ny rainy na ny reniny
  - type: note
    content: Jereo 19.3 sy nta.
  - type: text
    content: .
