    text: 'Kanefa na dia marobe toy ny fasika eny amoron-dranomasina aza ny vahoakanao, ry Israely, dia io sisa io ihany no hiverina amin’ny Tompo. Efa voatendry ny fandravana, izay hampihanaka ny fahamarinana. '
  - type: usfm
