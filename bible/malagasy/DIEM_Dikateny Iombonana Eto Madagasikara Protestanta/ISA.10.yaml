    text: Hanesorana eo amin’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitarainan’ny madinika izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamerezan-jo aman-drariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mahantra eo amin’ny vahoakako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamaboan-karena ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
