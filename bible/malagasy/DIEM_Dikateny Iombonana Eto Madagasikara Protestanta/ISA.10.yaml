    text: 'Amin’izany andro izany, ireo sisa velona amin’i Israely na ireo sisa tavela amin’ny taranak’i Jakôba, dia hitsahatra tsy hiankina amin’ireo namely azy intsony; fa ny TOMPO, ilay Masin’i Israely, no hiankinany marina tokoa. '
