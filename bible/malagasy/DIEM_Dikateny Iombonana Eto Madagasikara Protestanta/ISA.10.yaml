- type: usfm
  marker: q1
  children:
  - type: text
    text: aiza no handosiranareo hitadiavam-bonjy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aiza no hametrahanareo ny harenareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao ihany no azonareo atao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitanondrika miaraka amin’ireo babo
- type: usfm
  marker: q1
  children:
  - type: text
