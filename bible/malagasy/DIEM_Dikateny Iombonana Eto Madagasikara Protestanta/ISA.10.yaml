document_id: ISA.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anton’ny fahatezeran’ny Tompo
  - type: text
    content: Lozan’ireo olona mamoaka didy tsy marina
  - type: text
    content: ary maika hampanoratra lalàna mampahory.
  '10':
  - type: text
    content: Haiko ny namely ireo fanjakana
  - type: text
    content: izay manompo andriamani-tsiizy,
  - type: text
    content: na dia nihoatra noho ny an’i Jerosalema
  - type: text
    content: sy ny an’i Samaria aza ny sarivongan-tsampiny.
  '11':
  - type: text
    content: Koa tsy ho tahaka izay nataoko tamin’i Samaria
  - type: text
    content: sy tamin’ny andriamani-tsiizy notompoiny ve
  - type: text
    content: no hataoko koa amin’i Jerosalema sy ny sampiny?›
  '12':
  - type: text
    content: Kanefa rehefa vitan’ny Tompo avokoa ny asany
  - type: text
    content: 'ao an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' sy ao Jerosalema,'
  - type: text
    content: dia hofaiziny ny mpanjakan’i Asiria
  - type: text
    content: noho ny fony feno avonavona
  - type: text
    content: sy ny fijeriny miandranandrana.
  '13':
  - type: text
    content: 'Satria hoy izy anakampony hoe:'
  - type: text
    content: «Ny herin-tsandriko sy ny fahendreko
  - type: text
    content: no nahavitako ny zavatra rehetra,
  - type: text
    content: fa izaho no marani-tsaina indrindra.
  - type: text
    content: Nofoanako ny faritanin’ny firenena maro
  - type: text
    content: ary norobaiko ny tahirin-karenany.
  - type: text
    content: Ary toy ny lehilahy mahery fo aho
  - type: text
    content: raha nanongana ny mpanjakany.
  '14':
  - type: text
    content: Toy ny fakàna ny akanim-borona
  - type: text
    content: ka angoronana ny atody nilaozan-dreniny
  - type: text
    content: no nakako ny haren’ireo firenena
  - type: text
    content: sy nangoronako ny fananan’ny tany tontolo,
  - type: text
    content: ka tsy nisy afa-nikopaka elatra,
  - type: text
    content: na nisoka-bava na nikiakiaka.»
  '15':
  - type: text
    content: Ny famaky ve hirehareha amin’ny mpikapa?
  - type: text
    content: Ny tsofa ve hiavonavona amin’ny mpanatsofa?
  - type: text
    content: Mova tsy hoe ny tsorakazo indray
  - type: text
    content: no manetsika izay mpanainga azy,
  - type: text
    content: na mova tsy hoe ny kibay indray
  - type: text
    content: no manandratra ny olona mampiasa azy!
  '16':
  - type: text
    content: Noho izany, ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: dia tsy hampamokatra intsony ny tany lonaka ao Asiria.
  - type: text
    content: Ary toy ny fihanaky ny afo rehefa misy hain-trano
  - type: text
    content: no hiparitahan’ny afo mihanaka
  - type: text
    content: eo ambanin’ny famirapiratan’io firenena io.
  '17':
  - type: text
    content: Ny TOMPO, fahazavan’i Israely, dia hanjary afo
  - type: text
    content: ary ilay Masiny dia hanjary lelafo
  - type: text
    content: handoro ny tsilo sy ny songosongo
  - type: text
    content: ka handevona azy anatin’ny indray andro monja.
  '18':
  - type: text
    content: Holevoniny tanteraka ny alany mirenty
  - type: text
    content: mbamin’ny sahany mahavokatra;
  - type: text
    content: ho toy ny marary miala aina izany.
  '19':
  - type: text
    content: Hazo vitsy sisa no ho tavela amin’ny alany,
  - type: text
    content: ka na ny zaza bodo aza dia afaka hanisa azy.
  - type: heading
    content: Ny sisa velona amin’i Israely
  '2':
  - type: text
    content: Hanesorana eo amin’ny fitsarana
  - type: text
    content: ny fitarainan’ny madinika izany
  - type: text
    content: ary hamerezan-jo aman-drariny
  - type: text
    content: ny mahantra eo amin’ny vahoakako,
  - type: text
    content: hamaboan-karena ny mpitondratena
  - type: text
    content: ary koa handrobam-pananana ny kamboty.
  '20':
  - type: text
    content: 'Amin’izany andro izany, ireo sisa velona amin’i Israely na ireo sisa tavela amin’ny taranak’i Jakôba, dia hitsahatra tsy hiankina amin’ireo namely azy intsony; fa ny TOMPO, ilay Masin’i Israely, no hiankinany marina tokoa. '
  '21':
  - type: text
    content: Hisy sisa hiverina, eny, hisy sisa amin’ny taranak’i Jakôba hiverina amin’Andriamanitra mahfkery
  - type: note
    content: 'hisy sisa hiverina: jereo ny naoty momba ny 7.3. –Andriamanitra mahery: jereo 9.5.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Kanefa na dia marobe toy ny fasika eny amoron-dranomasina aza ny vahoakanao, ry Israely, dia io sisa io ihany no hiverina amin’ny Tompo. Efa voatendry ny fandravana, izay hampihanaka ny fahamarinana. '
  '23':
  - type: text
    content: Eny, ny fandravana izay voatendrin’ny Tompo ANDRIAMANITR’izao rehetra izao no hotanterahiny eo anivon’ny tany
  - type: note
    content: Ny and 22-23 dia voatsiahy amin’ny fomba malaladalaka ao amin’ny Rm 9.27.
  - type: text
    content: ' tontolo.'
  - type: heading
    content: Aza matahotra ny Asirianina
  '24':
  - type: text
    content: 'Izany no antony ilazan’ny Tompo ANDRIAMANITR’izao rehetra izao hoe: «Aza matahotra an’i Asirianina, ry vahoakako monina ao '
  - type: text
    content: Tsiôna
  - type: text
    content: '! Kibay sy langilangy no ikapohany anao toy izay nataon’ny Ejiptianina taminao fahiny'
  - type: note
    content: Misy fahatsiahivana ny fanompoana mafy nampiharin’ny Ejiptianina tamin’ny Israelita etoana; jereo Eks 1.
  - type: text
    content: '; '
  '25':
  - type: text
    content: 'fa rehefa afaka kelikely, fotoana fohy monja, dia hitsahatra ny fahavinirako aminao ary hisampotina aminy ny fahatezerako.» '
  '26':
  - type: text
    content: Harangarangan’ny TOMPOn’izao rehetra izao manko ny karavasy hikapohany an’i Asiria tahaka izay nataony tamin’ny famelezana ny Midianita teo amin’ny harambaton’i Hôreba; ary hatsotrany eny ambony ranomasina ny tehiny, toy izay nataony tany Ejipta
  - type: note
    content: 'Ny famelezana ny Midianita... Hôreba dia voatantara ao amin’ny Mpits 7.23-25; ampit Is 9.3 sy nta. –hahinjiny... ny tehiny: jereo Eks.'
  - type: text
    content: .
  '27':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: hoesoriny eo an-tsorokao ny enta-mavesatra,
  - type: text
    content: 'ary halàny eo am-bozonanao ny '
  - type: text
    content: zioga
  - type: note
    content: And 9a ampit 9.3.
  - type: text
    content: .
  - type: heading
    content: Manatona an’i Jerosalema ny fahavalo
  - type: text
    content: Miakatra ao Samaria ny fahavalo,
  '28':
  - type: text
    content: tonga ao akaikin’i Haiata,
  - type: text
    content: dia mandalo ao Migrôna
  - type: text
    content: ary mametraka ny entany ao Mikmasy
  - type: note
    content: 'Haiata: tanàna tokony ho 16 km ao avaratr’i Jerosalema. Manakaiky an’i Jerosalema kokoa hatrany ireo tanàna voatanisa manaraka. Ny fanafihana voateny etoana dia toa ilay fanafihana tamin’ny taona 734 tal J.K., izay efa voalazan’i Isaià rahateo indrindra ao amin’ny 7.1-9; jereo ny naoty momba ny 7.6.'
  - type: text
    content: .
  '29':
  - type: text
    content: Mamakivaky ny hadilanana
  - type: note
    content: Ity hadilanana ity dia ilay nampiasain’i Jônatàna fahiny araka ny 1 Sam 14.4.
  - type: text
    content: ' izy sady miteny hoe:'
  - type: text
    content: «Any Geba isika no hitoby anio alina.»
  - type: text
    content: Mangovitra noho ny tahotra ny ao Ramà;
  - type: text
    content: lasa mitsoaka ny ao Gibehà,
  - type: text
    content: izay tanàna fiavian’i Saoly.
  '3':
  - type: text
    content: Amin’ny andro famalian’ny TOMPO,
  - type: text
    content: raha ho tonga avy any lavitra
  - type: text
    content: ny rambondanitra handrava,
  - type: text
    content: inona no azonareo atao,
  - type: text
    content: aiza no handosiranareo hitadiavam-bonjy
  - type: text
    content: ary aiza no hametrahanareo ny harenareo?
  '30':
  - type: text
    content: Miantsoantsoa mafy, ry olona ao Galima!
  - type: text
    content: Mihainoa ianareo ao Laisà,
  - type: text
    content: ary mamalia ianareo ao Hanatôta
  - type: note
    content: 'mamalia: araka ny dkt tranainy siriaka. –Hanatôta: jereo 1 Mp 2.26; Jer 1.1.'
  - type: text
    content: .
  '31':
  - type: text
    content: Mandositra ny ao Madmenà
  - type: text
    content: ary misitrika ny mponina ao Gevima.
  '32':
  - type: text
    content: Fa androtr’io ihany ny fahavalo
  - type: text
    content: dia maka toerana ao Nôba,
  - type: text
    content: 'ka maninji-tanana mandrahona an’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: dia ilay tendrombohitra mampahonena,
  - type: text
    content: ilay havoana iorenan’i Jerosalema.
  '33':
  - type: text
    content: Indro ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: fa manjera rantsana amin-kerisetra;
  - type: text
    content: voakapa ny hazo mijoalajoala,
  - type: text
    content: voadaboka ny hazo avo dia avo.
  '34':
  - type: text
    content: Kapaina amin’ny famaky ny ala mikitroka,
  - type: text
    content: nianjera ny sedera mijoalajoalan’i Libano
  - type: note
    content: 'Libano: tendrombohitra tomandavana any avaratr’i Palestinina, ka malaza noho ny ala sedera ao aminy; jereo 37.24.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Izao ihany no azonareo atao:'
  - type: text
    content: hitanondrika miaraka amin’ireo babo
  - type: text
    content: na hidaboka miaraka amin’ireo maty.
  - type: text
    content: Saingy, na teo aza izany rehetra izany,
  - type: text
    content: dia mbola tsy afaka ny fahatezeran’ny TOMPO
  - type: text
    content: fa mihinji-tanana mandrahona ihany Izy
  - type: note
    content: Jereo 5.25; 9.11, 16,20.
  - type: text
    content: .
  - type: heading
    content: Nihoa-pefy ny Asirianina
  '5':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Lozan’i Asiria'
  - type: note
    content: 'Asiria: jereo Is 14.24-27; 30.27-33; 37.22-35; Ezek 32.22-23; Na 1–3; Tsef 2.13-15.'
  - type: text
    content: ','
  - type: text
    content: izay tsorakazo mampihatra ny fahatezerako!
  - type: text
    content: Eny, izy no mitazona eny an-tanany
  - type: text
    content: ny kibay mampihatra ny fahavinirako.
  '6':
  - type: text
    content: Nirahiko izy hamely firenena tsy mpivavaka
  - type: text
    content: ary nalefako hamely vahoaka ratsy fanahy
  - type: text
    content: mba handroba sy hanangona babo avy aminy,
  - type: text
    content: ka hanosihosy azy toy ny fotaka eny an-dalambe.
  '7':
  - type: text
    content: Kanjo tsy araka izany no heverin’i Asiria;
  - type: text
    content: zavatra hafa no kasain’ny fony,
  - type: text
    content: ny handringana no tao an’eritreriny
  - type: text
    content: ary ny hamongotra firenena maro indrindra.
  '8':
  - type: text
    content: 'Fa hoy izy hoe: ‹Moa tsy mitovy lanja'
  - type: text
    content: amin’ny mpanjaka ve ireo jeneraliko?
  '9':
  - type: text
    content: Tsy tahaka an’i Karkemisy ve
  - type: text
    content: no niafaran’ny tanànan’i Kalne?
  - type: text
    content: Tsy tahaka an’i Arpada ve
  - type: text
    content: no niafaran’i Hamata?
  - type: text
    content: Tsy tahaka an’i Damasy ve
  - type: text
    content: no niafaran’i Samaria
  - type: note
    content: Ny filaharan’ireo tanàna voatanisa ireo dia maneho fa mandroso tsy hay tohaina mankany Jerosalema ny tafika asirianina.
  - type: text
    content: '?'
