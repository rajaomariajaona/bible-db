    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay tsorakazo mampihatra ny fahatezerako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izy no mitazona eny an-tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kibay mampihatra ny fahavinirako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nirahiko izy hamely firenena tsy mpivavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nalefako hamely vahoaka ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handroba sy hanangona babo avy aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanosihosy azy toy ny fotaka eny an-dalambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanjo tsy araka izany no heverin’i Asiria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: zavatra hafa no kasain’ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny handringana no tao an’eritreriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hamongotra firenena maro indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izy hoe: ‹Moa tsy mitovy lanja'
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny mpanjaka ve ireo jeneraliko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy tahaka an’i Karkemisy ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niafaran’ny tanànan’i Kalne?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tahaka an’i Arpada ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niafaran’i Hamata?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tahaka an’i Damasy ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niafaran’i Samaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny filaharan’ireo tanàna voatanisa ireo dia maneho fa mandroso tsy hay tohaina mankany Jerosalema ny tafika asirianina.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
