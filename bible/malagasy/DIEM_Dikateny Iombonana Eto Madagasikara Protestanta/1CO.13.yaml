document_id: 1CO.13,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Na dia miteny amin’ny fitenin’ny olona sy ny fitenin’ny '
  - type: text
    content: anjely
  - type: text
    content: ' aza aho, saingy tsy manam-pitiavana, dia zary varahina maneno sy kipantsona mikarantsana fotsiny. '
  '10':
  - type: text
    content: Fa rehefa mby amin’ny tanteraka, dia ho foana ny sombintsombiny.
  '11':
  - type: text
    content: 'Fony mbola zaza aho, dia niteny toy ny zaza, nihevitra toy ny zaza, nisaina toy ny zaza; rehefa tonga olondehibe aho, dia nariako avokoa ny fanaon-jaza. '
  '12':
  - type: text
    content: Ankehitriny tokoa dia mahita manjavozavo toy ny amin’ny fitaratra isika
  - type: note
    content: 'fitaratra: fahiny dia metaly natao malambolambo tsara no nampiasaina ho fitaratra, hany ka manjavozavo malomaloka ny sary fa tsy tonga lafatra.'
  - type: text
    content: ', fa rahatrizay vao hahita mifanatrika. Ankehitriny dia sombiny no zavatra fantatro, fa rahatrizay aho vao hahafantatra tsara toy ny ahafantaran’Andriamanitra ahy.'
  '13':
  - type: text
    content: 'Izao kosa dia ireto telo ireto no mitoetra: ny finoana, ny fanantenana, ny fitiavana; fa ny fitiavana no lehibe indrindra amin’ireo!'
  '2':
  - type: text
    content: Na dia manana ny fanomezana hilaza hafatra avy amin’Andriamanitra aza aho ka hahatakatra ny zava-miafina rehetra sady ho feno ny fahaizana rehetra, ary na dia manana ny finoana rehetra ilaina mba hahafindra tendrombohitra aza aho
  - type: note
    content: Ampit Mt 17.20; 21.21; Lk 11.23.
  - type: text
    content: ', saingy tsy manam-pitiavana, dia tsinontsinona ihany. '
  '3':
  - type: text
    content: Na dia mizara ny fananako rehetra amin’ny mahantra sy mahafoy ny tenako mba hireharehako aza aho, saingy tsy manam-pitiavana
  - type: note
    content: 'sy mahafoy ny tenako... manam-pitiavana: misy stf sasany ahitana hoe ary na ana dia mahafoy ny tenako hodorana aza aho saingy tsy manam-pitiavana.'
  - type: text
    content: ', dia tsy misy mahasoa ahy akory izany.'
  '4':
  - type: text
    content: 'Mahari-po ny fitiavana; be hamoram-po ny fitiavana; tsy mialona ny fitiavana, tsy mirehareha, tsy mieboebo, '
  '5':
  - type: text
    content: 'tsy manao ny tsy mendrika, tsy mitady ny ho azy, tsy mora sosotra, tsy manao an-dolompo, '
  '6':
  - type: text
    content: 'tsy mifaly amin’ny tsy rariny ataon’ny olona, fa mifaly amin’ny marina ataon’ny olona. '
  '7':
  - type: text
    content: Ny fitiavana no ahazakana ny zavatra rehetra ka ananana finoana sy fanantenana ary fandeferana amin’ny zavatra rehetra.
  '8':
  - type: text
    content: 'Tsy manam-pahataperana ny fitiavana. Ho foana kosa rahatrizay ny filazana hafatra avy amin’Andriamanitra, hitsahatra ny fitenenana fiteny tsy fantatra, ho foana koa ny fahaizana; '
  '9':
  - type: text
    content: 'satria sombiny no zavatra haintsika, sombiny no hafatr’Andriamanitra voalazantsika. '
