document_id: 1CO.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Na dia miteny amin’ny fitenin’ny olona sy ny fitenin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' aza aho, saingy tsy manam-pitiavana, dia zary varahina maneno sy kipantsona mikarantsana fotsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Na dia manana ny fanomezana hilaza hafatra avy amin’Andriamanitra aza aho ka hahatakatra ny zava-miafina rehetra sady ho feno ny fahaizana rehetra, ary na dia manana ny finoana rehetra ilaina mba hahafindra tendrombohitra aza aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 17.20; 21.21; Lk 11.23.
    marker-yv: yv-n
  - type: text
    text: ', saingy tsy manam-pitiavana, dia tsinontsinona ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na dia mizara ny fananako rehetra amin’ny mahantra sy mahafoy ny tenako mba hireharehako aza aho, saingy tsy manam-pitiavana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sy mahafoy ny tenako... manam-pitiavana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary na ana dia mahafoy ny tenako hodorana aza aho saingy tsy manam-pitiavana.
    marker-yv: yv-n
  - type: text
    text: ', dia tsy misy mahasoa ahy akory izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mahari-po ny fitiavana; be hamoram-po ny fitiavana; tsy mialona ny fitiavana, tsy mirehareha, tsy mieboebo, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'tsy manao ny tsy mendrika, tsy mitady ny ho azy, tsy mora sosotra, tsy manao an-dolompo, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tsy mifaly amin’ny tsy rariny ataon’ny olona, fa mifaly amin’ny marina ataon’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fitiavana no ahazakana ny zavatra rehetra ka ananana finoana sy fanantenana ary fandeferana amin’ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy manam-pahataperana ny fitiavana. Ho foana kosa rahatrizay ny filazana hafatra avy amin’Andriamanitra, hitsahatra ny fitenenana fiteny tsy fantatra, ho foana koa ny fahaizana; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'satria sombiny no zavatra haintsika, sombiny no hafatr’Andriamanitra voalazantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa rehefa mby amin’ny tanteraka, dia ho foana ny sombintsombiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fony mbola zaza aho, dia niteny toy ny zaza, nihevitra toy ny zaza, nisaina toy ny zaza; rehefa tonga olondehibe aho, dia nariako avokoa ny fanaon-jaza. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ankehitriny tokoa dia mahita manjavozavo toy ny amin’ny fitaratra isika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fitaratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahiny dia metaly natao malambolambo tsara no nampiasaina ho fitaratra, hany ka manjavozavo malomaloka ny sary fa tsy tonga lafatra.
    marker-yv: yv-n
  - type: text
    text: ', fa rahatrizay vao hahita mifanatrika. Ankehitriny dia sombiny no zavatra fantatro, fa rahatrizay aho vao hahafantatra tsara toy ny ahafantaran’Andriamanitra ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao kosa dia ireto telo ireto no mitoetra: ny finoana, ny fanantenana, ny fitiavana; fa ny fitiavana no lehibe indrindra amin’ireo!'
