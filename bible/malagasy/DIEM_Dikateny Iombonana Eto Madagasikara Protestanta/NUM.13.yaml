document_id: NUM.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpisafo tany nalefan’i Mosesy tany Kanahàna
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '10':
  - type: text
    content: I Gadiela zanakalahin’i Sôdỳ, avy amin’ny fokon’i Zebolòna;
  '11':
  - type: text
    content: I Gadỳ zanakalahin’i Sosỳ, avy amin’ny fokon’i Manase zanak’i Jôsefa;
  '12':
  - type: text
    content: I Hamiela zanakalahin’i Gemalỳ, avy amin’ny fokon’i Dana;
  '13':
  - type: text
    content: I Setora zanakalahin’i Mikaela, avy amin’ny fokon’i Asera;
  '14':
  - type: text
    content: I Nahabỳ zanakalahin’i Vôtsỳ, avy amin’ny fokon’i Naftalỳ;
  '15':
  - type: text
    content: I Geoela zanakalahin’i Makỳ, avy amin’ny fokon’i Gada.
  '16':
  - type: text
    content: Ireo no anaran’ny lehilahy nalefan’i Mosesy hisafo ny tany Kanahàna. Nataon’i Mosesy hoe Josoa i Hôsea zanakalahin’i Nona
  - type: note
    content: Ny anarana roa Hôsea sy Josoa dia avy amin’ny fototra hebreo izay samy midika hoe ny Tompo mamonjy. –I Josoa dia efa niseho tamin’ny tantara ao amin’ny Eks 17.8-16.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Nalefan’i Mosesy hisafo ny tany Kanahàna izy ireo ka nataony hoe:'
  - type: text
    content: '–Miakara avy any atsimo, dia mianiha ny tendrombohitra '
  '18':
  - type: text
    content: 'hahitanareo ny toetry ny tany sy ny mponina ao na mahery izy na malemy, ary koa na vitsy izy na maro. '
  '19':
  - type: text
    content: 'Jereo ny tany onenan’ireo vahoaka ireo na tsara na ratsy ary ny tanàna ipetrahany na mimanda na tobin-day. '
  '2':
  - type: text
    content: –Mandefasa lehilahy hisafo ny tany Kanahàna izay omeko ny Israelita. Lehilahy iray isam-pokony avy no halefanareo, ka izy rehetra dia hotsongaina amin’ireo mpiandraikitra azy.
  '20':
  - type: text
    content: Jereo ny tany raha lonaka na ngazana, na misy hazo maniry na tsia. Koa mandehana ary mahereza, dia mitondrà amin’ny vokatry ny tany.
  - type: text
    content: Fahamasahan’ny voaloboka rahateo tamin’izay.
  '21':
  - type: text
    content: 'Dia niakatra izy ireo ka nisafo ny tany nanomboka teo amin’ny taniefitr’i Tsina ka hatrany Rehôba akaikin’i Lebô-Hamata. '
  '22':
  - type: text
    content: Niakatra avy any atsimo izy ireo ka tonga tao Hebrôna izay nonenan’ny tarik’i Ahimàna sy i Sesay ary i Talmay, samy taranaky ny Hanakita. I Hebrôna dia niorina fito taona talohan’i Tsôhàna
  - type: note
    content: 'Hebrôna: toerana sahabo ho eo amin’ny 30 km atsimo andrefan’i Jerosalema. –Hanakita: avy amin’i Hanàka izay olona tsy dia fantatra loatra, saingy entin-kilazana kosa ireo mponina fahizay tany Palestinina. –Tsôhàna (na hoe Tanisy): tanàna ejiptianina izay voaorina indray nandritra ny tapany faharoan’ny taonjato faha-18 tal J.K. (jereo Is 19.11 sy nta.)'
  - type: text
    content: ' any Ejipta. '
  '23':
  - type: text
    content: Nankany amin’ny Lohasahan’i Eskôla ireo mpisafo tany ka nanapaka tahom-boaloboka misy sampahony
  - type: note
    content: 'Lohasahan’i Eskôla: dia ao avaratr’i Hebrôna. Ny voambolana hebreo hoe eskôla dia sampahom-boaloboka no dikany, jereo and 24.'
  - type: text
    content: ', ary nolanjain’olon-droa tamin’ny hazo niaraka tamin’ny ampongabendanitra sy ny aviavy. '
  '24':
  - type: text
    content: Dia nomena anarana hoe Lohasahan’i Eskôla na Lohasahan-tsampaho izany toerana izany, noho ny sampahom-boaloboka izay notapahin’ny Israelita teo.
  - type: heading
    content: Nanao tatitra ireo irak’i Mosesy
  '25':
  - type: text
    content: 'Nony afaka efapolo andro, dia niverina avy nisafo ny tany ireo iraka. '
  '26':
  - type: text
    content: Nankeo amin’i Mosesy sy i Aharôna ary ny Fiangonan’ny Israelita rehetra tao an-taniefitr’i Paràna any Kadesy
  - type: note
    content: Kadesy (na Kadesy-Barnea), 32.8; dia toerana isian-java-maniry any an-taniefitra izay eo anelanelan’ny taniefitr’i Paràna (and 3) ao atsimo sy ny taniefitr’i Tsina (and 21) ao avaratra.
  - type: text
    content: ' izy ireo, ka nanao tatitra tamin’ny besinimaro ary nampiseho azy ny vokatry ny tany. '
  '27':
  - type: text
    content: 'Izao no notantarain’ireo mpisafo tamin’i Mosesy:'
  - type: text
    content: –Nankany amin’ny tany izay nanirahanao anay izahay, ka hitanay fa tany tondra-dronono sy tantely tokoa ilay izy
  - type: note
    content: 'tany tondra-dronono sy tantely: jereo Eks 3.8 sy nta.'
  - type: text
    content: '. Itony no vokatra avy tany. '
  '28':
  - type: text
    content: 'Saingy ny mponina ao aminy kosa dia mahery, ary ny tanàna dia mimanda sady lehibe. Hitanay tao koa aza ny taranaky ny Hanakita. '
  '29':
  - type: text
    content: 'Ny Hamalekita no monina amin’ny faritra atsimo; ny Hetita sy ny Hivita ary ny Jebosita sy ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' no any an-tendrombohitra, fa ny Kanahanîta kosa no mipetraka amoron-dranomasina Mediteranea sy amoron’i Jôrdàna.'
  '3':
  - type: text
    content: 'Dia nalefan’i Mosesy avy eo an-taniefitr’i Paràna araka ny baikon’ny TOMPO ireo. Samy lohandohan’ny Israelita avokoa izy rehetra. '
  '30':
  - type: text
    content: 'Nampanginin’i Kaleba ny vahoaka izay nimonomonona tamin’i Mosesy ka nataony hoe:'
  - type: text
    content: –Aoka hiakarantsika ny tany ka halaintsika fa haharesy azy tokoa isika.
  '31':
  - type: text
    content: 'Ireo olona niara-niakatra tamin’i Kaleba kosa nanao hoe:'
  - type: text
    content: –Tsy afaka manafika ireo olona ireo isika fa mahery lavitra noho isika izy.
  '32':
  - type: text
    content: 'Dia nanao izay haharatsy laza ny tany izay nosafoiny tamin’ny Israelita izy ireo ka niteny hoe:'
  - type: text
    content: –Ny tany izay nosafoinay dia tany mamono ny olona tonga monina ao
  - type: note
    content: Satria tany tsy mahasalama izy na koa manjaka ao lalandava ny ady.
  - type: text
    content: ', ary ny olona izay hitanay tao dia ranjanana avokoa. '
  '33':
  - type: text
    content: Hitanay tao hatramin’ireo olona goavambe
  - type: note
    content: Jereo Gen 6.4.
  - type: text
    content: ' taranak’i Hanàka aza; tahaka ny valala izahay miohatra aminy, ary dia toy izany koa no fijeriny anay.'
  '4':
  - type: text
    content: 'Toy izao avy ny anarany:'
  - type: text
    content: I Samoa zanakalahin’i Zakora, avy amin’ny fokon’i Reobena;
  '5':
  - type: text
    content: I Safata zanakalahin’i Hôrỳ, avy amin’ny fokon’i Simehôna;
  '6':
  - type: text
    content: I Kaleba zanakalahin’i Jefonè, avy amin’ny fokon’i Joda;
  '7':
  - type: text
    content: I Jigàla zanakalahin’i Jôsefa, avy amin’ny fokon’i Jisakara;
  '8':
  - type: text
    content: I Hôsea zanakalahin’i Nona, avy amin’ny fokon’i Efraîma;
  '9':
  - type: text
    content: I Paltỳ zanakalahin’i Rafò, avy amin’ny fokon’i Benjamîna;
