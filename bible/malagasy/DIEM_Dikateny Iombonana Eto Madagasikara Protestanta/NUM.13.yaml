document_id: NUM.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpisafo tany nalefan’i Mosesy tany Kanahàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Mandefasa lehilahy hisafo ny tany Kanahàna izay omeko ny Israelita. Lehilahy iray isam-pokony avy no halefanareo, ka izy rehetra dia hotsongaina amin’ireo mpiandraikitra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nalefan’i Mosesy avy eo an-taniefitr’i Paràna araka ny baikon’ny TOMPO ireo. Samy lohandohan’ny Israelita avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toy izao avy ny anarany:'
- type: usfm
  marker: p
  children:
  - type: text
    text: I Samoa zanakalahin’i Zakora, avy amin’ny fokon’i Reobena;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I Safata zanakalahin’i Hôrỳ, avy amin’ny fokon’i Simehôna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Kaleba zanakalahin’i Jefonè, avy amin’ny fokon’i Joda;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Jigàla zanakalahin’i Jôsefa, avy amin’ny fokon’i Jisakara;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I Hôsea zanakalahin’i Nona, avy amin’ny fokon’i Efraîma;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I Paltỳ zanakalahin’i Rafò, avy amin’ny fokon’i Benjamîna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Gadiela zanakalahin’i Sôdỳ, avy amin’ny fokon’i Zebolòna;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I Gadỳ zanakalahin’i Sosỳ, avy amin’ny fokon’i Manase zanak’i Jôsefa;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Hamiela zanakalahin’i Gemalỳ, avy amin’ny fokon’i Dana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I Setora zanakalahin’i Mikaela, avy amin’ny fokon’i Asera;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I Nahabỳ zanakalahin’i Vôtsỳ, avy amin’ny fokon’i Naftalỳ;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I Geoela zanakalahin’i Makỳ, avy amin’ny fokon’i Gada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ireo no anaran’ny lehilahy nalefan’i Mosesy hisafo ny tany Kanahàna. Nataon’i Mosesy hoe Josoa i Hôsea zanakalahin’i Nona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny anarana roa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hôsea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Josoa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia avy amin’ny fototra hebreo izay samy midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tompo mamonjy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –I Josoa dia efa niseho tamin’ny tantara ao amin’ny Eks 17.8-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nalefan’i Mosesy hisafo ny tany Kanahàna izy ireo ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miakara avy any atsimo, dia mianiha ny tendrombohitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'hahitanareo ny toetry ny tany sy ny mponina ao na mahery izy na malemy, ary koa na vitsy izy na maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jereo ny tany onenan’ireo vahoaka ireo na tsara na ratsy ary ny tanàna ipetrahany na mimanda na tobin-day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jereo ny tany raha lonaka na ngazana, na misy hazo maniry na tsia. Koa mandehana ary mahereza, dia mitondrà amin’ny vokatry ny tany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Fahamasahan’ny voaloboka rahateo tamin’izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niakatra izy ireo ka nisafo ny tany nanomboka teo amin’ny taniefitr’i Tsina ka hatrany Rehôba akaikin’i Lebô-Hamata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Niakatra avy any atsimo izy ireo ka tonga tao Hebrôna izay nonenan’ny tarik’i Ahimàna sy i Sesay ary i Talmay, samy taranaky ny Hanakita. I Hebrôna dia niorina fito taona talohan’i Tsôhàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hebrôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana sahabo ho eo amin’ny 30 km atsimo andrefan’i Jerosalema. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hanakita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': avy amin’i Hanàka izay olona tsy dia fantatra loatra, saingy entin-kilazana kosa ireo mponina fahizay tany Palestinina. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tsôhàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tanisy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '): tanàna ejiptianina izay voaorina indray nandritra ny tapany faharoan’ny taonjato faha-18 tal J.K. (jereo Is 19.11 sy nta.)'
    marker-yv: yv-n
  - type: text
    text: ' any Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nankany amin’ny Lohasahan’i Eskôla ireo mpisafo tany ka nanapaka tahom-boaloboka misy sampahony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lohasahan’i Eskôla: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia ao avaratr’i Hebrôna. Ny voambolana hebreo hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eskôla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sampahom-boaloboka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no dikany, jereo and 24.'
    marker-yv: yv-n
  - type: text
    text: ', ary nolanjain’olon-droa tamin’ny hazo niaraka tamin’ny ampongabendanitra sy ny aviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nomena anarana hoe Lohasahan’i Eskôla na Lohasahan-tsampaho izany toerana izany, noho ny sampahom-boaloboka izay notapahin’ny Israelita teo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanao tatitra ireo irak’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nony afaka efapolo andro, dia niverina avy nisafo ny tany ireo iraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nankeo amin’i Mosesy sy i Aharôna ary ny Fiangonan’ny Israelita rehetra tao an-taniefitr’i Paràna any Kadesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kadesy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (na Kadesy-Barnea), 32.8; dia toerana isian-java-maniry any an-taniefitra izay eo anelanelan’ny taniefitr’i Paràna (and 3) ao atsimo sy ny taniefitr’i Tsina (and 21) ao avaratra.
    marker-yv: yv-n
  - type: text
    text: ' izy ireo, ka nanao tatitra tamin’ny besinimaro ary nampiseho azy ny vokatry ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao no notantarain’ireo mpisafo tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nankany amin’ny tany izay nanirahanao anay izahay, ka hitanay fa tany tondra-dronono sy tantely tokoa ilay izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tany tondra-dronono sy tantely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 3.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Itony no vokatra avy tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Saingy ny mponina ao aminy kosa dia mahery, ary ny tanàna dia mimanda sady lehibe. Hitanay tao koa aza ny taranaky ny Hanakita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny Hamalekita no monina amin’ny faritra atsimo; ny Hetita sy ny Hivita ary ny Jebosita sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' no any an-tendrombohitra, fa ny Kanahanîta kosa no mipetraka amoron-dranomasina Mediteranea sy amoron’i Jôrdàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nampanginin’i Kaleba ny vahoaka izay nimonomonona tamin’i Mosesy ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hiakarantsika ny tany ka halaintsika fa haharesy azy tokoa isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ireo olona niara-niakatra tamin’i Kaleba kosa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy afaka manafika ireo olona ireo isika fa mahery lavitra noho isika izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nanao izay haharatsy laza ny tany izay nosafoiny tamin’ny Israelita izy ireo ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny tany izay nosafoinay dia tany mamono ny olona tonga monina ao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Satria tany tsy mahasalama izy na koa manjaka ao lalandava ny ady.
    marker-yv: yv-n
  - type: text
    text: ', ary ny olona izay hitanay tao dia ranjanana avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Hitanay tao hatramin’ireo olona goavambe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 6.4.
    marker-yv: yv-n
  - type: text
    text: ' taranak’i Hanàka aza; tahaka ny valala izahay miohatra aminy, ary dia toy izany koa no fijeriny anay.'
