document_id: 2SA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Sebà mikomy amin’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa nisy olona tena ratsy fanahy teo natao hoe Sebà, zanakalahin’i Bikrỳ sady Benjaminita. Nitsoka anjomara izy sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manana anjara amin’i Davida isika ary tsy misy zavatra iombonantsika amin’io zanakalahin’i Jisay io! Samia mody any amin’ny fonenany avy, ry Israelita ô
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.16; 2 Tan 10.16.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nandao an’i Davida avokoa ny lehilahy israelita avaratra, ka nanaraka an’i Sebà zanakalahin’i Bikrỳ. Fa ny lehilahy jodeanina kosa nifikitra tamin’ny mpanjakany ihany, ka tafaraka taminy hatreo Jôrdàna ka hatrany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha vao tonga tao an-tranony tany Jerosalema i Davida mpanjaka, dia naka ireo vaditsindrano folo izay najanony hiandry ny trano, ka nametraka azy tamin’ny trano iray tsara ambina. Nokojakojainy sy novelominy izy ireo saingy tsy niraisany intsony. Nahibony tao mandra-pahafatiny ireo, ka tonga mpitondratena velom-bady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vaditsindrano folo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 15.16; 16.21-22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Matin’i Jôaba i Hamasà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy ny mpanjaka tamin’i Hamasà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vorio ho eto amiko ato anatin’ny telo andro ny miaramila jodeanina rehetra, ary aoka mba ho eto koa ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia lasa i Hamasà namory ny tafika jodeanina; nefa dia taran’ny fe-potoana izay nomen’i Davida azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka hoy i Davida tamin’i Abisay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny dia efa mampidi-doza antsika mihoatra noho i Absalôma i Sebà zanakalahin’i Bikrỳ. Koa ento ny miaramila mpiambina ahy, dia enjeho izy, fandrao mahazo tanàna mimanda, ka ho dify ny masontsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nivoaka an’i Jerosalema nanaraka an’i Abisay koa ny olon’i Jôaba sy ny Keretita ary ny Peletita, izany hoe ny kalaza rehetra, ka nanenjika an’i Sebà zanakalahin’i Bikrỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehefa tonga teo amin’ilay vato lehibe tao Gibehôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' kosa ireo, dia avy nitsena azy i Hamasà. Tamin’izay ny nanaovan’i Jôaba dia ny akanjo miaramila nisy ilay fehikibo nihanton’ny sabatra mbamin’ny tranony; ka nony nandroso izy, dia latsaka ilay sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy i Jôaba tamin’i Hamasà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manahoana ianao, ry rahalahy?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Noraisin’i Jôaba tamin’ny tanany ankavanana ny volombavan’i Hamasà mba horohany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy nahatandrina ny sabatra izay noraisin’ny tanan-kavian’i Jôaba anefa i Hamasà; kanjo nasian’i Jôaba tamin’ny kibony izy, ka nivaroraka tamin’ny tany ny tsinainy. Ary matin’izany izy, fa tsy nasian’i Jôaba fanindroany akory.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nifarana ny fikomian’i Sebà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa i Jôaba sy i Abisay mirahalahy nanenjika an’i Sebà zanakalahin’i Bikrỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nisy miaramilan’i Jôaba iray nijanona teo akaikin’ny fatin’i Hamasà ka nanao hoe: «Izay mpomba an’i Jôaba sy mpiandany amin’i Davida, dia aoka izy hanaraka an’i Jôaba!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izany i Hamasà dia nihosin-dra teo afovoan-dalana. Rehefa hitan’ilay miaramila fa nijanona ny olona rehetra, dia nesoriny teo amin’ny lalana ny fatin’i Hamasà ka notarihiny ho any an-tsaha sy norakofany lamba, satria tsikariny fa izay rehetra tonga teo aminy dia nijanona avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vao nesoriny teo amin’ny lalana izany, dia lasa nanaraka an’i Jôaba ny tsirairay mba hanao haza lambo an’i Sebà zanakalahin’i Bikrỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Notetezin’i Sebà avokoa ny fokon’i Israely avaratra, hatrany Abela-Bety-Mahakà; ary ny Berita rehetra dia nivory ka niditra nanaraka azy tao koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Abela-Bety-Mahakà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana anisan’ny farany avaratra amin’i Israely, tokony ho 40 km avaratry ny farihy Genesareta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Berita:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' vahoaka tsy dia fantatra loatra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tonga kosa ry i Jôaba nanao fahirano an’i Sebà tao Abela-Bety-Mahakà, ary nanangana tovon-tany mitovy haavo amin’ny manda ivelan’ny tanàna. Dia nanomboka nandrava ny manda ny tafika manontolo izay niaraka tamin’i Jôaba mba handrodana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa nisy vehivavy hendry niantsoantso avy tao an-tanàna nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Henoy! Henoy kely e! Mba lazao i Jôaba hanatona etỳ fa te hiresaka aminy aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nanatona an-dravehivavy izy, dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao va no Jôaba?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, izaho no izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy indray ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba henoy teny aho mpanompovavinao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Jôaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mihaino anao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy ravehivavy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fitenin’ny olona taloha ny hoe: «Anontanio ny mponin’i Abela, dia ho vita mora ny raharaha» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amiko dia anisan’ny tia fihavanana sy mahatoky indrindra amin’i Israely ny mponina eto; kanefa dia tadiavinao ho ravana ity tanàna anisan’ny lehibe amin’i Israely ity. Nahoana no holevoninao ny fananan’ny TOMPO?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Namaly kosa i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sanatria dia sanatria amiko ny handevona sy handrava na inona na inona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy izany mihitsy, fa misy lehilahy iray avy any amin’ny tendrombohitr’i Efraîma, atao hoe Sebà zanakalahin’i Bikrỳ izay efa nikomy hamely an’i Davida mpanjaka. Izy ihany no atolory ahy dia hiala amin’ny tanàna aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ravehivavy tamin’i Jôaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ao àry fa hatsipinay aminao ankoatra ny manda ny lohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nikabarian-dravehivavy tamim-pahendrena avokoa ny mpiray tanàna, dia notapahina ny lohan’i Sebà zanakalahin’i Bikrỳ ka natsipy teny amin’i Jôaba. Notsofin’i Jôaba ny anjomara, dia tsy nanao fahirano ny tanàna intsony ny miaramilany ary samy namonjy ny fonenany avy. I Jôaba kosa mbola niverina tany Jerosalema ho eo amin’ny mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpiasam-panjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I Jôaba no filohan’ny tafika manontolo tamin’i Israely; i Benaià zanakalahin’i Joiadà no lehiben’ny Keretita sy Peletita mpiambina an’i Davida; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'i Adôrama no tonian’ny asam-panompoana; i Jôsafata zanakalahin’i Ahiloda no mpitahiry ny raki-tsoratra; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Sevà no mpitantsoratra; i Tsadôka sy i Abiatara no mpisorona; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary i Hîrà, ilay Jairita, no mpanolotsain’i Davida.
