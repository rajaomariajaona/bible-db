document_id: 2SA.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Sebà mikomy amin’i Davida
  - type: text
    content: 'Fa nisy olona tena ratsy fanahy teo natao hoe Sebà, zanakalahin’i Bikrỳ sady Benjaminita. Nitsoka anjomara izy sady nanao hoe:'
  - type: text
    content: –Tsy manana anjara amin’i Davida isika ary tsy misy zavatra iombonantsika amin’io zanakalahin’i Jisay io! Samia mody any amin’ny fonenany avy, ry Israelita ô
  - type: note
    content: Jereo 1 Mp 12.16; 2 Tan 10.16.
  - type: text
    content: '!'
  '10':
  - type: text
    content: Tsy nahatandrina ny sabatra izay noraisin’ny tanan-kavian’i Jôaba anefa i Hamasà; kanjo nasian’i Jôaba tamin’ny kibony izy, ka nivaroraka tamin’ny tany ny tsinainy. Ary matin’izany izy, fa tsy nasian’i Jôaba fanindroany akory.
  - type: heading
    content: Nifarana ny fikomian’i Sebà
  - type: text
    content: 'Dia lasa i Jôaba sy i Abisay mirahalahy nanenjika an’i Sebà zanakalahin’i Bikrỳ. '
  '11':
  - type: text
    content: 'Nisy miaramilan’i Jôaba iray nijanona teo akaikin’ny fatin’i Hamasà ka nanao hoe: «Izay mpomba an’i Jôaba sy mpiandany amin’i Davida, dia aoka izy hanaraka an’i Jôaba!»'
  '12':
  - type: text
    content: 'Amin’izany i Hamasà dia nihosin-dra teo afovoan-dalana. Rehefa hitan’ilay miaramila fa nijanona ny olona rehetra, dia nesoriny teo amin’ny lalana ny fatin’i Hamasà ka notarihiny ho any an-tsaha sy norakofany lamba, satria tsikariny fa izay rehetra tonga teo aminy dia nijanona avokoa. '
  '13':
  - type: text
    content: Vao nesoriny teo amin’ny lalana izany, dia lasa nanaraka an’i Jôaba ny tsirairay mba hanao haza lambo an’i Sebà zanakalahin’i Bikrỳ.
  '14':
  - type: text
    content: Notetezin’i Sebà avokoa ny fokon’i Israely avaratra, hatrany Abela-Bety-Mahakà; ary ny Berita rehetra dia nivory ka niditra nanaraka azy tao koa
  - type: note
    content: 'Abela-Bety-Mahakà: toerana anisan’ny farany avaratra amin’i Israely, tokony ho 40 km avaratry ny farihy Genesareta. –ny Berita: vahoaka tsy dia fantatra loatra.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Tonga kosa ry i Jôaba nanao fahirano an’i Sebà tao Abela-Bety-Mahakà, ary nanangana tovon-tany mitovy haavo amin’ny manda ivelan’ny tanàna. Dia nanomboka nandrava ny manda ny tafika manontolo izay niaraka tamin’i Jôaba mba handrodana izany.
  '16':
  - type: text
    content: 'Fa nisy vehivavy hendry niantsoantso avy tao an-tanàna nanao hoe:'
  - type: text
    content: –Henoy! Henoy kely e! Mba lazao i Jôaba hanatona etỳ fa te hiresaka aminy aho.
  '17':
  - type: text
    content: 'Rehefa nanatona an-dravehivavy izy, dia nilazany hoe:'
  - type: text
    content: –Ianao va no Jôaba?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny, izaho no izy.
  - type: text
    content: 'Ary hoy indray ravehivavy taminy:'
  - type: text
    content: –Mba henoy teny aho mpanompovavinao.
  - type: text
    content: 'Ka hoy i Jôaba:'
  - type: text
    content: –Mihaino anao aho.
  '18':
  - type: text
    content: 'Dia hoy ravehivavy taminy:'
  - type: text
    content: '–Fitenin’ny olona taloha ny hoe: «Anontanio ny mponin’i Abela, dia ho vita mora ny raharaha» '
  '19':
  - type: text
    content: Amiko dia anisan’ny tia fihavanana sy mahatoky indrindra amin’i Israely ny mponina eto; kanefa dia tadiavinao ho ravana ity tanàna anisan’ny lehibe amin’i Israely ity. Nahoana no holevoninao ny fananan’ny TOMPO?
  '2':
  - type: text
    content: Ary nandao an’i Davida avokoa ny lehilahy israelita avaratra, ka nanaraka an’i Sebà zanakalahin’i Bikrỳ. Fa ny lehilahy jodeanina kosa nifikitra tamin’ny mpanjakany ihany, ka tafaraka taminy hatreo Jôrdàna ka hatrany Jerosalema.
  '20':
  - type: text
    content: 'Namaly kosa i Jôaba hoe:'
  - type: text
    content: '–Sanatria dia sanatria amiko ny handevona sy handrava na inona na inona. '
  '21':
  - type: text
    content: Tsy izany mihitsy, fa misy lehilahy iray avy any amin’ny tendrombohitr’i Efraîma, atao hoe Sebà zanakalahin’i Bikrỳ izay efa nikomy hamely an’i Davida mpanjaka. Izy ihany no atolory ahy dia hiala amin’ny tanàna aho.
  - type: text
    content: 'Dia hoy ravehivavy tamin’i Jôaba:'
  - type: text
    content: –Ao àry fa hatsipinay aminao ankoatra ny manda ny lohany.
  '22':
  - type: text
    content: Nikabarian-dravehivavy tamim-pahendrena avokoa ny mpiray tanàna, dia notapahina ny lohan’i Sebà zanakalahin’i Bikrỳ ka natsipy teny amin’i Jôaba. Notsofin’i Jôaba ny anjomara, dia tsy nanao fahirano ny tanàna intsony ny miaramilany ary samy namonjy ny fonenany avy. I Jôaba kosa mbola niverina tany Jerosalema ho eo amin’ny mpanjaka.
  - type: heading
    content: Ireo mpiasam-panjakan’i Davida
  '23':
  - type: text
    content: 'I Jôaba no filohan’ny tafika manontolo tamin’i Israely; i Benaià zanakalahin’i Joiadà no lehiben’ny Keretita sy Peletita mpiambina an’i Davida; '
  '24':
  - type: text
    content: 'i Adôrama no tonian’ny asam-panompoana; i Jôsafata zanakalahin’i Ahiloda no mpitahiry ny raki-tsoratra; '
  '25':
  - type: text
    content: 'i Sevà no mpitantsoratra; i Tsadôka sy i Abiatara no mpisorona; '
  '26':
  - type: text
    content: ary i Hîrà, ilay Jairita, no mpanolotsain’i Davida.
  '3':
  - type: text
    content: Raha vao tonga tao an-tranony tany Jerosalema i Davida mpanjaka, dia naka ireo vaditsindrano folo izay najanony hiandry ny trano, ka nametraka azy tamin’ny trano iray tsara ambina. Nokojakojainy sy novelominy izy ireo saingy tsy niraisany intsony. Nahibony tao mandra-pahafatiny ireo, ka tonga mpitondratena velom-bady
  - type: note
    content: 'vaditsindrano folo: jereo 15.16; 16.21-22.'
  - type: text
    content: .
  - type: heading
    content: Matin’i Jôaba i Hamasà
  '4':
  - type: text
    content: 'Hoy ny mpanjaka tamin’i Hamasà:'
  - type: text
    content: –Vorio ho eto amiko ato anatin’ny telo andro ny miaramila jodeanina rehetra, ary aoka mba ho eto koa ianao.
  '5':
  - type: text
    content: 'Dia lasa i Hamasà namory ny tafika jodeanina; nefa dia taran’ny fe-potoana izay nomen’i Davida azy izy. '
  '6':
  - type: text
    content: 'Ka hoy i Davida tamin’i Abisay:'
  - type: text
    content: –Ankehitriny dia efa mampidi-doza antsika mihoatra noho i Absalôma i Sebà zanakalahin’i Bikrỳ. Koa ento ny miaramila mpiambina ahy, dia enjeho izy, fandrao mahazo tanàna mimanda, ka ho dify ny masontsika.
  '7':
  - type: text
    content: 'Nivoaka an’i Jerosalema nanaraka an’i Abisay koa ny olon’i Jôaba sy ny Keretita ary ny Peletita, izany hoe ny kalaza rehetra, ka nanenjika an’i Sebà zanakalahin’i Bikrỳ. '
  '8':
  - type: text
    content: Rehefa tonga teo amin’ilay vato lehibe tao Gibehôna
  - type: note
    content: 'Gibehôna: jereo 2.12 sy nta.'
  - type: text
    content: ' kosa ireo, dia avy nitsena azy i Hamasà. Tamin’izay ny nanaovan’i Jôaba dia ny akanjo miaramila nisy ilay fehikibo nihanton’ny sabatra mbamin’ny tranony; ka nony nandroso izy, dia latsaka ilay sabatra. '
  '9':
  - type: text
    content: 'Ary hoy i Jôaba tamin’i Hamasà:'
  - type: text
    content: –Manahoana ianao, ry rahalahy?
  - type: text
    content: 'Noraisin’i Jôaba tamin’ny tanany ankavanana ny volombavan’i Hamasà mba horohany. '
