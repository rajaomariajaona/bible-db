document_id: 2CH.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanombohan’ny nanjakàn’i Ahaza
  - type: heading
    content: (Jereo 2 Mp 16.1-6)
  - type: text
    content: 'Feno roapolo taona i Ahaza fony izy tonga mpanjaka; ary naharitra 16 taona no nanjakany tao Jerosalema. Tsy mba nanao izay mahitsy eo imason’ny TOMPO tahaka an’i Davida razambeny izy, '
  '10':
  - type: text
    content: 'Ankehitriny ny terak’i Joda sy i Jerosalema, na lahy na vavy, dia kasainareo handevozina; ka tonga manan-keloka amin’ny TOMPO Andriamanitrareo koa ianareo! '
  '11':
  - type: text
    content: 'Henoy àry aho: Alefaso ny olona sambo-belona izay nentinareo avy tamin’ny Jodeanina havanareo, satria irehetan’ny fahatezeran’ny TOMPO ianareo.'
  '12':
  - type: text
    content: 'Nitsangana tamin’izay ny lehibeny sasany anisan’ny loholona efraimita, dia i Hazarià zanakalahin’i Jôhanàna, i Berekià zanakalahin’i Mesilemôta, i Hezekià zanakalahin’i Saloma, ary i Hamasà zanakalahin’i Hadlay. Notoherin’izy efa-dahy ny miaramila izay avy niantafika '
  '13':
  - type: text
    content: 'sady nilazany hoe:'
  - type: text
    content: '–Aza ampidirinareo atỳ ireo olona sambo-belona ireo, fa tonga hanan-keloka amin’ny TOMPO isika. Mbola kasainareo hampiana ihany ve ny fahotana amam-pahadisoantsika, na dia efa mavesatra tokoa aza izany ary na dia efa mirehi-pahatezerana amintsika '
  - type: text
    content: Israelita
  - type: text
    content: ' tavaratra aza Andriamanitra?'
  '14':
  - type: text
    content: 'Teo anatrehan’ny manampahefana sy ny vahoaka rehetra tafangona teo no nalefan’ireo miaramila ny sambo-belona sy babo azony. '
  '15':
  - type: text
    content: 'Ary olona voatonona anarana manokana no nitsangana nampahery ny sambo-belona: tamin’ny zavatra voababo ihany no nampiakanjoiny izay rehetra tsy nitafy na koa nanomezany azy kapa; notolorany sakafo sy zava-pisotro ny besinimaro, nohosorany diloilo ny nangotsokotsoka, nampitaingeniny boriky izay rehetra nandringa; dia izy sambo-belona mianakavy no nentiny tany Jerikao, tanàna mpamokatra rofia, ho any amin’ny mpiray foko aminy. Avy eo vao niverina nody tany Samaria ireo mpanatitra.'
  - type: heading
    content: Nangataka ny fanohanan’i Asiria i Ahaza
  - type: heading
    content: (Jereo 2 Mp 16.7-20)
  '16':
  - type: text
    content: 'Tamin’izany andro izany i Ahaza mpanjaka no nandefa iraka ho any amin’ny mpanjakan’i Asiria mba hangataka ny any hanampy azy. '
  '17':
  - type: text
    content: 'Tonga indray manko ny Edômita namely ny Jodeanina sy nitondra sambo-belona. '
  '18':
  - type: text
    content: 'Ary ny Filistinina koa nanafika ny tanàna tao '
  - type: text
    content: Sefelà
  - type: text
    content: ' sy tao Negeba izay anisan’ny fanjakàn’i Joda, dia nahafaka an’i Bety-Semesy sy i Aialôna ary i Gederôta mbamin’i Sôkao sy i Timnà ary i Gimzao miaraka amin’ny tanàna kely manodidina azy avy; ka nonenan’ny Filistinina ireny. '
  '19':
  - type: text
    content: Nampietren’ny TOMPO toy izany ny fanjakàn’i Joda noho i Ahaza mpanjakany efa nitaona ny Jodeanina hiala amin’ny TOMPO sy hanimbazimba Azy.
  '2':
  - type: text
    content: 'fa nitondra tena tahaka ny mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' avaratra. Nanao sarivongan-tsampy ho fanajana an’ireo '
  - type: text
    content: Bahala
  - type: text
    content: ' mihitsy aza i Ahaza. '
  '20':
  - type: text
    content: 'Dia tonga i Tiglato-Pilesera mpanjakan’i Asiria kanefa nanao fahirano an’i Ahaza fa tsy nanampy azy akory. '
  '21':
  - type: text
    content: Efa nakan’i Ahaza ampahany aza ny zavatra tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' sy tao an-dapany ary tao an-tranon’ny manampahefana, ka efa nomeny ny mpanjakan’i Asiria; saingy tsy nahazoany tombontsoa akory izany. '
  '22':
  - type: text
    content: 'Tamin’ny andro nanaovana fahirano azy, dia mbola nanao izay nahadiso amin’ny TOMPO ihany io Ahaza mpanjaka io. '
  '23':
  - type: text
    content: 'Fa ireo andriamanitr’i Damasy, izay andriamanitra nandresy an’i Ahaza, no nanolorany '
  - type: text
    content: sorona
  - type: text
    content: ' satria hoy izy anakampony hoe: «Nanampy ny mpanjakan’i Siria ireo andriamanitra ireo, ka dia hanolorako sorona koa mba hanampiany ahy.» Kanjo tonga fandravana an’i Ahaza sy ny vahoakany rehetra ireo. '
  '24':
  - type: text
    content: 'Nangonin’i Ahaza ny fanaky ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' ka nomontsamontsaniny; ary nohidiany avy ny varavaran’ny tranon’ny TOMPO. Dia nanaovany '
  - type: text
    content: alitara
  - type: text
    content: ' teny amin’ny fihaonan-dalana rehetra tao Jerosalema; '
  '25':
  - type: text
    content: ary isan-tanànan’ny fanjakàn’i Joda dia nanaovany toeram-panasinana mba handoroana sorona hanetona ho an’ny andriamani-kafa, ka izany no nahatezitra ny TOMPO Andriamanitry ny razany.
  '26':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Ahaza sy ny zavatra nataony, na tamboalohany na tafara, dia voasoratra ao amin’ny '
  - type: text
    content: Bokin’ireo mpanjakan’i Joda sy i
  - type: text
    content: ' '
  - type: text
    content: Israely
  - type: note
    content: Jereo 16.11 sy nta.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa i Ahaza
  - type: note
    content: Jereo Is 14.28.
  - type: text
    content: ', dia nalevina tao an-tanàna Jerosalema; saingy tsy tao amin’ny fasan’ny mpanjaka no nampidirana azy. Ary i Hezekià zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: text
    content: 'Nandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' tao amin’ny lohasahan’i Bena-Hinôma'
  - type: note
    content: 'lohasahan’i Bena-Hinôma: teo atsimon’i Jerosalema.'
  - type: text
    content: ' koa izy, ary nanolotra ny zanany ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana tamin’ny afo'
  - type: note
    content: 'nanolotra... afo: jereo 2 Mp 16.3 sy nta.'
  - type: text
    content: ', araka ny fomba maharikoriko fanaon’ny hafa firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  '4':
  - type: text
    content: Nanao sorona biby sy nandoro azy hanetona teny amin’ny toeram-panasinana ary koa teny an-tampon-kavoana sy teny ambany hazo maitso midoroboka rehetra teny.
  '5':
  - type: text
    content: 'Koa dia natolotry ny TOMPO Andriamaniny ho eo an-tanan’ny mpanjaka sirianina i Ahaza; nandresy azy ny mpanjaka sirianina ary nitondra olona sambo-belona betsaka nankany Damasy. Ny tenan’i Ahaza koa dia natolotry ny TOMPO ho eo an-tanan’i Peka zanakalahin’i Remalià sady mpanjakan’i '
  - type: text
    content: Israely
  - type: note
    content: Momba an’i Peka, mpanjakan’i Israely, jereo 2 Mp 15.27-31.
  - type: text
    content: ', izay namely mafy ka naharesy azy. '
  '6':
  - type: text
    content: Indray andro monja i Peka dia nampamono ho faty vondro-miaramila jodeanina 120, noho ny nandaozan’ireo ny TOMPO Andriamanitry ny razany
  - type: note
    content: 'And 5-6: jereo 2 Mp 16.5; Is 7.1.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary i Zikrỳ, lehilahy maherifo tamin’ny Efraimita, no namono nahafaty an’i Mahaseia zanakalahin’i Ahaza mpanjaka sy namono nahafaty an’i Hazrikama mpifehy ny tao an-dapa ary namono nahafaty an’i Elkanà izay mpiara-miasa akaiky indrindra tamin’ny mpanjaka. '
  '8':
  - type: text
    content: Dia nahazo olona sambo-belona roa hetsy tamin’ireo havany tatsimo ny Israelita, dia zaza amam-behivavy; nahazo babo betsaka taminy koa izy, ka nitondra ireny tany Samaria.
  '9':
  - type: text
    content: 'Nisy '
  - type: text
    content: mpaminanin
  - type: text
    content: '’ny TOMPO tao Samaria, ary Hôbeda no anarany. Niainga hitsena ny miaramila israelita tavaratra izay niditra ny tanàna izy, ka nanao taminy hoe:'
  - type: text
    content: –Indro fa tezitra mafy tamin’ny Jodeanina tokoa ny TOMPO Andriamanitry ny razanareo, ka nanolotra azy ho eo an-tananareo. Kanefa nisafoaka diso tafahoatra ianareo fony namono nahafaty azy, hany ka nanaka-
  - type: text
    content: danitra
  - type: text
    content: ' ny akon’izany. '
