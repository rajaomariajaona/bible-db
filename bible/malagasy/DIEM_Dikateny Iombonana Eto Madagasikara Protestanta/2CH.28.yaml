document_id: 2CH.28,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanombohan’ny nanjakàn’i Ahaza
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 16.1-6)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Feno roapolo taona i Ahaza fony izy tonga mpanjaka; ary naharitra 16 taona no nanjakany tao Jerosalema. Tsy mba nanao izay mahitsy eo imason’ny TOMPO tahaka an’i Davida razambeny izy, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ankehitriny ny terak’i Joda sy i Jerosalema, na lahy na vavy, dia kasainareo handevozina; ka tonga manan-keloka amin’ny TOMPO Andriamanitrareo koa ianareo! '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Henoy àry aho: Alefaso ny olona sambo-belona izay nentinareo avy tamin’ny Jodeanina havanareo, satria irehetan’ny fahatezeran’ny TOMPO ianareo.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitsangana tamin’izay ny lehibeny sasany anisan’ny loholona efraimita, dia i Hazarià zanakalahin’i Jôhanàna, i Berekià zanakalahin’i Mesilemôta, i Hezekià zanakalahin’i Saloma, ary i Hamasà zanakalahin’i Hadlay. Notoherin’izy efa-dahy ny miaramila izay avy niantafika '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza ampidirinareo atỳ ireo olona sambo-belona ireo, fa tonga hanan-keloka amin’ny TOMPO isika. Mbola kasainareo hampiana ihany ve ny fahotana amam-pahadisoantsika, na dia efa mavesatra tokoa aza izany ary na dia efa mirehi-pahatezerana amintsika '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israelita
    - type: text
      text: ' tavaratra aza Andriamanitra?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo anatrehan’ny manampahefana sy ny vahoaka rehetra tafangona teo no nalefan’ireo miaramila ny sambo-belona sy babo azony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary olona voatonona anarana manokana no nitsangana nampahery ny sambo-belona: tamin’ny zavatra voababo ihany no nampiakanjoiny izay rehetra tsy nitafy na koa nanomezany azy kapa; notolorany sakafo sy zava-pisotro ny besinimaro, nohosorany diloilo ny nangotsokotsoka, nampitaingeniny boriky izay rehetra nandringa; dia izy sambo-belona mianakavy no nentiny tany Jerikao, tanàna mpamokatra rofia, ho any amin’ny mpiray foko aminy. Avy eo vao niverina nody tany Samaria ireo mpanatitra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nangataka ny fanohanan’i Asiria i Ahaza
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Mp 16.7-20)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany i Ahaza mpanjaka no nandefa iraka ho any amin’ny mpanjakan’i Asiria mba hangataka ny any hanampy azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga indray manko ny Edômita namely ny Jodeanina sy nitondra sambo-belona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Filistinina koa nanafika ny tanàna tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: ' sy tao Negeba izay anisan’ny fanjakàn’i Joda, dia nahafaka an’i Bety-Semesy sy i Aialôna ary i Gederôta mbamin’i Sôkao sy i Timnà ary i Gimzao miaraka amin’ny tanàna kely manodidina azy avy; ka nonenan’ny Filistinina ireny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nampietren’ny TOMPO toy izany ny fanjakàn’i Joda noho i Ahaza mpanjakany efa nitaona ny Jodeanina hiala amin’ny TOMPO sy hanimbazimba Azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nitondra tena tahaka ny mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' avaratra. Nanao sarivongan-tsampy ho fanajana an’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' mihitsy aza i Ahaza. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga i Tiglato-Pilesera mpanjakan’i Asiria kanefa nanao fahirano an’i Ahaza fa tsy nanampy azy akory. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nakan’i Ahaza ampahany aza ny zavatra tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ' sy tao an-dapany ary tao an-tranon’ny manampahefana, ka efa nomeny ny mpanjakan’i Asiria; saingy tsy nahazoany tombontsoa akory izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro nanaovana fahirano azy, dia mbola nanao izay nahadiso amin’ny TOMPO ihany io Ahaza mpanjaka io. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireo andriamanitr’i Damasy, izay andriamanitra nandresy an’i Ahaza, no nanolorany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' satria hoy izy anakampony hoe: «Nanampy ny mpanjakan’i Siria ireo andriamanitra ireo, ka dia hanolorako sorona koa mba hanampiany ahy.» Kanjo tonga fandravana an’i Ahaza sy ny vahoakany rehetra ireo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nangonin’i Ahaza ny fanaky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: ' ka nomontsamontsaniny; ary nohidiany avy ny varavaran’ny tranon’ny TOMPO. Dia nanaovany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' teny amin’ny fihaonan-dalana rehetra tao Jerosalema; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary isan-tanànan’ny fanjakàn’i Joda dia nanaovany toeram-panasinana mba handoroana sorona hanetona ho an’ny andriamani-kafa, ka izany no nahatezitra ny TOMPO Andriamanitry ny razany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Ahaza sy ny zavatra nataony, na tamboalohany na tafara, dia voasoratra ao amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ireo mpanjakan’i Joda sy i
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.11 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany kosa i Ahaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 14.28.
      marker-yv: yv-n
    - type: text
      text: ', dia nalevina tao an-tanàna Jerosalema; saingy tsy tao amin’ny fasan’ny mpanjaka no nampidirana azy. Ary i Hezekià zanany lahy no nanjaka nandimby azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' tao amin’ny lohasahan’i Bena-Hinôma'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lohasahan’i Bena-Hinôma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: teo atsimon’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ' koa izy, ary nanolotra ny zanany ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana tamin’ny afo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanolotra... afo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 16.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', araka ny fomba maharikoriko fanaon’ny hafa firenena izay noroahin’ny TOMPO teo anoloan’ny Israelita. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanao sorona biby sy nandoro azy hanetona teny amin’ny toeram-panasinana ary koa teny an-tampon-kavoana sy teny ambany hazo maitso midoroboka rehetra teny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia natolotry ny TOMPO Andriamaniny ho eo an-tanan’ny mpanjaka sirianina i Ahaza; nandresy azy ny mpanjaka sirianina ary nitondra olona sambo-belona betsaka nankany Damasy. Ny tenan’i Ahaza koa dia natolotry ny TOMPO ho eo an-tanan’i Peka zanakalahin’i Remalià sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Momba an’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Peka, mpanjakan’i Israely
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo 2 Mp 15.27-31.'
      marker-yv: yv-n
    - type: text
      text: ', izay namely mafy ka naharesy azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indray andro monja i Peka dia nampamono ho faty vondro-miaramila jodeanina 120, noho ny nandaozan’ireo ny TOMPO Andriamanitry ny razany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 5-6:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 16.5; Is 7.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Zikrỳ, lehilahy maherifo tamin’ny Efraimita, no namono nahafaty an’i Mahaseia zanakalahin’i Ahaza mpanjaka sy namono nahafaty an’i Hazrikama mpifehy ny tao an-dapa ary namono nahafaty an’i Elkanà izay mpiara-miasa akaiky indrindra tamin’ny mpanjaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nahazo olona sambo-belona roa hetsy tamin’ireo havany tatsimo ny Israelita, dia zaza amam-behivavy; nahazo babo betsaka taminy koa izy, ka nitondra ireny tany Samaria.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanin
    - type: text
      text: '’ny TOMPO tao Samaria, ary Hôbeda no anarany. Niainga hitsena ny miaramila israelita tavaratra izay niditra ny tanàna izy, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro fa tezitra mafy tamin’ny Jodeanina tokoa ny TOMPO Andriamanitry ny razanareo, ka nanolotra azy ho eo an-tananareo. Kanefa nisafoaka diso tafahoatra ianareo fony namono nahafaty azy, hany ka nanaka-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' ny akon’izany. '
