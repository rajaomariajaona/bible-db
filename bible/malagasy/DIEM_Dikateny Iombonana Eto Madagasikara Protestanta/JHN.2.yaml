document_id: JHN.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fampakaram-bady tao Kanà
  - type: text
    content: 'Ary tamin’ny andro fahatelo dia nisy fampakaram-bady tany Kanà any Galilea; ary tao ny renin’i Jesoa. '
  '10':
  - type: text
    content: 'ka nilaza taminy hoe:'
  - type: text
    content: –Ny an’ny olona rehetra dia ny divay tsara no arosony aloha; ary rehefa mamomamo ny nasaina, vao arosony izay ratsiratsy kokoa. Fa ianao kosa dia nitahiry ny divay tsara hatramin’izao!
  '11':
  - type: text
    content: Izany nataon’i Jesoa tao Kanà any Galilea izany no santatr’ireo famantarana narosony. Ary nasehon’i Jesoa ny voninahiny, ka nino Azy ny mpianany.
  '12':
  - type: text
    content: Taorian’izany, dia nidina nankany amin’ny tanàna Kafarnahòma
  - type: note
    content: Jereo Mt 4.13.
  - type: text
    content: ' i Jesoa mbamin’ny reniny sy ny rahalahiny ary ny mpianany; nefa andro vitsivitsy ihany no nitoeran’izy mianakavy tao.'
  - type: heading
    content: Tandrovin’i Jesoa ny hajan’ny tempoly
  - type: heading
    content: (Jereo Mt 21.12-13; Mk 11.15-17; Lk 19.45-46)
  '13':
  - type: text
    content: 'Ary efa akaiky ny '
  - type: text
    content: Paska
  - type: text
    content: ' fankalazàn’ny Jiosy'
  - type: note
    content: Jereo Eks 12.1-27.
  - type: text
    content: ', ka dia niakatra tany Jerosalema i Jesoa. '
  '14':
  - type: text
    content: Ary hitany teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' ireo mpivarotra omby sy ondry amam-boromahailala ary koa ny mpanakalo vola izay nipetraka teo'
  - type: note
    content: Jereo Mk 11.15 sy nta.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Dia nanao karavasy tamin’ny tady i Jesoa, ary nandroaka azy rehetra mbamin’ny ondry aman’omby hiala teo an-kianjan’ny tempoly; nararak’i Jesoa ny volan’ireo mpanakalo vola sady nazerany ny latabany; '
  '16':
  - type: text
    content: 'ary hoy Izy tamin’ireo mpivarotra voromahailala:'
  - type: text
    content: –Esory teo ireo, fa aza atao fivarotana ny tranon’ny Raiko.
  '17':
  - type: text
    content: 'Dia tsaroan’ny '
  - type: text
    content: mpianatr
  - type: text
    content: '’i Jesoa fa izao no efa voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Saro-piaro ny amin’ny tranonao aho, Andriamanitra ô, ka izany no haharîtra aina ahy'
  - type: note
    content: Sal 69.10.
  - type: text
    content: '!»'
  '18':
  - type: text
    content: 'Tamin’izay dia niteny tamin’i Jesoa ny manampahefana jiosy nanao hoe:'
  - type: text
    content: –Inona no famantarana asehonao aminay ho porofon’ny fahefana anaovanao an’izao?
  '19':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: '–Ravao ity '
  - type: text
    content: tempoly
  - type: text
    content: ' ity ary ao anatin’ny telo andro dia hajoroko indray'
  - type: note
    content: Ampit Mt 26.61; 27.40; Mk 14.58; 15.29.
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Nasaina ho amin’io fampakaram-bady io koa i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Ka hoy ry zareo:'
  - type: text
    content: –46 taona izao no nanaovana ity tempoly ity
  - type: note
    content: Ny fanorenana ity tempoly malaza faha Jesoa ity dia natomboka taona 19 tal J.K. ary Herôda Lehibe no nampanao azy.
  - type: text
    content: ', ka Ianao ve no hahatafajoro azy ao anatin’ny telo andro?'
  '21':
  - type: text
    content: 'Ny tempoly nolazain’i Jesoa anefa dia ny tenany. '
  '22':
  - type: text
    content: Koa rehefa nitsangana velona avy tany amin’ny maty i Jesoa, dia tsaroan’ny mpianany fa voalazany izany; ka ninoan’izy ireo ny Soratra Masina sy ny teny voalazan’i Jesoa.
  - type: heading
    content: Fantatr’i Jesoa hatramin’ny ao am-po tsy miloaka
  '23':
  - type: text
    content: 'Fony i Jesoa tao Jerosalema nandritra ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ', dia maro no nino Azy raha nahita ny famantarana izay nataony. '
  '24':
  - type: text
    content: 'Kanefa i Jesoa dia tsy natoky azy ireo, satria fantany avokoa izy rehetra '
  '25':
  - type: text
    content: ary tsy nilainy hisy vavolombelona manambara Azy momba ny olona; fa Izy mihitsy no nahafantatra izay tao am-pon’ny olona.
  '3':
  - type: text
    content: 'Ary satria efa lany ny divay, dia hoy ny renin’i Jesoa taminy:'
  - type: text
    content: –Tapitra ny divain-dry zareo!
  '4':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny reniny:'
  - type: text
    content: –Ravehivavy, inona no tadiavinao amiko? Moa tsy efa tonga ve ny fotoanandroko
  - type: note
    content: 'Moa... ny fotoanandroko? (fotoana hanaovako asa mahagaga): dkt hafa tsy mbola tonga ny fotoanandroko (fotoana hijaliako sy hahafatesako).'
  - type: text
    content: '?'
  '5':
  - type: text
    content: 'Dia hoy ny renin’i Jesoa tamin’ireo mpanompo:'
  - type: text
    content: –Na inona na inona lazainy aminareo dia ataovy!
  '6':
  - type: text
    content: 'Ary nisy siny vato enina nipetraka teo, ho fidiovana araka ny fanaon’ny Jiosy. Samy nahalany zato litatra eo ho eo ny siny tsirairay avy. '
  '7':
  - type: text
    content: 'Dia hoy i Jesoa tamin’ny mpanompo:'
  - type: text
    content: –Fenoy rano ireto siny ireto.
  - type: text
    content: 'Dia nofenoiny hatramin’ny molony. '
  '8':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny mpanompo:'
  - type: text
    content: –Tovozy amin’izao ka ento any amin’ny mpandahatra ny fanasana.
  - type: text
    content: 'Dia nentin’ireo mpanompo. '
  '9':
  - type: text
    content: 'Ary nanandrana ny rano nanjary divay ity mpandahatra ny fanasana, nefa tsy fantany izay niaviany (fa ireo mpanompo nanovo ny rano no nahafantatra). Dia niantso ny mpampakatra kosa ity mpandahatra ny fanasana '
