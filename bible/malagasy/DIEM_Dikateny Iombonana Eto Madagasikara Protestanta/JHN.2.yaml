document_id: JHN.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampakaram-bady tao Kanà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’ny andro fahatelo dia nisy fampakaram-bady tany Kanà any Galilea; ary tao ny renin’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nasaina ho amin’io fampakaram-bady io koa i Jesoa mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary satria efa lany ny divay, dia hoy ny renin’i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tapitra ny divain-dry zareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy i Jesoa tamin’ny reniny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ravehivavy, inona no tadiavinao amiko? Moa tsy efa tonga ve ny fotoanandroko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Moa... ny fotoanandroko? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(fotoana hanaovako asa mahagaga): dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy mbola tonga ny fotoanandroko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (fotoana hijaliako sy hahafatesako).'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny renin’i Jesoa tamin’ireo mpanompo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na inona na inona lazainy aminareo dia ataovy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy siny vato enina nipetraka teo, ho fidiovana araka ny fanaon’ny Jiosy. Samy nahalany zato litatra eo ho eo ny siny tsirairay avy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy i Jesoa tamin’ny mpanompo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fenoy rano ireto siny ireto.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nofenoiny hatramin’ny molony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Jesoa tamin’ny mpanompo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tovozy amin’izao ka ento any amin’ny mpandahatra ny fanasana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nentin’ireo mpanompo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nanandrana ny rano nanjary divay ity mpandahatra ny fanasana, nefa tsy fantany izay niaviany (fa ireo mpanompo nanovo ny rano no nahafantatra). Dia niantso ny mpampakatra kosa ity mpandahatra ny fanasana '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny an’ny olona rehetra dia ny divay tsara no arosony aloha; ary rehefa mamomamo ny nasaina, vao arosony izay ratsiratsy kokoa. Fa ianao kosa dia nitahiry ny divay tsara hatramin’izao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izany nataon’i Jesoa tao Kanà any Galilea izany no santatr’ireo famantarana narosony. Ary nasehon’i Jesoa ny voninahiny, ka nino Azy ny mpianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Taorian’izany, dia nidina nankany amin’ny tanàna Kafarnahòma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 4.13.
    marker-yv: yv-n
  - type: text
    text: ' i Jesoa mbamin’ny reniny sy ny rahalahiny ary ny mpianany; nefa andro vitsivitsy ihany no nitoeran’izy mianakavy tao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tandrovin’i Jesoa ny hajan’ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 21.12-13; Mk 11.15-17; Lk 19.45-46)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary efa akaiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' fankalazàn’ny Jiosy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.1-27.
    marker-yv: yv-n
  - type: text
    text: ', ka dia niakatra tany Jerosalema i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hitany teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' ireo mpivarotra omby sy ondry amam-boromahailala ary koa ny mpanakalo vola izay nipetraka teo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 11.15 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao karavasy tamin’ny tady i Jesoa, ary nandroaka azy rehetra mbamin’ny ondry aman’omby hiala teo an-kianjan’ny tempoly; nararak’i Jesoa ny volan’ireo mpanakalo vola sady nazerany ny latabany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary hoy Izy tamin’ireo mpivarotra voromahailala:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Esory teo ireo, fa aza atao fivarotana ny tranon’ny Raiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia tsaroan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jesoa fa izao no efa voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Saro-piaro ny amin’ny tranonao aho, Andriamanitra ô, ka izany no haharîtra aina ahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 69.10.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin’izay dia niteny tamin’i Jesoa ny manampahefana jiosy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no famantarana asehonao aminay ho porofon’ny fahefana anaovanao an’izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ravao ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ity ary ao anatin’ny telo andro dia hajoroko indray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 26.61; 27.40; Mk 14.58; 15.29.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ka hoy ry zareo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –46 taona izao no nanaovana ity tempoly ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fanorenana ity tempoly malaza faha Jesoa ity dia natomboka taona 19 tal J.K. ary Herôda Lehibe no nampanao azy.
    marker-yv: yv-n
  - type: text
    text: ', ka Ianao ve no hahatafajoro azy ao anatin’ny telo andro?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tempoly nolazain’i Jesoa anefa dia ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa rehefa nitsangana velona avy tany amin’ny maty i Jesoa, dia tsaroan’ny mpianany fa voalazany izany; ka ninoan’izy ireo ny Soratra Masina sy ny teny voalazan’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fantatr’i Jesoa hatramin’ny ao am-po tsy miloaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fony i Jesoa tao Jerosalema nandritra ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', dia maro no nino Azy raha nahita ny famantarana izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanefa i Jesoa dia tsy natoky azy ireo, satria fantany avokoa izy rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ary tsy nilainy hisy vavolombelona manambara Azy momba ny olona; fa Izy mihitsy no nahafantatra izay tao am-pon’ny olona.
