document_id: JOB.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: '*'
  - type: heading
    content: 'Tenin’i Tsôfara: ny fahorian’ny ratsy fanahy'
  - type: text
    content: 'Dia niteny i Tsôfara avy any Nahamà ka nanao tamin’i Jôba hoe:'
  '10':
  - type: text
    content: Ny zanany hanonitra amin’ny mahantra,
  - type: text
    content: ary ny tanany ihany no hampody aminy ny hareny.
  '11':
  - type: text
    content: Herim-pahatanorana no manenika ny taolany,
  - type: text
    content: nefa hiara-mandry aminy ao am-pasana izany.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Na mamy ao am-bavan’ny tsy mpivavaka aza ny ratsy
  - type: text
    content: ka afeniny ao ambanin’ny lelany,
  '13':
  - type: text
    content: ary na ankafiziny ela aza izany
  - type: text
    content: ka tahiriziny ao ambanin’ny lanilaniny,
  '14':
  - type: text
    content: dia hivadika hankarary kibo
  - type: text
    content: fa efa tonga poizina ao anatiny.
  '15':
  - type: text
    content: Handoa ny harena izay nateliny izy;
  - type: text
    content: holoaran’Andriamanitra tao an-kibony izany.
  '16':
  - type: text
    content: 'Fa poizin’ny bibilava no efa notsentsefiny:'
  - type: text
    content: ka dia ho fatin’ny kaikitry ny menarana izy.
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Tsy ho hitany intsony ny tantely sy ronono,
  - type: text
    content: izay mitosaka toa renirano na ony aman-driaka.
  '18':
  - type: text
    content: Haveriny izay nisasarany fa tsy azony hanina;
  - type: text
    content: koa na betsaka aza ny tombom-barony,
  - type: text
    content: dia tsy mba hifaliany akory izany.
  '19':
  - type: text
    content: Eny, nanosihosy sy nahafoy ny mahantra izy,
  - type: text
    content: ary nangalatra tranon’olona an-keriny
  - type: text
    content: fa tsy mba nanao ho an’ny tenany.
  '2':
  - type: text
    content: Noho izany, ny fieritreretako no manosika ahy hamaly
  - type: text
    content: ary koa ny fahamaimaizana misy ato amiko.
  '20':
  - type: text
    content: Tsy mba nahalala onony velively izy,
  - type: text
    content: koa tsy hahavonjy ny zavatra nankamamîny.
  '21':
  - type: text
    content: Ary tsy nisy tsy nanamparany fahalian-karena;
  - type: text
    content: ka dia tsy haharitra ny hasambarany.
  - type: heading
    content: '*'
  '22':
  - type: text
    content: Hitaintaina ny tsy mpivavaka na dia manan-karembe aza,
  - type: text
    content: satria tebiteby mangeja no hianjady aminy.
  '23':
  - type: text
    content: Iny izy mbola sondriana mameno kibo iny,
  - type: text
    content: dia andefasan’Andriamanitra fahatezera-mirehitra
  - type: text
    content: izay hirotsaka aminy ho solon-tsakafony.
  '24':
  - type: text
    content: Raha miala ny sabatry ny fahavalo izy,
  - type: text
    content: dia ho voatrobaky ny tsipîka varahina
  - type: note
    content: jereo Is 24.18; Ham 5.19.
  - type: text
    content: .
  '25':
  - type: text
    content: Ongotany ny zana-tsipîka nitrobaka azy;
  - type: text
    content: ka raha vao tafatsoaka amin’ny atiny izany,
  - type: text
    content: dia ny tenany indray no iharan’ny horohorom-pahafatesana.
  - type: heading
    content: '*'
  '26':
  - type: text
    content: Ny haizim-pandringanana no voatokana
  - type: text
    content: ho an’ny zava-tsoa rehetra izay voaangony;
  - type: text
    content: ary afo tsy narehitr’olombelona no mandoro azy
  - type: text
    content: ka mandevona ny sisa ao an-tranony.
  '27':
  - type: text
    content: Ny lanitra mampiharihary ny helok’io olona io,
  - type: text
    content: ary ny tany mitsangan-kiampanga azy.
  '28':
  - type: text
    content: Lasa rano ny harembe ao an-tranony,
  - type: text
    content: amin’ny androm-pahatezeran’Andriamanitra.
  '29':
  - type: text
    content: Toy izany no anjara sy lova
  - type: text
    content: voatokan’Andriamanitra ho an’ny olon-dratsy
  - type: text
    content: sy voatendrin’ny teniny hianjady aminy.
  '3':
  - type: text
    content: Nandre lesona manevateva ahy aho,
  - type: text
    content: nefa ny saiko mahita ny havaly izany.
  '4':
  - type: text
    content: Moa tsy fantatrao ve fa hatramin’ny ela,
  - type: text
    content: hatrizay nampitoerana ny olona teto an-tany,
  '5':
  - type: text
    content: dia vetivety ny fireharehan’ny olon-dratsy
  - type: text
    content: ary mihelina ihany ny fifalian’ny tsy mpivavaka.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: Fa na dia mipaka any an-danitra aza ny haavony
  - type: text
    content: ka mitehina amin’ny rahona ny lohany,
  '7':
  - type: text
    content: dia ho levona mandrakizay toy ny dikiny izy;
  - type: text
    content: 'ary izay nahita azy dia hanontany hoe:'
  - type: text
    content: «Mba aiza àry izy?»
  '8':
  - type: text
    content: Manidina tahaka ny nofy izy ka tsy hita intsony,
  - type: text
    content: ary levona tahaka ny fahitana amin’ny alina
  - type: note
    content: Jereo Sal 90.5.
  - type: text
    content: .
  '9':
  - type: text
    content: Izay nahatazanan’ny maso azy
  - type: text
    content: dia tsy hahitana azy intsony,
  - type: text
    content: fa ny toeram-ponenany aza
  - type: text
    content: tsy hahatsikaritra azy intsony.
