document_id: JOB.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Tenin’i Tsôfara: ny fahorian’ny ratsy fanahy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny i Tsôfara avy any Nahamà ka nanao tamin’i Jôba hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny zanany hanonitra amin’ny mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanany ihany no hampody aminy ny hareny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Herim-pahatanorana no manenika ny taolany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa hiara-mandry aminy ao am-pasana izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na mamy ao am-bavan’ny tsy mpivavaka aza ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afeniny ao ambanin’ny lelany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ary na ankafiziny ela aza izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tahiriziny ao ambanin’ny lanilaniny,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: dia hivadika hankarary kibo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa tonga poizina ao anatiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Handoa ny harena izay nateliny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holoaran’Andriamanitra tao an-kibony izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa poizin’ny bibilava no efa notsentsefiny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia ho fatin’ny kaikitry ny menarana izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tsy ho hitany intsony ny tantely sy ronono,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitosaka toa renirano na ony aman-driaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Haveriny izay nisasarany fa tsy azony hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa na betsaka aza ny tombom-barony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba hifaliany akory izany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Eny, nanosihosy sy nahafoy ny mahantra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nangalatra tranon’olona an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba nanao ho an’ny tenany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Noho izany, ny fieritreretako no manosika ahy hamaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa ny fahamaimaizana misy ato amiko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy mba nahalala onony velively izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa tsy hahavonjy ny zavatra nankamamîny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary tsy nisy tsy nanamparany fahalian-karena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia tsy haharitra ny hasambarany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hitaintaina ny tsy mpivavaka na dia manan-karembe aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tebiteby mangeja no hianjady aminy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Iny izy mbola sondriana mameno kibo iny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia andefasan’Andriamanitra fahatezera-mirehitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hirotsaka aminy ho solon-tsakafony.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Raha miala ny sabatry ny fahavalo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho voatrobaky ny tsipîka varahina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 24.18; Ham 5.19.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ongotany ny zana-tsipîka nitrobaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka raha vao tafatsoaka amin’ny atiny izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tenany indray no iharan’ny horohorom-pahafatesana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny haizim-pandringanana no voatokana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny zava-tsoa rehetra izay voaangony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary afo tsy narehitr’olombelona no mandoro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandevona ny sisa ao an-tranony.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny lanitra mampiharihary ny helok’io olona io,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tany mitsangan-kiampanga azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Lasa rano ny harembe ao an-tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny androm-pahatezeran’Andriamanitra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Toy izany no anjara sy lova
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voatokan’Andriamanitra ho an’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy voatendrin’ny teniny hianjady aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nandre lesona manevateva ahy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny saiko mahita ny havaly izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moa tsy fantatrao ve fa hatramin’ny ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrizay nampitoerana ny olona teto an-tany,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: dia vetivety ny fireharehan’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mihelina ihany ny fifalian’ny tsy mpivavaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa na dia mipaka any an-danitra aza ny haavony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitehina amin’ny rahona ny lohany,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: dia ho levona mandrakizay toy ny dikiny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary izay nahita azy dia hanontany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mba aiza àry izy?»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manidina tahaka ny nofy izy ka tsy hita intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary levona tahaka ny fahitana amin’ny alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 90.5.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay nahatazanan’ny maso azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hahitana azy intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny toeram-ponenany aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hahatsikaritra azy intsony.
