document_id: PSA.93,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mpanjaka ny Tompo
  - type: text
    content: Mpanjaka ny TOMPO, mitafy fiandrianana;
  - type: text
    content: eny, mitafy fiandrianana IZY ary misikina hery
  - type: text
    content: ka voaorina tsara tsy hihontsona izao tontolo izao.
  '2':
  - type: text
    content: Efa niorina hatry ny ela ny sezafiandriananao;
  - type: text
    content: hatrizay hatrizay dia Andriamanitra Ianao.
  '3':
  - type: text
    content: Fahiny dia nisamboaravoara ny riaka, TOMPO ô,
  - type: text
    content: eny, nisamboaravoaran’ny hatezerana
  - type: text
    content: ary mbola mety misamboaravoara ihany.
  '4':
  - type: text
    content: Fa mahery noho ny feon’ny ranobe
  - type: text
    content: sy ny fidoboky ny onja vaventy, TOMPO ô,
  - type: text
    content: ny fanapahanao any ambony any.
  '5':
  - type: text
    content: Azo antoka tanteraka ny fepetra nataonao, TOMPO ô;
  - type: text
    content: 'ho masina lalandava koa ny '
  - type: text
    content: tranonao
  - type: text
    content: .
