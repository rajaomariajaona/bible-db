    - type: text
      text: Marim-pototra ny fitsarana avoakan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ara-drariny avokoa;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahasarika noho ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vaingam-bolamena voadio;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mamy noho ny tantely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny tantely avy amin’ny tohotra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, izaho mpanomponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hazavain’ireny tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lehibe ny tombontsoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay mitandrina azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mety manao hadisoana ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy tsy mahatsikaritra akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mamelà ahy amin’ny ota tsy nahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovy tsy ho voan’ny ota iniana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza avela hanan-kery amiko ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hanan-tsiny tokoa aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ho afaka amin’ny heloka bevava.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankasitrahinao anie izany teniko
  - type: usfm
    marker: q1
