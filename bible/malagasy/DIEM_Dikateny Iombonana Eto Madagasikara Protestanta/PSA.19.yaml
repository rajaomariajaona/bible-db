  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Madio ny fanajana ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka maharitra hatrany hatrany.
  - type: usfm
    marker: q1
