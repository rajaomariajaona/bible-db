document_id: PSA.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Voninahitr’Andriamanitra ny voaary tontolo. Ny lalànan’ny Tompo.
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Madio ny fanajana ny TOMPO,
  - type: text
    content: ka maharitra hatrany hatrany.
  - type: text
    content: Marim-pototra ny fitsarana avoakan’ny TOMPO
  - type: text
    content: ka ara-drariny avokoa;
  '11':
  - type: text
    content: mahasarika noho ny volamena,
  - type: text
    content: dia ny vaingam-bolamena voadio;
  - type: text
    content: sady mamy noho ny tantely,
  - type: text
    content: dia ny tantely avy amin’ny tohotra.
  '12':
  - type: text
    content: Tompo ô, izaho mpanomponao
  - type: text
    content: dia hazavain’ireny tokoa;
  - type: text
    content: fa lehibe ny tombontsoa
  - type: text
    content: ho an’izay mitandrina azy.
  '13':
  - type: text
    content: Mety manao hadisoana ny olona,
  - type: text
    content: saingy tsy mahatsikaritra akory;
  - type: text
    content: koa mamelà ahy amin’ny ota tsy nahy.
  '14':
  - type: text
    content: Arovy tsy ho voan’ny ota iniana aho,
  - type: text
    content: ka aza avela hanan-kery amiko ireny;
  - type: text
    content: dia tsy hanan-tsiny tokoa aho
  - type: text
    content: sady ho afaka amin’ny heloka bevava.
  '15':
  - type: text
    content: Hankasitrahinao anie izany teniko
  - type: text
    content: sy izay vetsoko teo anoloanao,
  - type: text
    content: ry TOMPO Vatolampiko
  - type: text
    content: sy Mpanavotra ahy!
  '2':
  - type: text
    content: 'Ny lanitra manambara ny '
  - type: text
    content: voninahitr’Andriamanitra
  - type: text
    content: ary ny habakabaka mitory ny asa vitany;
  '3':
  - type: text
    content: ny andro mitantara izany amin’ny andro mandimby,
  - type: text
    content: ary ny alina milaza izany amin’ny alina manaraka.
  '4':
  - type: text
    content: Tsy misy izay miteny na mivolana,
  - type: text
    content: tsy misy izay feo mety ho heno;
  '5':
  - type: text
    content: nefa ny rindrany miharihary eran-tany,
  - type: text
    content: ny hafany tonga any am-paran’izao tontolo izao
  - type: note
    content: Ny fiandohan’ny and 5 dia voatsiahin’i Paoly apôstôly ao amin’ny Rm 10.8.
  - type: text
    content: .
  - type: text
    content: Nanorenan’Andriamanitra tranolay
  - type: text
    content: teny ana habakabaka ny masoandro.
  '6':
  - type: text
    content: Koa isa-maraina dia miseho ilay izy
  - type: text
    content: toy ny mpampakatra mivoaka ny tranony;
  - type: text
    content: toy ny olo-matanjaka faly maka bahana
  - type: text
    content: mba hanefa ny hazakazaka fanaony.
  '7':
  - type: text
    content: Ny faravodilanitra atsinanana no iaingany
  - type: text
    content: ary ny faravodilanitra andrefana no iafarany;
  - type: text
    content: ka, eny amin’ny lalan-kizorany eny,
  - type: text
    content: dia tsy misy afa-miery amin’ny hafanàny.
  '8':
  - type: text
    content: 'Lavorary ny '
  - type: text
    content: lalànan
  - type: text
    content: ’ny TOMPO
  - type: text
    content: ka mamelombelona aina.
  - type: text
    content: Mahatoky ny fepetra nataon’ny TOMPO
  - type: text
    content: ka mampahendry ny olon-tsotra.
  '9':
  - type: text
    content: Mahitsy ny fitsipiky ny TOMPO
  - type: text
    content: ka mahafaly ny fo.
  - type: text
    content: Mangarangarana ny baikon’ny TOMPO
  - type: text
    content: ka manazava ny fijery.
