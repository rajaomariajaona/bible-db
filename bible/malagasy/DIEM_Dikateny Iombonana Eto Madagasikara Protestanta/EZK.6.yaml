document_id: EZK.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famelezana ny mpivavaka amin’ny sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, atodiho eny amin’ireo tendrombohitr’i Israely ny fijerinao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eny amin’ireo tendrombohitr’i Israely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny toeram-panasinan’ny mpanompo sampy dia eny an-tendrombohitra no ahitana azy amin’ny ankapobeny.
    marker-yv: yv-n
  - type: text
    text: ' ka ijoroy ny maha-mpaminany anao hamelezako an’ireo mponina eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka hihaino ny teniko izy! Fa Izaho Tompo ANDRIANANAHARY no milaza amin’ny mponina eny an-tendrombohitra sy eny amin’ny havoana ary eny amin’ny hadin-driaka sy ny lohasaha hoe: «Indro hahatonga ady hamelezana anareo Aho mba handravana ny toeram-panasinanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hopotehiko ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitaranareo
  - type: text
    text: ' ary hosimbako ny fitaovana fandoroanareo vovo-javamanitra mifangaro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny fitaovana fandoroana ireo vovo-javamanitra mifangaro:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia vazy manana endrika manokana nentina nandoroana zava-manitra mifangaro, ary nampiasaina indrindra teo amin’ny fivavahana jentilisa.
    marker-yv: yv-n
  - type: text
    text: ' ka hataoko maty miampatrampatra eo anoloan’ny sampinareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny, hatsitrako eo anoloan’ny sarivongan-tsampiny ny fatin’ny Israelita ary haparitako manodidina ny alitarany ny taolany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Hanaparitaka manodidina ny alitarany ny taolany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sady handotoana ny toeram-panasinan’ny mpanompo sampy izany no hanafaizana koa ireo mpampiasa azy amin’ny tsy anaovana azy any am-pasana, jereo 2 Mp 23.14-16; Jer 36.30.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Any amin’izay toerana rehetra nonenanareo dia ho lao ny tanàna, ary ho ravàna ny toeram-panasinana. Ho ravàna koa ny alitaranareo ary tsy hilaina intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy hilaina intsony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho tonga meloka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '; hopotehina sy hofoanana ny sarivongam-tsampinareo, ary hosimbana ny fitaovana fandoroanareo zava-manitra mifangaro; ka dia holevonina avokoa izay namboarinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho faty miampatrampatra ny ankamaroanareo; ka hiaiky amin’izay ianareo fa Izaho no Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa hitazonako sisa tavela ihany aminareo, dia ireo afaka tamin’ny ady teo anivon’ny hafa firenena rehefa voaely ho any an-tany hafa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hahatsiaro ahy izy eo anivon’ireo firenena nandefasako azy ho babo. Ho tadidiny ny fomba nanapotehako azy, noho izy tsy niraiki-po tamiko fa nivadika nanalavitra Ahy ary nampifantoka fijery tamin’ny sampiny. Dia harikoriko ny tenany izy noho ny asa ratsy rehetra sy fanompoan-tsampy rehetra nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hiaiky izy fa Izaho no TOMPO; ary tsy niteny foana Aho fa nampihatra taminy tokoa ny loza izay nandrahonako azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY tamiko: «Mitehafa tanana ianao, ary migadogadòna tongotra ka milazà hoe: ‹Vita toa ny amin’ny fomba rehetra maharikoriko sy mahatsiravina nataon’ny Israelita›. Fa haringana amin’ny ady sy ny mosary ary ny areti-mandringana izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mety ho fihetsika manambara hadisoam-panantenana na fanesoana izany, kanefa etoana toa manambara hafaliana noho ny fiafaràn’ny fanompoan-tsampy eo amin’ny Israelita.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'izay any lavitra ho fatin’ny areti-mandringana, ny etỳ akaiky ho fatin’ny ady ary izay sisa velona tamin’ny fahirano ho faty mosary. Hampariko aminy ny fahatezerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hiampatrampatra eny anivon’ireo sampiny sy manodidina ny alitarany ny fatiny, eny an-tampon’ny tendrombohitra sy ny havoana, eny ambanin’ny hazo maitso sy matevina, dia eny amin’ny toerana rehetra nanolorany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho an’ny sampiny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 12.2; Jer 3.6; Hos 4.13.
    marker-yv: yv-n
  - type: text
    text: '. Amin’izay dia hoekeny izy fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hampiseho ny heriko Aho hamelezana azy. Hosimbako ny taniny ka hataoko lao tsy misy mponina intsony ny toerana rehetra nonenany manomboka eo amin’ny taniefitra atsimo ka hatrany amin’ny tanàna Riblà any avaratra. Amin’izay dia hoekeny fa Izaho no TOMPO.»
