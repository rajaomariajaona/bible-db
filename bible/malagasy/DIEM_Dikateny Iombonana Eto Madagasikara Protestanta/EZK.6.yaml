document_id: EZK.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Famelezana ny mpivavaka amin’ny sampy
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Hiaiky izy fa Izaho no TOMPO; ary tsy niteny foana Aho fa nampihatra taminy tokoa ny loza izay nandrahonako azy.»
  '11':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY tamiko: «Mitehafa tanana ianao, ary migadogadòna tongotra ka milazà hoe: ‹Vita toa ny amin’ny fomba rehetra maharikoriko sy mahatsiravina nataon’ny Israelita›. Fa haringana amin’ny ady sy ny mosary ary ny areti-mandringana izy'
  - type: note
    content: Mety ho fihetsika manambara hadisoam-panantenana na fanesoana izany, kanefa etoana toa manambara hafaliana noho ny fiafaràn’ny fanompoan-tsampy eo amin’ny Israelita.
  - type: text
    content: '; '
  '12':
  - type: text
    content: 'izay any lavitra ho fatin’ny areti-mandringana, ny etỳ akaiky ho fatin’ny ady ary izay sisa velona tamin’ny fahirano ho faty mosary. Hampariko aminy ny fahatezerako. '
  '13':
  - type: text
    content: 'Hiampatrampatra eny anivon’ireo sampiny sy manodidina ny alitarany ny fatiny, eny an-tampon’ny tendrombohitra sy ny havoana, eny ambanin’ny hazo maitso sy matevina, dia eny amin’ny toerana rehetra nanolorany '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny sampiny'
  - type: note
    content: Jereo Deot 12.2; Jer 3.6; Hos 4.13.
  - type: text
    content: '. Amin’izay dia hoekeny izy fa Izaho no TOMPO. '
  '14':
  - type: text
    content: Hampiseho ny heriko Aho hamelezana azy. Hosimbako ny taniny ka hataoko lao tsy misy mponina intsony ny toerana rehetra nonenany manomboka eo amin’ny taniefitra atsimo ka hatrany amin’ny tanàna Riblà any avaratra. Amin’izay dia hoekeny fa Izaho no TOMPO.»
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, atodiho eny amin’ireo tendrombohitr’i Israely ny fijerinao
  - type: note
    content: 'eny amin’ireo tendrombohitr’i Israely: ny toeram-panasinan’ny mpanompo sampy dia eny an-tendrombohitra no ahitana azy amin’ny ankapobeny.'
  - type: text
    content: ' ka ijoroy ny maha-mpaminany anao hamelezako an’ireo mponina eny. '
  '3':
  - type: text
    content: 'Aoka hihaino ny teniko izy! Fa Izaho Tompo ANDRIANANAHARY no milaza amin’ny mponina eny an-tendrombohitra sy eny amin’ny havoana ary eny amin’ny hadin-driaka sy ny lohasaha hoe: «Indro hahatonga ady hamelezana anareo Aho mba handravana ny toeram-panasinanareo. '
  '4':
  - type: text
    content: 'Hopotehiko ny '
  - type: text
    content: alitaranareo
  - type: text
    content: ' ary hosimbako ny fitaovana fandoroanareo vovo-javamanitra mifangaro'
  - type: note
    content: 'Ny fitaovana fandoroana ireo vovo-javamanitra mifangaro: dia vazy manana endrika manokana nentina nandoroana zava-manitra mifangaro, ary nampiasaina indrindra teo amin’ny fivavahana jentilisa.'
  - type: text
    content: ' ka hataoko maty miampatrampatra eo anoloan’ny sampinareo ianareo. '
  '5':
  - type: text
    content: Eny, hatsitrako eo anoloan’ny sarivongan-tsampiny ny fatin’ny Israelita ary haparitako manodidina ny alitarany ny taolany
  - type: note
    content: 'Hanaparitaka manodidina ny alitarany ny taolany: sady handotoana ny toeram-panasinan’ny mpanompo sampy izany no hanafaizana koa ireo mpampiasa azy amin’ny tsy anaovana azy any am-pasana, jereo 2 Mp 23.14-16; Jer 36.30.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Any amin’izay toerana rehetra nonenanareo dia ho lao ny tanàna, ary ho ravàna ny toeram-panasinana. Ho ravàna koa ny alitaranareo ary tsy hilaina intsony
  - type: note
    content: 'tsy hilaina intsony: araka ny dkt tranainy izany; fa ny RM kosa manao hoe ho tonga meloka.'
  - type: text
    content: '; hopotehina sy hofoanana ny sarivongam-tsampinareo, ary hosimbana ny fitaovana fandoroanareo zava-manitra mifangaro; ka dia holevonina avokoa izay namboarinao. '
  '7':
  - type: text
    content: 'Ho faty miampatrampatra ny ankamaroanareo; ka hiaiky amin’izay ianareo fa Izaho no Tompo. '
  '8':
  - type: text
    content: 'Nefa hitazonako sisa tavela ihany aminareo, dia ireo afaka tamin’ny ady teo anivon’ny hafa firenena rehefa voaely ho any an-tany hafa ianareo. '
  '9':
  - type: text
    content: 'Hahatsiaro ahy izy eo anivon’ireo firenena nandefasako azy ho babo. Ho tadidiny ny fomba nanapotehako azy, noho izy tsy niraiki-po tamiko fa nivadika nanalavitra Ahy ary nampifantoka fijery tamin’ny sampiny. Dia harikoriko ny tenany izy noho ny asa ratsy rehetra sy fanompoan-tsampy rehetra nataony. '
