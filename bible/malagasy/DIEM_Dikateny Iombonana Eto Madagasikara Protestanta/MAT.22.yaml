    - type: text
      text: '43'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana àry i Davida, rehefa nohazavain’ny Fanahy Masina, no miantso ny Mesia hoe: «Tompoko»? Fa izao no tenin’i Davida:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: «Ny Tompo Andriamanitra dia niteny hentitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tamin’ny Mpanjaka Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha amin’ny sezafiandrianana eto ankavanako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho kosa hanao ny fahavalonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fitoeran-tongotrao
  - type: usfm
