document_id: MAT.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay fanasambe tamin’ny fampakaram-bady
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 14.15-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nampiasa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' tamin-dry zareo indray i Jesoa ka niteny hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ' dia tahaka ity mpanjaka nanao fanasambe noho ny fampakaram-badin’ny zanany lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nirahin’ity mpanjaka ireo mpiasany hiantso ny olona nasaina hankao amin’ny fanasambe, fa tsy nety ho avy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia mpiasa hafa indray no nirahiny sady nataony hoe: «Izao lazaina amin’ireo olona nasaina: Indro ny sakafo efa voaomako, ny ombiko sy ny biby nafahy efa voavono ary ny zavatra rehetra efa vonona; koa tongava amin’ny fanasambe.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kanjo tsy nahoan’ireo nasaina izany, fa samy lasa nandeha izy rehetra, ny anankiray any amin’ny saha voleny, ary ny anankiray any amin’ny varotra karakarainy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny sasany dia nisambotra ireo mpiasa ka nisetrasetra taminy sy namono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tezitra kosa ilay mpanjaka, hany ka nandefa miaramila handringana ireo mpamono olona ireo sy handoro ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy tamin’ny mpiasany: «Efa voaomana ny fanasambe, saingy ireo nasaina no tsy mendrika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa mankanesa any amin’ny fihaonan-dalana, ary izay hitanareo dia asao avokoa ho atỳ amin’ny fanasambe.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia niely eran’ny arabe ireto mpiasa ka namory izay rehetra hitany, na ratsy fanahy na tsara fanahy; ary dia hipoka ny mpihinana ilay trano nanaovana ny fanasambe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Niditra kosa ny mpanjaka hizaha ny mpihinana; ary hitany teo ity lehilahy anankiray tsy nanao ny akanjo fitondra amin’ny fampakaram-bady '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nilazany hoe: «Ry sakaiza, ahoana ianao no tafiditra eto, kanefa tsy manana ny akanjo fitondra amin’ny fampakaram-bady?» Fa tsy nahateny ilay olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’ireo mpanompony: «Afatory tongotra aman-tanana ilay io, dia ario any amin’ny maizina any ivelany; ka any izy no hitomany sy hikitro-nify.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nofaranan’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, maro no voaantso, fa vitsy no voafidy!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandoavan-ketra ho an’ny amperôra rômanina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 12.13-17; Lk 20.20-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izay dia lasa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' ka niara-nisaina momba izay fanontaniana mety hamandrihany an’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary naniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôdianina
  - type: text
    text: ' ry zareo ho any amin’i Jesoa, ka hoy ireto iraka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpampianatra ô, fantatray fa olo-marina Ianao ary mampianatra tsotra ny lalana soritan’Andriamanitra; sady tsy mampaninona Anao izay mety ho hevitry ny hafa, satria tsy mizaha tavan’olona Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa mba lazao aminay izay hevitrao ny amin’ity: Azonay atao ve ny mandoa hetra amin’ny amperôra rômanina sa tsia?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Takatr’i Jesoa anefa ny sain-dratsin’ireo ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry mpihatsaravelatsihy, nahoana no maka fanahy Ahy ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Asehoy Ahy ny vola fandoa amin’ny hetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia notoloran-dry zareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' anankiray Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy i Jesoa nanontany azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sarin’iza io ary anaran’iza?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ka novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –An’ny amperôra rômanina!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamin’izay dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha izany àry, dia avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Gaga ireto iraka nony nandre izany, ary dia nandao an’i Jesoa ka lasa nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 12.18-27; Lk 20.27-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Androtr’iny ihany, ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ' izay milaza fa tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitsanganan’ny maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 23.8.
    marker-yv: yv-n
  - type: text
    text: ' ho velona dia mba nisy nanatona an’i Jesoa ary nanontany Azy '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpampianatra ô, izao no voalazan’i Mosesy: «Raha misy lehilahy maty tsy nanan-taranaka, dia aoka ny rahalahiny hampakatra ny vady navelany, mba hiteraka hamela solofo ho an’ny maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 25.5-6.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa nisy teo aminay olona fito mirahalahy. Nampaka-bady ny lahimatoa, saingy maty tsy nanana solofo ka namela ny vadiny ho an’ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toraka izany koa ity faharoa sy ny fahatelo ary dia hatramin’izy fito mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Taorian’izy rehetra dia maty koa ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Amin’ny fitsanganan’ny maty ho velona àry, mba ho vadin’iza amin’izy fito mirahalahy ireo ravehivavy fa izy rehetra efa samy nanambady azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Diso hevitra ianareo fa tsy misy fantatrareo na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' na ny herin’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Rehefa tonga ny fitsanganan’ny maty ho velona, dia tsy hisy olona hampaka-bady na hampakarina intsony, fa samy hitovy amin’ny anjely any an-danitra avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary momba ny hoe fitsanganan’ny maty ho velona, moa tsy novakînareo ao amin’ny bokin’i Mosesy ve ilay voalazan’Andriamanitra taminareo hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: «Izaho no Andriamanitr’i Abrahama, sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba»? Tsy Andriamanitry ny maty Izy fa Andriamanitry ny velona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izaho no... Jakôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eks 3.6. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsy Andriamanitry... velona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mk 12.27 sy nta.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Gaga dia gaga ny vahoaka nony nandre izany fampianaran’i Jesoa izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy lehibe indrindra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 12.28-34; Lk 10.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vao ren’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' fa nataon’i Jesoa tsy nanan-kalahatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ', dia vory teo amin’io toerana io ry zareo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' ny anankiray tamin’ireto Farisianina, ka mba hamandrihany an’i Jesoa no nanontaniany Azy hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: –Mpampianatra ô, inona no didy lehibe indrindra ao amin’ny lalàna?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –«Tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, ary amin’ny sainao manontolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 6.5.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izany no didy lehibe indrindra sady voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny faharoa, izay tahaka ny voalohany ihany, dia izao: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev 19.18.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ireo didy anankiroa ireo no ifaharan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy manontolo sy ny fampianaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanontaniana ny amin’ny hoe Zanak’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 12.35-37; Lk 20.41-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Raha mbola vory teo iny kosa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ', dia nanontany azy ireo i Jesoa '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ahoana no hevitrareo ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', Zanak’iza moa Izy?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’i Davida
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
