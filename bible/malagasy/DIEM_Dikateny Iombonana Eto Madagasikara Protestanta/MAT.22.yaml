document_id: MAT.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay fanasambe tamin’ny fampakaram-bady
  - type: heading
    content: (Jereo Lk 14.15-24)
  - type: text
    content: 'Dia nampiasa '
  - type: text
    content: fanoharana
  - type: text
    content: ' tamin-dry zareo indray i Jesoa ka niteny hoe:'
  '10':
  - type: text
    content: Dia niely eran’ny arabe ireto mpiasa ka namory izay rehetra hitany, na ratsy fanahy na tsara fanahy; ary dia hipoka ny mpihinana ilay trano nanaovana ny fanasambe.
  '11':
  - type: text
    content: 'Niditra kosa ny mpanjaka hizaha ny mpihinana; ary hitany teo ity lehilahy anankiray tsy nanao ny akanjo fitondra amin’ny fampakaram-bady '
  '12':
  - type: text
    content: 'ka nilazany hoe: «Ry sakaiza, ahoana ianao no tafiditra eto, kanefa tsy manana ny akanjo fitondra amin’ny fampakaram-bady?» Fa tsy nahateny ilay olona. '
  '13':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’ireo mpanompony: «Afatory tongotra aman-tanana ilay io, dia ario any amin’ny maizina any ivelany; ka any izy no hitomany sy hikitro-nify.»'
  '14':
  - type: text
    content: 'Dia nofaranan’i Jesoa hoe:'
  - type: text
    content: –Eny, maro no voaantso, fa vitsy no voafidy!
  - type: heading
    content: Ny fandoavan-ketra ho an’ny amperôra rômanina
  - type: heading
    content: (Jereo Mk 12.13-17; Lk 20.20-26)
  '15':
  - type: text
    content: 'Tamin’izay dia lasa ireo '
  - type: text
    content: Farisianina
  - type: text
    content: ' ka niara-nisaina momba izay fanontaniana mety hamandrihany an’i Jesoa. '
  '16':
  - type: text
    content: 'Ary naniraka ny '
  - type: text
    content: mpianany
  - type: text
    content: ' mbamin’ny '
  - type: text
    content: Herôdianina
  - type: text
    content: ' ry zareo ho any amin’i Jesoa, ka hoy ireto iraka hoe:'
  - type: text
    content: '–Mpampianatra ô, fantatray fa olo-marina Ianao ary mampianatra tsotra ny lalana soritan’Andriamanitra; sady tsy mampaninona Anao izay mety ho hevitry ny hafa, satria tsy mizaha tavan’olona Ianao. '
  '17':
  - type: text
    content: 'Koa mba lazao aminay izay hevitrao ny amin’ity: Azonay atao ve ny mandoa hetra amin’ny amperôra rômanina sa tsia?'
  '18':
  - type: text
    content: 'Takatr’i Jesoa anefa ny sain-dratsin’ireo ka hoy Izy taminy:'
  - type: text
    content: '–Ry mpihatsaravelatsihy, nahoana no maka fanahy Ahy ianareo? '
  '19':
  - type: text
    content: Asehoy Ahy ny vola fandoa amin’ny hetra.
  - type: text
    content: 'Dia notoloran-dry zareo '
  - type: text
    content: denàry
  - type: text
    content: ' anankiray Izy. '
  '2':
  - type: text
    content: '–Ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ' dia tahaka ity mpanjaka nanao fanasambe noho ny fampakaram-badin’ny zanany lahy. '
  '20':
  - type: text
    content: 'Ary hoy i Jesoa nanontany azy:'
  - type: text
    content: –Sarin’iza io ary anaran’iza?
  '21':
  - type: text
    content: 'Ka novalian’ireo hoe:'
  - type: text
    content: –An’ny amperôra rômanina!
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa taminy:'
  - type: text
    content: –Raha izany àry, dia avereno amin’ny amperôra rômanina izay an’ny amperôra rômanina ary amin’Andriamanitra izay an’Andriamanitra.
  '22':
  - type: text
    content: Gaga ireto iraka nony nandre izany, ary dia nandao an’i Jesoa ka lasa nandeha.
  - type: heading
    content: Anontaniana momba ny fitsanganan’ny maty ho velona i Jesoa
  - type: heading
    content: (Jereo Mk 12.18-27; Lk 20.27-40)
  '23':
  - type: text
    content: 'Androtr’iny ihany, ireo '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ' izay milaza fa tsy misy '
  - type: text
    content: fitsanganan’ny maty
  - type: note
    content: Ampit Asa 23.8.
  - type: text
    content: ' ho velona dia mba nisy nanatona an’i Jesoa ary nanontany Azy '
  '24':
  - type: text
    content: 'hoe:'
  - type: text
    content: '–Mpampianatra ô, izao no voalazan’i Mosesy: «Raha misy lehilahy maty tsy nanan-taranaka, dia aoka ny rahalahiny hampakatra ny vady navelany, mba hiteraka hamela solofo ho an’ny maty'
  - type: note
    content: Jereo Deot 25.5-6.
  - type: text
    content: '.» '
  '25':
  - type: text
    content: 'Koa nisy teo aminay olona fito mirahalahy. Nampaka-bady ny lahimatoa, saingy maty tsy nanana solofo ka namela ny vadiny ho an’ny rahalahiny. '
  '26':
  - type: text
    content: 'Toraka izany koa ity faharoa sy ny fahatelo ary dia hatramin’izy fito mirahalahy. '
  '27':
  - type: text
    content: 'Taorian’izy rehetra dia maty koa ravehivavy. '
  '28':
  - type: text
    content: Amin’ny fitsanganan’ny maty ho velona àry, mba ho vadin’iza amin’izy fito mirahalahy ireo ravehivavy fa izy rehetra efa samy nanambady azy?
  '29':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Diso hevitra ianareo fa tsy misy fantatrareo na ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' na ny herin’Andriamanitra? '
  '3':
  - type: text
    content: 'Nirahin’ity mpanjaka ireo mpiasany hiantso ny olona nasaina hankao amin’ny fanasambe, fa tsy nety ho avy ireo. '
  '30':
  - type: text
    content: 'Rehefa tonga ny fitsanganan’ny maty ho velona, dia tsy hisy olona hampaka-bady na hampakarina intsony, fa samy hitovy amin’ny anjely any an-danitra avokoa. '
  '31':
  - type: text
    content: 'Ary momba ny hoe fitsanganan’ny maty ho velona, moa tsy novakînareo ao amin’ny bokin’i Mosesy ve ilay voalazan’Andriamanitra taminareo hoe: '
  '32':
  - type: text
    content: «Izaho no Andriamanitr’i Abrahama, sy Andriamanitr’i Itsehàka ary Andriamanitr’i Jakôba»? Tsy Andriamanitry ny maty Izy fa Andriamanitry ny velona
  - type: note
    content: 'Izaho no... Jakôba: Eks 3.6. –Tsy Andriamanitry... velona: jereo Mk 12.27 sy nta.'
  - type: text
    content: .
  '33':
  - type: text
    content: Gaga dia gaga ny vahoaka nony nandre izany fampianaran’i Jesoa izany.
  - type: heading
    content: Ny didy lehibe indrindra
  - type: heading
    content: (Jereo Mk 12.28-34; Lk 10.25-28)
  '34':
  - type: text
    content: 'Vao ren’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' fa nataon’i Jesoa tsy nanan-kalahatra ny '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ', dia vory teo amin’io toerana io ry zareo. '
  '35':
  - type: text
    content: 'Ary '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ny anankiray tamin’ireto Farisianina, ka mba hamandrihany an’i Jesoa no nanontaniany Azy hoe:'
  '36':
  - type: text
    content: –Mpampianatra ô, inona no didy lehibe indrindra ao amin’ny lalàna?
  '37':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –«Tiavo ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo, ary amin’ny sainao manontolo
  - type: note
    content: Deot 6.5.
  - type: text
    content: '.» '
  '38':
  - type: text
    content: 'Izany no didy lehibe indrindra sady voalohany. '
  '39':
  - type: text
    content: 'Ary ny faharoa, izay tahaka ny voalohany ihany, dia izao: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: note
    content: Lev 19.18.
  - type: text
    content: '.» '
  '4':
  - type: text
    content: 'Dia mpiasa hafa indray no nirahiny sady nataony hoe: «Izao lazaina amin’ireo olona nasaina: Indro ny sakafo efa voaomako, ny ombiko sy ny biby nafahy efa voavono ary ny zavatra rehetra efa vonona; koa tongava amin’ny fanasambe.» '
  '40':
  - type: text
    content: 'Ireo didy anankiroa ireo no ifaharan’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy manontolo sy ny fampianaran’ny '
  - type: text
    content: mpaminany
  - type: text
    content: .
  - type: heading
    content: Fanontaniana ny amin’ny hoe Zanak’i Davida
  - type: heading
    content: (Jereo Mk 12.35-37; Lk 20.41-44)
  '41':
  - type: text
    content: 'Raha mbola vory teo iny kosa ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia nanontany azy ireo i Jesoa '
  '42':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: '–Ahoana no hevitrareo ny amin’ny '
  - type: text
    content: Mesia
  - type: text
    content: ', Zanak’iza moa Izy?'
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: '– '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: '!'
  '43':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Nahoana àry i Davida, rehefa nohazavain’ny Fanahy Masina, no miantso ny Mesia hoe: «Tompoko»? Fa izao no tenin’i Davida:'
  '44':
  - type: text
    content: «Ny Tompo Andriamanitra dia niteny hentitra
  - type: text
    content: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: text
    content: Mipetraha amin’ny sezafiandrianana eto ankavanako;
  - type: text
    content: Izaho kosa hanao ny fahavalonao
  - type: text
    content: ho fitoeran-tongotrao
  - type: note
    content: Sal 110.1.
  - type: text
    content: '!»'
  '45':
  - type: text
    content: Koa raha i Davida àry miantso ny Mesia hoe «Tompoko», ahoana no maha Zanany Azy?
  '46':
  - type: text
    content: Dia tsy nisy nahavaly an’i Jesoa na dia teny iray akory aza ry zareo; ary nanomboka hatramin’io andro io dia tsy nisy sahy nanontany Azy intsony.
  '5':
  - type: text
    content: 'Kanjo tsy nahoan’ireo nasaina izany, fa samy lasa nandeha izy rehetra, ny anankiray any amin’ny saha voleny, ary ny anankiray any amin’ny varotra karakarainy; '
  '6':
  - type: text
    content: 'ary ny sasany dia nisambotra ireo mpiasa ka nisetrasetra taminy sy namono azy. '
  '7':
  - type: text
    content: 'Tezitra kosa ilay mpanjaka, hany ka nandefa miaramila handringana ireo mpamono olona ireo sy handoro ny tanànany. '
  '8':
  - type: text
    content: 'Ary hoy izy tamin’ny mpiasany: «Efa voaomana ny fanasambe, saingy ireo nasaina no tsy mendrika. '
  '9':
  - type: text
    content: 'Koa mankanesa any amin’ny fihaonan-dalana, ary izay hitanareo dia asao avokoa ho atỳ amin’ny fanasambe.» '
