      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia tsy nisy nahavaly an’i Jesoa na dia teny iray akory aza ry zareo; ary nanomboka hatramin’io andro io dia tsy nisy sahy nanontany Azy intsony.
