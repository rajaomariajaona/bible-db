  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Koa raha i Davida àry miantso ny Mesia hoe «Tompoko», ahoana no maha Zanany Azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
