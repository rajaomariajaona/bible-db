document_id: GEN.38,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Joda sy i Tamara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany fotoana izany dia niala teo amin’ny rahalahiny i Joda ka nidina tany Hadolama, ho any amin’ny lehilahy atao hoe Hirà. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hita fa ratsy teo imason’ny Tompo izay nataon’i Onàna, ka nampamonoin’ny TOMPO ho faty koa izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Joda tamin’i Tamara vinantovaviny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitoera ho mpitondratena any an-tranon’ny rainao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany no fitsipika mifehy ny vehivavy maty vady tsy manan-janaka.
      marker-yv: yv-n
    - type: text
      text: ' aloha mandra-pahalehiben’i Selà zanako lahy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Joda anakampony hoe: «Sao dia ho faty toy ny rahalahiny eo koa i Selà.» Dia lasa i Tamara nonina tany an-tranon-drainy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka elaela, dia maty ihany koa ny vadin’i Joda izany hoe ilay zanakavavin’i Sohà. Ary rehefa afa-tsaona i Joda, dia niakatra ho any Timnà niaraka tamin’i Hirà izay Hadolamita sakaizany mba hijery ireo mpanety ny ondriny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa ren’i Tamara fa nankany Timnà ny rafozany mba hanety ny ondriny, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanaisotra ireo fitafiany maha mpitondratena azy ravehivavy ka nisarona fisalobonana tsy hamantarana azy, ary nandeha nipetraka teo am-bavahadin’i Henaîma, amin’ny lalana mankany Timnà. Hitan’i Tamara manko fa efa lehibe i Selà, kanefa tsy nomena ho vadiny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitan’i Joda i Tamara ka noheveriny ho mpivarotena, satria nanaron-tava ravehivavy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahafantatra azy ho vinantovaviny i Joda, ka dia nivily nanatona azy teo amoron-dalana sy nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avelao mba handry aminao aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navaliny azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona anefa no homenao ahy amin’izany?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Joda hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Handefasako zanak’osy avy amin’ny andian’ondry aman’osiko ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, raha omenao antoka aho mandra-pandefanao ny zanak’osy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Joda hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona àry no antoka homeko anao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tombokasenao
    - type: text
      text: ' sy ny tadiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tombokase manokana an’olona tsirairay matetika dia mifatotra amin’ny tady ary iambozonan’ny tompony.
      marker-yv: yv-n
    - type: text
      text: ' ary iny tehinao eny an-tananao iny.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomen’i Joda azy tokoa ireny, ka nandeha nandry tamin’i Tamara izy; ary nitoe-jaza ravehivavy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy teo dia niainga i Tamara, ka nandeha nody; nesoriny ny fisalobonana, dia nanaovany indray ny fitafiana maha mpitondratena azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany no nahitan’i Joda ny zanakavavin’i Sohà lehilahy kanahanita, ka nalainy ho vady. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nirahin’i Joda ilay Hadolamita sakaizany mba hitondra ny zanak’osy ho any amin’ilay ramatoa sady haka ny tombokase; kanefa tsy nahita azy ralehilahy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanontany ny olona tao Henaîma hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza ilay vehivavy mpivarotena tamoron-dàlana teto iny?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’ireo azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mbola nisy vehivavy mpivarotena izany mihitsy teo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niverina tany amin’i Joda ilay sakaizany ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hitako ilay ramatoa; ary ny olona tao an-toerana aza dia nanamafy tamiko fa tsy mbola nisy vehivavy mpivarotena izany mihitsy teo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Joda:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka ho lasany any ireny zavatra ireny, sao afa-baràka eo isika! Indro aho efa nampanatitra ny zanak’osy, nefa tsy hitanao ilay ramatoa.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka telo volana, dia nisy nitantara tamin’i Joda hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nivaro-tena i Tamara vinantovavinao, ka indro bevohòka izy!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny baikon’i Joda hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avoahy izy hodorana velona.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha iny mbola navoaka ny trano iny ilay ramatoa, dia nampaniraka ho any amin’ny rafozan-dahiny izy hilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay lehilahy tompon’ireto zavatra ireto no nahabevohòka ahy. Koa fantaro izay tompon’ireto fitombokase sy tady ary tehina ireto?
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatr’i Joda ireo zavatra ireo ka hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Marina kokoa noho izaho i Tamara, satria tokony ho nomeko ho vadiny i Selà zanako lahy kanefa tsy nataoko izany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy nandry tamin’i Tamara intsony i Joda.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga ny andro hiterahan’i Tamara, dia indreo zaza kambana no tao an-kibony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo am-piterahana, dia niseho ny sandrin’ny zaza iray ka nosamborin’ny mpampivelona sady nofatorany kofehy mena fa hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity zaza ity no teraka voalohany.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nahemotr’ilay zaza ny sandriny, dia indro ny rahalahiny indray no tafavoaka, ka hoy ny mpampivelona hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana izao fibosesika nafitsokao izao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nataon’i Joda hoe Peretsa na Fibosesika ny anarany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitoe-jaza ilay ramatoa ka niteraka zazalahy, izay nantsoin’i Joda hoe Hera. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia teraka indray ilay zaza misy kofehy mena tamin’ny sandriny ka nataon’i Joda hoe Zera na Fiposahana ny anarany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola nitoe-jaza indray ravehivavy ka niteraka zazalahy nantsoiny hoe Onàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia mbola nitoe-jaza hafa indray izy ka nantsoiny hoe Selà. Tany Keziba i Joda no niteraka an’i Selà ny vadiny.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naka vady ho an’i Hera lahimatoany i Joda, ka Tamara no anarany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ratsy fanahy teo imason’ny TOMPO i Hera ka nampamonoin’ny TOMPO ho faty. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Joda tamin’i Onàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana mankany amin’ny vady navelan’ny rahalahinao, ka alao ho vady loloha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fampiharana ny lalàna voalaza ao amin’ny Deot 25.5-6.
      marker-yv: yv-n
    - type: text
      text: ' izy mba hamelo-maso ny rahalahinao.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatr’i Onàna fa tsy ho azy ny taranaka raha misy, koa isaky ny nandry tamin’ny zaobaviny izy, dia nandraraka ny tsirinainy tamin’ny tany mba tsy hanome taranaka ho an’ny rahalahiny. '
