document_id: EZK.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona hamelezana an’i Tiro
  - type: text
    content: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro voalohan’ny volana
  - type: note
    content: 'ny taona faha-11... volana: izany hoe ny taona 587 tal J.K.. Tsy tondroin’ny RM mazava kosa anefa ny volana resahina eto.'
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: 'Ho rakotry ny vovoka indaosin’ny soavaly betsaka ianao, ary hihovitrovitra ny mandanao noho ny firodorodon’ny mpitaingin-tsoavaly sy ny fingodongodon’ny kodiaran-kalesy. Tahaka ny ibosesehana eo amin’ny manda voabanga no hidiran’ny fahavalo eo amin’ny vavahadinao. '
  '11':
  - type: text
    content: Ny kitron-tsoavaliny no hanitsakitsahany ny lalambenao rehetra; ny mponinao hovonoiny ho faty amin’ny sabatra ary ireo andrim-batonao hazerany amin’ny tany
  - type: note
    content: Ny resahina eto dia ireo andry roa izay manotrona ny fidirana ao amin’ny tempolin’ny andriamanitra sampy Melkarta, andriamanitra lohalaharana tao Tiro.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Hangalariny ireo harenao ary horobainy ireo tahirin’entanao. Harodany ny mandanao, horavany ny tranonao tsara tarehy; ka ny vato sy ny hazo ary ny ampiantany tamin’ireny kosa dia hariany any an-dranomasina. '
  '13':
  - type: text
    content: 'Hatsahatro ny tabataban-kiranao, ary tsy ho re intsony ny feon-dokanganao. '
  '14':
  - type: text
    content: Vatolampy mangadihady sisa no havelako ao aminao mba hanahazan’ny mpanarato ny haratony, ka tsy harenina intsony ny tanànanao. Izaho TOMPO no manambara; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›
  '15':
  - type: text
    content: '«Izao koa no lazain’ny Tompo ANDRIANANAHARY amin’ny tanànan’i Tiro hoe: ‹Ny mponina any amoron-tsiraka lavitra any dia hangovitra raha mandre ny firodanao sy ny tolokon’ireo naratra tamin’ny fandringanana tao anatinao. '
  '16':
  - type: text
    content: Hidina hiala amin’ny sezafiandrianany ny andriana rehetra mifehy ireo vahoaka any amoron-tsiraka any, ka hanaisotra ny fitafiany sy ireo akanjony mirenty
  - type: note
    content: Ireo fihetsika ireo dia atao ho mariky ny fisaonana, jereo Jôn 3.6; Mik 1.8.
  - type: text
    content: '. Ho raiki-tahotra sy hipetraka amin’ny tany izy ka tsy hitsaha-mangovitra, satria ory loatra noho ny manjo anao. '
  '17':
  - type: text
    content: 'Ary hihira izao hira fisaonana izao ny aminao izy hoe:'
  - type: text
    content: Indrisy! Rava tokoa ilay tanàna malaza,
  - type: text
    content: fongotra teo an-dranomasina izy.
  - type: text
    content: Nahery teo an-dranomasina izy sy ny mponiny
  - type: text
    content: ka nampihorohoro ny besinimaro.
  '18':
  - type: text
    content: Ankehitriny kosa ny mponina amoron-tsiraka
  - type: text
    content: dia mangovitra noho ny andro nirodanany;
  - type: text
    content: ary ny mponin’ny nosy any an-dranomasina
  - type: text
    content: dia varahontsana noho ny nanjavonany.›
  '19':
  - type: text
    content: '«Fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hataoko tahaka ireo tanàna rava tsy misy mponina ianao. Hampiakariko avy any amin’ny lalina ny ranobe hanafotra anao. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, nandatsa an’i Jerosalema ny mponin’i Tiro ka manao hoe: ‹Hià! Sakoa izay! Potika ilay tanàna fandalovan’ny olona rehetra! Isika indray izao no hangoron-karena satria rava i Jerosalema'
  - type: note
    content: I Tiro dia tanàna fenisianina miorina eo amin’ny nosy iray sady anisan’ireo tanàna matanjaka ara-barotra tamin’izany fotoana izany (ampit 27.3). Tany am-boalohany izy aloha dia nomba an’i Jerosalema mba hanohitra ny Babilônianina (jereo nta 21.33) avy eo vao nandao azy. Misy ampahany amin’ny entam-barotra ho any Tiro no nandalo tao Jerosalema ka ny faharavan’ity farany dia tombontsoa lehibe ho an’ny Tirianina. –Momba ny 26.2–28.9, jereo ny naoty momba ny Is 23.1.
  - type: text
    content: '!› '
  '20':
  - type: text
    content: Hampidiniko any an-davaka misy ireo maty hatrizay ianao. Hamponeniko any ambanin’ny tany tahaka ireo sisan-drava fahagola ianao miaraka amin’ireo maty talohanao. Tsy ho afa-miakatra intsony ianao, ary tsy hanan-toerana eo amin’ny tanin’ny velona intsony
  - type: note
    content: 'Tsy ho afa-miakatra intsony ianao: dkt hafa «tsy honenana intsony ianao.» –tsy hanan-toerana intsony: araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe «haveriko (ho an’ny tanin’ny velona) ny famirapiratany».'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Ho raiki-tahotra ny olona rehetra noho ny nanjo anao satria tsy ho eo intsony ianao. Hokarohina ny sisa momba anao, nefa tsy hisy hahita anao intsony na oviana na oviana; teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
  '3':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely anao Aho, ry tanànan’i Tiro. Hasaiko manafika anao ny firenena maro, ka hifanesy hiady aminao tahaka ny onjan-dranomasina. '
  '4':
  - type: text
    content: 'Horavany ny mandanao, ary harodany ny tilikambonao. Hofafako hatramin’ny vovotaninao ka vatolampy mangadihady no sisa havelako; '
  '5':
  - type: text
    content: 'dia ho toerana fanahazan’ireo mpanarato ny haratony eny afovoan-dranomasina izany. Izaho Tompo ANDRIANANAHARY no manambara; teny hentitra avy amiko izany. Fa ho avy ny firenen-kafa handroba anao, ry Tiro, '
  '6':
  - type: text
    content: sy handringana amin’ny sabatra ireo tanànakely mifanila aminao eny amoron-tsiraka eny. Amin’izay dia hoekenao fa Izaho no TOMPO.
  '7':
  - type: text
    content: '«Izao koa no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Hoentiko avy any avaratra hamely anao, ry Tiro, ny mpanjaka mahery indrindra, dia i Nebokadnetsara mpanjakan’i Babilôna. Ho avy hanafika anao izy, miaraka amin’ny soavaly sy kalesy ary mpitaingin-tsoavaly mbamin’ny miaramila betsaka navoriny. '
  '8':
  - type: text
    content: 'Haringany amin’ny sabatra ireo tanàna kely mifanila aminao eny amoron-tsiraka. Hamelezana anao dia handavaka hady sy hanangana tovon-tany ireo fahavalonao sady hampijoro rindrin’ampinga hiarovan-tena. '
  '9':
  - type: text
    content: 'Homontsaniny amin’ny kanontabe ny mandanao, ary horavany amin’ny lapika ny tilikambonao. '
