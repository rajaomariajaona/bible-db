document_id: EZK.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza mananontanona hamelezana an’i Tiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro voalohan’ny volana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny taona faha-11... volana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe ny taona 587 tal J.K.. Tsy tondroin’ny RM mazava kosa anefa ny volana resahina eto.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, nandatsa an’i Jerosalema ny mponin’i Tiro ka manao hoe: ‹Hià! Sakoa izay! Potika ilay tanàna fandalovan’ny olona rehetra! Isika indray izao no hangoron-karena satria rava i Jerosalema'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Tiro '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tanàna fenisianina miorina eo amin’ny nosy iray sady anisan’ireo tanàna matanjaka ara-barotra tamin’izany fotoana izany (ampit 27.3). Tany am-boalohany izy aloha dia nomba an’i Jerosalema mba hanohitra ny Babilônianina (jereo nta 21.33) avy eo vao nandao azy. Misy ampahany amin’ny entam-barotra ho any Tiro no nandalo tao Jerosalema ka ny faharavan’ity farany dia tombontsoa lehibe ho an’ny Tirianina. –Momba ny 26.2–28.9, jereo ny naoty momba ny Is 23.1.
    marker-yv: yv-n
  - type: text
    text: '!› '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hirotsaka hamely anao Aho, ry tanànan’i Tiro. Hasaiko manafika anao ny firenena maro, ka hifanesy hiady aminao tahaka ny onjan-dranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Horavany ny mandanao, ary harodany ny tilikambonao. Hofafako hatramin’ny vovotaninao ka vatolampy mangadihady no sisa havelako; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia ho toerana fanahazan’ireo mpanarato ny haratony eny afovoan-dranomasina izany. Izaho Tompo ANDRIANANAHARY no manambara; teny hentitra avy amiko izany. Fa ho avy ny firenen-kafa handroba anao, ry Tiro, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sy handringana amin’ny sabatra ireo tanànakely mifanila aminao eny amoron-tsiraka eny. Amin’izay dia hoekenao fa Izaho no TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Izao koa no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Hoentiko avy any avaratra hamely anao, ry Tiro, ny mpanjaka mahery indrindra, dia i Nebokadnetsara mpanjakan’i Babilôna. Ho avy hanafika anao izy, miaraka amin’ny soavaly sy kalesy ary mpitaingin-tsoavaly mbamin’ny miaramila betsaka navoriny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Haringany amin’ny sabatra ireo tanàna kely mifanila aminao eny amoron-tsiraka. Hamelezana anao dia handavaka hady sy hanangana tovon-tany ireo fahavalonao sady hampijoro rindrin’ampinga hiarovan-tena. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Homontsaniny amin’ny kanontabe ny mandanao, ary horavany amin’ny lapika ny tilikambonao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho rakotry ny vovoka indaosin’ny soavaly betsaka ianao, ary hihovitrovitra ny mandanao noho ny firodorodon’ny mpitaingin-tsoavaly sy ny fingodongodon’ny kodiaran-kalesy. Tahaka ny ibosesehana eo amin’ny manda voabanga no hidiran’ny fahavalo eo amin’ny vavahadinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny kitron-tsoavaliny no hanitsakitsahany ny lalambenao rehetra; ny mponinao hovonoiny ho faty amin’ny sabatra ary ireo andrim-batonao hazerany amin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny resahina eto dia ireo andry roa izay manotrona ny fidirana ao amin’ny tempolin’ny andriamanitra sampy Melkarta, andriamanitra lohalaharana tao Tiro.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hangalariny ireo harenao ary horobainy ireo tahirin’entanao. Harodany ny mandanao, horavany ny tranonao tsara tarehy; ka ny vato sy ny hazo ary ny ampiantany tamin’ireny kosa dia hariany any an-dranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hatsahatro ny tabataban-kiranao, ary tsy ho re intsony ny feon-dokanganao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vatolampy mangadihady sisa no havelako ao aminao mba hanahazan’ny mpanarato ny haratony, ka tsy harenina intsony ny tanànanao. Izaho TOMPO no manambara; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Izao koa no lazain’ny Tompo ANDRIANANAHARY amin’ny tanànan’i Tiro hoe: ‹Ny mponina any amoron-tsiraka lavitra any dia hangovitra raha mandre ny firodanao sy ny tolokon’ireo naratra tamin’ny fandringanana tao anatinao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hidina hiala amin’ny sezafiandrianany ny andriana rehetra mifehy ireo vahoaka any amoron-tsiraka any, ka hanaisotra ny fitafiany sy ireo akanjony mirenty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo fihetsika ireo dia atao ho mariky ny fisaonana, jereo Jôn 3.6; Mik 1.8.
    marker-yv: yv-n
  - type: text
    text: '. Ho raiki-tahotra sy hipetraka amin’ny tany izy ka tsy hitsaha-mangovitra, satria ory loatra noho ny manjo anao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hihira izao hira fisaonana izao ny aminao izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! Rava tokoa ilay tanàna malaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fongotra teo an-dranomasina izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahery teo an-dranomasina izy sy ny mponiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nampihorohoro ny besinimaro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ankehitriny kosa ny mponina amoron-tsiraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mangovitra noho ny andro nirodanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mponin’ny nosy any an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia varahontsana noho ny nanjavonany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Hataoko tahaka ireo tanàna rava tsy misy mponina ianao. Hampiakariko avy any amin’ny lalina ny ranobe hanafotra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hampidiniko any an-davaka misy ireo maty hatrizay ianao. Hamponeniko any ambanin’ny tany tahaka ireo sisan-drava fahagola ianao miaraka amin’ireo maty talohanao. Tsy ho afa-miakatra intsony ianao, ary tsy hanan-toerana eo amin’ny tanin’ny velona intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tsy ho afa-miakatra intsony ianao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dkt hafa «tsy honenana intsony ianao.» –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: tsy hanan-toerana intsony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe «haveriko (ho an’ny tanin’ny velona) ny famirapiratany».'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ho raiki-tahotra ny olona rehetra noho ny nanjo anao satria tsy ho eo intsony ianao. Hokarohina ny sisa momba anao, nefa tsy hisy hahita anao intsony na oviana na oviana; teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
