document_id: EXO.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny didy folo
  - type: text
    content: 'Dia nanambara ireto teny rehetra ireto tamin’ny Israelita Andriamanitra ka nanao hoe:'
  '10':
  - type: text
    content: 'Fa ny andro fahafito dia sabata voatokana ho Ahy TOMPO Andriamanitrao; koa aza manao raharaha mihitsy amin’io andro io, na ianao na ny zanakao na ny mpanomponao na ny biby fiompinao na ny vahiny izay ao an-tanànanao. '
  '11':
  - type: text
    content: Fa enina andro no nanaovako ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao aminy, dia nitsahatra Aho tamin’ny andro fahafito. Izany no nahatonga Ahy TOMPO nitahy ny andro sabata sy nanokana azy ho Ahy
  - type: note
    content: 'And 8-11: jereo 16.23-30; 23.12; 31.12-17; 34.21; 35.2; Gen 2.1-3; Lev 23.3.'
  - type: text
    content: .
  '12':
  - type: text
    content: «Hajao ny rainao sy ny reninao mba ho maro andro iainana ianao eo amin’ny tany izay omen’ny TOMPO Andriamanitrao ho anao
  - type: note
    content: Jereo Deot 27.16; Mt 15.4; 19.19; Mk 7.10; 10.19; Lk 18.20; Ef 6.2-3.
  - type: text
    content: .
  '13':
  - type: text
    content: «Aza mamono olona
  - type: note
    content: Jereo Gen 9.6; Lev 24.17; Mt 5.21; 19.18; Mk 10.19; Lk 18.20; Rm 13.9; Jak 2.11.
  - type: text
    content: .
  '14':
  - type: text
    content: «Aza manitsakitsa-bady na maka vadin’olona
  - type: note
    content: Jereo Lev 20.10; Mt 5.27; 19.18; Mk 10.19; Lk 18.20; Rm 13.9; Jak 2.11.
  - type: text
    content: .
  '15':
  - type: text
    content: «Aza mangalatra
  - type: note
    content: 'mangalatra: dkt hafa maka an-keriny; amin’izay ity didy ity dia mikendry ireo fanohintohinana ny fahafahan’ny hafa, izany hoe ny fakana olona an-keriny hatao andevo (jereo 21.16). Ny fanohintohinana ny fananan’ny hafa rehetra moa dia voararan’ny and 17. –Jereo koa Lev 19.11; Mt 19.18; Mk 10.19; Lk 18.20; Rm 13.19.'
  - type: text
    content: .
  '16':
  - type: text
    content: «Aza mety ho vavolombelona mandainga hamelezana ny namanao
  - type: note
    content: Jereo 23.1; Mt 19.18; Mk 10.19; Lk 18.20.
  - type: text
    content: .
  '17':
  - type: text
    content: «Aza mitsiriritra izay rehetra an’ny namanao, na ny tranony, na ny vadiny na ny mpanompony, na ny ombiny na ny borikiny
  - type: note
    content: Jereo Rm 7.7; 13.9.
  - type: text
    content: .»
  '18':
  - type: text
    content: 'Samy nandre ny kotro-baratra sy ny feon’ny anjomara ny Israelita rehetra ary samy nahita ny tsela-baratra sy ny tendrombohitra nidona-tsetroka, hany ka nangovitra noho ny tahotra ary nihataka teny lavitra teny. '
  '19':
  - type: text
    content: 'Hoy ireo tamin’i Mosesy:'
  - type: text
    content: –Ianao ihany no mitenena aminay dia hohenoinay fa aoka tsy hiteny aminay mivantana Andriamanitra, fandrao maty izahay
  - type: note
    content: 'And 18-19: jereo Heb 12.18-19.'
  - type: text
    content: .
  '2':
  - type: text
    content: –Izaho no TOMPO Andriamanitrao, Izay namoaka anao hiala tany Ejipta, toera-nanandevozana anao.
  '20':
  - type: text
    content: 'Namaly azy ireo i Mosesy hoe:'
  - type: text
    content: –Aza matahotra! Raha nanatona anareo Andriamanitra, dia ny mba hizaha toetra anareo; tiany hisy eo aminareo ny fanajana Azy mba tsy hanotanareo.
  '21':
  - type: text
    content: Dia nijanona teny lavitra teny ny Israelita, fa i Mosesy kosa nanatona ny rahona matevina izay nisy an’Andriamanitra
  - type: note
    content: 'rahona matevina: fomba fiteny hafa hanehoana ny andry rahona (jereo 13.21 sy nta).'
  - type: text
    content: .
  - type: heading
    content: Lalàna momba ny alitara fanaovan-tsorona
  '22':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Izao no holazainao amin’ny Israelita: «Ianareo mihitsy no nahita fa avy any an-danitra Aho no niteny taminareo. '
  '23':
  - type: text
    content: 'Koa aza ataonareo ho toy ny andriamani-bolafotsy na volamena Aho, ary aza manamboatra ireny ho anareo. '
  '24':
  - type: text
    content: Alitara
  - type: text
    content: ' tany no hataonareo ho Ahy, ary eo amboniny no hanoloranareo ho Ahy ny ondry aman’osinareo sy ny ombinareo ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy ho sorom-pihavanana. Ary Izaho dia ho tonga '
  - type: text
    content: hitahy
  - type: text
    content: ' anareo amin’ny toerana rehetra izay anehoako ny fanatrehako. '
  '25':
  - type: text
    content: Fa raha hanao alitara vato ho Ahy ianareo, dia aza atao amin’ny vato voapaika; satria raha mipaika azy amin’ny fandraka ianareo, dia handoto azy
  - type: note
    content: Jereo Deot 27.5-6; Jos 8.31. –Ny zavatra tefen’ny olona dia ahitana ny mariky ny tenany manokana amin’ny fampiasana ireo fitaovana ananany; koa ireo zavatra mijanona araka izay naharian’Andriamanitra azy ihany, izany hoe tsy mbola nokasihina fa ara-boajanahary, no azo ampiasaina amin’ny fanompoana an’Andriamanitra (ampit Deot 21.3-4).
  - type: text
    content: '. '
  '26':
  - type: text
    content: Aza asiana tohatohatra hiakaranareo ho eo amin’ny alitarako mba tsy hiseho ny fitanjahanareo
  - type: note
    content: Tany am-piandohana dia tsy nitondra afa-tsy sikina nahodidina ny tehezany ny mpisorona israelita mandritra ny fanaovana ny asany teo amin’ny alitara.
  - type: text
    content: .»
  '3':
  - type: text
    content: «Aza manana andriamani-kafa ianao, fa Izaho ihany.
  '4':
  - type: text
    content: '«Aza manao sarin-tsampy voasokitra ho anao, ampisehoanao endri-javatra izay eny amin’ny habakabaka ambony, na izay etỳ amin’ny tany ambany, na izay ao amin’ny rano ambanin’ny tany. '
  '5':
  - type: text
    content: Aza miankohoka eo anatrehan’ireny sampy ireny ary aza manompo azy
  - type: note
    content: 'And 4-5: jereo 34.17; Lev 19.4; 26.1; Deot 4.15-18; 27.15.'
  - type: text
    content: ', satria Izaho TOMPO Andriamanitrao dia saro-piaro amin’ny maha Andriamanitra Ahy. Raha misy olona meloka amin’izany ka mankahala Ahy, dia hofaiziko izy sy ny taranany hatramin’ny zafiafy sy ny zafindohalika; '
  '6':
  - type: text
    content: nefa kosa izay tia Ahy ka mitandrina ny didiko, dia hanehoako famindrampo hatramin’ny taranaka faharivo
  - type: note
    content: 'nefa... hatramin’ny taranaka faharivo na nefa kosa olona an’arivo, dia izay rehetra tia Ahy ka mitandrina ny didiko, no hanehoako famindrampo. –And 5-6: jereo 34.6-7; Nom 14.18; Deot 7.9-10.'
  - type: text
    content: .
  '7':
  - type: text
    content: «Aza manonom-poana ny anarako ianao fa Izaho TOMPO Andriamanitrao dia mitana ho meloka izay manao toy izany
  - type: note
    content: Jereo Lev 19.12.
  - type: text
    content: .
  '8':
  - type: text
    content: '«Tsarovy ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' mba hanokananao azy ho Ahy. '
  '9':
  - type: text
    content: 'Enina andro no hiasanao sy hanaovanao ny raharahanao rehetra. '
