document_id: 2CH.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanainga ny vahoaka hankalaza ny Paska i Hezekià
  - type: text
    content: 'Ny mpanjaka Hezekià sy ny manampahefana ary ny mpiangona rehetra tao Jerosalema dia niara-nandinika momba ny tokony hankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' amin’ny volana faharoa'
  - type: note
    content: Jereo Nom 9.1-13.
  - type: text
    content: . Tsy nisy nahafahana nankalaza izany tamin’ny vaninandro manandrify
  - type: note
    content: Izany hoe mandritra ny volana voalohany amin’ny taona, jereo Eks 12.1-11.
  - type: text
    content: ', satria tsy mbola ampy isa ireo '
  - type: text
    content: mpisorona
  - type: text
    content: ' nahavita ny '
  - type: text
    content: fidiovan-tenany
  - type: text
    content: '; ary ny vahoaka koa tsy mbola vory tao Jerosalema. Sitraky ny mpanjaka sy ny mpiangona rehetra izany eritreritra izany; ka tapaka ny hevitra fa handefasan-teny eran’i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo hatrany Beera-Seba ka hatrany Dana mba hahatongavan’ny olona hankalaza ny Paska ao Jerosalema ho fanajana ny TOMPO Andriamanitr’i Israely. Vitsy manko ny olona nankalaza izany araka ny voasoratra. Dia nandefasan’i Hezekià iraka ny faritra rehetra amin’i Israely avaratra sy i Joda mba hanainga ny olona ho tonga ao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' any Jerosalema ka hankalaza ny Paska ho fanajana ny TOMPO Andriamanitr’i Israely; nanoratra taratasy fanasana mihitsy aza i Hezekià ho an’ny foko efraimita sy manasita. '
  '10':
  - type: text
    content: 'Dia notetezin’ireto iraka faingam-pandeha ny tanàna amin’ny faritra efraimita sy manasita ka hatrany amin’ny faritra zebolonita; fa nihomehezan’ny olona sy novazivaziny foana ireo. '
  '11':
  - type: text
    content: 'Kanefa tamin’ny foko aserita sy manasita ary zebolonita dia nisy ihany olona vitsivitsy mba resy lahatra ka tonga tany Jerosalema. '
  '12':
  - type: text
    content: Ny fahefàn’Andriamanitra kosa dia niasa tamin’ny Jodeanina ka nampiray fo azy hankatò ny didin’ny mpanjaka sy ny manampahefana, araka ny tenin’ny TOMPO.
  - type: heading
    content: Fankalazana ny fetin’ny Paska
  '13':
  - type: text
    content: 'Tamin’ny volana faharoa dia nisy vahoaka marobe tafavory tao Jerosalema mba hankalaza ny fety fihinanana ny '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: '. Fiangonana goavana tokoa izany. '
  '14':
  - type: text
    content: 'Dia nirotsaka nandrava ireo '
  - type: text
    content: alitara
  - type: text
    content: ' fanompoan-tsampy tao Jerosalema ny olona; noravany koa ireo alitara fandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ka nariany tany amin’ny lohasahan-driaka Kidrôna. '
  '15':
  - type: text
    content: 'Nony andro faha-14 tamin’ny volana faharoa dia novonoina ny biby fanao sorona amin’ny '
  - type: text
    content: Paska
  - type: text
    content: '. Azon-kenatra ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ', ka '
  - type: text
    content: nidio
  - type: text
    content: ' tena mba ho afa-kampiditra ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho ao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Samy naka toerana toy ny mahazatra izy, araka ny lalànan’i Mosesy olon’Andriamanitra; ary nararaky ny mpisorona teo ambony alitara ny ra izay natolotry ny levita azy. '
  '17':
  - type: text
    content: 'Nisy maro manko tamin’ny vahoaka tafangona no tsy mbola nidio tena; dia ny levita no nampamonoina ny biby fanolotra amin’ny Paska ka nisolo izay rehetra tsy madio mba hampisy hasina ny sorony amin’ny TOMPO. '
  '18':
  - type: text
    content: 'Ny ankamaroan’ny olona, indrindra fa ireo anisan’ny foko efraimita sy manasita ary jisakarita sy zebolonita, no tsy nidio tena, kanefa nihinana ny sakafo Paska ihany, na dia tsy araka izay voasoratra aza. Saingy nivavaka ho an’ireny i Hezekià ka nanao hoe: «TOMPO tsara fo ô, mba mamelà '
  '19':
  - type: text
    content: 'izay olona efa nanomana ny fony manontolo hitady Anao TOMPO Andriamanitry ny razany, na dia tsy madio araka izay takîn’izao zava-masina izao aza izy.» '
  '20':
  - type: text
    content: Ary nohenoin’ny TOMPO i Hezekià ka navelany heloka ny vahoaka.
  '21':
  - type: text
    content: 'Ny Israelita izay tao Jerosalema dia nankalaza tamin-kafaliana lehibe nandritra ny herinandro izany fetin’ny mofo tsy misy leviora izany; isan’andro ny levita sy ny mpisorona no nidera ny TOMPO nombàn’ny zava-maneno mafy feo mba ho fanajana AZY. '
  '22':
  - type: text
    content: 'Ary ny teny nataon’i Hezekià dia nanohina ny fon’ireo levita rehetra izay feno fahazotoana tokoa ho an’ny TOMPO. Nihinana ny sakafo Paska nandritra ny herinandro ny olona ka sady nanolotra sorom-pihavanana no nisaotra ny TOMPO Andriamanitry ny razany. '
  '23':
  - type: text
    content: 'Ny vahoaka rehetra tafangona teo dia niombon-kevitra ny amin’ny mbola hanohizana herinandro indray ny fankalazana; ka dia nataony tamin-kafaliana koa izany, '
  '24':
  - type: text
    content: 'satria i Hezekià mpanjakan’i Joda dia nanome ombilahy arivo sy ondry aman’osy fito arivo, ary ny manampahefana koa nanome ombilahy arivo sy ondry aman’osy 10 000 ho an’ny olona. Ankoatra izany, maro ny mpisorona no nanao fidiovan-tena. '
  '25':
  - type: text
    content: 'Faly ny besinimaro niangona teo; dia ny Jodeanina sy ny mpisorona mbamin’ny levita ary koa izay rehetra anisan’ny Israelita tavaratra na ireo nivahiny ho an’ny fety na ireo nonina tao Joda. '
  '26':
  - type: text
    content: 'Fifaliana goavana no tao Jerosalema; fa hatramin’ny andron’i Salômôna, zanakalahin’i Davida sady mpanjakan’i Israely, dia tsy mbola nisy tahaka izany tao an-tanàna. '
  '27':
  - type: text
    content: Nony farany, nitsangana ny levita mpisorona
  - type: note
    content: 'levita mpisorona: jereo Deot 17.9 sy nta.'
  - type: text
    content: ' ka '
  - type: text
    content: nitsodrano
  - type: text
    content: ' ny vahoaka; ary nohenoin’Andriamanitra ny tonombavak’ireo satria tafapaka tany an-'
  - type: text
    content: danitra
  - type: text
    content: ' izay fonena-masiny.'
  '6':
  - type: text
    content: 'Dia lasa ireto iraka haingam-pandeha nitety ny faritra rehetra amin’i Israely sy i Joda, ombàn’ny taratasy avy tamin’ny mpanjaka sy ny manampahefana; araka ny didin’ny mpanjaka, dia izao no teny nolazainy:'
  - type: text
    content: '–Ianareo Israelita izay sisa tavela tamin’ny famelezan’ireo mpanjakan’i Asiria, miverena amin’ny TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba. '
  '7':
  - type: text
    content: 'Aza manahaka ny ray aman-dreninareo sy mpiray tampo aminareo, fa nivadika tamin’ny TOMPO Andriamanitry ny razany izy ireo ka dia natolony ho amin’ny faharavana araka izao hitanareo izao. '
  '8':
  - type: text
    content: 'Koa aza manamafy hatoka toy ny nataon’ny razanareo ianareo, fa manomeza toky hanompo ny TOMPO ka tongava ao amin’ny '
  - type: text
    content: tempoliny
  - type: text
    content: ' izay efa natokany hanan-kasina mandrakizay; eny, manompoa ny TOMPO Andriamanitrareo mba hialan’ny fahatezerany mirehitra aminareo. '
  '9':
  - type: text
    content: Fa raha miverina amin’ny TOMPO ianareo, dia hahazo famindrampo ireo mpiray firenena sy mpiray fianakaviana aminareo eo anatrehan’izay nitondra azy ho babo, ka dia ho tafaverina indray amin’ity tany ity. Miantra sy mamindrafo tokoa manko ny TOMPO Andriamanitrareo, ka tsy hiambohoany ianareo raha miverina aminy.
