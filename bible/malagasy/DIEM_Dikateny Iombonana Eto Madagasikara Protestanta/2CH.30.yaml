document_id: 2CH.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanainga ny vahoaka hankalaza ny Paska i Hezekià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'Ny mpanjaka Hezekià sy ny manampahefana ary ny mpiangona rehetra tao Jerosalema dia niara-nandinika momba ny tokony hankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' amin’ny volana faharoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 9.1-13.
    marker-yv: yv-n
  - type: text
    text: . Tsy nisy nahafahana nankalaza izany tamin’ny vaninandro manandrify
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe mandritra ny volana voalohany amin’ny taona, jereo Eks 12.1-11.
    marker-yv: yv-n
  - type: text
    text: ', satria tsy mbola ampy isa ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' nahavita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fidiovan-tenany
  - type: text
    text: '; ary ny vahoaka koa tsy mbola vory tao Jerosalema. Sitraky ny mpanjaka sy ny mpiangona rehetra izany eritreritra izany; ka tapaka ny hevitra fa handefasan-teny eran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo hatrany Beera-Seba ka hatrany Dana mba hahatongavan’ny olona hankalaza ny Paska ao Jerosalema ho fanajana ny TOMPO Andriamanitr’i Israely. Vitsy manko ny olona nankalaza izany araka ny voasoratra. Dia nandefasan’i Hezekià iraka ny faritra rehetra amin’i Israely avaratra sy i Joda mba hanainga ny olona ho tonga ao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' any Jerosalema ka hankalaza ny Paska ho fanajana ny TOMPO Andriamanitr’i Israely; nanoratra taratasy fanasana mihitsy aza i Hezekià ho an’ny foko efraimita sy manasita. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia lasa ireto iraka haingam-pandeha nitety ny faritra rehetra amin’i Israely sy i Joda, ombàn’ny taratasy avy tamin’ny mpanjaka sy ny manampahefana; araka ny didin’ny mpanjaka, dia izao no teny nolazainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo Israelita izay sisa tavela tamin’ny famelezan’ireo mpanjakan’i Asiria, miverena amin’ny TOMPO Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza manahaka ny ray aman-dreninareo sy mpiray tampo aminareo, fa nivadika tamin’ny TOMPO Andriamanitry ny razany izy ireo ka dia natolony ho amin’ny faharavana araka izao hitanareo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa aza manamafy hatoka toy ny nataon’ny razanareo ianareo, fa manomeza toky hanompo ny TOMPO ka tongava ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliny
  - type: text
    text: ' izay efa natokany hanan-kasina mandrakizay; eny, manompoa ny TOMPO Andriamanitrareo mba hialan’ny fahatezerany mirehitra aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha miverina amin’ny TOMPO ianareo, dia hahazo famindrampo ireo mpiray firenena sy mpiray fianakaviana aminareo eo anatrehan’izay nitondra azy ho babo, ka dia ho tafaverina indray amin’ity tany ity. Miantra sy mamindrafo tokoa manko ny TOMPO Andriamanitrareo, ka tsy hiambohoany ianareo raha miverina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia notetezin’ireto iraka faingam-pandeha ny tanàna amin’ny faritra efraimita sy manasita ka hatrany amin’ny faritra zebolonita; fa nihomehezan’ny olona sy novazivaziny foana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa tamin’ny foko aserita sy manasita ary zebolonita dia nisy ihany olona vitsivitsy mba resy lahatra ka tonga tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fahefàn’Andriamanitra kosa dia niasa tamin’ny Jodeanina ka nampiray fo azy hankatò ny didin’ny mpanjaka sy ny manampahefana, araka ny tenin’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fankalazana ny fetin’ny Paska
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tamin’ny volana faharoa dia nisy vahoaka marobe tafavory tao Jerosalema mba hankalaza ny fety fihinanana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mofo tsy misy leviora
  - type: text
    text: '. Fiangonana goavana tokoa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nirotsaka nandrava ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fanompoan-tsampy tao Jerosalema ny olona; noravany koa ireo alitara fandoroana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' ka nariany tany amin’ny lohasahan-driaka Kidrôna. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony andro faha-14 tamin’ny volana faharoa dia novonoina ny biby fanao sorona amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. Azon-kenatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ', ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nidio
  - type: text
    text: ' tena mba ho afa-kampiditra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho ao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Samy naka toerana toy ny mahazatra izy, araka ny lalànan’i Mosesy olon’Andriamanitra; ary nararaky ny mpisorona teo ambony alitara ny ra izay natolotry ny levita azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nisy maro manko tamin’ny vahoaka tafangona no tsy mbola nidio tena; dia ny levita no nampamonoina ny biby fanolotra amin’ny Paska ka nisolo izay rehetra tsy madio mba hampisy hasina ny sorony amin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny ankamaroan’ny olona, indrindra fa ireo anisan’ny foko efraimita sy manasita ary jisakarita sy zebolonita, no tsy nidio tena, kanefa nihinana ny sakafo Paska ihany, na dia tsy araka izay voasoratra aza. Saingy nivavaka ho an’ireny i Hezekià ka nanao hoe: «TOMPO tsara fo ô, mba mamelà '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'izay olona efa nanomana ny fony manontolo hitady Anao TOMPO Andriamanitry ny razany, na dia tsy madio araka izay takîn’izao zava-masina izao aza izy.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nohenoin’ny TOMPO i Hezekià ka navelany heloka ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny Israelita izay tao Jerosalema dia nankalaza tamin-kafaliana lehibe nandritra ny herinandro izany fetin’ny mofo tsy misy leviora izany; isan’andro ny levita sy ny mpisorona no nidera ny TOMPO nombàn’ny zava-maneno mafy feo mba ho fanajana AZY. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny teny nataon’i Hezekià dia nanohina ny fon’ireo levita rehetra izay feno fahazotoana tokoa ho an’ny TOMPO. Nihinana ny sakafo Paska nandritra ny herinandro ny olona ka sady nanolotra sorom-pihavanana no nisaotra ny TOMPO Andriamanitry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny vahoaka rehetra tafangona teo dia niombon-kevitra ny amin’ny mbola hanohizana herinandro indray ny fankalazana; ka dia nataony tamin-kafaliana koa izany, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'satria i Hezekià mpanjakan’i Joda dia nanome ombilahy arivo sy ondry aman’osy fito arivo, ary ny manampahefana koa nanome ombilahy arivo sy ondry aman’osy 10 000 ho an’ny olona. Ankoatra izany, maro ny mpisorona no nanao fidiovan-tena. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Faly ny besinimaro niangona teo; dia ny Jodeanina sy ny mpisorona mbamin’ny levita ary koa izay rehetra anisan’ny Israelita tavaratra na ireo nivahiny ho an’ny fety na ireo nonina tao Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fifaliana goavana no tao Jerosalema; fa hatramin’ny andron’i Salômôna, zanakalahin’i Davida sady mpanjakan’i Israely, dia tsy mbola nisy tahaka izany tao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nony farany, nitsangana ny levita mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'levita mpisorona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 17.9 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nitsodrano
  - type: text
    text: ' ny vahoaka; ary nohenoin’Andriamanitra ny tonombavak’ireo satria tafapaka tany an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' izay fonena-masiny.'
