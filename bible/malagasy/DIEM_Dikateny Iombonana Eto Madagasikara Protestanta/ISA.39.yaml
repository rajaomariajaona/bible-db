document_id: ISA.39,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nandray ny masoivohon’i Babilona i Hezekià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fotoana izany i Merôdaky-Baladàna, zanakalahin’i Baladàna sady mpanjakan’i Babilôna, no nandre fa narary i Hezekià ary efa sitrana. Dia nandefa iraka hitondra taratasy sy fanomezana ho azy izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 20.12 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary faly i Hezekià tamin’ny fahatongavan’ireto iraka; dia nasehony azy ny trano fitahirizana zava-tsoa, dia volafotsy sy volamena ary zava-manitra sy menaka mamerovero; nasehony azy koa ny trano fitobian’ny fitaovam-piadiana rehetra mbamin’ny zavatra hafa isan-karazany tao amin’ny fitoeran-drakiny. Tsy nisy zavatra nafeniny azy na ny tao an-dapany na ny tao amin’ny fanjakany manontolo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany dia nankany amin’i Hezekià mpanjaka i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no nolazain’ireny olona ireny? Avy aiza hono izy no nankatỳ aminao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Hezekià hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy any Babilôna lavitra any izy no nankatỳ amiko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy indray i Isaià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona avy anefa no hitany tato an-dapanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Hezekià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay rehetra ato an-dapako dia hitany avokoa. Tsy nisy zavatra nafeniko azy ny tao amin’ny fitoeran-drakitro manontolo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Isaià tamin’i Hezekià: «Henoy ny tenin’ny TOMPOn’izao rehetra izao: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ho avy ny andro hitondrana any Babilôna izay rehetra ato an-dapanao sy izay rehetra nangonin’ireo razanao hatramin’izao. Tsy hisy tavela eto na inona na inona, hoy Izaho TOMPO. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na dia ny sasany amin’ireo taranakao aza dia hoentina any koa ho mpanompo hanao raharaha ao an-dapan’ny mpanjakan’i Babilôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Dan 1.1-7; 2 Mp 24.10-16; 2 Tan 36.10.
      marker-yv: yv-n
    - type: text
      text: ».
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Hezekià tamin’i Isaià: «Tsara ny tenin’ny TOMPO izay nambaranao.» Fa hoy izy manko anakampo hoe: «Hisy fiadanana sy fandriampahalemana izany amin’ny androko.»'
