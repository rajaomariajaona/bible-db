document_id: ISA.39,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nandray ny masoivohon’i Babilona i Hezekià
  - type: text
    content: Tamin’izany fotoana izany i Merôdaky-Baladàna, zanakalahin’i Baladàna sady mpanjakan’i Babilôna, no nandre fa narary i Hezekià ary efa sitrana. Dia nandefa iraka hitondra taratasy sy fanomezana ho azy izy
  - type: note
    content: Jereo 2 Mp 20.12 sy nta.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Ary faly i Hezekià tamin’ny fahatongavan’ireto iraka; dia nasehony azy ny trano fitahirizana zava-tsoa, dia volafotsy sy volamena ary zava-manitra sy menaka mamerovero; nasehony azy koa ny trano fitobian’ny fitaovam-piadiana rehetra mbamin’ny zavatra hafa isan-karazany tao amin’ny fitoeran-drakiny. Tsy nisy zavatra nafeniny azy na ny tao an-dapany na ny tao amin’ny fanjakany manontolo.
  '3':
  - type: text
    content: 'Taorian’izany dia nankany amin’i Hezekià mpanjaka i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ka nanontany azy hoe:'
  - type: text
    content: –Inona no nolazain’ireny olona ireny? Avy aiza hono izy no nankatỳ aminao?
  - type: text
    content: 'Dia novalian’i Hezekià hoe:'
  - type: text
    content: –Avy any Babilôna lavitra any izy no nankatỳ amiko.
  '4':
  - type: text
    content: 'Ka hoy indray i Isaià:'
  - type: text
    content: –Inona avy anefa no hitany tato an-dapanao?
  - type: text
    content: 'Dia hoy ny navalin’i Hezekià:'
  - type: text
    content: –Izay rehetra ato an-dapako dia hitany avokoa. Tsy nisy zavatra nafeniko azy ny tao amin’ny fitoeran-drakitro manontolo.
  '5':
  - type: text
    content: 'Dia hoy i Isaià tamin’i Hezekià: «Henoy ny tenin’ny TOMPOn’izao rehetra izao: '
  '6':
  - type: text
    content: 'Indro ho avy ny andro hitondrana any Babilôna izay rehetra ato an-dapanao sy izay rehetra nangonin’ireo razanao hatramin’izao. Tsy hisy tavela eto na inona na inona, hoy Izaho TOMPO. '
  '7':
  - type: text
    content: Ary na dia ny sasany amin’ireo taranakao aza dia hoentina any koa ho mpanompo hanao raharaha ao an-dapan’ny mpanjakan’i Babilôna
  - type: note
    content: Ampit Dan 1.1-7; 2 Mp 24.10-16; 2 Tan 36.10.
  - type: text
    content: ».
  '8':
  - type: text
    content: 'Ary hoy i Hezekià tamin’i Isaià: «Tsara ny tenin’ny TOMPO izay nambaranao.» Fa hoy izy manko anakampo hoe: «Hisy fiadanana sy fandriampahalemana izany amin’ny androko.»'
