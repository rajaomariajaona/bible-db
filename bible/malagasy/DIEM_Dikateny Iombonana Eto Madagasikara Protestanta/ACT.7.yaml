    - type: usfm
      marker: it
      children:
      - type: text
        text: zazalahy tena tsara tarehy tokoa.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Eks 2.2.'
    marker-yv: yv-n
  - type: text
    text: '. Notezaina telo volana tao an-tranon-drainy izy; '
  - type: usfm
