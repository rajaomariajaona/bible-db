  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa nony voatery nariana, dia nalain’ny zanakavavin’ny Farao ka nobeaziny toy ny zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
