    children:
    - type: text
      text: famorana
  - type: text
    text: ' no famantarana izany. Dia izany no namoran’i Abrahama an’i Itsehàka zanany rehefa niherina ny andro niterahany azy, sy namoran’i Itsehàka an’i Jakôba, ary namoran’i Jakôba an’ireo razambe 12 mirahalahy'
