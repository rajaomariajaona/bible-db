  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo rahalahy sy ianareo ray aman-dreny, henoy aho. Ilay Andriamanitra be voninahitra dia niseho tamin’i Abrahama razantsika fony izy tany Mezôpôtamia fa mbola tsy nifindra monina tany Haràna. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Andriamanitra taminy: «Ilaozy ny tanindrazanao sy ny havanao ka mankanesa any amin’ny tany izay hasehoko anao.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandao ny tanin’ny Kaldeanina i Abrahama ka nifindra monina tany Haràna. Rehefa maty irainy, dia nafindran’Andriamanitra avy tany Haràna izy hanketo amin’ity tany izay onenanareo ankehitriny ity. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy nisy faritra natolotr’Andriamanitra ho anjara lovan’i Abrahama teto na dia iray dia aza, saingy nampanantenain’Andriamanitra fa ity tany ity dia homeny azy ho fananany sy ho fananan’ny taranany handimby azy; ary mbola tsy nanan-janaka akory i Abrahama tamin’izany fotoana izany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'kanefa toy izao no tenin’Andriamanitra taminy: «Honina any an-tanin’olona ny taranakao mandritra ny efajato taona sady handevozina sy hampahorîna. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hofaiziko anefa ny firenena hanandevo azy; aorian’izany no hialan’ny taranakao avy any ka hanompoany Ahy eto amin’ity toerana ity
