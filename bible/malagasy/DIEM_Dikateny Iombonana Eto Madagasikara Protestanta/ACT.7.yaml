  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rehefa nanakaiky ny fotoana hanatanterahan’Andriamanitra ny fampanantenana nataony tamin’i Abrahama, dia nitombo ny firenentsika tany Ejipta ka tonga nihamaro be. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avy eo nisy mpanjaka hafa nijoro tany Ejipta, dia mpanjaka tsy mba nahalala an’i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fetsy ratsy tamin’ny firenentsika io mpanjaka io ary tsy nifaditrovana tamin’ny razantsika ka nanery azy ireo hanary ny zazalahy vao teraka mba tsy hahavelona azy ireny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: ft
