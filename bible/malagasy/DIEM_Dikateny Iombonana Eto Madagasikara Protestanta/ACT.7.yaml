    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Efapolo taona taorian’izany, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' tanaty lelafon-droimemy mirehitra no niseho tamin’i Mosesy, tany an-taniefitra misy ny tendrombohitra Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Gaga i Mosesy raha nisehoan’izany fahitana izany. Kanefa nony nanatona handinika akaiky kokoa izy, dia injao ny feon’ny Tompo nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Izaho no Andriamanitry ny razanao, dia ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba!» Tora-kovitra i Mosesy ka tsy sahy nandinika. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary hoy ny Tompo taminy: «Esory ny kapanao, fa masina io tany ijoroanao io. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Efa hitako tokoa fa miferinaina ny vahoakako any Ejipta ary efa reko mitoloko lava ka tafidina hanafaka azy Aho. Ary ankehitriny, ndeha ianao hirahiko ho any Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Loharanon’ny andininy 30-34: Eks 3.1-10.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Io ilay Mosesy nolavin’ny Israelita ka nataony hoe: «Iza no nanendry anao ho mpifehy sy ho mpitsara anay?», kanefa nirahin’Andriamanitra ho mpifehy sy mpanavotra, nombàn’ny herin’ilay anjely niseho taminy tanatin’ny roimemy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: I Mosesy no nahavita zava-mahagaga amam-pamantarana tany Ejipta sy tany amin’ny Ranomasina Mena ary tany an-taniefitra nandritra ny efapolo taona, ka nahatafavoaka ny Israelita
  - type: usfm
