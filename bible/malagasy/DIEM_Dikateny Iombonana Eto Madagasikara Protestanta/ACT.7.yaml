    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Eks 1.7-8. '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Eks 1.10, 11, 22.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’izany fotoana izany no nahaterahan’i Mosesy, zazalahy mahatehotia teo imason’Andriamanitra
  - type: usfm
