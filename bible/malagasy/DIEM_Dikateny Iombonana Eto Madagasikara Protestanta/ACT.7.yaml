  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nialona an’i Jôsefa ireo razambe rahalahiny ka nivarotra azy ary nahatonga azy ho andevo tany Ejipta. Kanefa nombàn’Andriamanitra i Jôsefa, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka nafahany tamin’ny fahoriana rehetra ary nataony mamy hoditra sy nomeny fahendrena teo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', mpanjakan’i Ejipta. Dia notendren’ny Farao ho mpifehy an’i Ejipta sy ny tao an-dapany rehetra i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay dia nisy mosary nanerana an’i Ejipta sy i Kanahàna manontolo ka mafy ny fahoriana; ary tsy nahita hanin-kohanina ny razantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ren’i Jakôba fa nisy vary tany Ejipta, dia nirahiny hankany indray mandeha aloha ireo razantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha nankany fanindroany ny razantsika, dia nanambara tena tamin’ireo rahalahiny i Jôsefa, ary fantatry ny Farao tamin’izay ny fianakaviana niavian’i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nampanalain’i Jôsefa i Jakôba rainy mbamin’ny ankohonany manontolo izay nisy olona 75 mianaka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nidina nankany Ejipta avokoa izy mianakavy; ary tany no maty i Jakôba sy ny razantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nafindra ho any Sekema ny taolam-balon’ireo, ka nalevina tao amin’ny fasana novidin’i Abrahama vola tamin’ny taranak’i Hemôra tany Sekema
  - type: usfm
    marker: f
