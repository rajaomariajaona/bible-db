document_id: ACT.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lahatenin’i Stefàna
  - type: text
    content: 'Hoy kosa ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' tamin’i Stefàna:'
  - type: text
    content: –Izany tokoa ve no izy?
  '10':
  - type: text
    content: 'ka nafahany tamin’ny fahoriana rehetra ary nataony mamy hoditra sy nomeny fahendrena teo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ', mpanjakan’i Ejipta. Dia notendren’ny Farao ho mpifehy an’i Ejipta sy ny tao an-dapany rehetra i Jôsefa. '
  '11':
  - type: text
    content: 'Tamin’izay dia nisy mosary nanerana an’i Ejipta sy i Kanahàna manontolo ka mafy ny fahoriana; ary tsy nahita hanin-kohanina ny razantsika. '
  '12':
  - type: text
    content: 'Nony ren’i Jakôba fa nisy vary tany Ejipta, dia nirahiny hankany indray mandeha aloha ireo razantsika. '
  '13':
  - type: text
    content: 'Raha nankany fanindroany ny razantsika, dia nanambara tena tamin’ireo rahalahiny i Jôsefa, ary fantatry ny Farao tamin’izay ny fianakaviana niavian’i Jôsefa. '
  '14':
  - type: text
    content: 'Dia nampanalain’i Jôsefa i Jakôba rainy mbamin’ny ankohonany manontolo izay nisy olona 75 mianaka. '
  '15':
  - type: text
    content: 'Nidina nankany Ejipta avokoa izy mianakavy; ary tany no maty i Jakôba sy ny razantsika. '
  '16':
  - type: text
    content: Dia nafindra ho any Sekema ny taolam-balon’ireo, ka nalevina tao amin’ny fasana novidin’i Abrahama vola tamin’ny taranak’i Hemôra tany Sekema
  - type: note
    content: 'Loharanon’ny and 9-16: And 9: Gen 37.11, 28; 39.2, 21. –And 10: Gen 41.39-41. –And 11: Gen 41.57; 42.1-2. And 13: Gen 45.1, 16; –And 14: Gen 4.9-10, 17-18; olona 75 mianaka: Gen 46.27, araka ny dkt grika tranainy Septoazinta. –And 15: Gen 46.1-7; 49.33. –And 16: Gen 23.3-6; 33.19; 50.7-13; Jos 24.32.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Rehefa nanakaiky ny fotoana hanatanterahan’Andriamanitra ny fampanantenana nataony tamin’i Abrahama, dia nitombo ny firenentsika tany Ejipta ka tonga nihamaro be. '
  '18':
  - type: text
    content: 'Avy eo nisy mpanjaka hafa nijoro tany Ejipta, dia mpanjaka tsy mba nahalala an’i Jôsefa. '
  '19':
  - type: text
    content: Fetsy ratsy tamin’ny firenentsika io mpanjaka io ary tsy nifaditrovana tamin’ny razantsika ka nanery azy ireo hanary ny zazalahy vao teraka mba tsy hahavelona azy ireny
  - type: note
    content: 'Loharanon’ny andininy 17-19: And 17-18: Eks 1.7-8. And 19: Eks 1.10, 11, 22.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Ianareo rahalahy sy ianareo ray aman-dreny, henoy aho. Ilay Andriamanitra be voninahitra dia niseho tamin’i Abrahama razantsika fony izy tany Mezôpôtamia fa mbola tsy nifindra monina tany Haràna. '
  '20':
  - type: text
    content: Tamin’izany fotoana izany no nahaterahan’i Mosesy, zazalahy mahatehotia teo imason’Andriamanitra
  - type: note
    content: 'zazalahy mahatehotia teo imason’Andriamanitra: dkt hafa zazalahy tena tsara tarehy tokoa. Jereo Eks 2.2.'
  - type: text
    content: '. Notezaina telo volana tao an-tranon-drainy izy; '
  '21':
  - type: text
    content: fa nony voatery nariana, dia nalain’ny zanakavavin’ny Farao ka nobeaziny toy ny zanany
  - type: note
    content: Jereo Eks 2.3-10.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Notezaina tamin’ny fahaizana isan-karazany nananan’ny Ejiptianina i Mosesy, ka tonga nahery tamin’ny teniny sy ny asany.
  '23':
  - type: text
    content: 'Rehefa feno efapolo taona i Mosesy, dia tapa-kevitra ny hamangy an’ireo '
  - type: text
    content: Israelita
  - type: text
    content: ' havany. '
  '24':
  - type: text
    content: 'Nahita Israelita anankiray nihetraketrahan’ny Ejiptianina i Mosesy ka niaro ilay nampahorîna ary namono nahafaty ilay Ejiptianina mba hamaly faty an’ilay Israelita. '
  '25':
  - type: text
    content: 'Noheverin’i Mosesy ho takatr’ireo Israelita havany fa izy no hampiasain’Andriamanitra ho famonjena azy; saingy tsy takany velively. '
  '26':
  - type: text
    content: 'Ny ampitson’iny indray, dia Israelita roa lahy niady no zava-niseho tamin’i Mosesy. Tiany hampihavanina izy roa lahy ka nanariny hoe: «Ry izy roa lahy, mpirahalahy ianareo ka nahoana no mifamely toy izao?» '
  '27':
  - type: text
    content: 'Fa natosik’ilay namely i Mosesy sady nataony hoe: «Iza no nanendry anao ho mpifehy sy ho mpitsara anay? '
  '28':
  - type: text
    content: 'Moa tianao hovonoina koa ve aho tahaka ny namonoanao an’ilay Ejiptianina omaly?» '
  '29':
  - type: text
    content: Vao nandre izany teny izany i Mosesy, dia vaky nandositra ka nifindra monina tany Midiàna, ary nanan-janaka roa lahy tany
  - type: note
    content: 'Loharanon’ny andininy 23-29: Eks 2.11-15, 21-22; 18.3-4.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ary hoy Andriamanitra taminy: «Ilaozy ny tanindrazanao sy ny havanao ka mankanesa any amin’ny tany izay hasehoko anao.» '
  '30':
  - type: text
    content: 'Efapolo taona taorian’izany, dia '
  - type: text
    content: anjely
  - type: text
    content: ' tanaty lelafon-droimemy mirehitra no niseho tamin’i Mosesy, tany an-taniefitra misy ny tendrombohitra Sinay. '
  '31':
  - type: text
    content: 'Gaga i Mosesy raha nisehoan’izany fahitana izany. Kanefa nony nanatona handinika akaiky kokoa izy, dia injao ny feon’ny Tompo nanao hoe: '
  '32':
  - type: text
    content: '«Izaho no Andriamanitry ny razanao, dia ilay Andriamanitr’i Abrahama sy i Itsehàka ary i Jakôba!» Tora-kovitra i Mosesy ka tsy sahy nandinika. '
  '33':
  - type: text
    content: 'Ary hoy ny Tompo taminy: «Esory ny kapanao, fa masina io tany ijoroanao io. '
  '34':
  - type: text
    content: Efa hitako tokoa fa miferinaina ny vahoakako any Ejipta ary efa reko mitoloko lava ka tafidina hanafaka azy Aho. Ary ankehitriny, ndeha ianao hirahiko ho any Ejipta
  - type: note
    content: 'Loharanon’ny andininy 30-34: Eks 3.1-10.'
  - type: text
    content: .»
  '35':
  - type: text
    content: 'Io ilay Mosesy nolavin’ny Israelita ka nataony hoe: «Iza no nanendry anao ho mpifehy sy ho mpitsara anay?», kanefa nirahin’Andriamanitra ho mpifehy sy mpanavotra, nombàn’ny herin’ilay anjely niseho taminy tanatin’ny roimemy. '
  '36':
  - type: text
    content: I Mosesy no nahavita zava-mahagaga amam-pamantarana tany Ejipta sy tany amin’ny Ranomasina Mena ary tany an-taniefitra nandritra ny efapolo taona, ka nahatafavoaka ny Israelita
  - type: note
    content: 'Loharanon’ny andininy 35-36: And 35: Eks 2.14. –And 36: Eks 7.3; 14.21; Nom 14.33.'
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'I Mosesy ihany koa no nilaza tamin’ny Israelita hoe: «Hisy '
  - type: text
    content: mpaminany
  - type: text
    content: ' tahaka ahy hajoron’Andriamanitra ho anareo, dia mpaminany avy aminareo samy ianareo'
  - type: note
    content: 'Hisy mpaminany tahaka ahy... samy ianareo: jereo Deot 18.15, 18; Asa 3.22 sy nta.'
  - type: text
    content: '!» '
  '38':
  - type: text
    content: Rehefa vory ho fiangonana tany an-taniefitra ny vahoaka Israely, dia i Mosesy no teo anelanelan’ireo razantsika sy ilay anjely niteny taminy tany an-tendrombohitra Sinay; ka izy no nandray ny teny mahavelona avy amin’Andriamanitra mba homena antsika
  - type: note
    content: Jereo Eks 19.1–20.17; Deot 5.1-33.
  - type: text
    content: .
  '39':
  - type: text
    content: 'Tsy te hanoa an’i Mosesy anefa ny razantsika fa nanohitra azy ary naniry hiverina ilalana ho any Ejipta indray. '
  '4':
  - type: text
    content: 'Dia nandao ny tanin’ny Kaldeanina i Abrahama ka nifindra monina tany Haràna. Rehefa maty irainy, dia nafindran’Andriamanitra avy tany Haràna izy hanketo amin’ity tany izay onenanareo ankehitriny ity. '
  '40':
  - type: text
    content: 'Ka hoy ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' tamin’i'
  - type: text
    content: Aharôna
  - type: text
    content: ': «Anaovy andriamanitra hialoha lalana anay izahay, fa tsy fantatray izay nahazo an’iny Mosesy namoaka anay hiala tany Ejipta iny.» '
  '41':
  - type: text
    content: Tamin’izay dia sampy mitarehin-janak’omby no namboarin’ny vahoaka Israely sy nanaterany sorona, ka ny asan’ny tanany ihany no niravoravoany
  - type: note
    content: 'Loharanon’ny andininy 39-41: And 39: Nom 14.3. –And 40: Eks 32.1. –And 41: Eks 32.2-6.'
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Niambohoan’Andriamanitra kosa ny vahoakany ka navelany hivavaka amin’ny masoandro sy kintana amam-bolana, araka izay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao amin’ny bokin’ny mpaminany hoe:'
  - type: text
    content: «Ry vahoaka Israely, nitondra sorona amam-panatitra ho Ahy ve ianareo,
  - type: text
    content: nandritra ny efapolo taona tany an-taniefitra?
  '43':
  - type: text
    content: Tsia, fa nolanjainareo kosa ny tranolain’ny sampy atao hoe Môlôka
  - type: text
    content: sy ny sarin’ilay andriamanitrareo mitarehin-kintana atao hoe Refàna,
  - type: text
    content: dia ireo endri-javatra vitan’ny tananareo mba hivavahana.
  - type: text
    content: 'Noho izany, dia hataoko lasan-ko babo any andafin’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' ianareo'
  - type: note
    content: 'And 42-43: Ham 5.25-27, voatsiahy araka ny dkt grika tranainy Septoazinta. –Môlôka: anankiray amin’ireo andriamanidahy sampy notompoin’ny mponina tany Kanahàna fahizany. –Refàna: anaran’andriamanidahy sampy nivavahana fahiny noho izy noheverina hoe tompon’ny planeta Satiorna.'
  - type: text
    content: .»
  '44':
  - type: text
    content: 'Ny tranolay nitahirizana ny raki-tsoratry ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' kosa dia nananan’ny razantsika fony ireo tao an-taniefitra. Namboarina araka ny fepetra voalazan’Andriamanitra tamin’i Mosesy rahateo. '
  '45':
  - type: text
    content: 'Dia mbola noraisin’ireo razantsika tafaraka tamin’i Josoa ilay tranolay ary nentiny niditra tao amin’ny tany fananan’ireo '
  - type: text
    content: hafa firenena
  - type: text
    content: ; fa noroahin’Andriamanitra teo anoloan’ny razantsika manko ireo hafa firenena. Tao hatrany ilay tranolay mandra-pahatongan’ny andro nanjakan’i Davida
  - type: note
    content: 'And 44-45: Eks 25.9, 40; Jos 3.14-17.'
  - type: text
    content: '. '
  '46':
  - type: text
    content: Nahazo tombon-tsoa tamin’Andriamanitra i Davida ary nangataka mba hanao trano fonenana ho an’ny Andriamanitr’i Jakôba
  - type: note
    content: 'ho an’ny Andriamanitr’i Jakôba: misy stf sasany ahitana hoe ho an’ny taranak’i Jakôba. Jereo 2 Sam 7.1-16; 1 Tan 17.1-14.'
  - type: text
    content: '. '
  '47':
  - type: text
    content: Kanjo i Salômôna no nanorina trano ho Azy
  - type: note
    content: Jereo 1 Mp 5.1-38; 2 Tan 3.1-17.
  - type: text
    content: .
  '48':
  - type: text
    content: 'Ilay Andriamanitra Avo indrindra anefa dia tsy mitoetra amin-trano vitan’olombelona, araka ny tenin’ny mpaminany hoe:'
  '49':
  - type: text
    content: «Ny lanitra no sezafiandrianako, hoy ny Tompo;
  - type: text
    content: ary ny tany no fitoeran-tongotro.
  - type: text
    content: Koa trano manao ahoana no haorinareo ho Ahy,
  - type: text
    content: ary toerana inona no hitsaharako?
  '5':
  - type: text
    content: 'Tsy nisy faritra natolotr’Andriamanitra ho anjara lovan’i Abrahama teto na dia iray dia aza, saingy nampanantenain’Andriamanitra fa ity tany ity dia homeny azy ho fananany sy ho fananan’ny taranany handimby azy; ary mbola tsy nanan-janaka akory i Abrahama tamin’izany fotoana izany, '
  '50':
  - type: text
    content: Angaha tsy asan’ny tanako izao rehetra izao
  - type: note
    content: 'And 49-50: Is 66.1-2.'
  - type: text
    content: ?»
  '51':
  - type: text
    content: 'Olona mafy hatoka, mpikomy sady mpanetsin-tadîny ianareo! Toherinareo lalandava ny Fanahy Masina; dia ny razanareo navela mihitsy ianareo. '
  '52':
  - type: text
    content: 'Iza moa no mpaminany tsy nenjehin’ny razanareo? Novonoiny hatramin’ireo mpanambara ny hahatongavan’ilay Marina aza: ary ankehitriny dia ianareo mihitsy no nanjary mpamadika sy mpamono ilay Marina'
  - type: note
    content: 'And 51-52: ampit Is 63.10; 2 Tan 36.16; Mt 23.31.'
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Nandray ny '
  - type: text
    content: lalànan
  - type: text
    content: ’Andriamanitra tamin’ny alalan’ny anjely ianareo, kanefa tsy nitandrina azy
  - type: note
    content: Misy tokoa lovantsofin’ireo rabỳ (na mpampianatra jiosy) milaza fa ny fanambaràna ny lalànan’Andriamanitra tany Sinay dia natao tamin’ny alalan’ireo anjely. Ampit Gal 3.19; Heb 2.2.
  - type: text
    content: .
  - type: heading
    content: Vonoina i Stefàna
  '54':
  - type: text
    content: 'Nony nandre izany teny izany ry zareo tao amin’ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ', dia nisafoaka mafy ary nihidy vazana tamin’i Stefàna. '
  '55':
  - type: text
    content: 'Feno Fanahy Masina kosa i Stefàna ka nibanjina ny lanitra, nahita ny voninahitr’Andriamanitra sy i Jesoa teo ankavanan’Andriamanitra, '
  '56':
  - type: text
    content: 'ary niteny hoe:'
  - type: text
    content: '–Indro hitako izao ny lanitra misokatra sy ilay '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' mijoro eo ankavanan’Andriamanitra.'
  '57':
  - type: text
    content: 'Dia nihoraka ireo tao amin’ny Fitsarana ambony sady vao mainka nanentsin-tadîny. Ary indray niantoraka teny amin’i Stefàna izy rehetra, '
  '58':
  - type: text
    content: 'ka nitarika azy tany ivelan’ny tanàna sy nitora-bato azy. Ary ny vavolombelona dia nametra-damba teo an-tongotr’izay tovolahy antsoina hoe Saoly izay. '
  '59':
  - type: text
    content: 'Raha nitora-bato azy ny olona, i Stefàna kosa niantso ny Tompo nanao hoe:'
  - type: text
    content: –Ry Jesoa Tompo ô, raiso ny fanahiko
  - type: note
    content: 'And 59-60: ampit Lk 23.46, 34.'
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'kanefa toy izao no tenin’Andriamanitra taminy: «Honina any an-tanin’olona ny taranakao mandritra ny efajato taona sady handevozina sy hampahorîna. '
  '60':
  - type: text
    content: 'Dia nandohalika izy ka niteny mafy hoe:'
  - type: text
    content: –Tompo ô, aza tananao hahadiso azy ireo izao heloka izao!
  '7':
  - type: text
    content: Hofaiziko anefa ny firenena hanandevo azy; aorian’izany no hialan’ny taranakao avy any ka hanompoany Ahy eto amin’ity toerana ity
  - type: note
    content: 'Loharanon’ny andininy 2-7: And 2-3: Gen 12.1. –And 4: Gen 11.31; 12.4. –And 5: Gen 2.7; 13.15; 15.18; 17.8. –And 6-7: Gen 15.13-14; Eks 3.12.'
  - type: text
    content: '.» '
  '8':
  - type: text
    content: 'Ary nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' tamin’i Abrahama Andriamanitra ka ny '
  - type: text
    content: famorana
  - type: text
    content: ' no famantarana izany. Dia izany no namoran’i Abrahama an’i Itsehàka zanany rehefa niherina ny andro niterahany azy, sy namoran’i Itsehàka an’i Jakôba, ary namoran’i Jakôba an’ireo razambe 12 mirahalahy'
  - type: note
    content: 'Jereo Gen 17.10-14; 21.4. –razambe: jereo 2.29 sy nta.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Nialona an’i Jôsefa ireo razambe rahalahiny ka nivarotra azy ary nahatonga azy ho andevo tany Ejipta. Kanefa nombàn’Andriamanitra i Jôsefa, '
