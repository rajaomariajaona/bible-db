    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Notezaina tamin’ny fahaizana isan-karazany nananan’ny Ejiptianina i Mosesy, ka tonga nahery tamin’ny teniny sy ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa feno efapolo taona i Mosesy, dia tapa-kevitra ny hamangy an’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' havany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nahita Israelita anankiray nihetraketrahan’ny Ejiptianina i Mosesy ka niaro ilay nampahorîna ary namono nahafaty ilay Ejiptianina mba hamaly faty an’ilay Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Noheverin’i Mosesy ho takatr’ireo Israelita havany fa izy no hampiasain’Andriamanitra ho famonjena azy; saingy tsy takany velively. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny ampitson’iny indray, dia Israelita roa lahy niady no zava-niseho tamin’i Mosesy. Tiany hampihavanina izy roa lahy ka nanariny hoe: «Ry izy roa lahy, mpirahalahy ianareo ka nahoana no mifamely toy izao?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa natosik’ilay namely i Mosesy sady nataony hoe: «Iza no nanendry anao ho mpifehy sy ho mpitsara anay? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moa tianao hovonoina koa ve aho tahaka ny namonoanao an’ilay Ejiptianina omaly?» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vao nandre izany teny izany i Mosesy, dia vaky nandositra ka nifindra monina tany Midiàna, ary nanan-janaka roa lahy tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Loharanon’ny andininy 23-29: Eks 2.11-15, 21-22; 18.3-4.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
