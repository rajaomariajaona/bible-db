document_id: GAL.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tandrovy ny fahafahanareo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hahazo ny fahafahana no nanafahan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' antsika; koa mijoroa amin’izany, fa aza mety hogiazan’ny zioga maha mpanompo indray. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Kanefa izaho dia omen’ny Tompo toky momba anareo fa tsy hanan-kevitra hafa noho ny ahy ianareo; saingy ilay mpanakorontana anareo, na zovy na zovy izy, dia hiharan’ny fanamelohan’Andriamanitra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izaho kosa, ry havana, raha mbola mitory tokoa hoe ilaina ny famorana, ahoana indray no mbola anenjehana ahy? Raha izany, dia foana ilay fanafintohinana ateraky ny hazofijalian’i Kristy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Enga anie ka hanakilema ny tenany mihitsy aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Enga anie ka hanakilema ny tenany mihitsy aza: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany dia mety mamohafoha fomba amam-panao tany Galatia teo amin’ny fanajana ilay andriamanibavy sampy atao hoe Sibela.
      marker-yv: yv-n
    - type: text
      text: ' ireo mpanabataba anareo!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hotarihin’ny Fanahy Masina fa tsy ny maha olona mpanota
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ianareo, ry havana, dia efa nantsoina ho amin’ny fahafahana; saingy tsy hoe ilay fahafahana hahazoana manao izay sitraky ny maha olona mpanota, fa aoka hifanompo ianareo amin’ny alalan’ny fitiavana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Satria ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' manontolo dia tanteraka amin’ny didy tokana hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fisor 19.18.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa raha mifandramatra sy mifampihinana ianareo, tandremo fandrao hifandringana.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao kosa no teniko: mandehana araka ny fanentanan’ny Fanahy Masina ianareo, dia tsy hahatanteraka ny fanirian’ny maha olona mpanota. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ny maha olona mpanota dia manam-paniriana manohitra ny fanirian’ny Fanahy Masina; ary ny Fanahy Masina dia manam-paniriana manohitra ny maha olona mpanota: mifanohitra izy roroa, hany ka tsy izay zavatra sitrakareo no ataonareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Rm 7.14-23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Kanefa raha tarihin’ny Fanahy Masina ianareo, dia tsy fehezin’ny lalàna intsony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa miharihary ny asan’ny maha olona mpanota, dia ireto: fijangajangana, fahalotoana, fihetsika tsy maotina, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Indro fa izaho Paoly no miteny aminareo: raha manaiky hoforana ianareo, dia tsy hahasoa anareo na dia kely akory aza i Kristy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fanompoan-tsampy, fanaovana ody ratsy, fifankahalana, adiady, fahatezerana, fiafonafonana, fifandrafiana, fisarahana, fitokotokoana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'fialonana, fidorohana, fihinanam-be loatra, sy ny mitovy amin’izany. Ary lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao toy izany dia tsy hanana anjara amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny vokatry ny Fanahy Masina kosa dia fitiavana, hafaliana, fiadanana, faharetana, hamoram-po, hatsaram-po, toetra mahatoky, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'fahalemem-panahy, fahononam-po: tsy misy lalàna manohitra ny toy izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ireo voatokana ho an’i Kristy Jesoa dia efa nanombo teo amin’ny hazofijaliana ilay maha olona mpanota azy ireo mbamin’ny filàndratsiny amam-paniriany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Raha ny Fanahy Masina tokoa no manome aina antsika, dia aoka hizotra araka ny fanentanan’ny Fanahy Masina koa isika; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: fa aoka tsy ho be rehaka foana hifampihaika sy hifampialona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ambarako indray amin’ny olona rehetra manaiky hoforana fa manana adidy hahatanteraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' manontolo izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tafasaraka amin’i Kristy ianareo miezaka ho marina eo imason’Andriamanitra amin’ny fanoavana ny lalàna; miendaka amin’ny fahasoavan’Andriamanitra ianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Isika kosa dia matoky fa Andriamanitra no mahatonga antsika ho marina eo imasony; izany no andrasantsika ho vokatry ny finoantsika noho ny asan’ny Fanahy Masina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ho an’izay tafaray amin’i Kristy Jesoa, tsy dia ny hoe maha voafora na tsy maha voafora no tena zavatra fa ny finoana izay miasa amin’ny fitiavana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Efa tsara fiainga ianareo teo am-pihazakazahana; ka iza indray no misakana anareo tsy ho voataonan’ny zavatra marim-pototra? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izany fitaomana anareo hiato izany dia tsy avy amin’ilay Andriamanitra miantso anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: «Leviora kely foana dia mampibohaka ny koba manontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Kôr 5.6.
      marker-yv: yv-n
    - type: text
      text: '», hoy ny ohabolana. '
