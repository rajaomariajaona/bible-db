document_id: GAL.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tandrovy ny fahafahanareo
  - type: text
    content: 'Hahazo ny fahafahana no nanafahan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' antsika; koa mijoroa amin’izany, fa aza mety hogiazan’ny zioga maha mpanompo indray. '
  '10':
  - type: text
    content: Kanefa izaho dia omen’ny Tompo toky momba anareo fa tsy hanan-kevitra hafa noho ny ahy ianareo; saingy ilay mpanakorontana anareo, na zovy na zovy izy, dia hiharan’ny fanamelohan’Andriamanitra.
  '11':
  - type: text
    content: 'Izaho kosa, ry havana, raha mbola mitory tokoa hoe ilaina ny famorana, ahoana indray no mbola anenjehana ahy? Raha izany, dia foana ilay fanafintohinana ateraky ny hazofijalian’i Kristy. '
  '12':
  - type: text
    content: Enga anie ka hanakilema ny tenany mihitsy aza
  - type: note
    content: 'Enga anie ka hanakilema ny tenany mihitsy aza: izany dia mety mamohafoha fomba amam-panao tany Galatia teo amin’ny fanajana ilay andriamanibavy sampy atao hoe Sibela.'
  - type: text
    content: ' ireo mpanabataba anareo!'
  - type: heading
    content: Hotarihin’ny Fanahy Masina fa tsy ny maha olona mpanota
  '13':
  - type: text
    content: 'Fa ianareo, ry havana, dia efa nantsoina ho amin’ny fahafahana; saingy tsy hoe ilay fahafahana hahazoana manao izay sitraky ny maha olona mpanota, fa aoka hifanompo ianareo amin’ny alalan’ny fitiavana. '
  '14':
  - type: text
    content: 'Satria ny '
  - type: text
    content: lalàna
  - type: text
    content: ' manontolo dia tanteraka amin’ny didy tokana hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: note
    content: Fisor 19.18.
  - type: text
    content: '!» '
  '15':
  - type: text
    content: Fa raha mifandramatra sy mifampihinana ianareo, tandremo fandrao hifandringana.
  '16':
  - type: text
    content: 'Izao kosa no teniko: mandehana araka ny fanentanan’ny Fanahy Masina ianareo, dia tsy hahatanteraka ny fanirian’ny maha olona mpanota. '
  '17':
  - type: text
    content: 'Fa ny maha olona mpanota dia manam-paniriana manohitra ny fanirian’ny Fanahy Masina; ary ny Fanahy Masina dia manam-paniriana manohitra ny maha olona mpanota: mifanohitra izy roroa, hany ka tsy izay zavatra sitrakareo no ataonareo'
  - type: note
    content: Ampit Rm 7.14-23.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Kanefa raha tarihin’ny Fanahy Masina ianareo, dia tsy fehezin’ny lalàna intsony. '
  '19':
  - type: text
    content: 'Fa miharihary ny asan’ny maha olona mpanota, dia ireto: fijangajangana, fahalotoana, fihetsika tsy maotina, '
  '2':
  - type: text
    content: 'Indro fa izaho Paoly no miteny aminareo: raha manaiky hoforana ianareo, dia tsy hahasoa anareo na dia kely akory aza i Kristy. '
  '20':
  - type: text
    content: 'fanompoan-tsampy, fanaovana ody ratsy, fifankahalana, adiady, fahatezerana, fiafonafonana, fifandrafiana, fisarahana, fitokotokoana, '
  '21':
  - type: text
    content: 'fialonana, fidorohana, fihinanam-be loatra, sy ny mitovy amin’izany. Ary lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao toy izany dia tsy hanana anjara amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '22':
  - type: text
    content: 'Ny vokatry ny Fanahy Masina kosa dia fitiavana, hafaliana, fiadanana, faharetana, hamoram-po, hatsaram-po, toetra mahatoky, '
  '23':
  - type: text
    content: 'fahalemem-panahy, fahononam-po: tsy misy lalàna manohitra ny toy izany. '
  '24':
  - type: text
    content: 'Ireo voatokana ho an’i Kristy Jesoa dia efa nanombo teo amin’ny hazofijaliana ilay maha olona mpanota azy ireo mbamin’ny filàndratsiny amam-paniriany. '
  '25':
  - type: text
    content: 'Raha ny Fanahy Masina tokoa no manome aina antsika, dia aoka hizotra araka ny fanentanan’ny Fanahy Masina koa isika; '
  '26':
  - type: text
    content: fa aoka tsy ho be rehaka foana hifampihaika sy hifampialona.
  '3':
  - type: text
    content: 'Ary ambarako indray amin’ny olona rehetra manaiky hoforana fa manana adidy hahatanteraka ny '
  - type: text
    content: lalàna
  - type: text
    content: ' manontolo izy. '
  '4':
  - type: text
    content: 'Tafasaraka amin’i Kristy ianareo miezaka ho marina eo imason’Andriamanitra amin’ny fanoavana ny lalàna; miendaka amin’ny fahasoavan’Andriamanitra ianareo. '
  '5':
  - type: text
    content: 'Isika kosa dia matoky fa Andriamanitra no mahatonga antsika ho marina eo imasony; izany no andrasantsika ho vokatry ny finoantsika noho ny asan’ny Fanahy Masina. '
  '6':
  - type: text
    content: Fa ho an’izay tafaray amin’i Kristy Jesoa, tsy dia ny hoe maha voafora na tsy maha voafora no tena zavatra fa ny finoana izay miasa amin’ny fitiavana.
  '7':
  - type: text
    content: 'Efa tsara fiainga ianareo teo am-pihazakazahana; ka iza indray no misakana anareo tsy ho voataonan’ny zavatra marim-pototra? '
  '8':
  - type: text
    content: 'Izany fitaomana anareo hiato izany dia tsy avy amin’ilay Andriamanitra miantso anareo. '
  '9':
  - type: text
    content: «Leviora kely foana dia mampibohaka ny koba manontolo
  - type: note
    content: Ampit 1Kôr 5.6.
  - type: text
    content: '», hoy ny ohabolana. '
