document_id: PSA.128,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny hasambaran’ireo mpivavaka
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Sambatra izay rehetra manaja ny TOMPO
  - type: text
    content: sy manaraka ny sori-dàlana nataony.
  '2':
  - type: text
    content: Ny vokatry ny asanao tokoa no hivelomanao
  - type: text
    content: ka sambatra sy ambinina ianao!
  '3':
  - type: text
    content: Ny vadinao eo an-tranonao
  - type: text
    content: dia toy ny voaloboka mahavokatra;
  - type: text
    content: ny zanakao manodidina ny latabatrao
  - type: text
    content: dia toy ny solofon’ôliva.
  '4':
  - type: text
    content: 'Eny, toy izany no '
  - type: text
    content: itahiana
  - type: text
    content: ny lehilahy manaja ny TOMPO!
  '5':
  - type: text
    content: 'Hitahy anao avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' anie ny TOMPO,'
  - type: text
    content: ka amin’ny andro rehetra iainanao
  - type: text
    content: no hahitanao ny hasambaran’i Jerosalema
  '6':
  - type: text
    content: sy hahitanao ny zafikelinao!
  - type: text
    content: Ny fiadanana anie
  - type: text
    content: ho an’i Israely!
