document_id: JOS.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mandefa mpitsikilo roa tany Jerikao i Josoa
  - type: heading
    content: (Jereo Mpits 1.23-25; Jos 6.17, 22-25)
  - type: text
    content: 'Ary i Josoa, zanakalahin’i Nona, dia nandefa mpitsikilo roa lahy mangingina avy tao an-tobin’i Sitima ka niteny taminy hoe:'
  - type: text
    content: –Ndeha misafo ny tany ianareo, indrindra fa ny tanànan’i Jerikao
  - type: note
    content: 'Sitima: angamba tsy misy hafa amin’ilay toerana antsoina hoe Abela-Sitima (Nom 33.49) izay tokony ho kilaometatra vitsivitsy eo avaratra atsinanan’ny Ranomasina Maty. –Jerikao: tanàna tsy lavitra an’i Jôrdàna, fa erỳ amin’ny faran’ny lohasaha, eny am-pita andrefan’ny renirano. –Rahaba dia anarana voatsiahy ao amin’ny Test. Vaovao: Mt 1.5; Heb 11.31; Jak 2.25.'
  - type: text
    content: .
  - type: text
    content: 'Nony tonga tao an-tanàna izy roa lahy, dia niditra tao an-tranon’ny vehivavy mpivaro-tena iray atao hoe Rahaba ka nandry tao. '
  '10':
  - type: text
    content: 'Efa renay ny fomba nataon’ny TOMPO hanamainana ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' teo anoloan’ny razanareo niala tany Ejipta. Efa renay koa fa novonoinareo i Sihôna sy i Hôga izay mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' anankiroa tany andafy atsinanan’i Jôrdàna ka nafoinareo ho an’ny TOMPO ny fananany rehetra'
  - type: note
    content: 'Ny fomba nanamainan’ny Tompo ny Ranomasin’ny Volotara: jereo Eks 14.21. –Sihôna sy i Hôga: jereo Deot 2.24–3.17; Nom 21.21-35.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Koa raha nandre izany izahay, dia ketraka ny fonay ary tsy nisy olona sahy nitsangana hanohitra anareo intsony. Fa ny TOMPO Andriamanitrareo no Andriamanitra any an-danitra ambony sy etỳ an-tany ambany. '
  '12':
  - type: text
    content: 'Ary ankehitriny, aoka hianiananareo amin’ny Tompo aho fa hamindranareo fo ny fianakaviako tahaka izay namindrako fo taminareo: koa mba omeo famantarana azo antoka aho '
  '13':
  - type: text
    content: fa havelanareo ho velona ny ray aman-dreniko sy ireo mpiray tampo amiko mbamin’ny ankohonany tsirairay avy ka hamonjy ny ainay tsy ho faty ianareo.
  '14':
  - type: text
    content: 'Dia novalian’izy roa lahy hoe:'
  - type: text
    content: –Raha tàhiny tsy ambaranao olona izao fandalovanay mpisafo tany izao, dia hamindra fo sy hanao izay hitsiny aminao izahay, rehefa homen’ny TOMPO anay ity tany ity. Raha tsy izany no ataonay aminareo mianakavy, dia aoka ny ainay no ho faty hisolo ny anareo.
  '15':
  - type: text
    content: 'I Rahaba dia nipetraka tamina trano nanolotra ny mandan’ny tanàna; koa naidiny tamin’ny tadimahazaka, avy teo am-baravarankely, izy roa lahy sady nilazany hoe:'
  '16':
  - type: text
    content: –Mandehana any an-tendrombohitra ianareo fandrao hifanena amin’ny mpanenjika, ary miafena any telo andro ambara-piveriny; aorian’izany, vao mandehana amin’ny lalanareo.
  '17':
  - type: text
    content: 'Dia hoy izy roa lahy tamin’i Rahaba:'
  - type: text
    content: '–Ny amin’ny fianianana izay nasainao nataonay, dia izao no fomba hanatanterahany azy: '
  '18':
  - type: text
    content: 'Rehefa tonga haka ny tany izahay, dia afatory eo amin’ny varavarankely izay nampidinanao anay ity kofehy mena ity; ary angony ao an-trano avokoa ny ray aman-dreninao sy mpiray tampo aminao mbamin’ny fianakavianao manontolo. '
  '19':
  - type: text
    content: 'Raha misy olona mivoaka ho any ivelan’ny trano, dia izy ihany no tompon’andraikitra amin’ny fahafatesany fa tsy izahay. Ireo rehetra miaraka aminao ao an-tranonao kosa, raha misy olona mamely azy, dia izahay no tompon’andraikitra amin’ny fahafatesany. '
  '2':
  - type: text
    content: 'Ary ren’ny mpanjakan’i Jerikao fa misy Israelita tonga io alina io mba hitsikilo ny tany. '
  '20':
  - type: text
    content: Kanefa, raha tàhiny ambaranao olona izao fandalovanay izao, dia afaka amin’ny fianianana izay nasainao nataonay izahay.
  '21':
  - type: text
    content: 'Dia nanaiky araka ny tenin’izy roa lahy i Rahaba, ka nandefa azy. Ary nony efa lasa ireo, dia nafatony teo amin’ny varavarankely ilay kofehy mena. '
  '22':
  - type: text
    content: 'Izy roa lahy kosa nandeha nankany an-tendrombohitra ary nitoetra tany telo andro ambara-piverin’ireo mpanenjika. Ary nikaroka azy tany amin’ny lalana rehetra ireto mpanenjika nefa tsy nahita. '
  '23':
  - type: text
    content: 'Dia niala ny fiereny izy roa lahy ka nidina avy tany an-tendrombohitra, dia niampita an’i Jôrdàna sy nankany amin’i Josoa, zanakalahin’i Nona. '
  '24':
  - type: text
    content: 'Ary nitantarany ny zavatra rehetra nitranga i Josoa '
  '25':
  - type: text
    content: 'sady nilazany hoe:'
  - type: text
    content: –Efa natolotry ny TOMPO antsika manontolo tokoa izany tany izany; ary rera-po eo anoloantsika mihitsy aza ny mponina rehetra ao.
  '3':
  - type: text
    content: 'Koa naniraka tany amin’i Rahaba izy hilaza hoe:'
  - type: text
    content: –Ireo lehilahy miantrano ao aminao ireo dia tonga mba hitsikilo ny tany manontolo. Koa atolory anay ireo!
  '4':
  - type: text
    content: 'Dia lasa i Rahaba nitondra azy roa lahy sy nanafina azy, vao namaly hoe:'
  - type: text
    content: '–Nisy lehilahy tonga tokoa teto amiko, nefa tsy fantatro izay niaviany. '
  '5':
  - type: text
    content: Saingy nony hariva ny andro ka hohidiana ny vavahadin’ny tanàna
  - type: note
    content: Mba hisakanana ny fahavalo tsy hiditra ny tanàna, dia nohidiana mandrakariva ny vavahady mandritra ny alina.
  - type: text
    content: ', dia lasa ireo ka tsy fantatro izay nalehany. Enjeho faingana izy fa ho tratranareo!'
  '6':
  - type: text
    content: 'Kanjo efa nampiakarin-dravehivavy any an-tampon-trano izy roa lahy ary nafeniny tao anaty tahon-drongony izay efa nalahany teo. '
  '7':
  - type: text
    content: 'Dia niainga ireo iraky ny mpanjaka hanenjika ny mpitsikilo teny an-dalàna mankany Jôrdàna ka hatrany amin’ny fitàna. Ary raha vao lasa ireto mpanenjika, dia nohidiana ny vavahady. '
  '8':
  - type: text
    content: 'Fa talohan’ny hatorian’ny mpitsikilo no niakatra nankao aminy tao an-tampon-trano i Rahaba '
  '9':
  - type: text
    content: 'ka niteny taminy hoe:'
  - type: text
    content: '–Fantatro fa efa nomen’ny TOMPO anareo ity tany misy anay ity ka ny mponina rehetra dia raiki-tahotra anareo sady rera-po eo anoloanareo. '
