document_id: NEH.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ajoron’ny Jiosy indray ny mandan’i Jerosalema
  - type: text
    content: Dia nanomboka asa i Eliasiba mpisorombe mbamin’ireo mpisorona namany, ka niara-namboatra ny vavahadin’ny Ondry
  - type: note
    content: 'vavahadin’ny ondry: dia teo amin ny zoro avaratra-atsinanana amin’ny mandan’ny tanàna. –Ny famisavisana ny asa tontosaina dia mitohy hatramin’ny and 32, ka mitety ny manda lafy andrefana sy atsimo ary atsinanana sy avaratra. Maro ny anarana tilikambo sy vavahady no tsy hita afa-tsy eto ka saro-pantarina mihitsy ny tena toerana misy azy. Ny naoty manarakaraka dia manome toerana vitsivitsy voamarika mazava.'
  - type: text
    content: '; dia nanamasina izany ry zareo, vao nandatsaka ny lela-vavahadiny. Ary nohamasininy koa ny manda hatrany amin’ny tilikambon’ny Zatolahy sy ny tilikambo Hananela. '
  '10':
  - type: text
    content: 'Nanarakaraka io, dia i Jedaià zanakalahin’i Haromafa no namboatra ny manda tandrifin’ny tranony; ary teo an-kilan’io, dia i Hatosy zanakalahin’i Hasabneià. '
  '11':
  - type: text
    content: 'Ny laniny hafa amin’ny manda misy ny tilikambon’ny Fatana kosa dia namboarin’i Malkià, zanakalahin’i Harima, sy i Hasoba zanakalahin’i Pahata-Môaba. '
  '12':
  - type: text
    content: 'Nanarakaraka azy roa lahy, dia i Saloma zanakalahin’i Lôhesy sady komandin’ny antsasaky ny faritr’i Jerosalema, no namboatra niaraka tamin’ny zanany vavy. '
  '13':
  - type: text
    content: 'Ny vavahadin’ny Lohasaha dia namboarin’i Hanona sy ny mponin’i Zanôa: ireo no nandrafitra izany sy nandatsaka ny lela-vavahady mbamin’ny hidiny sy barany; ireo koa no namboatra ny manda dimanjato metatra tafapaka amin’ny vavahadin’ny Fanariam-pako'
  - type: note
    content: 'vavahadin’ny Lohasaha, vavahadin’ny Fanariam-pako: jereo 2.13 sy nta.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ary ny vavahadin’ny Fanariam-pako dia namboarin’i Malkià zanakalahin’i Rekaba sady komandin’ny faritr’i Bety-Kerema: izy no nandrafitra izany sy nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy barany.'
  '15':
  - type: text
    content: Ny vavahadin’ny Loharano
  - type: note
    content: 'vavahadin’ny Loharano: jereo 2.14 sy nta. –Salona na Saloma.'
  - type: text
    content: ' dia namboarin’i Salona zanakalahin’i Kôla-Hôze sady komandin’ny faritr’i Mitsepà: izy no nandrafitra ny nanafo izany ary nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy barany; izy koa no namboatra ny manda manamorona ilay farihin’ny lakan-drano mankany amin’ny sahan’ny mpanjaka, ary tafapaka amin’ny ambaratonga midina avy any an-'
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Nanarakaraka an’i Saloma, dia i Nehemià, zanakalahin’i Hazboko sady komandin’ny antsasaky ny faritr’i Bety-Tsora, no namboatra ny manda ka tafapaka tandrifin’ireo fasan’i Davida sy ny dobo izay natao ary ny trano fonenan’ny miaramila maherifo. '
  '17':
  - type: text
    content: 'Nanarakaraka an’i Nehemià, dia namboatra koa ny '
  - type: text
    content: levita
  - type: text
    content: ' notarihin’i Rehoma zanakalahin’i Banỳ; ary teo an-kilan’ireo i Hasabià, komandin’ny antsasaky ny faritr’i Kehilà, dia namboatra ny manda ho an’ny faritra feheziny. '
  '18':
  - type: text
    content: 'Nanarakaraka azy dia namboatra koa ny levita namany notarihin’i Binoy zanakalahin’i Henadada sady komandin’ny antsasaky ny faritr’i Kehilà; '
  '19':
  - type: text
    content: 'ary teo an-kilan’ireo, i Hezera, zanakalahin’i Jesoa sady komandin’i Mitsepà, dia namboatra laniny hafa amin’ny manda, tandrifin’ny fiakarana ho any amin’ny fitehirizam-piadiana eo amin’ny zoro. '
  '2':
  - type: text
    content: 'Teo an-kilan’ireo, ny mponin’i Jerikao no namboatra ny manda, ary nanarakaraka ireto indray i Zakora zanakalahin’i Imry. '
  '20':
  - type: text
    content: 'Nanarakaraka azy dia i Baraka, zanakalahin’i Zabay, no nazoto namboatra laniny hafa manomboka eo amin’ny zoro ka miafara amin’ny varavaran’ny tranon’i Eliasiba mpisorombe; '
  '21':
  - type: text
    content: ary teo ankilan’io i Meremôta, zanakalahin’i Orià sy zafin’i Hakôtsa, dia namboatra laniny hafa manomboka eo amin’ny varavaran’ny tranon’i Eliasiba ka tafapaka amin’ny faran’ny tranon’i Eliasiba.
  '22':
  - type: text
    content: 'Nanarakaraka an’i Baròka, dia namboatra ny manda koa ny mpisorona avy amin’ny manodidina an’i Jerosalema. '
  '23':
  - type: text
    content: 'Teo ankilan’ireo dia i Benjamîna sy i Hasoba no namboatra laniny tandrifin’ny tranony ihany; ary nanarakaraka azy dia nisy namboarin’i Hazarià zanakalahin’i Mahaseià sy zafin’i Hananià, ny teo anilan’ny tranony. '
  '24':
  - type: text
    content: 'Nanarakaraka io, dia i Binoy zanakalahin’i Henadada kosa no namboatra ny laniny hafa manomboka eo amin’ny tranon’i Hazarià ka miafara amin’ny fiolahana eo an-jorony. '
  '25':
  - type: text
    content: 'Teo an-kilan’i Binoy, dia namboatra koa i Palala zanakalahin’i Ozay manomboka eo amin’ny zoro ka miafara amin’ny tilikambo ambony eo alohan’ny tranon’ny mpanjaka sady eo akaikin’ny tokotanin’ny Fonja. Nanarakaraka azy dia i Pedaià, zanakalahin’i Parehôsy, '
  '26':
  - type: text
    content: sy ireo mpanampy ny levita nitoetra tao Hôfela no namboatra laniny tafapaka amin’ny tilikambo mandroso, izany hoe eo atsinanan’ny Vavahadin-drano
  - type: note
    content: jereo 2 Tan 27.3 sy nta.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Nanarakaraka ireo, ny mponin’i Tekôa dia namboatra laniny hafa manomboka eo an-tandrifin’ny tilikambo lehibe mandroso ka miafara amin’ny mandan’i Hôfela. '
  '28':
  - type: text
    content: 'Manomboka eo amin’ny vavahadin-tsoavaly, dia samy namboatra ny manda tandrifin’ny tranony avy ny mpisorona. '
  '29':
  - type: text
    content: 'Teo ankilan’ireo dia namboatra ny laniny tandrifin’ny tranony koa i Tsadôka zanakalahin’i Imera; nanarakaraka azy dia i Semahià zanakalahin’i Sekanià sady mpiandry ny vavahady atsinanana no namboatra ny manda. '
  '3':
  - type: text
    content: 'Ny vavahadin’ny Trondro dia namboarin’ny terak’i Senaà: napetany ny sakamandimby, ary nalatsany ny lela-vavahady mbamin’ny hidiny sy barany. '
  '30':
  - type: text
    content: 'Nanarakaraka an’i Semahià, dia namboatra laniny hafa i Hananià, zanakalahin’i Selemià, sy i Hanona, fahenin’ny zanakalahin’i Tsalafa; nanarakaraka azy roa lahy, dia i Mesolama zanak’i Berekià no namboatra tandrifin’ny efitranony. '
  '31':
  - type: text
    content: 'Teo ankilan’io, i Malkià isan’ny mpanefy volamena dia namboatra laniny tafapaka amin’ny tranon’ireo mpanampy ny levita sy ny tranon’ireo mpivarotra, izany hoe eo anoloan’ny vavahady Mifikada, ka miafara amin’ny trano fitiliana teo amin’ny zoron’ny manda. '
  '32':
  - type: text
    content: Ary ny mpanefy volamena sy ny mpivarotra no namboatra ny laniny teo anelanelan’ny trano fitiliana sy ny vavahadin’ny Ondry
  - type: note
    content: 'jereo and 1: voahodidina tanteraka ny tanàna.'
  - type: text
    content: .
  - type: heading
    content: Te hisakana ny fanamboarana ny manda ireo fahavalo
  '33':
  - type: text
    content: Rehefa ren’i Sanebalato fa amboarinay indray ny manda, dia tezitra sady nisafoaka mafy izy; nihomehy anay Jiosy koa izy
  - type: note
    content: Amin’ny dkt sasantsasany dia voalahatra ho 4.1-6 ny 3.33-38.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'sady niteny teo anatrehan’ny namany sy ny miaramilan’i Samaria hoe:'
  - type: text
    content: '–Inona no ataon’ireo Jiosy osa ireo? Afaka hanamafy ny manda ve ry zareo ka hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' amin’Andriamanitra? Hahavita asa anio ihany ve ireo ka hahatsangana ny vato avy amin’ny lavenona miavosa?'
  '35':
  - type: text
    content: 'I Tôbià, ilay Hamônita, dia teo anilan’i Sanebalato ka niteny hoe:'
  - type: text
    content: –Na fosa iray aza no miakatra eo amin’ny manda atsangan’ireo, dia haharava izany!
  '36':
  - type: text
    content: 'Ary hoy aho hoe: «Mihainoa, ry Andriamanitray, fa atao tsinontsinona izahay; koa atsingereno aminy re ny latsa afitsony anay, ary aoka izy ho voatebaka any amin’ny tany izay hamaboana azy. '
  '37':
  - type: text
    content: Aza avela ny helony ary aza vonoina tsy ho eo anatrehanao ny fahotany, satria Ianao efa notevatevainy teo anatrehan’ireo mpandrafitra.»
  '38':
  - type: text
    content: Dia narafitray ihany ny manda ka voatsangana manontolo hatreo amin’ny antsasaky ny haavony; fa nazoto niasa ny olona.
  '4':
  - type: text
    content: 'Teo an-kilan’ireo no namboatra ny manda i Meremôta zanakalahin’i Onà sy zafin’i Hakôtsa; nanarakaraka azy i Mesolama zanakalahin’i Besekià sy zafin’i Mesezabela; ary nanarakaraka io indray i Tsadôka zanakalahin’i Bahanà. '
  '5':
  - type: text
    content: Teo an-kilan’i Tsadôka dia namboatra koa ny mponin’i Tekôa, nefa ny loholony tsy nety hofehezin’ireo mpiandraikitra ny asa.
  '6':
  - type: text
    content: Ny vavahadin’i Jesanà
  - type: note
    content: 'vavahadin’i Jesanà: dia teo amin’ny zoro avaratra andrefan’ny tanàna.'
  - type: text
    content: ' dia namboarin’i Jôiadà, zanakalahin’i Pasea, sy i Mesolama, zanakalahin’i Besôdià: napetak’izy roa lahy ny sakamandimby ary nalatsany ny lela-vavahady mbamin’ny hidiny sy barany. '
  '7':
  - type: text
    content: Nanarakaraka ireo, dia i Melatià ilay Gibehônita sy i Jadôna ilay Merônôtita, mbamin’ny mponin’i Gibehôna sy ny mponin’i Mitsepà no namboatra ny manda hatreo akaikin’ny trano fonenan’ny governora
  - type: note
    content: 'hatreo... governora: manjavozavo ihany ny rijan-teny hebreo; dkt hafa ho fiantoana asan’ny governora.'
  - type: text
    content: ' mpifehy ny faritra etỳ andafy andrefan’ny ony Eofrata. '
  '8':
  - type: text
    content: 'Teo an-kilan’ireo no namboatra koa i Hoziela, zanakalahin’i Harahaià sady isan’ny mpanefy volamena, ary nanarakaraka azy i Hananià isan’ny mpanao zava-manitra: tafapaka amin’ny manda malalaka ny asa nanamafisan’izy roa lahy an’i Jerosalema'
  - type: note
    content: 'nanamafisan’izy... Jerosalema: dkt hafa vao nandao an’i Jerosalema izy roa lahy.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Namboatra nanarakaraka azy i Refaià zanakalahin’i Hora sady komandin’ny antsasaky ny faritr’i Jerosalema. '
