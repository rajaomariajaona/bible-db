document_id: NEH.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ajoron’ny Jiosy indray ny mandan’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia nanomboka asa i Eliasiba mpisorombe mbamin’ireo mpisorona namany, ka niara-namboatra ny vavahadin’ny Ondry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vavahadin’ny ondry: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia teo amin ny zoro avaratra-atsinanana amin’ny mandan’ny tanàna. –Ny famisavisana ny asa tontosaina dia mitohy hatramin’ny and 32, ka mitety ny manda lafy andrefana sy atsimo ary atsinanana sy avaratra. Maro ny anarana tilikambo sy vavahady no tsy hita afa-tsy eto ka saro-pantarina mihitsy ny tena toerana misy azy. Ny naoty manarakaraka dia manome toerana vitsivitsy voamarika mazava.
      marker-yv: yv-n
    - type: text
      text: '; dia nanamasina izany ry zareo, vao nandatsaka ny lela-vavahadiny. Ary nohamasininy koa ny manda hatrany amin’ny tilikambon’ny Zatolahy sy ny tilikambo Hananela. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nanarakaraka io, dia i Jedaià zanakalahin’i Haromafa no namboatra ny manda tandrifin’ny tranony; ary teo an-kilan’io, dia i Hatosy zanakalahin’i Hasabneià. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny laniny hafa amin’ny manda misy ny tilikambon’ny Fatana kosa dia namboarin’i Malkià, zanakalahin’i Harima, sy i Hasoba zanakalahin’i Pahata-Môaba. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nanarakaraka azy roa lahy, dia i Saloma zanakalahin’i Lôhesy sady komandin’ny antsasaky ny faritr’i Jerosalema, no namboatra niaraka tamin’ny zanany vavy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny vavahadin’ny Lohasaha dia namboarin’i Hanona sy ny mponin’i Zanôa: ireo no nandrafitra izany sy nandatsaka ny lela-vavahady mbamin’ny hidiny sy barany; ireo koa no namboatra ny manda dimanjato metatra tafapaka amin’ny vavahadin’ny Fanariam-pako'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: vavahadin’ny Lohasaha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vavahadin’ny Fanariam-pako:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.13 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny vavahadin’ny Fanariam-pako dia namboarin’i Malkià zanakalahin’i Rekaba sady komandin’ny faritr’i Bety-Kerema: izy no nandrafitra izany sy nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy barany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny vavahadin’ny Loharano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vavahadin’ny Loharano: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.14 sy nta. –Salona na Saloma.
      marker-yv: yv-n
    - type: text
      text: ' dia namboarin’i Salona zanakalahin’i Kôla-Hôze sady komandin’ny faritr’i Mitsepà: izy no nandrafitra ny nanafo izany ary nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy barany; izy koa no namboatra ny manda manamorona ilay farihin’ny lakan-drano mankany amin’ny sahan’ny mpanjaka, ary tafapaka amin’ny ambaratonga midina avy any an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nanarakaraka an’i Saloma, dia i Nehemià, zanakalahin’i Hazboko sady komandin’ny antsasaky ny faritr’i Bety-Tsora, no namboatra ny manda ka tafapaka tandrifin’ireo fasan’i Davida sy ny dobo izay natao ary ny trano fonenan’ny miaramila maherifo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nanarakaraka an’i Nehemià, dia namboatra koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' notarihin’i Rehoma zanakalahin’i Banỳ; ary teo an-kilan’ireo i Hasabià, komandin’ny antsasaky ny faritr’i Kehilà, dia namboatra ny manda ho an’ny faritra feheziny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nanarakaraka azy dia namboatra koa ny levita namany notarihin’i Binoy zanakalahin’i Henadada sady komandin’ny antsasaky ny faritr’i Kehilà; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary teo an-kilan’ireo, i Hezera, zanakalahin’i Jesoa sady komandin’i Mitsepà, dia namboatra laniny hafa amin’ny manda, tandrifin’ny fiakarana ho any amin’ny fitehirizam-piadiana eo amin’ny zoro. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Teo an-kilan’ireo, ny mponin’i Jerikao no namboatra ny manda, ary nanarakaraka ireto indray i Zakora zanakalahin’i Imry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nanarakaraka azy dia i Baraka, zanakalahin’i Zabay, no nazoto namboatra laniny hafa manomboka eo amin’ny zoro ka miafara amin’ny varavaran’ny tranon’i Eliasiba mpisorombe; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary teo ankilan’io i Meremôta, zanakalahin’i Orià sy zafin’i Hakôtsa, dia namboatra laniny hafa manomboka eo amin’ny varavaran’ny tranon’i Eliasiba ka tafapaka amin’ny faran’ny tranon’i Eliasiba.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nanarakaraka an’i Baròka, dia namboatra ny manda koa ny mpisorona avy amin’ny manodidina an’i Jerosalema. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Teo ankilan’ireo dia i Benjamîna sy i Hasoba no namboatra laniny tandrifin’ny tranony ihany; ary nanarakaraka azy dia nisy namboarin’i Hazarià zanakalahin’i Mahaseià sy zafin’i Hananià, ny teo anilan’ny tranony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nanarakaraka io, dia i Binoy zanakalahin’i Henadada kosa no namboatra ny laniny hafa manomboka eo amin’ny tranon’i Hazarià ka miafara amin’ny fiolahana eo an-jorony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Teo an-kilan’i Binoy, dia namboatra koa i Palala zanakalahin’i Ozay manomboka eo amin’ny zoro ka miafara amin’ny tilikambo ambony eo alohan’ny tranon’ny mpanjaka sady eo akaikin’ny tokotanin’ny Fonja. Nanarakaraka azy dia i Pedaià, zanakalahin’i Parehôsy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: sy ireo mpanampy ny levita nitoetra tao Hôfela no namboatra laniny tafapaka amin’ny tilikambo mandroso, izany hoe eo atsinanan’ny Vavahadin-drano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Tan 27.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nanarakaraka ireo, ny mponin’i Tekôa dia namboatra laniny hafa manomboka eo an-tandrifin’ny tilikambo lehibe mandroso ka miafara amin’ny mandan’i Hôfela. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Manomboka eo amin’ny vavahadin-tsoavaly, dia samy namboatra ny manda tandrifin’ny tranony avy ny mpisorona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Teo ankilan’ireo dia namboatra ny laniny tandrifin’ny tranony koa i Tsadôka zanakalahin’i Imera; nanarakaraka azy dia i Semahià zanakalahin’i Sekanià sady mpiandry ny vavahady atsinanana no namboatra ny manda. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny vavahadin’ny Trondro dia namboarin’ny terak’i Senaà: napetany ny sakamandimby, ary nalatsany ny lela-vavahady mbamin’ny hidiny sy barany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nanarakaraka an’i Semahià, dia namboatra laniny hafa i Hananià, zanakalahin’i Selemià, sy i Hanona, fahenin’ny zanakalahin’i Tsalafa; nanarakaraka azy roa lahy, dia i Mesolama zanak’i Berekià no namboatra tandrifin’ny efitranony. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Teo ankilan’io, i Malkià isan’ny mpanefy volamena dia namboatra laniny tafapaka amin’ny tranon’ireo mpanampy ny levita sy ny tranon’ireo mpivarotra, izany hoe eo anoloan’ny vavahady Mifikada, ka miafara amin’ny trano fitiliana teo amin’ny zoron’ny manda. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary ny mpanefy volamena sy ny mpivarotra no namboatra ny laniny teo anelanelan’ny trano fitiliana sy ny vavahadin’ny Ondry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo and 1: voahodidina tanteraka ny tanàna.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Te hisakana ny fanamboarana ny manda ireo fahavalo
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Rehefa ren’i Sanebalato fa amboarinay indray ny manda, dia tezitra sady nisafoaka mafy izy; nihomehy anay Jiosy koa izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny dkt sasantsasany dia voalahatra ho 4.1-6 ny 3.33-38.
      marker-yv: yv-n
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'sady niteny teo anatrehan’ny namany sy ny miaramilan’i Samaria hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona no ataon’ireo Jiosy osa ireo? Afaka hanamafy ny manda ve ry zareo ka hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' amin’Andriamanitra? Hahavita asa anio ihany ve ireo ka hahatsangana ny vato avy amin’ny lavenona miavosa?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'I Tôbià, ilay Hamônita, dia teo anilan’i Sanebalato ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na fosa iray aza no miakatra eo amin’ny manda atsangan’ireo, dia haharava izany!
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary hoy aho hoe: «Mihainoa, ry Andriamanitray, fa atao tsinontsinona izahay; koa atsingereno aminy re ny latsa afitsony anay, ary aoka izy ho voatebaka any amin’ny tany izay hamaboana azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Aza avela ny helony ary aza vonoina tsy ho eo anatrehanao ny fahotany, satria Ianao efa notevatevainy teo anatrehan’ireo mpandrafitra.»
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Dia narafitray ihany ny manda ka voatsangana manontolo hatreo amin’ny antsasaky ny haavony; fa nazoto niasa ny olona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Teo an-kilan’ireo no namboatra ny manda i Meremôta zanakalahin’i Onà sy zafin’i Hakôtsa; nanarakaraka azy i Mesolama zanakalahin’i Besekià sy zafin’i Mesezabela; ary nanarakaraka io indray i Tsadôka zanakalahin’i Bahanà. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Teo an-kilan’i Tsadôka dia namboatra koa ny mponin’i Tekôa, nefa ny loholony tsy nety hofehezin’ireo mpiandraikitra ny asa.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny vavahadin’i Jesanà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vavahadin’i Jesanà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia teo amin’ny zoro avaratra andrefan’ny tanàna.
      marker-yv: yv-n
    - type: text
      text: ' dia namboarin’i Jôiadà, zanakalahin’i Pasea, sy i Mesolama, zanakalahin’i Besôdià: napetak’izy roa lahy ny sakamandimby ary nalatsany ny lela-vavahady mbamin’ny hidiny sy barany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nanarakaraka ireo, dia i Melatià ilay Gibehônita sy i Jadôna ilay Merônôtita, mbamin’ny mponin’i Gibehôna sy ny mponin’i Mitsepà no namboatra ny manda hatreo akaikin’ny trano fonenan’ny governora
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hatreo... governora: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manjavozavo ihany ny rijan-teny hebreo; dkt hafa ho fiantoana asan’ny governora.
      marker-yv: yv-n
    - type: text
      text: ' mpifehy ny faritra etỳ andafy andrefan’ny ony Eofrata. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Teo an-kilan’ireo no namboatra koa i Hoziela, zanakalahin’i Harahaià sady isan’ny mpanefy volamena, ary nanarakaraka azy i Hananià isan’ny mpanao zava-manitra: tafapaka amin’ny manda malalaka ny asa nanamafisan’izy roa lahy an’i Jerosalema'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanamafisan’izy... Jerosalema: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt hafa vao nandao an’i Jerosalema izy roa lahy.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Namboatra nanarakaraka azy i Refaià zanakalahin’i Hora sady komandin’ny antsasaky ny faritr’i Jerosalema. '
