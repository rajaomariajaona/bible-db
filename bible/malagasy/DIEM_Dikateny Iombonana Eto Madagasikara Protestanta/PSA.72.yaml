document_id: PSA.72,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Vavaka mba hitahian’Andriamanitra ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’i Salômôna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, omeo ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany fahaizanao mitsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeo ity taranak’andriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany fitandroanao ny rariny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny mpanjakan’i Tarsisy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.10a '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Tarsisy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia tanàna any amoron’ny Ranomasina Mediteranea ilany andrefana, lavitra dia lavitra an’i Palestinina; teo amin’ny morontsirak’i Espaina angamba izy izany. Misy aza mihevitra fa i Espaina mihitsy no nantsoina hoe Tarsisy fahizany.
      marker-yv: yv-n
    - type: text
      text: ' sy ny an’ireo nosy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handefa fanomezana ho azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpanjakan’i Sabà sy ny an’i Sebà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.10b '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Sabà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia toa iny Arabia ilany atsimo iny. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: I Sebà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa dia angamba i Sodàna ilany avaratra ankehitriny na i Iemena (jereo Is 43.3; 45.14).'
      marker-yv: yv-n
    - type: text
      text: ' kosa'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho avy handoa hetra aminy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny mpanjaka hafa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiankohoka eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny firenen-drehetra hanompo azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny, hafahan’ity mpanjaka ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mahantra miantso vonjy aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ory tsy mba manan-kanampy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hangorahany ny osa sy mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hovonjeny ny ain’izy ireo,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: hotsoahany amin’ny fampahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny fanaovana an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria sarobidy eo imasony.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ho ela velona anie ny mpanjaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho volamena avy any Sabà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hatao fanomezana ho azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie izy harahim-bavaka lalandava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: horarîna soa
    - type: text
      text: ' isan’andro isan’andro!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hahavokatra vary betsaka anie ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany an-tampon-tendrombohitra aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aoka hihondrahondra ny vokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hilonjehitra toy ny any Libano ny salohy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mponina isan-tanàna anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiroborobo toy ny ahitra eny an-tsaha!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny lazan’ny mpanjaka anie ho mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hitatra hatrany eto ambany masoandro!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy anie ho fitahiana ireo fokon’ny tany tontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hataon’ny firenena rehetra hoe: «Sambatra!»'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hisaorana anie ny TOMPO Andriamanitr’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay hany mahefa zava-mahagaga!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hisaorana mandrakizay anie ny anarany malaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny tany tontolo ho henika ny voninahiny!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: '! Amen!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aoka hoentiny ara-drariny sy hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo malahelonao, dia ny vahoakanao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tapitra eto ny tonombavak’i Davida zanakalahin’i
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jisay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa fanambinana sy rariny ho an’ny vahoaka anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hovokarin’ny tendrombohitra sy ny havoana!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Homeny rariny sy hovonjeny anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny malahelo sy ny mahantra amin’ny vahoaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny mpamoritra kosa hopotehiny!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Enga anie ity mpanjaka ity sy ireo taranany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haharitra mandritra ny taona mifandimby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola hamiratra koa ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mbola hanazava koa izany volana!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka izy ho tahaka ny erika mifafy amin’ny vilona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka ny oram-baventy manondraka ny tany!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Amin’ny androny anie dia hamony ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiroborobo mandavantaona ny fiadanana!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka izy hanjaka hatreo amin’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hatrany amin’ny ranomasina hafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hatreo amin’ny Ranomasina Maty ka hatrany amin’ny Ranomasina Mediteranea; jereo Za 9.10.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanjaka manomboka amin’ny ony Eofrata
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tafapaka amin’ny faran’ny tany!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny mpanohitra azy handohalika eo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahavalony hihohoka am-bovoka.
