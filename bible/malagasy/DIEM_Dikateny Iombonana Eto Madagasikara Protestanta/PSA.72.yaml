document_id: PSA.72,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka mba hitahian’Andriamanitra ny mpanjaka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’i Salômôna.
  - type: text
    content: Andriamanitra ô, omeo ny mpanjaka
  - type: text
    content: izany fahaizanao mitsara;
  - type: text
    content: omeo ity taranak’andriana
  - type: text
    content: izany fitandroanao ny rariny.
  '10':
  - type: text
    content: Ny mpanjakan’i Tarsisy
  - type: note
    content: 'I Tarsisy: dia tanàna any amoron’ny Ranomasina Mediteranea ilany andrefana, lavitra dia lavitra an’i Palestinina; teo amin’ny morontsirak’i Espaina angamba izy izany. Misy aza mihevitra fa i Espaina mihitsy no nantsoina hoe Tarsisy fahizany.'
  - type: text
    content: ' sy ny an’ireo nosy'
  - type: text
    content: dia handefa fanomezana ho azy;
  - type: text
    content: ny mpanjakan’i Sabà sy ny an’i Sebà
  - type: note
    content: I Sabà dia toa iny Arabia ilany atsimo iny. –I Sebà kosa dia angamba i Sodàna ilany avaratra ankehitriny na i Iemena (jereo Is 43.3; 45.14).
  - type: text
    content: ' kosa'
  - type: text
    content: ho avy handoa hetra aminy.
  '11':
  - type: text
    content: Ny mpanjaka hafa rehetra
  - type: text
    content: hiankohoka eo anatrehany;
  - type: text
    content: ary ny firenen-drehetra hanompo azy.
  '12':
  - type: text
    content: Eny, hafahan’ity mpanjaka ity
  - type: text
    content: ny mahantra miantso vonjy aminy
  - type: text
    content: sy ny ory tsy mba manan-kanampy.
  '13':
  - type: text
    content: Hangorahany ny osa sy mahantra
  - type: text
    content: ka hovonjeny ny ain’izy ireo,
  '14':
  - type: text
    content: hotsoahany amin’ny fampahoriana
  - type: text
    content: sy amin’ny fanaovana an-keriny
  - type: text
    content: satria sarobidy eo imasony.
  '15':
  - type: text
    content: Ho ela velona anie ny mpanjaka!
  - type: text
    content: Aoka ho volamena avy any Sabà
  - type: text
    content: no hatao fanomezana ho azy!
  - type: text
    content: Enga anie izy harahim-bavaka lalandava
  - type: text
    content: 'sady '
  - type: text
    content: horarîna soa
  - type: text
    content: ' isan’andro isan’andro!'
  '16':
  - type: text
    content: Hahavokatra vary betsaka anie ny tany;
  - type: text
    content: hatrany an-tampon-tendrombohitra aza
  - type: text
    content: no aoka hihondrahondra ny vokatra
  - type: text
    content: ka hilonjehitra toy ny any Libano ny salohy!
  - type: text
    content: Ary ny mponina isan-tanàna anie
  - type: text
    content: hiroborobo toy ny ahitra eny an-tsaha!
  '17':
  - type: text
    content: Ny lazan’ny mpanjaka anie ho mandrakizay
  - type: text
    content: ka hitatra hatrany eto ambany masoandro!
  - type: text
    content: Izy anie ho fitahiana ireo fokon’ny tany tontolo
  - type: text
    content: 'ka hataon’ny firenena rehetra hoe: «Sambatra!»'
  '18':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitr’i Israely,
  - type: text
    content: Ilay hany mahefa zava-mahagaga!
  '19':
  - type: text
    content: Hisaorana mandrakizay anie ny anarany malaza;
  - type: text
    content: ary aoka ny tany tontolo ho henika ny voninahiny!
  - type: text
    content: Amen
  - type: text
    content: '! Amen!'
  '2':
  - type: text
    content: Aoka hoentiny ara-drariny sy hitsiny
  - type: text
    content: ireo malahelonao, dia ny vahoakanao.
  '20':
  - type: text
    content: ' '
  - type: text
    content: Tapitra eto ny tonombavak’i Davida zanakalahin’i
  - type: text
    content: ' '
  - type: text
    content: Jisay.
  '3':
  - type: text
    content: Koa fanambinana sy rariny ho an’ny vahoaka anie
  - type: text
    content: no hovokarin’ny tendrombohitra sy ny havoana!
  '4':
  - type: text
    content: Homeny rariny sy hovonjeny anie
  - type: text
    content: ny malahelo sy ny mahantra amin’ny vahoaka,
  - type: text
    content: fa ny mpamoritra kosa hopotehiny!
  '5':
  - type: text
    content: Enga anie ity mpanjaka ity sy ireo taranany
  - type: text
    content: haharitra mandritra ny taona mifandimby,
  - type: text
    content: raha mbola hamiratra koa ny masoandro
  - type: text
    content: ary mbola hanazava koa izany volana!
  '6':
  - type: text
    content: Aoka izy ho tahaka ny erika mifafy amin’ny vilona,
  - type: text
    content: ho tahaka ny oram-baventy manondraka ny tany!
  '7':
  - type: text
    content: Amin’ny androny anie dia hamony ny rariny
  - type: text
    content: ary hiroborobo mandavantaona ny fiadanana!
  '8':
  - type: text
    content: Aoka izy hanjaka hatreo amin’ny ranomasina
  - type: text
    content: ka hatrany amin’ny ranomasina hafa
  - type: note
    content: Hatreo amin’ny Ranomasina Maty ka hatrany amin’ny Ranomasina Mediteranea; jereo Za 9.10.
  - type: text
    content: ','
  - type: text
    content: ary hanjaka manomboka amin’ny ony Eofrata
  - type: text
    content: ka tafapaka amin’ny faran’ny tany!
  '9':
  - type: text
    content: Ny mpanohitra azy handohalika eo anoloany
  - type: text
    content: ary ny fahavalony hihohoka am-bovoka.
