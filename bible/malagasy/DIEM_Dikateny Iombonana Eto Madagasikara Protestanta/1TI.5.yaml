document_id: 1TI.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Adidy amin’ny havana iray finoana.
  - type: text
    content: Aza levilevena ny lehilahy efa zokiolona fa anaro toy ny rainao izy
  - type: note
    content: Ampit Fisor 19.32.
  - type: text
    content: '; ny zatovolahy, ento toy ny rahalahy; '
  '10':
  - type: text
    content: ary tsara laza amin’ny asa soa vitany; vehivavy nitaiza tsara ny zanany, nampiantrano vahiny, nanasa ny tongotr’ireo namana kristianina
  - type: note
    content: 'Nanasa ny tongotra: fomba fanaon’ny mpanompo rehefa misy vahiny miditra ao an-trano ny manasa ny tongotr’ilay vahiny; ka mari-panetrentena sy fitiavana izany ho an’ny kristianina (ampit Lk 7.44; Jôh 13.4-15).'
  - type: text
    content: ', nanampy ny nozoim-pahoriana, nazoto tamin’ny asa soa isan-karazany.'
  '11':
  - type: text
    content: 'Aza ekena ho anaty lisitra ireo mpitondratena mbola tanora, satria rehefa voan’ny filàm-pahafinaretana izy dia miala amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ary te hanambady indray; '
  '12':
  - type: text
    content: 'ka manjary meloka ireo, satria mivadika tamin’ilay toky nomeny an’i Kristy tam-boalohany. '
  '13':
  - type: text
    content: 'Ary tsy vitan’izany, fa mianatra mandany andro miriorio mitety tranon’olona koa ireo; ary tsy hoe mandany andro fotsiny, fa mipentsompentsona, manao zavatra tsisy antony etsy sy eroa miresaka zavatra tsy tokony horesahina. '
  '14':
  - type: text
    content: 'Koa tiako mba hanambady indray ireo vehivavy mpitondratena mbola tanora, ka dia hanan-janaka sy hitondra ny tokantranony mba tsy hohararaotin’ny fahavalontsika hitenenan-dratsy antsika. '
  '15':
  - type: text
    content: 'Efa nisy sasantsasany nivily sahady nanaraka an’i Satàna. '
  '16':
  - type: text
    content: Raha misy vehivavy mpino, manan-kavana mpitondratena, dia aoka izy hanampy azy; fa tsy hamela azy hanahirana ny Fiangonana; amin’izay ny Fiangonana dia ho afa-manampy ireo tena mpitondratena.
  - type: heading
    content: Ny loholona
  '17':
  - type: text
    content: Aoka ny loholona tsara fitondra ny Fiangonana handray valin-kasasarana avo roa heny
  - type: note
    content: 'valin-kasasarana avo roa heny (jereo and 18): dkt hafa avo roa heny.'
  - type: text
    content: ', indrindra fa ireo mikely aina amin’ny fitorian-teny sy ny fampianarana. '
  '18':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Aza akombona ny vavan’ny omby mively vary», ary koa hoe: «Mendrika hahazo ny karamany ny mpiasa'
  - type: note
    content: Jereo Fifan 25.4 sy 1 Kôr 9.9; Mt 10.10; Lk 10.7.
  - type: text
    content: '.» '
  '19':
  - type: text
    content: Aza mandray teny fiampangana loholona, raha tsy misy vavolombelona roa na telo
  - type: note
    content: Ampit Fifan 19.15.
  - type: text
    content: '. '
  '2':
  - type: text
    content: ny vehivavy efa zokiolona, ento toy ny reny; ary ny zatovovavy, ento toy ny anabavy, amin’ny fahadiovana tanteraka.
  '20':
  - type: text
    content: Izay loholona manota dia teneno eo anatrehan’ny besinimaro mba hatahotra koa ny sasany.
  '21':
  - type: text
    content: 'Eo imason’Andriamanitra sy i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ary ny '
  - type: text
    content: anjely
  - type: text
    content: ' masina no ameperako mafy anao: tandremo tsara ireo torohevitra ireo, ka tsy hisy fizahàn-tavan’olona na fiangarana amin’izay ataonao. '
  '22':
  - type: text
    content: Aza maika loatra mametra-tanana amin’olona mba hanokana azy amin’ny asan’ny Tompo. Aza miombona ota amin’ny sasany; tahirizo madio ny tenanao.
  '23':
  - type: text
    content: Aoka tsy dia ho rano fotsiny ihany no ho fisotronao, fa misotroa divay kely koa noho ny ambavafonao ary noho ny fahosaosanao matetika.
  '24':
  - type: text
    content: 'Miharihary ny fahotan’ny olona sasany, dieny alohan’ny famotopotorana; fa ny an’ny sasany kosa atỳ aorian’ny famotopotorana vao miseho. '
  '25':
  - type: text
    content: Miharihary toy izany koa ny asa tsara; ary na izay tsy miharihary avy hatrany aza, dia tsy hay afenina
  - type: note
    content: Tokony hampifandraisina amin’ny and 22 eo aloha kely ireto andininy 24-25 ireto.
  - type: text
    content: .
  '3':
  - type: text
    content: Hajao ny vehivavy mpitondratena, dia ireo tena mpitondratena tokoa
  - type: note
    content: Ny vehivavy mpitondratena lazaina eto dia ireo tsy misy fianakaviana mba miahy azy.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Raha manana zanaka aman-jafy ilay vehivavy mpitondratena, dia aoka ireo aloha hianatra haneho ny toe-panahy araka an’Andriamanitra amin’ny fianakaviany ka hamaly babena ny ray aman-dreniny na ny raibe aman-drenibeny, fa izany no ankasitrahin’Andriamanitra. '
  '5':
  - type: text
    content: 'Ny vehivavy, tena mpitondratena tokoa sady tsy mana-mpiahy, dia efa nametraka ny fanantenany amin’Andriamanitra, ka mivavaka hatrany ary mangataka hampian’Andriamanitra andro aman’alina. '
  '6':
  - type: text
    content: 'Fa ny mpitondratena, manaram-po amin’ny fahafinaretana, dia efa maty fanahy mbola velona. '
  '7':
  - type: text
    content: 'Izany no anafatrafaro ny vehivavy mpitondratena sy ny fianakaviany, mba tsy hananany tsiny. '
  '8':
  - type: text
    content: Fa raha misy tsy mahakarakara ny havany, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy kokoa noho ny tsy mpino.
  '9':
  - type: text
    content: Aza atao lisitra ho isan’ny vehivavy mpitondratena afa-tsy izay mihoatra ny enimpolo taona sady indray mandeha ihany no nanambady
  - type: note
    content: Amin’izany lisitra izany no misy ny anaran’ireo mpitondratena tokony hokarakarain’ny Fiangonana (ampit and 16).
  - type: text
    content: ', '
