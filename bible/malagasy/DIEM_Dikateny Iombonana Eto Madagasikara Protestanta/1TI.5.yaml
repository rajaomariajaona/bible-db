document_id: 1TI.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adidy amin’ny havana iray finoana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza levilevena ny lehilahy efa zokiolona fa anaro toy ny rainao izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Fisor 19.32.
      marker-yv: yv-n
    - type: text
      text: '; ny zatovolahy, ento toy ny rahalahy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tsara laza amin’ny asa soa vitany; vehivavy nitaiza tsara ny zanany, nampiantrano vahiny, nanasa ny tongotr’ireo namana kristianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'Nanasa ny tongotra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fomba fanaon’ny mpanompo rehefa misy vahiny miditra ao an-trano ny manasa ny tongotr’ilay vahiny; ka mari-panetrentena sy fitiavana izany ho an’ny kristianina (ampit Lk 7.44; Jôh 13.4-15).
      marker-yv: yv-n
    - type: text
      text: ', nanampy ny nozoim-pahoriana, nazoto tamin’ny asa soa isan-karazany.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza ekena ho anaty lisitra ireo mpitondratena mbola tanora, satria rehefa voan’ny filàm-pahafinaretana izy dia miala amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ary te hanambady indray; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka manjary meloka ireo, satria mivadika tamin’ilay toky nomeny an’i Kristy tam-boalohany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy vitan’izany, fa mianatra mandany andro miriorio mitety tranon’olona koa ireo; ary tsy hoe mandany andro fotsiny, fa mipentsompentsona, manao zavatra tsisy antony etsy sy eroa miresaka zavatra tsy tokony horesahina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tiako mba hanambady indray ireo vehivavy mpitondratena mbola tanora, ka dia hanan-janaka sy hitondra ny tokantranony mba tsy hohararaotin’ny fahavalontsika hitenenan-dratsy antsika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nisy sasantsasany nivily sahady nanaraka an’i Satàna. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy vehivavy mpino, manan-kavana mpitondratena, dia aoka izy hanampy azy; fa tsy hamela azy hanahirana ny Fiangonana; amin’izay ny Fiangonana dia ho afa-manampy ireo tena mpitondratena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ny loholona tsara fitondra ny Fiangonana handray valin-kasasarana avo roa heny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'valin-kasasarana avo roa heny '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(jereo and 18): dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: avo roa heny.
      marker-yv: yv-n
    - type: text
      text: ', indrindra fa ireo mikely aina amin’ny fitorian-teny sy ny fampianarana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe: «Aza akombona ny vavan’ny omby mively vary», ary koa hoe: «Mendrika hahazo ny karamany ny mpiasa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Fifan 25.4 sy 1 Kôr 9.9; Mt 10.10; Lk 10.7.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mandray teny fiampangana loholona, raha tsy misy vavolombelona roa na telo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Fifan 19.15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny vehivavy efa zokiolona, ento toy ny reny; ary ny zatovovavy, ento toy ny anabavy, amin’ny fahadiovana tanteraka.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay loholona manota dia teneno eo anatrehan’ny besinimaro mba hatahotra koa ny sasany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo imason’Andriamanitra sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' masina no ameperako mafy anao: tandremo tsara ireo torohevitra ireo, ka tsy hisy fizahàn-tavan’olona na fiangarana amin’izay ataonao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza maika loatra mametra-tanana amin’olona mba hanokana azy amin’ny asan’ny Tompo. Aza miombona ota amin’ny sasany; tahirizo madio ny tenanao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka tsy dia ho rano fotsiny ihany no ho fisotronao, fa misotroa divay kely koa noho ny ambavafonao ary noho ny fahosaosanao matetika.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miharihary ny fahotan’ny olona sasany, dieny alohan’ny famotopotorana; fa ny an’ny sasany kosa atỳ aorian’ny famotopotorana vao miseho. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miharihary toy izany koa ny asa tsara; ary na izay tsy miharihary avy hatrany aza, dia tsy hay afenina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tokony hampifandraisina amin’ny and 22 eo aloha kely ireto andininy 24-25 ireto.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hajao ny vehivavy mpitondratena, dia ireo tena mpitondratena tokoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: vehivavy mpitondratena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' lazaina eto dia ireo tsy misy fianakaviana mba miahy azy.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha manana zanaka aman-jafy ilay vehivavy mpitondratena, dia aoka ireo aloha hianatra haneho ny toe-panahy araka an’Andriamanitra amin’ny fianakaviany ka hamaly babena ny ray aman-dreniny na ny raibe aman-drenibeny, fa izany no ankasitrahin’Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vehivavy, tena mpitondratena tokoa sady tsy mana-mpiahy, dia efa nametraka ny fanantenany amin’Andriamanitra, ka mivavaka hatrany ary mangataka hampian’Andriamanitra andro aman’alina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpitondratena, manaram-po amin’ny fahafinaretana, dia efa maty fanahy mbola velona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no anafatrafaro ny vehivavy mpitondratena sy ny fianakaviany, mba tsy hananany tsiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha misy tsy mahakarakara ny havany, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy kokoa noho ny tsy mpino.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza atao lisitra ho isan’ny vehivavy mpitondratena afa-tsy izay mihoatra ny enimpolo taona sady indray mandeha ihany no nanambady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’izany '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lisitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izany no misy ny anaran’ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpitondratena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tokony hokarakarain’ny Fiangonana (ampit and 16).'
      marker-yv: yv-n
    - type: text
      text: ', '
