    marker: w
    children:
    - type: text
      text: mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'izay mpamitaka ny vahoakako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Raha misy mahafoy hokepohiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia iantsoany ‹Fiadanana›.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay tsy manome zavatra hataony am-bava kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hananganany ady manokana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Noho izany, foana ny fisehoam-pahitana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny alina no ho aminareo mpaminany mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana koa ny fanambaràna ny ho avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny haizina no hanarona anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hilentika aminareo ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho maizina aminareo ny andro!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia ho menatra ny mpaminany isehoam-pahitana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hangaihay ny mpanambara ny ho avy;
- type: usfm
  marker: q1
  children:
  - type: text
