        text: fihetsika manambara fahalotoana eo anatrehan’Andriamanitra (jereo Lev 13.45).
    marker-yv: yv-n
  - type: text
    text: ' avokoa izy rehetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy namaly azy intsony Andriamanitra.
- type: usfm
  marker: q1
