document_id: MIC.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana ireo mpitondra
  - type: text
    content: 'Dia hoy aho hoe:'
  - type: text
    content: Ry mpitondra ny taranak’i Jakôba,
  - type: text
    content: eny, ry mpitsara ny vahoakan’i Israely
  - type: note
    content: 'taranak’i Jakôba, vahoaka Israely: toa ny Israelita ao amin’ny fanjakan’i Joda no tenenina eto, ka tafiditra anatin’izany koa ireo tavaratra nifindra monina tao atsimo taorian’ny fandravana an’i Samaria.'
  - type: text
    content: ','
  - type: text
    content: mihainoa re ianareo.
  - type: text
    content: Moa tsy anjara raharahanareo ve
  - type: text
    content: ny hahafantatra ny rariny?
  '10':
  - type: text
    content: Amin’ny fandatsahan-dra no anorenanareo an’i Tsiôna;
  - type: text
    content: amin’ny famoretana no anorenanareo an’i Jerosalema.
  '11':
  - type: text
    content: Ny mpitondra azy mitsara mba hahazoana tsolotra;
  - type: text
    content: 'ny '
  - type: text
    content: mpisorony
  - type: text
    content: ' mampianatra ny lalàna'
  - type: text
    content: mba hahazoana karama;
  - type: text
    content: 'ary ny '
  - type: text
    content: mpaminaniny
  - type: text
    content: ' manambara ny ho avy'
  - type: text
    content: mba hahazoana vola.
  - type: text
    content: Kanefa dia mbola miankina amin’ny TOMPO ihany ireo
  - type: text
    content: 'ka miteny hoe:'
  - type: text
    content: «Tsy eto anivontsika ve ny TOMPO?
  - type: text
    content: Tsia, tsy hisy loza hanjo antsika.»
  '12':
  - type: text
    content: Koa, noho ny aminareo,
  - type: text
    content: 'i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' dia hasaina toy ny tanimboly;'
  - type: text
    content: i Jerosalema ho tonga korotam-bato;
  - type: text
    content: 'ary ny tendrombohitra misy ilay '
  - type: text
    content: tempoly
  - type: text
    content: ho rakotry ny kirihitra ala
  - type: note
    content: Io and io dia voatsiahy ao amin’ny Jer 26.18.
  - type: text
    content: .
  '2':
  - type: text
    content: Kanefa dia ny tsara no halanareo
  - type: text
    content: ary ny ratsy no tianareo,
  - type: text
    content: ka endahanareo mbamin’ny hoditry ny olona
  - type: text
    content: sy ny nofony mandrakotra ny taolany.
  '3':
  - type: text
    content: Eny, haninareo ny nofon’ny mpiray firenena amiko,
  - type: text
    content: endahanareo ny hodiny,
  - type: text
    content: vakivakînareo ny taolany,
  - type: text
    content: ary tetehanareo izy
  - type: text
    content: tahaka ny hena handrahoina am-bilany
  - type: note
    content: Momba ny and 2-3, jereo Ohab 30.14 sy nta.
  - type: text
    content: .
  '4':
  - type: text
    content: Amin’izany, dia hitaraina amin’ny TOMPO ianareo,
  - type: text
    content: nefa tsy hohenoiny;
  - type: text
    content: hihodina tsy hijery anareo Izy
  - type: text
    content: noho ny asa ratsy nataonareo.
  - type: heading
    content: Fampitandremana ireo mpaminany mpamita-bahoaka
  '5':
  - type: text
    content: 'Izao no lazain’ny TOMPO ny amin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: 'izay mpamitaka ny vahoakako:'
  - type: text
    content: «Raha misy mahafoy hokepohiny,
  - type: text
    content: dia iantsoany ‹Fiadanana›.
  - type: text
    content: Fa izay tsy manome zavatra hataony am-bava kosa
  - type: text
    content: dia hananganany ady manokana.
  '6':
  - type: text
    content: Noho izany, foana ny fisehoam-pahitana
  - type: text
    content: fa ny alina no ho aminareo mpaminany mpamitaka.
  - type: text
    content: Foana koa ny fanambaràna ny ho avy
  - type: text
    content: fa ny haizina no hanarona anareo.
  - type: text
    content: Hilentika aminareo ny masoandro,
  - type: text
    content: ka ho maizina aminareo ny andro!»
  '7':
  - type: text
    content: Dia ho menatra ny mpaminany isehoam-pahitana,
  - type: text
    content: ary hangaihay ny mpanambara ny ho avy;
  - type: text
    content: hisarom-bava
  - type: note
    content: 'misarom-bava: fihetsika manambara fahalotoana eo anatrehan’Andriamanitra (jereo Lev 13.45).'
  - type: text
    content: ' avokoa izy rehetra,'
  - type: text
    content: satria tsy namaly azy intsony Andriamanitra.
  '8':
  - type: text
    content: Izaho kosa, noho ny Fanahin’ny TOMPO,
  - type: text
    content: dia feno tanjaka sy rariny ary herim-po,
  - type: text
    content: mba hanambara amin’ny taranak’i Jakôba ny helony,
  - type: text
    content: eny, mba hanambara amin’ny vahoakan’i Israely ny fahotany.
  - type: heading
    content: Ambaran’i Mikà mialoha ny handravana an’i Jerosalema
  '9':
  - type: text
    content: Ry mpitondra ny taranak’i Jakôba,
  - type: text
    content: eny, ry mpitsara ny vahoakan’i Israely
  - type: note
    content: 'taranak’i Jakôba, vahoaka Israely: jereo ny naoty tandrifin’ny 3.1.'
  - type: text
    content: ','
  - type: text
    content: 'henoinareo re izao:'
  - type: text
    content: Halanareo fatratra ny rariny,
  - type: text
    content: ary avadikareo ny hitsiny rehetra.
