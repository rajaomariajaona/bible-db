    text: mba hanambara amin’ny taranak’i Jakôba ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mba hanambara amin’ny vahoakan’i Israely ny fahotany.
- type: usfm
  marker: s1
