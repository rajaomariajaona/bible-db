      - type: text
        text: 'taranak’i Jakôba, vahoaka Israely:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa ny Israelita ao amin’ny fanjakan’i Joda no tenenina eto, ka tafiditra anatin’izany koa ireo tavaratra nifindra monina tao atsimo taorian’ny fandravana an’i Samaria.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihainoa re ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy anjara raharahanareo ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hahafantatra ny rariny?
- type: usfm
  marker: q1
