  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Kanefa dia ny tsara no halanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ratsy no tianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka endahanareo mbamin’ny hoditry ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny nofony mandrakotra ny taolany.
- type: usfm
  marker: q1
