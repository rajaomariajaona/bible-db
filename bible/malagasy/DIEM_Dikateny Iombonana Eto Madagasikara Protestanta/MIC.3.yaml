    text: nefa tsy hohenoiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hihodina tsy hijery anareo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny asa ratsy nataonareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitandremana ireo mpaminany mpamita-bahoaka
