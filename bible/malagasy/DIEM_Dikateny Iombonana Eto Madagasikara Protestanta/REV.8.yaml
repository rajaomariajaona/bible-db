document_id: REV.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tombokase fahafito
  - type: text
    content: Rehefa novahan’ny Zanakondry ny tombokase
  - type: note
    content: Jereo 5.1 sy nta.
  - type: text
    content: ' fahafito, dia nangina tokony ho antsasak’adiny ny tao an-danitra. '
  '10':
  - type: text
    content: 'Nitsoka trompetra ilay anjely fahatelo, dia nisy kintana anankiray lehibe, mirehitra toy ny fanilo, nilatsaka avy tany an-danitra ary nianjera tamin’ny ampahatelon’ireo ony sy tamin’ireo loharano. '
  '11':
  - type: text
    content: Ny anaran’ilay kintana dia atao hoe Ipoizimangidy; ka tonga mangidy sady voapoizina ny ampahatelon’ny rano rehetra, ary maro ny olona maty noho ny fisotroana rano voapoizina.
  '12':
  - type: text
    content: Nitsoka trompetra ilay anjely fahefatra, dia niharan-doza ny ampahatelon’ny masoandro sy ny ampahatelon’ny volana ary ny ampahatelon’ireo kintana rehetra, mba tsy hamiratra intsony mandritra ny ampahatelom-potoana famiratany; ka tsy nisy hazavan’ny masoandro intsony nandritra ny ampahatelon’ny antoandro, ary tsy nisy hazavan’ny volana aman-kintana toy izany koa nandritra ny ampahatelon’ny alina
  - type: note
    content: 'And 10: jereo Is 14.12. –And 12: jereo Eks 10.21-23.'
  - type: text
    content: .
  '13':
  - type: text
    content: 'Dia nahita voromahery anankiray nanidina teny afovoan’ny habakabaka aho ary nahare azy niantso tamin’ny feo mahery hoe: «Loza! Loza! Loza ho an’ireo monina eny ambonin’ny tany noho ny feon’ny trompetra sisa efa hotsofin’ireo anjely telo!»'
  '2':
  - type: text
    content: 'Dia hitako ireo '
  - type: text
    content: anjely
  - type: text
    content: ' fito izay mijoro eo anatrehan’Andriamanitra; ary nomena trompetra fito ireo. '
  '3':
  - type: text
    content: 'Ary nisy anjely anankiray hafa koa tonga nijoro teo anilan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' sady nitondra lovia volamena fandoroana vovo-javamanitra; dia nomena vovo-javamanitra betsaka izy mba hatolony miaraka amin’ny vavaka ataon’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra, eo ambonin’ny alitara volamena izay manoloana ny sezafiandrianan’Andriamanitra'
  - type: note
    content: Ampit Eks 30.1-3.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary ny eton’ny vovo-javamanitra, miaraka amin’ny vavaka ataon’ny vahoakan’Andriamanitra, dia niakatra avy tamin’ny tanan’ilay anjely ho eo anatrehan’Andriamanitra. '
  '5':
  - type: text
    content: 'Ary noraisin’ilay anjely ny lovia fandoroana vovo-javamanitra, nofenoiny vainafo mirehitra avy teo amin’ny alitara ka natsipiny ho eny amin’ny tany: dia nisy kotro-baratra sy kotrokorana aman-tselatra ary horohorontany'
  - type: note
    content: Ampit Lev 16.12; Ezek 10.2; Eks 19.16.
  - type: text
    content: .
  - type: heading
    content: Ny trompetra
  '6':
  - type: text
    content: Dia niomana hitsoka trompetra
  - type: note
    content: Ampit 1Tes 4.16. Ny trompetra dia mazàna voateny ho toy ny famantarana ny fitsaran’Andriamanitra.
  - type: text
    content: ' ireo '
  - type: text
    content: anjely
  - type: text
    content: ' fito izay nanana ny trompetra fito.'
  '7':
  - type: text
    content: Nitsoka trompetra ilay anjely voalohany, dia nisy havandra sy afo niharo ra nalatsaka tamin’ny tany; ka may ny ampahatelon’ny tany, may ny ampahatelon’ny hazo ary may ny ahi-maitso rehetra
  - type: note
    content: Ampit Eks 9.23-24; Ezek 38.22.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Nitsoka trompetra ilay anjely faharoa, dia nisy toa tendrombohitra lehibe mirehitra afo nazera tany anaty ranomasina ka nanjary mena toy ny ra ny ampahatelon’ny ranomasina; '
  '9':
  - type: text
    content: maty ny zava-miaina tao an-dranomasina ary rava ny ampahatelon’ireo sambo.
