  - type: text
    text: Ny tombokase fahafito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa novahan’ny Zanakondry ny tombokase
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 5.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' fahafito, dia nangina tokony ho antsasak’adiny ny tao an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hitako ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' fito izay mijoro eo anatrehan’Andriamanitra; ary nomena trompetra fito ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy anjely anankiray hafa koa tonga nijoro teo anilan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' sady nitondra lovia volamena fandoroana vovo-javamanitra; dia nomena vovo-javamanitra betsaka izy mba hatolony miaraka amin’ny vavaka ataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra, eo ambonin’ny alitara volamena izay manoloana ny sezafiandrianan’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 30.1-3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny eton’ny vovo-javamanitra, miaraka amin’ny vavaka ataon’ny vahoakan’Andriamanitra, dia niakatra avy tamin’ny tanan’ilay anjely ho eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary noraisin’ilay anjely ny lovia fandoroana vovo-javamanitra, nofenoiny vainafo mirehitra avy teo amin’ny alitara ka natsipiny ho eny amin’ny tany: dia nisy kotro-baratra sy kotrokorana aman-tselatra ary horohorontany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 16.12; Ezek 10.2; Eks 19.16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny trompetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niomana hitsoka trompetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ampit 1Tes 4.16. Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: trompetra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mazàna voateny ho toy ny famantarana ny fitsaran’Andriamanitra.'
    marker-yv: yv-n
  - type: text
    text: ' ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' fito izay nanana ny trompetra fito.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nitsoka trompetra ilay anjely voalohany, dia nisy havandra sy afo niharo ra nalatsaka tamin’ny tany; ka may ny ampahatelon’ny tany, may ny ampahatelon’ny hazo ary may ny ahi-maitso rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 9.23-24; Ezek 38.22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nitsoka trompetra ilay anjely faharoa, dia nisy toa tendrombohitra lehibe mirehitra afo nazera tany anaty ranomasina ka nanjary mena toy ny ra ny ampahatelon’ny ranomasina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: maty ny zava-miaina tao an-dranomasina ary rava ny ampahatelon’ireo sambo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nitsoka trompetra ilay anjely fahatelo, dia nisy kintana anankiray lehibe, mirehitra toy ny fanilo, nilatsaka avy tany an-danitra ary nianjera tamin’ny ampahatelon’ireo ony sy tamin’ireo loharano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny anaran’ilay kintana dia atao hoe Ipoizimangidy; ka tonga mangidy sady voapoizina ny ampahatelon’ny rano rehetra, ary maro ny olona maty noho ny fisotroana rano voapoizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nitsoka trompetra ilay anjely fahefatra, dia niharan-doza ny ampahatelon’ny masoandro sy ny ampahatelon’ny volana ary ny ampahatelon’ireo kintana rehetra, mba tsy hamiratra intsony mandritra ny ampahatelom-potoana famiratany; ka tsy nisy hazavan’ny masoandro intsony nandritra ny ampahatelon’ny antoandro, ary tsy nisy hazavan’ny volana aman-kintana toy izany koa nandritra ny ampahatelon’ny alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 10:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Is 14.12. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 12:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 10.21-23.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nahita voromahery anankiray nanidina teny afovoan’ny habakabaka aho ary nahare azy niantso tamin’ny feo mahery hoe: «Loza! Loza! Loza ho an’ireo monina eny ambonin’ny tany noho ny feon’ny trompetra sisa efa hotsofin’ireo anjely telo!»'
