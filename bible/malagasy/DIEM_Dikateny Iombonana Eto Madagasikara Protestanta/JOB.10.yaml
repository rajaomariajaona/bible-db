document_id: JOB.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba (tohiny): nateraka nolevonin’Andriamanitra aho'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Koa satria maharikoriko ahy ny fiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hitana ela intsony ny fitarainako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tezitra anaty ka voatery hiteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izany no hitenenako amin’Andriamanitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manameloka ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ampahafantaro ahy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny alahelonao amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mahafaly anao ve ny mampahory ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hiraharaha ny asan’ny tananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa homba kosa ny tetiky ny olon-dratsy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mijery zavatra tahaka ny fijerinay olombelona azy ve Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: na manomban-javatra tahaka ny fanombànanay olombelona azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa fohy tahaka ny anay ve ny fiainanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voafetra ho taona vitsivitsy monja?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa nahoana no mitady ny fahadisoako Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mikatsaka ny fahotako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fantatrao tsara ange fa tsy meloka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy olona afa-miala eo am-pelatananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tananao izay nanao sy namolavola ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indro fa mitady hanimba ankehitriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tadidio fa notefenao toy ny fanaka tanimanga aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary haverinao ho amin’ny vovoka indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ianao no namorona ahy tao an-kibon’i neny
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny famela ronono handry ao anaty tavoara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa notafinao hoditra sy nofo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary norarinao taolana sy hozatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nomenao aina ombàm-pitiavana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny fiahianao no niaro ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saingy nisy tsiambaratelo nafeninao ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izao zavatra fantatro fa tao an-tsainao izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: raha vantany vao nanota aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahatratra ahy ambodiomby Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hamela mihitsy ny hadisoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa lozako raha tàhiny ka meloka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa na dia tsy manan-tsiny aza aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho sahy hiandrandra akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria safo-kenatra sady fadiranovana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha mba mitraka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hihaza ahy toy ny liona ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny asanao mahatalanjona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamelezanao ahy indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Totoafo ny fanafihana ataonao amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataonao avo roa heny ny fahatezeranao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tafika mifanontona no mamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nahoana no navoakanao tao an-kibon’i neny aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay aho mba maty tao tsy nisy mpahita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ka vao niala tao an-kibo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nentina ho any am-pasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tsy ary akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fotoana vitsy sisa iainako ankehitriny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa atsaharo amin’izay ny famelezanao ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahazoako maka aina kely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: alohan’ny handehanako tsy hiverina intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny tanin’ny haizina sy alo-pahafatesana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: any ny mangiran-dratsy na somambisamby dia toy ny alina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay anjakan’ny alo-pahafatesana sy ny korontana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any ny hazavana dia tahaka ny alina mikitroka.
