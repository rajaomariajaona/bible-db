document_id: JOB.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (tohiny): nateraka nolevonin’Andriamanitra aho'
  - type: text
    content: Koa satria maharikoriko ahy ny fiainana,
  - type: text
    content: dia tsy hitana ela intsony ny fitarainako aho
  - type: text
    content: fa tezitra anaty ka voatery hiteny.
  '10':
  - type: text
    content: Ianao no namorona ahy tao an-kibon’i neny
  - type: text
    content: toy ny famela ronono handry ao anaty tavoara.
  '11':
  - type: text
    content: Koa notafinao hoditra sy nofo aho
  - type: text
    content: ary norarinao taolana sy hozatra.
  '12':
  - type: text
    content: Nomenao aina ombàm-pitiavana aho,
  - type: text
    content: ka ny fiahianao no niaro ny aiko.
  '13':
  - type: text
    content: Saingy nisy tsiambaratelo nafeninao ahy,
  - type: text
    content: 'dia izao zavatra fantatro fa tao an-tsainao izao:'
  '14':
  - type: text
    content: raha vantany vao nanota aho,
  - type: text
    content: dia hahatratra ahy ambodiomby Ianao
  - type: text
    content: ka tsy hamela mihitsy ny hadisoako.
  '15':
  - type: text
    content: Koa lozako raha tàhiny ka meloka aho;
  - type: text
    content: fa na dia tsy manan-tsiny aza aho,
  - type: text
    content: dia tsy ho sahy hiandrandra akory,
  - type: text
    content: satria safo-kenatra sady fadiranovana.
  '16':
  - type: text
    content: Raha mba mitraka aho,
  - type: text
    content: dia hihaza ahy toy ny liona ianao,
  - type: text
    content: ka ny asanao mahatalanjona
  - type: text
    content: no hamelezanao ahy indray.
  '17':
  - type: text
    content: Totoafo ny fanafihana ataonao amiko;
  - type: text
    content: ataonao avo roa heny ny fahatezeranao amiko,
  - type: text
    content: ary tafika mifanontona no mamely ahy.
  '18':
  - type: text
    content: Nahoana no navoakanao tao an-kibon’i neny aho?
  - type: text
    content: Toy izay aho mba maty tao tsy nisy mpahita,
  '19':
  - type: text
    content: ka vao niala tao an-kibo
  - type: text
    content: dia nentina ho any am-pasana
  - type: text
    content: tahaka ny tsy ary akory.
  '2':
  - type: text
    content: 'Izany no hitenenako amin’Andriamanitra hoe:'
  - type: text
    content: Aza manameloka ahy,
  - type: text
    content: fa ampahafantaro ahy kosa
  - type: text
    content: ny alahelonao amiko.
  '20':
  - type: text
    content: Fotoana vitsy sisa iainako ankehitriny.
  - type: text
    content: Koa atsaharo amin’izay ny famelezanao ahy
  - type: text
    content: mba hahazoako maka aina kely,
  '21':
  - type: text
    content: alohan’ny handehanako tsy hiverina intsony
  - type: text
    content: any amin’ny tanin’ny haizina sy alo-pahafatesana;
  '22':
  - type: text
    content: any ny mangiran-dratsy na somambisamby dia toy ny alina
  - type: text
    content: izay anjakan’ny alo-pahafatesana sy ny korontana,
  - type: text
    content: any ny hazavana dia tahaka ny alina mikitroka.
  '3':
  - type: text
    content: Mahafaly anao ve ny mampahory ahy
  - type: text
    content: ka tsy hiraharaha ny asan’ny tananao,
  - type: text
    content: fa homba kosa ny tetiky ny olon-dratsy?
  '4':
  - type: text
    content: Mijery zavatra tahaka ny fijerinay olombelona azy ve Ianao
  - type: text
    content: na manomban-javatra tahaka ny fanombànanay olombelona azy?
  '5':
  - type: text
    content: Moa fohy tahaka ny anay ve ny fiainanao,
  - type: text
    content: ka voafetra ho taona vitsivitsy monja?
  '6':
  - type: text
    content: Koa nahoana no mitady ny fahadisoako Ianao
  - type: text
    content: ary mikatsaka ny fahotako?
  '7':
  - type: text
    content: Fantatrao tsara ange fa tsy meloka aho,
  - type: text
    content: ary tsy misy olona afa-miala eo am-pelatananao.
  '8':
  - type: text
    content: Ny tananao izay nanao sy namolavola ahy
  - type: text
    content: no indro fa mitady hanimba ankehitriny.
  '9':
  - type: text
    content: Tadidio fa notefenao toy ny fanaka tanimanga aho
  - type: text
    content: ary haverinao ho amin’ny vovoka indray.
