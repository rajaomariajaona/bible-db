document_id: JOB.30,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Valinteny farany nataon’i Jôba (tohiny):'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fa ankehitriny kosa...
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny kosa dia mihomehy ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo tanora kokoa noho izaho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny zanak’ireo olona nolaviko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho naman’ny amboa mpiandry ondriko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharikoriko azy aho ka halaviriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy menatra ny mandrora ny tavako izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa noketrahin’Andriamanitra aho mba hangaihay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahintsan’ireo olona ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lamboridy izay nihazonako azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faikan’olona no mihahohaho eo ankavanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitady hamingana handavo ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 109.6; Zak 3.1.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manangana tovon-tany hanatrarany ahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrava ny lalan-kalehako ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary samy miady fo hamery ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mila ampiana akory amin’izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fiditra amin’ny fefy banga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fibosesiny anaty korontana hamely ahy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasibatry ny fampitahorana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka toy ny rivotra mipaoka ny voninahitro izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nanjavona tahaka ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mba fanantenàko handresy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny miempo ato anatiko ny aiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mangeja ahy ny androm-pahoriana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alina mikiky ny taolako ho afaka amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fanaintainako tsy manam-pitsaharana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naka an-keriny ny akanjoko Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manakenda ahy toy ny vozon-dobaka tery.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nazerany tao amin’ny fotaka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka naetriny toy ny vovoka aman-davenona.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady inona moa no azoko andrasana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay olona efa tra-pahosana?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantso Anao aho, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy valianao akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsangana hivavaka eo anoloanao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa dia jerenao fotsiny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga masiaka amiko Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandrafy ahy amin’ny herinao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelanao hindaosin’ny rivotra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka atambolimbolin’ny tafiotra mahery.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fantatro fa hoentinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny fahafatesana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any amin’ilay fonenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ifamotoanan’ny olombelona rehetra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nahoana Ianao no hanainga tanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamely izay efa mila ho trotraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny olona tra-pahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miantsoantso vonjy?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa tsy efa nitomany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo niangaran’ny vintana ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy efa nangoraka ny mahantra?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy mba niandrandra hasambarana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo sendra ny fahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba nanantena ny mazava aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo sendra ny haizina.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mitsaha-mandevilevy ny tsinaiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: androm-pahoriana no mianjady amiko.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandeha amim-pisaonana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy masoandro mihiratra ho ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vory vahoaka no hitsanganako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiantsoantsoako vonjy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tonga naman’ny amboadia aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga zandrin’ny aositritsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izato feoko mampahonena.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anan’ny hanoanana sy ny fahantrana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitady hohanina any an-tany hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dkt hafa mandositra any an-tany hay. –Rehefa avy nilaza ny fireharehan’ireo mpihomehy azy (and 1a) i Jôba, dia nitanisa ny fiainana mampalahelon’ireo razany (and 1b-8).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay faritra mampalahelo sady karankaina.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihamainty ny hoditro sady miempaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahamay sy mainan’ny tazo ireo taolako.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia feo mitoreo no ataon’ny lokangako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny zava-maneno ambaran’i Jôba eto dia tsy fantatra mazava na dia voalaza matetika ao amin’ny T.T. aza. Tombantombana ihany ny dikanteny eto; jereo Sal 150.3 sy nta.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary feo mitomany no avoakan’ny sodiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsongo anan-dia akaiky kirihitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivelona amin’ny kifakafakan-javatra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaroakan’ny mpiara-monina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo karazan’olona ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voakora toy ny mpangalatra,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitady fialofana eny an-tehezan-tevana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-dava-johy na any an-dava-bato.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivangongo anaty ambiaty izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitrena ao anaty kirihitra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Karazan’olona adala sy kentrina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka noroahina tamin’ny kapoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiala ny tany nonenany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia ny tenako indray ankehitriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ataon’ny taranak’ireo olona ireo an-kira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa tonga ambentin-teniny hatrany.
