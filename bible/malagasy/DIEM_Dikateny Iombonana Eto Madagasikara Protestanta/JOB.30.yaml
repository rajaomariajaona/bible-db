document_id: JOB.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valinteny farany nataon’i Jôba (tohiny):'
  - type: heading
    content: Fa ankehitriny kosa...
  - type: text
    content: Fa ankehitriny kosa dia mihomehy ahy
  - type: text
    content: ireo tanora kokoa noho izaho,
  - type: text
    content: dia ny zanak’ireo olona nolaviko
  - type: text
    content: tsy ho naman’ny amboa mpiandry ondriko.
  '10':
  - type: text
    content: Maharikoriko azy aho ka halaviriny;
  - type: text
    content: ary tsy menatra ny mandrora ny tavako izy.
  '11':
  - type: text
    content: Fa noketrahin’Andriamanitra aho mba hangaihay,
  - type: text
    content: ka nahintsan’ireo olona ireo
  - type: text
    content: ny lamboridy izay nihazonako azy.
  '12':
  - type: text
    content: Faikan’olona no mihahohaho eo ankavanako
  - type: text
    content: ka mitady hamingana handavo ahy
  - type: note
    content: Jereo Sal 109.6; Zak 3.1.
  - type: text
    content: ','
  - type: text
    content: ary manangana tovon-tany hanatrarany ahy.
  '13':
  - type: text
    content: Mandrava ny lalan-kalehako ireo,
  - type: text
    content: ary samy miady fo hamery ahy
  - type: text
    content: ka tsy mila ampiana akory amin’izany.
  '14':
  - type: text
    content: Toy ny fiditra amin’ny fefy banga
  - type: text
    content: no fibosesiny anaty korontana hamely ahy.
  '15':
  - type: text
    content: Lasibatry ny fampitahorana aho,
  - type: text
    content: ka toy ny rivotra mipaoka ny voninahitro izany;
  - type: text
    content: dia nanjavona tahaka ny rahona
  - type: text
    content: izay mba fanantenàko handresy.
  '16':
  - type: text
    content: Ankehitriny miempo ato anatiko ny aiko
  - type: text
    content: ary mangeja ahy ny androm-pahoriana.
  '17':
  - type: text
    content: Ny alina mikiky ny taolako ho afaka amiko
  - type: text
    content: ary ny fanaintainako tsy manam-pitsaharana.
  '18':
  - type: text
    content: Naka an-keriny ny akanjoko Andriamanitra
  - type: text
    content: ka manakenda ahy toy ny vozon-dobaka tery.
  '19':
  - type: text
    content: Nazerany tao amin’ny fotaka aho
  - type: text
    content: ka naetriny toy ny vovoka aman-davenona.
  - type: heading
    content: '*'
  '2':
  - type: text
    content: Sady inona moa no azoko andrasana
  - type: text
    content: amin’izay olona efa tra-pahosana?
  '20':
  - type: text
    content: Miantso Anao aho, Andriamanitra ô,
  - type: text
    content: nefa tsy valianao akory;
  - type: text
    content: mitsangana hivavaka eo anoloanao aho,
  - type: text
    content: nefa dia jerenao fotsiny.
  '21':
  - type: text
    content: Tonga masiaka amiko Ianao
  - type: text
    content: ka mandrafy ahy amin’ny herinao.
  '22':
  - type: text
    content: Avelanao hindaosin’ny rivotra aho
  - type: text
    content: ka atambolimbolin’ny tafiotra mahery.
  '23':
  - type: text
    content: Eny, fantatro fa hoentinao
  - type: text
    content: any amin’ny fahafatesana aho,
  - type: text
    content: dia any amin’ilay fonenana
  - type: text
    content: ifamotoanan’ny olombelona rehetra.
  '24':
  - type: text
    content: Kanefa nahoana Ianao no hanainga tanana
  - type: text
    content: hamely izay efa mila ho trotraka,
  - type: text
    content: dia ny olona tra-pahoriana
  - type: text
    content: ka miantsoantso vonjy?
  '25':
  - type: text
    content: Izaho kosa tsy efa nitomany
  - type: text
    content: ireo niangaran’ny vintana ve aho
  - type: text
    content: ary tsy efa nangoraka ny mahantra?
  '26':
  - type: text
    content: Saingy mba niandrandra hasambarana aho,
  - type: text
    content: kanjo sendra ny fahoriana;
  - type: text
    content: ary mba nanantena ny mazava aho,
  - type: text
    content: kanjo sendra ny haizina.
  - type: heading
    content: '*'
  '27':
  - type: text
    content: Tsy mitsaha-mandevilevy ny tsinaiko;
  - type: text
    content: androm-pahoriana no mianjady amiko.
  '28':
  - type: text
    content: Mandeha amim-pisaonana aho;
  - type: text
    content: tsy misy masoandro mihiratra ho ahy.
  - type: text
    content: Vory vahoaka no hitsanganako
  - type: text
    content: mba hiantsoantsoako vonjy.
  '29':
  - type: text
    content: Ka tonga naman’ny amboadia aho
  - type: text
    content: ary tonga zandrin’ny aositritsy
  - type: text
    content: amin’izato feoko mampahonena.
  '3':
  - type: text
    content: Anan’ny hanoanana sy ny fahantrana izy
  - type: text
    content: ka mitady hohanina any an-tany hay
  - type: note
    content: Dkt hafa mandositra any an-tany hay. –Rehefa avy nilaza ny fireharehan’ireo mpihomehy azy (and 1a) i Jôba, dia nitanisa ny fiainana mampalahelon’ireo razany (and 1b-8).
  - type: text
    content: izay faritra mampalahelo sady karankaina.
  '30':
  - type: text
    content: Mihamainty ny hoditro sady miempaka.
  - type: text
    content: Mahamay sy mainan’ny tazo ireo taolako.
  '31':
  - type: text
    content: Dia feo mitoreo no ataon’ny lokangako
  - type: note
    content: Ny zava-maneno ambaran’i Jôba eto dia tsy fantatra mazava na dia voalaza matetika ao amin’ny T.T. aza. Tombantombana ihany ny dikanteny eto; jereo Sal 150.3 sy nta.
  - type: text
    content: ary feo mitomany no avoakan’ny sodiko.
  '4':
  - type: text
    content: Mitsongo anan-dia akaiky kirihitra izy
  - type: text
    content: ary mivelona amin’ny kifakafakan-javatra.
  '5':
  - type: text
    content: Voaroakan’ny mpiara-monina
  - type: text
    content: ireo karazan’olona ireo
  - type: text
    content: sady voakora toy ny mpangalatra,
  '6':
  - type: text
    content: ka mitady fialofana eny an-tehezan-tevana,
  - type: text
    content: any an-dava-johy na any an-dava-bato.
  '7':
  - type: text
    content: Mivangongo anaty ambiaty izy
  - type: text
    content: ka mitrena ao anaty kirihitra.
  '8':
  - type: text
    content: Karazan’olona adala sy kentrina izy,
  - type: text
    content: ka noroahina tamin’ny kapoka
  - type: text
    content: mba hiala ny tany nonenany.
  '9':
  - type: text
    content: Ary dia ny tenako indray ankehitriny
  - type: text
    content: no ataon’ny taranak’ireo olona ireo an-kira
  - type: text
    content: sady efa tonga ambentin-teniny hatrany.
