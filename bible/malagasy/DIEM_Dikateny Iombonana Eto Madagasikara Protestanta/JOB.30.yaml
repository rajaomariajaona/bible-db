document_id: JOB.30
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'Valinteny farany nataon’i Jôba (tohiny):'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fa ankehitriny kosa...
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ankehitriny kosa dia mihomehy ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo tanora kokoa noho izaho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny zanak’ireo olona nolaviko
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho naman’ny amboa mpiandry ondriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sady inona moa no azoko andrasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay olona efa tra-pahosana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Anan’ny hanoanana sy ny fahantrana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady hohanina any an-tany hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dkt hafa mandositra any an-tany hay. –Rehefa avy nilaza ny fireharehan’ireo mpihomehy azy (and 1a) i Jôba, dia nitanisa ny fiainana mampalahelon’ireo razany (and 1b-8).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay faritra mampalahelo sady karankaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsongo anan-dia akaiky kirihitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mivelona amin’ny kifakafakan-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voaroakan’ny mpiara-monina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo karazan’olona ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voakora toy ny mpangalatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka mitady fialofana eny an-tehezan-tevana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: any an-dava-johy na any an-dava-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mivangongo anaty ambiaty izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitrena ao anaty kirihitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Karazan’olona adala sy kentrina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka noroahina tamin’ny kapoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiala ny tany nonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary dia ny tenako indray ankehitriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ataon’ny taranak’ireo olona ireo an-kira
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady efa tonga ambentin-teniny hatrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maharikoriko azy aho ka halaviriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy menatra ny mandrora ny tavako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa noketrahin’Andriamanitra aho mba hangaihay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nahintsan’ireo olona ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lamboridy izay nihazonako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Faikan’olona no mihahohaho eo ankavanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady hamingana handavo ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 109.6; Zak 3.1.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manangana tovon-tany hanatrarany ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandrava ny lalan-kalehako ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary samy miady fo hamery ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mila ampiana akory amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny fiditra amin’ny fefy banga
- type: usfm
  marker: q1
  children:
  - type: text
    text: no fibosesiny anaty korontana hamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lasibatry ny fampitahorana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka toy ny rivotra mipaoka ny voninahitro izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nanjavona tahaka ny rahona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mba fanantenàko handresy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ankehitriny miempo ato anatiko ny aiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mangeja ahy ny androm-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny alina mikiky ny taolako ho afaka amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fanaintainako tsy manam-pitsaharana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Naka an-keriny ny akanjoko Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manakenda ahy toy ny vozon-dobaka tery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nazerany tao amin’ny fotaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka naetriny toy ny vovoka aman-davenona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Miantso Anao aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy valianao akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsangana hivavaka eo anoloanao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa dia jerenao fotsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tonga masiaka amiko Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mandrafy ahy amin’ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Avelanao hindaosin’ny rivotra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka atambolimbolin’ny tafiotra mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Eny, fantatro fa hoentinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny fahafatesana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia any amin’ilay fonenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ifamotoanan’ny olombelona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa nahoana Ianao no hanainga tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely izay efa mila ho trotraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny olona tra-pahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantsoantso vonjy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izaho kosa tsy efa nitomany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo niangaran’ny vintana ve aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy efa nangoraka ny mahantra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Saingy mba niandrandra hasambarana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo sendra ny fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mba nanantena ny mazava aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanjo sendra ny haizina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy mitsaha-mandevilevy ny tsinaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: androm-pahoriana no mianjady amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mandeha amim-pisaonana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy masoandro mihiratra ho ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vory vahoaka no hitsanganako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hiantsoantsoako vonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ka tonga naman’ny amboadia aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tonga zandrin’ny aositritsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izato feoko mampahonena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mihamainty ny hoditro sady miempaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahamay sy mainan’ny tazo ireo taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia feo mitoreo no ataon’ny lokangako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny zava-maneno ambaran’i Jôba eto dia tsy fantatra mazava na dia voalaza matetika ao amin’ny T.T. aza. Tombantombana ihany ny dikanteny eto; jereo Sal 150.3 sy nta.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary feo mitomany no avoakan’ny sodiko.
