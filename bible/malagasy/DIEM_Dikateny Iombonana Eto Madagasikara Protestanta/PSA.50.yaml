document_id: PSA.50,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hampitandrina ny mpivavaka no isehoan’Andriamanitra
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Asafa
  - type: text
    content: ' '
  - type: note
    content: 'Asafa: jereo 1 Tan d6.16-17,24; 25.1; 2 Tan 35.15.'
  - type: text
    content: .
  - type: text
    content: Ny TOMPO Andriamanitra Avo Indrindra no miteny
  - type: text
    content: ka miantso ny olona eran’ny tany,
  - type: text
    content: dia hatreo amin’izay iposahan’ny masoandro
  - type: text
    content: ka hatrany amin’izay ilentehany.
  '10':
  - type: text
    content: fa Ahy avokoa ny biby any an’ala
  - type: text
    content: sy ny biby fiompy manerana ny tanety;
  '11':
  - type: text
    content: fantatro ny vorona rehetra eny an-tendrombohitra
  - type: text
    content: ary Ahy koa ny zava-mihetsiketsika eny an-tsaha.
  '12':
  - type: text
    content: Raha mba noana Aho, tsy hilaza aminao;
  - type: text
    content: satria Ahy ny tontolo sy izay eo aminy.
  '13':
  - type: text
    content: Nofon’ombilahy angaha no fihinako
  - type: text
    content: sa ran’osilahy no fisotroko?
  '14':
  - type: text
    content: Ny fiderana no ataovy sorona
  - type: text
    content: ho Ahy Andriamanitrareo;
  - type: text
    content: ny voadinareo no efao amiko,
  - type: text
    content: fa Izaho no Avo Indrindra.
  '15':
  - type: text
    content: Dia antsoy amin’ny andro mahory Aho,
  - type: text
    content: 'fa hanafaka anareo ka homenareo '
  - type: text
    content: voninahitra
  - type: text
    content: .
  '16':
  - type: text
    content: Fa amin’ny ratsy fanahy kosa
  - type: text
    content: 'dia izao no lazain’Andriamanitra:'
  - type: text
    content: –Ahoana no itanisanisanareo ny didiko
  - type: text
    content: sy itenitenenanareo ny fanekempihavanako,
  '17':
  - type: text
    content: ianareo izay mpankahala anatra
  - type: text
    content: sy mpanipy ny teniko any ivoho?
  '18':
  - type: text
    content: Raha tojo mpangalatra ianareo, dia miombona aminy;
  - type: text
    content: ny olona mpanitsakitsa-bady no fiarahanareo.
  '19':
  - type: text
    content: Mailaka ianareo raha hanaratsy olona,
  - type: text
    content: kinga tokoa raha hiteny fitaka;
  '2':
  - type: text
    content: 'Avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ', tanàna fatratra tokoa,'
  - type: text
    content: no amirapiratan’Andriamanitra.
  '20':
  - type: text
    content: mipetrapetraka ianareo no manebaka namana
  - type: text
    content: sy manendrikendrika ny mpiray tampo.
  '21':
  - type: text
    content: Izany ve no ataonareo ka dia hangina Aho
  - type: text
    content: sa heverinareo Aho fa mitovy aminareo?
  - type: text
    content: Horeseko lahatra mihitsy ianareo
  - type: text
    content: ary ny toetranareo hasehoko eo imasonareo!
  '22':
  - type: text
    content: Koa hevero izany, ry mpanadino Ahy,
  - type: text
    content: ndrao viraviraiko tsy hisy hanafaka ianareo.
  '23':
  - type: text
    content: Ny fiderana no sorona
  - type: text
    content: anomezam-boninahitra Ahy;
  - type: text
    content: ary izay mahitsy fitondrantena
  - type: text
    content: no hanehoako ny famonjeko.
  '3':
  - type: text
    content: Tonga ilay Andriamanitray
  - type: text
    content: ka tsy hangina Izy fa hiteny.
  - type: text
    content: Afo mandevona no mialoha Azy,
  - type: text
    content: tafio-drivotra mahery no manodidina Azy.
  '4':
  - type: text
    content: Nidina avy any ambony Izy mba hitsara ny vahoakany,
  - type: text
    content: 'ka miantso ny tany amana habakabaka hoe:'
  '5':
  - type: text
    content: «Vorio hanketo anoloako ny mpivavaka marina,
  - type: text
    content: 'dia ireo nanao '
  - type: text
    content: sorona
  - type: text
    content: ' fanekempihavanana tamiko.'
  '6':
  - type: text
    content: Aoka hambaran’ny habakabaka fa marina ny Tompo,
  - type: text
    content: sady Izy no ilay Andriamanitra Mpitsara!»
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: –Ry Israely vahoakako, mandrenesa,
  - type: text
    content: fa hiteny aminareo sy hampitandrina anareo Aho,
  - type: text
    content: dia Izaho Andriamanitra Andriamanitrareo.
  '8':
  - type: text
    content: 'Tsy ireo sorona amam-panatitrareo no aniniako anareo:'
  - type: text
    content: eo anatrehako mandrakariva ireny rehetra ireny.
  '9':
  - type: text
    content: Tsy izay ombilahy ao am-balanareo no halaiko
  - type: text
    content: na izay osilahy ao am-pahitrareo;
