  - type: text
    text: SALAMO Hampitandrina ny mpivavaka no isehoan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Asafa
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Asafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Tan d6.16-17,24; 25.1; 2 Tan 35.15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny TOMPO Andriamanitra Avo Indrindra no miteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka miantso ny olona eran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatreo amin’izay iposahan’ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany amin’izay ilentehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avy ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ', tanàna fatratra tokoa,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no amirapiratan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tonga ilay Andriamanitray
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hangina Izy fa hiteny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afo mandevona no mialoha Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tafio-drivotra mahery no manodidina Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nidina avy any ambony Izy mba hitsara ny vahoakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka miantso ny tany amana habakabaka hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Vorio hanketo anoloako ny mpivavaka marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ireo nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanekempihavanana tamiko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka hambaran’ny habakabaka fa marina ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady Izy no ilay Andriamanitra Mpitsara!»
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: –Ry Israely vahoakako, mandrenesa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiteny aminareo sy hampitandrina anareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Izaho Andriamanitra Andriamanitrareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy ireo sorona amam-panatitrareo no aniniako anareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anatrehako mandrakariva ireny rehetra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy izay ombilahy ao am-balanareo no halaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: na izay osilahy ao am-pahitrareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa Ahy avokoa ny biby any an’ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny biby fiompy manerana ny tanety;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fantatro ny vorona rehetra eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Ahy koa ny zava-mihetsiketsika eny an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha mba noana Aho, tsy hilaza aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Ahy ny tontolo sy izay eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nofon’ombilahy angaha no fihinako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa ran’osilahy no fisotroko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fiderana no ataovy sorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho Ahy Andriamanitrareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny voadinareo no efao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Izaho no Avo Indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia antsoy amin’ny andro mahory Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa hanafaka anareo ka homenareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitra
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa amin’ny ratsy fanahy kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izao no lazain’Andriamanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Ahoana no itanisanisanareo ny didiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy itenitenenanareo ny fanekempihavanako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ianareo izay mpankahala anatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mpanipy ny teniko any ivoho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha tojo mpangalatra ianareo, dia miombona aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny olona mpanitsakitsa-bady no fiarahanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mailaka ianareo raha hanaratsy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kinga tokoa raha hiteny fitaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mipetrapetraka ianareo no manebaka namana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy manendrikendrika ny mpiray tampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany ve no ataonareo ka dia hangina Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa heverinareo Aho fa mitovy aminareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horeseko lahatra mihitsy ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toetranareo hasehoko eo imasonareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa hevero izany, ry mpanadino Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ndrao viraviraiko tsy hisy hanafaka ianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fiderana no sorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: anomezam-boninahitra Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay mahitsy fitondrantena
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanehoako ny famonjeko.
