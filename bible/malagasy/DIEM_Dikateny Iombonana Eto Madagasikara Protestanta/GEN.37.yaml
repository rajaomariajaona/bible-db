document_id: GEN.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo nofin’i Jôsefa
  - type: text
    content: 'Nipetraka tao amin’ny tany Kanahàna i Jakôba, dia tao amin’ny faritany nivahinian-drainy. '
  '10':
  - type: text
    content: 'Notantarainy tamin’ny rainy toy ny efa nataony tamin’ireo rahalahiny koa io nofy io, ka nibedy azy ny rainy nanao hoe:'
  - type: text
    content: –Inona moa ity nofinofinao ity? Moa tsy maintsy ho avy tokoa ve izaho sy ny reninao ary ireo rahalahinao hiankohoka eo anatrehanao?
  '11':
  - type: text
    content: Dia nialona an’i Jôsefa ireo rahalahiny
  - type: note
    content: Ampit Asa 7.9.
  - type: text
    content: ', fa ny rainy kosa nandinika izany nofy izany.'
  - type: heading
    content: Namidin’ny rahalahiny i Jôsefa
  '12':
  - type: text
    content: 'Nandeha niandry ny ondry aman’osin-drainy tany akaikin’i Sekema ireo rahalahin’i Jôsefa. '
  '13':
  - type: text
    content: 'Ka hoy i Jakôba tamin’i Jôsefa:'
  - type: text
    content: –Moa tsy miandry ondry any akaikin’i Sekema ve ireo rahalahinao? Koa andeha àry ianao hirahiko ho any aminy.
  - type: text
    content: 'Dia hoy ny navaliny azy:'
  - type: text
    content: –Inty aho.
  '14':
  - type: text
    content: 'Fa hoy indray i Jakôba hoe:'
  - type: text
    content: –Mandehana ianao ka jereo na tsara ihany izy ireo sy ny andian’ondry aman’osy na tsia. Avy eo dia miverena hilaza amiko ny vaovao.
  - type: text
    content: 'Avy teo amin’ny lohasahan’i Hebrôna i Jôsefa no nirahin-drainy. Nony tonga tao akaikin’i Sekema izy, '
  '15':
  - type: text
    content: 'dia nisy lehilahy iray nahita azy nirenireny eran’ny tanety ka nanontany azy hoe:'
  - type: text
    content: –Fa inona no tadiavinao?
  '16':
  - type: text
    content: 'Hoy kosa i Jôsefa hoe:'
  - type: text
    content: –Ny rahalahiko no tadiaviko, ka asa raha mba afaka manoro ahy ny toerana iandrasany ny biby fiompy ianao?
  '17':
  - type: text
    content: 'Ary hoy ralehilahy hoe:'
  - type: text
    content: –Efa niala teto izy, fa reko niresaka hoe hankany Dôtàna.
  - type: text
    content: 'Dia nanara-dia ireo rahalahiny i Jôsefa, ka nahita azy tao Dôtàna. '
  '18':
  - type: text
    content: 'Mbola lavitra i Jôsefa, dia tazan’ireo rahalahiny; ka raha tsy mbola tonga teny aminy akory izy, dia niray tetika hamono hahafaty azy ny rahalahiny '
  '19':
  - type: text
    content: 'ka nifampiresaka hoe:'
  - type: text
    content: '–He, inty tamy ilay mpanonofy! '
  '2':
  - type: text
    content: 'Toy izao no tantaran’ny ankohonan’i Jakôba: Rehefa fito ambin’ny folo taona i Jôsefa, dia niandry ondry niaraka tamin’ireo rahalahiny; fa izy dia zaza niaraka tamin’ny zanakalahin’i Bilehà sy i Zilpà, vadikelin-drainy. Ary taterin’i Jôsefa amin-drainy avokoa ny ratsy lazaina momba ireo rahalahiny. '
  '20':
  - type: text
    content: Andeha hovonointsika ho faty izy, dia hatsipintsika ao anatin’ny anankiray amin’ireto lavaka fantsakana ireto, ka holazaintsika hoe lanin’ny biby masiaka. Amin’izay dia ho hitantsika raha ho tanteraka ny nofiny.
  '21':
  - type: text
    content: 'Rehefa nandre izany i Reobena, dia tapa-kevitra hamonjy an’i Jôsefa ka nanao hoe:'
  - type: text
    content: –Aoka re tsy hovonointsika ho faty izy.
  '22':
  - type: text
    content: 'Sady mbola nampian’i Reobena hoe:'
  - type: text
    content: –Aza mandatsa-dra ianareo; aza vonoina ho faty izy, fa atsipazo ao anatin’io lavaka atỳ an-taniefitra io fotsiny.
  - type: text
    content: Nilaza izany taminy izy, mba hamonjeny azy ka hamerenany azy any amin’ny rainy.
  '23':
  - type: text
    content: 'Raha vao tonga teo amin’ny rahalahiny i Jôsefa, dia nendahan’ireo ny fitafiany, izany hoe ilay akanjo tsara tarehy teny aminy; '
  '24':
  - type: text
    content: 'ary nobatainy izy ka natsipiny tao an-davaka, dia lavaka iray tsy nisy rano. '
  '25':
  - type: text
    content: 'Avy eo dia nipetraka nihinana ireo, ary nitazana ka nahatsinjo andiana Jismahelita nandalo avy any Gilehada, nitanjozotra nidina ho any Ejipta. Ireo ramevany dia mitondra ditin-kazo manitra toy ny nekôta sy balsama ary làdana. '
  '26':
  - type: text
    content: 'Dia hoy i Joda tamin’ireo rahalahiny:'
  - type: text
    content: '–Inona moa no tombon-tsoa ho antsika raha vonointsika ho faty ny rahalahintsika ary afenintsika ny fahafatesany? '
  '27':
  - type: text
    content: Andeha hamidintsika amin’ireto Jismahelita ireto izy fa tsy hikasi-tanana azy isika, satria rahalahintsika izy ary fianakaviantsika ihany.
  - type: text
    content: Dia nanaiky ireo rahalahiny.
  '28':
  - type: text
    content: Raha nandalo ireo lehilahy midianita mpivarotra, dia nakariny avy tao an-davaka i Jôsefa ary namidiny sekela volafotsy roapolo tamin’ny Ismaelita izay nitondra azy nankany Ejipta
  - type: note
    content: 'Namidin’ireo rahalahin’i Jôsefa: ampit Asa 7.9.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Rehefa niverina hijery ny lavaka i Reobena, dia tsy tao intsony i Jôsefa; diso fanantenana izy ka '
  - type: text
    content: nandriatra
  - type: text
    content: ' ny fitafiany. '
  '3':
  - type: text
    content: Tian’i Jakôba mihoatra noho ireo rahalahiny rehetra i Jôsefa satria zanaky ny fahanterany, ka nanaovany akanjo tsara tarehy
  - type: note
    content: 'tsara tarehy: dkt hafa lava tanana na misoratsoratra.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Niverina nankeo amin’ireo rahalahiny izy ka niantsoantso hoe:'
  - type: text
    content: –Tsy ao intsony ny zaza, ka aiza no tany halehako?
  '31':
  - type: text
    content: 'Nalain’ireo rahalahiny ny akanjon’i Jôsefa ka natsobony tao anaty ran’osy novonoiny. '
  '32':
  - type: text
    content: 'Avy eo dia nalefany tany amin’ny rainy iny niaraka amin’ny hafatra hoe: «Inty no hitanay, ka fantaro raha akanjon-janakao ity na tsia.» '
  '33':
  - type: text
    content: 'Fantatr’i Jakôba fa an’i Jôsefa io, koa niantsoantso izy hoe:'
  - type: text
    content: –Akanjon-janako tokoa ity! Noviravirain’ny biby masiaka i Jôsefa ary laniny.
  '34':
  - type: text
    content: 'Dia nandriatra ny fitafiany i Jakôba ka nisikina lamba fisaonana, ary nisaona ny zanany nandritra ny andro maro. '
  '35':
  - type: text
    content: 'Tonga nampionona azy avokoa na ireo zanany lahy na ireo zanany vavy; kanefa tsy nety nionona izy, fa nanao hoe: «Mbola hisaona aho no hidina hihaona amin-janako any amin’ny toeran’ny maty.» Koa mbola nitomany an-janany ihany izy.'
  '36':
  - type: text
    content: 'Ireo Midianita kosa nivarotra an’i Jôsefa tany Ejipta tamin’i Pôtifara, tandapan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sady lehiben’ny mpiambina azy.'
  '4':
  - type: text
    content: Hitan’ireo rahalahiny fa tian-drainy mihoatra noho izy rehetra i Jôsefa, ka nankahalainy sady tsy hainy nitenenana tamim-pihavanana intsony.
  '5':
  - type: text
    content: 'Indray mandeha dia nanonofy i Jôsefa ary notantarainy tamin’ireo rahalahiny ny nofiny, ka vao mainka niampy ny fankahalàn’ireo azy. '
  '6':
  - type: text
    content: 'Hoy izy tamin’ireo:'
  - type: text
    content: '–Aza fady, henoy ange ity nofiko ity e! '
  '7':
  - type: text
    content: Teny ampovoan-tanimbary, hono, isika ary teo am-pamehezam-bary indrindra no indro ny fehezam-bariko nitsangana sady nijoro mahitsy, fa ny fehezam-barinareo kosa nanodidina sady niankohoka teo anatrehan’ny fehezam-bariko.
  '8':
  - type: text
    content: 'Ka hoy ireo rahalahiny taminy:'
  - type: text
    content: –Dia hanjaka aminay sy hifehy anay tokoa ve ianao?
  - type: text
    content: Vao mainka niampy izaitsizy ny fankahalàny azy noho ireo nofiny sy ny fitantàrany azy.
  '9':
  - type: text
    content: 'Ary mbola nanonofy hafa i Jôsefa, dia notantarainy tamin’ny rahalahiny hoe:'
  - type: text
    content: –Nanonofy indray aho, ka indro hono ny masoandro sy ny volana ary ny kintana iraika ambin’ny folo tonga niankohoka teo anatrehako.
