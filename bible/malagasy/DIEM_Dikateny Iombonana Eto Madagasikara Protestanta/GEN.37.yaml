document_id: GEN.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo nofin’i Jôsefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nipetraka tao amin’ny tany Kanahàna i Jakôba, dia tao amin’ny faritany nivahinian-drainy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toy izao no tantaran’ny ankohonan’i Jakôba: Rehefa fito ambin’ny folo taona i Jôsefa, dia niandry ondry niaraka tamin’ireo rahalahiny; fa izy dia zaza niaraka tamin’ny zanakalahin’i Bilehà sy i Zilpà, vadikelin-drainy. Ary taterin’i Jôsefa amin-drainy avokoa ny ratsy lazaina momba ireo rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tian’i Jakôba mihoatra noho ireo rahalahiny rehetra i Jôsefa satria zanaky ny fahanterany, ka nanaovany akanjo tsara tarehy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsara tarehy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lava tanana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: misoratsoratra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hitan’ireo rahalahiny fa tian-drainy mihoatra noho izy rehetra i Jôsefa, ka nankahalainy sady tsy hainy nitenenana tamim-pihavanana intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indray mandeha dia nanonofy i Jôsefa ary notantarainy tamin’ireo rahalahiny ny nofiny, ka vao mainka niampy ny fankahalàn’ireo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izy tamin’ireo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza fady, henoy ange ity nofiko ity e! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Teny ampovoan-tanimbary, hono, isika ary teo am-pamehezam-bary indrindra no indro ny fehezam-bariko nitsangana sady nijoro mahitsy, fa ny fehezam-barinareo kosa nanodidina sady niankohoka teo anatrehan’ny fehezam-bariko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy ireo rahalahiny taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Dia hanjaka aminay sy hifehy anay tokoa ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: Vao mainka niampy izaitsizy ny fankahalàny azy noho ireo nofiny sy ny fitantàrany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary mbola nanonofy hafa i Jôsefa, dia notantarainy tamin’ny rahalahiny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanonofy indray aho, ka indro hono ny masoandro sy ny volana ary ny kintana iraika ambin’ny folo tonga niankohoka teo anatrehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Notantarainy tamin’ny rainy toy ny efa nataony tamin’ireo rahalahiny koa io nofy io, ka nibedy azy ny rainy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona moa ity nofinofinao ity? Moa tsy maintsy ho avy tokoa ve izaho sy ny reninao ary ireo rahalahinao hiankohoka eo anatrehanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nialona an’i Jôsefa ireo rahalahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.9.
    marker-yv: yv-n
  - type: text
    text: ', fa ny rainy kosa nandinika izany nofy izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namidin’ny rahalahiny i Jôsefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandeha niandry ny ondry aman’osin-drainy tany akaikin’i Sekema ireo rahalahin’i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka hoy i Jakôba tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy miandry ondry any akaikin’i Sekema ve ireo rahalahinao? Koa andeha àry ianao hirahiko ho any aminy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inty aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy indray i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana ianao ka jereo na tsara ihany izy ireo sy ny andian’ondry aman’osy na tsia. Avy eo dia miverena hilaza amiko ny vaovao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy teo amin’ny lohasahan’i Hebrôna i Jôsefa no nirahin-drainy. Nony tonga tao akaikin’i Sekema izy, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia nisy lehilahy iray nahita azy nirenireny eran’ny tanety ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa inona no tadiavinao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy kosa i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny rahalahiko no tadiaviko, ka asa raha mba afaka manoro ahy ny toerana iandrasany ny biby fiompy ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy ralehilahy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa niala teto izy, fa reko niresaka hoe hankany Dôtàna.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nanara-dia ireo rahalahiny i Jôsefa, ka nahita azy tao Dôtàna. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mbola lavitra i Jôsefa, dia tazan’ireo rahalahiny; ka raha tsy mbola tonga teny aminy akory izy, dia niray tetika hamono hahafaty azy ny rahalahiny '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nifampiresaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–He, inty tamy ilay mpanonofy! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Andeha hovonointsika ho faty izy, dia hatsipintsika ao anatin’ny anankiray amin’ireto lavaka fantsakana ireto, ka holazaintsika hoe lanin’ny biby masiaka. Amin’izay dia ho hitantsika raha ho tanteraka ny nofiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa nandre izany i Reobena, dia tapa-kevitra hamonjy an’i Jôsefa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka re tsy hovonointsika ho faty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sady mbola nampian’i Reobena hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza mandatsa-dra ianareo; aza vonoina ho faty izy, fa atsipazo ao anatin’io lavaka atỳ an-taniefitra io fotsiny.
- type: usfm
  marker: p
  children:
  - type: text
    text: Nilaza izany taminy izy, mba hamonjeny azy ka hamerenany azy any amin’ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha vao tonga teo amin’ny rahalahiny i Jôsefa, dia nendahan’ireo ny fitafiany, izany hoe ilay akanjo tsara tarehy teny aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary nobatainy izy ka natsipiny tao an-davaka, dia lavaka iray tsy nisy rano. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy eo dia nipetraka nihinana ireo, ary nitazana ka nahatsinjo andiana Jismahelita nandalo avy any Gilehada, nitanjozotra nidina ho any Ejipta. Ireo ramevany dia mitondra ditin-kazo manitra toy ny nekôta sy balsama ary làdana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy i Joda tamin’ireo rahalahiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona moa no tombon-tsoa ho antsika raha vonointsika ho faty ny rahalahintsika ary afenintsika ny fahafatesany? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Andeha hamidintsika amin’ireto Jismahelita ireto izy fa tsy hikasi-tanana azy isika, satria rahalahintsika izy ary fianakaviantsika ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nanaiky ireo rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha nandalo ireo lehilahy midianita mpivarotra, dia nakariny avy tao an-davaka i Jôsefa ary namidiny sekela volafotsy roapolo tamin’ny Ismaelita izay nitondra azy nankany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.28 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Namidin’ireo rahalahin’i Jôsefa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Asa 7.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa niverina hijery ny lavaka i Reobena, dia tsy tao intsony i Jôsefa; diso fanantenana izy ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra
  - type: text
    text: ' ny fitafiany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Niverina nankeo amin’ireo rahalahiny izy ka niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ao intsony ny zaza, ka aiza no tany halehako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nalain’ireo rahalahiny ny akanjon’i Jôsefa ka natsobony tao anaty ran’osy novonoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Avy eo dia nalefany tany amin’ny rainy iny niaraka amin’ny hafatra hoe: «Inty no hitanay, ka fantaro raha akanjon-janakao ity na tsia.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fantatr’i Jakôba fa an’i Jôsefa io, koa niantsoantso izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Akanjon-janako tokoa ity! Noviravirain’ny biby masiaka i Jôsefa ary laniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nandriatra ny fitafiany i Jakôba ka nisikina lamba fisaonana, ary nisaona ny zanany nandritra ny andro maro. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tonga nampionona azy avokoa na ireo zanany lahy na ireo zanany vavy; kanefa tsy nety nionona izy, fa nanao hoe: «Mbola hisaona aho no hidina hihaona amin-janako any amin’ny toeran’ny maty.» Koa mbola nitomany an-janany ihany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ireo Midianita kosa nivarotra an’i Jôsefa tany Ejipta tamin’i Pôtifara, tandapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' sady lehiben’ny mpiambina azy.'
