document_id: 2CO.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaro ny maha apôstôly azy i Paoly
  - type: text
    content: 'Izaho Paoly mihitsy no manainga anareo, dia izaho izay lazaina fa manetry tena rehefa manoloana anareo, nefa henjana aminareo rehefa lavitra anareo. Miangavy anareo amin’ny fahalemem-panahy sy hamoram-pon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' aho: '
  '10':
  - type: text
    content: '«Mafonja sy mahery vaika ireo taratasin’i Paoly; nefa rehefa mby eto aminay izy tenany, dia olona osa ary ny teniny dia tsinontsinona.» '
  '11':
  - type: text
    content: 'Izao no aoka hosaintsainin’ilay miteny toy izany: sahala amin’izay soratanay an-taratasy raha lavitra izahay, no hataonay rehefa tonga izahay.'
  '12':
  - type: text
    content: 'Marina tokoa fa tsy sahinay ny hampitovy na hampitaha ny tenanay amin’ny olona sasany midera tena; satria tsy hendry ireny, fa manohatra tena amin’ny tenany ihany ary mampitaha tena amin’ny tenany ihany. '
  '13':
  - type: text
    content: 'Izahay kosa tsy mba hirehareha mihoa-pampana, fa dia araka ny fenitry ny asa voafaritr’Andriamanitra ho anjaranay, ka nahatongavanay hatratỳ aminareo. '
  '14':
  - type: text
    content: 'Fa tsy toy ny olona tsy tonga hatratỳ aminareo izahay, ka hoe nihoatra ny faritra natao ho anay; tonga hatratỳ aminareo tokoa izahay nitondra ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Kristy. '
  '15':
  - type: text
    content: 'Tsy mirehareha mihoa-pampana izahay, ka hirehareha amin’ny asa nataon’ny sasany; fa izao no antenainay: rehefa mitombo ny finoanareo, dia hitatra hatrany hatrany eo aminareo koa ny asanay, araka ny fenitra napetrak’Andriamanitra ho anay'
  - type: note
    content: 'And 13-15: ampit Rm 15.17, 21.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Avy eo dia hitory ny Vaovao Mahafaly amin’ireo faritany ivelan’ny anareo izahay, ka tsy hirehareha amin’izay efa vitan’ny sasany eo amin’ny faritra sahaniny.
  '17':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Izay mirehareha dia ny nataon’ny Tompo no aoka hireharehany'
  - type: note
    content: Jereo Jer 9.23; 1Kôr 1.31.
  - type: text
    content: '»; '
  '18':
  - type: text
    content: satria tsy izay midera tena no olona voazaha toetra, fa izay derain’ny Tompo.
  '2':
  - type: text
    content: 'aoka re aho mba tsy ho voatery hanao teny henjana amin’ny hahatongavako atỳ aminareo; fa mikasa hihenjana amim-pahasahiana tokoa aho amin’ny olona sasany, izay mihevitra fa manao fitondrantena araka ny fisainan’olombelona izahay. '
  '3':
  - type: text
    content: 'Na dia ao anatin’ny fiainana maha olombelona aza izahay, dia tsy araka ny fisainan’olombelona no iadianay; '
  '4':
  - type: text
    content: 'satria tsy fitaovam-piadiana malemy, araka ny an’ny olombelona, no entinay miady; fa fitaovam-piadiana mahery, araka an’Andriamanitra, mba hoenti-mandrava mànda. Ravànay ny hevitra diso '
  '5':
  - type: text
    content: 'sy feno avonavona rehetra, izay atsangana hanohitra ny fahalalana an’Andriamanitra; ary babonay hanaiky an’i Kristy ny olona rehetra mahitsy fieritreretana. '
  '6':
  - type: text
    content: Vonona hanafay ny tsy mpanota rehetra izahay, rehefa mampiseho fanoavana tanteraka ianareo.
  '7':
  - type: text
    content: 'Mijery zavatra araka ny fisehony ivelany ihany ianareo! Raha misy olona matoky tena fa an’i Kristy, dia izao indray no aoka hosaintsaininy: tahaka ny maha an’i Kristy azy no maha an’i Kristy anay koa. '
  '8':
  - type: text
    content: 'Ary tsy hahazo henatra aho na dia ireharehako somary tafahoatra aza ny fahefana nomen’ny Tompo anay, dia fahefana hampandrosoana ny Fiangonanareo fa tsy handravana azy. '
  '9':
  - type: text
    content: 'Tsy te hiseho ho toy ny hoe mampitahotra anareo aho amin’ireto taratasy soratako; fa misy manao hoe: '
