  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia hitory ny Vaovao Mahafaly amin’ireo faritany ivelan’ny anareo izahay, ka tsy hirehareha amin’izay efa vitan’ny sasany eo amin’ny faritra sahaniny.
  '17':
