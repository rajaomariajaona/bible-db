    children:
    - type: text
      text: 'Izaho Paoly mihitsy no manainga anareo, dia izaho izay lazaina fa manetry tena rehefa manoloana anareo, nefa henjana aminareo rehefa lavitra anareo. Miangavy anareo amin’ny fahalemem-panahy sy hamoram-pon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aho: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Mafonja sy mahery vaika ireo taratasin’i Paoly; nefa rehefa mby eto aminay izy tenany, dia olona osa ary ny teniny dia tsinontsinona.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no aoka hosaintsainin’ilay miteny toy izany: sahala amin’izay soratanay an-taratasy raha lavitra izahay, no hataonay rehefa tonga izahay.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marina tokoa fa tsy sahinay ny hampitovy na hampitaha ny tenanay amin’ny olona sasany midera tena; satria tsy hendry ireny, fa manohatra tena amin’ny tenany ihany ary mampitaha tena amin’ny tenany ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izahay kosa tsy mba hirehareha mihoa-pampana, fa dia araka ny fenitry ny asa voafaritr’Andriamanitra ho anjaranay, ka nahatongavanay hatratỳ aminareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy toy ny olona tsy tonga hatratỳ aminareo izahay, ka hoe nihoatra ny faritra natao ho anay; tonga hatratỳ aminareo tokoa izahay nitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' momba an’i Kristy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mirehareha mihoa-pampana izahay, ka hirehareha amin’ny asa nataon’ny sasany; fa izao no antenainay: rehefa mitombo ny finoanareo, dia hitatra hatrany hatrany eo aminareo koa ny asanay, araka ny fenitra napetrak’Andriamanitra ho anay'
