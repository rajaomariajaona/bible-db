  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria tsy izay midera tena no olona voazaha toetra, fa izay derain’ny Tompo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aoka re aho mba tsy ho voatery hanao teny henjana amin’ny hahatongavako atỳ aminareo; fa mikasa hihenjana amim-pahasahiana tokoa aho amin’ny olona sasany, izay mihevitra fa manao fitondrantena araka ny fisainan’olombelona izahay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia ao anatin’ny fiainana maha olombelona aza izahay, dia tsy araka ny fisainan’olombelona no iadianay; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria tsy fitaovam-piadiana malemy, araka ny an’ny olombelona, no entinay miady; fa fitaovam-piadiana mahery, araka an’Andriamanitra, mba hoenti-mandrava mànda. Ravànay ny hevitra diso '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy feno avonavona rehetra, izay atsangana hanohitra ny fahalalana an’Andriamanitra; ary babonay hanaiky an’i Kristy ny olona rehetra mahitsy fieritreretana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vonona hanafay ny tsy mpanota rehetra izahay, rehefa mampiseho fanoavana tanteraka ianareo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mijery zavatra araka ny fisehony ivelany ihany ianareo! Raha misy olona matoky tena fa an’i Kristy, dia izao indray no aoka hosaintsaininy: tahaka ny maha an’i Kristy azy no maha an’i Kristy anay koa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy hahazo henatra aho na dia ireharehako somary tafahoatra aza ny fahefana nomen’ny Tompo anay, dia fahefana hampandrosoana ny Fiangonanareo fa tsy handravana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy te hiseho ho toy ny hoe mampitahotra anareo aho amin’ireto taratasy soratako; fa misy manao hoe: '
