      marker: ft
      children:
      - type: text
        text: jereo Nom 14.1-35. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Sal 95.11.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa dia hitantsika fa tsy tafiditra ireo satria tsy nino.
