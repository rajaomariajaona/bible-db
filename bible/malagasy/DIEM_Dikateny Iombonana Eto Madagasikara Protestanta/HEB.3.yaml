segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jesoa dia ambony noho i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa amin’izany, ry havana, efa voatokana ho an’Andriamanitra ianareo sady efa voaantsony hiombon’anjara amin’ny fiainana any an-danitra, ka diniho i Jesoa ilay irak’Andriamanitra sady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisorombe
  - type: text
    text: ' antoky ny finoana izay ekentsika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa i Jesoa dia nahatoky an’Andriamanitra teo amin’ny andraikitra nanendreny Azy, nahatoky tahaka an’i Mosesy izay voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Nahatoky tao amin’ny tranon’Andriamanitra manontolo izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 12.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nefa mendri-boninahitra kokoa noho i Mosesy i Jesoa, satria ny mpanao trano dia mahazo haja bebe kokoa noho ny trano nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny trano rehetra manko dia nisy mpanao azy, fa Andriamanitra kosa no nanao ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary i Mosesy dia nahatoky tao amin’ny tranon’Andriamanitra manontolo, araka ny maha mpanompo azy, ka natao hanambara ny zavatra izay holazain’Andriamanitra amin’ny ho avy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' kosa dia nahatoky araka ny maha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanaka
  - type: text
    text: ' Azy, ka mifehy ny tranon’Andriamanitra; ary dia isika izany tranon’Andriamanitra izany, raha mitana ny fahasahiana sy ny fanantenana ireharehantsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'raha mitana ny fahasahiana...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raha mitana hatramin’ny farany ny fahasahiana...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 14).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fitsaharana omen’Andriamanitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noho izany, araka izay lazain’ny Fanahy Masina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anio, raha renareo ny feon’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia aza hamafisina ny fonareo, tahaka ny tamin’ny
- type: usfm
  marker: q1
  children:
  - type: text
    text: andro niodinan’ny razanareo tamin’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tamin’ny andro nakana fanahy Azy tany an-taniefitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tany no nakan’ny razanareo fanahy Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nizahany toetra Ahy, hoy Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia efa hitany aza ny asa vitako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: nandritra ny efapolo taona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nahatezitra Ahy tamin’ireo olona ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hoy Aho hoe: ‹Maniasia lalandava ny fisainany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nahafantatra ny lalako ireo.›
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tezitra Aho ka nianiana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 7-11:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 95.7-11, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tandremo, ry havana, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin’Andriamanitra velona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa aoka ianareo hifampirisika isan’andro, dieny mbola misy ny hoe «anio» lazain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ', mba tsy hisy ho voafitaky ny fahotana ianareo ka ho tonga mafy fo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, efa tonga mpiombon-tsoa amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' isika, raha tanantsika mafy hatramin’ny farany ny toky izay nananantsika hatrany am-boalohany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’ny Soratra Masina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anio, raha renareo ny feon’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aza hamafisina ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny tamin’ny niodinan’ny razanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 95.7-8, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Iza moa ireo nandre ny feon’Andriamanitra nefa niodina taminy? Ireo rehetra nentin’i Mosesy niala tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary iza no nahatezitra an’Andriamanitra nandritra ny efapolo taona? Ireo nanota ka niampatrampatra tany an-taniefitra ny fatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha nianiana Andriamanitra nanao hoe: «Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo», iza moa no lazainy? Ireo tsy nanaiky'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 16-18:'
    - type: usfm
      marker: ft
