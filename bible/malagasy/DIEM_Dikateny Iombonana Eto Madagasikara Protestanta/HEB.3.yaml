type_code: plt
verses:
  '1':
  - type: heading
    content: I Jesoa dia ambony noho i Mosesy
  - type: text
    content: 'Koa amin’izany, ry havana, efa voatokana ho an’Andriamanitra ianareo sady efa voaantsony hiombon’anjara amin’ny fiainana any an-danitra, ka diniho i Jesoa ilay irak’Andriamanitra sady '
  - type: text
    content: Mpisorombe
  - type: text
    content: ' antoky ny finoana izay ekentsika. '
  '10':
  - type: text
    content: nandritra ny efapolo taona.
  - type: text
    content: Izany no nahatezitra Ahy tamin’ireo olona ireo,
  - type: text
    content: 'ka hoy Aho hoe: ‹Maniasia lalandava ny fisainany;'
  - type: text
    content: tsy nahafantatra ny lalako ireo.›
  '11':
  - type: text
    content: 'Tezitra Aho ka nianiana hoe:'
  - type: text
    content: Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo
  - type: note
    content: 'And 7-11: Sal 95.7-11, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: '!»'
  '12':
  - type: text
    content: 'Tandremo, ry havana, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin’Andriamanitra velona. '
  '13':
  - type: text
    content: 'Fa aoka ianareo hifampirisika isan’andro, dieny mbola misy ny hoe «anio» lazain’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', mba tsy hisy ho voafitaky ny fahotana ianareo ka ho tonga mafy fo. '
  '14':
  - type: text
    content: 'Eny, efa tonga mpiombon-tsoa amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' isika, raha tanantsika mafy hatramin’ny farany ny toky izay nananantsika hatrany am-boalohany.'
  '15':
  - type: text
    content: 'Izao no lazain’ny Soratra Masina:'
  - type: text
    content: «Anio, raha renareo ny feon’Andriamanitra,
  - type: text
    content: dia aza hamafisina ny fonareo,
  - type: text
    content: tahaka ny tamin’ny niodinan’ny razanareo
  - type: text
    content: tamin’Andriamanitra
  - type: note
    content: Sal 95.7-8, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '16':
  - type: text
    content: 'Iza moa ireo nandre ny feon’Andriamanitra nefa niodina taminy? Ireo rehetra nentin’i Mosesy niala tany Ejipta. '
  '17':
  - type: text
    content: 'Ary iza no nahatezitra an’Andriamanitra nandritra ny efapolo taona? Ireo nanota ka niampatrampatra tany an-taniefitra ny fatiny. '
  '18':
  - type: text
    content: 'Raha nianiana Andriamanitra nanao hoe: «Tsy hiditra mihitsy ao amin’ny toeram-pitsaharana nomaniko ireo», iza moa no lazainy? Ireo tsy nanaiky'
  - type: note
    content: 'And 16-18: jereo Nom 14.1-35. –And 18: Sal 95.11.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: Koa dia hitantsika fa tsy tafiditra ireo satria tsy nino.
  '2':
  - type: text
    content: 'Fa i Jesoa dia nahatoky an’Andriamanitra teo amin’ny andraikitra nanendreny Azy, nahatoky tahaka an’i Mosesy izay voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Nahatoky tao amin’ny tranon’Andriamanitra manontolo izy'
  - type: note
    content: Jereo Nom 12.7 sy nta.
  - type: text
    content: '.» '
  '3':
  - type: text
    content: 'Nefa mendri-boninahitra kokoa noho i Mosesy i Jesoa, satria ny mpanao trano dia mahazo haja bebe kokoa noho ny trano nataony. '
  '4':
  - type: text
    content: 'Ny trano rehetra manko dia nisy mpanao azy, fa Andriamanitra kosa no nanao ny zavatra rehetra. '
  '5':
  - type: text
    content: 'Ary i Mosesy dia nahatoky tao amin’ny tranon’Andriamanitra manontolo, araka ny maha mpanompo azy, ka natao hanambara ny zavatra izay holazain’Andriamanitra amin’ny ho avy. '
  '6':
  - type: text
    content: 'Fa i '
  - type: text
    content: Kristy
  - type: text
    content: ' kosa dia nahatoky araka ny maha '
  - type: text
    content: Zanaka
  - type: text
    content: ' Azy, ka mifehy ny tranon’Andriamanitra; ary dia isika izany tranon’Andriamanitra izany, raha mitana ny fahasahiana sy ny fanantenana ireharehantsika'
  - type: note
    content: 'raha mitana ny fahasahiana...: misy stf sasany ahitana hoe raha mitana hatramin’ny farany ny fahasahiana... (jereo and 14).'
  - type: text
    content: .
  - type: heading
    content: Ny fitsaharana omen’Andriamanitra ny vahoakany
  '7':
  - type: text
    content: 'Noho izany, araka izay lazain’ny Fanahy Masina hoe:'
  - type: text
    content: «Anio, raha renareo ny feon’Andriamanitra,
  '8':
  - type: text
    content: dia aza hamafisina ny fonareo, tahaka ny tamin’ny
  - type: text
    content: andro niodinan’ny razanareo tamin’Andriamanitra,
  - type: text
    content: tahaka ny tamin’ny andro nakana fanahy Azy tany an-taniefitra.
  '9':
  - type: text
    content: Tany no nakan’ny razanareo fanahy Ahy
  - type: text
    content: sy nizahany toetra Ahy, hoy Andriamanitra,
  - type: text
    content: na dia efa hitany aza ny asa vitako
