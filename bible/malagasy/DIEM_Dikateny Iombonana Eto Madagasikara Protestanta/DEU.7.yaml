      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tandremo ny didy sy lalàna amam-pitsipika izay andidiako anareo anio mba hotanterahinareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ireo fitsipika ireo no henoinareo ka imasoanareo hotanterahina, dia hotandrovin’ny TOMPO Andriamanitrareo aminareo ny fanekempihavanana sy ny fitiavana izay nianianany tamin’ny razambenareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ho tiany sy hotahîny ary hohamaroiny ianareo; hotahîny ny zaza haterakareo sy ireo vokatry ny taninareo, dia ny varinareo sy ny divainareo ary ny menakareo; hotahîny koa ny vokatry ny fiompianareo, dia ny ombinareo sy ny ondry aman’osinareo any amin’ny tany izay nianianany tamin’ny razambenareo fa homena anareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotahîny mihoatra noho ny firenena hafa rehetra ianareo; tsy hisy lahy na vavy momba eo aminareo na eo amin’ny biby fiompinareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary harovan’ny TOMPO tsy ho azon’aretina ianareo, ka tsy hisy hamelezany anareo ny aretin-dratsy izay fantatrareo fa nanjo an’i Ejipta; saingy hafitsony amin’izay rehetra mankahala anareo kosa ireny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka hofongoranareo tsy hisy antra mihitsy ny firenena rehetra izay hatolotry ny TOMPO Andriamanitrareo; ary aza tompoinareo ny andriamaniny, fa ho fandrika hampanompo sampy anareo ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 12-16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 11.13-17.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arovan’ny Tompo hatrany ny vahoakany
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ianareo hiteny anakampo hoe: «Maro noho izahay ireo firenena ireo, ka hataonay ahoana no fandroaka azy?», '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia aza matahotra azy ianareo. Tsarovy tsara kosa izay nataon’ny TOMPO Andriamanitrareo tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' sy tamin’i Ejipta manontolo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Masonareo no nahita ny fampahoriana mafy nafitsony an-dry zareo, ny famantarana sy zava-mahagaga vitany ary ny fiarovana mahery sy fahefana tsy hay tohaina namoahany anareo tany Ejipta: toy izany koa no hataon’ny TOMPO Andriamanitrareo amin’ny firenena rehetra izay atahoranareo! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hatolotry ny TOMPO Andriamanitrareo ho eo ambany fahefànareo ireny ka horesenareo, dia ataovy ringana tanteraka. Aza manao fanekempihavanana aminy na mamindrafo aminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na izay sisa tavela ka hiery tsy ho hitanareo aza, dia handefasan’ny TOMPO Andriamanitrareo fanenitra hamely azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fanenitra hamely azy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hareraham-po izy.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Ampit Eks 23.28 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' mandra-paharingany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza matahotra ireny firenena ireny ianareo, fa eo afovoanareo ilay TOMPO Andriamanitrareo, Andriamanitra lehibe sy mahatahotra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horoahiny tsikelikely eo anoloanareo izy ireny; tsy ho azonareo fongorana vetivety manko ireny, fandrao hihamaro ny bibidia ka hamely anareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatolotry ny TOMPO Andriamanitrareo ho eo ambany fahefànareo ireny firenena ireny, ka hataony mifanaritaka be ihany mandra-paharingana ireny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hatolony eo an-tananareo koa ny mpanjakany ka ho foananareo tsy ho re laza intsony eto amin’izao tontolo izao; tsy hisy olona hahatohitra anareo mandra-paharinganareo azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sarin-tsampy voasokitra, izay andriamaniny, dia hodoranareo; aza tsiriritinareo na alainareo ho anareo ny volafotsy na volamena izay eo amin’ireny sarin-tsampy ireny, fandrao ho fandrika hampanompo sampy anareo izany: eny, zava-mahatsiravina eo imason’ny TOMPO Andriamanitrareo ireny rehetra ireny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mampiditra sarin-tsampy ao an-tranonareo ianareo, fandrao ho mendrika haringana miaraka aminy; ho hàlanareo indrindra sy ho zava-mahatsiravina tokoa eo imasonareo izany, satria zavatra tsy maintsy haringana tanteraka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mampifanambady ny zanakareo aminy; ny zanakavavinareo tsy homenareo ho vadin’ny zanakalahiny, ary ny zanakavaviny tsy halainareo ho vadin’ny zanakalahinareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa havilin’ireny vahiny ireny tsy hanaraka ny TOMPO ireo taranakareo ka hanompo andriamani-kafa; dia hirehitra aminareo ny fahatezeran’ny TOMPO ka haringany vetivety ianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao kosa no ataovy amin’ireny firenena ireny: ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitarany
    - type: text
      text: ', horavanareo; ny tsangambaton-tsampiny, hovakivakînareo; ny tsato-kazo fanajany an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Aserà
    - type: text
      text: ', hokapainareo; ary ny sarin-tsampiny voasokitra, hodoranareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo; ianareo no efa nofidin’ny TOMPO Andriamanitrareo tamin’ny firenena rehetra ambonin’ny tany mba ho vahoaka fananany sarobidy indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy ivadihan’ny Tompo na oviana na oviana ny fanekempihavanany
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hoe ianareo maro noho ny firenena hafa rehetra no nampiraiki-po ny TOMPO taminareo sy nifidianany anareo, satria vitsy noho ny firenena hafa rehetra aza ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha nentin’ny TOMPO tamin’ny fiarovana mahery ianareo sy navotany tamin’ny toeram-panandevozana teo ambany fifehezan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjakan’i Ejipta, dia satria tian’ny TOMPO ianareo ary tandroviny aminareo ny fianianana nataony tamin’ny razambenareo.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fantatrareo fa ny TOMPO Andriamanitrareo no hany Andriamanitra tena Izy. Mitandro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanany
    - type: text
      text: ' sy ny fitiavany hatramin’ny taranaka faharivo Izy amin’izay tia Azy sy mitandrina ny didiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fitiavany... tia Azy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fitiavany amin’ny olona arivoarivo Izy, dia amin’izay tia Azy.
      marker-yv: yv-n
    - type: text
      text: '; '
