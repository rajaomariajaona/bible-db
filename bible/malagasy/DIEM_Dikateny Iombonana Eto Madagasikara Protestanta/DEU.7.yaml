document_id: DEU.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Israely vahoaka voatokana ho an’ny Tompo
  - type: text
    content: 'Ny TOMPO Andriamanitrareo no hampiditra anareo any amin’ny tany izay hidiranareo mba halainareo ho fananana. Firenena maro, firenena fito izay lehibe sy mahery noho ianareo, no horoahin’ny TOMPO hiala eo anoloanareo: dia ny Hetita sy ny Girgasîta, ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny Kanahanîta, ny Perizîta sy ny Hivîta ary ny Jebosîta'
  - type: note
    content: Jereo Asa 13.19.
  - type: text
    content: '. '
  '10':
  - type: text
    content: fa an-karihary sady tsy an-kitaredretra kosa no amaliany sy andringanany an’izay mankahala Azy
  - type: note
    content: 'And 9-10: jereo 5.9-10; Eks 20.5-6; 34.6-7; Nom 14.18.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Koa tandremo ny didy sy lalàna amam-pitsipika izay andidiako anareo anio mba hotanterahinareo.
  '12':
  - type: text
    content: 'Raha ireo fitsipika ireo no henoinareo ka imasoanareo hotanterahina, dia hotandrovin’ny TOMPO Andriamanitrareo aminareo ny fanekempihavanana sy ny fitiavana izay nianianany tamin’ny razambenareo. '
  '13':
  - type: text
    content: 'Eny, ho tiany sy hotahîny ary hohamaroiny ianareo; hotahîny ny zaza haterakareo sy ireo vokatry ny taninareo, dia ny varinareo sy ny divainareo ary ny menakareo; hotahîny koa ny vokatry ny fiompianareo, dia ny ombinareo sy ny ondry aman’osinareo any amin’ny tany izay nianianany tamin’ny razambenareo fa homena anareo. '
  '14':
  - type: text
    content: 'Hotahîny mihoatra noho ny firenena hafa rehetra ianareo; tsy hisy lahy na vavy momba eo aminareo na eo amin’ny biby fiompinareo. '
  '15':
  - type: text
    content: Ary harovan’ny TOMPO tsy ho azon’aretina ianareo, ka tsy hisy hamelezany anareo ny aretin-dratsy izay fantatrareo fa nanjo an’i Ejipta; saingy hafitsony amin’izay rehetra mankahala anareo kosa ireny.
  '16':
  - type: text
    content: Aoka hofongoranareo tsy hisy antra mihitsy ny firenena rehetra izay hatolotry ny TOMPO Andriamanitrareo; ary aza tompoinareo ny andriamaniny, fa ho fandrika hampanompo sampy anareo ireny
  - type: note
    content: 'And 12-16: jereo 11.13-17.'
  - type: text
    content: .
  - type: heading
    content: Arovan’ny Tompo hatrany ny vahoakany
  '17':
  - type: text
    content: 'Raha ianareo hiteny anakampo hoe: «Maro noho izahay ireo firenena ireo, ka hataonay ahoana no fandroaka azy?», '
  '18':
  - type: text
    content: 'dia aza matahotra azy ianareo. Tsarovy tsara kosa izay nataon’ny TOMPO Andriamanitrareo tamin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy tamin’i Ejipta manontolo. '
  '19':
  - type: text
    content: 'Masonareo no nahita ny fampahoriana mafy nafitsony an-dry zareo, ny famantarana sy zava-mahagaga vitany ary ny fiarovana mahery sy fahefana tsy hay tohaina namoahany anareo tany Ejipta: toy izany koa no hataon’ny TOMPO Andriamanitrareo amin’ny firenena rehetra izay atahoranareo! '
  '2':
  - type: text
    content: 'Rehefa hatolotry ny TOMPO Andriamanitrareo ho eo ambany fahefànareo ireny ka horesenareo, dia ataovy ringana tanteraka. Aza manao fanekempihavanana aminy na mamindrafo aminy. '
  '20':
  - type: text
    content: Na izay sisa tavela ka hiery tsy ho hitanareo aza, dia handefasan’ny TOMPO Andriamanitrareo fanenitra hamely azy
  - type: note
    content: fanenitra hamely azy na hoe hareraham-po izy. Ampit Eks 23.28 sy nta.
  - type: text
    content: ' mandra-paharingany. '
  '21':
  - type: text
    content: 'Aza matahotra ireny firenena ireny ianareo, fa eo afovoanareo ilay TOMPO Andriamanitrareo, Andriamanitra lehibe sy mahatahotra. '
  '22':
  - type: text
    content: 'Horoahiny tsikelikely eo anoloanareo izy ireny; tsy ho azonareo fongorana vetivety manko ireny, fandrao hihamaro ny bibidia ka hamely anareo. '
  '23':
  - type: text
    content: 'Hatolotry ny TOMPO Andriamanitrareo ho eo ambany fahefànareo ireny firenena ireny, ka hataony mifanaritaka be ihany mandra-paharingana ireny. '
  '24':
  - type: text
    content: 'Dia hatolony eo an-tananareo koa ny mpanjakany ka ho foananareo tsy ho re laza intsony eto amin’izao tontolo izao; tsy hisy olona hahatohitra anareo mandra-paharinganareo azy. '
  '25':
  - type: text
    content: 'Ny sarin-tsampy voasokitra, izay andriamaniny, dia hodoranareo; aza tsiriritinareo na alainareo ho anareo ny volafotsy na volamena izay eo amin’ireny sarin-tsampy ireny, fandrao ho fandrika hampanompo sampy anareo izany: eny, zava-mahatsiravina eo imason’ny TOMPO Andriamanitrareo ireny rehetra ireny. '
  '26':
  - type: text
    content: Aza mampiditra sarin-tsampy ao an-tranonareo ianareo, fandrao ho mendrika haringana miaraka aminy; ho hàlanareo indrindra sy ho zava-mahatsiravina tokoa eo imasonareo izany, satria zavatra tsy maintsy haringana tanteraka.
  '3':
  - type: text
    content: 'Aza mampifanambady ny zanakareo aminy; ny zanakavavinareo tsy homenareo ho vadin’ny zanakalahiny, ary ny zanakavaviny tsy halainareo ho vadin’ny zanakalahinareo. '
  '4':
  - type: text
    content: 'Fa havilin’ireny vahiny ireny tsy hanaraka ny TOMPO ireo taranakareo ka hanompo andriamani-kafa; dia hirehitra aminareo ny fahatezeran’ny TOMPO ka haringany vetivety ianareo. '
  '5':
  - type: text
    content: 'Fa izao kosa no ataovy amin’ireny firenena ireny: ny '
  - type: text
    content: alitarany
  - type: text
    content: ', horavanareo; ny tsangambaton-tsampiny, hovakivakînareo; ny tsato-kazo fanajany an’i '
  - type: text
    content: Aserà
  - type: text
    content: ', hokapainareo; ary ny sarin-tsampiny voasokitra, hodoranareo'
  - type: note
    content: Jereo 12.3.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo; ianareo no efa nofidin’ny TOMPO Andriamanitrareo tamin’ny firenena rehetra ambonin’ny tany mba ho vahoaka fananany sarobidy indrindra
  - type: note
    content: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
  - type: text
    content: .
  - type: heading
    content: Tsy ivadihan’ny Tompo na oviana na oviana ny fanekempihavanany
  '7':
  - type: text
    content: 'Tsy hoe ianareo maro noho ny firenena hafa rehetra no nampiraiki-po ny TOMPO taminareo sy nifidianany anareo, satria vitsy noho ny firenena hafa rehetra aza ianareo. '
  '8':
  - type: text
    content: 'Fa raha nentin’ny TOMPO tamin’ny fiarovana mahery ianareo sy navotany tamin’ny toeram-panandevozana teo ambany fifehezan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta, dia satria tian’ny TOMPO ianareo ary tandroviny aminareo ny fianianana nataony tamin’ny razambenareo.'
  '9':
  - type: text
    content: 'Aoka ho fantatrareo fa ny TOMPO Andriamanitrareo no hany Andriamanitra tena Izy. Mitandro ny '
  - type: text
    content: fanekempihavanany
  - type: text
    content: ' sy ny fitiavany hatramin’ny taranaka faharivo Izy amin’izay tia Azy sy mitandrina ny didiny'
  - type: note
    content: fitiavany... tia Azy na hoe fitiavany amin’ny olona arivoarivo Izy, dia amin’izay tia Azy.
  - type: text
    content: '; '
