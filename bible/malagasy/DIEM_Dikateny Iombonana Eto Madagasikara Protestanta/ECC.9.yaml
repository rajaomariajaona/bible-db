document_id: ECC.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nandinika izany rehetra rehetra izany tato anatiko aho, dia nahatsapa fa ny marina sy ny hendry mbamin’ny asany dia eo an-tanan’Andriamanitra. Fa tsy fantatry ny olona akory na ny fitiavana na ny fankahalana. Tsy afaka ny haminavina izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary tahaka izany avokoa ny olona rehetra. Mitovy avokoa ny manjo ny olo-marina sy ny olo-meloka, ny tsara fanahy sy ny ratsy fanahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sy ny ratsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo teny ireo izay hita amin’ny dkt tranainy sasany dia tsy hita amin’ny rijan-teny hebreo.
    marker-yv: yv-n
  - type: text
    text: '; mitovy avokoa ny manjo ny olona '
  - type: usfm
    marker: w
    children:
    - type: text
      text: madio
  - type: text
    text: ' ara-pivavahana sy izay tsy madio, ny olona manao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' sy izay tsy manao sorona; mitovy avokoa ny manjo ny tsara fanahy sy ny mpanota ary koa ny olona manao fianianana amin’Andriamanitra sy izay tsy sahy manao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitovy avokoa ny manjo ny olona rehetra: io no loza amin’izay rehetra atao eto ambonin’ny tany. Feno faharatsiana ny fon’ny olona ka fahadalana no ao aminy mandritra ny fiainany; avy eo anefa dia ho any amin’ny maty no hiafarany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izay anisan’ny velona ihany no mahazo antoka fa aleo alika velona toy izay liona maty. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny velona manko mba mahalala fa ho faty izy; fa ny maty kosa tsy mba mahalala na inona na inona, ary tsy misy valisoa intsony ho azy satria efa nohadinoina ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka na ny fitiavany na ny fankahalany na ny fialonany dia samy efa levona hatry ny ela; ka tsy manana anjara intsony amin’izay zavatra atao etỳ ambonin’ny tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noho izany, hano amim-pifaliana ny haninao ary sotroy amin’ny fo ravoravo ny divainao, satria efa sitrak’Andriamanitra ireo asanao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Amin’ny fotoan-drehetra, mitafia akanjo fitondra amin’ny andro fety ary aza hadinoina ny manisy ilomanitra ny tarehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ankamamio ny miaina miaraka amin’ilay vady malalanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 5.18.
    marker-yv: yv-n
  - type: text
    text: ' mandritra ny andro mihelina rehetra omen’Andriamanitra hiainanao etỳ ambonin’ny tany. Fa izany no anjaranao amin’izao fiainana izao sy amin’ny fisasaranao etỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ampiasao ny herinao hanatanterahanao izay rehetra azonao atao, fa any amin’ny toeran’ny maty izay halehanao tsy mba misy asa na famoronan-javatra na fahalalana na fahendrena.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy mandrakariva no ahombiazan’ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mbola nahita zavatra betsaka tetỳ ambonin’ny tany koa aho. Tsy ny faingam-pandeha hatrany no mandresy eo amin’ny fihazakazahana; ary tsy ny mahery fo hatrany no mandresy eo amin’ny ady. Tsy ny hendry no mora mahazo ny hanina hohaniny; ary tsy ny manan-tsaina no mora mahazo harena. Tsy ny olo-mahay no tsy maintsy homem-boninahitra, fa samy mpahazo ny rehetra na ny fanambinana na ny sampona. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy misy olona mahafantatra ny fotoana hiavian’ny loza. Fa toy ny trondro azon’ny harato, ary tahaka ny voron-kely voam-pandrika no hahitany loza mahavoa azy tampotampoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao koa no oha-pahendrena hitako teto ambonin’ny tany; ary zava-dehibe amiko izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nisy tanàna kely iray sady vitsy mponina. Tonga nanafika azy io ny mpanjaka lehibe iray ka nanao fahirano sady namboatra tovon-tany goavana hamelezana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nisy lehilahy iray mahantra nefa hendry tao, izay afaka nahavonjy ny tanàna noho ny fahendreny. Saingy tsy mba nisy olona nahatsiaro ilay olo-mahantra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ka hoy aho hoe: Tsara kokoa ny fahendrena noho ny hery. Kanefa dia atao tsinontsinona ny fahendren’ity olo-mahantra, ary tsy mba henoina akory ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa aleo mihaino ny teny malefaky ny hendry toy izay ny teny mafy atao amin’ny adala. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mandaitra kokoa noho ny fitaovam-piadiana ny fahendrena, saingy ny olona iray mitavozavoza no mahasimba ny soa be avy aminy.
