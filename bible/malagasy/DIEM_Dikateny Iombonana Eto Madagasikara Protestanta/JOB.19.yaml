document_id: JOB.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Valintenin’i Jôba: Any am-parany dia hiseho ny mpiaro ahy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly i Jôba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hafiriana no mbola hampahorianareo ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka handrerahanareo ahy amin’ny fitenenana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa impolo kely izao no nanevatevanareo ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy menatra ve ianareo mampahory ahy toy izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha nisy tokoa aza fahadisoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ahy samirery ihany ny amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nefa raha mihevitra ny hirehareha amiko kosa ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanao ny fahoriako ho porofon’ny maha meloka ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia fantaro fa Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nahatonga izao fahavoazako izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanarona ahy tamin’ny haratony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha miantso mafy aho hoe: «Loza!»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy misy mamaly ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mba miantso vonjy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy mahazo rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Bahanan’Andriamanitra ny lalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hahafahako mandeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary amin’ny sakeli-dalana alehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nasiany haizina hiraparapako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nataony afa-boninahitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nesoriny teo an-dohako ny satroboninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toa trano narodany hatraiza hatraiza aho ka potika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nongotany toa fanongotra hazo ny fanantenàko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nirehitra tamiko ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nataony toy ny fahavalo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tafangona avokoa ireo andia-miaramilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitady lalana hahatrarana ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitoby nanao fahirano ny laiko.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rahalahiko efa nampanalavirina ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo nahafantatra ahy tsy te hahalala intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny havako akaiky efa nihatakataka tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo sakaizako efa nanadino ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny vahiny nampiantranoiko sy ny mpiasako
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nihevitra ahy ho olon-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tonga tsy fantany intsony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Antsoiko ny mpanompoko fa tsy mamaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia efa nitalahoako fatratra aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy mahatanty ny fofonaiko intsony ny vadiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tofoka amiko koa ireo zanaka naterako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mamingavinga ahy hatramin’ny ankizy kely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa raha mitsangan-kamindra aho, dia esoiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsiravina amiko ireo sakaiza nitokiako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nivadika tamiko avokoa ny olon-tiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Taolana mifono hoditra sisa aho ankehitriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny akanjo-nifiko no hany entiko mandositra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Iantrao dia iantrao aho, ry sakaizako isany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny tanan’Andriamanitra no namely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nahoana no manenjika ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka an’Andriamanitra koa ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy sasatry ny mampijaly ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tiako raha mba voasoratra ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho voasokitra any ho any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Enga anie ka ho voasokitra amin’ny fandrabỳ izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady harahina loko firaka isaky ny litera
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka haharitra mandrakizay eo amin’ny vatolampy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fantatro fa velona ny Mpanavotra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitsangana farany eo amin’ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Rehefa mihintsana izao hoditro izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho afaka amin’ny nofoko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hahita an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Eny, izaho mihitsy no hijery Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny masoko no hahita fa tsy ny hafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa sasa-miandry izany ny foko ato anaty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hoy ianareo hoe: «Ahoana no fanenjika azy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahitana izay anton-javatra hitsarana azy?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Koa matahora ny sabatra ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hovalian-tsabatra ny di-dohanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho fantatrareo fa misy fitsarana.
