document_id: JOB.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: Any am-parany dia hiseho ny mpiaro ahy'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Toa trano narodany hatraiza hatraiza aho ka potika
  - type: text
    content: ary nongotany toa fanongotra hazo ny fanantenàko.
  '11':
  - type: text
    content: Dia nirehitra tamiko ny fahatezerany,
  - type: text
    content: ka nataony toy ny fahavalo aho.
  '12':
  - type: text
    content: Tafangona avokoa ireo andia-miaramilany
  - type: text
    content: ka nitady lalana hahatrarana ahy
  - type: text
    content: ary mitoby nanao fahirano ny laiko.
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Ny rahalahiko efa nampanalavirina ahy.
  - type: text
    content: Ireo nahafantatra ahy tsy te hahalala intsony.
  '14':
  - type: text
    content: Ny havako akaiky efa nihatakataka tamiko,
  - type: text
    content: ireo sakaizako efa nanadino ahy.
  '15':
  - type: text
    content: Ny vahiny nampiantranoiko sy ny mpiasako
  - type: text
    content: dia nihevitra ahy ho olon-kafa;
  - type: text
    content: eny, tonga tsy fantany intsony aho.
  '16':
  - type: text
    content: Antsoiko ny mpanompoko fa tsy mamaly
  - type: text
    content: na dia efa nitalahoako fatratra aza.
  '17':
  - type: text
    content: Tsy mahatanty ny fofonaiko intsony ny vadiko
  - type: text
    content: ary tofoka amiko koa ireo zanaka naterako.
  '18':
  - type: text
    content: Mamingavinga ahy hatramin’ny ankizy kely;
  - type: text
    content: fa raha mitsangan-kamindra aho, dia esoiny.
  '19':
  - type: text
    content: Tsiravina amiko ireo sakaiza nitokiako;
  - type: text
    content: ary nivadika tamiko avokoa ny olon-tiako.
  '2':
  - type: text
    content: Hafiriana no mbola hampahorianareo ahy
  - type: text
    content: ka handrerahanareo ahy amin’ny fitenenana?
  '20':
  - type: text
    content: Taolana mifono hoditra sisa aho ankehitriny;
  - type: text
    content: ary ny akanjo-nifiko no hany entiko mandositra.
  - type: heading
    content: '*'
  '21':
  - type: text
    content: Iantrao dia iantrao aho, ry sakaizako isany,
  - type: text
    content: fa ny tanan’Andriamanitra no namely ahy.
  '22':
  - type: text
    content: Nahoana no manenjika ahy
  - type: text
    content: tahaka an’Andriamanitra koa ianareo
  - type: text
    content: ka tsy sasatry ny mampijaly ahy?
  '23':
  - type: text
    content: Tiako raha mba voasoratra ny teniko,
  - type: text
    content: ka ho voasokitra any ho any.
  '24':
  - type: text
    content: Enga anie ka ho voasokitra amin’ny fandrabỳ izany
  - type: text
    content: sady harahina loko firaka isaky ny litera
  - type: text
    content: ka haharitra mandrakizay eo amin’ny vatolampy.
  - type: heading
    content: '*'
  '25':
  - type: text
    content: Fantatro fa velona ny Mpanavotra ahy;
  - type: text
    content: ka hitsangana farany eo amin’ny tany Izy.
  '26':
  - type: text
    content: Rehefa mihintsana izao hoditro izao
  - type: text
    content: ka ho afaka amin’ny nofoko aho,
  - type: text
    content: dia hahita an’Andriamanitra.
  '27':
  - type: text
    content: Eny, izaho mihitsy no hijery Azy,
  - type: text
    content: ka ny masoko no hahita fa tsy ny hafa.
  - type: text
    content: Efa sasa-miandry izany ny foko ato anaty.
  '28':
  - type: text
    content: 'Hoy ianareo hoe: «Ahoana no fanenjika azy,'
  - type: text
    content: hahitana izay anton-javatra hitsarana azy?»
  '29':
  - type: text
    content: Koa matahora ny sabatra ianareo,
  - type: text
    content: fa hovalian-tsabatra ny di-dohanareo;
  - type: text
    content: ary ho fantatrareo fa misy fitsarana.
  '3':
  - type: text
    content: Efa impolo kely izao no nanevatevanareo ahy,
  - type: text
    content: ka tsy menatra ve ianareo mampahory ahy toy izao?
  '4':
  - type: text
    content: Fa raha nisy tokoa aza fahadisoako,
  - type: text
    content: dia ahy samirery ihany ny amin’izany.
  '5':
  - type: text
    content: Nefa raha mihevitra ny hirehareha amiko kosa ianareo
  - type: text
    content: ka hanao ny fahoriako ho porofon’ny maha meloka ahy,
  '6':
  - type: text
    content: dia fantaro fa Andriamanitra
  - type: text
    content: no nahatonga izao fahavoazako izao
  - type: text
    content: sady nanarona ahy tamin’ny haratony.
  - type: heading
    content: '*'
  '7':
  - type: text
    content: 'Raha miantso mafy aho hoe: «Loza!»,'
  - type: text
    content: dia tsy misy mamaly ahy.
  - type: text
    content: Raha mba miantso vonjy aho,
  - type: text
    content: dia tsy mahazo rariny.
  '8':
  - type: text
    content: Bahanan’Andriamanitra ny lalako
  - type: text
    content: mba tsy hahafahako mandeha;
  - type: text
    content: ary amin’ny sakeli-dalana alehako
  - type: text
    content: dia nasiany haizina hiraparapako.
  '9':
  - type: text
    content: Efa nataony afa-boninahitra aho
  - type: text
    content: ary nesoriny teo an-dohako ny satroboninahitro.
