document_id: HOS.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsaran’Andriamanitra ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manana ady amin’ny mponin’ity tany ity ny TOMPO, ry Israelita; ka henoy izao teniny izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy misy toetra mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy fitiava-namana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na fahalalàna an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa mitombo ny fanozonana olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny famitahana azy ary ny famonoana azy ho faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny halatra sy ny fanitsakitsaham-bady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifandimby ny ra latsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho izany, fadiranovana ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: reraka ny mponina rehetra ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny biby eny an-tsaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny voromanidina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na ny trondron-dranomasina aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ringana koa.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fivadihan’ireo mpisorona
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy iza no ampangaina sy kianina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa ny tenanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ifandaharako, hoy ny Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho tafintohina antoandro ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' koa amin’ny alina'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hiara-tafintohina aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hataoko ringana i Israely reninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho ringana ny vahoakako
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsifisian’ny fahalalana Ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nandà ny fahalalana Ahy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia mba holaviko tsy ho mpisorona intsony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanadino ny lalànan’Andriamanitrao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mpisorona koa dia nanana anjara asa fitahirizana sy fampitana ny fampianarana (na ny lalànan’Andriamanitra) (jereo Deot 33.10).
    marker-yv: yv-n
  - type: text
    text: ' ianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia mba hohadinoiko koa ny zanakao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Arakaraka ny nahabetsaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no vao mainka nanotany tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia hampodiko ho henatra ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ataon’ny vahoakako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fanalana ny fahotana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanina ivelomany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka satriny ihany ho diso ireny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 6.19-22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa hitovy ny hanjo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpisorona sy ny laîka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hofaiziko noho ny fitondrantenany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hatsingeriko aminy ny ratsy nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hihinana ihany izy fa tsy ho voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hivaro-tena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ihany izy fa tsy hanan-janaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izaho TOMPO efa tsy nahoany intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fijangajangana sy ny fahamamoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahavery hevitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mila saina amin’ny tapa-kazony ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tehiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tehiny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpaminany dia manao fanesoana mampahatsiaro tsato-kazon-tsampy (Jereo Mpits 6.25 sy nta) na hazo kely fampiasa haminavinana ny hoavy.
    marker-yv: yv-n
  - type: text
    text: ' no manoro hevitra azy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rivotry ny fivarotan-tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mitsoka eo aminy ka mampania azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa dia lasa nivaro-tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: niala tamin’Andriamaniny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mihinana ny sorona aterina amin-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tampon-tendrombohitra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandoro ditin-kazo manitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia eny ambanin’ny hazo ôaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny hazo be ravina ary ny terebinta
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsara alokaloka ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no mahatonga
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanakavavinareo hivaro-tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny vinantovavinareo hanitsakitsa-bady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy hofaiziko ny zanakavavinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mivaro-tena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny vinantovavinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha manitsakitsa-bady izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ireny mpisorona ireny aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mitondra mpivarotena any amin’ny takona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mihinana ny sorona aterina amin-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: miaraka amin’ireny vehivavy ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy ny ohabolana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izay vahoaka tsy misy fahaiza-manavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vahoaka mamery ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia mivaro-tena aza ianao, ry Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka tsy hanota toy izany koa i Joda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mankany Gilgala
- type: usfm
  marker: q1
  children:
  - type: text
    text: na miakatra any Bety-Avena ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary aza mianiana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Velona ny TOMPO...
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Avena:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Ham 5.5 sy nta amin’ny Ham 3.14 sy 4.4. –Momba ny faran’ny and. dia jereo Ham 8.14.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa mafy hatoka toy ny ombivavy tsy mety ziogaina i Israely. Koa nahoana ny TOMPO no hitondra azy toy ny zanak’ondry andrasana eny an-kijana? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tafaray amin’ny sampy i Efraîma, ka avelao izy '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'hanapitra ny fibobohany hampahery mijangajanga azy; fa tia fahafaham-baràka ireo filohany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Faohin’ny tadio mitambolimbolina izy ka ho menatra noho ireo sorona nataony.
