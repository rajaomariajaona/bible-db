document_id: HOS.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsaran’Andriamanitra ny vahoakany
  - type: text
    content: 'Manana ady amin’ny mponin’ity tany ity ny TOMPO, ry Israelita; ka henoy izao teniny izao:'
  - type: text
    content: «Tsy misy toetra mahatoky
  - type: text
    content: eto amin’ity tany ity,
  - type: text
    content: tsy misy fitiava-namana,
  - type: text
    content: na fahalalàna an’Andriamanitra.
  '10':
  - type: text
    content: Hihinana ihany izy fa tsy ho voky,
  - type: text
    content: hivaro-tena
  - type: note
    content: Jereo 1.2 sy nta.
  - type: text
    content: ' ihany izy fa tsy hanan-janaka,'
  - type: text
    content: satria Izaho TOMPO efa tsy nahoany intsony.
  '11':
  - type: text
    content: Ny fijangajangana sy ny fahamamoana
  - type: text
    content: no mahavery hevitra azy.
  '12':
  - type: text
    content: Mila saina amin’ny tapa-kazony ny oloko;
  - type: text
    content: ary ny tehiny
  - type: note
    content: 'ny tehiny: ny mpaminany dia manao fanesoana mampahatsiaro tsato-kazon-tsampy (Jereo Mpits 6.25 sy nta) na hazo kely fampiasa haminavinana ny hoavy.'
  - type: text
    content: ' no manoro hevitra azy.'
  - type: text
    content: Fa rivotry ny fivarotan-tena
  - type: text
    content: no mitsoka eo aminy ka mampania azy.
  - type: text
    content: Koa dia lasa nivaro-tena
  - type: text
    content: niala tamin’Andriamaniny izy.
  '13':
  - type: text
    content: Mihinana ny sorona aterina amin-tsampy
  - type: text
    content: eny an-tampon-tendrombohitra izy,
  - type: text
    content: ary mandoro ditin-kazo manitra
  - type: text
    content: eny amin’ny havoana,
  - type: text
    content: dia eny ambanin’ny hazo ôaka,
  - type: text
    content: sy ny hazo be ravina ary ny terebinta
  - type: text
    content: satria tsara alokaloka ireny
  - type: text
    content: Koa izany no mahatonga
  - type: text
    content: ny zanakavavinareo hivaro-tena
  - type: text
    content: sy ny vinantovavinareo hanitsakitsa-bady.
  '14':
  - type: text
    content: Tsy hofaiziko ny zanakavavinareo
  - type: text
    content: raha mivaro-tena izy,
  - type: text
    content: na ny vinantovavinareo,
  - type: text
    content: raha manitsakitsa-bady izy.
  - type: text
    content: Satria ireny mpisorona ireny aza
  - type: text
    content: no mitondra mpivarotena any amin’ny takona,
  - type: text
    content: ka mihinana ny sorona aterina amin-tsampy
  - type: text
    content: miaraka amin’ireny vehivavy ireny.
  - type: text
    content: 'Fa hoy ny ohabolana hoe:'
  - type: text
    content: «Izay vahoaka tsy misy fahaiza-manavaka
  - type: text
    content: dia vahoaka mamery ny tenany.
  '15':
  - type: text
    content: Na dia mivaro-tena aza ianao, ry Israely,
  - type: text
    content: dia aoka tsy hanota toy izany koa i Joda.
  - type: text
    content: Aza mankany Gilgala
  - type: text
    content: na miakatra any Bety-Avena ianao;
  - type: text
    content: 'ary aza mianiana hoe:'
  - type: text
    content: «Velona ny TOMPO...
  - type: note
    content: 'Gilgala, Bety-Avena: jereo Ham 5.5 sy nta amin’ny Ham 3.14 sy 4.4. –Momba ny faran’ny and. dia jereo Ham 8.14.'
  - type: text
    content: '!»'
  '16':
  - type: text
    content: 'Fa mafy hatoka toy ny ombivavy tsy mety ziogaina i Israely. Koa nahoana ny TOMPO no hitondra azy toy ny zanak’ondry andrasana eny an-kijana? '
  '17':
  - type: text
    content: 'Tafaray amin’ny sampy i Efraîma, ka avelao izy '
  '18':
  - type: text
    content: 'hanapitra ny fibobohany hampahery mijangajanga azy; fa tia fahafaham-baràka ireo filohany. '
  '19':
  - type: text
    content: Faohin’ny tadio mitambolimbolina izy ka ho menatra noho ireo sorona nataony.
  '2':
  - type: text
    content: Fa mitombo ny fanozonana olona
  - type: text
    content: sy ny famitahana azy ary ny famonoana azy ho faty,
  - type: text
    content: mbamin’ny halatra sy ny fanitsakitsaham-bady;
  - type: text
    content: mifandimby ny ra latsaka.
  '3':
  - type: text
    content: Noho izany, fadiranovana ny tany;
  - type: text
    content: reraka ny mponina rehetra ao
  - type: text
    content: mbamin’ny biby eny an-tsaha
  - type: text
    content: sy ny voromanidina;
  - type: text
    content: ary na ny trondron-dranomasina aza
  - type: text
    content: dia ringana koa.»
  - type: heading
    content: Fivadihan’ireo mpisorona
  '4':
  - type: text
    content: Tsy iza no ampangaina sy kianina,
  - type: text
    content: 'fa ny tenanao '
  - type: text
    content: mpisorombe
  - type: text
    content: no ifandaharako, hoy ny Tompo.
  '5':
  - type: text
    content: Ho tafintohina antoandro ianao;
  - type: text
    content: 'ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' koa amin’ny alina'
  - type: text
    content: dia hiara-tafintohina aminao;
  - type: text
    content: hataoko ringana i Israely reninao.
  '6':
  - type: text
    content: Ho ringana ny vahoakako
  - type: text
    content: noho ny tsifisian’ny fahalalana Ahy.
  - type: text
    content: Satria efa nandà ny fahalalana Ahy ianao,
  - type: text
    content: ka dia mba holaviko tsy ho mpisorona intsony.
  - type: text
    content: Nanadino ny lalànan’Andriamanitrao
  - type: note
    content: Ny mpisorona koa dia nanana anjara asa fitahirizana sy fampitana ny fampianarana (na ny lalànan’Andriamanitra) (jereo Deot 33.10).
  - type: text
    content: ' ianao,'
  - type: text
    content: ka dia mba hohadinoiko koa ny zanakao.
  '7':
  - type: text
    content: 'Arakaraka ny nahabetsaka ny '
  - type: text
    content: mpisorona
  - type: text
    content: no vao mainka nanotany tamiko;
  - type: text
    content: ka dia hampodiko ho henatra ny voninahiny.
  '8':
  - type: text
    content: 'Ny '
  - type: text
    content: sorona
  - type: text
    content: ' ataon’ny vahoakako'
  - type: text
    content: ho fanalana ny fahotana
  - type: text
    content: no hanina ivelomany;
  - type: text
    content: ka satriny ihany ho diso ireny
  - type: note
    content: Jereo Lev 6.19-22.
  - type: text
    content: .
  '9':
  - type: text
    content: Kanefa hitovy ny hanjo
  - type: text
    content: ny mpisorona sy ny laîka;
  - type: text
    content: hofaiziko noho ny fitondrantenany izy,
  - type: text
    content: ary hatsingeriko aminy ny ratsy nataony.
