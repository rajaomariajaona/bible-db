document_id: ACT.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Akarin’i Paoly amin’ny amperôra rômanina ny raharaha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Telo andro taorian’ny nahatongavan’i Festo tao amin’ny faritany, dia niainga avy ao Kesaria izy ho any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tonga teo aminy hiampanga an’i Paoly ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' jiosy. Nitaky tombontsoa tamin’i Festo ry zareo ary niangavy azy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba hampaka an’i Paoly ho atỳ Jerosalema; efa niray teti-dratsy manko izy rehetra mba hamono azy eny an-dalana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa namaly i Festo fa i Paoly dia am-ponja any Kesaria, ary ny tenany rahateo dia hiverina tsy ho ela. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy koa izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hiara-midina amiko any Kesaria ny lehibenareo ka any no hiampangany an’izany lehilahy izany raha nisy ratsy vitany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandritra ny valo na folo andro monja no niarahan’i Festo tamin-dry zareo, dia niverina tany Kesaria izy. Ny ampitson’ny nahatafaverina azy ihany, dia nipetraka teo amin’ny fitsarana izy ary nampaka an’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony tonga i Paoly, dia nohodidin’ireo Jiosy nidina avy tany Jerosalema ka nampangainy ho nahavita fahadisoana maro sady lehibe, nefa tsy hain-dry zareo porofoina akory. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niaro tena kosa i Paoly ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy misy fahadisoako na tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’ny Jiosy na tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' na tamin’ny amperôra rômanina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nila sitraka tamin’ny Jiosy anefa i Festo ka nanontany an’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tianao ve ny hiakatra any Jerosalema ka hotsaraina any eo anatrehako ny momba ity raharaha ity?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa novalian’i Paoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eto amin’ny fitsaran’ny amperôra rômanina izay tokony hitsarana ahy no ijoroako. Tsy nanisy ratsy ny Jiosy aho, ka na ianao aza dia mahalala izany tsara tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa raha meloka aho sy nahavita ratsy mahamendrika ahy ho voaheloka ho faty, dia tsy laviko ny ho faty. Fa raha tsy misy marina kosa ny fiampangana ataon-dry zareo ahy, dia tsy azon’iza na iza atolotra azy aho. Akariko amin’ny amperôra rômanina ny raharaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Akariko amin’ny amperôra rômanina ny raharaha: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe mangataka ny hotsarain’ny amperôra any Rôma aho.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony avy nifampidinika tamin’ny mpanolotsaina i Festo, dia nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nampiakarinao amin’ny amperôra rômanina ny raharaha, ka dia ho any amin’ny amperôra rômanina ianao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miatrika an’i Agripà sy i Berenîka i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nony afaka andro vitsivitsy, dia tonga tany Kesaria i Agripà mpanjaka sy i Berenîka anabaviny hiarahaba an’i Festo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Agripà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny mpanjaka Agripà II, zanakalahin’ilay voalaza ao amin’ny toko 12. Mpanjakan’i Kalsisy (faritany avaratr’i Palestinina) sy ny tany manodidina izy. '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: I Drosila
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (24.24) sy i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Berenîka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anabavin’i Agripà II. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Festo:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 24.27 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa satria naharitra andro maro no nitoerany tao, dia novelabelarin’i Festo tamin’ny mpanjaka ny raharahan’i Paoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Misy lehilahy izay navelan’i Feliksa ho mpifatotra ao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fony aho tany Jerosalema, dia tonga teo amiko ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' jiosy hiampanga azy ary niangavy ahy hanameloka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao no navaliko an-dry zareo: «Tsy fanaon’ny Rômanina ny manameloka olona raha tsy efa nampifanatrehina tamin’ny mpiampanga ny ampangaina ary nahazo niaro tena nanohitra ny fiampangana.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka dia tonga teto niaraka tamiko izy rehetra. Tsy nangataka andro aho fa ny ampitson’iny ihany dia nipetraka teo amin’ny fitsarana aho ka nasaiko nalaina ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony nitsangana ireo mpiampanga, dia tsy nisy zava-dratsy araka izay nampoiziko nitoriany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny niadiany hevitra tamin’i Paoly dia momba ny fivavahany sy izany Jesoa efa maty izany saingy nolazain’i Paoly hoe velona. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Very hevitra aho ny amin’ny hamotopotorana izany raharaha izany, ka dia nanontaniako i Paoly raha tiany ny hankany Jerosalema hotsaraina any momba izany raharaha izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nefa moa nampiakatra ny raharaha i Paoly mba ho ny amperôra rômanina no ho tompon’ny teny farany momba azy. Dia nasaiko nambenana izy mandra-pahazoako handefa azy any amin’ny amperôra rômanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Agripà tamin’i Festo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba te handre izany lehilahy izany koa aho!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary novalian’i Festo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handre azy ianao rahampitso!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nony ampitso, dia tonga i Agripà sy i Berenîka, nianjaika tokoa araka ny fiandrianany be voninahitra. Niditra tao amin’ny efitra fitsarana izy mianadahy narahin’ny komandin’ny tafika sy ny olo-manan-kaja tao an-tanàna. Dia nasain’i Festo nalaina i Paoly ka nentiny nankeo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy i Festo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Agripà mpanjaka sy ianareo rehetra manatrika etoana, io lehilahy hitanareo io dia nampangain’ny Jiosy marobe tamiko, na tany Jerosalema na teto, ka nantsoantsoiny hoe tsy tokony ho velona intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tsy hitako akory izay ratsy vitany mahamendrika azy ho voaheloka faty. Kanefa moa izy ihany no nampiakatra ny raharahany amin’ny amperôra rômanina, dia tapa-kevitra aho handefa azy any aminy! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsy manan-javatra mazava tsara momba azy hatao an-tsoratra ho an’ny amperôra rômanina aho; koa dia entiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripà mpanjaka; ka rehefa avy nalaina am-bava izy, dia mba hanan-javatra hatao an-tsoratra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy fahendrena manko, araka ny hevitro, ny mampanatitra mpifatotra raha tsy tondroina tsara ny zavatra iampangana azy.
