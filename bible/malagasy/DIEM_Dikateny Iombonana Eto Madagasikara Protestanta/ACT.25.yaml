document_id: ACT.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Akarin’i Paoly amin’ny amperôra rômanina ny raharaha
  - type: text
    content: 'Telo andro taorian’ny nahatongavan’i Festo tao amin’ny faritany, dia niainga avy ao Kesaria izy ho any Jerosalema. '
  '10':
  - type: text
    content: 'Fa novalian’i Paoly hoe:'
  - type: text
    content: '–Eto amin’ny fitsaran’ny amperôra rômanina izay tokony hitsarana ahy no ijoroako. Tsy nanisy ratsy ny Jiosy aho, ka na ianao aza dia mahalala izany tsara tokoa. '
  '11':
  - type: text
    content: Koa raha meloka aho sy nahavita ratsy mahamendrika ahy ho voaheloka ho faty, dia tsy laviko ny ho faty. Fa raha tsy misy marina kosa ny fiampangana ataon-dry zareo ahy, dia tsy azon’iza na iza atolotra azy aho. Akariko amin’ny amperôra rômanina ny raharaha
  - type: note
    content: 'Akariko amin’ny amperôra rômanina ny raharaha: izany hoe mangataka ny hotsarain’ny amperôra any Rôma aho.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'Nony avy nifampidinika tamin’ny mpanolotsaina i Festo, dia nanao hoe:'
  - type: text
    content: –Nampiakarinao amin’ny amperôra rômanina ny raharaha, ka dia ho any amin’ny amperôra rômanina ianao.
  - type: heading
    content: Miatrika an’i Agripà sy i Berenîka i Paoly
  '13':
  - type: text
    content: Nony afaka andro vitsivitsy, dia tonga tany Kesaria i Agripà mpanjaka sy i Berenîka anabaviny hiarahaba an’i Festo
  - type: note
    content: 'Agripà: ny mpanjaka Agripà II, zanakalahin’ilay voalaza ao amin’ny toko 12. Mpanjakan’i Kalsisy (faritany avaratr’i Palestinina) sy ny tany manodidina izy. I Drosila (24.24) sy i Berenîka dia anabavin’i Agripà II. –Festo: jereo 24.27 sy nta.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Koa satria naharitra andro maro no nitoerany tao, dia novelabelarin’i Festo tamin’ny mpanjaka ny raharahan’i Paoly:'
  - type: text
    content: '–Misy lehilahy izay navelan’i Feliksa ho mpifatotra ao. '
  '15':
  - type: text
    content: 'Fony aho tany Jerosalema, dia tonga teo amiko ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' jiosy hiampanga azy ary niangavy ahy hanameloka azy. '
  '16':
  - type: text
    content: 'Fa izao no navaliko an-dry zareo: «Tsy fanaon’ny Rômanina ny manameloka olona raha tsy efa nampifanatrehina tamin’ny mpiampanga ny ampangaina ary nahazo niaro tena nanohitra ny fiampangana.» '
  '17':
  - type: text
    content: 'Ka dia tonga teto niaraka tamiko izy rehetra. Tsy nangataka andro aho fa ny ampitson’iny ihany dia nipetraka teo amin’ny fitsarana aho ka nasaiko nalaina ralehilahy. '
  '18':
  - type: text
    content: 'Nony nitsangana ireo mpiampanga, dia tsy nisy zava-dratsy araka izay nampoiziko nitoriany azy. '
  '19':
  - type: text
    content: 'Ny niadiany hevitra tamin’i Paoly dia momba ny fivavahany sy izany Jesoa efa maty izany saingy nolazain’i Paoly hoe velona. '
  '2':
  - type: text
    content: 'Tonga teo aminy hiampanga an’i Paoly ny lohandoha-mpisorona sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' jiosy. Nitaky tombontsoa tamin’i Festo ry zareo ary niangavy azy, '
  '20':
  - type: text
    content: 'Very hevitra aho ny amin’ny hamotopotorana izany raharaha izany, ka dia nanontaniako i Paoly raha tiany ny hankany Jerosalema hotsaraina any momba izany raharaha izany. '
  '21':
  - type: text
    content: Nefa moa nampiakatra ny raharaha i Paoly mba ho ny amperôra rômanina no ho tompon’ny teny farany momba azy. Dia nasaiko nambenana izy mandra-pahazoako handefa azy any amin’ny amperôra rômanina.
  '22':
  - type: text
    content: 'Dia hoy i Agripà tamin’i Festo:'
  - type: text
    content: –Mba te handre izany lehilahy izany koa aho!
  - type: text
    content: 'Ary novalian’i Festo hoe:'
  - type: text
    content: –Handre azy ianao rahampitso!
  '23':
  - type: text
    content: 'Nony ampitso, dia tonga i Agripà sy i Berenîka, nianjaika tokoa araka ny fiandrianany be voninahitra. Niditra tao amin’ny efitra fitsarana izy mianadahy narahin’ny komandin’ny tafika sy ny olo-manan-kaja tao an-tanàna. Dia nasain’i Festo nalaina i Paoly ka nentiny nankeo. '
  '24':
  - type: text
    content: 'Ary hoy i Festo:'
  - type: text
    content: '–Ry Agripà mpanjaka sy ianareo rehetra manatrika etoana, io lehilahy hitanareo io dia nampangain’ny Jiosy marobe tamiko, na tany Jerosalema na teto, ka nantsoantsoiny hoe tsy tokony ho velona intsony. '
  '25':
  - type: text
    content: 'Tsy hitako akory izay ratsy vitany mahamendrika azy ho voaheloka faty. Kanefa moa izy ihany no nampiakatra ny raharahany amin’ny amperôra rômanina, dia tapa-kevitra aho handefa azy any aminy! '
  '26':
  - type: text
    content: 'Tsy manan-javatra mazava tsara momba azy hatao an-tsoratra ho an’ny amperôra rômanina aho; koa dia entiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripà mpanjaka; ka rehefa avy nalaina am-bava izy, dia mba hanan-javatra hatao an-tsoratra aho. '
  '27':
  - type: text
    content: Tsy fahendrena manko, araka ny hevitro, ny mampanatitra mpifatotra raha tsy tondroina tsara ny zavatra iampangana azy.
  '3':
  - type: text
    content: 'mba hampaka an’i Paoly ho atỳ Jerosalema; efa niray teti-dratsy manko izy rehetra mba hamono azy eny an-dalana. '
  '4':
  - type: text
    content: 'Nefa namaly i Festo fa i Paoly dia am-ponja any Kesaria, ary ny tenany rahateo dia hiverina tsy ho ela. '
  '5':
  - type: text
    content: 'Ary hoy koa izy:'
  - type: text
    content: –Aoka hiara-midina amiko any Kesaria ny lehibenareo ka any no hiampangany an’izany lehilahy izany raha nisy ratsy vitany.
  '6':
  - type: text
    content: 'Nandritra ny valo na folo andro monja no niarahan’i Festo tamin-dry zareo, dia niverina tany Kesaria izy. Ny ampitson’ny nahatafaverina azy ihany, dia nipetraka teo amin’ny fitsarana izy ary nampaka an’i Paoly. '
  '7':
  - type: text
    content: 'Nony tonga i Paoly, dia nohodidin’ireo Jiosy nidina avy tany Jerosalema ka nampangainy ho nahavita fahadisoana maro sady lehibe, nefa tsy hain-dry zareo porofoina akory. '
  '8':
  - type: text
    content: 'Niaro tena kosa i Paoly ka nanao hoe:'
  - type: text
    content: '–Tsy misy fahadisoako na tamin’ny '
  - type: text
    content: lalànan
  - type: text
    content: '’ny Jiosy na tamin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' na tamin’ny amperôra rômanina.'
  '9':
  - type: text
    content: 'Nila sitraka tamin’ny Jiosy anefa i Festo ka nanontany an’i Paoly hoe:'
  - type: text
    content: –Tianao ve ny hiakatra any Jerosalema ka hotsaraina any eo anatrehako ny momba ity raharaha ity?
