document_id: EST.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manatona ny amperôra i Estera
  - type: text
    content: 'Rehefa tapitra ny andro fahatelo '
  - type: text
    content: nifadian-kanina
  - type: text
    content: ', dia nitafy ny fanamiana maha mpanjakavavy azy i Estera ka niseho teo amin’ny kianja anatin’ny lapa, teo anoloan’ny efitranon’ny amperôra. Tamin’izay ny amperôra dia tao an-dapa sady nipetraka teo amin’ny sezafiandrianany, tandrifin’ny varavarana fidirana. '
  '10':
  - type: text
    content: 'Kanefa nanindry fo ihany i Hamàna ka lasa nody tany an-tranony aloha; dia naniraka olona izy haka ireo sakaizany sy i Zeresa vadiny. '
  '11':
  - type: text
    content: 'Ary nambaran’i Hamàna tamin’ireo ny hareny miavosa sy ny zanany maro mbamin’ny voninahitra rehetra nomen’ny amperôra azy ka nanandratany azy ho ambonin’ireo andriambaventy sy mpandraharaha. '
  '12':
  - type: text
    content: 'Dia hoy koa i Hamàna hoe:'
  - type: text
    content: '–I Estera mpanjakavavy aza dia tsy naka olona afa-tsy izaho ihany hiaraka amin’ny amperôra ho amin’ny fanasana izay efa nomaniny androany; ary mbola nasainy hiaraka amin’ny amperôra koa aho rahampitso. '
  '13':
  - type: text
    content: Kanefa tsy mahafa-po ahy mihitsy izany rehetra izany, raha ny tenako no mbola mahita an’i Môrdôkay, ilay Jiosy, miasa eo am-bavahadin’ny lapa.
  '14':
  - type: text
    content: 'Dia hoy i Zeresa vadin’i Hamàna sy ireo sakaizany rehetra taminy:'
  - type: text
    content: –Aoka ianao hampanamboatra hazo fanantonana ka ho 25 metatra ny haavony; ary raha maraina dia angataho amin’ny mpanjaka mba hahantona eo i Môrdôkay
  - type: note
    content: Ny fanantonana amin’ny hazo no sazy ampiharina amin’ny mpamadika sy ny mpioko hanonganam-panjakana, jereo 2.23. Eto dia faran’izay manala baràka mihitsy ny haavon’ilay hazo fanantonana.
  - type: text
    content: . Avy eo dia mandehana amin-kafaliana ianao miaraka amin’ny amperôra ho any amin’ny fanasana.
  - type: text
    content: Ary sitrak’i Hamàna izany hevitra izany ka dia nampanamboariny tokoa ilay hazo.
  '2':
  - type: text
    content: Nony hitan’ny amperôra nitsangana teo an-kianja i Estera mpanjakavavy, dia nahazo fitia teo imasony ka notondroiny tamin’ny tehim-bolamena izay teny an-tanany
  - type: note
    content: Momba ny hevitr’izany fihetsika izany, jereo 4.11.
  - type: text
    content: '; dia nanatona kosa i Estera ka nanendry ny loha-tehina, '
  '3':
  - type: text
    content: 'ary nanontanian’ny amperôra hoe:'
  - type: text
    content: –Maninona ianao, ry Estera mpanjakavavy? Inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany.
  '4':
  - type: text
    content: 'Dia novalian’i Estera hoe:'
  - type: text
    content: –Raha sitrakao, ry andriamanjaka, dia aoka ianao miaraka amin’i Hamàna anio ho tonga amin’ny fanasana izay efa nomaniko ho anao.
  '5':
  - type: text
    content: 'Koa nampanantsoin’ny amperôra faingana i Hamàna mba hanaiky ny fiangavian’i Estera. Dia nankao amin’ny fanasana izay efa nomanin’i Estera ny amperôra mbamin’i Hamàna. '
  '6':
  - type: text
    content: 'Ary teo am-pamaranana ny sakafo, dia hoy ny amperôra tamin’i Estera:'
  - type: text
    content: –Inona no angatahinao sy tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany.
  '7':
  - type: text
    content: 'Dia namaly i Estera ka nanao hoe:'
  - type: text
    content: '–Ny angatahiko sy tadiaviko ve? '
  '8':
  - type: text
    content: 'Izao no izy, ry andriamanjaka: raha mba mahazo fitia eo imasonao aho, ka sitrakao ny hanome izay angatahiko sy hanatanteraka izay tadiaviko, dia aoka ianao miaraka amin’i Hamàna ho tonga amin’ny fanasana izay homaniko ho anao rahampitso; amin’izay aho no hamaly ny fanontanianao.'
  - type: heading
    content: Omanin’i Hamàna ny hazo hanantonana an’i Môrdôkay
  '9':
  - type: text
    content: 'Tamin’io andro io i Hamàna dia nivoaka ny tranon’i Estera tamin-kafaliana sy haravoam-po. Saingy, teo am-bavahadin’ny lapa, rehefa hitan’i Hamàna fa tsy mba nitsangana na niraika teo anatrehany akory i Môrdôkay, dia feno fahatezerana taminy izy. '
