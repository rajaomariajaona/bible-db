document_id: EST.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manatona ny amperôra i Estera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa tapitra ny andro fahatelo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nifadian-kanina
  - type: text
    text: ', dia nitafy ny fanamiana maha mpanjakavavy azy i Estera ka niseho teo amin’ny kianja anatin’ny lapa, teo anoloan’ny efitranon’ny amperôra. Tamin’izay ny amperôra dia tao an-dapa sady nipetraka teo amin’ny sezafiandrianany, tandrifin’ny varavarana fidirana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nony hitan’ny amperôra nitsangana teo an-kianja i Estera mpanjakavavy, dia nahazo fitia teo imasony ka notondroiny tamin’ny tehim-bolamena izay teny an-tanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny hevitr’izany fihetsika izany, jereo 4.11.
    marker-yv: yv-n
  - type: text
    text: '; dia nanatona kosa i Estera ka nanendry ny loha-tehina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary nanontanian’ny amperôra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Maninona ianao, ry Estera mpanjakavavy? Inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia novalian’i Estera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha sitrakao, ry andriamanjaka, dia aoka ianao miaraka amin’i Hamàna anio ho tonga amin’ny fanasana izay efa nomaniko ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa nampanantsoin’ny amperôra faingana i Hamàna mba hanaiky ny fiangavian’i Estera. Dia nankao amin’ny fanasana izay efa nomanin’i Estera ny amperôra mbamin’i Hamàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary teo am-pamaranana ny sakafo, dia hoy ny amperôra tamin’i Estera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no angatahinao sy tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakako aza, dia homeko anao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly i Estera ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny angatahiko sy tadiaviko ve? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no izy, ry andriamanjaka: raha mba mahazo fitia eo imasonao aho, ka sitrakao ny hanome izay angatahiko sy hanatanteraka izay tadiaviko, dia aoka ianao miaraka amin’i Hamàna ho tonga amin’ny fanasana izay homaniko ho anao rahampitso; amin’izay aho no hamaly ny fanontanianao.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omanin’i Hamàna ny hazo hanantonana an’i Môrdôkay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tamin’io andro io i Hamàna dia nivoaka ny tranon’i Estera tamin-kafaliana sy haravoam-po. Saingy, teo am-bavahadin’ny lapa, rehefa hitan’i Hamàna fa tsy mba nitsangana na niraika teo anatrehany akory i Môrdôkay, dia feno fahatezerana taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Kanefa nanindry fo ihany i Hamàna ka lasa nody tany an-tranony aloha; dia naniraka olona izy haka ireo sakaizany sy i Zeresa vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nambaran’i Hamàna tamin’ireo ny hareny miavosa sy ny zanany maro mbamin’ny voninahitra rehetra nomen’ny amperôra azy ka nanandratany azy ho ambonin’ireo andriambaventy sy mpandraharaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy koa i Hamàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–I Estera mpanjakavavy aza dia tsy naka olona afa-tsy izaho ihany hiaraka amin’ny amperôra ho amin’ny fanasana izay efa nomaniny androany; ary mbola nasainy hiaraka amin’ny amperôra koa aho rahampitso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa tsy mahafa-po ahy mihitsy izany rehetra izany, raha ny tenako no mbola mahita an’i Môrdôkay, ilay Jiosy, miasa eo am-bavahadin’ny lapa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy i Zeresa vadin’i Hamàna sy ireo sakaizany rehetra taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ianao hampanamboatra hazo fanantonana ka ho 25 metatra ny haavony; ary raha maraina dia angataho amin’ny mpanjaka mba hahantona eo i Môrdôkay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fanantonana amin’ny hazo no sazy ampiharina amin’ny mpamadika sy ny mpioko hanonganam-panjakana, jereo 2.23. Eto dia faran’izay manala baràka mihitsy ny haavon’ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hazo fanantonana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Avy eo dia mandehana amin-kafaliana ianao miaraka amin’ny amperôra ho any amin’ny fanasana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary sitrak’i Hamàna izany hevitra izany ka dia nampanamboariny tokoa ilay hazo.
