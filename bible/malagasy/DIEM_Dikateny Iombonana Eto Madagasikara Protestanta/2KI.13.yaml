document_id: 2KI.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôahaza mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny faha-23 taona nanjakan’i Jôasy zanakalahin’i Ahazià mpanjakan’i Joda no tonga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' tany Samaria i Jôahaza zanakalahin’i Jehò; ary naharitra 17 taona no nanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO izy, satria nanahaka ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa dia tezitra tamin’ny Israelita ny TOMPO, ka natolony an’i Hazaela mpanjakan’i Siria sy an’i Beny-Hadada zanany izy nandritra ny fotoana ela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nifona tamin’ny TOMPO anefa i Jôahaza, dia nihaino azy IZY satria hitany ny fampahorian’ny mpanjakan’i Siria an’i Israely; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary ny TOMPO kosa nanome mpamonjy izay hanafaka ny Israelita amin’ny fifehezan’ny Sirianina. Dia nandry feizay toy ny teo aloha ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saingy tsy nialany fa nizorany hatrany ny fahotana izay nitarihan’i Jerôbohama mianakavy ireo Israelita; ary na dia ilay tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: ' aza dia mbola nijoro tao Samaria ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin’ny farany ny tafik’i Jôahaza dia tsy nisy afa-tsy mpitaingin-tsoavaly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mpitaingin-tsoavaly '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: soavaly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: dimampolo sy kalesy folo ary miaramila mpandeha an-tongotra antokony folo; fa maro taminy no efa naringan’ny mpanjakan’i Siria sy nataony ho toy ny vovoka hohitsahin’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Jôahaza ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa maty i Jôahaza, dia nalevina tao Samaria; ary i Jôasy zanany lahy no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôasy mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin’ny faha-37 taona nanjakan’i Jôahaza mpanjakan’i Joda no tonga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' tao Samaria i Jôasy zanakalahin’i Jôahaza; ary naharitra 16 taona no nanjakany tao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany fa nizorany hatrany ny fahotana rehetra izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony, fony izy niady tamin’i Amatsià mpanjakan’i Joda, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Samaria, tao amin’ny fasan’ny mpanjakan’i Israely; ary i Jerôbohama no nitoetra teo amin’ny sezafiandrianan’i Jôasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 12-13 dia averina saika ara-bakiteny ao amin’ny 14.15-16, satria hatramin’ny 14.14 dia mbola toe-javatra nampisongadina an’i Jôasy mpanjakan’i Israely no ambara. Indrindra fa tantaraina ao amin’ny 14.8-14 ny adin’i Jôasy sy i Amatsià (and 12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Elisà naminany ny fandresena ny Sirianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha voan’ny aretina hahafaty azy i Elisà, dia lasa hamangy azy i Jôasy mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' ary nihohoka teo ambony tavan’i Elisà izy ka sady nitomany no nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry dada ô! Ry dada ô! Mahery mihoatra noho ny kalesin’i Israely sy ny mpitaingin-tsoavaliny rehetra ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2.12.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Elisà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Makà tsipîka iray sy zana-tsipîka maro ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nampaka ireo ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'Fa hoy indray i Elisà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vohay ny varavarankely atsinanana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novohan’ny mpanjaka izany. Ary hoy koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raiso dia henjano ny tsipîkanao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nohenjanin’ny mpanjaka ny tsipîka; napetrak’i Elisà teo amin’ny tanan’ny mpanjaka ny tanany ary nobaikoiny izy mba hitifitra. Rehefa nitifitra ny mpanjaka, dia nilazan’ny mpaminany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zana-tsipîka manambara ny fandresena omen’ny TOMPO iny, dia fandresena ny tafika sirianina. Eny, hamely ny Sirianina ao Afèka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16-17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Afèka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 20.26 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ianao mandra-paharingany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy i Elisà tamin’i Jôasy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raiso indray ny zana-tsipîka hafa.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia noraisin’ny mpanjaka ireo. Ary hoy ny mpaminany taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Kapohy ny tany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nokapohin’ny mpanjaka intelo ny tany, dia nijanona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tezitra taminy anefa ilay olon’Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha mba nikapoka indimy na inenina ianao, dia ho nahavoa ny Sirianina mandra-paharingany; ankehitriny anefa dia intelo ihany no hahafahanao mamely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary maty i Elisà ka nalevina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Isan-taona dia tonga mamakivaky ny tanin’i Israely ny tontakely môabita. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Indray andro, dia nisy olona nandevina fatin-dehilahy ka sendra nahatazana tampoka andiany iray tamin’ireo tontakely. Ary nanipy faingana ny faty tao am-pasan’i Elisà ny mpandevina, dia lasa nandositra. Saingy vao nahakasika ny taolan’i Elisà io faty io, dia velona indray ary nitsangana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandresena ny Sirianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandritra ny andro rehetra nanjakan’i Jôahaza, dia nampahory ny Israelita i Hazaela mpanjakan’i Siria. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa niantra azy ihany ny TOMPO sady namindrafo taminy noho ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' nataony tamin’i Abrahama sy i Itsehàka ary i Jakôba; ka tsy ta handringana azy Izy ary tsy mbola nandroaka azy ho voasesitany lavitra ny fanatrehany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nony maty i Hazaela mpanjakan’i Siria, dia i Bena-Hadada zanany lahy no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tamin’izay dia norombahin’i Jôasy zanakalahin’i Jôahaza teo an-tanan’i Bena-Hadada zanakalahin’i Hazaela indray ny tanàna izay efa nalain’i Hazaela teo an-tanan’i Jôahaza rain’i Jôasy. Intelo no nandresen’i Jôasy an’i Bena-Hadada, ka dia azony indray ny tanànan’i Israely.
