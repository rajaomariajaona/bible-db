document_id: 2KI.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jôahaza mpanjakan’i Israely
  - type: text
    content: 'Tamin’ny faha-23 taona nanjakan’i Jôasy zanakalahin’i Ahazià mpanjakan’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' tany Samaria i Jôahaza zanakalahin’i Jehò; ary naharitra 17 taona no nanjakany. '
  '10':
  - type: text
    content: 'Tamin’ny faha-37 taona nanjakan’i Jôahaza mpanjakan’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' tao Samaria i Jôasy zanakalahin’i Jôahaza; ary naharitra 16 taona no nanjakany tao. '
  '11':
  - type: text
    content: Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany fa nizorany hatrany ny fahotana rehetra izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita.
  '12':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony, fony izy niady tamin’i Amatsià mpanjakan’i Joda, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Samaria, tao amin’ny fasan’ny mpanjakan’i Israely; ary i Jerôbohama no nitoetra teo amin’ny sezafiandrianan’i Jôasy
  - type: note
    content: Ny and 12-13 dia averina saika ara-bakiteny ao amin’ny 14.15-16, satria hatramin’ny 14.14 dia mbola toe-javatra nampisongadina an’i Jôasy mpanjakan’i Israely no ambara. Indrindra fa tantaraina ao amin’ny 14.8-14 ny adin’i Jôasy sy i Amatsià (and 12).
  - type: text
    content: .
  - type: heading
    content: I Elisà naminany ny fandresena ny Sirianina
  '14':
  - type: text
    content: 'Raha voan’ny aretina hahafaty azy i Elisà, dia lasa hamangy azy i Jôasy mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' ary nihohoka teo ambony tavan’i Elisà izy ka sady nitomany no nanao hoe:'
  - type: text
    content: –Ry dada ô! Ry dada ô! Mahery mihoatra noho ny kalesin’i Israely sy ny mpitaingin-tsoavaliny rehetra ianao
  - type: note
    content: Ampit 2.12.
  - type: text
    content: '!'
  '15':
  - type: text
    content: 'Ary hoy i Elisà taminy:'
  - type: text
    content: –Makà tsipîka iray sy zana-tsipîka maro ianao.
  - type: text
    content: 'Dia nampaka ireo ny mpanjaka. '
  '16':
  - type: text
    content: 'Fa hoy indray i Elisà hoe:'
  - type: text
    content: –Vohay ny varavarankely atsinanana.
  - type: text
    content: 'Dia novohan’ny mpanjaka izany. Ary hoy koa ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: –Raiso dia henjano ny tsipîkanao.
  - type: text
    content: 'Dia nohenjanin’ny mpanjaka ny tsipîka; napetrak’i Elisà teo amin’ny tanan’ny mpanjaka ny tanany ary nobaikoiny izy mba hitifitra. Rehefa nitifitra ny mpanjaka, dia nilazan’ny mpaminany hoe:'
  - type: text
    content: –Zana-tsipîka manambara ny fandresena omen’ny TOMPO iny, dia fandresena ny tafika sirianina. Eny, hamely ny Sirianina ao Afèka
  - type: note
    content: 'Afèka: jereo 1 Mp 20.26 sy nta.'
  - type: text
    content: ' ianao mandra-paharingany.'
  '18':
  - type: text
    content: 'Dia hoy i Elisà tamin’i Jôasy:'
  - type: text
    content: –Raiso indray ny zana-tsipîka hafa.
  - type: text
    content: 'Dia noraisin’ny mpanjaka ireo. Ary hoy ny mpaminany taminy:'
  - type: text
    content: –Kapohy ny tany.
  - type: text
    content: 'Ary nokapohin’ny mpanjaka intelo ny tany, dia nijanona izy. '
  '19':
  - type: text
    content: 'Tezitra taminy anefa ilay olon’Andriamanitra ka nanao hoe:'
  - type: text
    content: –Raha mba nikapoka indimy na inenina ianao, dia ho nahavoa ny Sirianina mandra-paharingany; ankehitriny anefa dia intelo ihany no hahafahanao mamely azy.
  '2':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy, satria nanahaka ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita. '
  '20':
  - type: text
    content: Ary maty i Elisà ka nalevina.
  - type: text
    content: 'Isan-taona dia tonga mamakivaky ny tanin’i Israely ny tontakely môabita. '
  '21':
  - type: text
    content: Indray andro, dia nisy olona nandevina fatin-dehilahy ka sendra nahatazana tampoka andiany iray tamin’ireo tontakely. Ary nanipy faingana ny faty tao am-pasan’i Elisà ny mpandevina, dia lasa nandositra. Saingy vao nahakasika ny taolan’i Elisà io faty io, dia velona indray ary nitsangana.
  - type: heading
    content: Ny fandresena ny Sirianina
  '22':
  - type: text
    content: 'Nandritra ny andro rehetra nanjakan’i Jôahaza, dia nampahory ny Israelita i Hazaela mpanjakan’i Siria. '
  '23':
  - type: text
    content: 'Nefa niantra azy ihany ny TOMPO sady namindrafo taminy noho ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataony tamin’i Abrahama sy i Itsehàka ary i Jakôba; ka tsy ta handringana azy Izy ary tsy mbola nandroaka azy ho voasesitany lavitra ny fanatrehany.'
  '24':
  - type: text
    content: 'Nony maty i Hazaela mpanjakan’i Siria, dia i Bena-Hadada zanany lahy no nanjaka nandimby azy. '
  '25':
  - type: text
    content: Tamin’izay dia norombahin’i Jôasy zanakalahin’i Jôahaza teo an-tanan’i Bena-Hadada zanakalahin’i Hazaela indray ny tanàna izay efa nalain’i Hazaela teo an-tanan’i Jôahaza rain’i Jôasy. Intelo no nandresen’i Jôasy an’i Bena-Hadada, ka dia azony indray ny tanànan’i Israely.
  '3':
  - type: text
    content: Koa dia tezitra tamin’ny Israelita ny TOMPO, ka natolony an’i Hazaela mpanjakan’i Siria sy an’i Beny-Hadada zanany izy nandritra ny fotoana ela.
  '4':
  - type: text
    content: 'Nifona tamin’ny TOMPO anefa i Jôahaza, dia nihaino azy IZY satria hitany ny fampahorian’ny mpanjakan’i Siria an’i Israely; '
  '5':
  - type: text
    content: 'ary ny TOMPO kosa nanome mpamonjy izay hanafaka ny Israelita amin’ny fifehezan’ny Sirianina. Dia nandry feizay toy ny teo aloha ny Israelita. '
  '6':
  - type: text
    content: 'Saingy tsy nialany fa nizorany hatrany ny fahotana izay nitarihan’i Jerôbohama mianakavy ireo Israelita; ary na dia ilay tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: ' aza dia mbola nijoro tao Samaria ihany.'
  '7':
  - type: text
    content: Tamin’ny farany ny tafik’i Jôahaza dia tsy nisy afa-tsy mpitaingin-tsoavaly
  - type: note
    content: Mpitaingin-tsoavaly na soavaly.
  - type: text
    content: dimampolo sy kalesy folo ary miaramila mpandeha an-tongotra antokony folo; fa maro taminy no efa naringan’ny mpanjakan’i Siria sy nataony ho toy ny vovoka hohitsahin’ny olona.
  '8':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôahaza ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Rehefa maty i Jôahaza, dia nalevina tao Samaria; ary i Jôasy zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Jôasy mpanjakan’i Israely
