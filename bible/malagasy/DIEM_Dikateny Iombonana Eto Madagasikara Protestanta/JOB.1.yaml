document_id: JOB.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsapana voalohany an’i Jôba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy lehilahy iray nonina tany amin’ny tany Hotsa, ka nantsoina hoe Jôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny tany Hotsa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia tokony ao amin’ny faritanin’ny Edômita, ao atsimo atsinanan’ny Ranomasina Maty (jereo Fit. 4.21). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jôba:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mety ho fanehoana an’ohatra ihany izany anarana izany satria midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay enjehina.
      marker-yv: yv-n
    - type: text
      text: '. Tsy misy hokianina sady mahitsy ary nanaja an’Andriamanitra izany lehilahy izany ka nifady ny ratsy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Moa tsy Ianao ve no miaro azy sy ny fianakaviany mbamin’ny fananany toy ny fefy manodidina? Notahinao izay asa nataony, ary efa nomenao omby aman’ondry mameno ny taniny izy. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa esory aminy ange izay ananany e, raha tsy ankitsirano izao no haniratsirany Anao!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hoy ny Tompo tamin’i Satàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Satàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na ilay mpiampanga (and 9-11): ampit Apôk 12.10.'
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro eo am-pelatananao izay ananany rehetra. Nefa aza kasihinao kosa ny tenany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala teo anatrehan’ny TOMPO i Satàna.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro raha nihinana sy nisotro tao an-tranon-jokiny lahimatoa ireo zanak’i Jôba, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nisy iraka tonga tany amin’i Jôba nilaza taminy hoe: «Raha teo am-piasàna iny indrindra ny omby ary raha nihinana teo akaikiny ny borikivavy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nidinan’ny Sabeanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sabeanina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: olona tontakely mpifindrafindra monina, toa avy any atsimon’i Arabia.
      marker-yv: yv-n
    - type: text
      text: ' tampoka ka norobainy; novonoiny ho faty tamin’ny sabatra ny mpanomponao, ary dia izaho irery no afa-nandositra hampandre anao.»'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy mbola tapitra akory ny teniny, dia nisy iray hafa koa tonga nilaza hoe: «Nilatsaham-potaka ny ondry aman’osy sy ny mpiandry azy ka levona, ary dia izaho irery no afa-nandositra hampandre anao.»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy mbola tapitra akory ny tenin’io? dia nisy iray hafa koa tonga ka nanao hoe: «Nasian’ny andian-jiolahy kaldeanina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kaldeanina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpianefitra mifindrafindra monina, toa avy any avaratra atsinanan’i Arabia.
      marker-yv: yv-n
    - type: text
      text: ' telo toko ny rameva ka norobainy; novonoiny ho faty tamin’ny sabatra ny mpanomponao. Izaho irery no afa-nandositra hampandre anao.»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy mbola tapitra koa ny teniny, dia nisy iray hafa koa tonga ka nanao hoe: «Raha teo am-pihinanana sy teo am-pisotroana tao an-tranon-jokiny ireo zanakao, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nifofofofo avy any an-taniefitra ny rambondanitra ka nipaoka ny zoron-trano efatra; maty nianjeran’ny trano tao avokoa ireo zatovo, ary dia izaho irery no afa-nandositra hampandre anao.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanan-janaka lahy fito sy zanaka vavy telo izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Jôba ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra ny fitafiany
    - type: text
      text: ' sy nanaratra ny lohany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nandriatra ny fitafiany sy nanaratra ny lohany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: momba izany mari-pisaonana sy alahelo izany dia jereo Jer 41.5 sy nta; jereo ny FTS amin’ny voambolana hoe MANDRIATRA FITAFIANA.
      marker-yv: yv-n
    - type: text
      text: ' ary niampatra tamin’ny tany ka niankohoka '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitanjaka no nivoahako avy tao an-kibon’ineny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mitanjaka koa no hiverenako avy an-kibon’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no nanome, ny TOMPO no naka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny anaran’ny TOMPO.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fahoriana rehetra izany dia tsy mba nanota i Jôba ary tsy nanome tsiny an’Andriamanitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanana ondry fito arivo sy rameva telo arivo ary omby arivo sy borikivavy dimanjato mbamin’ny mpanompo marobe koa izy. I Jôba no lehilahy nanan-kaja indrindra tany atsinanan’i Palestinina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fanaon’ireo zanakalahin’i Jôba ny mifandimby mifanasa amin’ny sakafo tsara. Koa nasainy ireo anabaviny telo mba hiaraka mihinana sy misotro aminy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapi-nihodina ny fanasana, dia nampiantsoin’i Jôba ny zanany mba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hodiovina
    - type: text
      text: '. Dia nifoha maraina be izy ny ampitso ka nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona dorana
    - type: text
      text: ' manontolo araka ny isan’izy rehetra; fa hoy Jôba hoe: «Fandrao nanota na nandà an’Andriamanitra tao am-pony ny zanako.» Izany no nataon’i Jôba mandrakariva.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro raha tonga nanao tatitra tamin’ny TOMPO ireo zanak’Andriamanitra, dia mba tafaraka taminy teo koa i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy taiza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny Tompo izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy nitetitety ny tany sy nihaodihaody teny aho.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny Tompo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nahita an’i Jôba mpanompoko ve ianao? Fa tsy misy tahaka azy eny ambonin’ny tany: lehilahy tsy misy hokianina sady mahitsy ary manaja Ahy izy ka nifady ny ratsy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mbola namaly ny Tompo i Satàna ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa tsy fanantenan-javatra ve no anajàn’i Jôba Anao? '
