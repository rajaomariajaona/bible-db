document_id: JOB.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsapana voalohany an’i Jôba
  - type: text
    content: Nisy lehilahy iray nonina tany amin’ny tany Hotsa, ka nantsoina hoe Jôba
  - type: note
    content: 'Ny tany Hotsa: dia tokony ao amin’ny faritanin’ny Edômita, ao atsimo atsinanan’ny Ranomasina Maty (jereo Fit. 4.21). –Jôba: mety ho fanehoana an’ohatra ihany izany anarana izany satria midika hoe ilay enjehina.'
  - type: text
    content: '. Tsy misy hokianina sady mahitsy ary nanaja an’Andriamanitra izany lehilahy izany ka nifady ny ratsy. '
  '10':
  - type: text
    content: 'Moa tsy Ianao ve no miaro azy sy ny fianakaviany mbamin’ny fananany toy ny fefy manodidina? Notahinao izay asa nataony, ary efa nomenao omby aman’ondry mameno ny taniny izy. '
  '11':
  - type: text
    content: Fa esory aminy ange izay ananany e, raha tsy ankitsirano izao no haniratsirany Anao!
  '12':
  - type: text
    content: Dia hoy ny Tompo tamin’i Satàna
  - type: note
    content: 'Satàna: na ilay mpiampanga (and 9-11): ampit Apôk 12.10.'
  - type: text
    content: ':'
  - type: text
    content: –Indro eo am-pelatananao izay ananany rehetra. Nefa aza kasihinao kosa ny tenany.
  - type: text
    content: Dia niala teo anatrehan’ny TOMPO i Satàna.
  '13':
  - type: text
    content: 'Indray andro raha nihinana sy nisotro tao an-tranon-jokiny lahimatoa ireo zanak’i Jôba, '
  '14':
  - type: text
    content: 'dia nisy iraka tonga tany amin’i Jôba nilaza taminy hoe: «Raha teo am-piasàna iny indrindra ny omby ary raha nihinana teo akaikiny ny borikivavy, '
  '15':
  - type: text
    content: dia nidinan’ny Sabeanina
  - type: note
    content: 'Sabeanina: olona tontakely mpifindrafindra monina, toa avy any atsimon’i Arabia.'
  - type: text
    content: ' tampoka ka norobainy; novonoiny ho faty tamin’ny sabatra ny mpanomponao, ary dia izaho irery no afa-nandositra hampandre anao.»'
  '16':
  - type: text
    content: 'Fa raha tsy mbola tapitra akory ny teniny, dia nisy iray hafa koa tonga nilaza hoe: «Nilatsaham-potaka ny ondry aman’osy sy ny mpiandry azy ka levona, ary dia izaho irery no afa-nandositra hampandre anao.»'
  '17':
  - type: text
    content: 'Fa raha tsy mbola tapitra akory ny tenin’io? dia nisy iray hafa koa tonga ka nanao hoe: «Nasian’ny andian-jiolahy kaldeanina'
  - type: note
    content: 'Kaldeanina: mpianefitra mifindrafindra monina, toa avy any avaratra atsinanan’i Arabia.'
  - type: text
    content: ' telo toko ny rameva ka norobainy; novonoiny ho faty tamin’ny sabatra ny mpanomponao. Izaho irery no afa-nandositra hampandre anao.»'
  '18':
  - type: text
    content: 'Fa raha tsy mbola tapitra koa ny teniny, dia nisy iray hafa koa tonga ka nanao hoe: «Raha teo am-pihinanana sy teo am-pisotroana tao an-tranon-jokiny ireo zanakao, '
  '19':
  - type: text
    content: dia nifofofofo avy any an-taniefitra ny rambondanitra ka nipaoka ny zoron-trano efatra; maty nianjeran’ny trano tao avokoa ireo zatovo, ary dia izaho irery no afa-nandositra hampandre anao.»
  '2':
  - type: text
    content: 'Nanan-janaka lahy fito sy zanaka vavy telo izy. '
  '20':
  - type: text
    content: 'Dia nitsangana i Jôba ka '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sy nanaratra ny lohany'
  - type: note
    content: 'nandriatra ny fitafiany sy nanaratra ny lohany: momba izany mari-pisaonana sy alahelo izany dia jereo Jer 41.5 sy nta; jereo ny FTS amin’ny voambolana hoe MANDRIATRA FITAFIANA.'
  - type: text
    content: ' ary niampatra tamin’ny tany ka niankohoka '
  '21':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: Nitanjaka no nivoahako avy tao an-kibon’ineny,
  - type: text
    content: ary mitanjaka koa no hiverenako avy an-kibon’ny tany.
  - type: text
    content: Ny TOMPO no nanome, ny TOMPO no naka.
  - type: text
    content: Isaorana anie ny anaran’ny TOMPO.
  '22':
  - type: text
    content: Tamin’izany fahoriana rehetra izany dia tsy mba nanota i Jôba ary tsy nanome tsiny an’Andriamanitra.
  '3':
  - type: text
    content: Nanana ondry fito arivo sy rameva telo arivo ary omby arivo sy borikivavy dimanjato mbamin’ny mpanompo marobe koa izy. I Jôba no lehilahy nanan-kaja indrindra tany atsinanan’i Palestinina.
  '4':
  - type: text
    content: 'Fanaon’ireo zanakalahin’i Jôba ny mifandimby mifanasa amin’ny sakafo tsara. Koa nasainy ireo anabaviny telo mba hiaraka mihinana sy misotro aminy. '
  '5':
  - type: text
    content: 'Ary rehefa tapi-nihodina ny fanasana, dia nampiantsoin’i Jôba ny zanany mba '
  - type: text
    content: hodiovina
  - type: text
    content: '. Dia nifoha maraina be izy ny ampitso ka nanolotra '
  - type: text
    content: sorona dorana
  - type: text
    content: ' manontolo araka ny isan’izy rehetra; fa hoy Jôba hoe: «Fandrao nanota na nandà an’Andriamanitra tao am-pony ny zanako.» Izany no nataon’i Jôba mandrakariva.'
  '6':
  - type: text
    content: 'Indray andro raha tonga nanao tatitra tamin’ny TOMPO ireo zanak’Andriamanitra, dia mba tafaraka taminy teo koa i '
  - type: text
    content: Satàna
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: text
    content: –Avy taiza moa ianao?
  - type: text
    content: 'Dia namaly ny Tompo izy hoe:'
  - type: text
    content: –Avy nitetitety ny tany sy nihaodihaody teny aho.
  '8':
  - type: text
    content: 'Ary hoy ny Tompo taminy:'
  - type: text
    content: '–Efa nahita an’i Jôba mpanompoko ve ianao? Fa tsy misy tahaka azy eny ambonin’ny tany: lehilahy tsy misy hokianina sady mahitsy ary manaja Ahy izy ka nifady ny ratsy.'
  '9':
  - type: text
    content: 'Fa mbola namaly ny Tompo i Satàna ka nanao hoe:'
  - type: text
    content: '–Moa tsy fanantenan-javatra ve no anajàn’i Jôba Anao? '
