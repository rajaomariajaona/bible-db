document_id: 1KI.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ahaba te haka indray ny tanànan’i Ramôta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 18.1-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Roa taona no tsy nisian’ny ady intsony teo amin’i Siria sy i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tamin’ny taona fahatelo dia nankany amin’ny mpanjakan’i Israely i Jôsafata mpanjakan’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny mpanjakan’i Israely tamin’ny manamboninahiny: «Fantatrareo tsara fa antsika ny tanànan’i Ramôta any Gilehada'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tanàna ao atsimo atsinanan’ny farihy Genesareta, niadian’ny Israelita sy ny Sirianina hatry ny ela.
    marker-yv: yv-n
  - type: text
    text: ', koa inona no isalasalantsika tsy haka izany amin’ny mpanjakan’i Siria?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy izy tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba hiaraka amiko hanafika an’i Ramôta-Gilehada ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao, ary ny soavaliko dia soavalinao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naminany fahombiazana ireo mpaminany matihanina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 18.4-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mbola niteny tamin’ny mpanjakan’i Israely indray i Jôsafata ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba anontanio aloha ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary novorin’ny mpanjakan’i Israely ny mpaminaniny tokony ho efajato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ireo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpaminany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' matihanina ireo dia niantohan’ny mpanjaka ara-pivelomana; hanohana ny pôlitikam-panjakana no nandrasana taminy toy izay hiteny zavatra avy amin’Andriamanitra (ampit and 13).'
    marker-yv: yv-n
  - type: text
    text: ' ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha hanafika an’i Ramôta-Gilehada ve aho, sa tsia?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana fa hatolotry ny Tompo eo an-tananao ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy kosa i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy misy mpaminan’ny TOMPO koa ve eto mba hanontaniantsika?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia novalian’ny mpanjakan’i Israely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mbola misy lehilahy iray ahazoantsika manontany ny TOMPO ao, dia i Mikaià zanakalahin’i Jimlà; saingy halako izy, satria tsy mba maminany soa ho ahy fa loza hatrany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza miteny izany ianao, ry mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tamin’izay dia niantso tandapa anankiray ny mpanjakan’i Israely, ka nandidy azy haka faingana an’i Mikaià zanakalahin’i Jimlà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mpanjakan’i Israely sy ny mpanjakan’i Joda dia samy nipetraka teo amin’ny sezafiandrianany sy efa niakanjo ny fanamiany avy, teo amin’ny kianja manoloana ny vavahadin’i Samaria, nandritra ny naminanian’ireo mpaminany rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa i Tsedekià, zanakalahin’i Kenahanà, dia namboatra tandro-by ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Ireto tandroka ireto no hanotoanao ny tafika sirianina mandra-paharingany.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nilaza hafatra toy izany avokoa ny mpaminany rehetra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tafiho i Ramôta-Gilehada fa ho resinao, ry mpanjaka! Eny, hatolotry ny TOMPO eo an-tananao io tanàna io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faharesena no nambaran’i Mikaià mpaminany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 18.12-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ilay iraka izay nandeha naka an’i Mikaià kosa dia niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro efa iray teny avokoa izao ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', ka milaza soa ho an’ny mpanjaka; enga anie ny teninao mba ho tahaka ny azy, ka hilaza soa ihany koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy i Mikaià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona ny TOMPO, ka mianiana aho fa izay lazain’ny TOMPO amiko ihany no hambarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa tonga teo anatrehan’ny mpanjaka izy, dia nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Mikaià, handeha hanafika an’i Ramôta-Gilehada ve isika sa hijanona ihany?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana fa handresy ianao, ry andriamanjaka, ary hatolotry ny TOMPO eo an-tananao io tanàna io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy indray ny mpanjaka taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Impiry moa no hampianianako anao mba tsy hilaza amiko afa-tsy ny marina ihany amin’ny anaran’ny TOMPO?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny navalin’i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hitako fa ny tafik’i Israely manontolo dia niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 27.17; Ezek 34.5; Mt 9.36, Mk 6.34.
    marker-yv: yv-n
  - type: text
    text: '. Ary ny TOMPO niteny hoe: «Tsy mana-mpifehy intsony ireo miaramila ireo, ka aoka izy samy hody soa aman-tsara any an-tranony avy.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy fa loza ihany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy indray i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Henoy àry ny tenin’ny TOMPO: Hitako nipetraka teo amin’ny sezafiandrianany manko ny TOMPO; ary ireo anjeliny marobe any an-danitra nijoro teo ankavanany sy teo ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ka hoy ny TOMPO nanontany hoe: «Iza no hitaona an’i Ahaba handeha hanafika an’i Ramôta-Gilehada mba hahafaty azy any?» Ary samy nanana ny fomba famaliny avy ny tsirairay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nandroso ka nitsangana teo anoloan’ny TOMPO ny fanahy anankiray ary nanao hoe: «Izaho no hitaona azy!» Hoy kosa ny TOMPO hoe: «Amin’ny fomba ahoana?» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy izy: «Handeha aho, ka ho tonga fanahy mandainga ao am-bavan’ireo mpaminanin’i Ahaba rehetra». Ary hoy indray ny TOMPO: «Ho voataonanao tokoa izy, sady zavatra manavanana anao izany; ndeha àry ka ataovy!» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ankehitriny, raha ny TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao rehetra ireto, dia satria IZY mihitsy no efa nilaza ny loza hanjo anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tamin’izay nanatona an’i Mikaià i Tsedekià zanakalahin’i Kenahanà, ka namely tehamaina azy sady nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Niala tamiko ve ny Fanahin’ny TOMPO mba hiteny aminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia novalian’i Mikaià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro fa ho hitanao izany amin’ny andro izay hitsofotsofohanao efitrano mba hiery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’izay ny mpanjakan’i Israely dia nibaiko hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sambory i Mikaià, dia ento miverina any amin’i Amôna governoran’ny tanàna sy any amin’i Jôasy zanako lahy, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ka lazao ireo fa baiko avy amiko ny hanaovana ity olona ity an-tranomaizina ary ny hamahanana azy mofo kely sy rano kely fotsiny mandra-piveriko soa aman-tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy kosa i Mikaià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tàhiny ka tafaverina soa aman-tsara ianao, dia tsy nampitenenin’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny RM eto dia manampy izao: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ary hoy koa izy: Samia mihaino ianareo, ry firenena rehetra.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Mik 1.1-2; teny avy amin’ny fiandohan’ny bokin’i Mikà mpaminany ireo, ka toa ny fampifangaroana an’ity Mikaià ity amin’ilay Mikà avy any Môreseta no nahatonga ny fanisihana ireo teny ireo eto.'
    marker-yv: yv-n
  - type: text
    text: ' aho tsy akory.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maty an’ady i Ahaba mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 18.28-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia lasa nanafika an’i Ramôta-Gilehada ny mpanjakan’i Israely sy i Jôsafata mpanjakan’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hody olon-kafa aho, dia hirotsaka an’ady; fa ianao kosa miakanjoa ny fanamianao ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nody olon-kafa ny mpanjakan’i Israely ka nirotsaka an’ady. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny mpanjakan’i Siria kosa efa nanome baiko ireo komandy 32 mifehy ny kalesiny mba tsy hamely miaramila tsotra na mpitari-tafika fa ny mpanjakan’i Israely ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nony nahita an’i Jôsafata ireo komandin-kalesy, dia nihevitra azy ho ny mpanjakan’i Israely mihitsy. Dia isangodinany hiadiana izy; kanjo niantsoantso mafy i Jôsafata. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Rehefa hitan’ireo komandin-kalesy fa tsy ny mpanjakan’i Israely io, dia nialany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nisy miaramila sirianina anankiray nandefa zana-tsipîka tsy nahy, ka nahavoa ny mpanjakan’i Israely teo anelanelan’ny famavàn’ny akanjo vy fiarovan-tratrany. Dia hoy ity mpanjaka tamin’ny mpamily ny kalesiny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahodino ny kalesy, ka ento miala ny toeram-piadiana aho fa maratra mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Kanefa nihamafy ny ady tamin’izay andro izay; koa tsy maintsy notohanana ny mpanjaka mba hitsangana teo amin’ny kalesiny nanoloana ny tafika sirianina; ary maty izy nony hariva ny andro, fa nitsika tao anatin’ny kalesiny ny ra tamin’ny ratrany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa nilentika ny masoandro, dia nanako eran’ny toby izao antsoantso izao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Samia mody any an-tanànany sy any amin’ny taniny avy, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: fa maty ny mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa maty ny mpanjaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika izany; ny RM kosa manao hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dia maty ny mpanjaka, ka nentina...
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nentina tany Samaria ny razana ka nalevina tao. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary rehefa nosasana teo amin’ny farihin’i Samaria ny kalesin’i Ahaba, dia avy ny alika nilelaka ny rany, ary ny mpivarotena nandro teo, araka ny tenin’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny Testamenta taloha dia tsy nitahiry io faminaniana momba ny fandroan’ny mpivarotena io.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Ahaba ary koa ny zavatra hafa rehetra vitany, ny trano ivoara nataony sy ny tanàna rehetra naoriny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany izy, dia i Ahazià zanany lahy no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôsafata mpanjakan’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 20.31–21.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tamin’ny taona fahefatra nanjakàn’i Ahaba mpanjakan’i Israely no tonga mpanjakan’i Joda i Jôsafata zanakalahin’i Asà. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Feno 35 taona i Jôsafata fony vao nanjaka, ary naharitra 25 taona no nanjakàny tany Jerosalema. Ny anaran-dreniny dia i Hazobà, zanakavavin’i Silehỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Narahiny avokoa ny toetran’i Asà rainy ka tsy niala tamin’izany izy, fa nanao izay mahitsy eo imason’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Kanefa ny toeram-panasinana tsy voafongotra, fa ny olona dia mbola nanao sorona sy nandoro azy hanetona teny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary nanao fanekempihavanana tamin’ny mpanjakan’i Israely i Jôsafata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Jôsafata ary koa ny herimpo nasehony sy ny ady natrehiny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Joda.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Izy no namongotra teo amin’ny tany ireo lehilahy sy vehivavy nitolo-tena hijangajanga ho fanompoan-tsampy ka mbola velona tamin’ny andron’i Asà rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Tsy nisy mpanjaka tany Edôma tamin’izany fotoana izany, fa governora notendren’ny mpanjaka ihany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Mp 8.20.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Nanamboatra sambo vaventy haka volamena any Ôfira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.28 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Jôsafata; nefa tsy afa-niainga ireo sambo ireo, satria rendrika tao Hetsiôny-Gebera. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia hoy i Ahazià zanakalahin’i Ahaba tamin’i Jôsafata:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hiaraka amin’ny tantsambonao ny tantsamboko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa tsy nety i Jôsafata. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ary rehefa lasa nodimandry any amin’ny razany i Jôsafata, dia nalevina am-pasan-drazana tao an-tanànan’i Davida; ary i Jôrama zanany lahy no nanjaka nandimby azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Ahazià mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tamin’ny taona faha-17 nanjakàn’i Jôsafata mpanjakan’i Joda no tonga mpanjakan’i Israely tao Samaria i Ahazià zanakalahin’i Ahaba; ary naharitra roa taona no nanjakàny tamin’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO izy fa nanaraka ny toetran’ny rainy sy ny reniny ary ny toetran’i Jerôbohama izay zanakalahin’i Nebata sady nampanota an’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Nanompo an’i Bahala sady niankohoka teo anatrehany izy ary nampahatezitra ny TOMPO Andriamanitr’i Israely tahaka izay nataon-drainy ihany.
