document_id: 1KI.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Ahaba te haka indray ny tanànan’i Ramôta
  - type: heading
    content: (Jereo 2 Tan 18.1-3)
  - type: text
    content: 'Roa taona no tsy nisian’ny ady intsony teo amin’i Siria sy i Israely. '
  '10':
  - type: text
    content: 'Ary ny mpanjakan’i Israely sy ny mpanjakan’i Joda dia samy nipetraka teo amin’ny sezafiandrianany sy efa niakanjo ny fanamiany avy, teo amin’ny kianja manoloana ny vavahadin’i Samaria, nandritra ny naminanian’ireo mpaminany rehetra ireo. '
  '11':
  - type: text
    content: 'Fa i Tsedekià, zanakalahin’i Kenahanà, dia namboatra tandro-by ka niteny hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Ireto tandroka ireto no hanotoanao ny tafika sirianina mandra-paharingany.»'
  '12':
  - type: text
    content: 'Dia nilaza hafatra toy izany avokoa ny mpaminany rehetra ka nanao hoe:'
  - type: text
    content: –Tafiho i Ramôta-Gilehada fa ho resinao, ry mpanjaka! Eny, hatolotry ny TOMPO eo an-tananao io tanàna io.
  - type: heading
    content: Faharesena no nambaran’i Mikaià mpaminany
  - type: heading
    content: (Jereo 2 Tan 18.12-17)
  '13':
  - type: text
    content: 'Ilay iraka izay nandeha naka an’i Mikaià kosa dia niteny taminy hoe:'
  - type: text
    content: '–Indro efa iray teny avokoa izao ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ', ka milaza soa ho an’ny mpanjaka; enga anie ny teninao mba ho tahaka ny azy, ka hilaza soa ihany koa.'
  '14':
  - type: text
    content: 'Fa hoy i Mikaià hoe:'
  - type: text
    content: –Velona ny TOMPO, ka mianiana aho fa izay lazain’ny TOMPO amiko ihany no hambarako.
  '15':
  - type: text
    content: 'Rehefa tonga teo anatrehan’ny mpanjaka izy, dia nanontaniany hoe:'
  - type: text
    content: –Ry Mikaià, handeha hanafika an’i Ramôta-Gilehada ve isika sa hijanona ihany?
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: –Mandehana fa handresy ianao, ry andriamanjaka, ary hatolotry ny TOMPO eo an-tananao io tanàna io.
  '16':
  - type: text
    content: 'Fa hoy indray ny mpanjaka taminy:'
  - type: text
    content: –Impiry moa no hampianianako anao mba tsy hilaza amiko afa-tsy ny marina ihany amin’ny anaran’ny TOMPO?
  '17':
  - type: text
    content: 'Dia hoy ny navalin’i Mikaià:'
  - type: text
    content: –Hitako fa ny tafik’i Israely manontolo dia niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry
  - type: note
    content: Jereo Nom 27.17; Ezek 34.5; Mt 9.36, Mk 6.34.
  - type: text
    content: '. Ary ny TOMPO niteny hoe: «Tsy mana-mpifehy intsony ireo miaramila ireo, ka aoka izy samy hody soa aman-tsara any an-tranony avy.»'
  '18':
  - type: text
    content: 'Dia hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
  - type: text
    content: –Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy fa loza ihany?
  '19':
  - type: text
    content: 'Ary hoy indray i Mikaià:'
  - type: text
    content: '–Henoy àry ny tenin’ny TOMPO: Hitako nipetraka teo amin’ny sezafiandrianany manko ny TOMPO; ary ireo anjeliny marobe any an-danitra nijoro teo ankavanany sy teo ankaviany. '
  '2':
  - type: text
    content: 'Fa tamin’ny taona fahatelo dia nankany amin’ny mpanjakan’i Israely i Jôsafata mpanjakan’i Joda. '
  '20':
  - type: text
    content: 'Ka hoy ny TOMPO nanontany hoe: «Iza no hitaona an’i Ahaba handeha hanafika an’i Ramôta-Gilehada mba hahafaty azy any?» Ary samy nanana ny fomba famaliny avy ny tsirairay. '
  '21':
  - type: text
    content: 'Fa nandroso ka nitsangana teo anoloan’ny TOMPO ny fanahy anankiray ary nanao hoe: «Izaho no hitaona azy!» Hoy kosa ny TOMPO hoe: «Amin’ny fomba ahoana?» '
  '22':
  - type: text
    content: 'Dia hoy izy: «Handeha aho, ka ho tonga fanahy mandainga ao am-bavan’ireo mpaminanin’i Ahaba rehetra». Ary hoy indray ny TOMPO: «Ho voataonanao tokoa izy, sady zavatra manavanana anao izany; ndeha àry ka ataovy!» '
  '23':
  - type: text
    content: Ankehitriny, raha ny TOMPO efa nanisy fanahy mandainga ao am-bavan’ireto mpaminaninao rehetra ireto, dia satria IZY mihitsy no efa nilaza ny loza hanjo anao.
  '24':
  - type: text
    content: 'Tamin’izay nanatona an’i Mikaià i Tsedekià zanakalahin’i Kenahanà, ka namely tehamaina azy sady nanao hoe:'
  - type: text
    content: –Niala tamiko ve ny Fanahin’ny TOMPO mba hiteny aminao?
  '25':
  - type: text
    content: 'Dia novalian’i Mikaià hoe:'
  - type: text
    content: –Indro fa ho hitanao izany amin’ny andro izay hitsofotsofohanao efitrano mba hiery.
  '26':
  - type: text
    content: 'Tamin’izay ny mpanjakan’i Israely dia nibaiko hoe:'
  - type: text
    content: '–Sambory i Mikaià, dia ento miverina any amin’i Amôna governoran’ny tanàna sy any amin’i Jôasy zanako lahy, '
  '27':
  - type: text
    content: ka lazao ireo fa baiko avy amiko ny hanaovana ity olona ity an-tranomaizina ary ny hamahanana azy mofo kely sy rano kely fotsiny mandra-piveriko soa aman-tsara.
  '28':
  - type: text
    content: 'Fa hoy kosa i Mikaià:'
  - type: text
    content: –Raha tàhiny ka tafaverina soa aman-tsara ianao, dia tsy nampitenenin’ny TOMPO
  - type: note
    content: 'Ny RM eto dia manampy izao: Ary hoy koa izy: Samia mihaino ianareo, ry firenena rehetra. Jereo Mik 1.1-2; teny avy amin’ny fiandohan’ny bokin’i Mikà mpaminany ireo, ka toa ny fampifangaroana an’ity Mikaià ity amin’ilay Mikà avy any Môreseta no nahatonga ny fanisihana ireo teny ireo eto.'
  - type: text
    content: ' aho tsy akory.'
  - type: heading
    content: Maty an’ady i Ahaba mpanjaka
  - type: heading
    content: (Jereo 2 Tan 18.28-34)
  '29':
  - type: text
    content: 'Dia lasa nanafika an’i Ramôta-Gilehada ny mpanjakan’i Israely sy i Jôsafata mpanjakan’i Joda. '
  '3':
  - type: text
    content: 'Ary hoy ny mpanjakan’i Israely tamin’ny manamboninahiny: «Fantatrareo tsara fa antsika ny tanànan’i Ramôta any Gilehada'
  - type: note
    content: Tanàna ao atsimo atsinanan’ny farihy Genesareta, niadian’ny Israelita sy ny Sirianina hatry ny ela.
  - type: text
    content: ', koa inona no isalasalantsika tsy haka izany amin’ny mpanjakan’i Siria?» '
  '30':
  - type: text
    content: 'Ary hoy ny mpanjakan’i Israely tamin’i Jôsafata:'
  - type: text
    content: –Hody olon-kafa aho, dia hirotsaka an’ady; fa ianao kosa miakanjoa ny fanamianao ihany.
  - type: text
    content: 'Dia nody olon-kafa ny mpanjakan’i Israely ka nirotsaka an’ady. '
  '31':
  - type: text
    content: 'Fa ny mpanjakan’i Siria kosa efa nanome baiko ireo komandy 32 mifehy ny kalesiny mba tsy hamely miaramila tsotra na mpitari-tafika fa ny mpanjakan’i Israely ihany. '
  '32':
  - type: text
    content: 'Nony nahita an’i Jôsafata ireo komandin-kalesy, dia nihevitra azy ho ny mpanjakan’i Israely mihitsy. Dia isangodinany hiadiana izy; kanjo niantsoantso mafy i Jôsafata. '
  '33':
  - type: text
    content: Rehefa hitan’ireo komandin-kalesy fa tsy ny mpanjakan’i Israely io, dia nialany.
  '34':
  - type: text
    content: 'Ary nisy miaramila sirianina anankiray nandefa zana-tsipîka tsy nahy, ka nahavoa ny mpanjakan’i Israely teo anelanelan’ny famavàn’ny akanjo vy fiarovan-tratrany. Dia hoy ity mpanjaka tamin’ny mpamily ny kalesiny:'
  - type: text
    content: –Ahodino ny kalesy, ka ento miala ny toeram-piadiana aho fa maratra mafy.
  '35':
  - type: text
    content: 'Kanefa nihamafy ny ady tamin’izay andro izay; koa tsy maintsy notohanana ny mpanjaka mba hitsangana teo amin’ny kalesiny nanoloana ny tafika sirianina; ary maty izy nony hariva ny andro, fa nitsika tao anatin’ny kalesiny ny ra tamin’ny ratrany. '
  '36':
  - type: text
    content: 'Rehefa nilentika ny masoandro, dia nanako eran’ny toby izao antsoantso izao hoe:'
  - type: text
    content: '–Samia mody any an-tanànany sy any amin’ny taniny avy, '
  '37':
  - type: text
    content: fa maty ny mpanjaka
  - type: note
    content: 'fa maty ny mpanjaka: araka ny dkt tranainy grika izany; ny RM kosa manao hoe: Dia maty ny mpanjaka, ka nentina...'
  - type: text
    content: '!'
  - type: text
    content: 'Dia nentina tany Samaria ny razana ka nalevina tao. '
  '38':
  - type: text
    content: Ary rehefa nosasana teo amin’ny farihin’i Samaria ny kalesin’i Ahaba, dia avy ny alika nilelaka ny rany, ary ny mpivarotena nandro teo, araka ny tenin’ny TOMPO
  - type: note
    content: Ny Testamenta taloha dia tsy nitahiry io faminaniana momba ny fandroan’ny mpivarotena io.
  - type: text
    content: .
  '39':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Ahaba ary koa ny zavatra hafa rehetra vitany, ny trano ivoara nataony sy ny tanàna rehetra naoriny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Ary hoy izy tamin’i Jôsafata:'
  - type: text
    content: –Mba hiaraka amiko hanafika an’i Ramôta-Gilehada ve ianao?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Eny, fa tahaka ny tenanao ihany aho, ka ny tafiko dia tafikao, ary ny soavaliko dia soavalinao.
  - type: heading
    content: Naminany fahombiazana ireo mpaminany matihanina
  - type: heading
    content: (Jereo 2 Tan 18.4-11)
  '40':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia i Ahazià zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Jôsafata mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 20.31–21.1)
  '41':
  - type: text
    content: 'Tamin’ny taona fahefatra nanjakàn’i Ahaba mpanjakan’i Israely no tonga mpanjakan’i Joda i Jôsafata zanakalahin’i Asà. '
  '42':
  - type: text
    content: 'Feno 35 taona i Jôsafata fony vao nanjaka, ary naharitra 25 taona no nanjakàny tany Jerosalema. Ny anaran-dreniny dia i Hazobà, zanakavavin’i Silehỳ. '
  '43':
  - type: text
    content: 'Narahiny avokoa ny toetran’i Asà rainy ka tsy niala tamin’izany izy, fa nanao izay mahitsy eo imason’ny TOMPO. '
  '44':
  - type: text
    content: 'Kanefa ny toeram-panasinana tsy voafongotra, fa ny olona dia mbola nanao sorona sy nandoro azy hanetona teny ihany. '
  '45':
  - type: text
    content: Ary nanao fanekempihavanana tamin’ny mpanjakan’i Israely i Jôsafata.
  '46':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôsafata ary koa ny herimpo nasehony sy ny ady natrehiny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Izy no namongotra teo amin’ny tany ireo lehilahy sy vehivavy nitolo-tena hijangajanga ho fanompoan-tsampy ka mbola velona tamin’ny andron’i Asà rainy. '
  '48':
  - type: text
    content: Tsy nisy mpanjaka tany Edôma tamin’izany fotoana izany, fa governora notendren’ny mpanjaka ihany
  - type: note
    content: Ampit 2 Mp 8.20.
  - type: text
    content: '. '
  '49':
  - type: text
    content: Nanamboatra sambo vaventy haka volamena any Ôfira
  - type: note
    content: Jereo 9.28 sy nta.
  - type: text
    content: ' i Jôsafata; nefa tsy afa-niainga ireo sambo ireo, satria rendrika tao Hetsiôny-Gebera. '
  '5':
  - type: text
    content: 'Mbola niteny tamin’ny mpanjakan’i Israely indray i Jôsafata ka nanao hoe:'
  - type: text
    content: –Mba anontanio aloha ny TOMPO.
  '50':
  - type: text
    content: 'Dia hoy i Ahazià zanakalahin’i Ahaba tamin’i Jôsafata:'
  - type: text
    content: –Aoka hiaraka amin’ny tantsambonao ny tantsamboko.
  - type: text
    content: 'Fa tsy nety i Jôsafata. '
  '51':
  - type: text
    content: Ary rehefa lasa nodimandry any amin’ny razany i Jôsafata, dia nalevina am-pasan-drazana tao an-tanànan’i Davida; ary i Jôrama zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Ahazià mpanjakan’i Israely
  '52':
  - type: text
    content: 'Tamin’ny taona faha-17 nanjakàn’i Jôsafata mpanjakan’i Joda no tonga mpanjakan’i Israely tao Samaria i Ahazià zanakalahin’i Ahaba; ary naharitra roa taona no nanjakàny tamin’i Israely. '
  '53':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy fa nanaraka ny toetran’ny rainy sy ny reniny ary ny toetran’i Jerôbohama izay zanakalahin’i Nebata sady nampanota an’i Israely. '
  '54':
  - type: text
    content: Nanompo an’i Bahala sady niankohoka teo anatrehany izy ary nampahatezitra ny TOMPO Andriamanitr’i Israely tahaka izay nataon-drainy ihany.
  '6':
  - type: text
    content: Ary novorin’ny mpanjakan’i Israely ny mpaminaniny tokony ho efajato
  - type: note
    content: Ireo mpaminany matihanina ireo dia niantohan’ny mpanjaka ara-pivelomana; hanohana ny pôlitikam-panjakana no nandrasana taminy toy izay hiteny zavatra avy amin’Andriamanitra (ampit and 13).
  - type: text
    content: ' ka nanontaniany hoe:'
  - type: text
    content: –Handeha hanafika an’i Ramôta-Gilehada ve aho, sa tsia?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Mandehana fa hatolotry ny Tompo eo an-tananao ny tanàna.
  '7':
  - type: text
    content: 'Ary hoy kosa i Jôsafata:'
  - type: text
    content: –Moa tsy misy mpaminan’ny TOMPO koa ve eto mba hanontaniantsika?
  '8':
  - type: text
    content: 'Dia novalian’ny mpanjakan’i Israely hoe:'
  - type: text
    content: –Mbola misy lehilahy iray ahazoantsika manontany ny TOMPO ao, dia i Mikaià zanakalahin’i Jimlà; saingy halako izy, satria tsy mba maminany soa ho ahy fa loza hatrany.
  - type: text
    content: 'Ka hoy i Jôsafata:'
  - type: text
    content: –Aza miteny izany ianao, ry mpanjaka.
  '9':
  - type: text
    content: Tamin’izay dia niantso tandapa anankiray ny mpanjakan’i Israely, ka nandidy azy haka faingana an’i Mikaià zanakalahin’i Jimlà.
