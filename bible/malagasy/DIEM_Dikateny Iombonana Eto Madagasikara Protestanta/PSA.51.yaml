  '1':
  - type: heading
    content: SALAMO Vavaka mba hahazoana famelan-keloka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida,
  - type: text
    content: ' '
  '10':
  - type: text
    content: Ataovy reko ny famelanao,
  - type: text
    content: dia hifaly sy hiravo indray aho;
  - type: text
    content: ary aoka hibitaka ny taolako
  - type: text
    content: izay efa voamontsamontsanao.
  '11':
  - type: text
    content: Hadinoy tanteraka ny fahotako
  - type: text
    content: ary koseho avokoa ny heloka vitako.
  '12':
  - type: text
    content: Amorony fo madio aho, Andriamanitra ô,
  - type: text
    content: fanahy mahatoky no aoreno ato anatiko.
  '13':
  - type: text
    content: Aza esorina anoloanao aho;
  - type: text
    content: ny Fanahinao Masina, aza alana amiko.
  '14':
  - type: text
    content: Avereno amiko ny hafalian’ny voavonjy;
  - type: text
    content: ilay Fanahinao mampazoto no anohany ahy.
  '15':
  - type: text
    content: Dia hotoroako ny lalanao ireo olon-diso
  - type: text
    content: ka hiverina aminao ny mpanota.
  '16':
  - type: text
    content: Andriamanitra ô, Andriamanitra mpamonjiko Ianao.
  - type: text
    content: Namono olona ho faty aho ka ataovy afa-keloka
  - type: note
    content: Jereo 2 Sam 11.14-27.
  - type: text
    content: mba hihobiako ny fanafahanao ahy.
  '17':
  - type: text
    content: Tompo ô, ampio hiloa-bava aho,
  - type: text
    content: mba hanambaràko ny fiderana Anao.
  '18':
  - type: text
    content: 'Tsy ny '
  - type: text
    content: sorona
  - type: text
    content: ' amam-panatitra no ho sitrakao;'
  - type: text
    content: raha izany, dia nomeko ihany Ianao.
  - type: text
    content: Na ny sorona dorana manontolo aza
  - type: text
    content: dia tsy hahafaly Anao akory.
  '19':
  - type: text
    content: Ny sorona ataoko aminao, Andriamanitra ô,
  - type: text
    content: dia ny fanahiko tsy miavonavona;
  - type: text
    content: ny foko tsy miavonavona sy mangorakoraka
  - type: text
    content: dia tsy mba ataonao tsinontsinona, Andriamanitra ô.
  '2':
  - type: text
    content: fony i Natàna
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: nankao aminy, rehefa naka an’i Baty-Seba ity mpanjaka
  - type: note
    content: Jereo 2 Sam 11-12.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Noho ny fanambinanao, hasoavy i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: atsangano ny mandan’i Jerosalema.
  '21':
  - type: text
    content: Dia ho sitrakao ireo sorona amam-panatitra ara-dalàna
  - type: text
    content: mbamin’ny sorona dorana sy izay atolotra manontolo;
  - type: text
    content: ka dia ombilahy no hakarina
  - type: text
    content: 'eo ambonin’ny '
  - type: text
    content: alitaranao
  - type: text
    content: .
  '3':
  - type: text
    content: Andriamanitra ô, iantrao aho
  - type: text
    content: satria fatra-pitia Ianao;
  - type: text
    content: koseho re ny hadisoako
  - type: text
    content: satria be indrafo Ianao.
  '4':
  - type: text
    content: Sasao tanteraka aho ho afa-keloka
  - type: text
    content: 'ary '
  - type: text
    content: diovy
  - type: text
    content: ' mba ho afa-pahotana.'
  '5':
  - type: text
    content: Eny, miaiky ny fahadisoako aho
  - type: text
    content: sady tsaroako lalandava ny fahotako.
  '6':
  - type: text
    content: Ianao irery tokoa no nanotako,
  - type: text
    content: ny ratsy eo imasonao no nataoko;
  - type: text
    content: hany ka ara-drariny Ianao raha miteny,
  - type: text
    content: ary tsy omen-tsiny raha manadidy
  - type: note
    content: Ity andalana ity dia tsiahivina ao amin’ny Rm 3.4.
  - type: text
    content: .
  '7':
  - type: text
    content: Jereo fa meloka aho no teraka,
  - type: text
    content: mpanota raha notorontoronina;
  '8':
  - type: text
    content: nefa ny hahitsy ao anaty no sitrakao,
  - type: text
    content: koa ny fahendrena am-po no atoroy ahy.
  '9':
  - type: text
    content: 'Ataovy afa-pahotana tokoa aho, dia '
  - type: text
    content: hadio
  - type: text
    content: ;
  - type: text
    content: sasao aho, dia ho fotsy mangatsakatsaka.
