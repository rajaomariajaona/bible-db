document_id: HEB.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay famonjen-dehibe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izany no tokony hitandremantsika mafimafy kokoa izay efa rentsika, fandrao voatarika hiala amin’izany isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanan-danja tokoa na dia ny hafatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nentin’anjely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: '...nentin’anjely: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 7.53 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' aza, ary izay rehetra nandika izany na tsy nanaiky izany dia nahazo sazy tandrify avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka hataontsika ahoana no fandositra, raha tsy raharahaintsika ny famonjen-dehibe toy izany? Ny Tompo mihitsy no efa nitory voalohany izany famonjena izany, ary nohamafisin’ireo izay nandre mba ho fanasoavana antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Andriamanitra koa dia niara-nijoro ho vavolombelona tamin’ireo nandre ireo ka niantoka izany tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' sy zava-mahatalanjona ary ny asa mahagaga isan-karazany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mk 16.17-18, 20; Asa 5.12.
    marker-yv: yv-n
  - type: text
    text: ', mbamin’ireo fanomezan’ny Fanahy Masina izay nozarazarain’Andriamanitra araka ny sitrapony.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay mpitari-dalana ho amin’ny famonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy teo ambany fahefàn’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' tsy akory no nametrahan’Andriamanitra izao fiainan-ko avy lazainay izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ao, dia misy manambara manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona moa izay olombelona, Andriamanitra ô, no mba tsarovanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona moa izay zanak’olombelona no mba ahînao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nataonao ambany noho ny anjely nandritra ny fotoana fohifohy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nosatrohanao voninahitra sy haja;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary ny zavatra rehetra napetrakao eo ambany fahefàny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nataonao eo ambany tongony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 6-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 8.5-7. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: sy haja
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 7): misy stf sasany manampy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary nampanjakainao amin’ireo asan’ny tananao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Sal 8.7).'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Raha voalaza fa «ny zavatra rehetra dia napetrak’Andriamanitra eo ambany fahefàn’ny olombelona», dia tsy nisy zavatra tsy napetrany eo ambany fahefàny. Kanefa ankehitriny dia mbola tsy hitantsika hoe napetraka eo ambany fahefàn’ny olombelona ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no hitantsika: natao ambany noho ny anjely nandritra ny fotoana fohifohy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ambany... fohifohy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy mandika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ambany kely noho ny anjely,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto sy eo amin’ny and 7.'
    marker-yv: yv-n
  - type: text
    text: ' i Jesoa, mba ho faty ho an’ny olona rehetra noho ny fahasoavan’Andriamanitra; ary satria niaritra ny fahafatesana Izy, dia nosatrohan’Andriamanitra voninahitra sy haja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eny, Andriamanitra, Izay nahary ny zavatra rehetra sady anton’ny nahariana ny zavatra rehetra, dia te hitondra zanaka maro ho any amin’ny voninahitra; ka rariny raha nataon’Andriamanitra ho tanteraka tamin’ny alalan’ny fijaliana tokoa i Jesoa, ilay mpitari-dalana azy ireo ho amin’ny famonjena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa na i Jesoa nanadio ny olombelona ho afaka amin’ny fahotana, na ireo olombelona nodioviny, dia iray fiaviana avokoa. Noho izany, dia tsy menatra i Jesoa miantso azy ireo hoe zandriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa hoy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hanambara Anao amin’ireo zandriko Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo afovoan’ny Fiangonana no hiderako Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 22.23.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao koa no nataony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hatoky an’Andriamanitra Aho.»
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Ary koa hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indreto Aho sy ireo zaza nomen’Andriamanitra Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 8.17, voatsiahy araka ny dkt grika tranainy Septoazinta; Is 8.18.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa satria moa olombelona nofo aman-dra ireo zaza, dia tonga olombelona tahaka azy koa i Jesoa. Izany no nataony, dia ny mba handalovany amin’ny fahafatesana ka hahatonga ilay mitana ny herin’ny fahafatesana, izany hoe ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ', tsy hahavita na inona na inona intsony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary koa ny mba hanafahany an’izay rehetra voagejan’ny tahotra ny fahafatesana ka nandevozina nandritra ny androm-piainany manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miharihary tokoa fa tsy anjely velively no vonjen’i Jesoa, fa ireo taranak’i Abrahama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 41.8-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa amin’ny zavatra rehetra dia tsy maintsy tahaka ireo zandriny Izy, ka ho tonga '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpisorombe
  - type: text
    text: ' mamindra fo sy mahatoky eo amin’ny fifandraisana amin’Andriamanitra, mba hanonitra ny heloky ny vahoaka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fisor 4.20, 26, 35; 16.6, 10, 11; izay ahitana topimaso ankapobeny momba ny fombafomban’ny fanompoam-pivavahana fidiovana fanaon’ireo mpisoromben’ny Testamenta Taloha na Fanekempihavanana Taloha.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa noho ny tenan’io Mpisorombe io niaritra fijaliana sy nalaim-panahy, dia mahavonjy izay rehetra alaim-panahy koa Izy.
