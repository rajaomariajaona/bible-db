document_id: HEB.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay famonjen-dehibe
  - type: text
    content: 'Izany no tokony hitandremantsika mafimafy kokoa izay efa rentsika, fandrao voatarika hiala amin’izany isika. '
  '10':
  - type: text
    content: Eny, Andriamanitra, Izay nahary ny zavatra rehetra sady anton’ny nahariana ny zavatra rehetra, dia te hitondra zanaka maro ho any amin’ny voninahitra; ka rariny raha nataon’Andriamanitra ho tanteraka tamin’ny alalan’ny fijaliana tokoa i Jesoa, ilay mpitari-dalana azy ireo ho amin’ny famonjena.
  '11':
  - type: text
    content: 'Fa na i Jesoa nanadio ny olombelona ho afaka amin’ny fahotana, na ireo olombelona nodioviny, dia iray fiaviana avokoa. Noho izany, dia tsy menatra i Jesoa miantso azy ireo hoe zandriny, '
  '12':
  - type: text
    content: 'fa hoy Izy:'
  - type: text
    content: «Hanambara Anao amin’ireo zandriko Aho,
  - type: text
    content: Andriamanitra ô;
  - type: text
    content: eo afovoan’ny Fiangonana no hiderako Anao
  - type: note
    content: Sal 22.23.
  - type: text
    content: .»
  '13':
  - type: text
    content: 'Izao koa no nataony hoe:'
  - type: text
    content: «Hatoky an’Andriamanitra Aho.»
  - type: text
    content: 'Ary koa hoe:'
  - type: text
    content: «Indreto Aho sy ireo zaza nomen’Andriamanitra Ahy
  - type: note
    content: Is 8.17, voatsiahy araka ny dkt grika tranainy Septoazinta; Is 8.18.
  - type: text
    content: .»
  '14':
  - type: text
    content: 'Koa satria moa olombelona nofo aman-dra ireo zaza, dia tonga olombelona tahaka azy koa i Jesoa. Izany no nataony, dia ny mba handalovany amin’ny fahafatesana ka hahatonga ilay mitana ny herin’ny fahafatesana, izany hoe ny '
  - type: text
    content: devoly
  - type: text
    content: ', tsy hahavita na inona na inona intsony '
  '15':
  - type: text
    content: 'ary koa ny mba hanafahany an’izay rehetra voagejan’ny tahotra ny fahafatesana ka nandevozina nandritra ny androm-piainany manontolo. '
  '16':
  - type: text
    content: Miharihary tokoa fa tsy anjely velively no vonjen’i Jesoa, fa ireo taranak’i Abrahama
  - type: note
    content: Ampit Is 41.8-9.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Koa amin’ny zavatra rehetra dia tsy maintsy tahaka ireo zandriny Izy, ka ho tonga '
  - type: text
    content: Mpisorombe
  - type: text
    content: ' mamindra fo sy mahatoky eo amin’ny fifandraisana amin’Andriamanitra, mba hanonitra ny heloky ny vahoaka'
  - type: note
    content: Ampit Fisor 4.20, 26, 35; 16.6, 10, 11; izay ahitana topimaso ankapobeny momba ny fombafomban’ny fanompoam-pivavahana fidiovana fanaon’ireo mpisoromben’ny Testamenta Taloha na Fanekempihavanana Taloha.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Fa noho ny tenan’io Mpisorombe io niaritra fijaliana sy nalaim-panahy, dia mahavonjy izay rehetra alaim-panahy koa Izy.
  '2':
  - type: text
    content: 'Nanan-danja tokoa na dia ny hafatra '
  - type: text
    content: nentin’anjely
  - type: note
    content: '...nentin’anjely: jereo Asa 7.53 sy nta.'
  - type: text
    content: ' aza, ary izay rehetra nandika izany na tsy nanaiky izany dia nahazo sazy tandrify avy; '
  '3':
  - type: text
    content: 'ka hataontsika ahoana no fandositra, raha tsy raharahaintsika ny famonjen-dehibe toy izany? Ny Tompo mihitsy no efa nitory voalohany izany famonjena izany, ary nohamafisin’ireo izay nandre mba ho fanasoavana antsika. '
  '4':
  - type: text
    content: 'Andriamanitra koa dia niara-nijoro ho vavolombelona tamin’ireo nandre ireo ka niantoka izany tamin’ny '
  - type: text
    content: famantarana
  - type: text
    content: ' sy zava-mahatalanjona ary ny asa mahagaga isan-karazany'
  - type: note
    content: Ampit Mk 16.17-18, 20; Asa 5.12.
  - type: text
    content: ', mbamin’ireo fanomezan’ny Fanahy Masina izay nozarazarain’Andriamanitra araka ny sitrapony.'
  - type: heading
    content: Ilay mpitari-dalana ho amin’ny famonjena
  '5':
  - type: text
    content: Tsy teo ambany fahefàn’
  - type: text
    content: anjely
  - type: text
    content: ' tsy akory no nametrahan’Andriamanitra izao fiainan-ko avy lazainay izao. '
  '6':
  - type: text
    content: 'Fa ao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao, dia misy manambara manao hoe:'
  - type: text
    content: «Inona moa izay olombelona, Andriamanitra ô, no mba tsarovanao?
  - type: text
    content: Inona moa izay zanak’olombelona no mba ahînao?
  '7':
  - type: text
    content: Nataonao ambany noho ny anjely nandritra ny fotoana fohifohy izy;
  - type: text
    content: dia nosatrohanao voninahitra sy haja;
  '8':
  - type: text
    content: ary ny zavatra rehetra napetrakao eo ambany fahefàny
  - type: text
    content: sady nataonao eo ambany tongony
  - type: note
    content: 'And 6-8: Sal 8.5-7. –sy haja (and 7): misy stf sasany manampy hoe ary nampanjakainao amin’ireo asan’ny tananao (jereo Sal 8.7).'
  - type: text
    content: .»
  - type: text
    content: 'Raha voalaza fa «ny zavatra rehetra dia napetrak’Andriamanitra eo ambany fahefàn’ny olombelona», dia tsy nisy zavatra tsy napetrany eo ambany fahefàny. Kanefa ankehitriny dia mbola tsy hitantsika hoe napetraka eo ambany fahefàn’ny olombelona ny zavatra rehetra. '
  '9':
  - type: text
    content: 'Izao no hitantsika: natao ambany noho ny anjely nandritra ny fotoana fohifohy'
  - type: note
    content: 'ambany... fohifohy: misy mandika hoe ambany kely noho ny anjely, eto sy eo amin’ny and 7.'
  - type: text
    content: ' i Jesoa, mba ho faty ho an’ny olona rehetra noho ny fahasoavan’Andriamanitra; ary satria niaritra ny fahafatesana Izy, dia nosatrohan’Andriamanitra voninahitra sy haja. '
