    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ary nidera an’Andriamanitra, hany ka mamy hoditra tamin’ny vahoaka rehetra. Ary ny olona izay notarihin’ny Tompo ho amin’ny famonjena dia nataony nanatevin-daharana an-dry zareo isan’andro vaky.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’izay dia nisy Jiosy mpivavaka tsara, zanaka am-pielezana avy tamin’ny firenen-tsamihafa ambanin’ny lanitra, tafatoetra tao Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vao nanomboka ilay feo, dia nirohotra nanatona ny besinimaro sady sanganehana fatratra satria nandre ny mpino nampiasa ny fiteny manokana mahazatra azy mpihaino tsirairay avy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Talanjona sy gaga izy rehetra sady vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa tsy avy any Galilea
    - type: usfm
      marker: f
