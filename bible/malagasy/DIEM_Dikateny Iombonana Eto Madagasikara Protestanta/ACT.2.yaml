    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'namidiny ny taniny sy ny fananany ka ny vola azo dia nifampizaràny araka izay nilain’ny tsirairay. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Nazoto nihaona isan’andro izy rehetra: nivory tao an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ', niara-nisakafo tany an-tranony avy, nihinan-kanina tamin-karavoana sy fahatsoram-po, '
  '47':
