document_id: ACT.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampilatsahana ny Fanahy Masina
  - type: text
    content: 'Nony tonga ny andro '
  - type: text
    content: Pentekôsta
  - type: note
    content: Jereo Lev 23.15-21; Deot 16.9-11.
  - type: text
    content: ', dia tafangona teo amin’io efitrano io ihany ny mpino rehetra. '
  '10':
  - type: text
    content: 'Frijia sy Pamfilia; ao koa ny avy any Ejipta mbamin’ny faritanin’i Sirena any Libia; ary misy ny mpivahiny avy any Rôma; '
  '11':
  - type: text
    content: 'ao ny Jiosy, ary ao ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' mpanaraka ny fivavahana jiosy; mbola misy koa ny avy any Kreta sy Arabia; kanefa dia rentsika izy ireo milaza, amin’ny fitenintsika avy, ny zava-dehibe ataon’Andriamanitra?'
  '12':
  - type: text
    content: 'Talanjona sady very hevitra izy rehetra ka velon-dresaka hoe:'
  - type: text
    content: –Inona re no hevitr’izao?
  '13':
  - type: text
    content: 'Ny sasany anefa naneso ka nanao hoe:'
  - type: text
    content: –Mamon-divay vaovao ry zareo!
  - type: heading
    content: Ny lahatenin’i Petera
  '14':
  - type: text
    content: 'Fa nitsangana i Petera, niaraka tamin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' 11 lahy, ka nanandra-peo nandahatra tamin’ny vahoaka hoe:'
  - type: text
    content: '–Ry Jiosy mbamy ianareo rehetra tafatoetra eto Jerosalema, izao no aoka ho fantatrareo, ka henoy tsara ny teniko. '
  '15':
  - type: text
    content: 'Tsy mamo velively araka ny fieritreretanareo akory ireo olona ireo, satria vao amin’ny sivy maraina izao. '
  '16':
  - type: text
    content: 'Fa izay mitranga eto izao dia fahatanterahan’ilay voalazan’Andriamanitra tamin’ny alalan’i Joela '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  '17':
  - type: text
    content: '«Izao no ho tonga amin’ny andro farany, hoy Andriamanitra:'
  - type: text
    content: Handrotsahako ny Fanahiko ny olombelona rehetra;
  - type: text
    content: hilaza hafatra avy amiko
  - type: text
    content: ny zanakareo lahy aman-janakareo vavy,
  - type: text
    content: hisehoam-pahitana ny tanoranareo,
  - type: text
    content: ary hahazo tsindrimandry ny zokiolonareo.
  '18':
  - type: text
    content: Eny, amin’izany andro izany, dia samy handrotsahako ny Fanahiko
  - type: text
    content: ireo mpanompoko na lahy na vavy
  - type: text
    content: ka hilaza hafatra avy amiko izy rehetra.
  '19':
  - type: text
    content: Hampisehoako zava-mahatalanjona eny amin’ny habakabaka ambony
  - type: text
    content: 'ary famantarana etỳ amin’ny tany ambany:'
  - type: text
    content: hisy ra sy afo ary zavon-tsetroka,
  '2':
  - type: text
    content: 'Ary nisy feo avy tany an-danitra tonga tampoka tahaka ny rivo-mahery mifofofofo ka nanenika ny trano nitoerany. '
  '20':
  - type: text
    content: hiova ho haizina ny masoandro
  - type: text
    content: ary ny volana ho tonga mena tahaka ny ra
  - type: text
    content: alohan’ny higadonan’ny andro hiavian’ny Tompo,
  - type: text
    content: dia ilay andro lehibe sy mamirapiratra.
  '21':
  - type: text
    content: Ary izay rehetra hiantso ny anaran’ny Tompo dia ho voavonjy
  - type: note
    content: Jl 3.1-5, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '22':
  - type: text
    content: 'Ry vahoaka '
  - type: text
    content: israelita
  - type: text
    content: ', henoy izao teniko izao: I Jesoa avy any Nazareta'
  - type: note
    content: Ampit Mt 2.23; Lk 18.37.
  - type: text
    content: ' dia Lehilahy nankatoavin’Andriamanitra teo imasonareo, satria tamin’ny alalany no nanaovan’Andriamanitra asa mahagaga sy zava-mahatalanjona ary famantarana teo anivonareo, araka izay efa fantatrareo. '
  '23':
  - type: text
    content: Natolotra izany Lehilahy izany araka ny voatendrin’ny fikasan’Andriamanitra sy araka ny fandaharany hatrizay rahateo; ka ny namonoanareo Azy dia nohomboanareo tamin’ny hazofijaliana tamin’ny alalan’ny ratsy fanahy
  - type: note
    content: Jereo Mt 27.35; Mk 15.24; Lk 23.33; Jôh 19.18.
  - type: text
    content: '; '
  '24':
  - type: text
    content: nefa natsangan’Andriamanitra ho velona sy nafahany tamin’ny fatoran’ny fahafatesana, fa sanatria raha hahatana Azy ny fahafatesana
  - type: note
    content: Jereo Mt 28.5-6; Mk 16.6; Lk 24.5.
  - type: text
    content: '! '
  '25':
  - type: text
    content: 'Hoy manko i Davida ny aminy:'
  - type: text
    content: «Nahita ny Tompo mandrakariva teo anatrehako aho;
  - type: text
    content: noho Izy eo ankavanako dia tsy hangozohozo aho.
  '26':
  - type: text
    content: Izany no nahaheni-kafaliana ny foko
  - type: text
    content: ary nahaheni-karavoana ny teniko.
  - type: text
    content: Eny, na ity nofoko ity aza
  - type: text
    content: dia hitoetra amim-panantenana,
  '27':
  - type: text
    content: satria tsy hafoinao ho any amin’ny toeran’ny maty aho
  - type: text
    content: ary tsy havelanao ho tratry ny fahalòvana Ilay voatokana ho Anao.
  '28':
  - type: text
    content: Natoronao ahy ny lalana mitondra any amin’ny fiainana,
  - type: text
    content: hofenoinao hafaliana aho satria manatrika ahy Ianao
  - type: note
    content: Momba ny and 25-28, jereo Sal 16.8-11, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: .»
  '29':
  - type: text
    content: Ry havako, azoko lazaina mazava tsara ny amin’i Davida razambentsika
  - type: note
    content: 'razambe: ireo razana tena malaza teo amin’ny Jiosy, tahaka ny an-dry i Abrahama sy i Itsehàka ary i Jakôba izay nanaovan’Andriamanitra fanekempihavanana. Eto kosa dia i Davida mpanjaka; ary ao amin’ny Asa 7.8 dia ny zanak’i Jakôba mirahalahy. –efa maty izy ary nalevina...: jereo 1 Mp 2.10.'
  - type: text
    content: ': efa maty izy ary nalevina sady mbola eto amintsika mandraka androany ny fasany. '
  '3':
  - type: text
    content: 'Ary nisy lela maro mitarehin’afo niseho tamin’ny mpivory ka nizarazara nipetraka teny ambonin’ny tsirairay avy. '
  '30':
  - type: text
    content: Mpaminany izy ary nahalala fa Andriamanitra dia nianiana taminy nampanantena fa hisy anankiray amin’ny taranany hitsangana ho mpanjaka handimby azy
  - type: note
    content: Jereo Sal 132.11; 2 Sam 7.12-13.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Efa tsinjon’i Davida mialoha izay hitranga ka ilay '
  - type: text
    content: Mesia
  - type: text
    content: ' hitsangana ho velona no voalazany amin’ny hoe:'
  - type: text
    content: «Tsy nafoy ho any amin’ny toeran’ny maty Izy
  - type: text
    content: ary ny nofony tsy tratry ny fahalòvana!»
  '32':
  - type: text
    content: 'Iny Jesoa iny no natsangan’Andriamanitra ho velona ary vavolombelona manambara izany izahay rehetra. '
  '33':
  - type: text
    content: Nasandratra ho eo ankavanan’Andriamanitra
  - type: note
    content: 'Nasandratra ho eo ankavanan’Andriamanitra (jereo 110.1): dkt hafa nasandratry ny tanan-kavanan’Andriamanitra (jereo Sal 118.16).'
  - type: text
    content: ' Izy ka nandray avy tamin’ny Ray ny Fanahy Masina Izay nampanantenaina ary narotsany taminay izany araka izao hitanareo sy renareo izao. '
  '34':
  - type: text
    content: 'Satria i Davida tsy niakatra tany an-danitra fa ny tenany no milaza hoe:'
  - type: text
    content: «Ny Tompo Andriamanitra dia niteny hentitra
  - type: text
    content: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: text
    content: Mipetraha amin’ny sezafiandrianana eto ankavanako;
  '35':
  - type: text
    content: Izaho kosa hanao ny fahavalonao
  - type: text
    content: ho fitoeran-tongotrao
  - type: note
    content: Sal 110.1.
  - type: text
    content: '!»'
  '36':
  - type: text
    content: 'Noho izany, dia aoka ho fantatry ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' rehetra mazava tsara fa iny Jesoa nohomboanareo tamin’ny hazofijaliana iny indrindra no efa nataon’Andriamanitra ho Tompo sy Mesia.'
  '37':
  - type: text
    content: 'Raha nandre izany ny olona, dia voatsindrona tao am-pony ka nanontany an’i Petera sy ny apôstôly namany hoe:'
  - type: text
    content: –Ry havana, inona no tokony hataonay?
  '38':
  - type: text
    content: 'Dia hoy i Petera taminy:'
  - type: text
    content: –Ialao ny toe-dratsy
  - type: note
    content: 'Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', ary aoka ianareo samy hatao '
  - type: text
    content: batisa
  - type: text
    content: ' amin’ny anaran’i Jesoa Kristy mba ho voavela heloka, dia handray ny Fanahy Masina fanomezan’Andriamanitra. '
  '39':
  - type: text
    content: Fa ny fanomezana nampanantenain’Andriamanitra dia ho anareo sy ny zanakareo, ary ho an’ireo rehetra any lavitra any, na iza na iza hantsoin’ny Tompo Andriamanitsika hanatona Azy.
  '4':
  - type: text
    content: Dia feno Fanahy Masina avokoa izy rehetra ary niteny fiteny samihafa araka izay nampitenenan’ny Fanahy azy avy.
  '40':
  - type: text
    content: 'Mbola maro ny teny hafa nijoroan’i Petera ho vavolombelona ka nitaomany sy nananarany ny vahoaka hoe:'
  - type: text
    content: –Vonjeo ny tenanareo ka misaraha amin’ireto olona mpaniasia ireto!
  '41':
  - type: text
    content: Koa izay nandray tsara ny tenin’i Petera dia natao batisa; ary olona tokony ho telo arivo no nanatevin-daharana ny mpino tamin’izany andro izany.
  - type: heading
    content: Ny fiainan’ny mpino
  '42':
  - type: text
    content: Nazoto izy ireo nihaino ny fampianaran’ny apôstôly sy niombom-piainana toy ny mpiray tampo ary niara-nanao ny fiaraha-misakafo
  - type: note
    content: 'fiaraha-misakafo: mety ho sakafo tsotra fotsiny izany; mety ho Fanasan’ny Tompo na Eokaristia; mety koa ho sakafo tsotra arahina Fanasan’ny Tompo, na Fanasan’ny Tompo arahina sakafo tsotra.'
  - type: text
    content: ' sy namonjy ny fivavahana. '
  '43':
  - type: text
    content: 'Dia raiki-tahotra avokoa ny olona noho ny zava-mahagaga sy '
  - type: text
    content: famantarana
  - type: text
    content: ' maro vitan’ny '
  - type: text
    content: apôstôly
  - type: text
    content: '. '
  '44':
  - type: text
    content: Niray toerana ny mpino rehetra ary niombom-pananana
  - type: note
    content: Ampit 4.32-35.
  - type: text
    content: '; '
  '45':
  - type: text
    content: 'namidiny ny taniny sy ny fananany ka ny vola azo dia nifampizaràny araka izay nilain’ny tsirairay. '
  '46':
  - type: text
    content: 'Nazoto nihaona isan’andro izy rehetra: nivory tao an-'
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ', niara-nisakafo tany an-tranony avy, nihinan-kanina tamin-karavoana sy fahatsoram-po, '
  '47':
  - type: text
    content: ary nidera an’Andriamanitra, hany ka mamy hoditra tamin’ny vahoaka rehetra. Ary ny olona izay notarihin’ny Tompo ho amin’ny famonjena dia nataony nanatevin-daharana an-dry zareo isan’andro vaky.
  '5':
  - type: text
    content: 'Tamin’izay dia nisy Jiosy mpivavaka tsara, zanaka am-pielezana avy tamin’ny firenen-tsamihafa ambanin’ny lanitra, tafatoetra tao Jerosalema. '
  '6':
  - type: text
    content: 'Vao nanomboka ilay feo, dia nirohotra nanatona ny besinimaro sady sanganehana fatratra satria nandre ny mpino nampiasa ny fiteny manokana mahazatra azy mpihaino tsirairay avy. '
  '7':
  - type: text
    content: 'Talanjona sy gaga izy rehetra sady vaky vava hoe:'
  - type: text
    content: –Fa tsy avy any Galilea
  - type: note
    content: Ampit 1.11.
  - type: text
    content: ' avokoa ve ireo miteny ireo? '
  '8':
  - type: text
    content: 'Ka ahoana no andrenesantsika tsirairay avy ny fiteny manokana nahabe antsika? '
  '9':
  - type: text
    content: 'Misy amintsika avy any Partia, Media, Elama ary misy mponina any Mezôpôtamia; misy mponina eto Jodea; misy koa ny any Kapadôsia, Pônto, Azia, '
