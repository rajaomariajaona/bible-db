    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka ahoana no andrenesantsika tsirairay avy ny fiteny manokana nahabe antsika? '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Misy amintsika avy any Partia, Media, Elama ary misy mponina any Mezôpôtamia; misy mponina eto Jodea; misy koa ny any Kapadôsia, Pônto, Azia, '
