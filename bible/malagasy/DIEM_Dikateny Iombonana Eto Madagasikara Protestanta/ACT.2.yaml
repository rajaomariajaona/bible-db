document_id: ACT.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampilatsahana ny Fanahy Masina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony tonga ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentekôsta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 23.15-21; Deot 16.9-11.
      marker-yv: yv-n
    - type: text
      text: ', dia tafangona teo amin’io efitrano io ihany ny mpino rehetra. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Frijia sy Pamfilia; ao koa ny avy any Ejipta mbamin’ny faritanin’i Sirena any Libia; ary misy ny mpivahiny avy any Rôma; '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ao ny Jiosy, ary ao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' mpanaraka ny fivavahana jiosy; mbola misy koa ny avy any Kreta sy Arabia; kanefa dia rentsika izy ireo milaza, amin’ny fitenintsika avy, ny zava-dehibe ataon’Andriamanitra?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Talanjona sady very hevitra izy rehetra ka velon-dresaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona re no hevitr’izao?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny sasany anefa naneso ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mamon-divay vaovao ry zareo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lahatenin’i Petera
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa nitsangana i Petera, niaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' 11 lahy, ka nanandra-peo nandahatra tamin’ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Jiosy mbamy ianareo rehetra tafatoetra eto Jerosalema, izao no aoka ho fantatrareo, ka henoy tsara ny teniko. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tsy mamo velively araka ny fieritreretanareo akory ireo olona ireo, satria vao amin’ny sivy maraina izao. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izay mitranga eto izao dia fahatanterahan’ilay voalazan’Andriamanitra tamin’ny alalan’i Joela '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '«Izao no ho tonga amin’ny andro farany, hoy Andriamanitra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handrotsahako ny Fanahiko ny olombelona rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hilaza hafatra avy amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakareo lahy aman-janakareo vavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisehoam-pahitana ny tanoranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahazo tsindrimandry ny zokiolonareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eny, amin’izany andro izany, dia samy handrotsahako ny Fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo mpanompoko na lahy na vavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hilaza hafatra avy amiko izy rehetra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hampisehoako zava-mahatalanjona eny amin’ny habakabaka ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary famantarana etỳ amin’ny tany ambany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisy ra sy afo ary zavon-tsetroka,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy feo avy tany an-danitra tonga tampoka tahaka ny rivo-mahery mifofofofo ka nanenika ny trano nitoerany. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: hiova ho haizina ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny volana ho tonga mena tahaka ny ra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alohan’ny higadonan’ny andro hiavian’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay andro lehibe sy mamirapiratra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary izay rehetra hiantso ny anaran’ny Tompo dia ho voavonjy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jl 3.1-5, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ry vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: israelita
    - type: text
      text: ', henoy izao teniko izao: I Jesoa avy any Nazareta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 2.23; Lk 18.37.
      marker-yv: yv-n
    - type: text
      text: ' dia Lehilahy nankatoavin’Andriamanitra teo imasonareo, satria tamin’ny alalany no nanaovan’Andriamanitra asa mahagaga sy zava-mahatalanjona ary famantarana teo anivonareo, araka izay efa fantatrareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Natolotra izany Lehilahy izany araka ny voatendrin’ny fikasan’Andriamanitra sy araka ny fandaharany hatrizay rahateo; ka ny namonoanareo Azy dia nohomboanareo tamin’ny hazofijaliana tamin’ny alalan’ny ratsy fanahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 27.35; Mk 15.24; Lk 23.33; Jôh 19.18.
      marker-yv: yv-n
    - type: text
      text: '; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: nefa natsangan’Andriamanitra ho velona sy nafahany tamin’ny fatoran’ny fahafatesana, fa sanatria raha hahatana Azy ny fahafatesana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 28.5-6; Mk 16.6; Lk 24.5.
      marker-yv: yv-n
    - type: text
      text: '! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hoy manko i Davida ny aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nahita ny Tompo mandrakariva teo anatrehako aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho Izy eo ankavanako dia tsy hangozohozo aho.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Izany no nahaheni-kafaliana ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahaheni-karavoana ny teniko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na ity nofoko ity aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitoetra amim-panantenana,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: satria tsy hafoinao ho any amin’ny toeran’ny maty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy havelanao ho tratry ny fahalòvana Ilay voatokana ho Anao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Natoronao ahy ny lalana mitondra any amin’ny fiainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hofenoinao hafaliana aho satria manatrika ahy Ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 25-28, jereo Sal 16.8-11, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ry havako, azoko lazaina mazava tsara ny amin’i Davida razambentsika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'razambe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo razana tena malaza teo amin’ny Jiosy, tahaka ny an-dry i Abrahama sy i Itsehàka ary i Jakôba izay nanaovan’Andriamanitra fanekempihavanana. Eto kosa dia i Davida mpanjaka; ary ao amin’ny Asa 7.8 dia ny zanak’i Jakôba mirahalahy. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'efa maty izy ary nalevina...:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 1 Mp 2.10.'
      marker-yv: yv-n
    - type: text
      text: ': efa maty izy ary nalevina sady mbola eto amintsika mandraka androany ny fasany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy lela maro mitarehin’afo niseho tamin’ny mpivory ka nizarazara nipetraka teny ambonin’ny tsirairay avy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mpaminany izy ary nahalala fa Andriamanitra dia nianiana taminy nampanantena fa hisy anankiray amin’ny taranany hitsangana ho mpanjaka handimby azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 132.11; 2 Sam 7.12-13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Efa tsinjon’i Davida mialoha izay hitranga ka ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ' hitsangana ho velona no voalazany amin’ny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy nafoy ho any amin’ny toeran’ny maty Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny nofony tsy tratry ny fahalòvana!»
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Iny Jesoa iny no natsangan’Andriamanitra ho velona ary vavolombelona manambara izany izahay rehetra. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Nasandratra ho eo ankavanan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nasandratra ho eo ankavanan’Andriamanitra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(jereo 110.1): dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nasandratry ny tanan-kavanan’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo Sal 118.16).'
      marker-yv: yv-n
    - type: text
      text: ' Izy ka nandray avy tamin’ny Ray ny Fanahy Masina Izay nampanantenaina ary narotsany taminay izany araka izao hitanareo sy renareo izao. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Satria i Davida tsy niakatra tany an-danitra fa ny tenany no milaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny Tompo Andriamanitra dia niteny hentitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tamin’ny Mpanjaka Tompoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraha amin’ny sezafiandrianana eto ankavanako;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Izaho kosa hanao ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fitoeran-tongotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 110.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Noho izany, dia aoka ho fantatry ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' rehetra mazava tsara fa iny Jesoa nohomboanareo tamin’ny hazofijaliana iny indrindra no efa nataon’Andriamanitra ho Tompo sy Mesia.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Raha nandre izany ny olona, dia voatsindrona tao am-pony ka nanontany an’i Petera sy ny apôstôly namany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry havana, inona no tokony hataonay?
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ialao ny toe-dratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ialao ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ', ary aoka ianareo samy hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' amin’ny anaran’i Jesoa Kristy mba ho voavela heloka, dia handray ny Fanahy Masina fanomezan’Andriamanitra. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa ny fanomezana nampanantenain’Andriamanitra dia ho anareo sy ny zanakareo, ary ho an’ireo rehetra any lavitra any, na iza na iza hantsoin’ny Tompo Andriamanitsika hanatona Azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia feno Fanahy Masina avokoa izy rehetra ary niteny fiteny samihafa araka izay nampitenenan’ny Fanahy azy avy.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Mbola maro ny teny hafa nijoroan’i Petera ho vavolombelona ka nitaomany sy nananarany ny vahoaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vonjeo ny tenanareo ka misaraha amin’ireto olona mpaniasia ireto!
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Koa izay nandray tsara ny tenin’i Petera dia natao batisa; ary olona tokony ho telo arivo no nanatevin-daharana ny mpino tamin’izany andro izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiainan’ny mpino
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Nazoto izy ireo nihaino ny fampianaran’ny apôstôly sy niombom-piainana toy ny mpiray tampo ary niara-nanao ny fiaraha-misakafo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.42 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fiaraha-misakafo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety ho sakafo tsotra fotsiny izany; mety ho Fanasan’ny Tompo na Eokaristia; mety koa ho sakafo tsotra arahina Fanasan’ny Tompo, na Fanasan’ny Tompo arahina sakafo tsotra.
      marker-yv: yv-n
    - type: text
      text: ' sy namonjy ny fivavahana. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia raiki-tahotra avokoa ny olona noho ny zava-mahagaga sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' maro vitan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
