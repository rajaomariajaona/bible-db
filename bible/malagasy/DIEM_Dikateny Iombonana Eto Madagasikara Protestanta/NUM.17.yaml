document_id: NUM.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitaovana fandoroana zava-manitra fampiasan’ny mpomba an’i Kôra
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '10':
  - type: text
    content: –Mialà ianareo amin’io fiangonana io fa handringana azy indray mipi-maso Aho.
  - type: text
    content: 'Dia niankohoka tamin’ny tany izy roa lahy, '
  '11':
  - type: text
    content: 'ary hoy i Mosesy tamin’i Aharôna:'
  - type: text
    content: '–Raiso ny fitaovam-panembohana, dia asio vainafo avy amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' sy vovo-javamanitra ary mankanesa haingana eo amin’ny fiangonana ka manaova ny fombam-pivavahana hahazoany famelan-keloka. Fa efa nisafoaka ny fahatezeran’ny TOMPO ary efa miantomboka ny areti-mandringana.'
  '12':
  - type: text
    content: 'Noraisin’i Aharôna araka ny tenin’i Mosesy ny fitaovana fandoroana zava-manitra, dia nilomay nankeo afovoan’ny fiangonana izy; ary indro fa efa niantomboka tamin’ny vahoaka ny loza. Nandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' teo izy ka nanao ny fombam-pivavahana hahazoam-pamelan-keloka ho an’ny vahoaka. '
  '13':
  - type: text
    content: 'Nijoro teo anelanelan’ny maty sy ny velona izy, dia nitsahatra ny loza mandringana. '
  '14':
  - type: text
    content: Kanefa 14 700
  - type: note
    content: Ny hoe 14 700 dia mety mivaky hoe andiany 14 misy olona 700.
  - type: text
    content: 'no niharan-doza, afa-tsy ireo efa maty tamin’ny raharahan’i Kôra. '
  '15':
  - type: text
    content: Dia niverina teo amin’i Mosesy teo am-baravaran’ny Tranolay fihaonana i Aharôna, nony efa nitsahatra ny loza.
  - type: heading
    content: Ny tehin’i Aharôna
  '16':
  - type: text
    content: Niteny tamin’i Mosesy ny TOMPO
  - type: note
    content: Amin’ny dkt sasany, ny and 16-28 dia voalahatra 17.1-13. Jereo 17.1 sy nta.
  - type: text
    content: ' ka nanao hoe:'
  '17':
  - type: text
    content: '–Lazao ny Israelita mba hanolotra tehina iray ho anao isam-pokony avy, izany hoe hahazo tehina roambinifolo avy amin’ny filohan’ny foko rehetra ianao. Hosoratanao eo amin’ny tehiny avy ny anarany, '
  '18':
  - type: text
    content: 'afa-tsy ny an’ny fokon’i Levỳ izay hametrahanao ny anaran’i Aharôna, satria tehina iray ihany isaky ny filoham-poko. '
  '19':
  - type: text
    content: 'Hapetrakao ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ireo tehina ireo, eo anoloan’ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' itahirizana ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: ', dia ilay toerana ihaonako aminareo. '
  '2':
  - type: text
    content: '–Lazao i Elehazara mpisorona zanakalahin’i Aharôna mba hanala ny fitaovana fandoroana zava-manitra ao anaty forohona sy hanely lavitra ny vainafo satria zava-masina ireny fitaovana ireny. '
  '20':
  - type: text
    content: Hitsimoka ny tehin’ilay lehilahy hofidiko, koa dia hampanginiko ny fanakianan’ny Israelita anareo eo anatrehako.
  '21':
  - type: text
    content: 'Niteny tamin’ny Israelita i Mosesy, dia samy nanatitra tehina iray avy isam-poko ny filoha rehetra; koa dia nahazo tehina roambinifolo izy, ary ny tehin’i Aharôna dia teo afovoan’ny tehin’izy ireo. '
  '22':
  - type: text
    content: 'Napetrak’i Mosesy teo anatrehan’ny TOMPO tao amin’ny Tranolay nisy ny Vatamasina ireo tehina. '
  '23':
  - type: text
    content: 'Ny ampitso dia niditra tao amin’ny Tranolay i Mosesy, ka nahita fa ny tehin’i Aharôna izay anisan’ny fokon’i Levỳ dia nitsimoka sy namony ary namoa voankazo masaka. '
  '24':
  - type: text
    content: 'Nalain’i Mosesy teo anatrehan’ny TOMPO avokoa ny tehina ka nasehony tamin’ny Israelita rehetra. Nahita izany izy ireo ka samy naka ny tehiny avy. '
  '25':
  - type: text
    content: 'Dia hoy indray ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Avereno eo anoloan’ny Vatamasina ny tehin’i Aharôna; hotahirizina eo izany mba hampahatsiaro ny Israelita fa vahoaka mpiodina izy. Izany no hampitsaharanao ny fanakianany Ahy, dia tsy ho faty izy
  - type: note
    content: 'And 23-25: jereo Heb 9.4.'
  - type: text
    content: .
  '26':
  - type: text
    content: Dia notanterahin’i Mosesy araka izay nandidian’ny TOMPO hataony izany.
  - type: heading
    content: Ny anjara asan’ny mpisorona sy ny levita
  '27':
  - type: text
    content: 'Niteny tamin’i Mosesy ny Israelita ka nanao hoe:'
  - type: text
    content: '–Indro fa ho faty izahay, ho ringana izahay; eny, ho ringana avokoa izahay rehetra. '
  '28':
  - type: text
    content: Na zovy na zovy manakaiky ny Fonena-masin’ny TOMPO dia tsy maintsy maty! Koa ho faty tsy misy miangana avokoa va izahay rehetra?
  '3':
  - type: text
    content: 'Ny fitaovam-panembohan’ireo olona matin’ny fahotany ireo dia hatao takelaka manify handrakofana ny '
  - type: text
    content: alitara
  - type: note
    content: Ampit Eks 27.2.
  - type: text
    content: ', fa efa naterina teo anatrehako TOMPO ireny ka masina; ary dia ho marika fampitandremana ho an’ny Israelita izany.'
  '4':
  - type: text
    content: 'Nalain’i Elehazara mpisorona ny fitaovam-panembohana halimo izay an’ireo olona nodorana velona ireo, ka nofisahiny ho takelaka handrakofana ny alitara. '
  '5':
  - type: text
    content: Izany dia fahatsiarovana ho an’ny Israelita mba tsy ho olon-kafa ankoatra ny taranak’i Aharôna no hanatona handoro ny vovo-javamanitra eo anatrehan’ny TOMPO; izay sahy hanao izany dia hiharan’ny nanjo an’i Kôra sy ny namany, araka izay nambaran’ny TOMPO tamin’i Aharôna tamin’ny alalan’i Mosesy.
  - type: heading
    content: Nanakiana an’i Mosesy sy i Aharôna ny vahoaka
  '6':
  - type: text
    content: 'Nony maraina dia nanakiana an’i Mosesy sy i Aharôna ny fiangonana israelita manontolo ka nanao hoe:'
  - type: text
    content: –Ianareo no nahafaty ny vahoakan’ny TOMPO.
  '7':
  - type: text
    content: 'Nitangorona nanakiana an’i Mosesy sy i Aharôna ny fiangonana, fa izy roa lahy kosa nitodika nijery tany amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ka indro hitany nanarona azy ny rahona izay nisehoan’ny voninahitry ny TOMPO'
  - type: note
    content: Jereo Eks 13.21 sy nta.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dia nankeo anoloan’ny Tranolay fihaonana i Mosesy sy i Aharôna. '
  '9':
  - type: text
    content: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
