document_id: NUM.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitaovana fandoroana zava-manitra fampiasan’ny mpomba an’i Kôra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: –Mialà ianareo amin’io fiangonana io fa handringana azy indray mipi-maso Aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka tamin’ny tany izy roa lahy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary hoy i Mosesy tamin’i Aharôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raiso ny fitaovam-panembohana, dia asio vainafo avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' sy vovo-javamanitra ary mankanesa haingana eo amin’ny fiangonana ka manaova ny fombam-pivavahana hahazoany famelan-keloka. Fa efa nisafoaka ny fahatezeran’ny TOMPO ary efa miantomboka ny areti-mandringana.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Noraisin’i Aharôna araka ny tenin’i Mosesy ny fitaovana fandoroana zava-manitra, dia nilomay nankeo afovoan’ny fiangonana izy; ary indro fa efa niantomboka tamin’ny vahoaka ny loza. Nandoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' teo izy ka nanao ny fombam-pivavahana hahazoam-pamelan-keloka ho an’ny vahoaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nijoro teo anelanelan’ny maty sy ny velona izy, dia nitsahatra ny loza mandringana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Kanefa 14 700
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 14 700
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mety mivaky hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: andiany 14 misy olona 700
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'no niharan-doza, afa-tsy ireo efa maty tamin’ny raharahan’i Kôra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia niverina teo amin’i Mosesy teo am-baravaran’ny Tranolay fihaonana i Aharôna, nony efa nitsahatra ny loza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tehin’i Aharôna
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Niteny tamin’i Mosesy ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny dkt sasany, ny and 16-28 dia voalahatra 17.1-13. Jereo 17.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ka nanao hoe:'
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '–Lazao ny Israelita mba hanolotra tehina iray ho anao isam-pokony avy, izany hoe hahazo tehina roambinifolo avy amin’ny filohan’ny foko rehetra ianao. Hosoratanao eo amin’ny tehiny avy ny anarany, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'afa-tsy ny an’ny fokon’i Levỳ izay hametrahanao ny anaran’i Aharôna, satria tehina iray ihany isaky ny filoham-poko. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hapetrakao ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' ireo tehina ireo, eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: ' itahirizana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: raki-tsoratry ny fanekempihavanana
    - type: text
      text: ', dia ilay toerana ihaonako aminareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '–Lazao i Elehazara mpisorona zanakalahin’i Aharôna mba hanala ny fitaovana fandoroana zava-manitra ao anaty forohona sy hanely lavitra ny vainafo satria zava-masina ireny fitaovana ireny. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hitsimoka ny tehin’ilay lehilahy hofidiko, koa dia hampanginiko ny fanakianan’ny Israelita anareo eo anatrehako.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Niteny tamin’ny Israelita i Mosesy, dia samy nanatitra tehina iray avy isam-poko ny filoha rehetra; koa dia nahazo tehina roambinifolo izy, ary ny tehin’i Aharôna dia teo afovoan’ny tehin’izy ireo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Napetrak’i Mosesy teo anatrehan’ny TOMPO tao amin’ny Tranolay nisy ny Vatamasina ireo tehina. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ny ampitso dia niditra tao amin’ny Tranolay i Mosesy, ka nahita fa ny tehin’i Aharôna izay anisan’ny fokon’i Levỳ dia nitsimoka sy namony ary namoa voankazo masaka. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nalain’i Mosesy teo anatrehan’ny TOMPO avokoa ny tehina ka nasehony tamin’ny Israelita rehetra. Nahita izany izy ireo ka samy naka ny tehiny avy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy indray ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avereno eo anoloan’ny Vatamasina ny tehin’i Aharôna; hotahirizina eo izany mba hampahatsiaro ny Israelita fa vahoaka mpiodina izy. Izany no hampitsaharanao ny fanakianany Ahy, dia tsy ho faty izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 23-25:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Heb 9.4.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia notanterahin’i Mosesy araka izay nandidian’ny TOMPO hataony izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anjara asan’ny mpisorona sy ny levita
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Niteny tamin’i Mosesy ny Israelita ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indro fa ho faty izahay, ho ringana izahay; eny, ho ringana avokoa izahay rehetra. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Na zovy na zovy manakaiky ny Fonena-masin’ny TOMPO dia tsy maintsy maty! Koa ho faty tsy misy miangana avokoa va izahay rehetra?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny fitaovam-panembohan’ireo olona matin’ny fahotany ireo dia hatao takelaka manify handrakofana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 27.2.
      marker-yv: yv-n
    - type: text
      text: ', fa efa naterina teo anatrehako TOMPO ireny ka masina; ary dia ho marika fampitandremana ho an’ny Israelita izany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nalain’i Elehazara mpisorona ny fitaovam-panembohana halimo izay an’ireo olona nodorana velona ireo, ka nofisahiny ho takelaka handrakofana ny alitara. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izany dia fahatsiarovana ho an’ny Israelita mba tsy ho olon-kafa ankoatra ny taranak’i Aharôna no hanatona handoro ny vovo-javamanitra eo anatrehan’ny TOMPO; izay sahy hanao izany dia hiharan’ny nanjo an’i Kôra sy ny namany, araka izay nambaran’ny TOMPO tamin’i Aharôna tamin’ny alalan’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanakiana an’i Mosesy sy i Aharôna ny vahoaka
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony maraina dia nanakiana an’i Mosesy sy i Aharôna ny fiangonana israelita manontolo ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo no nahafaty ny vahoakan’ny TOMPO.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nitangorona nanakiana an’i Mosesy sy i Aharôna ny fiangonana, fa izy roa lahy kosa nitodika nijery tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', ka indro hitany nanarona azy ny rahona izay nisehoan’ny voninahitry ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 13.21 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nankeo anoloan’ny Tranolay fihaonana i Mosesy sy i Aharôna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niteny tamin’i Mosesy ny TOMPO ka nanao hoe:'
