document_id: ISA.60,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahazavana vaovao ho an’i Jerosalema
  - type: text
    content: Mitsangàna, ry Jerosalema ô, mamirapirata,
  - type: text
    content: 'satria tonga ny famirapiratanao:'
  - type: text
    content: ny voninahitry ny TOMPO no manazava anao
  - type: text
    content: toy ny masoandro miposaka.
  '10':
  - type: text
    content: Ny hafa firenena no hanamboatra indray ny mandanao,
  - type: text
    content: ary ny mpanjakany hanompo anao, hoy ny Tompo.
  - type: text
    content: Nikapoka anao Aho fony mbola tezitra
  - type: text
    content: fa mahafaly Ahy kosa ankehitriny
  - type: text
    content: ny haneho famindrampo aminao.
  '11':
  - type: text
    content: Hivoha hatrany ny vavahadinao
  - type: text
    content: ka tsy hakatona na andro na alina
  - type: text
    content: mba hampidirana hankao aminao
  - type: text
    content: ny fananan’ny firenen-kafa
  - type: note
    content: And voatsiahy ao amin’ny Apôk 21.25-26.
  - type: text
    content: sy ireo mpanjakany efa voababo.
  '12':
  - type: text
    content: Ho levona ny firenena sy fanjakana
  - type: text
    content: izay tsy mety hanompo anao;
  - type: text
    content: ho ringana tokoa ireny firenena ireny.
  '13':
  - type: text
    content: Ny voninahitry ny hazo rehetra any Libano,
  - type: text
    content: dia ny kipreso sy ny sapay ary ny bokso,
  - type: text
    content: no indray ho tonga ao aminao
  - type: text
    content: mba handravahana ny Toeramasiko.
  - type: text
    content: Izany no hanomezako voninahitra
  - type: text
    content: ny trano misy ny fitoeran-tongotro.
  '14':
  - type: text
    content: Hanatona hiondrika eo anatrehanao
  - type: text
    content: ireo olona nampahory anao,
  - type: text
    content: ary handohalika eo am-paladianao
  - type: text
    content: ireo rehetra naneso anao
  - type: note
    content: Ity andalana afovoany ity dia ampit Apôk 3.9.
  - type: text
    content: 'ka hiantso anao hoe: «Tanànan’ny TOMPO»'
  - type: text
    content: '«I '
  - type: text
    content: Tsiôna
  - type: text
    content: -n’ilay Masin’i Israely.»
  '15':
  - type: text
    content: Nafoy ianao teo ka tsy nisy tia anao
  - type: text
    content: na mba nandalo nijery anao akory,
  - type: text
    content: fa izao dia hataoko foto-pireharehana ianao
  - type: text
    content: ho an’ny taonjato mifanesisesy
  - type: text
    content: ary hataoko foto-pifaliana
  - type: text
    content: ho an’ny taranaka mifandimby.
  '16':
  - type: text
    content: Ny firenen-kafa sy ny mpanjakany
  - type: text
    content: no hamahana sy hamelona anao;
  - type: text
    content: ka ho fantatrao fa Izaho TOMPO no mpamonjy anao,
  - type: text
    content: Izaho ilay Maherin’i Jakôba no Mpanavotra anao.
  '17':
  - type: text
    content: Volamena no hoentiko ao aminao,
  - type: text
    content: volamena ho solon’ny halimo,
  - type: text
    content: ary volafotsy ho solon’ny vy;
  - type: text
    content: halimo no hoentiko ho solon’ny hazo,
  - type: text
    content: ary vy ho solon’ny vato.
  - type: text
    content: Satria ny fahefana amam-pitondrana haoriko ao aminao
  - type: text
    content: dia ny fiadanana sy ny fahamarinana no hiompanany.
  '18':
  - type: text
    content: Tsy ho re ao amin’ny taninao intsony ny fampahoriana
  - type: text
    content: na ao amin’ny faritaninao ny faharavana sy fahasimbana.
  - type: text
    content: 'Fa ny mandanao hantsoinao hoe: «Famonjena»;'
  - type: text
    content: 'ary ny vavahadinao hantsoinao hoe:'
  - type: text
    content: «Fiderana an’Andriamanitra.»
  '19':
  - type: text
    content: Tsy mba ny masoandro intsony
  - type: text
    content: no ho fanazavana anao amin’ny andro;
  - type: text
    content: tsy mba ny volana mangarangarana intsony
  - type: text
    content: no ho fanazavana anao amin’ny alina;
  - type: text
    content: fa Izaho TOMPO Andriamanitrao
  - type: text
    content: no ho fanazavana anao mandrakizay
  - type: text
    content: sy ho famirapiratanao.
  '2':
  - type: text
    content: Ny haizim-pito manarona ny tany,
  - type: text
    content: ary ny alina mandrakotra ireo firenena;
  - type: text
    content: fa ianao kosa no iposahan’ny TOMPO
  - type: text
    content: sady isehoan’ny voninahiny.
  '20':
  - type: text
    content: Tsy hilentika intsony toy ny masoandro
  - type: text
    content: ny fanazavana anao amin’ny andro,
  - type: text
    content: tsy hisoka intsony toy ny volana
  - type: text
    content: ny fanazavana anao amin’ny alina
  - type: text
    content: satria Izaho TOMPO mihitsy
  - type: text
    content: no ho fanazavana anao mandrakizay
  - type: note
    content: 'And 19-20: ampit Apôk 21.23; 22.5.'
  - type: text
    content: ;
  - type: text
    content: ka hifarana hatreo ny andro fisaonanao.
  '21':
  - type: text
    content: Ny vahoakanao rehetra hanjary olo-marina
  - type: text
    content: ka hanana ny tany ho fananany mandrakizay.
  - type: text
    content: Noforonin’ny tanako haneho ny famirapiratako izy
  - type: text
    content: ka ho toy ny voly mandrobona eo amin’ny sahako.
  '22':
  - type: text
    content: Ny fianakaviana kely indrindra ho tonga olona arivo,
  - type: text
    content: ary ny fianakaviana osa indrindra hanjary firenena mahery.
  - type: text
    content: Izaho TOMPO mihitsy no hanafaingana izany
  - type: text
    content: amin’ny fotoana tokony hahatongavany.
  '3':
  - type: text
    content: Ireo firenena hanatona ny fahazavanao
  - type: text
    content: ary ny mpanjaka ho voasariky ny famirapiratana
  - type: text
    content: izay vao miposaka eo aminao.
  '4':
  - type: text
    content: 'Topazo maso ny manodidina anao ka jereo:'
  - type: text
    content: Indreny izy rehetra fa mivory hankeo aminao.
  - type: text
    content: Ny zanakao lahy dia tonga avy lavitra,
  - type: text
    content: ary ny zanakao vavy kosa trotroina.
  '5':
  - type: text
    content: Ho miramirana ianao hahita izany
  - type: text
    content: ka ho tohina mafy sy hibita-kafaliana ny fonao,
  - type: text
    content: fa ny haren’ny ranomasina hoentina eo aminao
  - type: text
    content: ary ny fananan’ny firenen-kafa hatolotra anao.
  '6':
  - type: text
    content: Rameva maro no handrakotra ny taninao,
  - type: text
    content: dia andian-drameva avy any Midiana sy Hefà;
  - type: text
    content: tonga koa ny olona rehetra avy any Sabà.
  - type: text
    content: 'Volamena sy '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' no hoentiny'
  - type: note
    content: 'Hefà: fianakaviambe anankiray ao anatin’ny foko arabo atao hoe Midianita. –Sabà: toa faritra ao atsimon’i Arabia; jereo Jer 6.20; Sal 72.15. –volamena sy ditin-kazo manitra: jereo Mt 2.11.'
  - type: text
    content: ary ny fiderana ny TOMPO no hafatra soa hambarany.
  '7':
  - type: text
    content: Hangonina ao aminao avokoa
  - type: text
    content: ny ondry aman’osin’ny Kedarita,
  - type: text
    content: ary haroso amin’ny fanompoam-pivavahanao
  - type: text
    content: ny ondrilahin’ny Nebaiôta
  - type: note
    content: 'Kedarita: foko iray any amin’ny taniefitr’i Arabia. –Nebaiôta: antokon’olona arabo hafa koa.'
  - type: text
    content: ;
  - type: text
    content: 'hakarina eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ireny'
  - type: text
    content: ho sorona ankasitrahin’ny Tompo.
  - type: text
    content: Dia izany no hampamirapiratany
  - type: text
    content: an’ilay tempoly itoeran’ny famirapiratany.
  '8':
  - type: text
    content: Iza àry ireto olona ireto? Manidina toy ny rahona
  - type: text
    content: na toy ny voromahailala mody any an-tranony ireto?
  '9':
  - type: text
    content: Sambo avy any amin’ny nosy lavitra any ireo
  - type: text
    content: no mitangorona tarihin’ny sambo vaventy.
  - type: text
    content: Avy lavitra tokoa no nitondrany ny zanakao
  - type: text
    content: 'miaraka amin’ny volafotsy sy ny volamenany:'
  - type: text
    content: tonga izy hankalaza ny TOMPO Andriamanitrao,
  - type: text
    content: dia ilay Masin’i Israely Izay nampamirapiratra anao.
