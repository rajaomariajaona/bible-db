document_id: ISA.60,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahazavana vaovao ho an’i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mitsangàna, ry Jerosalema ô, mamirapirata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'satria tonga ny famirapiratanao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny voninahitry ny TOMPO no manazava anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny masoandro miposaka.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny hafa firenena no hanamboatra indray ny mandanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanjakany hanompo anao, hoy ny Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nikapoka anao Aho fony mbola tezitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahafaly Ahy kosa ankehitriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny haneho famindrampo aminao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hivoha hatrany ny vavahadinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hakatona na andro na alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampidirana hankao aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fananan’ny firenen-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And voatsiahy ao amin’ny Apôk 21.25-26.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo mpanjakany efa voababo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ho levona ny firenena sy fanjakana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy mety hanompo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho ringana tokoa ireny firenena ireny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny voninahitry ny hazo rehetra any Libano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny kipreso sy ny sapay ary ny bokso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no indray ho tonga ao aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handravahana ny Toeramasiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hanomezako voninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny trano misy ny fitoeran-tongotro.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hanatona hiondrika eo anatrehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona nampahory anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handohalika eo am-paladianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo rehetra naneso anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity andalana afovoany ity dia ampit Apôk 3.9.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hiantso anao hoe: «Tanànan’ny TOMPO»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: -n’ilay Masin’i Israely.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nafoy ianao teo ka tsy nisy tia anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mba nandalo nijery anao akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izao dia hataoko foto-pireharehana ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny taonjato mifanesisesy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko foto-pifaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny taranaka mifandimby.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny firenen-kafa sy ny mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hamahana sy hamelona anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantatrao fa Izaho TOMPO no mpamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho ilay Maherin’i Jakôba no Mpanavotra anao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Volamena no hoentiko ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: volamena ho solon’ny halimo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary volafotsy ho solon’ny vy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halimo no hoentiko ho solon’ny hazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary vy ho solon’ny vato.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny fahefana amam-pitondrana haoriko ao aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fiadanana sy ny fahamarinana no hiompanany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy ho re ao amin’ny taninao intsony ny fampahoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ao amin’ny faritaninao ny faharavana sy fahasimbana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ny mandanao hantsoinao hoe: «Famonjena»;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary ny vavahadinao hantsoinao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fiderana an’Andriamanitra.»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy mba ny masoandro intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho fanazavana anao amin’ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba ny volana mangarangarana intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho fanazavana anao amin’ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho TOMPO Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho fanazavana anao mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho famirapiratanao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny haizim-pito manarona ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny alina mandrakotra ireo firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ianao kosa no iposahan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady isehoan’ny voninahiny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tsy hilentika intsony toy ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanazavana anao amin’ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hisoka intsony toy ny volana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanazavana anao amin’ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izaho TOMPO mihitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho fanazavana anao mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.20 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 19-20:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Apôk 21.23; 22.5.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hifarana hatreo ny andro fisaonanao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny vahoakanao rehetra hanjary olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanana ny tany ho fananany mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noforonin’ny tanako haneho ny famirapiratako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho toy ny voly mandrobona eo amin’ny sahako.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny fianakaviana kely indrindra ho tonga olona arivo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fianakaviana osa indrindra hanjary firenena mahery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO mihitsy no hanafaingana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fotoana tokony hahatongavany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ireo firenena hanatona ny fahazavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpanjaka ho voasariky ny famirapiratana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay vao miposaka eo aminao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Topazo maso ny manodidina anao ka jereo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreny izy rehetra fa mivory hankeo aminao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanakao lahy dia tonga avy lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zanakao vavy kosa trotroina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ho miramirana ianao hahita izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tohina mafy sy hibita-kafaliana ny fonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny haren’ny ranomasina hoentina eo aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fananan’ny firenen-kafa hatolotra anao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rameva maro no handrakotra ny taninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia andian-drameva avy any Midiana sy Hefà;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga koa ny olona rehetra avy any Sabà.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Volamena sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' no hoentiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hefà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fianakaviambe anankiray ao anatin’ny foko arabo atao hoe Midianita. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sabà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa faritra ao atsimon’i Arabia; jereo Jer 6.20; Sal 72.15. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'volamena sy ditin-kazo manitra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Mt 2.11.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fiderana ny TOMPO no hafatra soa hambarany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hangonina ao aminao avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ondry aman’osin’ny Kedarita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary haroso amin’ny fanompoam-pivavahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ondrilahin’ny Nebaiôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kedarita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: foko iray any amin’ny taniefitr’i Arabia. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nebaiôta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: antokon’olona arabo hafa koa.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hakarina eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' ireny'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho sorona ankasitrahin’ny Tompo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izany no hampamirapiratany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an’ilay tempoly itoeran’ny famirapiratany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Iza àry ireto olona ireto? Manidina toy ny rahona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny voromahailala mody any an-tranony ireto?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sambo avy any amin’ny nosy lavitra any ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mitangorona tarihin’ny sambo vaventy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy lavitra tokoa no nitondrany ny zanakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'miaraka amin’ny volafotsy sy ny volamenany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga izy hankalaza ny TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay Masin’i Israely Izay nampamirapiratra anao.
