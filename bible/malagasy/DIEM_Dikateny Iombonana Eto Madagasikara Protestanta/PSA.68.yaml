document_id: PSA.68,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Salamo fiderana mba handraisana an’Andriamanitra mpandresy
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida. Tononkira.
  '10':
  - type: text
    content: Ranonoram-pitahiana no narotsakao
  - type: text
    content: ka velombelona terỳ ilay taninao lany hery.
  '11':
  - type: text
    content: Tao ny vahoakanao no niorim-ponenana,
  - type: text
    content: fa izany no namboarinao ho an’ny ory
  - type: text
    content: satria tsara fo Ianao, Andriamanitra ô.
  '12':
  - type: text
    content: Injao ny Tompo mandefa hafatra,
  - type: text
    content: ka dia zavon-tany ny vehivavy
  - type: text
    content: mitondra ny vaovao manao hoe
  - type: note
    content: Ampit Eks 15.20-21; 1 Sam 18.6-7.
  - type: text
    content: ':'
  '13':
  - type: text
    content: «Samy vaky nandositra avokoa
  - type: text
    content: na mpanjaka na tafika fahavalo.
  - type: text
    content: Ireo vehivavy tavela tao an-trano
  - type: text
    content: dia mizarazara ny zavatra voababo.
  '14':
  - type: text
    content: Na ianareo tsy mba niady aza
  - type: text
    content: fa nijanona niandry valan’ondry,
  - type: text
    content: dia ho tahaka ny voromahailala
  - type: text
    content: misy elany mirava-bolafotsy
  - type: text
    content: sy volony mirava-bolamena tsara.
  '15':
  - type: text
    content: Fony Andriamanitra Tsitoha
  - type: text
    content: nanaparitaka ireo mpanjaka teo,
  - type: text
    content: dia ilay tendrombohitra hoe Salmôna
  - type: note
    content: Jereo Mpits 5.
  - type: text
    content: no indro nilatsahan’ny oram-panala.»
  '16':
  - type: text
    content: 'Ny vohitr’i '
  - type: text
    content: Basàna
  - type: text
    content: ' dia vohitra mideza;'
  - type: text
    content: vohi-maro tendro ny vohitr’i Basàna.
  '17':
  - type: text
    content: Kanefa nahoana, ry vohi-maro tendro,
  - type: text
    content: no ialonanao ilay vohitra voafidy,
  - type: text
    content: voafidin’Andriamanitra mba honenany?
  - type: text
    content: Eny, hitoetra ao mandrakizay ny TOMPO!
  '18':
  - type: text
    content: Kalesy an’arivony aman’alina
  - type: text
    content: ireo kalesin’ny Tompo Andriamanitra;
  - type: text
    content: ka avy any an-tendrombohitra Sinay
  - type: note
    content: Ampit Deot 33.2.
  - type: text
    content: ' Izy'
  - type: text
    content: 'no mankao amin’ilay '
  - type: text
    content: Toeramasina
  - type: text
    content: .
  '19':
  - type: text
    content: Nitondra babo Ianao
  - type: text
    content: no niakatra eny an-kavoana;
  - type: text
    content: nandraisanao fanomezana ny olombelona
  - type: note
    content: 'Ny hoe an-kavoana lazaina eto dia ny lanitra any ambony (jereo Ef 4.8a) na ny tendrombohitra Tsiôna* tao Jerosalema (jereo Sal 47.6; Is 33.5). –nandraisanao...olombelona: ampit Ef 4.8b.'
  - type: text
    content: na dia ireo mpikomy taminao koa aza
  - type: text
    content: mba honenanao eo, ry TOMPO Andriamanitra.
  '2':
  - type: text
    content: Hirotsaka hamely anie Andriamanitra
  - type: text
    content: ka ny fahavalony dia hiparitaka,
  - type: text
    content: ny mpankahala handositra lavitra Azy!
  '20':
  - type: text
    content: Hisaorana isan’andro isan’andro anie ny Tompo,
  - type: text
    content: ilay Andriamanitra mpamonjy miahy antsika!
  - type: text
    content: Fiatoana
  '21':
  - type: text
    content: Andriamanitra mahavonjy ilay Andriamanitsika.
  - type: text
    content: Eny, ilay ANDRIANANAHARY Tompo no afa-manala,
  - type: text
    content: afa-manala antsika amin’ny fahafatesana.
  '22':
  - type: text
    content: Ny lohan’ny fahavalony kosa montsaniny,
  - type: text
    content: dia ireo lava volo mirehaka amin’ny ratsy.
  '23':
  - type: text
    content: 'Hoy ny Tompo hoe:'
  - type: text
    content: '«Ireo fahavalonao any '
  - type: text
    content: Basàna
  - type: text
    content: ' hampodîko,'
  - type: text
    content: ny any an-kibon-dranomasina koa hampodîko,
  '24':
  - type: text
    content: ka ny tongotrao no hanosihosy ny rany
  - type: text
    content: ary hilelaka amin’izany koa ny alikanao
  - type: note
    content: Ampit Sal 58,11; 2 Mp 9.36.
  - type: text
    content: .»
  '25':
  - type: text
    content: Ry ilay Andriamanitro Mpanjakako ô,
  - type: text
    content: marevaka ny dianao ho any an-
  - type: text
    content: Toeramasina
  - type: text
    content: .
  '26':
  - type: text
    content: Ny mpihira no indreo fa lohalalana,
  - type: text
    content: ny mpitendry valiha no vodilalana;
  - type: text
    content: ny eo anelanelan’izy roa tonta
  - type: text
    content: dia ny tovovavy mively langoroana.
  '27':
  - type: text
    content: Misaora an’Andriamanitra, ry vahoakany tafangona;
  - type: text
    content: misaora Azy TOMPO, ry terak’i Israely.
  '28':
  - type: text
    content: I Benjamîna, ilay foko bitika indrindra no eo aloha;
  - type: text
    content: dia ny andrian’i Joda izay mareva-pitafiana,
  - type: text
    content: avy eo indray dia ny andrian’i Zebolòna,
  - type: text
    content: ary ny an’i Naftalỳ no manaraka an’ireo.
  '29':
  - type: text
    content: Ry Andriamanitra ô, omeo baiko ny herinao
  - type: text
    content: ka hamafiso hatrany izay efa vitanao ho anay,
  '3':
  - type: text
    content: Toy ny fielin’ny setroka no aoka ho fieliny;
  - type: text
    content: tahaka ny savoka mitsonika amin’ny afo
  - type: text
    content: no aoka hahalevona ny olon-dratsy
  - type: text
    content: eo anatrehan’Andriamanitra!
  '30':
  - type: text
    content: avy ao amin’ny tempolinao any Jerosalema
  - type: text
    content: izay itondran’ireo mpanjaka fanatitra ho Anao.
  '31':
  - type: text
    content: Rahòny i Ejipta, ilay biby anaty bararata;
  - type: text
    content: 'rahòny ilay andian’ombilahy, dia ireo mpifehy vahoaka:'
  - type: text
    content: aoka ireo hikoy hitondra volafotsy ho Anao;
  - type: text
    content: ataovy mihahaka kosa ireo vahoaka liana ady.
  '32':
  - type: text
    content: Ho avy aminao ny andriandahin’i Ejipta;
  - type: text
    content: hananty tanana aminao ny Etiôpianina.
  '33':
  - type: text
    content: Ianareo fanjakana eto an-tany,
  - type: text
    content: mihirà ho fanajana an’Andriamanitra;
  - type: text
    content: miredòna salamo ho an’ny Tompo,
  - type: text
    content: Fiatoana
  '34':
  - type: text
    content: Ilay toa mitaingina kalesy
  - type: text
    content: eo an-tampon’ny lanitra fahagola.
  - type: text
    content: Injao Izy mamoaka ny feony,
  - type: text
    content: dia feo midoboka mahery
  - type: note
    content: Jereo Sal 29.3. Ny kotro-baratra no lazaina hoe feon’ny Tompo.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Koa ekeo fa an’Andriamanitra ny hery:'
  - type: text
    content: mifehy an’i Israely ny fiandrianany
  - type: text
    content: ary miery ao anaty rahona ny heriny.
  '36':
  - type: text
    content: Mampitolagaga tokoa Andriamanitra
  - type: text
    content: 'miseho avy ao amin’ilay '
  - type: text
    content: Toeramasiny
  - type: text
    content: .
  - type: text
    content: Izy no Andriamanitr’i Israely,
  - type: text
    content: manome hery sy tanjaka ny vahoakany.
  - type: text
    content: Hisaorana anie Andriamanitra!
  '4':
  - type: text
    content: Ny olo-marina kosa anie hifaly sy hiravo
  - type: text
    content: ary dia hibita-kafaliana eo anoloany!
  '5':
  - type: text
    content: Mihirà ho fanajana an’Andriamanitra,
  - type: text
    content: mankalazà ny anarany amin’ny salamo
  - type: text
    content: mba hanoman-dalana ho fandraisana
  - type: text
    content: an’ilay mpitaingin-drahona ho kalesy.
  - type: text
    content: Ny Tompo no anarany
  - type: text
    content: ka mifalia eo anoloany
  - type: note
    content: Jereo Sal 68.34; Deot 33.26; Is 19.1; Sal 18.10.
  - type: text
    content: .
  '6':
  - type: text
    content: Andriamanitra ao an-
  - type: text
    content: Toeramasiny
  - type: text
    content: no ilay Ray miahy ny kamboty
  - type: text
    content: sy manome rariny ny mpitondratena.
  '7':
  - type: text
    content: Ny manirery omeny ankohonana,
  - type: text
    content: ny voagadra avoakany ho afaka.
  - type: text
    content: Ny mpikomy ihany no hitoetra
  - type: text
    content: any amin’ny tany karankaina.
  '8':
  - type: text
    content: Andriamanitra ô, fony Ianao niainga
  - type: text
    content: mba hialoha ny vahoakanao
  - type: text
    content: ka namakivaky izany taniefitra,
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: dia nihovotrovotra ny tany
  - type: note
    content: Jereo Eks 19.18.
  - type: text
    content: ','
  - type: text
    content: nanorana koa ny habakabaka
  - type: text
    content: teo anoloanao, ry Andriamanitr’i Sinay,
  - type: text
    content: teo anoloanao, ry Andriamanitr’i Israely.
