  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny taratasy voalohany avy amin’i Petera dia nalefany ho an’ireo kristianina niparitaka tany amin’ny faritany dimy tao Azia Minôra (izany hoe i Torkia any Azia, ankehitriny), tapany avaratra sy atsinanana. Ny Fiangonana misy an’ireo kristianina ireo dia naorin’i Paoly na ny mpiara-miasa taminy. Ny mpandefa ity taratasy ity kosa dia toa manoratra avy any Rôma, izay tondroiny amin’ny anarana hoe «Babilôna» (1 Pt 5.13). Ny zavatra fohapohaziny momba azy ireo dia mampiseho fa esoin’ny mpiara-monina mbola tsy mpino ireo kristianina ireo sady ampangainy ho mpanao ratsy isan-karazany ary efa mananontanona mihitsy aza ny fanenjehana mahery vaika. Noho izany, dia miezaka hampahery azy ireo i Petera apôstôly, ka mampifantoka ny mason’ireo kristianina ireo amin’ny tenan’i Jesoa Kristy Izay iombonany fijaliana ankehitriny.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Fiarahabana (1.1-2) arahin’ny vavaka fiderana (1.3-12) no isantaran’i Petera ity taratasy ity. Ampahatsiahivin’i Petera ao amin’io vavaka fiderana io ny fomba namonjen’Andriamanitra ireo mpino ireo sy ny nanomezany azy fanantenana mafy orina ao amin’i Jesoa Kristy maty sy nitsangan-ko velona. Avy eo dia ampirisihin’i Petera izy ireo mba hiambina sy hanana toe-piainana masina, satria efa miombona amin’i Kristy (1.13–2.10). Ny ohatra nomen’i Kristy no manentana azy ireo, ka ny fitondrantenany sy ny fomba fiatrehany fitsapana dia tsy maintsy mampiseho ny firaketam-pony amin’i Kristy. Araka izany no anomezan’i Petera torohevitra hampiharina amin’ny fiainana: adidy amin’ny maha olom-pirenena; fifandraisan’ny mpanompo amin’ny tompony; andraikitry ny mpivady; fifampitondran’ny samy iray fiangonana: fihetsika manoloana ireo tsy mpino (2.11–4.19). Ao amin’ny toko faha-5 dia mbola misy hafatra vitsivitsy aroson’i Petera ho an’ireo loholona (na mpiandraikitra fiangonana), ho an’ireo tanora, ho an’ny sarambaben’ny kristianina: aoka izy rehetra samy hahery fo sy hanam-paharetana eo anivon’ny fijaliana, ka hiantehitra tanteraka amin’ireo fampanantenàn’Andriamanitra! Teny famangiana vitsivitsy no mamarana ny taratasy.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Manainga ireo mpamaky na ireo mpihaino azy i Petera mba haharitra amin’ny finoana na dia eo aza ny zava-manahirana. Izany dia noho izy ireo tsy maintsy mijoro ho vavolombelona eo anivon’izao tontolo izao: ny fiainan’ny kristianina sy ny fitondrantenany dia tsy maintsy «mitory ny asa lehibe vitan’Andriamanitra» (2.9), mba hitaona ireo mbola tsy kristianina «hahita ny asa tsara ataony sy hanome voninahitra an’Andriamanitra amin’ny andro hiavian’i Kristy» (2.12).'
