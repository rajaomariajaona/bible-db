document_id: NUM.35,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo tanàna levitîka
  - type: text
    content: 'Tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao ihany, no nitenenan’ny TOMPO tamin’i Mosesy mba hamepetra ny Israelita hoe:'
  '10':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '–Rehefa tafita an’i Jôrdàna ka tafiditra amin’ny tany Kanahàna ianareo, '
  '11':
  - type: text
    content: dia hifidy tanàna izay hataonareo tanàna fialokalofana, mba hialokalofan’izay nahafaty olona tsy nahy
  - type: note
    content: Ampit Deot 4.41-43; 19.1-13; Jos 20.1-9.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ireo tanàna ireo no ho fialokalofana mba hahafahanareo mandositra ny mpamaly faty
  - type: note
    content: Araka ny Eks 21.23-25; Lev 24.19-21; Deot 19.21. Ny fahafatesan’ny olona iray dia miantso ny fahafatesan’izay nahafaty azy; noho izany ny havana akaikin’ilay niharam-boina dia nanana adidy hamaly faty ny maty amin’ny famonoana ilay mpamono.
  - type: text
    content: '; ka tsy ho faty izay nahafaty olona alohan’ny hisehoany fitsarana eo anatrehan’ny fiangonana. '
  '13':
  - type: text
    content: 'Hisy tanàna enina havahanareo ho fialokalofana, '
  '14':
  - type: text
    content: 'ny telo etỳ an-dafy atsinanan’i Jôrdàna ary ny telo hafa ao amin’ny tany Kanahàna: ho tanàna fialokalofana ireo. '
  '15':
  - type: text
    content: Ny olona rehetra, na Israelita izy na vahiny miara-monina amin’ny Israelita ka nahafaty olona tsy nahy, dia afaka mialokaloka amin’ireo tanàna enina ireo.
  '16':
  - type: text
    content: '«Raha vy no namelezana ka nahafaty olona, dia mpandatsaka aina izay manao izany ka hatao maty. '
  '17':
  - type: text
    content: 'Raha vato no namelezana ka nahafaty olona, dia mpandatsaka aina izay nanao izany ka hatao maty. '
  '18':
  - type: text
    content: 'Raha hazo no namelezana ka nahafaty olona, dia mpandatsaka aina izay nanao izany ka hatao maty. '
  '19':
  - type: text
    content: 'Ny mpamaly faty no hamono hahafaty ny mpandatsaka aina, raha vao mahita azy izy. '
  '2':
  - type: text
    content: '–Aoka ianareo hanome tanàna eo amin’ny zara tany fanananareo avy ho an’ny '
  - type: text
    content: Levita
  - type: text
    content: ' mba honenany'
  - type: note
    content: Ampit Lev 25.32-34; Jos 21.1-42; 1 Tan 6.34-66.
  - type: text
    content: '. Homenareo azy koa ny tany manodidina hiandrasany ny bibiny. '
  '20':
  - type: text
    content: 'Raha fankahalana no nandonana olona na koa lolom-po no nitorahana azy ka nahafaty azy, '
  '21':
  - type: text
    content: na filana ady no namelezana totohondry olona ka nahafaty azy, dia hatao maty ilay mpamely satria mpandatsaka aina; ny mpamaly faty no hamono hahafaty ny mpandatsaka aina, vantany vao tafahaona aminy.
  '22':
  - type: text
    content: '«Kanefa mety tsy nahy na tsy filana ady no nandonana olona; mety tsy lolom-po no nitorahana zavatra azy; '
  '23':
  - type: text
    content: 'mety misy sendra manjera vato ka nahafaty olona tsy nahy, saingy tsy fahavalon’io olona io izy sady tsy nitady handratra azy. '
  '24':
  - type: text
    content: 'Amin’izay, dia hotsarain’ny fiangonana araka izany lalàna izany ny mpamely sy ny mpamaly faty. '
  '25':
  - type: text
    content: Harovan’ny fiangonana amin’ny mpamaly faty ilay nahafaty olona, ka hateriny indray any amin’ny tanàna izay nialokalofany.
  - type: text
    content: '«Hitoetra ao amin’io tanàna fialokalofany io ilay nahafaty olona tsy nahy mandra-pahafatin’ny mpisorombe izay voahosotra tamin’ny diloilo masina. '
  '26':
  - type: text
    content: 'Fa raha mivoaka ho ao ivelan’ny tanàna fialokalofana kosa izy, '
  '27':
  - type: text
    content: 'ka hitan’ny mpamaly faty, dia azon’io vonoina ho faty; ary tsy meloka ny mpamaly faty amin’izany, '
  '28':
  - type: text
    content: satria ilay nahafaty olona tsy nahy dia tokony ho nitoetra tao amin’ny tanàna fialokalofany mandra-pahafatin’ny mpisorombe; fa rehefa maty kosa io, dia mahazo mody any amin’ny zara tany fananany ihany ilay nahafaty olona tsy nahy.
  '29':
  - type: text
    content: «Izany fomba fanao izany dia hampiharinareo hatrany, na aiza na aiza honenanareo.
  '3':
  - type: text
    content: 'Ny tanàna dia ho azy mba honenany, fa ny tany kosa ho an’ny biby fiompiny sy ny fitaovany ary ny bibiny hafa rehetra. '
  '30':
  - type: text
    content: «Raha misy namono nahafaty olona, dia tsy azo helohina ho faty izy raha tsy noho ny filàzan’ny vavolombelona maro. Tsy hisy fanamelohana ho faty noho ny filàzan’ny vavolombelona tokana
  - type: note
    content: Jereo Deot 17.6; 19.15; Mt 18.16; 2Kôr 13.1; 1Tim 5.19; Heb 10.28.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Tsy handray kolikoly ianareo mba hanavotana ny ain’izay nahafaty olona ka meloka tokony ho faty; eny, hatao maty tokoa izy. '
  '32':
  - type: text
    content: Tsy handray kolikoly koa ianareo mba hamelana azy handositra any amin’ny tanàna fialokalofana na hamelana azy hiverina any amin’ny taniny alohan’ny hahafatesan’ny mpisorombe.
  '33':
  - type: text
    content: '«Aza mandoto ny tany onenanareo, fa ny famonoana olona dia fandotoana ny tany. Ary raha misy olona voalatsa-dra, ny tany dia tsy '
  - type: text
    content: hadio
  - type: text
    content: ' raha tsy maty ny mpandatsa-dra. '
  '34':
  - type: text
    content: Aza mandoto ny tany izay honenanareo sady honenako eo afovoanareo koa, fa Izaho no TOMPO Izay mitoetra eo anivon’ny Israelita.»
  '4':
  - type: text
    content: 'Koa ny tany manodidina ny tanàna izay homenareo ny Levita dia dimanjato metatra miala avy eo amin’ny rindrin’ny tanàna amin’ny lafiny efatra. '
  '5':
  - type: text
    content: 'Handrefy faritra efamira ivelan’ny tanàna ianareo ka arivo metatra ny lafiny atsinanana, arivo metatra ny lafiny atsimo, arivo metatra ny lafiny andrefana ary arivo metatra ny lafiny avaratra; dia ho eo anivon’io faritra io ny tanàna. Izany no ho tanin’ny Levita manodidina ny tanàna. '
  '6':
  - type: text
    content: Ny tanàna homenareo ny Levita dia ny tanàna enina fialokalofana, izay hataonareo fandosiran’izay nahafaty olona
  - type: note
    content: Jereo 35.9-34.
  - type: text
    content: ', ary tanàna hafa 42 ihany koa. '
  '7':
  - type: text
    content: 'Ka ny fitambaran’ny tanàna rehetra izay homenareo ny Levita dia 48, miaraka amin’ny tany manodidina hiandrasany ny bibiny. '
  '8':
  - type: text
    content: Ary momba ireo tanàna izay halainareo avy amin’ny tanin’ny Israelita, dia izay foko lehibe no hanalanareo maro kokoa, fa izay foko kely kosa dia hanalanareo vitsy kokoa; eny, samy hanome tanàna ho an’ny Levita araka ny zara tany azony avy ny foko tsirairay.
  - type: heading
    content: Ny tanàna fialokalofana
  '9':
  - type: text
    content: 'Niteny tamin’i Mosesy indray ny TOMPO '
