document_id: NUM.35,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo tanàna levitîka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tao amin’ny lemak’i Môaba, teo amoron’i Jôrdàna tandrifin’i Jerikao ihany, no nitenenan’ny TOMPO tamin’i Mosesy mba hamepetra ny Israelita hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'mba hamepetra ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rehefa tafita an’i Jôrdàna ka tafiditra amin’ny tany Kanahàna ianareo, '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: dia hifidy tanàna izay hataonareo tanàna fialokalofana, mba hialokalofan’izay nahafaty olona tsy nahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Deot 4.41-43; 19.1-13; Jos 20.1-9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ireo tanàna ireo no ho fialokalofana mba hahafahanareo mandositra ny mpamaly faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ny Eks 21.23-25; Lev 24.19-21; Deot 19.21. Ny fahafatesan’ny olona iray dia miantso ny fahafatesan’izay nahafaty azy; noho izany ny havana akaikin’ilay niharam-boina dia nanana adidy hamaly faty ny maty amin’ny famonoana ilay mpamono.
      marker-yv: yv-n
    - type: text
      text: '; ka tsy ho faty izay nahafaty olona alohan’ny hisehoany fitsarana eo anatrehan’ny fiangonana. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hisy tanàna enina havahanareo ho fialokalofana, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny telo etỳ an-dafy atsinanan’i Jôrdàna ary ny telo hafa ao amin’ny tany Kanahàna: ho tanàna fialokalofana ireo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny olona rehetra, na Israelita izy na vahiny miara-monina amin’ny Israelita ka nahafaty olona tsy nahy, dia afaka mialokaloka amin’ireo tanàna enina ireo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Raha vy no namelezana ka nahafaty olona, dia mpandatsaka aina izay manao izany ka hatao maty. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha vato no namelezana ka nahafaty olona, dia mpandatsaka aina izay nanao izany ka hatao maty. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Raha hazo no namelezana ka nahafaty olona, dia mpandatsaka aina izay nanao izany ka hatao maty. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny mpamaly faty no hamono hahafaty ny mpandatsaka aina, raha vao mahita azy izy. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '–Aoka ianareo hanome tanàna eo amin’ny zara tany fanananareo avy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' mba honenany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lev 25.32-34; Jos 21.1-42; 1 Tan 6.34-66.
      marker-yv: yv-n
    - type: text
      text: '. Homenareo azy koa ny tany manodidina hiandrasany ny bibiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Raha fankahalana no nandonana olona na koa lolom-po no nitorahana azy ka nahafaty azy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: na filana ady no namelezana totohondry olona ka nahafaty azy, dia hatao maty ilay mpamely satria mpandatsaka aina; ny mpamaly faty no hamono hahafaty ny mpandatsaka aina, vantany vao tafahaona aminy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '«Kanefa mety tsy nahy na tsy filana ady no nandonana olona; mety tsy lolom-po no nitorahana zavatra azy; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'mety misy sendra manjera vato ka nahafaty olona tsy nahy, saingy tsy fahavalon’io olona io izy sady tsy nitady handratra azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Amin’izay, dia hotsarain’ny fiangonana araka izany lalàna izany ny mpamely sy ny mpamaly faty. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Harovan’ny fiangonana amin’ny mpamaly faty ilay nahafaty olona, ka hateriny indray any amin’ny tanàna izay nialokalofany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hitoetra ao amin’io tanàna fialokalofany io ilay nahafaty olona tsy nahy mandra-pahafatin’ny mpisorombe izay voahosotra tamin’ny diloilo masina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa raha mivoaka ho ao ivelan’ny tanàna fialokalofana kosa izy, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ka hitan’ny mpamaly faty, dia azon’io vonoina ho faty; ary tsy meloka ny mpamaly faty amin’izany, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: satria ilay nahafaty olona tsy nahy dia tokony ho nitoetra tao amin’ny tanàna fialokalofany mandra-pahafatin’ny mpisorombe; fa rehefa maty kosa io, dia mahazo mody any amin’ny zara tany fananany ihany ilay nahafaty olona tsy nahy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: «Izany fomba fanao izany dia hampiharinareo hatrany, na aiza na aiza honenanareo.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny tanàna dia ho azy mba honenany, fa ny tany kosa ho an’ny biby fiompiny sy ny fitaovany ary ny bibiny hafa rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: «Raha misy namono nahafaty olona, dia tsy azo helohina ho faty izy raha tsy noho ny filàzan’ny vavolombelona maro. Tsy hisy fanamelohana ho faty noho ny filàzan’ny vavolombelona tokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 17.6; 19.15; Mt 18.16; 2Kôr 13.1; 1Tim 5.19; Heb 10.28.
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tsy handray kolikoly ianareo mba hanavotana ny ain’izay nahafaty olona ka meloka tokony ho faty; eny, hatao maty tokoa izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Tsy handray kolikoly koa ianareo mba hamelana azy handositra any amin’ny tanàna fialokalofana na hamelana azy hiverina any amin’ny taniny alohan’ny hahafatesan’ny mpisorombe.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '«Aza mandoto ny tany onenanareo, fa ny famonoana olona dia fandotoana ny tany. Ary raha misy olona voalatsa-dra, ny tany dia tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hadio
    - type: text
      text: ' raha tsy maty ny mpandatsa-dra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Aza mandoto ny tany izay honenanareo sady honenako eo afovoanareo koa, fa Izaho no TOMPO Izay mitoetra eo anivon’ny Israelita.»
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa ny tany manodidina ny tanàna izay homenareo ny Levita dia dimanjato metatra miala avy eo amin’ny rindrin’ny tanàna amin’ny lafiny efatra. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Handrefy faritra efamira ivelan’ny tanàna ianareo ka arivo metatra ny lafiny atsinanana, arivo metatra ny lafiny atsimo, arivo metatra ny lafiny andrefana ary arivo metatra ny lafiny avaratra; dia ho eo anivon’io faritra io ny tanàna. Izany no ho tanin’ny Levita manodidina ny tanàna. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tanàna homenareo ny Levita dia ny tanàna enina fialokalofana, izay hataonareo fandosiran’izay nahafaty olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 35.9-34.
      marker-yv: yv-n
    - type: text
      text: ', ary tanàna hafa 42 ihany koa. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ka ny fitambaran’ny tanàna rehetra izay homenareo ny Levita dia 48, miaraka amin’ny tany manodidina hiandrasany ny bibiny. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary momba ireo tanàna izay halainareo avy amin’ny tanin’ny Israelita, dia izay foko lehibe no hanalanareo maro kokoa, fa izay foko kely kosa dia hanalanareo vitsy kokoa; eny, samy hanome tanàna ho an’ny Levita araka ny zara tany azony avy ny foko tsirairay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tanàna fialokalofana
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Niteny tamin’i Mosesy indray ny TOMPO '
