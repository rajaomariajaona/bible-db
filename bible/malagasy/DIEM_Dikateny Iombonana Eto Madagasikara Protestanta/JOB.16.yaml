document_id: JOB.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valintenin’i Jôba: manana vavolombelona any an-danitra aho'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Misanasana vava handrahona ahy ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamely tehamaina sady manevateva ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa miara-mioko hamely ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Efa natolotr’Andriamanitra amin’ny tsivalahara aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary navelany ho eo an-tanan’ny olon-dratsy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tonga nanakotaba ahy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’iny aho nilamina tsara iny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noraisiny tamin’ny hatoko aho ka naronjiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nataony lasibatry ny zana-tsipîkany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Misavoana manodidina ahy hatraiza hatraiza ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trobarany tsy ananany antra ny voako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mifafy amin’ny tany ny ranon’aferoko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ratra miampy ratra no afitsony ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny mpiady mahery no iantsampazany amiko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanjaitra lamba fisaonana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanaronako ny hoditro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahosiko tanaty vovoka ny handriko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny tavako efa tera-menan’ny fitomaniana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary alo-pahafatesana no teo amin’ny masoko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanefa tsy voaloton-kerisetra ny tanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fivavahako dia madio hatrany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ry tany ô, miraraka ny rako ka aza rakofanao izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka ho re hatraiza hatraiza ny fitarainako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny ra latsaka amin’ny vonoan’olona dia miantso valifaty amin’Andriamanitra raha mbola tsy voarako-tany. Ampit Gen 4.10; Ezek 24.7-8.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dieny izao dia misy vavolombeloko any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny sehatra ambony any misy mpiaro ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôb 19.25.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Kabary efa mankaleo ahy izany reko izany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mpampionona mahasorena ianareo rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ianareo izay manontany ahy hoe:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Na dia mihomehy ahy aza ny namako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tomany kosa no ijereko an’Andriamanitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Enga anie ilay mpiaro ahy no hanelanelana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tenako olombelona sy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny fanaon’ny olona samy olona etỳ an-tany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hanelanelana anie izy, fa miserana ny taona vitsy iainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hizotra ny lalana ho amin’ny varo-tsy mifody aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: «Hifarana rahoviana izany teny foana izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa inona no manesika anao hamaly toy izany?»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Afaka hiteny tahaka anareo koa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha ianareo no mba teo amin’ny toerako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanaovako kabary tsara lahatra ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanifikifi-doha ho fangorahana anareo aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hiteny aho hankaherezako anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fampiononana lazaiko no hampitonena.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Kanefa na dia miteny aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mihamaivana ny fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na dia mangina koa aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misinda akory izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ankehitriny dia nandreraka ahy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa naringany avokoa ny ankohonako rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ireo ketrona nataony amiko no vavolombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahiazako no miampanga sy manameloka ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Am-pahavinirana no amiraviran’Andriamanitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao haza lambo ahy Izy sy mikitro-nify amiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mivandravandra miseho ho fahavaloko.
