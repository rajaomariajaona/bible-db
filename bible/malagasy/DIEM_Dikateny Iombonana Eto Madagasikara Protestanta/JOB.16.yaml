document_id: JOB.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba: manana vavolombelona any an-danitra aho'
  - type: text
    content: 'Dia namaly i Jôba ka nanao hoe:'
  '10':
  - type: text
    content: Misanasana vava handrahona ahy ny olona,
  - type: text
    content: ka mamely tehamaina sady manevateva ahy
  - type: text
    content: ary koa miara-mioko hamely ahy.
  '11':
  - type: text
    content: Efa natolotr’Andriamanitra amin’ny tsivalahara aho
  - type: text
    content: ary navelany ho eo an-tanan’ny olon-dratsy.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Tonga nanakotaba ahy Andriamanitra,
  - type: text
    content: tamin’iny aho nilamina tsara iny;
  - type: text
    content: noraisiny tamin’ny hatoko aho ka naronjiny
  - type: text
    content: ary nataony lasibatry ny zana-tsipîkany.
  '13':
  - type: text
    content: Misavoana manodidina ahy hatraiza hatraiza ireny.
  - type: text
    content: Trobarany tsy ananany antra ny voako;
  - type: text
    content: ka mifafy amin’ny tany ny ranon’aferoko.
  '14':
  - type: text
    content: Ratra miampy ratra no afitsony ahy
  - type: text
    content: ary toy ny mpiady mahery no iantsampazany amiko.
  '15':
  - type: text
    content: Nanjaitra lamba fisaonana aho,
  - type: text
    content: mba hanaronako ny hoditro;
  - type: text
    content: ary nahosiko tanaty vovoka ny handriko.
  '16':
  - type: text
    content: Ny tavako efa tera-menan’ny fitomaniana;
  - type: text
    content: ary alo-pahafatesana no teo amin’ny masoko.
  '17':
  - type: text
    content: Kanefa tsy voaloton-kerisetra ny tanako;
  - type: text
    content: ary ny fivavahako dia madio hatrany.
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Ry tany ô, miraraka ny rako ka aza rakofanao izany,
  - type: text
    content: fa aoka ho re hatraiza hatraiza ny fitarainako
  - type: note
    content: Ny ra latsaka amin’ny vonoan’olona dia miantso valifaty amin’Andriamanitra raha mbola tsy voarako-tany. Ampit Gen 4.10; Ezek 24.7-8.
  - type: text
    content: .
  '19':
  - type: text
    content: Dieny izao dia misy vavolombeloko any an-
  - type: text
    content: danitra
  - type: text
    content: ;
  - type: text
    content: ary any amin’ny sehatra ambony any misy mpiaro ahy
  - type: note
    content: Ampit Jôb 19.25.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Kabary efa mankaleo ahy izany reko izany:'
  - type: text
    content: mpampionona mahasorena ianareo rehetra,
  - type: text
    content: 'dia ianareo izay manontany ahy hoe:'
  '20':
  - type: text
    content: Na dia mihomehy ahy aza ny namako
  - type: text
    content: dia tomany kosa no ijereko an’Andriamanitra.
  '21':
  - type: text
    content: Enga anie ilay mpiaro ahy no hanelanelana
  - type: text
    content: ny tenako olombelona sy Andriamanitra,
  - type: text
    content: toy ny fanaon’ny olona samy olona etỳ an-tany.
  '22':
  - type: text
    content: Hanelanelana anie izy, fa miserana ny taona vitsy iainako;
  - type: text
    content: ary hizotra ny lalana ho amin’ny varo-tsy mifody aho.
  '3':
  - type: text
    content: «Hifarana rahoviana izany teny foana izany?
  - type: text
    content: Sa inona no manesika anao hamaly toy izany?»
  '4':
  - type: text
    content: Afaka hiteny tahaka anareo koa aho,
  - type: text
    content: raha ianareo no mba teo amin’ny toerako.
  - type: text
    content: Hanaovako kabary tsara lahatra ianareo
  - type: text
    content: ary hanifikifi-doha ho fangorahana anareo aho.
  '5':
  - type: text
    content: Hiteny aho hankaherezako anareo,
  - type: text
    content: fa ny fampiononana lazaiko no hampitonena.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: Kanefa na dia miteny aza aho,
  - type: text
    content: dia tsy mihamaivana ny fahoriako;
  - type: text
    content: ary na dia mangina koa aza aho,
  - type: text
    content: dia tsy misinda akory izany.
  '7':
  - type: text
    content: Ankehitriny dia nandreraka ahy Andriamanitra,
  - type: text
    content: fa naringany avokoa ny ankohonako rehetra.
  '8':
  - type: text
    content: Ireo ketrona nataony amiko no vavolombelona,
  - type: text
    content: ary ny fahiazako no miampanga sy manameloka ahy.
  '9':
  - type: text
    content: Am-pahavinirana no amiraviran’Andriamanitra ahy;
  - type: text
    content: manao haza lambo ahy Izy sy mikitro-nify amiko.
  - type: text
    content: ary mivandravandra miseho ho fahavaloko.
