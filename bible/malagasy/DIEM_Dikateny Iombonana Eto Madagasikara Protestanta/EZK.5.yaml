document_id: EZK.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hofaizin’ny Tompo i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny Tompo tamiko: «Makà sabatra maranitra ianao, ry ilay taranak’olombelona, ka ampiasao ho toy ny hareza izany. Kikiso ny volondohanao sy ny volombavanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'kikiso ny volondohanao sy ny volombavanao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpigadra no harezaina (jereo Is 7.20). Koa io fihetsika io dia manambara amin’ny mponina ao Jerosalema fa hoentina ho babo izy.
    marker-yv: yv-n
  - type: text
    text: ', dia lanjao izay voaharatrao ary tsinjarao telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rehefa tapitra ny fotoanan’ny fahirano, dia hodoranao amin’ny afo harehitrao eo afovoan-tanàna ny ampahatelony. Ny ampahatelony hafa kosa hotetitetehinao amin’ny sabatra manodidina ny tanàna. Ary ny ampahatelony sisa haelinao eny amin’ny rivotra, ka Izaho no hanatsoaka sabatra hoenti-manenjika azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Kanefa hakanao ampahany kely ireo volo ireo ka hafeninao anaty paosin’akanjonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hanalanao singam-bolo vitsivitsy amin’izany mba hatorakao ao anaty afo ka hodoranao: ireny no hamelona afo hanatratra ny vahoakan’i Israely rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Izaho Tompo ANDRIANANAHARY dia manambara hoe: «Izany no hanjo an’i Jerosalema izay tanàna napetrako eo anivon’ny hafa firenena sy voahodidin’ny tanin’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy nankatò ny fitsipiko aman-dalàko anefa ny mponin’i Jerosalema fa nanao ratsy mihoatra noho ireo hafa firenena nifanila taminy ary mihoatra noho ireo tany nanodidina azy. Eny, nolaviny ny fitsipiko ary tsy narahiny ny lalànako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa Izaho Tompo ANDRIANANAHARY no manambara aminy hoe: Nikomy tamiko mihoatra noho ireo firenena manodidina anareo ianareo. Tsy nitondra tena araka ny lalànako ianareo ary tsy nanatanteraka ny fitsipiko, fa nanaraka ny an’ireo hafa firenena manodidina anareo aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa hamafisiko indray fa Izaho Tompo ANDRIANANAHARY mihitsy no hamely anareo, ry mponin’i Jerosalema. Hampihariko eo afovoan-tanàna ho hitan’ny hafa firenena ny didim-pitsarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataoko aminareo izay tsy mbola nataoko mihitsy sady tsy hataoko intsony any aoriana, satria maharikoriko ny fanompoan-tsampy rehetra vitanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa ny ray aman-dreny hihinana ny zanany ary ny zanaka kosa hihinana ny ray aman-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Azo raisina ara-bakiteny ny hoe mihinana ny zanany eto: mafy loatra ny mosary ka tonga hohanina mbamin’ny nofon’ny olona aza; misy kosa mihevitra fa sarin’ny fifandrotehan’ny mpihavana akaiky no resahina eto (jereo Mik 7.6; Mt 10.35-36 sy ny toko mirazotra aminy).'
    marker-yv: yv-n
  - type: text
    text: . Hampihariko ny didim-pitsarako momba anareo, ka haeliko amin’ny vazan-tany rehetra izay sisa tavela eo aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Eny, velona Izaho Tompo ANDRIANANAHARY ka manao izao teny hentitra izao: Holevoniko tsy misy indrafo na fiantrana ianareo, satria nolotoinareo tamin’ny fanaonareo mahatsiravina sy ny sampinareo maharikoriko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo toko 6 sy 8.
    marker-yv: yv-n
  - type: text
    text: ' ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliko
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny ampahatelonareo ho fatin’ny areti-mandringana sy mosary ao an-tanàna; ny ampahatelo ho fatin’ny sabatra eny manodidina; ary ny ampahatelo haeliko any amin’ny vazan-tany rehetra ka hanatsoaka sabatra Aho hoenti-manenjika azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hampihariko hatramin’ny farany ny fahatezerako ary hanaranako fo ny fahavinirako ka hampariko aminareo ny valifatiko. Amin’izay dia ho fantatrareo fa Izaho TOMPO no niteny izany taminareo satria tsy zakako ny fivadihanareo, ka nampihariko taminareo hatramin’ny farany ny fahavinirako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny mponin’ireo tany manodidina sy ireo mpandalo rehetra dia hahita fa nataoko tanàna lao sy fandatsa i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hampihariko ny didim-pitsarana hamelezana io tanàna io amim-pahatezerana sy amim-pahavinirana ary amim-panakianana mivaivay. Amin’izay ny hafa firenena manodidina azy dia hanao azy ho fandatsa sy ho fihomehezana ary koa ho fampitandremana sy ho fampitahorana. Izaho TOMPO no miteny izany aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Hampijaliako amin’ny mosary ianareo mba haharingana anareo. Hampahory anareo tahaka ny zana-tsipîka mahafaty izany. Hosimbàko ny tahiri-mofonareo ka ho faty mosary ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny mosary sy ny biby masiaka izay halefako hamely anareo no hahafaty ny zanakareo; ny areti-mandringana sy ny herisetra dia handroso eo aminareo ary ny ady kosa hataoko mihatra aminareo. Izaho TOMPO no miteny izany aminareo.»
