document_id: EZK.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hofaizin’ny Tompo i Israely
  - type: text
    content: 'Hoy ny Tompo tamiko: «Makà sabatra maranitra ianao, ry ilay taranak’olombelona, ka ampiasao ho toy ny hareza izany. Kikiso ny volondohanao sy ny volombavanao'
  - type: note
    content: 'kikiso ny volondohanao sy ny volombavanao: ny mpigadra no harezaina (jereo Is 7.20). Koa io fihetsika io dia manambara amin’ny mponina ao Jerosalema fa hoentina ho babo izy.'
  - type: text
    content: ', dia lanjao izay voaharatrao ary tsinjarao telo. '
  '10':
  - type: text
    content: Koa ny ray aman-dreny hihinana ny zanany ary ny zanaka kosa hihinana ny ray aman-dreniny
  - type: note
    content: 'Azo raisina ara-bakiteny ny hoe mihinana ny zanany eto: mafy loatra ny mosary ka tonga hohanina mbamin’ny nofon’ny olona aza; misy kosa mihevitra fa sarin’ny fifandrotehan’ny mpihavana akaiky no resahina eto (jereo Mik 7.6; Mt 10.35-36 sy ny toko mirazotra aminy).'
  - type: text
    content: . Hampihariko ny didim-pitsarako momba anareo, ka haeliko amin’ny vazan-tany rehetra izay sisa tavela eo aminareo.
  '11':
  - type: text
    content: '«Eny, velona Izaho Tompo ANDRIANANAHARY ka manao izao teny hentitra izao: Holevoniko tsy misy indrafo na fiantrana ianareo, satria nolotoinareo tamin’ny fanaonareo mahatsiravina sy ny sampinareo maharikoriko'
  - type: note
    content: Jereo toko 6 sy 8.
  - type: text
    content: ' ny '
  - type: text
    content: tempoliko
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ny ampahatelonareo ho fatin’ny areti-mandringana sy mosary ao an-tanàna; ny ampahatelo ho fatin’ny sabatra eny manodidina; ary ny ampahatelo haeliko any amin’ny vazan-tany rehetra ka hanatsoaka sabatra Aho hoenti-manenjika azy. '
  '13':
  - type: text
    content: 'Hampihariko hatramin’ny farany ny fahatezerako ary hanaranako fo ny fahavinirako ka hampariko aminareo ny valifatiko. Amin’izay dia ho fantatrareo fa Izaho TOMPO no niteny izany taminareo satria tsy zakako ny fivadihanareo, ka nampihariko taminareo hatramin’ny farany ny fahavinirako. '
  '14':
  - type: text
    content: 'Ny mponin’ireo tany manodidina sy ireo mpandalo rehetra dia hahita fa nataoko tanàna lao sy fandatsa i Jerosalema. '
  '15':
  - type: text
    content: Hampihariko ny didim-pitsarana hamelezana io tanàna io amim-pahatezerana sy amim-pahavinirana ary amim-panakianana mivaivay. Amin’izay ny hafa firenena manodidina azy dia hanao azy ho fandatsa sy ho fihomehezana ary koa ho fampitandremana sy ho fampitahorana. Izaho TOMPO no miteny izany aminareo.
  '16':
  - type: text
    content: '«Hampijaliako amin’ny mosary ianareo mba haharingana anareo. Hampahory anareo tahaka ny zana-tsipîka mahafaty izany. Hosimbàko ny tahiri-mofonareo ka ho faty mosary ianareo. '
  '17':
  - type: text
    content: Ny mosary sy ny biby masiaka izay halefako hamely anareo no hahafaty ny zanakareo; ny areti-mandringana sy ny herisetra dia handroso eo aminareo ary ny ady kosa hataoko mihatra aminareo. Izaho TOMPO no miteny izany aminareo.»
  '2':
  - type: text
    content: Rehefa tapitra ny fotoanan’ny fahirano, dia hodoranao amin’ny afo harehitrao eo afovoan-tanàna ny ampahatelony. Ny ampahatelony hafa kosa hotetitetehinao amin’ny sabatra manodidina ny tanàna. Ary ny ampahatelony sisa haelinao eny amin’ny rivotra, ka Izaho no hanatsoaka sabatra hoenti-manenjika azy.
  '3':
  - type: text
    content: '«Kanefa hakanao ampahany kely ireo volo ireo ka hafeninao anaty paosin’akanjonao. '
  '4':
  - type: text
    content: 'Hanalanao singam-bolo vitsivitsy amin’izany mba hatorakao ao anaty afo ka hodoranao: ireny no hamelona afo hanatratra ny vahoakan’i Israely rehetra.'
  '5':
  - type: text
    content: '«Izaho Tompo ANDRIANANAHARY dia manambara hoe: «Izany no hanjo an’i Jerosalema izay tanàna napetrako eo anivon’ny hafa firenena sy voahodidin’ny tanin’ireo. '
  '6':
  - type: text
    content: 'Tsy nankatò ny fitsipiko aman-dalàko anefa ny mponin’i Jerosalema fa nanao ratsy mihoatra noho ireo hafa firenena nifanila taminy ary mihoatra noho ireo tany nanodidina azy. Eny, nolaviny ny fitsipiko ary tsy narahiny ny lalànako. '
  '7':
  - type: text
    content: 'Koa Izaho Tompo ANDRIANANAHARY no manambara aminy hoe: Nikomy tamiko mihoatra noho ireo firenena manodidina anareo ianareo. Tsy nitondra tena araka ny lalànako ianareo ary tsy nanatanteraka ny fitsipiko, fa nanaraka ny an’ireo hafa firenena manodidina anareo aza. '
  '8':
  - type: text
    content: 'Koa hamafisiko indray fa Izaho Tompo ANDRIANANAHARY mihitsy no hamely anareo, ry mponin’i Jerosalema. Hampihariko eo afovoan-tanàna ho hitan’ny hafa firenena ny didim-pitsarako. '
  '9':
  - type: text
    content: 'Hataoko aminareo izay tsy mbola nataoko mihitsy sady tsy hataoko intsony any aoriana, satria maharikoriko ny fanompoan-tsampy rehetra vitanareo. '
