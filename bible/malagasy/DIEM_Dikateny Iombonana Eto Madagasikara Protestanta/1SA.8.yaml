document_id: 1SA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Israelita mangataka mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa antitra i Samoela, dia ireo zanany no nataony ho mpanapaka ny vahoaka Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I Jôela no anaran-janany lahimatoa ary i Abià no anaran’ny zandriny; tany Beèra-Sèba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Beèra-Sèba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna tokony ho 70 km ao atsimo andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' izy ireo no nanao ny asa maha mpitondra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nefa izy roa lahy tsy mba nanahaka izay nataon-drainy, fa nanjary tia vola ka nandray tsolotra sy namilivily ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany, dia nivory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' israelita rehetra, ka nankany amin’i Samoela any Ramà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ramà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro, efa antitra ianao izao, ry Samoela, nefa ny zanakao tsy mba nanahaka anao, koa anendreo mpanjaka izahay hitondra anay, tahaka ny an’ny firenen-kafa rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 17.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tsy nahafaly an’i Samoela izany nangatahan’izy ireo mpanjaka ho azy izany; koa dia nivavaka tamin’ny TOMPO izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa hoy ny TOMPO tamin’i Samoela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ekeo ny fangatahan’ny vahoaka amin’izay rehetra lazainy aminao; satria tsy ianao akory no laviny, fa Izaho mihitsy no tsy tiany ho mpanjakany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanomboka tamin’ny andro nanafahako azy tany Ejipta ka mandraka izao, dia tsy nitsaha-niodina tamiko izy fa nanompo andriamani-kafa; koa izay efa nataony tamiko no mbola ataony aminao koa ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho izany, dia ekeo ihany ny fangatahany; kanefa aza misoron-teny aminy ianao fa atoroy azy ny zon’izay ho mpanjakany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zon’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitatitra ny teny rehetra nataon’ny TOMPO i Samoela ka nilaza tamin’ireo vahoaka nangata-mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '–Ireto avy no zon’izay ho mpanjakanareo: ny zanakareo lahy dia halainy ka hataony miaramila mpitondra kalesin’ady sy mpitaingin-tsoavaly, na hataony mpihazakazaka eo alohan’ny kalesiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny sasany hataony manamboninahitra mpibaiko rezimanta na vondron-tafika. Ny hafa hataony mpiasa ny taniny sy mpijinja ny vokany, na koa mpanefy fiadiana sy fitaovana momba ny kalesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Halainy koa ny zanakareo vavy ka hataony mpamboatra ranomanitra na mpahandro hanina na mpanao mofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Halainy ka homeny ny mpanompony izay tsara amin’ny sahanareo sy ny tanimboalobokareo ary ny taninôlivanareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'halainy koa ny ampahafolon’ny vokatry ny taninareo sy tanimboalobokareo ka homeny ny mpiasam-panjakàny sy ny manamboninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Halainy ny mpanomponareo, ny matanjaka amin’ny tanoranareo, eny, hatramin’ny borikinareo aza, dia hampiasainy ho amin’ny tombontsoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Halainy koa ny ampahafolon’ny biby fiompinareo. Raha bangoina, dia ny tenanareo mihitsy no hoandevoziny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hitaraina amin’ny TOMPO ianareo amin’izany fotoana izay noho ny mpanjaka izay nofidinareo, saingy tsy nihaino anareo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy noraharahain’ny Israelita anefa ny tenin’i Samoela, fa hoy izy ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy ahoanay izany, fa mba mila mpanjaka koa izahay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba ho tahaka ireo firenen-kafa; ka ny mpanjakanay no hitsara anay sy ho mpitari-tafikay ary hiady hiaraka aminay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nohenoin’i Samoela ny teny rehetra voalazan’ny vahoaka israelita ka notateriny tamin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy kosa ny TOMPO tamin’i Samoela:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ekeo izay angatahiny aminao ka omeo mpanjaka izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Taorian’izany, dia nasain’i Samoela nody any amin’ny tanànany avy ny Israelita.
