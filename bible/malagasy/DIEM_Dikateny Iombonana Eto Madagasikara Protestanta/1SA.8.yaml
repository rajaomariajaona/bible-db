document_id: 1SA.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Israelita mangataka mpanjaka
  - type: text
    content: 'Rehefa antitra i Samoela, dia ireo zanany no nataony ho mpanapaka ny vahoaka Israely. '
  '10':
  - type: text
    content: 'Dia nitatitra ny teny rehetra nataon’ny TOMPO i Samoela ka nilaza tamin’ireo vahoaka nangata-mpanjaka hoe:'
  '11':
  - type: text
    content: '–Ireto avy no zon’izay ho mpanjakanareo: ny zanakareo lahy dia halainy ka hataony miaramila mpitondra kalesin’ady sy mpitaingin-tsoavaly, na hataony mpihazakazaka eo alohan’ny kalesiny; '
  '12':
  - type: text
    content: 'ny sasany hataony manamboninahitra mpibaiko rezimanta na vondron-tafika. Ny hafa hataony mpiasa ny taniny sy mpijinja ny vokany, na koa mpanefy fiadiana sy fitaovana momba ny kalesy. '
  '13':
  - type: text
    content: 'Halainy koa ny zanakareo vavy ka hataony mpamboatra ranomanitra na mpahandro hanina na mpanao mofo. '
  '14':
  - type: text
    content: 'Halainy ka homeny ny mpanompony izay tsara amin’ny sahanareo sy ny tanimboalobokareo ary ny taninôlivanareo; '
  '15':
  - type: text
    content: 'halainy koa ny ampahafolon’ny vokatry ny taninareo sy tanimboalobokareo ka homeny ny mpiasam-panjakàny sy ny manamboninahiny. '
  '16':
  - type: text
    content: 'Halainy ny mpanomponareo, ny matanjaka amin’ny tanoranareo, eny, hatramin’ny borikinareo aza, dia hampiasainy ho amin’ny tombontsoany. '
  '17':
  - type: text
    content: 'Halainy koa ny ampahafolon’ny biby fiompinareo. Raha bangoina, dia ny tenanareo mihitsy no hoandevoziny. '
  '18':
  - type: text
    content: Hitaraina amin’ny TOMPO ianareo amin’izany fotoana izay noho ny mpanjaka izay nofidinareo, saingy tsy nihaino anareo Izy.
  '19':
  - type: text
    content: 'Tsy noraharahain’ny Israelita anefa ny tenin’i Samoela, fa hoy izy ireo hoe:'
  - type: text
    content: '–Tsy ahoanay izany, fa mba mila mpanjaka koa izahay '
  '2':
  - type: text
    content: I Jôela no anaran-janany lahimatoa ary i Abià no anaran’ny zandriny; tany Beèra-Sèba
  - type: note
    content: 'Beèra-Sèba: tanàna tokony ho 70 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: ' izy ireo no nanao ny asa maha mpitondra azy. '
  '20':
  - type: text
    content: mba ho tahaka ireo firenen-kafa; ka ny mpanjakanay no hitsara anay sy ho mpitari-tafikay ary hiady hiaraka aminay.
  '21':
  - type: text
    content: 'Nohenoin’i Samoela ny teny rehetra voalazan’ny vahoaka israelita ka notateriny tamin’ny TOMPO. '
  '22':
  - type: text
    content: 'Hoy kosa ny TOMPO tamin’i Samoela:'
  - type: text
    content: –Ekeo izay angatahiny aminao ka omeo mpanjaka izy.
  - type: text
    content: Taorian’izany, dia nasain’i Samoela nody any amin’ny tanànany avy ny Israelita.
  '3':
  - type: text
    content: 'Nefa izy roa lahy tsy mba nanahaka izay nataon-drainy, fa nanjary tia vola ka nandray tsolotra sy namilivily ny marina. '
  '4':
  - type: text
    content: 'Noho izany, dia nivory ny '
  - type: text
    content: loholona
  - type: text
    content: ' israelita rehetra, ka nankany amin’i Samoela any Ramà'
  - type: note
    content: 'Ramà: jereo 1.1 sy nta.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Hoy ireo taminy:'
  - type: text
    content: –Indro, efa antitra ianao izao, ry Samoela, nefa ny zanakao tsy mba nanahaka anao, koa anendreo mpanjaka izahay hitondra anay, tahaka ny an’ny firenen-kafa rehetra
  - type: note
    content: Jereo Deot 17.14.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Fa tsy nahafaly an’i Samoela izany nangatahan’izy ireo mpanjaka ho azy izany; koa dia nivavaka tamin’ny TOMPO izy. '
  '7':
  - type: text
    content: 'Nefa hoy ny TOMPO tamin’i Samoela:'
  - type: text
    content: '–Ekeo ny fangatahan’ny vahoaka amin’izay rehetra lazainy aminao; satria tsy ianao akory no laviny, fa Izaho mihitsy no tsy tiany ho mpanjakany intsony. '
  '8':
  - type: text
    content: 'Nanomboka tamin’ny andro nanafahako azy tany Ejipta ka mandraka izao, dia tsy nitsaha-niodina tamiko izy fa nanompo andriamani-kafa; koa izay efa nataony tamiko no mbola ataony aminao koa ankehitriny. '
  '9':
  - type: text
    content: Noho izany, dia ekeo ihany ny fangatahany; kanefa aza misoron-teny aminy ianao fa atoroy azy ny zon’izay ho mpanjakany.
  - type: heading
    content: Ny zon’ny mpanjaka
