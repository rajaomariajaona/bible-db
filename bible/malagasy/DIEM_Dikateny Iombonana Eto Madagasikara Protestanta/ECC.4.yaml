document_id: ECC.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy fahamarinana sy aretina eo amin’ny fiainam-piaraha-monina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hitako koa ny tsy rariny rehetra atao eto ambonin’ny tany. Miantsoantso ireo voan’ny tsindry hazo lena, fa tsy mba misy afa-manampy azy. Eo am-pelatanan’ny mpamoritra manko ny fahefana, hany ka tsy mba misy afa-manampy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ataoko fa ireo efa maty dia sambatra noho izay velona mbola miaina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa sambatra kokoa noho izy roa tonta ireo aza ny tsy mbola àry akory, satria tsy hahita ny asa ratsy atao eto ambonin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And 2 sy 3; jereo 6.3-5; Jôb 3.11-16; 10.18-19.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hitako fa matoa ny olona misasatra sy milofo amin’ny asany dia ny hahomby kokoa noho ireo namany. Nefa mbola zava-poana manenji-drivotra koa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mazava ho azy fa ny adala izay mipetra-potsiny dia mamono tena ho fatin-kanoanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nefa aleo fiadanana eran-tanan’ila toy izay fisasarana eran-tanan-droa izay manenji-drivotra ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao koa no zava-poana hitako tetỳ ambonin’ny tany: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'indro lehilahy iray mitoetra irery tokoa tsisy namana na rahalahy na zanaka ary nisasatra mafy. Naniry hanan-karena betsaka izy ka nanao anakampo hoe: «Ho an’iza no isasarako sy tsy ahatsiarovako fahasambarana?» Zava-poana sy raharaha ratsy koa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sambatra kokoa ny olon-droa noho ny mandeha irery fa mahatsara ny valin-kasasarana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha lavo ny iray, dia misy mpanarina. Fa loza kosa ny an’ny singany raha lavo, satria tsy hisy mpanarina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mafana kokoa raha olon-droa no miara-matory; fa ahoana kosa no hampahafana ny matory irery? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manan-kery kokoa ny olon-droa hanoherana izay miady aminy noho ny singany miady irery. Ary ny mahazaka telo olana tsy mora tapahina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aleo tovolahy mahantra nefa hendry toy izay mpanjaka antitra nefa adala tsy azo toroan-kevitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary na dia tao an-tranomaizina aza no nivoahan’ilay tovolahy mba hanjaka, na koa nateraka ho mpangataka aza izy any amin’izay hanjakàny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitako fa ny olon-drehetra tetỳ ambonin’ny tany dia nanotrona ilay tovolahy fony izy nandimby ilay mpanjaka teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nahatarika olona maro izy. Nefa ireo taranaka atỳ aoriana dia tsy ho faly aminy, satria mbola zava-poana sy manenji-drivotra koa izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza mba be teny eo anatrehan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mankao an-tranon’Andriamanitra tsy amim-pieritreretana, fa mandehana kosa mba hivonon-kihaino. Aleo izay noho ny manolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' toy ny fanaon’ny adala izay tsy mahafantatra akory fa ratsy no ataony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany ny and 17 dia voalahatra ho 5.1, ka noho izany ny 5.1-19 dia lasa 5.2-20.
    marker-yv: yv-n
  - type: text
    text: .
