document_id: ECC.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy fahamarinana sy aretina eo amin’ny fiainam-piaraha-monina
  - type: text
    content: 'Hitako koa ny tsy rariny rehetra atao eto ambonin’ny tany. Miantsoantso ireo voan’ny tsindry hazo lena, fa tsy mba misy afa-manampy azy. Eo am-pelatanan’ny mpamoritra manko ny fahefana, hany ka tsy mba misy afa-manampy azy. '
  '10':
  - type: text
    content: 'Raha lavo ny iray, dia misy mpanarina. Fa loza kosa ny an’ny singany raha lavo, satria tsy hisy mpanarina azy. '
  '11':
  - type: text
    content: 'Mafana kokoa raha olon-droa no miara-matory; fa ahoana kosa no hampahafana ny matory irery? '
  '12':
  - type: text
    content: Manan-kery kokoa ny olon-droa hanoherana izay miady aminy noho ny singany miady irery. Ary ny mahazaka telo olana tsy mora tapahina.
  '13':
  - type: text
    content: 'Aleo tovolahy mahantra nefa hendry toy izay mpanjaka antitra nefa adala tsy azo toroan-kevitra. '
  '14':
  - type: text
    content: 'Ary na dia tao an-tranomaizina aza no nivoahan’ilay tovolahy mba hanjaka, na koa nateraka ho mpangataka aza izy any amin’izay hanjakàny. '
  '15':
  - type: text
    content: 'Hitako fa ny olon-drehetra tetỳ ambonin’ny tany dia nanotrona ilay tovolahy fony izy nandimby ilay mpanjaka teo alohany. '
  '16':
  - type: text
    content: Nahatarika olona maro izy. Nefa ireo taranaka atỳ aoriana dia tsy ho faly aminy, satria mbola zava-poana sy manenji-drivotra koa izany.
  - type: heading
    content: Aza mba be teny eo anatrehan’Andriamanitra
  '17':
  - type: text
    content: 'Aza mankao an-tranon’Andriamanitra tsy amim-pieritreretana, fa mandehana kosa mba hivonon-kihaino. Aleo izay noho ny manolotra '
  - type: text
    content: sorona
  - type: text
    content: ' toy ny fanaon’ny adala izay tsy mahafantatra akory fa ratsy no ataony'
  - type: note
    content: Amin’ny dkt sasany ny and 17 dia voalahatra ho 5.1, ka noho izany ny 5.1-19 dia lasa 5.2-20.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Ataoko fa ireo efa maty dia sambatra noho izay velona mbola miaina. '
  '3':
  - type: text
    content: Nefa sambatra kokoa noho izy roa tonta ireo aza ny tsy mbola àry akory, satria tsy hahita ny asa ratsy atao eto ambonin’ny tany
  - type: note
    content: And 2 sy 3; jereo 6.3-5; Jôb 3.11-16; 10.18-19.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Hitako fa matoa ny olona misasatra sy milofo amin’ny asany dia ny hahomby kokoa noho ireo namany. Nefa mbola zava-poana manenji-drivotra koa izany. '
  '5':
  - type: text
    content: 'Mazava ho azy fa ny adala izay mipetra-potsiny dia mamono tena ho fatin-kanoanana. '
  '6':
  - type: text
    content: Nefa aleo fiadanana eran-tanan’ila toy izay fisasarana eran-tanan-droa izay manenji-drivotra ihany.
  '7':
  - type: text
    content: 'Ary izao koa no zava-poana hitako tetỳ ambonin’ny tany: '
  '8':
  - type: text
    content: 'indro lehilahy iray mitoetra irery tokoa tsisy namana na rahalahy na zanaka ary nisasatra mafy. Naniry hanan-karena betsaka izy ka nanao anakampo hoe: «Ho an’iza no isasarako sy tsy ahatsiarovako fahasambarana?» Zava-poana sy raharaha ratsy koa izany. '
  '9':
  - type: text
    content: 'Sambatra kokoa ny olon-droa noho ny mandeha irery fa mahatsara ny valin-kasasarana izany. '
