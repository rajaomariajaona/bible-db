document_id: MIC.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ireo mpanampatra fahefana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lozan’izay manoman-keloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mikasa hanao ratsy eo am-pandriany amin’ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nony maraina ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manatanteraka izany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria misy hery eo am-pelatanany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mitsangàna ka mialà,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy fitsaharana ho anareo intsony eto.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny fahalotoanareo hahatonga fandringanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia fandringanana mahatsiravina.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha misy olona iray mpanao kobaka am-bava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy mpamoron-dainga ka miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Lazaiko aminareo fa divay sy toaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hatobaka ho anareo»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izy no mpaminany mirediredy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mendrika an’ity vahoaka ity!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hangonin’ny Tompo izay sisa velona amin’ny Israely
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hoy ny Tompo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hangoniko tokoa ianareo rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry taranak’i Jakôba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hovorîko tokoa ianareo sisa velona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatambatro ho iray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ondry ao am-balany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'taranak’i Jakôba, sisa velona amin’i Israely:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Israelita rehetra, tavaratra sy tatsimo, no resahina eto. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: tahaka ny ondry ao am-balany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': rijan-teny heverina ho mitombina; dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tahaka ny ondrin’i Bôtserà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny ondry andiany eny an-tsaha fiandrasana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hisian’ny olona maro hifanaretsaka eto.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Miakatra eo alohanareo ny mpamaky lalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hamaky ny vavahady ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hivoaka ny tanàna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy TOMPO, mpanjakanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mandeha mitarika eo alohanareo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mitsiriritra saha izy, dia mangalatra izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mitsiriritra trano, dia mahalasa azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alainy ankeriny na ny loham-pianakaviana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny ankohonany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny olona mbamin’ny fananany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro Aho manomana loza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamelezana ny karazan’olona toa anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho azonareo ialana io loza io,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy handeha miandranandrana ianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria andron’ny loza izany.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanaovana oha-teny mandatsa anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy hiventesana hiran-toloko ka hilazana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Levona tanteraka izahay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasan’olon-kafa ny anjaran’ny firenenay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no nesorin’ny Tompo taminay ny taninay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka zarainy ho an’ny mpanohitra anay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Levona... anay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: maizimaizina ny hevitry ny RM amin’io and io ka manalasala ihany ny dkt.
      marker-yv: yv-n
    - type: text
      text: ?»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho izany, dia tsy hisy amin’ny taranakareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazo zara tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hatao indray ny fizaràna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo amin’ny vahoakan’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Noho... vahoakan’ny Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa hita taratra eto ny fizaràna ny tany isaky ny taona voafetra ao amin’ny ankohonana maromaro amin’ny tanàna iray.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ireo tsy manaiky ny tenin’ny mpaminany
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hoy ny rediredin’ny sasany amiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aza be rediredy aminay intsony ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka izay ny rediredy toy ny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hay sakanana ny fahafaham-baràka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa voaozona ve ny taranak’i Jakôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fa voaozona ve ny taranak’i Jakôba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsy mazava ny RM eto; dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dia ho azo lazaina ve izany, ry taranak’i Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '?'
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malaky tezitra ve ny TOMPO?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany ve no fomba fanaony?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teniko dia feno halemem-panahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo miaina araka ny hitsiny;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'fa hoy kosa ny TOMPO aminareo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nitsangan-ko fahavalon’ny vahoakako ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa... vahoakako ianareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt tranainy; tsy mazava ny RM.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny lehilahy miverina avy any an’ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mandalo tsy manana ahiahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no endahanareo ny akanjobeny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny vehivavy eo amin’ny vahoakako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia roahinareo hiala amin’ny trano tsy foiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: esorinareo hiala mandrakizay amin-janany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hasambarana nomeko azy.
