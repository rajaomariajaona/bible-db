document_id: MIC.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ireo mpanampatra fahefana
  - type: text
    content: Lozan’izay manoman-keloka,
  - type: text
    content: sy mikasa hanao ratsy eo am-pandriany amin’ny alina;
  - type: text
    content: ka nony maraina ny andro,
  - type: text
    content: dia manatanteraka izany izy
  - type: text
    content: satria misy hery eo am-pelatanany.
  '10':
  - type: text
    content: Mitsangàna ka mialà,
  - type: text
    content: fa tsy misy fitsaharana ho anareo intsony eto.
  - type: text
    content: Satria ny fahalotoanareo hahatonga fandringanana,
  - type: text
    content: dia fandringanana mahatsiravina.»
  '11':
  - type: text
    content: Raha misy olona iray mpanao kobaka am-bava
  - type: text
    content: 'sy mpamoron-dainga ka miteny hoe:'
  - type: text
    content: «Lazaiko aminareo fa divay sy toaka
  - type: text
    content: no hatobaka ho anareo»,
  - type: text
    content: dia izy no mpaminany mirediredy
  - type: text
    content: mendrika an’ity vahoaka ity!
  - type: heading
    content: Hangonin’ny Tompo izay sisa velona amin’ny Israely
  '12':
  - type: text
    content: 'Hoy ny Tompo hoe:'
  - type: text
    content: «Hangoniko tokoa ianareo rehetra,
  - type: text
    content: ry taranak’i Jakôba;
  - type: text
    content: hovorîko tokoa ianareo sisa velona
  - type: text
    content: amin’ny Israely.
  - type: text
    content: Hatambatro ho iray
  - type: text
    content: tahaka ny ondry ao am-balany
  - type: note
    content: 'taranak’i Jakôba, sisa velona amin’i Israely: ny Israelita rehetra, tavaratra sy tatsimo, no resahina eto. –tahaka ny ondry ao am-balany: rijan-teny heverina ho mitombina; dkt hafa tahaka ny ondrin’i Bôtserà.'
  - type: text
    content: ianareo,
  - type: text
    content: tahaka ny ondry andiany eny an-tsaha fiandrasana azy
  - type: text
    content: no hisian’ny olona maro hifanaretsaka eto.»
  '13':
  - type: text
    content: Miakatra eo alohanareo ny mpamaky lalana;
  - type: text
    content: dia hamaky ny vavahady ianareo
  - type: text
    content: ary hivoaka ny tanàna.
  - type: text
    content: Izy TOMPO, mpanjakanareo,
  - type: text
    content: no mandeha mitarika eo alohanareo.
  '2':
  - type: text
    content: Mitsiriritra saha izy, dia mangalatra izany;
  - type: text
    content: na mitsiriritra trano, dia mahalasa azy;
  - type: text
    content: alainy ankeriny na ny loham-pianakaviana
  - type: text
    content: sy ny ankohonany
  - type: text
    content: na ny olona mbamin’ny fananany.
  '3':
  - type: text
    content: 'Koa izao no lazain’ny TOMPO:'
  - type: text
    content: «Indro Aho manomana loza
  - type: text
    content: hamelezana ny karazan’olona toa anareo;
  - type: text
    content: tsy ho azonareo ialana io loza io,
  - type: text
    content: ka tsy handeha miandranandrana ianareo
  - type: text
    content: satria andron’ny loza izany.»
  '4':
  - type: text
    content: Amin’izany andro izany
  - type: text
    content: no hanaovana oha-teny mandatsa anareo,
  - type: text
    content: 'sy hiventesana hiran-toloko ka hilazana hoe:'
  - type: text
    content: «Levona tanteraka izahay!
  - type: text
    content: Lasan’olon-kafa ny anjaran’ny firenenay!
  - type: text
    content: Nahoana no nesorin’ny Tompo taminay ny taninay
  - type: text
    content: ka zarainy ho an’ny mpanohitra anay
  - type: note
    content: 'Levona... anay: maizimaizina ny hevitry ny RM amin’io and io ka manalasala ihany ny dkt.'
  - type: text
    content: ?»
  '5':
  - type: text
    content: Noho izany, dia tsy hisy amin’ny taranakareo
  - type: text
    content: hahazo zara tany
  - type: text
    content: rehefa hatao indray ny fizaràna
  - type: text
    content: eo amin’ny vahoakan’ny TOMPO
  - type: note
    content: 'Noho... vahoakan’ny Tompo: toa hita taratra eto ny fizaràna ny tany isaky ny taona voafetra ao amin’ny ankohonana maromaro amin’ny tanàna iray.'
  - type: text
    content: .
  - type: heading
    content: Ny amin’ireo tsy manaiky ny tenin’ny mpaminany
  '6':
  - type: text
    content: 'Hoy ny rediredin’ny sasany amiko:'
  - type: text
    content: «Aza be rediredy aminay intsony ianao!
  - type: text
    content: 'Aoka izay ny rediredy toy ny hoe:'
  - type: text
    content: tsy hay sakanana ny fahafaham-baràka.
  '7':
  - type: text
    content: Fa voaozona ve ny taranak’i Jakôba
  - type: note
    content: 'Fa voaozona ve ny taranak’i Jakôba: tsy mazava ny RM eto; dkt hafa Dia ho azo lazaina ve izany, ry taranak’i Jakôba?'
  - type: text
    content: '?'
  - type: text
    content: Malaky tezitra ve ny TOMPO?
  - type: text
    content: Izany ve no fomba fanaony?»
  - type: text
    content: Ny teniko dia feno halemem-panahy
  - type: text
    content: amin’ireo miaina araka ny hitsiny;
  '8':
  - type: text
    content: 'fa hoy kosa ny TOMPO aminareo:'
  - type: text
    content: «Nitsangan-ko fahavalon’ny vahoakako ianareo
  - type: note
    content: 'fa... vahoakako ianareo: araka ny dkt tranainy; tsy mazava ny RM.'
  - type: text
    content: ;
  - type: text
    content: ka ny lehilahy miverina avy any an’ady
  - type: text
    content: sy mandalo tsy manana ahiahy
  - type: text
    content: no endahanareo ny akanjobeny.
  '9':
  - type: text
    content: Ny vehivavy eo amin’ny vahoakako
  - type: text
    content: dia roahinareo hiala amin’ny trano tsy foiny;
  - type: text
    content: esorinareo hiala mandrakizay amin-janany
  - type: text
    content: ny hasambarana nomeko azy.
