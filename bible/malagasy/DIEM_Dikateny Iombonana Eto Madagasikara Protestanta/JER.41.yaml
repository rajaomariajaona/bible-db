document_id: JER.41,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo tamin’ny volana fahafiton’io taona io ihany dia tonga tany amin’i Gedalià tao Mitsepà, niaraka tamin’ny olona folo lahy i Jismahela, zanakalahin’i Netanià sy zafikelin’i Elisamà; fianakavian’ny mpanjaka io Jismahela io sady anisan’ny manamboninahiny. Koa raha mbola teo am-pihinanana niaraka tamin’i Gedalià iny indrindra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia nentin’i Jismahela ho babo ny sisa tamin’ny mponina tao Mitsepà mbamin’ireo zanakavavin’ny mpanjaka, izany hoe ny olona rehetra napetrak’i Nebozaradàna lehiben’ny mpiambina tamin’i Gedalià; ka nitondra ireo babo ireo i Jismahela no lasa nankany amin’ny Hamônita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voaavotra ireo olona babon’i Jismahela
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ren’i Johanàna, zanakalahin’i Karea mbamin’ireo lehiben’ny andia-miaramila niaraka taminy ny ratsy rehetra efa nataon’i Jismahela. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nanangona ny miaramilany rehetra izy ary niainga hanafika an’i Jismahela, ka nahatratra azy teo akaikin’ny farihin’i Gibehôna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony nahita an’i Jôhanàna sy ireo lehiben’ny andia-miaramila niaraka taminy ny olona rehetra teo amin’i Jismahela, dia faly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra izay nentin’i Jismahela ho babo avy tao Mitsepà dia niverina ilalana ka nanatona an’i Jôhanàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Jismahela niaraka tamin’olona valo lahy kosa dia nandositra teo anatrehan’i Jôhanàna ka nankany amin’ny Hamônita.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany i Jôhanàna sy ireo lehiben’ny andia-miaramila niaraka taminy dia niandraikitra ny olona sisa rehetra izay nentin’i Jismahela ho babo avy tao Mitsepà taorian’ny namonoany ho faty an’i Gedalià zanakalahin’i Ahikama; ireo olona sisa rehetra ireo dia ny lehilahy mpiady sy ny zaza amam-behivavy ary ny tandapa, izay nentina niverina avy tany Gibehôna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandeha izy rehetra ka nijanona nitoby tao Kimehàma akaikin’i Betlehema. Fa nikasa hankany Ejipta izy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria natahotra ny Babilônianina hatramin’ny namonoan’i Jismahela an’i Gedalià izay notendren’ny mpanjakan’i Babilôna hitondra ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitsangana i Jismahela sy ireo folo lahy niaraka taminy, ka namely an’i Gedalià tamin’ny sabatra ary nahafaty azy; kanefa izy no voatendrin’ny mpanjakan’i Babilôna hitondra ny tany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia novonoin’i Jismahela ho faty koa ireo Jodeanina rehetra hitany tao Mitsepà niaraka tamin’i Gedalià, mbamin’ireo miaramila babilônianina izay tao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Novonoin’i Jismahela ho faty ireo mpivavaka nanao fivahiniana masina
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roa andro taorian’ny namonoana an’i Gedalià ho faty, dia tsy mbola nisy olona nahalala izany ihany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy olona valopolo lahy avy any Sekema sy Silao ary Samaria, samy voaharatra ny volombavany sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voatriatra ny fitafiany
    - type: text
      text: ' ary voatetitetika ny tenany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Notetitetehina ny tena mba ho mariky ny fisaonana (Jer 48.37) na koa mba hanetsika ny fangorahan’ny andriamanitra (1 Mp 18.28). Ny volombava voaharatra sy fitafiana voatriatra dia mariky ny fisaonana na alahelo koa (Jereo 1.20; Hezrà 9.3).
      marker-yv: yv-n
    - type: text
      text: '. Nitondra koba sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' mba hatao fanatitra ao an-tranon’ny TOMPO izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka hitsena azy avy tao Mitsepà i Jismahela sady nitomany teny am-pandehanana. Nony tonga teo aminy izy, dia nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandrosoa ao amin’i Gedalià zanakalahin’i Ahikama ianareo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo raha vao tonga tao afovoan’ny tanàna ireo, dia naringan’i Jismahela sy ny olony, ary natsipiny tao an-dava-drano ny fatiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy folo lahy tamin’ireo anefa niteny tamin’i Jismahela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza vonoina izahay fa manana tahirin-tsakafo miafina any an-tsaha, dia varim-bazaha sy ôrza ary diloilo sy tantely.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tsy nampamonoin’i Jismahela niaraka tamin’ireo namany izy folo lahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lava-drano izay nasain’i Jismahela nanipazana ny fatin’ireo olona novonoiny dia lava-drano lehibe izay nasain’i Asà mpanjaka noloahana fony izy niady tamin’i Bahasà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Asà, Bahasà: jereo 1 Mp 15.9-24. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: lava-drano lehibe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': araka ny dkt grika tranainy.'
      marker-yv: yv-n
    - type: text
      text: ' mpanjakan’i Israely. Nofenoin’i Jismahela faty izany.'
