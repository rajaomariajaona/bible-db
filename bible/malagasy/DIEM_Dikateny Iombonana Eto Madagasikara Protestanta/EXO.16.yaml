document_id: EXO.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mana sy ny papelika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Niala tao Elima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Elima: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 15.27 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tamin’ny volana faharoa, andro faha-15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 12.2 sy nta. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'taniefitra Sina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' velaram-pasika midadasika ao atsimo-atsinanan’i Elima ary antsoina hoe Debeta-Era-Ramle ankehitriny (aza afangaro amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taniefitra Tsina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Nom 13.21 sy nta). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Sinay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 3.1 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' ny vahoaka Israelita manontolo, ka tonga tao amin’ny taniefitra Sina, eo anelanelan’i Elima sy ny tendrombohitra Sinay, tamin’ny volana faharoa, andro faha-15 taorian’ny nialany tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nimonomonona tamin’i Mosesy sy i Aharôna tany an-taniefitra ny fiangonana Israelita tsivakivolo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inay anie izahay mba novonoin’ny Tompo ho faty tany Ejipta, fony izahay nanodidina ny vilanin-kena iny, ka nihinana araka izay lany! Fa izao dia nentinareo ho faty noana atỳ an-taniefitra atỳ izahay rehetra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handatsaka mofo avy any an-danitra ho anareo Aho. Hivoaka hanangona izay sahaza azy isan’andro ny Israelita mba hizahako toetra anareo na handeha araka ny lalànako ianareo na tsia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jôh 6.31.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa amin’ny andro fahenina rehefa hanomana izay hoentinareo ianareo, dia hahita indroa heny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'indroa heny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mba tsy hilàna ny hanangonana amin’ny andro fahafito izay andro sabata (jereo and 22-30).
    marker-yv: yv-n
  - type: text
    text: ' noho izay fanangonareo isan’andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'Ary i Mosesy sy i Aharôna dia niteny tamin’ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Anio hariva ny TOMPO dia hanome hena hohaninareo, satria henony tokoa ny fimonomononanareo taminy; izany no hahafantaranareo fa Izy TOMPO no namoaka anareo tany Ejipta. Ary rahampitso maraina dia hanome mofo hahavoky anareo Izy, ka izany no hahitanareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahiny
  - type: text
    text: '. Ny aminay kosa, inona moa izahay no imonomononanareo? Raha manao izany manko ianareo, dia tsy izahay no imonomononanareo fa ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avy eo dia nanome baiko an’i Aharôna i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilazao avokoa ny vahoaka Israely mba ho tonga hiseho eo anatrehan’ny TOMPO, satria efa reny ny fimonomononan’izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mbola niteny tamin’ny vahoaka Israelita manontolo i Aharôna, dia nitodika nanatrika ny taniefitra izy ireo, ka ny voninahitry ny TOMPO no hitany niseho teo amin’ny rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny rahona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '–Reko ny fimonomononan’ny Israelita. Ilazao izy ireo hoe: Anio hariva dia hihinan-kena ianareo, ary rahampitso maraina dia ho voky mofo ianareo; amin’izay dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony hariva, dia tonga tokoa ny papelika ka nipetraka teny amin’ny toby; ary nony maraina, dia nisy ando matevina manodidina ny toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa nisava ny ando dia indro nisy zavatra mivaingana nijanona teny an-taniefitra, boriborikely toy ny fanala nifafy tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitan’ny Israelita ireny nefa tsy fantany, ka nifanontany izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona itony?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novalian’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Itony no mofo izay nomen’ny TOMPO hohaninareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1Kôr 10.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no zavatra nandidian’ny TOMPO anareo: «Samia manangona izay tokony ho sahaza azy avy; manangòna ankevitry ny inefatry ny zingan-drano isan’olona, araka ny isan’ny olona miara-belona ao amin’ny isan-dainy avy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Notanterahin’ny Israelita izany, ka nisy nanangona betsaka, ary nisy kosa nanangona kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: kanefa rehefa nafatra tamin’ny famarana, dia tsy nanana tombony ireo nanangona be, ary tsy nanana ny tsy ampy ireo nanangona kely, fa samy nahazo ny sahaza hohaniny avy ny tsirairay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2Kôr 8.15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitsipika isan-karazany momba ny mana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Mosesy tamin’ny Israelita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka tsy hisy olona hamela sisa ho tra-maraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nisy ihany anefa olona tsy nankatò an’i Mosesy ka namela sisa ho tra-maraina, saingy nivoaka olitra ireny ka maimbo; koa tezitra tamin’ireo i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hatreo dia nanangona izay sahaza hohaniny avy isa-maraina ny olona; ary rehefa nafana ny andro dia nitsonika ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ny andro fahenina dia sakafo indroa heny no nangonin’ny olona, izany hoe imbalon’ny zingan-drano isan’olona. Dia lasa nanao tatitra tamin’i Mosesy ireo mpitarika ny vahoaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ka hoy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izany indrindra no nandidian’ny TOMPO anareo. Rahampitso dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ', andro fitsaharana voatokana ho an’ny TOMPO; koa andrahoy izay tokony handrahoina, ary ampangotrahy izay tokony hampangotrahina, fa ny ambiny kosa dia tehirizo ho tra-maraina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 20.8-11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia navahan’izy ireo hotahirizina mandra-maraina ny ambiny araka izay nodidian’i Mosesy, nefa tsy maimbo na feno olitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Mosesy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hano izany anio, fa sabata ho an’ny TOMPO anio, ka tsy hahita an’ireny eny an-tsaha ianareo androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Andro enina no ahazoanareo manangona sakafo; fa amin’ny andro fahafito, andro sabata, dia tsy hisy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin’ny andro fahafito anefa dia mbola nisy ihany Israelita sasany nivoaka ny toby mba hanangona, fa tsy nahita na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ka hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandra-pahoviana no handavanareo tsy hitandrina ny didiko sy ny lalànako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fantaro tsara fa ny nanomezako anareo ny sabata dia ny mba hitsaharanareo. Izany no antony anomezako mofo sahaza ny indroa andro amin’ny andro fahenina; ka amin’ny andro fahafito dia samia mitoetra ao an-tranony avy, fa aoka tsy hisy olona hiala tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nitsahatra ny vahoaka Israelita tamin’ny andro fahafito.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nataon’ny Israelita hoe mana ny anaran’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mana ny anaran’izany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'io anarana io amin’ny teny hebreo dia mitovy amin’ilay mpisolo anarana manontany, hita eo amin’ny and 15 hoe «Inona itony?» –Ny mana dia mety hitovy amin’ny pitipiti-drano lasa nivaingana avy amin’ny ranon-kazo atao ho tamarisy; amin’ny volana jona-jolay dia misy karazana hao manindrona ny hoditr’io hazo io amin’ny alina mba hitsentsitra ny ranony, ka vokatr’ireny fanindroman’ny hao ireny dia nisy pitipiti-drano mivoaka sy mivaingana mety hatao sakafo. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: voarafy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia hazo madinika toy ny goavy izay mamoa boriborikely fotsifotsy be dia be toy ny voan’ampemby madinika izay mamy tokoa. –Ampit Nom 11.7-8 ity and ity.'
    marker-yv: yv-n
  - type: text
    text: ' sakafo izany. Mitovy amin’ny voarafy izy sady fotsy, ary tahaka ny mofo misy tantely ny tsirony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hoy i Mosesy tamin’ny Israelita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no zavatra nandidian’ny TOMPO: «Fenoy mana ny vata hômera iray mba hotehirizina ho an’ny taranakareo. Amin’izay dia mba ho hitany ny mofo izay nomeko hohaninareo tany an-taniefitra fony Aho namoaka anareo hiala tany Ejipta.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia hoy i Mosesy tamin’i Aharôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Makà siny tany ka asio mana inefatry ny zingan-drano, dia apetraho eo anatrehan’ny TOMPO mba hotahirizina ho an’ny taranakareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 9.4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Araka izay nandidian’ny TOMPO an’i Mosesy dia teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Raki-tsoratry ny fanekempihavanana
  - type: text
    text: ' no napetrak’i Aharôna ilay siny tany misy mana mba hotahirizina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nandritra ny efapolo taona no nihinanan’ny Israelita ny mana, ambara-pahatongany tany amin’ny tany misy mponina, izany hoe mandra-pidirany teo amin’ny sisin-tanin’i Kanahàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jos 5.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny fatran’ny mana fanangona dia efatra zingan-drano eo ho eo, izany hoe ampahafolon’ny famarana mahazatra.
