document_id: EXO.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mana sy ny papelika
  - type: text
    content: Niala tao Elima
  - type: note
    content: 'Elima: jereo 15.27 sy nta. –Tamin’ny volana faharoa, andro faha-15: jereo 12.2 sy nta. –taniefitra Sina: velaram-pasika midadasika ao atsimo-atsinanan’i Elima ary antsoina hoe Debeta-Era-Ramle ankehitriny (aza afangaro amin’ny taniefitra Tsina jereo Nom 13.21 sy nta). –Sinay: jereo 3.1 sy nta.'
  - type: text
    content: ' ny vahoaka Israelita manontolo, ka tonga tao amin’ny taniefitra Sina, eo anelanelan’i Elima sy ny tendrombohitra Sinay, tamin’ny volana faharoa, andro faha-15 taorian’ny nialany tany Ejipta. '
  '10':
  - type: text
    content: Raha mbola niteny tamin’ny vahoaka Israelita manontolo i Aharôna, dia nitodika nanatrika ny taniefitra izy ireo, ka ny voninahitry ny TOMPO no hitany niseho teo amin’ny rahona
  - type: note
    content: 'ny rahona: jereo 13.21 sy nta.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  '12':
  - type: text
    content: '–Reko ny fimonomononan’ny Israelita. Ilazao izy ireo hoe: Anio hariva dia hihinan-kena ianareo, ary rahampitso maraina dia ho voky mofo ianareo; amin’izay dia ho fantatrareo fa Izaho no TOMPO Andriamanitrareo.'
  '13':
  - type: text
    content: 'Nony hariva, dia tonga tokoa ny papelika ka nipetraka teny amin’ny toby; ary nony maraina, dia nisy ando matevina manodidina ny toby. '
  '14':
  - type: text
    content: 'Rehefa nisava ny ando dia indro nisy zavatra mivaingana nijanona teny an-taniefitra, boriborikely toy ny fanala nifafy tamin’ny tany. '
  '15':
  - type: text
    content: 'Hitan’ny Israelita ireny nefa tsy fantany, ka nifanontany izy hoe:'
  - type: text
    content: –Inona itony?
  - type: text
    content: 'Fa novalian’i Mosesy hoe:'
  - type: text
    content: –Itony no mofo izay nomen’ny TOMPO hohaninareo
  - type: note
    content: Jereo 1Kôr 10.3.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary izao no zavatra nandidian’ny TOMPO anareo: «Samia manangona izay tokony ho sahaza azy avy; manangòna ankevitry ny inefatry ny zingan-drano isan’olona, araka ny isan’ny olona miara-belona ao amin’ny isan-dainy avy.» '
  '17':
  - type: text
    content: 'Notanterahin’ny Israelita izany, ka nisy nanangona betsaka, ary nisy kosa nanangona kely. '
  '18':
  - type: text
    content: kanefa rehefa nafatra tamin’ny famarana, dia tsy nanana tombony ireo nanangona be, ary tsy nanana ny tsy ampy ireo nanangona kely, fa samy nahazo ny sahaza hohaniny avy ny tsirairay
  - type: note
    content: Jereo 2Kôr 8.15.
  - type: text
    content: .
  - type: heading
    content: Fitsipika isan-karazany momba ny mana
  '19':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny Israelita:'
  - type: text
    content: '–Aoka tsy hisy olona hamela sisa ho tra-maraina. '
  '2':
  - type: text
    content: 'Nimonomonona tamin’i Mosesy sy i Aharôna tany an-taniefitra ny fiangonana Israelita tsivakivolo, '
  '20':
  - type: text
    content: 'Nisy ihany anefa olona tsy nankatò an’i Mosesy ka namela sisa ho tra-maraina, saingy nivoaka olitra ireny ka maimbo; koa tezitra tamin’ireo i Mosesy. '
  '21':
  - type: text
    content: Hatreo dia nanangona izay sahaza hohaniny avy isa-maraina ny olona; ary rehefa nafana ny andro dia nitsonika ireny.
  '22':
  - type: text
    content: 'Tamin’ny andro fahenina dia sakafo indroa heny no nangonin’ny olona, izany hoe imbalon’ny zingan-drano isan’olona. Dia lasa nanao tatitra tamin’i Mosesy ireo mpitarika ny vahoaka, '
  '23':
  - type: text
    content: 'ka hoy i Mosesy hoe:'
  - type: text
    content: '–Izany indrindra no nandidian’ny TOMPO anareo. Rahampitso dia '
  - type: text
    content: sabata
  - type: text
    content: ', andro fitsaharana voatokana ho an’ny TOMPO; koa andrahoy izay tokony handrahoina, ary ampangotrahy izay tokony hampangotrahina, fa ny ambiny kosa dia tehirizo ho tra-maraina'
  - type: note
    content: Jereo 20.8-11.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Dia navahan’izy ireo hotahirizina mandra-maraina ny ambiny araka izay nodidian’i Mosesy, nefa tsy maimbo na feno olitra. '
  '25':
  - type: text
    content: 'Ary hoy i Mosesy taminy:'
  - type: text
    content: '–Hano izany anio, fa sabata ho an’ny TOMPO anio, ka tsy hahita an’ireny eny an-tsaha ianareo androany. '
  '26':
  - type: text
    content: Andro enina no ahazoanareo manangona sakafo; fa amin’ny andro fahafito, andro sabata, dia tsy hisy.
  '27':
  - type: text
    content: 'Tamin’ny andro fahafito anefa dia mbola nisy ihany Israelita sasany nivoaka ny toby mba hanangona, fa tsy nahita na inona na inona. '
  '28':
  - type: text
    content: 'Ka hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Mandra-pahoviana no handavanareo tsy hitandrina ny didiko sy ny lalànako? '
  '29':
  - type: text
    content: 'Fantaro tsara fa ny nanomezako anareo ny sabata dia ny mba hitsaharanareo. Izany no antony anomezako mofo sahaza ny indroa andro amin’ny andro fahenina; ka amin’ny andro fahafito dia samia mitoetra ao an-tranony avy, fa aoka tsy hisy olona hiala tao. '
  '3':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: –Inay anie izahay mba novonoin’ny Tompo ho faty tany Ejipta, fony izahay nanodidina ny vilanin-kena iny, ka nihinana araka izay lany! Fa izao dia nentinareo ho faty noana atỳ an-taniefitra atỳ izahay rehetra!
  '30':
  - type: text
    content: Dia nitsahatra ny vahoaka Israelita tamin’ny andro fahafito.
  '31':
  - type: text
    content: Nataon’ny Israelita hoe mana ny anaran’izany
  - type: note
    content: 'mana ny anaran’izany: io anarana io amin’ny teny hebreo dia mitovy amin’ilay mpisolo anarana manontany, hita eo amin’ny and 15 hoe «Inona itony?» –Ny mana dia mety hitovy amin’ny pitipiti-drano lasa nivaingana avy amin’ny ranon-kazo atao ho tamarisy; amin’ny volana jona-jolay dia misy karazana hao manindrona ny hoditr’io hazo io amin’ny alina mba hitsentsitra ny ranony, ka vokatr’ireny fanindroman’ny hao ireny dia nisy pitipiti-drano mivoaka sy mivaingana mety hatao sakafo. –Ny voarafy dia hazo madinika toy ny goavy izay mamoa boriborikely fotsifotsy be dia be toy ny voan’ampemby madinika izay mamy tokoa. –Ampit Nom 11.7-8 ity and ity.'
  - type: text
    content: ' sakafo izany. Mitovy amin’ny voarafy izy sady fotsy, ary tahaka ny mofo misy tantely ny tsirony.'
  '32':
  - type: text
    content: 'Hoy i Mosesy tamin’ny Israelita:'
  - type: text
    content: '–Izao no zavatra nandidian’ny TOMPO: «Fenoy mana ny vata hômera iray mba hotehirizina ho an’ny taranakareo. Amin’izay dia mba ho hitany ny mofo izay nomeko hohaninareo tany an-taniefitra fony Aho namoaka anareo hiala tany Ejipta.»'
  '33':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Aharôna:'
  - type: text
    content: –Makà siny tany ka asio mana inefatry ny zingan-drano, dia apetraho eo anatrehan’ny TOMPO mba hotahirizina ho an’ny taranakareo
  - type: note
    content: Jereo Heb 9.4.
  - type: text
    content: .
  '34':
  - type: text
    content: 'Araka izay nandidian’ny TOMPO an’i Mosesy dia teo anoloan’ny '
  - type: text
    content: Raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' no napetrak’i Aharôna ilay siny tany misy mana mba hotahirizina.'
  '35':
  - type: text
    content: Nandritra ny efapolo taona no nihinanan’ny Israelita ny mana, ambara-pahatongany tany amin’ny tany misy mponina, izany hoe mandra-pidirany teo amin’ny sisin-tanin’i Kanahàna
  - type: note
    content: Jereo Jos 5.14.
  - type: text
    content: '. '
  '36':
  - type: text
    content: Ny fatran’ny mana fanangona dia efatra zingan-drano eo ho eo, izany hoe ampahafolon’ny famarana mahazatra.
  '4':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Handatsaka mofo avy any an-danitra ho anareo Aho. Hivoaka hanangona izay sahaza azy isan’andro ny Israelita mba hizahako toetra anareo na handeha araka ny lalànako ianareo na tsia
  - type: note
    content: Jereo Jôh 6.31.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Fa amin’ny andro fahenina rehefa hanomana izay hoentinareo ianareo, dia hahita indroa heny
  - type: note
    content: 'indroa heny: mba tsy hilàna ny hanangonana amin’ny andro fahafito izay andro sabata (jereo and 22-30).'
  - type: text
    content: ' noho izay fanangonareo isan’andro. '
  '6':
  - type: text
    content: 'Ary i Mosesy sy i Aharôna dia niteny tamin’ny Israelita hoe:'
  - type: text
    content: '–Anio hariva ny TOMPO dia hanome hena hohaninareo, satria henony tokoa ny fimonomononanareo taminy; izany no hahafantaranareo fa Izy TOMPO no namoaka anareo tany Ejipta. Ary rahampitso maraina dia hanome mofo hahavoky anareo Izy, ka izany no hahitanareo ny '
  - type: text
    content: voninahiny
  - type: text
    content: '. Ny aminay kosa, inona moa izahay no imonomononanareo? Raha manao izany manko ianareo, dia tsy izahay no imonomononanareo fa ny TOMPO. '
  '9':
  - type: text
    content: 'Avy eo dia nanome baiko an’i Aharôna i Mosesy hoe:'
  - type: text
    content: '–Ilazao avokoa ny vahoaka Israely mba ho tonga hiseho eo anatrehan’ny TOMPO, satria efa reny ny fimonomononan’izy ireo. '
