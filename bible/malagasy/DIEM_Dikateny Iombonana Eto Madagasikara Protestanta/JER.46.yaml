        children:
        - type: text
          text: ': jereo Is 19.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toa ombivavy kely tsara tarehy i Ejipta!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kinanjo tamy avy any avaratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.14 sy nta.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fihitra hanaikitra azy!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voakarakara toa ombilahy kely mifahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo miaramila mpikarama an’ady tao Ejipta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa, na ireo koa aza, nihemotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka samy lasa nandositra avokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy nahajoro nony tonga ny andro mahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hirotsahako an-tsehatra hamely azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fitsaitsaikan’ny menarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no fialan’ny tafika ejiptianina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha vao tonga hamely azy ny fahavalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay toy ny mpikapa hazo mandrangaranga famaky.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kapain’ireo ny alany, na dia matevina aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa marobe noho ny andiam-balala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy tambo isaina.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rakotra henatra ny mponin’i Ejipta:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo an-tanan’ny vahoaka avy any avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nanolorana azy!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro Aho hirotsaka an-tsehatra hamely an’i Amôna andriamanitr’i Teba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Teba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàn-dehibe tany Ejipta ambony.
      marker-yv: yv-n
    - type: text
      text: ', hamely an’i Ejipta sy ny andriamaniny ary ny mpanjakany, eny, hamely ny Farao sy izay rehetra miantehitra aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatolotro eo an-tanan’ireo mitady hahafaty azy izy, dia i Nebokadnetsara mpanjakan’i Babilôna mbamin’ireo miaramilany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afaka izany, vao hiverina amin’ny laoniny toy ny taloha i Ejipta. Izany no teny hentitra avy amiko TOMPO.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaka i Israely
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 30.10-11)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra kosa ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry taranak’i Jakôba mpanompoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza kivy ianao, ry firenena Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa indro Aho hamonjy anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny faritany lavitra any;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indro Aho hamonjy ireo taranakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any amin’ny tany izay nahababo azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiverina ianareo, ry taranak’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiadana sy handry feizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hisy hanaitaitra intsony.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry taranak’i Jakôba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza matahotra ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izaho no miaraka aminareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny hentitra avy amiko TOMPO izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofongorako ny firenen-kafa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanelezako anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo kosa tsy mba hofongorako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia tsy maintsy faiziko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny hitsiny ihany aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy havelako ho afa-maina!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Manome baiko ny manamboninahitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Omany ny ampinga kely sy lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mandrosoa hiady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afatory ny lasely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary taingeno ny soavaly!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaovy ny satro-by fiarovan-doha ka milahara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arangarangao ny lefona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iakanjoy ny akanjo vy fiarovan-tratra.»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana izao zavatra hitako izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raiki-tahotra izy ka mihemotra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Resy ireo miaramila mahery fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mitsoaka mandositra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy miherika akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fihorohoroana hatraiza hatraiza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.25 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy ny teny hentitry ny TOMPO.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy afa-mandositra ny faingam-pandeha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mahavonjy tena ny mahery fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa any avaratra eo amoron’ny ony Eofrata izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ho tafintohina ka hianjera.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza àry ity tahaka an’i Neily tondraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ireo sampany misy rano misamboaravoara?
  '8':
  - type: usfm
    marker: q1
    children:
