        - type: text
          text: '46.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 1 dia nitranga ho lohahevitra ho an’ny toko 46–51.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharesen’ny Ejiptianina tao Karkemisy
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, ho an’ny Tompo ANDRIAMANITR’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity andro ity dia ho andro famaizana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanafaizany ny fahavalony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny sabatra dia handripaka sy hiletra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary himamo amin’ny ran’ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria toa sorona vonoina hatolotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no any amin’ny tany avaratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manamorona ny ony Eôfrata.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Ejipta mahonena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miakara hatrany Gilehada
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka makà balsama ho anao...
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy ilaina ny hampitomboanareo ny fitsaboana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy fanafody hahasitrana ny ferinao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ren’ny firenen-kafa ny henatrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nanenika ny tany ny tolokonao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifamingana ny samy mahery fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niara-nianjera izy roa tonta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanafihana an’i Ejipta
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafatra nampitondrain’ny TOMPO an’i Jeremià mpaminany fony i Nebokadnetsara mpanjakan’i Babilôna tonga nanafika an’i Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity ady nataon’ny Babilônianina tamin’i Ejipta ity dia tokony ho niseho nandritra ny ririnina 601-600 tal J.K; ampit Jer 43.10-13.
      marker-yv: yv-n
    - type: text
      text: ':'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao any Ejipta ny vaovao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampandreneso ao Migdôla
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ao Memfisa ary ao Tahapanehesa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Migdôla: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna ejiptianina amin’ny sisin-tany avaratra atsinanan’i Ejipta (Eks 14.2; Jer 44.1). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Memfisa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Tahapanehesa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 2.16 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka ataovy hoe: «Mivonòna hiady ary miomàna,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa ripaky ny ady ny manodidina anao.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa inona no miseho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mianjera amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ombalahy masina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny ejiptianina fahiny ny ombilahy masina tao Memfisa dia mampiseho ny hery mpiaro ny tanàna, eny ny tany manontolo mihitsy aza. Dkt hafa «nianjera amin’ny tany ireo lehilahy maherinao.»
      marker-yv: yv-n
    - type: text
      text: ' ianteheranao!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahatohitra izy fa voatosiky ny TOMPO
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampivembena miaramila maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mampianjera azy hifanindry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nifampiresaka ireo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Andeha isika hiverina any amin’ny firenentsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia any amin’ny tany nahaterahantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho afaka amin’ny ady mandoza.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' mpanjakan’i Ejipta kosa'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia omeo anaram-bosotra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Rabetabataba tsy misy vokany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia omeo anaram-bosotra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt tranainy grika sy latinina ary siriaka; hebreo «tany izy no niantsoantso hoe».
      marker-yv: yv-n
    - type: text
      text: .»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Teny hentitra no ataon’ilay Mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay antsoina hoe «TOMPOn’izao rehetra izao»:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velona aho ka mianiana fa ho tonga ny fahavalo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azo antoka tahaka ny fisian’i Tabôra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny samy tendrombohitra izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: azo antoka tahaka ny fisian’i Karmela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mandòndona eo amoron-dranomasina!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mponina any Ejipta ô, mifeheza entana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba handeha any amin’ny fahababoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hodorana ny tanànan’i Memfisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho lao tsy hisy mponina intsony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fanambaràna momba an’i Ejipta sy ny tafiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' Nekao, mpanjakan’i Ejipta. Tao Karkemisy teo amoron’ny ony Eofrata i Nekao no resin’i Nebokadnetsara mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Babilôna
    - type: text
      text: ', tamin’ny taona fahefatra nanjakàn’i Jôiakima zanakalahin’i Josià mpanjakan’i Joda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fiandohan’ny and 2 dia mitsangana ho lohahevitry ny and 2-28. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Nekao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 2 Mp 23.29-35 sy ny naoty momba ny Jer 22.13. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Karkemisy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàn-dehibe any avaratr’i Mezôpôtamia, eo akaikin’ny sisin-tanin’i Siria sy Torkia ankehitriny. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny taona fahefatra nanjakàn’i Jôiakima
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 22.13; 25.1 sy nta. –Momba an’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ejipta
      - type: usfm
