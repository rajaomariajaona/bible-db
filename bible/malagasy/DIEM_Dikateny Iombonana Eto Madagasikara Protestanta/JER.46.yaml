document_id: JER.46,396
type_code: plt
verses:
  '1':
  - type: heading
    content: ––––––––-
  - type: text
    content: Hafatra izay nampitondrain’ny TOMPO an’i Jeremià mpaminany momba ireo firenen-kafa
  - type: note
    content: Ny and 1 dia nitranga ho lohahevitra ho an’ny toko 46–51.
  - type: text
    content: .
  - type: heading
    content: Ny faharesen’ny Ejiptianina tao Karkemisy
  '10':
  - type: text
    content: Kanefa, ho an’ny Tompo ANDRIAMANITR’izao rehetra izao,
  - type: text
    content: ity andro ity dia ho andro famaizana
  - type: text
    content: mba hanafaizany ny fahavalony.
  - type: text
    content: Ka ny sabatra dia handripaka sy hiletra azy
  - type: text
    content: ary himamo amin’ny ran’ireo;
  - type: text
    content: satria toa sorona vonoina hatolotra
  - type: text
    content: amin’ny Tompo ANDRIAMANITR’izao rehetra izao
  - type: text
    content: no any amin’ny tany avaratra
  - type: text
    content: manamorona ny ony Eôfrata.
  '11':
  - type: text
    content: Ry Ejipta mahonena,
  - type: text
    content: miakara hatrany Gilehada
  - type: text
    content: ka makà balsama ho anao...
  - type: text
    content: Nefa tsy ilaina ny hampitomboanareo ny fitsaboana
  - type: text
    content: satria tsy misy fanafody hahasitrana ny ferinao.
  '12':
  - type: text
    content: Ren’ny firenen-kafa ny henatrao
  - type: text
    content: fa nanenika ny tany ny tolokonao.
  - type: text
    content: Nifamingana ny samy mahery fo
  - type: text
    content: ka niara-nianjera izy roa tonta.
  - type: heading
    content: Fanafihana an’i Ejipta
  '13':
  - type: text
    content: Hafatra nampitondrain’ny TOMPO an’i Jeremià mpaminany fony i Nebokadnetsara mpanjakan’i Babilôna tonga nanafika an’i Ejipta
  - type: note
    content: Ity ady nataon’ny Babilônianina tamin’i Ejipta ity dia tokony ho niseho nandritra ny ririnina 601-600 tal J.K; ampit Jer 43.10-13.
  - type: text
    content: ':'
  '14':
  - type: text
    content: Ambarao any Ejipta ny vaovao
  - type: text
    content: ary ampandreneso ao Migdôla
  - type: text
    content: sy ao Memfisa ary ao Tahapanehesa
  - type: note
    content: 'Migdôla: tanàna ejiptianina amin’ny sisin-tany avaratra atsinanan’i Ejipta (Eks 14.2; Jer 44.1). –Memfisa, Tahapanehesa: jereo 2.16 sy nta.'
  - type: text
    content: ','
  - type: text
    content: 'ka ataovy hoe: «Mivonòna hiady ary miomàna,'
  - type: text
    content: fa efa ripaky ny ady ny manodidina anao.»
  '15':
  - type: text
    content: Fa inona no miseho?
  - type: text
    content: Mianjera amin’ny tany
  - type: text
    content: ny ombalahy masina
  - type: note
    content: Amin’ny ejiptianina fahiny ny ombilahy masina tao Memfisa dia mampiseho ny hery mpiaro ny tanàna, eny ny tany manontolo mihitsy aza. Dkt hafa «nianjera amin’ny tany ireo lehilahy maherinao.»
  - type: text
    content: ' ianteheranao!'
  - type: text
    content: Tsy nahatohitra izy fa voatosiky ny TOMPO
  '16':
  - type: text
    content: Izay mampivembena miaramila maro
  - type: text
    content: sy mampianjera azy hifanindry.
  - type: text
    content: 'Dia nifampiresaka ireo hoe:'
  - type: text
    content: «Andeha isika hiverina any amin’ny firenentsika,
  - type: text
    content: dia any amin’ny tany nahaterahantsika,
  - type: text
    content: mba ho afaka amin’ny ady mandoza.»
  '17':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta kosa'
  - type: text
    content: 'dia omeo anaram-bosotra hoe:'
  - type: text
    content: «Rabetabataba tsy misy vokany
  - type: note
    content: 'dia omeo anaram-bosotra: araka ny dkt tranainy grika sy latinina ary siriaka; hebreo «tany izy no niantsoantso hoe».'
  - type: text
    content: .»
  '18':
  - type: text
    content: –Teny hentitra no ataon’ilay Mpanjaka
  - type: text
    content: 'Izay antsoina hoe «TOMPOn’izao rehetra izao»:'
  - type: text
    content: Velona aho ka mianiana fa ho tonga ny fahavalo.
  - type: text
    content: Azo antoka tahaka ny fisian’i Tabôra
  - type: text
    content: amin’ny samy tendrombohitra izany;
  - type: text
    content: azo antoka tahaka ny fisian’i Karmela
  - type: text
    content: izay mandòndona eo amoron-dranomasina!
  '19':
  - type: text
    content: Ry mponina any Ejipta ô, mifeheza entana
  - type: text
    content: mba handeha any amin’ny fahababoana.
  - type: text
    content: Fa hodorana ny tanànan’i Memfisa,
  - type: text
    content: ka ho lao tsy hisy mponina intsony.
  '2':
  - type: text
    content: 'Fanambaràna momba an’i Ejipta sy ny tafiky ny '
  - type: text
    content: Farao
  - type: text
    content: ' Nekao, mpanjakan’i Ejipta. Tao Karkemisy teo amoron’ny ony Eofrata i Nekao no resin’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ', tamin’ny taona fahefatra nanjakàn’i Jôiakima zanakalahin’i Josià mpanjakan’i Joda'
  - type: note
    content: 'Ny fiandohan’ny and 2 dia mitsangana ho lohahevitry ny and 2-28. –Nekao: jereo 2 Mp 23.29-35 sy ny naoty momba ny Jer 22.13. –Karkemisy: tanàn-dehibe any avaratr’i Mezôpôtamia, eo akaikin’ny sisin-tanin’i Siria sy Torkia ankehitriny. –ny taona fahefatra nanjakàn’i Jôiakima: jereo 22.13; 25.1 sy nta. –Momba an’i Ejipta: jereo Is 19.1 sy nta.'
  - type: text
    content: .
  '20':
  - type: text
    content: Toa ombivavy kely tsara tarehy i Ejipta!
  - type: text
    content: Kinanjo tamy avy any avaratra
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: ny fihitra hanaikitra azy!
  '21':
  - type: text
    content: Voakarakara toa ombilahy kely mifahy
  - type: text
    content: ireo miaramila mpikarama an’ady tao Ejipta.
  - type: text
    content: Nefa, na ireo koa aza, nihemotra
  - type: text
    content: ka samy lasa nandositra avokoa.
  - type: text
    content: Tsy nisy nahajoro nony tonga ny andro mahory
  - type: text
    content: izay hirotsahako an-tsehatra hamely azy.
  '22':
  - type: text
    content: Toy ny fitsaitsaikan’ny menarana
  - type: text
    content: no fialan’ny tafika ejiptianina,
  - type: text
    content: raha vao tonga hamely azy ny fahavalo
  - type: text
    content: izay toy ny mpikapa hazo mandrangaranga famaky.
  '23':
  - type: text
    content: Kapain’ireo ny alany, na dia matevina aza,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: text
    content: Fa marobe noho ny andiam-balala izy
  - type: text
    content: ka tsy tambo isaina.
  '24':
  - type: text
    content: 'Rakotra henatra ny mponin’i Ejipta:'
  - type: text
    content: eo an-tanan’ny vahoaka avy any avaratra
  - type: text
    content: no efa nanolorana azy!
  '25':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro Aho hirotsaka an-tsehatra hamely an’i Amôna andriamanitr’i Teba'
  - type: note
    content: 'Teba: tanàn-dehibe tany Ejipta ambony.'
  - type: text
    content: ', hamely an’i Ejipta sy ny andriamaniny ary ny mpanjakany, eny, hamely ny Farao sy izay rehetra miantehitra aminy. '
  '26':
  - type: text
    content: Hatolotro eo an-tanan’ireo mitady hahafaty azy izy, dia i Nebokadnetsara mpanjakan’i Babilôna mbamin’ireo miaramilany.
  - type: text
    content: Rehefa afaka izany, vao hiverina amin’ny laoniny toy ny taloha i Ejipta. Izany no teny hentitra avy amiko TOMPO.»
  - type: heading
    content: Afaka i Israely
  - type: heading
    content: (Jereo 30.10-11)
  '27':
  - type: text
    content: Aza matahotra kosa ianareo,
  - type: text
    content: ry taranak’i Jakôba mpanompoko.
  - type: text
    content: Aza kivy ianao, ry firenena Israely,
  - type: text
    content: fa indro Aho hamonjy anao
  - type: text
    content: avy any amin’ny faritany lavitra any;
  - type: text
    content: indro Aho hamonjy ireo taranakao
  - type: text
    content: avy any amin’ny tany izay nahababo azy.
  - type: text
    content: Hiverina ianareo, ry taranak’i Jakôba,
  - type: text
    content: ka hiadana sy handry feizay
  - type: text
    content: fa tsy hisy hanaitaitra intsony.
  '28':
  - type: text
    content: Ry taranak’i Jakôba mpanompoko,
  - type: text
    content: aza matahotra ianareo,
  - type: text
    content: satria Izaho no miaraka aminareo;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  - type: text
    content: Hofongorako ny firenen-kafa rehetra
  - type: text
    content: izay nanelezako anareo;
  - type: text
    content: ianareo kosa tsy mba hofongorako,
  - type: text
    content: na dia tsy maintsy faiziko
  - type: text
    content: araka ny hitsiny ihany aza
  - type: text
    content: fa tsy havelako ho afa-maina!
  '3':
  - type: text
    content: 'Manome baiko ny manamboninahitra hoe:'
  - type: text
    content: «Omany ny ampinga kely sy lehibe
  - type: text
    content: ary mandrosoa hiady.
  '4':
  - type: text
    content: Afatory ny lasely,
  - type: text
    content: ary taingeno ny soavaly!
  - type: text
    content: Anaovy ny satro-by fiarovan-doha ka milahara!
  - type: text
    content: Arangarangao ny lefona;
  - type: text
    content: iakanjoy ny akanjo vy fiarovan-tratra.»
  '5':
  - type: text
    content: Ahoana izao zavatra hitako izao?
  - type: text
    content: Raiki-tahotra izy ka mihemotra.
  - type: text
    content: Resy ireo miaramila mahery fo
  - type: text
    content: sady mitsoaka mandositra,
  - type: text
    content: ka tsy misy miherika akory.
  - type: text
    content: Fihorohoroana hatraiza hatraiza
  - type: note
    content: Jereo 6.25 sy nta.
  - type: text
    content: ','
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '6':
  - type: text
    content: Tsy afa-mandositra ny faingam-pandeha
  - type: text
    content: ary tsy mahavonjy tena ny mahery fo;
  - type: text
    content: fa any avaratra eo amoron’ny ony Eofrata izy
  - type: text
    content: no ho tafintohina ka hianjera.
  '7':
  - type: text
    content: Iza àry ity tahaka an’i Neily tondraka,
  - type: text
    content: na ireo sampany misy rano misamboaravoara?
  '8':
  - type: text
    content: I Ejipta no tahaka an’i Neily tondraka,
  - type: text
    content: na ireo sampany misy rano misamboaravoara,
  - type: text
    content: 'fa hoy izy hoe: «Hiakatra hanafotra ny tany aho,'
  - type: text
    content: ary handringana ny tanàna sy ny mponina ao aminy.
  '9':
  - type: text
    content: Manafiha amin’izay, ry soavaly,
  - type: text
    content: ary miriota mafy, ry kalesy!
  - type: text
    content: Aoka hiainga ny mahery fo,
  - type: text
    content: dia ireo olon’i Kosy sy Pota
  - type: text
    content: izay mpitondra ampinga kely
  - type: text
    content: sy ireo olon’i Loda izay mirongo tsipîka
  - type: note
    content: 'Kosy: faritanin’i Sodàna ankehitriny; ny dikany mahazatra dia i Etiôpia. –Pota, Loda: jereo ny naoty Is 66.19.'
  - type: text
    content: '!»'
