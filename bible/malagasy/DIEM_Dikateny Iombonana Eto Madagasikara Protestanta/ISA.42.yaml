document_id: ISA.42,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay mpanompon’ny Tompo
  - type: heading
    content: (tononkira voalohany)
  - type: text
    content: Indro ny mpanompoko
  - type: note
    content: 'Ny fiandohan’ny and 1 dia tsiahivina ao amin’ny Mt 3.17; 17.5; Mk 1.11; Lk 3,22; 9.35. –Ny and 1-4: jereo Mt 12,18-21.'
  - type: text
    content: ' izay tohanako,'
  - type: text
    content: ilay voafidiko sady ankasitrahiko.
  - type: text
    content: Napetrako tao aminy ny Fanahiko
  - type: text
    content: mba hamoahany ny lamina ara-drariny ho an’ny firenena.
  '10':
  - type: text
    content: Mihirà hira vaovao ho an’ny TOMPO;
  - type: text
    content: miderà Azy avy any am-paran’ny tany
  - type: text
    content: ianareo mpivezivezy eny an-dranomasina
  - type: text
    content: sy ianareo mponina any amin’ny nosy.
  '11':
  - type: text
    content: Aoka hanandra-peo ny tanàna any an-taniefitra
  - type: text
    content: sy ny any an-toby fonenan’ny Kedarita
  - type: note
    content: 'Kedarita: foko anankiray any Arabia avaratra; jereo 21.16 sy nta. –Harambato : angamba i Petrà , tanànamimanda ao amin’ny taniefitra edômita izany.'
  - type: text
    content: '!'
  - type: text
    content: Aoka hihoby ny mponina any amin’ny Harambato;
  - type: text
    content: avy any an-tampon-tendrombohitra any
  - type: text
    content: no aoka hanaovany hiram-pifaliana!
  '12':
  - type: text
    content: Hanome voninahitra ny TOMPO anie ireny;
  - type: text
    content: ary aoka hitory ny fiderana Azy
  - type: text
    content: ny mponina any amin’ny nosy lavitra!
  '13':
  - type: text
    content: Mandroso toy ny miaramila maherifo ny TOMPO
  - type: text
    content: ary vonona toy ny mpiantafika zatra ady.
  - type: text
    content: Miantsoantso manao hiakan’ady Izy;
  - type: text
    content: ka maneho hery hihantsiana an’ireo fahavalony.
  - type: heading
    content: Ny fikasan’ny Tompo
  '14':
  - type: text
    content: Efa hatry ny ela Aho no nangina,
  - type: text
    content: ka tsy nanao na inona na inona, hoy ny TOMPO.
  - type: text
    content: Fa izao kosa Aho mitaraina toy ny vehivavy miteraka
  - type: text
    content: izay sempotsempotra sady tsy avy miaina.
  '15':
  - type: text
    content: Hovolosako ny tendrombohitra sy ny havoana,
  - type: text
    content: ka hataoko maina ny ahi-maitso rehetra ao aminy;
  - type: text
    content: hovako ho tany hay ny ony
  - type: text
    content: ary hataoko maina ny farihy.
  '16':
  - type: text
    content: Ny jamba hampandehaniko
  - type: text
    content: amin’ny lalana tsy mbola fantany;
  - type: text
    content: sakeli-dalana tsy mbola hainy
  - type: text
    content: no hitarihako azy ireo.
  - type: text
    content: Hovako ho mazava ny haizina eo anatrehany
  - type: text
    content: ary ho mahitsy ny lala-miolakolaka.
  - type: text
    content: Hotanterahiko ireo fikasàko ireo
  - type: text
    content: fa tsy hisy havelako velively.
  '17':
  - type: text
    content: Aoka hianòtra amin-kenatra tokoa
  - type: text
    content: ianareo mitoky amin’ny sampy
  - type: text
    content: 'sady milaza amin’ny sarivongana hoe:'
  - type: text
    content: «Ianareo no andriamanitray.»
  - type: heading
    content: Vahoaka jamba sy marenina
  '18':
  - type: text
    content: Ianareo marenina, aoka handre;
  - type: text
    content: ary ianareo jamba, mahirata mba hahita.
  '19':
  - type: text
    content: Iza moa no jamba raha tsy ny mpanompoko?
  - type: text
    content: Ary iza no marenina tahaka ny iraka izay irahiko?
  - type: text
    content: Eny, iza no jamba tahaka ny mpitondrateniko,
  - type: text
    content: ary marenina tahaka ny mpanompoko?
  '2':
  - type: text
    content: Tsy hiantsoantso izy na hampiaka-peo
  - type: text
    content: sady tsy hanao kabary eny an-dalambe.
  '20':
  - type: text
    content: Betsaka ny zavatra hitany
  - type: text
    content: nefa tsy nisy tadidiny;
  - type: text
    content: manongilan-tsofina hihaino izy,
  - type: text
    content: nefa tsy misy zavatra reny.
  '21':
  - type: text
    content: Fa sitraky ny TOMPO ho fandresen’ny fahamarinany
  - type: text
    content: ny haneho fa lehibe sy heni-boninahitra ny lalànany,
  '22':
  - type: text
    content: 'ka indro ity vahoaka fa voaroba sy voasambotra:'
  - type: text
    content: naiditra am-ponja avokoa izy rehetra
  - type: text
    content: ary nahiboka an-tranomaizina.
  - type: text
    content: Voaroba nefa tsy nisy namonjy,
  - type: text
    content: 'voasambotra nefa tsy nisy nanao hoe: «Avereno!»'
  '23':
  - type: text
    content: Iza aminareo no hanongilan-tsofina
  - type: text
    content: handre izao teny izao
  - type: text
    content: ka ho mailo hihaino azy amin’ny ho avy?
  '24':
  - type: text
    content: Iza no nanolotra ny firenen’i Jakôba
  - type: text
    content: tamin’ny mpisambotra?
  - type: text
    content: Iza no nanolotra ny vahoaka Israely
  - type: text
    content: tamin’ny mpandroba?
  - type: text
    content: Moa ve tsy ny TOMPO izay nanotantsika?
  - type: text
    content: Satria ny vahoaka Israely tsy nety handeha
  - type: text
    content: tamin’ny lalana nosoritany,
  - type: text
    content: ary tsy nihaino ny lalànany.
  '25':
  - type: text
    content: Koa nazeran’ny TOMPO tamin’ny vahoaka Israely
  - type: text
    content: ny fahatezerany mirehitra sy ny ady mangotraka.
  - type: text
    content: Nandoro ny faritra manodidina an’i Israely izany,
  - type: text
    content: saingy tsy fantany velively;
  - type: text
    content: nandoro tao anatiny mihitsy aza izany,
  - type: text
    content: nefa tsy nahoany akory.
  '3':
  - type: text
    content: Tsy hotapahiny ny volotara folaka,
  - type: text
    content: ary tsy hovonoiny ny lahin-jiro manetona
  - type: text
    content: fa hamoaka ny lamina ara-drariny tokoa izy.
  '4':
  - type: text
    content: Tsy ho reraka na ho kivy izy
  - type: text
    content: mandra-panoriny ny lamina ara-drariny amin’ny tany
  - type: text
    content: fa hiandry dia hiandry ny lalànany
  - type: text
    content: ireo mponina any amin’ny nosy.
  - type: heading
    content: Fahazavana ho an’ny firenena rehetra
  '5':
  - type: text
    content: Izao no tenin’ny TOMPO Andriamanitra
  - type: text
    content: Izay nahary ny lanitra sy nanenjana azy hidadasika,
  - type: text
    content: Izay namelatra ny tany mbamin’ny zava-maniry vokariny,
  - type: text
    content: Izay manome fofonaina ho an’ny olona eo aminy
  - type: text
    content: sy fanahy ho an’ny mponina miriaria ao
  - type: note
    content: Ampit 17.24-25.
  - type: text
    content: ;
  - type: text
    content: eny, izao no tenin’ny TOMPO Andriamanitra
  - type: text
    content: 'amin’ilay mpanompo voafidiny:'
  '6':
  - type: text
    content: «Izaho TOMPO no niantso anao
  - type: text
    content: araka ny fahamarinana
  - type: text
    content: ka nitantana anao.
  - type: text
    content: Izaho no niaro anao ka nanendry anao
  - type: text
    content: ho antoky ny fanekempihavanako amin’ny olona
  - type: text
    content: ary koa ho fahazavan’ireo firenena
  - type: note
    content: 'fanekempihavanako... firenena: jereo 49.8; Lk 2.32; Asa 13.47; 26.23.'
  - type: text
    content: .
  '7':
  - type: text
    content: Dia hampahiratra ny mason’ny jamba ianao,
  - type: text
    content: hamoaka ny gadra avy ao am-ponja,
  - type: text
    content: eny, hamoaka ireo mipetraka anaty haizina
  - type: text
    content: hialany amin’ny trano nihazonana azy.»
  '8':
  - type: text
    content: Izaho no TOMPO, izany no anarako
  - type: text
    content: 'ka ny '
  - type: text
    content: voninahitro
  - type: text
    content: ' tsy homeko ny hafa'
  - type: text
    content: ary ny fiderana Ahy tsy avelako ho an’ny sampy.
  '9':
  - type: text
    content: Indro efa lasa iny ny zava-niseho voalohany
  - type: note
    content: Jereo 41.22 sy nta.
  - type: text
    content: ;
  - type: text
    content: koa zava-baovao indray no ambarako aminareo.
  - type: text
    content: Ary hampahafantariko anareo izany,
  - type: text
    content: na dia mbola tsy miseho aza.
  - type: heading
    content: Mirotsaka an-tsehatra ny Tompo
