segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ilay mpanompon’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: (tononkira voalohany)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro ny mpanompoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fiandohan’ny and 1 dia tsiahivina ao amin’ny Mt 3.17; 17.5; Mk 1.11; Lk 3,22; 9.35. –Ny and 1-4: jereo Mt 12,18-21.'
    marker-yv: yv-n
  - type: text
    text: ' izay tohanako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay voafidiko sady ankasitrahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Napetrako tao aminy ny Fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hamoahany ny lamina ara-drariny ho an’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy hiantsoantso izy na hampiaka-peo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hanao kabary eny an-dalambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy hotapahiny ny volotara folaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hovonoiny ny lahin-jiro manetona
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamoaka ny lamina ara-drariny tokoa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy ho reraka na ho kivy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandra-panoriny ny lamina ara-drariny amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hiandry dia hiandry ny lalànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo mponina any amin’ny nosy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahazavana ho an’ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izao no tenin’ny TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nahary ny lanitra sy nanenjana azy hidadasika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay namelatra ny tany mbamin’ny zava-maniry vokariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manome fofonaina ho an’ny olona eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fanahy ho an’ny mponina miriaria ao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 17.24-25.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, izao no tenin’ny TOMPO Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'amin’ilay mpanompo voafidiny:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Izaho TOMPO no niantso anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nitantana anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no niaro anao ka nanendry anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho antoky ny fanekempihavanako amin’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa ho fahazavan’ireo firenena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanekempihavanako... firenena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 49.8; Lk 2.32; Asa 13.47; 26.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia hampahiratra ny mason’ny jamba ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamoaka ny gadra avy ao am-ponja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hamoaka ireo mipetraka anaty haizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: hialany amin’ny trano nihazonana azy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho no TOMPO, izany no anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitro
  - type: text
    text: ' tsy homeko ny hafa'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fiderana Ahy tsy avelako ho an’ny sampy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indro efa lasa iny ny zava-niseho voalohany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 41.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa zava-baovao indray no ambarako aminareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampahafantariko anareo izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mbola tsy miseho aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mirotsaka an-tsehatra ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihirà hira vaovao ho an’ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: miderà Azy avy any am-paran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo mpivezivezy eny an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ianareo mponina any amin’ny nosy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka hanandra-peo ny tanàna any an-taniefitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny any an-toby fonenan’ny Kedarita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kedarita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: foko anankiray any Arabia avaratra; jereo 21.16 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Harambato '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': angamba i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Petrà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', tanànamimanda ao amin’ny taniefitra edômita izany.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hihoby ny mponina any amin’ny Harambato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-tampon-tendrombohitra any
- type: usfm
  marker: q1
  children:
  - type: text
    text: no aoka hanaovany hiram-pifaliana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hanome voninahitra ny TOMPO anie ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka hitory ny fiderana Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mponina any amin’ny nosy lavitra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandroso toy ny miaramila maherifo ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary vonona toy ny mpiantafika zatra ady.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoantso manao hiakan’ady Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka maneho hery hihantsiana an’ireo fahavalony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fikasan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa hatry ny ela Aho no nangina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy nanao na inona na inona, hoy ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izao kosa Aho mitaraina toy ny vehivavy miteraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay sempotsempotra sady tsy avy miaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hovolosako ny tendrombohitra sy ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataoko maina ny ahi-maitso rehetra ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hovako ho tany hay ny ony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko maina ny farihy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny jamba hampandehaniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny lalana tsy mbola fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sakeli-dalana tsy mbola hainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitarihako azy ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovako ho mazava ny haizina eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ho mahitsy ny lala-miolakolaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotanterahiko ireo fikasàko ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy hisy havelako velively.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka hianòtra amin-kenatra tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianareo mitoky amin’ny sampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady milaza amin’ny sarivongana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ianareo no andriamanitray.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vahoaka jamba sy marenina
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ianareo marenina, aoka handre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ianareo jamba, mahirata mba hahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza moa no jamba raha tsy ny mpanompoko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no marenina tahaka ny iraka izay irahiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, iza no jamba tahaka ny mpitondrateniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary marenina tahaka ny mpanompoko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Betsaka ny zavatra hitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nisy tadidiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manongilan-tsofina hihaino izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy misy zavatra reny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa sitraky ny TOMPO ho fandresen’ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny haneho fa lehibe sy heni-boninahitra ny lalànany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka indro ity vahoaka fa voaroba sy voasambotra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: naiditra am-ponja avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nahiboka an-tranomaizina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voaroba nefa tsy nisy namonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voasambotra nefa tsy nisy nanao hoe: «Avereno!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Iza aminareo no hanongilan-tsofina
- type: usfm
  marker: q1
  children:
  - type: text
    text: handre izao teny izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho mailo hihaino azy amin’ny ho avy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Iza no nanolotra ny firenen’i Jakôba
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny mpisambotra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nanolotra ny vahoaka Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny mpandroba?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa ve tsy ny TOMPO izay nanotantsika?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny vahoaka Israely tsy nety handeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny lalana nosoritany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy nihaino ny lalànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa nazeran’ny TOMPO tamin’ny vahoaka Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fahatezerany mirehitra sy ny ady mangotraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandoro ny faritra manodidina an’i Israely izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saingy tsy fantany velively;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nandoro tao anatiny mihitsy aza izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nahoany akory.
