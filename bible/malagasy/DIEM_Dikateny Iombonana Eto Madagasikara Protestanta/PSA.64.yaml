document_id: PSA.64,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Resen’Andriamanitra ny mpanendrikendrika
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira.
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mitolagaga avokoa ny besinimaro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manambara ny asan’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady maka anatra avy amin’izany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aoka ny olo-marina hifaly amin’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hanao Azy ho fialofany hatrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny mahitsy fo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifampiarahaba noho ny aminy!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andriamanitra ô, mitaraina aminao aho ka henoy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny aiko mba arovy amin’ny fahavalo atahorako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Afeno aho tsy ho azon’ny olon-dratsy mioko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho voan’ny mpanao heloka miray tetika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ranitiny ho toa sabatra ny lelany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teny mandratra no zana-tsipîka alefany;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: miafina izy mikendry ny olo-mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitifitra tampoka, tsy miahotrahotra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mifampirisika izy hanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifampidinika hamela-pandrika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka manao hoe: «Zovy no hahita antsika?»'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia ampiadîny eo ny teti-dratsiny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tomombana tsara ny paikantsika, hoy izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hay fantarina ny ao am-pon’olombelona!»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Indreo kosa izy tifirin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voan’ny zana-tsipîka tampotampoka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny tenin’ireo ihany no mifotitra aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra mahita azy, dia mihifi-doha.
