document_id: PSA.64,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Resen’Andriamanitra ny mpanendrikendrika
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Mitolagaga avokoa ny besinimaro
  - type: text
    content: ka manambara ny asan’Andriamanitra
  - type: text
    content: sady maka anatra avy amin’izany.
  '11':
  - type: text
    content: Aoka ny olo-marina hifaly amin’ny TOMPO
  - type: text
    content: sy hanao Azy ho fialofany hatrany;
  - type: text
    content: ary aoka ny mahitsy fo rehetra
  - type: text
    content: hifampiarahaba noho ny aminy!
  '2':
  - type: text
    content: Andriamanitra ô, mitaraina aminao aho ka henoy.
  - type: text
    content: Ny aiko mba arovy amin’ny fahavalo atahorako.
  '3':
  - type: text
    content: Afeno aho tsy ho azon’ny olon-dratsy mioko
  - type: text
    content: na ho voan’ny mpanao heloka miray tetika.
  '4':
  - type: text
    content: Ranitiny ho toa sabatra ny lelany,
  - type: text
    content: teny mandratra no zana-tsipîka alefany;
  '5':
  - type: text
    content: miafina izy mikendry ny olo-mahitsy,
  - type: text
    content: dia mitifitra tampoka, tsy miahotrahotra.
  '6':
  - type: text
    content: Mifampirisika izy hanao ratsy
  - type: text
    content: mifampidinika hamela-pandrika
  - type: text
    content: 'ka manao hoe: «Zovy no hahita antsika?»'
  '7':
  - type: text
    content: 'Dia ampiadîny eo ny teti-dratsiny:'
  - type: text
    content: «Tomombana tsara ny paikantsika, hoy izy.
  - type: text
    content: Tsy hay fantarina ny ao am-pon’olombelona!»
  '8':
  - type: text
    content: Indreo kosa izy tifirin’Andriamanitra
  - type: text
    content: ka voan’ny zana-tsipîka tampotampoka.
  '9':
  - type: text
    content: Ny tenin’ireo ihany no mifotitra aminy;
  - type: text
    content: izay rehetra mahita azy, dia mihifi-doha.
