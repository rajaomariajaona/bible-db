document_id: LEV.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny sorona fanalana ny ota
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'mitovy amin’ny tavin-kena alaina amin’ny ombilahy atao sorom-pihavanana izany. Avy eo dia hodoran’ny mpisorombe hanetona eo ambonin’ny alitara fanaovan-tsorona dorana ireo tavin-kena ireo. '
  '11':
  - type: text
    content: 'Fa ny hoditry ny ombalahy sy ny henany rehetra mbamin’ny lohany sy ny tongony ary ny taovany sy ny dikin-drorohany, '
  '12':
  - type: text
    content: 'izany hoe ny sisa rehetra amin’ilay ombilahy, dia hasainy hoentina any ivelan’ny toby, ho any amin’izay toerana '
  - type: text
    content: madio
  - type: text
    content: ' fanariana ny lavenona, ka hodorana eo ambony kitay hazo mirehitra izany; eo amin’ny toerana fanariana ny lavenona no handoroana azy.'
  - type: heading
    content: b. Sorona ho an’ny Fiangonan’ny Israelita tsivakivolo
  '13':
  - type: text
    content: '«Raha ny Fiangonan’ny Israelita tsivakivolo no manota tsy nahy ka nandika ny anankiray amin’ny didin’ny TOMPO momba ny zavatra tsy tokony hatao, dia meloka izy na tsy misy mahatsikaritra izany aza ny Fiangonany. '
  '14':
  - type: text
    content: 'Vao fantany kosa ny ota vitany, dia ombilahy no aoka hatolony ho fanalana izany ka hoentiny eo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ireo loholon’ny Fiangonana dia hametra-tanana amin’ny lohan’ilay ombilahy, eo anoloan’ny Toeramasin’ny TOMPO; ary loholona anankiray no hamono azy eo anoloan’ny Toeramasina. '
  '16':
  - type: text
    content: 'Hangalan’ny mpisorombe ny ran’ilay ombilahy ka hoentiny ho ao amin’ny Tranolay fihaonana; '
  '17':
  - type: text
    content: 'dia hatsobony ao amin’ny ra ny fanondrony, ka eo anoloan’ny '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ' izy no hamafy ra impito ny lafin’ilay efitra lamba atrehiny. '
  '18':
  - type: text
    content: 'Hakany koa io ra io hatentiny eo amin’ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ' eo anoloan’ny Toeramasina Indrindra, alitara izay ao anatin’ny Tranolay fihaonana. Ary ny ra sisa rehetra dia haidiny eo am-pototry ny alitara fanaovan-tsorona dorana, alitara izay eo am-baravaran’ny Tranolay fihaonana. '
  '19':
  - type: text
    content: 'Halainy avokoa ny tavin-kenan’ilay ombilahy, ka hodorany hanetona eo ambonin’ny alitara. '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: «Raha misy olona manota tsy nahy ka mandika ny anankiray amin’ireny didin’ny TOMPO momba ny zavatra tsy tokony hatao ireny, dia sorona fanalana ny ota no aoka hataony.
  - type: heading
    content: a. Sorona ho an’ny mpisorombe
  '20':
  - type: text
    content: 'Toy ny nataon’izy mpisorombe tamin’ny ombilahy natolony ho fanalana ny otany no hataony ihany koa amin’ity ombilahy ity. Ary rehefa nataon’ny mpisorombe tamin’ireo Israelita ny fombam-pivavahana famelana, dia voavela ny otany. '
  '21':
  - type: text
    content: Ny sisa amin’ilay ombilahy kosa hasain’ny mpisorombe hoentina any ivelan’ny toby, dia hodorana tahaka ny sisa tamin’ilay ombilahy natao sorona ho azy mpisorombe. Izany no sorona fanalana ny ota ho an’ny fiangonan’ny Israelita.
  - type: heading
    content: d. Sorona ho an’ny manampahefana
  '22':
  - type: text
    content: '«Raha manampahefana no manota tsy nahy ka nandika ny anankiray amin’ny didin’ny TOMPO Andriamanitra momba ny zavatra tsy tokony hatao, dia meloka izy. '
  '23':
  - type: text
    content: 'Vantany vao fantatr’ilay manampahefana ny ota vitany, dia osilahy tsy misy kilema no aoka ho sorona hoentiny. '
  '24':
  - type: text
    content: 'Hametra-tanana amin’ny lohan’ilay osilahy izy, dia hamono azy eo amin’ny toerana famonoana ny sorona dorana manontolo, eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO; sorona fanalana ny ota izany. '
  '25':
  - type: text
    content: 'Hangalan’ny mpisorona amin’ny fanondrony ny ran’ilay osilahy ka hatentiny eo amin’ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ' fanaovan-tsorona dorana; ary ny ra sisa dia haidiny eo am-pototr’io alitara io ihany. '
  '26':
  - type: text
    content: Avy eo ny tavin-kena rehetra dia hodorany hanetona eo ambonin’ny alitara tahaka ny fanao azy amin’ny sorom-pihavanana. Ary rehefa nataon’ny mpisorona tamin’ilay mpanapaka ny fombam-pivavahana famelana, dia voavela ny otany.
  - type: heading
    content: e. Sorona ho an’ny olona iray anisan’ny vahoaka israelita
  '27':
  - type: text
    content: '«Raha olona iray anisan’ny vahoaka israelita no nanota tsy nahy ka nandika ny anankiray amin’ny didin’ny TOMPO momba ny zavatra tsy tokony hatao, dia meloka izy. '
  '28':
  - type: text
    content: 'Vantany vao fantatr’ilay olona ny ota vitany, dia osivavy tsy misy kilema no aoka ho sorona hoentiny noho ny ota vitany. '
  '29':
  - type: text
    content: 'Hametra-tanana amin’ny lohan’ilay osivavy izy, dia hamono azy eo amin’ny toerana famonoana ny sorona dorana manontolo. '
  '3':
  - type: text
    content: '«Rehefa ilay mpisorombe no manota, dia mahameloka ny vahoaka rehetra izy; ka noho ny ota vitany, dia ombilahy tsy misy kilema no aoka hatolony amin’ny TOMPO mba ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota. '
  '30':
  - type: text
    content: 'Hangalan’ny mpisorona amin’ny fanondrony ny ra, ka hatentiny eo amin’ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ' fanaovan-tsorona dorana; ary ny ra sisa rehetra dia haidiny eo ampototr’io alitara io ihany. '
  '31':
  - type: text
    content: Hoesoriny avokoa ny tavin-kena rehetra, tahaka ny fanesorana azy amin’ny sorom-pihavanana, ka hodorany hanetona eo ambonin’ny alitara ho hanitra ankasitrahina ho an’ny TOMPO. Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany
  - type: note
    content: 'And 27-31: jereo Nom 15.27-28.'
  - type: text
    content: .
  '32':
  - type: text
    content: '«Raha ondry no entin’ilay olona mba ho sorona fanalana ny ota, dia aoka ny vavy tsy misy kilema no hoentiny. '
  '33':
  - type: text
    content: 'Hametra-tanana amin’ny lohan’ilay ondry izy, dia hamono azy eo amin’ny toerana famonoana ny sorona dorana manontolo. '
  '34':
  - type: text
    content: 'Hangalan’ny mpisorona amin’ny fanondrony ny ran’ilay ondry ka hatentiny eo amin’ny tandroky ny alitara fanaovan-tsorona dorana; ary ny ra sisa rehetra dia haidiny eo am-pototr’io alitara io ihany. '
  '35':
  - type: text
    content: Hoesoriny avokoa ny tavin-kena rehetra toy ny fanesorana azy amin’ny ondry atao sorom-pihavanana; dia hodorany hanetona eo ambonin’ny alitara izany, miaraka amin’ny sorona levonina amin’ny afo mba ho an’ny TOMPO. Ary rehefa nataon’ny mpisorona tamin’ilay olona ny fombam-pivavahana famelana, dia voavela ny otany.
  '4':
  - type: text
    content: 'Izy mpisorombe no hitondra ny ombilahy ho eo akaikin’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', ho eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO; dia hametra-tanana eo amin’ny lohan’ilay ombilahy izy ka hamono azy eo anoloan’ny Toeramasina. '
  '5':
  - type: text
    content: 'Ary hangalan’ny mpisorombe ny ran’ny ombilahy ka hoentiny ho ao amin’ny Tranolay fihaonana; '
  '6':
  - type: text
    content: 'dia hatsobony ao amin’ny ra ny fanondrony, ka eo anoloan’ny Toeramasina Indrindra izy no hamafy ra impito ny lafin’ilay efitra lamba atrehiny. '
  '7':
  - type: text
    content: 'Hotentenany ra koa ny tandroky ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana ditin-kazo manitra eo anoloan’ny Toeramasina Indrindra, alitara izay ao anatin’ny Tranolay fihaonana; ary ny ra sisa rehetra, avy amin’ilay ombilahy, dia haidiny eo am-pototry ny alitara fanaovan-tsorona dorana, alitara izay eo anoloan’ny varavaran’ny Tranolay fihaonana. '
  '8':
  - type: text
    content: 'Halain’ny mpisorombe avokoa ny tavin-kenan’ilay ombilahy atao sorona ho fanalana ny ota, dia ny safodrorohany sy ny jaboran-tsinainy, '
  '9':
  - type: text
    content: 'ny voany roa mbamin’ny jabora izay miraikitra amin’ny voany sy amin’ny takibany, ary koa ny ila-atiny izay hataony indray manala amin’ny voany: '
