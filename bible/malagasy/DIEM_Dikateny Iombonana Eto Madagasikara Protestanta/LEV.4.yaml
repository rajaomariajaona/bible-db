      text: '«Raha ny Fiangonan’ny Israelita tsivakivolo no manota tsy nahy ka nandika ny anankiray amin’ny didin’ny TOMPO momba ny zavatra tsy tokony hatao, dia meloka izy na tsy misy mahatsikaritra izany aza ny Fiangonany. '
