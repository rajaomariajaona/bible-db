document_id: LEV.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sorom-pihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa misy manolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-pihavanana
  - type: text
    text: ' ka ombilahy na ombivavy no atolony, dia izay tsy misy kilema no aoka hatolony eo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin
  - type: text
    text: '’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny mpanolotra no hametra-tanana eo amin’ny lohan’ilay omby hatao sorona, ka hamono azy eo anoloan’ny varavaran’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '; ireo mpisorona taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’io omby sorom-pihavanana io, dia halain’izy mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tavin-kena dia noheverina ho hena tsara indrindra, jereo Is 25.6.
    marker-yv: yv-n
  - type: text
    text: ': ny safodrorohany sy ny jaboran-tsinainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ireo taranak’i Aharôna kosa handoro izany hanetona eo ambonin’ny alitara, miaraka amin’ireo sorona dorana manontolo eo ambonin’ny kitay mirehitra. Sakafo levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Rehefa ondry na osy no atolotra amin’ny TOMPO ho sorom-pihavanana, dia izay tsy misy kilema, na lahy na vavy, no aoka hatolotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa ondry no atolotra ho fanatitra, dia hoentina eo anoloan’ny Toeramasin’ny TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpanolotra no hametra-tanana eo amin’ny lohan’ilay zanakondry ka hamono azy eo anoloan’ny Tranolay fihaonana; ireo taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin’io ondry sorom-pihavanana io, dia halain’ny mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto: ny hofany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 29.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' manontolo esorina amin’ny hazon-damosiny; ny safodrorohany sy ny jaboran-tsinainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny anankiray amin’ny mpisorona kosa handoro izany hanetona eo ambonin’ny alitara. Sakafo levonina amin’ny afo ho an’ny TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Rehefa osy no atolotra, dia hoentina eo anoloan’ny Toeramasin’ny TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny mpanolotra no hametra-tanana amin’ny lohan’ilay osy ka hamono azy eo anoloan’ny Tranolay fihaonana; ireo taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin’io osy io, dia halain’ny mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto: ny safodrorohany ny jaboran-tsinainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny anankiray amin’ny mpisorona kosa handoro izany hanetona eo ambonin’ny alitara. Sakafo levonina amin’ny afo ho hanitra ankasitrahina izany.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny faritra matavy rehetra dia atokana ho an’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lalàna raikitra ho anareo izany hatrany hatrany, ary na aiza na aiza onenanareo: tsy hihinana jabora na ra akory ianareo!».'
