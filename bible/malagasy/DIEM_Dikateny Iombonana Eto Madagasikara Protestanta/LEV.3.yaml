document_id: LEV.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny sorom-pihavanana
  - type: text
    content: 'Rehefa misy manolotra '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' ka ombilahy na ombivavy no atolony, dia izay tsy misy kilema no aoka hatolony eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO. '
  '10':
  - type: text
    content: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  '11':
  - type: text
    content: Ny anankiray amin’ny mpisorona kosa handoro izany hanetona eo ambonin’ny alitara. Sakafo levonina amin’ny afo ho an’ny TOMPO izany.
  '12':
  - type: text
    content: '«Rehefa osy no atolotra, dia hoentina eo anoloan’ny Toeramasin’ny TOMPO izany. '
  '13':
  - type: text
    content: 'Ny mpanolotra no hametra-tanana amin’ny lohan’ilay osy ka hamono azy eo anoloan’ny Tranolay fihaonana; ireo taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny alitara. '
  '14':
  - type: text
    content: 'Amin’io osy io, dia halain’ny mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto: ny safodrorohany ny jaboran-tsinainy; '
  '15':
  - type: text
    content: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  '16':
  - type: text
    content: Ny anankiray amin’ny mpisorona kosa handoro izany hanetona eo ambonin’ny alitara. Sakafo levonina amin’ny afo ho hanitra ankasitrahina izany.
  - type: text
    content: '«Ny faritra matavy rehetra dia atokana ho an’ny TOMPO. '
  '17':
  - type: text
    content: 'Lalàna raikitra ho anareo izany hatrany hatrany, ary na aiza na aiza onenanareo: tsy hihinana jabora na ra akory ianareo!».'
  '2':
  - type: text
    content: 'Ny mpanolotra no hametra-tanana eo amin’ny lohan’ilay omby hatao sorona, ka hamono azy eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '; ireo mpisorona taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '3':
  - type: text
    content: Amin’io omby sorom-pihavanana io, dia halain’izy mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto
  - type: note
    content: Ny tavin-kena dia noheverina ho hena tsara indrindra, jereo Is 25.6.
  - type: text
    content: ': ny safodrorohany sy ny jaboran-tsinainy; '
  '4':
  - type: text
    content: 'ny voany roa mbamin’ny tavy miraikitra amin’ny voany sy amin’ny takibany; ary ny tavy saron’atiny izay atao indray manala amin’ny voany. '
  '5':
  - type: text
    content: Ireo taranak’i Aharôna kosa handoro izany hanetona eo ambonin’ny alitara, miaraka amin’ireo sorona dorana manontolo eo ambonin’ny kitay mirehitra. Sakafo levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO izany.
  '6':
  - type: text
    content: '«Rehefa ondry na osy no atolotra amin’ny TOMPO ho sorom-pihavanana, dia izay tsy misy kilema, na lahy na vavy, no aoka hatolotra. '
  '7':
  - type: text
    content: 'Rehefa ondry no atolotra ho fanatitra, dia hoentina eo anoloan’ny Toeramasin’ny TOMPO izany. '
  '8':
  - type: text
    content: 'Ny mpanolotra no hametra-tanana eo amin’ny lohan’ilay zanakondry ka hamono azy eo anoloan’ny Tranolay fihaonana; ireo taranak’i Aharôna kosa hamafy ny ra manodidina amin’ny rindrin’ny alitara. '
  '9':
  - type: text
    content: 'Amin’io ondry sorom-pihavanana io, dia halain’ny mpanolotra mba holevonina amin’ny afo ho an’ny TOMPO ireto tavin-kena ireto: ny hofany'
  - type: note
    content: Jereo Eks 29.22 sy nta.
  - type: text
    content: ' manontolo esorina amin’ny hazon-damosiny; ny safodrorohany sy ny jaboran-tsinainy; '
