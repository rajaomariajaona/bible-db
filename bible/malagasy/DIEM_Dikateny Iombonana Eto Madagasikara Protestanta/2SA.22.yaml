    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nanao izao tononkira izao ho an’ny TOMPO i Davida tamin’ny andro izay nanafahany azy tamin’ireo fahavalony rehetra, indrindra tamin’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka hoy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny TOMPO no harambato
- type: usfm
  marker: q1
  children:
  - type: text
    text: fierena azo antoka ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izy no Andriamanitro
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy vatolampy ialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampinga fiarovana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy herim-pandresena ho ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady toeram-pamaharana fandosirako Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mpamonjy mahafaka ahy amin’ny fampahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hoderaina anie ny TOMPO! Fa niantso Azy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia voavonjy ho afaka amin’ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny onja manototra ahy ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nampitahotra ahy toa riaka mandrava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: toy ny fatotra ahodidina ahy ny toeran’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toa harato amandrihana ahy ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tao an-katerena aho no velon-taraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy niantso vonjy tamin’ny TOMPO Andriamanitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tany an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tempoliny
  - type: text
    text: ' Izy no nandre ny feoko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa nihaino izany antsoantsoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’izay dia nihovitrovitra mafy ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nikorosy ny fiorenan’ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
