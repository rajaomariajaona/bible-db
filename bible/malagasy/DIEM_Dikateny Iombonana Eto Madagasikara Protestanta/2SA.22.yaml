    - type: text
      text: '27'
  - type: text
    text: madio Ianao amin’izay madio,
- type: usfm
  marker: q1
  children:
  - type: text
    text: miolakolaka kosa amin’izay mpiolikolika.
- type: usfm
  marker: q1
