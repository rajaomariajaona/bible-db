- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Omenao hery hoenti-miady manko aho,
- type: usfm
  marker: q1
  children:
  - type: text
