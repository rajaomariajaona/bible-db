document_id: 2SA.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida misaotra an’Andriamanitra taorian’ny fandreseny
  - type: heading
    content: (Jereo Sal 18)
  - type: text
    content: 'Dia nanao izao tononkira izao ho an’ny TOMPO i Davida tamin’ny andro izay nanafahany azy tamin’ireo fahavalony rehetra, indrindra tamin’i Saoly. '
  '10':
  - type: text
    content: Dia nandetsy ny lanitra ny TOMPO ka nidina;
  - type: text
    content: rahona matevina no teo ambany tongony,
  '11':
  - type: text
    content: 'ka toy ny '
  - type: text
    content: kerobima
  - type: text
    content: ' nitaingenany izany;'
  - type: text
    content: dia nanidina sy nisosa Izy
  - type: text
    content: ka teo amin’ny elatry ny rivotra no niseho.
  '12':
  - type: text
    content: Tao anaty raho-mainty Izy no niery
  - type: text
    content: ka voahodidina rahona miavosa
  - type: text
    content: izay vesaran’ny rano mamonto azy.
  '13':
  - type: text
    content: Manoloana Azy nisy hazavam-be
  - type: text
    content: izay niteraka afo mitselatra.
  '14':
  - type: text
    content: Tany an-danitra ny TOMPO Avo Indrindra
  - type: text
    content: no nampitalakotroka ny varatra
  - type: text
    content: sy nampanakoako izany feony;
  '15':
  - type: text
    content: nalefany ny tselatra ka nipariaka
  - type: text
    content: toy ny zana-tsipîka nifanaretsaka.
  '16':
  - type: text
    content: Noho ny fandrahonan’ny TOMPO
  - type: text
    content: mbamin’ny fifofofofon’ny hatezerany,
  - type: text
    content: dia niseho ny fanambanin’ny ranomasimbe,
  - type: text
    content: niharihary ny fanorenan’izao tontolo izao.
  '17':
  - type: text
    content: Avy eny an-danitra ambony Izy
  - type: text
    content: no naninji-tanana handray ahy
  - type: text
    content: sy nisintona ahy hiala tamin-dranobe;
  '18':
  - type: text
    content: ka afaka aho tamin’ny fahavaloko matanjaka,
  - type: text
    content: dia tamin’ireo mpandrafy mahery noho izaho.
  '19':
  - type: text
    content: Tamin’ny androm-pahoriako no nanafika ahy ireo
  - type: text
    content: nefa tonga ny TOMPO ka nanohana ahy;
  '2':
  - type: text
    content: 'Ka hoy izy hoe:'
  - type: text
    content: Ny TOMPO no harambato
  - type: text
    content: fierena azo antoka ho ahy.
  '20':
  - type: text
    content: navoakany ho eo an-kalalahana aho
  - type: text
    content: ary nafahany satria tena tiany.
  '21':
  - type: text
    content: Soa no ataon’ny TOMPO ahy satria marina aho;
  - type: text
    content: izany no avaliny ahy satria madio ny toetrako,
  '22':
  - type: text
    content: fa voatandriko ny sori-dalan’ny TOMPO
  - type: text
    content: ary tsy ivadihako ilay Andriamanitro;
  '23':
  - type: text
    content: ankatoaviko avokoa ny fitsipiny
  - type: text
    content: ary tsy mba ialako ireo didiny.
  '24':
  - type: text
    content: koa tsy manan-tsiny aho aminy
  - type: text
    content: fa nitandrin-tena tsy ho diso.
  '25':
  - type: text
    content: Eny, soa tokoa no navalin’ny TOMPO ahy
  - type: text
    content: satria marina aho sy hitany madio toetra.
  '26':
  - type: text
    content: TOMPO ô, mahatoky Ianao
  - type: text
    content: amin’izay matoky Anao;
  - type: text
    content: tsy manan-tsiny koa Ianao
  - type: text
    content: amin’izay tsy manan-tsiny;
  '27':
  - type: text
    content: madio Ianao amin’izay madio,
  - type: text
    content: miolakolaka kosa amin’izay mpiolikolika.
  '28':
  - type: text
    content: Ianao mihitsy no mamonjy ny vahoaka ory,
  - type: text
    content: fa mampitanondrika an’ireo mpiavonavona.
  '29':
  - type: text
    content: TOMPO ô, jiro mirehitra ho ahy Ianao;
  - type: text
    content: eny, TOMPO ô, Ianao no manazava izany haiziko.
  '3':
  - type: text
    content: Izy no Andriamanitro
  - type: text
    content: sy vatolampy ialofako,
  - type: text
    content: ampinga fiarovana
  - type: text
    content: sy herim-pandresena ho ahy.
  - type: text
    content: Sady toeram-pamaharana fandosirako Izy,
  - type: text
    content: no mpamonjy mahafaka ahy amin’ny fampahoriana.
  '30':
  - type: text
    content: Noho Ianao Andriamanitro,
  - type: text
    content: na hady aza itsambikinako
  - type: note
    content: 'na hady aza itsambikinako: dkt hafa na antoko miaramila iray aza iantorahako.'
  - type: text
    content: ','
  - type: text
    content: na manda aza ihoarako.
  '31':
  - type: text
    content: Lavorary ny sori-dalan’Andriamanitra,
  - type: text
    content: azo antoka ny torohevitry ny TOMPO;
  - type: text
    content: toy ny ampinga fiarovana Izy
  - type: text
    content: ho an’izay rehetra mialoka aminy.
  '32':
  - type: text
    content: Fa iza moa no Andriamanitra
  - type: text
    content: afa-tsy ny TOMPO ihany?
  - type: text
    content: Ary iza no vatolampy ho anay
  - type: text
    content: afa-tsy ilay Andriamanitray?
  '33':
  - type: text
    content: Izy no mpiaro mahery ho ahy
  - type: text
    content: sy mampizotra ahy lalana lavorary;
  '34':
  - type: text
    content: Ataony kinga toy ny gazela aho
  - type: text
    content: ary ajorony amin’ny toerana avo
  - type: note
    content: 'amin’ny toerana avo: araka ny dkt grika tranainy; hebreo amin’ny toerako avo. –Jereo Hab 3.19.'
  - type: text
    content: ;
  '35':
  - type: text
    content: Izy no manofana ahy ho amin’ny ady
  - type: text
    content: ka ahaizako manenjana tsipîka varahina.
  '36':
  - type: text
    content: Ny ampingam-pandresenao
  - type: text
    content: no atolotrao ahy, Tompo ô;
  - type: text
    content: mamaly ny antsoko Ianao
  - type: text
    content: ary koa manandratra ahy.
  '37':
  - type: text
    content: Ataonao faingam-pandeha kokoa aho,
  - type: text
    content: nefa ny hato-tongotro tsy hangozohozo.
  '38':
  - type: text
    content: Manenji-pahavalo aho ka mandripaka azy,
  - type: text
    content: ary tsy miverina raha tsy efa ringako izy.
  '39':
  - type: text
    content: Ringaniko sy montsaniko ireo
  - type: text
    content: ka tsy hiarina intsony
  - type: text
    content: ary dia mitsitra ambany tongotro.
  '4':
  - type: text
    content: Hoderaina anie ny TOMPO! Fa niantso Azy aho,
  - type: text
    content: dia voavonjy ho afaka amin’ny fahavaloko.
  '40':
  - type: text
    content: Omenao hery hoenti-miady manko aho,
  - type: text
    content: ka adabokao ho ambaniko ny mpamely ahy.
  '41':
  - type: text
    content: Ataonao mandositra ahy ny fahavaloko
  - type: text
    content: ary aringako ireo mpankahala ahy.
  '42':
  - type: text
    content: Miherikerika mitady vonjy izy,
  - type: text
    content: kanefa tsy misy mamonjy;
  - type: text
    content: ny TOMPO no antsoiny fa tsy mamaly azy.
  '43':
  - type: text
    content: Kosehiko toa vovoka entin-drivotra ireny;
  - type: text
    content: hoseko toy ny fotaka eny an-dalam-be.
  '44':
  - type: text
    content: Afahanao amin’ny vahoaka mpikomy aho
  - type: text
    content: ary arovanao ho filohan’ireo firenena;
  - type: text
    content: ka olona tsy fantatro akory
  - type: text
    content: no indro manjary manompo ahy.
  '45':
  - type: text
    content: Vahiny no tonga mila sitraka amiko;
  - type: text
    content: teny kely no ataoko, dia ekeny aho.
  '46':
  - type: text
    content: Mikoy ry zareo ka mangovitra
  - type: text
    content: no miala ny manda fiarovany.
  '47':
  - type: text
    content: Velona ny TOMPO! Isaorana ilay Vatolampiko.
  - type: text
    content: Hasandratra anie Andriamanitra
  - type: text
    content: vatolampy mampandresy ahy.
  '48':
  - type: text
    content: Izy no manao ny famaliana ho ahy
  - type: text
    content: ary mampanaiky firenena hofeheziko.
  '49':
  - type: text
    content: TOMPO ô, afahanao amin’ny fahavaloko aho;
  - type: text
    content: eny, ataonao resiko ireo mpamely ahy
  - type: text
    content: ary tsy mahazo ahy ny mpanao an-keriny.
  '5':
  - type: text
    content: Toy ny onja manototra ahy ny fahafatesana
  - type: text
    content: sady nampitahotra ahy toa riaka mandrava;
  '50':
  - type: text
    content: Koa eo anivom-pirenena no hiderako Anao
  - type: text
    content: sady hankalazako Anao amin-kira
  - type: note
    content: Jereo Rm 15.9.
  - type: text
    content: .
  '51':
  - type: text
    content: Ny TOMPO manome fandresena lehibe
  - type: text
    content: ho an’ilay mpanjaka voafidiny;
  - type: text
    content: ary maneho fitia an’ilay voahosony,
  - type: text
    content: dia i Davida sy ireo taranany
  - type: text
    content: hatrany amin’ny mandrakizay.
  '6':
  - type: text
    content: toy ny fatotra ahodidina ahy ny toeran’ny maty,
  - type: text
    content: toa harato amandrihana ahy ny fahafatesana.
  '7':
  - type: text
    content: Tao an-katerena aho no velon-taraina
  - type: text
    content: sy niantso vonjy tamin’ny TOMPO Andriamanitro,
  - type: text
    content: ka tany an-
  - type: text
    content: Tempoliny
  - type: text
    content: ' Izy no nandre ny feoko'
  - type: text
    content: ary koa nihaino izany antsoantsoko.
  '8':
  - type: text
    content: Tamin’izay dia nihovitrovitra mafy ny tany;
  - type: text
    content: nikorosy ny fiorenan’ny lanitra,
  - type: text
    content: ka nihozongozona ireny fa tezitra ny TOMPO.
  '9':
  - type: text
    content: Nisy setroka nidonaka avy teo an’orony
  - type: text
    content: ary afo mandevona avy teo am-bavany,
  - type: text
    content: ka narahina tselatra mandoro izany.
