  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa iza moa no Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ny TOMPO ihany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no vatolampy ho anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-tsy ilay Andriamanitray?
- type: usfm
  marker: q1
  children:
