  - type: text
    text: TOMPO ô, mahatoky Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’izay matoky Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy manan-tsiny koa Ianao
- type: usfm
  marker: q1
  children:
  - type: text
