    text: kanefa tsy misy mamonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPO no antsoiny fa tsy mamaly azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Kosehiko toa vovoka entin-drivotra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoseko toy ny fotaka eny an-dalam-be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Afahanao amin’ny vahoaka mpikomy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary arovanao ho filohan’ireo firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka olona tsy fantatro akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: no indro manjary manompo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Vahiny no tonga mila sitraka amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: teny kely no ataoko, dia ekeny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mikoy ry zareo ka mangovitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: no miala ny manda fiarovany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Velona ny TOMPO! Isaorana ilay Vatolampiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hasandratra anie Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: vatolampy mampandresy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Izy no manao ny famaliana ho ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampanaiky firenena hofeheziko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: TOMPO ô, afahanao amin’ny fahavaloko aho;
- type: usfm
  marker: q1
