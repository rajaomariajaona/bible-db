- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ringaniko sy montsaniko ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hiarina intsony
- type: usfm
  marker: q1
  children:
  - type: text
