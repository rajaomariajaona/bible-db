- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Soa no ataon’ny TOMPO ahy satria marina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no avaliny ahy satria madio ny toetrako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa voatandriko ny sori-dalan’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy ivadihako ilay Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ankatoaviko avokoa ny fitsipiny
- type: usfm
  marker: q1
  children:
  - type: text
