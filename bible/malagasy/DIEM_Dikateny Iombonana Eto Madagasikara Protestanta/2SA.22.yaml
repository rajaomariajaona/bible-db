- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avy eny an-danitra ambony Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no naninji-tanana handray ahy
- type: usfm
  marker: q1
  children:
  - type: text
