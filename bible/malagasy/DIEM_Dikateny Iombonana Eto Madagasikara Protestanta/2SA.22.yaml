- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ka afaka aho tamin’ny fahavaloko matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tamin’ireo mpandrafy mahery noho izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
