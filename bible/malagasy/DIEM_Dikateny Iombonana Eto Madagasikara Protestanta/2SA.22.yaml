- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Manenji-pahavalo aho ka mandripaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
