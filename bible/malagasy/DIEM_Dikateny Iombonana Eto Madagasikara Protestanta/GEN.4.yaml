document_id: GEN.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Niraisan’i Adama i Eva vadiny, ka nitoe-jaza. Dia niteraka an’i Kaina izy, ary nanao hoe: «Nahazo zazalahy noho ny amin’ny TOMPO aho'
  - type: note
    content: 'nahazo zazalahy noho ny amin’ny TOMPO aho: dkt hafa nahary lehilahy... Ny matoanteny hebreo Kanah (mahary, mahazo) sy ny anarana hoe Kaina dia mitovitovy fanonona. Ny karazana tsilalaon-teny toy izany dia fahita matetika ao amin’ny Testamenta Taloha. (Jereo Gen 29.32-34).'
  - type: text
    content: '.» '
  '10':
  - type: text
    content: 'Fa hoy kosa ny TOMPO hoe:'
  - type: text
    content: –Inona ity nataonao? Ny feon’ny ran’ny rahalahinao
  - type: note
    content: 'Ny ran’i Abela: jereo Heb 12.24.'
  - type: text
    content: ' mitaraina amiko avy ao amin’ny tany. '
  '11':
  - type: text
    content: 'Ankehitriny dia manozona anao ny tany izay misokatra hitelina ny ran’ny rahalahinao. '
  '12':
  - type: text
    content: Raha hamboly ny tany ianao, dia tsy hanome vokatra ho anao intsony izy; ka dia ho mpitsoa-ponenana sy ho mpirenireny eny ambonin’ny tany ianao.
  '13':
  - type: text
    content: 'Dia niteny tamin’ny TOMPO i Kaina hoe:'
  - type: text
    content: '–Mavesatra loatra ny heloko! '
  '14':
  - type: text
    content: Indro roahinao hiala eo amin’ny tany mahavokatra aho ankehitriny, ka tsy maintsy hiery lavitra Anao; ho mpitsoa-ponenana sy ho mpirenireny eny ambonin’ny tany aho, ka izay rehetra mahita ahy dia hamono ahy ho faty!
  '15':
  - type: text
    content: 'Fa namaly azy ny TOMPO hoe:'
  - type: text
    content: –Tsia, fa na iza na iza mamono anao ho faty, dia hovaliana impito heny.
  - type: text
    content: 'Dia nametrahan’ny TOMPO famantarana teo amin’i Kaina mba tsy hisy hamono azy ho faty izay mifanena aminy. '
  '16':
  - type: text
    content: Ary niala teo anatrehan’ny TOMPO i Kaina, ka nonina tao amin’ny tanin’i Nôda
  - type: note
    content: 'Nôda: tany tsy fantatra izay misy azy, fa angamba anarana an’ohatra ihany io.'
  - type: text
    content: ', any atsinanan’i Hedena.'
  - type: heading
    content: Ny taranak’i Kaina
  '17':
  - type: text
    content: 'Niraisan’i Kaina ny vadiny, dia nitoe-jaza ka niteraka an’i Henôka. Dia nanorina tanàna i Kaina, ka nampitondrainy ny anaran’i Henôka zanany lahy. '
  '18':
  - type: text
    content: I Henôka no ray niteraka an’i Hirada; i Hirada no ray niteraka an’i Mehojaela; i Mehojaela no ray niteraka an’i Metosaela; ary i Metosaela kosa no ray niteraka an’i Lamèka.
  '19':
  - type: text
    content: 'Nanambady anankiroa i Lamèka: ny voalohany dia natao hoe Hadà, ary ny faharoa nantsoina hoe Tsilà. '
  '2':
  - type: text
    content: 'Dia mbola niteraka an’i Abela rahalahiny koa izy. Ary i Abela dia '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry, fa i Kaina kosa mpamboly. '
  '20':
  - type: text
    content: 'I Hadà dia niteraka an’i Jabala: io no razamben’ireo mpitoetra an-day miaraka amin’ny biby fiompy. '
  '21':
  - type: text
    content: 'Nisy rahalahiny natao hoe Jobala, io no razamben’ireo rehetra mpitendry kabôsy sy mpitsoka sodina. '
  '22':
  - type: text
    content: I Tsilà kosa dia niteraka an’i Tobala-Kaina izay mpanefy ny zava-maranitra rehetra vita amin’ny varahina na vy
  - type: note
    content: 'Tobala-Kaina...vy: ny dkt tranainy aramianina dia manao hoe Tobala-Kaina izay razamben’ny mpanefy zava-maranitra rehetra.'
  - type: text
    content: . Ny anabavin’i Tobala-Kaina dia i Nahamà.
  '23':
  - type: text
    content: 'Hoy i Lamèka tamin’ny vadiny:'
  - type: text
    content: –Ry i Hadà sy i Tsilà ô, henoy aho!
  - type: text
    content: Ry vadin’i Lamèka,
  - type: text
    content: 'atongilano ny sofinareo amin’ny teniko:'
  - type: text
    content: Namono nahafaty olona aho satria nokapohiny,
  - type: text
    content: ary namono nahafaty tovolahy aho satria noratrainy.
  '24':
  - type: text
    content: Raha valiana fito heny
  - type: text
    content: izay mahafaty an’i Kaina,
  - type: text
    content: dia hovaliana 77 heny kosa
  - type: text
    content: izay mamono mahafaty an’i Lamèka.
  '25':
  - type: text
    content: 'Ary i Adama sy ny vadiny dia mbola nanan-janaka iray hafa koa, ka ny anarany dia nataon’i Eva hoe Seta, satria hoy izy hoe:'
  - type: text
    content: –Nomen’Andriamanitra zanakalahy hafa indray aho ity ho solon’i Abela izay novonoin’i Kaina ho faty
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Seta dia mampahatsiaro ny matoanteny izay nadika hoe nomen’Andriamanitra.
  - type: text
    content: .
  '26':
  - type: text
    content: Ary i Seta kosa niteraka lahy nantsoiny hoe Enôsa. Hatreo vao nivavaka tamin’Andriamanitra ny olona ka niantso Azy hoe TOMPO.
  '3':
  - type: text
    content: 'Nony tonga ny fotoam-pahavokarana, dia nitondran’i Kaina fanatitra ho an’ny TOMPO ireo vokatry ny tany. '
  '4':
  - type: text
    content: 'I Abela koa nitondra ireo voalohan-teraky ny ondriny hatao '
  - type: text
    content: sorona
  - type: text
    content: ' ka nanolotra ny jaborany ho an’ny TOMPO. Ary ny Tompo nankasitraka an’i Abela sy ny fanatiny, '
  '5':
  - type: text
    content: 'fa tsy nankasitraka kosa an’i Kaina sy ny fanatiny; koa tezitra mafy i Kaina sady nanjombona tarehy. '
  '6':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Kaina:'
  - type: text
    content: '–Nahoana no tezitra sady manjombona tarehy ianao? Raha manao ny tsara ianao, moa tsy hahatraka? '
  '7':
  - type: text
    content: Fa raha tsy izany, dia toy ny biby mamitsaka eo am-baravaranao ny ota. Te hanapaka anao izy, kanefa ianao no tokony hifehy azy.
  '8':
  - type: text
    content: 'Dia hoy i Kaina tamin’i Abela rahalahiny:'
  - type: text
    content: –Andeha isika ho any an-tsaha.
  - type: text
    content: Nony mby tany an-tsaha izy ireo, dia niantoraka teny amin’i Abela rahalahiny i Kaina ka namono nahafaty azy
  - type: note
    content: 'Andeha isika ho any an-tsaha: Tsy hita ao amin’ny TM fa ny dikanteny tranainy maro kosa dia samy misy azy avokoa.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Ary ny TOMPO nanontany an’i Kaina hoe:'
  - type: text
    content: –Aiza moa i Abela rahalahinao?
  - type: text
    content: 'Dia hoy i Kaina hoe:'
  - type: text
    content: –Tsy fantatro! Moa mpitandrina ny rahalahiko va aho?
