document_id: GEN.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niraisan’i Adama i Eva vadiny, ka nitoe-jaza. Dia niteraka an’i Kaina izy, ary nanao hoe: «Nahazo zazalahy noho ny amin’ny TOMPO aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nahazo zazalahy noho ny amin’ny TOMPO aho: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
        - type: usfm
          marker: it
          children:
          - type: text
            text: nahary lehilahy...
        - type: text
          text: ' Ny matoanteny hebreo '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Kanah
        - type: text
          text: ' (mahary, mahazo) sy ny anarana hoe '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Kaina
        - type: text
          text: ' dia mitovitovy fanonona. Ny karazana tsilalaon-teny toy izany dia fahita matetika ao amin’ny Testamenta Taloha. (Jereo Gen 29.32-34).'
      marker-yv: yv-n
    - type: text
      text: '.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona ity nataonao? Ny feon’ny ran’ny rahalahinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Ny ran’i Abela:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Heb 12.24.
      marker-yv: yv-n
    - type: text
      text: ' mitaraina amiko avy ao amin’ny tany. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ankehitriny dia manozona anao ny tany izay misokatra hitelina ny ran’ny rahalahinao. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha hamboly ny tany ianao, dia tsy hanome vokatra ho anao intsony izy; ka dia ho mpitsoa-ponenana sy ho mpirenireny eny ambonin’ny tany ianao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’ny TOMPO i Kaina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mavesatra loatra ny heloko! '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indro roahinao hiala eo amin’ny tany mahavokatra aho ankehitriny, ka tsy maintsy hiery lavitra Anao; ho mpitsoa-ponenana sy ho mpirenireny eny ambonin’ny tany aho, ka izay rehetra mahita ahy dia hamono ahy ho faty!
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly azy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa na iza na iza mamono anao ho faty, dia hovaliana impito heny.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nametrahan’ny TOMPO famantarana teo amin’i Kaina mba tsy hisy hamono azy ho faty izay mifanena aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niala teo anatrehan’ny TOMPO i Kaina, ka nonina tao amin’ny tanin’i Nôda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Nôda: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tany tsy fantatra izay misy azy, fa angamba anarana an’ohatra ihany io.
      marker-yv: yv-n
    - type: text
      text: ', any atsinanan’i Hedena.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Kaina
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niraisan’i Kaina ny vadiny, dia nitoe-jaza ka niteraka an’i Henôka. Dia nanorina tanàna i Kaina, ka nampitondrainy ny anaran’i Henôka zanany lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Henôka no ray niteraka an’i Hirada; i Hirada no ray niteraka an’i Mehojaela; i Mehojaela no ray niteraka an’i Metosaela; ary i Metosaela kosa no ray niteraka an’i Lamèka.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanambady anankiroa i Lamèka: ny voalohany dia natao hoe Hadà, ary ny faharoa nantsoina hoe Tsilà. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola niteraka an’i Abela rahalahiny koa izy. Ary i Abela dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' ondry, fa i Kaina kosa mpamboly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hadà dia niteraka an’i Jabala: io no razamben’ireo mpitoetra an-day miaraka amin’ny biby fiompy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy rahalahiny natao hoe Jobala, io no razamben’ireo rehetra mpitendry kabôsy sy mpitsoka sodina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Tsilà kosa dia niteraka an’i Tobala-Kaina izay mpanefy ny zava-maranitra rehetra vita amin’ny varahina na vy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tobala-Kaina...vy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny dkt tranainy aramianina dia manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tobala-Kaina izay razamben’ny mpanefy zava-maranitra rehetra.
      marker-yv: yv-n
    - type: text
      text: . Ny anabavin’i Tobala-Kaina dia i Nahamà.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy i Lamèka tamin’ny vadiny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Ry i Hadà sy i Tsilà ô, henoy aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry vadin’i Lamèka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'atongilano ny sofinareo amin’ny teniko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namono nahafaty olona aho satria nokapohiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namono nahafaty tovolahy aho satria noratrainy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha valiana fito heny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mahafaty an’i Kaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovaliana 77 heny kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mamono mahafaty an’i Lamèka.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Adama sy ny vadiny dia mbola nanan-janaka iray hafa koa, ka ny anarany dia nataon’i Eva hoe Seta, satria hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nomen’Andriamanitra zanakalahy hafa indray aho ity ho solon’i Abela izay novonoin’i Kaina ho faty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Seta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia mampahatsiaro ny matoanteny izay nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nomen’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Seta kosa niteraka lahy nantsoiny hoe Enôsa. Hatreo vao nivavaka tamin’Andriamanitra ny olona ka niantso Azy hoe TOMPO.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga ny fotoam-pahavokarana, dia nitondran’i Kaina fanatitra ho an’ny TOMPO ireo vokatry ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Abela koa nitondra ireo voalohan-teraky ny ondriny hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ka nanolotra ny jaborany ho an’ny TOMPO. Ary ny Tompo nankasitraka an’i Abela sy ny fanatiny, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy nankasitraka kosa an’i Kaina sy ny fanatiny; koa tezitra mafy i Kaina sady nanjombona tarehy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny TOMPO tamin’i Kaina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana no tezitra sady manjombona tarehy ianao? Raha manao ny tsara ianao, moa tsy hahatraka? '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha tsy izany, dia toy ny biby mamitsaka eo am-baravaranao ny ota. Te hanapaka anao izy, kanefa ianao no tokony hifehy azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Kaina tamin’i Abela rahalahiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha isika ho any an-tsaha.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony mby tany an-tsaha izy ireo, dia niantoraka teny amin’i Abela rahalahiny i Kaina ka namono nahafaty azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andeha isika ho any an-tsaha: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy hita ao amin’ny TM fa ny dikanteny tranainy maro kosa dia samy misy azy avokoa.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny TOMPO nanontany an’i Kaina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa i Abela rahalahinao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Kaina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy fantatro! Moa mpitandrina ny rahalahiko va aho?
