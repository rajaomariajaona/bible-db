document_id: LEV.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanombohan’i Aharôna sy ny zanany ny raharahany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andro fahavalo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fanokanana ny mpisorona (maharitra fito andro, toko 8) sy ny fanombohany raharaha (toko 9) dia mitambatra ho fombam-pivavahana anankiray lehibe, ka ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: andro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fahavalo no tena faratampony.'
      marker-yv: yv-n
    - type: text
      text: ', dia nampanalain’i Mosesy i Aharôna sy ny zanany ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Israely, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny jaborany kosa sy ny voany roa ary ny ila atiny, avy tamin’ilay sorona fanalana ny ota, dia nodorany hanetona teo ambonin’ny alitara, araka izay nandidian’ny TOMPO an’i Mosesy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny hena sy ny hoditra kosa nodorany tamin’ny afo teny ivelan’ny toby.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novonoin’i Aharôna koa ny ondrilahy hatao sorona dorana manontolo; ka rehefa natolotr’ireo zanany azy ny ra, dia nafafiny tamin’ny lafin’ny alitara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sorona dorana manontolo voarasa sy ny lohany dia natolotr’ireo azy tsirairay, ka nodorana hanetona teo ambonin’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa voasasan’i Aharôna koa ny tsinainy sy ny tongony, dia nodorany hanetona teo ambonin’ny alitara niaraka tamin’ny sorona dorana manontolo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia natolotr’i Aharôna tamin’ny TOMPO ireo soron’ny vahoaka; ka nalainy ny osilahy hatao sorona fanalana ny otan’ny vahoaka, dia novonoiny ary natolony ho fanalana ny ota, tahaka ny nataony tamin’ilay ombilahikely teo aloha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natolony koa ny ombilahikely sy ondrilahikely ho sorona dorana manontolo ka nataony araka ny fomba fanao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia natolony ny fanatitra lafarinina ka nangalany eran-tanan’ila izay nodorany hanetona teo ambonin’ny alitara ankoatra ny sorona dorana manontolo fanolotra isa-maraina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Farany, novonoin’i Aharôna ny ombilahy sy ondrilahy izay nentin’ny vahoaka hatao sorom-pihavanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.1-11.
      marker-yv: yv-n
    - type: text
      text: '; dia natolotry ny zanany azy ny ra, ka nafafiny manodidina tamin’ny lafin’ny alitara. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natolotr’ireo azy koa ny tavin’ireo sorom-pihavanana ireo, dia ny jaboran-tsinainy sy ny voany ary ny ila-atiny mbamin’ny hofak’ilay ondrilahy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy tamin’i Aharôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Makà ianao ombilahikely anankiray hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' fanalana ny ota sy ondrilahy anankiray hatao sorona dorana manontolo, dia ombilahikely sy ondrilahikely izay samy tsy misy kilema, ka atero eo anatrehan’ny Toeramasin’ny TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia napetraka teo ambonin’ny tratran’ireo sorom-pihavanana ireo avokoa ny taviny, vao nodorana teo ambonin’ny alitara; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny tratrany sy ny feny ankavanana kosa dia nahevahevan’i Aharôna teo anatrehan’ny TOMPO no fomba nanolorany azy, araka izay nandidian’i Mosesy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa voatolotr’i Aharôna ny sorona fanalana ny ota sy ny sorona dorana manontolo ary ny sorom-pihavanana, dia nanandra-tanana manandrify ny vahoaka izy ka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 6.22-26.
      marker-yv: yv-n
    - type: text
      text: ; izay vao nidina niala teo amin’ny alitara.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra tao amin’ny Tranolay fihaonana ry i Mosesy sy i Aharôna. Nony tafavoaka avy eo izy roa lahy, dia niara-nitsodrano ny vahoaka; ary niseho tamin’ny vahoaka rehetra ny voninahitry ny TOMPO: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nisy afo nivoaka avy teo anatrehan’ny TOMPO ka nandevona ny sorona dorana manontolo sy ny tavin-kena teo ambonin’ny alitara. Nony nahita izany ny vahoaka rehetra, dia nanao hobin-kafaliana sady niankohoka.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Avy eo dia ny Israelita no ilazao hoe: «Makà ianareo osilahy anankiray hatao sorona fanalana ny ota; makà ombilahikely sy ondrilahikely anankiray avy, samy iray taona sady tsy misy kilema, mba hatao sorona dorana manontolo; '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary makà ombilahy sy ondrilahy anankiray avy mba hovonoina ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-pihavanana
    - type: text
      text: ' eo anatrehan’ny Toeramasin’ny TOMPO, miaraka amina fanatitra lafarinina voaharo menaka; fa anio no hisehoan’ny TOMPO aminareo».'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nentina teo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' ny zavatra nandidian’i Mosesy, dia nanatona ny Fiangonan’ny Israelita tsivakivolo ka nijanona teo anatrehan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: '’ny TOMPO. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izao no zavatra nandidian’ny TOMPO anareo, ka ataovy; dia hiseho aminareo ny voninahitry ny Tompo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo i Mosesy nilaza tamin’i Aharôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Manatona ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ', dia atolory ny anao ny sorona fanalana ny ota sy ny sorona dorana manontolo, ka ataovy ny fombam-pivavahana famelan-keloka ho an’ny tenanao sy ho an’ny vahoaka: atolory koa ny soron’ny vahoaka ary anaovy ny fombam-pivavahana famelan-keloka izy, araka izay nandidian’ny TOMPO'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Heb 5.1-13; 7.27.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona ny alitara i Aharôna ka namono ny ombilahikely hatao fanalana ny ota ho an’ny tenany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nentin-janany ho eo amin’i Aharôna ny ran’ilay ombilahikely; dia nanatsoboka ny fanondrony tamin’ny ra i Aharôna, ka notentenany ny tandroky ny alitara; ary ny ra sisa dia naidiny teo am-pototry ny alitara. '
