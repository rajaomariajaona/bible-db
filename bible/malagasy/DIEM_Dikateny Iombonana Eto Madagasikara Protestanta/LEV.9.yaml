document_id: LEV.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanombohan’i Aharôna sy ny zanany ny raharahany
  - type: text
    content: Tamin’ny andro fahavalo
  - type: note
    content: Ny fanokanana ny mpisorona (maharitra fito andro, toko 8) sy ny fanombohany raharaha (toko 9) dia mitambatra ho fombam-pivavahana anankiray lehibe, ka ny andro fahavalo no tena faratampony.
  - type: text
    content: ', dia nampanalain’i Mosesy i Aharôna sy ny zanany ary ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely, '
  '10':
  - type: text
    content: 'Ny jaborany kosa sy ny voany roa ary ny ila atiny, avy tamin’ilay sorona fanalana ny ota, dia nodorany hanetona teo ambonin’ny alitara, araka izay nandidian’ny TOMPO an’i Mosesy; '
  '11':
  - type: text
    content: fa ny hena sy ny hoditra kosa nodorany tamin’ny afo teny ivelan’ny toby.
  '12':
  - type: text
    content: 'Dia novonoin’i Aharôna koa ny ondrilahy hatao sorona dorana manontolo; ka rehefa natolotr’ireo zanany azy ny ra, dia nafafiny tamin’ny lafin’ny alitara. '
  '13':
  - type: text
    content: 'Ary ny sorona dorana manontolo voarasa sy ny lohany dia natolotr’ireo azy tsirairay, ka nodorana hanetona teo ambonin’ny alitara. '
  '14':
  - type: text
    content: Rehefa voasasan’i Aharôna koa ny tsinainy sy ny tongony, dia nodorany hanetona teo ambonin’ny alitara niaraka tamin’ny sorona dorana manontolo.
  '15':
  - type: text
    content: 'Avy eo dia natolotr’i Aharôna tamin’ny TOMPO ireo soron’ny vahoaka; ka nalainy ny osilahy hatao sorona fanalana ny otan’ny vahoaka, dia novonoiny ary natolony ho fanalana ny ota, tahaka ny nataony tamin’ilay ombilahikely teo aloha. '
  '16':
  - type: text
    content: 'Natolony koa ny ombilahikely sy ondrilahikely ho sorona dorana manontolo ka nataony araka ny fomba fanao. '
  '17':
  - type: text
    content: 'Avy eo dia natolony ny fanatitra lafarinina ka nangalany eran-tanan’ila izay nodorany hanetona teo ambonin’ny alitara ankoatra ny sorona dorana manontolo fanolotra isa-maraina. '
  '18':
  - type: text
    content: Farany, novonoin’i Aharôna ny ombilahy sy ondrilahy izay nentin’ny vahoaka hatao sorom-pihavanana
  - type: note
    content: Jereo 3.1-11.
  - type: text
    content: '; dia natolotry ny zanany azy ny ra, ka nafafiny manodidina tamin’ny lafin’ny alitara. '
  '19':
  - type: text
    content: 'Ary natolotr’ireo azy koa ny tavin’ireo sorom-pihavanana ireo, dia ny jaboran-tsinainy sy ny voany ary ny ila-atiny mbamin’ny hofak’ilay ondrilahy; '
  '2':
  - type: text
    content: 'ka hoy izy tamin’i Aharôna:'
  - type: text
    content: '–Makà ianao ombilahikely anankiray hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota sy ondrilahy anankiray hatao sorona dorana manontolo, dia ombilahikely sy ondrilahikely izay samy tsy misy kilema, ka atero eo anatrehan’ny Toeramasin’ny TOMPO. '
  '20':
  - type: text
    content: 'dia napetraka teo ambonin’ny tratran’ireo sorom-pihavanana ireo avokoa ny taviny, vao nodorana teo ambonin’ny alitara; '
  '21':
  - type: text
    content: fa ny tratrany sy ny feny ankavanana kosa dia nahevahevan’i Aharôna teo anatrehan’ny TOMPO no fomba nanolorany azy, araka izay nandidian’i Mosesy.
  '22':
  - type: text
    content: 'Rehefa voatolotr’i Aharôna ny sorona fanalana ny ota sy ny sorona dorana manontolo ary ny sorom-pihavanana, dia nanandra-tanana manandrify ny vahoaka izy ka '
  - type: text
    content: nitsodrano
  - type: text
    content: ' azy'
  - type: note
    content: Jereo Nom 6.22-26.
  - type: text
    content: ; izay vao nidina niala teo amin’ny alitara.
  '23':
  - type: text
    content: 'Dia niditra tao amin’ny Tranolay fihaonana ry i Mosesy sy i Aharôna. Nony tafavoaka avy eo izy roa lahy, dia niara-nitsodrano ny vahoaka; ary niseho tamin’ny vahoaka rehetra ny voninahitry ny TOMPO: '
  '24':
  - type: text
    content: nisy afo nivoaka avy teo anatrehan’ny TOMPO ka nandevona ny sorona dorana manontolo sy ny tavin-kena teo ambonin’ny alitara. Nony nahita izany ny vahoaka rehetra, dia nanao hobin-kafaliana sady niankohoka.
  '3':
  - type: text
    content: 'Avy eo dia ny Israelita no ilazao hoe: «Makà ianareo osilahy anankiray hatao sorona fanalana ny ota; makà ombilahikely sy ondrilahikely anankiray avy, samy iray taona sady tsy misy kilema, mba hatao sorona dorana manontolo; '
  '4':
  - type: text
    content: 'ary makà ombilahy sy ondrilahy anankiray avy mba hovonoina ho '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' eo anatrehan’ny Toeramasin’ny TOMPO, miaraka amina fanatitra lafarinina voaharo menaka; fa anio no hisehoan’ny TOMPO aminareo».'
  '5':
  - type: text
    content: 'Rehefa nentina teo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ny zavatra nandidian’i Mosesy, dia nanatona ny Fiangonan’ny Israelita tsivakivolo ka nijanona teo anatrehan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: '’ny TOMPO. '
  '6':
  - type: text
    content: 'Ary hoy i Mosesy hoe:'
  - type: text
    content: –Izao no zavatra nandidian’ny TOMPO anareo, ka ataovy; dia hiseho aminareo ny voninahitry ny Tompo.
  '7':
  - type: text
    content: 'Avy eo i Mosesy nilaza tamin’i Aharôna hoe:'
  - type: text
    content: '–Manatona ny '
  - type: text
    content: alitara
  - type: text
    content: ', dia atolory ny anao ny sorona fanalana ny ota sy ny sorona dorana manontolo, ka ataovy ny fombam-pivavahana famelan-keloka ho an’ny tenanao sy ho an’ny vahoaka: atolory koa ny soron’ny vahoaka ary anaovy ny fombam-pivavahana famelan-keloka izy, araka izay nandidian’ny TOMPO'
  - type: note
    content: Jereo Heb 5.1-13; 7.27.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Dia nanatona ny alitara i Aharôna ka namono ny ombilahikely hatao fanalana ny ota ho an’ny tenany. '
  '9':
  - type: text
    content: 'Ary nentin-janany ho eo amin’i Aharôna ny ran’ilay ombilahikely; dia nanatsoboka ny fanondrony tamin’ny ra i Aharôna, ka notentenany ny tandroky ny alitara; ary ny ra sisa dia naidiny teo am-pototry ny alitara. '
