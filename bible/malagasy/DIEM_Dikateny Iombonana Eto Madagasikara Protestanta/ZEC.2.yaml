document_id: ZEC.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana faharoa: ny tandroka sy ny mpanefy'
  - type: text
    content: Nanopy maso aho, ka indreo hitako nisy tandroka efatra
  - type: note
    content: Amin’ny dkt sasany ny and 1-4 dia mifamatotra amin’ny toko 1 ary noho izany dia lasa 1.18-21; ny and 5-17 amin’ny toko faha 2 kosa dia lasa 2.1-13.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «He! Ianareo izay naeliko
  - type: text
    content: any amin’ny vazan-tany efatra,
  - type: text
    content: mandosira ankehitriny,
  - type: text
    content: ialao ny tany avaratra
  - type: note
    content: 'tany avaratra: io fomba fiteny io dia milaza ny fanjakana babilônianina. Fa ny lalana izay mitondra avy eo mankany Palestinina dia mandalo any avaratra.'
  - type: text
    content: .»
  - type: text
    content: 'Hoy koa ny teny hentitry ny TOMPO hoe:'
  '11':
  - type: text
    content: «He! Ry vahoakan’i Tsiôna
  - type: text
    content: voasesitany ao Babilôna,
  - type: text
    content: mitsoaha tao ianareo.»
  '12':
  - type: text
    content: 'Fa ny TOMPOn’izao rehetra izao, Ilay naniraka ahy tamim-pahefana, dia miteny amin’ireo firenena izay namabo anareo hoe:'
  - type: text
    content: «Na zovy na zovy mikasika anareo,
  - type: text
    content: dia mikasika ny anakandriamasoko.
  '13':
  - type: text
    content: Eny, haninjirako tanana ireo firenena ireo
  - type: text
    content: mba ho lasa babon’ireo nandevoziny.»
  - type: text
    content: Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy.
  '14':
  - type: text
    content: 'Dia hoy koa ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «Mihobia sy mifalia, ry vahoakan’i Tsiôna,
  - type: text
    content: fa indro avy honina ao afovoanareo Aho.
  '15':
  - type: text
    content: Amin’izany andro izany,
  - type: text
    content: firenena maro no hiraiki-po amiko
  - type: text
    content: ka ho tonga vahoakako;
  - type: text
    content: ary honina eo afovoanareo Aho.»
  - type: text
    content: 'Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo. '
  '16':
  - type: text
    content: 'Dia ho fananan’ny TOMPO indray i Joda ao amin’ny tany masina; ary mbola hifidy an’i Jerosalema indray Izy. '
  '17':
  - type: text
    content: Aoka ny voaary rehetra hangina eo anatrehan’ny TOMPO satria avy ao amin’ny fonena-masiny Izy no hipoitra tampoka.
  '2':
  - type: text
    content: 'Ary nanontaniako ilay '
  - type: text
    content: anjely
  - type: text
    content: ' niresaka tamiko hoe:'
  - type: text
    content: –Inona moa no dikan’ireo tandroka ireo?
  - type: text
    content: 'Dia hoy ny navaliny ahy:'
  - type: text
    content: '–Ireo no firenena matanjaka izay nampihahaka ny mponin’i Joda sy i '
  - type: text
    content: Israely
  - type: text
    content: ' ary i Jerosalema.'
  '3':
  - type: text
    content: 'Dia nampisehoan’ny TOMPO mpanefy efatra aho '
  '4':
  - type: text
    content: 'ka nanontany indray hoe:'
  - type: text
    content: –Tonga mba hanao inona moa ireto?
  - type: text
    content: 'Ary dia namaly izy hoe:'
  - type: text
    content: –Ireto kosa dia tonga hampihorohoro sy hampiongana ny firenena matanjaka izay nitsangana hanohitra ny firenen’i Joda sady nampihahaka ny vahoakany mba tsy hisy na iray aza hanohitra azy.
  - type: heading
    content: 'Fahitana fahatelo: ny mpandrefy'
  '5':
  - type: text
    content: 'Nanopy maso indray aho, ka indro hitako nisy lehilahy nihazona tady fandrefesana. '
  '6':
  - type: text
    content: 'Ary nanontaniako izy hoe:'
  - type: text
    content: –Ho aiza moa ianao?
  - type: text
    content: 'Dia hoy izy namaly ahy:'
  - type: text
    content: –Ho any Jerosalema aho handrefy azy hahitana ny sakany sy ny lavany.
  '7':
  - type: text
    content: 'Dia nandroso ilay anjely niresaka tamiko, ary nisy '
  - type: text
    content: anjely
  - type: text
    content: ' iray koa avy hitsena azy '
  '8':
  - type: text
    content: 'sady nandidy azy hoe:'
  - type: text
    content: '–Mihazakazaha, dia ilazao io zatovolahy izay mihazona tady fandrefesana io hoe: «Tsy ho tanànamimanda i Jerosalema fa ho marobe ny olona sy ny biby honina ao aminy. '
  '9':
  - type: text
    content: 'Ary hoy ny teny hentitry ny TOMPO hoe: ‹Izaho no ho manda afo manodidina hiaro ny tanàna, ary ny voninahitro no ho eo afovoany›. »'
  - type: heading
    content: Ny Tompo miantso ireo voasesitany
