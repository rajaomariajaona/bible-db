document_id: ZEC.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana faharoa: ny tandroka sy ny mpanefy'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nanopy maso aho, ka indreo hitako nisy tandroka efatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amin’ny dkt sasany ny and 1-4 dia mifamatotra amin’ny toko 1 ary noho izany dia lasa 1.18-21; ny and 5-17 amin’ny toko faha 2 kosa dia lasa 2.1-13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «He! Ianareo izay naeliko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny vazan-tany efatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandosira ankehitriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ialao ny tany avaratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tany avaratra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: io fomba fiteny io dia milaza ny fanjakana babilônianina. Fa ny lalana izay mitondra avy eo mankany Palestinina dia mandalo any avaratra.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy koa ny teny hentitry ny TOMPO hoe:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: «He! Ry vahoakan’i Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasesitany ao Babilôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsoaha tao ianareo.»
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa ny TOMPOn’izao rehetra izao, Ilay naniraka ahy tamim-pahefana, dia miteny amin’ireo firenena izay namabo anareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Na zovy na zovy mikasika anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mikasika ny anakandriamasoko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, haninjirako tanana ireo firenena ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho lasa babon’ireo nandevoziny.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy koa ny teny hentitry ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mihobia sy mifalia, ry vahoakan’i Tsiôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa indro avy honina ao afovoanareo Aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena maro no hiraiki-po amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tonga vahoakako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary honina eo afovoanareo Aho.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia ho fananan’ny TOMPO indray i Joda ao amin’ny tany masina; ary mbola hifidy an’i Jerosalema indray Izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aoka ny voaary rehetra hangina eo anatrehan’ny TOMPO satria avy ao amin’ny fonena-masiny Izy no hipoitra tampoka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nanontaniako ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' niresaka tamiko hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no dikan’ireo tandroka ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny ahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireo no firenena matanjaka izay nampihahaka ny mponin’i Joda sy i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ary i Jerosalema.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nampisehoan’ny TOMPO mpanefy efatra aho '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka nanontany indray hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tonga mba hanao inona moa ireto?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia namaly izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ireto kosa dia tonga hampihorohoro sy hampiongana ny firenena matanjaka izay nitsangana hanohitra ny firenen’i Joda sady nampihahaka ny vahoakany mba tsy hisy na iray aza hanohitra azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana fahatelo: ny mpandrefy'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nanopy maso indray aho, ka indro hitako nisy lehilahy nihazona tady fandrefesana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nanontaniako izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho aiza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy namaly ahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho any Jerosalema aho handrefy azy hahitana ny sakany sy ny lavany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nandroso ilay anjely niresaka tamiko, ary nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' iray koa avy hitsena azy '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'sady nandidy azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihazakazaha, dia ilazao io zatovolahy izay mihazona tady fandrefesana io hoe: «Tsy ho tanànamimanda i Jerosalema fa ho marobe ny olona sy ny biby honina ao aminy. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy ny teny hentitry ny TOMPO hoe: ‹Izaho no ho manda afo manodidina hiaro ny tanàna, ary ny voninahitro no ho eo afovoany›. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Tompo miantso ireo voasesitany
    marker-yv: yv-h
