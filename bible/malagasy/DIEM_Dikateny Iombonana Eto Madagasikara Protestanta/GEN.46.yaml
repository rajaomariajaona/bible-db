document_id: GEN.46,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nidina nankany Ejipta i Jakôba
  - type: text
    content: 'Niainga i Jakôba sy izay rehetra azy ka tonga tao Beera-Seba; dia nanao '
  - type: text
    content: sorona
  - type: text
    content: ' teo izy ho an’ilay Andriamanitr’i Itsehàka rainy. '
  '10':
  - type: text
    content: I Simehôna sy ireo zanany lahy, dia i Jemoela sy i Jamìna, i Ohada sy i Jakìna ary i Tsôhara sy i Saola; io Saola io dia zanak’ilay vehivavy kanahanita.
  '11':
  - type: text
    content: I Levỳ sy ireo zanany lahy dia i Gersôna sy i Kehata ary i Merary.
  '12':
  - type: text
    content: I Joda sy ireo zanany lahy, dia i Selà sy i Peretsa ary i Zera; fa ny zanany roa lahy, i Hera sy i Onàna, dia efa maty tany amin’ny tany Kanahàna. Ary ny zanakalahin’i Peretsa dia i Hetsirôna sy i Hamola.
  '13':
  - type: text
    content: I Jisakara sy ireo zanany lahy, dia i Tôlà sy i Povà ary i Jasoba
  - type: note
    content: 'Jasoba: araka ny rijan-teny Samaritanina sy ny dkt grika tranainy ary ny Nom 26.24; 1 Tan 7.1; ny RM dia manao hoe Jôba.'
  - type: text
    content: ' sy i Simrôna.'
  '14':
  - type: text
    content: I Zebolòna sy ireo zanany lahy, dia i Sereda sy i Elôna ary i Jahiliela.
  '15':
  - type: text
    content: Ireo no zanakalahin’i Jakôba naterak’i Leà tany Mezôpôtamia ambony, miampy an’i Dinà anabaviny. Ny isan’izy rehetra mbamin’ny zanany na lahy na vavy dia telo amby telopolo.
  '16':
  - type: text
    content: I Gada sy ireo zanany lahy, dia i Tsifiôna sy i Hagỳ, i Sonỳ sy i Etsibôna, i Herỳ sy Arôdỳ ary i Arelỳ.
  '17':
  - type: text
    content: I Asera sy ireo zanany lahy, dia i Jimnà sy i Jisvà ary i Jisvỳ sy i Berihà, fa i Serà kosa no anabaviny. Ary ny zanakalahin’i Berihà dia i Hebera sy i Malkiela.
  '18':
  - type: text
    content: Ireo telo ambin’ny folo lahy ireo no taranak’i Jakôba tamin’i Zilpà izay nomen’i Labàna ho mpanompovavin’i Leà.
  '19':
  - type: text
    content: 'Ary ny zanakalahin’i Rahely vadin’i Jakôba kosa dia i Jôsefa sy i Benjamîna. '
  '2':
  - type: text
    content: 'Nony alina dia niteny taminy tao anaty fahitana Andriamanitra ka nanao hoe:'
  - type: text
    content: –Ry Jakôba! Ry Jakôba!
  - type: text
    content: 'Ary hoy ny navalin’i Jakôba Azy:'
  - type: text
    content: –Inty aho!
  '20':
  - type: text
    content: Tany Ejipta i Jôsefa dia niteraka zanaka roa lahy, i Manase sy i Efraîma
  - type: note
    content: 'Jereo 41.45 sy nta. –i Manase sy i Efraîma: jereo 41.50-52.'
  - type: text
    content: ', tamin’i Asenata vadiny, izay zanakavavin’i Pôtifera mpisorona tao Ona. '
  '21':
  - type: text
    content: 'Folo no zanakalahin’i Benjamîna: i Bela sy i Bekera, i Asbela sy i Gerà, i Nahamàna sy i Ehỳ, i Rôsy sy i Hopima ary i Mopîma sy i Arda. '
  '22':
  - type: text
    content: Ireo izy efatra ambin’ny folo lahy taranak’i Rahely sy i Jakôba.
  '23':
  - type: text
    content: 'Dia ao koa i Dana sy i Hosima zanany lahy. '
  '24':
  - type: text
    content: 'I Naftalỳ sy ireo zanany lahy, dia i Jahatsiela sy i Gonỳ ary i Jetsera sy i Silema. '
  '25':
  - type: text
    content: Ireo fito lahy ireo no taranak’i Jakôba tamin’i Bilehà izay nomen’i Labàna ho mpanompovavin’i Rahely.
  '26':
  - type: text
    content: 'Ny isan’ny ankohonan’i Jakôba rehetra, izany hoe ireo taranany mivantana izay tonga tany Ejipta, dia 66 ankoatra ireo vinantovaviny. '
  '27':
  - type: text
    content: Ampian’ireo zanakalahin’i Jôsefa anankiroa teraka tany Ejipta izany, dia fitopolo no isan’ny ankohonan’i Jakôba rehetra tonga tany Ejipta
  - type: note
    content: Ny tontalin’ny olona hoe fitopolo dia azo avy amin’ny fifamenoan’ny isa voalaza eo amin’ny and 15, 18, 22 ary 25. Ny isa 66 eo amin’ny and 26 kosa dia sarotra hazavaina. Ampit Eks 1.5 sy nta; Asa 7.14.
  - type: text
    content: .
  - type: heading
    content: I Jakôba tany Ejipta
  '28':
  - type: text
    content: 'Nirahin’i Jakôba hialoha azy any amin’i Jôsefa i Joda mba hiangavy azy hankany Gôsena. Rehefa tonga tany Gôsena i Jakôba sy ny ankohonany, '
  '29':
  - type: text
    content: 'dia nanomana ny kalesiny i Jôsefa ka nandeha hihaona amin’ny rainy tany Gôsena. Raha vao nahita an’i Jakôba izy, dia niantoraka teny am-bozony ary nitomany ela teo sady namihina azy. '
  '3':
  - type: text
    content: 'Dia hoy indray Izy hoe:'
  - type: text
    content: '–Izaho no Andriamanitra, dia ilay Andriamanitry ny rainao. Aza matahotra hidina any Ejipta ianao; fa hataoko firenena lehibe any. '
  '30':
  - type: text
    content: 'Dia hoy i Jakôba taminy:'
  - type: text
    content: –Mahazo modimandry amin’izay aho, satria mbola velona ihany ianao sady nifanatri-tava tamiko.
  '31':
  - type: text
    content: 'Dia hoy i Jôsefa tamin’ny rahalahiny sy ny olon-kafa ankohonan-drainy:'
  - type: text
    content: '–Handeha hampandre ny '
  - type: text
    content: Farao
  - type: text
    content: ' aho ka hilaza aminy fa ireo rahalahiko sy ny olon-kafa ankohonan-draiko izay tany amin’ny tany Kanahàna dia efa tonga eto amiko. '
  '32':
  - type: text
    content: 'Holazaiko aminy fa lehilahy mpiandry ondry sy mpiompy ianareo, ka nentinareo koa ny omby sy ny ondry aman’osinareo ary izay rehetra anananareo. '
  '33':
  - type: text
    content: 'Koa rehefa mampiantso anareo ny Farao ka manontany hoe: «Inona no raharahanareo?», '
  '34':
  - type: text
    content: 'dia hovalianareo hoe: Olona mpiompy toy ireo razanay izahay mpanomponao, nanomboka hatramin’ny fahazazànay ka mandraka izao. Amin’izay dia hahazo mipetraka ao amin’ny faritr’i Gôsena ianareo, satria maharikoriko ny Ejiptianina ny mpiandry ondry rehetra.'
  '4':
  - type: text
    content: Hidina hiaraka aminao any Ejipta Aho, ary Izaho koa no mbola hampiakatra anao avy any indray; ary ny tanan’i Jôsefa no hanirina ny masonao, rehefa maty ianao.
  '5':
  - type: text
    content: 'Dia niala tao Beera-Seba i Jakôba. Ary ireo zanakalahiny dia nitondra an’i Jakôba rainy sy ireo zaza amam-behivavy tao anatin’ny sarety izay efa nalefan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' hitondrana azy. '
  '6':
  - type: text
    content: Nentin’ireo koa ny biby fiompiny mbamin’ny fananana hafa izay noharîny tao amin’ny tany Kanahàna. Dia tonga tany Ejipta i Jakôba sy ny taranany rehetra niaraka taminy
  - type: note
    content: Ampit Asa 7.15.
  - type: text
    content: ', '
  '7':
  - type: text
    content: fa nasainy nentina tany Ejipta avokoa ny zanany lahy sy ny zanany vavy mbamin’ny zafikeliny.
  - type: heading
    content: Ny fianakavian’i Jakôba
  '8':
  - type: text
    content: 'Ireto no anaran’ny Israelita tonga tany Ejipta, dia i Jakôba sy ny zanaka aman-jafiny:'
  - type: text
    content: 'I Reobena, lahimatoan’i Jakôba, '
  '9':
  - type: text
    content: ary ireo zanany lahy, dia i Hanôka, i Palò ary i Hetsirôna sy i Karmỳ.
