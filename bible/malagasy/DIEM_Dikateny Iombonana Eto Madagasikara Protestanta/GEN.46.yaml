document_id: GEN.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nidina nankany Ejipta i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niainga i Jakôba sy izay rehetra azy ka tonga tao Beera-Seba; dia nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' teo izy ho an’ilay Andriamanitr’i Itsehàka rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony alina dia niteny taminy tao anaty fahitana Andriamanitra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Jakôba! Ry Jakôba!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy ny navalin’i Jakôba Azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inty aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy indray Izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no Andriamanitra, dia ilay Andriamanitry ny rainao. Aza matahotra hidina any Ejipta ianao; fa hataoko firenena lehibe any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hidina hiaraka aminao any Ejipta Aho, ary Izaho koa no mbola hampiakatra anao avy any indray; ary ny tanan’i Jôsefa no hanirina ny masonao, rehefa maty ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niala tao Beera-Seba i Jakôba. Ary ireo zanakalahiny dia nitondra an’i Jakôba rainy sy ireo zaza amam-behivavy tao anatin’ny sarety izay efa nalefan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' hitondrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nentin’ireo koa ny biby fiompiny mbamin’ny fananana hafa izay noharîny tao amin’ny tany Kanahàna. Dia tonga tany Ejipta i Jakôba sy ny taranany rehetra niaraka taminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 7.15.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa nasainy nentina tany Ejipta avokoa ny zanany lahy sy ny zanany vavy mbamin’ny zafikeliny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianakavian’i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireto no anaran’ny Israelita tonga tany Ejipta, dia i Jakôba sy ny zanaka aman-jafiny:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Reobena, lahimatoan’i Jakôba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary ireo zanany lahy, dia i Hanôka, i Palò ary i Hetsirôna sy i Karmỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I Simehôna sy ireo zanany lahy, dia i Jemoela sy i Jamìna, i Ohada sy i Jakìna ary i Tsôhara sy i Saola; io Saola io dia zanak’ilay vehivavy kanahanita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I Levỳ sy ireo zanany lahy dia i Gersôna sy i Kehata ary i Merary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Joda sy ireo zanany lahy, dia i Selà sy i Peretsa ary i Zera; fa ny zanany roa lahy, i Hera sy i Onàna, dia efa maty tany amin’ny tany Kanahàna. Ary ny zanakalahin’i Peretsa dia i Hetsirôna sy i Hamola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I Jisakara sy ireo zanany lahy, dia i Tôlà sy i Povà ary i Jasoba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jasoba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny rijan-teny Samaritanina sy ny dkt grika tranainy ary ny Nom 26.24; 1 Tan 7.1; ny RM dia manao hoe Jôba.
    marker-yv: yv-n
  - type: text
    text: ' sy i Simrôna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I Zebolòna sy ireo zanany lahy, dia i Sereda sy i Elôna ary i Jahiliela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ireo no zanakalahin’i Jakôba naterak’i Leà tany Mezôpôtamia ambony, miampy an’i Dinà anabaviny. Ny isan’izy rehetra mbamin’ny zanany na lahy na vavy dia telo amby telopolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I Gada sy ireo zanany lahy, dia i Tsifiôna sy i Hagỳ, i Sonỳ sy i Etsibôna, i Herỳ sy Arôdỳ ary i Arelỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I Asera sy ireo zanany lahy, dia i Jimnà sy i Jisvà ary i Jisvỳ sy i Berihà, fa i Serà kosa no anabaviny. Ary ny zanakalahin’i Berihà dia i Hebera sy i Malkiela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ireo telo ambin’ny folo lahy ireo no taranak’i Jakôba tamin’i Zilpà izay nomen’i Labàna ho mpanompovavin’i Leà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zanakalahin’i Rahely vadin’i Jakôba kosa dia i Jôsefa sy i Benjamîna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tany Ejipta i Jôsefa dia niteraka zanaka roa lahy, i Manase sy i Efraîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo 41.45 sy nta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–i Manase sy i Efraîma:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 41.50-52.'
    marker-yv: yv-n
  - type: text
    text: ', tamin’i Asenata vadiny, izay zanakavavin’i Pôtifera mpisorona tao Ona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Folo no zanakalahin’i Benjamîna: i Bela sy i Bekera, i Asbela sy i Gerà, i Nahamàna sy i Ehỳ, i Rôsy sy i Hopima ary i Mopîma sy i Arda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ireo izy efatra ambin’ny folo lahy taranak’i Rahely sy i Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia ao koa i Dana sy i Hosima zanany lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I Naftalỳ sy ireo zanany lahy, dia i Jahatsiela sy i Gonỳ ary i Jetsera sy i Silema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ireo fito lahy ireo no taranak’i Jakôba tamin’i Bilehà izay nomen’i Labàna ho mpanompovavin’i Rahely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny isan’ny ankohonan’i Jakôba rehetra, izany hoe ireo taranany mivantana izay tonga tany Ejipta, dia 66 ankoatra ireo vinantovaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ampian’ireo zanakalahin’i Jôsefa anankiroa teraka tany Ejipta izany, dia fitopolo no isan’ny ankohonan’i Jakôba rehetra tonga tany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tontalin’ny olona hoe fitopolo dia azo avy amin’ny fifamenoan’ny isa voalaza eo amin’ny and 15, 18, 22 ary 25. Ny isa 66 eo amin’ny and 26 kosa dia sarotra hazavaina. Ampit Eks 1.5 sy nta; Asa 7.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jakôba tany Ejipta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nirahin’i Jakôba hialoha azy any amin’i Jôsefa i Joda mba hiangavy azy hankany Gôsena. Rehefa tonga tany Gôsena i Jakôba sy ny ankohonany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia nanomana ny kalesiny i Jôsefa ka nandeha hihaona amin’ny rainy tany Gôsena. Raha vao nahita an’i Jakôba izy, dia niantoraka teny am-bozony ary nitomany ela teo sady namihina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy i Jakôba taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mahazo modimandry amin’izay aho, satria mbola velona ihany ianao sady nifanatri-tava tamiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy i Jôsefa tamin’ny rahalahiny sy ny olon-kafa ankohonan-drainy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Handeha hampandre ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' aho ka hilaza aminy fa ireo rahalahiko sy ny olon-kafa ankohonan-draiko izay tany amin’ny tany Kanahàna dia efa tonga eto amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Holazaiko aminy fa lehilahy mpiandry ondry sy mpiompy ianareo, ka nentinareo koa ny omby sy ny ondry aman’osinareo ary izay rehetra anananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa rehefa mampiantso anareo ny Farao ka manontany hoe: «Inona no raharahanareo?», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'dia hovalianareo hoe: Olona mpiompy toy ireo razanay izahay mpanomponao, nanomboka hatramin’ny fahazazànay ka mandraka izao. Amin’izay dia hahazo mipetraka ao amin’ny faritr’i Gôsena ianareo, satria maharikoriko ny Ejiptianina ny mpiandry ondry rehetra.'
