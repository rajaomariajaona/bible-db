document_id: COL.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: Natsangana ho velona niaraka tamin’i Kristy ianareo. Noho izany, katsaho ny zavatra any ambony, any amin’izay itoeran’i Kristy eo ankavanan’Andriamanitra
  - type: note
    content: Jereo Sal 110.1.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'ary efa notafînareo ny toetra vaovao: dia ny toetry ny olona havaozin’Andriamanitra hatrany araka ny endrik’Izy Mpahary azy'
  - type: note
    content: Ampit Gen 1.26.
  - type: text
    content: ', mba ho tonga amin’ny fahalalana tsara an’Andriamanitra. '
  '11':
  - type: text
    content: 'Koa amin’izany, tsy misy ny hoe '
  - type: text
    content: hafa firenena
  - type: text
    content: ' sy Jiosy, voafora sy tsy voafora, olona tsy mivoatra na tratra aoriana'
  - type: note
    content: 'olona tsy mivoatra na tratra aoriana: raha ara-bakiteny kokoa dia hoe baribarianina na Sitianina; ny Sitianina dia mponina tamin’ny morontsiraka avaratry ny Ranomasina Mainty, ka noheverina ho tratra aoriana indrindra tamin’ny fandrosoana fahizany.'
  - type: text
    content: ', mpanompo sy tsy mpanompo; fa i '
  - type: text
    content: Kristy
  - type: text
    content: ' no zavatra rehetra sady ao aminareo rehetra.'
  '12':
  - type: text
    content: 'Olomboafidin’Andriamanitra sy voatokany ho Azy ianareo sady efa notiaviny. Noho izany, aoka ianareo hitafy hatsaram-po sy fiantrana, hamoram-po sy fanetrentena, fahalemem-panahy sy fahari-po. '
  '13':
  - type: text
    content: Mifandefera ka mifamelà heloka ianareo, raha misy manana alahelo amin’ny sasany. Aoka ianareo koa mba hamela heloka, tahaka ny efa namelan’ny Tompo heloka anareo
  - type: note
    content: Ampit Mt 6.12, 14.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Fa ambonin’ny zavatra rehetra, mitafia ny fitiavana izay mamehy ny hatsaram-panahy rehetra ho tanteraka. '
  '15':
  - type: text
    content: 'Aoka hanjaka ao am-ponareo ny fiadanana omen’i Kristy, fa ho amin’izany fiadanana izany no niantsoan’Andriamanitra anareo hitambatra ho tena iray; ary aoka ho feno fisaorana an’Andriamanitra ianareo. '
  '16':
  - type: text
    content: Aoka ny tenin’i Kristy hitoetra betsaka ao aminareo, ka hifampianatra sy hifananatra amim-pahendrena tanteraka ianareo; noho ny fahasoavana manenika anareo, dia mihirà amin’ny fonareo tokoa ho an’Andriamanitra ka mikaloa salamo sy hira ary antsa asesiky ny Fanahy Masina
  - type: note
    content: Ampit Ef 5.19-20.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Ary ny zavatra rehetra, lazainareo na ataonareo, dia tontosao avokoa amin’ny anaran’i Jesoa Tompo ka isaory an’Andriamanitra Ray amin’ny alalany.
  - type: heading
    content: Fifandraisana entanin’ny fiainam-baovao
  '18':
  - type: text
    content: Ianareo vehivavy, maneke ny vadinareo, araka ny mety amin’ny maha mpanaraka ny Tompo anareo.
  '19':
  - type: text
    content: Ianareo lehilahy, tiavo ny vadinareo ary aza sosotra aminy.
  '2':
  - type: text
    content: 'Saino ny zavatra any ambony fa tsy ny zavatra etỳ an-tany. '
  '20':
  - type: text
    content: Ianareo zanaka, maneke ny ray aman-dreninareo amin’ny zavatra rehetra, fa izany no ankasitrahin’ny Tompo.
  '21':
  - type: text
    content: Ianareo ray aman-dreny, aza mampisafoaka ny zanakareo, fandrao hamoy fo izy.
  '22':
  - type: text
    content: 'Ianareo mpanompo, maneke ny tomponareo ara-nofo amin’ny zavatra rehetra. Aza eo imasony ihany no manao izany, toy ny mila sitraka amin’olona; fa maneke amim-pahatsoram-po noho ny fanajànareo an’i Jesoa Tompo. '
  '23':
  - type: text
    content: 'Na inona na inona ataonareo, dia tontosao amin’ny fo tokoa tahaka ny atao amin’i Jesoa Tompo fa tsy amin’olona. '
  '24':
  - type: text
    content: 'Eny, fantatrareo fa i Jesoa Tompo no handraisanareo ny valiny, dia ny anjara lova natokana ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: note
    content: Manaitra mihitsy ilay fampanantenana satria tsy mahazo mandova harena ny mpanompo. Ampit Gal 4.1-2.
  - type: text
    content: '; satria ny tena Tompo Izay tompoinareo, dia i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '25':
  - type: text
    content: Fa izay manao ratsy dia hovaliana amin’izay ratsy nataony, fa tsy mba mizaha tavan’olona Andriamanitra
  - type: note
    content: Ampit Fifan 10.17.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Fa efa maty ianareo, ka ny fiainanareo dia miara-miafina amin’i Kristy ao amin’Andriamanitra. '
  '4':
  - type: text
    content: I Kristy no tena fiainanareo ka rahatrizay hiseho Izy, dia hiara-miseho aminy koa ianareo sady hiray voninahitra aminy.
  - type: heading
    content: Ny toetra taloha sy ny toetra vaovao
  '5':
  - type: text
    content: 'Vonoy ireo zavatra etỳ an-tany mangeja ny tenanareo: dia ny fijangajangana, ny fahalotoana, ny filàndratsy, ny fitsiriritan-dratsy, ary ny fitiavan-karena (fa fanompoan-tsampy ny fitiavan-karena). '
  '6':
  - type: text
    content: 'Ireo zavatra ireo no mahatonga ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' hihatra amin’ny olona tsy manaiky an’Andriamanitra'
  - type: note
    content: Misy stf sasany tsy ahitana ny hoe hihatra amin’ny olona tsy manaiky an’Andriamanitra.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Toy izany koa ny fitondrantenanareo fahiny, fony ianareo niaina tao anatin’ireo zavatra ireo.
  '8':
  - type: text
    content: 'Fa ankehitriny kosa, esory avokoa ireto: fahatezerana, fisafoahana, faharatsiam-panahy, fanevatevana, teny maha menatra aloaky ny vavanareo. '
  '9':
  - type: text
    content: 'Aza mifandainga ianareo fa efa narianareo ny toetra taloha mbamin’ny asany, '
