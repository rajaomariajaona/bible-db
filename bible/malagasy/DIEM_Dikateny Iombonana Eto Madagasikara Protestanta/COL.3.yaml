document_id: COL.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Natsangana ho velona niaraka tamin’i Kristy ianareo. Noho izany, katsaho ny zavatra any ambony, any amin’izay itoeran’i Kristy eo ankavanan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 110.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saino ny zavatra any ambony fa tsy ny zavatra etỳ an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa efa maty ianareo, ka ny fiainanareo dia miara-miafina amin’i Kristy ao amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I Kristy no tena fiainanareo ka rahatrizay hiseho Izy, dia hiara-miseho aminy koa ianareo sady hiray voninahitra aminy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetra taloha sy ny toetra vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vonoy ireo zavatra etỳ an-tany mangeja ny tenanareo: dia ny fijangajangana, ny fahalotoana, ny filàndratsy, ny fitsiriritan-dratsy, ary ny fitiavan-karena (fa fanompoan-tsampy ny fitiavan-karena). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireo zavatra ireo no mahatonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' hihatra amin’ny olona tsy manaiky an’Andriamanitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hihatra amin’ny olona tsy manaiky an’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toy izany koa ny fitondrantenanareo fahiny, fony ianareo niaina tao anatin’ireo zavatra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ankehitriny kosa, esory avokoa ireto: fahatezerana, fisafoahana, faharatsiam-panahy, fanevatevana, teny maha menatra aloaky ny vavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mifandainga ianareo fa efa narianareo ny toetra taloha mbamin’ny asany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary efa notafînareo ny toetra vaovao: dia ny toetry ny olona havaozin’Andriamanitra hatrany araka ny endrik’Izy Mpahary azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 1.26.
    marker-yv: yv-n
  - type: text
    text: ', mba ho tonga amin’ny fahalalana tsara an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa amin’izany, tsy misy ny hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' sy Jiosy, voafora sy tsy voafora, olona tsy mivoatra na tratra aoriana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'olona tsy mivoatra na tratra aoriana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'raha ara-bakiteny kokoa dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: baribarianina na Sitianina;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Sitianina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mponina tamin’ny morontsiraka avaratry ny Ranomasina Mainty, ka noheverina ho tratra aoriana indrindra tamin’ny fandrosoana fahizany.'
    marker-yv: yv-n
  - type: text
    text: ', mpanompo sy tsy mpanompo; fa i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no zavatra rehetra sady ao aminareo rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Olomboafidin’Andriamanitra sy voatokany ho Azy ianareo sady efa notiaviny. Noho izany, aoka ianareo hitafy hatsaram-po sy fiantrana, hamoram-po sy fanetrentena, fahalemem-panahy sy fahari-po. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mifandefera ka mifamelà heloka ianareo, raha misy manana alahelo amin’ny sasany. Aoka ianareo koa mba hamela heloka, tahaka ny efa namelan’ny Tompo heloka anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 6.12, 14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ambonin’ny zavatra rehetra, mitafia ny fitiavana izay mamehy ny hatsaram-panahy rehetra ho tanteraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aoka hanjaka ao am-ponareo ny fiadanana omen’i Kristy, fa ho amin’izany fiadanana izany no niantsoan’Andriamanitra anareo hitambatra ho tena iray; ary aoka ho feno fisaorana an’Andriamanitra ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ny tenin’i Kristy hitoetra betsaka ao aminareo, ka hifampianatra sy hifananatra amim-pahendrena tanteraka ianareo; noho ny fahasoavana manenika anareo, dia mihirà amin’ny fonareo tokoa ho an’Andriamanitra ka mikaloa salamo sy hira ary antsa asesiky ny Fanahy Masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ef 5.19-20.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny zavatra rehetra, lazainareo na ataonareo, dia tontosao avokoa amin’ny anaran’i Jesoa Tompo ka isaory an’Andriamanitra Ray amin’ny alalany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifandraisana entanin’ny fiainam-baovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ianareo vehivavy, maneke ny vadinareo, araka ny mety amin’ny maha mpanaraka ny Tompo anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ianareo lehilahy, tiavo ny vadinareo ary aza sosotra aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ianareo zanaka, maneke ny ray aman-dreninareo amin’ny zavatra rehetra, fa izany no ankasitrahin’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ianareo ray aman-dreny, aza mampisafoaka ny zanakareo, fandrao hamoy fo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ianareo mpanompo, maneke ny tomponareo ara-nofo amin’ny zavatra rehetra. Aza eo imasony ihany no manao izany, toy ny mila sitraka amin’olona; fa maneke amim-pahatsoram-po noho ny fanajànareo an’i Jesoa Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Na inona na inona ataonareo, dia tontosao amin’ny fo tokoa tahaka ny atao amin’i Jesoa Tompo fa tsy amin’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, fantatrareo fa i Jesoa Tompo no handraisanareo ny valiny, dia ny anjara lova natokana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manaitra mihitsy ilay fampanantenana satria tsy mahazo mandova harena ny mpanompo. Ampit Gal 4.1-2.
    marker-yv: yv-n
  - type: text
    text: '; satria ny tena Tompo Izay tompoinareo, dia i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa izay manao ratsy dia hovaliana amin’izay ratsy nataony, fa tsy mba mizaha tavan’olona Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Fifan 10.17.
    marker-yv: yv-n
  - type: text
    text: .
