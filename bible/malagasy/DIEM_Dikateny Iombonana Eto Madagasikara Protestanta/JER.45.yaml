document_id: JER.45
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’i Baròka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fony i Baròka zanakalahin’i Nerià nanao an-tsoratra ny hafatra izay notononin’i Jeremià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'notononin’i Jeremià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo Jer 36. –taona fahefatra nanjakàn’i Jôiakima: tamin’ny 605 tal J.K. Jereo Jer 22.13; 25.1 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', dia taona fahefatra nanjakàn’i Jôiakima zanakalahin’i Jôsià sady mpanjakan’i Joda tamin’izay; ka hoy ny teny nataon’i Jeremià mpaminany tamin’i Baròka:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely momba anao, ry Baròka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «Idiran-doza aho, hoy ianao, fa ampian’ny TOMPO alahelo indray ny fahoriako; efa sasatry ny misento aho fa tsy mba misy hitsaharana!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany, dia izao no hafatry ny TOMPO asainy ampitaiko aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eo am-pandravana izay naoriko Aho izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary eo am-panongotana izay namboleko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary korontaniko ny tany tontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa ianao ve sahy hitaky tombontsoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny tenanao manokana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, aza mitaky na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa indro Aho hahatonga loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho amin’ny olombelona rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny hentitra avy amiko TOMPO izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Kanefa izao no tombontsoa hanananao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko velona aina ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: any amin’ny toerana rehetra halehanao.»
