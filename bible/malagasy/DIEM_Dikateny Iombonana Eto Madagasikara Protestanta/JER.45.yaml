document_id: JER.45,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatra ho an’i Baròka
  - type: text
    content: Fony i Baròka zanakalahin’i Nerià nanao an-tsoratra ny hafatra izay notononin’i Jeremià
  - type: note
    content: 'notononin’i Jeremià: jereo Jer 36. –taona fahefatra nanjakàn’i Jôiakima: tamin’ny 605 tal J.K. Jereo Jer 22.13; 25.1 sy nta.'
  - type: text
    content: ', dia taona fahefatra nanjakàn’i Jôiakima zanakalahin’i Jôsià sady mpanjakan’i Joda tamin’izay; ka hoy ny teny nataon’i Jeremià mpaminany tamin’i Baròka:'
  '2':
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely momba anao, ry Baròka. '
  '3':
  - type: text
    content: «Idiran-doza aho, hoy ianao, fa ampian’ny TOMPO alahelo indray ny fahoriako; efa sasatry ny misento aho fa tsy mba misy hitsaharana!»
  '4':
  - type: text
    content: 'Noho izany, dia izao no hafatry ny TOMPO asainy ampitaiko aminao:'
  - type: text
    content: «Eo am-pandravana izay naoriko Aho izao
  - type: text
    content: ary eo am-panongotana izay namboleko;
  - type: text
    content: ary korontaniko ny tany tontolo.
  '5':
  - type: text
    content: Koa ianao ve sahy hitaky tombontsoa
  - type: text
    content: ho an’ny tenanao manokana?
  - type: text
    content: Tsia, aza mitaky na inona na inona;
  - type: text
    content: fa indro Aho hahatonga loza
  - type: text
    content: ho amin’ny olombelona rehetra.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  - type: text
    content: 'Kanefa izao no tombontsoa hanananao:'
  - type: text
    content: Hataoko velona aina ianao
  - type: text
    content: any amin’ny toerana rehetra halehanao.»
