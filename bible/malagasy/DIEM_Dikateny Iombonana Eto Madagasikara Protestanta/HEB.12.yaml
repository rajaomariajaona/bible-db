document_id: HEB.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raintsika tokoa Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voahodidina vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vavolombelona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' etoana dia tsy mpitazana fotsiny fa olona niaina ny finoana araka ny toko 11 etsy aloha.'
    marker-yv: yv-n
  - type: text
    text: ' marobe tokoa àry isika; noho izany, dia aoka hanaisotra ny zavatra rehetra manembantsembana ny hazakazaka ataontsika sy hanaisotra ny ota mora mangeja antsika, ary hiezaka amim-paharetana eo amin’izao fifaninanana hazakazaka naroso hataontsika izao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka isika hifantoka tsara amin’i Jesoa, Izay loharanon’ny finoantsika hatramin’ny voalohany ka hatramin’ny farany. Niaretan’i Jesoa ny namonoana Azy teo amin’ny hazofijaliana fa tsy nitandroany henatra, satria tsinjony sahady ny hafaliana natao ho azony; ka izao Izy efa mipetraka eo ankavanan’ny sezafiandrianan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria tsinjony... azony: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka tsy nahoany ny fifaliana natao teo anoloany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izao Izy efa mipetraka...:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Sal 110.1.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eritrereto tsara i Jesoa, Izay niaritra ny fanoherana mafy nafitsoky ny mpanota taminy; ka aza kivy, aza ketraka ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy mbola nihatra taman’aina tsy akory ny ady nataonareo hanoherana ny fahotana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary efa hadinonareo ve ny teny fampaherezana milaza aminareo toy ny amin-janaka hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Anaka, aza atao tsirambina ny famaizana ampiharin’ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza ketraka rehefa anariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny zanaka tiany no faizin’ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay rehetra raisiny ho zanaka no kapohiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ohab 3.11-12, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: »?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho famaizana anareo no aoka hiaretanareo fijaliana; toy ny zanaka no itondran’Andriamanitra anareo, satria iza moa no zanaka tsy faizin-drainy? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha tsy faizina tahaka ny atao amin’ny zanaka rehetra ianareo, dia tsy tena zanaka fa zazasary. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanana ny raintsika eto an-tany isika, ary nampihatra famaizana tamintsika izy ka izany no anajantsika azy; fa vao mainka tokony hanaiky ilay Raintsika any an-danitra isika mba ho velona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Famaizana mandritra ny andro vitsivitsy ihany no nampiharin’ireo raintsika eto an-tany, araka izay heveriny fa mety; fa soa ho antsika kosa no amaizan’Andriamanitra antsika, dia ny mba hiombonantsika anjara amin’ny fahamasinany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa faizina isika, dia heverintsika ho zavatra mampahory fa tsy mahafaly izany eo no ho eo; fa atỳ aoriana, ny olona tinaiza tamin’izany famaizana izany vao mahita ny voka-tsoany: dia fiadanana vokatry ny fitondrantena mahitsy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hatanjaho àry ny tanana miraviravy sy ny lohalika malemy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mizora amin’ny lala-mahitsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 12-13:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 53.3 sy Ohab 4.26, samy voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: ' hatrany mba tsy hipitsoka ny tongotra mandringa fa mba ho sitrana tsara.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Torohevitra sy fampitandremana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Iezaho ny hahatsara fihavanana amin’ny olona rehetra sy ny hanana toe-piainana masina; fa izay tsy manana toe-piainana masina dia tsy hahita ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mitandrema tsara mba tsy hisy hiala amin’ny fahasoavan’Andriamanitra. Aoka mba tsy hisy ho tonga ahitra mangidy mitrebona ka hanapoizina sy hanimba ny maro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fifan 29.17, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aoka mba tsy hisy mpijangajanga na olona mpanazimba ny zava-masina tahaka an’i Hesao izay nivarotra ny fizokiany hahazoany hanina indraim-bava. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fantatrareo fa te hahazo ny tsodranon-drainy izy tatỳ aoriana, kanefa dia nolavina; satria tsy afaka hanova ny efa nataony izy, na dia nitady fatratra tamin-dranomaso aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 16-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 25.29-34; 27.30-40. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny efa nataony izy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny efa nataon-drainy izy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy mba tendrombohitra azo tsapain-tanana toy ny an’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' tsy akory no efa nohatoninareo, dia ny tendrombohitra Sinay mirehitra afo, rakotra haizina sy rahona mainty, ombàn’orambaratra '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: sy trompetra maneno ary feo mireondreona. Nony ren’ny vahoaka Israely izany feo izany, dia nitalaho izy mba tsy hisy intsony teny hafa hatao aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 18-19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 19.12-13. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Fifan 9.19.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'satria tsy tohany rahateo ny baiko hoe: «Na dia izay biby mikasikasika ny tendrombohitra aza, dia hatao matin’ny torabato.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nahatsiravina loatra ny zava-niseho ka hoy i Mosesy: «Mangorohoro aho fa matahotra loatra.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny efa nohatoninareo kosa dia ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' misy ny tanànan’Andriamanitra velona, dia i Jerosalema any an-danitra. Ny efa nohatoninareo dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' marobe tsy hita isa '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary koa ny Fiangonana ivorian’ireo zanaka malalan’Andriamanitra toa lahimatoany, dia ireo voasoratra anarana any an-danitra. Ny efa nohatoninareo dia Andriamanitra mpitsara ny olona rehetra ary koa ireo fanahin’ny olo-marina efa tonga lafatra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny efa nohatoninareo dia i Jesoa, mpanalalana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanekempihavanana Vaovao
  - type: text
    text: ', ary koa ny rany nafafy izay miteny tsara lavitra noho ny ran’i Abela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 4.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mitandrema àry! Aza manentsin-tadîny amin’izay miteny aminareo. Fa raha tsy afa-nandositra ireo nanentsin-tadîny tamin’ilay nilaza hafatr’Andriamanitra taminy teto an-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 20.22.
    marker-yv: yv-n
  - type: text
    text: ', mainka fa isika raha miala amin’Ilay miteny amintsika avy any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny feony dia nanozongozona ny tany fahizay; ankehitriny kosa dia mbola mampanantena antsika Izy manao he: «Hohozongozoniko indray mandeha koa, tsy ny tany ihany, fa ny habakabaka koa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hag 2.6, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny hoe «indray mandeha koa» dia manambara fa hohozongozonina sady hovana ny zavaboaary, mba haharetan’izay zavatra tsy azo hozongozonina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aoka àry isika hahay misaotra an’Andriamanitra noho isika mandray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakana
  - type: text
    text: ' tsy azo hozongozonina. Izany fahaiza-misaotra Azy izany dia aoka hasehontsika amin’ny fanompoana sitrak’Andriamanitra, fanompoana ombàm-panajana sy fahatahorana; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: fa ilay Andriamanitsika dia afo mandevona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fifan 4.24.
    marker-yv: yv-n
  - type: text
    text: .
