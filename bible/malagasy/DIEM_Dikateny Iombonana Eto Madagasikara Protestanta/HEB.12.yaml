document_id: HEB.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Raintsika tokoa Andriamanitra
  - type: text
    content: Voahodidina vavolombelona
  - type: note
    content: ny hoe vavolombelona etoana dia tsy mpitazana fotsiny fa olona niaina ny finoana araka ny toko 11 etsy aloha.
  - type: text
    content: ' marobe tokoa àry isika; noho izany, dia aoka hanaisotra ny zavatra rehetra manembantsembana ny hazakazaka ataontsika sy hanaisotra ny ota mora mangeja antsika, ary hiezaka amim-paharetana eo amin’izao fifaninanana hazakazaka naroso hataontsika izao. '
  '10':
  - type: text
    content: 'Famaizana mandritra ny andro vitsivitsy ihany no nampiharin’ireo raintsika eto an-tany, araka izay heveriny fa mety; fa soa ho antsika kosa no amaizan’Andriamanitra antsika, dia ny mba hiombonantsika anjara amin’ny fahamasinany. '
  '11':
  - type: text
    content: 'Rehefa faizina isika, dia heverintsika ho zavatra mampahory fa tsy mahafaly izany eo no ho eo; fa atỳ aoriana, ny olona tinaiza tamin’izany famaizana izany vao mahita ny voka-tsoany: dia fiadanana vokatry ny fitondrantena mahitsy.'
  '12':
  - type: text
    content: 'Hatanjaho àry ny tanana miraviravy sy ny lohalika malemy. '
  '13':
  - type: text
    content: Mizora amin’ny lala-mahitsy
  - type: note
    content: 'And 12-13: Is 53.3 sy Ohab 4.26, samy voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: ' hatrany mba tsy hipitsoka ny tongotra mandringa fa mba ho sitrana tsara.'
  - type: heading
    content: Torohevitra sy fampitandremana
  '14':
  - type: text
    content: 'Iezaho ny hahatsara fihavanana amin’ny olona rehetra sy ny hanana toe-piainana masina; fa izay tsy manana toe-piainana masina dia tsy hahita ny Tompo. '
  '15':
  - type: text
    content: Mitandrema tsara mba tsy hisy hiala amin’ny fahasoavan’Andriamanitra. Aoka mba tsy hisy ho tonga ahitra mangidy mitrebona ka hanapoizina sy hanimba ny maro
  - type: note
    content: Fifan 29.17, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Aoka mba tsy hisy mpijangajanga na olona mpanazimba ny zava-masina tahaka an’i Hesao izay nivarotra ny fizokiany hahazoany hanina indraim-bava. '
  '17':
  - type: text
    content: Fantatrareo fa te hahazo ny tsodranon-drainy izy tatỳ aoriana, kanefa dia nolavina; satria tsy afaka hanova ny efa nataony izy, na dia nitady fatratra tamin-dranomaso aza
  - type: note
    content: 'And 16-17: jereo Gen 25.29-34; 27.30-40. –ny efa nataony izy: dkt hafa ny efa nataon-drainy izy.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Tsy mba tendrombohitra azo tsapain-tanana toy ny an’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' tsy akory no efa nohatoninareo, dia ny tendrombohitra Sinay mirehitra afo, rakotra haizina sy rahona mainty, ombàn’orambaratra '
  '19':
  - type: text
    content: sy trompetra maneno ary feo mireondreona. Nony ren’ny vahoaka Israely izany feo izany, dia nitalaho izy mba tsy hisy intsony teny hafa hatao aminy
  - type: note
    content: 'And 18-19: jereo Eks 19.12-13. –And 21: ampit Fifan 9.19.'
  - type: text
    content: ', '
  '2':
  - type: text
    content: Aoka isika hifantoka tsara amin’i Jesoa, Izay loharanon’ny finoantsika hatramin’ny voalohany ka hatramin’ny farany. Niaretan’i Jesoa ny namonoana Azy teo amin’ny hazofijaliana fa tsy nitandroany henatra, satria tsinjony sahady ny hafaliana natao ho azony; ka izao Izy efa mipetraka eo ankavanan’ny sezafiandrianan’Andriamanitra
  - type: note
    content: 'satria tsinjony... azony: dkt hafa ka tsy nahoany ny fifaliana natao teo anoloany. –izao Izy efa mipetraka...: jereo Sal 110.1.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'satria tsy tohany rahateo ny baiko hoe: «Na dia izay biby mikasikasika ny tendrombohitra aza, dia hatao matin’ny torabato.» '
  '21':
  - type: text
    content: 'Nahatsiravina loatra ny zava-niseho ka hoy i Mosesy: «Mangorohoro aho fa matahotra loatra.»'
  '22':
  - type: text
    content: 'Fa ny efa nohatoninareo kosa dia ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' misy ny tanànan’Andriamanitra velona, dia i Jerosalema any an-danitra. Ny efa nohatoninareo dia ny '
  - type: text
    content: anjely
  - type: text
    content: ' marobe tsy hita isa '
  '23':
  - type: text
    content: 'ary koa ny Fiangonana ivorian’ireo zanaka malalan’Andriamanitra toa lahimatoany, dia ireo voasoratra anarana any an-danitra. Ny efa nohatoninareo dia Andriamanitra mpitsara ny olona rehetra ary koa ireo fanahin’ny olo-marina efa tonga lafatra. '
  '24':
  - type: text
    content: 'Ny efa nohatoninareo dia i Jesoa, mpanalalana amin’ny '
  - type: text
    content: Fanekempihavanana Vaovao
  - type: text
    content: ', ary koa ny rany nafafy izay miteny tsara lavitra noho ny ran’i Abela'
  - type: note
    content: Jereo Gen 4.10.
  - type: text
    content: .
  '25':
  - type: text
    content: Mitandrema àry! Aza manentsin-tadîny amin’izay miteny aminareo. Fa raha tsy afa-nandositra ireo nanentsin-tadîny tamin’ilay nilaza hafatr’Andriamanitra taminy teto an-tany
  - type: note
    content: Ampit Eks 20.22.
  - type: text
    content: ', mainka fa isika raha miala amin’Ilay miteny amintsika avy any an-danitra. '
  '26':
  - type: text
    content: 'Ny feony dia nanozongozona ny tany fahizay; ankehitriny kosa dia mbola mampanantena antsika Izy manao he: «Hohozongozoniko indray mandeha koa, tsy ny tany ihany, fa ny habakabaka koa'
  - type: note
    content: Hag 2.6, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '.» '
  '27':
  - type: text
    content: Ny hoe «indray mandeha koa» dia manambara fa hohozongozonina sady hovana ny zavaboaary, mba haharetan’izay zavatra tsy azo hozongozonina.
  '28':
  - type: text
    content: 'Aoka àry isika hahay misaotra an’Andriamanitra noho isika mandray '
  - type: text
    content: Fanjakana
  - type: text
    content: ' tsy azo hozongozonina. Izany fahaiza-misaotra Azy izany dia aoka hasehontsika amin’ny fanompoana sitrak’Andriamanitra, fanompoana ombàm-panajana sy fahatahorana; '
  '29':
  - type: text
    content: fa ilay Andriamanitsika dia afo mandevona
  - type: note
    content: Jereo Fifan 4.24.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Eritrereto tsara i Jesoa, Izay niaritra ny fanoherana mafy nafitsoky ny mpanota taminy; ka aza kivy, aza ketraka ianareo. '
  '4':
  - type: text
    content: 'Fa tsy mbola nihatra taman’aina tsy akory ny ady nataonareo hanoherana ny fahotana. '
  '5':
  - type: text
    content: 'Ary efa hadinonareo ve ny teny fampaherezana milaza aminareo toy ny amin-janaka hoe:'
  - type: text
    content: «Anaka, aza atao tsirambina ny famaizana ampiharin’ny Tompo;
  - type: text
    content: ary aza ketraka rehefa anariny.
  '6':
  - type: text
    content: Fa ny zanaka tiany no faizin’ny Tompo
  - type: text
    content: ary izay rehetra raisiny ho zanaka no kapohiny
  - type: note
    content: Ohab 3.11-12, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: »?
  '7':
  - type: text
    content: 'Ho famaizana anareo no aoka hiaretanareo fijaliana; toy ny zanaka no itondran’Andriamanitra anareo, satria iza moa no zanaka tsy faizin-drainy? '
  '8':
  - type: text
    content: 'Fa raha tsy faizina tahaka ny atao amin’ny zanaka rehetra ianareo, dia tsy tena zanaka fa zazasary. '
  '9':
  - type: text
    content: 'Nanana ny raintsika eto an-tany isika, ary nampihatra famaizana tamintsika izy ka izany no anajantsika azy; fa vao mainka tokony hanaiky ilay Raintsika any an-danitra isika mba ho velona. '
