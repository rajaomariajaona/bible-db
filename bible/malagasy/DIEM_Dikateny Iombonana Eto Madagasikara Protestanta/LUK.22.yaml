- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy izy roa lahy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza no tianao hanomananay azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha vao tafiditra ny tanàna ianareo, dia hisy lehilahy mitondra siny feno rano hifanena aminareo; ka iny arahina any amin’izay trano hidirany, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary lazao amin’ny tompon-trano hoe: «Izao no tenin’ny Mpampianatra aminao: Aiza, hono, izay efitrano hiarahako mihinana ny sakafo Paska amin’ny mpianatro?» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hotoroany efitrano ambony rihana ianareo, efitrano malalaka sady ary fomba; ka ao ny sakafo no omany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lasa izy roa lahy ka nahita ny toe-javatra araka ny voalazan’i Jesoa taminy ary dia nanomana ny sakafo Paska.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Fanasan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.26-30; Mk 14.22-26; 1 Kôr 11.23-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nony tonga ny fotoana, dia nipetraka nihinana i Jesoa mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Niriko dia niriko tokoa hiara-mihinana ity sakafo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' ity aminareo alohan’ny hijaliako. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lazaiko aminareo fa tsy hihinana ny Paska intsony Aho mandra-pahatanteraka azy any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nandray '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kalisy
  - type: text
    text: ' natolotra Azy i Jesoa; ary nisaorany an’Andriamanitra izany ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raiso ity ka ifampizarao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lazaiko aminareo fa tsy hisotro divay intsony Aho mandra-pahatongavan’ny Fanjakàn’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avy eo nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny apôstôly ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny tenako ity [izay omena ho anareo. Izany atao ho fahatsiarovana Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary noraisin’i Jesoa toy izany koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kalisy
  - type: text
    text: ' taorian’ny sakafo sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ity kalisy ity dia ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' vaovao aorin’Andriamanitra amin’ny rako izay alatsaka ho anareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ny and 20 sy Eks 24.8; Jer 31.31-34.
    marker-yv: yv-n
  - type: text
    text: '.] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eny, indro miaraka amiko eto am-pisakafoana ilay hanolotra Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 41.10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' moa dia efa ho faty araka izay voalahatran’Andriamanitra, nefa mampalahelo ilay olona hanolotra Azy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nifanontany ireo apôstôly hoe: «Iza re amintsika no dia hahavita izany?»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Iza no lehibe indrindra?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nisy fifandirana teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' ny amin’izay tokony ho lehibe indrindra amin’izy samy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Eo amin’ny hafa firenena, ny mpanjaka dia manjakazaka; ary ny mpanampatra fahefana dia antsoina hoe mpanasoa. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aminareo kosa tsy mba toy izany: izay lehibe kokoa eo aminareo no aoka ho toy ny zandriny, ary izay mpifehy ho toy ny mpanompo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Satria iza moa no lehibe kokoa: ny mipetraka mihinana sa ny mpanompo mampihinana? Moa ve tsy izay mipetraka mihinana? Izaho anefa eto afovoanareo dia toy ny mpanompo mampihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ianareo dia naharitra niaraka tamiko tamin’ny fitsapana nanjo Ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izaho kosa manendry anareo ho mpanjaka tahaka ny nanendren’ny Ray Ahy ho mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ka hihinana sy hisotro eo amin’ny latabatro ianareo any amin’ny Fanjakàko ary hipetraka ambony sezafiandrianana hitsara ny foko 12 amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa ny handavan’i Petera Azy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.31-35; Mk 14.27-31; Jôh 13.36-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hoy i Jesoa tamin’i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Simôna, ry Simôna, indro efa notakîn’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' hokotranina toy ny vary sivanina ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izaho efa nangataka ho anao mba tsy ho lefy ny finoanao; ianao kosa, rehefa tafaverina amiko, herezo ny rahalahinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa i Petera niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, vonon-kanaraka Anao aho na ho any am-ponja sy ho any amin’ny fahafatesana aza!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lazaiko aminao, ry Petera, fa mbola tsy haneno akory ny akoho anio, dia efa intelo no handavanao ho tsy mahalala Ahy!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilaina ny kitapo sy ny sabatra amin’ny andro sarotra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary izao no tenin’i Jesoa tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa orin-javatra ve ianareo, raha nirahiko tsy aman-kitapom-bola na kitapom-batsy na kapa?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy orin’inona na inona izahay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Amin’izao kosa anefa, izay manana kitapom-bola, aoka hivimbina ny azy; torak’izany koa izay manana kitapom-batsy; ary izay tsy manan-tsabatra, aoka hivarotra ny lambany ka hividy sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Lazaiko aminareo fa tsy maintsy tanteraka amiko ilay tenin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Natao ho isan’ny mpanao ratsy Izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 53.12.
    marker-yv: yv-n
  - type: text
    text: »; ary efa ho tanteraka tokoa ity ny momba Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy ny apôstôly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indreto, Tompoko, misy sabatra roa!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa i Jesoa nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aoka izay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ampy izay.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
