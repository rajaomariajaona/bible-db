    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia niainga i Jesoa nankany an-tendrombohitra Analanôliva araka ny fanaony; ary tafaraka taminy koa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Vao tonga teo amin’ilay toerana i Jesoa, dia nanao tamin’ny mpianany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mivavaha mba tsy ho azon’ny fakampanahy ianareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nihataka tamin’ny mpianany tokony ho tra-toraka i Jesoa; dia nandohalika Izy ary nivavaka '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ray ô, raha sitrakao, esory lavitra Ahy izao fijaliana izao; kanefa aoka tsy ny sitrapoko no hatao, fa ny anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Tamin’izay kosa nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' anankiray avy tany an-danitra niseho taminy sy nankahery Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia nitebiteby fadiranovana Izy, fa vao mainka nivavaka mafimafy kokoa indray. Ary nanjary toy ny ra mitete ny hatsembohany sady nipotrapotraka tamin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nony nitsangana avy nivavaka i Jesoa, dia nankeo amin’ny mpianany, ka nahita azy ireo natory noho ny alahelo. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no matory ianareo? Mifohaza, ka mivavaha mba tsy ho azon’ny fakampanahy ianareo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voasambotra i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.47-56; Mk 14.43-50; Jôh 18.3-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Raha mbola miteny eo i Jesoa, dia indro nisy andian’olona tamy; ka ilay atao hoe Jodasy, anankiray amin’ny 12 lahy no lohalalana. Ary nanatona an’i Jesoa i Jodasy mba hanoroka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –O! ry Jodasy, dia fanorohana ve no anoloranao ny Zanak’olona?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Nahatsinjo ny zava-hitranga ireo mpianatra teo amin’i Jesoa, ka nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana, Tompoko, raha mba hamely amin’ny sabatra izahay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia namely ny mpanompon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' tokoa ny anankiray tamin’ireto mpianatra, ka nahafaka ny sofiny havanana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 18.10,26.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa niteny i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nikasika ny sofin-dralehilahy Izy, ka nanasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary izao no tenin’i Jesoa tamin’ny lohandoha-mpisorona sy ny lehiben’ny mpiambina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' tonga teo hisambotra Azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Toy ny hisambotra jiolahy izato fiavinareo mirongo sabatra sy kibay. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Teo aminareo isan’andro Aho tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' kanefa tsy nikasi-tanana Ahy ianareo; fa izao no ora voatendry ho anareo sy hanamparan’ny maizina ny fahefàny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lavin’i Petera i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.57-58, 69-75; Mk 14.53-54, 66-72; Jôh 18.12-18, 25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia nosamborin-dry zareo i Jesoa ary nentiny ka nampidiriny tao amin’ny tranon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: '. I Petera izany nanjohy lavidavitra teny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Namelona afo teo afovoan-tokotany ny mpiasa ary namindro; dia mba namindro niaraka taminy teo koa i Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Teo amin’ny mazavazava izy no nitoetra, hany ka tsikaritry ny vehivavy mpiasa anankiray sy nodinidinihiny ary nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ity rangahy ity koa niaraka taminy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Fa nandà i Petera nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mahalala Azy aho, ramatoa!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nony afaka kelikely, dia nisy lehilahy indray nahatsikaritra azy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao koa anisan’ireny!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy anisany aho, andriamatoa!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary tokony ho adiny iray taoriana, nisy lehilahy hafa koa nanizingizina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tena niaraka tamin’io mihitsy ity rangahy ity sady Galileanina rahateo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa hoy i Petera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy fantatro izay lazainao, andriamatoa!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niaraka tamin’izay, raha mbola niteny i Petera, dia nisy akoho naneno. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary nitodika nijery an’i Petera ny Tompo ka tsaroan’i Petera ny tenin’ny Tompo fony Izy nilaza taminy hoe: «Alohan’ny maneno akoho anio, dia handà Ahy intelo ianao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.61 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 22.34.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Dia lasa nankany ivelany i Petera ka nitomany fatratra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tevatevain’ny mpiambina i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.67-68; Mk 14.65)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Dia nesoin’ireo mpiambina Azy i Jesoa sady nokapohiny; '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'ary nony avy nosaronany tava, dia nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vinanio hoe izay namely Anao teo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Ary maro koa ny teny hafa nanevatevany Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eo anatrehan’ny Fitsarana jiosy i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 26.59-66; Mk 14.55-64; Jôh 18.19-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Nony maraina ny andro, dia nivory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholom
  - type: text
    text: '-bahoaka sy ny lohandoha-mpisorona mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: '; ary nasain-dry zareo nentina i Jesoa hiatrika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fitsarana
  - type: text
    text: ' ambony teo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Ka hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazao aminay raha Ianao no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha hilaza aminareo Aho, tsy hinoanareo akory; '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'raha hanontany Aho, tsy hovalianareo akory. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Tsy ho ela intsony anefa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' dia hipetraka eo ankavanan’ilay Andriamanitra mahery'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.69 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 110.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Ary hoy izy rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Koa Ianao ve izany no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Voalazanareo fa Izaho no Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Ka hoy ry zareo:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona indray no ilàntsika vavolombelona? Ny tenantsika no efa nandre tamin’ny vavany.
