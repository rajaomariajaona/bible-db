  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nitady izay fomba hamonoana an’i Jesoa ny lohandoha-mpisorona sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ', nefa tsy nahita satria natahotra ny vahoaka ry zareo.'
- type: usfm
  marker: p
