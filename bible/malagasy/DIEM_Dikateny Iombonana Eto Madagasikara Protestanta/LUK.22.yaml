  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanjo nidiran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' tao am-pon’i Jodasy, ilay atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Iskariôta
  - type: text
    text: ', anisan’ny 12 lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nankany amin’ny lohandoha-mpisorona sy ny lehiben’ny mpiambina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' izy hidinidinika ny amin’izay hanolorany an’i Jesoa aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Faly tokoa ry zareo ary nifanaraka fa hanome vola azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nanaiky i Jodasy ka nitady izay fotoana tsara hanolorana an-tsokosoko an’i Jesoa eo am-pelatanany.
- type: usfm
  marker: s1
