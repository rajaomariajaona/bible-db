document_id: LUK.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikasana hamono an’i Jesoa
  - type: heading
    content: (Jereo Mt 26.1-5, 14-16; Mk 14.1-2, 10-11; Jôh 11.45-53)
  - type: text
    content: 'Efa akaiky ny fankalazana ny '
  - type: text
    content: azima
  - type: text
    content: ', izay antsoina hoe '
  - type: text
    content: Paska
  - type: note
    content: Jereo Eks 12.1-27.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Raha vao tafiditra ny tanàna ianareo, dia hisy lehilahy mitondra siny feno rano hifanena aminareo; ka iny arahina any amin’izay trano hidirany, '
  '11':
  - type: text
    content: 'ary lazao amin’ny tompon-trano hoe: «Izao no tenin’ny Mpampianatra aminao: Aiza, hono, izay efitrano hiarahako mihinana ny sakafo Paska amin’ny mpianatro?» '
  '12':
  - type: text
    content: Dia hotoroany efitrano ambony rihana ianareo, efitrano malalaka sady ary fomba; ka ao ny sakafo no omany.
  '13':
  - type: text
    content: Lasa izy roa lahy ka nahita ny toe-javatra araka ny voalazan’i Jesoa taminy ary dia nanomana ny sakafo Paska.
  - type: heading
    content: Ny Fanasan’ny Tompo
  - type: heading
    content: (Jereo Mt 26.26-30; Mk 14.22-26; 1 Kôr 11.23-25)
  '14':
  - type: text
    content: 'Nony tonga ny fotoana, dia nipetraka nihinana i Jesoa mbamin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Niriko dia niriko tokoa hiara-mihinana ity sakafo '
  - type: text
    content: Paska
  - type: text
    content: ' ity aminareo alohan’ny hijaliako. '
  '16':
  - type: text
    content: 'Lazaiko aminareo fa tsy hihinana ny Paska intsony Aho mandra-pahatanteraka azy any amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '17':
  - type: text
    content: 'Dia nandray '
  - type: text
    content: kalisy
  - type: text
    content: ' natolotra Azy i Jesoa; ary nisaorany an’Andriamanitra izany ka nataony hoe:'
  - type: text
    content: '–Raiso ity ka ifampizarao. '
  '18':
  - type: text
    content: Lazaiko aminareo fa tsy hisotro divay intsony Aho mandra-pahatongavan’ny Fanjakàn’Andriamanitra.
  '19':
  - type: text
    content: 'Avy eo nandray mofo i Jesoa; ary nisaorany an’Andriamanitra izany, dia notapatapahiny sy nomeny ny apôstôly ka nataony hoe:'
  - type: text
    content: –Ny tenako ity [izay omena ho anareo. Izany atao ho fahatsiarovana Ahy.
  '2':
  - type: text
    content: 'Ary nitady izay fomba hamonoana an’i Jesoa ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', nefa tsy nahita satria natahotra ny vahoaka ry zareo.'
  '20':
  - type: text
    content: 'Ary noraisin’i Jesoa toy izany koa ny '
  - type: text
    content: kalisy
  - type: text
    content: ' taorian’ny sakafo sady nataony hoe:'
  - type: text
    content: '–Ity kalisy ity dia ilay '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' vaovao aorin’Andriamanitra amin’ny rako izay alatsaka ho anareo'
  - type: note
    content: Ampit ny and 20 sy Eks 24.8; Jer 31.31-34.
  - type: text
    content: '.] '
  '21':
  - type: text
    content: Eny, indro miaraka amiko eto am-pisakafoana ilay hanolotra Ahy
  - type: note
    content: Ampit Sal 41.10.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' moa dia efa ho faty araka izay voalahatran’Andriamanitra, nefa mampalahelo ilay olona hanolotra Azy!'
  '23':
  - type: text
    content: 'Ary nifanontany ireo apôstôly hoe: «Iza re amintsika no dia hahavita izany?»'
  - type: heading
    content: Iza no lehibe indrindra?
  '24':
  - type: text
    content: 'Nisy fifandirana teo amin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' ny amin’izay tokony ho lehibe indrindra amin’izy samy izy. '
  '25':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Eo amin’ny hafa firenena, ny mpanjaka dia manjakazaka; ary ny mpanampatra fahefana dia antsoina hoe mpanasoa. '
  '26':
  - type: text
    content: 'Aminareo kosa tsy mba toy izany: izay lehibe kokoa eo aminareo no aoka ho toy ny zandriny, ary izay mpifehy ho toy ny mpanompo. '
  '27':
  - type: text
    content: 'Satria iza moa no lehibe kokoa: ny mipetraka mihinana sa ny mpanompo mampihinana? Moa ve tsy izay mipetraka mihinana? Izaho anefa eto afovoanareo dia toy ny mpanompo mampihinana. '
  '28':
  - type: text
    content: 'Ianareo dia naharitra niaraka tamiko tamin’ny fitsapana nanjo Ahy; '
  '29':
  - type: text
    content: 'Izaho kosa manendry anareo ho mpanjaka tahaka ny nanendren’ny Ray Ahy ho mpanjaka. '
  '3':
  - type: text
    content: 'Kanjo nidiran’i '
  - type: text
    content: Satàna
  - type: text
    content: ' tao am-pon’i Jodasy, ilay atao hoe '
  - type: text
    content: Iskariôta
  - type: text
    content: ', anisan’ny 12 lahy. '
  '30':
  - type: text
    content: 'Ka hihinana sy hisotro eo amin’ny latabatro ianareo any amin’ny Fanjakàko ary hipetraka ambony sezafiandrianana hitsara ny foko 12 amin’i '
  - type: text
    content: Israely
  - type: text
    content: .
  - type: heading
    content: Ambaran’i Jesoa ny handavan’i Petera Azy
  - type: heading
    content: (Jereo Mt 26.31-35; Mk 14.27-31; Jôh 13.36-38)
  '31':
  - type: text
    content: 'Hoy i Jesoa tamin’i Petera:'
  - type: text
    content: '–Ry Simôna, ry Simôna, indro efa notakîn’i '
  - type: text
    content: Satàna
  - type: text
    content: ' hokotranina toy ny vary sivanina ianareo. '
  '32':
  - type: text
    content: Izaho efa nangataka ho anao mba tsy ho lefy ny finoanao; ianao kosa, rehefa tafaverina amiko, herezo ny rahalahinao.
  '33':
  - type: text
    content: 'Fa i Petera niteny taminy hoe:'
  - type: text
    content: –Tompo ô, vonon-kanaraka Anao aho na ho any am-ponja sy ho any amin’ny fahafatesana aza!
  '34':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Lazaiko aminao, ry Petera, fa mbola tsy haneno akory ny akoho anio, dia efa intelo no handavanao ho tsy mahalala Ahy!
  - type: heading
    content: Ilaina ny kitapo sy ny sabatra amin’ny andro sarotra
  '35':
  - type: text
    content: 'Ary izao no tenin’i Jesoa tamin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ':'
  - type: text
    content: –Moa orin-javatra ve ianareo, raha nirahiko tsy aman-kitapom-bola na kitapom-batsy na kapa?
  - type: text
    content: 'Dia novalian’ireo hoe:'
  - type: text
    content: –Tsy orin’inona na inona izahay!
  '36':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: '–Amin’izao kosa anefa, izay manana kitapom-bola, aoka hivimbina ny azy; torak’izany koa izay manana kitapom-batsy; ary izay tsy manan-tsabatra, aoka hivarotra ny lambany ka hividy sabatra. '
  '37':
  - type: text
    content: 'Lazaiko aminareo fa tsy maintsy tanteraka amiko ilay tenin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Natao ho isan’ny mpanao ratsy Izy'
  - type: note
    content: Is 53.12.
  - type: text
    content: »; ary efa ho tanteraka tokoa ity ny momba Ahy.
  '38':
  - type: text
    content: 'Dia hoy ny apôstôly:'
  - type: text
    content: –Indreto, Tompoko, misy sabatra roa!
  - type: text
    content: 'Fa i Jesoa nanao taminy hoe:'
  - type: text
    content: –Aoka izay
  - type: note
    content: 'Aoka izay: dkt hafa Ampy izay.'
  - type: text
    content: '!'
  - type: heading
    content: Mivavaka ao Analanôliva i Jesoa
  - type: heading
    content: (Jereo Mt 26.36-46; Mk 14.32-42)
  '39':
  - type: text
    content: 'Dia niainga i Jesoa nankany an-tendrombohitra Analanôliva araka ny fanaony; ary tafaraka taminy koa ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nankany amin’ny lohandoha-mpisorona sy ny lehiben’ny mpiambina ny '
  - type: text
    content: tempoly
  - type: text
    content: ' izy hidinidinika ny amin’izay hanolorany an’i Jesoa aminy. '
  '40':
  - type: text
    content: 'Vao tonga teo amin’ilay toerana i Jesoa, dia nanao tamin’ny mpianany hoe:'
  - type: text
    content: –Mivavaha mba tsy ho azon’ny fakampanahy ianareo!
  '41':
  - type: text
    content: 'Ary nihataka tamin’ny mpianany tokony ho tra-toraka i Jesoa; dia nandohalika Izy ary nivavaka '
  '42':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: –Ray ô, raha sitrakao, esory lavitra Ahy izao fijaliana izao; kanefa aoka tsy ny sitrapoko no hatao, fa ny anao.
  '43':
  - type: text
    content: 'Tamin’izay kosa nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray avy tany an-danitra niseho taminy sy nankahery Azy. '
  '44':
  - type: text
    content: Dia nitebiteby fadiranovana Izy, fa vao mainka nivavaka mafimafy kokoa indray. Ary nanjary toy ny ra mitete ny hatsembohany sady nipotrapotraka tamin’ny tany.
  '45':
  - type: text
    content: 'Nony nitsangana avy nivavaka i Jesoa, dia nankeo amin’ny mpianany, ka nahita azy ireo natory noho ny alahelo. '
  '46':
  - type: text
    content: 'Ary hoy Izy taminy:'
  - type: text
    content: –Nahoana no matory ianareo? Mifohaza, ka mivavaha mba tsy ho azon’ny fakampanahy ianareo!
  - type: heading
    content: Voasambotra i Jesoa
  - type: heading
    content: (Jereo Mt 26.47-56; Mk 14.43-50; Jôh 18.3-11)
  '47':
  - type: text
    content: 'Raha mbola miteny eo i Jesoa, dia indro nisy andian’olona tamy; ka ilay atao hoe Jodasy, anankiray amin’ny 12 lahy no lohalalana. Ary nanatona an’i Jesoa i Jodasy mba hanoroka Azy. '
  '48':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –O! ry Jodasy, dia fanorohana ve no anoloranao ny Zanak’olona?
  '49':
  - type: text
    content: 'Nahatsinjo ny zava-hitranga ireo mpianatra teo amin’i Jesoa, ka nanontany Azy hoe:'
  - type: text
    content: –Ahoana, Tompoko, raha mba hamely amin’ny sabatra izahay?
  '5':
  - type: text
    content: 'Faly tokoa ry zareo ary nifanaraka fa hanome vola azy. '
  '50':
  - type: text
    content: 'Dia namely ny mpanompon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' tokoa ny anankiray tamin’ireto mpianatra, ka nahafaka ny sofiny havanana'
  - type: note
    content: Ampit Jôh 18.10,26.
  - type: text
    content: '. '
  '51':
  - type: text
    content: 'Fa niteny i Jesoa nanao hoe:'
  - type: text
    content: –Aoka izay!
  - type: text
    content: 'Dia nikasika ny sofin-dralehilahy Izy, ka nanasitrana azy. '
  '52':
  - type: text
    content: 'Ary izao no tenin’i Jesoa tamin’ny lohandoha-mpisorona sy ny lehiben’ny mpiambina ny '
  - type: text
    content: tempoly
  - type: text
    content: ' mbamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' tonga teo hisambotra Azy:'
  - type: text
    content: '–Toy ny hisambotra jiolahy izato fiavinareo mirongo sabatra sy kibay. '
  '53':
  - type: text
    content: Teo aminareo isan’andro Aho tao an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' kanefa tsy nikasi-tanana Ahy ianareo; fa izao no ora voatendry ho anareo sy hanamparan’ny maizina ny fahefàny.'
  - type: heading
    content: Lavin’i Petera i Jesoa
  - type: heading
    content: (Jereo Mt 26.57-58, 69-75; Mk 14.53-54, 66-72; Jôh 18.12-18, 25-27)
  '54':
  - type: text
    content: 'Dia nosamborin-dry zareo i Jesoa ary nentiny ka nampidiriny tao amin’ny tranon’ny '
  - type: text
    content: mpisorombe
  - type: text
    content: '. I Petera izany nanjohy lavidavitra teny ihany. '
  '55':
  - type: text
    content: 'Namelona afo teo afovoan-tokotany ny mpiasa ary namindro; dia mba namindro niaraka taminy teo koa i Petera. '
  '56':
  - type: text
    content: 'Teo amin’ny mazavazava izy no nitoetra, hany ka tsikaritry ny vehivavy mpiasa anankiray sy nodinidinihiny ary nataony hoe:'
  - type: text
    content: –Ity rangahy ity koa niaraka taminy!
  '57':
  - type: text
    content: 'Fa nandà i Petera nanao hoe:'
  - type: text
    content: –Tsy mahalala Azy aho, ramatoa!
  '58':
  - type: text
    content: 'Nony afaka kelikely, dia nisy lehilahy indray nahatsikaritra azy ka nanao hoe:'
  - type: text
    content: –Ianao koa anisan’ireny!
  - type: text
    content: 'Fa hoy i Petera:'
  - type: text
    content: –Tsy anisany aho, andriamatoa!
  '59':
  - type: text
    content: 'Ary tokony ho adiny iray taoriana, nisy lehilahy hafa koa nanizingizina hoe:'
  - type: text
    content: –Tena niaraka tamin’io mihitsy ity rangahy ity sady Galileanina rahateo.
  '6':
  - type: text
    content: Dia nanaiky i Jodasy ka nitady izay fotoana tsara hanolorana an-tsokosoko an’i Jesoa eo am-pelatanany.
  - type: heading
    content: Asain’i Jesoa homanina ny sakafo Paska
  - type: heading
    content: (Jereo Mt 26.17-25; Mk 14.12-21; Jôh 13.21-30)
  '60':
  - type: text
    content: 'Fa hoy i Petera:'
  - type: text
    content: –Tsy fantatro izay lazainao, andriamatoa!
  - type: text
    content: 'Niaraka tamin’izay, raha mbola niteny i Petera, dia nisy akoho naneno. '
  '61':
  - type: text
    content: 'Ary nitodika nijery an’i Petera ny Tompo ka tsaroan’i Petera ny tenin’ny Tompo fony Izy nilaza taminy hoe: «Alohan’ny maneno akoho anio, dia handà Ahy intelo ianao'
  - type: note
    content: Jereo 22.34.
  - type: text
    content: '.» '
  '62':
  - type: text
    content: Dia lasa nankany ivelany i Petera ka nitomany fatratra.
  - type: heading
    content: Tevatevain’ny mpiambina i Jesoa
  - type: heading
    content: (Jereo Mt 26.67-68; Mk 14.65)
  '63':
  - type: text
    content: 'Dia nesoin’ireo mpiambina Azy i Jesoa sady nokapohiny; '
  '64':
  - type: text
    content: 'ary nony avy nosaronany tava, dia nanontaniany hoe:'
  - type: text
    content: –Vinanio hoe izay namely Anao teo?
  '65':
  - type: text
    content: Ary maro koa ny teny hafa nanevatevany Azy.
  - type: heading
    content: Eo anatrehan’ny Fitsarana jiosy i Jesoa
  - type: heading
    content: (Jereo Mt 26.59-66; Mk 14.55-64; Jôh 18.19-24)
  '66':
  - type: text
    content: 'Nony maraina ny andro, dia nivory ny '
  - type: text
    content: loholom
  - type: text
    content: '-bahoaka sy ny lohandoha-mpisorona mbamin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '; ary nasain-dry zareo nentina i Jesoa hiatrika ny '
  - type: text
    content: Fitsarana
  - type: text
    content: ' ambony teo anoloany. '
  '67':
  - type: text
    content: 'Ka hoy ireo taminy:'
  - type: text
    content: '–Lazao aminay raha Ianao no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '!'
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Raha hilaza aminareo Aho, tsy hinoanareo akory; '
  '68':
  - type: text
    content: 'raha hanontany Aho, tsy hovalianareo akory. '
  '69':
  - type: text
    content: 'Tsy ho ela intsony anefa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia hipetraka eo ankavanan’ilay Andriamanitra mahery'
  - type: note
    content: Sal 110.1.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Tonga ny andro fihinanana ny '
  - type: text
    content: azima
  - type: text
    content: ' izay tsy maintsy hamonoana ny zanak’ondry ho an’ny sakafo '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '70':
  - type: text
    content: 'Ary hoy izy rehetra hoe:'
  - type: text
    content: '–Koa Ianao ve izany no ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '?'
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Voalazanareo fa Izaho no Izy.
  '71':
  - type: text
    content: 'Ka hoy ry zareo:'
  - type: text
    content: –Inona indray no ilàntsika vavolombelona? Ny tenantsika no efa nandre tamin’ny vavany.
  '8':
  - type: text
    content: 'Dia nirahin’i Jesoa ry i Petera sy i Jôhany nataony hoe:'
  - type: text
    content: –Ndeha manomana ny sakafo Paska ho antsika
  - type: note
    content: Jereo Eks 12.3-9.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Fa hoy izy roa lahy taminy:'
  - type: text
    content: –Aiza no tianao hanomananay azy?
