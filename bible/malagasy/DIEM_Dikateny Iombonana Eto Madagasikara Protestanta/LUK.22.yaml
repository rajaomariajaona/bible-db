  - type: text
    text: 'Tonga ny andro fihinanana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: azima
  - type: text
    text: ' izay tsy maintsy hamonoana ny zanak’ondry ho an’ny sakafo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nirahin’i Jesoa ry i Petera sy i Jôhany nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha manomana ny sakafo Paska ho antsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.3-9.
    marker-yv: yv-n
  - type: text
