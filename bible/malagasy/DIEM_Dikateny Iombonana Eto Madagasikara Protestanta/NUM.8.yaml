document_id: NUM.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fametrahana ny jiro
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'Ento eo anatrehako TOMPO ireo Levita, ary hametra-tanana aminy kosa ny Israelita. '
  '11':
  - type: text
    content: 'Hanolotra ny Levita eo anatrehako i Aharôna ho toy ny fanatitra ahevaheva, mba hanao ny asa fanompoana AHY. '
  '12':
  - type: text
    content: 'Dia hametra-tanana amin’ny lohan’ny vantotr’ombilahy roa ny Levita, ka ny iray hataonao sorona fanalana ny ota ary ny iray ho sorona dorana manontolo ho Ahy TOMPO, alohan’ny hanaovana amin’ny Levita ny fombam-pivavahana famelan-keloka. '
  '13':
  - type: text
    content: 'Ajoroy eo anatrehan’i Aharôna sy ny zanany ny Levita, ka ataovy toy ny fanatitra ahevaheva atolotra AHY. '
  '14':
  - type: text
    content: 'Dia toy izany no hanavahanao amin’ny Israelita hafa ny Levita mba ho Ahy. '
  '15':
  - type: text
    content: Rehefa afaka izany, dia hiroso ny asa fanompoana ao amin’ny Tranolay fihaonana ny Levita.
  - type: text
    content: '«Hodiovina sy hataonao ho toy ny fanatitra ahevaheva voatolotra ho Ahy àry ny Levita, '
  '16':
  - type: text
    content: 'satria efa nomena Ahy avy tamin’ny Israelita mihitsy izy ireo mba ho solon’ny lahy voalohan-teraka rehetra, dia ny lahimatoa rehetra eo amin’ny Israelita. '
  '17':
  - type: text
    content: Eny, Ahy ny voalohan-teraka rehetra eo amin’ny Israelita, na olona izany na biby; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany Ejipta no nanokanako ny lahimatoa israelita ho Ahy
  - type: note
    content: Jereo Eks 13.2.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Fa ny Levita kosa no nalaiko ho solon’ny lahimatoa rehetra amin’ny Israelita. '
  '19':
  - type: text
    content: Ary natolotro an’i Aharôna sy ny zanany ny Levita hisolo ny Israelita mba hanao ny fanompoana ao amin’ny Tranolay fihaonana sy hanao ny fombam-pivavahana famelan-keloka azy ireo; dia tsy hisy loza hanjo ny Israelita intsony raha manakaiky ny Toeramasina izy ireo.»
  '2':
  - type: text
    content: 'mba hanafatrafatra an’i Aharôna hoe:'
  - type: text
    content: –Rehefa mandrehitra ny jiro fito ianao, dia ataovy izay hanazavany ny manoloana ny fitoeran-jiro.
  '20':
  - type: text
    content: 'Dia notanterahin’i Mosesy sy i Aharôna mbamin’ny Fiangonan’ny Israelita rehetra tamin’ny Levita izany; dia araka izay efa nandidian’ny TOMPO an’i Mosesy ny amin’ny Levita no nataon’ny Israelita taminy. '
  '21':
  - type: text
    content: 'Nandio ny tenany ary nanasa ny fitafiany ny Levita ka naterin’i Aharôna ho toy ny fanatitra ahevaheva atolotra ny TOMPO izy ireo sady nanaovany ny fombam-pivavahana famelan-keloka mba hanadiovany azy ireo. '
  '22':
  - type: text
    content: Rehefa izany vao afaka nandeha nanao ny asa fanompoany tao amin’ny Tranolay fihaonana teo anatrehan’i Aharôna sy ny zanany ny Levita. Araka izay nandidian’ny TOMPO an’i Mosesy momba ny Levita no natao taminy.
  '23':
  - type: text
    content: 'Dia niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
  '24':
  - type: text
    content: '–Izao no fepetra mikasika ny Levita: Feno 25 taona izy vao manomboka mirotsaka amin’ny asam-panompoana ao amin’ny Tranolay fihaonana. '
  '25':
  - type: text
    content: 'Fa rehefa feno dimampolo taona kosa dia handao ny asa ka tsy hanao fanompoana intsony. '
  '26':
  - type: text
    content: Kanefa afaka hanampy ny mpiray foko aminy izy hiambina ny Tranolay fihaonana, na dia tsy hanana asa manokana aza. Izany no hataonao amin’ny Levita momba ny fanompoany.
  '3':
  - type: text
    content: 'Dia nataon’i Aharôna izany ka napetrany ny jiro fito mba hahazava ny manoloana ny fitoeran-jiro, araka ny nandidian’ny TOMPO an’i Mosesy. '
  '4':
  - type: text
    content: Ny fitoeran-jiro dia volamena voatefy hatramin’ny faladiany ka hatramin’ny voniny. Araka izay endrika efa nasehon’ny TOMPO an’i Mosesy no nanaovana ny fitoeran-jiro
  - type: note
    content: And 1-4 jereo Eks 25.31-40; 37.17-24.
  - type: text
    content: .
  - type: heading
    content: Ny fanosorana ny Levita
  '5':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  '6':
  - type: text
    content: '«Avaho amin’ny Israelita hafa ny '
  - type: text
    content: Levita
  - type: text
    content: ', dia '
  - type: text
    content: diovy
  - type: text
    content: ' izy. '
  '7':
  - type: text
    content: 'Izao no hataonao hanadiovana azy: fafazo rano fanadiovana izy'
  - type: note
    content: 'rano fanadiovana: io angamba ilay rano voalaza ao amin’ny toko 19, na dia samy hafa aza ny voambolana hebreo, na ilay voalaza ao amin’ny Lev 14.'
  - type: text
    content: ', asaovy haratany ny tenany iray manontolo ary aoka hosasany ny fitafiany, dia hadio izy. '
  '8':
  - type: text
    content: 'Asaovy maka vantotr’ombilahy iray mbamin’ny fanatitra momba azy izy, dia lafarinina voatoto tsara sy voaharo menaka; ary haka vantotr’ombilahy iray kosa ianao ho '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota. '
  '9':
  - type: text
    content: 'Vorio ny fiangonan’ny Israelita rehetra, dia hasainao mankeo anoloan’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ny Levita. '
