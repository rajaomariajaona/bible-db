document_id: NUM.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fametrahana ny jiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hanafatrafatra an’i Aharôna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rehefa mandrehitra ny jiro fito ianao, dia ataovy izay hanazavany ny manoloana ny fitoeran-jiro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nataon’i Aharôna izany ka napetrany ny jiro fito mba hahazava ny manoloana ny fitoeran-jiro, araka ny nandidian’ny TOMPO an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fitoeran-jiro dia volamena voatefy hatramin’ny faladiany ka hatramin’ny voniny. Araka izay endrika efa nasehon’ny TOMPO an’i Mosesy no nanaovana ny fitoeran-jiro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: And 1-4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 25.31-40; 37.17-24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanosorana ny Levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Avaho amin’ny Israelita hafa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Levita
  - type: text
    text: ', dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diovy
  - type: text
    text: ' izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no hataonao hanadiovana azy: fafazo rano fanadiovana izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'rano fanadiovana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io angamba ilay rano voalaza ao amin’ny toko 19, na dia samy hafa aza ny voambolana hebreo, na ilay voalaza ao amin’ny Lev 14.
    marker-yv: yv-n
  - type: text
    text: ', asaovy haratany ny tenany iray manontolo ary aoka hosasany ny fitafiany, dia hadio izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Asaovy maka vantotr’ombilahy iray mbamin’ny fanatitra momba azy izy, dia lafarinina voatoto tsara sy voaharo menaka; ary haka vantotr’ombilahy iray kosa ianao ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' fanalana ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vorio ny fiangonan’ny Israelita rehetra, dia hasainao mankeo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ento eo anatrehako TOMPO ireo Levita, ary hametra-tanana aminy kosa ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hanolotra ny Levita eo anatrehako i Aharôna ho toy ny fanatitra ahevaheva, mba hanao ny asa fanompoana AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hametra-tanana amin’ny lohan’ny vantotr’ombilahy roa ny Levita, ka ny iray hataonao sorona fanalana ny ota ary ny iray ho sorona dorana manontolo ho Ahy TOMPO, alohan’ny hanaovana amin’ny Levita ny fombam-pivavahana famelan-keloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ajoroy eo anatrehan’i Aharôna sy ny zanany ny Levita, ka ataovy toy ny fanatitra ahevaheva atolotra AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia toy izany no hanavahanao amin’ny Israelita hafa ny Levita mba ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa afaka izany, dia hiroso ny asa fanompoana ao amin’ny Tranolay fihaonana ny Levita.
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Hodiovina sy hataonao ho toy ny fanatitra ahevaheva voatolotra ho Ahy àry ny Levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'satria efa nomena Ahy avy tamin’ny Israelita mihitsy izy ireo mba ho solon’ny lahy voalohan-teraka rehetra, dia ny lahimatoa rehetra eo amin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, Ahy ny voalohan-teraka rehetra eo amin’ny Israelita, na olona izany na biby; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany Ejipta no nanokanako ny lahimatoa israelita ho Ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 13.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny Levita kosa no nalaiko ho solon’ny lahimatoa rehetra amin’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary natolotro an’i Aharôna sy ny zanany ny Levita hisolo ny Israelita mba hanao ny fanompoana ao amin’ny Tranolay fihaonana sy hanao ny fombam-pivavahana famelan-keloka azy ireo; dia tsy hisy loza hanjo ny Israelita intsony raha manakaiky ny Toeramasina izy ireo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia notanterahin’i Mosesy sy i Aharôna mbamin’ny Fiangonan’ny Israelita rehetra tamin’ny Levita izany; dia araka izay efa nandidian’ny TOMPO an’i Mosesy ny amin’ny Levita no nataon’ny Israelita taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nandio ny tenany ary nanasa ny fitafiany ny Levita ka naterin’i Aharôna ho toy ny fanatitra ahevaheva atolotra ny TOMPO izy ireo sady nanaovany ny fombam-pivavahana famelan-keloka mba hanadiovany azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa izany vao afaka nandeha nanao ny asa fanompoany tao amin’ny Tranolay fihaonana teo anatrehan’i Aharôna sy ny zanany ny Levita. Araka izay nandidian’ny TOMPO an’i Mosesy momba ny Levita no natao taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niteny tamin’i Mosesy indray ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '–Izao no fepetra mikasika ny Levita: Feno 25 taona izy vao manomboka mirotsaka amin’ny asam-panompoana ao amin’ny Tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa rehefa feno dimampolo taona kosa dia handao ny asa ka tsy hanao fanompoana intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Kanefa afaka hanampy ny mpiray foko aminy izy hiambina ny Tranolay fihaonana, na dia tsy hanana asa manokana aza. Izany no hataonao amin’ny Levita momba ny fanompoany.
