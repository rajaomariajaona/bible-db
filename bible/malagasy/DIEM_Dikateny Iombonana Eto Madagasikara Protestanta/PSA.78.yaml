document_id: PSA.78,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Lesona tsy azo hadinoina ny lasa teo amin’i Israely
  - type: text
    content: ' '
  - type: text
    content: Tononkalo fananarana nataon’i Asafa.
  - type: text
    content: Henoy tsara ny fampianarako,
  - type: text
    content: ry mpiray firenena amiko;
  - type: text
    content: atongilano ny sofinareo
  - type: text
    content: amin’izay teny lazaiko.
  '10':
  - type: text
    content: 'Tsy nitandro ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: nifanaovany tamin’Andriamanitra izy,
  - type: text
    content: 'fa tsy nety hanaraka ny '
  - type: text
    content: lalànany
  - type: text
    content: ;
  '11':
  - type: text
    content: hadinon’ireo ny asa mahery nataony
  - type: text
    content: sy ny zava-mahagaga efa nasehony taminy.
  '12':
  - type: text
    content: Tany Ejipta, tao amin’ny faritr’i Tsôhàna
  - type: note
    content: 'Tsôhàna: na Tanisy, tanàna tranainy tao Ejipta-Ambany, tamin’ilany atsinanan’ny vavaranon’i Neily.'
  - type: text
    content: ','
  - type: text
    content: teo anatrehan’ireo razany mihitsy
  - type: text
    content: no nanaovan’Andriamanitra zava-mahagaga
  - type: note
    content: 'zava-mahagaga: jereo Eks 7.8–12.32.'
  - type: text
    content: ':'
  '13':
  - type: text
    content: nosarahiny ny ranomasina mba hampitany azy ireo,
  - type: text
    content: nasainy nivangongo ny rano ho tahaka ny fefiloha
  - type: note
    content: Eks 14.21-22.
  - type: text
    content: ;
  '14':
  - type: text
    content: Andry rahona no nitarihany azy tamin’ny antoandro
  - type: text
    content: ary ny hazavan’ny afo nandritra ny alina
  - type: note
    content: Eks 13.21-22.
  - type: text
    content: .
  '15':
  - type: text
    content: Namaky vatolampy tany an-taniefitra Izy,
  - type: text
    content: ka nampisotro azy tamin’ny loharano nitosaka
  - type: text
    content: avy any amin’ny fanambanin’ny tany;
  '16':
  - type: text
    content: rano mandriaka no navoakany avy amin’ny harambato
  - type: text
    content: ka nataony nikoriana tahaka ny renirano
  - type: note
    content: 'Momba ny and 15-16: Eks 17.1-7; Nom 20.2-13.'
  - type: text
    content: .
  '17':
  - type: text
    content: Kanjo nanohy ny fahotany ihany ireo
  - type: text
    content: ka nikomy tamin’ilay Avo Indrindra,
  - type: text
    content: tao amin’izany tany karankaina izany.
  '18':
  - type: text
    content: Sahy nihantsy an’Andriamanitra aza izy,
  - type: text
    content: ka nangataka izay hanina nahaliana azy;
  '19':
  - type: text
    content: niteny ratsy an’Andriamanitra ireo,
  - type: text
    content: 'raha nanao fanontaniana hoe:'
  - type: text
    content: «Andriamanitra ve afaka hanome sakafo
  - type: text
    content: hohanintsika atỳ an-taniefitra atỳ?
  '2':
  - type: text
    content: 'Hisoka-bava hanao '
  - type: text
    content: fanoharana
  - type: text
    content: ' aho'
  - type: text
    content: ka hanatsoaka lesona avy amin’ny fahiny
  - type: note
    content: Jereo Mt 13.35 izay ahatsiahivana ity and ity araka ny dkt tranainy grika.
  - type: text
    content: .
  '20':
  - type: text
    content: Marina fa nikapoka vatolampy Izy
  - type: text
    content: ka nampigororoana rano avy ao
  - type: text
    content: hanjary riaka mibosasaka.
  - type: text
    content: Saingy ho hainy ve ny hanome mofo
  - type: text
    content: na hamatsy hena ny vahoakany?»
  '21':
  - type: text
    content: Nandre izany ny TOMPO ka nisafoaka
  - type: text
    content: tamin’ireo taranak’i Jakôba;
  - type: text
    content: nirehitra toy ny afo ny hatezerany
  - type: text
    content: ka namely ny Israelita,
  '22':
  - type: text
    content: satria tsy nino Azy akory ireo
  - type: text
    content: sady tsy natoky ny famonjeny.
  '23':
  - type: text
    content: Nefa nandidy ny rahona avy any ambony Izy,
  - type: text
    content: ka nanokatra ny varavaran’ny lanitra;
  '24':
  - type: text
    content: 'dia nandrotsahany ny '
  - type: text
    content: mana
  - type: text
    content: ' ireo ho sakafony,'
  - type: text
    content: vary avy any an-danitra no nomeny azy
  - type: note
    content: Jereo Jôh 6.31.
  - type: text
    content: .
  '25':
  - type: text
    content: Mofon’ny mahery no nohanin’ny olona efa osa,
  - type: text
    content: fa nandefasany vatsy mahavoky izy.
  '26':
  - type: text
    content: Nataon’Andriamanitra nifofofofo teny an-danitra
  - type: text
    content: ny rivotra avy any atsinanana;
  - type: text
    content: ary ny heriny no nitondrany
  - type: text
    content: ny rivotra avy any atsimo.
  '27':
  - type: text
    content: Dia nandatsahany hena betsaka hoatra ny vovoka ireo
  - type: text
    content: ary voro-manidina marobe toy ny fasi-dranomasina;
  '28':
  - type: text
    content: teo anivon’ny tobiny no nandatsahany azy,
  - type: text
    content: teny manodidina ny tranolainy teny.
  '29':
  - type: text
    content: Dia nihinana izy rehetra ka voky tokoa,
  - type: text
    content: satria izay nirîny dia nomen’ny Tompo azy;
  '3':
  - type: text
    content: Izay efa renay sy fantatray
  - type: text
    content: satria notantarain’ireo razantsika taminay,
  '30':
  - type: text
    content: kanefa mbola tsy afa-po ihany ireo,
  - type: text
    content: na dia mbola feno aza ny vavany.
  '31':
  - type: text
    content: 'Koa nirehetan’ny fahatezeran’Andriamanitra izy:'
  - type: text
    content: dia nahafatesany tamin’ireo matanjaka,
  - type: text
    content: nataony ripaka ny zatovo israelita
  - type: note
    content: 'Momba ny and 18-31: jereo Eks 16.2-15, Nom 11.4-23, 31-34.'
  - type: text
    content: .
  '32':
  - type: text
    content: Na teo aza izany rehetra izany,
  - type: text
    content: dia mbola nanota ihany ireo;
  - type: text
    content: ary na teo aza ny zava-mahagaga nataony,
  - type: text
    content: dia tsy natoky an’Andriamanitra izy.
  '33':
  - type: text
    content: Koa indray mitsoka monja
  - type: text
    content: no nandevonany ny fisiany;
  - type: text
    content: ary tamin’ny loza tampoka
  - type: text
    content: no nanaperany ny taonany.
  '34':
  - type: text
    content: Fa raha naringana izy, dia nitady an’Andriamanitra,
  - type: text
    content: ary mba niverina nikatsaka Azy ihany;
  '35':
  - type: text
    content: tsaroany fa Andriamanitra no vatolampiny,
  - type: text
    content: Andriamanitra Avo Indrindra no mpanavotra azy.
  '36':
  - type: text
    content: Saingy nanao teny fitaka
  - type: text
    content: hilaza lainga tamin’ny Tompo ireo;
  '37':
  - type: text
    content: tsy niraiki-po taminy izy
  - type: text
    content: ary tsy natoky ny fanekempihavanana
  - type: text
    content: izay nifanaovany taminy.
  '38':
  - type: text
    content: Be indrafo anefa Andriamanitra
  - type: text
    content: ka namela ny hadisoany
  - type: text
    content: ary tsy nandringana azy;
  - type: text
    content: nahatsindry hatezerana Izy
  - type: text
    content: ary nampitony fahavinirana.
  '39':
  - type: text
    content: Tsaroany fa osa sy malemy ireo
  - type: text
    content: tsio-drivotra mandalo ka tsy hiverina intsony.
  '4':
  - type: text
    content: dia tsy hafeninay amin’ny zanakay koa;
  - type: text
    content: eny, hampitainay amin’ny taranaka ho avy
  - type: text
    content: ny zavatra tokony hiderana ny TOMPO
  - type: text
    content: ary koa ny asa mahery sy mahagaga nataony.
  '40':
  - type: text
    content: Impiry impiry akory moa ireo
  - type: text
    content: no efa nikomy taminy tany an-taniefitra
  - type: text
    content: ka nampahatezitra Azy tany an-tany foana!
  '41':
  - type: text
    content: Fa nikiry nihantsy an’Andriamanitra izy
  - type: text
    content: ka nampalahelo an’ilay Masin’i Israely.
  '42':
  - type: text
    content: Nohadinoiny ny hery nasehony
  - type: text
    content: fony Izy nanafaka azy tamin’ny mpampahory,
  '43':
  - type: text
    content: ka nanao famantarana tany Ejipta
  - type: text
    content: 'sy zava-mahagaga teo amin’ny faritr’i Tsôhàna:'
  '44':
  - type: text
    content: novany ho ra ny rano teny an-dakandrano
  - type: text
    content: ka tsy azon’ny Ejiptianina nosotroina intsony
  - type: note
    content: Eks 7.14-25.
  - type: text
    content: ;
  '45':
  - type: text
    content: nalefany hitsentsitra azy ireo ny fihitra
  - type: note
    content: 'fihitra: Eks 6.16-28.'
  - type: text
    content: ary hanimba zavatra ny sahona
  - type: note
    content: 'sahona: Eks 7.26–28.11.'
  - type: text
    content: ;
  '46':
  - type: text
    content: nomeny hohanin’ny sompanga ireo vokatry ny taniny
  - type: text
    content: ary hohanin’ny valala ny valin-kasasarany
  - type: note
    content: Eks 10.1-20.
  - type: text
    content: ;
  '47':
  - type: text
    content: naripany tamin’ny havandra ny voalobony
  - type: text
    content: sy tamin’ny fanala ny aviaviny;
  '48':
  - type: text
    content: natolony hasian’ny havandra ny biby fiompiny
  - type: note
    content: 'havandra: misy stf ahitana hoe areti-mandringana (jereo Eks 9.1-7).'
  - type: text
    content: sy hasian’ny varatra ny omby aman’ondriny
  - type: note
    content: Eks 9.14-25.
  - type: text
    content: .
  '49':
  - type: text
    content: Nozeràny fahatezerana mirehitra ny Ejiptianina,
  - type: text
    content: dia fahavinirana sy fisafoahana ary fampahoriana
  - type: text
    content: izay toy ny andian’iraka tonga hitondra loza.
  '5':
  - type: text
    content: Nampijoro fitsipika ho an’ny vahoakany Izy
  - type: text
    content: ary nametraka lalàna teo amin’i Israely,
  - type: text
    content: ka nandidy ny razantsika mba hampianatra
  - type: text
    content: izany tantara izany amin’ireo zanany.
  '50':
  - type: text
    content: Namparin’Andriamanitra ny fahatezerany,
  - type: text
    content: ka tsy narovany tamin’ny fahafatesana ireo
  - type: text
    content: fa natolony velona ho azon’ny areti-mandringana;
  '51':
  - type: text
    content: novonoiny ho faty avokoa
  - type: text
    content: ny lahimatoa rehetra tany Ejipta
  - type: note
    content: Ampit Sal 105.36; Eks 12.29.
  - type: text
    content: ','
  - type: text
    content: dia ireo santatry ny hery
  - type: text
    content: tamin’ny ankohonan’ny terak’i Hama
  - type: note
    content: 'Hama: iray amin’ireo zanakalahin’i Noà (Gen 7.13); izy no heverina ho razamben’ny mponina any Afrika, indrindra ny Ejiptianina (Gen 10.6-20).'
  - type: text
    content: .
  '52':
  - type: text
    content: 'Ny vahoakany kosa nafindrany toy ny '
  - type: text
    content: ondry
  - type: text
    content: ary notarihiny toy ny andiany tany an-taniefitra
  - type: note
    content: Eks 13.17-22.
  - type: text
    content: ;
  '53':
  - type: text
    content: nentiny tamim-pilaminana ireo ka tsy natahotra,
  - type: text
    content: fa ny fahavalony no voasaron-dranomasina
  - type: note
    content: Eks 14.26-28.
  - type: text
    content: .
  '54':
  - type: text
    content: Nentiny ho any amin’ny tany masina ny vahoakany
  - type: note
    content: Eks 15.17.
  - type: text
    content: ','
  - type: text
    content: teo amin’ilay tendrombohitra izay azony tamin-kery
  - type: note
    content: Ny tendrombohitra izay lazaina eto dia i Tsiôna* izay hanorenana ny tempolin’i Jerosalema atỳ aoriana (and 68-69).
  - type: text
    content: ;
  '55':
  - type: text
    content: noroahiny ny firenen-kafa teo anoloany,
  - type: text
    content: nozarainy antsapaka ho azy ny taniny;
  - type: text
    content: ka ny tranon’ireo firenen-kafa ireo ihany
  - type: text
    content: no nampitoerany ny fokon’i Israely
  - type: note
    content: 'Fitsinjarana ny tany: Jos 11.16-23; 18.10.'
  - type: text
    content: .
  '56':
  - type: text
    content: Nefa nihantsy an’Andriamanitra Avo Indrindra izy
  - type: text
    content: ka nikomy taminy sy nandika ny didiny
  - type: note
    content: Mpits 2.11-15.
  - type: text
    content: ;
  '57':
  - type: text
    content: nihemotra sy nivadika toy ireo razany izy,
  - type: text
    content: eny, nisampotina toy ny tsipîka manody.
  '58':
  - type: text
    content: Nampahatezitra ny Tompo izy
  - type: text
    content: tamin’ireo toeram-panasinany
  - type: text
    content: sady nankasiaka mafy Azy
  - type: text
    content: tamin’ny sarivongan’andriamani-tsiizy.
  '59':
  - type: text
    content: Nahatsapa izany Andriamanitra, dia nisafoaka;
  - type: text
    content: ka nariany tanteraka ny Israelita,
  '6':
  - type: text
    content: Amin’izay ny taranaka ho avy,
  - type: text
    content: izany hoe ireo zaza mbola hateraka,
  - type: text
    content: dia hahafantatra ihany koa
  - type: text
    content: ka hijoro hampita amin-janany,
  '60':
  - type: text
    content: nilaozany ny fonenany tao Silao,
  - type: text
    content: dia ny tranolay nitoerany teo amin’ny olona
  - type: note
    content: 'Jos 18.1; Jer 7.12-14; 26.6. –ny fonenany tao Silao: toeram-pivavahan’ny Israelita tany Palestinina afovoany; tao no nametrahana ny Vatamasina* tany am-boalohany ka hatramin’ny andron’i Samoela (1 Sam 4.3). –ny tranolay voalaza eto dia manondro izany toeram-pivavahana tao Silao izany sady mampahatsiaro ny Tranolay fihaonana izay Toeramasina tamin’ny andron’ny Eksôdy (Eks 33.7).'
  - type: text
    content: .
  '61':
  - type: text
    content: 'Ary ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' maneho ny heriny sy '
  - type: text
    content: voninahiny
  - type: text
    content: dia nafoiny ho voababon’ny fahavalo
  - type: note
    content: Jereo 1 Sam 4.4-22.
  - type: text
    content: .
  '62':
  - type: text
    content: Natolony ho fatin-tsabatra ny vahoakany,
  - type: text
    content: fa nahatezitra Azy tokoa ireo voatokana ho fananany.
  '63':
  - type: text
    content: Kilan’ny afo ireo zatovolahiny;
  - type: text
    content: noho izany ireo zatovovaviny
  - type: text
    content: dia tsy nanaovana hiram-pampakarana;
  '64':
  - type: text
    content: matin-tsabatra ireo mpisorony,
  - type: text
    content: ary tsy afaka nisaona azy akory
  - type: text
    content: ireo vehivavy mpitondratenany.
  '65':
  - type: text
    content: Dia nifoha ny Tompo toy ny avy natory,
  - type: text
    content: tahaka ny mpiady maherifo notairin’ny divay.
  '66':
  - type: text
    content: Nasiany teo ivoho ireo fahavalony
  - type: text
    content: ka nataony afa-baràka mandrakizay.
  '67':
  - type: text
    content: 'Nariany ny taranak’i Jôsefa:'
  - type: text
    content: tsy nofidiny ny fokon’i Efraîma
  - type: note
    content: Ny taranak’i Jôsefa dia ny fokon’i Efraîma sy i Manase (Gen 48.1).
  - type: text
    content: ','
  '68':
  - type: text
    content: fa ny fokon’i Joda no voafidiny
  - type: text
    content: 'ary ny tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' no maminy;'
  '69':
  - type: text
    content: 'teo no nanorenany ny '
  - type: text
    content: tempoliny
  - type: text
    content: ho avo toy ny lanitra ambony
  - type: text
    content: ary ho mafy tahaka ny tany
  - type: text
    content: izay najorony ho mandrakizay.
  '7':
  - type: text
    content: mba hahatonga azy hatoky an’Andriamanitra
  - type: text
    content: ka tsy hanadino ny asa mahery nataony
  - type: text
    content: fa hitandrina kosa ny didiny.
  '70':
  - type: text
    content: Dia nofidiny i Davida mpanompony
  - type: text
    content: ka nalainy avy tany an-kijàna;
  '71':
  - type: text
    content: teo am-piandrasana reniondry mampinono izy
  - type: text
    content: 'no nampanalainy mba '
  - type: text
    content: hiandry
  - type: text
    content: ' ny olony,'
  - type: text
    content: dia ireo taranak’i Jakôba na ny vahoaka Israely
  - type: text
    content: izay efa voatokana ho fananany
  - type: note
    content: 'And 70-71: jereo 1 Sam 16.11-13; 2 Sam 7.8; 1 Tan 17.7.'
  - type: text
    content: .
  '72':
  - type: text
    content: Tamin’ny fo mahitsy no nikarakaran’i Davida azy
  - type: text
    content: ary tamim-pahakingana no nitarihany azy.
  '8':
  - type: text
    content: Amin’izay ireto tsy hanahaka ireo razany
  - type: text
    content: izay taranaka naditra sy nikomy,
  - type: text
    content: taranaka nanana fo niovaova
  - type: text
    content: sy fanahy tsy natoky an’Andriamanitra.
  '9':
  - type: text
    content: Ny olona tao amin’ny fokon’i Efraîma,
  - type: text
    content: izay nirongo tsipîka sy zana-tsipîka,
  - type: text
    content: 'dia nandositra tamin’ny andro fiadiana:'
