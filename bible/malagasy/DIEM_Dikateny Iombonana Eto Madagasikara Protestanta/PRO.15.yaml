document_id: PRO.15,396
type_code: plt
verses:
  '1':
  - type: text
    content: Famaliana am-pitiavana mampitony hatezerana;
  - type: text
    content: fa teny mitratreva kosa mahatonga havinirana.
  '10':
  - type: text
    content: Hofaizina mafy izay mandao ny toetra tsara,
  - type: text
    content: fa ho faty tokoa izay mankahala anatra.
  '11':
  - type: text
    content: Fantatry ny TOMPO na dia izay miseho
  - type: text
    content: any amin’ny toeran’ny maty aza;
  - type: text
    content: koa mainka fa ny ao am-pon’ny olona.
  '12':
  - type: text
    content: Tsy tian’ny mpaniratsira ny hotsikeraina,
  - type: text
    content: ka izany no tsy mba anatonany ny olon-kendry.
  '13':
  - type: text
    content: Ny fo falifaly mahamiran-tava;
  - type: text
    content: fa ny fo malahelo maharera-panahy.
  '14':
  - type: text
    content: Ny manan-tsaina mikatsaka fahalalana;
  - type: text
    content: fa ny adala kosa miletra fahadalana.
  '15':
  - type: text
    content: Ratsy avokoa ny andron’ny olona ory;
  - type: text
    content: fa fety lava kosa ny fiainan’ny olona sambatra.
  '16':
  - type: text
    content: Aleo manan-kely ombàm-panajana ny TOMPO,
  - type: text
    content: toy izay manan-karembe difotra ahiahy.
  '17':
  - type: text
    content: Aleo mihinana anana ombàm-pitiavana,
  - type: text
    content: toy izay hena matavy laroam-pankahalana.
  '18':
  - type: text
    content: Ny olona mora tezitra no mihantsy ady;
  - type: text
    content: fa izay mahatsindry fo kosa mampitony fifandirana.
  '19':
  - type: text
    content: Ny lalan’ny kamo dia feno korontan-tsilo;
  - type: text
    content: fa ny lalan’ny olo-marina kosa milamina tsara.
  '2':
  - type: text
    content: Ny fitenin’ny hendry manosaka fahalalana mahasoa;
  - type: text
    content: fa ny vavan’ny adala kosa mampiely fahadalana.
  '20':
  - type: text
    content: Ny zanaka hendry mahafaly ny rainy;
  - type: text
    content: fa ny zanaka adala manamavo ny reniny.
  '21':
  - type: text
    content: Ny fahadalana no mahafaly ny olona tsy ampy saina;
  - type: text
    content: fa ny manan-tsaina kosa mahitsy fitondrantena.
  '22':
  - type: text
    content: Foana ny fikasana tsy ampy mpanolotsaina;
  - type: text
    content: fa tanteraka kosa izany, raha maro ireny.
  '23':
  - type: text
    content: Fifaliana ho an’ny olona ny fahaiza-mamaly;
  - type: text
    content: ary fatratra ny teny atao amin’ny ilana azy.
  '24':
  - type: text
    content: Ny lala-miakatra ho amin’ny fiainana no alehan’ny hendry
  - type: text
    content: ka idifiany ny toeran’ny maty any ambany.
  '25':
  - type: text
    content: Ny tranon’ny mpiavonavona dia ravàn’ny TOMPO;
  - type: text
    content: fa arovany kosa ny tanin’ny mpitondratena.
  '26':
  - type: text
    content: Halan’ny TOMPO ny fikasan-dratsy;
  - type: text
    content: fa madio aminy kosa ny teny tsara atao.
  '27':
  - type: text
    content: Ny olona adalam-bola dia mampikorontana ny ankohonana;
  - type: text
    content: fa izay mankahala risoriso no ho velona.
  '28':
  - type: text
    content: Ny olo-marina mieritreritra vao mamaly;
  - type: text
    content: fa ny olon-dratsy kosa manely fanaratsiana.
  '29':
  - type: text
    content: Ny TOMPO manalavitra ny olon-dratsy,
  - type: text
    content: fa mihaino kosa ny vavaky ny olo-marina.
  '3':
  - type: text
    content: Ny mason’ny TOMPO dia mijery eny rehetra eny
  - type: text
    content: ka mahita ny ratsy fanahy sy ny tsara fanahy.
  '30':
  - type: text
    content: Ny endrika sariaka maharavo ny fo
  - type: text
    content: ary ny vaovao mahafaly mamelombelona ny aina.
  '31':
  - type: text
    content: Izay manongilan-tsofina hihaino anatra mahavonjy
  - type: text
    content: no hiara-monina amin’ny olon-kendry.
  '32':
  - type: text
    content: Izay mandà anatra manamavo ny tenany,
  - type: text
    content: fa izay mihaino tsikera mahazo fahalalana.
  '33':
  - type: text
    content: Ny fanajana ny TOMPO dia fananaram-pahendrena
  - type: note
    content: Jereo 1.7 sy nta.
  - type: text
    content: ;
  - type: text
    content: ary tokony hanetry tena alohan’ny hisondro-boninahitra.
  '4':
  - type: text
    content: Ny teny mamy dia mitondra aina;
  - type: text
    content: fa ny vava ratsy kosa mandrera-po
  - type: note
    content: Jereo 3.18 sy nta.
  - type: text
    content: .
  '5':
  - type: text
    content: Ny adala manamavo ny fananaran-drainy;
  - type: text
    content: fa izay mandray tsikera no hita ho hendry.
  '6':
  - type: text
    content: Harem-be no ao an-tranon’ny olo-marina;
  - type: text
    content: fa mampiahiahy kosa no harikaren’ny olon-dratsy.
  '7':
  - type: text
    content: Ny tenin’ny hendry mampiely fahalalana;
  - type: text
    content: fa hafa noho izany kosa ny fon’ny adala.
  '8':
  - type: text
    content: 'Halan’ny TOMPO ny '
  - type: text
    content: sorona
  - type: text
    content: ' aterin’ny olon-dratsy;'
  - type: text
    content: fa sitrany kosa ny vavaky ny olo-mahitsy.
  '9':
  - type: text
    content: Halan’ny TOMPO ny fitondrantenan’ny olon-dratsy;
  - type: text
    content: fa tiany kosa ny mpandala ny fahamarinana.
