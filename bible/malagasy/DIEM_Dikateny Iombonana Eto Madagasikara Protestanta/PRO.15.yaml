document_id: PRO.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Famaliana am-pitiavana mampitony hatezerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa teny mitratreva kosa mahatonga havinirana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hofaizina mafy izay mandao ny toetra tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho faty tokoa izay mankahala anatra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fantatry ny TOMPO na dia izay miseho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny toeran’ny maty aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa mainka fa ny ao am-pon’ny olona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy tian’ny mpaniratsira ny hotsikeraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no tsy mba anatonany ny olon-kendry.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fo falifaly mahamiran-tava;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fo malahelo maharera-panahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny manan-tsaina mikatsaka fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala kosa miletra fahadalana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ratsy avokoa ny andron’ny olona ory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fety lava kosa ny fiainan’ny olona sambatra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aleo manan-kely ombàm-panajana ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay manan-karembe difotra ahiahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aleo mihinana anana ombàm-pitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay hena matavy laroam-pankahalana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny olona mora tezitra no mihantsy ady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mahatsindry fo kosa mampitony fifandirana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny lalan’ny kamo dia feno korontan-tsilo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalan’ny olo-marina kosa milamina tsara.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny fitenin’ny hendry manosaka fahalalana mahasoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vavan’ny adala kosa mampiely fahadalana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny zanaka hendry mahafaly ny rainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny zanaka adala manamavo ny reniny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny fahadalana no mahafaly ny olona tsy ampy saina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny manan-tsaina kosa mahitsy fitondrantena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Foana ny fikasana tsy ampy mpanolotsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tanteraka kosa izany, raha maro ireny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fifaliana ho an’ny olona ny fahaiza-mamaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fatratra ny teny atao amin’ny ilana azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny lala-miakatra ho amin’ny fiainana no alehan’ny hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka idifiany ny toeran’ny maty any ambany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny tranon’ny mpiavonavona dia ravàn’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa arovany kosa ny tanin’ny mpitondratena.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Halan’ny TOMPO ny fikasan-dratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa madio aminy kosa ny teny tsara atao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny olona adalam-bola dia mampikorontana ny ankohonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mankahala risoriso no ho velona.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny olo-marina mieritreritra vao mamaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa manely fanaratsiana.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny TOMPO manalavitra ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mihaino kosa ny vavaky ny olo-marina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny mason’ny TOMPO dia mijery eny rehetra eny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahita ny ratsy fanahy sy ny tsara fanahy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny endrika sariaka maharavo ny fo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny vaovao mahafaly mamelombelona ny aina.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izay manongilan-tsofina hihaino anatra mahavonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiara-monina amin’ny olon-kendry.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Izay mandà anatra manamavo ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mihaino tsikera mahazo fahalalana.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny fanajana ny TOMPO dia fananaram-pahendrena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.7 sy nta.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tokony hanetry tena alohan’ny hisondro-boninahitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny teny mamy dia mitondra aina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny vava ratsy kosa mandrera-po
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 3.18 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny adala manamavo ny fananaran-drainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay mandray tsikera no hita ho hendry.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Harem-be no ao an-tranon’ny olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mampiahiahy kosa no harikaren’ny olon-dratsy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny tenin’ny hendry mampiely fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hafa noho izany kosa ny fon’ny adala.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Halan’ny TOMPO ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' aterin’ny olon-dratsy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sitrany kosa ny vavaky ny olo-mahitsy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Halan’ny TOMPO ny fitondrantenan’ny olon-dratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tiany kosa ny mpandala ny fahamarinana.
