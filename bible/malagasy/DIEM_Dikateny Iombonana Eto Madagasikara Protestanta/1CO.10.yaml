      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Inona àry no holazaiko? Moa tena zavatra ihany ve ny sampy na ny hena atao sorona ho an’ny sampy? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Natao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' tao amin’izany rahona sy ranomasina izany izy rehetra mba ho tafaray amin’i Mosesy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tsia, fa ny zavatra atao sorona amin’ny sampy dia aterina ho an’ny '
    - type: usfm
