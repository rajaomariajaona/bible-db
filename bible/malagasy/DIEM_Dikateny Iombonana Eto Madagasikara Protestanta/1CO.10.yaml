      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'aterina... tsy ho an’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deot 32.17, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '; ka tsy tiako ho mpiombona amin’ny demony ianareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy azonareo atao ny hisotro ny fisotro aroson’ny Tompo no sady hisotro ny fisotro aroson’ny demony; tsy azonareo atao ny hiombona anjara amin’ny sakafo aroson’ny Tompo no sady hiombona anjara amin’ny sakafo aroson’ny demony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sa te hampahasaro-piaro ny Tompo ve isika? Mihevitra ho mahery noho Izy Tompo ve isika
    - type: usfm
