document_id: 1CO.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitandremana amin’ny fanompoan-tsampy
  - type: text
    content: Tiako hotsarovanareo, ry havako, izay nanjo ireo razantsika niara-dia tamin’i Mosesy. Tambanin’ny rahona izy rehetra; ary namakivaky ny Ranomasina Mena izy rehetra
  - type: note
    content: 'rahona: dia ilay andry rahona sy andry afo voalaza ao amin’ny Eks 13.21-22. –namakivaky ny Ranomasina Mena: jereo Eks 14.22-29.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Aoka ianareo tsy himonomonona toy ny nataon’ny sasany tamin’ireny, izay maty naripak’ilay '
  - type: text
    content: anjely
  - type: text
    content: ' mpandringana'
  - type: note
    content: Jereo Nom 17.6-14; Eks 12.23.
  - type: text
    content: .
  '11':
  - type: text
    content: Izany fahoriana rehetra izany dia nihatra tamin’izy ireny ho ohatra fananarana, ary natao an-tsoratra ho fampitandremana antsika izay mby eo an-katoky ny andro farany.
  '12':
  - type: text
    content: 'Koa amin’izany, izay manao ny tenany ho mijoro tsara, dia aoka izy hitandrina sao lavo. '
  '13':
  - type: text
    content: Tsy nisy fakampanahy nianjady taminareo afa-tsy izay mpahazo ny olombelona. Fa mitana ny toky nomeny Andriamanitra ka tsy hamela anareo halaim-panahy mihoatra noho izay zakan’ny herinareo. Rehefa ianjadian’ny fakampanahy kosa ianareo, dia homeny hery hahazakanareo sy homeny lalana hahafahanareo.
  '14':
  - type: text
    content: 'Noho izany, ry hava-malalako, andosiro ny fanompoan-tsampy. '
  '15':
  - type: text
    content: 'Olona manan-tsaina ianareo no itenenako, ka tsaraonareo izay lazaiko. '
  '16':
  - type: text
    content: Ny fisotro isaorantsika an’Andriamanitra, moa tsy mampiombona antsika amin’ny ran’i Kristy ve izany? Ary ny mofo izay ifanapahantsika, moa tsy mampiombona antsika amin’ny tenan’i Kristy ve izany
  - type: note
    content: Mt 26.26-28; Mk 14.22-24; Lk 22.19-20.
  - type: text
    content: '? '
  '17':
  - type: text
    content: Satria iray ihany ny mofo, dia tena iray ihany isika na dia maro aza, noho isika rehetra miombona anjara amin’ny mofo iray ihany.
  '18':
  - type: text
    content: 'Jereo ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' ara-tantara: Ireo mihinana amin’ny fanatitra atao sorona dia miombona amin’Andriamanitra Izay nanokanana ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana'
  - type: note
    content: Jereo Fisor 7.6, 15-16.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Inona àry no holazaiko? Moa tena zavatra ihany ve ny sampy na ny hena atao sorona ho an’ny sampy? '
  '2':
  - type: text
    content: 'Natao '
  - type: text
    content: batisa
  - type: text
    content: ' tao amin’izany rahona sy ranomasina izany izy rehetra mba ho tafaray amin’i Mosesy. '
  '20':
  - type: text
    content: 'Tsia, fa ny zavatra atao sorona amin’ny sampy dia aterina ho an’ny '
  - type: text
    content: demony
  - type: text
    content: ' fa tsy ho an’Andriamanitra'
  - type: note
    content: 'aterina... tsy ho an’Andriamanitra: Deot 32.17, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: '; ka tsy tiako ho mpiombona amin’ny demony ianareo. '
  '21':
  - type: text
    content: 'Tsy azonareo atao ny hisotro ny fisotro aroson’ny Tompo no sady hisotro ny fisotro aroson’ny demony; tsy azonareo atao ny hiombona anjara amin’ny sakafo aroson’ny Tompo no sady hiombona anjara amin’ny sakafo aroson’ny demony. '
  '22':
  - type: text
    content: Sa te hampahasaro-piaro ny Tompo ve isika? Mihevitra ho mahery noho Izy Tompo ve isika
  - type: note
    content: Ampit Deot 32.21.
  - type: text
    content: '?'
  - type: heading
    content: Atao ho voninahitr’Andriamanitra ny zavatra rehetra
  '23':
  - type: text
    content: «Azo atao ny zavatra rehetra», hoy aho
  - type: note
    content: Ampit 6.12.
  - type: text
    content: ', kanefa tsy ary mahasoa avokoa. «Azo atao ny zavatra rehetra», hoy aho, kanefa tsy ary mampandroso amin’ny finoana avokoa. '
  '24':
  - type: text
    content: Aza ny soa ho an’ny tena no katsahina fa ny ho an’ny namana.
  '25':
  - type: text
    content: 'Hano avokoa izay hena amidy eny an-tsena, fa aza velom-panontaniana akory noho ny fieritreretana; '
  '26':
  - type: text
    content: satria «an’ny Tompo izao tany izao sy ny zavatra rehetra ao aminy
  - type: note
    content: Sal 24.1.
  - type: text
    content: '», hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: .
  '27':
  - type: text
    content: 'Raha asain’ny tsy mpino hisakafo ianareo, ka manaiky hankany, dia hano izay arosony anareo fa aza velom-panontaniana akory noho ny fieritreretanareo. '
  '28':
  - type: text
    content: 'Kanefa raha ilazan’olona ianareo hoe: «Hena natao fanatitra tany amin’ny sampy io», dia aza homana, noho ilay nilaza sy noho ny fieritreretana; '
  '29':
  - type: text
    content: tsy ny fieritreretanareo tsy akory izany lazaiko izany, fa ny an’ilay niteny taminareo.
  - type: text
    content: '«Fa nahoana kosa moa», hoy ny sasany, «no hofeperan’izay fieritreretan’olon-kafa ny fahafahako? '
  '3':
  - type: text
    content: 'Nihinana sakafom-panahy iray ihany izy rehetra; '
  '30':
  - type: text
    content: Raha isaorako an’Andriamanitra izany sakafo haniko izany, nahoana no dia hanomezan-tsiny ahy amin’ny hanina izay isaorako an’Andriamanitra?»
  '31':
  - type: text
    content: 'Koa na mihinana na misotro ianareo, eny, na inona na inona ataonareo, dia ataovy ho voninahitr’Andriamanitra ny zavatra rehetra. '
  '32':
  - type: text
    content: 'Aza manao izay hahasolafaka olona amin’ny ratsy, na Jiosy izy na '
  - type: text
    content: hafa firenena
  - type: text
    content: ' na ny Fiangonan’Andriamanitra. '
  '33':
  - type: text
    content: Mba manaova tahaka ahy, fa iezaho izay hahafaly ny olona rehetra amin’ny zavatra rehetra; ka tsy ny soa ho an’ny tenako no katsahiko, fa ny ho an’ny besinimaro, mba ho voavonjy izy rehetra.
  '4':
  - type: text
    content: ary nisotro fisotrom-panahy iray ihany izy rehetra; satria nisotro teo amin’ilay vatolampy ara-panahy tafara-dia taminy
  - type: note
    content: 'And 3: jereo Eks 16.35. –And 4: vatolampy ara-panahy tafara-dia taminy: ny raisin’i Paoly eto dia toa ny fampianaran’ireo mpampianatra jiosy, izay mihevitra fa ny vatolampy voalaza ao amin’ny Nom 20.8-11 dia tafara-dia tamin’ny vahoaka Israely hatrany hatrany tamin’izay nifindrafindrany rehetra tany an-taniefitra.'
  - type: text
    content: ': ka izany vatolampy izany dia i Kristy. '
  '5':
  - type: text
    content: Kanefa tsy sitrak’Andriamanitra ny ankabeazan-dry zareo ka maty ripaka tany an-taniefitra
  - type: note
    content: Ampit Nom 14.16.
  - type: text
    content: .
  '6':
  - type: text
    content: Nitranga ireny zavatra ireny ho ohatra fananarana antsika, mba tsy hitsiriritantsika ny ratsy tahaka ny nahavoa an-dry zareo
  - type: note
    content: Jereo Nom 11.4.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Aoka ianareo tsy ho mpanompo sampy toy ny nataon’ny sasany tamin’ireny, araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Nipetraka hihinana sy hisotro ny olona ary dia nitsangana hilalao'
  - type: note
    content: Eks 32.6.
  - type: text
    content: '.» '
  '8':
  - type: text
    content: Aoka isika tsy ho mpijangajanga toy ny nataon’ny sasany tamin’ireny, izay nahafatesana 23 000 indray andro monja
  - type: note
    content: Jereo Nom 25.1-18.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Aoka isika tsy haka fanahy ny Tompo toy ny nataon’ny sasany tamin’ireny, izay maty voakaikitry ny bibilava
  - type: note
    content: 'ny Tompo: misy stf sasany ahitana hoe an’i Kristy. –Momba ny and manontolo, jereo Nom 21.5-6.'
  - type: text
    content: '. '
