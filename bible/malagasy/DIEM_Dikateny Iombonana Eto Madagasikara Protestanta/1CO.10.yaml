  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izany fahoriana rehetra izany dia nihatra tamin’izy ireny ho ohatra fananarana, ary natao an-tsoratra ho fampitandremana antsika izay mby eo an-katoky ny andro farany.
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa amin’izany, izay manao ny tenany ho mijoro tsara, dia aoka izy hitandrina sao lavo. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tsy nisy fakampanahy nianjady taminareo afa-tsy izay mpahazo ny olombelona. Fa mitana ny toky nomeny Andriamanitra ka tsy hamela anareo halaim-panahy mihoatra noho izay zakan’ny herinareo. Rehefa ianjadian’ny fakampanahy kosa ianareo, dia homeny hery hahazakanareo sy homeny lalana hahafahanareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Noho izany, ry hava-malalako, andosiro ny fanompoan-tsampy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Olona manan-tsaina ianareo no itenenako, ka tsaraonareo izay lazaiko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fisotro isaorantsika an’Andriamanitra, moa tsy mampiombona antsika amin’ny ran’i Kristy ve izany? Ary ny mofo izay ifanapahantsika, moa tsy mampiombona antsika amin’ny tenan’i Kristy ve izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 26.26-28; Mk 14.22-24; Lk 22.19-20.
      marker-yv: yv-n
    - type: text
      text: '? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Satria iray ihany ny mofo, dia tena iray ihany isika na dia maro aza, noho isika rehetra miombona anjara amin’ny mofo iray ihany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jereo ny vahoaka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' ara-tantara: Ireo mihinana amin’ny fanatitra atao sorona dia miombona amin’Andriamanitra Izay nanokanana ny '
    - type: usfm
      marker: w
