document_id: PSA.60,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Henoin’Andriamanitra vavaka ny vahoakany resy
  - type: heading
    content: (60.7-14; jereo Sal 108.7-14)
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny gitara. Hira malefaka fahatsiarovana, nataon’i Davida ho fampianarana.
  - type: text
    content: ' '
  '10':
  - type: text
    content: I Môaba hampiasaiko toy ny tavy fisasàko;
  - type: text
    content: i Edôma hanipazako kapa ho fananako;
  - type: text
    content: i Filistia hanaovako horakora-pandresena
  - type: note
    content: Jereo Sal 108.10.
  - type: text
    content: .»
  '11':
  - type: text
    content: Iza no hampiditra ahy ho eo anivon’i Edôma?
  - type: text
    content: Zovy no hitondra ahy ho ao amin’ilay tanàna mafy?
  '12':
  - type: text
    content: Moa tsy Ianao ihany ve, Andriamanitra ô?
  - type: text
    content: Kanefa izahay efa narianao mihitsy
  - type: text
    content: ary ny tafikay tsy iarahanao intsony.
  '13':
  - type: text
    content: Ampio re izahay hiady amin’ilay mpandrafy,
  - type: text
    content: fa tsy mankaiza ny famonjena ataon’ny olona.
  '14':
  - type: text
    content: Andriamanitra no hahazoanay fahombiazana goavana,
  - type: text
    content: satria Izy no hanitsakitsaka ireo mpandrafy anay
  - type: note
    content: Jereo Sal 18.39 sy nta.
  - type: text
    content: .
  '2':
  - type: text
    content: Tsiahivin’i Davida etoana ny nanafihany an’ireo Sirianina tany Mezôpôtamia sy tany Tsôbà; rehefa nody kosa, dia noresen’i Jôaba ny tafika edômita nisy miaramila 12 000
  - type: note
    content: 'Jereo 2 Sam 8.3-14; 1 Tan 18.12. –miaramila 12 000: na hoe andiany 12.'
  - type: text
    content: .
  '3':
  - type: text
    content: Andriamanitra ô, narianao sy nahahakao izahay;
  - type: text
    content: kanefa na tezitra aza Ianao, dia velombelomy izahay.
  '4':
  - type: text
    content: Nohozongozoninao ny tany ka nitresaka;
  - type: text
    content: amboary re izy fa nisy nihotsaka.
  '5':
  - type: text
    content: Nataonao nahita ny mafy ilay vahoakanao
  - type: text
    content: ary nampisotroinao divay mahafanina
  - type: note
    content: Jereo Sal 75.9; Is 51.17,22; Jer 25.15-29.
  - type: text
    content: .
  '6':
  - type: text
    content: Faneva manainga handositra no natsanganao
  - type: text
    content: mba ho lavitra ny tsipîka ireo mpanaja Anao.
  - type: text
    content: Fiatoana
  '7':
  - type: text
    content: Vonjeo amin’ny herinao izahay ary valio vavaka,
  - type: text
    content: dia ho afaka fa vahoaka malalanao.
  '8':
  - type: text
    content: Ao an-
  - type: text
    content: Toeramasiny
  - type: text
    content: ' no niteny Andriamanitra hoe:'
  - type: text
    content: «Faly tokoa Aho fa hizara an’i Sekema
  - type: text
    content: sy ny lohasahan’i Sokôta ho an’ny vahoakako;
  '9':
  - type: text
    content: Ahy i Gilehada, Ahy koa i Manase;
  - type: text
    content: i Efraîma no toy ny fiaro lohako;
  - type: text
    content: i Joda no toy ny tehim-piandrianako.
