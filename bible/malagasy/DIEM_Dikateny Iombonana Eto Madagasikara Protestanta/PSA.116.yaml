    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tiako ny TOMPO noho Izy mihaino ny feoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: fony aho mitalaho aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Manongilan-tsofina amiko Izy ka hantsoiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mbola velona koa aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahafatesana toa efa nitana ahy am-patorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny toeran’ny maty toa efa nangeja harato ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tojo fahoriana sy tebiteby aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka niantso ny TOMPO nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Miangavy aho, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba vonjeo re aho!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Miantra sy marina ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mamindrafo ny Andriamanitray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miaro ny olon-tsotra ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: reraka aho ka novonjeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Milamîna indray, ry fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO efa nanisy soa anao».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ianao tokoa, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanafaka ahy tsy ho faty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny masoko tsy hitomany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tongotro tsy ho solafaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia hiaina eo anatrehanao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: eto amin’ity tany ivelomanay ity.
- type: usfm
  marker: q1
