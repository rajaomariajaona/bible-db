document_id: PSA.116,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Vavak’olona nijaly mafy nefa novonjen’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiako ny TOMPO noho Izy mihaino ny feoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony aho mitalaho aminy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natoky aho, na dia efa nahateny aza hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fandraisan’ny dkt tranainy grika ity andalana ity dia hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nino aho ka niteny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Araka izany no itanisan’i Paoly apôstôly azy ao amin’ny 2 Kôr 4.13.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Farafahoriana tokoa aho!»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Taitra loatra aho ka loa-bolana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mpandainga avokoa ny olombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 3.4.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no havaliko ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny soa rehetra nataony tamiko?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitondra fanatitra divay aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fanatitra divay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho fisaorana an’Andriamanitra izany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanao antso avo ny lazan’ny TOMPO.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanefa ny voadiko amin’ny TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ny vahoakany tafangona.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sitraky ny TOMPO velively
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hahafatesan’ny mpivavaka aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mpanomponao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, mpanomponao tokoa aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady zanaky ny mpanompovavinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka novahanao ny fatorako.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom
    - type: text
      text: -piderana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanao antso avo ny lazan’ny TOMPO.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanefa ny voadiko amin’ny TOMPO aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anatrehan’ny vahoakany tafangona,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia eo an-kianjan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo afovoanao, ry Jerosalema.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manongilan-tsofina amiko Izy ka hantsoiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mbola velona koa aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahafatesana toa efa nitana ahy am-patorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toeran’ny maty toa efa nangeja harato ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tojo fahoriana sy tebiteby aho,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka niantso ny TOMPO nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miangavy aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba vonjeo re aho!»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantra sy marina ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamindrafo ny Andriamanitray.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaro ny olon-tsotra ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reraka aho ka novonjeny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Milamîna indray, ry fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO efa nanisy soa anao».
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao tokoa, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanafaka ahy tsy ho faty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny masoko tsy hitomany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tongotro tsy ho solafaka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiaina eo anatrehanao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eto amin’ity tany ivelomanay ity.
