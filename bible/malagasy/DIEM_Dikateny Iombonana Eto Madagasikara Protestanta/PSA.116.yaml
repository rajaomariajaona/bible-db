document_id: PSA.116,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavak’olona nijaly mafy nefa novonjen’Andriamanitra
  - type: text
    content: Tiako ny TOMPO noho Izy mihaino ny feoko
  - type: text
    content: fony aho mitalaho aminy.
  '10':
  - type: text
    content: Natoky aho, na dia efa nahateny aza hoe
  - type: note
    content: Ny fandraisan’ny dkt tranainy grika ity andalana ity dia hoe Nino aho ka niteny. Araka izany no itanisan’i Paoly apôstôly azy ao amin’ny 2 Kôr 4.13.
  - type: text
    content: ':'
  - type: text
    content: «Farafahoriana tokoa aho!»
  '11':
  - type: text
    content: 'Taitra loatra aho ka loa-bolana hoe:'
  - type: text
    content: «Mpandainga avokoa ny olombelona
  - type: note
    content: Jereo Rm 3.4.
  - type: text
    content: '!»'
  '12':
  - type: text
    content: Inona no havaliko ny TOMPO
  - type: text
    content: noho ny soa rehetra nataony tamiko?
  '13':
  - type: text
    content: Hitondra fanatitra divay aho
  - type: note
    content: 'fanatitra divay: ho fisaorana an’Andriamanitra izany.'
  - type: text
    content: ka hanao antso avo ny lazan’ny TOMPO.
  '14':
  - type: text
    content: Hanefa ny voadiko amin’ny TOMPO aho
  - type: text
    content: eo anatrehan’ny vahoakany tafangona.
  '15':
  - type: text
    content: Tsy sitraky ny TOMPO velively
  - type: text
    content: ny hahafatesan’ny mpivavaka aminy.
  '16':
  - type: text
    content: TOMPO ô, mpanomponao aho;
  - type: text
    content: eny, mpanomponao tokoa aho
  - type: text
    content: sady zanaky ny mpanompovavinao,
  - type: text
    content: ka novahanao ny fatorako.
  '17':
  - type: text
    content: 'Hanolotra '
  - type: text
    content: sorom
  - type: text
    content: -piderana aho
  - type: text
    content: ary hanao antso avo ny lazan’ny TOMPO.
  '18':
  - type: text
    content: Hanefa ny voadiko amin’ny TOMPO aho
  - type: text
    content: eo anatrehan’ny vahoakany tafangona,
  '19':
  - type: text
    content: 'dia eo an-kianjan’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ','
  - type: text
    content: eo afovoanao, ry Jerosalema.
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  '2':
  - type: text
    content: Manongilan-tsofina amiko Izy ka hantsoiko,
  - type: text
    content: raha mbola velona koa aho.
  '3':
  - type: text
    content: Ny fahafatesana toa efa nitana ahy am-patorana;
  - type: text
    content: ny toeran’ny maty toa efa nangeja harato ahy,
  - type: text
    content: tojo fahoriana sy tebiteby aho,
  '4':
  - type: text
    content: 'ka niantso ny TOMPO nanao hoe:'
  - type: text
    content: «Miangavy aho, TOMPO ô,
  - type: text
    content: mba vonjeo re aho!»
  '5':
  - type: text
    content: Miantra sy marina ny TOMPO,
  - type: text
    content: mamindrafo ny Andriamanitray.
  '6':
  - type: text
    content: Miaro ny olon-tsotra ny TOMPO;
  - type: text
    content: reraka aho ka novonjeny.
  '7':
  - type: text
    content: «Milamîna indray, ry fanahiko,
  - type: text
    content: fa ny TOMPO efa nanisy soa anao».
  '8':
  - type: text
    content: Ianao tokoa, TOMPO ô,
  - type: text
    content: no nanafaka ahy tsy ho faty;
  - type: text
    content: ka ny masoko tsy hitomany,
  - type: text
    content: ny tongotro tsy ho solafaka.
  '9':
  - type: text
    content: Dia hiaina eo anatrehanao aho
  - type: text
    content: eto amin’ity tany ivelomanay ity.
