document_id: JOS.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ady tao Merôma
  - type: text
    content: Nony ren’i Jabîna mpanjakan’i Hatsôra ny fandresen’i Josoa, dia nandefasany iraka i Jôbaba mpanjakan’i Madôna
  - type: note
    content: Madôna araka ny TM, fa ireo dkt tranainy Septoazinta sy ny Syriaka dia nanao hoe Marôna (ampit and 5 sy 7).
  - type: text
    content: ' sy ny mpanjakan’i Simrôna ary ny mpanjakan’i Aksafa. '
  '10':
  - type: text
    content: Rehefa niverina i Josoa, dia naka an’i Hatsôra
  - type: note
    content: 'Hatsôra: tanàn-dehibe tany avaratr’i Palestinina.'
  - type: text
    content: ' satria i Hatsôra no renivohitr’ireo fanjakana tany avaratra. Novonoiny tamin’ny sabatra ny mpanjakany '
  '11':
  - type: text
    content: 'ary nasainy naringana avokoa ny olona rehetra tao; tsy nisy zava-manana aina niangàna mihitsy, sady nodorana ny tanàna. '
  '12':
  - type: text
    content: 'Ary nalain’i Josoa koa ny tanànan’ireo mpanjaka hafa rehetra mbamin’ny fanjakany, ka naringany tamin’ny sabatra ireo mpanjaka sy ny mponina rehetra isan-tanàna, araka izay efa nandidian’i Mosesy mpanompon’ny TOMPO. '
  '13':
  - type: text
    content: 'Kanefa ireo tanàna rehetra niorina teny amin’ny havoana dia tsy mba nodoran’ny Israelita, afa-tsy i Hatsôra irery izay nasain’i Josoa nodorana. '
  '14':
  - type: text
    content: 'Ary norobain’ny Israelita ho azy avokoa ny zavatra rehetra tao amin’ireo tanàna an-kavoana ireo mbamin’ny biby fiompy, fa ny olona rehetra ihany no naringany tanteraka tamin’ny sabatra ka tsy nisy niangana. '
  '15':
  - type: text
    content: Izay baiko rehetra nomen’ny TOMPO an’i Mosesy mpanompony dia nampitainy tamin’i Josoa; ka izany no nataon’i Josoa tsy nisy namelany.
  - type: heading
    content: Faranan’i Josoa ny fakàna ny tany
  '16':
  - type: text
    content: 'Dia azon’i Josoa avokoa ilay tany: dia ny faritra be tendrombohitra sy i Negeba manontolo any atsimo, ny faritr’i Gôsena manontolo'
  - type: note
    content: 'ny faritr’i Gôsena manontolo: jereo 10.41 sy nta.'
  - type: text
    content: ', ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ', ny lohasahan’i Jôrdàna, ary ny faritra misy tendrombohitra sy lemaka any avaratra. '
  '17':
  - type: text
    content: 'Resin’i Josoa ary novonoiny ireo mpanjaka nipetraka teo anelanelan’ilay tendrombohitra ngazana miakatra ho any Sehira ao atsimo sy i Bahala-Gada eo amin’ny lohasahan’i Libano am-pototry ny tendrombohitra Hermôna any avaratra. '
  '18':
  - type: text
    content: 'Naharitra ela ny ady nataon’i Josoa tamin’ireo mpanjaka rehetra ireo. '
  '19':
  - type: text
    content: Tsy nisy tanàna nanaovan’ny Israelita fanekempihavanana afa-tsy i Gibehôna izay nonenan’ny Hivita
  - type: note
    content: Jereo 9.3-27.
  - type: text
    content: '; fa ireo tanàna hafa rehetra dia nalainy tamin’ny ady avokoa. '
  '2':
  - type: text
    content: 'Nandefasany iraka ihany koa ireo mpanjaka izay any an-tendrombohitra any avaratra sy ireo mpanjaka tany amin’ny lohasahan’i Jôrdàna eo atsimon’ny farihin’i Genesareta, ary ireo mpanjaka teny amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' sy teny amoron-tsiraka akaikin’i Dôra ao andrefana. '
  '20':
  - type: text
    content: Ny TOMPO manko no nahatonga azy ireny ho mafy fo ka hihantsy ady tamin’ny Israelita mba handringanana azy tanteraka tsy misy indrafo, satria tsy maintsy naringana ireny araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '21':
  - type: text
    content: 'Tamin’izany fotoana izany koa i Josoa no nandeha niady tamin’ny Hanakita rehetra izay tany amin’ny faritra be tendrombohitra, dia tany Hebrôna sy Debira ary Hanaba mbamin’ny havoan’i Joda sy i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo. Nasain’i Josoa naringana avokoa izy sy ny tanànany '
  '22':
  - type: text
    content: ka tsy nisy Hanakita tavela intsony teo amin’i Israely, afa-tsy tao Gazà sy Gata ary Asdôda
  - type: note
    content: Ireo tanàna telo ireo dia tsy azon’ny Israelita, fa teo am-pelatanan’ny Filistinina.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Dia azon’i Josoa avokoa ilay tany, araka izay rehetra efa nambaran’ny TOMPO tamin’i Mosesy; ary nomen’i Josoa ho fananan’ny Israelita izany ka nozarazarainy araka ny fokony avy. Dia nitsahatra ny ady ka nandry ny tany.
  '3':
  - type: text
    content: 'Nandefasan’i Jabîna iraka ihany koa ny Kanahanita tany atsinanana sy andrefan’i Jôrdàna, ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy Hetita ary ny Perizita sy Jebosita tany an-tendrombohitra, ary ireo Hivita nonina tany am-pototr’i Hermôna, tany amin’ny faritanin’i Mitsepà. '
  '4':
  - type: text
    content: 'Dia niainga ireo mpanjaka rehetra ireo, niaraka tamina miaramila tsy hita isa tahaka ny fasika eny amoron-dranomasina ary soavaly sy kalesy maro dia maro. '
  '5':
  - type: text
    content: Nifanaraka izy rehetra ka tonga niara-nitoby teo akaikin’ny loharanon’i Merôma mba hiady amin’ny Israelita.
  '6':
  - type: text
    content: 'Fa hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: –Aza matahotra an’ireo ianao; fa rahampitso amin’ny ora toy izao, dia hatolotro ho fatin-dratra eo anatrehan’ny Israelita izy rehetra ireo. Koa traingoy ny soavaliny ary dory amin’ny afo ny kalesiny.
  '7':
  - type: text
    content: 'Dia lasa i Josoa sy ny tafiny manontolo hamely tampoka ny fahavalo tao akaikin’ny loharanon’i Merôma, ka niantoraka taminy. '
  '8':
  - type: text
    content: 'Natolotry ny TOMPO teo an-tanan’ny Israelita ireo ka resiny, nenjehiny nianavaratra hatrany Sidôna tanàn-dehibe sy hatrany Misrefôta-Maîma ary hatrany amin’ny lohasahan’i Mitsepà any atsinanana. Nasian’ny Israelita ireo ka tsy nisy niangana. '
  '9':
  - type: text
    content: Araka izay nolazain’ny TOMPO no nataon’i Josoa taminy, ka notraingoiny ny soavalin’ireo ary nodorany tamin’ny afo ny kalesiny.
  - type: heading
    content: Ny fahazoana an’i Hatsôra
