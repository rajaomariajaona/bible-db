document_id: JOS.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ady tao Merôma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony ren’i Jabîna mpanjakan’i Hatsôra ny fandresen’i Josoa, dia nandefasany iraka i Jôbaba mpanjakan’i Madôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Madôna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny TM, fa ireo dkt tranainy Septoazinta sy ny Syriaka dia nanao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Marôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit and 5 sy 7).'
    marker-yv: yv-n
  - type: text
    text: ' sy ny mpanjakan’i Simrôna ary ny mpanjakan’i Aksafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nandefasany iraka ihany koa ireo mpanjaka izay any an-tendrombohitra any avaratra sy ireo mpanjaka tany amin’ny lohasahan’i Jôrdàna eo atsimon’ny farihin’i Genesareta, ary ireo mpanjaka teny amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ' sy teny amoron-tsiraka akaikin’i Dôra ao andrefana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandefasan’i Jabîna iraka ihany koa ny Kanahanita tany atsinanana sy andrefan’i Jôrdàna, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sy Hetita ary ny Perizita sy Jebosita tany an-tendrombohitra, ary ireo Hivita nonina tany am-pototr’i Hermôna, tany amin’ny faritanin’i Mitsepà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niainga ireo mpanjaka rehetra ireo, niaraka tamina miaramila tsy hita isa tahaka ny fasika eny amoron-dranomasina ary soavaly sy kalesy maro dia maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nifanaraka izy rehetra ka tonga niara-nitoby teo akaikin’ny loharanon’i Merôma mba hiady amin’ny Israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy ny TOMPO tamin’i Josoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza matahotra an’ireo ianao; fa rahampitso amin’ny ora toy izao, dia hatolotro ho fatin-dratra eo anatrehan’ny Israelita izy rehetra ireo. Koa traingoy ny soavaliny ary dory amin’ny afo ny kalesiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia lasa i Josoa sy ny tafiny manontolo hamely tampoka ny fahavalo tao akaikin’ny loharanon’i Merôma, ka niantoraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Natolotry ny TOMPO teo an-tanan’ny Israelita ireo ka resiny, nenjehiny nianavaratra hatrany Sidôna tanàn-dehibe sy hatrany Misrefôta-Maîma ary hatrany amin’ny lohasahan’i Mitsepà any atsinanana. Nasian’ny Israelita ireo ka tsy nisy niangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Araka izay nolazain’ny TOMPO no nataon’i Josoa taminy, ka notraingoiny ny soavalin’ireo ary nodorany tamin’ny afo ny kalesiny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahazoana an’i Hatsôra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rehefa niverina i Josoa, dia naka an’i Hatsôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hatsôra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe tany avaratr’i Palestinina.
    marker-yv: yv-n
  - type: text
    text: ' satria i Hatsôra no renivohitr’ireo fanjakana tany avaratra. Novonoiny tamin’ny sabatra ny mpanjakany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary nasainy naringana avokoa ny olona rehetra tao; tsy nisy zava-manana aina niangàna mihitsy, sady nodorana ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nalain’i Josoa koa ny tanànan’ireo mpanjaka hafa rehetra mbamin’ny fanjakany, ka naringany tamin’ny sabatra ireo mpanjaka sy ny mponina rehetra isan-tanàna, araka izay efa nandidian’i Mosesy mpanompon’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa ireo tanàna rehetra niorina teny amin’ny havoana dia tsy mba nodoran’ny Israelita, afa-tsy i Hatsôra irery izay nasain’i Josoa nodorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary norobain’ny Israelita ho azy avokoa ny zavatra rehetra tao amin’ireo tanàna an-kavoana ireo mbamin’ny biby fiompy, fa ny olona rehetra ihany no naringany tanteraka tamin’ny sabatra ka tsy nisy niangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay baiko rehetra nomen’ny TOMPO an’i Mosesy mpanompony dia nampitainy tamin’i Josoa; ka izany no nataon’i Josoa tsy nisy namelany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faranan’i Josoa ny fakàna ny tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia azon’i Josoa avokoa ilay tany: dia ny faritra be tendrombohitra sy i Negeba manontolo any atsimo, ny faritr’i Gôsena manontolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny faritr’i Gôsena manontolo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 10.41 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ', ny lohasahan’i Jôrdàna, ary ny faritra misy tendrombohitra sy lemaka any avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Resin’i Josoa ary novonoiny ireo mpanjaka nipetraka teo anelanelan’ilay tendrombohitra ngazana miakatra ho any Sehira ao atsimo sy i Bahala-Gada eo amin’ny lohasahan’i Libano am-pototry ny tendrombohitra Hermôna any avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Naharitra ela ny ady nataon’i Josoa tamin’ireo mpanjaka rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy nisy tanàna nanaovan’ny Israelita fanekempihavanana afa-tsy i Gibehôna izay nonenan’ny Hivita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 9.3-27.
    marker-yv: yv-n
  - type: text
    text: '; fa ireo tanàna hafa rehetra dia nalainy tamin’ny ady avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny TOMPO manko no nahatonga azy ireny ho mafy fo ka hihantsy ady tamin’ny Israelita mba handringanana azy tanteraka tsy misy indrafo, satria tsy maintsy naringana ireny araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’izany fotoana izany koa i Josoa no nandeha niady tamin’ny Hanakita rehetra izay tany amin’ny faritra be tendrombohitra, dia tany Hebrôna sy Debira ary Hanaba mbamin’ny havoan’i Joda sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo. Nasain’i Josoa naringana avokoa izy sy ny tanànany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ka tsy nisy Hanakita tavela intsony teo amin’i Israely, afa-tsy tao Gazà sy Gata ary Asdôda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo tanàna telo ireo dia tsy azon’ny Israelita, fa teo am-pelatanan’ny Filistinina.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia azon’i Josoa avokoa ilay tany, araka izay rehetra efa nambaran’ny TOMPO tamin’i Mosesy; ary nomen’i Josoa ho fananan’ny Israelita izany ka nozarazarainy araka ny fokony avy. Dia nitsahatra ny ady ka nandry ny tany.
