document_id: EXO.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hiran’i Mosesy sy ny Israely
  - type: text
    content: 'Noho izany dia nihira izao hira izao ho fanomezam-boninahitra ny TOMPO i Mosesy sy ny Israelita ka nanao hoe:'
  - type: text
    content: Hihira ho fanomezam-boninahitra ny TOMPO aho
  - type: note
    content: Jereo Apôk 15.3.
  - type: text
    content: ;
  - type: text
    content: fandresena miezinezina no azony,
  - type: text
    content: natsipiny any an-dranomasina
  - type: text
    content: ny soavaly sy ny mpitaingina azy!
  '10':
  - type: text
    content: Saingy natsokanao ny rivotrao,
  - type: text
    content: dia norakofan’ny ranomasina ireo.
  - type: text
    content: Nilentika ao anaty ranomody
  - type: text
    content: toy ny vongam-piraka izy.
  '11':
  - type: text
    content: TOMPO ô, iza moa no andriamanitra tahaka Anao?
  - type: text
    content: Iza no malaza amin’ny fahamasinana tahaka Anao,
  - type: text
    content: mahatahotra, mendri-piderana,
  - type: text
    content: afaka manao zava-mahagaga?
  '12':
  - type: text
    content: Nahinjitrao ny tananao ankavanana,
  - type: text
    content: dia natelin’ny tany ireny.
  '13':
  - type: text
    content: Tarihinao amin’ny fitiavanao
  - type: text
    content: ny vahoaka izay navotanao.
  - type: text
    content: Amin’ny herinao no itondranao azy
  - type: text
    content: ho amin’ny fonenany masina.
  '14':
  - type: text
    content: Mandre izany ny firenena maro ka mihorohoro;
  - type: text
    content: mihoron-koditra ny Filistinina,
  '15':
  - type: text
    content: raiki-tahotra ireo lehiben’i Edôma
  - type: text
    content: ary mangovitra ireo andriandahin’i Môaba;
  - type: text
    content: kivy ny mponina rehetra any Kanahàna.
  '16':
  - type: text
    content: Tahotra sy horohoro no mahazo azy ireo!
  - type: text
    content: Manoloana ny halehiben’ny herinao, ry TOMPO,
  - type: text
    content: dia tsy nihetsika toy ny vato izy
  - type: text
    content: ambara-pahatafita ilay vahoakanao,
  - type: text
    content: dia ny vahoaka izay navotanao.
  '17':
  - type: text
    content: Entinao izy ka hamponeninao
  - type: text
    content: ao an-tendrombohitrao,
  - type: text
    content: ao amin’ny toerana izay nataonao
  - type: text
    content: ho fonenanao, ry TOMPO,
  - type: text
    content: 'dia ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' izay naorinao'
  - type: note
    content: Ny tany Kanahàna dia misy ampahany be tendrombohitra. An-tampon’ny tendrombohitra iray no haorina ny tempolin’i Jerosalema, toeramasin’ny Tompo.
  - type: text
    content: .
  '18':
  - type: text
    content: TOMPO ô, Ianao no mpanjaka mandrakizay!
  '19':
  - type: text
    content: 'Rehefa niditra tao anaty ranomasina ny soavalin’ny Farao sy ny kalesiny ary ny mpitaingina azy, dia naverin’ny TOMPO hanafotra azy ireo ny ranomasina; fa ny Israelita kosa niampita teo afovoan’ny ranomasina nandia tany maina. '
  '2':
  - type: text
    content: Ny TOMPO no heriko ka hataoko an-kira,
  - type: text
    content: tonga namonjy ahy Izy,
  - type: text
    content: Izy no Andriamanitro, ka hoderaiko
  - type: text
    content: izy no Andriamanitry ny razako, ka hankalazaiko
  - type: note
    content: Jereo Sal 118.14; Is 12.2.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Naka ampongatapaka i Miriama, '
  - type: text
    content: mpaminanivavy
  - type: text
    content: ' anabavin’i Aharôna, ary lasa nanaraka azy avokoa ny vehivavy israelita rehetra ka nitondra ampongatapaka sady nandihy. '
  '21':
  - type: text
    content: 'Ary niventy hira ho azy ireo i Miriama manao hoe:'
  - type: text
    content: 'Mihirà ho fanomezam-boninahitra ny TOMPO:'
  - type: text
    content: fandresena miezinezina no azony,
  - type: text
    content: natsipiny any an-dranomasina
  - type: text
    content: ny soavaly sy ny mpitaingina azy!
  - type: heading
    content: NY DIAN’NY ISRAELITA TANY AN-TANIEFITRA
  - type: heading
    content: Ny rano tao Marà
  '22':
  - type: text
    content: 'Notarihin’i Mosesy niala tao amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' ny Israelita, ka nizotra nankany amin’ny taniefitra Sora'
  - type: note
    content: Ny taniefitra Sora dia ny faritra avaratra amin’ny saika-nosy Sinay, eo anelanelan’ny ranon-driakan’i Ejipta (jereo Nom 34.5 sy nta) sy ny lakan-dranon’i Suez ankehitriny, morony atsinanana.
  - type: text
    content: '. Telo andro nandehanana tany an-taniefitra izy ireo nefa tsy nahita rano. '
  '23':
  - type: text
    content: Nony tonga tao Marà izy, dia tsy azony nosotroina ny rano tao satria nangidy. Koa izany no niavian’ny anarana hoe Marà, izay midika hoe «mangidy
  - type: note
    content: Ny toerana atao hoe Marà dia toa teo amin’ny morontsiraka atsinanan’ny helodranon’i Suez.
  - type: text
    content: '.» '
  '24':
  - type: text
    content: 'Dia nimonomonona tamin’i Mosesy ny vahoaka nanao hoe: Inona no hosotroinay? '
  '25':
  - type: text
    content: Niantso vonjy tamin’ny TOMPO i Mosesy, dia natorony rantsan-kazo iray. Natsipin’i Mosesy tao anaty rano izany ka nanjary mamy ny rano.
  - type: text
    content: 'Tao no nanomezan’ny TOMPO fitsipika sy fombafomba ho an’ny Israelita ary nizahany toetra azy ireo. '
  '26':
  - type: text
    content: 'Hoy Izy taminy: «Raha ankatoavinareo tokoa Aho TOMPO Andriamanitrareo, ka ataonareo izay heveriko ho marina, raha henoinareo ny didiko, ka tandremanareo ny fitsipiko dia tsy hisy hataoko aminareo ny aretina rehetra izay namelezako ny Ejiptianina, satria Izaho no TOMPO Izay manasitrana anareo.»'
  '27':
  - type: text
    content: Avy eo dia tonga tao Elima
  - type: note
    content: 'Elima: toerana heverina ho teo atsimo kelin’i Marà no nisy azy.'
  - type: text
    content: ' ny Israelita; nisy loharano 12 sy rofia fitopolo tao, ka nitoby teo akaikin’ny rano izy ireo.'
  '3':
  - type: text
    content: Mpiady mahery ny TOMPO;
  - type: text
    content: mandia ny anarany hoe TOMPO.
  '4':
  - type: text
    content: Fa navariny ao an-dranomasina
  - type: text
    content: 'ny kalesy sy ny andian-tafiky ny '
  - type: text
    content: Farao
  - type: text
    content: ','
  - type: text
    content: ireo manam-boninahiny voafantina
  - type: text
    content: nasitriny ao an-
  - type: text
    content: dranomasin’ny Volotara
  - type: text
    content: .
  '5':
  - type: text
    content: 'Nandrakotra azy ny ranobe:'
  - type: text
    content: nilentika any amin’ny farany ambany
  - type: text
    content: toy ny vato alatsaka izy.
  '6':
  - type: text
    content: TOMPO ô, malaza ho mahery
  - type: text
    content: ny sandrinao ankavanana,
  - type: text
    content: ka manorotoro fahavalo!
  '7':
  - type: text
    content: Mahatalanjona ny fahalehibiazanao
  - type: text
    content: fa manapotika ny mpanohitra Anao.
  - type: text
    content: Alefanao ny fahatezeranao
  - type: text
    content: ka mandoro azy toy ny mololo.
  '8':
  - type: text
    content: Noho ny hamafin’ny fofonainao
  - type: text
    content: dia nisavovona ny ranobe;
  - type: text
    content: nivangongo toa rindrina ny onjan-drano;
  - type: text
    content: teo amin’ny fanambanin’ny ranomasina
  - type: text
    content: no nifitsaka ny alon-drano.
  '9':
  - type: text
    content: 'Dia hoy ireo fahavalony hoe:'
  - type: text
    content: «Hoenjehintsika ireny ka hotratrarintsika,
  - type: text
    content: halaintsika ho babo ka hanaranantsika fo;
  - type: text
    content: hotsoahantsika ny sabatra,
  - type: text
    content: ka hamongotra azy ny tanantsika.»
