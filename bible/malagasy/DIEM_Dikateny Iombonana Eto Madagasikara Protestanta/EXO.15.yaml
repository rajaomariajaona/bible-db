document_id: EXO.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hiran’i Mosesy sy ny Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Noho izany dia nihira izao hira izao ho fanomezam-boninahitra ny TOMPO i Mosesy sy ny Israelita ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira ho fanomezam-boninahitra ny TOMPO aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 15.3.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandresena miezinezina no azony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natsipiny any an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny soavaly sy ny mpitaingina azy!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Saingy natsokanao ny rivotrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia norakofan’ny ranomasina ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nilentika ao anaty ranomody
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vongam-piraka izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: TOMPO ô, iza moa no andriamanitra tahaka Anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no malaza amin’ny fahamasinana tahaka Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahatahotra, mendri-piderana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afaka manao zava-mahagaga?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nahinjitrao ny tananao ankavanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia natelin’ny tany ireny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tarihinao amin’ny fitiavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoaka izay navotanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny herinao no itondranao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho amin’ny fonenany masina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mandre izany ny firenena maro ka mihorohoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihoron-koditra ny Filistinina,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: raiki-tahotra ireo lehiben’i Edôma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mangovitra ireo andriandahin’i Môaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kivy ny mponina rehetra any Kanahàna.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tahotra sy horohoro no mahazo azy ireo!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manoloana ny halehiben’ny herinao, ry TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nihetsika toy ny vato izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ambara-pahatafita ilay vahoakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny vahoaka izay navotanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Entinao izy ka hamponeninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an-tendrombohitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny toerana izay nataonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fonenanao, ry TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' izay naorinao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tany Kanahàna dia misy ampahany be tendrombohitra. An-tampon’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tendrombohitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' iray no haorina ny tempolin’i Jerosalema, toeramasin’ny Tompo.'
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: TOMPO ô, Ianao no mpanjaka mandrakizay!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Rehefa niditra tao anaty ranomasina ny soavalin’ny Farao sy ny kalesiny ary ny mpitaingina azy, dia naverin’ny TOMPO hanafotra azy ireo ny ranomasina; fa ny Israelita kosa niampita teo afovoan’ny ranomasina nandia tany maina. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny TOMPO no heriko ka hataoko an-kira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga namonjy ahy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no Andriamanitro, ka hoderaiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izy no Andriamanitry ny razako, ka hankalazaiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 118.14; Is 12.2.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Naka ampongatapaka i Miriama, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanivavy
    - type: text
      text: ' anabavin’i Aharôna, ary lasa nanaraka azy avokoa ny vehivavy israelita rehetra ka nitondra ampongatapaka sady nandihy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary niventy hira ho azy ireo i Miriama manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihirà ho fanomezam-boninahitra ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandresena miezinezina no azony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natsipiny any an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny soavaly sy ny mpitaingina azy!
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: NY DIAN’NY ISRAELITA TANY AN-TANIEFITRA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny rano tao Marà
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Notarihin’i Mosesy niala tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Ranomasin’ny Volotara
    - type: text
      text: ' ny Israelita, ka nizotra nankany amin’ny taniefitra Sora'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny taniefitra Sora '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ny faritra avaratra amin’ny saika-nosy Sinay, eo anelanelan’ny ranon-driakan’i Ejipta (jereo Nom 34.5 sy nta) sy ny lakan-dranon’i Suez ankehitriny, morony atsinanana.
      marker-yv: yv-n
    - type: text
      text: '. Telo andro nandehanana tany an-taniefitra izy ireo nefa tsy nahita rano. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nony tonga tao Marà izy, dia tsy azony nosotroina ny rano tao satria nangidy. Koa izany no niavian’ny anarana hoe Marà, izay midika hoe «mangidy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny toerana atao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Marà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia toa teo amin’ny morontsiraka atsinanan’ny helodranon’i Suez.'
      marker-yv: yv-n
    - type: text
      text: '.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nimonomonona tamin’i Mosesy ny vahoaka nanao hoe: Inona no hosotroinay? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Niantso vonjy tamin’ny TOMPO i Mosesy, dia natorony rantsan-kazo iray. Natsipin’i Mosesy tao anaty rano izany ka nanjary mamy ny rano.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao no nanomezan’ny TOMPO fitsipika sy fombafomba ho an’ny Israelita ary nizahany toetra azy ireo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy Izy taminy: «Raha ankatoavinareo tokoa Aho TOMPO Andriamanitrareo, ka ataonareo izay heveriko ho marina, raha henoinareo ny didiko, ka tandremanareo ny fitsipiko dia tsy hisy hataoko aminareo ny aretina rehetra izay namelezako ny Ejiptianina, satria Izaho no TOMPO Izay manasitrana anareo.»'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Avy eo dia tonga tao Elima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Elima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana heverina ho teo atsimo kelin’i Marà no nisy azy.
      marker-yv: yv-n
    - type: text
      text: ' ny Israelita; nisy loharano 12 sy rofia fitopolo tao, ka nitoby teo akaikin’ny rano izy ireo.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mpiady mahery ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandia ny anarany hoe TOMPO.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa navariny ao an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny kalesy sy ny andian-tafiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo manam-boninahiny voafantina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nasitriny ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: dranomasin’ny Volotara
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nandrakotra azy ny ranobe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nilentika any amin’ny farany ambany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny vato alatsaka izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: TOMPO ô, malaza ho mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sandrinao ankavanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manorotoro fahavalo!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mahatalanjona ny fahalehibiazanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manapotika ny mpanohitra Anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alefanao ny fahatezeranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandoro azy toy ny mololo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Noho ny hamafin’ny fofonainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nisavovona ny ranobe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nivangongo toa rindrina ny onjan-drano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’ny fanambanin’ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nifitsaka ny alon-drano.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy ireo fahavalony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hoenjehintsika ireny ka hotratrarintsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: halaintsika ho babo ka hanaranantsika fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hotsoahantsika ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamongotra azy ny tanantsika.»
