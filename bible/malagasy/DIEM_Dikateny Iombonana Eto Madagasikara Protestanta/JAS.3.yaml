document_id: JAS.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry havako, aza dia maro loatra no te ho mpampianatra, satria fantatrareo fa hotsaraina mafy kokoa izahay mpampianatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'vava iray ihany no ivoahan’ny teny fankalazana sy fanozonana. Ry havako, tsy mety ny toy izany! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Misy ve vavan-doharano manao indray mamoaka rano mamy sy rano mangidy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny aviavy ve, ry havako, mety hamoa ôliva, na ny voaloboka hamoa aviavy? Koa ny loharano masira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Koa ny loharano masira: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Toy izany koa ny loharano masira.
      marker-yv: yv-n
    - type: text
      text: tsy mety hanome rano mamy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahendrena avy any ambony
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Misy hendry sy manan-tsaina ve aminareo? Aoka hasehony amin’ny fitondrantena tsara fa ny halemem-panahy, vokatry ny fahendrena, no manenika ny asa ataony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raha misy fialonana mangidy sy fifampiandaniana ao am-ponareo, dia aza mirehareha ianareo ary aza mandainga manohitra ny marina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izany fahendrena izany dia tsy avy any ambony fa araka ny etỳ an-tany sy araka ny maha olombelona ary avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'satria izay misy fialonana sy fifampiandaniana dia misy fikorontanana mbamin’ny asa ratsy isan-karazany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ny fahendrena avy any ambony dia voalohany indrindra madio, ary koa tia fihavanana, mandefitra, mora ifampiraharahana, be famindrampo sady mahavokatra asa soa, tsy miangatra, tsy mihatsaravelatsihy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Izay mampanjaka fihavanana dia mamafy amim-pihavanana, ary dia ny rariny no vokatra azony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Eny, diso amin’ny zavatra maro isika rehetra; fa raha misy olona tsy diso mihitsy amin’ny teny, dia tanteraka izy, ka mahafehy ny tenany manontolo koa. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Asiantsika lamboridy ny vavan-tsoavaly mba hanoavan’ny soavaly antsika; ary dia voataritsika ny tenany manontolo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jereo koa ny sambo: na lehibe aza ireny ka entin’ny rivotra mahery, dia voatariky ny fanamory kely hankany amin’izay itiavan’ny mpanamory hitondrana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia toy izany koa ny lela: kely izy eo amin’ireo zavatra anisan’ny tena, nefa mirehaka ho mahefa zava-baventy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saino fa pitik’afo tsy toy inona dia afa-mampirehitra alabe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tahaka ny afo ny lela: manjary fototry ny faharatsiana tsy hita lany izy eo anivon’ireo zavatra anisan’ny tenantsika; mandoto ny tenantsika manontolo izy, ka sady mandrehitra afo eo amin’ny fizotran’ny fiainantsika no arehitry ny afo avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lohasahan’afo
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Folahin’ny olombelona daholo ny karazam-bibidia sy ny karazam-borona mbamin’ny biby mandady amin’ny tany sy ny zavamananaina any an-dranomasina, ary dia voafolany avokoa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa tsy misy olombelona na iray aza efa nahafolaka ny lela: zava-dratsy saro-pehezina ny lela sady feno poizina mahafaty. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izy no ankalazantsika an’ilay Tompo sady Ray, ary izy koa no anozonantsika ny olona izay noarîna araka ny endrik’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 1.26-27.
      marker-yv: yv-n
    - type: text
      text: ': '
