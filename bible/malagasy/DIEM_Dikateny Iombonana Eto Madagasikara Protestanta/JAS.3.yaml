document_id: JAS.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lela
  - type: text
    content: 'Ry havako, aza dia maro loatra no te ho mpampianatra, satria fantatrareo fa hotsaraina mafy kokoa izahay mpampianatra. '
  '10':
  - type: text
    content: 'vava iray ihany no ivoahan’ny teny fankalazana sy fanozonana. Ry havako, tsy mety ny toy izany! '
  '11':
  - type: text
    content: 'Misy ve vavan-doharano manao indray mamoaka rano mamy sy rano mangidy? '
  '12':
  - type: text
    content: Ny aviavy ve, ry havako, mety hamoa ôliva, na ny voaloboka hamoa aviavy? Koa ny loharano masira
  - type: note
    content: 'Koa ny loharano masira: misy stf sasany ahitana hoe Toy izany koa ny loharano masira.'
  - type: text
    content: tsy mety hanome rano mamy.
  - type: heading
    content: Fahendrena avy any ambony
  '13':
  - type: text
    content: 'Misy hendry sy manan-tsaina ve aminareo? Aoka hasehony amin’ny fitondrantena tsara fa ny halemem-panahy, vokatry ny fahendrena, no manenika ny asa ataony. '
  '14':
  - type: text
    content: 'Raha misy fialonana mangidy sy fifampiandaniana ao am-ponareo, dia aza mirehareha ianareo ary aza mandainga manohitra ny marina. '
  '15':
  - type: text
    content: 'Izany fahendrena izany dia tsy avy any ambony fa araka ny etỳ an-tany sy araka ny maha olombelona ary avy amin’ny '
  - type: text
    content: demony
  - type: text
    content: '; '
  '16':
  - type: text
    content: 'satria izay misy fialonana sy fifampiandaniana dia misy fikorontanana mbamin’ny asa ratsy isan-karazany. '
  '17':
  - type: text
    content: 'Fa ny fahendrena avy any ambony dia voalohany indrindra madio, ary koa tia fihavanana, mandefitra, mora ifampiraharahana, be famindrampo sady mahavokatra asa soa, tsy miangatra, tsy mihatsaravelatsihy. '
  '18':
  - type: text
    content: Izay mampanjaka fihavanana dia mamafy amim-pihavanana, ary dia ny rariny no vokatra azony.
  '2':
  - type: text
    content: 'Eny, diso amin’ny zavatra maro isika rehetra; fa raha misy olona tsy diso mihitsy amin’ny teny, dia tanteraka izy, ka mahafehy ny tenany manontolo koa. '
  '3':
  - type: text
    content: 'Asiantsika lamboridy ny vavan-tsoavaly mba hanoavan’ny soavaly antsika; ary dia voataritsika ny tenany manontolo. '
  '4':
  - type: text
    content: 'Jereo koa ny sambo: na lehibe aza ireny ka entin’ny rivotra mahery, dia voatariky ny fanamory kely hankany amin’izay itiavan’ny mpanamory hitondrana azy. '
  '5':
  - type: text
    content: 'Dia toy izany koa ny lela: kely izy eo amin’ireo zavatra anisan’ny tena, nefa mirehaka ho mahefa zava-baventy.'
  - type: text
    content: 'Saino fa pitik’afo tsy toy inona dia afa-mampirehitra alabe. '
  '6':
  - type: text
    content: 'Tahaka ny afo ny lela: manjary fototry ny faharatsiana tsy hita lany izy eo anivon’ireo zavatra anisan’ny tenantsika; mandoto ny tenantsika manontolo izy, ka sady mandrehitra afo eo amin’ny fizotran’ny fiainantsika no arehitry ny afo avy amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Folahin’ny olombelona daholo ny karazam-bibidia sy ny karazam-borona mbamin’ny biby mandady amin’ny tany sy ny zavamananaina any an-dranomasina, ary dia voafolany avokoa. '
  '8':
  - type: text
    content: 'Fa tsy misy olombelona na iray aza efa nahafolaka ny lela: zava-dratsy saro-pehezina ny lela sady feno poizina mahafaty. '
  '9':
  - type: text
    content: Izy no ankalazantsika an’ilay Tompo sady Ray, ary izy koa no anozonantsika ny olona izay noarîna araka ny endrik’Andriamanitra
  - type: note
    content: Jereo Gen 1.26-27.
  - type: text
    content: ': '
