document_id: JER.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manirery i Jeremià
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe:'
  '10':
  - type: text
    content: '«Ary rehefa mampita izany hafatra izany amin’io vahoaka io ianao, ka hanontaniany hoe: ‹Nahoana ny TOMPO no namoaka izany teny mandoza lehibe izany hamelezana anay? Fa inona no heloka na fahadisoana nataonay tamin’ny TOMPO Andriamanitray?› '
  '11':
  - type: text
    content: 'Ny havalinao kosa dia hoe: ‹Satria nahafoy Ahy ny razanareo ka nifikitra tamin’ny andriamani-kafa ary nanompo azy sy niankohoka teo anatrehany. Teny hentitra avy amiko TOMPO izany. Nahafoy Ahy izy ary tsy nitandrina ny lalànako. '
  '12':
  - type: text
    content: 'Ary ianareo koa vao mainka manao ratsy mihoatra noho ny razanareo aza, fa samy mikiribiby amin’ny ditram-pony avy, ka tsy mihaino Ahy. '
  '13':
  - type: text
    content: Noho izany dia horoahiko hiala amin’ity tany ity ianareo hankany amin’ny tany izay tsy fantatry ny tenanareo na ny razanareo. Any no hanompoanareo andriamani-kafa andro aman’alina, fa tsy hiantra anareo intsony Aho.› »
  - type: heading
    content: Ilay fodiana goavana
  '14':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO: «Ho avy ny andro izay tsy hanaovana fianianana intsony hoe: ‹Velona ny TOMPO Izay nanafaka ny Israelita hiala tany Ejipta, ka mianiana aho›, '
  '15':
  - type: text
    content: 'fa hoe: ‹Velona ny TOMPO Izay nanafaka ny Israelita avy any amin’ny tany avaratra sy avy any amin’ny tany hafa rehetra'
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: ' izay nandroahany azy, ka mianiana aho!› Eny, haveriko eo amin’ny taniny izay efa nomeko ny razany izy.»'
  - type: heading
    content: Hofaizina ny meloka rehetra
  '16':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO: «Haniraka mpanarato maro Aho mba hanarato azy; avy eo dia haniraka mpihaza betsaka koa Aho mba hihaza azy eny amin’ny tendrombohitra sy ny havoana rehetra ary hatrany an-tsefatsefaky ny harambato. '
  '17':
  - type: text
    content: 'Fa arahiko maso ny fitondrantenany rehetra ka tsy misy miafina amiko; eny, miharihary eo imasoko ny helony. '
  '18':
  - type: text
    content: Koa, ho fanombohana, dia hovaliako indroa heny ny helony sy ny fahadisoany satria nandoto ny taniko tamin’ireo fatin-tsampiny maharikoriko izy sady nameno ny anjara fananako tamin’ny andriamani-tsiizy mahatsiravina.»
  - type: heading
    content: Manaiky ilay tena Andriamanitra ny firenena rehetra
  '19':
  - type: text
    content: –TOMPO ô, Ianao no heriko sady mpiaro ahy,
  - type: text
    content: fialofako amin’ny androm-pahoriako.
  - type: text
    content: Hankany aminao ireo firenen-kafa
  - type: text
    content: avy any am-paran’ny tany
  - type: text
    content: 'sady ho loa-bolana hoe:'
  - type: text
    content: «Tena fitaka ny fivavahana
  - type: text
    content: izay nolovanay tamin’ny razanay,
  - type: text
    content: fa tsinontsinona sady tsy mahasoa.
  '2':
  - type: text
    content: '«Tsy hanam-bady ianao ary tsy hanan-janakalahy na zanakavavy eto amin’ity tany ity. '
  '20':
  - type: text
    content: Ny olona ve dia mahay manao
  - type: text
    content: andriamanitra ho an’ny tenany?
  - type: text
    content: Tsia, tsy Andriamanitra ireny.»
  '21':
  - type: text
    content: '–Hoy kosa ny TOMPO hoe:'
  - type: text
    content: «Koa amin’ity indray mandeha ity,
  - type: text
    content: dia hampahafantariko azy
  - type: text
    content: ny fahefàko sy ny heriko
  - type: text
    content: ka ho fantany fa Izaho no TOMPO.»
  '3':
  - type: text
    content: 'Fa izao no lazaiko ny amin’ireo zanakalahy sy ireo zanakavavy izay ho teraka eto amin’ity tany ity ary koa ny amin’ny rainy sy reniny niteraka azy: '
  '4':
  - type: text
    content: Ho fahafatesana mahatsiravina no hahafatesany ka tsy hitomaniana na halevina izy fa hijanona ho toy ny zezika eo amin’ny velaran-tany. Haripaky ny ady sy ny mosary izy, ka ny fatiny ho sakafon’ny voromahery sy ny bibidia.»
  '5':
  - type: text
    content: 'Izao koa no voalazan’ny TOMPO tamiko:'
  - type: text
    content: '«Aza miditra amin’ny tranom-paty na manatrika fandevenana na mitsapa alahelo akory, fa efa nesoriko tamin’ity vahoaka ity ny fihavanako sy ny hatsaram-poko ary ny fangorahako; teny hentitra avy amiko TOMPO izany. '
  '6':
  - type: text
    content: 'Fa na mpanankarena na mahantra no maty amin’ity tany ity, dia tsy halevina na hitomaniana na hanehoana alahelo amin’ny fitetehan-tena na hiboriana volo. '
  '7':
  - type: text
    content: Tsy hisy hanome hanina ny fianakaviana misaona na hampionona azy, ary tsy hisy hampisotro amin’ny kaopy fampiononana izay maty ray na maty reny.
  '8':
  - type: text
    content: '«Aza miditra ao amin’ny trano misy fanasana koa ianao, na mipetraka hihinana sy hisotro miaraka amin’izay nasaina. '
  '9':
  - type: text
    content: 'Satria Izaho TOMPOn’izao rehetra izao sady Andriamanitr’i Israely no efa milaza hoe: ‹Indro hatsahatro amin’ity tany ity eo imasonareo sy amin’ny andronareo ny kotabam-pifaliana amin’ny fety sy ny horakora-piravoana ary ny hiran’ny mpanambady'
  - type: note
    content: Ampit Jer 7.34 sy nta.
  - type: text
    content: .›
