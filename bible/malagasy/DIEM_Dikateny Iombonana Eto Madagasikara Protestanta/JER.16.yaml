document_id: JER.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manirery i Jeremià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ary rehefa mampita izany hafatra izany amin’io vahoaka io ianao, ka hanontaniany hoe: ‹Nahoana ny TOMPO no namoaka izany teny mandoza lehibe izany hamelezana anay? Fa inona no heloka na fahadisoana nataonay tamin’ny TOMPO Andriamanitray?› '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny havalinao kosa dia hoe: ‹Satria nahafoy Ahy ny razanareo ka nifikitra tamin’ny andriamani-kafa ary nanompo azy sy niankohoka teo anatrehany. Teny hentitra avy amiko TOMPO izany. Nahafoy Ahy izy ary tsy nitandrina ny lalànako. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianareo koa vao mainka manao ratsy mihoatra noho ny razanareo aza, fa samy mikiribiby amin’ny ditram-pony avy, ka tsy mihaino Ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany dia horoahiko hiala amin’ity tany ity ianareo hankany amin’ny tany izay tsy fantatry ny tenanareo na ny razanareo. Any no hanompoanareo andriamani-kafa andro aman’alina, fa tsy hiantra anareo intsony Aho.› »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay fodiana goavana
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO: «Ho avy ny andro izay tsy hanaovana fianianana intsony hoe: ‹Velona ny TOMPO Izay nanafaka ny Israelita hiala tany Ejipta, ka mianiana aho›, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hoe: ‹Velona ny TOMPO Izay nanafaka ny Israelita avy any amin’ny tany avaratra sy avy any amin’ny tany hafa rehetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1.14 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' izay nandroahany azy, ka mianiana aho!› Eny, haveriko eo amin’ny taniny izay efa nomeko ny razany izy.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hofaizina ny meloka rehetra
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny teny hentitry ny TOMPO: «Haniraka mpanarato maro Aho mba hanarato azy; avy eo dia haniraka mpihaza betsaka koa Aho mba hihaza azy eny amin’ny tendrombohitra sy ny havoana rehetra ary hatrany an-tsefatsefaky ny harambato. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa arahiko maso ny fitondrantenany rehetra ka tsy misy miafina amiko; eny, miharihary eo imasoko ny helony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa, ho fanombohana, dia hovaliako indroa heny ny helony sy ny fahadisoany satria nandoto ny taniko tamin’ireo fatin-tsampiny maharikoriko izy sady nameno ny anjara fananako tamin’ny andriamani-tsiizy mahatsiravina.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manaiky ilay tena Andriamanitra ny firenena rehetra
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –TOMPO ô, Ianao no heriko sady mpiaro ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fialofako amin’ny androm-pahoriako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankany aminao ireo firenen-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any am-paran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady ho loa-bolana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tena fitaka ny fivavahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nolovanay tamin’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsinontsinona sady tsy mahasoa.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Tsy hanam-bady ianao ary tsy hanan-janakalahy na zanakavavy eto amin’ity tany ity. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona ve dia mahay manao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andriamanitra ho an’ny tenany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, tsy Andriamanitra ireny.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '–Hoy kosa ny TOMPO hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Koa amin’ity indray mandeha ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampahafantariko azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fahefàko sy ny heriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantany fa Izaho no TOMPO.»
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izao no lazaiko ny amin’ireo zanakalahy sy ireo zanakavavy izay ho teraka eto amin’ity tany ity ary koa ny amin’ny rainy sy reniny niteraka azy: '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ho fahafatesana mahatsiravina no hahafatesany ka tsy hitomaniana na halevina izy fa hijanona ho toy ny zezika eo amin’ny velaran-tany. Haripaky ny ady sy ny mosary izy, ka ny fatiny ho sakafon’ny voromahery sy ny bibidia.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no voalazan’ny TOMPO tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Aza miditra amin’ny tranom-paty na manatrika fandevenana na mitsapa alahelo akory, fa efa nesoriko tamin’ity vahoaka ity ny fihavanako sy ny hatsaram-poko ary ny fangorahako; teny hentitra avy amiko TOMPO izany. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa na mpanankarena na mahantra no maty amin’ity tany ity, dia tsy halevina na hitomaniana na hanehoana alahelo amin’ny fitetehan-tena na hiboriana volo. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy hisy hanome hanina ny fianakaviana misaona na hampionona azy, ary tsy hisy hampisotro amin’ny kaopy fampiononana izay maty ray na maty reny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aza miditra ao amin’ny trano misy fanasana koa ianao, na mipetraka hihinana sy hisotro miaraka amin’izay nasaina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria Izaho TOMPOn’izao rehetra izao sady Andriamanitr’i Israely no efa milaza hoe: ‹Indro hatsahatro amin’ity tany ity eo imasonareo sy amin’ny andronareo ny kotabam-pifaliana amin’ny fety sy ny horakora-piravoana ary ny hiran’ny mpanambady'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 7.34 sy nta.
      marker-yv: yv-n
    - type: text
      text: .›
