document_id: GEN.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Afaka tamin’ny fandravana an’i Sôdôma i Lôta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony hariva dia tonga tao Sôdôma ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' roa. Nipetraka teo am-bavahadin’ny tanàna i Lôta tamin’izay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ireo anjely roa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 18.2 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'teo am-bavahadin’ny tanàna i Lôta:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 13.12-13.'
      marker-yv: yv-n
    - type: text
      text: '. Raha vao nahita ireo izy, dia nitsangana hitsena azy ary niankohoka teo anatrehany '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary naninji-tanana ireto anjely mba hampiditra an’i Lôta hankao an-trano ho eo akaikiny; ary nohidiany ny varavarana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ireo lehilahy teo am-baravaran’ny trano kosa nasiany fahajambana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fahajambana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 2 Mp 6.18.
      marker-yv: yv-n
    - type: text
      text: ' na ny kely na ny lehibe ka tsy nahita ny varavarana hidirana.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ireo anjely tamin’i Lôta:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mbola misy fianakavianao ve eto, toy ny vinantolahy na zanakalahy na zanakavavy na havana hafa? Ento mivoaka ny tanàna ireo, '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: satria lehibe ny fitarainana tonga eo anatrehan’ny TOMPO momba ny mponina ao aminy; koa nirahin’ny TOMPO izahay handrava azy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nivoaka ny trano i Lôta mba hiteny amin’ireo vinantony izay hanambady ny zanany vavy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miaingà, ialao ity toerana ity fa horavan’ny TOMPO ny tanàna.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saingy noheverin’ireo vinantony ho manao kivazivazy i Lôta.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary raha vao nangiran-dratsy ny andro, dia nandodona an’i Lôta ireto anjely ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miaingà, ento ny vadinao sy ny zanakao roa vavy fandrao ho levona noho ny amin’ny fahotan’ity tanàna ity ianareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha mbola nitaredretra i Lôta, dia notantanan’ny anjely izy mbamin’ny vady aman-janany ho any ivelan’ny tanàna noho ny famindrampon’ny TOMPO taminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2Pt 2.7.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nony efa tafavoakany tany ivelan’ny tanàna izy mianakavy, dia hoy ny anjely anankiray tamin’i Lôta:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avoty ny ainao ka aza miherika any aoriana ary aza mijanonjanona na aiza na aiza ato amin’ny faritany; mandosira eny an-tendrombohitra, fandrao levona ianao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy i Lôta taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsia, Tompoko, aza atao izany izahay! '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Marina fa nahita fitia teo imasonao aho ary lehibe ny famindramponao tamiko tamin’ny namonjenao ny aiko. Kanefa tsy ho afaka mandositra hatrany an-tendrombohitra akory aho, dia ho tratry ny loza ka ho faty. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miangavy re, Tompoko, mba mivilia hiantrano ao amiko ianareo; ka sasao ny tongotrareo, ary mandria anio alina fa rahampitso maraina no hanohy ny dia ianareo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’ireo anjely roa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, fa ho eto an-kianja ihany izahay no handany ny alina.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro eto misy tanàna kely akaiky azo andosirana tsara, ka avelao aho hialoka ao. Tsy zavatra bitika ve io angatahiko io, dia ho voavonjy ny aiko?
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ka hoy ilay anjely anankiray hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Eny àry, fa efa nekeko koa ny fangatahanao ka tsy hokasihiko ny tanàna izay voalazanao. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mandehana faingana miery ao, satria tsy afaka hanao na inona na inona aho ambara-pahatonganao ao. Izany no antony niantsoana io tanàna io hoe Tsôhara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsôhara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny voambolana nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kely
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eo amin’ny and 20.'
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Efa niposaka ny masoandro no tonga tao Tsôhara i Lôta. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tamin’izay indrindra ny TOMPO no nampidina afo sy solifara avy tany an-danitra handoroana an’i Sôdôma sy i Gômôra, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ka nandevona ireo tanàna ireo sy ny mponina rehetra tao aminy ary ny faritany manontolo sy ny zava-maniry rehetra tao aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 24-25:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Mt 10.15; 11.23-24; Lk 10.12; 17.29; 1Pt 2.6; Jod 7.
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary niherika tany aoriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 17.32.
      marker-yv: yv-n
    - type: text
      text: ' kosa ny vadin’i Lôta ka nanjary andry vongan-tsira.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nifoha maraina i Abrahama nony ampitso, ka nankany amin’ny toerana nifanatrehany tamin’ny TOMPO. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary raha nitodika nijery an’i Sôdôma sy i Gômôra mbamin’ny velaram-paritany manontolo manodidina izy, dia nahita ny setroka niakatra avy ao amin’ny tany toy ny setroky ny lafaoro.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Nony noravan’Andriamanitra ireo tanàna tamin’ny faritany nipetrahan’i Lôta, dia nahatsiaro an’i Abrahama Izy ka namela an’i Lôta hiala tao amin’ny lozam-paharavana.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Lôta sy ny zanany vavy
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa noteren’i Lôta fatratra izy, ka nivily ary niditra tao an-tranony. Dia nanamboarany sakafo sy nanendasany mofo tsy misy leviora ireo, ka nihinana.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Natahotra ny hijanona tao Tsôhara i Lôta, koa nandao ny tanàna mba handeha honina any an-tendrombohitra. Niaraka taminy koa ny zanany roa vavy; ary nipetraka tao amin’ny zohy izy telo mianaka. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Indray andro, dia hoy ilay zokiny tamin-jandriny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Antitra ity ny raintsika, ary tsy misy lehilahy eto amin’ny faritany mba hanambady antsika araka ny fanaon’ny tany rehetra. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Noho izany, andeha hampisotrointsika divay ny raintsika, dia handry aminy isika ka hanan-taranaka avy amin’ny raintsika.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia nampisotroin’izy roa divay ny rainy ny alin’io, ary avy ilay zokiny ka nandry tamin-drainy; nefa tsy fantatr’i Lôta mihitsy izay nandrian-drazazavavy na izay nifohazany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nony ampitso dia hoy ilay zokiny tamin-jandriny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro efa nandry tamin’ny raiko aho halina! Andeha hampisotrointsika divay indray izy anio alina, dia tongava ianao handry aminy, dia hamelona taranaka avy amin’ny raintsika isika.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dia nampisotroiny divay indray ny rainy tamin’iny alina iny, ary avy ilay zandriny ka nandry taminy; nefa tsy fantatr’i Lôta mihitsy izay nandrian-drazazavavy na izay nifohazany.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Koa bevohòka tamin-drainy ny zanak’i Lôta roa vavy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Niteraka zazalahy ilay zokiny, ka ny anarany nataony hoe Môaba. Izy no razamben’ireto Môabita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Môaba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia mampahatsiaro ny voambolana nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: avy amin’ny ray
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Môabita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia nipetraka tao amin’ny faritany atsinanan’ny Ranomasina Maty.
      marker-yv: yv-n
    - type: text
      text: ' ankehitriny ireto. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Niteraka zazalahy ihany koa ilay zandriny, ka ny anarany nataony hoe Bena-Hamy. Izy no razamben’ireto Hamônita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hebreo hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bena-Hamy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia azo adika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zana-kavako
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hamônita
        - type: text
          text: ' dia nonina tamin’ny ilan’ny faritany atsinanan’i Jôrdàna, teny amin’ny havoana ampitan’i Jôrdàna.'
      marker-yv: yv-n
    - type: text
      text: ' ankehitriny ireto.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa raha tsy mbola nandry akory ireo, dia efa voahodidin’ny lehilahy tao an-tanànan’i Sôdôma ny trano; teo avokoa na ny antitra na ny tanora, tsy nisy avakavaka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niantso an’i Lôta ireo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza ireo lehilahy tonga teto aminao izao hariva izao? Avoahy atỳ izy hanaovanay firaisana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nivoaka nankeo an-tokonana i Lôta, ka nanakatona ny varavarana teo ivohony, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ary niteny tamin’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsia, ry havako, aoka tsy hanao ratsy ianareo. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manana zanakavavy roa mbola virijiny aho; hoentiko eto aminareo ireo hanaovanareo izay sitrakareo hatao aminy. Fa aza manao na inona na inona amin’ireo olona ireo, satria vahiniko ireo ary ao ambany tafon-tranoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny fanajana ny fitsipika momba ny fampiantranoam-bahiny dia ambony noho ireo fiheverana hafa: jereo ny Mpits 19.'
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa hoy ny navalin’ireo azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mialà teo ianao, ianao izay tonga hivahiny indray ve no hanao lalàna ho anay ankehitriny! Hasianay ratsy lavitra noho ireo ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanosika mafy an’i Lôta ireo mba hisesika hamaky ny varavarana. '
