document_id: GEN.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Afaka tamin’ny fandravana an’i Sôdôma i Lôta
  - type: text
    content: 'Nony hariva dia tonga tao Sôdôma ireo '
  - type: text
    content: anjely
  - type: text
    content: ' roa. Nipetraka teo am-bavahadin’ny tanàna i Lôta tamin’izay'
  - type: note
    content: 'ireo anjely roa: jereo 18.2 sy nta. –teo am-bavahadin’ny tanàna i Lôta: jereo 13.12-13.'
  - type: text
    content: '. Raha vao nahita ireo izy, dia nitsangana hitsena azy ary niankohoka teo anatrehany '
  '10':
  - type: text
    content: 'Ary naninji-tanana ireto anjely mba hampiditra an’i Lôta hankao an-trano ho eo akaikiny; ary nohidiany ny varavarana. '
  '11':
  - type: text
    content: Fa ireo lehilahy teo am-baravaran’ny trano kosa nasiany fahajambana
  - type: note
    content: 'fahajambana: ampit 2 Mp 6.18.'
  - type: text
    content: ' na ny kely na ny lehibe ka tsy nahita ny varavarana hidirana.'
  '12':
  - type: text
    content: 'Ary hoy ireo anjely tamin’i Lôta:'
  - type: text
    content: '–Mbola misy fianakavianao ve eto, toy ny vinantolahy na zanakalahy na zanakavavy na havana hafa? Ento mivoaka ny tanàna ireo, '
  '13':
  - type: text
    content: satria lehibe ny fitarainana tonga eo anatrehan’ny TOMPO momba ny mponina ao aminy; koa nirahin’ny TOMPO izahay handrava azy.
  '14':
  - type: text
    content: 'Dia nivoaka ny trano i Lôta mba hiteny amin’ireo vinantony izay hanambady ny zanany vavy ka nanao hoe:'
  - type: text
    content: –Miaingà, ialao ity toerana ity fa horavan’ny TOMPO ny tanàna.
  - type: text
    content: Saingy noheverin’ireo vinantony ho manao kivazivazy i Lôta.
  '15':
  - type: text
    content: 'Ary raha vao nangiran-dratsy ny andro, dia nandodona an’i Lôta ireto anjely ka nanao hoe:'
  - type: text
    content: –Miaingà, ento ny vadinao sy ny zanakao roa vavy fandrao ho levona noho ny amin’ny fahotan’ity tanàna ity ianareo.
  '16':
  - type: text
    content: Raha mbola nitaredretra i Lôta, dia notantanan’ny anjely izy mbamin’ny vady aman-janany ho any ivelan’ny tanàna noho ny famindrampon’ny TOMPO taminy
  - type: note
    content: Jereo 2Pt 2.7.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ary nony efa tafavoakany tany ivelan’ny tanàna izy mianakavy, dia hoy ny anjely anankiray tamin’i Lôta:'
  - type: text
    content: –Avoty ny ainao ka aza miherika any aoriana ary aza mijanonjanona na aiza na aiza ato amin’ny faritany; mandosira eny an-tendrombohitra, fandrao levona ianao.
  '18':
  - type: text
    content: 'Fa hoy i Lôta taminy:'
  - type: text
    content: '–Tsia, Tompoko, aza atao izany izahay! '
  '19':
  - type: text
    content: 'Marina fa nahita fitia teo imasonao aho ary lehibe ny famindramponao tamiko tamin’ny namonjenao ny aiko. Kanefa tsy ho afaka mandositra hatrany an-tendrombohitra akory aho, dia ho tratry ny loza ka ho faty. '
  '2':
  - type: text
    content: 'sady niteny hoe:'
  - type: text
    content: –Miangavy re, Tompoko, mba mivilia hiantrano ao amiko ianareo; ka sasao ny tongotrareo, ary mandria anio alina fa rahampitso maraina no hanohy ny dia ianareo.
  - type: text
    content: 'Ka hoy ny navalin’ireo anjely roa hoe:'
  - type: text
    content: –Tsia, fa ho eto an-kianja ihany izahay no handany ny alina.
  '20':
  - type: text
    content: Indro eto misy tanàna kely akaiky azo andosirana tsara, ka avelao aho hialoka ao. Tsy zavatra bitika ve io angatahiko io, dia ho voavonjy ny aiko?
  '21':
  - type: text
    content: 'Ka hoy ilay anjely anankiray hoe:'
  - type: text
    content: '–Eny àry, fa efa nekeko koa ny fangatahanao ka tsy hokasihiko ny tanàna izay voalazanao. '
  '22':
  - type: text
    content: Mandehana faingana miery ao, satria tsy afaka hanao na inona na inona aho ambara-pahatonganao ao. Izany no antony niantsoana io tanàna io hoe Tsôhara
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Tsôhara dia mampahatsiaro ny voambolana nadika hoe kely eo amin’ny and 20.
  - type: text
    content: .
  '23':
  - type: text
    content: 'Efa niposaka ny masoandro no tonga tao Tsôhara i Lôta. '
  '24':
  - type: text
    content: 'Tamin’izay indrindra ny TOMPO no nampidina afo sy solifara avy tany an-danitra handoroana an’i Sôdôma sy i Gômôra, '
  '25':
  - type: text
    content: ka nandevona ireo tanàna ireo sy ny mponina rehetra tao aminy ary ny faritany manontolo sy ny zava-maniry rehetra tao aminy
  - type: note
    content: 'And 24-25: ampit Mt 10.15; 11.23-24; Lk 10.12; 17.29; 1Pt 2.6; Jod 7.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: Ary niherika tany aoriana
  - type: note
    content: Jereo Lk 17.32.
  - type: text
    content: ' kosa ny vadin’i Lôta ka nanjary andry vongan-tsira.'
  '27':
  - type: text
    content: 'Ary nifoha maraina i Abrahama nony ampitso, ka nankany amin’ny toerana nifanatrehany tamin’ny TOMPO. '
  '28':
  - type: text
    content: Ary raha nitodika nijery an’i Sôdôma sy i Gômôra mbamin’ny velaram-paritany manontolo manodidina izy, dia nahita ny setroka niakatra avy ao amin’ny tany toy ny setroky ny lafaoro.
  '29':
  - type: text
    content: Nony noravan’Andriamanitra ireo tanàna tamin’ny faritany nipetrahan’i Lôta, dia nahatsiaro an’i Abrahama Izy ka namela an’i Lôta hiala tao amin’ny lozam-paharavana.
  - type: heading
    content: I Lôta sy ny zanany vavy
  '3':
  - type: text
    content: Fa noteren’i Lôta fatratra izy, ka nivily ary niditra tao an-tranony. Dia nanamboarany sakafo sy nanendasany mofo tsy misy leviora ireo, ka nihinana.
  '30':
  - type: text
    content: 'Natahotra ny hijanona tao Tsôhara i Lôta, koa nandao ny tanàna mba handeha honina any an-tendrombohitra. Niaraka taminy koa ny zanany roa vavy; ary nipetraka tao amin’ny zohy izy telo mianaka. '
  '31':
  - type: text
    content: 'Indray andro, dia hoy ilay zokiny tamin-jandriny:'
  - type: text
    content: '–Antitra ity ny raintsika, ary tsy misy lehilahy eto amin’ny faritany mba hanambady antsika araka ny fanaon’ny tany rehetra. '
  '32':
  - type: text
    content: Noho izany, andeha hampisotrointsika divay ny raintsika, dia handry aminy isika ka hanan-taranaka avy amin’ny raintsika.
  '33':
  - type: text
    content: 'Dia nampisotroin’izy roa divay ny rainy ny alin’io, ary avy ilay zokiny ka nandry tamin-drainy; nefa tsy fantatr’i Lôta mihitsy izay nandrian-drazazavavy na izay nifohazany. '
  '34':
  - type: text
    content: 'Nony ampitso dia hoy ilay zokiny tamin-jandriny:'
  - type: text
    content: –Indro efa nandry tamin’ny raiko aho halina! Andeha hampisotrointsika divay indray izy anio alina, dia tongava ianao handry aminy, dia hamelona taranaka avy amin’ny raintsika isika.
  '35':
  - type: text
    content: Dia nampisotroiny divay indray ny rainy tamin’iny alina iny, ary avy ilay zandriny ka nandry taminy; nefa tsy fantatr’i Lôta mihitsy izay nandrian-drazazavavy na izay nifohazany.
  '36':
  - type: text
    content: 'Koa bevohòka tamin-drainy ny zanak’i Lôta roa vavy. '
  '37':
  - type: text
    content: Niteraka zazalahy ilay zokiny, ka ny anarany nataony hoe Môaba. Izy no razamben’ireto Môabita
  - type: note
    content: Amin’ny teny hebreo ny anarana hoe Môaba dia mampahatsiaro ny voambolana nadika hoe avy amin’ny ray. –Ny Môabita dia nipetraka tao amin’ny faritany atsinanan’ny Ranomasina Maty.
  - type: text
    content: ' ankehitriny ireto. '
  '38':
  - type: text
    content: Niteraka zazalahy ihany koa ilay zandriny, ka ny anarany nataony hoe Bena-Hamy. Izy no razamben’ireto Hamônita
  - type: note
    content: Ny anarana hebreo hoe Bena-Hamy dia azo adika hoe zana-kavako. Ny Hamônita dia nonina tamin’ny ilan’ny faritany atsinanan’i Jôrdàna, teny amin’ny havoana ampitan’i Jôrdàna.
  - type: text
    content: ' ankehitriny ireto.'
  '4':
  - type: text
    content: 'Fa raha tsy mbola nandry akory ireo, dia efa voahodidin’ny lehilahy tao an-tanànan’i Sôdôma ny trano; teo avokoa na ny antitra na ny tanora, tsy nisy avakavaka. '
  '5':
  - type: text
    content: 'Dia niantso an’i Lôta ireo ka nanao taminy hoe:'
  - type: text
    content: –Aiza ireo lehilahy tonga teto aminao izao hariva izao? Avoahy atỳ izy hanaovanay firaisana.
  '6':
  - type: text
    content: 'Dia nivoaka nankeo an-tokonana i Lôta, ka nanakatona ny varavarana teo ivohony, '
  '7':
  - type: text
    content: 'ary niteny tamin’ireo hoe:'
  - type: text
    content: '–Tsia, ry havako, aoka tsy hanao ratsy ianareo. '
  '8':
  - type: text
    content: Manana zanakavavy roa mbola virijiny aho; hoentiko eto aminareo ireo hanaovanareo izay sitrakareo hatao aminy. Fa aza manao na inona na inona amin’ireo olona ireo, satria vahiniko ireo ary ao ambany tafon-tranoko
  - type: note
    content: 'Ny fanajana ny fitsipika momba ny fampiantranoam-bahiny dia ambony noho ireo fiheverana hafa: jereo ny Mpits 19.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Fa hoy ny navalin’ireo azy:'
  - type: text
    content: –Mialà teo ianao, ianao izay tonga hivahiny indray ve no hanao lalàna ho anay ankehitriny! Hasianay ratsy lavitra noho ireo ianao.
  - type: text
    content: 'Dia nanosika mafy an’i Lôta ireo mba hisesika hamaky ny varavarana. '
