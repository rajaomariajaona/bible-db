document_id: AMO.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana voalohany: ny valala'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy nanao andiam-balala tamin’ny fiandohan’ny fitsimohan’ny kolokolo, dia ny kolokolo taorian’ny fijinjana vary ho an’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa tapitra lanin’ny valala avokoa ny ahitra rehetra tamin’ny tany, dia hoy aho hoe: «Ry Tompo ANDRIAMANITRA ô, mba avelao re ny heloky ny vahoakanao! Fa fomba ahoana no hahajoroan’ny taranak’i Jakôba satria kely izy?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niova hevitra tokoa ny TOMPO ka dia IZY mihitsy no niteny hoe: «Tsy hisy izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny and 1-3: jereo Eks 32.9-14; Nom 14.13-19; Jer 15.1-6; Jak 5.16.'
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana faharoa: ny afo'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao indray no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy Tompo ANDRIANANAHARY dia niantso ny afo hanatanteraka ny fitsarany; ka ny afo no nandritra ny ranobe any ambanin’ny tany sady nandoro ny tanin’i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy aho hoe: «Ry Tompo ANDRIANANAHARY ô, mba atsaharo amin’izay re! Fa fomba ahoana no hahajoroan’ny taranak’i Jakôba satria kely izy?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niova hevitra tokoa ny TOMPO; ka dia Izy Tompo ANDRIANANAHARY no niteny hoe: «Tsy hisy izany.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny fahitana fahatelo: ny fira-potsy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao koa no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy Tompo mihitsy no nitsangana teo ambonina manda fira-potsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fira-potsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: akora fanaovana fitaovam-piadiana ny fira-potsy fahizany ary dia ilazana ny fitaovam-piadiana handringanana an’i Israely.
    marker-yv: yv-n
  - type: text
    text: ' sady nitana fira-potsy teny an-tanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nanontany ahy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no hitanao, ry Hamôsa?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fira-potsy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy indray ny Tompo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indro Aho hampiasa fira-potsy hamelezako eo afovoan’i Israely vahoakako, satria tsy holeferiko intsony ny fahadisoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hofoanako ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinan
  - type: text
    text: ’ny taranak’i Itsehàka, horavako ireo toeram-pivavahan’i Israely, ary hitsangana Aho hamely ny taranak’i Jerôbohama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hamely... Jerôbohama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 15.8-10.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny sabatra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noroahina tao Betela i Hamôsa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary i Amatsià, mpisorona tao Betela, dia naniraka hilaza amin’i Jerôbohama mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' hoe: «I Hamôsa efa nikotrika fikomiana taminao teo anivon’ny vahoakan’i Israely; tsy zakan’ny tany intsony ireo kabariny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao manko no voalazan’i Hamôsa: Ho fatin’ny sabatra i Jerôbohama ary ny vahoakan’i Israely dia ho entina ho babo lavitra ny taniny.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy i Amatsià tamin’i Hamôsa: «Ry mpahazo fahitana, mandehana mandositra any amin’ny tanin’i Joda ianao, ka any no ijoroy ny maha-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao; dia ry zareo no hanome anao ny mofo hohaninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa aza maminany eto Betela intsony, fa toeram-pivavahana najoron’ny mpanjaka sady lapan’andriamanjaka no eto.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namaly an’i Amatsià i Hamôsa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy mba mpaminany na anisan’ny tarika mpaminany aho taloha fa mpiandry biby fiompy sady mpanindrona voan’aviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'voan’aviavy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny aviavy dia hazo maniry eny amin’ny toerana ivaiva any Palestinina; ny voany dia natao sakafon’ny biby fiompy. Somary tsindronina kely ny voany mba hahamasaka azy faingana.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saingy nalain’ny TOMPO teo am-piandrasana biby fiompy aho ka nitenenany hoe: «Mandehana ianao ka mijoroa ho mpaminany amin’ny Israely vahoakako.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ankehitriny, henoy ny tenin’ny TOMPO. Ianao manao amiko hoe: «Aza maminany ny hamelezana an’i Israely ary aza manambara ny hamelezana ny taranak’i Itsehàka»; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'noho izany, ry Amatsià, dia izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hijangajanga ao an-tanàna ny vadinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo zanakao lahy sy vavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haringana amin’ny sabatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny taninao dia hozarazaraina amin’ny tady
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy homena olon-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ianao dia ho faty any amin’ny tany fanompoan-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny taranak’i Israely dia ho lasan-ko babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: lavitry ny taniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny and 10-17: ampit Jer 20.1-6.'
    marker-yv: yv-n
  - type: text
    text: .»
