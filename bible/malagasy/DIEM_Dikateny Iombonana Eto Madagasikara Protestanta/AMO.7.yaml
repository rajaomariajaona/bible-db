document_id: AMO.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny fahitana voalohany: ny valala'
  - type: text
    content: 'Izao no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy nanao andiam-balala tamin’ny fiandohan’ny fitsimohan’ny kolokolo, dia ny kolokolo taorian’ny fijinjana vary ho an’ny mpanjaka. '
  '10':
  - type: text
    content: 'Ary i Amatsià, mpisorona tao Betela, dia naniraka hilaza amin’i Jerôbohama mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' hoe: «I Hamôsa efa nikotrika fikomiana taminao teo anivon’ny vahoakan’i Israely; tsy zakan’ny tany intsony ireo kabariny rehetra. '
  '11':
  - type: text
    content: 'Fa izao manko no voalazan’i Hamôsa: Ho fatin’ny sabatra i Jerôbohama ary ny vahoakan’i Israely dia ho entina ho babo lavitra ny taniny.»'
  '12':
  - type: text
    content: 'Dia hoy i Amatsià tamin’i Hamôsa: «Ry mpahazo fahitana, mandehana mandositra any amin’ny tanin’i Joda ianao, ka any no ijoroy ny maha-'
  - type: text
    content: mpaminany
  - type: text
    content: ' anao; dia ry zareo no hanome anao ny mofo hohaninao. '
  '13':
  - type: text
    content: Fa aza maminany eto Betela intsony, fa toeram-pivavahana najoron’ny mpanjaka sady lapan’andriamanjaka no eto.»
  '14':
  - type: text
    content: 'Dia namaly an’i Amatsià i Hamôsa nanao hoe:'
  - type: text
    content: –Tsy mba mpaminany na anisan’ny tarika mpaminany aho taloha fa mpiandry biby fiompy sady mpanindrona voan’aviavy
  - type: note
    content: 'voan’aviavy: ny aviavy dia hazo maniry eny amin’ny toerana ivaiva any Palestinina; ny voany dia natao sakafon’ny biby fiompy. Somary tsindronina kely ny voany mba hahamasaka azy faingana.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Saingy nalain’ny TOMPO teo am-piandrasana biby fiompy aho ka nitenenany hoe: «Mandehana ianao ka mijoroa ho mpaminany amin’ny Israely vahoakako.» '
  '16':
  - type: text
    content: 'Koa ankehitriny, henoy ny tenin’ny TOMPO. Ianao manao amiko hoe: «Aza maminany ny hamelezana an’i Israely ary aza manambara ny hamelezana ny taranak’i Itsehàka»; '
  '17':
  - type: text
    content: 'noho izany, ry Amatsià, dia izao no lazain’ny TOMPO:'
  - type: text
    content: Hijangajanga ao an-tanàna ny vadinao;
  - type: text
    content: ireo zanakao lahy sy vavy
  - type: text
    content: dia haringana amin’ny sabatra;
  - type: text
    content: ny taninao dia hozarazaraina amin’ny tady
  - type: text
    content: sy homena olon-kafa;
  - type: text
    content: ianao dia ho faty any amin’ny tany fanompoan-tsampy
  - type: text
    content: ary ny taranak’i Israely dia ho lasan-ko babo
  - type: text
    content: lavitry ny taniny
  - type: note
    content: 'Momba ny and 10-17: ampit Jer 20.1-6.'
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Ary rehefa tapitra lanin’ny valala avokoa ny ahitra rehetra tamin’ny tany, dia hoy aho hoe: «Ry Tompo ANDRIAMANITRA ô, mba avelao re ny heloky ny vahoakanao! Fa fomba ahoana no hahajoroan’ny taranak’i Jakôba satria kely izy?» '
  '3':
  - type: text
    content: 'Dia niova hevitra tokoa ny TOMPO ka dia IZY mihitsy no niteny hoe: «Tsy hisy izany'
  - type: note
    content: 'Momba ny and 1-3: jereo Eks 32.9-14; Nom 14.13-19; Jer 15.1-6; Jak 5.16.'
  - type: text
    content: .»
  - type: heading
    content: 'Ny fahitana faharoa: ny afo'
  '4':
  - type: text
    content: 'Izao indray no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy Tompo ANDRIANANAHARY dia niantso ny afo hanatanteraka ny fitsarany; ka ny afo no nandritra ny ranobe any ambanin’ny tany sady nandoro ny tanin’i Israely. '
  '5':
  - type: text
    content: 'Dia hoy aho hoe: «Ry Tompo ANDRIANANAHARY ô, mba atsaharo amin’izay re! Fa fomba ahoana no hahajoroan’ny taranak’i Jakôba satria kely izy?» '
  '6':
  - type: text
    content: 'Ary niova hevitra tokoa ny TOMPO; ka dia Izy Tompo ANDRIANANAHARY no niteny hoe: «Tsy hisy izany.»'
  - type: heading
    content: 'Ny fahitana fahatelo: ny fira-potsy'
  '7':
  - type: text
    content: 'Izao koa no nasehon’ny Tompo ANDRIANANAHARY ahy tamin’ny fahitana: Indro Izy Tompo mihitsy no nitsangana teo ambonina manda fira-potsy'
  - type: note
    content: 'fira-potsy: akora fanaovana fitaovam-piadiana ny fira-potsy fahizany ary dia ilazana ny fitaovam-piadiana handringanana an’i Israely.'
  - type: text
    content: ' sady nitana fira-potsy teny an-tanany. '
  '8':
  - type: text
    content: 'Dia nanontany ahy ny TOMPO hoe:'
  - type: text
    content: –Inona no hitanao, ry Hamôsa?
  - type: text
    content: 'Ka novaliako hoe:'
  - type: text
    content: –Fira-potsy.
  - type: text
    content: 'Dia hoy indray ny Tompo hoe:'
  - type: text
    content: '–Indro Aho hampiasa fira-potsy hamelezako eo afovoan’i Israely vahoakako, satria tsy holeferiko intsony ny fahadisoany. '
  '9':
  - type: text
    content: 'Fa hofoanako ireo '
  - type: text
    content: toeram-panasinan
  - type: text
    content: ’ny taranak’i Itsehàka, horavako ireo toeram-pivavahan’i Israely, ary hitsangana Aho hamely ny taranak’i Jerôbohama
  - type: note
    content: 'hamely... Jerôbohama: jereo 2 Mp 15.8-10.'
  - type: text
    content: ' amin’ny sabatra.'
  - type: heading
    content: Noroahina tao Betela i Hamôsa
