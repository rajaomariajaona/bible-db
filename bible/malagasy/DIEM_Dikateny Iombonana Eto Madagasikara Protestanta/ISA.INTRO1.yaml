document_id: ISA.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: text
    text: '–Mamonjy ny Tompo: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany no hevitry ny anarana hebreo gasîna hoe
  - type: text
    text: ' Jesahià. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny anarana
  - type: text
    text: ' Isaià '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mahazatra sy mbola tazonintsika kosa dia avy amin’ny teny latinina sy anglisy. Koa io anarana io ihany dia efa mahafintina izay ao anatin’ity boky ity. Saingy ny famonjena entin’Andriamanitra moa matetika dia tsy izay irîn’ny olona velively. Koa tsy mahagaga raha manaitra hatrany ny hafatra raketin’ity boky ity.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ireo toko 66 ao aminy dia mifampitohy ao anatin’ny fizaràna telo lehibe izay mifanandrify amin’ny vanim-potoana telo samy hafa nanahirana teo amin’ny tantaran’ny vahoakan’Andriamanitra.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny FIZARÀNA VOALOHANY (toko 1–39) dia mifantoka amin’ny olona sy ny toe-javatra nitranga manodidina ny taona 740–700 tal J.K. eo ho eo. Tonga mpitondratenin’Andriamanitra tao Jerosalema i Isaià tamin’ny vanim-potoana nafampana izay nihenjanan’ny fifandraisana iraisam-pirenena fahizany: i Ejipta izay firenen-dehibe nahery tao atsimo dia nihen-danja, fa ny Asirianina tao avaratra kosa nitombo tanjaka isan’andro hatrany. Ireto no daty lehibe tokony ho fantatra:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Tokony ho tamin’ny taona 734, fony mbola nanjaka tao Jerosalema i Ahaza, dia nitambatra ny fanjakana Siria sy Efraîma (Israely avaratra) mba hamely an’i Joda ka hanery azy hikambana aminy hanohitra ny Asirianina izay nananontanona: io ilay ady nifarimbonan’ny Sirianina sy ny Efraimita tamin’i Joda.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Taona 722-721: fiafaran’ny fanjakana avaratra, nanana an’i Samaria ho renivohitra; azon’ny Asirianina i Samaria ka nentiny ho babo ny mponina tao.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Taona 701: nanao fahirano an’i Jerosalema ny Asirianina tamin’ny andro nanjakàn’i Hezekià sady nanasamatsamaka ny fanjakana Joda.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Nandritra izany vanim-potoana izany no nipoiran’i Isaià, izay lehilahy tsy nilefitra mihitsy ny amin’Andriamanitra, ka ny hafatra nambarany dia nanohariana hatrany: ny Asirianina izay nananontanona, hoy izy, dia karazana firotsahan’Andriamanitra hamely ny vahoakany izay tsy mahatoky. Notoheriny ny firaisana tsikombakomba nokotrehin’ny mpitondra tao Jerosalema, ny fanosihosena matetika ny rariny sy ny hitsiny teo amin’ny fiaraha-monina, ny fombam-pivavahana nialokalofan’ireo mpitsentsitra ny mahantra, ny fisehosehoana te ho firenen-dehibe, sns. Nony tonga tokoa anefa ny loza, dia avy indray ny hafatry ny mpaminany hanohitra ny fisavorovoroana sy ny fahakiviana.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tamin’izany toe-javatra rehetra izany i Isaià dia niantso ny olona hino, izany hoe hatoky ny fampanantenàn’Andriamanitra sy ny fitsipi-pitondrantena nomeny ho an’ny vahoakany. Nantitranterin’i Isaià mafy fa ny finoana dia tsy maintsy aseho amin’ny alalan’ny asa, indrindra amin’ny lafiny sôsialy sy pôlitika ary amin’ny fifandraisan’ny olona.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ity fizaràna voalohany ity dia misy ireo '
  - type: text
    text: 'amboaran-kafatra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'natambatra araka ny lohahevitra raketiny sy araka ny vaninandro nisehoany:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Toko 1–12; 28–33: hafatra mikasika ny fanjakana Joda sy Israely-Efraîma.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Toko 13–23: hafatra mikasika ireo vahoaka amin’ny firenen-kafa, dia i Babilôna, i Filistia, i Môaba sns.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Toko 24–27; 34–35: ny zavatra hihatra amin’ny andro farany.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '–Toko 36–39: tantara (iombonana amin’ny bokin’ny Mpanjaka ny ankamaroany) momba ny fanjakan’i Hezekià.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny FIZARÀNA FAHAROA (toko 40–55) dia antsoina koa indraindray hoe «BOKIN’NY FAMPIONONANA AN’I ISRAELY».
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Toe-javatra hafa no eo anoloany: ny Babilônianina, izay nandimby toerana ny Asirianina amin’ny maha hery mpanjakazaka azy manerana iny faritra manontolo iny, dia vao avy nandroba an’i Jerosalema tamin’ny taona 587 tal J.K. ary nitondra ho babo ny mponina tao.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Manontany tena ireo lasan-ko babo ireo: mety ho fandresen’ny andriamanitra babilônianina ny Andriamanitr’i Israely ve ny faharavàn’ny tanàna masina? Ary satria lavitry ny tany nomen’ny Tompo azy sady tsy manana ny tempoly fihaonana amin’ny Tompo ireo voasesitany, dia kivy mihitsy ary nihevitra fa ninian’Andriamanitra nilaozana na nilaozany noho ny fahalemeny.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Koa ho an’ireo olona kivy ireo no itenenan’ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hampiasa an’i Kirôsa mpanjaka persianina Andriamanitra mba hanafaka ny vahoakany. Fanafahana vaovao, izay hampahatsiaro ny fanafahana tany Ejipta, no hahazoan’io vahoaka io hiverina any amin’ny tany nampanantenaina. Mpamorona izao tontolo izao Andriamanitra, ka manana fahefana hilaza mialoha ny toe-javatra ho avy sady afaka manatanteraka izany. Ny sampin’ireo mpandresy kosa dia tsinontsinona fa nofinofy ihany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Natsofoka amin’ireo hafatra feno fanantenana ireo ny tononkira efatra momba ilay olo-mahagaga, dia ny Mpanompon’ny Tompo (42.1-4; 49.1-6; 50.4-9; 52.13–53.12) izay noheverin’ny Testamenta Vaovao fa milaza mialoha ny ho toetoetran’i Jesoa Kristy atỳ aoriana (jereo Asa 8.30-35).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny FIZARÀNA FAHATELO (toko 56–66) dia mifantoka amin’ny vanim-potoana manaraka ny fodiana avy any am-pahababoana. Tamin’ny taona 538 tal J.K. tokoa dia namoaka didy i Kirôsa mpanjakan’i Persia nanome lalana ireo babo hiverina any an-tanindrazany sy hanorina indray ny tempoly. Nony tafaverina anefa ireo nody avy an-tsesitany, dia fiainan-tsarotra sy tsizarizary no natrehany: tanàna rava, tany nobodoin’ireo sisa tavela teo an-toerana, vahoaka mpivavaka nihavitsy kely; tsy ampy ny fivelomana, teraka indray ny tsy fahamarinana teo amin’ny fiaraha-monina, ary miverina mahery vaika ny fanompoan-tsampy sns.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny mpaminany anefa dia niseho ho iraka nalefan’ny Fanahin’ny Tompo «mba hitory ny Vaovao Mahafaly amin’ny malahelo sy hanasitrana ny olona torotoro fo» (toko 61). Atỳ aoriana dia hambaran’i Jesoa fa ny hanatanteraka io asa nanirahana ny
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: io mihitsy no niaviany teto an-tany (Lioka 4.16-21).
