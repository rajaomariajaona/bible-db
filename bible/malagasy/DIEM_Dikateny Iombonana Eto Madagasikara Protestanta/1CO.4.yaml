document_id: 1CO.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Apôstôlin’i Kristy
  - type: text
    content: 'Aoka izahay hoheverina ho mpanompon’i Kristy sy ho mpitantana ireo tsiambaratelo momba an’Andriamanitra. '
  '10':
  - type: text
    content: 'Izahay moa adala noho ny amin’i Kristy, fa ianareo kosa hendry satria tafaray amin’i Kristy; izahay osa, fa ianareo kosa matanjaka; izahay tsy misy hajany, fa ianareo kosa heni-boninahitra. '
  '11':
  - type: text
    content: 'Mandraka ankehitriny, dia mijalin’ny hanoanana sy hetaheta izahay; tsy manan-kitafy, velesina, tsy manana antom-ponenana. '
  '12':
  - type: text
    content: Miasa mafy izahay mba hahavita tena
  - type: note
    content: Jereo Asa 18.3.
  - type: text
    content: '; raha ozonin’olona, dia mirary soa; raha enjehina, dia miaritra; '
  '13':
  - type: text
    content: raha endrikendrehina, dia mamaly teny malefaka. Mova tsy tonga fakofakon’izao tontolo izao sy faraidin’ny olona rehetra izahay, mandraka ankehitriny.
  '14':
  - type: text
    content: 'Tsy ny hanome henatra anareo no anoratako izany, fa ny hananatra anareo, araka ny maha zanaka malalako anareo. '
  '15':
  - type: text
    content: 'Na dia miisa iray alina aza ny mpanabe anareo amin’izao maha kristianina anareo izao, dia tsy maro ray tsy akory ianareo: izaho no rainareo ka nahatonga anareo ho tafaray amin’i Kristy Jesoa tamin’ny alalan’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Koa miangavy anareo aho: manahafa ahy. '
  '17':
  - type: text
    content: Noho izany, dia alefako atỳ aminareo i Timôty
  - type: note
    content: 'Timôty: jereo Asa 16.1.'
  - type: text
    content: ', zanaka malalako sady mahatoky amin’ny fanompoana ny Tompo. Izy no hampahatsiaro anareo ireo lalana nodiaviko nahatafaray ahy amin’i Kristy Jesoa, araka izay ampianariko amin’ny Fiangonana rehetra hatraiza hatraiza.'
  '18':
  - type: text
    content: 'Nisy manko taminareo nirehareha hoatra ny tsy ho tonga hitsidika anareo iny aho. '
  '19':
  - type: text
    content: 'Kanefa ho avy faingana hitsidika anareo aho, raha sitrapon’ny Tompo; ary tsy izay tenin’ireo mpirehareha no hofantariko fa izay zavatra vitany. '
  '2':
  - type: text
    content: 'Ny hany takîna amin’ny mpitantana dia ny ho hita fa olona mahatoky. '
  '20':
  - type: text
    content: 'Ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ' dia tsy teny foana fa hery mahavita zavatra. '
  '21':
  - type: text
    content: 'Ka asa izay tianareo: ho avy hitsidika anareo aho, ka tsorakazo ve no hoentiko sa fo feno fitiavana sy fahalemem-panahy?'
  '3':
  - type: text
    content: 'Raha izaho dia tsy mampaninona ahy velively na hotsarainareo, na handia fitsaran’olombelona; fa na ny mitsara ny tenako aza tsy ataoko. '
  '4':
  - type: text
    content: 'Tsy manome tsiny ahy velively ny eritreritro, nefa tsy mahamarina ahy izany fa ny Tompo no mpitsara ahy. '
  '5':
  - type: text
    content: 'Noho izany, aza mitsara olona alohan’ny fotoana, dia mandra-piavin’ny Tompo: Izy no hampiharihary ireo zavatra afenina anatin’ny maizina sy hampiseho ireo hevitry ny fon’ny olombelona. Ka amin’izay dia samy homen’Andriamanitra ny dera tandrify azy avy ny tsirairay.'
  '6':
  - type: text
    content: 'Ry havako, nampihariko tamin’ny tenako sy tamin’i Apôlao izany zavatra izany, noho ny aminareo. Ka dia ny tenanay roa lahy no hianaranareo ny dikan’ilay ohabolana hoe: «Aza mihoatra ny faritra izay efa voasoratra'
  - type: note
    content: 'Aza mihoatra... voasoratra: maizina ny teny ao amin’ny rijan-teny grika fototra, ary ny dkt koa tsy tena azo antoka.'
  - type: text
    content: '.» Aoka ianareo tsy hirehareha miandany amin’olona anankiray ka hanabanty anankiray hafa. '
  '7':
  - type: text
    content: Iza moa no nanondrotra anao ho ambonin’ny sasany? Inona no anananao ka tsy noraisinao tamin’Andriamanitra? Ary raha nandray tamin’Andriamanitra ianao, nahoana no dia mirehareha hoatra ny tsy nandray?
  '8':
  - type: text
    content: 'Efa tapi-java-nirina ianareo, efa manankarena, tonga mpanjaka, saingy toa tsy noho ny nataonay! Satriko ho tonga mpanjaka tokoa ianareo, mba hiarahanay manjaka aminareo. '
  '9':
  - type: text
    content: 'Noheveriko fa izahay apôstôly dia nasehon’Andriamanitra ho olona faraidiny mihitsy: mova tsy olona voaheloko ho faty ampahibemaso ka natao ho fizàhan’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' na '
  - type: text
    content: anjely
  - type: text
    content: ' na olona. '
