document_id: 1CO.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôstôlin’i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aoka izahay hoheverina ho mpanompon’i Kristy sy ho mpitantana ireo tsiambaratelo momba an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny hany takîna amin’ny mpitantana dia ny ho hita fa olona mahatoky. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha izaho dia tsy mampaninona ahy velively na hotsarainareo, na handia fitsaran’olombelona; fa na ny mitsara ny tenako aza tsy ataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy manome tsiny ahy velively ny eritreritro, nefa tsy mahamarina ahy izany fa ny Tompo no mpitsara ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noho izany, aza mitsara olona alohan’ny fotoana, dia mandra-piavin’ny Tompo: Izy no hampiharihary ireo zavatra afenina anatin’ny maizina sy hampiseho ireo hevitry ny fon’ny olombelona. Ka amin’izay dia samy homen’Andriamanitra ny dera tandrify azy avy ny tsirairay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ry havako, nampihariko tamin’ny tenako sy tamin’i Apôlao izany zavatra izany, noho ny aminareo. Ka dia ny tenanay roa lahy no hianaranareo ny dikan’ilay ohabolana hoe: «Aza mihoatra ny faritra izay efa voasoratra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aza mihoatra... voasoratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maizina ny teny ao amin’ny rijan-teny grika fototra, ary ny dkt koa tsy tena azo antoka.
    marker-yv: yv-n
  - type: text
    text: '.» Aoka ianareo tsy hirehareha miandany amin’olona anankiray ka hanabanty anankiray hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza moa no nanondrotra anao ho ambonin’ny sasany? Inona no anananao ka tsy noraisinao tamin’Andriamanitra? Ary raha nandray tamin’Andriamanitra ianao, nahoana no dia mirehareha hoatra ny tsy nandray?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa tapi-java-nirina ianareo, efa manankarena, tonga mpanjaka, saingy toa tsy noho ny nataonay! Satriko ho tonga mpanjaka tokoa ianareo, mba hiarahanay manjaka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noheveriko fa izahay apôstôly dia nasehon’Andriamanitra ho olona faraidiny mihitsy: mova tsy olona voaheloko ho faty ampahibemaso ka natao ho fizàhan’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' na olona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izahay moa adala noho ny amin’i Kristy, fa ianareo kosa hendry satria tafaray amin’i Kristy; izahay osa, fa ianareo kosa matanjaka; izahay tsy misy hajany, fa ianareo kosa heni-boninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mandraka ankehitriny, dia mijalin’ny hanoanana sy hetaheta izahay; tsy manan-kitafy, velesina, tsy manana antom-ponenana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miasa mafy izahay mba hahavita tena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 18.3.
    marker-yv: yv-n
  - type: text
    text: '; raha ozonin’olona, dia mirary soa; raha enjehina, dia miaritra; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: raha endrikendrehina, dia mamaly teny malefaka. Mova tsy tonga fakofakon’izao tontolo izao sy faraidin’ny olona rehetra izahay, mandraka ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy ny hanome henatra anareo no anoratako izany, fa ny hananatra anareo, araka ny maha zanaka malalako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na dia miisa iray alina aza ny mpanabe anareo amin’izao maha kristianina anareo izao, dia tsy maro ray tsy akory ianareo: izaho no rainareo ka nahatonga anareo ho tafaray amin’i Kristy Jesoa tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa miangavy anareo aho: manahafa ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany, dia alefako atỳ aminareo i Timôty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Timôty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 16.1.
    marker-yv: yv-n
  - type: text
    text: ', zanaka malalako sady mahatoky amin’ny fanompoana ny Tompo. Izy no hampahatsiaro anareo ireo lalana nodiaviko nahatafaray ahy amin’i Kristy Jesoa, araka izay ampianariko amin’ny Fiangonana rehetra hatraiza hatraiza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nisy manko taminareo nirehareha hoatra ny tsy ho tonga hitsidika anareo iny aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa ho avy faingana hitsidika anareo aho, raha sitrapon’ny Tompo; ary tsy izay tenin’ireo mpirehareha no hofantariko fa izay zavatra vitany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ' dia tsy teny foana fa hery mahavita zavatra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ka asa izay tianareo: ho avy hitsidika anareo aho, ka tsorakazo ve no hoentiko sa fo feno fitiavana sy fahalemem-panahy?'
