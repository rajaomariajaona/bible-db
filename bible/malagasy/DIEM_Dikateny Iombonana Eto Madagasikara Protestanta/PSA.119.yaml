      text: no nanorenanao any an-danitra ny teninao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha maninona ny tanora no hadio toetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitandrina ny teninao.
  '90':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '90'
    - type: text
      text: Mahatoky Ianao, amin’ny taona mifandimby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naorinao ny tany ka mitoetra mafy.
  '91':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '91'
    - type: text
      text: Mandraka androany, araka ny fitsipikao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mbola eo ny tontolo satria mpanomponao.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '92'
    - type: text
      text: Raha tsy ny lalànanao no firavoako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay aho efa matin’ny fahoriana.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '93'
    - type: text
      text: Tsy hohadinoiko mandrakizay ny fepetranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay namelomanao ny aiko.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '94'
    - type: text
      text: Fanananao aho ka vonjeo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mikatsaka ny fepetranao.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '95'
    - type: text
      text: Mikendry hamely ahy ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny baikonao no hadihadîko.
  '96':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '96'
    - type: text
      text: Izay toa lavorary dia nahitako fetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny didinao no tena midadasika.
  - type: usfm
    marker: sp
    children:
    - type: text
