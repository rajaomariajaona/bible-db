document_id: PSA.119,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Lalina sy mahavariana ny lalànan’Andriamanitra
  - type: heading
    content: ALEFA
  - type: text
    content: Sambatra
  - type: note
    content: 'Jereo Sal 9.2 sy nta. Salamo araka ny abidỳ ny Sal 119 ka isaky ny and valo no miova ny tarehin-tsoratra fanombohana ny and. Anatin’ny and tsirairay kosa dia ampiasana voambolana mitovitovy hevitra amin’ny didin’ny Tompo: lalàna, baiko, fitsaràna, fepetra, hafatra, teny, lalana, sori-dalana, fampanantenana, toky nomena.'
  - type: text
    content: ny mahitsy fitondrantena,
  - type: text
    content: 'dia izay manaraka ny '
  - type: text
    content: lalànan
  - type: text
    content: ’ny TOMPO.
  '10':
  - type: text
    content: Amin’ny foko manontolo no itadiavako Anao,
  - type: text
    content: koa aza avela handao ny didinao aho.
  '100':
  - type: text
    content: Mahira-tsaina noho ny zokiolona aho,
  - type: text
    content: satria ny fepetranao no arahiko.
  '101':
  - type: text
    content: Tsy nisy nekeko ny sori-dalàn’ny faharatsiana
  - type: text
    content: mba hitandremako ny teninao.
  '102':
  - type: text
    content: Tsy mba miala amin’ny fitsipikao aho,
  - type: text
    content: fa Ianao dia Ianao no mampianatra ahy.
  '103':
  - type: text
    content: Mamy tokoa amiko ny hafatrao,
  - type: text
    content: eny, manoatra noho ny tantely aza.
  '104':
  - type: text
    content: Ny fepetranao mampahira-tsaina ahy;
  - type: text
    content: koa hàlako rehefa mety ho soritra mamitaka.
  - type: heading
    content: NONA
  '105':
  - type: text
    content: Fanilon’ny diako ny teninao
  - type: text
    content: sy fanazavana ny làlan-kizorako.
  '106':
  - type: text
    content: Hamafisiko ny velirano izay nataoko,
  - type: text
    content: dia ny hitandrina ny fitsipikao ara-drariny.
  '107':
  - type: text
    content: 'Mijaly tsy eran’ny aina aho, TOMPO ô:'
  - type: text
    content: mba velomy indray araka ny fampanantenànao.
  '108':
  - type: text
    content: Mba raiso ny tonom-bavaka atolotro Anao
  - type: note
    content: Heverina ho fanatitra atolotra an’Andriamanitra ny vavaka; jereo Sal 50.14; 51.19.
  - type: text
    content: ':'
  - type: text
    content: TOMPO ô, ampianaro ahy ny fitsipikao.
  '109':
  - type: text
    content: Hatenda lalandava izao ny aiko,
  - type: text
    content: nefa tsy hadinoko ny lalànanao.
  '11':
  - type: text
    content: Raketiko ato am-poko ny hafatrao
  - type: text
    content: mba tsy hanotako aminao.
  '110':
  - type: text
    content: Ny olon-dratsy mitady hamandrika ahy,
  - type: text
    content: fa izaho tsy mihataka amin’ny fepetranao.
  '111':
  - type: text
    content: 'Ny baikonao no fananako mandrakizay:'
  - type: text
    content: ireo no fifalifalian’ny foko.
  '112':
  - type: text
    content: Aronako hanao ny lalànanao ny foko,
  - type: text
    content: hatramin’ny antsipiriany ary mandrakizay.
  - type: heading
    content: SAMEKA
  '113':
  - type: text
    content: Hàlako ny olona miroa saina,
  - type: text
    content: fa ny lalànanao kosa no tiako.
  '114':
  - type: text
    content: Ianao no fiereko sy ampingako;
  - type: text
    content: ny teninao no antenaiko.
  '115':
  - type: text
    content: Mialà amiko, ianareo mpanao ratsy,
  - type: text
    content: hanarahako ny didin’Andriamanitra.
  '116':
  - type: text
    content: Tohàny araka ny fampanantenànao aho ho velona;
  - type: text
    content: aoka tsy hataonao diso fanantenana!
  '117':
  - type: text
    content: Tohàny hatrany aho mba ho voavonjy;
  - type: text
    content: ny lalànanao no firavoako lalandava.
  '118':
  - type: text
    content: Izay rehetra miala amin’ny lalànanao aetrinao,
  - type: text
    content: satria ny lainga no teti-dratsy ao an-tsainy.
  '119':
  - type: text
    content: 'Ny olon-dratsy eran-tany taim-by fanarinao:'
  - type: text
    content: izany no itiavako ny baikonao.
  '12':
  - type: text
    content: Hisaorana anie Ianao, TOMPO ô!
  - type: text
    content: Ampianaro ahy ny lalànanao.
  '120':
  - type: text
    content: Mihorohoro ny nofoko noho ny aminao,
  - type: text
    content: fa atahorako tokoa ny fitsipikao.
  - type: heading
    content: HAINA
  '121':
  - type: text
    content: Ny rariny sy hitsiny no ataoko;
  - type: text
    content: aza atolotra ny mpampahory aho.
  '122':
  - type: text
    content: Porofoy fa mahasoa ahy mpanomponao izany;
  - type: text
    content: aoka aho tsy hampahorîn’ny mpirehareha!
  '123':
  - type: text
    content: Ny masoko valalanina miandry ny famonjenao
  - type: text
    content: sy ny fanafahana izay nampanantenainao.
  '124':
  - type: text
    content: 'Ny fitiavanao itondrana ahy mpanomponao:'
  - type: text
    content: koa ampianaro ny lalànanao aho.
  '125':
  - type: text
    content: Mpanomponao aho ka mba ataovy mahira-tsaina
  - type: text
    content: hahafantarako ny baikonao.
  '126':
  - type: text
    content: Izao no fotoana mety hihetsehanao, TOMPO ô,
  - type: text
    content: fa dikain’ny olona ny lalànanao.
  '127':
  - type: text
    content: Izany no itiavako ny didinao
  - type: text
    content: manoatra ny volamena madio indrindra.
  '128':
  - type: text
    content: Izany no ifidianako ny fepetranao
  - type: text
    content: sy ankahalàko izay mety ho soritra mamitaka.
  - type: heading
    content: PE
  '129':
  - type: text
    content: Mahagaga ny baikonao,
  - type: text
    content: ka izany no anarahako azy.
  '13':
  - type: text
    content: Tanisain’ny molotro avokoa
  - type: text
    content: ny fitsipika naloaky ny vavanao.
  '130':
  - type: text
    content: Manazava tokoa ny fahitana ny teninao
  - type: text
    content: ary mampahira-tsaina ny olon-tsotra.
  '131':
  - type: text
    content: 'Mitanatana vava, mihanahana aho:'
  - type: text
    content: ny didinao no mahaliana ahy.
  '132':
  - type: text
    content: Mba todiho aho ka iantrao,
  - type: text
    content: araka ny tinapakao ho an’ireo mpitia Anao.
  '133':
  - type: text
    content: Hamafiso ho amin’ny hafatrao ny diako;
  - type: text
    content: aoka aho tsy hanjakam-paharatsiana!
  '134':
  - type: text
    content: Afaho amin’ny mpampahory aho
  - type: text
    content: mba hitandremako ny fepetranao.
  '135':
  - type: text
    content: 'Jereo amin-kamorampo izaho mpanomponao:'
  - type: text
    content: ampianaro ahy ny lalànanao.
  '136':
  - type: text
    content: Izaho dia mamarin-dranomaso,
  - type: text
    content: satria tsy voatandrina ny lalànanao.
  - type: heading
    content: TSADE
  '137':
  - type: text
    content: Mandala ny rariny Ianao, TOMPO ô,
  - type: text
    content: ary mahitsy ny fitsipikao.
  '138':
  - type: text
    content: Ny baikonao dia ara-drariny
  - type: text
    content: sy azo antoka tokoa.
  '139':
  - type: text
    content: Mandoro ahy toy ny afo ny zotompoko,
  - type: text
    content: fa hadinon’ny mpandrafy ahy ny teninao.
  '14':
  - type: text
    content: Ny mizotra araka ny baikonao
  - type: text
    content: no mahafaly ahy noho izay harena.
  '140':
  - type: text
    content: Voasedra tanaty memy tokoa ny hafatrao,
  - type: text
    content: ka dia tia azy ireny izaho mpanomponao.
  '141':
  - type: text
    content: Kely sady mavomavo aho,
  - type: text
    content: nefa tsy hadinoko ny fepetranao.
  '142':
  - type: text
    content: Mahitsy mandrakizay ny fahitsianao
  - type: text
    content: ary mahatoky ny lalànanao.
  '143':
  - type: text
    content: Azon’ny fahoriana sy ny fahaterena aho,
  - type: text
    content: nefa mbola miravo amin’ny didinao.
  '144':
  - type: text
    content: Mahitsy mandrakizay ny baikonao;
  - type: text
    content: ataovy mahira-tsaina aho mba ho velona.
  - type: heading
    content: KÔFA
  '145':
  - type: text
    content: Miantso amin’ny foko manontolo aho ka valio
  - type: text
    content: mba hanarahako ny lalànanao, TOMPO ô.
  '146':
  - type: text
    content: Miantso Anao aho ka vonjeo
  - type: text
    content: hitandremako ny baikonao.
  '147':
  - type: text
    content: Mialoha ny mazavatsinanana aho mitalaho
  - type: text
    content: ary dia miandry ny teninao.
  '148':
  - type: text
    content: Mialoha ny besinimaro aho no nifoha
  - type: text
    content: mba hisaintsaina ny hafatrao.
  '149':
  - type: text
    content: Henoy ny feoko araka ny fitiavanao;
  - type: text
    content: TOMPO ô, velomy araka ny fitsipikao aho.
  '15':
  - type: text
    content: Ny fepetranao hosaintsainiko,
  - type: text
    content: ny sori-dàlanao hodinihiko;
  '150':
  - type: text
    content: Ireo mpanenjika ahy manatona heloka;
  - type: text
    content: ny lalànanao kosa halaviriny.
  '151':
  - type: text
    content: Akaiky ahy Ianao, TOMPO ô,
  - type: text
    content: ary mahatoky avokoa ny didinao.
  '152':
  - type: text
    content: Ny baikonao dia fantatro hatry ny ela
  - type: text
    content: fa naorinao ho mandrakizay.
  - type: heading
    content: RESA
  '153':
  - type: text
    content: Jereo ny fahoriako, ka afaho aho,
  - type: text
    content: fa ny lalànanao tsy hadinoiko.
  '154':
  - type: text
    content: Iandraiketo ny adiko ka avoty aho
  - type: text
    content: ary velomy araka ny fampanantenànao.
  '155':
  - type: text
    content: Lavitra ny olon-dratsy ny famonjena,
  - type: text
    content: satria tsy ny lalànanao no katsahiny.
  '156':
  - type: text
    content: Lehibe ny indrafonao, TOMPO ô;
  - type: text
    content: velomy aho araka ny fitsipikao.
  '157':
  - type: text
    content: Maro ny mpanenjika sy mpandrafy ahy;
  - type: text
    content: ny baikonao tsy mba ialako.
  '158':
  - type: text
    content: Nahita mpivadika aho, ka narikoriko;
  - type: text
    content: ny hafatrao tsy mba tandremany.
  '159':
  - type: text
    content: Jereo fa mankamamy ny fepetranao aho,
  - type: text
    content: ka velomy araka ny fitiavanao, TOMPO ô.
  '16':
  - type: text
    content: ny lalànanao firavoako,
  - type: text
    content: ny teninao fitadîdiko.
  - type: heading
    content: GIMELA
  '160':
  - type: text
    content: Ny toetra mahatoky no mivohitra amin’ny teninao;
  - type: text
    content: ny fitsipikao dia ara-drariny avokoa sy mandrakizay.
  - type: heading
    content: SINA
  '161':
  - type: text
    content: Enjehin’andriana tsy amin’antony aho;
  - type: text
    content: ny teninao ihany no atahoran’ny foko.
  '162':
  - type: text
    content: Ny hafatrao no mahafaly ahy
  - type: text
    content: tahaka ny mahazo remby sesehena.
  '163':
  - type: text
    content: Hàlako ary maharikoriko ahy ny fitaka,
  - type: text
    content: fa ny lalànanao no ankamamîko.
  '164':
  - type: text
    content: Impito isan’andro no iderako Anao
  - type: text
    content: noho ny fitsipikao ara-drariny.
  '165':
  - type: text
    content: Fiadanam-be ny an’izay mankamamy ny lalànanao,
  - type: text
    content: ary tsy misy zavatra mahasolafaka azy.
  '166':
  - type: text
    content: Ny famonjenao, TOMPO ô, no antenaiko
  - type: text
    content: ka ny didinao no tanterahiko.
  '167':
  - type: text
    content: Ny baikonao dia tandremako,
  - type: text
    content: satria ankamamîko aoka izany.
  '168':
  - type: text
    content: Eny, voatandriko ny fepetra amam-baikonao;
  - type: text
    content: eo anoloanao ny làlan-kalehako rehetra.
  - type: heading
    content: TAO
  '169':
  - type: text
    content: Aoka ho tonga eo anoloanao ny tarainako, TOMPO ô!
  - type: text
    content: Ataovy mahira-tsaina aho araka ny fampanantenànao.
  '17':
  - type: text
    content: Asio soa aho mpanomponao
  - type: text
    content: ho velona sy hitandrina ny teninao.
  '170':
  - type: text
    content: Ny fihantàko anie ho tody eo anatrehanao;
  - type: text
    content: mba afaho aho araka ny toky nomenao.
  '171':
  - type: text
    content: Hidera Anao anie ny molotro,
  - type: text
    content: satria nampianarinao ahy ny lalànanao!
  '172':
  - type: text
    content: Hanambara ny hafatrao anie ny lelako,
  - type: text
    content: satria rariny avokoa ny didinao!
  '173':
  - type: text
    content: Ny fiarovanao anie hanampy ahy,
  - type: text
    content: satria ny fepetranao no nofidiko!
  '174':
  - type: text
    content: Mahaliana ahy, TOMPO ô, ny famonjenao;
  - type: text
    content: ary ny lalànanao no firavoako.
  '175':
  - type: text
    content: Veloma anie ny aiko hiderako Anao;
  - type: text
    content: ary hanampy ahy anie ny fitsipikao!
  '176':
  - type: text
    content: ' '
  - type: text
    content: Ondry
  - type: text
    content: ' nania izaho mpanomponao ka tadiavo;'
  - type: text
    content: fa ny didinao tsy mba hadinoiko.
  '18':
  - type: text
    content: Ampahirato ny masoko hahita
  - type: text
    content: ny zava-mahagaga amin’ny lalànanao.
  '19':
  - type: text
    content: Vahiny eto an-tany aho;
  - type: text
    content: aza afenina ahy ny didinao.
  '2':
  - type: text
    content: Sambatra izay mitandrina ny baikony,
  - type: text
    content: ka mitady Azy amin’ny fony manontolo.
  '20':
  - type: text
    content: Matimaty erỳ aho maniry
  - type: text
    content: ny fitsipikao amin’ny fotoan-drehetra.
  '21':
  - type: text
    content: Rahonanao ny mpirehareha voaozona,
  - type: text
    content: izay mandao ny didinao.
  '22':
  - type: text
    content: Alao amin’ny fahafaham-baràka sy ny fanamavoana aho,
  - type: text
    content: satria manaraka ny baikonao.
  '23':
  - type: text
    content: Na andriana aza no mioko hamely ahy,
  - type: text
    content: izaho mpanomponao misaintsaina ny lalànanao.
  '24':
  - type: text
    content: 'Ny baikonao no firavoako:'
  - type: text
    content: ireo no manolo-tsaina ahy.
  - type: heading
    content: DALETA
  '25':
  - type: text
    content: Mihohoka amin’ny vovoka ny tenako,
  - type: text
    content: ka velomy indray araka ny fampanantenànao.
  '26':
  - type: text
    content: Nitanisako ny fiainako Ianao ka namaly ahy;
  - type: text
    content: ampianaro ahy ny lalànanao.
  '27':
  - type: text
    content: Ampahafantaro ahy ny fepetranao ho sori-dàlako
  - type: text
    content: mba hisaintsainako ny asa mahagaga nataonao.
  '28':
  - type: text
    content: Patrapatraka ny ranomasoko noho ny alahelo;
  - type: text
    content: areno aho araka ny fampanantenànao.
  '29':
  - type: text
    content: Halaviro ahy rehefa mety ho soritra mamitaka;
  - type: text
    content: ny lalànanao no aoka hanenika ahy!
  '3':
  - type: text
    content: Eny, tsy mba manao ratsy ireo
  - type: text
    content: fa manaraka ny sori-dalan’Andriamanitra.
  '30':
  - type: text
    content: Nofidiko ho sori-dàlako ny firaiketam-po aminao;
  - type: text
    content: nataoko teo anatrehako ny fitsipikao.
  '31':
  - type: text
    content: Ny baikonao no ifikirako;
  - type: text
    content: TOMPO ô, aza avela ho azon-kenatra aho.
  '32':
  - type: text
    content: Ny didinao no sori-dalana ihazakazahako,
  - type: text
    content: satria nosokafanao ny saiko.
  - type: heading
    content: HE
  '33':
  - type: text
    content: TOMPO ô, atoroy ahy ny lalànanao ho sori-dàlako
  - type: text
    content: mba hanarahako azy hatramin’ny farany.
  '34':
  - type: text
    content: Ataovy mahira-tsaina aho hanarahako ny lalànanao,
  - type: text
    content: sy hitandremako azy amin’ny foko manontolo.
  '35':
  - type: text
    content: Ampizory amin’ny sori-dàlan’ny didinao aho,
  - type: text
    content: satria izany no fahafinaretako.
  '36':
  - type: text
    content: Ampirony amin’ny baikonao ny foko
  - type: text
    content: fa tsy amin’ny fitiavan-karena.
  '37':
  - type: text
    content: Avilio ny masoko tsy hijery zava-poana;
  - type: text
    content: velomy amin’ny sori-dàlanao aho.
  '38':
  - type: text
    content: Tovy amin’ny mpanomponao ny hafatrao
  - type: text
    content: izay nataonao ho an’ny mpanaja Anao.
  '39':
  - type: text
    content: Halaviro ahy ny fahafaham-baràka atahorako,
  - type: text
    content: satria tsara ny fitsipikao.
  '4':
  - type: text
    content: Ianao namoaka ny fepetranao, Tompo ô,
  - type: text
    content: mba hotandremana fatratra.
  '40':
  - type: text
    content: Indro maniry ny fepetranao aho,
  - type: text
    content: koa velomy ao amin’ny fahamarinanao.
  - type: heading
    content: VAO
  '41':
  - type: text
    content: Ho tonga amiko anie, TOMPO ô, ny mari-pitiavanao,
  - type: text
    content: dia ny famonjenao araka ny toky nomenao!
  '42':
  - type: text
    content: Ny mpanala baràka ahy ho voavaliko,
  - type: text
    content: satria ny teninao no itokiako.
  '43':
  - type: text
    content: Ny zava-marim-pototra aza avela hivadihako,
  - type: text
    content: satria ny fitsipikao no antenaiko.
  '44':
  - type: text
    content: Ny lalànanao tiako hotandremana lalandava
  - type: text
    content: ka ho mandrakizay mandrakizay.
  '45':
  - type: text
    content: Hizotra amin-kalalahana aho,
  - type: text
    content: fa ny fepetranao no katsahiko.
  '46':
  - type: text
    content: Ny baikonao no holazaiko
  - type: text
    content: tsy amin-kenatra eo anatrehan’ny mpanjaka.
  '47':
  - type: text
    content: Ny didinao no iravoako
  - type: text
    content: ary ankamamîko fatratra.
  '48':
  - type: text
    content: Hanandra-tanana hivavaka aminao aho
  - type: note
    content: Ny manandra-tanana dia fihetsika fanao am-bavaka, jereo Sal 28.2. sy nta.
  - type: text
    content: ','
  - type: text
    content: ka ny lalànanao no hosaintsainiko.
  - type: heading
    content: ZAINA
  '49':
  - type: text
    content: Tsarovy ny teninao tamiko mpanomponao,
  - type: text
    content: dia ilay teny nataonao ho fitokiako.
  '5':
  - type: text
    content: Enga anie ny fitondrantenako ho matotra
  - type: text
    content: amin’ny fitandremana ny lalànanao;
  '50':
  - type: text
    content: Hany fiononako amin’ny fahoriako izany,
  - type: text
    content: satria ny hafatrao no mamelona ahy.
  '51':
  - type: text
    content: Lalina raha haneso ahy ny mpirehareha
  - type: text
    content: fa izaho tsy mivoana amin’ny lalànanao.
  '52':
  - type: text
    content: Ny fitsipikao hatrizay, TOMPO ô,
  - type: text
    content: no tsaroako ka ahazoako fiononana.
  '53':
  - type: text
    content: Entanin’ny fahatezerana mafy aho
  - type: text
    content: fa mandao ny lalànanao ny olon-dratsy.
  '54':
  - type: text
    content: Ny lalànanao no ataoko fihira
  - type: text
    content: ao an-trano ivahiniako
  - type: note
    content: Jereo and 19. Ny toerana ivahiniana dia ity tany fandalovana ity.
  - type: text
    content: .
  '55':
  - type: text
    content: Tsaroako mandraka alina Ianao, TOMPO ô,
  - type: text
    content: mba hitandremako ny lalànanao.
  '56':
  - type: text
    content: 'Izao no hany fananako:'
  - type: text
    content: ny manaraka ny fepetranao.
  - type: heading
    content: HETA
  '57':
  - type: text
    content: Ny anjarako, TOMPO ô, hoy aho,
  - type: text
    content: dia ny mitandrina ny teninao.
  '58':
  - type: text
    content: Ny foko manontolo no italahoako aminao,
  - type: text
    content: koa iantrao aho araka ny toky nomenao.
  '59':
  - type: text
    content: Mandinika ny fitondrantenako aho,
  - type: text
    content: ka manitsy dia amin’ny fitsipikao.
  '6':
  - type: text
    content: dia tsy ho menatra aho
  - type: text
    content: mandinika ny didinao rehetra.
  '60':
  - type: text
    content: Dodona aho fa tsy mitaredretra
  - type: text
    content: amin’ny fitandremana ny didinao.
  '61':
  - type: text
    content: Voan’ny fandriky ny olon-dratsy aho,
  - type: text
    content: nefa tsy manadino ny lalànanao.
  '62':
  - type: text
    content: Mifoha mamatonalina aho hidera Anao
  - type: text
    content: noho ny fitsipikao ara-drariny.
  '63':
  - type: text
    content: Ihavanako avokoa izay manaja Anao
  - type: text
    content: sy izay mitandrina ny fepetranao.
  '64':
  - type: text
    content: Ny fitiavanao, TOMPO ô, manenika ny tany;
  - type: text
    content: ampianaro ahy ny lalànanao.
  - type: heading
    content: TETA
  '65':
  - type: text
    content: Efa nasianao soa izaho mpanomponao,
  - type: text
    content: dia araka ny fampanantenànao, TOMPO ô.
  '66':
  - type: text
    content: Ampianaro hahafantatra sy hahalala aho,
  - type: text
    content: satria azoko antoka ny didinao.
  '67':
  - type: text
    content: Naniasia aho fony tsy mbola azom-pahoriana,
  - type: text
    content: fa ankehitriny tandremako ny hafatrao.
  '68':
  - type: text
    content: 'Soa Ianao, Tompo ô, sady mpanisy soa:'
  - type: text
    content: ampianaro ahy ny lalànanao.
  '69':
  - type: text
    content: Mamoron-dainga hamelezana ahy ny mpirehareha;
  - type: text
    content: amin’ny foko manontolo no anarahako ny fepetranao.
  '7':
  - type: text
    content: Hidera Anao amin-kitsimpo aho
  - type: text
    content: mianatra ny fitsarana ara-drariny navoakanao.
  '70':
  - type: text
    content: Donto velona ny sain’ireo,
  - type: text
    content: fa izaho miravo amin’ny lalànanao.
  '71':
  - type: text
    content: Nahasoa ahy ny azom-pahoriana
  - type: text
    content: mba hianarako ny lalànanao.
  '72':
  - type: text
    content: Aleoko ny lalàna naloaky ny vavanao
  - type: text
    content: toy izay ny volamena amam-bolafotsy miavosa.
  - type: heading
    content: JODA
  '73':
  - type: text
    content: 'Nanao sy namboatra ahy ny tananao:'
  - type: text
    content: ataovy mahira-tsaina aho hianarako ny didinao.
  '74':
  - type: text
    content: Hifaly mahita ahy ireo manaja Anao,
  - type: text
    content: satria ny teninao no antenaiko.
  '75':
  - type: text
    content: Ny fitsipikao, TOMPO ô, fantatro fa rariny;
  - type: text
    content: ka marim-pototra ny nampahorianao ahy.
  '76':
  - type: text
    content: Hampionona ahy anie ny fitiavanao,
  - type: text
    content: araka ny hafatrao tamiko mpanomponao!
  '77':
  - type: text
    content: Ho tonga ato amiko anie ny indrafonao ka hamelona ahy,
  - type: text
    content: satria ny lalànanao no firavoako!
  '78':
  - type: text
    content: Aoka ho menatra ny mpirehareha
  - type: text
    content: mampahory tsy amin’antony,
  - type: text
    content: fa izaho misaintsaina ny fepetranao!
  '79':
  - type: text
    content: Hitodika amiko anie ireo manaja Anao,
  - type: text
    content: mba hahafantarany ny baikonao!
  '8':
  - type: text
    content: Ny lalànanao no tiako hotandremana,
  - type: text
    content: koa aza afoinao na oviana na oviana aho.
  - type: heading
    content: BETA
  '80':
  - type: text
    content: Ny foko manontolo anie hifikitra amin’ny lalànanao,
  - type: text
    content: dia tsy ho rakotry ny henatra mihitsy aho!
  - type: heading
    content: KAFA
  '81':
  - type: text
    content: 'Reraka aho maniry ny famonjenao:'
  - type: text
    content: ny teninao no antenaiko.
  '82':
  - type: text
    content: Valalanina ny masoko miandry ny hafatrao;
  - type: text
    content: rahoviana no hampiononanao ahy?
  '83':
  - type: text
    content: Zary *siny hoditra mainan’ny setroka aho,
  - type: text
    content: kanefa tsy hadinoko ny lalànanao.
  '84':
  - type: text
    content: Hiaritra ela toy izao foana ve izaho mpanomponao?
  - type: text
    content: Rahoviana ny mpanenjika ahy no hotsarainao?
  '85':
  - type: text
    content: Mihady longoa hianjerako ny mpirehareha;
  - type: text
    content: tsy raharahainy akory izay lalànanao.
  '86':
  - type: text
    content: Azo antoka avokoa ny didinao;
  - type: text
    content: vonjeo aho fa enjehina tsy amin’antony.
  '87':
  - type: text
    content: Kely sisa dia levona eto an-tany aho,
  - type: text
    content: kanefa tsy mba nafoiko ny fepetranao.
  '88':
  - type: text
    content: Noho ny fitiavanao, mba velomy aho
  - type: text
    content: hitandremako ny baiko naloaky ny vavanao.
  - type: heading
    content: LAMEDA
  '89':
  - type: text
    content: Maharitra mandrakizay, TOMPO ô,
  - type: text
    content: no nanorenanao any an-danitra ny teninao.
  '9':
  - type: text
    content: Raha maninona ny tanora no hadio toetra?
  - type: text
    content: Raha mitandrina ny teninao.
  '90':
  - type: text
    content: Mahatoky Ianao, amin’ny taona mifandimby;
  - type: text
    content: Naorinao ny tany ka mitoetra mafy.
  '91':
  - type: text
    content: Mandraka androany, araka ny fitsipikao,
  - type: text
    content: dia mbola eo ny tontolo satria mpanomponao.
  '92':
  - type: text
    content: Raha tsy ny lalànanao no firavoako,
  - type: text
    content: toy izay aho efa matin’ny fahoriana.
  '93':
  - type: text
    content: Tsy hohadinoiko mandrakizay ny fepetranao
  - type: text
    content: izay namelomanao ny aiko.
  '94':
  - type: text
    content: Fanananao aho ka vonjeo,
  - type: text
    content: satria mikatsaka ny fepetranao.
  '95':
  - type: text
    content: Mikendry hamely ahy ny olon-dratsy,
  - type: text
    content: satria ny baikonao no hadihadîko.
  '96':
  - type: text
    content: Izay toa lavorary dia nahitako fetra;
  - type: text
    content: ny didinao no tena midadasika.
  - type: heading
    content: MEMA
  '97':
  - type: text
    content: Endrey ny fitiavako ny lalànanao;
  - type: text
    content: tontolo andro dia izy no saintsainiko.
  '98':
  - type: text
    content: Ny didinao, izay fananako mandrakizay,
  - type: text
    content: dia mahatonga ahy ho hendry noho ny fahavaloko.
  '99':
  - type: text
    content: Hendry noho ny mpampianatra ahy rehetra aho,
  - type: text
    content: satria misaintsaina ny baikonao.
