  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsara ny fitsipikao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
