    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '97'
    - type: text
      text: Endrey ny fitiavako ny lalànanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tontolo andro dia izy no saintsainiko.
  '98':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '98'
    - type: text
      text: Ny didinao, izay fananako mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mahatonga ahy ho hendry noho ny fahavaloko.
  '99':
