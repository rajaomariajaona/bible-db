document_id: PSA.119,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'SALAMO Lalina sy mahavariana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: ’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: ALEFA
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sambatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo Sal 9.2 sy nta. Salamo araka ny abidỳ ny Sal 119 ka isaky ny and valo no miova ny tarehin-tsoratra fanombohana ny and. Anatin’ny and tsirairay kosa dia ampiasana voambolana mitovitovy hevitra amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'didin’ny Tompo: lalàna, baiko, fitsaràna, fepetra, hafatra, teny, lalana, sori-dalana, fampanantenana, toky nomena.'
      marker-yv: yv-n
    - type: text
      text: ny mahitsy fitondrantena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia izay manaraka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: ’ny TOMPO.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Amin’ny foko manontolo no itadiavako Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa aza avela handao ny didinao aho.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: Mahira-tsaina noho ny zokiolona aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny fepetranao no arahiko.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: Tsy nisy nekeko ny sori-dalàn’ny faharatsiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitandremako ny teninao.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: Tsy mba miala amin’ny fitsipikao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao dia Ianao no mampianatra ahy.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: Mamy tokoa amiko ny hafatrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, manoatra noho ny tantely aza.
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: Ny fepetranao mampahira-tsaina ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa hàlako rehefa mety ho soritra mamitaka.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: NONA
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: Fanilon’ny diako ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy fanazavana ny làlan-kizorako.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: Hamafisiko ny velirano izay nataoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny hitandrina ny fitsipikao ara-drariny.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: 'Mijaly tsy eran’ny aina aho, TOMPO ô:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba velomy indray araka ny fampanantenànao.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: Mba raiso ny tonom-bavaka atolotro Anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.108 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heverina ho fanatitra atolotra an’Andriamanitra ny vavaka; jereo Sal 50.14; 51.19.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, ampianaro ahy ny fitsipikao.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: Hatenda lalandava izao ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hadinoko ny lalànanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raketiko ato am-poko ny hafatrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy hanotako aminao.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: Ny olon-dratsy mitady hamandrika ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho tsy mihataka amin’ny fepetranao.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: 'Ny baikonao no fananako mandrakizay:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo no fifalifalian’ny foko.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: Aronako hanao ny lalànanao ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny antsipiriany ary mandrakizay.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: SAMEKA
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: Hàlako ny olona miroa saina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalànanao kosa no tiako.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: Ianao no fiereko sy ampingako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teninao no antenaiko.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: Mialà amiko, ianareo mpanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanarahako ny didin’Andriamanitra.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: Tohàny araka ny fampanantenànao aho ho velona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy hataonao diso fanantenana!
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: Tohàny hatrany aho mba ho voavonjy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lalànanao no firavoako lalandava.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: Izay rehetra miala amin’ny lalànanao aetrinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny lainga no teti-dratsy ao an-tsainy.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: 'Ny olon-dratsy eran-tany taim-by fanarinao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no itiavako ny baikonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hisaorana anie Ianao, TOMPO ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampianaro ahy ny lalànanao.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: Mihorohoro ny nofoko noho ny aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa atahorako tokoa ny fitsipikao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: HAINA
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: Ny rariny sy hitsiny no ataoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza atolotra ny mpampahory aho.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: Porofoy fa mahasoa ahy mpanomponao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka aho tsy hampahorîn’ny mpirehareha!
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: Ny masoko valalanina miandry ny famonjenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fanafahana izay nampanantenainao.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: 'Ny fitiavanao itondrana ahy mpanomponao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ampianaro ny lalànanao aho.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: Mpanomponao aho ka mba ataovy mahira-tsaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahafantarako ny baikonao.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: Izao no fotoana mety hihetsehanao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa dikain’ny olona ny lalànanao.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: Izany no itiavako ny didinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manoatra ny volamena madio indrindra.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: Izany no ifidianako ny fepetranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ankahalàko izay mety ho soritra mamitaka.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: PE
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: Mahagaga ny baikonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no anarahako azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tanisain’ny molotro avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fitsipika naloaky ny vavanao.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: Manazava tokoa ny fahitana ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampahira-tsaina ny olon-tsotra.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: 'Mitanatana vava, mihanahana aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny didinao no mahaliana ahy.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Mba todiho aho ka iantrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny tinapakao ho an’ireo mpitia Anao.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: Hamafiso ho amin’ny hafatrao ny diako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka aho tsy hanjakam-paharatsiana!
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: Afaho amin’ny mpampahory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitandremako ny fepetranao.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: 'Jereo amin-kamorampo izaho mpanomponao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampianaro ahy ny lalànanao.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: Izaho dia mamarin-dranomaso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy voatandrina ny lalànanao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TSADE
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: Mandala ny rariny Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahitsy ny fitsipikao.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: Ny baikonao dia ara-drariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy azo antoka tokoa.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: Mandoro ahy toy ny afo ny zotompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hadinon’ny mpandrafy ahy ny teninao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny mizotra araka ny baikonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mahafaly ahy noho izay harena.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: Voasedra tanaty memy tokoa ny hafatrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia tia azy ireny izaho mpanomponao.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: Kely sady mavomavo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy hadinoko ny fepetranao.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: Mahitsy mandrakizay ny fahitsianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahatoky ny lalànanao.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: Azon’ny fahoriana sy ny fahaterena aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mbola miravo amin’ny didinao.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '144'
    - type: text
      text: Mahitsy mandrakizay ny baikonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataovy mahira-tsaina aho mba ho velona.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: KÔFA
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '145'
    - type: text
      text: Miantso amin’ny foko manontolo aho ka valio
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanarahako ny lalànanao, TOMPO ô.
  '146':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '146'
    - type: text
      text: Miantso Anao aho ka vonjeo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hitandremako ny baikonao.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '147'
    - type: text
      text: Mialoha ny mazavatsinanana aho mitalaho
  - type: usfm
    marker: q1
    children:
