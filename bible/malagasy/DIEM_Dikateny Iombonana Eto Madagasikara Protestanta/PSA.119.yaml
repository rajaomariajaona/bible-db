      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Avilio ny masoko tsy hijery zava-poana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: velomy amin’ny sori-dàlanao aho.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Tovy amin’ny mpanomponao ny hafatrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nataonao ho an’ny mpanaja Anao.
  '39':
