document_id: PSA.119
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'SALAMO Lalina sy mahavariana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: ’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: sp
  children:
  - type: text
    text: ALEFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sambatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Sal 9.2 sy nta. Salamo araka ny abidỳ ny Sal 119 ka isaky ny and valo no miova ny tarehin-tsoratra fanombohana ny and. Anatin’ny and tsirairay kosa dia ampiasana voambolana mitovitovy hevitra amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'didin’ny Tompo: lalàna, baiko, fitsaràna, fepetra, hafatra, teny, lalana, sori-dalana, fampanantenana, toky nomena.'
    marker-yv: yv-n
  - type: text
    text: ny mahitsy fitondrantena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia izay manaraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: ’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra izay mitandrina ny baikony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitady Azy amin’ny fony manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tsy mba manao ratsy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa manaraka ny sori-dalan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ianao namoaka ny fepetranao, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hotandremana fatratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ny fitondrantenako ho matotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fitandremana ny lalànanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia tsy ho menatra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandinika ny didinao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hidera Anao amin-kitsimpo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mianatra ny fitsarana ara-drariny navoakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny lalànanao no tiako hotandremana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza afoinao na oviana na oviana aho.
- type: usfm
  marker: sp
  children:
  - type: text
    text: BETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha maninona ny tanora no hadio toetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mitandrina ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amin’ny foko manontolo no itadiavako Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa aza avela handao ny didinao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raketiko ato am-poko ny hafatrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba tsy hanotako aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hisaorana anie Ianao, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampianaro ahy ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tanisain’ny molotro avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitsipika naloaky ny vavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny mizotra araka ny baikonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mahafaly ahy noho izay harena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fepetranao hosaintsainiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny sori-dàlanao hodinihiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ny lalànanao firavoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao fitadîdiko.
- type: usfm
  marker: sp
  children:
  - type: text
    text: GIMELA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Asio soa aho mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho velona sy hitandrina ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ampahirato ny masoko hahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zava-mahagaga amin’ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vahiny eto an-tany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza afenina ahy ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Matimaty erỳ aho maniry
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitsipikao amin’ny fotoan-drehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rahonanao ny mpirehareha voaozona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mandao ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alao amin’ny fahafaham-baràka sy ny fanamavoana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria manaraka ny baikonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Na andriana aza no mioko hamely ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izaho mpanomponao misaintsaina ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny baikonao no firavoako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo no manolo-tsaina ahy.
- type: usfm
  marker: sp
  children:
  - type: text
    text: DALETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mihohoka amin’ny vovoka ny tenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka velomy indray araka ny fampanantenànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nitanisako ny fiainako Ianao ka namaly ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ampahafantaro ahy ny fepetranao ho sori-dàlako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hisaintsainako ny asa mahagaga nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Patrapatraka ny ranomasoko noho ny alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: areno aho araka ny fampanantenànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Halaviro ahy rehefa mety ho soritra mamitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalànanao no aoka hanenika ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nofidiko ho sori-dàlako ny firaiketam-po aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nataoko teo anatrehako ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny baikonao no ifikirako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, aza avela ho azon-kenatra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny didinao no sori-dalana ihazakazahako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nosokafanao ny saiko.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: TOMPO ô, atoroy ahy ny lalànanao ho sori-dàlako
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanarahako azy hatramin’ny farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ataovy mahira-tsaina aho hanarahako ny lalànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hitandremako azy amin’ny foko manontolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ampizory amin’ny sori-dàlan’ny didinao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria izany no fahafinaretako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ampirony amin’ny baikonao ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy amin’ny fitiavan-karena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Avilio ny masoko tsy hijery zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: velomy amin’ny sori-dàlanao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tovy amin’ny mpanomponao ny hafatrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nataonao ho an’ny mpanaja Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Halaviro ahy ny fahafaham-baràka atahorako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsara ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Indro maniry ny fepetranao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa velomy ao amin’ny fahamarinanao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: VAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ho tonga amiko anie, TOMPO ô, ny mari-pitiavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny famonjenao araka ny toky nomenao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ny mpanala baràka ahy ho voavaliko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny teninao no itokiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ny zava-marim-pototra aza avela hivadihako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fitsipikao no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ny lalànanao tiako hotandremana lalandava
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho mandrakizay mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Hizotra amin-kalalahana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fepetranao no katsahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ny baikonao no holazaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy amin-kenatra eo anatrehan’ny mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ny didinao no iravoako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ankamamîko fatratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Hanandra-tanana hivavaka aminao aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119.48 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny manandra-tanana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia fihetsika fanao am-bavaka, jereo Sal 28.2. sy nta.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny lalànanao no hosaintsainiko.
- type: usfm
  marker: sp
  children:
  - type: text
    text: ZAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tsarovy ny teninao tamiko mpanomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ilay teny nataonao ho fitokiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Hany fiononako amin’ny fahoriako izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny hafatrao no mamelona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Lalina raha haneso ahy ny mpirehareha
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho tsy mivoana amin’ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ny fitsipikao hatrizay, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsaroako ka ahazoako fiononana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Entanin’ny fahatezerana mafy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mandao ny lalànanao ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Ny lalànanao no ataoko fihira
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-trano ivahiniako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo and 19. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny toerana ivahiniana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ity tany fandalovana ity.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Tsaroako mandraka alina Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitandremako ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izao no hany fananako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny manaraka ny fepetranao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Ny anjarako, TOMPO ô, hoy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny mitandrina ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ny foko manontolo no italahoako aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa iantrao aho araka ny toky nomenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Mandinika ny fitondrantenako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka manitsy dia amin’ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Dodona aho fa tsy mitaredretra
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny fitandremana ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Voan’ny fandriky ny olon-dratsy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy manadino ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Mifoha mamatonalina aho hidera Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fitsipikao ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Ihavanako avokoa izay manaja Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy izay mitandrina ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Ny fitiavanao, TOMPO ô, manenika ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny lalànanao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TETA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Efa nasianao soa izaho mpanomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia araka ny fampanantenànao, TOMPO ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Ampianaro hahafantatra sy hahalala aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria azoko antoka ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Naniasia aho fony tsy mbola azom-pahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ankehitriny tandremako ny hafatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Soa Ianao, Tompo ô, sady mpanisy soa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Mamoron-dainga hamelezana ahy ny mpirehareha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny foko manontolo no anarahako ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Donto velona ny sain’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho miravo amin’ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Nahasoa ahy ny azom-pahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hianarako ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Aleoko ny lalàna naloaky ny vavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay ny volamena amam-bolafotsy miavosa.
- type: usfm
  marker: sp
  children:
  - type: text
    text: JODA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Nanao sy namboatra ahy ny tananao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy mahira-tsaina aho hianarako ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: Hifaly mahita ahy ireo manaja Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny teninao no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: Ny fitsipikao, TOMPO ô, fantatro fa rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka marim-pototra ny nampahorianao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: Hampionona ahy anie ny fitiavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny hafatrao tamiko mpanomponao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: Ho tonga ato amiko anie ny indrafonao ka hamelona ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny lalànanao no firavoako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Aoka ho menatra ny mpirehareha
- type: usfm
  marker: q1
  children:
  - type: text
    text: mampahory tsy amin’antony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho misaintsaina ny fepetranao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: Hitodika amiko anie ireo manaja Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahafantarany ny baikonao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: Ny foko manontolo anie hifikitra amin’ny lalànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy ho rakotry ny henatra mihitsy aho!
- type: usfm
  marker: sp
  children:
  - type: text
    text: KAFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: 'Reraka aho maniry ny famonjenao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: Valalanina ny masoko miandry ny hafatrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rahoviana no hampiononanao ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: Zary *siny hoditra mainan’ny setroka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy hadinoko ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: Hiaritra ela toy izao foana ve izaho mpanomponao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana ny mpanenjika ahy no hotsarainao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: Mihady longoa hianjerako ny mpirehareha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy raharahainy akory izay lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: Azo antoka avokoa ny didinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vonjeo aho fa enjehina tsy amin’antony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: Kely sisa dia levona eto an-tany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa tsy mba nafoiko ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: Noho ny fitiavanao, mba velomy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitandremako ny baiko naloaky ny vavanao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: LAMEDA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: Maharitra mandrakizay, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nanorenanao any an-danitra ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '90'
  - type: text
    text: Mahatoky Ianao, amin’ny taona mifandimby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naorinao ny tany ka mitoetra mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '91'
  - type: text
    text: Mandraka androany, araka ny fitsipikao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mbola eo ny tontolo satria mpanomponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '92'
  - type: text
    text: Raha tsy ny lalànanao no firavoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy izay aho efa matin’ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '93'
  - type: text
    text: Tsy hohadinoiko mandrakizay ny fepetranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay namelomanao ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '94'
  - type: text
    text: Fanananao aho ka vonjeo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria mikatsaka ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '95'
  - type: text
    text: Mikendry hamely ahy ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny baikonao no hadihadîko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '96'
  - type: text
    text: Izay toa lavorary dia nahitako fetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny didinao no tena midadasika.
- type: usfm
  marker: sp
  children:
  - type: text
    text: MEMA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '97'
  - type: text
    text: Endrey ny fitiavako ny lalànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tontolo andro dia izy no saintsainiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '98'
  - type: text
    text: Ny didinao, izay fananako mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mahatonga ahy ho hendry noho ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '99'
  - type: text
    text: Hendry noho ny mpampianatra ahy rehetra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria misaintsaina ny baikonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '100'
  - type: text
    text: Mahira-tsaina noho ny zokiolona aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fepetranao no arahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '101'
  - type: text
    text: Tsy nisy nekeko ny sori-dalàn’ny faharatsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitandremako ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '102'
  - type: text
    text: Tsy mba miala amin’ny fitsipikao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao dia Ianao no mampianatra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '103'
  - type: text
    text: Mamy tokoa amiko ny hafatrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, manoatra noho ny tantely aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '104'
  - type: text
    text: Ny fepetranao mampahira-tsaina ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa hàlako rehefa mety ho soritra mamitaka.
- type: usfm
  marker: sp
  children:
  - type: text
    text: NONA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '105'
  - type: text
    text: Fanilon’ny diako ny teninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy fanazavana ny làlan-kizorako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '106'
  - type: text
    text: Hamafisiko ny velirano izay nataoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny hitandrina ny fitsipikao ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '107'
  - type: text
    text: 'Mijaly tsy eran’ny aina aho, TOMPO ô:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba velomy indray araka ny fampanantenànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '108'
  - type: text
    text: Mba raiso ny tonom-bavaka atolotro Anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119.108 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Heverina ho fanatitra atolotra an’Andriamanitra ny vavaka; jereo Sal 50.14; 51.19.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, ampianaro ahy ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '109'
  - type: text
    text: Hatenda lalandava izao ny aiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hadinoko ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '110'
  - type: text
    text: Ny olon-dratsy mitady hamandrika ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho tsy mihataka amin’ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '111'
  - type: text
    text: 'Ny baikonao no fananako mandrakizay:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo no fifalifalian’ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '112'
  - type: text
    text: Aronako hanao ny lalànanao ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny antsipiriany ary mandrakizay.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SAMEKA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '113'
  - type: text
    text: Hàlako ny olona miroa saina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lalànanao kosa no tiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '114'
  - type: text
    text: Ianao no fiereko sy ampingako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao no antenaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '115'
  - type: text
    text: Mialà amiko, ianareo mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanarahako ny didin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '116'
  - type: text
    text: Tohàny araka ny fampanantenànao aho ho velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka tsy hataonao diso fanantenana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '117'
  - type: text
    text: Tohàny hatrany aho mba ho voavonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalànanao no firavoako lalandava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '118'
  - type: text
    text: Izay rehetra miala amin’ny lalànanao aetrinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny lainga no teti-dratsy ao an-tsainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '119'
  - type: text
    text: 'Ny olon-dratsy eran-tany taim-by fanarinao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: izany no itiavako ny baikonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '120'
  - type: text
    text: Mihorohoro ny nofoko noho ny aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa atahorako tokoa ny fitsipikao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: HAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '121'
  - type: text
    text: Ny rariny sy hitsiny no ataoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aza atolotra ny mpampahory aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '122'
  - type: text
    text: Porofoy fa mahasoa ahy mpanomponao izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka aho tsy hampahorîn’ny mpirehareha!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '123'
  - type: text
    text: Ny masoko valalanina miandry ny famonjenao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny fanafahana izay nampanantenainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '124'
  - type: text
    text: 'Ny fitiavanao itondrana ahy mpanomponao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa ampianaro ny lalànanao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '125'
  - type: text
    text: Mpanomponao aho ka mba ataovy mahira-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: hahafantarako ny baikonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '126'
  - type: text
    text: Izao no fotoana mety hihetsehanao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa dikain’ny olona ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '127'
  - type: text
    text: Izany no itiavako ny didinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: manoatra ny volamena madio indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '128'
  - type: text
    text: Izany no ifidianako ny fepetranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ankahalàko izay mety ho soritra mamitaka.
- type: usfm
  marker: sp
  children:
  - type: text
    text: PE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '129'
  - type: text
    text: Mahagaga ny baikonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka izany no anarahako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '130'
  - type: text
    text: Manazava tokoa ny fahitana ny teninao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mampahira-tsaina ny olon-tsotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '131'
  - type: text
    text: 'Mitanatana vava, mihanahana aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny didinao no mahaliana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '132'
  - type: text
    text: Mba todiho aho ka iantrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ny tinapakao ho an’ireo mpitia Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '133'
  - type: text
    text: Hamafiso ho amin’ny hafatrao ny diako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aoka aho tsy hanjakam-paharatsiana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '134'
  - type: text
    text: Afaho amin’ny mpampahory aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitandremako ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '135'
  - type: text
    text: 'Jereo amin-kamorampo izaho mpanomponao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampianaro ahy ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '136'
  - type: text
    text: Izaho dia mamarin-dranomaso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy voatandrina ny lalànanao.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TSADE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '137'
  - type: text
    text: Mandala ny rariny Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahitsy ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '138'
  - type: text
    text: Ny baikonao dia ara-drariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy azo antoka tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '139'
  - type: text
    text: Mandoro ahy toy ny afo ny zotompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hadinon’ny mpandrafy ahy ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '140'
  - type: text
    text: Voasedra tanaty memy tokoa ny hafatrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia tia azy ireny izaho mpanomponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '141'
  - type: text
    text: Kely sady mavomavo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hadinoko ny fepetranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '142'
  - type: text
    text: Mahitsy mandrakizay ny fahitsianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatoky ny lalànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '143'
  - type: text
    text: Azon’ny fahoriana sy ny fahaterena aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa mbola miravo amin’ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '144'
  - type: text
    text: Mahitsy mandrakizay ny baikonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ataovy mahira-tsaina aho mba ho velona.
- type: usfm
  marker: sp
  children:
  - type: text
    text: KÔFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '145'
  - type: text
    text: Miantso amin’ny foko manontolo aho ka valio
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanarahako ny lalànanao, TOMPO ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '146'
  - type: text
    text: Miantso Anao aho ka vonjeo
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitandremako ny baikonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '147'
  - type: text
    text: Mialoha ny mazavatsinanana aho mitalaho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia miandry ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '148'
  - type: text
    text: Mialoha ny besinimaro aho no nifoha
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hisaintsaina ny hafatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '149'
  - type: text
    text: Henoy ny feoko araka ny fitiavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, velomy araka ny fitsipikao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '150'
  - type: text
    text: Ireo mpanenjika ahy manatona heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny lalànanao kosa halaviriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '151'
  - type: text
    text: Akaiky ahy Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahatoky avokoa ny didinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '152'
  - type: text
    text: Ny baikonao dia fantatro hatry ny ela
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa naorinao ho mandrakizay.
- type: usfm
  marker: sp
  children:
  - type: text
    text: RESA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '153'
  - type: text
    text: Jereo ny fahoriako, ka afaho aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lalànanao tsy hadinoiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '154'
  - type: text
    text: Iandraiketo ny adiko ka avoty aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary velomy araka ny fampanantenànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '155'
  - type: text
    text: Lavitra ny olon-dratsy ny famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy ny lalànanao no katsahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '156'
  - type: text
    text: Lehibe ny indrafonao, TOMPO ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: velomy aho araka ny fitsipikao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '157'
  - type: text
    text: Maro ny mpanenjika sy mpandrafy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny baikonao tsy mba ialako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '158'
  - type: text
    text: Nahita mpivadika aho, ka narikoriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hafatrao tsy mba tandremany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '159'
  - type: text
    text: Jereo fa mankamamy ny fepetranao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka velomy araka ny fitiavanao, TOMPO ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '160'
  - type: text
    text: Ny toetra mahatoky no mivohitra amin’ny teninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fitsipikao dia ara-drariny avokoa sy mandrakizay.
- type: usfm
  marker: sp
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '161'
  - type: text
    text: Enjehin’andriana tsy amin’antony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny teninao ihany no atahoran’ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '162'
  - type: text
    text: Ny hafatrao no mahafaly ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny mahazo remby sesehena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '163'
  - type: text
    text: Hàlako ary maharikoriko ahy ny fitaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny lalànanao no ankamamîko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '164'
  - type: text
    text: Impito isan’andro no iderako Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny fitsipikao ara-drariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '165'
  - type: text
    text: Fiadanam-be ny an’izay mankamamy ny lalànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy zavatra mahasolafaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '166'
  - type: text
    text: Ny famonjenao, TOMPO ô, no antenaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny didinao no tanterahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '167'
  - type: text
    text: Ny baikonao dia tandremako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ankamamîko aoka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '168'
  - type: text
    text: Eny, voatandriko ny fepetra amam-baikonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloanao ny làlan-kalehako rehetra.
- type: usfm
  marker: sp
  children:
  - type: text
    text: TAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '169'
  - type: text
    text: Aoka ho tonga eo anoloanao ny tarainako, TOMPO ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy mahira-tsaina aho araka ny fampanantenànao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '170'
  - type: text
    text: Ny fihantàko anie ho tody eo anatrehanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba afaho aho araka ny toky nomenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '171'
  - type: text
    text: Hidera Anao anie ny molotro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nampianarinao ahy ny lalànanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '172'
  - type: text
    text: Hanambara ny hafatrao anie ny lelako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria rariny avokoa ny didinao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '173'
  - type: text
    text: Ny fiarovanao anie hanampy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fepetranao no nofidiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '174'
  - type: text
    text: Mahaliana ahy, TOMPO ô, ny famonjenao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny lalànanao no firavoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '175'
  - type: text
    text: Veloma anie ny aiko hiderako Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanampy ahy anie ny fitsipikao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '176'
  - type: text
