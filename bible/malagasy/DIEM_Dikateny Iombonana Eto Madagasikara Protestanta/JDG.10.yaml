document_id: JDG.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Mpitsara hafa: i Tôlà sy i Jaîra'
  - type: text
    content: Taorian’ny nahafatesan’i Abimelèka dia nitsangana i Tôlà, zanakalahin’i Povà sady zafikelin’i Dôdao, mba hamonjy ny vahoaka Israely. Izy dia lehilahy avy ao amin’ny fokon’i Jisakara ary nonina tao Samira
  - type: note
    content: I Samira dia toerana tsy fantatra izay misy azy.
  - type: text
    content: ', any amin’ny faritra be tendrombohitra any Efraîma. '
  '10':
  - type: text
    content: 'Noho izany dia niantso vonjy tamin’ny TOMPO izy ka nanao hoe:'
  - type: text
    content: –Nanota taminao izahay, satria nandao Anao Andriamanitray ka nanompo ny Bahala andriamani-tsiizy.
  '11':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’ny Israelita:'
  - type: text
    content: '–Raha nampahory anareo ny Ejiptianina sy ny Amôrita na ny Hamônita sy ny Filistinina '
  '12':
  - type: text
    content: 'na ny Tsidônianina sy ny Hamalekita ary ny Midianita ka niantso vonjy tamiko ianareo, moa tsy namonjy anareo ho afaka teo an-tanan’ireny va Aho? '
  '13':
  - type: text
    content: 'Saingy ianareo dia nandao Ahy ka nanompo ireo andriamani-kafa. Noho izany dia tsy hamonjy anareo intsony Aho. '
  '14':
  - type: text
    content: Andeha antsoy ireo andriamani-tsiizy efa nofidinareo. Aoka ireo no hamonjy anareo amin’ny androm-pahorianareo!
  '15':
  - type: text
    content: 'Fa hoy ny Israelita tamin’ny TOMPO:'
  - type: text
    content: –Efa nanota izahay. Ataovy izay rehetra sitrakao hatao aminay, fa anio mba vonjeo ihany izahay!
  '16':
  - type: text
    content: Dia narian’ny Israelita tsy ho eo anivon’izy ireo ny andriamani-kafa, ka notompoiny indray ny TOMPO Izay tsy nahazaka hijery ny fijalian’i Israely.
  '17':
  - type: text
    content: Ary nifanangona ny Hamônita ka nitoby tao amin’ny faritanin’i Gilehada; dia nifamory koa ny Israelita ka nitoby tao Mitsepà
  - type: note
    content: 'Mitsepà: tanàna any Gilehada ka eo atsimon’ny renirano Jabôka (jereo 11.29 sy Gen 31.49).'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Ary nifanontany ny foko tao Gilehada sy ny mpitarika azy ka nanao hoe:'
  - type: text
    content: –Iza no lehilahy sahy hanapoaka ady amin’ny Hamônita? Izany lehilahy izany no ho filohan’ny mponina rehetra eto Gilehada.
  '2':
  - type: text
    content: Nitondra ny Israelita nandritra ny 23 taona i Tôlà; avy eo dia maty izy, ka nalevina tao Samira.
  '3':
  - type: text
    content: 'I Jaîro avy any Gilehada no nandimby azy ka nitondra ny Israelita nandritra ny 22 taona. '
  '4':
  - type: text
    content: Nanan-janaka telopolo lahy izay nitaingina boriky telopolo
  - type: note
    content: 'nitaingina boriky telopolo: jereo 9.10 sy nta, jereo 12.14.'
  - type: text
    content: ' sady nanana toerana telopolo tao amin’ny faritanin’i Gilehada; ary mandraka ankehitriny dia antsoina hoe Havôta-Jaîro ireny toerana ireny. '
  '5':
  - type: text
    content: Avy eo dia maty i Jaîro, ka nalevina tao Kamôna
  - type: note
    content: 'Kamôna: tanàna eny atsinanan’i Jôrdàna eo antenatenan’ny lalana mampitohy ny farihin’i Genesareta sy i Ramôta any Gilehada.'
  - type: text
    content: .
  - type: heading
    content: Nanafika an’i Israely ny Hamônita
  '6':
  - type: text
    content: 'Ary mbola nanao izay ratsy eo imason’ny TOMPO indray ny Israelita ka nanompo ny '
  - type: text
    content: Bahala
  - type: text
    content: ' sy '
  - type: text
    content: Hastarôta
  - type: note
    content: Jereo 2.13 sy nta.
  - type: text
    content: ' andriamani-tsiizy, mbamin’ny andriamanitry ny Sirianina sy ny Tsidônianina na ny andriamanitry Môabita sy ny Hamônita ary ny Filistinina; fa nandao ny TOMPO izy ka tsy nanompo Azy intsony. '
  '7':
  - type: text
    content: 'Dia nirehi-pahatezerana tamin’ny Israelita ny TOMPO ka nanolotra azy teo an-tanan’ny Filistinina sy ny Hamônita. '
  '8':
  - type: text
    content: 'Nanomboka tamin’izany taona izany ary nandritra ny 18 taona ireo no nampahory sy nanenjika ny Israelita izay nonina tany Gilehada sy tao amin’ny faritanin’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' teny an-dafy atsinanan’i Jôrdàna. '
  '9':
  - type: text
    content: 'Niampita ny ony Jôrdàna mihitsy aza ny Hamônita mba hiady amin’ny fokon’i Joda sy i Benjamîna ary i Efraîma; ka nijaly mafy ny Israelita. '
