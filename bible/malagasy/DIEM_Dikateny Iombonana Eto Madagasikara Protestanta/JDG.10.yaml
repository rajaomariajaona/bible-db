document_id: JDG.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Mpitsara hafa: i Tôlà sy i Jaîra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Taorian’ny nahafatesan’i Abimelèka dia nitsangana i Tôlà, zanakalahin’i Povà sady zafikelin’i Dôdao, mba hamonjy ny vahoaka Israely. Izy dia lehilahy avy ao amin’ny fokon’i Jisakara ary nonina tao Samira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I Samira dia toerana tsy fantatra izay misy azy.
    marker-yv: yv-n
  - type: text
    text: ', any amin’ny faritra be tendrombohitra any Efraîma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nitondra ny Israelita nandritra ny 23 taona i Tôlà; avy eo dia maty izy, ka nalevina tao Samira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Jaîro avy any Gilehada no nandimby azy ka nitondra ny Israelita nandritra ny 22 taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanan-janaka telopolo lahy izay nitaingina boriky telopolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitaingina boriky telopolo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 9.10 sy nta, jereo 12.14.
    marker-yv: yv-n
  - type: text
    text: ' sady nanana toerana telopolo tao amin’ny faritanin’i Gilehada; ary mandraka ankehitriny dia antsoina hoe Havôta-Jaîro ireny toerana ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avy eo dia maty i Jaîro, ka nalevina tao Kamôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kamôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eny atsinanan’i Jôrdàna eo antenatenan’ny lalana mampitohy ny farihin’i Genesareta sy i Ramôta any Gilehada.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanafika an’i Israely ny Hamônita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mbola nanao izay ratsy eo imason’ny TOMPO indray ny Israelita ka nanompo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hastarôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' andriamani-tsiizy, mbamin’ny andriamanitry ny Sirianina sy ny Tsidônianina na ny andriamanitry Môabita sy ny Hamônita ary ny Filistinina; fa nandao ny TOMPO izy ka tsy nanompo Azy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nirehi-pahatezerana tamin’ny Israelita ny TOMPO ka nanolotra azy teo an-tanan’ny Filistinina sy ny Hamônita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nanomboka tamin’izany taona izany ary nandritra ny 18 taona ireo no nampahory sy nanenjika ny Israelita izay nonina tany Gilehada sy tao amin’ny faritanin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' teny an-dafy atsinanan’i Jôrdàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Niampita ny ony Jôrdàna mihitsy aza ny Hamônita mba hiady amin’ny fokon’i Joda sy i Benjamîna ary i Efraîma; ka nijaly mafy ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noho izany dia niantso vonjy tamin’ny TOMPO izy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanota taminao izahay, satria nandao Anao Andriamanitray ka nanompo ny Bahala andriamani-tsiizy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’ny Israelita:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha nampahory anareo ny Ejiptianina sy ny Amôrita na ny Hamônita sy ny Filistinina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'na ny Tsidônianina sy ny Hamalekita ary ny Midianita ka niantso vonjy tamiko ianareo, moa tsy namonjy anareo ho afaka teo an-tanan’ireny va Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Saingy ianareo dia nandao Ahy ka nanompo ireo andriamani-kafa. Noho izany dia tsy hamonjy anareo intsony Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Andeha antsoy ireo andriamani-tsiizy efa nofidinareo. Aoka ireo no hamonjy anareo amin’ny androm-pahorianareo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny Israelita tamin’ny TOMPO:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nanota izahay. Ataovy izay rehetra sitrakao hatao aminay, fa anio mba vonjeo ihany izahay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia narian’ny Israelita tsy ho eo anivon’izy ireo ny andriamani-kafa, ka notompoiny indray ny TOMPO Izay tsy nahazaka hijery ny fijalian’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nifanangona ny Hamônita ka nitoby tao amin’ny faritanin’i Gilehada; dia nifamory koa ny Israelita ka nitoby tao Mitsepà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mitsepà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna any Gilehada ka eo atsimon’ny renirano Jabôka (jereo 11.29 sy Gen 31.49).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nifanontany ny foko tao Gilehada sy ny mpitarika azy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no lehilahy sahy hanapoaka ady amin’ny Hamônita? Izany lehilahy izany no ho filohan’ny mponina rehetra eto Gilehada.
