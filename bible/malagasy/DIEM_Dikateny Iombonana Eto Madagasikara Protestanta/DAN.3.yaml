document_id: DAN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny didy momba ny fivavahana amin’ny sarivongan’olona volamena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Nebokadnetsara mpanjaka nampanao sarivongan’olona volamena; telopolo metatra ny haavony ary telo metatra ny sakany. Ka nasainy natsangana teo amin’ny tany lemaka Dorà, tao amin’ny faritanin’i Babilôna, izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy eo izy dia nampamory ny solotenan’andriamanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Solotenan’andriamanjaka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 6.2 sy nta. Ny famantarana mazava ny anaram-boninahitry ny mpiasam-panjakana voatanisa amin’ny lisitra etoana dia tsy tena azo antoka. Toy izany koa ireo anaran’ny zava-maneno eo amin’ny and 5.
    marker-yv: yv-n
  - type: text
    text: ', ny mpifehy faritany, ny governora, ny mpanolotsaina, ny mpitahiry volam-panjakana, ny mpahay lalàna sy ny mpitsara, ary ny mpiasam-panjakana hafa rehetra isam-paritany, mba ho avy hitokana ilay sarivongana efa nasain’i Nebokadnetsara mpanjaka natsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia vory avokoa ireo manampahefana ireo mba hanao ny fitokanana, ka naka toerana teo anoloan’izany sarivongana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niantso tamin’ny feo mahery ny mpikabary nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no baiko lazaina aminareo vahoaka avy amin’ny foko sy firenena ary samy hafa fiteny rehetra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Raha vao renareo ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy farara ary zava-maneno isan-karazany, dia miankohofa ka mivavaha amin’ny sarivongan’olona volamena izay natsangan’i Nebokadnetsara mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary na iza na iza tsy miankohoka sy tsy mivavaka aminy dia hatsipy miaraka amin’izay ao anaty lafaoro misy afo mivaivay.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa tamin’ny fotoana izay nandrenesana ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy zava-maneno isan-karazany, dia niankohoka sy nivavaka tamin’ny sarivongana volamena izay efa natsangan’i Nebokadnetsara mpanjaka ireo vahoaka avy amin’ny foko sy firenena ary samy hafa fiteny rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy nivadika tamin’Andriamanitra ireo naman’i Daniela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay fotoana izay dia nisy lehilahy babilônianina sasany tonga hiampanga ny Jiosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nandray fitenenana ireo ka nilaza tamin’i Nebokadnetsara mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ho ela velona anie ianao, ry mpanjaka! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Namoaka didy ianao, ry mpanjaka, nanao hoe: «Ny olona rehetra dia hiankohoka sy hivavaka amin’ny sarivongan’olona volamena rehefa mandre ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy farara ary zava-maneno isan-karazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa na iza na iza tsy miankohoka sy tsy mivavaka dia hatsipy ao anaty lafaoro misy afo mivaivay.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Misy anefa lehilahy jiosy izay voatendrinao hitondra ny faritanin’i Babilôna, dia i Sadràka sy i Mesàka ary i Habeda-Negao; ireo lehilahy ireo dia tsy nanaja ny didinao, ry mpanjaka, tsy mety manompo an’ireo andriamanitrao, ary tsy mivavaka amin’ny sarivongana volamena izay natsanganao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo andriamanitrao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay andriamanitrao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; toy izany koa eo amin’ny and 18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tezitra sy nisafoaka mafy i Nebokadnetsara ka nampanalainy i Sadràka sy i Mesàka ary i Habeda-Negao. Rehefa tonga teo anatrehan’ny mpanjaka ireo lehilahy ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia nanontany azy i Nebokadnetsara hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina ve ry i Sadràka sy i Mesàka ary i Habeda-Negao fa tsy mety manompo ireo andriamanitro ianareo ary tsy mivavaka amin’ny sarivongana volamena izay natsangako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankehitriny, mivonòna ianareo, fa amin’ny fotoana izay handrenesanareo ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamin’ny valiha sy farara ary zava-maneno isan-karazany, dia hiankohoka sy hivavaka amin’ny sarivongana izay nataoko ianareo; fa raha tsy mety mivavaka kosa ianareo, dia hatsipy miaraka amin’izay ao anaty lafaoro misy afo mivaivay; ary iza no andriamanitra hahafaka anareo amin’ny fahefàko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly i Sadràka sy i Mesàka ary i Habeda-Negao ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Nebokadnetsara, tsy misy tokony hamalianay anao akory momba izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fantaro fa afaka mamonjy anay ny Andriamanitray, dia ilay Andriamanitra izay tompoinay; eny, hanafaka anay amin’ny lafaoro misy afo mivaivay sy amin’ny fahefànao Izy, ry mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary na tsy hataony aza izany, dia aoka ho fantatrao, ry mpanjaka, fa ireo andriamanitrao dia tsy hotompoinay ary ny sarivongana volamena izay natsanganao dia tsy hivavahanay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa azo aroso amin’ny and 17-18 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Raha tàhiny ny Andriamanitray, dia ilay Andriamanitra Izay tompoinay, afaka mamonjy anay, ry mpanjaka ô, dia hanafaka anay amin’ny lafaoro misy afo mivaivay sy ny fahefànao koa Izy. Ary na dia tsy afaka hanao izany aza Izy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia feno fahatezerana i Nebokadnetsara ka niova endrika tamin’i Sadràka sy i Mesàka ary i Habeda-Negao. Nasainy nafanaina impito mihoatra noho ny famana azy ny lafaoro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ireo lehilahy matanjaka indrindra tamin’ny miaramilany no nasainy namatotra an’i Sadràka sy i Mesàka ary i Habeda-Negao sy nanipy azy tao anaty lafaoro misy afo mivaivay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Avy hatrany dia nafatotra niaraka tamin’ny lobany sy patalohany ary akanjony sy satrony ireo lehilahy ireo, ka natsipy tao amin’ny lafaoro misy afo mivaivay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy azo antoka ny famantarana ny anaran’ireo karazam-pitafiana voalaza eto.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary satria hentitra ny tenin’ny mpanjaka dia voafana izaitsizy ny lafaoro, ka matin’ny lelafo mbamin’ny miaramila izay nanipy an’i Sadràka sy i Mesàka ary i Habeda-Negao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa izy telo lahy ireto kosa dia voatsipy am-patorana tao amin’ny lafaoro misy afo mivaivay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny dkt tranainy grika eto dia manampy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vavak’i Hazarià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 24-45) sy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hiran’ny sakaizan’i Daniela telo lahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 46-90).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Novonjen’Andriamanitra tamin’ny lafaoro izy telo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Talanjona anefa i Nebokadnetsara ka nitsangana faingana, ary nanontany ireo mpanolotsainy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy lehilahy telo mifatotra va no natsipintsika tao anaty afo?
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia hoy ny navalin’ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany, ny and 24-33 dia mitondra ny laharana 90-100 (jereo ny naoty eo aloha).
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany tokoa, ry mpanjaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy indray ny mpanjaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Koa nahoana àry aho no mahita lehilahy efatra tsy mifatotra, mandehandeha ao anaty afo, nefa tsy misy maratra akory; sady ilay fahefatra dia mitovy endrika amin’ny zanak’ireo andriamanitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nanatona ny varavaran’ny lafaoro misy afo mivaivay i Nebokadnetsara ka niantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry i Sadràka sy i Mesàka ary i Habeda-Negao mpanompon’Andriamanitra Avo Indrindra ô, mivoaha tao ianareo ka avia atỳ!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niaraka tamin’izay dia nivoaka avy tao anaty afo i Sadràka sy i Mesàka ary i Habeda-Negao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nitangorona ireo solotenan’andriamanjaka sy ny mpifehy faritany ary ny governora sy ireo mpanolotsain’ny mpanjaka mba hijery ireo lehilahy ireo; ka hitany fa tsy nampaninona ny tenan’izy ireo akory ny afo, tsy may ny volon-dohany, tsy simba ny fitafiany sady tsy maimbo afo akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia loa-bolana i Nebokadnetsara ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hisaorana anie Andriamanitr’i Sadràka sy i Mesàka ary i Habeda-Negao; naniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeliny
  - type: text
    text: ' manko Izy mba hamonjy ny mpanompony izay natoky Azy, ka nandika ny baiko nataoko. Fa naleon’ireo kosa nanolo-tena hampijalina toy izay hanompo sy hitsaoka andriamani-kafa ankoatra ilay Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Noho izany dia mamoaka izao didy izao ho an’ny foko sy firenena ary samy hafa fiteny rehetra aho hoe: «Izay manao teny tsy voahevitra ny amin’ny Andriamanitr’i Sadràka sy i Mesàka ary i Habeda-Negao dia hotetitetehina ary hatao fanariam-pako ny tranony; fa tsy misy andriamani-kafa mahavonjy tahaka izao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nasandratry ny mpanjaka i Sadràka sy i Mesàka ary i Habeda-Negao ho amin’ny toerana ambony noho ny teo aloha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Taorian’izany dia naverin’ny mpanjaka tamin’ny toerany teo aloha i Sadràka sy i Mesàka ary i Habeda-Negao.
    marker-yv: yv-n
  - type: text
    text: tao amin’ny faritanin’i Babilôna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ilay hazo lehibe: nofy faharoan’ny mpanjaka'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary i Nebokadnetsara mpanjaka nampitondra teny ho an’ny foko sy firenena ary olona samy hafa fiteny rehetra izay monina amin’ny tany tontolo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hitombo anie ny fiadananareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasany ny 3.31–4.34 dia mitondra ny laharana 4.1-37.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Sitrako ny hanambara ireo famantarana sy zava-mahagaga izay nataon’Andriamanitra Avo Indrindra tamiko:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lehibe aoka izany ireo famantarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahery tokoa ny zava-mahagaga vitany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maharitra mandrakizay ny fanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hanam-petra ny fanapahany.
