document_id: DAN.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny didy momba ny fivavahana amin’ny sarivongan’olona volamena
  - type: text
    content: 'Ary Nebokadnetsara mpanjaka nampanao sarivongan’olona volamena; telopolo metatra ny haavony ary telo metatra ny sakany. Ka nasainy natsangana teo amin’ny tany lemaka Dorà, tao amin’ny faritanin’i Babilôna, izany. '
  '10':
  - type: text
    content: 'Namoaka didy ianao, ry mpanjaka, nanao hoe: «Ny olona rehetra dia hiankohoka sy hivavaka amin’ny sarivongan’olona volamena rehefa mandre ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy farara ary zava-maneno isan-karazany. '
  '11':
  - type: text
    content: 'Fa na iza na iza tsy miankohoka sy tsy mivavaka dia hatsipy ao anaty lafaoro misy afo mivaivay.» '
  '12':
  - type: text
    content: Misy anefa lehilahy jiosy izay voatendrinao hitondra ny faritanin’i Babilôna, dia i Sadràka sy i Mesàka ary i Habeda-Negao; ireo lehilahy ireo dia tsy nanaja ny didinao, ry mpanjaka, tsy mety manompo an’ireo andriamanitrao, ary tsy mivavaka amin’ny sarivongana volamena izay natsanganao
  - type: note
    content: ireo andriamanitrao na ilay andriamanitrao; toy izany koa eo amin’ny and 18.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Tezitra sy nisafoaka mafy i Nebokadnetsara ka nampanalainy i Sadràka sy i Mesàka ary i Habeda-Negao. Rehefa tonga teo anatrehan’ny mpanjaka ireo lehilahy ireo, '
  '14':
  - type: text
    content: 'dia nanontany azy i Nebokadnetsara hoe:'
  - type: text
    content: '–Marina ve ry i Sadràka sy i Mesàka ary i Habeda-Negao fa tsy mety manompo ireo andriamanitro ianareo ary tsy mivavaka amin’ny sarivongana volamena izay natsangako? '
  '15':
  - type: text
    content: Ankehitriny, mivonòna ianareo, fa amin’ny fotoana izay handrenesanareo ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamin’ny valiha sy farara ary zava-maneno isan-karazany, dia hiankohoka sy hivavaka amin’ny sarivongana izay nataoko ianareo; fa raha tsy mety mivavaka kosa ianareo, dia hatsipy miaraka amin’izay ao anaty lafaoro misy afo mivaivay; ary iza no andriamanitra hahafaka anareo amin’ny fahefàko?
  '16':
  - type: text
    content: 'Dia namaly i Sadràka sy i Mesàka ary i Habeda-Negao ka nanao hoe:'
  - type: text
    content: '–Ry Nebokadnetsara, tsy misy tokony hamalianay anao akory momba izany. '
  '17':
  - type: text
    content: 'Fantaro fa afaka mamonjy anay ny Andriamanitray, dia ilay Andriamanitra izay tompoinay; eny, hanafaka anay amin’ny lafaoro misy afo mivaivay sy amin’ny fahefànao Izy, ry mpanjaka. '
  '18':
  - type: text
    content: Ary na tsy hataony aza izany, dia aoka ho fantatrao, ry mpanjaka, fa ireo andriamanitrao dia tsy hotompoinay ary ny sarivongana volamena izay natsanganao dia tsy hivavahanay
  - type: note
    content: Dkt hafa azo aroso amin’ny and 17-18 Raha tàhiny ny Andriamanitray, dia ilay Andriamanitra Izay tompoinay, afaka mamonjy anay, ry mpanjaka ô, dia hanafaka anay amin’ny lafaoro misy afo mivaivay sy ny fahefànao koa Izy. Ary na dia tsy afaka hanao izany aza Izy.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dia feno fahatezerana i Nebokadnetsara ka niova endrika tamin’i Sadràka sy i Mesàka ary i Habeda-Negao. Nasainy nafanaina impito mihoatra noho ny famana azy ny lafaoro. '
  '2':
  - type: text
    content: Avy eo izy dia nampamory ny solotenan’andriamanjaka
  - type: note
    content: 'Solotenan’andriamanjaka: jereo 6.2 sy nta. Ny famantarana mazava ny anaram-boninahitry ny mpiasam-panjakana voatanisa amin’ny lisitra etoana dia tsy tena azo antoka. Toy izany koa ireo anaran’ny zava-maneno eo amin’ny and 5.'
  - type: text
    content: ', ny mpifehy faritany, ny governora, ny mpanolotsaina, ny mpitahiry volam-panjakana, ny mpahay lalàna sy ny mpitsara, ary ny mpiasam-panjakana hafa rehetra isam-paritany, mba ho avy hitokana ilay sarivongana efa nasain’i Nebokadnetsara mpanjaka natsangana. '
  '20':
  - type: text
    content: 'Ary ireo lehilahy matanjaka indrindra tamin’ny miaramilany no nasainy namatotra an’i Sadràka sy i Mesàka ary i Habeda-Negao sy nanipy azy tao anaty lafaoro misy afo mivaivay. '
  '21':
  - type: text
    content: Avy hatrany dia nafatotra niaraka tamin’ny lobany sy patalohany ary akanjony sy satrony ireo lehilahy ireo, ka natsipy tao amin’ny lafaoro misy afo mivaivay
  - type: note
    content: Tsy azo antoka ny famantarana ny anaran’ireo karazam-pitafiana voalaza eto.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary satria hentitra ny tenin’ny mpanjaka dia voafana izaitsizy ny lafaoro, ka matin’ny lelafo mbamin’ny miaramila izay nanipy an’i Sadràka sy i Mesàka ary i Habeda-Negao. '
  '23':
  - type: text
    content: Fa izy telo lahy ireto kosa dia voatsipy am-patorana tao amin’ny lafaoro misy afo mivaivay
  - type: note
    content: Ny dkt tranainy grika eto dia manampy ny vavak’i Hazarià (and 24-45) sy ny hiran’ny sakaizan’i Daniela telo lahy (and 46-90).
  - type: text
    content: .
  - type: heading
    content: Novonjen’Andriamanitra tamin’ny lafaoro izy telo lahy
  '24':
  - type: text
    content: 'Talanjona anefa i Nebokadnetsara ka nitsangana faingana, ary nanontany ireo mpanolotsainy hoe:'
  - type: text
    content: –Moa tsy lehilahy telo mifatotra va no natsipintsika tao anaty afo?
  - type: text
    content: Dia hoy ny navalin’ireo
  - type: note
    content: Amin’ny dkt sasany, ny and 24-33 dia mitondra ny laharana 90-100 (jereo ny naoty eo aloha).
  - type: text
    content: ':'
  - type: text
    content: –Izany tokoa, ry mpanjaka!
  '25':
  - type: text
    content: 'Ary hoy indray ny mpanjaka:'
  - type: text
    content: –Koa nahoana àry aho no mahita lehilahy efatra tsy mifatotra, mandehandeha ao anaty afo, nefa tsy misy maratra akory; sady ilay fahefatra dia mitovy endrika amin’ny zanak’ireo andriamanitra?
  '26':
  - type: text
    content: 'Dia nanatona ny varavaran’ny lafaoro misy afo mivaivay i Nebokadnetsara ka niantso hoe:'
  - type: text
    content: –Ry i Sadràka sy i Mesàka ary i Habeda-Negao mpanompon’Andriamanitra Avo Indrindra ô, mivoaha tao ianareo ka avia atỳ!
  - type: text
    content: 'Niaraka tamin’izay dia nivoaka avy tao anaty afo i Sadràka sy i Mesàka ary i Habeda-Negao. '
  '27':
  - type: text
    content: 'Dia nitangorona ireo solotenan’andriamanjaka sy ny mpifehy faritany ary ny governora sy ireo mpanolotsain’ny mpanjaka mba hijery ireo lehilahy ireo; ka hitany fa tsy nampaninona ny tenan’izy ireo akory ny afo, tsy may ny volon-dohany, tsy simba ny fitafiany sady tsy maimbo afo akory. '
  '28':
  - type: text
    content: 'Dia loa-bolana i Nebokadnetsara ka nanao hoe:'
  - type: text
    content: '–Hisaorana anie Andriamanitr’i Sadràka sy i Mesàka ary i Habeda-Negao; naniraka ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' manko Izy mba hamonjy ny mpanompony izay natoky Azy, ka nandika ny baiko nataoko. Fa naleon’ireo kosa nanolo-tena hampijalina toy izay hanompo sy hitsaoka andriamani-kafa ankoatra ilay Andriamaniny. '
  '29':
  - type: text
    content: 'Noho izany dia mamoaka izao didy izao ho an’ny foko sy firenena ary samy hafa fiteny rehetra aho hoe: «Izay manao teny tsy voahevitra ny amin’ny Andriamanitr’i Sadràka sy i Mesàka ary i Habeda-Negao dia hotetitetehina ary hatao fanariam-pako ny tranony; fa tsy misy andriamani-kafa mahavonjy tahaka izao.»'
  '3':
  - type: text
    content: Dia vory avokoa ireo manampahefana ireo mba hanao ny fitokanana, ka naka toerana teo anoloan’izany sarivongana izany.
  '30':
  - type: text
    content: Dia nasandratry ny mpanjaka i Sadràka sy i Mesàka ary i Habeda-Negao ho amin’ny toerana ambony noho ny teo aloha
  - type: note
    content: Dkt hafa Taorian’izany dia naverin’ny mpanjaka tamin’ny toerany teo aloha i Sadràka sy i Mesàka ary i Habeda-Negao.
  - type: text
    content: tao amin’ny faritanin’i Babilôna.
  - type: heading
    content: 'Ilay hazo lehibe: nofy faharoan’ny mpanjaka'
  '31':
  - type: text
    content: 'Ary i Nebokadnetsara mpanjaka nampitondra teny ho an’ny foko sy firenena ary olona samy hafa fiteny rehetra izay monina amin’ny tany tontolo hoe:'
  - type: text
    content: «Hitombo anie ny fiadananareo
  - type: note
    content: Amin’ny dkt sasany ny 3.31–4.34 dia mitondra ny laharana 4.1-37.
  - type: text
    content: '!'
  '32':
  - type: text
    content: '«Sitrako ny hanambara ireo famantarana sy zava-mahagaga izay nataon’Andriamanitra Avo Indrindra tamiko:'
  '33':
  - type: text
    content: Lehibe aoka izany ireo famantarany,
  - type: text
    content: ary mahery tokoa ny zava-mahagaga vitany;
  - type: text
    content: maharitra mandrakizay ny fanjakany,
  - type: text
    content: ary tsy hanam-petra ny fanapahany.
  '4':
  - type: text
    content: 'Dia niantso tamin’ny feo mahery ny mpikabary nanao hoe:'
  - type: text
    content: '–Izao no baiko lazaina aminareo vahoaka avy amin’ny foko sy firenena ary samy hafa fiteny rehetra: '
  '5':
  - type: text
    content: '«Raha vao renareo ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy farara ary zava-maneno isan-karazany, dia miankohofa ka mivavaha amin’ny sarivongan’olona volamena izay natsangan’i Nebokadnetsara mpanjaka. '
  '6':
  - type: text
    content: Ary na iza na iza tsy miankohoka sy tsy mivavaka aminy dia hatsipy miaraka amin’izay ao anaty lafaoro misy afo mivaivay.»
  '7':
  - type: text
    content: Koa tamin’ny fotoana izay nandrenesana ny feon’ny trompetra sy sodina ary kabôsy aman-dokanga mbamy valiha sy zava-maneno isan-karazany, dia niankohoka sy nivavaka tamin’ny sarivongana volamena izay efa natsangan’i Nebokadnetsara mpanjaka ireo vahoaka avy amin’ny foko sy firenena ary samy hafa fiteny rehetra.
  - type: heading
    content: Tsy nivadika tamin’Andriamanitra ireo naman’i Daniela
  '8':
  - type: text
    content: 'Tamin’izay fotoana izay dia nisy lehilahy babilônianina sasany tonga hiampanga ny Jiosy. '
  '9':
  - type: text
    content: 'Nandray fitenenana ireo ka nilaza tamin’i Nebokadnetsara mpanjaka hoe:'
  - type: text
    content: '–Ho ela velona anie ianao, ry mpanjaka! '
