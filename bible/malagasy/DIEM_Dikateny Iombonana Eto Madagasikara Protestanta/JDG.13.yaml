document_id: JDG.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’i Samsôna
  - type: text
    content: Ary mbola nanao ratsy eo imason’ny TOMPO indray ny Israelita, ka natolotry ny TOMPO teo an-tanan’ny Filistinina nandritra ny efapolo taona.
  '10':
  - type: text
    content: 'koa nihazakazaka ravehivavy nampandre azy hoe:'
  - type: text
    content: –Miseho amiko ao indray ange ilay lehilahy tonga tamiko indray andro.
  '11':
  - type: text
    content: 'Dia nanaraka ny vadiny avy hatrany i Manôà, ka nankany amin-dralehilahy ary nanontany azy hoe:'
  - type: text
    content: –Ianao ve ilay lehilahy izay niteny tamin’ny vadiko?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Eny, izaho no izy.
  '12':
  - type: text
    content: 'Fa hoy indray i Manôà hoe:'
  - type: text
    content: –Izao àry, rehefa ho tanteraka tokoa ny teninao, dia inona no fitsipika tokony harahinay momba ny zaza? Ary inona no tokony hataonay aminy?
  '13':
  - type: text
    content: 'Dia hoy ilay anjelin’ny TOMPO tamin’i Manôà:'
  - type: text
    content: '–Tokony hotandreman’ny vadinao avokoa izay rehetra nolazaiko taminy: '
  '14':
  - type: text
    content: tsy mahazo mihinana izay rehetra avy amin’ny voaloboka izy, tsy hisotro divay na toaka, tsy hihinana sakafo maloto; izay rehetra nandidiako azy dia tokony hotandremany avokoa.
  '15':
  - type: text
    content: 'Ary hoy i Manôà tamin’ilay anjelin’ny TOMPO:'
  - type: text
    content: –Mba mijanòna kely aloha ianao ambara-pamboatray zanak’osy ho anao.
  '16':
  - type: text
    content: 'Fa novalian’ilay anjely hoe:'
  - type: text
    content: '–Na hijanona aza aho, dia tsy hihinana ny sakafo amboarinao; fa raha te hanao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ianao, dia atolory ho an’ny TOMPO izany.'
  - type: text
    content: 'Fa mbola tsy fantatr’i Manôà ho anjelin’ny TOMPO izy, '
  '17':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Iza moa no anaranao mba hanomezanay voninahitra anao, rehefa tanteraka ny teninao?
  '18':
  - type: text
    content: 'Ary hoy ilay anjelin’ny TOMPO taminy:'
  - type: text
    content: –Ahoana moa no anontanianao ny anarako? Anarana mahagaga izany!
  '19':
  - type: text
    content: 'Dia naka zanak’osy sy fanatitra hohanina i Manôà ka napetrany teo ambony vatolampy mba hatolotra ny TOMPO Izay mpanao zavatra mahagaga. Raha mbola nijery teo i Manôà sy ny vadiny, '
  '2':
  - type: text
    content: Tao Tsôrehà
  - type: note
    content: Ny tanàna Tsôrehà, eo amin’ny 22 km ao andrefan’i Jerosalema, dia nomena ny fokon’i Dana araka ny Jos 19.41. Rehefa nifindra toerana nianavaratra ny Danita (Jos 19.47), dia lasa fananan’ny fokon’i Joda i Tsôrehà (Jos 15.33).
  - type: text
    content: ' dia nisy lehilahy nantsoina hoe Manôà, avy tamin’ny fokon’i Dana. Momba ny vadiny ka tsy niteraka. '
  '20':
  - type: text
    content: 'dia niakatra ho any an-danitra ny lelafo avy tamin’ny sorona teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: '. Ary hitan’izy roa fa niakatra tao anatin’ny lelafo ilay anjelin’ny TOMPO; koa niankohoka tamin’ny tany izy mivady. '
  '21':
  - type: text
    content: 'Dia fantatr’i Manôà tamin’izay fa anjelin’ny TOMPO izy; ary tsy niseho tamin’izy mivady intsony ilay anjely. '
  '22':
  - type: text
    content: 'Ary hoy i Manôà tamin’ny vadiny:'
  - type: text
    content: –Tena ho faty tokoa isika, satria nahita an’Andriamanitra.
  '23':
  - type: text
    content: 'Fa namaly azy ny vavy hoe:'
  - type: text
    content: –Raha te hamono antsika ny TOMPO, dia tsy ho nanaiky ny sorona dorana manontolo sy fanatitra hohanina natolotsika, ary tsy ho nampahita antsika ireny zavatra rehetra ireny na ho nampandre antsika akory torolalana toy ireny aninkeo ireny.
  '24':
  - type: text
    content: 'Ary nitera-dahy ny vadin’i Manôà ka ny anarany nataony hoe Samsôna. Dia nihalehibe ny zaza, ary ny TOMPO '
  - type: text
    content: nitahy
  - type: text
    content: ' azy. '
  '25':
  - type: text
    content: Fony i Samsôna tao an-tobin’i Dana, teo anelanelan’i Tsôrehà sy i Estaôla, no nanomboka nanetsika azy ny Fanahin’ny TOMPO.
  '3':
  - type: text
    content: 'Indray andro dia niseho tamin-dravehivavy ny '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO ka nanao taminy hoe:'
  - type: text
    content: '–Fantatro fa momba ianao ka tsy niteraka; nefa hitoe-jaza ianao ka hitera-dahy. '
  '4':
  - type: text
    content: 'Koa manomboka izao dia tandremo mba tsy hisotro divay na toaka ianao, ary aza mihinana sakafo '
  - type: text
    content: maloto
  - type: text
    content: ', '
  '5':
  - type: text
    content: noho ianao efa hitoe-jaza ka hitera-dahy. Ary io zanakao io dia tsy azo hetezana volon-doha, satria ho voatokana ho an’Andriamanitra hatrany an-kibo izy
  - type: note
    content: Ny zavatra voadidy etoana (and 4-5) dia mazàna ampiharina amin’ilay nanokan-tena tamin’Andriamanitra noho ny voady manokana (Nom 6.1-8). Raha ny reniny no rarana tsy hisotro divay na toaka (and 4), dia mba hanamarihana fa ho voatokana ho an’Andriamanitra hatrany an-kibo ilay zaza.
  - type: text
    content: . Izy no hanomboka hanafaka ny Israelita amin’ny fangejàn’ny Filistinina.
  '6':
  - type: text
    content: 'Dia nody tany an-tranony ravehivavy ka niteny tamin’ny vadiny hoe:'
  - type: text
    content: '–Nisy lehilahin’Andriamanitra tonga tamiko. Toa anjelin’Andriamanitra no fijery azy satria nahatahotra mihitsy izy. Tsy nanontaniako izay niaviany ary tsy nambarany ahy ny anarany. '
  '7':
  - type: text
    content: Nilazany aho fa hitoe-jaza ka hitera-dahy. Ary norarany aho tsy hisotro divay na toaka sady tsy hihinana sakafo maloto, satria io zaza io dia ho voatokana ho an’Andriamanitra hatrany an-kibo ka mandra-pahafatiny.
  '8':
  - type: text
    content: 'Dia nivavaka tamin’ny TOMPO i Manôà ka nanao hoe:'
  - type: text
    content: –Tompo ô, miangavy anao aho, mba avereno atỳ aminay ilay lehilahin’Andriamanitra izay efa nirahinao ka hampianatra anay ny tokony hataonay amin’ny zaza izay ho teraka.
  '9':
  - type: text
    content: 'Dia nohenoin’Andriamanitra ny fangatahan’i Manôà; koa niseho tamin-dravehivavy indray ilay anjely raha mbola tany an-tsaha izy. Tsy tafaraka taminy anefa ny lahy; '
