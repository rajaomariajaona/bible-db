document_id: JDG.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahaterahan’i Samsôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary mbola nanao ratsy eo imason’ny TOMPO indray ny Israelita, ka natolotry ny TOMPO teo an-tanan’ny Filistinina nandritra ny efapolo taona.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'koa nihazakazaka ravehivavy nampandre azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miseho amiko ao indray ange ilay lehilahy tonga tamiko indray andro.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nanaraka ny vadiny avy hatrany i Manôà, ka nankany amin-dralehilahy ary nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao ve ilay lehilahy izay niteny tamin’ny vadiko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Eny, izaho no izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa hoy indray i Manôà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izao àry, rehefa ho tanteraka tokoa ny teninao, dia inona no fitsipika tokony harahinay momba ny zaza? Ary inona no tokony hataonay aminy?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy ilay anjelin’ny TOMPO tamin’i Manôà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tokony hotandreman’ny vadinao avokoa izay rehetra nolazaiko taminy: '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: tsy mahazo mihinana izay rehetra avy amin’ny voaloboka izy, tsy hisotro divay na toaka, tsy hihinana sakafo maloto; izay rehetra nandidiako azy dia tokony hotandremany avokoa.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy i Manôà tamin’ilay anjelin’ny TOMPO:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba mijanòna kely aloha ianao ambara-pamboatray zanak’osy ho anao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa novalian’ilay anjely hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na hijanona aza aho, dia tsy hihinana ny sakafo amboarinao; fa raha te hanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo ianao, dia atolory ho an’ny TOMPO izany.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mbola tsy fantatr’i Manôà ho anjelin’ny TOMPO izy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ka nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa no anaranao mba hanomezanay voninahitra anao, rehefa tanteraka ny teninao?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy ilay anjelin’ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana moa no anontanianao ny anarako? Anarana mahagaga izany!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia naka zanak’osy sy fanatitra hohanina i Manôà ka napetrany teo ambony vatolampy mba hatolotra ny TOMPO Izay mpanao zavatra mahagaga. Raha mbola nijery teo i Manôà sy ny vadiny, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tao Tsôrehà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny tanàna '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tsôrehà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', eo amin’ny 22 km ao andrefan’i Jerosalema, dia nomena ny fokon’i Dana araka ny Jos 19.41. Rehefa nifindra toerana nianavaratra ny Danita (Jos 19.47), dia lasa fananan’ny fokon’i Joda i Tsôrehà (Jos 15.33).'
      marker-yv: yv-n
    - type: text
      text: ' dia nisy lehilahy nantsoina hoe Manôà, avy tamin’ny fokon’i Dana. Momba ny vadiny ka tsy niteraka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia niakatra ho any an-danitra ny lelafo avy tamin’ny sorona teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: '. Ary hitan’izy roa fa niakatra tao anatin’ny lelafo ilay anjelin’ny TOMPO; koa niankohoka tamin’ny tany izy mivady. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia fantatr’i Manôà tamin’izay fa anjelin’ny TOMPO izy; ary tsy niseho tamin’izy mivady intsony ilay anjely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy i Manôà tamin’ny vadiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tena ho faty tokoa isika, satria nahita an’Andriamanitra.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa namaly azy ny vavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha te hamono antsika ny TOMPO, dia tsy ho nanaiky ny sorona dorana manontolo sy fanatitra hohanina natolotsika, ary tsy ho nampahita antsika ireny zavatra rehetra ireny na ho nampandre antsika akory torolalana toy ireny aninkeo ireny.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nitera-dahy ny vadin’i Manôà ka ny anarany nataony hoe Samsôna. Dia nihalehibe ny zaza, ary ny TOMPO '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitahy
    - type: text
      text: ' azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fony i Samsôna tao an-tobin’i Dana, teo anelanelan’i Tsôrehà sy i Estaôla, no nanomboka nanetsika azy ny Fanahin’ny TOMPO.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Indray andro dia niseho tamin-dravehivavy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: 'n’ny TOMPO ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fantatro fa momba ianao ka tsy niteraka; nefa hitoe-jaza ianao ka hitera-dahy. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa manomboka izao dia tandremo mba tsy hisotro divay na toaka ianao, ary aza mihinana sakafo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ', '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: noho ianao efa hitoe-jaza ka hitera-dahy. Ary io zanakao io dia tsy azo hetezana volon-doha, satria ho voatokana ho an’Andriamanitra hatrany an-kibo izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny zavatra voadidy etoana (and 4-5) dia mazàna ampiharina amin’ilay nanokan-tena tamin’Andriamanitra noho ny voady manokana (Nom 6.1-8). Raha ny reniny no rarana tsy hisotro '
      - type: usfm
        marker: it
        children:
        - type: text
          text: divay na toaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 4), dia mba hanamarihana fa ho voatokana ho an’Andriamanitra hatrany an-kibo ilay zaza.'
      marker-yv: yv-n
    - type: text
      text: . Izy no hanomboka hanafaka ny Israelita amin’ny fangejàn’ny Filistinina.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nody tany an-tranony ravehivavy ka niteny tamin’ny vadiny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nisy lehilahin’Andriamanitra tonga tamiko. Toa anjelin’Andriamanitra no fijery azy satria nahatahotra mihitsy izy. Tsy nanontaniako izay niaviany ary tsy nambarany ahy ny anarany. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nilazany aho fa hitoe-jaza ka hitera-dahy. Ary norarany aho tsy hisotro divay na toaka sady tsy hihinana sakafo maloto, satria io zaza io dia ho voatokana ho an’Andriamanitra hatrany an-kibo ka mandra-pahafatiny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nivavaka tamin’ny TOMPO i Manôà ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, miangavy anao aho, mba avereno atỳ aminay ilay lehilahin’Andriamanitra izay efa nirahinao ka hampianatra anay ny tokony hataonay amin’ny zaza izay ho teraka.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nohenoin’Andriamanitra ny fangatahan’i Manôà; koa niseho tamin-dravehivavy indray ilay anjely raha mbola tany an-tsaha izy. Tsy tafaraka taminy anefa ny lahy; '
