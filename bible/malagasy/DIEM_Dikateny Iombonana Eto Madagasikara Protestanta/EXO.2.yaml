document_id: EXO.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahaterahana sy fahazazàn’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy lehilahy iray, anisan’ny fokon’i Levỳ, nandeha naka vady tao amin’ny mpiray foko aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Bevohòka ravehivavy ka niteraka zazalahy. Hitany fa tsara tarehy ilay zazalahy ka nafeniny nandritra ny telo volana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 7.20; Heb 11.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Taorian’izany, rehefa tsy afa-nanafina azy intsony izy, dia naka sobika zozoro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zozoro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zava-maniry anaty rano toy ny volotara sy ny harefo ary ny herana ihany izay fampiasa tamin’ny rary na ny fanaovana takelaka fanoratana.
    marker-yv: yv-n
  - type: text
    text: ' izay nohosorany dity mineraly sy ditin-kazo, dia napetrany tao ny zaza; ary tao anatin’izany sobika izany no nanaterany azy teny amoron’i Neily teo anivon’ny bararata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nijanona lavidavitra ny anabaviny mba hijery izay hanjo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Taoriana kely dia nidina tao amin’i Neily mba handro ny zazavavin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', ary ireo mpanotrona azy kosa nitsangantsangana teny amoron’ny ony. Nahatazana ilay sobika teo anivon’ny bararata izy ka naniraka ny mpanompovaviny iray haka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nosokafan’ny andriambavy ilay sobika, ka intỳ hitany tao zazalahy kely mitomany; ary onena azy izy ka niantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zanaka Hebreo ity!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa niteny tamin’ny zanakavavin’ny Farao kosa ilay anabaviny nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Handeha hiantso vehivavy mpitaiza ho anao amin’ny vehivavy hebreo ve aho mba hitaiza ny zaza ho anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia novalian’ny andriambavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana àry!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nandeha razazavavy ka ny renin’ilay zazalahy ihany no nantsoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ity andriambavy tamin-dravehivavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ento ity zaza ity, ka tezao ho ahy fa izaho no hanome ny karamanao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nalain-dravehivavy ny zaza ka notezainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa lehibe ny zaza, dia nentiny tany amin’ny zanakavavin’ny Farao, ka nanjary zanany. Dia hoy ity andriambavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Antsoiko hoe Mosesy izy satria avy tamin’ny rano nisarihako azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny teny hebreo dia hoatra misy tsilalaon-teny eo amin’ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mosesy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy ny matoanteny izay midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sarihina avy eo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: esorina avy eo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Io anarana hoe Mosesy io dia mety ho loharano ejiptianina no niaviany. Ampit Asa 7.21 ity and ity.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voatery mandositra any amin’ny tany Midiana i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indray andro, nony efa lehibe i Mosesy, dia niainga nankany amin’ireo mpiray firenena aminy ka nahita azy tao anatin’ny fanompoana mafy. Hitany fa nisy lehilahy ejiptianina iray nikapoka Hebreo iray isan’ny mpiray firenena aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nijerijery manodidina i Mosesy ka hitany fa tsy nisy olona; dia novonoiny ho faty ilay Ejiptianina ary nasitriny tao anaty fasika. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony ampitso dia nivoaka indray izy ary nahita Hebreo roalahy niady, ka nanao tamin’ilay diso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no mikapoka ny mpiray firenena aminao ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no nanendry anao ho lehibe hitsara ny adinay? Sa tadiavinao hovonoina ho faty toy ny namonoanao an’ilay Ejiptianina aho?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fantatr’i Mosesy tamin’izany fa nisy nahalala ilay raharaha ka raiki-tahotra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Henon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' tokoa izany, koa notadiaviny hovonoina ho faty i Mosesy. Dia nandositra lavitry ny Farao i Mosesy, ka lasa nialokaloka tany amin’ny tany Midiana, ary nipetraka teo anilan’ny fantsakana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 11-15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Asa 7.23-29; Heb 11.24-27. –Ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Midiana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia anarana faobe ilazana ireo foko mpirenireny tany amin’ny faritra atsimo sy atsimo atsinanan’i Palestinina; araka ny Gen 25.2 dia zanakalahin’i Abrahama i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Midiana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Teo anilan’ny fantsakana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': eo no toerana izay mety indrindra ahazoan’ny vahiny mihaona amin’ny olona tompontany.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nanan-janaka fito mirahavavy ny mpisorona Jetrao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jetrao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia antsoina koa hoe Rehoela.
    marker-yv: yv-n
  - type: text
    text: ' tao Midiana. Tonga hantsaka rano ireo ary hameno ny tavin-drano mba hampisotroana ny ondry aman’osin-drainy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tonga ireo lehilahy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpiandry
  - type: text
    text: ' ondry ka nandroaka ireto zazavavy; dia nitsangana i Mosesy ka namonjy ireto zazavavy sady nampisotro ny biby fiompy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nody tany amin’i Rehoela rainy izy fito mirahavavy, ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no nalaky nody ianareo androany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nisy lehilahy ejiptianina iray niaro anay tamin’ny tanan’ny mpiandry ondry sady nanovo rano ho anay ka nampisotro ny biby fiompintsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy i Rehoela tamin’ny zanany vavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza anefa izany lehilahy izany? Nahoana izy no nilaozanareo any? Ndeha alao izy mba hiara-misakafo amintsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nanaiky hipetraka tao amin’i Rehoela io i Mosesy. Nomen’ilay rangahy ho vadin’i Mosesy i Tsipôrà zanany vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Niteraka zazalahy ilay ramatoa ka hoy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Antsoiko hoe Gersôma ity zaza ity satria efa lasa mpitsoa-ponenana atỳ an-tany hafa aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fidin’Andriamanitra hanafaka an’i Israely i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tatỳ aoriana ela dia maty ny mpanjakan’i Ejipta. Nitoloko ny Israelita noho ny fanompoany ka niantso vonjy; ary tafakatra hatrany amin’Andriamanitra ny fitarainany noho ny fanompoana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nandre ny fitarainan’ny Israelita Andriamanitra ka nahatsiaro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' nataony tamin’i Abrahama sy i Itsehàka ary i Jakôba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 15.13-14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nijery ny Israelita Andriamanitra ka nahafantatra ny nanjo azy.
