document_id: EXO.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahaterahana sy fahazazàn’i Mosesy
  - type: text
    content: 'Nisy lehilahy iray, anisan’ny fokon’i Levỳ, nandeha naka vady tao amin’ny mpiray foko aminy. '
  '10':
  - type: text
    content: 'Ary rehefa lehibe ny zaza, dia nentiny tany amin’ny zanakavavin’ny Farao, ka nanjary zanany. Dia hoy ity andriambavy hoe:'
  - type: text
    content: –Antsoiko hoe Mosesy izy satria avy tamin’ny rano nisarihako azy
  - type: note
    content: Amin’ny teny hebreo dia hoatra misy tsilalaon-teny eo amin’ny anarana hoe Mosesy sy ny matoanteny izay midika hoe sarihina avy eo na esorina avy eo. Io anarana hoe Mosesy io dia mety ho loharano ejiptianina no niaviany. Ampit Asa 7.21 ity and ity.
  - type: text
    content: .
  - type: heading
    content: Voatery mandositra any amin’ny tany Midiana i Mosesy
  '11':
  - type: text
    content: 'Indray andro, nony efa lehibe i Mosesy, dia niainga nankany amin’ireo mpiray firenena aminy ka nahita azy tao anatin’ny fanompoana mafy. Hitany fa nisy lehilahy ejiptianina iray nikapoka Hebreo iray isan’ny mpiray firenena aminy. '
  '12':
  - type: text
    content: 'Nijerijery manodidina i Mosesy ka hitany fa tsy nisy olona; dia novonoiny ho faty ilay Ejiptianina ary nasitriny tao anaty fasika. '
  '13':
  - type: text
    content: 'Nony ampitso dia nivoaka indray izy ary nahita Hebreo roalahy niady, ka nanao tamin’ilay diso hoe:'
  - type: text
    content: –Nahoana no mikapoka ny mpiray firenena aminao ianao?
  '14':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: –Iza no nanendry anao ho lehibe hitsara ny adinay? Sa tadiavinao hovonoina ho faty toy ny namonoanao an’ilay Ejiptianina aho?
  - type: text
    content: 'Fantatr’i Mosesy tamin’izany fa nisy nahalala ilay raharaha ka raiki-tahotra izy. '
  '15':
  - type: text
    content: 'Henon’ny '
  - type: text
    content: Farao
  - type: text
    content: ' tokoa izany, koa notadiaviny hovonoina ho faty i Mosesy. Dia nandositra lavitry ny Farao i Mosesy, ka lasa nialokaloka tany amin’ny tany Midiana, ary nipetraka teo anilan’ny fantsakana'
  - type: note
    content: 'And 11-15: Jereo Asa 7.23-29; Heb 11.24-27. –Ny hoe Midiana dia anarana faobe ilazana ireo foko mpirenireny tany amin’ny faritra atsimo sy atsimo atsinanan’i Palestinina; araka ny Gen 25.2 dia zanakalahin’i Abrahama i Midiana. –Teo anilan’ny fantsakana: eo no toerana izay mety indrindra ahazoan’ny vahiny mihaona amin’ny olona tompontany.'
  - type: text
    content: .
  '16':
  - type: text
    content: Nanan-janaka fito mirahavavy ny mpisorona Jetrao
  - type: note
    content: 'Jetrao: dia antsoina koa hoe Rehoela.'
  - type: text
    content: ' tao Midiana. Tonga hantsaka rano ireo ary hameno ny tavin-drano mba hampisotroana ny ondry aman’osin-drainy. '
  '17':
  - type: text
    content: 'Fa tonga ireo lehilahy '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry ka nandroaka ireto zazavavy; dia nitsangana i Mosesy ka namonjy ireto zazavavy sady nampisotro ny biby fiompy. '
  '18':
  - type: text
    content: 'Nody tany amin’i Rehoela rainy izy fito mirahavavy, ka nanontaniany hoe:'
  - type: text
    content: –Nahoana no nalaky nody ianareo androany?
  '19':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Nisy lehilahy ejiptianina iray niaro anay tamin’ny tanan’ny mpiandry ondry sady nanovo rano ho anay ka nampisotro ny biby fiompintsika.
  '2':
  - type: text
    content: Bevohòka ravehivavy ka niteraka zazalahy. Hitany fa tsara tarehy ilay zazalahy ka nafeniny nandritra ny telo volana
  - type: note
    content: Jereo Asa 7.20; Heb 11.23.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Ary hoy i Rehoela tamin’ny zanany vavy:'
  - type: text
    content: –Aiza anefa izany lehilahy izany? Nahoana izy no nilaozanareo any? Ndeha alao izy mba hiara-misakafo amintsika.
  '21':
  - type: text
    content: 'Nanaiky hipetraka tao amin’i Rehoela io i Mosesy. Nomen’ilay rangahy ho vadin’i Mosesy i Tsipôrà zanany vavy. '
  '22':
  - type: text
    content: 'Niteraka zazalahy ilay ramatoa ka hoy i Mosesy hoe:'
  - type: text
    content: –Antsoiko hoe Gersôma ity zaza ity satria efa lasa mpitsoa-ponenana atỳ an-tany hafa aho.
  - type: heading
    content: Fidin’Andriamanitra hanafaka an’i Israely i Mosesy
  '23':
  - type: text
    content: 'Tatỳ aoriana ela dia maty ny mpanjakan’i Ejipta. Nitoloko ny Israelita noho ny fanompoany ka niantso vonjy; ary tafakatra hatrany amin’Andriamanitra ny fitarainany noho ny fanompoana. '
  '24':
  - type: text
    content: 'Nandre ny fitarainan’ny Israelita Andriamanitra ka nahatsiaro ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' nataony tamin’i Abrahama sy i Itsehàka ary i Jakôba'
  - type: note
    content: Jereo Gen 15.13-14.
  - type: text
    content: '. '
  '25':
  - type: text
    content: Nijery ny Israelita Andriamanitra ka nahafantatra ny nanjo azy.
  '3':
  - type: text
    content: Taorian’izany, rehefa tsy afa-nanafina azy intsony izy, dia naka sobika zozoro
  - type: note
    content: 'zozoro: zava-maniry anaty rano toy ny volotara sy ny harefo ary ny herana ihany izay fampiasa tamin’ny rary na ny fanaovana takelaka fanoratana.'
  - type: text
    content: ' izay nohosorany dity mineraly sy ditin-kazo, dia napetrany tao ny zaza; ary tao anatin’izany sobika izany no nanaterany azy teny amoron’i Neily teo anivon’ny bararata. '
  '4':
  - type: text
    content: Nijanona lavidavitra ny anabaviny mba hijery izay hanjo azy.
  '5':
  - type: text
    content: 'Taoriana kely dia nidina tao amin’i Neily mba handro ny zazavavin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', ary ireo mpanotrona azy kosa nitsangantsangana teny amoron’ny ony. Nahatazana ilay sobika teo anivon’ny bararata izy ka naniraka ny mpanompovaviny iray haka azy. '
  '6':
  - type: text
    content: 'Nosokafan’ny andriambavy ilay sobika, ka intỳ hitany tao zazalahy kely mitomany; ary onena azy izy ka niantso hoe:'
  - type: text
    content: –Zanaka Hebreo ity!
  '7':
  - type: text
    content: 'Fa niteny tamin’ny zanakavavin’ny Farao kosa ilay anabaviny nanao hoe:'
  - type: text
    content: –Handeha hiantso vehivavy mpitaiza ho anao amin’ny vehivavy hebreo ve aho mba hitaiza ny zaza ho anao?
  '8':
  - type: text
    content: 'Dia novalian’ny andriambavy hoe:'
  - type: text
    content: –Mandehana àry!
  - type: text
    content: 'Dia nandeha razazavavy ka ny renin’ilay zazalahy ihany no nantsoiny. '
  '9':
  - type: text
    content: 'Ary hoy ity andriambavy tamin-dravehivavy:'
  - type: text
    content: –Ento ity zaza ity, ka tezao ho ahy fa izaho no hanome ny karamanao.
  - type: text
    content: Dia nalain-dravehivavy ny zaza ka notezainy.
