document_id: 1KI.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiangonan’i Sekema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 10.1-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nankany Sekema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toerana tokony ho 50 Km avaratr’i Jerosalema. Io tanàna io (jereo Jos 24) dia nitana toerana lehibe tany Israely nandritra ny fotoana ela.
    marker-yv: yv-n
  - type: text
    text: ' i Rehabohama, satria tao no efa nahatongavan’ny Israelita tavaratra rehetra hampanjaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha nandre izany i Jerôbohama zanakalahin’i Nebata, dia mbola tany Ejipta toerana nandosirany an’i Salômôna mpanjaka izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa nisy olona nirahina haka azy; ary tonga izy sy ny vondron’ny Israelita tavaratra rehetra, ka niteny tamin’i Rehabohama hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Irainao dia nampitondra zioga mavesatra anay. Fa ankehitriny kosa, raha mba hamaivaninao ny fanompoana mafy tamin-drainao sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zioga
  - type: text
    text: ' mavesatra nampiantsorohany anay, dia hanompo anao izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny navalin’i Rehabohama azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mandehana aloha fa mbola hieritreritra aho; ka raha afaka telo andro, dia miverena atỳ amiko indray ianareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nody ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I Rehabohama kosa naka hevitra tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' izay mpandraharahan’i Salômôna rainy fony fahavelony ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana no hevitra omenareo havaliko an’ireo vahoaka ireo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ny loholona tamin’i Rehabohama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha izao ianao no vonon-kanompo azy ka manao teny mamy aminy, dia ho mpanomponao hatrany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanjo tsy noraharahain’i Rehabohama ny torohevitra nomen’ny loholona azy; fa ny tovolahy izay nitovitovy taona taminy sady efa mpandraharahany no nakany hevitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay niangavy ahy hanamaivana ny zioga nampiantsorohan-draiko azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ireto tovolahy ireto tamin’i Rehabohama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Niangavian’ireo vahoaka ireo ianao hanamaivana ny zioga mavesatra nampiantsorohan-drainao azy. Koa izao no lazao aminy: «Ny ankikeliko dia lehibe noho ny sandrin-draiko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fomba fitenenana somary ohabolana ka ny heviny dia hazavaina ihany amin’ny tohin’ny valinteny.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin’ny andro fahatelo dia nankany amin’i Rehabohama i Jerôbohama sy ny vahoaka israelita tavaratra rehetra, araka ny tenin’ny mpanjaka hoe: «Miverena atỳ amiko indray ianareo amin’ny andro fahatelo». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Teny mahery no navalin’ny mpanjaka ireo vahoaka fa tsy noraharahainy akory ny torohevitry ny loholona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary araka ny torohevitr’ireo tovolahy no nitenenany taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nampitondra zioga mavesatra anareo ny raiko, fa izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa tsy nankatò ny fitakian’ny vahoaka ny mpanjaka; fa ny TOMPO no nahatonga izany zavatra izany mba hahatanteraka ny fampanantenana izay nampilazainy an’i Ahià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' avy any Silao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.29-39.
    marker-yv: yv-n
  - type: text
    text: ' tamin’i Jerôbohama zanakalahin’i Nebata.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanjakana voazara
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 10.16–11.4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa tsapan’ny Israelita tavaratra rehetra fa tsy nankatoavin’ny mpanjaka ny fitakiany, dia hoy ny navalin’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manana anjara amin’i Davida isika na manana anjara lova amin’ny zanakalahin’i Jisay. Samia mody any an-tranony avy isika, ry Israelita tavaratra; ary ianao kosa, ry zafikelin’i Davida, karakarao ny fanjakanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Sam 20.1.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia samy nody ho any an-tranony avy ny Israelita tavaratra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny Israelita nonina tamin’ny tanànan’i Joda ihany no nanjakan’i Rehabohama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary naniraka an’i Adôrama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mety ho olona iray ihany izy sy ilay nantsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adônirama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 4.6; 5.28, ary i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hadôrama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 2 Tan 10.18.'
    marker-yv: yv-n
  - type: text
    text: ' mpiandraikitra ny asa anterivozona i Rehabohama mpanjaka; nefa nitora-bato an’i Adôrama ny Israelita tavaratra rehetra ka nahafaty azy. Zara raha afa-nitaingina ny kalesiny haingana i Rehabohama mba handositra any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy izany no nikomian’i Israely avaratra tamin’ny taranak’i Davida mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rehefa ren’ny Israelita tavaratra rehetra fa tafaverina indray i Jerôbohama, dia nampiantsoina hankao amin’ny fivoriana izy ka nampanjakainy tamin’i Israely avaratra manontolo; ary dia tsy nisy nanaraka ny taranak’i Davida intsony afa-tsy ny fokon’i Joda ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vao tonga tany Jerosalema i Rehabohama, dia namory miaramila voafantina miisa vondrona 180 tamin’ny fokon’i Joda sy i Benjamîna mba hiady amin’i Israely avaratra ka hamerina azy indray io fanjakana io ho an’ny tenany, izay zanakalahin’i Salômôna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanjo nisy tenin’Andriamanitra tamin’i Semahià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: olon’Andriamanitra
  - type: text
    text: ', dia teny nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '–Ambarao amin’i Rehabohama, zanakalahin’i Salômôna sady mpanjakan’i Joda, ary koa amin’ny taranak’i Joda sy i Benjamîna rehetra ary amin’ny vahoaka sisa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa izao no lazain’ny TOMPO: «Aza mandeha hiady amin’ny Israelita tavaratra mpiray firenena aminareo; samia mody any an-tranony avy ianareo, satria Izaho no nahatonga izao zavatra izao.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nankatoavin’ny olona izany tenin’ny TOMPO izany, ka samy lasa nody tokoa izy araka ny tenin’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nampamboarin’i Jerôbohama ho tanànamimanda i Sekema any amin’ny faritra be tendrombohitr’i Efraîma ka nonenany. Rehefa niala tao Sekema izy, dia nampamboatra an’i Penoela ho tanànamimanda koa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahotan’i Jerôbohama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hoy i Jerôbohama anakampo hoe: «Raha izao no fandehan-javatra, dia mety hiverina amin’ny taranak’i Davida indray ny fanjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa raha mbola miakatra hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ' any Jerosalema ny vahoaka, dia hitodika amin’i Rehabohama mpanjakan’i Joda tompony indray ny fony; ka hamono ahy ho faty izy ary hiverina any amin’i Rehabohama.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nitady hevitra i Jerôbohama mpanjaka ka nanao ombilahikely volamena roa, ary nilaza tamin’ny vahoaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa be izay niakaranareo matetika tany Jerosalema izay, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' ô, koa indreo ny andriamanitrareo izay nitondra anareo niala tany Ejipta'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 32.1-5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny sarivongana volamena iray dia napetrany tao Betela ary ny iray kosa tao Dana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toerana any amin’ny farany atsimo sy farany avaratry ny fanjakan’i Israely* foko folo ireo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nanosika ny olona hanota izany, fa maro ireo no tonga nanaraka ny iray tamin’ny sarivongana hatrany Dana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nanorina trano teny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ' i Jerôbohama sady nanendry mpisorona hafa tamin’ny sarambabem-bahoaka, izay tsy anisan’ny taranak’i Levỳ akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nanendry andro fety koa izy, dia ny andro faha-15 amin’ny volana fahavalo izay mitovitovy amin’ny fety any Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mety ho ny fetin’ny Tranotomboka izany, izay ankalazaina tany Jerosalema manomboka ny andro faha-15 amin’ny volana fahafito; jereo 8.2; Lev 23.33-43.
    marker-yv: yv-n
  - type: text
    text: ' ihany, ary dia nanatitra sorona teo ambony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' koa. Toy izany no nataony tany Betela, fa nanao sorona ho an’ireo ombilahikely namboariny izy; ary nampitoeriny tao Betela ireo mpisorona izay notendreny ho an’ireny toeram-panasinana ireny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melohina ny fanompoam-pivavahana tao Betela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin’ny andro faha-15 amin’ny volana fahavalo dia nanatitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' izay naoriny tao Betela i Jerôbohama. Izy ihany no tompon-tsafidy ny amin’io datin’andro io. Ary nataony andro fety ho an’ny Israelita tavaratra izany ka niakatra teo amin’ny alitara mihitsy i Jerôbohama mba handoro ny sorona hanetona.'
