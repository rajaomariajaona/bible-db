document_id: 1KI.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiangonan’i Sekema
  - type: heading
    content: (Jereo 2 Tan 10.1-15)
  - type: text
    content: Nankany Sekema
  - type: note
    content: Toerana tokony ho 50 Km avaratr’i Jerosalema. Io tanàna io (jereo Jos 24) dia nitana toerana lehibe tany Israely nandritra ny fotoana ela.
  - type: text
    content: ' i Rehabohama, satria tao no efa nahatongavan’ny Israelita tavaratra rehetra hampanjaka azy. '
  '10':
  - type: text
    content: 'Dia hoy ireto tovolahy ireto tamin’i Rehabohama:'
  - type: text
    content: '–Niangavian’ireo vahoaka ireo ianao hanamaivana ny zioga mavesatra nampiantsorohan-drainao azy. Koa izao no lazao aminy: «Ny ankikeliko dia lehibe noho ny sandrin-draiko'
  - type: note
    content: Fomba fitenenana somary ohabolana ka ny heviny dia hazavaina ihany amin’ny tohin’ny valinteny.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.»
  '12':
  - type: text
    content: 'Tamin’ny andro fahatelo dia nankany amin’i Rehabohama i Jerôbohama sy ny vahoaka israelita tavaratra rehetra, araka ny tenin’ny mpanjaka hoe: «Miverena atỳ amiko indray ianareo amin’ny andro fahatelo». '
  '13':
  - type: text
    content: 'Teny mahery no navalin’ny mpanjaka ireo vahoaka fa tsy noraharahainy akory ny torohevitry ny loholona; '
  '14':
  - type: text
    content: 'ary araka ny torohevitr’ireo tovolahy no nitenenany taminy hoe:'
  - type: text
    content: –Nampitondra zioga mavesatra anareo ny raiko, fa izaho kosa vao mainka hanampy trotraka izany; karavasy tsotra no namaizan-draiko anareo, fa karavasy misy faraingo kosa no hamaizako anareo.
  '15':
  - type: text
    content: 'Koa tsy nankatò ny fitakian’ny vahoaka ny mpanjaka; fa ny TOMPO no nahatonga izany zavatra izany mba hahatanteraka ny fampanantenana izay nampilazainy an’i Ahià '
  - type: text
    content: mpaminany
  - type: text
    content: ' avy any Silao'
  - type: note
    content: Jereo 11.29-39.
  - type: text
    content: ' tamin’i Jerôbohama zanakalahin’i Nebata.'
  - type: heading
    content: Ny fanjakana voazara
  - type: heading
    content: (Jereo 2 Tan 10.16–11.4)
  '16':
  - type: text
    content: 'Rehefa tsapan’ny Israelita tavaratra rehetra fa tsy nankatoavin’ny mpanjaka ny fitakiany, dia hoy ny navalin’ireo hoe:'
  - type: text
    content: –Tsy manana anjara amin’i Davida isika na manana anjara lova amin’ny zanakalahin’i Jisay. Samia mody any an-tranony avy isika, ry Israelita tavaratra; ary ianao kosa, ry zafikelin’i Davida, karakarao ny fanjakanao
  - type: note
    content: Ampit 2 Sam 20.1.
  - type: text
    content: '!'
  - type: text
    content: 'Dia samy nody ho any an-tranony avy ny Israelita tavaratra rehetra. '
  '17':
  - type: text
    content: 'Fa ny Israelita nonina tamin’ny tanànan’i Joda ihany no nanjakan’i Rehabohama. '
  '18':
  - type: text
    content: Ary naniraka an’i Adôrama
  - type: note
    content: Mety ho olona iray ihany izy sy ilay nantsoina hoe Adônirama ao amin’ny 4.6; 5.28, ary i Hadôrama ao amin’ny 2 Tan 10.18.
  - type: text
    content: ' mpiandraikitra ny asa anterivozona i Rehabohama mpanjaka; nefa nitora-bato an’i Adôrama ny Israelita tavaratra rehetra ka nahafaty azy. Zara raha afa-nitaingina ny kalesiny haingana i Rehabohama mba handositra any Jerosalema. '
  '19':
  - type: text
    content: Toy izany no nikomian’i Israely avaratra tamin’ny taranak’i Davida mandraka androany.
  '2':
  - type: text
    content: 'Raha nandre izany i Jerôbohama zanakalahin’i Nebata, dia mbola tany Ejipta toerana nandosirany an’i Salômôna mpanjaka izy; '
  '20':
  - type: text
    content: Rehefa ren’ny Israelita tavaratra rehetra fa tafaverina indray i Jerôbohama, dia nampiantsoina hankao amin’ny fivoriana izy ka nampanjakainy tamin’i Israely avaratra manontolo; ary dia tsy nisy nanaraka ny taranak’i Davida intsony afa-tsy ny fokon’i Joda ihany.
  '21':
  - type: text
    content: 'Vao tonga tany Jerosalema i Rehabohama, dia namory miaramila voafantina miisa vondrona 180 tamin’ny fokon’i Joda sy i Benjamîna mba hiady amin’i Israely avaratra ka hamerina azy indray io fanjakana io ho an’ny tenany, izay zanakalahin’i Salômôna. '
  '22':
  - type: text
    content: 'Kanjo nisy tenin’Andriamanitra tamin’i Semahià '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ', dia teny nanao hoe:'
  '23':
  - type: text
    content: '–Ambarao amin’i Rehabohama, zanakalahin’i Salômôna sady mpanjakan’i Joda, ary koa amin’ny taranak’i Joda sy i Benjamîna rehetra ary amin’ny vahoaka sisa, '
  '24':
  - type: text
    content: 'fa izao no lazain’ny TOMPO: «Aza mandeha hiady amin’ny Israelita tavaratra mpiray firenena aminareo; samia mody any an-tranony avy ianareo, satria Izaho no nahatonga izao zavatra izao.»'
  - type: text
    content: Dia nankatoavin’ny olona izany tenin’ny TOMPO izany, ka samy lasa nody tokoa izy araka ny tenin’ny TOMPO.
  '25':
  - type: text
    content: Ary nampamboarin’i Jerôbohama ho tanànamimanda i Sekema any amin’ny faritra be tendrombohitr’i Efraîma ka nonenany. Rehefa niala tao Sekema izy, dia nampamboatra an’i Penoela ho tanànamimanda koa.
  - type: heading
    content: Ny fahotan’i Jerôbohama
  '26':
  - type: text
    content: 'Hoy i Jerôbohama anakampo hoe: «Raha izao no fandehan-javatra, dia mety hiverina amin’ny taranak’i Davida indray ny fanjakana. '
  '27':
  - type: text
    content: 'Fa raha mbola miakatra hanao '
  - type: text
    content: sorona
  - type: text
    content: ' ao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' any Jerosalema ny vahoaka, dia hitodika amin’i Rehabohama mpanjakan’i Joda tompony indray ny fony; ka hamono ahy ho faty izy ary hiverina any amin’i Rehabohama.» '
  '28':
  - type: text
    content: 'Dia nitady hevitra i Jerôbohama mpanjaka ka nanao ombilahikely volamena roa, ary nilaza tamin’ny vahoaka hoe:'
  - type: text
    content: '–Efa be izay niakaranareo matetika tany Jerosalema izay, ry '
  - type: text
    content: Israely
  - type: text
    content: ' ô, koa indreo ny andriamanitrareo izay nitondra anareo niala tany Ejipta'
  - type: note
    content: Ampit Eks 32.1-5.
  - type: text
    content: .
  '29':
  - type: text
    content: Ny sarivongana volamena iray dia napetrany tao Betela ary ny iray kosa tao Dana
  - type: note
    content: Toerana any amin’ny farany atsimo sy farany avaratry ny fanjakan’i Israely* foko folo ireo.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'koa nisy olona nirahina haka azy; ary tonga izy sy ny vondron’ny Israelita tavaratra rehetra, ka niteny tamin’i Rehabohama hoe:'
  '30':
  - type: text
    content: Nanosika ny olona hanota izany, fa maro ireo no tonga nanaraka ny iray tamin’ny sarivongana hatrany Dana.
  '31':
  - type: text
    content: 'Nanorina trano teny amin’ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' i Jerôbohama sady nanendry mpisorona hafa tamin’ny sarambabem-bahoaka, izay tsy anisan’ny taranak’i Levỳ akory. '
  '32':
  - type: text
    content: Nanendry andro fety koa izy, dia ny andro faha-15 amin’ny volana fahavalo izay mitovitovy amin’ny fety any Joda
  - type: note
    content: Mety ho ny fetin’ny Tranotomboka izany, izay ankalazaina tany Jerosalema manomboka ny andro faha-15 amin’ny volana fahafito; jereo 8.2; Lev 23.33-43.
  - type: text
    content: ' ihany, ary dia nanatitra sorona teo ambony '
  - type: text
    content: alitara
  - type: text
    content: ' koa. Toy izany no nataony tany Betela, fa nanao sorona ho an’ireo ombilahikely namboariny izy; ary nampitoeriny tao Betela ireo mpisorona izay notendreny ho an’ireny toeram-panasinana ireny.'
  - type: heading
    content: Melohina ny fanompoam-pivavahana tao Betela
  '33':
  - type: text
    content: 'Tamin’ny andro faha-15 amin’ny volana fahavalo dia nanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' izay naoriny tao Betela i Jerôbohama. Izy ihany no tompon-tsafidy ny amin’io datin’andro io. Ary nataony andro fety ho an’ny Israelita tavaratra izany ka niakatra teo amin’ny alitara mihitsy i Jerôbohama mba handoro ny sorona hanetona.'
  '4':
  - type: text
    content: '–Irainao dia nampitondra zioga mavesatra anay. Fa ankehitriny kosa, raha mba hamaivaninao ny fanompoana mafy tamin-drainao sy ny '
  - type: text
    content: zioga
  - type: text
    content: ' mavesatra nampiantsorohany anay, dia hanompo anao izahay.'
  '5':
  - type: text
    content: 'Dia hoy ny navalin’i Rehabohama azy:'
  - type: text
    content: –Mandehana aloha fa mbola hieritreritra aho; ka raha afaka telo andro, dia miverena atỳ amiko indray ianareo.
  - type: text
    content: 'Dia lasa nody ny olona. '
  '6':
  - type: text
    content: 'I Rehabohama kosa naka hevitra tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' izay mpandraharahan’i Salômôna rainy fony fahavelony ka nanontany azy hoe:'
  - type: text
    content: –Ahoana no hevitra omenareo havaliko an’ireo vahoaka ireo?
  '7':
  - type: text
    content: 'Dia hoy ny loholona tamin’i Rehabohama:'
  - type: text
    content: –Raha izao ianao no vonon-kanompo azy ka manao teny mamy aminy, dia ho mpanomponao hatrany izy.
  '8':
  - type: text
    content: 'Kanjo tsy noraharahain’i Rehabohama ny torohevitra nomen’ny loholona azy; fa ny tovolahy izay nitovitovy taona taminy sady efa mpandraharahany no nakany hevitra, '
  '9':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay niangavy ahy hanamaivana ny zioga nampiantsorohan-draiko azy.
