    - type: text
      text: '5'
  - type: text
    text: Homeny anao anie izay zavatra irînao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hotanterahiny izay rehetra kasainao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hanaovanay fihobiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fandresena ho azonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hahofahofanay ny faneva
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho voninahitry ny Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hotanterahin’ny TOMPO anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay rehetra angatahinao aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fantatro izao ankehitriny fa ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: manome fandresena ny mpanjaka nohosorany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any an-danitra toeramasiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no amaliany ny vavaka ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny herin’ny tanany ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no anolorany fandresena ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny an’ny sasany, ny kalesiny no itokiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny an’ny hafa, ny soavaliny no iankinany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny anay kosa, ny anaran’ny TOMPO Andriamanitray
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hany hery ianteheranay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa ireny mitolefika sy mianjera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izahay kosa maharitra mijoro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: TOMPO ô, omeo fandresena ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mba valio ny vavaka ataonay
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny andro iantsoanay vonjy aminy!
