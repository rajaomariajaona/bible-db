type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Vavaka ho an’ny mpanjaka
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: TOMPO ô, omeo fandresena ny mpanjaka;
  - type: text
    content: ary mba valio ny vavaka ataonay
  - type: text
    content: amin’ny andro iantsoanay vonjy aminy!
  '2':
  - type: text
    content: Hovalian’ny TOMPO vavaka
  - type: text
    content: amin’ny andro mahory anie ianao,
  - type: text
    content: harovan’ilay Andriamanitr’i Jakôba,
  '3':
  - type: text
    content: handefasany vonjy avy ao an-
  - type: text
    content: toeramasiny
  - type: text
    content: 'ary hotohanany avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: '!'
  '4':
  - type: text
    content: Hotsaroany anie ny fanatitrao rehetra
  - type: text
    content: 'ary hankasitrahiny ny '
  - type: text
    content: sorona
  - type: text
    content: ' doranao!'
  - type: text
    content: Fiatoana
  '5':
  - type: text
    content: Homeny anao anie izay zavatra irînao
  - type: text
    content: ary hotanterahiny izay rehetra kasainao!
  '6':
  - type: text
    content: Dia hanaovanay fihobiana
  - type: text
    content: ny fandresena ho azonao;
  - type: text
    content: ary hahofahofanay ny faneva
  - type: text
    content: ho voninahitry ny Andriamanitsika.
  - type: text
    content: Eny, hotanterahin’ny TOMPO anie
  - type: text
    content: izay rehetra angatahinao aminy!
  '7':
  - type: text
    content: Fantatro izao ankehitriny fa ny TOMPO
  - type: text
    content: manome fandresena ny mpanjaka nohosorany;
  - type: text
    content: avy any an-danitra toeramasiny
  - type: text
    content: no amaliany ny vavaka ataony,
  - type: text
    content: ka ny herin’ny tanany ankavanana
  - type: text
    content: no anolorany fandresena ho azy.
  '8':
  - type: text
    content: Ny an’ny sasany, ny kalesiny no itokiany;
  - type: text
    content: ny an’ny hafa, ny soavaliny no iankinany;
  - type: text
    content: ny anay kosa, ny anaran’ny TOMPO Andriamanitray
  - type: text
    content: no hany hery ianteheranay.
  '9':
  - type: text
    content: Koa ireny mitolefika sy mianjera,
  - type: text
    content: fa izahay kosa maharitra mijoro.
