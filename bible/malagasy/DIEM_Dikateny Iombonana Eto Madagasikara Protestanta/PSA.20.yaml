  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: TOMPO ô, omeo fandresena ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba valio ny vavaka ataonay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro iantsoanay vonjy aminy!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovalian’ny TOMPO vavaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny andro mahory anie ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harovan’ilay Andriamanitr’i Jakôba,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handefasany vonjy avy ao an-
    - type: usfm
