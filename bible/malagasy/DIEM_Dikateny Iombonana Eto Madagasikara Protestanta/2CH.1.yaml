document_id: 2CH.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: TANTARAN’I SALÔMÔNA, MPANJAKAN’I ISRAELY
  - type: text
    content: Ary i Salômôna, zanakalahin’i Davida, nanamafy orina ny fahefana maha mpanjaka azy; ary niaraka tamin’i Salômôna ny TOMPO Andriamaniny ka nanandratra azy ho amin’ny ambony indrindra.
  - type: heading
    content: Nangata-pahendrena tamin’Andriamanitra i Salômôna
  - type: heading
    content: (Jereo 1 Mp 3.4-15)
  '10':
  - type: text
    content: Koa omeo fahendrena sy fahaiza-manavaka aho hitondrako ny tenako manoloana ity vahoaka ity; fa raha tsy eo izany, dia iza indray no ho afaka hifehy izao vahoakanao betsaka izao?
  '11':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’i Salômôna:'
  - type: text
    content: '–Satria izany no tao am-ponao fa tsy nangataka vola aman-karena na voninahitra na ny hahafaty ireo fahavalonao ianao, ary tsy nangataka ny ho ela velona aza fa fahendrena sy fahaiza-manavaka hifehezana ny vahoakako izay nananganako anao ho mpanjaka; '
  '12':
  - type: text
    content: koa dia omena anao ny fahendrena sy ny fahaiza-manavaka. Ary homeko vola aman-karena koa ianao, mihoatra noho izay nananan’ireo mpanjaka hafa rehetra tany alohanao, ary tsy hisy hanana toy izany ny any aorianao.
  '13':
  - type: text
    content: Dia niverina tany Jerosalema i Salômôna rehefa niala teo amin’ny toeram-pisoronana tao Gibehôna, izay nisy ny Tranolay fihaonana; ary nanjaka tamin’i Israely izy.
  - type: heading
    content: Hery aman-karena nananan’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 10.26-29; 2 Tan 9.25-28)
  '14':
  - type: text
    content: Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly i Salômôna ka nanana kalesy 1 400 ary mpitaingin-tsoavaly 12 000
  - type: note
    content: Jereo 1 Mp 5.6 sy nta.
  - type: text
    content: ' izay nisy natobiny tamin’ireo tanàna fitoeran-kalesy ary nisy notanany teo aminy tao Jerosalema. '
  '15':
  - type: text
    content: Toy ny hamaroan’ny vatokely no nataon’ny mpanjaka habetsaky ny volafotsy sy volamena
  - type: note
    content: Jereo Deot 17.17 sy nta.
  - type: text
    content: ' tao Jerosalema; ary toy ny hamaroan’ny aviavy any '
  - type: text
    content: Sefelà
  - type: text
    content: ' no nataony habetsaky ny hazo sedera. '
  '16':
  - type: text
    content: Ny soavalin’i Salômôna dia avy tany Ejipta
  - type: note
    content: Toa tsy i Ejipta fa i Motsirỳ.
  - type: text
    content: ' sy Silisia; ireo mpandranton’ny mpanjaka no nividy azy tany. '
  '17':
  - type: text
    content: Ny kalesy fitondra miady anankiray nentin’ny mpandranto niakatra avy tany Ejipta
  - type: note
    content: Jereo ny naoty eo aloha.
  - type: text
    content: ' dia sekela volafotsy eninjato, ary ny soavaly anankiray kosa dia nitentina sekela volafotsy 150; toy izany vidiny izany koa no nitondran’ireo mpandranto ireo ho an’ny mpanjakan’ny Hetita sy ho an’ny mpanjakan’i Siria.'
  - type: heading
    content: Fiomanan’i Salômôna hanorina ny tempoly
  - type: heading
    content: (Jereo 1 Mp 5.15-32; 7.13-14)
  '18':
  - type: text
    content: 'Nanapa-kevitra i Salômôna fa hanao '
  - type: text
    content: tempoly
  - type: text
    content: ' ho voninahitry ny TOMPO sy lapa ho an’ny tenany'
  - type: note
    content: Ao amin’ny dkt sasany dia voalahatra ho 2.1 ny and 1.18 ka manjary 2.2-18 ny and 2.1-17.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Novorîn’i Salômôna ny Israelita rehetra, dia ny mpifehy vondro-miaramila sy mpifehy andia-miaramila ary ny mpitsara sy ireo tompon’andraikitra rehetra teo amin’i Israely, izany hoe ireo filoham-pianakaviana. '
  '3':
  - type: text
    content: 'Dia niara-niakatra ho any amin’ny '
  - type: text
    content: toeram-pisoronana
  - type: text
    content: ' tao Gibehôna'
  - type: note
    content: 'Gibehôna: jereo 1 Mp 3.4 sy nta.'
  - type: text
    content: ' i Salômôna sy ny olona rehetra tafangona; fa tao no nisy ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' tamin’Andriamanitra, dia ilay nataon’i Mosesy mpanompon’ny TOMPO tany an-taniefitra'
  - type: note
    content: Momba ny fanamboarana ny Tranolay fihaonana, jereo Eks 36.8-38.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ny '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: ' moa dia efa nampakarin’i Davida'
  - type: note
    content: Momba ny fitondrana ny Vatamasina, jereo 1 Tan 13;15.
  - type: text
    content: ' avy tany Kiriata-Jeharîma'
  - type: note
    content: 'Kiriata-Jeharîma: jereo 1 Sam 6.21 sy nta.'
  - type: text
    content: ' ho ao amin’ny toerana izay nomaniny hasiana azy; fa efa nanangana lay ho azy tao Jerosalema izy. '
  '5':
  - type: text
    content: 'Fa ny '
  - type: text
    content: alitara
  - type: text
    content: ' halimo izay namboarin’i Betsalela'
  - type: note
    content: Momba an’i Betsalela sy ny fanamboarana ny alitara, jereo Eks 35.30–36.1; 38.1-2.
  - type: text
    content: ' zanakalahin’i Orỳ sady zafikelin’i Hora kosa dia teo anoloan’ny Fonena-masin’ny Tompo tao Gibehôna.'
  - type: text
    content: 'Teo no nahatongavan’i Salômôna sy ny Israelita tafangona mba hanontany ny TOMPO. '
  '6':
  - type: text
    content: 'Dia nandroso teo anatrehan’ny TOMPO i Salômôna ka nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo arivo teo ambonin’ny alitara halimo akaikin’ny Tranolay fihaonana. '
  '7':
  - type: text
    content: 'Tamin’ny alina iny no nisehoan’Andriamanitra i Salômôna ka nilazany hoe:'
  - type: text
    content: –Angataho izay tianao homeko anao!
  '8':
  - type: text
    content: 'Dia hoy i Salômôna tamin’Andriamanitra:'
  - type: text
    content: '–Efa nanehoanao fitiavana lehibe i Davida raiko; ary nampanjaka ahy handimby azy Ianao. '
  '9':
  - type: text
    content: Koa ankehitriny, ry TOMPO Andriamanitra ô, aoka ho tanteraka ny fampanantenana nataonao tamin’i Davida raiko, satria Ianao no efa nampanjaka ahy tamina vahoaka marobe tahaka ny vovo-tany
  - type: note
    content: Jereo Gen 13.16; 28.14.
  - type: text
    content: '. '
