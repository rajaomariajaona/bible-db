document_id: 2CH.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: TANTARAN’I SALÔMÔNA, MPANJAKAN’I ISRAELY
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary i Salômôna, zanakalahin’i Davida, nanamafy orina ny fahefana maha mpanjaka azy; ary niaraka tamin’i Salômôna ny TOMPO Andriamaniny ka nanandratra azy ho amin’ny ambony indrindra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nangata-pahendrena tamin’Andriamanitra i Salômôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 3.4-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Novorîn’i Salômôna ny Israelita rehetra, dia ny mpifehy vondro-miaramila sy mpifehy andia-miaramila ary ny mpitsara sy ireo tompon’andraikitra rehetra teo amin’i Israely, izany hoe ireo filoham-pianakaviana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niara-niakatra ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-pisoronana
  - type: text
    text: ' tao Gibehôna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Mp 3.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' i Salômôna sy ny olona rehetra tafangona; fa tao no nisy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' tamin’Andriamanitra, dia ilay nataon’i Mosesy mpanompon’ny TOMPO tany an-taniefitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny fanamboarana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tranolay fihaonana,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 36.8-38.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’Andriamanitra
  - type: text
    text: ' moa dia efa nampakarin’i Davida'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny fitondrana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Vatamasina,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 1 Tan 13;15.'
    marker-yv: yv-n
  - type: text
    text: ' avy tany Kiriata-Jeharîma'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kiriata-Jeharîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 6.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ho ao amin’ny toerana izay nomaniny hasiana azy; fa efa nanangana lay ho azy tao Jerosalema izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' halimo izay namboarin’i Betsalela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Betsalela sy ny fanamboarana ny alitara,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Eks 35.30–36.1; 38.1-2.'
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Orỳ sady zafikelin’i Hora kosa dia teo anoloan’ny Fonena-masin’ny Tompo tao Gibehôna.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Teo no nahatongavan’i Salômôna sy ny Israelita tafangona mba hanontany ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandroso teo anatrehan’ny TOMPO i Salômôna ka nanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo arivo teo ambonin’ny alitara halimo akaikin’ny Tranolay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny alina iny no nisehoan’Andriamanitra i Salômôna ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Angataho izay tianao homeko anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Salômôna tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Efa nanehoanao fitiavana lehibe i Davida raiko; ary nampanjaka ahy handimby azy Ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa ankehitriny, ry TOMPO Andriamanitra ô, aoka ho tanteraka ny fampanantenana nataonao tamin’i Davida raiko, satria Ianao no efa nampanjaka ahy tamina vahoaka marobe tahaka ny vovo-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 13.16; 28.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa omeo fahendrena sy fahaiza-manavaka aho hitondrako ny tenako manoloana ity vahoaka ity; fa raha tsy eo izany, dia iza indray no ho afaka hifehy izao vahoakanao betsaka izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Salômôna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Satria izany no tao am-ponao fa tsy nangataka vola aman-karena na voninahitra na ny hahafaty ireo fahavalonao ianao, ary tsy nangataka ny ho ela velona aza fa fahendrena sy fahaiza-manavaka hifehezana ny vahoakako izay nananganako anao ho mpanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: koa dia omena anao ny fahendrena sy ny fahaiza-manavaka. Ary homeko vola aman-karena koa ianao, mihoatra noho izay nananan’ireo mpanjaka hafa rehetra tany alohanao, ary tsy hisy hanana toy izany ny any aorianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia niverina tany Jerosalema i Salômôna rehefa niala teo amin’ny toeram-pisoronana tao Gibehôna, izay nisy ny Tranolay fihaonana; ary nanjaka tamin’i Israely izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hery aman-karena nananan’i Salômôna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 10.26-29; 2 Tan 9.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nanangona kalesy fitondra miady sy mpitaingin-tsoavaly i Salômôna ka nanana kalesy 1 400 ary mpitaingin-tsoavaly 12 000
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 5.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izay nisy natobiny tamin’ireo tanàna fitoeran-kalesy ary nisy notanany teo aminy tao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toy ny hamaroan’ny vatokely no nataon’ny mpanjaka habetsaky ny volafotsy sy volamena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 17.17 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tao Jerosalema; ary toy ny hamaroan’ny aviavy any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ' no nataony habetsaky ny hazo sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny soavalin’i Salômôna dia avy tany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Toa tsy i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ejipta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa i Motsirỳ.'
    marker-yv: yv-n
  - type: text
    text: ' sy Silisia; ireo mpandranton’ny mpanjaka no nividy azy tany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny kalesy fitondra miady anankiray nentin’ny mpandranto niakatra avy tany Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny naoty eo aloha.
    marker-yv: yv-n
  - type: text
    text: ' dia sekela volafotsy eninjato, ary ny soavaly anankiray kosa dia nitentina sekela volafotsy 150; toy izany vidiny izany koa no nitondran’ireo mpandranto ireo ho an’ny mpanjakan’ny Hetita sy ho an’ny mpanjakan’i Siria.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiomanan’i Salômôna hanorina ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 5.15-32; 7.13-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanapa-kevitra i Salômôna fa hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ho voninahitry ny TOMPO sy lapa ho an’ny tenany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao amin’ny dkt sasany dia voalahatra ho 2.1 ny and 1.18 ka manjary 2.2-18 ny and 2.1-17.
    marker-yv: yv-n
  - type: text
    text: .
