document_id: ACT.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Miaraka amin’i Paoly sy i Silasy i Timôty
  - type: text
    content: Tonga tany Derba i Paoly, ary avy eo dia tany Listra. Nisy mpino anankiray natao hoe Timôty tao Listra
  - type: note
    content: 'Derba sy Listra: jereo 14.8, 21.'
  - type: text
    content: ', Jiosy niova ho kristianina ny reniny fa ny rainy kosa Grika. '
  '10':
  - type: text
    content: 'Tsy nangataka andro izahay taorian’izany fahitàn’i Paoly izany, fa nivonona hiainga ho any Masedônia, satria azonay antoka fa nantsoin’Andriamanitra hitondra ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' amin’ny olona any izahay.'
  - type: heading
    content: Tonga kristianina i Lidia
  '11':
  - type: text
    content: Niondrana an-tsambo tao Trôasy izahay ka nizotra nivantana ho any amin’ny nosy Samôtrasy
  - type: note
    content: 'Neapôly: seranana avaratry ny ranomasina Ezea tsy lavitra ny tanàna Filipy.'
  - type: text
    content: '; ary tafapaka hatrany Neapôly, ny ampitson’iny. '
  '12':
  - type: text
    content: Avy eo izahay, dia nankany Filipy, tanànan’ny faritany voalohany ao Masedônia
  - type: note
    content: 'tanànan’ny faritany voalohany ao Masedônia: na tanàna voalohany vantanina ao amin’io faritanin’i Masedônia io, araka ny stf maro. Nisy faritany efatra tao Masedônia; ary i Filipy dia isan’ny tanàn-dehibe tao amin’ny faritany voalohany (renivohitra: Amfipôly).'
  - type: text
    content: ', sady zanatany rômanina. Nijanona andro maromaro tao amin’io tanàna io izahay. '
  '13':
  - type: text
    content: 'Tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' dia lasa tany ivelan’ny vavahadin-tanàna izahay, ka nankeny amoron’ny ony satria noheverinay fa nisy toeram-pivavahana ho an’ny Jiosy teny. Nipetrapetraka izahay ka tafaresaka tamin’ny vehivavy tafavory teo. '
  '14':
  - type: text
    content: 'I Lidia no anaran’ny anankiray tamin’ireo vehivavy ireo; avy any an-tanànan’i Tiatira izy, mpivarotra lamba jaky mena sarobidy, ary '
  - type: text
    content: mpanaja an’Andriamanitra
  - type: text
    content: '. Nihaino tsara anay ravehivavy io ary nosokafan’ny Tompo ny fony mba ho babon’ny teny nolazain’i Paoly. '
  '15':
  - type: text
    content: 'Nony avy natao '
  - type: text
    content: batisa
  - type: text
    content: ' izy mbamin’ny ankohonany'
  - type: note
    content: Ampit 16.33; 18.8.
  - type: text
    content: ', dia nanasa anay i Lidia nanao hoe:'
  - type: text
    content: –Satria noheverinareo fa mino ny Tompo tokoa aho, dia mandrosoa ianareo hiantrano any amiko.
  - type: text
    content: Ary notereny mihitsy izahay.
  - type: heading
    content: Aiditra am-ponja ao Filipy i Paoly sy i Silasy
  '16':
  - type: text
    content: Raha nandeha nankeny amin’ilay toeram-pivavahana izahay indray andro, dia notsenain’ity zazavavy anankiray mpanompon’olona. Azona fanahy atao hoe Pitôna
  - type: note
    content: Ny hoe Pitôna dia ilay bibilava mpiambina ny ôrakla tao Delfa, ka tatỳ aoriana dia isan’ny fomba enti-manondro ny tromba maminany rehetra rehetra izany.
  - type: text
    content: ' razazavavy; ary asesik’io fanahy io hanambara zavatra izy ka nampahazo vola be ireo tompony noho ny fanambaràna nataony. '
  '17':
  - type: text
    content: 'Nanjohy anay sy i Paoly izy sady niantsoantso hoe:'
  - type: text
    content: –Mpanompon’ilay Andriamanitra Avo indrindra ireo lehilahy ireo! Ny lalam-pamonjena no torîny aminareo!
  '18':
  - type: text
    content: 'Andro maromaro no nanaovan-drazazavavy toy izany. Tofoka i Paoly nony ela ka nitodika azy ary niteny tamin’ny fanahy Pitôna hoe:'
  - type: text
    content: '–Mandidy anao amin’ny anaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' aho, mialà aminy!'
  - type: text
    content: 'Dia niala taminy teo no ho eo ilay fanahy. '
  '19':
  - type: text
    content: 'Nony hitan’ny tompony fa tsy anantenana fahazoam-bola intsony ity mpanompovaviny, dia ry i Paoly sy i Silasy no nosamboriny ka notaritaritiny hankeo an-kianja hiatrika ny manampahefana. '
  '2':
  - type: text
    content: 'Tsara laza tamin’ireo havana iray finoana tany Listra sy tany Ikôniôma i Timôty '
  '20':
  - type: text
    content: 'Natolony tamin’ny mpanao fanjakana rômanina izy roa lahy sady nataony hoe:'
  - type: text
    content: '–Mampisavorovoro vahoaka eto amin’ny tanànantsika ireto lehilahy ireto. Jiosy izy roa lahy ireo '
  '21':
  - type: text
    content: ary nampianatra fomba amam-panao tsy azontsika raisina na arahina, noho ny maha rômanina antsika.
  '22':
  - type: text
    content: 'Dia nirohotra namely an’i Paoly sy i Silasy ny vahoaka; ary anisan’ireo mpanao fanjakana nendahina fitafiana sy nokaravasina izy roa lahy. '
  '23':
  - type: text
    content: 'Nony avy nandalasina kapoka izy roa lahy, dia nampidirina am-ponja ka nofeperana ilay mpiambina mba hanao andrimaso azy tsara. '
  '24':
  - type: text
    content: Vao azon’ny mpiambina izany baiko izany, dia nampidiriny tao am-ponja anatiny indrindra izy roa lahy ary nasiany boloky hazo ny tongony.
  '25':
  - type: text
    content: 'Tamin’ny mamatonalina, dia nivavaka sy nihira fiderana an’Andriamanitra i Paoly sy i Silasy; ary nihaino azy roa lahy ny gadra hafa. '
  '26':
  - type: text
    content: 'Dia injay nisy horohorontany mafy tonga tampoka nanozongozona ny fonja hatrany amin’ny fanorenany. Nivoha nidanadana ho azy ny varavarana rehetra, ary samy nivaha ho azy ny fatoran’ireo gadra rehetra. '
  '27':
  - type: text
    content: 'Tamin’izay dia taitra ilay mpiambina; ary nony hitany fa nivoha avokoa ny varavaran’ny fonja, dia nanatsoaka ny sabany saika hamono tena izy satria nampoiziny ho efa nitsoaka nandositra avokoa ny gadra. '
  '28':
  - type: text
    content: 'Fa niantso mafy i Paoly nanao hoe:'
  - type: text
    content: –Aza mamono tena, fa indreto avokoa izahay!
  '29':
  - type: text
    content: 'Dia nangataka jiro ilay mpiambina ka niditra faingana nankao amin’ny fonja anatiny indrindra; ary tora-kovitra izy no niantoraka teo anoloan’i Paoly sy i Silasy. '
  '3':
  - type: text
    content: 'ka nokasain’i Paoly ho mpiara-dia aminy. Dia nalain’i Paoly i Timôty ka noforany, mba tsy hanan-kolazaina ny Jiosy mponina amin’iny faritany iny, satria fantatry ny besinimaro fa Grika ny rainy. '
  '30':
  - type: text
    content: 'Dia navoakan’ilay mpiambina izy roa lahy sady nanontaniany hoe:'
  - type: text
    content: –Inona, tompoko, no tokony hataoko mba hovonjena aho?
  '31':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Minoa an’i Jesoa Tompo, dia hovonjena ianao mbamin’ny ankohonanao!
  '32':
  - type: text
    content: 'Dia nitorian’i Paoly sy i Silasy ny tenin’ny Tompo ilay mpiambina mbamin’izay rehetra tao an-tranony. '
  '33':
  - type: text
    content: 'Tamin’izany ora izany, iny alina iny ihany, dia nandray azy roa lahy ilay mpiambina ka nanasa ny feriny; ary natao '
  - type: text
    content: batisa
  - type: text
    content: ' niaraka tamin’izay izy sy ny ankohonany'
  - type: note
    content: Ampit 16.15; 18.8.
  - type: text
    content: ' rehetra. '
  '34':
  - type: text
    content: Nentin’ilay mpiambina niakatra tao an-tranony i Paoly sy i Silasy ka norosoany sakafo. Ary niravoravo niaraka tamin’ny olona rehetra tao an-tranony ralehilahy, noho izy efa tonga mpino an’Andriamanitra.
  '35':
  - type: text
    content: Nony maraina ny andro, dia naniraka mpitan-defona
  - type: note
    content: Ireo mpitan-defona na koa ireo mpitan-karavasy dia mandeha tsiroaroa manotrona sy manaraka ny mpanao fanjakana, mba hahafantarana ny maha manampahefana ny mpanao fanjakana.
  - type: text
    content: ' ireo mpanao fanjakana rômanina hilaza amin’ny mpiambina hoe:'
  - type: text
    content: –Alefaso ireo olona ireo.
  '36':
  - type: text
    content: 'Dia tonga ny mpiambina ka nampita hafatra tamin’i Paoly hoe:'
  - type: text
    content: –Nandefa baiko hanafahana anareo roa lahy ny mpanao fanjakana. Mahazo mivoaka ianareo, ka mandehana soa aman-tsara.
  '37':
  - type: text
    content: 'Fa hoy i Paoly tamin’ireo mpitan-defona:'
  - type: text
    content: –Olona mizaka ny zom-pirenena rômanina
  - type: note
    content: Fantatr’i Paoly fa araka ny lalàna rômanina dia tsy azo atao ny mikapoka ny olom-pirenena; ary ampiasain’i Paoly ombieniombieny izany zo maha olom-pirenena rômanina azy izany (22.25-29; 23.27).
  - type: text
    content: ' izahay, kanefa nodarofana kapoka teo imason’ny vahoaka na dia tsy voatsara ara-dalàna aza; ary koa nampidirina am-ponja. Ka ankehitriny ve dia havoakan-dry zareo an-tsokosoko izahay? Sanatria! Aoka ny tenan’ireo mpanao fanjakana mihitsy no ho tonga atỳ hamoaka anay!'
  '38':
  - type: text
    content: 'Dia notaterin’ny mpitan-defona tamin’ny mpanao fanjakana rômanina izany teny izany. Raiki-tahotra ry zareo nony nandre fa olona mizaka ny zom-pirenena rômanina i Paoly sy i Silasy. '
  '39':
  - type: text
    content: 'Dia tonga ireo mpanao fanjakana ka niteny moramora tamin’izy roa lahy ary nitondra azy nivoaka ny fonja sady nangataka azy mba hiala amin’ny tanàna. '
  '4':
  - type: text
    content: Tamin’ny tanàna rehetra notetezin’i Paoly sy ny namany dia notolorany an’ireo hevitra tapaky
  - type: note
    content: Ireo fanapahan-kevitra ireo dia voafintina an-taratasy ao amin’ny Asa 15.23-29, ary hita ao koa ny antonantony.
  - type: text
    content: ' ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy '
  - type: text
    content: loholona
  - type: text
    content: ' tany Jerosalema ny mpino, ary nasainy nitandrina izany. '
  '40':
  - type: text
    content: Rehefa tafavoaka ny fonja i Paoly sy i Silasy, dia nankany an-tranon’i Lidia. Ary lasa nandeha izy roa lahy nony avy nahita sy nampirisika ny havana iray finoana.
  '5':
  - type: text
    content: Koa nihamatotra ara-pinoana ny Fiangonana rehetra ary nitombo isa hatrany isan’andro vaky.
  - type: heading
    content: Ny fahitàn’i Paoly tao Trôasy
  '6':
  - type: text
    content: Noraran’ny Fanahy Masina tsy hitory ny tenin’Andriamanitra tany Azia i Paoly sy ny namany ka nandeha namaky ny faritany Frijia sy Galatia
  - type: note
    content: I Frijia sy i Galatia dia faritany anankiroa afovoan-tanin’i Azia Minôra. –Ny hoe Azia eto dia ny faritany rômanina manodidina an’i Efeso, fa tsy hoe i Azia Minôra manontolo.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Nihazo ny faritany Mizia
  - type: note
    content: I Mizia dia faritany manamorona ny andilan-dranomasin’i Bôsfôro.
  - type: text
    content: ' izy ireo ary nitady hankany Bitinia, kanjo tsy navelan’ny Fanahin’i Jesoa. '
  '8':
  - type: text
    content: 'Dia namaky an’i Mizia ry i Paoly ka nanitsy nankany Trôasy, tanàna seranana. '
  '9':
  - type: text
    content: 'Tamin’ny alina dia nisehoam-pahitana i Paoly: nisy lehilahy Masedônianina nijoro teo anatrehany, sady niangavy azy hoe: «Mità mankatỳ Masedônia, ka vonjeo izahay!» '
