document_id: ACT.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miaraka amin’i Paoly sy i Silasy i Timôty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tonga tany Derba i Paoly, ary avy eo dia tany Listra. Nisy mpino anankiray natao hoe Timôty tao Listra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Derba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Listra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 14.8, 21.
      marker-yv: yv-n
    - type: text
      text: ', Jiosy niova ho kristianina ny reniny fa ny rainy kosa Grika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsy nangataka andro izahay taorian’izany fahitàn’i Paoly izany, fa nivonona hiainga ho any Masedônia, satria azonay antoka fa nantsoin’Andriamanitra hitondra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' amin’ny olona any izahay.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga kristianina i Lidia
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Niondrana an-tsambo tao Trôasy izahay ka nizotra nivantana ho any amin’ny nosy Samôtrasy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Neapôly: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: seranana avaratry ny ranomasina Ezea tsy lavitra ny tanàna Filipy.
      marker-yv: yv-n
    - type: text
      text: '; ary tafapaka hatrany Neapôly, ny ampitson’iny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Avy eo izahay, dia nankany Filipy, tanànan’ny faritany voalohany ao Masedônia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tanànan’ny faritany voalohany ao Masedônia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tanàna voalohany vantanina ao amin’io faritanin’i Masedônia io,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' araka ny stf maro. Nisy faritany efatra tao Masedônia; ary i Filipy dia isan’ny tanàn-dehibe tao amin’ny faritany voalohany (renivohitra: Amfipôly).'
      marker-yv: yv-n
    - type: text
      text: ', sady zanatany rômanina. Nijanona andro maromaro tao amin’io tanàna io izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tamin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' dia lasa tany ivelan’ny vavahadin-tanàna izahay, ka nankeny amoron’ny ony satria noheverinay fa nisy toeram-pivavahana ho an’ny Jiosy teny. Nipetrapetraka izahay ka tafaresaka tamin’ny vehivavy tafavory teo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Lidia no anaran’ny anankiray tamin’ireo vehivavy ireo; avy any an-tanànan’i Tiatira izy, mpivarotra lamba jaky mena sarobidy, ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanaja an’Andriamanitra
    - type: text
      text: '. Nihaino tsara anay ravehivavy io ary nosokafan’ny Tompo ny fony mba ho babon’ny teny nolazain’i Paoly. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony avy natao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' izy mbamin’ny ankohonany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 16.33; 18.8.
      marker-yv: yv-n
    - type: text
      text: ', dia nanasa anay i Lidia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria noheverinareo fa mino ny Tompo tokoa aho, dia mandrosoa ianareo hiantrano any amiko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary notereny mihitsy izahay.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aiditra am-ponja ao Filipy i Paoly sy i Silasy
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha nandeha nankeny amin’ilay toeram-pivavahana izahay indray andro, dia notsenain’ity zazavavy anankiray mpanompon’olona. Azona fanahy atao hoe Pitôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny hoe '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Pitôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ilay bibilava mpiambina ny ôrakla tao Delfa, ka tatỳ aoriana dia isan’ny fomba enti-manondro ny tromba maminany rehetra rehetra izany.'
      marker-yv: yv-n
    - type: text
      text: ' razazavavy; ary asesik’io fanahy io hanambara zavatra izy ka nampahazo vola be ireo tompony noho ny fanambaràna nataony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nanjohy anay sy i Paoly izy sady niantsoantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpanompon’ilay Andriamanitra Avo indrindra ireo lehilahy ireo! Ny lalam-pamonjena no torîny aminareo!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Andro maromaro no nanaovan-drazazavavy toy izany. Tofoka i Paoly nony ela ka nitodika azy ary niteny tamin’ny fanahy Pitôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandidy anao amin’ny anaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' aho, mialà aminy!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala taminy teo no ho eo ilay fanahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nony hitan’ny tompony fa tsy anantenana fahazoam-bola intsony ity mpanompovaviny, dia ry i Paoly sy i Silasy no nosamboriny ka notaritaritiny hankeo an-kianja hiatrika ny manampahefana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsara laza tamin’ireo havana iray finoana tany Listra sy tany Ikôniôma i Timôty '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Natolony tamin’ny mpanao fanjakana rômanina izy roa lahy sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mampisavorovoro vahoaka eto amin’ny tanànantsika ireto lehilahy ireto. Jiosy izy roa lahy ireo '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary nampianatra fomba amam-panao tsy azontsika raisina na arahina, noho ny maha rômanina antsika.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nirohotra namely an’i Paoly sy i Silasy ny vahoaka; ary anisan’ireo mpanao fanjakana nendahina fitafiana sy nokaravasina izy roa lahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nony avy nandalasina kapoka izy roa lahy, dia nampidirina am-ponja ka nofeperana ilay mpiambina mba hanao andrimaso azy tsara. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Vao azon’ny mpiambina izany baiko izany, dia nampidiriny tao am-ponja anatiny indrindra izy roa lahy ary nasiany boloky hazo ny tongony.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’ny mamatonalina, dia nivavaka sy nihira fiderana an’Andriamanitra i Paoly sy i Silasy; ary nihaino azy roa lahy ny gadra hafa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia injay nisy horohorontany mafy tonga tampoka nanozongozona ny fonja hatrany amin’ny fanorenany. Nivoha nidanadana ho azy ny varavarana rehetra, ary samy nivaha ho azy ny fatoran’ireo gadra rehetra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tamin’izay dia taitra ilay mpiambina; ary nony hitany fa nivoha avokoa ny varavaran’ny fonja, dia nanatsoaka ny sabany saika hamono tena izy satria nampoiziny ho efa nitsoaka nandositra avokoa ny gadra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa niantso mafy i Paoly nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza mamono tena, fa indreto avokoa izahay!
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nangataka jiro ilay mpiambina ka niditra faingana nankao amin’ny fonja anatiny indrindra; ary tora-kovitra izy no niantoraka teo anoloan’i Paoly sy i Silasy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka nokasain’i Paoly ho mpiara-dia aminy. Dia nalain’i Paoly i Timôty ka noforany, mba tsy hanan-kolazaina ny Jiosy mponina amin’iny faritany iny, satria fantatry ny besinimaro fa Grika ny rainy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia navoakan’ilay mpiambina izy roa lahy sady nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona, tompoko, no tokony hataoko mba hovonjena aho?
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Minoa an’i Jesoa Tompo, dia hovonjena ianao mbamin’ny ankohonanao!
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nitorian’i Paoly sy i Silasy ny tenin’ny Tompo ilay mpiambina mbamin’izay rehetra tao an-tranony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tamin’izany ora izany, iny alina iny ihany, dia nandray azy roa lahy ilay mpiambina ka nanasa ny feriny; ary natao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' niaraka tamin’izay izy sy ny ankohonany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 16.15; 18.8.
      marker-yv: yv-n
    - type: text
      text: ' rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Nentin’ilay mpiambina niakatra tao an-tranony i Paoly sy i Silasy ka norosoany sakafo. Ary niravoravo niaraka tamin’ny olona rehetra tao an-tranony ralehilahy, noho izy efa tonga mpino an’Andriamanitra.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Nony maraina ny andro, dia naniraka mpitan-defona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ireo '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: mpitan-defona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na koa ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpitan-karavasy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mandeha tsiroaroa manotrona sy manaraka ny mpanao fanjakana, mba hahafantarana ny maha manampahefana ny mpanao fanjakana.'
      marker-yv: yv-n
    - type: text
      text: ' ireo mpanao fanjakana rômanina hilaza amin’ny mpiambina hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Alefaso ireo olona ireo.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia tonga ny mpiambina ka nampita hafatra tamin’i Paoly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nandefa baiko hanafahana anareo roa lahy ny mpanao fanjakana. Mahazo mivoaka ianareo, ka mandehana soa aman-tsara.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa hoy i Paoly tamin’ireo mpitan-defona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Olona mizaka ny zom-pirenena rômanina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fantatr’i Paoly fa araka ny lalàna rômanina dia tsy azo atao ny mikapoka ny olom-pirenena; ary ampiasain’i Paoly ombieniombieny izany zo maha olom-pirenena rômanina azy izany (22.25-29; 23.27).
      marker-yv: yv-n
    - type: text
      text: ' izahay, kanefa nodarofana kapoka teo imason’ny vahoaka na dia tsy voatsara ara-dalàna aza; ary koa nampidirina am-ponja. Ka ankehitriny ve dia havoakan-dry zareo an-tsokosoko izahay? Sanatria! Aoka ny tenan’ireo mpanao fanjakana mihitsy no ho tonga atỳ hamoaka anay!'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia notaterin’ny mpitan-defona tamin’ny mpanao fanjakana rômanina izany teny izany. Raiki-tahotra ry zareo nony nandre fa olona mizaka ny zom-pirenena rômanina i Paoly sy i Silasy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia tonga ireo mpanao fanjakana ka niteny moramora tamin’izy roa lahy ary nitondra azy nivoaka ny fonja sady nangataka azy mba hiala amin’ny tanàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tamin’ny tanàna rehetra notetezin’i Paoly sy ny namany dia notolorany an’ireo hevitra tapaky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fanapahan-kevitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ireo dia voafintina an-taratasy ao amin’ny Asa 15.23-29, ary hita ao koa ny antonantony.'
      marker-yv: yv-n
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' tany Jerosalema ny mpino, ary nasainy nitandrina izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Rehefa tafavoaka ny fonja i Paoly sy i Silasy, dia nankany an-tranon’i Lidia. Ary lasa nandeha izy roa lahy nony avy nahita sy nampirisika ny havana iray finoana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Koa nihamatotra ara-pinoana ny Fiangonana rehetra ary nitombo isa hatrany isan’andro vaky.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahitàn’i Paoly tao Trôasy
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
