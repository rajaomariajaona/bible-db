document_id: ZEP.1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izao no teny nomen’ny TOMPO an’i Tsefanià tamin’ny andro nanjakan’i Jôsià zanakalahin’i Amôna sady mpanjakan’i Joda. I Tsefanià dia zanakalahin’i Kosỳ, zafikelin’i Gedalià, zafiafin’i Amarià ary zafindohalik’i Hezekià
  - type: note
    content: 'tamin’ny andro... Joda: izany hoe teo anelanelan’ny taona 640 sy 609 tal J.K.. Raha izany dia niara-belona tamin’i Jeremià mpaminany i Tsefanià (jereo Jer 1.2). –Tsy fantatra raha i Hezekià, razamben’i Tsefanià, no ilay mpanjaka mitovy anarana, izay niara-belona tamin’ny mpaminany Isaià.'
  - type: text
    content: .
  - type: heading
    content: Hirotsaka hamely ny tany tontolo Andriamanitra
  '10':
  - type: text
    content: Amin’izany andro izany, hoy ny teny hentitra lazaiko,
  - type: text
    content: ao Jerosalema dia handrenesana
  - type: text
    content: kiaka mafy eo am-bavahadin-trondro
  - type: text
    content: sy fitomaniana ao Antanambao
  - type: note
    content: 'Antanambao: fitaran’i Jerosalema eo avaratra andrefan’ny tanàna tranainy.'
  - type: text
    content: ary firodanan-trano eny amin’ny havoana.
  '11':
  - type: text
    content: Midradradradrà ianareo,
  - type: text
    content: ry mponina an-tanàna ambany
  - type: note
    content: 'an-tanàna ambany: dkt hafa amin’ny faritra lempona.'
  - type: text
    content: ','
  - type: text
    content: fa ho faty avokoa ny mpivarotra,
  - type: text
    content: ho lany ringana avokoa ny mpandranto.
  '12':
  - type: text
    content: Amin’izay fotoana izay dia handray fanala Aho
  - type: text
    content: ary hosavaiko ny tanànan’i Jerosalema;
  - type: text
    content: ka hofaiziko ny olona izay mandry fahalemana
  - type: text
    content: toy ny faikan-divay efa mifetaka,
  - type: text
    content: 'dia izay manao anakampo hoe:'
  - type: text
    content: «Sady tsy hanao soa ny TOMPO no tsy hanao ratsy!»
  '13':
  - type: text
    content: Koa dia hobaboina ny hareny
  - type: text
    content: ary horavana ny tranony;
  - type: text
    content: hanao trano izy
  - type: text
    content: nefa tsy hitoetra ao;
  - type: text
    content: hamboly voaloboka izy,
  - type: text
    content: nefa tsy hisotro ny divay avy aminy.
  - type: heading
    content: Ny andron’ny Tompo
  '14':
  - type: text
    content: Manakaiky ilay andro lehibe hiavian’ny TOMPO
  - type: note
    content: Jereo Jl 1.15 sy nta.
  - type: text
    content: ','
  - type: text
    content: manakaiky sady ho tamy faingana tokoa.
  - type: text
    content: Vao migadona izany dia kiakam-pahakiviana,
  - type: text
    content: fa na ny lehilahy mahery fo aza
  - type: text
    content: dia hiantsoantso mafy vonjeo!
  '15':
  - type: text
    content: Ho androm-pahatezeran’ny TOMPO izany,
  - type: text
    content: ho androm-pahoriana sy tebiteby,
  - type: text
    content: ho androm-paharavana sy fahapotehana,
  - type: text
    content: eny, ho andro maizina mikitroka,
  - type: text
    content: ho andro rako-drahona sy zavona.
  '16':
  - type: text
    content: Izany andro izany no handrenesana ny miaramila
  - type: text
    content: hitsoka trompetra sy hanao akoran’ady
  - type: text
    content: hamelezana ireo tanàna mimanda
  - type: text
    content: sy ny tilikambo avo eny amin’ny zorony.
  '17':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Hampahorîko ny olona'
  - type: text
    content: ka hitsapatsapa toy ny jamba,
  - type: text
    content: noho izy efa nanota tamiko;
  - type: text
    content: ka ny rany dia hiraraka toy ny vovoka,
  - type: text
    content: ary ny fatiny ho lo tahaka ny zezika.»
  '18':
  - type: text
    content: Amin’ny androm-pahatezeran’ny TOMPO,
  - type: text
    content: dia samy tsy hahavonjy ny olona
  - type: text
    content: na ny volafotsiny na ny volamenany.
  - type: text
    content: Fa hiredareda ny fahasaro-piaron’ny TOMPO
  - type: text
    content: ka handevona ny tany tontolo.
  - type: text
    content: Eny, hahatsiravina tokoa izany,
  - type: text
    content: satria haringan’ny TOMPO
  - type: text
    content: ny mponina rehetra amin’ny tany.
  '2':
  - type: text
    content: 'Izao no teny hentitra ataon’ny TOMPO:'
  - type: text
    content: «Holevoniko avokoa ny aina rehetra
  - type: text
    content: eto ambonin’ny tany.
  '3':
  - type: text
    content: Hopotehiko ny olona sy ny biby
  - type: text
    content: ary ny vorona mbamin’ny trondro;
  - type: text
    content: haringako ny ratsy fanahy
  - type: text
    content: sy ny asa manafintohina ataony.
  - type: text
    content: Tsy avelako hisy olona na dia iray aza
  - type: text
    content: eto ambonin’ny tany.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany».
  - type: heading
    content: Ny hamelezan’Andriamanitra an’i Joda sy i Jerosalema
  '4':
  - type: text
    content: «Hirotsaka hamely ny mponin’i Jerosalema
  - type: text
    content: sy ny vahoaka rehetra ao Joda Aho.
  - type: text
    content: Hofoanako tsy hisy amin’ity toerana ity
  - type: text
    content: ny zavatra sisa rehetra
  - type: text
    content: tamin’ny fanompoana an’i Bahala;
  - type: text
    content: eny, hofoanako hatramin’ny fahatsiarovana
  - type: text
    content: ireo mpisoron’io andriamani-tsiizy io koa aza.
  '5':
  - type: text
    content: Hopotehiko izay miakatra an-tafon-trano
  - type: text
    content: mba hivavaka amin’ireo zavatra
  - type: text
    content: eny amin’ny lanitra,
  - type: text
    content: dia izay mivavaka sy mianiana amiko TOMPO
  - type: text
    content: nefa manao izany koa amin’i Milkôma
  - type: note
    content: 'Ny fivavahana tamin’ireo zavatra eny amin’ny lanitra izany hoe ireo kintana sy planeta dia fanao tamin’ny fivavahana mesôpôtamianina. Ny mpanjaka Manase sy ny mpanjaka Amôna tao Joda (and 1) dia nampirisika izany (jereo 2 Mp 21.3-5; 21-22). –amin’i Milkôma: araka ny dkt tranainy maro izany, ny rijan-teny hebreo kosa manao hoe: amin’i Meleka andriamaniny na amin’ny mpanjakany. I Milkôma no andriamanitra lehibe indrindra tamin’ireo andriamanitry ny Hamônita (jereo 1 Mp 11.33).'
  - type: text
    content: .
  '6':
  - type: text
    content: Holevoniko izay mihataka miala amiko TOMPO
  - type: text
    content: ka tsy mitady AHY sady tsy mila hevitra amiko.»
  '7':
  - type: text
    content: Mangina eo anatrehan’ny Tompo ANDRIANANAHARY
  - type: text
    content: fa efa akaiky ny andro hirotsahany an-tsehatra!
  - type: text
    content: Efa nanomana sorona ny TOMPO,
  - type: text
    content: 'ary efa '
  - type: text
    content: nanadio
  - type: text
    content: ' ireo olona nasainy'
  - type: note
    content: 'ny andro hirotsahany an-tsehatra: jereo Jl 1.15 sy nta. –Efa nanomana... nasainy: ny fanatanterahana ny fitsaran’Andriamanitra an’i Jerosalema dia oharina amin’ny sorona anankiray eto. Ho an’ny sakafo izay manaraka hatrany ny sorona, ilay olona manolotra izany sy ireo olona nasainy dia tsy maintsy manaraka fepetra fidiovana sasantsasany. Sarotra ihany eto ny hanondro marina ireo olona nasain’ny Tompo.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Izao no teny hentitra ataon’ny TOMPO:'
  - type: text
    content: «Amin’izany andro hanaovako sorona izany
  - type: text
    content: dia hofaiziko ny mpitondra sy ny zanaky ny mpanjaka
  - type: text
    content: ary izay rehetra manaraka fomba fitafy vahiny
  - type: note
    content: Ny fanarahana ny fomba fitafin’ireo firenena vahiny dia matetika famantarana ihany koa ny fandraisana ny kolontsainy sy fivavahany.
  - type: text
    content: .
  '9':
  - type: text
    content: Amin’izany andro izany dia hofaiziko avokoa
  - type: text
    content: izay rehetra mandingana ny tokonan-
  - type: text
    content: tempoliny
  - type: text
    content: sy izay rehetra mameno ny tranon’ny tompony
  - type: note
    content: 'izay rehetra mandingana ny tokonan-tempoliny: fombam-pivavahan’ny mpanompo sampy izany (jereo 1 Sam 5.5); dkt hafa izay rehetra mianika ny lampihazo (izay misy ny alitaran’ny andriamanitra sampy). –ny tranon’ny tompony: dkt hafa ny tempolin’ny andriamaniny.'
  - type: text
    content: amin’ny harena azo an-kosoka sy an-keriny.
