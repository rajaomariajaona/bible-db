    text: Izao no teny nomen’ny TOMPO an’i Tsefanià tamin’ny andro nanjakan’i Jôsià zanakalahin’i Amôna sady mpanjakan’i Joda. I Tsefanià dia zanakalahin’i Kosỳ, zafikelin’i Gedalià, zafiafin’i Amarià ary zafindohalik’i Hezekià
