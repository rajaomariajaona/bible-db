        text: izany hoe teo anelanelan’ny taona 640 sy 609 tal J.K.. Raha izany dia niara-belona tamin’i Jeremià mpaminany i Tsefanià (jereo Jer 1.2). –Tsy fantatra raha i Hezekià, razamben’i Tsefanià, no ilay mpanjaka mitovy anarana, izay niara-belona tamin’ny mpaminany Isaià.
