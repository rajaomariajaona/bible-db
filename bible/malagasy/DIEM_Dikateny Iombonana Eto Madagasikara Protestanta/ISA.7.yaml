document_id: ISA.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatra ho an’i Ahaza mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro nanjakàn’i Ahaza, zanakalahin’i Jôtama sady zafikelin’i Hozià mpanjakan’i Joda, dia niakatra i Retsîna mpanjakan’i Siria sy i Peka, zanakalahin’i Remalià sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', mba hanafika an’i Jerosalema, kinanjo tsy nahafaka azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny ady nifarimbonan’ny Sirianina sy ny Efraimita, jereo 2 Mp 16.5; 2 Tan 28.5-6 sy ny sava lalana.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nanafatra an’i Ahaza ny TOMPO ka nanao hoe:'
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angataho famantarana ny TOMPO Andriamanitrao mba ho antoka ho anao, na any amin’izay fanambanin’ny toeran’ny maty izany na eny an-danitra ambony eny.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’i Ahaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy hangataka na inona na inona aho fa tsy te haka fanahy ny TOMPO.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Isaià taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihainoa ahy ianao sy ny fianakavianao izay samy taranak’i Davida. Moa tsy ampy anareo ve ny manasatra ny olombelona no dia hanasatra an’Andriamanitra koa ianareo? '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Noho izany àry, dia ny Tompo mihitsy no hanome famantarana ho anareo: jereo fa hitoe-jaza ny vehivavy ka hiteraka zazalahy ary ny anarany hataony hoe Himanoela, izany hoe «Andriamanitra miaraka amintsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 1.23.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rononomandry sy tantely no ho sakafony ambara-pahalalàny mandà ny ratsy sy mifidy ny tsara. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa raha tsy mbola mahalala handà ny ratsy sy hifidy ny tsara akory izany zaza izany, dia hilaozan’ny mponina ny tanin’ireo mpanjaka roa izay mampitahotra anao ireo. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Kanefa hataon’ny TOMPO tonga aminao sy ny vahoakanao ary ny taranakao ny toe-javatra izay tsy mbola nisy hatramin’ny andro nisarahan’i Joda tamin’ny fanjakan’i Israely ka hatramin’izao, dia ny hanafihan’ny mpanjakan’i Asiria izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananiham-bohitra sy ny vokany
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hisioka hiantso ny lalitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay any amin’ny vinany misampana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iafaran’ilay onin’i Ejipta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisioka koa Izy hiantso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny renitantely izay any Asiria.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia indray ho avy ireny ka hipetraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny an-tevana kisolasola sy eny an-tsefatsefa-bato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa eny amin’ny kirihitra rehetra eny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy eny amin’ny toerana rehetra fampisotroam-biby.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampandrenesina i Ahaza, taranak’i Davida, sy ny tao an-dapany fa efa mitoby any Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efraîma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: foko be indrindra amin’ny fanjakana israelita tany avaratra sady mifanakaiky amin’i Jerosalema ny faritaniny.
      marker-yv: yv-n
    - type: text
      text: ' ny Sirianina. Koa taitra ny fon’ny mpanjaka sy ny an’ny vahoakany, tahaka ny hazo any an’ala rehefa tsofin’ny rivotra.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hanofa hareza avy eny am-pitan’i Eofrata:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filazana ny mpanjakan’i Asiria izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho voaharatra avokoa ny lohanareo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny volon-tongotrareo ary koa ny volom-bavanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'loha voaharatra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny naoty momba ny 3.17. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'volombava voaharatra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' marika heverina ho manala baràka (2 Sam 10.4-5).'
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany koa ny isam-batan’olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hiompy ombivavy iray sy osivavy roa;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka noho ny habetsahan’ny ronono avy aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rononomandry no hohanin’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa rononomandry sy tantely no ho foto-tsakafo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay rehetra sisa tavela eto amin’ny tany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany koa ny saha rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nisy voaloboka arivo fototra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mitentina volafotsy arivo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho rakotry ny tsilo sy ny songosongo.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ho tonga hihaza ao ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miaraka amin’ny tsipîka sy ny zana-tsipîka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany tany manontolo izany tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho rakotry ny tsilo sy ny songosongo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny amin’ireo havoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay novolena tamin’ny lapika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho azo aleha intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny tahotra ny tsilo sy ny songosongo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa havela ho kijàna fiandrasana omby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ho tany firaofan’ny ondry aman’osy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Isaià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mivoaha ny trano ianao mba hitsena an’i Ahaza, dia ianao sy i Seara-Jasoba zanakao lahy, fa efa mby amin’ny lakandrano ambony izy, eo amin’izay lalana mankany amin’ny sahan’ny mpanasa lamba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny anarana hoe '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Seara-Jasoba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hisy sisa hiverina.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: lakandrano ambony
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'lalana mankany amin’ny sahan’ny mpanasa lamba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2 Mp 18.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary lazao aminy hoe: «Tandremo! Aza taitaitra foana, aza matahotra. Aoka tsy ho ketraka ny fonao noho ny fahatezeran’i Retsîna avy any Siria sy ny fahatezeran’ny zanakalahin’i Remalià, fa tapa-porohana midonaka ihany ireo. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ny Sirianina ary i Peka sy ny Efraîmita dia efa niray tetika tokoa hanisy ratsy anao ka nanao hoe: '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ‹Andeha isika hiakatra hamely an’i Joda mba hampitahotra azy, ka hoterentsika hanaraka antsika izy; dia ilay zanakalahin’i Tabeela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny Sirianina sy ny Israelita tavaratra dia te hitaona ny fanjakan’i Joda hiady amin’ny Asirianina, izay efa mananontanona. –
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'ilay zanakalahin’i Tabeela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa olona avy any Siria izany.
      marker-yv: yv-n
    - type: text
      text: ' no hatsangantsika hanjaka ao aminy.› '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao kosa no lazain’ny Tompo ANDRIANANAHARY:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Tsy ho tanteraka sady tsy hisy izany
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Damasy manko no renivohitr’i Siria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao ihany i Retsîna no filoha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Samaria no renivohitr’i Efraîma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ao ihany i Peka no filoha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Efraîma, ao anatin’ny 65 taona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho vanon-ko firenena intsony.›
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa raha tsy ny TOMPO no itokianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho azo itokiana haharitra koa ianareo.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Himanoela
    marker-yv: yv-h
