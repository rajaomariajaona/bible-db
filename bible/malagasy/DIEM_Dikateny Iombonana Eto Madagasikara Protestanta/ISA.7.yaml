document_id: ISA.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatra ho an’i Ahaza mpanjaka
  - type: text
    content: 'Tamin’ny andro nanjakàn’i Ahaza, zanakalahin’i Jôtama sady zafikelin’i Hozià mpanjakan’i Joda, dia niakatra i Retsîna mpanjakan’i Siria sy i Peka, zanakalahin’i Remalià sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ', mba hanafika an’i Jerosalema, kinanjo tsy nahafaka azy'
  - type: note
    content: Momba ny ady nifarimbonan’ny Sirianina sy ny Efraimita, jereo 2 Mp 16.5; 2 Tan 28.5-6 sy ny sava lalana.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia mbola nanafatra an’i Ahaza ny TOMPO ka nanao hoe:'
  '11':
  - type: text
    content: –Angataho famantarana ny TOMPO Andriamanitrao mba ho antoka ho anao, na any amin’izay fanambanin’ny toeran’ny maty izany na eny an-danitra ambony eny.
  '12':
  - type: text
    content: 'Fa novalian’i Ahaza hoe:'
  - type: text
    content: –Tsia, tsy hangataka na inona na inona aho fa tsy te haka fanahy ny TOMPO.
  '13':
  - type: text
    content: 'Dia hoy i Isaià taminy:'
  - type: text
    content: '–Mihainoa ahy ianao sy ny fianakavianao izay samy taranak’i Davida. Moa tsy ampy anareo ve ny manasatra ny olombelona no dia hanasatra an’Andriamanitra koa ianareo? '
  '14':
  - type: text
    content: 'Noho izany àry, dia ny Tompo mihitsy no hanome famantarana ho anareo: jereo fa hitoe-jaza ny vehivavy ka hiteraka zazalahy ary ny anarany hataony hoe Himanoela, izany hoe «Andriamanitra miaraka amintsika'
  - type: note
    content: Jereo Mt 1.23.
  - type: text
    content: '.» '
  '15':
  - type: text
    content: 'Rononomandry sy tantely no ho sakafony ambara-pahalalàny mandà ny ratsy sy mifidy ny tsara. '
  '16':
  - type: text
    content: 'Fa raha tsy mbola mahalala handà ny ratsy sy hifidy ny tsara akory izany zaza izany, dia hilaozan’ny mponina ny tanin’ireo mpanjaka roa izay mampitahotra anao ireo. '
  '17':
  - type: text
    content: Kanefa hataon’ny TOMPO tonga aminao sy ny vahoakanao ary ny taranakao ny toe-javatra izay tsy mbola nisy hatramin’ny andro nisarahan’i Joda tamin’ny fanjakan’i Israely ka hatramin’izao, dia ny hanafihan’ny mpanjakan’i Asiria izany.
  - type: heading
    content: Fananiham-bohitra sy ny vokany
  '18':
  - type: text
    content: Amin’izany andro izany ny TOMPO
  - type: text
    content: dia hisioka hiantso ny lalitra
  - type: text
    content: izay any amin’ny vinany misampana
  - type: text
    content: iafaran’ilay onin’i Ejipta;
  - type: text
    content: ary hisioka koa Izy hiantso
  - type: text
    content: ny renitantely izay any Asiria.
  '19':
  - type: text
    content: Dia indray ho avy ireny ka hipetraka
  - type: text
    content: eny an-tevana kisolasola sy eny an-tsefatsefa-bato
  - type: text
    content: ary koa eny amin’ny kirihitra rehetra eny
  - type: text
    content: sy eny amin’ny toerana rehetra fampisotroam-biby.
  '2':
  - type: text
    content: Dia nampandrenesina i Ahaza, taranak’i Davida, sy ny tao an-dapany fa efa mitoby any Efraîma
  - type: note
    content: 'Efraîma: foko be indrindra amin’ny fanjakana israelita tany avaratra sady mifanakaiky amin’i Jerosalema ny faritaniny.'
  - type: text
    content: ' ny Sirianina. Koa taitra ny fon’ny mpanjaka sy ny an’ny vahoakany, tahaka ny hazo any an’ala rehefa tsofin’ny rivotra.'
  '20':
  - type: text
    content: Amin’izany andro izany ny Tompo
  - type: text
    content: 'dia hanofa hareza avy eny am-pitan’i Eofrata:'
  - type: text
    content: filazana ny mpanjakan’i Asiria izany;
  - type: text
    content: ka ho voaharatra avokoa ny lohanareo rehetra
  - type: text
    content: sy ny volon-tongotrareo ary koa ny volom-bavanareo
  - type: note
    content: 'loha voaharatra: jereo ny naoty momba ny 3.17. –volombava voaharatra: marika heverina ho manala baràka (2 Sam 10.4-5).'
  - type: text
    content: .
  '21':
  - type: text
    content: Amin’izany andro izany koa ny isam-batan’olona
  - type: text
    content: dia samy hiompy ombivavy iray sy osivavy roa;
  '22':
  - type: text
    content: ka noho ny habetsahan’ny ronono avy aminy
  - type: text
    content: dia rononomandry no hohanin’ny olona
  - type: text
    content: fa rononomandry sy tantely no ho foto-tsakafo
  - type: text
    content: ho an’izay rehetra sisa tavela eto amin’ny tany.
  '23':
  - type: text
    content: Amin’izany andro izany koa ny saha rehetra
  - type: text
    content: nisy voaloboka arivo fototra
  - type: text
    content: izay mitentina volafotsy arivo
  - type: text
    content: dia ho rakotry ny tsilo sy ny songosongo.
  '24':
  - type: text
    content: Koa ho tonga hihaza ao ny olona
  - type: text
    content: miaraka amin’ny tsipîka sy ny zana-tsipîka.
  - type: text
    content: Izany tany manontolo izany tokoa
  - type: text
    content: dia ho rakotry ny tsilo sy ny songosongo.
  '25':
  - type: text
    content: Ary ny amin’ireo havoana
  - type: text
    content: izay novolena tamin’ny lapika
  - type: text
    content: dia tsy ho azo aleha intsony
  - type: text
    content: noho ny tahotra ny tsilo sy ny songosongo,
  - type: text
    content: fa havela ho kijàna fiandrasana omby
  - type: text
    content: sy ho tany firaofan’ny ondry aman’osy.
  '3':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Isaià:'
  - type: text
    content: –Mivoaha ny trano ianao mba hitsena an’i Ahaza, dia ianao sy i Seara-Jasoba zanakao lahy, fa efa mby amin’ny lakandrano ambony izy, eo amin’izay lalana mankany amin’ny sahan’ny mpanasa lamba
  - type: note
    content: 'Ny anarana hoe Seara-Jasoba dia midika hoe hisy sisa hiverina. –lakandrano ambony, lalana mankany amin’ny sahan’ny mpanasa lamba: jereo 2 Mp 18.17 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary lazao aminy hoe: «Tandremo! Aza taitaitra foana, aza matahotra. Aoka tsy ho ketraka ny fonao noho ny fahatezeran’i Retsîna avy any Siria sy ny fahatezeran’ny zanakalahin’i Remalià, fa tapa-porohana midonaka ihany ireo. '
  '5':
  - type: text
    content: 'Ny Sirianina ary i Peka sy ny Efraîmita dia efa niray tetika tokoa hanisy ratsy anao ka nanao hoe: '
  '6':
  - type: text
    content: ‹Andeha isika hiakatra hamely an’i Joda mba hampitahotra azy, ka hoterentsika hanaraka antsika izy; dia ilay zanakalahin’i Tabeela
  - type: note
    content: 'Ny Sirianina sy ny Israelita tavaratra dia te hitaona ny fanjakan’i Joda hiady amin’ny Asirianina, izay efa mananontanona. –ilay zanakalahin’i Tabeela: toa olona avy any Siria izany.'
  - type: text
    content: ' no hatsangantsika hanjaka ao aminy.› '
  '7':
  - type: text
    content: 'Izao kosa no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: ‹Tsy ho tanteraka sady tsy hisy izany
  '8':
  - type: text
    content: I Damasy manko no renivohitr’i Siria,
  - type: text
    content: ary ao ihany i Retsîna no filoha;
  - type: text
    content: i Samaria no renivohitr’i Efraîma,
  - type: text
    content: ary ao ihany i Peka no filoha.
  - type: text
    content: I Efraîma, ao anatin’ny 65 taona,
  - type: text
    content: dia tsy ho vanon-ko firenena intsony.›
  - type: text
    content: Kanefa raha tsy ny TOMPO no itokianareo,
  - type: text
    content: dia tsy ho azo itokiana haharitra koa ianareo.»
  - type: heading
    content: Ilay Himanoela
