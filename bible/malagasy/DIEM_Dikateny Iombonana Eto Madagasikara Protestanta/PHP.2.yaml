document_id: PHP.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanetrentenan’i Kristy sy ny fahamboniany
  - type: text
    content: Mampahery anareo tokoa ny firaisana amin’i Kristy, mampirisika anareo ny fitiavany, ary miombona amin’ny Fanahy Masina ianareo
  - type: note
    content: 'miombona amin’ny Fanahy Masina ianareo: dkt hafa mampisy fiombonana eo aminareo ny Fanahy Masina.'
  - type: text
    content: 'ka mahay mangoraka sy be hatsarampo. '
  '10':
  - type: text
    content: ka ho fanajana ny anaran’i Jesoa
  - type: text
    content: dia handohalika avokoa
  - type: text
    content: izay rehetra any an-danitra na etỳ an-tany na any
  - type: text
    content: ambanin’ny tany
  - type: note
    content: 'ambanin’ny tany: fomba fiteny ilazana ny toeran’ny maty.'
  - type: text
    content: ','
  '11':
  - type: text
    content: ary hiaiky avokoa ny fiteny rehetra
  - type: text
    content: fa «i Jesoa Kristy dia Tompo»,
  - type: text
    content: ho voninahitr’Andriamanitra Ray
  - type: note
    content: 'And 10-11: mampahatsiaro ny Is 45.23 araka ny dkt grika tranainy Septoazinta. –Tsy isalasalana fa antsa kristianina tranainy ny and 6-11.'
  - type: text
    content: .
  - type: heading
    content: Mamirapiratra toy ny fahazavana eto amin’izao tontolo izao
  '12':
  - type: text
    content: 'Koa amin’izany, ry hava-malalako, efa nanaiky ahy mandrakariva ianareo fony aho teo aminareo, fa vao mainka tokony hanaiky ahy bebe kokoa ianareo ankehitriny amin’izao tsy maha eo ahy izao. Miasà amin-tahotra sy hovitra hahatomombana ny famonjena anareo; '
  '13':
  - type: text
    content: satria miasa ao anatinareo hatrany Andriamanitra hahatonga anareo hikasa sy hahatanteraka izay mifanaraka amin’ny safidim-pony.
  '14':
  - type: text
    content: 'Amin’izay rehetra atao, dia aza asiana fimonomononana sy fisalasalana, '
  '15':
  - type: text
    content: 'mba ho tsy manan-tsiny sady tsy misy fitaka ianareo, dia ho '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: ' tsy misy kilema eo afovoan’ny olo-meloka sady maditra'
  - type: note
    content: Mampahatsiaro ny Fifan 32.5 araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '. Eo afovoan’ireo olona ireo, dia tokony hamirapiratra toy ny kintana eny an’habakabaka ianareo, '
  '16':
  - type: text
    content: ka hanolotra azy ireo ny teny manome fiainana. Raha izany no ataonareo, dia hanan-kireharehana momba anareo aho amin’ny andro hiavian’i Kristy, satria hiharihary fa tsy foana tsy akory ny ezaka nataoko sy ny zavatra nisasarako.
  '17':
  - type: text
    content: Mety halatsa-dra ho sorona araraka aho ka hampombaina ilay sorona atolotrareo an’Andriamanitra, dia ny finoanareo
  - type: note
    content: Ampit 2Tim 4.6.
  - type: text
    content: '. Raha izany tokoa, dia faly aho ary mampiombona anareo rehetra amin’ny hafaliako; '
  '18':
  - type: text
    content: aoka hifaly amin’izany koa ianareo, ary hampiombona ahy amin’ny hafalianareo.
  - type: heading
    content: I Timôty sy i Epafrôdito
  '19':
  - type: text
    content: 'Raha sitrak’i Jesoa Tompo, dia antenaiko fa ho afaka handefa faingana an’i Timôty ho atỳ aminareo aho, mba hahazoako fampirisihana koa rehefa mahafantatra ny vaovao momba anareo; '
  '2':
  - type: text
    content: 'Noho izany, dia fenoy tanteraka ny hafaliako: aoka hifanaraka tsara ianareo ka hoentanin’ny fifankatiavana sy hiray fo ary hiray saina; '
  '20':
  - type: text
    content: 'satria i Timôty izao no hany iray fo amiko sady tena miahy anareo. '
  '21':
  - type: text
    content: 'Eny, ny hafa rehetra dia samy miraharaha izay azy ihany, fa tsy ny an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'I Timôty kosa dia fantatrareo fa lehilahy voazaha toetra, satria efa niara-niasa tamiko, toy ny zanaka miaraka amin-drainy, ho fampandrosoana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Koa manantena ny handefa azy faingana ho atỳ aminareo aho, raha vao hitako mazava izay fandehan-javatra momba ahy; '
  '24':
  - type: text
    content: ary matoky aho fa ny tenako dia ho avy faingana koa, raha sitraky ny Tompo.
  '25':
  - type: text
    content: Nefa nihevitra aho fa tokony halefako atỳ aminareo i Epafrôdito
  - type: note
    content: Epafrôdito dia iraky ny Fiangonan’i Filipy teo amin’i Paoly (jereo 4.18).
  - type: text
    content: ' havantsika, izay mpiara-miasa sy mpiara-miady amiko, sady iraka nampitondrainareo ny fanampiana izay nilaiko. '
  '26':
  - type: text
    content: 'Manina anareo rehetra izy ary sahiran-kevitra mafy noho ny nandrenesanareo azy hoe narary. '
  '27':
  - type: text
    content: 'Narary tokoa izy ary efa teo ambavahoana; nefa namindra fo taminy Andriamanitra, ary tsy taminy ihany fa tamiko koa, mba tsy hanampy trotraka ny alaheloko. '
  '28':
  - type: text
    content: 'Koa dia nazoto kokoa aho handefa azy, mba hifalianareo indray rehefa mahita azy ary mba hahamaivana kokoa ny alaheloko. '
  '29':
  - type: text
    content: 'Koa raiso amin-kafaliana safononoka izy noho ianareo samy tafaray amin’ny Tompo, ary omeo haja ny olona toa azy; '
  '3':
  - type: text
    content: 'aza manao na inona na inona raha asesiky ny fifampiandaniana na ny filàn-dera foana, fa samia manetry tena manoloana ny namana ary aoka samy hanao ny namana ho ambony noho ny tena. '
  '30':
  - type: text
    content: 'fa ny asan’i Kristy no saika nahafaty azy: nanao vy very ny ainy izy hanatanteraka izay tsy azonareo natao, dia ny fitondrana ilay fanampianareo hatratỳ amiko.'
  '4':
  - type: text
    content: 'Aza dia samy mihevitra ny soa ho an’ny tena ihany, fa ny ho an’ny namana koa. '
  '5':
  - type: text
    content: Aoka ho ao aminareo ilay toe-tsaina tao amin’i Kristy Jesoa
  - type: note
    content: 'Aoka... Kristy Jesoa: dkt hafa Aoka ianareo hifampitondra tahaka ny olona samy tafaray amin’i Kristy Jesoa.'
  - type: text
    content: ':'
  '6':
  - type: text
    content: Nananany hatrizay hatrizay ny toetra amam-pomba
  - type: text
    content: maha Andriamanitra
  - type: text
    content: nefa tsy noheveriny hoe tsy maintsy hifikirana ilay
  - type: text
    content: fitoviana amin’Andriamanitra
  - type: note
    content: 'hifikirana ilay fitoviana amin’Andriamanitra: ampit Gen 3.5 (dkt hafa hanaovana an-keriny ny fitoviana amin’Andriamanitra).'
  - type: text
    content: .
  '7':
  - type: text
    content: Fa niendahany an-tsitrapo ny fiamboniany;
  - type: text
    content: ka naka ny toetra amam-pomba maha mpanompo Izy
  - type: note
    content: Ampit Is 52.13. –53.12; Mt 20.28.
  - type: text
    content: ','
  - type: text
    content: tonga nitovy tamin’ny olombelona
  - type: text
    content: ary niseho sy hita ho olombelona.
  '8':
  - type: text
    content: Nanetry tena Izy ka nanaiky
  - type: text
    content: hatramin’ny fahafatesana,
  - type: text
    content: dia ny fahafatesana teo amin’ny hazofijaliana.
  '9':
  - type: text
    content: Izany no nanandratan’Andriamanitra Azy
  - type: text
    content: ho eo amin’ny toerana faratampony,
  - type: text
    content: sy nanomezany Azy ilay anarana,
  - type: text
    content: izay ambony noho ny anarana rehetra;
