    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mampahery anareo tokoa ny firaisana amin’i Kristy, mampirisika anareo ny fitiavany, ary miombona amin’ny Fanahy Masina ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'miombona amin’ny Fanahy Masina ianareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mampisy fiombonana eo aminareo ny Fanahy Masina.
      marker-yv: yv-n
    - type: text
      text: 'ka mahay mangoraka sy be hatsarampo. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ka ho fanajana ny anaran’i Jesoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia handohalika avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra any an-danitra na etỳ an-tany na any
  - type: usfm
