        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hifikirana ilay fitoviana amin’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampit Gen 3.5 (dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hanaovana an-keriny ny fitoviana amin’Andriamanitra).
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa niendahany an-tsitrapo ny fiamboniany;
  - type: usfm
    marker: q1
