    - type: text
      text: ambanin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ambanin’ny tany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fomba fiteny ilazana ny toeran’ny maty.
      marker-yv: yv-n
    - type: text
      text: ','
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ary hiaiky avokoa ny fiteny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa «i Jesoa Kristy dia Tompo»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho voninahitr’Andriamanitra Ray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 10-11:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mampahatsiaro ny Is 45.23 araka ny dkt grika tranainy Septoazinta. –Tsy isalasalana fa antsa kristianina tranainy ny and 6-11.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mamirapiratra toy ny fahazavana eto amin’izao tontolo izao
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa amin’izany, ry hava-malalako, efa nanaiky ahy mandrakariva ianareo fony aho teo aminareo, fa vao mainka tokony hanaiky ahy bebe kokoa ianareo ankehitriny amin’izao tsy maha eo ahy izao. Miasà amin-tahotra sy hovitra hahatomombana ny famonjena anareo; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: satria miasa ao anatinareo hatrany Andriamanitra hahatonga anareo hikasa sy hahatanteraka izay mifanaraka amin’ny safidim-pony.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amin’izay rehetra atao, dia aza asiana fimonomononana sy fisalasalana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'mba ho tsy manan-tsiny sady tsy misy fitaka ianareo, dia ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’Andriamanitra
    - type: text
      text: ' tsy misy kilema eo afovoan’ny olo-meloka sady maditra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mampahatsiaro ny Fifan 32.5 araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '. Eo afovoan’ireo olona ireo, dia tokony hamirapiratra toy ny kintana eny an’habakabaka ianareo, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ka hanolotra azy ireo ny teny manome fiainana. Raha izany no ataonareo, dia hanan-kireharehana momba anareo aho amin’ny andro hiavian’i Kristy, satria hiharihary fa tsy foana tsy akory ny ezaka nataoko sy ny zavatra nisasarako.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mety halatsa-dra ho sorona araraka aho ka hampombaina ilay sorona atolotrareo an’Andriamanitra, dia ny finoanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Tim 4.6.
      marker-yv: yv-n
    - type: text
      text: '. Raha izany tokoa, dia faly aho ary mampiombona anareo rehetra amin’ny hafaliako; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: aoka hifaly amin’izany koa ianareo, ary hampiombona ahy amin’ny hafalianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Timôty sy i Epafrôdito
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Raha sitrak’i Jesoa Tompo, dia antenaiko fa ho afaka handefa faingana an’i Timôty ho atỳ aminareo aho, mba hahazoako fampirisihana koa rehefa mahafantatra ny vaovao momba anareo; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Noho izany, dia fenoy tanteraka ny hafaliako: aoka hifanaraka tsara ianareo ka hoentanin’ny fifankatiavana sy hiray fo ary hiray saina; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'satria i Timôty izao no hany iray fo amiko sady tena miahy anareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Eny, ny hafa rehetra dia samy miraharaha izay azy ihany, fa tsy ny an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I Timôty kosa dia fantatrareo fa lehilahy voazaha toetra, satria efa niara-niasa tamiko, toy ny zanaka miaraka amin-drainy, ho fampandrosoana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa manantena ny handefa azy faingana ho atỳ aminareo aho, raha vao hitako mazava izay fandehan-javatra momba ahy; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ary matoky aho fa ny tenako dia ho avy faingana koa, raha sitraky ny Tompo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nefa nihevitra aho fa tokony halefako atỳ aminareo i Epafrôdito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Epafrôdito '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia iraky ny Fiangonan’i Filipy teo amin’i Paoly (jereo 4.18).
      marker-yv: yv-n
    - type: text
      text: ' havantsika, izay mpiara-miasa sy mpiara-miady amiko, sady iraka nampitondrainareo ny fanampiana izay nilaiko. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Manina anareo rehetra izy ary sahiran-kevitra mafy noho ny nandrenesanareo azy hoe narary. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Narary tokoa izy ary efa teo ambavahoana; nefa namindra fo taminy Andriamanitra, ary tsy taminy ihany fa tamiko koa, mba tsy hanampy trotraka ny alaheloko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Koa dia nazoto kokoa aho handefa azy, mba hifalianareo indray rehefa mahita azy ary mba hahamaivana kokoa ny alaheloko. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Koa raiso amin-kafaliana safononoka izy noho ianareo samy tafaray amin’ny Tompo, ary omeo haja ny olona toa azy; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'aza manao na inona na inona raha asesiky ny fifampiandaniana na ny filàn-dera foana, fa samia manetry tena manoloana ny namana ary aoka samy hanao ny namana ho ambony noho ny tena. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fa ny asan’i Kristy no saika nahafaty azy: nanao vy very ny ainy izy hanatanteraka izay tsy azonareo natao, dia ny fitondrana ilay fanampianareo hatratỳ amiko.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza dia samy mihevitra ny soa ho an’ny tena ihany, fa ny ho an’ny namana koa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aoka ho ao aminareo ilay toe-tsaina tao amin’i Kristy Jesoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Aoka... Kristy Jesoa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aoka ianareo hifampitondra tahaka ny olona samy tafaray amin’i Kristy Jesoa.
      marker-yv: yv-n
    - type: text
      text: ':'
