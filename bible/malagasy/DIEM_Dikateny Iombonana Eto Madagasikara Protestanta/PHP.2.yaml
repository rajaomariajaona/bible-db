    children:
    - type: text
      text: tonga nitovy tamin’ny olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary niseho sy hita ho olombelona.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nanetry tena Izy ka nanaiky
  - type: usfm
