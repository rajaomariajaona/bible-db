    - type: text
      text: hatramin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny fahafatesana teo amin’ny hazofijaliana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izany no nanandratan’Andriamanitra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho eo amin’ny toerana faratampony,
  - type: usfm
    marker: q1
    children:
