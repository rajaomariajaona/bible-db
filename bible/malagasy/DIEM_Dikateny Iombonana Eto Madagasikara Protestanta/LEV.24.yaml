document_id: LEV.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay fitoeran-jiro ao amin’ny Toeramasina
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'Nisy lehilahy anankiray nivoaka ny toeram-ponenany hankeo amin’ny Israelita. Ejiptianina ny rainy; fa Israelita ny reniny izay atao hoe Selômita, zanakavavin’i Dibrỳ, avy amin’ny fokon’i Dana. Vao mby teo amin’ny Israelita ralehilahy, dia niady tamina lehilahy israelita anankiray sady nanevateva sy niteny ratsy ny anaran’Andriamanitra ka nentina tany amin’i Mosesy. '
  '12':
  - type: text
    content: Dia nambenana io zanakalahin’i Selômita io, mandra-paneho mazava ny baikon’ny TOMPO.
  '13':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '14':
  - type: text
    content: '–Avoahy ho eny ivelan’ny toby io lehilahy niteny ratsy Ahy io; ka izay rehetra nandre ny fanevatevàny Ahy, dia aoka hametra-tanana eo an-dohan-dralehilahy; ary aoka ny Israelita rehetra tafangona eto hamono azy amin’ny torabato. '
  '15':
  - type: text
    content: 'Ireto didy ireto kosa no ampitao amin’ny Israelita:'
  - type: text
    content: '«Na iza na iza niteny ratsy ilay Andriamaniny, dia itambesaran-keloka. '
  '16':
  - type: text
    content: 'Koa izay manevateva ny anaran’ny TOMPO, dia hatao maty tokoa: hamono azy amin-torabato ny Israelita rehetra tafangona. Na vahiny izy na tompontany, rehefa manevateva ny anaran’Andriamanitra, dia hatao maty tokoa.'
  '17':
  - type: text
    content: «Izay mahafaty olona, dia hatao maty tokoa
  - type: note
    content: Jereo Eks 21.12.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Fa izay mahafaty biby fiompy kosa, dia hanonitra azy: biby velona no solon’ny biby maty.'
  '19':
  - type: text
    content: '«Raha misy olona nampahazo takaitra ny namany, dia toy izay nataony no hatao aminy: '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Mitondra menaka ôliva madio tsara ianareo, mba hampirehetana ny jiro isan-kariva ka maharitra tontolo alina. '
  '20':
  - type: text
    content: tapaka efain-tapaka, maso efai-maso, nify efai-nify; tahaka ny takaitra nampahazoany olona no hatao aminy koa
  - type: note
    content: 'And 19-20: jereo Eks 21.23-25; Deot 19.21; Mt 5.38.'
  - type: text
    content: .
  '21':
  - type: text
    content: «Izay mahafaty biby fiompy, dia hanonitra azy; fa izay mahafaty olona kosa, dia hatao maty.
  '22':
  - type: text
    content: «Fitsipika tokana no hitondrana anareo, na vahiny na tompontany, fa Izaho no TOMPO Andriamanitrareo
  - type: note
    content: Jereo Nom 15.15-16.
  - type: text
    content: .»
  '23':
  - type: text
    content: 'Rehefa voalazan’i Mosesy tamin’ny Israelita izany, dia nanao araka izay didy nomen’ny TOMPO an’i Mosesy ireo: navoakany tany ivelan’ny toby ilay lehilahy niteny ratsy an’Andriamanitra, ka novonoiny tamin-torabato.'
  '3':
  - type: text
    content: 'Ao anatin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', eo anoloan’ny efitra lamba izay manakona ilay '
  - type: text
    content: Vatamasina mirakitra ny Fanekempihavanana
  - type: text
    content: ', no hametrahan’i Aharôna ny fitoeran-jiro; ka hirehitra lalandava eo anatrehako TOMPO ireo jiro ireo, manomboka ny hariva ka mandra-maraina: ho lalàna raikitra hatrany hatrany izany ho anareo. '
  '4':
  - type: text
    content: Eo ambonin’io fitoeran-jiro volamena madio io no hametrahan’i Aharôna ireo jiro izay hirehitra tontolo alina eo anatrehako.
  - type: heading
    content: Ny mofo apetraka eo anatrehan’Andriamanitra
  '5':
  - type: text
    content: '«Lafarinina tsara no alaonao ary mofo 12 samy milanja enina kilao no endaso. '
  '6':
  - type: text
    content: Dia apetraho mifanongoa eo ambonin’ny latabatra volamena madio eo anatrehako TOMPO ireo, ka ataovy antontany anankiroa misy mofo enina avy
  - type: note
    content: 'And 5-6: jereo Eks 25.30.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Hasianao '
  - type: text
    content: vovoka
  - type: text
    content: ' zava-manitra madio eo ambonin’ny isan’antonta; dia izany vovoka zava-manitra izany no hatao solon’ny mofo ka holevonina amin’ny afo mba ho fanati-pahatsiarovana ho AHY'
  - type: note
    content: Jereo 2.2 sy nta.
  - type: text
    content: .
  '8':
  - type: text
    content: '«Isaky ny '
  - type: text
    content: sabata
  - type: text
    content: ', mitohy tsy tapaka, no hapetraka mifanongoa eo anatrehako TOMPO ireny mofo avy amin’ny Israelita ireny: ho lamim-panekempihavanana raikitra hatrany hatrany izany ho an’ny Israelita. '
  '9':
  - type: text
    content: 'Ny mofo dia ho an’i Aharôna sy ny taranany ka eo amin’ny faritra voatokana ho an’izany no hihinanany azy. Zava-masina dia masina ho an’ny mpisorona izany, satria ambin’ilay fanati-pahatsiarovana levonina amin’ny afo ho AHY: anjara raikitra hatrany hatrany izany ho azy'
  - type: note
    content: Jereo Mt 12.4; Mk 2.26; Lk 6.4.
  - type: text
