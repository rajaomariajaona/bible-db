document_id: LEV.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay fitoeran-jiro ao amin’ny Toeramasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Mitondra menaka ôliva madio tsara ianareo, mba hampirehetana ny jiro isan-kariva ka maharitra tontolo alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ao anatin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', eo anoloan’ny efitra lamba izay manakona ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny Fanekempihavanana
  - type: text
    text: ', no hametrahan’i Aharôna ny fitoeran-jiro; ka hirehitra lalandava eo anatrehako TOMPO ireo jiro ireo, manomboka ny hariva ka mandra-maraina: ho lalàna raikitra hatrany hatrany izany ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eo ambonin’io fitoeran-jiro volamena madio io no hametrahan’i Aharôna ireo jiro izay hirehitra tontolo alina eo anatrehako.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mofo apetraka eo anatrehan’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Lafarinina tsara no alaonao ary mofo 12 samy milanja enina kilao no endaso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia apetraho mifanongoa eo ambonin’ny latabatra volamena madio eo anatrehako TOMPO ireo, ka ataovy antontany anankiroa misy mofo enina avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 5-6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 25.30.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hasianao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovoka
  - type: text
    text: ' zava-manitra madio eo ambonin’ny isan’antonta; dia izany vovoka zava-manitra izany no hatao solon’ny mofo ka holevonina amin’ny afo mba ho fanati-pahatsiarovana ho AHY'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Isaky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ', mitohy tsy tapaka, no hapetraka mifanongoa eo anatrehako TOMPO ireny mofo avy amin’ny Israelita ireny: ho lamim-panekempihavanana raikitra hatrany hatrany izany ho an’ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny mofo dia ho an’i Aharôna sy ny taranany ka eo amin’ny faritra voatokana ho an’izany no hihinanany azy. Zava-masina dia masina ho an’ny mpisorona izany, satria ambin’ilay fanati-pahatsiarovana levonina amin’ny afo ho AHY: anjara raikitra hatrany hatrany izany ho azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 12.4; Mk 2.26; Lk 6.4.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fanevatevana an’Andriamanitra sy ny vono isan-karazany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Nisy lehilahy anankiray nivoaka ny toeram-ponenany hankeo amin’ny Israelita. Ejiptianina ny rainy; fa Israelita ny reniny izay atao hoe Selômita, zanakavavin’i Dibrỳ, avy amin’ny fokon’i Dana. Vao mby teo amin’ny Israelita ralehilahy, dia niady tamina lehilahy israelita anankiray sady nanevateva sy niteny ratsy ny anaran’Andriamanitra ka nentina tany amin’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nambenana io zanakalahin’i Selômita io, mandra-paneho mazava ny baikon’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '–Avoahy ho eny ivelan’ny toby io lehilahy niteny ratsy Ahy io; ka izay rehetra nandre ny fanevatevàny Ahy, dia aoka hametra-tanana eo an-dohan-dralehilahy; ary aoka ny Israelita rehetra tafangona eto hamono azy amin’ny torabato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ireto didy ireto kosa no ampitao amin’ny Israelita:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Na iza na iza niteny ratsy ilay Andriamaniny, dia itambesaran-keloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izay manevateva ny anaran’ny TOMPO, dia hatao maty tokoa: hamono azy amin-torabato ny Israelita rehetra tafangona. Na vahiny izy na tompontany, rehefa manevateva ny anaran’Andriamanitra, dia hatao maty tokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Izay mahafaty olona, dia hatao maty tokoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 21.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izay mahafaty biby fiompy kosa, dia hanonitra azy: biby velona no solon’ny biby maty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Raha misy olona nampahazo takaitra ny namany, dia toy izay nataony no hatao aminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: tapaka efain-tapaka, maso efai-maso, nify efai-nify; tahaka ny takaitra nampahazoany olona no hatao aminy koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.20 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 19-20:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 21.23-25; Deot 19.21; Mt 5.38.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Izay mahafaty biby fiompy, dia hanonitra azy; fa izay mahafaty olona kosa, dia hatao maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Fitsipika tokana no hitondrana anareo, na vahiny na tompontany, fa Izaho no TOMPO Andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 15.15-16.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa voalazan’i Mosesy tamin’ny Israelita izany, dia nanao araka izay didy nomen’ny TOMPO an’i Mosesy ireo: navoakany tany ivelan’ny toby ilay lehilahy niteny ratsy an’Andriamanitra, ka novonoiny tamin-torabato.'
