        - type: text
          text: biby mampinono ka mitovy amin’ny bitro ny halehibeny.
      marker-yv: yv-n
    - type: text
      text: ', satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ny bitro, satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ny kisoa, satria mivaky kitro ihany izy nefa tsy mba nandinika. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa aza haninareo ny henany ary aza kasihinareo akory ny fatiny: maloto aminareo ireny.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Izao no ho fihinanareo amin’ny biby rehetra ao anaty rano, na farihy na ranomasina na renirano: ny biby rehetra misy vombony sy kirany. '
