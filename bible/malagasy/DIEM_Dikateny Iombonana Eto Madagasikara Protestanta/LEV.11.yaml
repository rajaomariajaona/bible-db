      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ho fady aminareo kosa izay tsy misy vombony sy kirany amin’ny zavamananaina rehetra mihetsiketsika anaty rano: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'eny, ho fady aminareo ireny, ka aza haninareo ny henany ary fadio ny mikasika ny fatiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izay biby rehetra ao anaty rano, kanefa tsy misy vombony na kirany, dia ho fady aminareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '«Izao kosa no hofadînareo amin’ny vorona ka tsy hohaninareo: ny voromahery sy ankoay isan-karazany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny fanindry sy papango isan-karazany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny goaika isan-karazany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ny aostritsa, ny tararaka, ny vorondriaka, ny hitsikitsika isan-karazany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ny vorondolo, ny manarana, ny vorondolobe, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ny gisabe, ny sama, ny arosy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ny vanobe, ny vano isan-karazany, ny takodara ary ny ramanavy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: mba hamepetra ny Israelita hoe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy lisitra mitanisa biby tahaka izao any amin’ny Deot 14.3-20. Tsy azo antoka hifanaraka amin’ny tena izy ny anaram-biby sasantsasany.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no ho fihinanareo amin’ny biby rehetra eto ambonin’ny tany: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '«Ny bibikely rehetra manana elatra sady mandia tongotra efatra dia ho fady aminareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Amin’ireo bibikely ireo anefa, dia ho azonareo hanina ihany izay manampingotra ambony faladiany hitsipitsipihany eo amin’ny tany; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ka ireto avy izany: ny valala fihinana, ny solama, ny hargôla ary ny hagaba samy isan-karazany avy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny voambolana hebreo etoana no avy hatrany dia nogasîna hitanisana ireo karazam-balala fihinana ireo.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa ny biby hafa manana elatra sady mandia tongotra efatra dia ho fady aminareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Biby sy zavatra mahaloto rehefa sendra voakasika
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Ireto biby hotanisaina manaraka ireto koa dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hahaloto
    - type: text
      text: ' anareo. Na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary na zovy na zovy mitondra ny fatin’ireo, dia haloto koa mandra-paharivan’ny andro sady tsy mainty hanasa fitafiana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-28
    - type: text
      text: 'Ireto avy àry no ho biby maloto aminareo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–ny biby rehetra tsy mba mivaky kitro ary ny biby rehetra tsy mba mandinika: na zovy na zovy mikasika azy, dia haloto.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –ny biby rehetra mandia tongotra efatra sady mandeha amin’ny faladiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ohatra, ny orsa.
      marker-yv: yv-n
    - type: text
      text: ': na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro; ary na zovy na zovy mitondra ny fatin’ireo, dia haloto koa mandra-paharivan’ny andro sady tsy maintsy hanasa fitafiana.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '«Amin’ny biby madinika mifanaretsaka ambonin’ny tany, dia ireto avy no ho maloto aminareo: ny kionkona, ny totozy, ny androngo isan-karazany '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ny biby rehetra mivaky kitro sady mandinika. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'toy ny sitry na antsiantsy na matahotrandro na mosaraina, ary ny tana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Amin’ny biby madinika rehetra, dia ireo no ho maloto aminareo; ka na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Haloto avokoa, ny zavatra ilatsahan’ny fatiny, na fanaka hazo, na fitafiana, na hoditra, na lasàka, na inona na inona fitaovana ampiasaina; eny, haloto mandra-paharivan’ny andro izany, ary tsy maintsy asoka anaty rano vao hadio. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Raha siny tanimanga no sendra ilatsahana fatim-biby madinika, dia haloto avokoa ny zavatra ao anatin’io siny io, ka tsy maintsy hovakînareo ilay siny; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'haloto koa ny zava-pihinana rehetra notapohana rano avy amin’io siny io. Haloto ihany koa ny zava-pisotro rehetra ilatsahan’ny fatin’ireo, na inona na inona fitaovana nisy azy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Haloto avokoa ny fitaovana rehetra ilatsahan’ny fatin’ireo, na fanendasana izany na vilany mirakotra; ka tsy maintsy montsaninareo izany, satria haloto izy ka ho maloto aminareo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ny amin’ny loharano na lavaka fantsakana, sendra ilatsahana fatim-biby madinika kosa, dia hadio ihany ny rano fa izay hanala ilay fatim-biby no haloto. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Raha voa famafy no ilatsahan’ny fatim-biby, dia hadio ihany ny voa famafy; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: fa raha voan-javatra hohanina ka nalona tamin’ny rano kosa no ilatsahany, dia haloto aminareo izany voan-javatra izany.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '«Raha biby fihinan-kena no maty ho azy, izay mikasika ny fatiny dia haloto mandra-paharivan’ny andro; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Kanefa ny biby mandinika fotsiny na mivaky kitro fotsiny tsy hohaninareo, fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' aminareo ireny, ohatra: ny rameva satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: izay mihinana amin’ny henany kosa dia haloto mandra-paharivan’ny andro sady tsy maintsy manasa fitafiana; ary izay hitondra ilay fatim-biby, dia haloto mandra-paharivan’ny andro ihany koa sady tsy maintsy manasa fitafiana.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: '«Ny bibikely rehetra mifanaretsaka ambonin’ny tany dia ho fady aminareo ka tsy fihinana. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Aza misy haninareo ireny bibikely ireny, na ny mikisaka amin’ny kibony, na ny mandia tongotra efatra na mihoatra noho ny efatra, satria fady aminareo ireny. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Aoka tsy hanota fady na handoto tena amin’ireny bibikely rehetra ireny ianareo, fandrao hanjary maloto ianareo. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Fa Izaho no TOMPO Andriamanitrareo. Masina Aho ka mitandrema tena mba ho masina ianareo; ary aoka ny tenanareo tsy holotoinareo amin’izay bibikely mandady amin’ny tany. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Fa Izaho no TOMPO Izay nitondra anareo niakatra avy tany Ejipta mba ho Andriamanitrareo; ka dia ho masina ianareo, satria masina Aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.45 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 44-45:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 19.2; 1 Pt 1.16.'
      marker-yv: yv-n
    - type: text
      text: .»
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ireo no fepetra momba ny biby sy ny vorona ary ny zavamananaina rehetra mihetsiketsika anaty rano na mifanaretsaka ambonin’ny tany; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ka hanavahanareo ny biby madio sy maloto ary ny biby izay fihinana sy izay tsy fihinana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ny hiràka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
