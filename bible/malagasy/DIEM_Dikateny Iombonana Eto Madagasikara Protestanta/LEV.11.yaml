type_code: plt
verses:
  '1':
  - type: heading
    content: FEPETRA NY AMIN’NY HOE MADIO SY MALOTO
  - type: heading
    content: Biby madio sy biby maloto
  - type: text
    content: 'Dia niteny tamin’i Mosesy sy i Aharôna ny TOMPO '
  '10':
  - type: text
    content: 'Ho fady aminareo kosa izay tsy misy vombony sy kirany amin’ny zavamananaina rehetra mihetsiketsika anaty rano: '
  '11':
  - type: text
    content: 'eny, ho fady aminareo ireny, ka aza haninareo ny henany ary fadio ny mikasika ny fatiny. '
  '12':
  - type: text
    content: Izay biby rehetra ao anaty rano, kanefa tsy misy vombony na kirany, dia ho fady aminareo.
  '13':
  - type: text
    content: '«Izao kosa no hofadînareo amin’ny vorona ka tsy hohaninareo: ny voromahery sy ankoay isan-karazany; '
  '14':
  - type: text
    content: 'ny fanindry sy papango isan-karazany; '
  '15':
  - type: text
    content: 'ny goaika isan-karazany; '
  '16':
  - type: text
    content: 'ny aostritsa, ny tararaka, ny vorondriaka, ny hitsikitsika isan-karazany, '
  '17':
  - type: text
    content: 'ny vorondolo, ny manarana, ny vorondolobe, '
  '18':
  - type: text
    content: 'ny gisabe, ny sama, ny arosy, '
  '19':
  - type: text
    content: ny vanobe, ny vano isan-karazany, ny takodara ary ny ramanavy.
  '2':
  - type: text
    content: mba hamepetra ny Israelita hoe
  - type: note
    content: Misy lisitra mitanisa biby tahaka izao any amin’ny Deot 14.3-20. Tsy azo antoka hifanaraka amin’ny tena izy ny anaram-biby sasantsasany.
  - type: text
    content: ':'
  - type: text
    content: '«Izao no ho fihinanareo amin’ny biby rehetra eto ambonin’ny tany: '
  '20':
  - type: text
    content: '«Ny bibikely rehetra manana elatra sady mandia tongotra efatra dia ho fady aminareo. '
  '21':
  - type: text
    content: 'Amin’ireo bibikely ireo anefa, dia ho azonareo hanina ihany izay manampingotra ambony faladiany hitsipitsipihany eo amin’ny tany; '
  '22':
  - type: text
    content: 'ka ireto avy izany: ny valala fihinana, ny solama, ny hargôla ary ny hagaba samy isan-karazany avy'
  - type: note
    content: Ny voambolana hebreo etoana no avy hatrany dia nogasîna hitanisana ireo karazam-balala fihinana ireo.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Fa ny biby hafa manana elatra sady mandia tongotra efatra dia ho fady aminareo.
  - type: heading
    content: Biby sy zavatra mahaloto rehefa sendra voakasika
  '24':
  - type: text
    content: '«Ireto biby hotanisaina manaraka ireto koa dia '
  - type: text
    content: hahaloto
  - type: text
    content: ' anareo. Na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro; '
  '25':
  - type: text
    content: 'ary na zovy na zovy mitondra ny fatin’ireo, dia haloto koa mandra-paharivan’ny andro sady tsy mainty hanasa fitafiana. '
  '26':
  - type: text
    content: 'Ireto avy àry no ho biby maloto aminareo:'
  - type: text
    content: '–ny biby rehetra tsy mba mivaky kitro ary ny biby rehetra tsy mba mandinika: na zovy na zovy mikasika azy, dia haloto.'
  - type: text
    content: –ny biby rehetra mandia tongotra efatra sady mandeha amin’ny faladiany
  - type: note
    content: Ohatra, ny orsa.
  - type: text
    content: ': na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro; ary na zovy na zovy mitondra ny fatin’ireo, dia haloto koa mandra-paharivan’ny andro sady tsy maintsy hanasa fitafiana.'
  '29':
  - type: text
    content: '«Amin’ny biby madinika mifanaretsaka ambonin’ny tany, dia ireto avy no ho maloto aminareo: ny kionkona, ny totozy, ny androngo isan-karazany '
  '3':
  - type: text
    content: 'ny biby rehetra mivaky kitro sady mandinika. '
  '30':
  - type: text
    content: 'toy ny sitry na antsiantsy na matahotrandro na mosaraina, ary ny tana. '
  '31':
  - type: text
    content: 'Amin’ny biby madinika rehetra, dia ireo no ho maloto aminareo; ka na zovy na zovy mikasika ny fatin’ireo, dia haloto mandra-paharivan’ny andro. '
  '32':
  - type: text
    content: 'Haloto avokoa, ny zavatra ilatsahan’ny fatiny, na fanaka hazo, na fitafiana, na hoditra, na lasàka, na inona na inona fitaovana ampiasaina; eny, haloto mandra-paharivan’ny andro izany, ary tsy maintsy asoka anaty rano vao hadio. '
  '33':
  - type: text
    content: 'Raha siny tanimanga no sendra ilatsahana fatim-biby madinika, dia haloto avokoa ny zavatra ao anatin’io siny io, ka tsy maintsy hovakînareo ilay siny; '
  '34':
  - type: text
    content: 'haloto koa ny zava-pihinana rehetra notapohana rano avy amin’io siny io. Haloto ihany koa ny zava-pisotro rehetra ilatsahan’ny fatin’ireo, na inona na inona fitaovana nisy azy. '
  '35':
  - type: text
    content: 'Haloto avokoa ny fitaovana rehetra ilatsahan’ny fatin’ireo, na fanendasana izany na vilany mirakotra; ka tsy maintsy montsaninareo izany, satria haloto izy ka ho maloto aminareo. '
  '36':
  - type: text
    content: 'Ny amin’ny loharano na lavaka fantsakana, sendra ilatsahana fatim-biby madinika kosa, dia hadio ihany ny rano fa izay hanala ilay fatim-biby no haloto. '
  '37':
  - type: text
    content: 'Raha voa famafy no ilatsahan’ny fatim-biby, dia hadio ihany ny voa famafy; '
  '38':
  - type: text
    content: fa raha voan-javatra hohanina ka nalona tamin’ny rano kosa no ilatsahany, dia haloto aminareo izany voan-javatra izany.
  '39':
  - type: text
    content: '«Raha biby fihinan-kena no maty ho azy, izay mikasika ny fatiny dia haloto mandra-paharivan’ny andro; '
  '4':
  - type: text
    content: 'Kanefa ny biby mandinika fotsiny na mivaky kitro fotsiny tsy hohaninareo, fa '
  - type: text
    content: maloto
  - type: text
    content: ' aminareo ireny, ohatra: ny rameva satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '40':
  - type: text
    content: izay mihinana amin’ny henany kosa dia haloto mandra-paharivan’ny andro sady tsy maintsy manasa fitafiana; ary izay hitondra ilay fatim-biby, dia haloto mandra-paharivan’ny andro ihany koa sady tsy maintsy manasa fitafiana.
  '41':
  - type: text
    content: '«Ny bibikely rehetra mifanaretsaka ambonin’ny tany dia ho fady aminareo ka tsy fihinana. '
  '42':
  - type: text
    content: 'Aza misy haninareo ireny bibikely ireny, na ny mikisaka amin’ny kibony, na ny mandia tongotra efatra na mihoatra noho ny efatra, satria fady aminareo ireny. '
  '43':
  - type: text
    content: 'Aoka tsy hanota fady na handoto tena amin’ireny bibikely rehetra ireny ianareo, fandrao hanjary maloto ianareo. '
  '44':
  - type: text
    content: 'Fa Izaho no TOMPO Andriamanitrareo. Masina Aho ka mitandrema tena mba ho masina ianareo; ary aoka ny tenanareo tsy holotoinareo amin’izay bibikely mandady amin’ny tany. '
  '45':
  - type: text
    content: Fa Izaho no TOMPO Izay nitondra anareo niakatra avy tany Ejipta mba ho Andriamanitrareo; ka dia ho masina ianareo, satria masina Aho
  - type: note
    content: 'And 44-45: jereo 19.2; 1 Pt 1.16.'
  - type: text
    content: .»
  '46':
  - type: text
    content: 'Ireo no fepetra momba ny biby sy ny vorona ary ny zavamananaina rehetra mihetsiketsika anaty rano na mifanaretsaka ambonin’ny tany; '
  '47':
  - type: text
    content: ka hanavahanareo ny biby madio sy maloto ary ny biby izay fihinana sy izay tsy fihinana.
  '5':
  - type: text
    content: ny hiràka
  - type: note
    content: 'hiràka: biby mampinono ka mitovy amin’ny bitro ny halehibeny.'
  - type: text
    content: ', satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '6':
  - type: text
    content: 'ny bitro, satria mandinika ihany izy nefa tsy mba mivaky kitro; '
  '7':
  - type: text
    content: 'ny kisoa, satria mivaky kitro ihany izy nefa tsy mba nandinika. '
  '8':
  - type: text
    content: 'Koa aza haninareo ny henany ary aza kasihinareo akory ny fatiny: maloto aminareo ireny.'
  '9':
  - type: text
    content: '«Izao no ho fihinanareo amin’ny biby rehetra ao anaty rano, na farihy na ranomasina na renirano: ny biby rehetra misy vombony sy kirany. '
