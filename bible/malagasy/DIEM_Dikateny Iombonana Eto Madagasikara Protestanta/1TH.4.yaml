verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitondrantena ankasitrahin’Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Farany, ry havana, efa nianaranareo taminay ny fitondrantena ankasitrahin’Andriamanitra, ary efa manaraka izany rahateo ianareo. Kanefa dia izao no iangavianay sy ampirisihinay anareo amin’ny anaran’i Jesoa Tompo: manaova tsaratsara kokoa hatrany! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary efa toy izany rahateo no ifampitondranareo amin’ny kristianina rehetra eran’i Masedônia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2Kôr 1.16 sy nta.
      marker-yv: yv-n
    - type: text
      text: '; nefa mampirisika anareo ihany izahay, ry havana, mba hanao tsaratsara kokoa hatrany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miezaha hanana fiainana tsy misy raorao ka tanteraho ny raharahanareo sy ny asa fivelomanareo, araka izay efa nameperanay anareo; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia haneho fitondrantena mendrika eo anoloan’ny tsy kristianina ianareo no sady tsy hanao tanty reraka amin’ny hafa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hiavian’ny Tompo
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry havana, tianay ho fantatrareo ny marina momba ireo efa nodimandry mba tsy halahelovanareo toy ny olona sasany tsy manana fanantenana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inoantsika fa maty i Jesoa ary efa nitsangana ho velona indray; inoantsika toy izany koa fa hoentin’Andriamanitra miaraka amin’i Jesoa ireo olona nodimandry tafaray amin’i Jesoa.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia izao no lazainay aminareo araka ny voalazan’ny Tompo taminay: isika velona aina, sisa tavela amin’ny andro hiavian’ny Tompo, dia tsy hialoha an’ireo efa nodimandry tsy akory. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hisy baiko hatao antso avo ombàn’ny feon’arkanjely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny teny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: arkanjely
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia ilazana anjely ambony laharana kokoa.'
      marker-yv: yv-n
    - type: text
      text: ' sy ny feon-trompetran’Andriamanitra, ka ny Tompo mihitsy no hidina avy any an-danitra. Ireo olona maty tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no hitsangana ho velona voalohany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avy eo, dia hakarina hiaraka amin’ireo ho eny amin’ny rahona koa isika velona aina sisa tavela, mba hitsena ny Tompo eny amin’ny habakabaka; ary dia hiaraka amin’ny Tompo mandrakizay isika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 15-17:'
      - type: usfm
        marker: ft
        children:
