      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izany teny izany àry no aoka hifampiononanareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrareo rahateo ireo fepetra avy amin’i Jesoa Tompo nomenay anareo; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izao no sitrapon’Andriamanitra: mba ho masina ianareo, ka hifady ny fijangajangana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka samy hahay maka vady amin’ny fomba masina sy mihaja
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hahay... mihaja: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hahay mitandro ny tenany raha hiaina amin’ny fomba masina sy mihaja.
      marker-yv: yv-n
    - type: text
      text: 'ianareo lehilahy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy hobaikoin’ny filàndratsy, toy ireo mpanompo sampy izay tsy mahalala an’Andriamanitra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka amin’izany raharaham-panambadiana izany, dia aoka tsy hisy olona hanao ny tsy rariny amin’ny namany na hifetsy azy. Araka ny efa voalazanay taminareo sy nameperanay mafy anareo, dia hofaizin’ny Tompo izay manao ireny karazan-javatra ireny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra tsy niantso antsika hiaina amin’ny fahalotoana fa hiaina amin’ny fahamasinana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izay mandà izany fampianarana izany, dia tsy olona no laviny fa Andriamanitra Izay manome anareo ny Fanahiny Masina.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Momba ny fifankatiavan’ny samy kristianina, dia tsy ilaina ny hanoratako aminareo, satria ny tenanareo dia ampianarin’Andriamanitra hifankatia. '
