document_id: 1TH.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitondrantena ankasitrahin’Andriamanitra
  - type: text
    content: 'Farany, ry havana, efa nianaranareo taminay ny fitondrantena ankasitrahin’Andriamanitra, ary efa manaraka izany rahateo ianareo. Kanefa dia izao no iangavianay sy ampirisihinay anareo amin’ny anaran’i Jesoa Tompo: manaova tsaratsara kokoa hatrany! '
  '10':
  - type: text
    content: Ary efa toy izany rahateo no ifampitondranareo amin’ny kristianina rehetra eran’i Masedônia
  - type: note
    content: Jereo 2Kôr 1.16 sy nta.
  - type: text
    content: '; nefa mampirisika anareo ihany izahay, ry havana, mba hanao tsaratsara kokoa hatrany. '
  '11':
  - type: text
    content: 'Miezaha hanana fiainana tsy misy raorao ka tanteraho ny raharahanareo sy ny asa fivelomanareo, araka izay efa nameperanay anareo; '
  '12':
  - type: text
    content: dia haneho fitondrantena mendrika eo anoloan’ny tsy kristianina ianareo no sady tsy hanao tanty reraka amin’ny hafa.
  - type: heading
    content: Ny hiavian’ny Tompo
  '13':
  - type: text
    content: 'Ry havana, tianay ho fantatrareo ny marina momba ireo efa nodimandry mba tsy halahelovanareo toy ny olona sasany tsy manana fanantenana. '
  '14':
  - type: text
    content: Inoantsika fa maty i Jesoa ary efa nitsangana ho velona indray; inoantsika toy izany koa fa hoentin’Andriamanitra miaraka amin’i Jesoa ireo olona nodimandry tafaray amin’i Jesoa.
  '15':
  - type: text
    content: 'Koa dia izao no lazainay aminareo araka ny voalazan’ny Tompo taminay: isika velona aina, sisa tavela amin’ny andro hiavian’ny Tompo, dia tsy hialoha an’ireo efa nodimandry tsy akory. '
  '16':
  - type: text
    content: Hisy baiko hatao antso avo ombàn’ny feon’arkanjely
  - type: note
    content: Ny teny hoe arkanjely dia ilazana anjely ambony laharana kokoa.
  - type: text
    content: ' sy ny feon-trompetran’Andriamanitra, ka ny Tompo mihitsy no hidina avy any an-danitra. Ireo olona maty tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' no hitsangana ho velona voalohany; '
  '17':
  - type: text
    content: avy eo, dia hakarina hiaraka amin’ireo ho eny amin’ny rahona koa isika velona aina sisa tavela, mba hitsena ny Tompo eny amin’ny habakabaka; ary dia hiaraka amin’ny Tompo mandrakizay isika
  - type: note
    content: 'And 15-17: ampit 1Kôr 15.51-52.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Koa izany teny izany àry no aoka hifampiononanareo.
  '2':
  - type: text
    content: 'Fantatrareo rahateo ireo fepetra avy amin’i Jesoa Tompo nomenay anareo; '
  '3':
  - type: text
    content: 'satria izao no sitrapon’Andriamanitra: mba ho masina ianareo, ka hifady ny fijangajangana. '
  '4':
  - type: text
    content: Aoka samy hahay maka vady amin’ny fomba masina sy mihaja
  - type: note
    content: 'hahay... mihaja: dkt hafa hahay mitandro ny tenany raha hiaina amin’ny fomba masina sy mihaja.'
  - type: text
    content: 'ianareo lehilahy, '
  '5':
  - type: text
    content: 'fa tsy hobaikoin’ny filàndratsy, toy ireo mpanompo sampy izay tsy mahalala an’Andriamanitra; '
  '6':
  - type: text
    content: 'ka amin’izany raharaham-panambadiana izany, dia aoka tsy hisy olona hanao ny tsy rariny amin’ny namany na hifetsy azy. Araka ny efa voalazanay taminareo sy nameperanay mafy anareo, dia hofaizin’ny Tompo izay manao ireny karazan-javatra ireny. '
  '7':
  - type: text
    content: 'Fa Andriamanitra tsy niantso antsika hiaina amin’ny fahalotoana fa hiaina amin’ny fahamasinana. '
  '8':
  - type: text
    content: Koa izay mandà izany fampianarana izany, dia tsy olona no laviny fa Andriamanitra Izay manome anareo ny Fanahiny Masina.
  '9':
  - type: text
    content: 'Momba ny fifankatiavan’ny samy kristianina, dia tsy ilaina ny hanoratako aminareo, satria ny tenanareo dia ampianarin’Andriamanitra hifankatia. '
