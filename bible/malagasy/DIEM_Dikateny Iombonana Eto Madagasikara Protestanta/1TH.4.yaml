document_id: 1TH.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitondrantena ankasitrahin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Farany, ry havana, efa nianaranareo taminay ny fitondrantena ankasitrahin’Andriamanitra, ary efa manaraka izany rahateo ianareo. Kanefa dia izao no iangavianay sy ampirisihinay anareo amin’ny anaran’i Jesoa Tompo: manaova tsaratsara kokoa hatrany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo rahateo ireo fepetra avy amin’i Jesoa Tompo nomenay anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria izao no sitrapon’Andriamanitra: mba ho masina ianareo, ka hifady ny fijangajangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka samy hahay maka vady amin’ny fomba masina sy mihaja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hahay... mihaja: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hahay mitandro ny tenany raha hiaina amin’ny fomba masina sy mihaja.
    marker-yv: yv-n
  - type: text
    text: 'ianareo lehilahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa tsy hobaikoin’ny filàndratsy, toy ireo mpanompo sampy izay tsy mahalala an’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka amin’izany raharaham-panambadiana izany, dia aoka tsy hisy olona hanao ny tsy rariny amin’ny namany na hifetsy azy. Araka ny efa voalazanay taminareo sy nameperanay mafy anareo, dia hofaizin’ny Tompo izay manao ireny karazan-javatra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Andriamanitra tsy niantso antsika hiaina amin’ny fahalotoana fa hiaina amin’ny fahamasinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa izay mandà izany fampianarana izany, dia tsy olona no laviny fa Andriamanitra Izay manome anareo ny Fanahiny Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Momba ny fifankatiavan’ny samy kristianina, dia tsy ilaina ny hanoratako aminareo, satria ny tenanareo dia ampianarin’Andriamanitra hifankatia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary efa toy izany rahateo no ifampitondranareo amin’ny kristianina rehetra eran’i Masedônia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2Kôr 1.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; nefa mampirisika anareo ihany izahay, ry havana, mba hanao tsaratsara kokoa hatrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Miezaha hanana fiainana tsy misy raorao ka tanteraho ny raharahanareo sy ny asa fivelomanareo, araka izay efa nameperanay anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia haneho fitondrantena mendrika eo anoloan’ny tsy kristianina ianareo no sady tsy hanao tanty reraka amin’ny hafa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hiavian’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ry havana, tianay ho fantatrareo ny marina momba ireo efa nodimandry mba tsy halahelovanareo toy ny olona sasany tsy manana fanantenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Inoantsika fa maty i Jesoa ary efa nitsangana ho velona indray; inoantsika toy izany koa fa hoentin’Andriamanitra miaraka amin’i Jesoa ireo olona nodimandry tafaray amin’i Jesoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa dia izao no lazainay aminareo araka ny voalazan’ny Tompo taminay: isika velona aina, sisa tavela amin’ny andro hiavian’ny Tompo, dia tsy hialoha an’ireo efa nodimandry tsy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hisy baiko hatao antso avo ombàn’ny feon’arkanjely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny teny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: arkanjely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilazana anjely ambony laharana kokoa.'
    marker-yv: yv-n
  - type: text
    text: ' sy ny feon-trompetran’Andriamanitra, ka ny Tompo mihitsy no hidina avy any an-danitra. Ireo olona maty tafaray amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no hitsangana ho velona voalohany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: avy eo, dia hakarina hiaraka amin’ireo ho eny amin’ny rahona koa isika velona aina sisa tavela, mba hitsena ny Tompo eny amin’ny habakabaka; ary dia hiaraka amin’ny Tompo mandrakizay isika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 15-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 1Kôr 15.51-52.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa izany teny izany àry no aoka hifampiononanareo.
