document_id: 2CH.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hoy i Salômôna: «TOMPO ô, efa nilaza Ianao fa honina ao anatin’ny haizim-pito. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia notanterahin’ny TOMPO araka izany tokoa ny fampanantenana nolazainy; fa nandimby an’i Davida raiko aho ary mipetraka amin’ny sezafiandrianan’i Israely araka ny voalazan’ny TOMPO, sady efa nanorina ity tempoly ity ho voninahitry ny TOMPO Andriamanitr’i Israely; '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ary napetrako tao ny Vatamasina mirakitra ny fanekempihavanana nataon’ny TOMPO tamin’ny Israelita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vavaka lehibe nataon’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 8.22-53)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nitsangana teo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: 'n’ny TOMPO sady nanatrika ny Israelita rehetra tafangona i Salômôna, ka nanandra-tanana hivavaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Efa nanao lampihalimo rahateo i Salômôna, dia lampihalimo izay napetrany teo afovoan’ny kianja: efamira izy io ka mirefy roa metatra sy sasany avy ny lafiny ary iray metatra sy sasany ny haavony. Dia niakatra teo ambonin’io lampihalimo io i Salômôna, ary nandohalika teo anatrehan’ny Israelita rehetra tafangona izy no nanandra-tanana manandrify ny lanitra '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ka nivavaka hoe: «Ry TOMPO Andriamanitr’i Israely ô, tsy misy Andriamanitra tahaka Anao na any an-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: ' na etỳ an-tany. Tandrovinao hatrany ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavananao
    - type: text
      text: ' sy ny fitiavanao amin’ireo mpanomponao izay mizotra eo anatrehanao amin’ny fony manontolo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Efa notanterahinao tamin’i Davida raiko sady mpanomponao ny zavatra nampanantenainao azy; eny, izay voalazanao dia notontosainao araka izao hita anio izao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa ankehitriny, ry TOMPO Andriamanitr’i Israely ô, mba tanteraho hanambinana an’i Davida raiko sady mpanomponao ilay fampanantenana nataonao taminy, fony Ianao nilaza hoe: ‹Raha mitandrina fitondrantena ireo taranakao ka mizotra araka ny lalànako tahaka ny nataonao teo anatrehako, dia tsy ho diso zanakalahy amin’ireo ianao noho ny amiko, dia zanakalahy izay hanjaka handimby anao eo amin’ny sezafiandrianan’i Israely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 2.4.
      marker-yv: yv-n
    - type: text
      text: '.› '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ankehitriny àry, ry TOMPO Andriamanitr’i Israely ô, ho to anie ny fampanantenana voalazanao tamin’i Davida mpanomponao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Nefa hety honina miaraka amin’ny olona etỳ an-tany ve Ianao, Andriamanitra ô? Indro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lanitra
    - type: text
      text: ', na dia midadasika tokoa aza, tsy omby Anao; koa mainka fa ity tempoly izay nataoko ity'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.5.
      marker-yv: yv-n
    - type: text
      text: '! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Na izany aza, ry TOMPO Andriamanitro ô, mba atreho ny vavaka amam-pifònako; eny, mba henoy ny antso sy ny vavaka izay ataoko eto anatrehanao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Kanefa izaho efa nanorina trano hipetrahanao, dia toerana honenanao mandrakizay!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kabary fitokanana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 8.14-21)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Aoka hojerenao amin-kamorampo andro aman’alina ity tempoly ity, dia ilay toerana nolazainao fa hampitoeranao ny voninahitrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 12.11.
      marker-yv: yv-n
    - type: text
      text: '! Koa mba henoy ny vavaka izay ataoko rehefa mitodika amin’ity toerana ity aho. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Hohenoinao anie ny fifonako sy ny an’ilay Israely vahoakanao, rehefa mivavaka mitodika amin’ity toerana ity izahay. Mba mihainoa any an-danitra toeram-ponenanao Ianao; eny, mihainoa ka mamelà heloka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '«Mety hisy olona manota amin’ny namany, ka asaina manao fianianana ombàm-piozonana. Rehefa tonga hanao izany eto anoloan’ny alitaranao amin’ity tempoly ity izy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: dia mba mihainoa any an-danitra Ianao, Tompo ô, ka midira an-tsehatra hitsara ireo mpanomponao ireo; dia sazio ny olo-meloka, ary atsingereno aminy ny ratsy nataony fa ambarao ho marina kosa ny olo-marina ka valio soa araka ny fahamarinany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Mety ho resim-pahavalo ny Israelita vahoakanao noho ny nanotany taminao. Rehefa miverina aminao izy ka midera ny anaranao, ary mivavaka sy mifona eto anatrehanao amin’ity tempoly ity, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: dia mba mihainoa avy any an-danitra Ianao, Tompo ô, ka mamelà ny fahotan’i Israely vahoakanao, ary avereno aminy indray ny tany izay nomenao azy sy ny razany!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '«Mety koa hikatona ny lanitra ka tsy misy ny ranonorana noho ny nanotan’ny Israelita taminao. Rehefa mivavaka mitodika amin’ity toerana ity izy, ka midera ny anaranao sady miala amin’ny fahotany satria nampahorînao, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia mihainoa any an-danitra, Tompo ô, ka mamelà ny fahotan’ireo mpanomponao, izany hoe ny Israelita vahoakanao; ampianaro azy ny fitondrantena tsara izay tokony hizorany ary andatsaho ranonorana ity taninao izay nomenao ho fananan’ny vahoakanao ity.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '«Mety hisy mosary eto amin’ity tany ity na areti-mandringana, mety ho mainan’ny rivotra na ho maty fotsy ny vary, na koa hisy andiam-balala sy sompanga tonga; mety hisy fahavalo manao fahirano ny Israelita eto amin’ny taniny sy eto amin’ny tanànany, na koa hipoitra ny fahoriana aman’areti-mifindra isan-karazany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Rehefa ny olona iray na ny Israelita rehetra vahoakanao manandra-tanana mitodika amin’ity tempoly ity, ka samy manao vavaka amam-pifonana, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nitsangana avokoa tamin’izay ny Israelita rehetra tafangona teo; dia nitodika tamin’izy ireo ny mpanjaka ary niarahaba azy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, Tompo ô, ka mamelà heloka azy; ary araka ny sori-dalana rehetra nizorany anie no samy hamalianao azy avy, satria fantatrao ny fony; eny, Ianao dia Ianao irery ihany no mahalala ny fon’ny olombelona. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izany no hataonao amin’ny Israelita, dia ny mba hanajany Anao sy hizorany amin’ny sori-dalanao mandritra ny andro rehetra hiainany eto amin’ity tany nomenao ny razanay ity.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '«Mety hisy ny vahiny izay tsy anisan’ny Israelita vahoakanao; kanefa niainga avy any an-tany lavitra hankatỳ noho ny lazanao lehibe sy ny fiarovanao mahery ary ny fahefana ampiharinao. Rehefa tonga hivavaka mitodika amin’ity tempoly ity izy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, Tompo ô, ka manaova araka izay rehetra angatahiny aminao. Izany no hahalalan’ny firenena rehetra ambonin’ny tany Anao sy hanajany ny Anao tahaka ny ataon’ny Israelita vahoakanao ary hiekeny fa ny anaranao no efa nantsoina tamin’ity tempoly naoriko ity.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '«Mety hiainga hiady amim-pahavalo ny vahoakanao, na aiza na aiza hanirahanao azy; rehefa mivavaka aminao izy ka mitodika amin’ity tanàna voafidinao ity sy amin’ity tempoly naoriko ho voninahitrao ity, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: dia mba henoy avy any an-danitra ny vavaka amam-pifonana ataony, Tompo ô, ka omeo rariny izy.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '«Mety hanota aminao ny Israelita fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy amin’ny fahavalony; dia hoentin’ny mpamabo ho babo any an-tany lavitra na akaiky ireo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Rehefa mieritreritra izy any amin’ny tany nitondrana azy ho babo any, dia hivalo sy hifona aminao manao hoe: ‹Efa nanota izahay sady efa nahavita heloka sy efa nanao ratsy›; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'ary hiverina aminao amin’ny fo sy fanahy manontolo izy ao amin’izany tany nitondrana azy ho babo izany sady mivavaka manandrify ny taniny izay nomenao ny razany ity sy amin’ity tanàna voafidinao ity ary amin’ity tempoly naoriko ho voninahitro ity, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: dia mba henoy avy any an-danitra toeram-ponenanao ny vavaka amam-pifonana ataony, Tompo ô, ka omeo rariny izy; ary dia avelao heloka ny vahoakanao izay efa nanota taminao!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
