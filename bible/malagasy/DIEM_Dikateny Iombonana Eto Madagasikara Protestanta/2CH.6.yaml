document_id: 2CH.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia hoy i Salômôna: «TOMPO ô, efa nilaza Ianao fa honina ao anatin’ny haizim-pito. '
  '10':
  - type: text
    content: 'Dia notanterahin’ny TOMPO araka izany tokoa ny fampanantenana nolazainy; fa nandimby an’i Davida raiko aho ary mipetraka amin’ny sezafiandrianan’i Israely araka ny voalazan’ny TOMPO, sady efa nanorina ity tempoly ity ho voninahitry ny TOMPO Andriamanitr’i Israely; '
  '11':
  - type: text
    content: ary napetrako tao ny Vatamasina mirakitra ny fanekempihavanana nataon’ny TOMPO tamin’ny Israelita.
  - type: heading
    content: Ny vavaka lehibe nataon’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 8.22-53)
  '12':
  - type: text
    content: 'Dia nitsangana teo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: 'n’ny TOMPO sady nanatrika ny Israelita rehetra tafangona i Salômôna, ka nanandra-tanana hivavaka. '
  '13':
  - type: text
    content: 'Efa nanao lampihalimo rahateo i Salômôna, dia lampihalimo izay napetrany teo afovoan’ny kianja: efamira izy io ka mirefy roa metatra sy sasany avy ny lafiny ary iray metatra sy sasany ny haavony. Dia niakatra teo ambonin’io lampihalimo io i Salômôna, ary nandohalika teo anatrehan’ny Israelita rehetra tafangona izy no nanandra-tanana manandrify ny lanitra '
  '14':
  - type: text
    content: 'ka nivavaka hoe: «Ry TOMPO Andriamanitr’i Israely ô, tsy misy Andriamanitra tahaka Anao na any an-'
  - type: text
    content: danitra
  - type: text
    content: ' na etỳ an-tany. Tandrovinao hatrany ny '
  - type: text
    content: fanekempihavananao
  - type: text
    content: ' sy ny fitiavanao amin’ireo mpanomponao izay mizotra eo anatrehanao amin’ny fony manontolo. '
  '15':
  - type: text
    content: 'Efa notanterahinao tamin’i Davida raiko sady mpanomponao ny zavatra nampanantenainao azy; eny, izay voalazanao dia notontosainao araka izao hita anio izao. '
  '16':
  - type: text
    content: 'Koa ankehitriny, ry TOMPO Andriamanitr’i Israely ô, mba tanteraho hanambinana an’i Davida raiko sady mpanomponao ilay fampanantenana nataonao taminy, fony Ianao nilaza hoe: ‹Raha mitandrina fitondrantena ireo taranakao ka mizotra araka ny lalànako tahaka ny nataonao teo anatrehako, dia tsy ho diso zanakalahy amin’ireo ianao noho ny amiko, dia zanakalahy izay hanjaka handimby anao eo amin’ny sezafiandrianan’i Israely'
  - type: note
    content: Jereo 1 Mp 2.4.
  - type: text
    content: '.› '
  '17':
  - type: text
    content: Ankehitriny àry, ry TOMPO Andriamanitr’i Israely ô, ho to anie ny fampanantenana voalazanao tamin’i Davida mpanomponao.
  '18':
  - type: text
    content: '«Nefa hety honina miaraka amin’ny olona etỳ an-tany ve Ianao, Andriamanitra ô? Indro ny '
  - type: text
    content: lanitra
  - type: text
    content: ', na dia midadasika tokoa aza, tsy omby Anao; koa mainka fa ity tempoly izay nataoko ity'
  - type: note
    content: Jereo 2.5.
  - type: text
    content: '! '
  '19':
  - type: text
    content: 'Na izany aza, ry TOMPO Andriamanitro ô, mba atreho ny vavaka amam-pifònako; eny, mba henoy ny antso sy ny vavaka izay ataoko eto anatrehanao. '
  '2':
  - type: text
    content: Kanefa izaho efa nanorina trano hipetrahanao, dia toerana honenanao mandrakizay!»
  - type: heading
    content: Kabary fitokanana ny tempoly
  - type: heading
    content: (Jereo 1 Mp 8.14-21)
  '20':
  - type: text
    content: Aoka hojerenao amin-kamorampo andro aman’alina ity tempoly ity, dia ilay toerana nolazainao fa hampitoeranao ny voninahitrao
  - type: note
    content: Jereo Deot 12.11.
  - type: text
    content: '! Koa mba henoy ny vavaka izay ataoko rehefa mitodika amin’ity toerana ity aho. '
  '21':
  - type: text
    content: Hohenoinao anie ny fifonako sy ny an’ilay Israely vahoakanao, rehefa mivavaka mitodika amin’ity toerana ity izahay. Mba mihainoa any an-danitra toeram-ponenanao Ianao; eny, mihainoa ka mamelà heloka.
  '22':
  - type: text
    content: '«Mety hisy olona manota amin’ny namany, ka asaina manao fianianana ombàm-piozonana. Rehefa tonga hanao izany eto anoloan’ny alitaranao amin’ity tempoly ity izy, '
  '23':
  - type: text
    content: dia mba mihainoa any an-danitra Ianao, Tompo ô, ka midira an-tsehatra hitsara ireo mpanomponao ireo; dia sazio ny olo-meloka, ary atsingereno aminy ny ratsy nataony fa ambarao ho marina kosa ny olo-marina ka valio soa araka ny fahamarinany.
  '24':
  - type: text
    content: '«Mety ho resim-pahavalo ny Israelita vahoakanao noho ny nanotany taminao. Rehefa miverina aminao izy ka midera ny anaranao, ary mivavaka sy mifona eto anatrehanao amin’ity tempoly ity, '
  '25':
  - type: text
    content: dia mba mihainoa avy any an-danitra Ianao, Tompo ô, ka mamelà ny fahotan’i Israely vahoakanao, ary avereno aminy indray ny tany izay nomenao azy sy ny razany!
  '26':
  - type: text
    content: '«Mety koa hikatona ny lanitra ka tsy misy ny ranonorana noho ny nanotan’ny Israelita taminao. Rehefa mivavaka mitodika amin’ity toerana ity izy, ka midera ny anaranao sady miala amin’ny fahotany satria nampahorînao, '
  '27':
  - type: text
    content: dia mihainoa any an-danitra, Tompo ô, ka mamelà ny fahotan’ireo mpanomponao, izany hoe ny Israelita vahoakanao; ampianaro azy ny fitondrantena tsara izay tokony hizorany ary andatsaho ranonorana ity taninao izay nomenao ho fananan’ny vahoakanao ity.
  '28':
  - type: text
    content: '«Mety hisy mosary eto amin’ity tany ity na areti-mandringana, mety ho mainan’ny rivotra na ho maty fotsy ny vary, na koa hisy andiam-balala sy sompanga tonga; mety hisy fahavalo manao fahirano ny Israelita eto amin’ny taniny sy eto amin’ny tanànany, na koa hipoitra ny fahoriana aman’areti-mifindra isan-karazany. '
  '29':
  - type: text
    content: 'Rehefa ny olona iray na ny Israelita rehetra vahoakanao manandra-tanana mitodika amin’ity tempoly ity, ka samy manao vavaka amam-pifonana, '
  '3':
  - type: text
    content: 'Nitsangana avokoa tamin’izay ny Israelita rehetra tafangona teo; dia nitodika tamin’izy ireo ny mpanjaka ary niarahaba azy. '
  '30':
  - type: text
    content: 'dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, Tompo ô, ka mamelà heloka azy; ary araka ny sori-dalana rehetra nizorany anie no samy hamalianao azy avy, satria fantatrao ny fony; eny, Ianao dia Ianao irery ihany no mahalala ny fon’ny olombelona. '
  '31':
  - type: text
    content: Izany no hataonao amin’ny Israelita, dia ny mba hanajany Anao sy hizorany amin’ny sori-dalanao mandritra ny andro rehetra hiainany eto amin’ity tany nomenao ny razanay ity.
  '32':
  - type: text
    content: '«Mety hisy ny vahiny izay tsy anisan’ny Israelita vahoakanao; kanefa niainga avy any an-tany lavitra hankatỳ noho ny lazanao lehibe sy ny fiarovanao mahery ary ny fahefana ampiharinao. Rehefa tonga hivavaka mitodika amin’ity tempoly ity izy, '
  '33':
  - type: text
    content: dia mba mihainoa avy any an-danitra toeram-ponenanao Ianao, Tompo ô, ka manaova araka izay rehetra angatahiny aminao. Izany no hahalalan’ny firenena rehetra ambonin’ny tany Anao sy hanajany ny Anao tahaka ny ataon’ny Israelita vahoakanao ary hiekeny fa ny anaranao no efa nantsoina tamin’ity tempoly naoriko ity.
  '34':
  - type: text
    content: '«Mety hiainga hiady amim-pahavalo ny vahoakanao, na aiza na aiza hanirahanao azy; rehefa mivavaka aminao izy ka mitodika amin’ity tanàna voafidinao ity sy amin’ity tempoly naoriko ho voninahitrao ity, '
  '35':
  - type: text
    content: dia mba henoy avy any an-danitra ny vavaka amam-pifonana ataony, Tompo ô, ka omeo rariny izy.
  '36':
  - type: text
    content: '«Mety hanota aminao ny Israelita fa tsy misy olombelona tsy manota, ka tezitra aminy Ianao ary manolotra azy amin’ny fahavalony; dia hoentin’ny mpamabo ho babo any an-tany lavitra na akaiky ireo. '
  '37':
  - type: text
    content: 'Rehefa mieritreritra izy any amin’ny tany nitondrana azy ho babo any, dia hivalo sy hifona aminao manao hoe: ‹Efa nanota izahay sady efa nahavita heloka sy efa nanao ratsy›; '
  '38':
  - type: text
    content: 'ary hiverina aminao amin’ny fo sy fanahy manontolo izy ao amin’izany tany nitondrana azy ho babo izany sady mivavaka manandrify ny taniny izay nomenao ny razany ity sy amin’ity tanàna voafidinao ity ary amin’ity tempoly naoriko ho voninahitro ity, '
  '39':
  - type: text
    content: dia mba henoy avy any an-danitra toeram-ponenanao ny vavaka amam-pifonana ataony, Tompo ô, ka omeo rariny izy; ary dia avelao heloka ny vahoakanao izay efa nanota taminao!
  '4':
  - type: text
    content: 'Avy eo izy dia hoe:'
  - type: text
    content: '–Hisaorana anie ny TOMPO Andriamanitr’i Israely. Fa notontosainy tokoa ny zavatra nampanantenainy tamin’i Davida raiko hoe: '
  '40':
  - type: text
    content: «Ankehitriny, Andriamanitro ô, enga anie ny masonao hijery
  - type: text
    content: ary enga anie ny sofinao hihaino ny vavaka atao aminao eto amin’ity toerana ity.
  '41':
  - type: text
    content: «Koa ankehitriny, ry TOMPO Andriamanitra ô,
  - type: text
    content: avia honina amin’ny toeram-pitsaharanao,
  - type: text
    content: 'dia Ianao sy ilay '
  - type: text
    content: Vatamasina
  - type: text
    content: ' itoeran’ny herinao.'
  - type: text
    content: Ry TOMPO Andriamanitra ô,
  - type: text
    content: aoka ny mpisoronao hitafy famonjena,
  - type: text
    content: ary aoka ireo mpivavaka aminao
  - type: text
    content: hifaly heni-kasambarana!
  '42':
  - type: text
    content: Ry TOMPO Andriamanitra ô,
  - type: text
    content: aza lavinao ny vavak’ity mpanjaka voahosotrao;
  - type: text
    content: tsarovy ny fitahiana nampanantenainao
  - type: text
    content: an’i Davida mpanomponao
  - type: note
    content: Ny and 41-42 dia tsy misy and mirazotra aminy ao amin’ny 1 Mp 8, kanefa ahitana rijan-teny mitovitovy amin’izany ao amin’ny Sal 132.8-10.
  - type: text
    content: .»
  '5':
  - type: text
    content: «Hatramin’ny andro nitondrako ny vahoakako niala tany Ejipta, dia tsy mbola nisy tanàna nofidiko tamin’ny foko israelita rehetra
  - type: note
    content: Jereo 1 Mp 8.16 sy nta.
  - type: text
    content: ' hanaovana '
  - type: text
    content: tempoly
  - type: text
    content: ' mba hitoeran’ny voninahitro; ary tsy mbola nisy koa olona nofidiko ho mpifehy an’i Israely vahoakako. '
  '6':
  - type: text
    content: 'Fa nifidy an’i Jerosalema Aho hitoeran’ny voninahitro, ary nifidy anao Aho, ry Davida hifehy ilay Israely vahoakako.» '
  '7':
  - type: text
    content: 'Efa mby tao am-pon’i Davida raiko ny hanorina tempoly ho voninahitry ny TOMPO Andriamanitr’i Israely. '
  '8':
  - type: text
    content: 'Kanefa hoy ny TOMPO taminy: «Satria efa mby tao am-ponao ny fikasana hanorina tempoly ho voninahitro, dia tsara tokoa izany fikasanao izany. '
  '9':
  - type: text
    content: Kanefa tsy ianao no hanorina izany fa ny zanakao lahy haterakao; izy no hanorina ny tempoly ho voninahitro
  - type: note
    content: 'And 4-9: jereo 2 Sam 7.1-13; 1 Tan 17.1-12.'
  - type: text
    content: '.» '
