document_id: COL.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Eny, tiako ho fantatrareo fa miezaka mafy tokoa aho hanasoavana anareo sy izay any Laôdisia
  - type: note
    content: Jereo 4.13 sy nta.
  - type: text
    content: ' mbamin’izay rehetra tsy mbola nahita ny tavako velively. '
  '10':
  - type: text
    content: Ka efa heni-tsoa tokoa ianareo satria tafaray amin’Ilay ambonin’ny fanapahana sy fahefana isan-tokony.
  '11':
  - type: text
    content: 'Noho ny firaisana amin’i Kristy, dia voafora ianareo nefa tsy tamin’ny '
  - type: text
    content: famorana
  - type: text
    content: ' nataon-tanan’olona fa tamin’ny famorana nataon’i Kristy, izany hoe famorana manaisotra ny herin’ny maha olona mpanota; '
  '12':
  - type: text
    content: 'fa tamin’ny nanaovana '
  - type: text
    content: batisa
  - type: text
    content: ' anareo, dia niara-nilevina tamin’i Kristy ianareo ary niara-nitsangana taminy koa, satria nino ny herin’ilay Andriamanitra nanangana Azy ho velona avy tany amin’ny maty'
  - type: note
    content: Ampit Rm 6.4.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Maty ara-panahy ianareo fahiny noho ny fahadisoanareo ary noho ianareo tsy voafora tamin’ny maha olona mpanota; ankehitriny kosa, dia novelomin’Andriamanitra niaraka amin’i Kristy ianareo, rehefa navelany avokoa ny fahadisoantsika. '
  '14':
  - type: text
    content: 'Novonoiny ny sora-tanana namely antsika, dia ilay nirakitra ny didy niampanga antsika; ary mova tsy nofantsihany teo amin’ny hazofijaliana izany sora-tanana izany ka nofoanany tsy hanan-kery intsony. '
  '15':
  - type: text
    content: Koa ny hazofijaliana no nandravan’i Kristy ny herin’ny fanapahana sy fahefana
  - type: note
    content: 'fanapahana sy fahefana: jereo 1.16 sy nta. –Koa ny hazofijaliana...fahefana: dkt hafa Koa nanafaka ny tenany tamin’ny herin’ireo fanapahana sy fahefana ireo i Kristy: ampit 1 Kôr 15.24.'
  - type: text
    content: ; dia nataony babo ireo ka nanjohy ny matsom-pandreseny ary nasehony miharihary ho fizàhan’ny olona.
  '16':
  - type: text
    content: 'Aza avela hisy olona hitsara anareo momba ny zava-pihinana sy ny zava-pisotro, na ny fombafomba fanao amin’ny fankalazana na amin’ny tsinambolana na amin’ny '
  - type: text
    content: sabata
  - type: note
    content: 'Ireny fombafomba notandremana ireny dia avy amin’ny fivavahana jiosy. –hitsara: ampit Rm 14.1-6.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ireo rehetra ireo no tandindon’ny soa ho avy, fa ny tena zavatra dia i Kristy. '
  '18':
  - type: text
    content: 'Aoka tsy hisy olona hisakana anareo tsy hahazo ny amboara, ka hitaona anareo hanana fanetrentena haitraitra sy hivavaka amin’ny '
  - type: text
    content: anjely
  - type: text
    content: '. Manindrahindra ny fahitana azony ry zareo ka mieboebo tsy amin’antony, noho ny fisainany baikoin’ny maha olombelona azy. '
  '19':
  - type: text
    content: Tsy mifikitra amin’i Kristy Izay loha izy ireo, kanefa i Kristy no mamelona ny tena manontolo sady mampiray azy amin’ny alalan’ny hozatra amam-pamavàny ka mampitombo azy araka ny fitomboana sitrak’Andriamanitra.
  - type: heading
    content: Maty sy velona miaraka amin’i Kristy
  '2':
  - type: text
    content: Miezaka mafy aho mba ho tafaray tsara amin’ny fitiavana izy ireo ka hampaherezina ny fony ary mba hanan-toky be dia be vokatry ny fahazavan-tsaina omen’Andriamanitra; hany ka ho fantatr’izy ireo tsara ilay tsiambaratelon’Andriamanitra, dia i Kristy
  - type: note
    content: ilay tsiambaratelon’Andriamanitra, dia i Kristy; misy stf sasany ahitana hoe ny tsiambaratelon’ilay Andriamanitra, Rain’i Kristy ary misy koa ahitana hoe ilay tsiambaratelon’Andriamanitra Ray sy ilay tsiambaratelon’i Kristy.
  - type: text
    content: ': '
  '20':
  - type: text
    content: Niara-maty tamin’i Kristy ianareo sady afaka tamin’ny herin-javatra mangeja an’
  - type: text
    content: izao tontolo izao
  - type: note
    content: Jereo Gal 4.3 sy nta.
  - type: text
    content: '. Koa nahoana ianareo no miaina toy ny mbola voafehin’izao tontolo izao? Ary nahoana ianareo no mety hoteren’olona amin’ny fitsipika toy ny hoe: '
  '21':
  - type: text
    content: '«Aza mihinana an’ity», «Aza manandrana an’irỳ», «Aza mikasika an’izatsy na iroa»? '
  '22':
  - type: text
    content: 'Zavatra mora levona amin’izay ampiasana azy avokoa ireo rehetra ireo, satria didy sy fampianarana avy amin’olombelona. '
  '23':
  - type: text
    content: 'Miseho ho fahendrena ireny didy sy fampianarana ireny satria hoe fivavahana vokatry ny finiavana ka ietren-tena manoloana ny '
  - type: text
    content: anjely
  - type: text
    content: ' sy amolahana mafy ny vatana; kanefa tsy misy heriny akory hahasakana ny fanaranan’ny maha olona mpanota.'
  '3':
  - type: text
    content: fa miafina ao amin’i Kristy ny rakitra rehetra momba ny fahendrena sy ny fahalalana avy amin’Andriamanitra.
  '4':
  - type: text
    content: 'Lazaiko aminareo izany mba tsy hahavoafitaka anareo amin’ny fandrebirebena tsara lahatra. '
  '5':
  - type: text
    content: Fa na dia lavitra anareo aza aho ara-batana, dia eo aminareo ihany am-panahy; ka faly aho mahita fa milamina tsara ianareo ary ijoroanareo mafy ny finoanareo an’i Kristy.
  - type: heading
    content: Hafenoan’ny fiainam-baovao ao amin’i Kristy
  '6':
  - type: text
    content: 'Noho ianareo efa nandray an’i Kristy Jesoa ho Tompo, dia manaova fitondrantena toy ny olona tafaray aminy. '
  '7':
  - type: text
    content: Aoka hahazo vahatra sy hiorina ao amin’i Kristy ianareo; aoka hihamafy hatrany ny finoanareo araka izay efa nampianarina anareo, ary aoka ho feno fisaorana an’Andriamanitra ianareo.
  '8':
  - type: text
    content: 'Mitandrema fandrao misy mahalasa anareo ho babony amin’ny fahendren’olombelona sy ny famitahana foana: ny fampianarana ampitain’olombelona sy ny herin-javatr’'
  - type: text
    content: izao tontolo izao
  - type: note
    content: Jereo Gal 4.3 sy nta.
  - type: text
    content: ' no iorenan’izany fa tsy i Kristy; '
  '9':
  - type: text
    content: 'satria ao amin’i Kristy, araka ny maha olombelona Azy, no mitoetra tanteraka ny hafenoan’ny fomban’Andriamanitra. '
