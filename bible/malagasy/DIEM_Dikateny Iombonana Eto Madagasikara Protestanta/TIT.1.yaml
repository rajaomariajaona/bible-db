document_id: TIT.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy amiko Paoly ity taratasy ity, dia izaho mpanompon’Andriamanitra sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôli
    - type: text
      text: 'n’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nirahina aho hampandroso ny finoan’ireo olom-boafidin’Andriamanitra ary hampahalala azy ny fampianarana marim-pototra mifanaraka amin’ny fivavahantsika, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro tokoa, indrindra tamin’ireo Jiosy tonga kristianina, no mikomy sy manodoka ny olona amin’ny taria poaka àty. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy maintsy tampenam-bava ireo fa mampisavorovoro fianakaviana maro, satria mampianatra zavatra tsy tokony hampianarina mba hahazoan-karena amin’ny fomba maloto. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kretoà anankiray izay heverin’izy samy Kretoà ho mpisolo vava an’Andriamanitra no efa nilaza hoe: «Mpandainga mandrakariva ny Kretoà, biby masiaka, kamo be tenda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tenin’ny poeta anankiray tany Kreta, natao hoe Epimenida avy any Knôsa (500 taona mahery tal J.K). Io poeta malaza io dia noheverina ho mpisolo vava an’Andriamanitra fahizany tao Kreta.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azo antoka izany zavatra ijoroany ho vavolombelona izany. Koa reseo lahatra ireo mba hanana finoana tsy misy tomika, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba tsy hifikitra intsony amin’angano jiosy sy didy nataon’olona izay niala tamin’ny fampianarana marim-pototra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Madio avokoa ny zavatra rehetra amin’ny olona madio; fa tsy misy madio na inona na inona amin’ny olona voaloto sady tsy mino, satria samy efa voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miaiky izy fa mahalala an’Andriamanitra, nefa mandà Azy amin’ny ataony; ka olona mpanimbazimba sady tsy mba manoa ary tsy mahavita asa soa na inona na inona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia fivavahana miorina amin’ny fanantenana ny fiaina-maharitra mandrakizay. Ilay Andriamanitra tsy mba mandainga dia nampanantena antsika izany fiainana izany, fony tsy mbola nisy ary akory izao rehetra izao; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka tamin’ny fotoanandro voatendriny no nahariharin’Andriamanitra ny teniny, dia ny hafatra izay nankinina tamiko ka torîko araka ny baikon’Andriamanitra Mpamonjy antsika.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamangy anao aho, ry Tito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tito: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2Kôr 8.23; Gal 2.3; 2Tim 4.10.
      marker-yv: yv-n
    - type: text
      text: ', dia ianao izay tena zanako ao amin’ny finoana iombonantsika. Ho aminao anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Jesoa Mpamonjy antsika!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny asan’i Tito tany Kreta
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Navelako tany Kreta ianao mba handaminanao izay mbola tokony halamina ary mba hanendrenao loholom-piangonana isan-tanàna, araka ny fepetra nomeko anao: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny loholona dia tokony ho lehilahy tsy manan-tsiny, tsy mampirafy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy mampirafy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: indray mandeha monja no manambady
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (tsy misolosolo vady, tsy manambady fanindroany).'
      marker-yv: yv-n
    - type: text
      text: '; ary ny zanany dia tokony ho mpino, tsy azo ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ny mpitondra Fiangonana dia mpandraharaha ny asan’Andriamanitra, ka tokony ho olona tsy manan-tsiny, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpidoroka, tsy mahery vaika, tsy maloto fila harena; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tokony hahay mandray vahiny, hankamamy ny toetra tsara, hahafehy tena, ho tia rariny, ho masina, hahonon-tena; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tokony hitana mafy ny hafatra azo antoka mifanaraka amin’ny foto-pampianarana. Amin’izay, ny mpitondra Fiangonana dia ho afaka hampirisika momba ny fampianarana tsy misy tomika sady handresy lahatra ireo mpanohitra izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 6-9:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 1Tim 3.2-7.
      marker-yv: yv-n
    - type: text
      text: .
