document_id: TIT.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho mpanompon’Andriamanitra sy '
  - type: text
    content: apôstôli
  - type: text
    content: 'n’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: .
  - type: text
    content: 'Nirahina aho hampandroso ny finoan’ireo olom-boafidin’Andriamanitra ary hampahalala azy ny fampianarana marim-pototra mifanaraka amin’ny fivavahantsika, '
  '10':
  - type: text
    content: 'Fa maro tokoa, indrindra tamin’ireo Jiosy tonga kristianina, no mikomy sy manodoka ny olona amin’ny taria poaka àty. '
  '11':
  - type: text
    content: 'Tsy maintsy tampenam-bava ireo fa mampisavorovoro fianakaviana maro, satria mampianatra zavatra tsy tokony hampianarina mba hahazoan-karena amin’ny fomba maloto. '
  '12':
  - type: text
    content: 'Kretoà anankiray izay heverin’izy samy Kretoà ho mpisolo vava an’Andriamanitra no efa nilaza hoe: «Mpandainga mandrakariva ny Kretoà, biby masiaka, kamo be tenda'
  - type: note
    content: Tenin’ny poeta anankiray tany Kreta, natao hoe Epimenida avy any Knôsa (500 taona mahery tal J.K). Io poeta malaza io dia noheverina ho mpisolo vava an’Andriamanitra fahizany tao Kreta.
  - type: text
    content: '!» '
  '13':
  - type: text
    content: 'Azo antoka izany zavatra ijoroany ho vavolombelona izany. Koa reseo lahatra ireo mba hanana finoana tsy misy tomika, '
  '14':
  - type: text
    content: 'mba tsy hifikitra intsony amin’angano jiosy sy didy nataon’olona izay niala tamin’ny fampianarana marim-pototra. '
  '15':
  - type: text
    content: 'Madio avokoa ny zavatra rehetra amin’ny olona madio; fa tsy misy madio na inona na inona amin’ny olona voaloto sady tsy mino, satria samy efa voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: text
    content: Miaiky izy fa mahalala an’Andriamanitra, nefa mandà Azy amin’ny ataony; ka olona mpanimbazimba sady tsy mba manoa ary tsy mahavita asa soa na inona na inona.
  '2':
  - type: text
    content: 'dia fivavahana miorina amin’ny fanantenana ny fiaina-maharitra mandrakizay. Ilay Andriamanitra tsy mba mandainga dia nampanantena antsika izany fiainana izany, fony tsy mbola nisy ary akory izao rehetra izao; '
  '3':
  - type: text
    content: ka tamin’ny fotoanandro voatendriny no nahariharin’Andriamanitra ny teniny, dia ny hafatra izay nankinina tamiko ka torîko araka ny baikon’Andriamanitra Mpamonjy antsika.
  '4':
  - type: text
    content: Mamangy anao aho, ry Tito
  - type: note
    content: 'Tito: jereo 2Kôr 8.23; Gal 2.3; 2Tim 4.10.'
  - type: text
    content: ', dia ianao izay tena zanako ao amin’ny finoana iombonantsika. Ho aminao anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Kristy Jesoa Mpamonjy antsika!'
  - type: heading
    content: Ny asan’i Tito tany Kreta
  '5':
  - type: text
    content: 'Navelako tany Kreta ianao mba handaminanao izay mbola tokony halamina ary mba hanendrenao loholom-piangonana isan-tanàna, araka ny fepetra nomeko anao: '
  '6':
  - type: text
    content: ny loholona dia tokony ho lehilahy tsy manan-tsiny, tsy mampirafy
  - type: note
    content: 'tsy mampirafy: dkt hafa indray mandeha monja no manambady (tsy misolosolo vady, tsy manambady fanindroany).'
  - type: text
    content: '; ary ny zanany dia tokony ho mpino, tsy azo ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: text
    content: 'Eny, ny mpitondra Fiangonana dia mpandraharaha ny asan’Andriamanitra, ka tokony ho olona tsy manan-tsiny, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpidoroka, tsy mahery vaika, tsy maloto fila harena; '
  '8':
  - type: text
    content: 'tokony hahay mandray vahiny, hankamamy ny toetra tsara, hahafehy tena, ho tia rariny, ho masina, hahonon-tena; '
  '9':
  - type: text
    content: ary tokony hitana mafy ny hafatra azo antoka mifanaraka amin’ny foto-pampianarana. Amin’izay, ny mpitondra Fiangonana dia ho afaka hampirisika momba ny fampianarana tsy misy tomika sady handresy lahatra ireo mpanohitra izany
  - type: note
    content: 'And 6-9: ampit 1Tim 3.2-7.'
  - type: text
    content: .
