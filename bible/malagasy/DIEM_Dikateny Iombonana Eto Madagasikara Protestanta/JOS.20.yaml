document_id: JOS.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanàna fialokalofana
  - type: text
    content: 'Ary ny TOMPO dia nandidy an’i Josoa, '
  '2':
  - type: text
    content: 'mba hilaza amin’ny Israelita hoe:'
  - type: text
    content: –Fidio ny tanàna fialokalofana
  - type: note
    content: Momba ireo tanàna fialofana, jereo Nom 35.9-34. Ny isany araka ny nentin-drazana dia enina, jereo and 7 sy 8 ary Nom 35.6.
  - type: text
    content: ' araka izay efa nampilazaiko an’i Mosesy taminareo. '
  '3':
  - type: text
    content: Any no handosiran’izay mahafaty olona tsy nahy fa kisendrasendra, ka ho fialofana ho anareo izany mba tsy ho azon’ny mpamaly faty
  - type: note
    content: 'ny mpamaly faty: jereo Nom 35.12 sy nta.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ary rehefa mandositra amin’ireo tanàna ireo ilay namono olona tsy nahy, dia hijanona eo anoloan’ny vavahadin’ny tanàna, ka hanazava amin’ireo '
  - type: text
    content: loholona
  - type: text
    content: ' ao an-tanàna ny zava-niseho. Dia horaisin’ireo ho ao an-tanànany izy ka homeny toerana mba hiara-monina aminy. '
  '5':
  - type: text
    content: 'Raha tàhiny manenjika azy ilay mpamaly faty, dia tsy hatolotr’ireo ho eo an-tanany ilay nahafaty olona satria kisendasendra no namelezany ilay namany fa tsy fankahalana azy mialoha. '
  '6':
  - type: text
    content: Honina ao amin’io tanàna io izy ambara-pisehony hotsaraina eo anatrehan’ny fiangonana israelita ary ambara-pahafatin’ny mpisorombe niasa tamin’izany andro izany. Dia hody ilay nahafaty olona ka hiverina an-tranony, any amin’ilay tanàna izay nialany fony izy nandositra.
  '7':
  - type: text
    content: 'Dia natokan’ny Israelita ireto tanàna ireto: i Kedesa any Galilea any amin’ny faritra havoan’i Naftalỳ; sy i Sekema, any amin’ny faritra havoan’i Efraîma; ary i Kiriata-Arbà (antsoina hoe koa Hebrôna) any amin’ny faritra havoan’i Joda'
  - type: note
    content: I Kedesa sy i Sekema ary i Hebrôna dia samy nisy toerana toeram-pivavahana, izay heverina ho niandohan’ny zo ahazoana mialoka amin’ireo tanàna ireo.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Teny ampita atsinanan’i Jôrdàna tandrifin’i Jerikao kosa dia ireto tanàna ireto no voafidy: i Betsera, any amin’ny taniefitra lembalemba, avy amin’ny fokon’i Reobena; sy i Ramôta any Gilehada, avy amin’ny fokon’i Gada; ary i Gôlana any '
  - type: text
    content: Basàna
  - type: text
    content: ', avy amin’ny fokon’i Manase. '
  '9':
  - type: text
    content: Ireo tanàna ireo no natokana ho fialofana ho an’ny Israelita rehetra sy ny vahiny valovotaka ao aminy; any no handosiran’izay rehetra nahafaty olona tsy nahy, mba tsy hovonoin’ny mpamaly faty izy ambara-pisehony hotsaraina eo anatrehan’ny fiangonana israelita.
