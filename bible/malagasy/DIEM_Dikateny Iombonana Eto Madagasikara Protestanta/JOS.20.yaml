document_id: JOS.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanàna fialokalofana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny TOMPO dia nandidy an’i Josoa, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hilaza amin’ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fidio ny tanàna fialokalofana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ireo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tanàna fialofana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Nom 35.9-34. Ny isany araka ny nentin-drazana dia enina, jereo and 7 sy 8 ary Nom 35.6.'
    marker-yv: yv-n
  - type: text
    text: ' araka izay efa nampilazaiko an’i Mosesy taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Any no handosiran’izay mahafaty olona tsy nahy fa kisendrasendra, ka ho fialofana ho anareo izany mba tsy ho azon’ny mpamaly faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny mpamaly faty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 35.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa mandositra amin’ireo tanàna ireo ilay namono olona tsy nahy, dia hijanona eo anoloan’ny vavahadin’ny tanàna, ka hanazava amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ao an-tanàna ny zava-niseho. Dia horaisin’ireo ho ao an-tanànany izy ka homeny toerana mba hiara-monina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha tàhiny manenjika azy ilay mpamaly faty, dia tsy hatolotr’ireo ho eo an-tanany ilay nahafaty olona satria kisendasendra no namelezany ilay namany fa tsy fankahalana azy mialoha. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Honina ao amin’io tanàna io izy ambara-pisehony hotsaraina eo anatrehan’ny fiangonana israelita ary ambara-pahafatin’ny mpisorombe niasa tamin’izany andro izany. Dia hody ilay nahafaty olona ka hiverina an-tranony, any amin’ilay tanàna izay nialany fony izy nandositra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia natokan’ny Israelita ireto tanàna ireto: i Kedesa any Galilea any amin’ny faritra havoan’i Naftalỳ; sy i Sekema, any amin’ny faritra havoan’i Efraîma; ary i Kiriata-Arbà (antsoina hoe koa Hebrôna) any amin’ny faritra havoan’i Joda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kedesa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sekema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ary i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hebrôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia samy nisy toerana toeram-pivavahana, izay heverina ho niandohan’ny zo ahazoana mialoka amin’ireo tanàna ireo.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Teny ampita atsinanan’i Jôrdàna tandrifin’i Jerikao kosa dia ireto tanàna ireto no voafidy: i Betsera, any amin’ny taniefitra lembalemba, avy amin’ny fokon’i Reobena; sy i Ramôta any Gilehada, avy amin’ny fokon’i Gada; ary i Gôlana any '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ', avy amin’ny fokon’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ireo tanàna ireo no natokana ho fialofana ho an’ny Israelita rehetra sy ny vahiny valovotaka ao aminy; any no handosiran’izay rehetra nahafaty olona tsy nahy, mba tsy hovonoin’ny mpamaly faty izy ambara-pisehony hotsaraina eo anatrehan’ny fiangonana israelita.
