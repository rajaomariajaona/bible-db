document_id: GAL.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao anefa no teniko: raha mbola zaza ny mpandova, dia tsy hafa noho ny mpanompo izy na dia tompon’ny zavatra rehetra aza; '
  '10':
  - type: text
    content: Andro sy volana ary fizaràn-taona sy taona
  - type: note
    content: Ny fohapohazin’izany andininy izany dia izay iray na ireo fankalazana jiosy, na ireo fomba amam-panaon’ny hafa firenena mifandray amin’ny fanajana ny planeta aman-kintana eny ana habakabaka, na izy roa tonta. Ampit Rm 14.5; Kôl 2.16-23.
  - type: text
    content: ' no tandremanareo fatratra. '
  '11':
  - type: text
    content: Matahotra ny aminareo aho, fandrao dia sasa-poana taminareo.
  '12':
  - type: text
    content: 'Miangavy anareo aho, ry havana, aoka ho tonga tahaka ahy ianareo fa izaho koa mba efa tonga tahaka anareo. Tsy nanisy ratsy ahy velively ianareo, '
  '13':
  - type: text
    content: 'nefa fantatrareo fa aretina nihatra tamin’ny tenako no nahatonga ahy hitory aminareo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tamin’ny voalohany; '
  '14':
  - type: text
    content: 'ary na dia fitsapana ho anareo aza ny tenako narary, dia tsy mba nesoinareo aho na nolavinareo, fa noraisinareo tahaka ny ho nandraisanareo '
  - type: text
    content: anjelin’Andriamanitra
  - type: text
    content: ' anankiray, eny tahaka ny ho nandraisanareo an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa mihitsy aza. '
  '15':
  - type: text
    content: 'Nankaiza àry ilay fankamamianareo ahy nahasambatra anareo? Ijoroako ho vavolombelona aminareo manko fa, raha azo natao, na dia ny masonareo aza dia ho nombotanareo homena ahy tamin’izay. '
  '16':
  - type: text
    content: Koa dia tonga fahavalonareo ve aho, satria milaza aminareo zavatra marim-pototra?
  '17':
  - type: text
    content: 'Mila fitia aminareo ry zareo nefa tsy araka ny mety; fa ny hihatahanareo amiko no tadiaviny mba hitiavanareo azy. '
  '18':
  - type: text
    content: 'Tsara izany ilàn’olona fitia amin’ny zavatra tsara, kanefa mandrakariva fa tsy hoe raha eo aminareo ihany aho. '
  '19':
  - type: text
    content: 'Rey anaka, mijaly toy ny vehivavy mihetsi-jaza indray aho, mandra-pahatongan’ny endrik’i Kristy ho voasokitra ao anatinareo. '
  '2':
  - type: text
    content: fa fehezin’izay mpikarakara azy sy ny mpitandrim-pananany izy mandra-pahatongan’ny fetr’andro voatendrin’ny rainy
  - type: note
    content: Araka ny lalàna grika, dia ny rain-jaza no mametra ny taona maha lehibe ny zanany, ka ahazoan-janany miala amin’ny fifehezan’ireo mpikarakara azy sy mizaka tena tanteraka.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Irîko ny ho eo aminareo ankehitriny, ka hitenenako araka ny tandrify anareo, fa mahasanganehana ahy ny zava-mitranga eo aminareo!
  - type: heading
    content: Ny ohatra omen’i Hagara sy i Sarà
  '21':
  - type: text
    content: 'Hono ho’aho, ianareo izay te hofehezin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ', tsy renareo ve izay ambaran’ny lalàna? '
  '22':
  - type: text
    content: 'Fa izao no voasoratra ao: Nanan-janaka roa lahy i Abrahama, ny anankiray tamin’ny vehivavy mpanompo ary ny anankiray tamin’ny vehivavy tsy mpanompo. '
  '23':
  - type: text
    content: Kanefa ilay tamin’ny vehivavy mpanompo dia nateraka araka ny maha olombelona fotsiny, fa ilay tamin’ny vehivavy tsy mpanompo dia nateraka noho ny fampanantenana nataon’Andriamanitra
  - type: note
    content: 'And 22: jereo Gen 16.15; 21.3. –And 23: noho ny fampanantenana nataon’Andriamanitra: jereo Gen 17.6; Rm 9.7-9.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ireo toe-javatra ireo dia raisiko ho fanoharana, fa izy roa vavy dia tandindon’ny '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' anankiroa. Ny fanekempihavanana anankiray moa natao tany an-tendrombohitra Sinay, ka miteraka ho amin’ny fanompoana: dia i Hagara izany, '
  '25':
  - type: text
    content: fa ny hoe Hagara dia ny tendrombohitra Sinay any Arabia; ary i Hagara dia mifandraika amin’i Jerosalema
  - type: note
    content: 'fa ny hoe Hagara dia ny tendrombohitra Sinay any Arabia; ary i Hagara...: misy stf sasany ahitana hoe fa ny hoe Sinay dia tendrombohitra any Arabia; ary i Sinay... –I Jerosalema eto dia manambara ny fivavahana jiosy na ny hoe jodaisma. Ampit Mt 23.37; Lk 13.34.'
  - type: text
    content: ' ankehitriny, satria samy mpanompo i Jerosalema sy ny zanany. '
  '26':
  - type: text
    content: 'Fa ilay Jerosalema any an-danitra kosa tsy mba mpanompo: dia ny renintsika izany. '
  '27':
  - type: text
    content: 'Fa izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Mifalia, ry vehivavy momba, izay tsy niteraka!
  - type: text
    content: Manaova antso firavoravoana, ianao tsy nihetsi-jaza!
  - type: text
    content: Fa ny zanaky ny vehivavy mpitondratena dia maro
  - type: text
    content: noho ny an’ny manambady
  - type: note
    content: Jereo Is 54.1.
  - type: text
    content: '!»'
  '28':
  - type: text
    content: 'Fa ianareo, ry havana, dia zanaka nateraka araka ny fampanantenana nataon’Andriamanitra, tahaka an’i Itsehàka. '
  '29':
  - type: text
    content: 'Fahizany anefa, ilay teraka araka ny maha olombelona fotsiny dia nanenjika ilay teraka araka ny Fanahy Masina; dia tahaka izany koa ankehitriny. '
  '3':
  - type: text
    content: Dia tahaka izany koa isika; fony mbola zaza, dia nandevozin’ireo herin-javatr’
  - type: text
    content: izao tontolo izao
  - type: note
    content: 'ireo herin-javatr’izao tontolo izao: dia ireo zavaboaary isan-karazany hita maso heverin’ny olombelona ho manan-kasina sy manan-jina, ary dia mangeja azy fatratra raha mbola tsy nanafaka azy ny finoana an’i Jesoa Kristy. Jereo 4.9; Kôl 2.8, 20.'
  - type: text
    content: ' isika; '
  '30':
  - type: text
    content: 'Saingy inona no lazain’ny Soratra Masina? Izao: «Roahy io vehivavy mpanompo io sy ny zanany, fa ny zanaky ny vehivavy mpanompo dia tsy hiray lova amin’ny zanaky ny vehivavy tsy mpanompo'
  - type: note
    content: 'And 29: ampit Gen 21.9. –And 30: jereo Gen 21.10.'
  - type: text
    content: '.» '
  '31':
  - type: text
    content: Noho izany, ry havana, tsy zanak’ilay vehivavy mpanompo isika, fa zanak’ilay vehivavy tsy mpanompo.
  '4':
  - type: text
    content: 'fa rehefa tonga tokoa ny fotoanandro, dia nirahin’Andriamanitra ny '
  - type: text
    content: Zanany
  - type: text
    content: ': natera-behivavy io Zanany io ary niaina teo ambany fahefan’ny lalàna jiosy, '
  '5':
  - type: text
    content: mba hanavotra izay teo ambany fahefan’ny lalàna ary mba handraisantsika ny anjara maha zanak’Andriamanitra.
  '6':
  - type: text
    content: 'Ary ny maha zanaka anareo, dia ny nanirahan’Andriamanitra ho ao am-pontsika ny Fanahin’ny Zanany miantso hoe: «Raiko ô'
  - type: note
    content: 'Ary ny maha zanaka anareo, dia ny nanirahan’Andriamanitra: na hoe ary satria zanaka ianareo dia nirahin’Andriamanitra. –Raiko ô: ny teny aramianina Abbà no ampiasaina ao amin’ny rijan-teny grika fototra. Jereo Mk 14.36 sy nta; Rm 8.15.'
  - type: text
    content: '!» '
  '7':
  - type: text
    content: Hany ka tsy mpanompo intsony ianao, fa zanaka; ary raha zanaka ianao, dia mpandova koa noho ny ataon’Andriamanitra
  - type: note
    content: 'And 5-7: ampit Rm 8.15-17.'
  - type: text
    content: .
  - type: heading
    content: Mitebiteby momba ny Galatianina i Paoly
  '8':
  - type: text
    content: Taloha anefa, fony tsy mbola nahafantatra an’Andriamanitra ianareo, dia nanompo andriamani-tsy izy
  - type: note
    content: Ampit 1Kôr 8.4-6.
  - type: text
    content: '; '
  '9':
  - type: text
    content: 'ankehitriny kosa, efa nahalala an’Andriamanitra ianareo. Mihoatra noho izany aza: efa nahalala anareo Andriamanitra, ka ahoana ianareo no miverina indray amin’ny herin-javatra tsy manam-pahefana azy ary tsy misy fotony'
  - type: note
    content: Jereo 4.3 sy nta.
  - type: text
    content: ', dia herin-javatra izay tianareo hotompoina hatrany am-boalohany indray? '
