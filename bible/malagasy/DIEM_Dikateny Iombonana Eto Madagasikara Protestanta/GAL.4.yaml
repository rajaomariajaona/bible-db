  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitebiteby momba ny Galatianina i Paoly
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Taloha anefa, fony tsy mbola nahafantatra an’Andriamanitra ianareo, dia nanompo andriamani-tsy izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1Kôr 8.4-6.
      marker-yv: yv-n
    - type: text
      text: '; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ankehitriny kosa, efa nahalala an’Andriamanitra ianareo. Mihoatra noho izany aza: efa nahalala anareo Andriamanitra, ka ahoana ianareo no miverina indray amin’ny herin-javatra tsy manam-pahefana azy ary tsy misy fotony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', dia herin-javatra izay tianareo hotompoina hatrany am-boalohany indray? '
