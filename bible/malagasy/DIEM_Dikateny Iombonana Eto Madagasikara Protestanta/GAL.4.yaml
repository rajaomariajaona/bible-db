      marker-yv: yv-n
    - type: text
      text: '!» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hany ka tsy mpanompo intsony ianao, fa zanaka; ary raha zanaka ianao, dia mpandova koa noho ny ataon’Andriamanitra
    - type: usfm
      marker: f
      children:
