document_id: GAL.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao anefa no teniko: raha mbola zaza ny mpandova, dia tsy hafa noho ny mpanompo izy na dia tompon’ny zavatra rehetra aza; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Andro sy volana ary fizaràn-taona sy taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fohapohazin’izany andininy izany dia izay iray na ireo fankalazana jiosy, na ireo fomba amam-panaon’ny hafa firenena mifandray amin’ny fanajana ny planeta aman-kintana eny ana habakabaka, na izy roa tonta. Ampit Rm 14.5; Kôl 2.16-23.
      marker-yv: yv-n
    - type: text
      text: ' no tandremanareo fatratra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Matahotra ny aminareo aho, fandrao dia sasa-poana taminareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Miangavy anareo aho, ry havana, aoka ho tonga tahaka ahy ianareo fa izaho koa mba efa tonga tahaka anareo. Tsy nanisy ratsy ahy velively ianareo, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'nefa fantatrareo fa aretina nihatra tamin’ny tenako no nahatonga ahy hitory aminareo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' tamin’ny voalohany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary na dia fitsapana ho anareo aza ny tenako narary, dia tsy mba nesoinareo aho na nolavinareo, fa noraisinareo tahaka ny ho nandraisanareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin’Andriamanitra
    - type: text
      text: ' anankiray, eny tahaka ny ho nandraisanareo an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa mihitsy aza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nankaiza àry ilay fankamamianareo ahy nahasambatra anareo? Ijoroako ho vavolombelona aminareo manko fa, raha azo natao, na dia ny masonareo aza dia ho nombotanareo homena ahy tamin’izay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Koa dia tonga fahavalonareo ve aho, satria milaza aminareo zavatra marim-pototra?
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mila fitia aminareo ry zareo nefa tsy araka ny mety; fa ny hihatahanareo amiko no tadiaviny mba hitiavanareo azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tsara izany ilàn’olona fitia amin’ny zavatra tsara, kanefa mandrakariva fa tsy hoe raha eo aminareo ihany aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Rey anaka, mijaly toy ny vehivavy mihetsi-jaza indray aho, mandra-pahatongan’ny endrik’i Kristy ho voasokitra ao anatinareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: fa fehezin’izay mpikarakara azy sy ny mpitandrim-pananany izy mandra-pahatongan’ny fetr’andro voatendrin’ny rainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ny lalàna grika, dia ny rain-jaza no mametra ny taona maha lehibe ny zanany, ka ahazoan-janany miala amin’ny fifehezan’ireo mpikarakara azy sy mizaka tena tanteraka.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Irîko ny ho eo aminareo ankehitriny, ka hitenenako araka ny tandrify anareo, fa mahasanganehana ahy ny zava-mitranga eo aminareo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ohatra omen’i Hagara sy i Sarà
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hono ho’aho, ianareo izay te hofehezin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ', tsy renareo ve izay ambaran’ny lalàna? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa izao no voasoratra ao: Nanan-janaka roa lahy i Abrahama, ny anankiray tamin’ny vehivavy mpanompo ary ny anankiray tamin’ny vehivavy tsy mpanompo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanefa ilay tamin’ny vehivavy mpanompo dia nateraka araka ny maha olombelona fotsiny, fa ilay tamin’ny vehivavy tsy mpanompo dia nateraka noho ny fampanantenana nataon’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 22:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 16.15; 21.3. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 23:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'noho ny fampanantenana nataon’Andriamanitra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 17.6; Rm 9.7-9.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ireo toe-javatra ireo dia raisiko ho fanoharana, fa izy roa vavy dia tandindon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanana
    - type: text
      text: ' anankiroa. Ny fanekempihavanana anankiray moa natao tany an-tendrombohitra Sinay, ka miteraka ho amin’ny fanompoana: dia i Hagara izany, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: fa ny hoe Hagara dia ny tendrombohitra Sinay any Arabia; ary i Hagara dia mifandraika amin’i Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa ny hoe Hagara dia ny tendrombohitra Sinay any Arabia; ary i Hagara...: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fa ny hoe Sinay dia tendrombohitra any Arabia; ary i Sinay...
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Jerosalema '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto dia manambara ny fivavahana jiosy na ny hoe jodaisma. Ampit Mt 23.37; Lk 13.34.
      marker-yv: yv-n
    - type: text
      text: ' ankehitriny, satria samy mpanompo i Jerosalema sy ny zanany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa ilay Jerosalema any an-danitra kosa tsy mba mpanompo: dia ny renintsika izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa izao no voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mifalia, ry vehivavy momba, izay tsy niteraka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova antso firavoravoana, ianao tsy nihetsi-jaza!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zanaky ny vehivavy mpitondratena dia maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny an’ny manambady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 54.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa ianareo, ry havana, dia zanaka nateraka araka ny fampanantenana nataon’Andriamanitra, tahaka an’i Itsehàka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fahizany anefa, ilay teraka araka ny maha olombelona fotsiny dia nanenjika ilay teraka araka ny Fanahy Masina; dia tahaka izany koa ankehitriny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia tahaka izany koa isika; fony mbola zaza, dia nandevozin’ireo herin-javatr’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ireo herin-javatr’izao tontolo izao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ireo zavaboaary isan-karazany hita maso heverin’ny olombelona ho manan-kasina sy manan-jina, ary dia mangeja azy fatratra raha mbola tsy nanafaka azy ny finoana an’i Jesoa Kristy. Jereo 4.9; Kôl 2.8, 20.
      marker-yv: yv-n
    - type: text
      text: ' isika; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Saingy inona no lazain’ny Soratra Masina? Izao: «Roahy io vehivavy mpanompo io sy ny zanany, fa ny zanaky ny vehivavy mpanompo dia tsy hiray lova amin’ny zanaky ny vehivavy tsy mpanompo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.30 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 29:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Gen 21.9. –
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 30:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 21.10.'
      marker-yv: yv-n
    - type: text
      text: '.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Noho izany, ry havana, tsy zanak’ilay vehivavy mpanompo isika, fa zanak’ilay vehivavy tsy mpanompo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa rehefa tonga tokoa ny fotoanandro, dia nirahin’Andriamanitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanany
    - type: text
      text: ': natera-behivavy io Zanany io ary niaina teo ambany fahefan’ny lalàna jiosy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: mba hanavotra izay teo ambany fahefan’ny lalàna ary mba handraisantsika ny anjara maha zanak’Andriamanitra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny maha zanaka anareo, dia ny nanirahan’Andriamanitra ho ao am-pontsika ny Fanahin’ny Zanany miantso hoe: «Raiko ô'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ary ny maha zanaka anareo, dia ny nanirahan’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary satria zanaka ianareo dia nirahin’Andriamanitra.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raiko ô: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny teny aramianina '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abbà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
