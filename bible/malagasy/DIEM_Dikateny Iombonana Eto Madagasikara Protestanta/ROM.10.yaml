document_id: ROM.10,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ry havana, ny irîn’ny foko sy angatahiko amin’Andriamanitra ho an’ny Jiosy dia ny hahazoany famonjena. '
  '10':
  - type: text
    content: 'Mino ao am-po manko ny olona mba hoeken’Andriamanitra ho marina, ary manaiky ampahibemaso amin’ny vava, mba hahazoany famonjena. '
  '11':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Izay (rehetra) mino Azy tsy mba hangaihay'
  - type: note
    content: Is 28.16, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '.» '
  '12':
  - type: text
    content: 'Koa mitovy na Jiosy na '
  - type: text
    content: hafa firenena
  - type: text
    content: ', fa ny Tompo iray ihany ny an’ny rehetra, Tompo malala-tanana amin’izay rehetra miantso Azy. '
  '13':
  - type: text
    content: 'Satria izao no tenin’ny Soratra Masina: «Izay rehetra hiantso ny Tompo, dia ho voavonjy'
  - type: note
    content: Jl 3.5.
  - type: text
    content: .»
  '14':
  - type: text
    content: 'Hataon’ny olona ahoana àry no fiantso ny anaran’ny Tompo, raha tsy efa ninoany? Hataony ahoana no fino Azy, raha tsy efa reny? Hataony ahoana no fandre, raha tsy misy mpitoriteny? '
  '15':
  - type: text
    content: 'Ary hatao ahoana no fitoriteny, raha tsy nirahina? Araka ny voalazan’ny Soratra Masina hoe: «Endrey, tsara izany mahita ireo mpitondra '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tonga hanambara teny soa'
  - type: note
    content: Is 52.7.
  - type: text
    content: '!» '
  '16':
  - type: text
    content: 'Tsy àry nanaiky ny Vaovao Mahafaly avokoa anefa ny olona rehetra, fa hoy i Isaià hoe: «Tompo ô, iza no nino ny hafatra nambaranay'
  - type: note
    content: Is 53.1, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '?» '
  '17':
  - type: text
    content: Koa ny finoana dia vokatry ny hafatra ambara; ary ny hafatra ambara dia ny teny momba an’i Kristy.
  '18':
  - type: text
    content: 'Kanefa manontany aho hoe: Sao tsy nandre ny hafatra ny olona? Nandre tokoa izy rehetra, fa izao no tenin’ny Soratra Masina:'
  - type: text
    content: «Lasa nanerana ny tany tontolo ny feon’ireo mpitory,
  - type: text
    content: ary nipaka hatrany amin’ny faran’ny tany ny teniny!»
  '19':
  - type: text
    content: 'Dia mbola nanontany aho hoe: Sao tsy azon’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' ny filazana? Valin’izany, dia i Mosesy aloha no milaza hoe:'
  - type: text
    content: «Hataoko velom-pialonana an’izay tsy firenena ianareo,
  - type: text
    content: hoy Andriamanitra;
  - type: text
    content: ary hataoko mirehi-pahatezerana amin’izay firenena tsy manan-tsaina!»
  '2':
  - type: text
    content: 'Vavolombelona ny aminy aho fa feno zotom-po ho an’Andriamanitra izy rehetra saingy zotom-po tsy ombàm-pahalalana. '
  '20':
  - type: text
    content: 'Fa i Isaià aza dia sahy milaza hoe:'
  - type: text
    content: «Nanaiky ho hitan’izay tsy nitady Ahy Aho,
  - type: text
    content: hoy Andriamanitra,
  - type: text
    content: ary niseho niharihary tamin’izay tsy nanontany Ahy.»
  '21':
  - type: text
    content: 'Ny amin’i Israely kosa dia hoy i Isaià hoe:'
  - type: text
    content: «Tontolo andro no nanolorako tanana
  - type: text
    content: izay vahoaka sady tsy manaiky no mikomy
  - type: note
    content: 'Momba ny and 18-21: and 18: Sal 19.5, voatsiahy araka ny dkt grika tranainy Septoazinta. –And 19: jereo Deot 32.21. –And 20-21: Is 65.1-2, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '3':
  - type: text
    content: 'Tsy nahalala ny fahamarinana omen’Andriamanitra ry zareo, ka nitady fahamarinana avy amin’ny tenany fa tsy nanaiky ny fahamarinana omen’Andriamanitra. '
  '4':
  - type: text
    content: 'Eny, lany andro ny '
  - type: text
    content: lalàna
  - type: text
    content: ' nony tamy i '
  - type: text
    content: Kristy
  - type: text
    content: ' hahatonga ny mpino rehetra ho olo-marina eo anatrehan’Andriamanitra.'
  - type: heading
    content: Izay rehetra mino ny Tompo no hovonjena
  '5':
  - type: text
    content: 'Izao no voasoratr’i Mosesy momba ny fahamarinana avy amin’ny lalàna: «Ny olona manatanteraka ny didy amam-pitsipika dia ho velona amin’izany'
  - type: note
    content: Jereo Lev 18.5.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Fa izao kosa no voalaza momba ny fahamarinana avy amin’ny finoana: «Aza manao anakampo hoe: Iza no hiakatra any an-danitra?» (dia ny mba hampidina an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' izany). '
  '7':
  - type: text
    content: 'Na hoe: «Iza no hidina any amin’ny hantsana?» (dia ny mba hampiakatra an’i Kristy avy any amin’ny maty). '
  '8':
  - type: text
    content: 'Fa inona no voalaza? Izao: «Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao'
  - type: note
    content: 'And 6-8: jereo Deot 9.4; 30.12-14.'
  - type: text
    content: '.» Izany no teny momba ny finoana, izay torînay. '
  '9':
  - type: text
    content: 'Satria raha manaiky ampahibemaso amin’ny vavanao ianao fa Tompo i Jesoa, ary mino ao am-ponao fa nanangana Azy ho velona avy tany amin’ny maty Andriamanitra, dia ho voavonjy. '
