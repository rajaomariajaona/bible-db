document_id: ROM.10
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry havana, ny irîn’ny foko sy angatahiko amin’Andriamanitra ho an’ny Jiosy dia ny hahazoany famonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vavolombelona ny aminy aho fa feno zotom-po ho an’Andriamanitra izy rehetra saingy zotom-po tsy ombàm-pahalalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy nahalala ny fahamarinana omen’Andriamanitra ry zareo, ka nitady fahamarinana avy amin’ny tenany fa tsy nanaiky ny fahamarinana omen’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, lany andro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: ' nony tamy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' hahatonga ny mpino rehetra ho olo-marina eo anatrehan’Andriamanitra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Izay rehetra mino ny Tompo no hovonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no voasoratr’i Mosesy momba ny fahamarinana avy amin’ny lalàna: «Ny olona manatanteraka ny didy amam-pitsipika dia ho velona amin’izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 18.5.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao kosa no voalaza momba ny fahamarinana avy amin’ny finoana: «Aza manao anakampo hoe: Iza no hiakatra any an-danitra?» (dia ny mba hampidina an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' izany). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Na hoe: «Iza no hidina any amin’ny hantsana?» (dia ny mba hampiakatra an’i Kristy avy any amin’ny maty). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa inona no voalaza? Izao: «Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 6-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 9.4; 30.12-14.
    marker-yv: yv-n
  - type: text
    text: '.» Izany no teny momba ny finoana, izay torînay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria raha manaiky ampahibemaso amin’ny vavanao ianao fa Tompo i Jesoa, ary mino ao am-ponao fa nanangana Azy ho velona avy tany amin’ny maty Andriamanitra, dia ho voavonjy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mino ao am-po manko ny olona mba hoeken’Andriamanitra ho marina, ary manaiky ampahibemaso amin’ny vava, mba hahazoany famonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Izay (rehetra) mino Azy tsy mba hangaihay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 28.16, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa mitovy na Jiosy na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', fa ny Tompo iray ihany ny an’ny rehetra, Tompo malala-tanana amin’izay rehetra miantso Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Satria izao no tenin’ny Soratra Masina: «Izay rehetra hiantso ny Tompo, dia ho voavonjy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jl 3.5.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hataon’ny olona ahoana àry no fiantso ny anaran’ny Tompo, raha tsy efa ninoany? Hataony ahoana no fino Azy, raha tsy efa reny? Hataony ahoana no fandre, raha tsy misy mpitoriteny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hatao ahoana no fitoriteny, raha tsy nirahina? Araka ny voalazan’ny Soratra Masina hoe: «Endrey, tsara izany mahita ireo mpitondra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' tonga hanambara teny soa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 52.7.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy àry nanaiky ny Vaovao Mahafaly avokoa anefa ny olona rehetra, fa hoy i Isaià hoe: «Tompo ô, iza no nino ny hafatra nambaranay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 53.1, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa ny finoana dia vokatry ny hafatra ambara; ary ny hafatra ambara dia ny teny momba an’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanefa manontany aho hoe: Sao tsy nandre ny hafatra ny olona? Nandre tokoa izy rehetra, fa izao no tenin’ny Soratra Masina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lasa nanerana ny tany tontolo ny feon’ireo mpitory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nipaka hatrany amin’ny faran’ny tany ny teniny!»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia mbola nanontany aho hoe: Sao tsy azon’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' ny filazana? Valin’izany, dia i Mosesy aloha no milaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hataoko velom-pialonana an’izay tsy firenena ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hataoko mirehi-pahatezerana amin’izay firenena tsy manan-tsaina!»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa i Isaià aza dia sahy milaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nanaiky ho hitan’izay tsy nitady Ahy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niseho niharihary tamin’izay tsy nanontany Ahy.»
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny amin’i Israely kosa dia hoy i Isaià hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tontolo andro no nanolorako tanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay vahoaka sady tsy manaiky no mikomy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny and 18-21: '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'and 18:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Sal 19.5, voatsiahy araka ny dkt grika tranainy Septoazinta. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Deot 32.21. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 20-21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Is 65.1-2, voatsiahy araka ny dkt grika tranainy Septoazinta.'
    marker-yv: yv-n
  - type: text
    text: .»
