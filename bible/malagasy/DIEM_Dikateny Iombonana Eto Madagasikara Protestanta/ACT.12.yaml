document_id: ACT.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vonoina i Jakôba ary gadraina i Petera
  - type: text
    content: 'Tamin’izany fotoana izany, dia nasain’i '
  - type: text
    content: Herôda
  - type: note
    content: I Herôda Agripà I, zana-drahalahin’i Herôda Antipasy (ilay nampamono an’i Jôhany Mpanao batisa), no ambara eto; nanjaka tao Jodea sy Samaria izy, taona 41–44 taor J. K. Tamin’ireo antokom-pivavahana jiosy dia ny Farisianina no nombàny sy notohanany.
  - type: text
    content: ' mpanjaka nosamborina ny olona sasantsasany anisan’ny Fiangonana mba hampahorîna. '
  '10':
  - type: text
    content: Nony efa nandalo ny fiambenana voalohany sy faharoa izy ireo, dia tonga teo amin’ny vavahady vy mahazo ny lalana ho any an-tanàna. Nivoha nidanadana ho azy ilay vavahady ka dia tafavoaka soa aman-tsara izy ireo. Nizotra tamin’izay lalana anankiray izay izy ireo, ary dia nilaozan’ny anjely tampoka i Petera.
  '11':
  - type: text
    content: 'Izay vao nahatsiaro tena i Petera ka nanao hoe:'
  - type: text
    content: –Fantatro marina izao fa naniraka ny anjeliny tokoa ny Tompo, ka nanafaka ahy teo an-tanan’i Herôda sy tamin’ny ratsy rehetra notetehin’ny vahoaka jiosy.
  '12':
  - type: text
    content: 'Nony nazava tsara tamin’i Petera ny toe-javatra, dia lasa izy nankany an-tranon’i Maria, renin’i Jôhany antsoina hoe Marka. Vory maromaro tao ny olona ary nivavaka. '
  '13':
  - type: text
    content: 'Nandondom-baravarana i Petera ka nisy ankizivavy atao hoe Rôda nanatona hihaino. '
  '14':
  - type: text
    content: 'Vao nahafantatra ny feon’i Petera izy, dia nentin-kafaliana, ka tsy namoha ny varavarana fa lasa nihazakazaka nilaza tamin’ny olona tao an-trano hoe ao am-baravarana ao i Petera. '
  '15':
  - type: text
    content: 'Dia hoy ny olona tamin-drazazavavy:'
  - type: text
    content: –Lasa adala ity ianao!
  - type: text
    content: 'Nanizingizina i Rôda fa marina izay voalazany. Ka hoy indray ny olona hoe:'
  - type: text
    content: –Ambiroany izany!
  '16':
  - type: text
    content: 'Fa naharitra nandondòna ihany i Petera. Nony namoha azy ny tao an-trano ka nahita azy vao talanjona. '
  '17':
  - type: text
    content: 'Nanofahofa tanana hampangina azy ireo kosa i Petera, ka nitantara ny namoahan’ny Tompo azy tao am-ponja. Ary hoy koa izy hoe:'
  - type: text
    content: –Ambarao amin’i Jakôba
  - type: note
    content: I Jakôba rahalahin’ny Tompo io.
  - type: text
    content: ' sy amin’ny havana iray finoana izany!'
  - type: text
    content: Dia lasa i Petera nankany an-toeran-kafa.
  '18':
  - type: text
    content: 'Nony nazava ny andro, dia somaritaka be ihany ny miaramila mpiambina nifanontany momba izay niafaran’i Petera. '
  '19':
  - type: text
    content: Nampikarohin’i Herôda izy, nefa tsy hita. Dia nalaina am-bava ireto mpiambina ary nasainy novonoina. Avy eo dia niala tao Jodea i Herôda ka nankany Kesaria ary nipetrapetraka tany.
  - type: heading
    content: Maty i Herôda
  '2':
  - type: text
    content: 'Novonoiny tamin’ny sabatra i Jakôba rahalahin’i Jôhany; '
  '20':
  - type: text
    content: Tezitra izaitsizy tamin’ny mponina tany Tiro sy Sidôna i Herôda. Ry zareo kosa anefa niray saina nanatona ny mpanjaka. Rehefa nahazo an’i Blasta mpitandrina ny trano fandrian’ny mpanjaka ho namana izy ireo, dia nangataka hanao raharaham-pihavanana tamin’i Herôda, satria ny tanin’ny mpanjaka no mamatsy ny faritr’i Tiro sy i Sidôna.
  '21':
  - type: text
    content: 'Tamin’ny andro voatendry, dia nitafy ny fanamiana maha mpanjaka i Herôda ary nipetraka teo amin’ny sezafiandrianana ka nikabary ampahibemaso tamin’ny solotenan’i Tiro sy i Sidôna. '
  '22':
  - type: text
    content: 'Ary ny vahoaka tafavory niantsoantso hoe:'
  - type: text
    content: –Andriamanitra izany miteny izany fa tsy mba olombelona
  - type: note
    content: Ampit Ezek 28.2.
  - type: text
    content: '!'
  '23':
  - type: text
    content: 'Niaraka tamin’izay dia nisy '
  - type: text
    content: anjelin
  - type: text
    content: ’ny Tompo namely an’i Herôda, noho izy nihambo hitovy saranga amin’Andriamanitra; ka dia nohanin-kankana no nahafaty azy
  - type: note
    content: Tamin’ny taona 44 no nahafatesan’i Herôda Agripa I. Tampoka sady hafahafa ny fahafatesany, araka ny filàzan’i Jôsefa Flàvy, mpitantara jiosy. Ampit Dan 5.20 [sy 2Mak 9.1-28].
  - type: text
    content: .
  '24':
  - type: text
    content: Ary niely sy niroborobo fatratra kosa ny tenin’Andriamanitra.
  '25':
  - type: text
    content: Rehefa nahatontosa ny asa nanirahana azy tany Jerosalema i Barnabà sy i Saoly, dia niverina
  - type: note
    content: 'Rehefa... niverina: misy stf sasany ahitana hoe rehefa nahatontosa ny asa nanirahana azy i Barnabà sy i Paoly, dia niala tao Jerosalema; misy manampy fotsiny hoe tany Antiôkia.'
  - type: text
    content: sady nitondra an’i Jôhany izay antsoina hoe Marka hiaraka aminy!
  '3':
  - type: text
    content: 'ka nony hitany fa sitraky ny Jiosy izany, dia nosamboriny koa i Petera. (Andro fankalazana ny '
  - type: text
    content: Azima
  - type: note
    content: Jereo Eks 12.1-27.
  - type: text
    content: ' indrindra tamin’izay.) '
  '4':
  - type: text
    content: 'Rehefa voasambotr’i Herôda i Petera, dia nataony am-ponja; andia-miaramila efatra, misy miaramila efatra avy, no nasain’ity mpanjaka niandraikitra ny fiambenana azy. Nokasain’i Herôda hotsaraina imasom-bahoaka manko izy aorian’ny '
  - type: text
    content: Paska
  - type: text
    content: '. '
  '5':
  - type: text
    content: Voatana tao am-ponja àry i Petera, fa ny Fiangonana kosa nivavaka mafy tamin’Andriamanitra ho azy.
  - type: heading
    content: Afaka i Petera
  '6':
  - type: text
    content: 'Ny alina mialoha ny hitsaran’i '
  - type: text
    content: Herôda
  - type: text
    content: ' azy ampahibemaso, dia natory teo anelanelana miaramila roa lahy i Petera. Voafatotra gadra vy anankiroa izy, ary teo am-baravaran’ny fonja dia efa nasiana mpiambina. '
  '7':
  - type: text
    content: 'Dia indro nisy '
  - type: text
    content: anjelin
  - type: text
    content: '’ny Tompo tonga teo, ary namirapiratry ny hazavana tao amin’ilay efitry ny fonja. Notohinin’ilay anjely teo amin’ny tehezany i Petera, dia nofohaziny ka nataony hoe:'
  - type: text
    content: –Mitsangàna faingana!
  - type: text
    content: 'Nilatsaka ho azy ny gadra tamin’ny tanan’i Petera. '
  '8':
  - type: text
    content: 'Dia hoy ilay anjely taminy:'
  - type: text
    content: –Misikîna ary anaovy ny kapa.
  - type: text
    content: 'Dia nataon’i Petera izany. Ary hoy koa ilay anjely taminy:'
  - type: text
    content: –Tafio ny lambanao ary manaraha ahy.
  '9':
  - type: text
    content: 'Dia niala tao am-ponja nanaraka an’ilay anjely i Petera. Saingy tsy fantany ho zavatra tena marina izay nataon’ny anjely fa noheveriny ho fahitana fotsiny. '
