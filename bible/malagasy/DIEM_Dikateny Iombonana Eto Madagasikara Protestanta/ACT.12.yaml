document_id: ACT.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vonoina i Jakôba ary gadraina i Petera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany fotoana izany, dia nasain’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: I Herôda Agripà I
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zana-drahalahin’i Herôda Antipasy (ilay nampamono an’i Jôhany Mpanao batisa), no ambara eto; nanjaka tao Jodea sy Samaria izy, taona 41–44 taor J. K. Tamin’ireo antokom-pivavahana jiosy dia ny Farisianina no nombàny sy notohanany.
    marker-yv: yv-n
  - type: text
    text: ' mpanjaka nosamborina ny olona sasantsasany anisan’ny Fiangonana mba hampahorîna. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Novonoiny tamin’ny sabatra i Jakôba rahalahin’i Jôhany; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nony hitany fa sitraky ny Jiosy izany, dia nosamboriny koa i Petera. (Andro fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Azima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.1-27.
    marker-yv: yv-n
  - type: text
    text: ' indrindra tamin’izay.) '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa voasambotr’i Herôda i Petera, dia nataony am-ponja; andia-miaramila efatra, misy miaramila efatra avy, no nasain’ity mpanjaka niandraikitra ny fiambenana azy. Nokasain’i Herôda hotsaraina imasom-bahoaka manko izy aorian’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voatana tao am-ponja àry i Petera, fa ny Fiangonana kosa nivavaka mafy tamin’Andriamanitra ho azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Afaka i Petera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny alina mialoha ny hitsaran’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ' azy ampahibemaso, dia natory teo anelanelana miaramila roa lahy i Petera. Voafatotra gadra vy anankiroa izy, ary teo am-baravaran’ny fonja dia efa nasiana mpiambina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia indro nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjelin
  - type: text
    text: '’ny Tompo tonga teo, ary namirapiratry ny hazavana tao amin’ilay efitry ny fonja. Notohinin’ilay anjely teo amin’ny tehezany i Petera, dia nofohaziny ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitsangàna faingana!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nilatsaka ho azy ny gadra tamin’ny tanan’i Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ilay anjely taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Misikîna ary anaovy ny kapa.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nataon’i Petera izany. Ary hoy koa ilay anjely taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tafio ny lambanao ary manaraha ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niala tao am-ponja nanaraka an’ilay anjely i Petera. Saingy tsy fantany ho zavatra tena marina izay nataon’ny anjely fa noheveriny ho fahitana fotsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nony efa nandalo ny fiambenana voalohany sy faharoa izy ireo, dia tonga teo amin’ny vavahady vy mahazo ny lalana ho any an-tanàna. Nivoha nidanadana ho azy ilay vavahady ka dia tafavoaka soa aman-tsara izy ireo. Nizotra tamin’izay lalana anankiray izay izy ireo, ary dia nilaozan’ny anjely tampoka i Petera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay vao nahatsiaro tena i Petera ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fantatro marina izao fa naniraka ny anjeliny tokoa ny Tompo, ka nanafaka ahy teo an-tanan’i Herôda sy tamin’ny ratsy rehetra notetehin’ny vahoaka jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony nazava tsara tamin’i Petera ny toe-javatra, dia lasa izy nankany an-tranon’i Maria, renin’i Jôhany antsoina hoe Marka. Vory maromaro tao ny olona ary nivavaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nandondom-baravarana i Petera ka nisy ankizivavy atao hoe Rôda nanatona hihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vao nahafantatra ny feon’i Petera izy, dia nentin-kafaliana, ka tsy namoha ny varavarana fa lasa nihazakazaka nilaza tamin’ny olona tao an-trano hoe ao am-baravarana ao i Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy ny olona tamin-drazazavavy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Lasa adala ity ianao!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nanizingizina i Rôda fa marina izay voalazany. Ka hoy indray ny olona hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ambiroany izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa naharitra nandondòna ihany i Petera. Nony namoha azy ny tao an-trano ka nahita azy vao talanjona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nanofahofa tanana hampangina azy ireo kosa i Petera, ka nitantara ny namoahan’ny Tompo azy tao am-ponja. Ary hoy koa izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ambarao amin’i Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Jakôba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rahalahin’ny Tompo io.
    marker-yv: yv-n
  - type: text
    text: ' sy amin’ny havana iray finoana izany!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia lasa i Petera nankany an-toeran-kafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony nazava ny andro, dia somaritaka be ihany ny miaramila mpiambina nifanontany momba izay niafaran’i Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nampikarohin’i Herôda izy, nefa tsy hita. Dia nalaina am-bava ireto mpiambina ary nasainy novonoina. Avy eo dia niala tao Jodea i Herôda ka nankany Kesaria ary nipetrapetraka tany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Maty i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tezitra izaitsizy tamin’ny mponina tany Tiro sy Sidôna i Herôda. Ry zareo kosa anefa niray saina nanatona ny mpanjaka. Rehefa nahazo an’i Blasta mpitandrina ny trano fandrian’ny mpanjaka ho namana izy ireo, dia nangataka hanao raharaham-pihavanana tamin’i Herôda, satria ny tanin’ny mpanjaka no mamatsy ny faritr’i Tiro sy i Sidôna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’ny andro voatendry, dia nitafy ny fanamiana maha mpanjaka i Herôda ary nipetraka teo amin’ny sezafiandrianana ka nikabary ampahibemaso tamin’ny solotenan’i Tiro sy i Sidôna. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny vahoaka tafavory niantsoantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andriamanitra izany miteny izany fa tsy mba olombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ezek 28.2.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Niaraka tamin’izay dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjelin
  - type: text
    text: ’ny Tompo namely an’i Herôda, noho izy nihambo hitovy saranga amin’Andriamanitra; ka dia nohanin-kankana no nahafaty azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tamin’ny taona 44 no nahafatesan’i Herôda Agripa I. Tampoka sady hafahafa ny fahafatesany, araka ny filàzan’i Jôsefa Flàvy, mpitantara jiosy. Ampit Dan 5.20 [sy 2Mak 9.1-28].
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary niely sy niroborobo fatratra kosa ny tenin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa nahatontosa ny asa nanirahana azy tany Jerosalema i Barnabà sy i Saoly, dia niverina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Rehefa... niverina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rehefa nahatontosa ny asa nanirahana azy i Barnabà sy i Paoly, dia niala tao Jerosalema;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy manampy fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tany Antiôkia.
    marker-yv: yv-n
  - type: text
    text: sady nitondra an’i Jôhany izay antsoina hoe Marka hiaraka aminy!
