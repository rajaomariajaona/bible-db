  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay dia niteny tamin’ny vahoaka sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' i Jesoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nomena fahefana hivaofy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa amin’izany, ataovy sy araho izay rehetra lazainy; fa aza maka tahaka ny ataony, satria milaza fotsiny ry zareo fa tsy manao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Entam-be sady tsy zaka no feheziny ka atainginy eo an-tsoroky ny olona, nefa na dia ny rantsan-tanan-dry zareo aza tsy tiany hanetsika izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny asany rehetra dia ataony mba ho hitan’ny olona; ka dia lehibe ny azy ny boaty mirakitra tenin’ny lalàna fitondra eny an-kandrina na eny an-tsandry, ary vaventy ny somotraviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo Jiosy tia vavaka dia mitondra somotraviavy ombàn’ny kofehy volomparasy eny amin’ny lambany; izany dia natao hahatsiahivany ny didin’Andriamanitra. Jereo Mt 9.20 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' eny amin’ny lambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny ankamamiany dia ny maka ny toeram-boninahitra amin’ny fanasana sy ny mipetraka eny aloha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ny arahabaina eny an-kianja sy ny antsoin’ny olona hoe «Rabỳ» na hoe Mpampianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ianareo kosa, aza mba mety hantsoina hoe «Rabỳ» na hoe Mpampianatra, satria iray ihany no Mpampianatra anareo ary mpiray tampo avokoa ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary aza miantso olona etỳ an-tany hoe «Rainareo» fa iray ihany no Rainareo, dia Ilay any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aza mba mety hantsoina hoe «Mpitarika» fa iray ihany no Mpitarika anareo, dia ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay lehibe kokoa aminareo no ho mpanomponareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izay hanandra-tena dia haetry; ary izay hanetry tena dia hasandratra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampalahelo ireo mpahay lalàna sy Farisianina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 12.40; Lk 11.39-42, 44, 52; 20.47)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '–Mampalahelo ianareo, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' mpihatsaravelatsihy! Fa hidianareo eo anoloan’ny olona ny vavahady mankao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ; ka ianareo tsy miditra, ary izay te hiditra tsy avelanareo hiditra.
- type: usfm
  marker: p
  children:
  - type: text
    text: '[ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa tapitrareo ny fananan’ny mpitondratena ary vavaka lavareny no mody ataonareo hisehosehoana; noho izany, dia hohelohina mafimafy kokoa ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mk 12.40.
    marker-yv: yv-n
  - type: text
    text: .]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina! Fa tetezinareo ny tany sy ny ranomasina mba hahazoanareo olona hafa firenena iray monja hanaraka ny fivavahanareo; ary rehefa manaraka ny fivavahanareo izy, dia ataonareo mendrika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lohasahan’afo
  - type: text
    text: ' indroa mihoatra anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mampalahelo ianareo, ry mpitari-dalana jamba! Fa hoy ianareo hoe: «Raha misy mianiana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ', dia tsy voafehin’ny fianianany velively; fa raha misy mianiana amin’ny volamena raketin’ny Toeramasina, dia voafehin’ny fianianany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy misaina sady jamba ianareo! Inona no mendri-kaja kokoa, ny volamena sa ny Toeramasina izay mahamasina ny volamena? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa ianareo hoe: «Raha misy mianiana amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ', dia tsy voafehin’ny fianianany velively; fa raha misy mianiana amin’ny fanatitra eo ambony alitara, dia voafehin’ny fianianany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy misaina sady jamba ianareo! Inona no mendri-kaja kokoa, ny fanatitra sa ny alitara izay mahamasina ny fanatitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa amin’izany, izay mianiana amin’ny alitara dia mianiana amin’ny alitara sy amin’izay rehetra eo amboniny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary izay mianiana amin’ny Toeramasina dia mianiana amin’ny Toeramasina sy amin’Andriamanitra Izay monina ao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary izay mianiana amin’ny lanitra dia mianiana amin’ny sezafiandrianan’Andriamanitra sy amin’Andriamanitra Izay mipetraka eo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 66.1; Mt 5.34.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa voaloanareo ny ampahafolon’ny ana-madinika toy ny karaotimanitra sy ny solila ary ny kòmina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 27.30; Deot 14.22.
    marker-yv: yv-n
  - type: text
    text: '; nefa navelanareo ny zavatra mavesa-danja kokoa ao amin’ny lalàna, dia ny rariny sy ny famindrampo ary ny hitsimpo; ireto indrindra no tsy maintsy tontosaina, na tsy azo avela aza ireroa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry mpitari-dalana jamba, tantavaninareo ny moka amin’ny zava-pisotronareo, nefa ny rameva atelinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa diovinareo ny vohon’ny kaopy sy ny lovia, nefa ny ao anatiny dia feno ireo vokatry ny halatrareo sy ny tsy fahalalanareo onona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ianao, ry Farisianina jamba, diovy aloha ny atin’ny kaopy sy ny lovia, ary dia hanjary madio koa ny vohony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa tahaka ny fasana voalalotra fotsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo fasana tany Palestinina fahizany dia voalalotra fotsy mba hiarovana ny olona tsy hahakasika azy amin’ny alina ka tsy hahavoatery azy hanao fanompoam-pivavahana fidiovana.
    marker-yv: yv-n
  - type: text
    text: ' ianareo ka madio eto ivelany nefa ao anatiny feno taolam-paty sy henika fahalòvana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toy izany koa ianareo: eto ivelany miseho ho marina imason’ny olona, nefa ao anatinareo feno fihatsarambelatsihy sy fandikan-dalàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa amboarinareo ny fasan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminani
  - type: text
    text: 'n’Andriamanitra ary ravahanareo rarivato ny fasan’ny olo-marina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka hoy ianareo hoe: «Raha velona tamin’ny andron’ny razanay izahay, dia tsy ho niray tetika taminy handatsa-dra ny mpaminanin’Andriamanitra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa ny tenanareo no vavolombelona fa taranak’ireo mpamono ny mpaminany ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ary dia tohizo hatramin’ny farany izay efa natomboky ny razanareo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sazy hihatra amin’ireo mpahay lalàna sy Farisianina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 11.49-51)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '–Ry bibilava, tarana-menarana, hataonareo ahoana no fandositra tsy ho voaheloka any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lohasahan’afo
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Noho izany, indro Aho maniraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy olon-kendry ary mpahay lalàna ho atỳ aminareo; ka ny sasany amin’ireny hovonoinareo sy hohomboanareo amin’ny hazofijaliana, ary ny sasany hokapohinareo any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôganareo
  - type: text
    text: ' sy hoenjehinareo isan-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa hitambesatra aminareo ny ratsy natao tamin’ny olo-marina rehetra nalatsa-dra teto amin’ity tany ity, nanomboka tamin’i Abela olo-marina ka niafara tamin’i Zakarià zanakalahin’i Barakià, ilay novonoinareo teo anelanelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 4.8; 2 Tan 24.20-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Lazaiko marina aminareo fa hitambesatra amin’ny olona ankehitriny avokoa izany rehetra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Itomanian’i Jesoa ny tanànan’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Lk 13.34-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '–Ry Jerosalema, ry Jerosalema! Ianao izay mpamono ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy mpitora-bato ireo irahin’Andriamanitra aminao. Efa impiry moa Aho no nikasa hanangona ny mponina ao aminao, tahaka ny reniakoho manomba ny zanany, kanefa tsy nety ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Indro ny tempolinareo fa havela aminareo ho trano lao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer 22.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary lazaiko aminareo fa tsy ho hitanareo intsony Aho mandra-pilazanareo hoe: «Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sal 118.26.
    marker-yv: yv-n
  - type: text
    text: '!»'
