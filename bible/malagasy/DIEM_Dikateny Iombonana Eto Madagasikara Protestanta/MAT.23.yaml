document_id: MAT.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitandrema amin’ny mpahay lalàna sy ny Farisianina
  - type: heading
    content: (Jereo Mk 12.38-39; Lk 11.43-46; 20.45-46)
  - type: text
    content: 'Tamin’izay dia niteny tamin’ny vahoaka sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' i Jesoa '
  '10':
  - type: text
    content: 'Ary aza mba mety hantsoina hoe «Mpitarika» fa iray ihany no Mpitarika anareo, dia ny '
  - type: text
    content: Mesia
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Izay lehibe kokoa aminareo no ho mpanomponareo. '
  '12':
  - type: text
    content: Fa izay hanandra-tena dia haetry; ary izay hanetry tena dia hasandratra.
  - type: heading
    content: Mampalahelo ireo mpahay lalàna sy Farisianina
  - type: heading
    content: (Jereo Mk 12.40; Lk 11.39-42, 44, 52; 20.47)
  '13':
  - type: text
    content: '–Mampalahelo ianareo, ry '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy '
  - type: text
    content: Farisianina
  - type: text
    content: ' mpihatsaravelatsihy! Fa hidianareo eo anoloan’ny olona ny vavahady mankao amin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ; ka ianareo tsy miditra, ary izay te hiditra tsy avelanareo hiditra.
  - type: text
    content: '[ '
  '14':
  - type: text
    content: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa tapitrareo ny fananan’ny mpitondratena ary vavaka lavareny no mody ataonareo hisehosehoana; noho izany, dia hohelohina mafimafy kokoa ianareo
  - type: note
    content: Jereo Mk 12.40.
  - type: text
    content: .]
  '15':
  - type: text
    content: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina! Fa tetezinareo ny tany sy ny ranomasina mba hahazoanareo olona hafa firenena iray monja hanaraka ny fivavahanareo; ary rehefa manaraka ny fivavahanareo izy, dia ataonareo mendrika ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: ' indroa mihoatra anareo.'
  '16':
  - type: text
    content: 'Mampalahelo ianareo, ry mpitari-dalana jamba! Fa hoy ianareo hoe: «Raha misy mianiana amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', dia tsy voafehin’ny fianianany velively; fa raha misy mianiana amin’ny volamena raketin’ny Toeramasina, dia voafehin’ny fianianany.» '
  '17':
  - type: text
    content: 'Tsy misaina sady jamba ianareo! Inona no mendri-kaja kokoa, ny volamena sa ny Toeramasina izay mahamasina ny volamena? '
  '18':
  - type: text
    content: 'Ary hoy koa ianareo hoe: «Raha misy mianiana amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ', dia tsy voafehin’ny fianianany velively; fa raha misy mianiana amin’ny fanatitra eo ambony alitara, dia voafehin’ny fianianany.» '
  '19':
  - type: text
    content: 'Tsy misaina sady jamba ianareo! Inona no mendri-kaja kokoa, ny fanatitra sa ny alitara izay mahamasina ny fanatitra? '
  '2':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: '–Nomena fahefana hivaofy ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Koa amin’izany, izay mianiana amin’ny alitara dia mianiana amin’ny alitara sy amin’izay rehetra eo amboniny; '
  '21':
  - type: text
    content: 'ary izay mianiana amin’ny Toeramasina dia mianiana amin’ny Toeramasina sy amin’Andriamanitra Izay monina ao; '
  '22':
  - type: text
    content: ary izay mianiana amin’ny lanitra dia mianiana amin’ny sezafiandrianan’Andriamanitra sy amin’Andriamanitra Izay mipetraka eo
  - type: note
    content: Ampit Is 66.1; Mt 5.34.
  - type: text
    content: .
  '23':
  - type: text
    content: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa voaloanareo ny ampahafolon’ny ana-madinika toy ny karaotimanitra sy ny solila ary ny kòmina
  - type: note
    content: Jereo Lev 27.30; Deot 14.22.
  - type: text
    content: '; nefa navelanareo ny zavatra mavesa-danja kokoa ao amin’ny lalàna, dia ny rariny sy ny famindrampo ary ny hitsimpo; ireto indrindra no tsy maintsy tontosaina, na tsy azo avela aza ireroa! '
  '24':
  - type: text
    content: Ry mpitari-dalana jamba, tantavaninareo ny moka amin’ny zava-pisotronareo, nefa ny rameva atelinareo.
  '25':
  - type: text
    content: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa diovinareo ny vohon’ny kaopy sy ny lovia, nefa ny ao anatiny dia feno ireo vokatry ny halatrareo sy ny tsy fahalalanareo onona. '
  '26':
  - type: text
    content: 'Ianao, ry Farisianina jamba, diovy aloha ny atin’ny kaopy sy ny lovia, ary dia hanjary madio koa ny vohony. '
  '27':
  - type: text
    content: Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa tahaka ny fasana voalalotra fotsy
  - type: note
    content: Ireo fasana tany Palestinina fahizany dia voalalotra fotsy mba hiarovana ny olona tsy hahakasika azy amin’ny alina ka tsy hahavoatery azy hanao fanompoam-pivavahana fidiovana.
  - type: text
    content: ' ianareo ka madio eto ivelany nefa ao anatiny feno taolam-paty sy henika fahalòvana. '
  '28':
  - type: text
    content: 'Toy izany koa ianareo: eto ivelany miseho ho marina imason’ny olona, nefa ao anatinareo feno fihatsarambelatsihy sy fandikan-dalàna.'
  '29':
  - type: text
    content: 'Mampalahelo ianareo, ry mpahay lalàna sy Farisianina mpihatsaravelatsihy! Fa amboarinareo ny fasan’ny '
  - type: text
    content: mpaminani
  - type: text
    content: 'n’Andriamanitra ary ravahanareo rarivato ny fasan’ny olo-marina, '
  '3':
  - type: text
    content: 'Koa amin’izany, ataovy sy araho izay rehetra lazainy; fa aza maka tahaka ny ataony, satria milaza fotsiny ry zareo fa tsy manao. '
  '30':
  - type: text
    content: 'ka hoy ianareo hoe: «Raha velona tamin’ny andron’ny razanay izahay, dia tsy ho niray tetika taminy handatsa-dra ny mpaminanin’Andriamanitra.» '
  '31':
  - type: text
    content: 'Koa ny tenanareo no vavolombelona fa taranak’ireo mpamono ny mpaminany ianareo; '
  '32':
  - type: text
    content: ary dia tohizo hatramin’ny farany izay efa natomboky ny razanareo!
  - type: heading
    content: Sazy hihatra amin’ireo mpahay lalàna sy Farisianina
  - type: heading
    content: (Jereo Lk 11.49-51)
  '33':
  - type: text
    content: '–Ry bibilava, tarana-menarana, hataonareo ahoana no fandositra tsy ho voaheloka any amin’ny '
  - type: text
    content: lohasahan’afo
  - type: text
    content: '? '
  '34':
  - type: text
    content: 'Noho izany, indro Aho maniraka '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy olon-kendry ary mpahay lalàna ho atỳ aminareo; ka ny sasany amin’ireny hovonoinareo sy hohomboanareo amin’ny hazofijaliana, ary ny sasany hokapohinareo any amin’ny '
  - type: text
    content: sinagôganareo
  - type: text
    content: ' sy hoenjehinareo isan-tanàna. '
  '35':
  - type: text
    content: 'Koa hitambesatra aminareo ny ratsy natao tamin’ny olo-marina rehetra nalatsa-dra teto amin’ity tany ity, nanomboka tamin’i Abela olo-marina ka niafara tamin’i Zakarià zanakalahin’i Barakià, ilay novonoinareo teo anelanelan’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana'
  - type: note
    content: Jereo Gen 4.8; 2 Tan 24.20-22.
  - type: text
    content: '. '
  '36':
  - type: text
    content: Lazaiko marina aminareo fa hitambesatra amin’ny olona ankehitriny avokoa izany rehetra izany.
  - type: heading
    content: Itomanian’i Jesoa ny tanànan’i Jerosalema
  - type: heading
    content: (Jereo Lk 13.34-35)
  '37':
  - type: text
    content: '–Ry Jerosalema, ry Jerosalema! Ianao izay mpamono ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy mpitora-bato ireo irahin’Andriamanitra aminao. Efa impiry moa Aho no nikasa hanangona ny mponina ao aminao, tahaka ny reniakoho manomba ny zanany, kanefa tsy nety ianareo. '
  '38':
  - type: text
    content: Indro ny tempolinareo fa havela aminareo ho trano lao
  - type: note
    content: Jer 22.5.
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Ary lazaiko aminareo fa tsy ho hitanareo intsony Aho mandra-pilazanareo hoe: «Hombàm-pitahiana amin’ny anaran’ny Tompo anie Ilay avy'
  - type: note
    content: Sal 118.26.
  - type: text
    content: '!»'
  '4':
  - type: text
    content: 'Entam-be sady tsy zaka no feheziny ka atainginy eo an-tsoroky ny olona, nefa na dia ny rantsan-tanan-dry zareo aza tsy tiany hanetsika izany. '
  '5':
  - type: text
    content: Ny asany rehetra dia ataony mba ho hitan’ny olona; ka dia lehibe ny azy ny boaty mirakitra tenin’ny lalàna fitondra eny an-kandrina na eny an-tsandry, ary vaventy ny somotraviavy
  - type: note
    content: Ireo Jiosy tia vavaka dia mitondra somotraviavy ombàn’ny kofehy volomparasy eny amin’ny lambany; izany dia natao hahatsiahivany ny didin’Andriamanitra. Jereo Mt 9.20 sy nta.
  - type: text
    content: ' eny amin’ny lambany. '
  '6':
  - type: text
    content: 'Ny ankamamiany dia ny maka ny toeram-boninahitra amin’ny fanasana sy ny mipetraka eny aloha ao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'ary ny arahabaina eny an-kianja sy ny antsoin’ny olona hoe «Rabỳ» na hoe Mpampianatra. '
  '8':
  - type: text
    content: 'Ianareo kosa, aza mba mety hantsoina hoe «Rabỳ» na hoe Mpampianatra, satria iray ihany no Mpampianatra anareo ary mpiray tampo avokoa ianareo rehetra. '
  '9':
  - type: text
    content: 'Ary aza miantso olona etỳ an-tany hoe «Rainareo» fa iray ihany no Rainareo, dia Ilay any an-danitra. '
