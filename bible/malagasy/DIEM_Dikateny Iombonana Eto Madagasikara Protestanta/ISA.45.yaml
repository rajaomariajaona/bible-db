document_id: ISA.45,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Kirôsa mpanjaka, fiasàn’Andriamanitra
  - type: text
    content: Izao no lazain’ny TOMPO
  - type: text
    content: amin’ilay nohosorany
  - type: note
    content: 'ilay nohosorany: na ilay Mesiany*, i Kirôsa mpanjakan’i Persia eto dia mandray anaram-boninahitra mitovy amin’ny mpanjakan’i Joda (Sal 2.2; 18.51); ampit 44.28a.'
  - type: text
    content: ', dia i Kirôsa:'
  - type: text
    content: «Tohanako ianao mba handresy ny firenen-kafa
  - type: text
    content: sy hanaisotra ny fahefàn’ny mpanjaka
  - type: text
    content: ka hivoha eo anatrehanao
  - type: text
    content: ireo vavahadin’ny tanàna nihidy.
  '10':
  - type: text
    content: 'Lozan’izay sahy milaza amin’ny rainy hoe:'
  - type: text
    content: «Inona ity naterakao?»
  - type: text
    content: 'na sahy miteny amin’ny reniny hoe:'
  - type: text
    content: «Inona ity naloaky ny kibonao?»
  '11':
  - type: text
    content: Izao kosa no lazain’ny TOMPO,
  - type: text
    content: 'dia ilay Masin’i Israely sady mpamorona azy:'
  - type: text
    content: «Izaho ve no anontanianareo
  - type: text
    content: ny amin’ireo zanako
  - type: text
    content: sy homenareo baiko
  - type: text
    content: ny amin’izay tokony hataoko?
  '12':
  - type: text
    content: Izaho no nanao ny tany
  - type: text
    content: sy nahary ny olona monina eo amboniny.
  - type: text
    content: Izaho no nanenjana ny lanitra tamin’ny tanako
  - type: text
    content: sy mibaiko ny planeta aman-kintana rehetra
  - type: note
    content: Jereo 41.2 sy nta.
  - type: text
    content: .
  '13':
  - type: text
    content: Izaho koa no nampipoitra io lehilahy io
  - type: text
    content: mba hitondra fanafahana
  - type: text
    content: ary Izaho no hanitsy ny lalany rehetra.
  - type: text
    content: Izy no hanangana indray
  - type: text
    content: an’i Jerosalema tanànako
  - type: text
    content: sy handefa ny oloko izay babo,
  - type: text
    content: nefa tsy hampandoa vola na tamby,
  - type: text
    content: hoy aho TOMPOn’izao rehetra izao.»
  - type: heading
    content: Ao aminao ny Tompo, ry Israely
  '14':
  - type: text
    content: Izao, ry vahoaka Israely,
  - type: text
    content: 'no lazain’ny TOMPO aminao:'
  - type: text
    content: Ny vokatry ny asan’ny Ejiptianina,
  - type: text
    content: ny tombom-barotry ny Etiôpianina
  - type: text
    content: sy ny an’ireo olona ranjanana avy any Seba
  - type: text
    content: dia handalo ao aminao avokoa, ka ho lasanao.
  - type: text
    content: Voafatotra ireny olona ireny no hanaraka anao
  - type: text
    content: ary hiankohoka handady eo anatrehanao
  - type: text
    content: 'sady hivavabavaka hifona aminao hoe:'
  - type: text
    content: «Ato aminao tokoa tokoa Andriamanitra;
  - type: text
    content: ary tsy misy Andriamanitra afa-tsy Izy irery.»
  '15':
  - type: text
    content: Kanefa marina fa Andriamanitra miafina Ianao,
  - type: text
    content: ry Andriamanitr’i Israely sady mpamonjy ô!
  '16':
  - type: text
    content: Indro ny mpanamboatra sarivongan-tsampy
  - type: text
    content: fa ho indray menatra sy ho afa-baràka;
  - type: text
    content: mandeha mitanondrika izy rehetra.
  '17':
  - type: text
    content: Ianareo kosa, ry vahoaka Israely,
  - type: text
    content: dia nandray famonjena mandrakizay avy amin’ny TOMPO.
  - type: text
    content: Tsy ho menatra na ho afa-baràka
  - type: text
    content: na oviana na oviana ianareo.
  - type: heading
    content: Fanasana ny vahoaka rehetra
  '18':
  - type: text
    content: Ny TOMPO no nahary ny lanitra,
  - type: text
    content: Izy no Andriamanitra namorona ny tany
  - type: text
    content: ka namolavola sy nanamafy azy,
  - type: text
    content: nefa tsy nahary azy ho foana
  - type: text
    content: fa nanao azy mba honenana.
  - type: text
    content: 'Io Tompo io dia indro milaza hoe:'
  - type: text
    content: «Izaho no TOMPO, ary tsy misy hafa.»
  '19':
  - type: text
    content: An-karihary no nitenenako
  - type: text
    content: fa tsy tao amin’ny toerana maizimaizina;
  - type: text
    content: tsy nampirisihiko ny taranak’i Jakôba
  - type: text
    content: hitady Ahy eo amin’ny toeram-poana.
  - type: text
    content: TOMPO Aho, ka ny marina no lazaiko
  - type: text
    content: ary ny mahitsy no ambarako!
  - type: heading
    content: Ny fibebahan’ireo firenen-kafa
  '2':
  - type: text
    content: Izaho mihitsy no handeha eo anoloanao
  - type: text
    content: mba handravona ny mikitoantoana
  - type: text
    content: sy hanamontsana ny varavarana varahina
  - type: text
    content: ary hanapatapaka ny hidy vy.
  '20':
  - type: text
    content: Ianareo firenen-kafa sisa tavela,
  - type: text
    content: avia ka mivoria, manatòna miaraka.
  - type: text
    content: Tsy mahalala na inona na inona akory
  - type: text
    content: ireo manandratra ny sampy hazo voasokitra,
  - type: text
    content: sy mivavaka amin’izay andriamanitra tsy mahavonjy.
  '21':
  - type: text
    content: Manaova fanambaràna, ary ento ny porofo,
  - type: text
    content: manaova fikaonan-doha miaraka ianareo!
  - type: text
    content: Iza no nampahalala hatry ny ela
  - type: text
    content: izay mitranga ankehitriny?
  - type: text
    content: Iza no nanambara izany mialoha?
  - type: text
    content: Moa tsy Izaho TOMPO va?
  - type: text
    content: Koa tsy misy Andriamanitra afa-tsy Izaho;
  - type: text
    content: Izaho no hany Andriamanitra marina sy mamonjy.
  '22':
  - type: text
    content: Mitodiha atỳ amiko, dia ho voavonjy ianareo,
  - type: text
    content: ry olona amin’ny vazan-tany rehetra;
  - type: text
    content: satria Izaho no Andriamanitra fa tsy misy hafa.
  '23':
  - type: text
    content: Nianiana tamin’ny tenako Aho,
  - type: text
    content: sady marina izay teny aloaky ny vavako
  - type: text
    content: 'ka tsy misy ivadihako:'
  - type: text
    content: Izaho no handohalihan’ny olona rehetra
  - type: text
    content: ary hianianan’ny fiteny rehetra
  - type: note
    content: Jereo Rm 14.11; Fil 2.10-11.
  - type: text
    content: ' hoe:'
  '24':
  - type: text
    content: Ao amin’ny TOMPO irery
  - type: text
    content: no hahitana hery sy fahamarinana!»
  - type: text
    content: Izay rehetra nifanohitra tamiko
  - type: text
    content: dia hankany amiko sady ho menatra.
  '25':
  - type: text
    content: Fa ny taranak’i Israely rehetra kosa
  - type: text
    content: dia Izaho TOMPO no hahazoany rariny
  - type: text
    content: sy hataony fireharehana.
  '3':
  - type: text
    content: Homeko anao ny raki-tsoany
  - type: text
    content: napetrany tao amin’ny toerana maizina
  - type: text
    content: sy ny harena nafeniny ao amin’ny mangingina,
  - type: text
    content: mba hahafantaranao fa Izaho no TOMPO
  - type: text
    content: Izay miantso anao amin’ny anaranao;
  - type: text
    content: Izaho no Andriamanitr’i Israely.
  '4':
  - type: text
    content: Noho ny fitiavako ny firenen’i Jakôba mpanompoko
  - type: text
    content: sy ny vahoaka Israely voafidiko
  - type: text
    content: no niantsoako anao tamin’ny anaranao;
  - type: text
    content: ary nomeko izany laza izany ianao,
  - type: text
    content: na dia tsy mahalala Ahy akory aza.
  '5':
  - type: text
    content: Izaho no TOMPO fa tsy misy hafa;
  - type: text
    content: tsy misy Andriamanitra afa-tsy Izaho.
  - type: text
    content: Nampisikiniko hery ianao hiasa
  - type: text
    content: na dia tsy mahalala Ahy akory aza,
  '6':
  - type: text
    content: mba hahafantarana eran-tany
  - type: text
    content: hatrany atsinanana ka hatrany andrefana
  - type: text
    content: fa ankoatra ny tenako dia zava-poana.
  - type: text
    content: Izaho no TOMPO fa tsy misy hafa.
  '7':
  - type: text
    content: Izaho no mamorona ny mazava
  - type: text
    content: sy mahary ny maizina.
  - type: text
    content: Izaho no manome fahasambarana
  - type: text
    content: sy mahary ny loza.
  - type: text
    content: Izaho TOMPO no manao izany rehetra izany.
  '8':
  - type: text
    content: Aoka ny lanitra handrotsaka ando avy any ambony
  - type: text
    content: ary aoka ny rahona handatsaka rariny!
  - type: text
    content: Aoka hisokatra ny tany hampivelatra ny famonjena
  - type: text
    content: sy hampitsimoka ny fahamarinana!
  - type: text
    content: Izaho TOMPO no nahary io lehilahy io.
  - type: heading
    content: Ny tanimanga sy ny mpanefy tanimanga
  '9':
  - type: text
    content: Lozan’izay sahy manome tsiny ny mpanao azy,
  - type: text
    content: kanefa ny tenany dia siny tanimanga
  - type: text
    content: toy ny siny tanimanga rehetra ihany!
  - type: text
    content: 'Ny tanimanga ve hanontany ny mpanefy azy hoe:'
  - type: text
    content: «Inona ity ataonao?»
  - type: text
    content: 'na ny asa vitany hanao aminy hoe:'
  - type: text
    content: «Tsy mahay ianao
  - type: note
    content: Jereo Rm 9.20.
  - type: text
    content: '!»'
