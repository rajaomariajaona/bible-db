segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Kirôsa mpanjaka, fiasàn’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no lazain’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ilay nohosorany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay nohosorany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay Mesiany*
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i Kirôsa mpanjakan’i Persia eto dia mandray anaram-boninahitra mitovy amin’ny mpanjakan’i Joda (Sal 2.2; 18.51); ampit 44.28a.
    marker-yv: yv-n
  - type: text
    text: ', dia i Kirôsa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tohanako ianao mba handresy ny firenen-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanaisotra ny fahefàn’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hivoha eo anatrehanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo vavahadin’ny tanàna nihidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho mihitsy no handeha eo anoloanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba handravona ny mikitoantoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hanamontsana ny varavarana varahina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanapatapaka ny hidy vy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Homeko anao ny raki-tsoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: napetrany tao amin’ny toerana maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny harena nafeniny ao amin’ny mangingina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahafantaranao fa Izaho no TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay miantso anao amin’ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no Andriamanitr’i Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho ny fitiavako ny firenen’i Jakôba mpanompoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny vahoaka Israely voafidiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no niantsoako anao tamin’ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary nomeko izany laza izany ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia tsy mahalala Ahy akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izaho no TOMPO fa tsy misy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy Andriamanitra afa-tsy Izaho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampisikiniko hery ianao hiasa
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia tsy mahalala Ahy akory aza,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: mba hahafantarana eran-tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatrany atsinanana ka hatrany andrefana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ankoatra ny tenako dia zava-poana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no TOMPO fa tsy misy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izaho no mamorona ny mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mahary ny maizina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no manome fahasambarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mahary ny loza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO no manao izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka ny lanitra handrotsaka ando avy any ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka ny rahona handatsaka rariny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hisokatra ny tany hampivelatra ny famonjena
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy hampitsimoka ny fahamarinana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho TOMPO no nahary io lehilahy io.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanimanga sy ny mpanefy tanimanga
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lozan’izay sahy manome tsiny ny mpanao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa ny tenany dia siny tanimanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny siny tanimanga rehetra ihany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny tanimanga ve hanontany ny mpanefy azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona ity ataonao?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na ny asa vitany hanao aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy mahay ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 9.20.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lozan’izay sahy milaza amin’ny rainy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona ity naterakao?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na sahy miteny amin’ny reniny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Inona ity naloaky ny kibonao?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izao kosa no lazain’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia ilay Masin’i Israely sady mpamorona azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izaho ve no anontanianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ireo zanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy homenareo baiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’izay tokony hataoko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho no nanao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nahary ny olona monina eo amboniny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no nanenjana ny lanitra tamin’ny tanako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mibaiko ny planeta aman-kintana rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 41.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho koa no nampipoitra io lehilahy io
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hitondra fanafahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izaho no hanitsy ny lalany rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hanangana indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: an’i Jerosalema tanànako
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy handefa ny oloko izay babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy hampandoa vola na tamby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy aho TOMPOn’izao rehetra izao.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ao aminao ny Tompo, ry Israely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izao, ry vahoaka Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no lazain’ny TOMPO aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vokatry ny asan’ny Ejiptianina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tombom-barotry ny Etiôpianina
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny an’ireo olona ranjanana avy any Seba
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handalo ao aminao avokoa, ka ho lasanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafatotra ireny olona ireny no hanaraka anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hiankohoka handady eo anatrehanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sady hivavabavaka hifona aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ato aminao tokoa tokoa Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy misy Andriamanitra afa-tsy Izy irery.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanefa marina fa Andriamanitra miafina Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Andriamanitr’i Israely sady mpamonjy ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro ny mpanamboatra sarivongan-tsampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ho indray menatra sy ho afa-baràka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandeha mitanondrika izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ianareo kosa, ry vahoaka Israely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nandray famonjena mandrakizay avy amin’ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho menatra na ho afa-baràka
- type: usfm
  marker: q1
  children:
  - type: text
    text: na oviana na oviana ianareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanasana ny vahoaka rehetra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny TOMPO no nahary ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no Andriamanitra namorona ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka namolavola sy nanamafy azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa tsy nahary azy ho foana
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa nanao azy mba honenana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Io Tompo io dia indro milaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Izaho no TOMPO, ary tsy misy hafa.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: An-karihary no nitenenako
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy tao amin’ny toerana maizimaizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy nampirisihiko ny taranak’i Jakôba
- type: usfm
  marker: q1
  children:
  - type: text
    text: hitady Ahy eo amin’ny toeram-poana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO Aho, ka ny marina no lazaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny mahitsy no ambarako!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fibebahan’ireo firenen-kafa
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ianareo firenen-kafa sisa tavela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avia ka mivoria, manatòna miaraka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahalala na inona na inona akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo manandratra ny sampy hazo voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mivavaka amin’izay andriamanitra tsy mahavonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Manaova fanambaràna, ary ento ny porofo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: manaova fikaonan-doha miaraka ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nampahalala hatry ny ela
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mitranga ankehitriny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nanambara izany mialoha?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy Izaho TOMPO va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa tsy misy Andriamanitra afa-tsy Izaho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no hany Andriamanitra marina sy mamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mitodiha atỳ amiko, dia ho voavonjy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry olona amin’ny vazan-tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria Izaho no Andriamanitra fa tsy misy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nianiana tamin’ny tenako Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady marina izay teny aloaky ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tsy misy ivadihako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no handohalihan’ny olona rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hianianan’ny fiteny rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 14.11; Fil 2.10-11.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ao amin’ny TOMPO irery
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hahitana hery sy fahamarinana!»
- type: usfm
  marker: q1
  children:
  - type: text
