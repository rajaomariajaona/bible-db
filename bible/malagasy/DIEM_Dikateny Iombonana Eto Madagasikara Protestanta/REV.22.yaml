document_id: REV.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia nasehon’ny anjely tamiko ity onin-dranovelona manganohano toy ny vato kristaly, nivoaka avy teo amin’ilay sezafiandrianana ipetrahan’Andriamanitra sady ipetrahan’ny Zanakondry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ezek 47.1; Za 14.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Teo anelanelan’ny lalamben’ny tanàna etsy an-kilany ary ny ony etsy an-daniny, dia nisy hazo anankiray manome fiainana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Teo anelanelan’ny... hazo anankiray manome fiainana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy dia mazava loatra etoana ny rijan-teny grika fototra. Ampit Gen 2.9-10; Ezek 47.12.
    marker-yv: yv-n
  - type: text
    text: ': io hazo io dia mamoa voa in-12 isan-taona, izany hoe indray mandeha isam-bolana; ary ny raviny dia hanasitranana ny firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ka tsy hisy zavatra hiharan’ny loza nambaran’Andriamanitra intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Za 14.11; Gen 3.17.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ilay sezafiandrianana, ipetrahan’Andriamanitra sady ipetrahan’ny Zanakondry, no ho ao an-tanàna; ka dia hanompo an’Andriamanitra ireo mpanompony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sy hahita ny tavany ary hanana ny anaran’Andriamanitra voasoratra eo amin’ny handriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy hisy alina intsony ary tsy mba mila fahazavàn’ny jiro na fahazavàn’ny masoandro ireo mpanompon’Andriamanitra, satria hohazavain’ny Tompo Andriamanitra izy rehetra sady hanjaka mandrakizay mandrakizay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 60.19; Dan 7.18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiavian’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Azo antoka sy marim-pototra ireo teny ireo! Ary ny Tompo Andriamanitra, Izay manentana ireo mpaminany, no efa naniraka ny anjeliny haneho amin’ireo mpanompony izay zavatra tsy maintsy ho tonga faingana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Indro avy faingana Aho, hoy i Jesoa. Sambatra izay mitandrina ny teny faminaniana raketin’ity boky ity!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izaho Jôhany no nahare sady nahita ireo zavatra ireo. Ary rehefa nahare sady nahita aho, dia niankohoka teo an-tongotr’ilay anjely mba hitsaoka azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'saingy nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tandremo, aza manao izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 8-9:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 19.10.
    marker-yv: yv-n
  - type: text
    text: '! Fa mpanompo miaraka aminao aho sady miaraka amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' namanao sy izay mitandrina ny teny raketin’ity boky ity. Andriamanitra no tsaohy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy koa ny anjely tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza afenina ny teny faminaniana raketin’ity boky ity, satria antomotra ny fotoanandro hahatanterahan’ireo zavatra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay manao ny tsy rariny, aoka mbola hanao ny tsy rariny hatrany; ary izay ratsy toetra, aoka hiharatsy toetra hatrany. Izay tia rariny, aoka hanao ny rariny hatrany; ary izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: masina
  - type: text
    text: ', aoka hihamasina hatrany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 12.10.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Indro avy faingana Aho, hoy i Jesoa; ary miaraka amiko ny valin’asa, mba hamaliako ny olona rehetra araka izay nataony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho no Alfa sy Ômega, ny voalohany sy ny farany, ny fiandohana sy ny fiafarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 12-13:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Is 40.10; 62.11; Sal 28.4; Jer 17.10; Apôk 1.8 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sambatra izay manasa ny akanjony, mba ho afa-mihinana amin’ny voan’ilay hazo manome fiainana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 2.9; 3.22.
    marker-yv: yv-n
  - type: text
    text: ' sy ho afa-miditra amin’ny vavahady mankao amin’ilay tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa any ivelany kosa izay manana toe-panahy maharikoriko: dia ny mpanao ody ratsy, ny mpijangajanga, ny mpamono olona, ny mpanompo sampy ary izay rehetra tia lainga sy mpandainga.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Izaho Jesoa dia efa naniraka ny anjeliko hijoro vavolombelona aminareo ka hanambara izany zavatra izany eo anivon’ireo Fiangonana. Izaho no solofo sy taranak’i Davida, ary kintana fitarikandro mamirapiratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 11.1, 10; Apôk 2.28; 5.5. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eo anivon’ireo Fiangonana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: momba ireo Fiangonana.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy ny Fanahy Masina sy ny ampakarina hoe: «Avia!»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izay mahare, aoka hanao hoe: «Avia!»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Izay mangetaheta, aoka ho avy; izay maniry ranovelona, aoka hanovo maimaimpoana amin’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 55.1.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famaranana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izaho Jôhany dia manao fampitandremana amin’izay rehetra mandre ny teny faminaniana raketin’ity boky ity: raha misy manampy ireo, dia hampiharan’Andriamanitra ny loza voasoratra ato anatin’ity boky ity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary raha misy manaisotra teny amin’ity boky faminaniana ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.19 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 18-19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Deot 4.2; 13.1.
    marker-yv: yv-n
  - type: text
    text: ', dia hoesorin’Andriamanitra ny anjarany amin’ny hazo manome fiainana sy ny anjarany ao amin’ny tanàna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: masina
  - type: text
    text: ' araka izay voasoratra ato anatin’ity boky ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy Ilay mijoro vavolombelon’ireo zavatra ireo hoe: «Eny, ho avy faingana Aho!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '! Avia, ry Jesoa Tompo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1Kôr 16.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Homba anareo rehetra anie ny fahasoavan’i Jesoa Tompo!
