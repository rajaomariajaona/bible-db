document_id: REV.22,396
type_code: plt
verses:
  '1':
  - type: text
    content: Dia nasehon’ny anjely tamiko ity onin-dranovelona manganohano toy ny vato kristaly, nivoaka avy teo amin’ilay sezafiandrianana ipetrahan’Andriamanitra sady ipetrahan’ny Zanakondry
  - type: note
    content: Ampit Ezek 47.1; Za 14.8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia hoy koa ny anjely tamiko:'
  - type: text
    content: '–Aza afenina ny teny faminaniana raketin’ity boky ity, satria antomotra ny fotoanandro hahatanterahan’ireo zavatra ireo. '
  '11':
  - type: text
    content: 'Izay manao ny tsy rariny, aoka mbola hanao ny tsy rariny hatrany; ary izay ratsy toetra, aoka hiharatsy toetra hatrany. Izay tia rariny, aoka hanao ny rariny hatrany; ary izay '
  - type: text
    content: masina
  - type: text
    content: ', aoka hihamasina hatrany'
  - type: note
    content: Ampit Dan 12.10.
  - type: text
    content: '!'
  '12':
  - type: text
    content: '«Indro avy faingana Aho, hoy i Jesoa; ary miaraka amiko ny valin’asa, mba hamaliako ny olona rehetra araka izay nataony avy. '
  '13':
  - type: text
    content: Izaho no Alfa sy Ômega, ny voalohany sy ny farany, ny fiandohana sy ny fiafarana
  - type: note
    content: 'And 12-13: ampit Is 40.10; 62.11; Sal 28.4; Jer 17.10; Apôk 1.8 sy nta.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Sambatra izay manasa ny akanjony, mba ho afa-mihinana amin’ny voan’ilay hazo manome fiainana
  - type: note
    content: Ampit Gen 2.9; 3.22.
  - type: text
    content: ' sy ho afa-miditra amin’ny vavahady mankao amin’ilay tanàna. '
  '15':
  - type: text
    content: 'Fa any ivelany kosa izay manana toe-panahy maharikoriko: dia ny mpanao ody ratsy, ny mpijangajanga, ny mpamono olona, ny mpanompo sampy ary izay rehetra tia lainga sy mpandainga.'
  '16':
  - type: text
    content: «Izaho Jesoa dia efa naniraka ny anjeliko hijoro vavolombelona aminareo ka hanambara izany zavatra izany eo anivon’ireo Fiangonana. Izaho no solofo sy taranak’i Davida, ary kintana fitarikandro mamirapiratra
  - type: note
    content: 'Ampit Is 11.1, 10; Apôk 2.28; 5.5. –eo anivon’ireo Fiangonana: dkt hafa momba ireo Fiangonana.'
  - type: text
    content: .»
  '17':
  - type: text
    content: 'Ary hoy ny Fanahy Masina sy ny ampakarina hoe: «Avia!»'
  - type: text
    content: 'Izay mahare, aoka hanao hoe: «Avia!»'
  - type: text
    content: Izay mangetaheta, aoka ho avy; izay maniry ranovelona, aoka hanovo maimaimpoana amin’izany
  - type: note
    content: Ampit Is 55.1.
  - type: text
    content: '!'
  - type: heading
    content: Famaranana
  '18':
  - type: text
    content: 'Izaho Jôhany dia manao fampitandremana amin’izay rehetra mandre ny teny faminaniana raketin’ity boky ity: raha misy manampy ireo, dia hampiharan’Andriamanitra ny loza voasoratra ato anatin’ity boky ity; '
  '19':
  - type: text
    content: ary raha misy manaisotra teny amin’ity boky faminaniana ity
  - type: note
    content: 'And 18-19: ampit Deot 4.2; 13.1.'
  - type: text
    content: ', dia hoesorin’Andriamanitra ny anjarany amin’ny hazo manome fiainana sy ny anjarany ao amin’ny tanàna '
  - type: text
    content: masina
  - type: text
    content: ' araka izay voasoratra ato anatin’ity boky ity.'
  '2':
  - type: text
    content: Teo anelanelan’ny lalamben’ny tanàna etsy an-kilany ary ny ony etsy an-daniny, dia nisy hazo anankiray manome fiainana
  - type: note
    content: 'Teo anelanelan’ny... hazo anankiray manome fiainana: tsy dia mazava loatra etoana ny rijan-teny grika fototra. Ampit Gen 2.9-10; Ezek 47.12.'
  - type: text
    content: ': io hazo io dia mamoa voa in-12 isan-taona, izany hoe indray mandeha isam-bolana; ary ny raviny dia hanasitranana ny firenena. '
  '20':
  - type: text
    content: 'Hoy Ilay mijoro vavolombelon’ireo zavatra ireo hoe: «Eny, ho avy faingana Aho!»'
  - type: text
    content: Amen
  - type: text
    content: '! Avia, ry Jesoa Tompo'
  - type: note
    content: Ampit 1Kôr 16.22 sy nta.
  - type: text
    content: '!'
  '21':
  - type: text
    content: Homba anareo rehetra anie ny fahasoavan’i Jesoa Tompo!
  '3':
  - type: text
    content: Ka tsy hisy zavatra hiharan’ny loza nambaran’Andriamanitra intsony
  - type: note
    content: Ampit Za 14.11; Gen 3.17.
  - type: text
    content: .
  - type: text
    content: 'Ilay sezafiandrianana, ipetrahan’Andriamanitra sady ipetrahan’ny Zanakondry, no ho ao an-tanàna; ka dia hanompo an’Andriamanitra ireo mpanompony '
  '4':
  - type: text
    content: 'sy hahita ny tavany ary hanana ny anaran’Andriamanitra voasoratra eo amin’ny handriny. '
  '5':
  - type: text
    content: Tsy hisy alina intsony ary tsy mba mila fahazavàn’ny jiro na fahazavàn’ny masoandro ireo mpanompon’Andriamanitra, satria hohazavain’ny Tompo Andriamanitra izy rehetra sady hanjaka mandrakizay mandrakizay
  - type: note
    content: Ampit Is 60.19; Dan 7.18.
  - type: text
    content: .
  - type: heading
    content: Ny fiavian’i Jesoa
  '6':
  - type: text
    content: 'Dia hoy ilay '
  - type: text
    content: anjely
  - type: text
    content: ' tamiko:'
  - type: text
    content: –Azo antoka sy marim-pototra ireo teny ireo! Ary ny Tompo Andriamanitra, Izay manentana ireo mpaminany, no efa naniraka ny anjeliny haneho amin’ireo mpanompony izay zavatra tsy maintsy ho tonga faingana.
  '7':
  - type: text
    content: «Indro avy faingana Aho, hoy i Jesoa. Sambatra izay mitandrina ny teny faminaniana raketin’ity boky ity!»
  '8':
  - type: text
    content: 'Izaho Jôhany no nahare sady nahita ireo zavatra ireo. Ary rehefa nahare sady nahita aho, dia niankohoka teo an-tongotr’ilay anjely mba hitsaoka azy, '
  '9':
  - type: text
    content: 'saingy nilazany hoe:'
  - type: text
    content: –Tandremo, aza manao izany
  - type: note
    content: 'And 8-9: ampit 19.10.'
  - type: text
    content: '! Fa mpanompo miaraka aminao aho sady miaraka amin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' namanao sy izay mitandrina ny teny raketin’ity boky ity. Andriamanitra no tsaohy!'
