document_id: JER.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny siny vaky
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no voalazan’ny TOMPO tamin’i Jeremià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandehana mividy siny tanimanga iray any amin’ny mpanefy tanimanga, dia makà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' avy amin’ny vahoaka ary loholona avy amin’ny mpisorona hiaraka aminao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Avy eo, ry Jeremià, dia poteho eo imason’ireo olona miaraka aminao ny siny, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka mitenena aminy hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao: Hopotipotehiko ity vahoaka sy tanàna ity tahaka ny anapotipotehina ny siny tanimanga, ka tsy hisy fanafana intsony.›'
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ary ny amin’i Tôfeta, dia any no handevenana fa tsy misy toerana handevenana intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 7.32 sy nta; ampit and 13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ho tahaka izay nanjo an’i Tôfeta no hataoko amin’ity tanàna ity sy ny mponina ao aminy, hoy ny teny hentitry ny TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny trano eto Jerosalema sy ny tranon’ny mpanjakan’i Joda dia ho tonga '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' tahaka ny toerana ao Tôfeta; eny, izany no hanjo ireo trano rehetra izay nandoroana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' mifangaro teo an-tampony ho an’ireo andian-kintana eny an-danitra sady nandrarahana fanatitra divay ho an’ny andriamani-kafa.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tafaverina avy any Tôfeta izay nanirahan’ny TOMPO azy hampita hafatra i Jeremià, dia nitsangana teo an-kianjan’ny tranon’ny TOMPO, ary nanambara tamin’ny vahoaka rehetra teo hoe:'
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '«Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro hataoko tonga amin’ity tanàna ity sy amin’ireo tanàna madinika manodidina azy ny loza rehetra izay nambarako hamelezana azy, satria nanamafy hatoka izy, ka tsy nihaino ny teniko.› »'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Avy eo dia mivoaha mankany amin’ny lohasahan’i Bena-Hinôma, izay eo anoloan’ny vavahadin’ny vakim-bilany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Vavahadin’ny vakim-bilany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ao atsimon’i Jerosalema. –
      - type: usfm
        marker: bd
        children:
        - type: text
          text: lohasahan’i Hinôma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 7.31 sy nta ary koa ny naoty momba ny 7.31.'
      marker-yv: yv-n
    - type: text
      text: ' ary any no torio ny hafatra hambarako anao, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ka milazà hoe: «Mihainoa ny tenin’ny TOMPO ianareo, ry mpanjakan’i Joda sy ry mponin’i Jerosalema. Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Indro hahatonga loza amin’ity toerana ity Aho, ka hampangintsingintsina ny sofin’izay rehetra mandre izany. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny olon’i Joda efa nandao Ahy ary nahatonga ity toerana ity ho very hasina, fa teo no nanolorany sorona ho an’ireo andriamani-kafa izay tsy nikarakara azy na ny razany na ny mpanjakan’i Joda; sady nataony feno ran’ankizy tsy manan-tsiny ity toerana ity. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nanorina toeram-panasinana ho an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' izy mba handoroany ny zanany ho sorona dorana ho an’i Bahala eo. Nefa zavatra tsy nandidiako azy izany sady tsy noresahiko taminy na mba tonga tao am-poko velively'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 5-7: jereo 7.31-33 sy ny naoty momba ny 7.31.'
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Noho izany, hoy ny teny hentitry ny TOMPO, dia ho avy ny andro izay tsy hiantsoana ity toerana ity intsony hoe Tôfeta na lohasahan’i Bena-Hinôma, fa hatao hoe lohasaha Famonoana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eto amin’ity toerana ity no hanafoanako ny pôlitikan’i Joda sy i Jerosalema ka hataoko lavon-tsabatra eo anatrehan’ireo fahavalony izay mitady hahafaty azy ny mponina ao aminy, ary homeko ho sakafon’ny voromahery sy ny bibidia ny fatiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataoko lao sady ho fandatsa ity tanàna ity; ka ny olona rehetra mandalo azy dia ho gaga sy hanao fandatsana eo am-pahitana ny faharavana rehetra nanjo azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 18.16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny fahirano sy ny fampahoriana hafitsok’ireo fahavalony izay hitady hahafaty azy, dia hasaiko mihinana ny nofon’ny zanany lahy sy ny nofon’ny zanany vavy ny olona; ary hifampihinana koa izy.
