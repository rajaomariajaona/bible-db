document_id: JER.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny siny vaky
  - type: text
    content: 'Izao no voalazan’ny TOMPO tamin’i Jeremià:'
  - type: text
    content: '–Mandehana mividy siny tanimanga iray any amin’ny mpanefy tanimanga, dia makà '
  - type: text
    content: loholona
  - type: text
    content: ' avy amin’ny vahoaka ary loholona avy amin’ny mpisorona hiaraka aminao. '
  '10':
  - type: text
    content: '«Avy eo, ry Jeremià, dia poteho eo imason’ireo olona miaraka aminao ny siny, '
  '11':
  - type: text
    content: 'ka mitenena aminy hoe: ‹Izao no lazain’ny TOMPOn’izao rehetra izao: Hopotipotehiko ity vahoaka sy tanàna ity tahaka ny anapotipotehina ny siny tanimanga, ka tsy hisy fanafana intsony.›'
  - type: text
    content: «Ary ny amin’i Tôfeta, dia any no handevenana fa tsy misy toerana handevenana intsony
  - type: note
    content: Jereo 7.32 sy nta; ampit and 13.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Koa ho tahaka izay nanjo an’i Tôfeta no hataoko amin’ity tanàna ity sy ny mponina ao aminy, hoy ny teny hentitry ny TOMPO. '
  '13':
  - type: text
    content: 'Ny trano eto Jerosalema sy ny tranon’ny mpanjakan’i Joda dia ho tonga '
  - type: text
    content: maloto
  - type: text
    content: ' tahaka ny toerana ao Tôfeta; eny, izany no hanjo ireo trano rehetra izay nandoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' mifangaro teo an-tampony ho an’ireo andian-kintana eny an-danitra sady nandrarahana fanatitra divay ho an’ny andriamani-kafa.»'
  '14':
  - type: text
    content: 'Nony tafaverina avy any Tôfeta izay nanirahan’ny TOMPO azy hampita hafatra i Jeremià, dia nitsangana teo an-kianjan’ny tranon’ny TOMPO, ary nanambara tamin’ny vahoaka rehetra teo hoe:'
  '15':
  - type: text
    content: '«Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: «Indro hataoko tonga amin’ity tanàna ity sy amin’ireo tanàna madinika manodidina azy ny loza rehetra izay nambarako hamelezana azy, satria nanamafy hatoka izy, ka tsy nihaino ny teniko.› »'
  '2':
  - type: text
    content: Avy eo dia mivoaha mankany amin’ny lohasahan’i Bena-Hinôma, izay eo anoloan’ny vavahadin’ny vakim-bilany
  - type: note
    content: 'Vavahadin’ny vakim-bilany: ao atsimon’i Jerosalema. –lohasahan’i Hinôma: jereo 7.31 sy nta ary koa ny naoty momba ny 7.31.'
  - type: text
    content: ' ary any no torio ny hafatra hambarako anao, '
  '3':
  - type: text
    content: 'ka milazà hoe: «Mihainoa ny tenin’ny TOMPO ianareo, ry mpanjakan’i Joda sy ry mponin’i Jerosalema. Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Indro hahatonga loza amin’ity toerana ity Aho, ka hampangintsingintsina ny sofin’izay rehetra mandre izany. '
  '4':
  - type: text
    content: 'Fa ny olon’i Joda efa nandao Ahy ary nahatonga ity toerana ity ho very hasina, fa teo no nanolorany sorona ho an’ireo andriamani-kafa izay tsy nikarakara azy na ny razany na ny mpanjakan’i Joda; sady nataony feno ran’ankizy tsy manan-tsiny ity toerana ity. '
  '5':
  - type: text
    content: 'Nanorina toeram-panasinana ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' izy mba handoroany ny zanany ho sorona dorana ho an’i Bahala eo. Nefa zavatra tsy nandidiako azy izany sady tsy noresahiko taminy na mba tonga tao am-poko velively'
  - type: note
    content: 'And 5-7: jereo 7.31-33 sy ny naoty momba ny 7.31.'
  - type: text
    content: .
  '6':
  - type: text
    content: '«Noho izany, hoy ny teny hentitry ny TOMPO, dia ho avy ny andro izay tsy hiantsoana ity toerana ity intsony hoe Tôfeta na lohasahan’i Bena-Hinôma, fa hatao hoe lohasaha Famonoana. '
  '7':
  - type: text
    content: 'Eto amin’ity toerana ity no hanafoanako ny pôlitikan’i Joda sy i Jerosalema ka hataoko lavon-tsabatra eo anatrehan’ireo fahavalony izay mitady hahafaty azy ny mponina ao aminy, ary homeko ho sakafon’ny voromahery sy ny bibidia ny fatiny. '
  '8':
  - type: text
    content: Hataoko lao sady ho fandatsa ity tanàna ity; ka ny olona rehetra mandalo azy dia ho gaga sy hanao fandatsana eo am-pahitana ny faharavana rehetra nanjo azy
  - type: note
    content: Jereo 18.16.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Noho ny fahirano sy ny fampahoriana hafitsok’ireo fahavalony izay hitady hahafaty azy, dia hasaiko mihinana ny nofon’ny zanany lahy sy ny nofon’ny zanany vavy ny olona; ary hifampihinana koa izy.
