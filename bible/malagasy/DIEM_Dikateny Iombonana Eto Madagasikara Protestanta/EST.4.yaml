document_id: EST.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Angatahin’i Môrdôkay i Estera mba hanao fanelanelanana ho an’ny Jiosy
  - type: text
    content: 'Nony fantatr’i Môrdôkay ny zava-drehetra nitranga, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' izy ka nitafy gony sady nihosin-davenona ary nankeo afovoan’ny tanàna ka nitaraina sy nidradradradra mafy. '
  '10':
  - type: text
    content: 'fa mbola nirahin’ity mpanjakavavy indray izy hilaza amin’i Môrdôkay hoe: '
  '11':
  - type: text
    content: '«Ny olona rehetra, hatramin’ny mpanompon’ny amperôra sy sarambabem-bahoaka any amin’ny faritany aza, dia samy mahalala fa na iza na iza mankeo amin’ny amperôra ho eo an-kianja anatin’ny lapa, na lehilahy na vehivavy, nefa tsy nantsoina, dia lalàna tokana manameloka ho faty no mihatra aminy; izay hotondroin’ny amperôra amin’ny tehim-bolamena ihany no ho velona. Izaho kosa efa telopolo andro izay no tsy nantsoina hankao amin’ny mpanjaka.» '
  '12':
  - type: text
    content: 'Rehefa nilazana ny tenin’i Estera i Môrdôkay, '
  '13':
  - type: text
    content: 'dia izao no nasainy navaly azy: «Aza mihevitra anakampo fa ho afaka irery amin’ny Jiosy rehetra ianao satria monina ao an-dapa. '
  '14':
  - type: text
    content: Raha hangina mihitsy ianao amin’ity toe-javatra ity, dia hisy fanampiana sy fanafahana hipoitra avy any an-kafa
  - type: note
    content: 'avy any an-kafa: firotsahan’Andriamanitra an-tsehatra no fonosin’izany fomba fiteny izany.'
  - type: text
    content: ' ho an’ny Jiosy; fa ianao no haringana ary ho lany tamingana ny fianakavianao. Ary iza no mahalala fa angamba ho amin’ity toe-javatra ity mihitsy no nanandratana anao ho mpanjakavavy?» '
  '15':
  - type: text
    content: 'Izao kosa no nasain’i Estera navaly an’i Môrdôkay: '
  '16':
  - type: text
    content: '«Ndeha vorio àry ny Jiosy rehetra eto Sosany; dia manaova fifadian-kanina noho ny amiko ianareo, ka aza mihinana na misotro mandritra ny telo andro sy telo alina. Hifady hanina toy izany koa ny tenako sy ireo mpanompovaviko; avy eo dia hankao amin’ny amperôra aho, na dia tsy ara-dalàna aza izany. Koa raha tsy maintsy ho faty aho, dia ho faty!» '
  '17':
  - type: text
    content: Dia lasa i Môrdôkay nanao araka izay rehetra nandidian’i Estera azy.
  '2':
  - type: text
    content: 'Tonga hatrany anoloan’ny lapa aza izy, saingy nijanona teo satria tsy azon’ny olona mitafy gony atao ny miditra ny lapa. '
  '3':
  - type: text
    content: 'Tany amin’ny faritany rehetra nahatongavan’ny baiko aman-didin’ny amperôra, dia nalahelo mafy koa ny Jiosy ka '
  - type: text
    content: nifady hanina
  - type: text
    content: ' sy nitomany ary nidradradradra, sady maro no nitafy gony sy nandry teo ambony lavenona'
  - type: note
    content: 'sy nandry teo ambony lavenona: jereo ny naoty tandrifin’ny Jôn 3.6.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Tonga nilaza izany tamin’i Estera ireo mpanompovaviny. Dia nalahelo tokoa ity mpanjakavavy ka nampanatitra akanjo hitafian’i Môrdôkay mba hanesorany ny gony teny aminy; kanefa tsy nety nandray izy. '
  '5':
  - type: text
    content: 'Ary nantsoin’i Estera i Hatàka, anisan’ireo tandapa tinendrin’ny amperôra hanompo azy; io Hatàka io no nalefan’ny mpanjakavavy ho any amin’i Môrdôkay mba hanontany azy ny zava-nitranga sy izay nahatonga azy hitafy gony. '
  '6':
  - type: text
    content: 'Dia lasa i Hatàka nankany amin’i Môrdôkay izay teo an-kianjan’ny tanàna anoloan’ny lapan’ny amperôra; '
  '7':
  - type: text
    content: 'ary nambaran’i Môrdôkay taminy avokoa ny zava-drehetra nanjo azy sy ny tontalim-bola nokasain’i Hamàna haloa ho ao an-trano firaketan’ny amperôra noho ny handringanana ny Jiosy. '
  '8':
  - type: text
    content: 'Nomeny an’i Hatàka koa ny kopian’ny didy navoaka tao Sosany handringanana ny Jiosy; nasainy hampiseho izany amin’i Estera izy sy hampahafantatra azy ny toe-javatra ary hiangavy azy hankao amin’ny amperôra mba hifona aminy sy hangataka famindrampo ho an’ny fireneny. '
  '9':
  - type: text
    content: 'Dia lasa i Hatàka nanambara ny tenin’i Môrdôkay tamin’i Estera; '
