document_id: PSA.82,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra no miantoka ny rariny ho an’ny rehetra
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: Mijoro eo anivon’ny fivoriam-be Andriamanitra;
  - type: text
    content: eo afovoan’ireo andriamanitra Izy
  - type: text
    content: 'no mitsara ka miteny hoe:'
  '2':
  - type: text
    content: «Mandra-pahoviana no hanaovanareo fitsarà-mitanila
  - type: text
    content: ka hanafahanareo foana ny olon-dratsy?
  - type: text
    content: Fiatoana
  '3':
  - type: text
    content: Omeo hitsiny ny mahantra sy ny kamboty,
  - type: text
    content: omeo rariny ny ory sy ny fadiranovana;
  '4':
  - type: text
    content: vonjeo ny mahantra sy ny malahelo,
  - type: text
    content: ka afaho tsy ho voatanan’ny olon-dratsy.
  '5':
  - type: text
    content: Tsy mahalala na mahazo an-tsaina velively ianareo;
  - type: text
    content: ao anatin’ny haizim-paharatsiana no iraparapanareo,
  - type: text
    content: ka voahozongozona avokoa ny fanorenan’ny tany.
  '6':
  - type: text
    content: Andriamanitra ianareo
  - type: note
    content: Izany fanambaràna izany dia tsiahivin’i Jesoa ao amin’ny Jôh 10.34.
  - type: text
    content: ', hoy Aho fahiny;'
  - type: text
    content: ankohonan’ilay Avo Indrindra ianareo rehetra.
  '7':
  - type: text
    content: Kanefa ho faty toy ny olombelona ihany ianareo,
  - type: text
    content: samy hiongana tahaka ireny manampahefana ireny.»
  '8':
  - type: text
    content: Andriamanitra ô, mijoroa hitsara ny tany
  - type: text
    content: fa Ianao no tompon’ny firenen-drehetra.
