document_id: PSA.82,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Andriamanitra no miantoka ny rariny ho an’ny rehetra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijoro eo anivon’ny fivoriam-be Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo afovoan’ireo andriamanitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no mitsara ka miteny hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mandra-pahoviana no hanaovanareo fitsarà-mitanila
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanafahanareo foana ny olon-dratsy?
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo hitsiny ny mahantra sy ny kamboty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: omeo rariny ny ory sy ny fadiranovana;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vonjeo ny mahantra sy ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho tsy ho voatanan’ny olon-dratsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala na mahazo an-tsaina velively ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao anatin’ny haizim-paharatsiana no iraparapanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voahozongozona avokoa ny fanorenan’ny tany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '82.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany fanambaràna izany dia tsiahivin’i Jesoa ao amin’ny Jôh 10.34.
      marker-yv: yv-n
    - type: text
      text: ', hoy Aho fahiny;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ankohonan’ilay Avo Indrindra ianareo rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ho faty toy ny olombelona ihany ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy hiongana tahaka ireny manampahefana ireny.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, mijoroa hitsara ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao no tompon’ny firenen-drehetra.
