  - type: usfm
    marker: it
    children:
    - type: text
      text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijoro eo anivon’ny fivoriam-be Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo afovoan’ireo andriamanitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no mitsara ka miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Mandra-pahoviana no hanaovanareo fitsarà-mitanila
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanafahanareo foana ny olon-dratsy?
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Omeo hitsiny ny mahantra sy ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: omeo rariny ny ory sy ny fadiranovana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: vonjeo ny mahantra sy ny malahelo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka afaho tsy ho voatanan’ny olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mahalala na mahazo an-tsaina velively ianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny haizim-paharatsiana no iraparapanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka voahozongozona avokoa ny fanorenan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra ianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany fanambaràna izany dia tsiahivin’i Jesoa ao amin’ny Jôh 10.34.
    marker-yv: yv-n
  - type: text
    text: ', hoy Aho fahiny;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ankohonan’ilay Avo Indrindra ianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa ho faty toy ny olombelona ihany ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy hiongana tahaka ireny manampahefana ireny.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andriamanitra ô, mijoroa hitsara ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa Ianao no tompon’ny firenen-drehetra.
