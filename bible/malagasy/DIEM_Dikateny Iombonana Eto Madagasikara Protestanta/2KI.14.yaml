document_id: 2KI.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Amatsià mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 25.1-4, 11-12, 17-28; 26.1-2)
  - type: text
    content: 'Tamin’ny taona faharoa nanjakan’i Jôasy zanakalahin’i Jôahaza sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Amatsià zanakalahin’i Jôasy; '
  '10':
  - type: text
    content: 'Ary hoy ihany i Jôasy: «Satria efa resinao ny Edômita, ka dia nirehareha ny fonao; aoka hahafa-po anao izany voninahitra izany ka mitoera ao an-tranonao ihany! Fa nahoana ianao no mitady loza izay hahavoa ny tenanao sy ny tafik’i Joda manontolo?»'
  '11':
  - type: text
    content: Kanefa tsy nanaiky i Amatsià. Koa dia niakatra hiady i Jôasy mpanjakan’i Israely avaratra; ka ny tafiny sy ny an’i Amatsià mpanjakan’i Joda dia nifanandrina tao Bety-Semesy
  - type: note
    content: 'Bety-Semesy: toerana sahabo ho 25 km andrefan’i Jerosalema.'
  - type: text
    content: ' tanànan’i Joda. '
  '12':
  - type: text
    content: 'Resin’ny tafik’i Israely ny tafik’i Joda; ka samy nandositra ho any an-tranony avy ny miaramila jodeanina. '
  '13':
  - type: text
    content: Tao Bety-Semesy no voasambotr’i Jôasy mpanjakan’i Israely i Amatsià mpanjakan’i Joda sy zanakalahin’i Jôasy ary zafikelin’i Ahazià; ary dia nankany Jerosalema i Jôasy ka nandravany tokony ho roanjato metatra ny mandan’ny tanàna teo anelanelan’ny vavahadin’i Efraîma sy ny vavahadin’ny Zoro
  - type: note
    content: Ny ampahan’ny manda rava dia mety ho tao amin’ny tapany avaratra na avaratra-andrefan’ny tanàna.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Dia nalainy avokoa ny volamena sy ny volafotsy ary ny zava-tsarobidy izay hita tao an-tranon’ny TOMPO sy tao amin’ny raki-tsoan’ny lapan’ny mpanjaka; ary nisy ihany koa olona nalainy ho takalon’aina. Izay izy vao niverina nankany Samaria.
  '15':
  - type: text
    content: 'Ny sisa tamin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony ary ny ady nifanaovany tamin’i Amatsià mpanjakan’i Joda, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Jôasy, dia nalevina tao amin’ny fasan’ny mpanjakan’i Israely tao Samaria; ary i Jerôbohama zanany lahy no nanjaka nandimby azy
  - type: note
    content: Ny and 15-16 dia mamerina saika ara-bakiteny ny 13.12-13, izay ahitana ny filazàn-javatra amin’ny toerana sahaza kokoa.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Taorian’ny nahafatesan’i Jôasy mpanjakan’i Israely, dia mbola naharitra 15 taona i Amatsià mpanjakan’i Joda. '
  '18':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Amatsià dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  '19':
  - type: text
    content: Ary tao Jerosalema dia nisy olona nikomy tamin’i Amatsià, ka nahatonga azy nandositra tany Lakisy
  - type: note
    content: 'Lakisy: toerana sahabo ho 45 km atsimo andrefan’i Jerosalema (Tell-ed-Duweir ankehitriny).'
  - type: text
    content: '; fa nampanaraka azy anefa ireto mpikomy ka nampamono azy ho faty tany an-toerana. '
  '2':
  - type: text
    content: 'feno 25 taona izy tamin’izay, ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jôhadàna, izay avy ao Jerosalema ihany. '
  '20':
  - type: text
    content: Dia nampodina an-kalesy tarihin-tsoavaly tany Jerosalema ny fatiny ka nalevina tao amin’ny fasam-pianakaviana tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: '. '
  '21':
  - type: text
    content: Vao 16 taona i Hazarià
  - type: note
    content: 'Hazarià: io mpanjaka io dia antsoina hoe Hozià ao amin’ny 2 Tan sy ao amin’ny bokin’ny mpaminany.'
  - type: text
    content: ' no nalain’ny vahoaka Jodeanina rehetra ka notendreny ho mpanjaka handimby an’i Amatsià rainy. '
  '22':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany kosa ity rainy, dia i Hazarià no namerina ny seranana Elata
  - type: note
    content: Elata dia isan’ny faritany edômita izay afaka tamin’ny fifehezan’i Joda (jereo 8.20-22).
  - type: text
    content: ' ho an’ny fanjakan’i Joda sy nanamboatra azy indray.'
  - type: heading
    content: I Jerôbohama II, mpanjakan’i Israely
  '23':
  - type: text
    content: 'Tamin’ny taona faha-15 nanjakan’i Amatsià, zanakalahin’i Jôasy sady mpanjakan’i Joda, no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' tao Samaria i Jerôbohama zanakalahin’i Jôasy, ary naharitra 41 taona no nanjakany tao. '
  '24':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany ny fahotana rehetra izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita. '
  '25':
  - type: text
    content: 'Izy no namerina indray ny tanin’i Israely hatreo Lebô-Hamata any avaratra ka hatrany amin’ny Ranomasina Maty any atsimo araka ny nambaran’ny TOMPO Andriamanitr’i Israely tamin’ny alalan’i Jônà '
  - type: text
    content: mpaminany
  - type: text
    content: ' zanakalahin’i Amitahy avy any Gata-Hefera'
  - type: note
    content: 'Lebô-Hamata: jereo Nom 13.21 sy nta. –Ranomasina Maty: antsoina eto amin’ny teny hebreo hoe Ranomasin’i Harabà (ampit 14.7 sy nta). –Jônà: tsy nitahiry io hafatr’i Jônà mpaminany io ny Testamenta Taloha.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: Fa hitan’ny TOMPO ny havesatry
  - type: note
    content: 'Havesatra: araka ny dkt tranainy; ny RM dia manao hoe miodina.'
  - type: text
    content: 'ny fahorian’i Israely satria tsy nisy olona afa-namonjy azy na andevo izany na olona afaka. '
  '27':
  - type: text
    content: Tsy mbola nilaza ny hamono ny anaran’i Israely tsy ho eo ambanin’ny lanitra anefa ny TOMPO; koa dia tamin’ny alalan’i Jerôbohama zanakalahin’i Jôasy no namonjeny azy.
  '28':
  - type: text
    content: 'Ny sisa tamin’ny tantaran’i Jerôbohama ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony tamin’ny ady namerenany indray tamin’i Israely ny tanànan’i Damasy sy i Hamata izay an’i Joda fahiny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Jerôbohama, dia nalevina tao amin’ny fasan’ny mpanjakan’i Israely tao Samaria
  - type: note
    content: 'nalevina... tao Samaria: araka ny dkt grika tranainy; tsy hita kosa ireo teny ireo amin’ny RM.'
  - type: text
    content: ; ary i Zakarià zanany lahy no nanjaka nandimby azy.
  '3':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO izy, nefa tsy dia tahaka an’i Davida razambeny, fa nanahaka an’i Jôasy rainy. '
  '4':
  - type: text
    content: Tsy mba nofoanany ireo toeram-panasinana ka mbola nanao sorona sy nandoro azy hanetona teny ihany ny olona.
  '5':
  - type: text
    content: Rehefa nohamafisin’i Amatsià ny fahefàm-panjakany, dia nasainy novonoina ho faty ireoo manamboninahitra izay nahafaty an’i Jôasy mpanjaka rainy
  - type: note
    content: Jereo 12.21-22.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Kanefa ny zanakalahin’ireto mpamono an’i Jôasy dia tsy mba novonoin’i Amatsià ho faty, fa nataony araka izay voasoratra ao amin’ny bokin’ny lalànan’i Mosesy; ao manko no nandidian’ny TOMPO hoe: «Ny ray aman-dreny tsy hatao maty noho ny fahotan-janany, na ny zanaka noho ny fahotan’ny ray aman-dreny, fa ny olona dia hatao maty noho ny fahotan’ny tenany ihany'
  - type: note
    content: Tonon-tsiahin’ny Deot 24.16.
  - type: text
    content: '». '
  '7':
  - type: text
    content: I Amatsià koa no nahafaty miaramila edômita antokony folo tao amin’ny Lohasahan-Tsira tamin’ny ady nandrombahany ny tanànan’i Sela, izay lasa hoe Jôkteela, anarany mandraka ankehitriny
  - type: note
    content: 'Ny Lohasahan-Tsira izay mampitohy ny Ranomasina Maty amin’ny helodranomasin’i Akabà, dia antsoina hoe Harabà ankehitriny. –Sela: tanàna edômita ao atsimon’ny Ranomasina Maty. Misy mampitovy azy amin’i Petrà.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Tamin’izay i Amatsià dia nandefa iraka tany amin’i Jôasy zanakalahin’i Jôahaza sady zafikelin’i Jehò mba hilaza aminy hoe: «Avia hifanandrina an’ady isika» '
  '9':
  - type: text
    content: 'Fa i Jôasy mpanjakan’i Israely dia nandefa iraka tany amin’i Amatsià mpanjakan’i Joda hamaly azy hoe: «Ny kirihitra tsilo izay tany Libano, hono, dia nandefa iraka tany amin’ny sedera izay tany Libano mba hiangavy azy hoe: ‹Omeo ho vadin’ny zanako lahy ny zanakao vavy›; kanjo nisy bibidian’i Libano namaky teo ka nanosihosy ny kirihitra tsilo'
  - type: note
    content: Angano madinika mampahatsiahy ny ao amin’ny Mpits 9.8-15, nefa ny fanazavana azy an-tsipiriany dia sarotra. Araka ny and 10, dia toa tian’i Jôasy ho tsapan’i Amatsià fa hahatonga faharesena sy fahapotehana tampoka ho azy ny hambom-pony.
  - type: text
    content: '. '
