document_id: 2KI.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Amatsià mpanjakan’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 25.1-4, 11-12, 17-28; 26.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faharoa nanjakan’i Jôasy zanakalahin’i Jôahaza sady mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' no tonga mpanjakan’i Joda i Amatsià zanakalahin’i Jôasy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'feno 25 taona izy tamin’izay, ary naharitra 29 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jôhadàna, izay avy ao Jerosalema ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanao izay mahitsy eo imason’ny TOMPO izy, nefa tsy dia tahaka an’i Davida razambeny, fa nanahaka an’i Jôasy rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mba nofoanany ireo toeram-panasinana ka mbola nanao sorona sy nandoro azy hanetona teny ihany ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa nohamafisin’i Amatsià ny fahefàm-panjakany, dia nasainy novonoina ho faty ireoo manamboninahitra izay nahafaty an’i Jôasy mpanjaka rainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 12.21-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa ny zanakalahin’ireto mpamono an’i Jôasy dia tsy mba novonoin’i Amatsià ho faty, fa nataony araka izay voasoratra ao amin’ny bokin’ny lalànan’i Mosesy; ao manko no nandidian’ny TOMPO hoe: «Ny ray aman-dreny tsy hatao maty noho ny fahotan-janany, na ny zanaka noho ny fahotan’ny ray aman-dreny, fa ny olona dia hatao maty noho ny fahotan’ny tenany ihany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tonon-tsiahin’ny Deot 24.16.
    marker-yv: yv-n
  - type: text
    text: '». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Amatsià koa no nahafaty miaramila edômita antokony folo tao amin’ny Lohasahan-Tsira tamin’ny ady nandrombahany ny tanànan’i Sela, izay lasa hoe Jôkteela, anarany mandraka ankehitriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Lohasahan-Tsira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izay mampitohy ny Ranomasina Maty amin’ny helodranomasin’i Akabà, dia antsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Harabà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ankehitriny. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Sela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna edômita ao atsimon’ny Ranomasina Maty. Misy mampitovy azy amin’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Petrà.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin’izay i Amatsià dia nandefa iraka tany amin’i Jôasy zanakalahin’i Jôahaza sady zafikelin’i Jehò mba hilaza aminy hoe: «Avia hifanandrina an’ady isika» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa i Jôasy mpanjakan’i Israely dia nandefa iraka tany amin’i Amatsià mpanjakan’i Joda hamaly azy hoe: «Ny kirihitra tsilo izay tany Libano, hono, dia nandefa iraka tany amin’ny sedera izay tany Libano mba hiangavy azy hoe: ‹Omeo ho vadin’ny zanako lahy ny zanakao vavy›; kanjo nisy bibidian’i Libano namaky teo ka nanosihosy ny kirihitra tsilo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Angano madinika mampahatsiahy ny ao amin’ny Mpits 9.8-15, nefa ny fanazavana azy an-tsipiriany dia sarotra. Araka ny and 10, dia toa tian’i Jôasy ho tsapan’i Amatsià fa hahatonga faharesena sy fahapotehana tampoka ho azy ny hambom-pony.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ihany i Jôasy: «Satria efa resinao ny Edômita, ka dia nirehareha ny fonao; aoka hahafa-po anao izany voninahitra izany ka mitoera ao an-tranonao ihany! Fa nahoana ianao no mitady loza izay hahavoa ny tenanao sy ny tafik’i Joda manontolo?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanefa tsy nanaiky i Amatsià. Koa dia niakatra hiady i Jôasy mpanjakan’i Israely avaratra; ka ny tafiny sy ny an’i Amatsià mpanjakan’i Joda dia nifanandrina tao Bety-Semesy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bety-Semesy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana sahabo ho 25 km andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' tanànan’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Resin’ny tafik’i Israely ny tafik’i Joda; ka samy nandositra ho any an-tranony avy ny miaramila jodeanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tao Bety-Semesy no voasambotr’i Jôasy mpanjakan’i Israely i Amatsià mpanjakan’i Joda sy zanakalahin’i Jôasy ary zafikelin’i Ahazià; ary dia nankany Jerosalema i Jôasy ka nandravany tokony ho roanjato metatra ny mandan’ny tanàna teo anelanelan’ny vavahadin’i Efraîma sy ny vavahadin’ny Zoro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny ampahan’ny manda rava dia mety ho tao amin’ny tapany avaratra na avaratra-andrefan’ny tanàna.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nalainy avokoa ny volamena sy ny volafotsy ary ny zava-tsarobidy izay hita tao an-tranon’ny TOMPO sy tao amin’ny raki-tsoan’ny lapan’ny mpanjaka; ary nisy ihany koa olona nalainy ho takalon’aina. Izay izy vao niverina nankany Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny sisa tamin’ny tantaran’i Jôasy ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony ary ny ady nifanaovany tamin’i Amatsià mpanjakan’i Joda, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Jôasy, dia nalevina tao amin’ny fasan’ny mpanjakan’i Israely tao Samaria; ary i Jerôbohama zanany lahy no nanjaka nandimby azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 15-16 dia mamerina saika ara-bakiteny ny 13.12-13, izay ahitana ny filazàn-javatra amin’ny toerana sahaza kokoa.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Taorian’ny nahafatesan’i Jôasy mpanjakan’i Israely, dia mbola naharitra 15 taona i Amatsià mpanjakan’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Amatsià dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary tao Jerosalema dia nisy olona nikomy tamin’i Amatsià, ka nahatonga azy nandositra tany Lakisy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lakisy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana sahabo ho 45 km atsimo andrefan’i Jerosalema (Tell-ed-Duweir ankehitriny).
    marker-yv: yv-n
  - type: text
    text: '; fa nampanaraka azy anefa ireto mpikomy ka nampamono azy ho faty tany an-toerana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nampodina an-kalesy tarihin-tsoavaly tany Jerosalema ny fatiny ka nalevina tao amin’ny fasam-pianakaviana tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tanànan’i Davida
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vao 16 taona i Hazarià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hazarià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io mpanjaka io dia antsoina hoe Hozià ao amin’ny 2 Tan sy ao amin’ny bokin’ny mpaminany.
    marker-yv: yv-n
  - type: text
    text: ' no nalain’ny vahoaka Jodeanina rehetra ka notendreny ho mpanjaka handimby an’i Amatsià rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany kosa ity rainy, dia i Hazarià no namerina ny seranana Elata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Elata '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia isan’ny faritany edômita izay afaka tamin’ny fifehezan’i Joda (jereo 8.20-22).
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny fanjakan’i Joda sy nanamboatra azy indray.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jerôbohama II, mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin’ny taona faha-15 nanjakan’i Amatsià, zanakalahin’i Jôasy sady mpanjakan’i Joda, no tonga mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' tao Samaria i Jerôbohama zanakalahin’i Jôasy, ary naharitra 41 taona no nanjakany tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany ny fahotana rehetra izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izy no namerina indray ny tanin’i Israely hatreo Lebô-Hamata any avaratra ka hatrany amin’ny Ranomasina Maty any atsimo araka ny nambaran’ny TOMPO Andriamanitr’i Israely tamin’ny alalan’i Jônà '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' zanakalahin’i Amitahy avy any Gata-Hefera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lebô-Hamata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 13.21 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ranomasina Maty
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': antsoina eto amin’ny teny hebreo hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ranomasin’i Harabà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit 14.7 sy nta). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jônà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tsy nitahiry io hafatr’i Jônà mpaminany io ny Testamenta Taloha.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa hitan’ny TOMPO ny havesatry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.26 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Havesatra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy; ny RM dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miodina.
    marker-yv: yv-n
  - type: text
    text: 'ny fahorian’i Israely satria tsy nisy olona afa-namonjy azy na andevo izany na olona afaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy mbola nilaza ny hamono ny anaran’i Israely tsy ho eo ambanin’ny lanitra anefa ny TOMPO; koa dia tamin’ny alalan’i Jerôbohama zanakalahin’i Jôasy no namonjeny azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny sisa tamin’ny tantaran’i Jerôbohama ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony tamin’ny ady namerenany indray tamin’i Israely ny tanànan’i Damasy sy i Hamata izay an’i Joda fahiny, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rehefa lasa nodimandry any amin’ny razany i Jerôbohama, dia nalevina tao amin’ny fasan’ny mpanjakan’i Israely tao Samaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nalevina... tao Samaria: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt grika tranainy; tsy hita kosa ireo teny ireo amin’ny RM.
    marker-yv: yv-n
  - type: text
    text: ; ary i Zakarià zanany lahy no nanjaka nandimby azy.
