      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hankatoavin’ny firenena rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hihanaka dia hihanaka ny voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hafatony amin’ny tahom-boaloboka ny borikiny
  - type: usfm
    marker: q1
    children:
