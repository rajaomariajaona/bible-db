    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny divay no hampibaliaka tsara ny masony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ronono kosa no hampibotsiaka ny nifiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny voaloboka sy ny biby fiompy no foto-karena teo amin’ny faritanin’i Joda.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I Zebolòna dia honina eo amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo amin’izay hisy seranan-tsambo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hivelatra hatrany Tsidôna ny faritaniny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I Jisakara dia toy ny boriky matanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandry eo anivon’ny valany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay misy fefy roa sosona.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hitany fa tsara ny toerana
