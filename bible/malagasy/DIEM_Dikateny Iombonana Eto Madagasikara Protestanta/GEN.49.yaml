document_id: GEN.49,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notsofin’i Jakôba rano ireo zanany roa ambin’ny folo
  - type: text
    content: 'Nantsoin’i Jakôba ireo zanany ka nilazany hoe:'
  - type: text
    content: –Mivoria ianareo, fa hambarako aminareo
  - type: text
    content: izay zavatra hiseho aminareo any aoriana.
  '10':
  - type: text
    content: Tsy hiala amin’i Joda ny tehim-panjakana,
  - type: text
    content: ary tsy hiala amin’ny taranany ny tehim-pibaikoana
  - type: text
    content: mandra-pahatongan’ilay tena tompony
  - type: note
    content: 'tena tompo: iadian-kevitra dia iadian-kevitra ny dikan’ny teny hebreo voadika eto toy izany.'
  - type: text
    content: izay hankatoavin’ny firenena rehetra.
  '11':
  - type: text
    content: Hihanaka dia hihanaka ny voaloboka,
  - type: text
    content: ka hafatony amin’ny tahom-boaloboka ny borikiny
  - type: text
    content: ary amin’ny sampam-boaloboka ny zana-borikiny;
  - type: text
    content: divay no hanasany akanjo
  - type: text
    content: ary ranom-boaloboka no hanasany fitafiana.
  '12':
  - type: text
    content: Ny divay no hampibaliaka tsara ny masony;
  - type: text
    content: ny ronono kosa no hampibotsiaka ny nifiny
  - type: note
    content: Ny voaloboka sy ny biby fiompy no foto-karena teo amin’ny faritanin’i Joda.
  - type: text
    content: .
  '13':
  - type: text
    content: I Zebolòna dia honina eo amoron-dranomasina,
  - type: text
    content: dia eo amin’izay hisy seranan-tsambo;
  - type: text
    content: hivelatra hatrany Tsidôna ny faritaniny.
  '14':
  - type: text
    content: I Jisakara dia toy ny boriky matanjaka,
  - type: text
    content: mandry eo anivon’ny valany
  - type: text
    content: izay misy fefy roa sosona.
  '15':
  - type: text
    content: Hitany fa tsara ny toerana
  - type: text
    content: ary mahafinaritra ny tany.
  - type: text
    content: Nanongilan-tsoroka hampitondraina entana izy,
  - type: text
    content: ka tonga miasa mafy toy ny mpanompo.
  '16':
  - type: text
    content: I Dana dia hifehy ny vahoakany
  - type: note
    content: Ny anarana hoe Dana amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe hanapaka eto, nefa indraindray dia mitsara koa (jereo 30.6 sy nta).
  - type: text
    content: tahaka ny foko hafa ao amin’i Israely.
  '17':
  - type: text
    content: Toa bibilava mamitsaka eny an-dalana izy,
  - type: text
    content: ary tahaka ny menarana eo amoron-dalana;
  - type: text
    content: kaikerin’ny menarana ny traingon-tsoavaly
  - type: text
    content: ka mianjera mitsilany ny mpitaingina azy.
  '18':
  - type: text
    content: Manantena ny famonjenao aho, TOMPO ô!
  '19':
  - type: text
    content: I Gada dia notafihin’andia-mpandroba
  - type: note
    content: Ny anarana hoe Gada amin’ny teny hebreo dia mampahatsiaro ny teny izay nadika hoe notafihina sy valim-panafihana eto.
  - type: text
    content: ','
  - type: text
    content: koa manao valim-panafihana sy manenjika azy.
  '2':
  - type: text
    content: Mivoria ianareo ka mihainoa, ry zanakalahin’i Jakôba,
  - type: text
    content: eny, mihainoa an’i Israely rainareo.
  '20':
  - type: text
    content: I Asera dia hanan-tany mahavokatra tokoa,
  - type: text
    content: ka hahazoana mofo mendrika mpanjaka
  - type: note
    content: Ny anarana hoe Asera (sambatra) dia mampahatsiaro ny fahatsaram-piainan’ny foko izay nipetraka tamin’ny tany lemaka mahavokatra eo amoron-tsiraka ao avaratry ny tendrombohitra Karmela.
  - type: text
    content: .
  '21':
  - type: text
    content: I Naftalỳ dia toy ny osivavy mikarenjy
  - type: text
    content: izay manan-janaka tsara tarehy
  - type: note
    content: 'dkt hafa: i Naftalỳ dia hazo iray lehibe misy rantsany tsara tarehy. Nisy ala tokoa tao amin’ny faritanin’i Naftalỳ. Koa ny rijan-teny dia mamohafoha ny amin’ireny ala ireny na ny amin’ny osivavy dia izay nonina tao amin’ireny ala ireny.'
  - type: text
    content: .
  '22':
  - type: text
    content: I Jôsefa dia toy ny zava-maniry mahavokatra
  - type: text
    content: izay mirobona eo akaikin-doharano
  - type: text
    content: ka manan-drantsana tafahoatra ny fefy
  - type: note
    content: Tsy azo antoka ny hevitry ny and 22. Ny rantsana dia azo heverina ho ny fivelaran’ny fokon’i Joda sy ny fitomboan’ny anjara toerany.
  - type: text
    content: .
  '23':
  - type: text
    content: Nampahory azy imbetsaka ireo mpitifitra tsipîka,
  - type: text
    content: ka nandefa zana-tsipîka hamelivelezana azy.
  '24':
  - type: text
    content: Kanjo nateza mafy ny tsipîkan’i Jôsefa,
  - type: text
    content: ary kinga hatrany ny sandry aman-tanany.
  - type: text
    content: Noho ny fiarovan’ilay Andriamanitra maherin’i Jakôba,
  - type: text
    content: 'noho ny anaran’ilay '
  - type: text
    content: Mpiandry
  - type: note
    content: 'noho ny anaran’ilay Mpiandry: araka ny dkt siriaka sy aramianina; fa ny RM dia manao hoe avy any ilay mpiandry.'
  - type: text
    content: izay vatolampy iankinan’i Israely,
  '25':
  - type: text
    content: amin’ny alalan’ilay Andriamanitry ny rainao
  - type: text
    content: izay mamonjy anao,
  - type: text
    content: 'amin’ny alalan’ilay Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: 'izay '
  - type: text
    content: mitahy
  - type: text
    content: ' anao,'
  - type: text
    content: raiso ny fitahiana avy amin’ny orana
  - type: text
    content: izay mirotsaka avy any an-danitra,
  - type: text
    content: raiso ny fitahiana avy amin’ny rano
  - type: text
    content: izay mihanaka ao amin’ny fanambanin’ny tany
  - type: text
    content: ary raiso ny fitahiana izay hahamaro anaka
  - type: text
    content: ny vehivavy sy ny biby fiompy.
  '26':
  - type: text
    content: Ny tsodrano omen’ny rainao dia mihoatra
  - type: text
    content: noho ny zava-tsoan’ireo tendrombohitra fahagola
  - type: text
    content: sy ny zava-tsoan’ireo havoana tranainy.
  - type: text
    content: Hirotsaka eo an-dohan’i Jôsefa anie izany tsodrano izany,
  - type: text
    content: dia eo an-dohan’ilay voafidy teo anivon’ny rahalahiny!
  '27':
  - type: text
    content: 'I Benjamîna dia toy ny amboadia masiaka:'
  - type: text
    content: Ny maraina izy homan-dremby;
  - type: text
    content: ny hariva, mizara babo.
  '28':
  - type: text
    content: Izy rehetra ireo no foko israelita roa ambin’ny folo. Izany no teny nolazain-drainy taminy, fony izy nitsodrano azy. Eny, samy nomeny tsodrano manokana ny foko tsirairay avy.
  - type: heading
    content: Ny nahafatesan’i Jakôba
  '29':
  - type: text
    content: 'Taorian’izany dia nanafatra ireo zanany i Jakôba ka nanao taminy hoe:'
  - type: text
    content: '–Rehefa maty aho, dia aleveno any am-pasan-drazako, dia ilay zohy ao amin’ny sahan’i Hefrôna izay hetita, '
  '3':
  - type: text
    content: Ianao, ry Reobena, no lahimatoako,
  - type: text
    content: voalohan-terako tao anatin’ny heriko.
  - type: text
    content: Ihoaranao ny rahalahinao
  - type: text
    content: amin’ny fahamendrehana sy ny hery.
  '30':
  - type: text
    content: ilay zohy ao Makpelà akaikin’i Mamre, any amin’ny tany Kanahàna. Novidîn’i Abrahama tamin’i Hefrôna izay hetita io saha io mba ho tany fandevenana
  - type: note
    content: Jereo Gen 23.3-18.
  - type: text
    content: '. '
  '31':
  - type: text
    content: Tao no nalevina i Abrahama sy i Sarà vadiny, i Itsehàka sy i Rebekà vadiny
  - type: note
    content: 'Fasan’i Abrahama: jereo Gen 25.9-10; fasan’i Sarà: jereo Gen 23.19; fasan’i Itsehàka: 35.29.'
  - type: text
    content: ', ary tao koa no nandevenako an’i Leà. '
  '32':
  - type: text
    content: Ny saha sy ny zohy ao aminy dia novidîna tamin’ny Hetita.
  '33':
  - type: text
    content: Rehefa vitan’i Jakôba ny hafatrafatra farany tamin’ireo zanany lahy, dia nandry teo am-parafara indray izy. Ary niala aina izy ka nakambana tamin’ny razany
  - type: note
    content: Jereo Asa 7.15.
  - type: text
    content: .
  '4':
  - type: text
    content: Misamboaravoara toy ny ranon-driaka ianao;
  - type: text
    content: kanefa tsy ho lohalaharana intsony ianao,
  - type: text
    content: satria niakatra teo am-pandriako
  - type: text
    content: ka nandoto ny farafarako tamin’ny vadiko
  - type: note
    content: Jereo 35.22.
  - type: text
    content: .
  '5':
  - type: text
    content: I Simehôna sy i Levỳ dia mpirahalahy
  - type: text
    content: niray tetika hanao herisetra;
  '6':
  - type: text
    content: kanefa tsy te handray anjara amin’ny fiokoany aho
  - type: text
    content: ary tsy te hanatrika ny fivoriany,
  - type: text
    content: satria nentanim-pahatezerana
  - type: note
    content: Jereo 34.25.
  - type: text
    content: ' izy'
  - type: text
    content: ka namono olona ho faty
  - type: text
    content: ary tia setrasetra ka nitraingo ombilahy.
  '7':
  - type: text
    content: Ho voaozona anie ny hatezerany tafahoatra
  - type: text
    content: ary ny havinirany tsy mifaditrovana.
  - type: text
    content: Haparitako ny taranany
  - type: text
    content: ka haeliko eran’i Israely.
  '8':
  - type: text
    content: Ry Joda
  - type: note
    content: Joda amin’ny teny hebreo dia mampahatsiaro ny matoanteny izay nadika hoe hidera anao ireo eto; ampit 29.35 sy nta.
  - type: text
    content: ', hidera anao ireo rahalahinao;'
  - type: text
    content: Hofolahinao kosa ny hatok’ireo fahavalonao,
  - type: text
    content: ka hiankohoka eo anatrehanao ireo ralahahinao.
  '9':
  - type: text
    content: Ry Joda zanako, toy ny liona tanora ianao,
  - type: text
    content: dia liona avy niremby ka mamonjy fierena;
  - type: text
    content: mitorevaka toy ny lion-dahy i Joda ka matory,
  - type: text
    content: ary mamitsaka toy ny liom-bavy,
  - type: text
    content: ka iza no hampitsangana azy?
