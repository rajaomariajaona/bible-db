  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hirotsaka eo an-dohan’i Jôsefa anie izany tsodrano izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia eo an-dohan’ilay voafidy teo anivon’ny rahalahiny!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'I Benjamîna dia toy ny amboadia masiaka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maraina izy homan-dremby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hariva, mizara babo.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Izy rehetra ireo no foko israelita roa ambin’ny folo. Izany no teny nolazain-drainy taminy, fony izy nitsodrano azy. Eny, samy nomeny tsodrano manokana ny foko tsirairay avy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jakôba
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Taorian’izany dia nanafatra ireo zanany i Jakôba ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rehefa maty aho, dia aleveno any am-pasan-drazako, dia ilay zohy ao amin’ny sahan’i Hefrôna izay hetita, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ianao, ry Reobena, no lahimatoako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voalohan-terako tao anatin’ny heriko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ihoaranao ny rahalahinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fahamendrehana sy ny hery.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ilay zohy ao Makpelà akaikin’i Mamre, any amin’ny tany Kanahàna. Novidîn’i Abrahama tamin’i Hefrôna izay hetita io saha io mba ho tany fandevenana
    - type: usfm
      marker: f
