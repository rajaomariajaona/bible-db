    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nantsoin’i Jakôba ireo zanany ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mivoria ianareo, fa hambarako aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay zavatra hiseho aminareo any aoriana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy hiala amin’i Joda ny tehim-panjakana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hiala amin’ny taranany ny tehim-pibaikoana
  - type: usfm
    marker: q1
    children:
    - type: text
