document_id: NEH.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Rehefa ren’i Sanebalato sy i Tôbià mbamin’ny Arabo sy ny Hamônita
  - type: note
    content: Amin’ny dkt sasantsasany dia voalahatra ho 7-23 ireto and 1-17 ireto (jereo ny naoty etsy aloha). –Ny Hamònita dia avy amin’ny faritra akaikin’i Joda, eny atsinanan’i Jôrdàna; ny Asdôdita kosa dia nonina tao Asdôda, tanàna filistinina eo amoron’ny Ranomasina Mediteranea.
  - type: text
    content: ' ary ny Asdôdita fa mandroso ny fanamboarana ny mandan’i Jerosalema ka efa ho voatampina ny banga, dia nirehitra mafy ny fahatezerany. '
  '10':
  - type: text
    content: 'Saingy nanomboka tamin’io andro io, dia ny antsasaky ny oloko no nanao ny asa, fa ny antsasany kosa nitana lefona sy ampinga ary tsipîka aman’akanjo fiarovan-tratra; ireo filoha dia samy teo ivohon’ny olona rehetra amin’i Joda '
  '11':
  - type: text
    content: 'izay namboatra ny manda. Ny mpitondra entana dia samy niasa tamin’ny tanany anankiray ary nitan-defona kosa ny tanany an’ila; '
  '12':
  - type: text
    content: 'ny mpandrafitra rehetra, teo am-pandrafetana, dia samy nanan-tsabatra anankiray voafehy teo amin’ny etrany avy; ary ny mpitsoka anjomara dia teo anilako. '
  '13':
  - type: text
    content: 'Dia hoy aho tamin’ny loholona sy mpanapaka mbamin’ny vahoaka sisa:'
  - type: text
    content: '–Be sady midadasika ny asa; ka dia voazarazara eny amin’ny manda sy mifanalavitra isika! '
  '14':
  - type: text
    content: Na aiza na aiza ianareo no mandre ny feon’anjomara, dia mivoria atỳ aminay; fa Andriamanitra no hiady ho antsika!
  '15':
  - type: text
    content: 'Dia nanao ny asa izahay manomboka ny mazava atsinanana ka mandra-piposaky ny kintana; ary ny antsasakay kosa nitan-defona. '
  '16':
  - type: text
    content: 'Tamin’izany andro izany, dia hoy koa aho tamin’ny vahoaka:'
  - type: text
    content: –Samia mitoetra eto Jerosalema ianareo mbamin’ny mpanomponareo mba hiambina antsika raha alina ary hiasa raha antoandro.
  '17':
  - type: text
    content: Fa na izaho, na ny havako na ny mpanompoko, na ny mpiambina nanaraka ahy, dia samy tsy niala akanjo mihitsy afa-tsy raha handro
  - type: note
    content: 'afa-tsy raha handro: tsy mazava ny fehezanteny; matetika koa no namboarina kely ny rijan-teny ka nadika hoe sady samy nitana fiadiana.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Ary niray tetika izy rehetra handeha hamely an’i Jerosalema sy hanimba ny asa. '
  '3':
  - type: text
    content: 'Dia nivavaka tamin’Andriamanitray izahay sady nametraka mpiambina andro aman’alina hiatrehana sy hanoherana an-dry zareo. '
  '4':
  - type: text
    content: 'Saingy hoy ny lehilahin’i Joda hoe:'
  - type: text
    content: «Mihena hery ny mpitondra entana
  - type: text
    content: ary be ny korontan-javatra
  - type: text
    content: ka dia tsy ho vitanay mihitsy
  - type: text
    content: ny handrafitra ny manda!»
  '5':
  - type: text
    content: Ny fahavalonay kosa nihevitra fa tsy hahalala na hahita izahay, raha tsy tonga eo afovoanay izy ka mahafaty anay ary mampitsahatra ny asa.
  - type: heading
    content: Omen’i Nehemià fitaovam-piadiana ireo mpiasan’ny manda
  '6':
  - type: text
    content: 'Ny Jiosy izay nonina teo akaikin’ireo fahavalonay ireo dia tonga nampandre anay impolo kely hoe: «Hatraiza hatraiza no iavian-dry zareo hamely antsika'
  - type: note
    content: Ny rijan-teny hebreo amin’ity and ity dia manjavozavo, ka nampiasaina handikana azy ireo dkt tranainy.
  - type: text
    content: '!» '
  '7':
  - type: text
    content: Dia nasiako miaramila tamina toerana iva saingy voaaro
  - type: note
    content: 'iva saingy voaaro: manjavozavo ny rijan-teny hebreo.'
  - type: text
    content: ', teo ivelan’ny manda; araka ny tarika nipoirany avy no nandaharako azy, samy nitana sabatra sy lefona ary tsipîka. '
  '8':
  - type: text
    content: 'Rehefa nijery izany aho, dia niainga nilaza tamin’ny loholona sy mpanapaka mbamin’ny vahoaka sisa hoe:'
  - type: text
    content: –Aza atahorana ny fahavalonareo! Tsarovy fa ny Tompo no lehibe sy mahatahotra; ka miadia hiaro ny rahalahinareo sy ny zanakareo lahy aman-janakareo vavy ary ny vadinareo sy ny tranonareo.
  '9':
  - type: text
    content: 'Nony ren’ny fahavalonay fa efa fantatray sady efa nofoanan’Andriamanitra ny tetik’adiny, dia niverina ho any amin’ny manda izahay rehetra, samy nandray ny asany avy. '
