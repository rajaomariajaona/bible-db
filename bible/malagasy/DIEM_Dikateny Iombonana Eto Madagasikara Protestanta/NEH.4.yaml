document_id: NEH.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa ren’i Sanebalato sy i Tôbià mbamin’ny Arabo sy ny Hamônita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny dkt sasantsasany dia voalahatra ho 7-23 ireto and 1-17 ireto (jereo ny naoty etsy aloha). –Ny Hamònita dia avy amin’ny faritra akaikin’i Joda, eny atsinanan’i Jôrdàna; ny Asdôdita kosa dia nonina tao Asdôda, tanàna filistinina eo amoron’ny Ranomasina Mediteranea.
    marker-yv: yv-n
  - type: text
    text: ' ary ny Asdôdita fa mandroso ny fanamboarana ny mandan’i Jerosalema ka efa ho voatampina ny banga, dia nirehitra mafy ny fahatezerany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niray tetika izy rehetra handeha hamely an’i Jerosalema sy hanimba ny asa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nivavaka tamin’Andriamanitray izahay sady nametraka mpiambina andro aman’alina hiatrehana sy hanoherana an-dry zareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Saingy hoy ny lehilahin’i Joda hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mihena hery ny mpitondra entana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary be ny korontan-javatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia tsy ho vitanay mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny handrafitra ny manda!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahavalonay kosa nihevitra fa tsy hahalala na hahita izahay, raha tsy tonga eo afovoanay izy ka mahafaty anay ary mampitsahatra ny asa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omen’i Nehemià fitaovam-piadiana ireo mpiasan’ny manda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny Jiosy izay nonina teo akaikin’ireo fahavalonay ireo dia tonga nampandre anay impolo kely hoe: «Hatraiza hatraiza no iavian-dry zareo hamely antsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny rijan-teny hebreo amin’ity and ity dia manjavozavo, ka nampiasaina handikana azy ireo dkt tranainy.
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nasiako miaramila tamina toerana iva saingy voaaro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'iva saingy voaaro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manjavozavo ny rijan-teny hebreo.
    marker-yv: yv-n
  - type: text
    text: ', teo ivelan’ny manda; araka ny tarika nipoirany avy no nandaharako azy, samy nitana sabatra sy lefona ary tsipîka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa nijery izany aho, dia niainga nilaza tamin’ny loholona sy mpanapaka mbamin’ny vahoaka sisa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza atahorana ny fahavalonareo! Tsarovy fa ny Tompo no lehibe sy mahatahotra; ka miadia hiaro ny rahalahinareo sy ny zanakareo lahy aman-janakareo vavy ary ny vadinareo sy ny tranonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony ren’ny fahavalonay fa efa fantatray sady efa nofoanan’Andriamanitra ny tetik’adiny, dia niverina ho any amin’ny manda izahay rehetra, samy nandray ny asany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saingy nanomboka tamin’io andro io, dia ny antsasaky ny oloko no nanao ny asa, fa ny antsasany kosa nitana lefona sy ampinga ary tsipîka aman’akanjo fiarovan-tratra; ireo filoha dia samy teo ivohon’ny olona rehetra amin’i Joda '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'izay namboatra ny manda. Ny mpitondra entana dia samy niasa tamin’ny tanany anankiray ary nitan-defona kosa ny tanany an’ila; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny mpandrafitra rehetra, teo am-pandrafetana, dia samy nanan-tsabatra anankiray voafehy teo amin’ny etrany avy; ary ny mpitsoka anjomara dia teo anilako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy aho tamin’ny loholona sy mpanapaka mbamin’ny vahoaka sisa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Be sady midadasika ny asa; ka dia voazarazara eny amin’ny manda sy mifanalavitra isika! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na aiza na aiza ianareo no mandre ny feon’anjomara, dia mivoria atỳ aminay; fa Andriamanitra no hiady ho antsika!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao ny asa izahay manomboka ny mazava atsinanana ka mandra-piposaky ny kintana; ary ny antsasakay kosa nitan-defona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izany andro izany, dia hoy koa aho tamin’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Samia mitoetra eto Jerosalema ianareo mbamin’ny mpanomponareo mba hiambina antsika raha alina ary hiasa raha antoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa na izaho, na ny havako na ny mpanompoko, na ny mpiambina nanaraka ahy, dia samy tsy niala akanjo mihitsy afa-tsy raha handro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'afa-tsy raha handro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy mazava ny fehezanteny; matetika koa no namboarina kely ny rijan-teny ka nadika hoe sady samy nitana fiadiana.
    marker-yv: yv-n
  - type: text
    text: .
