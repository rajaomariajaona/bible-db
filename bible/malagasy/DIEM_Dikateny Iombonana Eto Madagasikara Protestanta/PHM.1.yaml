document_id: PHM.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho voafonja noho ny amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa'
  - type: note
    content: Jereo and 13, 22, 23.
  - type: text
    content: .
  - type: text
    content: 'Mamangy anao aho, ry Filemôna, ary mamangy anao i Timôty havantsika, dia ianao izay malalanay sy mpiara-miasa aminay. '
  '10':
  - type: text
    content: ka fiangaviana no ataoko aminao ho an’i Ônesimo
  - type: note
    content: 'Ônesimo: mpanompo nandositra niala tao amin’i Filemôna tompony; mahasoa no dikan’ny anarany ka anaovan’i Paoly tsilalaon-teny eo amin’ny and 11. Jereo koa Kôl 4.9.'
  - type: text
    content: ', izay zanako naterako ara-panahy tato am-ponja. '
  '11':
  - type: text
    content: 'Tsy nahasoa anao izy fahiny, fa ankehitriny kosa mahasoa antsika, dia izaho sy ianao. '
  '12':
  - type: text
    content: Asaiko mody atỳ aminao indray izy, ilay toy ny sombinaiko
  - type: note
    content: 'ilay toy ny sombinaiko: misy stf sasany ahitana hoe ianao kosa, raiso toy ny sombinaiko izy.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Satriko ihany ny mitana azy eto amiko, izao aho voafonja noho ny amin’ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' izao, mba ho solonao mikarakara ahy. '
  '14':
  - type: text
    content: Kanefa tsy te hanao na inona na inona aho raha tsy teny ierana aminao; tsy tiako ny hanoavanao ahy tsy sazoka fa mba ho nahim-ponao tokoa.
  '15':
  - type: text
    content: 'Angamba ny nahatafasaraka an’i Ônesimo taminao vetivety dia ny hanananao azy maharitra; '
  '16':
  - type: text
    content: saingy tsy toy ny mpanompo intsony no hanananao azy, fa tsara lavitra noho izany, dia toy ny rahalahy malala. Rahalahy malala tokoa izy ho ahy, mainka fa ho anao, na amin’ny maha olona azy na amin’ny maha mpanara-dia ny Tompo azy.
  '17':
  - type: text
    content: 'Koa raha heverinao ho namanao tokoa aho, dia raiso i Ônesimo tahaka ny andraisanao ahy. '
  '18':
  - type: text
    content: 'Raha misy ratsy nataony anao na misy trosa anananao aminy, dia ahy ny andraikitra. '
  '19':
  - type: text
    content: 'Ny tanako mihitsy no anoratako ireto teny ireto: izaho Paoly no hanonitra izany! Tsy te hilaza aminao akory aho, fa ianao koa anie ka ananako trosa mihoatra noho izany, dia ny maha kristianina anao. '
  '2':
  - type: text
    content: Mamangy koa an’i Apîa anabavinay sy i Arkipo
  - type: note
    content: 'Arkipo: jereo Kôl 4.17.'
  - type: text
    content: ' mpiara-miady aminay ary ny Fiangonana mivory ao an-tranonao izahay. '
  '20':
  - type: text
    content: Eny, ry rahalahy, efa mpanara-dia ny Tompo ianao ka enga anie ho azoko aminao izay angatahiko; velombelomy ny foko noho ianao rahalahiko ao amin’i Kristy.
  '21':
  - type: text
    content: 'Matoky aho fa hanaiky izay angatahiko ianao, ka izany no andefasako taratasy aminao, sady fantatro fa hanao mihoatra aza ianao. '
  '22':
  - type: text
    content: Ary mba anomano efitrano koa aho; satria antenaiko fa noho ny vavaka ataonareo, dia haverin’Andriamanitra ho eo aminareo aho.
  - type: heading
    content: Fanaovam-beloma
  '23':
  - type: text
    content: Manao veloma anao i Epafrà
  - type: note
    content: 'Epafrà: jereo Kôl 1.7; 4.12.'
  - type: text
    content: ', izay miara-voafonja amiko noho izy tafaray amin’i Kristy Jesoa; '
  '24':
  - type: text
    content: manao veloma anao koa i Marka, i Aristarka, i Demasy, ary i Lioka izay samy mpiara-miasa amiko
  - type: note
    content: 'Marka: jereo 2Tim 4.11 sy nta. –Aristarka: jereo Asa 19.29; 27.2; Kôl 4.10. –Demasy: jereo Kôl 4.14; 2 Tim 4.10 sy nta. –Lioka: jereo Kôl 4.14; 2 Tim 4.11.'
  - type: text
    content: .
  '25':
  - type: text
    content: 'Homba anareo anie ny fahasoavan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo!'
  '3':
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Ny fitiavana sy finoana asehon’i Filemôna
  '4':
  - type: text
    content: 'Velom-pisaorana mandrakariva an’Andriamanitro aho, ry Filemôna malala, rehefa mahatsiaro anao amin’ny fivavahako '
  '5':
  - type: text
    content: 'satria reko ny fitiavanao ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra sy ny finoanao an’i Jesoa Tompo. '
  '6':
  - type: text
    content: 'Ary izao no angatahiko amin’Andriamanitra: ny fiombonanao aminay amin’ny alalan’ny finoana anie hampisy fahalalana tsara ny soa rehetra ananantsika, noho isika tafaray amin’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ry rahalahy, nampifaly ahy fatratra sady nampahery ahy ny fitiavanao satria efa novelombelominao ny fon’ny vahoakan’Andriamanitra.
  - type: heading
    content: Fiangavian’i Paoly ho an’i Ônesimo
  '8':
  - type: text
    content: 'Noho izany, na dia azoko atao tsara aza, araka ny fahefana nomen’i '
  - type: text
    content: Kristy
  - type: text
    content: ' ahy, ny handidy anao ny amin’izay tokony hataonao, '
  '9':
  - type: text
    content: dia aleoko manao fiangaviana aminao noho ny fifankatiavantsika. Eny, izaho Paoly dia efa antitra sady voafonja noho ny amin’i Kristy Jesoa ankehitriny
  - type: note
    content: 'efa antitra... ankehitriny: misy mandika hoe irak’i Kristy Jesoa, sady voafonja noho ny aminy ankehitriny.'
  - type: text
    content: '; '
