document_id: PHM.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy amiko Paoly ity taratasy ity, dia izaho voafonja noho ny amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo and 13, 22, 23.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamangy anao aho, ry Filemôna, ary mamangy anao i Timôty havantsika, dia ianao izay malalanay sy mpiara-miasa aminay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka fiangaviana no ataoko aminao ho an’i Ônesimo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ônesimo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mpanompo nandositra niala tao amin’i Filemôna tompony; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mahasoa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no dikan’ny anarany ka anaovan’i Paoly tsilalaon-teny eo amin’ny and 11. Jereo koa Kôl 4.9.'
      marker-yv: yv-n
    - type: text
      text: ', izay zanako naterako ara-panahy tato am-ponja. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nahasoa anao izy fahiny, fa ankehitriny kosa mahasoa antsika, dia izaho sy ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asaiko mody atỳ aminao indray izy, ilay toy ny sombinaiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ilay toy ny sombinaiko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ianao kosa, raiso toy ny sombinaiko izy.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satriko ihany ny mitana azy eto amiko, izao aho voafonja noho ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' izao, mba ho solonao mikarakara ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy te hanao na inona na inona aho raha tsy teny ierana aminao; tsy tiako ny hanoavanao ahy tsy sazoka fa mba ho nahim-ponao tokoa.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Angamba ny nahatafasaraka an’i Ônesimo taminao vetivety dia ny hanananao azy maharitra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saingy tsy toy ny mpanompo intsony no hanananao azy, fa tsara lavitra noho izany, dia toy ny rahalahy malala. Rahalahy malala tokoa izy ho ahy, mainka fa ho anao, na amin’ny maha olona azy na amin’ny maha mpanara-dia ny Tompo azy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha heverinao ho namanao tokoa aho, dia raiso i Ônesimo tahaka ny andraisanao ahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy ratsy nataony anao na misy trosa anananao aminy, dia ahy ny andraikitra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tanako mihitsy no anoratako ireto teny ireto: izaho Paoly no hanonitra izany! Tsy te hilaza aminao akory aho, fa ianao koa anie ka ananako trosa mihoatra noho izany, dia ny maha kristianina anao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamangy koa an’i Apîa anabavinay sy i Arkipo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Arkipo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Kôl 4.17.
      marker-yv: yv-n
    - type: text
      text: ' mpiara-miady aminay ary ny Fiangonana mivory ao an-tranonao izahay. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ry rahalahy, efa mpanara-dia ny Tompo ianao ka enga anie ho azoko aminao izay angatahiko; velombelomy ny foko noho ianao rahalahiko ao amin’i Kristy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matoky aho fa hanaiky izay angatahiko ianao, ka izany no andefasako taratasy aminao, sady fantatro fa hanao mihoatra aza ianao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary mba anomano efitrano koa aho; satria antenaiko fa noho ny vavaka ataonareo, dia haverin’Andriamanitra ho eo aminareo aho.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanaovam-beloma
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anao i Epafrà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Epafrà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Kôl 1.7; 4.12.
      marker-yv: yv-n
    - type: text
      text: ', izay miara-voafonja amiko noho izy tafaray amin’i Kristy Jesoa; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: manao veloma anao koa i Marka, i Aristarka, i Demasy, ary i Lioka izay samy mpiara-miasa amiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Marka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2Tim 4.11 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Aristarka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Asa 19.29; 27.2; Kôl 4.10. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Demasy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Kôl 4.14; 2 Tim 4.10 sy nta. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lioka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Kôl 4.14; 2 Tim 4.11.'
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Homba anareo anie ny fahasoavan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompo!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavana sy finoana asehon’i Filemôna
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Velom-pisaorana mandrakariva an’Andriamanitro aho, ry Filemôna malala, rehefa mahatsiaro anao amin’ny fivavahako '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria reko ny fitiavanao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ' rehetra sy ny finoanao an’i Jesoa Tompo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no angatahiko amin’Andriamanitra: ny fiombonanao aminay amin’ny alalan’ny finoana anie hampisy fahalalana tsara ny soa rehetra ananantsika, noho isika tafaray amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry rahalahy, nampifaly ahy fatratra sady nampahery ahy ny fitiavanao satria efa novelombelominao ny fon’ny vahoakan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiangavian’i Paoly ho an’i Ônesimo
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, na dia azoko atao tsara aza, araka ny fahefana nomen’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' ahy, ny handidy anao ny amin’izay tokony hataonao, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia aleoko manao fiangaviana aminao noho ny fifankatiavantsika. Eny, izaho Paoly dia efa antitra sady voafonja noho ny amin’i Kristy Jesoa ankehitriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'efa antitra... ankehitriny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy mandika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: irak’i Kristy Jesoa, sady voafonja noho ny aminy ankehitriny.
      marker-yv: yv-n
    - type: text
      text: '; '
