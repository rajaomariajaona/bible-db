    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andriamanitra ô, aoka ho sitrakao ny hanafaka ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, faingàna re hamonjy ahy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ho menatra sy hangaihay anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay olona mitady hahafaty ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hihemotra sy ho afa-baràka anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay olona maniry loza ho ahy!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aoka hiverina ilalana ho safotry ny henatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ireo mpanakora ahy hoe: «Akorinao izay!»'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay rehetra mitady Anao kosa anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hifaly sy hiravo amin’ny nataonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay olona mpitia Anao Mpamonjy anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hivolan-dava hoe: «Lehibe tokoa Andriamanitra!»'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izaho kosa dia ory sy mahantra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faingàna ho eto amiko, Andriamanitra ô.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy sy mpanafaka ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza ela fa tongava, TOMPO ô!
