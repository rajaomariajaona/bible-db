document_id: PSA.70,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Faingàna ho eto amiko, ry Tompo
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida, hitaomana an’Andriamanitra hahatsiaro azy.
  '2':
  - type: text
    content: Andriamanitra ô, aoka ho sitrakao ny hanafaka ahy;
  - type: text
    content: TOMPO ô, faingàna re hamonjy ahy!
  '3':
  - type: text
    content: Ho menatra sy hangaihay anie
  - type: text
    content: izay olona mitady hahafaty ahy;
  - type: text
    content: hihemotra sy ho afa-baràka anie
  - type: text
    content: izay olona maniry loza ho ahy!
  '4':
  - type: text
    content: Aoka hiverina ilalana ho safotry ny henatra
  - type: text
    content: 'ireo mpanakora ahy hoe: «Akorinao izay!»'
  '5':
  - type: text
    content: Izay rehetra mitady Anao kosa anie
  - type: text
    content: hifaly sy hiravo amin’ny nataonao;
  - type: text
    content: ary izay olona mpitia Anao Mpamonjy anie
  - type: text
    content: 'hivolan-dava hoe: «Lehibe tokoa Andriamanitra!»'
  '6':
  - type: text
    content: Izaho kosa dia ory sy mahantra;
  - type: text
    content: faingàna ho eto amiko, Andriamanitra ô.
  - type: text
    content: Mpamonjy sy mpanafaka ahy Ianao
  - type: text
    content: ka aza ela fa tongava, TOMPO ô!
