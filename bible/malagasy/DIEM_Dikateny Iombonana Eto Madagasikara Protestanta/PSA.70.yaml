    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho kosa dia ory sy mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: faingàna ho eto amiko, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy sy mpanafaka ahy Ianao
- type: usfm
  marker: q1
  children:
