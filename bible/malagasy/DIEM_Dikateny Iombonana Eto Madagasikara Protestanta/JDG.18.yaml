document_id: JDG.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niova faritany ny fokon’i Dana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fotoana izany dia tsy nisy mpanjaka tany Israely. Ary ny fokon’i Dana tamin’izay dia nitady faritany honenany, satria tsy mbola nahazo anjara tahaka ireo foko israelita hafa izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ny voalazan’ny 1.34, dia tsy afaka nahazo vahana teo amin’ny faritra voatondron’ny antsapaka ho azy ny Danita (jereo Jos 19.40-46), ka voatery niova toerana (Jos 19.47).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha tonga any ianareo dia hamantana mponina tsy manana ahiahy ao anatin’ny faritany midadasika. Hatolotr’Andriamanitra anareo izany faritany misy ny ilaina rehetra eto ambonin’ny tany izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tao Tsorehà sy Estaôla ny vatan-dehilahy eninjato avy tamin’ny fokon’i Dana sady nirongo fiadiana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niakatra ireo ka nitoby tao andrefan’i Kiriata-Jeharima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kiriata-Jeharima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna 13 km ao andrefan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ', tao amin’ny tanin’i Joda. Izany no niantsoana io toerana io hoe Manahe-Dana na Tobin’i Dana, mandraka androany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tao ireo no niampita ho any amin’ny faritra be tendrombohitra any Efraîma, ka tonga teo akaikin’ny tranon’i Mikà. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy dimy lahy izay nisafo ny faritanin’i Laîsy tamin’ny namany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatrareo ve fa ny iray amin’ireo trano ireo dia misy efôda sy terafima ary sampy vita sarivongana metaly narendrika? Ankehitriny hevero izay tokony hataonareo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanatona izy dimy lahy dia niditra tao an-tranon’i Mikà nisy ilay tovolahy levita ary niarahaba azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay kosa ireo vatan-dehilahy danita eninjato nirongo fiadiana dia niatrana teo am-bavahadin’ny trano. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra izy dimy lahy nisafo ny faritr’i Laîsy ka nitsofoka tao an-trano ary naka ny sampy mbamin’ny efôda sy ny terafima ary ny sarivongana metaly narendrika. Ny mpisorona tamin’izay dia teo am-bavahadin’ny trano niaraka tamin’izy eninjato lahy nirongo fiadiana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa raha nahita iretsy nitsofoka tao an-trano naka ny sampy mbamin’ny efôda sy ny terafima ary ny sarivongana metaly narendrika izy, dia nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no ataonareo ao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy iretsy taminy:'
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mangina ianao, ary tampeno ny vava! Andeha hiaraka aminay, dia ho mpisoron’ny fokonay ianao. Sa inona no tianao kokoa? Ho mpisorona amin’ny ankohonan’olon-tokana ve sa ho mpisorona amina tarika na foko israelita iray manontolo?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nifidy lehilahy dimy mahery fo indrindra tao amin’ny fokony izy ary naniraka azy mba hijery tsara ny tany manomboka hatreo Tsôrehà ka hatrany Estaôla. Tonga hatrany amin’ny faritra be tendrombohitra any Efraîma izy ireo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsôrehà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 13.2 sy nta; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Estaôla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàna akaikin’i Tsôrehà; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny faritra be tendrombohitra any Efraîma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 17.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' ary tafapaka teo akaikin’ny tranon’i Mikà ary nandry teo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia faly ilay mpisorona ka nitondra ny efôda sy ny terafima ary ny sampy sady niditra teo anivon’ilay andian-tafika. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ireo ka nanohy ny diany. Ny zaza amam-behivavy sy ny biby fiompy ary ny entana no nalefany teo aloha. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa lasa lavitra ny tranon’i Mikà ireo, vao nifamory i Mikà sy ny vatan-dehilahy mpiara-monina taminy ka nanenjika azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nihorakoraka nanjohy ny Danita izy, dia nisampotina kosa ireto ka nanontany an’i Mikà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no nahatonga anao namory olona maro toy izao?
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly azy i Mikà hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nalainareo ireo andriamanitra izay namboariko ho ahy ary nentinareo ny mpisoroko, dia iny ianareo no lasa; ka tsy manana na inona na inona intsony aho. Koa mbola sahy manontany izay nahatonga ahy nanao izao ihany ve ianareo?
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny Danita taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka tsy handre ny fitarainanao intsony izahay, fandrao hisy ho sosotra aminay ka hamely anareo; dia ianao no hahatonga fahafatesana ho an’ny tenanao sy ny ankohonanao.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanohy ny diany ihany ny Danita. Rehefa hitan’i Mikà kosa fa nahery noho ny tenany ireo, dia niverin-dàlana nody tany aminy izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tanànan’i Dana sy ny toeram-pivavahany
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalain’ireo Danita ny sampy nataon’i Mikà sy ny mpisorony, dia lasa izy nanafika an’i Laîsy; ka naringany tamin-tsabatra ny mponina tao izay nandry feizay tsy nanana ahiahy, ary nodorany ny tanàna. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Laîsy dia tao amin’ny lohasahan’i Bety-Rehôba, ka lavitra an’i Tsidôna ary tsy niankina tamin’i Arama. Noho izany tsy nisy olona tonga namonjy azy. Dia namboarin’ny Danita ny tanàna, ka nonenany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novàny ny anaran’i Laîsy izay niantsoana azy taloha ka nampitondrainy ny anaran’i Dana razambeny, izay zanakalahin’i Jakôba. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fony izy dimy lahy teo akaikin’ny tranon’i Mikà, dia nandre ilay zatovo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' ka nahafantatra ny fomba fiteniny ary nanatona azy ka nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no nitondra anao amin’itony toerana itony ary inona no ataonao atỳ? Inona no mitazona anao atỳ?
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary natsangan’ireo ilay sampy nataon’i Mikà; ka i Jônatàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.30a '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Jônatàna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: no anaran’ilay levita voateny ao amin’ny toko 17 sy 18.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Gersôma sady zafikelin’i Mosesy no nanjary mpisoron’ny foko danita. Ny taranak’i Jônatàna no nitana io andraikitra io ambara-pahatonga ny andro famaboana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.30b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'famaboana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lazaina eto dia toa ilay nitranga tamin’ny andron’i Tiglato-Pilesera, tamin’ny taona 734 tal J.K. (jereo 2 Mp 15.29).
      marker-yv: yv-n
    - type: text
      text: ' izany tany izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nokajin’ireo ilay sampin’i Mikà tamin’ny fotoana rehetra nisian’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: ' tao Silao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jos 18.1 sy nta. Toa ny Filistinina no nandrava ny tranon’Andriamanitra tao Silao, tamin’ilay ady nandreseny ny Israelita teo akaikin’i Ebena-Hezera; jereo 1 Sam 4.1-11.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly azy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zavatra isan-karazany no nataon’i Mikà tamiko; izy no manarama ahy, ka dia tonga mpisorony aho.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy indray ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha àry mba anontanio Andriamanitra hahafantaranay na hahomby izao dianay izao na tsia.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay mpisorona taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana ombàm-piadanana, fa miahy anareo ny TOMPO amin’izao dianareo izao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nanohy ny diany izy dimy lahy ary tonga tany Laîsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7a '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Laîsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 19.47 (izay iantsoana io tanàna io hoe Lesema) sy nta.
      marker-yv: yv-n
    - type: text
      text: . Hitany fa nilamina ny mponina tao, ka nandry feizay sy tsy manana ahiahy tahaka ny Tsidônianina. Tsy nanana hokianina amin’izay mpitondra azy ny olona. Fa niaina lavitra ny Tsidônianina ireo olona ireo ary tsy niankina tamin’i Arama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7b '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny Tsidônianina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia nonina tao Tsidôna izay seranana teo amin’ny morontsiraka fenisianina, ao avaratr’i Palestinina; olona milamina ka varotra indrindra no tena nosahaniny. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: I Arama na hoe Siria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tao avaratr’i Laîsy.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina nankany Tsôrehà sy Estaôla ireo iraka ary nofotorin’ireo mpiray foko aminy momba ny zavatra hitany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no nambarany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ndeha isika hanafika ny olona ao Laîsy. Araka ny hitanay manko dia tsara mihitsy ny faritany. Koa aza mijanonjanona eto foana ianareo fa andao haingana haka io faritany io isika. '
