document_id: JDG.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niova faritany ny fokon’i Dana
  - type: text
    content: Tamin’izany fotoana izany dia tsy nisy mpanjaka tany Israely. Ary ny fokon’i Dana tamin’izay dia nitady faritany honenany, satria tsy mbola nahazo anjara tahaka ireo foko israelita hafa izy
  - type: note
    content: Araka ny voalazan’ny 1.34, dia tsy afaka nahazo vahana teo amin’ny faritra voatondron’ny antsapaka ho azy ny Danita (jereo Jos 19.40-46), ka voatery niova toerana (Jos 19.47).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Fa raha tonga any ianareo dia hamantana mponina tsy manana ahiahy ao anatin’ny faritany midadasika. Hatolotr’Andriamanitra anareo izany faritany misy ny ilaina rehetra eto ambonin’ny tany izany.
  '11':
  - type: text
    content: 'Dia niala tao Tsorehà sy Estaôla ny vatan-dehilahy eninjato avy tamin’ny fokon’i Dana sady nirongo fiadiana. '
  '12':
  - type: text
    content: Niakatra ireo ka nitoby tao andrefan’i Kiriata-Jeharima
  - type: note
    content: 'Kiriata-Jeharima: tanàna 13 km ao andrefan’i Jerosalema.'
  - type: text
    content: ', tao amin’ny tanin’i Joda. Izany no niantsoana io toerana io hoe Manahe-Dana na Tobin’i Dana, mandraka androany. '
  '13':
  - type: text
    content: 'Avy tao ireo no niampita ho any amin’ny faritra be tendrombohitra any Efraîma, ka tonga teo akaikin’ny tranon’i Mikà. '
  '14':
  - type: text
    content: 'Dia hoy izy dimy lahy izay nisafo ny faritanin’i Laîsy tamin’ny namany:'
  - type: text
    content: –Fantatrareo ve fa ny iray amin’ireo trano ireo dia misy efôda sy terafima ary sampy vita sarivongana metaly narendrika? Ankehitriny hevero izay tokony hataonareo.
  '15':
  - type: text
    content: 'Ary nanatona izy dimy lahy dia niditra tao an-tranon’i Mikà nisy ilay tovolahy levita ary niarahaba azy. '
  '16':
  - type: text
    content: 'Tamin’izay kosa ireo vatan-dehilahy danita eninjato nirongo fiadiana dia niatrana teo am-bavahadin’ny trano. '
  '17':
  - type: text
    content: 'Ary niakatra izy dimy lahy nisafo ny faritr’i Laîsy ka nitsofoka tao an-trano ary naka ny sampy mbamin’ny efôda sy ny terafima ary ny sarivongana metaly narendrika. Ny mpisorona tamin’izay dia teo am-bavahadin’ny trano niaraka tamin’izy eninjato lahy nirongo fiadiana; '
  '18':
  - type: text
    content: 'koa raha nahita iretsy nitsofoka tao an-trano naka ny sampy mbamin’ny efôda sy ny terafima ary ny sarivongana metaly narendrika izy, dia nanontany azy hoe:'
  - type: text
    content: –Inona no ataonareo ao?
  - type: text
    content: 'Ka hoy iretsy taminy:'
  '19':
  - type: text
    content: –Mangina ianao, ary tampeno ny vava! Andeha hiaraka aminay, dia ho mpisoron’ny fokonay ianao. Sa inona no tianao kokoa? Ho mpisorona amin’ny ankohonan’olon-tokana ve sa ho mpisorona amina tarika na foko israelita iray manontolo?
  '2':
  - type: text
    content: Koa nifidy lehilahy dimy mahery fo indrindra tao amin’ny fokony izy ary naniraka azy mba hijery tsara ny tany manomboka hatreo Tsôrehà ka hatrany Estaôla. Tonga hatrany amin’ny faritra be tendrombohitra any Efraîma izy ireo
  - type: note
    content: 'Tsôrehà: jereo 13.2 sy nta; Estaôla: tanàna akaikin’i Tsôrehà; ny faritra be tendrombohitra any Efraîma: jereo 17.1 sy nta.'
  - type: text
    content: ' ary tafapaka teo akaikin’ny tranon’i Mikà ary nandry teo. '
  '20':
  - type: text
    content: 'Dia faly ilay mpisorona ka nitondra ny efôda sy ny terafima ary ny sampy sady niditra teo anivon’ilay andian-tafika. '
  '21':
  - type: text
    content: 'Dia niainga ireo ka nanohy ny diany. Ny zaza amam-behivavy sy ny biby fiompy ary ny entana no nalefany teo aloha. '
  '22':
  - type: text
    content: 'Efa lasa lavitra ny tranon’i Mikà ireo, vao nifamory i Mikà sy ny vatan-dehilahy mpiara-monina taminy ka nanenjika azy. '
  '23':
  - type: text
    content: 'Ary nony nihorakoraka nanjohy ny Danita izy, dia nisampotina kosa ireto ka nanontany an’i Mikà hoe:'
  - type: text
    content: –Inona no nahatonga anao namory olona maro toy izao?
  '24':
  - type: text
    content: 'Dia namaly azy i Mikà hoe:'
  - type: text
    content: –Nalainareo ireo andriamanitra izay namboariko ho ahy ary nentinareo ny mpisoroko, dia iny ianareo no lasa; ka tsy manana na inona na inona intsony aho. Koa mbola sahy manontany izay nahatonga ahy nanao izao ihany ve ianareo?
  '25':
  - type: text
    content: 'Fa hoy ny Danita taminy:'
  - type: text
    content: –Aoka tsy handre ny fitarainanao intsony izahay, fandrao hisy ho sosotra aminay ka hamely anareo; dia ianao no hahatonga fahafatesana ho an’ny tenanao sy ny ankohonanao.
  '26':
  - type: text
    content: Ary nanohy ny diany ihany ny Danita. Rehefa hitan’i Mikà kosa fa nahery noho ny tenany ireo, dia niverin-dàlana nody tany aminy izy.
  - type: heading
    content: Ny tanànan’i Dana sy ny toeram-pivavahany
  '27':
  - type: text
    content: 'Nalain’ireo Danita ny sampy nataon’i Mikà sy ny mpisorony, dia lasa izy nanafika an’i Laîsy; ka naringany tamin-tsabatra ny mponina tao izay nandry feizay tsy nanana ahiahy, ary nodorany ny tanàna. '
  '28':
  - type: text
    content: 'I Laîsy dia tao amin’ny lohasahan’i Bety-Rehôba, ka lavitra an’i Tsidôna ary tsy niankina tamin’i Arama. Noho izany tsy nisy olona tonga namonjy azy. Dia namboarin’ny Danita ny tanàna, ka nonenany. '
  '29':
  - type: text
    content: 'Novàny ny anaran’i Laîsy izay niantsoana azy taloha ka nampitondrainy ny anaran’i Dana razambeny, izay zanakalahin’i Jakôba. '
  '3':
  - type: text
    content: 'Fony izy dimy lahy teo akaikin’ny tranon’i Mikà, dia nandre ilay zatovo '
  - type: text
    content: levita
  - type: text
    content: ' ka nahafantatra ny fomba fiteniny ary nanatona azy ka nanontany hoe:'
  - type: text
    content: –Iza no nitondra anao amin’itony toerana itony ary inona no ataonao atỳ? Inona no mitazona anao atỳ?
  '30':
  - type: text
    content: Ary natsangan’ireo ilay sampy nataon’i Mikà; ka i Jônatàna
  - type: note
    content: I Jônatàna no anaran’ilay levita voateny ao amin’ny toko 17 sy 18.
  - type: text
    content: ' zanakalahin’i Gersôma sady zafikelin’i Mosesy no nanjary mpisoron’ny foko danita. Ny taranak’i Jônatàna no nitana io andraikitra io ambara-pahatonga ny andro famaboana'
  - type: note
    content: Ny famaboana lazaina eto dia toa ilay nitranga tamin’ny andron’i Tiglato-Pilesera, tamin’ny taona 734 tal J.K. (jereo 2 Mp 15.29).
  - type: text
    content: ' izany tany izany. '
  '31':
  - type: text
    content: 'Nokajin’ireo ilay sampin’i Mikà tamin’ny fotoana rehetra nisian’ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' tao Silao'
  - type: note
    content: Jereo Jos 18.1 sy nta. Toa ny Filistinina no nandrava ny tranon’Andriamanitra tao Silao, tamin’ilay ady nandreseny ny Israelita teo akaikin’i Ebena-Hezera; jereo 1 Sam 4.1-11.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Dia namaly azy izy hoe:'
  - type: text
    content: –Zavatra isan-karazany no nataon’i Mikà tamiko; izy no manarama ahy, ka dia tonga mpisorony aho.
  '5':
  - type: text
    content: 'Fa hoy indray ireo taminy:'
  - type: text
    content: –Andeha àry mba anontanio Andriamanitra hahafantaranay na hahomby izao dianay izao na tsia.
  '6':
  - type: text
    content: 'Dia hoy ilay mpisorona taminy:'
  - type: text
    content: –Mandehana ombàm-piadanana, fa miahy anareo ny TOMPO amin’izao dianareo izao.
  '7':
  - type: text
    content: Koa nanohy ny diany izy dimy lahy ary tonga tany Laîsy
  - type: note
    content: 'Laîsy: jereo Jos 19.47 (izay iantsoana io tanàna io hoe Lesema) sy nta.'
  - type: text
    content: . Hitany fa nilamina ny mponina tao, ka nandry feizay sy tsy manana ahiahy tahaka ny Tsidônianina. Tsy nanana hokianina amin’izay mpitondra azy ny olona. Fa niaina lavitra ny Tsidônianina ireo olona ireo ary tsy niankina tamin’i Arama
  - type: note
    content: Ny Tsidônianina dia nonina tao Tsidôna izay seranana teo amin’ny morontsiraka fenisianina, ao avaratr’i Palestinina; olona milamina ka varotra indrindra no tena nosahaniny. I Arama na hoe Siria dia tao avaratr’i Laîsy.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dia niverina nankany Tsôrehà sy Estaôla ireo iraka ary nofotorin’ireo mpiray foko aminy momba ny zavatra hitany. '
  '9':
  - type: text
    content: 'Koa izao no nambarany:'
  - type: text
    content: '–Ndeha isika hanafika ny olona ao Laîsy. Araka ny hitanay manko dia tsara mihitsy ny faritany. Koa aza mijanonjanona eto foana ianareo fa andao haingana haka io faritany io isika. '
