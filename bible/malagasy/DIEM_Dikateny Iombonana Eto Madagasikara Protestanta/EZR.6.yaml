document_id: EZR.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Valin-tenin’ny amperôra Dariôsa
  - type: text
    content: 'Dia nanome baiko ny amperôra Dariôsa mba hizahana ny trano fitehirizan-taratasy sady fitehirizan-drakitra tao Babilôna. '
  '10':
  - type: text
    content: 'Dia afaka hanolotra sorona ho hanitra ankasitrahina ho an’Ilay Andriamanitry ny lanitra ry zareo, no hivavaka mba ho ela velona ny amperôra mbamin’ny zanany. '
  '11':
  - type: text
    content: Mamoaka didy koa aho fa na iza na iza mandika izao teny izao, dia aoka hangalana hazo anankiray avy amin’ny tranony ary hatsatoka izany ka hahantona eo ny tenany
  - type: note
    content: hahantona na hoe hofantsihana.
  - type: text
    content: '; fa ny tranony kosa dia aoka hatao fanariam-piringa. '
  '12':
  - type: text
    content: Ary Andriamanitra Izay efa nampitoetra ny anarany eo amin’io toerana io anie handringana ny mpanjaka sy firenena rehetra izay handika ny didiko ka haninji-tanana handrava io tranon’Andriamanitra any Jerosalema io. Izaho Dariôsa no namoaka ny didy; aoka hotovina an-tsakany sy an-davany izany».
  '13':
  - type: text
    content: Tamin’izay ry Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy ry Setara-Bôzenay mbamin’ireo namany dia nankatò an-tsakany sy an-davany izany teny nalefan’i Dariôsa ho azy izany.
  - type: heading
    content: Fahavitan’ny tempoly sy fitokanana azy
  '14':
  - type: text
    content: 'Dia nanohy ny taotrano ireo loholona jiosy ka nambinina, araka ny hafatra nentin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' Hagay sy ny mpaminany Zakarià'
  - type: note
    content: Jereo Hag 1.1; Zak 1.1.
  - type: text
    content: ' zanakalahin’i Hidao. Nanorina ka nahavita ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ry zareo, araka ny didin’Ilay Andriamanitr’i Israely sy araka ny baikon-dry i Kirôsa sy i Dariôsa ary i Artakserksesa, amperôran’i Persia. '
  '15':
  - type: text
    content: Tamin’ny andro fahatelon’ny volana Adara, nandritra ny taona fahenina nanjakan’ny amperôra Dariôsa, no nahavitan’ny tempoly
  - type: note
    content: 'Adara volana faha-12 (izany hoe febroary-marsa) teo amin’ny taona manomboka lohataona. –taona fahenina: taona 515 tal J.K.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ny Israelita nody avy any an-tsesitany, na '
  - type: text
    content: mpisorona
  - type: text
    content: ' na '
  - type: text
    content: levita
  - type: text
    content: ' na ny sarambabem-bahoaka, dia nitokana ny tranon’Andriamanitra tamim-pifaliana. '
  '17':
  - type: text
    content: 'Ny '
  - type: text
    content: sorona
  - type: text
    content: ' natolotra tamin’io fitokanana io dia ombilahy zato sy ondrilahy roanjato ary zanakondry efajato; ary ny ho sorona fanalana ny ota ho an’ny vahoaka Israely manontolo dia osilahy 12, izany hoe anankiray isam-poko. '
  '18':
  - type: text
    content: Dia nisy fanendrena ny mpisorona sy ny levita ho amin’ny antokony avy sy araka ny andraikiny avy, mba hanao ny fanompoana an’Ilay Andriamanitra Izay ao Jerosalema, araka ny voasoratra ao anatin’ny bokin’i Mosesy.
  - type: heading
    content: Fankalazana ny Paska
  '19':
  - type: text
    content: 'Ny andro faha-14 tamin’ny volana voalohan’ny taona manaraka dia nankalaza ny '
  - type: text
    content: Paska
  - type: text
    content: ' ireo olona nody avy any an-tsesitany'
  - type: note
    content: 'Manomboka eo amin’ny 6.19, dia miverina ho hebreo indray ny rijan-teny fototra. –ny Paska: jereo Eks 12.1-20. –volana voalohany: marsa-aprily.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: Saingy tao Akmeta
  - type: note
    content: Akmeta I Akmeta, renivohitry ny fanjakàn’i Media teo aloha, dia nisy fonenam-pahavaratra ho an’ny amperôra (i Hamadàna ankehitriny any Iran izany).
  - type: text
    content: ', izay tanànamimanda ao amin’ny faritr’i Media, no nahitana horonan-taratasy anankiray mirakitra izao filazana an-tsoratra izao:'
  '20':
  - type: text
    content: 'Samy efa nanao '
  - type: text
    content: fidiovan-tena
  - type: text
    content: ' rahateo ny '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy ny '
  - type: text
    content: levita
  - type: text
    content: ', ka dia nadio izy rehetra; hany ka afaka namono ny zanakondrin’ny Paska ireo levita na ho an’ny sarambabem-bahoaka na ho an’ny mpisorona mpiray foko aminy na ho an’ny tenany. '
  '21':
  - type: text
    content: 'Nihinana ny sakafo Paska avokoa ny Israelita rehetra nody avy any an-tsesitany; niaraka taminy koa ny namany efa nandao ny fiainan-dratsin’ireo valovotaka sy nanompo an’Ilay TOMPO Andriamanitr’i Israely. '
  '22':
  - type: text
    content: 'Tamim-pifaliana no nanaovan’ireo Israelita ny fankalazana ny '
  - type: text
    content: mofo tsy misy leviora
  - type: text
    content: ' nandritra ny fito andro. Fa nampifaly azy tokoa ny TOMPO noho Izy nampiova ny amperôra'
  - type: note
    content: 'Ny rijan-teny hebreo eto dia miteny ny hoe amperôran’i Asiria: anaram-boninahitra manondro ny amperôran’i Persia izany noho izy nanitatra ny fanapahany hatrany amin’ny fanjakana asirianina fahiny.'
  - type: text
    content: ' hamindrafo amin’ny Israelita; izany rahateo no nampahery azy tamin’ny asa momba ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ', dia Ilay Andriamanitr’i Israely.'
  '3':
  - type: text
    content: '«Tamin’ny taona voalohany nanjakàn’ny amperôra Kirôsa, dia namoaka didy izy nanao hoe: Ny amin’ilay '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' dia aoka haorina indray izany mba hanoloran-'
  - type: text
    content: tsorona
  - type: text
    content: ', ka ny fototra taloha no hampiasaina. Ho telopolo metatra ny haavon’ny trano ary ho telopolo metatra koa ny sakany; '
  '4':
  - type: text
    content: vato vaventy telo andalana sy hazo matevina iray andalana
  - type: note
    content: Jereo 1 Mp 6.36.
  - type: text
    content: ' no hampifandimbiasina amin’izany. Aoka haloa avy amin’ny tranon’ny amperôra izay lany. '
  '5':
  - type: text
    content: Ny fanak’ilay tranon’Andriamanitra koa, izany hoe ireo fanaka volamena sy volafotsy izay nalain’i Nebokadnetsara tao amin’ny tempolin’i Jerosalema ka nentiny ho any Babilôna, dia aoka haverina ho any amin’ny tempolin’i Jerosalema indray ka samy hapetraka amin’ny toerany ao an-tranon’Andriamanitra».
  '6':
  - type: text
    content: 'Noho izany dia nalefan’i Dariôsa izao taratasy izao:'
  - type: text
    content: «Any ianareo, ry Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy ry Setara-Bôzenay mbaminareo namany mpifehy
  - type: note
    content: Jereo 5.6 sy nta.
  - type: text
    content: ' ny Afarsekita any andafy andrefan’ny ony.'
  - type: text
    content: '«Mihataha tao ianareo '
  '7':
  - type: text
    content: 'ka avelao hotohizana ny fanaovana io tranon’Andriamanitra io; aoka ilay governoran’ny Jiosy sy ireo loholony hanorina indray io trano io amin’izay toerany taloha. '
  '8':
  - type: text
    content: 'Izao no didy avoakako ho anareo any amin’izay tokony hataonareo amin’ireo loholona jiosy hanorenany indray izany trano izany: aoka ny haren’ny amperôra, dia ny hetra avy amin’ny faritra andrefan’ny ony no handoavana izay lany marina ho an’ireo lehilahy ireo mba tsy hiatoatoan’ny asa. '
  '9':
  - type: text
    content: 'Ny zavatra ilain’ny mpisorona ao Jerosalema dia omena azy isan’andro isan’andro tsy tapaka: na ny ombilahy sy ondrilahy ary zanakondry hanaovana sorona dorana manontolo ho an’Ilay Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ', na koa ny varimbazaha sy sira na divay sy menaka, samy araka ny fandaharana ataon’ireo mpisorona. '
