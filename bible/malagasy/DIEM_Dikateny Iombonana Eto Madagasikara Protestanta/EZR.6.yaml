document_id: EZR.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Valin-tenin’ny amperôra Dariôsa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanome baiko ny amperôra Dariôsa mba hizahana ny trano fitehirizan-taratasy sady fitehirizan-drakitra tao Babilôna. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia afaka hanolotra sorona ho hanitra ankasitrahina ho an’Ilay Andriamanitry ny lanitra ry zareo, no hivavaka mba ho ela velona ny amperôra mbamin’ny zanany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamoaka didy koa aho fa na iza na iza mandika izao teny izao, dia aoka hangalana hazo anankiray avy amin’ny tranony ary hatsatoka izany ka hahantona eo ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hahantona '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hofantsihana.
      marker-yv: yv-n
    - type: text
      text: '; fa ny tranony kosa dia aoka hatao fanariam-piringa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Andriamanitra Izay efa nampitoetra ny anarany eo amin’io toerana io anie handringana ny mpanjaka sy firenena rehetra izay handika ny didiko ka haninji-tanana handrava io tranon’Andriamanitra any Jerosalema io. Izaho Dariôsa no namoaka ny didy; aoka hotovina an-tsakany sy an-davany izany».
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay ry Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy ry Setara-Bôzenay mbamin’ireo namany dia nankatò an-tsakany sy an-davany izany teny nalefan’i Dariôsa ho azy izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahavitan’ny tempoly sy fitokanana azy
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanohy ny taotrano ireo loholona jiosy ka nambinina, araka ny hafatra nentin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' Hagay sy ny mpaminany Zakarià'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Hag 1.1; Zak 1.1.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Hidao. Nanorina ka nahavita ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ry zareo, araka ny didin’Ilay Andriamanitr’i Israely sy araka ny baikon-dry i Kirôsa sy i Dariôsa ary i Artakserksesa, amperôran’i Persia. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny andro fahatelon’ny volana Adara, nandritra ny taona fahenina nanjakan’ny amperôra Dariôsa, no nahavitan’ny tempoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
