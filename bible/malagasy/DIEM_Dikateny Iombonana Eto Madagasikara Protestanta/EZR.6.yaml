        - type: text
          text: Hamadàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ankehitriny any Iran izany).'
      marker-yv: yv-n
    - type: text
      text: ', izay tanànamimanda ao amin’ny faritr’i Media, no nahitana horonan-taratasy anankiray mirakitra izao filazana an-tsoratra izao:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy efa nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fidiovan-tena
    - type: text
      text: ' rahateo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorona
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ', ka dia nadio izy rehetra; hany ka afaka namono ny zanakondrin’ny Paska ireo levita na ho an’ny sarambabem-bahoaka na ho an’ny mpisorona mpiray foko aminy na ho an’ny tenany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihinana ny sakafo Paska avokoa ny Israelita rehetra nody avy any an-tsesitany; niaraka taminy koa ny namany efa nandao ny fiainan-dratsin’ireo valovotaka sy nanompo an’Ilay TOMPO Andriamanitr’i Israely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamim-pifaliana no nanaovan’ireo Israelita ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mofo tsy misy leviora
    - type: text
      text: ' nandritra ny fito andro. Fa nampifaly azy tokoa ny TOMPO noho Izy nampiova ny amperôra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny rijan-teny hebreo eto dia miteny ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amperôran’i Asiria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': anaram-boninahitra manondro ny amperôran’i Persia izany noho izy nanitatra ny fanapahany hatrany amin’ny fanjakana asirianina fahiny.'
      marker-yv: yv-n
    - type: text
      text: ' hamindrafo amin’ny Israelita; izany rahateo no nampahery azy tamin’ny asa momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: ', dia Ilay Andriamanitr’i Israely.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Tamin’ny taona voalohany nanjakàn’ny amperôra Kirôsa, dia namoaka didy izy nanao hoe: Ny amin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’Andriamanitra
    - type: text
      text: ' dia aoka haorina indray izany mba hanoloran-'
    - type: usfm
      marker: w
      children:
      - type: text
        text: tsorona
    - type: text
      text: ', ka ny fototra taloha no hampiasaina. Ho telopolo metatra ny haavon’ny trano ary ho telopolo metatra koa ny sakany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: vato vaventy telo andalana sy hazo matevina iray andalana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 6.36.
      marker-yv: yv-n
    - type: text
      text: ' no hampifandimbiasina amin’izany. Aoka haloa avy amin’ny tranon’ny amperôra izay lany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanak’ilay tranon’Andriamanitra koa, izany hoe ireo fanaka volamena sy volafotsy izay nalain’i Nebokadnetsara tao amin’ny tempolin’i Jerosalema ka nentiny ho any Babilôna, dia aoka haverina ho any amin’ny tempolin’i Jerosalema indray ka samy hapetraka amin’ny toerany ao an-tranon’Andriamanitra».
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany dia nalefan’i Dariôsa izao taratasy izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Any ianareo, ry Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy ry Setara-Bôzenay mbaminareo namany mpifehy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' ny Afarsekita any andafy andrefan’ny ony.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Mihataha tao ianareo '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka avelao hotohizana ny fanaovana io tranon’Andriamanitra io; aoka ilay governoran’ny Jiosy sy ireo loholony hanorina indray io trano io amin’izay toerany taloha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no didy avoakako ho anareo any amin’izay tokony hataonareo amin’ireo loholona jiosy hanorenany indray izany trano izany: aoka ny haren’ny amperôra, dia ny hetra avy amin’ny faritra andrefan’ny ony no handoavana izay lany marina ho an’ireo lehilahy ireo mba tsy hiatoatoan’ny asa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zavatra ilain’ny mpisorona ao Jerosalema dia omena azy isan’andro isan’andro tsy tapaka: na ny ombilahy sy ondrilahy ary zanakondry hanaovana sorona dorana manontolo ho an’Ilay Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lanitra
    - type: text
      text: ', na koa ny varimbazaha sy sira na divay sy menaka, samy araka ny fandaharana ataon’ireo mpisorona. '
