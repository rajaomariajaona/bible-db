      - type: usfm
        marker: ft
        children:
        - type: text
          text: volana faha-12 (izany hoe febroary-marsa) teo amin’ny taona manomboka lohataona. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: taona fahenina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': taona 515 tal J.K.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Israelita nody avy any an-tsesitany, na '
    - type: usfm
      marker: w
