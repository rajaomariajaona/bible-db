    - type: text
      text: ' na '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' na ny sarambabem-bahoaka, dia nitokana ny tranon’Andriamanitra tamim-pifaliana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' natolotra tamin’io fitokanana io dia ombilahy zato sy ondrilahy roanjato ary zanakondry efajato; ary ny ho sorona fanalana ny ota ho an’ny vahoaka Israely manontolo dia osilahy 12, izany hoe anankiray isam-poko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy fanendrena ny mpisorona sy ny levita ho amin’ny antokony avy sy araka ny andraikiny avy, mba hanao ny fanompoana an’Ilay Andriamanitra Izay ao Jerosalema, araka ny voasoratra ao anatin’ny bokin’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fankalazana ny Paska
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro faha-14 tamin’ny volana voalohan’ny taona manaraka dia nankalaza ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' ireo olona nody avy any an-tsesitany'
    - type: usfm
