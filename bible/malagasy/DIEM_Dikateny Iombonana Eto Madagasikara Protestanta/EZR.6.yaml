        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manomboka eo amin’ny 6.19, dia miverina ho hebreo indray ny rijan-teny fototra. –
      - type: usfm
