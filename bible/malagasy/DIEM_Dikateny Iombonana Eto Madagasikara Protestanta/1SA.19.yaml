document_id: 1SA.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jônatàna mijoro hiaro an’i Davida
  - type: text
    content: 'Nampahafantarin’i Saoly an’i Jônatàna zanany sy ireo minisitra rehetra ny fikasany hahafaty an’i Davida. Nefa i Jônatàna tia fatratra an’i Davida, '
  '10':
  - type: text
    content: 'Notorahan’i Saoly lefona hifantsika amin’ny rindrina i Davida, saingy nahay niala izy ka ny rindrina no voa. Afa-nandositra i Davida fa tsy maty fo aman’aina. Iny alina iny ihany, '
  '11':
  - type: text
    content: i Saoly dia nandefa olona hiambina ny tranon’i Davida ary hamono azy ho faty ny ampitso maraina
  - type: note
    content: Jereo Sal 59.1.
  - type: text
    content: '. Fa i Mikàla vadin’i Davida kosa nampandre azy ka nanao taminy hoe:'
  - type: text
    content: –Raha tsy manavotra ny ainao izao alina izao ianao, dia ho faty tokoa rahampitso!
  '12':
  - type: text
    content: 'Dia nampidinin’i Mikàla teo am-baravarankely i Davida ka afa-nandositra nanavotra ny ainy. '
  '13':
  - type: text
    content: 'Nalain’i Mikàla ny sampim-pianakaviana ka nampandriany teo am-parafaran’i Davida, dia nampiondaniny volon’osy ary norakofany lamba. '
  '14':
  - type: text
    content: 'Koa rehefa tonga hisambotra an’i Davida ireo irak’i Saoly, dia hoy i Mikàla tamin’izy ireo:'
  - type: text
    content: –Marary izy.
  '15':
  - type: text
    content: 'Fa nalefan’i Saoly hijery an’i Davida fanindroany ireo iraka sady nohafarany hoe:'
  - type: text
    content: –Ento atỳ amiko amin’ny farafara izy fa tsy maintsy matiko!
  '16':
  - type: text
    content: Dia niverina tany ireo iraky ny mpanjaka, kanjo indro sampy mandry eo am-parafara, miondana volon’osy, no hitany.
  '17':
  - type: text
    content: 'Ka hoy i Saoly tamin’i Mikàla:'
  - type: text
    content: –Nahoana aho no nofitahinao toy izao? Ary nahoana no navelanao handositra ny fahavaloko?
  - type: text
    content: 'Fa izao no navalin’i Mikàla azy:'
  - type: text
    content: '–Izy mihitsy no niteny tamiko hoe: «Avelao aho handeha, sao ho matiko eo ianao.»'
  - type: heading
    content: I Davida sy i Saoly tao Naiôta
  '18':
  - type: text
    content: Toy izany no nahavoavonjy an’i Davida raha nandositra izy. Dia tonga tany amin’i Samoela tany Ramà izy, ka nitantara taminy izay rehetra nafitsok’i Saoly azy. Ary nandeha tany Naiôta
  - type: note
    content: 'Ramà: jereo 1.1 sy nta. –Naiôta: toerana tsy fantatra mazava ny misy azy; kanefa mety midika hoe efitrano io voambolana io ka manondro ny fonenan’ireo mpaminany andiany.'
  - type: text
    content: ' izy mianaka ka niara-nonina tao. '
  '19':
  - type: text
    content: 'Nisy nanambara tamin’i Saoly fa ao Naiôta akaikin’i Ramà i Davida. '
  '2':
  - type: text
    content: 'ka nampitandrina azy hoe:'
  - type: text
    content: '–Mihevitra ny hahafaty anao i Saoly raiko; koa mitandrema tsara ianao rahampitso maraina; miere amin’izay fiafenana azo antoka ka mitoera ao. '
  '20':
  - type: text
    content: 'Dia naniraka olona indray i Saoly hisambotra an’i Davida. Rehefa hitan’izy ireo anefa ny andiana mpaminany izay tarihin’i Samoela fa tsindrian-daona maminany, dia nohetsehin’ny Fanahin’Andriamanitra ireto irak’i Saoly, ka nanomboka naminany koa. '
  '21':
  - type: text
    content: 'Raha vao ren’i Saoly izany vaovao izany, dia naniraka olon-kafa izy, nefa tsindrian-daona naminany ihany koa izy ireo. Naniraka andiany fahatelo indray i Saoly, ary dia mbola toy ny teo aloha ihany no niseho. '
  '22':
  - type: text
    content: Farany dia izy tenany mihitsy no nankany Ramà. Rehefa tonga teo amin’ny lavaka lehibe famorian-drano akaikin’i Sekò
  - type: note
    content: 'Sekò: toerana tsy fantatra mazava ny misy azy.'
  - type: text
    content: ' izy, dia nanontany hoe:'
  - type: text
    content: –Aiza moa i Samoela sy i Davida?
  - type: text
    content: 'Ka hoy ny navalin’ny olona azy hoe:'
  - type: text
    content: –Any Naiôta, akaikin’i Ramà.
  '23':
  - type: text
    content: 'Dia lasa nankany Naiôta akaikin’i Ramà i Saoly. Teny an-dalana dia tonga taminy ny Fanahin’Andriamanitra, ka tsindrian-daona naminany mandra-pahatongany tany Naiôta izy. '
  '24':
  - type: text
    content: 'Nanala ny fitafiany tahaka ireo hafa izy, dia mba naminany teo anatrehan’i Samoela ihany koa, ary nidaboka tamin’ny tany sady nitanjaka iny andro sy alina manontolo izy. Izany no nanaovan’ny olona hoe: «Mba tonga anisan’ny mpaminany koa ve i Saoly'
  - type: note
    content: Jereo 10.11.
  - type: text
    content: ?»
  '3':
  - type: text
    content: Hiainga hiaraka amin-draiko aho ka hanaraka azy any amin’ny saha hierenao. Hiresaka ny momba anao aminy aho, ka ho hitako eo izay ho fihetsiny, fa hampahafantariko anao.
  '4':
  - type: text
    content: 'Ary i Jônatàna nandoka ny hatsaran’i Davida tamin-drainy, ka niteny hoe:'
  - type: text
    content: '–Aza asianao ratsy i Davida mpanomponao, ry mpanjaka, fa tsy mba nanao izany taminao izy, sady ny soa ho anao hatrany no nikelezany aina. '
  '5':
  - type: text
    content: Nivarotra aina mihitsy izy namono nahafaty an’i Gôliata ilay Filistinina, ka dia fandresena lehibe ho an’i Israely no azo avy amin’ny TOMPO, ary faly erỳ ianao raha nahita izany. Koa nahoana ankehitriny no hanisy ratsy olona tsy manan-tsiny ianao ka hahafaty an’i Davida tsy amin’antony?
  '6':
  - type: text
    content: 'Resy lahatry ny tenin’i Jônatàna i Saoly ka nanambara hoe:'
  - type: text
    content: –Velona ny TOMPO ka mianiana aho fa tsy hatao maty akory i Davida.
  '7':
  - type: text
    content: Dia nantsoin’i Jônatàna i Davida ka nilazany izany resaka rehetra izany; avy teo i Davida dia nentiny nankany amin’i Saoly, ary nanompo ny mpanjaka toy ny teo aloha indray.
  - type: heading
    content: I Davida voavonjin’i Mikàla
  '8':
  - type: text
    content: Nirongatra indray ny ady, dia lasa i Davida niady tamin’ny Filistinina ka nampitondra faisana mafy azy; hany herin’izy ireo dia ny nandositra teo anatrehany.
  '9':
  - type: text
    content: 'Indray andro dia tonga tamin’i Saoly ny fanahy ratsy nalefan’ny TOMPO, raha nipetraka tao an-tranony ka nihazon-defona izy. Teo am-pitendrena harpa i Davida tamin’izay. '
