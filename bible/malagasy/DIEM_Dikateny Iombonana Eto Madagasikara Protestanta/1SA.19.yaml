document_id: 1SA.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jônatàna mijoro hiaro an’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampahafantarin’i Saoly an’i Jônatàna zanany sy ireo minisitra rehetra ny fikasany hahafaty an’i Davida. Nefa i Jônatàna tia fatratra an’i Davida, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notorahan’i Saoly lefona hifantsika amin’ny rindrina i Davida, saingy nahay niala izy ka ny rindrina no voa. Afa-nandositra i Davida fa tsy maty fo aman’aina. Iny alina iny ihany, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: i Saoly dia nandefa olona hiambina ny tranon’i Davida ary hamono azy ho faty ny ampitso maraina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 59.1.
      marker-yv: yv-n
    - type: text
      text: '. Fa i Mikàla vadin’i Davida kosa nampandre azy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsy manavotra ny ainao izao alina izao ianao, dia ho faty tokoa rahampitso!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampidinin’i Mikàla teo am-baravarankely i Davida ka afa-nandositra nanavotra ny ainy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nalain’i Mikàla ny sampim-pianakaviana ka nampandriany teo am-parafaran’i Davida, dia nampiondaniny volon’osy ary norakofany lamba. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa tonga hisambotra an’i Davida ireo irak’i Saoly, dia hoy i Mikàla tamin’izy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Marary izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nalefan’i Saoly hijery an’i Davida fanindroany ireo iraka sady nohafarany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento atỳ amiko amin’ny farafara izy fa tsy maintsy matiko!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina tany ireo iraky ny mpanjaka, kanjo indro sampy mandry eo am-parafara, miondana volon’osy, no hitany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Saoly tamin’i Mikàla:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana aho no nofitahinao toy izao? Ary nahoana no navelanao handositra ny fahavaloko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no navalin’i Mikàla azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izy mihitsy no niteny tamiko hoe: «Avelao aho handeha, sao ho matiko eo ianao.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida sy i Saoly tao Naiôta
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no nahavoavonjy an’i Davida raha nandositra izy. Dia tonga tany amin’i Samoela tany Ramà izy, ka nitantara taminy izay rehetra nafitsok’i Saoly azy. Ary nandeha tany Naiôta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ramà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1.1 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Naiôta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': toerana tsy fantatra mazava ny misy azy; kanefa mety midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: efitrano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' io voambolana io ka manondro ny fonenan’ireo mpaminany andiany.'
      marker-yv: yv-n
    - type: text
      text: ' izy mianaka ka niara-nonina tao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy nanambara tamin’i Saoly fa ao Naiôta akaikin’i Ramà i Davida. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nampitandrina azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihevitra ny hahafaty anao i Saoly raiko; koa mitandrema tsara ianao rahampitso maraina; miere amin’izay fiafenana azo antoka ka mitoera ao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka olona indray i Saoly hisambotra an’i Davida. Rehefa hitan’izy ireo anefa ny andiana mpaminany izay tarihin’i Samoela fa tsindrian-daona maminany, dia nohetsehin’ny Fanahin’Andriamanitra ireto irak’i Saoly, ka nanomboka naminany koa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao ren’i Saoly izany vaovao izany, dia naniraka olon-kafa izy, nefa tsindrian-daona naminany ihany koa izy ireo. Naniraka andiany fahatelo indray i Saoly, ary dia mbola toy ny teo aloha ihany no niseho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Farany dia izy tenany mihitsy no nankany Ramà. Rehefa tonga teo amin’ny lavaka lehibe famorian-drano akaikin’i Sekò
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sekò: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava ny misy azy.
      marker-yv: yv-n
    - type: text
      text: ' izy, dia nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa i Samoela sy i Davida?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’ny olona azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Any Naiôta, akaikin’i Ramà.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nankany Naiôta akaikin’i Ramà i Saoly. Teny an-dalana dia tonga taminy ny Fanahin’Andriamanitra, ka tsindrian-daona naminany mandra-pahatongany tany Naiôta izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanala ny fitafiany tahaka ireo hafa izy, dia mba naminany teo anatrehan’i Samoela ihany koa, ary nidaboka tamin’ny tany sady nitanjaka iny andro sy alina manontolo izy. Izany no nanaovan’ny olona hoe: «Mba tonga anisan’ny mpaminany koa ve i Saoly'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.11.
      marker-yv: yv-n
    - type: text
      text: ?»
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Hiainga hiaraka amin-draiko aho ka hanaraka azy any amin’ny saha hierenao. Hiresaka ny momba anao aminy aho, ka ho hitako eo izay ho fihetsiny, fa hampahafantariko anao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Jônatàna nandoka ny hatsaran’i Davida tamin-drainy, ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza asianao ratsy i Davida mpanomponao, ry mpanjaka, fa tsy mba nanao izany taminao izy, sady ny soa ho anao hatrany no nikelezany aina. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nivarotra aina mihitsy izy namono nahafaty an’i Gôliata ilay Filistinina, ka dia fandresena lehibe ho an’i Israely no azo avy amin’ny TOMPO, ary faly erỳ ianao raha nahita izany. Koa nahoana ankehitriny no hanisy ratsy olona tsy manan-tsiny ianao ka hahafaty an’i Davida tsy amin’antony?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Resy lahatry ny tenin’i Jônatàna i Saoly ka nanambara hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO ka mianiana aho fa tsy hatao maty akory i Davida.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nantsoin’i Jônatàna i Davida ka nilazany izany resaka rehetra izany; avy teo i Davida dia nentiny nankany amin’i Saoly, ary nanompo ny mpanjaka toy ny teo aloha indray.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida voavonjin’i Mikàla
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nirongatra indray ny ady, dia lasa i Davida niady tamin’ny Filistinina ka nampitondra faisana mafy azy; hany herin’izy ireo dia ny nandositra teo anatrehany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia tonga tamin’i Saoly ny fanahy ratsy nalefan’ny TOMPO, raha nipetraka tao an-tranony ka nihazon-defona izy. Teo am-pitendrena harpa i Davida tamin’izay. '
