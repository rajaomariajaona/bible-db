document_id: GEN.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny fanomezan-toky nataon’Andriamanitra tamin’i Noà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Andriamanitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' an’i Noà sy ireo zanany lahy hoe: «Maroa fara sy mihabetsaha ka mamenoa ny tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary amin’ny zava-mananaina rehetra eo aminareo na ny vorona, na ny biby fiompy na ny bibidia, dia izay rehetra nivoaka tamin’ny sambofiara niaraka taminareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no fanekempihavanana haoriko aminareo: tsy hisy rano avy amin’ny safo-drano intsony handripaka ny nofo rehetra, ary tsy hisy safo-drano hanimba ny tany intsony mandrakizay.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia mbola nampian’Andriamanitra hoe: «Izao no ataoko mariky ny fanekempihavanantsika ho Ahy sy ho anareo ary ho an’ny zava-mananaina rehetra miaraka aminareo hatramin’ny taranaka fara mandimby. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Apetrako eny amin’ny rahona ny avako ho mariky ny fanekempihavanana eo amiko sy amin’ny tany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ka isaky ny mampivondrona rahona eny ambonin’ny tany Aho ka miseho ny avana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia hotsarovako ny fanekempihavanako taminareo sy tamin’ny zava-mananaina rehetra, izany hoe ny voaary rehetra; ka tsy hisy intsony rano hanjary safo-drano handringana ny voaary rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ho eny amin’ny rahona ny avana ary hojereko mba hampahatsiaro Ahy ny fanekempihavanana mandrakizay eo amiko sy eo amin’ny zava-mananaina rehetra ary eo amin’ny voaary rehetra izay eny ambonin’ny tany.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia mbola naverin’Andriamanitra tamin’i Noà hoe: «Izany no famantarana momba ny fanekempihavanana izay naoriko ho amiko sy ho amin’ny voaary rehetra izay eny ambonin’ny tany.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fisarahana teo amin’ny zanak’i Noà telo lahy
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny zanakalahin’i Noà, izay nivoaka avy tao amin’ny sambofiara, dia i Sema sy i Hama ary i Jafeta. I Hama no rain’i Kanahàna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Izy telo lahy ireo no zanak’i Noà, ary avy tamin’ireo no niparitahan’ny olombelona eran-tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hisy tahotra sy horohoro anareo ao amin’ny biby rehetra eny ambonin’ny tany mbamin’ny voro-manidina sy ny bibikely ary ao amin’ny trondro rehetra anaty ranomasina, satria nomena ho eo am-pelatananareo ireny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I Noà no mpiasa tany voalohany namboly voaloboka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nisotro divay izy ka mamo ary nitanjaka tao an-dainy; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I Hama rain’i Kanahàna, rehefa nahita ny fitanjahan-drainy, dia lasa nampandre ireo rahalahiny roa tao ivelany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nalain’i Sema sy i Jafeta ny lamba ka nentiny an-tsoroka, ary nanao dia mianòtra izy mirahalahy ka nandrakotra ny fitanjahan-drainy. Fa nitodika nijery tany an-kafa ireo ka tsy nahita ny fitanjahan-drainy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nony efa nisava ny hamamoan’i Noà, ka fantany izay nataon’ny zanany faralahy taminy, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'dia hoy izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie i Kanahàna!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy ho faraidiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo mpanompon’ny rahalahiny!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia mbola nampiany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoderaina anie ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Andriamanitr’i Sema!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka i Kanahàna ho mpanompon’i Sema!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Hataon’Andriamanitra malalaka anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny toeran’i Jafeta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny matoanteny hebreo nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: malalaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia mampahatsiaro ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jafeta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanana fonenana ao amin’i Sema izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka i Kanahàna koa ho mpanompony!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Mbola velona 350 taona i Noà taorian’ny safo-drano. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia maty i Noà rehefa feno 950 taona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay rehetra velona sy mihetsiketsika dia omeko ho sakafonareo avokoa tahaka ny nanomezako ny anana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 1.29-30.
      marker-yv: yv-n
    - type: text
      text: ' ho anareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Kanefa kosa ny nofo miaraka amin’ny ainy, izany hoe miaraka amin’ny rany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lev 7.26-27; 17.10-14; Deot 12.16; 23; 20.13.
      marker-yv: yv-n
    - type: text
      text: ', dia aza haninareo mihitsy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny ranareo koa, izay ainareo, dia hadiniko amin’ny biby izay namono olona ho faty tahaka ny hanadinako ny olona namono ho faty ny olona toa azy. Eny, hadiniko ny momba ny ain’ny olona:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izay mandatsaka ran’olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia halatsak’olona koa ny rany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mitovy endrika amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanaovany ny olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mandatsaka ran’olona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Eks 20.13. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mitovy endrika amin’Andriamanitra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 1.26.'
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ianareo kosa dia maroa fara sy mihabetsaha eo amin’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampit Gen 1.28 '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Indro Aho manao teny fampanantenana aminareo.
      marker-yv: yv-n
    - type: text
      text: ary mitomboa be dia be eo aminy.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy koa Andriamanitra tamin’i Noà sy ireo zanany lahy niaraka taminy: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Indro Aho hanorina ny fanekempihavanako aminareo sy amin’ny taranakareo mandimby anareo, '
