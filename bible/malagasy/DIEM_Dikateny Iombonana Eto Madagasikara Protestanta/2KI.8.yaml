document_id: 2KI.8,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiafaran’ny tantaran’ilay vehivavy sonemita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indray andro dia niteny tamin’ilay vehivavy nanan-janakalahy maty nefa novelominy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.8-37.
      marker-yv: yv-n
    - type: text
      text: ' indray i Elisà, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mialà eto ianao sy ny fianakavianao ka mifindrà monina any amin’izay azonareo onenana; fa ny TOMPO handefa mosary eto amin’ny tanin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', ary efa ho tonga izany ka haharitra fito taona.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ka hoy ny navalin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana lazao izy fa ho sitrana marina tokoa! Kanefa ny TOMPO efa nanambara tamiko fa ho faty izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia nifantoka fijery sy ankona endrika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Marika mampiseho fa ny mpaminany dia eo am-pandraisana hafatra avy amin’ny Tompo ao anaty fahitana.
      marker-yv: yv-n
    - type: text
      text: ' ilay olon’Andriamanitra; avy eo izy vao nitomany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa nanontany azy i Hazaela hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ianao no mitomany, tompoko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny navalin’i Elisà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Satria fantatro ny ratsy izay hataonao amin’ny Israelita: hodoranao ny tanànamimandany; hovonoinao ho faty amin’ny sabatra ny tanorany, homontsaninao ny ankizikeliny, ary hotatahinao kibo ny vehivavy bevohòka eo aminy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy i Hazaela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa zinona moa ity tenako tsy manam-pahefana sady bitika ity no dia hahavita zavatra toy izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Elisà namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nambaran’ny TOMPO tamiko fa ho mpanjakan’i Siria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 19.15.
      marker-yv: yv-n
    - type: text
      text: ' ianao.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nandao an’i Elisà i Hazaela ka niverina tany amin’ny tompony izay nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana hoy i Elisà taminao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa ny navalin’i Hazaela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nilaza tamiko izy fa ho sitrana tokoa ianao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nony ampitso anefa, dia naka bodofotsy anankiray i Hazaela; natsobony tao anaty rano izany ka nasarony ny tavan’i Bena-Hadada hanempotra azy. Dia maty ny mpanjaka, ary i Hazaela no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jôrama mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 21.2-20)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tamin’ny taona fahadimy nanjakan’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' no tonga mpanjakan’i Joda i Jôrama zanakalahin’i Jôsafata, na dia mbola mpanjakan’i Joda aza i Jôsafata'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na dia... Jôsafata: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mety midika izany fa nanankim-pahefana tamin’i Jôrama zanany lahy i Jôsafata ka tonga mpanjaka alohan’ny tena hahafatesan’i Jôsafata izy.
      marker-yv: yv-n
    - type: text
      text: '. Feno 32 taona izy fony vao nanjaka, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary naharitra valo taona no nanjakany tao Jerosalema. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny toetran’ireo mpanjakan’i Israely no narahiny, dia tahaka ny fanaon’ny taranak’i Ahaba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I Hatalià no ambara amin’izany, jereo and 26.
      marker-yv: yv-n
    - type: text
      text: ', satria nanambady ny zanakavavin’i Ahaba izy ka nanao izay ratsy eo imason’ny TOMPO. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy nandringana an’i Joda anefa ny TOMPO noho ny amin’i Davida mpanompony, izay efa nampanantenainy fa ny taranany dia hanjaka mandrakizay ao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Sam 7.12-16; 1 Mp 11.36.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niala teo ilay vehivavy ka nanao araka ny tenin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: ' taminy; ary lasa izy sy ny fianakaviany nifindra monina nandritra ny fito taona tany amin’ny tanin’ny Filistinina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tamin’ny andron’i Jôrama no nikomian’ny Edômita tamin’ny fahefana jodeanina ka nananganany mpanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 27.40.
      marker-yv: yv-n
    - type: text
      text: ' ho azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nankany Tsahirà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsahirà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava, saingy mety ho any amin’ny tanin’i Edôma na akaikiny.
      marker-yv: yv-n
    - type: text
      text: ' niaraka tamin’ny kalesiny rehetra manko i Jôrama. Nony voahodidin’ny Edômita ny tenany mbamin’ireo komandin-kalesiny, dia voatery nitsoaka nanao latsaka alina tamin’ny Edômita; ary nandositra nankany an-dainy ny tafika jodeanina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hatreo dia nanohitra ny fahefana jodeanina ny Edômita mandraka androany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay fotoana izay koa no nikomian’ny tanànan’i Libnà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Libnà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna sahabo ho 40 km andrefan’i Jerosalema; lasa teo ambany fifehezan’ny Filistinina i Libnà tamin’izay.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jôrama ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’ireo mpanjakan’i Joda.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany i Jôrama, dia nalevina tao amin’ny fasam-pianakaviany tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: ; ary i Ahazià zanany lahy no nanjaka nandimby azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Ahazià, mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 22.1-6)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tamin’ny taona faha-12 nanjakan’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' no tonga mpanjakan’i Joda i Ahazià zanakalahin’i Jôrama. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Feno 22 taona i Ahazià fony vao nanjaka, ary herintaona ihany no nanjakany tany Jerosalema. Hatalià no anaran-dreniny izay vavimatoan’i Hômrỳ mpanjakan’i Israely. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny toetran’ireo taranak’i Ahaba no narahin’i Ahazià; ka nanao izay ratsy eo imason’ny TOMPO tahaka ny nataon’ireo izy sady vinanton’ny taranak’i Ahaba ihany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Niara-dia tamin’i Jôrama zanakalahin’i Ahaba izy mba hiady amin’i Hazaela mpanjakan’i Siria tany Ramôta Gilehada kanjo naratran’ny Sirianina i Jôrama. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary niverina tao Jizrehela i Jôrama mpanjaka mba hotsaboina tamin’ny ratra nahavoa azy tany Ramôta, fony izy niady tamin’i Hazaela mpanjakan’i Siria. Dia nankany Jizrehela i Ahazià, zanakalahin’i Jôrama sady mpanjakan’i Joda, mba hamangy an’i Jôrama zanakalahin’i Ahaba noho izy narary.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nony afaka fito taona dia nody avy tany amin’ny tanin’ny Filistinina ravehivavy ka nangataka hihaona amin’ny mpanjaka mba hitaky ny tranony sy ny taniny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nalain’ny mpifanolo-bodirindrina tamin’ny tsy nahateo azy ny tany.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tamin’izay kosa ny mpanjaka dia niresaka tamin’i Gehazỳ mpanompon’i Elisà. Nangatahiny izy mba hilaza aminy izay zava-dehibe rehetra nataon’ny mpaminany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Raha mbola notantarain’i Gehazỳ tamin’ny mpanjaka ny amin’ilay zaza maty izay novelomin’i Elisà, dia indro tonga nitaky ny tranony sy ny taniny tamin’ny mpanjaka ilay vehivavy. Ary hoy i Gehazỳ:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Io ilay vehivavy sy ny zanany izay novelomin’i Elisà indray, ry andriamanjaka!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nanontanian’ny mpanjaka ilay vehivavy, ka nitantara ny zava-drehetra. Ary nasain’ny mpanjaka nokarakarain’ny manamboninahitra iray ny raharahan-dravehivavy, ka hoy izy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avereno aminy avokoa ny fananany rehetra ary onero ny vokatry ny taniny manomboka amin’ny andro nandaozany azy ka mandraka ankehitriny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elisà sy i Hazaela
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Indray andro dia tonga tany Damasy i Elisà. Narary i Bena-Hadada mpanjakan’i Siria tamin’izay; ary rehefa nisy nilaza taminy fa ao an-tanàna ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: olon’Andriamanitra
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia hoy izy tamin’i Hazaela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 19.15. Mety ho niasa tao amin’ny lapan’ny mpanjaka tao Damasy i Hazaela.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitondrà fanomezana ka mandehana mihaona amin’i Elisà; dia asaivo manontany ny TOMPO izy raha toa ka ho sitrana amin’izao aretiko izao ihany aho.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia lasa nihaona tamin’i Elisà i Hazaela nombàm-panomezana nentin’ny rameva efapolo, dia izay zava-tsoa isan-karazany tao Damasy. Rehefa tonga izy, dia nitsangana teo anatrehan’ny mpaminany sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Bena-Hadada, mpanoa anao sady mpanjakan’i Siria, no naniraka ahy hankatỳ aminao mba hanontany anao raha ho sitrana amin’izao aretina izao ihany izy.
