document_id: 2KI.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiafaran’ny tantaran’ilay vehivavy sonemita
  - type: text
    content: Indray andro dia niteny tamin’ilay vehivavy nanan-janakalahy maty nefa novelominy
  - type: note
    content: Jereo 4.8-37.
  - type: text
    content: ' indray i Elisà, ka nanao hoe:'
  - type: text
    content: '–Mialà eto ianao sy ny fianakavianao ka mifindrà monina any amin’izay azonareo onenana; fa ny TOMPO handefa mosary eto amin’ny tanin’i '
  - type: text
    content: Israely
  - type: text
    content: ', ary efa ho tonga izany ka haharitra fito taona.'
  '10':
  - type: text
    content: 'Ka hoy ny navalin’i Elisà:'
  - type: text
    content: –Mandehana lazao izy fa ho sitrana marina tokoa! Kanefa ny TOMPO efa nanambara tamiko fa ho faty izy.
  '11':
  - type: text
    content: Dia nifantoka fijery sy ankona endrika
  - type: note
    content: Marika mampiseho fa ny mpaminany dia eo am-pandraisana hafatra avy amin’ny Tompo ao anaty fahitana.
  - type: text
    content: ' ilay olon’Andriamanitra; avy eo izy vao nitomany. '
  '12':
  - type: text
    content: 'Fa nanontany azy i Hazaela hoe:'
  - type: text
    content: –Nahoana ianao no mitomany, tompoko?
  - type: text
    content: 'Ka hoy ny navalin’i Elisà:'
  - type: text
    content: '–Satria fantatro ny ratsy izay hataonao amin’ny Israelita: hodoranao ny tanànamimandany; hovonoinao ho faty amin’ny sabatra ny tanorany, homontsaninao ny ankizikeliny, ary hotatahinao kibo ny vehivavy bevohòka eo aminy.'
  '13':
  - type: text
    content: 'Dia hoy i Hazaela:'
  - type: text
    content: –Fa zinona moa ity tenako tsy manam-pahefana sady bitika ity no dia hahavita zavatra toy izany?
  - type: text
    content: 'Ary i Elisà namaly hoe:'
  - type: text
    content: –Efa nambaran’ny TOMPO tamiko fa ho mpanjakan’i Siria
  - type: note
    content: Jereo 1 Mp 19.15.
  - type: text
    content: ' ianao.'
  '14':
  - type: text
    content: 'Dia nandao an’i Elisà i Hazaela ka niverina tany amin’ny tompony izay nanontany azy hoe:'
  - type: text
    content: –Ahoana hoy i Elisà taminao?
  - type: text
    content: 'Hoy kosa ny navalin’i Hazaela:'
  - type: text
    content: –Nilaza tamiko izy fa ho sitrana tokoa ianao.
  '15':
  - type: text
    content: Nony ampitso anefa, dia naka bodofotsy anankiray i Hazaela; natsobony tao anaty rano izany ka nasarony ny tavan’i Bena-Hadada hanempotra azy. Dia maty ny mpanjaka, ary i Hazaela no nanjaka nandimby azy.
  - type: heading
    content: I Jôrama mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 21.2-20)
  '16':
  - type: text
    content: 'Tamin’ny taona fahadimy nanjakan’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Jôrama zanakalahin’i Jôsafata, na dia mbola mpanjakan’i Joda aza i Jôsafata'
  - type: note
    content: 'na dia... Jôsafata: mety midika izany fa nanankim-pahefana tamin’i Jôrama zanany lahy i Jôsafata ka tonga mpanjaka alohan’ny tena hahafatesan’i Jôsafata izy.'
  - type: text
    content: '. Feno 32 taona izy fony vao nanjaka, '
  '17':
  - type: text
    content: 'ary naharitra valo taona no nanjakany tao Jerosalema. '
  '18':
  - type: text
    content: Ny toetran’ireo mpanjakan’i Israely no narahiny, dia tahaka ny fanaon’ny taranak’i Ahaba
  - type: note
    content: I Hatalià no ambara amin’izany, jereo and 26.
  - type: text
    content: ', satria nanambady ny zanakavavin’i Ahaba izy ka nanao izay ratsy eo imason’ny TOMPO. '
  '19':
  - type: text
    content: Tsy nandringana an’i Joda anefa ny TOMPO noho ny amin’i Davida mpanompony, izay efa nampanantenainy fa ny taranany dia hanjaka mandrakizay ao Jerosalema
  - type: note
    content: Jereo 2 Sam 7.12-16; 1 Mp 11.36.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Dia niala teo ilay vehivavy ka nanao araka ny tenin’ilay '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ' taminy; ary lasa izy sy ny fianakaviany nifindra monina nandritra ny fito taona tany amin’ny tanin’ny Filistinina. '
  '20':
  - type: text
    content: Tamin’ny andron’i Jôrama no nikomian’ny Edômita tamin’ny fahefana jodeanina ka nananganany mpanjaka
  - type: note
    content: Jereo Gen 27.40.
  - type: text
    content: ' ho azy. '
  '21':
  - type: text
    content: Nankany Tsahirà
  - type: note
    content: 'Tsahirà: toerana tsy fantatra mazava, saingy mety ho any amin’ny tanin’i Edôma na akaikiny.'
  - type: text
    content: ' niaraka tamin’ny kalesiny rehetra manko i Jôrama. Nony voahodidin’ny Edômita ny tenany mbamin’ireo komandin-kalesiny, dia voatery nitsoaka nanao latsaka alina tamin’ny Edômita; ary nandositra nankany an-dainy ny tafika jodeanina. '
  '22':
  - type: text
    content: Hatreo dia nanohitra ny fahefana jodeanina ny Edômita mandraka androany.
  - type: text
    content: Tamin’izay fotoana izay koa no nikomian’ny tanànan’i Libnà
  - type: note
    content: 'Libnà: tanàna sahabo ho 40 km andrefan’i Jerosalema; lasa teo ambany fifehezan’ny Filistinina i Libnà tamin’izay.'
  - type: text
    content: .
  '23':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôrama ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Jôrama, dia nalevina tao amin’ny fasam-pianakaviany tao an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: ; ary i Ahazià zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Ahazià, mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 22.1-6)
  '25':
  - type: text
    content: 'Tamin’ny taona faha-12 nanjakan’i Jôrama zanakalahin’i Ahaba sady mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Ahazià zanakalahin’i Jôrama. '
  '26':
  - type: text
    content: 'Feno 22 taona i Ahazià fony vao nanjaka, ary herintaona ihany no nanjakany tany Jerosalema. Hatalià no anaran-dreniny izay vavimatoan’i Hômrỳ mpanjakan’i Israely. '
  '27':
  - type: text
    content: Ny toetran’ireo taranak’i Ahaba no narahin’i Ahazià; ka nanao izay ratsy eo imason’ny TOMPO tahaka ny nataon’ireo izy sady vinanton’ny taranak’i Ahaba ihany.
  '28':
  - type: text
    content: 'Niara-dia tamin’i Jôrama zanakalahin’i Ahaba izy mba hiady amin’i Hazaela mpanjakan’i Siria tany Ramôta Gilehada kanjo naratran’ny Sirianina i Jôrama. '
  '29':
  - type: text
    content: Ary niverina tao Jizrehela i Jôrama mpanjaka mba hotsaboina tamin’ny ratra nahavoa azy tany Ramôta, fony izy niady tamin’i Hazaela mpanjakan’i Siria. Dia nankany Jizrehela i Ahazià, zanakalahin’i Jôrama sady mpanjakan’i Joda, mba hamangy an’i Jôrama zanakalahin’i Ahaba noho izy narary.
  '3':
  - type: text
    content: Nony afaka fito taona dia nody avy tany amin’ny tanin’ny Filistinina ravehivavy ka nangataka hihaona amin’ny mpanjaka mba hitaky ny tranony sy ny taniny
  - type: note
    content: Nalain’ny mpifanolo-bodirindrina tamin’ny tsy nahateo azy ny tany.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Tamin’izay kosa ny mpanjaka dia niresaka tamin’i Gehazỳ mpanompon’i Elisà. Nangatahiny izy mba hilaza aminy izay zava-dehibe rehetra nataon’ny mpaminany. '
  '5':
  - type: text
    content: 'Raha mbola notantarain’i Gehazỳ tamin’ny mpanjaka ny amin’ilay zaza maty izay novelomin’i Elisà, dia indro tonga nitaky ny tranony sy ny taniny tamin’ny mpanjaka ilay vehivavy. Ary hoy i Gehazỳ:'
  - type: text
    content: –Io ilay vehivavy sy ny zanany izay novelomin’i Elisà indray, ry andriamanjaka!
  '6':
  - type: text
    content: 'Dia nanontanian’ny mpanjaka ilay vehivavy, ka nitantara ny zava-drehetra. Ary nasain’ny mpanjaka nokarakarain’ny manamboninahitra iray ny raharahan-dravehivavy, ka hoy izy:'
  - type: text
    content: –Avereno aminy avokoa ny fananany rehetra ary onero ny vokatry ny taniny manomboka amin’ny andro nandaozany azy ka mandraka ankehitriny.
  - type: heading
    content: I Elisà sy i Hazaela
  '7':
  - type: text
    content: 'Indray andro dia tonga tany Damasy i Elisà. Narary i Bena-Hadada mpanjakan’i Siria tamin’izay; ary rehefa nisy nilaza taminy fa ao an-tanàna ilay '
  - type: text
    content: olon’Andriamanitra
  - type: text
    content: ', '
  '8':
  - type: text
    content: dia hoy izy tamin’i Hazaela
  - type: note
    content: Jereo 1 Mp 19.15. Mety ho niasa tao amin’ny lapan’ny mpanjaka tao Damasy i Hazaela.
  - type: text
    content: ':'
  - type: text
    content: –Mitondrà fanomezana ka mandehana mihaona amin’i Elisà; dia asaivo manontany ny TOMPO izy raha toa ka ho sitrana amin’izao aretiko izao ihany aho.
  '9':
  - type: text
    content: 'Dia lasa nihaona tamin’i Elisà i Hazaela nombàm-panomezana nentin’ny rameva efapolo, dia izay zava-tsoa isan-karazany tao Damasy. Rehefa tonga izy, dia nitsangana teo anatrehan’ny mpaminany sady nanao hoe:'
  - type: text
    content: –I Bena-Hadada, mpanoa anao sady mpanjakan’i Siria, no naniraka ahy hankatỳ aminao mba hanontany anao raha ho sitrana amin’izao aretina izao ihany izy.
