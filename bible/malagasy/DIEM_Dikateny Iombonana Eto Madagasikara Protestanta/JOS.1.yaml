document_id: JOS.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Josoa no mandimby an’i Mosesy
  - type: heading
    content: (Jereo Deot 31.1-8, 14, 23; Jos 22.1-9)
  - type: text
    content: 'Taorian’ny nahafatesan’i Mosesy mpanompon’ny TOMPO, dia nitenenan’ny TOMPO i Josoa zanakalahin’i Nona sady mpanampy an’i Mosesy nataony hoe:'
  '10':
  - type: text
    content: 'Ary nandidy ireo mpifehy vahoaka i Josoa ka nanao hoe:'
  '11':
  - type: text
    content: '–Ndeha mitety ny toby ka mandidia ny vahoaka hoe: «Manamboara vatsy ho anareo; fa, raha afaka telo andro, dia hiampita an’ity Jôrdàna ity ianareo mba hiditra haka ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo».'
  '12':
  - type: text
    content: 'Avy eo dia ny lehilahy ao amin’ny fokon’i Reobena sy fokon’i Gada ary antsasa-pokon’i Manase no nilazan’i Josoa hoe:'
  '13':
  - type: text
    content: '–Tsarovy ny teny izany nampitain’i Mosesy mpanompon’ny TOMPO anareo fony izy nanao hoe: «Omen’ny TOMPO Andriamanitrareo toeram-ponenana eto ianareo ka tolorany ity tany andafy atsinanan’i Jôrdàna ity.» '
  '14':
  - type: text
    content: 'Ny vady aman-janakareo ary ny biby fiompinareo dia mahazo mijanona eto amin’ity tany izay nomen’i Mosesy anareo ity. Fa ianareo vatan-dehilahy matanjaka rehetra mirongo fiadiana kosa dia hiampita hialoha ny mpiray firenena aminareo; ary hanampy azy ianareo '
  '15':
  - type: text
    content: ambara-panomen’ny TOMPO azy toerana tahaka izay efa natao taminareo, ka hahazoan’ireo koa ny tany izay omen’ny TOMPO Andriamanitrareo azy any andrefan’i Jôrdàna. Aorian’izany vao hiverina ianareo mba hizaka ny taninareo ety andafy atsinanan’i Jôrdàna, tany izay nomen’i Mosesy mpanompon’ny Tompo anareo
  - type: note
    content: Momba ny and 13-15, dia jereo Nom 32.28-32; Deot 3.18-20.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Dia namaly an’i Josoa ireo ka nanao hoe:'
  - type: text
    content: '–Hataonay avokoa izay rehetra andidianao anay ary halehanay avokoa na aiza na aiza anirahanao anay. '
  '17':
  - type: text
    content: 'Tsy misy hafa amin’izay hankatoavanay mandrakariva an’i Mosesy no hankatoavanay anao koa. Homba anao anie ny TOMPO Andriamanitrao tahaka izay nanombany an’i Mosesy. '
  '18':
  - type: text
    content: Ary na iza na iza mikomy aminao ka mandà tsy hankatò ny baikonao, dia hatao maty. Eny, aoka ho sahy sy hahery ianao!
  '2':
  - type: text
    content: '–Efa maty i Mosesy mpanompoko; koa mitsangàna ankehitriny ianao sy ireto vahoaka rehetra ireto ka mità ity renirano Jôrdàna ity mba hiditra ao amin’ny tany izay omeko ny Israelita. '
  '3':
  - type: text
    content: 'Araka izay efa nampanantenaiko an’i Mosesy, dia omeko anareo ny toerana rehetra hodiavin’ny tongotrareo. '
  '4':
  - type: text
    content: Ny taninareo dia manomboka eo amin’ny taniefitra any atsimo ka mipaka hatrany amin’ny tendrombohitr’i Libano any avaratra; ary manomboka eo amin’ny ony Eofrata any atsinanana, dia mamakivaky ny tanin’ny Hetita, ka mipaka hatrany amin’ny Ranomasina Mediteranea any andrefana
  - type: note
    content: I Libano fahizay dia tangoron-tendrombohitra any avaratr’i Palestinina; i Eofrata dia ony any avaratra atsinanany; ary ny tanin’ny Hetita dia ilazana an’i Siria sy i Palestinina mitambatra.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ry Josoa, tsy misy olona hahatohitra anao mandritra ny androm-piainanao rehetra, fa homba anao Aho tahaka izay efa nombako an’i Mosesy. Tsy hanary anao Aho na handao anao na oviana na oviana. '
  '6':
  - type: text
    content: Aoka ho sahy sy hahery ianao, fa ianao no hitarika ireto vahoaka ireto handova ny tany izay nianianako tamin’ny razambeny fa homeko azy
  - type: note
    content: Momba ny and 5-6, dia jereo Deot 31.6-8, 23.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Eny, aoka ho sahy sy hahery tokoa ianao mba himasoanao ny hanao araka ny lalàna manontolo izay nampitain’i Mosesy mpanompoko taminao. Aza misy anaovana tsirambina mihitsy izany na kely aza, dia hahomby ianao amin’izay rehetra ataonao. '
  '8':
  - type: text
    content: 'Aoka ianao hahavatra mamaky ity bokin’ny lalàna ity ary handinika azy andro aman’alina mba himasoanao ny hanao araka izay rehetra voasoratra anatiny. Amin’izay dia ho tontosanao tsara ny fikasanao rehetra ary hahomby ianao. '
  '9':
  - type: text
    content: Moa tsy efa nandidy anao ve Aho mba ho sahy sy hahery? Koa aza matahotra na mivadi-po fa Izaho TOMPO Andriamanitrao no homba anao amin’izay rehetra alehanao.
  - type: heading
    content: Manomana ny fitàna an’i Jôrdàna i Josoa
