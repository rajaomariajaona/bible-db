document_id: JOS.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Josoa no mandimby an’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Deot 31.1-8, 14, 23; Jos 22.1-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’ny nahafatesan’i Mosesy mpanompon’ny TOMPO, dia nitenenan’ny TOMPO i Josoa zanakalahin’i Nona sady mpanampy an’i Mosesy nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Efa maty i Mosesy mpanompoko; koa mitsangàna ankehitriny ianao sy ireto vahoaka rehetra ireto ka mità ity renirano Jôrdàna ity mba hiditra ao amin’ny tany izay omeko ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Araka izay efa nampanantenaiko an’i Mosesy, dia omeko anareo ny toerana rehetra hodiavin’ny tongotrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny taninareo dia manomboka eo amin’ny taniefitra any atsimo ka mipaka hatrany amin’ny tendrombohitr’i Libano any avaratra; ary manomboka eo amin’ny ony Eofrata any atsinanana, dia mamakivaky ny tanin’ny Hetita, ka mipaka hatrany amin’ny Ranomasina Mediteranea any andrefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Libano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fahizay dia tangoron-tendrombohitra any avaratr’i Palestinina; i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eofrata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ony any avaratra atsinanany; ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tanin’ny Hetita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilazana an’i Siria sy i Palestinina mitambatra.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ry Josoa, tsy misy olona hahatohitra anao mandritra ny androm-piainanao rehetra, fa homba anao Aho tahaka izay efa nombako an’i Mosesy. Tsy hanary anao Aho na handao anao na oviana na oviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho sahy sy hahery ianao, fa ianao no hitarika ireto vahoaka ireto handova ny tany izay nianianako tamin’ny razambeny fa homeko azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 5-6, dia jereo Deot 31.6-8, 23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, aoka ho sahy sy hahery tokoa ianao mba himasoanao ny hanao araka ny lalàna manontolo izay nampitain’i Mosesy mpanompoko taminao. Aza misy anaovana tsirambina mihitsy izany na kely aza, dia hahomby ianao amin’izay rehetra ataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka ianao hahavatra mamaky ity bokin’ny lalàna ity ary handinika azy andro aman’alina mba himasoanao ny hanao araka izay rehetra voasoratra anatiny. Amin’izay dia ho tontosanao tsara ny fikasanao rehetra ary hahomby ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa tsy efa nandidy anao ve Aho mba ho sahy sy hahery? Koa aza matahotra na mivadi-po fa Izaho TOMPO Andriamanitrao no homba anao amin’izay rehetra alehanao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manomana ny fitàna an’i Jôrdàna i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nandidy ireo mpifehy vahoaka i Josoa ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '–Ndeha mitety ny toby ka mandidia ny vahoaka hoe: «Manamboara vatsy ho anareo; fa, raha afaka telo andro, dia hiampita an’ity Jôrdàna ity ianareo mba hiditra haka ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy eo dia ny lehilahy ao amin’ny fokon’i Reobena sy fokon’i Gada ary antsasa-pokon’i Manase no nilazan’i Josoa hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '–Tsarovy ny teny izany nampitain’i Mosesy mpanompon’ny TOMPO anareo fony izy nanao hoe: «Omen’ny TOMPO Andriamanitrareo toeram-ponenana eto ianareo ka tolorany ity tany andafy atsinanan’i Jôrdàna ity.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny vady aman-janakareo ary ny biby fiompinareo dia mahazo mijanona eto amin’ity tany izay nomen’i Mosesy anareo ity. Fa ianareo vatan-dehilahy matanjaka rehetra mirongo fiadiana kosa dia hiampita hialoha ny mpiray firenena aminareo; ary hanampy azy ianareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ambara-panomen’ny TOMPO azy toerana tahaka izay efa natao taminareo, ka hahazoan’ireo koa ny tany izay omen’ny TOMPO Andriamanitrareo azy any andrefan’i Jôrdàna. Aorian’izany vao hiverina ianareo mba hizaka ny taninareo ety andafy atsinanan’i Jôrdàna, tany izay nomen’i Mosesy mpanompon’ny Tompo anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 13-15, dia jereo Nom 32.28-32; Deot 3.18-20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly an’i Josoa ireo ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hataonay avokoa izay rehetra andidianao anay ary halehanay avokoa na aiza na aiza anirahanao anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy misy hafa amin’izay hankatoavanay mandrakariva an’i Mosesy no hankatoavanay anao koa. Homba anao anie ny TOMPO Andriamanitrao tahaka izay nanombany an’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary na iza na iza mikomy aminao ka mandà tsy hankatò ny baikonao, dia hatao maty. Eny, aoka ho sahy sy hahery ianao!
