document_id: REV.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo 144 000 avy amin’ny firenena Israely
  - type: text
    content: 'Taorian’izany, dia hitako nisy '
  - type: text
    content: anjely
  - type: text
    content: ' efatra nijoro teo amin’ny vazan-tany efatra sady nihazona ny rivotra efatra amin’ny tany'
  - type: note
    content: Ampit Jer 49.36; Dan 7.2; Za 6.5.
  - type: text
    content: ' mba tsy hisy rivotra hitsoka na amin’ny tany, na amin’ny ranomasina, na amin’ny hazo iray akory aza. '
  '10':
  - type: text
    content: 'sady niantso tamin’ny feo mahery nanao hoe: «Ny famonjena dia an’ilay Andriamanitsika, Izay mipetraka eo ambony sezafiandrianana, ary koa an’ny Zanakondry!» '
  '11':
  - type: text
    content: 'Dia nanodidina ny sezafiandrianana sy ireo '
  - type: text
    content: loholona
  - type: text
    content: ' ary ny zava-miaina efatra ny '
  - type: text
    content: anjely
  - type: text
    content: ' rehetra ka niankohoka teo anoloan’ny sezafiandrianana sady nitsaoka an’Andriamanitra '
  '12':
  - type: text
    content: 'nanao hoe: «'
  - type: text
    content: Amen
  - type: text
    content: '! An’Andriamanitsika ny dera sy ny voninahitra amam-pahendrena, ny saotra sy ny haja ary ny fahefana sy ny hery, mandrakizay mandrakizay! Amen.»'
  '13':
  - type: text
    content: 'Dia niteny tamiko ny anankiray tamin’ny loholona nanao hoe:'
  - type: text
    content: –Iza moa ireo miakanjo fotsy lava ireo ary avy taiza no niaviany?
  '14':
  - type: text
    content: 'Ka novaliako hoe:'
  - type: text
    content: –Ianao, tompoko, no mahalala!
  - type: text
    content: 'Dia hoy izy tamiko:'
  - type: text
    content: –Ireo no avy tamin’ny fahoriana lehibe
  - type: note
    content: Ampit Dan 12.1; Mt 24.21; Mk 13.19.
  - type: text
    content: ' ka nanasa sy namotsy ny akanjony tamin’ny ra nafoin’ilay Zanakondry. '
  '15':
  - type: text
    content: Noho izany, dia mitoetra eo anoloan’ny sezafiandrianan’Andriamanitra izy ireo ka manompo an’Andriamanitra andro aman’alina ao an-
  - type: text
    content: tempoliny
  - type: text
    content: '; ary Ilay mipetraka eo ambony sezafiandrianana dia hiara-monina aminy ka hiaro azy. '
  '16':
  - type: text
    content: 'Tsy ho noana na hangetaheta intsony ireo; ary tsy haninona azy ny masoandro na izay hafanana. '
  '17':
  - type: text
    content: 'Fa ny Zanakondry Izay mipetraka eo afovoan’ny sezafiandrianana no ho '
  - type: text
    content: Mpiandry
  - type: text
    content: ' azy ka hitondra azy ho amin’ny loharano velona; ary hofafàn’Andriamanitra ny ranomaso rehetra amin’ny masony'
  - type: note
    content: 'And 16-17: ampit Is 49.10; Sal 23.1; Ezek 34.23; Sal 23.2; Is 25.8.'
  - type: text
    content: .
  '2':
  - type: text
    content: Ary hitako nisy anjely iray hafa koa niakatra avy any atsinanana sady nitana ny tombokasen
  - type: note
    content: Jereo 5.1 sy nta.
  - type: text
    content: '’ilay Andriamanitra velona. Dia niantso tamin’ny feo mahery an’ireo anjely efatra navela hanimba ny tany aman-dranomasina io anjely io '
  '3':
  - type: text
    content: 'nanao hoe: «Aza manimba ny tany na ny ranomasina na ny hazo ianareo, mandra-panisinay tombokase eo an-kandrin’ireo mpanompon’Andriamanitsika'
  - type: note
    content: Ampit Ezek 9.4-6.
  - type: text
    content: '.» '
  '4':
  - type: text
    content: 'Ary reko ny isan’izay voaisy tombokase teo an-kandrina: ka 144 000 no voaisy tombokase, avy tamin’ny fitambaram-pokon’ireo '
  - type: text
    content: israelita
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Avy tamin’ny fokon’i Joda: 12 000 no voaisy tombokase. Avy amin’ny fokon’i Reobena: 12 000. Avy tamin’ny fokon’i Gada: 12 000. '
  '6':
  - type: text
    content: 'Avy tamin’ny fokon’i Asera: 12 000. Avy tamin’ny fokon’i Naftalỳ: 12 000. Avy tamin’ny fokon’i Manase: 12 000. '
  '7':
  - type: text
    content: 'Avy tamin’ny fokon’i Simehôna: 12 000. Avy tamin’ny fokon’i Levỳ: 12 000. Avy tamin’ny fokon’i Jisakara: 12 000. '
  '8':
  - type: text
    content: 'Avy tamin’ny fokon’i Zebolòna: 12 000. Avy tamin’ny fokon’i Jôsefa: 12 000. Avy tamin’ny fokon’i Benjamîna: 12 000 no voaisy tombokase.'
  - type: heading
    content: Vahoaka tsy tambo isaina
  '9':
  - type: text
    content: 'Taorian’izany, dia indreo hitako nisy olona betsaka tsy tambo isaina avy tamin’ny firenena sy ny fokom-pirenena ary ny vahoaka mbamin’ny olona samy hafa fiteny rehetra, niakanjo fotsy lava sy nitana sampan-drofia teny an-tanany. Nijoro teo anoloan’ny sezafiandrianana sy ny Zanakondry ireo, '
