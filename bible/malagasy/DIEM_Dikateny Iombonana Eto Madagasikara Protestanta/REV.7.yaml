document_id: REV.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ireo 144 000 avy amin’ny firenena '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany, dia hitako nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' efatra nijoro teo amin’ny vazan-tany efatra sady nihazona ny rivotra efatra amin’ny tany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jer 49.36; Dan 7.2; Za 6.5.
    marker-yv: yv-n
  - type: text
    text: ' mba tsy hisy rivotra hitsoka na amin’ny tany, na amin’ny ranomasina, na amin’ny hazo iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary hitako nisy anjely iray hafa koa niakatra avy any atsinanana sady nitana ny tombokasen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 5.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: '’ilay Andriamanitra velona. Dia niantso tamin’ny feo mahery an’ireo anjely efatra navela hanimba ny tany aman-dranomasina io anjely io '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nanao hoe: «Aza manimba ny tany na ny ranomasina na ny hazo ianareo, mandra-panisinay tombokase eo an-kandrin’ireo mpanompon’Andriamanitsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ezek 9.4-6.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary reko ny isan’izay voaisy tombokase teo an-kandrina: ka 144 000 no voaisy tombokase, avy tamin’ny fitambaram-pokon’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israelita
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy tamin’ny fokon’i Joda: 12 000 no voaisy tombokase. Avy amin’ny fokon’i Reobena: 12 000. Avy tamin’ny fokon’i Gada: 12 000. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy tamin’ny fokon’i Asera: 12 000. Avy tamin’ny fokon’i Naftalỳ: 12 000. Avy tamin’ny fokon’i Manase: 12 000. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy tamin’ny fokon’i Simehôna: 12 000. Avy tamin’ny fokon’i Levỳ: 12 000. Avy tamin’ny fokon’i Jisakara: 12 000. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy tamin’ny fokon’i Zebolòna: 12 000. Avy tamin’ny fokon’i Jôsefa: 12 000. Avy tamin’ny fokon’i Benjamîna: 12 000 no voaisy tombokase.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vahoaka tsy tambo isaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taorian’izany, dia indreo hitako nisy olona betsaka tsy tambo isaina avy tamin’ny firenena sy ny fokom-pirenena ary ny vahoaka mbamin’ny olona samy hafa fiteny rehetra, niakanjo fotsy lava sy nitana sampan-drofia teny an-tanany. Nijoro teo anoloan’ny sezafiandrianana sy ny Zanakondry ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady niantso tamin’ny feo mahery nanao hoe: «Ny famonjena dia an’ilay Andriamanitsika, Izay mipetraka eo ambony sezafiandrianana, ary koa an’ny Zanakondry!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nanodidina ny sezafiandrianana sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' ary ny zava-miaina efatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' rehetra ka niankohoka teo anoloan’ny sezafiandrianana sady nitsaoka an’Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nanao hoe: «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '! An’Andriamanitsika ny dera sy ny voninahitra amam-pahendrena, ny saotra sy ny haja ary ny fahefana sy ny hery, mandrakizay mandrakizay! Amen.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny tamiko ny anankiray tamin’ny loholona nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa ireo miakanjo fotsy lava ireo ary avy taiza no niaviany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ka novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao, tompoko, no mahalala!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy izy tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ireo no avy tamin’ny fahoriana lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 12.1; Mt 24.21; Mk 13.19.
    marker-yv: yv-n
  - type: text
    text: ' ka nanasa sy namotsy ny akanjony tamin’ny ra nafoin’ilay Zanakondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Noho izany, dia mitoetra eo anoloan’ny sezafiandrianan’Andriamanitra izy ireo ka manompo an’Andriamanitra andro aman’alina ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliny
  - type: text
    text: '; ary Ilay mipetraka eo ambony sezafiandrianana dia hiara-monina aminy ka hiaro azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy ho noana na hangetaheta intsony ireo; ary tsy haninona azy ny masoandro na izay hafanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny Zanakondry Izay mipetraka eo afovoan’ny sezafiandrianana no ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpiandry
  - type: text
    text: ' azy ka hitondra azy ho amin’ny loharano velona; ary hofafàn’Andriamanitra ny ranomaso rehetra amin’ny masony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 16-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Is 49.10; Sal 23.1; Ezek 34.23; Sal 23.2; Is 25.8.
    marker-yv: yv-n
  - type: text
    text: .
