      text: '6'
  - type: text
    text: 'Mangataha fiadanana ho an’i Jerosalema:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Fanambinana anie ho an’ireo mpitia anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fiadanana anie ho ao amin’ireo mandanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanambinana anie ho ao amin’ireo lapanao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Noho ireo mpiray firenena amiko sy ireo sakaizako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'aoka aho hiteny hoe: Fiadanana anie ho ao aminao;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: noho ny tranon’ny TOMPO Andriamanitray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avelao aho hirary soa ho anao!»
