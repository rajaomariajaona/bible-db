document_id: PSA.122,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Firariam-piadanana ho an’i Jerosalema
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana. Nataon’i Davida.
  - type: text
    content: 'Faly aho raha nilazan’ireo namako hoe:'
  - type: text
    content: «Andeha isika ho any an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: '!»'
  '2':
  - type: text
    content: He ny tongotray efa mijadona
  - type: text
    content: eto am-bavahadinao, ry Jerosalema.
  '3':
  - type: text
    content: Ianao, ry Jerosalema, dia voaorina
  - type: text
    content: ho tanàna miray sady mirindra.
  '4':
  - type: text
    content: Ao ireo fokon’i Israely,
  - type: text
    content: dia ireo fokon’ny TOMPO,
  - type: text
    content: no miakatra hidera ny TOMPO
  - type: note
    content: 'miakatra hanao fivahiniana masina amin’ny fety lehibe: jereo Deot 16.16-17.'
  - type: text
    content: ':'
  - type: text
    content: fepetra ho an’i Israely izany.
  '5':
  - type: text
    content: Ao no ijoroan’ny sezafiandrianam-pitsarana,
  - type: text
    content: dia ny sezafiandrianan’ny taranak’i Davida.
  '6':
  - type: text
    content: 'Mangataha fiadanana ho an’i Jerosalema:'
  - type: text
    content: «Fanambinana anie ho an’ireo mpitia anao!
  '7':
  - type: text
    content: Fiadanana anie ho ao amin’ireo mandanao!
  - type: text
    content: Fanambinana anie ho ao amin’ireo lapanao!
  '8':
  - type: text
    content: Noho ireo mpiray firenena amiko sy ireo sakaizako,
  - type: text
    content: 'aoka aho hiteny hoe: Fiadanana anie ho ao aminao;'
  '9':
  - type: text
    content: noho ny tranon’ny TOMPO Andriamanitray,
  - type: text
    content: avelao aho hirary soa ho anao!»
