  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy mahatsapa ny hadisoany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, hoy ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia anisan’ireo ho lavo izy;
  - type: usfm
    marker: q1
    children:
