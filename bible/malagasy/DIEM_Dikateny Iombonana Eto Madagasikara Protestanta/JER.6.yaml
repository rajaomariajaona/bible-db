document_id: JER.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tandindomin-doza goavana i Jerosalema
  - type: text
    content: Mandosira faingana hiala ao Jerosalema,
  - type: text
    content: ianareo Benjaminita,
  - type: text
    content: mba hitady fialofana any an-kafa.
  - type: text
    content: Tsofy ao Tekôa ny anjomara,
  - type: text
    content: manaova tsangan’afo ao Bety-Kerèma,
  - type: text
    content: satria misy loza sy fandringanana goavana
  - type: text
    content: mipoitra avy any avaratra
  - type: note
    content: Jereo 1.14 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: Iza no hitenenako,
  - type: text
    content: ary iza no hampandrenesina hihaino ahy?
  - type: text
    content: Indro tsentsina ny sofiny,
  - type: text
    content: ka tsy afaka handre tsara izy.
  - type: text
    content: Manala-baràka azy ny teninao, ry TOMPO,
  - type: text
    content: ka tsy ankamamîny.
  '11':
  - type: text
    content: Feno ny fahatezeranao aho, ry TOMPO,
  - type: text
    content: ka tsy mahatsindry izany intsony.
  - type: heading
    content: (Ny Tompo)
  - type: text
    content: Afafazo amin’ny ankizy eny an-dalambe
  - type: text
    content: sy amin’ny andian-tanora manontolo
  - type: text
    content: izany fahatezerako tsy tantinao izany.
  - type: text
    content: Fa na lehilahy na vehivavy
  - type: text
    content: na ny antitra na izay efa ela niainana
  - type: text
    content: dia samy hosamborina avokoa.
  '12':
  - type: text
    content: Ho lasan’olon-kafa ny tranony
  - type: text
    content: sy ny sahany ary ny vadiny
  - type: note
    content: 'And 12-15: ampit Jer 8.10-12.'
  - type: text
    content: ','
  - type: text
    content: satria hahinjitro ny tanako
  - type: text
    content: hamely ny mponina amin’ny tany,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '13':
  - type: text
    content: Izy rehetra, na ny kely na ny lehibe,
  - type: text
    content: dia samy mitady tombontsoa avokoa.
  - type: text
    content: 'Na ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' na ny '
  - type: text
    content: mpisorona
  - type: text
    content: dia samy mpamitaka avokoa.
  '14':
  - type: text
    content: Alasafay fotsiny no nitsaboany
  - type: text
    content: ny fahavoazan’ny vahoakako
  - type: text
    content: 'tamin’ny nilazany hoe: «Fiadanana, fiadanana!»;'
  - type: text
    content: kanjo tsy nisy fiadanana akory
  - type: note
    content: Jereo Jer 8.11; Ezek 13.10.
  - type: text
    content: '!'
  '15':
  - type: text
    content: Tokony hahamenatra azy
  - type: text
    content: ny zava-maharikoriko nataony;
  - type: text
    content: nefa tsy menatra akory izy
  - type: text
    content: sady tsy mahatsapa ny hadisoany.
  - type: text
    content: Noho izany, hoy ny TOMPO,
  - type: text
    content: dia anisan’ireo ho lavo izy;
  - type: text
    content: ka amin’ny andro hamaliako azy,
  - type: text
    content: no hitrosenany amin’ny tany.
  '16':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Mijanòna eny an-dalana ianareo ka mandiniha;
  - type: text
    content: ary anontanio ny sakeli-dalana fahiny.
  - type: text
    content: Tadiavo ny lalana ho amin’ny fahasambarana;
  - type: text
    content: araho izany, dia hahita fitsaharana
  - type: text
    content: ho an’ny fanahinareo
  - type: note
    content: Ampit Mt 11.29.
  - type: text
    content: ' ianareo!'
  - type: text
    content: 'Kanefa hoy izy hoe: «Tsy hanaraka izahay!»'
  '17':
  - type: text
    content: Nametrahako mpitily teo aminy,
  - type: text
    content: hampaneno ny anjomara fanairana.
  - type: text
    content: 'Kanefa hoy izy hoe: «Tsy ahoanay izany!»'
  '18':
  - type: text
    content: Koa henoy àry izao, ry firenen-kafa,
  - type: text
    content: fantaro tsara izay hanjo azy.
  '19':
  - type: text
    content: 'Mihainoa, ry mponina rehetra eran-tany:'
  - type: text
    content: Indro hahatonga loza ho an’io firenena io Aho,
  - type: text
    content: dia loza vokatry ny hevi-dratsiny ihany,
  - type: text
    content: satria tsy niraharaha ny teniko izy
  - type: text
    content: sady naniratsira ny fampianarako.
  '2':
  - type: text
    content: Indro rava ianao
  - type: note
    content: 'indro rava ianao: dkt hafa nanjary nangina ianao na nataoko nangina ianao.'
  - type: text
    content: 'ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: tanàna tsara tarehy sy miaingitraingitra!
  '20':
  - type: text
    content: Nahoana moa Aho no anafarana
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' avy any Sebà'
  - type: text
    content: sy veromanitra avy any an-tany lavitra?
  - type: text
    content: 'Tsy sitrako ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorany manontolo'
  - type: text
    content: ary tsy teliko ny sorona hafa ataony ho Ahy.
  '21':
  - type: text
    content: 'Koa izao no lazain’ny TOMPO:'
  - type: text
    content: Hasiako zava-mahasolafaka
  - type: text
    content: eo anoloan’ity firenena ity;
  - type: text
    content: ka samy ho solafaka sy ho faty eo
  - type: text
    content: na ny raiamandreny na ny zanany
  - type: text
    content: na ny namany sy ny mpiara-monina aminy.
  - type: heading
    content: Tonga avy any avaratra ny fahavalo
  '22':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Indro misy vahoaka tonga
  - type: text
    content: avy any amin’ny tany avaratra
  - type: note
    content: Jereo 1.14 sy nta; ampit 5.15.
  - type: text
    content: ','
  - type: text
    content: dia firenen-dehibe iray
  - type: text
    content: miainga avy any am-paran’ny tany.
  '23':
  - type: text
    content: Mampirangaranga tsipîka sy lefona
  - type: text
    content: ireo miaramilany lozabe sady tsy mamindra fo.
  - type: text
    content: Mirohondrohona toy ny ranomasina ny feony.
  - type: text
    content: Mitaingin-tsoavaly izy ary milahatra
  - type: text
    content: toy ny andian-tafika hiady
  - type: text
    content: 'mba hamely anao, ry '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  - type: heading
    content: (Ny vahoaka)
  '24':
  - type: text
    content: Renay izany vaovao izany
  - type: text
    content: ka niraviravy tanana izahay,
  - type: text
    content: sady tratry ny fanaintainana
  - type: text
    content: toy ny vehivavy raha miteraka.
  '25':
  - type: text
    content: Aza mivoaka ho any an-tsaha,
  - type: text
    content: aza mandeha eny an-dalam-be
  - type: text
    content: fa ao ny fahavalo mirongo sabatra;
  - type: text
    content: ka horohoro hatraiza hatraiza
  - type: note
    content: Jereo 20.3,10; 46.5; 49.29; Sal 31.14.
  - type: text
    content: .
  - type: heading
    content: (Ny Tompo)
  '26':
  - type: text
    content: Ry vahoakako, misikìna lamba fisaonana
  - type: text
    content: ka mihosena amin’ny vovoka;
  - type: text
    content: ataovy ny fombafomba rehetra fanao
  - type: text
    content: amin’ny fisaonana zanaka lahitokana,
  - type: text
    content: ka mitomania fatratra ianareo
  - type: text
    content: fa ho avy tampoka ny fahavalo mpandringana.
  - type: heading
    content: Metaly tsy azo diovina i Israely
  - type: heading
    content: (Ny Tompo)
  '27':
  - type: text
    content: Hataoko toy ny misedra vy ianao, ry Jeremià,
  - type: text
    content: 'mba hizaha toetra ny vahoakako:'
  - type: text
    content: hofantarinao sy hotombananao ny fitondrantenany.
  - type: heading
    content: (Jeremià)
  '28':
  - type: text
    content: Mpikomy maditra avokoa izy rehetra,
  - type: text
    content: ka mandehandeha manaratsy;
  - type: text
    content: mafy noho ny vy na ny halimo izy,
  - type: text
    content: ary samy mpanao ratsy avokoa.
  '29':
  - type: text
    content: Efa sempotra dia sempotra ny tafoforana,
  - type: text
    content: ka tokony ho levona ny firaka noho ny hafanana;
  - type: text
    content: nefa very maina ny nandrendrehana ny volafotsy
  - type: text
    content: fa tsy mety miala ny taindrendrika.
  '3':
  - type: text
    content: Fa tonga hatrany aminao ny olona
  - type: text
    content: 'tahaka ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry sy ny andian’ondriny.'
  - type: text
    content: Manangana toby manodidina hamelezana anao izy
  - type: text
    content: ka mitondra ny andian-tafiny amin’ny tandrify azy.
  '30':
  - type: text
    content: Volafotsy tsy misy ilana azy
  - type: text
    content: no ilazana ireny olona ireny,
  - type: text
    content: satria tsy ilain’ny TOMPO.
  '4':
  - type: text
    content: 'Miantsoantso ireo hoe: «Ndao hotafihina izy!'
  - type: text
    content: Mitsangàna isika mba haka azy an-keriny
  - type: text
    content: amin’ny mitataovovona!
  - type: text
    content: Indrisy, efa mihilana ny andro
  - type: text
    content: ary efa mandroso aloka ny hariva!
  '5':
  - type: text
    content: Mitsangàna isika mba haka azy an-keriny
  - type: text
    content: amin’ny alina;
  - type: text
    content: aoka horavantsika ireo lapany tsara tarehy!»
  '6':
  - type: text
    content: Izao no lazain’ny TOMPOn’izao rehetra izao
  - type: text
    content: 'amin’ireto mpanafika an’i Tsiôna:'
  - type: text
    content: «Mikapà hazo hanaovana tovon-tany
  - type: text
    content: mba hamelezana an’i Jerosalema.»
  - type: text
    content: Iharan-tsazy io tanàna io
  - type: text
    content: fa feno fampahoriana ao aminy.
  '7':
  - type: text
    content: Mampiboiboika ny faharatsiany
  - type: text
    content: toy ny fantsakana mamoaka rano izy.
  - type: text
    content: Herisetra sy famoretana no mba re ao.
  - type: text
    content: Ratra sy fijaliana no hitako ao mandrakariva.
  '8':
  - type: text
    content: Minoa anatra ianao, ry Jerosalema;
  - type: text
    content: raha tsy izany, dia hihatahako ianao,
  - type: text
    content: ka hataoko tanàna lao sy tany tsy honenana.
  - type: heading
    content: Famaizana ireo mafy fo
  '9':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Tangosy hatramin’ny farany
  - type: text
    content: toy ny fitango voaloboka
  - type: text
    content: ireo olona sisa amin’i Israely;
  - type: text
    content: averimbereno eny amin’ny rantsany madinika
  - type: text
    content: toy ny an’ny mpioty voaloboka ny tananao!»
  - type: heading
    content: (Jeremià)
