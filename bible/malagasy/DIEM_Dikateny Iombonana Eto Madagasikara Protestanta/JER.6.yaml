        text: '10'
    - type: text
      text: Iza no hitenenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary iza no hampandrenesina hihaino ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro tsentsina ny sofiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy afaka handre tsara izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manala-baràka azy ny teninao, ry TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ankamamîny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Feno ny fahatezeranao aho, ry TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahatsindry izany intsony.
