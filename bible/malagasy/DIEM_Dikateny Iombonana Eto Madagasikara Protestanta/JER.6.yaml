      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna eny an-dalana ianareo ka mandiniha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary anontanio ny sakeli-dalana fahiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo ny lalana ho amin’ny fahasambarana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araho izany, dia hahita fitsaharana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ny fanahinareo
    - type: usfm
      marker: f
      children:
      - type: usfm
