  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afafazo amin’ny ankizy eny an-dalambe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy amin’ny andian-tanora manontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany fahatezerako tsy tantinao izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na lehilahy na vehivavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny antitra na izay efa ela niainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy hosamborina avokoa.
  '12':
