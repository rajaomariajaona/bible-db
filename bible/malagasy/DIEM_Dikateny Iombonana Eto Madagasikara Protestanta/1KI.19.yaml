document_id: 1KI.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Kivy i Elià
  - type: text
    content: 'Notantarain’i Ahaba tamin’i Jezebela avokoa izay nataon’i Elià, dia ny namonoany ho faty ny mpaminan’i Bahala rehetra tamin’ny sabatra. '
  '10':
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Fatratra loatra ny fitiavako Anao, ry TOMPO Andriamanitr’izao rehetra izao ô, koa tsy tantiko intsony ny nandaozan’ireo Israelita ny fanekempihavananao; ny alitaranao noravany, ny mpaminaninao novonoiny ho faty; ary dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ahy koa izy
  - type: note
    content: Jereo Rm 11.3.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Dia hoy ny TOMPO hoe:'
  - type: text
    content: –Mivoaha tao ka mitsangàna eo an-tendrombohitra eo anatrehako fa handalo Aho.
  - type: text
    content: 'Dia nisy rivotra nifofofofo mafy izay nampitresaka ny tendrombohitra ary nanamontsana ny vatolampy teo anatrehan’ny TOMPO; nefa tsy tao amin’izany rivotra izany ny TOMPO. Rehefa nitsahatra ny rivotra, dia nisy horohorontany; nefa tsy tao amin’ny horohorontany ny TOMPO. '
  '12':
  - type: text
    content: 'Taorian’ny horohorontany dia nisy afo; nefa tsy tao amin’ny afo ny TOMPO. Ary nanarakaraka ny afo, dia nisy ritsoka malefaka. '
  '13':
  - type: text
    content: 'Fa raha vao nahare izany i Elià, dia nisaron-tava tamin’ny akanjobeny ka lasa nivoaka ary nitsangana teo am-bava zohy. Dia nisy feo niteny taminy indray nanao hoe:'
  - type: text
    content: –Inona no ataonao eto, ry Elià?
  '14':
  - type: text
    content: 'Dia hoy izy hoe:'
  - type: text
    content: –Fatratra loatra ny fitiavako Anao, ry TOMPO Andriamanitr’izao rehetra izao ô, koa tsy tantiko intsony ny nandaozan’ireo Israelita ny fanekempihavananao; ny alitaranao noravany, ny mpaminaninao novonoiny ho faty; izaho irery ihany no sisa, nefa dia mbola mitady hahafaty ahy koa izy.
  '15':
  - type: text
    content: 'Fa hoy ny TOMPO taminy:'
  - type: text
    content: –Mandehana miverina amin’ny lalana mamaky ny taniefitra akaikin’i Damasy. Rehefa tonga any ianao, dia hosory ho mpanjakan’i Siria i Hazaela
  - type: note
    content: Ampit 2 Mp 8.7-13.
  - type: text
    content: '; '
  '16':
  - type: text
    content: hosory ho mpanjakan’i Israely
  - type: note
    content: Ampit 2 Mp 9.1-6.
  - type: text
    content: ' koa i Jehò zanakalahin’i Nimsỳ; ary hosory ho mpaminany handimby anao i Elisà zanakalahin’i Safata sady avy any Abela-Mehôlà. '
  '17':
  - type: text
    content: 'Izay afa-mandositra ny sabatr’i Hazaela, dia ho fatin’i Jehò; ary izay afa-mandositra ny sabatr’i Jehò kosa dia ho fatin’i Elisà. '
  '18':
  - type: text
    content: Nefa hamelako fito arivo lahy ihany amin’i Israely, dia izay rehetra tsy mba nandohalika tamin’ny andriamanitra Bahala
  - type: note
    content: Jereo Rm 11.4.
  - type: text
    content: ' sady tsy nanoroka ny sarivongany.'
  - type: heading
    content: I Elià manendry an’i Elisà ho mpandimby azy
  '19':
  - type: text
    content: Rehefa niala teo i Elià, dia nahita an’i Elisà zanakalahin’i Safata izay teo am-piasana tany. Omby 24 no teo anoloany ary izy no amin’ny roa farany. Raha nandalo teo akaikiny i Elià, dia nanipy ny akanjobeny hanarona azy
  - type: note
    content: Fihetsika milaza fakana ho fananana (Ampit Rota 3.9) sy antso. –Ampit 2 Mp 2.13.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ary nandefa iraka tany amin’i Elià i Jezebela hanao hoe: «Enga anie ka hataon’ireo andriamanitra amiko ny famaizana faran’izay henjana indrindra, raha tsy afako toy ny nanaovanao ny ain’ny iray tamin’ireny koa ny ainao rahampitso tahaka izao!» '
  '20':
  - type: text
    content: 'Dia nandao ny omby i Elisà, ka nihazakazaka nanaraka an’i Elià sady nanao hoe:'
  - type: text
    content: –Avelao aho aloha hanoroka ny raiko sy ny reniko vao hanaraka anao.
  - type: text
    content: 'Ary hoy i Elià taminy:'
  - type: text
    content: –Mandehana miverina, fa naninona anao moa aho
  - type: note
    content: 'Na fantatr’i Elisà ny fihetsi-piantsoan’i Elià, ka dia navelany avy hatrany ny zava-drehetra (ampit Lk 9.59-62); na tsy nahafantatra izy, ka dia nanao toy ny tsy nangataka na inona na inona taminy i Elià. Indraindray ny valintenin’i Elià dia noraisina ho toy ny fanomezan-dalana ho an’i Elisà: Mandehana ka miverena fa fantatrao izay nataoko taminao.'
  - type: text
    content: '!'
  '21':
  - type: text
    content: Dia niala teo aminy i Elisà ka naka omby roa nataony sorona. Natonony tamin’ny hazon-jioga ny hena ka nomeny hohanin’ny olona izay teo. Ary niainga izy ka nanaraka an’i Elià sady nanompo azy.
  '3':
  - type: text
    content: 'Dia natahotra i Elià, ka nitsoaka nandositra namonjy ny ainy. Tonga tany Beera-Seba izay any Joda izy, ary navelany tao ny mpanompony. '
  '4':
  - type: text
    content: 'Fa izy kosa nandeha lalana indray andro hankany an-taniefitra; ka rehefa tonga tany izy, dia nipetraka teo ambanin’ny hazo kely midoroboka iray. Ary nangataka ho faty izy ka nanao hoe:'
  - type: text
    content: –TOMPO ô, aoka izay! Alao ny aiko ankehitriny fa tsy tsara noho ny razako aho.
  '5':
  - type: text
    content: 'Dia nandry izy ka natory teo ambanin’ilay hazo kely midoroboka. Ary indro nisy anjely nanohina azy ka nanao taminy hoe:'
  - type: text
    content: –Mifohaza ka mihinàna.
  '6':
  - type: text
    content: 'Dia nijery izy ka indro nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara teo anilan’ny lohany. Rehefa avy nihinana sy nisotro izy, dia nandry indray; '
  '7':
  - type: text
    content: 'nefa niverina ilay anjelin’ny TOMPO ka nanohina azy sady nanao hoe:'
  - type: text
    content: –Mifohaza ary mihinàna, fa mbola tena lavitra ny halehanao.
  '8':
  - type: text
    content: Dia nifoha i Elià ka nihinana sy nisotro. Rehefa nahazo hery tamin’izay nohaniny izy, dia nandeha efapolo andro sy efapolo alina hatrany Hôreba tendrombohitr’Andriamanitra.
  - type: heading
    content: Andriamanitra mankahery indray an’i Elià
  '9':
  - type: text
    content: Rehefa tonga tao Hôreba i Elià, dia niditra tao amin’ny zohy iray
  - type: note
    content: 'tao... iray: na hoe tao amin’ilay zohy, jereo Eks 33.22-23.'
  - type: text
    content: ' ka natory tao. Ary nisy tenin’ny TOMPO taminy nanao hoe:'
  - type: text
    content: –Inona no ataonao eto, ry Elià?
