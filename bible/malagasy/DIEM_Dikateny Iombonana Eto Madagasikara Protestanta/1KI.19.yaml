document_id: 1KI.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kivy i Elià
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Notantarain’i Ahaba tamin’i Jezebela avokoa izay nataon’i Elià, dia ny namonoany ho faty ny mpaminan’i Bahala rehetra tamin’ny sabatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fatratra loatra ny fitiavako Anao, ry TOMPO Andriamanitr’izao rehetra izao ô, koa tsy tantiko intsony ny nandaozan’ireo Israelita ny fanekempihavananao; ny alitaranao noravany, ny mpaminaninao novonoiny ho faty; ary dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ahy koa izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 11.3.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mivoaha tao ka mitsangàna eo an-tendrombohitra eo anatrehako fa handalo Aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy rivotra nifofofofo mafy izay nampitresaka ny tendrombohitra ary nanamontsana ny vatolampy teo anatrehan’ny TOMPO; nefa tsy tao amin’izany rivotra izany ny TOMPO. Rehefa nitsahatra ny rivotra, dia nisy horohorontany; nefa tsy tao amin’ny horohorontany ny TOMPO. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Taorian’ny horohorontany dia nisy afo; nefa tsy tao amin’ny afo ny TOMPO. Ary nanarakaraka ny afo, dia nisy ritsoka malefaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa raha vao nahare izany i Elià, dia nisaron-tava tamin’ny akanjobeny ka lasa nivoaka ary nitsangana teo am-bava zohy. Dia nisy feo niteny taminy indray nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no ataonao eto, ry Elià?
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fatratra loatra ny fitiavako Anao, ry TOMPO Andriamanitr’izao rehetra izao ô, koa tsy tantiko intsony ny nandaozan’ireo Israelita ny fanekempihavananao; ny alitaranao noravany, ny mpaminaninao novonoiny ho faty; izaho irery ihany no sisa, nefa dia mbola mitady hahafaty ahy koa izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hoy ny TOMPO taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana miverina amin’ny lalana mamaky ny taniefitra akaikin’i Damasy. Rehefa tonga any ianao, dia hosory ho mpanjakan’i Siria i Hazaela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 8.7-13.
      marker-yv: yv-n
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: hosory ho mpanjakan’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2 Mp 9.1-6.
      marker-yv: yv-n
    - type: text
      text: ' koa i Jehò zanakalahin’i Nimsỳ; ary hosory ho mpaminany handimby anao i Elisà zanakalahin’i Safata sady avy any Abela-Mehôlà. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Izay afa-mandositra ny sabatr’i Hazaela, dia ho fatin’i Jehò; ary izay afa-mandositra ny sabatr’i Jehò kosa dia ho fatin’i Elisà. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa hamelako fito arivo lahy ihany amin’i Israely, dia izay rehetra tsy mba nandohalika tamin’ny andriamanitra Bahala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Rm 11.4.
      marker-yv: yv-n
    - type: text
      text: ' sady tsy nanoroka ny sarivongany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elià manendry an’i Elisà ho mpandimby azy
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Rehefa niala teo i Elià, dia nahita an’i Elisà zanakalahin’i Safata izay teo am-piasana tany. Omby 24 no teo anoloany ary izy no amin’ny roa farany. Raha nandalo teo akaikiny i Elià, dia nanipy ny akanjobeny hanarona azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fihetsika milaza fakana ho fananana (Ampit Rota 3.9) sy antso. –Ampit 2 Mp 2.13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nandefa iraka tany amin’i Elià i Jezebela hanao hoe: «Enga anie ka hataon’ireo andriamanitra amiko ny famaizana faran’izay henjana indrindra, raha tsy afako toy ny nanaovanao ny ain’ny iray tamin’ireny koa ny ainao rahampitso tahaka izao!» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nandao ny omby i Elisà, ka nihazakazaka nanaraka an’i Elià sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avelao aho aloha hanoroka ny raiko sy ny reniko vao hanaraka anao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Elià taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana miverina, fa naninona anao moa aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Na fantatr’i Elisà ny fihetsi-piantsoan’i Elià, ka dia navelany avy hatrany ny zava-drehetra (ampit Lk 9.59-62); na tsy nahafantatra izy, ka dia nanao toy ny tsy nangataka na inona na inona taminy i Elià. Indraindray ny valintenin’i Elià dia noraisina ho toy ny fanomezan-dalana ho an’i Elisà: Mandehana ka miverena fa fantatrao izay nataoko taminao.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia niala teo aminy i Elisà ka naka omby roa nataony sorona. Natonony tamin’ny hazon-jioga ny hena ka nomeny hohanin’ny olona izay teo. Ary niainga izy ka nanaraka an’i Elià sady nanompo azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia natahotra i Elià, ka nitsoaka nandositra namonjy ny ainy. Tonga tany Beera-Seba izay any Joda izy, ary navelany tao ny mpanompony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa izy kosa nandeha lalana indray andro hankany an-taniefitra; ka rehefa tonga tany izy, dia nipetraka teo ambanin’ny hazo kely midoroboka iray. Ary nangataka ho faty izy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –TOMPO ô, aoka izay! Alao ny aiko ankehitriny fa tsy tsara noho ny razako aho.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nandry izy ka natory teo ambanin’ilay hazo kely midoroboka. Ary indro nisy anjely nanohina azy ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mifohaza ka mihinàna.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nijery izy ka indro nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara teo anilan’ny lohany. Rehefa avy nihinana sy nisotro izy, dia nandry indray; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'nefa niverina ilay anjelin’ny TOMPO ka nanohina azy sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mifohaza ary mihinàna, fa mbola tena lavitra ny halehanao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nifoha i Elià ka nihinana sy nisotro. Rehefa nahazo hery tamin’izay nohaniny izy, dia nandeha efapolo andro sy efapolo alina hatrany Hôreba tendrombohitr’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andriamanitra mankahery indray an’i Elià
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rehefa tonga tao Hôreba i Elià, dia niditra tao amin’ny zohy iray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tao... iray: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tao amin’ilay zohy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo Eks 33.22-23.'
      marker-yv: yv-n
    - type: text
      text: ' ka natory tao. Ary nisy tenin’ny TOMPO taminy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no ataonao eto, ry Elià?
