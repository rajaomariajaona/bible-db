document_id: JOL.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Akaiky ny andron’ny Tompo
  - type: text
    content: Tsofy ny trompetra ary asio antso fanairana,
  - type: text
    content: 'ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' tendrombohitro masina.'
  - type: text
    content: Mangovita ianareo mponina rehetra
  - type: text
    content: eto amin’ity tany ity,
  - type: text
    content: fa avy ny andron’ny TOMPO;
  - type: text
    content: eny, efa akaiky izany
  - type: note
    content: 'tendrombohitro masina: jereo Ezek 20.40 sy nta. –mponina amin’ny tany: jereo 1.2 sy nta. ny andron’ny Tompo: jereo 1.5 sy nta.'
  - type: text
    content: .
  '10':
  - type: text
    content: Eo anoloany dia mihorohoro ny tany,
  - type: text
    content: mipararetra ny lanitra,
  - type: text
    content: mihamaizina ny masoandro sy ny volana
  - type: text
    content: ary tsy mamiratra intsony ny kintana.
  '11':
  - type: text
    content: Fa ny TOMPO mitrena toa kotro-baratra
  - type: text
    content: eo alohan’ny tafiny.
  - type: text
    content: Marobe sy matanjaka
  - type: text
    content: ireo miaramila mpanatanteraka ny baikony.
  - type: text
    content: Fa lehibe ny andron’ny TOMPO;
  - type: text
    content: mahatahotra indrindra izany
  - type: text
    content: ka tsy hisy hahatanty.
  - type: heading
    content: Izao no fotoana iverenana
  - type: heading
    content: amin’ny Tompo
  '12':
  - type: text
    content: 'Hoy ny teny hentitry ny Tompo:'
  - type: text
    content: «Dieny ankehitriny,
  - type: text
    content: 'miverena amiko amin’ny fonareo manontolo:'
  - type: text
    content: mifadia hanina
  - type: text
    content: ', mitomania'
  - type: text
    content: ary manaova fitalahoana.
  '13':
  - type: text
    content: 'Aza ny fitafianareo ihany no '
  - type: text
    content: triatriarina
  - type: text
    content: fa ny fonareo indrindra no ovay.»
  - type: text
    content: 'Miverena amiko TOMPO Andriamanitrareo:'
  - type: text
    content: Fa miantra sy mamindrafo Izy
  - type: text
    content: mahari-po sady be fitiavana
  - type: text
    content: ary mamoy ny loza nandrahonany.
  '14':
  - type: text
    content: Angamba mety hanenina Izy
  - type: text
    content: ka hamela fitahiana ho anareo;
  - type: text
    content: dia hisy fanatitra vokatry ny tany
  - type: text
    content: sy fanatitra araraka azonareo atao
  - type: text
    content: ho Azy TOMPO Andriamanitrareo.
  - type: heading
    content: Ny fotoana ifadian-kanina sy italahoana an’Andriamanitra
  '15':
  - type: text
    content: 'Tsofy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny anjomara,'
  - type: text
    content: 'manokàna andro '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ','
  - type: text
    content: ary miantsoa fivoriambe.
  '16':
  - type: text
    content: Atobio miaraka ny vahoaka,
  - type: text
    content: manokàna fotoana hiangonana.
  - type: text
    content: Vorio ny antitra sy ny tanora
  - type: text
    content: hatramin’ny zaza minono;
  - type: text
    content: aoka handao ny efitranony ny mpivady vao.
  '17':
  - type: text
    content: Aoka hitomany ao an-
  - type: text
    content: tempoly
  - type: text
    content: ' ireo '
  - type: text
    content: mpisorona
  - type: text
    content: izay mpanao fanompoam-pivavahana amin’ny TOMPO!
  - type: text
    content: 'Eo anelanelan’ny lalantsara fidirana sy ny '
  - type: text
    content: alitara
  - type: text
    content: ','
  - type: text
    content: 'no aoka hanaovany izany ka hitenenany hoe:'
  - type: text
    content: «TOMPO ô, mba iantrao ny vahoakanao,
  - type: text
    content: aza avela ho afa-baràka ny olonao
  - type: text
    content: 'na holatsain’ny hafa firenena hoe:'
  - type: text
    content: ‹Aiza izay Andriamanitrareo?› »
  - type: heading
    content: Valintenin’Andriamanitra amin’ny vahoakany
  '18':
  - type: text
    content: Tia ny taniny ny TOMPO
  - type: text
    content: sady miantra ny vahoakany
  '19':
  - type: text
    content: 'ka mamaly vavaka azy hoe:'
  - type: text
    content: «Handefa varimbazaha sy divay
  - type: text
    content: ary menaka ho anareo AHO.
  - type: text
    content: Ho vokin’izany ianareo
  - type: text
    content: ka tsy havelako intsony
  - type: text
    content: holatsain’ny hafa firenena.
  '2':
  - type: text
    content: Ho andro maizina tanteraka
  - type: text
    content: rakofan-drahona sy zavona izany.
  - type: text
    content: Indro avy ny tafiky ny bibikely,
  - type: text
    content: andiany marobe sady matanjaka,
  - type: text
    content: ary tahaka ny aloka
  - type: text
    content: mandrakotra ny tendrombohitra
  - type: note
    content: 'tafiky ny bibikely: ny teny hebreo dia tsy manondro mazava tafika inona moa izany, nefa azo eritreretina avy amin’ny 1.4,6 sy 2.25 izany. –tahaka ny aloka: dkt hafa tahaka ny andro mangiran-dratsy.'
  - type: text
    content: ;
  - type: text
    content: tsy mbola nisy toy izany hatrizay hatrizay
  - type: text
    content: sady tsy hisy toy izany intsony any aoriany.
  '20':
  - type: text
    content: Horoahiko lavitra anareo
  - type: text
    content: ny fahavalonareo avy any avaratra
  - type: text
    content: ka halefako any an-taniefitra sy karankaina;
  - type: text
    content: any amin’ny Ranomasina Maty
  - type: text
    content: no hazerako ny lohalalany,
  - type: text
    content: ary any amin’ny Ranomasina Mediteranea
  - type: text
    content: no hatsipiko ny vodilalany.
  - type: text
    content: Fofon-dratsy no hiakatra
  - type: text
    content: avy amin’ny fatin’ireo
  - type: text
    content: ka hanamaimbo ny rivotra.
  - type: text
    content: Eny, zava-dehibe toy izany
  - type: text
    content: no nataon’ny TOMPO taminareo.
  '21':
  - type: text
    content: Aza matahotra, ry tany fambolena,
  - type: text
    content: miravoravo sy mifalia ianao
  - type: text
    content: fa manao zava-dehibe ny TOMPO.
  '22':
  - type: text
    content: Aza matahotra, ry biby any an-tsaha,
  - type: text
    content: fa mihamaitso ny kijana any an-taniefitra,
  - type: text
    content: mamoa ny hazo
  - type: text
    content: ary vokatra ny aviavy
  - type: text
    content: sy ny voaloboka.
  '23':
  - type: text
    content: 'Ary ianareo, ry mponin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ','
  - type: text
    content: miravoravoa sy mifalia
  - type: text
    content: amin’ny TOMPO Andriamanitrareo,
  - type: text
    content: fa ny oram-pararano sahaza
  - type: text
    content: no omeny anareo;
  - type: text
    content: alatsany aminareo toy ny fahiny koa
  - type: text
    content: ny ranonorana mivatravatra,
  - type: text
    content: dia ny oran-dohataona sy ny oran-dririnina.
  '24':
  - type: text
    content: Koa feno varimbazaha ny famoloana;
  - type: text
    content: ary mitosaka ny divay sy menaka
  - type: text
    content: ka mihoatra ny vata fanantazana azy.
  '25':
  - type: text
    content: «Onerako aminareo, hoy ny TOMPO,
  - type: text
    content: ireo vokatra nohanin’ny fanday sy ny valala
  - type: text
    content: mbamin’ny voangory sy ny kijeja;
  - type: text
    content: ireny miaramila betsaka ireny
  - type: text
    content: no nalefako hamely anareo
  - type: note
    content: Jereo 1.4,6.
  - type: text
    content: .
  '26':
  - type: text
    content: Hihinan-ko voky ianareo
  - type: text
    content: ka hidera Ahy TOMPO Andriamanitrareo,
  - type: text
    content: Izay nanao zava-mahagaga taminareo.
  - type: text
    content: Ary ny vahoakako, na oviana na oviana,
  - type: text
    content: dia tsy ho menatra intsony.
  '27':
  - type: text
    content: Ary hiaiky ianareo
  - type: text
    content: fa eo afovoanareo Israelita Aho,
  - type: text
    content: ka ny TOMPO Andriamanitrareo
  - type: text
    content: dia Izaho fa tsy hafa.
  - type: text
    content: Ary ny vahoakako, na oviana na oviana,
  - type: text
    content: dia tsy ho menatra intsony.»
  '3':
  - type: text
    content: Tahaka ny afo mandevona
  - type: text
    content: no hanimbany ny eo alohany
  - type: text
    content: sy handoroany ny ao aoriany.
  - type: text
    content: Talohan’ny fahatongavany
  - type: text
    content: dia toy ny zaridainan’i Hedena
  - type: note
    content: 'zaridainan’i Hedena: jereo Gen 2.8-9; Ezek 36.35.'
  - type: text
    content: ' ny tany;'
  - type: text
    content: taorian’ny fandalovany kosa
  - type: text
    content: dia taniefitra kilan’ny afo no sisa.
  - type: text
    content: Eny, tsy nisy izay tsy ravany.
  '4':
  - type: text
    content: Fa tahaka ny soavaly izy
  - type: text
    content: ary mihazakazaka toa soavaly miriotra.
  '5':
  - type: text
    content: Tahaka ny firodorodon’ny kalesy
  - type: text
    content: na ny fipoapoaky ny lelafo
  - type: text
    content: amin’ny bozaka may
  - type: text
    content: no itsambikimbikinany
  - type: text
    content: mitety tampon-tendrombohitra.
  - type: text
    content: Eny, tahaka ny tafika matanjaka
  - type: text
    content: no efa ilaharany mivonon-kiady.
  '6':
  - type: text
    content: Mangovitra eo anoloany ny vahoaka,
  - type: text
    content: ka tera-mena avokoa ny endriny.
  '7':
  - type: text
    content: Tahaka ny lehilahy mahery
  - type: text
    content: ny fihazakazahany
  - type: text
    content: ary tahaka ny miaramila mpiady
  - type: text
    content: ny fianihany manda.
  - type: text
    content: Samy mandeha amin’izay hitsiny izy,
  - type: text
    content: fa tsy mivilivily lalana.
  '8':
  - type: text
    content: Tsy mba mifanosika izy,
  - type: text
    content: fa mandroso amin’ny lalany avy.
  - type: text
    content: Sahy misedra izay asehatra azy izy,
  - type: text
    content: fa tsy voasakan’izany.
  '9':
  - type: text
    content: Mamakivaky ny tanàna izy,
  - type: text
    content: mihazakazaka eny amin’ny manda;
  - type: text
    content: mianika ny trano izy
  - type: text
    content: ary miditra eo am-baravarankely
  - type: text
    content: toy ny mpangalatra.
