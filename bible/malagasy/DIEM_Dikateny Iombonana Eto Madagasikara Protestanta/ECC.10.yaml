document_id: ECC.10
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fatin-dalitra no mahamaimbo sy manimba ny ilomanitry ny mpanao zava-manitra; toy izany koa, ny fahadalana kely dia mavesa-danja bebe kokoa noho ny fahendrena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fisainan’ny hendry dia miasa tsara, fa ny fisainan’ny adala kosa no diso fandray hevitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha mandeha eny an-dalana ny adala, dia milaza tena amin’ny olon-drehetra ho adala satria tsy ampy saina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha tezitra aminao ny mpampiasa anao, dia aza miala amin’ny toeranao; fa ny fihetsika tony misoroka fahadisoana be vava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mety diso ny mpitondra. Ratsy hitako tetỳ ambonin’ny tany koa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Misy indraindray olona adala mitana toerana ambony, ary misy olo-manankaja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'olo-manankaja: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanankarena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'voatazona amin’ny toerana ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahita mpanompo mitaingin-tsoavaly aho ary olona ambony mandeha tongotra toy ny mpanompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny olona izay mihady lavaka no mety ho latsaka ao ary izay mandrava rindrina no ho voakaikitry ny bibilava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 26.27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manongotra ny vato no haratrany ary izay mamaky ny hazo no mety hahita loza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha dombo ny famaky ka tsy asaina, dia tsy maintsy mampiasa bebe kokoa ny herin-tena ny mpikapa. Ny fahendrena manko no fomba tsara indrindra hahombiazana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy misy tombontsoan’ny olona mahay mibaiko bibilava, raha toa ka mbola voakaikiny ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aza be teny loatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny teny aloaky ny vavan’ny hendry dia sitraky ny olona; fa ny resaky ny adala kosa manala baràka tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fahadalana no fiandohan’ny teny aloaky ny vavany; fa ny fiafarany kosa dia fahaverezan-tsaina mampidi-doza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy mitsaha-miteny ny adala; kanefa tsy misy olona mahalala akory ny hoavy. Tsy misy mahalaza amin’ny olona izay hitranga aorian’ny fahalasanany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Reraka mafy amin-javatra bitika ny adala, fa ny lalana mankao an-tanàna avy no tsy fantany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mampalahelo ny tany izay manana mpanjaka mbola tanora fanahy sy mpitondra tendan-kanina vao maraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sambatra kosa ny tany izay manana mpanjaka ombàn-toe-panahy ambony sy mpitondra misakafo ara-potoana mba ho fanovozan-kery fa tsy ho fimamoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mampiletsy ny tafontrano ny fahakamoana hanamboatra azy; ary ny asa tsirambina no mampitete ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manao sakafo ireo lehibe mba hikoranany; ny divay kosa maharavoravo ny ainy; ary ny vola no hahazoany manao izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza manozona ny mpanjaka, na dia anakampo ihany aza; tahaka izany koa aza manozona ny olo-manankaja na dia ao an’efitrano fandrianao aza. Fa mety hoentin’ny vorona ny feonao ary hambaran’ny manana elatra ny teninao.
