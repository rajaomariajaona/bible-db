document_id: ECC.10,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fatin-dalitra no mahamaimbo sy manimba ny ilomanitry ny mpanao zava-manitra; toy izany koa, ny fahadalana kely dia mavesa-danja bebe kokoa noho ny fahendrena.
  '10':
  - type: text
    content: Raha dombo ny famaky ka tsy asaina, dia tsy maintsy mampiasa bebe kokoa ny herin-tena ny mpikapa. Ny fahendrena manko no fomba tsara indrindra hahombiazana.
  '11':
  - type: text
    content: Tsy misy tombontsoan’ny olona mahay mibaiko bibilava, raha toa ka mbola voakaikiny ihany.
  - type: heading
    content: Aza be teny loatra
  '12':
  - type: text
    content: 'Ny teny aloaky ny vavan’ny hendry dia sitraky ny olona; fa ny resaky ny adala kosa manala baràka tena. '
  '13':
  - type: text
    content: 'Fahadalana no fiandohan’ny teny aloaky ny vavany; fa ny fiafarany kosa dia fahaverezan-tsaina mampidi-doza. '
  '14':
  - type: text
    content: 'Tsy mitsaha-miteny ny adala; kanefa tsy misy olona mahalala akory ny hoavy. Tsy misy mahalaza amin’ny olona izay hitranga aorian’ny fahalasanany? '
  '15':
  - type: text
    content: Reraka mafy amin-javatra bitika ny adala, fa ny lalana mankao an-tanàna avy no tsy fantany.
  '16':
  - type: text
    content: 'Mampalahelo ny tany izay manana mpanjaka mbola tanora fanahy sy mpitondra tendan-kanina vao maraina. '
  '17':
  - type: text
    content: Sambatra kosa ny tany izay manana mpanjaka ombàn-toe-panahy ambony sy mpitondra misakafo ara-potoana mba ho fanovozan-kery fa tsy ho fimamoana.
  '18':
  - type: text
    content: Mampiletsy ny tafontrano ny fahakamoana hanamboatra azy; ary ny asa tsirambina no mampitete ny trano.
  '19':
  - type: text
    content: 'Manao sakafo ireo lehibe mba hikoranany; ny divay kosa maharavoravo ny ainy; ary ny vola no hahazoany manao izany rehetra izany. '
  '2':
  - type: text
    content: Ny fisainan’ny hendry dia miasa tsara, fa ny fisainan’ny adala kosa no diso fandray hevitra.
  '20':
  - type: text
    content: Aza manozona ny mpanjaka, na dia anakampo ihany aza; tahaka izany koa aza manozona ny olo-manankaja na dia ao an’efitrano fandrianao aza. Fa mety hoentin’ny vorona ny feonao ary hambaran’ny manana elatra ny teninao.
  '3':
  - type: text
    content: Raha mandeha eny an-dalana ny adala, dia milaza tena amin’ny olon-drehetra ho adala satria tsy ampy saina izy.
  '4':
  - type: text
    content: Raha tezitra aminao ny mpampiasa anao, dia aza miala amin’ny toeranao; fa ny fihetsika tony misoroka fahadisoana be vava.
  '5':
  - type: text
    content: 'Mety diso ny mpitondra. Ratsy hitako tetỳ ambonin’ny tany koa izany. '
  '6':
  - type: text
    content: Misy indraindray olona adala mitana toerana ambony, ary misy olo-manankaja
  - type: note
    content: 'olo-manankaja: dkt hafa mpanankarena.'
  - type: text
    content: 'voatazona amin’ny toerana ambany. '
  '7':
  - type: text
    content: Nahita mpanompo mitaingin-tsoavaly aho ary olona ambony mandeha tongotra toy ny mpanompo.
  '8':
  - type: text
    content: Ny olona izay mihady lavaka no mety ho latsaka ao ary izay mandrava rindrina no ho voakaikitry ny bibilava
  - type: note
    content: Jereo Oha 26.27.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Izay manongotra ny vato no haratrany ary izay mamaky ny hazo no mety hahita loza.
