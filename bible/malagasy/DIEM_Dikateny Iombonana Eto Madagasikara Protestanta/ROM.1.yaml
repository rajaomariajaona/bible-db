    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa anehoan’Andriamanitra ny fahatezerany avy any an-danitra ny olona, satria tsy manaja an’Andriamanitra ary manao ny tsy rariny amin’ny namana; ka noho ny asa ratsin’ny olona, dia voasarona ilay Andriamanitra tena Izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa miharihary amin’ny olona ny tokony ho fantany momba an’Andriamanitra taminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao amin’ny Soratra Masina no efa nampanantenain’Andriamanitra tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 52.7; 61.1.
      marker-yv: yv-n
    - type: text
      text: ' io Vaovao Mahafaly io: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, tsy hita maso Andriamanitra. Nefa hatramin’ny nahariany an’izao rehetra izao, dia eo ny asany mampahafantatra Azy, mampibaribary fa mahery hatrizay hatrizay Izy ary Andriamanitra tokoa. Hany ka tsy afa-tsiny eo anatrehan’Andriamanitra ny olona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahalala an’Andriamanitra tokoa izy ireo, saingy tsy nanolotra ny voninahitra sy ny saotra tandrify Azy. Fa zavatra diso no nanjary nosaintsaininy, ary tonga maizina ny fony donto. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilaza ho hendry ny olona, nefa tonga adala. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ilay Andriamanitra be voninahitra sy tsy mety levona nosoloany sarin-javatra mety levona, dia sary mampiseho olona, vorona, biby mandeha tongotra efatra na biby mikisaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
