document_id: ROM.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa ity taratasy ity, dia izaho nantsoin’Andriamanitra ho '
  - type: text
    content: apôstôly
  - type: text
    content: ', ary natokany mba hampahafantatra ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' avy aminy.'
  '10':
  - type: text
    content: 'rehefa mivavaka, sady mitalaho tsy an-kijanona mba ho sitrak’Andriamanitra ny hamela ahy ho tody soa aman-tsara atỳ aminareo. '
  '11':
  - type: text
    content: 'Irîko dia irîko tokoa ny hahita tava anareo hahazoako mampita aminareo fanomezam-pahasoavana avy amin’ny Fanahy Masina, mba hankahery anareo '
  '12':
  - type: text
    content: na ho mba hiarahantsika mifampirisika eo anivonareo amin’ny finoana iombonantsika.
  '13':
  - type: text
    content: Tiako ho fantatrareo, ry havana, fa matetika aho no manam-pikasana hankatỳ aminareo
  - type: note
    content: Jereo Asa 19.21.
  - type: text
    content: ', saingy azon-tsampona ihany hatramin’izao. Te hahazo voka-tsoa eto aminareo koa manko aho toy ny tany amin’ny firenena sasany. '
  '14':
  - type: text
    content: 'Saingy ananako adidy avokoa na ny Grika na ny firenen-kafa, na ny manam-pahaizana na ny tsy nahita fianarana; '
  '15':
  - type: text
    content: 'hany ka maika erỳ aho hanambara ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' aminareo atỳ Rôma koa.'
  - type: heading
    content: Mahery ny Vaovao Mahafaly
  '16':
  - type: text
    content: 'Fa tsy menatra ny Vaovao Mahafaly aho, satria io no herin’Andriamanitra ho famonjena izay rehetra mino, dia ny Jiosy aloha vao ny '
  - type: text
    content: hafa firenena
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Eny, asehon’ny Vaovao Mahafaly fa ny aneken’Andriamanitra ny olona ho marina dia ny finoana, hatramin’ny voalohany ka hatramin’ny farany, araka ny voalazan’ny Soratra Masina hoe: «Ny olo-marina noho ny finoana dia ho velona'
  - type: note
    content: 'ny aneken’...dia ny finoana na hoe ny andraisana ny fahamarinana omen’Andriamanitra dia ny finoana. –Ny olo-marina... velona (jereo Hab 2.4): dkt hafa «Ny olo-marina dia ho velona araka ny finoana» na hoe «Ny finoana no hahavelona ny olo-marina».'
  - type: text
    content: .»
  - type: heading
    content: Mpanota ny hafa firenena mpanompo sampy
  '18':
  - type: text
    content: 'Efa anehoan’Andriamanitra ny fahatezerany avy any an-danitra ny olona, satria tsy manaja an’Andriamanitra ary manao ny tsy rariny amin’ny namana; ka noho ny asa ratsin’ny olona, dia voasarona ilay Andriamanitra tena Izy. '
  '19':
  - type: text
    content: 'Fa miharihary amin’ny olona ny tokony ho fantany momba an’Andriamanitra taminy. '
  '2':
  - type: text
    content: 'Ao amin’ny Soratra Masina no efa nampanantenain’Andriamanitra tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: note
    content: Jereo Is 52.7; 61.1.
  - type: text
    content: ' io Vaovao Mahafaly io: '
  '20':
  - type: text
    content: 'Eny, tsy hita maso Andriamanitra. Nefa hatramin’ny nahariany an’izao rehetra izao, dia eo ny asany mampahafantatra Azy, mampibaribary fa mahery hatrizay hatrizay Izy ary Andriamanitra tokoa. Hany ka tsy afa-tsiny eo anatrehan’Andriamanitra ny olona. '
  '21':
  - type: text
    content: 'Nahalala an’Andriamanitra tokoa izy ireo, saingy tsy nanolotra ny voninahitra sy ny saotra tandrify Azy. Fa zavatra diso no nanjary nosaintsaininy, ary tonga maizina ny fony donto. '
  '22':
  - type: text
    content: 'Nilaza ho hendry ny olona, nefa tonga adala. '
  '23':
  - type: text
    content: Ilay Andriamanitra be voninahitra sy tsy mety levona nosoloany sarin-javatra mety levona, dia sary mampiseho olona, vorona, biby mandeha tongotra efatra na biby mikisaka
  - type: note
    content: Ampit Deot 4.16-18.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Izany no nanoloran’Andriamanitra ny olona ho andevozin’ny filàn’ny fony, ka handotoany tena amin’ny tsy fanao mahavoafady. '
  '25':
  - type: text
    content: 'Ny lainga no nasolony an’ilay Andriamanitra tena Izy, zavaboaary no nohajainy sy notompoiny ho solon’ny Mpahary Izay ankalazaina mandrakizay. '
  - type: text
    content: Amen
  - type: text
    content: '!'
  '26':
  - type: text
    content: 'Izany no nanoloran’Andriamanitra ny olona ho andevozin’ny filàndratsy mahavoafady. Ka ny vehivavy ao aminy dia manova ny fanao amin’ny vadiny ary zavatra mifanohitra amin’izany no ataony; '
  '27':
  - type: text
    content: toy izany koa ny lehilahy ao aminy dia mandao ny fanao amin’ny vadiny, ary manjary maimay mifampila samy lehilahy sady mifanala baràka tena, hany ka mandray ny sazy mendrika ny hadalàny.
  '28':
  - type: text
    content: 'Nataon’ny olona ho tsinontsinona ny mahalala an’Andriamanitra, ka izany no nanoloran’Andriamanitra azy hoentin’ny sainy mibirioka, mba ho voatarika hanao ny tsy tokony hatao: '
  '29':
  - type: text
    content: 'ka dia tonga feno izao tsy rariny, haratsiana, fitiavan-karena sy halozana isan-karazany izao; tonga mpialona, mpamono olona, mpihantsy ady, mpamitaka, mpanao otri-po, mpanely tsaho; '
  '3':
  - type: text
    content: 'dia ny amin’ny '
  - type: text
    content: Zanany
  - type: text
    content: ', i Jesoa Kristy Tompontsika. Araka ny maha olombelona, dia avy amin’ny taranak’i Davida mpanjaka i Jesoa; '
  '30':
  - type: text
    content: 'tonga mpanaratsy olona, mpankahala an’Andriamanitra, entin-kambo dia toerana, mpirehareha, mpiavonavona, mpamoron-dratsy, tsy manaiky ray aman-dreny, '
  '31':
  - type: text
    content: 'tsy manam-pahalalana, tsy azo itokiana, tsy mifaditra ovana, tsy mahay miantra. '
  '32':
  - type: text
    content: 'Mendrika ho faty ny olona manao ny asa toy ireny: didim-pitsarana navoakan’Andriamanitra izany, ary fantatr’izy ireo tsara. Nefa izy ireo dia mbola manao ihany, ary izay manao koa ankasitrahiny.'
  '4':
  - type: text
    content: araka ny Fanahy Masina kosa, dia naharihary tamin-kery fa Zanak’Andriamanitra
  - type: note
    content: 'and 3-4: avy amin’ny... mpanjaka, jereo Mt 1.1. –Zanak’Andriamanitra: jereo Sal 2.7.'
  - type: text
    content: ' fony Izy tafatsangana velona avy tany amin’ny maty. '
  '5':
  - type: text
    content: 'Tamin’ny alalan’i Jesoa Kristy no nandraisanay tombon-tsoa maha apôstôly ho voninahitr’i Kristy, mba hitarihanay ny firenen-drehetra hino sy hanaiky Azy. '
  '6':
  - type: text
    content: Ary ianareo, voaantson’Andriamanitra mba hatokana ho an’i Kristy, dia isan’ireny olona notarihinay ireny koa.
  '7':
  - type: text
    content: 'Mamangy anareo atỳ Rôma aho, dia ianareo rehetra malalan’Andriamanitra sy nantsoiny ho '
  - type: text
    content: vahoakany
  - type: text
    content: . Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
  - type: heading
    content: Irîn’i Paoly ny hankany Rôma
  '8':
  - type: text
    content: 'Voalohany indrindra dia velom-pisaorana an’ilay Andriamanitro aho amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' noho ny aminareo rehetra, satria re laza eran-tany ny finoanareo. '
  '9':
  - type: text
    content: 'Vavolombeloko Andriamanitra, dia Ilay tompoiko amin’ny foko tokoa amin’ny fanambarana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba ny '
  - type: text
    content: Zanany
  - type: text
    content: '; eny, vavolombeloko Andriamanitra fa mahatsiaro anareo lalandava aho '
