segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Paoly mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa ity taratasy ity, dia izaho nantsoin’Andriamanitra ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ', ary natokany mba hampahafantatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' avy aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ao amin’ny Soratra Masina no efa nampanantenain’Andriamanitra tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 52.7; 61.1.
    marker-yv: yv-n
  - type: text
    text: ' io Vaovao Mahafaly io: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ', i Jesoa Kristy Tompontsika. Araka ny maha olombelona, dia avy amin’ny taranak’i Davida mpanjaka i Jesoa; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: araka ny Fanahy Masina kosa, dia naharihary tamin-kery fa Zanak’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'and 3-4:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' avy amin’ny... mpanjaka, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 1.1. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Zanak’Andriamanitra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Sal 2.7.'
    marker-yv: yv-n
  - type: text
    text: ' fony Izy tafatsangana velona avy tany amin’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny alalan’i Jesoa Kristy no nandraisanay tombon-tsoa maha apôstôly ho voninahitr’i Kristy, mba hitarihanay ny firenen-drehetra hino sy hanaiky Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ianareo, voaantson’Andriamanitra mba hatokana ho an’i Kristy, dia isan’ireny olona notarihinay ireny koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mamangy anareo atỳ Rôma aho, dia ianareo rehetra malalan’Andriamanitra sy nantsoiny ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakany
  - type: text
    text: . Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy i Jesoa Kristy Tompo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irîn’i Paoly ny hankany Rôma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voalohany indrindra dia velom-pisaorana an’ilay Andriamanitro aho amin’ny alalan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' noho ny aminareo rehetra, satria re laza eran-tany ny finoanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vavolombeloko Andriamanitra, dia Ilay tompoiko amin’ny foko tokoa amin’ny fanambarana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: '; eny, vavolombeloko Andriamanitra fa mahatsiaro anareo lalandava aho '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'rehefa mivavaka, sady mitalaho tsy an-kijanona mba ho sitrak’Andriamanitra ny hamela ahy ho tody soa aman-tsara atỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Irîko dia irîko tokoa ny hahita tava anareo hahazoako mampita aminareo fanomezam-pahasoavana avy amin’ny Fanahy Masina, mba hankahery anareo '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: na ho mba hiarahantsika mifampirisika eo anivonareo amin’ny finoana iombonantsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tiako ho fantatrareo, ry havana, fa matetika aho no manam-pikasana hankatỳ aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 19.21.
    marker-yv: yv-n
  - type: text
    text: ', saingy azon-tsampona ihany hatramin’izao. Te hahazo voka-tsoa eto aminareo koa manko aho toy ny tany amin’ny firenena sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saingy ananako adidy avokoa na ny Grika na ny firenen-kafa, na ny manam-pahaizana na ny tsy nahita fianarana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'hany ka maika erỳ aho hanambara ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' aminareo atỳ Rôma koa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Mahery ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa tsy menatra ny Vaovao Mahafaly aho, satria io no herin’Andriamanitra ho famonjena izay rehetra mino, dia ny Jiosy aloha vao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eny, asehon’ny Vaovao Mahafaly fa ny aneken’Andriamanitra ny olona ho marina dia ny finoana, hatramin’ny voalohany ka hatramin’ny farany, araka ny voalazan’ny Soratra Masina hoe: «Ny olo-marina noho ny finoana dia ho velona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny aneken’...dia ny finoana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny andraisana ny fahamarinana omen’Andriamanitra dia ny finoana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ny olo-marina... velona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Hab 2.4): dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Ny olo-marina dia ho velona araka ny finoana»
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Ny finoana no hahavelona ny olo-marina».
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Mpanota ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' mpanompo sampy'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Efa anehoan’Andriamanitra ny fahatezerany avy any an-danitra ny olona, satria tsy manaja an’Andriamanitra ary manao ny tsy rariny amin’ny namana; ka noho ny asa ratsin’ny olona, dia voasarona ilay Andriamanitra tena Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa miharihary amin’ny olona ny tokony ho fantany momba an’Andriamanitra taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eny, tsy hita maso Andriamanitra. Nefa hatramin’ny nahariany an’izao rehetra izao, dia eo ny asany mampahafantatra Azy, mampibaribary fa mahery hatrizay hatrizay Izy ary Andriamanitra tokoa. Hany ka tsy afa-tsiny eo anatrehan’Andriamanitra ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nahalala an’Andriamanitra tokoa izy ireo, saingy tsy nanolotra ny voninahitra sy ny saotra tandrify Azy. Fa zavatra diso no nanjary nosaintsaininy, ary tonga maizina ny fony donto. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nilaza ho hendry ny olona, nefa tonga adala. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ilay Andriamanitra be voninahitra sy tsy mety levona nosoloany sarin-javatra mety levona, dia sary mampiseho olona, vorona, biby mandeha tongotra efatra na biby mikisaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 4.16-18.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izany no nanoloran’Andriamanitra ny olona ho andevozin’ny filàn’ny fony, ka handotoany tena amin’ny tsy fanao mahavoafady. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny lainga no nasolony an’ilay Andriamanitra tena Izy, zavaboaary no nohajainy sy notompoiny ho solon’ny Mpahary Izay ankalazaina mandrakizay. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany no nanoloran’Andriamanitra ny olona ho andevozin’ny filàndratsy mahavoafady. Ka ny vehivavy ao aminy dia manova ny fanao amin’ny vadiny ary zavatra mifanohitra amin’izany no ataony; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: toy izany koa ny lehilahy ao aminy dia mandao ny fanao amin’ny vadiny, ary manjary maimay mifampila samy lehilahy sady mifanala baràka tena, hany ka mandray ny sazy mendrika ny hadalàny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nataon’ny olona ho tsinontsinona ny mahalala an’Andriamanitra, ka izany no nanoloran’Andriamanitra azy hoentin’ny sainy mibirioka, mba ho voatarika hanao ny tsy tokony hatao: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka dia tonga feno izao tsy rariny, haratsiana, fitiavan-karena sy halozana isan-karazany izao; tonga mpialona, mpamono olona, mpihantsy ady, mpamitaka, mpanao otri-po, mpanely tsaho; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'tonga mpanaratsy olona, mpankahala an’Andriamanitra, entin-kambo dia toerana, mpirehareha, mpiavonavona, mpamoron-dratsy, tsy manaiky ray aman-dreny, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'tsy manam-pahalalana, tsy azo itokiana, tsy mifaditra ovana, tsy mahay miantra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mendrika ho faty ny olona manao ny asa toy ireny: didim-pitsarana navoakan’Andriamanitra izany, ary fantatr’izy ireo tsara. Nefa izy ireo dia mbola manao ihany, ary izay manao koa ankasitrahiny.'
