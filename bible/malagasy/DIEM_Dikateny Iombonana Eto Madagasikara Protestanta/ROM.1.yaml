    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy menatra ny Vaovao Mahafaly aho, satria io no herin’Andriamanitra ho famonjena izay rehetra mino, dia ny Jiosy aloha vao ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, asehon’ny Vaovao Mahafaly fa ny aneken’Andriamanitra ny olona ho marina dia ny finoana, hatramin’ny voalohany ka hatramin’ny farany, araka ny voalazan’ny Soratra Masina hoe: «Ny olo-marina noho ny finoana dia ho velona'
