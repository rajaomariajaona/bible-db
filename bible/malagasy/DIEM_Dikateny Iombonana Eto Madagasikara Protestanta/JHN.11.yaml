document_id: JHN.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Lazara
  - type: text
    content: Nisy lehilahy anankiray narary, dia i Lazara izay nonina tao Betania, tanàna nisy an’i Maria sy i Marta
  - type: note
    content: 'Jereo Lk 10.38-39. –Lazara: anarana fahita matetika tamin’ny andron’i Jesoa ka fanafohezana ny hoe Eleazara (Andriamanitra manampy). –Betania: jereo Mk 11.1 sy nta.'
  - type: text
    content: ' rahavaviny. '
  '10':
  - type: text
    content: fa raha misy mandeha amin’ny alina, dia ho tafintohina izy satria tsy misy fahazavana ao aminy.
  '11':
  - type: text
    content: 'Avy nilaza izany i Jesoa, dia nanao tamin’ny mpianany hoe:'
  - type: text
    content: –Matory i Lazara sakaizantsika, fa handeha hamoha azy aho.
  '12':
  - type: text
    content: 'Ka hoy ny mpianany taminy:'
  - type: text
    content: –Raha matory izy, ry Tompo, dia ho sitrana ihany!
  '13':
  - type: text
    content: 'Ny fahafatesan’i Lazara no voalazan’i Jesoa, kanefa nihevitra izy ireo fa torimaso no teneniny. '
  '14':
  - type: text
    content: 'Izay i Jesoa vao nilaza mazava taminy hoe:'
  - type: text
    content: '–Maty i Lazara! '
  '15':
  - type: text
    content: Ary noho ianareo, dia faly Aho tsy teo aminy, mba hinoanareo. Koa ndeha isika hankany amin’i Lazara!
  '16':
  - type: text
    content: 'Ary i Tômà (ilay atao hoe Ikambana) dia niteny tamin’ny mpianatra namany hoe:'
  - type: text
    content: –Ndeha koa isika hiara-maty amin’ny Mpampianatra antsika!
  - type: heading
    content: Manangana ho velona i Jesoa
  '17':
  - type: text
    content: 'Nony tonga tany Betania i Jesoa, dia nahita fa efa nalevina efatra andro i Lazara. '
  '18':
  - type: text
    content: 'Ity Betania ity dia akaikin’i Jerosalema tokony ho telo kilaometatra, '
  '19':
  - type: text
    content: ka maro tamin’ny Jiosy no tonga tao amin-dry i Marta sy i Maria hitsapa alahelo azy mirahavavy noho ny nahafatesan’ny anadahiny.
  '2':
  - type: text
    content: I Maria dia ilay vehivavy nanosotra ilomanitra ny tongotry ny Tompo sy namaoka ny tongony tamin’ny volon-dohany; ary i Lazara anadahiny no narary
  - type: note
    content: Jereo 12.3.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Vao ren’i Marta fa tamy i Jesoa, dia lasa izy nitsena Azy; fa i Maria no nipetraka tao an-trano. '
  '21':
  - type: text
    content: 'Ary hoy i Marta tamin’i Jesoa:'
  - type: text
    content: '–Raha teto Ianao, ry Tompo, dia tsy maty ny anadahiko. '
  '22':
  - type: text
    content: Ary na dia izao ankehitriny izao aza, dia fantatro fa na inona na inona hangatahinao amin’Andriamanitra, dia homen’Andriamanitra Anao.
  '23':
  - type: text
    content: 'I Jesoa kosa niteny taminy hoe:'
  - type: text
    content: –Hitsangana velona ny anadahinao!
  '24':
  - type: text
    content: 'Fa hoy i Marta taminy:'
  - type: text
    content: –Fantatro fa hitsangana velona izy amin’ilay fitsanganan’ny maty amin’ny andro farany
  - type: note
    content: Jereo Dan 12.2.
  - type: text
    content: '!'
  '25':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Izaho no manangana ho velona sy manome aina. Izay mino Ahy, na dia maty aza, dia ho velona; '
  '26':
  - type: text
    content: ary izay rehetra mivelona amiko ka mino Ahy, dia tsy ho faty na oviana na oviana. Mino izany ve ianao?
  '27':
  - type: text
    content: 'Ka novalian’i Marta hoe:'
  - type: text
    content: '–Eny, ry Tompo, mino aho fa Ianao no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', Ilay tonga eo amin’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: '!'
  - type: heading
    content: Mitomany i Jesoa
  '28':
  - type: text
    content: 'Rehefa nilaza izany i Marta, dia lasa niantso mangingina an’i Maria rahavaviny nanao hoe:'
  - type: text
    content: –Ao ny Mpampianatra, miantso anao!
  '29':
  - type: text
    content: 'Vao nandre izany kosa i Maria, dia nitsangana faingana nankany amin’i Jesoa. '
  '3':
  - type: text
    content: 'Dia naniraka olona tany amin’i Jesoa izy mirahavavy hilaza hoe:'
  - type: text
    content: –Tompo ô, marary ilay sakaizanao!
  '30':
  - type: text
    content: 'Mbola tsy tonga tao an-tanàna Izy fa mbola teo amin’ny toerana nitsenan’i Marta Azy ihany. '
  '31':
  - type: text
    content: 'Ary ny Jiosy izay teo amin’i Maria tao an-trano sy nitsapa alahelo azy, raha nahita azy nitsangana faingana ka lasa any ivelany, dia nanaraka azy, satria nataony fa nankany amin’ny fasana hitomany any izy. '
  '32':
  - type: text
    content: 'I Maria kosa, nony tonga teo amin’izay nitoeran’i Jesoa, ka nahita Azy, dia niankohoka teo an-tongony sady niteny taminy hoe:'
  - type: text
    content: –Raha teto Ianao, ry Tompo, dia tsy maty ny anadahiko!
  '33':
  - type: text
    content: 'Nony hitan’i Jesoa fa nitomany i Maria ary nitomany koa ireo Jiosy niaraka taminy, dia niontana ny fony ka tora-kovitra Izy '
  '34':
  - type: text
    content: 'sady nanao hoe:'
  - type: text
    content: –Aiza no nandevenanareo azy?
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Avia Ianao hizaha, ry Tompo!
  '35':
  - type: text
    content: 'Nitomany i Jesoa, '
  '36':
  - type: text
    content: 'ka hoy ny Jiosy:'
  - type: text
    content: –Akory ity haben’ny fitiavany an’i Lazara!
  '37':
  - type: text
    content: 'Fa hoy kosa ny sasany tamin’izy ireo:'
  - type: text
    content: –Efa nampahiratra ny mason’ilay jamba Izy
  - type: note
    content: Jereo 9.6.
  - type: text
    content: ', ka tsy hainy natao ve ny tsy hahafaty an-dralehilahy ity?'
  - type: heading
    content: Velona aina indray i Lazara
  '38':
  - type: text
    content: Dia niontana indray ny fon’i Jesoa ka nankeo amin’ny fasana Izy. Zohy notampenana vato
  - type: note
    content: Tany Palestinina faha Jesoa, ny fasana dia mazàna lavahana tamin’ny vatolampy eny an-tehezambohitra eny, ary nohidina vatofisaka lehibe miendrika faribolana. Jereo Mt 27.60; Mk 15.46; Lk 24.2.
  - type: text
    content: ' izany fasana izany. '
  '39':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Esory ny vato!
  - type: text
    content: 'Fa i Marta, ilay anabavin’ny maty, no namaly Azy hoe:'
  - type: text
    content: –Efa maimbo ny faty, ry Tompo, satria efatra andro izay no nandevenana azy.
  '4':
  - type: text
    content: 'Rehefa nandre izany i Jesoa, dia nanao hoe:'
  - type: text
    content: '–Aretina tsy miafara amin’ny fahafatesana izay fa aretina tonga mba hisehoan’ny voninahitr’Andriamanitra ka hahazoan’ny '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ' voninahitra!'
  '40':
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  - type: text
    content: –Tsy efa voalazako taminao ve fa raha mino ianao, dia hahita ny voninahitr’Andriamanitra?
  '41':
  - type: text
    content: 'Dia nesorin’ny olona ny vato. I Jesoa kosa nanandratra ny masony any ambony sady nanao hoe:'
  - type: text
    content: '–Ray ô, misaotra Anao Aho, satria efa nihaino Ahy Ianao. '
  '42':
  - type: text
    content: Raha Izaho, dia fantatro fa mihaino Ahy mandrakariva Ianao; fa noho ny vahoaka manodidina Ahy kosa no nilazako izany, mba hinoany fa Ianao no naniraka Ahy.
  '43':
  - type: text
    content: 'Avy nilaza izany i Jesoa, dia niantso tamin’ny feo mahery hoe:'
  - type: text
    content: –Mivoaha tao, ry Lazara!
  '44':
  - type: text
    content: Dia niala tao ny maty, ny tongotra aman-tanana nisy fehim-paty, ary ny tava voasarona lamba
  - type: note
    content: Ampit 20.6-7.
  - type: text
    content: '. Fa hoy i Jesoa tamin’ny olona:'
  - type: text
    content: –Vahao izy, dia avelao handeha!
  - type: heading
    content: Mitetika hamono an’i Jesoa ny manampahefana jiosy
  - type: heading
    content: (Jereo Mt 26.1-5; Mk 14.1-2; Lk 22.1-2)
  '45':
  - type: text
    content: 'Maro tamin’ny Jiosy izay tonga tao amin-dry i Maria ka nahita ny zavatra nataon’i Jesoa no nino Azy. '
  '46':
  - type: text
    content: 'Ny sasany tamin’ireo kosa dia lasa nankany amin’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' ka nilaza taminy ny zavatra nataon’i Jesoa. '
  '47':
  - type: text
    content: 'Dia namory ny '
  - type: text
    content: Fitsarana ambony
  - type: text
    content: ' ireo lohandoha-mpisorona sy ireo Farisianina ka nanao hoe:'
  - type: text
    content: '–Inona ity ataontsika, fa manao '
  - type: text
    content: famantarana
  - type: text
    content: ' maro iny Lehilahy iny? '
  '48':
  - type: text
    content: 'Raha avelantsika hanao toy izany ihany Izy, dia ho avy ny Rômanina handrava ny '
  - type: text
    content: tempolintsika
  - type: text
    content: ' sy ny firenentsika.'
  '49':
  - type: text
    content: 'Ary ny anankiray tamin’izy ireo, dia i Kaiafa izay '
  - type: text
    content: mpisorombe
  - type: text
    content: ' tamin’io taona io, no niteny taminy hoe:'
  - type: text
    content: '–Tsy mahalala na inona na inona ianareo! '
  '5':
  - type: text
    content: 'I Jesoa dia fatra-pitia an’i Marta sy ny rahavaviny ary i Lazara. '
  '50':
  - type: text
    content: Tsy heverinareo akory fa tsara ho anareo raha maty ho an’ny vahoaka ny lehilahy anankiray, mba tsy haharava ny firenena manontolo!
  '51':
  - type: text
    content: 'Tsy avy aminy anefa no nitenenany an’izany, fa noho izy mpisorombe tamin’io taona io no naminaniany fa i Jesoa dia ho faty ho an’ny firenena jiosy; '
  '52':
  - type: text
    content: ary tsy ho an’ny firenena jiosy ihany fa mba hanangona ho iray ny zanak’Andriamanitra efa niely.
  '53':
  - type: text
    content: 'Hatramin’io andro io dia tapa-kevitra ny hamono an’i Jesoa ry zareo. '
  '54':
  - type: text
    content: Koa tsy nandehandeha an-karihary teo amin’ny Jiosy intsony i Jesoa, fa niala teo nankany amin’ny faritany akaikin’ny taniefitra, tany amin’ny tanàna atao hoe Efraîma
  - type: note
    content: I Efraîma eto dia tanàna heverina ho 20 kilaometatra avaratra atsinanan’i Jerosalema.
  - type: text
    content: ', ary nitoetra tany niaraka tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: .
  '55':
  - type: text
    content: 'Efa akaiky tamin’izay ny '
  - type: text
    content: Paska
  - type: text
    content: ' fankalàzan’ny Jiosy, ka maro ny olona avy any ambanivohitra no niakatra tany Jerosalema alohan’ny Paska mba handio tena. '
  '56':
  - type: text
    content: Dia nitady an’i Jesoa ny olona, ka raha nijanona teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' dia nifampiresaka hoe:'
  - type: text
    content: –Ahoana no hevitrareo? Ho tonga ve Izy sa tsy ho tonga amin’ny fankalazana ny Paska?
  '57':
  - type: text
    content: Ny lohandoha-mpisorona sy ny Farisianina kosa efa nandidy fa raha misy olona nahalala izay itoeran’i Jesoa, dia tsy maintsy mampandre mba hisamborana Azy.
  '6':
  - type: text
    content: 'Kanefa mbola nijanona indroa andro teo amin’izany toerana izany ihany Izy, na dia nandre aza fa narary i Lazara. '
  '7':
  - type: text
    content: 'Taorian’izany i Jesoa vao niteny tamin’ny mpianany hoe:'
  - type: text
    content: –Ndeha isika ho any Jodea indray!
  '8':
  - type: text
    content: 'Fa izao no navalin’ny mpianany Azy:'
  - type: text
    content: –Mpampianatra ô, vao haingana teo ny Jiosy no nitady hitora-bato Anao, ka hankany indray ve Ianao?
  '9':
  - type: text
    content: 'Dia hoy i Jesoa:'
  - type: text
    content: –Tsy adiny 12 ve ny indray andro? Koa raha misy olona mandeha amin’ny antoandro, dia tsy mba tafintohina izy satria mahita ny fahazavana manilo an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '; '
