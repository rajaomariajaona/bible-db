document_id: JHN.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Lazara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisy lehilahy anankiray narary, dia i Lazara izay nonina tao Betania, tanàna nisy an’i Maria sy i Marta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 10.38-39. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Lazara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': anarana fahita matetika tamin’ny andron’i Jesoa ka fanafohezana ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Eleazara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (Andriamanitra manampy). –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Betania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Mk 11.1 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ' rahavaviny. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: fa raha misy mandeha amin’ny alina, dia ho tafintohina izy satria tsy misy fahazavana ao aminy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy nilaza izany i Jesoa, dia nanao tamin’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Matory i Lazara sakaizantsika, fa handeha hamoha azy aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny mpianany taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha matory izy, ry Tompo, dia ho sitrana ihany!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahafatesan’i Lazara no voalazan’i Jesoa, kanefa nihevitra izy ireo fa torimaso no teneniny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay i Jesoa vao nilaza mazava taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Maty i Lazara! '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary noho ianareo, dia faly Aho tsy teo aminy, mba hinoanareo. Koa ndeha isika hankany amin’i Lazara!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Tômà (ilay atao hoe Ikambana) dia niteny tamin’ny mpianatra namany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha koa isika hiara-maty amin’ny Mpampianatra antsika!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manangana ho velona i Jesoa
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga tany Betania i Jesoa, dia nahita fa efa nalevina efatra andro i Lazara. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ity Betania ity dia akaikin’i Jerosalema tokony ho telo kilaometatra, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka maro tamin’ny Jiosy no tonga tao amin-dry i Marta sy i Maria hitsapa alahelo azy mirahavavy noho ny nahafatesan’ny anadahiny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Maria dia ilay vehivavy nanosotra ilomanitra ny tongotry ny Tompo sy namaoka ny tongony tamin’ny volon-dohany; ary i Lazara anadahiny no narary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao ren’i Marta fa tamy i Jesoa, dia lasa izy nitsena Azy; fa i Maria no nipetraka tao an-trano. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Marta tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha teto Ianao, ry Tompo, dia tsy maty ny anadahiko. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary na dia izao ankehitriny izao aza, dia fantatro fa na inona na inona hangatahinao amin’Andriamanitra, dia homen’Andriamanitra Anao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jesoa kosa niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hitsangana velona ny anadahinao!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Marta taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro fa hitsangana velona izy amin’ilay fitsanganan’ny maty amin’ny andro farany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Dan 12.2.
      marker-yv: yv-n
    - type: text
      text: '!'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho no manangana ho velona sy manome aina. Izay mino Ahy, na dia maty aza, dia ho velona; '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ary izay rehetra mivelona amiko ka mino Ahy, dia tsy ho faty na oviana na oviana. Mino izany ve ianao?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’i Marta hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Eny, ry Tompo, mino aho fa Ianao no ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: ', ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ', Ilay tonga eo amin’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitomany i Jesoa
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nilaza izany i Marta, dia lasa niantso mangingina an’i Maria rahavaviny nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ao ny Mpampianatra, miantso anao!
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao nandre izany kosa i Maria, dia nitsangana faingana nankany amin’i Jesoa. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka olona tany amin’i Jesoa izy mirahavavy hilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, marary ilay sakaizanao!
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola tsy tonga tao an-tanàna Izy fa mbola teo amin’ny toerana nitsenan’i Marta Azy ihany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Jiosy izay teo amin’i Maria tao an-trano sy nitsapa alahelo azy, raha nahita azy nitsangana faingana ka lasa any ivelany, dia nanaraka azy, satria nataony fa nankany amin’ny fasana hitomany any izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Maria kosa, nony tonga teo amin’izay nitoeran’i Jesoa, ka nahita Azy, dia niankohoka teo an-tongony sady niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha teto Ianao, ry Tompo, dia tsy maty ny anadahiko!
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’i Jesoa fa nitomany i Maria ary nitomany koa ireo Jiosy niaraka taminy, dia niontana ny fony ka tora-kovitra Izy '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza no nandevenanareo azy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia Ianao hizaha, ry Tompo!
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitomany i Jesoa, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy ny Jiosy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Akory ity haben’ny fitiavany an’i Lazara!
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ny sasany tamin’izy ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa nampahiratra ny mason’ilay jamba Izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 9.6.
      marker-yv: yv-n
    - type: text
      text: ', ka tsy hainy natao ve ny tsy hahafaty an-dralehilahy ity?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Velona aina indray i Lazara
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niontana indray ny fon’i Jesoa ka nankeo amin’ny fasana Izy. Zohy notampenana vato
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tany Palestinina faha Jesoa, ny fasana dia mazàna lavahana tamin’ny vatolampy eny an-tehezambohitra eny, ary nohidina vatofisaka lehibe miendrika faribolana. Jereo Mt 27.60; Mk 15.46; Lk 24.2.
      marker-yv: yv-n
    - type: text
      text: ' izany fasana izany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Esory ny vato!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Marta, ilay anabavin’ny maty, no namaly Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Efa maimbo ny faty, ry Tompo, satria efatra andro izay no nandevenana azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nandre izany i Jesoa, dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aretina tsy miafara amin’ny fahafatesana izay fa aretina tonga mba hisehoan’ny voninahitr’Andriamanitra ka hahazoan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ' voninahitra!'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy efa voalazako taminao ve fa raha mino ianao, dia hahita ny voninahitr’Andriamanitra?
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nesorin’ny olona ny vato. I Jesoa kosa nanandratra ny masony any ambony sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ray ô, misaotra Anao Aho, satria efa nihaino Ahy Ianao. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Raha Izaho, dia fantatro fa mihaino Ahy mandrakariva Ianao; fa noho ny vahoaka manodidina Ahy kosa no nilazako izany, mba hinoany fa Ianao no naniraka Ahy.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy nilaza izany i Jesoa, dia niantso tamin’ny feo mahery hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mivoaha tao, ry Lazara!
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala tao ny maty, ny tongotra aman-tanana nisy fehim-paty, ary ny tava voasarona lamba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 20.6-7.
      marker-yv: yv-n
    - type: text
      text: '. Fa hoy i Jesoa tamin’ny olona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Vahao izy, dia avelao handeha!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitetika hamono an’i Jesoa ny manampahefana jiosy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.1-5; Mk 14.1-2; Lk 22.1-2)
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maro tamin’ny Jiosy izay tonga tao amin-dry i Maria ka nahita ny zavatra nataon’i Jesoa no nino Azy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sasany tamin’ireo kosa dia lasa nankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' ka nilaza taminy ny zavatra nataon’i Jesoa. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namory ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fitsarana ambony
    - type: text
      text: ' ireo lohandoha-mpisorona sy ireo Farisianina ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona ity ataontsika, fa manao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' maro iny Lehilahy iny? '
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha avelantsika hanao toy izany ihany Izy, dia ho avy ny Rômanina handrava ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempolintsika
    - type: text
      text: ' sy ny firenentsika.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anankiray tamin’izy ireo, dia i Kaiafa izay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ' tamin’io taona io, no niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy mahalala na inona na inona ianareo! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jesoa dia fatra-pitia an’i Marta sy ny rahavaviny ary i Lazara. '
  '50':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy heverinareo akory fa tsara ho anareo raha maty ho an’ny vahoaka ny lehilahy anankiray, mba tsy haharava ny firenena manontolo!
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy avy aminy anefa no nitenenany an’izany, fa noho izy mpisorombe tamin’io taona io no naminaniany fa i Jesoa dia ho faty ho an’ny firenena jiosy; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tsy ho an’ny firenena jiosy ihany fa mba hanangona ho iray ny zanak’Andriamanitra efa niely.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatramin’io andro io dia tapa-kevitra ny hamono an’i Jesoa ry zareo. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tsy nandehandeha an-karihary teo amin’ny Jiosy intsony i Jesoa, fa niala teo nankany amin’ny faritany akaikin’ny taniefitra, tany amin’ny tanàna atao hoe Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efraîma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto dia tanàna heverina ho 20 kilaometatra avaratra atsinanan’i Jerosalema.
      marker-yv: yv-n
    - type: text
      text: ', ary nitoetra tany niaraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: .
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa akaiky tamin’izay ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' fankalàzan’ny Jiosy, ka maro ny olona avy any ambanivohitra no niakatra tany Jerosalema alohan’ny Paska mba handio tena. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitady an’i Jesoa ny olona, ka raha nijanona teo an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: kianjan’ny tempoly
    - type: text
      text: ' dia nifampiresaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana no hevitrareo? Ho tonga ve Izy sa tsy ho tonga amin’ny fankalazana ny Paska?
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lohandoha-mpisorona sy ny Farisianina kosa efa nandidy fa raha misy olona nahalala izay itoeran’i Jesoa, dia tsy maintsy mampandre mba hisamborana Azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mbola nijanona indroa andro teo amin’izany toerana izany ihany Izy, na dia nandre aza fa narary i Lazara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany i Jesoa vao niteny tamin’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha isika ho any Jodea indray!
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no navalin’ny mpianany Azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, vao haingana teo ny Jiosy no nitady hitora-bato Anao, ka hankany indray ve Ianao?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy adiny 12 ve ny indray andro? Koa raha misy olona mandeha amin’ny antoandro, dia tsy mba tafintohina izy satria mahita ny fahazavana manilo an’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: '; '
