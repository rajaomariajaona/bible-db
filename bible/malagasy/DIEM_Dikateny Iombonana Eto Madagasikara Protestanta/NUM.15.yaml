document_id: NUM.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanatitra lafarinina sy menaka ary divay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Rehefa tonga any amin’ny tany izay homeko anareo sady honenanareo ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho Ahy TOMPO, na koa sorona hafa ho fanalam-boady, na fanatitra an-tsitrapo, na fanatitra amin’ny fety. Hofidinareo hatao sorona amin’izany na omby na ondry na osy, ka hanetona ho hanitra hankasitrahina ho AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay hitondra izany sorona izany ho Ahy TOMPO, dia hanao fanatitra lafarinina telo kilao voaharo menaka iray litatra sy tapany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary hanolotra divay iray litatra sy tapany miaraka amin’ny zanak’ondry hatao sorona dorana manontolo na sorom-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha ondrilahy no hatao sorona, dia lafarinina enina kilao voaharo menaka roa litatra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary divay roa litatra no haterina miaraka amin’ny ondrilahy; ka hanetona ho hanitra hankasitrahina ho AHY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha ombilahy no hatao sorona dorana manontolo na sorona fanalam-boady na sorom-pihavanana ho Ahy TOMPO, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia lafarinina sivy kilao voaharo menaka telo litatra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary divay telo litatra no haterina miaraka amin’ny ombilahy; ka hanetona ho hanitra hankasitrahina ho AHY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Izany no fomba hatao amin’ny fanaovana sorona omby na ondrilahy na zanak’ondry na zanak’osy anankiray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa na firy na firy isan’ny biby haterinareo, dia tahaka izany koa no hanaovanareo azy tsirairay avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hanaraka izany ny Israelita rehetra, rehefa manao sorona izay hanetona ho hanitra hankasitrahina ho Ahy TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny vahiny na izay olona mipetraka ao aminareo, na koa ny valovotaka efa hatramin’ny taranaka maro nifandimby, dia samy hanaraka izany avokoa, rehefa manao sorona izay hanetona ho hanitra hankasitrahina ho AHY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mitovy ihany ny fitsipika ho an’ny mpiray fiangonana, na ho anareo na ho an’ny vahiny izay eo aminareo, ary dia hanan-kery amin’ny taranaka rehetra mifandimby izany; tsy hisy hafa ianareo sy ny vahiny eo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lalàna sy fitsipika iray ihany no mifehy anareo sy izay vahiny eo aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 24.22.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanatitra mofo santatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Raha tonga any amin’ny tany izay itondrako anareo ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka hihinana ny mofo voavoatra tao an-toerana, dia hakanareo ampahany ho fanatitra ho Ahy TOMPO aloha izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ho santatry ny kobanareo, dia hanokana mofomamy iray avy amin’izany ianareo; tahaka ny fanokanana ampahan’ny vary voavely no hanokananareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy izany no anomezanareo ho Ahy TOMPO ny ampahany amin’ny santatry ny kobanareo; hatramin’ny taranakareo fara mandimby.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny sorona fanalana ny ota tsy nahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Mety ho tsy nahy no nandikanareo ny iray amin’ireo didy rehetra nolazaiko tamin’i Mosesy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia izay rehetra nandidiako anareo tamin’ny alalan’i Mosesy, nanomboka tamin’ny andro nanomezako ny didy ka hatramin’ny taranaka mifandimby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha tsy nahy no nanotan’ny fiangonana ka tsy fantany, dia hanolotra amiko TOMPO ombilahy iray ny fiangonana tsivakivolo ho sorona dorana manontolo izay hanetona ho hanitra ankasitrahina ho AHY; hampombaina izany ny fanatitra lafarinina sy divay, araka ny fanao, ary koa osilahy iray ho sorona fanalana ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy eo ny mpisorona dia hanao ny fombam-pivavahana famelana ho an’ny fiangonana israelita ka ho voavela izy satria ota tsy nahy izany; ary hitondra ny fanatitra amiko izy ireo, dia ny sorona levonina amin’ny afo ho Ahy TOMPO sy ny sorona fanalana ny ota eo anatrehako noho ny ota tsy nahy nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hahazo famelan-keloka ny fiangonana israelita tsivakivolo mbamin’ny vahiny mipetraka ao aminy satria ota tsy nahy no nahavoa ny olon-drehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Raha olona tokana kosa no nanota tsy nahy, dia osivavy anankiray vao iray taona no hatolony ho sorona fanalana ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Avy eo ny mpisorona dia hanao ny fombam-pivavahana famelana eo anatrehako ho an’ilay olona nanota tsy nahy ka ho voavela ny fahotany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 27-28:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 4.27-31.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mitovy ihany ny lalàna na amin’ny Israelita na amin’ny vahiny izay eo aminy, raha toa ka misy ny manota tsy nahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '«Fa raha Israelita na vahiny kosa no manao fanahy iniana manota ka manamavo Ahy TOMPO, dia hofongorana tsy ho anisan’ny vahoakako izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tsy maintsy hofongorana tokoa izy satria nanamavo ny teniko sady nandika ny didiko, ka ny helony dia manaraka azy.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fandikana ny sabata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha tany an-taniefitra ny Israelita, dia nahatratra lehilahy iray nifako kitay tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izay nahatratra azy nifako kitay dia nitondra azy teo amin’i Mosesy sy i Aharôna ary ny fiangonana iray manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nambenana tsara izy satria tsy mbola tapaka izay sazy hampiharina aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary hoy ny TOMPO tamin’i Mosesy.
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy maintsy hatao maty izany lehilahy izany; hitora-bato azy eny ivelan’ny toby ny fiangonana iray manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia navoakan’ny fiangonana iray manontolo teny ivelan’ny toby izy, ka notorahany vato ary maty. Izany manko no nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny somotraviavim-damba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Niteny tamin’i Mosesy ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny and 37-41 ialohavan’ny Deot 6.4-9; 11.13-21 no mamorona ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Semà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', fiekem-pinoana sy vavaka fanaon’ny mpino jiosy isan’andro.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka ianareo sy ny taranakareo mifandimby hanisy somotraviavy ny sisin’akanjonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 22.12.
    marker-yv: yv-n
  - type: text
    text: ', ary koa kofehy volomparasy amin’ny somotraviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hitondra akanjo misy somotraviavy ianareo; koa raha mijery izany ianareo, dia hahatsiaro ny didiko rehetra ary hanatanteraka izany, ka tsy hety havilin’ny fonareo sy ny masonareo amin’ny fanompoan-tsampy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hahatsiaro sy hankatò ny didiko rehetra ianareo ka ho voatokana ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo niala tany Ejipta mba ho Andriamanitrareo. Eny, Izaho no TOMPO Andriamanitrareo.
