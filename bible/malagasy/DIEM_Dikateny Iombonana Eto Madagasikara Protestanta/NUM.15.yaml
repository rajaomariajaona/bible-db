document_id: NUM.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanatitra lafarinina sy menaka ary divay
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: ary divay telo litatra no haterina miaraka amin’ny ombilahy; ka hanetona ho hanitra hankasitrahina ho AHY izany.
  '11':
  - type: text
    content: '«Izany no fomba hatao amin’ny fanaovana sorona omby na ondrilahy na zanak’ondry na zanak’osy anankiray. '
  '12':
  - type: text
    content: 'Koa na firy na firy isan’ny biby haterinareo, dia tahaka izany koa no hanaovanareo azy tsirairay avy. '
  '13':
  - type: text
    content: 'Hanaraka izany ny Israelita rehetra, rehefa manao sorona izay hanetona ho hanitra hankasitrahina ho Ahy TOMPO. '
  '14':
  - type: text
    content: 'Ny vahiny na izay olona mipetraka ao aminareo, na koa ny valovotaka efa hatramin’ny taranaka maro nifandimby, dia samy hanaraka izany avokoa, rehefa manao sorona izay hanetona ho hanitra hankasitrahina ho AHY. '
  '15':
  - type: text
    content: 'Mitovy ihany ny fitsipika ho an’ny mpiray fiangonana, na ho anareo na ho an’ny vahiny izay eo aminareo, ary dia hanan-kery amin’ny taranaka rehetra mifandimby izany; tsy hisy hafa ianareo sy ny vahiny eo anatrehako. '
  '16':
  - type: text
    content: Lalàna sy fitsipika iray ihany no mifehy anareo sy izay vahiny eo aminareo
  - type: note
    content: Jereo Lev 24.22.
  - type: text
    content: .»
  - type: heading
    content: Ny fanatitra mofo santatra
  '17':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '18':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Raha tonga any amin’ny tany izay itondrako anareo ianareo, '
  '19':
  - type: text
    content: 'ka hihinana ny mofo voavoatra tao an-toerana, dia hakanareo ampahany ho fanatitra ho Ahy TOMPO aloha izany. '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Rehefa tonga any amin’ny tany izay homeko anareo sady honenanareo ianareo, '
  '20':
  - type: text
    content: 'Ho santatry ny kobanareo, dia hanokana mofomamy iray avy amin’izany ianareo; tahaka ny fanokanana ampahan’ny vary voavely no hanokananareo izany. '
  '21':
  - type: text
    content: Toy izany no anomezanareo ho Ahy TOMPO ny ampahany amin’ny santatry ny kobanareo; hatramin’ny taranakareo fara mandimby.
  - type: heading
    content: Ny sorona fanalana ny ota tsy nahy
  '22':
  - type: text
    content: '«Mety ho tsy nahy no nandikanareo ny iray amin’ireo didy rehetra nolazaiko tamin’i Mosesy, '
  '23':
  - type: text
    content: 'dia izay rehetra nandidiako anareo tamin’ny alalan’i Mosesy, nanomboka tamin’ny andro nanomezako ny didy ka hatramin’ny taranaka mifandimby. '
  '24':
  - type: text
    content: 'Raha tsy nahy no nanotan’ny fiangonana ka tsy fantany, dia hanolotra amiko TOMPO ombilahy iray ny fiangonana tsivakivolo ho sorona dorana manontolo izay hanetona ho hanitra ankasitrahina ho AHY; hampombaina izany ny fanatitra lafarinina sy divay, araka ny fanao, ary koa osilahy iray ho sorona fanalana ny ota. '
  '25':
  - type: text
    content: 'Avy eo ny mpisorona dia hanao ny fombam-pivavahana famelana ho an’ny fiangonana israelita ka ho voavela izy satria ota tsy nahy izany; ary hitondra ny fanatitra amiko izy ireo, dia ny sorona levonina amin’ny afo ho Ahy TOMPO sy ny sorona fanalana ny ota eo anatrehako noho ny ota tsy nahy nataony. '
  '26':
  - type: text
    content: Hahazo famelan-keloka ny fiangonana israelita tsivakivolo mbamin’ny vahiny mipetraka ao aminy satria ota tsy nahy no nahavoa ny olon-drehetra.
  '27':
  - type: text
    content: '«Raha olona tokana kosa no nanota tsy nahy, dia osivavy anankiray vao iray taona no hatolony ho sorona fanalana ny ota. '
  '28':
  - type: text
    content: Avy eo ny mpisorona dia hanao ny fombam-pivavahana famelana eo anatrehako ho an’ilay olona nanota tsy nahy ka ho voavela ny fahotany
  - type: note
    content: 'And 27-28: jereo Lev 4.27-31.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: Mitovy ihany ny lalàna na amin’ny Israelita na amin’ny vahiny izay eo aminy, raha toa ka misy ny manota tsy nahy.
  '3':
  - type: text
    content: 'dia hanao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho Ahy TOMPO, na koa sorona hafa ho fanalam-boady, na fanatitra an-tsitrapo, na fanatitra amin’ny fety. Hofidinareo hatao sorona amin’izany na omby na ondry na osy, ka hanetona ho hanitra hankasitrahina ho AHY. '
  '30':
  - type: text
    content: '«Fa raha Israelita na vahiny kosa no manao fanahy iniana manota ka manamavo Ahy TOMPO, dia hofongorana tsy ho anisan’ny vahoakako izy. '
  '31':
  - type: text
    content: Tsy maintsy hofongorana tokoa izy satria nanamavo ny teniko sady nandika ny didiko, ka ny helony dia manaraka azy.»
  - type: heading
    content: Ny amin’ny fandikana ny sabata
  '32':
  - type: text
    content: 'Raha tany an-taniefitra ny Israelita, dia nahatratra lehilahy iray nifako kitay tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Izay nahatratra azy nifako kitay dia nitondra azy teo amin’i Mosesy sy i Aharôna ary ny fiangonana iray manontolo. '
  '34':
  - type: text
    content: 'Dia nambenana tsara izy satria tsy mbola tapaka izay sazy hampiharina aminy. '
  '35':
  - type: text
    content: Ary hoy ny TOMPO tamin’i Mosesy.
  - type: text
    content: –Tsy maintsy hatao maty izany lehilahy izany; hitora-bato azy eny ivelan’ny toby ny fiangonana iray manontolo.
  '36':
  - type: text
    content: Dia navoakan’ny fiangonana iray manontolo teny ivelan’ny toby izy, ka notorahany vato ary maty. Izany manko no nandidian’ny TOMPO an’i Mosesy.
  - type: heading
    content: Ny somotraviavim-damba
  '37':
  - type: text
    content: Niteny tamin’i Mosesy ny TOMPO
  - type: note
    content: Ny and 37-41 ialohavan’ny Deot 6.4-9; 11.13-21 no mamorona ny Semà, fiekem-pinoana sy vavaka fanaon’ny mpino jiosy isan’andro.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: –Aoka ianareo sy ny taranakareo mifandimby hanisy somotraviavy ny sisin’akanjonareo
  - type: note
    content: Ampit Deot 22.12.
  - type: text
    content: ', ary koa kofehy volomparasy amin’ny somotraviavy. '
  '39':
  - type: text
    content: 'Hitondra akanjo misy somotraviavy ianareo; koa raha mijery izany ianareo, dia hahatsiaro ny didiko rehetra ary hanatanteraka izany, ka tsy hety havilin’ny fonareo sy ny masonareo amin’ny fanompoan-tsampy. '
  '4':
  - type: text
    content: 'Izay hitondra izany sorona izany ho Ahy TOMPO, dia hanao fanatitra lafarinina telo kilao voaharo menaka iray litatra sy tapany '
  '40':
  - type: text
    content: 'Hahatsiaro sy hankatò ny didiko rehetra ianareo ka ho voatokana ho Ahy. '
  '41':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo niala tany Ejipta mba ho Andriamanitrareo. Eny, Izaho no TOMPO Andriamanitrareo.
  '5':
  - type: text
    content: 'ary hanolotra divay iray litatra sy tapany miaraka amin’ny zanak’ondry hatao sorona dorana manontolo na sorom-pihavanana. '
  '6':
  - type: text
    content: 'Raha ondrilahy no hatao sorona, dia lafarinina enina kilao voaharo menaka roa litatra '
  '7':
  - type: text
    content: 'ary divay roa litatra no haterina miaraka amin’ny ondrilahy; ka hanetona ho hanitra hankasitrahina ho AHY izany. '
  '8':
  - type: text
    content: 'Fa raha ombilahy no hatao sorona dorana manontolo na sorona fanalam-boady na sorom-pihavanana ho Ahy TOMPO, '
  '9':
  - type: text
    content: 'dia lafarinina sivy kilao voaharo menaka telo litatra '
