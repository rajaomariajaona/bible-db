document_id: JDG.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanjary filohan’i Israely i Jiftà
  - type: text
    content: 'Tany Gilehada, dia nisy miaramila mahery fo nantsoina hoe Jiftà, zanakalahin’ny vehivavy janga sy ny lehilahy atao hoe Gilehada. '
  '10':
  - type: text
    content: 'Dia hoy ny valin-tenin’ny loholon’i Gilehada hoe:'
  - type: text
    content: –Ny TOMPO no ho vavolombelona amintsika fa araka izay efa nambaranao no hataonay!
  '11':
  - type: text
    content: Dia nandeha niaraka tamin’ireo loholon’i Gilehada i Jiftà ka noraisin’ny olona ho filoha sy ho mpitari-tafika. Ary tao Mitsepà
  - type: note
    content: Jereo 10.17 sy nta.
  - type: text
    content: ', teo anatrehan’ny TOMPO, dia nohamafisin’i Jiftà ny teny rehetra efa nifanarahany tamin’ireo loholona.'
  - type: heading
    content: Hafatra nampitondrain’i Jiftà ho an’ny Hamônita
  '12':
  - type: text
    content: 'Nandefasan’i Jiftà iraka ny mpanjakan’ny Hamônita mba hilaza aminy hoe:'
  - type: text
    content: –Inona no antony hiadiantsika no tonga atỳ amiko hanafika ny taniko ianao?
  '13':
  - type: text
    content: 'Dia hoy ny mpanjakan’ny Hamônita tamin’ireo irak’i Jiftà:'
  - type: text
    content: –Fony niakatra avy tany Ejipta ny Israelita, dia naka ny taniko hatreo amin’ny lohasahan’i Arnôna ka hatrany amin’ny renirano Jabôka sy hatrany Jôrdàna. Koa ankehitriny avereno amiko am-pilaminana ireo faritany ireo.
  '14':
  - type: text
    content: 'Dia nandefa iraka fanindroany ho any amin’ny mpanjakan’ny Hamônita indray i Jiftà '
  '15':
  - type: text
    content: 'mba hilaza izao hafatra izao:'
  - type: text
    content: '–Tsy naka ny faritanin’ny Môabita na ny faritanin’ny Hamônita ny Israelita. '
  '16':
  - type: text
    content: 'Fa raha niakatra avy tany Ejipta ireo, dia namakivaky ny taniefitra hatreo amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: ' ary nankany Kadesy. '
  '17':
  - type: text
    content: 'Tao izy no nandefa iraka nangataka tamin’ny mpanjakan’i Edôma mba hahazo hamaky ny faritaniny, saingy tsy navelany. Ary nandefa fangatahana toy izany koa tamin’ny mpanjakan’i Môaba izy nefa tsy nekeny; ka dia nipetraka tao Kadesy ny Israelita. '
  '18':
  - type: text
    content: 'Avy teo, dia nandeha namakivaky ny taniefitra izy, nanodidina ny faritanin’i Edôma sy i Môaba ary tonga tao atsinanan’i Môaba. Dia nitoby teo ampitan’ny renirano Arnôna izy fa tsy niditra tao anatin’ny faritanin’i Môaba, satria i Arnôna no sisin-taniny. '
  '19':
  - type: text
    content: 'Ary nandefa iraka ho an’i Sihôna mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' izay nanjaka tao Hesbôna ny Israelita, ka nangataka taminy mba hahazo hamaky ny faritaniny hatrany amin’ny toerana izay halehany. '
  '2':
  - type: text
    content: 'Niteraka zanakalahy maro ny vadin’i Gilehada; ka nony efa lehibe ireny, dia nandroaka an’i Jiftà ary nilaza taminy hoe:'
  - type: text
    content: –Tsy manan-jò amin’ny lova avy amin’ny raintsika ianao satria zanaky ny vehivavy hafa.
  '20':
  - type: text
    content: 'Tsy natoky ny Israelita i Sihôna ka tsy namela azy hamakivaky ny taniny; fa namory ny tafiny manontolo, dia nitoby tao Jahatsa ary nanafika ny Israelita. '
  '21':
  - type: text
    content: 'Ary natolotry ny TOMPO Andriamanitr’i Israely teo an-tanan’ny Israelita i Sihôna sy ny tafiny ka resiny. Dia nalain’ny Israelita ny faritany rehetra nonenan’ny Amôrita, '
  '22':
  - type: text
    content: 'manomboka hatreo amin’ny lohasahan’i Arnôna ka hatrany amin’ny renirano Jabôka, ary hatreo amin’ny taniefitra atsinanana ka hatrany amin’ny ony Jôrdàna. '
  '23':
  - type: text
    content: 'Ny TOMPO Andriamanitr’i Israely àry no efa namela anay vahoakany haka ny tanin’ny Amôrita, ka dia ianao indray ve no te hanaisotra azy aminay? '
  '24':
  - type: text
    content: 'Moa tsy tananao ho fanananao ve ny faritany izay nomen’i Kemôsy andriamanitrao anao? Noho izany, dia zonay koa ny hitana ho fanananay izay tany rehetra nomen’ny TOMPO Andriamanitray anay. '
  '25':
  - type: text
    content: 'Moa mihevi-tena ho tsara lavitra noho i Balàka zanakalahin’i Tsipôra sady mpanjakan’i Môaba ve ianao? Izy anefa tsy mba nila ady tamin’ny vahoaka Israely sady tsy nanafika azy. '
  '26':
  - type: text
    content: 'Efa telonjato taona izao no nipetrahan’ny Israelita tao Hesbôna sy Harôhera mbamin’ireo tanàna kely manodidina azy avy ary koa tao amin’ireo tanàna rehetra eny amoron’i Arnôna; koa nahoana no tsy nalainareo io faritany io tamin’izany fotoana rehetra izany? '
  '27':
  - type: text
    content: Raha izaho aloha dia tsy nanota taminao, fa ianao no manisy ratsy ahy amin’ny iadianao amiko. Ny TOMPO mpitsara anie hitsara ny Israelita sy ny Hamônita anio!
  '28':
  - type: text
    content: Kanefa tsy niraharaha ny hafatr’i Jiftà ho azy ny mpanjakan’ny Hamônita.
  - type: heading
    content: Ny fampanantenana nataon’i Jiftà
  '29':
  - type: text
    content: 'Ary nirotsaka tao amin’i Jiftà ny Fanahin’ny TOMPO, dia nandeha nitety ny faritanin’i Gilehada sy i Manase izy, ary tonga tao Mitsepà any Gilehada mba hiampita ho any amin’ny faritanin’ny Hamônita. '
  '3':
  - type: text
    content: Dia nandositra lavitra ny rahalahiny i Jiftà ka nonina tao amin’ny faritanin’i Tôba
  - type: note
    content: 'Tôba: tanàna eo amin’ny tendrony avaratr’i Gilehada ka 60 km eo atsinanan’ny farihin’i Genesareta.'
  - type: text
    content: . Ary nisy koa olom-poana nivondrona teo aminy ka nanao asan-jirika niaraka taminy.
  '30':
  - type: text
    content: 'Ary nivoady tamin’ny TOMPO i Jiftà ka nanao hoe:'
  - type: text
    content: '–Raha hatolotrao tokoa eo an-tanako ny Hamônita, '
  '31':
  - type: text
    content: 'dia hatokako ho ANAO sady hatolotro ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho Anao izay olona mivoaka voalohany ny varavaran’ny tranoko mba hitsena ahy rehefa miverina avy nandresy ny Hamônita aho.'
  '32':
  - type: text
    content: 'Dia nihoatra ny sisin-tanin’ny Hamônita i Jiftà mba hiady aminy; ary natolotry ny TOMPO teo an-tanany ireo. '
  '33':
  - type: text
    content: Nandresy azy i Jiftà, ka nahazo ny tanàna roapolo teo anelanelan’i Harôhera sy ny manodidina an’i Minita ary hatrany Abela-Keramima
  - type: note
    content: Notetezin’i Jiftà ny faritry ny Hamônita hatrany avaratra ka hatrany atsimo.
  - type: text
    content: . Faharesena goavana ny an’ny Hamônita, ka dia nilefitra teo anoloan’ny Israelita izy.
  '34':
  - type: text
    content: 'Fa nony niverina tany aminy tao Mitsepà i Jiftà, dia ny zanany vavy no nivoaka nitsena azy sady nandihy tamin’ny amponga tapaka; vavy tokany anefa io, fa tsy nanan-janaka hafa izy. '
  '35':
  - type: text
    content: 'Koa raha vao nahita azy i Jiftà, dia '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sady niantso hoe:'
  - type: text
    content: '–Indrisy, anaka, fa nampidi-doza ahy ianao, ary ianao izao no fototry ny hakiviako! Efa nanao '
  - type: text
    content: voady
  - type: text
    content: ' tamin’ny TOMPO manko aho, ka tsy mahazo mitsoaka ny teny nomeko.'
  '36':
  - type: text
    content: 'Fa namaly azy ny zanany vavy hoe:'
  - type: text
    content: '–Dada ô, raha nanao voady tamin’ny TOMPO ianao, dia tanteraho amiko izay efa naloaky ny vavanao taminy satria IZY efa namela anao hamaly faty ny Hamônita fahavalonao. '
  '37':
  - type: text
    content: Nefa na izany aza, dia mba omeo fe-potoana roa volana aho hankanesako eny an-tendrombohitra miaraka amin’ny namako mba hitomaniako ny tenako tsy maintsy ho faty nefa tsy mbola nanambady akory.
  '38':
  - type: text
    content: 'Dia nomen’i Jiftà lalana handeha mandritra ny roa volana izy. Koa nandeha izy sy ireo namany ka nitomany teny an-tendrombohitra noho ny tenany tsy maintsy ho faty nefa tsy mbola nanambady akory. '
  '39':
  - type: text
    content: 'Nony afaka roa volana, dia niverina tany amin’ny rainy izy; ka notanterahin-drainy taminy tokoa izay voady efa nataony. Dia maty mbola virijiny razazavavy. Ary hatramin’izay dia nanjary fanao teo amin’ny Israelita izao fomba izao: '
  '4':
  - type: text
    content: 'Taoriana kelin’izany, dia nanafika ny Israelita ny Hamônita. '
  '40':
  - type: text
    content: Isan-taona ny vehivavy israelita dia mandeha mitomany mandritra ny efatra andro ny zanakavavin’i Jiftà, ilay Gilehadita.
  '5':
  - type: text
    content: 'Ary rehefa vaky ny ady teo amin’ny Hamônita sy ny Israelita, dia nandeha ireo '
  - type: text
    content: loholon
  - type: text
    content: '’i Gilehada mba haka an’i Jiftà any amin’ny faritanin’i Tôba, '
  '6':
  - type: text
    content: 'ka nanao taminy hoe:'
  - type: text
    content: –Avia ho mpitarika ny tafikay ianao, mba hahafahanay miady amin’ny Hamônita.
  '7':
  - type: text
    content: 'Fa novalian’i Jiftà hoe:'
  - type: text
    content: –Moa tsy nankahala ahy ve ianareo ka nandroaka ahy hiala tao an-tranon’ny raiko? Koa nahoana no mankatỳ amiko ianareo ankehitriny, rehefa tra-pahoriana?
  '8':
  - type: text
    content: 'Hoy kosa ny loholona tamin’i Jiftà:'
  - type: text
    content: –Mitodika aminao izahay ankehitriny mba handehananao hiaraka aminay ka hiadianao amin’ny Hamônita; dia ho filohanay sy ho filohan’ny mponina rehetra any Gilehada ianao.
  '9':
  - type: text
    content: 'Dia hoy indray i Jiftà taminy:'
  - type: text
    content: –Raha mampody ahy ianareo ankehitriny mba hiady amin’ny Hamônita, ka hatolotry ny TOMPO eo anoloako ireny, dia ho filohanareo aho.
