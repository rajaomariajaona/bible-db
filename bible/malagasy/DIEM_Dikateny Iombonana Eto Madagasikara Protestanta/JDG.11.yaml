document_id: JDG.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanjary filohan’i Israely i Jiftà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tany Gilehada, dia nisy miaramila mahery fo nantsoina hoe Jiftà, zanakalahin’ny vehivavy janga sy ny lehilahy atao hoe Gilehada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niteraka zanakalahy maro ny vadin’i Gilehada; ka nony efa lehibe ireny, dia nandroaka an’i Jiftà ary nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy manan-jò amin’ny lova avy amin’ny raintsika ianao satria zanaky ny vehivavy hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nandositra lavitra ny rahalahiny i Jiftà ka nonina tao amin’ny faritanin’i Tôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tôba: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna eo amin’ny tendrony avaratr’i Gilehada ka 60 km eo atsinanan’ny farihin’i Genesareta.
    marker-yv: yv-n
  - type: text
    text: . Ary nisy koa olom-poana nivondrona teo aminy ka nanao asan-jirika niaraka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Taoriana kelin’izany, dia nanafika ny Israelita ny Hamônita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa vaky ny ady teo amin’ny Hamônita sy ny Israelita, dia nandeha ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Gilehada mba haka an’i Jiftà any amin’ny faritanin’i Tôba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia ho mpitarika ny tafikay ianao, mba hahafahanay miady amin’ny Hamônita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa novalian’i Jiftà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy nankahala ahy ve ianareo ka nandroaka ahy hiala tao an-tranon’ny raiko? Koa nahoana no mankatỳ amiko ianareo ankehitriny, rehefa tra-pahoriana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy kosa ny loholona tamin’i Jiftà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitodika aminao izahay ankehitriny mba handehananao hiaraka aminay ka hiadianao amin’ny Hamônita; dia ho filohanay sy ho filohan’ny mponina rehetra any Gilehada ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy indray i Jiftà taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha mampody ahy ianareo ankehitriny mba hiady amin’ny Hamônita, ka hatolotry ny TOMPO eo anoloako ireny, dia ho filohanareo aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny valin-tenin’ny loholon’i Gilehada hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny TOMPO no ho vavolombelona amintsika fa araka izay efa nambaranao no hataonay!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nandeha niaraka tamin’ireo loholon’i Gilehada i Jiftà ka noraisin’ny olona ho filoha sy ho mpitari-tafika. Ary tao Mitsepà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 10.17 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', teo anatrehan’ny TOMPO, dia nohamafisin’i Jiftà ny teny rehetra efa nifanarahany tamin’ireo loholona.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra nampitondrain’i Jiftà ho an’ny Hamônita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandefasan’i Jiftà iraka ny mpanjakan’ny Hamônita mba hilaza aminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona no antony hiadiantsika no tonga atỳ amiko hanafika ny taniko ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ny mpanjakan’ny Hamônita tamin’ireo irak’i Jiftà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fony niakatra avy tany Ejipta ny Israelita, dia naka ny taniko hatreo amin’ny lohasahan’i Arnôna ka hatrany amin’ny renirano Jabôka sy hatrany Jôrdàna. Koa ankehitriny avereno amiko am-pilaminana ireo faritany ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandefa iraka fanindroany ho any amin’ny mpanjakan’ny Hamônita indray i Jiftà '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mba hilaza izao hafatra izao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy naka ny faritanin’ny Môabita na ny faritanin’ny Hamônita ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha niakatra avy tany Ejipta ireo, dia namakivaky ny taniefitra hatreo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: ' ary nankany Kadesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tao izy no nandefa iraka nangataka tamin’ny mpanjakan’i Edôma mba hahazo hamaky ny faritaniny, saingy tsy navelany. Ary nandefa fangatahana toy izany koa tamin’ny mpanjakan’i Môaba izy nefa tsy nekeny; ka dia nipetraka tao Kadesy ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avy teo, dia nandeha namakivaky ny taniefitra izy, nanodidina ny faritanin’i Edôma sy i Môaba ary tonga tao atsinanan’i Môaba. Dia nitoby teo ampitan’ny renirano Arnôna izy fa tsy niditra tao anatin’ny faritanin’i Môaba, satria i Arnôna no sisin-taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nandefa iraka ho an’i Sihôna mpanjaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: amôrita
  - type: text
    text: ' izay nanjaka tao Hesbôna ny Israelita, ka nangataka taminy mba hahazo hamaky ny faritaniny hatrany amin’ny toerana izay halehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy natoky ny Israelita i Sihôna ka tsy namela azy hamakivaky ny taniny; fa namory ny tafiny manontolo, dia nitoby tao Jahatsa ary nanafika ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary natolotry ny TOMPO Andriamanitr’i Israely teo an-tanan’ny Israelita i Sihôna sy ny tafiny ka resiny. Dia nalain’ny Israelita ny faritany rehetra nonenan’ny Amôrita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'manomboka hatreo amin’ny lohasahan’i Arnôna ka hatrany amin’ny renirano Jabôka, ary hatreo amin’ny taniefitra atsinanana ka hatrany amin’ny ony Jôrdàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny TOMPO Andriamanitr’i Israely àry no efa namela anay vahoakany haka ny tanin’ny Amôrita, ka dia ianao indray ve no te hanaisotra azy aminay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moa tsy tananao ho fanananao ve ny faritany izay nomen’i Kemôsy andriamanitrao anao? Noho izany, dia zonay koa ny hitana ho fanananay izay tany rehetra nomen’ny TOMPO Andriamanitray anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moa mihevi-tena ho tsara lavitra noho i Balàka zanakalahin’i Tsipôra sady mpanjakan’i Môaba ve ianao? Izy anefa tsy mba nila ady tamin’ny vahoaka Israely sady tsy nanafika azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Efa telonjato taona izao no nipetrahan’ny Israelita tao Hesbôna sy Harôhera mbamin’ireo tanàna kely manodidina azy avy ary koa tao amin’ireo tanàna rehetra eny amoron’i Arnôna; koa nahoana no tsy nalainareo io faritany io tamin’izany fotoana rehetra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha izaho aloha dia tsy nanota taminao, fa ianao no manisy ratsy ahy amin’ny iadianao amiko. Ny TOMPO mpitsara anie hitsara ny Israelita sy ny Hamônita anio!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanefa tsy niraharaha ny hafatr’i Jiftà ho azy ny mpanjakan’ny Hamônita.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampanantenana nataon’i Jiftà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nirotsaka tao amin’i Jiftà ny Fanahin’ny TOMPO, dia nandeha nitety ny faritanin’i Gilehada sy i Manase izy, ary tonga tao Mitsepà any Gilehada mba hiampita ho any amin’ny faritanin’ny Hamônita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nivoady tamin’ny TOMPO i Jiftà ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha hatolotrao tokoa eo an-tanako ny Hamônita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'dia hatokako ho ANAO sady hatolotro ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho Anao izay olona mivoaka voalohany ny varavaran’ny tranoko mba hitsena ahy rehefa miverina avy nandresy ny Hamônita aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nihoatra ny sisin-tanin’ny Hamônita i Jiftà mba hiady aminy; ary natolotry ny TOMPO teo an-tanany ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nandresy azy i Jiftà, ka nahazo ny tanàna roapolo teo anelanelan’i Harôhera sy ny manodidina an’i Minita ary hatrany Abela-Keramima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Notetezin’i Jiftà ny faritry ny Hamônita hatrany avaratra ka hatrany atsimo.
    marker-yv: yv-n
  - type: text
    text: . Faharesena goavana ny an’ny Hamônita, ka dia nilefitra teo anoloan’ny Israelita izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa nony niverina tany aminy tao Mitsepà i Jiftà, dia ny zanany vavy no nivoaka nitsena azy sady nandihy tamin’ny amponga tapaka; vavy tokany anefa io, fa tsy nanan-janaka hafa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa raha vao nahita azy i Jiftà, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra ny fitafiany
  - type: text
    text: ' sady niantso hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indrisy, anaka, fa nampidi-doza ahy ianao, ary ianao izao no fototry ny hakiviako! Efa nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voady
  - type: text
    text: ' tamin’ny TOMPO manko aho, ka tsy mahazo mitsoaka ny teny nomeko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa namaly azy ny zanany vavy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Dada ô, raha nanao voady tamin’ny TOMPO ianao, dia tanteraho amiko izay efa naloaky ny vavanao taminy satria IZY efa namela anao hamaly faty ny Hamônita fahavalonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Nefa na izany aza, dia mba omeo fe-potoana roa volana aho hankanesako eny an-tendrombohitra miaraka amin’ny namako mba hitomaniako ny tenako tsy maintsy ho faty nefa tsy mbola nanambady akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia nomen’i Jiftà lalana handeha mandritra ny roa volana izy. Koa nandeha izy sy ireo namany ka nitomany teny an-tendrombohitra noho ny tenany tsy maintsy ho faty nefa tsy mbola nanambady akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nony afaka roa volana, dia niverina tany amin’ny rainy izy; ka notanterahin-drainy taminy tokoa izay voady efa nataony. Dia maty mbola virijiny razazavavy. Ary hatramin’izay dia nanjary fanao teo amin’ny Israelita izao fomba izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Isan-taona ny vehivavy israelita dia mandeha mitomany mandritra ny efatra andro ny zanakavavin’i Jiftà, ilay Gilehadita.
