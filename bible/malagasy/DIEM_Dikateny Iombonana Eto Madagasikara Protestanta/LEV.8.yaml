document_id: LEV.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: FANOKANANA IREO MPISORONA VOALOHANY
  - type: heading
    content: Ny fombam-pivavahana fanokanana
  - type: text
    content: Dia niteny tamin’i Mosesy ny TOMPO
  - type: note
    content: Ampit Lev 8 sy Eks 29.
  - type: text
    content: ' nanao hoe:'
  '10':
  - type: text
    content: 'Ary naka ny menaka fanosorana i Mosesy, dia nanosotra sy nanokana ny Fonenan’Andriamanitra mbamin’ny zavatra rehetra tao anatiny. '
  '11':
  - type: text
    content: 'Namafazany menaka impito teo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' ary nohosorany menaka avokoa ny alitara sy ny fanaka momba azy ary ny fitobian-drano boribory mbamin’ny tongony mba ho voatokana ho an’Andriamanitra. '
  '12':
  - type: text
    content: 'Ary nandrotsahany menaka fanosorana teo amin’ny lohan’i Aharôna; ka nohosorany i Aharôna mba ho voatokana ho an’Andriamanitra. '
  '13':
  - type: text
    content: Dia nampanatonin’i Mosesy koa ireo zanakalahin’i Aharôna ka nampiakanjoiny akanjo lava sy noetràny fehikibo ary nametrahany satroboninahitra, araka izay efa nandidian’ny TOMPO azy.
  '14':
  - type: text
    content: 'Avy eo nasain’i Mosesy nentina ny ombilahy hatao sorona fanalana ny ota; ka i Aharôna sy ny zanany no nametra-tanana teo amin’ny lohan’ilay ombilahy. '
  '15':
  - type: text
    content: 'Novonoin’i Mosesy io ary nangalany ny ra ka notentenany tamin’ny fanondro ny tandroky ny alitara mba ho fanadiovana ny alitara manontolo; ary ny ra sisa dia naidiny teo am-pototry ny alitara: toy izany no nanokanan’i Mosesy ny alitara mba hahazoana manao fombam-pivavahana famelan-keloka eo amboniny'
  - type: note
    content: 'And 10-15: jereo Eks 40.9-11.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Dia nalain’i Mosesy avokoa ny jaboran-tsinain’ilay ombilahy sy ny ila-atiny ary ny voany mbamin’ny fonomboany; ka nodorany hanetona teo ambonin’ny alitara. '
  '17':
  - type: text
    content: Fa ny tenan’ny ombilahy kosa, izany hoe ny hodiny sy ny nofony ary ny dikin-drorohany, dia nodorana tany ivelan’ny toby, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '18':
  - type: text
    content: 'Dia nasain’i Mosesy nampanatonina koa ny ondrilahy hatao sorona dorana manontolo; ka i Aharôna sy ny zanany no nametra-tanana teo amin’ny lohan’ny ilay ondrilahy. '
  '19':
  - type: text
    content: 'Novonoin’i Mosesy io, ary ny rany dia nafafiny manodidina tamin’ny rindrin’ny alitara. '
  '2':
  - type: text
    content: '–Antsoy i Aharôna sy ny zanany miaraka aminy, hankeo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '; asaovy entina ny fanamiana masina, ny menaka fanosorana, ny ombilahy hatao '
  - type: text
    content: sorona
  - type: text
    content: ' fanalana ny ota, ny ondrilahy roa ary ny harona nasiana mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Rehefa izany, nataony rasa vaventy ilay ondrilahy, ka nodorany hanetona ny lohany sy ny hena voarasa ary ny taviny; '
  '21':
  - type: text
    content: 'nodorany hanetona koa ny tsinainy sy ny tongony rehefa avy nosasany. Indray nodorany hanetona teo ambonin’ny alitara ilay ondrilahy: sorona dorana manontolo izany, dia sorona levonina amin’ny afo hanitra ankasitrahina ho an’ny TOMPO, araka izay efa nandidiany an’i Mosesy.'
  '22':
  - type: text
    content: 'Farany, nasain’i Mosesy nampanatonina ny ondrilahy faharoa, dia ilay ondrilahy hanaovana ny sorona fanokanana; ka i Aharôna sy ny zanany no nametra-tanana teo amin’ny lohan’ilay ondrilahy. '
  '23':
  - type: text
    content: 'Novonoin’i Mosesy io, ary nangalany ny rany ka nanentenany ny tendron’ny ravin-tsofin’i Aharôna ankavanana sy ny ankiben-tanany ankavanana sy ny ankiben-tongony ankavanana. '
  '24':
  - type: text
    content: 'Nasain’i Mosesy nanatona koa ny zanakalahin’i Aharôna, ka samy notentenany ra ny tendron’ny ravin-tsofiny ankavanana sy ny ankiben-tanany ankavanana ary ny ankiben-tongony ankavanana; ny ra sisa kosa nafafin’i Mosesy manodidina tamin’ny lafin’ny alitara. '
  '25':
  - type: text
    content: Dia nalainy ny tavin-kenan’ilay ondrilahy, izany hoe ny hofany
  - type: note
    content: Jereo Eks 29.22 sy nta.
  - type: text
    content: ' sy ny jaboran-tsinainy rehetra ary ny ila atiny sy ny voany mbamin’ny fanomboany, ary nalainy koa ny feny ankavanana. '
  '26':
  - type: text
    content: 'Ilay harona nasiany mofo tsy misy leviora, harona izay napetraka teo anatrehan’ny Toeramasin’ny TOMPO, dia nangalan’i Mosesy mofomamy anankiray tsy misy leviora, sy mofomamy anankiray voaisy menaka, ary mofo manify anankiray; ka nataony teo ambonin’ny tavin-kenan’ilay ondrilahy mbamin’ny feny ankavanana ireo mofo ireo. '
  '27':
  - type: text
    content: 'Dia napetrak’i Mosesy teo an-tanan’i Aharôna sy ny zanany ireo rehetra ireo ary nasainy hatolony amin’ny TOMPO ka hahevaheva eo anatrehany no fomba fanolotra azy. '
  '28':
  - type: text
    content: 'Dia nalain’i Mosesy avy teo an-tanany indray ireo zavatra ireo ka nodorany hanetona teo ambonin’ny alitara niaraka tamin’ny sorona dorana manontolo: sorona fanokanana ho mpisorona izany, dia sorona levonina amin’ny afo ho hanitra ankasitrahina ho an’ny TOMPO. '
  '29':
  - type: text
    content: 'Dia nalain’i Mosesy koa ny tratran’ilay ondrilahy ary natolony tamin’ny TOMPO ka nahevahevany teo anatrehany no fomba fanolotra azy: anjaran’i Mosesy, avy amin’ilay ondrilahy nanaovana ny sorona fanokanana, io tratran-kena io araka izay efa nandidian’ny TOMPO azy.'
  '3':
  - type: text
    content: Vorio koa ny Israelita rehetra ho tafangona eo anoloan’io toerana io.
  '30':
  - type: text
    content: Ary nangalan’i Mosesy ny menaka fanosorana sy ny ra izay teo ambonin’ny alitara, dia nafafiny tamin’i Aharôna sy ny zanany ary koa tamin’ny fanamiany ka samy voatokana ho an’Andriamanitra i Aharôna sy ny zanany mbamin’ny fanamiany.
  '31':
  - type: text
    content: 'Ary hoy i Mosesy tamin’i Aharôna sy ny zanany:'
  - type: text
    content: '–Andrahoy eo anoloan’ny varavaran’ny Tranolay fihaonana ny henan’ilay ondrilahy faharoa; ary eo no hihinananareo azy mbamin’ny mofo izay ao anatin’ny harona misy ny fanati-panokanana, araka izay nandidiako anareo. '
  '32':
  - type: text
    content: 'Izay sisa tsy lany amin’ny hena sy ny mofo dia hodoranareo amin’ny afo. '
  '33':
  - type: text
    content: 'Ary tsy hiala eo anoloan’ny varavaran’ny Tranolay fihaonana ianareo mandritra ny fito andro, izany hoe mandra-pahatapitry ny andro fanokanana anareo, satria haharitra fito andro ny fanokanana anareo. '
  '34':
  - type: text
    content: 'Tahaka ny efa natao androany no voadidin’ny TOMPO hatao, mba hahazoanareo famelan-keloka. '
  '35':
  - type: text
    content: Eny, hitoetra fito andro aman’alina eo anoloan’ny varavaran’ny Tranolay fihaonana ianareo. Avy eo dia hanao ny fanompoana ny Tompo ianareo kanefa tsy ho faty. Izany no didy nomen’ny TOMPO ahy.
  '36':
  - type: text
    content: Dia notanterahin’i Aharôna sy ny zanany avokoa ny fepetra efa nandidian’ny TOMPO azy tamin’ny alalan’i Mosesy.
  '4':
  - type: text
    content: 'Nanao araka izay nandidian’ny TOMPO azy i Mosesy ka tafangona teo anoloan’ny varavaran’ny Tranolay fihaonana ny Israelita; '
  '5':
  - type: text
    content: 'dia nolazain’i Mosesy azy ny raharaha nasain’ny TOMPO hataon’ny tenany. '
  '6':
  - type: text
    content: 'Ary nampanatonin’i Mosesy i Aharôna sy ny zanany ka nampandroiny tamin’ny rano. '
  '7':
  - type: text
    content: Dia nampiakanjoiny an’i Aharôna ny akanjo lava anatiny sady noetràny fehikibo; avy eo nampiakanjoiny azy ny akanjo lava ivelany ary ny efôda
  - type: note
    content: Jereo Eks 28.6-14.
  - type: text
    content: ' no nataony teo amboniny, efôda izay nogiaziny tamin’ny fatorany ka natafiny azy. '
  '8':
  - type: note
    content: 'saron-tratra: jereo Eks 28.15-30 sy ny naoty tandrifin’ny and 15. –Orîma sy ny Tomîma: jereo Eks 28.30 sy nta.'
  - type: text
    content: 'Dia napetany taminy koa ny saron-tratra ka nasitriny tao ny Orîma sy ny Tomîma. '
  '9':
  - type: text
    content: Napetrany teo an-dohany kosa ny lamba satro-doha; ary napetrany teo anoloan’ilay satro-doha ny takela-bolamena, marika famantarana fa voatokana ho an’ny TOMPO i Aharôna, araka izay efa nandidian’ny TOMPO an’i Mosesy
  - type: note
    content: 'And 6-9: jereo Eks 28.4-43; 39.1-21.'
  - type: text
    content: .
