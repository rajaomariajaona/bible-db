document_id: 1SA.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida mitsimbina indray ny ain’i Saoly
  - type: text
    content: 'Tonga tao amin’i Saoly tany Gibehà ny mponin’i Zifa, ka nanao taminy hoe:'
  - type: text
    content: –Moa tsy fantatrao ve fa miery any amin’ny havoanan’i Hakilà
  - type: note
    content: 'Zifa, Hakilà: jereo 23.14, 19 sy nta. Gibehà: jereo 10.5 sy nta.'
  - type: text
    content: ', tandrifin’ny faritra be lobolobo i Davida!'
  '10':
  - type: text
    content: 'Velona ny TOMPO ka milaza marina aminao aho fa ny TOMPO irery ihany no hanapitra ny androny, na amin’ny fahafatesana tsotra izany, na vokatry ny ady. '
  '11':
  - type: text
    content: Fa sanatriaviko eto anatrehan’ny TOMPO kosa ny handatsaka ny ain’ilay voahosotry ny TOMPO. Ny lefona akaikin’ny lohany sy ny siny fitoeran-dranony ihany no alaina, dia aoka isika handeha!
  '12':
  - type: text
    content: 'Nalain’i Davida ny lefona sy ny siny teo akaikin’ny lohan’i Saoly, dia lasa izy ireo. Tsy nisy olona nahatsiaro ka nahita na nahafantatra; fa natory ny besinimaro, satria nahasondrian-tory azy ireo ny TOMPO. '
  '13':
  - type: text
    content: 'Niampita terỳ an-dafin’ny lohasaha i Davida, ka nijanona teo an-tampon-tendrombohitra; lavidavitra ihany ny elanelan’izy roa tonta. '
  '14':
  - type: text
    content: 'Dia niantso ny tafika sy i Abinera zanakalahin’i Nera i Davida hoe:'
  - type: text
    content: –Ry Abinera! Mandre ahy ve ianao?
  - type: text
    content: 'Fa novalian’i Abinera hoe:'
  - type: text
    content: –Zovy moa izao miantsoantso mankarenina ny sofin’ny mpanjaka izao?
  '15':
  - type: text
    content: 'Dia hoy indray i Davida tamin’i Abinera:'
  - type: text
    content: '–Moa ve tsy lehilahy mahery ianao, fa tsy misy tahaka anao amin’i Israely? Koa nahoana ianao no tsy miambina tsara ny mpanjaka tomponao? Fa nisy tamin’ny vahoaka tonga hamono azy. '
  '16':
  - type: text
    content: 'Velona ny TOMPO, ka hizingiziniko fa ratsy izany nataonao izany. Mendrika ny ho faty ianareo rehetra satria tsy niambina ny tomponareo, dia ilay voahosotry ny TOMPO. Jereo ange: aiza ireo lefona sy siny fitoeran-drano teo akaikin’ny lohan’ny mpanjaka?'
  '17':
  - type: text
    content: 'Fantatr’i Saoly ny feon’i Davida, ka hoy izy hoe:'
  - type: text
    content: –Ny feonao ve izany reko izany, ry Davida zanako?
  - type: text
    content: 'Dia hoy ny navalin’i Davida azy:'
  - type: text
    content: –Eny, ry mpanjaka, ny feoko tokoa izany.
  '18':
  - type: text
    content: 'Ary hoy koa izy hoe:'
  - type: text
    content: '–Nahoana ianao, ry mpanjaka, no dia manenjika ahy mpanomponao? Fa inona loatra no nataoko ary inona no ratsy vitako? '
  '19':
  - type: text
    content: 'Ary ankehitriny, aoka ianao, ry mpanjaka tompoko, hihaino izay holazaiko aminao: raha ny TOMPO no manosika anao hanao izany amiko, aoka hampitony Azy ny '
  - type: text
    content: sorona
  - type: text
    content: ' aterina aminy; fa raha olombelona kosa, dia aoka ho voaozona eo anatrehan’ny TOMPO izy satria efa nandroaka ahy androany tsy hanana anjara amin’ny tany nomen’ny TOMPO ka toy ny manao amiko hoe: «Mandehana manompo andriamani-kafa'
  - type: note
    content: Rehefa roahina hiala amin’ny taniny sy ny fireneny i Davida, dia toy ny voasazy tsy ho afaka hitsaoka ny Tompo Andriamanitra intsony.
  - type: text
    content: '.» '
  '2':
  - type: text
    content: 'Dia nidina nankany an-taniefitr’i Zifa i Saoly nitondra miaramila telo arivo voafantina tamin’i Israely mba hitady an’i Davida any. '
  '20':
  - type: text
    content: Ary ankehitriny, aoka aho tsy ho faty lavitra ny fanatrehan’ny TOMPO! Fa nahoana ianao, ry mpanjakan’i Israely, no niainga hiantafika mba mitady izay parasy iray tahaka ahy, nahoana ianao no manenjika ahy toy ny fanenjika tsipoy iray eny an-tendrombohitra?
  '21':
  - type: text
    content: 'Hoy kosa i Saoly hoe:'
  - type: text
    content: –Nanota tokoa aho, koa miverena, ry Davida zanako; fa tsy hanisy ratsy anao intsony aho, satria sarobidy taminao ny aiko androany. Nitondra tena toy ny adala aho, ka mahatsiaro ho diso tokoa.
  '22':
  - type: text
    content: 'Dia namaly i Davida hoe:'
  - type: text
    content: '–Intỳ ny lefonao, ry mpanjaka, koa aoka ny anankiray amin’ny mpanomponao mba haka azy etỳ! '
  '23':
  - type: text
    content: 'Ny TOMPO anie hanao amintsika tsirairay araka ny fahitsiany sy ny fahamarinany! Ny TOMPO no efa nanolotra anao ho eo an-tanako androany, nefa tsy nety nikasi-tanana anao aho, satria voahosotry ny TOMPO ianao. '
  '24':
  - type: text
    content: Koa tahaka ny nahasarobidy tamiko ny ainao, no enga anie hahasarobidy ny aiko amin’ny TOMPO ka hanafahany ahy amin’ny fahoriana isan-karazany.
  '25':
  - type: text
    content: 'Ary hoy i Saoly tamin’i Davida:'
  - type: text
    content: –
  - type: text
    content: Hitahy
  - type: text
    content: ' anao anie ny Tompo, ry Davida zanako! Eny, hahomby avokoa ny zava-dehibe izay hataonao.'
  - type: text
    content: Dia lasa nanohy ny diany i Davida, fa i Saoly kosa niverina nody.
  '3':
  - type: text
    content: 'Nitoby teo amoron-dalana i Saoly tao amin’ny havoanan’i Hakilà izay tandrifin’ny faritra be lobolobo. I Davida izay nitoetra tany an-taniefitra kosa dia nahafantatra fa tonga hanenjika azy any i Saoly. '
  '4':
  - type: text
    content: 'Naniraka mpitsikilo manko i Davida ka nahazo antoka ny fahatongavan’i Saoly. '
  '5':
  - type: text
    content: Dia nankany amin’izay nitobian’i Saoly i Davida ka nahita ny toerana marina izay nandrian’i Saoly sy i Abinera zanakalahin’i Nera lehiben’ny tafika; natory tao afovoan’ny toby i Saoly, fa ny miaramilany kosa nitoby nanodidina azy.
  '6':
  - type: text
    content: 'Dia niteny i Davida ka nangataka tamin’i Ahimelèka izay Hetita sy tamin’i Abisay zanak’i Tseroià sy rahalahin’i Jôaba hoe:'
  - type: text
    content: –Iza aminareo roa lahy no hiaraka amiko ho any amin’ny tobin’i Saoly?
  - type: text
    content: 'Dia namaly i Abisay hoe:'
  - type: text
    content: –Izaho no hiaraka aminao.
  '7':
  - type: text
    content: 'Nony alina dia tonga teo amin’ny toby i Davida sy i Abisay ary indro i Saoly fa nandry resin-tory teo afovoan’ny toby, ny lefony kosa nitsatoka tamin’ny tany teo akaikin’ny lohany. Ry Abinera sy ny miaramilany dia nandry nanodidina azy. '
  '8':
  - type: text
    content: 'Ka hoy i Abisay tamin’i Davida:'
  - type: text
    content: –Anio no anoloran’Andriamanitra ny fahavalonao ho eo am-pelatananao; koa aoka holefoniko indray mandeha monja hifantsika amin’ny tany izy fa tsy indroa akory.
  '9':
  - type: text
    content: 'Fa hoy kosa i Davida tamin’i Abisay:'
  - type: text
    content: '–Tsia, aza mamono azy. Moa ataonao ho afa-maina izay mitady ny ain’ilay voahosotry ny TOMPO ka tsy hofaizina? '
