document_id: 1SA.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida mitsimbina indray ny ain’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tao amin’i Saoly tany Gibehà ny mponin’i Zifa, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa tsy fantatrao ve fa miery any amin’ny havoanan’i Hakilà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Zifa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hakilà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 23.14, 19 sy nta. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gibehà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 10.5 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', tandrifin’ny faritra be lobolobo i Davida!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nidina nankany an-taniefitr’i Zifa i Saoly nitondra miaramila telo arivo voafantina tamin’i Israely mba hitady an’i Davida any. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nitoby teo amoron-dalana i Saoly tao amin’ny havoanan’i Hakilà izay tandrifin’ny faritra be lobolobo. I Davida izay nitoetra tany an-taniefitra kosa dia nahafantatra fa tonga hanenjika azy any i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Naniraka mpitsikilo manko i Davida ka nahazo antoka ny fahatongavan’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nankany amin’izay nitobian’i Saoly i Davida ka nahita ny toerana marina izay nandrian’i Saoly sy i Abinera zanakalahin’i Nera lehiben’ny tafika; natory tao afovoan’ny toby i Saoly, fa ny miaramilany kosa nitoby nanodidina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niteny i Davida ka nangataka tamin’i Ahimelèka izay Hetita sy tamin’i Abisay zanak’i Tseroià sy rahalahin’i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza aminareo roa lahy no hiaraka amiko ho any amin’ny tobin’i Saoly?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namaly i Abisay hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no hiaraka aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nony alina dia tonga teo amin’ny toby i Davida sy i Abisay ary indro i Saoly fa nandry resin-tory teo afovoan’ny toby, ny lefony kosa nitsatoka tamin’ny tany teo akaikin’ny lohany. Ry Abinera sy ny miaramilany dia nandry nanodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ka hoy i Abisay tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anio no anoloran’Andriamanitra ny fahavalonao ho eo am-pelatananao; koa aoka holefoniko indray mandeha monja hifantsika amin’ny tany izy fa tsy indroa akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy kosa i Davida tamin’i Abisay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, aza mamono azy. Moa ataonao ho afa-maina izay mitady ny ain’ilay voahosotry ny TOMPO ka tsy hofaizina? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Velona ny TOMPO ka milaza marina aminao aho fa ny TOMPO irery ihany no hanapitra ny androny, na amin’ny fahafatesana tsotra izany, na vokatry ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa sanatriaviko eto anatrehan’ny TOMPO kosa ny handatsaka ny ain’ilay voahosotry ny TOMPO. Ny lefona akaikin’ny lohany sy ny siny fitoeran-dranony ihany no alaina, dia aoka isika handeha!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nalain’i Davida ny lefona sy ny siny teo akaikin’ny lohan’i Saoly, dia lasa izy ireo. Tsy nisy olona nahatsiaro ka nahita na nahafantatra; fa natory ny besinimaro, satria nahasondrian-tory azy ireo ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Niampita terỳ an-dafin’ny lohasaha i Davida, ka nijanona teo an-tampon-tendrombohitra; lavidavitra ihany ny elanelan’izy roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niantso ny tafika sy i Abinera zanakalahin’i Nera i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Abinera! Mandre ahy ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa novalian’i Abinera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Zovy moa izao miantsoantso mankarenina ny sofin’ny mpanjaka izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy indray i Davida tamin’i Abinera:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Moa ve tsy lehilahy mahery ianao, fa tsy misy tahaka anao amin’i Israely? Koa nahoana ianao no tsy miambina tsara ny mpanjaka tomponao? Fa nisy tamin’ny vahoaka tonga hamono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Velona ny TOMPO, ka hizingiziniko fa ratsy izany nataonao izany. Mendrika ny ho faty ianareo rehetra satria tsy niambina ny tomponareo, dia ilay voahosotry ny TOMPO. Jereo ange: aiza ireo lefona sy siny fitoeran-drano teo akaikin’ny lohan’ny mpanjaka?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fantatr’i Saoly ny feon’i Davida, ka hoy izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny feonao ve izany reko izany, ry Davida zanako?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navalin’i Davida azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, ry mpanjaka, ny feoko tokoa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana ianao, ry mpanjaka, no dia manenjika ahy mpanomponao? Fa inona loatra no nataoko ary inona no ratsy vitako? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ankehitriny, aoka ianao, ry mpanjaka tompoko, hihaino izay holazaiko aminao: raha ny TOMPO no manosika anao hanao izany amiko, aoka hampitony Azy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' aterina aminy; fa raha olombelona kosa, dia aoka ho voaozona eo anatrehan’ny TOMPO izy satria efa nandroaka ahy androany tsy hanana anjara amin’ny tany nomen’ny TOMPO ka toy ny manao amiko hoe: «Mandehana manompo andriamani-kafa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rehefa roahina hiala amin’ny taniny sy ny fireneny i Davida, dia toy ny voasazy tsy ho afaka hitsaoka ny Tompo Andriamanitra intsony.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ankehitriny, aoka aho tsy ho faty lavitra ny fanatrehan’ny TOMPO! Fa nahoana ianao, ry mpanjakan’i Israely, no niainga hiantafika mba mitady izay parasy iray tahaka ahy, nahoana ianao no manenjika ahy toy ny fanenjika tsipoy iray eny an-tendrombohitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hoy kosa i Saoly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nanota tokoa aho, koa miverena, ry Davida zanako; fa tsy hanisy ratsy anao intsony aho, satria sarobidy taminao ny aiko androany. Nitondra tena toy ny adala aho, ka mahatsiaro ho diso tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia namaly i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Intỳ ny lefonao, ry mpanjaka, koa aoka ny anankiray amin’ny mpanomponao mba haka azy etỳ! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny TOMPO anie hanao amintsika tsirairay araka ny fahitsiany sy ny fahamarinany! Ny TOMPO no efa nanolotra anao ho eo an-tanako androany, nefa tsy nety nikasi-tanana anao aho, satria voahosotry ny TOMPO ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa tahaka ny nahasarobidy tamiko ny ainao, no enga anie hahasarobidy ny aiko amin’ny TOMPO ka hanafahany ahy amin’ny fahoriana isan-karazany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy i Saoly tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hitahy
  - type: text
    text: ' anao anie ny Tompo, ry Davida zanako! Eny, hahomby avokoa ny zava-dehibe izay hataonao.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia lasa nanohy ny diany i Davida, fa i Saoly kosa niverina nody.
