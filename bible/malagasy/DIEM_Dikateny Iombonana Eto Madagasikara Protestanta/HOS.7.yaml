      children:
      - type: text
        text: '10'
    - type: text
      text: Vavolombelona manameloka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny avonavon’i Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa izy tsy niverina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamiko TOMPO Andriamaniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary, na teo aza izany rehetra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba nitady Ahy izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I Efraîma dia tahaka ny domohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay adaladala sady tsy manan-tsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miantso an’i Ejipta izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mankany Asiria.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Iny izy mankany iny kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no velariko aminy ny haratoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ataoko izay hilatsahany ao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny voromanidina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo dia faiziko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka ny zavatra ratsy nataony.
  '13':
  - type: usfm
    marker: q1
    children:
