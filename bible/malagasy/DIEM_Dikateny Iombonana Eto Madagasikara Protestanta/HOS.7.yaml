  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny tsipîka ketraka izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavon-tsabatra ny mpifehy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fitsaontsaom-bavany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no handatsana azy any Ejipta!
