document_id: HOS.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: ka te hanasitrana an’i Israely,
  - type: text
    content: dia miseho amiko ny heloky ny Efraîmita
  - type: text
    content: sy ny haratsian’ny olon’i Samaria.
  - type: text
    content: Fa manao fisolokiana ireo;
  - type: text
    content: miditra an-trano ny mpangalatra,
  - type: text
    content: manendaka an-dalambe ny jiolahy
  - type: note
    content: Jereo 4.17 sy nta.
  - type: text
    content: .
  '10':
  - type: text
    content: Vavolombelona manameloka azy
  - type: text
    content: ny avonavon’i Israely.
  - type: text
    content: Kanefa izy tsy niverina
  - type: text
    content: tamiko TOMPO Andriamaniny;
  - type: text
    content: ary, na teo aza izany rehetra izany,
  - type: text
    content: dia tsy mba nitady Ahy izy.
  '11':
  - type: text
    content: I Efraîma dia tahaka ny domohina
  - type: text
    content: izay adaladala sady tsy manan-tsaina;
  - type: text
    content: miantso an’i Ejipta izy,
  - type: text
    content: ary mankany Asiria.
  '12':
  - type: text
    content: Iny izy mankany iny kosa
  - type: text
    content: no velariko aminy ny haratoko,
  - type: text
    content: ka ataoko izay hilatsahany ao
  - type: text
    content: toy ny voromanidina;
  - type: text
    content: avy eo dia faiziko izy
  - type: text
    content: araka ny zavatra ratsy nataony.
  '13':
  - type: text
    content: «Lozan’ireo olon’i Efraîma,
  - type: text
    content: satria nandositra Ahy izy.
  - type: text
    content: Faharavana no eo aminy,
  - type: text
    content: satria nikomy tamiko izy!
  - type: text
    content: Ny tenako dia te hanavotra azy;
  - type: text
    content: fa izy kosa milaza lainga,
  - type: text
    content: isaky ny miteny momba Ahy.
  '14':
  - type: text
    content: Tsy mba vokatry ny fony
  - type: text
    content: no iantsoany vonjy amiko;
  - type: text
    content: fa mitoloko eo am-pandriany izy,
  - type: text
    content: ary mandidy tena
  - type: note
    content: Jereo Jer 41.5 sy nta.
  - type: text
    content: ' mba hahazoana'
  - type: text
    content: vary sy divay vaovao;
  - type: text
    content: fanoherana Ahy no ialany amiko.
  '15':
  - type: text
    content: Izaho no nanazatra
  - type: text
    content: sy nampatanjaka ny sandriny;
  - type: text
    content: nefa izy kosa ny amiko
  - type: text
    content: dia nisaintsain-dratsy hatrany.
  '16':
  - type: text
    content: Raha misy ny fiverenany,
  - type: text
    content: dia tsy ho amiko ilay Avo izany;
  - type: text
    content: fa mandiso fanantenana
  - type: text
    content: tahaka ny tsipîka ketraka izy.
  - type: text
    content: Ho lavon-tsabatra ny mpifehy azy
  - type: text
    content: noho ny fitsaontsaom-bavany;
  - type: text
    content: izany no handatsana azy any Ejipta!
  '2':
  - type: text
    content: Ary tsy mba misy mieritreritra
  - type: text
    content: fa tsaroako avokoa ny haratsiany.
  - type: text
    content: Ankehitriny mangeja azy
  - type: text
    content: ny asa ratsy fanaony,
  - type: text
    content: ka mby eo anatrehako izany.
  '3':
  - type: text
    content: Manafim-paharatsiana sy fiokoana izy
  - type: text
    content: no mamalifaly ny mpanjaka sy ny mpifehy
  - type: note
    content: Jereo ohatra 1 Mp 16.9-10.
  - type: text
    content: .
  '4':
  - type: text
    content: Samy mpanitsakitsa-bady avokoa izy,
  - type: text
    content: ka toy ny lafaoro voafana loatra
  - type: text
    content: izay tsy soronan’ny mpanendy mofo intsony
  - type: text
    content: hatramin’ny namolavolany ny koba
  - type: text
    content: ka mandra-pibontsiny
  - type: note
    content: Ny sary ao an-tsain’i Hôsea eto dia tsy amin’ny heviny ara-pivavahana fa ara-pôlitika (jereo 2.4 sy nta.)
  - type: text
    content: .
  '5':
  - type: text
    content: Amin’ny andro fankalazana
  - type: text
    content: ny fetin’ny mpanjakany
  - type: note
    content: Ny fetin’ny mpanjaka dia ny tsingerin-taonan’ny fanandratana azy ho mpanjaka.
  - type: text
    content: dia ny herin’ny divay
  - type: text
    content: no mamparary ireo mpifehy;
  - type: text
    content: ka olona mpaniratsira
  - type: text
    content: no raisin’ny mpanjaka tanana,
  '6':
  - type: text
    content: rehefa manatona azy ny mpifehy.
  - type: text
    content: Tahaka ny lafaoro tokoa
  - type: text
    content: 'ny fo feno fitaka ananan’ireo:'
  - type: text
    content: mandritra ny alina
  - type: text
    content: dia matory ny fahatezerany;
  - type: text
    content: ary nony maraina dia mirehitra
  - type: text
    content: tahaka ny afo midedadeda.
  '7':
  - type: text
    content: Mahamay toa lafaoro izy rehetra
  - type: text
    content: ka mandringana ireo filohany.
  - type: text
    content: Lavo avokoa ireo mpanjakany,
  - type: text
    content: nefa tsy mba nisy niantso Ahy akory.
  '8':
  - type: text
    content: «Miharoharo amin’ny firenen-kafa i Efraîma
  - type: text
    content: ka toy ny endi-mofo tsy voavadika.
  '9':
  - type: text
    content: Tsentsefin’ny vahiny ny heriny
  - type: text
    content: nefa tsy fantany akory izany;
  - type: text
    content: ary mihafotsy ny volon-dohany,
  - type: text
    content: nefa tsy fantany akory izany.
