  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izaho no nanazatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nampatanjaka ny sandriny;
  - type: usfm
    marker: q1
    children:
