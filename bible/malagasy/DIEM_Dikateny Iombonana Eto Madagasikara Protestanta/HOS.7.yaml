      text: sy ny haratsian’ny olon’i Samaria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manao fisolokiana ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miditra an-trano ny mpangalatra,
  - type: usfm
    marker: q1
    children:
