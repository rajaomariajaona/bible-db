      children:
      - type: text
        text: '13'
    - type: text
      text: «Lozan’ireo olon’i Efraîma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nandositra Ahy izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faharavana no eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nikomy tamiko izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenako dia te hanavotra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izy kosa milaza lainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: isaky ny miteny momba Ahy.
  '14':
  - type: usfm
    marker: q1
    children:
