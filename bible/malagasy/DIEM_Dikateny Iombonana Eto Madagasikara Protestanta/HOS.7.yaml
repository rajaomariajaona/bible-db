      children:
      - type: text
        text: '16'
    - type: text
      text: Raha misy ny fiverenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy ho amiko ilay Avo izany;
  - type: usfm
    marker: q1
    children:
