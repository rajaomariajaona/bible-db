    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy misy tahaka ny voay eny ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa noariko tsy hanan-tahotra izy.
- type: usfm
