    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny mololo ny vy aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny hazo boboka ny varahina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mampandositra azy izay zana-tsipîka,
