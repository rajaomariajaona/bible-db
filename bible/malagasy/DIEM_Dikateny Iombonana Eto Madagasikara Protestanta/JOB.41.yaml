  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vao mievina ny voay, dia mamoaka hazavana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny masony manjary manjopiaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny masoandro vao miposaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny vavany kosa ivoahan’ny lelafo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ipariahan’ny kilalaon’afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mivoa-tsetroka ny vavoron’ny voay
- type: usfm
  marker: q1
  children:
  - type: text
    text: mova tsy vilany mangotraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: notanehina tamin-jozoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mampirehitra arina ny fofonainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria lelafo no avoaky ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
