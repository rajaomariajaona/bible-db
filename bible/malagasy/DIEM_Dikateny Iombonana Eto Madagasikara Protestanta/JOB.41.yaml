  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy sabatra mahalaitra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izany koa ny lefompohy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny firombaka na ny zana-tsipîka.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny mololo ny vy aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny hazo boboka ny varahina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy olona sahy mihantsy ady aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa zovy kosa no sahy hifanandrina amiko?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mampandositra azy izay zana-tsipîka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ataony toy ny mololo ny vaton’antsamotady
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny vodivary ny langilangy aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ihomehezany ny firimorimon’ny lefona.
  - type: usfm
    marker: s1
