document_id: JOB.41,396
type_code: plt
verses:
  '1':
  - type: text
    content: Nofinofy ny fanantenana handresy ny voay,
  - type: text
    content: fa ny fahitana azy fotsiny dia mahaketraka.
  '10':
  - type: text
    content: Vao mievina ny voay, dia mamoaka hazavana;
  - type: text
    content: ka ny masony manjary manjopiaka
  - type: text
    content: toy ny masoandro vao miposaka.
  '11':
  - type: text
    content: Ny vavany kosa ivoahan’ny lelafo
  - type: text
    content: sy ipariahan’ny kilalaon’afo.
  '12':
  - type: text
    content: Mivoa-tsetroka ny vavoron’ny voay
  - type: text
    content: mova tsy vilany mangotraka
  - type: text
    content: notanehina tamin-jozoro.
  '13':
  - type: text
    content: Mampirehitra arina ny fofonainy,
  - type: text
    content: satria lelafo no avoaky ny vavany.
  '14':
  - type: text
    content: Ny vozony no itoeran-kery
  - type: text
    content: ka mihorohoro izay mahita azy.
  - type: heading
    content: '*'
  '15':
  - type: text
    content: Mivalombalona ireo hotraky ny voay,
  - type: text
    content: ka mafy sady mihenjana tsy voalefitra.
  '16':
  - type: text
    content: Mafy tahaka ny vato ny fony,
  - type: text
    content: 'eny, mafy toy ny '
  - type: text
    content: vato fikosoham-bary
  - type: text
    content: .
  '17':
  - type: text
    content: Rehefa mitsangana ny voay,
  - type: text
    content: dia mangovitra ireo filoha
  - type: note
    content: 'ireo filoha: dkt hafa ireo andriamanitra.'
  - type: text
    content: fa tsy afa-manoatra noho ny tahotra.
  '18':
  - type: text
    content: Tsy misy sabatra mahalaitra azy,
  - type: text
    content: toy izany koa ny lefompohy
  - type: text
    content: na ny firombaka na ny zana-tsipîka.
  '19':
  - type: text
    content: Toy ny mololo ny vy aminy
  - type: text
    content: ary toy ny hazo boboka ny varahina.
  '2':
  - type: text
    content: Tsy misy olona sahy mihantsy ady aminy,
  - type: text
    content: koa zovy kosa no sahy hifanandrina amiko?
  '20':
  - type: text
    content: Tsy mampandositra azy izay zana-tsipîka,
  - type: text
    content: ataony toy ny mololo ny vaton’antsamotady
  '21':
  - type: text
    content: Toy ny vodivary ny langilangy aminy;
  - type: text
    content: ihomehezany ny firimorimon’ny lefona.
  - type: heading
    content: '*'
  '22':
  - type: text
    content: Feno fantsika miranirany ny takiban’ny voay
  - type: text
    content: ka mikisaka mova tsy hersa manditra fotaka.
  '23':
  - type: text
    content: Rehefa misitrika anaty rano lalina izy,
  - type: text
    content: dia mampandroadroatra izany
  - type: text
    content: toa rano mangotraka ao am-bilany
  - type: text
    content: ary manova ny farihy ho fandoroan-java-manitra
  - type: note
    content: 'ho fandoroan-java-manitra: noho ny etona sy fofon-drano eo amin’ny farihy nisitrihan’ny voay ka azo ampitahaina amin’ny setroka sy hanitra avy amin’ny fandoroan-java-manitra.'
  - type: text
    content: .
  '24':
  - type: text
    content: Mamela dindo mazava eo aoriany izy
  - type: text
    content: ka ny onja dia tahaka ny volofotsy
  - type: text
    content: mitsinkafona eny amin’ny rano lalina.
  '25':
  - type: text
    content: Tsy misy tahaka ny voay eny ambonin’ny tany
  - type: text
    content: fa noariko tsy hanan-tahotra izy.
  '26':
  - type: text
    content: Bandrininy avokoa ny biby goavana;
  - type: text
    content: izy no mpanjakan’ny biby masiaka rehetra.
  '3':
  - type: text
    content: 'Fa tsy ananan’olon-trosa Aho:'
  - type: text
    content: Ahy izay rehetra eny ambany masoandro.
  - type: heading
    content: '*'
  '4':
  - type: text
    content: Kanefa mbola holazalazaiko izao
  - type: text
    content: ny amin’ny rantsam-batan’ny voay
  - type: text
    content: sy ny antsipirian’ireo asa mahery vitany
  - type: text
    content: ary ny hatsàran’ny endrika ananany.
  '5':
  - type: text
    content: Iza no mahainga ny fitafiany ivelany,
  - type: text
    content: na handoaka ny akanjovy matevina ifonosany?
  '6':
  - type: text
    content: Iza koa no sahy hanokatra ny vavany,
  - type: text
    content: fa ireo nifiny dia mampihorohoro
  - type: text
    content: izay olona eny manodidina?
  '7':
  - type: text
    content: Ny lamosiny dia voasaron’ampinga milahatra
  - type: note
    content: 'ampinga: sarin’ny kiran’ilay biby.'
  - type: text
    content: sady tafatambatra mafy sy mifanety.
  '8':
  - type: text
    content: Mifanakaiky dia mifanakaiky ireo
  - type: text
    content: ka tsisy hirika idiran-drivotra akory.
  '9':
  - type: text
    content: Mifanindry sy mifamikitra koa ireo
  - type: text
    content: ka tsy azo sarahina mihitsy.
  - type: heading
    content: '*'
