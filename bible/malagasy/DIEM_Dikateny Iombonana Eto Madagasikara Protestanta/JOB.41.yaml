  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifanindry sy mifamikitra koa ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy azo sarahina mihitsy.
