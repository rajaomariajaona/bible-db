  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nofinofy ny fanantenana handresy ny voay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny fahitana azy fotsiny dia mahaketraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy olona sahy mihantsy ady aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: koa zovy kosa no sahy hifanandrina amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa tsy ananan’olon-trosa Aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahy izay rehetra eny ambany masoandro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kanefa mbola holazalazaiko izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny amin’ny rantsam-batan’ny voay
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny antsipirian’ireo asa mahery vitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hatsàran’ny endrika ananany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no mahainga ny fitafiany ivelany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na handoaka ny akanjovy matevina ifonosany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza koa no sahy hanokatra ny vavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ireo nifiny dia mampihorohoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay olona eny manodidina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny lamosiny dia voasaron’ampinga milahatra
  - type: usfm
    marker: f
