    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno fantsika miranirany ny takiban’ny voay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mikisaka mova tsy hersa manditra fotaka.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa misitrika anaty rano lalina izy,
  - type: usfm
    marker: q1
