  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamela dindo mazava eo aoriany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny onja dia tahaka ny volofotsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitsinkafona eny amin’ny rano lalina.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy tahaka ny voay eny ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa noariko tsy hanan-tahotra izy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bandrininy avokoa ny biby goavana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izy no mpanjakan’ny biby masiaka rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa tsy ananan’olon-trosa Aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahy izay rehetra eny ambany masoandro.
  - type: usfm
    marker: s1
