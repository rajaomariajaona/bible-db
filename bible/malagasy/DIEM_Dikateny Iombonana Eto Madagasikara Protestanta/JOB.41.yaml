    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tafatambatra mafy sy mifanety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mifanakaiky dia mifanakaiky ireo
- type: usfm
  marker: q1
  children:
  - type: text
