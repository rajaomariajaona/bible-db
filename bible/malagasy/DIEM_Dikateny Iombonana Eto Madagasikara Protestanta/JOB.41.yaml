  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofinofy ny fanantenana handresy ny voay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fahitana azy fotsiny dia mahaketraka.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao mievina ny voay, dia mamoaka hazavana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny masony manjary manjopiaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny masoandro vao miposaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavany kosa ivoahan’ny lelafo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ipariahan’ny kilalaon’afo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoa-tsetroka ny vavoron’ny voay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mova tsy vilany mangotraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notanehina tamin-jozoro.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampirehitra arina ny fofonainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria lelafo no avoaky ny vavany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vozony no itoeran-kery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mihorohoro izay mahita azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivalombalona ireo hotraky ny voay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mafy sady mihenjana tsy voalefitra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy tahaka ny vato ny fony,
  - type: usfm
