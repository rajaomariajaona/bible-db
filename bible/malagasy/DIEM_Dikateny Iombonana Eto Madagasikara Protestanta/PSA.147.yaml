document_id: PSA.147,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ny Tompo no mpanohana izao rehetra izao
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà ny TOMPO ianareo fa tsara Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankalazà ny Andriamanitsika fa mamy Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mendrika Azy tokoa ny fiderana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny herin’ny soavaly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '147.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'soavaly: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 33.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' na ny hakingàn’ny olona'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tena sitraky ny TOMPO sy ankamamîny,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manaja Azy ka matoky ny fitiavany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Jerosalema ô, mankalazà ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ry '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' ô, miderà an’Andriamanitrao.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manamafy ny hidim-bavahadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitahy ny zanakao ao anatinao,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manisy fiadanana ny faritaninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamoky anao amin’ny vary tsara indrindra,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandefa ny baikony eto an-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka faingam-piely tokoa ny teniny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mandatsaka orampanala toa volon’ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamafy fanala toa lavenona,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manipy ranomandry toa sombi-mofo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy mahazaka ny hatsiakany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alefany ny teniny, ka miempo ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atsokany ny rivotra, dia mandriaka ny rano.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manambara ny teniny amin’ny taranak’i Jakôba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny didiny sy fitsipiny amin’ny vahoaka Israely,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Manangana an’i Jerosalema ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao no hamoriany izay efa niely tamin’i Israely.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy mba nanao izany tamin’ny firenen-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny fitsipiny tsy mba fantatr’ireo.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manasitrana ny torotoro fo Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamehy ny ferin’ireo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manisa tsirairay ny kintana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miantso azy amin’ny anarany avy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny Tompontsika sady mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy fetra ny fahalalàny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manarina ny ory ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa manetry ny olon-dratsy hatramin’ny tany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà fiderana ho an’ny TOMPO ianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mankalazà an’Andriamanitsika amin’ny lokanga:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no manaron-drahona ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomana orana ho an’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampitsiry ahitra ny tanety,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mamokatra anana ho an’ny olona,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manome sakafo ny biby fiompy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny zana-goaika mitoreo.
