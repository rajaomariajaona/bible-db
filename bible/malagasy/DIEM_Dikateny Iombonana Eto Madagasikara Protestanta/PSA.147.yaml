document_id: PSA.147,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny Tompo no mpanohana izao rehetra izao
  - type: text
    content: Miderà ny TOMPO ianareo fa tsara Izy;
  - type: text
    content: mankalazà ny Andriamanitsika fa mamy Izy.
  - type: text
    content: Mendrika Azy tokoa ny fiderana.
  '10':
  - type: text
    content: Tsy ny herin’ny soavaly
  - type: note
    content: 'soavaly: jereo Sal 33.17 sy nta.'
  - type: text
    content: ' na ny hakingàn’ny olona'
  - type: text
    content: no tena sitraky ny TOMPO sy ankamamîny,
  '11':
  - type: text
    content: fa izay manaja Azy ka matoky ny fitiavany.
  '12':
  - type: text
    content: Ry Jerosalema ô, mankalazà ny TOMPO;
  - type: text
    content: 'ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ô, miderà an’Andriamanitrao.'
  '13':
  - type: text
    content: Izy no manamafy ny hidim-bavahadinao,
  - type: text
    content: mitahy ny zanakao ao anatinao,
  '14':
  - type: text
    content: manisy fiadanana ny faritaninao
  - type: text
    content: sy mamoky anao amin’ny vary tsara indrindra,
  '15':
  - type: text
    content: mandefa ny baikony eto an-tany
  - type: text
    content: ka faingam-piely tokoa ny teniny.
  '16':
  - type: text
    content: Izy no mandatsaka orampanala toa volon’ondry,
  - type: text
    content: sy mamafy fanala toa lavenona,
  '17':
  - type: text
    content: manipy ranomandry toa sombi-mofo
  - type: text
    content: ka tsy misy mahazaka ny hatsiakany.
  '18':
  - type: text
    content: Alefany ny teniny, ka miempo ireny;
  - type: text
    content: atsokany ny rivotra, dia mandriaka ny rano.
  '19':
  - type: text
    content: Izy no manambara ny teniny amin’ny taranak’i Jakôba,
  - type: text
    content: ny didiny sy fitsipiny amin’ny vahoaka Israely,
  '2':
  - type: text
    content: 'Manangana an’i Jerosalema ny TOMPO:'
  - type: text
    content: ao no hamoriany izay efa niely tamin’i Israely.
  '20':
  - type: text
    content: fa tsy mba nanao izany tamin’ny firenen-kafa
  - type: text
    content: ka ny fitsipiny tsy mba fantatr’ireo.
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  '3':
  - type: text
    content: Manasitrana ny torotoro fo Izy
  - type: text
    content: sy mamehy ny ferin’ireo.
  '4':
  - type: text
    content: Manisa tsirairay ny kintana Izy
  - type: text
    content: sy miantso azy amin’ny anarany avy.
  '5':
  - type: text
    content: Lehibe ny Tompontsika sady mahery;
  - type: text
    content: tsy misy fetra ny fahalalàny.
  '6':
  - type: text
    content: Manarina ny ory ny TOMPO
  - type: text
    content: fa manetry ny olon-dratsy hatramin’ny tany.
  '7':
  - type: text
    content: Mihirà fiderana ho an’ny TOMPO ianareo;
  - type: text
    content: 'mankalazà an’Andriamanitsika amin’ny lokanga:'
  '8':
  - type: text
    content: Izy no manaron-drahona ny lanitra
  - type: text
    content: manomana orana ho an’ny tany,
  - type: text
    content: mampitsiry ahitra ny tanety,
  - type: text
    content: mamokatra anana ho an’ny olona,
  '9':
  - type: text
    content: manome sakafo ny biby fiompy
  - type: text
    content: sy ny zana-goaika mitoreo.
