document_id: JER.51,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: «Indro misy tafio-drivotra mpandrava
  - type: text
    content: 'asaiko mitsoka hamely an’i '
  - type: text
    content: Babilôna
  - type: text
    content: sy hamely ny mponina ao aminy
  - type: note
    content: 'ny mponina ao aminy: dkt hafa ny mponina eo anivon’ny fahavaloko.'
  - type: text
    content: .
  '10':
  - type: text
    content: Naneho fanafahana antsika ny TOMPO.
  - type: text
    content: 'Andao hotantaraintsika any '
  - type: text
    content: Tsiôna
  - type: text
    content: izay nataon’ny TOMPO Andriamanitsika.
  '11':
  - type: text
    content: Nikasa handrava an’i Babilôna ny TOMPO, ka mampirisika ny mpanjakan’i Medianina hanatanteraka izany. Famaizan’ny TOMPO azy izany, famaizana noho ny amin’ny tempoliny masina.
  - type: text
    content: Koa ranito ny zana-tsipîkanareo,
  - type: text
    content: ary fenoy ny tranon-jana-tsipîka.
  '12':
  - type: text
    content: Atsangano ny fanevam-panairana
  - type: text
    content: hanafihana ny mandan’i Babilôna.
  - type: text
    content: Hateveno mafy ny fiambenana
  - type: text
    content: ka apetraho ny mpiambina sy ny mpitily.
  - type: text
    content: Tanteraky ny TOMPO izao ny fikasany,
  - type: text
    content: dia izay efa nambarany
  - type: text
    content: momba ny mponin’i Babilôna.
  '13':
  - type: text
    content: Ry Babilôna izay mipetraka
  - type: text
    content: eo amoron’ny ony lehibe
  - type: text
    content: sady manana harena sarobidy ô,
  - type: text
    content: tonga ny fiafaranao fa feno ny fatranao
  - type: note
    content: 'ny ony lehibe: i Eofrata, ampit Apôk 17.1. –feno ny fatranao na tapaka ny tadim-piainanao.'
  - type: text
    content: .
  '14':
  - type: text
    content: Ny TOMPOn’izao rehetra izao
  - type: text
    content: 'dia nianiana tamin’ny tenany hoe:'
  - type: text
    content: «Handefa olona hibosesika ao aminao Aho,
  - type: text
    content: ka ho maro toy ny valala ireny,
  - type: text
    content: ary hanao akoran’ady hamelezana anao.»
  '15':
  - type: text
    content: Tamin-kery no nanaovan’Andriamanitra ny tany
  - type: note
    content: 'And 15-19: jereo 10.12-16.'
  - type: text
    content: ','
  - type: text
    content: tamim-pahendrena no nanorenany izao tontolo izao,
  - type: text
    content: ary tamim-pahaizana no namelarany ny habakabaka.
  '16':
  - type: text
    content: Baikony no mampitoby
  - type: text
    content: ny ranobe any an-danitra any
  - type: text
    content: sy mampiakatra ny rahona matevina
  - type: text
    content: avy eny am-paravodilanitra,
  - type: text
    content: ary andatsahan’ny tselatra ny ranonorana
  - type: text
    content: sy ivoahan’ny rivotra avy amin’ny fitoerany.
  '17':
  - type: text
    content: Ketrina avokoa ny olona rehetra
  - type: text
    content: ka tsy mahatakatra ny hevitr’izany.
  - type: text
    content: Ireo mpandasitra sarivongan-tsampy
  - type: text
    content: dia menatra avokoa tamin’ny nataony;
  - type: text
    content: satria fitaka ireo sarivongana ireo
  - type: text
    content: fa tsy manam-pofonaina akory.
  '18':
  - type: text
    content: Zava-poana sy asa mahatsikaiky ireny;
  - type: text
    content: fa amin’ny andro hamaizana azy,
  - type: text
    content: no hahalevona ny sarivongan-tsampy.
  '19':
  - type: text
    content: Fa tsy mitovy amin’ireo ny Tompo,
  - type: text
    content: ilay Anjaran’i Jakôba,
  - type: text
    content: satria Izy no mpamorona ny zava-drehetra;
  - type: text
    content: ary ny vahoaka Israely dia fananany.
  - type: text
    content: Ilay TOMPOn’izao rehetra izao no anarany.
  - type: heading
    content: Ny fiafaran’i Babilôna
  '2':
  - type: text
    content: Olona hafa firenena no halefako amin’i Babilôna
  - type: text
    content: ka hanaparitaka azy toy ny akofa,
  - type: text
    content: ary hahatonga ny taniny ho foana.
  - type: text
    content: Amin’izany andro mandoza izany
  - type: text
    content: dia hipoitra hatraiza hatraiza ireo mpamely azy.»
  '20':
  - type: text
    content: '«Ry '
  - type: text
    content: Babilôna
  - type: text
    content: ', hoy ny Tompo,'
  - type: text
    content: kanonta sy fitaovam-piadiana ho Ahy ianao.
  - type: text
    content: Ianao no nampiasaiko hanorotoroana firenena
  - type: text
    content: sy hanapotehana fanjakana maro.
  '21':
  - type: text
    content: Ianao no nampiasaiko
  - type: text
    content: hanorotoroana ny soavaly sy ny mpitaingina azy.
  '22':
  - type: text
    content: Ianao no nampiasaiko
  - type: text
    content: hanorotoroana lehilahy sy vehivavy,
  - type: text
    content: na antitra na tanora na ankizy.
  '23':
  - type: text
    content: Ianao no nampiasaiko hanorotoroana
  - type: text
    content: 'ny '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondry sy ny andian’'
  - type: text
    content: ondriny
  - type: text
    content: ','
  - type: text
    content: ny mpamboly sy ny ombiny mizioga,
  - type: text
    content: ary ny governora sy ny lefiny.»
  '24':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO:'
  - type: text
    content: Ho hitanareo kosa izao
  - type: text
    content: fa hatsingeriko amin’i Babilôna
  - type: text
    content: sy ny mponina rehetra any Babilônia
  - type: text
    content: 'ny ratsy rehetra nataony tamin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  '25':
  - type: text
    content: Indro mamely anao Aho,
  - type: text
    content: ry Babilôna mpampiavosa fandravana,
  - type: text
    content: ianao ilay nandrava izay rehetra tamin’ny tany,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  - type: text
    content: Maninji-tanana hamely anao Aho,
  - type: text
    content: ka manjera anao avy eny ambony harambato.
  - type: text
    content: Hataoko vainafo miavosa ianao,
  '26':
  - type: text
    content: ka tsy ho azo akàna vato intsony
  - type: text
    content: hatao vato fehizoro na vato fanorenana.
  - type: text
    content: Ho toerana mahonena mandrakizay ianao,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '27':
  - type: text
    content: Atsangano ny fanevam-panairana eo amin’ny tany,
  - type: text
    content: tsofy any amin’ny firenen-kafa ny anjomara;
  - type: text
    content: entano ny firenena rehetra hamely an’i Babilôna,
  - type: text
    content: antsoy hamely azy ny fanjakana
  - type: text
    content: any Ararata sy Menỳ ary Askenaza.
  - type: text
    content: Manendre mpifehy hamory miaramila;
  - type: text
    content: soavaly marobe no alefaso hanafika
  - type: text
    content: toy ny valala
  - type: note
    content: 'Menỳ: faritany iray manodidina ny farihin’i Vana. Ireo fanjakana telo voalaza eto dia mitomandavana ao avaratr’i Mezôpôtamia.'
  - type: text
    content: ' manao andiany.'
  '28':
  - type: text
    content: Entano ny firenena maro hamely azy,
  - type: text
    content: indrindra fa ny mpanjakan’i Medianina,
  - type: text
    content: ny governora rehetra sy ny lefiny
  - type: text
    content: ary ny faritany manontolo izay iadidiany.
  '29':
  - type: text
    content: Mihorohoro sy mihovitrovitra ny tany
  - type: text
    content: fa tanteraka amin’i Babilôna
  - type: text
    content: ny fikasan’ny TOMPO hamelezana azy
  - type: text
    content: mba hahatonga an’i Babilônia
  - type: text
    content: ho tany mahonena tsy misy mponina intsony.
  '3':
  - type: text
    content: –Aoka tsy hanenjan-tsipîka intsony ao Babilôna
  - type: text
    content: ireo mpitifitra amin’ny tsipîka!
  - type: text
    content: aoka izy tsy hisalotra intsony
  - type: text
    content: ny akanjo vy fiarovan-tratra!–
  - type: text
    content: Aza avela hisy ho afa-mitsoaka ny tovolahiny;
  - type: text
    content: ataovy ringana ny tafiny manontolo!
  '30':
  - type: text
    content: Tsy mety hiady intsony
  - type: text
    content: ny miaramila kalazan’i Babilôna,
  - type: text
    content: fa lasa niery any amin’ny trano fiarovana.
  - type: text
    content: Lefy herim-po izy,
  - type: text
    content: ka nalemy toy ny vehivavy.
  - type: text
    content: Nodorana ny fonenany,
  - type: text
    content: potika ny hidim-baravarany.
  '31':
  - type: text
    content: Mifampita vaovao ny iraka mpihazakazaka
  - type: text
    content: mba hampandre ny mpanjakan’i Babilôna,
  - type: text
    content: fa azom-pahavalo ny tanànany manontolo.
  '32':
  - type: text
    content: Voatazona ny toeram-pitàna,
  - type: text
    content: voadoro ny volotara eny an-kady fiarovana,
  - type: text
    content: kivy ny miaramila babilônianina.
  '33':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely:'
  - type: text
    content: «Voahosihosy ilay Babilôna fadiranovana
  - type: text
    content: toy ny famoloana omanina hivelezam-bary;
  - type: text
    content: fa ho avy tsy ho ela ny fotoam-pijinjana azy.»
  - type: heading
    content: Andriamanitra no miandraikitra ny valifaty ho an’ny vahoakany
  - type: heading
    content: Jerosalema
  '34':
  - type: text
    content: «Nandripaka sy nitsentsitra ahy
  - type: text
    content: i Nebokadnetsara mpanjakan’i Babilôna;
  - type: text
    content: dia napetrany toy ny vilia nolelafina aho.
  - type: text
    content: Tahaka ny fitelin’ny mamba no nitelemany ahy,
  - type: text
    content: ka ny tsokako no namenoany ny kibony;
  - type: text
    content: izay aho vao naloany.
  '35':
  - type: text
    content: 'Aoka ny mponin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: ' hiteny hoe:'
  - type: text
    content: 'Hanody an’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' anie'
  - type: text
    content: ny herisetra nataony tamiko!
  - type: text
    content: 'Aoka i Jerosalema hiteny hoe:'
  - type: text
    content: Hanody azy anie ny heloka nataony
  - type: text
    content: tamin’ny nandatsahany ny rako!»
  - type: heading
    content: '*'
  '36':
  - type: text
    content: 'Izao àry no lazain’ny TOMPO amin’i Jerosalema:'
  - type: text
    content: «Horaisiko an-tanana ny momba anao
  - type: text
    content: 'ka Izaho no hamalifaty anao:'
  - type: text
    content: hataoko maina ny oniny
  - type: text
    content: ary horitiko ny loharanony.
  '37':
  - type: text
    content: Ho tonga korontam-bato i Babilôna,
  - type: text
    content: ka ho fonenan’ny amboadia,
  - type: text
    content: ho toerana tsy misy mponina intsony
  - type: text
    content: fa mahonena sy mampivarahontsana.
  '38':
  - type: text
    content: Miara-mierona toy ny liona tanora
  - type: text
    content: ny mponina ao Babilôna ankehitriny
  - type: text
    content: ary mikonainaina toy ny zana-diona.
  '39':
  - type: text
    content: Raha mbola eo am-pilendalendana izy,
  - type: text
    content: 'dia efa manomana fanasana ho azy Aho:'
  - type: text
    content: Homamoiko izy mba hiravoravo
  - type: text
    content: dia hatory mandrakizay
  - type: note
    content: Momba ny fahamamoana ho toy ny sarin’ny fitsaran’Andriamanitra, jereo 25.15-29.
  - type: text
    content: ','
  - type: text
    content: ka tsy hifoha intsony.
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  '4':
  - type: text
    content: Eny amin’ny tanin’i Babilôna
  - type: text
    content: dia hiampatrampatra ireo maratra,
  - type: text
    content: ary eny an-dalambeny
  - type: text
    content: no hitsitsitra ireo maty an’ady.
  '40':
  - type: text
    content: Any amin’ny toeram-pamonoana
  - type: text
    content: no hitondrako azy toy ny zanak’ondry
  - type: text
    content: sy toy ny ondrilahy aman’osilahy.»
  - type: heading
    content: Tomany momba an’i Babilôna.
  '41':
  - type: text
    content: Andray! Nalaza eran-tany ny tanànan’i Sesàka
  - type: note
    content: 'Sesàka: jereo 25.26 sy nta.'
  - type: text
    content: nefa azo sy voatazona izy izao!
  - type: text
    content: 'Andray! Tonga toerana mahonena i '
  - type: text
    content: Babilôna
  - type: text
    content: eo anivon’ny firenena maro!
  '42':
  - type: text
    content: Tafakatra hatrany aminy ny ranomasina,
  - type: text
    content: nandrakotra azy ny onjany misafoaka.
  '43':
  - type: text
    content: Tonga aolo ny tanànany;
  - type: text
    content: karankaina sy ngazana ny taniny
  - type: text
    content: sady tsy misy mponina intsony
  - type: text
    content: ary tsy misy olona mandalo azy.
  '44':
  - type: text
    content: 'Hoy ny TOMPO hoe:'
  - type: text
    content: «Hirotsaka an-tsehatra hamely an’i Bela
  - type: text
    content: andriamanitr’i Babilôna Aho,
  - type: text
    content: hasaiko haloany izay nateliny.
  - type: text
    content: Hitsahatra tsy hitanjozotra
  - type: text
    content: ho any aminy ireo firenen-kafa.
  - type: text
    content: Nirodana ny mandan’i Babilôna!
  '45':
  - type: text
    content: Koa ilaozy ny tanànany, ry vahoakako,
  - type: text
    content: ary samia manavo-tena ianareo
  - type: text
    content: mba tsy hiharan’ny fahatezerako mirehitra!
  '46':
  - type: text
    content: '«Tandremo tsy ho kivy na hatahotra ianareo noho ny tsaho izay taterina ao amin’ny tany. Fa hifandimby ny tsaho samihafa arakaraky ny taona: herisetra ao amin’ny tany, fanonganan’ny mpanao didy jadona an’izay talohany...'
  '47':
  - type: text
    content: Ho avy ny andro hirotsahako an-tsehatra
  - type: text
    content: hamely ireo sarivongan-tsampin’i Babilôna.
  - type: text
    content: Afa-baràka ny taniny manontolo;
  - type: text
    content: hiampatrampatra ao an-tanàna ny maty rehetra.
  '48':
  - type: text
    content: Ny lanitra sy ny tany sy izay rehetra ao aminy
  - type: text
    content: dia hanao hobim-pandresena
  - type: text
    content: noho ny amin’i Babilôna,
  - type: text
    content: rehefa tonga avy any avaratra
  - type: note
    content: 'horakoraka lehibe: jereo Apôk 18.20. –avy any avaratra: jereo 50.3 sy nta.'
  - type: text
    content: ireo tsy maintsy handrava azy.»
  - type: text
    content: Izany no teny hentitry ny TOMPO.
  - type: heading
    content: Ny mpaminany
  '49':
  - type: text
    content: Nahatonga fahafatesan’olona maro i Babilôna
  - type: text
    content: teo amin’ny tany manontolo;
  - type: text
    content: koa anjarany indray izao ny ho faty
  - type: text
    content: noho ireo Israelita izay novonoiny
  - type: note
    content: Ampit Apôk 18.24.
  - type: text
    content: .
  '5':
  - type: text
    content: Satria manenika an’i Babilônia
  - type: text
    content: 'ny fahotany tamin’ilay Masin’i '
  - type: text
    content: Israely
  - type: text
    content: .
  - type: text
    content: –Ilay Andriamanitra TOMPOn’izao rehetra izao kosa
  - type: text
    content: tsy mba namela an’i Israely
  - type: text
    content: sy i Joda ho mpitondratena.–
  '50':
  - type: text
    content: Koa ianareo izay afaka tamin’ny ady,
  - type: text
    content: mandehana fa aza mijanona eo.
  - type: text
    content: Avy any lavitra any no tsarovy ny TOMPO
  - type: text
    content: ary ataovy ao an-tsainareo i Jerosalema.
  - type: heading
    content: Ny vahoakan’Andriamanitra
  '51':
  - type: text
    content: Afa-baràka izahay nandre fandatsana!
  - type: text
    content: Rakotry ny henatra ny endrikay
  - type: text
    content: fony nidiran’ireo hafa firenena
  - type: text
    content: 'ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' tao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: .
  - type: heading
    content: Ny Tompo
  '52':
  - type: text
    content: Noho izany, hoy ny teny hentitry ny TOMPO,
  - type: text
    content: dia ho avy ny andro hirotsahako an-tsehatra
  - type: text
    content: hamely ireo sarivongan-tsampin’i Babilôna.
  - type: text
    content: Ho re manerana ny taniny
  - type: text
    content: ny tolokon’ireo maratra.
  '53':
  - type: text
    content: Na dia hisondrotra any an-danitra aza i Babilôna
  - type: text
    content: ka hanao ny fiarovany ho avo tsy azo anihina,
  - type: text
    content: dia ny baikoko no hahatraran’ny mpandrava azy
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: heading
    content: Ny mpaminany
  '54':
  - type: text
    content: 'Misy feo miantso vonjy avy any Babilôna:'
  - type: text
    content: fandringanana goavana no re avy ao amin’ny taniny.
  '55':
  - type: text
    content: Fa ny TOMPO no mandrava an’i Babilôna,
  - type: text
    content: sy mampangina ny horakorany.
  - type: text
    content: Mamelona akoran’ady ny fahavalo
  - type: text
    content: ka toy ny feon’onjan-dranomasina
  - type: text
    content: ao anaty kotro-baratra izany.
  '56':
  - type: text
    content: Tonga hanafika an’i Babilôna ny mpandrava,
  - type: text
    content: ka hanao sambo-belona ireo maherifony,
  - type: text
    content: sy hanapotika ny tsipîkany.
  - type: text
    content: Fa ny TOMPO dia Andriamanitra mamaly ny natao
  - type: text
    content: ka mampihatra tokoa ny valifatiny.
  '57':
  - type: text
    content: «Homamoiko ireo mpitondra azy sy ny olon-kendriny, ireo governorany sy ny lefiny ary ireo maherifony. Hatory mandrakizay ireny ka tsy hifoha intsony, hoy ny teny hentitr’ilay Mpanjaka, izay antsoina hoe TOMPOn’izao rehetra izao
  - type: note
    content: Jereo ny and 39 sy nta.
  - type: text
    content: '.» '
  '58':
  - type: text
    content: 'Dia nampian’ny TOMPOn’izao rehetra izao hoe:'
  - type: text
    content: «Rava tanteraka ny manda matevin’i Babilôna,
  - type: text
    content: ary voadoro ny vavahadiny avo;
  - type: text
    content: ka dia sahiram-poana ny vahoaka,
  - type: text
    content: zavatra ho kilan’ny afo
  - type: text
    content: no isasaran’ireo firenena.»
  - type: heading
    content: Hafatra natsipy tao amin’ny ony Eofrata
  '59':
  - type: text
    content: 'I Seraià, zanakalahin’i Nerià sady zafikelin’i Mahaseià, no lehiben’ny tobin’i Tsedekià mpanjakan’i Joda. Koa ny taona fahefatra nanjakan’i Tsedekià dia nanaraka ny mpanjaka tany '
  - type: text
    content: Babilôna
  - type: text
    content: ' izy'
  - type: note
    content: 'Raha ampitahaina amin’ny 32.12 dia azo heverina fa i Seraià dia rahalahin’i Baròka izay sakaiza sady mpitantsoratr’i Jeremià. –ny taona fahefatra: dia ny taona 594 tal J.K, izany hoe dimy taona talohan’ny naharavan’i Babilôna.'
  - type: text
    content: '. Nosoratan’i Jeremià tamin’ny horonan-taratasy ny loza rehetra izay hamely an’i Babilôna, dia ireo fanambarana rehetra momba izany! Dia nanome baiko an’i Seraià i Jeremià hoe: '
  '6':
  - type: text
    content: Mandosira hiala an’i Babilôna
  - type: text
    content: ka samia manavo-tena ianareo,
  - type: text
    content: fandrao hiara-devona aminy
  - type: text
    content: noho ny sazim-pahotàny
  - type: note
    content: Jereo Apôk 18.4.
  - type: text
    content: ;
  - type: text
    content: fa fotoana famalian’ny TOMPO azy izao
  - type: text
    content: ka valiany araka ny sahaza azy izy.
  '61':
  - type: text
    content: '«Rehefa tonga any Babilôna ianao, dia imasoy ny hamaky mafy ireo teny rehetra ireo; '
  '62':
  - type: text
    content: 'avy eo dia milazà hoe: ‹Ny tenanao mihitsy, TOMPO ô, no niteny taminay fa handringana ity tanàna ity ka tsy hisy hitoetra eto intsony na olona na biby fa fahonenana mandrakizay izy.› '
  '63':
  - type: text
    content: 'Rehefa vitanao ny famakiana ny horonan-taratasy, dia afatory amin’ny vato iray izy, ary atsipazo ao amin’ny ony Eofrata; '
  '64':
  - type: text
    content: 'sady ataovy hoe: «Tahaka an’izao no hilentehan’i Babilôna ka tsy hipoirany intsony noho ny loza hataon’ny Tompo mihatra aminy.»'
  - type: text
    content: '«Izany no isasaran’ireo firenena»: mifarana eto ny tenin’i Jeremià'
  - type: note
    content: 'ka tsy hipoirany intsony: ampit Apôk 18.21.'
  - type: text
    content: .
  '7':
  - type: text
    content: I Babilôna dia tsatokaty volamena
  - type: text
    content: teo an-tanan’ny Tompo.
  - type: text
    content: Nahamamo ny tany manontolo izy;
  - type: text
    content: ny divainy efa nisotroan’ny firenena
  - type: text
    content: no nahavery saina ireny
  - type: note
    content: Ampit Apôk 17.2-4; 18.3.
  - type: text
    content: .
  '8':
  - type: text
    content: Kanjo tampoka no nianjeran’i Babilôna
  - type: text
    content: sy nahamontsamontsana azy.
  - type: text
    content: –Manaova hira fisaonana ho azy,
  - type: text
    content: makà balsama hatao amin’ny feriny.
  - type: text
    content: Angamba ho sitrana ihany izy?
  '9':
  - type: text
    content: –Efa nitsabo an’i Babilôna izahay
  - type: text
    content: saingy tsy nety sitrana izy.
  - type: text
    content: Aoka hilaozantsika izy,
  - type: text
    content: ka samia mody any an-tanintsika avy!
  - type: text
    content: Satria goavana ny fanamelohana mihatra aminy
  - type: text
    content: fa mahatakatra ny lanitra sy ny rahona
  - type: note
    content: Ampit Apôk 18.5.
