    marker-yv: yv-n
  - type: text
    text: '. Nosoratan’i Jeremià tamin’ny horonan-taratasy ny loza rehetra izay hamely an’i Babilôna, dia ireo fanambarana rehetra momba izany! Dia nanome baiko an’i Seraià i Jeremià hoe: '
  - type: usfm
