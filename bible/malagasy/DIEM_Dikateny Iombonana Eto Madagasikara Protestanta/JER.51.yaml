    text: 'I Seraià, zanakalahin’i Nerià sady zafikelin’i Mahaseià, no lehiben’ny tobin’i Tsedekià mpanjakan’i Joda. Koa ny taona fahefatra nanjakan’i Tsedekià dia nanaraka ny mpanjaka tany '
