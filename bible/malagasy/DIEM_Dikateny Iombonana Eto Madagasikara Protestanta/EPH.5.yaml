document_id: EPH.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: Koa manafaha an’Andriamanitra ianareo, satria zanaka lalainy
  - type: note
    content: Ampit Lev 19.2; Mt 5.48.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Miezaha mamantatra izay ankasitrahin’ny Tompo. '
  '11':
  - type: text
    content: Aza miombona amin’ny asa tsy mahavoka-tsoa ataon’ireo olona ao anatin’ny haizina
  - type: note
    content: Ampit Rm 13.12.
  - type: text
    content: ', fa aleo aseho ny tena toetr’ireny asa ireny; '
  '12':
  - type: text
    content: '(satria mahamenatra na dia ny hilaza izay ataon-dry zareo ao amin’ny miafina aza). '
  '13':
  - type: text
    content: 'Fa rehefa asehon’ny fahazavana kosa ny tena toetry ny zavatra rehetra, dia hiharihary avokoa; '
  '14':
  - type: text
    content: 'eny, izay rehetra miharihary dia tonga mazava. Izany no ilazana hoe:'
  - type: text
    content: «Mifohaza ianao izay matory,
  - type: text
    content: ary mitsangàna ho velona avy any amin’ny maty,
  - type: text
    content: 'dia hampahazava anao i '
  - type: text
    content: Kristy
  - type: note
    content: 'Mifohaza...i Kristy: tsy fantatra izay loharanon’io rijan-teny io, kanefa mety ho andinin-kira kristianina.'
  - type: text
    content: .»
  '15':
  - type: text
    content: 'Koa tandremo tsara ny fitondrantenanareo. Aza manao toy ny olona tsy misaina, fa aoka ho tahaka izay misaina. '
  '16':
  - type: text
    content: 'Hararaoty ny fotoana azo anaovan-tsoa, fa ratsy izao andro izao. '
  '17':
  - type: text
    content: Aza miadaladala, fa mba fantaro izay sitraky ny Tompo hataonareo.
  '18':
  - type: text
    content: 'Aza mimamo divay ianareo, satria fanaranam-po amin’ny ratsy no vokatr’izany; fa aoka ho feno ny Fanahy Masina. '
  '19':
  - type: text
    content: Manaova salamo sy hira ary antsa asesiky ny Fanahy Masina; antsa sy salamo no kaloy amin’ny fo tokoa ho an’ny Tompo
  - type: note
    content: Ampit Sal 33.1-3.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ny fitiavana no aoka hanenika ny fitondrantenanareo, tahaka ny nitiavan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' antsika sy nanolorany tena tamin’Andriamanitra toy ny fanatitra sy sorona manitra mamerovero ho fanasoavana antsika'
  - type: note
    content: 'Ampit Eks 29.18. –nitiavan’i Kristy antsika: misy stf sasany ahitana hoe nitiavan’i Kristy anareo.'
  - type: text
    content: .
  '20':
  - type: text
    content: Misaora an’Andriamanitra Ray mandrakariva noho ny olona rehetra
  - type: note
    content: 'noho ny olona rehetra: dkt hafa noho ny zavatra rehetra.'
  - type: text
    content: amin’ny anaran’i Jesoa Kristy Tompontsika.
  - type: heading
    content: Ny mpivady
  '21':
  - type: text
    content: Aoka hifanoa ianareo noho ny fanajanareo an’i Kristy.
  '22':
  - type: text
    content: 'Ianareo vehivavy, maneke ny vadinareo toy ny anekenareo ny Tompo; '
  '23':
  - type: text
    content: 'satria ny lahy no filohan’ny vavy, toy ny maha filohan’ny Fiangonana an’i '
  - type: text
    content: Kristy
  - type: text
    content: '; fa i Kristy mihitsy no Mpamonjy ny Fiangonana izay tenany. '
  '24':
  - type: text
    content: Koa tahaka ny aneken’ny Fiangonana an’i Kristy no tokony haneken’ny vavy ny lahy amin’ny zavatra rehetra.
  '25':
  - type: text
    content: 'Ianareo lehilahy, tiavo ny vadinareo, toy ny nitiavan’i Kristy ny Fiangonana sy ny nanolorany tena hamonjy azy. '
  '26':
  - type: text
    content: Nataony izany mba hahamasina ny Fiangonana, rehefa avy nodioviny tamin’ny rano fampandroana
  - type: note
    content: 'tamin’ny rano fampandroana: mety hisy fiheverana ny batisa (ampit Tit 3.5) amin’izany.'
  - type: text
    content: ' ombàn-teny; '
  '27':
  - type: text
    content: 'fa tiany hamirapiratra ny Fiangonana hatolony ho Azy Kristy, ka tsy hisy pentimpentina na ketrona na zavatra toy izany, fa mba ho '
  - type: text
    content: masina
  - type: text
    content: ' sady tsy hisy tsiny. '
  '28':
  - type: text
    content: 'Dia toraka izany koa, tokony ho tahaka ny itiavan’ny lehilahy ny tenany no hitiavany ny vadiny; izay lehilahy tia ny vadiny, dia tia ny tenany. '
  '29':
  - type: text
    content: 'Tsy misy tokoa olona mankahala ny tenany fa dia mamelona sy mikarakara azy, tahaka ny ataon’i Kristy amin’ny Fiangonana: '
  '3':
  - type: text
    content: 'Araka ny sahaza ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', dia aoka tsy ho voatonona eo aminareo akory aza rehefa fijangajangana sy fahalotoana isan-karazany ary fitiavan-karena. '
  '30':
  - type: text
    content: 'fantatsika izany, satria anisan’ny tenan’i Kristy isika. '
  '31':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Noho izany, dia handao ny ray aman-dreniny ny lehilahy ka hikambana amin’ny vadiny ary dia ho tena iray ihany izy roroa'
  - type: note
    content: Gen 2.24.
  - type: text
    content: '.» '
  '32':
  - type: text
    content: 'Mavesa-danja ny tsiambaratelo fonosin’io andinin-tSoratra Masina io, ary dia lazaiko fa miantefa amin’i Kristy sy ny Fiangonana izany. '
  '33':
  - type: text
    content: 'Kanefa miantefa aminareo mivady rehetra koa izany: ka aoka samy ho tahaka ny itiavan’ny lehilahy ny tenany no hitiavany ny vadiny, ary aoka ny vehivavy hanaja ny vadiny.'
  '4':
  - type: text
    content: 'Fadio ny teny vetaveta sy resaka valavala na voso-dratsy izay samy tsy tokony hatao; fa aleo manao tonombavaka fisaorana an’Andriamanitra. '
  '5':
  - type: text
    content: 'Fantaro tsara izao: tsy hanana anjara lova amin’ny Fanjakan’i Kristy sy Andriamanitra na ny mpijangajanga na ny maloto fitondrantena na ny mpitia harena (fa mpanompo sampy ny mpitia harena).'
  - type: heading
    content: Miaina tahaka ny olona ao amin’ny fahazavana
  '6':
  - type: text
    content: 'Aza mety hofitahina amin’izay teny foana ianareo; fa ny zavatra toy izany indrindra no mahatonga ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' hihatra amin’ireo olona tsy manaiky Azy. '
  '7':
  - type: text
    content: 'Koa aza mety ho mpiombona amin’ireny olona ireny ianareo. '
  '8':
  - type: text
    content: Tao amin’ny haizina ianareo fahiny, fa ao amin’ny fahazavana kosa ankehitriny
  - type: note
    content: Ampit Is 60.1-3.
  - type: text
    content: ', noho ianareo tafaray amin’ny Tompo. Koa manaova fitondrantena tahaka ny olona ao amin’ny fahazavana, '
  '9':
  - type: text
    content: satria ny fahazavana
  - type: note
    content: 'ny fahazavana: misy stf sasany ahitana hoe ny Fanahy Masina (ampit Gal 5.22).'
  - type: text
    content: ' dia mamokatra ny soa sy ny rariny ary ny hitsiny isan-karazany. '
