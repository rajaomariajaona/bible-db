document_id: EPH.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Koa manafaha an’Andriamanitra ianareo, satria zanaka lalainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Lev 19.2; Mt 5.48.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny fitiavana no aoka hanenika ny fitondrantenanareo, tahaka ny nitiavan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' antsika sy nanolorany tena tamin’Andriamanitra toy ny fanatitra sy sorona manitra mamerovero ho fanasoavana antsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Eks 29.18. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitiavan’i Kristy antsika:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nitiavan’i Kristy anareo.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Araka ny sahaza ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ', dia aoka tsy ho voatonona eo aminareo akory aza rehefa fijangajangana sy fahalotoana isan-karazany ary fitiavan-karena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fadio ny teny vetaveta sy resaka valavala na voso-dratsy izay samy tsy tokony hatao; fa aleo manao tonombavaka fisaorana an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fantaro tsara izao: tsy hanana anjara lova amin’ny Fanjakan’i Kristy sy Andriamanitra na ny mpijangajanga na ny maloto fitondrantena na ny mpitia harena (fa mpanompo sampy ny mpitia harena).'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miaina tahaka ny olona ao amin’ny fahazavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza mety hofitahina amin’izay teny foana ianareo; fa ny zavatra toy izany indrindra no mahatonga ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' hihatra amin’ireo olona tsy manaiky Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa aza mety ho mpiombona amin’ireny olona ireny ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tao amin’ny haizina ianareo fahiny, fa ao amin’ny fahazavana kosa ankehitriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 60.1-3.
    marker-yv: yv-n
  - type: text
    text: ', noho ianareo tafaray amin’ny Tompo. Koa manaova fitondrantena tahaka ny olona ao amin’ny fahazavana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: satria ny fahazavana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fahazavana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Fanahy Masina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ampit Gal 5.22).'
    marker-yv: yv-n
  - type: text
    text: ' dia mamokatra ny soa sy ny rariny ary ny hitsiny isan-karazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Miezaha mamantatra izay ankasitrahin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza miombona amin’ny asa tsy mahavoka-tsoa ataon’ireo olona ao anatin’ny haizina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 13.12.
    marker-yv: yv-n
  - type: text
    text: ', fa aleo aseho ny tena toetr’ireny asa ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '(satria mahamenatra na dia ny hilaza izay ataon-dry zareo ao amin’ny miafina aza). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa rehefa asehon’ny fahazavana kosa ny tena toetry ny zavatra rehetra, dia hiharihary avokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'eny, izay rehetra miharihary dia tonga mazava. Izany no ilazana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mifohaza ianao izay matory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mitsangàna ho velona avy any amin’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dia hampahazava anao i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Mifohaza...i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy fantatra izay loharanon’io rijan-teny io, kanefa mety ho andinin-kira kristianina.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa tandremo tsara ny fitondrantenanareo. Aza manao toy ny olona tsy misaina, fa aoka ho tahaka izay misaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hararaoty ny fotoana azo anaovan-tsoa, fa ratsy izao andro izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza miadaladala, fa mba fantaro izay sitraky ny Tompo hataonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza mimamo divay ianareo, satria fanaranam-po amin’ny ratsy no vokatr’izany; fa aoka ho feno ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manaova salamo sy hira ary antsa asesiky ny Fanahy Masina; antsa sy salamo no kaloy amin’ny fo tokoa ho an’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 33.1-3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Misaora an’Andriamanitra Ray mandrakariva noho ny olona rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'noho ny olona rehetra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noho ny zavatra rehetra.
    marker-yv: yv-n
  - type: text
    text: amin’ny anaran’i Jesoa Kristy Tompontsika.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpivady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aoka hifanoa ianareo noho ny fanajanareo an’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ianareo vehivavy, maneke ny vadinareo toy ny anekenareo ny Tompo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'satria ny lahy no filohan’ny vavy, toy ny maha filohan’ny Fiangonana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '; fa i Kristy mihitsy no Mpamonjy ny Fiangonana izay tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa tahaka ny aneken’ny Fiangonana an’i Kristy no tokony haneken’ny vavy ny lahy amin’ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ianareo lehilahy, tiavo ny vadinareo, toy ny nitiavan’i Kristy ny Fiangonana sy ny nanolorany tena hamonjy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nataony izany mba hahamasina ny Fiangonana, rehefa avy nodioviny tamin’ny rano fampandroana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’ny rano fampandroana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety hisy fiheverana ny batisa (ampit Tit 3.5) amin’izany.
    marker-yv: yv-n
  - type: text
    text: ' ombàn-teny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa tiany hamirapiratra ny Fiangonana hatolony ho Azy Kristy, ka tsy hisy pentimpentina na ketrona na zavatra toy izany, fa mba ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: masina
  - type: text
    text: ' sady tsy hisy tsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia toraka izany koa, tokony ho tahaka ny itiavan’ny lehilahy ny tenany no hitiavany ny vadiny; izay lehilahy tia ny vadiny, dia tia ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy misy tokoa olona mankahala ny tenany fa dia mamelona sy mikarakara azy, tahaka ny ataon’i Kristy amin’ny Fiangonana: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fantatsika izany, satria anisan’ny tenan’i Kristy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Noho izany, dia handao ny ray aman-dreniny ny lehilahy ka hikambana amin’ny vadiny ary dia ho tena iray ihany izy roroa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2.24.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mavesa-danja ny tsiambaratelo fonosin’io andinin-tSoratra Masina io, ary dia lazaiko fa miantefa amin’i Kristy sy ny Fiangonana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Kanefa miantefa aminareo mivady rehetra koa izany: ka aoka samy ho tahaka ny itiavan’ny lehilahy ny tenany no hitiavany ny vadiny, ary aoka ny vehivavy hanaja ny vadiny.'
