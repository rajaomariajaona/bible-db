verses:
  '1':
  - type: heading
    content: 'Ny fahitana fahadimy: ilay toera-masina voarodana'
  - type: text
    content: 'Hitako ny Tompo, nitsangana teo ambonin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' sady niteny hoe:'
  - type: text
    content: «Asio ny lohan’ireo andry amin’ity tempoly ity
  - type: text
    content: dia hihozongozona ny fiorenany.
  - type: text
    content: Hotorotoroiko avokoa ireo lohandohany
  - type: text
    content: amin’izay rehetra eto
  - type: note
    content: Araka ny stf anankiray momba ny dkt tranainy grika izany, fa tsy mazava ny RM.
  - type: text
    content: ary izay sisa tavela dia haringako amin’ny ady;
  - type: text
    content: tsy hisy ho afa-mandositra
  - type: text
    content: ary tsy hisy ho afa-mitsoaka.
  '10':
  - type: text
    content: Ho faty an’ady ny mpanota rehetra amin’ny vahoakako,
  - type: text
    content: 'dia ireo nilaza hoe:'
  - type: text
    content: ‹Ny loza tsy hananontanona anay
  - type: text
    content: sady tsy hahatratra anay!› »
  - type: heading
    content: Fanarenana an’i Israely amin’ny ho avy
  '11':
  - type: text
    content: 'Hoy ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «Ilay tanànan’i Davida
  - type: note
    content: 'Ilay tanànan’i Davida: misy mihevitra hoe Ilay fianakavian’i Davida ka mampitodika any amin’ny 2 Sam 7.16. –Ny and 11-12 dia tanisaina ao amin’ny Asa 15.16-18 araka ny dkt tranainy grika.'
  - type: text
    content: ' izao'
  - type: text
    content: dia toy ny tranobongo efa nianjera.
  - type: text
    content: Fa ho avy ny andro izay hananganako indray
  - type: text
    content: izany tanàna izany,
  - type: text
    content: ka hofefeko ireo banga amin’ny màndany
  - type: text
    content: hatsangako ny rava tao aminy,
  - type: text
    content: ary haoriko indray ny tanàna ho tahaka ny taloha.
  '12':
  - type: text
    content: Amin’izay no hakan’i Israely
  - type: text
    content: ny tany sisa amin’i Edôma
  - type: text
    content: sy amin’ny firenena hafa rehetra
  - type: text
    content: izay nomarihina ny anarako hananako azy.
  - type: text
    content: Izaho Tompo no hahatanteraka izany.»
  '13':
  - type: text
    content: 'Hoy koa ny teny hentitry ny TOMPO hoe:'
  - type: text
    content: «Indro avy ny andro
  - type: text
    content: izay hahavokatra ny vary
  - type: text
    content: ka efa hasaina ny tany vao vita ny fijinjana,
  - type: text
    content: sy hahavokatra ny voaloboka
  - type: text
    content: ka efa hafafy ny voambary
  - type: text
    content: vao vita ny fihosemboaloboka
  - type: note
    content: Ny fiasana tanimbary any Palestinina, raha ny tokony ho izy, dia eo amin’ny faramparan’ny ôktôbra eo, izany hoe enim-bolana aorian’ny fijinjana. Ny fikarakarana ny divay kosa dia vantany vao vita ny fiotazam-boaloboka, izany hoe amin’ny septambra; ary ny famafazana kosa dia eo amin’ny nôvambra na desambra eo ho eo. Ka ny fifanatonan’ireo asa fanaon’ny tantsaha ireo dia isan’ny sarin’ny fahavokarana mahagaga hanamarika ilay fotoanandro vaovao ambaran’i Hamôsa mpaminany.
  - type: text
    content: .
  - type: text
    content: Divay no hiboiboika eny an-tendrombohitra
  - type: text
    content: sy hikoriana eny an-tampon-kavoana rehetra.
  '14':
  - type: text
    content: Haveriko avy amin’ny fahababoana
  - type: text
    content: ny Israely vahoakako,
  - type: text
    content: ka ireo tanàna efa rava
  - type: text
    content: hatsangany sy honenany indray.
  - type: text
    content: Hamboly voaloboka izy
  - type: text
    content: ka hisotro ny divay avy aminy,
  - type: text
    content: ary hanao zaridaina
  - type: text
    content: ka hihinana ny vokatra avy aminy.
  '15':
  - type: text
    content: Hamboleko eo amin’ny tany izany nomeko azy izy,
  - type: text
    content: ka tsy hongotana hiala eo intsony.
  - type: text
    content: Izaho TOMPO Andriamanitrao no efa niteny.»
  '2':
  - type: text
    content: Na hibosesika any amin’ny toeran’ny maty aza ireo,
  - type: text
    content: dia hotsoahan’ny tanako avy any;
  - type: text
    content: na hiakatra ho any an-
  - type: text
    content: danitra
  - type: text
    content: ' aza ireo,'
  - type: text
    content: dia hampidiniko avy any;
  '3':
  - type: text
    content: na hiery any an-tampon’i Karmela aza ireo,
  - type: text
    content: dia hokarohiko sy halaiko any;
  - type: text
    content: na mihevitra hiafina tsy ho hitan’ny masoko
  - type: text
    content: any amin’ny fanambanin’ny ranomasina aza ireo,
  - type: text
    content: dia homeko didy ny trozonabe hanaikitra azy any;
  '4':
  - type: text
    content: na ho lasan-ko babo eo anatrehan’ny fahavalony aza ireo,
  - type: text
    content: dia homeko baiko ny sabatra handringana azy any.
  - type: text
    content: Tapa-kevitra Aho tsy hahatonga soa ho azy
  - type: text
    content: fa hahatonga loza.»
  - type: heading
    content: Ny Tompo no mifehy ny tany aman-danitra
  '5':
  - type: text
    content: Ny Tompo ANDRIAMANITR’izao rehetra izao,
  - type: text
    content: vao manendry ny tany, dia mampihovotrovotra azy;
  - type: text
    content: misondrotra sy mietry ny tany manontolo
  - type: text
    content: tahaka an’i Neily, onin’i Ejipta
  - type: note
    content: Jereo 8.8 sy nta.
  - type: text
    content: ;
  - type: text
    content: ary misaona ny maty ireo mponina rehetra ao aminy.
  '6':
  - type: text
    content: Nanorina ny lapany any an-danitra Andriamanitra,
  - type: text
    content: ka ny tany no iorenan’ny andohalambon’ny lanitra;
  - type: text
    content: miantso ny rano eny an-dranomasina Izy
  - type: text
    content: ka mampilatsaka azy etỳ ambonin’ny tany.
  - type: text
    content: Ny TOMPO no anarany.
  - type: heading
    content: Famaizana an’i Israely
  '7':
  - type: text
    content: 'Izao no teny hentitry ny TOMPO:'
  - type: text
    content: «Amiko ve ianareo, ry taranak’i Israely,
  - type: text
    content: tsy tahaka ny taranaka etiôpianina ihany?
  - type: text
    content: Moa tsy nampiakariko avy tany Ejipta ve ianareo,
  - type: text
    content: tahaka ny nampiakarako ny Filistinina avy tany Kaftôra
  - type: text
    content: sy nampiakarako ny Sirianina avy tany Kira
  - type: note
    content: 'Kaftôra: angamba i Kreta izany. –Kira: jereo 1.5 sy nta.'
  - type: text
    content: ?»
  '8':
  - type: text
    content: Indro ny Tompo ANDRIANANAHARY mampifantoka ny masony
  - type: text
    content: amin’ity fitondram-panjakana mpanota ity
  - type: text
    content: 'sady manao teny hentitra hoe:'
  - type: text
    content: «Hamongotra azy tsy ho eto ambonin’ny tany intsony Aho,
  - type: text
    content: Kanefa tsy hamongotra manontolo ny taranak’i Jakôba.
  '9':
  - type: text
    content: Indro Aho hamoaka baiko
  - type: text
    content: mba hisivanana ny taranak’i Israely
  - type: text
    content: mba hosivanina any anivon’ny firenena rehetra
  - type: text
    content: tahaka ny anasivanam-bary amin’ny sivana
  - type: text
    content: ka tsy hisy vato latsaka amin’ny tany
  - type: note
    content: Rehefa afaka mololo ny varim-bazaha (jereo Jer 4.11 sy nta), dia sarahina amin’ny vato ihany koa; ka ampiasaina amin’izany ny sivana izay tsy mamela ho latsaka afa-tsy ny vary ihany.
  - type: text
    content: .
