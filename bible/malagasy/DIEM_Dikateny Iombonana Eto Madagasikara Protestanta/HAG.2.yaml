document_id: HAG.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famiratry ny tempoly vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny volana fahafito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe tokony ho tamin’ny tapaky ny volana oktôbra 520 tal. J.K.
    marker-yv: yv-n
  - type: text
    text: ', andro faha-21 dia nisy tenin’ny TOMPO tamin’ny alalan’i Hagay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hafatra ho an’ny governoran’i Joda, dia i Zerobabela zanakalahin’i Sealtiela sy ho an’i Josoa mpisorombe zanakalahin’i Jôtsadaky ary ho an’izay rehetra tafaverina avy any an-tsesitany no nasain’ny Tompo nambarany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Iza aminareo sisa ireo no mahatsiaro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' tamin’ny famirapirany taloha? Fa manao ahoana kosa ny fahitànareo azy ankehitriny? Moa tsy zava-poana sisa hitanareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa izao no teny hentitra avy amiko TOMPO: Mahereza, ry Zerobabela! Mahereza, ry Josoa mpisorombe zanakalahin’i Jôtsadaky. Mahereza, ianareo rehetra sarambabem-bahoakan’ity tany ity; teny hentitra avy amiko TOMPO izany. Miasà fa Izaho no miaraka aminareo, hoy ny teny hentitra avy amiko TOMPOn’izao rehetra izao, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'araka ny fanekempihavanana nataoko taminareo fony ianareo niala tany Ejipta. Ary hitoetra eo anivonareo ny Fanahiko; koa aza matahotra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, Izaho TOMPOn’izao rehetra izao dia manambara fa raha afaka kelikely dia hohozongozoniko ny lanitra sy ny tany ary ny ranomasina sy ny tanety
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity and ity dia voalaza ao amin’ny Heb 12.26-27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hakorontako ambony ambany ny firenen-drehetra. Hoentina eto, ny hareny rehetra ary dia hofenoiko famirapiratana indray ity trano ity, hoy Izaho TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ahy avokoa manko ny volamena sy volafotsy eran’izao tontolo izao; izany no teny hentitra avy amiko TOMPOn’izao rehetra izao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny famirapiratan’ity trano ity dia ho lehibe mihoatra noho ny tany aloha; ary eto amin’ity toerana ity, hoy AHO, no hanomezako anareo fiadanana. Izany no fampanantenana avy amiko TOMPOn’izao rehetra izao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vahoaka miaina amin’ny fahalotoana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tamin’ny taona faharoa nanjakan’i Dariôsa, volana fahasivy, andro faha-24
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tokony ho tamin’ny tapaky ny volana desambra 520 tal. J.k.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy tenin’ny TOMPO indray tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' Hagay. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fanontaniana hangatahana valin-teny mahatapaka amin’ny mpisorona izany, ka hoy i Hagay tamin’ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anjaran’ny mpisorona ny mamaly mivantana ireo fanontaniana sarotra avy amin’ny fampiharana ny lalànan’i Mosesy, jereo Lev 10.10-11.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny Tompon’izao rehetra izao: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka hatao hoe misy olona mitondra hena voahasina tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ao anaty sisin-dambany; raha voakasiky ny lambany ny mofo na ny zavatra nahandroina, na koa ny divay na ny menaka na izay rehetra mety ho sakafo fihinana, moa ho tonga masina koa va ireo?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny mpisorona tamin’i Hagay:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, tsy ho tonga masina ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mbola nanontany azy ireo koa i Hagay hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka indray hatao hoe misy olona maloto satria nikasi-paty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahalotoana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay ampitain’ny faty dia jereo Lev 22.4.'
    marker-yv: yv-n
  - type: text
    text: ' izy; raha mahakasika sakafo izy avy eo, moa ho tonga maloto koa ve izany?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novalian’ny mpisorona hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny, ho tonga maloto izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy kosa i Hagay hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Teny hentitra avy amin’ny TOMPO àry fa ho tahaka izany ny vahoakan’ity firenena ity sy ny asa rehetra vitany; ka izay atorony eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' avokoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Avy amin’izany sary nindramina tamin’ny lalàm-pivavahan’i Israely izany no anazavan’ny mpaminany fa Andriamanitra dia tsy mankasitraka ny sorona izay aterina aminy raha toa ka tsy raharahain’ny vahoaka ny fananganana indray ny tempoly.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Tompo mampanantena ny fitahiany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy koa ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Hevero tsara izay zavatra hiseho aminareo manomboka anio. Talohan’ny nanangonanareo vato hananganana indray ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoliko
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: inona no nitranga taminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'inona no nitranga taminareo?: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt grika tranainy izany; tsy mazava ny hevitry ny RM.
    marker-yv: yv-n
  - type: text
    text: '? Raha misy olona nandeha naka vary tao amin’ny sompitra nampoiziny hahazoana roa arivo kilao, dia tsy nahita afa-tsy arivo kilao ihany izy; ary raha nisy olona nandeha nanovo divay tao amin’ny barîka nampoiziny hahazoana dimampolo litatra dia tsy nahita afa-tsy roapolo litatra ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nolevoniko ny vokatry ny asa rehetra vitanareo: rivo-mahery sy aretina ary havandra no nalefako hamely izay rehetra nambolenareo, nefa tsy nety niverina tamiko ianareo; Izaho Tompo no manao izany teny hentitra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hevero tsara izay zavatra hiseho aminareo manomboka anio. Anio no andro faha-24 amin’ny volana fahasivy, dia ny andro nametrahana ny fototry ny tempoliko. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa tsy efa ritra ny vary tao an-tsompitra? Na dia ny voaloboka sy ny aviavy ary ny ampongabendanitra sy ny ôliva aza tsy nahavokatra. Kanefa manomboka izao anio izao kosa no hitahiako anareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampanantenana nataon’ny Tompo tamin’i Zerobabela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’io andro io ihany, andro faha-24 amin’y volana fahasivy, dia mbola nisy tenin’ny TOMPO fanindroany tamin’i Hagay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hafatra ho an’i Zerobabela governoran’i Joda izany, ka hoy i Hagay taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no teny hentitra ataon’ny TOMPOn’izao rehetra izao: «Hohozongozoniko ny lanitra sy ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Haongako ireo mpanjaka ary hofoanako ny herin’ny fanjakam-pirenena; hahohoko ny kalesiny sy ny mpamily azy; samy ho lavon’ny sabatra ka ho faty ireo soavaly ary hifamono koa ny mpitaingina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa amin’izany andro izany, dia hotolorako andraikitra ianao, ry Zerobabela mpanompoko sady zanakalahin’i Sealtiela. Hataoko sarobidy toy ny peratra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' ianao, fa efa voafidiko hisolotena Ahy. Izany no fampanantenana hentitra avy amiko TOMPOn’izao rehetra izao.»'
