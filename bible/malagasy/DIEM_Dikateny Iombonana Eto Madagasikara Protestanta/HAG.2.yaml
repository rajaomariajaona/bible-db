document_id: HAG.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famiratry ny tempoly vaovao
  - type: text
    content: Tamin’ny volana fahafito
  - type: note
    content: Izany hoe tokony ho tamin’ny tapaky ny volana oktôbra 520 tal. J.K.
  - type: text
    content: ', andro faha-21 dia nisy tenin’ny TOMPO tamin’ny alalan’i Hagay '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tamin’ny taona faharoa nanjakan’i Dariôsa, volana fahasivy, andro faha-24
  - type: note
    content: Tokony ho tamin’ny tapaky ny volana desambra 520 tal. J.k.
  - type: text
    content: ', dia nisy tenin’ny TOMPO indray tamin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' Hagay. '
  '11':
  - type: text
    content: Fanontaniana hangatahana valin-teny mahatapaka amin’ny mpisorona izany, ka hoy i Hagay tamin’ireo
  - type: note
    content: Anjaran’ny mpisorona ny mamaly mivantana ireo fanontaniana sarotra avy amin’ny fampiharana ny lalànan’i Mosesy, jereo Lev 10.10-11.
  - type: text
    content: ':'
  - type: text
    content: '–Izao no lazain’ny Tompon’izao rehetra izao: '
  '12':
  - type: text
    content: 'Aoka hatao hoe misy olona mitondra hena voahasina tamin’ny '
  - type: text
    content: sorona
  - type: text
    content: ' ao anaty sisin-dambany; raha voakasiky ny lambany ny mofo na ny zavatra nahandroina, na koa ny divay na ny menaka na izay rehetra mety ho sakafo fihinana, moa ho tonga masina koa va ireo?'
  - type: text
    content: 'Dia hoy ny mpisorona tamin’i Hagay:'
  - type: text
    content: –Tsia, tsy ho tonga masina ireo.
  '13':
  - type: text
    content: 'Mbola nanontany azy ireo koa i Hagay hoe:'
  - type: text
    content: –Aoka indray hatao hoe misy olona maloto satria nikasi-paty
  - type: note
    content: Ny amin’ny hoe fahalotoana izay ampitain’ny faty dia jereo Lev 22.4.
  - type: text
    content: ' izy; raha mahakasika sakafo izy avy eo, moa ho tonga maloto koa ve izany?'
  - type: text
    content: 'Dia novalian’ny mpisorona hoe:'
  - type: text
    content: –Eny, ho tonga maloto izany.
  '14':
  - type: text
    content: 'Dia hoy kosa i Hagay hoe:'
  - type: text
    content: '–Teny hentitra avy amin’ny TOMPO àry fa ho tahaka izany ny vahoakan’ity firenena ity sy ny asa rehetra vitany; ka izay atorony eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' dia '
  - type: text
    content: maloto
  - type: text
    content: ' avokoa'
  - type: note
    content: Avy amin’izany sary nindramina tamin’ny lalàm-pivavahan’i Israely izany no anazavan’ny mpaminany fa Andriamanitra dia tsy mankasitraka ny sorona izay aterina aminy raha toa ka tsy raharahain’ny vahoaka ny fananganana indray ny tempoly.
  - type: text
    content: .
  - type: heading
    content: Ny Tompo mampanantena ny fitahiany
  '15':
  - type: text
    content: 'Hoy koa ny TOMPO hoe:'
  - type: text
    content: '–Hevero tsara izay zavatra hiseho aminareo manomboka anio. Talohan’ny nanangonanareo vato hananganana indray ny '
  - type: text
    content: tempoliko
  - type: text
    content: ', '
  '16':
  - type: text
    content: inona no nitranga taminareo
  - type: note
    content: 'inona no nitranga taminareo?: araka ny dkt grika tranainy izany; tsy mazava ny hevitry ny RM.'
  - type: text
    content: '? Raha misy olona nandeha naka vary tao amin’ny sompitra nampoiziny hahazoana roa arivo kilao, dia tsy nahita afa-tsy arivo kilao ihany izy; ary raha nisy olona nandeha nanovo divay tao amin’ny barîka nampoiziny hahazoana dimampolo litatra dia tsy nahita afa-tsy roapolo litatra ihany izy. '
  '17':
  - type: text
    content: 'Nolevoniko ny vokatry ny asa rehetra vitanareo: rivo-mahery sy aretina ary havandra no nalefako hamely izay rehetra nambolenareo, nefa tsy nety niverina tamiko ianareo; Izaho Tompo no manao izany teny hentitra izany. '
  '18':
  - type: text
    content: 'Hevero tsara izay zavatra hiseho aminareo manomboka anio. Anio no andro faha-24 amin’ny volana fahasivy, dia ny andro nametrahana ny fototry ny tempoliko. '
  '19':
  - type: text
    content: Moa tsy efa ritra ny vary tao an-tsompitra? Na dia ny voaloboka sy ny aviavy ary ny ampongabendanitra sy ny ôliva aza tsy nahavokatra. Kanefa manomboka izao anio izao kosa no hitahiako anareo.
  - type: heading
    content: Fampanantenana nataon’ny Tompo tamin’i Zerobabela
  '2':
  - type: text
    content: 'Hafatra ho an’ny governoran’i Joda, dia i Zerobabela zanakalahin’i Sealtiela sy ho an’i Josoa mpisorombe zanakalahin’i Jôtsadaky ary ho an’izay rehetra tafaverina avy any an-tsesitany no nasain’ny Tompo nambarany hoe: '
  '20':
  - type: text
    content: 'Tamin’io andro io ihany, andro faha-24 amin’y volana fahasivy, dia mbola nisy tenin’ny TOMPO fanindroany tamin’i Hagay. '
  '21':
  - type: text
    content: 'Hafatra ho an’i Zerobabela governoran’i Joda izany, ka hoy i Hagay taminy:'
  - type: text
    content: '–Izao no teny hentitra ataon’ny TOMPOn’izao rehetra izao: «Hohozongozoniko ny lanitra sy ny tany. '
  '22':
  - type: text
    content: 'Haongako ireo mpanjaka ary hofoanako ny herin’ny fanjakam-pirenena; hahohoko ny kalesiny sy ny mpamily azy; samy ho lavon’ny sabatra ka ho faty ireo soavaly ary hifamono koa ny mpitaingina azy. '
  '23':
  - type: text
    content: 'Kanefa amin’izany andro izany, dia hotolorako andraikitra ianao, ry Zerobabela mpanompoko sady zanakalahin’i Sealtiela. Hataoko sarobidy toy ny peratra '
  - type: text
    content: tombokase
  - type: text
    content: ' ianao, fa efa voafidiko hisolotena Ahy. Izany no fampanantenana hentitra avy amiko TOMPOn’izao rehetra izao.»'
  '3':
  - type: text
    content: 'Iza aminareo sisa ireo no mahatsiaro ny '
  - type: text
    content: tempoly
  - type: text
    content: ' tamin’ny famirapirany taloha? Fa manao ahoana kosa ny fahitànareo azy ankehitriny? Moa tsy zava-poana sisa hitanareo? '
  '4':
  - type: text
    content: 'Koa izao no teny hentitra avy amiko TOMPO: Mahereza, ry Zerobabela! Mahereza, ry Josoa mpisorombe zanakalahin’i Jôtsadaky. Mahereza, ianareo rehetra sarambabem-bahoakan’ity tany ity; teny hentitra avy amiko TOMPO izany. Miasà fa Izaho no miaraka aminareo, hoy ny teny hentitra avy amiko TOMPOn’izao rehetra izao, '
  '5':
  - type: text
    content: 'araka ny fanekempihavanana nataoko taminareo fony ianareo niala tany Ejipta. Ary hitoetra eo anivonareo ny Fanahiko; koa aza matahotra ianareo. '
  '6':
  - type: text
    content: Eny, Izaho TOMPOn’izao rehetra izao dia manambara fa raha afaka kelikely dia hohozongozoniko ny lanitra sy ny tany ary ny ranomasina sy ny tanety
  - type: note
    content: Ity and ity dia voalaza ao amin’ny Heb 12.26-27.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Hakorontako ambony ambany ny firenen-drehetra. Hoentina eto, ny hareny rehetra ary dia hofenoiko famirapiratana indray ity trano ity, hoy Izaho TOMPOn’izao rehetra izao. '
  '8':
  - type: text
    content: 'Ahy avokoa manko ny volamena sy volafotsy eran’izao tontolo izao; izany no teny hentitra avy amiko TOMPOn’izao rehetra izao. '
  '9':
  - type: text
    content: Ny famirapiratan’ity trano ity dia ho lehibe mihoatra noho ny tany aloha; ary eto amin’ity toerana ity, hoy AHO, no hanomezako anareo fiadanana. Izany no fampanantenana avy amiko TOMPOn’izao rehetra izao.
  - type: heading
    content: Ny vahoaka miaina amin’ny fahalotoana
