document_id: PRO.12,396
type_code: plt
verses:
  '1':
  - type: text
    content: Izay tia fananarana tia fahalalana;
  - type: text
    content: fa adaladala izay mankahala tsikera.
  '10':
  - type: text
    content: Ny olo-marina mahalala mitsimbina ny bibiny;
  - type: text
    content: fa ny olon-dratsy kosa masiaka hatramin’ny atiny.
  '11':
  - type: text
    content: Izay miasa ny taniny ho voky hanina,
  - type: text
    content: fa izay manao hevi-dravina kosa tsy ampy saina.
  '12':
  - type: text
    content: Ny olon-dratsy maniry tombontsoa tsy ara-drariny;
  - type: text
    content: fa ny olo-marina kosa mamaka sady mamokatra.
  '13':
  - type: text
    content: Ny olon-dratsy voafandriky ny laingany ihany;
  - type: text
    content: fa ny olo-marina kosa afa-miala amin’ny fahoriana.
  '14':
  - type: text
    content: Ny tenin’ny olona no ahazoany fahombiazana
  - type: text
    content: sy andraisany ny vokatr’izay asan’ny tanany.
  '15':
  - type: text
    content: Ny adala dia mihevitra ho mahitsy toetra;
  - type: text
    content: fa hendry kosa ny olona izay mandray torohevitra.
  '16':
  - type: text
    content: Ny adala maneho hatezerana eo no ho eo,
  - type: text
    content: fa ny hendry alaim-baràka kosa mahatsindry fo.
  '17':
  - type: text
    content: Izay milaza ny marina no manambara ny rariny;
  - type: text
    content: fa fitaka kosa no ambaran’ny vavolombelona mandainga.
  '18':
  - type: text
    content: Izay mitsaontsaona dia mety handratra toy ny sabatra;
  - type: text
    content: fa ny tenin’ny hendry kosa dia fanasitranana.
  '19':
  - type: text
    content: Ny teny marina dia mitombina hatrany;
  - type: text
    content: fa ny lainga kosa dia indray mipi-maso ihany.
  '2':
  - type: text
    content: Ny tsara fanahy dia mahazo sitraka avy amin’ny TOMPO,
  - type: text
    content: fa izay manana sain-dratsy kosa helohiny.
  '20':
  - type: text
    content: Fitaka no ao am-pon’izay miteti-dratsy;
  - type: text
    content: fa fifaliana kosa ho an’izay misaina fihavanana.
  '21':
  - type: text
    content: Tsy misy ratsy manjo ny olo-marina;
  - type: text
    content: fa ny olon-dratsy kosa heniky ny loza.
  '22':
  - type: text
    content: Mankahala ny mpandainga ny TOMPO,
  - type: text
    content: fa mankasitraka kosa ny olona mahatoky.
  '23':
  - type: text
    content: Ny olona malina tsy mampideradera ny fahalalàny;
  - type: text
    content: fa ny fon’ireo adala kosa mamoaka hafokana.
  '24':
  - type: text
    content: Ny olona mazoto miasa no homena fitondrana;
  - type: text
    content: fa ny olona kamo kosa dia hampanaovina asa an-terivozona.
  '25':
  - type: text
    content: Ny ahiahy mandreraka ny fon’ny olona;
  - type: text
    content: fa ny teny soa kosa mahafaly azy.
  '26':
  - type: text
    content: Ny olo-marina dia mpitari-dalana ny namany
  - type: text
    content: fa ny toetran’ny olon-dratsy kosa mamery azy.
  '27':
  - type: text
    content: Ny mpihaza kamo tsy mba manana haza hatono;
  - type: text
    content: fa soa sarobidy kosa ny olona mazoto miasa.
  '28':
  - type: text
    content: Ny lalan’ny fahamarinana no misy ny fiainana;
  - type: text
    content: fa ny lalam-paharatsiana kosa mankany amin’ny fahafatesana
  - type: note
    content: Jereo 10.11 sy nta. –Araka ny dkt tranainy grika izany andalana izany; tsy dia mazava ny hevitry ny RM.
  - type: text
    content: .
  '3':
  - type: text
    content: Tsy haratsiam-panahy no maha tafaorina ny olona;
  - type: text
    content: fa ny marina kosa mamaka tsy misy mahozongozona.
  '4':
  - type: text
    content: Satroboninahitry ny vadiny ny vehivavy tsara fanahy,
  - type: text
    content: fa homamiadana mikiky azy kosa ny vehivavy tsy mendrika.
  '5':
  - type: text
    content: Ny olo-marina mihevitra ny rariny;
  - type: text
    content: fa ny olon-dratsy kosa misaina fitaka.
  '6':
  - type: text
    content: Ny tenin’ny olon-dratsy dia fandrika mahafaty;
  - type: text
    content: ny lazain’ny olo-marina kosa mamonjy ny hafa.
  '7':
  - type: text
    content: Raha miongana ny olon-dratsy, dia tsy misy tafajanona;
  - type: text
    content: fa ny ankohonan’ny olo-marina kosa maharitra hatrany.
  '8':
  - type: text
    content: Ny fahaizan’ny olona no hiderana azy,
  - type: text
    content: fa izay adaladala kosa hatao tsinontsinona.
  '9':
  - type: text
    content: Aleo olon-tsotra manana mpanompo anankiray,
  - type: text
    content: toy izay mpirehaka ho maro mpanompo nefa tsy manan-kohanina.
