document_id: PRO.12,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tia fananarana tia fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa adaladala izay mankahala tsikera.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina mahalala mitsimbina ny bibiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa masiaka hatramin’ny atiny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miasa ny taniny ho voky hanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manao hevi-dravina kosa tsy ampy saina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy maniry tombontsoa tsy ara-drariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-marina kosa mamaka sady mamokatra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy voafandriky ny laingany ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-marina kosa afa-miala amin’ny fahoriana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny olona no ahazoany fahombiazana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy andraisany ny vokatr’izay asan’ny tanany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny adala dia mihevitra ho mahitsy toetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hendry kosa ny olona izay mandray torohevitra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny adala maneho hatezerana eo no ho eo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny hendry alaim-baràka kosa mahatsindry fo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay milaza ny marina no manambara ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fitaka kosa no ambaran’ny vavolombelona mandainga.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitsaontsaona dia mety handratra toy ny sabatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tenin’ny hendry kosa dia fanasitranana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teny marina dia mitombina hatrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lainga kosa dia indray mipi-maso ihany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsara fanahy dia mahazo sitraka avy amin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay manana sain-dratsy kosa helohiny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitaka no ao am-pon’izay miteti-dratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa fifaliana kosa ho an’izay misaina fihavanana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy ratsy manjo ny olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa heniky ny loza.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankahala ny mpandainga ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mankasitraka kosa ny olona mahatoky.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona malina tsy mampideradera ny fahalalàny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny fon’ireo adala kosa mamoaka hafokana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona mazoto miasa no homena fitondrana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olona kamo kosa dia hampanaovina asa an-terivozona.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ahiahy mandreraka ny fon’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny teny soa kosa mahafaly azy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina dia mpitari-dalana ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny toetran’ny olon-dratsy kosa mamery azy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpihaza kamo tsy mba manana haza hatono;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa soa sarobidy kosa ny olona mazoto miasa.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lalan’ny fahamarinana no misy ny fiainana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny lalam-paharatsiana kosa mankany amin’ny fahafatesana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 10.11 sy nta. –Araka ny dkt tranainy grika izany andalana izany; tsy dia mazava ny hevitry ny RM.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy haratsiam-panahy no maha tafaorina ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny marina kosa mamaka tsy misy mahozongozona.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satroboninahitry ny vadiny ny vehivavy tsara fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa homamiadana mikiky azy kosa ny vehivavy tsy mendrika.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina mihevitra ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olon-dratsy kosa misaina fitaka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny olon-dratsy dia fandrika mahafaty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lazain’ny olo-marina kosa mamonjy ny hafa.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miongana ny olon-dratsy, dia tsy misy tafajanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny ankohonan’ny olo-marina kosa maharitra hatrany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahaizan’ny olona no hiderana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izay adaladala kosa hatao tsinontsinona.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo olon-tsotra manana mpanompo anankiray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay mpirehaka ho maro mpanompo nefa tsy manan-kohanina.
