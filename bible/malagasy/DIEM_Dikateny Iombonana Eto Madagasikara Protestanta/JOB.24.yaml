document_id: JOB.24,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Valintenin’i Jôba (tohiny):'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: avelan’Andriamanitra ny ratsy fanahy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no tsy feran’Andriamanitra Tsitoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fotoanandro voatendry hitsarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hahitan’ny mpanompony Azy manafay ny ratsy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampandehanina amin’izao tsy miakanjo ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ampitondraina amboaram-bary nefa noana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao anaty sahan’ny olon-dratsy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no manery ôliva hahazoan-menaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manosihosy koa ny famiazam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy tsy afa-misotro divay hialan-ketaheta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitoreo ao an-tanàna ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitaraindraina ny maratra miala aina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy ahoan’Andriamanitra izany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy no mankahala ny mazava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala ny lalany akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mizatra amin’ny sakeli-dalany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifoha vao mangiran-dratsy ny mpandatsaka aina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamono ny mahantra sy ny ory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary lasa mpangalatra rehefa tonga ny alina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikendry somambisamby ny mpaka vadin’olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka manao anakampo hoe: «Tsy misy hahita ahy».'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia misaron-tava amin’izay izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao anaty haizina no mamaky trano ny mpangalatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mihidy an-trano kosa izy nony antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala akory ny mazava;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho azy rehetra ireo dia ny alina mahatahotra no maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa zatra ny alina mahatahotra izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ianareo kosa milaza hoe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mitsinkafona entin-drano ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voaozon’ny olona ny anjara-taniny eto.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy iviliany ny lalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mankany amin’ny tanim-boaloboka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Fa ianareo kosa milaza hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo teny ireo dia natao mba hampahazava ny hevitra. Fa manomboka eo amin’ny and 18 i Jôba dia manovo avy amin’ny tenin’ireo sakaizany. Araka ny hevitry ny hafa ny and 18-24 dia mety ho sombin’ny teny fahatelo nataon’i Tsôfara, izay efa tsy ao amin’ny rijan-teny ankehitriny intsony. Jereo 27.13 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mankany amin’ny tanim-boaloboka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tsy fantatra ny hevitr’io fomba fitenenana io; misy mandika azy amin’ny heviny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mankany amin’ny fety
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny andevonan’ny hafanana sy tanihay ny ranomandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no andevonana ny mpanota any amin’ny fonenan’ny maty.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa afindran’ny olona ny baorin-taniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary biby fiompy nangalarina no andrasany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny lalànan’i Israely dia mandrara ny fanitaran-tany amin’ny fanisahana ny baorina izay mamaritra azy. Jereo Deot 19.14; Hos 5.10; Ohab 22.28.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manadino azy ny kibo nifonosany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manjary hanim-py ho any’ny olitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia tsy hotsaroana intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tapaka tahaka ny hazo ny faharatsiana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahory ny momba tsy niteraka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba nanisy soa ny mpitondratena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra dia manan-kery hamotika ny matanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitroatra Izy ka tsy manampo ho velona intsony ireo.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelany hatoky tena tanteraka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa arahiny maso ny lalan-kalehany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisandratra vetivety izy, dia tsy hita intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitolefika toa voninkazo malazo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tangosana toy ny salohim-bary.»
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny ka tsy izany no marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia iza no sahy hanao ahy ho mpandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka haneho fa tsinontsinona izay voalazako?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indaosina ny borikin’ny kamboty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary atao antoka ny ombin’ny mpitondratena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voatosika ivelan’ny lalana ny mahantra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voatery miafina avokoa ny madiniky ny tany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro tahaka ny fiaingan’ny borikidia ho any an-taniefitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no iaingan’ireo mahantra hiasa any an-taninay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazoany hanina hameloman-janaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tsahan’ny hafa ireo madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no voatery hamory vilona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eny an-tanimboaloboky ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no voatery hitsimpontsimpona voaloboka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandry miboridana izy amin’ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy manan-damba hisaronana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mba mirakotra izy raha mangatsiaka.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kotsan’ny orana any an-tendrombohitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mitampifimpify amin’ny vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy manan-kialofana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny kamboty mbola minono aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia sarihin’ny olon-dratsy ho mpanompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ataony ho antoky ny mahantra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 22.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
