document_id: JOB.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valintenin’i Jôba (tohiny):'
  - type: heading
    content: avelan’Andriamanitra ny ratsy fanahy
  - type: text
    content: Nahoana no tsy feran’Andriamanitra Tsitoha
  - type: text
    content: ny fotoanandro voatendry hitsarany,
  - type: text
    content: ka hahitan’ny mpanompony Azy manafay ny ratsy.
  '10':
  - type: text
    content: Ampandehanina amin’izao tsy miakanjo ireo
  - type: text
    content: sady ampitondraina amboaram-bary nefa noana.
  '11':
  - type: text
    content: Ao anaty sahan’ny olon-dratsy izy
  - type: text
    content: no manery ôliva hahazoan-menaka
  - type: text
    content: sady manosihosy koa ny famiazam-boaloboka
  - type: text
    content: saingy tsy afa-misotro divay hialan-ketaheta.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Mitoreo ao an-tanàna ny olona,
  - type: text
    content: mitaraindraina ny maratra miala aina,
  - type: text
    content: nefa tsy ahoan’Andriamanitra izany.
  '13':
  - type: text
    content: Ny olon-dratsy no mankahala ny mazava,
  - type: text
    content: ka tsy mahalala ny lalany akory
  - type: text
    content: na mizatra amin’ny sakeli-dalany.
  '14':
  - type: text
    content: Mifoha vao mangiran-dratsy ny mpandatsaka aina
  - type: text
    content: ka mamono ny mahantra sy ny ory,
  - type: text
    content: ary lasa mpangalatra rehefa tonga ny alina.
  '15':
  - type: text
    content: Mikendry somambisamby ny mpaka vadin’olona
  - type: text
    content: 'ka manao anakampo hoe: «Tsy misy hahita ahy».'
  - type: text
    content: Ary dia misaron-tava amin’izay izy.
  '16':
  - type: text
    content: Ao anaty haizina no mamaky trano ny mpangalatra
  - type: text
    content: fa mihidy an-trano kosa izy nony antoandro
  - type: text
    content: ka tsy mahalala akory ny mazava;
  '17':
  - type: text
    content: ho azy rehetra ireo dia ny alina mahatahotra no maraina
  - type: text
    content: satria efa zatra ny alina mahatahotra izy.
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Fa ianareo kosa milaza hoe
  - type: text
    content: «Mitsinkafona entin-drano ny olon-dratsy,
  - type: text
    content: voaozon’ny olona ny anjara-taniny eto.
  - type: text
    content: Tsy iviliany ny lalana
  - type: text
    content: mankany amin’ny tanim-boaloboka
  - type: note
    content: 'Fa ianareo kosa milaza hoe: ireo teny ireo dia natao mba hampahazava ny hevitra. Fa manomboka eo amin’ny and 18 i Jôba dia manovo avy amin’ny tenin’ireo sakaizany. Araka ny hevitry ny hafa ny and 18-24 dia mety ho sombin’ny teny fahatelo nataon’i Tsôfara, izay efa tsy ao amin’ny rijan-teny ankehitriny intsony. Jereo 27.13 sy nta. –mankany amin’ny tanim-boaloboka: tsy fantatra ny hevitr’io fomba fitenenana io; misy mandika azy amin’ny heviny hoe mankany amin’ny fety.'
  - type: text
    content: .
  '19':
  - type: text
    content: Tahaka ny andevonan’ny hafanana sy tanihay ny ranomandry
  - type: text
    content: no andevonana ny mpanota any amin’ny fonenan’ny maty.
  '2':
  - type: text
    content: Fa afindran’ny olona ny baorin-taniny;
  - type: text
    content: ary biby fiompy nangalarina no andrasany
  - type: note
    content: Ny lalànan’i Israely dia mandrara ny fanitaran-tany amin’ny fanisahana ny baorina izay mamaritra azy. Jereo Deot 19.14; Hos 5.10; Ohab 22.28.
  - type: text
    content: .
  '20':
  - type: text
    content: Manadino azy ny kibo nifonosany,
  - type: text
    content: ary manjary hanim-py ho any’ny olitra izy,
  - type: text
    content: ka dia tsy hotsaroana intsony.
  - type: text
    content: Eny, tapaka tahaka ny hazo ny faharatsiana.
  '21':
  - type: text
    content: Nampahory ny momba tsy niteraka izy,
  - type: text
    content: ary tsy mba nanisy soa ny mpitondratena.
  '22':
  - type: text
    content: Fa Andriamanitra dia manan-kery hamotika ny matanjaka;
  - type: text
    content: Mitroatra Izy ka tsy manampo ho velona intsony ireo.
  '23':
  - type: text
    content: Avelany hatoky tena tanteraka izy,
  - type: text
    content: kanefa arahiny maso ny lalan-kalehany.
  '24':
  - type: text
    content: Nisandratra vetivety izy, dia tsy hita intsony;
  - type: text
    content: Mitolefika toa voninkazo malazo izy,
  - type: text
    content: ka tangosana toy ny salohim-bary.»
  '25':
  - type: text
    content: Raha tàhiny ka tsy izany no marina,
  - type: text
    content: dia iza no sahy hanao ahy ho mpandainga
  - type: text
    content: ka haneho fa tsinontsinona izay voalazako?
  '3':
  - type: text
    content: Indaosina ny borikin’ny kamboty
  - type: text
    content: ary atao antoka ny ombin’ny mpitondratena.
  '4':
  - type: text
    content: Voatosika ivelan’ny lalana ny mahantra;
  - type: text
    content: ka voatery miafina avokoa ny madiniky ny tany.
  '5':
  - type: text
    content: Indro tahaka ny fiaingan’ny borikidia ho any an-taniefitra
  - type: text
    content: no iaingan’ireo mahantra hiasa any an-taninay
  - type: text
    content: hahazoany hanina hameloman-janaka.
  - type: heading
    content: '*'
  '6':
  - type: text
    content: Eny an-tsahan’ny hafa ireo madinika
  - type: text
    content: no voatery hamory vilona
  - type: text
    content: ary eny an-tanimboaloboky ny olon-dratsy
  - type: text
    content: no voatery hitsimpontsimpona voaloboka.
  '7':
  - type: text
    content: Mandry miboridana izy amin’ny alina;
  - type: text
    content: fa tsy manan-damba hisaronana;
  - type: text
    content: tsy mba mirakotra izy raha mangatsiaka.
  '8':
  - type: text
    content: Kotsan’ny orana any an-tendrombohitra izy,
  - type: text
    content: ka mitampifimpify amin’ny vatolampy
  - type: text
    content: satria tsy manan-kialofana.
  '9':
  - type: text
    content: Na dia ny kamboty mbola minono aza
  - type: text
    content: dia sarihin’ny olon-dratsy ho mpanompony,
  - type: text
    content: ary ataony ho antoky ny mahantra
  - type: note
    content: Jereo 22.6 sy nta.
  - type: text
    content: .
