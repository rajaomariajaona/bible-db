document_id: JER.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Valin-kafatra ho an’i Tsedekià mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hafatra nampitondrain’ny TOMPO an’i Jeremià ho an’i Tsedekià mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tsedekià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', zanakalahy fahatelon’i Josià sady mpanjaka farany tao Joda, dia nanjaka tao Jerosalema tamin’ny 597-587 tal J.K. Jereo 2 Mp 24.17–25.7.'
    marker-yv: yv-n
  - type: text
    text: '. Fa nirahin’ny mpanjaka hankany amin’i Jeremià i Pasehora zanakalahin’i Malkià ary koa i Tsefanià mpisorona sady zanakalahin’i Mahaseià mba hangataka aminy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Raha sitrakao, anontanio ny TOMPO re ny momba antsika, satria miady amintsika i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: . Angamba mety hanao zava-mahagaga indray ny TOMPO, ka hanainga ny Babilônianina handao antsika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Fanafihan’ny Babilônianina:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 24.20–25.11; 2 Tan 36.11-21. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'zava-mahagaga:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit 2 Mp 19.35-36.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Jeremià tamin’ireo iraka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ndeha lazao amin’i Tsedekià '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izao fanambaràn’ny TOMPO Andriamanitr’i Israely izao: «Indro hataoko miverin-dalana ireo miaramila izay miady any ivelan’ny manda amin’ny mpanjakan’i Babilôna sy ny Kaldeanina noho ny fahirano ataony anareo, ka hampodîko ho ao afovoan-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho mihitsy no hiady aminareo, ka hampiseho aminareo ny heriko sy ny fahaizako ao anatin’ny fahatezerako mirehitra mahatsiravina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hamely izay rehetra monina amin’ity tanàna ity Aho, na olona na biby, ka ho fatin’ny areti-mandringana izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aorian’izany, hoy ny teny hentitra avy amiko TOMPO, dia hatolotro eo an-tanan’ny mpanjakan’i Babilôna i Tsedekià mpanjakan’i Joda sy ny manamboninahiny ary ny mponina tato an-tanàna izay sisa velona tamin’ny areti-mandringana sy ny ady ary ny mosary. Eo an-tanan’ny fahavalony izay mitady hamono azy ho faty no hanolorako azy. Ka hasain’i Nebokadnetsara haripaka tsy misy antra na fangorahana na indrafo ireny.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nisy hafatra hafa koa nampitondrain’ny TOMPO an’i Jeremià ho an’ny vahoaka hoe: «Izao no lazain’ny Tompo: indro ianareo apetrako eo an-tsampanan-dalana, ka eo anoloanareo ny fiainana sy ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Na iza na iza mijanona amin’ity tanàna ity dia ho fatin’ny ady sy ny mosary ary ny areti-mandringana ato. Fa izay mivoaka ny tanàna kosa mba hitolo-batana amin’ny mpanafika dia hahavonjy ny ainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa tsy ny hitondra soa amin’ity tanàna ity no kendreko, hoy ny teny hentitra avy amiko TOMPO, fa ny hitondra loza aminy; hatolotro eo an-tanan’ny mpanjakan’i Babilôna izy hodorany amin’ny afo.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny ankohonan’ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fanambaràna ho an’ny fianakavian’ny mpanjakan’i Joda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fiandohan’ny and 11 dia karazana lohahevitra ho an’ny 21.11–23.8 izay nantsoina indraindray hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: boky kely momba ny mpanjaka.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ny tenin’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ianareo taranak’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanaovana fitsarana ara-drariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tontosay isa-maraina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho eny an-tanan’ny mpitsentsitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo olona volosany
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao hitroatra ny fahatezerako
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho afo mandoro tsy hay vonoina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vokatry ny asa ratsy nataonareo izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro avy hamely anareo Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry mponina erỳ ambanimbany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'erỳ ambanimbany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny lapan’ny mpanjaka dia naorina teo ambanin’ny tempoly tao Jerosalema; jereo 22.1; 26.10; 36.12.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny vatolampy milembalemba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hamely anareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ianareo izay mihambo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa tsy misy fahavalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: afa-midina hatreny aminareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hiditra amin’ny fisitrihanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izaho no hirotsaka hamely anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: araka ireo vokatry ny ratsy nataonareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hodorako amin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny andry sedera marobe eo aminareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny zavatra rehetra manodidina ireo andry ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ho levon’izany afo izany.
