document_id: JER.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Valin-kafatra ho an’i Tsedekià mpanjaka
  - type: text
    content: Hafatra nampitondrain’ny TOMPO an’i Jeremià ho an’i Tsedekià mpanjaka
  - type: note
    content: I Tsedekià, zanakalahy fahatelon’i Josià sady mpanjaka farany tao Joda, dia nanjaka tao Jerosalema tamin’ny 597-587 tal J.K. Jereo 2 Mp 24.17–25.7.
  - type: text
    content: '. Fa nirahin’ny mpanjaka hankany amin’i Jeremià i Pasehora zanakalahin’i Malkià ary koa i Tsefanià mpisorona sady zanakalahin’i Mahaseià mba hangataka aminy hoe:'
  '10':
  - type: text
    content: Fa tsy ny hitondra soa amin’ity tanàna ity no kendreko, hoy ny teny hentitra avy amiko TOMPO, fa ny hitondra loza aminy; hatolotro eo an-tanan’ny mpanjakan’i Babilôna izy hodorany amin’ny afo.»
  - type: heading
    content: Hafatra ho an’ny ankohonan’ny mpanjaka
  '11':
  - type: text
    content: Fanambaràna ho an’ny fianakavian’ny mpanjakan’i Joda
  - type: note
    content: Ny fiandohan’ny and 11 dia karazana lohahevitra ho an’ny 21.11–23.8 izay nantsoina indraindray hoe boky kely momba ny mpanjaka.
  - type: text
    content: .
  - type: text
    content: Mihainoa ny tenin’ny TOMPO,
  '12':
  - type: text
    content: ianareo taranak’i Davida.
  - type: text
    content: 'Izao no lazain’ny TOMPO:'
  - type: text
    content: Fanaovana fitsarana ara-drariny
  - type: text
    content: no tontosay isa-maraina.
  - type: text
    content: Afaho eny an-tanan’ny mpitsentsitra
  - type: text
    content: ireo olona volosany
  - type: text
    content: fandrao hitroatra ny fahatezerako
  - type: text
    content: ka ho afo mandoro tsy hay vonoina.
  - type: text
    content: Vokatry ny asa ratsy nataonareo izany.
  '13':
  - type: text
    content: Indro avy hamely anareo Aho
  - type: text
    content: ry mponina erỳ ambanimbany
  - type: note
    content: 'erỳ ambanimbany: ny lapan’ny mpanjaka dia naorina teo ambanin’ny tempoly tao Jerosalema; jereo 22.1; 26.10; 36.12.'
  - type: text
    content: ','
  - type: text
    content: eo amin’ny vatolampy milembalemba,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO;
  - type: text
    content: hamely anareo Aho,
  - type: text
    content: dia ianareo izay mihambo
  - type: text
    content: fa tsy misy fahavalo
  - type: text
    content: afa-midina hatreny aminareo
  - type: text
    content: na hiditra amin’ny fisitrihanareo.
  '14':
  - type: text
    content: Izaho no hirotsaka hamely anareo,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO,
  - type: text
    content: araka ireo vokatry ny ratsy nataonareo.
  - type: text
    content: Dia hodorako amin’ny afo
  - type: text
    content: ny andry sedera marobe eo aminareo;
  - type: text
    content: ka ny zavatra rehetra manodidina ireo andry ireo
  - type: text
    content: dia ho levon’izany afo izany.
  '2':
  - type: text
    content: '–Raha sitrakao, anontanio ny TOMPO re ny momba antsika, satria miady amintsika i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: . Angamba mety hanao zava-mahagaga indray ny TOMPO, ka hanainga ny Babilônianina handao antsika
  - type: note
    content: 'Fanafihan’ny Babilônianina: jereo 2 Mp 24.20–25.11; 2 Tan 36.11-21. –zava-mahagaga: ampit 2 Mp 19.35-36.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia hoy i Jeremià tamin’ireo iraka:'
  - type: text
    content: '–Ndeha lazao amin’i Tsedekià '
  '4':
  - type: text
    content: 'izao fanambaràn’ny TOMPO Andriamanitr’i Israely izao: «Indro hataoko miverin-dalana ireo miaramila izay miady any ivelan’ny manda amin’ny mpanjakan’i Babilôna sy ny Kaldeanina noho ny fahirano ataony anareo, ka hampodîko ho ao afovoan-tanàna. '
  '5':
  - type: text
    content: 'Izaho mihitsy no hiady aminareo, ka hampiseho aminareo ny heriko sy ny fahaizako ao anatin’ny fahatezerako mirehitra mahatsiravina. '
  '6':
  - type: text
    content: 'Hamely izay rehetra monina amin’ity tanàna ity Aho, na olona na biby, ka ho fatin’ny areti-mandringana izy rehetra. '
  '7':
  - type: text
    content: Aorian’izany, hoy ny teny hentitra avy amiko TOMPO, dia hatolotro eo an-tanan’ny mpanjakan’i Babilôna i Tsedekià mpanjakan’i Joda sy ny manamboninahiny ary ny mponina tato an-tanàna izay sisa velona tamin’ny areti-mandringana sy ny ady ary ny mosary. Eo an-tanan’ny fahavalony izay mitady hamono azy ho faty no hanolorako azy. Ka hasain’i Nebokadnetsara haripaka tsy misy antra na fangorahana na indrafo ireny.»
  '8':
  - type: text
    content: 'Nisy hafatra hafa koa nampitondrain’ny TOMPO an’i Jeremià ho an’ny vahoaka hoe: «Izao no lazain’ny Tompo: indro ianareo apetrako eo an-tsampanan-dalana, ka eo anoloanareo ny fiainana sy ny fahafatesana. '
  '9':
  - type: text
    content: 'Na iza na iza mijanona amin’ity tanàna ity dia ho fatin’ny ady sy ny mosary ary ny areti-mandringana ato. Fa izay mivoaka ny tanàna kosa mba hitolo-batana amin’ny mpanafika dia hahavonjy ny ainy. '
