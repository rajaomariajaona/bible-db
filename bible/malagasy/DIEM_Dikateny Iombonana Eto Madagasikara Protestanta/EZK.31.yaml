      text: Oharina amin’ny hazo sedera iray ny mpanjakan’i Ejipta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro voalohan’ny volana fahatelo
    - type: usfm
      marker: f
