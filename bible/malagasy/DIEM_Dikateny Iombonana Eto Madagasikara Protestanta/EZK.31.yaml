type_code: plt
verses:
  '1':
  - type: heading
    content: Oharina amin’ny hazo sedera iray ny mpanjakan’i Ejipta
  - type: text
    content: Tamin’ny taona faha-11 taorian’ny fahababoana, nony andro voalohan’ny volana fahatelo
  - type: note
    content: Izany hoe Mey-Jona 587 tal J.K.
  - type: text
    content: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Nisandratra avo ilay sedera ka nitehi-drahona ny tendrony, dia nihaniavonavona ny fony. '
  '11':
  - type: text
    content: Izany no hanolorako azy eo an-tanan’ny filohan’ireo firenena mba hamaliany azy araka ny faharatsiany
  - type: note
    content: 'Ny filohan’ireo firenena: i Nebokadnetsara mpanjakan’i Babilôna izany.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nokapain’ireo vahiny faran’izay masiaka amin’ireo firenena izy, dia nilaozany. Teny an-tendrombohitra sy teny an-dohasaha rehetra no nianjeran’ny sampany; ary teny amin’ny lalan-driaka rehetra amin’ny tany no nahatapatapaka ny rantsany. Ka ny sarambabembahoaka rehetra izay nipetraka teo ambany alokalony dia voatery niala sy nandositra. '
  '13':
  - type: text
    content: 'Nipetraka teo amin’ny vatany nianjera ny voromanidina isan-karazany, ary nisitrika tanaty rantsany ny bibidia rehetra. '
  '14':
  - type: text
    content: Izany no nataoko dia mba tsy hisy intsony hazo tsara tondraka sy vonton-drano, izay ho avo mijoalajoala ka hitehi-drahona ny tendrony, ary hiavonavona noho ny haavony. Fa ny hazo rehetra dia toy ny olona ka natao ho faty sy hankany ambanin’ny tany eo akaikin’ireo efa tafidina any.
  '15':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY : Tamin’ny andro izay nidinan’ilay sedera tany amin’ny toeran’ny maty, dia nataoko nisaona azy ny ranobe ao ambany tany. Noho ilay sedera no nanampenako ny renirano avy amin’ny ranobe ary nampijanonako azy tsy hikoriana amin’ny sakeliny. Nataoko nalahelo azy ny tendrombohitr’i Libano ary izany no nampalazo ny hazo rehetra teny an-tsaha. '
  '16':
  - type: text
    content: 'Rehefa nataoko izay hianjeran’io hazo io mba hidinany any amin’ny toeran’ny maty ho tafaraka amin’ireo efa tafidina any, dia nampihorohoroiko ireo firenena nony nandre ny fianjerany. Fa tany ambanin’ny tany kosa dia samy afa-po avokoa ireo hazon’i Hedèna, dia ireo hazo voafantina sady soa indrindra ary vonton-drano tao Libano. '
  '17':
  - type: text
    content: Fa ireo hazo ireo dia nidina niaraka tamin’ilay sedera ho any amin’ny toeran’ny maty eo akaikin’izay maty an’ady; satria ireo no hery manohana ilay sedera sy nivelona tambanin’ny alokalony teo anivon’ny firenen-tsamihafa.
  '18':
  - type: text
    content: '«Tsy nisy hazon’i Hedèna nitovy famirapiratana sy fahalehibiazana taminao. Kanefa hazera any ambanin’ny tany miaraka amin’ireny hazon’i Hedèna ireny ianao, ka hiampatra eo anivon’ireo olona tsy '
  - type: text
    content: voafora
  - type: text
    content: ' izay maty an’ady. Izany no ho anjaran’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny mponina marobe rehetra any Ejipta; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»'
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, lazao amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ' mpanjakan’i Ejipta sy amin’ireo vahoaka maro izay feheziny hoe:'
  - type: text
    content: ‹Inona no azo anoharana anao
  - type: text
    content: fa lehibe tokoa ianao, ry Farao?
  '3':
  - type: text
    content: Indro ianao tahaka ny sederan’i Libano
  - type: note
    content: 'Indro ianao: toa izany no mitombina fa ny RM kosa manao hoe Indro i Asiria.'
  - type: text
    content: izay misy rantsana mahafinaritra
  - type: text
    content: sady misandrahaka manalokaloka,
  - type: text
    content: dia sedera iray nisandratra avo
  - type: text
    content: ka mitehi-drahona ny tendrony.
  '4':
  - type: text
    content: Ny ranonorana no nahalehibe azy;
  - type: text
    content: ny ranobe ao ambany tany no nampitombo azy,
  - type: text
    content: satria namonto ony nanodidina ny fakany,
  - type: text
    content: vao nikoriana tamin’ny lakan-drano
  - type: text
    content: hankamin’ny hazo hafa rehetra any an-tsaha.
  '5':
  - type: text
    content: Izany no nisandratany ho avo be
  - type: text
    content: noho ny hazo rehetra any an-tsaha.
  - type: text
    content: Nihamaro ny sampan’ilay sedera
  - type: text
    content: sady nisandrahaka ny rantsany,
  - type: text
    content: satria ny ranobe any ambany any no nanesikaazy hamoaka tsimoka.
  '6':
  - type: text
    content: Teo amin’ny sampany no nanao akany,
  - type: text
    content: ny voro-manidina isan-karazany;
  - type: text
    content: teo ambanin’ny rantsany
  - type: text
    content: no niterahan’ny bibidia rehetra;
  - type: text
    content: ary teo ambanin’ny alokalony
  - type: text
    content: no nipetrahan’ny firenena marobe.
  '7':
  - type: text
    content: Hazo goavana mahafinaritra izy,
  - type: text
    content: sady misandrahaka ny rantsany,
  - type: text
    content: satria hatrany amin’ny ranobe ambany any
  - type: text
    content: no nilentehan’ny fakany.
  '8':
  - type: text
    content: Tsy nisy sedera nitovy aminy
  - type: text
    content: tao an-jaridainan’Andriamanitra
  - type: note
    content: Ny zaridainan’Andriamanitra dia i Hedèna, jereo and 9,18 sy Gen 2.8-9.
  - type: text
    content: ;
  - type: text
    content: tsy nisy kipreso tsara sampana tahaka azy;
  - type: text
    content: tsy nisy platana mba nanan-drantsana toa azy;
  - type: text
    content: tsy nisy hazo nitovy hatsara aminy
  - type: text
    content: tao an-jaridainan’Andriamanitra.
  '9':
  - type: text
    content: Nataoko tsara tarehy izy
  - type: text
    content: noho ny habetsahan’ny rantsany;
  - type: text
    content: ka dia nialona azy ny hazo rehetra
  - type: text
    content: tao Hedèna, zaridainan’Andriamanitra›. »
  - type: heading
    content: Ho potika toy ny sedera ny mpanjakan’i Ejipta
