      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izany hoe Mey-Jona 587 tal J.K.
      marker-yv: yv-n
    - type: text
      text: ', dia nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Nisandratra avo ilay sedera ka nitehi-drahona ny tendrony, dia nihaniavonavona ny fony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no hanolorako azy eo an-tanan’ny filohan’ireo firenena mba hamaliany azy araka ny faharatsiany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny filohan’ireo firenena: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Nebokadnetsara mpanjakan’i Babilôna izany.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nokapain’ireo vahiny faran’izay masiaka amin’ireo firenena izy, dia nilaozany. Teny an-tendrombohitra sy teny an-dohasaha rehetra no nianjeran’ny sampany; ary teny amin’ny lalan-driaka rehetra amin’ny tany no nahatapatapaka ny rantsany. Ka ny sarambabembahoaka rehetra izay nipetraka teo ambany alokalony dia voatery niala sy nandositra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nipetraka teo amin’ny vatany nianjera ny voromanidina isan-karazany, ary nisitrika tanaty rantsany ny bibidia rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nataoko dia mba tsy hisy intsony hazo tsara tondraka sy vonton-drano, izay ho avo mijoalajoala ka hitehi-drahona ny tendrony, ary hiavonavona noho ny haavony. Fa ny hazo rehetra dia toy ny olona ka natao ho faty sy hankany ambanin’ny tany eo akaikin’ireo efa tafidina any.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izao no lazain’ny Tompo ANDRIANANAHARY : Tamin’ny andro izay nidinan’ilay sedera tany amin’ny toeran’ny maty, dia nataoko nisaona azy ny ranobe ao ambany tany. Noho ilay sedera no nanampenako ny renirano avy amin’ny ranobe ary nampijanonako azy tsy hikoriana amin’ny sakeliny. Nataoko nalahelo azy ny tendrombohitr’i Libano ary izany no nampalazo ny hazo rehetra teny an-tsaha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nataoko izay hianjeran’io hazo io mba hidinany any amin’ny toeran’ny maty ho tafaraka amin’ireo efa tafidina any, dia nampihorohoroiko ireo firenena nony nandre ny fianjerany. Fa tany ambanin’ny tany kosa dia samy afa-po avokoa ireo hazon’i Hedèna, dia ireo hazo voafantina sady soa indrindra ary vonton-drano tao Libano. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ireo hazo ireo dia nidina niaraka tamin’ilay sedera ho any amin’ny toeran’ny maty eo akaikin’izay maty an’ady; satria ireo no hery manohana ilay sedera sy nivelona tambanin’ny alokalony teo anivon’ny firenen-tsamihafa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Tsy nisy hazon’i Hedèna nitovy famirapiratana sy fahalehibiazana taminao. Kanefa hazera any ambanin’ny tany miaraka amin’ireny hazon’i Hedèna ireny ianao, ka hiampatra eo anivon’ireo olona tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voafora
    - type: text
      text: ' izay maty an’ady. Izany no ho anjaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' sy ny mponina marobe rehetra any Ejipta; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»'
  '2':
