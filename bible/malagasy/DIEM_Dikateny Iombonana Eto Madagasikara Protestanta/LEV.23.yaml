    - type: text
      text: '34'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny andro faha-15, amin’ny volana fahafito, no hiantombohan’ny fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranotomboka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
    marker-yv: yv-n
  - type: text
    text: ', ho fanajana Ahy TOMPO mandritra ny fito andro. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny andro voalohany, dia hisy fanompoam-pivavahana hivorianareo ka aza manao ny raharaha andavanandro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Isan’andro, mandritra ireo fito andro ireo, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' levonina amin’ny afo no haterinareo ho AHY. Ny andro fahavalo dia hisy indray fanompoam-pivavahana hivorianareo ka mbola hanateranareo sorona levonina amin’ny afo koa ho AHY; andro lehibe famaranana ny fankalazana izany, ka aza anaovana ny raharaha andavanandro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Ireo àry no fankalazana manetriketrika naraikitro, ka hasiana fanompoam-pivavahana hivorianareo sy hanateranareo sorona levonina amin’ny afo ho AHY, dia sorona dorana manontolo ombàn’ny fanatitra vokatry ny tany, na sorom-pihavanana ombàn’ny fanatitra araraka, samy amin’ny fotoanandrony avy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ireo sorona ireo dia ankoatra ny zavatra fanolotrareo Ahy TOMPO: izany hoe ny sorona fanao amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' sy ny fanomezana ary ny zavatra rehetra fanalàm-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: boady
  - type: text
    text: ' sy an-tsitrapo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '«Ny andro faha-15, amin’ny volana fahafito, rehefa voaangonareo ny vokatry ny tany, dia hanao fankalazana ianareo, ho fanajana Ahy TOMPO mandritra ny fito andro; ka ny andro voalohany sy fahavalo dia ho andro fitsaharana. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hatreo amin’ny andro voalohany, dia haka izay voankazo tsara indrindra sy sampan-drofia ary rantsan’ny hazo mikirindro na rantsan’ny hazo malahelo eny amoron-drenirano ianareo, ka haneho hafaliana mandritra ny fito andro eo anatrehako TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Eny, hankalazainareo isan-taona izany, mandritra ny fito andro amin’ny volana fahafito, ho fanajana AHY: ho lalàna raikitra hatrany hatrany izany ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mandritra ny fito andro, dia Tranotomboka no hilasianareo Israelita teratany rehetra tsy an-kanavaka, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: mba hahafantaran’ny taranakareo fa tranotomboka no nampilasiako ny razany, fony Aho namoaka azy hiala tany Ejipta. Izaho no TOMPO Andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.43 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 34-43:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 23.16; 34.22; Nom 29.12; Deot 16.13-15.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Toy izany no nameperan’i Mosesy ny Israelita ny amin’ireo fankalazana manetriketrika naraikitry ny TOMPO.
