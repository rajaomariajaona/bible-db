document_id: LEV.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ireo fankalazana fanaon’ny Israelita: Ny Sabata'
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: «Rehefa tafiditra any amin’ny tany izay omeko anareo ianareo ka hijinja ny vokatrareo any, dia mitondrà ilay amboara voalohany amin’ny vary ôrza hojinjainareo ho any amin’ny mpisorona
  - type: note
    content: 'Ny fetin’ny amboaram-bary voalohany dia angamba mifandraika amin’izay voateny ao amin’ny Eks 23.19; 34.26 manao hoe: Ny voaloham-bokatry ny taninao dia hatolotrao ao an-tranoko.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Hahevahevany eo anatrehako no fomba fanolorana ilay amboara, mba hahazoanareo sitraka amiko; ka ny ampitson’ny '
  - type: text
    content: sabata
  - type: text
    content: ' no hanevahevàny azy eo anatrehako. '
  '12':
  - type: text
    content: 'Iny andro hanoloranareo ny amboaram-bary iny, dia manatera zanakondrilahy tsy misy kilema sady iray taona ianareo mba ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho Ahy TOMPO. '
  '13':
  - type: text
    content: 'Ny fanatitra vokatry ny tany hampombaina io sorona io kosa dia koba lafarinina tsara milanja enina kilao, voadity tamin’ny menaka, ka hatao fanatitra levonina amin’ny afo mba ho hanitra ankasitrahiko; ary ny fanatitra araraka dia divay iray litatra sy sasany. '
  '14':
  - type: text
    content: 'Alohan’izany andro hitondranareo ny amboaram-bary ho fanatitra ho Ahy Andriamanitrareo izany, dia aza mbola misy ihinanana ny mofo na lango na voambary avy amin’ny vokatra vao niakatra: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo.'
  - type: heading
    content: Ny fetin’ny Pentekôsta
  '15':
  - type: text
    content: '«Manisà fito herinandro ianareo, miantomboka amin’io ampitson’ny '
  - type: text
    content: sabata
  - type: text
    content: ' io, izany hoe miantomboka amin’ilay andro nitondranareo ny amboaram-bary voalohany ho fanatitra hahevaheva eo anatrehako. Ho fito herinandro mipaka izany; '
  '16':
  - type: text
    content: ka amin’ny ampitson’ny sabata fahafito dia dimampolo andro no ho voaisanareo
  - type: note
    content: Izany fanoritana ny dimampolo andro izany no nahatonga ilay anarana anankiray fiantsoana ity fety ity hoe Pentekôsta (fahadimampolo, amin’ny teny grika).
  - type: text
    content: '. Amin’io andro io dia manolora fanatitra vaovao ho Ahy TOMPO indray ianareo; '
  '17':
  - type: text
    content: 'ka mitondrà, avy amin’ny fonenanareo, mofo roa ho fanatitra hahevaheva eo anatrehako. Ireo mofo ireo dia hatao amin’ny koba lafarinina tsara, milanja telo kilao, ka hasiana '
  - type: text
    content: leviora
  - type: text
    content: ' no hanendasana azy: voaloham-bokatra natokana ho Ahy TOMPO izany. '
  '18':
  - type: text
    content: 'Miaraka amin’ireo mofo ireo, ny haterinareo koa dia zanakondrilahy fito tsy misy kilema samy iray taona, sy ombilahy iray ary ondrilahy roa mba hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho AHY; ho sorona levonina amin’ny afo ireo mba ho hanitra ankasitrahina ho AHY, sady hampombaina izany ny fanatitra vokatry ny tany sy ny fanatitra araraka. '
  '19':
  - type: text
    content: 'Hisy koa osilahy iray hataonareo sorona fanalana ny ota, ary zanakondrilahy roa samy iray taona hataonareo sorom-pihavanana. '
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Ny fankalazana manetriketrika naraikitro dia hisy fanompoam-pivavahana hivorianareo; ka ireto avy ireo fankalazana manetriketrika naraikitro:'
  '20':
  - type: text
    content: 'Hahevahevan’ny mpisorona eo anatrehako ireo zanakondrilahy roa ireo mbamin’ny mofo avy amin’ny voaloham-bokatra: dia zava-masina ho Ahy TOMPO izany ka ho anjaran’ny mpisorona. '
  '21':
  - type: text
    content: 'Amin’io andro io, dia hisy fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo'
  - type: note
    content: And Eks 23.16; 34.22; Nom 28.26; Deot 16.9-12.
  - type: text
    content: .
  '22':
  - type: text
    content: «Raha mijinja ny vokatry ny tanimbarinareo ianareo, dia aza jinjaina ny eny an-tsisiny; ary aza tsimponina ny salohim-bary natao hotsimponin’ny hafa amin’ny vokatrareo, fa avelao izany ho an’ny mahantra sy ny vahiny. Izaho no TOMPO Andriamanitrareo
  - type: note
    content: Jereo 19.9-10; Deot 24.19-22.
  - type: text
    content: .»
  - type: heading
    content: Ny andro fihobiana ny Tompo
  '23':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '24':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: «Ny andro voalohan’ny volana fahafito
  - type: note
    content: Tamin’ny kalendary israelita fampiasa tany am-boalohany, dia manomboka fararano ny taona (tahaka ny fahita ao amin’ny kalendary jiosy ankehitriny izao indray). Teo amin’ny kalendary anombohan-taona faha-lohataona, dia mbola nitazona ny lanjany ihany ny andro voalohan’ny volana fahafito satria nifanandrify tamin’ny fisantarana ny taom-baovao araka ny kalendary tany amboalohany.
  - type: text
    content: ' dia ho andro fitsaharana ho anareo; hisy fanompoam-pivavahana hivorianareo amin’izany ka hihobianareo Ahy mba hahatsiarovako anareo. '
  '25':
  - type: text
    content: 'Aza manao ny raharaha andavanandro ianareo fa manolora '
  - type: text
    content: sorona
  - type: text
    content: ' levonina amin’ny afo ho Ahy TOMPO'
  - type: note
    content: 'And 24-25: jereo Nom 29.1-6.'
  - type: text
    content: .»
  - type: heading
    content: Ny andro lehibe fankalazana ny Famelàn-keloka
  '26':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
  '27':
  - type: text
    content: «Ny andro fahafolon’ny volana fahafito kosa dia andro fankalazana ny Famelàn-keloka
  - type: note
    content: Jereo Lev 16.
  - type: text
    content: '; hisy fanompoam-pivavahana hivorianareo amin’izany, ary '
  - type: text
    content: hifady hanina
  - type: text
    content: ' ianareo sady hanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' levonina amin’ny afo ho Ahy TOMPO. '
  '28':
  - type: text
    content: 'Aza manao raharaha amin’io andro io, satria fankalazana ny Famelàn-keloka io, ka hanaovanareo eo anatrehako TOMPO Andriamanitrareo ny fombam-pivavahana famelan-keloka ho anareo. '
  '29':
  - type: text
    content: 'Fa ny olona rehetra, izay tsy mety mifady hanina amin’io andro io, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  '3':
  - type: text
    content: '«Andro enina no hanaovan-draharaha; fa ny fahafito dia '
  - type: text
    content: sabata
  - type: text
    content: ' tena andro fitsaharana, ka hasiana fanompoam-pivavahana hivorianareo. Aza manao raharaha akory ianareo, fa sabata hanajana Ahy TOMPO izany, na aiza na aiza onenanareo'
  - type: note
    content: Jereo Gen 2.1-3; Eks 16.23-30; 20.8-11; 23.12; 31.12-17; 34.21; 35.2; Deot 5.12-14.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Ary ny olona rehetra, izay manao raharaha amin’io andro io, dia holevoniko tsy ho eo anivon’ny vahoaka israelita '
  '31':
  - type: text
    content: 'ka aza anaovan-draharaha io andro io: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo. '
  '32':
  - type: text
    content: Ho tena fitsaharana ho anareo io andro io, ary hifadianareo hanina; miantomboka amin’ny harivan’ny andro fahasivin’ny volana ka miafara amin’ny ampitso hariva no hitandremanareo io fitsaharanareo io
  - type: note
    content: 'And 27-32: jereo Lev 16; Nom 29.7-11.'
  - type: text
    content: .»
  - type: heading
    content: Ny fankalazana ny Tranotomboka
  '33':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '34':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Ny andro faha-15, amin’ny volana fahafito, no hiantombohan’ny fankalazana ny '
  - type: text
    content: Tranotomboka
  - type: note
    content: Jereo ny FTS amin’ny voambolana hoe FANISANANDRO.
  - type: text
    content: ', ho fanajana Ahy TOMPO mandritra ny fito andro. '
  '35':
  - type: text
    content: 'Ny andro voalohany, dia hisy fanompoam-pivavahana hivorianareo ka aza manao ny raharaha andavanandro ianareo. '
  '36':
  - type: text
    content: 'Isan’andro, mandritra ireo fito andro ireo, dia '
  - type: text
    content: sorona
  - type: text
    content: ' levonina amin’ny afo no haterinareo ho AHY. Ny andro fahavalo dia hisy indray fanompoam-pivavahana hivorianareo ka mbola hanateranareo sorona levonina amin’ny afo koa ho AHY; andro lehibe famaranana ny fankalazana izany, ka aza anaovana ny raharaha andavanandro.'
  '37':
  - type: text
    content: '«Ireo àry no fankalazana manetriketrika naraikitro, ka hasiana fanompoam-pivavahana hivorianareo sy hanateranareo sorona levonina amin’ny afo ho AHY, dia sorona dorana manontolo ombàn’ny fanatitra vokatry ny tany, na sorom-pihavanana ombàn’ny fanatitra araraka, samy amin’ny fotoanandrony avy. '
  '38':
  - type: text
    content: 'Ireo sorona ireo dia ankoatra ny zavatra fanolotrareo Ahy TOMPO: izany hoe ny sorona fanao amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' sy ny fanomezana ary ny zavatra rehetra fanalàm-'
  - type: text
    content: boady
  - type: text
    content: ' sy an-tsitrapo.'
  '39':
  - type: text
    content: '«Ny andro faha-15, amin’ny volana fahafito, rehefa voaangonareo ny vokatry ny tany, dia hanao fankalazana ianareo, ho fanajana Ahy TOMPO mandritra ny fito andro; ka ny andro voalohany sy fahavalo dia ho andro fitsaharana. '
  '4':
  - type: text
    content: '«Ireto kosa no fankalazana manetriketrika hafa naraikitro ka hasiana fanompoam-pivavahana koa amin’ny fotoany avy:'
  - type: heading
    content: Fetin’ny Paska sy fankalazana ny mofo tsy misy leviora
  '40':
  - type: text
    content: 'Hatreo amin’ny andro voalohany, dia haka izay voankazo tsara indrindra sy sampan-drofia ary rantsan’ny hazo mikirindro na rantsan’ny hazo malahelo eny amoron-drenirano ianareo, ka haneho hafaliana mandritra ny fito andro eo anatrehako TOMPO Andriamanitrareo. '
  '41':
  - type: text
    content: 'Eny, hankalazainareo isan-taona izany, mandritra ny fito andro amin’ny volana fahafito, ho fanajana AHY: ho lalàna raikitra hatrany hatrany izany ho anareo. '
  '42':
  - type: text
    content: 'Mandritra ny fito andro, dia Tranotomboka no hilasianareo Israelita teratany rehetra tsy an-kanavaka, '
  '43':
  - type: text
    content: mba hahafantaran’ny taranakareo fa tranotomboka no nampilasiako ny razany, fony Aho namoaka azy hiala tany Ejipta. Izaho no TOMPO Andriamanitrareo
  - type: note
    content: 'And 34-43: jereo Eks 23.16; 34.22; Nom 29.12; Deot 16.13-15.'
  - type: text
    content: .»
  '44':
  - type: text
    content: Toy izany no nameperan’i Mosesy ny Israelita ny amin’ireo fankalazana manetriketrika naraikitry ny TOMPO.
  '5':
  - type: text
    content: '«Ny volana voalohany, andro faha-14, rehefa hariva, dia fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' hanajana Ahy TOMPO'
  - type: note
    content: Jereo Eks 12.1-147; Nom 28.16; Deot 16.1-2.
  - type: text
    content: .
  '6':
  - type: text
    content: '«Io volana io ihany, andro faha-15, no anombohan’ny fetin’ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' hanajana AHY. Mandritra ny fito andro, dia mofo tsy misy leviora ihany no hohaninareo. '
  '7':
  - type: text
    content: 'Ny andro voalohany amin’ireo andro fito ireo, dia hisy fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo. '
  '8':
  - type: text
    content: 'Isan’andro mandritra ireo andro fito ireo, dia '
  - type: text
    content: sorona
  - type: text
    content: ' levonina amin’ny afo no haterinareo ho AHY. Ary ny andro fahafito, dia hisy indray fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo'
  - type: note
    content: 'And 6-8: jereo Eks 12.15-20; 24.15; 34.18; Nom 28.17-25; Deot 16.3-8.'
  - type: text
    content: .»
  - type: heading
    content: Fetin’ny amboaram-bary voalohany
  '9':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
