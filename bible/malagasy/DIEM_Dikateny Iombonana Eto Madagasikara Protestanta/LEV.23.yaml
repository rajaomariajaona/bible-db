segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ireo fankalazana fanaon’ny Israelita: Ny Sabata'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Ny fankalazana manetriketrika naraikitro dia hisy fanompoam-pivavahana hivorianareo; ka ireto avy ireo fankalazana manetriketrika naraikitro:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Andro enina no hanaovan-draharaha; fa ny fahafito dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' tena andro fitsaharana, ka hasiana fanompoam-pivavahana hivorianareo. Aza manao raharaha akory ianareo, fa sabata hanajana Ahy TOMPO izany, na aiza na aiza onenanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 2.1-3; Eks 16.23-30; 20.8-11; 23.12; 31.12-17; 34.21; 35.2; Deot 5.12-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ireto kosa no fankalazana manetriketrika hafa naraikitro ka hasiana fanompoam-pivavahana koa amin’ny fotoany avy:'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fetin’ny Paska sy fankalazana ny mofo tsy misy leviora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Ny volana voalohany, andro faha-14, rehefa hariva, dia fankalazana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ' hanajana Ahy TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 12.1-147; Nom 28.16; Deot 16.1-2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Io volana io ihany, andro faha-15, no anombohan’ny fetin’ny mofo tsy misy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' hanajana AHY. Mandritra ny fito andro, dia mofo tsy misy leviora ihany no hohaninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny andro voalohany amin’ireo andro fito ireo, dia hisy fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isan’andro mandritra ireo andro fito ireo, dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' levonina amin’ny afo no haterinareo ho AHY. Ary ny andro fahafito, dia hisy indray fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 6-8:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 12.15-20; 24.15; 34.18; Nom 28.17-25; Deot 16.3-8.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fetin’ny amboaram-bary voalohany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Rehefa tafiditra any amin’ny tany izay omeko anareo ianareo ka hijinja ny vokatrareo any, dia mitondrà ilay amboara voalohany amin’ny vary ôrza hojinjainareo ho any amin’ny mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny fetin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amboaram-bary voalohany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia angamba mifandraika amin’izay voateny ao amin’ny Eks 23.19; 34.26 manao hoe: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny voaloham-bokatry ny taninao dia hatolotrao ao an-tranoko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hahevahevany eo anatrehako no fomba fanolorana ilay amboara, mba hahazoanareo sitraka amiko; ka ny ampitson’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' no hanevahevàny azy eo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Iny andro hanoloranareo ny amboaram-bary iny, dia manatera zanakondrilahy tsy misy kilema sady iray taona ianareo mba ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny fanatitra vokatry ny tany hampombaina io sorona io kosa dia koba lafarinina tsara milanja enina kilao, voadity tamin’ny menaka, ka hatao fanatitra levonina amin’ny afo mba ho hanitra ankasitrahiko; ary ny fanatitra araraka dia divay iray litatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alohan’izany andro hitondranareo ny amboaram-bary ho fanatitra ho Ahy Andriamanitrareo izany, dia aza mbola misy ihinanana ny mofo na lango na voambary avy amin’ny vokatra vao niakatra: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fetin’ny Pentekôsta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Manisà fito herinandro ianareo, miantomboka amin’io ampitson’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ' io, izany hoe miantomboka amin’ilay andro nitondranareo ny amboaram-bary voalohany ho fanatitra hahevaheva eo anatrehako. Ho fito herinandro mipaka izany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ka amin’ny ampitson’ny sabata fahafito dia dimampolo andro no ho voaisanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izany fanoritana ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dimampolo andro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany no nahatonga ilay anarana anankiray fiantsoana ity fety ity hoe Pentekôsta (fahadimampolo, amin’ny teny grika).'
    marker-yv: yv-n
  - type: text
    text: '. Amin’io andro io dia manolora fanatitra vaovao ho Ahy TOMPO indray ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka mitondrà, avy amin’ny fonenanareo, mofo roa ho fanatitra hahevaheva eo anatrehako. Ireo mofo ireo dia hatao amin’ny koba lafarinina tsara, milanja telo kilao, ka hasiana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: ' no hanendasana azy: voaloham-bokatra natokana ho Ahy TOMPO izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Miaraka amin’ireo mofo ireo, ny haterinareo koa dia zanakondrilahy fito tsy misy kilema samy iray taona, sy ombilahy iray ary ondrilahy roa mba hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho AHY; ho sorona levonina amin’ny afo ireo mba ho hanitra ankasitrahina ho AHY, sady hampombaina izany ny fanatitra vokatry ny tany sy ny fanatitra araraka. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hisy koa osilahy iray hataonareo sorona fanalana ny ota, ary zanakondrilahy roa samy iray taona hataonareo sorom-pihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hahevahevan’ny mpisorona eo anatrehako ireo zanakondrilahy roa ireo mbamin’ny mofo avy amin’ny voaloham-bokatra: dia zava-masina ho Ahy TOMPO izany ka ho anjaran’ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Amin’io andro io, dia hisy fanompoam-pivavahana hivorianareo, ka aza manao ny raharaha andavanandro ianareo: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And Eks 23.16; 34.22; Nom 28.26; Deot 16.9-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «Raha mijinja ny vokatry ny tanimbarinareo ianareo, dia aza jinjaina ny eny an-tsisiny; ary aza tsimponina ny salohim-bary natao hotsimponin’ny hafa amin’ny vokatrareo, fa avelao izany ho an’ny mahantra sy ny vahiny. Izaho no TOMPO Andriamanitrareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 19.9-10; Deot 24.19-22.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro fihobiana ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'mba hamepetra ny Israelita hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Ny andro voalohan’ny volana fahafito
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tamin’ny kalendary israelita fampiasa tany am-boalohany, dia manomboka fararano ny taona (tahaka ny fahita ao amin’ny kalendary jiosy ankehitriny izao indray). Teo amin’ny kalendary anombohan-taona faha-lohataona, dia mbola nitazona ny lanjany ihany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny andro voalohan’ny volana fahafito
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' satria nifanandrify tamin’ny fisantarana ny taom-baovao araka ny kalendary tany amboalohany.'
    marker-yv: yv-n
  - type: text
    text: ' dia ho andro fitsaharana ho anareo; hisy fanompoam-pivavahana hivorianareo amin’izany ka hihobianareo Ahy mba hahatsiarovako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aza manao ny raharaha andavanandro ianareo fa manolora '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' levonina amin’ny afo ho Ahy TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 24-25:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 29.1-6.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny andro lehibe fankalazana ny Famelàn-keloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niteny tamin’i Mosesy ny TOMPO nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: «Ny andro fahafolon’ny volana fahafito kosa dia andro fankalazana ny Famelàn-keloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 16.
    marker-yv: yv-n
  - type: text
    text: '; hisy fanompoam-pivavahana hivorianareo amin’izany, ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hifady hanina
  - type: text
    text: ' ianareo sady hanatitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' levonina amin’ny afo ho Ahy TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza manao raharaha amin’io andro io, satria fankalazana ny Famelàn-keloka io, ka hanaovanareo eo anatrehako TOMPO Andriamanitrareo ny fombam-pivavahana famelan-keloka ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny olona rehetra, izay tsy mety mifady hanina amin’io andro io, dia hofongorana tsy ho anisan’ny vahoaka israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny olona rehetra, izay manao raharaha amin’io andro io, dia holevoniko tsy ho eo anivon’ny vahoaka israelita '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka aza anaovan-draharaha io andro io: ho fepetra raikitra hatrany hatrany izany ho anareo, na aiza na aiza honenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ho tena fitsaharana ho anareo io andro io, ary hifadianareo hanina; miantomboka amin’ny harivan’ny andro fahasivin’ny volana ka miafara amin’ny ampitso hariva no hitandremanareo io fitsaharanareo io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.32 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 27-32:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 16; Nom 29.7-11.
    marker-yv: yv-n
  - type: text
    text: .»
