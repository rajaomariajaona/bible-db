document_id: 2KI.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Hazarià mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 26.3-4, 21-23)
  - type: text
    content: 'Tamin’ny taona faha-27 nanjakan’i Jerôbohama tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Hazarià zanakalahin’i Amatsià; '
  '10':
  - type: text
    content: Fa nikomy taminy kosa i Saloma zanakalahin’i Jabesa ka nahafaty azy tao Jiblehama
  - type: note
    content: 'tao Jiblehama: araka ny dkt tranainy grika. Jereo 9.27 sy nta.'
  - type: text
    content: ' ary nanjaka nandimby azy. '
  '11':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Zakarià dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  '12':
  - type: text
    content: 'Izany ilay nolazain’ny TOMPO tamin’i Jehò hoe: «Hitoetra eo amin’ny sezafiandrianan’i Israely hatramin’ny taranaka fahefatra ny taranakao'
  - type: note
    content: Jereo10.30. I Zakarià dia zafin-dohalik’i Jehò.
  - type: text
    content: ', ka dia tanteraka.»'
  - type: heading
    content: I Saloma mpanjakan’i Israely
  '13':
  - type: text
    content: 'Tamin’ny taona faha-39 nanjakan’i Hazarià tamin’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' i Saloma zanakalahin’i Jabesa; ary iray volana ihany no nanjakany tao Samaria. '
  '14':
  - type: text
    content: Fa tonga tao Samaria avy any Tiritsà kosa i Menahema zanakalahin’i Gadỳ ka nahafaty an’i Saloma tao, ary dia nandrombaka ny fahefana.
  '15':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Saloma ary koa ny fiokoany nanohitra an’i Zakarià dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  '16':
  - type: text
    content: Tamin’izay no niala tao Tiritsà i Menahema ka nanafika ny tanànan’i Tifsa, ary nandringana ny mponina tao sy nandrava ny faritaniny manontolo. Rehefa misy tanàna tsy amohana vavahady an’i Menahema, dia tafihiny; ary tatahany koa ny kibon’ny vehivavy bevohòka rehetra ao
  - type: note
    content: 'Tifsa: tanànan’i Palestinina saingy tsy voafaritra mazava ny misy azy (tanàna hafa noho ilay Tifsa any Siria avaratra, jereo 1 Mp 5.4); ny dkt tranainy grika dia manao hoe Tapoa.'
  - type: text
    content: .
  - type: heading
    content: I Menahema, mpanjakan’i Israely
  '17':
  - type: text
    content: 'Tamin’ny taona faha-39 nanjakan’i Hazarià tamin’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' i Menahema zanakalahin’i Gadỳ; ary naharitra folo taona no nanjakany tao Samaria. '
  '18':
  - type: text
    content: Nandritra ny androm-piainany rehetra, dia nanao izay ratsy eo imason’ny TOMPO izy, fa tsy nialany ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita.
  '19':
  - type: text
    content: Niditra an-keriny tao amin’ny tanin’i Israely i Pola mpanjakan’i Asiria
  - type: note
    content: Araka ny tahirin-tsoratra asirianina, i Pola sy i Tiglata-Pilesera (and 29) dia anarana roa manondro olona iray ihany. –Ny fotoana nampahatanjaka fatratra an’i Asiria dia tanelanelan’ny taona 745 sy 612 tal J.K. tany ho any.
  - type: text
    content: '; ka nomen’i Menahema volafotsy telopolo taonina izy mba hanampiany azy hanamafy orina ny fahefàm-panjakany. '
  '2':
  - type: text
    content: 'feno 16 taona izy fony vao nanjaka, ary naharitra 52 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jekôlià izay avy ao Jerosalema ihany. '
  '20':
  - type: text
    content: Mba hahazoana izany volafotsy izany, dia nampandoavin’i Menahema hetra ny mpanankarena rehetra tany Israely, dia sekela volafotsy dimampolo avy mba homena ny mpanjakan’i Asiria. Rehefa nandray izany izy, dia niverina nody fa tsy nijanona teo amin’ny tany.
  '21':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Menahema ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia i Pekahià zanany lahy no nanjaka nandimby azy.
  - type: heading
    content: I Pekahià mpanjakan’i Israely
  '23':
  - type: text
    content: 'Tamin’ny taona fahadimampolo nanjakan’i Hazarià tamin’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' tao Samaria i Pekahià zanakalahin’i Menahema; ary roa taona ihany no nanjakany tao. '
  '24':
  - type: text
    content: 'Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita. '
  '25':
  - type: text
    content: Ary nikomy tamin’i Pekahià i Peka dekàny sady zanakalahin’i Remalià, ka nanafika azy mbamin’i Argôba sy Aria tao amin’ny tilikambon’ny tranon’ny mpanjaka
  - type: note
    content: 'tilikambon’ny tranon’ny mpanjaka: jereo 1 Mp 16.18 sy nta.'
  - type: text
    content: ; tamin’izay i Peka dia nombàn’ny vatan-dehilahy dimampolo taranaky ny Gilehadita; rehefa avy namono an’i Pekahià ho faty izy, dia nanjaka nandimby azy.
  '26':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Pekahià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: heading
    content: I Peka mpanjakan’i Israely
  '27':
  - type: text
    content: 'Tamin’ny taona faha-52 nanjakan’i Hazarià tamin’i Joda no tonga mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' i Peka zanakalahin’i Remalià; ary naharitra roapolo taona no nanjakany tao Samaria. '
  '28':
  - type: text
    content: Nanao izay ratsy eo imason’ny TOMPO izy, satria tsy nialany ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita.
  '29':
  - type: text
    content: Tamin’ny andro nanjakan’i Peka tamin’i Israely no nahatongavan’i Tiglata-Pilesera mpanjakan’i Asiria haka ny tanànan’i Hiôna sy i Abela-Bety-Mahakà mbamin’i Janôka sy i Kedesa ary i Hatsôra; nalainy koa i Gilehada sy i Galilea mbamin’ny tanin’i Naftalỳ
  - type: note
    content: 'mpanjakan’i Asiria: jereo and 19 sy nta. –i Gilehada... Naftalỳ: ny faritra avaratra atsinanana amin’ny fanjakan’i Israely.'
  - type: text
    content: ' manontolo, ary dia nataony sesitany tany Asiria ny mponin’ireo. '
  '3':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO i Hazarià, tahaka izay rehetra nataon’i Amatsià rainy; '
  '30':
  - type: text
    content: Fa nikomy tamin’i Peka zanakalahin’i Remalià i Hôsea zanakalahin’i Elà ka nahafaty azy; ary nanjaka nandimby azy izy tamin’ny taona faharoapolo nanjakan’i Jôtama zanakalahin’i Hozià.
  '31':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Peka ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: heading
    content: I Jôtama mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 27.1-3, 7-9)
  '32':
  - type: text
    content: 'Tamin’ny taona faharoa nanjakan’i Peka zanakalahin’i Remalià tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' no tonga mpanjakan’i Joda i Jôtama zanakalahin’i Hazarià. '
  '33':
  - type: text
    content: 'Feno 25 taona izy fony nanjaka; ary naharitra 16 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Jerosà zanakavavin’i Tsadôka. '
  '34':
  - type: text
    content: 'Nanao izay mahitsy eo imason’ny TOMPO i Jôtama, tahaka izay rehetra nataon’i Hozià rainy. '
  '35':
  - type: text
    content: 'Kanefa ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' tsy noravany ka mbola nanao sorona sy nandoro azy hanetona teny ihany ny olona.'
  - type: text
    content: 'I Jôtama no nanamboatra ny vavahady ambony tamin’ny '
  - type: text
    content: tranon’ny TOMPO
  - type: note
    content: 'vavahady ambony: ity angamba ilay voalaza ao amin’ny Jer 20.2 sy Ezek 9.2.'
  - type: text
    content: .
  '36':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôtama ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Tamin’ny andro nanjakan’i Jôtama no nanombohan’ny TOMPO nandefa an’i Retsina mpanjakan’i Siria sy i Peka mpanjakan’i Israely hanafika an’i Joda
  - type: note
    content: Momba an’i Retsina sy i Peka dia jereo Is 7–8.
  - type: text
    content: '. '
  '38':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany i Jôtama, dia nalevina tao amin’ny fasam-pianakaviany tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; ary i Ahaza zanany lahy no nanjaka nandimby azy.
  '4':
  - type: text
    content: nefa tsy mba nofoanany ny toeram-panasinana, ka mbola nanao sorona sy nandoro azy hanetona teny ihany ny olona.
  '5':
  - type: text
    content: 'Namely ny mpanjaka tamin’ny aretina ny TOMPO; ka tonga '
  - type: text
    content: boka
  - type: text
    content: ' mandra-pahafatiny izy ary voatery nitoka-monina tao amin’ny trano anankiray. Ka dia i Jôtama, zanany lahy sady efa mpifehy ny tao an-dapa no nitondra ny tany sy ny fanjakana.'
  '6':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Hazarià ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
