document_id: ECC.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Misy fotoany ny zava-drehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zava-drehetra dia samy misy vaninandro voatendry ho azy avy; ary samy manana ny fotoany avy ny raharaha rehetra eto ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misy ny fotoana ahaterahana ary misy ny fotoana ahafatesana; misy fotoana ambolena ary misy fotoana anongotana ny nambolena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'misy fotoana amonoana ary misy fotoana itsaboana; misy fotoana andravana ary misy fotoana ananganana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Misy fotoana itomaniana ary misy fotoana ihomehezana; misy fotoana isentoana ary misy fotoana andihizana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Misy fotoana anariam-bato ary misy fotoana anangonam-bato; misy fotoana anorohana ary misy fotoana ifadiam-panorohana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Misy fotoana itadiavana ary misy fotoana ahaverezana; misy fotoana itahirizana ary misy fotoana anariana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'misy fotoana androvitana ary misy fotoana anjairana. Misy fotoana anginana ary misy fotoana itenenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Misy fotoana itiavana ary misy fotoana ankahalana; misy fotoana iadiana ary misy fotoana ihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Inona no tombontsoa azon’ny mpiasa amin’izay isasarany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nodinihiko ny asa asain’Andriamanitra hilofosan’ny olona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa nataon’Andriamanitra ho tsara amin’ny fotoany avy ny zava-drehetra. Nomeny antsika koa ny fanirian-kahafantatra ny lasa sy ny hoavy. Nefa tsy ho fantatry ny olombelona ny asan’Andriamanitra ankapobe hatramin’ny voalohany ka hatramin’ny farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fantatro araka izany fa ny mifaly sy ny manao izay hahasoa finaritra azy ihany no tsara ho an’ny olona, raha mbola velona koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary koa, raha mihinana sy misotro ka mahatsiaro sambatra amin’ny asany rehetra ny olona, dia fanomezan’Andriamanitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fantatro fa izay rehetra ataon’Andriamanitra dia haharitra mandrakizay; tsy misy anampiana na anesorana izany fa nataony mba hanajan’ny olona Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 1.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay rehetra mitranga amin’izao fotoana izao sy izay mbola ho avy dia efa nisy tamin’ny lasa. Ataon’Andriamanitra miverimberina ny zava-mitranga.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miafara amin’ny fahafatesana avokoa ny zava-drehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao koa no zavatra hitako teto ambonin’ny tany: ny toerana tokony hampiharana ny rariny sy ny fahamarinana no anjakan’ny faharatsiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy aho anakampoko: «Samy hotsarain’Andriamanitra avy ny olo-marina sy ny olon-dratsy, satria misy fotoany avokoa ny zava-drehetra mbamin’ny asa rehetra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny amin’ny olombelona dia nihevitra aho fa ampandalovin’Andriamanitra fitsapana izy mba hahitany fa raha ny tenany ihany, dia tsy mifankaiza amin’ny biby izy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mitovy amin’ny fiafaran’ny biby ihany ny fiafaran’ny olona. Fofonaina mitovy no mamelona ny olona sy ny biby ka tsy maintsy ho faty izy roa tonta. Tsy manana hamboniana eo anatrehan’ny biby ny olona, satria zava-poana ny zava-drehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 49.13, 21.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mitovy avokoa ny fiafaràn’ny mananaina rehetra fa samy hody vovoka izy satria vovoka no nanaovana azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 3.19; Sal 104.29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy misy afaka manamarina fa ny fofonain’ny olona dia miakatra any ambony ary ny an’ny biby kosa dia midina any ambany, ao anaty tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsapako fa tsy misy tsara ho an’ny olombelona afa-tsy ny mifaly amin’ny vokatry ny asany. Tokony hionona amin’izany anjarany izany izy, satria tsy misy hampahita azy izay hitranga any aoriany.
