document_id: ECC.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Misy fotoany ny zava-drehetra
  - type: text
    content: 'Ny zava-drehetra dia samy misy vaninandro voatendry ho azy avy; ary samy manana ny fotoany avy ny raharaha rehetra eto ambonin’ny tany. '
  '10':
  - type: text
    content: 'Nodinihiko ny asa asain’Andriamanitra hilofosan’ny olona; '
  '11':
  - type: text
    content: 'fa nataon’Andriamanitra ho tsara amin’ny fotoany avy ny zava-drehetra. Nomeny antsika koa ny fanirian-kahafantatra ny lasa sy ny hoavy. Nefa tsy ho fantatry ny olombelona ny asan’Andriamanitra ankapobe hatramin’ny voalohany ka hatramin’ny farany. '
  '12':
  - type: text
    content: 'Fantatro araka izany fa ny mifaly sy ny manao izay hahasoa finaritra azy ihany no tsara ho an’ny olona, raha mbola velona koa izy. '
  '13':
  - type: text
    content: 'Ary koa, raha mihinana sy misotro ka mahatsiaro sambatra amin’ny asany rehetra ny olona, dia fanomezan’Andriamanitra izany. '
  '14':
  - type: text
    content: Fantatro fa izay rehetra ataon’Andriamanitra dia haharitra mandrakizay; tsy misy anampiana na anesorana izany fa nataony mba hanajan’ny olona Azy
  - type: note
    content: Jereo Oha 1.7 sy nta.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Izay rehetra mitranga amin’izao fotoana izao sy izay mbola ho avy dia efa nisy tamin’ny lasa. Ataon’Andriamanitra miverimberina ny zava-mitranga.
  - type: heading
    content: Miafara amin’ny fahafatesana avokoa ny zava-drehetra
  '16':
  - type: text
    content: 'Izao koa no zavatra hitako teto ambonin’ny tany: ny toerana tokony hampiharana ny rariny sy ny fahamarinana no anjakan’ny faharatsiana. '
  '17':
  - type: text
    content: 'Hoy aho anakampoko: «Samy hotsarain’Andriamanitra avy ny olo-marina sy ny olon-dratsy, satria misy fotoany avokoa ny zava-drehetra mbamin’ny asa rehetra.» '
  '18':
  - type: text
    content: 'Ny amin’ny olombelona dia nihevitra aho fa ampandalovin’Andriamanitra fitsapana izy mba hahitany fa raha ny tenany ihany, dia tsy mifankaiza amin’ny biby izy akory. '
  '19':
  - type: text
    content: Mitovy amin’ny fiafaran’ny biby ihany ny fiafaran’ny olona. Fofonaina mitovy no mamelona ny olona sy ny biby ka tsy maintsy ho faty izy roa tonta. Tsy manana hamboniana eo anatrehan’ny biby ny olona, satria zava-poana ny zava-drehetra
  - type: note
    content: Jereo Sal 49.13, 21.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Misy ny fotoana ahaterahana ary misy ny fotoana ahafatesana; misy fotoana ambolena ary misy fotoana anongotana ny nambolena; '
  '20':
  - type: text
    content: Mitovy avokoa ny fiafaràn’ny mananaina rehetra fa samy hody vovoka izy satria vovoka no nanaovana azy
  - type: note
    content: Jereo Gen 3.19; Sal 104.29.
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Tsy misy afaka manamarina fa ny fofonain’ny olona dia miakatra any ambony ary ny an’ny biby kosa dia midina any ambany, ao anaty tany. '
  '22':
  - type: text
    content: Tsapako fa tsy misy tsara ho an’ny olombelona afa-tsy ny mifaly amin’ny vokatry ny asany. Tokony hionona amin’izany anjarany izany izy, satria tsy misy hampahita azy izay hitranga any aoriany.
  '3':
  - type: text
    content: 'misy fotoana amonoana ary misy fotoana itsaboana; misy fotoana andravana ary misy fotoana ananganana. '
  '4':
  - type: text
    content: 'Misy fotoana itomaniana ary misy fotoana ihomehezana; misy fotoana isentoana ary misy fotoana andihizana. '
  '5':
  - type: text
    content: 'Misy fotoana anariam-bato ary misy fotoana anangonam-bato; misy fotoana anorohana ary misy fotoana ifadiam-panorohana. '
  '6':
  - type: text
    content: 'Misy fotoana itadiavana ary misy fotoana ahaverezana; misy fotoana itahirizana ary misy fotoana anariana; '
  '7':
  - type: text
    content: 'misy fotoana androvitana ary misy fotoana anjairana. Misy fotoana anginana ary misy fotoana itenenana. '
  '8':
  - type: text
    content: Misy fotoana itiavana ary misy fotoana ankahalana; misy fotoana iadiana ary misy fotoana ihavanana.
  '9':
  - type: text
    content: 'Inona no tombontsoa azon’ny mpiasa amin’izay isasarany? '
