document_id: AMO.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ianareo andriambavilanitr’i Samaria,
  - type: text
    content: 'izay mihamatavy tahaka ny ombivavin’i '
  - type: text
    content: Basàna
  - type: text
    content: ','
  - type: text
    content: 'henoy izao teniko izao:'
  - type: text
    content: Manitsakitsaka ny madinika ianareo,
  - type: text
    content: sy mampahory ny mahantra,
  - type: text
    content: 'ary milaza amin’ny vadinareo hoe:'
  - type: text
    content: «Mitondrà hosotrointsika!»
  '10':
  - type: text
    content: Nalefako teo aminareo ny pesta mpamely biby fiompy
  - type: text
    content: tahaka ny pesta nalefako tany Ejipta
  - type: note
    content: Jereo Eks 9.3.
  - type: text
    content: ;
  - type: text
    content: novonoiko ho faty tamin’ny sabatra ny zatovolahinareo,
  - type: text
    content: sady nobaboina koa ny soavalinareo;
  - type: text
    content: ary nampiakariko hatrany am-bavoronareo
  - type: text
    content: ny hamaimbon’ny faty ao an-tobinareo;
  - type: text
    content: nefa tsy niverina tamiko ihany ianareo;
  - type: text
    content: teny hentitry ny TOMPO izany.
  '11':
  - type: text
    content: Efa natsimbadiko ambony ambany ny tao aminareo
  - type: text
    content: tahaka izay nataoko tamin’i Sôdôma sy Gômôra
  - type: note
    content: Jereo Gen 19.24-25.
  - type: text
    content: ;
  - type: text
    content: ka ianareo izao dia toy ny tapa-porohana
  - type: text
    content: nosarihina avy ao amin’ny afo
  - type: text
    content: nefa tsy niverina tamiko ihany ianareo;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  '12':
  - type: text
    content: Koa dia hisy sazy hataoko aminao, ry Israely;
  - type: text
    content: ary rehefa izany no hataoko aminao,
  - type: text
    content: dia miomàna ianao hihaona amin’Andriamanitrao
  - type: note
    content: 'miomàna...Andriamanitrao: dkt hafa miomàna ianao hiseho fitsarana eo anatrehan’Andriamanitrao.'
  - type: text
    content: .»
  '13':
  - type: text
    content: Satria tandremo fa Izy no mpamorona ny tendrombohitra
  - type: text
    content: sy mpahary ny rivotra,
  - type: text
    content: Izy no manambara amin’ny olombelona ny fikasany,
  - type: text
    content: mahatonga ny maraina ho haizina
  - type: text
    content: 'sady mandeha eny am-paratampon’ny tany:'
  - type: text
    content: Ny TOMPO Andriamanitr’izao rehetra izao no anarany.
  '2':
  - type: text
    content: 'Izany no ianianan’ny Tompo ANDRIANANAHARY hoe:'
  - type: text
    content: «Noho ny fahamasinako dia manizingizina Aho,
  - type: text
    content: fa indro ho avy aminareo ny andro
  - type: text
    content: izay hitarihana amin’ny farango
  - type: text
    content: ny tenanareo sy ny mpanotrona anareo.
  '3':
  - type: text
    content: Ary eo amin’izay banga tandrify anareo avy
  - type: text
    content: no hivoahanareo ny tanàna,
  - type: text
    content: dia horoahina ho any Hermôna
  - type: note
    content: 'any Hermôna: tsy mazava ny RM; dkt hafa any avaratra. Ny dkt Siriàka sy ny Targoma dia manao hoe any Armenia. –Momba ny 4.1-3: jereo Mi 2.1-5; 3.1-4.'
  - type: text
    content: ' ianareo.'
  - type: text
    content: Teny hentitra avy amiko TOMPO izany.
  - type: heading
    content: Fiampangana ny sarintsarim-pivavahana
  '4':
  - type: text
    content: 'Izao no teny hentitry Tompo ANDRIANANAHARY:'
  - type: text
    content: «Mankanesa any Betela, ry taranak’i Israely,
  - type: text
    content: ka manotà ianareo;
  - type: text
    content: mankanesa any Gilgala
  - type: note
    content: 'Betela: jereo 3.14 sy nta. –Gilgala: toeramasina tao an-dohasahan’i Jôrdàna; ny mampaningana azy dia ireo vato 12 natsangana tao (jereo Jos 4.20).'
  - type: text
    content: ','
  - type: text
    content: ka ampitomboy ny helokareo.
  - type: text
    content: 'Ento ny '
  - type: text
    content: soronareo
  - type: text
    content: ' ny ampitson’ny ahatongavana,'
  - type: text
    content: ary ny fahafolon-karenareo ny afakampitso.
  '5':
  - type: text
    content: 'Dory hanetona eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: 'ny mofo misy '
  - type: text
    content: leviora
  - type: text
    content: ' fanati-pisaoranareo'
  - type: note
    content: 'fanao fanati-pisaorana: jereo Lev 7.13. –Momba ny and 4-5: jereo Is 1.11-15; Hôs 7.10-16.'
  - type: text
    content: ;
  - type: text
    content: ary ataovy antso avo ampahibemaso
  - type: text
    content: ny fanatitra an-tsitrapo ataonareo,
  - type: text
    content: satria izany no tianareo.
  - type: heading
    content: Tsy misy vokany ireo fampitandremana
  '6':
  - type: text
    content: Izaho mihitsy no efa nahatonga mosary
  - type: text
    content: tao amin’ny tanànanareo rehetra,
  - type: text
    content: ary tsy fahampian-tsakafo
  - type: text
    content: tao amin’ny fonenanareo rehetra;
  - type: text
    content: nefa tsy niverina tamiko ihany ianareo;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  '7':
  - type: text
    content: Izaho mihitsy no efa nampihantona ny orana
  - type: text
    content: tsy ho eo aminareo,
  - type: text
    content: raha mbola telo volana mialoha ny fararano.
  - type: text
    content: Ka tamin’ny tanàna anankiray nandatsahako orana,
  - type: text
    content: fa tamin’ny tanàna iray kosa tsy nandatsahako;
  - type: text
    content: ny saha anankiray nilatsahan’ny orana,
  - type: text
    content: fa ny saha iray kosa tsy mba nilatsahany ka maina.
  '8':
  - type: text
    content: Nivembena nankao amin’ny tanàna iray
  - type: text
    content: ny mponina tamin’ny tanàna roa na telo
  - type: text
    content: mba hisotro rano tsy nahafa-ketaheta,
  - type: text
    content: nefa tsy niverina tamiko ihany ianareo;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
  '9':
  - type: text
    content: Nasiako tamin’ny vary main’ny rivotra
  - type: text
    content: sy maty fotsy ianareo;
  - type: text
    content: nofongorako
  - type: note
    content: 'nofongorako: voambolana heverina ho mitombina; ny RM dia midika hoe mampitombo.'
  - type: text
    content: ny zaridainanareo sy ny voalobokareo,
  - type: text
    content: nohanin’ny valala ny aviavinareo sy ny ôlivanareo,
  - type: text
    content: nefa tsy niverina tamiko ihany ianareo;
  - type: text
    content: teny hentitra avy amiko TOMPO izany.
