document_id: JER.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nodoran’i Jôiakima ny horonan-taratasy nosoratan’i Baròka
  - type: text
    content: Tamin’ny taona fahefatra nanjakàn’i Jôiakima zanakalahin’i Josià sady mpanjakan’i Joda
  - type: note
    content: 'Taona fahefatra nanjakàn’i Jôiakima: jereo 22.13; 25.1 sy nta.'
  - type: text
    content: ', no tonga tamin’i Jeremià izao teny avy tamin’ny TOMPO izao nanao hoe: '
  '10':
  - type: text
    content: Koa teo imason’ny olona rehetra vory tao an-tranon’ny TOMPO no namakian’i Baròka mafy ny hafatr’i Jeremià voasoratra tao amin’ny horonan-taratasy. Teo amin’ny efitrano natokana ho an’i Gemarià, zanakalahin’i Safàna izay mpitantsora-panjakana taloha, no nakany toerana fa io efitra io dia teo an-kianja ambony, akaikin’ny vavahady vaovao amin’ny tranon’ny TOMPO.
  '11':
  - type: text
    content: 'Nony avy nandre ny tenin’ny TOMPO rehetra izay novakin’i Baròka tao amin’ny horonan-taratasy i Mikaià, zanakalahin’i Gemarià sy zafikelin’i Safàna, '
  '12':
  - type: text
    content: 'dia nidina tao an-dapan’ny mpanjaka ary tonga amin’ny biraon’ny mpitantsora-panjakana. Nivory tao avokoa ny mpitondra fanjakana ambony: i Elisamà mpitantsora-panjakana, i Delaià zanakalahin’i Semahià, i Elnatàna zanakalahin’i Hakbôra, i Gemarià zanakalahin’i Safàna, i Tsedekià zanakalahin’i Hananià sy ireo mpitondra fanjakana hafa rehetra. '
  '13':
  - type: text
    content: Notantarain’i Mikaià azy ny teny rehetra reny avy fony i Baròka namaky mafy teo anatrehan’ny olona rehetra ny hafatra voasoratra tao amin’ny horonan-taratasy.
  '14':
  - type: text
    content: 'Koa naniraka an’i Jehodỳ, zanakalahin’i Netanià sy zafikelin’i Selemià sady zafiafin’i Kosy ireo mpitondra fanjakana ireo mba hiantso an’i Baròka ho tonga ao aminy miaraka amin’ny horonan-taratasy eny am-pelatanany. Dia nentin’i Baròka ny horonan-taratasy ary nankany aminy izy. '
  '15':
  - type: text
    content: 'Ary hoy ireo tamin’i Baròka:'
  - type: text
    content: –Mipetraha ianao, ary vakio aminay iny horonan-taratasy iny.
  - type: text
    content: 'Dia novakîny taminy izany. '
  '16':
  - type: text
    content: 'Nony ren’ireto mpitondra fanjakana ny teny rehetra, dia nifampijerijery tamin-tahotra izy ka nilaza tamin’i Baròka hoe:'
  - type: text
    content: –Tsy maintsy ampitainay amin’ny mpanjaka izany teny rehetra izany.
  '17':
  - type: text
    content: 'Ary nanontany an’i Baròka ireo hoe:'
  - type: text
    content: –Mba hazavao aminay ny fomba nanoratanao ireo hafatra rehetra ireo?
  '18':
  - type: text
    content: 'Dia novalian’i Baròka hoe:'
  - type: text
    content: –I Jeremià no nanonona tamiko ireo hafatra rehetra ireo, ary izaho kosa no nanoratra azy tamin’ny ranomainty teo amin’ny horonan-taratasy.
  '19':
  - type: text
    content: 'Dia hoy ireo mpitondra fanjakana ambony tamin’i Baròka:'
  - type: text
    content: –Mandehàna miafina ianao sy i Jeremià, ka aoka tsy hisy hahalala izay misy anareo!
  '2':
  - type: text
    content: '«Makà horonan-taratasy ianao, ka soraty ao ny hafatra rehetra izay nampitondraiko anao ny amin’ny fanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy ny fanjakan’i Joda ary ireo firenen-kafa rehetra, hatreo amin’ny andron’i Josià fony Aho vao nanomboka niteny taminao ka mandraka androany. '
  '20':
  - type: text
    content: Dia navelan’ireo tao amin’ny biraon’i Elisamà mpitantsora-panjakana ny horonan-taratasy fa lasa izy nankeo an-kianjan’ny lapa mba hitantara amin’ny mpanjaka ny zavatra rehetra niseho.
  '21':
  - type: text
    content: 'Dia naniraka an’i Jehodỳ ny mpanjaka mba haka ilay horonan-taratasy tao amin’ny biraon’i Elisamà. Koa nalain’i Jehodỳ ny horonan-taratasy ary novakîny mafy teo anatrehan’ny mpanjaka sy ireo mpitondra fanjakana ambony rehetra izay nipetraka teo anilany. '
  '22':
  - type: text
    content: 'Satria volana fahasivy tamin’izay dia nipetraka tao amin’ny trano fandaniany ny ririnina ny mpanjaka, ary nisy afo nirehitra teo am-patana teo anoloany. '
  '23':
  - type: text
    content: 'Koa isaky ny mahavaky toko telo na efatra i Jehodỳ, dia notapatapahin’ny mpanjaka tamin’ny antsipîka ireny ka natsipiny tao anaty afo; koa farany dia tapitra may avokoa ny horonan-taratasy manontolo. '
  '24':
  - type: text
    content: Takatry ny mpanjaka sy ireo manamboninahiny tokoa ny hafatra voasoratra tao amin’ny horonan-taratasy, nefa tsy nampiseho tahotra na mariky ny alahelo akory izy
  - type: note
    content: mariky ny alahelo na tsy nandriatra ny fitafiany* akory izy.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Ary na dia niangavy mafy tamin’ny mpanjaka aza i Elnatàna sy i Delaià ary i Gemarià mba tsy handoroany ny horonan-taratasy, dia tsy nohenoiny; '
  '26':
  - type: text
    content: fa vao mainka aza nomeny baiko i Jerahimèla, andriana
  - type: note
    content: andriana na manamboninahitry ny mpiambina. Jereo 38.6; 1 Mp 22.26-27; 2 Tan 28.7.
  - type: text
    content: ' zanakalahin’ny mpanjaka, sy i Seraià zanakalahin’i Hazriela sy i Selemià zanakalahin’i Habdèla mba hisambotra an’i Baròka mpanoratra sy i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ; saingy ny TOMPO efa nanafina azy roa lahy.
  '27':
  - type: text
    content: 'Taorian’ny nandoroan’ny mpanjaka ny horonan-taratasy nisy ny hafatra rehetra izay nosoratan’i Baròka avy tamin’ny fanononan’i Jeremià, dia tonga tamin’i Jeremià ny baikon’ny TOMPO nanao hoe:'
  '28':
  - type: text
    content: '«Makà horonan-taratasy iray hafa ianao ka soraty ao ireo hafatra rehetra tamin’ny horonan-taratasy voalohany izay nodoran’i Jôiakima mpanjakan’i Joda. '
  '29':
  - type: text
    content: 'Avy eo ny amin’i Jôiakima, mpanjakan’i Joda, dia hataonao hoe: ‹Izao no lazain’ny TOMPO: Nosoratan’i Jeremià tamin’ny horonan-taratasy fa tsy maintsy ho avy ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ', ka handrava ity tany ity ary handringana ny olona sy ny biby fiompy eo; kanefa nanakiana azy i Jôiakima sady nandoro ny horonan-taratasy. '
  '3':
  - type: text
    content: Angamba hahatakatra ny fikasàko handefa loza aminy ny olon’i Joda, ka samy hiala amin’ny fitondrantena ratsiny, dia havelako ny heloka amam-pahotany.»
  '30':
  - type: text
    content: 'Koa izao no lazaiko ny amin’i Jôiakima mpanjakan’i Joda: Tsy hanana zanakalahy hanjaka handimby azy eo amin’ny sezafiandrianan’i Davida i Jôiakima; ary hariana ny fatiny ka hianjadian’ny hafanana amin’ny antoandro sy ny hatsiaka amin’ny alina'
  - type: note
    content: izany hoe tsy halevina am-pomba manetriketrika; jereo ny naoty momba ny 8.2.
  - type: text
    content: '. '
  '31':
  - type: text
    content: Hirotsaka an-tsehatra hamely azy sy ny taranany ary ny manamboninahiny Aho noho ny heloka nataony. Hampihariko aminy sy amin’ny mponina eto Jerosalema ary amin’ny olon’i Joda ny loza rehetra izay efa nambarako taminy nefa tsy nahoany akory.› »
  '32':
  - type: text
    content: Dia naka horonan-taratasy iray hafa i Jeremià ka nomeny an’i Baròka, zanakalahin’i Nera sady mpanoratra. Ary nosoratany tao izay notononin’i Jeremià, dia ireo hafatra rehetra izay efa tao amin’ilay boky nodoran’i Jôiakima mpanjakan’i Joda; sady mbola niampy hafatra maro tahaka ireny koa.
  '4':
  - type: text
    content: Dia niantso an’i Baròka zanakalahin’i Nerià i Jeremià, ka nanonona taminy ny hafatra rehetra izay nampitondrain’ny TOMPO azy; ary nosoratan’i Baròka tamin’ny horonan-taratasy ireny.
  '5':
  - type: text
    content: 'Avy eo dia nandidy an’i Baròka i Jeremià hoe: «Sakanana tsy hiditra ao an-'
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ' aho, ka tsy afaka mankany ny tenako. '
  '6':
  - type: text
    content: 'Fa ianao kosa, mankanesa ao amin’ny andron’ny '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ', dia vakio mafy ao ny hafatry ny TOMPO izay efa notononiko ka efa voasoratrao, ary ataovy ren’ny olona ao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' mbamin’izay rehetra tonga avy amin’ireo tanànan’i Joda izany. '
  '7':
  - type: text
    content: Angamba hamboraka fifonana amin’ny TOMPO izy ary hiala amin’ny fitondrantena ratsy; satria efa nilaza ny TOMPO fa tena tezitra sy vinitra tamin’ity vahoaka ity.»
  '8':
  - type: text
    content: 'Dia nataon’i Baròka izay rehetra nandidian’i Jeremià mpaminany azy, ka nankao an-tranon’ny TOMPO izy ary namaky mafy ny hafatry ny TOMPO voasoratra tao amin’ny horonan-taratasy. '
  '9':
  - type: text
    content: Tamin’ny volana fahasivy, taona fahadimy nanjakàn’i Jôiakima, zanakalahin’i Josià sady mpanjakan’i Joda
  - type: note
    content: Ny volana fahasivy dia mifanandrify amin’ny volana Nôvambra na Desambra, ka fotoanan’ny hatsiaka any Palestinina (jereo and 22 sy ny FTS amin’ny voambolana hoe FANISANANDRO).
  - type: text
    content: ', no nisehoan’izany, raha nantsoina hanao fifadian-kanina teo anatrehan’ny TOMPO ny mponina rehetra tao Jerosalema sy ny olona rehetra avy amin’ireo tanànan’i Joda. '
