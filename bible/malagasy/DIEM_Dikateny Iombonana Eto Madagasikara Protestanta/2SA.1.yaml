document_id: 2SA.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida mandre ny nahafatesan’i Saoly
  - type: text
    content: Taorian’ny nahafatesan’i Saoly, dia niverina tao Tsiklaga i Davida ka nijanona roa andro tao rehefa avy nandresy ny Hamalekita
  - type: note
    content: 'ny nahafatesan’i Saoly: jereo 1 Sam 31.4-5. –Tsiklaga: jereo 1 Sam 27.6 sy nta. –rehefa avy nandresy...: jereo 1 Sam 30.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Nohatoniko izy ary novonoiko ho faty, satria fantatro fa tsy ho velona amin’ny ratra nahazo azy izy. Koa nalaiko ny satroboninahitra teny an-dohany sy ny haba teny an-tsandriny ka ireto nentiko atỳ aminao ireto, tompoko.
  '11':
  - type: text
    content: 'Notriarin’i Davida ny fitafiany ary mba nanao tahaka izany koa ny olony rehetra izay teo. '
  '12':
  - type: text
    content: 'Mandra-paharivan’ny andro izy ireo dia nitomany sy '
  - type: text
    content: nifady hanina
  - type: text
    content: ' ary nisaona an’i Saoly sy i Jônatàna zanany mbamin’ny Israelita izay maty an’ady ka anisan’ny vahoakan’ny TOMPO. '
  '13':
  - type: text
    content: 'Ary hoy i Davida tamin’ilay zatovo mpilaza vaovao:'
  - type: text
    content: –Fa mba iza moa ianao?
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Zanaky ny Hamalekita mpifindra monina aho, tompoko.
  '14':
  - type: text
    content: 'Dia hoy i Davida taminy:'
  - type: text
    content: –Ahoana no nahasahianao naninji-tanana ka nahafaty ny mpanjaka voafidin’ny TOMPO?
  '15':
  - type: text
    content: 'Ary niantso ny mpanompony anankiray i Davida ka nibaiko azy hoe:'
  - type: text
    content: –Mandehana vonoy any ilehio!
  - type: text
    content: 'Dia nasiany izy ka maty. '
  '16':
  - type: text
    content: 'Ary hoy i Davida taminy:'
  - type: text
    content: '–Nandrora mitsilany ianao izao ka nahavoa tena. Ny vavanao ihany no nanameloka anao ho faty raha nanao hoe: «Izaho no namono ho faty ny mpanjaka voafidin’ny TOMPO.»'
  - type: heading
    content: Kalo fisaonan’i Davida an’i Saoly sy i Jônatàna
  '17':
  - type: text
    content: 'Namorona izao hira fisaonana an’i Saoly sy i Jônatàna zanany izao i Davida, '
  '18':
  - type: text
    content: ka nasainy nampianarina ny mponin’i Joda. Indro ny «Hira fisaonana atao hoe Tsipîka» araka ny voasoratra ao amin’ny Bokin’ilay Marina
  - type: note
    content: 'Bokin’Ilemahitsy: jereo Jos 10.13 sy nta.'
  - type: text
    content: .
  '19':
  - type: text
    content: Ry Israely ô, ireo mpiady reharehanao
  - type: text
    content: dia mitsitra eny an-tampon-kavoanao.
  - type: text
    content: Indrisy fa maty ireo mahery fo!
  '2':
  - type: text
    content: 'Tamin’ny andro fahatelo, nisy lehilahy iray tonga avy any amin’ny tobin’i Saoly. '
  - type: text
    content: Triatriatra ny akanjony
  - type: text
    content: ' ary feno tany ny lohany. Koa rehefa mby teo amin’i Davida izy, dia niankohoka tamin’ny tany. '
  '20':
  - type: text
    content: Aza aely any Gata izany vaovao izany
  - type: text
    content: na torina eny an-dalamben’i Askelôna
  - type: note
    content: 'Gata, Askelôna: jereo 1 Sam 5.8; 6.17 sy nta.'
  - type: text
    content: ','
  - type: text
    content: fandrao hifalian’ny vehivavin’ny Filistinina
  - type: text
    content: na hibitahan’ny tovovavin’ny mpanompo sampy.
  '21':
  - type: text
    content: Ianareo tendrombohitr’i Gilbôa
  - type: note
    content: 'Tendrombohitr’i Gilbôa: jereo 1 Sam 28.4 sy nta.'
  - type: text
    content: ','
  - type: text
    content: aza misy ando na orana intsony eo aminareo
  - type: text
    content: na koa saha be vokatra hangalam-panatitra,
  - type: text
    content: satria teo no nahafa-baràka ny ampingan’ny mahery fo,
  - type: text
    content: dia ny ampingan’i Saoly tsy hihoso-diloilo intsony.
  '22':
  - type: text
    content: Teo anoloan’ny ran’ireo Filistinina nitsitra,
  - type: text
    content: ny tsipîkan’i Jônatàna tsy mba nihemotra;
  - type: text
    content: teo anoloan’ny hatomadin’ireo fahavalo mahery fo,
  - type: text
    content: ny sabatr’i Saoly tsy niveri-maina.
  '23':
  - type: text
    content: I Saoly sy i Jônatàna dia nifankatia tokoa fahavelony,
  - type: text
    content: ary tsy nosarahina na dia tamin’ny nahafatesany aza;
  - type: text
    content: mailaka noho ny voromahery izy mianaka
  - type: text
    content: ary mahery fo mihoatra noho ny liona.
  '24':
  - type: text
    content: Ianareo vehivavy israelita,
  - type: text
    content: mitomania an’i Saoly
  - type: text
    content: izay nampitafy jaky kanto anareo
  - type: text
    content: sady nandravaka volamena ny fitafianareo.
  '25':
  - type: text
    content: Indrisy fa maty an’ady ireo maherifo
  - type: text
    content: ary i Jônatàna mitsitra eny an-tampon-kavoanao!
  '26':
  - type: text
    content: Malahelo anao aho, ry Jônatàna rahalahiko;
  - type: text
    content: eny, nankamamiko fatratra ianao.
  - type: text
    content: Mahatalanjona ahy ny fitiavanao,
  - type: text
    content: fa sarobidy noho ny fitiavan’ny vehivavy.
  '27':
  - type: text
    content: Indrisy fa maty ireo maherifo,
  - type: text
    content: ary very ny fitaovam-piadiana?
  '3':
  - type: text
    content: 'Ary nanontany azy i Davida hoe:'
  - type: text
    content: –Avy taiza moa ianao?
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Avy nandositra ny tobin’i Israely aho, tompoko.
  '4':
  - type: text
    content: 'Ka hoy indray i Davida taminy:'
  - type: text
    content: –Fa nanao ahoana avy ny zava-niseho tany? Mba tantarao amiko.
  - type: text
    content: 'Dia hoy izy hoe:'
  - type: text
    content: –Nitsoaka nandositra ny tafik’i Israely ary betsaka ny miaramila maty. Ary i Saoly sy i Jônatàna zanany koa samy maty.
  '5':
  - type: text
    content: 'Hoy ihany i Davida tamin’ilay zatovo mpilaza vaovao:'
  - type: text
    content: –Ahoana no nahafantaranao fa maty i Saoly sy i Jônatàna zanany?
  '6':
  - type: text
    content: 'Ka novalian’ilay tovolahy hoe:'
  - type: text
    content: –Sendra teo an-tendrombohitra Gilbôa
  - type: note
    content: 'Tendrombohitra Gilbôa: jereo 1 Sam 28.4 sy nta.'
  - type: text
    content: ' aho, raha nahita an’i Saoly nitehina tamin’ny lefony; ary efa nanakaiky azy tamin’izay ny kalesy sy ny mpitaingin-tsoavalin’ny fahavalo. '
  '7':
  - type: text
    content: 'Dia niherika izy ka nahita ahy; nantsoiny aho, ary hoy aho taminy: «Inty aho, tompoko!» '
  '8':
  - type: text
    content: Dia nanontany ny amiko izy, ka nolazaiko azy fa Hamalekita
  - type: note
    content: 'Hamalekita: jereo Eks 17.8 sy nta.'
  - type: text
    content: ' aho. '
  '9':
  - type: text
    content: 'Koa nasainy nanatona aho mba hamono azy ho faty satria naratra mafy izy na dia mbola mahatsiaro tena tsara aza. '
