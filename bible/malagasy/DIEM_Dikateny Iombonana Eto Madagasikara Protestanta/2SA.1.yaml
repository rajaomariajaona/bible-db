document_id: 2SA.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Davida mandre ny nahafatesan’i Saoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taorian’ny nahafatesan’i Saoly, dia niverina tao Tsiklaga i Davida ka nijanona roa andro tao rehefa avy nandresy ny Hamalekita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny nahafatesan’i Saoly: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 31.4-5. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Tsiklaga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo 1 Sam 27.6 sy nta. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: rehefa avy nandresy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '...: jereo 1 Sam 30.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nohatoniko izy ary novonoiko ho faty, satria fantatro fa tsy ho velona amin’ny ratra nahazo azy izy. Koa nalaiko ny satroboninahitra teny an-dohany sy ny haba teny an-tsandriny ka ireto nentiko atỳ aminao ireto, tompoko.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notriarin’i Davida ny fitafiany ary mba nanao tahaka izany koa ny olony rehetra izay teo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandra-paharivan’ny andro izy ireo dia nitomany sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nifady hanina
    - type: text
      text: ' ary nisaona an’i Saoly sy i Jônatàna zanany mbamin’ny Israelita izay maty an’ady ka anisan’ny vahoakan’ny TOMPO. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida tamin’ilay zatovo mpilaza vaovao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa mba iza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zanaky ny Hamalekita mpifindra monina aho, tompoko.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana no nahasahianao naninji-tanana ka nahafaty ny mpanjaka voafidin’ny TOMPO?
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso ny mpanompony anankiray i Davida ka nibaiko azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana vonoy any ilehio!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasiany izy ka maty. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nandrora mitsilany ianao izao ka nahavoa tena. Ny vavanao ihany no nanameloka anao ho faty raha nanao hoe: «Izaho no namono ho faty ny mpanjaka voafidin’ny TOMPO.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kalo fisaonan’i Davida an’i Saoly sy i Jônatàna
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namorona izao hira fisaonana an’i Saoly sy i Jônatàna zanany izao i Davida, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka nasainy nampianarina ny mponin’i Joda. Indro ny «Hira fisaonana atao hoe Tsipîka» araka ny voasoratra ao amin’ny Bokin’ilay Marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Bokin’Ilemahitsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Jos 10.13 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Israely ô, ireo mpiady reharehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitsitra eny an-tampon-kavoanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy fa maty ireo mahery fo!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andro fahatelo, nisy lehilahy iray tonga avy any amin’ny tobin’i Saoly. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Triatriatra ny akanjony
    - type: text
      text: ' ary feno tany ny lohany. Koa rehefa mby teo amin’i Davida izy, dia niankohoka tamin’ny tany. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza aely any Gata izany vaovao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na torina eny an-dalamben’i Askelôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Gata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Askelôna:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 5.8; 6.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fandrao hifalian’ny vehivavin’ny Filistinina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hibitahan’ny tovovavin’ny mpanompo sampy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo tendrombohitr’i Gilbôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tendrombohitr’i Gilbôa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 28.4 sy nta.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aza misy ando na orana intsony eo aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na koa saha be vokatra hangalam-panatitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria teo no nahafa-baràka ny ampingan’ny mahery fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ampingan’i Saoly tsy hihoso-diloilo intsony.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo anoloan’ny ran’ireo Filistinina nitsitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tsipîkan’i Jônatàna tsy mba nihemotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anoloan’ny hatomadin’ireo fahavalo mahery fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sabatr’i Saoly tsy niveri-maina.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Saoly sy i Jônatàna dia nifankatia tokoa fahavelony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy nosarahina na dia tamin’ny nahafatesany aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mailaka noho ny voromahery izy mianaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mahery fo mihoatra noho ny liona.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo vehivavy israelita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitomania an’i Saoly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nampitafy jaky kanto anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nandravaka volamena ny fitafianareo.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy fa maty an’ady ireo maherifo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Jônatàna mitsitra eny an-tampon-kavoanao!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malahelo anao aho, ry Jônatàna rahalahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, nankamamiko fatratra ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatalanjona ahy ny fitiavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sarobidy noho ny fitiavan’ny vehivavy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy fa maty ireo maherifo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary very ny fitaovam-piadiana?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanontany azy i Davida hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy taiza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy nandositra ny tobin’i Israely aho, tompoko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy indray i Davida taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa nanao ahoana avy ny zava-niseho tany? Mba tantarao amiko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nitsoaka nandositra ny tafik’i Israely ary betsaka ny miaramila maty. Ary i Saoly sy i Jônatàna zanany koa samy maty.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ihany i Davida tamin’ilay zatovo mpilaza vaovao:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana no nahafantaranao fa maty i Saoly sy i Jônatàna zanany?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novalian’ilay tovolahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sendra teo an-tendrombohitra Gilbôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tendrombohitra Gilbôa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 28.4 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' aho, raha nahita an’i Saoly nitehina tamin’ny lefony; ary efa nanakaiky azy tamin’izay ny kalesy sy ny mpitaingin-tsoavalin’ny fahavalo. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dia niherika izy ka nahita ahy; nantsoiny aho, ary hoy aho taminy: «Inty aho, tompoko!» '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dia nanontany ny amiko izy, ka nolazaiko azy fa Hamalekita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hamalekita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 17.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' aho. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Koa nasainy nanatona aho mba hamono azy ho faty satria naratra mafy izy na dia mbola mahatsiaro tena tsara aza. '
