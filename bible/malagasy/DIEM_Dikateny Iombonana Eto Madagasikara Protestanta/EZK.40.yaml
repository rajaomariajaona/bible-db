document_id: EZK.40
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: FAHITANA NY TEMPOLY AMIN’NY HOAVY
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarihana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny fiandohan’ny taona faha-25 taorian’ny fahababoanay, ka ny andro fahafolon’ny volana, izany hoe 14 taona katroka taorian’ny naharavan’i Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izany hoe 573 tal J.K.
    marker-yv: yv-n
  - type: text
    text: ', dia notsindrian’ny herin’ny Tompo aho, ka nentiny nankany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tao anaty fahitana no nitondran’Andriamanitra ahy nankany amin’ny tanin’i Israely. Napetrany teo an-tampon’ny tendrombohitra iray avo dia avo aho, ka teo amin’ny ilany atsimo dia nisy andian-trano vaventy miendrika tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nentiny nankao aho, ka hitako nisy lehilahy iray mitarehina halimo, mitana tady rongony sy volotara fandrefesana sady nijoro teo akaikin’ny vavahady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Apôk 21.10, 15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ralehilahy io tamiko: «Ry ilay taranak’olombelona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ry ilay taranak’olombelona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', mijere tsara amin’ny masonao, mihainoa tsara amin’ny sofinao, ary aoka ny fonao handinika izay rehetra hasehoko anao satria ny hanehoako anao izao no nitondrako anao atỳ. Avy eo dia hotantarainao amin’ny Israelita izay rehetra hitanao.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kianja sy ny vavahady ivelany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary indro hitako nisy tamboho iray ivelany manodidina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ', ary teny an-tanan-dralehilahy ny volotarany izay telo metatra ny halavany. Norefesiny hatevina sy haavo ilay tamboho ka telo metatra avy na ny hateviny na ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nankeo amin’ny vavahady atsinanana izy, ary niakatra ny tohatohatra dia nandrefy ny tokonana ka nisy telo metatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ireo varavaran’ny tempoly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toy ireo varavaran’ny manda rehetra tamin’izany andro izany, dia nisy tokonana misokatra ho amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lalantsara afovoany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo and 7 sy 10) miaraka amin’ny efitra an-daniny sy an-kilany (and 7, 10, 21) voazarazaran’ny rindrina (and 9).'
    marker-yv: yv-n
  - type: text
    text: ' ny hitsy miditra; ary ny tokonam-bavahady isany avy dia telo metatra koa ny hitsy miditra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny toeram-piambenana tsirairay manamorona ny lalantsara afovoany mankeny am-baravarana dia samy telo metatra na ny sakany na ny lavany. Ny rindrina manasaraka azy ireny dia roa metatra sy sasany ny hateviny. Misy fidirana mahatratra telo metatra ny halavany mialoha ny lalantsara manoloana ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Norefesin-dralehilahy koa io lalantsara io ka nisy efa-metatra ny hitsy miditra ary iray metatra ny hatevin’ny rindrina ivelany. Tao anatin’ny vavahady atsinanana no nisy io lalantsara io sady teo akaikin’ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ireo toeram-piambenana enina teo amin’ny vavahady atsinanana dia mitovy refy avokoa. Nisy telo avy teo an-daniny roa amin’ny lalantsara afovoany, ka ny rindrina manasaraka azy dia mitovy hatevina avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Norefesin-dralehilahy ihany koa ny velaran’ny faritra ahazoan’ny varavarana misokatra ka mahatratra dimy metatra. Ny velaran’ny lalantsara afovoany manontolo dia misy enina metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manoloana ireo toeram-piambenana miralafy izay telo metatra avy ny sakany sy lavany, teo an-daniny roa amin’ny lalantsara, dia misy fefy iray antsasa-metatra ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Norefesiny koa ny elanelana eo amin’ny rindrin’ny toeram-piambenana iray sy ny rindrin’ny toeram-piambenana iray ka nisy 12 metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Norefesiny koa ny sakan’ny lalantsara ka nisy folo metatra. Ny kianjan’ny tempoly no nanodidina io lalantsara io. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manomboka eo amin’ny fidirana voalohany eo amin’ny tamboho ivelan’ny vavahady ka hatramin’ny rindrina manoloana ny faran’ny lalantsara erỳ am-pita dia nisy 25 metatra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Varavaran-kely misy karakara vy no eny amin’ny rindrina ivelany amin’ny toeram-piambenana sy eo amin’ny rindrina mampisaraka azy; ary eo amin’ny rindrina anaty koa dia misy varavaran-kely manodidina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.16 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ny varavaran-kely misy karakara vy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'napetraka manodidina ny vavahady dia ahazoana manara-maso akaiky: tsy maintsy natao izay ahazoana misakana ny vahiny sy ny olona maloto* ara-pivavahana tsy hiditra ao amin’ny tempoly (jereo 44.7,9).'
    marker-yv: yv-n
  - type: text
    text: . Voaravaka sarin-drofia ny rindrina anatiny teo amin’ny vavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nentin-dralehilahy tao anatin’ny kianja ivelan’ny tempoly aho. Io kianja io dia voarakotra lampivato ary voahodidina efitrano telopolo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lampivato koa no mandrakotra ny faritra manodidina ny vavahady; saingy lampivato iva kokoa izany noho ilay tao an-kianja. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Norefesiny koa ny elanelana hatreo amin’ny vavahady amin’ny kianja ivelany ka hatreo amin’ny rindrina amin’ny kianja anatiny ka nisy dimampolo metatra. Izay ny amin’ny lafiny atsinanana. Nifindra teo amin’ny lafiny avaratra indray ralehilahy '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka norefesiny koa ny lava aman-tsakan’ny vavahady avaratra mankany amin’ny kianja ivelany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nisy toeram-piambenana enina koa tao, ka telo avy teo an-daniny roa amin’ny lalantsara. Ny rindrina sy ny lalantsara dia samy nitovy refy tamin’ny an’ilay vavahady atsinanana. Ny halavan’ny vavahady dia 25 metatra ary ny sakany 12 metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny lalantsara sy ny varavaran-kely ary ny ravaka sarin-drofia dia nitovy tamin’ny an’ilay vavahady atsinanana. Tohatohatra fito no nidirana teo amin’ny vavahady avaratra miakatra ho ao amin’ny lalantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tandrifin’ny vavahady avaratra dia nisy fidirana mankao an-kianja anatiny toy ny tao atsinanana. Norefesin-dralehilahy ny elanelan’ireo vavahady roa ireo ka nisy dimampolo metatra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nentiny nankao amin’ny ilany atsimo aho nony avy eo, ka nisy vavahady koa tao. Norefesiny ny toeram-piambenana, ny rindrina sy ny lalantsara ka samy nitovy refy tamin’ny an’ireo vavahady hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nisy varavaran-kely koa nanodidina ny vavahady sy ny lalantsara ka mitovy amin’ireo tao atsinanana sy avaratra. Ny halavan’ny vavahady dia 25 metatra ary ny sakany 12 metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tohatohatra fito no nidirana teo am-bavahady hankao amin’ny lalantsara. Ny rindrina anatiny dia voaravaka sarin-drofia teo an-daniny roa amin’ny lalantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nifanatrika tamin’io vavahady io dia nisy vavahady iray koa fidirana tao amin’ny kianja anatiny. Norefesin-dralehilahy ny elanelan’ireo vavahady roa ireo ka nisy dimampolo metatra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny kianja sy ny vavahady anatiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nentin-dralehilahy niditra tamin’ny vavahady atsimo aho mba hankao an-kianja anatiny. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady hafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny vavahadin’ny kianja anatiny dia mitovy amin’ny an’ny kianja ivelany ary mifanandrify aminy. Ny lalantsaran’ireo vavahady rehetra dia samy mihazo ny kianja ivelany.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny toeram-piambenana, ny rindrina manasaraka azy, ary ny lalantsara dia samy nitovy refy tamin’ny an’ireo vavahady hafa. Nisy varavaran-kely nanodidina ny lalantsara. Ka 25 metatra ny halavan’ny vavahady ary 12 metatra sy sasany ny sakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Misy and 30 ao amin’ny RM kanefa toa famerenana ny and 29b ihany, ka tsy nampidirina amin’ity dkt ity.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ilay lalantsara dia nanatrika ny kianja ivelany. Ny rindrina anatiny dia voaravaka sarin-drofia, ary tohatohatra valo no fiakarana mankeo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nasain-dralehilahy niditra tamin’ny vavahady atsinanana aho mba hankao an-kianja anatiny. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny toeram-piambenana, ny rindrina manasaraka azy, ary ny lalantsara dia samy nitovy refy tamin’ny an’ireo vavahady hafa. Nisy varavaran-kely nanodidina ny varavarana sy ny lalantsara; ka 25 metatra ny halavan’ny vavahady ary 12 metatra sy sasany ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ilay lalantsara dia nanatrika ny kianja ivelany ary ny rindrina anatiny dia voaravaka sarin-drofia teo an-daniny roa amin’ny lalantsara. Tohatohatra valo no fiakarana mankeo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Avy eo dia nentin-dralehilahy hankany amin’ny vavahady avaratra aho. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady teo aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nisy toeram-piambenana ihany koa izy, nisy rindrina manasaraka ary lalantsara sy varavaran-kely manodidina. Ny halavany dia 25 metatra ary ny sakany dia 12 metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ilay lalantsara dia nanatrika ny kianja ivelany. Ny rindrina anatiny dia voaravaka sarin-drofia eny an-daniny roa amin’ny lalantsara toy ny teo aloha. Tohatohatra valo no fiakarana mankeo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny lalantsara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy grika, fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny rindrina anatiny
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nisy efitrano iray mifandray amin’ny lalantsaran’ny vavahady avaratra, ka tao no nanasana ireo biby vonoina hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Teo an-daniny roa amin’io lalantsara io, dia nisy latabatra roa avy, ka teo no namonoana ireo biby natao sorona: dia ny sorona dorana manontolo na ny sorona famelan-keloka na ny sorom-panonerana. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tao ivelan’ny lalantsara koa dia nisy latabatra efatra; ka rehefa nisy niakatra hankeo amin’ny vavahady avaratra, dia nahita latabatra roa avy teo an-daniny roa amin’ny tohatohatra. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Valo izany no tontalin’ireo latabatra nampiasaina hamonoana biby hatao sorona, ka efatra avy teo an-daniny roa amin’ny vavahady. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny latabatra efatra natokana hamonoana ireo sorona dorana manontolo dia natao tamin’ny vato voapaika. Mirefy 75 santimetatra ny sakany sy ny lavany ary dimampolo santimetatra ny haavony. Teo no nametrahana izay fitaovana rehetra nilaina hanomanana ireo biby natolotra ho sorona. '
