verses:
  '1':
  - type: heading
    content: FAHITANA NY TEMPOLY AMIN’NY HOAVY
  - type: heading
    content: Fitarihana
  - type: text
    content: Tamin’ny fiandohan’ny taona faha-25 taorian’ny fahababoanay, ka ny andro fahafolon’ny volana, izany hoe 14 taona katroka taorian’ny naharavan’i Jerosalema
  - type: note
    content: Izany hoe 573 tal J.K.
  - type: text
    content: ', dia notsindrian’ny herin’ny Tompo aho, ka nentiny nankany. '
  '10':
  - type: text
    content: 'Ireo toeram-piambenana enina teo amin’ny vavahady atsinanana dia mitovy refy avokoa. Nisy telo avy teo an-daniny roa amin’ny lalantsara afovoany, ka ny rindrina manasaraka azy dia mitovy hatevina avokoa. '
  '11':
  - type: text
    content: 'Norefesin-dralehilahy ihany koa ny velaran’ny faritra ahazoan’ny varavarana misokatra ka mahatratra dimy metatra. Ny velaran’ny lalantsara afovoany manontolo dia misy enina metatra sy sasany. '
  '12':
  - type: text
    content: 'Manoloana ireo toeram-piambenana miralafy izay telo metatra avy ny sakany sy lavany, teo an-daniny roa amin’ny lalantsara, dia misy fefy iray antsasa-metatra ny haavony. '
  '13':
  - type: text
    content: 'Norefesiny koa ny elanelana eo amin’ny rindrin’ny toeram-piambenana iray sy ny rindrin’ny toeram-piambenana iray ka nisy 12 metatra sy sasany. '
  '14':
  - type: text
    content: 'Norefesiny koa ny sakan’ny lalantsara ka nisy folo metatra. Ny kianjan’ny tempoly no nanodidina io lalantsara io. '
  '15':
  - type: text
    content: 'Manomboka eo amin’ny fidirana voalohany eo amin’ny tamboho ivelan’ny vavahady ka hatramin’ny rindrina manoloana ny faran’ny lalantsara erỳ am-pita dia nisy 25 metatra. '
  '16':
  - type: text
    content: Varavaran-kely misy karakara vy no eny amin’ny rindrina ivelany amin’ny toeram-piambenana sy eo amin’ny rindrina mampisaraka azy; ary eo amin’ny rindrina anaty koa dia misy varavaran-kely manodidina
  - type: note
    content: 'Ny varavaran-kely misy karakara vy napetraka manodidina ny vavahady dia ahazoana manara-maso akaiky: tsy maintsy natao izay ahazoana misakana ny vahiny sy ny olona maloto* ara-pivavahana tsy hiditra ao amin’ny tempoly (jereo 44.7,9).'
  - type: text
    content: . Voaravaka sarin-drofia ny rindrina anatiny teo amin’ny vavahady.
  '17':
  - type: text
    content: 'Dia nentin-dralehilahy tao anatin’ny kianja ivelan’ny tempoly aho. Io kianja io dia voarakotra lampivato ary voahodidina efitrano telopolo. '
  '18':
  - type: text
    content: 'Lampivato koa no mandrakotra ny faritra manodidina ny vavahady; saingy lampivato iva kokoa izany noho ilay tao an-kianja. '
  '19':
  - type: text
    content: 'Norefesiny koa ny elanelana hatreo amin’ny vavahady amin’ny kianja ivelany ka hatreo amin’ny rindrina amin’ny kianja anatiny ka nisy dimampolo metatra. Izay ny amin’ny lafiny atsinanana. Nifindra teo amin’ny lafiny avaratra indray ralehilahy '
  '2':
  - type: text
    content: 'Tao anaty fahitana no nitondran’Andriamanitra ahy nankany amin’ny tanin’i Israely. Napetrany teo an-tampon’ny tendrombohitra iray avo dia avo aho, ka teo amin’ny ilany atsimo dia nisy andian-trano vaventy miendrika tanàna. '
  '20':
  - type: text
    content: 'ka norefesiny koa ny lava aman-tsakan’ny vavahady avaratra mankany amin’ny kianja ivelany. '
  '21':
  - type: text
    content: 'Nisy toeram-piambenana enina koa tao, ka telo avy teo an-daniny roa amin’ny lalantsara. Ny rindrina sy ny lalantsara dia samy nitovy refy tamin’ny an’ilay vavahady atsinanana. Ny halavan’ny vavahady dia 25 metatra ary ny sakany 12 metatra sy sasany. '
  '22':
  - type: text
    content: 'Ny lalantsara sy ny varavaran-kely ary ny ravaka sarin-drofia dia nitovy tamin’ny an’ilay vavahady atsinanana. Tohatohatra fito no nidirana teo amin’ny vavahady avaratra miakatra ho ao amin’ny lalantsara. '
  '23':
  - type: text
    content: 'Tandrifin’ny vavahady avaratra dia nisy fidirana mankao an-kianja anatiny toy ny tao atsinanana. Norefesin-dralehilahy ny elanelan’ireo vavahady roa ireo ka nisy dimampolo metatra. '
  '24':
  - type: text
    content: 'Nentiny nankao amin’ny ilany atsimo aho nony avy eo, ka nisy vavahady koa tao. Norefesiny ny toeram-piambenana, ny rindrina sy ny lalantsara ka samy nitovy refy tamin’ny an’ireo vavahady hafa. '
  '25':
  - type: text
    content: 'Nisy varavaran-kely koa nanodidina ny vavahady sy ny lalantsara ka mitovy amin’ireo tao atsinanana sy avaratra. Ny halavan’ny vavahady dia 25 metatra ary ny sakany 12 metatra sy sasany. '
  '26':
  - type: text
    content: 'Tohatohatra fito no nidirana teo am-bavahady hankao amin’ny lalantsara. Ny rindrina anatiny dia voaravaka sarin-drofia teo an-daniny roa amin’ny lalantsara. '
  '27':
  - type: text
    content: Nifanatrika tamin’io vavahady io dia nisy vavahady iray koa fidirana tao amin’ny kianja anatiny. Norefesin-dralehilahy ny elanelan’ireo vavahady roa ireo ka nisy dimampolo metatra.
  - type: heading
    content: Ny kianja sy ny vavahady anatiny
  '28':
  - type: text
    content: Dia nentin-dralehilahy niditra tamin’ny vavahady atsimo aho mba hankao an-kianja anatiny. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady hafa
  - type: note
    content: Ny vavahadin’ny kianja anatiny dia mitovy amin’ny an’ny kianja ivelany ary mifanandrify aminy. Ny lalantsaran’ireo vavahady rehetra dia samy mihazo ny kianja ivelany.
  - type: text
    content: '. '
  '29':
  - type: text
    content: Ny toeram-piambenana, ny rindrina manasaraka azy, ary ny lalantsara dia samy nitovy refy tamin’ny an’ireo vavahady hafa. Nisy varavaran-kely nanodidina ny lalantsara. Ka 25 metatra ny halavan’ny vavahady ary 12 metatra sy sasany ny sakany
  - type: note
    content: Misy and 30 ao amin’ny RM kanefa toa famerenana ny and 29b ihany, ka tsy nampidirina amin’ity dkt ity.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Nentiny nankao aho, ka hitako nisy lehilahy iray mitarehina halimo, mitana tady rongony sy volotara fandrefesana sady nijoro teo akaikin’ny vavahady
  - type: note
    content: 'And 2-3: ampit Apôk 21.10, 15.'
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Ilay lalantsara dia nanatrika ny kianja ivelany. Ny rindrina anatiny dia voaravaka sarin-drofia, ary tohatohatra valo no fiakarana mankeo. '
  '32':
  - type: text
    content: 'Nasain-dralehilahy niditra tamin’ny vavahady atsinanana aho mba hankao an-kianja anatiny. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady hafa. '
  '33':
  - type: text
    content: 'Ny toeram-piambenana, ny rindrina manasaraka azy, ary ny lalantsara dia samy nitovy refy tamin’ny an’ireo vavahady hafa. Nisy varavaran-kely nanodidina ny varavarana sy ny lalantsara; ka 25 metatra ny halavan’ny vavahady ary 12 metatra sy sasany ny sakany. '
  '34':
  - type: text
    content: Ilay lalantsara dia nanatrika ny kianja ivelany ary ny rindrina anatiny dia voaravaka sarin-drofia teo an-daniny roa amin’ny lalantsara. Tohatohatra valo no fiakarana mankeo.
  '35':
  - type: text
    content: 'Avy eo dia nentin-dralehilahy hankany amin’ny vavahady avaratra aho. Norefesiny io vavahady io ka nitovy refy tamin’ireo vavahady teo aloha. '
  '36':
  - type: text
    content: 'Nisy toeram-piambenana ihany koa izy, nisy rindrina manasaraka ary lalantsara sy varavaran-kely manodidina. Ny halavany dia 25 metatra ary ny sakany dia 12 metatra sy sasany. '
  '37':
  - type: text
    content: Ilay lalantsara dia nanatrika ny kianja ivelany. Ny rindrina anatiny dia voaravaka sarin-drofia eny an-daniny roa amin’ny lalantsara toy ny teo aloha. Tohatohatra valo no fiakarana mankeo
  - type: note
    content: 'Ny lalantsara: araka ny dkt tranainy grika, fa ny RM kosa manao hoe ny rindrina anatiny.'
  - type: text
    content: .
  '38':
  - type: text
    content: 'Nisy efitrano iray mifandray amin’ny lalantsaran’ny vavahady avaratra, ka tao no nanasana ireo biby vonoina hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo. '
  '39':
  - type: text
    content: 'Teo an-daniny roa amin’io lalantsara io, dia nisy latabatra roa avy, ka teo no namonoana ireo biby natao sorona: dia ny sorona dorana manontolo na ny sorona famelan-keloka na ny sorom-panonerana. '
  '4':
  - type: text
    content: 'Ary hoy ralehilahy io tamiko: «Ry ilay taranak’olombelona'
  - type: note
    content: 'Ry ilay taranak’olombelona: jereo 2.1 sy nta.'
  - type: text
    content: ', mijere tsara amin’ny masonao, mihainoa tsara amin’ny sofinao, ary aoka ny fonao handinika izay rehetra hasehoko anao satria ny hanehoako anao izao no nitondrako anao atỳ. Avy eo dia hotantarainao amin’ny Israelita izay rehetra hitanao.»'
  - type: heading
    content: Ny kianja sy ny vavahady ivelany.
  '40':
  - type: text
    content: 'Tao ivelan’ny lalantsara koa dia nisy latabatra efatra; ka rehefa nisy niakatra hankeo amin’ny vavahady avaratra, dia nahita latabatra roa avy teo an-daniny roa amin’ny tohatohatra. '
  '41':
  - type: text
    content: 'Valo izany no tontalin’ireo latabatra nampiasaina hamonoana biby hatao sorona, ka efatra avy teo an-daniny roa amin’ny vavahady. '
  '42':
  - type: text
    content: 'Ny latabatra efatra natokana hamonoana ireo sorona dorana manontolo dia natao tamin’ny vato voapaika. Mirefy 75 santimetatra ny sakany sy ny lavany ary dimampolo santimetatra ny haavony. Teo no nametrahana izay fitaovana rehetra nilaina hanomanana ireo biby natolotra ho sorona. '
  '43':
  - type: text
    content: 'Nisy lakan-drano kely namboarina manodidina ny sisin-databatra ka valo santimetatra ny velarany; ary teo ambonin’ireo latabatra ireo no nametrahana ny hena hatao sorona. '
  '44':
  - type: text
    content: Dia nentin-dralehilahy tao amin’ny kianja anatiny aho. Nisy efitra roa tao
  - type: note
    content: '...Nisy efitra roa tao: araka ny dkt tranainy grika; dkt hafa Tao ivelan’ny varavarana anatiny, tao an-kianja anatiny, dia nisy ny efitranon’ny mpihira.'
  - type: text
    content: ': ny iray terỳ anilan’ny varavarana avaratra ary mitodika mianatsimo, ary ny iray kosa terỳ anilan’ny varavarana atsimo ary mitodika mianavaratra. '
  '45':
  - type: text
    content: 'Nolazain-dralehilahy tamiko fa ny efitra mitodika mianatsimo dia voatokana ho an’ny mpisorona misahana raharaha momba ny '
  - type: text
    content: tempoly
  - type: text
    content: '; '
  '46':
  - type: text
    content: 'fa ilay mitodika mianavaratra kosa dia voatokana ho an’ny mpisorona misahana raharaha momba ny '
  - type: text
    content: alitara
  - type: text
    content: . Ary amin’ny fokon’i Levỳ dia ny taranak’i Tsadôka
  - type: note
    content: I Tsadôka no mpisorona nofidìn’i Salômôna (jereo 1 Mp 2.35). Isan’ny fokon’i Levỳ izy (1 Tan 5.27-34) ary ny taranany no hany heverina ho mpisorona ara-dalàna.
  - type: text
    content: ' ihany no afa-manatona ny TOMPO mba hanao fanompoam-pivavahana aminy.'
  - type: heading
    content: Filazana ny bikabikan’ny tempoly
  '47':
  - type: text
    content: 'Norefesin-dralehilahy ny kianja anatiny: efamira izy io ka samy dimampolo metatra avy ny lafiny efatra. Teo anoloan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' no nisy ny '
  - type: text
    content: alitara
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Nentiny niditra tao amin’ny lalantsara mankao an-tempoly aho: nandrefy teo ralehilahy ka ny rindrina dia mirefy roa metatra sy sasany avy ny hateviny; ary fito metatra kosa ny sakan’ny fidirana. Ny hatevin’ny rindrina an-daniny roa'
  - type: note
    content: 'ny rindrina... roa: araka ny dkt tranainy grika izany; fa tsy hita ao amin’ny RM.'
  - type: text
    content: ' kosa dia iray metatra sy sasany avy. '
  '49':
  - type: text
    content: Folo metatra no halavan’ny lalantsara fidirana ary enina metatra ny sakany. Tohatohatra folo no fiakarana ao; ary nisy andry iray avy teo anilan’ny tolam-bavahady
  - type: note
    content: 'Tohatohatra folo: araka ny dkt tranainy grika. –ny andry roa dia mety hitovy amin’ny an’ny tempolin’i Salômôna (jereo 1 Mp 7.15-22; 2 Tan 3.15-17).'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Ary indro hitako nisy tamboho iray ivelany manodidina ny '
  - type: text
    content: tempoly
  - type: text
    content: ', ary teny an-tanan-dralehilahy ny volotarany izay telo metatra ny halavany. Norefesiny hatevina sy haavo ilay tamboho ka telo metatra avy na ny hateviny na ny haavony. '
  '6':
  - type: text
    content: Dia nankeo amin’ny vavahady atsinanana izy, ary niakatra ny tohatohatra dia nandrefy ny tokonana ka nisy telo metatra
  - type: note
    content: Ireo varavaran’ny tempoly toy ireo varavaran’ny manda rehetra tamin’izany andro izany, dia nisy tokonana misokatra ho amin’ny lalantsara afovoany (jereo and 7 sy 10) miaraka amin’ny efitra an-daniny sy an-kilany (and 7, 10, 21) voazarazaran’ny rindrina (and 9).
  - type: text
    content: ' ny hitsy miditra; ary ny tokonam-bavahady isany avy dia telo metatra koa ny hitsy miditra. '
  '7':
  - type: text
    content: 'Ary ny toeram-piambenana tsirairay manamorona ny lalantsara afovoany mankeny am-baravarana dia samy telo metatra na ny sakany na ny lavany. Ny rindrina manasaraka azy ireny dia roa metatra sy sasany ny hateviny. Misy fidirana mahatratra telo metatra ny halavany mialoha ny lalantsara manoloana ny tempoly. '
  '8':
  - type: text
    content: 'Norefesin-dralehilahy koa io lalantsara io ka nisy efa-metatra ny hitsy miditra ary iray metatra ny hatevin’ny rindrina ivelany. Tao anatin’ny vavahady atsinanana no nisy io lalantsara io sady teo akaikin’ny tempoly. '
