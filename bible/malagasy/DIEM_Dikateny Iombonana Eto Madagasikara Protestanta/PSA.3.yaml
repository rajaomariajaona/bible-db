    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: TOMPO ô, akory ity hamaroan’ny fahavaloko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maro loatra ny olona mitsangan-kanohitra ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'maro loatra ny milaza momba ahy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy manam-pamonjena amin’Andriamanitra izy!»
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nefa Ianao, TOMPO ô, no ampinga miaro ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no voninahitro sy mampitraka ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha miantso vonjy amin’ny TOMPO aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia valiany avy ao an-tendrombohiny masina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tendrombohiny masina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Matory aho ka renoka, dia mifoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny TOMPO no manohana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy atahorako ny olona alinalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manemitra mba hamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry TOMPO Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: midira an-tsehatra hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hasianao tehamaina ny fahavaloko rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka dia raraka ny nifin’ireo olon-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: TOMPO ô, Ianao no hany afaka mamonjy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho amin’ny vahoakanao anie ny fitahianao!
- type: usfm
  marker: qr
  children:
  - type: text
    text: Fiatoana
