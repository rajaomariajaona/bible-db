document_id: PSA.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Voahodidim-pahavalo
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida, fony izy nandositra an’i Absalôma zanany lahy
  - type: text
    content: ' '
  - type: note
    content: Jereo 2 Sam 15–17.
  - type: text
    content: .
  '2':
  - type: text
    content: TOMPO ô, akory ity hamaroan’ny fahavaloko!
  - type: text
    content: Maro loatra ny olona mitsangan-kanohitra ahy;
  '3':
  - type: text
    content: 'maro loatra ny milaza momba ahy hoe:'
  - type: text
    content: «Tsy manam-pamonjena amin’Andriamanitra izy!»
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: Nefa Ianao, TOMPO ô, no ampinga miaro ahy;
  - type: text
    content: Ianao no voninahitro sy mampitraka ahy.
  '5':
  - type: text
    content: Raha miantso vonjy amin’ny TOMPO aho,
  - type: text
    content: dia valiany avy ao an-tendrombohiny masina
  - type: note
    content: 'tendrombohiny masina: jereo 2.6.'
  - type: text
    content: .
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Matory aho ka renoka, dia mifoha,
  - type: text
    content: satria ny TOMPO no manohana ahy.
  '7':
  - type: text
    content: Tsy atahorako ny olona alinalina
  - type: text
    content: izay manemitra mba hamely ahy.
  '8':
  - type: text
    content: Ry TOMPO Andriamanitro ô,
  - type: text
    content: midira an-tsehatra hamonjy ahy.
  - type: text
    content: Hasianao tehamaina ny fahavaloko rehetra,
  - type: text
    content: ka dia raraka ny nifin’ireo olon-dratsy.
  '9':
  - type: text
    content: TOMPO ô, Ianao no hany afaka mamonjy.
  - type: text
    content: Ho amin’ny vahoakanao anie ny fitahianao!
  - type: text
    content: Fiatoana
