document_id: EXO.36
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Betsalela sy i Ôhôliaba mbamin’ireo mpahay taozavatra hafa, izay nomen’ny TOMPO fahakingana sy faharanitan-tsaina ilaina hanatanterahana ny asa, dia hanamboatra ny zavatra rehetra hampiasaina amin’ny fanompoam-pivavahana ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' araka izay rehetra nodidian’ny TOMPO.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nampanantsoin’i Mosesy i Betsalela sy i Ôhôliaba mbamin’ireo mpahay taozavatra hafa, izay nomen’ny TOMPO fahakingana sady vonona hanatanteraka ny asa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Natolotr’i Mosesy an-dry zareo ny fanomezana nentin’ny Israelita hanaovana ny Toeramasina. Isa-maraina dia mbola nisy nitondra fanomezana an-tsitrapo teo anatrehan’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany, ireo mpahay taozavatra rehetra izay nirotsaka tamin’ny fanamboarana ny Toeramasina dia nanapaka ny asany, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba hilaza amin’i Mosesy hoe: «Nitondra mihoatra noho izay ilaina amin’ny fanatontosana ny asa nodidian’ny TOMPO hatao ny vahoaka.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Niaraka tamin’izay dia nanome baiko manerana ny toby i Mosesy hoe: «Aoka tsy hisy intsony olona, na lahy na vavy, hanomana fanomezana hanaovana ny Toeramasina.» Dia nitsahatra tsy nitondra fanomezana intsony ny vahoaka, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: satria ampy hanaovana ny asa rehetra ny efa voaray ka nisy ambiny aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fonena-masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nanamboatra ny fonena-masina ny mpahay taozavatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.8 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 8-38:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 26.1-37.
    marker-yv: yv-n
  - type: text
    text: ' mahay indrindra; lamba temitra folo vita amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, no nanaovany azy, ka noravahany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' vita peta-kofehy tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nitovy refy avokoa ny lamba temitra rehetra, ka 14 metatra ny lavany, ary roa metatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Natambany ho vitrana iray aloha ny lamba temitra dimy; avy eo dia nataony toy izany koa ny dimy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nopetahany kofehy volon’ondry miloko volomparasy ny sisin-damba farany tamin’ny vitrana voalohany, ary nataony toy izany koa ny sisin-damba voalohany tamin’ny vitrana faharoa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nisy tadivavarana dimampolo tamin’ny sisin’ny vitrana tsirairay, ka nifanandrify tamin’ny laharan’ny tadivavarana teo amin’ny vitrana iray mifanila aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanamboatra farango volamena dimampolo ry zareo mba hanakambanany ny vitrana tsiroaroa, dia voatambatra ho iray ihany ny fonena-masina manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avy eo, dia namboariny koa ny tranolay hiarovana ny fonena-masina, ka lamba temitra 11 vita amin’ny volon’osy no nanaovany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nitovy refy avokoa ny lamba temitra rehetra, ka 15 metatra ny lavany, ary roa metatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Natambany ho vitrana iray aloha ny lamba temitra dimy, avy eo dia nataony toy izany koa ny enina hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nopetahany tadivavarana dimampolo ny sisin-damba farany amin’ny vitrana voalohany, ary nataony toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nanamboatra farango halimo dimampolo ry zareo mba hampikambana ny lay ho iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba hiarovana ny lay faharoa, dia nanao sarona hoditr’ondry miloko mena sy sarona hoditra mafy izy, ka narakony teo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nisy hazo fisaka namboariny tamin’ny hazo mimôzà, ka natsangany mba hitondra ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nitovy refy ny hazo fisaka rehetra, ka dimy metatra ny lavan’ny tsirairay ary 75 santimetatra ny sakany; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'nasiana lahiny roa mirazotra isaky ny hazo fisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hazo fisaka roapolo no nataony ho an’ny lafiny atsimo tamin’ny fonena-masina, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary nasiana faladia volafotsy efapolo hitondra azy; ka isaky ny hazo fisaka dia faladiany roa avy, izay mifanandrify amin’ny lahiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ho an’ny lafiny avaratra, dia hazo fisaka roapolo koa no nataony, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'niaraka tamin’ny faladia volafotsy efapolo, ka faladiany roa avy isaky ny hazo fisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ho an’ny lafiny andrefana izay eo ivohon’ny fonena-masina dia hazo fisaka enina no nataony, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'niampy hazo fisaka roa manokana ho an’ny zorony roa terỳ afara. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ireo hazo fisaka roa ireo dia nisy elanelany ara-dalàna teo amin’ny fotony, fa nifanatona tsikelikely kosa ka nikambana teo amin’ny haba iray ihany tany an-dohany. Nataony nitovy izy roa ho hazo fisaka amin’ny zorony. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa ny lafiny ivohon’ny fonena-masina dia nisy hazo fisaka valo sy faladiany volafotsy 16, ka faladia roa avy isaky ny hazo fisaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Avy eo dia nanamboarana bara mimôzà ireo hazo fisaka ireo, ka barany dimy nihazona ny hazo fisaka tamin’ny lafiny iray tamin’ny fonena-masina, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'barany dimy nihazona ny hazo fisaka tamin’ny lafiny iray hafa, ary barany dimy ho an’ireo hazo fisaka tamin’ny lafiny ivoho tao andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny barany afovoany dia nampandalovina teo ampisasahan’ny haavon’ny hazo fisaka, ary nataony nahatakatra ny sisiny an-daniny roa amin’ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Norakofany takela-bolamena, na hazo fisaka na ny barany; ary nisy haba volamena notefeny mba hitsofohan’ny barany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mpahay taozavatra no nanao ny efitra lamba iray tamin’ny rongony mafy nifangaro volon’ondry miloko volomparasy sy mena ary jaky, noravahana kerobima vita peta-kofehy tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nisy andry efatra namboariny tamin’ny hazo mimôzà, dia norakofany takela-bolamena; ary nahantony tamin’ny fantsika volamena teo ny efitra lamba. Nandrendrehany faladia volafotsy efatra koa ho an’ny andry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ho an’ny fidirana ao an-tranolay dia mpanao peta-kofehy no nanao efitra lamba iray hafa tamina kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Namboarina koa ny andry dimy hitondra ny efitra lamba sy ny fantsika hanantonana azy eo. Ny lohan’ny andry sy ny anjany dia samy norakofana takela-bolamena avokoa; fa natao halimo kosa ny faladiany dimy.
