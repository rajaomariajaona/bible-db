document_id: EXO.36,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'I Betsalela sy i Ôhôliaba mbamin’ireo mpahay taozavatra hafa, izay nomen’ny TOMPO fahakingana sy faharanitan-tsaina ilaina hanatanterahana ny asa, dia hanamboatra ny zavatra rehetra hampiasaina amin’ny fanompoam-pivavahana ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' araka izay rehetra nodidian’ny TOMPO.'
  '10':
  - type: text
    content: 'Natambany ho vitrana iray aloha ny lamba temitra dimy; avy eo dia nataony toy izany koa ny dimy hafa. '
  '11':
  - type: text
    content: 'Nopetahany kofehy volon’ondry miloko volomparasy ny sisin-damba farany tamin’ny vitrana voalohany, ary nataony toy izany koa ny sisin-damba voalohany tamin’ny vitrana faharoa. '
  '12':
  - type: text
    content: 'Nisy tadivavarana dimampolo tamin’ny sisin’ny vitrana tsirairay, ka nifanandrify tamin’ny laharan’ny tadivavarana teo amin’ny vitrana iray mifanila aminy. '
  '13':
  - type: text
    content: Nanamboatra farango volamena dimampolo ry zareo mba hanakambanany ny vitrana tsiroaroa, dia voatambatra ho iray ihany ny fonena-masina manontolo.
  '14':
  - type: text
    content: 'Avy eo, dia namboariny koa ny tranolay hiarovana ny fonena-masina, ka lamba temitra 11 vita amin’ny volon’osy no nanaovany azy. '
  '15':
  - type: text
    content: 'Nitovy refy avokoa ny lamba temitra rehetra, ka 15 metatra ny lavany, ary roa metatra ny sakany. '
  '16':
  - type: text
    content: 'Natambany ho vitrana iray aloha ny lamba temitra dimy, avy eo dia nataony toy izany koa ny enina hafa. '
  '17':
  - type: text
    content: 'Nopetahany tadivavarana dimampolo ny sisin-damba farany amin’ny vitrana voalohany, ary nataony toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  '18':
  - type: text
    content: 'Nanamboatra farango halimo dimampolo ry zareo mba hampikambana ny lay ho iray ihany. '
  '19':
  - type: text
    content: Mba hiarovana ny lay faharoa, dia nanao sarona hoditr’ondry miloko mena sy sarona hoditra mafy izy, ka narakony teo amboniny.
  '2':
  - type: text
    content: 'Nampanantsoin’i Mosesy i Betsalela sy i Ôhôliaba mbamin’ireo mpahay taozavatra hafa, izay nomen’ny TOMPO fahakingana sady vonona hanatanteraka ny asa. '
  '20':
  - type: text
    content: 'Nisy hazo fisaka namboariny tamin’ny hazo mimôzà, ka natsangany mba hitondra ny fonena-masina. '
  '21':
  - type: text
    content: 'Nitovy refy ny hazo fisaka rehetra, ka dimy metatra ny lavan’ny tsirairay ary 75 santimetatra ny sakany; '
  '22':
  - type: text
    content: 'nasiana lahiny roa mirazotra isaky ny hazo fisaka. '
  '23':
  - type: text
    content: 'Hazo fisaka roapolo no nataony ho an’ny lafiny atsimo tamin’ny fonena-masina, '
  '24':
  - type: text
    content: 'ary nasiana faladia volafotsy efapolo hitondra azy; ka isaky ny hazo fisaka dia faladiany roa avy, izay mifanandrify amin’ny lahiny roa. '
  '25':
  - type: text
    content: 'Ho an’ny lafiny avaratra, dia hazo fisaka roapolo koa no nataony, '
  '26':
  - type: text
    content: 'niaraka tamin’ny faladia volafotsy efapolo, ka faladiany roa avy isaky ny hazo fisaka. '
  '27':
  - type: text
    content: 'Ho an’ny lafiny andrefana izay eo ivohon’ny fonena-masina dia hazo fisaka enina no nataony, '
  '28':
  - type: text
    content: 'niampy hazo fisaka roa manokana ho an’ny zorony roa terỳ afara. '
  '29':
  - type: text
    content: 'Ireo hazo fisaka roa ireo dia nisy elanelany ara-dalàna teo amin’ny fotony, fa nifanatona tsikelikely kosa ka nikambana teo amin’ny haba iray ihany tany an-dohany. Nataony nitovy izy roa ho hazo fisaka amin’ny zorony. '
  '3':
  - type: text
    content: 'Natolotr’i Mosesy an-dry zareo ny fanomezana nentin’ny Israelita hanaovana ny Toeramasina. Isa-maraina dia mbola nisy nitondra fanomezana an-tsitrapo teo anatrehan’i Mosesy. '
  '30':
  - type: text
    content: Koa ny lafiny ivohon’ny fonena-masina dia nisy hazo fisaka valo sy faladiany volafotsy 16, ka faladia roa avy isaky ny hazo fisaka.
  '31':
  - type: text
    content: 'Avy eo dia nanamboarana bara mimôzà ireo hazo fisaka ireo, ka barany dimy nihazona ny hazo fisaka tamin’ny lafiny iray tamin’ny fonena-masina, '
  '32':
  - type: text
    content: 'barany dimy nihazona ny hazo fisaka tamin’ny lafiny iray hafa, ary barany dimy ho an’ireo hazo fisaka tamin’ny lafiny ivoho tao andrefana. '
  '33':
  - type: text
    content: 'Ny barany afovoany dia nampandalovina teo ampisasahan’ny haavon’ny hazo fisaka, ary nataony nahatakatra ny sisiny an-daniny roa amin’ny fonena-masina. '
  '34':
  - type: text
    content: Norakofany takela-bolamena, na hazo fisaka na ny barany; ary nisy haba volamena notefeny mba hitsofohan’ny barany.
  '35':
  - type: text
    content: 'Mpahay taozavatra no nanao ny efitra lamba iray tamin’ny rongony mafy nifangaro volon’ondry miloko volomparasy sy mena ary jaky, noravahana kerobima vita peta-kofehy tsara. '
  '36':
  - type: text
    content: Nisy andry efatra namboariny tamin’ny hazo mimôzà, dia norakofany takela-bolamena; ary nahantony tamin’ny fantsika volamena teo ny efitra lamba. Nandrendrehany faladia volafotsy efatra koa ho an’ny andry.
  '37':
  - type: text
    content: 'Ho an’ny fidirana ao an-tranolay dia mpanao peta-kofehy no nanao efitra lamba iray hafa tamina kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky. '
  '38':
  - type: text
    content: Namboarina koa ny andry dimy hitondra ny efitra lamba sy ny fantsika hanantonana azy eo. Ny lohan’ny andry sy ny anjany dia samy norakofana takela-bolamena avokoa; fa natao halimo kosa ny faladiany dimy.
  '4':
  - type: text
    content: 'Noho izany, ireo mpahay taozavatra rehetra izay nirotsaka tamin’ny fanamboarana ny Toeramasina dia nanapaka ny asany, '
  '5':
  - type: text
    content: 'mba hilaza amin’i Mosesy hoe: «Nitondra mihoatra noho izay ilaina amin’ny fanatontosana ny asa nodidian’ny TOMPO hatao ny vahoaka.» '
  '6':
  - type: text
    content: 'Niaraka tamin’izay dia nanome baiko manerana ny toby i Mosesy hoe: «Aoka tsy hisy intsony olona, na lahy na vavy, hanomana fanomezana hanaovana ny Toeramasina.» Dia nitsahatra tsy nitondra fanomezana intsony ny vahoaka, '
  '7':
  - type: text
    content: satria ampy hanaovana ny asa rehetra ny efa voaray ka nisy ambiny aza.
  - type: heading
    content: Ny fonena-masina
  '8':
  - type: text
    content: Dia nanamboatra ny fonena-masina ny mpahay taozavatra
  - type: note
    content: 'And 8-38: ampit 26.1-37.'
  - type: text
    content: ' mahay indrindra; lamba temitra folo vita amin’ny kiran-drongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky, no nanaovany azy, ka noravahany '
  - type: text
    content: kerobima
  - type: text
    content: ' vita peta-kofehy tsara. '
  '9':
  - type: text
    content: 'Nitovy refy avokoa ny lamba temitra rehetra, ka 14 metatra ny lavany, ary roa metatra ny sakany. '
