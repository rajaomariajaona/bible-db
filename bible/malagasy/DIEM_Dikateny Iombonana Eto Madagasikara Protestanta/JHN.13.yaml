document_id: JHN.13,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sasàn’i Jesoa ny tongotry ny mpianany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Andro mialoha ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ' tamin’izay. Fantatr’i Jesoa fa tonga ny fotoanandro hialany amin’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' ho any amin’ny Ray. Efa notiavin’i Jesoa ireo Azy teo amin’izao tontolo izao ary dia notiaviny hatramin’ny farany.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay efa nandro tsy mila hosasana afa-tsy ny tongony ihany, fa efa madio ny tenany manontolo. Ianareo koa dia madio, nefa tsy ianareo rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Afa-tsy ny tongony ihany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy stf sasany tsy ahitana ireo teny ireo. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: madio
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ny voambolana grika ampiasaina eto dia midika hoe madio ara-batana sy ara-panahy, ary mifono izay hevitra roa sosona izany izy etoana.'
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(Fantatr’i Jesoa manko ilay efa hanolotra Azy; ka izany no nilazany hoe: «Tsy ianareo rehetra no madio.»)'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rehefa voasasan’i Jesoa ny tongotr’ireo mpianany, dia nandray ny lambany Izy ary nipetraka indray; ka hoy Izy tamin’ny mpianany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Azonareo ve izay nataoko taminareo? '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ianareo manao Ahy hoe Mpampianatra sy Tompo, ary marina ny filàzanareo fa izany tokoa Aho. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa raha Izaho Tompo sy Mpampianatra aza no manasa ny tongotrareo, ianareo samy ianareo koa dia mba tokony hifanasa tongotra. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Eny, nomeko fianarana ianareo mba hanaovanareo toy ny nataoko taminareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lazaiko marina dia marina aminareo fa ny mpanompo tsy lehibe noho ny tompony ary ny iraka tsy lehibe noho ilay naniraka azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit and 12-16 sy Lk 22.24-27.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Raha azonareo izany, dia sambatra ianareo raha manao izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tsy ho anareo rehetra no itenenako, satria fantatro izay nofidiko; kanefa aoka ho tanteraka ny tenin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' hoe: «Ilay miara-mihina-mofo amiko no nanainga ny ombalahin-tongony hamely Ahy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 41.10.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dieny izao Aho no milaza aminareo alohan’ny hahatongavan’izany, mba hinoanareo rehefa tonga izany fa «Izaho no Ilay hatrizay ka ho mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izaho... mandrakizay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 8.24, 58 sy nta.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Teo am-pisakafoana hariva tamin’izay i Jesoa mbamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '; ary efa nomen’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: devoly
    - type: text
      text: ' hevitra i Jodasy, zanakalahin’i Simôna '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Iskariôta
    - type: text
      text: ', mba hanolotra an’i Jesoa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Lazaiko marina dia marina aminareo fa izay mandray ny hirahiko dia mandray Ahy, ary izay mandray Ahy dia mandray Ilay naniraka Ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa fa hanolotra Azy i Jodasy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 26.20-25; Mk 14.17-24; Lk 22.21-23)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Avy nilaza izany i Jesoa, dia nitebiteby ny fanahiny; ary nanambara Izy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazaiko marina dia marina aminareo fa ny anankiray aminareo no hanolotra Ahy!
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nifampijerijery ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' fa very hevitra ny amin’izay iray nolazainy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nipetraka nihinana teo anilan’i Jesoa ny anankiray tamin’ireo mpianatra, dia ilay tian’i Jesoa; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ka nohatsihin’i Petera io mpianatra io mba hamototra amin’i Jesoa hoe: Iza izay lazainao izay? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia nirona teo amin’ny tratran’i Jesoa ilay mpianatra ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza moa izany, ry Tompo?
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ilay homeko ny sombi-mofo izay hatsoboko anaty ro!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia noraisin’i Jesoa ilay sombi-mofo natsobony tanaty ro, ka nomeny an’i Jodasy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Vao nomena ilay sombi-mofo i Jodasy, dia nidiran’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satàna
    - type: text
      text: '; ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataovy faingana izay tianao hatao!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tamin’ireo nipetraka nihinana dia tsy nisy nahalala izay anton’ny nilazan’i Jesoa izany tamin’i Jodasy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa noho i Jodasy nitana ny kitapom-bola, dia nataon’ny sasany fa izao no voalazan’i Jesoa taminy: vidio ny zavatra ilaintsika amin’ny fankalazana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Paska
    - type: text
      text: ', na mba omeo zavatra ny mahantra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fantatr’i Jesoa rahateo fa efa napetraky ny Ray eo an-tanany avokoa ny zavatra rehetra, sady fantany fa Andriamanitra no niaviany ary Andriamanitra no hiverenany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Vao nandray ilay sombi-mofo i Jodasy, dia nivoaka ny trano niaraka tamin’izay; ary efa alina ny andro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny didy vaovao
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nony efa nivoaka ny trano i Jodasy, dia hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ankehitriny dia efa omem-boninahitra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ', ary Andriamanitra no omem-boninahitra eo aminy. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Raha Andriamanitra no omem-boninahitra eo amin’ny Zanak’olona, dia Andriamanitra koa no hanome voninahitra Azy eo amin’ny tenany ary hanome voninahitra azy raha afaka kelikely. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Vetivety foana sisa hitoerako eto aminareo, rey anaka; hitady Ahy ianareo ary toy ny voalazako tamin’ny Jiosy hoe: «Izay alehako tsy azonareo aleha'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 7.34.
      marker-yv: yv-n
    - type: text
      text: '», no lazaiko aminareo koa ankehitriny. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Didy vaovao no omeko anareo, dia ny mba hifankatiavanareo; aoka ho tahaka ny nitiavako anareo no mba hifankatiavanareo koa. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ny hahafantaran’ny olona rehetra fa mpianatro ianareo, dia raha mifankatia ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ambaran’i Jesoa ny handavan’i Petera Azy
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hoy i Simôna Petera tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho aiza Ianao, ry Tompo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay alehako, dia tsy azonao anarahana Ahy ankehitriny, fa any aoriana vao hanaraka Ahy ianao!
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ka hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoana, ry Tompo, no tsy ahazoako manaraka Anao ankehitriny? Na ny aiko aza dia hafoiko ho Anao.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'I Jesoa kosa namaly hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny ainao hoe hafoinao ho Ahy? Lazaiko marina dia marina aminao fa alohan’ny maneno akoho, dia handà Ahy intelo ianao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa nitsangana niala teo am-pihinanana Izy, dia nametraka ny lambany, ary naka lamba famaohana ka nisikinany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Avy eo Izy dia nampidina rano tamina koveta, ary nanomboka nanasa ny tongotr’ireo mpianany sy namaoka izany tamin’ny lamba nisikinany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia tonga teo amin’i Simôna Petera Izy; fa hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao ve, ry Tompo, hanasa ny tongotro?
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay ataoko dia tsy azonao ankehitriny, fa ho azonao any aoriana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa hoy i Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sanatria, tsy hanasa ny tongotro na oviana na oviana Ianao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Jesoa kosa namaly azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha tsy hosasako ianao, dia tsy hanana anjara amiko.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy i Simôna Petera taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha izany, ry Tompo, dia tsy ny tongotro fotsiny fa ny tanako sy ny lohako ihany koa.
