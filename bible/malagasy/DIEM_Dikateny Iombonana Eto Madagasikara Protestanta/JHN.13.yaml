document_id: JHN.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sasàn’i Jesoa ny tongotry ny mpianany
  - type: text
    content: 'Andro mialoha ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ' tamin’izay. Fantatr’i Jesoa fa tonga ny fotoanandro hialany amin’'
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ho any amin’ny Ray. Efa notiavin’i Jesoa ireo Azy teo amin’izao tontolo izao ary dia notiaviny hatramin’ny farany.'
  '10':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Izay efa nandro tsy mila hosasana afa-tsy ny tongony ihany, fa efa madio ny tenany manontolo. Ianareo koa dia madio, nefa tsy ianareo rehetra
  - type: note
    content: 'Afa-tsy ny tongony ihany: misy stf sasany tsy ahitana ireo teny ireo. –madio: ny voambolana grika ampiasaina eto dia midika hoe madio ara-batana sy ara-panahy, ary mifono izay hevitra roa sosona izany izy etoana.'
  - type: text
    content: .
  '11':
  - type: text
    content: '(Fantatr’i Jesoa manko ilay efa hanolotra Azy; ka izany no nilazany hoe: «Tsy ianareo rehetra no madio.»)'
  '12':
  - type: text
    content: 'Rehefa voasasan’i Jesoa ny tongotr’ireo mpianany, dia nandray ny lambany Izy ary nipetraka indray; ka hoy Izy tamin’ny mpianany:'
  - type: text
    content: '–Azonareo ve izay nataoko taminareo? '
  '13':
  - type: text
    content: 'Ianareo manao Ahy hoe Mpampianatra sy Tompo, ary marina ny filàzanareo fa izany tokoa Aho. '
  '14':
  - type: text
    content: 'Koa raha Izaho Tompo sy Mpampianatra aza no manasa ny tongotrareo, ianareo samy ianareo koa dia mba tokony hifanasa tongotra. '
  '15':
  - type: text
    content: 'Eny, nomeko fianarana ianareo mba hanaovanareo toy ny nataoko taminareo. '
  '16':
  - type: text
    content: Lazaiko marina dia marina aminareo fa ny mpanompo tsy lehibe noho ny tompony ary ny iraka tsy lehibe noho ilay naniraka azy
  - type: note
    content: Ampit and 12-16 sy Lk 22.24-27.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Raha azonareo izany, dia sambatra ianareo raha manao izany.
  '18':
  - type: text
    content: 'Tsy ho anareo rehetra no itenenako, satria fantatro izay nofidiko; kanefa aoka ho tanteraka ny tenin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe: «Ilay miara-mihina-mofo amiko no nanainga ny ombalahin-tongony hamely Ahy'
  - type: note
    content: Sal 41.10.
  - type: text
    content: '.» '
  '19':
  - type: text
    content: Dieny izao Aho no milaza aminareo alohan’ny hahatongavan’izany, mba hinoanareo rehefa tonga izany fa «Izaho no Ilay hatrizay ka ho mandrakizay
  - type: note
    content: 'Izaho... mandrakizay: ampit 8.24, 58 sy nta.'
  - type: text
    content: '.» '
  '2':
  - type: text
    content: 'Teo am-pisakafoana hariva tamin’izay i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: '; ary efa nomen’ny '
  - type: text
    content: devoly
  - type: text
    content: ' hevitra i Jodasy, zanakalahin’i Simôna '
  - type: text
    content: Iskariôta
  - type: text
    content: ', mba hanolotra an’i Jesoa. '
  '20':
  - type: text
    content: Lazaiko marina dia marina aminareo fa izay mandray ny hirahiko dia mandray Ahy, ary izay mandray Ahy dia mandray Ilay naniraka Ahy.
  - type: heading
    content: Ambaran’i Jesoa fa hanolotra Azy i Jodasy
  - type: heading
    content: (Jereo Mt 26.20-25; Mk 14.17-24; Lk 22.21-23)
  '21':
  - type: text
    content: 'Avy nilaza izany i Jesoa, dia nitebiteby ny fanahiny; ary nanambara Izy nanao hoe:'
  - type: text
    content: –Lazaiko marina dia marina aminareo fa ny anankiray aminareo no hanolotra Ahy!
  '22':
  - type: text
    content: 'Dia nifampijerijery ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' fa very hevitra ny amin’izay iray nolazainy. '
  '23':
  - type: text
    content: 'Ary nipetraka nihinana teo anilan’i Jesoa ny anankiray tamin’ireo mpianatra, dia ilay tian’i Jesoa; '
  '24':
  - type: text
    content: 'ka nohatsihin’i Petera io mpianatra io mba hamototra amin’i Jesoa hoe: Iza izay lazainao izay? '
  '25':
  - type: text
    content: 'Dia nirona teo amin’ny tratran’i Jesoa ilay mpianatra ka nanontany Azy hoe:'
  - type: text
    content: –Iza moa izany, ry Tompo?
  '26':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Ilay homeko ny sombi-mofo izay hatsoboko anaty ro!
  - type: text
    content: 'Tamin’izay dia noraisin’i Jesoa ilay sombi-mofo natsobony tanaty ro, ka nomeny an’i Jodasy. '
  '27':
  - type: text
    content: 'Vao nomena ilay sombi-mofo i Jodasy, dia nidiran’i '
  - type: text
    content: Satàna
  - type: text
    content: '; ka hoy i Jesoa taminy:'
  - type: text
    content: –Ataovy faingana izay tianao hatao!
  '28':
  - type: text
    content: 'Tamin’ireo nipetraka nihinana dia tsy nisy nahalala izay anton’ny nilazan’i Jesoa izany tamin’i Jodasy. '
  '29':
  - type: text
    content: 'Fa noho i Jodasy nitana ny kitapom-bola, dia nataon’ny sasany fa izao no voalazan’i Jesoa taminy: vidio ny zavatra ilaintsika amin’ny fankalazana ny '
  - type: text
    content: Paska
  - type: text
    content: ', na mba omeo zavatra ny mahantra. '
  '3':
  - type: text
    content: 'Fantatr’i Jesoa rahateo fa efa napetraky ny Ray eo an-tanany avokoa ny zavatra rehetra, sady fantany fa Andriamanitra no niaviany ary Andriamanitra no hiverenany. '
  '30':
  - type: text
    content: Vao nandray ilay sombi-mofo i Jodasy, dia nivoaka ny trano niaraka tamin’izay; ary efa alina ny andro.
  - type: heading
    content: Ny didy vaovao
  '31':
  - type: text
    content: 'Nony efa nivoaka ny trano i Jodasy, dia hoy i Jesoa:'
  - type: text
    content: '–Ankehitriny dia efa omem-boninahitra ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', ary Andriamanitra no omem-boninahitra eo aminy. '
  '32':
  - type: text
    content: 'Raha Andriamanitra no omem-boninahitra eo amin’ny Zanak’olona, dia Andriamanitra koa no hanome voninahitra Azy eo amin’ny tenany ary hanome voninahitra azy raha afaka kelikely. '
  '33':
  - type: text
    content: 'Vetivety foana sisa hitoerako eto aminareo, rey anaka; hitady Ahy ianareo ary toy ny voalazako tamin’ny Jiosy hoe: «Izay alehako tsy azonareo aleha'
  - type: note
    content: Jereo 7.34.
  - type: text
    content: '», no lazaiko aminareo koa ankehitriny. '
  '34':
  - type: text
    content: 'Didy vaovao no omeko anareo, dia ny mba hifankatiavanareo; aoka ho tahaka ny nitiavako anareo no mba hifankatiavanareo koa. '
  '35':
  - type: text
    content: Ny hahafantaran’ny olona rehetra fa mpianatro ianareo, dia raha mifankatia ianareo.
  - type: heading
    content: Ambaran’i Jesoa ny handavan’i Petera Azy
  '36':
  - type: text
    content: 'Hoy i Simôna Petera tamin’i Jesoa:'
  - type: text
    content: –Ho aiza Ianao, ry Tompo?
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Izay alehako, dia tsy azonao anarahana Ahy ankehitriny, fa any aoriana vao hanaraka Ahy ianao!
  '37':
  - type: text
    content: 'Ka hoy i Petera taminy:'
  - type: text
    content: –Ahoana, ry Tompo, no tsy ahazoako manaraka Anao ankehitriny? Na ny aiko aza dia hafoiko ho Anao.
  '38':
  - type: text
    content: 'I Jesoa kosa namaly hoe:'
  - type: text
    content: –Ny ainao hoe hafoinao ho Ahy? Lazaiko marina dia marina aminao fa alohan’ny maneno akoho, dia handà Ahy intelo ianao.
  '4':
  - type: text
    content: 'Koa nitsangana niala teo am-pihinanana Izy, dia nametraka ny lambany, ary naka lamba famaohana ka nisikinany. '
  '5':
  - type: text
    content: 'Avy eo Izy dia nampidina rano tamina koveta, ary nanomboka nanasa ny tongotr’ireo mpianany sy namaoka izany tamin’ny lamba nisikinany. '
  '6':
  - type: text
    content: 'Dia tonga teo amin’i Simôna Petera Izy; fa hoy i Petera taminy:'
  - type: text
    content: –Ianao ve, ry Tompo, hanasa ny tongotro?
  '7':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Izay ataoko dia tsy azonao ankehitriny, fa ho azonao any aoriana.
  '8':
  - type: text
    content: 'Fa hoy i Petera taminy:'
  - type: text
    content: –Sanatria, tsy hanasa ny tongotro na oviana na oviana Ianao!
  - type: text
    content: 'I Jesoa kosa namaly azy hoe:'
  - type: text
    content: –Raha tsy hosasako ianao, dia tsy hanana anjara amiko.
  '9':
  - type: text
    content: 'Dia hoy i Simôna Petera taminy:'
  - type: text
    content: –Raha izany, ry Tompo, dia tsy ny tongotro fotsiny fa ny tanako sy ny lohako ihany koa.
