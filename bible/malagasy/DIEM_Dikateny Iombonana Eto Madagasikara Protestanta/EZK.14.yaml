    children:
    - type: text
      text: 'Indray andro dia nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: ’i Israely vitsivitsy tonga tao amiko ka nipetraka teo anoloako mba hanontany ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 8.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na ny mpaminany na ny olona izay manontany azy dia samy hivesatra heloka mitovy ka samy hilanja ny vokany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay dia tsy hiala amiko intsony ny Israelita sady tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: handoto
    - type: text
      text: ' ny tenany amin’ny heloka rehetra fanaony intsony; dia ho vahoakako izy ary Izaho ho Andriamaniny. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy mahasakana ny fitsaran’Andriamanitra.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ry ilay taranak’olombelona, raha ohatra manota amiko ireo mponin’ny tany anankiray ka mivadika amiko, dia hampihatra ny heriko hamely azy Aho. Hosimbako ny tahirin-kaniny ka handefasako mosary izy; sady haringako avokoa ny olona sy ny biby fiompy eo amin’ny taniny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na dia misy telo lahy toa an’i Noà sy i Daniela ary i Jôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Noà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Danela ('
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Daniela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ary i '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jôba:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia olo-marina nalaza tamin’ny faritra atsinanana antenatenany iny. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Daniela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Danela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tsy fantatra afa-tsy ao amin’ny angano fenesianina ary tsy tokony hafangaro amin’ilay maherifo ao anatin’ny bokin’i Daniela.'
      marker-yv: yv-n
    - type: text
      text: ' aza eo anivon’ireo mponina ireo, dia tsy haharo afa-tsy ny ainy ihany ny fahamarinan’ireo. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Na koa handefasako biby masiaka amin’izany tany izany, ka hahalao azy satria hovonoin’ireo biby ireo ho faty ny mponina eo aminy ary tsy hisy handalo intsony eo noho ny tahotra ireo biby. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia nonina tao aza ireo telo lahy voalaza teo, dia ny tenany ihany no ho sisa tavela. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo, ary ho lao kosa ny tany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Na koa hampisiako ady eo amin’izany tany izany ary hodidiako ny tafika handrava azy sy handringana ny olona mbamin’ny biby fiompy ao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia nonina tao aza ireo telo lahy voalaza teo, dia ny tenany ihany no ho sisa tavela. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo.»
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Na koa handefasako areti-mandringana amin’izany tany izany, ka io areti-mandoza mandringana olona sy biby fiompy io no hanehoako ny fahatezerako aminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy tenin’ny TOMPO tamiko nanao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia nonina tao aza i Noà sy i Daniela ary i Jôba, dia ny ain’izy telo lahy ihany no ho voaaron’ny fahamarinany. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao kosa avy eo no voalazan’ny Tompo ANDRIANANAHARY tamiko: «Na dia nalefako hamely an’i Jerosalema aza ireo famaizako efatra mandoza ireo, izany hoe ny ady sy ny mosary sy ny biby masiaka ary ny areti-mandringana, mba handripahana ny olona sy ny biby fiompy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia misy ihany olona vitsivitsy lahy sy vavy sisa tavela. Navoaka hiala ny tanàna izy ary hanaraka anareo any am-pahababoana. Rehefa mahita ny fitondrantenany sy ny ataony ianareo, dia hionona amin’ny loza rehetra izay navelako hianjady amin’i Jerosalema. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hampionona anareo ireo olona sisa tavela ireo satria ho takatrareo, rehefa mahita ny fitondrantenany sy ny ataony ianareo, fa rariny izay rehetra nataoko namelezana io tanàna io. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ry ilay taranak’olombelona, ireto lehilahy ireto dia efa nampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany. Mihevitra ve izy fa hanaiky hanontaniany Aho? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Raha misy Israelita mampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany, nefa avy eo izy tonga hila hevitra amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', dia Izaho Tompo mihitsy no hamaly izany olona izany araka ny hamaroan’ireo sampy notompoiny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny valin-teniko dia hambabo ny fon’ny Israelita, izay nandao Ahy noho ny fitiavany ny sampiny.› '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho izany, ambarao amin’ny Israelita fa iza no lazain’ny Tompo ANDRIANANAHARY: ‹Ialao ny toe-dratsy, ilaozy ny sampinareo sy ny fomba rehetra maharikoriko fanaonareo.›'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Raha misy Israelita na vahiny monina ao Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny vahiny nonina tao Israely dia voatery hanaraka ny zavatra notakina amin’ny olom-pirenena israelita ary arovan’ny lalàna mitovy raha ohatra izy ka voafora*; jereo Lev 19.33-34.
      marker-yv: yv-n
    - type: text
      text: ' miala amiko ka mampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany, nefa avy eo izy tonga hila hevitra amin’ny mpaminany mba hahalala ny sitrapoko, dia Izaho TOMPO mihitsy no hamaly izany olona izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hifanandrina aminy Aho ka hataoko tonga oha-pitenenana izy ary hoesoriko tsy ho eo amin’ny vahoakako. Amin’izay dia hoekenareo fa Izaho no TOMPO.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy mpaminany voataona hamaly araka ny tenany ihany, dia Izaho TOMPO no efa nampanao azy izany; ary hanamparako ny heriko izy ka hoesoriko tsy ho eo amin’i Israely vahoakako. '
