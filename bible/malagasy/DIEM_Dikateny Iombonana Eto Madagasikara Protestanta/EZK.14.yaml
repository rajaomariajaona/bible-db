document_id: EZK.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tokony hanary ny sampiny i Israely
  - type: text
    content: 'Indray andro dia nisy '
  - type: text
    content: loholon
  - type: text
    content: ’i Israely vitsivitsy tonga tao amiko ka nipetraka teo anoloako mba hanontany ahy
  - type: note
    content: Jereo 8.1 sy nta.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Na ny mpaminany na ny olona izay manontany azy dia samy hivesatra heloka mitovy ka samy hilanja ny vokany. '
  '11':
  - type: text
    content: 'Amin’izay dia tsy hiala amiko intsony ny Israelita sady tsy '
  - type: text
    content: handoto
  - type: text
    content: ' ny tenany amin’ny heloka rehetra fanaony intsony; dia ho vahoakako izy ary Izaho ho Andriamaniny. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  - type: heading
    content: Tsy misy mahasakana ny fitsaran’Andriamanitra.
  '12':
  - type: text
    content: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '13':
  - type: text
    content: '«Ry ilay taranak’olombelona, raha ohatra manota amiko ireo mponin’ny tany anankiray ka mivadika amiko, dia hampihatra ny heriko hamely azy Aho. Hosimbako ny tahirin-kaniny ka handefasako mosary izy; sady haringako avokoa ny olona sy ny biby fiompy eo amin’ny taniny. '
  '14':
  - type: text
    content: Ary na dia misy telo lahy toa an’i Noà sy i Daniela ary i Jôba
  - type: note
    content: 'Noà, Danela (Daniela) ary i Jôba: dia olo-marina nalaza tamin’ny faritra atsinanana antenatenany iny. Daniela na Danela dia tsy fantatra afa-tsy ao amin’ny angano fenesianina ary tsy tokony hafangaro amin’ilay maherifo ao anatin’ny bokin’i Daniela.'
  - type: text
    content: ' aza eo anivon’ireo mponina ireo, dia tsy haharo afa-tsy ny ainy ihany ny fahamarinan’ireo. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  '15':
  - type: text
    content: '«Na koa handefasako biby masiaka amin’izany tany izany, ka hahalao azy satria hovonoin’ireo biby ireo ho faty ny mponina eo aminy ary tsy hisy handalo intsony eo noho ny tahotra ireo biby. '
  '16':
  - type: text
    content: Na dia nonina tao aza ireo telo lahy voalaza teo, dia ny tenany ihany no ho sisa tavela. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo, ary ho lao kosa ny tany.
  '17':
  - type: text
    content: '«Na koa hampisiako ady eo amin’izany tany izany ary hodidiako ny tafika handrava azy sy handringana ny olona mbamin’ny biby fiompy ao. '
  '18':
  - type: text
    content: Na dia nonina tao aza ireo telo lahy voalaza teo, dia ny tenany ihany no ho sisa tavela. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo.»
  '19':
  - type: text
    content: '«Na koa handefasako areti-mandringana amin’izany tany izany, ka io areti-mandoza mandringana olona sy biby fiompy io no hanehoako ny fahatezerako aminy. '
  '2':
  - type: text
    content: 'Koa nisy tenin’ny TOMPO tamiko nanao hoe: '
  '20':
  - type: text
    content: Na dia nonina tao aza i Noà sy i Daniela ary i Jôba, dia ny ain’izy telo lahy ihany no ho voaaron’ny fahamarinany. Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa tsy ho afaka hamonjy na dia ny zanany lahy sy vavy aza ireo.»
  '21':
  - type: text
    content: 'Izao kosa avy eo no voalazan’ny Tompo ANDRIANANAHARY tamiko: «Na dia nalefako hamely an’i Jerosalema aza ireo famaizako efatra mandoza ireo, izany hoe ny ady sy ny mosary sy ny biby masiaka ary ny areti-mandringana, mba handripahana ny olona sy ny biby fiompy, '
  '22':
  - type: text
    content: 'dia misy ihany olona vitsivitsy lahy sy vavy sisa tavela. Navoaka hiala ny tanàna izy ary hanaraka anareo any am-pahababoana. Rehefa mahita ny fitondrantenany sy ny ataony ianareo, dia hionona amin’ny loza rehetra izay navelako hianjady amin’i Jerosalema. '
  '23':
  - type: text
    content: Eny, hampionona anareo ireo olona sisa tavela ireo satria ho takatrareo, rehefa mahita ny fitondrantenany sy ny ataony ianareo, fa rariny izay rehetra nataoko namelezana io tanàna io. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '3':
  - type: text
    content: '«Ry ilay taranak’olombelona, ireto lehilahy ireto dia efa nampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany. Mihevitra ve izy fa hanaiky hanontaniany Aho? '
  '4':
  - type: text
    content: 'Koa ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Raha misy Israelita mampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany, nefa avy eo izy tonga hila hevitra amin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ', dia Izaho Tompo mihitsy no hamaly izany olona izany araka ny hamaroan’ireo sampy notompoiny. '
  '5':
  - type: text
    content: 'Ary ny valin-teniko dia hambabo ny fon’ny Israelita, izay nandao Ahy noho ny fitiavany ny sampiny.› '
  '6':
  - type: text
    content: 'Noho izany, ambarao amin’ny Israelita fa iza no lazain’ny Tompo ANDRIANANAHARY: ‹Ialao ny toe-dratsy, ilaozy ny sampinareo sy ny fomba rehetra maharikoriko fanaonareo.›'
  '7':
  - type: text
    content: «Raha misy Israelita na vahiny monina ao Israely
  - type: note
    content: Ny vahiny nonina tao Israely dia voatery hanaraka ny zavatra notakina amin’ny olom-pirenena israelita ary arovan’ny lalàna mitovy raha ohatra izy ka voafora*; jereo Lev 19.33-34.
  - type: text
    content: ' miala amiko ka mampiorina ny sampiny ao am-pony sady zavatra mitarika azy amin’ny heloka no apetrany eo anoloany, nefa avy eo izy tonga hila hevitra amin’ny mpaminany mba hahalala ny sitrapoko, dia Izaho TOMPO mihitsy no hamaly izany olona izany. '
  '8':
  - type: text
    content: Hifanandrina aminy Aho ka hataoko tonga oha-pitenenana izy ary hoesoriko tsy ho eo amin’ny vahoakako. Amin’izay dia hoekenareo fa Izaho no TOMPO.
  '9':
  - type: text
    content: '«Raha misy mpaminany voataona hamaly araka ny tenany ihany, dia Izaho TOMPO no efa nampanao azy izany; ary hanamparako ny heriko izy ka hoesoriko tsy ho eo amin’i Israely vahoakako. '
