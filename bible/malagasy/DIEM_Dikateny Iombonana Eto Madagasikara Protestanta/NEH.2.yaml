document_id: NEH.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Omen-dalana hiverina any Jerosalema i Nehemià
  - type: text
    content: Tamin’ny taona faha-roapolo nanjakàn’i Artakserksesa, volana Nisàna,
  - type: note
    content: 'Nisàna: Volana voalohany amin’ny taona manomboka lohataona, izany hoe marsa-aprily. Efa-bolana taorian’ny zavatra voatantara ao amin’ny toko 1 ny zavatra voatantara ao amin’ny toko 1 ny zavatra tantaraina eto amin’ny fanombohan’ny toko 2.'
  - type: text
    content: ' raha ilay nisakafo iny indrindra ny amperôra, dia naka divay aho ka nandroso azy taminy. Vao izay aho no mba nalahelo teo anatrehan’ny amperôra '
  '10':
  - type: text
    content: Raha nahare izany i Sanebalato
  - type: note
    content: 'Sanebalato: izay avy ao amin’ny tanàna Bety-Hirôna, no governoran’i Samaria.'
  - type: text
    content: ' ilay Hôrônita sy i Tôbià ilay Hamônita mpanampy azy, dia samy sosotra tokoa satria nisy lehilahy tonga hikarakara izay hahasoa ny Israelita.'
  - type: heading
    content: Jeren’i Nehemià ny hasimbàn’ny manda
  '11':
  - type: text
    content: 'Dia tonga tany Jerosalema aho ka nipetrapetraka tao telo andro; '
  '12':
  - type: text
    content: 'nefa tsy nisy olona nilazako izay natsindrin’Andriamanitra ny foko mba hatao ho an’i Jerosalema. Avy eo dia niainga alina aho, nombàn’olona vitsivitsy; ary tsy nisy biby nentiko afa-tsy ilay boriky nitaingenako ihany. '
  '13':
  - type: text
    content: Nandeha alina aho ka nivoaka ilay vavahadin’ny Lohasaha
  - type: note
    content: 'vavahadin’ny lohasaha: dia teo amin’ny manda andrefan’ny tanàna; ny vavahadin’ny Fanariam-pako dia teo amin’ny zorony atsimo-andrefana; ny loharanon’ny Dragona dia tsy fantatra.'
  - type: text
    content: ' dia nandroso nankany amin’ilay loharanon’ny Dragona ary nihazo ilay vavahadin’ny Fanariam-pako. Nozahako ny mandan’i Jerosalema efa rava sy ny vavahady efa levon’ny afo. '
  '14':
  - type: text
    content: Dia nizotra nankany amin’ilay vavahadin’ny Loharano
  - type: note
    content: 'Vavahadin’ny loharano: Dia teo amin’ny zoro atsimo atsinanan’ny tanàna; io vavahady io no toa handalovana rehefa mankany amin’ny Loharanon’ny Mpamotsy lamba (jereo 2 Sam 17.17 sy nta). Ny farihin’ny mpanjaka dia angamba iray ihany amin’ilay farihy voateny ao amin’ny 3.15.'
  - type: text
    content: ' aho sy nihazo ilay farihin’ny mpanjaka; nefa tsy nisy intsony lalana azon’ilay biby nitaingenako naleha. '
  '15':
  - type: text
    content: Iny alina iny ihany no niakarako ny tevana amoron’ny lohasahan-driaka sy mbola nizahako ny manda; izay vao nitampody aho, dia niditra ilay Vavahadin’ny Lohasaha ka tafaverina
  - type: note
    content: Nihodidina ny antsasaky ny manda eo ho eo i Nehemià niainga avy any amin’ny lafy andrefana nankany amin’ny lafy atsimo sy atsinanana, alohan’ny hiverenany ao an-tanàna, alohan’ny hiverenany ao an-tanàna tamin’ny lalany teo ihany.
  - type: text
    content: .
  '16':
  - type: text
    content: Tsy nahalala izay nalehako na izay nataoko ireo mpanapaka; fa, talohan’izao, dia tsy mbola nisy nilazako izany ireo Jiosy, na mpisorona na loholona
  - type: note
    content: 'mpanapaka, loholona: tsy azo antoka ny hevitry ny voambolana hebreo mifanandrify amin’ireo teny ireo.'
  - type: text
    content: ' na mpanapaka na olon-kafa mpiandraikitra ny asa. '
  '17':
  - type: text
    content: Ary hoy aho taminy;
  - type: text
    content: –Hitanareo ny fahavoazana mihatra amintsika fa rava i Jerosalema ary kilan’ny afo ny vavahadiny. Koa andeha hanangana indray ny mandan’i Jerosalema isika mba tsy ho fandatsa intsony!
  '18':
  - type: text
    content: 'Dia nambarako azy ny fiarovana nanambinan’Andriamanitra ahy ary koa ny teny nolazain’ny amperôra tamiko; ka hoy ireo hoe:'
  - type: text
    content: –Ndao àry isika hanorina ny tanàna!
  - type: text
    content: 'Dia nivonon-kanao izany asa soa izany tamin-kerimpo ry zareo. '
  '19':
  - type: text
    content: 'Fa raha nahare izany i Sanebalato ilay Hôrônita sy i Tôbià ilay Hamônita mpanampy azy ary i Gesema ilay Arabo, dia nanaraby sy naneso anay hoe:'
  - type: text
    content: –Inona izao zavatra hataonareo izao? Hikomy amin’ny amperôra angaha ianareo?
  '2':
  - type: text
    content: 'ka hoy izy tamiko:'
  - type: text
    content: –Nahoana no malahelo tarehy ianao, kanefa tsy marary tsinona? Tsy zavatra hafa izao fa alahelom-po mihitsy.
  - type: text
    content: 'Dia raiki-tahotra mafy aho '
  '20':
  - type: text
    content: 'Izao kosa no valin-teny nasetriko azy:'
  - type: text
    content: '–Ilay Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' mihitsy no hanambina anay; ka dia hirotsaka hanorina ny tanàna indray izahay mpanompony. Ianareo kosa tsy manana anjara na zo na fahatsiarovana akory atỳ Jerosalema!'
  '3':
  - type: text
    content: ka niteny tamin’ny amperôra hoe
  - type: note
    content: Jereo 2 Mp 25.8-10; 2 Tan 36.19; Jer 52.12-13.
  - type: text
    content: ':'
  - type: text
    content: –Ho velona mandrakizay anie ianao, ry andriamanjaka! Nahoana no tsy halahelo tarehy aho, fa rava ny tanàna misy ny fasan-drazako sady levon’ny afo ny vavahadiny?
  '4':
  - type: text
    content: 'Dia hoy ny amperôra tamiko:'
  - type: text
    content: –Inona àry no angatahinao?
  - type: text
    content: 'Nivavaka tamin’Andriamanitry ny '
  - type: text
    content: lanitra
  - type: text
    content: ' aho aloha, '
  '5':
  - type: text
    content: 'vao niteny tamin’ny amperôra hoe:'
  - type: text
    content: –Raha sitrakao izany, ry andriamanjaka, ary raha misy fankatelemanao ahy mpanomponao, dia mba alefaso ho any Joda aho, ho any amin’ilay tanàna misy ny fasan-drazako mba hanamboarako azy.
  '6':
  - type: text
    content: Ny amperôra, izay nanana ny vadibeny nipetraka teo anilany, dia mbola nanontany ahy hoe
  - type: note
    content: Araka ny 5.14, dia mijanona 12 taona tao Jerosalema Nehemià.
  - type: text
    content: ':'
  - type: text
    content: –Haharitra fotoana firy any anefa ianao ary rahoviana no hiverina?
  - type: text
    content: 'Dia sitraky ny amperôra ny handefa ahy, koa nilaza fetr’andro taminy aho '
  '7':
  - type: text
    content: 'sady nanampy teny hoe:'
  - type: text
    content: '–Raha sitrakao, ry andriamanjaka, dia aoka hisy taratasy homena ahy ho an’ireo governoran’ny faritra any andafy andrefan’ny ony Eofrata, mba hamelany ahy handeha hatrany Joda. '
  '8':
  - type: text
    content: 'Aoka hisy taratasy homena ahy koa ho an’i Asafa mpiandraikitra ny alam-panjakana mba hanomezany hazo ahy hatao amin’ny varavaran’ny trano fiarovana manolotra ny '
  - type: text
    content: tempoly
  - type: text
    content: ' sy amin’ny mandan’ny tanàna ary amin’ny trano hitoerako.'
  - type: text
    content: Dia nomen’ny amperôra ahy ireo taratasy ireo, araka ny fiarovana nanambinan’Andriamanitra ahy.
  '9':
  - type: text
    content: 'Nankany amin’ireo governora any andafy andrefan’ny ony Eofrata aho ka nanolotra azy ny taratasin’ny amperôra. Nisy manamboninahitra sy mpitaingin-tsoavaly rahateo nirahin’ny amperôra mba hiaraka amiko. '
