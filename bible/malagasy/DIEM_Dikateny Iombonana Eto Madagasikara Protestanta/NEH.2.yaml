document_id: NEH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omen-dalana hiverina any Jerosalema i Nehemià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona faha-roapolo nanjakàn’i Artakserksesa, volana Nisàna,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nisàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Volana voalohany amin’ny taona manomboka lohataona, izany hoe marsa-aprily. Efa-bolana taorian’ny zavatra voatantara ao amin’ny toko 1 ny zavatra voatantara ao amin’ny toko 1 ny zavatra tantaraina eto amin’ny fanombohan’ny toko 2.
    marker-yv: yv-n
  - type: text
    text: ' raha ilay nisakafo iny indrindra ny amperôra, dia naka divay aho ka nandroso azy taminy. Vao izay aho no mba nalahelo teo anatrehan’ny amperôra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no malahelo tarehy ianao, kanefa tsy marary tsinona? Tsy zavatra hafa izao fa alahelom-po mihitsy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia raiki-tahotra mafy aho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ka niteny tamin’ny amperôra hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 25.8-10; 2 Tan 36.19; Jer 52.12-13.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ho velona mandrakizay anie ianao, ry andriamanjaka! Nahoana no tsy halahelo tarehy aho, fa rava ny tanàna misy ny fasan-drazako sady levon’ny afo ny vavahadiny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny amperôra tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no angatahinao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nivavaka tamin’Andriamanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' aho aloha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'vao niteny tamin’ny amperôra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha sitrakao izany, ry andriamanjaka, ary raha misy fankatelemanao ahy mpanomponao, dia mba alefaso ho any Joda aho, ho any amin’ilay tanàna misy ny fasan-drazako mba hanamboarako azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny amperôra, izay nanana ny vadibeny nipetraka teo anilany, dia mbola nanontany ahy hoe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Araka ny 5.14, dia mijanona 12 taona tao Jerosalema Nehemià.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Haharitra fotoana firy any anefa ianao ary rahoviana no hiverina?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia sitraky ny amperôra ny handefa ahy, koa nilaza fetr’andro taminy aho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sady nanampy teny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha sitrakao, ry andriamanjaka, dia aoka hisy taratasy homena ahy ho an’ireo governoran’ny faritra any andafy andrefan’ny ony Eofrata, mba hamelany ahy handeha hatrany Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka hisy taratasy homena ahy koa ho an’i Asafa mpiandraikitra ny alam-panjakana mba hanomezany hazo ahy hatao amin’ny varavaran’ny trano fiarovana manolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' sy amin’ny mandan’ny tanàna ary amin’ny trano hitoerako.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nomen’ny amperôra ahy ireo taratasy ireo, araka ny fiarovana nanambinan’Andriamanitra ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nankany amin’ireo governora any andafy andrefan’ny ony Eofrata aho ka nanolotra azy ny taratasin’ny amperôra. Nisy manamboninahitra sy mpitaingin-tsoavaly rahateo nirahin’ny amperôra mba hiaraka amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha nahare izany i Sanebalato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sanebalato: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay avy ao amin’ny tanàna Bety-Hirôna, no governoran’i Samaria.
    marker-yv: yv-n
  - type: text
    text: ' ilay Hôrônita sy i Tôbià ilay Hamônita mpanampy azy, dia samy sosotra tokoa satria nisy lehilahy tonga hikarakara izay hahasoa ny Israelita.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeren’i Nehemià ny hasimbàn’ny manda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tonga tany Jerosalema aho ka nipetrapetraka tao telo andro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nefa tsy nisy olona nilazako izay natsindrin’Andriamanitra ny foko mba hatao ho an’i Jerosalema. Avy eo dia niainga alina aho, nombàn’olona vitsivitsy; ary tsy nisy biby nentiko afa-tsy ilay boriky nitaingenako ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nandeha alina aho ka nivoaka ilay vavahadin’ny Lohasaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'vavahadin’ny lohasaha: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia teo amin’ny manda andrefan’ny tanàna; ny vavahadin’ny Fanariam-pako dia teo amin’ny zorony atsimo-andrefana; ny loharanon’ny Dragona dia tsy fantatra.
    marker-yv: yv-n
  - type: text
    text: ' dia nandroso nankany amin’ilay loharanon’ny Dragona ary nihazo ilay vavahadin’ny Fanariam-pako. Nozahako ny mandan’i Jerosalema efa rava sy ny vavahady efa levon’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nizotra nankany amin’ilay vavahadin’ny Loharano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Vavahadin’ny loharano: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia teo amin’ny zoro atsimo atsinanan’ny tanàna; io vavahady io no toa handalovana rehefa mankany amin’ny Loharanon’ny Mpamotsy lamba (jereo 2 Sam 17.17 sy nta). Ny farihin’ny mpanjaka dia angamba iray ihany amin’ilay farihy voateny ao amin’ny 3.15.
    marker-yv: yv-n
  - type: text
    text: ' aho sy nihazo ilay farihin’ny mpanjaka; nefa tsy nisy intsony lalana azon’ilay biby nitaingenako naleha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Iny alina iny ihany no niakarako ny tevana amoron’ny lohasahan-driaka sy mbola nizahako ny manda; izay vao nitampody aho, dia niditra ilay Vavahadin’ny Lohasaha ka tafaverina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nihodidina ny antsasaky ny manda eo ho eo i Nehemià niainga avy any amin’ny lafy andrefana nankany amin’ny lafy atsimo sy atsinanana, alohan’ny hiverenany ao an-tanàna, alohan’ny hiverenany ao an-tanàna tamin’ny lalany teo ihany.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy nahalala izay nalehako na izay nataoko ireo mpanapaka; fa, talohan’izao, dia tsy mbola nisy nilazako izany ireo Jiosy, na mpisorona na loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: mpanapaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'loholona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy azo antoka ny hevitry ny voambolana hebreo mifanandrify amin’ireo teny ireo.
    marker-yv: yv-n
  - type: text
    text: ' na mpanapaka na olon-kafa mpiandraikitra ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hoy aho taminy;
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hitanareo ny fahavoazana mihatra amintsika fa rava i Jerosalema ary kilan’ny afo ny vavahadiny. Koa andeha hanangana indray ny mandan’i Jerosalema isika mba tsy ho fandatsa intsony!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nambarako azy ny fiarovana nanambinan’Andriamanitra ahy ary koa ny teny nolazain’ny amperôra tamiko; ka hoy ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndao àry isika hanorina ny tanàna!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nivonon-kanao izany asa soa izany tamin-kerimpo ry zareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha nahare izany i Sanebalato ilay Hôrônita sy i Tôbià ilay Hamônita mpanampy azy ary i Gesema ilay Arabo, dia nanaraby sy naneso anay hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona izao zavatra hataonareo izao? Hikomy amin’ny amperôra angaha ianareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao kosa no valin-teny nasetriko azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ilay Andriamanitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' mihitsy no hanambina anay; ka dia hirotsaka hanorina ny tanàna indray izahay mpanompony. Ianareo kosa tsy manana anjara na zo na fahatsiarovana akory atỳ Jerosalema!'
