document_id: 1CH.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Joda araka ny lisitra hafa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny zanakalahin’i Joda dia i Peretsa sy i Hetsirôna mbamin’i Karmỳ sy i Hora ary i Sôbala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ireo olona ireo dia hita ao amin’ny 2.4, 5, 7, 19, 50.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary niantso an’ilay Andriamanitr’i Israely i Jahebetsy ka nanao hoe: «Enga anie hotahînao tokoa aho, ka hohalalahinao ny taniko; ary aoka ny tananao homba ahy, ka hataonao lavitra ahy ny loza mba tsy ho zoim-pahoriana aho!» Dia nohenoin’Andriamanitra izay nangatahiny.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I Keloba, rahalahin’i Sihà, no ray niteraka an’i Mehira izay rain’i Estôna. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary i Estôna no ray niteraka an’i Bety-Rafà sy i Pasea ary i Tehinà; ity Tehinà ity no mpanorina ny tanànan’i Nahasa. Ny taranak’ireo no mponina tao Rekà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy misy mihitsy amin’ireo olona voalaza eo amin’ny and 11-12 hita amin’ny lisitra hafa momba ny taranak’i Joda.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny zanakalahin’i Kenaza dia i Hôtniela sy i Seraià; ary ny zanakalahin’i Hôtniela dia i Hatata sy i Mehônôtahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Kenaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hôtniela:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny and 15 sy Jos 15.17. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: sy i Mehônôtahy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': araka ny dkt tranainy grika sy latinina; fa io anarana io dia tsy hita ao amin’ny RM and 13.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I Mehônôtahy no ray niteraka an’i Hôfrà; ary i Seraià no ray niteraka an’i Jôaba razamben’ny ao Geharasima na hoe Lohasahan’ny mpiasa, fa mpiasa izy ireo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ireo zanakalahin’i Kaleba zanakalahin’i Jefonè dia i Hiro sy Elà ary i Nahama; ary ny zanakalahin’i Elà dia i Kenaza.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny zanakalahin’i Jehalaleela dia i Zifa sy i Zifà ary i Tirià sy i Asarela.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny zanakalahin’i Hezrà dia i Jetera sy i Mereda ary Hefera sy i Jalôna. Ary nanambady an’i Bitià, zanakavavin’ny Farao, i Mereda, ka niteraka an’i Miriama sy i Samày ary i Jisbà ilay mpanorina an’i Estemôa; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary i Jehodià, vadiny hafa koa, dia niteraka telo mirahalahy: i Jereda mpanorina an’i Gedôra, i Hebera mpanorina an’i Sôkao, ary i Jekotiela mpanorina an’i Zanôa.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny anabavin’i Nahama no vadin’i Hôdià; ireo zanakalahin-dravehivavy dia ilay mpanorina ny tanàna Kehilà izay an’ny Garmita sy ilay mpanorina ny tanàna Estemôa izay an’ny Mahekatîta.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I Reaià, zanakalahin’i Sôbala, no ray niteraka an’i Jahata; ary i Jahata no ray niteraka an’i Ahomay sy i Lahada: izy mirahalahy ireto no razamben’ny tarika Tsôrehatita.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny zanakalahin’i Simôna dia i Amnôna sy i Rinà ary i Bena-Hanàna sy i Tilôna. Taranak’i Jisehỳ: i Zôheta sy ilay zanakalahin’i Zôheta'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy hita any amin’ny lisitra hafa momba ny taranak’i Joda mihitsy ireo olona voalaza eo amin’ny and 16-20 ireo.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Taranak’i Selà, zanakalahin’i Joda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.3.
      marker-yv: yv-n
    - type: text
      text: ': i Hera mpanorina an’i Lekà; i Lahedà mpanorina an’i Maresà; ireo tarika mpanenona lamba rongony tao Bety-Asbea; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: i Jôkima sy ny mponina tao Kôzebà; ary i Jôasy sy i Sarafa, izay samy nanambady vehivavy môabita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanambady vehivavy môabita '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nifehy ny faritany Môaba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'vao niverina nonina tao Betlehema: zavatra efa tranainy izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny taranak’izy mirahalahy no mpanefy vilany sady mponina tao Netahima sy Gedera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mponina tao Netahima sy Gedera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hoe mponina tao anivona tanimboly sy saha voafefy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ; tamin’ny alalan’ny mpanjaka no nonenany tao satria asa ho an’ny mpanjaka no nataony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak’i Simehôna
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny zanakalahin’i Simehôna dia i Nemoela sy i Jamîna mbamin’i Jariba sy i Zera ary i Saoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Gen 46.10, fa indraindray ao ny anarana dia samihafa.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I Saloma no zanakalahin’i Saoly, i Mibsama zanakalahin’i Saloma, i Mismà zanakalahin’i Mibsama. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny zanakalahin’i Mismà dia i Hamoela sy i Jakora ary i Simehỳ. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: I Simehỳ dia nanana zanakalahy 16 sy zanakavavy enina, fa ireo rahalahiny kosa tsy nisy niteraka zanakalahy maro; koa ny fokon’i Simehôna manontolo dia tsy nitombo hoatra ny taranak’i Joda.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-32
    - type: text
      text: Mandra-panjakan’i Davida
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tamin’ny andron’i Davida, dia toa tsy nisy araka ny maha izy azy intsony ny fokokelin’i Simehôna. Heverina ho nitambatra tamin’ny foko lehiben’i Joda teo akaikiny izy. '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: –and 28-33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': ampit Jos 19.1-8.'
      marker-yv: yv-n
    - type: text
      text: ', dia ireto no tanàna nonenan’ny taranak’i Simehôna: i Beera-Seba sy i Môladà, i Hatsary-Sohala sy i Bahalà, i Hetsema sy i Tôlada, i Betoela sy i Hôrmà, i Tsiklàga sy i Bety-Markabôta, i Hatsary-Sosima sy i Bety-Birỳ ary i Saharaîma mbamin’ireo tanàna kely momba azy avy. Teo koa ireto tanàna dimy ireto: dia i Hetama sy i Haîna, i Rimôna sy i Tôkèna ary i Hasàna '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Ireto no zanakalahin’i Hora, lahimatoan’i Efrata sady mpanorina an’i Betlehema: i Natama sy i Jizrehela ary i Jismà sy i Jidbasa; ny anabavin’izy efa-dahy kosa atao hoe Hatselpônỳ; ao koa i Penoela mpanorina an’i Gedôra, ary i Hezera mpanorina an’i Hosà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efrata:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.50.
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: mbamin’ny tanàna kely rehetra manodidina ireo tanàna ireo hatrany Bahalato. Ireo no toeram-ponenan’ny taranak’i Simehôna ary samy nanana ny tantaram-pirazanana manokana izy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-38
    - type: text
      text: 'Ireto voatonona anarana ireto no filoha teo amin’ny tarika nisy azy avy: i Mesôbaba sy i Jamelèka, i Jôsa zanakalahin’i Amatsià, i Jôela, i Jehò ilay zanakalahin’i Jôsibeià sy zafin’i Seraià ary zafiafin’i Hasièla, i Eliôhenay sy i Jahakôbà, i Jesôhaià, i Hasaià sy i Hadiela mbamin’i Jesimiela sy i Benaià ary i Zizà ilay zanakalahin’i Sifehỳ sy zafin’i Alôna sy zafiafin’i Jedaià sy zafin-dohalik’i Simrỳ ary zafin-kitrokelin’i Semahià. Samy nihamaro fatratra ny fianakaviany, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'ka nandeha nankany akaikin’i Gedôra, dia hatrany atsinanan’ny lohasaha mba hitady ahitra ho an’ny andian’ondriny. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Koa nahita ahitra milenodenoka sady tsara izy ireo ary midadasika ny tany sady milamina feizay; taranak’i Hama no mponina tao taloha. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Tamin’ny andron’i Hezekià mpanjakan’i Joda no tonga tao ireo filohan-tarika voasoratra anarana ireo ka namely ny tranolay sy ny toby fiarovana hitany tao ary nandringana ny taranak’i Hama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'toby fiarovana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'rijan-teny toa mitombina; ao amin’ny RM dia hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny Mehônita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: –Ny taranak’i Hama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia tsy maintsy naringana satria Kanahanita.'
      marker-yv: yv-n
    - type: text
      text: ; dia nonina tao nisolo toerana azy mandraka androany, satria nisy ahitra ho an’ny andian’ondriny tao.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary tamin’ny taranak’i Simehôna dia nisy lehilahy dimanjato notarihin’i Pelatià sy i Neharià ary i Refaià sy i Hoziela izay samy zanakalahin’i Jisehỳ; nankany an-tendrombohitr’i Sehira ireo, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ka namely ny Hamalekîta sisa afa-nandositra, dia nonina tany mandraka androany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I Asehora, mpanorina an’i Tekôa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.24.
      marker-yv: yv-n
    - type: text
      text: ', dia nanana vady roa: i Helà sy i Naharà. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I Naharà no reny niteraka an’i Ahozama sy i Hefera ary i Temenỳ sy i Ahastarỳ; ireo no zanakalahin’i Naharà. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny zanakalahin’i Helà kosa dia i Tsereta sy i Tsôhara ary i Etnana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I Kôtsa no ray niteraka an’i Hanoba sy i Tsôbebà; ary izy koa no razamben’ny tarik’i Aharihela, zanakalahin’i Haroma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy misy na iray aza amin’ireo olona ireo miseho amin’ny lisitra hafa momba ny taranak’i Joda.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nisy atao hoe Jahebetsy, izay nalaza kokoa noho ireo rahalahiny. Ny reniny no nanome ny anarany hoe Jahebetsy satria hoy izy: «Zoim-pahoriana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jahebetsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampit 2.55; amin’ny RM eto dia misy tsilalaon-teny amin’ny anarana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jahabetsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny teny nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zoim-pahoriana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (and 9 sy and 10).'
      marker-yv: yv-n
    - type: text
      text: ' aho, raha niteraka azy». '
