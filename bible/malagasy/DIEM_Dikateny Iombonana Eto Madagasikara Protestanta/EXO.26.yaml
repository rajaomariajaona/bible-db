document_id: EXO.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fonena-masina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Ary momba ny fonena-masina, dia lamba temitra folo vita amin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky no hanaovana azy, ravahana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: kerobima
  - type: text
    text: ' vita peta-kofehy tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitovy avokoa ny refin’ny lamba temitra rehetra, ka 14 metatra ny lavany, ary roa metatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatambatra ho vitrana iray aloha ny lamba temitra dimy; avy eo dia hatao toy izany koa ny dimy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hopetahana kofehy volon’ondry miloko volomparasy ny sisin-damba farany amin’ny vitrana voalohany, ary hatao toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hisy kofehy dimampolo amin’ny sisin’ny vitrana tsirairay, ka hifanandrify amin’ny laharan’ny kofehy eo amin’ny vitrana iray mifanila aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Farango volamena dimampolo no hamboarina mba hanakambanana ny vitrana roa, dia hatambatra ho iray ihany ny fonena-masina manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Avy eo dia tranolay faharoa no hamboarina amin’ny lamba temitra 11 vita amin’ny volon’osy, mba handrakofana ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hitovy refy avokoa ny lamba temitra rehetra, ka 15 metatra ny lavany, ary roa metatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hatambatra ho vitrana iray aloha ny lamba temitra dimy; avy eo dia hatao toy izany koa ny enina hafa, ka ny lamba temitra fahenina dia haforitra eo anoloan’ny tranolay masina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hopetahana tadivavarana dimampolo ny sisin-damba farany amin’ny vitrana voalohany, ary hatao toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Farango halimo dimampolo no hamboarina, dia hatsofoka amin’ny tadivavarana mba hampikambana ny lay ho iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manaraka ny sakan’ny lamba temitra dia antsasaky ny ambainy fanampiny no hikiraviravy ao ivohon’ny Tranolay masina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manaraka ny halavan’ny lamba dia hozaraina roa ny iray metatra fanampiny, ka hikiraviravy eo an-daniny roa amin’ny fonena-masina, mba haharakotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mba hiarovana ny lay faharoa, dia hoditr’ondrilahy miloko mena sy sarona vita amin’ny hoditra mafy no harakotra eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Hisy hazo fisaka hamboarina amin’ny hazo mimôzà ka hatsangana hitondra ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hitovy refy ny hazo fisaka rehetra, ka dimy metatra ny lavan’ny tsirairay ary 75 santimetatra ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hasiana lahiny roa mirazotra isaky ny hazo fisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hazo fisaka roapolo no hatao ho an’ny lafiny atsimo amin’ny fonena-masina, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary hasiana faladia volafotsy efapolo hitondra azy; ka isaky ny hazo fisaka dia faladiany roa avy, izay mifanandrify amin’ny lahiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ho an’ny lafiny avaratra dia hazo fisaka roapolo koa no hatao, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'miaraka amin’ny faladia volafotsy efapolo; ka faladiany roa avy isaky ny hazo fisaka. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ho an’ny lafiny andrefana izay eo ivohon’ny fonena-masina dia hazo fisaka enina no hatao, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'miampy hazo fisaka roa manokana hatao erỳ amin’ny zorony roa erỳ afara. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo hazo fisaka roa ireo dia hisy elanelany ara-dalàna eo amin’ny fotony, fa hifanatona tsikelikely, ka hikambana eo amin’ny haba iray any an-dohany. Hatao mitovy izy roa ho hazo fisaka eo amin’ny zorony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa ny lafiny ivohon’ny fonena-masina izany dia hisy hazo fisaka valo sy faladiany volafotsy 16, ka faladia roa avy isaky ny hazo fisaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Hanamboarana bara mimôzà ireo hazo fisaka ireo, ka barany dimy hihazona ny hazo fisaka amin’ny lafiny iray amin’ny fonena-masina; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'barany dimy koa hihazona ireo hazo fisaka amin’ny lafiny iray hafa; ary barany dimy hafa ho an’ireo hazo fisaka amin’ny lafiny ivoho ao andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny barany afovoany dia handalo eo am-pisasahan’ny haavon’ny hazo fisaka, ary hatao mahatakatra ny sisiny an-daniny roa amin’ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Horakofana takela-bolamena, na ny hazo fisaka na ny barany; ary hisy haba volamena hotefena hanatsofohana ny barany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Rehefa izany, ry Mosesy, dia asaovy atsangana araka ny môdely izay efa nasehoko anao teto an-tendrombohitra ny fonena-masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Mpahay taozavatra no hanao efitra lamba iray amin’ny rongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ravahana kerobima roa vita amin’ny peta-kofehy tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Io efitra lamba io dia hahantona amin’ny fantsika volamena eo amin’ny andry efatra vita amin’ny hazo mimôzà voarakotra takela-bolamena sady mipetraka amin’ny faladia volafotsy efatra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Eo ambanin’ny farango no hanantonana ny efitra lamba. Any aorian’ny efitra lamba no hametrahana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' mirakitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: raki-tsoratry ny fanekempihavanana
  - type: text
    text: '. Ny efitra lamba amin’izay no hampisaraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: text
    text: ' sy ny Toeramasina indrindra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Heb 6.19; 9.3-5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Avy eo, dia hapetraka eo ambonin’ny Vatamasina ilay sarony, ao amin’ny Toeramasina indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hapetraka ao amin’ny fonena-masina, eo amin’ny lafiny avaratra, ny latabatra; ary ny fitoeran-jiro kosa manoloana ny latabatra amin’ny lafiny atsimo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '«Momba ny fidirana ao amin’ny tranolay masina dia aoka hanaovan’ny mpanenona za-draharaha varavarana lamba iray hafa amin’ny rongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Hisy andry dimy hatao amin’ny hazo mimôzà, sady horakofana takela-bolamena, ka eo no hanantonana io varavarana lamba io amin’ny farango volamena. Faladia halimo dimy no harendrika hitsatohan’ireo andry ireo.
