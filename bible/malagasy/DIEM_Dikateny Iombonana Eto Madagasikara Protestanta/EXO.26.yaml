document_id: EXO.26,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fonena-masina
  - type: text
    content: '«Ary momba ny fonena-masina, dia lamba temitra folo vita amin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky no hanaovana azy, ravahana '
  - type: text
    content: kerobima
  - type: text
    content: ' vita peta-kofehy tsara. '
  '10':
  - type: text
    content: 'Hopetahana tadivavarana dimampolo ny sisin-damba farany amin’ny vitrana voalohany, ary hatao toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  '11':
  - type: text
    content: 'Farango halimo dimampolo no hamboarina, dia hatsofoka amin’ny tadivavarana mba hampikambana ny lay ho iray ihany. '
  '12':
  - type: text
    content: 'Manaraka ny sakan’ny lamba temitra dia antsasaky ny ambainy fanampiny no hikiraviravy ao ivohon’ny Tranolay masina. '
  '13':
  - type: text
    content: 'Manaraka ny halavan’ny lamba dia hozaraina roa ny iray metatra fanampiny, ka hikiraviravy eo an-daniny roa amin’ny fonena-masina, mba haharakotra azy. '
  '14':
  - type: text
    content: Mba hiarovana ny lay faharoa, dia hoditr’ondrilahy miloko mena sy sarona vita amin’ny hoditra mafy no harakotra eo amboniny.
  '15':
  - type: text
    content: '«Hisy hazo fisaka hamboarina amin’ny hazo mimôzà ka hatsangana hitondra ny fonena-masina. '
  '16':
  - type: text
    content: 'Hitovy refy ny hazo fisaka rehetra, ka dimy metatra ny lavan’ny tsirairay ary 75 santimetatra ny sakany. '
  '17':
  - type: text
    content: 'Hasiana lahiny roa mirazotra isaky ny hazo fisaka. '
  '18':
  - type: text
    content: 'Hazo fisaka roapolo no hatao ho an’ny lafiny atsimo amin’ny fonena-masina, '
  '19':
  - type: text
    content: 'ary hasiana faladia volafotsy efapolo hitondra azy; ka isaky ny hazo fisaka dia faladiany roa avy, izay mifanandrify amin’ny lahiny roa. '
  '2':
  - type: text
    content: 'Hitovy avokoa ny refin’ny lamba temitra rehetra, ka 14 metatra ny lavany, ary roa metatra ny sakany. '
  '20':
  - type: text
    content: 'Ho an’ny lafiny avaratra dia hazo fisaka roapolo koa no hatao, '
  '21':
  - type: text
    content: 'miaraka amin’ny faladia volafotsy efapolo; ka faladiany roa avy isaky ny hazo fisaka. '
  '22':
  - type: text
    content: 'Ho an’ny lafiny andrefana izay eo ivohon’ny fonena-masina dia hazo fisaka enina no hatao, '
  '23':
  - type: text
    content: 'miampy hazo fisaka roa manokana hatao erỳ amin’ny zorony roa erỳ afara. '
  '24':
  - type: text
    content: 'Ireo hazo fisaka roa ireo dia hisy elanelany ara-dalàna eo amin’ny fotony, fa hifanatona tsikelikely, ka hikambana eo amin’ny haba iray any an-dohany. Hatao mitovy izy roa ho hazo fisaka eo amin’ny zorony. '
  '25':
  - type: text
    content: Koa ny lafiny ivohon’ny fonena-masina izany dia hisy hazo fisaka valo sy faladiany volafotsy 16, ka faladia roa avy isaky ny hazo fisaka.
  '26':
  - type: text
    content: '«Hanamboarana bara mimôzà ireo hazo fisaka ireo, ka barany dimy hihazona ny hazo fisaka amin’ny lafiny iray amin’ny fonena-masina; '
  '27':
  - type: text
    content: 'barany dimy koa hihazona ireo hazo fisaka amin’ny lafiny iray hafa; ary barany dimy hafa ho an’ireo hazo fisaka amin’ny lafiny ivoho ao andrefana. '
  '28':
  - type: text
    content: 'Ny barany afovoany dia handalo eo am-pisasahan’ny haavon’ny hazo fisaka, ary hatao mahatakatra ny sisiny an-daniny roa amin’ny fonena-masina. '
  '29':
  - type: text
    content: 'Horakofana takela-bolamena, na ny hazo fisaka na ny barany; ary hisy haba volamena hotefena hanatsofohana ny barany. '
  '3':
  - type: text
    content: 'Hatambatra ho vitrana iray aloha ny lamba temitra dimy; avy eo dia hatao toy izany koa ny dimy hafa. '
  '30':
  - type: text
    content: Rehefa izany, ry Mosesy, dia asaovy atsangana araka ny môdely izay efa nasehoko anao teto an-tendrombohitra ny fonena-masina.
  '31':
  - type: text
    content: '«Mpahay taozavatra no hanao efitra lamba iray amin’ny rongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ravahana kerobima roa vita amin’ny peta-kofehy tsara. '
  '32':
  - type: text
    content: 'Io efitra lamba io dia hahantona amin’ny fantsika volamena eo amin’ny andry efatra vita amin’ny hazo mimôzà voarakotra takela-bolamena sady mipetraka amin’ny faladia volafotsy efatra. '
  '33':
  - type: text
    content: 'Eo ambanin’ny farango no hanantonana ny efitra lamba. Any aorian’ny efitra lamba no hametrahana ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' mirakitra ny '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: '. Ny efitra lamba amin’izay no hampisaraka ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' sy ny Toeramasina indrindra'
  - type: note
    content: Jereo Heb 6.19; 9.3-5.
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Avy eo, dia hapetraka eo ambonin’ny Vatamasina ilay sarony, ao amin’ny Toeramasina indrindra. '
  '35':
  - type: text
    content: Hapetraka ao amin’ny fonena-masina, eo amin’ny lafiny avaratra, ny latabatra; ary ny fitoeran-jiro kosa manoloana ny latabatra amin’ny lafiny atsimo.
  '36':
  - type: text
    content: '«Momba ny fidirana ao amin’ny tranolay masina dia aoka hanaovan’ny mpanenona za-draharaha varavarana lamba iray hafa amin’ny rongony mafy, mifangaro volon’ondry miloko volomparasy sy mena ary jaky. '
  '37':
  - type: text
    content: Hisy andry dimy hatao amin’ny hazo mimôzà, sady horakofana takela-bolamena, ka eo no hanantonana io varavarana lamba io amin’ny farango volamena. Faladia halimo dimy no harendrika hitsatohan’ireo andry ireo.
  '4':
  - type: text
    content: 'Hopetahana kofehy volon’ondry miloko volomparasy ny sisin-damba farany amin’ny vitrana voalohany, ary hatao toy izany koa ny sisin-damba voalohany amin’ny vitrana faharoa. '
  '5':
  - type: text
    content: 'Hisy kofehy dimampolo amin’ny sisin’ny vitrana tsirairay, ka hifanandrify amin’ny laharan’ny kofehy eo amin’ny vitrana iray mifanila aminy. '
  '6':
  - type: text
    content: Farango volamena dimampolo no hamboarina mba hanakambanana ny vitrana roa, dia hatambatra ho iray ihany ny fonena-masina manontolo.
  '7':
  - type: text
    content: '«Avy eo dia tranolay faharoa no hamboarina amin’ny lamba temitra 11 vita amin’ny volon’osy, mba handrakofana ny fonena-masina. '
  '8':
  - type: text
    content: 'Hitovy refy avokoa ny lamba temitra rehetra, ka 15 metatra ny lavany, ary roa metatra ny sakany. '
  '9':
  - type: text
    content: 'Hatambatra ho vitrana iray aloha ny lamba temitra dimy; avy eo dia hatao toy izany koa ny enina hafa, ka ny lamba temitra fahenina dia haforitra eo anoloan’ny tranolay masina. '
