document_id: PSA.94
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Andriamanitra no mpamaly ny tsy rariny
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TOMPO Andriamanitra mpamaly ny natao ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Andriamanitra mpamaly ny natao ô, mba misehoa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry ilay mpitsara ny mponin’ny tany ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mirotsaha an-tsehatra Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay nataon’ny mpiavonavona ihany no amalio azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: TOMPO ô, mandra-pahoviana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hifalifalian’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, mandra-pahoviana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa mirehaka izy sady miteniteny foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mizahozaho ireo mpanao ratsy rehetra ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vahoakanao, TOMPO ô, ampahorîny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo voatokana ho Anao ampijalîny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny mpitondratena sy ny kamboty vonoiny ho faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny valovotaka eto amin’ny taninao ataony afaka aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy izy hoe: «Tsy mahita akory ny Tompo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy mahalala velively ny Andriamanitr’i Jakôba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '94.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 10.4, 6,11,13; 14.1; 36.2; Jer 5.12.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry olona ketrina indrindra, mitandrema!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry adala, rahoviana vao handinika ianareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Tompo Izay nanao ny sofina ve tsy handre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy namorona ny maso indray no tsy hahita?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ilay mpanitsy ny firenena ve tsy hanafay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy mpampianatra ny olona indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: no heverina ho tsy manam-pahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fantatry ny TOMPO ny fikasan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fantany fa tsinontsinona ireny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '94.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And tsiahivin’ny 1Kôr 3.20.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sambatra ny olona anarinao, Tompo ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka ampianarinao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànanao
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ataonao miadana amin’ny andro mahory izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nefa ny olon-dratsy ihadiana longoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa tsy manary ny vahoakany ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'na mandalo an’ireo voatokana ho Azy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: hanjary ara-drariny indray ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiandanian’ny mahitsy fo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Iza àry no hitsangana hiaro ahy amin’ny mpanao ratsy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hiady ho ahy amin’ny ataon’ireo mpanao heloka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha tsy ny TOMPO no namonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia efa saika lasana mihitsy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho any amin’ny toera-manginan’ny maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa isaky ny niteny aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mangozohozo ny tongotro!»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny fitiavanao, TOMPO ô, no nanohana ahy hatrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Rehefa feno fanahiana tao anatiko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nampionona sy nampifaly ahy Ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ianao ve dia hiray tsikombakomba
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ireo mpitsara tsy marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mamoron-tsazy tsy ara-dalàna?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mikaon-doha hahafaty ny olo-marina ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady manameloka ny tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Saingy ny TOMPO no manda mafy ho ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay Andriamanitro no vatolampy fialofako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hatsingeriny amin’ireo ihany ny heloka nataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny faharatsiany ihany no handringanany azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, ny TOMPO Andriamanitsika no handringana azy.
