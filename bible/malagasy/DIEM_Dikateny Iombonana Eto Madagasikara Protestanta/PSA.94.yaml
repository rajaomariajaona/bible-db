document_id: PSA.94,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Andriamanitra no mpamaly ny tsy rariny
  - type: text
    content: TOMPO Andriamanitra mpamaly ny natao ô,
  - type: text
    content: ry Andriamanitra mpamaly ny natao ô, mba misehoa!
  '10':
  - type: text
    content: Ilay mpanitsy ny firenena ve tsy hanafay?
  - type: text
    content: Izy mpampianatra ny olona indray
  - type: text
    content: no heverina ho tsy manam-pahalalana?
  '11':
  - type: text
    content: Fantatry ny TOMPO ny fikasan’ny olona,
  - type: text
    content: eny, fantany fa tsinontsinona ireny
  - type: note
    content: And tsiahivin’ny 1Kôr 3.20.
  - type: text
    content: .
  '12':
  - type: text
    content: Sambatra ny olona anarinao, Tompo ô,
  - type: text
    content: 'ka ampianarinao amin’ny '
  - type: text
    content: lalànanao
  - type: text
    content: '!'
  '13':
  - type: text
    content: Ataonao miadana amin’ny andro mahory izy,
  - type: text
    content: nefa ny olon-dratsy ihadiana longoa.
  '14':
  - type: text
    content: Fa tsy manary ny vahoakany ny TOMPO
  - type: text
    content: 'na mandalo an’ireo voatokana ho Azy:'
  '15':
  - type: text
    content: hanjary ara-drariny indray ny fitsarana
  - type: text
    content: ka hiandanian’ny mahitsy fo rehetra.
  '16':
  - type: text
    content: Iza àry no hitsangana hiaro ahy amin’ny mpanao ratsy?
  - type: text
    content: Iza no hiady ho ahy amin’ny ataon’ireo mpanao heloka?
  '17':
  - type: text
    content: Raha tsy ny TOMPO no namonjy ahy,
  - type: text
    content: dia efa saika lasana mihitsy aho
  - type: text
    content: ho any amin’ny toera-manginan’ny maty.
  '18':
  - type: text
    content: 'Fa isaky ny niteny aho hoe:'
  - type: text
    content: «Mangozohozo ny tongotro!»,
  - type: text
    content: dia ny fitiavanao, TOMPO ô, no nanohana ahy hatrany.
  '19':
  - type: text
    content: Rehefa feno fanahiana tao anatiko aho,
  - type: text
    content: dia nampionona sy nampifaly ahy Ianao.
  '2':
  - type: text
    content: Ry ilay mpitsara ny mponin’ny tany ô,
  - type: text
    content: mirotsaha an-tsehatra Ianao;
  - type: text
    content: izay nataon’ny mpiavonavona ihany no amalio azy.
  '20':
  - type: text
    content: Ianao ve dia hiray tsikombakomba
  - type: text
    content: amin’ireo mpitsara tsy marina
  - type: text
    content: izay mamoron-tsazy tsy ara-dalàna?
  '21':
  - type: text
    content: Mikaon-doha hahafaty ny olo-marina ireo
  - type: text
    content: sady manameloka ny tsy manan-tsiny.
  '22':
  - type: text
    content: Saingy ny TOMPO no manda mafy ho ahy,
  - type: text
    content: Ilay Andriamanitro no vatolampy fialofako.
  '23':
  - type: text
    content: Hatsingeriny amin’ireo ihany ny heloka nataony
  - type: text
    content: ary ny faharatsiany ihany no handringanany azy;
  - type: text
    content: eny, ny TOMPO Andriamanitsika no handringana azy.
  '3':
  - type: text
    content: TOMPO ô, mandra-pahoviana
  - type: text
    content: no hifalifalian’ny olon-dratsy,
  - type: text
    content: eny, mandra-pahoviana?
  '4':
  - type: text
    content: Fa mirehaka izy sady miteniteny foana;
  - type: text
    content: mizahozaho ireo mpanao ratsy rehetra ireo.
  '5':
  - type: text
    content: Ny vahoakanao, TOMPO ô, ampahorîny;
  - type: text
    content: ireo voatokana ho Anao ampijalîny.
  '6':
  - type: text
    content: Ny mpitondratena sy ny kamboty vonoiny ho faty,
  - type: text
    content: ny valovotaka eto amin’ny taninao ataony afaka aina.
  '7':
  - type: text
    content: 'Fa hoy izy hoe: «Tsy mahita akory ny Tompo;'
  - type: text
    content: tsy mahalala velively ny Andriamanitr’i Jakôba
  - type: note
    content: Jereo Sal 10.4, 6,11,13; 14.1; 36.2; Jer 5.12.
  - type: text
    content: '!»'
  '8':
  - type: text
    content: Ry olona ketrina indrindra, mitandrema!
  - type: text
    content: Ry adala, rahoviana vao handinika ianareo?
  '9':
  - type: text
    content: Ny Tompo Izay nanao ny sofina ve tsy handre?
  - type: text
    content: Izy namorona ny maso indray no tsy hahita?
