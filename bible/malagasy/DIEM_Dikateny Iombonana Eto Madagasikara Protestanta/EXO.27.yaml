document_id: EXO.27,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alitara fisoronana
  - type: text
    content: '«Hisy '
  - type: text
    content: alitara fisoronana
  - type: text
    content: ' hamboarina amin’ny hazo mimôzà. Ho efamira izy io, ka mirefy roa metatra sy sasany ny lafy tsirairay, ary iray metatra sy sasany ny haavony. '
  '10':
  - type: text
    content: 'farango sy anjaka volafotsy no hanantonana azy eo amin’ny andry halimo roapolo, izay mitsatoka amin’ny faladia halimo roapolo. '
  '11':
  - type: text
    content: 'Ho tahaka izany koa ny lafiny avaratra, ka hivelatra dimampolo metatra ny halavan’ny temitra, ary mitovy amin’ny teo ihany ny fanantonana azy. '
  '12':
  - type: text
    content: 'Amin’ny lafiny andrefana, manaraka ny sakan’ny kianja, dia hivelatra 25 metatra ny temitra, ary hahantona amin’ny andry folo misy faladia folo. '
  '13':
  - type: text
    content: 'Ho 25 metatra koa ny velaran’ny kianja amin’ny lafiny fidirana atsinanana, '
  '14':
  - type: text
    content: 'ka eo an-daniny roa amin’ny fidirana dia samy hisy temitra fito metatra sy sasany ny halavany miaraka amin’ny andry telo sy faladiany telo avy. '
  '16':
  - type: text
    content: 'Ny vavahadin’ny kianja kosa dia hasiana varavarana lamba folo metatra, hamboarin’ny mpanao peta-kofehy amin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ka hahantona amin’ny andry efatra misy faladiany efatra. '
  '17':
  - type: text
    content: 'Hisy anjaka volafotsy hampitohy ny andry rehetra izay mamaritra ny kianja; ny farangony koa dia ho volafotsy, fa ny faladiany halimo. '
  '18':
  - type: text
    content: 'Koa ny kianja dia hirefy dimampolo metatra ny lavany, 25 metatra ny sakany; ary ny haavon’ny lamba temitra rongony dia ho roa metatra sy sasany. '
  '19':
  - type: text
    content: Ny fitaovana rehetra fanampiny mba hahatomombana ny fonena-masina dia hatao halimo avokoa, ka isan’izany ny tsîmatra rehetra momba azy sy ny tsîmatra rehetra momba ny fefin’ny kianja.
  - type: heading
    content: Ny solika fanao amin’ny fitoeran-jiro
  '2':
  - type: text
    content: 'Hatao miendrika tandroka ny zorony efatra ambony sady harafitra miaraka amin’ny tenan’ny alitara, izay horakofana takelaka halimo. '
  '20':
  - type: text
    content: '«Ary ianao, ry Mosesy, mandidia ny Israelita hitondra aminao menaka ôliva tsara sy madio mba handrehetana ny jiro tsy tapaka. '
  '21':
  - type: text
    content: 'I Aharôna sy ny taranany no hametraka ny fitoeran-jiro ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', eo anoloan’ny efitra lamba izay manafina ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ; ny jiro dia hirehitra manomboka ny hariva ka hatramin’ny maraina eo anatrehako Izaho TOMPO. Fepetra raikitra hotanterahin’ny Israelita isaky ny taranaka mifandimby izany.
  '3':
  - type: text
    content: 'Halimo koa no hanaovana ny fanaka rehetra momba ny alitara: dia ny tavy fasiana lavenon-jabora, ny sotrobe fangaronana afo, ny tsatokaty famafazana, ny fitrebi-kena ary ny fitondrana afo'
  - type: note
    content: 'Ny lavenona: vonton’ny menaka avy amin’ny jaboran’ny biby novonoina dia nangonina ary nentina tao amin’ny toerana voatokana ho amin’izany, tany ivelan’ny toby (jereo Lev 4.12). Ny fitondrana afo eto dia zavatra fampiasa amin’ny litorjia, karazana fitaovana fanembohana entin-tanana (jereo Lev 10.1).'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Hisy makarakara halimo miendrika harato hamboarina; ary haba halimo iray no hapetaka isaky ny zorony. '
  '5':
  - type: text
    content: 'Hapetraka eo akaikin’ny fisasahan’ny aty alitara io makarakara io, eo ambanin’ny fehivavany. '
  '6':
  - type: text
    content: 'Hisy bao roa hatao amin’ny hazo mimôzà, dia horakofana takelaka halimo; '
  '7':
  - type: text
    content: 'ary hatsofoka ao anatin’ny haba izay manatrika ny lafiny roa amin’ny alitara ireo bao ireo, rehefa lanjaina ny makarakara. '
  '8':
  - type: text
    content: Hazo fisaka no handrafetana ny alitara, ka hatao holoka aty izany, araka ny môdely izay efa nasehoko anao teto an-tendrombohitra.
  - type: heading
    content: Ny temitry ny kianja
  '9':
  - type: text
    content: '«Ny fonena-masina dia hohodidinina kianja izay fefen’ny temitra vita amin’ny kiran-drongony mafy. Amin’ny lafiny atsimo, dia hivelatra eo amin’ny dimampolo metatra ny halavan’ny temitra; '
