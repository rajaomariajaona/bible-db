document_id: EXO.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alitara fisoronana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Hisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara fisoronana
  - type: text
    text: ' hamboarina amin’ny hazo mimôzà. Ho efamira izy io, ka mirefy roa metatra sy sasany ny lafy tsirairay, ary iray metatra sy sasany ny haavony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hatao miendrika tandroka ny zorony efatra ambony sady harafitra miaraka amin’ny tenan’ny alitara, izay horakofana takelaka halimo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Halimo koa no hanaovana ny fanaka rehetra momba ny alitara: dia ny tavy fasiana lavenon-jabora, ny sotrobe fangaronana afo, ny tsatokaty famafazana, ny fitrebi-kena ary ny fitondrana afo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Ny lavenona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'vonton’ny menaka avy amin’ny jaboran’ny biby novonoina dia nangonina ary nentina tao amin’ny toerana voatokana ho amin’izany, tany ivelan’ny toby (jereo Lev 4.12). Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fitondrana afo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia zavatra fampiasa amin’ny litorjia, karazana fitaovana fanembohana entin-tanana (jereo Lev 10.1).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hisy makarakara halimo miendrika harato hamboarina; ary haba halimo iray no hapetaka isaky ny zorony. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hapetraka eo akaikin’ny fisasahan’ny aty alitara io makarakara io, eo ambanin’ny fehivavany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hisy bao roa hatao amin’ny hazo mimôzà, dia horakofana takelaka halimo; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary hatsofoka ao anatin’ny haba izay manatrika ny lafiny roa amin’ny alitara ireo bao ireo, rehefa lanjaina ny makarakara. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hazo fisaka no handrafetana ny alitara, ka hatao holoka aty izany, araka ny môdely izay efa nasehoko anao teto an-tendrombohitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny temitry ny kianja
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Ny fonena-masina dia hohodidinina kianja izay fefen’ny temitra vita amin’ny kiran-drongony mafy. Amin’ny lafiny atsimo, dia hivelatra eo amin’ny dimampolo metatra ny halavan’ny temitra; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'farango sy anjaka volafotsy no hanantonana azy eo amin’ny andry halimo roapolo, izay mitsatoka amin’ny faladia halimo roapolo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho tahaka izany koa ny lafiny avaratra, ka hivelatra dimampolo metatra ny halavan’ny temitra, ary mitovy amin’ny teo ihany ny fanantonana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’ny lafiny andrefana, manaraka ny sakan’ny kianja, dia hivelatra 25 metatra ny temitra, ary hahantona amin’ny andry folo misy faladia folo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ho 25 metatra koa ny velaran’ny kianja amin’ny lafiny fidirana atsinanana, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'ka eo an-daniny roa amin’ny fidirana dia samy hisy temitra fito metatra sy sasany ny halavany miaraka amin’ny andry telo sy faladiany telo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny vavahadin’ny kianja kosa dia hasiana varavarana lamba folo metatra, hamboarin’ny mpanao peta-kofehy amin’ny kiran-drongony mafy mifangaro volon’ondry miloko volomparasy sy mena ary jaky, ka hahantona amin’ny andry efatra misy faladiany efatra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hisy anjaka volafotsy hampitohy ny andry rehetra izay mamaritra ny kianja; ny farangony koa dia ho volafotsy, fa ny faladiany halimo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa ny kianja dia hirefy dimampolo metatra ny lavany, 25 metatra ny sakany; ary ny haavon’ny lamba temitra rongony dia ho roa metatra sy sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fitaovana rehetra fanampiny mba hahatomombana ny fonena-masina dia hatao halimo avokoa, ka isan’izany ny tsîmatra rehetra momba azy sy ny tsîmatra rehetra momba ny fefin’ny kianja.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny solika fanao amin’ny fitoeran-jiro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Ary ianao, ry Mosesy, mandidia ny Israelita hitondra aminao menaka ôliva tsara sy madio mba handrehetana ny jiro tsy tapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I Aharôna sy ny taranany no hametraka ny fitoeran-jiro ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ', eo anoloan’ny efitra lamba izay manafina ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ; ny jiro dia hirehitra manomboka ny hariva ka hatramin’ny maraina eo anatrehako Izaho TOMPO. Fepetra raikitra hotanterahin’ny Israelita isaky ny taranaka mifandimby izany.
