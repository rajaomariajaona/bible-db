document_id: PSA.106,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny fitiavan’ny Tompo an’ilay vahoakany
  - type: heading
    content: (106.47-48; jereo 1 Tan 16.34-36)
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: 'Miderà ny TOMPO ianareo fa tsara Izy:'
  - type: text
    content: –eny, maharitra mandrakizay ny fitiavany
  - type: note
    content: 'maharitra mandrakizay ny fitiavany: jereo Sal 100.5; 107.1; 118.1,29; 136.1; 1 Tan 16.34; 2 Tan 5.13; 7.3; Hez 3.11; Jer 33.11.'
  - type: text
    content: '!'
  '10':
  - type: text
    content: Novonjeny tsy ho azon’ny mpankahala ireo
  - type: text
    content: ary nafahany tsy ho voatanan’ny fahavalo.
  '11':
  - type: text
    content: Voarakotry ny rano kosa ireo mpandrafy
  - type: text
    content: ka tsy nisy niangana na iray aza
  - type: note
    content: 'And 9-11: Eks 14.21-29.'
  - type: text
    content: ;
  '12':
  - type: text
    content: ka dia mba nino ny tenin’Andriamanitra
  - type: text
    content: sy nihira fiderana Azy ny razanay
  - type: note
    content: Jereo Eks 14.31; 15.1-21.
  - type: text
    content: .
  '13':
  - type: text
    content: Vetivety anefa dia hadinon’ireo razanay
  - type: text
    content: ny asa nataon’Andriamanitra
  - type: text
    content: ka tsy andriny akory ny fandaharany.
  '14':
  - type: text
    content: Voan’ny fitsiriritana tany an-taniefitra ireo
  - type: text
    content: ary nihantsy an’Andriamanitra tany an-tany hay.
  '15':
  - type: text
    content: Dia nomeny azy ny hena notakîny
  - type: text
    content: ka nataony voky sy leony mihitsy ireo
  - type: note
    content: 'And 14-15: jereo Nom 11.4-34.'
  - type: text
    content: .
  '16':
  - type: text
    content: Tao an-toby kosa dia nisy nialona i Mosesy
  - type: text
    content: 'sy i '
  - type: text
    content: Aharôna
  - type: text
    content: ' ilay voatokana ho an’ny TOMPO.'
  '17':
  - type: text
    content: Koa nivava ny tany nitelina an’i Datàna
  - type: text
    content: sady nanarona ny tarik’i Abirama.
  '18':
  - type: text
    content: Afo no nandoro ny tarik’izy roa lahy,
  - type: text
    content: lelafo no nandevona ireo olon-dratsy ireo
  - type: note
    content: 'Momba ny fikomian’i Datàna sy i Abirama: Nom 16.1-35.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dia nanamboatra ombilahikely tao '
  - type: text
    content: Hôreba
  - type: text
    content: ' ny razanay,'
  - type: text
    content: ka niankohoka teo amin’ny sarivongana varahina.
  '2':
  - type: text
    content: Iza no afaka hilaza ny asa lehibe vitan’ny TOMPO
  - type: text
    content: ka hampanako ny fiderana manontolo sahaza Azy?
  '20':
  - type: text
    content: Ny voninahitr’Andriamanitra dia nosoloiny
  - type: text
    content: sarivongan’ombilahy homana ahitra.
  '21':
  - type: text
    content: Hadinony Andriamanitra mpamonjy azy,
  - type: text
    content: Ilay nanao zava-dehibe tany Ejipta,
  '22':
  - type: text
    content: dia ireo zava-mahagaga
  - type: text
    content: tao amin’ny tanin’i Hama
  - type: note
    content: 'Hama: jereo Sal 78.51 sy nta.'
  - type: text
    content: ary koa ireo zava-mahatalanjona
  - type: text
    content: teo amin’ny Ranomasin’ny Volotara.
  '23':
  - type: text
    content: Dia nilaza Andriamanitra fa handringana azy;
  - type: text
    content: kanjo i Mosesy ilay voafidiny
  - type: text
    content: dia nanelanelana teo anatrehany
  - type: text
    content: ka nisakana ny hatezerany tsy hamongotra
  - type: note
    content: 'And 19-23: jereo Eks 32.1-14.'
  - type: text
    content: .
  '24':
  - type: text
    content: Avy eo tsy nasiany lanjany akory
  - type: text
    content: ilay tany mahafinaritra
  - type: text
    content: ary tsy ninoany velively
  - type: text
    content: ny fampanantenan’Andriamanitra;
  '25':
  - type: text
    content: fa nikomy tao an-dainy izy
  - type: text
    content: ary tsy nihaino intsony izay nolazain’ny TOMPO.
  '26':
  - type: text
    content: Koa nanangan-tanana hianiana Andriamanitra
  - type: text
    content: fa handringana an’ireo razanay any an-taniefitra
  - type: note
    content: 'And 24-26: jereo Nom 14.1-35.'
  - type: text
    content: ','
  '27':
  - type: text
    content: hampiely ny taranany any amin’ny hafa firenena
  - type: text
    content: ka hamela azy ho faty any an-tany rehetra any
  - type: note
    content: Lev 26.33.
  - type: text
    content: .
  '28':
  - type: text
    content: Tao Pehôra dia nanolo-tena ny razanay
  - type: text
    content: 'hanompo ny sampy '
  - type: text
    content: Bahala
  - type: text
    content: 'sady nihinana ny hena natao '
  - type: text
    content: sorona
  - type: text
    content: ho an’ny andriamanitra maty
  - type: note
    content: 'andriamanitra maty: jereo Lev 26.30; Sal 115.4-8; 135.15-18. Dkt hafa maty (jereo Deot 26.14).'
  - type: text
    content: .
  '29':
  - type: text
    content: Nampahatezitra ny Tompo izy tamin’izany,
  - type: text
    content: koa namely azy tampoka ny areti-mandringana.
  '3':
  - type: text
    content: Sambatra izay mitandrina ny rariny
  - type: text
    content: ka manao ny hitsiny amin’ny fotoana rehetra.
  '30':
  - type: text
    content: Saingy nijoro i Pinehasa nanelanelana,
  - type: text
    content: 'dia nitsahatra ilay areti-mandringana:'
  '31':
  - type: text
    content: koa izany asa soa izany dia hahatsiarovana azy
  - type: text
    content: eo amin’ny taranaka mifandimby ary mandrakizay
  - type: note
    content: 'And 28-31: jereo Nom 25.1-13.'
  - type: text
    content: .
  '32':
  - type: text
    content: Nampahatezitra ny Tompo koa ny razanay
  - type: text
    content: teo akaikin’ny loharanon’i Meribà,
  - type: text
    content: ka nampahita faisana an’i Mosesy
  '33':
  - type: text
    content: izay tofoka loatra tamin’ny nafitsok’ireo
  - type: text
    content: ka nahavoaka teny tsy voahevitra
  - type: note
    content: 'And 32-33: jereo Eks 17.1-17; Nom 20.1-13.'
  - type: text
    content: .
  '34':
  - type: text
    content: Tsy naringan’ny razanay ny Kanahanita,
  - type: text
    content: na dia nasain’ny TOMPO nataony aza izany
  - type: note
    content: Deot 7.1-6; 20.17-18.
  - type: text
    content: .
  '35':
  - type: text
    content: Niharoany ny hafa firenena
  - type: text
    content: sady nianarany ny fanaony;
  '36':
  - type: text
    content: ary notompoiny ny sampin’ireny
  - type: text
    content: ka tonga fandrika ho azy izany
  - type: note
    content: 'And 35-36: jereo Mpits 2.1-3; 3.5-6.'
  - type: text
    content: .
  '37':
  - type: text
    content: Nataony sorona ho an’andriamani-tsiizy
  - type: text
    content: ny zanany lahy sy ny zanany vavy
  - type: note
    content: Lev 18.21; Deot 12.31; 2 Mp 17.17; Jer 7.31; 19.5.
  - type: text
    content: .
  '38':
  - type: text
    content: Novonoiny ho faty ny ankizy tsy manan-tsiny
  - type: text
    content: izay nataony sorona ho an’ny sampin’i Kanahàna;
  - type: text
    content: ka nandotoany ny tany ireo olona nalatsa-dra ireo
  - type: note
    content: Nom 35.33.
  - type: text
    content: .
  '39':
  - type: text
    content: Nozimbainy tamin’ny nataony koa ny tenany
  - type: text
    content: fony izy nivadika tamin’ny Tompo Andriamaniny
  - type: note
    content: 'Ny fivadihana amin’Andriamanitra dia nampitovîna tamin’ny fijangajangana na hoe fanitsakitsaham-bady: Jer 3.6-9; Hôs 1.2; 2.4; 4.12-14.'
  - type: text
    content: .
  '4':
  - type: text
    content: TOMPO ô, mba tsarovy aho,
  - type: text
    content: rehefa anehoanao fitia ny vahoakanao;
  - type: text
    content: mba tolory famonjena aho,
  - type: text
    content: rehefa mamonjy azy Ianao.
  '40':
  - type: text
    content: Koa nirehetan’ny fahatezeran’ny TOMPO ilay vahoakany
  - type: text
    content: ary naharikoriko Azy tokoa ireo voatokana ho fananany.
  '41':
  - type: text
    content: Natolony ho eo an-tanan’ny hafa firenena izy,
  - type: text
    content: ary tonga nanompo vahoaka mpankahala azy,
  '42':
  - type: text
    content: noporetin’ireo fahavalony izy
  - type: text
    content: ary niforitra teo ambany fahefàny.
  '43':
  - type: text
    content: Imbetsaka izy no nafahan’ny Tompo,
  - type: text
    content: saingy nikiry tamin’ny fikomiany
  - type: text
    content: ka nilentika tanaty heloka hatrany.
  '44':
  - type: text
    content: Hitany ny fijalian’ireo
  - type: text
    content: ary reny ny fitarainany.
  '45':
  - type: text
    content: Dia tsaroany ny fanekempihavanany hitsimbinana azy;
  - type: text
    content: be fitiavana Izy ka nanjary niova hevitra taminy.
  '46':
  - type: text
    content: Izay rehetra namabo ny razanay
  - type: text
    content: dia nataony nahay nangoraka azy
  - type: note
    content: 1 Mp 8.50; Jer 42.12; ampit Mpits 2.14-18; Hez 9.9.
  - type: text
    content: .
  '47':
  - type: text
    content: TOMPO Andriamanitray ô, vonjeo izahay
  - type: text
    content: ka angony avy any amin’ny hafa firenena,
  - type: text
    content: mba hideranay ny anaranao masina
  - type: text
    content: ary hifalianay amin’ny fankalazana Anao.
  '48':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitr’i Israely
  - type: text
    content: hatrizay hatrizay ka ho mandrakizay!
  - type: text
    content: 'Ary aoka ny vahoaka rehetra tafangona hilaza hoe:'
  - type: text
    content: Amen
  - type: text
    content: '! '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  '5':
  - type: text
    content: Aoka hahita ny fandrosoan’ireo voafidinao aho
  - type: text
    content: ary hiombom-pifaliana amin’ny vahoakanao
  - type: text
    content: sy hiara-miravoravo amin’ireo voatokana ho Anao!
  '6':
  - type: text
    content: Efa nanota toy ny razanay izahay,
  - type: text
    content: eny, efa nivoana sy nanao ratsy.
  '7':
  - type: text
    content: Fony tany Ejipta ny razanay,
  - type: text
    content: dia tsy nahatakatra ny asanao mahagaga;
  - type: text
    content: tsy nahatsiaro ny halehiben’ny fitiavanao izy,
  - type: text
    content: 'koa teo akaikin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: note
    content: Eks 14.10-12.
  - type: text
    content: dia nikomy taminao Avo Indrindra.
  '8':
  - type: text
    content: Nefa noho Izy Tompo dia novonjeny ny razanay
  - type: text
    content: mba hampahafantarany ny heriny lehibe.
  '9':
  - type: text
    content: Norahonany ny Ranomasin’ny Volotara
  - type: text
    content: ka maina niaraka tamin’izay;
  - type: text
    content: dia toy ny mandeha amin’ny tany maina
  - type: text
    content: no nitondrany azy hitety ny fanambanin’ny ranobe.
