document_id: PSA.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, mandra-pahoviana?
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '2':
  - type: text
    content: TOMPO ô, mandra-pahoviana
  - type: text
    content: no mbola hanadinoanao ahy,
  - type: text
    content: ary mandra-pahoviana koa
  - type: text
    content: no tsy hanekenao hijery ahy?
  '3':
  - type: text
    content: Mandra-pahoviana aho no hiferinaina
  - type: text
    content: ka halahelo am-po isan’andro izao?
  - type: text
    content: Mandra-pahoviana ny fahavaloko
  - type: text
    content: no mbola hisandratra ho amboniko?
  '4':
  - type: text
    content: TOMPO Andriamanitro ô,
  - type: text
    content: mba jereo aho ka valio vavaka.
  - type: text
    content: Avereno tanjaka sy hery aho,
  - type: text
    content: fandrao dia ho renoka tokoa
  - type: text
    content: ho amin-torimasom-pahafatesana,
  '5':
  - type: text
    content: fandrao koa ny fahavaloko
  - type: text
    content: no hihambo ho naharesy ahy;
  - type: text
    content: ary dia hibitaka ireo mpanohitra
  - type: text
    content: fa hoe nampilavo lefona ahy.
  '6':
  - type: text
    content: Ny fitiavanao kosa no ianteherako,
  - type: text
    content: ny famonjenao no hiravoako.
  - type: text
    content: TOMPO ô, hihira ho voninahitrao aho
  - type: text
    content: noho ny soa nataonao tamiko.
