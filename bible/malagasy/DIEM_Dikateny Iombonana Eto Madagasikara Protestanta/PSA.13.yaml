  - type: text
    text: TOMPO ô, mandra-pahoviana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mbola hanadinoanao ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mandra-pahoviana koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tsy hanekenao hijery ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandra-pahoviana aho no hiferinaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka halahelo am-po isan’andro izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mbola hisandratra ho amboniko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: TOMPO Andriamanitro ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba jereo aho ka valio vavaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avereno tanjaka sy hery aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fandrao dia ho renoka tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho amin-torimasom-pahafatesana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fandrao koa ny fahavaloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hihambo ho naharesy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia hibitaka ireo mpanohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hoe nampilavo lefona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fitiavanao kosa no ianteherako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famonjenao no hiravoako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, hihira ho voninahitrao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny soa nataonao tamiko.
