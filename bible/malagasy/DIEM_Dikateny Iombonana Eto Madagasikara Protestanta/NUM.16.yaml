document_id: NUM.16,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fikomian’i Kôra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Kôra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Joda 11.
      marker-yv: yv-n
    - type: text
      text: ' zanakalahin’i Jitsehara dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' taranak’i Kehata; nitarika an’i Datàna sy i Abirama zanakalahin’i Eliaba, ary i Ôna zanakalahin’i Peleta izay samy taranak’i Reobena izay '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Navelany hanakaiky Azy ianareo, ry Kôra sy ny Levita rehetra rahalahinao, dia mbola mitady ny raharahan’ny mpisorona indray ve? '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izany ange ka ikomianao sy ny namanao rehetra amin’ny TOMPO, fa tsy dia amin’i Aharôna loatra akory no imonomononanareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampiantsoin’i Mosesy i Datàna sy i Abirama zanakalahin’i Eliaba, fa hoy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy hiakatra any izahay! '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy ampy anao ve ny namoahanao anay nandao tany tondra-dronono sy tantely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Eks 3.8 sy nta. –Eto ny mpanohitra an’i Mosesy dia mampiasa izany fitenenana izany mba hilazana an’i Ejipta, kanefa ny tany nampanantenaina no mazàna ambarany.
      marker-yv: yv-n
    - type: text
      text: ' mba hahafaty anay atỳ an-taniefitra, no mbola mitady hibaiko anay indray ianao! '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy tany tondra-dronono sy tantely akory no nitondranao anay ary tsy saha na tanimboaloboka akory koa no nomenao ho fanananay! Heverinao ho poa-maso angaha ireo olona ireo? Tsia, tsy ho any izahay!
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra aoka izany i Mosesy ka niteny tamin’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza raharahainao akory izay fanatitr’izy ireo! Fa tsy mba naka na dia boriky iray taminy akory aza aho, ary koa tsy mba nanisy ratsy na dia ny anankiray taminy akory aza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famaizana an’i Kôra sy ireo namany
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Mosesy tamin’i Kôra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tongava eo anatrehan’ny TOMPO ianao sy ny namanao rahampitso miaraka amin’i Aharôna. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Samia maka ny fitaovana fandoroany zava-manitra ka manisy vovo-javamanitra ao anatiny ary samia mitondra ny azy avy eo anatrehan’ny TOMPO; dia fitaovana fandoroana zava-manitra 250 izany no fitambarany. Hitondra ny azy avy koa ianao sy i Aharôna.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy naka ny fitaovana fandoroany zava-manitra izy rehetra ka nanisy vainafo sy nandraraka vovo-javamanitra tao anatiny; ary nijanona teo am-baravaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ' izy ireo niaraka tamin’i Mosesy sy i Aharôna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Novorin’i Kôra ny fiangonana manontolo hankeo am-baravaran’ny Tranolay fihaonana mba hanohitra azy roa lahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niseho tamin’ny fiangonana manontolo ny voninahitry ny TOMPO; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hikomy amin’i Mosesy. Nanampy azy ireo tamin’izany ny Israelita miisa 250 izay samy lohandoham-piangonana sady olom-boafidy ary manan-daza. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny TOMPO niteny tamin’i Mosesy sy i Aharôna hoe:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Mialà ianareo amin’ireo andian’olona ireo fa handringana azy indray mipi-maso Aho.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka tamin’ny tany i Mosesy sy i Aharôna sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Andriamanitra ô, Andriamanitra loharanom-piainan’ny voaary rehetra Ianao, ka hotezeranao ve ny fiangonana manontolo noho ny olona iray nanota?
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Mosesy ny TOMPO ka nanao hoe:'
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazao ny fiangonana mba hanalavitra ny fonenan’i Kôra sy i Datàna ary i Abirama.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Mosesy ka nankeo amin’i Datàna sy i Abirama sady narahin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’i Israely. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny tamin’ny fiangonana izy nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Halaviro ny lain’ireo ratsy fanahy ireo, ary aza mikasika izay azy akory, fandrao maty noho ny fahotany rehetra koa ianareo.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nanalavitra ny manodidina ny fonenan’i Kôra sy i Datàna ary i Abirama ny vahoaka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ny lainy i Datàna sy i Abirama ka nijoro teo am-baravarana niaraka tamin’ny vady aman-janany rehetra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no hahafantaranareo fa ny TOMPO no naniraka ahy hanatanteraka ireny asa ireny fa tsy saim-pantatro no nanaovako izany. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha fahafatesana tsotra no hahafaty ireo olona ireo, ka izay hanjo ny besinimaro ihany no hihatra aminy, dia tsy ny TOMPO no naniraka ahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitangorona nanodidina an’i Mosesy sy i Aharôna izy ireo ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ampy ho anareo izay, fa masina avokoa ny olona rehetra ao amin’ny fiangonana sady eo afovoany ny TOMPO. Nahoana ianareo no mihevi-tena ho ambonin’ny mambra hafa ao amin’ny fiangonan’ny TOMPO?
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa raha manao zavatra tsy mbola fahita kosa ny TOMPO, ka hampisokatra ny tany hitelina azy ireo mbamin’ny fananany rehetra ary izy ireo hidina velona any amin’ny fonenan’ny maty, dia ho fantatrareo fa efa nandà ny TOMPO ireo olona ireo.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vao tapitra voalazan’i Mosesy avokoa izany teny rehetra izany, dia nivava ny tany nohitsahin’i Datàna sy i Abirama. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisokatra ny tany ka nitelina azy ireo mbamin’ny fianakaviany ary koa nitelina an’i Kôra sy ny olony rehetra mbamin’ny fananany rehetra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nidina velona tany amin’ny fonenan’ny maty izy ireo mbamin’izay azy rehetra, ary dia nandrakotra azy ny tany. Tsy hita intsony teo amin’ny fiangonana izy ireo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Israelita rehetra izay nanodidina azy, dia nandositra raha nandre ny fidradradradràny, satria natahotra fandrao hatelin’ny tany eo koa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy afo nalefan’ny TOMPO izay nandoro velona ireo lehilahy 250 nanatitra vovo-javamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nandre izany i Mosesy, dia niankohoka tamin’ny tany '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny tamin’i Kôra sy ny namany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Rahampitso dia hasehon’ny TOMPO izay Azy sy izay masina ary izay afaka manakaiky Azy; dia izay hofidiny no hampanakaikeziny Azy. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Izao no ataovy, ry Kôra sy ianareo namany rehetra: Makà fitaovana fandoroana zava-manitra, '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: dia asio vainafo ao anatin’ireny rahampitso ary andraraho vovo-javamanitra eo ambonin’izany eo anatrehan’ny TOMPO. Ho hita eo izay hofidin’ny TOMPO ka ho masina. Ampy izay, ry taranak’i Levỳ.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray i Mosesy tamin’i Kôra:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Henoy, ry taranak’i Levỳ! '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tsy ampy anareo ve ny nanavahan’ilay Andriamanitr’i Israely anareo tamin’ny fiangonan’i Israely mba hahafahanareo manakaiky Azy, ka hanaovanareo ny asa fanompoana ao amin’ny Fonena-masin’ny TOMPO ary hankalazanareo ny fanompoam-pivavahana amin’ny anaran’ny fiangonan’i Israely? '
