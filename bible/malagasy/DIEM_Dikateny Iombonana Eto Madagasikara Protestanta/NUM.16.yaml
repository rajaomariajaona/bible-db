document_id: NUM.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fikomian’i Kôra
  - type: text
    content: I Kôra
  - type: note
    content: Jereo Joda 11.
  - type: text
    content: ' zanakalahin’i Jitsehara dia '
  - type: text
    content: levita
  - type: text
    content: ' taranak’i Kehata; nitarika an’i Datàna sy i Abirama zanakalahin’i Eliaba, ary i Ôna zanakalahin’i Peleta izay samy taranak’i Reobena izay '
  '10':
  - type: text
    content: 'Navelany hanakaiky Azy ianareo, ry Kôra sy ny Levita rehetra rahalahinao, dia mbola mitady ny raharahan’ny mpisorona indray ve? '
  '11':
  - type: text
    content: Izany ange ka ikomianao sy ny namanao rehetra amin’ny TOMPO, fa tsy dia amin’i Aharôna loatra akory no imonomononanareo.
  '12':
  - type: text
    content: 'Dia nampiantsoin’i Mosesy i Datàna sy i Abirama zanakalahin’i Eliaba, fa hoy ireo hoe:'
  - type: text
    content: '–Tsy hiakatra any izahay! '
  '13':
  - type: text
    content: Tsy ampy anao ve ny namoahanao anay nandao tany tondra-dronono sy tantely
  - type: note
    content: Ampit Eks 3.8 sy nta. –Eto ny mpanohitra an’i Mosesy dia mampiasa izany fitenenana izany mba hilazana an’i Ejipta, kanefa ny tany nampanantenaina no mazàna ambarany.
  - type: text
    content: ' mba hahafaty anay atỳ an-taniefitra, no mbola mitady hibaiko anay indray ianao! '
  '14':
  - type: text
    content: Tsy tany tondra-dronono sy tantely akory no nitondranao anay ary tsy saha na tanimboaloboka akory koa no nomenao ho fanananay! Heverinao ho poa-maso angaha ireo olona ireo? Tsia, tsy ho any izahay!
  '15':
  - type: text
    content: 'Tezitra aoka izany i Mosesy ka niteny tamin’ny TOMPO hoe:'
  - type: text
    content: –Aza raharahainao akory izay fanatitr’izy ireo! Fa tsy mba naka na dia boriky iray taminy akory aza aho, ary koa tsy mba nanisy ratsy na dia ny anankiray taminy akory aza.
  - type: heading
    content: Ny famaizana an’i Kôra sy ireo namany
  '16':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Kôra:'
  - type: text
    content: '–Tongava eo anatrehan’ny TOMPO ianao sy ny namanao rahampitso miaraka amin’i Aharôna. '
  '17':
  - type: text
    content: Samia maka ny fitaovana fandoroany zava-manitra ka manisy vovo-javamanitra ao anatiny ary samia mitondra ny azy avy eo anatrehan’ny TOMPO; dia fitaovana fandoroana zava-manitra 250 izany no fitambarany. Hitondra ny azy avy koa ianao sy i Aharôna.
  '18':
  - type: text
    content: 'Samy naka ny fitaovana fandoroany zava-manitra izy rehetra ka nanisy vainafo sy nandraraka vovo-javamanitra tao anatiny; ary nijanona teo am-baravaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy ireo niaraka tamin’i Mosesy sy i Aharôna. '
  '19':
  - type: text
    content: Novorin’i Kôra ny fiangonana manontolo hankeo am-baravaran’ny Tranolay fihaonana mba hanohitra azy roa lahy.
  - type: text
    content: 'Dia niseho tamin’ny fiangonana manontolo ny voninahitry ny TOMPO; '
  '2':
  - type: text
    content: 'hikomy amin’i Mosesy. Nanampy azy ireo tamin’izany ny Israelita miisa 250 izay samy lohandoham-piangonana sady olom-boafidy ary manan-daza. '
  '20':
  - type: text
    content: 'ary ny TOMPO niteny tamin’i Mosesy sy i Aharôna hoe:'
  '21':
  - type: text
    content: –Mialà ianareo amin’ireo andian’olona ireo fa handringana azy indray mipi-maso Aho.
  '22':
  - type: text
    content: 'Dia niankohoka tamin’ny tany i Mosesy sy i Aharôna sady nanao hoe:'
  - type: text
    content: –Ry Andriamanitra ô, Andriamanitra loharanom-piainan’ny voaary rehetra Ianao, ka hotezeranao ve ny fiangonana manontolo noho ny olona iray nanota?
  '23':
  - type: text
    content: 'Dia namaly an’i Mosesy ny TOMPO ka nanao hoe:'
  '24':
  - type: text
    content: –Lazao ny fiangonana mba hanalavitra ny fonenan’i Kôra sy i Datàna ary i Abirama.
  '25':
  - type: text
    content: 'Dia nitsangana i Mosesy ka nankeo amin’i Datàna sy i Abirama sady narahin’ny '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely. '
  '26':
  - type: text
    content: 'Niteny tamin’ny fiangonana izy nanao hoe:'
  - type: text
    content: –Halaviro ny lain’ireo ratsy fanahy ireo, ary aza mikasika izay azy akory, fandrao maty noho ny fahotany rehetra koa ianareo.
  '27':
  - type: text
    content: Nanalavitra ny manodidina ny fonenan’i Kôra sy i Datàna ary i Abirama ny vahoaka.
  - type: text
    content: 'Dia nivoaka ny lainy i Datàna sy i Abirama ka nijoro teo am-baravarana niaraka tamin’ny vady aman-janany rehetra. '
  '28':
  - type: text
    content: 'Ary hoy i Mosesy hoe:'
  - type: text
    content: '–Izao no hahafantaranareo fa ny TOMPO no naniraka ahy hanatanteraka ireny asa ireny fa tsy saim-pantatro no nanaovako izany. '
  '29':
  - type: text
    content: 'Raha fahafatesana tsotra no hahafaty ireo olona ireo, ka izay hanjo ny besinimaro ihany no hihatra aminy, dia tsy ny TOMPO no naniraka ahy. '
  '3':
  - type: text
    content: 'Nitangorona nanodidina an’i Mosesy sy i Aharôna izy ireo ka nanao taminy hoe:'
  - type: text
    content: –Ampy ho anareo izay, fa masina avokoa ny olona rehetra ao amin’ny fiangonana sady eo afovoany ny TOMPO. Nahoana ianareo no mihevi-tena ho ambonin’ny mambra hafa ao amin’ny fiangonan’ny TOMPO?
  '30':
  - type: text
    content: Fa raha manao zavatra tsy mbola fahita kosa ny TOMPO, ka hampisokatra ny tany hitelina azy ireo mbamin’ny fananany rehetra ary izy ireo hidina velona any amin’ny fonenan’ny maty, dia ho fantatrareo fa efa nandà ny TOMPO ireo olona ireo.
  '31':
  - type: text
    content: 'Raha vao tapitra voalazan’i Mosesy avokoa izany teny rehetra izany, dia nivava ny tany nohitsahin’i Datàna sy i Abirama. '
  '32':
  - type: text
    content: 'Nisokatra ny tany ka nitelina azy ireo mbamin’ny fianakaviany ary koa nitelina an’i Kôra sy ny olony rehetra mbamin’ny fananany rehetra. '
  '33':
  - type: text
    content: 'Nidina velona tany amin’ny fonenan’ny maty izy ireo mbamin’izay azy rehetra, ary dia nandrakotra azy ny tany. Tsy hita intsony teo amin’ny fiangonana izy ireo. '
  '34':
  - type: text
    content: 'Ny Israelita rehetra izay nanodidina azy, dia nandositra raha nandre ny fidradradradràny, satria natahotra fandrao hatelin’ny tany eo koa. '
  '35':
  - type: text
    content: Ary nisy afo nalefan’ny TOMPO izay nandoro velona ireo lehilahy 250 nanatitra vovo-javamanitra.
  '4':
  - type: text
    content: 'Raha nandre izany i Mosesy, dia niankohoka tamin’ny tany '
  '5':
  - type: text
    content: 'ka niteny tamin’i Kôra sy ny namany hoe:'
  - type: text
    content: '–Rahampitso dia hasehon’ny TOMPO izay Azy sy izay masina ary izay afaka manakaiky Azy; dia izay hofidiny no hampanakaikeziny Azy. '
  '6':
  - type: text
    content: 'Izao no ataovy, ry Kôra sy ianareo namany rehetra: Makà fitaovana fandoroana zava-manitra, '
  '7':
  - type: text
    content: dia asio vainafo ao anatin’ireny rahampitso ary andraraho vovo-javamanitra eo ambonin’izany eo anatrehan’ny TOMPO. Ho hita eo izay hofidin’ny TOMPO ka ho masina. Ampy izay, ry taranak’i Levỳ.
  '8':
  - type: text
    content: 'Dia hoy indray i Mosesy tamin’i Kôra:'
  - type: text
    content: '–Henoy, ry taranak’i Levỳ! '
  '9':
  - type: text
    content: 'Tsy ampy anareo ve ny nanavahan’ilay Andriamanitr’i Israely anareo tamin’ny fiangonan’i Israely mba hahafahanareo manakaiky Azy, ka hanaovanareo ny asa fanompoana ao amin’ny Fonena-masin’ny TOMPO ary hankalazanareo ny fanompoam-pivavahana amin’ny anaran’ny fiangonan’i Israely? '
