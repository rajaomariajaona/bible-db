document_id: JER.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nividy saha i Jeremià
  - type: text
    content: 'Nisy torolalana avy amin’ny TOMPO ho an’i Jeremià tamin’ny taona fahafolo nanjakàn’i Tsedekià mpanjakan’i Joda, izany hoe ny taona faha-18 nanjakàn’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Nataoko dika roa mitovy ny taratasy fivarotana. Teo imason’ny vavolombelona no nohidiko tamin’ny '
  - type: text
    content: tombokaseko
  - type: note
    content: Ny manisy tombokase amin’ny raki-tsoratra iray dia mitovy amin’ny manisy sonia azy sady ahazoana manidy koa io raki-tsoratra io amin’ny pentin-tsavoka voamariky ny fitomboka.
  - type: text
    content: ' ny dikan’ny taratasy fifampivarotana iray ary nolanjaiko tamin’ny mizàna ny lanjan’ny volafotsy. '
  '11':
  - type: text
    content: 'Avy eo dia nalaiko ny dikan’ny taratasy fifampivarotana vita tombokase araka izay notakin’ny lalàna sy ilay dika iray misokatra, '
  '12':
  - type: text
    content: ka natolotro an’i Baròka
  - type: note
    content: 'I Baròka dia mpitantsoratr’i Jeremià sady sakaizany: jereo 36.4.'
  - type: text
    content: ', zanakalahin’i Nerià sady zafikelin’i Mahaseià, teo imason’i Hanamèla zana-drahalahin-draiko sy teo imason’ireo vavolombelona izay niara-nanao sonia ny taratasy fivarotana ary teo imason’ireo Jiosy rehetra nipetraka teo an-kianja fiambenana. '
  '13':
  - type: text
    content: 'Dia teo imason’ny olona rehetra teo no nandidiako an’i Baròka hoe:'
  '14':
  - type: text
    content: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Raiso ny dikan’ny taratasy fifampivarotana voaisy tombon-kase sy ny dika iray misokatra, ka apetraho ao anaty siny tanimanga mba ho voatahiry maharitra ela.'
  '15':
  - type: text
    content: 'Fa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Mbola hisy trano sy saha ary tanimboaloboka hovidina indray amin’ity tany ity.'
  '16':
  - type: text
    content: 'Rehefa avy nanolotra ny taratasim-pivarotana tamin’i Baròka zanakalahin’i Nerià aho, dia nivavaka tamin’ny TOMPO ka nanao hoe:'
  '17':
  - type: text
    content: '–Indrisy, ry Tompo ANDRIANANAHARY ô, Ianao no namorona ny lanitra sy ny tany tamin’ny herinao lehibe sy tamin’ny fahefànao, ka tsy misy zava-mahagaga tsy vitanao. '
  '18':
  - type: text
    content: 'Maneho fitiavana hatramin’ny taranaka faharivo Ianao; fa raha misy nanao fahadisoana kosa ny ray aman-dreny, dia ny zanany no asainao mizaka ny vokatr’izany. Andriamanitra lehibe sy mahery Ianao, ary TOMPOn’izao rehetra izao no anaranao. '
  '19':
  - type: text
    content: Manana fikasana lehibe Ianao ary manan-kery hanatanterahana azy. Arakao maso avokoa izay izoran’ny olombelona mba hamalianao azy araka ny fitondrantenany sy ny vokatry ny asany.
  '2':
  - type: text
    content: 'Ny tafika babilônianina tamin’izay dia nanao fahirano an’i Jerosalema; ary i Jeremià mpaminany dia nogadraina tao an-dapan’ny mpanjakan’i Joda, tao an-kianja fiambenana. '
  '20':
  - type: text
    content: 'Naneho ny lazanao Ianao raha nanao famantarana sy zava-mahagaga fony mbola tany Ejipta ny razanay, ary mandraka ankehitriny eo amin’ny Israelita sy eo amin’ny olombelona hafa koa tahaka ny amin’izao anio izao. '
  '21':
  - type: text
    content: 'Naneho hery amam-pahefana Ianao raha nanao famantarana sy zava-mahagaga mampivarahontsana mba hamoahana ny Israelita vahoakanao hiala avy tany Ejipta. '
  '22':
  - type: text
    content: 'Nianiana tamin’ny razanay Ianao fa hanome azy ny tany izay misy anay ankehitriny, dia tany tondra-dronono sy tantely; ka nanome azy izany. '
  '23':
  - type: text
    content: Tonga teto tokoa izy ary naka ny tany ho fananany; saingy tsy nihaino izay nolazainao izy, ary tsy nanaraka ny lalànao sady tsy nanatanteraka ny zavatra rehetra nasainao nataony; koa izany no nampiharanao izao loza rehetra izao aminy.
  '24':
  - type: text
    content: 'Indro mandroso hatrany izao ny Babilônianina amin’ny fanaovana fahirano ny tanàna ka hahafaka azy; eny, hatolotra ho eo an-tanan’ny Babilônianina izy, ka hasiany amin’ny sabatra sy ny mosary ary ny areti-mandringana. Hitanao tsara izao fa tanteraka izay nambaranao. '
  '25':
  - type: text
    content: Eny, efa saika eo am-pelatanan’ny Babilônianina izao ny tanàna; koa nahoana Ianao, ry Tompo ANDRIANANAHARY ô, no nandidy ahy hividy io saha io ka handoa ny vidiny tolo-botsotra teo anatrehan’ny vavolombelona?
  - type: heading
    content: Namaly an’i Jeremià ny Tompo
  '26':
  - type: text
    content: 'Dia namaly ahy ny TOMPO ka nanao hoe:'
  '27':
  - type: text
    content: '–Izaho no TOMPO Andriamanitry ny miaina rehetra, ka moa misy zavatra tsy vitako va? '
  '28':
  - type: text
    content: 'Izany no ilazako aminao hoe: Indro ity tanàna ity hatolotro eo am-pelatanan’i Nebokadnetsara mpanjakan’i Babilôna sy eo am-pelatanan’ny tafiny ka ho afany'
  - type: note
    content: 'Fanaovam-pahirano sy fahazoana an’i Jerosalema: jereo 2 Mp 25.1-11; 2 Tan 36.17-21.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Eo am-panafihana azy ny Babilônianina izao ka ho tafiditra ao an-tanàna, dia handrava sy handoro azy amin’ny afo, indrindra ireo trano izay nampahasosotra Ahy satria teo amin’ny tafony marin-tampona no nandoroana zava-manitra mifangaro ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' sy nanolorana fanatitra divay ho an’ireo andriamani-kafa.'
  '3':
  - type: text
    content: 'I Tsedekià no nampanidy an’i Jeremià tao satria nanome tsiny ity mpaminany izy tamin’ny nanambarany ny hafatry ny TOMPO hoe: «Hatolotro eo an-tanan’ny mpanjakan’i Babilôna i Jerosalema ka ho lasany. '
  '30':
  - type: text
    content: 'Fa ny Israelita sy ny Jodeanina dia efa nanao izay ratsy teo imasoko hatramin’ny fiandohan’ny tantarany, ary tsy nisy asa nataony afa-tsy ny nampalahelo Ahy; teny hentitra avy amiko TOMPO izany. '
  '31':
  - type: text
    content: 'Fa ity tanànan’i Jerosalema ity dia efa nampahavinitra sy nampahatezitra Ahy hatramin’ny nanorenana azy ka mandraka androany, hany ka hoesoriko tsy ho eo anatrehako intsony. '
  '32':
  - type: text
    content: 'Nanao izay nampalahelo Ahy ny Israelita sy ny Jodeanina tamin’ny ratsy rehetra nataony, dia ny mpanjakany sy ny mpitondrany ary ny mpisorony sy ny mpaminaniny mbamin’ireo olon’i Joda sy ny mponina eto Jerosalema. '
  '33':
  - type: text
    content: 'Toy izay hanatrika Ahy izy, dia vao mainka niamboho Ahy. Tsy nisy nanaiky sy nihaino ny fampianarako ireo, na dia tsy nitsahatra nampianatra azy aza Aho. '
  '34':
  - type: text
    content: 'Ankoatra izany, dia nametrahany sampy tao amin’ny tempoly natokana ho Ahy ka '
  - type: text
    content: nolotoiny
  - type: note
    content: 'Naloton’ny sampy ny tempoly: jereo 7.30.'
  - type: text
    content: '. '
  '35':
  - type: text
    content: Nanorina toeram-panasinana an’i Bahala tao amin’ny lohasahan’i Hinôma
  - type: note
    content: 'lohasahan’i Hinôma: jereo 7.31; 31.40 sy nta.'
  - type: text
    content: ' izy mba hanolorany ho sorona ho an’i Môleka ireo zanany lahy sy zanany vavy, nefa zavatra tsy nandidiako azy akory izany sady tsy mba tonga tao am-poko velively. Natao izany zavatra maharikoriko izany mba hampanota ny vahoakan’i Joda.'
  '36':
  - type: text
    content: Ankehitriny anefa, na eo aza izany, Izaho TOMPO Andriamanitr’i Israely dia mbola manan-teny momba ity tanàna ity izay voalazanao sy voalazan’ny hafa hoe natolotra teo an-tanan’i Nebokadnetsara tamin’ny alalan’ny ady sy ny mosary ary ny areti-mandringana
  - type: note
    content: Jereo 14.12 sy nta.
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Indro ny mponin’ity tanàna ity fa hangoniko avy any amin’ny tany samihafa izay nanelezako azy tamin-katezerana sy fahasosorana ary fahavinirana lehibe, ka hamponeniko indray amin’ity toerana ity ary hataoko miaina am-pilaminana eo. '
  '38':
  - type: text
    content: 'Dia ho vahoakako indray izy, ary Izaho ho Andriamaniny. '
  '39':
  - type: text
    content: 'Hataoko iray fo sy iray hevitra izy mba hanaja Ahy hatrany hatrany, hahasoa azy sy ny taranany mandimby azy. '
  '4':
  - type: text
    content: 'Ary na dia i Tsedekià mpanjakan’i Joda aza dia tsy ho afa-mitsoaka amin’ny Babilônianina fa hatolotra tokoa amin’ny mpanjakan’i Babilôna. Tsy maintsy hiseho eo anatrehan’i Nebokadnetsara izy ka hifandahatra aminy mivantana. '
  '40':
  - type: text
    content: 'Hanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' mandrakizay aminy Aho ka tsy hampitsahatra ny fanasoavako azy, ary hataoko ao am-pony ny fanajana Ahy mba tsy hialany amiko intsony. '
  '41':
  - type: text
    content: Hahafaly Ahy ny hanasoa azy, ka amin’ny foko sy fanahiko manontolo no hampiorenako azy tanteraka amin’ity tany ity.
  '42':
  - type: text
    content: 'Izao ihany koa no lazaiko: Izaho TOMPO no nahatonga izao loza lehibe rehetra manjo ny vahoakan’i Joda izao. Ary mbola Izaho ihany no hahatonga eo aminy ny soa rehetra izay efa nampanantenaiko azy. '
  '43':
  - type: text
    content: 'Hisy fividianana saha indray eto amin’ity tany ity izay lazainao hoe lao tsy misy olona na biby fiompy intsony fa efa natolotra an’i Nebokadnetsara. '
  '44':
  - type: text
    content: 'Eny, ao amin’ny faritanin’i Benjamîna sy ao amin’ny manodidina an’i Jerosalema, any amin’ny tanànan’i Joda ary koa any amin’ny tanàna any an-tendrombohitra sy any amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' ary any Negeba'
  - type: note
    content: 'tendrombohitra na tany ambony: dia faritany afovoan’i Palestinina. –Negeba: dia faritany saiky ngazana amin’ny ankapobeny any amin’ny tendrony atsimon’i Israely.'
  - type: text
    content: ', dia hisy fividianana saha indray; hosoratana ny fanekem-pivarotana ka hasiana '
  - type: text
    content: tombokase
  - type: text
    content: ' ary hiantsoana vavolombelona, satria haveriko amin’ny laoniny. Teny hentitra avy amiko TOMPO izany.'
  '5':
  - type: text
    content: Dia hoentina any Babilôna i Tsedekià, ka hijanona any saingy hokarakaraiko, hoy ny teny hentitra avy amiko TOMPO. Fa na dia hanohy hiady amin’ny Babilônianina aza ianareo, dia tsy haharesy azy.»
  '6':
  - type: text
    content: 'Kanjo nitantara i Jeremià fa nisy hafatry ny TOMPO ho azy nanao hoe:'
  '7':
  - type: text
    content: –Ho avy any aminao i Hanamèla, zanakalahin’i Salòma rahalahin-drainao momba ny sahany ao Hanatôta. Hiangavy anao izy mba hividy io saha io, satria ianao no havany akaiky ka manan-jo hanavotra hividy azy
  - type: note
    content: Ny zo sy adidin’ny havana akaiky dia voafaritra mazava ao Lev 25.25.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Araka izay nolazain’ny TOMPO, dia tonga tany amiko tao an-kianja fiambenana tokoa i Hanamèla zana-drahalahin-draiko, ka niteny tamiko hoe:'
  - type: text
    content: –Tokony hovidinao ny sahako izay ao Hanatôta ao amin’ny tanin’i Benjamîna, fa ianao no havako akaiky ka manan-jo hanavotra sy hanana azy.
  - type: text
    content: Koa fantatro tamin’izay fa ny TOMPO tokoa no efa niteny tamiko.
  '9':
  - type: text
    content: 'Dia novidiko tamin’i Hanamèla zana-drahalahin-draiko ny sahany tao Hanatôta ary naloako ny vidiny, dia sekela volafotsy fito ambin’ny folo. '
