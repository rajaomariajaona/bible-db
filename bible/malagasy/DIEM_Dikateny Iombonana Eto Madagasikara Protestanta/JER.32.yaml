document_id: JER.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nividy saha i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nisy torolalana avy amin’ny TOMPO ho an’i Jeremià tamin’ny taona fahafolo nanjakàn’i Tsedekià mpanjakan’i Joda, izany hoe ny taona faha-18 nanjakàn’i Nebokadnetsara mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny tafika babilônianina tamin’izay dia nanao fahirano an’i Jerosalema; ary i Jeremià mpaminany dia nogadraina tao an-dapan’ny mpanjakan’i Joda, tao an-kianja fiambenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Tsedekià no nampanidy an’i Jeremià tao satria nanome tsiny ity mpaminany izy tamin’ny nanambarany ny hafatry ny TOMPO hoe: «Hatolotro eo an-tanan’ny mpanjakan’i Babilôna i Jerosalema ka ho lasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary na dia i Tsedekià mpanjakan’i Joda aza dia tsy ho afa-mitsoaka amin’ny Babilônianina fa hatolotra tokoa amin’ny mpanjakan’i Babilôna. Tsy maintsy hiseho eo anatrehan’i Nebokadnetsara izy ka hifandahatra aminy mivantana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hoentina any Babilôna i Tsedekià, ka hijanona any saingy hokarakaraiko, hoy ny teny hentitra avy amiko TOMPO. Fa na dia hanohy hiady amin’ny Babilônianina aza ianareo, dia tsy haharesy azy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanjo nitantara i Jeremià fa nisy hafatry ny TOMPO ho azy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: –Ho avy any aminao i Hanamèla, zanakalahin’i Salòma rahalahin-drainao momba ny sahany ao Hanatôta. Hiangavy anao izy mba hividy io saha io, satria ianao no havany akaiky ka manan-jo hanavotra hividy azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny zo sy adidin’ny havana akaiky dia voafaritra mazava ao Lev 25.25.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Araka izay nolazain’ny TOMPO, dia tonga tany amiko tao an-kianja fiambenana tokoa i Hanamèla zana-drahalahin-draiko, ka niteny tamiko hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tokony hovidinao ny sahako izay ao Hanatôta ao amin’ny tanin’i Benjamîna, fa ianao no havako akaiky ka manan-jo hanavotra sy hanana azy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Koa fantatro tamin’izay fa ny TOMPO tokoa no efa niteny tamiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia novidiko tamin’i Hanamèla zana-drahalahin-draiko ny sahany tao Hanatôta ary naloako ny vidiny, dia sekela volafotsy fito ambin’ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nataoko dika roa mitovy ny taratasy fivarotana. Teo imason’ny vavolombelona no nohidiko tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokaseko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny manisy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tombokase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’ny raki-tsoratra iray dia mitovy amin’ny manisy sonia azy sady ahazoana manidy koa io raki-tsoratra io amin’ny pentin-tsavoka voamariky ny fitomboka.'
    marker-yv: yv-n
  - type: text
    text: ' ny dikan’ny taratasy fifampivarotana iray ary nolanjaiko tamin’ny mizàna ny lanjan’ny volafotsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avy eo dia nalaiko ny dikan’ny taratasy fifampivarotana vita tombokase araka izay notakin’ny lalàna sy ilay dika iray misokatra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ka natolotro an’i Baròka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Baròka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia mpitantsoratr’i Jeremià sady sakaizany: jereo 36.4.'
    marker-yv: yv-n
  - type: text
    text: ', zanakalahin’i Nerià sady zafikelin’i Mahaseià, teo imason’i Hanamèla zana-drahalahin-draiko sy teo imason’ireo vavolombelona izay niara-nanao sonia ny taratasy fivarotana ary teo imason’ireo Jiosy rehetra nipetraka teo an-kianja fiambenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia teo imason’ny olona rehetra teo no nandidiako an’i Baròka hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '–Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Raiso ny dikan’ny taratasy fifampivarotana voaisy tombon-kase sy ny dika iray misokatra, ka apetraho ao anaty siny tanimanga mba ho voatahiry maharitra ela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Mbola hisy trano sy saha ary tanimboaloboka hovidina indray amin’ity tany ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa avy nanolotra ny taratasim-pivarotana tamin’i Baròka zanakalahin’i Nerià aho, dia nivavaka tamin’ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '–Indrisy, ry Tompo ANDRIANANAHARY ô, Ianao no namorona ny lanitra sy ny tany tamin’ny herinao lehibe sy tamin’ny fahefànao, ka tsy misy zava-mahagaga tsy vitanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Maneho fitiavana hatramin’ny taranaka faharivo Ianao; fa raha misy nanao fahadisoana kosa ny ray aman-dreny, dia ny zanany no asainao mizaka ny vokatr’izany. Andriamanitra lehibe sy mahery Ianao, ary TOMPOn’izao rehetra izao no anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Manana fikasana lehibe Ianao ary manan-kery hanatanterahana azy. Arakao maso avokoa izay izoran’ny olombelona mba hamalianao azy araka ny fitondrantenany sy ny vokatry ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Naneho ny lazanao Ianao raha nanao famantarana sy zava-mahagaga fony mbola tany Ejipta ny razanay, ary mandraka ankehitriny eo amin’ny Israelita sy eo amin’ny olombelona hafa koa tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Naneho hery amam-pahefana Ianao raha nanao famantarana sy zava-mahagaga mampivarahontsana mba hamoahana ny Israelita vahoakanao hiala avy tany Ejipta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nianiana tamin’ny razanay Ianao fa hanome azy ny tany izay misy anay ankehitriny, dia tany tondra-dronono sy tantely; ka nanome azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tonga teto tokoa izy ary naka ny tany ho fananany; saingy tsy nihaino izay nolazainao izy, ary tsy nanaraka ny lalànao sady tsy nanatanteraka ny zavatra rehetra nasainao nataony; koa izany no nampiharanao izao loza rehetra izao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indro mandroso hatrany izao ny Babilônianina amin’ny fanaovana fahirano ny tanàna ka hahafaka azy; eny, hatolotra ho eo an-tanan’ny Babilônianina izy, ka hasiany amin’ny sabatra sy ny mosary ary ny areti-mandringana. Hitanao tsara izao fa tanteraka izay nambaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny, efa saika eo am-pelatanan’ny Babilônianina izao ny tanàna; koa nahoana Ianao, ry Tompo ANDRIANANAHARY ô, no nandidy ahy hividy io saha io ka handoa ny vidiny tolo-botsotra teo anatrehan’ny vavolombelona?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Namaly an’i Jeremià ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia namaly ahy ny TOMPO ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '–Izaho no TOMPO Andriamanitry ny miaina rehetra, ka moa misy zavatra tsy vitako va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izany no ilazako aminao hoe: Indro ity tanàna ity hatolotro eo am-pelatanan’i Nebokadnetsara mpanjakan’i Babilôna sy eo am-pelatanan’ny tafiny ka ho afany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fanaovam-pahirano sy fahazoana an’i Jerosalema: jereo 2 Mp 25.1-11; 2 Tan 36.17-21.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Eo am-panafihana azy ny Babilônianina izao ka ho tafiditra ao an-tanàna, dia handrava sy handoro azy amin’ny afo, indrindra ireo trano izay nampahasosotra Ahy satria teo amin’ny tafony marin-tampona no nandoroana zava-manitra mifangaro ho an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' sy nanolorana fanatitra divay ho an’ireo andriamani-kafa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny Israelita sy ny Jodeanina dia efa nanao izay ratsy teo imasoko hatramin’ny fiandohan’ny tantarany, ary tsy nisy asa nataony afa-tsy ny nampalahelo Ahy; teny hentitra avy amiko TOMPO izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ity tanànan’i Jerosalema ity dia efa nampahavinitra sy nampahatezitra Ahy hatramin’ny nanorenana azy ka mandraka androany, hany ka hoesoriko tsy ho eo anatrehako intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanao izay nampalahelo Ahy ny Israelita sy ny Jodeanina tamin’ny ratsy rehetra nataony, dia ny mpanjakany sy ny mpitondrany ary ny mpisorony sy ny mpaminaniny mbamin’ireo olon’i Joda sy ny mponina eto Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Toy izay hanatrika Ahy izy, dia vao mainka niamboho Ahy. Tsy nisy nanaiky sy nihaino ny fampianarako ireo, na dia tsy nitsahatra nampianatra azy aza Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ankoatra izany, dia nametrahany sampy tao amin’ny tempoly natokana ho Ahy ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nolotoiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Naloton’ny sampy ny tempoly: jereo 7.30.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nanorina toeram-panasinana an’i Bahala tao amin’ny lohasahan’i Hinôma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'lohasahan’i Hinôma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 7.31; 31.40 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' izy mba hanolorany ho sorona ho an’i Môleka ireo zanany lahy sy zanany vavy, nefa zavatra tsy nandidiako azy akory izany sady tsy mba tonga tao am-poko velively. Natao izany zavatra maharikoriko izany mba hampanota ny vahoakan’i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ankehitriny anefa, na eo aza izany, Izaho TOMPO Andriamanitr’i Israely dia mbola manan-teny momba ity tanàna ity izay voalazanao sy voalazan’ny hafa hoe natolotra teo an-tanan’i Nebokadnetsara tamin’ny alalan’ny ady sy ny mosary ary ny areti-mandringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Indro ny mponin’ity tanàna ity fa hangoniko avy any amin’ny tany samihafa izay nanelezako azy tamin-katezerana sy fahasosorana ary fahavinirana lehibe, ka hamponeniko indray amin’ity toerana ity ary hataoko miaina am-pilaminana eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia ho vahoakako indray izy, ary Izaho ho Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hataoko iray fo sy iray hevitra izy mba hanaja Ahy hatrany hatrany, hahasoa azy sy ny taranany mandimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' mandrakizay aminy Aho ka tsy hampitsahatra ny fanasoavako azy, ary hataoko ao am-pony ny fanajana Ahy mba tsy hialany amiko intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Hahafaly Ahy ny hanasoa azy, ka amin’ny foko sy fanahiko manontolo no hampiorenako azy tanteraka amin’ity tany ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Izao ihany koa no lazaiko: Izaho TOMPO no nahatonga izao loza lehibe rehetra manjo ny vahoakan’i Joda izao. Ary mbola Izaho ihany no hahatonga eo aminy ny soa rehetra izay efa nampanantenaiko azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hisy fividianana saha indray eto amin’ity tany ity izay lazainao hoe lao tsy misy olona na biby fiompy intsony fa efa natolotra an’i Nebokadnetsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eny, ao amin’ny faritanin’i Benjamîna sy ao amin’ny manodidina an’i Jerosalema, any amin’ny tanànan’i Joda ary koa any amin’ny tanàna any an-tendrombohitra sy any amin’ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ' ary any Negeba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.44 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tendrombohitra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tany ambony
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dia faritany afovoan’i Palestinina. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Negeba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': dia faritany saiky ngazana amin’ny ankapobeny any amin’ny tendrony atsimon’i Israely.'
    marker-yv: yv-n
  - type: text
    text: ', dia hisy fividianana saha indray; hosoratana ny fanekem-pivarotana ka hasiana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tombokase
  - type: text
    text: ' ary hiantsoana vavolombelona, satria haveriko amin’ny laoniny. Teny hentitra avy amiko TOMPO izany.'
