document_id: 1CH.19,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nanala baràka ny irak’i Davida ny mpanjakan’ny Hamônita
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Sam 10.1-5)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, dia maty i Nahasy mpanjakan’ny Hamônita, ka ny zanany lahy no nanjaka nandimby azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa hitan’i Jôaba fa sady teo anoloany no teo ivohony ny vava ady, dia nifantina izay miaramila israelita mendrika indrindra izy ka nandahatra azy teo anoloan’ny Sirianina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sisa tamin’ny tafika kosa natolony hoentin’i Abisy rahalahiny, ka ireo no nilahatra hiady tamin’ny Hamônita. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jôaba tamin’ity rahalahiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Raha mahery noho izaho ny Sirianina, dia aoka ianao hamonjy ahy; fa raha mahery noho ianao kosa ny Hamônita, dia hamonjy anao aho. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mahereza ianao ary aoka isika hahery miady ho an’ny firenentsika sy ireo tanànan’Andriamanitsika. Ary aoka ny TOMPO no hanao izay heveriny ho tsara!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandroso hiady amin’ny Sirianina i Jôaba sy ny tafiny, ka vaky nandositra teo anoloan’ny Israelita ireo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony hitan’ny Hamônita fa nandositra ny Sirianina, dia mba nandositra teo anatrehan’i Abisay, rahalahin’i Jôaba, koa ry zareo ka nitsofoka tao an-tanàna. Dia niverina ho any Jerosalema ry i Jôaba.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireto Sirianina ireto, dia naniraka olona hanetsika ny Sirianina izay tany am-pitan’ny ony Eofrata; ary i Sôfàka, filohan’ny tafik’i Hadadehezera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hadadehezera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 18.3.
      marker-yv: yv-n
    - type: text
      text: ', no nitarika azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nambara tamin’i Davida izany; koa namory ny tafika israelita manontolo izy, dia niampita an’i Jôrdàna, ary tonga teo akaikin’ny Sirianina ka nilahatra hiady aminy. Vao nalahatr’i Davida hiady amin’ny Sirianina ny miaramilany, dia namely azy ny Sirianina; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: kanjo vaky nandositra teo anoloan’ny Israelita ireo ka nahafatesan-dry i Davida 7 000 olona tao an-kalesy 7 000 sy miaramila an-tongotra 40 000; sady matiny koa i Sôfàka filohan-tafika.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireo mpanjaka nanoa an’i Hadadehezera, dia nandrindra fihavanana tamin’i Davida ka nanoa azy. Ary tsy nety hamonjy ny Hamônita intsony ny Sirianina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Davida anakampony: «Hanao soa amin’i Hanòna zanakalahin’i Nahasy aho satria nanao soa tamiko ny rainy». Dia nandefa iraka i Davida mba hitsapa alahelo an’i Hanòna noho ny nahafatesan-drainy. Ary rehefa tonga tany amin’i Hanòna, tany amin’ny tanin’ny Hamônita, ny irak’i Davida mba hitsapa alahelo azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy kosa ireo andrianan’ny Hamônita tamin’i Hanòna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ataonao ve fa ho fanomezan’i Davida voninahitra an-drainao ihany ve no nanirahany olona hitsapa alahelo anao? Moa ve tsy ny hizaha sy hisafo ary hitsikilo ny tany no nahatongavan’ireo minisitra ireo atỳ aminao?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampisamborin’i Hanòna ireo minisitr’i Davida, ka noharatana ny volom-bavany sady noborina hatrany am-poto-peny ny akanjony ary noroahina hody. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha ireo; ary nisy nampandre an’i Davida izay nanjo ireo lehilahy ireo, koa naniraka olona izy mba hitsena azy satria afa-baràka loatra ry zareo. Ary hoy ny hafatry ny mpanjaka hoe: «Mitoera any Jerikao aloha mandra-panirin’ny volom-bavanareo; izay ianareo vao mody.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ady tamin’ny Hamônita sy ny Sirianina
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Sam 10.6-19)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa nahatsapa ny tenany ho tonga halan’i Davida i Hanòna sy ny Hamônita, dia nampanatitra volafotsy tokony ho telopolo taonina ho an’ny Sirianina tany Mezôpôtamia ambony sy tany Mahekà ary tany Tsôbà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsôbà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 18.3 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' mba hanakarama kalesy sy mpitaingin-tsoavaly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kalesy andiany 32 niampy ny mpanjakan’i Mahekà sy ny olony no voakaramany. Dia tonga ireo ka nitoby tandrifin’i Medebà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kalesy andiany 32: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy mandika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kalesy 32 000
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', kanefa toa tarehimarika miitatra be loatra izany. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Medebà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Is 15.2 sy nta.'
      marker-yv: yv-n
    - type: text
      text: ; ny Hamônita kosa nivoaka ny tanànany avy, dia nivory hiroso hiady.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’i Davida izany, dia nirahiny ho any an-toerana i Jôaba sy ny miaramila maherifo rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niainga kosa ny Hamônita ka nilahatra hiady teo akaikin’ny vavahadin-drenivohiny; fa ireo mpanjaka izay tonga hanampy kosa naka toerana teny an-tsaha. '
