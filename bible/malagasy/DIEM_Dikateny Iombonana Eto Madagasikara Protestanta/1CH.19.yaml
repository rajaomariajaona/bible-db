document_id: 1CH.19,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nanala baràka ny irak’i Davida ny mpanjakan’ny Hamônita
  - type: heading
    content: (Jereo 2 Sam 10.1-5)
  - type: text
    content: 'Taorian’izany, dia maty i Nahasy mpanjakan’ny Hamônita, ka ny zanany lahy no nanjaka nandimby azy. '
  '10':
  - type: text
    content: 'Rehefa hitan’i Jôaba fa sady teo anoloany no teo ivohony ny vava ady, dia nifantina izay miaramila israelita mendrika indrindra izy ka nandahatra azy teo anoloan’ny Sirianina. '
  '11':
  - type: text
    content: 'Ary ny sisa tamin’ny tafika kosa natolony hoentin’i Abisy rahalahiny, ka ireo no nilahatra hiady tamin’ny Hamônita. '
  '12':
  - type: text
    content: 'Dia hoy i Jôaba tamin’ity rahalahiny:'
  - type: text
    content: '–Raha mahery noho izaho ny Sirianina, dia aoka ianao hamonjy ahy; fa raha mahery noho ianao kosa ny Hamônita, dia hamonjy anao aho. '
  '13':
  - type: text
    content: Mahereza ianao ary aoka isika hahery miady ho an’ny firenentsika sy ireo tanànan’Andriamanitsika. Ary aoka ny TOMPO no hanao izay heveriny ho tsara!
  '14':
  - type: text
    content: 'Dia nandroso hiady amin’ny Sirianina i Jôaba sy ny tafiny, ka vaky nandositra teo anoloan’ny Israelita ireo. '
  '15':
  - type: text
    content: Nony hitan’ny Hamônita fa nandositra ny Sirianina, dia mba nandositra teo anatrehan’i Abisay, rahalahin’i Jôaba, koa ry zareo ka nitsofoka tao an-tanàna. Dia niverina ho any Jerosalema ry i Jôaba.
  '16':
  - type: text
    content: Rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireto Sirianina ireto, dia naniraka olona hanetsika ny Sirianina izay tany am-pitan’ny ony Eofrata; ary i Sôfàka, filohan’ny tafik’i Hadadehezera
  - type: note
    content: 'Hadadehezera: jereo 18.3.'
  - type: text
    content: ', no nitarika azy. '
  '17':
  - type: text
    content: 'Nambara tamin’i Davida izany; koa namory ny tafika israelita manontolo izy, dia niampita an’i Jôrdàna, ary tonga teo akaikin’ny Sirianina ka nilahatra hiady aminy. Vao nalahatr’i Davida hiady amin’ny Sirianina ny miaramilany, dia namely azy ny Sirianina; '
  '18':
  - type: text
    content: kanjo vaky nandositra teo anoloan’ny Israelita ireo ka nahafatesan-dry i Davida 7 000 olona tao an-kalesy 7 000 sy miaramila an-tongotra 40 000; sady matiny koa i Sôfàka filohan-tafika.
  '19':
  - type: text
    content: Rehefa nahatsapa ny fahareseny teo anoloan’ny Israelita ireo mpanjaka nanoa an’i Hadadehezera, dia nandrindra fihavanana tamin’i Davida ka nanoa azy. Ary tsy nety hamonjy ny Hamônita intsony ny Sirianina.
  '2':
  - type: text
    content: 'Ary hoy i Davida anakampony: «Hanao soa amin’i Hanòna zanakalahin’i Nahasy aho satria nanao soa tamiko ny rainy». Dia nandefa iraka i Davida mba hitsapa alahelo an’i Hanòna noho ny nahafatesan-drainy. Ary rehefa tonga tany amin’i Hanòna, tany amin’ny tanin’ny Hamônita, ny irak’i Davida mba hitsapa alahelo azy, '
  '3':
  - type: text
    content: 'dia hoy kosa ireo andrianan’ny Hamônita tamin’i Hanòna:'
  - type: text
    content: –Ataonao ve fa ho fanomezan’i Davida voninahitra an-drainao ihany ve no nanirahany olona hitsapa alahelo anao? Moa ve tsy ny hizaha sy hisafo ary hitsikilo ny tany no nahatongavan’ireo minisitra ireo atỳ aminao?
  '4':
  - type: text
    content: 'Dia nampisamborin’i Hanòna ireo minisitr’i Davida, ka noharatana ny volom-bavany sady noborina hatrany am-poto-peny ny akanjony ary noroahina hody. '
  '5':
  - type: text
    content: 'Dia nandeha ireo; ary nisy nampandre an’i Davida izay nanjo ireo lehilahy ireo, koa naniraka olona izy mba hitsena azy satria afa-baràka loatra ry zareo. Ary hoy ny hafatry ny mpanjaka hoe: «Mitoera any Jerikao aloha mandra-panirin’ny volom-bavanareo; izay ianareo vao mody.»'
  - type: heading
    content: Ady tamin’ny Hamônita sy ny Sirianina
  - type: heading
    content: (Jereo 2 Sam 10.6-19)
  '6':
  - type: text
    content: Rehefa nahatsapa ny tenany ho tonga halan’i Davida i Hanòna sy ny Hamônita, dia nampanatitra volafotsy tokony ho telopolo taonina ho an’ny Sirianina tany Mezôpôtamia ambony sy tany Mahekà ary tany Tsôbà
  - type: note
    content: 'Tsôbà: jereo 18.3 sy nta.'
  - type: text
    content: ' mba hanakarama kalesy sy mpitaingin-tsoavaly. '
  '7':
  - type: text
    content: Kalesy andiany 32 niampy ny mpanjakan’i Mahekà sy ny olony no voakaramany. Dia tonga ireo ka nitoby tandrifin’i Medebà
  - type: note
    content: 'kalesy andiany 32: misy mandika hoe kalesy 32 000, kanefa toa tarehimarika miitatra be loatra izany. Medebà: jereo Is 15.2 sy nta.'
  - type: text
    content: ; ny Hamônita kosa nivoaka ny tanànany avy, dia nivory hiroso hiady.
  '8':
  - type: text
    content: 'Nony ren’i Davida izany, dia nirahiny ho any an-toerana i Jôaba sy ny miaramila maherifo rehetra. '
  '9':
  - type: text
    content: 'Ary niainga kosa ny Hamônita ka nilahatra hiady teo akaikin’ny vavahadin-drenivohiny; fa ireo mpanjaka izay tonga hanampy kosa naka toerana teny an-tsaha. '
