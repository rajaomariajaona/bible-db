    content: Sava lalana
  - type: text
    content: –Ny bokin’i Jônà dia mitantara ny fahavoazan’ny
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: iray izay nitady tsy hankato baikon’Andriamanitra, saingy herim-po very maina. Ny fisehoan-javatra samihafa mampihetsi-po amin’io tantara io dia manazava ireo fampianarana kendren’ny boky homena. Noho izany dia anisan’ny raki-tsoa mitahiry ny fahendren’i Israely izy.
  - type: text
    content: 'Ny tantaran’i Jônà dia maneho ireto fahamarinana fototra ireto: Andriamanitra tsy mitahiry ny fitiavany ho an’ny Israelita irery ihany, fa mampiseho izany koa amin’ny hafa firenena izay mihevitra izany ho zava-dehibe; vonona mandrakariva Izy hiala amin’ny fandrahonany rehefa mihaino ny fampitandremany ny olona ka miova tanteraka amin’ny fitondrantenany; farany dia Izy no Tompo manontolon’ny zavaboaary, indrindra fa ny fiainana sy ny fahafatesana, koa tsy tokony hisendaotra ny mpaminany raha avelan’Andriamanitra heloka ny mpanota. Ny bokin’i Jônà koa dia maneho amin’ny fomba monge-mahalatsaka sy malemy fanahy ireo zava-tsarotra sy fakampanahy ary fisalasalana izay mety hitranga eo amin’ny fiainan’ny mpaminany, ary koa amin’ny fiainan’ny olona rehetra voairak’Andriamanitra. Mampianatra antsika izy fa Andriamanitra tsy mba mandao ny mpaminany mikorontan-tsaina sy manirery, tahaka ny tsy hamelany azy koa handositra lavitra Azy, satria Andriamanitra dia vonona ny hamerimberina sy hanazava lalandava fa tsy mba manavakavaka akory ny fitiavany.'
  - type: text
    content: I Jesoa dia niankina tamin’izay nanjo an’i Jônà mba hanambaràna ny fitsanganany avy any amin’ny maty ary mba hanomezana ny fiovam-pon’ireo olona tao Ninive (Mt 12.38-42) ho ohatra ho an’ireo mpiara-belona taminy.
