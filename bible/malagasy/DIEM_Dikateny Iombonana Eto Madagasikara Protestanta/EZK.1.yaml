document_id: EZK.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Niseho tamin’i Ezekiela ny Tompo
  - type: text
    content: Tamin’ny fahatelopolon-taonako, fony andro fahadimin’ny volana fahefatra, izaho Ezekiela zanakalahin’i Bozỳ mpisorona dia tao anivon’ireo Jiosy babo teo amoron’ny ony Kebara
  - type: note
    content: fahatelopolon-taonako, na fahatelopolo taona araka ny RM; noho ny tsy fisian’ny fanondroana hafa dia azo heverina ho ny taonan’i Ezekiela no tondroina eto. –Kebara dia tokony ho ony na lakan-drano iray mitohy amin’i Eofrata izay ony lehibe mandalo ao Babilôna.
  - type: text
    content: '; nisokatra ny '
  - type: text
    content: lanitra
  - type: text
    content: ' ary nahita fahitana avy tamin’Andriamanitra aho. Taona fahadimy taorian’ny naha lasan-ko babo an’i Jôiakina'
  - type: note
    content: 'Taona fahadimy taorian’ny naha lasan-ko babo an’i Jôiakina: izany hoe 593-592 tal J.K, jereo 2 Mp 24.8-17 sy 2 Tan 36.9-10.'
  - type: text
    content: ' mpanjaka tamin’izay. Koa teo amoron’io ony Kebara tany amin’ny tanin’ny Babilônianina io, no nisy tenin’ny TOMPO tamiko, sady nihazona ahy tamin’ny heriny IZY.'
  '10':
  - type: text
    content: 'Samy nanana ireto tarehy ireto avy izy: tarehin’olona no teo anoloana, tarehina liona no teo ankavanana, tarehin’ombilahy no teo ankavia ary tarehina voromahery no teo ivoho. '
  '11':
  - type: text
    content: Ny roa amin’ireo elany
  - type: note
    content: 'Ny roa amin’ireo elany: araka ny dkt tranainy izany; fa ny RM kosa manao hoe Ny roa amin’ireo tarehiny sy ireo elany.'
  - type: text
    content: 'dia nitsotra miakatra ka nifanendry ny tendrony, fa ny roa kosa nanarona ny tenany. '
  '12':
  - type: text
    content: Samy nizotra tamin’izay hitsiny avy ireo zava-miaina ireo, ary nandeha tamin’izay nitondran’ny Fanahy azy
  - type: note
    content: 'tamin’izay nitondran’ny Fanahy azy: dkt hafa tamin’izay niriny haleha (jereo 1.20).'
  - type: text
    content: ' fa tsy niherika. '
  '13':
  - type: text
    content: 'Teo anelanelan’ireo zava-miaina dia tazana ho nisy toy ny vainafo; ary nihetsiketsika toy ny fanilo no fijery azy. Namirapiratra ny afo, ary nisy tselatra nivoaka avy tao aminy. '
  '14':
  - type: text
    content: Ireo zava-miaina ireo koa dia nifanaretsaka tetsy sy teroa sady nitsoriaka toy ny varatra.
  '15':
  - type: text
    content: Raha nandinika ny zava-miaina efatra aho, dia nahita fa teo anilan’ny tsirairay avy
  - type: note
    content: 'teo anilan’ny tsirairay avy: araka ireo dkt tranainy izany; fa ny RM kosa manao hoe teo anilan’ny tavany tsirairay avy.'
  - type: text
    content: 'dia nisy kodiarana iray nitehika tamin’ny tany. '
  '16':
  - type: text
    content: 'Nanana endrika manjelanjelatra toy ny vatosoa ireo kodiarana. Nitovy bika izy efatra ary toa samy voarafitra ho kodiarana mifampidipiditra. '
  '17':
  - type: text
    content: 'Afaka mandroso ho amin’ny lafiny efatra izy nefa tsy mila mihodina. '
  '18':
  - type: text
    content: 'Mahatahotra ny refin’ny savaivony ary rakotra taratra mamirapiratra ny manodidina azy manontolo. '
  '19':
  - type: text
    content: 'Rehefa nandroso ireo zava-miaina, dia mba nandroso avy hatrany teo anilany koa ireto kodiarana; rehefa niakatra niala tamin’ny tany izy, dia mba niakatra koa ireto. '
  '20':
  - type: text
    content: 'Nandeha tamin’izay nitondran’ny Fanahy azy izy ka nandroso niaraka taminy koa ireto kodiarana, satria ny fanoitran’ny zava-miaina no nanetsika ireo kodiarana ireo. '
  '21':
  - type: text
    content: Koa isaky ny nandroso izy na nijanona na niakatra niala tamin’ny tany, dia niara-nanao fihetsika toy izany koa ireto kodiarana satria ny fanoitran’ireo zava-miaina no nanetsika azy.
  '22':
  - type: text
    content: 'Teo ambony lohan’ireo zava-miaina dia nisy toa andohalambo namirapiratra toy ny kristaly manjelanjelatra. '
  '23':
  - type: text
    content: 'Teo ambanin’izany andohalambo izany no samy namelatra ny elany roa nifanitsy sy nifanendry ny zava-miaina tsirairay, fa ny elany roa sisa kosa nanaronany ny tenany. '
  '24':
  - type: text
    content: 'Ary nandre ny fikopakopaky ny elany aho rehefa nanidina ireto zava-miaina, fa toy ny firohondrohon’ny ranomasina izany, sy tahaka ny feon’Andriamanitra '
  - type: text
    content: Tsitoha
  - type: note
    content: ny feon’Andriamanitra Tsitoha dia fomba fiteny enti-milaza ny varatra.
  - type: text
    content: ' na ny fireondreonan’ny tafika marobe. Rehefa nijanona kosa izy, dia nafihiny ny elany. '
  '25':
  - type: text
    content: 'Avy tao ambonin’ny andohalambo izay teo ambony lohany dia naharenesako feo ihany koa. '
  '26':
  - type: text
    content: 'Tazako tao fa nisy toa sezafiandrianana miendrika vato safira; ary teo ambonin’izany toa sezafiandrianana izany, terỳ an-tampon’ny andohalambo dia nisy hoatra endrik’olombelona. '
  '27':
  - type: text
    content: 'Hitako fa namirapiratra tahaka ny vy mangirana izany endrika izany, sady toa voahodidina afo. Ary teo ambony sy teo ambanin’izay hoatra ny tehezany, dia tazako nisy toy ny afo nandrakotra hazavana azy. '
  '28':
  - type: text
    content: Ny fahazavana manodidina azy dia tahaka ny an’ny avana izay mamirapiratra amin’ny andro manerika. Taratry ny voninahitry ny TOMPO izany. Nony nahita izany aho, dia nikarapoka nihohoka hatreo amin’ny tany, ary nandre feo niteny tamiko
  - type: note
    content: Ampit ity fisehoan’ny Tompo amin’i Ezekiela ity (1.1-28) sy ny 10.1-22 ary ny Apôk 4.1-11.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Koa izao no hitako: tafio-drivotra tonga avy any avaratra, nitondra rahona matevina sady namoaka tselatra. Voahodidina hazavana ilay rahona, ary ny afovoany izay mivaivay dia nanjelanjelatra toy ny vy mangirana. '
  '5':
  - type: text
    content: 'Hita miavaka tao amin’io ivon-drahona io ny endrika zava-miaina efatra izay toa olombelona no fijery azy. '
  '6':
  - type: text
    content: 'Samy nanana tarehy efatra sy elatra efatra avy izy. '
  '7':
  - type: text
    content: 'Mahitsy ny tongony; ary ny faladiany dia toy ny kitron’ombilahikely, ka mamirapiratra toy ny halimo voadio. '
  '8':
  - type: text
    content: 'Teo ambanin’ny elatra efatra dia samy nisy tanan’olona iray avy; ary ireny tanana ireny dia nitodika ho amin’ny lafiny efatra nanaraka ny tarehy sy ny elany avy. '
  '9':
  - type: text
    content: 'Nifanendry ny tendron’ny elany; ary samy nandroso ho amin’izay hitsiny avy izy, fa tsy niherika rehefa nandeha. '
