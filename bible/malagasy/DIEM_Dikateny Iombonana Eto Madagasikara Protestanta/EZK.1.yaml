document_id: EZK.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Niseho tamin’i Ezekiela ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Tamin’ny fahatelopolon-taonako, fony andro fahadimin’ny volana fahefatra, izaho Ezekiela zanakalahin’i Bozỳ mpisorona dia tao anivon’ireo Jiosy babo teo amoron’ny ony Kebara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1-3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fahatelopolon-taonako, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahatelopolo taona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny RM; noho ny tsy fisian’ny fanondroana hafa dia azo heverina ho ny taonan’i Ezekiela no tondroina eto. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Kebara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tokony ho ony na lakan-drano iray mitohy amin’i Eofrata izay ony lehibe mandalo ao Babilôna.'
    marker-yv: yv-n
  - type: text
    text: '; nisokatra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ' ary nahita fahitana avy tamin’Andriamanitra aho. Taona fahadimy taorian’ny naha lasan-ko babo an’i Jôiakina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1-3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Taona fahadimy taorian’ny naha lasan-ko babo an’i Jôiakina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe 593-592 tal J.K, jereo 2 Mp 24.8-17 sy 2 Tan 36.9-10.
    marker-yv: yv-n
  - type: text
    text: ' mpanjaka tamin’izay. Koa teo amoron’io ony Kebara tany amin’ny tanin’ny Babilônianina io, no nisy tenin’ny TOMPO tamiko, sady nihazona ahy tamin’ny heriny IZY.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa izao no hitako: tafio-drivotra tonga avy any avaratra, nitondra rahona matevina sady namoaka tselatra. Voahodidina hazavana ilay rahona, ary ny afovoany izay mivaivay dia nanjelanjelatra toy ny vy mangirana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hita miavaka tao amin’io ivon-drahona io ny endrika zava-miaina efatra izay toa olombelona no fijery azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Samy nanana tarehy efatra sy elatra efatra avy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mahitsy ny tongony; ary ny faladiany dia toy ny kitron’ombilahikely, ka mamirapiratra toy ny halimo voadio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Teo ambanin’ny elatra efatra dia samy nisy tanan’olona iray avy; ary ireny tanana ireny dia nitodika ho amin’ny lafiny efatra nanaraka ny tarehy sy ny elany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nifanendry ny tendron’ny elany; ary samy nandroso ho amin’izay hitsiny avy izy, fa tsy niherika rehefa nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Samy nanana ireto tarehy ireto avy izy: tarehin’olona no teo anoloana, tarehina liona no teo ankavanana, tarehin’ombilahy no teo ankavia ary tarehina voromahery no teo ivoho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny roa amin’ireo elany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny roa amin’ireo elany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny dkt tranainy izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny roa amin’ireo tarehiny sy ireo elany.
    marker-yv: yv-n
  - type: text
    text: 'dia nitsotra miakatra ka nifanendry ny tendrony, fa ny roa kosa nanarona ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Samy nizotra tamin’izay hitsiny avy ireo zava-miaina ireo, ary nandeha tamin’izay nitondran’ny Fanahy azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’izay nitondran’ny Fanahy azy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tamin’izay niriny haleha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo 1.20).'
    marker-yv: yv-n
  - type: text
    text: ' fa tsy niherika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Teo anelanelan’ireo zava-miaina dia tazana ho nisy toy ny vainafo; ary nihetsiketsika toy ny fanilo no fijery azy. Namirapiratra ny afo, ary nisy tselatra nivoaka avy tao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo zava-miaina ireo koa dia nifanaretsaka tetsy sy teroa sady nitsoriaka toy ny varatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha nandinika ny zava-miaina efatra aho, dia nahita fa teo anilan’ny tsirairay avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'teo anilan’ny tsirairay avy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ireo dkt tranainy izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teo anilan’ny tavany tsirairay avy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'dia nisy kodiarana iray nitehika tamin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nanana endrika manjelanjelatra toy ny vatosoa ireo kodiarana. Nitovy bika izy efatra ary toa samy voarafitra ho kodiarana mifampidipiditra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Afaka mandroso ho amin’ny lafiny efatra izy nefa tsy mila mihodina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mahatahotra ny refin’ny savaivony ary rakotra taratra mamirapiratra ny manodidina azy manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa nandroso ireo zava-miaina, dia mba nandroso avy hatrany teo anilany koa ireto kodiarana; rehefa niakatra niala tamin’ny tany izy, dia mba niakatra koa ireto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nandeha tamin’izay nitondran’ny Fanahy azy izy ka nandroso niaraka taminy koa ireto kodiarana, satria ny fanoitran’ny zava-miaina no nanetsika ireo kodiarana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa isaky ny nandroso izy na nijanona na niakatra niala tamin’ny tany, dia niara-nanao fihetsika toy izany koa ireto kodiarana satria ny fanoitran’ireo zava-miaina no nanetsika azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Teo ambony lohan’ireo zava-miaina dia nisy toa andohalambo namirapiratra toy ny kristaly manjelanjelatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Teo ambanin’izany andohalambo izany no samy namelatra ny elany roa nifanitsy sy nifanendry ny zava-miaina tsirairay, fa ny elany roa sisa kosa nanaronany ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nandre ny fikopakopaky ny elany aho rehefa nanidina ireto zava-miaina, fa toy ny firohondrohon’ny ranomasina izany, sy tahaka ny feon’Andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny feon’Andriamanitra Tsitoha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia fomba fiteny enti-milaza ny varatra.
    marker-yv: yv-n
  - type: text
    text: ' na ny fireondreonan’ny tafika marobe. Rehefa nijanona kosa izy, dia nafihiny ny elany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy tao ambonin’ny andohalambo izay teo ambony lohany dia naharenesako feo ihany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tazako tao fa nisy toa sezafiandrianana miendrika vato safira; ary teo ambonin’izany toa sezafiandrianana izany, terỳ an-tampon’ny andohalambo dia nisy hoatra endrik’olombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hitako fa namirapiratra tahaka ny vy mangirana izany endrika izany, sady toa voahodidina afo. Ary teo ambony sy teo ambanin’izay hoatra ny tehezany, dia tazako nisy toy ny afo nandrakotra hazavana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny fahazavana manodidina azy dia tahaka ny an’ny avana izay mamirapiratra amin’ny andro manerika. Taratry ny voninahitry ny TOMPO izany. Nony nahita izany aho, dia nikarapoka nihohoka hatreo amin’ny tany, ary nandre feo niteny tamiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ity fisehoan’ny Tompo amin’i Ezekiela ity (1.1-28) sy ny 10.1-22 ary ny Apôk 4.1-11.
    marker-yv: yv-n
  - type: text
    text: .
