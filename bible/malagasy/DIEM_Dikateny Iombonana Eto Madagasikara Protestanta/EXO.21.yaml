document_id: EXO.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna mikasika ny mpanompo hebreo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy indray ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ireto koa ny fitsipika izay hovelabelarinao eo anatrehan’ny Israelita: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Raha mividy mpanompo hebreo ianareo, dia ho enin-taona no hanompoany anareo; fa amin’ny taona fahafito dia hivoaka ho olona afaka maimaim-poana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha tsy nanam-bady izy no tonga mpanomponareo, dia izy irery ihany no handeha; fa raha nanam-bady izy, dia handeha miaraka aminy koa ramatoa vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha ny tompony kosa no nanome vady azy ka niteraka zazalahy na zazavavy ilay ramatoa, dia hijanona ho fananan’ny tompony ilay ramatoa sy ny ankizy, fa ilay rangahy ihany no handeha. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha tàhiny kosa ilay rangahy manizingizina fa tia ny tompony sy ny vady aman-janany izy ka tsy te handeha ho olona afaka, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia hataon’ny tompony vavolombelona Andriamanitra; hankininy amin’ny varavarana na tolam-baravarana ilay rangahy, ka hotevehiny amin’ny fanjaibe ny sofiny, ary dia ho mpanompony raikitra izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hataon’ny tompony vavolombelona Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany no mety ho hevitry ny fitenenana izay azo adika ara-bakiteny hoe hoentin’ny tompony eo anatrehan’Andriamanitra izy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Raha misy olona mivarotra ny zanany vavy ho mpanompovavy, dia tsy ho afaka araka ny fepetra momba ny mpanompolahy io mpanompovavy io. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha tàhiny novidin’ny tompony mba ho vadikeliny izy kanefa tsy ankasitrahîn’ny tompony, dia havelany havotan’ny rainy: tsy manana zo hivarotra azy amin’ny hafa firenena kosa anefa ilay tompony fa famadihana azy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha mamofo azy ho vadin’ny zanany lahy kosa ilay tompony, dia hanatanteraka aminy araka izay fanao amin’ny zanakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha maka vady hafa kosa ilay tompony, dia tsy hisy hahenany na ny sakafo na ny fitafiana na ny fiaraha-mitoetra aminy hatrizay. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa raha tàhiny tsy manome fahafaham-po azy amin’ireo lafiny telo ireo izy, dia azon’ilay vehivavy atao ny mivoaka ho olona afaka maimaim-poana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hadisoana mahamendrika ho faty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: «Izay mikapoka olona ka mahafaty azy dia tsy maintsy vonoina ho faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 24.17.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saingy raha tsy niomana hamono izy fa nahafaty tsy nahy, dia hahazo mandositra any amin’ny toerana izay hotondroiko ilay nahavita izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ireo tanàna fialofana voatsiahy eto amin’ity and ity, jereo Nom 35.9-34; Deot 19.1-13; Jos 20.1-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha tàhiny kosa fanahy iniana no namonoany ilay anankiray tamin’ny fitaka, dia hosamborinareo izy ka hovonoinareo ho faty na dia mandositra eo akaikin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitarako
  - type: text
    text: ' aza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Matetika ny alitara sy ny toerana masina fahiny dia noheverina ho toy ny toerana fialofana ho an’ny olo-meloka samihafa (jereo 1 Mp 1.50-53; 2.28-34).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Izay mikapoka ny rainy na ny reniny dia tsy maintsy vonoina ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Izay maka olona an-keriny dia tsy maintsy vonoina ho faty na efa namidiny ilay olona na mbola tratra ao an-tranony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 24.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «Izay manozona ny rainy na ny reniny dia tsy maintsy vonoina ho faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 20.9; Mt 15.4; Mk 7.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vono sy ny ratra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Mety misy olona mifanditra ka ny anankiray mamely ny namany amin’ny vato na amin’ny totohondry, saingy tsy maty ilay voa fa mandamaka ao am-pandriana; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: raha afaka mitsangana indray ilay voa ka mandehandeha mitondra tehina, dia tsy hohelohina akory ilay namely, saingy handoa ny onitry ny andro tsy niasany sy hiantoka tanteraka ny fitsaboana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Raha misy olona mikapoka ny mpanompolahiny na ny mpanompovaviny amin’ny hazo ka mahafaty azy, dia tsy maintsy faizina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Kanefa raha mbola velona mandritra ny andro iray na roa ilay mpanompony, dia tsy tokony hofaizina ny tompony satria fananany ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Mety misy olona miady ka mahadona vehivavy bevohòka ary mahatonga azy ho teraka zaza tsy tonga volana; raha tsy misy fahavoazana loatra ilay vehivavy, dia haloan’ilay meloka ny onitra izay takîn’ny tompom-bady araka ny fanelanelanana nataon’ny mpitsara. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha tàhiny kosa voa mafy ilay vehivavy, dia hofaizina ilay meloka: aina solon’ny aina, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'maso solon’ny maso, nify solon’ny nify, tanana solon’ny tanana, tongotra solon’ny tongotra, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: may solon’ny may, ratra solon’ny ratra, mangana solon’ny mangana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 23-25:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 24.19-20; Deot 19.21; Mt 5.38.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '«Raha misy olona mikapoka ny mpanompolahiny na ny mpanompovaviny ka mahapotsitra ny masony, dia hanome fahafahana ho an’ilay mpanompony izy ho onitry ny masony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha nahafaka ny nifiny izy, dia hanome fahafahana ho an’ilay mpanompony ihany koa ho onitry ny nifiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '«Raha misy ombilahy manoto ka mahafaty lehilahy iray na vehivavy iray, dia hotoraham-bato ho faty izy ary tsy azo hanina ny henany; fa ny tompon’ilay ombilahy kosa dia ho afa-tsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Kanefa, raha tàhiny efa zatra manoto ilay ombilahy ary efa nampandrenesina ny tompony fa tsy nanara-maso azy, ka nahafaty lehilahy iray na vehivavy iray, dia hotoraham-bato ho faty ilay ombilahy ary hovonoina ho faty koa ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha sazîna handoa vidin’aina izy, dia tsy maintsy handoa izay vola rehetra ho fanavotana ny ainy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha manoto ka mahafaty ankizilahy na ankizivavy ny ombilahy, dia mitovy amin’ny teo ihany no fepetra ampiharina. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha manoto ka mahafaty mpanompolahy na mpanompovavy kosa ny ombilahy, dia handoa onitra volafotsy telopolo amin’ny tompon’ny mpanompo ilay tompon’omby, ary ny ombilahy kosa dia hotoraham-bato ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '«Raha misy olona manokatra lava-drano na mandavaka lava-drano nefa tsy mandrakotra azy, ka misy omby na boriky latsaka ao, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia tsy maintsy handoa vola onitra amin’ny tompom-biby ilay tompon’ny lava-drano, fa ny biby maty kosa dia ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Raha misy ombilahin’olona mandratra mahafaty ny ombilahin’ny namany, dia hamidiny ny ombilahy velona ka hozarainy ny vola vidiny, ary hozarainy toy izany koa ilay maty. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nefa kosa, raha tàhiny efa fantatra fa zatra manoto ilay ombilahy kanefa tsy nanara-maso azy ny tompony, dia hanome ombilahy velona ho solony izy, fa ilay maty kosa no ho azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hala-biby
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: «Raha misy olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny 21.37–22.30 dia mitondra ny laharana 22.1-31 ao amin’ireo dkt sasany.
    marker-yv: yv-n
  - type: text
    text: ' mangalatra omby iray, na ondry iray na osy iray ka mamono azy na mivarotra azy, dia tsy maintsy hanome omby dimy na ondry efatra, na osy efatra ho onitra ho an’ny tompony izy.'
