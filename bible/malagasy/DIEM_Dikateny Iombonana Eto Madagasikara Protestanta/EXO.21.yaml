document_id: EXO.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Lalàna mikasika ny mpanompo hebreo
  - type: text
    content: 'Dia hoy indray ny TOMPO hoe:'
  - type: text
    content: '–Ireto koa ny fitsipika izay hovelabelarinao eo anatrehan’ny Israelita: '
  '10':
  - type: text
    content: 'Raha maka vady hafa kosa ilay tompony, dia tsy hisy hahenany na ny sakafo na ny fitafiana na ny fiaraha-mitoetra aminy hatrizay. '
  '11':
  - type: text
    content: Fa raha tàhiny tsy manome fahafaham-po azy amin’ireo lafiny telo ireo izy, dia azon’ilay vehivavy atao ny mivoaka ho olona afaka maimaim-poana.
  - type: heading
    content: Ny hadisoana mahamendrika ho faty
  '12':
  - type: text
    content: «Izay mikapoka olona ka mahafaty azy dia tsy maintsy vonoina ho faty
  - type: note
    content: Jereo Lev 24.17.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Saingy raha tsy niomana hamono izy fa nahafaty tsy nahy, dia hahazo mandositra any amin’ny toerana izay hotondroiko ilay nahavita izany
  - type: note
    content: Momba ireo tanàna fialofana voatsiahy eto amin’ity and ity, jereo Nom 35.9-34; Deot 19.1-13; Jos 20.1-9.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Fa raha tàhiny kosa fanahy iniana no namonoany ilay anankiray tamin’ny fitaka, dia hosamborinareo izy ka hovonoinareo ho faty na dia mandositra eo akaikin’ny '
  - type: text
    content: alitarako
  - type: text
    content: ' aza'
  - type: note
    content: Matetika ny alitara sy ny toerana masina fahiny dia noheverina ho toy ny toerana fialofana ho an’ny olo-meloka samihafa (jereo 1 Mp 1.50-53; 2.28-34).
  - type: text
    content: .
  '15':
  - type: text
    content: «Izay mikapoka ny rainy na ny reniny dia tsy maintsy vonoina ho faty.
  '16':
  - type: text
    content: «Izay maka olona an-keriny dia tsy maintsy vonoina ho faty na efa namidiny ilay olona na mbola tratra ao an-tranony
  - type: note
    content: Jereo Deot 24.7.
  - type: text
    content: .
  '17':
  - type: text
    content: «Izay manozona ny rainy na ny reniny dia tsy maintsy vonoina ho faty
  - type: note
    content: Jereo Lev 20.9; Mt 15.4; Mk 7.10.
  - type: text
    content: .
  - type: heading
    content: Ny vono sy ny ratra
  '18':
  - type: text
    content: '«Mety misy olona mifanditra ka ny anankiray mamely ny namany amin’ny vato na amin’ny totohondry, saingy tsy maty ilay voa fa mandamaka ao am-pandriana; '
  '19':
  - type: text
    content: raha afaka mitsangana indray ilay voa ka mandehandeha mitondra tehina, dia tsy hohelohina akory ilay namely, saingy handoa ny onitry ny andro tsy niasany sy hiantoka tanteraka ny fitsaboana azy.
  '2':
  - type: text
    content: '«Raha mividy mpanompo hebreo ianareo, dia ho enin-taona no hanompoany anareo; fa amin’ny taona fahafito dia hivoaka ho olona afaka maimaim-poana izy. '
  '20':
  - type: text
    content: '«Raha misy olona mikapoka ny mpanompolahiny na ny mpanompovaviny amin’ny hazo ka mahafaty azy, dia tsy maintsy faizina izy. '
  '21':
  - type: text
    content: Kanefa raha mbola velona mandritra ny andro iray na roa ilay mpanompony, dia tsy tokony hofaizina ny tompony satria fananany ihany izy.
  '22':
  - type: text
    content: '«Mety misy olona miady ka mahadona vehivavy bevohòka ary mahatonga azy ho teraka zaza tsy tonga volana; raha tsy misy fahavoazana loatra ilay vehivavy, dia haloan’ilay meloka ny onitra izay takîn’ny tompom-bady araka ny fanelanelanana nataon’ny mpitsara. '
  '23':
  - type: text
    content: 'Raha tàhiny kosa voa mafy ilay vehivavy, dia hofaizina ilay meloka: aina solon’ny aina, '
  '24':
  - type: text
    content: 'maso solon’ny maso, nify solon’ny nify, tanana solon’ny tanana, tongotra solon’ny tongotra, '
  '25':
  - type: text
    content: may solon’ny may, ratra solon’ny ratra, mangana solon’ny mangana
  - type: note
    content: 'And 23-25: jereo Lev 24.19-20; Deot 19.21; Mt 5.38.'
  - type: text
    content: .
  '26':
  - type: text
    content: '«Raha misy olona mikapoka ny mpanompolahiny na ny mpanompovaviny ka mahapotsitra ny masony, dia hanome fahafahana ho an’ilay mpanompony izy ho onitry ny masony. '
  '27':
  - type: text
    content: Raha nahafaka ny nifiny izy, dia hanome fahafahana ho an’ilay mpanompony ihany koa ho onitry ny nifiny.
  '28':
  - type: text
    content: '«Raha misy ombilahy manoto ka mahafaty lehilahy iray na vehivavy iray, dia hotoraham-bato ho faty izy ary tsy azo hanina ny henany; fa ny tompon’ilay ombilahy kosa dia ho afa-tsiny. '
  '29':
  - type: text
    content: 'Kanefa, raha tàhiny efa zatra manoto ilay ombilahy ary efa nampandrenesina ny tompony fa tsy nanara-maso azy, ka nahafaty lehilahy iray na vehivavy iray, dia hotoraham-bato ho faty ilay ombilahy ary hovonoina ho faty koa ny tompony. '
  '3':
  - type: text
    content: 'Raha tsy nanam-bady izy no tonga mpanomponareo, dia izy irery ihany no handeha; fa raha nanam-bady izy, dia handeha miaraka aminy koa ramatoa vadiny. '
  '30':
  - type: text
    content: 'Raha sazîna handoa vidin’aina izy, dia tsy maintsy handoa izay vola rehetra ho fanavotana ny ainy. '
  '31':
  - type: text
    content: 'Raha manoto ka mahafaty ankizilahy na ankizivavy ny ombilahy, dia mitovy amin’ny teo ihany no fepetra ampiharina. '
  '32':
  - type: text
    content: Raha manoto ka mahafaty mpanompolahy na mpanompovavy kosa ny ombilahy, dia handoa onitra volafotsy telopolo amin’ny tompon’ny mpanompo ilay tompon’omby, ary ny ombilahy kosa dia hotoraham-bato ho faty.
  '33':
  - type: text
    content: '«Raha misy olona manokatra lava-drano na mandavaka lava-drano nefa tsy mandrakotra azy, ka misy omby na boriky latsaka ao, '
  '34':
  - type: text
    content: dia tsy maintsy handoa vola onitra amin’ny tompom-biby ilay tompon’ny lava-drano, fa ny biby maty kosa dia ho azy.
  '35':
  - type: text
    content: '«Raha misy ombilahin’olona mandratra mahafaty ny ombilahin’ny namany, dia hamidiny ny ombilahy velona ka hozarainy ny vola vidiny, ary hozarainy toy izany koa ilay maty. '
  '36':
  - type: text
    content: Nefa kosa, raha tàhiny efa fantatra fa zatra manoto ilay ombilahy kanefa tsy nanara-maso azy ny tompony, dia hanome ombilahy velona ho solony izy, fa ilay maty kosa no ho azy.
  - type: heading
    content: Ny hala-biby
  '37':
  - type: text
    content: «Raha misy olona
  - type: note
    content: Ny 21.37–22.30 dia mitondra ny laharana 22.1-31 ao amin’ireo dkt sasany.
  - type: text
    content: ' mangalatra omby iray, na ondry iray na osy iray ka mamono azy na mivarotra azy, dia tsy maintsy hanome omby dimy na ondry efatra, na osy efatra ho onitra ho an’ny tompony izy.'
  '4':
  - type: text
    content: 'Raha ny tompony kosa no nanome vady azy ka niteraka zazalahy na zazavavy ilay ramatoa, dia hijanona ho fananan’ny tompony ilay ramatoa sy ny ankizy, fa ilay rangahy ihany no handeha. '
  '5':
  - type: text
    content: 'Raha tàhiny kosa ilay rangahy manizingizina fa tia ny tompony sy ny vady aman-janany izy ka tsy te handeha ho olona afaka, '
  '6':
  - type: text
    content: dia hataon’ny tompony vavolombelona Andriamanitra; hankininy amin’ny varavarana na tolam-baravarana ilay rangahy, ka hotevehiny amin’ny fanjaibe ny sofiny, ary dia ho mpanompony raikitra izy
  - type: note
    content: 'hataon’ny tompony vavolombelona Andriamanitra: izany no mety ho hevitry ny fitenenana izay azo adika ara-bakiteny hoe hoentin’ny tompony eo anatrehan’Andriamanitra izy.'
  - type: text
    content: .
  '7':
  - type: text
    content: '«Raha misy olona mivarotra ny zanany vavy ho mpanompovavy, dia tsy ho afaka araka ny fepetra momba ny mpanompolahy io mpanompovavy io. '
  '8':
  - type: text
    content: 'Raha tàhiny novidin’ny tompony mba ho vadikeliny izy kanefa tsy ankasitrahîn’ny tompony, dia havelany havotan’ny rainy: tsy manana zo hivarotra azy amin’ny hafa firenena kosa anefa ilay tompony fa famadihana azy izany. '
  '9':
  - type: text
    content: 'Raha mamofo azy ho vadin’ny zanany lahy kosa ilay tompony, dia hanatanteraka aminy araka izay fanao amin’ny zanakavavy. '
