document_id: EZK.44,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voatokana ho an’ny mpanjaka ny vavahady atsinanana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia naverin-dralehilahy teo amin’ny vavahady ivelany tao atsinanan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' aho; ary nihidy io vavahady io. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Ary ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' izay nanalavitra Ahy, ka niaraka tamin’ny Israelita hafa nivily niala tamiko mba hanompo ireo sampiny, dia hizaka ny vokatry ny heloka vitany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fahadisoan’ny Levita dia noho izy nanaiky ho voatarika amin’ny fanompoan-tsampy (and 12) tamin’ireo toera-masina madinidinika izay naha mpisorona azy. Ao amin’ilay tempoly ho avy dia tsy hiandraikitra afa-tsy asa madinidinika izy ireny (jereo and 13-14).
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hanao fanompoana ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' onenako izy ka hiambina ireo vavahadin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ary hanatanteraka asa tsotsotra isan-karazany ao an-tempoly. Hisolo ny olona izy hamono ireo biby hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorona hafa ka hijoro eo anoloan’ny vahoaka mba hanompo azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Kanefa noho ireo nanelanelana ny vahoaka tamin’ny sampy sady nitarika ny Israelita hanota mihitsy aza, dia Izaho Tompo ANDRIANANAHARY no manao fianianana sy teny hentitra fa hamely azy. Eny, hizaka ny vokatry ny heloka vitany izy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ka tsy hahazo manatona Ahy hanao ny asan’ny mpisorona intsony ary tsy hahazo manakaiky ireo fanaka rehetra voatokana ho Ahy na manakaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina Indrindra
    - type: text
      text: '. Hizaka ny vokatry ny asa mahamenatra sy maharikoriko nataony izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny hany hampisahaniko azy dia ny anjara raharahany ao an-tempoly momba ireo fanompoana rehetra sy fanao rehetra ao.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika ho an’ny mpisorona
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «Ireo Levita mpisorona, taranak’i Tsadôka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Tsadôka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny naoty momba ny 40.46.
      marker-yv: yv-n
    - type: text
      text: ', dia nitandrina kosa ny anjara raharahany momba ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ' onenako, na dia nivily niala tamiko aza ny Israelita. Noho izany, dia ireo ihany no hahazo manatona hanompo Ahy Tompo sy hanolotra amiko ny sabora sy ny ran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: '; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ireo ihany no hiditra ao amin’ny Toerako masina sy hanatona ny latabatra natokana hanompoana Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.16 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny latabatra natokana hanompoana ny Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mety ho ny alitara na ny latabatra fametrahana ny mofo atolotra ho an’Andriamanitra (jereo Lev 24.5-9).
      marker-yv: yv-n
    - type: text
      text: '. Hotandremany izay nasaiko hotandremana momba izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary raha miditra ny vavahadin’ny kianja anatiny ny mpisorona, dia hitondra ny akanjo fanamiana fotsy. Tsy hitondra akanjo volonondry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fandrarana ny mpisorona tsy hitondra akanjo volonondry, izay fantatra koa teo amin’ny Kanahanita sy ny Ejiptianina, dia tsy isalasalana fa ho fitandroana ny fahadiovana (jereo and 18).
      marker-yv: yv-n
    - type: text
      text: ' eny aminy izy mandritra ny anatanterahany ny asany ao an-kianja anatiny sy ao an-tempoly. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Satroka rongony fotsy no ho eo an-dohany ary kalisaona rongony fotsy no hanaovany. Tsy hitondra zavatra mamehifehy mahatsemboka azy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary rehefa hivoaka hankany amin’ny kianja ivelany izay misy ny sarambabem-bahoaka izy, dia hoesoriny ireo fanamiana nanaovany teo am-panatanterahana ny asany ka hapetrany ao amin’ny efitrano voatokana, ary hiakanjo fitafiana hafa izy; izany no tsy hampahitany loza ny vahoaka amin’ireny fanamiany ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka ny fiheverana tranainy, ny hasina dia toy ny hery mifindra avy amin’ny andriamanitra ho amin’ny fitaovana fampiasa amin’ny fanompoam-pivavahana na amin’ny fanamiana litorjika sns... ary amin’ireo izay mikasika azy (jereo Eks 30.29). Izany hery mahatahotra izany dia mety handringana izay tsy vonona hiatrika azy araka ny fiomanana takîny (jereo 2 Sam 6.6-7).
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy ny TOMPO tamiko: «Hihidy io vavahady io ary tsy hovohana; tsy hisy olona handalo intsony eo satria Izaho TOMPO Andriamanitr’i Israely no efa niditra teo ka hihidy hatrany izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '«Tsy hanaratra ny lohany tanteraka ny mpisorona, nefa tsy hanao lava volo fa hanety azy tsara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy hisotro toaka izy alohan’ny hidirany ao amin’ny kianja anatiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny mpisorona dia tsy hanambady vehivavy maty vady na nisara-bady, fa zatovovavy israelita ihany no halainy ho vady na koa vehivavy mpitondratena navelan’ny mpisorona.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '«Ny mpisorona no hampianatra ny vahoakako hanavaka ny masina sy ny tsy masina ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izy no ho mpitsara amin’ny fifanolanana ary hamoaka didim-pitsarana araka ny lalànako. Hankalaza ny fetim-pivavahana araka ny fitsipika sy ny fepetra nataoko izy sady hanokana ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' ho Ahy.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '«Ny mpisorona dia tsy tokony handoto tena amin’ny fanatonana ny fatin’olona, afa-tsy raha fatin’ny rainy na reniny na zanany na rahalahiny na koa anabaviny tsy mbola nanambady. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary amin’ny toy izany dia hiandry fito andro aorian’ny fidiovany tena izy vao hahazo hiditra amin’ny raharahany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Amin’ny andro izay hiverenany ao an-kianja anatiny amin’ny Toeramasina, dia hanolotra sorona fanalana ny ota izy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hisy fananana ho an’ny mpisorona, dia Izaho izany; koa tsy homenareo zaratany amin’i Israely izy, fa Izaho no anjarany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny fanatitra vokatry ny tany sy ny biby natolotra ho sorona fanalana ny ota na ho sorom-panonerana no hohaniny. Ny zavatra rehetra natokana ho Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny fomba fanao amin’ny fanokanana ho an’Andriamanitra ny ampahan’ny remby azo tamin’ny ady na ny ampahan’ny harena amin’ny tany milamina, dia jereo Nom 18.14; Deot 2.34.
      marker-yv: yv-n
    - type: text
      text: ' amin’i Israely, dia ho an’ny mpisorona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nefa ny printsy filoha amin’ny maha-filoha azy dia mahazo mihinana ny sakafo masina eo anatrehako. Koa tsy maintsy hiditra sy hivoaka ity vavahady ity izy ary hamakivaky ny lalantsarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny printsy filoha: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'i Ezekiela dia miandrandra fanjakana amin’ny endrika vaovao; '
      - type: usfm
        marker: it
        children:
        - type: text
          text: printsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fa tsy mpanjaka no iantsoany an’ilay filoha. Fiandrianana manokana ny an’io printsy io fa ny zony dia voafetran’ny zon’Andriamanitra sy ny zon’ny vahoaka. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mahazo mihinana ny sakafo masina eo:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toa tao amin’ny efitra iray ao am-bavahady izany (jereo nta 40.7). Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sakafo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' resahina eto dia izay manaraka ny sorona sasany (jereo ohatra Lev 6.11-12). –Ny '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'lalantsaran’ny vavahady:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 40.7-9.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny vahiny tsy mahazo miditra ao amin’ny tempoly
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Horaisin’ny mpisorona ny santatry ny voaloham-bokatra ary izay rehetra navahana ho Ahy tamin’ny harenan’ny Israelita. Homen’ny olona azy koa ny koba lafarinina tsara indrindra mba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitahiako
    - type: text
      text: ' ny ao an-tranony. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ny mpisorona anefa dia tsy mahazo mihinana ny vorona sy ny biby maty ho azy na noviravirain’ny bibidia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 4.14 sy nta.
      marker-yv: yv-n
    - type: text
      text: .»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Avy eo dia nentin-dralehilahy niditra ny vavahady avaratra ho eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' aho. Hitako ny voninahitry ny TOMPO fa nameno ny trano; koa lavo nihohoka nitehi-tany aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy ny TOMPO tamiko: «Ry ilay taranak’olombelona, mijere amin’ny masonao sy mihainoa amin’ny sofinao ary aoka ny fonao handinika izay rehetra lazaiko anao ny amin’ny lalàna sy fitsipika rehetra momba ny tranoko. Diniho manokana ny fitsipika momba ny vavahady rehetra fidirana amin’ny tempoly sy fivoahana avy ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '«Ambarao amin’ireo Israelita maditra ireo fa izao no lazain’ny Tompo ANDRIANANAHARY: Efa tofoka amin’ny zavatra maharikoriko nataonareo Israelita Aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Amin’ny fotoana izay nanoloranareo ny anjara sakafoko, izany hoe ny sabora sy ny ra avy tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: soronareo
    - type: text
      text: ', dia nampidiranareo vahiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'vahiny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy tsy Israelita koa indraindray nampiasaina tao an-tempoly amin’ny asa ambanimbany.
      marker-yv: yv-n
    - type: text
      text: ' tsy miraiki-po amiko sady tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voafora
    - type: text
      text: ' tao amin’ny Toeramasina onenako. Nanimbazimba ny tempoliko ireo; ary nivadihanareo kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' tamin’ny zavatra maharikoriko nataonareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy niraharaha ny fanompoana Ahy tao amin’ny Toeramasina onenako ianareo, fa nanendry ireo vahiny hanao azy hisolo anareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Ny vahiny tsy miraiki-po amiko sady tsy voafora dia tsy misy hahazo miditra intsony ao amin’ny Toeramasina onenako, na dia mipetraka eo anivon’ny Israelita aza izy.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsipika ho an’ny Levita
    marker-yv: yv-h
