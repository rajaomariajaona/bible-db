document_id: EZK.44,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voatokana ho an’ny mpanjaka ny vavahady atsinanana
  - type: text
    content: 'Dia naverin-dralehilahy teo amin’ny vavahady ivelany tao atsinanan’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' aho; ary nihidy io vavahady io. '
  '10':
  - type: text
    content: '«Ary ireo '
  - type: text
    content: Levita
  - type: text
    content: ' izay nanalavitra Ahy, ka niaraka tamin’ny Israelita hafa nivily niala tamiko mba hanompo ireo sampiny, dia hizaka ny vokatry ny heloka vitany'
  - type: note
    content: Ny fahadisoan’ny Levita dia noho izy nanaiky ho voatarika amin’ny fanompoan-tsampy (and 12) tamin’ireo toera-masina madinidinika izay naha mpisorona azy. Ao amin’ilay tempoly ho avy dia tsy hiandraikitra afa-tsy asa madinidinika izy ireny (jereo and 13-14).
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Hanao fanompoana ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako izy ka hiambina ireo vavahadin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' ary hanatanteraka asa tsotsotra isan-karazany ao an-tempoly. Hisolo ny olona izy hamono ireo biby hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorona hafa ka hijoro eo anoloan’ny vahoaka mba hanompo azy. '
  '12':
  - type: text
    content: 'Kanefa noho ireo nanelanelana ny vahoaka tamin’ny sampy sady nitarika ny Israelita hanota mihitsy aza, dia Izaho Tompo ANDRIANANAHARY no manao fianianana sy teny hentitra fa hamely azy. Eny, hizaka ny vokatry ny heloka vitany izy, '
  '13':
  - type: text
    content: 'ka tsy hahazo manatona Ahy hanao ny asan’ny mpisorona intsony ary tsy hahazo manakaiky ireo fanaka rehetra voatokana ho Ahy na manakaiky ny '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: '. Hizaka ny vokatry ny asa mahamenatra sy maharikoriko nataony izy. '
  '14':
  - type: text
    content: Ny hany hampisahaniko azy dia ny anjara raharahany ao an-tempoly momba ireo fanompoana rehetra sy fanao rehetra ao.»
  - type: heading
    content: Fitsipika ho an’ny mpisorona
  '15':
  - type: text
    content: «Ireo Levita mpisorona, taranak’i Tsadôka
  - type: note
    content: 'Tsadôka: jereo ny naoty momba ny 40.46.'
  - type: text
    content: ', dia nitandrina kosa ny anjara raharahany momba ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' onenako, na dia nivily niala tamiko aza ny Israelita. Noho izany, dia ireo ihany no hahazo manatona hanompo Ahy Tompo sy hanolotra amiko ny sabora sy ny ran’ny '
  - type: text
    content: sorona
  - type: text
    content: '; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '16':
  - type: text
    content: Ireo ihany no hiditra ao amin’ny Toerako masina sy hanatona ny latabatra natokana hanompoana Ahy
  - type: note
    content: Ny latabatra natokana hanompoana ny Tompo dia mety ho ny alitara na ny latabatra fametrahana ny mofo atolotra ho an’Andriamanitra (jereo Lev 24.5-9).
  - type: text
    content: '. Hotandremany izay nasaiko hotandremana momba izany. '
  '17':
  - type: text
    content: Ary raha miditra ny vavahadin’ny kianja anatiny ny mpisorona, dia hitondra ny akanjo fanamiana fotsy. Tsy hitondra akanjo volonondry
  - type: note
    content: Ny fandrarana ny mpisorona tsy hitondra akanjo volonondry, izay fantatra koa teo amin’ny Kanahanita sy ny Ejiptianina, dia tsy isalasalana fa ho fitandroana ny fahadiovana (jereo and 18).
  - type: text
    content: ' eny aminy izy mandritra ny anatanterahany ny asany ao an-kianja anatiny sy ao an-tempoly. '
  '18':
  - type: text
    content: 'Satroka rongony fotsy no ho eo an-dohany ary kalisaona rongony fotsy no hanaovany. Tsy hitondra zavatra mamehifehy mahatsemboka azy izy. '
  '19':
  - type: text
    content: Ary rehefa hivoaka hankany amin’ny kianja ivelany izay misy ny sarambabem-bahoaka izy, dia hoesoriny ireo fanamiana nanaovany teo am-panatanterahana ny asany ka hapetrany ao amin’ny efitrano voatokana, ary hiakanjo fitafiana hafa izy; izany no tsy hampahitany loza ny vahoaka amin’ireny fanamiany ireny
  - type: note
    content: Araka ny fiheverana tranainy, ny hasina dia toy ny hery mifindra avy amin’ny andriamanitra ho amin’ny fitaovana fampiasa amin’ny fanompoam-pivavahana na amin’ny fanamiana litorjika sns... ary amin’ireo izay mikasika azy (jereo Eks 30.29). Izany hery mahatahotra izany dia mety handringana izay tsy vonona hiatrika azy araka ny fiomanana takîny (jereo 2 Sam 6.6-7).
  - type: text
    content: .
  '2':
  - type: text
    content: 'Dia hoy ny TOMPO tamiko: «Hihidy io vavahady io ary tsy hovohana; tsy hisy olona handalo intsony eo satria Izaho TOMPO Andriamanitr’i Israely no efa niditra teo ka hihidy hatrany izy. '
  '20':
  - type: text
    content: '«Tsy hanaratra ny lohany tanteraka ny mpisorona, nefa tsy hanao lava volo fa hanety azy tsara. '
  '21':
  - type: text
    content: 'Tsy hisotro toaka izy alohan’ny hidirany ao amin’ny kianja anatiny. '
  '22':
  - type: text
    content: Ny mpisorona dia tsy hanambady vehivavy maty vady na nisara-bady, fa zatovovavy israelita ihany no halainy ho vady na koa vehivavy mpitondratena navelan’ny mpisorona.
  '23':
  - type: text
    content: '«Ny mpisorona no hampianatra ny vahoakako hanavaka ny masina sy ny tsy masina ary ny '
  - type: text
    content: madio
  - type: text
    content: ' sy ny '
  - type: text
    content: maloto
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Izy no ho mpitsara amin’ny fifanolanana ary hamoaka didim-pitsarana araka ny lalànako. Hankalaza ny fetim-pivavahana araka ny fitsipika sy ny fepetra nataoko izy sady hanokana ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ho Ahy.'
  '25':
  - type: text
    content: '«Ny mpisorona dia tsy tokony handoto tena amin’ny fanatonana ny fatin’olona, afa-tsy raha fatin’ny rainy na reniny na zanany na rahalahiny na koa anabaviny tsy mbola nanambady. '
  '26':
  - type: text
    content: 'Ary amin’ny toy izany dia hiandry fito andro aorian’ny fidiovany tena izy vao hahazo hiditra amin’ny raharahany. '
  '27':
  - type: text
    content: 'Amin’ny andro izay hiverenany ao an-kianja anatiny amin’ny Toeramasina, dia hanolotra sorona fanalana ny ota izy; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '28':
  - type: text
    content: 'Hisy fananana ho an’ny mpisorona, dia Izaho izany; koa tsy homenareo zaratany amin’i Israely izy, fa Izaho no anjarany. '
  '29':
  - type: text
    content: Ny fanatitra vokatry ny tany sy ny biby natolotra ho sorona fanalana ny ota na ho sorom-panonerana no hohaniny. Ny zavatra rehetra natokana ho Ahy
  - type: note
    content: Momba ny fomba fanao amin’ny fanokanana ho an’Andriamanitra ny ampahan’ny remby azo tamin’ny ady na ny ampahan’ny harena amin’ny tany milamina, dia jereo Nom 18.14; Deot 2.34.
  - type: text
    content: ' amin’i Israely, dia ho an’ny mpisorona. '
  '3':
  - type: text
    content: Nefa ny printsy filoha amin’ny maha-filoha azy dia mahazo mihinana ny sakafo masina eo anatrehako. Koa tsy maintsy hiditra sy hivoaka ity vavahady ity izy ary hamakivaky ny lalantsarany
  - type: note
    content: 'ny printsy filoha: i Ezekiela dia miandrandra fanjakana amin’ny endrika vaovao; printsy fa tsy mpanjaka no iantsoany an’ilay filoha. Fiandrianana manokana ny an’io printsy io fa ny zony dia voafetran’ny zon’Andriamanitra sy ny zon’ny vahoaka. –mahazo mihinana ny sakafo masina eo: toa tao amin’ny efitra iray ao am-bavahady izany (jereo nta 40.7). Ny sakafo resahina eto dia izay manaraka ny sorona sasany (jereo ohatra Lev 6.11-12). –Ny lalantsaran’ny vavahady: jereo 40.7-9.'
  - type: text
    content: .»
  - type: heading
    content: Ny vahiny tsy mahazo miditra ao amin’ny tempoly
  '30':
  - type: text
    content: 'Horaisin’ny mpisorona ny santatry ny voaloham-bokatra ary izay rehetra navahana ho Ahy tamin’ny harenan’ny Israelita. Homen’ny olona azy koa ny koba lafarinina tsara indrindra mba '
  - type: text
    content: hitahiako
  - type: text
    content: ' ny ao an-tranony. '
  '31':
  - type: text
    content: Ny mpisorona anefa dia tsy mahazo mihinana ny vorona sy ny biby maty ho azy na noviravirain’ny bibidia
  - type: note
    content: Jereo 4.14 sy nta.
  - type: text
    content: .»
  '4':
  - type: text
    content: 'Avy eo dia nentin-dralehilahy niditra ny vavahady avaratra ho eo anoloan’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' aho. Hitako ny voninahitry ny TOMPO fa nameno ny trano; koa lavo nihohoka nitehi-tany aho. '
  '5':
  - type: text
    content: 'Ary hoy ny TOMPO tamiko: «Ry ilay taranak’olombelona, mijere amin’ny masonao sy mihainoa amin’ny sofinao ary aoka ny fonao handinika izay rehetra lazaiko anao ny amin’ny lalàna sy fitsipika rehetra momba ny tranoko. Diniho manokana ny fitsipika momba ny vavahady rehetra fidirana amin’ny tempoly sy fivoahana avy ao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: .
  '6':
  - type: text
    content: '«Ambarao amin’ireo Israelita maditra ireo fa izao no lazain’ny Tompo ANDRIANANAHARY: Efa tofoka amin’ny zavatra maharikoriko nataonareo Israelita Aho. '
  '7':
  - type: text
    content: 'Amin’ny fotoana izay nanoloranareo ny anjara sakafoko, izany hoe ny sabora sy ny ra avy tamin’ny '
  - type: text
    content: soronareo
  - type: text
    content: ', dia nampidiranareo vahiny'
  - type: note
    content: 'vahiny: misy tsy Israelita koa indraindray nampiasaina tao an-tempoly amin’ny asa ambanimbany.'
  - type: text
    content: ' tsy miraiki-po amiko sady tsy '
  - type: text
    content: voafora
  - type: text
    content: ' tao amin’ny Toeramasina onenako. Nanimbazimba ny tempoliko ireo; ary nivadihanareo kosa ny '
  - type: text
    content: fanekempihavanako
  - type: text
    content: ' tamin’ny zavatra maharikoriko nataonareo. '
  '8':
  - type: text
    content: Tsy niraharaha ny fanompoana Ahy tao amin’ny Toeramasina onenako ianareo, fa nanendry ireo vahiny hanao azy hisolo anareo.
  '9':
  - type: text
    content: '«Koa izao no lazain’ny Tompo ANDRIANANAHARY: Ny vahiny tsy miraiki-po amiko sady tsy voafora dia tsy misy hahazo miditra intsony ao amin’ny Toeramasina onenako, na dia mipetraka eo anivon’ny Israelita aza izy.»'
  - type: heading
    content: Fitsipika ho an’ny Levita
