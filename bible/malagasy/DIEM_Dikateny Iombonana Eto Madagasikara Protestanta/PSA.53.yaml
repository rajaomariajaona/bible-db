document_id: PSA.53,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ny mpivavaka sy ilay Andriamaniny, eo anivon’ny fahalovan’izao tontolo izao
  - type: heading
    content: (Jereo Sal 14)
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hohiraina amin’ny fomba fihira malahelohelo. Tononkalo fananarana nataon’i Davida.
  '2':
  - type: text
    content: 'Adala izay miteny anakampo hoe:'
  - type: text
    content: «Tsy misy Andriamanitra
  - type: note
    content: Jereo Sal 14.1 sy nta.
  - type: text
    content: '!»'
  - type: text
    content: Maneho toetra lo sy maharikoriko ireo
  - type: text
    content: sady tsy mba misy manao ny tsara.
  '3':
  - type: text
    content: Avy eny an-danitra eny Andriamanitra
  - type: text
    content: no miondrika hijery ny olombelona,
  - type: text
    content: hizaha sao mba misy olon-kendry
  - type: text
    content: izay mitady Azy tokoa.
  '4':
  - type: text
    content: Fa Izy rehetra no mania,
  - type: text
    content: ka samy tsy valahara avokoa;
  - type: text
    content: tsy mba misy manao ny tsara,
  - type: text
    content: na dia iray akory aza
  - type: note
    content: Ny and 2b-4 eto dia tsiahivina ao amin’ny Rm 3.10-12.
  - type: text
    content: '!'
  '5':
  - type: text
    content: 'Hoy kosa Andriamanitra hoe:'
  - type: text
    content: «Tena tsy mahalala mihitsy
  - type: text
    content: ny mpanao ratsy rehetra
  - type: text
    content: fa fitsentsefana ny vahoakako
  - type: text
    content: no ataony foto-pivelomana
  - type: text
    content: sady Izaho tsy antsoiny akory!»
  '6':
  - type: text
    content: Indreo matahotra dia matahotra ireny
  - type: text
    content: amin’ny tsy tokony hatahorany akory,
  - type: text
    content: satria efa naelin’Andriamanitra
  - type: text
    content: ny taolan’ny tsy mpivavaka.
  - type: text
    content: Ho menatra tokoa izy ireo
  - type: text
    content: satria efa narian’Andriamanitra.
  '7':
  - type: text
    content: 'Hivoaka avy ao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' anie'
  - type: text
    content: ny famonjena an’i Israely,
  - type: text
    content: ka hifaly sy hiravo ny taranak’i Jakôba,
  - type: text
    content: dia ny vahoaka Israely tsivakivolo,
  - type: text
    content: rehefa hambinin’Andriamanitra indray izy
  - type: note
    content: Jereo Sal 126.4.
  - type: text
    content: '!'
