document_id: JER.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vahoaka nivadika ny fanekempihavanana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no hafatra avy amin’ny TOMPO nampitondraina an’i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Hajaonareo ny tenin’ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' ity! Hitenenanao kosa, ry Jeremià, ny olon’i Joda sy ny mponin’i Jerosalema '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka hilazanao hoe: «Izao no lazain’ny TOMPO, Andriamanitr’i Israely: Voaozona ny olona izay tsy manaja ny tenin’ity fanekempihavanana ity, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay nandidiako ny razanareo. Fony izy navoakako avy tany Ejipta, avy tao amin’ny memy fandrendreham-by, no nilazako hoe: Henoy ny feoko, ka araho izay rehetra andidiako anareo; dia ho vahoakako ianareo, ary Izaho kosa ho Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izany no hitanako ny fianianana izay nataoko tamin’ny razanareo, dia ny hanome azy ny tany tondra-dronono sy tantely izay misy anareo ankehitriny.»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novaliako hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny tokoa, ry TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy indray ny TOMPO tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Antsoy any an-tanànan’i Joda sy eny an-dalamben’i Jerosalema izao hafatra rehetra izao hoe: «Hajaonareo ny tenin’ity fanekempihavanana izay nampanaoviko anareo ity, ary araho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nananatra mafy ny razanareo aho hatramin’ny andro izay nampiakarako azy hiala tany Ejipta ary manao izany mandraka androany; eny, nananatra tsy an-kiato aho milaza hoe: henoinareo izay lazaiko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa tsy nihaino na niraharaha akory izy fa samy nikiry tamin’ny ditram-pony mahatsiravina ka nampiharako ny teny rehetra tao amin’ity fanekempihavanana ity, satria tsy nanaraka izay nodidiako harahiny izy.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa ny TOMPO tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Misy tetika fikomiana hita ao amin’ny olon’i Joda sy ny mponin’i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Niverina amin’ny fahadisoan’ireo razany taloha izay tsy mety nihaino ny teniko izy, ka lasa nanaraka andriamani-kafa mba hanompo azy. Nivadika tamin’ny fanekempihavanana izay nataoko tamin’ny razany ny olon’i Israely sy ny olon’i Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain’ny TOMPO: «Indro Aho hahatonga loza aminy ka tsy ho azony ialana. Raha miantso vonjy amiko izy, dia tsy hihaino azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia handeha hitaraina any amin’ireo andriamanitra izay nandoroany ditin-kazo manitra ny mponina amin’ny tanànan’i Joda sy i Jerosalema nefa tsy hahavonjy azy mihitsy ireny rehefa hiharan’ny loza izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa araka ny isan’ny tanànany no isan’ireo andriamanitr’i Joda; ary araka ny isan’ny lalamben’i Jerosalema no isan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' naorinareo mba handoroana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' ho an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ', ilay henatrareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ianao, ry Jeremià, aza mivavaka amiko ho an’ity vahoaka ity intsony na manandratra fitarainana na fifonana ho azy; satria rehefa hiharan’ny loza izy, ka hiantso vonjy amiko ianao, dia tsy hihaino Aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Israely, hazo ôlivan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy ny TOMPO hoe: «Ilay vahoaka malalako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia manao zavatra tsy amin-kitsim-po.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona moa no ataony atỳ an-tranoko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa ny voady sy ny sorona ataony amiko ve
- type: usfm
  marker: q1
  children:
  - type: text
    text: hampandositra ny loza hiala aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahafahany mihodivitra tsy ho azony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt Grika.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy io dia nataoko hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Hazo ôliva maitso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy voany mahafinaritra».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo ao anatin’ny kotaba lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: no andrehetako afo handoro ny raviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary dia hotapatapahina ny rantsany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny TOMPOn’izao rehetra izao no namboly azy; fa ankehitriny Izy dia manambara ny loza hamelezana azy noho ny ratsy nataon’ny olon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' sy ny olon’i Joda taminy. Nanao izay nampahasosotra Azy manko ireny tamin’ny nandoroany fanatitra ho an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fianakavian’i Jeremià ihany no nandrahona azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nampahafantarin’ny TOMPO aho ka mahalala, ary nasehony ahy ankehitriny ny fanaon’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa toy ny zanakondry bonaika nentina hovonoina aho ka tsy nahalala ny tetika nataony hamelezana ahy. Hoy ireo hoe: «Andeha hosimbantsika ny hazo ao anatin’ny fitsiriany; aoka hofongorantsika hiala amin’ny tanin’ny velona izy, ka tsy hotsarovana intsony ny anarany.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa Ianao, ry TOMPOn’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitsara ara-drariny, ka mamantatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny ao an’eritreritra sy ao am-po
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 17.10; 20.12; Sal 7.10; Apôk 2.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho hitako hanafay azy Ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nankiniko taminao ny adiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa izao no lazain’ny TOMPO hamelezana ny mponin’i Hanatôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hanatôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna niavian’i Jeremià; jereo 1.1; 32.7.
    marker-yv: yv-n
  - type: text
    text: ' izay nitady hamono ahy ka nanao tamiko hoe: «Aza '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maminany
  - type: text
    text: ' amin’ny anaran’ny TOMPO, fandrao ho fatin’ny tananay ianao.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eny, izao no lazain’ny TOMPOn’izao rehetra izao ny amin’ny mponin’i Hanatôta: «Hirotsaka an-tsehatra hamely azy Aho: ho fatin-tsabatra ny tovolahiny, ary ho faty mosary ny zanany lahy sy vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy hisy sisa velona amin’ny mponin’i Hanatôta amin’ny taona hirotsahako an-tsehatra hamely azy ka handefasako loza aminy.
