document_id: JER.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vahoaka nivadika ny fanekempihavanana
  - type: text
    content: 'Izao no hafatra avy amin’ny TOMPO nampitondraina an’i Jeremià:'
  '10':
  - type: text
    content: Niverina amin’ny fahadisoan’ireo razany taloha izay tsy mety nihaino ny teniko izy, ka lasa nanaraka andriamani-kafa mba hanompo azy. Nivadika tamin’ny fanekempihavanana izay nataoko tamin’ny razany ny olon’i Israely sy ny olon’i Joda.
  '11':
  - type: text
    content: 'Koa izao no lazain’ny TOMPO: «Indro Aho hahatonga loza aminy ka tsy ho azony ialana. Raha miantso vonjy amiko izy, dia tsy hihaino azy Aho. '
  '12':
  - type: text
    content: 'Dia handeha hitaraina any amin’ireo andriamanitra izay nandoroany ditin-kazo manitra ny mponina amin’ny tanànan’i Joda sy i Jerosalema nefa tsy hahavonjy azy mihitsy ireny rehefa hiharan’ny loza izy. '
  '13':
  - type: text
    content: 'Fa araka ny isan’ny tanànany no isan’ireo andriamanitr’i Joda; ary araka ny isan’ny lalamben’i Jerosalema no isan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' naorinareo mba handoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: ', ilay henatrareo.» '
  '14':
  - type: text
    content: Ary ianao, ry Jeremià, aza mivavaka amiko ho an’ity vahoaka ity intsony na manandratra fitarainana na fifonana ho azy; satria rehefa hiharan’ny loza izy, ka hiantso vonjy amiko ianao, dia tsy hihaino Aho.
  - type: heading
    content: I Israely, hazo ôlivan’ny Tompo
  '15':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Ilay vahoaka malalako'
  - type: text
    content: dia manao zavatra tsy amin-kitsim-po.
  - type: text
    content: Inona moa no ataony atỳ an-tranoko?
  - type: text
    content: Moa ny voady sy ny sorona ataony amiko ve
  - type: text
    content: hampandositra ny loza hiala aminy
  - type: text
    content: ka hahafahany mihodivitra tsy ho azony
  - type: note
    content: araka ny dkt Grika.
  - type: text
    content: '?'
  '16':
  - type: text
    content: Izy io dia nataoko hoe
  - type: text
    content: «Hazo ôliva maitso,
  - type: text
    content: misy voany mahafinaritra».
  - type: text
    content: Kanjo ao anatin’ny kotaba lehibe
  - type: text
    content: no andrehetako afo handoro ny raviny;
  - type: text
    content: ary dia hotapatapahina ny rantsany.
  '17':
  - type: text
    content: 'Ny TOMPOn’izao rehetra izao no namboly azy; fa ankehitriny Izy dia manambara ny loza hamelezana azy noho ny ratsy nataon’ny olon’i '
  - type: text
    content: Israely
  - type: text
    content: ' sy ny olon’i Joda taminy. Nanao izay nampahasosotra Azy manko ireny tamin’ny nandoroany fanatitra ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: .
  - type: heading
    content: Ny fianakavian’i Jeremià ihany no nandrahona azy
  '18':
  - type: text
    content: 'Nampahafantarin’ny TOMPO aho ka mahalala, ary nasehony ahy ankehitriny ny fanaon’ireo. '
  '19':
  - type: text
    content: 'Fa toy ny zanakondry bonaika nentina hovonoina aho ka tsy nahalala ny tetika nataony hamelezana ahy. Hoy ireo hoe: «Andeha hosimbantsika ny hazo ao anatin’ny fitsiriany; aoka hofongorantsika hiala amin’ny tanin’ny velona izy, ka tsy hotsarovana intsony ny anarany.»'
  '2':
  - type: text
    content: '–Hajaonareo ny tenin’ity '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' ity! Hitenenanao kosa, ry Jeremià, ny olon’i Joda sy ny mponin’i Jerosalema '
  '20':
  - type: text
    content: Nefa Ianao, ry TOMPOn’izao rehetra izao,
  - type: text
    content: dia mitsara ara-drariny, ka mamantatra
  - type: text
    content: ny ao an’eritreritra sy ao am-po
  - type: note
    content: Jereo 17.10; 20.12; Sal 7.10; Apôk 2.23.
  - type: text
    content: .
  - type: text
    content: Ho hitako hanafay azy Ianao,
  - type: text
    content: satria nankiniko taminao ny adiko.
  '21':
  - type: text
    content: Koa izao no lazain’ny TOMPO hamelezana ny mponin’i Hanatôta
  - type: note
    content: 'Hanatôta: tanàna niavian’i Jeremià; jereo 1.1; 32.7.'
  - type: text
    content: ' izay nitady hamono ahy ka nanao tamiko hoe: «Aza '
  - type: text
    content: maminany
  - type: text
    content: ' amin’ny anaran’ny TOMPO, fandrao ho fatin’ny tananay ianao.» '
  '22':
  - type: text
    content: 'Eny, izao no lazain’ny TOMPOn’izao rehetra izao ny amin’ny mponin’i Hanatôta: «Hirotsaka an-tsehatra hamely azy Aho: ho fatin-tsabatra ny tovolahiny, ary ho faty mosary ny zanany lahy sy vavy. '
  '23':
  - type: text
    content: Tsy hisy sisa velona amin’ny mponin’i Hanatôta amin’ny taona hirotsahako an-tsehatra hamely azy ka handefasako loza aminy.
  '3':
  - type: text
    content: 'ka hilazanao hoe: «Izao no lazain’ny TOMPO, Andriamanitr’i Israely: Voaozona ny olona izay tsy manaja ny tenin’ity fanekempihavanana ity, '
  '4':
  - type: text
    content: 'izay nandidiako ny razanareo. Fony izy navoakako avy tany Ejipta, avy tao amin’ny memy fandrendreham-by, no nilazako hoe: Henoy ny feoko, ka araho izay rehetra andidiako anareo; dia ho vahoakako ianareo, ary Izaho kosa ho Andriamanitrareo. '
  '5':
  - type: text
    content: Izany no hitanako ny fianianana izay nataoko tamin’ny razanareo, dia ny hanome azy ny tany tondra-dronono sy tantely izay misy anareo ankehitriny.»
  - type: text
    content: 'Dia novaliako hoe:'
  - type: text
    content: –Eny tokoa, ry TOMPO.
  '6':
  - type: text
    content: 'Fa hoy indray ny TOMPO tamiko:'
  - type: text
    content: '–Antsoy any an-tanànan’i Joda sy eny an-dalamben’i Jerosalema izao hafatra rehetra izao hoe: «Hajaonareo ny tenin’ity fanekempihavanana izay nampanaoviko anareo ity, ary araho. '
  '7':
  - type: text
    content: 'Fa nananatra mafy ny razanareo aho hatramin’ny andro izay nampiakarako azy hiala tany Ejipta ary manao izany mandraka androany; eny, nananatra tsy an-kiato aho milaza hoe: henoinareo izay lazaiko. '
  '8':
  - type: text
    content: Nefa tsy nihaino na niraharaha akory izy fa samy nikiry tamin’ny ditram-pony mahatsiravina ka nampiharako ny teny rehetra tao amin’ity fanekempihavanana ity, satria tsy nanaraka izay nodidiako harahiny izy.»
  '9':
  - type: text
    content: 'Ary hoy koa ny TOMPO tamiko:'
  - type: text
    content: '–Misy tetika fikomiana hita ao amin’ny olon’i Joda sy ny mponin’i Jerosalema. '
