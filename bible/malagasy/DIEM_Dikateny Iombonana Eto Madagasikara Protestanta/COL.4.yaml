document_id: COL.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ianareo tompo, ento araka ny rariny sy ny hitsiny ny mpanomponareo; satria fantatrareo fa ianareo koa mba manana Tompo any an-danitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatrafatra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahareta amin’ny fivavahana, ka miambena amin’izany ombàn’ny fisaorana an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mivavaha koa ho anay, mba hataon’Andriamanitra afaka malalaka mitory ny teniny izahay, ka hanambara ny tsiambaratelo momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. Fa ny fitoriana izany tsiambaratelo izany indrindra no mahavoafonja ahy izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mivavaha àry mba hanambaràko izany mazava tsara, araka izay tokony hoteneniko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Manàna fitondrantena feno fahendrena eo anoloan’izay tsy kristianina, ka hararaoty ny fotoana azo anaovan-tsoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho mahatehotia sy mahasoa mandrakariva ny teny ataonareo, dia ho fantatrareo izay tokony havalinareo ny olona tsirairay avy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I Tisiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tisiko: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 20.4; Ef 21.22.
    marker-yv: yv-n
  - type: text
    text: ' hava-malalantsika, mpandraharaha mahatoky sady namana mpiray fanompoana amiko eo amin’ny asan’ny Tompo, dia hampahafantatra anareo ny vaovao rehetra momba ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany indrindra no nandefasako azy atỳ aminareo, mba hahafantaranareo ny momba anay sy hampahery fo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miaraka aminy koa i Ônesimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ônesimo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Fm 10.15.
    marker-yv: yv-n
  - type: text
    text: ', ilay hava-malala sy mahatoky avy atỳ aminareo; ka dia izy roa lahy no hampahafantatra anareo ny toe-javatra rehetra atỳ aminay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Manao veloma anareo i Aristarka izay miara-voafonja amiko. Manao veloma anareo i Marka (zanak’olo-mpiray tampo izy sy i Barnabà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Aristarka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 19.29; 27.2. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Marka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 12.12, 25; 13.13; 15.37-39. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Barnabà:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 9.27; 11.22, 30; sns.'
    marker-yv: yv-n
  - type: text
    text: '); efa nahazo hafatrafatra momba an’i Marka ianareo, ka raiso tsara izy raha tonga atỳ aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manao veloma anareo koa i Jesoa, ilay atao hoe Josta. Izy telo lahy ireo no Jiosy tonga kristianina izay miara-miasa amiko hampandroso ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: ', ka nanjary fampaherezana ho ahy tokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manao veloma anareo i Epafrà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Epafrà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.7.
    marker-yv: yv-n
  - type: text
    text: ', izay avy atỳ aminareo; io mpanompon’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa io dia mikely aina mandrakariva mivavaka ho anareo, mba hijoroanareo ho olona matotra ary vonona tanteraka hanao izay rehetra sitrak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vavolombelona aho ny aminy fa misahirana fatratra izy ho anareo sy ho an-dry zareo any Laôdisia ary ho an-dry zareo any Hierapôly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Laôdisia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sy i '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hierapôly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tanàna roa samy akaikin’i Kôlôsy, ao amin’ny lohasaha tondrahan’ny renirano atao hoe Lisy.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manao veloma anareo i Lioka, ilay dokotera hava-malalantsika, sy i Demasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lioka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Tim 4.11; Fm 24. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Demasy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 2 Tim 4.10; Fm 24.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Veloma any amin’ireo havana any Laôdisia; ary veloma any amin’i Nimfà sy ny Fiangonana mivory ao an-tranony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Nimfà... ao an-tranony '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(mpisolo anarana manondro vehivavy): misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nimfà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (anaran-dehilahy) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '...ao an-tranony.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (mpisolo anarana manondro lehilahy); tsy misy mihitsy, ankoatra izany, fomba hafa ahalalana ilay olona.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rehefa voavaky eto aminareo ity taratasy ity, dia ataovy izay hamakiana azy koa any amin’ny Fiangonan’i Laôdisia; ary dia mba vakionareo kosa ilay taratasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Very io '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taratasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' io, raha tsy hoe ilay taratasy «ho an’ny kristianina tany Efeso» angamba araka ny fiheveran’ny mpandinika sasany (jereo Ef 1.1 sy nta).'
    marker-yv: yv-n
  - type: text
    text: ' avy any Laôdisia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lazao amin’i Arkipo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Arkipo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Fm 2.
    marker-yv: yv-n
  - type: text
    text: ' fa tsy maintsy hotontosainy tsara ny fandraharahana noraisiny ho fanompoana ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Soratanako ireto teny ireto: veloma, hoy i Paoly. Tsarovy fa voafonja aho.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Homba anareo anie ny fahasoavan’Andriamanitra!
