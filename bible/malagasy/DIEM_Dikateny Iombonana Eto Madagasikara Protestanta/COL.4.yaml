document_id: COL.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ianareo tompo, ento araka ny rariny sy ny hitsiny ny mpanomponareo; satria fantatrareo fa ianareo koa mba manana Tompo any an-danitra.
  - type: heading
    content: Hafatrafatra
  '10':
  - type: text
    content: Manao veloma anareo i Aristarka izay miara-voafonja amiko. Manao veloma anareo i Marka (zanak’olo-mpiray tampo izy sy i Barnabà
  - type: note
    content: 'Aristarka: jereo Asa 19.29; 27.2. –Marka: jereo Asa 12.12, 25; 13.13; 15.37-39. –Barnabà: jereo Asa 9.27; 11.22, 30; sns.'
  - type: text
    content: '); efa nahazo hafatrafatra momba an’i Marka ianareo, ka raiso tsara izy raha tonga atỳ aminareo. '
  '11':
  - type: text
    content: 'Manao veloma anareo koa i Jesoa, ilay atao hoe Josta. Izy telo lahy ireo no Jiosy tonga kristianina izay miara-miasa amiko hampandroso ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ', ka nanjary fampaherezana ho ahy tokoa.'
  '12':
  - type: text
    content: Manao veloma anareo i Epafrà
  - type: note
    content: 'Epafrà: jereo 1.7.'
  - type: text
    content: ', izay avy atỳ aminareo; io mpanompon’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa io dia mikely aina mandrakariva mivavaka ho anareo, mba hijoroanareo ho olona matotra ary vonona tanteraka hanao izay rehetra sitrak’Andriamanitra. '
  '13':
  - type: text
    content: Vavolombelona aho ny aminy fa misahirana fatratra izy ho anareo sy ho an-dry zareo any Laôdisia ary ho an-dry zareo any Hierapôly
  - type: note
    content: I Laôdisia sy i Hierapôly dia tanàna roa samy akaikin’i Kôlôsy, ao amin’ny lohasaha tondrahan’ny renirano atao hoe Lisy.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Manao veloma anareo i Lioka, ilay dokotera hava-malalantsika, sy i Demasy
  - type: note
    content: 'Lioka: jereo 2Tim 4.11; Fm 24. –Demasy: jereo 2 Tim 4.10; Fm 24.'
  - type: text
    content: .
  '15':
  - type: text
    content: Veloma any amin’ireo havana any Laôdisia; ary veloma any amin’i Nimfà sy ny Fiangonana mivory ao an-tranony
  - type: note
    content: 'Nimfà... ao an-tranony (mpisolo anarana manondro vehivavy): misy stf sasany ahitana hoe Nimfà (anaran-dehilahy) ...ao an-tranony. (mpisolo anarana manondro lehilahy); tsy misy mihitsy, ankoatra izany, fomba hafa ahalalana ilay olona.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Rehefa voavaky eto aminareo ity taratasy ity, dia ataovy izay hamakiana azy koa any amin’ny Fiangonan’i Laôdisia; ary dia mba vakionareo kosa ilay taratasy
  - type: note
    content: Very io taratasy io, raha tsy hoe ilay taratasy «ho an’ny kristianina tany Efeso» angamba araka ny fiheveran’ny mpandinika sasany (jereo Ef 1.1 sy nta).
  - type: text
    content: ' avy any Laôdisia. '
  '17':
  - type: text
    content: Lazao amin’i Arkipo
  - type: note
    content: 'Arkipo: jereo Fm 2.'
  - type: text
    content: ' fa tsy maintsy hotontosainy tsara ny fandraharahana noraisiny ho fanompoana ny Tompo. '
  '18':
  - type: text
    content: 'Soratanako ireto teny ireto: veloma, hoy i Paoly. Tsarovy fa voafonja aho.'
  - type: text
    content: Homba anareo anie ny fahasoavan’Andriamanitra!
  '2':
  - type: text
    content: 'Mahareta amin’ny fivavahana, ka miambena amin’izany ombàn’ny fisaorana an’Andriamanitra. '
  '3':
  - type: text
    content: 'Mivavaha koa ho anay, mba hataon’Andriamanitra afaka malalaka mitory ny teniny izahay, ka hanambara ny tsiambaratelo momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: '. Fa ny fitoriana izany tsiambaratelo izany indrindra no mahavoafonja ahy izao. '
  '4':
  - type: text
    content: Mivavaha àry mba hanambaràko izany mazava tsara, araka izay tokony hoteneniko.
  '5':
  - type: text
    content: 'Manàna fitondrantena feno fahendrena eo anoloan’izay tsy kristianina, ka hararaoty ny fotoana azo anaovan-tsoa. '
  '6':
  - type: text
    content: Aoka ho mahatehotia sy mahasoa mandrakariva ny teny ataonareo, dia ho fantatrareo izay tokony havalinareo ny olona tsirairay avy.
  - type: heading
    content: Fanaovam-beloma
  '7':
  - type: text
    content: I Tisiko
  - type: note
    content: 'Tisiko: jereo Asa 20.4; Ef 21.22.'
  - type: text
    content: ' hava-malalantsika, mpandraharaha mahatoky sady namana mpiray fanompoana amiko eo amin’ny asan’ny Tompo, dia hampahafantatra anareo ny vaovao rehetra momba ahy. '
  '8':
  - type: text
    content: 'Izany indrindra no nandefasako azy atỳ aminareo, mba hahafantaranareo ny momba anay sy hampahery fo anareo. '
  '9':
  - type: text
    content: Miaraka aminy koa i Ônesimo
  - type: note
    content: 'Ônesimo: jereo Fm 10.15.'
  - type: text
    content: ', ilay hava-malala sy mahatoky avy atỳ aminareo; ka dia izy roa lahy no hampahafantatra anareo ny toe-javatra rehetra atỳ aminay.'
