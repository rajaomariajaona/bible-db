document_id: 2CH.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Notafihin’ny Môabita sy ny Hamônita ny fanjakàn’i Joda
  - type: heading
    content: Vavak’i Jôsafata
  - type: text
    content: Taorian’izay, dia avy hiady tamin’i Jôsafata ny Môabita sy ny Hamônita mbamin’ny Mehonita
  - type: note
    content: 'Mehonita: firenena toa niorim-ponenana tao atsimon’i Edôma.'
  - type: text
    content: ' sasany. '
  '10':
  - type: text
    content: Ankehitriny, indreo ny Hamônita sy ny Môabita ary koa ny Edômita avy any an-tendrombohitra Sehîra. Fony niala tany Ejipta ny Israelita razanay, dia tsy navelanao hanafika azy, ka nivily lalana
  - type: note
    content: Jereo Nom 20.14-21; Deot 2.4-9.
  - type: text
    content: ' fa tsy nandringana azy; '
  '11':
  - type: text
    content: 'kanefa indreo izy namaly ratsy anay ka avy handroaka anay amin’ny tany nomenao ho fanananay. '
  '12':
  - type: text
    content: Ry Andriamanitray ô, tsy hanafay azy ireo va Ianao? Izahay manko tsy manan-kery hanoherana izany tafika goavana avy hamely anay izany, ka tsy hitanay izay hatao; fa Ianao kosa no andrandrain’ny masonay.
  '13':
  - type: text
    content: Ny Jodeanina rehetra, mbamin’ny vadiny aman-janany koa, dia samy nitsangana nivavaka teo anatrehan’ny TOMPO.
  - type: heading
    content: Nomen’ny Tompo fandresena ireo Jodeanina
  '14':
  - type: text
    content: 'Teo anivon’izany vahoaka tafangona izany i Jahaziela, '
  - type: text
    content: levita
  - type: text
    content: ' zanakalahin’i Zakarià sy zafin’i Benaià sy zafiafin’i Jehiela ary zafindohalik’i Matanià sady anisan’ny taranak’i Asafa, dia voatsindrin’ny Fanahin’ny TOMPO, '
  '15':
  - type: text
    content: 'ka niteny hoe:'
  - type: text
    content: '–Mihainoa tsara ianareo, ry Joda iray manontolo sy ry mponin’i Jerosalema, ary indrindra ianao, ry Jôsafata mpanjaka. Izao no lazain’ny TOMPO aminareo: «Aza matahotra na mivadi-po ny amin’io tafika goavana io, fa tsy anareo ny ady, fa Ahy Andriamanitrareo. '
  '16':
  - type: text
    content: Rahampitso dia midîna hiady amin’ny fahavalonareo izay miakatra amin’ny fiakarana Hatsitsa izao. Ianareo kosa hahita azy eo amin’ny faran’ny lohasahan-driaka tandrifin’ny taniefitr’i Jeroela
  - type: note
    content: 'fiakarana Hatsitsa, taniefitr’i Jeroela: toerana tsy fantatra mazava ny misy azy; kanefa toa ao anatin’ny faritr’i Tekôa (jereo and 20), izay 25 km eo ho eo ao atsimon’i Jerosalema. Voninkazo no dikan’ny voambolana hebreo hoe «Hatsitsa».'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Ry mponin’i Joda sy i Jerosalema, tsy ianareo anefa no hiady amin’ity; mijanòna tsara fotsiny, fa ho hitanareo ny hamonjen’ny TOMPO anareo. Aza matahotra na mivadi-po; rahampitso dia miaingà hifanehatra amin’io tafika io, fa ny TOMPO no hiaraka aminareo
  - type: note
    content: 'And 15-17: ampit Deot 20.1-4.'
  - type: text
    content: .»
  '18':
  - type: text
    content: 'Dia niankohoka tamin’ny tany i Jôsafata; ary ny Jodeanina rehetra sy ny mponin’i Jerosalema koa dia niankohoka teo anatrehan’ny TOMPO mba hitsaoka AZY. '
  '19':
  - type: text
    content: Nitsangana kosa ny levita, anisan’ny tarika kehatita sy kôrahita, mba hidera ny TOMPO Andriamanitr’i Israely, tamin’ny feo mafy tokoa.
  '2':
  - type: text
    content: 'Ary nisy olona tonga nanambara tamin’i Jôsafata hoe:'
  - type: text
    content: –Indreo misy tafika goavana avy any atsinanan’ny Ranomasina Maty sy avy any amin’ny faritr’i Edôma ho tonga hiady aminao; ary indreo izy ao Hatsetsôna-Tamara, izany hoe Haîna-Gedỳ
  - type: note
    content: I Haîna-Gedỳ (izany hoe «Loharanon’ny Osikely») dia teo amin’ny morontsiraky ny Ranomasina Maty, lafiny andrefana.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Nifoha maraina koa ireto Jodeanina sy mponin’i Jerosalema ny ampitso, dia niainga nankany amin’ny taniefitr’i Tekôa. Teo am-piaingàny, dia nitsangana i Jôsafata ka nanao hoe:'
  - type: text
    content: '–Mihainoa ahy ianareo, ry Jodeanina sy ry mponin’i Jerosalema. Matokia ny TOMPO Andriamanitrareo, dia tsy ho voahozongozona ianareo; matokia ny '
  - type: text
    content: mpaminaniny
  - type: text
    content: ', dia handresy ianareo!'
  '21':
  - type: text
    content: 'Rehefa niara-nidinika tamin’ny vahoaka i Jôsafata, dia nanendry mpihira hialoha ny tafika, ka hanao fanamiana masina sady hidera ny TOMPO hanao hoe: «Miderà ny TOMPO ianareo; eny, maharitra mandrakizay ny fitiavany!»'
  '22':
  - type: text
    content: 'Raha vao nanomboka nihoby sy nidera ireo mpihira, dia nataon’ny Tompo nisy fifanjevoana teo amin’ny Hamônita sy Môabita ary Edômita izay tonga hanafika ny Jodeanina, ka dia nifamely ireo. '
  '23':
  - type: text
    content: 'Nitsangana ny Hamônita sy Môabita hamely ny Edômita, ka namono nahafaty sy nandringana azy; ary nony voaringan’izy roa tonta ny Edômita, dia izy samy izy kosa avy eo no nifandringana. '
  '24':
  - type: text
    content: 'Rehefa tonga teo amin’ilay toerana fitazanana ny taniefitra ireto Jodeanina, dia nijery ity tafika goavana; ka indreo faty niampatrampatra tamin’ny tany no hitany, fa tsy nisy afa-nandositra. '
  '25':
  - type: text
    content: Dia nandeha nandroba azy i Jôsafata sy ny vahoakany, ka betsaka tokoa ny biby fiompy sy harena ary fitafiana
  - type: note
    content: 'fitafiana: araka ny rijan-teny grika izany; fa ny RM kosa manao hoe faty.'
  - type: text
    content: sy fanaka sarobidy hitany. Be loatra ny remby ka na dia nandany telo andro hanangonana aza izy ireo, dia tsy nahazaka azy rehetra.
  '26':
  - type: text
    content: Tamin’ny andro fahefatra dia nivory tao amin’ny Lohasaha Berakà
  - type: note
    content: 'Lohasaha Berakà: toerana eo andrefan’i Tekôa; ny anarana Berakà dia avy amin’ny matoanteny hebreo voadika manaraka eo hoe «nisaorany».'
  - type: text
    content: ' izy. Tao no nisaorany ny TOMPO, ka izany no niantsoana io toerana io hoe Lohasaha Berakà mandraka androany. '
  '27':
  - type: text
    content: 'Ny mponin’i Jerosalema sy ny Jodeanina hafa rehetra izay teo ambany fitarihan’i Jôsafata dia niainga hiverina any Jerosalema indray tamim-pifaliana, satria ny TOMPO efa nampifaly azy fony nafahany tamin’ny fahavalony. '
  '28':
  - type: text
    content: Dia tonga tany Jerosalema izy nombàn’ny feom-baliha sy lokanga ary trompetra, ka nankao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: .
  '29':
  - type: text
    content: 'Ary azon’ny tahotra an’Andriamanitra ny fanjakana rehetra manodidina, rehefa nandre fa ny TOMPO no niady tamin’ny fahavalon’i Israely. '
  '3':
  - type: text
    content: 'Dia natahotra i Jôsafata ka nanapa-kevitra hanontany ny TOMPO sady niantso andro '
  - type: text
    content: fifadian-kanina
  - type: text
    content: ' manerana an’i Joda manontolo. '
  '30':
  - type: text
    content: Dia nandry feizay ny fanjakàn’i Jôsafata, satria nomen’Andriamanitra fiadanana tamin’ny sisin-tany manodidina izy.
  - type: heading
    content: Fiafaràn’ny nanjakàn’i Jôsafata
  - type: heading
    content: (Jereo 1 Mp 22.41-51)
  '31':
  - type: text
    content: 'Nanjaka tamin’i Joda i Jôsafata; feno 35 taona izy fony tonga mpanjaka, ary naharitra 25 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Hazobà zanakavavin’i Silehỳ. '
  '32':
  - type: text
    content: 'Nanaraka ny toetran’i Asà rainy izy, ka tsy niala tamin’izany fa nanao izay mahitsy eo imason’ny TOMPO. '
  '33':
  - type: text
    content: 'Kanefa ny toeram-panasinana tsy voafongotra, hany ka tsy mbola niraiki-po mafy tamin’ilay Andriamanitry ny razany ny vahoaka. '
  '34':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôsafata, na tamboalohany na tafara, dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’i Jehò zanakalahin’i Hananỳ
  - type: note
    content: Efa very izany boky izany fa tsy ananantsika intsony.
  - type: text
    content: ', izay nakambana tamin’ny '
  - type: text
    content: Bokin’ireo mpanjakan’i Israely.
  '35':
  - type: text
    content: 'Taorian’izany, i Jôsafata mpanjakan’i Joda dia nifarimbona tamin’i Ahazià mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ', izay ratsy fitondrantena. '
  '36':
  - type: text
    content: Nifarimbona tamin’i Ahazià hanamboatra sambo vaventy izy; ka tao Hetsiôny-Gebera
  - type: note
    content: 'Hetsiôny-Gebera: jereo 8.17.'
  - type: text
    content: ' no nanamboarany azy. '
  '37':
  - type: text
    content: 'Kanefa i Elihezera '
  - type: text
    content: mpaminany
  - type: text
    content: ', zanakalahin’i Dôdià avy any Maresà, dia naminany ny amin’i Jôsafata hoe:'
  - type: text
    content: –Noho ny nifarimbonanao tamin’i Ahazià dia horavan’ny TOMPO ireo fitaovana vitanao.
  - type: text
    content: Dia nisy fahavakiana tokoa ireo sambo ka tsy afaka nanainga akory.
  '4':
  - type: text
    content: 'Dia niangona ny Jodeanina rehetra hangata-bonjy amin’ny TOMPO; eny, avy tamin’ny tanànan’i Joda rehetra no niaingany hanao izany. '
  '5':
  - type: text
    content: Voahodidin’ny mponin’i Joda sy i Jerosalema tafangona i Jôsafata no nijoro tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', teo anoloan’ilay kianja vaovao, '
  '6':
  - type: text
    content: 'ka nivavaka nanao hoe:'
  - type: text
    content: –Ry TOMPO Andriamanitry ny razanay ô, Ianao tokoa no Andriamanitra any an-
  - type: text
    content: danitra
  - type: text
    content: '. Ianao no mifehy ny fanjakana rehetra eo amin’ny firenena isan-tokony, ary eo an-tananao ny hery amam-pahefana ka tsy misy mahatohitra Anao. '
  '7':
  - type: text
    content: Ry Andriamanitray ô, Ianao no nandroaka ny mponina tamin’ity tany ity hiala teo anoloan’i Israely vahoakanao ka nanome mandrakizay an’izany ho an’ny taranak’i Abrahama sakaizanao
  - type: note
    content: Jereo Is 41.8; Jak 2.23.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary nonina teto izy ka nanorina '
  - type: text
    content: Toeramasina
  - type: text
    content: ' ho an’ny anaranao sady niteny hoe: '
  '9':
  - type: text
    content: «Raha manjo anay ny loza, na ady na famaizana na areti-mandringana na mosary, ka hijoro manatrika ity tempoly ity izahay, fa ny anaranao no amin’ity trano ity, ary hiantso vonjy aminao noho ny fahorianay, dia hihaino Ianao ka hamonjy
  - type: note
    content: Jereo 6.28-31.
  - type: text
    content: '.» '
