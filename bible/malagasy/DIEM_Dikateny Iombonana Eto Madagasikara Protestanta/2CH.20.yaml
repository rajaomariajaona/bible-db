document_id: 2CH.20,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Notafihin’ny Môabita sy ny Hamônita ny fanjakàn’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavak’i Jôsafata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Taorian’izay, dia avy hiady tamin’i Jôsafata ny Môabita sy ny Hamônita mbamin’ny Mehonita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mehonita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: firenena toa niorim-ponenana tao atsimon’i Edôma.
      marker-yv: yv-n
    - type: text
      text: ' sasany. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ankehitriny, indreo ny Hamônita sy ny Môabita ary koa ny Edômita avy any an-tendrombohitra Sehîra. Fony niala tany Ejipta ny Israelita razanay, dia tsy navelanao hanafika azy, ka nivily lalana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 20.14-21; Deot 2.4-9.
      marker-yv: yv-n
    - type: text
      text: ' fa tsy nandringana azy; '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'kanefa indreo izy namaly ratsy anay ka avy handroaka anay amin’ny tany nomenao ho fanananay. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ry Andriamanitray ô, tsy hanafay azy ireo va Ianao? Izahay manko tsy manan-kery hanoherana izany tafika goavana avy hamely anay izany, ka tsy hitanay izay hatao; fa Ianao kosa no andrandrain’ny masonay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny Jodeanina rehetra, mbamin’ny vadiny aman-janany koa, dia samy nitsangana nivavaka teo anatrehan’ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nomen’ny Tompo fandresena ireo Jodeanina
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Teo anivon’izany vahoaka tafangona izany i Jahaziela, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' zanakalahin’i Zakarià sy zafin’i Benaià sy zafiafin’i Jehiela ary zafindohalik’i Matanià sady anisan’ny taranak’i Asafa, dia voatsindrin’ny Fanahin’ny TOMPO, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihainoa tsara ianareo, ry Joda iray manontolo sy ry mponin’i Jerosalema, ary indrindra ianao, ry Jôsafata mpanjaka. Izao no lazain’ny TOMPO aminareo: «Aza matahotra na mivadi-po ny amin’io tafika goavana io, fa tsy anareo ny ady, fa Ahy Andriamanitrareo. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rahampitso dia midîna hiady amin’ny fahavalonareo izay miakatra amin’ny fiakarana Hatsitsa izao. Ianareo kosa hahita azy eo amin’ny faran’ny lohasahan-driaka tandrifin’ny taniefitr’i Jeroela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: fiakarana Hatsitsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'taniefitr’i Jeroela:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava ny misy azy; kanefa toa ao anatin’ny faritr’i Tekôa (jereo and 20), izay 25 km eo ho eo ao atsimon’i Jerosalema. Voninkazo no dikan’ny voambolana hebreo hoe «Hatsitsa».
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ry mponin’i Joda sy i Jerosalema, tsy ianareo anefa no hiady amin’ity; mijanòna tsara fotsiny, fa ho hitanareo ny hamonjen’ny TOMPO anareo. Aza matahotra na mivadi-po; rahampitso dia miaingà hifanehatra amin’io tafika io, fa ny TOMPO no hiaraka aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 15-17:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Deot 20.1-4.
      marker-yv: yv-n
    - type: text
      text: .»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia niankohoka tamin’ny tany i Jôsafata; ary ny Jodeanina rehetra sy ny mponin’i Jerosalema koa dia niankohoka teo anatrehan’ny TOMPO mba hitsaoka AZY. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nitsangana kosa ny levita, anisan’ny tarika kehatita sy kôrahita, mba hidera ny TOMPO Andriamanitr’i Israely, tamin’ny feo mafy tokoa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy olona tonga nanambara tamin’i Jôsafata hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indreo misy tafika goavana avy any atsinanan’ny Ranomasina Maty sy avy any amin’ny faritr’i Edôma ho tonga hiady aminao; ary indreo izy ao Hatsetsôna-Tamara, izany hoe Haîna-Gedỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Haîna-Gedỳ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (izany hoe «Loharanon’ny Osikely») dia teo amin’ny morontsiraky ny Ranomasina Maty, lafiny andrefana.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nifoha maraina koa ireto Jodeanina sy mponin’i Jerosalema ny ampitso, dia niainga nankany amin’ny taniefitr’i Tekôa. Teo am-piaingàny, dia nitsangana i Jôsafata ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mihainoa ahy ianareo, ry Jodeanina sy ry mponin’i Jerosalema. Matokia ny TOMPO Andriamanitrareo, dia tsy ho voahozongozona ianareo; matokia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminaniny
    - type: text
      text: ', dia handresy ianareo!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Rehefa niara-nidinika tamin’ny vahoaka i Jôsafata, dia nanendry mpihira hialoha ny tafika, ka hanao fanamiana masina sady hidera ny TOMPO hanao hoe: «Miderà ny TOMPO ianareo; eny, maharitra mandrakizay ny fitiavany!»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha vao nanomboka nihoby sy nidera ireo mpihira, dia nataon’ny Tompo nisy fifanjevoana teo amin’ny Hamônita sy Môabita ary Edômita izay tonga hanafika ny Jodeanina, ka dia nifamely ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nitsangana ny Hamônita sy Môabita hamely ny Edômita, ka namono nahafaty sy nandringana azy; ary nony voaringan’izy roa tonta ny Edômita, dia izy samy izy kosa avy eo no nifandringana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Rehefa tonga teo amin’ilay toerana fitazanana ny taniefitra ireto Jodeanina, dia nijery ity tafika goavana; ka indreo faty niampatrampatra tamin’ny tany no hitany, fa tsy nisy afa-nandositra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia nandeha nandroba azy i Jôsafata sy ny vahoakany, ka betsaka tokoa ny biby fiompy sy harena ary fitafiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fitafiana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny rijan-teny grika izany; fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: faty
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: sy fanaka sarobidy hitany. Be loatra ny remby ka na dia nandany telo andro hanangonana aza izy ireo, dia tsy nahazaka azy rehetra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Tamin’ny andro fahefatra dia nivory tao amin’ny Lohasaha Berakà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lohasaha Berakà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toerana eo andrefan’i Tekôa; ny anarana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Berakà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia avy amin’ny matoanteny hebreo voadika manaraka eo hoe «nisaorany».'
      marker-yv: yv-n
    - type: text
      text: ' izy. Tao no nisaorany ny TOMPO, ka izany no niantsoana io toerana io hoe Lohasaha Berakà mandraka androany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ny mponin’i Jerosalema sy ny Jodeanina hafa rehetra izay teo ambany fitarihan’i Jôsafata dia niainga hiverina any Jerosalema indray tamim-pifaliana, satria ny TOMPO efa nampifaly azy fony nafahany tamin’ny fahavalony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia tonga tany Jerosalema izy nombàn’ny feom-baliha sy lokanga ary trompetra, ka nankao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary azon’ny tahotra an’Andriamanitra ny fanjakana rehetra manodidina, rehefa nandre fa ny TOMPO no niady tamin’ny fahavalon’i Israely. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia natahotra i Jôsafata ka nanapa-kevitra hanontany ny TOMPO sady niantso andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fifadian-kanina
    - type: text
      text: ' manerana an’i Joda manontolo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nandry feizay ny fanjakàn’i Jôsafata, satria nomen’Andriamanitra fiadanana tamin’ny sisin-tany manodidina izy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiafaràn’ny nanjakàn’i Jôsafata
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 22.41-51)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nanjaka tamin’i Joda i Jôsafata; feno 35 taona izy fony tonga mpanjaka, ary naharitra 25 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia i Hazobà zanakavavin’i Silehỳ. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nanaraka ny toetran’i Asà rainy izy, ka tsy niala tamin’izany fa nanao izay mahitsy eo imason’ny TOMPO. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Kanefa ny toeram-panasinana tsy voafongotra, hany ka tsy mbola niraiki-po mafy tamin’ilay Andriamanitry ny razany ny vahoaka. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Jôsafata, na tamboalohany na tafara, dia voasoratra ao amin’ny boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’i Jehò zanakalahin’i Hananỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efa very izany boky izany fa tsy ananantsika intsony.
      marker-yv: yv-n
    - type: text
      text: ', izay nakambana tamin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bokin’ireo mpanjakan’i Israely.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Taorian’izany, i Jôsafata mpanjakan’i Joda dia nifarimbona tamin’i Ahazià mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ', izay ratsy fitondrantena. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Nifarimbona tamin’i Ahazià hanamboatra sambo vaventy izy; ka tao Hetsiôny-Gebera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hetsiôny-Gebera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 8.17.
      marker-yv: yv-n
    - type: text
      text: ' no nanamboarany azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Kanefa i Elihezera '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', zanakalahin’i Dôdià avy any Maresà, dia naminany ny amin’i Jôsafata hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Noho ny nifarimbonanao tamin’i Ahazià dia horavan’ny TOMPO ireo fitaovana vitanao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy fahavakiana tokoa ireo sambo ka tsy afaka nanainga akory.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia niangona ny Jodeanina rehetra hangata-bonjy amin’ny TOMPO; eny, avy tamin’ny tanànan’i Joda rehetra no niaingany hanao izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voahodidin’ny mponin’i Joda sy i Jerosalema tafangona i Jôsafata no nijoro tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ', teo anoloan’ilay kianja vaovao, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ka nivavaka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry TOMPO Andriamanitry ny razanay ô, Ianao tokoa no Andriamanitra any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: danitra
    - type: text
      text: '. Ianao no mifehy ny fanjakana rehetra eo amin’ny firenena isan-tokony, ary eo an-tananao ny hery amam-pahefana ka tsy misy mahatohitra Anao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ry Andriamanitray ô, Ianao no nandroaka ny mponina tamin’ity tany ity hiala teo anoloan’i Israely vahoakanao ka nanome mandrakizay an’izany ho an’ny taranak’i Abrahama sakaizanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 41.8; Jak 2.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
