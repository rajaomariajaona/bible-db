  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa ny amboadia hiara-mipetraka amin’ny zanak’ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny leôparda hiara-mandry amin’ny zanak’osy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny zanak’omby sy ny liona tanora hiara-mihinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka zazalahy kely no hitarika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny ombivavy sy ny orsavavy hiara-miraoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zanak’izy ireo hiara-matory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihinam-bilona toy ny omby ny liona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zaza mbola minono
- type: usfm
  marker: q1
  children:
  - type: text
    text: hilalao eo an-davaky ny bibilava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny zaza misara-nono
- type: usfm
  marker: q1
  children:
  - type: text
    text: hanatsofoka ny tanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao an-davaky ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hisy hanimba na handratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: manerana ny tendrombohitra masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny fahalalana ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hanenika izany tany izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny anaronan’ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fanambanin’ny ranomasina
  - type: usfm
    marker: f
    children:
