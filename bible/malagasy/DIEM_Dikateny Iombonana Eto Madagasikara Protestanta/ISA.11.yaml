  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hisy lalana ho an’ny sisa velona amin’ny vahoakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay sisa velona avy any Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka izay niseho fahiny tamin’i Israely
- type: usfm
  marker: q1
