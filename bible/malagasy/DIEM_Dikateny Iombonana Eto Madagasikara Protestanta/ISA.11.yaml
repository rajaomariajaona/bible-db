    children:
    - type: text
      text: '10'
  - type: text
    text: Amin’izany andro izany ny solofon’i Jisay
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia hatsangana ho fanevan’ny firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitady azy ny firenen-kafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 5.12.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanjary be voninahitra ny fonenany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ireo voasesitany
  marker-yv: yv-h
- type: usfm
  marker: q1
