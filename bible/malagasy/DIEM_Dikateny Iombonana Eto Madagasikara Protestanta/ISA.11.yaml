    - type: usfm
      marker: ft
      children:
      - type: text
        text: rain’i Davida (1 Sam 16.18-19); jereo Apôk 5.5; 22.16.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: misy solofo mipoitra avy amin’ny fakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny Fanahin’ny TOMPO no mitoetra eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Fanahy manome fahendrena sy fahaiza-manavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanahy mahay mamolavola sy manatanteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanahy ahalalana sy anajana ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary io no hanoro azy ny fanajana ny TOMPO.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitsara araka ny ivelany fotsiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na hanapaka araka izay ren’ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa hitsara ny malahelo ara-drariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hamoaka didy araka ny hitsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho an’ny mahantra eo amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny teniny no toy ny tsorakazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: hikapohany ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fofonain’ny vavany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hamonoany ny olon-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
