document_id: ISA.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay mpanjakan’ny fiadanana sy ny fanjakany
  - type: text
    content: Misy rantsana misandrahaka avy amin’ny fototr’i Jisay
  - type: note
    content: 'Jisay: rain’i Davida (1 Sam 16.18-19); jereo Apôk 5.5; 22.16.'
  - type: text
    content: ;
  - type: text
    content: misy solofo mipoitra avy amin’ny fakany.
  '10':
  - type: text
    content: Amin’izany andro izany ny solofon’i Jisay
  - type: text
    content: dia hatsangana ho fanevan’ny firenena rehetra;
  - type: text
    content: ka hitady azy ny firenen-kafa
  - type: note
    content: Jereo Rm 5.12.
  - type: text
    content: ','
  - type: text
    content: ary hanjary be voninahitra ny fonenany.
  - type: heading
    content: Ny fiverenan’ireo voasesitany
  '11':
  - type: text
    content: Amin’izany andro izany ny Tompo
  - type: text
    content: dia haninjitra ny tanany indray
  - type: note
    content: Haninjitra ny tanany indray ny Tompo tahaka ny efa nataony fahiny tamin’ny fampialana ny Israelita tany Ejipta.
  - type: text
    content: mba hanavotra izay sisa velona amin’ny vahoakany,
  - type: text
    content: dia izay sisa velona avy any Asiria,
  - type: text
    content: avy any Ejipta ambany sy ambony ary avy any Etiôpia,
  - type: text
    content: avy any Helama sy Babilônia ary avy any Hamata
  - type: text
    content: na avy amin’ireo tany amoron-dranomasina.
  '12':
  - type: text
    content: Hanangana faneva ny Tompo
  - type: text
    content: mba hahafantaran’ny hafa firenena
  - type: text
    content: fa hamory ireo sesitany tamin’i Israely Izy
  - type: text
    content: ary hanangona ireo niely patrana tamin’i Joda
  - type: text
    content: avy any amin’ny vazan-tany efatra.
  '13':
  - type: text
    content: Hitsahatra ny fialonan’i Efraîma
  - type: text
    content: 'ary ho foana ny fankahalàn’i Joda:'
  - type: text
    content: i Efraîma tsy hialona an’i Joda intsony
  - type: text
    content: ary i Joda tsy hankahala an’i Efraîma intsony
  - type: note
    content: I Efraîma (jereo 7.2 sy nta) dia matetika ao amin’ny Test.Tal. no anondroana ny fanjakan’i Israely na ny fanjakana Avaratra.
  - type: text
    content: .
  '14':
  - type: text
    content: Dia hiara-kirohotra hiankandrefana
  - type: text
    content: eny amin’ny havoan’ny Filistinina izy roa tonta
  - type: text
    content: ary handeha hiantsinanana
  - type: text
    content: handroba ny foko any an-taniefitra,
  - type: text
    content: ka hanitatra ny fahefàny amin’i Edôma sy i Môaba
  - type: text
    content: ary hametraka ny Hamônita ho eo ambany fifehezany
  - type: note
    content: Ny Edômita sy ny Môabita ary ny Hamônita dia firenena mifanila amin’i Israely ary nampaneken’i Davida fahizany (jereo 2 Sam 8.12).
  - type: text
    content: .
  '15':
  - type: text
    content: Handritra ny helo-dranomasin’i Ejipta ny TOMPO;
  - type: text
    content: haninji-tanana handrahona ny ony Eofrata Izy,
  - type: text
    content: ka ny rivo-mahery avy aminy no hizaràny azy
  - type: text
    content: hisampantsampana ho sakeli-drano fito
  - type: text
    content: izay ho azo diavin-tongotra
  - type: note
    content: 'ny rivo-mahery avy aminy: misy fahatsiahivana ny Eks 14.21; 15.8. –izay ho azo...kapa: jereo Eks 14.22,29; Apôk 16.12.'
  - type: text
    content: ' tsy miala kapa.'
  '16':
  - type: text
    content: Hisy lalana ho an’ny sisa velona amin’ny vahoakany,
  - type: text
    content: dia izay sisa velona avy any Asiria,
  - type: text
    content: tahaka izay niseho fahiny tamin’i Israely
  - type: text
    content: fony izy niakatra avy tany Ejipta.
  '2':
  - type: text
    content: Ny Fanahin’ny TOMPO no mitoetra eo aminy,
  - type: text
    content: dia Fanahy manome fahendrena sy fahaiza-manavaka
  - type: text
    content: Fanahy mahay mamolavola sy manatanteraka,
  - type: text
    content: Fanahy ahalalana sy anajana ny TOMPO;
  '3':
  - type: text
    content: ary io no hanoro azy ny fanajana ny TOMPO.
  - type: text
    content: Tsy hitsara araka ny ivelany fotsiny izy
  - type: text
    content: na hanapaka araka izay ren’ny sofiny,
  '4':
  - type: text
    content: fa hitsara ny malahelo ara-drariny
  - type: text
    content: ary hamoaka didy araka ny hitsiny
  - type: text
    content: ho an’ny mahantra eo amin’ny tany.
  - type: text
    content: Ny teniny no toy ny tsorakazo
  - type: text
    content: hikapohany ny tany
  - type: text
    content: ary ny fofonain’ny vavany
  - type: text
    content: no hamonoany ny olon-dratsy
  - type: note
    content: Jereo 2Tes 2.8.
  - type: text
    content: .
  '5':
  - type: text
    content: Ny rariny no ho fisikinany
  - type: text
    content: ary ny toetra hentitra no ho fehikibony
  - type: note
    content: Jereo Ef 6.4.
  - type: text
    content: .
  '6':
  - type: text
    content: Koa ny amboadia hiara-mipetraka amin’ny zanak’ondry,
  - type: text
    content: ny leôparda hiara-mandry amin’ny zanak’osy;
  - type: text
    content: ny zanak’omby sy ny liona tanora hiara-mihinana
  - type: text
    content: ka zazalahy kely no hitarika azy.
  '7':
  - type: text
    content: Ny ombivavy sy ny orsavavy hiara-miraoka;
  - type: text
    content: ary ny zanak’izy ireo hiara-matory.
  - type: text
    content: Hihinam-bilona toy ny omby ny liona.
  '8':
  - type: text
    content: Ny zaza mbola minono
  - type: text
    content: hilalao eo an-davaky ny bibilava;
  - type: text
    content: ary ny zaza misara-nono
  - type: text
    content: hanatsofoka ny tanany
  - type: text
    content: ao an-davaky ny menarana.
  '9':
  - type: text
    content: Tsy hisy hanimba na handratra
  - type: text
    content: manerana ny tendrombohitra masina,
  - type: text
    content: satria ny fahalalana ny TOMPO
  - type: text
    content: no hanenika izany tany izany
  - type: text
    content: tahaka ny anaronan’ny rano
  - type: text
    content: ny fanambanin’ny ranomasina
  - type: note
    content: 'And 6-9: jereo Is 65.25. –And 9: jereo Hab 2.14.'
  - type: text
    content: .
