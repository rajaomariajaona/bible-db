  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny rariny no ho fisikinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toetra hentitra no ho fehikibony
  - type: usfm
    marker: f
    children:
