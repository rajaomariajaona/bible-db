  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Handritra ny helo-dranomasin’i Ejipta ny TOMPO;
- type: usfm
  marker: q1
  children:
  - type: text
    text: haninji-tanana handrahona ny ony Eofrata Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny rivo-mahery avy aminy no hizaràny azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisampantsampana ho sakeli-drano fito
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay ho azo diavin-tongotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny rivo-mahery avy aminy: '
    - type: usfm
      marker: ft
      children:
