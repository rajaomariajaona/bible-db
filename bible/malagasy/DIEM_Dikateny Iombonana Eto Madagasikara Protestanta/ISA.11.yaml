    - type: text
      text: '11'
  - type: text
    text: Amin’izany andro izany ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia haninjitra ny tanany indray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Haninjitra ny tanany indray '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny Tompo tahaka ny efa nataony fahiny tamin’ny fampialana ny Israelita tany Ejipta.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanavotra izay sisa velona amin’ny vahoakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izay sisa velona avy any Asiria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any Ejipta ambany sy ambony ary avy any Etiôpia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any Helama sy Babilônia ary avy any Hamata
- type: usfm
  marker: q1
  children:
  - type: text
    text: na avy amin’ireo tany amoron-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hanangana faneva ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahafantaran’ny hafa firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa hamory ireo sesitany tamin’i Israely Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hanangona ireo niely patrana tamin’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy any amin’ny vazan-tany efatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hitsahatra ny fialonan’i Efraîma
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ho foana ny fankahalàn’i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: i Efraîma tsy hialona an’i Joda intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary i Joda tsy hankahala an’i Efraîma intsony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Efraîma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (jereo 7.2 sy nta) dia matetika ao amin’ny Test.Tal. no anondroana ny fanjakan’i Israely na ny fanjakana Avaratra.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hiara-kirohotra hiankandrefana
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny havoan’ny Filistinina izy roa tonta
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary handeha hiantsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: handroba ny foko any an-taniefitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hanitatra ny fahefàny amin’i Edôma sy i Môaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hametraka ny Hamônita ho eo ambany fifehezany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny Edômita sy ny Môabita ary ny Hamônita dia firenena mifanila amin’i Israely ary nampaneken’i Davida fahizany (jereo 2 Sam 8.12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
