document_id: JDG.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny valifaty nataon’i Samsôna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nony afaka andro vitsivitsy, tamin’ny fotoam-pijinjana varimbazaha, dia nandeha nitsidika ny vadiny i Samsôna, ka nitondra zanak’osy ho azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nanao mariazy i Samsôna, kanefa mariazy karazan’ilay mbola mijanona any an-tranon-drainy ihany ilay vehivavy. Tsy mandoa vodiondry ny mpampakatra; fa rehefa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mitsidika ny vadiny iny
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dia mitondra fanomezana ho azy.'
      marker-yv: yv-n
    - type: text
      text: '. Ary nangataka izy mba hahazo hiditra ao amin’ny efitrano misy ny vadiny, fa nolavin’ny rafozan-dahiny '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nanontany azy ny vatan-dehilahy tao Joda hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no niakatra hanafika anay ianareo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novalian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mba hamatotra an’i Samsôna ka hanao aminy araka izay nataony taminay.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nandeha nankany amin’ny tsefatsefak’ilay harambato tao Hetama ny vatan-dehilahy andiany telo tamin’ny fokon’i Joda ka niteny tamin’i Samsôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Moa tsy fantatrao ve fa ny Filistinina no manjaka amintsika? Koa inona izao nataonao taminay izao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Araka izay nataony tamiko no nataoko taminy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa hoy kosa ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tonga izahay mba hamatotra anao ary hanolotra anao amin’ny Filistinina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Samsôna taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mianiàna amiko àry fa tsy hamono ahy ianareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia namaly azy indray ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy manam-pikasana hamono anao izahay fa ny hamatotra anao fotsiny mba hatolotray ny Filistinina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nafatotr’ireo tamin’ny mahazaka roa vaovao i Samsôna ary nentiny niala tao an-dava-bato. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nony tonga tao Lehỳ izy, dia nitsena azy tamin’ny horakora-pandresena ny Filistinina. Tamin’izay kosa no nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka nivaha mora foana toy ny tady rongony main’ny afo ireo tady mahazaka namatorana ny sandriny sy ny tanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nahita valanoranom-boriky iray vao novonoina i Samsôna; ary noraisiny izany ka namonoany ho faty arivo lahy tamin’ny Filistinina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy i Samsôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Valanoranom-boriky no nahafatesako arivo lahy, valanoranom-boriky no nampivangongoako ireo faty.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Rehefa izany, dia natsipiny terỳ ilay valanoranom-boriky teny an-tanany; izany no niantsoana io toerana io hoe Ramata-Lehỳ na Havoanan’ny Valanorano. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nahatsiaro nangetaheta mafy i Samsôna ka niantso vonjy tamin’ny TOMPO nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ianao no nanome ahy izao fandresena lehibe izao; koa ankehitriny ve dia havelanao ho fatin-ketaheta aho, ka ho latsaka eo an-tanan’ireo tsy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mifora
    - type: text
      text: ' ireo?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia notresahin’Andriamanitra ny vatolampy holoka tao Lehỳ ka nampiboiboika rano; dia nisotro i Samsôna ka nody indray ny heriny. Izany loharano izany dia nantsoina hoe Haîna-Kôrà na loharanon’ilay niantso vonjy, ary mbola ao mandraka androany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Noheveriko ho tsy tianao intsony izy, ka dia nomeko an’ilay tovolahy namanao. Moa tsy tsara noho izy ve ny zandriny? Azonao alaina ho solony izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I Samsôna no nitondra ny Israelita nandritra ny roapolo taona tamin’ny andron’ny Filistinina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Samsôna taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amin’izao indray mandeha izao dia afa-tsiny aho raha hanao ratsy amin’ny Filistinina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary lasa i Samsôna nisambotra amboahaolo telonjato. Naka zavatra hatao tsolo koa izy, dia nafatony tsiroaroa ny rambon’ny amboahaolo, ary nafatony teo anelanelan’ny rambony ny tsolo iray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia narehiny ny tsolo ary nalefany ireo amboahaolo ireo hankeny amin’ny tanimbarin’ny Filistinina ka nandoro ireo amboara sy salohim-bary ary koa ireo voly voaloboka sy voly ôliva. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa nifanontany ny Filistinina ny amin’izay nanao an’izao; ary nisy nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Samsôna, vinantolahin’ilay Timnita, satria ity rafozany no nisintona indray ny vadiny ka nanome azy ho an’ny namany.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra ny Filistinina ka nandoro an-dravehivavy sy ny ankohonan-drainy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy i Samsôna tamin’ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria nanao izany ianareo, dia tsy hijanona aho raha tsy efa mahavalifaty izay nataonareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa namely azy i Samsôna ary nampitondra faisana azy tanteraka. Rehefa izany, dia lasa izy nonina teo an-tsefatsefak’ilay harambato tao Hetama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hetama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'toerana be tsefatsefa-bato ao anatin’ny faritr’i Joda. Ny anaran-tanàna hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lehỳ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', izay teo akaikin’ny faritany filistinina, dia midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: valanorano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Samsôna sy ilay valanoranom-boriky
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niakatra ny Filistinina ka nitoby tany Joda, ary nitandahatra hamely ny tanàna Lehỳ. '
