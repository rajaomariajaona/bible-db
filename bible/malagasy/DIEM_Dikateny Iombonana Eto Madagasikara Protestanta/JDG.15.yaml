document_id: JDG.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny valifaty nataon’i Samsôna
  - type: text
    content: Nony afaka andro vitsivitsy, tamin’ny fotoam-pijinjana varimbazaha, dia nandeha nitsidika ny vadiny i Samsôna, ka nitondra zanak’osy ho azy
  - type: note
    content: Nanao mariazy i Samsôna, kanefa mariazy karazan’ilay mbola mijanona any an-tranon-drainy ihany ilay vehivavy. Tsy mandoa vodiondry ny mpampakatra; fa rehefa mitsidika ny vadiny iny, dia mitondra fanomezana ho azy.
  - type: text
    content: '. Ary nangataka izy mba hahazo hiditra ao amin’ny efitrano misy ny vadiny, fa nolavin’ny rafozan-dahiny '
  '10':
  - type: text
    content: 'Dia nanontany azy ny vatan-dehilahy tao Joda hoe:'
  - type: text
    content: –Nahoana no niakatra hanafika anay ianareo?
  - type: text
    content: 'Fa novalian’ireo hoe:'
  - type: text
    content: –Mba hamatotra an’i Samsôna ka hanao aminy araka izay nataony taminay.
  '11':
  - type: text
    content: 'Dia nandeha nankany amin’ny tsefatsefak’ilay harambato tao Hetama ny vatan-dehilahy andiany telo tamin’ny fokon’i Joda ka niteny tamin’i Samsôna hoe:'
  - type: text
    content: –Moa tsy fantatrao ve fa ny Filistinina no manjaka amintsika? Koa inona izao nataonao taminay izao?
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Araka izay nataony tamiko no nataoko taminy.
  '12':
  - type: text
    content: 'Fa hoy kosa ireo hoe:'
  - type: text
    content: –Tonga izahay mba hamatotra anao ary hanolotra anao amin’ny Filistinina.
  - type: text
    content: 'Ka hoy i Samsôna taminy:'
  - type: text
    content: –Mianiàna amiko àry fa tsy hamono ahy ianareo.
  '13':
  - type: text
    content: 'Dia namaly azy indray ireo hoe:'
  - type: text
    content: –Tsy manam-pikasana hamono anao izahay fa ny hamatotra anao fotsiny mba hatolotray ny Filistinina.
  - type: text
    content: 'Dia nafatotr’ireo tamin’ny mahazaka roa vaovao i Samsôna ary nentiny niala tao an-dava-bato. '
  '14':
  - type: text
    content: 'Ary nony tonga tao Lehỳ izy, dia nitsena azy tamin’ny horakora-pandresena ny Filistinina. Tamin’izay kosa no nilatsaka tamin’i Samsôna ny Fanahin’ny TOMPO, ka nivaha mora foana toy ny tady rongony main’ny afo ireo tady mahazaka namatorana ny sandriny sy ny tanany. '
  '15':
  - type: text
    content: 'Nahita valanoranom-boriky iray vao novonoina i Samsôna; ary noraisiny izany ka namonoany ho faty arivo lahy tamin’ny Filistinina. '
  '16':
  - type: text
    content: 'Dia hoy i Samsôna hoe:'
  - type: text
    content: –Valanoranom-boriky no nahafatesako arivo lahy, valanoranom-boriky no nampivangongoako ireo faty.
  '17':
  - type: text
    content: 'Rehefa izany, dia natsipiny terỳ ilay valanoranom-boriky teny an-tanany; izany no niantsoana io toerana io hoe Ramata-Lehỳ na Havoanan’ny Valanorano. '
  '18':
  - type: text
    content: 'Ary nahatsiaro nangetaheta mafy i Samsôna ka niantso vonjy tamin’ny TOMPO nanao hoe:'
  - type: text
    content: '–Ianao no nanome ahy izao fandresena lehibe izao; koa ankehitriny ve dia havelanao ho fatin-ketaheta aho, ka ho latsaka eo an-tanan’ireo tsy '
  - type: text
    content: mifora
  - type: text
    content: ' ireo?'
  '19':
  - type: text
    content: Dia notresahin’Andriamanitra ny vatolampy holoka tao Lehỳ ka nampiboiboika rano; dia nisotro i Samsôna ka nody indray ny heriny. Izany loharano izany dia nantsoina hoe Haîna-Kôrà na loharanon’ilay niantso vonjy, ary mbola ao mandraka androany.
  '2':
  - type: text
    content: 'nataony hoe:'
  - type: text
    content: –Noheveriko ho tsy tianao intsony izy, ka dia nomeko an’ilay tovolahy namanao. Moa tsy tsara noho izy ve ny zandriny? Azonao alaina ho solony izy.
  '20':
  - type: text
    content: I Samsôna no nitondra ny Israelita nandritra ny roapolo taona tamin’ny andron’ny Filistinina.
  '3':
  - type: text
    content: 'Dia hoy i Samsôna taminy:'
  - type: text
    content: –Amin’izao indray mandeha izao dia afa-tsiny aho raha hanao ratsy amin’ny Filistinina.
  '4':
  - type: text
    content: 'Ary lasa i Samsôna nisambotra amboahaolo telonjato. Naka zavatra hatao tsolo koa izy, dia nafatony tsiroaroa ny rambon’ny amboahaolo, ary nafatony teo anelanelan’ny rambony ny tsolo iray. '
  '5':
  - type: text
    content: 'Dia narehiny ny tsolo ary nalefany ireo amboahaolo ireo hankeny amin’ny tanimbarin’ny Filistinina ka nandoro ireo amboara sy salohim-bary ary koa ireo voly voaloboka sy voly ôliva. '
  '6':
  - type: text
    content: 'Koa nifanontany ny Filistinina ny amin’izay nanao an’izao; ary nisy nilaza hoe:'
  - type: text
    content: –I Samsôna, vinantolahin’ilay Timnita, satria ity rafozany no nisintona indray ny vadiny ka nanome azy ho an’ny namany.
  - type: text
    content: 'Dia niakatra ny Filistinina ka nandoro an-dravehivavy sy ny ankohonan-drainy. '
  '7':
  - type: text
    content: 'Ary hoy i Samsôna tamin’ireo:'
  - type: text
    content: –Satria nanao izany ianareo, dia tsy hijanona aho raha tsy efa mahavalifaty izay nataonareo.
  '8':
  - type: text
    content: Koa namely azy i Samsôna ary nampitondra faisana azy tanteraka. Rehefa izany, dia lasa izy nonina teo an-tsefatsefak’ilay harambato tao Hetama
  - type: note
    content: 'Hetama: toerana be tsefatsefa-bato ao anatin’ny faritr’i Joda. Ny anaran-tanàna hoe Lehỳ, izay teo akaikin’ny faritany filistinina, dia midika hoe valanorano.'
  - type: text
    content: .
  - type: heading
    content: I Samsôna sy ilay valanoranom-boriky
  '9':
  - type: text
    content: 'Ary niakatra ny Filistinina ka nitoby tany Joda, ary nitandahatra hamely ny tanàna Lehỳ. '
