document_id: PSA.150_1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Voahosotra ho mpanjaka i Davida ary nandresy an’i Gôliata
  - type: text
    content: '1 '
  - type: text
    content: Salamo
  - type: note
    content: Ny rijantenin’ity salamo ity dia hita tao amin’ny Baiboly grika; kanefa misy koa rijanteny hebreo momba azy hita tao Komrano.
  - type: text
    content: ' nosoratana manokana ho an’i Davida, nefa tsy tafiditra ao amin’ny fanisana. Fony i Davida nanao ady samy irery tamin’i Gôliata.'
  - type: text
    content: Izaho no kely indrindra taminay mirahalahy avy
  - type: note
    content: Ny 1 Sam 16–17 no voafintina ato amin’ity Sal 151 ity.
  - type: text
    content: sy zandriny indrindra tamin’ny ankohonan-draiko.
  - type: text
    content: 'Ny '
  - type: text
    content: miandry
  - type: text
    content: ' ny '
  - type: text
    content: ondrin
  - type: text
    content: ' -draiko no lahasako.'
  - type: text
    content: '2'
  - type: text
    content: ' Nanao sodina ny tanako;'
  - type: text
    content: namboatra valiha ny rantsan-tanako.
  - type: text
    content: '3'
  - type: text
    content: ' Iza no hanambara izany amin’ny Tompoko?'
  - type: text
    content: Ny Tompo ihany, eny, Izy mihitsy no mandre.
  - type: text
    content: '4'
  - type: text
    content: ' Koa dia nandefa ny îrany Izy,'
  - type: text
    content: ka naka ahy teo anivon’ny ondrin-draiko io
  - type: text
    content: sy nanosotra ahy tamin’ny menaka fanosorany.
  - type: text
    content: '5'
  - type: text
    content: ' Bikàna sy ranjanana avokoa ny zokiko;'
  - type: text
    content: nefa tsy izy ireo no sitraky ny Tompo.
  - type: text
    content: '6'
  - type: text
    content: ' Lasa nisehatra an’ilay Filistinina aho,'
  - type: text
    content: ka nozoniny tamin’ireo sampiny.
  - type: text
    content: '7'
  - type: text
    content: ' Fa notsoahako ny sabatra teny aminy'
  - type: text
    content: ary dia nanapa-doha azy aho;
  - type: text
    content: ka indro ny henatra fa voaaisotra
  - type: text
    content: 'teo amin’ny taranak’i '
  - type: text
    content: Israely
  - type: text
    content: .
