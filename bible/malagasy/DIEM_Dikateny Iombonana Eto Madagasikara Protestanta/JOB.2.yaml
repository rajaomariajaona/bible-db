document_id: JOB.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitsapana faharoa an’i Jôba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro raha tonga nanao tatitra tamin’ny TOMPO ireo zanak’Andriamanitra, dia mba tafaraka taminy teo koa i Satàna. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jôba namaly azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miteniteny foana tahaka ny vehivavy adala ianao. Raha ekentsika fa avy amin’Andriamanitra ny zavatra tsara, nahoana no tsy ekentsika ny zavatra ratsy ho avy aminy?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany fitsapana azy izany, dia tsy mba nanota tamin’ny molony i Jôba na dia kely aza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga nampionona azy ny sakaizan’i Jôba telo lahy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandre ny fahoriana rehetra nianjady tamin’i Jôba ny sakaizany telo lahy, dia i Elifaza avy any Temàna sy i Bildada avy any Soha ary i Tsofara avy any Nahamà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Temàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna edômita malaza tamin’ny fahendren’ny mponina tao aminy (jereo Jer 49.7). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Soha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Nahamà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': toerana na faritany tsy fantatra mazava.'
      marker-yv: yv-n
    - type: text
      text: ', ka samy niala tany aminy avy ary nifanaiky fa haneho aminy ny fiaraha-miory sy hankahery azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saiky tsy nahafantatra azy anefa ireo raha nahatazana an’i Jôba, ka dia nitomany; '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nandriatra fitafiana
    - type: text
      text: ' izy ary nanopy vovoka teny amin’ny rivotra mba hiraraka eny an-dohany avy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nijanona nipetraka tamin’ny tany niaraka tamin’i Jôba nandritry ny fito andro sy fito alina ireo sady tsy nisy niteny na inona na inona taminy satria hitany ny halehiben’ny fahoriany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy taiza moa ianao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny Tompo izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avy nitetitety ny tany sy nihaodihaody tany aho.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy indray ny Tompo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nahita an’i Jôba mpanompoko ve ianao? Fa tsy misy tahaka azy eny ambonin’ny tany: lehilahy tsy misy hokianina sady mahitsy ary manaja Ahy izy ka mifady ny ratsy. Ary na dia nandrisika Ahy hamely azy tsy amin’antony aza ianao, dia mbola mahatoky ihany izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mbola namaly ny Tompo i Satàna ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hoditra solon’ny hoditra. Izay ananan’ny olona dia homeny hiarovany ny ainy. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa ahinjiro aminy ange ny tananao ka kasiho ny taolany sy ny nofony e, raha tsy an-kitsirano izao no haniratsirany Anao!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro eo am-pelatananao izy, ny ainy tokana ihany tsimbinina.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala teo anatrehan’ny TOMPO i Satàna ka namely aretin-koditra mahatsiravina an’i Jôba hatreo am-paladiany ka hatrany an-tampon-dohany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitombina teo an-davenona i Jôba ary naka vakim-bilany tany hihaorany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny vadiny taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mbola mikiry amin’ny fahamarinanao foana ve ianao? Lavy Andriamanitra, dia matesa any ianao!
