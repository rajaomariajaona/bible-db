document_id: JOB.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitsapana faharoa an’i Jôba
  - type: text
    content: 'Indray andro raha tonga nanao tatitra tamin’ny TOMPO ireo zanak’Andriamanitra, dia mba tafaraka taminy teo koa i Satàna. '
  '10':
  - type: text
    content: 'Dia hoy i Jôba namaly azy:'
  - type: text
    content: –Miteniteny foana tahaka ny vehivavy adala ianao. Raha ekentsika fa avy amin’Andriamanitra ny zavatra tsara, nahoana no tsy ekentsika ny zavatra ratsy ho avy aminy?
  - type: text
    content: Tamin’izany fitsapana azy izany, dia tsy mba nanota tamin’ny molony i Jôba na dia kely aza.
  - type: heading
    content: Tonga nampionona azy ny sakaizan’i Jôba telo lahy
  '11':
  - type: text
    content: Ary nandre ny fahoriana rehetra nianjady tamin’i Jôba ny sakaizany telo lahy, dia i Elifaza avy any Temàna sy i Bildada avy any Soha ary i Tsofara avy any Nahamà
  - type: note
    content: 'Temàna: tanàna edômita malaza tamin’ny fahendren’ny mponina tao aminy (jereo Jer 49.7). –Soha sy Nahamà: toerana na faritany tsy fantatra mazava.'
  - type: text
    content: ', ka samy niala tany aminy avy ary nifanaiky fa haneho aminy ny fiaraha-miory sy hankahery azy. '
  '12':
  - type: text
    content: 'Saiky tsy nahafantatra azy anefa ireo raha nahatazana an’i Jôba, ka dia nitomany; '
  - type: text
    content: nandriatra fitafiana
  - type: text
    content: ' izy ary nanopy vovoka teny amin’ny rivotra mba hiraraka eny an-dohany avy. '
  '13':
  - type: text
    content: Dia nijanona nipetraka tamin’ny tany niaraka tamin’i Jôba nandritry ny fito andro sy fito alina ireo sady tsy nisy niteny na inona na inona taminy satria hitany ny halehiben’ny fahoriany.
  '2':
  - type: text
    content: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: text
    content: –Avy taiza moa ianao?
  - type: text
    content: 'Dia namaly ny Tompo izy hoe:'
  - type: text
    content: –Avy nitetitety ny tany sy nihaodihaody tany aho.
  '3':
  - type: text
    content: 'Hoy indray ny Tompo taminy:'
  - type: text
    content: '–Efa nahita an’i Jôba mpanompoko ve ianao? Fa tsy misy tahaka azy eny ambonin’ny tany: lehilahy tsy misy hokianina sady mahitsy ary manaja Ahy izy ka mifady ny ratsy. Ary na dia nandrisika Ahy hamely azy tsy amin’antony aza ianao, dia mbola mahatoky ihany izy.'
  '4':
  - type: text
    content: 'Fa mbola namaly ny Tompo i Satàna ka nanao hoe:'
  - type: text
    content: '–Hoditra solon’ny hoditra. Izay ananan’ny olona dia homeny hiarovany ny ainy. '
  '5':
  - type: text
    content: Fa ahinjiro aminy ange ny tananao ka kasiho ny taolany sy ny nofony e, raha tsy an-kitsirano izao no haniratsirany Anao!
  '6':
  - type: text
    content: 'Dia hoy ny Tompo tamin’i Satàna:'
  - type: text
    content: –Indro eo am-pelatananao izy, ny ainy tokana ihany tsimbinina.
  '7':
  - type: text
    content: 'Dia niala teo anatrehan’ny TOMPO i Satàna ka namely aretin-koditra mahatsiravina an’i Jôba hatreo am-paladiany ka hatrany an-tampon-dohany. '
  '8':
  - type: text
    content: Dia nitombina teo an-davenona i Jôba ary naka vakim-bilany tany hihaorany.
  '9':
  - type: text
    content: 'Ary hoy ny vadiny taminy:'
  - type: text
    content: –Mbola mikiry amin’ny fahamarinanao foana ve ianao? Lavy Andriamanitra, dia matesa any ianao!
