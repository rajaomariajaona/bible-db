document_id: GEN.47
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia lasa i Jôsefa nampandre ny Farao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny raiko sy ny rahalahiko ary ireo ondry aman’osiny sy ny ombiny mbamin’izay rehetra ananany dia tonga avy any amin’ny tany Kanahàna, ka indreo ao amin’ny faritr’i Gôsena izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nalain’i Jôsefa ny rahalahiny dimy, ka nasehony teo anatrehan’ny Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nanontany azy dimy lahy ny Farao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona moa no raharaha fanaonareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy ny navaliny azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mpiandry ondry tahaka ny razanay ihany izahay mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Namely mafy ny mosary tao amin’ny tany Kanahàna, ka tsy misy intsony ny ahitra ho an’ny ondry aman’osinay; koa tonga mba hivahiny eto amin’ity tany ity izahay mpanomponao ankehitriny, ary miangavy mba hipetraka ao amin’ny faritr’i Gôsena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy ny Farao tamin’i Jôsefa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tonga atỳ aminao ny rainao sy ny rahalahinao, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary ny tany Ejipta manontolo dia eo anatrehanao; koa izay faritra tsara indrindra no amponeno azy. Mahazo mipetraka ao amin’ny faritr’i Gôsena izy; ary raha fantatrao fa misy olo-mahay amin’izy ireo, dia tendreo ho lehiben’ny fiandrasana ny andiam-biby fiompiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nentin’i Jôsefa teo anatrehan’ny Farao koa i Jakôba rainy. Dia niarahaba sady nirary soa ny Farao i Jakôba, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Firy taona moa ianao izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa telopolo amby zato taona izao no nivezivezeko toy ny mpivahiny. Fohy sady sarotra ny androm-piainako ka tsy nahatratra akory ny andron’ireo razako tamin’ny fotoana nivahiniany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nisaotra sy nanao veloma ny Farao i Jakôba ary niala teo anatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tao amin’ny faritra tsara indrindra tany Ejipta, tao amin’ny faritra manodidina an’i Ramsesa, no napetrak’i Jôsefa ny rainy sy ireo rahalahiny, araka ny baikon’ny Farao, ary nomeny zaratany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Novatsîn’i Jôsefa hanina ny rainy sy ny rahalahiny ary ny ankohonan-drainy rehetra, araka ny isan’ny vava mihinana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny pôlitikan’i Jôsefa nandritra ny mosary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary mafy tokoa ny mosary ka tsy nisy hanina intsony teo amin’ny faritany manontolo. Na tany Ejipta na tany Kanahàna dia efa very hevitra ny olona niatrika ny mosary. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nangonin’i Jôsefa ny vola rehetra tany Ejipta sy tany Kanahàna, dia ny vola izay nividianan’ny olona vary, ka nasainy nentina tao an-dapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa tsy nisy vola intsony na tany Ejipta na tany Kanahàna, dia tonga tany amin’i Jôsefa ny Ejiptianina rehetra ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Omeo hanina izahay. Satria tsy manam-bola ve izahay, dia ho faty eto anatrehanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy kosa i Jôsefa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tsy manam-bola ianareo, dia omeo ahy ny andiam-biby fiompinareo, fa hatakaloko sakafo ho anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nentin’ny olona tany amin’i Jôsefa ny andiam-biby fiompiny; ka notakalozan’i Jôsefa hanina ny soavaliny sy ny ondry aman’osiny ary ny ombiny sy ny borikiny. Koa tamin’iny taona iny dia nanome sakafo azy i Jôsefa ho takalon’ny biby fiompy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nony afaka herintaona dia niverina tany amin’i Jôsefa indray ny olona ka niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy afeninay aminao, tompoko, fa tsy manam-bola intsony izahay, ary ireo biby fiompinay dia efa lasanao. Koa tsy misy afa-tsy ny tenanay sy ny taninay no sisa eto anatrehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nahoana no avela ho faty eto anatrehanao izahay ka hipetra-potsiny eo ny taninay? Vidio ny tenanay sy ny taninay, ka omeo hanina izahay; dia hanompo ny Farao ny tenanay sy ny taninay. Omeo masom-boly izahay mba hahazoanay mivelona ka ny tenanay tsy ho faty ary ny taninay tsy ho lao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia novidîn’i Jôsefa ho an’ny Farao ny tany rehetra tao Ejipta, satria nihamafy ny mosary ka samy nivarotra ny sahany avy ny Ejiptianina. Noho izany dia lasa fananan’ny Farao avokoa ny tany manontolo; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ary ny vahoaka kosa noteren’i Jôsefa hanao fanompoana nanomboka amin’ny sisin-tany an-kilany ka hatrany amin’ny sisin-tany an-daniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'noteren’i Jôsefa hanao fanompoana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa araka ny Siriaka sy ny dkt grika tranainy izany; fa ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nafindran’i Jôsefa ho any an-tanàn-dehibe.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tany tsy mba novidin’i Jôsefa dia ny tanin’ireo mpisorona, satria nisy didy navoakan’ny Farao hitsimbinana azy. Anjara sakafo nomen’ny Farao azy no fihinany; izany no tsy nivarotan’ireo mpisorona ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy i Jôsefa tamin’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ankehitriny efa voavidiko ho an’ny Farao ny tenanareo sy ny taninareo, koa homeko masom-boly ianareo hafafinareo any amin’ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa rehefa miakatra ny vokatra, dia haterinareo ho an’ny Farao ny ampahadiminy; ny efatra ampahadiminy kosa dia hotazoninareo mba ho masom-boly ary koa ho sakafonareo sy ny zanakareo mbamin’izay rehetra mipetraka ao an-tranonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hoy ny navalin’ireo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Namonjy ny ainay ianao, tompokolahy. Nahita sitraka teo imasonao izahay, koa ekenay ny ho mpanompon’ny Farao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toy izany no namoahan’i Jôsefa lalàna tany Ejipta, lalàna mbola manan-kery mandraka androany, fa ny ampahadimin’ny vokatra dia aterina ho an’ny Farao. Ny tanin’ny mpisorona irery ihany no tsy mba lasa fananan’ny Farao.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanirian’i Jakôba farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nipetraka tany Ejipta, tao amin’ny faritr’i Gôsena, ny Israelita. Nahazo zaratany tao izy, dia niteraka, ka nihamaro fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Niaina fito ambin’ny folo taona tany Ejipta i Jakôba, ka ny androm-piainany dia nahatratra fito amby efapolo amby zato taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary rehefa akaiky ny andro hahafatesan’i Jakôba, dia niantso an’i Jôsefa zanany izy ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha tia ahy ianao, dia asehoy amiko ny fitiavanao sy ny toetranao mahafatra-po
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 24.2 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', aza alevina aty Ejipta aho. Mianiàna amiko ianao, ka ataovy ato ambany feko ny tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Rehefa maty aho, dia ento hiala aty Ejipta ka aleveno any am-pasan-drazako.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ka hoy i Jôsefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 49.29-32; 50.6.
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hotanterahiko araka ny teninao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mianiàna amiko mihitsy àry ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nianiana taminy i Jôsefa. Ary teo an-doham-pandriany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny dkt grika tranainy sy ny Siriaka dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teo amin’ny tehiny,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ka io no voatsiahy ao amin’ny Heb 11.21.'
    marker-yv: yv-n
  - type: text
    text: ' teo i Jakôba no niondrika mba ho fisaorana azy.'
