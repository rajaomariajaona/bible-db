document_id: GEN.47,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia lasa i Jôsefa nampandre ny Farao hoe:'
  - type: text
    content: –Ny raiko sy ny rahalahiko ary ireo ondry aman’osiny sy ny ombiny mbamin’izay rehetra ananany dia tonga avy any amin’ny tany Kanahàna, ka indreo ao amin’ny faritr’i Gôsena izy.
  '10':
  - type: text
    content: Dia nisaotra sy nanao veloma ny Farao i Jakôba ary niala teo anatrehany.
  '11':
  - type: text
    content: 'Tao amin’ny faritra tsara indrindra tany Ejipta, tao amin’ny faritra manodidina an’i Ramsesa, no napetrak’i Jôsefa ny rainy sy ireo rahalahiny, araka ny baikon’ny Farao, ary nomeny zaratany. '
  '12':
  - type: text
    content: Novatsîn’i Jôsefa hanina ny rainy sy ny rahalahiny ary ny ankohonan-drainy rehetra, araka ny isan’ny vava mihinana.
  - type: heading
    content: Ny pôlitikan’i Jôsefa nandritra ny mosary
  '13':
  - type: text
    content: 'Ary mafy tokoa ny mosary ka tsy nisy hanina intsony teo amin’ny faritany manontolo. Na tany Ejipta na tany Kanahàna dia efa very hevitra ny olona niatrika ny mosary. '
  '14':
  - type: text
    content: 'Nangonin’i Jôsefa ny vola rehetra tany Ejipta sy tany Kanahàna, dia ny vola izay nividianan’ny olona vary, ka nasainy nentina tao an-dapan’ny '
  - type: text
    content: Farao
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ary rehefa tsy nisy vola intsony na tany Ejipta na tany Kanahàna, dia tonga tany amin’i Jôsefa ny Ejiptianina rehetra ka nanao hoe:'
  - type: text
    content: –Omeo hanina izahay. Satria tsy manam-bola ve izahay, dia ho faty eto anatrehanao?
  '16':
  - type: text
    content: 'Hoy kosa i Jôsefa hoe:'
  - type: text
    content: –Raha tsy manam-bola ianareo, dia omeo ahy ny andiam-biby fiompinareo, fa hatakaloko sakafo ho anareo.
  '17':
  - type: text
    content: 'Dia nentin’ny olona tany amin’i Jôsefa ny andiam-biby fiompiny; ka notakalozan’i Jôsefa hanina ny soavaliny sy ny ondry aman’osiny ary ny ombiny sy ny borikiny. Koa tamin’iny taona iny dia nanome sakafo azy i Jôsefa ho takalon’ny biby fiompy rehetra. '
  '18':
  - type: text
    content: 'Nony afaka herintaona dia niverina tany amin’i Jôsefa indray ny olona ka niteny taminy hoe:'
  - type: text
    content: '–Tsy afeninay aminao, tompoko, fa tsy manam-bola intsony izahay, ary ireo biby fiompinay dia efa lasanao. Koa tsy misy afa-tsy ny tenanay sy ny taninay no sisa eto anatrehanao. '
  '19':
  - type: text
    content: Nahoana no avela ho faty eto anatrehanao izahay ka hipetra-potsiny eo ny taninay? Vidio ny tenanay sy ny taninay, ka omeo hanina izahay; dia hanompo ny Farao ny tenanay sy ny taninay. Omeo masom-boly izahay mba hahazoanay mivelona ka ny tenanay tsy ho faty ary ny taninay tsy ho lao.
  '2':
  - type: text
    content: 'Nalain’i Jôsefa ny rahalahiny dimy, ka nasehony teo anatrehan’ny Farao. '
  '20':
  - type: text
    content: 'Dia novidîn’i Jôsefa ho an’ny Farao ny tany rehetra tao Ejipta, satria nihamafy ny mosary ka samy nivarotra ny sahany avy ny Ejiptianina. Noho izany dia lasa fananan’ny Farao avokoa ny tany manontolo; '
  '21':
  - type: text
    content: ary ny vahoaka kosa noteren’i Jôsefa hanao fanompoana nanomboka amin’ny sisin-tany an-kilany ka hatrany amin’ny sisin-tany an-daniny
  - type: note
    content: 'noteren’i Jôsefa hanao fanompoana: dkt hafa araka ny Siriaka sy ny dkt grika tranainy izany; fa ny RM kosa manao hoe nafindran’i Jôsefa ho any an-tanàn-dehibe.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Ny tany tsy mba novidin’i Jôsefa dia ny tanin’ireo mpisorona, satria nisy didy navoakan’ny Farao hitsimbinana azy. Anjara sakafo nomen’ny Farao azy no fihinany; izany no tsy nivarotan’ireo mpisorona ny taniny.
  '23':
  - type: text
    content: 'Dia hoy i Jôsefa tamin’ny vahoaka:'
  - type: text
    content: '–Ankehitriny efa voavidiko ho an’ny Farao ny tenanareo sy ny taninareo, koa homeko masom-boly ianareo hafafinareo any amin’ny taninareo. '
  '24':
  - type: text
    content: Fa rehefa miakatra ny vokatra, dia haterinareo ho an’ny Farao ny ampahadiminy; ny efatra ampahadiminy kosa dia hotazoninareo mba ho masom-boly ary koa ho sakafonareo sy ny zanakareo mbamin’izay rehetra mipetraka ao an-tranonareo.
  '25':
  - type: text
    content: 'Ka hoy ny navalin’ireo hoe:'
  - type: text
    content: –Namonjy ny ainay ianao, tompokolahy. Nahita sitraka teo imasonao izahay, koa ekenay ny ho mpanompon’ny Farao.
  '26':
  - type: text
    content: Toy izany no namoahan’i Jôsefa lalàna tany Ejipta, lalàna mbola manan-kery mandraka androany, fa ny ampahadimin’ny vokatra dia aterina ho an’ny Farao. Ny tanin’ny mpisorona irery ihany no tsy mba lasa fananan’ny Farao.
  - type: heading
    content: Ny fanirian’i Jakôba farany
  '27':
  - type: text
    content: 'Nipetraka tany Ejipta, tao amin’ny faritr’i Gôsena, ny Israelita. Nahazo zaratany tao izy, dia niteraka, ka nihamaro fatratra. '
  '28':
  - type: text
    content: Niaina fito ambin’ny folo taona tany Ejipta i Jakôba, ka ny androm-piainany dia nahatratra fito amby efapolo amby zato taona.
  '29':
  - type: text
    content: 'Ary rehefa akaiky ny andro hahafatesan’i Jakôba, dia niantso an’i Jôsefa zanany izy ka nanao taminy hoe:'
  - type: text
    content: –Raha tia ahy ianao, dia asehoy amiko ny fitiavanao sy ny toetranao mahafatra-po
  - type: note
    content: Jereo Gen 24.2 sy nta.
  - type: text
    content: ', aza alevina aty Ejipta aho. Mianiàna amiko ianao, ka ataovy ato ambany feko ny tananao. '
  '3':
  - type: text
    content: 'Nanontany azy dimy lahy ny Farao hoe:'
  - type: text
    content: –Inona moa no raharaha fanaonareo?
  - type: text
    content: 'Ka hoy ny navaliny azy:'
  - type: text
    content: '–Mpiandry ondry tahaka ny razanay ihany izahay mpanomponao. '
  '30':
  - type: text
    content: Rehefa maty aho, dia ento hiala aty Ejipta ka aleveno any am-pasan-drazako.
  - type: text
    content: Ka hoy i Jôsefa
  - type: note
    content: Jereo Gen 49.29-32; 50.6.
  - type: text
    content: ' hoe:'
  - type: text
    content: –Hotanterahiko araka ny teninao izany.
  '31':
  - type: text
    content: 'Ary hoy i Jakôba hoe:'
  - type: text
    content: –Mianiàna amiko mihitsy àry ianao.
  - type: text
    content: Dia nianiana taminy i Jôsefa. Ary teo an-doham-pandriany
  - type: note
    content: Ny dkt grika tranainy sy ny Siriaka dia manao hoe teo amin’ny tehiny, ka io no voatsiahy ao amin’ny Heb 11.21.
  - type: text
    content: ' teo i Jakôba no niondrika mba ho fisaorana azy.'
  '4':
  - type: text
    content: Namely mafy ny mosary tao amin’ny tany Kanahàna, ka tsy misy intsony ny ahitra ho an’ny ondry aman’osinay; koa tonga mba hivahiny eto amin’ity tany ity izahay mpanomponao ankehitriny, ary miangavy mba hipetraka ao amin’ny faritr’i Gôsena.
  '5':
  - type: text
    content: 'Dia hoy ny Farao tamin’i Jôsefa:'
  - type: text
    content: '–Tonga atỳ aminao ny rainao sy ny rahalahinao, '
  '6':
  - type: text
    content: ary ny tany Ejipta manontolo dia eo anatrehanao; koa izay faritra tsara indrindra no amponeno azy. Mahazo mipetraka ao amin’ny faritr’i Gôsena izy; ary raha fantatrao fa misy olo-mahay amin’izy ireo, dia tendreo ho lehiben’ny fiandrasana ny andiam-biby fiompiko.
  '7':
  - type: text
    content: 'Nentin’i Jôsefa teo anatrehan’ny Farao koa i Jakôba rainy. Dia niarahaba sady nirary soa ny Farao i Jakôba, '
  '8':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Firy taona moa ianao izao?
  '9':
  - type: text
    content: 'Ka hoy i Jakôba hoe:'
  - type: text
    content: –Efa telopolo amby zato taona izao no nivezivezeko toy ny mpivahiny. Fohy sady sarotra ny androm-piainako ka tsy nahatratra akory ny andron’ireo razako tamin’ny fotoana nivahiniany.
