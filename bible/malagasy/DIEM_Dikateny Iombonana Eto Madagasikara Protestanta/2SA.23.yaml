    marker: p
    children:
    - type: text
      text: 'zanakalahin’i Samà avy any Harara; i Ahiama zanakalahin’i Sarara avy any Harara; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Elifelety zanakalahin’i Ahasbay ary zafikelin’olona avy any Mahàka, i Elihama zanakalahin’i Ahitôfela avy any Gilao; '
  '35':
  - type: usfm
    marker: p
