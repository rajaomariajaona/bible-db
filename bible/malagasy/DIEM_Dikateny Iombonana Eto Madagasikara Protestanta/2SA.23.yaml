  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Jigala zanakalahin’i Natàna avy any Tsôbà; i Banỳ avy amin’ny fokon’i Gada; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Tselèka, ilay Hamônita; i Naharay avy any Beerôta; mpitondra ny fiadian’i Jôaba zanakalahin’i Tserôià; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
