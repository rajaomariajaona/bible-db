document_id: 2SA.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanambaràna farany nataon’i Davida
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no fanambaràna farany nataon’i Davida:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny hentitr’i Davida, zanakalahin’i Jisay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia teny hentitry ny lehilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay voafidin’ilay Andriamanitr’i Jakôba
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho voasandratra ho mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady voahasohason’ireo hiran’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny 1 Sam 18.7 dia manome ohatra an-kira mankalaza ireo zava-bitan’i Davida.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny Fanahin’ny TOMPO no mampiteny ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mametraka ao am-bavako ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny Andriamanitr’i Israely sady mpiaro azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'no efa niteny ka nanao tamiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny mpanjaka izay mifehy ny olona amim-pahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mitondra azy amim-panajana an’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia toy ny fahazavan’ny maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miposaka ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’iny maraina tsy misy rahona iny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tarany mafana mandimby ny orana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mampaniry ny ahitra amin’ny tany.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy izany indrindra ny fianakaviako
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo anoloan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa fanekempihavanana maharitra mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: no nataon’Andriamanitra tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fanekempihavanana mirindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy voatandro amin’ny lafiny rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fandresena sy ny zava-tsoa azoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia Izy no ipoiran’ireny rehetra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny olom-poana rehetra kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tahaka ny tsilo fanary
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mba fandrain-tanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay te hikasika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy maintsy mirongo
- type: usfm
  marker: q1
  children:
  - type: text
    text: faraingo vy na zaran-defona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireny tsilo ireny dia dorana amin’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny toerana itobiany eo ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo kalazan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 11.10-47)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireto avy ny anaran’ireo kalazan’i Davida: i Isbahala, zanakalahin’i Hakmônỳ sady filohan’ny «Tariky ny telo lahy». Izy no ilay nampandihy ny lefony hamelezana fahavalo valonjato lahy ka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ao amin’ny RM mahazatra ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: i Isbahala... lahy ka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia azo adika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: i Jôseby-Basebeta Takemônita no filohan’ireo manamboninahitra; izy ilay Hadinao avy any Hetsena, izay namely fahavalo valonjato lahy ka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; saingy toa tsy azo antoka loatra ny RM etoana.
    marker-yv: yv-n
  - type: text
    text: ' nahafaty azy tamin’ny ady indray mandeha monja.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Manaraka azy dia i Elehazàra, zanakalahin’i Dôdao ary zafikelin’ny lehilahy iray avy any Ahôa. Anisan’ny «Tariky ny telo lahy» kalaza izay niaraka tamin’i Davida izy, fony nihaika ny Filistinina tafangona hiady ireo. Nihemotra ny tafik’i Israely, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa i Elehazàra kosa niaritra ka namely ny Filistinina mandra-pahavizan’ny tanany nihazona mafy ny sabany. Fandresena miezinezina no nataon’ny TOMPO tamin’izay andro izay. Niverina nanjohy an’i Elehazàra haka ny fiadian’ireo maty no sisa nataon’ny tafika israelita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manaraka azy dia i Samà, zanakalahin’i Agè avy any Harara. Rehefa tafangona tao Lehỳ teo amin’ny saham-boanemba ny Filistinina, dia nandosiran’ny tafik’i Israely; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: nefa nijanona teo afovoan’ny saha i Samà ka niaro izany ary namely ny Filistinina. Fandresena miezinezina no mbola nataon’ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indray andro tamin’ny fararano, dia nisy telo lahy anisan’ny «andian’ny telopolo lahy» nidina ka tonga tany amin’i Davida tao amin’ny zohin’i Hadolàma, fa nisy tafiky ny Filistinina nitoby tao an-dohasahan’ny Refaîta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hadolàma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 22.1 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Lohasahan’ny Refaîta:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo 5.18 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary i Davida efa tao amin’ny fiereny, raha mby tao Betlehema ny andia-miaramilan’ny Filistinina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izay, dia velom-paniriana tampoka i Davida ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no hitondra rano hosotroiko avy amin’ilay fantsakana eo akaikin’ny vavahadin’i Betlehema?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia niroatra namakivaky ny tobin’ny Filistinina izy telo lahy ireto, ka nanovo rano tamin’ilay fantsakana teo akaikin’ny vavahadin’i Betlehema, ary nentiny ho any amin’i Davida; kanjo tsy nety nisotro i Davida, fa nanolotra izany ho an’ny TOMPO kosa ho fanatitra araraka, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'sady niteny hoe: «Sanatria, TOMPO ô, raha hisotro amin’io rano io aho. Moa tsy toy ny ran’ireo lehilahy izay nanao vy very ny ainy ve io?» Ka dia tsy nety nisotro izy. Izany sy izany no nataon’ireto kalaza telo lahy ireto.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Abisay rahalahin’i Jôaba sady zanakalahin’i Tseroià, no filohan’ny «andian’ny telopolo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato ka nahafaty azy; ary nanan-daza mitovy amin’ireto telo lahy ireto izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nomen-kaja avo roa heny kosa i Abisay teo amin’ny «andian’ny telopolo lahy», ka lasa lehibeny; saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy» izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Benaià, avy any Kabitseela, dia zanakalahin’i Jôiadà sady zafikelin’ny miaramila anankiray maherifo. Nahavita asa goavana maro i Benaià. Izy no nahafaty ireo Ariela roa lahy tao Môaba; izy koa no nidina tanaty lavaka iray ka nahafaty liona tao tamin’ny indray andro nisy oram-panala. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mbola izy koa no nahafaty ilay Ejiptianina ranjanana izay nirongo lefona; tehina no namelezany azy, dia nosarihany teny an-tanan’ilay Ejiptianina ny lefony ka iny ihany no namonoany azy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ireo no zava-bitan’i Benaià zanakalahin’i Jôiadà; ary nanan-daza mitovy amin’ireto kalaza telo lahy ireto izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nomen-kaja kosa i Benaià teo amin’ny «andian’ny telopolo lahy», saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy». Izy no voatendrin’i Davida hifehy ny mpiambina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny «andian’ny telopolo lahy» dia nisy an’ireto koa:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I Hasahela rahalahin’i Jôaba; i Elehanàna zanakalahin’i Dôdao avy any Betlehema; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'i Samà avy any Harôda; i Elikà avy any Harôda; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Heletsa avy any Paltỳ; i Hirà zanakalahin’i Hikesy avy any Tekôa; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'i Abihezèra avy any Hanatôta; i Mebonay avy any Hosà; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'i Tsalmôna avy any Ahôa; i Maheray avy any Netôfà; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'i Heleba zanakalahin’i Bahanà avy any Netôfà; i Itàhy zanakalahin’i Ribay avy any Gibehà-n’ireo Benjaminita; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'i Benaià avy any Piratôna; i Hiday avy any amin’ny lohasahan-driakan’i Gahàsa; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'i Abỳ-Halbôna avy any Harabà; i Hazmavety avy any Bahorima; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Eliahabà avy any Sahalbôna; i Jasena avy any Gizôna; i Jônatàna, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'zanakalahin’i Samà avy any Harara; i Ahiama zanakalahin’i Sarara avy any Harara; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'i Elifelety zanakalahin’i Ahasbay ary zafikelin’olona avy any Mahàka, i Elihama zanakalahin’i Ahitôfela avy any Gilao; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'i Hetsirào avy any Karmela; i Paharay avy any Aràba; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'i Jigala zanakalahin’i Natàna avy any Tsôbà; i Banỳ avy amin’ny fokon’i Gada; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'i Tselèka, ilay Hamônita; i Naharay avy any Beerôta; mpitondra ny fiadian’i Jôaba zanakalahin’i Tserôià; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'i Hirà sy i Gareba, samy avy amin’ny fianakavian’i Jetèra; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ary i Orià, ilay Hetita. Fito amby telopolo no fitambaran’ireo kalaza rehetra.
