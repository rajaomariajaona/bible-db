document_id: 2SA.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanambaràna farany nataon’i Davida
  - type: text
    content: 'Izao no fanambaràna farany nataon’i Davida:'
  - type: text
    content: Teny hentitr’i Davida, zanakalahin’i Jisay,
  - type: text
    content: dia teny hentitry ny lehilahy
  - type: text
    content: izay voafidin’ilay Andriamanitr’i Jakôba
  - type: text
    content: mba ho voasandratra ho mpanjaka
  - type: text
    content: sady voahasohason’ireo hiran’i Israely
  - type: note
    content: Ny 1 Sam 18.7 dia manome ohatra an-kira mankalaza ireo zava-bitan’i Davida.
  - type: text
    content: ':'
  '10':
  - type: text
    content: fa i Elehazàra kosa niaritra ka namely ny Filistinina mandra-pahavizan’ny tanany nihazona mafy ny sabany. Fandresena miezinezina no nataon’ny TOMPO tamin’izay andro izay. Niverina nanjohy an’i Elehazàra haka ny fiadian’ireo maty no sisa nataon’ny tafika israelita.
  '11':
  - type: text
    content: 'Manaraka azy dia i Samà, zanakalahin’i Agè avy any Harara. Rehefa tafangona tao Lehỳ teo amin’ny saham-boanemba ny Filistinina, dia nandosiran’ny tafik’i Israely; '
  '12':
  - type: text
    content: nefa nijanona teo afovoan’ny saha i Samà ka niaro izany ary namely ny Filistinina. Fandresena miezinezina no mbola nataon’ny TOMPO.
  '13':
  - type: text
    content: Indray andro tamin’ny fararano, dia nisy telo lahy anisan’ny «andian’ny telopolo lahy» nidina ka tonga tany amin’i Davida tao amin’ny zohin’i Hadolàma, fa nisy tafiky ny Filistinina nitoby tao an-dohasahan’ny Refaîta
  - type: note
    content: 'Hadolàma: jereo 1 Sam 22.1 sy nta. –Lohasahan’ny Refaîta: jereo 5.18 sy nta.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ary i Davida efa tao amin’ny fiereny, raha mby tao Betlehema ny andia-miaramilan’ny Filistinina. '
  '15':
  - type: text
    content: 'Tamin’izay, dia velom-paniriana tampoka i Davida ka nanao hoe:'
  - type: text
    content: –Iza no hitondra rano hosotroiko avy amin’ilay fantsakana eo akaikin’ny vavahadin’i Betlehema?
  '16':
  - type: text
    content: 'Dia niroatra namakivaky ny tobin’ny Filistinina izy telo lahy ireto, ka nanovo rano tamin’ilay fantsakana teo akaikin’ny vavahadin’i Betlehema, ary nentiny ho any amin’i Davida; kanjo tsy nety nisotro i Davida, fa nanolotra izany ho an’ny TOMPO kosa ho fanatitra araraka, '
  '17':
  - type: text
    content: 'sady niteny hoe: «Sanatria, TOMPO ô, raha hisotro amin’io rano io aho. Moa tsy toy ny ran’ireo lehilahy izay nanao vy very ny ainy ve io?» Ka dia tsy nety nisotro izy. Izany sy izany no nataon’ireto kalaza telo lahy ireto.'
  '18':
  - type: text
    content: 'I Abisay rahalahin’i Jôaba sady zanakalahin’i Tseroià, no filohan’ny «andian’ny telopolo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato ka nahafaty azy; ary nanan-daza mitovy amin’ireto telo lahy ireto izy. '
  '19':
  - type: text
    content: Nomen-kaja avo roa heny kosa i Abisay teo amin’ny «andian’ny telopolo lahy», ka lasa lehibeny; saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy» izy.
  '2':
  - type: text
    content: Ny Fanahin’ny TOMPO no mampiteny ahy
  - type: text
    content: sy mametraka ao am-bavako ny teniny.
  '20':
  - type: text
    content: 'I Benaià, avy any Kabitseela, dia zanakalahin’i Jôiadà sady zafikelin’ny miaramila anankiray maherifo. Nahavita asa goavana maro i Benaià. Izy no nahafaty ireo Ariela roa lahy tao Môaba; izy koa no nidina tanaty lavaka iray ka nahafaty liona tao tamin’ny indray andro nisy oram-panala. '
  '21':
  - type: text
    content: 'Mbola izy koa no nahafaty ilay Ejiptianina ranjanana izay nirongo lefona; tehina no namelezany azy, dia nosarihany teny an-tanan’ilay Ejiptianina ny lefony ka iny ihany no namonoany azy ho faty. '
  '22':
  - type: text
    content: 'Ireo no zava-bitan’i Benaià zanakalahin’i Jôiadà; ary nanan-daza mitovy amin’ireto kalaza telo lahy ireto izy. '
  '23':
  - type: text
    content: Nomen-kaja kosa i Benaià teo amin’ny «andian’ny telopolo lahy», saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy». Izy no voatendrin’i Davida hifehy ny mpiambina azy.
  '24':
  - type: text
    content: 'Ny «andian’ny telopolo lahy» dia nisy an’ireto koa:'
  - type: text
    content: 'I Hasahela rahalahin’i Jôaba; i Elehanàna zanakalahin’i Dôdao avy any Betlehema; '
  '25':
  - type: text
    content: 'i Samà avy any Harôda; i Elikà avy any Harôda; '
  '26':
  - type: text
    content: 'i Heletsa avy any Paltỳ; i Hirà zanakalahin’i Hikesy avy any Tekôa; '
  '27':
  - type: text
    content: 'i Abihezèra avy any Hanatôta; i Mebonay avy any Hosà; '
  '28':
  - type: text
    content: 'i Tsalmôna avy any Ahôa; i Maheray avy any Netôfà; '
  '29':
  - type: text
    content: 'i Heleba zanakalahin’i Bahanà avy any Netôfà; i Itàhy zanakalahin’i Ribay avy any Gibehà-n’ireo Benjaminita; '
  '3':
  - type: text
    content: Ny Andriamanitr’i Israely sady mpiaro azy
  - type: text
    content: 'no efa niteny ka nanao tamiko hoe:'
  - type: text
    content: «Ny mpanjaka izay mifehy ny olona amim-pahamarinana
  - type: text
    content: sy mitondra azy amim-panajana an’Andriamanitra
  '30':
  - type: text
    content: 'i Benaià avy any Piratôna; i Hiday avy any amin’ny lohasahan-driakan’i Gahàsa; '
  '31':
  - type: text
    content: 'i Abỳ-Halbôna avy any Harabà; i Hazmavety avy any Bahorima; '
  '32':
  - type: text
    content: 'Eliahabà avy any Sahalbôna; i Jasena avy any Gizôna; i Jônatàna, '
  '33':
  - type: text
    content: 'zanakalahin’i Samà avy any Harara; i Ahiama zanakalahin’i Sarara avy any Harara; '
  '34':
  - type: text
    content: 'i Elifelety zanakalahin’i Ahasbay ary zafikelin’olona avy any Mahàka, i Elihama zanakalahin’i Ahitôfela avy any Gilao; '
  '35':
  - type: text
    content: 'i Hetsirào avy any Karmela; i Paharay avy any Aràba; '
  '36':
  - type: text
    content: 'i Jigala zanakalahin’i Natàna avy any Tsôbà; i Banỳ avy amin’ny fokon’i Gada; '
  '37':
  - type: text
    content: 'i Tselèka, ilay Hamônita; i Naharay avy any Beerôta; mpitondra ny fiadian’i Jôaba zanakalahin’i Tserôià; '
  '38':
  - type: text
    content: 'i Hirà sy i Gareba, samy avy amin’ny fianakavian’i Jetèra; '
  '39':
  - type: text
    content: ary i Orià, ilay Hetita. Fito amby telopolo no fitambaran’ireo kalaza rehetra.
  '4':
  - type: text
    content: dia toy ny fahazavan’ny maraina
  - type: text
    content: raha miposaka ny masoandro
  - type: text
    content: amin’iny maraina tsy misy rahona iny.
  - type: text
    content: Ny tarany mafana mandimby ny orana
  - type: text
    content: no mampaniry ny ahitra amin’ny tany.»
  '5':
  - type: text
    content: Toy izany indrindra ny fianakaviako
  - type: text
    content: eo anoloan’Andriamanitra;
  - type: text
    content: fa fanekempihavanana maharitra mandrakizay
  - type: text
    content: no nataon’Andriamanitra tamiko,
  - type: text
    content: dia fanekempihavanana mirindra
  - type: text
    content: sy voatandro amin’ny lafiny rehetra.
  - type: text
    content: Ny fandresena sy ny zava-tsoa azoko
  - type: text
    content: dia Izy no ipoiran’ireny rehetra ireny.
  '6':
  - type: text
    content: Fa ny olom-poana rehetra kosa
  - type: text
    content: dia tahaka ny tsilo fanary
  - type: text
    content: ka tsy mba fandrain-tanana.
  '7':
  - type: text
    content: Izay te hikasika azy
  - type: text
    content: dia tsy maintsy mirongo
  - type: text
    content: faraingo vy na zaran-defona;
  - type: text
    content: ary ireny tsilo ireny dia dorana amin’ny afo
  - type: text
    content: eo amin’ny toerana itobiany eo ihany.
  - type: heading
    content: Ireo kalazan’i Davida
  - type: heading
    content: (Jereo 1 Tan 11.10-47)
  '8':
  - type: text
    content: 'Ireto avy ny anaran’ireo kalazan’i Davida: i Isbahala, zanakalahin’i Hakmônỳ sady filohan’ny «Tariky ny telo lahy». Izy no ilay nampandihy ny lefony hamelezana fahavalo valonjato lahy ka'
  - type: note
    content: Ao amin’ny RM mahazatra ny hoe i Isbahala... lahy ka dia azo adika hoe i Jôseby-Basebeta Takemônita no filohan’ireo manamboninahitra; izy ilay Hadinao avy any Hetsena, izay namely fahavalo valonjato lahy ka; saingy toa tsy azo antoka loatra ny RM etoana.
  - type: text
    content: ' nahafaty azy tamin’ny ady indray mandeha monja.'
  '9':
  - type: text
    content: 'Manaraka azy dia i Elehazàra, zanakalahin’i Dôdao ary zafikelin’ny lehilahy iray avy any Ahôa. Anisan’ny «Tariky ny telo lahy» kalaza izay niaraka tamin’i Davida izy, fony nihaika ny Filistinina tafangona hiady ireo. Nihemotra ny tafik’i Israely, '
