verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanambaràna farany nataon’i Davida
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no fanambaràna farany nataon’i Davida:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny hentitr’i Davida, zanakalahin’i Jisay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia teny hentitry ny lehilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay voafidin’ilay Andriamanitr’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho voasandratra ho mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady voahasohason’ireo hiran’i Israely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny 1 Sam 18.7 dia manome ohatra an-kira mankalaza ireo zava-bitan’i Davida.
      marker-yv: yv-n
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa i Elehazàra kosa niaritra ka namely ny Filistinina mandra-pahavizan’ny tanany nihazona mafy ny sabany. Fandresena miezinezina no nataon’ny TOMPO tamin’izay andro izay. Niverina nanjohy an’i Elehazàra haka ny fiadian’ireo maty no sisa nataon’ny tafika israelita.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaraka azy dia i Samà, zanakalahin’i Agè avy any Harara. Rehefa tafangona tao Lehỳ teo amin’ny saham-boanemba ny Filistinina, dia nandosiran’ny tafik’i Israely; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa nijanona teo afovoan’ny saha i Samà ka niaro izany ary namely ny Filistinina. Fandresena miezinezina no mbola nataon’ny TOMPO.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indray andro tamin’ny fararano, dia nisy telo lahy anisan’ny «andian’ny telopolo lahy» nidina ka tonga tany amin’i Davida tao amin’ny zohin’i Hadolàma, fa nisy tafiky ny Filistinina nitoby tao an-dohasahan’ny Refaîta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hadolàma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 22.1 sy nta. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Lohasahan’ny Refaîta:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 5.18 sy nta.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Davida efa tao amin’ny fiereny, raha mby tao Betlehema ny andia-miaramilan’ny Filistinina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay, dia velom-paniriana tampoka i Davida ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no hitondra rano hosotroiko avy amin’ilay fantsakana eo akaikin’ny vavahadin’i Betlehema?
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niroatra namakivaky ny tobin’ny Filistinina izy telo lahy ireto, ka nanovo rano tamin’ilay fantsakana teo akaikin’ny vavahadin’i Betlehema, ary nentiny ho any amin’i Davida; kanjo tsy nety nisotro i Davida, fa nanolotra izany ho an’ny TOMPO kosa ho fanatitra araraka, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niteny hoe: «Sanatria, TOMPO ô, raha hisotro amin’io rano io aho. Moa tsy toy ny ran’ireo lehilahy izay nanao vy very ny ainy ve io?» Ka dia tsy nety nisotro izy. Izany sy izany no nataon’ireto kalaza telo lahy ireto.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Abisay rahalahin’i Jôaba sady zanakalahin’i Tseroià, no filohan’ny «andian’ny telopolo lahy». Izy no ilay nampandihy lefona hamelezana fahavalo telonjato ka nahafaty azy; ary nanan-daza mitovy amin’ireto telo lahy ireto izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nomen-kaja avo roa heny kosa i Abisay teo amin’ny «andian’ny telopolo lahy», ka lasa lehibeny; saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy» izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Fanahin’ny TOMPO no mampiteny ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mametraka ao am-bavako ny teniny.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Benaià, avy any Kabitseela, dia zanakalahin’i Jôiadà sady zafikelin’ny miaramila anankiray maherifo. Nahavita asa goavana maro i Benaià. Izy no nahafaty ireo Ariela roa lahy tao Môaba; izy koa no nidina tanaty lavaka iray ka nahafaty liona tao tamin’ny indray andro nisy oram-panala. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola izy koa no nahafaty ilay Ejiptianina ranjanana izay nirongo lefona; tehina no namelezany azy, dia nosarihany teny an-tanan’ilay Ejiptianina ny lefony ka iny ihany no namonoany azy ho faty. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no zava-bitan’i Benaià zanakalahin’i Jôiadà; ary nanan-daza mitovy amin’ireto kalaza telo lahy ireto izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nomen-kaja kosa i Benaià teo amin’ny «andian’ny telopolo lahy», saingy tsy afaka nifaninana tamin’ny «Tariky ny telo lahy». Izy no voatendrin’i Davida hifehy ny mpiambina azy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny «andian’ny telopolo lahy» dia nisy an’ireto koa:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I Hasahela rahalahin’i Jôaba; i Elehanàna zanakalahin’i Dôdao avy any Betlehema; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Samà avy any Harôda; i Elikà avy any Harôda; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Heletsa avy any Paltỳ; i Hirà zanakalahin’i Hikesy avy any Tekôa; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Abihezèra avy any Hanatôta; i Mebonay avy any Hosà; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Tsalmôna avy any Ahôa; i Maheray avy any Netôfà; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Heleba zanakalahin’i Bahanà avy any Netôfà; i Itàhy zanakalahin’i Ribay avy any Gibehà-n’ireo Benjaminita; '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Andriamanitr’i Israely sady mpiaro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no efa niteny ka nanao tamiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny mpanjaka izay mifehy ny olona amim-pahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mitondra azy amim-panajana an’Andriamanitra
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Benaià avy any Piratôna; i Hiday avy any amin’ny lohasahan-driakan’i Gahàsa; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'i Abỳ-Halbôna avy any Harabà; i Hazmavety avy any Bahorima; '
  '32':
