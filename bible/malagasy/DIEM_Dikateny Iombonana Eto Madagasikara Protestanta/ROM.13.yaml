document_id: ROM.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoavana ny manampahefana
  - type: text
    content: 'Aoka ny olona rehetra samy hanaiky ny manampahefana ara-panjakana; fa tsy misy fahefana tsy avy amin’Andriamanitra, ary ny fahefana izay misy dia voatendrin’Andriamanitra avokoa. '
  '10':
  - type: text
    content: Izay tia dia tsy manisy ratsy ny namana; koa izay tia no mahatanteraka ny lalàna.
  - type: heading
    content: Antomotra ny fahatongavan’ny Tompo
  '11':
  - type: text
    content: Fantatrareo rahateo indrindra koa ny andro diavintsika. Izao no fotoana tokony hifohazanareo
  - type: note
    content: 'hifohazanareo: misy stf sasany ahitana hoe hifohazantsika.'
  - type: text
    content: 'amin’ny torimaso; satria ankehitriny antomotra antsika kokoa ny famonjena, fa tsy tahaka ny tamin’ny andro vao ninoantsika. '
  '12':
  - type: text
    content: 'Madiva ho lasa ny alina, ary mby akaiky ny andro. Ialao àry ny asa fanao amin’ny maizina, ka itafio ny fiadiana fampiasa amin’ny mazava. '
  '13':
  - type: text
    content: 'Aoka isika hahay hitondra tena tsara toy ny amin’ny antoandro, ka hifady ny fanaranam-po sy ny fidorohana, ny fijangajangana sy ny fihetsika tsy maotina, ny adiady sy ny fifampialonana. '
  '14':
  - type: text
    content: 'Fa itafio ny fiadian’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo, ka aza mety hotarihin’ny maha olona mpanota ho amin’ny filàndratsy.'
  '2':
  - type: text
    content: 'Koa izay manohitra ny fahefana dia mandà ny fandaharan’Andriamanitra; ary izay mandà dia mihantsy fanamelohana ho an’ny tenany. '
  '3':
  - type: text
    content: 'Fa ny mpitondra dia tsy natao hampitahorana izay manao ny tsara, fa izay manao ny ratsy. Satrinao ve ny tsy hatahotra ny manampahefana? Manaova ny tsara, fa dera no ho azonao avy amin’ny manampahefana. '
  '4':
  - type: text
    content: 'Satria mpanompon’Andriamanitra natao hahasoa anao izy. Raha ratsy kosa no ataonao, dia matahora azy; fa afaka mampihatra famaizana tokoa ny manampahefana, satria mpanompon’Andriamanitra natao haneho ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' izy amin’ny fanasaziana ny mpanao ratsy. '
  '5':
  - type: text
    content: Noho izany, dia ilaina ny manaiky, tsy dia noho ny fahatezeran’Andriamanitra fotsiny fa noho ny baikon’ny fieritreretana koa.
  '6':
  - type: text
    content: 'Izany ihany koa no antony andoavanareo hetra; fa ny mpiasam-panjakana miandraikitra izany dia mpandraharahan’Andriamanitra mitozo amin’io asa io. '
  '7':
  - type: text
    content: 'Aloavy amin’ny olona rehetra izay tokony haloha aminy avy: ny hetra amin’izay tokony handoavan-ketra, ny fadintseranana amin’izay tokony handoavam-padintseranana. Atahory izay tokony hatahorana; hajao izay tokony hohajaina'
  - type: note
    content: 'And 6-7: ampit Mt 22.21; Mk 12.17; Lk 20.25.'
  - type: text
    content: .
  - type: heading
    content: Fifankatiavana
  '8':
  - type: text
    content: 'Aoka tsy hananan’olon-trosa ianareo, afa-tsy momba ny fifankatiavana ihany; fa izay tia namana no mahatanteraka ny '
  - type: text
    content: lalàna
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Satria ny hoe «aza maka vadin’olona, aza mamono olona, aza mangalatra, aza mitsiriritra», mbamin’ny didy hafa rehetra, dia samy efa voafintina amin’ilay teny manao hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: note
    content: Jereo Eks 20.13-17; Deot 5.17-21; Lev 19.18.
  - type: text
    content: '.» '
