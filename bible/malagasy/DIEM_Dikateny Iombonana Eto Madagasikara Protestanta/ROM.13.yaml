document_id: ROM.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanoavana ny manampahefana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aoka ny olona rehetra samy hanaiky ny manampahefana ara-panjakana; fa tsy misy fahefana tsy avy amin’Andriamanitra, ary ny fahefana izay misy dia voatendrin’Andriamanitra avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izay manohitra ny fahefana dia mandà ny fandaharan’Andriamanitra; ary izay mandà dia mihantsy fanamelohana ho an’ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny mpitondra dia tsy natao hampitahorana izay manao ny tsara, fa izay manao ny ratsy. Satrinao ve ny tsy hatahotra ny manampahefana? Manaova ny tsara, fa dera no ho azonao avy amin’ny manampahefana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Satria mpanompon’Andriamanitra natao hahasoa anao izy. Raha ratsy kosa no ataonao, dia matahora azy; fa afaka mampihatra famaizana tokoa ny manampahefana, satria mpanompon’Andriamanitra natao haneho ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' izy amin’ny fanasaziana ny mpanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho izany, dia ilaina ny manaiky, tsy dia noho ny fahatezeran’Andriamanitra fotsiny fa noho ny baikon’ny fieritreretana koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany ihany koa no antony andoavanareo hetra; fa ny mpiasam-panjakana miandraikitra izany dia mpandraharahan’Andriamanitra mitozo amin’io asa io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aloavy amin’ny olona rehetra izay tokony haloha aminy avy: ny hetra amin’izay tokony handoavan-ketra, ny fadintseranana amin’izay tokony handoavam-padintseranana. Atahory izay tokony hatahorana; hajao izay tokony hohajaina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 6-7:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Mt 22.21; Mk 12.17; Lk 20.25.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifankatiavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka tsy hananan’olon-trosa ianareo, afa-tsy momba ny fifankatiavana ihany; fa izay tia namana no mahatanteraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalàna
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria ny hoe «aza maka vadin’olona, aza mamono olona, aza mangalatra, aza mitsiriritra», mbamin’ny didy hafa rehetra, dia samy efa voafintina amin’ilay teny manao hoe: «Tiavo ny namanao tahaka ny itiavanao ny tenanao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.13-17; Deot 5.17-21; Lev 19.18.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay tia dia tsy manisy ratsy ny namana; koa izay tia no mahatanteraka ny lalàna.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Antomotra ny fahatongavan’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fantatrareo rahateo indrindra koa ny andro diavintsika. Izao no fotoana tokony hifohazanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hifohazanareo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hifohazantsika.
    marker-yv: yv-n
  - type: text
    text: 'amin’ny torimaso; satria ankehitriny antomotra antsika kokoa ny famonjena, fa tsy tahaka ny tamin’ny andro vao ninoantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Madiva ho lasa ny alina, ary mby akaiky ny andro. Ialao àry ny asa fanao amin’ny maizina, ka itafio ny fiadiana fampiasa amin’ny mazava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka isika hahay hitondra tena tsara toy ny amin’ny antoandro, ka hifady ny fanaranam-po sy ny fidorohana, ny fijangajangana sy ny fihetsika tsy maotina, ny adiady sy ny fifampialonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa itafio ny fiadian’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompo, ka aza mety hotarihin’ny maha olona mpanota ho amin’ny filàndratsy.'
