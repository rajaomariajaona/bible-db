document_id: 1CH.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ireo taranak’i Jisakara
  - type: text
    content: 'Efatra ny zanakalahin’i Jisakara: dia i Tôlà sy i Povà ary i Jasoba sy i Simrôna. '
  '10':
  - type: text
    content: 'Ny zanakalahin’i Jedihaela dia i Bilehàna; ary ny zanakalahin’i Bilehàna dia i Jehisa sy i Benjamîna, i Ehôda sy i Kenahanà mbamin’i Zetàna sy i Tarsisy ary i Ahisahara. '
  '11':
  - type: text
    content: 'Ireo taranak’i Jedihaela rehetra ireo dia samy lohan’ny fianakaviany avy, ka 17 200 tao amin’ireo fianakaviana ireo no isan’ny lehilahy mahery zatra miantafika; '
  '12':
  - type: text
    content: '...sy i Sofama ary i Hofama'
  - type: note
    content: 'sy i Sofama ary i Hofama: sy i Sopima ary i Hopîma no ao amin’ny RM, kanefa nahitsy araka ny Nom 26.39; ary toa misy fehezan-teny na andian-teny latsaka eo alohan’ireo anarana ireo. –Namboarina araka ny Gen 46.23 ny dkt eto amin’ity fehezanteny ity.'
  - type: text
    content: .
  - type: text
    content: Ny zanakalahin’i Dana dia i Hosîma, izay zanany lahitokana.
  '13':
  - type: text
    content: 'Ny zanakalahin’i Naftalỳ dia i Jahasiela sy i Gonỳ ary i Jetsera sy i Saloma: samy zafin’i Bilehà'
  - type: note
    content: 'Bilehà: renin’i Naftalỳ, araka ny Gen 30.7-8.'
  - type: text
    content: ' ireo.'
  - type: heading
    content: Ny taranak’i Manase, tatỳ andrefan’i Jôrdàna
  '14':
  - type: text
    content: 'Ny zanakalahin’i Manase dia i Asriela sy i Makira; ilay vehivavy sirianina, vadikelin’i Manase, no niteraka azy roa lahy. I Makira no rain’i Gilehada. '
  '15':
  - type: text
    content: Naka vady ho an’i Hopima sy ho an’i Sopima i Makira
  - type: note
    content: 'Naka vady... i Makira: toa tongatonga ho azy fotsiny eto ity fehezanteny ity.'
  - type: text
    content: '. Ny anaran’ny vadin’i Makira dia i Mahekà, ary ny anaran’ny lahiaivony dia i Tselôfahada izay tsy nanana afa-tsy zanakavavy. '
  '16':
  - type: text
    content: 'I Mahekà, vadin’i Makira, dia mbola niteraka zazalahy anankiray ka i Peresa no anarana niantsoan-dreniny azy; i Seresa no anaran’ny rahalahin’i Peresa; ny zanak’i Seresa roa lahy dia i Olana sy i Rekema; '
  '17':
  - type: text
    content: ary ny zanakalahin’i Olama dia i Bedàna. Ireo no taranak’i Gilehada zanakalahin’i Makira
  - type: note
    content: 'Gilehada: hafahafa ihany satria toa i Makira na i Manase no tompon-taranaka.'
  - type: text
    content: ' sy zafin’i Manase.'
  '18':
  - type: text
    content: 'I Môleketa, anabavin’i Gilehada, dia niteraka an’i Isehôda sy i Abihezera ary i Mahalà. '
  '19':
  - type: text
    content: Ny zanakalahin’i Semidà
  - type: note
    content: 'Semidà: jereo Nom 26.32; Jos 17.2.'
  - type: text
    content: ' kosa dia i Ahiàna sy i Sekema ary i Likehỳ sy i Anihama.'
  - type: heading
    content: Ny taranak’i Efraîma
  '2':
  - type: text
    content: 'Ny zanakalahin’i Tôlà dia i Hozỳ sy i Refaià, i Jeriela sy i Jahimay ary i Jibsama sy i Samoela izay samy lohan’ireo fianakaviana nipoitra avy tamin’i Tôlà sady samy lehilahy mahery teo anatrehan’ny taranany. Tamin’ny andron’i Davida, dia 22 600 no isan’ny terak’i Tôlà. '
  '20':
  - type: text
    content: Ny zanakalahin’i Efraîma dia i Sotela sy i Hezera ary i Elehada. (I Bereda no zanakalahin’i Sotela, i Tahàna
  - type: note
    content: 'Tahàna: Tahàta no ao amin’ny RM, kanefa jereo Nom 26.35.'
  - type: text
    content: ' zanakalahin’i Bereda, i Elehadà zanakalahin’i Tahàna, i Tahata zanakalahin’i Elehadà, '
  '21':
  - type: text
    content: 'i Zabada zanakalahin’i Tahata, i Sotela zanakalahin’i Zabada). I Hezera sy i Elehada dia novonoin’ireo lehilahy tompon-tany tao Gata ho faty, satria nidina hangalatra ny biby fiompiny. '
  '22':
  - type: text
    content: 'Nisaona azy mirahalahy ela i Efraîma rainy, ary tonga ireo havany hampionona azy. '
  '23':
  - type: text
    content: Niray tamin’ny vadiny indray i Efraîma, dia nanana anaka ravehivavy ka nitera-dahy; ary nataon-drainy hoe Berihà ny anaran’ny zaza, satria nitoetra tao an-trano hatrany ity reniny noho ny fahoriana
  - type: note
    content: Amin’ny fiteny hebreo, dia misy tsilalaon-teny eo amin’ny anarana hoe Berihà sy eo amin’ny voambolana hoe fahoriana.
  - type: text
    content: 'nidona. '
  '24':
  - type: text
    content: 'Ny zanakavavin’i Efraîma dia i Seerà, izay nanorina an’i Bety-Hôrôna ambany sy i Bety-Hôrôna ambony ary i Ozena-Seerà. '
  '25':
  - type: text
    content: 'I Refa no zanakalahin’i Berihà, i Resefa zanakalahin’i Refa, i Telà zanakalahin’i Resefa, i Tahàna zanakalahin’i Telà, '
  '26':
  - type: text
    content: 'i Lahadàna zanakalahin’i Tahàna, i Hamihoda zanakalahin’i Lahadàna, i Elisamà zanakalahin’i Hamihoda, '
  '27':
  - type: text
    content: i Nona zanakalahin’i Elisamà, i Josoa zanakalahin’i Nona.
  '28':
  - type: text
    content: 'Ny anjara tany amam-ponenan’ny taranak’i Efraîma dia ireto avy: i Betela mbamin’ireo tanàna kely miankina aminy; i Naharà, teo atsinanana; i Gezera mbamin’ireo tanàna kely miankina aminy, tao andrefana; i Sekema mbamin’ireo tanàna kely miankina aminy, hatrany Haià mbamin’ireo tanàna kely miankina aminy.'
  '29':
  - type: text
    content: Teo am-pelatanan’ny taranak’i Manase kosa i Bety-Seàna sy i Tahanàka ary i Megidao sy i Dôra, mbamin’ireo tanàna kely samy miankina aminy avy.
  - type: text
    content: Tamin’ireo tanàna ireo no nonenan’ny taranak’i Jôsefa, zanakalahin’i Jakôba.
  - type: heading
    content: Ny taranak’i Asera
  '3':
  - type: text
    content: 'Ny zanakalahin’i Hozỳ dia i Jizrahià; ny zanakalahin’i Jizrahià dia i Mikaela sy i Hôbadià ary i Joela sy i Jisià: izy dimy mianaka ireto dia samy loham-pianakaviana avokoa; '
  '30':
  - type: text
    content: 'Ny zanakalahin’i Asera dia ry i Jimnà sy i Jisvà ary i Jisvỳ sy i Berihà; (i Sera no anabavin’ireo). '
  '31':
  - type: text
    content: 'Ny zanakalahin’i Berihà dia i Hebera sy i Malkiela: (ity Malkiela ity no mpanorina an’i Birzaîta'
  - type: note
    content: 'Birzaîta: toa anaran-tanàna mimanda.'
  - type: text
    content: '). '
  '32':
  - type: text
    content: 'I Hebera niteraka an-dry i Jafleta sy i Semera ary i Hôtama mirahalahy mbamin’i Sohà anabavin’ireo. '
  '33':
  - type: text
    content: 'Ny zanakalahin’i Jafleta dia i Pasako sy i Bimehala ary i Hasvata: ireo no zanakalahin’i Jafleta. '
  '34':
  - type: text
    content: 'Ny zanakalahin’i Semera, rahalahin’i Jafleta, dia i Ahỳ sy i Rôhagà ary i Hobà sy i Arama. '
  '35':
  - type: text
    content: Ny zanakalahin’i Hôtama
  - type: note
    content: 'Hôtama: araka ny and 32; Helema no eto araka ny RM.'
  - type: text
    content: ', rahalahin’i Semera, dia i Tsôfa sy i Jimnà ary i Selesa sy i Hamala. '
  '36':
  - type: text
    content: 'Ny zanakalahin’i Tsôfa dia i Soha sy, i Harnefera, i Sohaly sy i Berỳ, i Jimrà '
  '37':
  - type: text
    content: 'sy i Betsera, i Hôda sy i Samà mbamin’i Silsà sy i Jitràna ary i Beerà. '
  '38':
  - type: text
    content: Ny zanakalahin’i Jitràna dia i Jefonè sy i Pispà ary i Erà.
  '39':
  - type: text
    content: Ny zanakalahin’i Holà dia i Ara sy i Haniela ary i Ritsià
  - type: note
    content: Tsy misy fahita amina lisitra hafa momba ny taranak’i Asera velively ny anaran’olona voatanisa eto amin’ity and ity.
  - type: text
    content: .
  '4':
  - type: text
    content: maro vady aman-janaka ny taranany, isam-pianakaviany, ka lehilahy mahery zatra miantafika 36 000 no nananany.
  '40':
  - type: text
    content: 'Taranak’i Asera avokoa ireo: samy loham-pianakaviany avy, samy olomanga, samy lehilahy mahery, samy mpitondra mamiratra; ary dia 26 000 teo amin’ny taranak’i Asera no isan’ny miaramila mpiantafika.'
  '5':
  - type: text
    content: Ireo havany, ho an’ny fianakaviana sisa rehetra avy amin’ny fokon’i Jisakara, dia miisa 87 000 izy rehetra no lehilahy mahery.
  - type: heading
    content: Ny taranak’i Benjamîna sy i Dana ary i Naftalỳ
  '6':
  - type: text
    content: 'Telo ny zanakalahin’i Benjamîna: dia i Bela sy i Bekera ary i Jedihaela. '
  '7':
  - type: text
    content: 'Dimy ny zanakalahin’i Bela: dia i Etsebôna sy i Hozỳ mbamin’i Hoziela sy i Jerimôta ary i Hirỳ; samy lohan’ny fianakaviany avy izy dimy ireto, samy lehilahy mahery, ary dia 22 034 no isan’ny taranany. '
  '8':
  - type: text
    content: 'Ny zanakalahin’i Bekera dia i Zemirà sy i Jôhasa, i Elihezera sy i Eliôhenay, i Hômrỳ sy i Jeremôta mbamin’i Abià sy i Hanatôta ary i Halmeta: '
  '9':
  - type: text
    content: 'zanakalahin’i Bekera ireo rehetra ireo, samy lohan’ny fianakaviany avy, samy lehilahy mahery, ary dia 20 200 no isan’ny taranany. '
