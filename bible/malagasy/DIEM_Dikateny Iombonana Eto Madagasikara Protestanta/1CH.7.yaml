document_id: 1CH.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo taranak’i Jisakara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efatra ny zanakalahin’i Jisakara: dia i Tôlà sy i Povà ary i Jasoba sy i Simrôna. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny zanakalahin’i Tôlà dia i Hozỳ sy i Refaià, i Jeriela sy i Jahimay ary i Jibsama sy i Samoela izay samy lohan’ireo fianakaviana nipoitra avy tamin’i Tôlà sady samy lehilahy mahery teo anatrehan’ny taranany. Tamin’ny andron’i Davida, dia 22 600 no isan’ny terak’i Tôlà. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Hozỳ dia i Jizrahià; ny zanakalahin’i Jizrahià dia i Mikaela sy i Hôbadià ary i Joela sy i Jisià: izy dimy mianaka ireto dia samy loham-pianakaviana avokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: maro vady aman-janaka ny taranany, isam-pianakaviany, ka lehilahy mahery zatra miantafika 36 000 no nananany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ireo havany, ho an’ny fianakaviana sisa rehetra avy amin’ny fokon’i Jisakara, dia miisa 87 000 izy rehetra no lehilahy mahery.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Benjamîna sy i Dana ary i Naftalỳ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Telo ny zanakalahin’i Benjamîna: dia i Bela sy i Bekera ary i Jedihaela. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dimy ny zanakalahin’i Bela: dia i Etsebôna sy i Hozỳ mbamin’i Hoziela sy i Jerimôta ary i Hirỳ; samy lohan’ny fianakaviany avy izy dimy ireto, samy lehilahy mahery, ary dia 22 034 no isan’ny taranany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zanakalahin’i Bekera dia i Zemirà sy i Jôhasa, i Elihezera sy i Eliôhenay, i Hômrỳ sy i Jeremôta mbamin’i Abià sy i Hanatôta ary i Halmeta: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'zanakalahin’i Bekera ireo rehetra ireo, samy lohan’ny fianakaviany avy, samy lehilahy mahery, ary dia 20 200 no isan’ny taranany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Jedihaela dia i Bilehàna; ary ny zanakalahin’i Bilehàna dia i Jehisa sy i Benjamîna, i Ehôda sy i Kenahanà mbamin’i Zetàna sy i Tarsisy ary i Ahisahara. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo taranak’i Jedihaela rehetra ireo dia samy lohan’ny fianakaviany avy, ka 17 200 tao amin’ireo fianakaviana ireo no isan’ny lehilahy mahery zatra miantafika; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '...sy i Sofama ary i Hofama'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sy i Sofama ary i Hofama: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sy i Sopima ary i Hopîma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no ao amin’ny RM, kanefa nahitsy araka ny Nom 26.39; ary toa misy fehezan-teny na andian-teny latsaka eo alohan’ireo anarana ireo. –Namboarina araka ny Gen 46.23 ny dkt eto amin’ity fehezanteny ity.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny zanakalahin’i Dana dia i Hosîma, izay zanany lahitokana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zanakalahin’i Naftalỳ dia i Jahasiela sy i Gonỳ ary i Jetsera sy i Saloma: samy zafin’i Bilehà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Bilehà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: renin’i Naftalỳ, araka ny Gen 30.7-8.
    marker-yv: yv-n
  - type: text
    text: ' ireo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Manase, tatỳ andrefan’i Jôrdàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny zanakalahin’i Manase dia i Asriela sy i Makira; ilay vehivavy sirianina, vadikelin’i Manase, no niteraka azy roa lahy. I Makira no rain’i Gilehada. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Naka vady ho an’i Hopima sy ho an’i Sopima i Makira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Naka vady... i Makira: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa tongatonga ho azy fotsiny eto ity fehezanteny ity.
    marker-yv: yv-n
  - type: text
    text: '. Ny anaran’ny vadin’i Makira dia i Mahekà, ary ny anaran’ny lahiaivony dia i Tselôfahada izay tsy nanana afa-tsy zanakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Mahekà, vadin’i Makira, dia mbola niteraka zazalahy anankiray ka i Peresa no anarana niantsoan-dreniny azy; i Seresa no anaran’ny rahalahin’i Peresa; ny zanak’i Seresa roa lahy dia i Olana sy i Rekema; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary ny zanakalahin’i Olama dia i Bedàna. Ireo no taranak’i Gilehada zanakalahin’i Makira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gilehada: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hafahafa ihany satria toa i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Makira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Manase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no tompon-taranaka.'
    marker-yv: yv-n
  - type: text
    text: ' sy zafin’i Manase.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I Môleketa, anabavin’i Gilehada, dia niteraka an’i Isehôda sy i Abihezera ary i Mahalà. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny zanakalahin’i Semidà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Semidà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 26.32; Jos 17.2.
    marker-yv: yv-n
  - type: text
    text: ' kosa dia i Ahiàna sy i Sekema ary i Likehỳ sy i Anihama.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Efraîma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakalahin’i Efraîma dia i Sotela sy i Hezera ary i Elehada. (I Bereda no zanakalahin’i Sotela, i Tahàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tahàna: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tahàta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no ao amin’ny RM, kanefa jereo Nom 26.35.'
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Bereda, i Elehadà zanakalahin’i Tahàna, i Tahata zanakalahin’i Elehadà, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Zabada zanakalahin’i Tahata, i Sotela zanakalahin’i Zabada). I Hezera sy i Elehada dia novonoin’ireo lehilahy tompon-tany tao Gata ho faty, satria nidina hangalatra ny biby fiompiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nisaona azy mirahalahy ela i Efraîma rainy, ary tonga ireo havany hampionona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Niray tamin’ny vadiny indray i Efraîma, dia nanana anaka ravehivavy ka nitera-dahy; ary nataon-drainy hoe Berihà ny anaran’ny zaza, satria nitoetra tao an-trano hatrany ity reniny noho ny fahoriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Amin’ny fiteny hebreo, dia misy tsilalaon-teny eo amin’ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Berihà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy eo amin’ny voambolana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahoriana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'nidona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanakavavin’i Efraîma dia i Seerà, izay nanorina an’i Bety-Hôrôna ambany sy i Bety-Hôrôna ambony ary i Ozena-Seerà. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I Refa no zanakalahin’i Berihà, i Resefa zanakalahin’i Refa, i Telà zanakalahin’i Resefa, i Tahàna zanakalahin’i Telà, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'i Lahadàna zanakalahin’i Tahàna, i Hamihoda zanakalahin’i Lahadàna, i Elisamà zanakalahin’i Hamihoda, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: i Nona zanakalahin’i Elisamà, i Josoa zanakalahin’i Nona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny anjara tany amam-ponenan’ny taranak’i Efraîma dia ireto avy: i Betela mbamin’ireo tanàna kely miankina aminy; i Naharà, teo atsinanana; i Gezera mbamin’ireo tanàna kely miankina aminy, tao andrefana; i Sekema mbamin’ireo tanàna kely miankina aminy, hatrany Haià mbamin’ireo tanàna kely miankina aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Teo am-pelatanan’ny taranak’i Manase kosa i Bety-Seàna sy i Tahanàka ary i Megidao sy i Dôra, mbamin’ireo tanàna kely samy miankina aminy avy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’ireo tanàna ireo no nonenan’ny taranak’i Jôsefa, zanakalahin’i Jakôba.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak’i Asera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny zanakalahin’i Asera dia ry i Jimnà sy i Jisvà ary i Jisvỳ sy i Berihà; (i Sera no anabavin’ireo). '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny zanakalahin’i Berihà dia i Hebera sy i Malkiela: (ity Malkiela ity no mpanorina an’i Birzaîta'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Birzaîta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa anaran-tanàna mimanda.
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I Hebera niteraka an-dry i Jafleta sy i Semera ary i Hôtama mirahalahy mbamin’i Sohà anabavin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny zanakalahin’i Jafleta dia i Pasako sy i Bimehala ary i Hasvata: ireo no zanakalahin’i Jafleta. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny zanakalahin’i Semera, rahalahin’i Jafleta, dia i Ahỳ sy i Rôhagà ary i Hobà sy i Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny zanakalahin’i Hôtama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hôtama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny and 32; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Helema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no eto araka ny RM.'
    marker-yv: yv-n
  - type: text
    text: ', rahalahin’i Semera, dia i Tsôfa sy i Jimnà ary i Selesa sy i Hamala. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny zanakalahin’i Tsôfa dia i Soha sy, i Harnefera, i Sohaly sy i Berỳ, i Jimrà '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy i Betsera, i Hôda sy i Samà mbamin’i Silsà sy i Jitràna ary i Beerà. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ny zanakalahin’i Jitràna dia i Jefonè sy i Pispà ary i Erà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny zanakalahin’i Holà dia i Ara sy i Haniela ary i Ritsià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy misy fahita amina lisitra hafa momba ny taranak’i Asera velively ny anaran’olona voatanisa eto amin’ity and ity.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Taranak’i Asera avokoa ireo: samy loham-pianakaviany avy, samy olomanga, samy lehilahy mahery, samy mpitondra mamiratra; ary dia 26 000 teo amin’ny taranak’i Asera no isan’ny miaramila mpiantafika.'
