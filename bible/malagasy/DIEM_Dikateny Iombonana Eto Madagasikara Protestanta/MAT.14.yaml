document_id: MAT.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jôhany Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 6.14-29; Lk 9.7-9)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany, dia ren’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' mpanjaka ny lazan’i Jesoa, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary naniraka olona i Herôda hanapa-doha an’i Jôhany tany am-ponja. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nentina an-dovia ny lohan’i Jôhany; ka nomena an-drazazavavy, ary nentina tany amin-dreniny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tonga kosa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatr
    - type: text
      text: ’i Jôhany, ka naka ny faty sy nandevina azy, ary lasa nilaza tamin’i Jesoa ny zava-nitranga.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 6.30-44; Lk 9.10-17; Jôh 6.1-14)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nony nahare izany i Jesoa, dia niala teo ka niondrana an-tsambokely mba hitokana any an-taniefitra. Vao nandre ny foto-dian’i Jesoa ny vahoaka, dia niainga avy amin’ny tanàna samihafa ka nizotra ny moron-drano nanaraka Azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rehefa nidina avy ao an-tsambokely i Jesoa, dia nahita vahoaka marobe, ka onena azy ka nanasitrana ny marary teo aminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nony hariva ny andro, dia nanatona an’i Jesoa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Taniefitra ity toerana ity ary ny andro efa hariva; koa ravao ny vahoaka mba hamonjy tanàna hividy sakafo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy tokony handeha izy; ianareo no aoka hanome hanina azy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy ny mpianatra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy misy afa-tsy mofo dimy sy trondro anankiroa atỳ aminay.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ento atỳ amiko izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nasain’i Jesoa nipetraka teny amin’ny ahitra ny vahoaka. Noraisin’i Jesoa tamin’izay ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra ka nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianatra; ny mpianatra kosa nandroso izany tamin’ny vahoaka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary hoy izy tamin’ny mpanompony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Jôhany Mpanao batisa izay: efa maty izy no velona indray, ka izany no ananany hery ahavitany asa mahagaga.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia samy nihinana avokoa izy rehetra ka voky. Ary nentin’ireo mpianatra ny tapa-mofo aman-trondro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nihinana... ka voky: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 15.12. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tapa-mofo aman-trondro:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tsy hoe sombintsombin-javatra sisa, fa anjara mahavoky tsara ny olona iray sady tsy mbola nokasihina.'
      marker-yv: yv-n
    - type: text
      text: ' ambiny ka nahafeno sobika 12. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nefa dia tokony ho dimy arivo ny vatan-dehilahy nihinana teo, afa-tsy ny zaza amam-behivavy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Momba ny and 17-21, ampit 2 Mp 4.42-44.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Andehanan’i Jesoa an-tongotra eny ambony rano
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 6.45-52; Jôh 6.15-21)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vetivety foana taorian’izay, dia noteren’i Jesoa hiditra tao an-tsambokely ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' ary nasainy hialoha Azy eny ampita; fa Izy mbola handefa ny vahoaka hody. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Rehefa avy nandefa ny vahoaka i Jesoa, dia niakatra tany an-tendrombohitra mba hitokana hivavaka. Nony maizina ny andro, dia i Jesoa irery sisa teo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny sambokely tamin’izay dia efa kilaometatra vitsivitsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'kilaometatra vitsivitsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ara-bakiteny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stady maromaro
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ny stady anankiray dia 185 metatra). Misy stf maro ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: teo ampovoan’ny farihy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (jereo 6.47): 12 kilaometatra anefa ny sakan’ny farihy farany mivelatra indrindra.'
      marker-yv: yv-n
    - type: text
      text: ' avy eny amorona ary natopatopan’ny alon-drano, satria notohain’ny rivotra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary tamin’ny maraina efa naneno akoho, dia lasa nanatona ny mpianany i Jesoa, nandeha teny ambony rano. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Kanjo nahatazana an’i Jesoa nandeha teny ambony rano ireo mpianatra ka raiki-tahotra sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Matoatoa io!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niantsoantso mafy ny mpianatra noho ny tahotra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avy hatrany anefa dia niteny i Jesoa nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahereza, fa Izaho ity; aoka izay ny tahotra!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, raha Ianao tokoa, dia asaovy mankeny aminao eny ambony rano aho.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niala tao an-tsambokely i Petera ka nandeha teny ambony rano hankeny amin’i Jesoa. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I Herôda manko no nampisambotra an’i Jôhany ary nampigadra azy sy nampanao azy am-ponja; ny amin’i Herôdiada, vadin’i Filipo rahalahin’i Herôda, no antony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Kanjo nony hitan’i Petera fa nahery ny rivotra, dia natahotra izy; ary raha nanomboka nilentika izy, dia niantsoantso mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tompo ô, vonjeo aho!
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Avy hatrany i Jesoa dia nanatsotra tanana ka nandray an’i Petera ary nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry kely finoana, nahoana no nisalasala ianao?
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary rehefa tafakatra tao an-tsambokely i Jesoa sy i Petera, dia nitsahatra ny rivotra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ry zareo tao an-tsambokely kosa niankohoka teo anatrehan’i Jesoa sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tena Zanak’Andriamanitra tokoa Ianao!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ireo marary tao Genesareta
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 6.53-56)
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Nony tafita ny rano i Jesoa mbamin’ny mpianany, dia tonga teo amin’ny faritanin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Genesareta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mk 6.53 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Nahafantatra an’i Jesoa ny tompon-tany tao, ka nandefa iraka teny amin’ny tany rehetra manodidina hilaza ny fahatongavany; ary dia nentin’ny olona teo amin’i Jesoa ny marary rehetra. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Niangavian’ny olona Izy mba hamela ny marary hikasika na dia ny somotraviavin-dambany ihany aza; ary izay rehetra nikasika dia sitrana avokoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy i Jôhany tamin’i Herôda:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy azonao atao ny manambady an’i Herôdiada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 18.16; 20.21; Eks 20.13,17; Deot 5.17,17.
      marker-yv: yv-n
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nifofo ny ain’i Jôhany i Herôda, saingy natahotra ny vahoaka jiosy, satria noheverin-dry zareo ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanin
    - type: text
      text: '’Andriamanitra i Jôhany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony tonga anefa ny fitsingerenan’ny andro nahaterahan’i Herôda, dia nandihy teo anatrehan’ny olona nasaina ny zanakavavin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôdiada
    - type: text
      text: ' ka nahafaly an’i Herôda. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Noho izany, dia niozonozona mihitsy ity mpanjaka fa hanome an-drazazavavy ny zavatra hangatahiny na inona na inona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehefa nomen-dreniny hevitra razazavavy, dia niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy etoana an-dovia ny lohan’i Jôhany Mpanao batisa!
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nalahelo ny mpanjaka; saingy noho izy niozonozona teo anatrehan’ny olona niara-nisakafo taminy, dia nasainy homena an-drazazavavy izany. '
