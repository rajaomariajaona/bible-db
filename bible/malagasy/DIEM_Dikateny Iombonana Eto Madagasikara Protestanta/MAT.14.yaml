document_id: MAT.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mk 6.14-29; Lk 9.7-9)
  - type: text
    content: 'Tamin’izany andro izany, dia ren’i '
  - type: text
    content: Herôda
  - type: text
    content: ' mpanjaka ny lazan’i Jesoa, '
  '10':
  - type: text
    content: 'Ary naniraka olona i Herôda hanapa-doha an’i Jôhany tany am-ponja. '
  '11':
  - type: text
    content: 'Dia nentina an-dovia ny lohan’i Jôhany; ka nomena an-drazazavavy, ary nentina tany amin-dreniny. '
  '12':
  - type: text
    content: 'Tonga kosa ny '
  - type: text
    content: mpianatr
  - type: text
    content: ’i Jôhany, ka naka ny faty sy nandevina azy, ary lasa nilaza tamin’i Jesoa ny zava-nitranga.
  - type: heading
    content: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
  - type: heading
    content: (Jereo Mk 6.30-44; Lk 9.10-17; Jôh 6.1-14)
  '13':
  - type: text
    content: 'Nony nahare izany i Jesoa, dia niala teo ka niondrana an-tsambokely mba hitokana any an-taniefitra. Vao nandre ny foto-dian’i Jesoa ny vahoaka, dia niainga avy amin’ny tanàna samihafa ka nizotra ny moron-drano nanaraka Azy. '
  '14':
  - type: text
    content: Rehefa nidina avy ao an-tsambokely i Jesoa, dia nahita vahoaka marobe, ka onena azy ka nanasitrana ny marary teo aminy.
  '15':
  - type: text
    content: 'Nony hariva ny andro, dia nanatona an’i Jesoa ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ka nanao hoe:'
  - type: text
    content: –Taniefitra ity toerana ity ary ny andro efa hariva; koa ravao ny vahoaka mba hamonjy tanàna hividy sakafo.
  '16':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Tsy tokony handeha izy; ianareo no aoka hanome hanina azy.
  '17':
  - type: text
    content: 'Dia hoy ny mpianatra taminy:'
  - type: text
    content: –Tsy misy afa-tsy mofo dimy sy trondro anankiroa atỳ aminay.
  '18':
  - type: text
    content: 'Ary hoy i Jesoa:'
  - type: text
    content: –Ento atỳ amiko izany.
  '19':
  - type: text
    content: 'Dia nasain’i Jesoa nipetraka teny amin’ny ahitra ny vahoaka. Noraisin’i Jesoa tamin’izay ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra ka nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianatra; ny mpianatra kosa nandroso izany tamin’ny vahoaka. '
  '2':
  - type: text
    content: 'ary hoy izy tamin’ny mpanompony:'
  - type: text
    content: '–I Jôhany Mpanao batisa izay: efa maty izy no velona indray, ka izany no ananany hery ahavitany asa mahagaga.'
  '20':
  - type: text
    content: Dia samy nihinana avokoa izy rehetra ka voky. Ary nentin’ireo mpianatra ny tapa-mofo aman-trondro
  - type: note
    content: 'nihinana... ka voky: jereo Eks 15.12. –tapa-mofo aman-trondro: tsy hoe sombintsombin-javatra sisa, fa anjara mahavoky tsara ny olona iray sady tsy mbola nokasihina.'
  - type: text
    content: ' ambiny ka nahafeno sobika 12. '
  '21':
  - type: text
    content: Nefa dia tokony ho dimy arivo ny vatan-dehilahy nihinana teo, afa-tsy ny zaza amam-behivavy
  - type: note
    content: Momba ny and 17-21, ampit 2 Mp 4.42-44.
  - type: text
    content: .
  - type: heading
    content: Andehanan’i Jesoa an-tongotra eny ambony rano
  - type: heading
    content: (Jereo Mk 6.45-52; Jôh 6.15-21)
  '22':
  - type: text
    content: 'Vetivety foana taorian’izay, dia noteren’i Jesoa hiditra tao an-tsambokely ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ' ary nasainy hialoha Azy eny ampita; fa Izy mbola handefa ny vahoaka hody. '
  '23':
  - type: text
    content: 'Rehefa avy nandefa ny vahoaka i Jesoa, dia niakatra tany an-tendrombohitra mba hitokana hivavaka. Nony maizina ny andro, dia i Jesoa irery sisa teo. '
  '24':
  - type: text
    content: Ny sambokely tamin’izay dia efa kilaometatra vitsivitsy
  - type: note
    content: 'kilaometatra vitsivitsy: ara-bakiteny stady maromaro (ny stady anankiray dia 185 metatra). Misy stf maro ahitana hoe teo ampovoan’ny farihy (jereo 6.47): 12 kilaometatra anefa ny sakan’ny farihy farany mivelatra indrindra.'
  - type: text
    content: ' avy eny amorona ary natopatopan’ny alon-drano, satria notohain’ny rivotra. '
  '25':
  - type: text
    content: 'Ary tamin’ny maraina efa naneno akoho, dia lasa nanatona ny mpianany i Jesoa, nandeha teny ambony rano. '
  '26':
  - type: text
    content: 'Kanjo nahatazana an’i Jesoa nandeha teny ambony rano ireo mpianatra ka raiki-tahotra sady nanao hoe:'
  - type: text
    content: –Matoatoa io!
  - type: text
    content: 'Niantsoantso mafy ny mpianatra noho ny tahotra. '
  '27':
  - type: text
    content: 'Avy hatrany anefa dia niteny i Jesoa nanao taminy hoe:'
  - type: text
    content: –Mahereza, fa Izaho ity; aoka izay ny tahotra!
  '28':
  - type: text
    content: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: text
    content: –Tompo ô, raha Ianao tokoa, dia asaovy mankeny aminao eny ambony rano aho.
  '29':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: –Avia!
  - type: text
    content: 'Ary niala tao an-tsambokely i Petera ka nandeha teny ambony rano hankeny amin’i Jesoa. '
  '3':
  - type: text
    content: 'I Herôda manko no nampisambotra an’i Jôhany ary nampigadra azy sy nampanao azy am-ponja; ny amin’i Herôdiada, vadin’i Filipo rahalahin’i Herôda, no antony. '
  '30':
  - type: text
    content: 'Kanjo nony hitan’i Petera fa nahery ny rivotra, dia natahotra izy; ary raha nanomboka nilentika izy, dia niantsoantso mafy hoe:'
  - type: text
    content: –Tompo ô, vonjeo aho!
  '31':
  - type: text
    content: 'Avy hatrany i Jesoa dia nanatsotra tanana ka nandray an’i Petera ary nanao taminy hoe:'
  - type: text
    content: –Ry kely finoana, nahoana no nisalasala ianao?
  '32':
  - type: text
    content: 'Ary rehefa tafakatra tao an-tsambokely i Jesoa sy i Petera, dia nitsahatra ny rivotra. '
  '33':
  - type: text
    content: 'Ry zareo tao an-tsambokely kosa niankohoka teo anatrehan’i Jesoa sady niteny hoe:'
  - type: text
    content: –Tena Zanak’Andriamanitra tokoa Ianao!
  - type: heading
    content: Sitranin’i Jesoa ireo marary tao Genesareta
  - type: heading
    content: (Jereo Mk 6.53-56)
  '34':
  - type: text
    content: 'Nony tafita ny rano i Jesoa mbamin’ny mpianany, dia tonga teo amin’ny faritanin’i '
  - type: text
    content: Genesareta
  - type: note
    content: Jereo Mk 6.53 sy nta.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Nahafantatra an’i Jesoa ny tompon-tany tao, ka nandefa iraka teny amin’ny tany rehetra manodidina hilaza ny fahatongavany; ary dia nentin’ny olona teo amin’i Jesoa ny marary rehetra. '
  '36':
  - type: text
    content: Niangavian’ny olona Izy mba hamela ny marary hikasika na dia ny somotraviavin-dambany ihany aza; ary izay rehetra nikasika dia sitrana avokoa.
  '4':
  - type: text
    content: 'Fa hoy i Jôhany tamin’i Herôda:'
  - type: text
    content: –Tsy azonao atao ny manambady an’i Herôdiada
  - type: note
    content: Jereo Lev 18.16; 20.21; Eks 20.13,17; Deot 5.17,17.
  - type: text
    content: '!'
  '5':
  - type: text
    content: 'Dia nifofo ny ain’i Jôhany i Herôda, saingy natahotra ny vahoaka jiosy, satria noheverin-dry zareo ho '
  - type: text
    content: mpaminanin
  - type: text
    content: '’Andriamanitra i Jôhany. '
  '6':
  - type: text
    content: 'Nony tonga anefa ny fitsingerenan’ny andro nahaterahan’i Herôda, dia nandihy teo anatrehan’ny olona nasaina ny zanakavavin’i '
  - type: text
    content: Herôdiada
  - type: text
    content: ' ka nahafaly an’i Herôda. '
  '7':
  - type: text
    content: 'Noho izany, dia niozonozona mihitsy ity mpanjaka fa hanome an-drazazavavy ny zavatra hangatahiny na inona na inona. '
  '8':
  - type: text
    content: 'Rehefa nomen-dreniny hevitra razazavavy, dia niteny hoe:'
  - type: text
    content: –Omeo ahy etoana an-dovia ny lohan’i Jôhany Mpanao batisa!
  '9':
  - type: text
    content: 'Nalahelo ny mpanjaka; saingy noho izy niozonozona teo anatrehan’ny olona niara-nisakafo taminy, dia nasainy homena an-drazazavavy izany. '
