document_id: GEN.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nihaonan’i Jakôba tamin’i Hesao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitazana i Jakôba ka nahita an’i Hesao tamy miaraka amin’ny olona efajato lahy. Koa nozarainy tamin’i Leà sy i Rahely ary ny mpanompovavy roa ireo zaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nataony lohalalana ireo mpanompovavy sy ny zanany, dia nanaraka azy i Leà sy ireo zanany, ary tatỳ afara i Rahely sy i Jôsefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I Jakôba kosa no nandeha teo alohan’izy rehetra. Niankohoka impito tamin’ny tany i Jakôba mandra-pahatongany teo amin’i Hesao rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihazakazaka nitsena azy i Hesao, ka namihina ny vozony sady nanoroka azy; ary niara-nitomany izy mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony nahita ireo zaza amam-behivavy i Hesao, dia nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary iza ireto miaraka aminao ireto?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hoy kosa i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ireo no zaza nomen’Andriamanitra ahy mpanomponao noho ny fahasoavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanatona ireo mpanompovavy sy ny zanany ka niankohoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nanatona ihany koa i Leà sy ny zanany ka niankohoka; ary farany dia nanatona koa i Jôsefa sy i Rahely ka niankohoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nanontany i Hesao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona moa no anton’ny nandefasanao ireny fanomezana rehetra izay nifanena tamiko ireny?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ka hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba handraisanao ahy tsara, tompokolahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy i Hesao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manambe aho, ry rahalahy; aoka ho anao ihany ny anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia novalian’i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aza manao izany re ianao, fa raha mba sitrakao ihany aho, dia raiso ny fanomezana natolotro anao. Fa raha nahita tava anao aho teo, dia hoatry ny nahita ny tavan’Andriamanitra, noho ianao tsara fandray ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa miangavy aho, raiso ny fanomezana izay nampitondraiko ho anao satria efa nanisy soa ahy Andriamanitra ka manana ny ilaiko rehetra aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niangavy azy mafy i Jakôba, ka dia noraisiny ihany ny fanomezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Hesao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ahorony ny entana, dia andeha isika hanainga fa hiaraka aminao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Namaly kosa i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fantatrao, tompokolahy, fa marefo ny zaza, ary ondry aman’omby ampianahany no miaraka amiko; koa raha hododosana indray andro monja ireo biby ireo, dia ho faty avokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa mandehana mialoha, tompokolahy, fa izaho mpanomponao hanaraka miadana ny dian’ny biby fiompy sy ny zaza mandra-pahatonganay any aminao any Sehira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 32.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Hesao:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Havelako aminao ireo oloko sasany miaraka amiko.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa hoy i Jakôba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hatao inona moa izany? Fa ampy ahy rehefa nataonao tsara fandray aho, tompokolahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa dia niverina androtr’iny ihany i Hesao ho any Sehira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa i Jakôba kosa nivily ho any Sokôta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sokôta: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toerana tsy lavitra ny renirano Jabôka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tao Salema, tanàna miankina amin’i Sekema.
    marker-yv: yv-n
  - type: text
    text: ', dia nanao trano ho azy sy tranotomboka ho an’ny andiam-biby fiompiny. Izany no niantsoana io toerana io hoe Sokôta, izany hoe Tranotomboka.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nipetraka tao akaikin’i Sekema i Jakôba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa niverina avy tany Mezôpôtamia ambony i Jakôba, dia tonga soa aman-tsara tao an-tanàna Sekema izay eo amin’ny tany Kanahàna; dia nitoby teo akaikin’ny tanàna izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Novidîny vola zato kesita tamin’ny taranak’i Hamôra, mpanorina ny tanàna Sekema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'mpanorina ny tanàna Sekema: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rain’i Sekema,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ka amin’izay i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sekema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilay olona resahina ao amin’ny Gen 34 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–sombin-tany:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Jos 24.32; Jôh 4.5. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vola kesita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' hebreo no lazaina eto izay tokony ho vidin’ny ondrilahy iray: jereo Jos 24.32; Jôb 42.11 izay ahitana io voambolana io.'
    marker-yv: yv-n
  - type: text
    text: ', ny sombin-tany teo amin’ny saha izay nanorenany ny lainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nanorina alitara teo izy, ka nataony hoe Ela-Elôhe-Israely ny anaran’ilay alitara.
