document_id: GEN.33,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nihaonan’i Jakôba tamin’i Hesao
  - type: text
    content: 'Ary nitazana i Jakôba ka nahita an’i Hesao tamy miaraka amin’ny olona efajato lahy. Koa nozarainy tamin’i Leà sy i Rahely ary ny mpanompovavy roa ireo zaza. '
  '10':
  - type: text
    content: 'Dia novalian’i Jakôba hoe:'
  - type: text
    content: '–Aza manao izany re ianao, fa raha mba sitrakao ihany aho, dia raiso ny fanomezana natolotro anao. Fa raha nahita tava anao aho teo, dia hoatry ny nahita ny tavan’Andriamanitra, noho ianao tsara fandray ahy. '
  '11':
  - type: text
    content: Koa miangavy aho, raiso ny fanomezana izay nampitondraiko ho anao satria efa nanisy soa ahy Andriamanitra ka manana ny ilaiko rehetra aho.
  - type: text
    content: 'Niangavy azy mafy i Jakôba, ka dia noraisiny ihany ny fanomezana. '
  '12':
  - type: text
    content: 'Ary hoy i Hesao hoe:'
  - type: text
    content: –Ahorony ny entana, dia andeha isika hanainga fa hiaraka aminao aho.
  '13':
  - type: text
    content: 'Namaly kosa i Jakôba hoe:'
  - type: text
    content: '–Fantatrao, tompokolahy, fa marefo ny zaza, ary ondry aman’omby ampianahany no miaraka amiko; koa raha hododosana indray andro monja ireo biby ireo, dia ho faty avokoa izy. '
  '14':
  - type: text
    content: Koa mandehana mialoha, tompokolahy, fa izaho mpanomponao hanaraka miadana ny dian’ny biby fiompy sy ny zaza mandra-pahatonganay any aminao any Sehira
  - type: note
    content: Jereo 32.4 sy nta.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Dia hoy i Hesao:'
  - type: text
    content: –Havelako aminao ireo oloko sasany miaraka amiko.
  - type: text
    content: 'Fa hoy i Jakôba hoe:'
  - type: text
    content: –Hatao inona moa izany? Fa ampy ahy rehefa nataonao tsara fandray aho, tompokolahy.
  '16':
  - type: text
    content: 'Koa dia niverina androtr’iny ihany i Hesao ho any Sehira. '
  '17':
  - type: text
    content: Fa i Jakôba kosa nivily ho any Sokôta
  - type: note
    content: 'Sokôta: toerana tsy lavitra ny renirano Jabôka tao Salema, tanàna miankina amin’i Sekema.'
  - type: text
    content: ', dia nanao trano ho azy sy tranotomboka ho an’ny andiam-biby fiompiny. Izany no niantsoana io toerana io hoe Sokôta, izany hoe Tranotomboka.'
  - type: heading
    content: Nipetraka tao akaikin’i Sekema i Jakôba
  '18':
  - type: text
    content: 'Rehefa niverina avy tany Mezôpôtamia ambony i Jakôba, dia tonga soa aman-tsara tao an-tanàna Sekema izay eo amin’ny tany Kanahàna; dia nitoby teo akaikin’ny tanàna izy. '
  '19':
  - type: text
    content: Novidîny vola zato kesita tamin’ny taranak’i Hamôra, mpanorina ny tanàna Sekema
  - type: note
    content: 'mpanorina ny tanàna Sekema: dkt hafa rain’i Sekema, ka amin’izay i Sekema dia ilay olona resahina ao amin’ny Gen 34 –sombin-tany: ampit Jos 24.32; Jôh 4.5. –Ny vola kesita hebreo no lazaina eto izay tokony ho vidin’ny ondrilahy iray: jereo Jos 24.32; Jôb 42.11 izay ahitana io voambolana io.'
  - type: text
    content: ', ny sombin-tany teo amin’ny saha izay nanorenany ny lainy. '
  '2':
  - type: text
    content: 'Nataony lohalalana ireo mpanompovavy sy ny zanany, dia nanaraka azy i Leà sy ireo zanany, ary tatỳ afara i Rahely sy i Jôsefa. '
  '20':
  - type: text
    content: Dia nanorina alitara teo izy, ka nataony hoe Ela-Elôhe-Israely ny anaran’ilay alitara.
  '3':
  - type: text
    content: 'I Jakôba kosa no nandeha teo alohan’izy rehetra. Niankohoka impito tamin’ny tany i Jakôba mandra-pahatongany teo amin’i Hesao rahalahiny. '
  '4':
  - type: text
    content: 'Dia nihazakazaka nitsena azy i Hesao, ka namihina ny vozony sady nanoroka azy; ary niara-nitomany izy mirahalahy. '
  '5':
  - type: text
    content: 'Ary nony nahita ireo zaza amam-behivavy i Hesao, dia nanontany hoe:'
  - type: text
    content: –Ary iza ireto miaraka aminao ireto?
  - type: text
    content: 'Hoy kosa i Jakôba hoe:'
  - type: text
    content: –Ireo no zaza nomen’Andriamanitra ahy mpanomponao noho ny fahasoavany.
  '6':
  - type: text
    content: 'Dia nanatona ireo mpanompovavy sy ny zanany ka niankohoka. '
  '7':
  - type: text
    content: 'Nanatona ihany koa i Leà sy ny zanany ka niankohoka; ary farany dia nanatona koa i Jôsefa sy i Rahely ka niankohoka. '
  '8':
  - type: text
    content: 'Ary nanontany i Hesao hoe:'
  - type: text
    content: –Inona moa no anton’ny nandefasanao ireny fanomezana rehetra izay nifanena tamiko ireny?
  - type: text
    content: 'Ka hoy i Jakôba hoe:'
  - type: text
    content: –Mba handraisanao ahy tsara, tompokolahy.
  '9':
  - type: text
    content: 'Fa hoy i Hesao hoe:'
  - type: text
    content: –Manambe aho, ry rahalahy; aoka ho anao ihany ny anao!
