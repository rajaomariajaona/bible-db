    - type: text
      text: '16'
  - type: text
    text: 'Hisaorana anie Andriamanitra Izay nahatonga an’i Tito ho mazoto miasa ho anareo tahaka ny ataonay koa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nanaiky ny fiangavianay azy i Tito; nefa tena nazoto rahateo izy, ka dia nahim-pony no nankanesany tany aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nalefanay hiaraka aminy koa ilay rahalahy derain’ny Fiangonana rehetra amin’ny asa fitoriana ny '
  - type: usfm
    marker: w
    children:
    - type: text
