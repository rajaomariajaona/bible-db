  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tianay hampahafantarina anareo, ry havana, ny fahasoavana nomen’Andriamanitra tao amin’ireo Fiangonana any Masedônia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voasedra mafy tamin’ny fahoriana nahazo azy ny mpino, kanefa lehibe tokoa ny hafaliany ary nahafoy mihitsy izy ireo tamin’ny famoriam-bola, na dia tena mahantra aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vavolombelona nahita aho fa nanome araka izay zakany ry zareo, eny mihoatra noho izay zakany aza; nahim-pony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'no niangaviany mafy taminay mba hahazo tombon-tsoa handray anjara amin’ny fanasoavana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' any Jodea'
