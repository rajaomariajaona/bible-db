type_code: plt
verses:
  '1':
  - type: heading
    content: Mahafoy sy manome an-kafaliana
  - type: text
    content: 'Tianay hampahafantarina anareo, ry havana, ny fahasoavana nomen’Andriamanitra tao amin’ireo Fiangonana any Masedônia. '
  '10':
  - type: text
    content: 'Ambarako aminareo izay hevitro ny amin’izany raharaha izany: mahasoa anareo izany, satria lohalaharana ianareo tsy tamin’ny firotsahana hanao azy fotsiny fa tamin’ny fanapahan-kevitra hanao azy koa. '
  '11':
  - type: text
    content: 'Ankehitriny kosa dia tontosay ny fanaovana azy. Nanana risi-po ianareo raha nanapa-kevitra hanao azy, ka dia aoka hanana risi-po tahaka izany koa hanatontosa azy araka izay anananareo. '
  '12':
  - type: text
    content: Fa raha misy ny risi-po hanome, dia ny manome araka izay ananana ihany no ankasitrahin’Andriamanitra, fa tsy hoe ny manome araka izay tsy ananana.
  '13':
  - type: text
    content: 'Izany no atao, tsy sanatria ny hahaory anareo ka hiadanan’ny sasany, fa ny mba hisian’ny fitoviana. '
  '14':
  - type: text
    content: 'Amin’izao ankehitriny izao, dia manam-be ianareo mba hanafa-pahasahiranana azy ireo. Any kosa andro hahatonga azy ireo hanam-be mba hanafa-pahasahiranana anareo. Amin’izany no hisian’ny fitoviana, '
  '15':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Izay nanangona be tsy nanana amby,
  - type: text
    content: ary izay nanangona kely tsy nanana ny tsy ampy
  - type: note
    content: Eks 16.18.
  - type: text
    content: .»
  - type: heading
    content: I Tito sy ny mpiara-dia aminy
  '16':
  - type: text
    content: 'Hisaorana anie Andriamanitra Izay nahatonga an’i Tito ho mazoto miasa ho anareo tahaka ny ataonay koa! '
  '17':
  - type: text
    content: 'Nanaiky ny fiangavianay azy i Tito; nefa tena nazoto rahateo izy, ka dia nahim-pony no nankanesany tany aminareo. '
  '18':
  - type: text
    content: 'Nalefanay hiaraka aminy koa ilay rahalahy derain’ny Fiangonana rehetra amin’ny asa fitoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '; '
  '19':
  - type: text
    content: ary tsy izany ihany, fa notendren’ireo Fiangonana mba hiara-dia aminay koa io rahalahy io amin’izao asa fanasoavana ilofosanay izao, ho voninahitr’Izy Tompo ary ho mariky ny risi-ponay hanasoa ny hafa.
  '2':
  - type: text
    content: 'Voasedra mafy tamin’ny fahoriana nahazo azy ny mpino, kanefa lehibe tokoa ny hafaliany ary nahafoy mihitsy izy ireo tamin’ny famoriam-bola, na dia tena mahantra aza. '
  '20':
  - type: text
    content: 'Tandremanay mba tsy hisy hanome tsiny anay amin’izao famoriana vola be ilofosanay izao: '
  '21':
  - type: text
    content: satria mikendry hanao ny tsara izahay, tsy eo anatrehan’ny Tompo ihany, fa eo anatrehan’ny olona koa
  - type: note
    content: Ampit Ohab 3.4 (amin’ny heviny araka ny dkt grika tranainy Septoazinta); Rm 12.17.
  - type: text
    content: .
  '22':
  - type: text
    content: Nalefanay hiaraka amin’izy ireo ilay rahalahinay
  - type: note
    content: 'ilay rahalahinay: olon-kafa fa tsy voatonona anarana ao amin’ny and 18: ampit ny and 23 (iretsy roa lahy rahalahinay). Jereo 2.13 sy nta.'
  - type: text
    content: ' izay efa nosedrainay matetika tamin-javatra maro ka hitanay fa mazoto; kanefa vao mainka mazoto kokoa izy ankehitriny, satria be ny fahatokiany anareo. '
  '23':
  - type: text
    content: 'Raha ny amin’i Tito, dia namako izy sady mpiara-miasa amiko ho fanasoavana anareo; fa iretsy roa lahy rahalahinay kosa dia irak’ireo Fiangonana ary miasa ho voninahitr’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '24':
  - type: text
    content: Koa asehoy azy telo lahy fa tia azy tokoa ianareo, mba ho fantatr’ireo Fiangonana fa rariny raha ataonay reharehanay ianareo.
  '3':
  - type: text
    content: 'Vavolombelona nahita aho fa nanome araka izay zakany ry zareo, eny mihoatra noho izay zakany aza; nahim-pony '
  '4':
  - type: text
    content: 'no niangaviany mafy taminay mba hahazo tombon-tsoa handray anjara amin’ny fanasoavana ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' any Jodea'
  - type: note
    content: 'And 1-4: jereo Rm 15.26.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Nanao mihoatra noho izay nantenainay izy ireo, fa nanolo-tena ho an’ny Tompo aloha, ary ho anay koa noho ny sitrapon’Andriamanitra. '
  '6':
  - type: text
    content: 'Ka dia niangavianay i Tito hankatỳ aminareo hahatomombana izany asa fanasoavana izany, araka ny efa nanombohany azy teo aloha. '
  '7':
  - type: text
    content: 'Manam-be tokoa ianareo amin’ny zavatra rehetra: dia amin’ny finoana, amin’ny teny, amin’ny fahalalana, amin’ny fahazotoana isan-karazany, ary amin’ilay fitiavana raisinareo avy aminay'
  - type: note
    content: 'raisinareo avy aminay: misy stf sasany ahitana hoe raisinay avy aminareo.'
  - type: text
    content: ; araka izany koa no aoka hahafoizanareo be amin’izao asa soa izao.
  '8':
  - type: text
    content: 'Tsy milaza izany ho didy aho, fa ny fahazotoana asehon’ny sasany no hitsapako raha fitiavana mangarangarana ny anareo. '
  '9':
  - type: text
    content: 'Satria fantatrareo ny fahasoavan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika: fa na dia nanankarena aza Izy, dia tonga mahantra noho ny aminareo'
  - type: note
    content: Ampit Mt 8.20.
  - type: text
    content: ', mba hampanankarena anareo ny fahantrany.'
