      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raisinay avy aminareo.
    marker-yv: yv-n
  - type: text
    text: ; araka izany koa no aoka hahafoizanareo be amin’izao asa soa izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy milaza izany ho didy aho, fa ny fahazotoana asehon’ny sasany no hitsapako raha fitiavana mangarangarana ny anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria fantatrareo ny fahasoavan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika: fa na dia nanankarena aza Izy, dia tonga mahantra noho ny aminareo'
