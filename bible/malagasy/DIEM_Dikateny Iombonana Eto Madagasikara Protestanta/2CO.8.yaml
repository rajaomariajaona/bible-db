    marker-yv: yv-n
  - type: text
    text: ', mba hampanankarena anareo ny fahantrany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ambarako aminareo izay hevitro ny amin’izany raharaha izany: mahasoa anareo izany, satria lohalaharana ianareo tsy tamin’ny firotsahana hanao azy fotsiny fa tamin’ny fanapahan-kevitra hanao azy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ankehitriny kosa dia tontosay ny fanaovana azy. Nanana risi-po ianareo raha nanapa-kevitra hanao azy, ka dia aoka hanana risi-po tahaka izany koa hanatontosa azy araka izay anananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa raha misy ny risi-po hanome, dia ny manome araka izay ananana ihany no ankasitrahin’Andriamanitra, fa tsy hoe ny manome araka izay tsy ananana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izany no atao, tsy sanatria ny hahaory anareo ka hiadanan’ny sasany, fa ny mba hisian’ny fitoviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin’izao ankehitriny izao, dia manam-be ianareo mba hanafa-pahasahiranana azy ireo. Any kosa andro hahatonga azy ireo hanam-be mba hanafa-pahasahiranana anareo. Amin’izany no hisian’ny fitoviana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'araka ny voalazan’ny '
