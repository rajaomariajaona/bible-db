  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanao mihoatra noho izay nantenainay izy ireo, fa nanolo-tena ho an’ny Tompo aloha, ary ho anay koa noho ny sitrapon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka dia niangavianay i Tito hankatỳ aminareo hahatomombana izany asa fanasoavana izany, araka ny efa nanombohany azy teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Manam-be tokoa ianareo amin’ny zavatra rehetra: dia amin’ny finoana, amin’ny teny, amin’ny fahalalana, amin’ny fahazotoana isan-karazany, ary amin’ilay fitiavana raisinareo avy aminay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fk
