  - type: text
    text: ary tsy izany ihany, fa notendren’ireo Fiangonana mba hiara-dia aminay koa io rahalahy io amin’izao asa fanasoavana ilofosanay izao, ho voninahitr’Izy Tompo ary ho mariky ny risi-ponay hanasoa ny hafa.
- type: usfm
