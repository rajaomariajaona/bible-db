  - type: text
    text: ' izay efa nosedrainay matetika tamin-javatra maro ka hitanay fa mazoto; kanefa vao mainka mazoto kokoa izy ankehitriny, satria be ny fahatokiany anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha ny amin’i Tito, dia namako izy sady mpiara-miasa amiko ho fanasoavana anareo; fa iretsy roa lahy rahalahinay kosa dia irak’ireo Fiangonana ary miasa ho voninahitr’i '
