document_id: 2KI.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandripahana ny fianakavian’i Ahaba
  - type: text
    content: 'Nanan-taranaka fitopolo lahy izay nipetraka tany Samaria i Ahaba. Fa nanoratra taratasy i Jehò mba halefa any Samaria ho an’ireo lehibe mpifehy ny tanàna mbamin’ireo '
  - type: text
    content: loholona
  - type: text
    content: ' sy ireo mpanabe ny taranak’i Ahaba. Ka hoy i Jehò tamin’ny taratasiny: '
  '10':
  - type: text
    content: Aoka ho fantatrareo àry fa tsy hisy raraka an-tany ny teny izay nolazain’ny TOMPO ny amin’ny taranak’i Ahaba! Fa ny TOMPO efa nanatanteraka izay nampilazainy an’i Elià mpanompony
  - type: note
    content: Jereo 1 Mp 21.21-29.
  - type: text
    content: .
  '11':
  - type: text
    content: Dia nataon’i Jehò maty tao Jizrehela avokoa izay sisa rehetra tamin’ny taranak’i Ahaba
  - type: note
    content: Jereo Hôs 1.4.
  - type: text
    content: ' mbamin’ireo olom-baventy rehetra mpomba azy ary ny havany sy ny mpisorony; ka tsy nasiany niangana na dia iray aza.'
  - type: heading
    content: Fandripahana ireo andrian’i Joda
  - type: heading
    content: (Jereo 2 Tan 22.8)
  '12':
  - type: text
    content: 'Avy teo dia lasa nankany Samaria i Jehò; ary nony tonga tany Bety-Hekeda toeram-pihaonan’ny mpiandry ondry izy, '
  '13':
  - type: text
    content: 'dia nifanena tamin’ireo rahalahin’i Ahazià mpanjakan’i Joda, ka nanontany azy hoe:'
  - type: text
    content: –Fa iza ange ianareo?
  - type: text
    content: 'Ary hoy ny navaliny:'
  - type: text
    content: –Rahalahin’i Ahazià izahay, ka tonga mba hamangy ireo zanakalahin’i Jezebela mpanjakavavy sy ny hafa rehetra taranaky ny mpanjaka.
  '14':
  - type: text
    content: 'Ary hoy i Jehò:'
  - type: text
    content: –Ataovy sambo-belona ireo.
  - type: text
    content: Dia nataon’ny naman’i Jehò sambo-belona izy 42 lahy ka novonoiny ho faty teo akaikin’ny lava-pantsakan’i Bety-Hekeda ary tsy nasiany niangana na dia iray aza.
  - type: heading
    content: Nihaona tamin’i Jônadaba i Jehò
  '15':
  - type: text
    content: Rehefa niala teo i Jehò, dia nahita an’i Jônadaba zanakalahin’i Rekaba
  - type: note
    content: Momba an’i Jônadaba sy ny Rekabita taranany, dia jereo Jer 35.
  - type: text
    content: ' izay tamy nanatona azy. Ary noarahabain’i Jehò izy ka nitenenany hoe:'
  - type: text
    content: –Mba mahitsy fo amiko tahaka ny tenako aminao koa ve ianao?
  - type: text
    content: 'Ary hoy ny navalin’i Jônadaba:'
  - type: text
    content: –Eny.
  - type: text
    content: 'Dia hoy i Jehò:'
  - type: text
    content: –Raha izany àry, dia aoka isika hifandray tanana.
  - type: text
    content: 'Dia nifandray tanana izy roa lahy. Ary nampiakarin’i Jehò teo amin’ny kalesiny i Jônadaba '
  '16':
  - type: text
    content: 'sady nilazany hoe:'
  - type: text
    content: –Andeha hiaraka amiko fa hahita ny hafanampoko amin’ny fanompoana ny TOMPO ianao.
  - type: text
    content: 'Dia nentiny tamin’ny kalesiny izy. '
  '17':
  - type: text
    content: Rehefa tonga tany Samaria i Jehò, dia nataony maty avokoa izay tamingan’i Ahaba sisa rehetra tao an-tanàna mandra-paharingany, araka ny teny nambaran’ny TOMPO tamin’i Elià.
  - type: heading
    content: Nofoanan’i Jehò ny fivavahana tamin’i Bahala
  '18':
  - type: text
    content: 'Ary novorin’i Jehò ny mponina rehetra tao Samaria ka nilazany hoe:'
  - type: text
    content: '–Mba nanompo an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' kelikely ihany i Ahaba, fa izaho Jehò no hanompo azy fatratra. '
  '19':
  - type: text
    content: 'Koa ankehitriny, vorio eto amiko avokoa ny '
  - type: text
    content: mpaminanin
  - type: text
    content: ’i Bahala sy ny mpivavaka aminy ary ny mpisorony; aza avela hisy tsy ho tonga na dia iray aza, fa hanao fety lehibe hanaovan-tsorona amin’i Bahala aho. Koa izay rehetra tsy tonga dia hatao maty.
  - type: text
    content: 'Kanjo hafetsena no nanaovan’i Jehò izany mba handringanana ireo mpivavaka amin’i Bahala. '
  '2':
  - type: text
    content: '«Eo aminareo ny taranaky ny tomponareo sy ny kalesy aman-tsoavaly ary ny fiadiana; sady tanànamimanda no onenanareo. '
  '20':
  - type: text
    content: 'Ary hoy i Jehò:'
  - type: text
    content: –Aoka hisy fivoriana manokana hankalazana an’i Bahala!
  - type: text
    content: 'Dia natao ny fiantsoana. '
  '21':
  - type: text
    content: 'Ary nandefa iraka tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo i Jehò, ka tonga avokoa ny mpivavaka amin’i Bahala fa tsy nisy tsy tonga na dia iray aza. Ary niditra tao an-tempolin’i Bahala ireo, ka feno hika ny trano. '
  '22':
  - type: text
    content: 'Dia hoy i Jehò tamin’ny mpitahiry ny fanamiana:'
  - type: text
    content: –Amoahy fanamiana avokoa ireo mpivavaka amin’i Bahala.
  - type: text
    content: 'Dia namoaka fanamiana ho azy izy. '
  '23':
  - type: text
    content: 'Rehefa izany dia nankao an-tempolin’i Bahala i Jehò sy i Jônadaba zanakalahin’i Rekaba; ka i Jehò no niteny tamin’ireo mpivavaka amin’i Bahala hoe:'
  - type: text
    content: –Hamarino tsara mba tsy hisy mpivavaka amin’ny TOMPO Andriamanitr’i Israely aminareo ireo, fa mpivavaka amin’i Bahala ihany.
  '24':
  - type: text
    content: 'Teo ivelan’ny tempolin’i Bahala dia nametrahan’i Jehò miaramila valopolo lahy izay nilazàny hoe: «Hatao eo an-tananareo ireo olona ireo; koa raha misy aminareo mamela handositra ny anankiray amin’ireo, dia izy no hatao maty hisolo ilay nandositra.» Dia nandroso hanolotra ny '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' sy sorona dorana manontolo i Jehò sy i Jônadaba. '
  '25':
  - type: text
    content: 'Rehefa vita izany, dia hoy i Jehò tamin’ny miaramila sy mpifehy azy:'
  - type: text
    content: –Midira ka vonoy ho faty tsy hisy miangana ireo na dia iray aza!
  - type: text
    content: 'Dia nasian’ny miaramila tamin’ny lelan-tsabatra ireo, ka nariany tany ivelan’ny tanàna ny fatiny. Avy eo ireto miaramila dia niverina tao amin’ny faritra nisy ny tempolin’i Bahala. '
  '26':
  - type: text
    content: 'Dia navoakany avokoa ny andry hazo tao amin’io tempoly io ka nodorany, '
  '27':
  - type: text
    content: ary nomontsaniny ny tsangambaton’i Bahala; noravany koa ilay tempoly ary lasa toerana nanaovana trano fivoahana izay mbola fampiasa mandraka ankehitriny.
  - type: heading
    content: I Jehò, mpanjakan’i Israely
  '28':
  - type: text
    content: 'Toy izany no namongoran’i Jehò tsy ho eo amin’i '
  - type: text
    content: Israely
  - type: text
    content: ' intsony ny fivavahana amin’i '
  - type: text
    content: Bahala
  - type: text
    content: '. '
  '29':
  - type: text
    content: Saingy tsy nialan’i Jehò ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita, dia ny fivavahana amin’ny ombilahikely volamena tao Betela sy tao Dana
  - type: note
    content: Jereo 1 Mp 12.28-30.
  - type: text
    content: .
  '3':
  - type: text
    content: Vantany vao voarainareo ity taratasy ity, dia jereo izay tsara sy mendrika indrindra amin’ny fianakavian’ny tomponareo ka apetraho eo amin’ny sezafiandrianan-drainy, ary miadia ho an’ny fianakavian’ny tomponareo.»
  '30':
  - type: text
    content: 'Koa hoy ny TOMPO tamin’i Jehò:'
  - type: text
    content: –Satria tsara ny nanaovanao izay mahitsy teo imasoko sy ny nampiharanao tamin’ny taranak’i Ahaba ny famaizana noeritreretiko, dia hitoetra eo amin’ny sezafiandrianan’i Israely hatramin’ny taranaka fahefatra ny taranakao.
  '31':
  - type: text
    content: Tsy notandreman’i Jehò akory anefa ny handeha araka ny lalànan’ny TOMPO Andriamanitr’i Israely amin’ny fony manontolo, fa tsy nialany akory ny fahotana izay nitarihan’i Jerôbohama an’i Israely.
  '32':
  - type: text
    content: 'Tamin’izany fotoana izany no nanombohan’ny TOMPO nanakely ny tanin’i Israely, satria navelany handresy azy amin’ny sisin-taniny rehetra i Hazaela. '
  '33':
  - type: text
    content: 'Lasan’io mpanjakan’i Siria io avokoa ny faritra atsinanan’i Jôrdàna sy avaratr’i Harôhera izay tanàna eo amoron’ny lohasahan-driaka Arnôna, izany hoe i Gilehada sy i '
  - type: text
    content: Basàna
  - type: text
    content: ', dia ny tanin’ny Gadita sy ny Reobenita ary ny Manasita.'
  '34':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jehò ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Israely.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Nanjaka 28 taona tamin’i Israely tao Samaria i Jehò. Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Samaria; ary i Jôahaza zanany lahy no nanjaka nandimby azy.
  '4':
  - type: text
    content: 'Raiki-tahotra avokoa ireo olon-drehetra ireo, ka nifampilaza hoe: «Hataontsika ahoana ny hahatohitra an’i Jehò, nefa mpanjaka roa'
  - type: note
    content: I Jôrama sy i Ahazià, jereo 9.22-28.
  - type: text
    content: ' aza tsy nahatohitra azy?» '
  '5':
  - type: text
    content: 'Dia nampitondra izao valin-teny izao ho an’i Jehò ilay lehiben’ny tandapa sy ilay mpanapaka ny tanàna mbamin’ireo loholona sy ireo mpanabe nanao hoe: «Mpanomponao izahay ka vonon-kanao izay rehetra andidianao anay; ary tsy hanangana olona ho mpanjaka izahay, koa ataovy izay sitrakao.»'
  '6':
  - type: text
    content: 'Dia nanoratra taminy fanindroany i Jehò nanao hoe:'
  - type: text
    content: «Raha momba ahy tokoa ianareo ary mankato ny baikoko, dia tapaho avokoa ny lohan’ireo taranaky ny tomponareo, ka ento atỳ amiko atỳ Jizrehela rahampitso toy izao.»
  - type: text
    content: Izy fitopolo lahy taranaky ny mpanjaka dia voatsinjara tamin’ireo olom-baventin’ny tanàna izay nitaiza azy avy.
  '7':
  - type: text
    content: 'Vao voarain’ireo mpitondra ireo ny taratasy, dia nampiantsoiny izy fitopolo lahy taranaky ny mpanjaka ka novonoiny ho faty; ary nafatrany an-tsobika ny lohany ka nalefany tany amin’i Jehò tany Jizrehela. '
  '8':
  - type: text
    content: 'Dia nisy iraka tonga nanambara taminy ny nitondrana ireo lohan’ny taranaky ny mpanjaka ireo. Ary hoy i Jehò:'
  - type: text
    content: –Ataovy toko roa mifanongoa eo anoloan’ny vavahadin’ny tanàna mandra-paharain’ny andro ireo.
  '9':
  - type: text
    content: 'Nony maraina, dia nivoaka ny tanàna i Jehò ka niato nijaridina izy no niteny tamin’ny vahoaka rehetra teo hoe:'
  - type: text
    content: '–Tsy manan-tsiny ianareo! Fa izaho no tompon’andraikitra nioko tamin’i Jôrama mpanjaka sady nahafaty azy. Fa mba iza kosa no nahafaty an’ireto rehetra ireto? '
