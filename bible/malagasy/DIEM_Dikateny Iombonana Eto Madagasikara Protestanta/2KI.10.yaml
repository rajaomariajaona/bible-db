document_id: 2KI.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandripahana ny fianakavian’i Ahaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanan-taranaka fitopolo lahy izay nipetraka tany Samaria i Ahaba. Fa nanoratra taratasy i Jehò mba halefa any Samaria ho an’ireo lehibe mpifehy ny tanàna mbamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' sy ireo mpanabe ny taranak’i Ahaba. Ka hoy i Jehò tamin’ny taratasiny: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Eo aminareo ny taranaky ny tomponareo sy ny kalesy aman-tsoavaly ary ny fiadiana; sady tanànamimanda no onenanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vantany vao voarainareo ity taratasy ity, dia jereo izay tsara sy mendrika indrindra amin’ny fianakavian’ny tomponareo ka apetraho eo amin’ny sezafiandrianan-drainy, ary miadia ho an’ny fianakavian’ny tomponareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raiki-tahotra avokoa ireo olon-drehetra ireo, ka nifampilaza hoe: «Hataontsika ahoana ny hahatohitra an’i Jehò, nefa mpanjaka roa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I Jôrama sy i Ahazià, jereo 9.22-28.
    marker-yv: yv-n
  - type: text
    text: ' aza tsy nahatohitra azy?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nampitondra izao valin-teny izao ho an’i Jehò ilay lehiben’ny tandapa sy ilay mpanapaka ny tanàna mbamin’ireo loholona sy ireo mpanabe nanao hoe: «Mpanomponao izahay ka vonon-kanao izay rehetra andidianao anay; ary tsy hanangana olona ho mpanjaka izahay, koa ataovy izay sitrakao.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanoratra taminy fanindroany i Jehò nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Raha momba ahy tokoa ianareo ary mankato ny baikoko, dia tapaho avokoa ny lohan’ireo taranaky ny tomponareo, ka ento atỳ amiko atỳ Jizrehela rahampitso toy izao.»
- type: usfm
  marker: p
  children:
  - type: text
    text: Izy fitopolo lahy taranaky ny mpanjaka dia voatsinjara tamin’ireo olom-baventin’ny tanàna izay nitaiza azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vao voarain’ireo mpitondra ireo ny taratasy, dia nampiantsoiny izy fitopolo lahy taranaky ny mpanjaka ka novonoiny ho faty; ary nafatrany an-tsobika ny lohany ka nalefany tany amin’i Jehò tany Jizrehela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nisy iraka tonga nanambara taminy ny nitondrana ireo lohan’ny taranaky ny mpanjaka ireo. Ary hoy i Jehò:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy toko roa mifanongoa eo anoloan’ny vavahadin’ny tanàna mandra-paharain’ny andro ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nony maraina, dia nivoaka ny tanàna i Jehò ka niato nijaridina izy no niteny tamin’ny vahoaka rehetra teo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy manan-tsiny ianareo! Fa izaho no tompon’andraikitra nioko tamin’i Jôrama mpanjaka sady nahafaty azy. Fa mba iza kosa no nahafaty an’ireto rehetra ireto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aoka ho fantatrareo àry fa tsy hisy raraka an-tany ny teny izay nolazain’ny TOMPO ny amin’ny taranak’i Ahaba! Fa ny TOMPO efa nanatanteraka izay nampilazainy an’i Elià mpanompony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 21.21-29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nataon’i Jehò maty tao Jizrehela avokoa izay sisa rehetra tamin’ny taranak’i Ahaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hôs 1.4.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ireo olom-baventy rehetra mpomba azy ary ny havany sy ny mpisorony; ka tsy nasiany niangana na dia iray aza.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandripahana ireo andrian’i Joda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Tan 22.8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avy teo dia lasa nankany Samaria i Jehò; ary nony tonga tany Bety-Hekeda toeram-pihaonan’ny mpiandry ondry izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia nifanena tamin’ireo rahalahin’i Ahazià mpanjakan’i Joda, ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fa iza ange ianareo?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy ny navaliny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Rahalahin’i Ahazià izahay, ka tonga mba hamangy ireo zanakalahin’i Jezebela mpanjakavavy sy ny hafa rehetra taranaky ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy i Jehò:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy sambo-belona ireo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nataon’ny naman’i Jehò sambo-belona izy 42 lahy ka novonoiny ho faty teo akaikin’ny lava-pantsakan’i Bety-Hekeda ary tsy nasiany niangana na dia iray aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nihaona tamin’i Jônadaba i Jehò
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa niala teo i Jehò, dia nahita an’i Jônadaba zanakalahin’i Rekaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jônadaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy ny Rekabita taranany, dia jereo Jer 35.'
    marker-yv: yv-n
  - type: text
    text: ' izay tamy nanatona azy. Ary noarahabain’i Jehò izy ka nitenenany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba mahitsy fo amiko tahaka ny tenako aminao koa ve ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy ny navalin’i Jônadaba:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Eny.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy i Jehò:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha izany àry, dia aoka isika hifandray tanana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nifandray tanana izy roa lahy. Ary nampiakarin’i Jehò teo amin’ny kalesiny i Jônadaba '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sady nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Andeha hiaraka amiko fa hahita ny hafanampoko amin’ny fanompoana ny TOMPO ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nentiny tamin’ny kalesiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rehefa tonga tany Samaria i Jehò, dia nataony maty avokoa izay tamingan’i Ahaba sisa rehetra tao an-tanàna mandra-paharingany, araka ny teny nambaran’ny TOMPO tamin’i Elià.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nofoanan’i Jehò ny fivavahana tamin’i Bahala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary novorin’i Jehò ny mponina rehetra tao Samaria ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mba nanompo an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' kelikely ihany i Ahaba, fa izaho Jehò no hanompo azy fatratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa ankehitriny, vorio eto amiko avokoa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminanin
  - type: text
    text: ’i Bahala sy ny mpivavaka aminy ary ny mpisorony; aza avela hisy tsy ho tonga na dia iray aza, fa hanao fety lehibe hanaovan-tsorona amin’i Bahala aho. Koa izay rehetra tsy tonga dia hatao maty.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanjo hafetsena no nanaovan’i Jehò izany mba handringanana ireo mpivavaka amin’i Bahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy i Jehò:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka hisy fivoriana manokana hankalazana an’i Bahala!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia natao ny fiantsoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nandefa iraka tamin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo i Jehò, ka tonga avokoa ny mpivavaka amin’i Bahala fa tsy nisy tsy tonga na dia iray aza. Ary niditra tao an-tempolin’i Bahala ireo, ka feno hika ny trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy i Jehò tamin’ny mpitahiry ny fanamiana:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Amoahy fanamiana avokoa ireo mpivavaka amin’i Bahala.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namoaka fanamiana ho azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa izany dia nankao an-tempolin’i Bahala i Jehò sy i Jônadaba zanakalahin’i Rekaba; ka i Jehò no niteny tamin’ireo mpivavaka amin’i Bahala hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hamarino tsara mba tsy hisy mpivavaka amin’ny TOMPO Andriamanitr’i Israely aminareo ireo, fa mpivavaka amin’i Bahala ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo ivelan’ny tempolin’i Bahala dia nametrahan’i Jehò miaramila valopolo lahy izay nilazàny hoe: «Hatao eo an-tananareo ireo olona ireo; koa raha misy aminareo mamela handositra ny anankiray amin’ireo, dia izy no hatao maty hisolo ilay nandositra.» Dia nandroso hanolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom-pihavanana
  - type: text
    text: ' sy sorona dorana manontolo i Jehò sy i Jônadaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa vita izany, dia hoy i Jehò tamin’ny miaramila sy mpifehy azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Midira ka vonoy ho faty tsy hisy miangana ireo na dia iray aza!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nasian’ny miaramila tamin’ny lelan-tsabatra ireo, ka nariany tany ivelan’ny tanàna ny fatiny. Avy eo ireto miaramila dia niverina tao amin’ny faritra nisy ny tempolin’i Bahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia navoakany avokoa ny andry hazo tao amin’io tempoly io ka nodorany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary nomontsaniny ny tsangambaton’i Bahala; noravany koa ilay tempoly ary lasa toerana nanaovana trano fivoahana izay mbola fampiasa mandraka ankehitriny.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jehò, mpanjakan’i Israely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toy izany no namongoran’i Jehò tsy ho eo amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' intsony ny fivavahana amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Saingy tsy nialan’i Jehò ny fahotana izay nitarihan’i Jerôbohama zanakalahin’i Nebata ireo Israelita, dia ny fivavahana amin’ny ombilahikely volamena tao Betela sy tao Dana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 12.28-30.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa hoy ny TOMPO tamin’i Jehò:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Satria tsara ny nanaovanao izay mahitsy teo imasoko sy ny nampiharanao tamin’ny taranak’i Ahaba ny famaizana noeritreretiko, dia hitoetra eo amin’ny sezafiandrianan’i Israely hatramin’ny taranaka fahefatra ny taranakao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tsy notandreman’i Jehò akory anefa ny handeha araka ny lalànan’ny TOMPO Andriamanitr’i Israely amin’ny fony manontolo, fa tsy nialany akory ny fahotana izay nitarihan’i Jerôbohama an’i Israely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tamin’izany fotoana izany no nanombohan’ny TOMPO nanakely ny tanin’i Israely, satria navelany handresy azy amin’ny sisin-taniny rehetra i Hazaela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Lasan’io mpanjakan’i Siria io avokoa ny faritra atsinanan’i Jôrdàna sy avaratr’i Harôhera izay tanàna eo amoron’ny lohasahan-driaka Arnôna, izany hoe i Gilehada sy i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ', dia ny tanin’ny Gadita sy ny Reobenita ary ny Manasita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny sisa amin’ny tantaran’i Jehò ary koa ny zavatra hafa rehetra nataony sy ny herimpo nasehony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asan’ireo mpanjakan’i Israely.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: Nanjaka 28 taona tamin’i Israely tao Samaria i Jehò. Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina tao Samaria; ary i Jôahaza zanany lahy no nanjaka nandimby azy.
