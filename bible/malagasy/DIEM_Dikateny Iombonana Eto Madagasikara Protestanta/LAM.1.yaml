document_id: LAM.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Jerosalema toy ny vehivavy mpitondratena nilaozana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Indrisy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ahoana?
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Ny voambolana hebreo tandrifin’izany dia fampiasa amin’ny tononkalo fitomaniana (jereo Is 1.21; Jer 48.17).'
      marker-yv: yv-n
    - type: text
      text: '! Mitoetra manirery izao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay tanàna feno olona fahiny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga toy ny mpitondratena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay nalaza tamin’ireo hafa firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ny asan’ny mpanompo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay andriambavy nifehy faritany maro!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naninji-tanana ireo mpandresy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haka ny zava-tsarobidiny rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitan’i Jerosalema aza fa ny hafa firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia nitsofoka tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa noraranao ireny, Tompo ô
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hiditra ao amin’ny fiangonanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sentom-pahakiviana no ataon’ny vahoaka rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-pitadiavana izay hohaniny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanome izay zava-tsarobidy indrindra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hatakalo hanina hampodîna hery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izy hoe: «TOMPO ô, jereo ka diniho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa voavingavinga loatra aho.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia ianareo rehetra mpandalo eto,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: diniho sy jereo raha mba misy fijaliana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny fijaliana mihatra amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay nampahorian’ny TOMPO ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny andro firehetan’ny fahatezerany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandefa afo avy tany an-danitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba haninteraka ny taolako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namela-pandrika haningotra ny tongotro Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampitsinkasina ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataony lao mihitsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mararirary isan’andro.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arahiny maso ny fahotako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Arahiny maso ny fahotako: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe ny ziogan’ny fahadisoako dia voafehy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay toy ny vona eo an-tanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitambesatra eo am-bozoko ny ziogan’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampiketraka ny heriko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: natolony eo an-tanam-pahavalo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy afa-manohitra ireny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nailikiliky ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo maheriko rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanainga andian-tafika iray Izy hamely ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba afaka hanamontsana ireo zatovoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nohosihosen’ny Tompo toy ny voaloboka am-pamiazana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izaho Tsiôna, ilay tsara tarehin’i Joda.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no loza itomaniako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mahatonga ahy hamarin-dranomaso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lavitra ahy ilay mpampionona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay afaka hamelombelona ny aiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny zanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nahery ny fahavalo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mananty tanana miangavy i Tsiôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy mampionona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobaikoin’ny TOMPO ireo firenena manodidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho fahavalon’ny taranak’i Jakôba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Jerosalema, eo afovoan’ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga fako maharikoriko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rariny ny nataon’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria efa nanohitra ny baikony aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa tsara, rey olona rehetra eto
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka jereo ny fijaliako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tovovaviko sy ny tovolahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia samy lasa ho any an-tsesitany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niantso ireo tia ahy taloha aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa nilaozany fotsiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niala aina tao an-tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpisoroko sy loholoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha iny mbola nitady hanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampodîna hery iny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitomany foana izy amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirotsa-dranomaso eny an-takolany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra tia azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy mampionona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanary azy avokoa ny sakaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga fahavalony ankehitriny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, jereo fa azom-pahoriana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandevilevy fiontanana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihendratrendratra ato anatiko ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nikomy taminao tokoa aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-dalambe, naripaky ny sabatra ny zanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ato an-trano, toa hoatry ny any amin’ny maty.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henon’ny firenena manodidina fa misento aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tsy misy mampionona ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henon’ny fahavaloko rehetra ny lozako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahafaly azy ny nampiharinao tamiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy tonga ilay andro nambaranao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ham 5.18; Is 2.12; 13.6; Jl 1.15; 2.1-2.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia aoka hihatra aminy koa izay nanjo ahy!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga eo anatrehanao anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny faharatsiany rehetra ka valio izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny namalianao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny fahadisoako rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria maro loatra ny sentoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mankararirary ny foko izany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Difotry ny fahoriana sy vesaram-panompoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no lasan-ko babo ny fokon’i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitoetra any amin’ny hafa firenena izy izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy mahita hifaharana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mpanenjika azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahatratra azy an-katerena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Misaona ny lalana mankany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy misy miakatra amin’ny fety.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangina avokoa ny kianjany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary sentom-pahakiviana no ataon’ny mpisorony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ory fatratra ireo tovovaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mangidy amin’i Tsiôna izany!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahavalony no lasa ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpiady aminy no miadana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ny TOMPO no mampahory an’i Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ireo fahadisoany maro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atosi-pahavalo ireo zanany madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no lasa ho any an-tsesitany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miala avy ao Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra nireharehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpitondrany dia toy ny diera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahita ahitra hiraofana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy manan-kery no mandositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo anoloan’ny mpihaza azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany androm-pahoriana irenireneny izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no ahatsiarovan’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo zava-tsarobidy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nananany hatry ny ela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo vahoakany eo an-tanam-pahavalo kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy misy mamonjy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka rehefa mahita an’i Jerosalema ny fahavalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mihomehy ny amin’ny faharavàny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanota dia nanota i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izany no mahatonga azy ho fako maharikoriko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fako maharikoriko: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fanesoana.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra nanaja azy mamingavinga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mahita azy mitanjaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny tenany aza dia misento
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady lasa nihodina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lotony dia eo amin’ny akanjony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nahatsinjo ny hoavy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka gaga noho ny fietreny toy izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misy mampahery azy akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «TOMPO ô, jereo ity fahoriako, hoy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mirehareha ny fahavaloko!»
