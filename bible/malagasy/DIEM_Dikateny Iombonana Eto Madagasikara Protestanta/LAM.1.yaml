document_id: LAM.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jerosalema toy ny vehivavy mpitondratena nilaozana
  - type: text
    content: Indrisy
  - type: note
    content: 'Indrisy: dkt hafa Ahoana? Ny voambolana hebreo tandrifin’izany dia fampiasa amin’ny tononkalo fitomaniana (jereo Is 1.21; Jer 48.17).'
  - type: text
    content: '! Mitoetra manirery izao'
  - type: text
    content: ilay tanàna feno olona fahiny!
  - type: text
    content: Tonga toy ny mpitondratena
  - type: text
    content: ilay nalaza tamin’ireo hafa firenena;
  - type: text
    content: manao ny asan’ny mpanompo izao
  - type: text
    content: ilay andriambavy nifehy faritany maro!
  '10':
  - type: text
    content: Naninji-tanana ireo mpandresy
  - type: text
    content: haka ny zava-tsarobidiny rehetra.
  - type: text
    content: Hitan’i Jerosalema aza fa ny hafa firenena
  - type: text
    content: 'dia nitsofoka tao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ;
  - type: text
    content: nefa noraranao ireny, Tompo ô
  - type: text
    content: tsy hiditra ao amin’ny fiangonanao.
  '11':
  - type: text
    content: Sentom-pahakiviana no ataon’ny vahoaka rehetra
  - type: text
    content: eo am-pitadiavana izay hohaniny.
  - type: text
    content: Efa nanome izay zava-tsarobidy indrindra izy
  - type: text
    content: mba hatakalo hanina hampodîna hery.
  - type: text
    content: 'Hoy izy hoe: «TOMPO ô, jereo ka diniho'
  - type: text
    content: fa efa voavingavinga loatra aho.»
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Avia ianareo rehetra mpandalo eto,
  - type: text
    content: diniho sy jereo raha mba misy fijaliana
  - type: text
    content: tahaka ny fijaliana mihatra amiko,
  - type: text
    content: dia ilay nampahorian’ny TOMPO ahy
  - type: text
    content: tamin’ny andro firehetan’ny fahatezerany.
  '13':
  - type: text
    content: Nandefa afo avy tany an-danitra Izy
  - type: text
    content: mba haninteraka ny taolako.
  - type: text
    content: Namela-pandrika haningotra ny tongotro Izy
  - type: text
    content: ka nampitsinkasina ahy.
  - type: text
    content: Nataony lao mihitsy aho,
  - type: text
    content: ka mararirary isan’andro.
  '14':
  - type: text
    content: Arahiny maso ny fahotako
  - type: note
    content: 'Arahiny maso ny fahotako: araka ny dkt grika tranainy izany, fa ny RM kosa manao hoe ny ziogan’ny fahadisoako dia voafehy.'
  - type: text
    content: izay toy ny vona eo an-tanany;
  - type: text
    content: mitambesatra eo am-bozoko ny ziogan’ny Tompo,
  - type: text
    content: ka nampiketraka ny heriko;
  - type: text
    content: natolony eo an-tanam-pahavalo aho
  - type: text
    content: ka tsy afa-manohitra ireny.
  '15':
  - type: text
    content: Nailikiliky ny Tompo
  - type: text
    content: ireo maheriko rehetra.
  - type: text
    content: Nanainga andian-tafika iray Izy hamely ahy
  - type: text
    content: mba afaka hanamontsana ireo zatovoko.
  - type: text
    content: Nohosihosen’ny Tompo toy ny voaloboka am-pamiazana aho,
  - type: text
    content: dia izaho Tsiôna, ilay tsara tarehin’i Joda.
  '16':
  - type: text
    content: Izany no loza itomaniako,
  - type: text
    content: sy mahatonga ahy hamarin-dranomaso;
  - type: text
    content: fa lavitra ahy ilay mpampionona
  - type: text
    content: izay afaka hamelombelona ny aiko.
  - type: text
    content: Ringana ny zanako,
  - type: text
    content: fa nahery ny fahavalo.
  - type: heading
    content: '*'
  '17':
  - type: text
    content: Mananty tanana miangavy i Tsiôna,
  - type: text
    content: nefa tsy misy mampionona azy.
  - type: text
    content: Nobaikoin’ny TOMPO ireo firenena manodidina
  - type: text
    content: ho fahavalon’ny taranak’i Jakôba;
  - type: text
    content: i Jerosalema, eo afovoan’ireo,
  - type: text
    content: dia tonga fako maharikoriko.
  - type: heading
    content: '*'
  '18':
  - type: text
    content: Rariny ny nataon’ny TOMPO,
  - type: text
    content: satria efa nanohitra ny baikony aho.
  - type: text
    content: Mihainoa tsara, rey olona rehetra eto
  - type: text
    content: 'ka jereo ny fijaliako:'
  - type: text
    content: ny tovovaviko sy ny tovolahiko
  - type: text
    content: dia samy lasa ho any an-tsesitany.
  '19':
  - type: text
    content: Niantso ireo tia ahy taloha aho,
  - type: text
    content: nefa nilaozany fotsiny.
  - type: text
    content: Niala aina tao an-tanàna
  - type: text
    content: ny mpisoroko sy loholoko
  - type: text
    content: raha iny mbola nitady hanina
  - type: text
    content: hampodîna hery iny.
  '2':
  - type: text
    content: Mitomany foana izy amin’ny alina,
  - type: text
    content: mirotsa-dranomaso eny an-takolany;
  - type: text
    content: izay rehetra tia azy
  - type: text
    content: dia tsy misy mampionona azy.
  - type: text
    content: Nanary azy avokoa ny sakaizany,
  - type: text
    content: ary tonga fahavalony ankehitriny.
  '20':
  - type: text
    content: TOMPO ô, jereo fa azom-pahoriana aho,
  - type: text
    content: ka mandevilevy fiontanana.
  - type: text
    content: Mihendratrendratra ato anatiko ny foko,
  - type: text
    content: satria nikomy taminao tokoa aho.
  - type: text
    content: Eny an-dalambe, naripaky ny sabatra ny zanako;
  - type: text
    content: ato an-trano, toa hoatry ny any amin’ny maty.
  '21':
  - type: text
    content: Henon’ny firenena manodidina fa misento aho;
  - type: text
    content: nefa tsy misy mampionona ahy.
  - type: text
    content: Henon’ny fahavaloko rehetra ny lozako;
  - type: text
    content: ka nahafaly azy ny nampiharinao tamiko.
  - type: text
    content: Ataovy tonga ilay andro nambaranao
  - type: note
    content: Jereo Ham 5.18; Is 2.12; 13.6; Jl 1.15; 2.1-2.
  - type: text
    content: ;
  - type: text
    content: dia aoka hihatra aminy koa izay nanjo ahy!
  '22':
  - type: text
    content: Ho tonga eo anatrehanao anie
  - type: text
    content: ny faharatsiany rehetra ka valio izy
  - type: text
    content: tahaka ny namalianao ahy
  - type: text
    content: tamin’ny fahadisoako rehetra.
  - type: text
    content: Satria maro loatra ny sentoko
  - type: text
    content: ka mankararirary ny foko izany.
  '3':
  - type: text
    content: Difotry ny fahoriana sy vesaram-panompoana
  - type: text
    content: no lasan-ko babo ny fokon’i Joda.
  - type: text
    content: Mitoetra any amin’ny hafa firenena izy izao
  - type: text
    content: kanefa tsy mahita hifaharana.
  - type: text
    content: Izay rehetra mpanenjika azy
  - type: text
    content: dia nahatratra azy an-katerena.
  '4':
  - type: text
    content: 'Misaona ny lalana mankany '
  - type: text
    content: Tsiôna
  - type: text
    content: satria tsy misy miakatra amin’ny fety.
  - type: text
    content: Mangina avokoa ny kianjany
  - type: text
    content: ary sentom-pahakiviana no ataon’ny mpisorony.
  - type: text
    content: Ory fatratra ireo tovovaviny,
  - type: text
    content: ka mangidy amin’i Tsiôna izany!
  '5':
  - type: text
    content: Ny fahavalony no lasa ambony
  - type: text
    content: ary ny mpiady aminy no miadana;
  - type: text
    content: satria ny TOMPO no mampahory an’i Tsiôna
  - type: text
    content: noho ireo fahadisoany maro.
  - type: text
    content: Atosi-pahavalo ireo zanany madinika
  - type: text
    content: no lasa ho any an-tsesitany.
  '6':
  - type: text
    content: Miala avy ao Tsiôna
  - type: text
    content: izay rehetra nireharehany;
  - type: text
    content: ary ny mpitondrany dia toy ny diera
  - type: text
    content: tsy mahita ahitra hiraofana,
  - type: text
    content: ka tsy manan-kery no mandositra
  - type: text
    content: eo anoloan’ny mpihaza azy.
  '7':
  - type: text
    content: Amin’izany androm-pahoriana irenireneny izany
  - type: text
    content: no ahatsiarovan’i Jerosalema
  - type: text
    content: ireo zava-tsarobidy rehetra
  - type: text
    content: izay nananany hatry ny ela.
  - type: text
    content: Ireo vahoakany eo an-tanam-pahavalo kosa
  - type: text
    content: dia tsy misy mamonjy;
  - type: text
    content: ka rehefa mahita an’i Jerosalema ny fahavalony,
  - type: text
    content: dia mihomehy ny amin’ny faharavàny.
  '8':
  - type: text
    content: Efa nanota dia nanota i Jerosalema,
  - type: text
    content: ka izany no mahatonga azy ho fako maharikoriko
  - type: note
    content: 'fako maharikoriko: dkt hafa fanesoana.'
  - type: text
    content: .
  - type: text
    content: Izay rehetra nanaja azy mamingavinga
  - type: text
    content: satria mahita azy mitanjaka.
  - type: text
    content: Na ny tenany aza dia misento
  - type: text
    content: sady lasa nihodina.
  '9':
  - type: text
    content: Ny lotony dia eo amin’ny akanjony;
  - type: text
    content: tsy nahatsinjo ny hoavy izy
  - type: text
    content: ka gaga noho ny fietreny toy izao,
  - type: text
    content: tsy misy mampahery azy akory.
  - type: text
    content: «TOMPO ô, jereo ity fahoriako, hoy izy,
  - type: text
    content: fa mirehareha ny fahavaloko!»
