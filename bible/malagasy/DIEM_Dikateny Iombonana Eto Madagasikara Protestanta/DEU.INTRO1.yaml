  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny famaranana ny boky Nomerỳ dia maneho amintsika ny vahoaka israelita mby eo am-bavahadin’ilay tany nampanantenaina. Ny boky
  - type: text
    text: ' Deoterônômy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'izay manohy ny boky Nomerỳ, dia mirakitra lahateny telo ataon’i Mosesy amin’ny Israelita (1.1–4.43; 4.44–28.68; 28.69–30.20). Ao anatin’ireo lahateny ireo no ampahatsiahivin’i Mosesy ny asa notontosain’Andriamanitra hanasoavana ny vahoakany. Notontosain’Andriamanitra ireny noho ny fitiavana tsy mety tofoka na oviana na oviana: nanaovany'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'ny vahoakany notarihiny nandritra ny efapolo taona namakivaky taniefitra, narovany tsy ho resin’ny fahavalo, ary nampitany ny didiny sy fampanantenàny. Kanefa tsy famerenana fotsiny ireo tantara na lalàna efa voalaza tao amin’ireo boky mialoha azy ny Deoterônômy: amin’ity boky ity dia miteny tahaka ny mpitoriteny mientanentana i Mosesy ka amin-kafanampo no anaingany ireo mpihaino azy mba hahatsiaro fa mahatoky tokoa ny Tompo, ilay Andriamanitra tena Izy, ary mba hifidy ny fiainana iombonana aminy. «Mihainoa, ry vahoaka Israely: Ny Tompo irery ihany no Andriamanitsika. Tiava ny Tompo Andriamanitrao amin’ny fonao manontolo, amin’ny fanahinao manontolo ary amin’ny herinao manontolo» (6.4-5, voatsiahy ao amin’ny Mt 22.37). Io rijan-teny io no fanombohan’ny'
  - type: text
    text: ' Shema '
  - type: usfm
    marker: it
    children:
    - type: text
      text: (na hoe «Mihainoa»), izay sady fiekem-pinoana no tonom-bavaka fanao isan’andro ho an’ny Israelita mpivavaka.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny toko efatra mamarana ny boky Deoterônômy dia mirakitra rijan-teny anankiroa miendrika poezia ary koa tantara anankiroa: etsy an-kilany, misy ilay antsoina hoe «hiran’i Mosesy» izay fiderana an’Andriamanitra (toko 32) ary misy ny tsodrano amam-pitahiana notononin’i Mosesy ho an’ireo foko 12 tanatin’i Israely (toko 33); etsy an-daniny, misy ny tantara maneho ny nifidianana an’i Josoa ho mpandimby an’i Mosesy mba hitarika ny Israelita hiditra ny tany nampanantenaina (toko 31) ary ny tantara momba ny nahafatesan’i Mosesy (toko 34).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny tenaben’ny Deoterônômy, izany hoe ny lahateny faharoa (4.44–28.68), no heverina ho ilay «bokin’ny lalàna» izay hita tao an-tempolin’i Jerosalema, faha-Jôsià mpanjaka (2 Mp 22) sy nahatonga ny fanitsiana ara-pivavahana notontosain’io mpanjaka tanora dia tanora io. Ny akon’ny hafatra raketin’ity boky ity dia tsikaritra koa ao amin’ny boky maro anisan’ny Testamenta Taloha (1 Mp; 2 Mp; Jer) ary hatrany amin’ny Testamenta Vaovao (ohatra Mt 4.4, 7, 10; Mk 12.32).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Na ho an’ny mpamaky fahizany na ho an’ny mpamaky ankehitriny, ny Deoterônômy dia mampahatsiahy fa ny hasambarana irin’ny olona tsirairay avy dia tsy hita marina raha tsy manjaka lalandava ary hatraiza hatraiza ny fanoavana tsy misy tomika an’ilay Andriamanitra mpamonjy sy mpanafaka.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Marihina mialoha fa eto amin’ity dikanteny ity dia tsy noraharahaina loatra ny fifandimbiasan’ny «ianareo» sy «ianao», satria saika naravona ho «ianareo» hatrany hatrany izany hahamora ny famakiana ny
  - type: text
    text: ' Deoterônômy.'
