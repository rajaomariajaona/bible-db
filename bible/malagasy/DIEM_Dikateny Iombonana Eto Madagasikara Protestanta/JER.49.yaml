document_id: JER.49,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Hamônita
  - type: text
    content: 'Fanambaràna momba ny Hamônita. Izao no lazain’ny TOMPO:'
  - type: text
    content: «Nahoana ny andriamanitra Milkôma
  - type: text
    content: no naka ny tanin’i Gada
  - type: note
    content: 'Ny Hamônita: jereo Ezek 21.33-37; 25.1-7; Ham 1.13-15; Tsef 2.8-11. –Milkôma: araka ny dkt tranainy maro andriamanitry ny jentilisa; hebreo Malkama izay midika hoe mpanjakan’ireo. –Gada: foko israelita izay mitomandavana eny atsinanan’i Jôrdàna ny taniny, eo anelanelan’i Jabôka sy Harnôna; jereo Jos 13.24-28.'
  - type: text
    content: ' ho fananany?'
  - type: text
    content: Ary nahoana ny Hamônita no monina
  - type: text
    content: ao amin’ny tanàna israelita?
  - type: text
    content: Tsy manan-janakalahy va i Israely
  - type: text
    content: mba ho afa-kandova izany?
  '10':
  - type: text
    content: Izaho no haka ny fanananareo
  - type: text
    content: ry taranak’i Hesao,
  - type: text
    content: Haharihariko ny fierenareo,
  - type: text
    content: ka tsy ho afa-miafina intsony ianareo.
  - type: text
    content: Ringana ianareo, mpiray firenena samy taranak’i Hesao;
  - type: text
    content: ringana ny mpiara-belona aminareo,
  - type: text
    content: 'ka tsy hisy olona hanao hoe:'
  '11':
  - type: text
    content: «Ankino amiko ny kambotinareo
  - type: text
    content: fa izaho no hamelona azy;
  - type: text
    content: ary mahazo matoky ahy ny mpitondratenanareo.»
  '12':
  - type: text
    content: 'Izao tokoa no lazain’ny TOMPO: «Indro fa izay tsy tokony hisotro amin’ny tsatokaty'
  - type: note
    content: 'ny tsatokaty: momba io mariky ny fitsaran’Andriamanitra io, jereo Jer 25.15-29.'
  - type: text
    content: ' aza, tsy maintsy nisotro ihany; koa ianao ve no ho afaka, ry Edôma? Tsia, tsy ho afaka ianao, tsy maintsy hisotro amin’ny tsatokaty ianao! '
  '13':
  - type: text
    content: Eny, Izaho TOMPO dia mianiana amin’ny tenako ary hentitra ny teny ambarako fa i Bôtserà renivohitrao dia hampahonena ka ho tonga oha-pandatsana ary ho rava ka ho tonga oha-panozonana; ary ireo tanàna lehibe mpifanila aminy dia ho rava mandrakizay.»
  '14':
  - type: text
    content: 'Nahare hafatra avy amin’ny TOMPO aho tamin’ny alalan’ny iraka izay nalefany ho any amin’ireo firenen-kafa nanao hoe:'
  - type: text
    content: «Mivoria ianareo!
  - type: text
    content: Mandehana hamely an’i Edôma!
  - type: text
    content: Mitsangàna hanafika azy!
  '15':
  - type: text
    content: Indro hataoko bitika ianao, ry Edôma
  - type: text
    content: raha mitaha eo amin’ny samy firenena,
  - type: text
    content: ka hataon’ny olona tsinontsinona.
  '16':
  - type: text
    content: Mampangovitra ny olona ianao
  - type: text
    content: sady mihevi-tena ho ambony
  - type: text
    content: kanefa mamita-tena.
  - type: text
    content: Ary ianao izay mipetraka
  - type: text
    content: eny an-tsefatsefaky ny harambato
  - type: text
    content: ka mamikitra eny antampon-kavoana,
  - type: text
    content: na dia mametraka ny akaninao ho avo
  - type: text
    content: toy ny an’ny voromahery aza ianao,
  - type: text
    content: dia havarimbariko avy eny.»
  - type: text
    content: Izany no teny hentitry ny TOMPO.
  '17':
  - type: text
    content: '«Ho toerana mahonena i Edôma, ka hampahonena sy hampivarahontsana izay rehetra mandalo azy ny fahavoazany. '
  '18':
  - type: text
    content: Fa ho rava tahaka an’i Sôdôma sy Gômôra mbamin’ireo tanàna manodidina azy izy, hoy ny TOMPO
  - type: note
    content: Jereo Gen 18.20–19.20.
  - type: text
    content: . Tsy hisy honina ao aminy ary tsy hisy olona hivahiny any intsony.»
  '19':
  - type: text
    content: 'Hoy koa ny TOMPO: «Indro Aho toy ny liona'
  - type: text
    content: miakatra avy ao an-kirihitralan’i Jôrdàna
  - type: text
    content: ka mirifatra mankany amin’ny fonenany;
  - type: text
    content: ka ao anatin’ny indray mipi-maso
  - type: text
    content: no hampandosirako ireo Edômita
  - type: note
    content: 'And 19-21: jereo 50.44-46.'
  - type: text
    content: .
  - type: text
    content: Ary hapetrako hifehy ao Edôma
  - type: text
    content: ilay nofidiko ho lehibeny.
  - type: text
    content: Koa iza no azo ampitahaina amiko?
  - type: text
    content: Iza no sahy hifandahatra amiko?
  - type: text
    content: Ary iza no mpitondra hahatohitra Ahy?»
  '2':
  - type: text
    content: 'Ka hoy ny teny hentitry ny TOMPO:'
  - type: text
    content: «Indro avy ny andro hampandrenesako akoran’ady
  - type: text
    content: ao Rabà, renivohitry ny Hamônita.
  - type: text
    content: Dia ho tonga tanàna aolo sy rava izy
  - type: text
    content: ary ireo tanàna miankina aminy ho kilan’ny afo
  - type: text
    content: ka ho lasan’i Israely indray, hoy Aho,
  - type: text
    content: ny fananana efa azy fahiny.»
  '20':
  - type: text
    content: Noho izany, henoy àry ny tetika
  - type: text
    content: novolavolain’ny TOMPO hamelezana an’i Edôma
  - type: text
    content: 'sy ny paika nomaniny hamelezana ny mponina ao Temàna:'
  - type: text
    content: ho toy ny fitondra biby fiompy mihitsy
  - type: text
    content: no hitondrana azy any an-kafa
  - type: text
    content: hatramin’ny olona farany indrindra.
  - type: text
    content: Ny fonenany mihitsy aza no manilika azy.
  '21':
  - type: text
    content: Hihorohoro ny tany
  - type: text
    content: noho ny fidoboky ny fianjerany;
  - type: text
    content: 'hatrany amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: no manako ny antso vonjy ataony.
  '22':
  - type: text
    content: Indro toa voromahery hipaoka no manidina sy misodisody eo ambonin’i Bôtserà. Amin’izany andro izany dia hangitakitaka toy ny vehivavy miteraka na dia ny lehilahy mahery fo aza
  - type: note
    content: 'And 22: jereo 48.40-41.'
  - type: text
    content: .
  - type: heading
    content: I Damasy
  '23':
  - type: text
    content: Fanambaràna ny amin’i Damasy.
  - type: text
    content: Very hevitra ny ao Hamata sy Harpada!
  - type: text
    content: Kivy izy fa nandre ny vaovao ratsy.
  - type: text
    content: Manahy sy mitebiteby ny fony
  - type: text
    content: ka tsy azo notonena
  - type: note
    content: 'Damasy: renivohitry ny fanjakana sirianina. –Hamata sy Harpada: tanàn-dehibe hafa sirianina. –Momba ny Sirianina tao Damasy, jereo Is 17.1 sy nta.'
  - type: text
    content: .
  '24':
  - type: text
    content: Efa ketraka ny olon’i Damasy
  - type: text
    content: ka nihodina mba handositra;
  - type: text
    content: satria tora-kovitra ireo
  - type: text
    content: sady mangitakitaka sy mitaintaina
  - type: text
    content: toy ny vehivavy raha miteraka.
  '25':
  - type: text
    content: Ahoana re no dia ilaozana
  - type: text
    content: ity tanàna malaza sady tanànam-pifaliana ity
  - type: note
    content: 'tanànam-pifaliana: hebreo tanànam-pifaliako.'
  - type: text
    content: '!'
  '26':
  - type: text
    content: 'Noho izany, dia ho faty eny an-kianja eny ny zatovony; ary ny miaramilany rehetra ho ripaka amin’izany andro izany, hoy ny teny hentitry ny TOMPOn’izao rehetra izao. '
  '27':
  - type: text
    content: Handrehetako afo ao an-tanànan’i Damasy ka handevona ny lapan’i Bena-Hadada
  - type: note
    content: 'Bena-Hadada: anarana nentin’ireo mpanjaka maro fahiny tany Damasy.'
  - type: text
    content: .
  - type: heading
    content: Ny foko arabo
  '28':
  - type: text
    content: 'Fanambaràna ny amin’ny Arabo ao Kedara sy ireo fanjakan’i Hatsôra izay resin’i Nebokadnetsara mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: '. Izao no lazain’ny Tompo:'
  - type: text
    content: Mitsangàna ianareo, ka miakara hamely an’i Kedara
  - type: note
    content: Momba ireo mponina Arabo, jereo Is 21.13 sy nta.
  - type: text
    content: ','
  - type: text
    content: Ravao avokoa izay rehetra an’ny olona any an-taniefitra.
  '29':
  - type: text
    content: Aoka horobaina ny lainy sy ny ondry aman’osiny,
  - type: text
    content: ny fialofany sy ny entany rehetra!
  - type: text
    content: Ary aoka hoentina ny ramevany!
  - type: text
    content: 'Aoka izy hiantsoantsoana hoe:'
  - type: text
    content: «Fampihorohoroana hatraiza hatraiza
  - type: note
    content: Jereo 6.25 sy nta.
  - type: text
    content: ».
  '3':
  - type: text
    content: Ry olon’i Hesbôna,
  - type: text
    content: 'manaova hira fitomaniana hoe:'
  - type: text
    content: «Rava ny tanàna Hay!»
  - type: text
    content: Manaova antso vonjy ianareo,
  - type: text
    content: ry tanàna miankina amin’i Rabà.
  - type: text
    content: Mitafia gony ho fisaonana
  - type: text
    content: ary manaova hira fitomaniana
  - type: text
    content: sady miveziveze etsy sy eroa ao anaty fefy,
  - type: text
    content: fa lasan-ko babo ny andriamanitra Milkôma
  - type: text
    content: mbamin’ny mpisorony sy ireo filoham-bahoakany
  - type: note
    content: 'Hesbôna: tanàn-dehibe any avaratra atsinanan’i Môaba (jereo 48.2); angamba teo an-tanan’ny Hamônita izy tamin’ny vanim-potoana nanaovana ity fanambarana ity. –Hay: tanàna hamônita izay tsy tokony hafangaro amin’ny toerana voalaza ao Jos 7.2. –andriamanitra Milkôma: jereo ny naoty momba ny and 1.'
  - type: text
    content: .
  '30':
  - type: text
    content: Ry olon’i Hatsôra, mandosira lavitra
  - type: text
    content: ka misitriha any anaty lava-bato,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  - type: text
    content: Fa manana fikasana hamely anareo
  - type: text
    content: i Nebokadnetsara mpanjakan’i Babilôna,
  - type: text
    content: ary nanomana tetika hahavoa anareo.
  '31':
  - type: text
    content: Mitsangàna ianareo, hoy ny teny hentitry ny TOMPO,
  - type: text
    content: ka miakara hamely firenena tsy manana ahiahy
  - type: text
    content: fa mihevitra ho miaina am-pilaminana,
  - type: text
    content: ka tsy manana varavarana na hidy
  - type: text
    content: sady mitoka-monina.
  '32':
  - type: text
    content: Hoentin’ny fahavalony ho babo
  - type: text
    content: ny ramevany sy ny ondry aman’osiny marobe.
  - type: text
    content: Haparitako any amin’ny vazantany rehetra
  - type: text
    content: ireo mponina voaharatra fihirifana ireo
  - type: note
    content: Jereo 9.25; 25.23.
  - type: text
    content: .
  - type: text
    content: Hitondrako fandravana hatraiza hatraiza izy,
  - type: text
    content: hoy ny teny hentitry ny TOMPO.
  '33':
  - type: text
    content: Hanjary fonenan’ny amboahaolo i Hatsôra
  - type: text
    content: ka ho toerana mampahonena mandrakizay.
  - type: text
    content: Tsy hisy honina ao aminy
  - type: text
    content: ary tsy hisy olona hivahiny any intsony.
  - type: heading
    content: I Helama
  '34':
  - type: text
    content: 'Hafatry ny TOMPO azon’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' ho an’ny Helamita, tamin’ny fiandohan’ny fanjakan’i Tsedekià mpanjakan’i Joda'
  - type: note
    content: Ny Helamita (jereo Ezek 32.24-25) dia nonina tany atsinanan’i Babilôna, nanodidina an’i Soza renivohiny. Nalaza izy ireo noho ny hakingan’ireo mpitifitra tsipîkany (and 5); jereo Is 22.6.
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: «Hopotehiko ny tsipîkan’i Helama
  - type: text
    content: fa izany no loharanon’ny heriny.
  '36':
  - type: text
    content: Avy any atsimo sy avaratra
  - type: text
    content: ary avy any atsinanana sy andrefana
  - type: text
    content: no handefasako ny rivotra efatra
  - type: text
    content: hamelezana an’i Helama.
  - type: text
    content: Haeliko any amin’ny vazantany rehetra izy,
  - type: text
    content: ka tsy hisy firenena
  - type: text
    content: izay tsy ahitana Helamita voaroaka.
  '37':
  - type: text
    content: Hampihorohoroiko ny Helamita
  - type: text
    content: eo anatrehan’ny fahavalony,
  - type: text
    content: dia eo anatrehan’izay mitady hahafaty azy.
  - type: text
    content: Amin-katezerana mirehitra
  - type: text
    content: no andefasako loza hamely azy.
  - type: text
    content: Hoenjehiko amin’ny ady ireo
  - type: text
    content: mandra-paharingako azy.
  '38':
  - type: text
    content: Hofoanako tsy hisy ao Helama
  - type: text
    content: ny mpanjaka sy ny mpitondra ambony
  - type: text
    content: mba hametrahako ny sezafiandrianako ao,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.
  '39':
  - type: text
    content: Nefa indray andro any ny Helamita
  - type: text
    content: dia haveriko avy any am-pahababoana ihany,
  - type: text
    content: hoy ny teny hentitra avy amiko TOMPO.»
  '4':
  - type: text
    content: Adray, ry Rabà, zazavavy mpikomy!
  - type: text
    content: Ahoana no ireharehanao amin’ny lohasahanao,
  - type: text
    content: dia ireo lohasahanao mahavokatra be,
  - type: text
    content: 'sy itokianao amin’ireo tahirinao hoe:'
  - type: text
    content: «Iza moa no ho sahy hanafika ahy?»
  '5':
  - type: text
    content: Ka hoy ny teny hentitry ny Tompo
  - type: text
    content: 'ANDRIAMANITR’izao rehetra izao:'
  - type: text
    content: «Indro Aho hahatonga fampihorohoroana aminao
  - type: text
    content: avy amin’ny olona rehetra manodidina anao.
  - type: text
    content: Horoahina hizotra eo anoloanareo avy ianareo
  - type: text
    content: ka tsy hisy hamory izay mandositra.
  '6':
  - type: text
    content: Rehefa afaka izany vao hampodîko
  - type: text
    content: avy amin’ny fahababoany ny Hamônita.
  - type: text
    content: Izany no teny hentitra avy amiko TOMPO.»
  - type: heading
    content: I Edôma
  '7':
  - type: text
    content: Fanambarana momba an’i Edôma.
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
  - type: text
    content: Tsy misy olon-kendry intsony ve ao Temàna
  - type: note
    content: 'Momba ny Edômita, jereo Is 34.5 sy nta. –Temàna: tanàn-dehibe Edômita izay malaza noho ny olon-kendriny (jereo Hôb 8-9).'
  - type: text
    content: '?'
  - type: text
    content: Efa very saina ve ireo matsilo saina?
  - type: text
    content: Sa efa vasoka ny fahendreny?
  '8':
  - type: text
    content: Miverena ilalana, mandosira, ry olon’i Dedàna,
  - type: text
    content: misitriha any anaty lava-bato any,
  - type: text
    content: satria ny loza, ry taranak’i Hesao
  - type: note
    content: 'Dedàna: tanàn-dehibe any avaratra andrefan’i Arabia. –Hesao: razamben’ny Edômita araka ny Gen 36.9.'
  - type: text
    content: ','
  - type: text
    content: no ataoko mihatra aminareo;
  - type: text
    content: izao ny fotoana irotsahako an-tsehatra hamely anareo.
  '9':
  - type: text
    content: Koa raha tonga any aminareo ny mpioty voaloboka,
  - type: text
    content: dia tsy hamela sampahony hotsimponina izy.
  - type: text
    content: Raha avy alina ny mpangalatra,
  - type: text
    content: dia handrava mandra-pahafapony.
