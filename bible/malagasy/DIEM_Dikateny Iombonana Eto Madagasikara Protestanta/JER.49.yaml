document_id: JER.49
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Hamônita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fanambaràna momba ny Hamônita. Izao no lazain’ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nahoana ny andriamanitra Milkôma
- type: usfm
  marker: q1
  children:
  - type: text
    text: no naka ny tanin’i Gada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny Hamônita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Ezek 21.33-37; 25.1-7; Ham 1.13-15; Tsef 2.8-11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Milkôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny dkt tranainy maro andriamanitry ny jentilisa; hebreo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Malkama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay midika hoe mpanjakan’ireo. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': foko israelita izay mitomandavana eny atsinanan’i Jôrdàna ny taniny, eo anelanelan’i Jabôka sy Harnôna; jereo Jos 13.24-28.'
    marker-yv: yv-n
  - type: text
    text: ' ho fananany?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana ny Hamônita no monina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao amin’ny tanàna israelita?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manan-janakalahy va i Israely
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba ho afa-kandova izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka hoy ny teny hentitry ny TOMPO:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro avy ny andro hampandrenesako akoran’ady
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao Rabà, renivohitry ny Hamônita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tonga tanàna aolo sy rava izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ireo tanàna miankina aminy ho kilan’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ho lasan’i Israely indray, hoy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny fananana efa azy fahiny.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry olon’i Hesbôna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'manaova hira fitomaniana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Rava ny tanàna Hay!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova antso vonjy ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry tanàna miankina amin’i Rabà.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitafia gony ho fisaonana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manaova hira fitomaniana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady miveziveze etsy sy eroa ao anaty fefy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lasan-ko babo ny andriamanitra Milkôma
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny mpisorony sy ireo filoham-bahoakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hesbôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe any avaratra atsinanan’i Môaba (jereo 48.2); angamba teo an-tanan’ny Hamônita izy tamin’ny vanim-potoana nanaovana ity fanambarana ity. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàna hamônita izay tsy tokony hafangaro amin’ny toerana voalaza ao Jos 7.2. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: andriamanitra Milkôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo ny naoty momba ny and 1.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Adray, ry Rabà, zazavavy mpikomy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoana no ireharehanao amin’ny lohasahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ireo lohasahanao mahavokatra be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy itokianao amin’ireo tahirinao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Iza moa no ho sahy hanafika ahy?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ka hoy ny teny hentitry ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ANDRIAMANITR’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Indro Aho hahatonga fampihorohoroana aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny olona rehetra manodidina anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horoahina hizotra eo anoloanareo avy ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy hisy hamory izay mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Rehefa afaka izany vao hampodîko
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny fahababoany ny Hamônita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitra avy amiko TOMPO.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Edôma
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fanambarana momba an’i Edôma.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’ny TOMPOn’izao rehetra izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy olon-kendry intsony ve ao Temàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny Edômita, jereo Is 34.5 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Temàna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': tanàn-dehibe Edômita izay malaza noho ny olon-kendriny (jereo Hôb 8-9).'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa very saina ve ireo matsilo saina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa efa vasoka ny fahendreny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miverena ilalana, mandosira, ry olon’i Dedàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: misitriha any anaty lava-bato any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria ny loza, ry taranak’i Hesao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Dedàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàn-dehibe any avaratra andrefan’i Arabia. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hesao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': razamben’ny Edômita araka ny Gen 36.9.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ataoko mihatra aminareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: izao ny fotoana irotsahako an-tsehatra hamely anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa raha tonga any aminareo ny mpioty voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsy hamela sampahony hotsimponina izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha avy alina ny mpangalatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handrava mandra-pahafapony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izaho no haka ny fanananareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry taranak’i Hesao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haharihariko ny fierenareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy ho afa-miafina intsony ianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana ianareo, mpiray firenena samy taranak’i Hesao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ringana ny mpiara-belona aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka tsy hisy olona hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Ankino amiko ny kambotinareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa izaho no hamelona azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahazo matoky ahy ny mpitondratenanareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao tokoa no lazain’ny TOMPO: «Indro fa izay tsy tokony hisotro amin’ny tsatokaty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tsatokaty: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: momba io mariky ny fitsaran’Andriamanitra io, jereo Jer 25.15-29.
    marker-yv: yv-n
  - type: text
    text: ' aza, tsy maintsy nisotro ihany; koa ianao ve no ho afaka, ry Edôma? Tsia, tsy ho afaka ianao, tsy maintsy hisotro amin’ny tsatokaty ianao! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, Izaho TOMPO dia mianiana amin’ny tenako ary hentitra ny teny ambarako fa i Bôtserà renivohitrao dia hampahonena ka ho tonga oha-pandatsana ary ho rava ka ho tonga oha-panozonana; ary ireo tanàna lehibe mpifanila aminy dia ho rava mandrakizay.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nahare hafatra avy amin’ny TOMPO aho tamin’ny alalan’ny iraka izay nalefany ho any amin’ireo firenen-kafa nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mivoria ianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana hamely an’i Edôma!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna hanafika azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro hataoko bitika ianao, ry Edôma
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha mitaha eo amin’ny samy firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hataon’ny olona tsinontsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mampangovitra ny olona ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mihevi-tena ho ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa mamita-tena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ianao izay mipetraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny an-tsefatsefaky ny harambato
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mamikitra eny antampon-kavoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia mametraka ny akaninao ho avo
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny an’ny voromahery aza ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia havarimbariko avy eny.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no teny hentitry ny TOMPO.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ho toerana mahonena i Edôma, ka hampahonena sy hampivarahontsana izay rehetra mandalo azy ny fahavoazany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ho rava tahaka an’i Sôdôma sy Gômôra mbamin’ireo tanàna manodidina azy izy, hoy ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 18.20–19.20.
    marker-yv: yv-n
  - type: text
    text: . Tsy hisy honina ao aminy ary tsy hisy olona hivahiny any intsony.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy koa ny TOMPO: «Indro Aho toy ny liona'
- type: usfm
  marker: q1
  children:
  - type: text
    text: miakatra avy ao an-kirihitralan’i Jôrdàna
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mirifatra mankany amin’ny fonenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ao anatin’ny indray mipi-maso
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hampandosirako ireo Edômita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.19 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 19-21:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 50.44-46.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hapetrako hifehy ao Edôma
- type: usfm
  marker: q1
  children:
  - type: text
    text: ilay nofidiko ho lehibeny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa iza no azo ampitahaina amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no sahy hifandahatra amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mpitondra hahatohitra Ahy?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Noho izany, henoy àry ny tetika
- type: usfm
  marker: q1
  children:
  - type: text
    text: novolavolain’ny TOMPO hamelezana an’i Edôma
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny paika nomaniny hamelezana ny mponina ao Temàna:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny fitondra biby fiompy mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hitondrana azy any an-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: hatramin’ny olona farany indrindra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fonenany mihitsy aza no manilika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
