document_id: 1TH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny asa vitan’i Paoly tany Tesalônika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ianareo, ry havana, dia mahalala fa tsy very maina velively ny nidiranay tatỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo koa fa taloha kelin’izay, dia nampijalîna sy nalam-baràka tany Filipy izahay; kanefa dia nomen’ilay Andriamanitray fahasahiana hanambara taminareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' avy aminy, na dia be aza ny fanoherana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 16.19-24; 17.1-9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, ny antso nataonay dia tsy mifototra amin’ny fitaka na amin’ny fahalotoana na amin’ny fisolokiana; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa Andriamanitra no efa nizaha toetra anay ka nanankina taminay ny Vaovao Mahafaly, ary dia araka izany no itenenanay: tsy mila sitraka amin’olombelona izahay, fa amin’Andriamanitra Izay mizaha toetra ny fonay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fantatrareo fa tsy nanao teny manasohaso olona izahay na nihatsaravelatsihy hanafina fitiavan-karena; Andriamanitra no vavolombelonay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy nitady voninahitra tamin’olombelona izahay, na taminareo na tamin’ny hafa, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'na dia azonay natao aza ny nanampatra fahefana araka ny maha '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôlin’i Kristy
  - type: text
    text: ' anay; fa teo anivonareo, dia nalemy fanahy izahay, mova tsy reny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fa teo anivonareo, dia nalemy fanahy izahay, mova tsy reny...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa teo anivonareo, dia toy ny zazakely izahay; mova tsy ny reny mikolokolo ny zanany naterany izahay.
    marker-yv: yv-n
  - type: text
    text: 'mikolokolo ny zanany naterany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Noho ny fankamamianay anareo, dia tsy ny Vaovao Mahafaly avy amin’Andriamanitra ihany no sitrakay hampitaina aminareo, fa vonona koa izahay hahafoy na dia ny ainay aza, satria efa tonga malalanay ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsaroanareo, ry havana, ny nikelezanay aina sy nisasaranay mafy; niasa andro aman’alina izahay mba tsy hanahirana na dia olona iray taminareo aza, fony izahay nitory taminareo ny Vaovao Mahafaly avy amin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Samy vavolombelonay, na ianareo na Andriamanitra, fa madio sy marina ary tsy manan-tsiny ny fitondrantenanay teo anoloanareo mpino. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fantatrareo fa toy ny fitondran’ny ray ny zanany naterany no nitondranay anareo tsirairay avy: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nampirisika anareo izahay sy nampahery anareo ary nananatra anareo mba hanao fitondrantena mendrika an’Andriamanitra, dia ilay Andriamanitra Izay miantso anareo hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàny
  - type: text
    text: ' sy ny voninahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao koa no mahatonga anay ho velom-pisaorana tsy tapaka an’Andriamanitra: rehefa nandray ny tenin’Andriamanitra notorînay ianareo, dia tsy noraisinareo ho tenin’olombelona izany, fa noraisinareo ho tenin’Andriamanitra, araka ny tena izy, ary dia miasa ao aminareo izay mino. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ianareo, ry havana, dia efa tahaka ny kristianina ao amin’ireo Fiangonan’Andriamanitra any Jodea, izay tafaray amin’i Kristy Jesoa; izay nanjo anareo tamin’ny nafitsoky ny mpiray firenena aminareo no nanjo azy ireo koa tamin’ny nafitsoky ny Jiosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 17.5-6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Namono nahafaty an’i Jesoa Tompo sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' ry zareo Jiosy sady nanenjika anay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 9.23-29; 13.45, 50; 14.2, 5, 19; 17.5, 13; 18.2.
    marker-yv: yv-n
  - type: text
    text: '; ka tsy mahazo sitraka amin’Andriamanitra ireo sady fahavalon’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sakanan-dry zareo izahay tsy hitory amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' ilay hafatra mitondra famonjena, hany ka mihafeno hatrany ny fatran’ny fahotana vitan’ny Jiosy, kanjo, tamin’ny farany, dia niharan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fahatezeran’Andriamanitra
  - type: text
    text: ' ireo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maniry hitsidika ny Tesalônisianina indray i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izahay, ry havana, hatramin’ny nahatafasaraka anay vetivety taminareo izay lavitry ny masonay fa tsy lavitry ny fonay, dia maniry mafy mihitsy hahita anareo, ka manao izay azonay atao hahatanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indray mandeha na indroa izahay no te hiverina tatỳ aminareo, indrindra fa izaho Paoly, nefa dia voasakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Satria tsy iza fa ianareo ihany no fanantenanay sy hafalianay ary satroboninahi-pandresena hireharehanay eo anatrehan’i Jesoa Tompontsika, amin’ny andro hiaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eny, voninahitray sy hafalianay tokoa ianareo!
