document_id: 1TH.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny asa vitan’i Paoly tany Tesalônika
  - type: text
    content: 'Ianareo, ry havana, dia mahalala fa tsy very maina velively ny nidiranay tatỳ aminareo. '
  '10':
  - type: text
    content: 'Samy vavolombelonay, na ianareo na Andriamanitra, fa madio sy marina ary tsy manan-tsiny ny fitondrantenanay teo anoloanareo mpino. '
  '11':
  - type: text
    content: 'Fantatrareo fa toy ny fitondran’ny ray ny zanany naterany no nitondranay anareo tsirairay avy: '
  '12':
  - type: text
    content: 'nampirisika anareo izahay sy nampahery anareo ary nananatra anareo mba hanao fitondrantena mendrika an’Andriamanitra, dia ilay Andriamanitra Izay miantso anareo hiditra ao amin’ny '
  - type: text
    content: Fanjakàny
  - type: text
    content: ' sy ny voninahiny.'
  '13':
  - type: text
    content: 'Izao koa no mahatonga anay ho velom-pisaorana tsy tapaka an’Andriamanitra: rehefa nandray ny tenin’Andriamanitra notorînay ianareo, dia tsy noraisinareo ho tenin’olombelona izany, fa noraisinareo ho tenin’Andriamanitra, araka ny tena izy, ary dia miasa ao aminareo izay mino. '
  '14':
  - type: text
    content: Ianareo, ry havana, dia efa tahaka ny kristianina ao amin’ireo Fiangonan’Andriamanitra any Jodea, izay tafaray amin’i Kristy Jesoa; izay nanjo anareo tamin’ny nafitsoky ny mpiray firenena aminareo no nanjo azy ireo koa tamin’ny nafitsoky ny Jiosy
  - type: note
    content: Jereo Asa 17.5-6.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Namono nahafaty an’i Jesoa Tompo sy ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' ry zareo Jiosy sady nanenjika anay'
  - type: note
    content: Jereo Asa 9.23-29; 13.45, 50; 14.2, 5, 19; 17.5, 13; 18.2.
  - type: text
    content: '; ka tsy mahazo sitraka amin’Andriamanitra ireo sady fahavalon’ny olona rehetra. '
  '16':
  - type: text
    content: 'Sakanan-dry zareo izahay tsy hitory amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' ilay hafatra mitondra famonjena, hany ka mihafeno hatrany ny fatran’ny fahotana vitan’ny Jiosy, kanjo, tamin’ny farany, dia niharan’ny '
  - type: text
    content: fahatezeran’Andriamanitra
  - type: text
    content: ' ireo.'
  - type: heading
    content: Maniry hitsidika ny Tesalônisianina indray i Paoly
  '17':
  - type: text
    content: 'Ary izahay, ry havana, hatramin’ny nahatafasaraka anay vetivety taminareo izay lavitry ny masonay fa tsy lavitry ny fonay, dia maniry mafy mihitsy hahita anareo, ka manao izay azonay atao hahatanteraka izany. '
  '18':
  - type: text
    content: 'Indray mandeha na indroa izahay no te hiverina tatỳ aminareo, indrindra fa izaho Paoly, nefa dia voasakan’i '
  - type: text
    content: Satàna
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Satria tsy iza fa ianareo ihany no fanantenanay sy hafalianay ary satroboninahi-pandresena hireharehanay eo anatrehan’i Jesoa Tompontsika, amin’ny andro hiaviany. '
  '2':
  - type: text
    content: 'Fantatrareo koa fa taloha kelin’izay, dia nampijalîna sy nalam-baràka tany Filipy izahay; kanefa dia nomen’ilay Andriamanitray fahasahiana hanambara taminareo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' avy aminy, na dia be aza ny fanoherana'
  - type: note
    content: Jereo Asa 16.19-24; 17.1-9.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Eny, voninahitray sy hafalianay tokoa ianareo!
  '3':
  - type: text
    content: 'Eny, ny antso nataonay dia tsy mifototra amin’ny fitaka na amin’ny fahalotoana na amin’ny fisolokiana; '
  '4':
  - type: text
    content: 'fa Andriamanitra no efa nizaha toetra anay ka nanankina taminay ny Vaovao Mahafaly, ary dia araka izany no itenenanay: tsy mila sitraka amin’olombelona izahay, fa amin’Andriamanitra Izay mizaha toetra ny fonay. '
  '5':
  - type: text
    content: 'Fantatrareo fa tsy nanao teny manasohaso olona izahay na nihatsaravelatsihy hanafina fitiavan-karena; Andriamanitra no vavolombelonay. '
  '6':
  - type: text
    content: 'Tsy nitady voninahitra tamin’olombelona izahay, na taminareo na tamin’ny hafa, '
  '7':
  - type: text
    content: 'na dia azonay natao aza ny nanampatra fahefana araka ny maha '
  - type: text
    content: apôstôlin’i Kristy
  - type: text
    content: ' anay; fa teo anivonareo, dia nalemy fanahy izahay, mova tsy reny'
  - type: note
    content: 'fa teo anivonareo, dia nalemy fanahy izahay, mova tsy reny...: misy stf sasany ahitana hoe fa teo anivonareo, dia toy ny zazakely izahay; mova tsy ny reny mikolokolo ny zanany naterany izahay.'
  - type: text
    content: 'mikolokolo ny zanany naterany. '
  '8':
  - type: text
    content: 'Noho ny fankamamianay anareo, dia tsy ny Vaovao Mahafaly avy amin’Andriamanitra ihany no sitrakay hampitaina aminareo, fa vonona koa izahay hahafoy na dia ny ainay aza, satria efa tonga malalanay ianareo. '
  '9':
  - type: text
    content: 'Tsaroanareo, ry havana, ny nikelezanay aina sy nisasaranay mafy; niasa andro aman’alina izahay mba tsy hanahirana na dia olona iray taminareo aza, fony izahay nitory taminareo ny Vaovao Mahafaly avy amin’Andriamanitra. '
