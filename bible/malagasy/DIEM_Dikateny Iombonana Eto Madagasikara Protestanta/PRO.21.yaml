document_id: PRO.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fon’ny mpanjaka dia toy ny rano mikoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tarihin’ny tanan’ny TOMPO amin’izay tiany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy maniry hatrany ny hanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka na dia ny sakaizany aza tsy ananany antra,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hendry ny kely saina raha sazîna ny mpaniratsira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahazo fahalalana ny hendry raha misy mampianatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ilay Marina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (=Andriamanitra).'
      marker-yv: yv-n
    - type: text
      text: ' manara-maso ny andian’ireo olon-dratsy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mamarina azy any amin’ny loza.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manampin-tsofina amin’ny fitarainan’ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy hihaino rehefa mba mitaraina koa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanomezana atao mangingina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mampitony ny fahatezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tolotra omena an-kinafinafina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampitsahatra ny fahavinirana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fifalian’ny olo-marina ny manao izay rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa zava-mampijaly ny mpanao ratsy kosa izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mivily miala amin’ny lalam-pahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho naman’ny maty tsy ho ela.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tia filibàna ho tonga mahantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary izay tia divay sy hanim-py tsy mba hanan-karena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olon-dratsy ho avotry ny olo-marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny mpivadika ho solon’ny olo-mahitsy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo mitoetra any an-taniefitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay manana vehivavy liana ady sy saro-po.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona mihevitra ny ataony ho mahitsy avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO no mitsara ny eritreritra manesika azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy raki-tsarobidy sy harena sesehena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny fonenan’ny hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny adala kosa mandanilany foana ny azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fatra-pandala fahamarinana sy hatsaram-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahita fiainana sy famonjena ary haja.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hendry mahanika izay tanana mafy ambina indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandrodana ny manda izay ianteheran’ny mponina.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahatandrina ny teny rehetra ataony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miaro ny tenany tsy hanana ahiahy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mirehareha sy miavonavona no atao hoe mpaniratsira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fatra-pianjonanjona izy raha manao zavatra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitsiriritan’ny kamo no hahafaty azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy mety miasa ny tanany;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tontolo andro izy mitsiriritra hatrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa ny olo-marina sady manome no malala-tanana.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Zava-maharikoriko ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ataon’ireo olon-dratsy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indrindra fa amin-kafetsena no anolorany azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho levona ny vavolombelona mandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ho afa-miteny hatrany kosa izay mitatitra ny henony.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miseho ho sahisahy ny olon-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny olo-mahitsy kosa mampitombina tsara ny toetrany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanaovana ny marina sy mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia sitraky ny TOMPO kokoa noho ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendren’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahaizana amam-pisainany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maivana eo anatrehan’ny TOMPO.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaomana hiatrika ady ny soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO kosa no manome ny fandresena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fijery miandranandrana sy fo miavonavona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fahotana avokoa ny fiedinedin’ireo olon-dratsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tetikasan’ny olona mazoto no mampanan-karena azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra mikoropaka mihary kosa mihamahantra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay harena azo tamin’ny lainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia etona mihelina ihany sy fandrika mahafaty.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny halozàn’ny olon-dratsy no mamery azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy mety manao ny marina ireo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miolikolika ny lalan’ny olo-meloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahitsy kosa ny asan’ny madio fo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo mitoetra amin’ny efitra kely ao an-tampon-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy izay miray trano amin’ny vehivavy liana ady.
