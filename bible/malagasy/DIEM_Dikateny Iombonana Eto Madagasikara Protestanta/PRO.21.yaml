document_id: PRO.21,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fon’ny mpanjaka dia toy ny rano mikoriana
  - type: text
    content: izay tarihin’ny tanan’ny TOMPO amin’izay tiany.
  '10':
  - type: text
    content: Ny olon-dratsy maniry hatrany ny hanao ratsy,
  - type: text
    content: ka na dia ny sakaizany aza tsy ananany antra,
  '11':
  - type: text
    content: Ho hendry ny kely saina raha sazîna ny mpaniratsira;
  - type: text
    content: ary hahazo fahalalana ny hendry raha misy mampianatra.
  '12':
  - type: text
    content: Ny olo-marina
  - type: note
    content: Dkt hafa Ilay Marina (=Andriamanitra).
  - type: text
    content: ' manara-maso ny andian’ireo olon-dratsy'
  - type: text
    content: ka mamarina azy any amin’ny loza.
  '13':
  - type: text
    content: Izay manampin-tsofina amin’ny fitarainan’ny mahantra
  - type: text
    content: dia tsy hisy hihaino rehefa mba mitaraina koa.
  '14':
  - type: text
    content: Ny fanomezana atao mangingina
  - type: text
    content: dia mampitony ny fahatezerana,
  - type: text
    content: ary ny tolotra omena an-kinafinafina
  - type: text
    content: mampitsahatra ny fahavinirana.
  '15':
  - type: text
    content: Fifalian’ny olo-marina ny manao izay rariny;
  - type: text
    content: fa zava-mampijaly ny mpanao ratsy kosa izany.
  '16':
  - type: text
    content: Izay mivily miala amin’ny lalam-pahendrena
  - type: text
    content: dia ho naman’ny maty tsy ho ela.
  '17':
  - type: text
    content: Izay tia filibàna ho tonga mahantra,
  - type: text
    content: ary izay tia divay sy hanim-py tsy mba hanan-karena.
  '18':
  - type: text
    content: Ny olon-dratsy ho avotry ny olo-marina,
  - type: text
    content: ary ny mpivadika ho solon’ny olo-mahitsy.
  '19':
  - type: text
    content: Aleo mitoetra any an-taniefitra
  - type: text
    content: toy izay manana vehivavy liana ady sy saro-po.
  '2':
  - type: text
    content: Ny olona mihevitra ny ataony ho mahitsy avokoa;
  - type: text
    content: fa ny TOMPO no mitsara ny eritreritra manesika azy.
  '20':
  - type: text
    content: Misy raki-tsarobidy sy harena sesehena
  - type: text
    content: ao amin’ny fonenan’ny hendry;
  - type: text
    content: fa ny adala kosa mandanilany foana ny azy.
  '21':
  - type: text
    content: Izay fatra-pandala fahamarinana sy hatsaram-po
  - type: text
    content: no hahita fiainana sy famonjena ary haja.
  '22':
  - type: text
    content: Ny hendry mahanika izay tanana mafy ambina indrindra
  - type: text
    content: ka mandrodana ny manda izay ianteheran’ny mponina.
  '23':
  - type: text
    content: Izay mahatandrina ny teny rehetra ataony
  - type: text
    content: dia miaro ny tenany tsy hanana ahiahy.
  '24':
  - type: text
    content: Izay mirehareha sy miavonavona no atao hoe mpaniratsira;
  - type: text
    content: fatra-pianjonanjona izy raha manao zavatra.
  '25':
  - type: text
    content: Ny fitsiriritan’ny kamo no hahafaty azy,
  - type: text
    content: satria tsy mety miasa ny tanany;
  '26':
  - type: text
    content: tontolo andro izy mitsiriritra hatrany,
  - type: text
    content: nefa ny olo-marina sady manome no malala-tanana.
  '27':
  - type: text
    content: 'Zava-maharikoriko ny '
  - type: text
    content: sorona
  - type: text
    content: ' ataon’ireo olon-dratsy,'
  - type: text
    content: indrindra fa amin-kafetsena no anolorany azy.
  '28':
  - type: text
    content: Ho levona ny vavolombelona mandainga;
  - type: text
    content: fa ho afa-miteny hatrany kosa izay mitatitra ny henony.
  '29':
  - type: text
    content: Miseho ho sahisahy ny olon-dratsy,
  - type: text
    content: fa ny olo-mahitsy kosa mampitombina tsara ny toetrany.
  '3':
  - type: text
    content: Ny fanaovana ny marina sy mahitsy
  - type: text
    content: 'dia sitraky ny TOMPO kokoa noho ny '
  - type: text
    content: sorona
  - type: text
    content: .
  '30':
  - type: text
    content: Ny fahendren’olombelona
  - type: text
    content: sy ny fahaizana amam-pisainany
  - type: text
    content: dia maivana eo anatrehan’ny TOMPO.
  '31':
  - type: text
    content: Voaomana hiatrika ady ny soavaly,
  - type: text
    content: fa ny TOMPO kosa no manome ny fandresena.
  '4':
  - type: text
    content: 'Fijery miandranandrana sy fo miavonavona:'
  - type: text
    content: fahotana avokoa ny fiedinedin’ireo olon-dratsy.
  '5':
  - type: text
    content: Ny tetikasan’ny olona mazoto no mampanan-karena azy;
  - type: text
    content: izay rehetra mikoropaka mihary kosa mihamahantra.
  '6':
  - type: text
    content: Izay harena azo tamin’ny lainga
  - type: text
    content: dia etona mihelina ihany sy fandrika mahafaty.
  '7':
  - type: text
    content: Ny halozàn’ny olon-dratsy no mamery azy,
  - type: text
    content: satria tsy mety manao ny marina ireo.
  '8':
  - type: text
    content: Miolikolika ny lalan’ny olo-meloka;
  - type: text
    content: fa mahitsy kosa ny asan’ny madio fo.
  '9':
  - type: text
    content: Aleo mitoetra amin’ny efitra kely ao an-tampon-trano
  - type: text
    content: toy izay miray trano amin’ny vehivavy liana ady.
