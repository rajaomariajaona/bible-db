document_id: EZR.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisakanan’ireo fahavalo mba tsy hanaovan’ny Jiosy ny trano.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ren’ny valovotaka, fahavalon’ny Jiosy tao Joda sy tao Benjamîna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny valovotaka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(jereo 3.3 sy nta) dia antsoina sahady ho fahavalon’ny Jiosy; kanefa taorian’ny nandavan’ny Jiosy hampiany (4.2) vao nanjary fahavalon’ny Jiosy ry zareo. –Ny fokon’i Joda sy fokon’i Benjamîna no namorona ny fanjakàn’i Joda mandra-pahatongan’ny sesitany: jereo 1 Mp 11.32 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', fa manorina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' ho an’ny TOMPO Andriamanitr’i Israely ny Jiosy nody avy any an-tsesitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanatona an’i Zerobabela sy ny loham-pianakaviana ireo valovotaka ireo ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka izahay mba hiara-manorin-trano aminareo. Ilay Andriamanitrareo manko dia hajainay tahaka ny anajanareo Azy sady Izy mihitsy no toloranay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' hatramin’ny andron’i Esara-Hadôna, mpanjaka asirianina, izay nampiakatra anay ho atỳ'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Esara-Hadôna, mpanjaka asirianina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (680-669 tal J.K.) dia nanaraka ny pôlitikan’ireo mpanjaka talohany ka nanao sesitany ny firenena resiny (ampit 2 Mp 17.24-41).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa i Zerobabela sy i Jesoa mbamin’ireo namany loham-pianakaviana israelita kosa namaly azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy misy ilànay anareo amin’ny fanorenana trano ho an’ilay Andriamanitray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lehibe jiosy dia mandà ny hiara-miasa amin’ireo valovotaka izay mbola manompo andriamani-kafa noho ny Tompo.
    marker-yv: yv-n
  - type: text
    text: ; fa izahay ihany no hanorin-trano ho an’ny TOMPO Andriamanitr’i Israely, araka ny didy efa navoakan’i Kirôsa amperôran’i Persia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izany ny valovotaka dia nanao izay hampiraviravy tanana ny Jiosy sady nandevilevy azy mba tsy hanorina ilay trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Novidiny vola aza ny mpanolotsain’ny amperôra mba hanohitra ny Jiosy ka hampandamoka ny fikasany. Nanomboka tamin’ny andron’i Kirôsa amperôran’i Persia ka hatramin’ny nanjakàn’i Dariôsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Toa i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dariôsa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' 1 izay nanjaka tamin’ny taona 522-486 tal J.K. no lazaina eto. –Sarotra dia sarotra ny fandaharana ny zava-nitranga raketin’ny bokin’i Hezrà sy bokin’i Nehemià, indrindra fa nisy maromaro ny amperôran’i Persia nitondra anarana mitovy (Dariôsa telo, Artakserksesa telo).'
    marker-yv: yv-n
  - type: text
    text: ' amperôran’i Persia no nanaovana izany teti-dratsy izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampangain’ny valovotaka amin’ny amperôra Artakserksesa ny Jiosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha vao nanjaka i Kserksesa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Kserksesa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia nanjaka tamin’ny taona 486-464 tal J.K.; jereo Est 1.1.
    marker-yv: yv-n
  - type: text
    text: ', dia nanoratra taratasy ho azy ny fahavalon’ny Jiosy mba hanendrikendrika ny mponina tao Jerosalema sy eran’i Joda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin’ny andro nanjakàn’i Artakserksesa amperôran’i Persia, dia nanoratra taratasy ho azy ry i Bislama sy i Mitredata ary i Tabeela mbamin’ireo namany hafa; ka tarehin-tsoratra aramianina sy fiteny aramianina no nanaovany an’ilay taratasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Artakserksesa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toa ilay Artakserksesa I, izay nanjaka tamin’ny taona 464-424 tal J.K. –Ny rijan-teny hebreo amin’ny faran’ity and ity dia tsy mazava; dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'nosoratana tamin’ny teny aramianina sy nadika (aramianina):'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny tena taratasy voalohany dia tamin’ny teny aramianina, ary ny dikanteny no tamin’ny teny persianina; ny voambolana farany anaty fononteny dia toa manondro fa, manomboka amin’ny and manaraka, dia ny rijan-teny aramianina no aroson’ny mpanoratra (Hez 4.8–6.18 manko dia amin’ny fiteny aramianina).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I Rehoma governora sy i Simsay mpitantsorany dia nanoratra taratasy anankiray koa ho an’ny amperôra Artakserksesa ny amin’i Jerosalema. Toy izao no fanombohan’izany:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Avy amin’i Rehoma governora sy amin’i Simsay mpitantsoratra ary avy amin’ireo namany hafa mifehy ny valovotaka: dia ny Dinaîta sy Afarsatekita ary Tarpelita, ny Afarsaîta sy Arkevita ary Babilônianina, ny Sosanita sy Dehavita ary Helamita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Maro ny firenena valovotaka voatonona eto no tsy fantatra mazava; ny anarana sasantsasany aza dia noheverina fa manondro asam-panjakana: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpitsara, solotena, mpanara-maso
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sns...'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mbamin’ny firenena hafa nafindran’i Asnapara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Asnapara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa i Asorbanipaka nandimby an’i Esara-Hadôna ho mpanjakan’i Asiria izy io (taona 668-630 tal J.K.).
    marker-yv: yv-n
  - type: text
    text: ' mpanjaka lehibe sady malaza, ka namponeniny tamin’ireo tanànan’i Samaria na tamin’ny toerana sisa atỳ andafy andrefan’ny ony Eofrata,...»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao kosa no kôpian’ilay taratasy nalefany ho an’ny amperôra Artakserksesa:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Voninahitra ho anay mpanomponao atỳ andafy andrefan’ny ony Eofrata... ny manoratra ity taratasy ity aminao, ry Andriamanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka ho fantatrao fa ny Jiosy, izay niala avy tany aminao mba hiverina hankatỳ aminay, dia efa tonga any Jerosalema ka miroso manorina indray ilay tanàna mpikomy sady ratsy. Efa manangana ny manda ry zareo izao rehefa avy nanamboatra ny fototra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka ho fantatrao, ry Andriamanjaka, fa raha voaorina indray io tanàna io ka tafatsangana ny mandany, dia tsy hety handoa hetra na haba na sara intsony ry zareo; ka dia hahatonga fatiantoka ho an’ny fanjakanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy ho zakanay ny hahita anao afa-baràka, ry Andriamanjaka, satria izahay dia mandray tombontsoa amin’ny fanompoana anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria izahay... fanompoana anao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toa izany no hevitry ny fomba fiteny midika ara-bakiteny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noho izahay mihinana sira avy amin’ny lapan’ny amperôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; ny sira indraindray dia famantarana ny fanekempihavanana (jereo Lev 2.13 sy nta) ka heverina fa io fomba fiteny io dia manambara ny tombontsoan’izay miankina amin’ny amperôra.
    marker-yv: yv-n
  - type: text
    text: '; koa naniraka olona izahay hampahafantatra anao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka hozahanao ny boky mirakitra ny tantaran-drazanao; dia ho hitanao sy ho fantatrao fa tanàna nikomy hatrany io tanàna io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fampahatsiahivana ny zava-nitranga tamin’ny taona 587 tal J.K.: fakana an’i Jerosalema sy fandravana azy ampahany.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ampahafantarinay anao, ry Andriamanjaka, fa raha voaorina indray io tanàna io ka tafatsangana ny mandany, dia tsy hanana faritany atỳ andafy andrefan’ny ony Eofrata intsony ianao».
- type: usfm
  marker: s1
  children:
  - type: text
    text: Valintenin’i Artakserksesa mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao kosa no valin-taratasy nalefan’ny amperôra:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Ho an’i Rehoma governora sy i Simsay mpitantsoratra ary ny namany hafa izay monina any Samaria na amin’ny toerana sisa any andafy andrefan’ny ony Eofrata.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Mamangy sy miarahaba anareo, aho sns...
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Ny taratasy izay nalefanareo ho ahy dia efa voavaky tsara teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary efa nanome baiko aho hizahana ny boky firaketana; dia hita fa nitroatra nanohitra mpanjaka maro hatrizay ela izay tokoa io tanàna io, ka nisy fikomiana sy fiodinana niseho tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Efa nisy mpanjaka mahery izay nanjaka tany Jerosalema, ka nanapaka ny tany rehetra any andafy andrefan’ny ony Eofrata sady nandoavana hetra sy haba ary sara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa dia makà fepetra hampitsahatra ireo olona ireo; fa tsy haorina indray io tanàna io, raha tsy efa nahazo teny avy atỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tandremo tsara fandrao manao tsirambina amin’izany ianareo, ka hitombo ny fahavoazana hahafatiantoka ny fanjakana».
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vao voavaky teo anatrehan’i Rehoma sy i Simsay ary ny namany kosa ilay taratasin’ny amperôra Artakserksesa, dia niakatra faingana ho any amin’ny Jiosy tany Jerosalema ry zareo ka nampitsahatra azy an-keriny sy an-ditra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanohizana ny asa momba ny tempoly indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nitsahatra ny asa fanorenana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: ' tao Jerosalema; ary naharitra hatramin’ny taona faharoa nanjakàn’i Dariôsa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo and 5 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', amperôran’i Persia, izany fiatoana izany.'
