document_id: EZR.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisakanan’ireo fahavalo mba tsy hanaovan’ny Jiosy ny trano.
  - type: text
    content: Ren’ny valovotaka, fahavalon’ny Jiosy tao Joda sy tao Benjamîna
  - type: note
    content: 'Ny valovotaka (jereo 3.3 sy nta) dia antsoina sahady ho fahavalon’ny Jiosy; kanefa taorian’ny nandavan’ny Jiosy hampiany (4.2) vao nanjary fahavalon’ny Jiosy ry zareo. –Ny fokon’i Joda sy fokon’i Benjamîna no namorona ny fanjakàn’i Joda mandra-pahatongan’ny sesitany: jereo 1 Mp 11.32 sy nta.'
  - type: text
    content: ', fa manorina '
  - type: text
    content: tempoly
  - type: text
    content: ' ho an’ny TOMPO Andriamanitr’i Israely ny Jiosy nody avy any an-tsesitany. '
  '10':
  - type: text
    content: mbamin’ny firenena hafa nafindran’i Asnapara
  - type: note
    content: 'Asnapara: toa i Asorbanipaka nandimby an’i Esara-Hadôna ho mpanjakan’i Asiria izy io (taona 668-630 tal J.K.).'
  - type: text
    content: ' mpanjaka lehibe sady malaza, ka namponeniny tamin’ireo tanànan’i Samaria na tamin’ny toerana sisa atỳ andafy andrefan’ny ony Eofrata,...»'
  '11':
  - type: text
    content: 'Izao kosa no kôpian’ilay taratasy nalefany ho an’ny amperôra Artakserksesa:'
  - type: text
    content: '«Voninahitra ho anay mpanomponao atỳ andafy andrefan’ny ony Eofrata... ny manoratra ity taratasy ity aminao, ry Andriamanjaka. '
  '12':
  - type: text
    content: 'Aoka ho fantatrao fa ny Jiosy, izay niala avy tany aminao mba hiverina hankatỳ aminay, dia efa tonga any Jerosalema ka miroso manorina indray ilay tanàna mpikomy sady ratsy. Efa manangana ny manda ry zareo izao rehefa avy nanamboatra ny fototra. '
  '13':
  - type: text
    content: 'Aoka ho fantatrao, ry Andriamanjaka, fa raha voaorina indray io tanàna io ka tafatsangana ny mandany, dia tsy hety handoa hetra na haba na sara intsony ry zareo; ka dia hahatonga fatiantoka ho an’ny fanjakanao izany. '
  '14':
  - type: text
    content: Tsy ho zakanay ny hahita anao afa-baràka, ry Andriamanjaka, satria izahay dia mandray tombontsoa amin’ny fanompoana anao
  - type: note
    content: 'satria izahay... fanompoana anao: toa izany no hevitry ny fomba fiteny midika ara-bakiteny hoe noho izahay mihinana sira avy amin’ny lapan’ny amperôra; ny sira indraindray dia famantarana ny fanekempihavanana (jereo Lev 2.13 sy nta) ka heverina fa io fomba fiteny io dia manambara ny tombontsoan’izay miankina amin’ny amperôra.'
  - type: text
    content: '; koa naniraka olona izahay hampahafantatra anao izany. '
  '15':
  - type: text
    content: Aoka hozahanao ny boky mirakitra ny tantaran-drazanao; dia ho hitanao sy ho fantatrao fa tanàna nikomy hatrany io tanàna io
  - type: note
    content: 'Fampahatsiahivana ny zava-nitranga tamin’ny taona 587 tal J.K.: fakana an’i Jerosalema sy fandravana azy ampahany.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Ary ampahafantarinay anao, ry Andriamanjaka, fa raha voaorina indray io tanàna io ka tafatsangana ny mandany, dia tsy hanana faritany atỳ andafy andrefan’ny ony Eofrata intsony ianao».
  - type: heading
    content: Valintenin’i Artakserksesa mpanjaka
  '17':
  - type: text
    content: 'Izao kosa no valin-taratasy nalefan’ny amperôra:'
  - type: text
    content: «Ho an’i Rehoma governora sy i Simsay mpitantsoratra ary ny namany hafa izay monina any Samaria na amin’ny toerana sisa any andafy andrefan’ny ony Eofrata.
  - type: text
    content: «Mamangy sy miarahaba anareo, aho sns...
  '18':
  - type: text
    content: '«Ny taratasy izay nalefanareo ho ahy dia efa voavaky tsara teo anatrehako. '
  '19':
  - type: text
    content: 'Ary efa nanome baiko aho hizahana ny boky firaketana; dia hita fa nitroatra nanohitra mpanjaka maro hatrizay ela izay tokoa io tanàna io, ka nisy fikomiana sy fiodinana niseho tao. '
  '2':
  - type: text
    content: 'Dia nanatona an’i Zerobabela sy ny loham-pianakaviana ireo valovotaka ireo ka nanao taminy hoe:'
  - type: text
    content: '–Aoka izahay mba hiara-manorin-trano aminareo. Ilay Andriamanitrareo manko dia hajainay tahaka ny anajanareo Azy sady Izy mihitsy no toloranay '
  - type: text
    content: sorona
  - type: text
    content: ' hatramin’ny andron’i Esara-Hadôna, mpanjaka asirianina, izay nampiakatra anay ho atỳ'
  - type: note
    content: i Esara-Hadôna, mpanjaka asirianina (680-669 tal J.K.) dia nanaraka ny pôlitikan’ireo mpanjaka talohany ka nanao sesitany ny firenena resiny (ampit 2 Mp 17.24-41).
  - type: text
    content: .
  '20':
  - type: text
    content: 'Efa nisy mpanjaka mahery izay nanjaka tany Jerosalema, ka nanapaka ny tany rehetra any andafy andrefan’ny ony Eofrata sady nandoavana hetra sy haba ary sara. '
  '21':
  - type: text
    content: 'Koa dia makà fepetra hampitsahatra ireo olona ireo; fa tsy haorina indray io tanàna io, raha tsy efa nahazo teny avy atỳ amiko. '
  '22':
  - type: text
    content: Tandremo tsara fandrao manao tsirambina amin’izany ianareo, ka hitombo ny fahavoazana hahafatiantoka ny fanjakana».
  '23':
  - type: text
    content: Vao voavaky teo anatrehan’i Rehoma sy i Simsay ary ny namany kosa ilay taratasin’ny amperôra Artakserksesa, dia niakatra faingana ho any amin’ny Jiosy tany Jerosalema ry zareo ka nampitsahatra azy an-keriny sy an-ditra.
  - type: heading
    content: Ny fanohizana ny asa momba ny tempoly indray
  '24':
  - type: text
    content: 'Dia nitsahatra ny asa fanorenana ny '
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' tao Jerosalema; ary naharitra hatramin’ny taona faharoa nanjakàn’i Dariôsa'
  - type: note
    content: Jereo and 5 sy nta.
  - type: text
    content: ', amperôran’i Persia, izany fiatoana izany.'
  '3':
  - type: text
    content: 'Fa i Zerobabela sy i Jesoa mbamin’ireo namany loham-pianakaviana israelita kosa namaly azy hoe:'
  - type: text
    content: –Tsy misy ilànay anareo amin’ny fanorenana trano ho an’ilay Andriamanitray
  - type: note
    content: Ny lehibe jiosy dia mandà ny hiara-miasa amin’ireo valovotaka izay mbola manompo andriamani-kafa noho ny Tompo.
  - type: text
    content: ; fa izahay ihany no hanorin-trano ho an’ny TOMPO Andriamanitr’i Israely, araka ny didy efa navoakan’i Kirôsa amperôran’i Persia.
  '4':
  - type: text
    content: 'Tamin’izany ny valovotaka dia nanao izay hampiraviravy tanana ny Jiosy sady nandevilevy azy mba tsy hanorina ilay trano. '
  '5':
  - type: text
    content: Novidiny vola aza ny mpanolotsain’ny amperôra mba hanohitra ny Jiosy ka hampandamoka ny fikasany. Nanomboka tamin’ny andron’i Kirôsa amperôran’i Persia ka hatramin’ny nanjakàn’i Dariôsa
  - type: note
    content: Toa i Dariôsa 1 izay nanjaka tamin’ny taona 522-486 tal J.K. no lazaina eto. –Sarotra dia sarotra ny fandaharana ny zava-nitranga raketin’ny bokin’i Hezrà sy bokin’i Nehemià, indrindra fa nisy maromaro ny amperôran’i Persia nitondra anarana mitovy (Dariôsa telo, Artakserksesa telo).
  - type: text
    content: ' amperôran’i Persia no nanaovana izany teti-dratsy izany.'
  - type: heading
    content: Ampangain’ny valovotaka amin’ny amperôra Artakserksesa ny Jiosy.
  '6':
  - type: text
    content: Raha vao nanjaka i Kserksesa
  - type: note
    content: I Kserksesa dia nanjaka tamin’ny taona 486-464 tal J.K.; jereo Est 1.1.
  - type: text
    content: ', dia nanoratra taratasy ho azy ny fahavalon’ny Jiosy mba hanendrikendrika ny mponina tao Jerosalema sy eran’i Joda.'
  '7':
  - type: text
    content: Tamin’ny andro nanjakàn’i Artakserksesa amperôran’i Persia, dia nanoratra taratasy ho azy ry i Bislama sy i Mitredata ary i Tabeela mbamin’ireo namany hafa; ka tarehin-tsoratra aramianina sy fiteny aramianina no nanaovany an’ilay taratasy
  - type: note
    content: 'Artakserksesa: toa ilay Artakserksesa I, izay nanjaka tamin’ny taona 464-424 tal J.K. –Ny rijan-teny hebreo amin’ny faran’ity and ity dia tsy mazava; dkt hafa nosoratana tamin’ny teny aramianina sy nadika (aramianina): ny tena taratasy voalohany dia tamin’ny teny aramianina, ary ny dikanteny no tamin’ny teny persianina; ny voambolana farany anaty fononteny dia toa manondro fa, manomboka amin’ny and manaraka, dia ny rijan-teny aramianina no aroson’ny mpanoratra (Hez 4.8–6.18 manko dia amin’ny fiteny aramianina).'
  - type: text
    content: .
  '8':
  - type: text
    content: 'I Rehoma governora sy i Simsay mpitantsorany dia nanoratra taratasy anankiray koa ho an’ny amperôra Artakserksesa ny amin’i Jerosalema. Toy izao no fanombohan’izany:'
  '9':
  - type: text
    content: '«Avy amin’i Rehoma governora sy amin’i Simsay mpitantsoratra ary avy amin’ireo namany hafa mifehy ny valovotaka: dia ny Dinaîta sy Afarsatekita ary Tarpelita, ny Afarsaîta sy Arkevita ary Babilônianina, ny Sosanita sy Dehavita ary Helamita'
  - type: note
    content: 'Maro ny firenena valovotaka voatonona eto no tsy fantatra mazava; ny anarana sasantsasany aza dia noheverina fa manondro asam-panjakana: mpitsara, solotena, mpanara-maso sns...'
  - type: text
    content: ', '
