document_id: PSA.91,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Mialoka ao amin’Andriamanitra Avo Indrindra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay mipetraka ao amin’ny fialofan’ilay Avo Indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitoetra eo ambany fiarovan’Andriamanitra Tsitoha,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ka tsy hisy loza hianjady aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na antambo hanakaiky ny tranonao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa ny Tompo handidy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliny
    - type: text
      text: ' hiahy anao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiaro anao na aiza na aiza alehanao;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: hoentin’ireo eny an-tanany ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho tafintohina amin’ny vato ny tongotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '91.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 11-12: jereo Mt 4.6; Lk 4.10-11.'
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hodiavinao ny liona sy ny menarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hohitsahinao ny tigra sy ny dragona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '91.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 10.19.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hoy ny Tompo hoe: «Nifikitra tamiko izy, ka hovonjeko;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harovako izy satria miaiky ahy ho Tompo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Raha miantso vonjy amiko izy, dia hovaliako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha azom-pahoriana izy, dia ho eo anilany Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hafahako izy sy homeko voninahitra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hataoko ela velona tokoa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanehoako ny famonjeko.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka tokony hiteny amin’ny TOMPO izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ianao no manda fiarovana ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no Andriamanitro ka itokiako.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: –Ny Tompo mihitsy no hanafaka anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny fandrika mivelatra sy areti-mandringana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Harovany amin’ny elany ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo ambany elany no hialofanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny zanak’akoho eo ambany ela-dreniny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinany no ampinga fiarovana,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ka tsy misy zavatra atahoranao akory:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny loza mampihorohoro amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny zana-tsipîka manidina amin’ny antoandro,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: na ny areti-mandringana misoko amin’ny haizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny voina mandripaka amin’ny mitataovovonana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Eny, na misy olona arivo aza maty eo akaikinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary na iray alina aza miampatra eo ankavananao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hisy loza hihatra aminao akory.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ahirato fotsiny ny masonao, dia ho hitanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famalian’Andriamanitra ny olon-dratsy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny TOMPO mihitsy no fialofana ho anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ny Avo Indrindra no nataonao fonenana;
