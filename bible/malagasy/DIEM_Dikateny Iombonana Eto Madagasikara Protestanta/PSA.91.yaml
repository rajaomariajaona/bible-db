document_id: PSA.91,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Mialoka ao amin’Andriamanitra Avo Indrindra
  - type: text
    content: Izay mipetraka ao amin’ny fialofan’ilay Avo Indrindra
  - type: text
    content: dia mitoetra eo ambany fiarovan’Andriamanitra Tsitoha,
  '10':
  - type: text
    content: ka tsy hisy loza hianjady aminao
  - type: text
    content: na antambo hanakaiky ny tranonao.
  '11':
  - type: text
    content: 'Fa ny Tompo handidy ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' hiahy anao'
  - type: text
    content: mba hiaro anao na aiza na aiza alehanao;
  '12':
  - type: text
    content: hoentin’ireo eny an-tanany ianao
  - type: text
    content: mba tsy ho tafintohina amin’ny vato ny tongotrao
  - type: note
    content: 'And 11-12: jereo Mt 4.6; Lk 4.10-11.'
  - type: text
    content: .
  '13':
  - type: text
    content: Hodiavinao ny liona sy ny menarana
  - type: text
    content: hohitsahinao ny tigra sy ny dragona
  - type: note
    content: Jereo Lk 10.19.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Hoy ny Tompo hoe: «Nifikitra tamiko izy, ka hovonjeko;'
  - type: text
    content: harovako izy satria miaiky ahy ho Tompo.
  '15':
  - type: text
    content: Raha miantso vonjy amiko izy, dia hovaliako;
  - type: text
    content: raha azom-pahoriana izy, dia ho eo anilany Aho;
  - type: text
    content: hafahako izy sy homeko voninahitra.
  '16':
  - type: text
    content: Hataoko ela velona tokoa izy
  - type: text
    content: ary hanehoako ny famonjeko.»
  '2':
  - type: text
    content: 'ka tokony hiteny amin’ny TOMPO izy hoe:'
  - type: text
    content: «Ianao no manda fiarovana ho ahy;
  - type: text
    content: Ianao no Andriamanitro ka itokiako.»
  '3':
  - type: text
    content: –Ny Tompo mihitsy no hanafaka anao
  - type: text
    content: amin’ny fandrika mivelatra sy areti-mandringana.
  '4':
  - type: text
    content: Harovany amin’ny elany ianao;
  - type: text
    content: eo ambany elany no hialofanao
  - type: text
    content: tahaka ny zanak’akoho eo ambany ela-dreniny.
  - type: text
    content: Ny fahamarinany no ampinga fiarovana,
  '5':
  - type: text
    content: 'ka tsy misy zavatra atahoranao akory:'
  - type: text
    content: na ny loza mampihorohoro amin’ny alina,
  - type: text
    content: na ny zana-tsipîka manidina amin’ny antoandro,
  '6':
  - type: text
    content: na ny areti-mandringana misoko amin’ny haizina,
  - type: text
    content: na ny voina mandripaka amin’ny mitataovovonana.
  '7':
  - type: text
    content: Eny, na misy olona arivo aza maty eo akaikinao
  - type: text
    content: ary na iray alina aza miampatra eo ankavananao,
  - type: text
    content: dia tsy hisy loza hihatra aminao akory.
  '8':
  - type: text
    content: Ahirato fotsiny ny masonao, dia ho hitanao
  - type: text
    content: ny famalian’Andriamanitra ny olon-dratsy.
  '9':
  - type: text
    content: Ny TOMPO mihitsy no fialofana ho anao
  - type: text
    content: sady ny Avo Indrindra no nataonao fonenana;
