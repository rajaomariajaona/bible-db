document_id: 2PE.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin’ny fiavian’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry hava-malala, ity izao no taratasy faharoa soratako ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izy roroa dia samy entiko hampahatsiarovan-javatra anareo sy hanaitaitra ny eritreritra mahitsy anananareo; ka dia hotsarovana ny zavatra voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' masina fahiny mbamin’ny didy nomen’ny Tompo sy Mpamonjy, didy izay nentin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' nirahina ho atỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no aoka ho fantatrareo voalohany indrindra: amin’ny andro farany dia hisy mpaniratsira tonga haniratsira anareo, dia olona miaina araka ny filàndratsiny '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka hilaza hoe: «Aiza ity fampanantenàn’ny Tompo momba ny fiaviany? Efa nodimandry manko ny razantsika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'razantsika: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo kristianina teo amin’ny fiantombohan’ny Fiangonana ka efa lasan’Andriamanitra no tondroina amin’izany.
    marker-yv: yv-n
  - type: text
    text: ', kanefa ny zavatra rehetra dia maharitra tsy miova toy ny hatramin’ny nahariana an’izao tontolo izao ihany!» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, inian’ireo mpaniratsira ireo hadinoina fa hatramin’ny ela Andriamanitra no niteny nampisy ny habakabaka sy ny tany; ka ny tany dia nipoitra avy amin’ny rano sady ny rano koa no nampirafitra azy ho mafy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rano ihany koa no nandravana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' fahiny, dia tamin’ny safodrano'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Gen 1.6-9. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 6:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Gen 7.11.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izao habakabaka sy tany ankehitriny izao kosa dia mbola ny tenin’Andriamanitra no mihazona azy, ka voatahiry hodorana amin’ny andro fitsarana izay natao hamerezana ny olona tsy niraiki-po tamin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa izao zavatra izao, ry hava-malala, no aoka tsy hohadinoinareo: amin’ny Tompo, ny indray andro dia toy ny arivo taona, ary ny arivo taona dia toy ny indray andro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 90.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa tsy ahemotry ny Tompo araka ny hevitry ny sasany akory ny fampanantenàny: saingy mahari-po aminareo Izy, satria tsy tiany hisy ho very fa mba hiroso hiala amin’ny toe-dratsy avokoa ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho avy tahaka ny mpangalatra ny andron’ny Tompo; ary amin’izany dia hirimorimo mafy ka hanjavona ny habakabaka sady ho levon’ny hafanana ireo karazan-javatra ao aminy, ary hodorana avokoa ny tany sy izay taozavatra ao aminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tahaka ny mpangalatra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Mt 24.43-44; Lk 12.39-40; 1Tes 5.2. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'karazan-javatra ao aminy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' planeta aman-kintana isan-karazany. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hodorana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy hisy intsony,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy koa ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hihanjahanja
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (eo anatrehan’Andriamanitra), sy ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho rava.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha ho levona toy izany àry izao rehetra izao, dia ho olona tokony hanao ahoana moa ianareo amin’ny fitondrantena masina sy ny firaiketam-po amin’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sady andrasanareo no hafainganinareo ny fiavian’ilay andron’Andriamanitra, izay andro hahamay ny habakabaka sy hahalevona azy ary hanempoan’ny hafanana ireo karazan-javatra ao aminy! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kanefa isika, araka ny fampanantenàn’Andriamanitra, dia miandry ny habakabaka vaovao sy tany vaovao izay honenan’ny fahamarinana soritan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 65.17; 66.22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miomàna amin’ny fiavian’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa eo am-piandrasana izany, ry hava-malala, dia miezaha mafy mba ho tsy manan-tsiny amam-pondro ary hihavana tsara no hahitan’ny Tompo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hevero fa ny fahari-pon’ny Tompontsika dia ho famonjena anareo, toy ny voasoratr’i Paoly hava-malalantsika taminareo araka ny fahendrena nomen’Andriamanitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toy izany koa no ataony ao amin’ny taratasiny rehetra izay itenenany momba izany zavatra izany; amin’ireny taratasiny ireny anefa dia misy zavatra saro-pantarina izay aolan’ny olona kely fahalalana sady tsy miorina tsara, toy ny ataony rahateo amin’ny teny hafa raketin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ', ka mahatonga fahaverezana ho an’ny tenany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ianareo kosa, ry hava-malala, dia efa nampahalalaina izany rahateo; koa mitandrema fandrao voataonan’ny hevi-dison’ireo ratsy fanahy, ka hiala amin’izay iorenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa mitomboa fahasoavana sy fahalalana an’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Tompontsika sy Mpamonjy antsika. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .
