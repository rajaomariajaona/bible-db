document_id: 2PE.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fiavian’ny Tompo
  - type: text
    content: 'Ry hava-malala, ity izao no taratasy faharoa soratako ho anareo. '
  '10':
  - type: text
    content: Ho avy tahaka ny mpangalatra ny andron’ny Tompo; ary amin’izany dia hirimorimo mafy ka hanjavona ny habakabaka sady ho levon’ny hafanana ireo karazan-javatra ao aminy, ary hodorana avokoa ny tany sy izay taozavatra ao aminy
  - type: note
    content: 'tahaka ny mpangalatra: ampit Mt 24.43-44; Lk 12.39-40; 1Tes 5.2. –karazan-javatra ao aminy: planeta aman-kintana isan-karazany. –hodorana: misy stf sasany ahitana hoe tsy hisy intsony, misy koa ahitana hoe hihanjahanja (eo anatrehan’Andriamanitra), sy ny hoe ho rava.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Koa raha ho levona toy izany àry izao rehetra izao, dia ho olona tokony hanao ahoana moa ianareo amin’ny fitondrantena masina sy ny firaiketam-po amin’Andriamanitra? '
  '12':
  - type: text
    content: 'Sady andrasanareo no hafainganinareo ny fiavian’ilay andron’Andriamanitra, izay andro hahamay ny habakabaka sy hahalevona azy ary hanempoan’ny hafanana ireo karazan-javatra ao aminy! '
  '13':
  - type: text
    content: Kanefa isika, araka ny fampanantenàn’Andriamanitra, dia miandry ny habakabaka vaovao sy tany vaovao izay honenan’ny fahamarinana soritan’Andriamanitra
  - type: note
    content: Jereo Is 65.17; 66.22.
  - type: text
    content: .
  - type: heading
    content: Miomàna amin’ny fiavian’ny Tompo
  '14':
  - type: text
    content: 'Koa eo am-piandrasana izany, ry hava-malala, dia miezaha mafy mba ho tsy manan-tsiny amam-pondro ary hihavana tsara no hahitan’ny Tompo anareo. '
  '15':
  - type: text
    content: 'Hevero fa ny fahari-pon’ny Tompontsika dia ho famonjena anareo, toy ny voasoratr’i Paoly hava-malalantsika taminareo araka ny fahendrena nomen’Andriamanitra azy. '
  '16':
  - type: text
    content: 'Toy izany koa no ataony ao amin’ny taratasiny rehetra izay itenenany momba izany zavatra izany; amin’ireny taratasiny ireny anefa dia misy zavatra saro-pantarina izay aolan’ny olona kely fahalalana sady tsy miorina tsara, toy ny ataony rahateo amin’ny teny hafa raketin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ', ka mahatonga fahaverezana ho an’ny tenany.'
  '17':
  - type: text
    content: 'Ianareo kosa, ry hava-malala, dia efa nampahalalaina izany rahateo; koa mitandrema fandrao voataonan’ny hevi-dison’ireo ratsy fanahy, ka hiala amin’izay iorenanareo. '
  '18':
  - type: text
    content: 'Fa mitomboa fahasoavana sy fahalalana an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika sy Mpamonjy antsika. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '2':
  - type: text
    content: 'Izy roroa dia samy entiko hampahatsiarovan-javatra anareo sy hanaitaitra ny eritreritra mahitsy anananareo; ka dia hotsarovana ny zavatra voalazan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' masina fahiny mbamin’ny didy nomen’ny Tompo sy Mpamonjy, didy izay nentin’ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' nirahina ho atỳ aminareo. '
  '3':
  - type: text
    content: 'Izao no aoka ho fantatrareo voalohany indrindra: amin’ny andro farany dia hisy mpaniratsira tonga haniratsira anareo, dia olona miaina araka ny filàndratsiny '
  '4':
  - type: text
    content: 'ka hilaza hoe: «Aiza ity fampanantenàn’ny Tompo momba ny fiaviany? Efa nodimandry manko ny razantsika'
  - type: note
    content: 'razantsika: ireo kristianina teo amin’ny fiantombohan’ny Fiangonana ka efa lasan’Andriamanitra no tondroina amin’izany.'
  - type: text
    content: ', kanefa ny zavatra rehetra dia maharitra tsy miova toy ny hatramin’ny nahariana an’izao tontolo izao ihany!» '
  '5':
  - type: text
    content: 'Eny, inian’ireo mpaniratsira ireo hadinoina fa hatramin’ny ela Andriamanitra no niteny nampisy ny habakabaka sy ny tany; ka ny tany dia nipoitra avy amin’ny rano sady ny rano koa no nampirafitra azy ho mafy. '
  '6':
  - type: text
    content: 'Rano ihany koa no nandravana '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' fahiny, dia tamin’ny safodrano'
  - type: note
    content: 'And 5: jereo Gen 1.6-9. –And 6: jereo Gen 7.11.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Izao habakabaka sy tany ankehitriny izao kosa dia mbola ny tenin’Andriamanitra no mihazona azy, ka voatahiry hodorana amin’ny andro fitsarana izay natao hamerezana ny olona tsy niraiki-po tamin’Andriamanitra.
  '8':
  - type: text
    content: 'Kanefa izao zavatra izao, ry hava-malala, no aoka tsy hohadinoinareo: amin’ny Tompo, ny indray andro dia toy ny arivo taona, ary ny arivo taona dia toy ny indray andro'
  - type: note
    content: Ampit Sal 90.4.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Koa tsy ahemotry ny Tompo araka ny hevitry ny sasany akory ny fampanantenàny: saingy mahari-po aminareo Izy, satria tsy tiany hisy ho very fa mba hiroso hiala amin’ny toe-dratsy avokoa ny olona rehetra. '
