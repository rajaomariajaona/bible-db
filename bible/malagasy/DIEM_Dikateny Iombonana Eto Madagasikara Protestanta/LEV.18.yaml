document_id: LEV.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitandroana ny hasin’ny fanambadiana
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: «Aza miray amin’ny zafinao vavy, nateraky ny zanakalahinao na ny zanakavavinao, fa manala baràka anao izany.
  '11':
  - type: text
    content: «Aza miray amin’ny zanakavavin’ny renikelinao, satria anabavinao izy noho ny rainao manjary rainy
  - type: note
    content: 'satria...manjary rainy: dkt hafa noho izy anabavinao satria teraky ny rainao.'
  - type: text
    content: .
  '12':
  - type: text
    content: «Aza miray amin’ny anabavin-drainao, satria havan-drainao akaiky dia akaiky izy.
  '13':
  - type: text
    content: «Aza miray amin’ny rahavavin-dreninao, satria havan-dreninao akaiky dia akaiky izy.
  '14':
  - type: text
    content: «Aza alaim-baràka ny rahalahin-drainao noho ny firaisanao amin’ny vadiny, izay nenitoanao
  - type: note
    content: 'And 12-14: jereo 20.19-20.'
  - type: text
    content: .
  '15':
  - type: text
    content: «Aza miray amin’ny vinantovavinao, fa vadin’ny zanakalahinao izy
  - type: note
    content: Jereo 20.12; Gen 38.16,26; Ezek 22.11.
  - type: text
    content: .
  '16':
  - type: text
    content: «Aza miray amin’ny vadin-drahalahinao, fa manala baràka ny rahalahinao izany
  - type: note
    content: Jereo 20.21; Mt 14.3-12; ampit Deot 25.5-10; Mt 22.23-33.
  - type: text
    content: .
  '17':
  - type: text
    content: «Aza miray amin’ny vehivavy anankiray no sady hiray amin’ny zananivavy na koa hiray amin’ny zafikeliny vavy, nateraky ny zananilahy na zananivavy, satria mpihavana akaiky ilay vehivavy sy ny zanaka aman-jafiny ka firaisana mampifamotitra izany
  - type: note
    content: Jereo 20.14; Deot 27.23.
  - type: text
    content: .
  '18':
  - type: text
    content: «Aza mampakatra ny rahavavim-badinao raha mbola velona ilay vadinao, satria hampifandrafy azy mirahavavy izany.
  '19':
  - type: text
    content: '«Aza mila vehivavy mbola '
  - type: text
    content: voaloto
  - type: text
    content: n’ny fadimbolany mba hiray aminy
  - type: note
    content: Jereo 15.24; 20.18; Ezek 22.10.
  - type: text
    content: .
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Izaho no TOMPO Andriamanitrareo! '
  '20':
  - type: text
    content: «Aza miray amin’ny vadin’olona mpiray firenena aminao, satria ho voaloton’izany ianao
  - type: note
    content: Jereo 20.10; Eks 20.14; Deot 50.18; 2 Sam 11.2-4; Ezek 22.11.
  - type: text
    content: .
  '21':
  - type: text
    content: '«Aza misy omena hatao '
  - type: text
    content: sorona
  - type: text
    content: ' dorana hanajana ny sampy Môlôka ny zanakao'
  - type: note
    content: 'Môlôka (na hoe Môleka): andriamanitra sampy tompoin’ny Hamônita; kanefa ny anarany, amin’ny teny hebreo, dia sady midika ho «mpanjaka» no midika ho «henatra, fahafaham-baràka». –Jereo 20.2-5; Deot 12.31; 2 Mp 17.17; Jer 7.31; Sal 106.37-38.'
  - type: text
    content: ', satria manala baràka ny anaran’Andriamanitrao izany. Izaho no TOMPO.'
  '22':
  - type: text
    content: «Aza miray amin’ny lehilahy tahaka ny firay amin’ny vehivavy; zava-mamoafady izany
  - type: note
    content: Jereo 20.13; Gen 19.5; Mpits 19.22; Rm 1.27.
  - type: text
    content: .
  '23':
  - type: text
    content: «Aza miray amin’ny biby, satria ho voaloton’izany ianao; ary aoka tsy hisy vehivavy hety hiray amin’ny biby, fa zava-mamoafady indrindra izany
  - type: note
    content: Jereo 20.15-16; Eks 22.18; Deot 27.21.
  - type: text
    content: .
  '24':
  - type: text
    content: '«Aza misy andotoanareo tena ireo zavatra ireo; fa tamin’ireo no nandoto tena ny hafa firenena izay efa horoahiko eo anoloanareo. '
  '25':
  - type: text
    content: Voaloto mbamin’ny tany aza, ka novaliako ny helony ary naloany ny mponina teo aminy.
  '26':
  - type: text
    content: '«Noho izany, ianareo Israelita tompontany na vahiny valovotaka eo aminy, dia tandremo ny lalànako amam-pitsipiko, ka aza misy atao ireo zava-mamoafady ireo. '
  '27':
  - type: text
    content: 'Fanaon’ny olona talohanareo tao amin’ny tany Kanahana ireo, ka dia naloto ny tany. '
  '28':
  - type: text
    content: 'Aza lotoinareo indray ny tany mba tsy handoavany anareo tahaka ny efa nandoavany an’ireo firenena izay tao talohanareo. '
  '29':
  - type: text
    content: Hofongorana tsy ho anisan’ny vahoaka israelita manko izay rehetra manao amin’ireo zava-mamoafady ireo.
  '3':
  - type: text
    content: Aza manao araka ny fanaon’i Ejipta izay tany nonenanareo; aza manao araka ny fanaon’i Kanahàna izay tany efa hampidirako anareo
  - type: note
    content: Neken’ny Ejiptianina ny hifanambadian’ny mpihavana akaiky (18.6); ao amin’ny Test. Tal, dia i Kanahàna no anoharan’ny fanimbazimbana firaisam-batana (18.27; Gen 19.4-9).
  - type: text
    content: '; ary aza manaraka ny lalànan’ireny firenena ireny ianareo. '
  '30':
  - type: text
    content: «Koa tandremo izay asaiko tandremanareo mba tsy hisy hataonareo akory ny fomba mamoafady izay fanaon’ny olona talohan’ny fahatongavanareo; ka aza mandoto tena amin’izany ianareo. Izaho no TOMPO Andriamanitrareo.»
  '4':
  - type: text
    content: Ny fitsipiko no tanteraho, ary ny lalànako no imasoy harahina. Izaho no TOMPO Andriamanitrareo.
  '5':
  - type: text
    content: «Tandremo ny lalàna amam-pitsipiko; fa izay manatanteraka izany, dia ho velona amin’izany
  - type: note
    content: Jereo Ne 9.29; Ezek 18.9; 20.11-13; Lk 10.28; Rm 10.5; Gal 3.12.
  - type: text
    content: . Izaho no TOMPO.
  '6':
  - type: text
    content: «Aoka tsy hisy lehilahy israelita hila vehivavy havany akaiky dia akaiky mba hiray aminy. Izaho no TOMPO.
  '7':
  - type: text
    content: «Aza miray amin’ny reninao ianao, fa manala baràka ny rainao izany; reninao izy ka aza ifoteranao.
  '8':
  - type: text
    content: «Aza miray amin’ny renikelinao
  - type: note
    content: Jereo 20.11; Gen 35.22; Deot 23.1; 27.20; 1Kôr 5.1.
  - type: text
    content: ' fa manala baràka ny rainao izany.'
  '9':
  - type: text
    content: «Aza miray amin’ny anabavinao zanakavavy nentin-drainao na nentin-dreninao, ka nobeazina tao an-trano fonenana na tany an-kafa
  - type: note
    content: Jereo 20.17; Deot 27.22; 2 Sam 13.11-14; Ezek 22.11.
  - type: text
    content: .
