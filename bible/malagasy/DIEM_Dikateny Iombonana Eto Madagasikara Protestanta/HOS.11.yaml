document_id: HOS.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitiavan’Andriamanitra diso fanantenana nefa mandresy
  - type: text
    content: «Fony mbola tanora i Israely,
  - type: text
    content: dia notiaviko, hoy Izaho Tompo;
  - type: text
    content: ary zanako izy ka nantsoiko hiala tany Ejipta
  - type: note
    content: Jereo Eks 4.22; Mt 2.15.
  - type: text
    content: .»
  '10':
  - type: text
    content: Ny TOMPO Izay hierona tahaka ny liona
  - type: text
    content: no harahin’ireo voasesitany hody.
  - type: text
    content: Ary rehefa mierona ny TOMPO,
  - type: text
    content: dia ireo zanany no hihazakazaka hanatona
  - type: text
    content: avy any ampitan-dranomasina any.
  '11':
  - type: text
    content: Avy any Ejipta koa izy
  - type: text
    content: no hanatona amin-kovitra toa voronkely,
  - type: text
    content: ary avy any Asiria
  - type: text
    content: no hanatona amin-kovitra toa domohina;
  - type: text
    content: ka dia hoentiko miverina
  - type: text
    content: any an-tranony indray izy.
  - type: text
    content: Izaho TOMPO no manao izany teny hentitra izany.
  '2':
  - type: text
    content: Nefa arakaraka ny niantsoako azy
  - type: text
    content: no vao mainka nanalavirany Ahy
  - type: note
    content: 'arakaraka... nanalavirany Ahy: araka ny dkt grika tranainy; hebreo: nanalavitra ireo izay niantso azy izy.'
  - type: text
    content: .
  - type: text
    content: 'Nanatitra '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' izy'
  - type: text
    content: 'ary nandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ho an’ny sampy.'
  '3':
  - type: text
    content: Izaho no nampiana-mandeha an’i Efraîma
  - type: text
    content: sady nitondra azy an-trotroana.
  - type: text
    content: Kanefa tsy fantany
  - type: text
    content: fa Izaho no nikarakara azy.
  '4':
  - type: text
    content: Notahitahîko ny fitarihana azy
  - type: text
    content: tamin’ny mahazakam-pitiavana;
  - type: text
    content: ary ho azy Aho dia toy ny reny
  - type: text
    content: izay manainga ny zanany
  - type: text
    content: hatehika amin’ny takolaka
  - type: text
    content: sady niondrika namahana azy.
  '5':
  - type: text
    content: «Tsy hiverina any Ejipta
  - type: text
    content: ny vahoakan’i Israely;
  - type: text
    content: fa i Asiria kosa no hanjaka aminy,
  - type: text
    content: satria tsy nety niverina tamiko izy.
  '6':
  - type: text
    content: Hisy ady mafotaka ao an-tanànany,
  - type: text
    content: ka handrava ny fiarovany
  - type: text
    content: ary hahatonga fandripadripahana;
  - type: text
    content: izany no vokatry ny pôlitikan’i Israely.
  '7':
  - type: text
    content: Minia miodina amiko ny vahoakako;
  - type: text
    content: ary antsoina mba hanatona Ahy ilay Avo izy
  - type: text
    content: fa tsy misy mety miainga izy rehetra.
  '8':
  - type: text
    content: «Hataoko ahoana anefa
  - type: text
    content: no hahafoy anao, ry Efraîma,
  - type: text
    content: na hamadika anao, ry Israely?
  - type: text
    content: Hataoko ahoana koa no hahafoy anao
  - type: text
    content: ho tahaka an’i Admà sy i Tsebôima
  - type: note
    content: 'i Admà sy i Tsebôima: tanàna roa teo akaikin’i Sôdôma sy Gômôra (jereo Deot 29.22) ary niara-devona taminy (jereo Gen 19.23-28).'
  - type: text
    content: '?'
  - type: text
    content: Onena anao ny foko ato amiko
  - type: text
    content: fa indray miontana ny fitiavako.
  '9':
  - type: text
    content: Tsy hanampatra fahatezera-mirehitra Aho
  - type: text
    content: na ho avy handringana an’i Efraîma;
  - type: text
    content: tsy olombelona Aho fa Andriamanitra
  - type: text
    content: dia Ilay Masina eo aminao;
  - type: text
    content: ka tsy ho avy amim-pahatezerana mafy Aho.»
