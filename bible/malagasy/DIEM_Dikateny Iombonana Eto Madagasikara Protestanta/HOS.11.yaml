document_id: HOS.11,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitiavan’Andriamanitra diso fanantenana nefa mandresy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: «Fony mbola tanora i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia notiaviko, hoy Izaho Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary zanako izy ka nantsoiko hiala tany Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 4.22; Mt 2.15.
      marker-yv: yv-n
    - type: text
      text: .»
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny TOMPO Izay hierona tahaka ny liona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no harahin’ireo voasesitany hody.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa mierona ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo zanany no hihazakazaka hanatona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any ampitan-dranomasina any.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Avy any Ejipta koa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanatona amin-kovitra toa voronkely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy any Asiria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hanatona amin-kovitra toa domohina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia hoentiko miverina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any an-tranony indray izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho TOMPO no manao izany teny hentitra izany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nefa arakaraka ny niantsoako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no vao mainka nanalavirany Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'arakaraka... nanalavirany Ahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy; hebreo: nanalavitra ireo izay niantso azy izy.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nanatitra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' ho an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary nandoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' ho an’ny sampy.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izaho no nampiana-mandeha an’i Efraîma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady nitondra azy an-trotroana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy fantany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho no nikarakara azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Notahitahîko ny fitarihana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny mahazakam-pitiavana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho azy Aho dia toy ny reny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay manainga ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatehika amin’ny takolaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niondrika namahana azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: «Tsy hiverina any Ejipta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vahoakan’i Israely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Asiria kosa no hanjaka aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tsy nety niverina tamiko izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hisy ady mafotaka ao an-tanànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handrava ny fiarovany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hahatonga fandripadripahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izany no vokatry ny pôlitikan’i Israely.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Minia miodina amiko ny vahoakako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary antsoina mba hanatona Ahy ilay Avo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy misy mety miainga izy rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: «Hataoko ahoana anefa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahafoy anao, ry Efraîma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na hamadika anao, ry Israely?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ahoana koa no hahafoy anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho tahaka an’i Admà sy i Tsebôima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'i Admà sy i Tsebôima: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanàna roa teo akaikin’i Sôdôma sy Gômôra (jereo Deot 29.22) ary niara-devona taminy (jereo Gen 19.23-28).
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Onena anao ny foko ato amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa indray miontana ny fitiavako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy hanampatra fahatezera-mirehitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho avy handringana an’i Efraîma;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy olombelona Aho fa Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay Masina eo aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy ho avy amim-pahatezerana mafy Aho.»
