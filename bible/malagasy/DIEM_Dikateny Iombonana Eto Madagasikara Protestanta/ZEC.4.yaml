document_id: ZEC.4,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fahitana fahadimy: ny fanaovan-jiro sy ny hazo ôliva'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary niverina ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' niresaka tamiko, ka namoha ahy toy ny famoha olona matory '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10b
    - type: text
      text: fa ireo jiro fito ireo no mason’ny TOMPO izay mahita ny zavatra rehetra ambonin’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10a
    - type: text
      text: Misy olona manamavo ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anaovana asa madinika fanombohana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa aoka hifaly kosa ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha mahita an’i Zerôbabela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mampiasa pilao eny an-tanany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nanontaniako indray izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa ireo hazo ôliva roa eo an-kavanana sy eo an-kavian’ny fitoeran-jiro ireo?
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary mbola nanontaniako fanindroany izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona koa ireo sampan’ôliva roa izay mandraraka diloilo volamena ireo amin’ny alalan’ny fantsona volamena anankiroa?
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ka hoy izy tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy fantatrao koa va ny dikan’ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliako hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, Tompoko.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia nohazavainy tamiko àry fa ireo zavatra ireo dia manambara ny olona roa voahosotra tamin’ny diloilo mba hanompo ilay Tompon’ny tany tontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'olona roa izay voahosotr’Andriamanitra:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia i Josoa mpisorombe sy i Zerobabela governora (jereo and 6b sy nta).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Toky nomen’Andriamanitra an’i Zerobabela
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'sady nanontany ahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no hitanao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy aho namaly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Fitoeran-jiro volamena misy fitahirizan-diloilo eo an-tampony no hitako. Fanaovan-jiro fito no eo amin’izany fitoeran-jiro izany; ary lahin-jiro fito kosa no eo amin’ny fanaovan-jiro tsirairay avy. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Misy hazo ôliva roa eo anilan’ilay fitahirizan-diloilo, ka ny anankiray eo an-kavanany, ary ny anankiray eo an-kaviany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tamin’izay ilay anjely niresaka tamiko dia nanontaniako hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona moa no dikan’ireo, Tompoko?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ka hoy izy tamiko:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy fantatrao va ny dikan’ireo?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa novaliako hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, Tompoko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6a
    - type: text
      text: Dia nohazavainy tamiko àry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 6b-10a, momba an’i Zerobabela, dia manapaka ny valinteny lazaina ao amin’ny and 6a. Nafindra aorian’ny and 14 izany.
      marker-yv: yv-n
    - type: text
      text: ' '
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6b
    - type: text
      text: 'Ary niteny tamiko ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' mba hampita izao hafatry ny TOMPO ny amin’i Zerobabela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zerobabela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia taranak’i Davida tafara lavitra (jereo Hag 1.1). Araka izany dia mety ho ny mesia andrasana ihany koa (jereo nta 3.8 sy Isa 9.6; 11.1-2; Ezek 34.23, 24; 37.24).'
      marker-yv: yv-n
    - type: text
      text: ' izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy amin’ny herin-tafika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na amin’ny fahatanjahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hahatanterahanao andraikitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa kosa amin’ny Fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Izaho TOMPOn’izao rehetra izao.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sady niteny koa ny Tompo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Sakana va io tendrombohitra lehibe io?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holemahin’i Zerobabela izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eto ny mpaminany dia toa mahatsiaro ny antontan-korontana izay niavosa teo amin’ny toeran’ny tempoly* hatramin’izay naharava azy izay. Nokarakarain’i Zerobabela ny fanesorana ireo korontana ireo hisehoan’ny fanambanin’ny tempoly mba hahazoana manorina indray eo amin’ilay fototra taloha.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoesoriny avy ao ny vato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hatao tendron’ny tempoly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hantsoantsoin’ny olona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Mahafinaritra, mahafinaritra!› »
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko indray nanao hoe:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: «Ny tanan’i Zerobabela no nametraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny fanorenan’ity '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tempoly
    - type: text
      text: ' ity,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny tanany koa no hamita azy.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo.
