document_id: ZEC.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahadimy: ny fanaovan-jiro sy ny hazo ôliva'
  - type: text
    content: 'Ary niverina ilay '
  - type: text
    content: anjely
  - type: text
    content: ' niresaka tamiko, ka namoha ahy toy ny famoha olona matory '
  '10':
  - type: text
    content: fa ireo jiro fito ireo no mason’ny TOMPO izay mahita ny zavatra rehetra ambonin’ny tany.
  - type: text
    content: Misy olona manamavo ny andro
  - type: text
    content: anaovana asa madinika fanombohana.
  - type: text
    content: Kanefa aoka hifaly kosa ireo,
  - type: text
    content: raha mahita an’i Zerôbabela
  - type: text
    content: mampiasa pilao eny an-tanany.
  '11':
  - type: text
    content: 'Dia nanontaniako indray izy hoe:'
  - type: text
    content: –Inona moa ireo hazo ôliva roa eo an-kavanana sy eo an-kavian’ny fitoeran-jiro ireo?
  '12':
  - type: text
    content: 'Ary mbola nanontaniako fanindroany izy hoe:'
  - type: text
    content: –Inona koa ireo sampan’ôliva roa izay mandraraka diloilo volamena ireo amin’ny alalan’ny fantsona volamena anankiroa?
  '13':
  - type: text
    content: 'Ka hoy izy tamiko:'
  - type: text
    content: –Tsy fantatrao koa va ny dikan’ireo?
  - type: text
    content: 'Fa novaliako hoe:'
  - type: text
    content: –Tsia, Tompoko.
  '14':
  - type: text
    content: Dia nohazavainy tamiko àry fa ireo zavatra ireo dia manambara ny olona roa voahosotra tamin’ny diloilo mba hanompo ilay Tompon’ny tany tontolo
  - type: note
    content: 'olona roa izay voahosotr’Andriamanitra: dia i Josoa mpisorombe sy i Zerobabela governora (jereo and 6b sy nta).'
  - type: text
    content: .
  - type: heading
    content: Toky nomen’Andriamanitra an’i Zerobabela
  '2':
  - type: text
    content: 'sady nanontany ahy hoe:'
  - type: text
    content: –Inona no hitanao?
  - type: text
    content: 'Dia hoy aho namaly:'
  - type: text
    content: '–Fitoeran-jiro volamena misy fitahirizan-diloilo eo an-tampony no hitako. Fanaovan-jiro fito no eo amin’izany fitoeran-jiro izany; ary lahin-jiro fito kosa no eo amin’ny fanaovan-jiro tsirairay avy. '
  '3':
  - type: text
    content: Misy hazo ôliva roa eo anilan’ilay fitahirizan-diloilo, ka ny anankiray eo an-kavanany, ary ny anankiray eo an-kaviany.
  '4':
  - type: text
    content: 'Tamin’izay ilay anjely niresaka tamiko dia nanontaniako hoe:'
  - type: text
    content: –Inona moa no dikan’ireo, Tompoko?
  '5':
  - type: text
    content: 'Ka hoy izy tamiko:'
  - type: text
    content: –Tsy fantatrao va ny dikan’ireo?
  - type: text
    content: 'Fa novaliako hoe:'
  - type: text
    content: –Tsia, Tompoko.
  '6':
  - type: text
    content: Dia nohazavainy tamiko àry
  - type: note
    content: Ny and 6b-10a, momba an’i Zerobabela, dia manapaka ny valinteny lazaina ao amin’ny and 6a. Nafindra aorian’ny and 14 izany.
  - type: text
    content: ' '
  - type: text
    content: 'Ary niteny tamiko ilay '
  - type: text
    content: anjely
  - type: text
    content: ' mba hampita izao hafatry ny TOMPO ny amin’i Zerobabela'
  - type: note
    content: I Zerobabela dia taranak’i Davida tafara lavitra (jereo Hag 1.1). Araka izany dia mety ho ny mesia andrasana ihany koa (jereo nta 3.8 sy Isa 9.6; 11.1-2; Ezek 34.23, 24; 37.24).
  - type: text
    content: ' izao:'
  - type: text
    content: «Tsy amin’ny herin-tafika
  - type: text
    content: na amin’ny fahatanjahanao
  - type: text
    content: no hahatanterahanao andraikitra
  - type: text
    content: fa kosa amin’ny Fanahiko,
  - type: text
    content: hoy Izaho TOMPOn’izao rehetra izao.»
  '7':
  - type: text
    content: 'Sady niteny koa ny Tompo hoe:'
  - type: text
    content: «Sakana va io tendrombohitra lehibe io?
  - type: text
    content: Holemahin’i Zerobabela izy
  - type: note
    content: Eto ny mpaminany dia toa mahatsiaro ny antontan-korontana izay niavosa teo amin’ny toeran’ny tempoly* hatramin’izay naharava azy izay. Nokarakarain’i Zerobabela ny fanesorana ireo korontana ireo hisehoan’ny fanambanin’ny tempoly mba hahazoana manorina indray eo amin’ilay fototra taloha.
  - type: text
    content: .
  - type: text
    content: Hoesoriny avy ao ny vato
  - type: text
    content: izay hatao tendron’ny tempoly
  - type: text
    content: 'ka hantsoantsoin’ny olona hoe:'
  - type: text
    content: ‹Mahafinaritra, mahafinaritra!› »
  '8':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko indray nanao hoe:'
  '9':
  - type: text
    content: «Ny tanan’i Zerobabela no nametraka
  - type: text
    content: 'ny fanorenan’ity '
  - type: text
    content: tempoly
  - type: text
    content: ' ity,'
  - type: text
    content: ary ny tanany koa no hamita azy.»
  - type: text
    content: Amin’izay dia hiaiky ianareo fa ny TOMPOn’izao rehetra izao no naniraka ahy ho atỳ aminareo.
