document_id: GEN.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Abrama sy ireo mpanjaka ary i Melkitsedèka
  - type: text
    content: 'Tamin’izany andro izany, i Amrafela mpanjakan’i Sinehara, i Ariôka mpanjakan’i Elasara, i Kedôrlahômera mpanjakan’i Helama, ary i Tidehala mpanjakan’i Goîma, '
  '10':
  - type: text
    content: 'Nisy lava-drano betsaka nandrevo tao amin’ny lohasahan’i Sidima, ka rahefa nandositra ny mpanjakan’i Sôdôma sy i Gômôra, dia nianjera tao ary ireo sisa kosa nandositra tany an-tendrombohitra. '
  '11':
  - type: text
    content: 'Nofaohin’ireo mpandresy avokoa ny haren’ny tao Sôdôma sy tao Gômôra mbamin’ny sakafo rehetra, dia lasa izy ireo. '
  '12':
  - type: text
    content: Nofaohiny niaraka tamin’ireo koa i Lôta zana-drahalahin’i Abrama izay nonina tao Sôdôma mbamin’ny fananany dia lasa izy ireo.
  '13':
  - type: text
    content: 'Ary nisy lehilahy iray afa-nandositra, dia tonga nanambara ny vaovao tamin’i Abrama ilay Hebreo nonina an-day tao amin’ny hazo ôakan’i Mamre, izay Amôrita rahalahin’i Eskôla sy i Hanera; fa izy telo lahy dia efa vita fihavanana tamin’i Abrama. '
  '14':
  - type: text
    content: 'Nony ren’i Abrama fa babo ny zana-drahalahiny, dia novoriny ireo valo ambin’ny folo sy telonjato lahy mpomba azy avy tao amin’ny fianakaviany; ka nanenjika ny fahavalo hatrany Dana izy. '
  '15':
  - type: text
    content: 'Natsitokotokon’i Abrama ireo mpanompony mba hanafihana azy amin’ny alina. Dia resiny ireo mpanjaka, ka nenjehiny hatrany Hôbà, any avaratr’i Damasy. '
  '16':
  - type: text
    content: Tafaveriny avokoa ny harena rehetra nobaboina sy i Lôta zana-drahalahiny mbamin’ny fananany ary ireo vehivavy mbamin’ny olon-kafa rehetra.
  '17':
  - type: text
    content: Ary rehefa niverina avy nandresy an’i Kedôrlahômera sy ireo mpanjaka nomba azy i Abrama, dia niainga ny mpanjakan’i Sôdôma mba hitsena azy tao an-dohasahan’i Save, izany hoe tao an-dohasahan’ny mpanjaka.
  '18':
  - type: text
    content: Dia nitondra mofo sy divay
  - type: note
    content: 'Melkitsedèka: Sal 110.4; Heb 7.1-10. –Salema: anarana fanafohezana ny hoe Jerosalema (Sal 76.3 Heb 7.2) Araka ny hevitry ny sasany kosa dia toerana eo akaikin’i Sekema no lazaina eto, jereo ny naoty 33.18.'
  - type: text
    content: ' i Melkitsedèka mpanjakan’i Salema sady mpisoron’ilay Andriamanitra avo indrindra, '
  '19':
  - type: text
    content: 'ary '
  - type: text
    content: nitsodrano
  - type: text
    content: ' an’i Abrama hoe:'
  - type: text
    content: '–Hotahîn’Andriamanitra avo indrindra mpanao ny lanitra sy ny tany anie i Abrama! '
  '2':
  - type: text
    content: 'dia niady tamin’i Bera mpanjakan’i Sôdôma sy i Birsa mpanjakan’i Gômôra sy i Sinàba mpanjakan’i Admà sy i Semebera mpanjakan’i Tsebôima ary ny mpanjakan’i Bela na hoe Tsôhara. '
  '20':
  - type: text
    content: Hoderaina anie Andriamanitra avo indrindra Izay nanolotra ny fahavalonao ho eo an-tananao!
  - type: text
    content: Dia nomen’i Abrama an’i Melkitsedèka ny ampahafolon’ny zavatra rehetra.
  '21':
  - type: text
    content: 'Ary ny mpanjakan’i Sôdôma dia niteny tamin’i Abrama hoe:'
  - type: text
    content: –Omeo ahy ny olona fa ento ho anao kosa ny harena.
  '22':
  - type: text
    content: 'Fa namaly azy i Abrama hoe:'
  - type: text
    content: '–Atsangako amin’ny TOMPO Andriamanitra nanao ny lanitra sy ny tany ny tanako '
  '23':
  - type: text
    content: 'hianianako fa tsy mba handray avy amin’izay rehetra anao aho, na dia singan-kofehy na fehin-kapa iray aza. Sao manko lazainao hoe: «Izaho no nampanankarena an’i Abrama.» '
  '24':
  - type: text
    content: Izay nohanin’ireo zatovoko ihany no hotazoniko. Ary ny anjaran’ireo lehilahy niaraka tamiko, izany hoe ny an’i Hanera sy i Eskôla ary i Mamre, dia izy ireo ihany no handray izany.
  '3':
  - type: text
    content: 'Izy rehetra ireo dia nifamotoana tao amin’ny lohasahan’ny Sidima, izay rakotry ny Ranomasina Maty ankehitriny. '
  '4':
  - type: text
    content: 'Nandritra ny roa ambin’ny folo taona izy ireo dia nanompo an’i Kedôrlahômera fa tamin’ny taona fahatelo ambin’ny folo kosa izy dia nikomy. '
  '5':
  - type: text
    content: 'Tamin’ny taona fahefatra ambin’ny folo dia tonga i Kedorlahômera mbamin’ireo mpanjaka nomba azy ka nandresy ireo Refaita tao Hastarôta-Karnaîma sy ny Zozita tao Hama sy ireo Emita tao amin’ny lemak’i Kiriataîma '
  '6':
  - type: text
    content: 'ary ireo Horita tao an-tendrombohitr’i Sehira ka hatrany Ely-Paràna izay akaikin’ny taniefitra. '
  '7':
  - type: text
    content: 'Avy eo dia niverina ho any Haîna-Mispata na hoe Kadesy izy ireo, ka namely izay rehetra teny an-tsahan’ny Hamalekita mbamin’ireo '
  - type: text
    content: Amôrita
  - type: text
    content: ' izay nonina tao Hatsetsôna-Tamara. '
  '8':
  - type: text
    content: 'Dia niroso ny mpanjakan’i Sôdôma sy ny mpanjakan’i Gômôra sy ny mpanjakan’i Admà sy ny mpanjakan’i Tsebôima ary ny mpanjakan’i Bela na hoe Tsôhara, ka nandahatra ny tafiny hiady tamin’ireo tao an-dohasahan’i Sidima, '
  '9':
  - type: text
    content: 'izany hoe i Kedôrlahômera mpanjakan’i Helama, sy i Tidehala mpanjakan’i Gôima, sy i Amrafela mpanjakan’i Sinehara, ary i Ariôka mpanjakan’i Elasara; mpanjaka dimy mikatroka amin’ny efatra. '
