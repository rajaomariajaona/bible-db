document_id: GEN.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Abrama sy ireo mpanjaka ary i Melkitsedèka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izany andro izany, i Amrafela mpanjakan’i Sinehara, i Ariôka mpanjakan’i Elasara, i Kedôrlahômera mpanjakan’i Helama, ary i Tidehala mpanjakan’i Goîma, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nisy lava-drano betsaka nandrevo tao amin’ny lohasahan’i Sidima, ka rahefa nandositra ny mpanjakan’i Sôdôma sy i Gômôra, dia nianjera tao ary ireo sisa kosa nandositra tany an-tendrombohitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nofaohin’ireo mpandresy avokoa ny haren’ny tao Sôdôma sy tao Gômôra mbamin’ny sakafo rehetra, dia lasa izy ireo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nofaohiny niaraka tamin’ireo koa i Lôta zana-drahalahin’i Abrama izay nonina tao Sôdôma mbamin’ny fananany dia lasa izy ireo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nisy lehilahy iray afa-nandositra, dia tonga nanambara ny vaovao tamin’i Abrama ilay Hebreo nonina an-day tao amin’ny hazo ôakan’i Mamre, izay Amôrita rahalahin’i Eskôla sy i Hanera; fa izy telo lahy dia efa vita fihavanana tamin’i Abrama. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nony ren’i Abrama fa babo ny zana-drahalahiny, dia novoriny ireo valo ambin’ny folo sy telonjato lahy mpomba azy avy tao amin’ny fianakaviany; ka nanenjika ny fahavalo hatrany Dana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Natsitokotokon’i Abrama ireo mpanompony mba hanafihana azy amin’ny alina. Dia resiny ireo mpanjaka, ka nenjehiny hatrany Hôbà, any avaratr’i Damasy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tafaveriny avokoa ny harena rehetra nobaboina sy i Lôta zana-drahalahiny mbamin’ny fananany ary ireo vehivavy mbamin’ny olon-kafa rehetra.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary rehefa niverina avy nandresy an’i Kedôrlahômera sy ireo mpanjaka nomba azy i Abrama, dia niainga ny mpanjakan’i Sôdôma mba hitsena azy tao an-dohasahan’i Save, izany hoe tao an-dohasahan’ny mpanjaka.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia nitondra mofo sy divay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Melkitsedèka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 110.4; Heb 7.1-10. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Salema:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anarana fanafohezana ny hoe Jerosalema (Sal 76.3 Heb 7.2) Araka ny hevitry ny sasany kosa dia toerana eo akaikin’i Sekema no lazaina eto, jereo ny naoty 33.18.'
      marker-yv: yv-n
    - type: text
      text: ' i Melkitsedèka mpanjakan’i Salema sady mpisoron’ilay Andriamanitra avo indrindra, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitsodrano
    - type: text
      text: ' an’i Abrama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Hotahîn’Andriamanitra avo indrindra mpanao ny lanitra sy ny tany anie i Abrama! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia niady tamin’i Bera mpanjakan’i Sôdôma sy i Birsa mpanjakan’i Gômôra sy i Sinàba mpanjakan’i Admà sy i Semebera mpanjakan’i Tsebôima ary ny mpanjakan’i Bela na hoe Tsôhara. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hoderaina anie Andriamanitra avo indrindra Izay nanolotra ny fahavalonao ho eo an-tananao!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen’i Abrama an’i Melkitsedèka ny ampahafolon’ny zavatra rehetra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny mpanjakan’i Sôdôma dia niteny tamin’i Abrama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy ny olona fa ento ho anao kosa ny harena.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa namaly azy i Abrama hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Atsangako amin’ny TOMPO Andriamanitra nanao ny lanitra sy ny tany ny tanako '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'hianianako fa tsy mba handray avy amin’izay rehetra anao aho, na dia singan-kofehy na fehin-kapa iray aza. Sao manko lazainao hoe: «Izaho no nampanankarena an’i Abrama.» '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay nohanin’ireo zatovoko ihany no hotazoniko. Ary ny anjaran’ireo lehilahy niaraka tamiko, izany hoe ny an’i Hanera sy i Eskôla ary i Mamre, dia izy ireo ihany no handray izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izy rehetra ireo dia nifamotoana tao amin’ny lohasahan’ny Sidima, izay rakotry ny Ranomasina Maty ankehitriny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nandritra ny roa ambin’ny folo taona izy ireo dia nanompo an’i Kedôrlahômera fa tamin’ny taona fahatelo ambin’ny folo kosa izy dia nikomy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin’ny taona fahefatra ambin’ny folo dia tonga i Kedorlahômera mbamin’ireo mpanjaka nomba azy ka nandresy ireo Refaita tao Hastarôta-Karnaîma sy ny Zozita tao Hama sy ireo Emita tao amin’ny lemak’i Kiriataîma '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary ireo Horita tao an-tendrombohitr’i Sehira ka hatrany Ely-Paràna izay akaikin’ny taniefitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Avy eo dia niverina ho any Haîna-Mispata na hoe Kadesy izy ireo, ka namely izay rehetra teny an-tsahan’ny Hamalekita mbamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amôrita
    - type: text
      text: ' izay nonina tao Hatsetsôna-Tamara. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niroso ny mpanjakan’i Sôdôma sy ny mpanjakan’i Gômôra sy ny mpanjakan’i Admà sy ny mpanjakan’i Tsebôima ary ny mpanjakan’i Bela na hoe Tsôhara, ka nandahatra ny tafiny hiady tamin’ireo tao an-dohasahan’i Sidima, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'izany hoe i Kedôrlahômera mpanjakan’i Helama, sy i Tidehala mpanjakan’i Gôima, sy i Amrafela mpanjakan’i Sinehara, ary i Ariôka mpanjakan’i Elasara; mpanjaka dimy mikatroka amin’ny efatra. '
