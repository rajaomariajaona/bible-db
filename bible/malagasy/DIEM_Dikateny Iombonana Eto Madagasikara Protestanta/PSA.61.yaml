document_id: PSA.61,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Satriko ny hitoetra mandrakizay ao an-tranonao
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny valiha. Nataon’i Davida.
  '2':
  - type: text
    content: Andriamanitra ô, mba henoy ny tarainako,
  - type: text
    content: aoka ho tandrinao ny fivavako!
  '3':
  - type: text
    content: Lavitra ny fonenako sady reraka aho
  - type: text
    content: ka dia miantso vonjy aminao.
  '4':
  - type: text
    content: Ianao no fialofana ho ahy,
  - type: text
    content: tilikambo mafy anoloan’ny fahavalo.
  '5':
  - type: text
    content: Te hitoetra ao an-tranonao mandrakizay aho,
  - type: text
    content: ka hialoka sy hiery eo ambany elatrao
  - type: note
    content: 'elatrao: jereo Sal 17.8 sy nta.'
  - type: text
    content: .
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Fa Ianao, Andriamanitra ô,
  - type: text
    content: mihaino ny voady izay ataoko
  - type: text
    content: sy manome an’ireo mpanaja Anao
  - type: text
    content: ny soa natokanao ho fananany.
  '7':
  - type: text
    content: Omeo andro lava hiainany ny mpanjaka;
  - type: text
    content: ho arivo tratry ny taona anie izy!
  '8':
  - type: text
    content: Ho mandrakizay eo anoloanao anie
  - type: text
    content: no hifehezany, Andriamanitra ô!
  - type: text
    content: Aoka hasainao hiaro azy
  - type: text
    content: ilay fitiavanao mahatoky!
  '9':
  - type: text
    content: Dia hankalaza ny anaranao hatrany aho
  - type: text
    content: amin’ny salamo sy zava-maneno,
  - type: text
    content: sady hanolotra isan’andro isan’andro
  - type: text
    content: ny sorona nataoko voady taminao.
