      text: SALAMO Satriko ny hitoetra mandrakizay ao an-tranonao
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira.
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hampiarahina amin’ny valiha. Nataon’i Davida.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, mba henoy ny tarainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka ho tandrinao ny fivavako!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavitra ny fonenako sady reraka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia miantso vonjy aminao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao no fialofana ho ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tilikambo mafy anoloan’ny fahavalo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te hitoetra ao an-tranonao mandrakizay aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hialoka sy hiery eo ambany elatrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'elatrao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 17.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fiatoana
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ianao, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mihaino ny voady izay ataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manome an’ireo mpanaja Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny soa natokanao ho fananany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo andro lava hiainany ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho arivo tratry ny taona anie izy!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mandrakizay eo anoloanao anie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hifehezany, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hasainao hiaro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay fitiavanao mahatoky!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hankalaza ny anaranao hatrany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny salamo sy zava-maneno,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hanolotra isan’andro isan’andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sorona nataoko voady taminao.
