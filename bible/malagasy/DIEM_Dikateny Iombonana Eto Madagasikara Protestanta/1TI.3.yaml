      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (dia ny apôstôly): dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ary hitan’ireo anjely.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notorîna tany amin’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ninoana eran’
    - type: usfm
      marker: w
      children:
      - type: text
