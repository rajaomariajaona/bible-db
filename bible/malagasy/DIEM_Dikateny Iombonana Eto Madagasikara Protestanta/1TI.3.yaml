document_id: 1TI.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpitondra Fiangonana
  - type: text
    content: 'Azo antoka izao teny izao: raha misy olona maniry ny asan’ny mpitondra Fiangonana, dia maniry asa tsara izy. '
  '10':
  - type: text
    content: 'Ary aoka hozahan-toetra aloha izy ireo; ka rehefa hita fa tsy manan-tsiny, vao hahazo manao ny asan’ny diakônina. '
  '11':
  - type: text
    content: Tokony ho maotina toy izany koa ny vehivavy, ka
  - type: note
    content: 'Tokony ho... ny vehivavy, ka: mety ho vadin’ny diakônina; mety ho vehivavy nantsoina hanana andraikitra toy ny an’ny diakônina ao amin’ny Fiangonana, ka amin’izay dia azo adika hoe Ny vehivavy manan-draharaha mitovy amin’izany dia tokony ho maotina ka... (jereo Rm 16.1).'
  - type: text
    content: ' tsy ho mpanendrikendrika fa hahafehy tena ary mahatoky amin’ny zavatra rehetra. '
  '12':
  - type: text
    content: Aoka ny diakônina tsy hampirafy
  - type: note
    content: 'tsy hampirafy: dkt hafa ho indray mandeha monja no hanambady.'
  - type: text
    content: ', ary aoka izy hahay mitondra tsara ny zanany sy ny ankohonany; '
  '13':
  - type: text
    content: 'fa ireo diakônina manatontosa tsara ny raharahany dia mahazo laharana mihaja ho an’ny tenany ary manana fahatokiana be miorina amin’ny finoana an’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa.'
  - type: heading
    content: Ilay tsiambaratelo momba ny fivavahantsika
  '14':
  - type: text
    content: 'Izany zavatra izany dia soratako aminao, na dia manantena fa hankatỳ aminao faingana aza aho. '
  '15':
  - type: text
    content: 'Fa raha tratra ela aho, ity taratasy ity dia misy hahafantaranao izay fitondrantena tokony hataonao ao amin’ny ankohonan’Andriamanitra, izany hoe ny Fiangonan’ilay Andriamanitra velona, ny Fiangonana izay mampijoro sy manamafy orina ny hafatra marim-pototra. '
  '16':
  - type: text
    content: 'Ary iaraha-miaiky fa lehibe ny tsiambaratelo nambara momba ny fivavahantsika:'
  - type: text
    content: 'Niharihary ho olombelona i '
  - type: text
    content: Kristy
  - type: text
    content: ','
  - type: text
    content: nankatoavin’Andriamanitra tamin’ny herin’ny Fanahy masina
  - type: text
    content: ary niseho tamin’ny iraka
  - type: note
    content: 'Ampit Rm 1.4. –ary... iraka (dia ny apôstôly): dkt hafa ary hitan’ireo anjely.'
  - type: text
    content: ;
  - type: text
    content: notorîna tany amin’ny firenena,
  - type: text
    content: ka ninoana eran’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ;
  - type: text
    content: nakarina any an-danitra tamim-boninahitra.
  '2':
  - type: text
    content: Koa ny mpitondra Fiangonana dia tokony ho olona tsy manan-tsiny, tsy mampirafy
  - type: note
    content: 'tsy mampirafy (tokam-bady): dkt hafa indray mandeha monja no nanambady (tsy misolosolo vady; tsy manambady imbetsaka).'
  - type: text
    content: ', mahafehy tena, matotra, maotina, mahay mandray olona, havanana amin’ny fampianarana; '
  '3':
  - type: text
    content: 'tsy tokony ho mpidoroka na hahery vaika, fa handefitra, tsy ho fiadîna, tsy ho matimatim-bola; '
  '4':
  - type: text
    content: 'tokony hahay mitondra tsara ny ankohonany, hahataona ny zanany hanaiky azy amim-panajana tanteraka ( '
  '5':
  - type: text
    content: 'fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana no fikarakara ny Fiangonan’Andriamanitra?); '
  '6':
  - type: text
    content: 'tsy tokony ho kristianina zazavao izy, fandrao hieboebo foana ka ho voaheloka tahaka ny nanjo ny '
  - type: text
    content: devoly
  - type: text
    content: '; '
  '7':
  - type: text
    content: tokony ho tsara laza amin’ny olona tsy kristianina koa izy, fandrao ho afa-baràka sy ho voan’ny fandriky ny devoly
  - type: note
    content: 'And 2-7: ampit Tit 1.6-9.'
  - type: text
    content: .
  - type: heading
    content: Ny diakônina
  '8':
  - type: text
    content: 'Toy izany koa ireo diakônina: tokony ho olona maotina, tsy miroa teny, tsy lian-divay, tsy maloto fila harena, '
  '9':
  - type: text
    content: 'mitana tsara ny tsiambaratelo nambara momba ny finoana ka mitana izany amin’ny fieritreretana mahitsy. '
