document_id: 1TI.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpitondra Fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Azo antoka izao teny izao: raha misy olona maniry ny asan’ny mpitondra Fiangonana, dia maniry asa tsara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa ny mpitondra Fiangonana dia tokony ho olona tsy manan-tsiny, tsy mampirafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy mampirafy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(tokam-bady): dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: indray mandeha monja no nanambady
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (tsy misolosolo vady; tsy manambady imbetsaka).'
    marker-yv: yv-n
  - type: text
    text: ', mahafehy tena, matotra, maotina, mahay mandray olona, havanana amin’ny fampianarana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy tokony ho mpidoroka na hahery vaika, fa handefitra, tsy ho fiadîna, tsy ho matimatim-bola; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'tokony hahay mitondra tsara ny ankohonany, hahataona ny zanany hanaiky azy amim-panajana tanteraka ( '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana no fikarakara ny Fiangonan’Andriamanitra?); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tsy tokony ho kristianina zazavao izy, fandrao hieboebo foana ka ho voaheloka tahaka ny nanjo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tokony ho tsara laza amin’ny olona tsy kristianina koa izy, fandrao ho afa-baràka sy ho voan’ny fandriky ny devoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 2-7:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Tit 1.6-9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny diakônina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Toy izany koa ireo diakônina: tokony ho olona maotina, tsy miroa teny, tsy lian-divay, tsy maloto fila harena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mitana tsara ny tsiambaratelo nambara momba ny finoana ka mitana izany amin’ny fieritreretana mahitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aoka hozahan-toetra aloha izy ireo; ka rehefa hita fa tsy manan-tsiny, vao hahazo manao ny asan’ny diakônina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tokony ho maotina toy izany koa ny vehivavy, ka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tokony ho... ny vehivavy, ka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mety ho vadin’ny diakônina; mety ho vehivavy nantsoina hanana andraikitra toy ny an’ny diakônina ao amin’ny Fiangonana, ka amin’izay dia azo adika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny vehivavy manan-draharaha mitovy amin’izany dia tokony ho maotina ka...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Rm 16.1).'
    marker-yv: yv-n
  - type: text
    text: ' tsy ho mpanendrikendrika fa hahafehy tena ary mahatoky amin’ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka ny diakônina tsy hampirafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy hampirafy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho indray mandeha monja no hanambady.
    marker-yv: yv-n
  - type: text
    text: ', ary aoka izy hahay mitondra tsara ny zanany sy ny ankohonany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa ireo diakônina manatontosa tsara ny raharahany dia mahazo laharana mihaja ho an’ny tenany ary manana fahatokiana be miorina amin’ny finoana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Jesoa.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay tsiambaratelo momba ny fivavahantsika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany zavatra izany dia soratako aminao, na dia manantena fa hankatỳ aminao faingana aza aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha tratra ela aho, ity taratasy ity dia misy hahafantaranao izay fitondrantena tokony hataonao ao amin’ny ankohonan’Andriamanitra, izany hoe ny Fiangonan’ilay Andriamanitra velona, ny Fiangonana izay mampijoro sy manamafy orina ny hafatra marim-pototra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary iaraha-miaiky fa lehibe ny tsiambaratelo nambara momba ny fivavahantsika:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Niharihary ho olombelona i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: nankatoavin’Andriamanitra tamin’ny herin’ny Fanahy masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary niseho tamin’ny iraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 1.4. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ary... iraka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (dia ny apôstôly): dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary hitan’ireo anjely.
    marker-yv: yv-n
  - type: text
    text: ;
