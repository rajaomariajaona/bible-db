document_id: 1JN.5,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Finoana an’i Kristy no maharesy izao tontolo izao
  - type: text
    content: 'Izay rehetra mino fa i Jesoa no Kristy, dia naterak’Andriamanitra; ary izay rehetra tia ilay Andriamanitra niteraka, dia tia izay naterak’Andriamanitra koa. '
  '10':
  - type: text
    content: 'Koa izay mino ilay Zanak’Andriamanitra no manana izany zavatra ambara izany ao anatiny; izay tsy mino an’Andriamanitra kosa dia efa nampandainga an’Andriamanitra, satria tsy nino ny zavatra nambarany momba ilay Zanany. '
  '11':
  - type: text
    content: 'Ary ny zavatra nambara dia izao: fiaina-maharitra mandrakizay no efa nomen’Andriamanitra antsika ary ao amin’ilay Zanany izany fiainana izany. '
  '12':
  - type: text
    content: Izay manana ny Zanaka no velona aina; izay tsy manana ny Zanak’Andriamanitra no tsy velona aina
  - type: note
    content: Ampit Jôh 3.36.
  - type: text
    content: .
  - type: heading
    content: Ny fiaina-maharitra mandrakizay
  '13':
  - type: text
    content: 'Izany no voasoratro ho anareo izay mino ny anaran’ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', mba hahafantaranareo fa velona aina mandrakizay ianareo. '
  '14':
  - type: text
    content: 'Ary izao no toky ananantsika eo anatrehan’Andriamanitra: raha mangata-javatra araka ny sitrapony isika, dia mihaino antsika Izy; '
  '15':
  - type: text
    content: ary raha fantatsika fa mihaino antsika Izy na inona na inona angatahintsika, dia fantatsika koa fa azontsika izay angatahintsika aminy.
  '16':
  - type: text
    content: 'Raha misy mahita ny namana iray finoana manao ota tsy mahafaty, dia aoka izy hivavaka ho azy ary Andriamanitra no hanome azy fiainana: izay ny amin’ireo manao ota tsy mahafaty. Fa misy ota mahafaty, ka tsy mba ny amin’izany no ilazako hoe tokony hivavaka izy. '
  '17':
  - type: text
    content: Ota avokoa ny asa ratsy rehetra, saingy misy ota tsy mahafaty.
  '18':
  - type: text
    content: Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota, satria arovan’ilay Zanak’Andriamanitra
  - type: note
    content: 'satria arovan’ilay Zanak’Andriamanitra: misy stf sasany ahitana hoe satria izay naterak’Andriamanitra dia miaro tena.'
  - type: text
    content: izy ka tsy voakasik’
  - type: text
    content: ilay Ratsy
  - type: text
    content: .
  '19':
  - type: text
    content: 'Fantatsika fa avy amin’Andriamanitra isika, fa '
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' kosa eo ambany fahefàn’ilay Ratsy avokoa.'
  '2':
  - type: text
    content: 'Ny ahafantarantsika fa tia ireo '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: ' isika, dia ny fitiavantsika an’Andriamanitra sy ny fanatontosàntsika ireo didiny. '
  '20':
  - type: text
    content: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika fahazavan-tsaina mba hahalalantsika an’ilay Andriamanitra tena Izy; ary tafaray amin’izany Andriamanitra tena Izy izany isika, amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Zanany Izay Andriamanitra tena Izy sady fiaina-maharitra mandrakizay.'
  '21':
  - type: text
    content: Rey anaka, mitandrema tena fandrao manompo sampy ianareo.
  '3':
  - type: text
    content: Eny, ny fitiavana an’Andriamanitra dia ny fitandremantsika ireo didiny
  - type: note
    content: Ampit Jôh 14.15.
  - type: text
    content: '; sady tsy mavesatra ireo didiny ireo, '
  '4':
  - type: text
    content: 'satria izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao. Ary ny fitaovam-pandresena izay maharesy izao tontolo izao dia ny finoantsika. '
  '5':
  - type: text
    content: Iza moa no maharesy izao tontolo izao, afa-tsy izay mino fa i Jesoa no ilay Zanak’Andriamanitra?
  - type: heading
    content: Vavolombelona manambara an’i Jesoa Kristy
  '6':
  - type: text
    content: I Jesoa Kristy dia Ilay avy tamin’ny alalan’ny rano sy tamin’ny alalan’ny ra
  - type: note
    content: 'tamin’ny alalan’ny rano sy tamin’ny alalan’ny ra: dia fony Izy natao batisa sy fony Izy maty teo amin’ny hazofijaliana; kanefa misy mpandinika sasany mihevitra fa ny rano sy ny ra eto dia fampahatsiahivana izay voatantara ao amin’ny Jôh 19.34, fony i Jesoa nolefonin’ny miaramila.'
  - type: text
    content: '. Tsy tamin’ny rano ihany no nahatongavany, fa tamin’ny rano sy ny ra; ary ny Fanahy Masina no vavolombelona manambara izany, satria ny Fanahy Masina no fahamarinana. '
  '7':
  - type: text
    content: Fa ankehitriny, telo no vavolombelona
  - type: note
    content: 'telo no vavolombelona: ampit Deot 19.15.'
  - type: text
    content: ' manambara: '
  '8':
  - type: text
    content: dia ny Fanahy Masina sy ny rano ary ny ra
  - type: note
    content: Ny rano sy ra kosa eto dia manondro ny batisa sy ny fanasàn’ny Tompo ao amin’ny Fiangonana.
  - type: text
    content: '; sady mifanaraka tsara izy telo. '
  '9':
  - type: text
    content: 'Raisintsika ny zavatra ambaran’ny olona; ary lehibe noho izany ny zavatra ambaran’Andriamanitra, satria ny zavatra ambaran’Andriamanitra dia izay efa nambarany momba ny '
  - type: text
    content: Zanany
  - type: text
    content: '. '
