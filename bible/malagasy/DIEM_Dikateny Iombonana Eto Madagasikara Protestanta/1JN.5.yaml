document_id: 1JN.5,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Finoana an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no maharesy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay rehetra mino fa i Jesoa no Kristy, dia naterak’Andriamanitra; ary izay rehetra tia ilay Andriamanitra niteraka, dia tia izay naterak’Andriamanitra koa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izay mino ilay Zanak’Andriamanitra no manana izany zavatra ambara izany ao anatiny; izay tsy mino an’Andriamanitra kosa dia efa nampandainga an’Andriamanitra, satria tsy nino ny zavatra nambarany momba ilay Zanany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zavatra nambara dia izao: fiaina-maharitra mandrakizay no efa nomen’Andriamanitra antsika ary ao amin’ilay Zanany izany fiainana izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manana ny Zanaka no velona aina; izay tsy manana ny Zanak’Andriamanitra no tsy velona aina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 3.36.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiaina-maharitra mandrakizay
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no voasoratro ho anareo izay mino ny anaran’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’Andriamanitra
    - type: text
      text: ', mba hahafantaranareo fa velona aina mandrakizay ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no toky ananantsika eo anatrehan’Andriamanitra: raha mangata-javatra araka ny sitrapony isika, dia mihaino antsika Izy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary raha fantatsika fa mihaino antsika Izy na inona na inona angatahintsika, dia fantatsika koa fa azontsika izay angatahintsika aminy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mahita ny namana iray finoana manao ota tsy mahafaty, dia aoka izy hivavaka ho azy ary Andriamanitra no hanome azy fiainana: izay ny amin’ireo manao ota tsy mahafaty. Fa misy ota mahafaty, ka tsy mba ny amin’izany no ilazako hoe tokony hivavaka izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ota avokoa ny asa ratsy rehetra, saingy misy ota tsy mahafaty.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota, satria arovan’ilay Zanak’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'satria arovan’ilay Zanak’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria izay naterak’Andriamanitra dia miaro tena.
      marker-yv: yv-n
    - type: text
      text: izy ka tsy voakasik’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ilay Ratsy
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatsika fa avy amin’Andriamanitra isika, fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' kosa eo ambany fahefàn’ilay Ratsy avokoa.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ahafantarantsika fa tia ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: zanak’Andriamanitra
    - type: text
      text: ' isika, dia ny fitiavantsika an’Andriamanitra sy ny fanatontosàntsika ireo didiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika fahazavan-tsaina mba hahalalantsika an’ilay Andriamanitra tena Izy; ary tafaray amin’izany Andriamanitra tena Izy izany isika, amin’ny alalan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Zanany Izay Andriamanitra tena Izy sady fiaina-maharitra mandrakizay.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rey anaka, mitandrema tena fandrao manompo sampy ianareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ny fitiavana an’Andriamanitra dia ny fitandremantsika ireo didiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 14.15.
      marker-yv: yv-n
    - type: text
      text: '; sady tsy mavesatra ireo didiny ireo, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao. Ary ny fitaovam-pandresena izay maharesy izao tontolo izao dia ny finoantsika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa no maharesy izao tontolo izao, afa-tsy izay mino fa i Jesoa no ilay Zanak’Andriamanitra?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Vavolombelona manambara an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I Jesoa Kristy dia Ilay avy tamin’ny alalan’ny rano sy tamin’ny alalan’ny ra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
