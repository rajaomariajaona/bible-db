document_id: 1JN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Finoana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no maharesy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izay rehetra mino fa i Jesoa no Kristy, dia naterak’Andriamanitra; ary izay rehetra tia ilay Andriamanitra niteraka, dia tia izay naterak’Andriamanitra koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny ahafantarantsika fa tia ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: zanak’Andriamanitra
  - type: text
    text: ' isika, dia ny fitiavantsika an’Andriamanitra sy ny fanatontosàntsika ireo didiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, ny fitiavana an’Andriamanitra dia ny fitandremantsika ireo didiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 14.15.
    marker-yv: yv-n
  - type: text
    text: '; sady tsy mavesatra ireo didiny ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'satria izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao. Ary ny fitaovam-pandresena izay maharesy izao tontolo izao dia ny finoantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa no maharesy izao tontolo izao, afa-tsy izay mino fa i Jesoa no ilay Zanak’Andriamanitra?
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Vavolombelona manambara an’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I Jesoa Kristy dia Ilay avy tamin’ny alalan’ny rano sy tamin’ny alalan’ny ra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’ny alalan’ny rano sy tamin’ny alalan’ny ra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia fony Izy natao batisa sy fony Izy maty teo amin’ny hazofijaliana; kanefa misy mpandinika sasany mihevitra fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny rano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny ra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia fampahatsiahivana izay voatantara ao amin’ny Jôh 19.34, fony i Jesoa nolefonin’ny miaramila.'
    marker-yv: yv-n
  - type: text
    text: '. Tsy tamin’ny rano ihany no nahatongavany, fa tamin’ny rano sy ny ra; ary ny Fanahy Masina no vavolombelona manambara izany, satria ny Fanahy Masina no fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ankehitriny, telo no vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'telo no vavolombelona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Deot 19.15.
    marker-yv: yv-n
  - type: text
    text: ' manambara: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia ny Fanahy Masina sy ny rano ary ny ra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: rano
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kosa eto dia manondro ny batisa sy ny fanasàn’ny Tompo ao amin’ny Fiangonana.'
    marker-yv: yv-n
  - type: text
    text: '; sady mifanaraka tsara izy telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raisintsika ny zavatra ambaran’ny olona; ary lehibe noho izany ny zavatra ambaran’Andriamanitra, satria ny zavatra ambaran’Andriamanitra dia izay efa nambarany momba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa izay mino ilay Zanak’Andriamanitra no manana izany zavatra ambara izany ao anatiny; izay tsy mino an’Andriamanitra kosa dia efa nampandainga an’Andriamanitra, satria tsy nino ny zavatra nambarany momba ilay Zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny zavatra nambara dia izao: fiaina-maharitra mandrakizay no efa nomen’Andriamanitra antsika ary ao amin’ilay Zanany izany fiainana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay manana ny Zanaka no velona aina; izay tsy manana ny Zanak’Andriamanitra no tsy velona aina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 3.36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiaina-maharitra mandrakizay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izany no voasoratro ho anareo izay mino ny anaran’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ', mba hahafantaranareo fa velona aina mandrakizay ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izao no toky ananantsika eo anatrehan’Andriamanitra: raha mangata-javatra araka ny sitrapony isika, dia mihaino antsika Izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary raha fantatsika fa mihaino antsika Izy na inona na inona angatahintsika, dia fantatsika koa fa azontsika izay angatahintsika aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha misy mahita ny namana iray finoana manao ota tsy mahafaty, dia aoka izy hivavaka ho azy ary Andriamanitra no hanome azy fiainana: izay ny amin’ireo manao ota tsy mahafaty. Fa misy ota mahafaty, ka tsy mba ny amin’izany no ilazako hoe tokony hivavaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ota avokoa ny asa ratsy rehetra, saingy misy ota tsy mahafaty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota, satria arovan’ilay Zanak’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'satria arovan’ilay Zanak’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: satria izay naterak’Andriamanitra dia miaro tena.
    marker-yv: yv-n
  - type: text
    text: izy ka tsy voakasik’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ilay Ratsy
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatsika fa avy amin’Andriamanitra isika, fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ' kosa eo ambany fahefàn’ilay Ratsy avokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika fahazavan-tsaina mba hahalalantsika an’ilay Andriamanitra tena Izy; ary tafaray amin’izany Andriamanitra tena Izy izany isika, amin’ny alalan’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' Zanany Izay Andriamanitra tena Izy sady fiaina-maharitra mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rey anaka, mitandrema tena fandrao manompo sampy ianareo.
