  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raisintsika ny zavatra ambaran’ny olona; ary lehibe noho izany ny zavatra ambaran’Andriamanitra, satria ny zavatra ambaran’Andriamanitra dia izay efa nambarany momba ny '
    - type: usfm
