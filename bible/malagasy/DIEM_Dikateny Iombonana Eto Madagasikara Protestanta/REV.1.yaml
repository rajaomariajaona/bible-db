document_id: REV.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny
  - type: text
    content: Fanambaràna
  - type: note
    content: Ny teny grika midika hoe fanambaràna no nahatonga ity boky ity hantsoina hoe Apôkalipsỳ.
  - type: text
    content: 'nataon’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' no aroso amin’ity boky ity. Izany fanambaràna izany dia nomen’Andriamanitra Azy mba hanehoan’i Jesoa Kristy amin’ireo mpanompony izay zavatra tsy maintsy ho tonga faingana. I Jesoa Kristy, tamin’ny alalan’ny '
  - type: text
    content: anjely
  - type: text
    content: ' izay nirahiny, no nampahalala izany tamin’i Jôhany. '
  '10':
  - type: text
    content: Nahazo tsindrimandry avy amin’ny Fanahy Masina aho tamin’ny andron’ny Tompo
  - type: note
    content: 'andron’ny Tompo: izany hoe alahady.'
  - type: text
    content: ', ka nahare feo mahery tao ivohoko, dia feo mahery tahaka ny feon-trompetra '
  '11':
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: '–Izay zavatra hitanao dia soraty ho boky ka ampitondray any amin’ny Fiangonana fito: dia any Efeso, Smirna, Pergàmo, Tiatira, Sardy, Filadelfia, ary Laôdisia.'
  '12':
  - type: text
    content: 'Dia nitodika aho hizaha izay olona niteny tamiko. Ka rehefa tafatodika aho, dia nahita fitoeranjiro volamena fito, '
  '13':
  - type: text
    content: 'ary teo afovoan’ireo fitoeranjiro ireo dia nisy tahatahaka ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', niakanjo akanjo lava, nanao etra volamena manodidina ny tratrany; '
  '14':
  - type: text
    content: 'ny lohany sy ny volondohany dia fotsy tahaka ny volonondry fotsy na tahaka ny orampanala; ny masony mivaivay tahaka ny lelafo; '
  '15':
  - type: text
    content: 'ny tongony mangirangirana tahaka ny halimo manganohano, hoatra ilay halimo voadio tamin’ny memy afo; ary ny feony midoboka tahaka ny firohondrohon’ny ranobe. '
  '16':
  - type: text
    content: 'Nitana kintana fito teny an-tanany ankavanana Izy, nisy sabatra maranitra roa lela nivoaka avy teo am-bavany ary ny tarehiny dia manelatrelatra tahaka ny masoandro faran’ny mamirapiratra. '
  '17':
  - type: text
    content: 'Vao nahita ny Zanak’olona aho, dia lavo niankohoka toy ny maty teo anoloan’ny tongony. Fa nametraka teo amboniko ny tanany ankavanana Izy ka nanao hoe:'
  - type: text
    content: '–Aoka izay ny tahotra! Izaho no Voalohany sy Farany, '
  '18':
  - type: text
    content: 'dia ilay Velona; efa maty Aho, nefa indro velona mandrakizay mandrakizay, sady manam-pahefana amin’ny fahafatesana sy amin’ny Toeran’ny maty. '
  '19':
  - type: text
    content: 'Koa soraty izay zavatra efa hitanao, na izay ankehitriny, na izay mbola ho avy any aoriana. '
  '2':
  - type: text
    content: Io Jôhany io no vavolombelona nampita ny teny avy amin’Andriamanitra sy ny hafatra nijoroan’i Jesoa Kristy ho vavolombelona, dia ny zavatra rehetra efa hitany
  - type: note
    content: 'Jereo 1.11,12 sns: zavatra hitany no tena hovisavisain’i Jôhany, kanefa misy zavatra reny ihany koa ombieniombieny.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Izao no hevi-miafina fonosin’ny kintana fito hitanao teo an-tanako havanana sy ny fitoeranjiro volamena fito: ny kintana fito dia ny anjelin’ny Fiangonana fito; ary ny fitoeranjiro fito dia ny Fiangonana fito'
  - type: note
    content: 'And 13-15: jereo Dan 7.13; 10.5; 7.9; 10.6. –And 16-17: jereo Is 49.2; Heb 4.12; Is 44.6; 48.12. –anjelin’ny Fiangonana: olona nirahina hiandraikitra ny Fiangonana, sa anjely mpiambina ny Fiangonana, sa fomba fiteny enti-milaza fa masina sy tanteraka ny Fiangonana naorin’i Kristy sy feheziny?'
  - type: text
    content: .
  '3':
  - type: text
    content: Sambatra izay mamaky sy ireo mihaino ny tenin’ity faminaniana ity, ka mitandrina izay voasoratra ato anatiny; fa antomotra ny fotoanandro hahatanterahan’ireo zavatra ireo.
  - type: heading
    content: Fiarahabana ireo Fiangonana fito
  '4':
  - type: text
    content: Avy amiko Jôhany ireto taratasy ireto, ary mamangy ny Fiangonana fito ao amin’ny faritany Azia aho.
  - type: text
    content: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Ilay ankehitriny sy taloha ary avy
  - type: note
    content: 'faritany Azia: jereo 2Kôr 1.8 sy nta. –Ny Fiangonana fito dia voatanisa ao amin’ny and 11. –Ilay ankehitriny...ary avy: izany hoe Andriamanitra (jereo 1.8); ampit Eks 3.14.'
  - type: text
    content: '; ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’ny Fanahy Masina, ombàm-panomezana fito, Izay eo anoloan’ny sezafiandrianan’Andriamanitra; '
  '5':
  - type: text
    content: 'ary ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', ilay Vavolombelona mahatoky, ilay Zanaka lahimatoa sady voalohany natsangana ho velona avy tany amin’ny maty, ary ilay filohan’ny mpanjakan’ny tany!'
  - type: text
    content: 'Tia antsika i Jesoa Kristy ka efa namaha antsika tamin’ny fatoran’ny fahotantsika fony Izy nahafoy ny rany, '
  '6':
  - type: text
    content: 'ary efa nahatonga antsika ho fanjaka-mpisorona hanompo an’Andriamanitra Rainy. Ho an’i Jesoa Kristy anie ny voninahitra sy ny fahefana mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '7':
  - type: text
    content: Indro i Jesoa Kristy, tamy eo amin’ny rahona, ka hahita maso Azy ny olona rehetra, na dia ireo nandefona Azy aza
  - type: note
    content: 'And 5: Vavolombelona mahatoky: ampit Is 55.4. – lahimatoa: ampit Sal 89.28. –nahafoy ny rany izany hoe nanao sorona ny ainy: jereo Kôl 1.20 sy nta. –and 6: fanjaka-mpisorona: ampit Eks 19.6; 1 Pt 2.5. –And 7: eo amin’ny rahona: jereo Dan 7.13; Mk 14.62. –ireo nandefona Azy: jereo Za 12.10; Jôh 19.37.'
  - type: text
    content: ', ary hitomany Azy ny firenena rehetra ambonin’ny tany. Eny, izany tokoa!'
  '8':
  - type: text
    content: «Izaho no Alfa sy Ômega
  - type: note
    content: 'Alfa sy Ômega: dia ny litera voalohany sy ny litera farany ao amin’ny abidỳ grika; izany andian-teny izany dia midika hoe voalohany sy farany, na fiandohana sy fiafarana: jereo koa 21.6 sy 22.13.'
  - type: text
    content: », hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, ilay Tsitoha.
  - type: heading
    content: Fahitan’i Jôhany an’i Kristy be voninahitra
  '9':
  - type: text
    content: I Jôhany havanareo aho. Tafaray amin’i Jesoa aho ka mpiombona anjara amin’ny fahoriany sy ny fanjakany ary ny faharetany miaraka aminareo. Napetraka tao amin’ny nosy antsoina hoe Pàtmo
  - type: note
    content: 'Pàtmo: nosy kely ao amin’ny Ranomasina Ezea, eo amin’ny zato kilaometatra eo raha avy ao amin’ny seranana Efeso; toerana fanaovana sesitany izay olona tsy telin’ny fanjakana rômanina fahizany.'
  - type: text
    content: ' aho satria nitory ny tenin’Andriamanitra sy nitana ny hafatra nijoroan’i Jesoa ho vavolombelona. '
