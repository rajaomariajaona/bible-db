document_id: REV.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarihan-teny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fanambaràna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny teny grika midika hoe fanambaràna no nahatonga ity boky ity hantsoina hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Apôkalipsỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'nataon’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no aroso amin’ity boky ity. Izany fanambaràna izany dia nomen’Andriamanitra Azy mba hanehoan’i Jesoa Kristy amin’ireo mpanompony izay zavatra tsy maintsy ho tonga faingana. I Jesoa Kristy, tamin’ny alalan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' izay nirahiny, no nampahalala izany tamin’i Jôhany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Io Jôhany io no vavolombelona nampita ny teny avy amin’Andriamanitra sy ny hafatra nijoroan’i Jesoa Kristy ho vavolombelona, dia ny zavatra rehetra efa hitany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo 1.11,12 sns: zavatra hitany no tena hovisavisain’i Jôhany, kanefa misy zavatra reny ihany koa ombieniombieny.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sambatra izay mamaky sy ireo mihaino ny tenin’ity faminaniana ity, ka mitandrina izay voasoratra ato anatiny; fa antomotra ny fotoanandro hahatanterahan’ireo zavatra ireo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana ireo Fiangonana fito
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avy amiko Jôhany ireto taratasy ireto, ary mamangy ny Fiangonana fito ao amin’ny faritany Azia aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Ilay ankehitriny sy taloha ary avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'faritany Azia: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2Kôr 1.8 sy nta. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Ny Fiangonana fito
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia voatanisa ao amin’ny and 11. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ilay ankehitriny...ary avy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany hoe Andriamanitra (jereo 1.8); ampit Eks 3.14.'
    marker-yv: yv-n
  - type: text
    text: '; ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’ny Fanahy Masina, ombàm-panomezana fito, Izay eo anoloan’ny sezafiandrianan’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ilay Vavolombelona mahatoky, ilay Zanaka lahimatoa sady voalohany natsangana ho velona avy tany amin’ny maty, ary ilay filohan’ny mpanjakan’ny tany!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tia antsika i Jesoa Kristy ka efa namaha antsika tamin’ny fatoran’ny fahotantsika fony Izy nahafoy ny rany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary efa nahatonga antsika ho fanjaka-mpisorona hanompo an’Andriamanitra Rainy. Ho an’i Jesoa Kristy anie ny voninahitra sy ny fahefana mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro i Jesoa Kristy, tamy eo amin’ny rahona, ka hahita maso Azy ny olona rehetra, na dia ireo nandefona Azy aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 5:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Vavolombelona mahatoky: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ampit Is 55.4. – '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'lahimatoa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Sal 89.28. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: nahafoy ny rany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izany hoe nanao sorona ny ainy: jereo Kôl 1.20 sy nta. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'and 6: fanjaka-mpisorona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ampit Eks 19.6; 1 Pt 2.5. –'
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 7:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'eo amin’ny rahona:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Dan 7.13; Mk 14.62. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ireo nandefona Azy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Za 12.10; Jôh 19.37.'
    marker-yv: yv-n
  - type: text
    text: ', ary hitomany Azy ny firenena rehetra ambonin’ny tany. Eny, izany tokoa!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Izaho no Alfa sy Ômega
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Alfa sy Ômega: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia ny litera voalohany sy ny litera farany ao amin’ny abidỳ grika; izany andian-teny izany dia midika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: voalohany sy farany,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'fiandohana sy fiafarana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo koa 21.6 sy 22.13.'
    marker-yv: yv-n
  - type: text
    text: », hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, ilay Tsitoha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitan’i Jôhany an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' be voninahitra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I Jôhany havanareo aho. Tafaray amin’i Jesoa aho ka mpiombona anjara amin’ny fahoriany sy ny fanjakany ary ny faharetany miaraka aminareo. Napetraka tao amin’ny nosy antsoina hoe Pàtmo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pàtmo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nosy kely ao amin’ny Ranomasina Ezea, eo amin’ny zato kilaometatra eo raha avy ao amin’ny seranana Efeso; toerana fanaovana sesitany izay olona tsy telin’ny fanjakana rômanina fahizany.
    marker-yv: yv-n
  - type: text
    text: ' aho satria nitory ny tenin’Andriamanitra sy nitana ny hafatra nijoroan’i Jesoa ho vavolombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahazo tsindrimandry avy amin’ny Fanahy Masina aho tamin’ny andron’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andron’ny Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alahady
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ka nahare feo mahery tao ivohoko, dia feo mahery tahaka ny feon-trompetra '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izay zavatra hitanao dia soraty ho boky ka ampitondray any amin’ny Fiangonana fito: dia any Efeso, Smirna, Pergàmo, Tiatira, Sardy, Filadelfia, ary Laôdisia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitodika aho hizaha izay olona niteny tamiko. Ka rehefa tafatodika aho, dia nahita fitoeranjiro volamena fito, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary teo afovoan’ireo fitoeranjiro ireo dia nisy tahatahaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ', niakanjo akanjo lava, nanao etra volamena manodidina ny tratrany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny lohany sy ny volondohany dia fotsy tahaka ny volonondry fotsy na tahaka ny orampanala; ny masony mivaivay tahaka ny lelafo; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny tongony mangirangirana tahaka ny halimo manganohano, hoatra ilay halimo voadio tamin’ny memy afo; ary ny feony midoboka tahaka ny firohondrohon’ny ranobe. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nitana kintana fito teny an-tanany ankavanana Izy, nisy sabatra maranitra roa lela nivoaka avy teo am-bavany ary ny tarehiny dia manelatrelatra tahaka ny masoandro faran’ny mamirapiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vao nahita ny Zanak’olona aho, dia lavo niankohoka toy ny maty teo anoloan’ny tongony. Fa nametraka teo amboniko ny tanany ankavanana Izy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka izay ny tahotra! Izaho no Voalohany sy Farany, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia ilay Velona; efa maty Aho, nefa indro velona mandrakizay mandrakizay, sady manam-pahefana amin’ny fahafatesana sy amin’ny Toeran’ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa soraty izay zavatra efa hitanao, na izay ankehitriny, na izay mbola ho avy any aoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no hevi-miafina fonosin’ny kintana fito hitanao teo an-tanako havanana sy ny fitoeranjiro volamena fito: ny kintana fito dia ny anjelin’ny Fiangonana fito; ary ny fitoeranjiro fito dia ny Fiangonana fito'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 13-15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Dan 7.13; 10.5; 7.9; 10.6. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 16-17:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Is 49.2; Heb 4.12; Is 44.6; 48.12. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'anjelin’ny Fiangonana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' olona nirahina hiandraikitra ny Fiangonana, sa anjely mpiambina ny Fiangonana, sa fomba fiteny enti-milaza fa masina sy tanteraka ny Fiangonana naorin’i Kristy sy feheziny?'
    marker-yv: yv-n
  - type: text
    text: .
