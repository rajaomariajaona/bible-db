document_id: MAT.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Angatahana famantarana i Jesoa
  - type: heading
    content: (Jereo Mk 8.11-13; Lk 12.54-56)
  - type: text
    content: 'Dia nohatonin’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' sy ny '
  - type: text
    content: Tsadoseanina
  - type: text
    content: ' i Jesoa. Te hamandrika Azy ry zareo ka nangataka Azy hanao famantarana ho porofo fa avy amin’Andriamanitra ny fahefàny. '
  '10':
  - type: text
    content: Tsy tsaroanareo ve ny mofo fito ho an’ny vatan-dehilahy efatra arivo ary ny hamaroan’ireo harona feno nentinareo nody
  - type: note
    content: Jereo 15.32-38.
  - type: text
    content: '? '
  '11':
  - type: text
    content: 'Ka ahoana no tsy ahatakaranareo fa tsy mofo no tiako hambara, fony Izaho nilaza taminareo hoe: «Mitandrema tsy ho voan’ny levioran-dry zareo Farisianina sy Tsadoseanina»?'
  '12':
  - type: text
    content: Izay vao azon’ny mpianatra fa tsy ny leviora fampiasa amin’ny mofo no nasain’i Jesoa hitandremany tena fa ny fampianaran-dry zareo Farisianina sy Tsadoseanina.
  - type: heading
    content: Ambaran’i Petera ho Mesia i Jesoa
  - type: heading
    content: (Jereo Mk 8.27-30; Lk 9.18-21)
  '13':
  - type: text
    content: Dia lasa nankany amin’ny faritany manodidina ny tanàna atao hoe Kesaria-Filipo
  - type: note
    content: 'Kesaria-Filipo: jereo Mk 8.27 sy nta.'
  - type: text
    content: ' ry i Jesoa; ary nanontany ny '
  - type: text
    content: mpianany
  - type: text
    content: ' Izy nanao hoe:'
  - type: text
    content: '–Iza moa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', araka ny filàzan’ny olona Azy?'
  '14':
  - type: text
    content: 'Dia novalian’ny mpianany hoe:'
  - type: text
    content: '–Misy manao hoe i Jôhany Mpanao batisa; ny sasany kosa manao hoe i '
  - type: text
    content: Elià
  - type: text
    content: ; ary ny hafa indray manao hoe i Jeremià
  - type: note
    content: 'Jeremià: mpaminany niferinaina tokoa noho ny fanenjehana azy, ka mendrika ho tandindon’i Jesoa.'
  - type: text
    content: ' na anankiray amin’ireo mpaminanin’Andriamanitra.'
  - type: text
    content: 'Ary hoy i Jesoa taminy:'
  '15':
  - type: text
    content: –Fa ianareo kosa, Iza moa Aho aminareo?
  '16':
  - type: text
    content: 'Dia novalian’i Simôna Petera hoe:'
  - type: text
    content: '–Ianao no ilay '
  - type: text
    content: Mesia
  - type: text
    content: ', ny '
  - type: text
    content: Zanak’ilay Andriamanitra
  - type: text
    content: ' velona!'
  '17':
  - type: text
    content: 'Ary niteny tamin’i Petera i Jesoa nanao hoe:'
  - type: text
    content: '–Sambatra ianao, ry Simôna zanakalahin’i Jônà, satria tsy olombelona nofo aman-dra no nanambara izany taminao fa ny Raiko Izay any an-danitra. '
  '18':
  - type: text
    content: Izaho koa milaza aminao fa ianao no Vato, ary eo ambonin’izany vatolampy izany no hanorenako ny Fiangonako; ary ny herin’ny fahafatesana tsy hahatohitra ny Fiangonako
  - type: note
    content: 'Ampit Ef 2.20 sy 1Kôr 3.10-11. –ny herin’ny fahafatesana: ara-bakiteny kokoa dia hoe ny vavahadin’ny Hadèsy (grika) na hoe ny vavahadin’ny seoly (hebreo) araka Nom 16.33. Ny Hadèsy na ny seoly dia manondro ny toeran’ny maty (jereo Jôb 38.17; [Fah 16.13]).'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Homeko anao ny fanalahidin’ny '
  - type: text
    content: Fanjakàn’ny lanitra
  - type: text
    content: ': ka na inona na inona hofehezinao etỳ an-tany dia ho voafehy koa any an-danitra; ary na inona na inona hovahanao etỳ an-tany dia ho voavaha koa any an-danitra'
  - type: note
    content: Ampit 18.18; Jôh 20.23.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Izao kosa no tenin’i Jesoa taminy:'
  - type: text
    content: '[ –Nony hariva ny andro, dia hoy ianareo hoe: «Ho tsara ny andro fa mena midorehitra ny lanitra.» '
  '20':
  - type: text
    content: Tamin’izay dia nofeperan’i Jesoa ny mpianany mba tsy hilazalaza na amin’iza na amin’iza fa hoe Izy no ilay Mesia.
  - type: heading
    content: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mk 8.31–9.1; Lk 9.22-27)
  '21':
  - type: text
    content: 'Hatramin’io fotoana io i Jesoa dia nanomboka nilaza mazava tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hoe:'
  - type: text
    content: '–Tsy maintsy hankany Jerosalema Aho ka hataon’ny '
  - type: text
    content: loholona
  - type: text
    content: ' sy ny lohandoha-mpisorona ary ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' mijaly mafy tokoa, dia hovonoina ho faty; nefa hitsangana velona amin’ny andro fahatelo.'
  '22':
  - type: text
    content: 'Fa i Petera kosa nitondra an’i Jesoa hihataka kely sady niteny Azy mafy hoe:'
  - type: text
    content: –Sanatria aminao izany, ry Tompo! Tsy hihatra aminao velively izany!
  '23':
  - type: text
    content: 'Dia nitodika i Jesoa ary nanao tamin’i Petera hoe:'
  - type: text
    content: '–Mialà amiko, ry '
  - type: text
    content: Satàna
  - type: text
    content: '! Ndeha atsy aoriako! Mitarika Ahy amin’ny ratsy ianao, satria tsy hevitr’Andriamanitra no ao an-tsainao fa hevitr’olombelona.'
  '24':
  - type: text
    content: 'Avy eo dia hoy i Jesoa tamin’ireo mpianany:'
  - type: text
    content: '–Raha misy te hiara-dia amiko, dia aoka izy handà ny tenany ka hitondra ny hazofijaliany ary hiaraka amiko. '
  '25':
  - type: text
    content: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy noho ny fitiavany Ahy kosa no hahavonjy azy. '
  '26':
  - type: text
    content: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny ainy mitondra faisana? Ary inona no azon’ny olona omena ho takalon’ny ainy? '
  '27':
  - type: text
    content: 'Eny, rahatrizay ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' ho avy ombàn’ny voninahitra homen’ny Rainy sady otronin’ireo anjeliny, dia samy hovaliany araka ny nataony avy ny isam-batan’olona'
  - type: note
    content: Ampit Sal 62.13; Rm 2.6.
  - type: text
    content: '. '
  '28':
  - type: text
    content: Lazaiko marina aminareo fa ny sasany amin’izay manatrika eto dia tsy ho faty raha tsy efa mahita ny Zanak’olona tonga amin’ny maha mpanjaka Azy.
  '3':
  - type: text
    content: 'Ary nony maraina ny andro, dia hoy ianareo hoe: «Ho ratsy ny andro anio fa mena antitra ny lanitra.» Hainareo vinavinaina ny toetoetry ny lanitra, ka tsy hainareo vinavinaina ve ireo famantarana momba izao andro diavintsika izao?] '
  '4':
  - type: text
    content: 'Ratsy fanahy sady mpivadika amin’Andriamanitra ny olona ankehitriny: fatra-pitady famantarana nefa tsy homena famantarana afa-tsy ilay momba an’i '
  - type: text
    content: Jônà
  - type: text
    content: ' mpaminany'
  - type: note
    content: Ampit 12.39-40.
  - type: text
    content: '!'
  - type: text
    content: Dia nandao azy ireo i Jesoa ka lasa nandeha.
  - type: heading
    content: Ny fampianaran’ny Farisianina sy Tsadoseanina
  - type: heading
    content: (Jereo Mk 8.14-21)
  '5':
  - type: text
    content: 'Raha niainga hiampita ny rano ireo '
  - type: text
    content: mpianatra
  - type: text
    content: ', dia nanadino ny nitondra mofo; '
  '6':
  - type: text
    content: 'ary hoy i Jesoa taminy:'
  - type: text
    content: '–Mbà malina ka mitandrema tsy ho voan’ny '
  - type: text
    content: leviora
  - type: text
    content: n-dry zareo Farisianina sy Tsadoseanina.
  '7':
  - type: text
    content: 'Fa iretsy mpianany kosa niady hevitra nifampilaza hoe:'
  - type: text
    content: –Noho isika tsy nitondra mofo angaha izany!
  '8':
  - type: text
    content: 'Tsikaritr’i Jesoa izany ka hoy Izy:'
  - type: text
    content: '–Ry kely finoana, nahoana ianareo no miady hevitra ny amin’ny tsy nitondranareo mofo? '
  '9':
  - type: text
    content: Mbola tsy takatrareo foana ve? Tsy tsaroanareo ve ny mofo dimy ho an’ny vatan-dehilahy dimy arivo ary ny hamaroan’ireo sobika feno nentinareo nody
  - type: note
    content: Jereo 14.15-21.
  - type: text
    content: '? '
