document_id: MAT.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Angatahana famantarana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 8.11-13; Lk 12.54-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nohatonin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsadoseanina
  - type: text
    text: ' i Jesoa. Te hamandrika Azy ry zareo ka nangataka Azy hanao famantarana ho porofo fa avy amin’Andriamanitra ny fahefàny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao kosa no tenin’i Jesoa taminy:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '[ –Nony hariva ny andro, dia hoy ianareo hoe: «Ho tsara ny andro fa mena midorehitra ny lanitra.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony maraina ny andro, dia hoy ianareo hoe: «Ho ratsy ny andro anio fa mena antitra ny lanitra.» Hainareo vinavinaina ny toetoetry ny lanitra, ka tsy hainareo vinavinaina ve ireo famantarana momba izao andro diavintsika izao?] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ratsy fanahy sady mpivadika amin’Andriamanitra ny olona ankehitriny: fatra-pitady famantarana nefa tsy homena famantarana afa-tsy ilay momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jônà
  - type: text
    text: ' mpaminany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 12.39-40.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nandao azy ireo i Jesoa ka lasa nandeha.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fampianaran’ny Farisianina sy Tsadoseanina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 8.14-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha niainga hiampita ny rano ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ', dia nanadino ny nitondra mofo; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mbà malina ka mitandrema tsy ho voan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: leviora
  - type: text
    text: n-dry zareo Farisianina sy Tsadoseanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa iretsy mpianany kosa niady hevitra nifampilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Noho isika tsy nitondra mofo angaha izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsikaritr’i Jesoa izany ka hoy Izy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry kely finoana, nahoana ianareo no miady hevitra ny amin’ny tsy nitondranareo mofo? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mbola tsy takatrareo foana ve? Tsy tsaroanareo ve ny mofo dimy ho an’ny vatan-dehilahy dimy arivo ary ny hamaroan’ireo sobika feno nentinareo nody
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 14.15-21.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy tsaroanareo ve ny mofo fito ho an’ny vatan-dehilahy efatra arivo ary ny hamaroan’ireo harona feno nentinareo nody
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 15.32-38.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka ahoana no tsy ahatakaranareo fa tsy mofo no tiako hambara, fony Izaho nilaza taminareo hoe: «Mitandrema tsy ho voan’ny levioran-dry zareo Farisianina sy Tsadoseanina»?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay vao azon’ny mpianatra fa tsy ny leviora fampiasa amin’ny mofo no nasain’i Jesoa hitandremany tena fa ny fampianaran-dry zareo Farisianina sy Tsadoseanina.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Petera ho Mesia i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 8.27-30; Lk 9.18-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia lasa nankany amin’ny faritany manodidina ny tanàna atao hoe Kesaria-Filipo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kesaria-Filipo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mk 8.27 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ry i Jesoa; ary nanontany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' Izy nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Iza moa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ', araka ny filàzan’ny olona Azy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia novalian’ny mpianany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Misy manao hoe i Jôhany Mpanao batisa; ny sasany kosa manao hoe i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià
  - type: text
    text: ; ary ny hafa indray manao hoe i Jeremià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jeremià: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpaminany niferinaina tokoa noho ny fanenjehana azy, ka mendrika ho tandindon’i Jesoa.
    marker-yv: yv-n
  - type: text
    text: ' na anankiray amin’ireo mpaminanin’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: –Fa ianareo kosa, Iza moa Aho aminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia novalian’i Simôna Petera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianao no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’ilay Andriamanitra
  - type: text
    text: ' velona!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary niteny tamin’i Petera i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sambatra ianao, ry Simôna zanakalahin’i Jônà, satria tsy olombelona nofo aman-dra no nanambara izany taminao fa ny Raiko Izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izaho koa milaza aminao fa ianao no Vato, ary eo ambonin’izany vatolampy izany no hanorenako ny Fiangonako; ary ny herin’ny fahafatesana tsy hahatohitra ny Fiangonako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Ef 2.20 sy 1Kôr 3.10-11. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny herin’ny fahafatesana:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ara-bakiteny kokoa dia hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny vavahadin’ny Hadèsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (grika) na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny vavahadin’ny seoly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (hebreo) araka Nom 16.33. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Hadèsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny seoly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia manondro ny toeran’ny maty (jereo Jôb 38.17; [Fah 16.13]).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Homeko anao ny fanalahidin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’ny lanitra
  - type: text
    text: ': ka na inona na inona hofehezinao etỳ an-tany dia ho voafehy koa any an-danitra; ary na inona na inona hovahanao etỳ an-tany dia ho voavaha koa any an-danitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 18.18; Jôh 20.23.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tamin’izay dia nofeperan’i Jesoa ny mpianany mba tsy hilazalaza na amin’iza na amin’iza fa hoe Izy no ilay Mesia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa mialoha ny hahafatesany sy ny hitsanganany ho velona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mk 8.31–9.1; Lk 9.22-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hatramin’io fotoana io i Jesoa dia nanomboka nilaza mazava tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy maintsy hankany Jerosalema Aho ka hataon’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' sy ny lohandoha-mpisorona ary ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' mijaly mafy tokoa, dia hovonoina ho faty; nefa hitsangana velona amin’ny andro fahatelo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa i Petera kosa nitondra an’i Jesoa hihataka kely sady niteny Azy mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sanatria aminao izany, ry Tompo! Tsy hihatra aminao velively izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitodika i Jesoa ary nanao tamin’i Petera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mialà amiko, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: '! Ndeha atsy aoriako! Mitarika Ahy amin’ny ratsy ianao, satria tsy hevitr’Andriamanitra no ao an-tsainao fa hevitr’olombelona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Avy eo dia hoy i Jesoa tamin’ireo mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha misy te hiara-dia amiko, dia aoka izy handà ny tenany ka hitondra ny hazofijaliany ary hiaraka amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay te hamonjy ny ainy no hahavery azy; ary izay hahafoy ny ainy noho ny fitiavany Ahy kosa no hahavonjy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa inona no soa azon’ny olona raha eo am-pelatanany avokoa izao tontolo izao, kanefa ny ainy mitondra faisana? Ary inona no azon’ny olona omena ho takalon’ny ainy? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, rahatrizay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' ho avy ombàn’ny voninahitra homen’ny Rainy sady otronin’ireo anjeliny, dia samy hovaliany araka ny nataony avy ny isam-batan’olona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 62.13; Rm 2.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lazaiko marina aminareo fa ny sasany amin’izay manatrika eto dia tsy ho faty raha tsy efa mahita ny Zanak’olona tonga amin’ny maha mpanjaka Azy.
