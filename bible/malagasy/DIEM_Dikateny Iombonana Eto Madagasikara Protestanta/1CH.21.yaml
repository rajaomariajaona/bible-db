document_id: 1CH.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampanao fanisana ny vahoaka israelita i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 24.1-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nitsangana hampidi-doza an’i Israely i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ' ka nitaona an’i Davida hanisa ny vahoaka israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Davida tamin’i Jôaba sy tamin’ireo lehiben’ny vahoaka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha isao ny Israelita manomboka ao Beera-Seba ka miafara any Dana; ary ento atỳ amiko ny tena isany mba ho fantatro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy i Jôaba hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry andriamanjaka ô, hampitomboin’ny TOMPO ho injaton’izao anie ny isan’ny vahoakany! Efa mpanomponao izy rehetra. Koa nahoana ianao, ry andriamanjaka, no mitady an’izany fanisam-bahoaka izany? Nahoana ianao no hitarika fahotana ho amin’i Israely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 24.3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Saingy tsy azon’i Jôaba nolavina ny didin’ny mpanjaka; ka niainga ry i Jôaba nitety an’i Israely manontolo, ary niverina tao Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia natolotr’i Jôaba an’i Davida ny tarehimarika vokatry ny fanisam-bahoaka: i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' manontolo dia nisy 1 100 000 ny lehilahy matanjaka mahatam-piadiana, ary i Joda dia nisy 470 000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny fokon’i Levỳ sy i Benjamîna dia tsy mba nanaovan-dry i Jôaba fanisana niaraka tamin’ireo, satria tena tsy nankasitrahin’i Jôaba ny didin’ny mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voasazin’Andriamanitra ny hadisoan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 24.10-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy sitrak’Andriamanitra izany zavatra izany, ka nasiany mafy i Israely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy i Davida tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Efa nanao fahotana lehibe aho tamin’izao nataoko izao. Koa ankehitriny, mifona aminao aho mpanomponao, mba avelao ny heloko fa efa nanao fahadalana lehibe tokoa aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ny TOMPO tamin’i Gada, mpanolotsainan’i Davida:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '–Ndeha mitenena amin’i Davida hoe: «Izao no lazain’ny TOMPO: Famaizana telo no ataoko eto anoloanao, koa fidio izay iray hampihariko aminao».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nankany amin’i Davida i Gada ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO: «Mifidiana ianao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'telo taona hisian’ny mosary ve; sa telo volana haharesy anao eo anatrehan’ny mpiady aminao sy hahatraran’ny sabatry ny fahavalonao anao; sa telo andro hamelezan’ny TOMPO amin’ny sabatra, dia ny aretina pesta, ka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: n’ny TOMPO no hanao fandringanana eran’ny tanin’i Israely? Koa hevero tsara izay valin-teny hoentiko any amin’Ilay naniraka ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy i Davida tamin’i Gada:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sanganehana mafy aho; nefa aleoko ho azon’ny tanan’ny TOMPO toy izay ho azon’ny tanan’olombelona, satria lehibe tokoa ny famindrampon’ny Tompo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia aretina pesta no nalefan’ny TOMPO hamelezana an’i Israely, ka nahafatesana fito alina ny Israelita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nirahin’Andriamanitra hankany Jerosalema ilay anjely mba handringana azy; saingy, raha iny nandringana tao iny ilay anjely, ny TOMPO kosa nijery ka nanenina ny amin’izany loza izany sady niteny tamin’ilay anjely mpandringana hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka izay! Aketraho ny tananao ankehitriny!
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamin’izay ity anjelin’ny TOMPO dia nitsangana teo anilan’ny famoloan’ilay Jebosita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jebosita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 24.16 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' atao hoe Araonà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony natopin’i Davida ny masony, dia ilay anjelin’ny TOMPO no hitany nitsangana teo anelanelan’ny tany sy ny lanitra sady nitana sabatra voatsoaka izay natondrony manandrify an’i Jerosalema. Dia niankohoka i Davida sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ', izay efa samy nitafy lamba fisaonana rahateo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy i Davida tamin’Andriamanitra:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy izaho ve no nandidy hanisa ny vahoaka? Izaho mihitsy no nanota sy tena nanao izany zava-dratsy izany; fa ireo vahoaka andianondriko ireo kosa, inona moa no mba nataony? Ry TOMPO Andriamanitro ô, mifona aminao re aho, aoka ny tananao hamely ahy sy ny fianakaviako; fa aza dia ny vahoakanao no asianao amin’ny areti-mandringana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manorina alitara ho an’ny Tompo i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 24.18-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny TOMPO tamin’i Gada:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazao i Davida mba hiakarany hanangana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' ho an’ny TOMPO eo amin’ny famoloan’i Araonà izay Jebosita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niakatra i Davida, araka ny teny nolazain’i Gada tamin’ny anaran’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I Araonà dia nively vary tamin’izay. Ary niherika izy ka nahita an’ilay anjely; ny zanany efa-dahy izay niaraka taminy kosa dia lasa niery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nanatona an’i Araonà i Davida; vao nijery kosa i Araonà ka nahita an’i Davida, dia niala teo amin’ny famoloana ka nihohoka tamin’ny tany teo anatrehan’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Araonà:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba omeo ahy ny tokotany misy ity famoloana ity, mba omeo ahy araka izay tena vidiny haloa vola; fa hanorenako alitara ho an’ny TOMPO izany mba hitsaharan’ny areti-mandringana tsy hamely ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy i Araonà tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ento ho anao ny tokotany, ry andriamanjaka, ary ataovy izay sitrakao; indreto ny ombiko omeko anao koa ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo, ny rambaramba ho kitay, ary ny vary ho fanatitra. Omeko anao avokoa ireo rehetra ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hoy kosa i Davida mpanjaka tamin’i Araonà;
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsia, fa hovidiko mihitsy ny tokotany, araka ny tena vidiny haloa vola; fa tsy izay anao no halaiko ho an’ny TOMPO ary tsy zavatra azoko maimaim-poana no hataoko sorona dorana manontolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nomen’i Davida sekela volamena eninjato i Araonà ho vidin’ny tokotany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Teo no nanorenan’i Davida alitara ho an’ny TOMPO; ary nanolotra sorana dorana manontolo sy sorom-pihavanana izy sady niantso ny TOMPO, ka novaliany tamin’ny afo avy tany an-danitra, dia afo izay latsaka teo amin’ny alitara nisy ny sorona dorana manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nodidian’ny TOMPO ilay anjely mba hampiditra ny sabany tamin’ny tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nony hitan’i Davida namaly vavaka azy ny TOMPO teo amin’ny famoloan’i Araonà izay Jebosita, dia nanjary nanolotra sorona teo izy isaky ny fotoanandro sahaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’izay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranolain
  - type: text
    text: ’ny TOMPO (tranolay nataon’i Mosesy tany an-taniefitra) sy ny alitara fanolorana sorona dorana manontolo dia teo amin’ny Toeramasina tao Gibehôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gibehôna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 16.39; 1 Mp 3.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: nefa tsy afaka nankany i Davida mba hanontany an’Andriamanitra, satria natahorany loatra ny sabatr’ilay anjelin’ny TOMPO.
