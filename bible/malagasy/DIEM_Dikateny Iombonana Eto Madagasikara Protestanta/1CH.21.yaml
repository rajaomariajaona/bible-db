document_id: 1CH.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mampanao fanisana ny vahoaka israelita i Davida
  - type: heading
    content: (Jereo 2 Sam 24.1-9)
  - type: text
    content: 'Dia nitsangana hampidi-doza an’i Israely i '
  - type: text
    content: Satàna
  - type: text
    content: ' ka nitaona an’i Davida hanisa ny vahoaka israelita. '
  '10':
  - type: text
    content: '–Ndeha mitenena amin’i Davida hoe: «Izao no lazain’ny TOMPO: Famaizana telo no ataoko eto anoloanao, koa fidio izay iray hampihariko aminao».'
  '11':
  - type: text
    content: 'Dia nankany amin’i Davida i Gada ka nanao taminy hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO: «Mifidiana ianao: '
  '12':
  - type: text
    content: 'telo taona hisian’ny mosary ve; sa telo volana haharesy anao eo anatrehan’ny mpiady aminao sy hahatraran’ny sabatry ny fahavalonao anao; sa telo andro hamelezan’ny TOMPO amin’ny sabatra, dia ny aretina pesta, ka ny '
  - type: text
    content: anjeli
  - type: text
    content: n’ny TOMPO no hanao fandringanana eran’ny tanin’i Israely? Koa hevero tsara izay valin-teny hoentiko any amin’Ilay naniraka ahy.
  '13':
  - type: text
    content: 'Ary hoy i Davida tamin’i Gada:'
  - type: text
    content: –Sanganehana mafy aho; nefa aleoko ho azon’ny tanan’ny TOMPO toy izay ho azon’ny tanan’olombelona, satria lehibe tokoa ny famindrampon’ny Tompo!
  '14':
  - type: text
    content: 'Dia aretina pesta no nalefan’ny TOMPO hamelezana an’i Israely, ka nahafatesana fito alina ny Israelita. '
  '15':
  - type: text
    content: 'Ary nirahin’Andriamanitra hankany Jerosalema ilay anjely mba handringana azy; saingy, raha iny nandringana tao iny ilay anjely, ny TOMPO kosa nijery ka nanenina ny amin’izany loza izany sady niteny tamin’ilay anjely mpandringana hoe:'
  - type: text
    content: –Aoka izay! Aketraho ny tananao ankehitriny!
  - type: text
    content: Tamin’izay ity anjelin’ny TOMPO dia nitsangana teo anilan’ny famoloan’ilay Jebosita
  - type: note
    content: 'Jebosita: jereo 2 Sam 24.16 sy nta.'
  - type: text
    content: ' atao hoe Araonà. '
  '16':
  - type: text
    content: 'Nony natopin’i Davida ny masony, dia ilay anjelin’ny TOMPO no hitany nitsangana teo anelanelan’ny tany sy ny lanitra sady nitana sabatra voatsoaka izay natondrony manandrify an’i Jerosalema. Dia niankohoka i Davida sy ny '
  - type: text
    content: loholona
  - type: text
    content: ', izay efa samy nitafy lamba fisaonana rahateo. '
  '17':
  - type: text
    content: 'Ary hoy i Davida tamin’Andriamanitra:'
  - type: text
    content: –Tsy izaho ve no nandidy hanisa ny vahoaka? Izaho mihitsy no nanota sy tena nanao izany zava-dratsy izany; fa ireo vahoaka andianondriko ireo kosa, inona moa no mba nataony? Ry TOMPO Andriamanitro ô, mifona aminao re aho, aoka ny tananao hamely ahy sy ny fianakaviako; fa aza dia ny vahoakanao no asianao amin’ny areti-mandringana.
  - type: heading
    content: Manorina alitara ho an’ny Tompo i Davida
  - type: heading
    content: (Jereo 2 Sam 24.18-25)
  '18':
  - type: text
    content: 'Dia hoy ilay '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny TOMPO tamin’i Gada:'
  - type: text
    content: '–Lazao i Davida mba hiakarany hanangana '
  - type: text
    content: alitara
  - type: text
    content: ' ho an’ny TOMPO eo amin’ny famoloan’i Araonà izay Jebosita.'
  '19':
  - type: text
    content: 'Dia niakatra i Davida, araka ny teny nolazain’i Gada tamin’ny anaran’ny TOMPO. '
  '2':
  - type: text
    content: 'Dia hoy i Davida tamin’i Jôaba sy tamin’ireo lehiben’ny vahoaka:'
  - type: text
    content: –Ndeha isao ny Israelita manomboka ao Beera-Seba ka miafara any Dana; ary ento atỳ amiko ny tena isany mba ho fantatro.
  '20':
  - type: text
    content: 'I Araonà dia nively vary tamin’izay. Ary niherika izy ka nahita an’ilay anjely; ny zanany efa-dahy izay niaraka taminy kosa dia lasa niery. '
  '21':
  - type: text
    content: 'Ary nanatona an’i Araonà i Davida; vao nijery kosa i Araonà ka nahita an’i Davida, dia niala teo amin’ny famoloana ka nihohoka tamin’ny tany teo anatrehan’i Davida. '
  '22':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Araonà:'
  - type: text
    content: –Mba omeo ahy ny tokotany misy ity famoloana ity, mba omeo ahy araka izay tena vidiny haloa vola; fa hanorenako alitara ho an’ny TOMPO izany mba hitsaharan’ny areti-mandringana tsy hamely ny vahoaka.
  '23':
  - type: text
    content: 'Fa hoy i Araonà tamin’i Davida:'
  - type: text
    content: '–Ento ho anao ny tokotany, ry andriamanjaka, ary ataovy izay sitrakao; indreto ny ombiko omeko anao koa ho '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, ny rambaramba ho kitay, ary ny vary ho fanatitra. Omeko anao avokoa ireo rehetra ireo.'
  '24':
  - type: text
    content: Hoy kosa i Davida mpanjaka tamin’i Araonà;
  - type: text
    content: –Tsia, fa hovidiko mihitsy ny tokotany, araka ny tena vidiny haloa vola; fa tsy izay anao no halaiko ho an’ny TOMPO ary tsy zavatra azoko maimaim-poana no hataoko sorona dorana manontolo.
  '25':
  - type: text
    content: 'Dia nomen’i Davida sekela volamena eninjato i Araonà ho vidin’ny tokotany. '
  '26':
  - type: text
    content: 'Teo no nanorenan’i Davida alitara ho an’ny TOMPO; ary nanolotra sorana dorana manontolo sy sorom-pihavanana izy sady niantso ny TOMPO, ka novaliany tamin’ny afo avy tany an-danitra, dia afo izay latsaka teo amin’ny alitara nisy ny sorona dorana manontolo. '
  '27':
  - type: text
    content: Dia nodidian’ny TOMPO ilay anjely mba hampiditra ny sabany tamin’ny tranony.
  '28':
  - type: text
    content: 'Nony hitan’i Davida namaly vavaka azy ny TOMPO teo amin’ny famoloan’i Araonà izay Jebosita, dia nanjary nanolotra sorona teo izy isaky ny fotoanandro sahaza. '
  '29':
  - type: text
    content: 'Tamin’izay ny '
  - type: text
    content: tranolain
  - type: text
    content: ’ny TOMPO (tranolay nataon’i Mosesy tany an-taniefitra) sy ny alitara fanolorana sorona dorana manontolo dia teo amin’ny Toeramasina tao Gibehôna
  - type: note
    content: 'Gibehôna: jereo 16.39; 1 Mp 3.4 sy nta.'
  - type: text
    content: '; '
  '3':
  - type: text
    content: 'Dia hoy i Jôaba hoe:'
  - type: text
    content: –Ry andriamanjaka ô, hampitomboin’ny TOMPO ho injaton’izao anie ny isan’ny vahoakany! Efa mpanomponao izy rehetra. Koa nahoana ianao, ry andriamanjaka, no mitady an’izany fanisam-bahoaka izany? Nahoana ianao no hitarika fahotana ho amin’i Israely
  - type: note
    content: Jereo 2 Sam 24.3 sy nta.
  - type: text
    content: '?'
  '30':
  - type: text
    content: nefa tsy afaka nankany i Davida mba hanontany an’Andriamanitra, satria natahorany loatra ny sabatr’ilay anjelin’ny TOMPO.
  '4':
  - type: text
    content: 'Saingy tsy azon’i Jôaba nolavina ny didin’ny mpanjaka; ka niainga ry i Jôaba nitety an’i Israely manontolo, ary niverina tao Jerosalema. '
  '5':
  - type: text
    content: 'Dia natolotr’i Jôaba an’i Davida ny tarehimarika vokatry ny fanisam-bahoaka: i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo dia nisy 1 100 000 ny lehilahy matanjaka mahatam-piadiana, ary i Joda dia nisy 470 000.'
  '6':
  - type: text
    content: Fa ny fokon’i Levỳ sy i Benjamîna dia tsy mba nanaovan-dry i Jôaba fanisana niaraka tamin’ireo, satria tena tsy nankasitrahin’i Jôaba ny didin’ny mpanjaka.
  - type: heading
    content: Voasazin’Andriamanitra ny hadisoan’i Davida
  - type: heading
    content: (Jereo 2 Sam 24.10-17)
  '7':
  - type: text
    content: 'Tsy sitrak’Andriamanitra izany zavatra izany, ka nasiany mafy i Israely. '
  '8':
  - type: text
    content: 'Ary hoy i Davida tamin’Andriamanitra:'
  - type: text
    content: –Efa nanao fahotana lehibe aho tamin’izao nataoko izao. Koa ankehitriny, mifona aminao aho mpanomponao, mba avelao ny heloko fa efa nanao fahadalana lehibe tokoa aho!
  '9':
  - type: text
    content: 'Ary hoy ny TOMPO tamin’i Gada, mpanolotsainan’i Davida:'
