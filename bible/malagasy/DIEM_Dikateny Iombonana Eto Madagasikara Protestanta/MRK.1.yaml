  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary naiditra am-ponja i Jôhany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ary naiditra... i Jôhany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i Jôhany Mpanao batisa no ambara eto. Jereo Mk 6.17.
      marker-yv: yv-n
    - type: text
      text: '. Taorian’izay, dia nankany Galilea i Jesoa, nanao antso avo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' avy amin’Andriamanitra '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ka nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tonga ny fotoanandro; efa akaiky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: ', ialao ny toe-dratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ialao ny toe-dratsy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
      marker-yv: yv-n
    - type: text
      text: ' ary minoa ny Vaovao Mahafaly.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antsoin’i Jesoa ireo mpanarato efa-dahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 4.18-22; Lk 5.1-11)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nandalo teo amoron’ny farihin’i Galilea i Jesoa ka nahita an’i Simôna sy i Andrea mirahalahy; nanipy harato tao anaty farihy izy roa lahy fa mpanarato no raharahany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andao hiaraka amiko fa hataoko mpanarato olona ianareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia nilaozany avy hatrany ny haratony, ka lasa izy roa lahy niaraka tamin’i Jesoa.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nony nandroso kelikely i Jesoa, dia nahita an’i Jakôba sy i Jôhany mirahalahy, zanak’i Zebedeo. Nanamboatra ny haratony tao an-tsambokely izy roa lahy tamin’izay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' ao amin’ny bokin’i Isaià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro alefako hialoha Anao ny irako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoy Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanomana ny lalanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ao amin’ny... mpaminany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ao amin’ny bokin’ny mpaminany.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –Mal 3.1.'
      marker-yv: yv-n
    - type: text
      text: .»
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary nantsoin’i Jesoa avy hatrany izy mirahalahy; dia nilaozany teo an-tsambokely i Zebedeo rainy mbamin’ireo mpikarama, fa lasa izy roa lahy niaraka tamin’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay olona azon’ny fanahy maloto
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 4.31-37)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nankany an-tanàna atao hoe Kafarnahòma i Jesoa mbamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: ' efa-dahy; ary raha vao tonga ny sabata, dia niditra tao amin’ny sinagôga i Jesoa ka nampianatra tao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Talanjona ny olona nihaino ny fampianarany, satria nampianatra azy tamin-pahefana i Jesoa, fa tsy tahaka ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tamin’izay indrindra, tao amin’ny sinagôgan-dry zareo, dia nisy lehilahy azon’ny fanahy maloto '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ka niantsoantso mafy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fa hataonao inona izahay, ry Jesoa avy any Nazareta? Tonga handringana anay ve Ianao? Fantatro anie fa Ianao no ilay Masina avy amin’Andriamanitra e!
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Notenenin’i Jesoa mafy kosa ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanahy maloto
    - type: text
      text: ' ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mangina, ary mialà amin-dralehilahy io.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nampifanintontsintona an-dralehilahy ny fanahy maloto ary nikiakiaka sady niala taminy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raiki-tahotra ny olona rehetra ka nifanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona ity? Izany ka fampianarana vaovao ombàm-pahefana! Na dia ny fanahy maloto aza, baikon’ity olona ity ka manaiky Azy!
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary poatoizay dia niely eran’ny faritany Galilea manontolo ny lazan’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ny marary marobe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 8.14-17; Lk 4.38-41)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Vantany vao nivoaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' i Jesoa, dia niantrano tao amin-dry i Simôna sy i Andrea; niaraka taminy koa i Jakôba sy i Jôhany. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: «Injany misy feon’olona miantso mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ao an-taniefitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny lalan’ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ahitsio ny hizorany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Is 40.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary nandry teo am-pandriana ny rafozambavin’i Simôna fa voan’ny tazo, ka nampahafantarina an’i Jesoa avy hatrany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia nanatona azy i Jesoa ka nandray ny tanany ary nampitsangana azy. Nialan’ny tazo ravehivavy, ka nandroso sakafo ho an’ireo vahiny.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Nony hariva efa maty masoandro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'efa maty masoandro: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny sabata (jereo and 21) dia mifarana amin’ny sabotsy hariva lenti-masoandro.
      marker-yv: yv-n
    - type: text
      text: ', dia nentin’ny olona teo amin’i Jesoa avokoa izay mety ho marary sy azon’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ka dia vory teo anoloan’ny varavarana ny vahoaka rehetra tao an-tanàna. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Olona maro ianjadian’ny aretina isan-karazany no sitran’i Jesoa, ary demony maro no voaroakany; tsy navelany hiteniteny kosa ireo demony ireo, satria nahalala Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitory ny Vaovao Mahafaly eran’i Galilea i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Lk 4.42-44)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny ampitso maraina mbola maizina, dia nifoha i Jesoa ka niala tao an-tanàna ary lasa nivavaka tany amin’ny toerana mangina. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia nitotototo nizaha Azy ry i Simôna sy ireo namany telo lahy; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'ka nony nahita an’i Jesoa izy efa-dahy, dia nilaza taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mitady Anao ny olona rehetra.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa hoy ny navaliny azy efa-dahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha isika ho any an-toeran-kafa, any amin’ny tanàna akaiky manodidina, mba hitoriako teny any koa; izany manko no nialako tao an-tanàna.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia lasa i Jesoa nitety an’i Galilea manontolo, nitoriteny tany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: 'n-dry zareo Jiosy sady nandroaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: demony
