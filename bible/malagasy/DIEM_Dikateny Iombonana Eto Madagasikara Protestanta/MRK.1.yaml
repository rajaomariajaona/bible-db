  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vantany vao niakatra avy ao anaty rano i Jesoa, dia nahita ny lanitra nitriatra sy ny Fanahy Masina nidina teo aminy tahaka ny voromahailala. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nisy feo avy tany an-danitra nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianao no Zanako, ilay Malalako; Ianao no sitrako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
