document_id: MRK.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vontoatin’ny fampianaran’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mt 3.1-12; Lk 3.1-18; Jôh 1.19-28)
  - type: text
    content: 'Manomboka eto ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i Jesoa '
  - type: text
    content: Kristy Zanak’Andriamanitra
  - type: note
    content: Misy stf tsy ahitana ny teny hoe Zanak’Andriamanitra.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Vantany vao niakatra avy ao anaty rano i Jesoa, dia nahita ny lanitra nitriatra sy ny Fanahy Masina nidina teo aminy tahaka ny voromahailala. '
  '11':
  - type: text
    content: 'Ary nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: –Ianao no Zanako, ilay Malalako; Ianao no sitrako
  - type: note
    content: Ampit Sal 2.7; Is 42.1.
  - type: text
    content: .
  - type: heading
    content: Alaim-panahy any an-taniefitra i Jesoa
  - type: heading
    content: (Jereo Mt 4.1-11; Lk 4.1-13)
  '12':
  - type: text
    content: 'Ary niaraka tamin’izay dia nasesiky ny Fanahy Masina hankany an-taniefitra i Jesoa '
  '13':
  - type: text
    content: 'ka nijanona efapolo andro tany, nalain’i '
  - type: text
    content: Satàna
  - type: text
    content: ' fanahy, niara-nonina tamin’ny bibidia, ary notompoin’ny '
  - type: text
    content: anjely
  - type: text
    content: .
  - type: heading
    content: Manomboka ny asany any Galilea i Jesoa
  - type: heading
    content: (Jereo Mt 4.12-17; Lk 4.14-15)
  '14':
  - type: text
    content: Ary naiditra am-ponja i Jôhany
  - type: note
    content: 'Ary naiditra... i Jôhany: i Jôhany Mpanao batisa no ambara eto. Jereo Mk 6.17.'
  - type: text
    content: '. Taorian’izay, dia nankany Galilea i Jesoa, nanao antso avo ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' avy amin’Andriamanitra '
  '15':
  - type: text
    content: 'ka nilaza hoe:'
  - type: text
    content: '–Tonga ny fotoanandro; efa akaiky ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: ', ialao ny toe-dratsy'
  - type: note
    content: 'Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ' ary minoa ny Vaovao Mahafaly.'
  - type: heading
    content: Antsoin’i Jesoa ireo mpanarato efa-dahy
  - type: heading
    content: (Jereo Mt 4.18-22; Lk 5.1-11)
  '16':
  - type: text
    content: 'Ary nandalo teo amoron’ny farihin’i Galilea i Jesoa ka nahita an’i Simôna sy i Andrea mirahalahy; nanipy harato tao anaty farihy izy roa lahy fa mpanarato no raharahany. '
  '17':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Andao hiaraka amiko fa hataoko mpanarato olona ianareo.
  '18':
  - type: text
    content: Dia nilaozany avy hatrany ny haratony, ka lasa izy roa lahy niaraka tamin’i Jesoa.
  '19':
  - type: text
    content: 'Ary nony nandroso kelikely i Jesoa, dia nahita an’i Jakôba sy i Jôhany mirahalahy, zanak’i Zebedeo. Nanamboatra ny haratony tao an-tsambokely izy roa lahy tamin’izay. '
  '2':
  - type: text
    content: 'Izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao amin’ny bokin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ':'
  - type: text
    content: «Indro alefako hialoha Anao ny irako,
  - type: text
    content: hoy Andriamanitra,
  - type: text
    content: mba hanomana ny lalanao
  - type: note
    content: 'ao amin’ny... mpaminany: misy stf sasany ahitana hoe ao amin’ny bokin’ny mpaminany. –Mal 3.1.'
  - type: text
    content: .»
  '20':
  - type: text
    content: Ary nantsoin’i Jesoa avy hatrany izy mirahalahy; dia nilaozany teo an-tsambokely i Zebedeo rainy mbamin’ireo mpikarama, fa lasa izy roa lahy niaraka tamin’i Jesoa.
  - type: heading
    content: Sitranin’i Jesoa ilay olona azon’ny fanahy maloto
  - type: heading
    content: (Jereo Lk 4.31-37)
  '21':
  - type: text
    content: 'Dia nankany an-tanàna atao hoe Kafarnahòma i Jesoa mbamin’ireo '
  - type: text
    content: mpianany
  - type: text
    content: ' efa-dahy; ary raha vao tonga ny sabata, dia niditra tao amin’ny sinagôga i Jesoa ka nampianatra tao. '
  '22':
  - type: text
    content: 'Talanjona ny olona nihaino ny fampianarany, satria nampianatra azy tamin-pahefana i Jesoa, fa tsy tahaka ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Tamin’izay indrindra, tao amin’ny sinagôgan-dry zareo, dia nisy lehilahy azon’ny fanahy maloto '
  '24':
  - type: text
    content: 'ka niantsoantso mafy hoe:'
  - type: text
    content: –Fa hataonao inona izahay, ry Jesoa avy any Nazareta? Tonga handringana anay ve Ianao? Fantatro anie fa Ianao no ilay Masina avy amin’Andriamanitra e!
  '25':
  - type: text
    content: 'Notenenin’i Jesoa mafy kosa ilay '
  - type: text
    content: fanahy maloto
  - type: text
    content: ' ka nataony hoe:'
  - type: text
    content: –Mangina, ary mialà amin-dralehilahy io.
  '26':
  - type: text
    content: 'Dia nampifanintontsintona an-dralehilahy ny fanahy maloto ary nikiakiaka sady niala taminy. '
  '27':
  - type: text
    content: 'Raiki-tahotra ny olona rehetra ka nifanontany hoe:'
  - type: text
    content: –Inona ity? Izany ka fampianarana vaovao ombàm-pahefana! Na dia ny fanahy maloto aza, baikon’ity olona ity ka manaiky Azy!
  '28':
  - type: text
    content: Ary poatoizay dia niely eran’ny faritany Galilea manontolo ny lazan’i Jesoa.
  - type: heading
    content: Sitranin’i Jesoa ny marary marobe
  - type: heading
    content: (Jereo Mt 8.14-17; Lk 4.38-41)
  '29':
  - type: text
    content: 'Vantany vao nivoaka ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Jesoa, dia niantrano tao amin-dry i Simôna sy i Andrea; niaraka taminy koa i Jakôba sy i Jôhany. '
  '3':
  - type: text
    content: «Injany misy feon’olona miantso mafy
  - type: text
    content: 'ao an-taniefitra hoe:'
  - type: text
    content: Amboary ny lalan’ny Tompo;
  - type: text
    content: ahitsio ny hizorany
  - type: note
    content: Is 40.3, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '30':
  - type: text
    content: 'Ary nandry teo am-pandriana ny rafozambavin’i Simôna fa voan’ny tazo, ka nampahafantarina an’i Jesoa avy hatrany. '
  '31':
  - type: text
    content: Dia nanatona azy i Jesoa ka nandray ny tanany ary nampitsangana azy. Nialan’ny tazo ravehivavy, ka nandroso sakafo ho an’ireo vahiny.
  '32':
  - type: text
    content: Nony hariva efa maty masoandro
  - type: note
    content: 'efa maty masoandro: ny sabata (jereo and 21) dia mifarana amin’ny sabotsy hariva lenti-masoandro.'
  - type: text
    content: ', dia nentin’ny olona teo amin’i Jesoa avokoa izay mety ho marary sy azon’ny '
  - type: text
    content: demony
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ka dia vory teo anoloan’ny varavarana ny vahoaka rehetra tao an-tanàna. '
  '34':
  - type: text
    content: Olona maro ianjadian’ny aretina isan-karazany no sitran’i Jesoa, ary demony maro no voaroakany; tsy navelany hiteniteny kosa ireo demony ireo, satria nahalala Azy.
  - type: heading
    content: Mitory ny Vaovao Mahafaly eran’i Galilea i Jesoa
  - type: heading
    content: (Jereo Lk 4.42-44)
  '35':
  - type: text
    content: 'Ny ampitso maraina mbola maizina, dia nifoha i Jesoa ka niala tao an-tanàna ary lasa nivavaka tany amin’ny toerana mangina. '
  '36':
  - type: text
    content: 'Dia nitotototo nizaha Azy ry i Simôna sy ireo namany telo lahy; '
  '37':
  - type: text
    content: 'ka nony nahita an’i Jesoa izy efa-dahy, dia nilaza taminy hoe:'
  - type: text
    content: –Mitady Anao ny olona rehetra.
  '38':
  - type: text
    content: 'Fa hoy ny navaliny azy efa-dahy:'
  - type: text
    content: –Andeha isika ho any an-toeran-kafa, any amin’ny tanàna akaiky manodidina, mba hitoriako teny any koa; izany manko no nialako tao an-tanàna.
  '39':
  - type: text
    content: 'Dia lasa i Jesoa nitety an’i Galilea manontolo, nitoriteny tany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: 'n-dry zareo Jiosy sady nandroaka ny '
  - type: text
    content: demony
  - type: text
    content: .
  - type: heading
    content: Sitranin’i Jesoa ilay lehilahy marary hoditra
  - type: heading
    content: (Jereo Mt 8.1-4; Lk 5.12-16)
  '4':
  - type: text
    content: 'Araka izany, dia niseho i Jôhany ka nanao '
  - type: text
    content: batisa
  - type: text
    content: ' tany an-taniefitra sy nanao antso avo hoe:'
  - type: text
    content: –Ialao ny toe-dratsy, meteza hatao batisa, dia havelan’Andriamanitra ny helokareo
  - type: note
    content: 'niseho i Jôhany... antso avo: misy stf sasany ahitana hoe niseho tany an-taniefitra i Jôhany ka nanao batisa sy nanao antso avo na koa niseho tany an-taniefitra i Jôhany Mpanao batisa ka nanao antso avo. –Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: .
  '40':
  - type: text
    content: 'Ary nanatona an’i Jesoa ity lehilahy '
  - type: text
    content: marary hoditra
  - type: text
    content: ' ka nitalaho taminy sady nandohalika teo anatrehany ka nanao taminy hoe:'
  - type: text
    content: –Raha sitrakao, dia hainao diovina aho.
  '41':
  - type: text
    content: Onena azy
  - type: note
    content: 'Onena azy: misy stf sasany ahitana hoe Nitezitra azy.'
  - type: text
    content: 'i Jesoa ka nanatsotra tanana nikasika azy sady niteny hoe:'
  - type: text
    content: –Sitrako, madiova ianao.
  '42':
  - type: text
    content: 'Avy hatrany dia nialan’ny aretin-koditra nahazo azy ralehilahy ka nadio. '
  '43':
  - type: text
    content: 'Dia nasain’i Jesoa nandeha niaraka tamin’izay izy sady nofeperany mafy '
  '44':
  - type: text
    content: 'nataony hoe:'
  - type: text
    content: '–Tandremo mihitsy ny milaza izao na amin’iza na amin’iza; fa mandehana miseho amin’ny mpisorona ary ento ny fanatitra voadidin’i Mosesy mba ho vavolombelona amin’ny olona fa '
  - type: text
    content: madio
  - type: text
    content: ' ianao'
  - type: note
    content: Jereo Lev 14.2-32.
  - type: text
    content: .
  '45':
  - type: text
    content: Kanjo raha vao niala teo ralehilahy, dia nanao antso avo izay nitranga taminy ary nampiely izany. Koa tsy afa-niditra an-tanàna tamin’ny fomba miharihary intsony i Jesoa; fa dia any amin’ny toerana mangina ivelan-tanàna any foana Izy, kanefa mbola nohatonin’ny olona avy eny rehetra eny.
  '5':
  - type: text
    content: Nirohotra nankeo amin’i Jôhany avokoa ny olona avy any Jodea lafy valo sy avy any Jerosalema; ary niaiky heloka ireo ka dia nataon’i Jôhany batisa tao amin’ny ony Jôrdàna.
  '6':
  - type: text
    content: Akanjo volon-drameva ary fehikibo hoditra no fanaovan’i Jôhany
  - type: note
    content: Jereo 2 Mp 1.8.
  - type: text
    content: '; valala sy tantely remby no fihinany. '
  '7':
  - type: text
    content: 'Ary hoy ny antso avo nataony:'
  - type: text
    content: '–Tamy aoriako Ilay mahery noho izaho, ka tsy mendrika hiondrika hamaha ny fehikapany akory aho. '
  '8':
  - type: text
    content: Ny ahy, rano no nanaovako batisa anareo; ny Azy kosa, ny Fanahy Masina no hanaovany batisa anareo.
  - type: heading
    content: Ataon’i Jôhany batisa i Jesoa
  - type: heading
    content: (Jereo Mt 3.13-17; Lk 3.21-22)
  '9':
  - type: text
    content: 'Tamin’izany andro izany, dia tonga avy any Nazareta tanàna any Galilea i Jesoa ary nataon’i Jôhany '
  - type: text
    content: batisa
  - type: text
    content: ' tao Jôrdàna. '
