    - type: text
      text: 'Ary nanatona an’i Jesoa ity lehilahy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: marary hoditra
    - type: text
      text: ' ka nitalaho taminy sady nandohalika teo anatrehany ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha sitrakao, dia hainao diovina aho.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Onena azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Onena azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nitezitra azy.
      marker-yv: yv-n
    - type: text
      text: 'i Jesoa ka nanatsotra tanana nikasika azy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Sitrako, madiova ianao.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Avy hatrany dia nialan’ny aretin-koditra nahazo azy ralehilahy ka nadio. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia nasain’i Jesoa nandeha niaraka tamin’izay izy sady nofeperany mafy '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tandremo mihitsy ny milaza izao na amin’iza na amin’iza; fa mandehana miseho amin’ny mpisorona ary ento ny fanatitra voadidin’i Mosesy mba ho vavolombelona amin’ny olona fa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' ianao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 14.2-32.
      marker-yv: yv-n
    - type: text
      text: .
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Kanjo raha vao niala teo ralehilahy, dia nanao antso avo izay nitranga taminy ary nampiely izany. Koa tsy afa-niditra an-tanàna tamin’ny fomba miharihary intsony i Jesoa; fa dia any amin’ny toerana mangina ivelan-tanàna any foana Izy, kanefa mbola nohatonin’ny olona avy eny rehetra eny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nirohotra nankeo amin’i Jôhany avokoa ny olona avy any Jodea lafy valo sy avy any Jerosalema; ary niaiky heloka ireo ka dia nataon’i Jôhany batisa tao amin’ny ony Jôrdàna.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Akanjo volon-drameva ary fehikibo hoditra no fanaovan’i Jôhany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2 Mp 1.8.
      marker-yv: yv-n
    - type: text
      text: '; valala sy tantely remby no fihinany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy ny antso avo nataony:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tamy aoriako Ilay mahery noho izaho, ka tsy mendrika hiondrika hamaha ny fehikapany akory aho. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny ahy, rano no nanaovako batisa anareo; ny Azy kosa, ny Fanahy Masina no hanaovany batisa anareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ataon’i Jôhany batisa i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 3.13-17; Lk 3.21-22)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tamin’izany andro izany, dia tonga avy any Nazareta tanàna any Galilea i Jesoa ary nataon’i Jôhany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ' tao Jôrdàna. '
