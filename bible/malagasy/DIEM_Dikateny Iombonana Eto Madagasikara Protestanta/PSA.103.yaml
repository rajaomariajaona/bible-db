document_id: PSA.103,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ilay fisaorana lehibe
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hisaotra ny TOMPO aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hisaotra eram-po ny anarany masina!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy araka ny otantsika no anafaizany antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy araka ny helotsika no amaliany antsika.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tahaka ny haavon’ny lanitra ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no haben’ny fitiavany amin’izay manaja Azy;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny halavitry ny atsinanana amin’ny andrefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hampanalavirany amintsika ny hadisoantsika.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fangoraky ny ray an’ireo zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no angorahan’ny TOMPO an’izay manaja Azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fantany ny namolavolana antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsaroany tokoa fa vovoka isika.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny ahitra ny androm-piainan’ny olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toy ny voninkazo eny an-tsaha ny famoniny:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa tsofin’ny rivotra izy, dia foana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala azy intsony ny toerany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fitiavan’ny TOMPO kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hatrizay ka ho mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ireo olona manaja Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahamarinany hihatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny taranaka mandimby,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'izay mitandro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mahatsiaro hanatanteraka ny baikony.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naorin’ny TOMPO any an-danitra ny sezafiandrianany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mifehy an’izao rehetra izao ny fanjakany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aoka hisaotra ny TOMPO aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hisy hohadinoiko ny soa nataony!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Misaora ny TOMPO, ianareo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hery voafantina mpanatanteraka ny teniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mankatò Azy raha vao mandre ny baikony.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora ny TOMPO, ianareo andian-tafiny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mpanompony mpanatanteraka ny sitrany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora ny TOMPO, ianareo voaariny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny toeran-drehetra izay anapahany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho koa, aoka hisaotra ny TOMPO!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no mamela ny heloko rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manasitrana ny aretiko rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avotany tsy ho any an-davaka ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rakofany fitiavana sy indrafo aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fenoiny fahasambarana ny fiainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tanora sy matanjaka toa voromahery aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omen’ny TOMPO rariny sy hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay rehetra ampahorîna.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampahafantatra ny fikasany tamin’i Mosesy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny asany mahery tamin’ny vahoaka israelita.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamindrafo sy mpiantra ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mora tezitra ary be fitiavana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '103.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.6; Sal 86.15; 145.8; Jak 5.11.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mandevilevy lalandava Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mitahiry fahatezerana mandrakizay.
