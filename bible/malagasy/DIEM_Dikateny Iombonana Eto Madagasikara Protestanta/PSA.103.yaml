document_id: PSA.103,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ilay fisaorana lehibe
  - type: text
    content: ' '
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: Aoka hisaotra ny TOMPO aho,
  - type: text
    content: hisaotra eram-po ny anarany masina!
  '10':
  - type: text
    content: Tsy araka ny otantsika no anafaizany antsika,
  - type: text
    content: tsy araka ny helotsika no amaliany antsika.
  '11':
  - type: text
    content: Fa tahaka ny haavon’ny lanitra ambonin’ny tany
  - type: text
    content: no haben’ny fitiavany amin’izay manaja Azy;
  '12':
  - type: text
    content: tahaka ny halavitry ny atsinanana amin’ny andrefana
  - type: text
    content: no hampanalavirany amintsika ny hadisoantsika.
  '13':
  - type: text
    content: Tahaka ny fangoraky ny ray an’ireo zanany
  - type: text
    content: no angorahan’ny TOMPO an’izay manaja Azy.
  '14':
  - type: text
    content: Satria fantany ny namolavolana antsika,
  - type: text
    content: ka tsaroany tokoa fa vovoka isika.
  '15':
  - type: text
    content: Toy ny ahitra ny androm-piainan’ny olombelona,
  - type: text
    content: 'toy ny voninkazo eny an-tsaha ny famoniny:'
  '16':
  - type: text
    content: rehefa tsofin’ny rivotra izy, dia foana
  - type: text
    content: ka tsy mahalala azy intsony ny toerany.
  '17':
  - type: text
    content: Fa ny fitiavan’ny TOMPO kosa
  - type: text
    content: dia hatrizay ka ho mandrakizay
  - type: text
    content: amin’ireo olona manaja Azy;
  - type: text
    content: ary ny fahamarinany hihatra
  - type: text
    content: amin’ny taranaka mandimby,
  '18':
  - type: text
    content: 'izay mitandro ny '
  - type: text
    content: fanekempihavanany
  - type: text
    content: ka mahatsiaro hanatanteraka ny baikony.
  '19':
  - type: text
    content: Naorin’ny TOMPO any an-danitra ny sezafiandrianany,
  - type: text
    content: mifehy an’izao rehetra izao ny fanjakany.
  '2':
  - type: text
    content: Eny, aoka hisaotra ny TOMPO aho,
  - type: text
    content: ka tsy hisy hohadinoiko ny soa nataony!
  '20':
  - type: text
    content: 'Misaora ny TOMPO, ianareo '
  - type: text
    content: anjeliny
  - type: text
    content: izay hery voafantina mpanatanteraka ny teniny
  - type: text
    content: ka mankatò Azy raha vao mandre ny baikony.
  '21':
  - type: text
    content: Misaora ny TOMPO, ianareo andian-tafiny rehetra
  - type: text
    content: izay mpanompony mpanatanteraka ny sitrany.
  '22':
  - type: text
    content: Misaora ny TOMPO, ianareo voaariny rehetra
  - type: text
    content: amin’ny toeran-drehetra izay anapahany.
  - type: text
    content: Izaho koa, aoka hisaotra ny TOMPO!
  '3':
  - type: text
    content: Fa Izy no mamela ny heloko rehetra
  - type: text
    content: ary manasitrana ny aretiko rehetra.
  '4':
  - type: text
    content: Avotany tsy ho any an-davaka ny aiko;
  - type: text
    content: rakofany fitiavana sy indrafo aho.
  '5':
  - type: text
    content: Fenoiny fahasambarana ny fiainako,
  - type: text
    content: ka tanora sy matanjaka toa voromahery aho.
  '6':
  - type: text
    content: Omen’ny TOMPO rariny sy hitsiny
  - type: text
    content: izay rehetra ampahorîna.
  '7':
  - type: text
    content: Efa nampahafantatra ny fikasany tamin’i Mosesy Izy
  - type: text
    content: ary ny asany mahery tamin’ny vahoaka israelita.
  '8':
  - type: text
    content: Mpamindrafo sy mpiantra ny TOMPO,
  - type: text
    content: tsy mora tezitra ary be fitiavana
  - type: note
    content: Jereo Eks 34.6; Sal 86.15; 145.8; Jak 5.11.
  - type: text
    content: .
  '9':
  - type: text
    content: Tsy mba mandevilevy lalandava Izy,
  - type: text
    content: tsy mitahiry fahatezerana mandrakizay.
