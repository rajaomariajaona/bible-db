verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY FAHATELO
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (Salamo 73–89)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Na dia toa mahomby aza ny olon-dratsy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Asafa
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Asafa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 50.1 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara mihitsy Andriamanitra amin’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia amin’izay rehetra madio fo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho izany, na dia ny vahoakan’Andriamanitra aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lasa mirona mankany amin’ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary migoka ny teniny toa rano fisotro.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy izy hoe: «Tsy mahalala na inona na inona Andriamanitra;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy mahalala ny ataontsika ilay Avo Indrindra.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jereo ireny olon-dratsy ireny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mahomby mandrakariva, mitombo harena.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hay very maina izany ny nanadiovako ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanasako ny tanako ho tsy manan-tsiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 26.6.
      marker-yv: yv-n
    - type: text
      text: '!'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Voakapoka tontolo andro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary faizina isa-maraina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Raha izay aho no tapa-kevitra hiteny tahaka azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho lasa mpamadika an’ireo anisan’ny zanakao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nieritreritra aho ka niezaka hahatakatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kinanjo sarotra tamiko ny hahita mazava,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'mandra-piditro tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasinao
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahatakarako ny anjara miandry ireo olon-dratsy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hay ve ka napetrakao amin’ny kisilasila izy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanjeranao azy any amin’ny faharavana!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Oadray! Fongana indray mipi-maso izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: levona matin’ny horohoro tampoka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Kanefa saika nibolisatra ny tongotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kely foana dia solafaka ny diako.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tompo ô, rehefa mifoha homba ahy Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho levona ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ahalevonan’ny nofin’ny olona rehefa taitra izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fony aho feno alahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tohina mafy tato anatiko,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: dia ketrina aho fa tsy nahalala na inona na inona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, toy ny biby tsy manan-tsaina aho teo anatrehanao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanefa niaraka taminao mandrakariva aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary notantananao tamin’ny tanako ankavanana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny torohevitrao no itarihanao ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo aho dia horaisinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho any amin’ny voninahitrao.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Any an-danitra, iza moa no ahy afa-tsy Ianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Etỳ an-tany, inona indray no irîko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa efa manana Anao aho?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mety hihareraka ny nofoko sy ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Ianao kosa, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no aroko sy anjarako mandrakizay.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indro very izay mihataka aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aringanao izay rehetra mandao Anao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa izaho kosa, ny mahasambatra ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ho eo akaikinao, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao Tompo ANDRIANANAHARY no nataoko fialofana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahazoako manambara ny asa rehetra vitanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa nialona ny mpaniratsira aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha nahita ny fahombiazan’ny olon-dratsy,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: satria tsy nisy mahory azy mandra-pahafatiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa sady vaventy izy no matavy koa.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mba mahakasika azy akory ny fahorian’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba voakapoka miaraka amin’ny hafa izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fireharehana no iambozonany toy ny rojo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny herisetra no itafiany toy ny lamba.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny masony mila ho difotry ny taviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa tazana eo tsara izay kendren’ny fony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Maneso izy sady miresaka zava-doza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mirehareha erỳ miresaka famoretana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Misoka-bava hamely an’Andriamanitra any an-danitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manao teny manodoka mahatety ny tany.
