document_id: PSA.73,396
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHATELO
  - type: heading
    content: (Salamo 73–89)
  - type: heading
    content: SALAMO Na dia toa mahomby aza ny olon-dratsy
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Asafa
  - type: text
    content: ' '
  - type: note
    content: 'Asafa: jereo Sal 50.1 sy nta.'
  - type: text
    content: .
  - type: text
    content: Tsara mihitsy Andriamanitra amin’i Israely,
  - type: text
    content: dia amin’izay rehetra madio fo.
  '10':
  - type: text
    content: Noho izany, na dia ny vahoakan’Andriamanitra aza
  - type: text
    content: dia lasa mirona mankany amin’ireo
  - type: text
    content: ary migoka ny teniny toa rano fisotro.
  '11':
  - type: text
    content: 'Hoy izy hoe: «Tsy mahalala na inona na inona Andriamanitra;'
  - type: text
    content: tsy mahalala ny ataontsika ilay Avo Indrindra.»
  '12':
  - type: text
    content: 'Jereo ireny olon-dratsy ireny:'
  - type: text
    content: mahomby mandrakariva, mitombo harena.
  '13':
  - type: text
    content: Hay very maina izany ny nanadiovako ny foko
  - type: text
    content: sy nanasako ny tanako ho tsy manan-tsiny
  - type: note
    content: Jereo Sal 26.6.
  - type: text
    content: '!'
  '14':
  - type: text
    content: Voakapoka tontolo andro aho
  - type: text
    content: ary faizina isa-maraina.
  '15':
  - type: text
    content: Raha izay aho no tapa-kevitra hiteny tahaka azy,
  - type: text
    content: dia ho lasa mpamadika an’ireo anisan’ny zanakao.
  '16':
  - type: text
    content: Nieritreritra aho ka niezaka hahatakatra;
  - type: text
    content: kinanjo sarotra tamiko ny hahita mazava,
  '17':
  - type: text
    content: 'mandra-piditro tao amin’ny '
  - type: text
    content: Toeramasinao
  - type: text
    content: ','
  - type: text
    content: ka nahatakarako ny anjara miandry ireo olon-dratsy.
  '18':
  - type: text
    content: Hay ve ka napetrakao amin’ny kisilasila izy ireny
  - type: text
    content: mba hanjeranao azy any amin’ny faharavana!
  '19':
  - type: text
    content: Oadray! Fongana indray mipi-maso izy,
  - type: text
    content: levona matin’ny horohoro tampoka.
  '2':
  - type: text
    content: Kanefa saika nibolisatra ny tongotro,
  - type: text
    content: kely foana dia solafaka ny diako.
  '20':
  - type: text
    content: Tompo ô, rehefa mifoha homba ahy Ianao,
  - type: text
    content: dia ho levona ireny
  - type: text
    content: toy ny ahalevonan’ny nofin’ny olona rehefa taitra izy.
  '21':
  - type: text
    content: Fony aho feno alahelo
  - type: text
    content: ka tohina mafy tato anatiko,
  '22':
  - type: text
    content: dia ketrina aho fa tsy nahalala na inona na inona;
  - type: text
    content: eny, toy ny biby tsy manan-tsaina aho teo anatrehanao.
  '23':
  - type: text
    content: Kanefa niaraka taminao mandrakariva aho,
  - type: text
    content: ary notantananao tamin’ny tanako ankavanana.
  '24':
  - type: text
    content: Ny torohevitrao no itarihanao ahy;
  - type: text
    content: avy eo aho dia horaisinao
  - type: text
    content: ho any amin’ny voninahitrao.
  '25':
  - type: text
    content: Any an-danitra, iza moa no ahy afa-tsy Ianao?
  - type: text
    content: Etỳ an-tany, inona indray no irîko
  - type: text
    content: fa efa manana Anao aho?
  '26':
  - type: text
    content: Mety hihareraka ny nofoko sy ny foko,
  - type: text
    content: fa Ianao kosa, Andriamanitra ô,
  - type: text
    content: no aroko sy anjarako mandrakizay.
  '27':
  - type: text
    content: Indro very izay mihataka aminao
  - type: text
    content: ary aringanao izay rehetra mandao Anao.
  '28':
  - type: text
    content: Fa izaho kosa, ny mahasambatra ahy
  - type: text
    content: dia ny ho eo akaikinao, Andriamanitra ô;
  - type: text
    content: Ianao Tompo ANDRIANANAHARY no nataoko fialofana
  - type: text
    content: hahazoako manambara ny asa rehetra vitanao.
  '3':
  - type: text
    content: Fa nialona ny mpaniratsira aho
  - type: text
    content: raha nahita ny fahombiazan’ny olon-dratsy,
  '4':
  - type: text
    content: satria tsy nisy mahory azy mandra-pahafatiny
  - type: text
    content: fa sady vaventy izy no matavy koa.
  '5':
  - type: text
    content: Tsy mba mahakasika azy akory ny fahorian’ny olona;
  - type: text
    content: ary tsy mba voakapoka miaraka amin’ny hafa izy.
  '6':
  - type: text
    content: Ny fireharehana no iambozonany toy ny rojo;
  - type: text
    content: ary ny herisetra no itafiany toy ny lamba.
  '7':
  - type: text
    content: Ny masony mila ho difotry ny taviny,
  - type: text
    content: nefa tazana eo tsara izay kendren’ny fony.
  '8':
  - type: text
    content: Maneso izy sady miresaka zava-doza,
  - type: text
    content: ary mirehareha erỳ miresaka famoretana.
  '9':
  - type: text
    content: Misoka-bava hamely an’Andriamanitra any an-danitra izy
  - type: text
    content: ary manao teny manodoka mahatety ny tany.
