document_id: DEU.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LAHATENY VOALOHANY NATAON’I MOSESY
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ireto avy no lahateny nataon’i Mosesy tamin’ny Israelita rehetra, fony ireo mbola tsy niampita ny ony Jôrdàna. Tanatin’ny taniefitr’i Harabà, teo akaikin’i Sofa, ny Israelita tamin’izay, dia tanelanelan’i Paràna an-kilany ary Tôfela sy Labàna mbamin’i Hatserôta sy Dizahaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Sofa, Tôfela, Labàna, Hatserôta, Dizahaba:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanàna samy tsy fantatra mazava ny toerana misy azy.
    marker-yv: yv-n
  - type: text
    text: ' an-daniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(Lalana 11 andro i Kadesy-Barnea raha miala ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' ka mihazo ny lalana mankany amin’ny tendrombohitra Sehîra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kadesy-Barnea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 13.26 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sehîra:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' anaran-kafa iantsoana ny faritany Edôma.'
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny taona fahefapolo nialana an’i Ejipta, nony andro voalohan’ny volana faha-11, dia niteny tamin’ny Israelita i Mosesy, araka izay rehetra nodidian’ny TOMPO holazainy aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Taorian’ny nandresen’i Mosesy an’i Sihôna, ilay mpanjakan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' sady nonina tao Hesbôna, sy taorian’ny nandreseny tao Edrehỳ an’i Hôga, ilay mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' sady nonina tao Hastarôta'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jereo Nom 21.21-35. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–Mosesy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (mpisolo anarana fotsiny no ao amin’ny RM etoana). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–resiny tao Edrehỳ... Hastarôta:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ireo dkt tranainy dia ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: resiny i Hôga mpanjakan’i Basàna, ilay nonina tao Hastarôta na tao Edrehỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; ampit Jos 12.4.
    marker-yv: yv-n
  - type: text
    text: ', no nitrangan’izany.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nomen’Andriamanitra baiko ny Israelita hanohy ny diany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tany an-dafy atsinanan’i Jôrdàna, tao amin’ny faritr’i Môaba, no nanomboka nanazava ny lalànan’Andriamanitra i Mosesy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '–Fony teo amin’ny tendrombohitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' isika, dia nitenenan’ny TOMPO Andriamanitsika hoe: «Ela izay nitoeranareo teto amin’ity tendrombohitra ity izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mihodîna ianareo, ary mandehana mankany amin’ny tendrombohitra fonenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: '; mandehana mankany amin’ny faritra manodidina fonenan’ny Kanahanita, dia ny lemak’i Harabà, ny faritra havoana, ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ', ny Negeba, mbamin’ny moron-tsiraka; mandehana mankany Libano ka hatrany amin’ny ony lehibe, dia ny ony Eofrata'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jos 1.4 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indro efa natolotro eo anoloanareo io tany io; idiro ka alao ho fanananareo izany fa efa nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo mba homena azy sy ny taranany mandimby azy.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanendry olona ho mpitsara i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izaho Mosesy, tamin’izany andro izany, dia niteny taminareo hoe: «Tsy zakako samirery ny mitondra anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa nahamaro anareo ny TOMPO Andriamanitrareo, ka indro ankehitriny efa maro toy ny kintana eny amin’ny habakabaka ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny TOMPO Andriamanitry ny razambenareo anie hampitombo anareo ho arivo toraka izao ka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hitahy
  - type: text
    text: ' anareo, araka izay efa nampanantenainy anareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa hataoko ahoana no fitondra samirery ny olanareo sy ny fitakianareo ary ny adiadinareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa tolory lehilahy hendry sy manan-tsaina ary hita toetra eo amin’ny fokonareo aho, dia hataoko ho lehibenareo izy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary namaly ahy ianareo ka nanao hoe: «Tsara izany soso-kevitra arosonao hotanterahina izany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nalaiko ny lohandohan’ny fokonareo, dia lehilahy hendry sady hita toetra, ka notendreko ho lehibenareo; tao ny mpifehy arivo sy mpifehy zato mbamin’ny mpifehy dimampolo sy mpifehy folo, ary tao ny mpandraharaha amin’ny fokonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izay koa aho no namoaka didy ho an’ny mpitsaranareo ka nanao hoe: «Henoy ny fifanolanan’ny mpiray firenena aminareo, ka tsarao ara-drariny izany, na ho azy samy Israelita, na ho an’ny Israelita sy ny vahiny valovotaka eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mizaha tavan’olona amin’ny fitsarana, fa henoy na ny kely na ny lehibe; aza matahotra olona akory, fa an’Andriamanitra ny fitsarana.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eny, tamin’izay aho no efa namoaka didy ho anareo ny amin’ny zavatra rehetra tokony hataonareo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tsy fanoavan’ny Israelita an’Andriamanitra fony ireo mby akaikin’ny tany nampanantenaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niala tany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hôreba
  - type: text
    text: ' isika, araka ny nandidian’ny TOMPO Andriamanitsika; ary nandeha isika namaky ilay taniefitra midadasika sy mahatahotra, izay hitanareo teny an-dalana mankany amin’ny faritra havoana onenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: . Rehefa mby tao Kadesy-Barnea isika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 19-46:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 13.1–14.45. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Kadesy-Barnea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Nom 13.26 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia hoy aho taminareo; «Efa tonga eto amin’ny faritra havoana onenan’ny Amôrita ianareo, faritra izay omen’ny TOMPO Andriamanitsika ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Indro ataon’ny TOMPO Andriamanitrareo eo anoloanareo izany tany izany; iakaro izy ka alao ho fanananareo, araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo. Aza matahotra na mivadi-po akory!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nohatoninareo rehetra aho ka nilazanareo hoe: «Aoka isika haniraka olona hialoha antsika mba hisafo ny tany; dia hanao tatitra ho antsika ireo ka hilaza ny lalana tokony hiakarantsika sy ny tanàna izay hivantanantsika.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sitrako izany teny izany, ka dia nifidy 12 lahy teo aminareo aho, iray avy isam-poko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary niainga ireo ka niakatra ny faritra havoana, dia tonga tao amin’ny hadilalana Eskôla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 13.23 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ary nisafo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nangalany ny vokatry ny tany ka nentiny nidina tamintsika; ary izao no tatitra nataony ho antsika: «Soa ny tany omen’ny TOMPO Andriamanitsika ho antsika.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa tsy nety niakatra ianareo, fa nandà ny tenin’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nimonomonona tao an-dainareo ianareo ka nanao hoe: «Noho isika halan’ny TOMPO no nitondrany antsika hiala tany Ejipta. Te hanolotra antsika eo an-tanan’ny Amôrita Izy mba handringanana antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aiza ity hiakarantsika? Mpiray firenena amintsika no efa nanaketraka ny fontsika tamin’ny nanaovany hoe: Vaventy sy ranjanana noho isika ny olona monina ao; ny tanàna dia lehibe sady misy manda manakatra ny lanitra; ary efa hitanay tao aza ny taranak’i Hanàka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 13.22 sy nta.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy aho taminareo: «Aza manahy, ary aza matahotra azy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny TOMPO Andriamanitrareo, Ilay mandeha eo alohanareo, no hiady ho anareo, araka izay rehetra nataony ho anareo teo imasonareo tany Ejipta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy tatỳ an-taniefitra; efa hitanareo fa nentin’ny TOMPO Andriamanitrareo tahaka ny fitòndran’ny olona ny zanany ianareo, tany amin’ny lalana rehetra nalehanareo, mandra-pahatonganareo amin’ity toerana ity.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary, tamin’izany toe-javatra izany, dia tsy ninoanareo ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Kanefa Izy no nandeha teo alohanareo teny an-dalana mba hitady toerana hitobianareo; ka ny afo nony alina ary ny rahona nony antoandro no nisehoany hanoro izay lalana nety halehanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ren’ny TOMPO ny fimonomononanareo ka tezitra Izy sady nianiana hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Tsy hisy mihitsy amin’ireto olona ratsy fanahy ireto hahita ilay tany soa nianianako homena ny razany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Tsy hisy hahita azy afa-tsy i Kaleba, zanakalahin’i Jefone; ary dia izy sy ireo zanany no homeko ny faritany izay efa nodiaviny, satria nanaraka tanteraka Ahy TOMPO i Kaleba.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ianareo ihany koa no nitezeran’ny TOMPO ahy, ka nanaovany hoe: «Ianao koa tsy hiditra amin’io tany io; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fa i Josoa mpanomponao, i Josoa zanakalahin’i Nona, no hiditra any. Koa ampaherezo izy, fa izy no hampahazo ny Israelita izany tany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ny zanakareo nolazainareo fa ho babom-pahavalo, eny, ny zanakareo tsy mbola mahay manavaka izay tsara sy ratsy amin’izao andro izao, dia ireo no hiditra izany tany izany, ireo no homeko azy, ireo no hanana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ianareo kosa, miverena ka mizora mankany an-taniefitra mihazo ny lalana ho any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ranomasin’ny Volotara
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ho setrin’izany kosa dia hoy ianareo tamiko: «Efa nanota tamin’ny TOMPO izahay! Hiakatra ihany izahay ka hiady, araka izay rehetra nandidian’ny TOMPO Andriamanitray anay.» Dia samy nivonona tamin’ny fiadiany avy ianareo rehetra, ka nataonareo ho mora ny hananika izany faritra havoana izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ka nataonareo ho mora ny hananika...: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary tapa-kevitra ny hananika...
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa hoy ny TOMPO tamiko: «Ilazao ireo mba tsy hiakatra ary tsy hiady, satria tsy eo afovoany Aho, ka aoka izy tsy hanao izay handresen’ny fahavalony azy!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia niteny taminareo aho fa tsy nohenoinareo; nolavinareo ny tenin’ny TOMPO, ary nanao sahisahy ianareo ka nananika iny faritra havoana iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Kanjo niainga hiady aminareo ny Amôrita izay nonina tamin’izany faritra havoana izany, dia nandresy anareo tao Sehîra ka tahaka ny andian-drenitantely ireo no nanenjika anareo hatrany Hôrmà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.44 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sehîra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo and 2 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hôrmà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Nom 14.45 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia niverina ianareo, ka nitomany teo anatrehan’ny TOMPO; nefa tsy nihaino ny feonareo IZY na nanongilan-tsofina taminareo. '
  - type: usfm
    marker: vlbl
