document_id: DEU.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: LAHATENY VOALOHANY NATAON’I MOSESY
  - type: text
    content: Ireto avy no lahateny nataon’i Mosesy tamin’ny Israelita rehetra, fony ireo mbola tsy niampita ny ony Jôrdàna. Tanatin’ny taniefitr’i Harabà, teo akaikin’i Sofa, ny Israelita tamin’izay, dia tanelanelan’i Paràna an-kilany ary Tôfela sy Labàna mbamin’i Hatserôta sy Dizahaba
  - type: note
    content: 'Sofa, Tôfela, Labàna, Hatserôta, Dizahaba: tanàna samy tsy fantatra mazava ny toerana misy azy.'
  - type: text
    content: ' an-daniny. '
  '10':
  - type: text
    content: 'Efa nahamaro anareo ny TOMPO Andriamanitrareo, ka indro ankehitriny efa maro toy ny kintana eny amin’ny habakabaka ianareo. '
  '11':
  - type: text
    content: 'Ny TOMPO Andriamanitry ny razambenareo anie hampitombo anareo ho arivo toraka izao ka '
  - type: text
    content: hitahy
  - type: text
    content: ' anareo, araka izay efa nampanantenainy anareo! '
  '12':
  - type: text
    content: 'Kanefa hataoko ahoana no fitondra samirery ny olanareo sy ny fitakianareo ary ny adiadinareo? '
  '13':
  - type: text
    content: 'Koa tolory lehilahy hendry sy manan-tsaina ary hita toetra eo amin’ny fokonareo aho, dia hataoko ho lehibenareo izy.» '
  '14':
  - type: text
    content: 'Ary namaly ahy ianareo ka nanao hoe: «Tsara izany soso-kevitra arosonao hotanterahina izany.» '
  '15':
  - type: text
    content: 'Dia nalaiko ny lohandohan’ny fokonareo, dia lehilahy hendry sady hita toetra, ka notendreko ho lehibenareo; tao ny mpifehy arivo sy mpifehy zato mbamin’ny mpifehy dimampolo sy mpifehy folo, ary tao ny mpandraharaha amin’ny fokonareo. '
  '16':
  - type: text
    content: 'Tamin’izay koa aho no namoaka didy ho an’ny mpitsaranareo ka nanao hoe: «Henoy ny fifanolanan’ny mpiray firenena aminareo, ka tsarao ara-drariny izany, na ho azy samy Israelita, na ho an’ny Israelita sy ny vahiny valovotaka eo aminy. '
  '17':
  - type: text
    content: 'Aza mizaha tavan’olona amin’ny fitsarana, fa henoy na ny kely na ny lehibe; aza matahotra olona akory, fa an’Andriamanitra ny fitsarana.» '
  '18':
  - type: text
    content: Eny, tamin’izay aho no efa namoaka didy ho anareo ny amin’ny zavatra rehetra tokony hataonareo.
  - type: heading
    content: Tsy fanoavan’ny Israelita an’Andriamanitra fony ireo mby akaikin’ny tany nampanantenaina
  '19':
  - type: text
    content: 'Dia niala tany '
  - type: text
    content: Hôreba
  - type: text
    content: ' isika, araka ny nandidian’ny TOMPO Andriamanitsika; ary nandeha isika namaky ilay taniefitra midadasika sy mahatahotra, izay hitanareo teny an-dalana mankany amin’ny faritra havoana onenan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: . Rehefa mby tao Kadesy-Barnea isika
  - type: note
    content: 'And 19-46: jereo Nom 13.1–14.45. –Kadesy-Barnea: jereo Nom 13.26 sy nta.'
  - type: text
    content: ', '
  '2':
  - type: text
    content: '(Lalana 11 andro i Kadesy-Barnea raha miala ny tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ' ka mihazo ny lalana mankany amin’ny tendrombohitra Sehîra'
  - type: note
    content: 'Kadesy-Barnea: jereo Nom 13.26 sy nta. –Sehîra: anaran-kafa iantsoana ny faritany Edôma.'
  - type: text
    content: '). '
  '20':
  - type: text
    content: 'dia hoy aho taminareo; «Efa tonga eto amin’ny faritra havoana onenan’ny Amôrita ianareo, faritra izay omen’ny TOMPO Andriamanitsika ho antsika. '
  '21':
  - type: text
    content: Indro ataon’ny TOMPO Andriamanitrareo eo anoloanareo izany tany izany; iakaro izy ka alao ho fanananareo, araka izay nampanantenain’ny TOMPO Andriamanitry ny razambenareo taminareo. Aza matahotra na mivadi-po akory!»
  '22':
  - type: text
    content: 'Dia nohatoninareo rehetra aho ka nilazanareo hoe: «Aoka isika haniraka olona hialoha antsika mba hisafo ny tany; dia hanao tatitra ho antsika ireo ka hilaza ny lalana tokony hiakarantsika sy ny tanàna izay hivantanantsika.» '
  '23':
  - type: text
    content: 'Sitrako izany teny izany, ka dia nifidy 12 lahy teo aminareo aho, iray avy isam-poko. '
  '24':
  - type: text
    content: Ary niainga ireo ka niakatra ny faritra havoana, dia tonga tao amin’ny hadilalana Eskôla
  - type: note
    content: Jereo Nom 13.23 sy nta.
  - type: text
    content: ' ary nisafo azy. '
  '25':
  - type: text
    content: 'Nangalany ny vokatry ny tany ka nentiny nidina tamintsika; ary izao no tatitra nataony ho antsika: «Soa ny tany omen’ny TOMPO Andriamanitsika ho antsika.» '
  '26':
  - type: text
    content: 'Kanefa tsy nety niakatra ianareo, fa nandà ny tenin’ny TOMPO Andriamanitrareo. '
  '27':
  - type: text
    content: 'Nimonomonona tao an-dainareo ianareo ka nanao hoe: «Noho isika halan’ny TOMPO no nitondrany antsika hiala tany Ejipta. Te hanolotra antsika eo an-tanan’ny Amôrita Izy mba handringanana antsika. '
  '28':
  - type: text
    content: 'Aiza ity hiakarantsika? Mpiray firenena amintsika no efa nanaketraka ny fontsika tamin’ny nanaovany hoe: Vaventy sy ranjanana noho isika ny olona monina ao; ny tanàna dia lehibe sady misy manda manakatra ny lanitra; ary efa hitanay tao aza ny taranak’i Hanàka'
  - type: note
    content: Jereo Nom 13.22 sy nta.
  - type: text
    content: '!»'
  '29':
  - type: text
    content: 'Dia hoy aho taminareo: «Aza manahy, ary aza matahotra azy! '
  '3':
  - type: text
    content: 'Tamin’ny taona fahefapolo nialana an’i Ejipta, nony andro voalohan’ny volana faha-11, dia niteny tamin’ny Israelita i Mosesy, araka izay rehetra nodidian’ny TOMPO holazainy aminy. '
  '30':
  - type: text
    content: 'Ny TOMPO Andriamanitrareo, Ilay mandeha eo alohanareo, no hiady ho anareo, araka izay rehetra nataony ho anareo teo imasonareo tany Ejipta '
  '31':
  - type: text
    content: 'sy tatỳ an-taniefitra; efa hitanareo fa nentin’ny TOMPO Andriamanitrareo tahaka ny fitòndran’ny olona ny zanany ianareo, tany amin’ny lalana rehetra nalehanareo, mandra-pahatonganareo amin’ity toerana ity.» '
  '32':
  - type: text
    content: 'Ary, tamin’izany toe-javatra izany, dia tsy ninoanareo ny TOMPO Andriamanitrareo. '
  '33':
  - type: text
    content: Kanefa Izy no nandeha teo alohanareo teny an-dalana mba hitady toerana hitobianareo; ka ny afo nony alina ary ny rahona nony antoandro no nisehoany hanoro izay lalana nety halehanareo.
  '34':
  - type: text
    content: 'Ren’ny TOMPO ny fimonomononanareo ka tezitra Izy sady nianiana hoe: '
  '35':
  - type: text
    content: '«Tsy hisy mihitsy amin’ireto olona ratsy fanahy ireto hahita ilay tany soa nianianako homena ny razany. '
  '36':
  - type: text
    content: Tsy hisy hahita azy afa-tsy i Kaleba, zanakalahin’i Jefone; ary dia izy sy ireo zanany no homeko ny faritany izay efa nodiaviny, satria nanaraka tanteraka Ahy TOMPO i Kaleba.»
  '37':
  - type: text
    content: 'Ianareo ihany koa no nitezeran’ny TOMPO ahy, ka nanaovany hoe: «Ianao koa tsy hiditra amin’io tany io; '
  '38':
  - type: text
    content: 'fa i Josoa mpanomponao, i Josoa zanakalahin’i Nona, no hiditra any. Koa ampaherezo izy, fa izy no hampahazo ny Israelita izany tany izany. '
  '39':
  - type: text
    content: 'Ny zanakareo nolazainareo fa ho babom-pahavalo, eny, ny zanakareo tsy mbola mahay manavaka izay tsara sy ratsy amin’izao andro izao, dia ireo no hiditra izany tany izany, ireo no homeko azy, ireo no hanana azy. '
  '4':
  - type: text
    content: 'Taorian’ny nandresen’i Mosesy an’i Sihôna, ilay mpanjakan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sady nonina tao Hesbôna, sy taorian’ny nandreseny tao Edrehỳ an’i Hôga, ilay mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: ' sady nonina tao Hastarôta'
  - type: note
    content: 'Jereo Nom 21.21-35. –Mosesy: dkt hafa ny Tompo (mpisolo anarana fotsiny no ao amin’ny RM etoana). –resiny tao Edrehỳ... Hastarôta: ireo dkt tranainy dia ahitana hoe resiny i Hôga mpanjakan’i Basàna, ilay nonina tao Hastarôta na tao Edrehỳ; ampit Jos 12.4.'
  - type: text
    content: ', no nitrangan’izany.'
  - type: heading
    content: Nomen’Andriamanitra baiko ny Israelita hanohy ny diany
  '40':
  - type: text
    content: 'Ianareo kosa, miverena ka mizora mankany an-taniefitra mihazo ny lalana ho any amin’ny '
  - type: text
    content: Ranomasin’ny Volotara
  - type: text
    content: .»
  '41':
  - type: text
    content: 'Ho setrin’izany kosa dia hoy ianareo tamiko: «Efa nanota tamin’ny TOMPO izahay! Hiakatra ihany izahay ka hiady, araka izay rehetra nandidian’ny TOMPO Andriamanitray anay.» Dia samy nivonona tamin’ny fiadiany avy ianareo rehetra, ka nataonareo ho mora ny hananika izany faritra havoana izany'
  - type: note
    content: 'ka nataonareo ho mora ny hananika...: dkt hafa ary tapa-kevitra ny hananika...'
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Fa hoy ny TOMPO tamiko: «Ilazao ireo mba tsy hiakatra ary tsy hiady, satria tsy eo afovoany Aho, ka aoka izy tsy hanao izay handresen’ny fahavalony azy!» '
  '43':
  - type: text
    content: 'Dia niteny taminareo aho fa tsy nohenoinareo; nolavinareo ny tenin’ny TOMPO, ary nanao sahisahy ianareo ka nananika iny faritra havoana iny. '
  '44':
  - type: text
    content: Kanjo niainga hiady aminareo ny Amôrita izay nonina tamin’izany faritra havoana izany, dia nandresy anareo tao Sehîra ka tahaka ny andian-drenitantely ireo no nanenjika anareo hatrany Hôrmà
  - type: note
    content: 'Sehîra: jereo and 2 sy nta. –Hôrmà: jereo Nom 14.45 sy nta.'
  - type: text
    content: '. '
  '45':
  - type: text
    content: 'Dia niverina ianareo, ka nitomany teo anatrehan’ny TOMPO; nefa tsy nihaino ny feonareo IZY na nanongilan-tsofina taminareo. '
  '46':
  - type: text
    content: Ary nitoetra ela tao Kadesy-Barnea ianareo, araka izay fotoana tokony ho nitoeranareo tao.
  '5':
  - type: text
    content: 'Tany an-dafy atsinanan’i Jôrdàna, tao amin’ny faritr’i Môaba, no nanomboka nanazava ny lalànan’Andriamanitra i Mosesy ka nanao hoe:'
  '6':
  - type: text
    content: '–Fony teo amin’ny tendrombohitra '
  - type: text
    content: Hôreba
  - type: text
    content: ' isika, dia nitenenan’ny TOMPO Andriamanitsika hoe: «Ela izay nitoeranareo teto amin’ity tendrombohitra ity izay. '
  '7':
  - type: text
    content: 'Mihodîna ianareo, ary mandehana mankany amin’ny tendrombohitra fonenan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: '; mandehana mankany amin’ny faritra manodidina fonenan’ny Kanahanita, dia ny lemak’i Harabà, ny faritra havoana, ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ', ny Negeba, mbamin’ny moron-tsiraka; mandehana mankany Libano ka hatrany amin’ny ony lehibe, dia ny ony Eofrata'
  - type: note
    content: Jereo Jos 1.4 sy nta.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Indro efa natolotro eo anoloanareo io tany io; idiro ka alao ho fanananareo izany fa efa nianianako tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo mba homena azy sy ny taranany mandimby azy.»
  - type: heading
    content: Nanendry olona ho mpitsara i Mosesy
  '9':
  - type: text
    content: 'Izaho Mosesy, tamin’izany andro izany, dia niteny taminareo hoe: «Tsy zakako samirery ny mitondra anareo. '
