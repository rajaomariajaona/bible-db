segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia niainga avy teo amin’ny lemak’i Môaba i Mosesy ka niakatra nankany amin’ny tendrombohitra Nebao, eo an-tampon’i Pisgà, izay tandrifin’i Jerikao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jerikao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tanàna ao anatin’ny lohasahan’i Jôrdàna eo amin’ny 12 kilaometatra eo ho eo, avaratry ny Ranomasina Maty. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Ny tendrombohitra Nebao
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (izay ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pisgà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no toa isan’ny faratampony indrindra) dia ao anatin’ilay tangoron-tendrombohitra izay mandondona eo atsinanan’ny Ranomasina Maty. –Ny faritra voavisavisa eo amin’ny and 3 dia miainga avy any avaratra ka mipaka hatraty atsimo andrefana ary miafara eo am-pototry ny tendrombohitra Nebao.'
    marker-yv: yv-n
  - type: text
    text: '. Ary nasehon’ny TOMPO azy avokoa ilay tany: dia ny faritr’i Gilehada tafapaka hatrany Dana; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ny faritr’i Naftalỳ manontolo; ny tanin-dry i Efraîma sy i Manase; ny tanin’i Joda manontolo tafapaka hatrany amin’ny Ranomasina Mediteranea; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ny faritr’i Negeba; ary, ao amin’ny lohasahan’i Jôrdàna, ny faritanin’i Jerikao (tanàna be rofia), faritany izay tafapaka hatrany Tsôhara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Io tany io no nampanantenaiko ombàm-pianianana tamin’i Abrahama sy i Itsehàka ary i Jakôba, fony ireo nilazako hoe: «Homeko ny taranakareo ity tany ity'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 12.7; 25.3; 28.13.
    marker-yv: yv-n
  - type: text
    text: .» Nataoko nahita maso azy ianao, nefa tsy ho tafita eny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Teo no nahafatesan’i Mosesy, ilay mpanompon’ny TOMPO, dia teo amin’ny tany Môaba araka ny tenin’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nalevin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Nandevenan’Andriamanitra azy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nandevenana azy.
    marker-yv: yv-n
  - type: text
    text: teo an-dohasaha, tao amin’ny tany Môaba, tandrifin’i Bety-Pehôra izy; ka tsy misy olona mahalala ny fasany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa 120 taona i Mosesy no maty; ary tsy pahina ny masony na nihena ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nitomanian’ny Israelita teo amin’ny lemak’i Môaba i Mosesy, nandritra ny telopolo andro nanatontosana ny fisaonana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I Josoa, zanakalahin’i Nona, dia feno fanahy fahendrena, satria efa nametrahan’i Mosesy tanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 27.18-23
    marker-yv: yv-n
  - type: text
    text: ; ka nihaino azy ny Israelita sady nanatanteraka ny didy nampitain’ny TOMPO tamin’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Teo amin’i Israely, dia tsy mba nisy intsony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' tahaka an’i Mosesy, izay fantatry ny TOMPO nifanatrika'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 33.11.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy manan-tsahala i Mosesy satria izy no nirahin’ny TOMPO tany Ejipta hanao famantarana sy zava-mahagaga isan-karazany teo anatrehan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' sy ny tandapany ary ny taniny manontolo; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary tanana ombàn-kery no nanaovan’i Mosesy an’ireny zavatra goavana sy mampahatahotra isan-karazany ireny, teo imason’ny Israelita rehetra.
