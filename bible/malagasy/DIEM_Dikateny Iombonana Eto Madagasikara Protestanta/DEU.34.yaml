document_id: DEU.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Mosesy
  - type: text
    content: Dia niainga avy teo amin’ny lemak’i Môaba i Mosesy ka niakatra nankany amin’ny tendrombohitra Nebao, eo an-tampon’i Pisgà, izay tandrifin’i Jerikao
  - type: note
    content: 'Jerikao: tanàna ao anatin’ny lohasahan’i Jôrdàna eo amin’ny 12 kilaometatra eo ho eo, avaratry ny Ranomasina Maty. –Ny tendrombohitra Nebao (izay ny Pisgà no toa isan’ny faratampony indrindra) dia ao anatin’ilay tangoron-tendrombohitra izay mandondona eo atsinanan’ny Ranomasina Maty. –Ny faritra voavisavisa eo amin’ny and 3 dia miainga avy any avaratra ka mipaka hatraty atsimo andrefana ary miafara eo am-pototry ny tendrombohitra Nebao.'
  - type: text
    content: '. Ary nasehon’ny TOMPO azy avokoa ilay tany: dia ny faritr’i Gilehada tafapaka hatrany Dana; '
  '10':
  - type: text
    content: 'Teo amin’i Israely, dia tsy mba nisy intsony '
  - type: text
    content: mpaminany
  - type: text
    content: ' tahaka an’i Mosesy, izay fantatry ny TOMPO nifanatrika'
  - type: note
    content: Jereo Eks 33.11.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Tsy manan-tsahala i Mosesy satria izy no nirahin’ny TOMPO tany Ejipta hanao famantarana sy zava-mahagaga isan-karazany teo anatrehan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sy ny tandapany ary ny taniny manontolo; '
  '12':
  - type: text
    content: ary tanana ombàn-kery no nanaovan’i Mosesy an’ireny zavatra goavana sy mampahatahotra isan-karazany ireny, teo imason’ny Israelita rehetra.
  '2':
  - type: text
    content: 'ny faritr’i Naftalỳ manontolo; ny tanin-dry i Efraîma sy i Manase; ny tanin’i Joda manontolo tafapaka hatrany amin’ny Ranomasina Mediteranea; '
  '3':
  - type: text
    content: 'ny faritr’i Negeba; ary, ao amin’ny lohasahan’i Jôrdàna, ny faritanin’i Jerikao (tanàna be rofia), faritany izay tafapaka hatrany Tsôhara. '
  '4':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Io tany io no nampanantenaiko ombàm-pianianana tamin’i Abrahama sy i Itsehàka ary i Jakôba, fony ireo nilazako hoe: «Homeko ny taranakareo ity tany ity'
  - type: note
    content: Jereo Gen 12.7; 25.3; 28.13.
  - type: text
    content: .» Nataoko nahita maso azy ianao, nefa tsy ho tafita eny.
  '5':
  - type: text
    content: 'Teo no nahafatesan’i Mosesy, ilay mpanompon’ny TOMPO, dia teo amin’ny tany Môaba araka ny tenin’ny TOMPO. '
  '6':
  - type: text
    content: Ary nalevin’Andriamanitra
  - type: note
    content: Nandevenan’Andriamanitra azy na hoe nandevenana azy.
  - type: text
    content: teo an-dohasaha, tao amin’ny tany Môaba, tandrifin’i Bety-Pehôra izy; ka tsy misy olona mahalala ny fasany mandraka androany.
  '7':
  - type: text
    content: 'Efa 120 taona i Mosesy no maty; ary tsy pahina ny masony na nihena ny heriny. '
  '8':
  - type: text
    content: Nitomanian’ny Israelita teo amin’ny lemak’i Môaba i Mosesy, nandritra ny telopolo andro nanatontosana ny fisaonana azy.
  '9':
  - type: text
    content: I Josoa, zanakalahin’i Nona, dia feno fanahy fahendrena, satria efa nametrahan’i Mosesy tanana
  - type: note
    content: Jereo Nom 27.18-23
  - type: text
    content: ; ka nihaino azy ny Israelita sady nanatanteraka ny didy nampitain’ny TOMPO tamin’i Mosesy.
