  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –Ity boky kely ity dia mirakitra ny hafatra ampitaina
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: izay ny anarany ihany no mba fantatsika. Dradrain’ity boky ity ny fihetsiky ny vahoaka tao Edôma (dia ireo taranak’i Hesao) manoloana ny vahoaka Israely (dia ireo taranak’i Jakôba rahalahin’i Hesao). Niorim-ponenana tamin’iny faritra atsimo atsinanan’ny Ranomasina Maty iny ny Edômita; ary fanoherana sy fandrafiana hatrany no nasehony teo anatrehan’ny Israelita; kanefa, nony rava ny fanjakan’i Joda ary nony azon’ny Babilônianina i Jerosalema, dia nanjary nihoa-pampana mihitsy izany fihetsiky ny Edômita izany. Tsy vitan’ny hoe tsy tonga nanampy ny Israelita mpifanila faritany aminy ry zareo, fa vao mainka koa nanararaotra ny fahavoazana nanjo azy ka nisalovana ny taniny sy nandray anjara tamin’ny fandrobana an’i Jerosalema.
  - type: text
    content: Tamin’ny taona 587 tal J.K. no nahazoan’ny Babilônianina an’i Jerosalema. Ka ity bokin’i Hôbadià ity dia ampoizina ho voasoratra taoriana kelin’izany. Ambaran’ity boky ity fa hofongorana, miaraka amin’ny fahavalo hafa mpamely an’i Israely, ny vahoaka edômita; ary noho izany rahateo no itondrany hafatra fampaherezana ho an’ny Israelita. Andriamanitra no hanana ny teny farany; ary mbola ho avy Izy hitsara ny firenen-drehetra.
