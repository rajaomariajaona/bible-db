document_id: JER.38,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Natsipy tao an-dava-drano i Jeremià
  - type: text
    content: 'I Sefatià zanakalahin’i Matàna sy i Gedalià zanakalahin’i Pasehora sy i Jokaly zanakalahin’i Selemià ary i Pasehora zanakalahin’i Malkià dia samy nandre ny teny nolazain’i Jeremià tamin’ny olona rehetra nanao hoe:'
  '10':
  - type: text
    content: 'Dia nanome baiko an’i Hebeda-Melèka etiôpianina ny mpanjaka hoe:'
  - type: text
    content: –Mitondrà telopolo lahy avy eto hiaraka aminao, ka ampiakaro hiala tao an-dava-drano i Jeremià dieny mbola tsy maty.
  '11':
  - type: text
    content: 'Dia naka telopolo lahy hiaraka aminy i Hebeda-Melèka, ka nankao an-dapan’ny mpanjaka tao amin’ny efitrano fitahirizan-javatra; ary naka fitafiana rovitra sy tonta tao izy, ka nampidininy ho eo amin’i Jeremià tao an-dava-drano tamin’ny tady mahazaka. '
  '12':
  - type: text
    content: 'Ary hoy i Hebeda-Melèka etiôpianina tamin’i Jeremià hoe:'
  - type: text
    content: –Ataovy ao ambany helikao ireo vorodamba ireo ka apetraho eo ambaniny ny tady mahazaka.
  - type: text
    content: 'Rehefa nataon’i Jeremià izany, '
  '13':
  - type: text
    content: dia nosintonin’ireo ny tady mahazaka ka nakariny avy tao an-davaka i Jeremià; ary nipetraka tao an-kianjan’ny trano fiambenana izy.
  - type: heading
    content: Nanontany an’i Jeremià indray i Tsedekià mpanjaka
  '14':
  - type: text
    content: 'Ary naniraka olona haka an’i Jeremià i Tsedekià mpanjaka ka nandray azy manokana teo amin’ny fidirana fahatelo mankao an-tranon’ny TOMPO, sady nanao taminy hoe:'
  - type: text
    content: –Hanontany zavatra aminao aho, ka aza misy afenina amiko.
  '15':
  - type: text
    content: 'Dia hoy i Jeremià tamin’i Tsedekià:'
  - type: text
    content: –Raha milaza ny marina aminao aho, dia hovonoinao ho faty. Ary raha manoro hevitra anao aho, dia tsy hohenoinao akory.
  '16':
  - type: text
    content: 'Fa nianiana mangingina tamin’i Jeremià ny mpanjaka, ka nanao hoe:'
  - type: text
    content: –Velona ny TOMPO Izay nanome aina antsika, ka mianiana aminao aho fa tsy hamono anao ho faty, ary tsy hanolotra anao amin’ireo olona mifofo ny ainao.
  '17':
  - type: text
    content: 'Dia hoy i Jeremià tamin’i Tsedekià:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’izao rehetra izao sady Andriamanitr’i Israely: «Raha mivoaka hitolo-batana amin’ny manamboninahitry ny mpanjakan’i Babilôna ianao, dia ho velona ianao sy ny fianakavianao, ary tsy hodorana amin’ny afo ity tanàna ity. '
  '18':
  - type: text
    content: 'Fa raha tsy manaiky hitolo-batana amin’ireo manamboninahitry ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' kosa ianao, dia hatolotro eo an-tanan’ny Babilônianina ity tanàna ity ka hodorana amin’ny afo; ary ianao tsy ho afa-mandositra azy akory.»'
  '19':
  - type: text
    content: 'Hoy kosa i Tsedekià mpanjaka tamin’i Jeremià:'
  - type: text
    content: –Matahotra ireo Jiosy izay efa niandany tamin’ny Babilônianina aho, fandrao hatolony ho eo an-tanan’ireo ka hataony fihomehezana.
  '2':
  - type: text
    content: '«Izao no lazain’ny TOMPO: Izay mijanona eto amin’ity tanàna ity dia ho fatin’ny ady sy ny mosary ary ny areti-mandringana. Fa izay mivoaka ny tanàna mba hitolo-batana amin’ny Babilônianina kosa dia ho velona hahavonjy ny ainy'
  - type: note
    content: Jereo 21.9.
  - type: text
    content: .»
  '20':
  - type: text
    content: 'Fa hoy i Jeremià taminy:'
  - type: text
    content: '–Tsia, tsy hisy hanolotra anao aminy fa ankatoavy ny tenin’ny TOMPO izay lazaiko aminao, dia ho tsara aminao ny toe-javatra ary ho velona ny ainao. '
  '21':
  - type: text
    content: 'Fa raha tsy manaiky hitolo-batana ianao, dia izao no zavatra nasehon’ny TOMPO tamiko: '
  '22':
  - type: text
    content: 'Ny vehivavy rehetra izay tafajanona ao an-dapan’ny mpanjaka dia hoentina eo amin’ny manamboninahitry ny mpanjakan’i Babilôna, ka hanao izao hira izao ny aminao hoe:'
  - type: text
    content: Nangolen’ireo sakaiza tianao ianao ka roboka!
  - type: text
    content: Fa nony tafalatsaka tao amin’ny honahona ny tongotrao,
  - type: text
    content: dia nilaozany nandositra ianao!
  '23':
  - type: text
    content: Eny, ny vadinao rehetra mbamin’ireo zanakao lahy dia hoentina any amin’ny Babilônianina, ary ianao koa tsy ho afaka amin’ny tanany; hataon’ny mpanjakan’i Babilôna sambo-belona ianao ary noho ny aminao no handoroana ity tanàna ity amin’ny afo.
  '24':
  - type: text
    content: 'Dia hoy i Tsedekià tamin’i Jeremià:'
  - type: text
    content: '–Raha tsy te ho faty ianao, dia aoka tsy hisy hahalala izao resaka nifanaovantsika izao. '
  '25':
  - type: text
    content: 'Ho ren’ireo manamboninahitra ambony fa niresaka taminao aho, koa ho avy izy hanontany anao ny amin’izay nifampiresahantsika. Hampanantena izy fa tsy hamono anao ho faty, raha tsy manafina na inona na inona aminy ianao. '
  '26':
  - type: text
    content: 'Nefa izao no havalinao azy: «Niangavy ny mpanjaka aho mba tsy haveriny any an-tranon’i Jônatàna intsony fandrao ho faty any.»'
  '27':
  - type: text
    content: 'Dia tonga tany amin’i Jeremià tokoa ireo manamboninahitra ambony ka nanontany azy, saingy novalian’i Jeremià araka izay teny rehetra efa nandidian’ny mpanjaka azy. Dia nangina ireo satria tsy nisy nandre ny resaka nifanaovany. '
  '28':
  - type: text
    content: Ary i Jeremià dia nijanona teo an-kianjan’ny trano fiambenana mandra-pahatongan’ny andro izay nahazoana an’i Jerosalema
  - type: note
    content: 'fahazoana an’i Jerosalema: tamin’ny 587 tal J.K. Jereo 2 Mp 25.8-11; Ezek 33.21.'
  - type: text
    content: .
  - type: heading
    content: Azon’ny Babilônianina i Jerosalema
  - type: heading
    content: (38.1-10; jereo 52.4-16; 2 Mp 25.1-12)
  - type: text
    content: 'Izao no zava-niseho tamin’ny nahazoana an’i Jerosalema:'
  '3':
  - type: text
    content: 'Ary hoy koa i Jeremià hoe: «Izao no lazain’ny TOMPO: Hatolotra eo an-tanan’ny tafiky ny mpanjakan’i '
  - type: text
    content: Babilôna
  - type: text
    content: ' tokoa ity tanàna ity ka ho azony.»'
  '4':
  - type: text
    content: 'Rehefa nandre izany ireo manamboninahitra ireo, dia niteny tamin’i Tsedekià mpanjaka hoe:'
  - type: text
    content: –Takînay ny hamonoana ho faty an’i Jeremià, satria manakivy tanteraka ny miaramila sy ny mponina sisa ao an-tanàna izy. Tsy mba mitady izay hahatsara ny vahoaka io lehilahy io fa ny hanampy trotraka ihany.
  '5':
  - type: text
    content: 'Dia namaly azy ireo i Tsedekià hoe:'
  - type: text
    content: –Ataovy izay tianareo hatao aminy, fa na izaho mpanjaka aza tsy afaka hisakana anareo amin’izany.
  '6':
  - type: text
    content: Dia nalain’ireo manamboninahitra efa-dahy ireo i Jeremià ka natsipiny tao amin’ny lavaka famorian-dranon’ny andriana Malkià
  - type: note
    content: 'andriana na manamboninahitry ny mpiambina: jereo 36.26 sy nta.'
  - type: text
    content: ; fa teo an-kianjan’ny trano fiambenana io lavaka io. Tady mahazaka no nandatsahany an’i Jeremià tao. Nefa tsy nisy rano tao fa fotaka ihany, koa nilentika tamin’ny fotaka i Jeremià.
  '7':
  - type: text
    content: 'Ary ren’ilay Etiôpianina atao hoe Hebeda-Melèka izay lehilahy nahatoky tao an-dapan’ny mpanjaka fa natsipy tao an-dava-drano i Jeremià. Ny mpanjaka kosa tamin’izay dia nipetraka teo am-bavahadin’i Benjamîna; '
  '8':
  - type: text
    content: 'koa niainga avy tao an-dapa i Hebeda-Melèka, ary niteny tamin’ny mpanjaka hoe:'
  '9':
  - type: text
    content: '–Ry andriamanjaka ô, zava-dratsy avokoa izay rehetra nataon’ireo lehilahy ireo tamin’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' fa natsipiny tao an-dava-drano izy ka ho faty mosary ao, satria tsy misy mofo intsony ato an-tanàna.'
