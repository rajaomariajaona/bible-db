document_id: JER.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Natsipy tao an-dava-drano i Jeremià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Sefatià zanakalahin’i Matàna sy i Gedalià zanakalahin’i Pasehora sy i Jokaly zanakalahin’i Selemià ary i Pasehora zanakalahin’i Malkià dia samy nandre ny teny nolazain’i Jeremià tamin’ny olona rehetra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Izao no lazain’ny TOMPO: Izay mijanona eto amin’ity tanàna ity dia ho fatin’ny ady sy ny mosary ary ny areti-mandringana. Fa izay mivoaka ny tanàna mba hitolo-batana amin’ny Babilônianina kosa dia ho velona hahavonjy ny ainy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 21.9.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy koa i Jeremià hoe: «Izao no lazain’ny TOMPO: Hatolotra eo an-tanan’ny tafiky ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' tokoa ity tanàna ity ka ho azony.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa nandre izany ireo manamboninahitra ireo, dia niteny tamin’i Tsedekià mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Takînay ny hamonoana ho faty an’i Jeremià, satria manakivy tanteraka ny miaramila sy ny mponina sisa ao an-tanàna izy. Tsy mba mitady izay hahatsara ny vahoaka io lehilahy io fa ny hanampy trotraka ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namaly azy ireo i Tsedekià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy izay tianareo hatao aminy, fa na izaho mpanjaka aza tsy afaka hisakana anareo amin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nalain’ireo manamboninahitra efa-dahy ireo i Jeremià ka natsipiny tao amin’ny lavaka famorian-dranon’ny andriana Malkià
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'andriana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manamboninahitry ny mpiambina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 36.26 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ; fa teo an-kianjan’ny trano fiambenana io lavaka io. Tady mahazaka no nandatsahany an’i Jeremià tao. Nefa tsy nisy rano tao fa fotaka ihany, koa nilentika tamin’ny fotaka i Jeremià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ren’ilay Etiôpianina atao hoe Hebeda-Melèka izay lehilahy nahatoky tao an-dapan’ny mpanjaka fa natsipy tao an-dava-drano i Jeremià. Ny mpanjaka kosa tamin’izay dia nipetraka teo am-bavahadin’i Benjamîna; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'koa niainga avy tao an-dapa i Hebeda-Melèka, ary niteny tamin’ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '–Ry andriamanjaka ô, zava-dratsy avokoa izay rehetra nataon’ireo lehilahy ireo tamin’i Jeremià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' fa natsipiny tao an-dava-drano izy ka ho faty mosary ao, satria tsy misy mofo intsony ato an-tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nanome baiko an’i Hebeda-Melèka etiôpianina ny mpanjaka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mitondrà telopolo lahy avy eto hiaraka aminao, ka ampiakaro hiala tao an-dava-drano i Jeremià dieny mbola tsy maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia naka telopolo lahy hiaraka aminy i Hebeda-Melèka, ka nankao an-dapan’ny mpanjaka tao amin’ny efitrano fitahirizan-javatra; ary naka fitafiana rovitra sy tonta tao izy, ka nampidininy ho eo amin’i Jeremià tao an-dava-drano tamin’ny tady mahazaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Hebeda-Melèka etiôpianina tamin’i Jeremià hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ataovy ao ambany helikao ireo vorodamba ireo ka apetraho eo ambaniny ny tady mahazaka.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa nataon’i Jeremià izany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia nosintonin’ireo ny tady mahazaka ka nakariny avy tao an-davaka i Jeremià; ary nipetraka tao an-kianjan’ny trano fiambenana izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nanontany an’i Jeremià indray i Tsedekià mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary naniraka olona haka an’i Jeremià i Tsedekià mpanjaka ka nandray azy manokana teo amin’ny fidirana fahatelo mankao an-tranon’ny TOMPO, sady nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hanontany zavatra aminao aho, ka aza misy afenina amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy i Jeremià tamin’i Tsedekià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Raha milaza ny marina aminao aho, dia hovonoinao ho faty. Ary raha manoro hevitra anao aho, dia tsy hohenoinao akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa nianiana mangingina tamin’i Jeremià ny mpanjaka, ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Velona ny TOMPO Izay nanome aina antsika, ka mianiana aminao aho fa tsy hamono anao ho faty, ary tsy hanolotra anao amin’ireo olona mifofo ny ainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy i Jeremià tamin’i Tsedekià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao no lazain’ny TOMPO Andriamanitr’izao rehetra izao sady Andriamanitr’i Israely: «Raha mivoaka hitolo-batana amin’ny manamboninahitry ny mpanjakan’i Babilôna ianao, dia ho velona ianao sy ny fianakavianao, ary tsy hodorana amin’ny afo ity tanàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa raha tsy manaiky hitolo-batana amin’ireo manamboninahitry ny mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Babilôna
  - type: text
    text: ' kosa ianao, dia hatolotro eo an-tanan’ny Babilônianina ity tanàna ity ka hodorana amin’ny afo; ary ianao tsy ho afa-mandositra azy akory.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hoy kosa i Tsedekià mpanjaka tamin’i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Matahotra ireo Jiosy izay efa niandany tamin’ny Babilônianina aho, fandrao hatolony ho eo an-tanan’ireo ka hataony fihomehezana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy i Jeremià taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsia, tsy hisy hanolotra anao aminy fa ankatoavy ny tenin’ny TOMPO izay lazaiko aminao, dia ho tsara aminao ny toe-javatra ary ho velona ny ainao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha tsy manaiky hitolo-batana ianao, dia izao no zavatra nasehon’ny TOMPO tamiko: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny vehivavy rehetra izay tafajanona ao an-dapan’ny mpanjaka dia hoentina eo amin’ny manamboninahitry ny mpanjakan’i Babilôna, ka hanao izao hira izao ny aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nangolen’ireo sakaiza tianao ianao ka roboka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nony tafalatsaka tao amin’ny honahona ny tongotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia nilaozany nandositra ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Eny, ny vadinao rehetra mbamin’ireo zanakao lahy dia hoentina any amin’ny Babilônianina, ary ianao koa tsy ho afaka amin’ny tanany; hataon’ny mpanjakan’i Babilôna sambo-belona ianao ary noho ny aminao no handoroana ity tanàna ity amin’ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy i Tsedekià tamin’i Jeremià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Raha tsy te ho faty ianao, dia aoka tsy hisy hahalala izao resaka nifanaovantsika izao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ho ren’ireo manamboninahitra ambony fa niresaka taminao aho, koa ho avy izy hanontany anao ny amin’izay nifampiresahantsika. Hampanantena izy fa tsy hamono anao ho faty, raha tsy manafina na inona na inona aminy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa izao no havalinao azy: «Niangavy ny mpanjaka aho mba tsy haveriny any an-tranon’i Jônatàna intsony fandrao ho faty any.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia tonga tany amin’i Jeremià tokoa ireo manamboninahitra ambony ka nanontany azy, saingy novalian’i Jeremià araka izay teny rehetra efa nandidian’ny mpanjaka azy. Dia nangina ireo satria tsy nisy nandre ny resaka nifanaovany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary i Jeremià dia nijanona teo an-kianjan’ny trano fiambenana mandra-pahatongan’ny andro izay nahazoana an’i Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fahazoana an’i Jerosalema: tamin’ny 587 tal J.K. Jereo 2 Mp 25.8-11; Ezek 33.21.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azon’ny Babilônianina i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (38.1-10; jereo 52.4-16; 2 Mp 25.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Izao no zava-niseho tamin’ny nahazoana an’i Jerosalema:'
