document_id: ISA.64,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ho toy ny afo mampirehitra kitay rantsan-kazo
  - type: text
    content: na mampangotraka rano anie Ianao;
  - type: text
    content: ka ho fantatry ny fahavalonao ny lazanao
  - type: text
    content: ary hangovitra eo anatrehanao ny firenen-kafa,
  '10':
  - type: text
    content: Ny tempoly masina sady mamirapiratra
  - type: text
    content: izay nanaovan’ny razanay hira fiderana Anao
  - type: text
    content: dia kilan’ny afo,
  - type: text
    content: ary ny zava-drehetra maminay indrindra
  - type: text
    content: dia rava avokoa.
  '11':
  - type: text
    content: Eo anoloan’ireo fahavoazana rehetra ireo,
  - type: text
    content: dia tsy hiraika aminay ve Ianao, TOMPO ô?
  - type: text
    content: Mbola hangina ihany ve Ianao
  - type: text
    content: ka hampahory anay mafy loatra?
  '2':
  - type: text
    content: rehefa nanao zava-mahatahotra
  - type: text
    content: izay tsy nampoizinay akory Ianao.
  - type: text
    content: Eny, hidina tokoa Ianao, Tompo ô,
  - type: text
    content: ka hihorohoro eo anatrehanao ny tendrombohitra.
  '3':
  - type: text
    content: Fa hatrizay hatrizay dia tsy mbola henon’ny olona
  - type: text
    content: na ren’ny sofiny na hitan’ny masony
  - type: text
    content: izay Andriamanitra hafa noho Ianao
  - type: text
    content: nahavita izany tamin’izay matoky Azy
  - type: note
    content: Ahitana fitenenana mihelina an’ity and ity ao amin’ny 1Kôr 2.9.
  - type: text
    content: .
  '4':
  - type: text
    content: Mitsena izay mifaly hanao ny marina Ianao,
  - type: text
    content: dia izay mihevitra hanaraka ny lalanao;
  - type: text
    content: koa raha tezitra Ianao, dia satria nanota izahay.
  - type: text
    content: Nefa ho voavonjy ihany izahay,
  - type: text
    content: rehefa ho voakosokao tanteraka ny otanay.
  '5':
  - type: text
    content: Samy efa tahaka ny olo-maloto izahay rehetra,
  - type: text
    content: ary tahaka ny lamba mihosin-dra
  - type: text
    content: ny asa soa rehetra mba vitanay.
  - type: text
    content: Paohin’ny helokay izahay rehetra
  - type: text
    content: toy ny ravin-kazo maina paohin’ny tadio.
  '6':
  - type: text
    content: Tsy nisy niantso ny anaranao intsony
  - type: text
    content: na nahatsiaro hifikitra aminao,
  - type: text
    content: satria nandà ny hijery anay Ianao
  - type: text
    content: ary namela anay handevozin’ny helokay.
  '7':
  - type: text
    content: Na dia izany aza anefa, TOMPO ô, Ianao no Rainay;
  - type: text
    content: tanimanga izahay, fa Ianao no mpanefy
  - type: text
    content: ary asan’ny tananao izahay rehetra.
  '8':
  - type: text
    content: TOMPO ô, aza vinitra loatra aminay
  - type: text
    content: ary aza tsarovana hatrany ny helokay;
  - type: text
    content: mba tsinjovy re izahay vahoakanao rehetra.
  '9':
  - type: text
    content: Tonga aolo ireo tanànanao masina,
  - type: text
    content: tonga taniefitra i Tsiôna
  - type: text
    content: ary tonga lao i Jerosalema.
