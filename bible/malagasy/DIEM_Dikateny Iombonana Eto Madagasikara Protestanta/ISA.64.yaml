document_id: ISA.64,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho toy ny afo mampirehitra kitay rantsan-kazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na mampangotraka rano anie Ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho fantatry ny fahavalonao ny lazanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hangovitra eo anatrehanao ny firenen-kafa,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny tempoly masina sady mamirapiratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanaovan’ny razanay hira fiderana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia kilan’ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny zava-drehetra maminay indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia rava avokoa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eo anoloan’ireo fahavoazana rehetra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy hiraika aminay ve Ianao, TOMPO ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hangina ihany ve Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampahory anay mafy loatra?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: rehefa nanao zava-mahatahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay tsy nampoizinay akory Ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hidina tokoa Ianao, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hihorohoro eo anatrehanao ny tendrombohitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa hatrizay hatrizay dia tsy mbola henon’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ren’ny sofiny na hitan’ny masony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay Andriamanitra hafa noho Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nahavita izany tamin’izay matoky Azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahitana fitenenana mihelina an’ity and ity ao amin’ny 1Kôr 2.9.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mitsena izay mifaly hanao ny marina Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay mihevitra hanaraka ny lalanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa raha tezitra Ianao, dia satria nanota izahay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho voavonjy ihany izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa ho voakosokao tanteraka ny otanay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Samy efa tahaka ny olo-maloto izahay rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tahaka ny lamba mihosin-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny asa soa rehetra mba vitanay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paohin’ny helokay izahay rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ravin-kazo maina paohin’ny tadio.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy nisy niantso ny anaranao intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nahatsiaro hifikitra aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria nandà ny hijery anay Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary namela anay handevozin’ny helokay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Na dia izany aza anefa, TOMPO ô, Ianao no Rainay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tanimanga izahay, fa Ianao no mpanefy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary asan’ny tananao izahay rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: TOMPO ô, aza vinitra loatra aminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza tsarovana hatrany ny helokay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsinjovy re izahay vahoakanao rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tonga aolo ireo tanànanao masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga taniefitra i Tsiôna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tonga lao i Jerosalema.
