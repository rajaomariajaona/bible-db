document_id: 1KI.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Elià mpaminany milaza hain-tany
  - type: text
    content: 'Ary niteny tamin’i Ahaba mpanjaka i Elià izay Tisbita anisan’ny mponina tao Gilehada hoe:'
  - type: text
    content: –Velona ny TOMPO Andriamanitr’i Israely izay tompoiko, koa manizingizina aminao aho fa tsy hisy ando na orana hilatsaka eto amin’ireo taona ato ho ato ireo, raha tsy teny avy amiko ihany
  - type: note
    content: Fanambaràna hain-tany, satria ireo renirano tsy mahatondraka firy ny tanin’i Israely araka izay tokony ho izy. –Jereo Jak 5.17.
  - type: text
    content: .
  - type: heading
    content: I Elià teo amoron-driakan’i Kerita
  '10':
  - type: text
    content: 'Dia lasa nankany Tsarefata i Elià. Ary rehefa tonga teo am-bavahadin’ny tanàna izy, dia nahita vehivavy mpitondratena mifako kitay. Nantsoin’i Elià io ka nataony hoe:'
  - type: text
    content: –Azafady mba itondray rano kely amin’ny zinganao aho hosotroiko.
  '11':
  - type: text
    content: 'Dia lasa naka ravehivavy, nefa mbola nantsoin’i Elià indray izy nataony hoe:'
  - type: text
    content: –Azafady, mba itondray mofo ihany koa aho.
  '12':
  - type: text
    content: 'Fa hoy ravehivavy namaly:'
  - type: text
    content: –Velona ny TOMPO Andriamanitrao, koa mianiana aho fa tsy manana mofo mihitsy; ny sisa ananako dia lafarinina eran’ny tanan’ila ao anaty tsatokaty sy menaka kely amin’ny tavoara. Koa rehefa avy maka kitay aho, dia hody hikarakara an’ireo mba ho ahy sy ho an’ny zanako lahy; dia hohaninay izany, ary hiandry ny hahafatesanay izahay.
  '13':
  - type: text
    content: 'Fa hoy i Elià taminy:'
  - type: text
    content: '–Aza matahotra! Modia ary manaova araka izany voalazanao izany; nefa anaovy mofo kely aho aloha ka ento atỳ amiko, dia izay ianao vao manao ho anao sy ho an’ny zanakao lahy. '
  '14':
  - type: text
    content: 'Fa izao no lazain’ny TOMPO Andriamanitr’i Israely: «Tsy ho lany ny lafarinina ao amin’ny tsatokaty, ary tsy ho ritra ny menaka ao amin’ny tavoara mandra-pigadon’ny andro handatsahan’ny TOMPO ranonorana amin’ny tany.»'
  '15':
  - type: text
    content: 'Dia lasa ravehivavy ka nanao araka izay nolazain’i Elià taminy; ary dia nanan-kohanina nandritra ny fotoana elaela izy telo mianaka, dia ravehivavy sy ny zanany ary ilay mpaminany. '
  '16':
  - type: text
    content: Tsy lany anefa ny lafarinina tao amin’ny tsatokaty ary tsy ritra ihany koa ny menaka tao amin’ny tavoara, araka izay nolazain’ny TOMPO tamin’ny alalan’i Elià.
  - type: heading
    content: I Elià namerina indray ny ain-janak’ilay vehivavy mpitondratena
  '17':
  - type: text
    content: 'Fotoana vitsy taorian’izany, dia narary ny zanak’ilay vehivavy mpitondratena nampiantrano ny mpaminany. Mafy loatra anefa ny aretiny ka niafara tamin’ny fahafatesany izany. '
  '18':
  - type: text
    content: 'Dia hoy ravehivavy tamin’i Elià:'
  - type: text
    content: –Ry olon’Andriamanitra, nahoana no nanao izao tamiko ianao? Moa hampahatsiaro ny fahotako sy hahafaty ny zanako lahy ve no nahatongavanao tatỳ amiko?
  '19':
  - type: text
    content: 'Hoy kosa i Elià namaly azy:'
  - type: text
    content: –Omeo ahy ny zanakao.
  - type: text
    content: Dia nalainy teny an-tsandrin-dravehivavy izy ka nentiny tany an’efitra ambony izay nitoerany
  - type: note
    content: Efitra fanampiny izay atao eo amin’ny tafo marindranon’ny tranon’ny tatsinanana indraindray.
  - type: text
    content: ' ary nampandriny teo am-parafarany. '
  '2':
  - type: text
    content: 'Dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
  '20':
  - type: text
    content: 'Dia nivavaka tamin’ny TOMPO izy ka nanao hoe:'
  - type: text
    content: –Ry TOMPO Andriamanitro ô, ity mpitondratena ity mba nampiantrano ahy, koa sitrakao ve ny hampahory azy amin’ny fahafatesan-janany?
  '21':
  - type: text
    content: 'Dia niampatra intelo teo amin’ny zaza izy sady nitalaho mafy tamin’ny TOMPO hoe:'
  - type: text
    content: –Ry TOMPO Andriamanitro ô, mitalaho aminao aho mba hamelomanao indray ity zaza ity.
  '22':
  - type: text
    content: 'Nohenoin’ny TOMPO ny vavak’i Elià, dia niverina taminy indray ny ain’ny zaza ka velona soa aman-tsara izy. '
  '23':
  - type: text
    content: 'Dia noraisin’i Elià ny zaza ka nentiny nidina ho ao amin’ny efitra ambany ary natolony an-dreniny sady nataony hoe:'
  - type: text
    content: –Indro fa velona ny zanakao!
  '24':
  - type: text
    content: 'Ary hoy ravehivavy tamin’i Elià:'
  - type: text
    content: –Fantatro izao fa olon’Andriamanitra tokoa ianao ary miteny amin’ny alalanao marina ny TOMPO.
  '3':
  - type: text
    content: '–Mialà eto ianao ka mizora miantsinanana ary miere any akaikin’ny riakan’i Kerita, any atsinanan’i Jôrdàna. '
  '4':
  - type: text
    content: Io riaka io no hisotroanao rano any, ary Izaho hanome baiko ny goaika hitondra sakafo ho anao.
  '5':
  - type: text
    content: 'Dia notanterahin’i Elià izay nolazain’ny TOMPO taminy, ka lasa izy nipetraka tany akaikin’ny riakan’i Kerita. '
  '6':
  - type: text
    content: Ary marain-tsy hariva dia nitondra mofo sy hena ho azy ny goaika, fa rano teo amin’ny riaka kosa no nisotroany.
  - type: heading
    content: I Elià tao amin’ilay vehivavy mpitondratena tao Tsarefata
  '7':
  - type: text
    content: 'Fa nony afaka kelikely dia ritra ilay riaka, satria tsy nisy orana nilatsaka tamin’ny tany. '
  '8':
  - type: text
    content: 'Dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
  '9':
  - type: text
    content: –Miaingà ka mankanesa any Tsarefata akaikin’i Tsidôna ary mitoera any; fa misy vehivavy mpitondratena any, izay efa nomeko baiko mba hamatsy hanina anao
  - type: note
    content: Jereo Lk 4.25-26.
  - type: text
    content: .
