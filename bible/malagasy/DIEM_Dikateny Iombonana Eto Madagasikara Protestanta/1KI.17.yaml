document_id: 1KI.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elià mpaminany milaza hain-tany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin’i Ahaba mpanjaka i Elià izay Tisbita anisan’ny mponina tao Gilehada hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO Andriamanitr’i Israely izay tompoiko, koa manizingizina aminao aho fa tsy hisy ando na orana hilatsaka eto amin’ireo taona ato ho ato ireo, raha tsy teny avy amiko ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fanambaràna hain-tany, satria ireo renirano tsy mahatondraka firy ny tanin’i Israely araka izay tokony ho izy. –Jereo Jak 5.17.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elià teo amoron-driakan’i Kerita
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nankany Tsarefata i Elià. Ary rehefa tonga teo am-bavahadin’ny tanàna izy, dia nahita vehivavy mpitondratena mifako kitay. Nantsoin’i Elià io ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azafady mba itondray rano kely amin’ny zinganao aho hosotroiko.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa naka ravehivavy, nefa mbola nantsoin’i Elià indray izy nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azafady, mba itondray mofo ihany koa aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ravehivavy namaly:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Velona ny TOMPO Andriamanitrao, koa mianiana aho fa tsy manana mofo mihitsy; ny sisa ananako dia lafarinina eran’ny tanan’ila ao anaty tsatokaty sy menaka kely amin’ny tavoara. Koa rehefa avy maka kitay aho, dia hody hikarakara an’ireo mba ho ahy sy ho an’ny zanako lahy; dia hohaninay izany, ary hiandry ny hahafatesanay izahay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy i Elià taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza matahotra! Modia ary manaova araka izany voalazanao izany; nefa anaovy mofo kely aho aloha ka ento atỳ amiko, dia izay ianao vao manao ho anao sy ho an’ny zanakao lahy. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa izao no lazain’ny TOMPO Andriamanitr’i Israely: «Tsy ho lany ny lafarinina ao amin’ny tsatokaty, ary tsy ho ritra ny menaka ao amin’ny tavoara mandra-pigadon’ny andro handatsahan’ny TOMPO ranonorana amin’ny tany.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ravehivavy ka nanao araka izay nolazain’i Elià taminy; ary dia nanan-kohanina nandritra ny fotoana elaela izy telo mianaka, dia ravehivavy sy ny zanany ary ilay mpaminany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy lany anefa ny lafarinina tao amin’ny tsatokaty ary tsy ritra ihany koa ny menaka tao amin’ny tavoara, araka izay nolazain’ny TOMPO tamin’ny alalan’i Elià.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elià namerina indray ny ain-janak’ilay vehivavy mpitondratena
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fotoana vitsy taorian’izany, dia narary ny zanak’ilay vehivavy mpitondratena nampiantrano ny mpaminany. Mafy loatra anefa ny aretiny ka niafara tamin’ny fahafatesany izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ravehivavy tamin’i Elià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry olon’Andriamanitra, nahoana no nanao izao tamiko ianao? Moa hampahatsiaro ny fahotako sy hahafaty ny zanako lahy ve no nahatongavanao tatỳ amiko?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Elià namaly azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Omeo ahy ny zanakao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nalainy teny an-tsandrin-dravehivavy izy ka nentiny tany an’efitra ambony izay nitoerany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efitra fanampiny izay atao eo amin’ny tafo marindranon’ny tranon’ny tatsinanana indraindray.
      marker-yv: yv-n
    - type: text
      text: ' ary nampandriny teo am-parafarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivavaka tamin’ny TOMPO izy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry TOMPO Andriamanitro ô, ity mpitondratena ity mba nampiantrano ahy, koa sitrakao ve ny hampahory azy amin’ny fahafatesan-janany?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niampatra intelo teo amin’ny zaza izy sady nitalaho mafy tamin’ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry TOMPO Andriamanitro ô, mitalaho aminao aho mba hamelomanao indray ity zaza ity.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nohenoin’ny TOMPO ny vavak’i Elià, dia niverina taminy indray ny ain’ny zaza ka velona soa aman-tsara izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin’i Elià ny zaza ka nentiny nidina ho ao amin’ny efitra ambany ary natolony an-dreniny sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro fa velona ny zanakao!
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ravehivavy tamin’i Elià:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatro izao fa olon’Andriamanitra tokoa ianao ary miteny amin’ny alalanao marina ny TOMPO.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mialà eto ianao ka mizora miantsinanana ary miere any akaikin’ny riakan’i Kerita, any atsinanan’i Jôrdàna. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Io riaka io no hisotroanao rano any, ary Izaho hanome baiko ny goaika hitondra sakafo ho anao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notanterahin’i Elià izay nolazain’ny TOMPO taminy, ka lasa izy nipetraka tany akaikin’ny riakan’i Kerita. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary marain-tsy hariva dia nitondra mofo sy hena ho azy ny goaika, fa rano teo amin’ny riaka kosa no nisotroany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Elià tao amin’ilay vehivavy mpitondratena tao Tsarefata
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony afaka kelikely dia ritra ilay riaka, satria tsy nisy orana nilatsaka tamin’ny tany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy tenin’ny TOMPO tamin’i Elià nanao hoe:'
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Miaingà ka mankanesa any Tsarefata akaikin’i Tsidôna ary mitoera any; fa misy vehivavy mpitondratena any, izay efa nomeko baiko mba hamatsy hanina anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lk 4.25-26.
      marker-yv: yv-n
    - type: text
      text: .
