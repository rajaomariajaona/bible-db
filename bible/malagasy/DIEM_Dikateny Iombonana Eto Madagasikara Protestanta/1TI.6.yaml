document_id: 1TI.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Aoka ny mpanompo rehetra fehezin’olona hanao ny tompony ho mendri-kaja tanteraka, mba tsy hanevatevana ny anaran’Andriamanitra sy ny fampianarantsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny fitiavam-bola no fototry ny ratsy rehetra; ny olona sasany, fatra-pitady izany, dia efa tafavily niala tamin’ny finoana, ka nandefon-tena tamin’ny fijaliana maro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ady tsaran’ny finoana
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa ianao kosa, ry lehilahin’Andriamanitra, halaviro ireo zava-dratsy ireo. Katsaho ny rariny, ny firaiketam-po amin’Andriamanitra, ny finoana, ny fitiavana, ny faharetana ary ny fahalemem-panahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Miadia ny ady tsaran’ny finoana, hazòny ny fiaina-maharitra mandrakizay, fa ho any amin’izany fiainana izany no niantsoan’Andriamanitra anao fony ianao nanambara ilay fiekem-pinoana fatratra teo anatrehan’ny vavolombelona maro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no anafatrafarako anao eo anatrehan’ilay Andriamanitra fototr’ain’ny zavatra rehetra sy eo anatrehan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Jesoa Izay nanambara fiekem-pinoana fatratra nanoloana an’i Pônty '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pilato
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôh 18.36-37; 19.11.
      marker-yv: yv-n
    - type: text
      text: ': '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'tandremo tsy hanan-tsiny amam-pondro izany baiko izany mandra-piavin’ilay andro hisehoan’ilay Jesoa Kristy Tompontsika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny hisehoan’i Kristy, amin’ny fotoana voatendry, dia hotanterahin’Andriamanitra, ilay Andriana tokana sady loharanom-pahasambarana, ilay Mpanjakan’ny mpanjaka sady Tompon’ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Fifan 10.17; Sal 136.3.
      marker-yv: yv-n
    - type: text
      text: ': '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izy ihany no tsy mety maty, mitoetra ao amin’ny hazavana tsy hay akaikezina; tsy misy olombelona nahita maso Azy hatrizay hatrizay, ary tsy misy afaka hahita maso Azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Sal 104.2; Eks 33.20.
      marker-yv: yv-n
    - type: text
      text: '; ho Azy anie ny haja sy ny fanjakana mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Anaro ireo mpanankarena amin’izao fiainana ankehitriny izao mba tsy hiavonavona ary mba tsy hametraka ny fanantenany amin’ny harena tsy mateza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 12.20.
      marker-yv: yv-n
    - type: text
      text: ', fa amin’Andriamanitra Izay manome antsika ny zavatra rehetra be dia be hifaliantsika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Anaro ireo mpanankarena mba hanao soa, mba hanan-karena amin’ny asa tsara, mba halala-tanana ary mba ho vonona hifampizara amin’ny hafa; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: dia hamory raki-tsoa ho an’ny tenany izy hanorenany tsara ny ho avy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Mt 6.20.
      marker-yv: yv-n
    - type: text
      text: ', ka hahazoany ny tena fiainana.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny mpanompo, manana tompo kristianina, dia tsy tokony hanao tsinontsinona azy satria hoe rahalahiny ihany; fa vao mainka tokony hanompo azy tsara aza, satria mpino malalany no anaovany soa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fampianaran-diso sy ny tena harena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo zavatra ireo no ampianaro sy ampirisiho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tahirizo tsara, ry Timôty, ny raki-tsoa nankinina taminao; fadio ny taria poaka àty sady manazimba fivavahana; fadio ny fanoheran-kevitra avy amin’ilay antsoina foana hoe «Fahalalana», kanjo tsy izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nihambo hanana izany fahalalana izany ny sasany, ka nihataka tamin’ny finoana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Homba anareo anie ny fahasoavan’Andriamanitra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Raha misy manao fampianarana hafa, ka tsy manaiky ny teny tsy misy tomika nambaran’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika sy ny fampianarana mifanaraka amin’ny fivavahantsika, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia mieboebo foana ary tsy mahalala na inona na inona, fa adalan’ny fiadian-kevitra sy ny fiadian-teny; vokatr’izany: fialonana, fifandirana, fanevatevana, ahiahy ratsy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ary fifanoherana tsy misy farany eo amin’ny olona efa ratsy saina sady efa tsy mahalala ny hafatra marim-pototra intsony. Heveriny fa ny fivavahana dia atao ho filàn-karena.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Eny, harem-be tokoa ny fivavahana ho an’ny olona mahay mianina amin’izay ananany; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: satria tsy nitondra na inona na inona isika nanketo amin’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ' ary tsy hahatondra na inona na inona miala eto. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa rehefa mba manan-kohanina sy hitafiana isika, dia aoka hianina amin’izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa izay te hanan-karena, dia voan’ny fakampanahy sy ny fandriky ny filàna maro tsy misy antony sady manimba, izay mandetika ny olona hihitsoka ao amin’ny fandringanana sy ny fahaverezana. '
