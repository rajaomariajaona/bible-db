document_id: 1TI.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Aoka ny mpanompo rehetra fehezin’olona hanao ny tompony ho mendri-kaja tanteraka, mba tsy hanevatevana ny anaran’Andriamanitra sy ny fampianarantsika. '
  '10':
  - type: text
    content: Fa ny fitiavam-bola no fototry ny ratsy rehetra; ny olona sasany, fatra-pitady izany, dia efa tafavily niala tamin’ny finoana, ka nandefon-tena tamin’ny fijaliana maro.
  - type: heading
    content: Ny ady tsaran’ny finoana
  '11':
  - type: text
    content: 'Fa ianao kosa, ry lehilahin’Andriamanitra, halaviro ireo zava-dratsy ireo. Katsaho ny rariny, ny firaiketam-po amin’Andriamanitra, ny finoana, ny fitiavana, ny faharetana ary ny fahalemem-panahy. '
  '12':
  - type: text
    content: 'Miadia ny ady tsaran’ny finoana, hazòny ny fiaina-maharitra mandrakizay, fa ho any amin’izany fiainana izany no niantsoan’Andriamanitra anao fony ianao nanambara ilay fiekem-pinoana fatratra teo anatrehan’ny vavolombelona maro. '
  '13':
  - type: text
    content: 'Izao no anafatrafarako anao eo anatrehan’ilay Andriamanitra fototr’ain’ny zavatra rehetra sy eo anatrehan’i '
  - type: text
    content: Kristy
  - type: text
    content: ' Jesoa Izay nanambara fiekem-pinoana fatratra nanoloana an’i Pônty '
  - type: text
    content: Pilato
  - type: note
    content: Jereo Jôh 18.36-37; 19.11.
  - type: text
    content: ': '
  '14':
  - type: text
    content: 'tandremo tsy hanan-tsiny amam-pondro izany baiko izany mandra-piavin’ilay andro hisehoan’ilay Jesoa Kristy Tompontsika. '
  '15':
  - type: text
    content: Fa ny hisehoan’i Kristy, amin’ny fotoana voatendry, dia hotanterahin’Andriamanitra, ilay Andriana tokana sady loharanom-pahasambarana, ilay Mpanjakan’ny mpanjaka sady Tompon’ny Tompo
  - type: note
    content: Ampit Fifan 10.17; Sal 136.3.
  - type: text
    content: ': '
  '16':
  - type: text
    content: Izy ihany no tsy mety maty, mitoetra ao amin’ny hazavana tsy hay akaikezina; tsy misy olombelona nahita maso Azy hatrizay hatrizay, ary tsy misy afaka hahita maso Azy
  - type: note
    content: Ampit Sal 104.2; Eks 33.20.
  - type: text
    content: '; ho Azy anie ny haja sy ny fanjakana mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '17':
  - type: text
    content: Anaro ireo mpanankarena amin’izao fiainana ankehitriny izao mba tsy hiavonavona ary mba tsy hametraka ny fanantenany amin’ny harena tsy mateza
  - type: note
    content: Ampit Lk 12.20.
  - type: text
    content: ', fa amin’Andriamanitra Izay manome antsika ny zavatra rehetra be dia be hifaliantsika. '
  '18':
  - type: text
    content: 'Anaro ireo mpanankarena mba hanao soa, mba hanan-karena amin’ny asa tsara, mba halala-tanana ary mba ho vonona hifampizara amin’ny hafa; '
  '19':
  - type: text
    content: dia hamory raki-tsoa ho an’ny tenany izy hanorenany tsara ny ho avy
  - type: note
    content: Ampit Mt 6.20.
  - type: text
    content: ', ka hahazoany ny tena fiainana.'
  '2':
  - type: text
    content: Ny mpanompo, manana tompo kristianina, dia tsy tokony hanao tsinontsinona azy satria hoe rahalahiny ihany; fa vao mainka tokony hanompo azy tsara aza, satria mpino malalany no anaovany soa.
  - type: heading
    content: Ny fampianaran-diso sy ny tena harena
  - type: text
    content: 'Ireo zavatra ireo no ampianaro sy ampirisiho. '
  '20':
  - type: text
    content: 'Tahirizo tsara, ry Timôty, ny raki-tsoa nankinina taminao; fadio ny taria poaka àty sady manazimba fivavahana; fadio ny fanoheran-kevitra avy amin’ilay antsoina foana hoe «Fahalalana», kanjo tsy izy. '
  '21':
  - type: text
    content: Nihambo hanana izany fahalalana izany ny sasany, ka nihataka tamin’ny finoana.
  - type: text
    content: Homba anareo anie ny fahasoavan’Andriamanitra!
  '3':
  - type: text
    content: 'Raha misy manao fampianarana hafa, ka tsy manaiky ny teny tsy misy tomika nambaran’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika sy ny fampianarana mifanaraka amin’ny fivavahantsika, '
  '4':
  - type: text
    content: 'dia mieboebo foana ary tsy mahalala na inona na inona, fa adalan’ny fiadian-kevitra sy ny fiadian-teny; vokatr’izany: fialonana, fifandirana, fanevatevana, ahiahy ratsy, '
  '5':
  - type: text
    content: ary fifanoherana tsy misy farany eo amin’ny olona efa ratsy saina sady efa tsy mahalala ny hafatra marim-pototra intsony. Heveriny fa ny fivavahana dia atao ho filàn-karena.
  '6':
  - type: text
    content: 'Eny, harem-be tokoa ny fivavahana ho an’ny olona mahay mianina amin’izay ananany; '
  '7':
  - type: text
    content: satria tsy nitondra na inona na inona isika nanketo amin’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ' ary tsy hahatondra na inona na inona miala eto. '
  '8':
  - type: text
    content: 'Koa rehefa mba manan-kohanina sy hitafiana isika, dia aoka hianina amin’izany. '
  '9':
  - type: text
    content: 'Fa izay te hanan-karena, dia voan’ny fakampanahy sy ny fandriky ny filàna maro tsy misy antony sady manimba, izay mandetika ny olona hihitsoka ao amin’ny fandringanana sy ny fahaverezana. '
