    children:
    - type: text
      text: dia ilay TOMPOn’izao rehetra izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady Mpanjakan’i Israely sy Mpanavotra azy:'
  - type: usfm
    marker: q1
