  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa homeko lanjany ny tenin’ireo mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko tanteraka ny fikasan’ireo irako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy Aho amin’i Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Aoka honenana indray ianao.›
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary amin’ny tanànan’i Joda hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Aoka haorina indray ianareo.›
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hatsangako izay efa rava.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hoy Aho amin’ny ranomasina lalimbe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Aoka ho maina ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa horitiko ny ranobenao.›
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
