document_id: ISA.44,396
type_code: plt
verses:
  '1':
  - type: text
    content: Fa ankehitriny kosa mihainoa,
  - type: text
    content: ry firenen’i Jakôba mpanompoko,
  - type: text
    content: ry vahoaka Israely izay nofidiko.
  '10':
  - type: text
    content: Iza no hanamboatra andriamani-tsiizy,
  - type: text
    content: handrendrika sarivongana tsy mahasoa akory?
  '11':
  - type: text
    content: Indreo ho menatra izay rehetra mpomba azy
  - type: text
    content: fa olombelona ihany no namboatra ireny!
  - type: text
    content: Avelao hivory sy hiseho izy rehetra,
  - type: text
    content: fa hatahotra sy ho safo-kenatra avokoa.
  '12':
  - type: text
    content: Ny mpanefy manapaka takela-by,
  - type: text
    content: dia mandefa azy ao anaty afo
  - type: text
    content: sy mamolavola azy amin’ny tantanana
  - type: text
    content: ka miasa amin’ny sandriny mahery;
  - type: text
    content: avy eo dia noana sy ketraka izy,
  - type: text
    content: tsy misotro rano ka reraka.
  '13':
  - type: text
    content: Ny mpandrafitra kosa mandrefy hazo amin’ny tady
  - type: text
    content: sy manamarika azy amin’ny tsaoka,
  - type: text
    content: manamboatra azy amin’ny vankona,
  - type: text
    content: manamarika azy amin’ny kômpà
  - type: text
    content: ary manome azy endrik’olona,
  - type: text
    content: dia endrik’olona tsara tarehy
  - type: text
    content: izay hapetraka ao amin’ny tempoly anankiray.
  '14':
  - type: text
    content: Avahana ny hazo sedera hokapaina,
  - type: text
    content: fidîna ny hazo terebinta na ôaka,
  - type: text
    content: dia avela ho lehibe any an’ala.
  - type: text
    content: Na ny hazo kesika volena koa,
  - type: text
    content: dia ny ranonorana no mampaniry azy.
  '15':
  - type: text
    content: Ireny no ampiasain’ny olona ho kitay
  - type: text
    content: ka angalany hamindroana na handrahoan-tsakafo.
  - type: text
    content: Ireny ihany koa no anaovany
  - type: text
    content: andriamanitra hiankohofany
  - type: text
    content: sy sarivongan-tsampy hivavahany.
  '16':
  - type: text
    content: Araka izany ny antsasaky ny vatan-kazo
  - type: text
    content: dia dorana amin’ny afo ka itonoany hena;
  - type: text
    content: manatsatsika hena ny olona ka voky,
  - type: text
    content: 'na mamindro koa izy ka manao hoe:'
  - type: text
    content: «Andray! Mafana aho izany! Nahita afo aho!»
  '17':
  - type: text
    content: Ny antsasaky ny vatan-kazo kosa
  - type: text
    content: anamboarany andriamanitra ho sampiny.
  - type: text
    content: Dia izany no iondrehany sy iankohofany
  - type: text
    content: 'sady ivavahany ataony hoe:'
  - type: text
    content: «Vonjeo aho fa ianao no andriamanitro.»
  '18':
  - type: text
    content: Tsy mahalala na inona na inona
  - type: text
    content: sady tsy misaina ireny olona ireny,
  - type: text
    content: voatampina ny masony ka tsy mahita
  - type: text
    content: sady donto rahateo koa ny fony.
  '19':
  - type: text
    content: Tsy misy mieritreritra ao am-pony
  - type: text
    content: 'na mba mahalala handini-tena hoe:'
  - type: text
    content: «Ny antsasak’ity vatan-kazo ity
  - type: text
    content: dia nodorako tamin’ny afo;
  - type: text
    content: ka ny vainafony no nanendasako mofo
  - type: text
    content: sy nanatsatsihako hena hohaniko.
  - type: text
    content: Ny antsasaky ny vatan-kazo kosa
  - type: text
    content: dia hanaovako sampy mamoafady,
  - type: text
    content: ka tapa-kazo no indro hiankohofako.»
  '2':
  - type: text
    content: Izaho TOMPO izay mpanao anao,
  - type: text
    content: ka namorona anao hatrany am-bohòka
  - type: text
    content: 'sy manampy anao no indro milaza aminao hoe:'
  - type: text
    content: Aza matahotra, ry firenen’i Jakôba mpanompoko
  - type: text
    content: ilay Jesoròna
  - type: note
    content: Jesoròna; anaram-bositra iantsoana an’i Israely ao amin’ny Deot 32.15; 33.5,26. Angamba ny dikany dia hoe olo-mahitsy , ka mifanohitra amin’ny hoe Jakôba (fangoloka).
  - type: text
    content: ' izay nofidiko.'
  '20':
  - type: text
    content: Mifikitra amin-javatra lasan-ko lavenona ireny;
  - type: text
    content: ny fony voafitaka no nampivily azy.
  - type: text
    content: Tsy mahafaka azy ny andriamaniny,
  - type: text
    content: 'kanefa ny tenany koa tsy mahateny hoe:'
  - type: text
    content: «Hay moa ka andriamani-tsiizy
  - type: text
    content: ity eto an-tanako ankavanana ity!»
  - type: heading
    content: Aza hadino fa mpanompoko ianao
  '21':
  - type: text
    content: Ry firenen’i Jakôba, ry vahoaka Israely,
  - type: text
    content: 'aoka hotsarovanao izao: «Mpanompoko ianao!'
  - type: text
    content: Izaho no namolavola anao hanompo Ahy.
  - type: text
    content: Tsy hohadinoiko ianao, ry vahoaka Israely!
  '22':
  - type: text
    content: Nofafako toy ny rahona ny fahadisoanao
  - type: text
    content: ary nolevoniko toy ny zavona ny fahotanao.
  - type: text
    content: Koa miverena amiko ianao fa efa navotako.»
  '23':
  - type: text
    content: Miasa ny TOMPO ka mihobia, ry lanitra,
  - type: text
    content: ary miravoravoa, ry fanambanin’ny tany.
  - type: text
    content: Ataovy manako ny hoby, ry tendrombohitra
  - type: text
    content: mbamin’ny ala sy ny hazo rehetra ao,
  - type: text
    content: fa ny TOMPO efa nanavotra ny firenen’i Jakôba
  - type: text
    content: ary efa naneho voninahitra tamin’ny vahoaka Israely.
  - type: heading
    content: Ilay Mpamorona izao tontolo izao no mifehy ny tantara
  '24':
  - type: text
    content: Ry vahoaka Israely, ny TOMPO Izay nanavotra anao,
  - type: text
    content: Ilay namorona anao hatrany am-bohòka,
  - type: text
    content: 'dia indro milaza aminao hoe:'
  - type: text
    content: «Izaho TOMPO no manao ny zavatra rehetra,
  - type: text
    content: Izaho irery ihany no nanenjana ny lanitra
  - type: text
    content: sy namelatra ny tany fa tsy nisy nanampy.
  '25':
  - type: text
    content: Koa hataoko tsy misy vokany
  - type: text
    content: ny famantarana vitan’ny mpimasy
  - type: text
    content: ary hataoko mirediredy ny mpisikidy;
  - type: text
    content: hataoko mianòtra ny olon-kendry
  - type: text
    content: ka hody fahadalana ny fahalalàny
  - type: note
    content: Jereo 1Kôr 1.20.
  - type: text
    content: .
  '26':
  - type: text
    content: Fa homeko lanjany ny tenin’ireo mpanompoko
  - type: text
    content: ary hataoko tanteraka ny fikasan’ireo irako.
  - type: text
    content: 'Ka hoy Aho amin’i Jerosalema:'
  - type: text
    content: ‹Aoka honenana indray ianao.›
  - type: text
    content: 'ary amin’ny tanànan’i Joda hoe:'
  - type: text
    content: ‹Aoka haorina indray ianareo.›
  - type: text
    content: Eny, hatsangako izay efa rava.
  '27':
  - type: text
    content: 'Hoy Aho amin’ny ranomasina lalimbe:'
  - type: text
    content: ‹Aoka ho maina ianao,
  - type: text
    content: fa horitiko ny ranobenao.›
  '28':
  - type: text
    content: 'Hoy Aho ny amin’i Kirôsa:'
  - type: text
    content: '‹Izy no '
  - type: text
    content: mpiandry
  - type: text
    content: ' ondriko.'
  - type: text
    content: Hotanterahiny izay sitrako rehetra,
  - type: text
    content: ka dia hanome baiko izy
  - type: text
    content: mba haorina indray i Jerosalema
  - type: text
    content: ary hamboarina indray ny tempoly
  - type: note
    content: 'Kirôsa: jereo ny naoty tandrifin’ny 41.2. –Fanamboarana ny tempoly: 2 Tan 36.23; Hez 1.2.'
  - type: text
    content: .› »
  '3':
  - type: text
    content: Fa hanosaka rano amin’izay mangetaheta Aho
  - type: text
    content: sy hampandriaka renirano amin’ny tany mangentana.
  - type: text
    content: Hatosako amin’ny zanakao ny Fanahiko
  - type: text
    content: ary amin’ny taranakao ny fitahiako.
  '4':
  - type: text
    content: Handrobona toy ny solofom-bolotara
  - type: text
    content: na toy ny hazomalahelo eny amoron-drano izy.
  '5':
  - type: text
    content: 'Ny anankiray hanao hoe: ‹An’ny TOMPO aho›;'
  - type: text
    content: ny iray hafa te hitondra ny anaran’i Jakôba.
  - type: text
    content: Ny anankiray kosa dia eo amin’ny sandriny
  - type: text
    content: 'no hanoratany hoe: ‹Fananan’ny TOMPO›'
  - type: text
    content: sady ny anaran’i Israely no hireharehany.»
  - type: heading
    content: Fihantsiana ny andriamani-tsiizy
  '6':
  - type: text
    content: Izao no lazain’ny TOMPO
  - type: text
    content: dia ilay TOMPOn’izao rehetra izao
  - type: text
    content: 'sady Mpanjakan’i Israely sy Mpanavotra azy:'
  - type: text
    content: «Izaho no voalohany ary Izaho no farany
  - type: note
    content: Jereo 48.12; ampit Apôk 1.17; 22.13.
  - type: text
    content: ','
  - type: text
    content: ka tsy misy Andriamanitra afa-tsy Izaho.
  '7':
  - type: text
    content: Raha misy mihambo ho mitovy amiko,
  - type: text
    content: aoka izy hiteny sy handahatra momba izany!
  - type: text
    content: Hohazavainy amiko hoe iza, hatry ny fahagola,
  - type: text
    content: no nampandre ny zavatra tsy maintsy tonga;
  - type: text
    content: ary hambarany amintsika koa ny zavatra ho avy.
  '8':
  - type: text
    content: Aza mangovitra na matahotra ianareo, ry vahoakako.
  - type: text
    content: Tsy Izaho ve no nampandre anareo
  - type: text
    content: ka nanambara izany taminareo hatry ny ela?
  - type: text
    content: Ianareo tokoa no vavolombeloko
  - type: text
    content: fa tsy misy Andriamanitra afa-tsy Izaho.
  - type: text
    content: Eny, tsy misy vatolampy hafa,
  - type: text
    content: tsy misy fantatro na iray aza.»
  - type: heading
    content: Ny mpanamboatra sampy
  '9':
  - type: text
    content: Zava-poana avokoa ny mpanao sarivongan-tsampy
  - type: text
    content: 'ary tsy mahasoa akory ny zavatra lalainy:'
  - type: text
    content: Ny sarivongan-tsampy no vavolombelona ho azy,
  - type: text
    content: kanefa vavolombelona tsy mahita akory,
  - type: text
    content: ary tsy mahalala na inona na inona
  - type: text
    content: ka handiso fanantenana azy.
