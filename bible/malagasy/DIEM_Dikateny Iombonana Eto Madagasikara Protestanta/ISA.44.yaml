  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa hanosaka rano amin’izay mangetaheta Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampandriaka renirano amin’ny tany mangentana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatosako amin’ny zanakao ny Fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary amin’ny taranakao ny fitahiako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Handrobona toy ny solofom-bolotara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na toy ny hazomalahelo eny amoron-drano izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny anankiray hanao hoe: ‹An’ny TOMPO aho›;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny iray hafa te hitondra ny anaran’i Jakôba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anankiray kosa dia eo amin’ny sandriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no hanoratany hoe: ‹Fananan’ny TOMPO›'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ny anaran’i Israely no hireharehany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fihantsiana ny andriamani-tsiizy
    marker-yv: yv-h
  '6':
