document_id: ISA.44,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa ankehitriny kosa mihainoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry firenen’i Jakôba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry vahoaka Israely izay nofidiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Iza no hanamboatra andriamani-tsiizy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handrendrika sarivongana tsy mahasoa akory?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Indreo ho menatra izay rehetra mpomba azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa olombelona ihany no namboatra ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avelao hivory sy hiseho izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hatahotra sy ho safo-kenatra avokoa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny mpanefy manapaka takela-by,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mandefa azy ao anaty afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy mamolavola azy amin’ny tantanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka miasa amin’ny sandriny mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo dia noana sy ketraka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy misotro rano ka reraka.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny mpandrafitra kosa mandrefy hazo amin’ny tady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy manamarika azy amin’ny tsaoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manamboatra azy amin’ny vankona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manamarika azy amin’ny kômpà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary manome azy endrik’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia endrik’olona tsara tarehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay hapetraka ao amin’ny tempoly anankiray.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Avahana ny hazo sedera hokapaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fidîna ny hazo terebinta na ôaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avela ho lehibe any an’ala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny hazo kesika volena koa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ranonorana no mampaniry azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ireny no ampiasain’ny olona ho kitay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka angalany hamindroana na handrahoan-tsakafo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireny ihany koa no anaovany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andriamanitra hiankohofany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy sarivongan-tsampy hivavahany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Araka izany ny antsasaky ny vatan-kazo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia dorana amin’ny afo ka itonoany hena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manatsatsika hena ny olona ka voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na mamindro koa izy ka manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Andray! Mafana aho izany! Nahita afo aho!»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny antsasaky ny vatan-kazo kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anamboarany andriamanitra ho sampiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izany no iondrehany sy iankohofany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sady ivavahany ataony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Vonjeo aho fa ianao no andriamanitro.»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy mahalala na inona na inona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy misaina ireny olona ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voatampina ny masony ka tsy mahita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady donto rahateo koa ny fony.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy misy mieritreritra ao am-pony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na mba mahalala handini-tena hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ny antsasak’ity vatan-kazo ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nodorako tamin’ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny vainafony no nanendasako mofo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nanatsatsihako hena hohaniko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny antsasaky ny vatan-kazo kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hanaovako sampy mamoafady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tapa-kazo no indro hiankohofako.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Izaho TOMPO izay mpanao anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namorona anao hatrany am-bohòka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sy manampy anao no indro milaza aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra, ry firenen’i Jakôba mpanompoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Jesoròna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jesoròna; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'anaram-bositra iantsoana an’i Israely ao amin’ny Deot 32.15; 33.5,26. Angamba ny dikany dia hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: olo-mahitsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ka mifanohitra amin’ny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (fangoloka).
      marker-yv: yv-n
    - type: text
      text: ' izay nofidiko.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mifikitra amin-javatra lasan-ko lavenona ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fony voafitaka no nampivily azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahafaka azy ny andriamaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'kanefa ny tenany koa tsy mahateny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hay moa ka andriamani-tsiizy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ity eto an-tanako ankavanana ity!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aza hadino fa mpanompoko ianao
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ry firenen’i Jakôba, ry vahoaka Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aoka hotsarovanao izao: «Mpanompoko ianao!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no namolavola anao hanompo Ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hohadinoiko ianao, ry vahoaka Israely!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nofafako toy ny rahona ny fahadisoanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nolevoniko toy ny zavona ny fahotanao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miverena amiko ianao fa efa navotako.»
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Miasa ny TOMPO ka mihobia, ry lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary miravoravoa, ry fanambanin’ny tany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy manako ny hoby, ry tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny ala sy ny hazo rehetra ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO efa nanavotra ny firenen’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa naneho voninahitra tamin’ny vahoaka Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay Mpamorona izao tontolo izao no mifehy ny tantara
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ry vahoaka Israely, ny TOMPO Izay nanavotra anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay namorona anao hatrany am-bohòka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia indro milaza aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izaho TOMPO no manao ny zavatra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho irery ihany no nanenjana ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy namelatra ny tany fa tsy nisy nanampy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Koa hataoko tsy misy vokany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny famantarana vitan’ny mpimasy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko mirediredy ny mpisikidy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hataoko mianòtra ny olon-kendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hody fahadalana ny fahalalàny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.25 '
      - type: usfm
        marker: ft
        children:
