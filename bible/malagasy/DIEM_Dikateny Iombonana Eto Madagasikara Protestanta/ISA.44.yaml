      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy misy Andriamanitra afa-tsy Izaho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha misy mihambo ho mitovy amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka izy hiteny sy handahatra momba izany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohazavainy amiko hoe iza, hatry ny fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nampandre ny zavatra tsy maintsy tonga;
  - type: usfm
    marker: q1
    children:
