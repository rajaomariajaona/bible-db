document_id: 1SA.22,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonga filohan-tarika i Davida
  - type: text
    content: Niala avy teo i Davida, dia nandositra niery tao an-johin’i Hadolama
  - type: note
    content: 'zohy: jereo Sal 57.1; 142.1. –Hadolama: toerana tokony ho 25 km ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: '. Raha nahafantatra izany ny rahalahiny sy ny fianakavian-drainy rehetra, dia nirohotra nankany aminy avokoa. '
  '10':
  - type: text
    content: Ary i Ahimelèka nanontany ny TOMPO ho azy, sady namatsy azy no nanome azy ilay sabatr’i Gôliata Filistinina
  - type: note
    content: 'And 9-10: jereo Sal 52.2.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Koa nampiantsoan’ny mpanjaka i Ahimelèka mpisorona sady zanakalahin’i Ahitoba, mbamin’ny mpisorona rehetra tao amin’ny fianakaviany izay nipetraka tao Nôba; ary tonga niseho teo anatrehan’ny mpanjaka avokoa izy rehetra. '
  '12':
  - type: text
    content: 'Dia hoy i Saoly tamin’i Ahimelèka:'
  - type: text
    content: –Henoy àry, ry zanakalahin’i Ahitoba.
  - type: text
    content: 'Ka novaliany hoe:'
  - type: text
    content: –Inty aho, tompoko.
  '13':
  - type: text
    content: 'Dia hoy i Saoly taminy:'
  - type: text
    content: –Nahoana no nioko hanohitra ahy ianao sy ny zanakalahin’i Jisay. Nomenao mofo sy sabatra izy; ary nanontany ny Tompo ho azy koa ianao, mba hijoroany hanohitra sy hamandrika ahy tahaka izao anio izao.
  '14':
  - type: text
    content: 'Hoy kosa no navalin’i Ahimelèka azy:'
  - type: text
    content: '–Iza amin’ny mpanomponao rehetra ireo no mba mahatoky indrindra tahaka an’i Davida vinanton’ny mpanjaka, mpiambina ny tenanao ary nohajaina fatratra tao an-dapa? '
  '15':
  - type: text
    content: Ary moa sambany androany no nanontaniako ho azy tamin’Andriamanitra? Koa sanatriaviko ny hikomy aminao, ry mpanjaka! Aza ahiahînao aho mpanomponao na ny fianakaviako fa tsy mahalala na inona na inona momba izany rehetra izany aho.
  '16':
  - type: text
    content: 'Fa hoy ny mpanjaka hoe:'
  - type: text
    content: –Ry Ahimelèka, tsy maintsy matiko ianao sy ny fianakavian-drainao manontolo.
  '17':
  - type: text
    content: 'Avy eo dia hoy ny mpanjaka tamin’ny miaramila mpanotrona azy teo akaikiny:'
  - type: text
    content: –Ndeha vonoy ho faty ny mpisoron’ny TOMPO, fa niray tsikombakomba tamin’i Davida izy ireo, satria nahafantatra ny fandosiran’i Davida izy, kanefa tsy nampandre ahy.
  - type: text
    content: 'Fa ny mpanompon’ny mpanjaka kosa tsy sahy nikasi-tanàna ny mpisoron’ny TOMPO. '
  '18':
  - type: text
    content: 'Koa hoy ny mpanjaka tamin’i Dôega:'
  - type: text
    content: –Mandehana vonoy ho faty ireo mpisorona ireo.
  - type: text
    content: 'Dia lasa tokoa i Dôega ilay Edômita ka izy mihitsy no namono nahafaty ny mpisorona. Lehilahy 85 mpisalotra ny akanjo masina no matiny androtrio ihany. '
  '19':
  - type: text
    content: 'Ary i Nôba tanànan’ny mpisorona koa nasiany tamin’ny lelan-tsabatra, ka ringana avokoa na ny lehilahy na ny vehivavy, na ny ankizy na ny zaza minono, na ny omby na ny boriky na ny ondry. '
  '2':
  - type: text
    content: Nitangorona teo aminy ny olona tokony ho efajato lahy, dia ireo olona sahirana sy ireo bokan-trosa ary ireo tsy faly; izy no tonga filohany.
  '20':
  - type: text
    content: 'Izany Abiatara zanakalahin’i Ahimelèka sy zafikelin’i Ahitoba izany ihany no hany afa-nandositra, ka namonjy nankany amin’i Davida. '
  '21':
  - type: text
    content: 'Nambaran’i Abiatara an’i Davida ny nandringanan’i Saoly ireo mpisoron’ny TOMPO. '
  '22':
  - type: text
    content: 'Ka hoy i Davida tamin’i Abiatara:'
  - type: text
    content: '–Tamin’iny andro iny, dia hitako tsara fa tao Nôba koa i Dôega ilay Edômita, ka fantatro fa hitantara ny zava-drehetra tamin’i Saoly izy. Koa ny tenako no tompon’andraikitra tamin’ny fahafatesan’ny fianakavian-drainao manontolo. '
  '23':
  - type: text
    content: Mitoera eto amiko ary aza matahotra; fa izay mitady ny ainao dia mitady ny aiko koa. Ho tsara antoka ianao eto.
  '3':
  - type: text
    content: Avy teo Hadolama i Davida, dia nankany Mitsepà
  - type: note
    content: 'Mitsepà: toerana tsy fantatra mazava ny misy azy.'
  - type: text
    content: ' any Môaba, ka hoy izy tamin’ny mpanjakan’i Môaba:'
  - type: text
    content: –Avelao re, tompoko, ny ray aman-dreniko mba ho avy hipetraka eto aminao mandra-pahafantarako izay tian’Andriamanitra hatao amiko.
  '4':
  - type: text
    content: Dia nentin’i Davida teo anatrehan’ny mpanjakan’i Môaba izy ireo ka nipetraka tao aminy nandritra ny fotoana rehetra nialokalofan’i Davida tao amin’ny fiereny.
  '5':
  - type: text
    content: 'Indray andro dia hoy i Gada '
  - type: text
    content: mpaminany
  - type: text
    content: ' tamin’i Davida:'
  - type: text
    content: –Aza mijanona ao amin’ny fierenao fa mandehana miverina any amin’ny tanin’i Joda.
  - type: text
    content: Dia lasa i Davida ka nankany amin’ny alan’i Hereta
  - type: note
    content: 'Ny alan’i Hereta: dia ao atsimon’i Hadolama.'
  - type: text
    content: .
  - type: heading
    content: Ny famonoana ho faty ireo mpisoron’i Nôba
  '6':
  - type: text
    content: Fantatr’i Saoly fa nisy nahita i Davida sy ireo niaraka taminy. Tany Gibehà
  - type: note
    content: 'Gibehà: jereo 10.5 sy nta.'
  - type: text
    content: ' i Saoly tamin’izay nipetraka teo ambanin’ny hazo tamariska tambony havoana, sady nitana lefona. Nijoro teo anilany ny mpanompony rehetra; ka hoy i Saoly tamin’izy ireo:'
  '7':
  - type: text
    content: –Henoy tsara, ry taranak’i Benjamîna! Moa ny zanakalahin’i Jisay
  - type: note
    content: 'Ny zanakalahin’i Jisay: dia i Davida, jereo 16.1-13.'
  - type: text
    content: ' ve hanome anareo rehetra saha sy tanim-boaloboka, ary hanendry anareo rehetra ho mpifehy ny antokon-tafiny? Tsia! '
  '8':
  - type: text
    content: Koa nahoana no mioko hikomy amiko ianareo rehetra? Ka tsy mba nisy nilaza tamiko fa ny zanako dia nanao dinam-pisakaizana tamin’ny zanakalahin’i Jisay. Tsy mba nisy taminareo nanahy kely akory ny amiko, raha nitaona ny mpanompoko hamela-pandrika ahy ny zanako, dia tahaka izay mitranga anio izao.
  '9':
  - type: text
    content: 'Dia hoy i Dôega, ilay Edômita izay nijoro teo akaikin’ireo mpanompon’i Saoly, hoe:'
  - type: text
    content: –Izaho nahita ny zanakalahin’i Jisay tonga tany Nôba tao amin’i Ahimelèka zanakalahin’i Ahitoba
  - type: note
    content: Jereo 21.2-10, indrindra 21.2 sy nta.
  - type: text
    content: '. '
