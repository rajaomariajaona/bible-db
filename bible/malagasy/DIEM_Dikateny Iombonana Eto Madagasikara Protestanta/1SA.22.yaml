document_id: 1SA.22,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonga filohan-tarika i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niala avy teo i Davida, dia nandositra niery tao an-johin’i Hadolama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'zohy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 57.1; 142.1. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hadolama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': toerana tokony ho 25 km ao atsimo andrefan’i Jerosalema.'
      marker-yv: yv-n
    - type: text
      text: '. Raha nahafantatra izany ny rahalahiny sy ny fianakavian-drainy rehetra, dia nirohotra nankany aminy avokoa. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary i Ahimelèka nanontany ny TOMPO ho azy, sady namatsy azy no nanome azy ilay sabatr’i Gôliata Filistinina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 9-10:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 52.2.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nampiantsoan’ny mpanjaka i Ahimelèka mpisorona sady zanakalahin’i Ahitoba, mbamin’ny mpisorona rehetra tao amin’ny fianakaviany izay nipetraka tao Nôba; ary tonga niseho teo anatrehan’ny mpanjaka avokoa izy rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly tamin’i Ahimelèka:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Henoy àry, ry zanakalahin’i Ahitoba.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inty aho, tompoko.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Saoly taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no nioko hanohitra ahy ianao sy ny zanakalahin’i Jisay. Nomenao mofo sy sabatra izy; ary nanontany ny Tompo ho azy koa ianao, mba hijoroany hanohitra sy hamandrika ahy tahaka izao anio izao.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa no navalin’i Ahimelèka azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Iza amin’ny mpanomponao rehetra ireo no mba mahatoky indrindra tahaka an’i Davida vinanton’ny mpanjaka, mpiambina ny tenanao ary nohajaina fatratra tao an-dapa? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary moa sambany androany no nanontaniako ho azy tamin’Andriamanitra? Koa sanatriaviko ny hikomy aminao, ry mpanjaka! Aza ahiahînao aho mpanomponao na ny fianakaviako fa tsy mahalala na inona na inona momba izany rehetra izany aho.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Ahimelèka, tsy maintsy matiko ianao sy ny fianakavian-drainao manontolo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy eo dia hoy ny mpanjaka tamin’ny miaramila mpanotrona azy teo akaikiny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha vonoy ho faty ny mpisoron’ny TOMPO, fa niray tsikombakomba tamin’i Davida izy ireo, satria nahafantatra ny fandosiran’i Davida izy, kanefa tsy nampandre ahy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpanompon’ny mpanjaka kosa tsy sahy nikasi-tanàna ny mpisoron’ny TOMPO. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy ny mpanjaka tamin’i Dôega:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandehana vonoy ho faty ireo mpisorona ireo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa tokoa i Dôega ilay Edômita ka izy mihitsy no namono nahafaty ny mpisorona. Lehilahy 85 mpisalotra ny akanjo masina no matiny androtrio ihany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Nôba tanànan’ny mpisorona koa nasiany tamin’ny lelan-tsabatra, ka ringana avokoa na ny lehilahy na ny vehivavy, na ny ankizy na ny zaza minono, na ny omby na ny boriky na ny ondry. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nitangorona teo aminy ny olona tokony ho efajato lahy, dia ireo olona sahirana sy ireo bokan-trosa ary ireo tsy faly; izy no tonga filohany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany Abiatara zanakalahin’i Ahimelèka sy zafikelin’i Ahitoba izany ihany no hany afa-nandositra, ka namonjy nankany amin’i Davida. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nambaran’i Abiatara an’i Davida ny nandringanan’i Saoly ireo mpisoron’ny TOMPO. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Davida tamin’i Abiatara:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tamin’iny andro iny, dia hitako tsara fa tao Nôba koa i Dôega ilay Edômita, ka fantatro fa hitantara ny zava-drehetra tamin’i Saoly izy. Koa ny tenako no tompon’andraikitra tamin’ny fahafatesan’ny fianakavian-drainao manontolo. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mitoera eto amiko ary aza matahotra; fa izay mitady ny ainao dia mitady ny aiko koa. Ho tsara antoka ianao eto.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy teo Hadolama i Davida, dia nankany Mitsepà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mitsepà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toerana tsy fantatra mazava ny misy azy.
      marker-yv: yv-n
    - type: text
      text: ' any Môaba, ka hoy izy tamin’ny mpanjakan’i Môaba:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avelao re, tompoko, ny ray aman-dreniko mba ho avy hipetraka eto aminao mandra-pahafantarako izay tian’Andriamanitra hatao amiko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentin’i Davida teo anatrehan’ny mpanjakan’i Môaba izy ireo ka nipetraka tao aminy nandritra ny fotoana rehetra nialokalofan’i Davida tao amin’ny fiereny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray andro dia hoy i Gada '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' tamin’i Davida:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aza mijanona ao amin’ny fierenao fa mandehana miverina any amin’ny tanin’i Joda.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa i Davida ka nankany amin’ny alan’i Hereta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny alan’i Hereta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ao atsimon’i Hadolama.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famonoana ho faty ireo mpisoron’i Nôba
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatr’i Saoly fa nisy nahita i Davida sy ireo niaraka taminy. Tany Gibehà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gibehà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 10.5 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' i Saoly tamin’izay nipetraka teo ambanin’ny hazo tamariska tambony havoana, sady nitana lefona. Nijoro teo anilany ny mpanompony rehetra; ka hoy i Saoly tamin’izy ireo:'
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Henoy tsara, ry taranak’i Benjamîna! Moa ny zanakalahin’i Jisay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny zanakalahin’i Jisay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia i Davida, jereo 16.1-13.
      marker-yv: yv-n
    - type: text
      text: ' ve hanome anareo rehetra saha sy tanim-boaloboka, ary hanendry anareo rehetra ho mpifehy ny antokon-tafiny? Tsia! '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Koa nahoana no mioko hikomy amiko ianareo rehetra? Ka tsy mba nisy nilaza tamiko fa ny zanako dia nanao dinam-pisakaizana tamin’ny zanakalahin’i Jisay. Tsy mba nisy taminareo nanahy kely akory ny amiko, raha nitaona ny mpanompoko hamela-pandrika ahy ny zanako, dia tahaka izay mitranga anio izao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Dôega, ilay Edômita izay nijoro teo akaikin’ireo mpanompon’i Saoly, hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izaho nahita ny zanakalahin’i Jisay tonga tany Nôba tao amin’i Ahimelèka zanakalahin’i Ahitoba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 21.2-10, indrindra 21.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
