document_id: EXO.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Mosesy sy i Jetrao, rafozan-dahiny
  - type: text
    content: 'Ary ren’i Jetrao, mpisorona tao Midiàna sady rafozan-dahin’i Mosesy, izay rehetra nataon’ny TOMPO ho an’i Mosesy sy ilay Israely vahoakany, dia ny namoahany azy niala tany Ejipta. '
  '10':
  - type: text
    content: 'ka hoy i Jetrao hoe:'
  - type: text
    content: –Hoderaina anie ny TOMPO Izay nanafaka anareo tamin’ny famoretan’ny Farao sy ny Ejiptianina
  - type: note
    content: Eto ny RM dia mamerina hoe Izay nanafaka ny vahoaka tamin’ny famoretan’ny Ejiptianina (izay karazana famerenana ara-bakiteny ny fehezanteny etsy aloha).
  - type: text
    content: '. '
  '11':
  - type: text
    content: Fantatro izao fa ny TOMPO dia lehibe mihoatra noho ny andriamanitra hafa rehetra; ny zavatra izay nataony rehefa nisetrasetra taminareo ny Ejiptianina no nanehoany izany
  - type: note
    content: 'no nanehoany izany: dkt tsy azo antoka avy amin’ny RM tsy mazava.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'Nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana tamin’Andriamanitra i Jetrao. Koa tonga i Aharôna sy ny '
  - type: text
    content: loholon
  - type: text
    content: ’i Israely rehetra hihinana ny sakafo masina niaraka tamin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
  - type: heading
    content: Manendry ireo mpifehy handray anjara amin’ny fitsarana i Mosesy
  '13':
  - type: text
    content: 'Nony ampitso dia nipetraka mba hitsara ny adin’ny vahoaka i Mosesy. Nanomboka ny maraina ka mandra-paharivan’ny andro dia nijajirika teo ny olona mba hahazo miseho eo anatrehan’i Mosesy. '
  '14':
  - type: text
    content: 'Koa raha nahita ireo zavatra rehetra tsy maintsy hataony amin’i vahoaka ny rafozany, dia niteny tamin’i Mosesy hoe:'
  - type: text
    content: '–Inona izao zavatra ataonao amin’ny vahoaka izao? Nahoana no ianao irery no manao ny asa, ka mahatonga ny olona hijajirika manomboka ny maraina ka mandra-paharivan’ny andro rehefa hiseho eo anatrehanao? '
  '15':
  - type: text
    content: 'Fa namaly an-drafozany i Mosesy hoe:'
  - type: text
    content: '–Satria ireo olona ireo dia tonga atỳ amiko mba hitady ny fitsarana avy amin’Andriamanitra. '
  '16':
  - type: text
    content: 'Rehefa misy raharaha mampifanolana azy, dia tonga atỳ amiko izy ireo: mitsara ny raharaha mampifanolana azy aho, ary mampahafantatra azy ny fitsipik’Andriamanitra sy ny lalànany. '
  '17':
  - type: text
    content: 'Dia hoy indray ny rafozany:'
  - type: text
    content: '–Tsy tsara ny fomba anaovanao ny raharaha! '
  '18':
  - type: text
    content: 'Samy ho reraka mihitsy na ianao na ireto olona tonga atỳ aminao. Mavesatra loatra aminao izao andraikitra izao ka tsy ho vitanao samirery! '
  '19':
  - type: text
    content: 'Henoy àry ny torohevitro aminao, ka homba anao anie Andriamanitra: Ny anjaranao dia ny misolotena ny vahoaka amin’Andriamanitra, ka mitondra eo anatrehan’Andriamanitra ny raharaha mampifanolana. '
  '2':
  - type: text
    content: Taorian’ny nandefasan’i Mosesy an’i Tsipôrà telo mianaka tany amin’i Jetrao, dia nentin’i Jetrao i Tsipôrà zanany vavy, vadin’i Mosesy
  - type: note
    content: Tsy fantatra hoe oviana na tamin’ny fomba ahoana no nangatahan’i Mosesy ny rafozany mba handray ireo vady aman-janany.
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'Ianao koa no hampianatra azy ny fitsipik’Andriamanitra sy ny lalànany, ka hampahalala azy ny lalana tokony hizorany sy ny asa tokony hataony. '
  '21':
  - type: text
    content: 'Fa ny amin’ny sisa, dia mifidiana lehilahy be herimpo ao amin’ny vahoaka, dia lehilahy fatra-panaja an’Andriamanitra, tia fahamarinana sady tsy mandray tsolotra; ka tendreo ireo ho mpifehy arivo sy mpifehy zato na ho mpifehy dimampolo sy mpifehy folo. '
  '22':
  - type: text
    content: 'Ireo no hitsara ny vahoaka isan’andro, ka ny raharaha lehibe no hoentiny any aminao, fa ny raharaha madinika dia halaminy ihany. Amin’izay dia hihamaivana ny andraikitrao fa miara-mitondra aminao ireo. '
  '23':
  - type: text
    content: Raha ataonao izany zavatra izany, ka izay no andidian’Andriamanitra anao, dia tsy ho reraka ianao; ary ny olona koa dia ho afaka mody any aminy vita fihavanana
  - type: note
    content: ho afaka mody... fihavanana na ho tonga amim-piadanana any amin’izay haleha.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Narahin’i Mosesy avokoa ny torohevitry ny rafozany: '
  '25':
  - type: text
    content: 'nifidy lehilahy be herimpo teo amin’ny Israelita izy, ka nanendry azy ho tompon’andraikitra amin’ny vahoaka, ho mpifehy arivo sy mpifehy zato na ho mpifehy dimampolo sy mpifehy folo. '
  '26':
  - type: text
    content: Ireo no nitsara ny vahoaka isan’andro amin’ny zavatra madinika mampifanolana azy; ny raharaha lehibe dia nentiny tany amin’i Mosesy, fa ny raharaha madinika dia nalaminy ihany.
  '27':
  - type: text
    content: Dia nalefan’i Mosesy nandeha nody any amin’ny taniny ny rafozany.
  '3':
  - type: text
    content: niaraka tamin’ny zanany roa lahy
  - type: note
    content: 'zanany roa lahy: jereo Asa 7.29.'
  - type: text
    content: '. Ny lahimatoa dia nantsoin’i Mosesy hoe Gersôma na «Vahiny atỳ», fa hoy izy hoe: «Efa vahiny atỳ an-tany hafa aho»; '
  '4':
  - type: text
    content: ary ilay zandriny kosa nantsoiny hoe Elihezera
  - type: note
    content: 'Elihezera: eto no ilazana voalohany ity zanakalahy faharoan’i Mosesy ity ao amin’ny RM; ny dkt tranainy latinina dia efa miresaka azy sahady ao amin’ny 2.22.'
  - type: text
    content: ' na «Andriamanitro mamonjy ahy», fa hoy izy hoe: «Ny Andriamanitry ny raiko no namonjy ahy, ka niaro ahy tamin’ny famelezan’ny '
  - type: text
    content: Farao
  - type: text
    content: '.» '
  '5':
  - type: text
    content: Dia lasa i Jetrao niaraka tamin’ny vady aman-janak’i Mosesy nankany amin’i Mosesy tany an-taniefitra, dia izay nitobiany teo anilan’ny tendrombohitr’Andriamanitra
  - type: note
    content: 'tendrombohitr’Andriamanitra: jereo 3.1. sy nta.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Nampilaza tamin’i Mosesy i Jetrao hoe: «Izaho rafozanao no ho avy any aminao, miaraka amin’ny vadinao sy ny zanakao roa lahy.» '
  '7':
  - type: text
    content: 'Dia niainga hitsena azy i Mosesy, niankohoka teo anatrehany sady nanoroka azy. Ary rehefa avy nifampiarahaba izy dia niditra tao an-dain’i Mosesy. '
  '8':
  - type: text
    content: 'Notantarain’i Mosesy tamin’ny rafozany avokoa izay rehetra nataon’ny TOMPO tamin’ny Farao sy ny Ejiptianina noho ny amin’i Israely; notantarainy koa ny zava-tsarotra rehetra niseho teny an-dalana sy ny nanafahan’ny TOMPO ilay vahoakany. '
  '9':
  - type: text
    content: 'Nahafaly an’i Jetrao ny soa rehetra nataon’ny TOMPO tamin’ny Israelita izay nafahany tamin’ny famoretan’ny Ejiptianina, '
