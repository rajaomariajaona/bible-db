document_id: EXO.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Mosesy sy i Jetrao, rafozan-dahiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ren’i Jetrao, mpisorona tao Midiàna sady rafozan-dahin’i Mosesy, izay rehetra nataon’ny TOMPO ho an’i Mosesy sy ilay Israely vahoakany, dia ny namoahany azy niala tany Ejipta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ka hoy i Jetrao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hoderaina anie ny TOMPO Izay nanafaka anareo tamin’ny famoretan’ny Farao sy ny Ejiptianina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Eto ny RM dia mamerina hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Izay nanafaka ny vahoaka tamin’ny famoretan’ny Ejiptianina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (izay karazana famerenana ara-bakiteny ny fehezanteny etsy aloha).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fantatro izao fa ny TOMPO dia lehibe mihoatra noho ny andriamanitra hafa rehetra; ny zavatra izay nataony rehefa nisetrasetra taminareo ny Ejiptianina no nanehoany izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'no nanehoany izany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dkt tsy azo antoka avy amin’ny RM tsy mazava.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana tamin’Andriamanitra i Jetrao. Koa tonga i Aharôna sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: ’i Israely rehetra hihinana ny sakafo masina niaraka tamin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manendry ireo mpifehy handray anjara amin’ny fitsarana i Mosesy
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nony ampitso dia nipetraka mba hitsara ny adin’ny vahoaka i Mosesy. Nanomboka ny maraina ka mandra-paharivan’ny andro dia nijajirika teo ny olona mba hahazo miseho eo anatrehan’i Mosesy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa raha nahita ireo zavatra rehetra tsy maintsy hataony amin’i vahoaka ny rafozany, dia niteny tamin’i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Inona izao zavatra ataonao amin’ny vahoaka izao? Nahoana no ianao irery no manao ny asa, ka mahatonga ny olona hijajirika manomboka ny maraina ka mandra-paharivan’ny andro rehefa hiseho eo anatrehanao? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa namaly an-drafozany i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Satria ireo olona ireo dia tonga atỳ amiko mba hitady ny fitsarana avy amin’Andriamanitra. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa misy raharaha mampifanolana azy, dia tonga atỳ amiko izy ireo: mitsara ny raharaha mampifanolana azy aho, ary mampahafantatra azy ny fitsipik’Andriamanitra sy ny lalànany. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy indray ny rafozany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy tsara ny fomba anaovanao ny raharaha! '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Samy ho reraka mihitsy na ianao na ireto olona tonga atỳ aminao. Mavesatra loatra aminao izao andraikitra izao ka tsy ho vitanao samirery! '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Henoy àry ny torohevitro aminao, ka homba anao anie Andriamanitra: Ny anjaranao dia ny misolotena ny vahoaka amin’Andriamanitra, ka mitondra eo anatrehan’Andriamanitra ny raharaha mampifanolana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Taorian’ny nandefasan’i Mosesy an’i Tsipôrà telo mianaka tany amin’i Jetrao, dia nentin’i Jetrao i Tsipôrà zanany vavy, vadin’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy fantatra hoe oviana na tamin’ny fomba ahoana no nangatahan’i Mosesy ny rafozany mba handray ireo vady aman-janany.
      marker-yv: yv-n
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ianao koa no hampianatra azy ny fitsipik’Andriamanitra sy ny lalànany, ka hampahalala azy ny lalana tokony hizorany sy ny asa tokony hataony. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ny amin’ny sisa, dia mifidiana lehilahy be herimpo ao amin’ny vahoaka, dia lehilahy fatra-panaja an’Andriamanitra, tia fahamarinana sady tsy mandray tsolotra; ka tendreo ireo ho mpifehy arivo sy mpifehy zato na ho mpifehy dimampolo sy mpifehy folo. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ireo no hitsara ny vahoaka isan’andro, ka ny raharaha lehibe no hoentiny any aminao, fa ny raharaha madinika dia halaminy ihany. Amin’izay dia hihamaivana ny andraikitrao fa miara-mitondra aminao ireo. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Raha ataonao izany zavatra izany, ka izay no andidian’Andriamanitra anao, dia tsy ho reraka ianao; ary ny olona koa dia ho afaka mody any aminy vita fihavanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ho afaka mody... fihavanana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na ho tonga amim-piadanana any amin’izay haleha.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Narahin’i Mosesy avokoa ny torohevitry ny rafozany: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'nifidy lehilahy be herimpo teo amin’ny Israelita izy, ka nanendry azy ho tompon’andraikitra amin’ny vahoaka, ho mpifehy arivo sy mpifehy zato na ho mpifehy dimampolo sy mpifehy folo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ireo no nitsara ny vahoaka isan’andro amin’ny zavatra madinika mampifanolana azy; ny raharaha lehibe dia nentiny tany amin’i Mosesy, fa ny raharaha madinika dia nalaminy ihany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nalefan’i Mosesy nandeha nody any amin’ny taniny ny rafozany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: niaraka tamin’ny zanany roa lahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zanany roa lahy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Asa 7.29.
      marker-yv: yv-n
    - type: text
      text: '. Ny lahimatoa dia nantsoin’i Mosesy hoe Gersôma na «Vahiny atỳ», fa hoy izy hoe: «Efa vahiny atỳ an-tany hafa aho»; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ary ilay zandriny kosa nantsoiny hoe Elihezera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Elihezera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto no ilazana voalohany ity zanakalahy faharoan’i Mosesy ity ao amin’ny RM; ny dkt tranainy latinina dia efa miresaka azy sahady ao amin’ny 2.22.
      marker-yv: yv-n
    - type: text
      text: ' na «Andriamanitro mamonjy ahy», fa hoy izy hoe: «Ny Andriamanitry ny raiko no namonjy ahy, ka niaro ahy tamin’ny famelezan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: '.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia lasa i Jetrao niaraka tamin’ny vady aman-janak’i Mosesy nankany amin’i Mosesy tany an-taniefitra, dia izay nitobiany teo anilan’ny tendrombohitr’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tendrombohitr’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 3.1. sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nampilaza tamin’i Mosesy i Jetrao hoe: «Izaho rafozanao no ho avy any aminao, miaraka amin’ny vadinao sy ny zanakao roa lahy.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia niainga hitsena azy i Mosesy, niankohoka teo anatrehany sady nanoroka azy. Ary rehefa avy nifampiarahaba izy dia niditra tao an-dain’i Mosesy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Notantarain’i Mosesy tamin’ny rafozany avokoa izay rehetra nataon’ny TOMPO tamin’ny Farao sy ny Ejiptianina noho ny amin’i Israely; notantarainy koa ny zava-tsarotra rehetra niseho teny an-dalana sy ny nanafahan’ny TOMPO ilay vahoakany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nahafaly an’i Jetrao ny soa rehetra nataon’ny TOMPO tamin’ny Israelita izay nafahany tamin’ny famoretan’ny Ejiptianina, '
