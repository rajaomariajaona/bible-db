document_id: SNG.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manonofy mitady ilay tiany ravehivavy
  - type: heading
    content: (Ravehivavy)
  - type: text
    content: Isan’alina aho eo am-pandriako iny
  - type: text
    content: dia mitady ilay tiako;
  - type: text
    content: tadiaviko izy fa tsy hitako.
  '10':
  - type: text
    content: Volafotsy no natao tanjany,
  - type: text
    content: volamena ny fiankinana,
  - type: text
    content: lamba volomparasy ny fipetrahana;
  - type: text
    content: ary ny ao anatin’io filanjana io
  - type: text
    content: dia ireo tovovavin’i Jerosalema
  - type: text
    content: no nandravaka azy tamim-pitiavana.
  '11':
  - type: text
    content: «Ry tovovavin’i Jerosalema ô,
  - type: text
    content: andao hijery an’i Salômôna mpanjaka
  - type: text
    content: manao ilay satroboninahitra
  - type: text
    content: izay nasatroky ny reniny azy
  - type: text
    content: tamin’ny androm-panambadiany,
  - type: text
    content: dia ilay andro nifalian’ny fony.»
  - type: heading
    content: (Ralehilahy)
  '2':
  - type: text
    content: Hifoha aho ka hitety ny tanàna,
  - type: text
    content: hamakivaky arabe sy kianja,
  - type: text
    content: mba hitady ilay tiako;
  - type: text
    content: tadiaviko izy fa tsy hitako.
  '3':
  - type: text
    content: Ireo mpiambina misafo ny tanàna
  - type: text
    content: 'no tojo ahy ka anontaniako hoe:'
  - type: text
    content: «Mba hitanareo ve ilay tiako izay?»
  '4':
  - type: text
    content: Vao nolalovako kely ireo,
  - type: text
    content: dia hitako ilay tiako;
  - type: text
    content: ka hazoniko izy fa tsy avelako,
  - type: text
    content: raha tsy tongako any an-trano
  - type: text
    content: ao an’efitr’ilay reny niteraka ahy.
  - type: heading
    content: (Ralehilahy)
  '5':
  - type: text
    content: «Ry tovovavin’i Jerosalema ô,
  - type: text
    content: noho ny amin’ny gazela
  - type: text
    content: na ny dieravavy eny an-tsaha,
  - type: text
    content: 'dia miangavy mafy anareo aho hoe:'
  - type: text
    content: Aza tairina na fohazina ilay tiako,
  - type: text
    content: raha tsy efa sitrapony
  - type: note
    content: Jereo 2.7 sy nta.
  - type: text
    content: '!»'
  - type: heading
    content: (Ravehivavy)
  '6':
  - type: text
    content: Iza moa irỳ miakatra avy any an-taniefitra
  - type: note
    content: Azo heverina fa tononkalo natao tamin’ny fanambadian’i Salômôna mpanjaka no averin’ilay zazavavy eto (and 6-11), ka ampihariny kosa indray amin’ilay olon-tiany, tahaka izay efa nampiharany ny fiantsoana hoe mpanjakako tao amin’ny 1.4,12.
  - type: text
    content: tahaka ny setroka mitambolimbolina
  - type: text
    content: 'ho etona mandraradraraka '
  - type: text
    content: miora
  - type: text
    content: sy emboka mamerovero
  - type: text
    content: ary fofon-javamanitra isan-karazany?
  '7':
  - type: text
    content: –I Salômôna eo amin’ny filanjàny iny,
  - type: text
    content: otronin’ny miaramila enimpolo,
  - type: text
    content: dia miaramila voafantina tamin’i Israely.
  '8':
  - type: text
    content: Mirongo sabatra avokoa ireo
  - type: text
    content: sady efa voasedra hiady.
  - type: text
    content: Misakelika ny sabany avy izy
  - type: text
    content: hiatrehana fanairana amin’ny alina.
  '9':
  - type: text
    content: Nampanao filanjana ho azy
  - type: text
    content: tamin’ny hazo avy any Libano
  - type: text
    content: i Salômôna mpanjaka.
