document_id: SNG.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manonofy mitady ilay tiany ravehivavy
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ravehivavy)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Isan’alina aho eo am-pandriako iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia mitady ilay tiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tadiaviko izy fa tsy hitako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Volafotsy no natao tanjany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: volamena ny fiankinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lamba volomparasy ny fipetrahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ao anatin’io filanjana io
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo tovovavin’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandravaka azy tamim-pitiavana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: «Ry tovovavin’i Jerosalema ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andao hijery an’i Salômôna mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manao ilay satroboninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nasatroky ny reniny azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny androm-panambadiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ilay andro nifalian’ny fony.»
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ralehilahy)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hifoha aho ka hitety ny tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamakivaky arabe sy kianja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitady ilay tiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tadiaviko izy fa tsy hitako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ireo mpiambina misafo ny tanàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no tojo ahy ka anontaniako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mba hitanareo ve ilay tiako izay?»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vao nolalovako kely ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitako ilay tiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hazoniko izy fa tsy avelako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy tongako any an-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao an’efitr’ilay reny niteraka ahy.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (Ralehilahy)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: «Ry tovovavin’i Jerosalema ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny amin’ny gazela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny dieravavy eny an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia miangavy mafy anareo aho hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza tairina na fohazina ilay tiako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy efa sitrapony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 2.7 sy nta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (Ravehivavy)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Iza moa irỳ miakatra avy any an-taniefitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Azo heverina fa tononkalo natao tamin’ny fanambadian’i Salômôna mpanjaka no averin’ilay zazavavy eto (and 6-11), ka ampihariny kosa indray amin’ilay olon-tiany, tahaka izay efa nampiharany ny fiantsoana hoe mpanjakako tao amin’ny 1.4,12.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny setroka mitambolimbolina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ho etona mandraradraraka '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy emboka mamerovero
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fofon-javamanitra isan-karazany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: –I Salômôna eo amin’ny filanjàny iny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: otronin’ny miaramila enimpolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miaramila voafantina tamin’i Israely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mirongo sabatra avokoa ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady efa voasedra hiady.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misakelika ny sabany avy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiatrehana fanairana amin’ny alina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nampanao filanjana ho azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny hazo avy any Libano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: i Salômôna mpanjaka.
