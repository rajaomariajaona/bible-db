document_id: JOS.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Lisitry ny mpanjaka resin’ny Israelita
  - type: text
    content: 'Mpanjaka roa no efa noresen’ny Israelita tany atsinanan’i Jôrdàna ka nobodoiny ny taniny, nanomboka hatreo amin’ny lohasahan-driaka Arnôna ka hatrany amin’ny tendrombohitra Hermôna, ary mahafaoka ny lohasahan’i Jôrdàna ilany atsinanana. '
  '10':
  - type: text
    content: 'i Jerosalema, i Hebrôna, '
  '11':
  - type: text
    content: 'i Jarmôta, i Lakisy, '
  '12':
  - type: text
    content: 'i Heglôna, i Gezera, '
  '13':
  - type: text
    content: 'i Debira, i Gedera, '
  '14':
  - type: text
    content: 'i Hôrmà, i Harada, '
  '15':
  - type: text
    content: 'i Libnà, i Hadolama, '
  '16':
  - type: text
    content: 'i Makedà, i Betela, '
  '17':
  - type: text
    content: 'i Tapoa, i Hefera, '
  '18':
  - type: text
    content: 'i Afeka, i Sarôna, '
  '19':
  - type: text
    content: 'i Madôna, i Hatsôra, '
  '2':
  - type: text
    content: 'Ny voalohany dia i Sihôna, mpanjaka '
  - type: text
    content: amôrita
  - type: text
    content: ' izay nonina tao Hesbôna: izy no nanjaka tamin’ny antsasaky ny lohasahan-driaka Arnôna hatreo Harôhera no midina, sy tamin’ny antsasaky ny faritany Gilehada tafapaka hatrany amin’ny renirano Jabôka izay sisintanin’ny Hamônita; '
  '20':
  - type: text
    content: 'i Simrôna-Merôna, i Aksafa, '
  '21':
  - type: text
    content: 'i Tahenàka, i Megidao, '
  '22':
  - type: text
    content: 'i Kedesa, i Jôknehama any Karmela, '
  '23':
  - type: text
    content: i Dôra eo amoron-tsiraka, i Gôima any Galilea
  - type: note
    content: any Galilea araka ny dkt grika tranainy Septoazinta; fa ny TM dia milaza hoe any Gilgala.
  - type: text
    content: ', '
  '24':
  - type: text
    content: ary i Tiritsà; ka 31 izany no isan’ireo mpanjaka rehetra ireo.
  '3':
  - type: text
    content: 'azy koa ny lohasahan’i Jôrdàna ilay atsinanana, manomboka hatreo amin’ny farihin’i Genesareta any avaratra, ka hatrany amin’ny Ranomasina Maty eo akaikin’i Bety-Jesimôta; ary tao atsimo kokoa dia azy ny faritany eo am-pototry ny havoana Pisgà. '
  '4':
  - type: text
    content: Ny faharoa dia i Hôga, iray amin’ireo Refaîta sisa tavela
  - type: note
    content: Jereo Deot 2.11 sy nta.
  - type: text
    content: '; mpanjakan’i '
  - type: text
    content: Basàna
  - type: text
    content: ' izy ary nipetraka tao Hastarôta na Edrehỳ. '
  '5':
  - type: text
    content: 'Ny faritra nanjakan’i Hôga dia ireto avy: ny tendrombohitra Hermôna; i Salà, i Basàna manontolo tafapaka hatrany amin’ny sisin-tanin’ny Gesorita sy Mahekatita'
  - type: note
    content: Jereo Deot 3.14.
  - type: text
    content: '; ary farany ny antsasaky ny faritrany Gilehada tafapaka hatrany amin’ny sisin-tanin’i Sihôna, mpanjakan’i Hesbôna. '
  '6':
  - type: text
    content: Resin’i Mosesy sy ny Israelita ry i Sihôna sy i Hôga; ka ny taniny dia nomen’i Mosesy, mpanompon’ny TOMPO, ho lovan’ny fokon’i Reobena sy ny fokon’i Gada ary ny antsasa-pokon’i Manase.
  '7':
  - type: text
    content: 'Avy eo i Josoa sy ny Israelita dia nandresy ireo mpanjaka teny an-dafy andrefan’i Jôrdàna, manomboka hatreo Bahala-Gada ao amin’ny lohasahan’i Libano any avaratra ka hatrany amin’ilay tendrombohitra ngazana miakatra ho any Sehira any atsimo. Nozarazarain’i Josoa izany tany izany ho fananan’ireo foko israelita sisa. '
  '8':
  - type: text
    content: 'Isan’izany ny faritra be tendrombohitra, ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ', ny lohasahan’i Jôrdàna, ny kisolosolo, ary ny taniefitra sy i Negeba any atsimo: ireo faritra ireo dia an’ny Hetita sy Amôrita, an’ny Kanahanita sy Perizita, ary an’ny Hivita sy Jebosita. '
  '9':
  - type: text
    content: 'Ireto kosa ireo tanàna nisy mpanjaka resy: i Jerikao, i Hay akaikin’i Betela, '
