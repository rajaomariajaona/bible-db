document_id: JOS.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lisitry ny mpanjaka resin’ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mpanjaka roa no efa noresen’ny Israelita tany atsinanan’i Jôrdàna ka nobodoiny ny taniny, nanomboka hatreo amin’ny lohasahan-driaka Arnôna ka hatrany amin’ny tendrombohitra Hermôna, ary mahafaoka ny lohasahan’i Jôrdàna ilany atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny voalohany dia i Sihôna, mpanjaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: amôrita
  - type: text
    text: ' izay nonina tao Hesbôna: izy no nanjaka tamin’ny antsasaky ny lohasahan-driaka Arnôna hatreo Harôhera no midina, sy tamin’ny antsasaky ny faritany Gilehada tafapaka hatrany amin’ny renirano Jabôka izay sisintanin’ny Hamônita; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'azy koa ny lohasahan’i Jôrdàna ilay atsinanana, manomboka hatreo amin’ny farihin’i Genesareta any avaratra, ka hatrany amin’ny Ranomasina Maty eo akaikin’i Bety-Jesimôta; ary tao atsimo kokoa dia azy ny faritany eo am-pototry ny havoana Pisgà. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny faharoa dia i Hôga, iray amin’ireo Refaîta sisa tavela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 2.11 sy nta.
    marker-yv: yv-n
  - type: text
    text: '; mpanjakan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Basàna
  - type: text
    text: ' izy ary nipetraka tao Hastarôta na Edrehỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny faritra nanjakan’i Hôga dia ireto avy: ny tendrombohitra Hermôna; i Salà, i Basàna manontolo tafapaka hatrany amin’ny sisin-tanin’ny Gesorita sy Mahekatita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 3.14.
    marker-yv: yv-n
  - type: text
    text: '; ary farany ny antsasaky ny faritrany Gilehada tafapaka hatrany amin’ny sisin-tanin’i Sihôna, mpanjakan’i Hesbôna. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Resin’i Mosesy sy ny Israelita ry i Sihôna sy i Hôga; ka ny taniny dia nomen’i Mosesy, mpanompon’ny TOMPO, ho lovan’ny fokon’i Reobena sy ny fokon’i Gada ary ny antsasa-pokon’i Manase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy eo i Josoa sy ny Israelita dia nandresy ireo mpanjaka teny an-dafy andrefan’i Jôrdàna, manomboka hatreo Bahala-Gada ao amin’ny lohasahan’i Libano any avaratra ka hatrany amin’ilay tendrombohitra ngazana miakatra ho any Sehira any atsimo. Nozarazarain’i Josoa izany tany izany ho fananan’ireo foko israelita sisa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isan’izany ny faritra be tendrombohitra, ny lemak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sefelà
  - type: text
    text: ', ny lohasahan’i Jôrdàna, ny kisolosolo, ary ny taniefitra sy i Negeba any atsimo: ireo faritra ireo dia an’ny Hetita sy Amôrita, an’ny Kanahanita sy Perizita, ary an’ny Hivita sy Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ireto kosa ireo tanàna nisy mpanjaka resy: i Jerikao, i Hay akaikin’i Betela, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'i Jerosalema, i Hebrôna, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'i Jarmôta, i Lakisy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'i Heglôna, i Gezera, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'i Debira, i Gedera, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'i Hôrmà, i Harada, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'i Libnà, i Hadolama, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'i Makedà, i Betela, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Tapoa, i Hefera, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'i Afeka, i Sarôna, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'i Madôna, i Hatsôra, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'i Simrôna-Merôna, i Aksafa, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'i Tahenàka, i Megidao, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'i Kedesa, i Jôknehama any Karmela, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: i Dôra eo amoron-tsiraka, i Gôima any Galilea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Galilea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny dkt grika tranainy Septoazinta; fa ny TM dia milaza hoe any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gilgala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ary i Tiritsà; ka 31 izany no isan’ireo mpanjaka rehetra ireo.
