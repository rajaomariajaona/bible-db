document_id: ACT.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiovam-pon’i Saoly
  - type: text
    content: 'Tamin’izay i Saoly dia tsy nanampo afa-tsy ny handrahona sy ny handripaka ny '
  - type: text
    content: mpianatry
  - type: text
    content: ' ny Tompo. Nanatona ny mpisorombe izy, '
  '10':
  - type: text
    content: 'Tao Damasy tamin’izay dia nisy mpianatra atao hoe Hananià. Nisehoan’ny Tompo tamin’ny alalan’ny fahitana izy ka nilazany hoe:'
  - type: text
    content: –Ry Hananià!
  - type: text
    content: 'Dia hoy ny navaliny:'
  - type: text
    content: –Intỳ aho, Tompoko!
  '11':
  - type: text
    content: 'Ary hoy ny Tompo tamin’i Hananià:'
  - type: text
    content: –Mankanesa izao dia izao any amin’ilay lalana atao hoe Imahitsy; ka anontanio ao an-tranon’i Joda fa misy lehilahy atao hoe Saoly avy any Tarsa. Mivavaka indrindra izy amin’izao fotoana izao.
  - type: text
    content: '( '
  '12':
  - type: text
    content: Tamin’izay i Saoly dia nisehoam-pahitana ary nahatazana lehilahy atao hoe Hananià, izay niditra tao aminy sy nametra-tanana taminy mba hahiratan’ny masony indray.)
  '13':
  - type: text
    content: 'Izao kosa no navalin’i Hananià:'
  - type: text
    content: '–Maro, Tompoko, ny olona niresaka tamiko momba io lehilahy io ka samy nilaza ny ratsy rehetra vitany tamin’ireo anisan’ny '
  - type: text
    content: vahoakanao
  - type: text
    content: ' tany Jerosalema. '
  '14':
  - type: text
    content: Ary nomen’ireo lohandoha-mpisorona fahefana izy no tonga eto, mba hamatotra izay rehetra miantso ny anaranao.
  '15':
  - type: text
    content: 'Fa hoy ny Tompo taminy:'
  - type: text
    content: '–Mandehana, fa io lehilahy io dia nofidiko sy hampiasaiko mba hampahafantatra Ahy amin’ireo '
  - type: text
    content: hafa firenena
  - type: text
    content: ' sy amin’ny mpanjaka ary amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: '. '
  '16':
  - type: text
    content: Hasehoko azy ny mafy rehetra tsy maintsy hiaretany ho voninahitro.
  '17':
  - type: text
    content: 'Dia niainga i Hananià ka niditra tao an-tranon’i Joda, ary nametra-tanana tamin’i Saoly sady nanao hoe: Ry Saoly rahalahiko, i Jesoa Tompo, Izay niseho taminao teny an-dalana, no naniraka ahy mba hahiratan’ny masonao indray ary mba hahatonga anao ho feno Fanahy Masina.'
  '18':
  - type: text
    content: 'Teo no ho eo ihany dia nisy zavatra toy ny kiran-kazandrano niala avy tamin’ny mason’i Saoly, ka nahiratra indray izy. Avy hatrany koa izy dia natao '
  - type: text
    content: batisa
  - type: text
    content: ', '
  '19':
  - type: text
    content: ary dia nihinan-kanina ka nihatanjaka.
  - type: heading
    content: Mitoriteny ao Damasy i Saoly
  - type: text
    content: 'Niara-nitoetra mandritra ny andro vitsivitsy tamin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' tany Damasy i Saoly. '
  '2':
  - type: text
    content: 'ary nangataka taratasy hahazoany miditra amin’ireo sinagôga any Damasy: ny nokendreny dia ny hamatotra sy hitondra mankatỳ Jerosalema izay olona tratrany manaraka ny lalana nosoritan’ny Tompo'
  - type: note
    content: Ampit Is 30.21; Sal 27.11.
  - type: text
    content: ', na lahy na vavy.'
  '20':
  - type: text
    content: 'Tsy nangataka andro i Saoly fa nitoriteny tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ', nanambara fa i Jesoa no ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Dia talanjona ny olona rehetra nandre azy ka nanontany hoe:'
  - type: text
    content: –Tsy ity lehilahy ity indrindra ve no mpanenjika lozan-tany an’ireo niantso ny anaran’i Jesoa tany Jerosalema? Ary ny anton-diany atỳ, moa ve tsy ny hamatotra ny olona toy izany sy hitondra azy mankany amin’ny lohandoha-mpisorona?
  '22':
  - type: text
    content: 'Vao mainka feno hery ny toritenin’i Saoly: nasehony marimarina fa i Jesoa no '
  - type: text
    content: Mesia
  - type: text
    content: ', hany ka resy lahatra ny Jiosy mponina tao Damasy.'
  '23':
  - type: text
    content: 'Rehefa afaka andro maromaro, dia niara-nioko hamono an’i Saoly ny Jiosy; '
  '24':
  - type: text
    content: 'saingy nampahafantarina an’i Saoly mialoha izany fiokoana izany. Nambenan-dry zareo Jiosy andro aman’alina ny vavahadin’ny tanàna mba hamonoana an’i Saoly. '
  '25':
  - type: text
    content: Kanjo nalain’ny mpianatra i Saoly indray alina, dia nataony tao anaty sobika, ary nampidininy tany ivelan’ny manda
  - type: note
    content: 'And 23-25: ampit 2Kôr 11.32-33.'
  - type: text
    content: .
  - type: heading
    content: I Saoly any Jerosalema
  '26':
  - type: text
    content: 'Vao tonga tany Jerosalema i Saoly, dia nitady hikambana tamin’ny '
  - type: text
    content: mpianatra
  - type: text
    content: '; saingy natahotra azy izy rehetra satria tsy afaka nino azy ho isan’ny mpianatra. '
  '27':
  - type: text
    content: 'Nalain’i Barnabà kosa i Saoly ka nentiny teo amin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: '; dia teo anatrehan’ny apôstôly no nitantaran’i Barnabà ny fomba nahitan’i Saoly ny Tompo teny an-dalana sy ny teny nataon’ny Tompo taminy ary koa ny fahasahian’i Saoly nitoriteny tamin’ny anaran’i Jesoa tany Damasy. '
  '28':
  - type: text
    content: 'Izay vao afa-nifanerasera tamin’ny mpianatra tao Jerosalema i Saoly sady tena sahy nitoriteny tamin’ny anaran’ny Tompo. '
  '29':
  - type: text
    content: 'Niresahan’i Saoly sy nifanakalozany hevitra koa ireo Jiosy miteny grika; kanjo notadiavin’ireo hovonoina izy. '
  '3':
  - type: text
    content: 'Ary raha mbola nizotra nankany Damasy ny diany, ka mby teo akaikin’ny tanàna, dia nisy hazavana avy tany an-danitra, nanelatrelatra tampoka nanodidina azy. '
  '30':
  - type: text
    content: Nony fantatr’ireo havana iray finoana izany, dia nateriny tany Kesaria i Saoly ary nampodîny nankany Tarsa.
  '31':
  - type: text
    content: 'Nandry feizay ny Fiangonana manerana an’i Jodea sy i Galilea ary i Samaria manontolo: nandroso tsara, nizotra tamin’ny fanoavana ny Tompo, ary nihamaro noho ny fampaherezan’ny Fanahy Masina.'
  - type: heading
    content: Fahasitranan’i Enea
  '32':
  - type: text
    content: 'Raha nitety tany nitsidika ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra i Petera, dia nankany amin’ireo nonina tany Lida koa. '
  '33':
  - type: text
    content: 'Tao no nahitany lehilahy malemy anankiray atao hoe Enea, efa valo taona nilamahana teo am-parafara. '
  '34':
  - type: text
    content: 'Ary hoy i Petera taminy:'
  - type: text
    content: '–Ry Enea, manasitrana anao i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '! Mitsangàna ka amboary ny fandrianao!'
  - type: text
    content: 'Dia nitsangana niaraka tamin’izay i Enea. '
  '35':
  - type: text
    content: Nahita azy ny mponina rehetra tany Lida sy tany amin’ny lemak’i Sarôna ka niverina ho amin’ny Tompo.
  - type: heading
    content: Velon’aina indray i Dôrkasy
  '36':
  - type: text
    content: 'Tany Jôpa dia nisy vehivavy '
  - type: text
    content: mpianatra
  - type: text
    content: ' atao hoe Tabità (na «Dôrkasy» amin’ny teny grika izany hoe gazela). Be tokoa ny asa soa amam-piantrana vitany. '
  '37':
  - type: text
    content: Ary tamin’izany andro izany dia narary izy ka maty. Rehefa avy nampandroina ny faty, dia napetraka tao amin’ny efitrano ambony rihana
  - type: note
    content: 'efitrano ambony rihana: jereo 1.13 sy nta.'
  - type: text
    content: '. '
  '38':
  - type: text
    content: Tanàna akaikin’i Jôpa moa i Lida; ka nony henon’ny mpianatra tao Jôpa
  - type: note
    content: Mielanelana sahabo ho 20 km i Lida sy i Jôpa.
  - type: text
    content: ' fa hoe any Lida i Petera, dia nandefa iraka roa lahy ry zareo mba hiangavy azy hoe: «Tongava faingana atỳ aminay.» '
  '39':
  - type: text
    content: 'Teo no ho eo ihany i Petera dia niainga niaraka tamin’ireto iraka. Vao tonga tao Lida i Petera, dia nentin’ny mpianatra ho any amin’ilay efitrano ambony rihana. Nanatona an’i Petera avokoa ireo mpitondratena tao, izay sady nitomany no nampiseho ny akanjo sy fitafiana hafa nataon’i Dôrkasy ho azy ireo fony fahavelony. '
  '4':
  - type: text
    content: 'Niankarapoka tamin’ny tany i Saoly sady nandre feo nanao taminy hoe:'
  - type: text
    content: –Saoly, Saoly, nahoana no manenjika Ahy ianao?
  '40':
  - type: text
    content: 'Namoaka ny olona rehetra ho any alatrano i Petera, dia nandohalika nivavaka. Avy eo izy dia nitodika nanatrika ny faty ka niteny hoe:'
  - type: text
    content: –Ry Tabità, mitsangàna!
  - type: text
    content: 'Nahiratr’i Tabità ny masony, ary nahita an’i Petera izy dia niarina. '
  '41':
  - type: text
    content: 'Nanolo-tanana azy kosa i Petera ka nampitsangana azy. Rehefa nantsoin’i Petera ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' tao Jôpa mbamin’ireo mpitondratena, dia Tabità velona soa aman-tsara no natolony azy ireo. '
  '42':
  - type: text
    content: 'Tonga fantatr’i Jôpa iray vohitra izany ka olona maro no nino ny Tompo. '
  '43':
  - type: text
    content: Nitoetra naharitraritra tao Jôpa i Petera, tao an-tranon’ny mpandon-koditra atao hoe Simôna.
  '5':
  - type: text
    content: 'Dia hoy i Saoly:'
  - type: text
    content: –Iza moa Ianao, Tompoko?
  - type: text
    content: 'Ary ilay feo namaly hoe:'
  - type: text
    content: '–Izaho no i Jesoa, Ilay enjehinao. '
  '6':
  - type: text
    content: Fa mitsangàna, mankanesa ao an-tanàna, dia holazaina aminao izay tokony hataonao.
  '7':
  - type: text
    content: 'Tafatsatoka tsy nahateny tsy nahavolana ireo olona mpiara-dia amin’i Saoly; reny tokoa ny feo, nefa tsy nisy olona hitany. '
  '8':
  - type: text
    content: 'Dia nitsangana i Saoly, saingy tsy nahita na inona na inona, na dia nisokatra aza ny masony; hany ka olona no nitantana azy hankao Damasy. '
  '9':
  - type: text
    content: Tsy nahita izy nandritra ny telo andro sady tsy nihinana no tsy nisotro.
