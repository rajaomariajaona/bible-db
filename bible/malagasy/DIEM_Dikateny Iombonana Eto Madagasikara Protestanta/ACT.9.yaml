document_id: ACT.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiovam-pon’i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izay i Saoly dia tsy nanampo afa-tsy ny handrahona sy ny handripaka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatry
  - type: text
    text: ' ny Tompo. Nanatona ny mpisorombe izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary nangataka taratasy hahazoany miditra amin’ireo sinagôga any Damasy: ny nokendreny dia ny hamatotra sy hitondra mankatỳ Jerosalema izay olona tratrany manaraka ny lalana nosoritan’ny Tompo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Is 30.21; Sal 27.11.
    marker-yv: yv-n
  - type: text
    text: ', na lahy na vavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha mbola nizotra nankany Damasy ny diany, ka mby teo akaikin’ny tanàna, dia nisy hazavana avy tany an-danitra, nanelatrelatra tampoka nanodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niankarapoka tamin’ny tany i Saoly sady nandre feo nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Saoly, Saoly, nahoana no manenjika Ahy ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy i Saoly:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza moa Ianao, Tompoko?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary ilay feo namaly hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no i Jesoa, Ilay enjehinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa mitsangàna, mankanesa ao an-tanàna, dia holazaina aminao izay tokony hataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tafatsatoka tsy nahateny tsy nahavolana ireo olona mpiara-dia amin’i Saoly; reny tokoa ny feo, nefa tsy nisy olona hitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nitsangana i Saoly, saingy tsy nahita na inona na inona, na dia nisokatra aza ny masony; hany ka olona no nitantana azy hankao Damasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy nahita izy nandritra ny telo andro sady tsy nihinana no tsy nisotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tao Damasy tamin’izay dia nisy mpianatra atao hoe Hananià. Nisehoan’ny Tompo tamin’ny alalan’ny fahitana izy ka nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Hananià!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy ny navaliny:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Intỳ aho, Tompoko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy ny Tompo tamin’i Hananià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mankanesa izao dia izao any amin’ilay lalana atao hoe Imahitsy; ka anontanio ao an-tranon’i Joda fa misy lehilahy atao hoe Saoly avy any Tarsa. Mivavaka indrindra izy amin’izao fotoana izao.
- type: usfm
  marker: p
  children:
  - type: text
    text: '( '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin’izay i Saoly dia nisehoam-pahitana ary nahatazana lehilahy atao hoe Hananià, izay niditra tao aminy sy nametra-tanana taminy mba hahiratan’ny masony indray.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao kosa no navalin’i Hananià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Maro, Tompoko, ny olona niresaka tamiko momba io lehilahy io ka samy nilaza ny ratsy rehetra vitany tamin’ireo anisan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakanao
  - type: text
    text: ' tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nomen’ireo lohandoha-mpisorona fahefana izy no tonga eto, mba hamatotra izay rehetra miantso ny anaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny Tompo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana, fa io lehilahy io dia nofidiko sy hampiasaiko mba hampahafantatra Ahy amin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ' sy amin’ny mpanjaka ary amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hasehoko azy ny mafy rehetra tsy maintsy hiaretany ho voninahitro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niainga i Hananià ka niditra tao an-tranon’i Joda, ary nametra-tanana tamin’i Saoly sady nanao hoe: Ry Saoly rahalahiko, i Jesoa Tompo, Izay niseho taminao teny an-dalana, no naniraka ahy mba hahiratan’ny masonao indray ary mba hahatonga anao ho feno Fanahy Masina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Teo no ho eo ihany dia nisy zavatra toy ny kiran-kazandrano niala avy tamin’ny mason’i Saoly, ka nahiratra indray izy. Avy hatrany koa izy dia natao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary dia nihinan-kanina ka nihatanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitoriteny ao Damasy i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Niara-nitoetra mandritra ny andro vitsivitsy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' tany Damasy i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy nangataka andro i Saoly fa nitoriteny tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ', nanambara fa i Jesoa no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia talanjona ny olona rehetra nandre azy ka nanontany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ity lehilahy ity indrindra ve no mpanenjika lozan-tany an’ireo niantso ny anaran’i Jesoa tany Jerosalema? Ary ny anton-diany atỳ, moa ve tsy ny hamatotra ny olona toy izany sy hitondra azy mankany amin’ny lohandoha-mpisorona?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vao mainka feno hery ny toritenin’i Saoly: nasehony marimarina fa i Jesoa no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: ', hany ka resy lahatra ny Jiosy mponina tao Damasy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa afaka andro maromaro, dia niara-nioko hamono an’i Saoly ny Jiosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'saingy nampahafantarina an’i Saoly mialoha izany fiokoana izany. Nambenan-dry zareo Jiosy andro aman’alina ny vavahadin’ny tanàna mba hamonoana an’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Kanjo nalain’ny mpianatra i Saoly indray alina, dia nataony tao anaty sobika, ary nampidininy tany ivelan’ny manda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 23-25:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 2Kôr 11.32-33.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Saoly any Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vao tonga tany Jerosalema i Saoly, dia nitady hikambana tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: '; saingy natahotra azy izy rehetra satria tsy afaka nino azy ho isan’ny mpianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nalain’i Barnabà kosa i Saoly ka nentiny teo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: '; dia teo anatrehan’ny apôstôly no nitantaran’i Barnabà ny fomba nahitan’i Saoly ny Tompo teny an-dalana sy ny teny nataon’ny Tompo taminy ary koa ny fahasahian’i Saoly nitoriteny tamin’ny anaran’i Jesoa tany Damasy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izay vao afa-nifanerasera tamin’ny mpianatra tao Jerosalema i Saoly sady tena sahy nitoriteny tamin’ny anaran’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Niresahan’i Saoly sy nifanakalozany hevitra koa ireo Jiosy miteny grika; kanjo notadiavin’ireo hovonoina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nony fantatr’ireo havana iray finoana izany, dia nateriny tany Kesaria i Saoly ary nampodîny nankany Tarsa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nandry feizay ny Fiangonana manerana an’i Jodea sy i Galilea ary i Samaria manontolo: nandroso tsara, nizotra tamin’ny fanoavana ny Tompo, ary nihamaro noho ny fampaherezan’ny Fanahy Masina.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahasitranan’i Enea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Raha nitety tany nitsidika ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' rehetra i Petera, dia nankany amin’ireo nonina tany Lida koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tao no nahitany lehilahy malemy anankiray atao hoe Enea, efa valo taona nilamahana teo am-parafara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy i Petera taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry Enea, manasitrana anao i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '! Mitsangàna ka amboary ny fandrianao!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nitsangana niaraka tamin’izay i Enea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nahita azy ny mponina rehetra tany Lida sy tany amin’ny lemak’i Sarôna ka niverina ho amin’ny Tompo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Velon’aina indray i Dôrkasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tany Jôpa dia nisy vehivavy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatra
  - type: text
    text: ' atao hoe Tabità (na «Dôrkasy» amin’ny teny grika izany hoe gazela). Be tokoa ny asa soa amam-piantrana vitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary tamin’izany andro izany dia narary izy ka maty. Rehefa avy nampandroina ny faty, dia napetraka tao amin’ny efitrano ambony rihana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efitrano ambony rihana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1.13 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tanàna akaikin’i Jôpa moa i Lida; ka nony henon’ny mpianatra tao Jôpa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mielanelana sahabo ho 20 km i Lida sy i Jôpa.
    marker-yv: yv-n
  - type: text
    text: ' fa hoe any Lida i Petera, dia nandefa iraka roa lahy ry zareo mba hiangavy azy hoe: «Tongava faingana atỳ aminay.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Teo no ho eo ihany i Petera dia niainga niaraka tamin’ireto iraka. Vao tonga tao Lida i Petera, dia nentin’ny mpianatra ho any amin’ilay efitrano ambony rihana. Nanatona an’i Petera avokoa ireo mpitondratena tao, izay sady nitomany no nampiseho ny akanjo sy fitafiana hafa nataon’i Dôrkasy ho azy ireo fony fahavelony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Namoaka ny olona rehetra ho any alatrano i Petera, dia nandohalika nivavaka. Avy eo izy dia nitodika nanatrika ny faty ka niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Tabità, mitsangàna!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nahiratr’i Tabità ny masony, ary nahita an’i Petera izy dia niarina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nanolo-tanana azy kosa i Petera ka nampitsangana azy. Rehefa nantsoin’i Petera ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ' tao Jôpa mbamin’ireo mpitondratena, dia Tabità velona soa aman-tsara no natolony azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tonga fantatr’i Jôpa iray vohitra izany ka olona maro no nino ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nitoetra naharitraritra tao Jôpa i Petera, tao an-tranon’ny mpandon-koditra atao hoe Simôna.
