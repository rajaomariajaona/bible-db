    marker: p
    children:
    - type: text
      text: 'Ireo olona 144 000 ireo dia niventy toa hira vaovao teo anoloan’ny sezafiandrianana sy teo anatrehan’ireo zava-miaina efatra ary teo anatrehan’ireo '
    - type: usfm
