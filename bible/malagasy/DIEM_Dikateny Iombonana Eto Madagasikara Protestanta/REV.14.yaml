document_id: REV.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Zanakondry sy ireo voaavotra
  - type: text
    content: 'Dia indro hitako nijoro teo an-tendrombohitra '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ny Zanakondry; ary nisy olona 144 000 nomba Azy, samy manana ny anaran’ny Zanakondry sy ny anaran’ny Rainy voasoratra eo amin’ny handriny'
  - type: note
    content: Ampit Ezek 9.4; Apôk 7.3.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'dia izy koa no hisotro ny divain’ny '
  - type: text
    content: haviniran
  - type: text
    content: '’Andriamanitra, divay izay efa naidina tsy misy fangarony ao anatin’ny tsatokaty fisotroana ny '
  - type: text
    content: hatezeran’Andriamanitra
  - type: text
    content: '; sady hampijalîna amin’ny afo sy solifara eo anatrehan’ny anjely '
  - type: text
    content: masina
  - type: text
    content: ' sy eo anatrehan’ny Zanakondry izy'
  - type: note
    content: 'Ampit Is 51.17; Gen 19.24; Ezek 38.22. –solifara: jereo Lk 17.29 sy nta.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Miakatra mandrakizay mandrakizay ny setrok’ilay afo mampijaly azy
  - type: note
    content: Ampit Is 34.10.
  - type: text
    content: ' ary tsy mba manam-pitoniana na andro na alina izay olona mivavaka amin’ilay biby sy ny sariny, na izay mandray ny mariky ny anarany.»'
  '12':
  - type: text
    content: 'Amin’izany no ilana ny faharetana eo amin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', dia eo amin’izay mitandrina ny didin’Andriamanitra sy mitana ny finoana niainan’i Jesoa.'
  '13':
  - type: text
    content: 'Ary reko nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: '–Soraty izao: «Sambatra ireo maty, izay maty amin’ny fanompoana ny Tompo manomboka izao! Eny, hoy ny Fanahy Masina, aoka izy ireo hahazo fitoniana amin’ny fisasarany, fa ny asany manaraka azy.»'
  - type: heading
    content: Fijinjana sy fiotazana nihatra tamin’ny tany
  '14':
  - type: text
    content: 'Dia indro hitako nisy rahona fotsy, ka ilay nipetraka teo ambonin’io rahona io dia sahala amin’ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: Ampit Dan 7.13.
  - type: text
    content: '; satroboninahitra volamena no teny an-dohany, ary antsy maranitra fijinjana no teny an-tanany. '
  '15':
  - type: text
    content: 'Dia nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray nivoaka avy tao amin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ', sady niantso tamin’ny feo mahery ka nanao tamin’Ilay nipetraka teo ambony rahona hoe: «Ampiasao ny antsy fijinjànao, ka mijinjà; fa tonga ny taom-pijinjana, satria toy ny vokatra efa masaka dia masaka ny tany'
  - type: note
    content: Ampit Jl 4.13.
  - type: text
    content: '.» '
  '16':
  - type: text
    content: Dia naroson’Ilay nipetraka teo ambony rahona teny amin’ny tany ny antsy fijinjàny, ka voajinja ny tany.
  '17':
  - type: text
    content: Ary nisy anjely anankiray hafa nivoaka avy tao amin’ny tempoly any an-danitra; izy koa dia nanana antsy maranitra fijinjana.
  '18':
  - type: text
    content: 'Ary nisy anjely anankiray hafa koa nipoitra avy teo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ', dia anjely manam-pahefana amin’ny afo. Niantso tamin’ny feo mahery izy ka nanao tamin’ilay anjely manana antsy maranitra fijinjana hoe: «Ampiasao ny antsy fijinjànao ka otoazy ny sampahom-boaloboka eny amin’ny tany; fa masaka tsara ny voalobony.» '
  '19':
  - type: text
    content: 'Dia naroson’ilay anjely teny amin’ny tany ny antsy fijinjàny, ka notoazany avokoa ny voaloboky ny tany, ary natsipiny tao anatin’ny famiazana goavana, dia ny famiazana manambara ny '
  - type: text
    content: haviniran’Andriamanitra
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ary nahare feo avy tany an-danitra aho, dia feo mireondreona tahaka ny akon’ny rian-drano sy ny kotro-baratra mafy. Ny feo izay reko dia tahaka ny mozikan’ireo mpitendry lokanga mitendry ny lokangany. '
  '20':
  - type: text
    content: Nohosena ny famiazana izay ivelan’ny tanàna; ka nivoaka ra ny famiazana, dia ra nitobaka hatrany amin’ny telonjato kilaometatra ary nahatratra iray metatra sy sasany ny halaliny
  - type: note
    content: 'And 19-20: ampit Is 63.1-6; Fit 1.15.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ireo olona 144 000 ireo dia niventy toa hira vaovao teo anoloan’ny sezafiandrianana sy teo anatrehan’ireo zava-miaina efatra ary teo anatrehan’ireo '
  - type: text
    content: loholona
  - type: text
    content: ; ka tsy nisy nahay nianatra izany hira izany, afa-tsy ireo olona 144 000 izay efa navotana niala tamin’ny tany.
  '4':
  - type: text
    content: 'Ireo no tsy nandoto tena tamin’ny fomban-tsampy, satria madio toetra. Ireo no mpanaraka ny Zanakondry na aiza na aiza alehany. Ireo no efa navotana avy tamin’ny olona, mba ho santa-bokatra atolotra ho an’Andriamanitra sy ho an’ny Zanakondry. '
  '5':
  - type: text
    content: Ireo no tsy nandrenesan-dainga teo am-bavany
  - type: note
    content: 'tsy nandalo... madio toetra: ara-bakiteny dia hoe tsy nandoto tena tamin’ny vehivavy, satria virijiny; ny kristianina dia voatokana ho an’i Kristy mpampakatra ka mifikitra aminy tokoa fa tsy mivadika hanompo sampy ka hanao ny fombam-pijangajangan’ny lehilahy na vehivavy nitolo-tena tamin’izany. Jereo 1 Kôr 11.2. –tsy nandrenesan-dainga teo am-bavany: ny sampy no atao hoe lainga, ka ny fanononana azy dia mari-panajana azy sy mari-pitiavana azy. Ampit Sal 16.4; Hôs 2.19; Tsef 3.13; Za 13.2.'
  - type: text
    content: ', satria tsy manan-tsiny.'
  - type: heading
    content: Ireo anjely anankitelo
  '6':
  - type: text
    content: 'Ary hitako nisy anjely anankiray hafa koa nanidina teny amin’ny habakabaka farany ambony. Io anjely io dia nanana hafatra soa maharitra mandrakizay hotorîny amin’izay monina ambonin’ny tany, dia amin’ny firenena sy ny fokom-pirenena mbamin’ny olona samy hafa fiteny sy ny vahoaka isan-tokony; '
  '7':
  - type: text
    content: 'ka hoy izy tamin’ny feo mahery hoe: «Manajà an’Andriamanitra ka manomeza voninahitra Azy, fa tonga ny andro fitsaràny! Mitsaoha an’Ilay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’ny loharano'
  - type: note
    content: Ampit 10.6 sy nta.
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Nanaraka an’io dia nisy anjely faharoa nanao hoe: «Rava, rava i Babilôna lehibe, izay nampisotro ny firenena rehetra tamin’ny divainy, dia ny divain’ny '
  - type: text
    content: fijangajangàny
  - type: text
    content: ' mihoa-pampana'
  - type: note
    content: Ampit Is 21.9; Jer 51.7-8.
  - type: text
    content: '!»'
  '9':
  - type: text
    content: 'Nanaraka an’ireo anjely anankiroa ireo dia nisy anjely fahatelo nanao tamin’ny feo mahery hoe: «Raha misy mivavaka amin’ilay biby sy ny sariny, ka mandray ny marik’ilay biby eo amin’ny handriny na eo amin’ny tanany, '
