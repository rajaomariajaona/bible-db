    - type: text
      text: ; ka tsy nisy nahay nianatra izany hira izany, afa-tsy ireo olona 144 000 izay efa navotana niala tamin’ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no tsy nandoto tena tamin’ny fomban-tsampy, satria madio toetra. Ireo no mpanaraka ny Zanakondry na aiza na aiza alehany. Ireo no efa navotana avy tamin’ny olona, mba ho santa-bokatra atolotra ho an’Andriamanitra sy ho an’ny Zanakondry. '
