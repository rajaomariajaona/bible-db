      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: ', dia eo amin’izay mitandrina ny didin’Andriamanitra sy mitana ny finoana niainan’i Jesoa.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary reko nisy feo avy tany an-danitra nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Soraty izao: «Sambatra ireo maty, izay maty amin’ny fanompoana ny Tompo manomboka izao! Eny, hoy ny Fanahy Masina, aoka izy ireo hahazo fitoniana amin’ny fisasarany, fa ny asany manaraka azy.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fijinjana sy fiotazana nihatra tamin’ny tany
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia indro hitako nisy rahona fotsy, ka ilay nipetraka teo ambonin’io rahona io dia sahala amin’ny '
