      children:
      - type: text
        text: haviniran’Andriamanitra
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahare feo avy tany an-danitra aho, dia feo mireondreona tahaka ny akon’ny rian-drano sy ny kotro-baratra mafy. Ny feo izay reko dia tahaka ny mozikan’ireo mpitendry lokanga mitendry ny lokangany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nohosena ny famiazana izay ivelan’ny tanàna; ka nivoaka ra ny famiazana, dia ra nitobaka hatrany amin’ny telonjato kilaometatra ary nahatratra iray metatra sy sasany ny halaliny
