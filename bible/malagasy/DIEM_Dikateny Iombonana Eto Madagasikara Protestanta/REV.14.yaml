    - type: text
      text: Dia naroson’Ilay nipetraka teo ambony rahona teny amin’ny tany ny antsy fijinjàny, ka voajinja ny tany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy anjely anankiray hafa nivoaka avy tao amin’ny tempoly any an-danitra; izy koa dia nanana antsy maranitra fijinjana.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely anankiray hafa koa nipoitra avy teo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ', dia anjely manam-pahefana amin’ny afo. Niantso tamin’ny feo mahery izy ka nanao tamin’ilay anjely manana antsy maranitra fijinjana hoe: «Ampiasao ny antsy fijinjànao ka otoazy ny sampahom-boaloboka eny amin’ny tany; fa masaka tsara ny voalobony.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naroson’ilay anjely teny amin’ny tany ny antsy fijinjàny, ka notoazany avokoa ny voaloboky ny tany, ary natsipiny tao anatin’ny famiazana goavana, dia ny famiazana manambara ny '
    - type: usfm
