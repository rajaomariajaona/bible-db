document_id: DEU.17,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Aza atao '
  - type: text
    content: sorona
  - type: text
    content: ' ho an’ny TOMPO Andriamanitrareo ny omby sy ondry aman’osy izay misy kilema maharatsy azy, satria fanimbazimbana an’ilay TOMPO Andriamanitrareo ny manao izany.'
  '10':
  - type: text
    content: 'Ary hampiharinareo io didim-pitsarana hambara aminareo eo amin’ny toerana izay hofidin’ny TOMPO io ka himasoanareo ny hanao araka izay rehetra hatorony anareo. '
  '11':
  - type: text
    content: 'Eny, araka ny torolalana homeny anareo sy araka ny fomba fitsarana holazainy aminareo no hataonareo; aza mivily miala amin’izany didim-pitsarana hambarany aminareo izany ianareo, na ho amin’ny ankavanana na ho amin’ny ankavia. '
  '12':
  - type: text
    content: 'Fa hovonoin-ko faty kosa ny olona entim-piavonavonana ka tsy mihaino an’ireo mpisorona mpanao fanompoam-pivavahana eo anatrehan’ny TOMPO Andriamanitrareo na tsy mihaino an’ilay mpitsara. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivon’i Israely. '
  '13':
  - type: text
    content: Ary handre izany ny vahoaka rehetra, dia hatahotra ka tsy hoentim-piavonavonana toy izany intsony.
  - type: heading
    content: Fepetra momba ny mpanjaka
  '14':
  - type: text
    content: Rahatrizay ianareo tafiditra ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo ka hahazo azy ho fanananareo sy honina eo, dia mety haniry hanangana mpanjaka hifehy anareo, tahaka ny ataon’ny firenena rehetra manodidina anareo
  - type: note
    content: Jereo 1 Sam 8.5.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Koa izay mpanjaka hofidin’ny TOMPO Andriamanitrareo ihany no tena hatsanganareo hifehy anareo; eo anivon’ny mpiray firenena aminareo no hangalanareo mpanjaka izay hatsanganareo hifehy anareo, fa tsy azonareo ekena hifehy anareo ny olona vahiny izay tsy mpiray firenena aminareo. '
  '16':
  - type: text
    content: Kanefa aoka ny mpanjakanareo tsy hanana soavaly maro na handefa olona handevozina any Ejipta
  - type: note
    content: 'handefa olona... maro: dkt hafa: handefa olona any Ejipta mba hividy soavaly maro na hoe handefa olona hifampiraharaha amin’i Ejipta mba hahazoany soavaly maro kokoa. Ampit 1 Mp 10.26-28; 2 Tan 1.14-16; 9.25-28.'
  - type: text
    content: ' indray mba hahazoany soavaly maro, satria ny TOMPO efa niteny taminareo hoe: «Aza miverina amin’izany lalam-panandevozana izany intsony!» '
  '17':
  - type: text
    content: Aoka ny mpanjakanareo tsy hampirafy, fandrao hivily ny fony, ary aoka izy tsy hangorona volafotsy na volamena be ho azy
  - type: note
    content: 'tsy hampirafy: izany hoe tsy hanana vady maro, jereo 1 Mp 11.1-8. volafotsy na volamena: jereo 1 Mp 10.14-27; 2 Tan 1.15; 9.13-27.'
  - type: text
    content: .
  '18':
  - type: text
    content: Rehefa tafapetraka eo amin’ny seza fiandrianana ilay mpanjakanareo, dia aoka hosoratany ho boky anankiray ho azy ny dikan’izao lalàna izao ka hataony araka ilay tahirizin’ireo Levita mpisorona
  - type: note
    content: 'levita mpisorona: jereo and 9 sy nta.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ary ho eo aminy hatrany izany sady hovakîny mandritra ny andro rehetra iainany mba hianarany hanaja ny TOMPO Andriamaniny ka himasoany hanatanteraka ny teny sy didy rehetra raketin’izao lalàna izao. '
  '2':
  - type: text
    content: 'Ao amin’ny tanàna izay homen’ny TOMPO Andriamanitrareo anareo, dia mety hisy lehilahy na vehivavy hita manao izay ratsy eo imason’ny TOMPO Andriamanitrareo ka mivadika ny fanekempihavanana nataony. '
  '20':
  - type: text
    content: Izany no tsy hireharehany ho ambonin’ireo mpiray firenena aminy ary tsy hiviliany hiala amin’ny didy, na ho amin’ny ankavanana na ho amin’ny ankavia, ka ho maro andro hanjakàna izy sy ny taranany eo anivon’i Israely.
  '3':
  - type: text
    content: Lasa izany olona izany manompo andriamani-kafa ary miankohoka aminy na amin’ny masoandro na amin’ny volana na amin’ny kintana, nefa zavatra efa norarana
  - type: note
    content: 'manompo andriamani-kafa: jereo Eks 22.9. –Norarako, araka ny RM: dkt hafa noraran’ny Tompo, araka ny stf sasany mitahiry ny dkt grika tranainy; kanefa tsy nisy olana fa samy azo ampiharina amin’i Mosesy miteny daholo ireo dkt anankiroa ireo.'
  - type: text
    content: ' tsy hataonareo ireny. '
  '4':
  - type: text
    content: 'Raha voatatitra aminareo izany toe-javatra izany ka renareo, dia fotopotory tsara; koa raha misy marina tokoa sady natao teo amin’i Israely izany fanimbazimbana izany, '
  '5':
  - type: text
    content: dia avoahy ho eo am-bavahadin’ny tanànanareo izay lehilahy na vehivavy nahavita izany zava-dratsy izany
  - type: note
    content: Eo amin’ny vavahadin’ny tanàna no atao ny fitoraham-bato hamonoana olona toy izany, ampit Lev 24.14; Asa 7.58; Heb 13.12.
  - type: text
    content: ' ka torahy vato ho faty.'
  '6':
  - type: text
    content: Amin’ny tenin’ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin’ny vavolombelona iray monja dia tsy ampy hamonoana azy
  - type: note
    content: Jereo 19.15; Nom 35.30; Mt 18.16; 2Kôr 13.1; 1Tim 5.19; Heb 10.28.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Ny tanan’ireo vavolombelona no hiainga voalohany hamono azy, vao ny tanan’ny vahoaka rehetra. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo
  - type: note
    content: Jereo 1Kôr 5.13.
  - type: text
    content: .
  - type: heading
    content: Fomba fitsarana ny raharaha sarotra
  '8':
  - type: text
    content: 'Mety misy raharaha sarotra loatra ho an’ny fitsarana ao an-tanànanareo ka tsy efanareo, na momba ny vonoan’olona izany na ady ifanolanana na fandratrana olona na zavatra hafa ifandirana. Raha mitranga izany, dia hiainga ianareo ka hiakatra any amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo. '
  '9':
  - type: text
    content: Hanatona an’ireo Levita mpisorona
  - type: note
    content: Ny atao hoe levita mpisorona dia toa ny taranak’i Levỳ niasa tao amin’ny tempolin’i Jerosalema, foiben’ny fivavahana jiosy (jereo 17.18; 27.9), mba hanavahana azy amin’ny levita hafa niparitaka manerana ny tanin’i Israely (jereo 12.12; 18.6).
  - type: text
    content: ' sy ilay mpitsara tompon-draharaha ianareo ka hanontany azy, dia hambarany aminareo ny didim-pitsarana. '
