document_id: DEU.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza atao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ho an’ny TOMPO Andriamanitrareo ny omby sy ondry aman’osy izay misy kilema maharatsy azy, satria fanimbazimbana an’ilay TOMPO Andriamanitrareo ny manao izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ao amin’ny tanàna izay homen’ny TOMPO Andriamanitrareo anareo, dia mety hisy lehilahy na vehivavy hita manao izay ratsy eo imason’ny TOMPO Andriamanitrareo ka mivadika ny fanekempihavanana nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lasa izany olona izany manompo andriamani-kafa ary miankohoka aminy na amin’ny masoandro na amin’ny volana na amin’ny kintana, nefa zavatra efa norarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'manompo andriamani-kafa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 22.9. –
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Norarako
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny RM: dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noraran’ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', araka ny stf sasany mitahiry ny dkt grika tranainy; kanefa tsy nisy olana fa samy azo ampiharina amin’i Mosesy miteny daholo ireo dkt anankiroa ireo.'
    marker-yv: yv-n
  - type: text
    text: ' tsy hataonareo ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha voatatitra aminareo izany toe-javatra izany ka renareo, dia fotopotory tsara; koa raha misy marina tokoa sady natao teo amin’i Israely izany fanimbazimbana izany, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia avoahy ho eo am-bavahadin’ny tanànanareo izay lehilahy na vehivavy nahavita izany zava-dratsy izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eo amin’ny vavahadin’ny tanàna no atao ny fitoraham-bato hamonoana olona toy izany, ampit Lev 24.14; Asa 7.58; Heb 13.12.
    marker-yv: yv-n
  - type: text
    text: ' ka torahy vato ho faty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny tenin’ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin’ny vavolombelona iray monja dia tsy ampy hamonoana azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 19.15; Nom 35.30; Mt 18.16; 2Kôr 13.1; 1Tim 5.19; Heb 10.28.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tanan’ireo vavolombelona no hiainga voalohany hamono azy, vao ny tanan’ny vahoaka rehetra. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1Kôr 5.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fomba fitsarana ny raharaha sarotra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mety misy raharaha sarotra loatra ho an’ny fitsarana ao an-tanànanareo ka tsy efanareo, na momba ny vonoan’olona izany na ady ifanolanana na fandratrana olona na zavatra hafa ifandirana. Raha mitranga izany, dia hiainga ianareo ka hiakatra any amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hanatona an’ireo Levita mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny atao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: levita mpisorona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia toa ny taranak’i Levỳ niasa tao amin’ny tempolin’i Jerosalema, foiben’ny fivavahana jiosy (jereo 17.18; 27.9), mba hanavahana azy amin’ny levita hafa niparitaka manerana ny tanin’i Israely (jereo 12.12; 18.6).'
    marker-yv: yv-n
  - type: text
    text: ' sy ilay mpitsara tompon-draharaha ianareo ka hanontany azy, dia hambarany aminareo ny didim-pitsarana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hampiharinareo io didim-pitsarana hambara aminareo eo amin’ny toerana izay hofidin’ny TOMPO io ka himasoanareo ny hanao araka izay rehetra hatorony anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, araka ny torolalana homeny anareo sy araka ny fomba fitsarana holazainy aminareo no hataonareo; aza mivily miala amin’izany didim-pitsarana hambarany aminareo izany ianareo, na ho amin’ny ankavanana na ho amin’ny ankavia. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hovonoin-ko faty kosa ny olona entim-piavonavonana ka tsy mihaino an’ireo mpisorona mpanao fanompoam-pivavahana eo anatrehan’ny TOMPO Andriamanitrareo na tsy mihaino an’ilay mpitsara. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivon’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary handre izany ny vahoaka rehetra, dia hatahotra ka tsy hoentim-piavonavonana toy izany intsony.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra momba ny mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rahatrizay ianareo tafiditra ao amin’ny tany izay omen’ny TOMPO Andriamanitrareo anareo ka hahazo azy ho fanananareo sy honina eo, dia mety haniry hanangana mpanjaka hifehy anareo, tahaka ny ataon’ny firenena rehetra manodidina anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Sam 8.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izay mpanjaka hofidin’ny TOMPO Andriamanitrareo ihany no tena hatsanganareo hifehy anareo; eo anivon’ny mpiray firenena aminareo no hangalanareo mpanjaka izay hatsanganareo hifehy anareo, fa tsy azonareo ekena hifehy anareo ny olona vahiny izay tsy mpiray firenena aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanefa aoka ny mpanjakanareo tsy hanana soavaly maro na handefa olona handevozina any Ejipta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'handefa olona... maro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: handefa olona any Ejipta mba hividy soavaly maro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: handefa olona hifampiraharaha amin’i Ejipta mba hahazoany soavaly maro kokoa.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Ampit 1 Mp 10.26-28; 2 Tan 1.14-16; 9.25-28.'
    marker-yv: yv-n
  - type: text
    text: ' indray mba hahazoany soavaly maro, satria ny TOMPO efa niteny taminareo hoe: «Aza miverina amin’izany lalam-panandevozana izany intsony!» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ny mpanjakanareo tsy hampirafy, fandrao hivily ny fony, ary aoka izy tsy hangorona volafotsy na volamena be ho azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tsy hampirafy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany hoe tsy hanana vady maro, jereo 1 Mp 11.1-8. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: volafotsy na volamena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Mp 10.14-27; 2 Tan 1.15; 9.13-27.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rehefa tafapetraka eo amin’ny seza fiandrianana ilay mpanjakanareo, dia aoka hosoratany ho boky anankiray ho azy ny dikan’izao lalàna izao ka hataony araka ilay tahirizin’ireo Levita mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'levita mpisorona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo and 9 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ho eo aminy hatrany izany sady hovakîny mandritra ny andro rehetra iainany mba hianarany hanaja ny TOMPO Andriamaniny ka himasoany hanatanteraka ny teny sy didy rehetra raketin’izao lalàna izao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izany no tsy hireharehany ho ambonin’ireo mpiray firenena aminy ary tsy hiviliany hiala amin’ny didy, na ho amin’ny ankavanana na ho amin’ny ankavia, ka ho maro andro hanjakàna izy sy ny taranany eo anivon’i Israely.
