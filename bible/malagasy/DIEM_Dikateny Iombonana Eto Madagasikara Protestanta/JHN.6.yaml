document_id: JHN.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 14.13-21; Mk 6.30-44; Lk 9.10-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Taorian’izany, dia lasa i Jesoa nankeny ampitan’ny farihin’i Galilea (na hoe farihin’i Tiberiada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Tiberiada '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (jereo 6.23; 21.1) dia tanàna niorina teo amoron’ny farihin’i Galilea, ilany andrefana; noho ny lazan’ny tanàna dia niantsoana ny farihy koa izy ombieniombieny.
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy vahoaka maro nanaraka Azy, noho ny nahitan’izy ireo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' nataon’i Jesoa hanasoavana ny marary. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niakatra teo an-tendrombohitra ry i Jesoa, ka nipetraka teo Izy mbamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin’izay dia efa akaiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Paska
  - type: text
    text: ', ilay fankalazana fanaon’ny Jiosy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa nanopy maso i Jesoa ka nahita fa nisy vahoaka maro nanatona Azy, dia nilaza tamin’i Filipo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aiza no hividianantsika mofo hohanin’ireo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fizahan-toetra an’i Filipo no nilazan’i Jesoa izany, satria Izy nahalala rahateo izay efa hataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy i Filipo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Na dia mofo mitentina '
  - type: usfm
    marker: w
    children:
    - type: text
      text: denàry
  - type: text
    text: ' 200 aza, tsy ampy hahazoan’ny tsirairay sombiny kely akory!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny anankiray tamin’ny mpianany koa, dia i Andrea rahalahin’i Simôna Petera, nilaza taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: –Misy zazalahy ao manana mofo ôrza dimy sy trondro madinika anankiroa; fa ho ampy inona izany amin’izao olona marobe izao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Mp 4.42-44.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Asaovy mipetraka ny olona!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Noho ny fisian’ny ahitra be teo amin’ilay toerana, dia nipetraka ny olona ka tokony ho dimy arivo no isan’ny vatan-dehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay i Jesoa no nandray ireo mofo ka nony avy nisaotra an’Andriamanitra dia nizara azy ho an’izay nipetraka hihinana; ary nozarainy toy izany koa ny trondro arakaraka izay nilain’ny mpihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa voky ny olona, dia hoy i Jesoa tamin’ny mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Angony ny tapa-mofo sisa tsy lany, mba tsy hisy ho very!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nangonin’ireo mpianatra, ka nahafeno sobika 12 ny tapa-mofo avy amin’ny mofo ôrza dimy, dia izay sisa tsy lanin’ny nihinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa nahita ny famantarana nataon’i Jesoa teo ny olona, dia vaky vava hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ity tokoa ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mpaminany
  - type: text
    text: ' voalaza fa tsy maintsy ho tonga amin’izao tontolo izao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fantatr’i Jesoa fa efa ho avy ny olona haka Azy an-keriny hatao mpanjaka; noho izany, dia lasa indray Izy irery nankany an-tendrombohitra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Andehanan’i Jesoa an-tongotra eny ambony rano
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 14.22-33; Mk 6.45-52)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nony hariva ny andro, dia nidina nankeny amoron’ny farihy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jesoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary niondrana an-tsambokely izy ireo ka nita ny farihy ho any Kafarnahòma. Efa maizina ny andro tamin’izay, nefa i Jesoa mbola tsy tonga teo amin’ireo mpianany; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nanonja ny farihy, satria nifofofofo mafy ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rehefa nivoy tokony ho dimy na enina kilaometatra izy ireo, dia nahita an’i Jesoa nandeha teny ambony farihy sy nanakaiky ny sambokely; hany ka raiki-tahotra ireo mpianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy kosa i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho ihany ity, fa aoka izay ny tahotra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia te handray Azy ho eo an-tsambokely ireo mpianany; nefa niaraka tamin’izay dia tafatody tamin’ny tany nokasain’izy ireo haleha ny sambokely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tadiavin’ny vahoaka i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny ampitson’iny, dia tsikaritry ny vahoaka izay tafajanona teny ampitan’ny farihy fa tsy nisy sambokely hafa teo afa-tsy ny anankiray ihany; ary tsikaritr’izy ireo koa fa i Jesoa dia tsy mba niara-niondrana an-tsambokely tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ', fa ny mpianany ihany no nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Kanefa nisy sambokely hafa maro avy any Tiberiada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 6.1 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' tonga teo akaikin’ilay toerana nihinanan’izy ireo ny mofo, fony avy nisaotra an’Andriamanitra ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa ny vahoaka, rehefa nahita fa tsy teo na i Jesoa na ny mpianany, dia niondrana tamin’ireo sambokely ireo ka nankany Kafarnahòma hitady an’i Jesoa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jesoa no mofo manome aina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa nahita an’i Jesoa teny ampitan’ny farihy ny vahoaka, dia nanontany Azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, oviana no tonga teto Ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina dia marina aminareo fa ny itadiavanareo Ahy dia tsy noho ianareo nahita '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ', fa noho ianareo nihina-mofo ka voky. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aoka hiasa ianareo, tsy hoe hahazoana ny sakafo mety levona, fa hahazoana ny sakafo matàna ho aina maharitra mandrakizay, dia ilay homen’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' anareo; fa Izy no efa nasian’Andriamanitra ny mariky ny fahefana nomeny Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy ireo tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no tokony hataonay mba hanatontosanay ireo asan’Andriamanitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izao no asa imasoan’Andriamanitra, dia ny hinoanareo Ilay nirahiny!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa hoy ireo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona àry no famantarana ataonao, mba ho hitanay ka hinoanay Anao? Inona no asa ataonao? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ireo razantsika dia nihinana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ' tany an-taniefitra, araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' hoe: «Mofo avy tany an-danitra no efa nomen’ny Tompo azy ireo hohanina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 16.4, 15; Sal 78.24.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tamin’izay i Jesoa dia niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina dia marina aminareo fa tsy i Mosesy no nanome anareo ny mofo avy tany an-danitra, fa ny Raiko no manome anareo ilay tena mofo avy any an-danitra; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: satria ny mofo omen’Andriamanitra dia ilay midina avy any an-danitra ka manome ny aina ho an’izao tontolo izao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ka hoy ny vahoaka tamin’i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, omeo anay mandrakariva izany mofo izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no mofo manome ny aina! Izay manatona Ahy tsy mba ho noana intsony, ary izay mino Ahy tsy mba hangetaheta intsony; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: saingy voalazako taminareo fa efa mahita Ahy ianareo, nefa tsy mino
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ity and ity sy 20.29.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izay rehetra omen’ny Ray Ahy no hanatona Ahy; ary izay hanatona Ahy dia tsy horoahiko any ivelany, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'satria nidina avy tany an-danitra Aho tsy hoe hanao ny sitrapoko fa hanao ny sitrapon’Ilay naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Izao no sitrapon’Ilay naniraka Ahy: dia ny tsy hamelako hisy very izay rehetra nomeny Ahy, fa ny hananganako azy ho velona amin’ny andro farany. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Eny, izao no sitrapon’ny Raiko: dia ny hahavelona aina mandrakizay ny olona rehetra mibanjina sy mino ny Zanaka; ary Izaho dia hanangana azy ho velona amin’ny andro farany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia nimonomonona tamin’i Jesoa ny Jiosy, noho Izy niteny hoe: «Izaho no mofo nidina avy tany an-danitra!» '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ka hoy ry zareo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy ilay io ve no i Jesoa, zanak’i Jôsefa? Fantatsika ny ray aman-dreniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mk 6.3; Mt 13.55; Lk 4.22.
    marker-yv: yv-n
  - type: text
    text: ', koa ahoana àry no anaovany hoe: «Nidina avy tany an-danitra Aho»?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia novalian’i Jesoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka izay ny monomonona! '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tsy misy olona mahay manatona Ahy, raha tsy taomin’ny Ray Izay naniraka Ahy; ary Izaho hanangana azy ho velona amin’ny andro farany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa izao no voalazan’ny Soratra Masina ao amin’ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ': «Hampianarin’Andriamanitra izy rehetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Is 54.13.
    marker-yv: yv-n
  - type: text
    text: '!» Koa izay rehetra nandre sy nianatra tamin’ny Ray no manatona Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Tsy hoe nisy nahita ny Ray, afa-tsy Ilay avy amin’Andriamanitra: izy no nahita ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lazaiko marina dia marina aminareo fa izay mino Ahy dia velona aina mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Izaho no mofo manome ny aina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ireo razanareo nihinana ny mana tany an-taniefitra, nefa maty ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'ity kosa ny mofo midina avy any an-danitra, mba tsy ho faty izay mihinana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Izaho no mofo antoky ny fiainana, dia ilay mofo nidina avy tany an-danitra: raha misy mihinana ity mofo ity, dia ho velona mandrakizay izy; ary ny mofo izay homeko dia ny tenako mba hahavelona aina an’izao tontolo izao!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tamin’izay ny Jiosy dia nifanditra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hataon’ilay io ahoana re no fanome antsika ny tenany hohanina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazaiko marina dia marina aminareo fa raha tsy mihinana ny tenan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' sy misotro ny rany ianareo, dia tsy velona aina ao anatinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Izay mihinana ny tenako sy misotro ny rako no velona aina mandrakizay; ary Izaho hanangana azy ho velona amin’ny andro farany. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa ny tenako dia fihinana tokoa; ary ny rako dia fisotro tokoa! '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izay mihinana ny tenako sy misotro ny rako, dia mitoetra ato anatiko, ary Izaho ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Velona ny Ray naniraka Ahy, ary Izaho velomin’ny Ray: toy izany koa no hamelomako izay mihinana Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ity no mofo nidina avy tany an-danitra: tsy mba tahaka ilay nohanin’ny razanareo; maty ihany izy ireo, fa izay mihinana ity mofo ity kosa dia ho velona mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Izany teny izany no nataon’i Jesoa, fony Izy nampianatra tao amin’ny sinagôga tany Kafarnahòma.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo teny manome ny aina maharitra mandrakizay
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Koa maro tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianatr
  - type: text
    text: '’i Jesoa, rehefa avy nandre Azy no nilaza hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sarotra izany teny izany, ka iza no mahahaino izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Fantatr’i Jesoa tao am-pony fa nimonomonona ny mpianany noho izany teny izany, ka hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Misakana anareo tsy hino Ahy ve izany? '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ahoana ianareo raha mahita ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' miakatra any amin’izay nitoerany taloha'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.62 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 1.9-11.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ny Fanahy Masina no mamelona aina; raha ny maha olombelona fotsiny dia tsy mahasoa akory. Ireo teny izay nolazaiko taminareo no mahatonga anareo handray ny Fanahy Masina mamelona aina, '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: kanefa misy tsy mino aminareo. (Fantatr’i Jesoa hatramin’ny voalohany manko ireo tsy mino sy ilay hanolotra Azy.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izany no nilazako taminareo fa tsy misy olona mahay manatona Ahy, raha tsy nomen’ny Ray azy izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Nanomboka tamin’io fotoana io dia maro tamin’ny mpianatr’i Jesoa no nihemotra, ka tsy niara-dia taminy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Ka hoy i Jesoa tamin’ny 12 lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianareo koa ve mba te hiala?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Dia novalian’i Simôna Petera hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tompo ô, hankany amin’iza àry izahay? Ianao no manana ny teny manome ny aina maharitra mandrakizay; '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: sady izahay efa mino sy mahalala fa Ianao no ilay Masina avy amin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.69 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 16.16; Mk 8.29; Lk 9.20.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Fa hoy i Jesoa tamin’ny 12 lahy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tsy Izaho ve no nifidy anareo 12 lahy? Kanefa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' ny anankiray aminareo!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Ny nolazainy dia i Jodasy, zanakalahin’i Simôna '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Iskariôta
  - type: text
    text: ; izy io manko, na dia anisan’ny 12 lahy aza, no ilay efa hanolotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.71 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 13.2, 21; 18.5.
    marker-yv: yv-n
  - type: text
    text: ' an’i Jesoa.'
