    children:
    - type: text
      text: '12'
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Pergàmo:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Izao no lazain’Ilay manana ny sabatra maranitra roa lela: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fantatro izay onenanao, dia ao amin’izay itoeran’ny sezafiandrianan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: '. Mifikitra mafy amiko ianao ka tsy mandà ny finoana Ahy, na dia tamin’ny andron’i Antipasy aza, izay vavolombeloko sady lehilahy mahatoky Ahy, dia ilay novonoina teo aminareo, teo amin’ity toerana onenan’i Satàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saingy izao no zavatra kely anomezako tsiny anao: misy eo aminao izay mifikitra amin’ny fampianaran’i Balahàma, ilay nanome fo an’i Balàka hanisy fandrika mitaona ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israelita
  - type: text
    text: ' amin’ny fahotana; ary dia voatarika tokoa ireo Israelita hihinan-kena natao fanatitra tamin’ny sampy sy hijangajanga'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 31.16 sy 25.1-12. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Balahàma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Balàka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Nom 22–25.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary toy izany koa, misy eo aminao izay mifikitra amin’ny fampianaran-dry zareo Nikôlaîta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa ialao ny toe-dratsinao; fa raha tsy izany, dia ho avy aminao faingana Aho ka hamely an’ireo amin’ilay sabatra mivoaka avy eo am-bavako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
