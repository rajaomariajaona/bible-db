document_id: REV.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Efeso
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Efeso: «Izao no lazain’Ilay mihazona ny kintana fito eo an-tanany ankavanana sady mandeha eo afovoan’ny fitoeranjiro volamena fito: '
  '10':
  - type: text
    content: 'Aza matahotra na inona na inona amin’izay fijaliana efa hanjo anao; indro ny '
  - type: text
    content: devoly
  - type: text
    content: ' efa hanao am-ponja ny sasany aminareo, mba ho voazaha toetra ianareo ary hiaritra fahoriana mandritra ny folo andro'
  - type: note
    content: 'folo andro: isa enti-manondro fe-potoana fohifohy ihany (ampit Gen 24.55; Dan 1.12).'
  - type: text
    content: . Aoka ho mahatoky ambara-pahafaty ianao, dia ny fiainana no homeko anao ho satroboninahitra.
  '11':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.
  - type: text
    content: «Izay maharesy dia tsy hiharan-doza avy amin’ny fahafatesana faharoa.»
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Pergàmo
  '12':
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Pergàmo:'
  - type: text
    content: '«Izao no lazain’Ilay manana ny sabatra maranitra roa lela: '
  '13':
  - type: text
    content: 'Fantatro izay onenanao, dia ao amin’izay itoeran’ny sezafiandrianan’i '
  - type: text
    content: Satàna
  - type: text
    content: '. Mifikitra mafy amiko ianao ka tsy mandà ny finoana Ahy, na dia tamin’ny andron’i Antipasy aza, izay vavolombeloko sady lehilahy mahatoky Ahy, dia ilay novonoina teo aminareo, teo amin’ity toerana onenan’i Satàna ity. '
  '14':
  - type: text
    content: 'Saingy izao no zavatra kely anomezako tsiny anao: misy eo aminao izay mifikitra amin’ny fampianaran’i Balahàma, ilay nanome fo an’i Balàka hanisy fandrika mitaona ny '
  - type: text
    content: Israelita
  - type: text
    content: ' amin’ny fahotana; ary dia voatarika tokoa ireo Israelita hihinan-kena natao fanatitra tamin’ny sampy sy hijangajanga'
  - type: note
    content: 'Jereo Nom 31.16 sy 25.1-12. –Balahàma sy Balàka: jereo Nom 22–25.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ary toy izany koa, misy eo aminao izay mifikitra amin’ny fampianaran-dry zareo Nikôlaîta
  - type: note
    content: Jereo 2.6 sy nta.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Koa ialao ny toe-dratsinao; fa raha tsy izany, dia ho avy aminao faingana Aho ka hamely an’ireo amin’ilay sabatra mivoaka avy eo am-bavako.
  '17':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.
  - type: text
    content: '«Izay maharesy dia homeko '
  - type: text
    content: mana
  - type: text
    content: ' miafina sady homeko vato fotsy; ary eo amin’io vato io dia misy anaram-baovao'
  - type: note
    content: Jereo Eks 16.14-15, 33-34; Is 62.2; 65.15.
  - type: text
    content: ' voasoratra, izay tsy fantatr’olona afa-tsy izay mandray azy ihany.»'
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Tiatira
  '18':
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Tiatira:'
  - type: text
    content: '«Izao no lazain’ilay '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: ', dia Ilay manana maso mivaivay tahaka ny lelafo sady manana tongotra mangirangirana tahaka ny varahina manganohano: '
  '19':
  - type: text
    content: 'Fantatro ny asanao, ny fitiavanao, ny finoanao, ny fanompoanao, ary ny faharetanao; ary ny asanao farany izao dia be noho ny tany am-boalohany. '
  '2':
  - type: text
    content: 'Fantatro ny asanao sy ny fikelezanao aina ary ny faharetanao, mbamin’ny tsy fahazakànao ny ratsy fanahy; efa nozahanao toetra ireo milaza ny tenany ho apôstôly, kanjo tsiizy ary hitanao fa mpandainga ireo; '
  '20':
  - type: text
    content: 'Saingy izao no anomezako tsiny anao: leferinao ilay vehivavy Jezebela'
  - type: note
    content: 'Jezebela: mety ho anarana ampiasaina an’ohatra fotsiny etoana. Jereo 1 Mp 16.31; 19.1-2; 2 Mp 9.22, 30.'
  - type: text
    content: ' izay milaza ny tenany ho '
  - type: text
    content: mpaminany
  - type: text
    content: ', ka dia mampianatra sy manoloky ny mpanompoko hijangajanga sy hihinan-kena natao fanatitra tamin’ny sampy. '
  '21':
  - type: text
    content: 'Efa nomeko andro io vehivavy io hialany amin’ny toe-dratsiny, saingy tsy mety miala amin’ny '
  - type: text
    content: fijangajangàny
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Indro hampandamahiko eo am-pandriana izy, ary izay nanitsakitsa-bady taminy dia hozoim-pahoriana lehibe, raha toa tsy miala amin’ny asa nampianarin-dravehivavy azy. '
  '23':
  - type: text
    content: Hovonoiko ho faty ny zanany, ka ho fantatry ny Fiangonana rehetra fa Izaho no mahalala ny ao am-po tsy miloatra; ary hovaliako araka ny asanareo avy ianareo
  - type: note
    content: Jereo Sal 7.10; Jer 17.10; Sal 62.13.
  - type: text
    content: .
  '24':
  - type: text
    content: '«Fa ianareo sisa rehetra amin’ny Fiangonana any Tiatira dia tsy nanaraka izany fampianarana izany sady tsy mba mahalala ny ataon’ireo hoe ‹hevi-dalin’i '
  - type: text
    content: Satàna
  - type: note
    content: 'hevi-dalin’i Satàna: fomba filazàn-javatra mampahatsiaro ny fampianarana miafina voatokana ho an’ireo tena miroso amin’ny antokom-pivavahana Nikôlaîta.'
  - type: text
    content: '›; ka izao no lazaiko aminareo: tsy hovesarako entana hafa ianareo; '
  '25':
  - type: text
    content: fa izay anananareo no tano mafy mandra-piaviko.
  '26':
  - type: text
    content: '«Izay maharesy ka mitandrina ny hanao ny asako hatramin’ny farany, dia homeko fahefana toy izay efa noraisiko tamin’ny Raiko: homeko fahefana amin’ny firenena izy, ka hifehy azy amin’ny tehim-by ary hanorotoro azy toy ny vilany tany. Homeko an’izay maharesy koa ny kintana fitarikandro'
  - type: note
    content: Jereo Sal 2.8-9; ampit Nom 24.17; Apôk 22.16.
  - type: text
    content: .
  '29':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.»
  '3':
  - type: text
    content: 'ary manana faharetana ianao, ka mizaka ny mafy noho ny amiko sady tsy ketraka. '
  '4':
  - type: text
    content: 'Saingy izao no anomezako tsiny anao: nihemotra tamin’ilay fitiavanao tany am-boalohany ianao. '
  '5':
  - type: text
    content: Koa tsarovy izay nitoeranao fony mbola tsy lavo, dia ialao ny toe-dratsinao
  - type: note
    content: 'ialao ny toe-dratsinao: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', ka ataovy indray ny asanao tany am-boalohany; fa raha tsy izany, dia ho avy aminao Aho, ka hanaisotra ny fitoeranjironao amin’izay misy azy, raha toa tsy ialanao ny toe-dratsinao. '
  '6':
  - type: text
    content: 'Izao kosa no anananao sitraka: ankahalainao ny asan’ireo Nikôlaita'
  - type: note
    content: Ny and 2, 14, 20 sy 24 dia toa mampahatsiahy ny fampianarana sy ny lalànam-pitondrantena nijoroan’ny antokom-pivavahana Nikôlaita (jereo 2.15), kanefa tsy misy loharano hafa azontsika hahafantarana azy bebe kokoa.
  - type: text
    content: ', izay ankahalaiko ihany koa.'
  '7':
  - type: text
    content: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana!
  - type: text
    content: «Izay maharesy dia havelako hihinana amin’ny voan’ilay hazo manome fiainana izay ao amin’ny sahan’Andriamanitra
  - type: note
    content: Jereo Gen 2.8-9.
  - type: text
    content: .»
  - type: heading
    content: Hafatra ho an’ny Fiangonana tao Smirna
  - type: text
    content: '–Manorata ho an’ny anjelin’ny Fiangonana any Smirna:'
  '8':
  - type: text
    content: '«Izao no lazain’ilay Voalohany sady Farany, Izay efa maty nefa velona indray: '
  '9':
  - type: text
    content: 'Fantatro ny fahorianao sy ny fahantrànao, kanefa manankarena ianao. Fantatro ianao fa endrikendrehin’ireo milaza ny tenany ho Jiosy, kanjo tsiizy fa olona mivavaka amin’i '
  - type: text
    content: Satàna
  - type: text
    content: '. '
