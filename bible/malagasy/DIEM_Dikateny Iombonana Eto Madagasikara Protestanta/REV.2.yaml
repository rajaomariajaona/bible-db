  children:
  - type: text
    text: '«Izay maharesy dia homeko '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ' miafina sady homeko vato fotsy; ary eo amin’io vato io dia misy anaram-baovao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
