    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: '«Izay maharesy ka mitandrina ny hanao ny asako hatramin’ny farany, dia homeko fahefana toy izay efa noraisiko tamin’ny Raiko: homeko fahefana amin’ny firenena izy, ka hifehy azy amin’ny tehim-by ary hanorotoro azy toy ny vilany tany. Homeko an’izay maharesy koa ny kintana fitarikandro'
