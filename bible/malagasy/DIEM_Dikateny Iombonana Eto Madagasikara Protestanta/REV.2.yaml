  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Efeso
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Efeso: «Izao no lazain’Ilay mihazona ny kintana fito eo an-tanany ankavanana sady mandeha eo afovoan’ny fitoeranjiro volamena fito: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatro ny asanao sy ny fikelezanao aina ary ny faharetanao, mbamin’ny tsy fahazakànao ny ratsy fanahy; efa nozahanao toetra ireo milaza ny tenany ho apôstôly, kanjo tsiizy ary hitanao fa mpandainga ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary manana faharetana ianao, ka mizaka ny mafy noho ny amiko sady tsy ketraka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Saingy izao no anomezako tsiny anao: nihemotra tamin’ilay fitiavanao tany am-boalohany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa tsarovy izay nitoeranao fony mbola tsy lavo, dia ialao ny toe-dratsinao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ialao ny toe-dratsinao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
    marker-yv: yv-n
  - type: text
    text: ', ka ataovy indray ny asanao tany am-boalohany; fa raha tsy izany, dia ho avy aminao Aho, ka hanaisotra ny fitoeranjironao amin’izay misy azy, raha toa tsy ialanao ny toe-dratsinao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao kosa no anananao sitraka: ankahalainao ny asan’ireo Nikôlaita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny and 2, 14, 20 sy 24 dia toa mampahatsiahy ny fampianarana sy ny lalànam-pitondrantena nijoroan’ny antokom-pivavahana Nikôlaita (jereo 2.15), kanefa tsy misy loharano hafa azontsika hahafantarana azy bebe kokoa.
    marker-yv: yv-n
  - type: text
    text: ', izay ankahalaiko ihany koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana!
- type: usfm
  marker: p
  children:
  - type: text
    text: «Izay maharesy dia havelako hihinana amin’ny voan’ilay hazo manome fiainana izay ao amin’ny sahan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 2.8-9.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Smirna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: '–Manorata ho an’ny anjelin’ny Fiangonana any Smirna:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Izao no lazain’ilay Voalohany sady Farany, Izay efa maty nefa velona indray: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fantatro ny fahorianao sy ny fahantrànao, kanefa manankarena ianao. Fantatro ianao fa endrikendrehin’ireo milaza ny tenany ho Jiosy, kanjo tsiizy fa olona mivavaka amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza matahotra na inona na inona amin’izay fijaliana efa hanjo anao; indro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: devoly
  - type: text
    text: ' efa hanao am-ponja ny sasany aminareo, mba ho voazaha toetra ianareo ary hiaritra fahoriana mandritra ny folo andro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'folo andro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: isa enti-manondro fe-potoana fohifohy ihany (ampit Gen 24.55; Dan 1.12).
    marker-yv: yv-n
  - type: text
    text: . Aoka ho mahatoky ambara-pahafaty ianao, dia ny fiainana no homeko anao ho satroboninahitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Izay manan-tsofina, aoka hihaino izay lazain’ny Fanahy Masina amin’ireo Fiangonana.
- type: usfm
  marker: p
  children:
  - type: text
    text: «Izay maharesy dia tsy hiharan-doza avy amin’ny fahafatesana faharoa.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hafatra ho an’ny Fiangonana tao Pergàmo
  marker-yv: yv-h
- type: usfm
