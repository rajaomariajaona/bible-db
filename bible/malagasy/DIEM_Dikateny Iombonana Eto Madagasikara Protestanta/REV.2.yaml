    - type: text
      text: '24'
  - type: text
    text: '«Fa ianareo sisa rehetra amin’ny Fiangonana any Tiatira dia tsy nanaraka izany fampianarana izany sady tsy mba mahalala ny ataon’ireo hoe ‹hevi-dalin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'hevi-dalin’i Satàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fomba filazàn-javatra mampahatsiaro ny fampianarana miafina voatokana ho an’ireo tena miroso amin’ny antokom-pivavahana Nikôlaîta.
    marker-yv: yv-n
  - type: text
    text: '›; ka izao no lazaiko aminareo: tsy hovesarako entana hafa ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
