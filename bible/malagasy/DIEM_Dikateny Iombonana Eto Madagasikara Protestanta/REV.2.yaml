  children:
  - type: text
    text: '«Izao no lazain’ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: ', dia Ilay manana maso mivaivay tahaka ny lelafo sady manana tongotra mangirangirana tahaka ny varahina manganohano: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatro ny asanao, ny fitiavanao, ny finoanao, ny fanompoanao, ary ny faharetanao; ary ny asanao farany izao dia be noho ny tany am-boalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Saingy izao no anomezako tsiny anao: leferinao ilay vehivavy Jezebela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jezebela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho anarana ampiasaina an’ohatra fotsiny etoana. Jereo 1 Mp 16.31; 19.1-2; 2 Mp 9.22, 30.
    marker-yv: yv-n
  - type: text
    text: ' izay milaza ny tenany ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ', ka dia mampianatra sy manoloky ny mpanompoko hijangajanga sy hihinan-kena natao fanatitra tamin’ny sampy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Efa nomeko andro io vehivavy io hialany amin’ny toe-dratsiny, saingy tsy mety miala amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fijangajangàny
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Indro hampandamahiko eo am-pandriana izy, ary izay nanitsakitsa-bady taminy dia hozoim-pahoriana lehibe, raha toa tsy miala amin’ny asa nampianarin-dravehivavy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hovonoiko ho faty ny zanany, ka ho fantatry ny Fiangonana rehetra fa Izaho no mahalala ny ao am-po tsy miloatra; ary hovaliako araka ny asanareo avy ianareo
  - type: usfm
