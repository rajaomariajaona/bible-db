document_id: GEN.3,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noroahina avy tao an-jaridainan’i Hedena ny lehilahy sy ny vadiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny bibilava no fetsy indrindra, tamin’ny bibidia rehetra nataon’ny TOMPO Andriamanitra. Hoy izy tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Marina ve fa noraran’Andriamanitra tsy hihinana ny voan’ny hazo rehetra ao an-jaridaina ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny bibilava: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Apôk 12.9; 20.2.
      marker-yv: yv-n
    - type: text
      text: '?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia namaly izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nandre ny feonao tao an-jaridaina aho, dia natahotra fa mitanjaka, koa dia niery.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no nampahafantatra anao fa mitanjaka ianao? Moa nihinananao va ny voan’ny hazo izay norarako tsy hohaninao?
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia namaly ralehilahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny vehivavy izay nomenao ho namako no nanome ahy ny voan’io hazo io, ka dia nihinana aho.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy ny TOMPO Andriamanitra tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ianao no nanao izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly kosa ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Voafitaky ny bibilava aho ka nihinana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Kôr 11.31; 1Tim 2.14.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy ny TOMPO Andriamanitra tamin’ny bibilava:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Satria nanao izany ianao, dia ozoniko. Amin’ny biby fiompy sy ny bibidia rehetra, dia ianao ihany no handeha amin’ny kibonao, sady hihinana vovo-tany amin’ny andro rehetra hiainanao. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hampifankahalaiko ianao sy ny vehivavy, ary ny taranakao sy ny taranany. Ny tarana-behivavy no hanorotoro ny lohanao, ary ianao kosa hanorotoro ny ombalahitongotry ny taranany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 12.17.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Avy eo dia hoy ny TOMPO Andriamanitra tamin-dravehivavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hampitomboiko ny fanaintainanao rehefa bevohòka ianao, ary fahoriana no hiterahanao ny zanakao; ny vadinao no hifatraran’ny fanirianao, nefa izy no hifehy anao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Farany ralehilahy na i Adama dia nilazan’ny TOMPO Andriamanitra hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Satria nihaino ny feom-badinao ianao ka nihinana tamin’ny voan-kazo izay efa nandrarako anao tsy hohanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia voaozona ny tany noho ny fahadisoanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy maintsy hiasa mafy ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahazoanao hanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandritra ny andro rehetra hiainanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa tsilo sy songosongo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hovokarin’ny tany ho anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary anana no hohaninao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 17-18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Heb 6.8.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny hatsembohan’ny tavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hihinananao hanina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-piverinao amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay nanalana anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vovo-tany ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiverina ho vovo-tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia namaly ny bibilava ravehivavy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Azonay hanina ihany ireo voankazo ao an-jaridaina, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ralehilahy nanao ny anaran’ny vadiny hoe Eva, izany hoe Aina, satria izy no renin’ny olombelona rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny TOMPO Andriamanitra nanamboatra akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy ny TOMPO Andriamanitra hoe: «Indro ny olombelona fa efa tonga tahaka ny iray amintsika momba ny fahalalana ny tsara sy ny ratsy; koa ankehitriny, aoka izy tsy haninjitra ny tanany haka ny voan’ny hazon’aina ka hihinana amin’izany, dia ho velona mandrakizay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Apôk 22.14.
      marker-yv: yv-n
    - type: text
      text: '!» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Noho izany, dia noroahin’ny TOMPO Andriamanitra hiala tao an-jaridainan’i Hedena ny olombelona mba handeha hiasa ny tany izay nanalàna azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Rehefa avy nandroaka ny olombelona Izy, dia nametraka teo atsinanan’ny zaridaina ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ', izay mitondra sabatra misy lelafo midedadeda mba hiambina ny lalana mankany amin’ny hazon’aina.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: afa-tsy ny voan’ny hazo eo afovoan’ny zaridaina izay efa nandraran’Andriamanitra anay tsy hohanina na hokasihina akory, fandrao mahafaty anay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy kosa ny bibilava taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy ho faty tsy akory ianareo! '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Saingy fantatr’Andriamanitra fa amin’ny andro hihinananareo azy dia hahiratra ny masonareo, ary ho tonga tahaka an’Andriamanitra ianareo ka hahalala ny tsara sy ny ratsy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hitan-dravehivavy fa maha te hihinana ny voan’ilay hazo sady mahasarika ny maso no mampitsiriritra hahazoana fahiratan-tsaina. Dia nitoazany ny voany ka nohaniny; ary nomeny koa ny vadiny izay niaraka taminy ka nihinana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia nahiratra ny mason’izy mivady ka fantany fa mitanjaka izy. Ary nanjaitra ravin’aviavy izy roa ka nataony sikina ho azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nony hariva, rehefa nitsoka ny rivotra, dia nandre ny feon’ny TOMPO Andriamanitra nitsangantsangana tao an-jaridaina ralehilahy sy ny vadiny ka niery ny tavany tao anaty hazo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Niantso an-dralehilahy ny TOMPO Andriamanitra ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa ianao?
