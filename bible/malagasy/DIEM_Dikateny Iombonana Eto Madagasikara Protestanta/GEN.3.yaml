document_id: GEN.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Noroahina avy tao an-jaridainan’i Hedena ny lehilahy sy ny vadiny
  - type: text
    content: 'Ary ny bibilava no fetsy indrindra, tamin’ny bibidia rehetra nataon’ny TOMPO Andriamanitra. Hoy izy tamin-dravehivavy:'
  - type: text
    content: –Marina ve fa noraran’Andriamanitra tsy hihinana ny voan’ny hazo rehetra ao an-jaridaina ianareo
  - type: note
    content: 'Ny bibilava: ampit Apôk 12.9; 20.2.'
  - type: text
    content: '?'
  '10':
  - type: text
    content: 'Dia namaly izy hoe:'
  - type: text
    content: –Nandre ny feonao tao an-jaridaina aho, dia natahotra fa mitanjaka, koa dia niery.
  '11':
  - type: text
    content: 'Fa hoy ny TOMPO hoe:'
  - type: text
    content: –Iza no nampahafantatra anao fa mitanjaka ianao? Moa nihinananao va ny voan’ny hazo izay norarako tsy hohaninao?
  '12':
  - type: text
    content: 'Dia namaly ralehilahy hoe:'
  - type: text
    content: –Ny vehivavy izay nomenao ho namako no nanome ahy ny voan’io hazo io, ka dia nihinana aho.
  '13':
  - type: text
    content: 'Ary hoy ny TOMPO Andriamanitra tamin-dravehivavy:'
  - type: text
    content: –Nahoana ianao no nanao izany?
  - type: text
    content: 'Fa namaly kosa ravehivavy hoe:'
  - type: text
    content: –Voafitaky ny bibilava aho ka nihinana
  - type: note
    content: Ampit 2Kôr 11.31; 1Tim 2.14.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Dia hoy ny TOMPO Andriamanitra tamin’ny bibilava:'
  - type: text
    content: '–Satria nanao izany ianao, dia ozoniko. Amin’ny biby fiompy sy ny bibidia rehetra, dia ianao ihany no handeha amin’ny kibonao, sady hihinana vovo-tany amin’ny andro rehetra hiainanao. '
  '15':
  - type: text
    content: Hampifankahalaiko ianao sy ny vehivavy, ary ny taranakao sy ny taranany. Ny tarana-behivavy no hanorotoro ny lohanao, ary ianao kosa hanorotoro ny ombalahitongotry ny taranany
  - type: note
    content: Ampit Apôk 12.17.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Avy eo dia hoy ny TOMPO Andriamanitra tamin-dravehivavy:'
  - type: text
    content: –Hampitomboiko ny fanaintainanao rehefa bevohòka ianao, ary fahoriana no hiterahanao ny zanakao; ny vadinao no hifatraran’ny fanirianao, nefa izy no hifehy anao.
  '17':
  - type: text
    content: 'Farany ralehilahy na i Adama dia nilazan’ny TOMPO Andriamanitra hoe:'
  - type: text
    content: –Satria nihaino ny feom-badinao ianao ka nihinana tamin’ny voan-kazo izay efa nandrarako anao tsy hohanina,
  - type: text
    content: dia voaozona ny tany noho ny fahadisoanao;
  - type: text
    content: tsy maintsy hiasa mafy ianao
  - type: text
    content: mba hahazoanao hanina
  - type: text
    content: mandritra ny andro rehetra hiainanao.
  '18':
  - type: text
    content: Fa tsilo sy songosongo
  - type: text
    content: no hovokarin’ny tany ho anao;
  - type: text
    content: ary anana no hohaninao
  - type: note
    content: 'And 17-18: ampit Heb 6.8.'
  - type: text
    content: .
  '19':
  - type: text
    content: Ny hatsembohan’ny tavanao
  - type: text
    content: no hihinananao hanina
  - type: text
    content: mandra-piverinao amin’ny tany
  - type: text
    content: izay nanalana anao.
  - type: text
    content: Fa vovo-tany ianao,
  - type: text
    content: ka hiverina ho vovo-tany.
  '2':
  - type: text
    content: 'Dia namaly ny bibilava ravehivavy hoe:'
  - type: text
    content: '–Azonay hanina ihany ireo voankazo ao an-jaridaina, '
  '20':
  - type: text
    content: 'Ary ralehilahy nanao ny anaran’ny vadiny hoe Eva, izany hoe Aina, satria izy no renin’ny olombelona rehetra. '
  '21':
  - type: text
    content: 'Ary ny TOMPO Andriamanitra nanamboatra akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy. '
  '22':
  - type: text
    content: 'Dia hoy ny TOMPO Andriamanitra hoe: «Indro ny olombelona fa efa tonga tahaka ny iray amintsika momba ny fahalalana ny tsara sy ny ratsy; koa ankehitriny, aoka izy tsy haninjitra ny tanany haka ny voan’ny hazon’aina ka hihinana amin’izany, dia ho velona mandrakizay'
  - type: note
    content: Jereo Apôk 22.14.
  - type: text
    content: '!» '
  '23':
  - type: text
    content: 'Noho izany, dia noroahin’ny TOMPO Andriamanitra hiala tao an-jaridainan’i Hedena ny olombelona mba handeha hiasa ny tany izay nanalàna azy. '
  '24':
  - type: text
    content: 'Rehefa avy nandroaka ny olombelona Izy, dia nametraka teo atsinanan’ny zaridaina ireo '
  - type: text
    content: kerobima
  - type: text
    content: ', izay mitondra sabatra misy lelafo midedadeda mba hiambina ny lalana mankany amin’ny hazon’aina.'
  '3':
  - type: text
    content: afa-tsy ny voan’ny hazo eo afovoan’ny zaridaina izay efa nandraran’Andriamanitra anay tsy hohanina na hokasihina akory, fandrao mahafaty anay.
  '4':
  - type: text
    content: 'Hoy kosa ny bibilava taminy:'
  - type: text
    content: '–Tsy ho faty tsy akory ianareo! '
  '5':
  - type: text
    content: Saingy fantatr’Andriamanitra fa amin’ny andro hihinananareo azy dia hahiratra ny masonareo, ary ho tonga tahaka an’Andriamanitra ianareo ka hahalala ny tsara sy ny ratsy.
  '6':
  - type: text
    content: 'Ary hitan-dravehivavy fa maha te hihinana ny voan’ilay hazo sady mahasarika ny maso no mampitsiriritra hahazoana fahiratan-tsaina. Dia nitoazany ny voany ka nohaniny; ary nomeny koa ny vadiny izay niaraka taminy ka nihinana. '
  '7':
  - type: text
    content: Dia nahiratra ny mason’izy mivady ka fantany fa mitanjaka izy. Ary nanjaitra ravin’aviavy izy roa ka nataony sikina ho azy.
  '8':
  - type: text
    content: 'Ary nony hariva, rehefa nitsoka ny rivotra, dia nandre ny feon’ny TOMPO Andriamanitra nitsangantsangana tao an-jaridaina ralehilahy sy ny vadiny ka niery ny tavany tao anaty hazo. '
  '9':
  - type: text
    content: 'Niantso an-dralehilahy ny TOMPO Andriamanitra ka nanao taminy hoe:'
  - type: text
    content: –Aiza moa ianao?
