document_id: JOB.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zava-miafin’ny Fahendrena
  - type: text
    content: Misy ny tany fitrandrahana volafotsy
  - type: text
    content: ary ny toerana fanadiovana volamena.
  '10':
  - type: text
    content: Anokafany lalana ao anaty vatolampy
  - type: text
    content: mba hahitany ny zava-tsarobidy rehetra.
  '11':
  - type: text
    content: Hainy ny manampina ny loharano
  - type: text
    content: tsy hikorianan’ny renirano;
  - type: text
    content: ka avoakany eo amin’ny mazava
  - type: text
    content: ny harena miafina rehetra.
  - type: heading
    content: '*'
  '12':
  - type: text
    content: Fa ny Fahendrena
  - type: note
    content: 'ny Fahendrena: amin’ny heviny izay ampiasana io teny io any amin’ny Ohabolana, izany hoe ny fahaiza-miaina araka ny tokony ho izy. Heverina ho toy ny olona izy eto (jereo Ohab 1.20 sy nta; 8.1 sns.)'
  - type: text
    content: ', aiza kosa no hahitana azy?'
  - type: text
    content: Aiza no toerana ipoiran’ny fahalalana?
  '13':
  - type: text
    content: Tsy misy olona mahalala ny hasarobidiny,
  - type: text
    content: satria tsy hita ao amin’ny tanin’ny velona izy.
  '14':
  - type: text
    content: 'Fa hoy ny hantsana anaty ranobe: «Tsy aty izy.»'
  - type: text
    content: 'ary hoy ny Ranomasina: «Tsy ato amiko izy.»'
  '15':
  - type: text
    content: Tsy mahatakalo azy ny vongam-bolamena madio
  - type: text
    content: ary tsy mahavidy azy ny antontam-bolafotsy.
  '16':
  - type: text
    content: Tsy mifandanja aminy na ny volamena avy any Ôfira
  - type: text
    content: na ny berila sarobidy mbamin’ny safira aza.
  '17':
  - type: text
    content: Tsy mitaha aminy na ny volamena na ny fitaratra
  - type: note
    content: ny fitaratra, tsy fahita firy tamin’izany fotoana izany, dia noheverina ho sarobidy koa.
  - type: text
    content: .
  - type: text
    content: Ary ny vazy tena volamena tsy mahatakalo azy.
  '18':
  - type: text
    content: Tsy misy antony aminy na ny voahangy na ny kristaly,
  - type: text
    content: fa mihoatra noho ny perla ny fahazoam-pahendrena.
  '19':
  - type: text
    content: Tsy azo ampitahaina akory
  - type: text
    content: ny tôpaza
  - type: note
    content: 'ny tôpaza: vatosoa mavo tantera-pahazavana.'
  - type: text
    content: ' avy any Etiopia;'
  - type: text
    content: ary tsy mifandanja aminy
  - type: text
    content: na dia ny volamena madio aza.
  - type: heading
    content: '*'
  '2':
  - type: text
    content: Ny vy dia alaina avy amin’ny tany,
  - type: text
    content: ary ny varahina avy amin’ny vato narendrika.
  '20':
  - type: text
    content: Fa avy aiza àry ny fahendrena?
  - type: text
    content: Aiza no toerana ipoiran’ny fahalalana?
  '21':
  - type: text
    content: Miafina amin’ny mason’ny velona rehetra izany,
  - type: text
    content: ary takona amin’ny vorona eny an-danitra koa aza.
  '22':
  - type: text
    content: 'Hoy Rafahafatesana sy Rafandravana hoe:'
  - type: text
    content: «Eny, renay siosio fotsiny ny aminy.»
  '23':
  - type: text
    content: Fa Andriamanitra no mahalala ny lalana mankany,
  - type: text
    content: ary Izy ihany no mahafantatra ny misy azy.
  '24':
  - type: text
    content: Fa mahatsinjo hatrany am-paran’ny tany Izy
  - type: text
    content: ary mahita izao rehetra ambanin’ny lanitra izao.
  '25':
  - type: text
    content: Rehefa nametra ny lanjan’ny rivotra
  - type: text
    content: sy nandraikitra ny fatran’ny rano Izy
  '26':
  - type: text
    content: ary nandrindra lalàna ho an’ny orana
  - type: text
    content: sy nanori-dalana ho an’ny kotroka,
  '27':
  - type: text
    content: dia nahita ny Fahendrena
  - type: text
    content: ka nanambara ny hatsarany
  - type: text
    content: nony avy nandinidinika azy
  - type: text
    content: ary koa namotopototra ny aminy.
  '28':
  - type: text
    content: 'Dia hoy Andriamanitra tamin’ny olona:'
  - type: text
    content: «Ny fanajana ny Tompo, izany no Fahendrena;
  - type: text
    content: ary ny fialana amin’ny ratsy no fahalalana
  - type: note
    content: Jereo Sal 111.10; Ohab 1.7; 9.10.
  - type: text
    content: .»
  '3':
  - type: text
    content: Mampisava ny haizina ny mpitrandraka;
  - type: text
    content: ka hatrany amin’ny fanambanin’ny tany
  - type: text
    content: no ikarohany ny vato miafina
  - type: text
    content: ao anatin’ny haizim-pito mangitsokitsoka.
  '4':
  - type: text
    content: Mihady lavaka lavitry ny fonenana izy;
  - type: text
    content: ka any amin’ny toerana tsy fandalovan’olona
  - type: text
    content: no ihantonany sy itsingevahevany amin’ny tady.
  '5':
  - type: text
    content: Ny vohon-tany no mamokatra hanina
  - type: text
    content: fa ny ao ambany kosa toa navadibadiky ny afo.
  '6':
  - type: text
    content: Ny vatony no fitoeran’ny safira
  - type: note
    content: 'safira: vatosoa manga, tantera-pahazavana.'
  - type: text
    content: ary ny vovony no ahitam-bolamena.
  '7':
  - type: text
    content: Tsy fantatry ny papango ny lalana mankany
  - type: text
    content: sady tsy hitan’ny masom-boromahery.
  '8':
  - type: text
    content: Tsy mbola nodiavin’ny biby masiaka izany,
  - type: text
    content: ary tsy mba falehan’ny liona.
  '9':
  - type: text
    content: Nefa sahy mihady ny vatomainty ihany ny olona
  - type: text
    content: ka misava ny tendrombohitra hatrany ifotony.
