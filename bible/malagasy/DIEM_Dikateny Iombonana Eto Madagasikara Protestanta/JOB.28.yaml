document_id: JOB.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zava-miafin’ny Fahendrena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Misy ny tany fitrandrahana volafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny toerana fanadiovana volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny vy dia alaina avy amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny varahina avy amin’ny vato narendrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mampisava ny haizina ny mpitrandraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hatrany amin’ny fanambanin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ikarohany ny vato miafina
- type: usfm
  marker: q1
  children:
  - type: text
    text: ao anatin’ny haizim-pito mangitsokitsoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihady lavaka lavitry ny fonenana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka any amin’ny toerana tsy fandalovan’olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: no ihantonany sy itsingevahevany amin’ny tady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vohon-tany no mamokatra hanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny ao ambany kosa toa navadibadiky ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny vatony no fitoeran’ny safira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'safira: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vatosoa manga, tantera-pahazavana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny vovony no ahitam-bolamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy fantatry ny papango ny lalana mankany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady tsy hitan’ny masom-boromahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy mbola nodiavin’ny biby masiaka izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mba falehan’ny liona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nefa sahy mihady ny vatomainty ihany ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka misava ny tendrombohitra hatrany ifotony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Anokafany lalana ao anaty vatolampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hahitany ny zava-tsarobidy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hainy ny manampina ny loharano
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hikorianan’ny renirano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka avoakany eo amin’ny mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny harena miafina rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa ny Fahendrena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny Fahendrena: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny heviny izay ampiasana io teny io any amin’ny Ohabolana, izany hoe ny fahaiza-miaina araka ny tokony ho izy. Heverina ho toy ny olona izy eto (jereo Ohab 1.20 sy nta; 8.1 sns.)
    marker-yv: yv-n
  - type: text
    text: ', aiza kosa no hahitana azy?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza no toerana ipoiran’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy olona mahalala ny hasarobidiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria tsy hita ao amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy ny hantsana anaty ranobe: «Tsy aty izy.»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary hoy ny Ranomasina: «Tsy ato amiko izy.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy mahatakalo azy ny vongam-bolamena madio
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mahavidy azy ny antontam-bolafotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy mifandanja aminy na ny volamena avy any Ôfira
- type: usfm
  marker: q1
  children:
  - type: text
    text: na ny berila sarobidy mbamin’ny safira aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy mitaha aminy na ny volamena na ny fitaratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny fitaratra, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy fahita firy tamin’izany fotoana izany, dia noheverina ho sarobidy koa.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vazy tena volamena tsy mahatakalo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy misy antony aminy na ny voahangy na ny kristaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mihoatra noho ny perla ny fahazoam-pahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy azo ampitahaina akory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny tôpaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tôpaza: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vatosoa mavo tantera-pahazavana.
    marker-yv: yv-n
  - type: text
    text: ' avy any Etiopia;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy mifandanja aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: na dia ny volamena madio aza.
- type: usfm
  marker: s1
  children:
  - type: text
    text: '*'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa avy aiza àry ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza no toerana ipoiran’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Miafina amin’ny mason’ny velona rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary takona amin’ny vorona eny an-danitra koa aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy Rafahafatesana sy Rafandravana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eny, renay siosio fotsiny ny aminy.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Andriamanitra no mahalala ny lalana mankany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary Izy ihany no mahafantatra ny misy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa mahatsinjo hatrany am-paran’ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahita izao rehetra ambanin’ny lanitra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa nametra ny lanjan’ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nandraikitra ny fatran’ny rano Izy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary nandrindra lalàna ho an’ny orana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy nanori-dalana ho an’ny kotroka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia nahita ny Fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nanambara ny hatsarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: nony avy nandinidinika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary koa namotopototra ny aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’ny olona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ny fanajana ny Tompo, izany no Fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny fialana amin’ny ratsy no fahalalana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 111.10; Ohab 1.7; 9.10.
    marker-yv: yv-n
  - type: text
    text: .»
