document_id: EXO.24,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Manao fanekempihavanana amin’i Israely Andriamanitra
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Miakara atỳ Amiko etỳ an-tendrombohitra miaraka amin’i Aharôna sy i Nadaba sy i Abihò
  - type: note
    content: 'i Nadaba sy i Abihò: zanakalahin’i Aharôna anankiroa, jereo 6.23.'
  - type: text
    content: ' ary '
  - type: text
    content: loholona
  - type: text
    content: ' fitopolo amin’ny Israely. Ka raha mbola eny lavidavitra eny ianareo, dia aoka hiankohoka amin’ny tany. '
  '10':
  - type: text
    content: 'Ary nahita an’ilay Andriamanitr’i Israely izy ireo: ny teo ambany tongony dia karazana lampivato safira, manga manganohano toa volon-danitra. '
  '11':
  - type: text
    content: Tsy namely ireto olo-manga israelita ireto Andriamanitra, ka afaka nijery Azy ry zareo sady nihinana sy nisotro.
  - type: heading
    content: Mihaona amin’Andriamanitra eo an-tendrombohitra i Mosesy
  '12':
  - type: text
    content: 'Hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Miakara etỳ akaikiko etỳ an-tendrombohitra, ary mijanòna eo. Homeko anao ny vatofisaka izay nanoratako ny didy aman-dalàna mba hampianarinao ny Israelita. '
  '13':
  - type: text
    content: 'Dia niakatra teo an-tendrombohitr’Andriamanitra i Mosesy, niaraka tamin’i Josoa mpanompony, '
  '14':
  - type: text
    content: 'rehefa avy nilaza tamin’ny '
  - type: text
    content: loholona
  - type: text
    content: ' hoe: «Andraso eto izahay mandra-piverinay. Indreo i Aharôna sy i Hora hijanona miaraka aminareo; koa raha misy manana olana, dia manatòna azy roa lahy.» '
  '15':
  - type: text
    content: Raha mbola nandroso niakatra ny tendrombohitra i Mosesy, dia rakotry ny rahona
  - type: note
    content: 'ny rahona: jereo 13.21 sy nta.'
  - type: text
    content: ' ny tendrombohitra. '
  '16':
  - type: text
    content: 'Nipetraka teo an-tendrombohitra Sinay ny '
  - type: text
    content: voninahitry
  - type: text
    content: ' ny TOMPO, ka ny rahona no nandrakotra azy nandritra ny enina andro. Tamin’ny andro fahafito dia niantso an’i Mosesy tao afovoan’io rahona io Andriamanitra. '
  '17':
  - type: text
    content: 'Toy ny afo mandevona no fahitàn’ny Israelita ny voninahitry ny TOMPO teo an-tampon’ny tendrombohitra Sinay. '
  '18':
  - type: text
    content: Niditra tao afovoan’ny rahona i Mosesy, ka nanohy niakatra ny tendrombohitra ary nijanona tao an-tendrombohitra nandritra ny efapolo andro sy efapolo alina
  - type: note
    content: Jereo Deot 9.9.
  - type: text
    content: .
  '2':
  - type: text
    content: Avy eo dia ianao ihany no hanatona AHY, fa ny sisa kosa tsy mahazo manatona; ary ny vahoaka dia tsy hiakatra etỳ an-tendrombohitra miaraka aminareo.
  '3':
  - type: text
    content: 'Dia lasa nitatitra tamin’ny Israelita izay rehetra nolazain’ny TOMPO sy nandidiany azy i Mosesy, ka novalian’ny vahoaka manontolo indray niredona hoe:'
  - type: text
    content: –Ny zavatra rehetra izay nandidian’ny TOMPO anay dia hotanterahinay avokoa.
  '4':
  - type: text
    content: 'Nosoratan’i Mosesy avokoa ny tenin’ny TOMPO taminy; ary nony ampitso dia nifoha maraina izy ka nanamboatra '
  - type: text
    content: alitara
  - type: text
    content: ' iray teo am-pototry ny tendrombohitra sy nanangana tsangambato 12, ka iray avy isam-poko tao amin’ny Israely. '
  '5':
  - type: text
    content: 'Naniraka tovolahy israelita izy mba hanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ho an’ny TOMPO sady hitondra ombilahy hatao sorom-pihavanana. '
  '6':
  - type: text
    content: 'Dia nalain’i Mosesy ny antsasaky ny ran’ny biby ka nataony tao an-dovia, fa ny antsasany kosa nafafiny teo ambony alitara. '
  '7':
  - type: text
    content: 'Avy eo dia nalainy ny bokin’ny '
  - type: text
    content: fanekempihavanana
  - type: note
    content: Ny bokin’ny fanekempihavanana dia ilay vao avy nosoratan’i Mosesy, jereo and 4.
  - type: text
    content: ' ka novakîny mafy teo imason’ny vahoaka. Dia nanambara ny Israelita hoe:'
  - type: text
    content: –Ny zavatra rehetra izay nandidian’ny TOMPO anay dia hotanterahinay an-tsakany sy an-davany.
  '8':
  - type: text
    content: 'Koa nalain’i Mosesy àry ny ra tao amin’ny lovia, dia nafafiny tamin’ny Israelita sady nataony hoe:'
  - type: text
    content: –Ity ra ity no manamafy ny fanekempihavanana izay nataon’ny TOMPO taminareo fony Izy nanome ireo didy rehetra ireo ho anareo
  - type: note
    content: Jereo Mt 26.28; Mk 14.24; Lk 22.20; 1Kôr 11.25; Heb 9.19-20; 10.29.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Taorian’izany, dia niakatra teny an-tendrombohitra i Mosesy, niaraka tamin’i Aharôna sy i Nadaba sy i Abihò ary loholona fitopolo tamin’i Israely. '
