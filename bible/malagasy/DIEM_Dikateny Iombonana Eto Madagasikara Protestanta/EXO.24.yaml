document_id: EXO.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manao fanekempihavanana amin’i Israely Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Miakara atỳ Amiko etỳ an-tendrombohitra miaraka amin’i Aharôna sy i Nadaba sy i Abihò
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'i Nadaba sy i Abihò: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanakalahin’i Aharôna anankiroa, jereo 6.23.
    marker-yv: yv-n
  - type: text
    text: ' ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' fitopolo amin’ny Israely. Ka raha mbola eny lavidavitra eny ianareo, dia aoka hiankohoka amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy eo dia ianao ihany no hanatona AHY, fa ny sisa kosa tsy mahazo manatona; ary ny vahoaka dia tsy hiakatra etỳ an-tendrombohitra miaraka aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia lasa nitatitra tamin’ny Israelita izay rehetra nolazain’ny TOMPO sy nandidiany azy i Mosesy, ka novalian’ny vahoaka manontolo indray niredona hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny zavatra rehetra izay nandidian’ny TOMPO anay dia hotanterahinay avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nosoratan’i Mosesy avokoa ny tenin’ny TOMPO taminy; ary nony ampitso dia nifoha maraina izy ka nanamboatra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' iray teo am-pototry ny tendrombohitra sy nanangana tsangambato 12, ka iray avy isam-poko tao amin’ny Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Naniraka tovolahy israelita izy mba hanolotra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ho an’ny TOMPO sady hitondra ombilahy hatao sorom-pihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nalain’i Mosesy ny antsasaky ny ran’ny biby ka nataony tao an-dovia, fa ny antsasany kosa nafafiny teo ambony alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy eo dia nalainy ny bokin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny bokin’ny fanekempihavanana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ilay vao avy nosoratan’i Mosesy, jereo and 4.
    marker-yv: yv-n
  - type: text
    text: ' ka novakîny mafy teo imason’ny vahoaka. Dia nanambara ny Israelita hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ny zavatra rehetra izay nandidian’ny TOMPO anay dia hotanterahinay an-tsakany sy an-davany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nalain’i Mosesy àry ny ra tao amin’ny lovia, dia nafafiny tamin’ny Israelita sady nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ity ra ity no manamafy ny fanekempihavanana izay nataon’ny TOMPO taminareo fony Izy nanome ireo didy rehetra ireo ho anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 26.28; Mk 14.24; Lk 22.20; 1Kôr 11.25; Heb 9.19-20; 10.29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Taorian’izany, dia niakatra teny an-tendrombohitra i Mosesy, niaraka tamin’i Aharôna sy i Nadaba sy i Abihò ary loholona fitopolo tamin’i Israely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nahita an’ilay Andriamanitr’i Israely izy ireo: ny teo ambany tongony dia karazana lampivato safira, manga manganohano toa volon-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy namely ireto olo-manga israelita ireto Andriamanitra, ka afaka nijery Azy ry zareo sady nihinana sy nisotro.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mihaona amin’Andriamanitra eo an-tendrombohitra i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miakara etỳ akaikiko etỳ an-tendrombohitra, ary mijanòna eo. Homeko anao ny vatofisaka izay nanoratako ny didy aman-dalàna mba hampianarinao ny Israelita. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niakatra teo an-tendrombohitr’Andriamanitra i Mosesy, niaraka tamin’i Josoa mpanompony, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'rehefa avy nilaza tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' hoe: «Andraso eto izahay mandra-piverinay. Indreo i Aharôna sy i Hora hijanona miaraka aminareo; koa raha misy manana olana, dia manatòna azy roa lahy.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha mbola nandroso niakatra ny tendrombohitra i Mosesy, dia rakotry ny rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny rahona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nipetraka teo an-tendrombohitra Sinay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: voninahitry
  - type: text
    text: ' ny TOMPO, ka ny rahona no nandrakotra azy nandritra ny enina andro. Tamin’ny andro fahafito dia niantso an’i Mosesy tao afovoan’io rahona io Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toy ny afo mandevona no fahitàn’ny Israelita ny voninahitry ny TOMPO teo an-tampon’ny tendrombohitra Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Niditra tao afovoan’ny rahona i Mosesy, ka nanohy niakatra ny tendrombohitra ary nijanona tao an-tendrombohitra nandritra ny efapolo andro sy efapolo alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 9.9.
    marker-yv: yv-n
  - type: text
    text: .
