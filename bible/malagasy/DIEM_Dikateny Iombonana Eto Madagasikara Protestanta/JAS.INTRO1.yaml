  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny taratasy avy amin’i Jakôba dia mirakitra torolalana hoenti-miaina aroso «ho an’ny vahoakan’Andriamanitra rehetra miely patrana eran-tany » (1.1). Fomba fiteny velombelona sy mahery vaika sady ombàn-tsarisary manaitra no ampiasain’i Jakôba (izay heverin’ny sasany ho ilay rahalahin’ny Tompo), raha manoratra amin’ny kristianina izy mba hanapotsipotsitra ny fitondrantena ataon’ireo na amin’izy samy izy na amin’ny tsy kristianina.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny lohahevitra velabelarina ato amin’ity taratasy ity dia mifanesisesy, hany ka sarotra anaovana drafitra mazava sy mifampitohy tsara. Tsarovan’i Jakôba voalohany indrindra ny amin’ny fahendrena: avy amin’Andriamanitra izany ka tsy maintsy angatahina aminy am-pinoana tsy miahanahana (1.2-8). Vita izany, dia misesy amin’izay ny fampianaran’i Jakôba momba ny fahantrana sy ny harena, momba ny fitsapana sy ny fakampanahy, ary momba ny fivavahana tena izy ka aseho amin’ny atao (1.9-27). Manaraka izany, dia manao teny mahery izy manohitra izay rehetra mety ho fanavakavahana misy ao amin’ny Fiangonana (2.1-13); avy eo i Jakôba dia miroso amin’izay azo heverina fa tena fotokevitra lehibe raketin’ny taratasiny: ny fifandraisan’ny finoana sy ny atao (2.14-26). Aorian’izany, dia potsipotsirin’ny mpanoratra ireo fahotana vitan’ny lela, ao amin’ny perikôpa iray feno fanoharana sy fampitahana mafonja tokoa (3.1-12). Dia iverenany amin’izay indray ny fotokevitra momba ny tena fahendrena (3.13-18). Teneniny mafy ireo olona mampisy fifandirana, dia ireo olona sakaizan’izao tontolo izao ka manora-tena ho mpitsara ny kristianina namany, ary teneniny mafy koa ireo mpanankarena mitsentsitra ny mpiasany (4.1–5.6). Eo am-pamaranana ny taratasiny, dia hafatrafaran’ny mpanoratra ireo kristianina mba hanam-paharetana sy hazoto hivavaka ary hahay mifanampy.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mazava ny takîn’ity taratasy natao hovakîn’ny kristianina tsy an-kanavaka ity, dia ny hoe: tsy ampy ny mino ara-tsaina fotsiny ny Vaovao Mahafaly momba an’i Jesoa; fa tsy maintsy aseho amin’ny atao koa ny finoana, satria «maty ny finoana raha tsy ombàn’asa» (2.26).'
