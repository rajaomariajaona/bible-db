document_id: GEN.40,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany zavatra izany dia nanao fahadisoana tamin’ny mpanjakan’i Ejipta tompony ny lehiben’ny mpandroso zava-pisotro ary koa ny lehiben’ny mpanao mofo. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nisampana telo ilay foto-boaloboka, ka raha vao nitsimoka izy, dia namelana ary nisy voaloboka masaka an-tangozany. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Teny an-tanako ny tsangambavan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ' ary notazako ny voaloboka, ka nofiazako tao; dia natolotro teo an-tanan’ny Farao ilay tsangambava.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy i Jôsefa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no hevitry ny nofinao: ny sampany telo dia manambara andro telo. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ato anatin’ny telo andro dia hasandratry Farao ianao, ka haveriny eo amin’ny toeranao, ary hanolotra ny tsangambavan’ny Farao toy ny teo aloha araka ny maha lehiben’ny mpandroso zava-pisotro anao. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa mba tsarovy aho rehefa hambinina ianao, anehoy hatsaram-po ka mba resaho amin’ny Farao hamoahanao ahy hiala amin’ity tranomaizina ity. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa an-keriny no nitondrana ahy avy tany amin’ny tanin’ny Hebreo; ary teto koa dia tsy nanao na inona na inona akory aho, nefa natao an-tranomaizina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony hitan’ilay lehiben’ny mpanao mofo fa tsara ny hevitry ny nofy nambaran’i Jôsefa, dia hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho koa mba nanonofy, ka nisy hono harona telo fitondrana mofo nololohaviko. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tao amin’ilay harona ambony indrindra dia feno ireo mofo fihinan’ny Farao, saingy tonga ny voro-manidina ka nihinana azy tao an-karona teny an-dohako.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’i Jôsefa azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no hevitry ny nofinao: ny harona telo dia manambara andro telo. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ato anatin’ny telo andro dia hoesorin’ny Farao amin’ny toeram-boninahitrao ianao, ka hahantony amin’ny hazo; dia ho avy ny voro-manidina hihinana ny nofonao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tezitra mafy tamin’ireo tandapany roa lahy ireo ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farao
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony afaka telo andro, dia nitsingerina ny andro nahaterahan’ny Farao, ka nanao fanasam-be ho an’ireo mpanompony rehetra izy. Koa teo anivon’ireo mpanompony no nanehoan’ny Farao an’ilay lehiben’ny mpandroso zava-pisotro sy ilay lehiben’ny mpanao mofo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay lehiben’ny mpandroso zava-pisotro dia naveriny tamin’ny raharahany ka nanolotra ny tsangambava ho eo an-tanàn’ny Farao; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ilay lehiben’ny mpanao mofo kosa dia nasainy nahantona. Dia araka izay efa nambaran’i Jôsefa tamin’izy roa lahy avy izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo nanadino tanteraka an’i Jôsefa ilay lehiben’ny mpandroso zava-pisotro.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nampanao azy an-tranomaizina; ny fonenan’ilay lehiben’ny mpiambina no nisy io tranomaizina io, dia ny fonja izay nigadran’i Jôsefa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ilay lehiben’ny mpiambina kosa nametraka azy roa lahy teo ambany fitandreman’i Jôsefa; ary fotoana vitsivitsy no nitanana azy tao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nolazain’i Jôsefa ny hevitry ny nofin’izy roa lahy
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray alina dia samy nanonofy tao an-tranomaizina izy roa lahy, dia ny lehiben’ny mpandroso zava-pisotro ary koa ny mpanao mofon’ny mpanjakan’i Ejipta; ary samy nanana ny heviny avy ny nofiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony maraina, rehefa tonga hijery azy ireo i Jôsefa, dia nahita azy nanjoretra, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no malahelo tarehy ianareo androany?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novalian’izy roa lahy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Samy nanonofy izahay, nefa tsy misy olona mahalaza ny heviny.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Jôsefa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andriamanitra ihany no afaka manome ny heviny, fa mba tantarao amiko aloha ny nofinareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitantara ny nofiny tamin’i Jôsefa ilay lehiben’ny mpandroso zava-pisotron’ny mpanjaka, ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nofiko fa nisy, hono foto-boaloboka iray teo anoloako. '
