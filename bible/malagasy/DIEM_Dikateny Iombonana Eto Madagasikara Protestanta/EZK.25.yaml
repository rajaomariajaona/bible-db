        - type: text
          text: 'mpifindrafindra monina avy any atsinanana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo ny naoty momba ny and 4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hotanterahiko ny famaizana ny Môabita; amin’izay dia hoekeny fa Izaho no TOMPO.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza mananontanona hamelezana ny Edômita
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Nanao valifaty mahatsiravina tamin’ny vahoakan’i Joda ny Edômita, ary izany no mahameloka azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edômita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' nanararaotra ny faharavàn’i Joda dia nandrombina be tamin’ny taniny ka nandroso hatrany Hebrôna; ary io faritany midadasika io dia natao hoe Idomea (jereo Mk 3.8). –And 12-14: jereo 31.1-15 sy nta momba ny Isa 34.5.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa Izaho Tompo ANDRIANANAHARY dia manambara fa haneho ny heriko hamelezana an’i Edôma. Haringako ny olona sy ny biby fiompy amin’io tany io; ary hataoko lao izy, manomboka eo an-tanànan’i Temàna ka hatrany Dedàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Temàna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàn-dehibe na faritany amin’ny ilany andrefan’i Edôma. Kanefa ny fiteny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: avy eo an-tanànan’i Temàna ka hatrany Dedàna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' eto dia toa mampiseho ny fitambaran’ny tany edômita manontolo, fa tsy manondro tanàna mazava.'
      marker-yv: yv-n
    - type: text
      text: ', ka ho faty an’ady ny mponina ao aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hankiniko amin’i Israely vahoakako ny famaizako an’ireo Edômita. Koa araka izay takin’ny fahatezerako amam-pahavinirako no hatao aminy mba hahatsapany ny ngidim-pamaizako. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza mananontanona hamelezana ny Filistinina
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Valifaty no nafitsoky ny Filistinina, dia valifaty mahatsiravina vokatry ny fanaovana tsinontsinona ireo ankahalainy hatry ny ela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ireo ankahalainy hatry ny ela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Filistinina sy ny namany nipetraka teo amoron’ny Ranomasina Mediteranea (and 16) dia fahavalon’i Israely hatramin’ny andron’ny Mpitsara (jereo Mpits 15–16).
      marker-yv: yv-n
    - type: text
      text: ' ka nahatonga azy handringana ireny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa Izaho Tompo ANDRIANANAHARY dia manambara aminy fa haneho ny heriko hamelezana azy. Haringako ny Keretita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Keretita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'anisan’ny fiantsoana ny Filistinina izany, satria toa avy any amin’ny nosy Kreta ireo. –Momba ny and 15-16: jereo ny naoty momba ny Is 14.29.'
      marker-yv: yv-n
    - type: text
      text: ' ary horavako ny olon-kafa sisa izay namany mipetraka amin’iny moron-dranomasina iny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Famaizana mangotraka no famaliana mahatsiravina hamelezako azy; ka rehefa hampihariko aminy tokoa izany, dia hoekeny fa Izaho no TOMPO.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ry ilay taranak’olombelona, mitodiha amin’ny Hamônita ary mijoroa ho mpaminany ny amin’ny hamelezana azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mijoroa... azy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 21.33-37 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asaovy mihaino izy fa izao no teny lazain’ny Tompo ANDRIANANAHARY aminy: ‹Nihomehy ianareo fony nozimbazimbaina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: toerako masina
    - type: text
      text: ' ary nosimbana ny tanin’i Israely sady nentina ho babo ny olon’i Joda. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, havelako halain’ireo mpifindrafindra monina avy any atsinanana ny taninareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mpifindrafindra monina avy any atsinanana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ireo foko Bedoina izay nipetraka tany atsinanan’i Jôrdàna tamin’ny tanin’ny Hamônita sy Môabita (jereo and 10).
      marker-yv: yv-n
    - type: text
      text: ': Hanorina toby eo amin’ny taninareo izy ka hamelatra ny lainy eo. Ireny no hihinana ny voankazo sy hisotro ny ronono izay anareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatao tonga fiandrasana rameva i Rabà renivohitrareo, ary hanjary valan’ondry ny tany hamônita manontolo. Amin’izay dia hoekenareo fa Izaho no TOMPO.›
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Eny, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nitehaka sy nitsinjaka ary nifaly tokoa ianareo tamin’ny loza nanjo an’i Israely. Izany no nanaovanareo tsinontsinona ny vahoakako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa haneho ny heriko hamelezana anareo Aho, ary hanolotra anareo amin’ny firenen-kafa izay handroba anareo tanteraka. Hofoanako tsy ho firenena intsony ianareo, tsy hanan-tany intsony fa haringako tanteraka. Amin’izay dia hoekenareo fa Izaho no TOMPO›. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loza mananontanona hamelezana ny Môabita
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Nilaza ny Môabita'
