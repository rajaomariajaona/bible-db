type_code: plt
verses:
  '1':
  - type: heading
    content: Loza mananontanona hamelezana ny Hamônita
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Ireo mpifindrafindra monina avy any atsinanana dia havelako haka an’i Môaba ankoatra izay nakany ny tanin’ireo Hamônita, ka tsy hahatsiarovana intsony ireo Hamônita any amin’ny firenen-kafa
  - type: note
    content: 'mpifindrafindra monina avy any atsinanana: jereo ny naoty momba ny and 4.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Hotanterahiko ny famaizana ny Môabita; amin’izay dia hoekeny fa Izaho no TOMPO.»
  - type: heading
    content: Loza mananontanona hamelezana ny Edômita
  '12':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Nanao valifaty mahatsiravina tamin’ny vahoakan’i Joda ny Edômita, ary izany no mahameloka azy'
  - type: note
    content: 'Ny Edômita nanararaotra ny faharavàn’i Joda dia nandrombina be tamin’ny taniny ka nandroso hatrany Hebrôna; ary io faritany midadasika io dia natao hoe Idomea (jereo Mk 3.8). –And 12-14: jereo 31.1-15 sy nta momba ny Isa 34.5.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Koa Izaho Tompo ANDRIANANAHARY dia manambara fa haneho ny heriko hamelezana an’i Edôma. Haringako ny olona sy ny biby fiompy amin’io tany io; ary hataoko lao izy, manomboka eo an-tanànan’i Temàna ka hatrany Dedàna
  - type: note
    content: 'Temàna: tanàn-dehibe na faritany amin’ny ilany andrefan’i Edôma. Kanefa ny fiteny hoe avy eo an-tanànan’i Temàna ka hatrany Dedàna eto dia toa mampiseho ny fitambaran’ny tany edômita manontolo, fa tsy manondro tanàna mazava.'
  - type: text
    content: ', ka ho faty an’ady ny mponina ao aminy. '
  '14':
  - type: text
    content: Hankiniko amin’i Israely vahoakako ny famaizako an’ireo Edômita. Koa araka izay takin’ny fahatezerako amam-pahavinirako no hatao aminy mba hahatsapany ny ngidim-pamaizako. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: heading
    content: Loza mananontanona hamelezana ny Filistinina
  '15':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Valifaty no nafitsoky ny Filistinina, dia valifaty mahatsiravina vokatry ny fanaovana tsinontsinona ireo ankahalainy hatry ny ela'
  - type: note
    content: 'Ireo ankahalainy hatry ny ela: ny Filistinina sy ny namany nipetraka teo amoron’ny Ranomasina Mediteranea (and 16) dia fahavalon’i Israely hatramin’ny andron’ny Mpitsara (jereo Mpits 15–16).'
  - type: text
    content: ' ka nahatonga azy handringana ireny. '
  '16':
  - type: text
    content: Koa Izaho Tompo ANDRIANANAHARY dia manambara aminy fa haneho ny heriko hamelezana azy. Haringako ny Keretita
  - type: note
    content: 'Keretita: anisan’ny fiantsoana ny Filistinina izany, satria toa avy any amin’ny nosy Kreta ireo. –Momba ny and 15-16: jereo ny naoty momba ny Is 14.29.'
  - type: text
    content: ' ary horavako ny olon-kafa sisa izay namany mipetraka amin’iny moron-dranomasina iny. '
  '17':
  - type: text
    content: Famaizana mangotraka no famaliana mahatsiravina hamelezako azy; ka rehefa hampihariko aminy tokoa izany, dia hoekeny fa Izaho no TOMPO.»
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, mitodiha amin’ny Hamônita ary mijoroa ho mpaminany ny amin’ny hamelezana azy
  - type: note
    content: 'mijoroa... azy: jereo 21.33-37 sy nta.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Asaovy mihaino izy fa izao no teny lazain’ny Tompo ANDRIANANAHARY aminy: ‹Nihomehy ianareo fony nozimbazimbaina ny '
  - type: text
    content: toerako masina
  - type: text
    content: ' ary nosimbana ny tanin’i Israely sady nentina ho babo ny olon’i Joda. '
  '4':
  - type: text
    content: Noho izany, havelako halain’ireo mpifindrafindra monina avy any atsinanana ny taninareo
  - type: note
    content: 'Ny mpifindrafindra monina avy any atsinanana: dia ireo foko Bedoina izay nipetraka tany atsinanan’i Jôrdàna tamin’ny tanin’ny Hamônita sy Môabita (jereo and 10).'
  - type: text
    content: ': Hanorina toby eo amin’ny taninareo izy ka hamelatra ny lainy eo. Ireny no hihinana ny voankazo sy hisotro ny ronono izay anareo. '
  '5':
  - type: text
    content: Hatao tonga fiandrasana rameva i Rabà renivohitrareo, ary hanjary valan’ondry ny tany hamônita manontolo. Amin’izay dia hoekenareo fa Izaho no TOMPO.›
  '6':
  - type: text
    content: '«Eny, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nitehaka sy nitsinjaka ary nifaly tokoa ianareo tamin’ny loza nanjo an’i Israely. Izany no nanaovanareo tsinontsinona ny vahoakako. '
  '7':
  - type: text
    content: Koa haneho ny heriko hamelezana anareo Aho, ary hanolotra anareo amin’ny firenen-kafa izay handroba anareo tanteraka. Hofoanako tsy ho firenena intsony ianareo, tsy hanan-tany intsony fa haringako tanteraka. Amin’izay dia hoekenareo fa Izaho no TOMPO›. »
  - type: heading
    content: Loza mananontanona hamelezana ny Môabita
  '8':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: «Nilaza ny Môabita'
  - type: note
    content: 'Ny Môabita: araka ny dkt tranainy izany; fa ny RM kosa manao hoe Môaba sy Sehîra (na Edôma). –Momba ny and 8-11, jereo ny naoty momba ny Is 15.1.'
  - type: text
    content: ' fa efa tonga tahaka ny firenena hafa rehetra izao i Joda. '
  '9':
  - type: text
    content: Koa hasaiko tafihina ireo tanàn-dehibe miaro ny fidirana any Môaba, hifanesy ho rava ireo tanàna tsara indrindra toa an’i Bety-Jesimôta sy i Bahala-Mehôna ary i Kiriataima
  - type: note
    content: Bety-Jesimôta, Bahala-Mehôna ary Kiriataima dia an’ny fokon’i Reobena (jereo Jos 13.17-20) fa nanjary lasan’ny Môabita. Irỳ voalohany dia teo amoron’ny Ranomasina Maty any amin’ny ilany avaratra, ary ny roa sisa kosa dia teo amin’ny lembalemba mandondona ny Ranomasina Maty ao amin’ny ilany atsinanana.
  - type: text
    content: '. '
