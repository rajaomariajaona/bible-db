      text: Loza mananontanona hamelezana ny Hamônita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo mpifindrafindra monina avy any atsinanana dia havelako haka an’i Môaba ankoatra izay nakany ny tanin’ireo Hamônita, ka tsy hahatsiarovana intsony ireo Hamônita any amin’ny firenen-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
