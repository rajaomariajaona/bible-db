          text: dia an’ny fokon’i Reobena (jereo Jos 13.17-20) fa nanjary lasan’ny Môabita. Irỳ voalohany dia teo amoron’ny Ranomasina Maty any amin’ny ilany avaratra, ary ny roa sisa kosa dia teo amin’ny lembalemba mandondona ny Ranomasina Maty ao amin’ny ilany atsinanana.
