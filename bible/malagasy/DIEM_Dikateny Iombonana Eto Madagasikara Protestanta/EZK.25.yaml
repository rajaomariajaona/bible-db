      marker-yv: yv-n
    - type: text
      text: ' fa efa tonga tahaka ny firenena hafa rehetra izao i Joda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa hasaiko tafihina ireo tanàn-dehibe miaro ny fidirana any Môaba, hifanesy ho rava ireo tanàna tsara indrindra toa an’i Bety-Jesimôta sy i Bahala-Mehôna ary i Kiriataima
    - type: usfm
      marker: f
