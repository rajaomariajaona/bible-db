document_id: HOS.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Izay mamafy rivotra hijinja tadio
  - type: text
    content: Tsofy ny anjomara,
  - type: text
    content: fa ho toy ny voromahery
  - type: text
    content: ny fiantefan’ny loza
  - type: text
    content: amin’ny tanin’ny TOMPO.
  - type: text
    content: «Satria nandika ny fanekempihavanako
  - type: text
    content: ireo olon’i Israely ireo, hoy Izaho TOMPO,
  - type: text
    content: ary nanohitra ny fampianarako.
  '10':
  - type: text
    content: Na dia nizara fanomezana
  - type: text
    content: tamin’ny firenen-kafa aza izy,
  - type: text
    content: dia tonga kosa ny fotoana
  - type: text
    content: hamoriako azy ankehitriny.
  - type: text
    content: Ary tsy ho ela izy dia hijaly
  - type: text
    content: noho izay hatambesatr’ilay mpanjakan’andriana
  - type: note
    content: 'ny mpanjakan’andriana: fiantsoana ihany koa ny mpanjakan’i Asiria.'
  - type: text
    content: .
  '11':
  - type: text
    content: Nampitombo ireo alitara i Efraîma
  - type: text
    content: mba hahatonga azy hanota;
  - type: text
    content: 'eny, ireo '
  - type: text
    content: alitara
  - type: text
    content: ' ireo tokoa'
  - type: text
    content: no mahatonga azy hanota.
  '12':
  - type: text
    content: Na ho an’arivony mihitsy aza
  - type: text
    content: no hanoratako ho azy ny lalànako,
  - type: text
    content: dia hoheveriny ho zava-poana izany.
  '13':
  - type: text
    content: 'Mahavatra manatitra '
  - type: text
    content: sorona
  - type: text
    content: ' izy'
  - type: text
    content: satria te hihinan-kena
  - type: note
    content: Tamin’ny andron’i Hôsea ny ankamaroan’ny sorona dia narahina fisakafoana.
  - type: text
    content: .
  - type: text
    content: Nefa Izaho TOMPO tsy faly amin’izany;
  - type: text
    content: ankehitriny tsaroako ny heloka nataony
  - type: text
    content: ary teteziko tsirairay ny fahotany.
  - type: text
    content: Tsy maintsy hiverina any Ejipta izy.
  '14':
  - type: text
    content: «Nanangan-dapa maro i Israely,
  - type: text
    content: ka nanadino ny Mpanao azy.
  - type: text
    content: I Joda koa etsy an-daniny
  - type: text
    content: dia nampitombo tanànamimanda;
  - type: text
    content: nefa handefasako afo ny tanànany
  - type: text
    content: ka holevonin’izany ny lapany.
  '2':
  - type: text
    content: 'Na dia mitaraina amiko aza izy hoe:'
  - type: text
    content: ‹Ry Andriamanitr’i Israely ô,
  - type: text
    content: mahalala Anao izahay!›,
  '3':
  - type: text
    content: dia efa nolavin’i Israely ny tsara,
  - type: text
    content: ka hanenjika azy ny fahavalo.
  '4':
  - type: text
    content: Nanangana mpanjaka
  - type: text
    content: izay tsy nofidiko izy
  - type: text
    content: ary nanendry filoha
  - type: text
    content: izay tsy fantatro akory.
  - type: text
    content: Nanaovany sampy
  - type: text
    content: ny volafotsy na ny volamenany
  - type: text
    content: mba ho fongotra aminy.
  '5':
  - type: text
    content: Maharikoriko ilay ombilahikelinareo,
  - type: text
    content: ry olon’i Samaria
  - type: note
    content: 'Samaria: renivohitry ny fanjakana israelita avaratra. –zanak’omby: mety ho ilay napetrak’i Jerôbohama I tao amin’ny toeramasin’i Betela araka ny 1 Mp 12.28-29; jereo Hôs 10.5; Eks 32.4 sy nta.'
  - type: text
    content: '!'
  - type: text
    content: Mampirehi-pahatezerana Ahy ianareo
  - type: text
    content: Mandra-pahoviana ny tenanareo
  - type: text
    content: no tsy hiharam-pamaizana?
  '6':
  - type: text
    content: Fa avy tamin’i Israely io ombilahikely io,
  - type: text
    content: mpahay taozavatra no namboatra azy,
  - type: text
    content: ka dia tsy Andriamanitra izy;
  - type: text
    content: eny, ho montsamontsana
  - type: text
    content: ilay ombilahikelin’i Samaria.
  '7':
  - type: text
    content: Mamafy rivotra ianareo
  - type: text
    content: ka hijinja tadio.
  - type: text
    content: 'Fa hoy ny ohabolana hoe:'
  - type: text
    content: «Vary tsy amin-tsalohy
  - type: text
    content: tsy vanon-ko lafarinina.»;
  - type: text
    content: ary raha tàhiny aza hisy,
  - type: text
    content: dia ny vahiny no handany azy.
  '8':
  - type: text
    content: Voatelina i Israely;
  - type: text
    content: ary indro izy efa tonga
  - type: text
    content: toy ny fanaka tsy misy vidiny
  - type: text
    content: any amin’ny hafa firenena.
  '9':
  - type: text
    content: Nandeha niakatra tany Asiria izy;
  - type: text
    content: mahay mizaka tena ny borikidia,
  - type: text
    content: fa mividy sakaiza
  - type: note
    content: Teny mampahatsiaro ny pôlitikam-panoavana nataon’i Hôsea zanakalahin’i Elà mpanjakan’i Israely farany tamin’i Asiria (2 Mp 17.3), izay tena nifanohitra tamin’i Peka ilay nodimbiasany (2 Mp 15.27-31).
  - type: text
    content: ' ho azy kosa i Efraîma.'
