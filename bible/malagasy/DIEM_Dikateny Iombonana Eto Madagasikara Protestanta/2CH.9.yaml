document_id: 2CH.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’ny mpanjakavavin’i Sabà an’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 10.1-13)
  - type: text
    content: Nahare ny lazan’i Salômôna ny mpanjakavavin’i Sebà
  - type: note
    content: 'Sebà: faritra ao amin’ny tendrony atsimon’ny saikanosin’i Arabià, ka mifanandrifindrify amin’i Iemenina ankehitriny. Ny amin’ny mpanjakavavin’i Sebà, jereo Mt 12.42; Lk 11.31.'
  - type: text
    content: ', ka avy hitsapa azy tamin’ny fanontaniana sarotra. Dia tonga tany Jerosalema izy sy ny mpanaraka azy marobe narahin’ny rameva, nivesatra zava-manitra sy volamena ary vatosoa. Rehefa mby tao amin’i Salômôna ity mpanjakavavy, dia nilaza taminy izay rehetra tao am-pony. '
  '10':
  - type: text
    content: Ankoatra izany, ny tantsambon’i Hirama
  - type: note
    content: 'Hirama: jereo 2.2 sy nta.'
  - type: text
    content: ' sy ny tantsambon’i Salômôna, izay naka volamena avy tany Ôfira, dia nitondra koa hazo sarobidy sy vatosoa. '
  '11':
  - type: text
    content: Ny hazo sarobidy dia nanaovan’i Salômôna gorodona ho an’ny tranon’ny TOMPO sy ny lapan’andriamanjaka ary koa nanamboarany lokanga sy valiha ho an’ny mpihira; ka tsy mbola nisy hita toy izany taloha teo amin’ny tamin’i Joda.
  '12':
  - type: text
    content: Tetsy andanin’izany kosa dia nomen’i Salômôna mpanjaka ho an’ny mpanjakavavin’i Sebà avokoa izay rehetra nirîny ka nangatahiny; ary nihoatra lavitra noho izay nentiny ho an’ny mpanjaka izany. Avy eo ilay mpanjakavavy sy ireo mpanompony dia niverina nody tany amin’ny taniny.
  - type: heading
    content: Filazalazana ireo haremben’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 10.14-29)
  '13':
  - type: text
    content: 'Ny lanjam-bolamena tonga tao amin’i Salômôna, tanatin’ny taona iray monja, dia nahatratra roapolo taonina, '
  '14':
  - type: text
    content: ankoatra ny haba
  - type: note
    content: 'haba: jereo 1 Mp 10.15 sy nta.'
  - type: text
    content: ' nalainy tamin’ny mpandranto sy ny mpivarotra, ary koa ny volamena sy volafotsy nentin’ny mpanjakan’i Arabia rehetra mbamin’ireo governoran’ny tany ho an’i Salômôna.'
  '15':
  - type: text
    content: 'Nampamboatra ampingabe roanjato tamina metaly miharo volamena i Salômôna mpanjaka; ka lanjam-bolamena enina kilao avy no nilaina isan’ampinga. '
  '16':
  - type: text
    content: Dia nampamboatra ampinga kely telonjato tamina metaly miharo volamena koa izy; ka lanjam-bolamena telo kilao avy no nilaina isan’ampinga. Ary napetran’ny mpanjaka tao amin’ilay trano antsoina hoe «Alan’i Libano
  - type: note
    content: 'Alan’i Libano: jereo 1 Mp 7.2.'
  - type: text
    content: » ireo.
  '17':
  - type: text
    content: 'Dia nampamboatra sezafiandrianana lehibe koa izy, dia sezafiandrianana izay voaravaka ivoara sady nopetahana takela-bolamena madio. '
  '18':
  - type: text
    content: 'Nisy zanatohatra enina tamin’io sezafiandrianana io ary koa fitoeran-tongotra volamena, izay naraikitra taminy; ary nasiana fitehenan-tanana teo andaniny roa amin’ny fipetrahana. Nisy sarin-diona iray avy teo ankilan’ny fitehenan-tanana; '
  '19':
  - type: text
    content: ary sarin-diona enina avy no teo an-daniny roa amin’ny zanatohatra enina. Tsy nisy natao tahaka izany mihitsy tany amin’ny fanjakana hafa rehetra.
  '2':
  - type: text
    content: 'Voavalin’i Salômôna avokoa ny fanontaniana rehetra nataony, ka tsy nisy zavatra niafina tamin’ny mpanjaka ireny fa nanomezany valinteny avokoa. '
  '20':
  - type: text
    content: 'Volamena avokoa ny tsatokaty fisotroan’i Salômôna mpanjaka; ary volamena tsara avokoa ny kojakoja rehetra tao amin’ilay trano antsoina hoe «Alan’i Libano.» Tsy nisy vita volafotsy ireo, satria noheverina ho tsy dia sarobidy loatra izany tamin’ny andron’i Salômôna. '
  '21':
  - type: text
    content: Fa ny mpanjaka manko dia nanana sambo vaventy izay notarihin’ireo tantsambon’i Hirama; ary indray mandeha isan-telo volana ireo sambo vaventy ireo no tonga mitondra volamena sy volafotsy amana ivoara ary koa rajako sy vorombola.
  '22':
  - type: text
    content: 'I Salômôna mpanjaka dia nihoatra noho ny mpanjaka hafa rehetra tambonin’ny tany tamin’ny harena sy ny fahendrena. '
  '23':
  - type: text
    content: 'Nitady hahita azy avokoa ireo mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  '24':
  - type: text
    content: 'Ka isan-taona dia samy tonga nitondra fanomezana avy izy rehetra: dia kojakoja volafotsy sy volamena ary koa fitafiana sy fiadiana mbamin’ny zava-manitra sy soavaly na ramole.'
  '25':
  - type: text
    content: Nanana efitrano efatra arivo i Salômôna mba ho fitoeran-tsoavaly aman-kalesy; nisy 12 000 ireo soavaly fitaingina
  - type: note
    content: Jereo 1 Mp 5.6 sy nta.
  - type: text
    content: ', ka nisy natobiny tany amin’ireo tanàna fitoeran-kalesy ary nisy notanany teo akaikiny tao Jerosalema. '
  '26':
  - type: text
    content: Teo ambany fifehezan’i Salômôna avokoa ny mpanjaka rehetra, hatrany amin’ny ony Eofrata ka hatratỳ amin’ny tanin’ny Filistinina sy ny sisin-tanin’i Ejipta
  - type: note
    content: Jereo Gen 15.18; 1 Mp 5.1.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Nataon’ny mpanjaka toy ny vato ny habetsaky ny volafotsy tao Jerosalema
  - type: note
    content: Jereo Deot 17.17 sy nta.
  - type: text
    content: ', ary nataony toy ny aviavy any amin’ny lemak’i '
  - type: text
    content: Sefelà
  - type: text
    content: ' ny hamaroan’ny hazo sedera. '
  '28':
  - type: text
    content: Ny soavalin’i Salômôna kosa dia avy any Ejipta
  - type: note
    content: 'Ejipta: jereo 1 Mp 10.28 sy nta.'
  - type: text
    content: ' na avy any amin’ny tany hafa.'
  - type: heading
    content: Ny nahafatesan’i Salômôna
  - type: heading
    content: (Jereo 1 Mp 11.41-43)
  '29':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Salômôna, na tamboalohany na tafara, dia voasoratra ao amin’ireo boky milohateny hoe '
  - type: text
    content: Asan’i Natàna
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy '
  - type: text
    content: Faminanian’i Ahià avy any Silao
  - type: text
    content: ' ary '
  - type: text
    content: Fahitàn’i Hidao
  - type: note
    content: Ireo boky telo ireo dia tsy ananantsika intsony fa efa very.
  - type: text
    content: '. –Ity boky farany ity dia mitantara ny amin’i Jerôbohama, zanakalahin’i Nebata–. '
  '3':
  - type: text
    content: 'Ary rehefa samy hitan’ny mpanjakavavin’i Sebà ny fahendren’i Salômôna sy ny trano izay naoriny, '
  '30':
  - type: text
    content: 'I Salômôna dia nanjaka efapolo taona tao Jerosalema tamin’i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo. '
  '31':
  - type: text
    content: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina teo anilan-drainy, tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: ; ary i Rehabohama zanany lahy no nanjaka nandimby azy.
  '4':
  - type: text
    content: ny sakafo fihinana teo amin’ny latabany sy ny toeram-ponenan’ny tandapany ary koa ny fahamendrehana amam-pitafian’ireo mpandroso sakafo sy mpitondra divay, ny ambaratongan-tohatra izay niakaran’i Salômôna ho ao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', dia talanjona aoka izany izy '
  '5':
  - type: text
    content: 'ka nilaza tamin’ny mpanjaka hoe:'
  - type: text
    content: '–Marina avokoa izay resaka reko tany amin’ny taniko momba ny teninao sy ny fahendrenao. Nefa tsy nino ny filàzan’olona aho, raha tsy tonga atỳ, ka ny masoko no mahita. Hay na dia ny antsasaky ny fahendrena anananao aza tsy voambara tamiko akory; indro mihoatra noho ny laza efa reko ianao. '
  '7':
  - type: text
    content: 'Sambatra ireo olonao sy ireo tandapanao, satria eo anatrehanao mandrakariva ka mandre ny fahendrenao! '
  '8':
  - type: text
    content: Hisaorana anie ny TOMPO Andriamanitrao, fa sitrany napetraka eo amin’ny sezafiandrianany ianao mba ho mpanjaka hanompo Azy TOMPO Andriamanitrao; fa ny fitiavan’Andriamanitrao an’i Israely ka hampitoetra azy mandrakizay no nanaovany anao ho mpanjaka mba hampihatra ny rariny sy ny fahamarinana.
  '9':
  - type: text
    content: Dia nomen’ilay mpanjakavavy volamena telo taonina sy sasany ary koa zava-manitra sesehena ary vatosoa ny mpanjaka; tsy nisy na oviana na oviana zava-manitra tahaka izay nomen’ny mpanjakavavin’i Sebà o an’i Salômôna.
