document_id: 2CH.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namangian’ny mpanjakavavin’i Sabà an’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 10.1-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nahare ny lazan’i Salômôna ny mpanjakavavin’i Sebà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Sebà: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'faritra ao amin’ny tendrony atsimon’ny saikanosin’i Arabià, ka mifanandrifindrify amin’i Iemenina ankehitriny. Ny amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpanjakavavin’i Sebà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jereo Mt 12.42; Lk 11.31.'
      marker-yv: yv-n
    - type: text
      text: ', ka avy hitsapa azy tamin’ny fanontaniana sarotra. Dia tonga tany Jerosalema izy sy ny mpanaraka azy marobe narahin’ny rameva, nivesatra zava-manitra sy volamena ary vatosoa. Rehefa mby tao amin’i Salômôna ity mpanjakavavy, dia nilaza taminy izay rehetra tao am-pony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ankoatra izany, ny tantsambon’i Hirama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hirama: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 2.2 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy ny tantsambon’i Salômôna, izay naka volamena avy tany Ôfira, dia nitondra koa hazo sarobidy sy vatosoa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny hazo sarobidy dia nanaovan’i Salômôna gorodona ho an’ny tranon’ny TOMPO sy ny lapan’andriamanjaka ary koa nanamboarany lokanga sy valiha ho an’ny mpihira; ka tsy mbola nisy hita toy izany taloha teo amin’ny tamin’i Joda.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tetsy andanin’izany kosa dia nomen’i Salômôna mpanjaka ho an’ny mpanjakavavin’i Sebà avokoa izay rehetra nirîny ka nangatahiny; ary nihoatra lavitra noho izay nentiny ho an’ny mpanjaka izany. Avy eo ilay mpanjakavavy sy ireo mpanompony dia niverina nody tany amin’ny taniny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Filazalazana ireo haremben’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 10.14-29)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny lanjam-bolamena tonga tao amin’i Salômôna, tanatin’ny taona iray monja, dia nahatratra roapolo taonina, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ankoatra ny haba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'haba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 10.15 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' nalainy tamin’ny mpandranto sy ny mpivarotra, ary koa ny volamena sy volafotsy nentin’ny mpanjakan’i Arabia rehetra mbamin’ireo governoran’ny tany ho an’i Salômôna.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nampamboatra ampingabe roanjato tamina metaly miharo volamena i Salômôna mpanjaka; ka lanjam-bolamena enina kilao avy no nilaina isan’ampinga. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nampamboatra ampinga kely telonjato tamina metaly miharo volamena koa izy; ka lanjam-bolamena telo kilao avy no nilaina isan’ampinga. Ary napetran’ny mpanjaka tao amin’ilay trano antsoina hoe «Alan’i Libano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Alan’i Libano: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 7.2.
      marker-yv: yv-n
    - type: text
      text: » ireo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia nampamboatra sezafiandrianana lehibe koa izy, dia sezafiandrianana izay voaravaka ivoara sady nopetahana takela-bolamena madio. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nisy zanatohatra enina tamin’io sezafiandrianana io ary koa fitoeran-tongotra volamena, izay naraikitra taminy; ary nasiana fitehenan-tanana teo andaniny roa amin’ny fipetrahana. Nisy sarin-diona iray avy teo ankilan’ny fitehenan-tanana; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ary sarin-diona enina avy no teo an-daniny roa amin’ny zanatohatra enina. Tsy nisy natao tahaka izany mihitsy tany amin’ny fanjakana hafa rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voavalin’i Salômôna avokoa ny fanontaniana rehetra nataony, ka tsy nisy zavatra niafina tamin’ny mpanjaka ireny fa nanomezany valinteny avokoa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Volamena avokoa ny tsatokaty fisotroan’i Salômôna mpanjaka; ary volamena tsara avokoa ny kojakoja rehetra tao amin’ilay trano antsoina hoe «Alan’i Libano.» Tsy nisy vita volafotsy ireo, satria noheverina ho tsy dia sarobidy loatra izany tamin’ny andron’i Salômôna. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ny mpanjaka manko dia nanana sambo vaventy izay notarihin’ireo tantsambon’i Hirama; ary indray mandeha isan-telo volana ireo sambo vaventy ireo no tonga mitondra volamena sy volafotsy amana ivoara ary koa rajako sy vorombola.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I Salômôna mpanjaka dia nihoatra noho ny mpanjaka hafa rehetra tambonin’ny tany tamin’ny harena sy ny fahendrena. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nitady hahita azy avokoa ireo mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka isan-taona dia samy tonga nitondra fanomezana avy izy rehetra: dia kojakoja volafotsy sy volamena ary koa fitafiana sy fiadiana mbamin’ny zava-manitra sy soavaly na ramole.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nanana efitrano efatra arivo i Salômôna mba ho fitoeran-tsoavaly aman-kalesy; nisy 12 000 ireo soavaly fitaingina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 5.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ka nisy natobiny tany amin’ireo tanàna fitoeran-kalesy ary nisy notanany teo akaikiny tao Jerosalema. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Teo ambany fifehezan’i Salômôna avokoa ny mpanjaka rehetra, hatrany amin’ny ony Eofrata ka hatratỳ amin’ny tanin’ny Filistinina sy ny sisin-tanin’i Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 15.18; 1 Mp 5.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Nataon’ny mpanjaka toy ny vato ny habetsaky ny volafotsy tao Jerosalema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 17.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ary nataony toy ny aviavy any amin’ny lemak’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sefelà
    - type: text
      text: ' ny hamaroan’ny hazo sedera. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny soavalin’i Salômôna kosa dia avy any Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ejipta: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Mp 10.28 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' na avy any amin’ny tany hafa.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Salômôna
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Mp 11.41-43)
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny sisa amin’ny tantaran’i Salômôna, na tamboalohany na tafara, dia voasoratra ao amin’ireo boky milohateny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asan’i Natàna
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Faminanian’i Ahià avy any Silao
    - type: text
      text: ' ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fahitàn’i Hidao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ireo '
      - type: usfm
        marker: it
        children:
        - type: text
          text: boky
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' telo ireo dia tsy ananantsika intsony fa efa very.'
      marker-yv: yv-n
    - type: text
      text: '. –Ity boky farany ity dia mitantara ny amin’i Jerôbohama, zanakalahin’i Nebata–. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa samy hitan’ny mpanjakavavin’i Sebà ny fahendren’i Salômôna sy ny trano izay naoriny, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I Salômôna dia nanjaka efapolo taona tao Jerosalema tamin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' manontolo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Rehefa lasa nodimandry any amin’ny razany izy, dia nalevina teo anilan-drainy, tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: ; ary i Rehabohama zanany lahy no nanjaka nandimby azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ny sakafo fihinana teo amin’ny latabany sy ny toeram-ponenan’ny tandapany ary koa ny fahamendrehana amam-pitafian’ireo mpandroso sakafo sy mpitondra divay, ny ambaratongan-tohatra izay niakaran’i Salômôna ho ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tranon’ny TOMPO
    - type: text
      text: ', dia talanjona aoka izany izy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'ka nilaza tamin’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Marina avokoa izay resaka reko tany amin’ny taniko momba ny teninao sy ny fahendrenao. Nefa tsy nino ny filàzan’olona aho, raha tsy tonga atỳ, ka ny masoko no mahita. Hay na dia ny antsasaky ny fahendrena anananao aza tsy voambara tamiko akory; indro mihoatra noho ny laza efa reko ianao. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sambatra ireo olonao sy ireo tandapanao, satria eo anatrehanao mandrakariva ka mandre ny fahendrenao! '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hisaorana anie ny TOMPO Andriamanitrao, fa sitrany napetraka eo amin’ny sezafiandrianany ianao mba ho mpanjaka hanompo Azy TOMPO Andriamanitrao; fa ny fitiavan’Andriamanitrao an’i Israely ka hampitoetra azy mandrakizay no nanaovany anao ho mpanjaka mba hampihatra ny rariny sy ny fahamarinana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nomen’ilay mpanjakavavy volamena telo taonina sy sasany ary koa zava-manitra sesehena ary vatosoa ny mpanjaka; tsy nisy na oviana na oviana zava-manitra tahaka izay nomen’ny mpanjakavavin’i Sebà o an’i Salômôna.
