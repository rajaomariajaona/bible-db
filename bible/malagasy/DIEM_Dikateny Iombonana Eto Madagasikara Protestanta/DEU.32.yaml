  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’izay i Israely hitenenan’ny Tompo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aiza ireo andriamani-kafa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataonareo ho vatolampy fialofana?
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo no nihinana ny sabora soronareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nisotro ny divay fanatitrareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ireo hitsangana hamonjy anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho fierena ho anareo!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantaro ankehitriny fa Izaho ihany no Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ary tsy misy andriamani-kafa miolotra amiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no mahafaty sy mahavelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no maharatra sy mahasitrana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy misy mahafaka olona eo am-pelatanako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny TOMPO no Vatolampy: lavorary ny asany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sori-dàlany rehetra rariny avokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andriamanitra mahatoky Izy, tsy misy ratsy eo aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: marina sy mahitsy Izy.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangan-tanana amin’ny lanitra Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka mianiana hoe: ‹Velona mandrakizay Aho,'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka horanitiko hanelatselatra ny sabatro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: harangarangan’ny tanako ny famaizana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hovaliako ny mpandrafy Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hampanodiaviko ny mpankahala Ahy ny ataony.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko vonton-dra ny zana-tsipîkako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ny ran’ireo voavono sy voababo;
  - type: usfm
