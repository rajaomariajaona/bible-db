      text: ry Israelita, ekeo fa lehibe ny Andriamanitsika!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahavalo iraika lahy ve hahenjika Israelita arivo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahavalo roa lahy ve hampandositra Israelita iray alina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, raha Izaho TOMPO, ilay Vatolampy ianteherany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nanolotra azy ho eo am-pelatanan’ny fahavalony.
