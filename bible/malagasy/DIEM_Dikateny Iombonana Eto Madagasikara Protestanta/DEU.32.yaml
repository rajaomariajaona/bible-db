document_id: DEU.32,396
type_code: plt
verses:
  '1':
  - type: text
    content: Mihainoa, ry lanitra fa hiteny aho;
  - type: text
    content: ny tany mandrenesa ny lazain’ny vavako.
  '10':
  - type: text
    content: Tany an-taniefitra no nanangonany azy,
  - type: text
    content: dia tany amin’ny tany foana misy bibidia mierona.
  - type: text
    content: Koa nokarakarainy izy, nokolokoloiny,
  - type: text
    content: notandremany tahaka ny anakandriamasony.
  '11':
  - type: text
    content: Mova Izy tsy ny voromahery mitaona ny zanany hisidina
  - type: text
    content: ka manaitaitra azy eo ambonin’ny akaniny.
  - type: text
    content: ary mamelatra ny elany handraisany ny reraka
  - type: text
    content: mba hitondrana azy eo ambonin’ny elany?
  '12':
  - type: text
    content: Ny TOMPO irery no nitarika ny vahoakany;
  - type: text
    content: tsy nisy andriamani-kafa niaraka taminy.
  '13':
  - type: text
    content: Nakariny teo an-tendron-kavoan’ilay tany izy,
  - type: text
    content: nampihinaniny ny vokatry ny saha,
  - type: text
    content: nampitsentsefiny tantely teny an-tsefatsefa-bato,
  - type: text
    content: sy nomeny menaka avy amin’ny faritra vatoana;
  '14':
  - type: text
    content: novokisany mena-drononon’omby,
  - type: text
    content: sy rononon’ondry aman’osy izy,
  - type: text
    content: nofahanany henan-janakondry
  - type: text
    content: sy ondrilahy matavy aman’osilahy
  - type: text
    content: ary notolorany vary tsara indrindra
  - type: text
    content: sy ranom-boaloboka ho divay fisotro.
  '15':
  - type: text
    content: Koa nihinana ny taranak’i Jakôba, ka voky;
  - type: text
    content: nihanatavy i Jesoròna
  - type: note
    content: Jesoròna anarana fanome an’i Israely. Ampit Is 44.2.
  - type: text
    content: ', ka namely daka.'
  - type: text
    content: Eny, tonga natavy izy,
  - type: text
    content: vory nofo sy dongadonga
  - type: text
    content: ka nandao an’Andriamanitra Izay nanao azy
  - type: text
    content: ary nanamavo an’ilay Vatolampy famonjena azy.
  '16':
  - type: text
    content: Andriamani-kafa no nampitoviny lanja tamin’ny Tompo,
  - type: text
    content: zava-maharikoriko no naniratsirany Azy;
  '17':
  - type: text
    content: 'ny nanolorany '
  - type: text
    content: sorona
  - type: text
    content: ' dia lolo izay tsy andriamanitra akory'
  - type: note
    content: Jereo 1Kôr 10.20.
  - type: text
    content: sady andriamanitra tsy fantany,
  - type: text
    content: andriamani-baovao niseho tatỳ aoriana
  - type: text
    content: sady tsy nohajain’ny razany.
  '18':
  - type: text
    content: «Tsy raharahainao, ry Israely,
  - type: text
    content: ilay Vatolampy niteraka anao;
  - type: text
    content: hadinonao ilay Andriamanitra nahitanao masoandro.»
  '19':
  - type: text
    content: Hitan’ny TOMPO ka nampisafoaka Azy
  - type: text
    content: ny zanany izay naniratsira Azy;
  '2':
  - type: text
    content: Ny anatro anie hitosaka toy ny orana,
  - type: text
    content: dia toy ny oram-batravatra amin’ny vilona;
  - type: text
    content: ny teniko anie hirotsaka toy ny ando,
  - type: text
    content: dia toy ny erikerika amin’ny ahi-maitso.
  '20':
  - type: text
    content: 'dia hoy Izy hoe: «Hanafenako tava ireo,'
  - type: text
    content: dia ho hitako izay hiafarany
  - type: text
    content: fa taranaka mpivadibadika
  - type: text
    content: sy zaza tsy mahatoky.
  '21':
  - type: text
    content: Ireo no nampitovy lanja Ahy tamin’andriamani-tsiizy
  - type: text
    content: sy naniratsira Ahy tamin’ny sampy tsinontsinona.
  - type: text
    content: Izaho kosa hampitovy lanja azy
  - type: text
    content: amin’izay tsy vahoaka akory;
  - type: text
    content: firenena adala no hampanaratsiako azy
  - type: note
    content: Jereo Rm 10.19; 1Kôr 10.22.
  - type: text
    content: .
  '22':
  - type: text
    content: Nirehitra ny afon’ny fahatezerako
  - type: text
    content: ka nandoro ny toeran’ny maty,
  - type: text
    content: hatrany amin’ny farany ambany
  - type: text
    content: sy nandevona ny tany mbamin’ny vokatra ao aminy
  - type: text
    content: ary nampirehitra ny fanambanin’ny tendrombohitra.
  - type: text
    content: HEAVEN-THE DWELLING PLACE OF GOD
  - type: text
    content: NY LANITRA-TOERAM-PONENAN’ANDRIAMANITRA
  - type: text
    content: THE WATER ABOVE THE VAULT
  - type: text
    content: NY RANO AMBONIN’NY HABAKABAKA
  - type: text
    content: VAULT OF HEAVEN
  - type: text
    content: NY HABAKABAKA ANDOHALAMBON’NY LANITRA
  - type: text
    content: EARTH
  - type: text
    content: NY TANY
  - type: text
    content: Pillars of the sky (2)
  - type: text
    content: Andry fanorenan’ny lanitra (2)
  - type: text
    content: Pillars of the earth (3)
  - type: text
    content: Andry fanorenan’ny tany (3)
  - type: text
    content: Sheol
  - type: text
    content: Toeran’ny maty
  - type: text
    content: The Abyss of waters (2)
  - type: text
    content: Ranolalimbe
  - type: text
    content: Early conception of the universe
  - type: text
    content: Fiheverana fahagola ny amin’ny firafitr’izao tontolo izao (Deôterônômy 32.22) [NEB 148]
  '23':
  - type: text
    content: Havangongoko amin’ny Israelita ny loza
  - type: text
    content: ary holanîko aminy ny zana-tsipîkako;
  '24':
  - type: text
    content: hofezahin’ny mosary ireo
  - type: text
    content: sady holevon’ny tazo sy ny areti-mandripaka
  - type: note
    content: Tsy mazava ny RM ary tsy azo antoka ny dkt aroso.
  - type: text
    content: ;
  - type: text
    content: ary halefako hamely azy ny biby masiaka
  - type: text
    content: mbamin’ny bibilava misy poizina.
  '25':
  - type: text
    content: Eny ivelany, dia ny sabatra no handringana;
  - type: text
    content: ao an-trano, dia ny tahotra no hahafaty.
  - type: text
    content: Ka samy hiharan’izany avokoa
  - type: text
    content: na zatovolahy na zatovovavy
  - type: text
    content: na zazakely na beantitra.»
  '26':
  - type: text
    content: «Nokasaiko haparitaka ireo
  - type: text
    content: ka ho foana eo amin’ny olombelona
  - type: text
    content: ny fahatsiarovana azy,
  '27':
  - type: text
    content: raha tsy ny fahavalo hirehaka no natahorako;
  - type: text
    content: mety diso hevitra manko ny mpandrafy azy
  - type: text
    content: 'ka hiteny hoe: ‹Ny tananay no nahery,'
  - type: text
    content: fa tsy ny TOMPO velively no nanao izany.›
  '28':
  - type: text
    content: Firenena
  - type: note
    content: 'i Israely: azo nadika ihany koa hoe: ireo fahavalo (satria tsy voafaritra mazava ny lazaina ao amin’ny RM).'
  - type: text
    content: ' tsy misaina i Israely'
  - type: text
    content: sady tsy manam-pahalalana.
  '29':
  - type: text
    content: Raha mba hendry ireo dia ho nahalala izao
  - type: text
    content: 'sy ho nahafantatra ny hiafarany:'
  '3':
  - type: text
    content: Miantso ny anaran’ny Tompo aho;
  - type: text
    content: ry Israelita, ekeo fa lehibe ny Andriamanitsika!
  '30':
  - type: text
    content: Fahavalo iraika lahy ve hahenjika Israelita arivo?
  - type: text
    content: Fahavalo roa lahy ve hampandositra Israelita iray alina?
  - type: text
    content: Eny, raha Izaho TOMPO, ilay Vatolampy ianteherany,
  - type: text
    content: no efa nanolotra azy ho eo am-pelatanan’ny fahavalony.
  '31':
  - type: text
    content: Na ny fahavalony aza no mitsara,
  - type: text
    content: dia miaiky fa tsy mitovy
  - type: text
    content: amin’ilay Vatolampy ianteheran’i Israely
  - type: text
    content: ny vatolampy izay mba ianteherany
  - type: note
    content: Tsy mazava ny RM ary tsy azo antoka ny dkt aroso.
  - type: text
    content: .
  '32':
  - type: text
    content: Tahaka an’i Sôdôma sy i Gômôra
  - type: note
    content: 'I Sôdôma sy i Gômôra dia nalaza tamin’ny fitondrantena ratsy nananan’ny mponiny: jereo Gen 18.20-21; 19.4-11.'
  - type: text
    content: ' ihany'
  - type: text
    content: 'ireo fahavalon’i Israely:'
  - type: text
    content: tahom-boaloboka mamokatra voaloboka mahafaty
  - type: text
    content: sy sampaho mangidy.
  '33':
  - type: text
    content: Ny divainy dia toy ny zava-mahafaty avy amin’ny dragona
  - type: text
    content: ary toy ny poizina mahery avy amin’ny menarana.
  '34':
  - type: text
    content: Voatahiry ato amiko izany nafitsok’ireo izany
  - type: text
    content: 'sady voaisy tombokase ato an-trano firaketako:'
  '35':
  - type: text
    content: Ahy ny famaliana sy ny fampanodiavana
  - type: note
    content: Jereo Rm 12.19; Heb 10.30.
  - type: text
    content: raha avy izay hahasolafaka ny tongony
  - type: text
    content: fa antomotra ny andro hahitany loza
  - type: text
    content: ary ho avy faingana ny anjara voatendry ho azy.»
  '36':
  - type: text
    content: Eny, homen’ny TOMPO rariny tokoa ny vahoakany
  - type: text
    content: rehefa hitany fa lany hery;
  - type: text
    content: hohasoaviny indray ireo manompo Azy
  - type: text
    content: rehefa hitany fa tsy misy ianteherany intsony
  - type: note
    content: 'Eny, homen’ny Tompo... Azy: jereo Sal 135.14. –sady tsy... intsony: tsy mazava ny RM ary tsy azo antoka ny dkt aroso.'
  - type: text
    content: .
  '37':
  - type: text
    content: 'Amin’izay i Israely hitenenan’ny Tompo hoe:'
  - type: text
    content: «Aiza ireo andriamani-kafa
  - type: text
    content: nataonareo ho vatolampy fialofana?
  '38':
  - type: text
    content: Ireo no nihinana ny sabora soronareo
  - type: text
    content: sy nisotro ny divay fanatitrareo.
  - type: text
    content: Aoka ireo hitsangana hamonjy anareo
  - type: text
    content: ary ho fierena ho anareo!
  '39':
  - type: text
    content: Fantaro ankehitriny fa Izaho ihany no Andriamanitra
  - type: text
    content: 'ary tsy misy andriamani-kafa miolotra amiko:'
  - type: text
    content: Izaho no mahafaty sy mahavelona,
  - type: text
    content: Izaho no maharatra sy mahasitrana,
  - type: text
    content: ary tsy misy mahafaka olona eo am-pelatanako.
  '4':
  - type: text
    content: 'Ny TOMPO no Vatolampy: lavorary ny asany;'
  - type: text
    content: ny sori-dàlany rehetra rariny avokoa.
  - type: text
    content: 'Andriamanitra mahatoky Izy, tsy misy ratsy eo aminy:'
  - type: text
    content: marina sy mahitsy Izy.
  '40':
  - type: text
    content: Manangan-tanana amin’ny lanitra Aho,
  - type: text
    content: 'ka mianiana hoe: ‹Velona mandrakizay Aho,'
  '41':
  - type: text
    content: ka horanitiko hanelatselatra ny sabatro,
  - type: text
    content: harangarangan’ny tanako ny famaizana,
  - type: text
    content: dia hovaliako ny mpandrafy Ahy
  - type: text
    content: ary hampanodiaviko ny mpankahala Ahy ny ataony.
  '42':
  - type: text
    content: Hataoko vonton-dra ny zana-tsipîkako,
  - type: text
    content: dia ny ran’ireo voavono sy voababo;
  - type: text
    content: hotrebotrebonin’ny sabatro ny nofo
  - type: text
    content: mbamin’ny loha lavavolon’ny fahavalo›!»
  '43':
  - type: text
    content: Ry hafa firenena, hobio ilay vahoakan’Andriamanitra!
  - type: text
    content: Fa valian’ny TOMPO ny nahafatesan’ny mpanompony;
  - type: text
    content: eny, valiany tokoa ireo mpandrafy Azy,
  - type: text
    content: ary avotany kosa ny taniny mbamin’ny vahoakany
  - type: note
    content: 'Novalian’Izy Tompo... mpanompony: voatsiahy malalaka izany andalana izany ao amin’ny Apôk 19.2. –Ny stf hebreo voatahiry tao Komrano dia ahitana ity andininy ity lavalava kokoa sy somary miova kely. Ny dkt grika tranainy dia ahitana azy vao mainka nohalavaina kokoa araka izao manaraka izao: Miaraha miravo amin’ny Tompo ianao, ry lanitra; aoka ny zanak’Andriamanitra rehetra hiankohoka eo anatrehany. (Miaraha miravo amin’ny vahoakany ianareo, ry hafa firenena. Aoka ny anjelin’Andriamanitra rehetra hankahery azy!) Novalian’Andriamanitra manko ny nahafatesan’ireo zanany, eny, ho valiany tokoa ireo. Ny famaliana dia hampiharin’ny Tompo amin’ny fahavalony; hovaliany tokoa ireo mpandrafy Azy. Amin’izay ny Tompo no hanadio ny tanin’ilay vahoakany. Avy amin’io rijan-teny lava io ny andalana voatsiahy ao amin’ny Rm 15.10 sy Heb 1.6.'
  - type: text
    content: .
  '44':
  - type: text
    content: I Mosesy dia niaraka tamin’i Josoa
  - type: note
    content: Ao amin’ny RM etoana, i Josoa dia atao hoe i Hôsea, jereo Nom 13.16 sy nta.
  - type: text
    content: ', zanakalahin’i Nona, no tonga nilaza manontolo ho ren’ny vahoaka izany tononkira izany.'
  '45':
  - type: text
    content: 'Nony tapitra voalazany avokoa tamin’ny Israelita rehetra ireo teny ireo, '
  '46':
  - type: text
    content: 'dia hoy i Mosesy taminy:'
  - type: text
    content: '–Araiketo ao am-ponareo ny teny rehetra izay ambarako hiampangana anareo anio; didio ny taranakareo mba himasoany hotanterahina ny teny rehetra raketin’ity Lalàna ity. '
  '47':
  - type: text
    content: Tsy zava-poana ho anareo izany fa fiainanareo; izany teny izany no hahamaro andro anareo any amin’ny tany izay efa halainareo ho fananana, rehefa tafita an’i Jôrdàna ianareo.
  - type: heading
    content: Ambara mialoha ny hahafatesan’i Mosesy
  '48':
  - type: text
    content: 'Androtrizay koa no nitenenan’ny TOMPO tamin’i Mosesy hoe:'
  '49':
  - type: text
    content: '–Mankanesa ianao amin’itsy tandavan-tendrombohitra Habarîma itsy, izay ao amin’ny faritany Môaba, tandrifin’i Jerikao, dia miakara eo an-tampon’ny tendrombohitra Nebao: ary tazano ny tany Kanahàna izay omeko ny Israelita ho fananany. '
  '5':
  - type: text
    content: Nanjary simba ianareo,
  - type: text
    content: ka tsy zanany intsony fa feno tsiny;
  - type: text
    content: taranaka melo-tsaina
  - type: text
    content: sady mpivadibadika
  - type: note
    content: Tsy mazava ny RM ary tsy azo antoka ny dkt aroso.
  - type: text
    content: .
  '50':
  - type: text
    content: Dia aoka ianao ho faty eo an-tampon’io tendrombohitra hiakaranao io ka ho voaangona any amin’ny razanao, tahaka ny nahafatesan’i Aharôna rahalahinao tany an-tampon’ny tendrombohitra Hôra sy nanangonana azy tany amin’ny razany
  - type: note
    content: jereo Nom 20.22-26.
  - type: text
    content: '. '
  '51':
  - type: text
    content: Ianao sy i Aharôna manko dia diso tamiko teo anatrehan’ny Israelita, teo amin’ny ranon’i Meribà any Kadesy, tao an-taniefitra Tsina; tamin’izay no tsy nanehoanareo ny fahamasinako teo anatrehan’ny Israelita
  - type: note
    content: Jereo Nom 20.1-13.
  - type: text
    content: '. '
  '52':
  - type: text
    content: Eny, avy lavitra no hitazananao ny tany izay omeko ny Israelita, kanefa tsy hiditra ao ianao
  - type: note
    content: 'And 48.52: jereo 3.23-27; Nom 27.12-14.'
  - type: text
    content: .
  '6':
  - type: text
    content: Moa izany no tokony ho navalinareo ny TOMPO,
  - type: text
    content: ry vahoaka adala, tsy misy fahendrena?
  - type: text
    content: Moa tsy Izy no Rainareo, ka fananany ianareo?
  - type: text
    content: Tsy Izy ve no nanao sy nampiorina anareo?
  '7':
  - type: text
    content: Tsarovy ny andro fahiny,
  - type: text
    content: saino ny taona fahagola.
  - type: text
    content: Anontanio ny rainareo sy loholonareo
  - type: text
    content: fa hanambara sy hitantara aminareo.
  '8':
  - type: text
    content: Raha nanome zaratany an’ireo firenena ilay Avo
  - type: text
    content: ka nampiely ny taranak’olombelona,
  - type: text
    content: dia nozarazarainy am-paritany ireny
  - type: text
    content: araka ny isan’ireo anjely
  - type: note
    content: 'Ary ny firenena tsirairay dia samy napetrany eo ambany fifehezan’ny anjely anankiray: araka ny stf hebreo voatahiry tao Komrano sy araka ny dkt tranainy maro izany; fa araka ny RM kosa dia izao no hita: dia nozarazarainy am-paritany ireny, araka ny isan’ireo taranak’i Israely. –Ity and ity dia misy ampahany voatsiahy ao amin’ny Asa 17.26.'
  - type: text
    content: ':'
  '9':
  - type: text
    content: Anjaran’ny TOMPO kosa ilay vahoakany;
  - type: text
    content: ny taranak’i Jakôba no natokany ho fananany.
