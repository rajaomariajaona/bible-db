document_id: DEU.32,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa, ry lanitra fa hiteny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tany mandrenesa ny lazain’ny vavako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany an-taniefitra no nanangonany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tany amin’ny tany foana misy bibidia mierona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nokarakarainy izy, nokolokoloiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notandremany tahaka ny anakandriamasony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mova Izy tsy ny voromahery mitaona ny zanany hisidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manaitaitra azy eo ambonin’ny akaniny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamelatra ny elany handraisany ny reraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitondrana azy eo ambonin’ny elany?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO irery no nitarika ny vahoakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy nisy andriamani-kafa niaraka taminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nakariny teo an-tendron-kavoan’ilay tany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampihinaniny ny vokatry ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nampitsentsefiny tantely teny an-tsefatsefa-bato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nomeny menaka avy amin’ny faritra vatoana;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: novokisany mena-drononon’omby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy rononon’ondry aman’osy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nofahanany henan-janakondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ondrilahy matavy aman’osilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary notolorany vary tsara indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ranom-boaloboka ho divay fisotro.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nihinana ny taranak’i Jakôba, ka voky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nihanatavy i Jesoròna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Jesoròna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana fanome an’i Israely. Ampit Is 44.2.
      marker-yv: yv-n
    - type: text
      text: ', ka namely daka.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tonga natavy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vory nofo sy dongadonga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandao an’Andriamanitra Izay nanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanamavo an’ilay Vatolampy famonjena azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamani-kafa no nampitoviny lanja tamin’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-maharikoriko no naniratsirany Azy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ny nanolorany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dia lolo izay tsy andriamanitra akory'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1Kôr 10.20.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady andriamanitra tsy fantany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: andriamani-baovao niseho tatỳ aoriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy nohajain’ny razany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy raharahainao, ry Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Vatolampy niteraka anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hadinonao ilay Andriamanitra nahitanao masoandro.»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitan’ny TOMPO ka nampisafoaka Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany izay naniratsira Azy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anatro anie hitosaka toy ny orana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny oram-batravatra amin’ny vilona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny teniko anie hirotsaka toy ny ando,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toy ny erikerika amin’ny ahi-maitso.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hoy Izy hoe: «Hanafenako tava ireo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho hitako izay hiafarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa taranaka mpivadibadika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy zaza tsy mahatoky.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo no nampitovy lanja Ahy tamin’andriamani-tsiizy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy naniratsira Ahy tamin’ny sampy tsinontsinona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hampitovy lanja azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’izay tsy vahoaka akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: firenena adala no hampanaratsiako azy
    - type: usfm
      marker: f
