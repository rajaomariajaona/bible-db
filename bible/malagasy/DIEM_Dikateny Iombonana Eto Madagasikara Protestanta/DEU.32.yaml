  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nirehitra ny afon’ny fahatezerako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nandoro ny toeran’ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatrany amin’ny farany ambany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy nandevona ny tany mbamin’ny vokatra ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nampirehitra ny fanambanin’ny tendrombohitra.
  - type: text
