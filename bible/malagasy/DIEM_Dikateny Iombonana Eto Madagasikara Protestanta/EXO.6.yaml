document_id: EXO.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa namaly an’i Mosesy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ankehitriny vao ho hitanao izay hataoko amin’ny Farao, fa noho ny herin-tsandriko dia havelany handeha ny Israelita; eny, noho ny herin-tsandriko, dia horoahiny hiala amin’ny taniny izy ireo!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampanantena an’i Mosesy ny Tompo fa hanafaka ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Andriamanitra niteny tamin’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no «TOMPO». '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny anarana hoe «Andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsitoha
  - type: text
    text: » no nisehoako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa tsy mbola fantatr’ireo ny anarako hoe «TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 2-3:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 3.13-15.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' tamin’izy ireo Aho fa homeko azy ny tany Kanahàna izay nivahiniany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Efa reko ny fitarainan’ny Israelita amin’ny asa fanandevozana ampanaovin’ny Ejiptianina azy; koa nahatsiaro ny fanekempihavanako Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, dia lazao amin’ny Israelita hoe: «Izaho no TOMPO! Havoakako hiala amin’ny asa an-terivozona ampanaovin’ny Ejiptianina ianareo sy hoafahako amin’ny fanompoana azy; ka amin’ny heriko tsy hay tohaina sy amin’ny famaizana lehibe no hanavotako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Halaiko ho vahoakako ianareo, ary Izaho ho Andriamanitrareo; dia ho fantatrareo fa Izaho TOMPO Andriamanitrareo no namoaka anareo hiala amin’ny asa an-terivozona nampanaovin’ny Ejiptianina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hoentiko any amin’ny tany izay efa nianianako tamin’ny tsangan-tanana fa homeko an’i Abrahama sy i Itsehàka ary i Jakôba ianareo. Homeko ho fanananareo izany. Izaho no TOMPO.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Notaterin’i Mosesy tamin’ny Israelita izany teny izany; nefa tsy nihaino azy akory ireo, fa kivy noho ny hamafin’ny fanompoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Niteny tamin’i Mosesy indray ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '–Mandehana miteny amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', mpanjakan’i Ejipta, mba halefany hiala amin’ny taniny ireo Israelita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa nanambara teo anatrehan’ny TOMPO i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Na dia ny Israelita aza tsy nihaino ahy, koa ahoana no hihainoan’ny Farao ahy izay votsa vava ity?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa mbola niteny tamin’i Mosesy sy i Aharôna ihany ny TOMPO, ka nandidy azy hankany amin’ny Israelita sy amin’ny Farao, mpanjakan’i Ejipta, mba hamoaka ny Israelita hiala tao Ejipta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lisitry ny razan’i Mosesy sy i Aharôna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toy izao no lisitry ny filoham-pianakaviana teo amin’ny Israelita:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ny zanakalahin’i Reobena, lahimatoan’i Jakôba, dia i Hanôka, i Palo, i Hetsirôna ary i Karmỳ. Izy efa-dahy no razamben’ny tarika reobenita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny lisitra tetiarana momba ny taranaka eo amin’ny and 14-15 dia mandray ny fiandohan’ny lisitra hita ao amin’ny Gen 46.8-27, ka mifarana eo amin’ny 46-11; avy eo ihatahany io lisitra io mba hanehoana tetiarana amin’ny antsipiriany kokoa momba ny taranak’i Levỳ, izay mamorona ny sarangan’ny mpisorona.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny zanakalahin’i Simehôna dia i Jemoela, i Jamina, i Ôhada, i Jakina, i Tsôhara, ary i Saola; ity Saola ity dia zanany tamin’ilay vehivavy kanahanita. Izy enin-dahy no razamben’ireo tarika simehônita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ireto kosa no anaran’ny taranak’i Levỳ, tao amin’ny taranaka maro nifandimby: Telo no zanakalahin’i Levỳ, dia i Gersôna sy i Kehata ary i Merarỳ. Naharitra fito amby telopolo amby zato taona ny andro niainan’i Levỳ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanakalahin’i Gersôna dia i Zibnỳ sy i Simehỳ, izay samy manana ny tarika tandrify azy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Hamrama, i Jitsehara, i Hebrôna ary i Hoziela. Naharitra telo amby telopolo amby zato taona ny andro niainan’i Kehata. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny zanakalahin’i Merarỳ dia i Mahelỳ sy i Mosỳ. Ireo no razamben’ny tarika levita samy araka ny taranany avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 16-19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Nom 3.17-20; 26.57-58; 1 Tan 6.1-4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I Hamrana dia nanambady an’i Jôkebeda anabavin-drainy ka niteraka an’i Aharôna sy i Mosesy. Naharitra fito amby telopolo amby zato taona ny andro niainan’i Hamrama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny zanakalahin’i Jitsehara dia i Kôra sy i Nefega ary i Zikrỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny zanakalahin’i Hoziela dia i Misaela sy i Elitsàfana ary i Sitrỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I Aharôna dia nanambady an’i Eliseba, zanakavavin’i Haminadaba sady anabavin’i Nahasôna; io Eliseba io no niterahan’i Aharôna an’i Nadaba sy i Abihò ary i Elehazara sy i Itamara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny zanakalahin’i Kôra dia i Asira sy i Elkanà ary i Abiasafa; ireo no razamben’ny tarika kôrahita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I Elehazara, zanakalahin’i Aharôna, dia nanambady anankiray tamin’ny zanakavavin’i Potiela; ka io no niterahany an’i Pinehasa.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireo rehetra ireo no filoham-pianakaviana tao amin’ny taranak’i Levỳ, samy araka ny tarika tandrify azy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa i Aharôna sy i Mosesy kosa nobaikoin’ny TOMPO hoe: «Ataovy izay hamoahanareo ny Israelita avy any Ejipta amim-pilaminana tsara.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa nandeha niteny tany amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', mpanjakan’i Ejipta, i Mosesy sy i Aharôna mba handefasany ny Israelita hiala amin’ny taniny.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manavao ny teny fampanantenàny amin’i Mosesy Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin’ny andro izay nitenenan’ny TOMPO tamin’i Mosesy tany Ejipta, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hoy Izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izaho no TOMPO! Koa lazao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ', mpanjakan’i Ejipta, izay rehetra ambarako aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa novalian’i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro votsa vava aho, ka tsy hihaino ahy mihitsy ny Farao!
