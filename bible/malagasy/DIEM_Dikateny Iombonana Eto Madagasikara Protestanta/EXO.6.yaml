document_id: EXO.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa namaly an’i Mosesy ny TOMPO hoe:'
  - type: text
    content: –Ankehitriny vao ho hitanao izay hataoko amin’ny Farao, fa noho ny herin-tsandriko dia havelany handeha ny Israelita; eny, noho ny herin-tsandriko, dia horoahiny hiala amin’ny taniny izy ireo!
  - type: heading
    content: Mampanantena an’i Mosesy ny Tompo fa hanafaka ny Israelita
  '10':
  - type: text
    content: 'Niteny tamin’i Mosesy indray ny TOMPO hoe:'
  '11':
  - type: text
    content: '–Mandehana miteny amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', mpanjakan’i Ejipta, mba halefany hiala amin’ny taniny ireo Israelita.'
  '12':
  - type: text
    content: 'Fa nanambara teo anatrehan’ny TOMPO i Mosesy hoe:'
  - type: text
    content: –Na dia ny Israelita aza tsy nihaino ahy, koa ahoana no hihainoan’ny Farao ahy izay votsa vava ity?
  '13':
  - type: text
    content: Nefa mbola niteny tamin’i Mosesy sy i Aharôna ihany ny TOMPO, ka nandidy azy hankany amin’ny Israelita sy amin’ny Farao, mpanjakan’i Ejipta, mba hamoaka ny Israelita hiala tao Ejipta.
  - type: heading
    content: Ny lisitry ny razan’i Mosesy sy i Aharôna
  '14':
  - type: text
    content: 'Toy izao no lisitry ny filoham-pianakaviana teo amin’ny Israelita:'
  - type: text
    content: Ny zanakalahin’i Reobena, lahimatoan’i Jakôba, dia i Hanôka, i Palo, i Hetsirôna ary i Karmỳ. Izy efa-dahy no razamben’ny tarika reobenita
  - type: note
    content: Ny lisitra tetiarana momba ny taranaka eo amin’ny and 14-15 dia mandray ny fiandohan’ny lisitra hita ao amin’ny Gen 46.8-27, ka mifarana eo amin’ny 46-11; avy eo ihatahany io lisitra io mba hanehoana tetiarana amin’ny antsipiriany kokoa momba ny taranak’i Levỳ, izay mamorona ny sarangan’ny mpisorona.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ny zanakalahin’i Simehôna dia i Jemoela, i Jamina, i Ôhada, i Jakina, i Tsôhara, ary i Saola; ity Saola ity dia zanany tamin’ilay vehivavy kanahanita. Izy enin-dahy no razamben’ireo tarika simehônita.
  '16':
  - type: text
    content: 'Ary ireto kosa no anaran’ny taranak’i Levỳ, tao amin’ny taranaka maro nifandimby: Telo no zanakalahin’i Levỳ, dia i Gersôna sy i Kehata ary i Merarỳ. Naharitra fito amby telopolo amby zato taona ny andro niainan’i Levỳ.'
  '17':
  - type: text
    content: 'Ny zanakalahin’i Gersôna dia i Zibnỳ sy i Simehỳ, izay samy manana ny tarika tandrify azy avy. '
  '18':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Hamrama, i Jitsehara, i Hebrôna ary i Hoziela. Naharitra telo amby telopolo amby zato taona ny andro niainan’i Kehata. '
  '19':
  - type: text
    content: Ny zanakalahin’i Merarỳ dia i Mahelỳ sy i Mosỳ. Ireo no razamben’ny tarika levita samy araka ny taranany avy
  - type: note
    content: 'And 16-19: jereo Nom 3.17-20; 26.57-58; 1 Tan 6.1-4.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Ary Andriamanitra niteny tamin’i Mosesy hoe:'
  - type: text
    content: '–Izaho no «TOMPO». '
  '20':
  - type: text
    content: I Hamrana dia nanambady an’i Jôkebeda anabavin-drainy ka niteraka an’i Aharôna sy i Mosesy. Naharitra fito amby telopolo amby zato taona ny andro niainan’i Hamrama.
  '21':
  - type: text
    content: Ny zanakalahin’i Jitsehara dia i Kôra sy i Nefega ary i Zikrỳ.
  '22':
  - type: text
    content: Ny zanakalahin’i Hoziela dia i Misaela sy i Elitsàfana ary i Sitrỳ.
  '23':
  - type: text
    content: I Aharôna dia nanambady an’i Eliseba, zanakavavin’i Haminadaba sady anabavin’i Nahasôna; io Eliseba io no niterahan’i Aharôna an’i Nadaba sy i Abihò ary i Elehazara sy i Itamara.
  '24':
  - type: text
    content: Ny zanakalahin’i Kôra dia i Asira sy i Elkanà ary i Abiasafa; ireo no razamben’ny tarika kôrahita.
  '25':
  - type: text
    content: I Elehazara, zanakalahin’i Aharôna, dia nanambady anankiray tamin’ny zanakavavin’i Potiela; ka io no niterahany an’i Pinehasa.
  - type: text
    content: 'Ireo rehetra ireo no filoham-pianakaviana tao amin’ny taranak’i Levỳ, samy araka ny tarika tandrify azy avy. '
  '26':
  - type: text
    content: 'Fa i Aharôna sy i Mosesy kosa nobaikoin’ny TOMPO hoe: «Ataovy izay hamoahanareo ny Israelita avy any Ejipta amim-pilaminana tsara.» '
  '27':
  - type: text
    content: 'Koa nandeha niteny tany amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', mpanjakan’i Ejipta, i Mosesy sy i Aharôna mba handefasany ny Israelita hiala amin’ny taniny.'
  - type: heading
    content: Manavao ny teny fampanantenàny amin’i Mosesy Andriamanitra
  '28':
  - type: text
    content: 'Tamin’ny andro izay nitenenan’ny TOMPO tamin’i Mosesy tany Ejipta, '
  '29':
  - type: text
    content: 'dia hoy Izy taminy:'
  - type: text
    content: '–Izaho no TOMPO! Koa lazao amin’ny '
  - type: text
    content: Farao
  - type: text
    content: ', mpanjakan’i Ejipta, izay rehetra ambarako aminao.'
  '3':
  - type: text
    content: 'Tamin’ny anarana hoe «Andriamanitra '
  - type: text
    content: Tsitoha
  - type: text
    content: » no nisehoako tamin’i Abrahama sy i Itsehàka ary i Jakôba fa tsy mbola fantatr’ireo ny anarako hoe «TOMPO
  - type: note
    content: 'And 2-3: jereo 3.13-15.'
  - type: text
    content: '.» '
  '30':
  - type: text
    content: 'Fa novalian’i Mosesy hoe:'
  - type: text
    content: –Indro votsa vava aho, ka tsy hihaino ahy mihitsy ny Farao!
  '4':
  - type: text
    content: 'Nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' tamin’izy ireo Aho fa homeko azy ny tany Kanahàna izay nivahiniany. '
  '5':
  - type: text
    content: 'Efa reko ny fitarainan’ny Israelita amin’ny asa fanandevozana ampanaovin’ny Ejiptianina azy; koa nahatsiaro ny fanekempihavanako Aho. '
  '6':
  - type: text
    content: 'Noho izany, dia lazao amin’ny Israelita hoe: «Izaho no TOMPO! Havoakako hiala amin’ny asa an-terivozona ampanaovin’ny Ejiptianina ianareo sy hoafahako amin’ny fanompoana azy; ka amin’ny heriko tsy hay tohaina sy amin’ny famaizana lehibe no hanavotako anareo. '
  '7':
  - type: text
    content: 'Halaiko ho vahoakako ianareo, ary Izaho ho Andriamanitrareo; dia ho fantatrareo fa Izaho TOMPO Andriamanitrareo no namoaka anareo hiala amin’ny asa an-terivozona nampanaovin’ny Ejiptianina. '
  '8':
  - type: text
    content: Hoentiko any amin’ny tany izay efa nianianako tamin’ny tsangan-tanana fa homeko an’i Abrahama sy i Itsehàka ary i Jakôba ianareo. Homeko ho fanananareo izany. Izaho no TOMPO.»
  '9':
  - type: text
    content: Notaterin’i Mosesy tamin’ny Israelita izany teny izany; nefa tsy nihaino azy akory ireo, fa kivy noho ny hamafin’ny fanompoana.
