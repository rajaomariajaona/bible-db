document_id: DEU.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Hiverina amin’ny Tompo i Israely
  - type: text
    content: Ho tonga aminareo izany zavatra rehetra izany, dia ny fampanantenàm-pitahiana sy fanambaràn-doza izay nataoko teo anoloanareo
  - type: note
    content: Jereo toko 28.
  - type: text
    content: '. Ary any amin’ny firenena rehetra handroahan’ny TOMPO Andriamanitrareo anareo, dia hotsarovanareo ao am-ponareo izany, '
  '10':
  - type: text
    content: satria manaiky ny TOMPO Andriamanitrareo ianareo ka mitandrina ny didy aman-dalàny, izay voasoratra amin’ity bokin’ny Lalàna ity, ary satria iverenanareo amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ny TOMPO Andriamanitrareo.
  - type: heading
    content: Akaiky tokoa ny tenin’Andriamanitra
  '11':
  - type: text
    content: 'Fa izao didy ampitaiko aminareo izao dia tsy saro-pantarina aminareo na ivelan’ny takatrareo. '
  '12':
  - type: text
    content: Tsy any an-danitra
  - type: note
    content: Voatsiahy malalaka ao amin’ny Rm 10.6-8 ny and 12-14.
  - type: text
    content: ' izany ka hanaovanareo hoe: «Iza no hiakatra any an-danitra haka azy ho antsika sy hampahafantatra azy antsika mba hotanterahintsika?» '
  '13':
  - type: text
    content: 'Tsy any ampitan’ny ranomasina izany ka hanaovanareo hoe: «Iza no hiampita ny ranomasina haka azy ho antsika sy hampahafantatra azy antsika mba harahintsika?» '
  '14':
  - type: text
    content: Fa eo akaikinareo tokoa ny teny, dia eo am-bavanareo sy ao am-ponareo, mba harahinareo.
  - type: heading
    content: Fidio ny fiainana
  '15':
  - type: text
    content: 'Ry Israelita, indro ataoko eo anoloanareo anio ny fiainana sy ny soa ankilany ary ny fahafatesana sy ny loza andaniny. '
  '16':
  - type: text
    content: Raha ankatoavinareo ny didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo anio, ka hotiavinareo
  - type: note
    content: 'Raha ankatoavinareo... didy: araka ny dkt grika tranainy izany, fa araka ny RM kosa dia izao fotsiny no hita: tamin’ny nandidiako anareo androany hitia ny Tompo Andriamanitrareo sy hizotra ny sori-dalany ary hitandrina ny didy.'
  - type: text
    content: 'Izy sy hizoranareo ny sori-dalany ary hotandremanareo ny didy aman-dalàny mbamin’ny fitsipiny, dia ho velona ianareo ka hihamaro, ary hotahîn’ny TOMPO Andriamanitrareo any amin’ny tany izay hidiranareo mba halainareo ho fananana. '
  '17':
  - type: text
    content: 'Fa raha mivily kosa ny fonareo, ka tsy mankatò ny TOMPO ianareo fa voataona hiankohoka eo anatrehan’ny andriamani-kafa sy hanompo azy, '
  '18':
  - type: text
    content: dia ambarako aminareo dieny izao fa ho ringana tokoa ianareo, ary tsy ho maro andro eo amin’ny tany izay hidiranareo mba halainareo ho fananana, rehefa tafita ny ony Jôrdàna ianareo.
  '19':
  - type: text
    content: 'Miantso ny tany amana habakabaka aho anio ho vavolombelona aminareo fa ataoko eo anoloanareo ny fiainana sy ny fahafatesana ary ny '
  - type: text
    content: fitahiana
  - type: text
    content: ' sy ny ozona: koa fidio ny fiainana, mba ho velona ianareo sy ny taranakareo. '
  '2':
  - type: text
    content: 'ka hiverina amin’ny TOMPO Andriamanitrareo ianareo; eny, hanaiky Azy ianareo sy ny taranakareo, hanaiky Azy amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo araka ny didy rehetra izay ampitaiko aminareo anio. '
  '20':
  - type: text
    content: Tiavo ny TOMPO Andriamanitrareo ka ekeo sy ifikiro, fa izany no hahavelona anareo sy hahamaro ny andro honenanareo any amin’ny tany izay nianianan’ny TOMPO tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo fa homena azy
  - type: note
    content: 'fa izany... hahamaro: dkt hafa fa Izy no hahavelona anareo sy hahamaro. – I Abrahama sy i Itsehàka ary i Jakôba: jereo Gen 12.7; 26.3; 28.13.'
  - type: text
    content: .
  '3':
  - type: text
    content: Dia haverin’ny TOMPO Andriamanitrareo amin’ny fiainanareo taloha ianareo
  - type: note
    content: Dia haverin’ny... taloha ianareo na hoe dia hampodîn’ny Tompo Andriamanitrareo ny babo taminareo.
  - type: text
    content: 'sady hamindrany fo, ka hangoniny indray avy any amin’ny firenena rehetra nampielezany anareo. '
  '4':
  - type: text
    content: 'Na misy voaroaka any am-paran’ny tany aza ianareo, dia avy any no hangalan’ny TOMPO Andriamanitrareo azy sy hanangonany azy '
  '5':
  - type: text
    content: 'mba hampidiriny ao amin’ny tany izay fananan’ny razambenareo ka ho fanananareo koa. Hanisy soa anareo ny TOMPO Andriamanitrareo ary hahamaro isa anareo, mihoatra noho ny nataony tamin’ny razambenareo; '
  '6':
  - type: text
    content: 'dia hodiovin’ny TOMPO Andriamanitrareo ny fonareo sy ny fon’ny taranakareo hitiavanareo AZY amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo, mba ho velona ianareo. '
  '7':
  - type: text
    content: 'Ary hampiharin’ny TOMPO Andriamanitrareo amin’ny fahavalo mpankahala sy mpanenjika anareo ireny ozona rehetra ireny. '
  '8':
  - type: text
    content: 'Dia hanaiky ny TOMPO indray ianareo ka hanatanteraka ny didiny rehetra izay ampitaiko aminareo anio. '
  '9':
  - type: text
    content: 'Ary hataon’ny TOMPO Andriamanitrareo manana amby ampy ny soa hafafiny aminareo: hambininy avokoa ny asanareo; ho maro anaka ianareo; ho maro taranaka ny biby fiompinareo; ary hiavosa ny vokatry ny taninareo. Araka izay nifalian’ny TOMPO nanasoa ny razambenareo no hifaliany hanasoa anareo koa, '
