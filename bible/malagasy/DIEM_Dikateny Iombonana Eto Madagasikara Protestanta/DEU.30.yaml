document_id: DEU.30,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hiverina amin’ny Tompo i Israely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho tonga aminareo izany zavatra rehetra izany, dia ny fampanantenàm-pitahiana sy fanambaràn-doza izay nataoko teo anoloanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo toko 28.
      marker-yv: yv-n
    - type: text
      text: '. Ary any amin’ny firenena rehetra handroahan’ny TOMPO Andriamanitrareo anareo, dia hotsarovanareo ao am-ponareo izany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria manaiky ny TOMPO Andriamanitrareo ianareo ka mitandrina ny didy aman-dalàny, izay voasoratra amin’ity bokin’ny Lalàna ity, ary satria iverenanareo amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo ny TOMPO Andriamanitrareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Akaiky tokoa ny tenin’Andriamanitra
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao didy ampitaiko aminareo izao dia tsy saro-pantarina aminareo na ivelan’ny takatrareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy any an-danitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voatsiahy malalaka ao amin’ny Rm 10.6-8 ny and 12-14.
      marker-yv: yv-n
    - type: text
      text: ' izany ka hanaovanareo hoe: «Iza no hiakatra any an-danitra haka azy ho antsika sy hampahafantatra azy antsika mba hotanterahintsika?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy any ampitan’ny ranomasina izany ka hanaovanareo hoe: «Iza no hiampita ny ranomasina haka azy ho antsika sy hampahafantatra azy antsika mba harahintsika?» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa eo akaikinareo tokoa ny teny, dia eo am-bavanareo sy ao am-ponareo, mba harahinareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fidio ny fiainana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Israelita, indro ataoko eo anoloanareo anio ny fiainana sy ny soa ankilany ary ny fahafatesana sy ny loza andaniny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha ankatoavinareo ny didin’ny TOMPO Andriamanitrareo, izay ampitaiko aminareo anio, ka hotiavinareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Raha ankatoavinareo... didy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt grika tranainy izany, fa araka ny RM kosa dia izao fotsiny no hita: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tamin’ny nandidiako anareo androany hitia ny Tompo Andriamanitrareo sy hizotra ny sori-dalany ary hitandrina ny didy.
      marker-yv: yv-n
    - type: text
      text: 'Izy sy hizoranareo ny sori-dalany ary hotandremanareo ny didy aman-dalàny mbamin’ny fitsipiny, dia ho velona ianareo ka hihamaro, ary hotahîn’ny TOMPO Andriamanitrareo any amin’ny tany izay hidiranareo mba halainareo ho fananana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mivily kosa ny fonareo, ka tsy mankatò ny TOMPO ianareo fa voataona hiankohoka eo anatrehan’ny andriamani-kafa sy hanompo azy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ambarako aminareo dieny izao fa ho ringana tokoa ianareo, ary tsy ho maro andro eo amin’ny tany izay hidiranareo mba halainareo ho fananana, rehefa tafita ny ony Jôrdàna ianareo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miantso ny tany amana habakabaka aho anio ho vavolombelona aminareo fa ataoko eo anoloanareo ny fiainana sy ny fahafatesana ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitahiana
    - type: text
      text: ' sy ny ozona: koa fidio ny fiainana, mba ho velona ianareo sy ny taranakareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hiverina amin’ny TOMPO Andriamanitrareo ianareo; eny, hanaiky Azy ianareo sy ny taranakareo, hanaiky Azy amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo araka ny didy rehetra izay ampitaiko aminareo anio. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tiavo ny TOMPO Andriamanitrareo ka ekeo sy ifikiro, fa izany no hahavelona anareo sy hahamaro ny andro honenanareo any amin’ny tany izay nianianan’ny TOMPO tamin’i Abrahama sy i Itsehàka ary i Jakôba razambenareo fa homena azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fa izany... hahamaro: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fa Izy no hahavelona anareo sy hahamaro.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' – '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: I Abrahama sy i Itsehàka ary i Jakôba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Gen 12.7; 26.3; 28.13.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia haverin’ny TOMPO Andriamanitrareo amin’ny fiainanareo taloha ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Dia haverin’ny... taloha ianareo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia hampodîn’ny Tompo Andriamanitrareo ny babo taminareo.
      marker-yv: yv-n
    - type: text
      text: 'sady hamindrany fo, ka hangoniny indray avy any amin’ny firenena rehetra nampielezany anareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na misy voaroaka any am-paran’ny tany aza ianareo, dia avy any no hangalan’ny TOMPO Andriamanitrareo azy sy hanangonany azy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hampidiriny ao amin’ny tany izay fananan’ny razambenareo ka ho fanananareo koa. Hanisy soa anareo ny TOMPO Andriamanitrareo ary hahamaro isa anareo, mihoatra noho ny nataony tamin’ny razambenareo; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hodiovin’ny TOMPO Andriamanitrareo ny fonareo sy ny fon’ny taranakareo hitiavanareo AZY amin’ny fonareo manontolo sy amin’ny fanahinareo manontolo, mba ho velona ianareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampiharin’ny TOMPO Andriamanitrareo amin’ny fahavalo mpankahala sy mpanenjika anareo ireny ozona rehetra ireny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanaiky ny TOMPO indray ianareo ka hanatanteraka ny didiny rehetra izay ampitaiko aminareo anio. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hataon’ny TOMPO Andriamanitrareo manana amby ampy ny soa hafafiny aminareo: hambininy avokoa ny asanareo; ho maro anaka ianareo; ho maro taranaka ny biby fiompinareo; ary hiavosa ny vokatry ny taninareo. Araka izay nifalian’ny TOMPO nanasoa ny razambenareo no hifaliany hanasoa anareo koa, '
