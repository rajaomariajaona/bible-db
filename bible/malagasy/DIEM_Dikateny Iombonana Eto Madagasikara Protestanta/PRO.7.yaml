document_id: PRO.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aoka tsy ho voasodokan’ny vehivavy mpanitsakitsa-bady
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, tandremonao ny teniko
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ataovy raki-tsoa ho anao ny didiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tandremo ny didiko, dia ho velona ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tandremo toy ny anakandriamaso ny fampianarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ataovy toy ny peratra amin’ny rantsan-tananao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hevero toy ny anabavinao ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary toy ny havanao ny fahalalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ireo no hiaro anao amin’ilay vehivavy mpanitsakitsa-bady
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia vehivavy hafa mpanao teny manangoly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha teo am-baravarankelin’ny tranoko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mba nitazantazana indray andro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia nahita tovolahy maromaro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tamin’ireo no nisy anankiray kely saina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia tanora maivan-doha izay nandeha tamin’ny lalana
- type: usfm
  marker: q1
  children:
  - type: text
    text: akaikin’ny fonenan’izany vehivavy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka nizotra nankany an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa somambisamby ny takariva tamin’izay
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary efa manakaiky ny alina sy ny haizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indro tamy nitsena azy ilay vehivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady nanao fitafin’ny mpivarotena
- type: usfm
  marker: q1
  children:
  - type: text
    text: no feno hafetsifetsena ao am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sahisahy sady tsy mahatombin-tsiraka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mety tafapetraka ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa mbetika eny an-dalambe, mbetika eny an-kianja
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mamitsaka miandriandry izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny amin’ny zoron-trano rehetra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nisavika ilay tovolahy izy ka nanoroka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary nisolantsolana nilaza taminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Efa nivoady tamin’Andriamanitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'fa hanatitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorom
  - type: text
    text: -pihavanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary androany no nanefako izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny ampahany amin’ny henan’ny biby natao sorona dia nanaovana fanasan-dehibe. Sakafo toy izany no mety ho nanasan-dravehivavy an’ilay tovolahy.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa nivoaka ny tranoko hitsena anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: te hahalala anao aho, ka dia nahita anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fandriako efa novelarako firakotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia lambam-pandriana avy any Ejipta
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka nasiako '
  - type: usfm
    marker: w
    children:
    - type: text
      text: miora
  - type: text
    text: ' sy alôesy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary kanelina hanamanitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Andeha isika hivoky fitia mandra-paharain’ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hiara-mankafy ny fahafinaretana vokatr’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tsy ao an-trano ny vadiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa lasa nandeha lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kitapo feno vola no nentiny, ka tsy hiverina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha tsy fenomanana indray ny volana.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Teny mamy no nandreseny lahatra ilay tovolahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary resaka manodòka nataony no nitaomany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa nanaraka an-dravehivavy teo no ho eo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tahaka ny ombilahy entina hovonoina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: adala voafatotra toy izany izy no hofaizina
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mandra-pitsatoky ny zana-tsipîka amin’ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tahaka ny vorona miriotra mankamin’ny harato izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy mahalala fa hahafaty azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa ankehitriny henoinareo aho, rey anaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tandremo tsara ny teny aloaky ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka tsy ho babon’ny vehivavy toy izany ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aza mania mankany amin’ny sakeli-dalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa maro no efa naratrany ka simbany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy tambo isaina ireo rehetra efa matiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny tranony no lalana ho amin’ny toeran’ny maty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia lala-midina any am-ponenan-dRafahafatesana.
