document_id: PRO.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Aoka tsy ho voasodokan’ny vehivavy mpanitsakitsa-bady
  - type: text
    content: Anaka, tandremonao ny teniko
  - type: text
    content: ary ataovy raki-tsoa ho anao ny didiko.
  '10':
  - type: text
    content: Indro tamy nitsena azy ilay vehivavy
  - type: text
    content: sady nanao fitafin’ny mpivarotena
  - type: text
    content: no feno hafetsifetsena ao am-po.
  '11':
  - type: text
    content: Sahisahy sady tsy mahatombin-tsiraka izy
  - type: text
    content: ka tsy mety tafapetraka ao an-tranony.
  '12':
  - type: text
    content: Fa mbetika eny an-dalambe, mbetika eny an-kianja
  - type: text
    content: no mamitsaka miandriandry izy
  - type: text
    content: eny amin’ny zoron-trano rehetra eny.
  '13':
  - type: text
    content: Dia nisavika ilay tovolahy izy ka nanoroka azy
  - type: text
    content: 'ary nisolantsolana nilaza taminy hoe:'
  '14':
  - type: text
    content: «Efa nivoady tamin’Andriamanitra aho
  - type: text
    content: 'fa hanatitra '
  - type: text
    content: sorom
  - type: text
    content: -pihavanana;
  - type: text
    content: ary androany no nanefako izany
  - type: note
    content: Ny ampahany amin’ny henan’ny biby natao sorona dia nanaovana fanasan-dehibe. Sakafo toy izany no mety ho nanasan-dravehivavy an’ilay tovolahy.
  - type: text
    content: .
  '15':
  - type: text
    content: Koa nivoaka ny tranoko hitsena anao aho;
  - type: text
    content: te hahalala anao aho, ka dia nahita anao.
  '16':
  - type: text
    content: Ny fandriako efa novelarako firakotra,
  - type: text
    content: dia lambam-pandriana avy any Ejipta
  '17':
  - type: text
    content: 'ka nasiako '
  - type: text
    content: miora
  - type: text
    content: ' sy alôesy'
  - type: text
    content: ary kanelina hanamanitra azy.
  '18':
  - type: text
    content: Andeha isika hivoky fitia mandra-paharain’ny andro
  - type: text
    content: ka hiara-mankafy ny fahafinaretana vokatr’izany.
  '19':
  - type: text
    content: Fa tsy ao an-trano ny vadiko
  - type: text
    content: fa lasa nandeha lavitra.
  '2':
  - type: text
    content: Tandremo ny didiko, dia ho velona ianao;
  - type: text
    content: ary tandremo toy ny anakandriamaso ny fampianarako.
  '20':
  - type: text
    content: Kitapo feno vola no nentiny, ka tsy hiverina izy
  - type: text
    content: raha tsy fenomanana indray ny volana.»
  '21':
  - type: text
    content: Teny mamy no nandreseny lahatra ilay tovolahy
  - type: text
    content: ary resaka manodòka nataony no nitaomany azy.
  '22':
  - type: text
    content: Koa nanaraka an-dravehivavy teo no ho eo izy
  - type: text
    content: 'tahaka ny ombilahy entina hovonoina:'
  - type: text
    content: adala voafatotra toy izany izy no hofaizina
  '23':
  - type: text
    content: mandra-pitsatoky ny zana-tsipîka amin’ny fony;
  - type: text
    content: tahaka ny vorona miriotra mankamin’ny harato izy,
  - type: text
    content: ka tsy mahalala fa hahafaty azy izany.
  '24':
  - type: text
    content: Koa ankehitriny henoinareo aho, rey anaka,
  - type: text
    content: ary tandremo tsara ny teny aloaky ny vavako.
  '25':
  - type: text
    content: Aoka tsy ho babon’ny vehivavy toy izany ny fonareo,
  - type: text
    content: ary aza mania mankany amin’ny sakeli-dalany.
  '26':
  - type: text
    content: Fa maro no efa naratrany ka simbany
  - type: text
    content: ary tsy tambo isaina ireo rehetra efa matiny.
  '27':
  - type: text
    content: Ny tranony no lalana ho amin’ny toeran’ny maty,
  - type: text
    content: dia lala-midina any am-ponenan-dRafahafatesana.
  '3':
  - type: text
    content: Ataovy toy ny peratra amin’ny rantsan-tananao ireo
  - type: text
    content: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
  '4':
  - type: text
    content: Hevero toy ny anabavinao ny fahendrena
  - type: text
    content: ary toy ny havanao ny fahalalana;
  '5':
  - type: text
    content: ireo no hiaro anao amin’ilay vehivavy mpanitsakitsa-bady
  - type: text
    content: dia vehivavy hafa mpanao teny manangoly.
  '6':
  - type: text
    content: Raha teo am-baravarankelin’ny tranoko aho
  - type: text
    content: no mba nitazantazana indray andro,
  '7':
  - type: text
    content: dia nahita tovolahy maromaro;
  - type: text
    content: ary tamin’ireo no nisy anankiray kely saina,
  '8':
  - type: text
    content: dia tanora maivan-doha izay nandeha tamin’ny lalana
  - type: text
    content: akaikin’ny fonenan’izany vehivavy izany
  - type: text
    content: ka nizotra nankany an-tranony.
  '9':
  - type: text
    content: Efa somambisamby ny takariva tamin’izay
  - type: text
    content: ary efa manakaiky ny alina sy ny haizina.
