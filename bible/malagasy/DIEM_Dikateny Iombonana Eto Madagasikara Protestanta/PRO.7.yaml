      text: ary kanelina hanamanitra azy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika hivoky fitia mandra-paharain’ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hiara-mankafy ny fahafinaretana vokatr’izany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ao an-trano ny vadiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa lasa nandeha lavitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny didiko, dia ho velona ianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tandremo toy ny anakandriamaso ny fampianarako.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kitapo feno vola no nentiny, ka tsy hiverina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha tsy fenomanana indray ny volana.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny mamy no nandreseny lahatra ilay tovolahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary resaka manodòka nataony no nitaomany azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nanaraka an-dravehivavy teo no ho eo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tahaka ny ombilahy entina hovonoina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: adala voafatotra toy izany izy no hofaizina
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mandra-pitsatoky ny zana-tsipîka amin’ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny vorona miriotra mankamin’ny harato izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mahalala fa hahafaty azy izany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ankehitriny henoinareo aho, rey anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tandremo tsara ny teny aloaky ny vavako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho babon’ny vehivavy toy izany ny fonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aza mania mankany amin’ny sakeli-dalany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa maro no efa naratrany ka simbany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy tambo isaina ireo rehetra efa matiny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranony no lalana ho amin’ny toeran’ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lala-midina any am-ponenan-dRafahafatesana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy toy ny peratra amin’ny rantsan-tananao ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary soraty ao am-ponao toy ny amin’ny vatofisaka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hevero toy ny anabavinao ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny havanao ny fahalalana;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo no hiaro anao amin’ilay vehivavy mpanitsakitsa-bady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia vehivavy hafa mpanao teny manangoly.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha teo am-baravarankelin’ny tranoko aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mba nitazantazana indray andro,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahita tovolahy maromaro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ireo no nisy anankiray kely saina,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tanora maivan-doha izay nandeha tamin’ny lalana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: akaikin’ny fonenan’izany vehivavy izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nizotra nankany an-tranony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa somambisamby ny takariva tamin’izay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary efa manakaiky ny alina sy ny haizina.
