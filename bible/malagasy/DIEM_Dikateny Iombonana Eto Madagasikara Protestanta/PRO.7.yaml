          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny ampahany amin’ny henan’ny biby natao sorona dia nanaovana fanasan-dehibe. Sakafo toy izany no mety ho nanasan-dravehivavy an’ilay tovolahy.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nivoaka ny tranoko hitsena anao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te hahalala anao aho, ka dia nahita anao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fandriako efa novelarako firakotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia lambam-pandriana avy any Ejipta
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka nasiako '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miora
    - type: text
      text: ' sy alôesy'
  - type: usfm
