document_id: GEN.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôsefa tao amin’i Pôtifara izay ejiptianina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tafidina tany Ejipta i Jôsefa, satria ireo Jismahelita no nitondra azy tany. Lehilahy ejiptianina atao hoe Pôtifara, tandapan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farao
  - type: text
    text: ' sady lehiben’ny mpiambina, no nividy azy tamin’ny Jismahelita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny TOMPO nomba an’i Jôsefa izay nanjary lehilahy nambinina. Nitoetra tao an-tranon’ilay Ejiptianina tompony izy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary hitan’ity tompony fa nombàn’ny TOMPO i Jôsefa ka nampahombiaziny avokoa izay rehetra nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nahafaly fatratra ny tompony i Jôsefa ka nataony mpiasa manokana; dia nomeny hiandraiketany ny tao an-tranony sy izay nananany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nanomboka hatreo, noho ny amin’i Jôsefa, dia notahîn’ny TOMPO ny tao an-tranon’ilay Ejiptianina sy izay rehetra nananany. Io fitahian’ny TOMPO io dia nanenika ny fananany rehetra na an-tsaha na an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Noho izany dia navelany teo am-pelatanan’i Jôsefa avokoa ny fananany rehetra; ka tsy nihevitra na inona na inona intsony i Pôtifara, afa-tsy izay sakafo hohanin’ny tenany ihany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôsefa sy ilay vadin’ny tompony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tovolahy tsara tarehy sady bikàna i Jôsefa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Taorian’ireo zava-niseho ireo, dia nangata-maso tamin’i Jôsefa ny vadin’ny tompony, ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia handry amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy ny navalin’i Jôsefa azy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Sanatria! Napetraky ny tompoko eo an-tanako avokoa ny fitandremana ny fananany rehetra ary matoky manana ahy izy ka tsy mikarakara na inona na inona intsony ato an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary na ato an-trano aza dia tsy manana fahefana noho izaho izy; ka tsy nisy nandrarany ahy, afa-tsy ianao izay vadiny. Koa ahoana no ahazoako manao zava-dratsy lehibe toy izany, ka hanotako amin’Andriamanitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isan’andro isan’andro dia mbola nanangoly an’i Jôsefa ihany ilay vehivavy; fa tsy nanaiky handry na hiray aminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indray andro dia niditra tao an-trano i Jôsefa mba hanao ny raharahany, ary tsy nisy mpanompo tao an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nosamborin’ny vadin’i Pôtifara tamin’ny lambany izy, ka nataony hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avia handry amiko!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa navelan’i Jôsefa teny an-tanan-dravehivavy ny lambany, dia nandositra nivoaka ny trano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nony hitan-dravehivavy fa nandositra i Jôsefa ka namela ny lambany teo an-tanany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia niantso vonjy tamin’ireo mpanompony izy ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Jereo fa nentina taty amintsika iny lehilahy hebreo iny mba hanadala antsika. Nanatona ahy saika handry tamiko izy, kanjo niantsoantso mafy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha vao nandre ahy nanandra-peo sy niantsoantso izy, dia nandositra nivoaka ny trano ka namela ny lambany teto anilako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia napetrak’ilay vehivavy teo anilany teo ihany ilay lamba mandra-pahatongan’ny vadiny tao an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nitantara tamin’ny vadiny araka ireo teny ireo koa izy ka nanao hoe: «Nanatona ahy mba hanadala ahy ilay mpanompolahy hebreo nentinao taty amintsika iny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa nanandra-peo sy niantsoantso aho, dia lasa nandositra nivoaka ny trano izy ka namela ny lambany teto anilako.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tezitra mafy ilay tompon’i Jôsefa, rehefa nandre ny fitantaràn’ny vadiny izay nataon’ny mpanompony taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa nasain’i Pôtifara nosamborina i Jôsefa sy nasainy nohidîna tao am-ponja izay nisy ireo mpigadra meloka tamin’ny mpanjaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Jôsefa tao an-tranomaizina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa raha tao am-ponja i Jôsefa, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia nomba azy kosa ny TOMPO sy naneho hatsaram-po taminy, ka nampahita sitraka azy tamin’ny lehiben’ny fonja. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia natolotr’ilay lehiben’ny fonja teo an-tanan’i Jôsefa avokoa ireo mpigadra rehetra, ka izy no mitarika ny asa rehetra nataon’ireo mpigadra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa ilay lehiben’ny fonja dia tsy niraharaha na inona na inona tamin’ny zavatra rehetra nankininy tamin’i Jôsefa, satria ny TOMPO nomba azy ka nanambina izay nataony.
