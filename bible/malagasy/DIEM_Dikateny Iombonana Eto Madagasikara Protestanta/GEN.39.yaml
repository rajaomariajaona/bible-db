document_id: GEN.39,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Jôsefa tao amin’i Pôtifara izay ejiptianina
  - type: text
    content: 'Tafidina tany Ejipta i Jôsefa, satria ireo Jismahelita no nitondra azy tany. Lehilahy ejiptianina atao hoe Pôtifara, tandapan’ny '
  - type: text
    content: Farao
  - type: text
    content: ' sady lehiben’ny mpiambina, no nividy azy tamin’ny Jismahelita. '
  '10':
  - type: text
    content: 'Isan’andro isan’andro dia mbola nanangoly an’i Jôsefa ihany ilay vehivavy; fa tsy nanaiky handry na hiray aminy izy. '
  '11':
  - type: text
    content: 'Indray andro dia niditra tao an-trano i Jôsefa mba hanao ny raharahany, ary tsy nisy mpanompo tao an-trano. '
  '12':
  - type: text
    content: 'Dia nosamborin’ny vadin’i Pôtifara tamin’ny lambany izy, ka nataony hoe:'
  - type: text
    content: –Avia handry amiko!
  - type: text
    content: 'Fa navelan’i Jôsefa teny an-tanan-dravehivavy ny lambany, dia nandositra nivoaka ny trano izy. '
  '13':
  - type: text
    content: 'Nony hitan-dravehivavy fa nandositra i Jôsefa ka namela ny lambany teo an-tanany, '
  '14':
  - type: text
    content: 'dia niantso vonjy tamin’ireo mpanompony izy ka nanao hoe:'
  - type: text
    content: '–Jereo fa nentina taty amintsika iny lehilahy hebreo iny mba hanadala antsika. Nanatona ahy saika handry tamiko izy, kanjo niantsoantso mafy aho. '
  '15':
  - type: text
    content: Fa raha vao nandre ahy nanandra-peo sy niantsoantso izy, dia nandositra nivoaka ny trano ka namela ny lambany teto anilako.
  '16':
  - type: text
    content: 'Dia napetrak’ilay vehivavy teo anilany teo ihany ilay lamba mandra-pahatongan’ny vadiny tao an-trano. '
  '17':
  - type: text
    content: 'Dia nitantara tamin’ny vadiny araka ireo teny ireo koa izy ka nanao hoe: «Nanatona ahy mba hanadala ahy ilay mpanompolahy hebreo nentinao taty amintsika iny. '
  '18':
  - type: text
    content: Fa nanandra-peo sy niantsoantso aho, dia lasa nandositra nivoaka ny trano izy ka namela ny lambany teto anilako.»
  '19':
  - type: text
    content: 'Tezitra mafy ilay tompon’i Jôsefa, rehefa nandre ny fitantaràn’ny vadiny izay nataon’ny mpanompony taminy. '
  '2':
  - type: text
    content: 'Ary ny TOMPO nomba an’i Jôsefa izay nanjary lehilahy nambinina. Nitoetra tao an-tranon’ilay Ejiptianina tompony izy; '
  '20':
  - type: text
    content: Koa nasain’i Pôtifara nosamborina i Jôsefa sy nasainy nohidîna tao am-ponja izay nisy ireo mpigadra meloka tamin’ny mpanjaka.
  - type: heading
    content: I Jôsefa tao an-tranomaizina
  - type: text
    content: 'Fa raha tao am-ponja i Jôsefa, '
  '21':
  - type: text
    content: 'dia nomba azy kosa ny TOMPO sy naneho hatsaram-po taminy, ka nampahita sitraka azy tamin’ny lehiben’ny fonja. '
  '22':
  - type: text
    content: 'Dia natolotr’ilay lehiben’ny fonja teo an-tanan’i Jôsefa avokoa ireo mpigadra rehetra, ka izy no mitarika ny asa rehetra nataon’ireo mpigadra. '
  '23':
  - type: text
    content: Koa ilay lehiben’ny fonja dia tsy niraharaha na inona na inona tamin’ny zavatra rehetra nankininy tamin’i Jôsefa, satria ny TOMPO nomba azy ka nanambina izay nataony.
  '3':
  - type: text
    content: 'ary hitan’ity tompony fa nombàn’ny TOMPO i Jôsefa ka nampahombiaziny avokoa izay rehetra nataony. '
  '4':
  - type: text
    content: 'Ary nahafaly fatratra ny tompony i Jôsefa ka nataony mpiasa manokana; dia nomeny hiandraiketany ny tao an-tranony sy izay nananany rehetra. '
  '5':
  - type: text
    content: 'Nanomboka hatreo, noho ny amin’i Jôsefa, dia notahîn’ny TOMPO ny tao an-tranon’ilay Ejiptianina sy izay rehetra nananany. Io fitahian’ny TOMPO io dia nanenika ny fananany rehetra na an-tsaha na an-tanàna. '
  '6':
  - type: text
    content: Noho izany dia navelany teo am-pelatanan’i Jôsefa avokoa ny fananany rehetra; ka tsy nihevitra na inona na inona intsony i Pôtifara, afa-tsy izay sakafo hohanin’ny tenany ihany.
  - type: heading
    content: I Jôsefa sy ilay vadin’ny tompony
  - type: text
    content: 'Tovolahy tsara tarehy sady bikàna i Jôsefa. '
  '7':
  - type: text
    content: 'Taorian’ireo zava-niseho ireo, dia nangata-maso tamin’i Jôsefa ny vadin’ny tompony, ka nanao taminy hoe:'
  - type: text
    content: –Avia handry amiko!
  '8':
  - type: text
    content: 'Fa hoy ny navalin’i Jôsefa azy:'
  - type: text
    content: '–Sanatria! Napetraky ny tompoko eo an-tanako avokoa ny fitandremana ny fananany rehetra ary matoky manana ahy izy ka tsy mikarakara na inona na inona intsony ato an-trano. '
  '9':
  - type: text
    content: Ary na ato an-trano aza dia tsy manana fahefana noho izaho izy; ka tsy nisy nandrarany ahy, afa-tsy ianao izay vadiny. Koa ahoana no ahazoako manao zava-dratsy lehibe toy izany, ka hanotako amin’Andriamanitra?
