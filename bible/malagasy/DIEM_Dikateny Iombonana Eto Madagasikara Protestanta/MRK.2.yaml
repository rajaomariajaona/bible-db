document_id: MRK.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Sitranin’i Jesoa ilay malemy tao Kafarnahòma
  - type: heading
    content: (Jereo Mt 9.1-8; Lk 5.17-26)
  - type: text
    content: Tafaverina tao Kafarnahòma indray i Jesoa rehefa afaka andro vitsivitsy, ary ren’ny olona fa hoe tao an-trano
  - type: note
    content: 'tao an-trano: azo heverina araka 1.29 fa ny tranon-dry i Simôna sy i Andrea no ambara eto.'
  - type: text
    content: ' Izy. '
  '10':
  - type: text
    content: 'Aoka ho fantatrareo fa ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' eto an-tany dia manam-pahefana hamela heloka!'
  - type: text
    content: 'Dia hoy i Jesoa tamin’ilay malemy:'
  '11':
  - type: text
    content: –Mandidy anao aho, mitsangàna, batao ny fandrianao ka modia any an-tranonao!
  '12':
  - type: text
    content: 'Dia nitsangana ilay malemy ka nibata ny fandriany avy hatrany ary lasa nandeha teo imason’ny olona rehetra. Dia talanjona avokoa izay rehetra teo ka nanome voninahitra an’Andriamanitra sady vaky vava hoe:'
  - type: text
    content: –Tsy mbola nahita zavatra toy izao na oviana na oviana isika!
  - type: heading
    content: Antsoin’i Jesoa ho mpianany i Levỳ
  - type: heading
    content: (Jereo Mt 9.9-13; Lk 5.27-32)
  '13':
  - type: text
    content: 'Dia nankany amoron’ny farihin’i Galilea indray i Jesoa ary nanatona Azy ny vahoaka rehetra ka nampianariny. '
  '14':
  - type: text
    content: 'Raha nandalo i Jesoa, dia nahita an’i Levỳ zanakalahin’i Halfeo nipetraka teo amin’ny birao famorian-ketra ary hoy i Jesoa taminy:'
  - type: text
    content: –Avia hiaraka amiko!
  - type: text
    content: 'Dia nitsangana i Levỳ ka nandeha niaraka taminy. '
  '15':
  - type: text
    content: Ary raha nisakafo tao an-tranon’i Levỳ
  - type: note
    content: 'tranon’i Levỳ: ny rijan-teny grika fototra dia milaza fotsiny hoe tranony, kanefa toa ny tranon’i Levỳ no ambara eto fa tsy ny an’i Jesoa. Jereo Lk 5.29.'
  - type: text
    content: ' i Jesoa, dia maro ny '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' sy ny mpanota no tonga niara-nihinana tamin’Izy sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '; fa maro ireo karazan’olona ireo no fatra-panaraka Azy. '
  '16':
  - type: text
    content: 'Rehefa nahita an’i Jesoa niara-nisakafo tamin’ny mpanota sy ny mpamory hetra ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' anisan’ny antokom-pivavahana '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia nilaza tamin’ny mpianatr’i Jesoa hoe:'
  - type: text
    content: –Dia miara-misakafo amin’ny mpamory hetra sy ny mpanota ve Izy io
  - type: note
    content: Ampit ny and 15.16 sy Lk 15.1-2.
  - type: text
    content: '?'
  '17':
  - type: text
    content: 'Henon’i Jesoa izany ka hoy Izy tamin’ny mpahay lalàna:'
  - type: text
    content: –Tsy ny salama no mila dokotera fa ny marary! Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota!
  - type: heading
    content: Ny fifadian-kanina ary ny tonta sy ny vao
  - type: heading
    content: (Jereo Mt 9.14-17; Lk 5.33-39)
  '18':
  - type: text
    content: ' '
  - type: text
    content: Nifady hanina
  - type: text
    content: ' ny '
  - type: text
    content: mpianatr
  - type: text
    content: '’i Jôhany Mpanao batisa sy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' tamin’izay; ka nisy olona tonga teo amin’i Jesoa hanontany Azy hoe:'
  - type: text
    content: –Nahoana ny mpianatr’i Jôhany sy ny mpianatry ny Farisianina no mifady hanina, fa ny mpianatrao kosa tsy mba mifady?
  '19':
  - type: text
    content: 'Dia izao no navalin’i Jesoa:'
  - type: text
    content: '–Moa azon’ireo mpanotrona ny mpampaka-bady atao ve ny mifady hanina raha mbola miaraka aminy eo ny mpampakatra? Tsia, tsy azony atao ny mifady hanina raha mbola miaraka aminy eo ny mpampakatra! '
  '2':
  - type: text
    content: 'Dia vory marobe ny olona ka tsy nisy hitoerana intsony na dia teny anoloan’ny varavarana aza; ary i Jesoa nanambara ny tenin’Andriamanitra taminy. '
  '20':
  - type: text
    content: Fa ho avy ny andro hanesorana ny mpampakatra eo aminy, ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
  '21':
  - type: text
    content: –Tsy misy olona manampina fitafiana tonta amin’ny tapa-damba vaovao; fa raha izany, dia handrirotra ny fitafiana tonta ilay tapa-damba vaovao izay natampina, ary dia mainka koa hitatra ny rovitra.
  '22':
  - type: text
    content: –Toy izany koa, tsy misy olona mitahiry divay vaovao ao anaty siny hoditra efa tranainy; raha izany, dia ho rotiky ny divay ny siny hoditra ka hafoy ny divay mbamin’ny siny hoditra. Fa siny hoditra vaovao no fitahirizana divay vaovao.
  - type: heading
    content: Mioty salohim-bary amin’ny andro sabata ny mpianatr’i Jesoa
  - type: heading
    content: (Jereo Mt 12.1-8; Lk 6.1-5)
  '23':
  - type: text
    content: 'Raha nandeha namaky tanimbary tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ' ry i Jesoa, dia nioty salohim-bary teny am-pandehanana ny '
  - type: text
    content: mpianany
  - type: note
    content: Jereo Deot 23.26.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ka hoy ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' tamin’i Jesoa:'
  - type: text
    content: –Jereo, nahoana ireto mpianatrao no manao zavatra tsy fanao amin’ny andro sabata
  - type: note
    content: Jereo Eks 34.21.
  - type: text
    content: '?'
  '25':
  - type: text
    content: 'Dia novalian’i Jesoa hoe:'
  - type: text
    content: '–Tsy mbola novakînareo tao amin’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' angaha izay nataon’i Davida raha tsy nanan-kohanina ka noana izy mbamin’ireo olona niaraka taminy? '
  '26':
  - type: text
    content: 'Niditra tao an-tranon’Andriamanitra i Davida tamin’ny andron’i Abiatara '
  - type: text
    content: mpisorombe
  - type: text
    content: ', ary nihinana ny mofo apetraka eo anatrehan’Andriamanitra; kanefa izany mofo izany tsy azon’iza na iza hanina afa-tsy ny mpisorona ihany'
  - type: note
    content: 'nihinana ny mofo: jereo 1 Sam 21.2-7. –Abiatara: jereo 2 Sam 15.35. –tsy azon’iza... ihany: jereo Lev 24.9.'
  - type: text
    content: . Dia nomen’i Davida koa ireo olona niaraka taminy.
  '27':
  - type: text
    content: 'Ary hoy i Jesoa tamin’ny Farisianina:'
  - type: text
    content: '–Ny sabata no natao ho an’ny olona, fa tsy ny olona no natao ho an’ny sabata. '
  '28':
  - type: text
    content: 'Araka izany, na dia ny sabata aza dia ananan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' fahefana!'
  '3':
  - type: text
    content: 'Dia nisy olona tamy, nitondra lehilahy malemy nolanjain’olona efa-dahy hankeo amin’i Jesoa. '
  '4':
  - type: text
    content: Tsy afaka nanatona an’i Jesoa ry zareo noho ny habetsahan’ny vahoaka. Ary dia ny tafon-trano, tandrifin’izay nitoeran’i Jesoa, no nanesorany
  - type: note
    content: 'ny tafon-trano... no nanesorany: ny tafon-trano tany Palestinina fahizany dia marin-tampona vita hazo sy feta tany.'
  - type: text
    content: '; ka rehefa voasokatra, dia nampidinany ny fandriana niamparan’ilay malemy. '
  '5':
  - type: text
    content: 'Hitan’i Jesoa ny finoan’ireto olona ka hoy Izy tamin’ilay malemy:'
  - type: text
    content: –Voavela ny helokao, anaka!
  '6':
  - type: text
    content: 'Fa nisy nipetraka teo kosa ireo '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' ka nieritreritra tao am-pony hoe: '
  '7':
  - type: text
    content: «Nahoana no miteny toy izany ilay ity? Manevateva an’Andriamanitra! Iza no mahavela heloka afa-tsy Andriamanitra irery ihany
  - type: note
    content: 'Manevateva an’Andriamanitra: ampit Lev 24.16. –Iza no mahavela... ihany: jereo Sal 103.3; Is 43.25.'
  - type: text
    content: '?» '
  '8':
  - type: text
    content: 'Takatr’i Jesoa avy hatrany ny eritreritr’iretsy mpahay lalàna ka hoy Izy taminy:'
  - type: text
    content: '–Nahoana ianareo no mieritreritra izany ao am-ponareo? '
  '9':
  - type: text
    content: 'Inona moa no tsotsotra kokoa, ny milaza amin’ity malemy ity hoe: «Voavela ny helokao», sa ny milaza aminy hoe: «Mitsangàna, ka batao ny fandrianao ary mandehana»? '
