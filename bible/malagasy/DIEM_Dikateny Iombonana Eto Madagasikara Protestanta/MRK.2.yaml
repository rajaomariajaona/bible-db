document_id: MRK.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sitranin’i Jesoa ilay malemy tao Kafarnahòma
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 9.1-8; Lk 5.17-26)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tafaverina tao Kafarnahòma indray i Jesoa rehefa afaka andro vitsivitsy, ary ren’ny olona fa hoe tao an-trano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tao an-trano: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azo heverina araka 1.29 fa ny tranon-dry i Simôna sy i Andrea no ambara eto.
      marker-yv: yv-n
    - type: text
      text: ' Izy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aoka ho fantatrareo fa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' eto an-tany dia manam-pahefana hamela heloka!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa tamin’ilay malemy:'
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: –Mandidy anao aho, mitsangàna, batao ny fandrianao ka modia any an-tranonao!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nitsangana ilay malemy ka nibata ny fandriany avy hatrany ary lasa nandeha teo imason’ny olona rehetra. Dia talanjona avokoa izay rehetra teo ka nanome voninahitra an’Andriamanitra sady vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy mbola nahita zavatra toy izao na oviana na oviana isika!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Antsoin’i Jesoa ho mpianany i Levỳ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 9.9-13; Lk 5.27-32)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nankany amoron’ny farihin’i Galilea indray i Jesoa ary nanatona Azy ny vahoaka rehetra ka nampianariny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Raha nandalo i Jesoa, dia nahita an’i Levỳ zanakalahin’i Halfeo nipetraka teo amin’ny birao famorian-ketra ary hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Avia hiaraka amiko!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana i Levỳ ka nandeha niaraka taminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary raha nisakafo tao an-tranon’i Levỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tranon’i Levỳ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny rijan-teny grika fototra dia milaza fotsiny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tranony,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kanefa toa ny tranon’i Levỳ no ambara eto fa tsy ny an’i Jesoa. Jereo Lk 5.29.'
      marker-yv: yv-n
    - type: text
      text: ' i Jesoa, dia maro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpamory hetra
    - type: text
      text: ' sy ny mpanota no tonga niara-nihinana tamin’Izy sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '; fa maro ireo karazan’olona ireo no fatra-panaraka Azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa nahita an’i Jesoa niara-nisakafo tamin’ny mpanota sy ny mpamory hetra ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' anisan’ny antokom-pivavahana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ', dia nilaza tamin’ny mpianatr’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Dia miara-misakafo amin’ny mpamory hetra sy ny mpanota ve Izy io
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit ny and 15.16 sy Lk 15.1-2.
      marker-yv: yv-n
    - type: text
      text: '?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Henon’i Jesoa izany ka hoy Izy tamin’ny mpahay lalàna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy ny salama no mila dokotera fa ny marary! Tsy hiantso ny olo-marina no nahatongavako fa hiantso ny mpanota!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fifadian-kanina ary ny tonta sy ny vao
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 9.14-17; Lk 5.33-39)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Nifady hanina
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatr
    - type: text
      text: '’i Jôhany Mpanao batisa sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' tamin’izay; ka nisy olona tonga teo amin’i Jesoa hanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana ny mpianatr’i Jôhany sy ny mpianatry ny Farisianina no mifady hanina, fa ny mpianatrao kosa tsy mba mifady?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia izao no navalin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Moa azon’ireo mpanotrona ny mpampaka-bady atao ve ny mifady hanina raha mbola miaraka aminy eo ny mpampakatra? Tsia, tsy azony atao ny mifady hanina raha mbola miaraka aminy eo ny mpampakatra! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia vory marobe ny olona ka tsy nisy hitoerana intsony na dia teny anoloan’ny varavarana aza; ary i Jesoa nanambara ny tenin’Andriamanitra taminy. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ho avy ny andro hanesorana ny mpampakatra eo aminy, ka amin’izay andro izay vao hifady hanina ireo mpanotrona.
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: –Tsy misy olona manampina fitafiana tonta amin’ny tapa-damba vaovao; fa raha izany, dia handrirotra ny fitafiana tonta ilay tapa-damba vaovao izay natampina, ary dia mainka koa hitatra ny rovitra.
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: –Toy izany koa, tsy misy olona mitahiry divay vaovao ao anaty siny hoditra efa tranainy; raha izany, dia ho rotiky ny divay ny siny hoditra ka hafoy ny divay mbamin’ny siny hoditra. Fa siny hoditra vaovao no fitahirizana divay vaovao.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mioty salohim-bary amin’ny andro sabata ny mpianatr’i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 12.1-8; Lk 6.1-5)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Raha nandeha namaky tanimbary tamin’ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' ry i Jesoa, dia nioty salohim-bary teny am-pandehanana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 23.26.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ka hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ' tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Jereo, nahoana ireto mpianatrao no manao zavatra tsy fanao amin’ny andro sabata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.21.
      marker-yv: yv-n
    - type: text
      text: '?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsy mbola novakînareo tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' angaha izay nataon’i Davida raha tsy nanan-kohanina ka noana izy mbamin’ireo olona niaraka taminy? '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Niditra tao an-tranon’Andriamanitra i Davida tamin’ny andron’i Abiatara '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpisorombe
    - type: text
      text: ', ary nihinana ny mofo apetraka eo anatrehan’Andriamanitra; kanefa izany mofo izany tsy azon’iza na iza hanina afa-tsy ny mpisorona ihany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nihinana ny mofo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Sam 21.2-7. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Abiatara:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 2 Sam 15.35. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tsy azon’iza... ihany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Lev 24.9.'
      marker-yv: yv-n
    - type: text
      text: . Dia nomen’i Davida koa ireo olona niaraka taminy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary hoy i Jesoa tamin’ny Farisianina:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ny sabata no natao ho an’ny olona, fa tsy ny olona no natao ho an’ny sabata. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Araka izany, na dia ny sabata aza dia ananan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zanak’olona
    - type: text
      text: ' fahefana!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nisy olona tamy, nitondra lehilahy malemy nolanjain’olona efa-dahy hankeo amin’i Jesoa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy afaka nanatona an’i Jesoa ry zareo noho ny habetsahan’ny vahoaka. Ary dia ny tafon-trano, tandrifin’izay nitoeran’i Jesoa, no nanesorany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny tafon-trano... no nanesorany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny tafon-trano tany Palestinina fahizany dia marin-tampona vita hazo sy feta tany.
      marker-yv: yv-n
    - type: text
      text: '; ka rehefa voasokatra, dia nampidinany ny fandriana niamparan’ilay malemy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hitan’i Jesoa ny finoan’ireto olona ka hoy Izy tamin’ilay malemy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Voavela ny helokao, anaka!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa nisy nipetraka teo kosa ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' ka nieritreritra tao am-pony hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: «Nahoana no miteny toy izany ilay ity? Manevateva an’Andriamanitra! Iza no mahavela heloka afa-tsy Andriamanitra irery ihany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Manevateva an’Andriamanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ampit Lev 24.16. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: '–Iza no mahavela... ihany:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Sal 103.3; Is 43.25.'
      marker-yv: yv-n
    - type: text
      text: '?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Takatr’i Jesoa avy hatrany ny eritreritr’iretsy mpahay lalàna ka hoy Izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana ianareo no mieritreritra izany ao am-ponareo? '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Inona moa no tsotsotra kokoa, ny milaza amin’ity malemy ity hoe: «Voavela ny helokao», sa ny milaza aminy hoe: «Mitsangàna, ka batao ny fandrianao ary mandehana»? '
