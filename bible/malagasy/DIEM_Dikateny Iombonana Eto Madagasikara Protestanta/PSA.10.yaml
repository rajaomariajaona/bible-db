document_id: PSA.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: LAMEDA
  - type: text
    content: Nahoana Ianao, TOMPO ô,
  - type: text
    content: no mijanona eny lavitra eny?
  - type: text
    content: Ary nahoana Ianao no miery
  - type: text
    content: amin’ny androm-pahoriana?
  '10':
  - type: text
    content: Torotoro ny malahelo fa resy mihitsy
  - type: text
    content: ka mianjera ho eo ambany fahefàny.
  '11':
  - type: text
    content: 'Dia hoy ny olon-dratsy anakampony:'
  - type: text
    content: «Tsy raharahain’Andriamanitra izany
  - type: text
    content: sady ikimpiany fa tsy mba jereny
  - type: text
    content: ary tsy hitany na oviana na oviana!»
  - type: heading
    content: KÔFA
  '12':
  - type: text
    content: TOMPO Andriamanitro ô, mirotsaha an-tsehatra.
  - type: text
    content: Ahinjiro ny tananao hanafay ny olon-dratsy
  - type: text
    content: ka aza hadinoina re ireo malahelo.
  '13':
  - type: text
    content: Nahoana moa ny olon-dratsy
  - type: text
    content: no haneso Anao Andriamanitra,
  - type: text
    content: 'ka hiteny anakampo hoe:'
  - type: text
    content: «Tsy hanadina ahy Izy!»?
  - type: heading
    content: RESA
  '14':
  - type: text
    content: Hitanao fa mijaly sy ory ny mahantra,
  - type: text
    content: ka mivonon-kanampy azy hatrany Ianao;
  - type: text
    content: Ianao no itokian’ny malemy,
  - type: text
    content: sady mamonjy ny kamboty.
  - type: heading
    content: SINA
  '15':
  - type: text
    content: Koa poteho ny herin’ny olon-dratsy,
  - type: text
    content: adino aminy ny ratsy nataony
  - type: text
    content: ary aoka izy tsy ho hita soritra intsony!
  '16':
  - type: text
    content: Ny TOMPO no mpanjaka mandrakizay mandrakizay;
  - type: text
    content: ho fongotra amin’ny taniny ny mpanompo sampy.
  - type: heading
    content: TAO
  '17':
  - type: text
    content: TOMPO ô, renao ny fanirian’ny malahelo
  - type: text
    content: ka ampaherezinao tokoa ny fony.
  '18':
  - type: text
    content: Vonon-kihaino hatrany
  - type: text
    content: ny kamboty sy ny ampahorîna Ianao
  - type: text
    content: mba hanomezanao azy ny rariny.
  - type: text
    content: Dia ho foana tanteraka hatreo
  - type: text
    content: ny mpanjakazaka etỳ an-tany.
  '2':
  - type: text
    content: Mirehaka erỳ ny olon-dratsy
  - type: text
    content: mitsentsitra ny malahelo;
  - type: text
    content: tamina tetika maty paika
  - type: text
    content: no namelezany azy ireo.
  '3':
  - type: text
    content: Mibitaka erỳ ny olon-dratsy
  - type: text
    content: fa mahazo izay nirîny;
  - type: text
    content: kanefa ny TOMPO tsiratsirainy
  - type: text
    content: sady hamavoiny tokoa.
  '4':
  - type: text
    content: 'Ny olon-dratsy mirehareha hoe:'
  - type: text
    content: «Tsy hanadina Andriamanitra,
  - type: text
    content: tsy misy Andriamanitra.»
  - type: text
    content: Izany no ambentin-keviny.
  '5':
  - type: text
    content: Mahomby mandrakariva ny zavatra ataony,
  - type: text
    content: vingavingainy avokoa izay manohitra azy,
  - type: text
    content: tsy tazany ny fitsaran’Andriamanitra.
  '6':
  - type: text
    content: 'Hoy ny olon-dratsy anakampony:'
  - type: text
    content: «Tsy misy atahorako akory,
  - type: text
    content: fa ieren-doza hatrany aho.»
  - type: heading
    content: PE
  '7':
  - type: text
    content: Ozona sy fitaka ary hafetsena
  - type: text
    content: no mameno ny teny lazainy
  - type: note
    content: Jereo Rm 3.14; ampit Mt 12.34.
  - type: text
    content: ;
  - type: text
    content: fampahoriana sy faharatsiana
  - type: text
    content: no zavatra tiany hambara.
  '8':
  - type: text
    content: Mamitsaka hanotrika eny akaikin-tanàna izy
  - type: text
    content: ary mamono an-katakonana ny tsy manan-tsiny;
  - type: heading
    content: HAINA
  - type: text
    content: ny masony mitily ireo fadiranovana.
  '9':
  - type: text
    content: Manotrika an-katakonana tokoa izy
  - type: text
    content: toy ny fanaon’ny liona ao am-pierena;
  - type: text
    content: manotrika hisambotra ny malahelo izy
  - type: text
    content: ka mitarika azy ho ao anaty haratony.
