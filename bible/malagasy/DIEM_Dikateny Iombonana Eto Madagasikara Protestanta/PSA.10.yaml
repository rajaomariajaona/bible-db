document_id: PSA.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: LAMEDA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nahoana Ianao, TOMPO ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mijanona eny lavitra eny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana Ianao no miery
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’ny androm-pahoriana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mirehaka erỳ ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mitsentsitra ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamina tetika maty paika
- type: usfm
  marker: q1
  children:
  - type: text
    text: no namelezany azy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mibitaka erỳ ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa mahazo izay nirîny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: kanefa ny TOMPO tsiratsirainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady hamavoiny tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny olon-dratsy mirehareha hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy hanadina Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy misy Andriamanitra.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no ambentin-keviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahomby mandrakariva ny zavatra ataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vingavingainy avokoa izay manohitra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy tazany ny fitsaran’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy ny olon-dratsy anakampony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy misy atahorako akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ieren-doza hatrany aho.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: PE
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ozona sy fitaka ary hafetsena
- type: usfm
  marker: q1
  children:
  - type: text
    text: no mameno ny teny lazainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Rm 3.14; ampit Mt 12.34.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fampahoriana sy faharatsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: no zavatra tiany hambara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamitsaka hanotrika eny akaikin-tanàna izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mamono an-katakonana ny tsy manan-tsiny;
- type: usfm
  marker: s1
  children:
  - type: text
    text: HAINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny masony mitily ireo fadiranovana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manotrika an-katakonana tokoa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: toy ny fanaon’ny liona ao am-pierena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: manotrika hisambotra ny malahelo izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mitarika azy ho ao anaty haratony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Torotoro ny malahelo fa resy mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mianjera ho eo ambany fahefàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ny olon-dratsy anakampony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy raharahain’Andriamanitra izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady ikimpiany fa tsy mba jereny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hitany na oviana na oviana!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: KÔFA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: TOMPO Andriamanitro ô, mirotsaha an-tsehatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahinjiro ny tananao hanafay ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aza hadinoina re ireo malahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nahoana moa ny olon-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: no haneso Anao Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka hiteny anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tsy hanadina ahy Izy!»?
- type: usfm
  marker: s1
  children:
  - type: text
    text: RESA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hitanao fa mijaly sy ory ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mivonon-kanampy azy hatrany Ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ianao no itokian’ny malemy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady mamonjy ny kamboty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa poteho ny herin’ny olon-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: adino aminy ny ratsy nataony
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary aoka izy tsy ho hita soritra intsony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny TOMPO no mpanjaka mandrakizay mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho fongotra amin’ny taniny ny mpanompo sampy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TAO
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: TOMPO ô, renao ny fanirian’ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ampaherezinao tokoa ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vonon-kihaino hatrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny kamboty sy ny ampahorîna Ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: mba hanomezanao azy ny rariny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho foana tanteraka hatreo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpanjakazaka etỳ an-tany.
