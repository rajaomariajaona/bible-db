document_id: 2KI.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nohosorana ho mpanjaka i Jehò
  - type: text
    content: 'Indray andro i Elisà '
  - type: text
    content: mpaminany
  - type: text
    content: ' dia niantso tovolahy iray anisan’ny andia-mpaminany ka nanao taminy hoe:'
  - type: text
    content: '–Mivonòna ianao handeha, ka ento ity tavoara feno menaka ity, ary mankanesa any Ramôta-Gilehada. '
  '10':
  - type: text
    content: Fa i Jezebela kosa tsy hisy handevina, satria hohanin’ny alika ao amin’ny sahan’i Jizrehela ny fatiny
  - type: note
    content: Jereo 1 Mp 21.23.
  - type: text
    content: .»
  - type: text
    content: Rehefa avy nilaza izany ilay tovolahy mpaminany, dia namoha ny varavarana ka lasa nandositra.
  '11':
  - type: text
    content: 'Ary nivoaka ny efitrano i Jehò, dia niverina nankeo amin’ny manamboninahitra hafa ka nanontanian’ireo hoe:'
  - type: text
    content: –Tsara ihany ve ianao? Fa inona no notadiavin’ilay adala iny taminao?
  - type: text
    content: 'Hoy kosa ny navalin’i Jehò azy:'
  - type: text
    content: –Fantatrareo ihany iny lehilahy iny sy ny redirediny.
  '12':
  - type: text
    content: 'Fa hoy indray ireo:'
  - type: text
    content: –Mandainga ianao. Ambarao aminay izay tena marina.
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: '–Ireto avy no teny nataony tamiko: «Izao no lazain’ny TOMPO: Manosotra anao ho mpanjakan’i Israely Aho!»'
  '13':
  - type: text
    content: Dia samy nanala faingana ny akanjobeny avy ny manamboninahitra rehetra ka namelatra azy
  - type: note
    content: 'namelatra ny akanjobeny... i Jehò: fomba ilazana fanekena olona iray izany sady anomezam-boninahitra azy. Ampit Mt 21.8 sy ny tantara mirazotra aminy.'
  - type: text
    content: ' teo amin’ny faratampon’ny tohatra anankiray mba hipetrahan’i Jehò. Ary notsofin’ny mpiangaly azy ny anjomara fa ny besinimaro teo kosa niantsoantso hoe: «I Jehò no mpanjaka.»'
  - type: heading
    content: Mioko hanohitra an’i Jôrama i Jehò
  '14':
  - type: text
    content: 'Tamin’izany fotoana izany, ny tafik’i '
  - type: text
    content: Israely
  - type: text
    content: ' manontolo dia niaro ny tanànan’i Ramôta-Gilehada tamin’ny fanafihan’i Hazaela mpanjakan’i Siria. Kanjo raha niady tamin’i Hazaela i Jôrama mpanjaka, dia naratran’ny Sirianina. Koa dia nankao Jizrehela izy hotsaboina tamin’ny ratra nahavoa azy.'
  - type: text
    content: 'Ary nioko tamin’i Jôrama i Jehò zanakalahin’i Jôsafata sady zafikelin’i Nimsỳ ka niteny tamin’ireo manamboninahitra hafa hoe:'
  - type: text
    content: –Raha vonona hanohana ahy ianareo, dia aza avela hisy olona hiala ny tanàna ka handeha hilaza izao zava-nitranga teto izao any Jizrehela.
  '16':
  - type: text
    content: 'Dia nitaingina ny kalesiny i Jehò ka nankany Jizrehela izay nisy an’i Jôrama notsaboina sy i Ahazià mpanjakan’i Joda tonga namangy azy. '
  '17':
  - type: text
    content: 'Nahatazana olona betsaka tamy niaraka tamin’i Jehò ilay mpitily izay teo an-tampon’ny tilikambon’i Jizrehela, ka nilaza tamin’ny mpanjaka hoe:'
  - type: text
    content: –Mahatazana olona betsaka aho.
  - type: text
    content: 'Dia hoy i Jôrama:'
  - type: text
    content: '–Mandefasa mpitaingin-tsoavaly hitsena azy ireo ka hanontany azy hoe: «Fihavanana ve no ahatongavanareo?»'
  '18':
  - type: text
    content: 'Dia lasa ny mpitaingin-tsoavaly iray nitsena ireo olona ireo ka niteny hoe:'
  - type: text
    content: '–Izao no lazain’ny mpanjaka: «Fihavanana ve no ahatongavanareo?»'
  - type: text
    content: 'Ary hoy ny navalin’i Jehò:'
  - type: text
    content: –Ahoanao inona izay fihavanana? Fa mankanesa ato aoriako ianao.
  - type: text
    content: 'Tamin’izay kosa ilay mpitily no nilaza hoe:'
  - type: text
    content: –Tonga teo amin-dry zareo ny iraka, nefa tsy niverina.
  '19':
  - type: text
    content: 'Nandefa mpitaingin-tsoavaly faharoa indray i Jôrama, ka nony tonga teny amin-dry zareo io, dia nanao hoe:'
  - type: text
    content: '–Izao no tenin’ny mpanjaka: «Fihavanana ve no ahatongavanareo?»'
  - type: text
    content: 'Ary hoy ny navalin’i Jehò:'
  - type: text
    content: –Ahoanao inona izay fihavanana? Fa mankanesa ato aoriako ianao!
  '2':
  - type: text
    content: 'Rehefa mby any ianao, dia ataovy izay hahitana an’i Jehò zanakalahin’i Jôsafata sady zafikelin’i Nimsỳ. Antsoy hiala amin’ny namany izy, dia ento any amin’ny efitrano anatiny indrindra. '
  '20':
  - type: text
    content: 'Tamin’izay kosa ilay mpitily no nilaza indray hoe:'
  - type: text
    content: '–Tonga teo amin-dry zareo koa ny iraka faharoa, nefa tsy niverina. Saingy fantatro izao i Jehò zafikelin’i Nimsỳ, araka ny fampiriotran-kalesiny: mampiriotra kalesy hoatra ny olona adala manko izy.'
  '21':
  - type: text
    content: Nasain’i Jôrama novononina ny kalesin-tsoavaliny; dia natao izany. Dia samy niainga nitaingina ny kalesiny avy i Jôrama mpanjakan’i Israely sy i Ahazià mpanjakan’i Joda, ka lasa nitsena an’i Jehò, ary tojo azy teo amin’ny sahan’i Nabôta avy any Jizrehela
  - type: note
    content: Jereo 1 Mp 21.
  - type: text
    content: .
  - type: heading
    content: Ny nahafatesan’i Jôrama mpanjakan’i Israely
  '22':
  - type: text
    content: 'Raha vao nahita an’i Jehò i Jôrama, dia nanontany azy hoe:'
  - type: text
    content: –Fihavanana ve no ahatongavanao, ry Jehò?
  - type: text
    content: 'Fa hoy ny navaliny:'
  - type: text
    content: –Tsy hisy fihavanana, raha mbola manompo ireo andriamani-tsiizy sy manao majika i Jezebela reninao.
  '23':
  - type: text
    content: 'Dia nihodina i Jôrama ka nandositra sady niteny tamin’i Ahazià hoe:'
  - type: text
    content: –Famadihana io, ry Ahazià!
  '24':
  - type: text
    content: 'Noraisin’i Jehò ny tsipîkany, dia nitifitra izy ka nahavoa an’i Jôrama teo anelanelan’ny sorony; ary tafavoaka ny zana-tsipîka rehefa niboroaka tamin’ny fony. Dia maty nikorosy tao anaty kalesiny i Jôrama. '
  '25':
  - type: text
    content: 'Ary hoy i Jehò tamin’i Bidkara dekàny:'
  - type: text
    content: –Raiso ny fatiny ka atsipazo ao amin’ny sahan’i Nabôta avy any Jizrehela. Tsarovy fa, fony isika roa lahy niara-nitondra kalesy nanaraka an’i Ahaba rain’i Jôrama
  - type: note
    content: Jereo 1 Mp 21.20-29.
  - type: text
    content: ', dia izao no nambaran’ny TOMPO tamin’i Ahaba: '
  '26':
  - type: text
    content: «Hitako tokoa ny namonoanao ho faty an’i Nabôta sy ireo zanany omaly; koa Izaho TOMPO no manao teny hentitra fa hamaly anao eto amin’ity saha ity
  - type: note
    content: Ampit 1 Mp 21.19.
  - type: text
    content: .» Noho izany, ry Bidkara, dia raiso ny fatiny ka atsipazo ao amin’io saha io araka ny tenin’ny TOMPO.
  - type: heading
    content: Ny nahafatesan’i Ahazià mpanjakan’i Joda
  - type: heading
    content: (Jereo 2 Tan 22.7-9)
  '27':
  - type: text
    content: 'Raha nahita izany i Ahazià mpanjakan’i Joda, dia nandositra tamin’ny lalan’i Bety-Gany; kanefa nanenjika azy i Jehò sady nibaiko namana hoe: «Asio ihany koa iny». Dia nasian’ireo izy iny nitondra ny kalesiny teo am-piakaran’i Gora akaikin’i Jiblehama iny. Ary afa-nandositra nankany Megidao'
  - type: note
    content: Bety-Gany sy Jiblehama dia toerana roa mifanakaiky sahabo ho 12 km atsimon’i Jizrehela. Ny lalana faleha avy eo Jizrehela mankany Megidao dia mandalo an’i Bety-Gany.
  - type: text
    content: ' i Ahazià ka maty tao. '
  '28':
  - type: text
    content: Dia nentin’ny mpanompony tamin’ny kalesiny ho any Jerosalema izy ka nalevina tao amin’ny fasam-pianakaviany tao an-
  - type: text
    content: Tanànan’i Davida
  - type: text
    content: .
  '29':
  - type: text
    content: Tamin’ny faha-11 taona nanjakan’i Jôrama zanakalahin’i Ahaba no tonga mpanjakan’i Joda i Ahazià
  - type: note
    content: Ity and ity dia mamerina ny filazana efa nomena tamin’ny toerana sahaza azy ao amin’ny 8.25.
  - type: text
    content: .
  - type: heading
    content: Ny nahafatesan’i Jezebela
  '3':
  - type: text
    content: 'Ary horaisinao ny tavoara ka hararakao eo ambony lohany ny menaka sady hombanao teny hoe: «Izao no lazain’ny TOMPO: Manosotra anao ho mpanjakan’i '
  - type: text
    content: Israely
  - type: text
    content: ' aho!» Dia hovohanao avy eo ny varavarana mba handosiranao avy hatrany.'
  '30':
  - type: text
    content: 'Dia tonga tany Jizrehela i Jehò. Ary raha nandre izany i Jezebela dia nanao manjamaso sady nandravaka ny lohany ka nankeo am-baravarankely. '
  '31':
  - type: text
    content: 'Koa raha niditra ny vavahady i Jehò, dia hoy i Jezebela:'
  - type: text
    content: –Fihavanana ve no ahatongavanao, ry karazan’i Zimrỳ mpamono ny tompony
  - type: note
    content: Ampit 1 Mp 16.9-19.
  - type: text
    content: '?'
  '32':
  - type: text
    content: 'Ary niandrandra ny varavarankely i Jehò sady nanontany hoe:'
  - type: text
    content: –Iza no momba ahy? Iza?
  - type: text
    content: Ary nisy tandapa roa na telo nitsirika azy.
  '33':
  - type: text
    content: 'Ka hoy izy taminy:'
  - type: text
    content: –Azerao avy eny io vehivavy io!
  - type: text
    content: Dia natosiny avy eny am-baravarankely i Jezebela ka nianjera, ary nifantsitsitra tamin’ny rindrina sy ny soavaly ny rany; ka dia nohitsahin’i Jehò tamin’ny kalesiny izy.
  '34':
  - type: text
    content: 'Ary niditra tao an-dapa i Jehò ka nihinana sy nisotro; avy eo izy nilaza tamin’ny namany hoe:'
  - type: text
    content: –Ndeha karakarao ny fandevenana an’io vehivavy voaozona io, fa mba zanaka mpanjaka ihany izy.
  '35':
  - type: text
    content: 'Dia lasa ireo mba handevina azy; kanjo tsy nisy afa-tsy ny karandohany sy ny tongotra aman-tanany sisa no hitany teo. '
  '36':
  - type: text
    content: 'Ary niverina ireo ka nanambara izany tamin’i Jehò, izay loa-bolana hoe:'
  - type: text
    content: '–Izao mihitsy no nampilazain’ny TOMPO an’i Elià avy any Tisbe sady mpanompony hoe: «Ao amin’ny sahan’i Jizrehela no hihinanan’ny alika ny nofon’i Jezebela'
  - type: note
    content: Jereo 1 Mp 21.23.
  - type: text
    content: '. '
  '37':
  - type: text
    content: Ary ny fatiny kosa haely amin’ity saha ity toy ny zezika aparitaka amin’ny tany, ka tsy hisy afaka hilaza hoe i Jezebela iny.»
  '4':
  - type: text
    content: 'Koa dia nankany Ramôta-Gilehada ilay tovolahy mpaminany. '
  '5':
  - type: text
    content: 'Nony tonga tany izy, dia ireo filohan-tafik’i Israely niara-nivory no hitany ary nitenenany hoe:'
  - type: text
    content: –Manan-javatra hambara aminao aho, ry filoha!
  - type: text
    content: 'Ka hoy i Jehò:'
  - type: text
    content: –Iza aminay ireto moa izany?
  - type: text
    content: 'Dia hoy ny navalin’ilay tovolahy:'
  - type: text
    content: –Aminao ihany, ry filoha ô!
  '6':
  - type: text
    content: 'Dia nitsangana i Jehò ka niditra tao amin’ny efitrano; ary nandraraka ny menaka teo an-dohany ny mpaminany sady nanao hoe:'
  - type: text
    content: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Manosotra anao ho mpanjakan’i Israely vahoakako Aho'
  - type: note
    content: Ampit 1 Mp 19.16.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ianao no handringana ny taranak’i Ahaba tomponao fahiny, mba hamaliako ny ran’ireo mpanompoko rehetra izay nalatsak’i Jezebela, na mpaminany izy na olon-kafa. '
  '8':
  - type: text
    content: 'Eny, ho fongotra avokoa ny fianakavian’i Ahaba; ary haringako ny lehilahy rehetra eo aminy na kely na lehibe, '
  '9':
  - type: text
    content: ka ny taranany hataoko tahaka ny nanaovako ny taranak’i Jerôbohama zanakalahin’i Nebata sy ny taranak’i Bahasà zanakalahin’i Ahià
  - type: note
    content: Jereo 1 Mp 15.29; 16.11-12.
  - type: text
    content: '. '
