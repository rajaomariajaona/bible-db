document_id: 2KI.9,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nohosorana ho mpanjaka i Jehò
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indray andro i Elisà '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' dia niantso tovolahy iray anisan’ny andia-mpaminany ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mivonòna ianao handeha, ka ento ity tavoara feno menaka ity, ary mankanesa any Ramôta-Gilehada. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa i Jezebela kosa tsy hisy handevina, satria hohanin’ny alika ao amin’ny sahan’i Jizrehela ny fatiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 21.23.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa avy nilaza izany ilay tovolahy mpaminany, dia namoha ny varavarana ka lasa nandositra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nivoaka ny efitrano i Jehò, dia niverina nankeo amin’ny manamboninahitra hafa ka nanontanian’ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsara ihany ve ianao? Fa inona no notadiavin’ilay adala iny taminao?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa ny navalin’i Jehò azy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fantatrareo ihany iny lehilahy iny sy ny redirediny.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa hoy indray ireo:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mandainga ianao. Ambarao aminay izay tena marina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ireto avy no teny nataony tamiko: «Izao no lazain’ny TOMPO: Manosotra anao ho mpanjakan’i Israely Aho!»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia samy nanala faingana ny akanjobeny avy ny manamboninahitra rehetra ka namelatra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'namelatra ny akanjobeny... i Jehò:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fomba ilazana fanekena olona iray izany sady anomezam-boninahitra azy. Ampit Mt 21.8 sy ny tantara mirazotra aminy.
      marker-yv: yv-n
    - type: text
      text: ' teo amin’ny faratampon’ny tohatra anankiray mba hipetrahan’i Jehò. Ary notsofin’ny mpiangaly azy ny anjomara fa ny besinimaro teo kosa niantsoantso hoe: «I Jehò no mpanjaka.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mioko hanohitra an’i Jôrama i Jehò
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'Tamin’izany fotoana izany, ny tafik’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' manontolo dia niaro ny tanànan’i Ramôta-Gilehada tamin’ny fanafihan’i Hazaela mpanjakan’i Siria. Kanjo raha niady tamin’i Hazaela i Jôrama mpanjaka, dia naratran’ny Sirianina. Koa dia nankao Jizrehela izy hotsaboina tamin’ny ratra nahavoa azy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nioko tamin’i Jôrama i Jehò zanakalahin’i Jôsafata sady zafikelin’i Nimsỳ ka niteny tamin’ireo manamboninahitra hafa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha vonona hanohana ahy ianareo, dia aza avela hisy olona hiala ny tanàna ka handeha hilaza izao zava-nitranga teto izao any Jizrehela.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nitaingina ny kalesiny i Jehò ka nankany Jizrehela izay nisy an’i Jôrama notsaboina sy i Ahazià mpanjakan’i Joda tonga namangy azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nahatazana olona betsaka tamy niaraka tamin’i Jehò ilay mpitily izay teo an-tampon’ny tilikambon’i Jizrehela, ka nilaza tamin’ny mpanjaka hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mahatazana olona betsaka aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jôrama:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mandefasa mpitaingin-tsoavaly hitsena azy ireo ka hanontany azy hoe: «Fihavanana ve no ahatongavanareo?»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia lasa ny mpitaingin-tsoavaly iray nitsena ireo olona ireo ka niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny mpanjaka: «Fihavanana ve no ahatongavanareo?»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny navalin’i Jehò:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoanao inona izay fihavanana? Fa mankanesa ato aoriako ianao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay kosa ilay mpitily no nilaza hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tonga teo amin-dry zareo ny iraka, nefa tsy niverina.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nandefa mpitaingin-tsoavaly faharoa indray i Jôrama, ka nony tonga teny amin-dry zareo io, dia nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no tenin’ny mpanjaka: «Fihavanana ve no ahatongavanareo?»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny navalin’i Jehò:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ahoanao inona izay fihavanana? Fa mankanesa ato aoriako ianao!
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rehefa mby any ianao, dia ataovy izay hahitana an’i Jehò zanakalahin’i Jôsafata sady zafikelin’i Nimsỳ. Antsoy hiala amin’ny namany izy, dia ento any amin’ny efitrano anatiny indrindra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tamin’izay kosa ilay mpitily no nilaza indray hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tonga teo amin-dry zareo koa ny iraka faharoa, nefa tsy niverina. Saingy fantatro izao i Jehò zafikelin’i Nimsỳ, araka ny fampiriotran-kalesiny: mampiriotra kalesy hoatra ny olona adala manko izy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nasain’i Jôrama novononina ny kalesin-tsoavaliny; dia natao izany. Dia samy niainga nitaingina ny kalesiny avy i Jôrama mpanjakan’i Israely sy i Ahazià mpanjakan’i Joda, ka lasa nitsena an’i Jehò, ary tojo azy teo amin’ny sahan’i Nabôta avy any Jizrehela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 21.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jôrama mpanjakan’i Israely
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha vao nahita an’i Jehò i Jôrama, dia nanontany azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fihavanana ve no ahatongavanao, ry Jehò?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny navaliny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy hisy fihavanana, raha mbola manompo ireo andriamani-tsiizy sy manao majika i Jezebela reninao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nihodina i Jôrama ka nandositra sady niteny tamin’i Ahazià hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Famadihana io, ry Ahazià!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Noraisin’i Jehò ny tsipîkany, dia nitifitra izy ka nahavoa an’i Jôrama teo anelanelan’ny sorony; ary tafavoaka ny zana-tsipîka rehefa niboroaka tamin’ny fony. Dia maty nikorosy tao anaty kalesiny i Jôrama. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary hoy i Jehò tamin’i Bidkara dekàny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raiso ny fatiny ka atsipazo ao amin’ny sahan’i Nabôta avy any Jizrehela. Tsarovy fa, fony isika roa lahy niara-nitondra kalesy nanaraka an’i Ahaba rain’i Jôrama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 21.20-29.
      marker-yv: yv-n
    - type: text
      text: ', dia izao no nambaran’ny TOMPO tamin’i Ahaba: '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: «Hitako tokoa ny namonoanao ho faty an’i Nabôta sy ireo zanany omaly; koa Izaho TOMPO no manao teny hentitra fa hamaly anao eto amin’ity saha ity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1 Mp 21.19.
      marker-yv: yv-n
    - type: text
      text: .» Noho izany, ry Bidkara, dia raiso ny fatiny ka atsipazo ao amin’io saha io araka ny tenin’ny TOMPO.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Ahazià mpanjakan’i Joda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Tan 22.7-9)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raha nahita izany i Ahazià mpanjakan’i Joda, dia nandositra tamin’ny lalan’i Bety-Gany; kanefa nanenjika azy i Jehò sady nibaiko namana hoe: «Asio ihany koa iny». Dia nasian’ireo izy iny nitondra ny kalesiny teo am-piakaran’i Gora akaikin’i Jiblehama iny. Ary afa-nandositra nankany Megidao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bety-Gany '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jiblehama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia toerana roa mifanakaiky sahabo ho 12 km atsimon’i Jizrehela. Ny lalana faleha avy eo Jizrehela mankany Megidao dia mandalo an’i Bety-Gany.'
      marker-yv: yv-n
    - type: text
      text: ' i Ahazià ka maty tao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia nentin’ny mpanompony tamin’ny kalesiny ho any Jerosalema izy ka nalevina tao amin’ny fasam-pianakaviany tao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tanànan’i Davida
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tamin’ny faha-11 taona nanjakan’i Jôrama zanakalahin’i Ahaba no tonga mpanjakan’i Joda i Ahazià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ity and ity dia mamerina ny filazana efa nomena tamin’ny toerana sahaza azy ao amin’ny 8.25.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jezebela
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary horaisinao ny tavoara ka hararakao eo ambony lohany ny menaka sady hombanao teny hoe: «Izao no lazain’ny TOMPO: Manosotra anao ho mpanjakan’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israely
    - type: text
      text: ' aho!» Dia hovohanao avy eo ny varavarana mba handosiranao avy hatrany.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia tonga tany Jizrehela i Jehò. Ary raha nandre izany i Jezebela dia nanao manjamaso sady nandravaka ny lohany ka nankeo am-baravarankely. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Koa raha niditra ny vavahady i Jehò, dia hoy i Jezebela:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Fihavanana ve no ahatongavanao, ry karazan’i Zimrỳ mpamono ny tompony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1 Mp 16.9-19.
      marker-yv: yv-n
    - type: text
      text: '?'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary niandrandra ny varavarankely i Jehò sady nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza no momba ahy? Iza?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy tandapa roa na telo nitsirika azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ka hoy izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azerao avy eny io vehivavy io!
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natosiny avy eny am-baravarankely i Jezebela ka nianjera, ary nifantsitsitra tamin’ny rindrina sy ny soavaly ny rany; ka dia nohitsahin’i Jehò tamin’ny kalesiny izy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary niditra tao an-dapa i Jehò ka nihinana sy nisotro; avy eo izy nilaza tamin’ny namany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha karakarao ny fandevenana an’io vehivavy voaozona io, fa mba zanaka mpanjaka ihany izy.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia lasa ireo mba handevina azy; kanjo tsy nisy afa-tsy ny karandohany sy ny tongotra aman-tanany sisa no hitany teo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary niverina ireo ka nanambara izany tamin’i Jehò, izay loa-bolana hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao mihitsy no nampilazain’ny TOMPO an’i Elià avy any Tisbe sady mpanompony hoe: «Ao amin’ny sahan’i Jizrehela no hihinanan’ny alika ny nofon’i Jezebela'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 21.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ary ny fatiny kosa haely amin’ity saha ity toy ny zezika aparitaka amin’ny tany, ka tsy hisy afaka hilaza hoe i Jezebela iny.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa dia nankany Ramôta-Gilehada ilay tovolahy mpaminany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony tonga tany izy, dia ireo filohan-tafik’i Israely niara-nivory no hitany ary nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Manan-javatra hambara aminao aho, ry filoha!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy i Jehò:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Iza aminay ireto moa izany?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny navalin’ilay tovolahy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aminao ihany, ry filoha ô!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nitsangana i Jehò ka niditra tao amin’ny efitrano; ary nandraraka ny menaka teo an-dohany ny mpaminany sady nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no lazain’ny TOMPO Andriamanitr’i Israely: «Manosotra anao ho mpanjakan’i Israely vahoakako Aho'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 1 Mp 19.16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ianao no handringana ny taranak’i Ahaba tomponao fahiny, mba hamaliako ny ran’ireo mpanompoko rehetra izay nalatsak’i Jezebela, na mpaminany izy na olon-kafa. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Eny, ho fongotra avokoa ny fianakavian’i Ahaba; ary haringako ny lehilahy rehetra eo aminy na kely na lehibe, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ka ny taranany hataoko tahaka ny nanaovako ny taranak’i Jerôbohama zanakalahin’i Nebata sy ny taranak’i Bahasà zanakalahin’i Ahià
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 15.29; 16.11-12.
