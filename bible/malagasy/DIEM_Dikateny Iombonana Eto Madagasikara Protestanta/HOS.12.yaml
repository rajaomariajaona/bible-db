  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo ny TOMPO Andriamanitr’izao rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO araka ny anarana ahatsiarovana Azy,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no niteny tamin’i Jakôba hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Miverena amiko Andriamanitrao ianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandrovy ny fitiavana sy ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho Andriamanitrao no itokio hatrany.»
