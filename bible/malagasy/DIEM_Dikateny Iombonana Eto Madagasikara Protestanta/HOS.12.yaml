    children:
    - type: text
      text: Vahoaka nandiso fanantenana hatrany am-piandohana
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hodidinin’ny olon’i Efraîma lainga Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamely fitaka manodidina Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny firenen’i Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Joda kosa mbola miaraka amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mbola matoky an’Ilay Masina Indrindra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no TOMPO Andriamanitrao,
  - type: usfm
    marker: q1
    children:
