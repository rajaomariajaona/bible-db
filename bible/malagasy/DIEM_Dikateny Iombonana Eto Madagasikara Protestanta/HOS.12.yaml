    - type: text
      text: ' azy.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampalahelo mafy an’Andriamanitra i Efraîma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia hailiky ny Tompony hianjady aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny vokatry ny ra nalatsany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsingeriny hanody azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny fanevatevana nataony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamatsy diloilo an’i Ejipta i Efraîma;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka rivotra no ivokisany amin’izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao fifanekena amin’i Asiria izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia manenji-drivotra avy atsinanana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tontolo andro no ampitomboiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lainga sy ny herisetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana ady amin’i Joda ny TOMPO.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanafay ny firenen’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho ny fitondrantenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hamaly azy araka ny ratsy nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony i Jakôba mbola tany an-kibon-dreniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no efa nisongona ny rahalahiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary rehefa lehilahy lehibe izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nitolona tamin’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
