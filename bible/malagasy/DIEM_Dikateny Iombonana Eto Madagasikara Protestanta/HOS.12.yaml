document_id: HOS.12,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vahoaka nandiso fanantenana hatrany am-piandohana
  - type: text
    content: Hodidinin’ny olon’i Efraîma lainga Aho
  - type: text
    content: ary mamely fitaka manodidina Ahy
  - type: text
    content: ny firenen’i Israely.
  - type: text
    content: I Joda kosa mbola miaraka amin’Andriamanitra
  - type: text
    content: sady mbola matoky an’Ilay Masina Indrindra.
  '10':
  - type: text
    content: Fa Izaho no TOMPO Andriamanitrao,
  - type: text
    content: hatry ny fony ianao tany Ejipta;
  - type: text
    content: ary hampitoetra anao an-day indray Aho,
  - type: text
    content: tahaka ny tamin’ny andro
  - type: text
    content: izay nihaonako taminao
  - type: note
    content: 'tahaka... nihaonako taminao: jereo Hos 2.16-17. Misy manao dkt hoe: tahaka amin’ny andro fety (fetin’ny Tranotomboka); Lev 23.42-43.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Niteny tamin’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' Aho fahizay'
  - type: text
    content: ka nampitombo ny fahitana;
  - type: text
    content: ary tamin’ny alalan’ny mpaminany koa
  - type: text
    content: no nanaovako fanoharana.
  '12':
  - type: text
    content: Raha olona mpanao ratsy tokoa
  - type: text
    content: ny mponin’i Gilehada
  - type: text
    content: ka lasa tsinontsinona,
  - type: text
    content: tao Gilgala
  - type: note
    content: 'Gilehada: jereo 6.8 sy nta. –Gilgala: jereo 4.15 sy nta.'
  - type: text
    content: ' kosa omby mifanesy'
  - type: text
    content: 'no natolotra hatao '
  - type: text
    content: sorona
  - type: text
    content: ','
  - type: text
    content: 'ka ny '
  - type: text
    content: alitarany
  - type: text
    content: ' dia tonga korontam-bato'
  - type: text
    content: eny am-bavasahan’ny tanimboly.
  '13':
  - type: text
    content: Tany Mezôpôtamia ambony
  - type: text
    content: no nandosiran’i Jakôba;
  - type: text
    content: fa mba hahazoany vady
  - type: note
    content: 'Ny fandosiran’i Jakôba: jereo Gen 28.2-5. –hahazoany vady: jereo Gen 29.15-30.'
  - type: text
    content: ','
  - type: text
    content: dia nanompo olona i Israely.
  - type: text
    content: Eny, lasa mpiandry ondry izy
  - type: text
    content: mba hahazoam-bady.
  '14':
  - type: text
    content: Fa mpaminany kosa no nentin’ny TOMPO
  - type: text
    content: nampiakatra an’i Israely niala tany Ejipta,
  - type: text
    content: 'ary mpaminany no nataony '
  - type: text
    content: mpiandry
  - type: text
    content: ' azy.'
  '15':
  - type: text
    content: Nampalahelo mafy an’Andriamanitra i Efraîma
  - type: text
    content: ka dia hailiky ny Tompony hianjady aminy
  - type: text
    content: ny vokatry ny ra nalatsany,
  - type: text
    content: ary hatsingeriny hanody azy
  - type: text
    content: ny fanevatevana nataony.
  '2':
  - type: text
    content: Mamatsy diloilo an’i Ejipta i Efraîma;
  - type: text
    content: ka rivotra no ivokisany amin’izany.
  - type: text
    content: Manao fifanekena amin’i Asiria izy
  - type: text
    content: dia manenji-drivotra avy atsinanana.
  - type: text
    content: Tontolo andro no ampitomboiny
  - type: text
    content: ny lainga sy ny herisetra.
  '3':
  - type: text
    content: Manana ady amin’i Joda ny TOMPO.
  - type: text
    content: ka hanafay ny firenen’i Jakôba
  - type: text
    content: noho ny fitondrantenany
  - type: text
    content: ary hamaly azy araka ny ratsy nataony.
  '4':
  - type: text
    content: Fony i Jakôba mbola tany an-kibon-dreniny
  - type: text
    content: no efa nisongona ny rahalahiny;
  - type: text
    content: ary rehefa lehilahy lehibe izy,
  - type: text
    content: dia nitolona tamin’Andriamanitra
  - type: note
    content: 'Mampahatsiaro ireo trangan-javatra voalazan’ny Gen 27 (jereo manokana ny and 26,36 sy nta). –Nitolona tamin’Andriamanitra izy: jereo Gen 32.23-33.'
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: text
    content: Anjely
  - type: text
    content: ' no nitolomany ka nandresy azy.'
  - type: text
    content: Nitomany i Jakôba sady nifona taminy.
  - type: text
    content: Tao Betela no nahitany an’Andriamanitra
  - type: text
    content: ka nitenenan’Andriamanitra taminy
  - type: note
    content: 'nandresy azy: jereo naoty teo aloha. Misy mpandika sasany manao hoe: noreseny. –Tao Betela: jereo Gen 28.10-22. –taminy: araka ny dkt grika sy siriaka tranainy; ny hebreo dia manao hoe: tamintsika.'
  - type: text
    content: .
  '6':
  - type: text
    content: Teo ny TOMPO Andriamanitr’izao rehetra izao,
  - type: text
    content: ny TOMPO araka ny anarana ahatsiarovana Azy,
  '7':
  - type: text
    content: 'no niteny tamin’i Jakôba hoe:'
  - type: text
    content: «Miverena amiko Andriamanitrao ianao!
  - type: text
    content: Tandrovy ny fitiavana sy ny rariny;
  - type: text
    content: ary Izaho Andriamanitrao no itokio hatrany.»
  '8':
  - type: text
    content: Mizana mandainga
  - type: text
    content: tahaka ny an’ny Kanahanita
  - type: note
    content: ny Kanahanita na ny mpivarotra.
  - type: text
    content: no hazoninao, ry Efraîma;
  - type: text
    content: ka tia manambaka ianao
  '9':
  - type: text
    content: 'sady miteny hoe: «Efa nangoron-karena aho'
  - type: text
    content: ka nahazo fananana be.
  - type: text
    content: Ary tsy misy hahitana heloka mandiso ahy
  - type: text
    content: amin’izay asa rehetra nisasarako.»
