document_id: GEN.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan’i Jismahela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary i Saray, vadin’i Abrama, dia tsy niteraka fa momba; nefa nanana mpanompovavy ejiptianina atao hoe Hagara izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niteny tamin’i Abrama hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro efa tsy nanome zanaka ahy ny TOMPO. Koa mba mandehana re any amin’ny mpanompovaviko; angamba hanan-janaka avy aminy aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 30.1-13. Ity fomba ity dia hita koa ao amin’ny lalàna tany Mezôpôtamia.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia neken’i Abrama ny soso-kevitr’i Saray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nalain’i Saray vadin’i Abrama i Hagara izay Ejiptianina mpanompovaviny ka nomeny an’i Abrama mba hovadîny; ary efa folo taona no nipetrahan’i Abrama tao amin’ny tany Kanahàna tamin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niray tamin’i Hagara i Abrama ka nitoe-jaza ravehivavy. Rehefa nahita ny tenany bevohòka i Hagara, dia nanao tsinontsinona ny tompovaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy i Saray tamin’i Abrama:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manodiava anao ny fahoriako! Nomeko ho andefimandrinao ny mpanompovaviko; ka nony nahita ny tenany bevohòka izy, dia nanao tsinontsinona ahy. Koa aoka ny TOMPO no hitsara ahy sy ianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa namaly i Abrama nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro ny mpanompovavinao, eo ambany fahefànao izy ka ataovy izay tianao hatao aminy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nampahorîn’i Saray i Hagara ka nitsoaka nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hitan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjelin
  - type: text
    text: '’ny TOMPO teo akaikin’ny loharano iray tao an-taniefitra izy, dia teo amin’ny lalana mankany Sora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nanontaniany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Hagara, mpanompovavin’i Saray, avy taiza ianao, ary hankaiza?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namaly izy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nandositra tsy ho eo anatrehan’i Saray tompovaviko aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy ilay anjelin’ny TOMPO taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Miverena any amin’ny tompovavinao, ka maneke ny fahefàny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Homen’ny TOMPO taranaka marobe tsy tambo isaina ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro efa bevohòka ianao, ka hiteraka zazalahy; ary ny anarany hataonao hoe Jismahela, satria nohenoin’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny anarana hebreo hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jismahela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mampahatsiaro ny voambolana izay nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nohenoin’Andriamanitra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto.'
    marker-yv: yv-n
  - type: text
    text: ' ny fitarainanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho toy ny boriky tsy folaka ny zanakao, ary hiady amin’ny olona rehetra sy hiadian’ny olona rehetra izy, nefa dia hitoetra misintaka amin’ny rahalahiny rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy i Hagara anakampo: «Moa nahita marina Ilay mahita ahy ve aho!» Ary dia nomeny ny TOMPO Izay niteny taminy izao anarana izao: «Ianao no ilay Andriamanitra mahita ahy.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no niantsoana ilay fantsakana teo anelanelan’i Kadesy sy i Bareda hoe fantsakan’i Lahay-Rôy na fantsakan’Ilay Velona mahita ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia niteraka zazalahy i Hagara ka nataon’i Abrama hoe Jismahela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gal 4.22.
    marker-yv: yv-n
  - type: text
    text: 'ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa enina amby valopolo taona i Abrama, raha niteraka io zazalahy io ho azy i Hagara.
