document_id: GEN.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’i Jismahela
  - type: text
    content: 'Ary i Saray, vadin’i Abrama, dia tsy niteraka fa momba; nefa nanana mpanompovavy ejiptianina atao hoe Hagara izy '
  '10':
  - type: text
    content: 'Homen’ny TOMPO taranaka marobe tsy tambo isaina ianao. '
  '11':
  - type: text
    content: Indro efa bevohòka ianao, ka hiteraka zazalahy; ary ny anarany hataonao hoe Jismahela, satria nohenoin’ny TOMPO
  - type: note
    content: Ny anarana hebreo hoe Jismahela dia mampahatsiaro ny voambolana izay nadika hoe nohenoin’Andriamanitra eto.
  - type: text
    content: ' ny fitarainanao. '
  '12':
  - type: text
    content: Ho toy ny boriky tsy folaka ny zanakao, ary hiady amin’ny olona rehetra sy hiadian’ny olona rehetra izy, nefa dia hitoetra misintaka amin’ny rahalahiny rehetra.
  '13':
  - type: text
    content: 'Dia hoy i Hagara anakampo: «Moa nahita marina Ilay mahita ahy ve aho!» Ary dia nomeny ny TOMPO Izay niteny taminy izao anarana izao: «Ianao no ilay Andriamanitra mahita ahy.» '
  '14':
  - type: text
    content: 'Izany no niantsoana ilay fantsakana teo anelanelan’i Kadesy sy i Bareda hoe fantsakan’i Lahay-Rôy na fantsakan’Ilay Velona mahita ahy. '
  '15':
  - type: text
    content: Dia niteraka zazalahy i Hagara ka nataon’i Abrama hoe Jismahela
  - type: note
    content: Jereo Gal 4.22.
  - type: text
    content: 'ny anarany. '
  '16':
  - type: text
    content: Efa enina amby valopolo taona i Abrama, raha niteraka io zazalahy io ho azy i Hagara.
  '2':
  - type: text
    content: 'ka niteny tamin’i Abrama hoe:'
  - type: text
    content: –Indro efa tsy nanome zanaka ahy ny TOMPO. Koa mba mandehana re any amin’ny mpanompovaviko; angamba hanan-janaka avy aminy aho
  - type: note
    content: Ampit Gen 30.1-13. Ity fomba ity dia hita koa ao amin’ny lalàna tany Mezôpôtamia.
  - type: text
    content: .
  - type: text
    content: 'Dia neken’i Abrama ny soso-kevitr’i Saray. '
  '3':
  - type: text
    content: 'Nalain’i Saray vadin’i Abrama i Hagara izay Ejiptianina mpanompovaviny ka nomeny an’i Abrama mba hovadîny; ary efa folo taona no nipetrahan’i Abrama tao amin’ny tany Kanahàna tamin’izay. '
  '4':
  - type: text
    content: 'Dia niray tamin’i Hagara i Abrama ka nitoe-jaza ravehivavy. Rehefa nahita ny tenany bevohòka i Hagara, dia nanao tsinontsinona ny tompovaviny. '
  '5':
  - type: text
    content: 'Ary hoy i Saray tamin’i Abrama:'
  - type: text
    content: –Manodiava anao ny fahoriako! Nomeko ho andefimandrinao ny mpanompovaviko; ka nony nahita ny tenany bevohòka izy, dia nanao tsinontsinona ahy. Koa aoka ny TOMPO no hitsara ahy sy ianao!
  '6':
  - type: text
    content: 'Fa namaly i Abrama nanao hoe:'
  - type: text
    content: –Indro ny mpanompovavinao, eo ambany fahefànao izy ka ataovy izay tianao hatao aminy.
  - type: text
    content: 'Dia nampahorîn’i Saray i Hagara ka nitsoaka nandositra. '
  '7':
  - type: text
    content: 'Hitan’ny '
  - type: text
    content: anjelin
  - type: text
    content: '’ny TOMPO teo akaikin’ny loharano iray tao an-taniefitra izy, dia teo amin’ny lalana mankany Sora, '
  '8':
  - type: text
    content: 'ka nanontaniany hoe:'
  - type: text
    content: –Ry Hagara, mpanompovavin’i Saray, avy taiza ianao, ary hankaiza?
  - type: text
    content: 'Dia namaly izy hoe:'
  - type: text
    content: –Nandositra tsy ho eo anatrehan’i Saray tompovaviko aho.
  '9':
  - type: text
    content: 'Fa hoy ilay anjelin’ny TOMPO taminy:'
  - type: text
    content: '–Miverena any amin’ny tompovavinao, ka maneke ny fahefàny. '
