      - type: text
        text: '2'
    - type: text
      text: «Raha tsy ny TOMPO no momba antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tamin’ny namelezan’ny olona antsika,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
