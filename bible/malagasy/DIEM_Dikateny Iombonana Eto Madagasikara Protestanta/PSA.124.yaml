    - type: text
      text: Hira fiakarana. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy ny TOMPO no nomba antsika...
- type: usfm
  marker: q1
  children:
  - type: text
    text: '–Aoka ny vahoaka Israely hilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Raha tsy ny TOMPO no momba antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: tamin’ny namelezan’ny olona antsika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ho nateliny velona tokoa isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria nirehitra loatra ny havinirany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: eny, ho toy ny rano nandifotra antsika ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho toy ny riaka nanafotra antsika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ho toy ny rano misamboaravoara
- type: usfm
  marker: q1
  children:
  - type: text
    text: nanafotra antsika.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
