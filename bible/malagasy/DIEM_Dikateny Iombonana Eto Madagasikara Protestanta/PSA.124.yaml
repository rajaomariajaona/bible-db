  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Toy ny fody afa-pandrika harato isika:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rovitra ny harato, ka afaka isika!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny famonjena antsika dia ny anaran’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany.
