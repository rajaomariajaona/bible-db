document_id: PSA.124,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Raha tsy ny Tompo no nomba antsika...
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana. Nataon’i Davida.
  - type: text
    content: Raha tsy ny TOMPO no nomba antsika...
  - type: text
    content: '–Aoka ny vahoaka Israely hilaza hoe:'
  '2':
  - type: text
    content: «Raha tsy ny TOMPO no momba antsika
  - type: text
    content: tamin’ny namelezan’ny olona antsika,
  '3':
  - type: text
    content: dia ho nateliny velona tokoa isika
  - type: text
    content: satria nirehitra loatra ny havinirany;
  '4':
  - type: text
    content: eny, ho toy ny rano nandifotra antsika ireo,
  - type: text
    content: ho toy ny riaka nanafotra antsika,
  '5':
  - type: text
    content: ho toy ny rano misamboaravoara
  - type: text
    content: nanafotra antsika.»
  '6':
  - type: text
    content: Hisaorana anie ny TOMPO tsy nahafoy antsika
  - type: text
    content: horotidrotehin’ny vangin’ireo!
  '7':
  - type: text
    content: 'Toy ny fody afa-pandrika harato isika:'
  - type: text
    content: rovitra ny harato, ka afaka isika!
  '8':
  - type: text
    content: Ny famonjena antsika dia ny anaran’ny TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
