document_id: HAB.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Hipetraka maharitra eo amin’ny fiambenako aho
  - type: text
    content: ary hiandry toy ny mpitily eo amin’ny manda
  - type: text
    content: mba hahitako izay holazain’Andriamanitra amiko
  - type: text
    content: sy hahafantarako izay havaliny ny fitarainako
  - type: note
    content: 'havaliny: izany no toa mitombina; ny RM dia manao hoe havaliko.'
  - type: text
    content: .
  - type: heading
    content: 'Ny valin-tenin’Andriamanitra: ny marina sy ny mpamoritra'
  '10':
  - type: text
    content: Henatra ho an’ny taranakareo
  - type: text
    content: 'no hany vokatry ny fanapahan-kevitrareo:'
  - type: text
    content: tamin’ny nandringananareo firenena maro,
  - type: text
    content: dia naman’ny mamono tena ianareo.
  '11':
  - type: text
    content: Fa na dia ny vato amin’ny rindrina aza
  - type: text
    content: hiantsoantso hiampanga anareo,
  - type: text
    content: ary ny sakamandimby eo amin’ny trano
  - type: text
    content: no hanako hamaly azy.
  '12':
  - type: text
    content: «Lozanareo manorina sy manitatra tanàna
  - type: text
    content: amin’ny vono olona sy fanaovan-keloka.
  '13':
  - type: text
    content: Koa hiafara amin’ny afo ny asan’ireo vahoaka;
  - type: text
    content: ary zava-poana no isasaran’ireo firenena
  - type: note
    content: Tonon-tsiahy momba ny Jer 51.58.
  - type: text
    content: .
  - type: text
    content: Tsy ilay TOMPOn’izao rehetra izao ve
  - type: text
    content: no iavian’izany zavatra izany?
  '14':
  - type: text
    content: Eny, ny fiekena ny TOMPO be voninahitra
  - type: text
    content: dia hanenika ny mponin’ny tany tokoa
  - type: text
    content: tahaka ny anaronan’ny ranobe
  - type: text
    content: ny fanambanin’ny ranomasina
  - type: note
    content: Tonon-tsiahy momba ny Is 11.9.
  - type: text
    content: .
  '15':
  - type: text
    content: «Lozanareo mampisotro poizina ny namanareo
  - type: text
    content: ka mahatonga azy ho mamo sy mitanjaka
  - type: text
    content: mba hijerenareo ny fitanjahany.
  '16':
  - type: text
    content: 'Ho rakotra henatra ianareo fa tsy voninahitra:'
  - type: text
    content: Misotroa koa ianareo ka mitanjaha!
  - type: text
    content: hoentin’ny TOMPO hampibobohany anareo
  - type: text
    content: ilay tsangambava feno ny famaizany
  - type: note
    content: 'ilay tsangambava feno ny famaizany: ny voambolana hebreo dia ilay tsangambava fotsiny ihany, jereo Ezek 23.31; Hôb 16 sy nta.'
  - type: text
    content: ka hiova fahafaham-baràka ny voninahitrareo.
  '17':
  - type: text
    content: Fa hanody anareo ny fanimbana ala
  - type: text
    content: nataonareo tany Libano;
  - type: text
    content: naringanareo ny biby tao,
  - type: text
    content: ka biby koa no hampihorohoro anareo.
  - type: text
    content: Izany rehetra izany dia ho tonga
  - type: text
    content: noho ny olona novonoinareo ho faty
  - type: text
    content: sy ny herisetra vitanareo tamin’ny tany
  - type: text
    content: dia tamin’ny tanàna sy ny mponina rehetra ao.
  '18':
  - type: text
    content: Atao inona moa ny sarin-tsampy?
  - type: text
    content: Sary sikotry ny mpahay taozavatra ihany ireny
  - type: text
    content: na metaly narendrika hampianatra lainga!
  - type: text
    content: Nahoana ny olona no matoky
  - type: text
    content: izay zavatra noforoniny ihany,
  - type: text
    content: tamin’ny nanaovany sampy moana?
  '19':
  - type: text
    content: 'Lozanareo manao amin’ny tapa-kazo hoe: «Mifohaza!»'
  - type: text
    content: 'sy amin’ny vato moana hoe: «Mitsangàna!»,'
  - type: text
    content: nefa tsy afa-kilaza na inona na inona izy.
  - type: text
    content: Eny, fa na dia voapetaka
  - type: text
    content: takela-bolamena sy volafotsy aza ireo,
  - type: text
    content: dia tsy manana aina akory ao anatiny.
  '2':
  - type: text
    content: 'Dia namaly ahy ny TOMPO ka nanao hoe:'
  - type: text
    content: «Soraty izay ambarako anao amin’ny fahitana,
  - type: text
    content: ka sokiro eo amin’ny fàfana
  - type: note
    content: 'fàfana: hazo na vato izay anoratana teny mafonja na hafatra lehibe.'
  - type: text
    content: mba ho azo vakîna tsara.
  '20':
  - type: text
    content: Ny TOMPO kosa ao an-
  - type: text
    content: tempoliny
  - type: text
    content: ' masina;'
  - type: text
    content: aoka hangina eo anatrehany
  - type: text
    content: ny mponin’ny tany tontolo!
  '3':
  - type: text
    content: Fa tsy mbola tonga ny fotoana
  - type: text
    content: hahatanteraka io fahitana io;
  - type: text
    content: kanefa ho avy tsy ho ela ny farany
  - type: text
    content: ary tsy hamitaka velively.
  - type: text
    content: Andraso amim-pahatokiana na toa mitaredretra aza,
  - type: text
    content: fa ho avy tokoa ary tsy hahemotra izany.
  '4':
  - type: text
    content: 'Jereo ange: ny olona feno avonavona'
  - type: text
    content: dia tsy milamina ara-panahy;
  - type: text
    content: fa ny marina amin’ny finoana no ho velona
  - type: note
    content: 'Ny olona... ara-panahy: dkt hafa izay miavonavona dia tsy mandeha amin’ny lala-mahitsy. Ny tapany faharoa amin’ity and ity dia voalaza ao amin’ny Rom 1.17; Gal 3.11 sy Heb 10.38.'
  - type: text
    content: .
  '5':
  - type: text
    content: Eny, mamitaka ny harena
  - type: note
    content: 'ny harena: araka ny stf tranainy hebreo anankiray; ny RM kosa manao hoe ny divay.'
  - type: text
    content: ':'
  - type: text
    content: Tsy mahatombina mihitsy ny mpiavonavona,
  - type: text
    content: fa homan-dava tahaka ny toeran’ny maty izy
  - type: text
    content: ary tsy mety voky toy ny fahafatesana
  - type: text
    content: ka dia manangona ny firenen-drehetra ho an’ny tenany
  - type: text
    content: sy mamory ny olon-drehetra ho eo ambany fifehezany.
  '6':
  - type: text
    content: Ireo vahoaka babo rehetra ireo kosa
  - type: text
    content: dia hiara-manao oha-pitenenana
  - type: text
    content: hanesoesoana sy hanaratsiana azy.»
  - type: heading
    content: 'Ozona dimy: Lozanareo...'
  - type: text
    content: Eny, ireo vahoaka ireo
  - type: note
    content: Manondro olona maro ny lazaina araka ny stf hebreo hita tao Komràna; ao amin’ny RM kosa dia manondro olona tokana sady tsy voafaritra mazava ny lazaina.
  - type: text
    content: ' no hilaza hoe:'
  - type: text
    content: «Lozanareo mpangoron-karena
  - type: text
    content: izay mandraoka ny tsy anareo
  - type: text
    content: sady mivesatra ny tsatòka!
  - type: text
    content: Mandra-pahoviana no hanaovanareo izany?
  '7':
  - type: text
    content: Hitsangana tampoka ireo tompon-trosa;
  - type: text
    content: hifoha hanery anareo izy,
  - type: text
    content: ka anjarany indray ny handroba anareo.
  '8':
  - type: text
    content: Eny, efa namabo firenena maro ianareo,
  - type: text
    content: ka dia mba hobaboin’ny firenena sisa kosa
  - type: text
    content: noho ny olona novonoinareo ho faty
  - type: text
    content: sy ny herisetra vitanareo tamin’ny tany,
  - type: text
    content: dia tamin’ny tanàna sy ny mponina rehetra ao.
  '9':
  - type: text
    content: «Lozanareo manangon-karena tsy an-drariny
  - type: text
    content: hanasoavana ny taranakareo.
  - type: text
    content: Mihevi-tena ho ambony toerana ianareo
  - type: text
    content: ka tsy ho tratry ny loza.
