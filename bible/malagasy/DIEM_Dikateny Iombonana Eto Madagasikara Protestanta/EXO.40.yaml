document_id: EXO.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Baiko mampanangana ny tranolay masina sy mitokana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Niteny tamin’i Mosesy ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Ny andro voalohany amin’ny volana voalohany no hasainao hatsangana ny fonena-masina na hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ao no hametrahana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
  - type: text
    text: ' ka ho takona ao am-badiky ny efitra lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ao no haiditra ny latabatra voatokana ka halamina eo amboniny ny mofo fanolotra ho Ahy; ao koa no haiditra ny fitoeran-jiro ka harehitra ny jirony. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hapetraka eo anoloan’ny Vatamasina misy ny raki-tsoratry ny fanekempihavanana ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' volamena fandorana ditin-kazo manitra; ny efitra lamba dia hapetaka eo amin’ny fidirana mankao amin’ny fonena-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny alitara fisoronana dia hatao eo anoloan’ny fidirana ao amin’ny fonena-masina na hoe Tranolay fihaonana; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'hapetraka eo anelanelan’ny Tranolay fihaonana sy ny alitara kosa ny kovetabe fampiasa amin’ny fidiovana, ary hofenoina rano. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hatsangana ireo temitry ny kianja manodidina ny Toeramasina, ary hapetraka ny varavarana lamba eo amin’ny fidirana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Halainao ny ilomasina fanokanana, dia hohosoranao ny tranolay masina sy izay rehetra ao anatiny; izany no hanokananao azy sy ny fitaovana rehetra momba azy mba ho voatokana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hohosoranao ilomasina koa ny alitara fisoronana sy ny fitaovana rehetra momba azy; izany no hanokananao azy mba ho voatokana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hohosoranao ilomasina koa ny kovetabe sy ny faladiany ka izany no hanokananao azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Hoentinao i Aharôna sy ny zanany lahy hankeo amin’ny fidirana amin’ny Tranolay fihaonana, ary hampandroinao amin’ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avy eo dia hampiakanjoinao an’i Aharôna ireo fanamiana voatokana, ka hohosoranao ilomasina izy mba ho voatokana ho mpisorona ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hampanatoninao ireo zanakalahin’i Aharôna ka hampiakanjoinao azy ny fanamiany, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia hohosoranao ilomasina toa an-drainy izy mba hanompo Ahy amin’ny maha mpisorona azy. Noho izany hosotra izany, dia ho voatokana ho mpisorona raikitra ho Ahy izy sy ny taranany mifandimby.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asain’i Mosesy apetraka amin’ny toerany ny Toeramasina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Notanterahin’i Mosesy an-tsakany sy an-davany ny baiko rehetra nomen’ny TOMPO, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka ny andro voalohany tamin’ny volana voalohany, taona faharoa taorian’ny nialany tany Ejipta, no nananganana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fonena-masina
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nasain’i Mosesy natsangana ny fonena-masina, ka napetraka ny faladiany sy ny hazo fisaka ary ny barany mbamin’ny andry. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Avy eo dia novelarina teo ambonin’ny fonena-masina ny lay, ary napetraka teo ambonin’io lay io ny sarona fiarovana, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nalain’i Mosesy ny vatofisaka misy ny didy folo ka napetrany tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: '; dia natsofoka ny baon’ny Vatamasina sady narakotra azy ny sarony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Naiditra tao amin’ilay fonena-masina ny Vatamasina, nahantona ny efitra lamba mba hanakonana ny Vatamasina, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny latabatra voatokana dia napetraka tao amin’ny Tranolay fihaonana, terỳ amin’ny lafiny avaratra, teo anoloan’ny efitra lamba; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ary nalahatra teo amboniny ny mofo fanolotra ny TOMPO, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Napetraka tao amin’ny Tranolay fihaonana tamin’ny lafiny atsimo, manoloana ny latabatra, ny fitoeran-jiro; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: dia narehitra ny jiro teo anatrehan’ny TOMPO, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Napetraka tao amin’ny Tranolay fihaonana, teo anoloan’ny efitra lamba ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' volamena; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary nodorana teo amboniny ny vovo-javamanitra, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Natsangana ny varavarana lamba teo am-pidirana mankao amin’ny fonena-masina; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: avy eo dia napetraka teo anoloan’io fidirana io ny alitara fisoronana ary nodorana teo amboniny ny sorona dorana manontolo sy ny fanatitra vokatry ny tany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Napetraka teo anelanelan’ny Tranolay fihaonana sy ny alitara ny kovetabe ho an’ny fidiovana, ary nofenoina rano. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nampiasain’i Mosesy sy i Aharôna mbamin’ny zanany lahy izany mba hanasany ny tongony sy ny tanany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nisasa toy izany ireo isaky ny hiditra ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' sy hanatona ny alitara, araka izay efa nandidian’ny TOMPO an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nasain’i Mosesy natsangana ny temitry ny kianja manodidina ny fonena-masina sy ny alitara, ary nahantona ny varavarana lamba teo am-pidirana ny kianja. Dia vitan’i Mosesy avokoa ny asa rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mameno ny fonena-masina ny voninahitry ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nandrakotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' ny rahona, ka nanenika ilay fonena-masina ny voninahitry ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny rahona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 13.21 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny voninahitry ny Tompo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Mp 8.10-11; Is 6.3; Ezek 43.4-5; Apôk 15.8.'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: noho izany, dia tsy afaka niditra tao amin’ny Tranolay fihaonana i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rehefa nifindrafindra toerana ny Israelita, dia tsy niainga hanohy ny diany raha tsy efa niakatra niala tamin’ny fonena-masina ny rahona. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha tsy nihetsika ny rahona, dia tsy nifindra ry zareo fa niandry ny andro hiakaran’ny rahona indray. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Nandritra ny dia rehetra nataon’ny Israelita, dia nandrakotra ny fonena-masina ilay rahona nony antoandro ary nisy afo mazava teo aminy nony alina; izany no nanehoan’ny TOMPO fa teo anatrehan’ny Israelita rehetra hatrany Izy.
