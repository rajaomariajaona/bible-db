document_id: EXO.40,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Baiko mampanangana ny tranolay masina sy mitokana azy
  - type: text
    content: 'Niteny tamin’i Mosesy ny TOMPO hoe:'
  '10':
  - type: text
    content: 'Hohosoranao ilomasina koa ny alitara fisoronana sy ny fitaovana rehetra momba azy; izany no hanokananao azy mba ho voatokana. '
  '11':
  - type: text
    content: Hohosoranao ilomasina koa ny kovetabe sy ny faladiany ka izany no hanokananao azy.
  '12':
  - type: text
    content: '«Hoentinao i Aharôna sy ny zanany lahy hankeo amin’ny fidirana amin’ny Tranolay fihaonana, ary hampandroinao amin’ny rano. '
  '13':
  - type: text
    content: 'Avy eo dia hampiakanjoinao an’i Aharôna ireo fanamiana voatokana, ka hohosoranao ilomasina izy mba ho voatokana ho mpisorona ho Ahy. '
  '14':
  - type: text
    content: 'Hampanatoninao ireo zanakalahin’i Aharôna ka hampiakanjoinao azy ny fanamiany, '
  '15':
  - type: text
    content: dia hohosoranao ilomasina toa an-drainy izy mba hanompo Ahy amin’ny maha mpisorona azy. Noho izany hosotra izany, dia ho voatokana ho mpisorona raikitra ho Ahy izy sy ny taranany mifandimby.»
  - type: heading
    content: Asain’i Mosesy apetraka amin’ny toerany ny Toeramasina
  '16':
  - type: text
    content: 'Notanterahin’i Mosesy an-tsakany sy an-davany ny baiko rehetra nomen’ny TOMPO, '
  '17':
  - type: text
    content: 'ka ny andro voalohany tamin’ny volana voalohany, taona faharoa taorian’ny nialany tany Ejipta, no nananganana ny '
  - type: text
    content: fonena-masina
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Nasain’i Mosesy natsangana ny fonena-masina, ka napetraka ny faladiany sy ny hazo fisaka ary ny barany mbamin’ny andry. '
  '19':
  - type: text
    content: Avy eo dia novelarina teo ambonin’ny fonena-masina ny lay, ary napetraka teo ambonin’io lay io ny sarona fiarovana, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '2':
  - type: text
    content: '–Ny andro voalohany amin’ny volana voalohany no hasainao hatsangana ny fonena-masina na hoe '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Nalain’i Mosesy ny vatofisaka misy ny didy folo ka napetrany tao amin’ny '
  - type: text
    content: Vatamasina
  - type: text
    content: '; dia natsofoka ny baon’ny Vatamasina sady narakotra azy ny sarony. '
  '21':
  - type: text
    content: Naiditra tao amin’ilay fonena-masina ny Vatamasina, nahantona ny efitra lamba mba hanakonana ny Vatamasina, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '22':
  - type: text
    content: 'Ny latabatra voatokana dia napetraka tao amin’ny Tranolay fihaonana, terỳ amin’ny lafiny avaratra, teo anoloan’ny efitra lamba; '
  '23':
  - type: text
    content: ary nalahatra teo amboniny ny mofo fanolotra ny TOMPO, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '24':
  - type: text
    content: 'Napetraka tao amin’ny Tranolay fihaonana tamin’ny lafiny atsimo, manoloana ny latabatra, ny fitoeran-jiro; '
  '25':
  - type: text
    content: dia narehitra ny jiro teo anatrehan’ny TOMPO, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '26':
  - type: text
    content: 'Napetraka tao amin’ny Tranolay fihaonana, teo anoloan’ny efitra lamba ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena; '
  '27':
  - type: text
    content: ary nodorana teo amboniny ny vovo-javamanitra, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '28':
  - type: text
    content: 'Natsangana ny varavarana lamba teo am-pidirana mankao amin’ny fonena-masina; '
  '29':
  - type: text
    content: avy eo dia napetraka teo anoloan’io fidirana io ny alitara fisoronana ary nodorana teo amboniny ny sorona dorana manontolo sy ny fanatitra vokatry ny tany, araka izay efa nandidian’ny TOMPO an’i Mosesy.
  '3':
  - type: text
    content: 'Ao no hametrahana ny '
  - type: text
    content: Vatamasina misy ny raki-tsoratry ny fanekempihavanana
  - type: text
    content: ' ka ho takona ao am-badiky ny efitra lamba. '
  '30':
  - type: text
    content: 'Napetraka teo anelanelan’ny Tranolay fihaonana sy ny alitara ny kovetabe ho an’ny fidiovana, ary nofenoina rano. '
  '31':
  - type: text
    content: 'Nampiasain’i Mosesy sy i Aharôna mbamin’ny zanany lahy izany mba hanasany ny tongony sy ny tanany. '
  '32':
  - type: text
    content: 'Nisasa toy izany ireo isaky ny hiditra ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' sy hanatona ny alitara, araka izay efa nandidian’ny TOMPO an’i Mosesy.'
  '33':
  - type: text
    content: Nasain’i Mosesy natsangana ny temitry ny kianja manodidina ny fonena-masina sy ny alitara, ary nahantona ny varavarana lamba teo am-pidirana ny kianja. Dia vitan’i Mosesy avokoa ny asa rehetra.
  - type: heading
    content: Mameno ny fonena-masina ny voninahitry ny Tompo
  '34':
  - type: text
    content: 'Nandrakotra ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ny rahona, ka nanenika ilay fonena-masina ny voninahitry ny TOMPO'
  - type: note
    content: 'ny rahona: jereo 13.21 sy nta. –ny voninahitry ny Tompo: jereo 1 Mp 8.10-11; Is 6.3; Ezek 43.4-5; Apôk 15.8.'
  - type: text
    content: '; '
  '35':
  - type: text
    content: noho izany, dia tsy afaka niditra tao amin’ny Tranolay fihaonana i Mosesy.
  '36':
  - type: text
    content: 'Rehefa nifindrafindra toerana ny Israelita, dia tsy niainga hanohy ny diany raha tsy efa niakatra niala tamin’ny fonena-masina ny rahona. '
  '37':
  - type: text
    content: 'Raha tsy nihetsika ny rahona, dia tsy nifindra ry zareo fa niandry ny andro hiakaran’ny rahona indray. '
  '38':
  - type: text
    content: Nandritra ny dia rehetra nataon’ny Israelita, dia nandrakotra ny fonena-masina ilay rahona nony antoandro ary nisy afo mazava teo aminy nony alina; izany no nanehoan’ny TOMPO fa teo anatrehan’ny Israelita rehetra hatrany Izy.
  '4':
  - type: text
    content: 'Ao no haiditra ny latabatra voatokana ka halamina eo amboniny ny mofo fanolotra ho Ahy; ao koa no haiditra ny fitoeran-jiro ka harehitra ny jirony. '
  '5':
  - type: text
    content: 'Hapetraka eo anoloan’ny Vatamasina misy ny raki-tsoratry ny fanekempihavanana ilay '
  - type: text
    content: alitara
  - type: text
    content: ' volamena fandorana ditin-kazo manitra; ny efitra lamba dia hapetaka eo amin’ny fidirana mankao amin’ny fonena-masina. '
  '6':
  - type: text
    content: 'Ny alitara fisoronana dia hatao eo anoloan’ny fidirana ao amin’ny fonena-masina na hoe Tranolay fihaonana; '
  '7':
  - type: text
    content: 'hapetraka eo anelanelan’ny Tranolay fihaonana sy ny alitara kosa ny kovetabe fampiasa amin’ny fidiovana, ary hofenoina rano. '
  '8':
  - type: text
    content: Hatsangana ireo temitry ny kianja manodidina ny Toeramasina, ary hapetraka ny varavarana lamba eo amin’ny fidirana.
  '9':
  - type: text
    content: '«Halainao ny ilomasina fanokanana, dia hohosoranao ny tranolay masina sy izay rehetra ao anatiny; izany no hanokananao azy sy ny fitaovana rehetra momba azy mba ho voatokana. '
