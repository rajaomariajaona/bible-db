type_code: plt
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Sava lalana
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hita ao amin’ny Vaovao Mahafaly araka an’i Matio ireo soritra vaventy nandaharan’i Marka ny azy.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Hafatra ampitain’i Jôhany Mpanao batisa (3.1–12).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Atao batisa ary alaim-panahy i Jesoa (3.13–4.11).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–Asan’i Jesoa any Galilea: manao antso avo ny Fanjakàn’ny lanitra Izy, mampianatra ny vahoaka ary manasitrana ny marary (4.12–18.35).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Miakatra ho any Jerosalema i Jesoa (toko 19–20).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: –Asan’i Jesoa ao Jerosalema mandritra ny herinandro fotsiny; amin’ny farany dia melohina ho faty Izy ary vonoina, kanjo mitsangana velona tsy araka ny fanampoizana ary miseho amin’ireo mpianany (toko 21–28).
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Kanefa misy sasin-teny lava (toko 1–2) atokan’i Matio hamisavisan-javatra momba ny fiavian’i Jesoa sy ny fahaterahany ary ny fahazazàny. Amin’izany, dia efa asongadin’i Matio sahady ny tena vontoatin-javatra momba ity Jesoa hozohiny manerana ny Vaovao Mahafaly atolony ho antsika ity: i Jesoa no Ilay Mpanjaka sy Mpamonjy nampanantenaina, ary koa ilay «Himanoela» (Andriamanitra miaraka amintsika), sady amin’ny alalany no anatanterahan’Andriamanitra ny zavatra nambarany mialoha ao amin’ny Testamenta Taloha (na Fanekempihavanana Taloha).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ny mampiavaka ihany koa ny Vaovao Mahafaly araka an’i Matio dia noho izy manambatambatra ny ankamaroan’ny fampianarana nataon’i Jesoa ao anatin’ny lahateny dimy: 1) Ny «toriteny tany an-tendrombohitra» (toko 5–7), izay mamelabelatra ny toetra lavorary tokony harahin’ireo olona anisan’ny Fanjakàn’ny lanitra. – 2) Ny hafatrafatra aroso manokana ho an’ireo tsy maintsy manambara fa tonga ny Fanjakàn’ny lanitra (toko 10). – 3) Ny maha zava-miafina ny Fanjakàn’ny lanitra, antitranterina amin’ny fanoharana fito: miafina io Fanjakàn’ny lanitra io ankehitriny, kanefa hanetriketrika ny fandreseny rahatrizay (toko 13). – 4) Ny fifampitondrana sy fiainana maha mpiray tampo ao amin’ilay fiaraha-monina vaovao antsoina hoe Fanjakàn’ny lanitra (toko 18). – 5) Ny fomba fiandrasana ny hahatanterahan’ny Fanjakàn’ny lanitra izay tsy maintsy handresy amin’ny farany (toko 24–25).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ao amin’ny Vaovao Mahafaly araka an’i Matio àry, dia aseho fa i Jesoa mihitsy no ilay Mpampianatra mivelona sy mitory eo anivontsika ny fiaraha-monina vaovao isantarana ny Fanjakàn’ny lanitra; ary i Jesoa ihany koa no manolotra ho an’izay rehetra miditra ao amin’io Fanjakàn’ny lanitra io ny fampianarana ilainy mba hijoroany ho vavolombelona eo anatrehan’ireo mbola tsy mahalala.
