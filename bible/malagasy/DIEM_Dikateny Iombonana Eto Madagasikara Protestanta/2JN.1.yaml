document_id: 2JN.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: Avy amiko loholona ity taratasy ity. Mamangy anao aho, ry Andriambavy voafidin’Andriamanitra, ary mamangy an’ireo zanakao
  - type: note
    content: 'Misy mihevitra fa ilay Andriambavy voafidin’Andriamanitra dia manondro Fiangonana ao amin’ny toerana na faritra anankiray, ka ireo kristianina ao amin’izany Fiangonana izany no antsoina hoe: «zanak’ilay Andriambavy». Jereo koa 4 sy 5.'
  - type: text
    content: ' izay tiako marina tokoa; ary tsy izaho ihany no manam-pitiavana anareo fa izay rehetra mahalala ny hafatra marim-pototra koa, '
  '10':
  - type: text
    content: 'Raha misy olona tonga ao aminareo, ka tsy mitondra izao fampianarana izao, dia aza mampiantrano azy na miarahaba azy akory; '
  '11':
  - type: text
    content: fa izay miarahaba azy dia miombona amin’ny ratsy ataony.
  - type: heading
    content: Famaranana
  '12':
  - type: text
    content: Manan-javatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin’ny taratasy sy ny ranomainty izany. Fa manantena ho tonga atỳ aminareo aho ka hiresaka mifanatrika aminareo, mba ho feno ny hafaliantsika.
  '13':
  - type: text
    content: Ireo zanak’ilay rahavavinao
  - type: note
    content: 'Ireo zanak’ilay rahavavinao: izany teny izany dia toa manondro ireo kristianina ao amin’ny Fiangonana misy ny mpanoratra ity taratasy ity.'
  - type: text
    content: ', izay voafidin’Andriamanitra koa, dia manao veloma anao.'
  '2':
  - type: text
    content: satria mitoetra ao anatintsika ny hafatra marim-pototra sady homba antsika mandrakizay.
  '3':
  - type: text
    content: 'Homba antsika anie ny fahasoavana sy famindrampo amam-piadanana avy amin’Andriamanitra Ray sy i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Zanaky ny Ray, noho isika vonton’ny hafatra marim-pototra sy ny fitiavana!'
  - type: heading
    content: Ny fahamarinana sy ny fitiavana
  '4':
  - type: text
    content: 'Faly tokoa aho tamin’ny nahitako ny zanakao sasany miaina ny hafatra marim-pototra, araka ny didy noraisintsika tamin’ny Ray. '
  '5':
  - type: text
    content: 'Ary izao no angatahiko aminao ankehitriny, ry Andriambavy: aoka hifankatia isika! Tsy hoe didy vaovao no soratako aminao fa ilay nananantsika hatramin’ny voalohany ihany'
  - type: note
    content: Jereo Jôh 13.34; 15.12-17.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ary izao no fitiavana, dia ny hiainantsika araka ireo didin’Andriamanitra. Ny didy, araka ny efa renareo hatramin’ny voalohany, dia ny hiainanareo amin’ny fitiavana.
  '7':
  - type: text
    content: Maro mantsy ny mpamitaka efa niely eran’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ': izy ireny dia tsy manaiky fa tonga olombelona tokoa i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. Izany no maha mpamitaka sy maha antikristy! '
  '8':
  - type: text
    content: Mitandrema tena ianareo mba tsy hahavery ny vokatr’ireo asanareo
  - type: note
    content: 'ny vokatr’ireo asanareo: misy stf sasany ahitana hoe ny vokatr’ireo asanay.'
  - type: text
    content: sady mba handraisanareo valisoa feno.
  '9':
  - type: text
    content: 'Izay rehetra tsy mitoetra ao amin’ny fampianaran’i Kristy fa mihoa-pefy, dia tsy manana an’Andriamanitra. Izay mitoetra ao amin’ny fampianaran’i Kristy no manana ny Ray sy ny Zanaka. '
