document_id: 2JN.1,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Avy amiko loholona ity taratasy ity. Mamangy anao aho, ry Andriambavy voafidin’Andriamanitra, ary mamangy an’ireo zanakao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Misy mihevitra fa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay Andriambavy voafidin’Andriamanitra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dia manondro Fiangonana ao amin’ny toerana na faritra anankiray, ka ireo kristianina ao amin’izany Fiangonana izany no antsoina hoe: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: «zanak’ilay Andriambavy».
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo koa 4 sy 5.'
      marker-yv: yv-n
    - type: text
      text: ' izay tiako marina tokoa; ary tsy izaho ihany no manam-pitiavana anareo fa izay rehetra mahalala ny hafatra marim-pototra koa, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha misy olona tonga ao aminareo, ka tsy mitondra izao fampianarana izao, dia aza mampiantrano azy na miarahaba azy akory; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: fa izay miarahaba azy dia miombona amin’ny ratsy ataony.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famaranana
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manan-javatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin’ny taratasy sy ny ranomainty izany. Fa manantena ho tonga atỳ aminareo aho ka hiresaka mifanatrika aminareo, mba ho feno ny hafaliantsika.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ireo zanak’ilay rahavavinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ireo zanak’ilay rahavavinao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany teny izany dia toa manondro ireo kristianina ao amin’ny Fiangonana misy ny mpanoratra ity taratasy ity.
      marker-yv: yv-n
    - type: text
      text: ', izay voafidin’Andriamanitra koa, dia manao veloma anao.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: satria mitoetra ao anatintsika ny hafatra marim-pototra sady homba antsika mandrakizay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Homba antsika anie ny fahasoavana sy famindrampo amam-piadanana avy amin’Andriamanitra Ray sy i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Zanaky ny Ray, noho isika vonton’ny hafatra marim-pototra sy ny fitiavana!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahamarinana sy ny fitiavana
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Faly tokoa aho tamin’ny nahitako ny zanakao sasany miaina ny hafatra marim-pototra, araka ny didy noraisintsika tamin’ny Ray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary izao no angatahiko aminao ankehitriny, ry Andriambavy: aoka hifankatia isika! Tsy hoe didy vaovao no soratako aminao fa ilay nananantsika hatramin’ny voalohany ihany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jôh 13.34; 15.12-17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary izao no fitiavana, dia ny hiainantsika araka ireo didin’Andriamanitra. Ny didy, araka ny efa renareo hatramin’ny voalohany, dia ny hiainanareo amin’ny fitiavana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Maro mantsy ny mpamitaka efa niely eran’
    - type: usfm
      marker: w
      children:
      - type: text
        text: izao tontolo izao
    - type: text
      text: ': izy ireny dia tsy manaiky fa tonga olombelona tokoa i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: '. Izany no maha mpamitaka sy maha antikristy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mitandrema tena ianareo mba tsy hahavery ny vokatr’ireo asanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny vokatr’ireo asanareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ny vokatr’ireo asanay.
      marker-yv: yv-n
    - type: text
      text: sady mba handraisanareo valisoa feno.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izay rehetra tsy mitoetra ao amin’ny fampianaran’i Kristy fa mihoa-pefy, dia tsy manana an’Andriamanitra. Izay mitoetra ao amin’ny fampianaran’i Kristy no manana ny Ray sy ny Zanaka. '
