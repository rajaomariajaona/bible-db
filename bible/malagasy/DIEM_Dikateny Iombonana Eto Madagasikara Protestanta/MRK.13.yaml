document_id: MRK.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ambaran’i Jesoa ny handravana ny tempoly
  - type: heading
    content: (Jereo Mt 24.1-2; Lk 21.5-6)
  - type: text
    content: Nony niala teo an-
  - type: text
    content: kianjan’ny tempoly
  - type: text
    content: ' i Jesoa, dia hoy ny mpianany anankiray taminy:'
  - type: text
    content: –Mpampianatra ô, jereo ange! Endrey ireto vato, endrey ireto rafitra!
  '10':
  - type: text
    content: 'Kanefa tsy maintsy hotorîna amin’ny firenena rehetra aloha ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Rehefa hoentina hatolotra amin’ny mpitsara ianareo, dia aza manahy hoe inona no holazainareo; fa izay teny homena anareo amin’izay fotoana izay, lazaina; satria tsy teny avy aminareo no holazainareo fa teny avy amin’ny Fanahy Masina. '
  '12':
  - type: text
    content: Hisy olona hanolotra ny iray tampo aminy hovonoina; hisy ray hanolotra ny zanany hovonoina; ary hisy zanaka hitsangana hanohitra ny ray aman-dreniny ka hampanameloka azy ho faty
  - type: note
    content: Ampit Mt 7.6.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Hankahalain’ny olona rehetra ianareo satria miandany amiko; kanefa izay maharitra hatramin’ny farany no ho voavonjy.
  - type: heading
    content: Ilay tebiteby lehibe
  - type: heading
    content: (Jereo Mt 24.15-28; Lk 21.20-24)
  '14':
  - type: text
    content: –Ho hitanareo eo amin’izay tsy tokony hisy azy «ilay fanimbazimbana mahatsiravina
  - type: note
    content: Jereo Dan 9.27; 11.31; 12.11.
  - type: text
    content: '.» (Aoka hahazo tsara izay mamaky). '
  '15':
  - type: text
    content: 'Koa amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; izay any an-tampon-trano aoka tsy hidina ary aoka tsy hiditra haka zavatra ao an-tranony; '
  '16':
  - type: text
    content: 'izay any an-tsaha aoka tsy hiverina haka ny lambany. '
  '17':
  - type: text
    content: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’izany andro izany. '
  '18':
  - type: text
    content: 'Mivavaha mba tsy ho amin’ny ririnina no hahatongavan’izany. '
  '19':
  - type: text
    content: Fa ho andro fijaliana izany, dia fijaliana tsy mbola nisy toa azy hatramin’ny niandohan’ny zavaboaary, ka mandraka ankehitriny, sady tsy hisy toa azy intsony koa
  - type: note
    content: Ampit Dan 12.1.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Hitanao ve ireo rafitra miezinezina ireo? Tsy havela hisy vato mifanongoa eo ka tsy harodana.
  - type: heading
    content: Loza sy fanenjehana isan-karazany
  - type: heading
    content: (Jereo Mt 24.3-14; Lk 21.7-19)
  '20':
  - type: text
    content: 'Raha tsy efa nanapa-kevitra hanafohy ireo andro ireo ny Tompo, dia tsy hisy olona ho voavonjy; fa noho ireo olom-boafidiny, dia nohafohezin’ny Tompo ireo andro ireo. '
  '21':
  - type: text
    content: 'Ary amin’izany, raha misy olona milaza aminareo hoe: «Indro atỳ ny '
  - type: text
    content: Mesia
  - type: text
    content: '» na hoe «Indro arỳ Izy», dia aza mino. '
  '22':
  - type: text
    content: 'Fa olona misandoka ho Mesia sy ho mpaminany no hijoro, ka hanao famantarana sy zava-mahagaga hamitahany na dia ny olom-boafidin’Andriamanitra aza raha azony natao. '
  '23':
  - type: text
    content: Koa mitandrema, fa efa voalazako mialoha taminareo ny zavatra rehetra.
  - type: heading
    content: Ho avy amim-boninahitra ny Zanak’olona
  - type: heading
    content: (Jereo Mt 24.29-31; Lk 21.25-28)
  '24':
  - type: text
    content: '–Fa amin’ireo andro ireo, raha vao afaka izany fijaliana izany, dia hihamaizina ny masoandro, tsy handefa taratra intsony ny volana, '
  '25':
  - type: text
    content: hiraraka avy eny amin’ny habakabaka ny kintana ary ho voahozongozona ireo herin’ny habakabaka
  - type: note
    content: Momba ny and 24-25, ampit Is 13.10; 34.4; Ezek 32.7; JI 2.10; 3.4.
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Amin’izay ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia ho hita voahodidin-drahona, sady tamy omban-kery lehibe sy ombam-boninahitra'
  - type: note
    content: Dan 7.13.
  - type: text
    content: '; '
  '27':
  - type: text
    content: 'ary dia haniraka ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' Izy ka hanangona ny olom-boafidiny avy any amin’ny vazantany efatra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny'
  - type: note
    content: Ampit Deot 30.4; Za 2.10; Ne 1.9.
  - type: text
    content: .
  - type: heading
    content: Famantarana avy amin’ny aviavy
  - type: heading
    content: (Jereo Mt 24.32-35; Lk 21.29-33)
  '28':
  - type: text
    content: '–Raiso ho anatra ity '
  - type: text
    content: fanoharana
  - type: text
    content: ' avy amin’ny aviavy ity: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky izay ny fahavaratra. '
  '29':
  - type: text
    content: 'Toy izany koa, raha vao hitanareo tonga izany rehetra izany, dia fantaro fa efa akaiky ny '
  - type: text
    content: Zanak’olona
  - type: note
    content: 'efa akaiky ny Zanak’olona... am-baravarana: dkt hafa efa akaiky ny farany ary mby eo am-baravarana (ny farany eto dia sady milaza ny hiafaran’i Jerosalema no milaza ny farandro hiavian’ny Zanak’olona amim-boninahitra).'
  - type: text
    content: ' ary mby eo am-baravarana. '
  '3':
  - type: text
    content: 'Ary nony nipetraka teo amin’ny tendrombohitra Analanôliva tandrifin’ny '
  - type: text
    content: tempoly
  - type: text
    content: ' i Jesoa, dia nanontany Azy manokana i Petera sy i Jakôba ary i Jôhany sy i Andrea nanao hoe:'
  '30':
  - type: text
    content: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tonga izany rehetra izany. '
  '31':
  - type: text
    content: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
  - type: heading
    content: Ilay ora sy andro tsy fantatra
  - type: heading
    content: (Jereo Mt 24.36-44)
  '32':
  - type: text
    content: '–Fa ny amin’izay andro sy ora hahatongavan’izany, dia tsy misy mahalala na ny '
  - type: text
    content: anjely
  - type: text
    content: ' any an-danitra na ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', fa Izy Ray ihany. '
  '33':
  - type: text
    content: 'Mitandrema sy miareta tory ary mivavaha fa tsy fantatrareo izay hahatongavan’izany fotoanandro izany. '
  '34':
  - type: text
    content: 'Ho tahaka ny amin’ity lehilahy handeha any an-tany hafa izany: nandao ny tranony ralehilahy ary nizara fahefana tamin’ireo mpiasany ka samy notolorany ny raharahany avy, dia nanafatrafatra ny mpiandry vavahady hiambina. '
  '35':
  - type: text
    content: 'Koa miambena àry fa tsy fantatrareo ny fotoana hiavian’ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina. '
  '36':
  - type: text
    content: 'Tandremo sao tonga tampoka izy ka hitany matory ianareo. '
  '37':
  - type: text
    content: 'Ary izao lazaiko aminareo izao, dia lazaiko amin’ny olona rehetra koa: Miambena!'
  '4':
  - type: text
    content: '–Lazao anay: oviana no hahatongavan’izany ary inona no famantarana fa hoe madiva ho tonga ny fiafaran’ireo rehetra ireo?'
  '5':
  - type: text
    content: 'Ka hoy i Jesoa taminy:'
  - type: text
    content: '–Tandremo fandrao hisy hamitaka anareo. '
  '6':
  - type: text
    content: 'Maro no ho avy hisandoka ny anarako ary hiteny hoe: «Izaho no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '»; ary maro ny olona ho voafitany. '
  '7':
  - type: text
    content: 'Ary raha mandre ady sy filazana ady ianareo, dia aza matahotra fa tsy maintsy ho tonga izany, kanefa tsy mbola izany no ho farany. '
  '8':
  - type: text
    content: Fa hisy firenena hitsangana hamely firenena, hisy koa fanjakana hitsangana hamely fanjakana; hisy horohorontany amin’ny toerana samihafa, sady hisy mosary. Izany no ho toy ny santatry ny fanaintainam-piterahana.
  '9':
  - type: text
    content: 'Tandremo ny amin’ny tenanareo. Hatolotry ny olona amin’ny mpitsara isan-tanàna ianareo ka hokapohiny any amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: '; ary hitsangana eo anoloan’ny mpifehy sy ny mpanjaka ianareo noho ny maha mpianatro anareo, mba hijoroanareo ho vavolombelona manambara Ahy eo anatrehany. '
