document_id: MRK.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambaran’i Jesoa ny handravana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.1-2; Lk 21.5-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nony niala teo an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: kianjan’ny tempoly
  - type: text
    text: ' i Jesoa, dia hoy ny mpianany anankiray taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, jereo ange! Endrey ireto vato, endrey ireto rafitra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hitanao ve ireo rafitra miezinezina ireo? Tsy havela hisy vato mifanongoa eo ka tsy harodana.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loza sy fanenjehana isan-karazany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.3-14; Lk 21.7-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony nipetraka teo amin’ny tendrombohitra Analanôliva tandrifin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' i Jesoa, dia nanontany Azy manokana i Petera sy i Jakôba ary i Jôhany sy i Andrea nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Lazao anay: oviana no hahatongavan’izany ary inona no famantarana fa hoe madiva ho tonga ny fiafaran’ireo rehetra ireo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Tandremo fandrao hisy hamitaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Maro no ho avy hisandoka ny anarako ary hiteny hoe: «Izaho no ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '»; ary maro ny olona ho voafitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha mandre ady sy filazana ady ianareo, dia aza matahotra fa tsy maintsy ho tonga izany, kanefa tsy mbola izany no ho farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hisy firenena hitsangana hamely firenena, hisy koa fanjakana hitsangana hamely fanjakana; hisy horohorontany amin’ny toerana samihafa, sady hisy mosary. Izany no ho toy ny santatry ny fanaintainam-piterahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tandremo ny amin’ny tenanareo. Hatolotry ny olona amin’ny mpitsara isan-tanàna ianareo ka hokapohiny any amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: '; ary hitsangana eo anoloan’ny mpifehy sy ny mpanjaka ianareo noho ny maha mpianatro anareo, mba hijoroanareo ho vavolombelona manambara Ahy eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Kanefa tsy maintsy hotorîna amin’ny firenena rehetra aloha ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehefa hoentina hatolotra amin’ny mpitsara ianareo, dia aza manahy hoe inona no holazainareo; fa izay teny homena anareo amin’izay fotoana izay, lazaina; satria tsy teny avy aminareo no holazainareo fa teny avy amin’ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hisy olona hanolotra ny iray tampo aminy hovonoina; hisy ray hanolotra ny zanany hovonoina; ary hisy zanaka hitsangana hanohitra ny ray aman-dreniny ka hampanameloka azy ho faty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mt 7.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hankahalain’ny olona rehetra ianareo satria miandany amiko; kanefa izay maharitra hatramin’ny farany no ho voavonjy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay tebiteby lehibe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.15-28; Lk 21.20-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: –Ho hitanareo eo amin’izay tsy tokony hisy azy «ilay fanimbazimbana mahatsiravina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Dan 9.27; 11.31; 12.11.
    marker-yv: yv-n
  - type: text
    text: '.» (Aoka hahazo tsara izay mamaky). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa amin’izany, izay any Jodea aoka handositra any an-tendrombohitra; izay any an-tampon-trano aoka tsy hidina ary aoka tsy hiditra haka zavatra ao an-tranony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'izay any an-tsaha aoka tsy hiverina haka ny lambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Loza no hanjo ny bevohòka sy ny mitaiza kely amin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mivavaha mba tsy ho amin’ny ririnina no hahatongavan’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ho andro fijaliana izany, dia fijaliana tsy mbola nisy toa azy hatramin’ny niandohan’ny zavaboaary, ka mandraka ankehitriny, sady tsy hisy toa azy intsony koa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 12.1.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha tsy efa nanapa-kevitra hanafohy ireo andro ireo ny Tompo, dia tsy hisy olona ho voavonjy; fa noho ireo olom-boafidiny, dia nohafohezin’ny Tompo ireo andro ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary amin’izany, raha misy olona milaza aminareo hoe: «Indro atỳ ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '» na hoe «Indro arỳ Izy», dia aza mino. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa olona misandoka ho Mesia sy ho mpaminany no hijoro, ka hanao famantarana sy zava-mahagaga hamitahany na dia ny olom-boafidin’Andriamanitra aza raha azony natao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa mitandrema, fa efa voalazako mialoha taminareo ny zavatra rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho avy amim-boninahitra ny Zanak’olona
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.29-31; Lk 21.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '–Fa amin’ireo andro ireo, raha vao afaka izany fijaliana izany, dia hihamaizina ny masoandro, tsy handefa taratra intsony ny volana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: hiraraka avy eny amin’ny habakabaka ny kintana ary ho voahozongozona ireo herin’ny habakabaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny and 24-25, ampit Is 13.10; 34.4; Ezek 32.7; JI 2.10; 3.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amin’izay ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ' dia ho hita voahodidin-drahona, sady tamy omban-kery lehibe sy ombam-boninahitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dan 7.13.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary dia haniraka ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeliny
  - type: text
    text: ' Izy ka hanangona ny olom-boafidiny avy any amin’ny vazantany efatra, manomboka amin’ny faravodilanitra ankilany ka miafara amin’ny faravodilanitra andaniny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Deot 30.4; Za 2.10; Ne 1.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famantarana avy amin’ny aviavy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.32-35; Lk 21.29-33)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '–Raiso ho anatra ity '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanoharana
  - type: text
    text: ' avy amin’ny aviavy ity: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky izay ny fahavaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toy izany koa, raha vao hitanareo tonga izany rehetra izany, dia fantaro fa efa akaiky ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'efa akaiky ny Zanak’olona... am-baravarana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa akaiky ny farany ary mby eo am-baravarana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (ny farany eto dia sady milaza ny hiafaran’i Jerosalema no milaza ny farandro hiavian’ny Zanak’olona amim-boninahitra).'
    marker-yv: yv-n
  - type: text
    text: ' ary mby eo am-baravarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lazaiko marina aminareo fa mbola tsy ho tapitra akory ity taranaka ity, dia ho tonga izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ho levona ny tany amana habakabaka, fa ny teniko tsy mba ho levona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilay ora sy andro tsy fantatra
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 24.36-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '–Fa ny amin’izay andro sy ora hahatongavan’izany, dia tsy misy mahalala na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' any an-danitra na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: ', fa Izy Ray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mitandrema sy miareta tory ary mivavaha fa tsy fantatrareo izay hahatongavan’izany fotoanandro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ho tahaka ny amin’ity lehilahy handeha any an-tany hafa izany: nandao ny tranony ralehilahy ary nizara fahefana tamin’ireo mpiasany ka samy notolorany ny raharahany avy, dia nanafatrafatra ny mpiandry vavahady hiambina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa miambena àry fa tsy fantatrareo ny fotoana hiavian’ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tandremo sao tonga tampoka izy ka hitany matory ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary izao lazaiko aminareo izao, dia lazaiko amin’ny olona rehetra koa: Miambena!'
