verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Toe-piainana mihavao tanteraka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Noho i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' efa nijaly tao amin’ny nofo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Noho i Kristy efa nijaly tao amin’ny nofo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho antsika,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ary misy koa manampy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ho anareo.
      marker-yv: yv-n
    - type: text
      text: ', dia raiso ho fiadianareo koa ny toe-tsaina nananany; satria izay olona nijaly tao amin’ny nofo dia nampitsaharina tamin’ny ota, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Samia mifanompo araka ny fanomezam-pahasoavana noraisinareo avy, mova tsy mpitandrim-pananana mitantana tsara ny fanomezana maro samy hafa avy amin’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izay mitoriteny, aoka ho toy ny milaza ireo hafatr’Andriamanitra; izay manompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heverina fa izany fanompoana izany dia miantefa indrindra amin’ny fanompoana ny mahantra (ampit Asa 6.2-4; Rm 12.7).
      marker-yv: yv-n
    - type: text
      text: ', aoka ho araka ny hery ampombain’Andriamanitra azy; ka dia amin’ny zavatra rehetra no hanomezam-boninahitra an’Andriamanitra amin’ny alalan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', fa an’Andriamanitra ny voninahitra sy ny fanjakana mandrakizay mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mijaly noho ny maha kristianina
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ry hava-malala, aza gaga amin’ny fanenjehana mivaivay miseho teo aminareo sady mihatra aminareo mba ho fizahan-toetra, ka hihevitra izany ho zava-tsy fahita midona aminareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa mifalia araka ny iombonanareo fijaliana amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', mba ho heni-kafaliana aman-karavoana koa ianareo amin’ny andro hisehoan’ny voninahiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Sambatra ianareo raha haratsîna amin’ny maha mpianatr’i Kristy anareo; fa ny Fanahy Masina be voninahitra, dia ny Fanahin’Andriamanitra, no mitoetra eo aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Eny, aoka aminareo tsy hisy hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpitsabaka amin’ny raharahan’olona; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: fa raha amin’ny maha kristianina azy no ijaliany, dia aoka izy tsy ho menatra fa hanome voninahitra an’Andriamanitra noho izany anarana entiny izany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tonga ny fotoanandro hiantombohan’ny fitsarana hatrao amin’ny ankohonan’Andriamanitra; ka raha miantomboka amintsika izany, hanao ahoana kosa no hiafaran’izay tsy mety mino ny
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' avy amin’Andriamanitra? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Raha saika tsy voavonjy ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inona no hanjo ny tsy mpivavaka sy ny mpanota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ohab 11.31, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: ?»
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa izay miaritra fijaliana araka ny sitrapon’Andriamanitra, aoka hanao soa hatrany sy hanankin-tena amin’Ilay mitana ny toky nomeny, dia ny Mpahary azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka tamin’ny androny sisa eto an-tany dia tsy araka ny filàndratsin’ny olombelona intsony no tokony hiainany fa araka ny sitrapon’Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, fotoana maharitra ihany tamin’ny lasa no nanaovanareo ny zavatra fanaon’ny mpanompo sampy, ka nizoranareo tamin’ny fihetsika tsy maotina, ny fanirian-dratsy, ny fahamamoana, ny fihinanam-be loatra, ny fisotroana tafahoatra, ary ny fanompoan-tsampy izay tsy fanao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Amin’izany dia gaga ireo mpanompo sampy satria tsy dodona intsony ianareo ny hiaraka aminy mba hanarampo amin’ny filibàna, ka dia tevatevainy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'nefa hampamoahin’Ilay vonona hitsara ny velona sy ny maty izy ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa izany no nitoriana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vaovao Mahafaly
    - type: text
      text: ' tamin’izay maty aza: mba ho velona araka ny fomban’Andriamanitra izy ao amin’ny fanahy, rehefa notsaraina tao amin’ny nofo araka ny fomban’ny olona.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezam-pahasoavana ifanompoana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Antomotra ny faran’ny zavatra rehetra; koa hendre, mahonòna tena mba ho afa-mivavaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa indrindra indrindra, mifankatiava fatratra, satria ny fitiavana no mikosoka ny fahotana maro niavosa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Ohab 10.12; Jak 5.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mifampiantranoa ka aza asiana monomonona. '
