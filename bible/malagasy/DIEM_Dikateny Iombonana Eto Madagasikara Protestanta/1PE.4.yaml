document_id: 1PE.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Toe-piainana mihavao tanteraka
  - type: text
    content: 'Noho i '
  - type: text
    content: Kristy
  - type: text
    content: ' efa nijaly tao amin’ny nofo'
  - type: note
    content: 'Noho i Kristy efa nijaly tao amin’ny nofo: misy stf sasany manampy hoe ho antsika, ary misy koa manampy hoe ho anareo.'
  - type: text
    content: ', dia raiso ho fiadianareo koa ny toe-tsaina nananany; satria izay olona nijaly tao amin’ny nofo dia nampitsaharina tamin’ny ota, '
  '10':
  - type: text
    content: 'Samia mifanompo araka ny fanomezam-pahasoavana noraisinareo avy, mova tsy mpitandrim-pananana mitantana tsara ny fanomezana maro samy hafa avy amin’Andriamanitra. '
  '11':
  - type: text
    content: Izay mitoriteny, aoka ho toy ny milaza ireo hafatr’Andriamanitra; izay manompo
  - type: note
    content: Heverina fa izany fanompoana izany dia miantefa indrindra amin’ny fanompoana ny mahantra (ampit Asa 6.2-4; Rm 12.7).
  - type: text
    content: ', aoka ho araka ny hery ampombain’Andriamanitra azy; ka dia amin’ny zavatra rehetra no hanomezam-boninahitra an’Andriamanitra amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', fa an’Andriamanitra ny voninahitra sy ny fanjakana mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Mijaly noho ny maha kristianina
  '12':
  - type: text
    content: 'Ry hava-malala, aza gaga amin’ny fanenjehana mivaivay miseho teo aminareo sady mihatra aminareo mba ho fizahan-toetra, ka hihevitra izany ho zava-tsy fahita midona aminareo. '
  '13':
  - type: text
    content: 'Fa mifalia araka ny iombonanareo fijaliana amin’i '
  - type: text
    content: Kristy
  - type: text
    content: ', mba ho heni-kafaliana aman-karavoana koa ianareo amin’ny andro hisehoan’ny voninahiny. '
  '14':
  - type: text
    content: 'Sambatra ianareo raha haratsîna amin’ny maha mpianatr’i Kristy anareo; fa ny Fanahy Masina be voninahitra, dia ny Fanahin’Andriamanitra, no mitoetra eo aminareo. '
  '15':
  - type: text
    content: 'Eny, aoka aminareo tsy hisy hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpitsabaka amin’ny raharahan’olona; '
  '16':
  - type: text
    content: fa raha amin’ny maha kristianina azy no ijaliany, dia aoka izy tsy ho menatra fa hanome voninahitra an’Andriamanitra noho izany anarana entiny izany.
  '17':
  - type: text
    content: Tonga ny fotoanandro hiantombohan’ny fitsarana hatrao amin’ny ankohonan’Andriamanitra; ka raha miantomboka amintsika izany, hanao ahoana kosa no hiafaran’izay tsy mety mino ny
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' avy amin’Andriamanitra? '
  '18':
  - type: text
    content: 'Fa hoy ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  - type: text
    content: «Raha saika tsy voavonjy ny marina,
  - type: text
    content: inona no hanjo ny tsy mpivavaka sy ny mpanota
  - type: note
    content: Ohab 11.31, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: ?»
  '19':
  - type: text
    content: Koa izay miaritra fijaliana araka ny sitrapon’Andriamanitra, aoka hanao soa hatrany sy hanankin-tena amin’Ilay mitana ny toky nomeny, dia ny Mpahary azy.
  '2':
  - type: text
    content: 'ka tamin’ny androny sisa eto an-tany dia tsy araka ny filàndratsin’ny olombelona intsony no tokony hiainany fa araka ny sitrapon’Andriamanitra. '
  '3':
  - type: text
    content: 'Eny, fotoana maharitra ihany tamin’ny lasa no nanaovanareo ny zavatra fanaon’ny mpanompo sampy, ka nizoranareo tamin’ny fihetsika tsy maotina, ny fanirian-dratsy, ny fahamamoana, ny fihinanam-be loatra, ny fisotroana tafahoatra, ary ny fanompoan-tsampy izay tsy fanao. '
  '4':
  - type: text
    content: 'Amin’izany dia gaga ireo mpanompo sampy satria tsy dodona intsony ianareo ny hiaraka aminy mba hanarampo amin’ny filibàna, ka dia tevatevainy; '
  '5':
  - type: text
    content: 'nefa hampamoahin’Ilay vonona hitsara ny velona sy ny maty izy ireo. '
  '6':
  - type: text
    content: 'Fa izany no nitoriana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tamin’izay maty aza: mba ho velona araka ny fomban’Andriamanitra izy ao amin’ny fanahy, rehefa notsaraina tao amin’ny nofo araka ny fomban’ny olona.'
  - type: heading
    content: Fanomezam-pahasoavana ifanompoana
  '7':
  - type: text
    content: 'Antomotra ny faran’ny zavatra rehetra; koa hendre, mahonòna tena mba ho afa-mivavaka. '
  '8':
  - type: text
    content: Fa indrindra indrindra, mifankatiava fatratra, satria ny fitiavana no mikosoka ny fahotana maro niavosa
  - type: note
    content: Jereo Ohab 10.12; Jak 5.20.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Mifampiantranoa ka aza asiana monomonona. '
