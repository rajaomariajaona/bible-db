document_id: 2KI.24,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tamin’ny andro nanjakan’i Jôiakima no nidiran’i Nebôkadnetsara mpanjakan’i Babilôna ny tanin’i Joda
  - type: note
    content: Jereo Jer 25; Dan 1.1-2.
  - type: text
    content: ', ka dia voatery nanoa azy telo taona i Jôiakima. Taorian’izany kosa izy dia nikomy taminy. '
  '10':
  - type: text
    content: 'Tamin’izany fotoana izany dia tonga nanao fahirano an’i Jerosalema ny tafika babilônianina izay notarihin’ireo manamboninahitr’i Nebokadnetsara mpanjakan’i Babilôna. '
  '11':
  - type: text
    content: 'Raha mbola natao fahirano ny tanàna, dia mba tonga teo koa i Nebokadnetsara; '
  '12':
  - type: text
    content: ary nitolo-batana tamin’ny mpanjakan’i Babilôna i Jôiakina mpanjakan’i Joda sy ny reniny mbamin’ny manamboninahiny sy ny filohan-bahoakany ary ny tandapany. Dia nogadrain’ny mpanjakan’i Babilôna
  - type: note
    content: Jereo Jer 22.24-30; 24.1; 29.2.
  - type: text
    content: ' ireo tamin’ny taona fahavalo nanjakany.'
  '13':
  - type: text
    content: Fa araka ny efa nambaran’ny TOMPO dia nentin’i Nebokadnetsara ny zava-tsarobidy rehetra tao an-tranon’ny TOMPO sy tao an-dapan’ny mpanjaka, ary novakiny avokoa ny fanaka rehetra volamena izay nataon’i Salômôna mpanjaka ho an’ny tempolin’ny TOMPO
  - type: note
    content: Jereo 20.17.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Nataony sesitany i Jerosalema iray manontolo, dia ny filoham-bahoaka rehetra sy ny mpanankarena rehetra, izany hoe voasesitany miisa 10 000 ankoatra ny mpahay taozavatra sy ny mpanefy; ireo vahoaka madinika sy mahantra no sisa navelany. '
  '15':
  - type: text
    content: Nataony sesitany avy ao Jerosalema ho any Babilôna koa i Jôiakina mpanjaka mbamin’ny reniny sy ireo vadiny ary ny tandapa mbamin’ireo filohan’i Joda
  - type: note
    content: Jereo Ezek 17.12.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Nentiny nankany Babilôna avokoa ny mpanankarena rehetra miisa fito arivo lahy, mbamin’ny mpahay taozavatra sy ny mpanefy miisa arivo lahy, ary ny miaramila rehetra afaka miantafika.
  '17':
  - type: text
    content: Ary notendren’ny mpanjakan’i Babilôna ho mpanjaka handimby an’i Jôiakina i Matanià rahalahin-drainy, ka novany ho Tsedekià ny anarany
  - type: note
    content: Jereo Jer 37.1; Ezek 17.13.
  - type: text
    content: .
  - type: heading
    content: I Tsedekià mpanjakan’i Joda
  - type: heading
    content: (Jereo Jer 52.1-3; 2 Tan 36.11-12)
  '18':
  - type: text
    content: Feno 21 taona i Tsedekià fony tonga mpanjaka; ary naharitra 11 taona no nanjakany tao Jerosalema. Ny anaran-dreniny dia Hamotala zanakavavin’i Jeremià avy any Libnà
  - type: note
    content: 'Libnà: jereo 8.22 sy nta.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO izy tahaka izay rehetra nataon’i Jôiakima.
  '2':
  - type: text
    content: 'Tamin’izay i Jôiakima dia nandefasan’ny TOMPO andian-dahalo babilônianina sy andian-dahalo sirianina ary andian-dahalo môabita sy hamônita hamely ny tanin’i Joda ka nandrava azy araka izay nolazain’ny TOMPO tamin’ny alalan’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: '. '
  '20':
  - type: text
    content: Fa ny fahatezeran’ny TOMPO no nahatonga izany loza izany tamin’i Jerosalema sy tamin’i Joda, ka niafara tamin’ny fandroahany an’ireo Jodeanina hiala teo anatrehany
  - type: note
    content: Jereo Ezek 17.15.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Baikon’ny TOMPO mihitsy no nahatonga ireny loza ireny tamin’ny fanjakan’i Joda mba hanesorany azy tsy ho hitan’ny masony noho ny fahotana rehetra nataon’i Manase mpanjaka, '
  '4':
  - type: text
    content: ary koa noho ireo olona maro tsy manan-tsiny izay novonoiny ho faty; nanenika faty an’i Jerosalema izy ka izany no tsy netezan’ny TOMPO hamela heloka
  - type: note
    content: 'Momba ny ratsy nataon’i Manase: jereo 21.10-16.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Ny sisa amin’ny tantaran’i Jôiakima ary koa ny zavatra hafa rehetra nataony dia voasoratra ao amin’ny boky milohateny hoe '
  - type: text
    content: Asan’ireo mpanjakan’i Joda.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Ary rehefa lasa nodimandry any amin’ny razany i Jôiakima, dia i Jôiakina zanany lahy no nanjaka nandimby azy.
  '7':
  - type: text
    content: Tsy sahy nivoaka ny taniny intsony ny mpanjakan’i Ejipta, satria lasan’ny mpanjakan’i Babilôna ny tany rehetra teo ambany fahefàn’i Ejipta hatreo amin’ny lohasahan-driakan’i Ejipta ka hatrany amin’ny ony Eofrata.
  - type: heading
    content: I Jôiakina mpanjakan’i Joda; ny fanaovana sesitany voalohany
  - type: heading
    content: (Jereo 2 Tan 36.9-10)
  '8':
  - type: text
    content: 'Feno 18 taona i Jôiakina fony tonga mpanjaka; ary telo volana ihany no nanjakany tao Jerosalema. Ny anaran-dreniny dia Nehostà zanakavavin’i Elnatàna avy ao Jerosalema. '
  '9':
  - type: text
    content: Ary nanao izay ratsy eo imason’ny TOMPO tahaka izay rehetra nataon’ireo razany izy.
