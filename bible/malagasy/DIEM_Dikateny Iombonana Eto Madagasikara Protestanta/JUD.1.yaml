        children:
        - type: text
          text: ' izay isan’ireo lahatsoratra apôkaliptika jiosy ivelan’ny Baiboly; kanefa jereo koa Gen 6.1-4.'
      marker-yv: yv-n
    - type: text
      text: '; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'toy izany koa ny mponina tao '
    - type: usfm
