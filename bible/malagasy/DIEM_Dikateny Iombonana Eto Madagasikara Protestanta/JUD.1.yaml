          text: 'ny fatin’i Mosesy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Deot 34.6; kanefa ny mpanoratra etoana dia miankina amina tantara izay tsy hita ao amin’ny Baiboly, fa hita kosa ao amin’ny '
      - type: usfm
        marker: it
