verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avy amiko Joda ity taratasy ity, dia izaho mpanompon’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' sady rahalahin’i Jakôba'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Joda... Jakôba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mt 13.55; Mk 6.3.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamangy anareo voaantson’Andriamanitra aho, dia ianareo tiavin’Andriamanitra Ray sy tahiriziny ho an’i Jesoa Kristy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ireo olona ireo kosa dia manevateva ny zavatra tsy fantany akory, sady manimba tena amin’ny zavatra fantany ara-pahazarana fotsiny tahaka ny ahalalan’ny biby tsy manan-tsaina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hahita loza ireo, fa nizotra tamin’ny lalana efa nizoran’i Kaina, nihitsoka tamin’ny hadisoana efa nahavoa an’i Balahàma mba hahazoana tamby, ary efa ringana tamin’ny fikomiana nataony toy ny naharingana an’i Kôrà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kaina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 4.3-8. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Balahàma:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Nom 22.1-35. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kôrà:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Nom 16.1-35.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ireo no mandrava ny firîndran’ny sakafom-pifankatiavana ataonareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mandrava ny firîndran’ny: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ara-bakiteny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: harambato voasaron-drano eo amin’ny.
      marker-yv: yv-n
    - type: text
      text: ', fa miara-mihinana aminareo tsy amin-tahotra sady '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' mamahan-tena. Toy ny rahona faohin-drivotra ireo ka tsy mahalatsaka orana; toy ny hazo fararano tsy misy voany sady voaongotra, ka indroa maty; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: toy ny onjan-dranomasina misamboaravoara ka mamorivory henatra vokatry ny ataony; toy ny tain-kintana mirenireny, ka voatahiry mandrakizay ho an’ny haizina mangitsokitsoka.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I Henôka, ilay taranaka fahafito nandimby an’i Adama, dia efa naminany koa ny amin’ireo olona ireo, ka nilaza hoe: «Indro tonga ny Tompo, otronin’ny anjely masiny tsy tambo isaina, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mba hitsara ny olona rehetra; ka hampiaiky ny ratsy fanahy rehetra Izy noho ny asa ratsy rehetra mbamin’ny teny ratsy rehetra nataon’ireo mpanota ratsy fanahy ireo hanoherana ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ao amin’ny and 14-15, dia miankina amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bokin’i Henôka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (1.9) indray ny mpanoratra: jereo Jod 6 sy nta. – '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'Henôka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Gen 5.18, 21-24.'
      marker-yv: yv-n
    - type: text
      text: '.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ireo mpampianatra sandoka ireo dia mpimonomonona sy mpimoimoy lava, sady miaina araka ny filàndratsiny no miavonavom-piteny, ka mandoka olona mba hahazoany tombon-tsoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hafatra sy fampitandremana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ianareo kosa, ry hava-malala, tsarovy ny teny efa nolazain’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôlin’i Jesoa Kristy
    - type: text
      text: ' Tompontsika; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'satria izao no voalazany taminareo: «Amin’ny andro farany dia hisy mpaniratsira, hiaina araka ny filàn’ny haratsiam-panahiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 2Pt 3.3.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ireo mpampianatra sandoka ireo no mahatonga fisaratsarahana, satria entin’ny maha olombelona ihany fa tsy mba manana ny Fanahin’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hampitomboina ao aminareo anie ny famindrampo sy ny fiadanana ary ny fitiavana!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo mpampiely fampianaran-diso
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 2 Pt 2.1-17)
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ianareo kosa, ry hava-malala, ataovy izay handrosoanareo amin’ny finoana masina indrindra efa anananareo, ka mivavaha ombàn’ny herin’ny Fanahy Masina; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'mitahiriza tena ao amin’ny fitiavan’Andriamanitra, ka mahandrasa ny famindrampon’i Jesoa Kristy Tompontsika hahazoanareo fiaina-maharitra mandrakizay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Reseo lahatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Reseo lahatra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Amindrao fo.
      marker-yv: yv-n
    - type: text
      text: 'ny sasany izay miahanahana; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ny sasany indray, sariho ho afaka amin’ny afo no famonjy azy; ary ny sasany kosa amindrao fo, saingy mitandrema tsara ka ankahalao na dia ny akanjo voaloton’ny maha olona mpanota azy aza.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an’Andriamanitra
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ho an’Andriamanitra tokana anie ny voninahitra! Fa Izy no mahay miaro anareo tsy ho solafaka amin’ny fahotana, Izy no mahay mampijoro anareo tsy hanan-tsiny ka haheni-karavoana anareo eo anoloan’ny voninahiny; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Izy no Mpamonjy antsika amin’ny alalan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika. Eny, ho an’Andriamanitra tokana anie ny voninahitra sy ny laza ary ny fanjakana sy ny fahefana hatramy talohan’ny taona rehetra sy ankehitriny ary mandrakizay! '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Amen
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ry hava-malala, teo am-piezahana mafy hanoratra ho anareo ny amin’ny famonjena iombonantsika aho no nisy nahatery ahy hanoratra aminareo, mba hampirisika anareo hikely aina hiaro ny finoana izay efa natolotra tanteraka tamin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vahoakan’Andriamanitra
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa misy olona sasany tafiditra an-tsokosoko eo aminareo: dia olona ratsy fanahy izay mamadika ny fahasoavan’Andriamanitsika ho fampianarana fitondrantena maloto, ka mandà an’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ', ilay Andrian-tokana sady Tompontsika. Hatry ny ela no efa voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ' mialoha ny fanamelohana hihatra amin’ireny olona ireny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ka mandà an’i Jesoa... Tompontsika: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ka mandà ilay Andrian-tokana sy i Jesoa Kristy Tompontsika.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hatry ny ela...hihatra amin’ireny olona ireny:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ampit Sal 69.28-29.'
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Na dia efa fantatrareo aza ny zavatra rehetra, dia tiako hampahatsiarovina anareo ireto: rehefa novonjen’ny Tompo tanteraka ho afaka tany Ejipta ny vahokany, dia naringany ihany tatỳ aoriana izay tsy nino'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny Tompo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fiantsoana an’Andriamanitra izany ao amin’ny Test. T. (dkt grika tranainy Septoazinta); kanefa misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jèsous,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay teny grika mety midika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jesoa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' na '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Josoa.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –Jereo Eks 12.51; Nom 14.29-30.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjely
    - type: text
      text: ' izay tsy nitana ny fiamboniana nomena azy fa nandao ny fonenany, dia tazonin’ny Tompo am-patorana mandrakizay ao anaty haizina mandra-pahatongan’ny andro lehibe hanamelohana azy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Izany dia voalaza indrindra ao amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bokin’i Henôka,
      - type: usfm
