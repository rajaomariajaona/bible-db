      children:
      - type: text
        text: devoly
    - type: text
      text: ' ka nifanditra momba ny fatin’i Mosesy, dia tsy sahy nanevateva nanameloka ny devoly fa nanao taminy hoe: «Aoka hofaizin’ny Tompo ianao'
    - type: usfm
