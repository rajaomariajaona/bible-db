          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Mikaela: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Dan 10.13, 21; 12.1; Apôk 12.7. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'arkanjely:'
      - type: usfm
