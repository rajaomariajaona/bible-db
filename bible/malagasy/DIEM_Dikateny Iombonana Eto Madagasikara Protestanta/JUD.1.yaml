      children:
      - type: text
        text: Sôdôma
    - type: text
      text: ' sy Gômôra mbamin’ireo tanàna manodidina: nanao fitondrantena maloto izy ireo ary lasa nivarilavo amin’ny zavatra tsy tokony hatao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Izany dia fampahatsiahivana ny fitondrantena ratsy nasehon’ireo mponina tao Sôdôma sy Gômôra, fa noheverin’ny Sôdômita ho olombelona ireo anjely tonga hanavotra an’i Lôta: jereo Gen 19.1-25.'
      marker-yv: yv-n
    - type: text
      text: ', ka raiso ho fananarana satria afo maharitra mandrakizay no sazy mihatra aminy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Toy izany koa ireo mpampianatra sandoka ireo: mirediredy ka mandoto ny nofony sady mandà ny maha Tompo an’i Kristy ary manevateva ireo atao hoe voninahitra'
    - type: usfm
