document_id: JUD.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Joda ity taratasy ity, dia izaho mpanompon’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' sady rahalahin’i Jakôba'
  - type: note
    content: 'Joda... Jakôba: jereo Mt 13.55; Mk 6.3.'
  - type: text
    content: .
  - type: text
    content: 'Mamangy anareo voaantson’Andriamanitra aho, dia ianareo tiavin’Andriamanitra Ray sy tahiriziny ho an’i Jesoa Kristy. '
  '10':
  - type: text
    content: 'Ireo olona ireo kosa dia manevateva ny zavatra tsy fantany akory, sady manimba tena amin’ny zavatra fantany ara-pahazarana fotsiny tahaka ny ahalalan’ny biby tsy manan-tsaina. '
  '11':
  - type: text
    content: Hahita loza ireo, fa nizotra tamin’ny lalana efa nizoran’i Kaina, nihitsoka tamin’ny hadisoana efa nahavoa an’i Balahàma mba hahazoana tamby, ary efa ringana tamin’ny fikomiana nataony toy ny naharingana an’i Kôrà
  - type: note
    content: 'Kaina: jereo Gen 4.3-8. –Balahàma: jereo Nom 22.1-35. –Kôrà: jereo Nom 16.1-35.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ireo no mandrava ny firîndran’ny sakafom-pifankatiavana ataonareo
  - type: note
    content: 'mandrava ny firîndran’ny: ara-bakiteny harambato voasaron-drano eo amin’ny.'
  - type: text
    content: ', fa miara-mihinana aminareo tsy amin-tahotra sady '
  - type: text
    content: mpiandry
  - type: text
    content: ' mamahan-tena. Toy ny rahona faohin-drivotra ireo ka tsy mahalatsaka orana; toy ny hazo fararano tsy misy voany sady voaongotra, ka indroa maty; '
  '13':
  - type: text
    content: toy ny onjan-dranomasina misamboaravoara ka mamorivory henatra vokatry ny ataony; toy ny tain-kintana mirenireny, ka voatahiry mandrakizay ho an’ny haizina mangitsokitsoka.
  '14':
  - type: text
    content: 'I Henôka, ilay taranaka fahafito nandimby an’i Adama, dia efa naminany koa ny amin’ireo olona ireo, ka nilaza hoe: «Indro tonga ny Tompo, otronin’ny anjely masiny tsy tambo isaina, '
  '15':
  - type: text
    content: mba hitsara ny olona rehetra; ka hampiaiky ny ratsy fanahy rehetra Izy noho ny asa ratsy rehetra mbamin’ny teny ratsy rehetra nataon’ireo mpanota ratsy fanahy ireo hanoherana ny Tompo
  - type: note
    content: 'Ao amin’ny and 14-15, dia miankina amin’ny Bokin’i Henôka (1.9) indray ny mpanoratra: jereo Jod 6 sy nta. – Henôka: jereo Gen 5.18, 21-24.'
  - type: text
    content: '.» '
  '16':
  - type: text
    content: Ireo mpampianatra sandoka ireo dia mpimonomonona sy mpimoimoy lava, sady miaina araka ny filàndratsiny no miavonavom-piteny, ka mandoka olona mba hahazoany tombon-tsoa.
  - type: heading
    content: Hafatra sy fampitandremana
  '17':
  - type: text
    content: 'Ianareo kosa, ry hava-malala, tsarovy ny teny efa nolazain’ireo '
  - type: text
    content: apôstôlin’i Jesoa Kristy
  - type: text
    content: ' Tompontsika; '
  '18':
  - type: text
    content: 'satria izao no voalazany taminareo: «Amin’ny andro farany dia hisy mpaniratsira, hiaina araka ny filàn’ny haratsiam-panahiny'
  - type: note
    content: Ampit 2Pt 3.3.
  - type: text
    content: '.» '
  '19':
  - type: text
    content: 'Ireo mpampianatra sandoka ireo no mahatonga fisaratsarahana, satria entin’ny maha olombelona ihany fa tsy mba manana ny Fanahin’Andriamanitra. '
  '2':
  - type: text
    content: Hampitomboina ao aminareo anie ny famindrampo sy ny fiadanana ary ny fitiavana!
  - type: heading
    content: Ireo mpampiely fampianaran-diso
  - type: heading
    content: (Jereo 2 Pt 2.1-17)
  '20':
  - type: text
    content: 'Ianareo kosa, ry hava-malala, ataovy izay handrosoanareo amin’ny finoana masina indrindra efa anananareo, ka mivavaha ombàn’ny herin’ny Fanahy Masina; '
  '21':
  - type: text
    content: 'mitahiriza tena ao amin’ny fitiavan’Andriamanitra, ka mahandrasa ny famindrampon’i Jesoa Kristy Tompontsika hahazoanareo fiaina-maharitra mandrakizay. '
  '22':
  - type: text
    content: Reseo lahatra
  - type: note
    content: 'Reseo lahatra: misy stf sasany ahitana hoe Amindrao fo.'
  - type: text
    content: 'ny sasany izay miahanahana; '
  '23':
  - type: text
    content: ny sasany indray, sariho ho afaka amin’ny afo no famonjy azy; ary ny sasany kosa amindrao fo, saingy mitandrema tsara ka ankahalao na dia ny akanjo voaloton’ny maha olona mpanota azy aza.
  - type: heading
    content: Fiderana an’Andriamanitra
  '24':
  - type: text
    content: 'Ho an’Andriamanitra tokana anie ny voninahitra! Fa Izy no mahay miaro anareo tsy ho solafaka amin’ny fahotana, Izy no mahay mampijoro anareo tsy hanan-tsiny ka haheni-karavoana anareo eo anoloan’ny voninahiny; '
  '25':
  - type: text
    content: 'Izy no Mpamonjy antsika amin’ny alalan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. Eny, ho an’Andriamanitra tokana anie ny voninahitra sy ny laza ary ny fanjakana sy ny fahefana hatramy talohan’ny taona rehetra sy ankehitriny ary mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ry hava-malala, teo am-piezahana mafy hanoratra ho anareo ny amin’ny famonjena iombonantsika aho no nisy nahatery ahy hanoratra aminareo, mba hampirisika anareo hikely aina hiaro ny finoana izay efa natolotra tanteraka tamin’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa misy olona sasany tafiditra an-tsokosoko eo aminareo: dia olona ratsy fanahy izay mamadika ny fahasoavan’Andriamanitsika ho fampianarana fitondrantena maloto, ka mandà an’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ', ilay Andrian-tokana sady Tompontsika. Hatry ny ela no efa voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' mialoha ny fanamelohana hihatra amin’ireny olona ireny'
  - type: note
    content: 'ka mandà an’i Jesoa... Tompontsika: dkt hafa ka mandà ilay Andrian-tokana sy i Jesoa Kristy Tompontsika. –Hatry ny ela...hihatra amin’ireny olona ireny: ampit Sal 69.28-29.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Na dia efa fantatrareo aza ny zavatra rehetra, dia tiako hampahatsiarovina anareo ireto: rehefa novonjen’ny Tompo tanteraka ho afaka tany Ejipta ny vahokany, dia naringany ihany tatỳ aoriana izay tsy nino'
  - type: note
    content: 'ny Tompo: fiantsoana an’Andriamanitra izany ao amin’ny Test. T. (dkt grika tranainy Septoazinta); kanefa misy stf sasany ahitana hoe Jèsous, izay teny grika mety midika hoe Jesoa na Josoa. –Jereo Eks 12.51; Nom 14.29-30.'
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'ary ny '
  - type: text
    content: anjely
  - type: text
    content: ' izay tsy nitana ny fiamboniana nomena azy fa nandao ny fonenany, dia tazonin’ny Tompo am-patorana mandrakizay ao anaty haizina mandra-pahatongan’ny andro lehibe hanamelohana azy'
  - type: note
    content: Izany dia voalaza indrindra ao amin’ny Bokin’i Henôka, izay isan’ireo lahatsoratra apôkaliptika jiosy ivelan’ny Baiboly; kanefa jereo koa Gen 6.1-4.
  - type: text
    content: '; '
  '7':
  - type: text
    content: 'toy izany koa ny mponina tao '
  - type: text
    content: Sôdôma
  - type: text
    content: ' sy Gômôra mbamin’ireo tanàna manodidina: nanao fitondrantena maloto izy ireo ary lasa nivarilavo amin’ny zavatra tsy tokony hatao'
  - type: note
    content: 'Izany dia fampahatsiahivana ny fitondrantena ratsy nasehon’ireo mponina tao Sôdôma sy Gômôra, fa noheverin’ny Sôdômita ho olombelona ireo anjely tonga hanavotra an’i Lôta: jereo Gen 19.1-25.'
  - type: text
    content: ', ka raiso ho fananarana satria afo maharitra mandrakizay no sazy mihatra aminy.'
  '8':
  - type: text
    content: 'Toy izany koa ireo mpampianatra sandoka ireo: mirediredy ka mandoto ny nofony sady mandà ny maha Tompo an’i Kristy ary manevateva ireo atao hoe voninahitra'
  - type: note
    content: 'ireo atao hoe voninahitra: manondro anankiray amin’ireo antokon’anjely, izay voateny ho anjely tsara etoana (jereo 1Kôr 11.10 sy nta).'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Kanefa na i Mikaela arkanjely aza, raha niady tamin’ny '
  - type: text
    content: devoly
  - type: text
    content: ' ka nifanditra momba ny fatin’i Mosesy, dia tsy sahy nanevateva nanameloka ny devoly fa nanao taminy hoe: «Aoka hofaizin’ny Tompo ianao'
  - type: note
    content: 'Mikaela: jereo Dan 10.13, 21; 12.1; Apôk 12.7. –arkanjely: jereo 1 Tes 4.16 sy nta. –ny fatin’i Mosesy: ampit Deot 34.6; kanefa ny mpanoratra etoana dia miankina amina tantara izay tsy hita ao amin’ny Baiboly, fa hita kosa ao amin’ny Fampiakarana an’i Mosesy, isan’ireo lahatsoratra apôkaliptika jiosy ivelan’ny Baiboly. –fa nanao... ianao»: ampit Za 3.2.'
  - type: text
    content: '!» '
