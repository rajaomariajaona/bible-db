document_id: LUK.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarihan-teny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Any ianao ry Teôfily
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 1.1.
    marker-yv: yv-n
  - type: text
    text: ' hajaina,'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Olona maro no efa nilofo nirakitra an-tsoratra ny tantaran’ireo zavatra notanterahin’Andriamanitra teto anivontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny nanovozan’ireo mpanoratra dia ny vavolombelona nahita maso hatrany am-boalohany sady niandraikitra ny fitoriana ny tenin’Andriamanitra ka nampita izany tamintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izaho koa mba namotopototra ny zavatra rehetra hatrany am-piandohana, ka sitrako ny manoratra ireny ho anao rehefa nalahatro tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Enga anie izany hahalalanao fa azo antoka ny fampianarana noraisinao!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambara mialoha ny hahaterahan’i Jôhany Mpanao batisa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin’ny andron’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ' mpanjakan’i Jodea, dia nisy mpisorona natao hoe Zakarià, isan’ny antoko-mpisoron’i Abià'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jodea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny mahazatra an-dry zareo Grika, dia i Palestinina fitambaran’ny tanin’ny jiosy no tondroina amin’izany ary i Herôda Lehibe no tenenina eto. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Abià
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Tan 24.7-18.'
    marker-yv: yv-n
  - type: text
    text: '. Taranak’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aharôna mpisorombe
  - type: text
    text: ' ny vadiny ary i Elizabeta no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Olo-marina teo anatrehan’Andriamanitra izy mivady ary nanaraka ny didy amam-pitsipiky ny Tompo an-tsakany sy an-davany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy nanan-janaka anefa izy roa satria momba i Elizabeta sady efa samy zokiolona izy mivady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indray andro dia nanao fisoronana teo anatrehan’Andriamanitra tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' i Zakarià, satria tonga ny anjaran’ny antokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Naroso ny antsapaka araka ny fanaon’ny mpisorona ka izy no voatendry handoro ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ditin-kazo manitra
  - type: text
    text: ' ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasin’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 30.7-8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nivavaka teo ivelany kosa ny vahoaka rehetra nandritra ny fotoana nandoroana ny ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’izay dia nisy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjeli
  - type: text
    text: 'n’ny Tompo niseho tamin’i Zakarià sady nijoro teo ankavanan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fandoroana ny ditin-kazo manitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 30.1-6; 1 Mp 7.48.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Taitra mafy ka raiki-tahotra i Zakarià nony nahita azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy ilay anjely taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka izay ny tahotra, ry Zakarià, fa efa nohenoin’Andriamanitra ny vavakao: Hiteraka zazalahy aminao i Elizabeta vadinao. I Jôhany no hataonao anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ho faly sy ravo ianao ary ny besinimaro koa ho faly amin’ny hahaterahany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eny, ho lehibe eo anatrehan’ny Tompo izy, ary hifady divay sy zava-pisotro hafa mahamamo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Nom 6.3.
    marker-yv: yv-n
  - type: text
    text: ', sady ho feno ny Fanahy Masina hatrany an-kibon-dreniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maro amin’ny Israelita no hampodîny amin’ny Tompo Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Mal 2.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hombàn’ny fanahy aman-kerin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Elià mpaminany
  - type: text
    text: ' izy ka hialoha ny Tompo, mba hampifandray am-po ny ray aman-dreny sy zanaka sady hamerin-doha ny maditra ho olo-marina feno fahendrena'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mal 3.23-24.
    marker-yv: yv-n
  - type: text
    text: ', ary dia hanomana vahoaka vonona handray ny Tompo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy i Zakarià tamin’ny anjely:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Fomba ahoana no hahazoako antoka an’izany? Izaho ity efa antitra ary ny vadiko efa zokiolona ihany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novalian’ny anjely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no Gabriela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Dan 8.16; 9.21; Lk 1.26.
    marker-yv: yv-n
  - type: text
    text: ', ilay mijoro eo anatrehan’Andriamanitra mba hanompo Azy; nirahiny aho hiteny aminao sy hanambara aminao izany hafatra mahafaly izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Noho ianao tsy nino ny teniko izay tsy maintsy ho tanteraka amin’ny fotoana voatendry dia ho moana ianao ka tsy afa-miteny mandra-pahatongan’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Niandry dia niandry an’i Zakarià ny vahoaka mpiangona ary gaga satria naharitra ela loatra tao amin’ny Toeramasina ity mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nony injay anefa niala tao izy, dia tsy afa-niteny tamin’ny olona; hany ka takatr’ireo mpiangona fa nisy fahitana niseho taminy tao amin’ny Toeramasina. Baiko tanana no nataon’i Zakarià tamin’ny olona ary dia nitohy ny naha moana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Rehefa tapitra ny fotoana anjara fanompoany, dia lasa nandeha nody i Zakarià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nitoe-jaza i Elizabeta vadiny tatỳ aoriana kely ary tsy nisehoseho nandritra ny dimy volana. Hoy ny eritreriny hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: «Nataon’ny Tompo tamiko izao, fa ankehitriny dia sitrany tokoa ny hahafa-tondromaso ahy eo amin’ny tany ama-monina.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ambara mialoha ny hahaterahan’i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa bevohòka enim-bolana i Elizabeta, dia nirahin’Andriamanitra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' Gabriela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.19 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ho any amin’ny tanàna anankiray any Galilea atao hoe Nazareta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'hankao amin’ny tovovavy fofombadin’ny lehilahy atao hoe Jôsefa. Io Jôsefa io dia taranak’i Davida mpanjaka; ary i Maria no anaran’ilay tovovavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Niditra tao an-tranon’i Maria ilay anjely ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mifalia, ry nohasoavin’ny Tompo! Momba anao hatrany Izy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Taitra tokoa i Maria noho izany teny izany, ka nieritreritra izay mety ho hevitr’ilay fiarahabana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny anjely taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka izay ny tahotra, ry Maria, fa efa nahazo tombon-tsoa tamin’Andriamanitra ianao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hitoe-jaza ianao, ho tera-dahy, ary i Jesoa no hataonao anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ho lehibe Izy sady hantsoina hoe Zanaky ny Avo indrindra. Ny Tompo Andriamanitra hahatonga Azy ho mpanjaka handimby an’i Davida razambeny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia hanjaka mandrakizay amin’ny vahoaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' Izy ary tsy hanam-pahataperana ny Fanjakàny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 2 Sam 7.12; 13.16; Is 9.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa hoy i Maria tamin’ny anjely:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Hanao ahoana àry no hahatanterahan’izany, fa izaho manko virijiny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia novalian’ny anjely hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ho tonga eo aminao ny Fanahy Masina, ka ny herin’ny Avo indrindra hanarona anao. Noho izany ilay Masina haterakao dia hantsoina hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’Andriamanitra
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary indro i Elizabeta havanao efa mitoe-jaza koa, na iny izy antitra iny aza, ary efa bevohòka enim-bolana izao ilay natao hoe momba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa tsy misy zavatra tsy ho vitan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Gen 18.14.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Tamin’izay dia hoy i Maria:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Intỳ aho mpanompovavin’ny Tompo, aoka anie ho tonga amiko araka ny teninao!
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nandao azy ilay anjely.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mamangy an’i Elizabeta i Maria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Niainga i Maria tamin’izany andro izany, ka nandeha faingana ho any amin’ny tanàna anankiray anatin’ny faritra be havoana any Joda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ary namantana tao an-tranon’i Zakarià ka niarahaba an’i Elizabeta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vantany vao henon’i Elizabeta niarahaba azy i Maria, dia injao nibita-karavoana ilay zaza tao an-kibon’i Elizabeta; ary feno ny Fanahy Masina i Elizabeta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka nanandra-peo niantso mafy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nombàn’Andriamanitra fitahiana amin’ny samy vehivavy ianao, ary nombàny fitahiana koa Ilay haterakao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Zinona moa aho no mba vangian’ny renin’ny Tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa indro vantany vao henoko niarahaba ahy ianao, dia nibitaky ny haravoana tokoa ny zaza tao an-kiboko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary sambatra ianao nino fa ho tanteraka izay nampilazain’ny Tompo taminao!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Midera an’Andriamanitra i Maria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary hoy i Maria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit ny and 46-55 sy 1 Sam 2.1-10.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: –Mankalaza ny Tompo ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ary ny aiko miravo amin’Andriamanitra Mpamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: noho Izy nitsinjo ahy mpanompovaviny tsinontsinona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit 1 Sam 1.11.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hatramin’izao dia hambaran’ny taranaka rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoe sambatra aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: fa zava-dehibe no nataon’ilay Mahery tamiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina ny anarany!
- type: usfm
  marker: q1
  children:
  - type: usfm
