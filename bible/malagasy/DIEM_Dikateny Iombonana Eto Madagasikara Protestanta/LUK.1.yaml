document_id: LUK.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny
  - type: text
    content: Any ianao ry Teôfily
  - type: note
    content: Ampit Asa 1.1.
  - type: text
    content: ' hajaina,'
  - type: text
    content: 'Olona maro no efa nilofo nirakitra an-tsoratra ny tantaran’ireo zavatra notanterahin’Andriamanitra teto anivontsika. '
  '10':
  - type: text
    content: 'Nivavaka teo ivelany kosa ny vahoaka rehetra nandritra ny fotoana nandoroana ny ditin-kazo manitra. '
  '11':
  - type: text
    content: 'Tamin’izay dia nisy '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny Tompo niseho tamin’i Zakarià sady nijoro teo ankavanan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana ny ditin-kazo manitra'
  - type: note
    content: Jereo Eks 30.1-6; 1 Mp 7.48.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Taitra mafy ka raiki-tahotra i Zakarià nony nahita azy. '
  '13':
  - type: text
    content: 'Fa hoy ilay anjely taminy:'
  - type: text
    content: '–Aoka izay ny tahotra, ry Zakarià, fa efa nohenoin’Andriamanitra ny vavakao: Hiteraka zazalahy aminao i Elizabeta vadinao. I Jôhany no hataonao anarany. '
  '14':
  - type: text
    content: 'Ho faly sy ravo ianao ary ny besinimaro koa ho faly amin’ny hahaterahany! '
  '15':
  - type: text
    content: Eny, ho lehibe eo anatrehan’ny Tompo izy, ary hifady divay sy zava-pisotro hafa mahamamo
  - type: note
    content: Ampit Nom 6.3.
  - type: text
    content: ', sady ho feno ny Fanahy Masina hatrany an-kibon-dreniny. '
  '16':
  - type: text
    content: Maro amin’ny Israelita no hampodîny amin’ny Tompo Andriamanitra
  - type: note
    content: Ampit Mal 2.6.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Hombàn’ny fanahy aman-kerin’i '
  - type: text
    content: Elià mpaminany
  - type: text
    content: ' izy ka hialoha ny Tompo, mba hampifandray am-po ny ray aman-dreny sy zanaka sady hamerin-doha ny maditra ho olo-marina feno fahendrena'
  - type: note
    content: Mal 3.23-24.
  - type: text
    content: ', ary dia hanomana vahoaka vonona handray ny Tompo.'
  '18':
  - type: text
    content: 'Fa hoy i Zakarià tamin’ny anjely:'
  - type: text
    content: –Fomba ahoana no hahazoako antoka an’izany? Izaho ity efa antitra ary ny vadiko efa zokiolona ihany koa.
  '19':
  - type: text
    content: 'Dia novalian’ny anjely hoe:'
  - type: text
    content: –Izaho no Gabriela
  - type: note
    content: Jereo Dan 8.16; 9.21; Lk 1.26.
  - type: text
    content: ', ilay mijoro eo anatrehan’Andriamanitra mba hanompo Azy; nirahiny aho hiteny aminao sy hanambara aminao izany hafatra mahafaly izany. '
  '2':
  - type: text
    content: 'Ny nanovozan’ireo mpanoratra dia ny vavolombelona nahita maso hatrany am-boalohany sady niandraikitra ny fitoriana ny tenin’Andriamanitra ka nampita izany tamintsika. '
  '20':
  - type: text
    content: Noho ianao tsy nino ny teniko izay tsy maintsy ho tanteraka amin’ny fotoana voatendry dia ho moana ianao ka tsy afa-miteny mandra-pahatongan’izany.
  '21':
  - type: text
    content: 'Niandry dia niandry an’i Zakarià ny vahoaka mpiangona ary gaga satria naharitra ela loatra tao amin’ny Toeramasina ity mpisorona. '
  '22':
  - type: text
    content: Nony injay anefa niala tao izy, dia tsy afa-niteny tamin’ny olona; hany ka takatr’ireo mpiangona fa nisy fahitana niseho taminy tao amin’ny Toeramasina. Baiko tanana no nataon’i Zakarià tamin’ny olona ary dia nitohy ny naha moana azy.
  '23':
  - type: text
    content: 'Rehefa tapitra ny fotoana anjara fanompoany, dia lasa nandeha nody i Zakarià. '
  '24':
  - type: text
    content: 'Nitoe-jaza i Elizabeta vadiny tatỳ aoriana kely ary tsy nisehoseho nandritra ny dimy volana. Hoy ny eritreriny hoe: '
  '25':
  - type: text
    content: «Nataon’ny Tompo tamiko izao, fa ankehitriny dia sitrany tokoa ny hahafa-tondromaso ahy eo amin’ny tany ama-monina.»
  - type: heading
    content: Ambara mialoha ny hahaterahan’i Jesoa
  '26':
  - type: text
    content: 'Rehefa bevohòka enim-bolana i Elizabeta, dia nirahin’Andriamanitra ny '
  - type: text
    content: anjely
  - type: text
    content: ' Gabriela'
  - type: note
    content: Jereo 1.19 sy nta.
  - type: text
    content: ' ho any amin’ny tanàna anankiray any Galilea atao hoe Nazareta, '
  '27':
  - type: text
    content: 'hankao amin’ny tovovavy fofombadin’ny lehilahy atao hoe Jôsefa. Io Jôsefa io dia taranak’i Davida mpanjaka; ary i Maria no anaran’ilay tovovavy. '
  '28':
  - type: text
    content: 'Niditra tao an-tranon’i Maria ilay anjely ka nanao taminy hoe:'
  - type: text
    content: –Mifalia, ry nohasoavin’ny Tompo! Momba anao hatrany Izy!
  '29':
  - type: text
    content: 'Taitra tokoa i Maria noho izany teny izany, ka nieritreritra izay mety ho hevitr’ilay fiarahabana. '
  '3':
  - type: text
    content: 'Izaho koa mba namotopototra ny zavatra rehetra hatrany am-piandohana, ka sitrako ny manoratra ireny ho anao rehefa nalahatro tsara. '
  '30':
  - type: text
    content: 'Ary hoy ny anjely taminy:'
  - type: text
    content: '–Aoka izay ny tahotra, ry Maria, fa efa nahazo tombon-tsoa tamin’Andriamanitra ianao! '
  '31':
  - type: text
    content: 'Hitoe-jaza ianao, ho tera-dahy, ary i Jesoa no hataonao anarany. '
  '32':
  - type: text
    content: 'Ho lehibe Izy sady hantsoina hoe Zanaky ny Avo indrindra. Ny Tompo Andriamanitra hahatonga Azy ho mpanjaka handimby an’i Davida razambeny; '
  '33':
  - type: text
    content: 'dia hanjaka mandrakizay amin’ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' Izy ary tsy hanam-pahataperana ny Fanjakàny'
  - type: note
    content: Ampit 2 Sam 7.12; 13.16; Is 9.6.
  - type: text
    content: .
  '34':
  - type: text
    content: 'Fa hoy i Maria tamin’ny anjely:'
  - type: text
    content: –Hanao ahoana àry no hahatanterahan’izany, fa izaho manko virijiny?
  '35':
  - type: text
    content: 'Dia novalian’ny anjely hoe:'
  - type: text
    content: '–Ho tonga eo aminao ny Fanahy Masina, ka ny herin’ny Avo indrindra hanarona anao. Noho izany ilay Masina haterakao dia hantsoina hoe '
  - type: text
    content: Zanak’Andriamanitra
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Ary indro i Elizabeta havanao efa mitoe-jaza koa, na iny izy antitra iny aza, ary efa bevohòka enim-bolana izao ilay natao hoe momba. '
  '37':
  - type: text
    content: Fa tsy misy zavatra tsy ho vitan’Andriamanitra
  - type: note
    content: Ampit Gen 18.14.
  - type: text
    content: '!'
  '38':
  - type: text
    content: 'Tamin’izay dia hoy i Maria:'
  - type: text
    content: –Intỳ aho mpanompovavin’ny Tompo, aoka anie ho tonga amiko araka ny teninao!
  - type: text
    content: Dia nandao azy ilay anjely.
  - type: heading
    content: Mamangy an’i Elizabeta i Maria
  '39':
  - type: text
    content: 'Niainga i Maria tamin’izany andro izany, ka nandeha faingana ho any amin’ny tanàna anankiray anatin’ny faritra be havoana any Joda, '
  '4':
  - type: text
    content: Enga anie izany hahalalanao fa azo antoka ny fampianarana noraisinao!
  - type: heading
    content: Ambara mialoha ny hahaterahan’i Jôhany Mpanao batisa
  '40':
  - type: text
    content: 'ary namantana tao an-tranon’i Zakarià ka niarahaba an’i Elizabeta. '
  '41':
  - type: text
    content: 'Vantany vao henon’i Elizabeta niarahaba azy i Maria, dia injao nibita-karavoana ilay zaza tao an-kibon’i Elizabeta; ary feno ny Fanahy Masina i Elizabeta '
  '42':
  - type: text
    content: 'ka nanandra-peo niantso mafy hoe:'
  - type: text
    content: '–Nombàn’Andriamanitra fitahiana amin’ny samy vehivavy ianao, ary nombàny fitahiana koa Ilay haterakao! '
  '43':
  - type: text
    content: 'Zinona moa aho no mba vangian’ny renin’ny Tompoko? '
  '44':
  - type: text
    content: 'Fa indro vantany vao henoko niarahaba ahy ianao, dia nibitaky ny haravoana tokoa ny zaza tao an-kiboko. '
  '45':
  - type: text
    content: Ary sambatra ianao nino fa ho tanteraka izay nampilazain’ny Tompo taminao!
  - type: heading
    content: Midera an’Andriamanitra i Maria
  '46':
  - type: text
    content: Ary hoy i Maria
  - type: note
    content: Ampit ny and 46-55 sy 1 Sam 2.1-10.
  - type: text
    content: ':'
  - type: text
    content: –Mankalaza ny Tompo ny fanahiko,
  '47':
  - type: text
    content: ary ny aiko miravo amin’Andriamanitra Mpamonjy ahy,
  '48':
  - type: text
    content: noho Izy nitsinjo ahy mpanompovaviny tsinontsinona
  - type: note
    content: Ampit 1 Sam 1.11.
  - type: text
    content: '!'
  - type: text
    content: Eny, hatramin’izao dia hambaran’ny taranaka rehetra
  - type: text
    content: hoe sambatra aho,
  '49':
  - type: text
    content: fa zava-dehibe no nataon’ilay Mahery tamiko.
  - type: text
    content: Masina ny anarany!
  '5':
  - type: text
    content: 'Tamin’ny andron’i '
  - type: text
    content: Herôda
  - type: text
    content: ' mpanjakan’i Jodea, dia nisy mpisorona natao hoe Zakarià, isan’ny antoko-mpisoron’i Abià'
  - type: note
    content: 'Jodea: araka ny mahazatra an-dry zareo Grika, dia i Palestinina fitambaran’ny tanin’ny jiosy no tondroina amin’izany ary i Herôda Lehibe no tenenina eto. –Abià: jereo 1 Tan 24.7-18.'
  - type: text
    content: '. Taranak’i '
  - type: text
    content: Aharôna mpisorombe
  - type: text
    content: ' ny vadiny ary i Elizabeta no anarany. '
  '50':
  - type: text
    content: Ary hamindra fo hatramin’ny taranaka mifandimby ireo manaja Azy.
  '51':
  - type: text
    content: Nanatanterahany asa lehibe ny sandriny mahery;
  - type: text
    content: ka ny mpihevi-tena ho ambony nataony mihahaka.
  '52':
  - type: text
    content: Ny mpanjakazaka naongany hiala tamin’ny
  - type: text
    content: sezafiandrianany;
  - type: text
    content: ny tsinontsinona kosa nasandrany
  - type: note
    content: Ampit Jôb 5.11; 12.19.
  - type: text
    content: .
  '53':
  - type: text
    content: Ny noana novokisany zava-tsoa;
  - type: text
    content: ny mpanankarena kosa nalefany nody maina.
  '54':
  - type: text
    content: 'Niahy ny vahoaka '
  - type: text
    content: Israely
  - type: text
    content: ' mpanompony Andriamanitra,'
  - type: text
    content: satria nahatsiaro ny teniny tamin’ny razantsika;
  - type: text
    content: dia ny hamindra fo mandrakizay
  - type: text
    content: amin’i Abrahama sy ny taranany.
  '56':
  - type: text
    content: Nitoetra tokony ho telo volana tao amin-dry Elizabeta i Maria vao lasa nody.
  - type: heading
    content: Teraka i Jôhany Mpanao batisa ary atao hasoavana sy omena anarana
  '57':
  - type: text
    content: 'Tonga ny fotoana hahaveloman’i Elizabeta ka tera-dahy izy. '
  '58':
  - type: text
    content: 'Ny mpiara-monina sy ny lafin-kavana dia samy nahare fa nanehoan’ny Tompo hatsaram-po lehibe i Elizabeta ka niara-paly taminy. '
  '59':
  - type: text
    content: Nony afaka herinandro, dia tonga indray izy rehetra hamora ny zaza
  - type: note
    content: Jereo Lev 12.3.
  - type: text
    content: ', ary ny anaran-drainy hoe Zakarià no saika hiantsoany azy.'
  '6':
  - type: text
    content: 'Olo-marina teo anatrehan’Andriamanitra izy mivady ary nanaraka ny didy amam-pitsipiky ny Tompo an-tsakany sy an-davany. '
  '60':
  - type: text
    content: 'Fa niteny ny reniny nanao hoe:'
  - type: text
    content: –Tsy izany, fa hatao hoe Jôhany izy!
  '61':
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: –Kanefa ao amin’ny fianakavianao dia tsy misy mihitsy manana anarana hoe Jôhany!
  '62':
  - type: text
    content: 'Nanaovan-dry zareo baiko tanana ny rain’ity zaza hahalalàna izay anarana tiany homena azy. '
  '63':
  - type: text
    content: 'Ary nitaky fitaovana hanoratana i Zakarià ka nanoratra hoe: «I Jôhany no anarany.» Nahagaga azy rehetra izany. '
  '64':
  - type: text
    content: Teo no ho eo ihany dia nahay niteny indray i Zakarià, ary nanezaka nidera an’Andriamanitra.
  '65':
  - type: text
    content: 'Raiki-tahotra avokoa ny mpiara-monina ka niely eran’ny faritra be havoana any Jodea ny resaka momba izany zava-nitranga rehetra izany. '
  '66':
  - type: text
    content: 'Lasa eritreritra daholo ireo nandre ka velom-panontaniana hoe:'
  - type: text
    content: –Hanao ahoana re io zaza io?
  - type: text
    content: Ary nomba azy tokoa ny herin’ny Tompo.
  - type: heading
    content: Milaza teny faminaniana i Zakarià
  '67':
  - type: text
    content: 'Feno ny Fanahy Masina i Zakarià, rain’ny zazakely, ka nilaza faminaniana toy izao:'
  '68':
  - type: text
    content: '–Hisaorana anie ny Tompo, Andriamanitr’i '
  - type: text
    content: Israely
  - type: text
    content: ','
  - type: text
    content: noho Izy namangy sy nanavotra ny vahoakany!
  '69':
  - type: text
    content: Mpamonjy mahery ho antsika no najorony
  - type: text
    content: avy amin’ny taranak’i Davida mpanompony,
  '7':
  - type: text
    content: Tsy nanan-janaka anefa izy roa satria momba i Elizabeta sady efa samy zokiolona izy mivady.
  '70':
  - type: text
    content: araka ny efa nambarany hatramin’ny fahagola
  - type: text
    content: 'tamin’ny alalan’ireo '
  - type: text
    content: mpaminany
  - type: text
    content: ' masina:'
  '71':
  - type: text
    content: dia Mpamonjy hanafaka antsika amin’ny fahavalontsika
  - type: text
    content: sy amin’ny tanan’ireo mpankahala rehetra.
  '72':
  - type: text
    content: Namindra fo tamin’ny razantsika Andriamanitra
  - type: text
    content: 'sady nahatsiaro ilay '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' masina'
  '73':
  - type: text
    content: mbamin’ilay fianianana izay nataony
  - type: text
    content: tamin’i Abrahama razantsika
  - type: note
    content: Jereo Gen 22.16-17.
  - type: text
    content: ':'
  '74':
  - type: text
    content: dia ny hanala antsika amin’ny tanan’ny fahavalontsika,
  - type: text
    content: ary ny hamela antsika hanompo Azy tsy amin-tahotra,
  '75':
  - type: text
    content: fa amin-toetra masina sy marina eo anatrehany
  - type: text
    content: mandritra ny andro rehetra iainantsika.
  '76':
  - type: text
    content: Ary ianao kosa, anaka,
  - type: text
    content: dia hatao hoe mpaminanin’ny Avo indrindra,
  - type: text
    content: fa hialoha ny Tompo ianao
  - type: text
    content: mba hamboatra ny lalany
  - type: note
    content: Ampit Mal 3.1.
  - type: text
    content: ;
  '77':
  - type: text
    content: ny vahoakany hampahalalainao ny famonjena,
  - type: text
    content: ka hahafantatra fa voavela ny helony.
  '78':
  - type: text
    content: Mangoraka sy mamindra fo ilay Andriamanitsika,
  - type: text
    content: koa masoandro miposaka avy any ambony no hamangy antsika
  '79':
  - type: text
    content: mba hanazava an’ireo mihitsoka amin’ny maizina
  - type: text
    content: sy amin’ny aloky ny fahafatesana,
  - type: text
    content: ary mba hitarika ny diantsika
  - type: text
    content: hizotra mankany amin’ny fiadanana
  - type: note
    content: Ampit Is 9.1.
  - type: text
    content: .
  '8':
  - type: text
    content: Indray andro dia nanao fisoronana teo anatrehan’Andriamanitra tao an-
  - type: text
    content: tempoly
  - type: text
    content: ' i Zakarià, satria tonga ny anjaran’ny antokony. '
  '80':
  - type: text
    content: Nitombo sy nihanahery ilay zaza, ary nitoetra tany an-taniefitra mandra-pisehony tamin’ny vahoaka Israely.
  '9':
  - type: text
    content: 'Naroso ny antsapaka araka ny fanaon’ny mpisorona ka izy no voatendry handoro ny '
  - type: text
    content: ditin-kazo manitra
  - type: text
    content: ' ao amin’ny '
  - type: text
    content: Toeramasin’ny Tompo
  - type: note
    content: Jereo Eks 30.7-8.
  - type: text
    content: '. '
