document_id: 1CO.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny zo aman’andraikitry ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy olona afaka ve aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Asa 22.17-18; 26.16.
    marker-yv: yv-n
  - type: text
    text: '? Tsy apôstôly ve aho? Tsy efa nahita an’i Jesoa Tompontsika ve aho? Tsy vokatry ny asako amin’ny fanompoako ny Tompo ve ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Na dia tsy apôstôly aza aho ho an’ny sasany, dia apôstôly tokoa ho anareo. Satria noho ianareo tafaray amin’ny Tompo, dia ianareo mihitsy no porofon’ny maha apôstôly ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no avaliko an’ireo izay mitsikera ahy: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa tsy zonay ve ny mandray izay hohanina sy hosotroina avy aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moa tsy zonay ve ny mitondra vehivavy kristianina toy ny ataon’ireo apôstôly sy ny rahalahin’ny Tompo ary i Petera? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sa izahay sy i Barnabà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Barnabà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 9.27; 11.22-25, 30; sns.
    marker-yv: yv-n
  - type: text
    text: ' no hany tsy manan-jo hamela ny asa fivelomana?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza no miaramila hianto-tena rehefa miantafika? Iza no mpamboly voaloboka tsy mihinana ny vokatr’izay namboleny? Iza no mpiandry ondry aman’osy tsy mivelona amin’ny rononon’ny biby andrasany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy hoe araka ny fiheveran’ny besinimaro ihany no itenenako izany fa na ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lalànan
  - type: text
    text: '’i Mosesy koa aza dia milaza izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izao no voasoratra ao amin’io lalàna io: «Aza fehezina ny vavan’ny omby mively vary'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deot 25.4. Ampit 1Tim 5.18.
    marker-yv: yv-n
  - type: text
    text: '.» Moa dia ny omby ve no ahîn’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sa noho ny aminay indrindra no ilazany an’izany? Eny, noho ny aminay no nanoratana izany: ny mpiasa tany sy ny mpively vary manko dia samy tsy maintsy manatontosa ny asany amim-panantenana ny anjarany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha namafy taminareo ny soa avy amin’ny Fanahy Masina izahay, moa tafahoatra raha mba mijinja ny anjaranay amin’izay fanananareo ara-nofo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Rm 15.27.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ny olon-kafa aza manana izany zo izany, tsy mainka ve fa izahay?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Kanefa tsy nampiasa izany zo izany izahay, fa dia nihafy tamin’ny zavatra rehetra, mba tsy hisakantsakanana ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy fantatrareo ve fa ireo manao ny raharaha masina ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempoly
  - type: text
    text: ' dia mahazo hanina avy amin’ny zavatry ny tempoly, ary ireo miasa eo amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana dia mahazo anjara avy amin’ny zavatra atao sorona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Fisor 6.9, 19; Deot 18.1-3.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy izany koa no nameperan’ny Tompo fa izay mitory ny Vaovao Mahafaly dia hahazo fivelomana avy amin’izany asa izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mt 10.10; Lk 10.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha izaho anefa dia tsy nampiasa velively ireny zoko ireny; ary tsy hitaky ny hampiharana azy amiko no anoratako ny amin’izany. Fa aleoko maty toy izay... Tsy ekeko hofoanan’olona ny reharehako! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy hoe ny fitoriako ny Vaovao Mahafaly no ireharehako; adidy napetraka amiko izany ka lozako raha tsy mitory ny Vaovao Mahafaly aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha safidim-poko no anaovako izany, dia tokony hahazo valisoa aho; fa raha baiko no anaovako izany, dia andraikitra nankinin’Andriamanitra tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Inona àry no mba valisoa azoko? Dia izao: afa-manolotra maimaimpoana ny Vaovao Mahafaly izay torîko aho, ka tsy mampiasa ny zo omen’ny Vaovao Mahafaly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Olona tsy mpanompon’iza na iza tokoa aho, kanefa dia nilatsaka ho mpanompon’ny olona rehetra hahazoako maro araka izay tratra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin’ireo Jiosy, dia nanao tahaka ny Jiosy aho hahazoako azy ireo; na dia olona tsy fehezin’ny lalànan’i Mosesy intsony aza aho, dia nanao tahaka ireo fehezin’ny lalàna hahazoako azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin’ireo tsy mahalala ny lalànan’i Mosesy, dia nanao tahaka ireo tsy mahalala io lalàna io aho hahazoako azy ireo; tsy hoe tsy fehezin’ny lalànan’Andriamanitra aho, fa manoa ny lalànan’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin’ireo malemy finoana, dia nanao tahaka ny malemy aho hahazoako azy ireo. Amin’ny olona rehetra, dia efa tonga zavatra rehetra aho hamonjeko mihitsy ny sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany rehetra izany dia ataoko noho ny Vaovao Mahafaly mba hahatonga ahy ho mpiombona anjara amin’ny soa ampanantenainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy fantatrareo ve fa ny mpihazakazaka eo amin’ny kianja fifaninanana dia samy mihazakazaka daholo, nefa tokana ihany no mahazo ny loka? Mihazakazàha toy izany mba hahazoanareo loka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izay rehetra mpanao fanatanjahan-tena dia mahonon-tena fatratra. Ataony izany mba hahazoany satroboninahitra mety simba; fa ny antsika kosa dia ataontsika mba hahazoana satroboninahitra tsy mety simba. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa raha izaho, dia manao toy ny mpihazakazaka aho ka mikendry ny tanjona; mamely toy ny mpanao totohondry aho ka tsy mikapo-drivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Folahiko mafy ny tenako ary feheziko fatratra, fandrao izaho efa nitory tamin’ny hafa indray no tonga voailika.
