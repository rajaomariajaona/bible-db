document_id: 1CO.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny zo aman’andraikitry ny apôstôly
  - type: text
    content: Tsy olona afaka ve aho
  - type: note
    content: Ampit Asa 22.17-18; 26.16.
  - type: text
    content: '? Tsy apôstôly ve aho? Tsy efa nahita an’i Jesoa Tompontsika ve aho? Tsy vokatry ny asako amin’ny fanompoako ny Tompo ve ianareo? '
  '10':
  - type: text
    content: 'sa noho ny aminay indrindra no ilazany an’izany? Eny, noho ny aminay no nanoratana izany: ny mpiasa tany sy ny mpively vary manko dia samy tsy maintsy manatontosa ny asany amim-panantenana ny anjarany avy. '
  '11':
  - type: text
    content: Raha namafy taminareo ny soa avy amin’ny Fanahy Masina izahay, moa tafahoatra raha mba mijinja ny anjaranay amin’izay fanananareo ara-nofo
  - type: note
    content: Ampit Rm 15.27.
  - type: text
    content: '? '
  '12':
  - type: text
    content: Raha ny olon-kafa aza manana izany zo izany, tsy mainka ve fa izahay?
  - type: text
    content: 'Kanefa tsy nampiasa izany zo izany izahay, fa dia nihafy tamin’ny zavatra rehetra, mba tsy hisakantsakanana ilay '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' momba an’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '13':
  - type: text
    content: Tsy fantatrareo ve fa ireo manao ny raharaha masina ao an-
  - type: text
    content: tempoly
  - type: text
    content: ' dia mahazo hanina avy amin’ny zavatry ny tempoly, ary ireo miasa eo amin’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana dia mahazo anjara avy amin’ny zavatra atao sorona'
  - type: note
    content: Jereo Fisor 6.9, 19; Deot 18.1-3.
  - type: text
    content: '? '
  '14':
  - type: text
    content: Toy izany koa no nameperan’ny Tompo fa izay mitory ny Vaovao Mahafaly dia hahazo fivelomana avy amin’izany asa izany
  - type: note
    content: Jereo Mt 10.10; Lk 10.7.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Raha izaho anefa dia tsy nampiasa velively ireny zoko ireny; ary tsy hitaky ny hampiharana azy amiko no anoratako ny amin’izany. Fa aleoko maty toy izay... Tsy ekeko hofoanan’olona ny reharehako! '
  '16':
  - type: text
    content: 'Tsy hoe ny fitoriako ny Vaovao Mahafaly no ireharehako; adidy napetraka amiko izany ka lozako raha tsy mitory ny Vaovao Mahafaly aho. '
  '17':
  - type: text
    content: 'Raha safidim-poko no anaovako izany, dia tokony hahazo valisoa aho; fa raha baiko no anaovako izany, dia andraikitra nankinin’Andriamanitra tamiko. '
  '18':
  - type: text
    content: 'Inona àry no mba valisoa azoko? Dia izao: afa-manolotra maimaimpoana ny Vaovao Mahafaly izay torîko aho, ka tsy mampiasa ny zo omen’ny Vaovao Mahafaly.'
  '19':
  - type: text
    content: 'Olona tsy mpanompon’iza na iza tokoa aho, kanefa dia nilatsaka ho mpanompon’ny olona rehetra hahazoako maro araka izay tratra. '
  '2':
  - type: text
    content: Na dia tsy apôstôly aza aho ho an’ny sasany, dia apôstôly tokoa ho anareo. Satria noho ianareo tafaray amin’ny Tompo, dia ianareo mihitsy no porofon’ny maha apôstôly ahy.
  '20':
  - type: text
    content: 'Tamin’ireo Jiosy, dia nanao tahaka ny Jiosy aho hahazoako azy ireo; na dia olona tsy fehezin’ny lalànan’i Mosesy intsony aza aho, dia nanao tahaka ireo fehezin’ny lalàna hahazoako azy ireo. '
  '21':
  - type: text
    content: 'Tamin’ireo tsy mahalala ny lalànan’i Mosesy, dia nanao tahaka ireo tsy mahalala io lalàna io aho hahazoako azy ireo; tsy hoe tsy fehezin’ny lalànan’Andriamanitra aho, fa manoa ny lalànan’i Kristy. '
  '22':
  - type: text
    content: 'Tamin’ireo malemy finoana, dia nanao tahaka ny malemy aho hahazoako azy ireo. Amin’ny olona rehetra, dia efa tonga zavatra rehetra aho hamonjeko mihitsy ny sasany. '
  '23':
  - type: text
    content: Izany rehetra izany dia ataoko noho ny Vaovao Mahafaly mba hahatonga ahy ho mpiombona anjara amin’ny soa ampanantenainy.
  '24':
  - type: text
    content: 'Tsy fantatrareo ve fa ny mpihazakazaka eo amin’ny kianja fifaninanana dia samy mihazakazaka daholo, nefa tokana ihany no mahazo ny loka? Mihazakazàha toy izany mba hahazoanareo loka. '
  '25':
  - type: text
    content: 'Izay rehetra mpanao fanatanjahan-tena dia mahonon-tena fatratra. Ataony izany mba hahazoany satroboninahitra mety simba; fa ny antsika kosa dia ataontsika mba hahazoana satroboninahitra tsy mety simba. '
  '26':
  - type: text
    content: 'Koa raha izaho, dia manao toy ny mpihazakazaka aho ka mikendry ny tanjona; mamely toy ny mpanao totohondry aho ka tsy mikapo-drivotra. '
  '27':
  - type: text
    content: Folahiko mafy ny tenako ary feheziko fatratra, fandrao izaho efa nitory tamin’ny hafa indray no tonga voailika.
  '3':
  - type: text
    content: 'Izao no avaliko an’ireo izay mitsikera ahy: '
  '4':
  - type: text
    content: 'Moa tsy zonay ve ny mandray izay hohanina sy hosotroina avy aminareo? '
  '5':
  - type: text
    content: 'Moa tsy zonay ve ny mitondra vehivavy kristianina toy ny ataon’ireo apôstôly sy ny rahalahin’ny Tompo ary i Petera? '
  '6':
  - type: text
    content: Sa izahay sy i Barnabà
  - type: note
    content: 'Barnabà: jereo Asa 9.27; 11.22-25, 30; sns.'
  - type: text
    content: ' no hany tsy manan-jo hamela ny asa fivelomana?'
  '7':
  - type: text
    content: Iza no miaramila hianto-tena rehefa miantafika? Iza no mpamboly voaloboka tsy mihinana ny vokatr’izay namboleny? Iza no mpiandry ondry aman’osy tsy mivelona amin’ny rononon’ny biby andrasany?
  '8':
  - type: text
    content: 'Tsy hoe araka ny fiheveran’ny besinimaro ihany no itenenako izany fa na ny '
  - type: text
    content: lalànan
  - type: text
    content: '’i Mosesy koa aza dia milaza izany. '
  '9':
  - type: text
    content: 'Fa izao no voasoratra ao amin’io lalàna io: «Aza fehezina ny vavan’ny omby mively vary'
  - type: note
    content: Deot 25.4. Ampit 1Tim 5.18.
  - type: text
    content: '.» Moa dia ny omby ve no ahîn’Andriamanitra, '
