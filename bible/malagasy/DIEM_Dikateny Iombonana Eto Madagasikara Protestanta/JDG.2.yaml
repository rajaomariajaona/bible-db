document_id: JDG.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezan-tsiny nataon’ny Tompo tamin’ny vahoaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia niainga avy any Gilgala ka tonga tany Bokima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gilgala: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo Jos 4.19 sy nta. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bokima:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tanàna tsy fantatra mazava izay misy azy. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ny Mpitomany
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no dikan’ny hoe Bokima ka azo ampifandraisana amin’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Oakan’ny Fitomaniana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay eo akaikin’i Betela (Gen 35.8).'
      marker-yv: yv-n
    - type: text
      text: ' ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: 'n’ny TOMPO ary nanambara tamin’ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izaho no nampakatra anareo hiala tany Ejipta ka nampiditra anareo amin’ny tany izay nianianako homena ny razanareo. Ary nilaza Aho fa tsy hanapaka na oviana na oviana ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanako
    - type: text
      text: ' aminareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary rehefa tapitra maty avokoa izany taranaka izany ka voaangona any amin’ny razany, dia taranaka hafa indray no nandimby azy, taranaka izay tsy nahalala akory ny TOMPO sy ny asa nataony ho an’i Israely.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Niala tamin’ny Tompo ny vahoaka
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nanao izay ratsy eo imason’ny TOMPO ny Israelita fa nanompo ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' andriamani-tsiizy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nandao ny TOMPO Andriamanitry ny razambeny Izay nitondra azy niala tany Ejipta izy ka nandeha nanompo andriamani-tsiizy, dia ny andriamanitr’ireo firenena manodidina azy. Andriamani-tsiizy no niankohofan’ny Israelita; ka nahatezitra ny TOMPO izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny, nandao ny TOMPO tokoa ny Israelita mba hanompo ireo Bahala sy ireo Hastôreta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ampiarahina amin’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bahala i Hastôreta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay andriamani-bavin’ny fitiavana sy ny famokarana; niely fatratra ny fanajana an’i Hastôreta manerana ny Faritra Atsinanana manamorona ny Ranomasina Mediteranea.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nirehi-pahatezerana tamin’ny Israelita ny TOMPO, ka namela azy ho azon’ireo andian-dahalo izay nandroba azy; natolony ho resin’ny fahavalo manodidina izy, hany ka tsy nahatohitra ireny intsony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Isaky ny nandeha nanafika ireo Israelita, dia nataon’ny TOMPO resy foana araka izay efa nambarany mialoha sady efa nianianany; ka nijaly mafy ireo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nanangana mpitsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mpitsara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' resahina amin’ity boky ity dia olona anankinan’Andriamanitra andraikitra hitari-tafika na hifehy vahoaka na koa hanafaka foko anankiray na maromaro tojo fahasahiranana.'
      marker-yv: yv-n
    - type: text
      text: ' ho azy ny TOMPO, ka ireny no nanafaka azy tamin’ny fahefàn’ny dahalo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Kanefa ny Israelita tsy nankatò ihany koa ireo mpitsara azy, fa nandeha nanao fanompoan-tsampy tamin’ireo andriamani-tsiizy ka niankohoka teo anatrehany. Nalaky niala ny lalana izay nizoran’ireo razany tamin’ny fankatoavana ny didin’ny TOMPO izy, fa tsy mba nanahaka azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa isaky ny manangana mpitsara ho azy ny TOMPO, dia nomba izany mpitsara izany ka nanafaka ny Israelita tamin’ny fahefàn’ny fahavalony nandritra ny andro rehetra niainan’ilay mpitsara. Fa onena azy ny TOMPO, rehefa nitaraina izy noho ny nafitsok’ireo mpampahory sy mpampijaly azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Kanjo raha vao maty ilay mpitsara, dia miverina indray amin’ny ratsy fanaony mihoatra noho ireo razany ny Israelita, ka manompo andriamani-tsiizy sy miankohoka eo anatrehany. Tsy nialany akory ny ratsy fanaony sy ny toetra maditra mahazatra azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nizaha toetra ny Israelita ny Tompo
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ianareo kosa tsy tokony hanao fifanekena amin’ny mponina amin’ity tany ity fa tokony handrava ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.12-13; Deot 7.2-5.
      marker-yv: yv-n
    - type: text
      text: '. Kanjo tsy nanaraka ny teniko ianareo! Ahoana izao nataonareo izao? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nirehi-pahatezerana tamin’ny Israelita ny TOMPO, ka niteny azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ity firenena ity dia nandika ny fanekempihavanana izay nandidiako ny razany, fa tsy nankatò Ahy; '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'koa tsy handroaka na dia olona iray eo anoloany intsony Aho amin’ireo firenena izay tsy mbola resy tamin’ny andro nahafatesan’i Josoa. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa hampiasaiko ireny mba hizahako toetra azy na hanaraka ny sitrapoko ny Israelita ka hankatò Ahy tahaka izay nataon’ny razany na tsia.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Koa navelan’ny TOMPO haharitra teo amin’ny tany ireo firenena izay tsy natolony teo an-tanan’i Josoa; ary tsy nahamaika Azy ny handroaka ireny.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Noho izany tapa-kevitra Aho fa tsy handroaka azy eo anoloanareo. Ho fandrika hamely anareo izy; ary ho longoa hahavoa anareo koa ny andriamaniny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rehefa avy nilaza izany teny izany ilay anjelin’ny TOMPO, dia nanandra-peo nitomany kosa ny Israelita rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary izany toerana izany dia nantsoiny hoe Bokima na Mpitomany; dia nanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' teo izy ho an’ny TOMPO.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Josoa
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Rehefa nampodin’i Josoa ny vahoaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jos 24.1-28.
      marker-yv: yv-n
    - type: text
      text: ', dia samy nandeha namonjy ny anjara taniny avy ny Israelita rehetra, ka nahazo ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny vahoaka dia nanompo ny TOMPO nandritra ny andro rehetra niainan’i Josoa ary koa taorian’ny nahafatesany, izany hoe nandritra ny andro rehetra niainan’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' izay nahita ny zava-dehibe isan-karazany nataon’ny TOMPO ho an’i Israely. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary maty i Josoa, zanakalahin’i Nona sady mpanompon’ny TOMPO, rehefa feno 110 taona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia tao amin’ny faritra anjara lovany no nandevenana azy, izany hoe tao Timnata-Heresa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Timnata-Heresa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tanàna izay antsoina koa hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Timnata-Sera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (Jos 19.50; 24.30).'
      marker-yv: yv-n
    - type: text
      text: ', any amin’ny tany be tendrombohitra any Efraîma, eo avaratry ny tendrombohitra Gahasa. '
