document_id: 2SA.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Entina any Jerosalema ny Vatamasin’ny Tompo
  - type: heading
    content: (Jereo 1 Tan 13.4-14)
  - type: text
    content: 'Novorin’i Davida indray ireo miaramila voafantina rehetra tamin’i Israely izay misy antokony telopolo. '
  '10':
  - type: text
    content: Nolavin’i Davida ny hamindra ny Vatamasin’ny TOMPO ho any aminy, any an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: '; fa naviliny kosa izany ho ao an-tranon’i Hôbeda-Edôma, lehilahy avy any Gàta. '
  '11':
  - type: text
    content: 'Telo volana no nipetrahan’ny Vatamasin’ny TOMPO tao an-tranon’io Hôbeda-Edôma avy any Gata io; ary dia '
  - type: text
    content: notahîn
  - type: text
    content: ’ny TOMPO i Hôbeda-Edôma sy ny ankohonany manontolo
  - type: note
    content: Jereo 1 Tan 26.4-5.
  - type: text
    content: .
  - type: heading
    content: Fahatongavan’ny Vatamasina tao Jerosalema
  - type: heading
    content: (Jereo 1 Tan 15.25–16.3)
  '12':
  - type: text
    content: 'Nisy nilaza tamin’i Davida mpanjaka fa ny TOMPO efa '
  - type: text
    content: nitahy
  - type: text
    content: ' ny ankohonan’i Hôbeda-Edôma sy izay nananany rehetra noho ny amin’ny '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: . Dia niainga i Davida nampakatra ny Vatamasin’Andriamanitra avy tao an-tranon’i Hôbeda-Edôma ho any an-
  - type: text
    content: tanànan’i Davida
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Rehefa namindra inenina ireo mpitondra ny Vatamasin’ny TOMPO, dia nanao sorona omby sy zanak’omby matavy i Davida. '
  '14':
  - type: text
    content: 'Nandihy araka ny heriny manontolo teo anatrehan’ny TOMPO i Davida, izay efôda rongony fotsy ihany no nisalorany. '
  '15':
  - type: text
    content: Ary i Davida sy ny Israelita rehetra teo dia nitondra ny Vatamasin’ny TOMPO tamin’ny hoby sy ny feon’anjomara nankany Jerosalema.
  '16':
  - type: text
    content: 'Fa rehefa tonga tao an-tanànan’i Davida ny Vatamasin’ny TOMPO, dia nitsirika teo am-baravarankely i Mikàla zanakavavin’i Saoly ka nony nahita an’i Davida mpanjaka nandihy sy nibitaka teo anatrehan’ny TOMPO izy, dia naneso azy anakampony. '
  '17':
  - type: text
    content: 'Dia nampidirina ny Vatamasin’ny TOMPO ka napetraka teo amin’ny toerana voatokana tao anatin’ny tranolay izay efa natsangan’i Davida ho azy. Ary i Davida avy eo nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana teo anatrehan’ny TOMPO. '
  '18':
  - type: text
    content: 'Rehefa nahavita ireo sorona ireo i Davida, dia nitsodrano ny vahoaka tamin’ny anaran’ilay TOMPOn’izao rehetra izao. '
  '19':
  - type: text
    content: Nasainy nizarana sakafo ny Israelita rehetra teo, ka na lehilahy na vehivavy dia samy nahazo mofomamy iray sy didin-kena voatono iray ary ampempam-boaloboka iray avy. Dia samy nody tany an-tranony avy ny olona rehetra
  - type: note
    content: 'nody any aminy: jereo 1 Tan 16.43.'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Dia niainga i Davida sy izany tafika manontolo nomba azy izany ka niala tao Bahala-Joda mba hampakatra ny '
  - type: text
    content: Vatamasin’Andriamanitra
  - type: text
    content: ' fa eo amin’io Vatamasina io no iantsoana ny anaran’ilay TOMPOn’izao rehetra izao, dia Ilay mipetraka eo ambonin’ny '
  - type: text
    content: Kerobima
  - type: text
    content: .
  - type: note
    content: 'Bahala-Joda: anarana hafa iantsoana an’i Kiriata-Jeharîma (Jereo 1 Sam 6.21; 7.1). –mipetraka eo ambonin’ny Kerobima: jereo Eks 25.22.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Ary i Davida koa lasa nody mba hiarahaba ny ankohonany. Fa avy hatrany dia notsenain’i Mikàla zanakavavin’i Saoly izy, ka nataony hoe:'
  - type: text
    content: –Endrey izany voninahitry ny mpanjakan’i Israely androany, dia ilay nanary lamba anikeheo teo anatrehan’ny mpanompovavin’ny andevony, tahaka ny adala manary lamba!
  '21':
  - type: text
    content: 'Hoy kosa i Davida tamin’i Mikàla:'
  - type: text
    content: '–Ho fanajana ny TOMPO no nanaovako izany, dia Izy Ilay nifidy ahy mihoatra noho ny rainao sy ny ankohonany manontolo, ka nanao ahy ho filohan’i Israely vahoakany. Eny, ho fanajana ny TOMPO no mbola hitsinjahako; '
  '22':
  - type: text
    content: ary mbola hietry kokoa noho izany aza aho sady hanao tsinontsinona ny tenako, fa izany no hahabe voninahitra ahy, na dia eo anatrehan’ireo mpanompovavy lazainao ireo aza.
  '23':
  - type: text
    content: Dia tsy nanan-janaka mandra-pahafatiny intsony i Mikàla zanakavavin’i Saoly.
  '3':
  - type: text
    content: Tao an-tranon’i Abinadaba teo an-kavoana ilay Vatamasina, dia nataingina teo ambany sarety vaovao ary nentina. I Hozà sy i Ahiao samy zanakalahin’i Abinadaba no nitondra ny sarety
  - type: note
    content: Araka ny stf hebreo hita tao Komrana sy ny dkt grika tranainy; eto ny RM mahazatra dia mamerina tsy nahy ny teny vaovao ary nentina; tao an-tranon’i Abinadaba, teo an-kavoana izy. –Jereo 1 Sam 7.1-2.
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'izay nitoeran’ny Vatamasina, ka i Ahiao no nialoha lalana. '
  '5':
  - type: text
    content: 'Niravoravo teo anatrehan’ny TOMPO i Davida sy ny Israelita rehetra tamin’ny fampiasana zava-maneno vita tamin’ny hazo kipresy, dia ny lokanga sy ny valiha, mbamin’ny ampongatapaka sy ny korintsana ary ny kipantsona. '
  '6':
  - type: text
    content: 'Nony tonga teo akaikin’ny famoloan’i Nakôna izy ireo, dia naninji-tanana hihazona ny Vatamasina i Hozà satria saika hazeran’ny omby io. '
  '7':
  - type: text
    content: Nirehi-pahatezerana tamin’i Hozà ny TOMPO Andriamanitra ka namono nahafaty azy noho ny fihetsika tsy voahevitra nataony
  - type: note
    content: ny fihetsika tsy voahevitr’i Hôza dia ny nikasihany ny Vatamasina izay ny levita ihany no afaka manao izany (Jereo Deot 10.8).
  - type: text
    content: ; dia teo akaikin’ny vatamasin’Andriamanitra teo izy no maty.
  '8':
  - type: text
    content: Taitra noho ny namelezan’ny TOMPO mafy an’i Hozà i Davida, ka dia nataony hoe Peretsa-Hozà
  - type: note
    content: Amin’ny teny hebreo dia misy tsilalaon-teny eo amin’ny matoanteny nadika hoe namelezana mafy sy ny anarana Peretsa.
  - type: text
    content: 'ny anaran’io toerana io; ary mbola izany no fiantso azy mandraka androany. '
  '9':
  - type: text
    content: 'Natahotra ny TOMPO i Davida tamin’izany andro izany ka nanao hoe:'
  - type: text
    content: –Nahoana no hiditra atỳ amiko ny Vatamasin’ny TOMPO?
