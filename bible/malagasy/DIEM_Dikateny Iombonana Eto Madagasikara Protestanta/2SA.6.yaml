document_id: 2SA.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entina any Jerosalema ny Vatamasin’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 13.4-14)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorin’i Davida indray ireo miaramila voafantina rehetra tamin’i Israely izay misy antokony telopolo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nolavin’i Davida ny hamindra ny Vatamasin’ny TOMPO ho any aminy, any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: '; fa naviliny kosa izany ho ao an-tranon’i Hôbeda-Edôma, lehilahy avy any Gàta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telo volana no nipetrahan’ny Vatamasin’ny TOMPO tao an-tranon’io Hôbeda-Edôma avy any Gata io; ary dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: notahîn
    - type: text
      text: ’ny TOMPO i Hôbeda-Edôma sy ny ankohonany manontolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Tan 26.4-5.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahatongavan’ny Vatamasina tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo 1 Tan 15.25–16.3)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy nilaza tamin’i Davida mpanjaka fa ny TOMPO efa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: nitahy
    - type: text
      text: ' ny ankohonan’i Hôbeda-Edôma sy izay nananany rehetra noho ny amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasin’Andriamanitra
    - type: text
      text: . Dia niainga i Davida nampakatra ny Vatamasin’Andriamanitra avy tao an-tranon’i Hôbeda-Edôma ho any an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: tanànan’i Davida
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa namindra inenina ireo mpitondra ny Vatamasin’ny TOMPO, dia nanao sorona omby sy zanak’omby matavy i Davida. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandihy araka ny heriny manontolo teo anatrehan’ny TOMPO i Davida, izay efôda rongony fotsy ihany no nisalorany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary i Davida sy ny Israelita rehetra teo dia nitondra ny Vatamasin’ny TOMPO tamin’ny hoby sy ny feon’anjomara nankany Jerosalema.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa tonga tao an-tanànan’i Davida ny Vatamasin’ny TOMPO, dia nitsirika teo am-baravarankely i Mikàla zanakavavin’i Saoly ka nony nahita an’i Davida mpanjaka nandihy sy nibitaka teo anatrehan’ny TOMPO izy, dia naneso azy anakampony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampidirina ny Vatamasin’ny TOMPO ka napetraka teo amin’ny toerana voatokana tao anatin’ny tranolay izay efa natsangan’i Davida ho azy. Ary i Davida avy eo nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana teo anatrehan’ny TOMPO. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nahavita ireo sorona ireo i Davida, dia nitsodrano ny vahoaka tamin’ny anaran’ilay TOMPOn’izao rehetra izao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nasainy nizarana sakafo ny Israelita rehetra teo, ka na lehilahy na vehivavy dia samy nahazo mofomamy iray sy didin-kena voatono iray ary ampempam-boaloboka iray avy. Dia samy nody tany an-tranony avy ny olona rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'nody any aminy:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 1 Tan 16.43.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga i Davida sy izany tafika manontolo nomba azy izany ka niala tao Bahala-Joda mba hampakatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasin’Andriamanitra
    - type: text
      text: ' fa eo amin’io Vatamasina io no iantsoana ny anaran’ilay TOMPOn’izao rehetra izao, dia Ilay mipetraka eo ambonin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kerobima
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Bahala-Joda: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana hafa iantsoana an’i Kiriata-Jeharîma (Jereo 1 Sam 6.21; 7.1). –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'mipetraka eo ambonin’ny Kerobima:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo Eks 25.22.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary i Davida koa lasa nody mba hiarahaba ny ankohonany. Fa avy hatrany dia notsenain’i Mikàla zanakavavin’i Saoly izy, ka nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Endrey izany voninahitry ny mpanjakan’i Israely androany, dia ilay nanary lamba anikeheo teo anatrehan’ny mpanompovavin’ny andevony, tahaka ny adala manary lamba!
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa i Davida tamin’i Mikàla:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ho fanajana ny TOMPO no nanaovako izany, dia Izy Ilay nifidy ahy mihoatra noho ny rainao sy ny ankohonany manontolo, ka nanao ahy ho filohan’i Israely vahoakany. Eny, ho fanajana ny TOMPO no mbola hitsinjahako; '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ary mbola hietry kokoa noho izany aza aho sady hanao tsinontsinona ny tenako, fa izany no hahabe voninahitra ahy, na dia eo anatrehan’ireo mpanompovavy lazainao ireo aza.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy nanan-janaka mandra-pahafatiny intsony i Mikàla zanakavavin’i Saoly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tao an-tranon’i Abinadaba teo an-kavoana ilay Vatamasina, dia nataingina teo ambany sarety vaovao ary nentina. I Hozà sy i Ahiao samy zanakalahin’i Abinadaba no nitondra ny sarety
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ny stf hebreo hita tao Komrana sy ny dkt grika tranainy; eto ny RM mahazatra dia mamerina tsy nahy ny teny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: vaovao ary nentina; tao an-tranon’i Abinadaba, teo an-kavoana izy.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' –Jereo 1 Sam 7.1-2.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nitoeran’ny Vatamasina, ka i Ahiao no nialoha lalana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niravoravo teo anatrehan’ny TOMPO i Davida sy ny Israelita rehetra tamin’ny fampiasana zava-maneno vita tamin’ny hazo kipresy, dia ny lokanga sy ny valiha, mbamin’ny ampongatapaka sy ny korintsana ary ny kipantsona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga teo akaikin’ny famoloan’i Nakôna izy ireo, dia naninji-tanana hihazona ny Vatamasina i Hozà satria saika hazeran’ny omby io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nirehi-pahatezerana tamin’i Hozà ny TOMPO Andriamanitra ka namono nahafaty azy noho ny fihetsika tsy voahevitra nataony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fihetsika tsy voahevitr’i Hôza dia ny nikasihany ny Vatamasina izay ny levita ihany no afaka manao izany (Jereo Deot 10.8).
      marker-yv: yv-n
    - type: text
      text: ; dia teo akaikin’ny vatamasin’Andriamanitra teo izy no maty.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taitra noho ny namelezan’ny TOMPO mafy an’i Hozà i Davida, ka dia nataony hoe Peretsa-Hozà
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amin’ny teny hebreo dia misy tsilalaon-teny eo amin’ny matoanteny nadika hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: namelezana mafy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' sy ny anarana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Peretsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ny anaran’io toerana io; ary mbola izany no fiantso azy mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Natahotra ny TOMPO i Davida tamin’izany andro izany ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nahoana no hiditra atỳ amiko ny Vatamasin’ny TOMPO?
