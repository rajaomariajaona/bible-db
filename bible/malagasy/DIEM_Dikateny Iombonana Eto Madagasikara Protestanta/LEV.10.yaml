document_id: LEV.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fepetra momba ny fisaonana
  - type: text
    content: 'Tamin’izay kosa dia samy naka ny fanembohany avy ry i Nadaba sy i Abihò, zanakalahin’i Aharôna, ka nanisy vain’afo teo anatiny sy nametraka vovo-javamanitra teo ambonin’ny vain’afo ary nanolotra izany teo anatrehan’ny TOMPO: zavatra tsy mifanaraka amin’izay nandidian’ny TOMPO azy izany. '
  '10':
  - type: text
    content: 'Aza misotro zava-pisotro mahamamo ianareo, rehefa hanavaka ny zavatra masina sy tsy masina ary ny zavatra '
  - type: text
    content: madio
  - type: text
    content: ' sy tsy madio, '
  '11':
  - type: text
    content: na koa rehefa hampianatra ny Israelita ny lalàna rehetra izay nampitaiko ho azy ireo tamin’ny alalan’i Mosesy.
  - type: heading
    content: Fepetra momba ny hanina avy amin’ny sorona amam-panatitra
  '12':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Aharôna ary tamin’i Elehazara sy i Itamara zananilahy sisa velona:'
  - type: text
    content: '–Alao ny fanatitra lafarinina ambiny, rehefa nesorina ny ampahany nolevonina tamin’ny afo mba ho an’ny TOMPO; dia ataovy mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ' ka hano eo anilan’ny '
  - type: text
    content: alitara
  - type: text
    content: ', satria zava-masina dia masina izany sakafo izany. '
  '13':
  - type: text
    content: Eo amin’ny faritra voatokana ho an’izany ihany no hihinananareo azy, fa anjaranao sy ny zanakao izany ambiny avy amin’ny fanatitra ho an’ny TOMPO izany araka ny baiko nomeny ahy
  - type: note
    content: 'And 12-13: jereo 6.7-11.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ireo didin-kena avy amin’ny '
  - type: text
    content: sorom-pihavanana
  - type: text
    content: ' ataon’ny Israelita, izany hoe ny tratrany izay nahevaheva no fomba fanolorana azy sy ny feny izay navahana manokana, dia eo amina toerana '
  - type: text
    content: madio
  - type: text
    content: ' no hihinananareo azy; ianao sy ny taranakao lahy ary ny taranakao vavy koa aza no hihinana azy fa nomena ho anjaranao sy ny taranakao ireo didin-kena ireo. '
  '15':
  - type: text
    content: Ny feny izay navahana manokana sy ny tratrany izay nahevaheva no fomba fanolorana azy dia entin’ny Israelita miaraka amin’ny tavin-kena izay hodorana amin’ny afo. Hahevaheva eo anatrehan’ny TOMPO ireo didin-kena ireo; avy eo dia ho anao sy ny zanakao. Anjara raikitra ho anareo hatrany hatrany ireo, araka ny baikon’ny TOMPO
  - type: note
    content: 'And 14-15: jereo 7.30-34.'
  - type: text
    content: .
  '16':
  - type: text
    content: Ary namotopototra momba ilay osilahy natao sorona ho fanalana ny otan’ny vahoaka i Mosesy
  - type: note
    content: Jereo 9.3, 15.
  - type: text
    content: '. Ka nampahalalaina azy fa efa kilan’ny afo izany. Dia tezitra tamin’i Elehazara sy i Itamara, zanakalahin’i Aharôna sisa velona, i Mosesy ka nanontany azy hoe:'
  '17':
  - type: text
    content: –Zava-masina dia masina ny hena avy amina sorona fanalana ny ota, ka nahoana no tsy nohaninareo teo amin’ny faritra voatokana hihinanana azy? Efa nomen’ny TOMPO anareo izany mba hahazoanareo manafaka ny fahotana vitan’ny Fiangonan’ny Israelita tsivakivolo sy manao ny fombam-pivavahana famelan-keloka ho azy eo anatrehan’ny Tompo
  - type: note
    content: Jereo 6.17-19.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Ny ran’ilay biby natao sorona dia tsy nampidirina tao anatin’ny Toeramasina, ka tokony ho teo amin’ny faritra voatokana ho an’izany no nihinananareo ny henany, araka izay nandidiako anareo.
  '19':
  - type: text
    content: 'Dia i Aharôna kosa no namaly an’i Mosesy hoe:'
  - type: text
    content: –Amin’izao andro nanateran’ny Israelita ny sorona fanalana ny otany sy ny sorona dorana manontolo teo anatrehan’ny TOMPO izao, dia fantatrao ny fahoriana nidona tamiko. Koa azoko natao ve, amin’ny andro toy izao, ny nihinana ny henan’ilay sorona fanalana ny ota? Tsy ho nankasitrahin’ny TOMPO velively izany
  - type: note
    content: Ny rijan-teny hebreo, amin’ity and ity, dia manjavozavo ka tsy azo antoka ny dkt.
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Koa nisy afo nivoaka avy teo anatrehan’ny TOMPO ka nandoro an’i Nadaba sy i Abihò; hany ka maty teo amin’ny Toeramasina teo izy roa lahy. '
  '20':
  - type: text
    content: Rehefa ren’i Mosesy izany valin-tenin’i Aharôna izany, dia nankasitrahiny.
  '3':
  - type: text
    content: 'Dia hoy i Mosesy tamin’i Aharôna:'
  - type: text
    content: '–Efa voalazan’ny TOMPO izany, fony Izy nanao hoe:'
  - type: text
    content: «Izay hanakaiky Ahy dia tiako hanaja ny fahamasinako,
  - type: text
    content: ary hanome voninahitra Ahy eo anatrehan’ny vahoaka rehetra.»
  - type: text
    content: Dia nanao hiram-pisaonana i Aharôna
  - type: note
    content: 'Dia nanao... Aharôna: dkt hafa Dia sina i Aharôna.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Nampanalain’i Mosesy kosa ry i Misaela sy i Elitsafàna, samy zanakalahin’i Hoziela izay rahalahin-drain’i Aharôna, ka nilazany hoe:'
  - type: text
    content: 'Manatona ianareo ka ento ny fatin’ny havanareo hiala eo amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ', ho any ivelan’ny toby.'
  '5':
  - type: text
    content: 'Dia nanatona izy roa lahy ka nitondra ny faty mbola miakanjo ny fanamiany, ho any ivelan’ny toby araka izay voalazan’i Mosesy. '
  '6':
  - type: text
    content: 'Ary hoy kosa i Mosesy tamin’i Aharôna sy tamin-dry i Elehazara sy i Itamara zanany roa lahy hafa:'
  - type: text
    content: '–Aza avela hirakaraka ny volon-dohanareo ary aza '
  - type: text
    content: triarina
  - type: text
    content: ' ny fanamianareo, fandrao dia ho faty eo koa ianareo sady hiharan’ny fahatezeran’ny TOMPO ireto Israelita rehetra tafangona. Fa ny mpiray firenena aminareo, izany hoe ny taranak’i Israely rehetra, no aoka hitomany, noho izy roa lahy nofaizin’ny TOMPO tamin’ny afo mandoro. '
  '7':
  - type: text
    content: 'Ianareo kosa aza miala eo anoloan’ny varavaran’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', fandrao maty ianareo; satria voatokana ho an’ny TOMPO ianareo noho ny menaka nanosorana anareo.'
  - type: text
    content: Dia nanao araka ny tenin’i Mosesy izy telo mianaka.
  - type: heading
    content: Fepetra momba ny zava-pisotro mahamamo
  '8':
  - type: text
    content: 'Ary niteny tamin’i Aharôna ny TOMPO ka nanao hoe:'
  '9':
  - type: text
    content: –Aza misotro divay na zava-pisotro hafa mahamamo ianao sy ny zanakao, rehefa hiditra ao an-
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ', mba tsy ho faty ianareo; lalàna raikitra ho anareo sy ny taranakareo izany. '
