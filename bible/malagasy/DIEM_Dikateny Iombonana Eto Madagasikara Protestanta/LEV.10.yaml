document_id: LEV.10,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra momba ny fisaonana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin’izay kosa dia samy naka ny fanembohany avy ry i Nadaba sy i Abihò, zanakalahin’i Aharôna, ka nanisy vain’afo teo anatiny sy nametraka vovo-javamanitra teo ambonin’ny vain’afo ary nanolotra izany teo anatrehan’ny TOMPO: zavatra tsy mifanaraka amin’izay nandidian’ny TOMPO azy izany. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aza misotro zava-pisotro mahamamo ianareo, rehefa hanavaka ny zavatra masina sy tsy masina ary ny zavatra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' sy tsy madio, '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: na koa rehefa hampianatra ny Israelita ny lalàna rehetra izay nampitaiko ho azy ireo tamin’ny alalan’i Mosesy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra momba ny hanina avy amin’ny sorona amam-panatitra
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy i Mosesy tamin’i Aharôna ary tamin’i Elehazara sy i Itamara zananilahy sisa velona:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Alao ny fanatitra lafarinina ambiny, rehefa nesorina ny ampahany nolevonina tamin’ny afo mba ho an’ny TOMPO; dia ataovy mofo tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: leviora
    - type: text
      text: ' ka hano eo anilan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ', satria zava-masina dia masina izany sakafo izany. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eo amin’ny faritra voatokana ho an’izany ihany no hihinananareo azy, fa anjaranao sy ny zanakao izany ambiny avy amin’ny fanatitra ho an’ny TOMPO izany araka ny baiko nomeny ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 12-13:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 6.7-11.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ireo didin-kena avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorom-pihavanana
    - type: text
      text: ' ataon’ny Israelita, izany hoe ny tratrany izay nahevaheva no fomba fanolorana azy sy ny feny izay navahana manokana, dia eo amina toerana '
    - type: usfm
      marker: w
      children:
      - type: text
        text: madio
    - type: text
      text: ' no hihinananareo azy; ianao sy ny taranakao lahy ary ny taranakao vavy koa aza no hihinana azy fa nomena ho anjaranao sy ny taranakao ireo didin-kena ireo. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny feny izay navahana manokana sy ny tratrany izay nahevaheva no fomba fanolorana azy dia entin’ny Israelita miaraka amin’ny tavin-kena izay hodorana amin’ny afo. Hahevaheva eo anatrehan’ny TOMPO ireo didin-kena ireo; avy eo dia ho anao sy ny zanakao. Anjara raikitra ho anareo hatrany hatrany ireo, araka ny baikon’ny TOMPO
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 14-15:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 7.30-34.'
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary namotopototra momba ilay osilahy natao sorona ho fanalana ny otan’ny vahoaka i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 9.3, 15.
      marker-yv: yv-n
    - type: text
      text: '. Ka nampahalalaina azy fa efa kilan’ny afo izany. Dia tezitra tamin’i Elehazara sy i Itamara, zanakalahin’i Aharôna sisa velona, i Mosesy ka nanontany azy hoe:'
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: –Zava-masina dia masina ny hena avy amina sorona fanalana ny ota, ka nahoana no tsy nohaninareo teo amin’ny faritra voatokana hihinanana azy? Efa nomen’ny TOMPO anareo izany mba hahazoanareo manafaka ny fahotana vitan’ny Fiangonan’ny Israelita tsivakivolo sy manao ny fombam-pivavahana famelan-keloka ho azy eo anatrehan’ny Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 6.17-19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny ran’ilay biby natao sorona dia tsy nampidirina tao anatin’ny Toeramasina, ka tokony ho teo amin’ny faritra voatokana ho an’izany no nihinananareo ny henany, araka izay nandidiako anareo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia i Aharôna kosa no namaly an’i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Amin’izao andro nanateran’ny Israelita ny sorona fanalana ny otany sy ny sorona dorana manontolo teo anatrehan’ny TOMPO izao, dia fantatrao ny fahoriana nidona tamiko. Koa azoko natao ve, amin’ny andro toy izao, ny nihinana ny henan’ilay sorona fanalana ny ota? Tsy ho nankasitrahin’ny TOMPO velively izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny rijan-teny hebreo, amin’ity and ity, dia manjavozavo ka tsy azo antoka ny dkt.
      marker-yv: yv-n
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa nisy afo nivoaka avy teo anatrehan’ny TOMPO ka nandoro an’i Nadaba sy i Abihò; hany ka maty teo amin’ny Toeramasina teo izy roa lahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Rehefa ren’i Mosesy izany valin-tenin’i Aharôna izany, dia nankasitrahiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy i Mosesy tamin’i Aharôna:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa voalazan’ny TOMPO izany, fony Izy nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Izay hanakaiky Ahy dia tiako hanaja ny fahamasinako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hanome voninahitra Ahy eo anatrehan’ny vahoaka rehetra.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao hiram-pisaonana i Aharôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Dia nanao... Aharôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dia sina i Aharôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nampanalain’i Mosesy kosa ry i Misaela sy i Elitsafàna, samy zanakalahin’i Hoziela izay rahalahin-drain’i Aharôna, ka nilazany hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manatona ianareo ka ento ny fatin’ny havanareo hiala eo amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: ', ho any ivelan’ny toby.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nanatona izy roa lahy ka nitondra ny faty mbola miakanjo ny fanamiany, ho any ivelan’ny toby araka izay voalazan’i Mosesy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy kosa i Mosesy tamin’i Aharôna sy tamin-dry i Elehazara sy i Itamara zanany roa lahy hafa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza avela hirakaraka ny volon-dohanareo ary aza '
    - type: usfm
      marker: w
      children:
      - type: text
        text: triarina
    - type: text
      text: ' ny fanamianareo, fandrao dia ho faty eo koa ianareo sady hiharan’ny fahatezeran’ny TOMPO ireto Israelita rehetra tafangona. Fa ny mpiray firenena aminareo, izany hoe ny taranak’i Israely rehetra, no aoka hitomany, noho izy roa lahy nofaizin’ny TOMPO tamin’ny afo mandoro. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ianareo kosa aza miala eo anoloan’ny varavaran’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', fandrao maty ianareo; satria voatokana ho an’ny TOMPO ianareo noho ny menaka nanosorana anareo.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao araka ny tenin’i Mosesy izy telo mianaka.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra momba ny zava-pisotro mahamamo
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary niteny tamin’i Aharôna ny TOMPO ka nanao hoe:'
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: –Aza misotro divay na zava-pisotro hafa mahamamo ianao sy ny zanakao, rehefa hiditra ao an-
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tranolay fihaonana
    - type: text
      text: ', mba tsy ho faty ianareo; lalàna raikitra ho anareo sy ny taranakareo izany. '
