      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'iray tamin’ny fotoam-pahasahiranana: lehilahy izay nijaly noho ny fahorian’ny hafa izy, namotsipotsitra ny ratsy ka miantso an’Andriamanitra ary faly rehefa mandray ny valin-teniny. Ity boky ity dia tokony ho voasoratra tamin’ny faramparan’ny taonjato fahafito ka hatramin’ny fiandohan’ny taonjato fahenina tal J.K., dia tamin’ny fotoana izay nanjakazakan’ny Babilônianina tamin’iny faritra Atsinanana akaikin’i Mediteranea iny sy tamin’ny fotoana izay nampanontany tena fatratra ny fikambanambe israelita momba izay hoaviny sy izay fifandraisany amin’Andriamanitra.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Namaly ny mpaminany Andriamanitra tamin’ny alalan’ny hafatra nampitondrainy azy ho an’ireo mpiara-belona taminy, ary ho an’ny olona amin’ny taona mifandimby: raha Andriamanitra no inoan’ny olona sy iraiketany, dia ho velona izy (2.4) ary hiandry amim-pahatokiana ny famalian’Andriamanitra (toko fahatelo).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao anatin’ny fotoan-tsarotra, dia matetika no nandraisana ny bokin’i Habakòka mba hahatsapana izany antoka izany. Tamin’ny toriteny izay nataon’ny Apôstôly Paoly tamin’ireo vondrona kristianina voalohany, ny firaiketan’ny olona amin’Andriamanitra dia maka ny endriky ny finoana an’ilay Andriamanitr’i Jesoa Kristy (Rom 1.17; Gal 3.11; Heb 10.38).
