document_id: EZK.36,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ho azon’ny Israelita indray ny taniny
  - type: text
    content: «Ary ianao, ry ilay taranak’olombelona, ijoroy ny maha-
  - type: text
    content: mpaminany
  - type: text
    content: ' anao ny amin’ireo tendrombohitr’i Israely. Asaovy henoiny ny teniko, '
  '10':
  - type: text
    content: 'Hohamaroiko ny mponina manerana ny tanin’i Israely. Honenana indray ireo tanàna satria efa voaorina ny rava. '
  '11':
  - type: text
    content: 'Hohamaroiko ny olona sy ny biby fiompy eo aminareo ka hitombo isa sy hiteraka. Ho betsaka tahaka ny taloha ny mponina ary hataoko mandroso kokoa noho ny fahizany. Amin’izay dia hoekenareo fa Izaho no TOMPO. '
  '12':
  - type: text
    content: 'Hampivoivoy anareo ao amin’ny tany Aho, ry Israelita vahoakako. Haka azy ho fanananareo ianareo; dia ho lasanareo izy ka tsy hahalany fara anareo intsony.› '
  '13':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tany mandripaka olona hono ianao, ry Israely, ka mahalany fara ny firenenao. '
  '14':
  - type: text
    content: 'Ankehitriny, tsy ho tany mandripaka olona izany intsony ianao ary tsy hahalany taranaka intsony ny firenenao; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '15':
  - type: text
    content: Tsy hataoko renareo intsony ary tsy hitambesatra aminareo intsony ny fanarabiana sy sahato ataon’ny firenen-kafa satria tsy hamono ny zanakareo ho faty intsony ny taninareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
  - type: heading
    content: Hovorin’ny Tompo ny Israelita
  '16':
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '17':
  - type: text
    content: '«Ry ilay taranak’olombelona, fony mbola teo amin’ny taniny ny Israelita dia '
  - type: text
    content: nandoto
  - type: text
    content: ' izany tamin’ny fitondrantenany sy ny asany. Eny, teo imasoko ny fitondrantenany dia naloto tahaka ny fadimbolan’ny vehivavy'
  - type: note
    content: Momba ny fahalotoan’ny vehivavy mandritra ny fadimbolany, jereo Lev 15.19-22.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Fa nolotoiny tamin’ny vonoan’olona sy ny sampiny ny taniny, hany ka natosako tamin’ny Israelita ny fahatezerako. '
  '19':
  - type: text
    content: 'Naeliko ho any amin’ireo firenena izy ary naparitako ho any amin’ny tany samy hafa. Izany no namaizako azy araka ny fitondrantenany sy ny asany. '
  '2':
  - type: text
    content: 'fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nihomehy anareo ny fahavalonareo nanao hoe: Akory izay! Lasa fanananay izao ireo havoana fahagolan’i Israely.› '
  '20':
  - type: text
    content: 'Kanefa tany amin’ireo firenen-kafa izay nalehany dia nozimbazimbainy ny anarako masina noho ny fahadisoany. Fa nolazain’ny olona hoe: ‹Vahoakan’ny TOMPO ireo, nefa voatery nandao ny taniny!› '
  '21':
  - type: text
    content: 'Koa nangoraka Aho nahita ny anarako masina nozimbazimbaina tany amin’ny firenen-kafa noho ny fahadisoan’ny Israelita lasa tany. '
  '22':
  - type: text
    content: 'Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: Izay hataoko, ry Israelita, dia tsy noho ny aminareo no hanaovako azy, fa mba hanajana ny anarako masina izay nozimbazimbainareo tany amin’ny firenena izay nalehanareo. '
  '23':
  - type: text
    content: Nefa na dia nanimbazimba Ahy teo imason’ireny aza ianareo, dia hasehoko azy kosa fa Andriamanitra lehibe sy masina Aho, ary ianareo no hampiasaiko hanehoako izany. Amin’izay dia hoeken’ireo fa Izaho no TOMPO; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
  '24':
  - type: text
    content: '«Fa halaiko avy any amin’ny firenen-kafa ianareo ary hangoniko avy any amin’ny tany rehetra any, dia haveriko ao an-tanindrazanareo. '
  '25':
  - type: text
    content: 'Hofafazako rano madio ianareo, dia hadio; eny, hodioviko ho afaka amin’ny fahalotoanareo rehetra sy ny fanompoan-tsampinareo rehetra ianareo. '
  '26':
  - type: text
    content: 'Homeko fo vaovao ianareo ary fanahy vaovao no hataoko ao anatinareo. Hoesoriko aminareo ny fo tsy miraika toy ny vato ka hosoloiko fo mora anarina. '
  '27':
  - type: text
    content: 'Ny Fanahiko mihitsy no hapetrako ao anatinareo, ka hataoko manaraka ny lalànako ianareo, ary hitandrina sy hanatanteraka ny fitsipiko. '
  '28':
  - type: text
    content: 'Dia honenanareo ny tany izay nomeko ny razanareo; ka ho vahoakako ianareo ary Izaho kosa ho Andriamanitrareo. '
  '29':
  - type: text
    content: 'Hovonjeko ho afaka amin’ny fahalotoanareo rehetra ianareo. Tsy handefasako mosary intsony ianareo fa hampaniriako sady hataoko vokatra be ny varinareo. '
  '3':
  - type: text
    content: 'Ijoroy ny maha-mpaminany anao, ry Ezekiela, ary ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tsapako fa ny tany manodidina dia nifofotra handrava sy nitsiriritra ireo tendrombohitr’i Israely; ka efa lasa fananan’ny firenen-kafa izy ary efa nataony oha-pitenenana sy faneso!› '
  '30':
  - type: text
    content: 'Hataoko vokatra koa ny hazo fihinam-boa sy ny voly eny an-tsaha, ka tsy ho voalatsan’ny hafa firenena amin’ny mosary intsony ianareo. '
  '31':
  - type: text
    content: 'Dia hotsaroanareo ny fitondrantena ratsy sy ny asa tsy mendrika nataonareo, ka hankaloiloy anareo ny helokareo sy ny zavatra maharikoriko vitanareo. '
  '32':
  - type: text
    content: Nefa aoka ho fantatrareo fa tsy noho ny aminareo no hanaovako an’izany, ry Israelita; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Koa aoka hahamenatra sy hampangaihay anareo ny fitondrantenanareo, ry Israelita!
  '33':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa voadioko ho afaka amin’ny helokareo rehetra ianareo, dia hamponeniko indray ao amin’ireo tanàna; ka haorina indray izay efa rava. '
  '34':
  - type: text
    content: 'Hasaina indray ny tany lavavolo ka tsy hahita tany nilaozana intsony ny mpandalo. '
  '35':
  - type: text
    content: 'Dia holazainy hoe: ‹Nanjary toy ny zaridainan’i Hedèna'
  - type: note
    content: 'Hedèna: jereo ny naoty momba ny 31.8.'
  - type: text
    content: ' ity ilay tany efa lavavolo. Ireo tanàna efa tonga korontam-bato sady foana sy rava dia voamboatra sy misy mponina indray. '
  '36':
  - type: text
    content: Amin’izay dia hoeken’ireo firenena sisa tavela manodidina anareo, fa Izaho TOMPO no manorina indray ny tanàna rava sy mamboly indray ny tany lavavolo. Izaho TOMPO no miteny sady hahatanteraka izany.›
  '37':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Havelako hiantso vonjy amiko indray ny Israelita mba hanasoavako azy; ka hohamaroiko tahaka ny andianondry ny olony. '
  '38':
  - type: text
    content: 'Feno biby natokana hatao '
  - type: text
    content: sorona
  - type: text
    content: ' i Jerosalema taloha rehefa tonga ny fety manetriketrika, fa biby amin’andiany no nentina tao; ary ho maro toy izany koa ny olona honina indray ao an-tanànanareo izay rava ankehitriny. Amin’izay dia hoekena fa Izaho no TOMPO.'
  '4':
  - type: text
    content: 'Noho izany, ry tendrombohitr’i Israely, henoy ny teniko fa izao no lazain’ny Tompo ANDRIANANAHARY amin’ny tendrombohitra sy ny havoana, amin’ny renirano sy ny lohasaha, ary amin’ny toerana tonga korontam-bato sy ny tanànaaolo izay voaroba sy latsain’ny vahoaka manodidina. '
  '5':
  - type: text
    content: 'Eny, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mianiana Aho fa mirehi-pahatezerana no miteny manohitra an’ireo firenen-kafa, indrindra fa i Edôma manontolo. Fo faly tokoa sy toe-panahy mamingavinga no nakany ny taniko ho fananany mba handrobany ny kijànany.› '
  '6':
  - type: text
    content: 'Noho izany, ry Ezekiela, ijoroy ny maha-mpaminany anao ny amin’ny tanin’i Israely, ka ambarao amin’ny tendrombohitra sy ny havoana ary amin’ny renirano sy ny lohasaha fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Indro fa tezitra sy misafoaka Aho no miteny izao noho ny latsa natambesatry ny hafa firenena taminareo. '
  '7':
  - type: text
    content: 'Koa Izaho Tompo ANDRIANANAHARY dia manambara sy mananga-tanana mianiana fa ireny firenena manodidina anareo ireny indray kosa no hovesaran-datsa. '
  '8':
  - type: text
    content: 'Amin’izay fotoana izay ny hazo eny an-tendrombohitr’i Israely dia handravina sy hamoa ho anareo, ry Israelita vahoakako; fa efa antomotra ny hiverenanareo any an-tanindrazanareo. '
  '9':
  - type: text
    content: 'Eny, hitodika aminareo Aho ka hanambina anareo, ary hahatonga ny taninareo ho voaasa sy ho voavoly indray. '
