document_id: EZK.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ho azon’ny Israelita indray ny taniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Ary ianao, ry ilay taranak’olombelona, ijoroy ny maha-
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' anao ny amin’ireo tendrombohitr’i Israely. Asaovy henoiny ny teniko, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Nihomehy anareo ny fahavalonareo nanao hoe: Akory izay! Lasa fanananay izao ireo havoana fahagolan’i Israely.› '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ijoroy ny maha-mpaminany anao, ry Ezekiela, ary ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tsapako fa ny tany manodidina dia nifofotra handrava sy nitsiriritra ireo tendrombohitr’i Israely; ka efa lasa fananan’ny firenen-kafa izy ary efa nataony oha-pitenenana sy faneso!› '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho izany, ry tendrombohitr’i Israely, henoy ny teniko fa izao no lazain’ny Tompo ANDRIANANAHARY amin’ny tendrombohitra sy ny havoana, amin’ny renirano sy ny lohasaha, ary amin’ny toerana tonga korontam-bato sy ny tanànaaolo izay voaroba sy latsain’ny vahoaka manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, izao no lazain’ny Tompo ANDRIANANAHARY: ‹Mianiana Aho fa mirehi-pahatezerana no miteny manohitra an’ireo firenen-kafa, indrindra fa i Edôma manontolo. Fo faly tokoa sy toe-panahy mamingavinga no nakany ny taniko ho fananany mba handrobany ny kijànany.› '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, ry Ezekiela, ijoroy ny maha-mpaminany anao ny amin’ny tanin’i Israely, ka ambarao amin’ny tendrombohitra sy ny havoana ary amin’ny renirano sy ny lohasaha fa izao no lazain’ny Tompo ANDRIANANAHARY: ‹Indro fa tezitra sy misafoaka Aho no miteny izao noho ny latsa natambesatry ny hafa firenena taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa Izaho Tompo ANDRIANANAHARY dia manambara sy mananga-tanana mianiana fa ireny firenena manodidina anareo ireny indray kosa no hovesaran-datsa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Amin’izay fotoana izay ny hazo eny an-tendrombohitr’i Israely dia handravina sy hamoa ho anareo, ry Israelita vahoakako; fa efa antomotra ny hiverenanareo any an-tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny, hitodika aminareo Aho ka hanambina anareo, ary hahatonga ny taninareo ho voaasa sy ho voavoly indray. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hohamaroiko ny mponina manerana ny tanin’i Israely. Honenana indray ireo tanàna satria efa voaorina ny rava. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hohamaroiko ny olona sy ny biby fiompy eo aminareo ka hitombo isa sy hiteraka. Ho betsaka tahaka ny taloha ny mponina ary hataoko mandroso kokoa noho ny fahizany. Amin’izay dia hoekenareo fa Izaho no TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hampivoivoy anareo ao amin’ny tany Aho, ry Israelita vahoakako. Haka azy ho fanananareo ianareo; dia ho lasanareo izy ka tsy hahalany fara anareo intsony.› '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’ny Tompo ANDRIANANAHARY: ‹Tany mandripaka olona hono ianao, ry Israely, ka mahalany fara ny firenenao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ankehitriny, tsy ho tany mandripaka olona izany intsony ianao ary tsy hahalany taranaka intsony ny firenenao; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy hataoko renareo intsony ary tsy hitambesatra aminareo intsony ny fanarabiana sy sahato ataon’ny firenen-kafa satria tsy hamono ny zanakareo ho faty intsony ny taninareo; teny hentitra avy amiko Tompo ANDRIANANAHARY izany›. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hovorin’ny Tompo ny Israelita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Ry ilay taranak’olombelona, fony mbola teo amin’ny taniny ny Israelita dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandoto
  - type: text
    text: ' izany tamin’ny fitondrantenany sy ny asany. Eny, teo imasoko ny fitondrantenany dia naloto tahaka ny fadimbolan’ny vehivavy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny fahalotoan’ny vehivavy mandritra ny fadimbolany, jereo Lev 15.19-22.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nolotoiny tamin’ny vonoan’olona sy ny sampiny ny taniny, hany ka natosako tamin’ny Israelita ny fahatezerako. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Naeliko ho any amin’ireo firenena izy ary naparitako ho any amin’ny tany samy hafa. Izany no namaizako azy araka ny fitondrantenany sy ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanefa tany amin’ireo firenen-kafa izay nalehany dia nozimbazimbainy ny anarako masina noho ny fahadisoany. Fa nolazain’ny olona hoe: ‹Vahoakan’ny TOMPO ireo, nefa voatery nandao ny taniny!› '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa nangoraka Aho nahita ny anarako masina nozimbazimbaina tany amin’ny firenen-kafa noho ny fahadisoan’ny Israelita lasa tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ambarao amin’ny Israelita fa izao no lazain’ny Tompo ANDRIANANAHARY: Izay hataoko, ry Israelita, dia tsy noho ny aminareo no hanaovako azy, fa mba hanajana ny anarako masina izay nozimbazimbainareo tany amin’ny firenena izay nalehanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nefa na dia nanimbazimba Ahy teo imason’ireny aza ianareo, dia hasehoko azy kosa fa Andriamanitra lehibe sy masina Aho, ary ianareo no hampiasaiko hanehoako izany. Amin’izay dia hoeken’ireo fa Izaho no TOMPO; teny hentitra avy amiko Tompo ANDRIANANAHARY izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Fa halaiko avy any amin’ny firenen-kafa ianareo ary hangoniko avy any amin’ny tany rehetra any, dia haveriko ao an-tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hofafazako rano madio ianareo, dia hadio; eny, hodioviko ho afaka amin’ny fahalotoanareo rehetra sy ny fanompoan-tsampinareo rehetra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Homeko fo vaovao ianareo ary fanahy vaovao no hataoko ao anatinareo. Hoesoriko aminareo ny fo tsy miraika toy ny vato ka hosoloiko fo mora anarina. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny Fanahiko mihitsy no hapetrako ao anatinareo, ka hataoko manaraka ny lalànako ianareo, ary hitandrina sy hanatanteraka ny fitsipiko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia honenanareo ny tany izay nomeko ny razanareo; ka ho vahoakako ianareo ary Izaho kosa ho Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hovonjeko ho afaka amin’ny fahalotoanareo rehetra ianareo. Tsy handefasako mosary intsony ianareo fa hampaniriako sady hataoko vokatra be ny varinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hataoko vokatra koa ny hazo fihinam-boa sy ny voly eny an-tsaha, ka tsy ho voalatsan’ny hafa firenena amin’ny mosary intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hotsaroanareo ny fitondrantena ratsy sy ny asa tsy mendrika nataonareo, ka hankaloiloy anareo ny helokareo sy ny zavatra maharikoriko vitanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nefa aoka ho fantatrareo fa tsy noho ny aminareo no hanaovako an’izany, ry Israelita; teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Koa aoka hahamenatra sy hampangaihay anareo ny fitondrantenanareo, ry Israelita!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Rehefa voadioko ho afaka amin’ny helokareo rehetra ianareo, dia hamponeniko indray ao amin’ireo tanàna; ka haorina indray izay efa rava. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hasaina indray ny tany lavavolo ka tsy hahita tany nilaozana intsony ny mpandalo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia holazainy hoe: ‹Nanjary toy ny zaridainan’i Hedèna'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hedèna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny naoty momba ny 31.8.
    marker-yv: yv-n
  - type: text
    text: ' ity ilay tany efa lavavolo. Ireo tanàna efa tonga korontam-bato sady foana sy rava dia voamboatra sy misy mponina indray. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Amin’izay dia hoeken’ireo firenena sisa tavela manodidina anareo, fa Izaho TOMPO no manorina indray ny tanàna rava sy mamboly indray ny tany lavavolo. Izaho TOMPO no miteny sady hahatanteraka izany.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY: Havelako hiantso vonjy amiko indray ny Israelita mba hanasoavako azy; ka hohamaroiko tahaka ny andianondry ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Feno biby natokana hatao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' i Jerosalema taloha rehefa tonga ny fety manetriketrika, fa biby amin’andiany no nentina tao; ary ho maro toy izany koa ny olona honina indray ao an-tanànanareo izay rava ankehitriny. Amin’izay dia hoekena fa Izaho no TOMPO.'
