document_id: PSA.121,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Avy aiza ny famonjena ahy?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hira fiakarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manopy maso any amin’ireo tendrombohitra aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aiza moa ny famonjena ahy?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Ny famonjena ahy dia avy amin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Tsy havelany ho solafaka anie ny tongotrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho rendremana anie ny mpiambina anao!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Tsia, tsy rendremana na matory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpiambina an’i Israely.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no mpiambina anao amin’ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO eo anilanao no fialofanao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy hamely anao ny masoandro, raha antoandro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy hamely anao ny volana, raha alina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO hiambina anao amin’ny ratsy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hiambina ny ainao Izy,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiambina anao mandroso sy miverina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manomboka izao ka ho mandrakizay!
