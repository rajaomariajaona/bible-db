document_id: PSA.121,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Avy aiza ny famonjena ahy?
  - type: text
    content: ' '
  - type: text
    content: Hira fiakarana.
  - type: text
    content: Manopy maso any amin’ireo tendrombohitra aho.
  - type: text
    content: Avy aiza moa ny famonjena ahy?
  '2':
  - type: text
    content: –Ny famonjena ahy dia avy amin’ny TOMPO,
  - type: text
    content: Mpanao ny lanitra sy ny tany!
  '3':
  - type: text
    content: –Tsy havelany ho solafaka anie ny tongotrao;
  - type: text
    content: tsy ho rendremana anie ny mpiambina anao!
  '4':
  - type: text
    content: –Tsia, tsy rendremana na matory
  - type: text
    content: ny mpiambina an’i Israely.
  '5':
  - type: text
    content: Ny TOMPO no mpiambina anao amin’ny alina;
  - type: text
    content: ny TOMPO eo anilanao no fialofanao;
  '6':
  - type: text
    content: ka tsy hamely anao ny masoandro, raha antoandro;
  - type: text
    content: tsy hamely anao ny volana, raha alina.
  '7':
  - type: text
    content: Ny TOMPO hiambina anao amin’ny ratsy rehetra;
  - type: text
    content: eny, hiambina ny ainao Izy,
  '8':
  - type: text
    content: hiambina anao mandroso sy miverina
  - type: text
    content: manomboka izao ka ho mandrakizay!
