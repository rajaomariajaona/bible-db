document_id: PSA.121
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SALAMO Avy aiza ny famonjena ahy?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hira fiakarana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manopy maso any amin’ireo tendrombohitra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy aiza moa ny famonjena ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: –Ny famonjena ahy dia avy amin’ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanao ny lanitra sy ny tany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: –Tsy havelany ho solafaka anie ny tongotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy ho rendremana anie ny mpiambina anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: –Tsia, tsy rendremana na matory
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny mpiambina an’i Israely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny TOMPO no mpiambina anao amin’ny alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny TOMPO eo anilanao no fialofanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka tsy hamely anao ny masoandro, raha antoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tsy hamely anao ny volana, raha alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny TOMPO hiambina anao amin’ny ratsy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, hiambina ny ainao Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: hiambina anao mandroso sy miverina
- type: usfm
  marker: q1
  children:
  - type: text
    text: manomboka izao ka ho mandrakizay!
