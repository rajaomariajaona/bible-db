document_id: 2SA.8,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandresen’i Davida ireo firenena manodidina
  - type: heading
    content: (Jereo 1 Tan 18.1-13)
  - type: text
    content: 'Taorian’izany dia nandresy ny Filistinina i Davida, ka nampilefitra azy; ary nalainy teo an-tanan’ny Filistinina ny fifehezan-drenivohitra. '
  '10':
  - type: text
    content: 'dia nirahin’i Tôhỳ ho any amin’i Davida mpanjaka i Jôrama zanany lahy mba hiarahaba sy hidera azy noho ny niadiany tamin’i Hadadehezera ka nandreseny azy; fa mpiady tamin’i Tôhỳ io Hadadehezera io. Nitondra fanaka volafotsy sy volamena ary halimo ho an’i Davida i Jôrama. '
  '11':
  - type: text
    content: 'Natokan’i Davida mpanjaka ho an’ny TOMPO ireo fanaka ireo, tahaka ny nanokanany ny volafotsy sy ny volamena azony tamin’ireo firenena hafa rehetra efa resiny, '
  '12':
  - type: text
    content: dia ny Sirianina sy Môabita ary Hamônita mbamin’ny Filistinina sy Hamalekita, ary koa nanokanany ny babo azony tamin’i Hadadehezera zanakalahin’i Rehôba sady mpanjakan’i Tsôbà.
  '13':
  - type: text
    content: Rehefa niverina avy tany Siria i Davida, dia nahazo laza tamin’ny nandreseny koa ny Edômita 18 000 teo amin’ny Lohasahan-tsira
  - type: note
    content: 'Edômita: izany no toa mitombina kokoa (jereo Sal 60.2 sy ny and 14 manaraka eto). Ny RM mahazatra dia ahitana ny hoe Sirianina; kanefa iaraha-mahalala fa matetika no ampifamadihan’ny kôpista ireo firenena roa ireo noho ny litera hebreo daleta sy resa mitovitovy. –ny Lohasahan-tsira izay mampitohy ny ranomasina Maty amy helodranomasin’i Akabà, dia antsoina ankehitriny hoe Ny Harabà.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Nametrahany governora tany Edôma; eny, nametrahany governora i Edôma manontolo, ka tonga olom-pehezin’i Davida avokoa ny mponiny. Ary nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO.
  - type: heading
    content: Ireo mpiasam-panjakan’i Davida
  - type: heading
    content: (Jereo 1 Tan 18.14-17)
  '15':
  - type: text
    content: 'Dia nanjaka tamin’i Israely manontolo i Davida ka nanao ny rariny sy ny fahamarinana tamin’ny vahoakany rehetra. '
  '16':
  - type: text
    content: 'I Jôaba, zanakalahin’i Tserôià, no lehiben’ny tafika; i Jôsafata, zanakalahin’i Ahitoda, no mpitondratenin’ny mpanjaka; '
  '17':
  - type: text
    content: 'i Tsadôka zanakalahin’i Ahitoba mbamin’i Ahimelèka zanakalahin’i Abiatara no mpisorona; i Seraià no mpitantsoratra; '
  '18':
  - type: text
    content: i Benaià, zanakalahin’i Jôiadà, no lehiben’ny mpiambina andriamanjaka; ary ireo zanakalahin’i Davida kosa dia mpanolotsaina.
  '2':
  - type: text
    content: Nandresy ny Môabita koa izy ka nampandrîny tamin’ny tany ireo mba horefesina amin’ny tady; koa novonoiny ho faty ny androatokony ary navelany ho velona kosa ny ampahatelony
  - type: note
    content: 'Ny RM dia milaza ny fomba fanao amin’ny fifidianana izay olona hovonoina: ireo fahavalo dia mivalampatra mifanila eo amin’ny tany ka refesina amin’ny tady; ireo izay tratry ny halavan’ny tady indroa miantoana dia hatao maty, fa avela ho velona kosa izay tratry ny tora-tady fahatelo; dia toy izay hatrany.'
  - type: text
    content: '. Noho izany dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Môabita. '
  '3':
  - type: text
    content: Mbola resin’i Davida koa i Hadadehezera, zanakalahin’i Rehôba sady mpanjakan’i Tsôbà
  - type: note
    content: Fanjakana any avaratr’i Damasy.
  - type: text
    content: '; tamin’i Hadadehezera ndeha haka indray ny faritry ny onin’i Eofrata izany. '
  '4':
  - type: text
    content: 'Mpitaingin-tsoavaly miisa andiany 17 sy miaramila an-tongotra miisa andiany roapolo no voababon’i Davida taminy; saingy nasain’i Davida nokapain-tongotra avokoa ny soavalin-kalesy fa ny tokony ho amin’ny kalesy zato ihany no sisa notazoniny. '
  '5':
  - type: text
    content: Dia tonga ny Sirianina avy any Damasy mba hamonjy an’i Hadadehezera mpanjakan’i Tsôbà; kanefa nahafatesan’i Davida miaramila miisa antokony 22
  - type: note
    content: 'miisa andiany 17...miisa andiany roapolo (and 4)... miisa antokony 22 (and 5): azo adika hoe miisa 1 700... miisa 20 000 (and 4) miisa 22 000; kanefa jereo Nom 1.20-46 sy nta.'
  - type: text
    content: ' koa ny Sirianina. '
  '6':
  - type: text
    content: 'Nametrahan’i Davida governora tany Siria faritr’i Damasy, ka dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Sirianina. Fa nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO. '
  '7':
  - type: text
    content: 'Ary nalain’i Davida ny ampinga volamena izay teny amin’ireo mpanompon’i Hadadehezera ka nentiny tany Jerosalema. '
  '8':
  - type: text
    content: Nahazoan’i Davida mpanjaka halimo be dia be koa tao Betà sy Berôtahy
  - type: note
    content: 'Betà: toerana tsy dia fantatra mazava; tsara raha vakîna miaraka, amin’ny 1 Tan 18.8, hoe Tibihata izay anaran-toerana iray any Siria. –Berôtahy: toerana tokony ho 50 km any avaratr’i Damasy.'
  - type: text
    content: ', izay samy tanànan’i Hadadehezera.'
  '9':
  - type: text
    content: Ren’i Tôhỳ, mpanjakan’i Hamata
  - type: note
    content: Fanjakana sirianina any avaratra atsinanan’i Palestinina.
  - type: text
    content: ', fa resin’i Davida avokoa ny tafik’i Hadadehezera; '
