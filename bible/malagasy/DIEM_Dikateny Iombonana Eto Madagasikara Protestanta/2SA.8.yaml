document_id: 2SA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fandresen’i Davida ireo firenena manodidina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 18.1-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Taorian’izany dia nandresy ny Filistinina i Davida, ka nampilefitra azy; ary nalainy teo an-tanan’ny Filistinina ny fifehezan-drenivohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nandresy ny Môabita koa izy ka nampandrîny tamin’ny tany ireo mba horefesina amin’ny tady; koa novonoiny ho faty ny androatokony ary navelany ho velona kosa ny ampahatelony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny RM dia milaza ny fomba fanao amin’ny fifidianana izay olona hovonoina: ireo fahavalo dia mivalampatra mifanila eo amin’ny tany ka refesina amin’ny tady; ireo izay tratry ny halavan’ny tady indroa miantoana dia hatao maty, fa avela ho velona kosa izay tratry ny tora-tady fahatelo; dia toy izay hatrany.'
    marker-yv: yv-n
  - type: text
    text: '. Noho izany dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Môabita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mbola resin’i Davida koa i Hadadehezera, zanakalahin’i Rehôba sady mpanjakan’i Tsôbà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fanjakana any avaratr’i Damasy.
    marker-yv: yv-n
  - type: text
    text: '; tamin’i Hadadehezera ndeha haka indray ny faritry ny onin’i Eofrata izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mpitaingin-tsoavaly miisa andiany 17 sy miaramila an-tongotra miisa andiany roapolo no voababon’i Davida taminy; saingy nasain’i Davida nokapain-tongotra avokoa ny soavalin-kalesy fa ny tokony ho amin’ny kalesy zato ihany no sisa notazoniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia tonga ny Sirianina avy any Damasy mba hamonjy an’i Hadadehezera mpanjakan’i Tsôbà; kanefa nahafatesan’i Davida miaramila miisa antokony 22
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: miisa andiany 17...miisa andiany roapolo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(and 4)... '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: miisa antokony 22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 5): azo adika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miisa 1 700... miisa 20 000
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (and 4) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miisa 22 000;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kanefa jereo Nom 1.20-46 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ' koa ny Sirianina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nametrahan’i Davida governora tany Siria faritr’i Damasy, ka dia tonga olom-pehezin’i Davida sady mpandoa hetra ho azy ny Sirianina. Fa nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nalain’i Davida ny ampinga volamena izay teny amin’ireo mpanompon’i Hadadehezera ka nentiny tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nahazoan’i Davida mpanjaka halimo be dia be koa tao Betà sy Berôtahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Betà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toerana tsy dia fantatra mazava; tsara raha vakîna miaraka, amin’ny 1 Tan 18.8, hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tibihata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay anaran-toerana iray any Siria. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Berôtahy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': toerana tokony ho 50 km any avaratr’i Damasy.'
    marker-yv: yv-n
  - type: text
    text: ', izay samy tanànan’i Hadadehezera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ren’i Tôhỳ, mpanjakan’i Hamata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fanjakana sirianina any avaratra atsinanan’i Palestinina.
    marker-yv: yv-n
  - type: text
    text: ', fa resin’i Davida avokoa ny tafik’i Hadadehezera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia nirahin’i Tôhỳ ho any amin’i Davida mpanjaka i Jôrama zanany lahy mba hiarahaba sy hidera azy noho ny niadiany tamin’i Hadadehezera ka nandreseny azy; fa mpiady tamin’i Tôhỳ io Hadadehezera io. Nitondra fanaka volafotsy sy volamena ary halimo ho an’i Davida i Jôrama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Natokan’i Davida mpanjaka ho an’ny TOMPO ireo fanaka ireo, tahaka ny nanokanany ny volafotsy sy ny volamena azony tamin’ireo firenena hafa rehetra efa resiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia ny Sirianina sy Môabita ary Hamônita mbamin’ny Filistinina sy Hamalekita, ary koa nanokanany ny babo azony tamin’i Hadadehezera zanakalahin’i Rehôba sady mpanjakan’i Tsôbà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa niverina avy tany Siria i Davida, dia nahazo laza tamin’ny nandreseny koa ny Edômita 18 000 teo amin’ny Lohasahan-tsira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Edômita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izany no toa mitombina kokoa (jereo Sal 60.2 sy ny and 14 manaraka eto). Ny RM mahazatra dia ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sirianina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; kanefa iaraha-mahalala fa matetika no ampifamadihan’ny kôpista ireo firenena roa ireo noho ny litera hebreo daleta sy resa mitovitovy. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: ny Lohasahan-tsira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' izay mampitohy ny ranomasina Maty amy helodranomasin’i Akabà, dia antsoina ankehitriny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny Harabà.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nametrahany governora tany Edôma; eny, nametrahany governora i Edôma manontolo, ka tonga olom-pehezin’i Davida avokoa ny mponiny. Ary nampandresy an’i Davida tamin’izay fanafihany rehetra ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ireo mpiasam-panjakan’i Davida
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Tan 18.14-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanjaka tamin’i Israely manontolo i Davida ka nanao ny rariny sy ny fahamarinana tamin’ny vahoakany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I Jôaba, zanakalahin’i Tserôià, no lehiben’ny tafika; i Jôsafata, zanakalahin’i Ahitoda, no mpitondratenin’ny mpanjaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'i Tsadôka zanakalahin’i Ahitoba mbamin’i Ahimelèka zanakalahin’i Abiatara no mpisorona; i Seraià no mpitantsoratra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: i Benaià, zanakalahin’i Jôiadà, no lehiben’ny mpiambina andriamanjaka; ary ireo zanakalahin’i Davida kosa dia mpanolotsaina.
