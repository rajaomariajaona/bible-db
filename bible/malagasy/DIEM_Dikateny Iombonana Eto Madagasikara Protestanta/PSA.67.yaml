document_id: PSA.67,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hidera Anao anie ny vahoaka rehetra
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira.
  - type: text
    content: ' '
  - type: text
    content: Hampiarahina amin’ny valiha. Tononkira.
  '2':
  - type: text
    content: 'Andriamanitra ô, mba iantrao sy '
  - type: text
    content: tahio
  - type: text
    content: ' izahay'
  - type: text
    content: ka enga anie hojerenao amin-kamoram-po!
  - type: text
    content: Fiatoana
  '3':
  - type: text
    content: Dia ho fantatra eto an-tany ny fomba fiasanao
  - type: text
    content: ary ho hitan’ny firenen-drehetra fa Mpamonjy Ianao.
  '4':
  - type: text
    content: Andriamanitra ô, hidera Anao anie ny vahoaka,
  - type: text
    content: hidera Anao anie ny vahoaka rehetra!
  '5':
  - type: text
    content: Aoka hifaly sy hihoby Anao ireo firenena
  - type: text
    content: satria Ianao mitsara ny tontolo ara-drariny,
  - type: text
    content: mitsara ny vahoaka araka ny hitsiny
  - type: text
    content: sy mitondra ireo firenena eto an-tany!
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: Andriamanitra ô, hidera Anao anie ny vahoaka,
  - type: text
    content: hidera Anao anie ny vahoaka rehetra!
  '7':
  - type: text
    content: Indro ny tany nanome ny vokany,
  - type: text
    content: fa Andriamanitra Andriamanitray
  - type: text
    content: no efa nomba fitahiana anay.
  '8':
  - type: text
    content: Aoka Izy homba fitahiana anay,
  - type: text
    content: dia hanaja Azy anie ny vahoaka
  - type: text
    content: hatrany am-paran’ny tany rehetra!
