  - type: text
    text: ' Nomerỳ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: na ny Fanisana, araka izany anarany izany, dia mirakitra tarehimarika sy fanisana maromaro momba ny Israelita. Lohahevitra ampahany ihany ary tsy ny lehibe indrindra amin’ny boky anefa no ambaran’izany anarana izany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rehefa nahazo ireo lalàna rehetra izay nomen’Andriamanitra an’i Mosesy tao Sinay ny Israelita, dia niomana hihazo ny lalana mankany amin’ny tany nampanantenaina azy (1.1–10.10). Ny dian’izy ireo dia nitondra azy voalohany indrindra tao Kadesy-Barnea, fidirana amin’izany tany izany. Kanefa natahotra ny hitsofoka ao izy ireo. Noho izany àry dia voatery nandany efapolo taona tany an-taniefitra izy ireo; avy teo vao nianatsimo ka farany nahazo ny tany Môaba ao atsinanan’ny Ranomasina Maty, rehefa avy nivahiny ela tany an-tany hafa (10.11–21.35). Ny toko faramparany dia milaza ireo zava-nitranga samihafa tao amin’ny tany Môaba. Avy teo no nidiran’i Israely ny tany Kanahàna tatỳ aoriana (22.1–36.13).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity boky ity dia mbola tohin’izay voambaran’ny Eksôdy sy ny Levitîka, ary mampiseho ilay vahoakan’Andriamanitra amin’ny tena maha olombelona azy ka ifandimbiasan’ny fahatokiana sy ny fisalasalana, ny hery sy ny fahadisoam-panantenana, ny fahalehibiazana sy ny fahambaniana. Asehony koa etsy an-daniny fa Andriamanitra dia tsy mivadika na oviana na oviana amin’ny vahoakany; mifanindran-dalana amin’ny toetra hentitra sy mandala ny rariny anefa izany tsy fivadihany izany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mitana toeran-tsarotra manelanelana an’Andriamanitra sy ny vahoakany tamin’izany i Mosesy, fa iraka mpilaza ny zavatra takin’Andriamanitra izay ifandraisany manokana izy sady mpiaro tsy mety sasatra ilay vahoaka mpivadibadika.
