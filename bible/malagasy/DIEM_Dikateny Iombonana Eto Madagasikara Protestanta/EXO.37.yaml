document_id: EXO.37,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny Vatamasina mirakitra ny fanekempihavanana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Namboarin’i Betsalela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.1 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 1-9:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 25.10-22.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny hazo mimôzà ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Vatamasina
    - type: text
      text: '; ka mirefy 125 santimetatra ny lavany, 75 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nisy latabatra namboarina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.10 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 10-16:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 25.23-30.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny hazo mimôzà, ka nirefy iray metatra ny lavany, 50 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Norakofana takela-bolamena madio izany, sady nasiana sisiny volamena manodidina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nasiana fehivavany mivelatra valo santimetatra manodidina azy sady nasiana sisiny volamena teo ambonin’io fehivava io. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nisy haba volamena efatra koa notefena, dia napetaka teo amin’ny zorony efatra, nifanila tamin’ny tongony efatra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Natao teo akaikin’ny fehivavany ny haba ka nampidirana bao mba hitondrana ny latabatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hazo mimôzà no nanaovana ny bao roa, izay norakofana takela-bolamena; ary ireo no nilanjana ny latabatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Namboarina koa ny fitaovana fametraka eo ambonin’io latabatra io: dia lovia fisaka lehibe, kaopy, tavoara, tsatokaty ho an’ny fanatitra divay; ka samy natao tamin’ny volamena madio avokoa izy rehetra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitoeran-jiro fito rantsana
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Namboarina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 17-24:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 25.31-40.
      marker-yv: yv-n
    - type: text
      text: ' ny fitoeran-jiro volamena madio; voasana no nanaovana azy, ka ny faladiany sy ny tahony, ny raviny sy ny bokony ary ny voniny dia nitambatra ho tena iray ihany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nasiana rantsana enina nivoaka avy amin’ny tahobeny, ka samy telo an-daniny avy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Isaky ny rantsana tsirairay dia nisy felam-boninkazo telo miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Norakofan’i Betsalela takela-bolamena madio ny atiny sy ny ivelany, ary nasiany sisiny volamena manodidina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Teo amin’ilay tahobeny kosa dia nisy felam-boninkazo efatra miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary teo ambanin’ny rantsana enina izay niainga avy amin’ny tahobeny dia nisy boko iray isaky ny rantsana tsiroaroa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nitambatra ho iray ihany tamin’ny sisa rehetra ny boko sy ny rantsana, ary samy volamena madio avokoa izy rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Namboarina ny jiro fito sy ny tandra ary ny fitoeran-davenon-jiro, ka samy natao volamena madio avokoa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Vongam-bolamena madio telopolo kilao no nampiasaina nanaovana ny fitoeran-jiro sy ny fitaovana rehetra miaraka aminy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alitara fandoroana zava-manitra
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Namboarina tamin’ny hazo mimôzà ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' iray ho fandoroana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.25 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 25-28:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 30.1-10.
      marker-yv: yv-n
    - type: text
      text: ' vovo-javamanitra. Efamira izy io, ka nirefy dimampolo santimetatra avy ny lafiny tsirairay, ary iray metatra ny haavony. Nisy tandrony avy teo amin’ny zorony efatra ambony ary natao miray aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Norakofana takela-bolamena madio ny tampony sy ny lafiny manodidina mbamin’ny tandrony, sady nasiana sisiny volamena manodidina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Haba volamena roa avy no napetany teo ambanin’ny sisiny sady nataony tamin’ny zorony efatra, ka nampidirana bao mba hilanjana ny alitara. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Namboarina tamin’ny hazo mimôzà ireo bao roa ireo, ary norakofana takela-bolamena.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Mpamboatra zava-manitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.29 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 29:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit 30.22-38.
      marker-yv: yv-n
    - type: text
      text: ' no nanao ny ilomasina fampiasa amin’ny fanokanana mbamin’ny vovo-javamanitra hodorana eo amin’ny alitara.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Notefeny ny haba volamena efatra ka naraikiny teo amin’ny zorony efatry ny Vatamasina, dia samy roa an-daniny avy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nisy bao roa nataony tamin’ny hazo mimôzà, ary norakofany takela-bolamena. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Natsofony tao amin’ireo haba ireo ny bao roa mba hilanjana ny Vatamasina.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nanaovany sarony volamena madio ilay Vatamasina, ka io sarony io dia nirefy 125 santimetatra ny lavany ary 75 santimetatra ny sakany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nanefeny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: kerobima
    - type: text
      text: ' roa volamena tamin’ny sakany roa teo ambonin’ny saron’ny Vatamasina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Novoasany mitambatra amin’ny saron’ny Vatamasina ireo kerobima roa ireo, teo amin’ny sakany avy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nifanatrika ny kerobima roa sady nanatrika ny saron’ny Vatamasina izay nalofany tamin’ny elany mivelatra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny latabatry ny mofo atolotra ho an’Andriamanitra
    marker-yv: yv-h
