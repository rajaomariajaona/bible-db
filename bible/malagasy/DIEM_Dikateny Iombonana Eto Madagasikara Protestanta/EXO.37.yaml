document_id: EXO.37,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Vatamasina mirakitra ny fanekempihavanana
  - type: text
    content: Namboarin’i Betsalela
  - type: note
    content: 'And 1-9: ampit 25.10-22.'
  - type: text
    content: ' tamin’ny hazo mimôzà ny '
  - type: text
    content: Vatamasina
  - type: text
    content: '; ka mirefy 125 santimetatra ny lavany, 75 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '10':
  - type: text
    content: Nisy latabatra namboarina
  - type: note
    content: 'And 10-16: ampit 25.23-30.'
  - type: text
    content: ' tamin’ny hazo mimôzà, ka nirefy iray metatra ny lavany, 50 santimetatra ny sakany ary 75 santimetatra ny haavony. '
  '11':
  - type: text
    content: 'Norakofana takela-bolamena madio izany, sady nasiana sisiny volamena manodidina. '
  '12':
  - type: text
    content: 'Nasiana fehivavany mivelatra valo santimetatra manodidina azy sady nasiana sisiny volamena teo ambonin’io fehivava io. '
  '13':
  - type: text
    content: 'Nisy haba volamena efatra koa notefena, dia napetaka teo amin’ny zorony efatra, nifanila tamin’ny tongony efatra. '
  '14':
  - type: text
    content: 'Natao teo akaikin’ny fehivavany ny haba ka nampidirana bao mba hitondrana ny latabatra. '
  '15':
  - type: text
    content: 'Hazo mimôzà no nanaovana ny bao roa, izay norakofana takela-bolamena; ary ireo no nilanjana ny latabatra. '
  '16':
  - type: text
    content: 'Namboarina koa ny fitaovana fametraka eo ambonin’io latabatra io: dia lovia fisaka lehibe, kaopy, tavoara, tsatokaty ho an’ny fanatitra divay; ka samy natao tamin’ny volamena madio avokoa izy rehetra.'
  - type: heading
    content: Ny fitoeran-jiro fito rantsana
  '17':
  - type: text
    content: Namboarina
  - type: note
    content: 'And 17-24: ampit 25.31-40.'
  - type: text
    content: ' ny fitoeran-jiro volamena madio; voasana no nanaovana azy, ka ny faladiany sy ny tahony, ny raviny sy ny bokony ary ny voniny dia nitambatra ho tena iray ihany. '
  '18':
  - type: text
    content: 'Nasiana rantsana enina nivoaka avy amin’ny tahobeny, ka samy telo an-daniny avy. '
  '19':
  - type: text
    content: 'Isaky ny rantsana tsirairay dia nisy felam-boninkazo telo miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '2':
  - type: text
    content: 'Norakofan’i Betsalela takela-bolamena madio ny atiny sy ny ivelany, ary nasiany sisiny volamena manodidina. '
  '20':
  - type: text
    content: 'Teo amin’ilay tahobeny kosa dia nisy felam-boninkazo efatra miendrika felam-paiso miaraka amin’ny bokony sy ny voniny. '
  '21':
  - type: text
    content: 'Ary teo ambanin’ny rantsana enina izay niainga avy amin’ny tahobeny dia nisy boko iray isaky ny rantsana tsiroaroa. '
  '22':
  - type: text
    content: 'Nitambatra ho iray ihany tamin’ny sisa rehetra ny boko sy ny rantsana, ary samy volamena madio avokoa izy rehetra. '
  '23':
  - type: text
    content: 'Namboarina ny jiro fito sy ny tandra ary ny fitoeran-davenon-jiro, ka samy natao volamena madio avokoa. '
  '24':
  - type: text
    content: Vongam-bolamena madio telopolo kilao no nampiasaina nanaovana ny fitoeran-jiro sy ny fitaovana rehetra miaraka aminy.
  - type: heading
    content: Ny alitara fandoroana zava-manitra
  '25':
  - type: text
    content: 'Namboarina tamin’ny hazo mimôzà ny '
  - type: text
    content: alitara
  - type: text
    content: ' iray ho fandoroana'
  - type: note
    content: 'And 25-28: ampit 30.1-10.'
  - type: text
    content: ' vovo-javamanitra. Efamira izy io, ka nirefy dimampolo santimetatra avy ny lafiny tsirairay, ary iray metatra ny haavony. Nisy tandrony avy teo amin’ny zorony efatra ambony ary natao miray aminy. '
  '26':
  - type: text
    content: 'Norakofana takela-bolamena madio ny tampony sy ny lafiny manodidina mbamin’ny tandrony, sady nasiana sisiny volamena manodidina. '
  '27':
  - type: text
    content: 'Haba volamena roa avy no napetany teo ambanin’ny sisiny sady nataony tamin’ny zorony efatra, ka nampidirana bao mba hilanjana ny alitara. '
  '28':
  - type: text
    content: Namboarina tamin’ny hazo mimôzà ireo bao roa ireo, ary norakofana takela-bolamena.
  '29':
  - type: text
    content: Mpamboatra zava-manitra
  - type: note
    content: 'And 29: ampit 30.22-38.'
  - type: text
    content: ' no nanao ny ilomasina fampiasa amin’ny fanokanana mbamin’ny vovo-javamanitra hodorana eo amin’ny alitara.'
  '3':
  - type: text
    content: 'Notefeny ny haba volamena efatra ka naraikiny teo amin’ny zorony efatry ny Vatamasina, dia samy roa an-daniny avy. '
  '4':
  - type: text
    content: 'Nisy bao roa nataony tamin’ny hazo mimôzà, ary norakofany takela-bolamena. '
  '5':
  - type: text
    content: Natsofony tao amin’ireo haba ireo ny bao roa mba hilanjana ny Vatamasina.
  '6':
  - type: text
    content: 'Nanaovany sarony volamena madio ilay Vatamasina, ka io sarony io dia nirefy 125 santimetatra ny lavany ary 75 santimetatra ny sakany. '
  '7':
  - type: text
    content: 'Nanefeny '
  - type: text
    content: kerobima
  - type: text
    content: ' roa volamena tamin’ny sakany roa teo ambonin’ny saron’ny Vatamasina. '
  '8':
  - type: text
    content: 'Novoasany mitambatra amin’ny saron’ny Vatamasina ireo kerobima roa ireo, teo amin’ny sakany avy. '
  '9':
  - type: text
    content: Nifanatrika ny kerobima roa sady nanatrika ny saron’ny Vatamasina izay nalofany tamin’ny elany mivelatra.
  - type: heading
    content: Ny latabatry ny mofo atolotra ho an’Andriamanitra
