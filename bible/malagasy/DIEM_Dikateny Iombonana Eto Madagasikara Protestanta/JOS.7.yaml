document_id: JOS.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famaizana an’i Hakàna noho ny heloka vitany
  - type: text
    content: Nanao fahadisoana bevava ny Israelita tamin’ny fandikana didy momba ireo zavatra voatokana hafoy ho an’ny TOMPO
  - type: note
    content: Jereo 6.17-19.
  - type: text
    content: ; fa naka zavatra sasany tamin’ireo i Hakàna, zanakalahin’i Karmỳ sy zafin’i Zabdià ary zafiafin’i Zera sady anisan’ny fokon’i Joda, koa tezitra tamin’ny Israelita ny Tompo.
  '10':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Josoa:'
  - type: text
    content: '–Mitsangàna fa nahoana ianao no miankohoka toy izao? '
  '11':
  - type: text
    content: 'Nanota ny Israelita ka nivadika tamin’ny fanekempihavanana nodidiako hotandremany; fa ny zavatra nasaiko nolevonina dia nakany sy nangalany ary nanafenany ka nataony tanaty entany. '
  '12':
  - type: text
    content: 'Izany no tsy hahazoan’ny Israelita hanohitra ny fahavalony; fa handositra eo anoloan’ireo ny Israelita, satria efa voaozona ho ringana. Tsy homba anareo intsony Aho raha tsy fongotra teo aminareo izay nasaiko nolevonina. '
  '13':
  - type: text
    content: 'Mandehana omany ny vahoaka mba hihaona amiko rahampitso ka ilazao izy mba samy '
  - type: text
    content: hanadio
  - type: text
    content: ' ny tenany; fa Izaho TOMPO Andriamanitr’i Israely no milaza amin’ny Israelita hoe: «Mbola manana zavatra nasaiko nolevonina ianareo; noho izany, tsy afaka hanohitra ny fahavalonareo ianareo raha tsy foana teo aminareo ireny zavatra ireny. '
  '14':
  - type: text
    content: Rahampitso maraina dia hiseho eo anatrehako araka ny fokony avy ianareo. Ny foko izay voatondroko dia hiseho eo anatrehako isan-tarika; ary ny tarika izay voatondroko dia hiseho isam-pianakaviana; ary ny lehilahy ao amin’izay fianakaviana voatondroko dia hiseho tsirairay eo anatrehako
  - type: note
    content: Ny fanondroana eto dia tsy isalasalana fa atao amin’ny antsapaka (jereo 1 Sam 14.40-42).
  - type: text
    content: '. '
  '15':
  - type: text
    content: Ary hotondroiko ilay lehilahy mitana zavatra tokony holevonina, ka hodorana amin’ny afo izy mbamin’izay rehetra azy satria nivadika tamin’ny fanekempihavanako izy ka nanao izay tsy fanao teo amin’i Israely.»
  '16':
  - type: text
    content: 'Dia nifoha vao maraina i Josoa ny ampitso ary nampanatona ny Israelita isam-pokony, ka ny fokon’i Joda no voatondro. '
  '17':
  - type: text
    content: 'Ary nampanatoniny isan-tarika ny fokon’i Joda ka ny tarik’i Zera no voatondro. Dia narosony isam-pianakaviana ny tarik’i Zera ka ny fianakavian’i Zabdỳ no voatondro. '
  '18':
  - type: text
    content: 'Dia narosony tsirairay ny lehilahy tao amin’ny fianakavian’i Zabdỳ ka i Hakàna, zanakalahin’i Karmỳ sy zafin’i Zabdỳ ary zafiafin’i Zera sady anisan’ny fokon’i Joda, no voatondro. '
  '19':
  - type: text
    content: 'Dia hoy i Josoa taminy:'
  - type: text
    content: –Anaka, omeo voninahitra sy haja ny TOMPO Andriamanitr’i Israely; lazao amiko izay nataonao fa aza misy afenina ahy.
  '2':
  - type: text
    content: 'I Josoa kosa naniraka vatan-dehilahy avy tao Jerikao ho any Hay, izay tanàna ao atsinanan’i Betela eo akaikin’i Bety-Avena, ka nanome baiko azy mba hiakatra hisafo iny faritra iny. Dia niakatra nisafo an’i Hay ireo lehilahy ireo '
  '20':
  - type: text
    content: 'Dia novalian’i Hakàna hoe:'
  - type: text
    content: '–Marina tokoa fa izaho no nanota tamin’ny TOMPO Andriamanitr’i Israely ary ireto avy no nataoko: '
  '21':
  - type: text
    content: Tamin’ny zavatra babo dia nahitako kapaoty tsara tarehy iray avy any Babilôna sy volafotsy roa kilao ary anja-bolamena antsasa-kilao. Notsiriritiko fatratra ireo ka nalaiko. Ho hitanareo milevina anaty tany ao an-daiko ireny ka ny volafotsy no any ambany indrindra.
  '22':
  - type: text
    content: 'Dia nandefa iraka vitsivitsy ho any amin’ny lain’i Hakàna i Josoa. Nirohotra ho any faingana ireo, ary dia nahita ny zavatra nalevina ka ny volafotsy no tao ambany indrindra. '
  '23':
  - type: text
    content: Navoakan’ireo avy tao an-day ireny ka nentiny tany amin’i Josoa sy ny Israelita rehetra, ary napetrany teo anatrehan’ny TOMPO
  - type: note
    content: 'teo anatrehan’ny Tompo: izany hoe teo anoloan’ny Vatamasina izay noheverina ho sezafiandrianan’ny Tompo.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: Dia noraofin’i Josoa sy ny Israelita rehetra i Hakàna zafiafin’i Zera, noraofiny niaraka tamin’ny volafotsy sy ny akanjobeny ary ny anja-bolamena. Nalain’ireo koa ny zanakalahin’i Hakàna sy ny zanakavaviny, mbamin’ny ombiny sy ny borikiny, ondry aman’osiny, ary ny lainy mbamin’izay rehetra azy ka nentiny ho any amin’ny lohasaha Hakôra
  - type: note
    content: Ny lohasaha Hakôra dia tsy fantatra mazava ny toerana misy azy; fa izy no kizo ahazoana miala ny lohasahan’i Jôrdàna ho any amin’ny faritra be havoana any afovoan’i Palestinina.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Dia hoy i Josoa tamin’i Hakàna:'
  - type: text
    content: –Nampidi-doza anay loatra ianao! Koa hahatonga loza aminao kosa ny Tompo anio
  - type: note
    content: Ny matoanteny nadika hoe nampidi-doza dia misy itovizam-panononana sy hevitra amin’ny anarana hoe Hakôra fa teny miray fototra aminy.
  - type: text
    content: '!'
  - type: text
    content: 'Dia novonoin’ny Israelita rehetra tamin’ny tora-bato i Hakàna. (Novonoiny toy izany koa ny ankohonany, ary indray nodorany tamin’ny afo ny fananany rehetra). '
  '26':
  - type: text
    content: Avy eo dia nananganany antontam-bato lehibe teo ambonin’i Hakàna, ary mbola eo mandraka androany ilay antontam-bato. Izany no niantsoana io toerana io hoe lohasaha Hakôra mandraka ankehitriny.
  - type: text
    content: Taorian’izany vao nitony ny hatezeran’ny Tompo.
  '3':
  - type: text
    content: 'ary niverina tany amin’i Josoa ka nanao taminy hoe:'
  - type: text
    content: –Aoka tsy hiakatra avokoa ny tafika manontolo; fa roa arivo na telo arivo lahy ihany no aoka hiakatra hamely an’i Hay. Aza manasatra ny tafika manontolo any fa vitsy ihany ry zareo.
  '4':
  - type: text
    content: 'Koa tokony ho lehilahy telo arivo no niakatra tany. Kanjo voatery nandositra teo anatrehan’ny mponina tao Hay ireo; '
  '5':
  - type: text
    content: fa nahafatesany olona 36 ny Israelita sady nenjehiny nanomboka hatreo ambavahadin’ny tanàna ka hatrany Sebarîma
  - type: note
    content: 'Sebarîma: toerana tsy fantatra.'
  - type: text
    content: ' ary nasiany teny am-pidinana. Dia ketraka ny fon’ny vahoaka fa hoatra ny voatapo-drano.'
  '6':
  - type: text
    content: 'Dia '
  - type: text
    content: nandriatra fitafiana
  - type: text
    content: ' i Josoa sy ireo '
  - type: text
    content: loholon
  - type: text
    content: '’i Israely ka nanosom-bovoka ny lohany sady niankohoka tamin’ny tany teo anoloan’ny '
  - type: text
    content: Vatamasin’ny TOMPO
  - type: text
    content: ' mandra-paharivan’ny andro. '
  '7':
  - type: text
    content: 'Ary hoy i Josoa hoe:'
  - type: text
    content: '–Indrisy, ry Tompo ANDRIANANAHARY ô! Nahoana moa izahay vahoakanao izao no nentinao nita an’i Jôrdàna? Mba hanoloranao anay ho eo an-tanan’ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' ka handringanana anay ve? Naleonay ihany nijanona tany an-dafin’i Jôrdàna! '
  '8':
  - type: text
    content: 'Inona moa no azoko lazaina, ry Tompo, fa ny Israelita efa nandositra teo anoloan’ny fahavalony? '
  '9':
  - type: text
    content: Ho henon’ny Kanahanita sy ny mponina rehetra amin’ity tany ity izany, dia hikambana hamely anay ireo ka handringana anay; koa inona àry no hataonay mba hiekena ny lazanao lehibe?
