document_id: JOS.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana an’i Hakàna noho ny heloka vitany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nanao fahadisoana bevava ny Israelita tamin’ny fandikana didy momba ireo zavatra voatokana hafoy ho an’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 6.17-19.
    marker-yv: yv-n
  - type: text
    text: ; fa naka zavatra sasany tamin’ireo i Hakàna, zanakalahin’i Karmỳ sy zafin’i Zabdià ary zafiafin’i Zera sady anisan’ny fokon’i Joda, koa tezitra tamin’ny Israelita ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I Josoa kosa naniraka vatan-dehilahy avy tao Jerikao ho any Hay, izay tanàna ao atsinanan’i Betela eo akaikin’i Bety-Avena, ka nanome baiko azy mba hiakatra hisafo iny faritra iny. Dia niakatra nisafo an’i Hay ireo lehilahy ireo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary niverina tany amin’i Josoa ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aoka tsy hiakatra avokoa ny tafika manontolo; fa roa arivo na telo arivo lahy ihany no aoka hiakatra hamely an’i Hay. Aza manasatra ny tafika manontolo any fa vitsy ihany ry zareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa tokony ho lehilahy telo arivo no niakatra tany. Kanjo voatery nandositra teo anatrehan’ny mponina tao Hay ireo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa nahafatesany olona 36 ny Israelita sady nenjehiny nanomboka hatreo ambavahadin’ny tanàna ka hatrany Sebarîma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sebarîma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana tsy fantatra.
    marker-yv: yv-n
  - type: text
    text: ' ary nasiany teny am-pidinana. Dia ketraka ny fon’ny vahoaka fa hoatra ny voatapo-drano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra fitafiana
  - type: text
    text: ' i Josoa sy ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholon
  - type: text
    text: '’i Israely ka nanosom-bovoka ny lohany sady niankohoka tamin’ny tany teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasin’ny TOMPO
  - type: text
    text: ' mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy i Josoa hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Indrisy, ry Tompo ANDRIANANAHARY ô! Nahoana moa izahay vahoakanao izao no nentinao nita an’i Jôrdàna? Mba hanoloranao anay ho eo an-tanan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ka handringanana anay ve? Naleonay ihany nijanona tany an-dafin’i Jôrdàna! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Inona moa no azoko lazaina, ry Tompo, fa ny Israelita efa nandositra teo anoloan’ny fahavalony? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho henon’ny Kanahanita sy ny mponina rehetra amin’ity tany ity izany, dia hikambana hamely anay ireo ka handringana anay; koa inona àry no hataonay mba hiekena ny lazanao lehibe?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Josoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mitsangàna fa nahoana ianao no miankohoka toy izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nanota ny Israelita ka nivadika tamin’ny fanekempihavanana nodidiako hotandremany; fa ny zavatra nasaiko nolevonina dia nakany sy nangalany ary nanafenany ka nataony tanaty entany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izany no tsy hahazoan’ny Israelita hanohitra ny fahavalony; fa handositra eo anoloan’ireo ny Israelita, satria efa voaozona ho ringana. Tsy homba anareo intsony Aho raha tsy fongotra teo aminareo izay nasaiko nolevonina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandehana omany ny vahoaka mba hihaona amiko rahampitso ka ilazao izy mba samy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hanadio
  - type: text
    text: ' ny tenany; fa Izaho TOMPO Andriamanitr’i Israely no milaza amin’ny Israelita hoe: «Mbola manana zavatra nasaiko nolevonina ianareo; noho izany, tsy afaka hanohitra ny fahavalonareo ianareo raha tsy foana teo aminareo ireny zavatra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rahampitso maraina dia hiseho eo anatrehako araka ny fokony avy ianareo. Ny foko izay voatondroko dia hiseho eo anatrehako isan-tarika; ary ny tarika izay voatondroko dia hiseho isam-pianakaviana; ary ny lehilahy ao amin’izay fianakaviana voatondroko dia hiseho tsirairay eo anatrehako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanondroana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia tsy isalasalana fa atao amin’ny antsapaka (jereo 1 Sam 14.40-42).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hotondroiko ilay lehilahy mitana zavatra tokony holevonina, ka hodorana amin’ny afo izy mbamin’izay rehetra azy satria nivadika tamin’ny fanekempihavanako izy ka nanao izay tsy fanao teo amin’i Israely.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifoha vao maraina i Josoa ny ampitso ary nampanatona ny Israelita isam-pokony, ka ny fokon’i Joda no voatondro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nampanatoniny isan-tarika ny fokon’i Joda ka ny tarik’i Zera no voatondro. Dia narosony isam-pianakaviana ny tarik’i Zera ka ny fianakavian’i Zabdỳ no voatondro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia narosony tsirairay ny lehilahy tao amin’ny fianakavian’i Zabdỳ ka i Hakàna, zanakalahin’i Karmỳ sy zafin’i Zabdỳ ary zafiafin’i Zera sady anisan’ny fokon’i Joda, no voatondro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy i Josoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Anaka, omeo voninahitra sy haja ny TOMPO Andriamanitr’i Israely; lazao amiko izay nataonao fa aza misy afenina ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia novalian’i Hakàna hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Marina tokoa fa izaho no nanota tamin’ny TOMPO Andriamanitr’i Israely ary ireto avy no nataoko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’ny zavatra babo dia nahitako kapaoty tsara tarehy iray avy any Babilôna sy volafotsy roa kilao ary anja-bolamena antsasa-kilao. Notsiriritiko fatratra ireo ka nalaiko. Ho hitanareo milevina anaty tany ao an-daiko ireny ka ny volafotsy no any ambany indrindra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nandefa iraka vitsivitsy ho any amin’ny lain’i Hakàna i Josoa. Nirohotra ho any faingana ireo, ary dia nahita ny zavatra nalevina ka ny volafotsy no tao ambany indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Navoakan’ireo avy tao an-day ireny ka nentiny tany amin’i Josoa sy ny Israelita rehetra, ary napetrany teo anatrehan’ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'teo anatrehan’ny Tompo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany hoe teo anoloan’ny Vatamasina izay noheverina ho sezafiandrianan’ny Tompo.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia noraofin’i Josoa sy ny Israelita rehetra i Hakàna zafiafin’i Zera, noraofiny niaraka tamin’ny volafotsy sy ny akanjobeny ary ny anja-bolamena. Nalain’ireo koa ny zanakalahin’i Hakàna sy ny zanakavaviny, mbamin’ny ombiny sy ny borikiny, ondry aman’osiny, ary ny lainy mbamin’izay rehetra azy ka nentiny ho any amin’ny lohasaha Hakôra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lohasaha Hakôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia tsy fantatra mazava ny toerana misy azy; fa izy no kizo ahazoana miala ny lohasahan’i Jôrdàna ho any amin’ny faritra be havoana any afovoan’i Palestinina.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Josoa tamin’i Hakàna:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nampidi-doza anay loatra ianao! Koa hahatonga loza aminao kosa ny Tompo anio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny matoanteny nadika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nampidi-doza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia misy itovizam-panononana sy hevitra amin’ny anarana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hakôra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fa teny miray fototra aminy.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia novonoin’ny Israelita rehetra tamin’ny tora-bato i Hakàna. (Novonoiny toy izany koa ny ankohonany, ary indray nodorany tamin’ny afo ny fananany rehetra). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avy eo dia nananganany antontam-bato lehibe teo ambonin’i Hakàna, ary mbola eo mandraka androany ilay antontam-bato. Izany no niantsoana io toerana io hoe lohasaha Hakôra mandraka ankehitriny.
- type: usfm
  marker: p
  children:
  - type: text
    text: Taorian’izany vao nitony ny hatezeran’ny Tompo.
