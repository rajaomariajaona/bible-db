document_id: GAL.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana
  - type: text
    content: 'Avy amiko Paoly ity taratasy ity, dia izaho tonga '
  - type: text
    content: apôstôly
  - type: text
    content: ' tsy tamin’ny tendrin’olombelona na tamin’ny alalan’ny olombelona, fa noho i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' ary noho Andriamanitra Ray Izay nanangana azy ho velona avy any amin’ny maty. '
  '10':
  - type: text
    content: Olombelona ve ankehitriny no ilàko sitraka? Tsia, fa Andriamanitra no ilàko sitraka! Sa ny ho mamy hoditra amin’ny olombelona no tadiaviko? Raha mbola ny ho mamy hoditra amin’ny olombelona no tadiaviko, dia tsy mpanompon’i Kristy aho.
  - type: heading
    content: Ny nahatonga an’i Paoly ho apôstôly
  '11':
  - type: text
    content: 'Ampahafantariko anareo, ry havana, fa ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' notorîko taminareo dia tsy zavatra novolavolain’olombelona. '
  '12':
  - type: text
    content: 'Tsy hoe olombelona no nandraisako azy na nianarako azy, fa i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' no nanambara azy tamiko.'
  '13':
  - type: text
    content: 'Eny, efa renareo ny fomba fiainako fahiny fony aho mbola nanaraka ny fivavahana jiosy: nanenjika lozantany ny Fiangonan’Andriamanitra aho ary nilofo handrava azy. '
  '14':
  - type: text
    content: Nandroso tokoa aho tamin’ny fivavahana jiosy ary nihoatra ny ankamaroan’ireo indray nihira tamiko teo amin’ny fireneko sady fatra-pitana kokoa noho izy ireo ny fampianarana nampitain’ny razako
  - type: note
    content: 'And 13-14: jereo Asa 8.3; 22.3-5; 26.9-11.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Kanefa natokan’Andriamanitra dieny hatrany am-bohòka aho ary nantsoiny hanompo Azy noho ny fahasoavany. '
  '16':
  - type: text
    content: 'Ary rehefa sitrak’Andriamanitra ny nanambara ny '
  - type: text
    content: Zanany
  - type: text
    content: ' tato anatiko, mba hitoriako ny Vaovao Mahafaly momba azy amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ', dia tsy naka saina tamin’olombelona osa sy malemy aho'
  - type: note
    content: 'And 15: ampit Is 49.1; Jer 1.5. –And 15-16: jereo Asa 9.3-6; 22.6-10; 26.13-18.'
  - type: text
    content: ', '
  '17':
  - type: text
    content: 'ary tsy niakatra tany Jerosalema hanatona ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' talohako; fa lasa aho nankany Arabia ary dia niverina tany Damasy indray. '
  '18':
  - type: text
    content: Telo taona taorian’izany vao niakatra tany Jerosalema aho mba hifankahita amin’i Petera ary dia nitoetra tapa-bolana niaraka taminy
  - type: note
    content: 'Jereo Asa 9.26-30. –Petera: ny rijan-teny grika fototra dia mampiasa ny hoe Kefasy, izay teny aramianina mitovy hevitra amin’ny hoe Petera (jereo Jôh 1.42). Toraka izany koa 2.11.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: Tsy nahita apôstôly hafa aho; fa ny hitako dia i Jakôba rahalahin’ny Tompo
  - type: note
    content: I Jakôba rahalahin’ny Tompo dia iray tamin’ireo tompon’andraikitra lohandohany niadidy ny Fiangonana tao Jerosalema (jereo 2.9; Asa 15.13).
  - type: text
    content: .
  '2':
  - type: text
    content: Mamangy anareo Fiangonana atỳ Galatia
  - type: note
    content: Ny faritany Galatia fahizany dia heverina ho ilay faritany manodidina ny renivohitra Ankarà ankehitriny, any Torkia. Jereo Asa 16.6.
  - type: text
    content: ' aho ary mamangy anareo koa ny kristianina rehetra tafaraka amiko eto. '
  '20':
  - type: text
    content: Momba izao zavatra soratako aminareo izao, dia ijoroako eto anatrehan’Andriamanitra fa tsy mandainga aho!
  '21':
  - type: text
    content: 'Taorian’izany, dia lasa nankany amin’ny faritany Siria sy Silisia aho. '
  '22':
  - type: text
    content: 'Nandritra izany fotoana izany, dia tsy mbola nisy nahita tava ahy ireo anisan’ny Fiangonana kristianina tany Jodea. '
  '23':
  - type: text
    content: 'Fa nandre fotsiny izy ireo hoe: «Ilay mpanenjika antsika fahiny dia indro ankehitriny mitory ny finoana izay nilofosany horavana fahiny!» '
  '24':
  - type: text
    content: Ary dia nanome voninahitra an’Andriamanitra ry zareo noho ny amiko.
  '3':
  - type: text
    content: 'Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Jesoa Kristy Tompontsika. '
  '4':
  - type: text
    content: 'Araka ny sitrapon’Andriamanitra sady Raintsika, dia nanolo-tena i Jesoa Kristy mba hamonjy antsika amin’ny fahotantsika ary hanafaka antsika amin’izao tontolo anjakan’ny ratsy ankehitriny izao. '
  '5':
  - type: text
    content: 'Eny, ho Azy Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay! '
  - type: text
    content: Amen
  - type: text
    content: .
  - type: heading
    content: Tokana ny Vaovao Mahafaly
  '6':
  - type: text
    content: 'Gaga aho fa tsy toy inona akory dia ilaozanareo ilay Andriamanitra niantso anareo tamin’ny fahasoavan’i '
  - type: text
    content: Kristy
  - type: text
    content: ', ka dia Vaovao Mahafaly hafa no itodihanareo'
  - type: note
    content: 'tamin’ny fahasoavan’i Kristy: misy stf sasany ahitana hoe tamin’ny fahasoavany (fahasoavan’Andriamanitra). –Vaovao Mahafaly hafa: araka ny foto-kevitra ijoroan’ireo mpampiely izany «Vaovao Mahafaly hafa» izany tamin’izay, dia tsy ampy hahavoavonjy ny finoana an’i Kristy fa takîna ihany koa ny fanarahana ireo fepetra raketin’ny lalàna jiosy, indrindra fa ny famorana sy ny tsy fifaneraserana amin’ny hafa firenena. Jereo 2.3-5, 12.14.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Tsy hoe misy Vaovao Mahafaly hafa tsy akory, saingy misy olona mandrebireby anareo ary te hamilavila ny Vaovao Mahafaly momba an’i Kristy. '
  '8':
  - type: text
    content: 'Kanefa raha misy olona, na dia izahay na '
  - type: text
    content: anjely
  - type: text
    content: ' avy any an-danitra aza, mitory Vaovao Mahafaly hafa noho izay efa notorînay taminareo, dia aoka izy ho voaozona! '
  '9':
  - type: text
    content: Efa voalazanay taminareo taloha izany ary mbola averiko indray ankehitriny fa raha misy mitory Vaovao Mahafaly hafa noho izay efa noraisinareo, aoka izy ho voaozona!
