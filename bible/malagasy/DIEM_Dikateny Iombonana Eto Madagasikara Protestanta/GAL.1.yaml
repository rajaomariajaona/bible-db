document_id: GAL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy amiko Paoly ity taratasy ity, dia izaho tonga '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' tsy tamin’ny tendrin’olombelona na tamin’ny alalan’ny olombelona, fa noho i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' ary noho Andriamanitra Ray Izay nanangana azy ho velona avy any amin’ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mamangy anareo Fiangonana atỳ Galatia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny faritany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Galatia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' fahizany dia heverina ho ilay faritany manodidina ny renivohitra Ankarà ankehitriny, any Torkia. Jereo Asa 16.6.'
    marker-yv: yv-n
  - type: text
    text: ' aho ary mamangy anareo koa ny kristianina rehetra tafaraka amiko eto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy i Jesoa Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Araka ny sitrapon’Andriamanitra sady Raintsika, dia nanolo-tena i Jesoa Kristy mba hamonjy antsika amin’ny fahotantsika ary hanafaka antsika amin’izao tontolo anjakan’ny ratsy ankehitriny izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, ho Azy Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay! '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amen
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tokana ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Gaga aho fa tsy toy inona akory dia ilaozanareo ilay Andriamanitra niantso anareo tamin’ny fahasoavan’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ', ka dia Vaovao Mahafaly hafa no itodihanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tamin’ny fahasoavan’i Kristy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy stf sasany ahitana hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tamin’ny fahasoavany
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (fahasoavan’Andriamanitra). –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Vaovao Mahafaly hafa:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny foto-kevitra ijoroan’ireo mpampiely izany «Vaovao Mahafaly hafa» izany tamin’izay, dia tsy ampy hahavoavonjy ny finoana an’i Kristy fa takîna ihany koa ny fanarahana ireo fepetra raketin’ny lalàna jiosy, indrindra fa ny famorana sy ny tsy fifaneraserana amin’ny hafa firenena. Jereo 2.3-5, 12.14.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy hoe misy Vaovao Mahafaly hafa tsy akory, saingy misy olona mandrebireby anareo ary te hamilavila ny Vaovao Mahafaly momba an’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa raha misy olona, na dia izahay na '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' avy any an-danitra aza, mitory Vaovao Mahafaly hafa noho izay efa notorînay taminareo, dia aoka izy ho voaozona! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa voalazanay taminareo taloha izany ary mbola averiko indray ankehitriny fa raha misy mitory Vaovao Mahafaly hafa noho izay efa noraisinareo, aoka izy ho voaozona!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Olombelona ve ankehitriny no ilàko sitraka? Tsia, fa Andriamanitra no ilàko sitraka! Sa ny ho mamy hoditra amin’ny olombelona no tadiaviko? Raha mbola ny ho mamy hoditra amin’ny olombelona no tadiaviko, dia tsy mpanompon’i Kristy aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ny nahatonga an’i Paoly ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ampahafantariko anareo, ry havana, fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' notorîko taminareo dia tsy zavatra novolavolain’olombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy hoe olombelona no nandraisako azy na nianarako azy, fa i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: ' no nanambara azy tamiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, efa renareo ny fomba fiainako fahiny fony aho mbola nanaraka ny fivavahana jiosy: nanenjika lozantany ny Fiangonan’Andriamanitra aho ary nilofo handrava azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nandroso tokoa aho tamin’ny fivavahana jiosy ary nihoatra ny ankamaroan’ireo indray nihira tamiko teo amin’ny fireneko sady fatra-pitana kokoa noho izy ireo ny fampianarana nampitain’ny razako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 13-14:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Asa 8.3; 22.3-5; 26.9-11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa natokan’Andriamanitra dieny hatrany am-bohòka aho ary nantsoiny hanompo Azy noho ny fahasoavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa sitrak’Andriamanitra ny nanambara ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanany
  - type: text
    text: ' tato anatiko, mba hitoriako ny Vaovao Mahafaly momba azy amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hafa firenena
  - type: text
    text: ', dia tsy naka saina tamin’olombelona osa sy malemy aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 15:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Is 49.1; Jer 1.5. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 15-16:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Asa 9.3-6; 22.6-10; 26.13-18.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary tsy niakatra tany Jerosalema hanatona ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' talohako; fa lasa aho nankany Arabia ary dia niverina tany Damasy indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Telo taona taorian’izany vao niakatra tany Jerosalema aho mba hifankahita amin’i Petera ary dia nitoetra tapa-bolana niaraka taminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Asa 9.26-30. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Petera:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny rijan-teny grika fototra dia mampiasa ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kefasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', izay teny aramianina mitovy hevitra amin’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Petera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Jôh 1.42). Toraka izany koa 2.11.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy nahita apôstôly hafa aho; fa ny hitako dia i Jakôba rahalahin’ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Jakôba rahalahin’ny Tompo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia iray tamin’ireo tompon’andraikitra lohandohany niadidy ny Fiangonana tao Jerosalema (jereo 2.9; Asa 15.13).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Momba izao zavatra soratako aminareo izao, dia ijoroako eto anatrehan’Andriamanitra fa tsy mandainga aho!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Taorian’izany, dia lasa nankany amin’ny faritany Siria sy Silisia aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandritra izany fotoana izany, dia tsy mbola nisy nahita tava ahy ireo anisan’ny Fiangonana kristianina tany Jodea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nandre fotsiny izy ireo hoe: «Ilay mpanenjika antsika fahiny dia indro ankehitriny mitory ny finoana izay nilofosany horavana fahiny!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary dia nanome voninahitra an’Andriamanitra ry zareo noho ny amiko.
