document_id: MRK.10,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampianaran’i Jesoa momba ny fanambadiana
  - type: heading
    content: (Jereo Mt 19.1-12; Lk 16.18)
  - type: text
    content: Nony niala teo i Jesoa, dia nankany amin’ny faritra antsisin’i Jodea, eny andafin’ny ony Jôrdàna. Ary tonga maro teo aminy indray ny olona, ka nampianariny toy ny fanaony.
  '10':
  - type: text
    content: 'Ary nony mby tao an-trano, dia nanontanian’ny mpianatra ny amin’izany indray i Jesoa; '
  '11':
  - type: text
    content: 'ka hoy i Jesoa taminy:'
  - type: text
    content: '–Na iza na iza lehilahy manary vady ka mampakatra vehivavy hafa dia manitsakitsaka ny vadiny teo aloha. '
  '12':
  - type: text
    content: Ary raha ny vavy no manary ny vadiny ka manambady lehilahy hafa, dia manitsakitsaka ny vadiny teo aloha.
  - type: heading
    content: Tsofin’i Jesoa rano ny zaza
  - type: heading
    content: (Jereo Mt 19.13-15; Lk 18.15-18)
  '13':
  - type: text
    content: 'Nisy olona maro nitondra ankizy madinika nankeo amin’i Jesoa hametrahany tanana; nefa notenenin’ny mpianatra mafy ireo olona ireo. '
  '14':
  - type: text
    content: 'Nahita izany i Jesoa ka tezitra ary nilaza tamin’ny mpianany hoe:'
  - type: text
    content: '–Avelao ny ankizy madinika hanatona Ahy, fa aza raràna, satria an’ny toa azy ireny ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '. '
  '15':
  - type: text
    content: Lazaiko marina aminareo fa na iza na iza tsy mandray ny Fanjakàn’Andriamanitra toy ny andraisan’ny ankizy madinika azy, dia tsy ho tafiditra ao.
  '16':
  - type: text
    content: Avy eo dia notrotroin’i Jesoa ireo zaza ireo ary nametrahany tanana ka notsofiny rano.
  - type: heading
    content: Ilay lehilahy mpanankarena
  - type: heading
    content: (Jereo Mt 19.16-30; Lk 18.18-30)
  '17':
  - type: text
    content: 'Ary nony niainga handeha i Jesoa, dia nisy lehilahy nanatona Azy, ka nandohalika teo anoloany ary nanontany Azy hoe:'
  - type: text
    content: –Ry Mpampianatra tapitra ohatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
  '18':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Nahoana Aho no ataonao hoe tapitra ohatra? Tsy misy tapitra ohatra afa-tsy Andriamanitra irery ihany. '
  '19':
  - type: text
    content: 'Fantatrao ny didy hoe: «Aza mamono olona, aza maka vadin’olona, aza mangalatra, aza manao vavolombelona tsy marina», aza manambaka'
  - type: note
    content: 'Jereo Eks 20.12-16; Deot 5.16-20. –aza manambaka: tsy anisan’ny didy folo mivantana izany sady tsy raketin’ireo perikôpa mifanandrify ao amin’ny Mt sy Lio.'
  - type: text
    content: ', «hajao ny rainao sy ny reninao.»'
  '2':
  - type: text
    content: 'Dia nisy '
  - type: text
    content: Farisianina
  - type: text
    content: ' nanatona an’i Jesoa mba hamandrika Azy ka nanontany Azy hoe:'
  - type: text
    content: –Azon’ny lehilahy atao ve ny manary vady?
  '20':
  - type: text
    content: 'Fa hoy ralehilahy taminy:'
  - type: text
    content: –Mpampianatra ô, izany rehetra izany dia efa voatandriko hatramin’ny fahatanorako!
  '21':
  - type: text
    content: 'Dia nijery azy tsara i Jesoa ka velom-pitiavana azy ary niteny taminy hoe:'
  - type: text
    content: –Zavatra iray no tsy ampy aminao; ndeha amidio ny fanananao rehetra ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia hiaraka amiko.
  '22':
  - type: text
    content: Dia nanjombona endrika ralehilahy noho izany teny izany; ka lasa nandeha tamin’alahelo, satria nanan-karembe.
  '23':
  - type: text
    content: 'Fa i Jesoa kosa nijerijery manodidina azy ka niteny tamin’ny mpianany hoe:'
  - type: text
    content: '–Sarotra mihitsy amin’ny mpanankarena ny hiditra ao amin’ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: '!'
  '24':
  - type: text
    content: 'Gaga ny mpianatra noho izany teniny izany, kanefa dia mbola namerina ny teniny indray i Jesoa ka nanao taminy hoe:'
  - type: text
    content: –Sarotra mihitsy, anaka, ny miditra ao amin’ny Fanjakàn’Andriamanitra
  - type: note
    content: 'Sarotra...Andriamanitra: misy stf sasany manampy hoe ho an’izay mitoky amin-karena alohan’ny teny hoe ny miditra... Andriamanitra.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: Moramora kokoa ny idiran’ny rameva ao amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra
  - type: note
    content: dkt hafa Moramora kokoa ny idiran’ny tadimahazaka ao amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra.
  - type: text
    content: .
  '26':
  - type: text
    content: 'Vao mainka talanjona ireo mpianatra ka nifanontany hoe:'
  - type: text
    content: –Ka iza àry no mety ho voavonjy?
  '27':
  - type: text
    content: 'Fa nojeren’i Jesoa tsara ireto mpianany sady nataony hoe:'
  - type: text
    content: –Raha amin’ny olombelona, dia zavatra tsy hainy izany; fa tsy mba toy izany amin’Andriamanitra. Raha amin’Andriamanitra manko, dia hainy avokoa ny zava-drehetra.
  '28':
  - type: text
    content: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: text
    content: –Indro izahay efa nahafoy ny zavatra rehetra ary dia izao miaraka aminao izao.
  '29':
  - type: text
    content: 'Ka hoy i Jesoa tamin’ny mpianany:'
  - type: text
    content: '–Lazaiko marina aminareo fa tsy misy olona mahafoy trano na mpiray tampo na reny na ray na zanaka na tany noho ny fitiavana Ahy sy fitiavana ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ', '
  '3':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Inona no didy nomen’i Mosesy anareo?
  '30':
  - type: text
    content: 'ka tsy hahazo injato henin’izany ankehitriny amin’izao etỳ izao, dia trano sy mpiray tampo sy reny sy zanaka sy tany, ombam-panenjehana ihany koa, ary hahazo ny fiaina-maharitra mandrakizay amin’ny andro ho avy. '
  '31':
  - type: text
    content: Kanefa maro amin’ireo voalohany no ho farany, ary maro amin’ireo farany no ho voalohany.
  - type: heading
    content: Ambaran’i Jesoa fanintelony ny hahafatesany sy ny hitsanganany ho velona
  - type: heading
    content: (Jereo Mt 20.17-19; Lk 18.31-34)
  '32':
  - type: text
    content: 'Teny an-dalana miakatra ho any Jerosalema i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: '; ka i Jesoa no lohalalana, ary gaga ny mpianatra; ny olon-kafa tafara-dia tamin-dry zareo kosa raiki-tahotra. Dia nalain’i Jesoa ho eo aminy indray ny 12 lahy, ka nilazany an’izay madiva hanjo Azy:'
  '33':
  - type: text
    content: '–Indro miakatra ho any Jerosalema isika; ary ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ' dia hatolotra an’ireo lohandoha-mpisorona sy '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ', hohelohiny ho faty; ry zareo kosa hanolotra azy amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' '
  '34':
  - type: text
    content: ka hoesoiny, hororany sy hokapohiny ary dia hovonoiny ho faty. Kanefa andro fahatelo aorian’izany, dia hitsangana velona Izy.
  - type: heading
    content: Ny fangatahana nataon’i Jakôba sy i Jôhany
  - type: heading
    content: (Jereo Mt 20.20-28)
  '35':
  - type: text
    content: 'Fa nanatona an’i Jesoa ry i Jakôba sy i Jôhany zanakalahin’i Zebedeo ka nanao taminy hoe:'
  - type: text
    content: –Mpampianatra ô, irînay ny hanaovanao aminay izay hangatahinay aminao izao!
  '36':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Inona àry no irînareo hataoko aminareo?
  '37':
  - type: text
    content: 'Ka novalian’izy mirahalahy hoe:'
  - type: text
    content: –Ny anankiray aminay mirahalahy mba hipetraka eo ankavananao ary ny anankiray eo ankavianao, rehefa heni-boninahitra Ianao.
  '38':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Tsy fantatrareo manko izay angatahinareo; vitanareo ve ny hiaritra fijaliana tahaka ny hiaretako, na ny hiroso amin’ny batisa hirosoako?
  '39':
  - type: text
    content: 'Ka novalian’ireo hoe:'
  - type: text
    content: –Vitanay!
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: –Ny fijaliana hiaretako dia hiaretanareo tokoa, ary ny batisa hirosoako dia hirosoanareo tokoa
  - type: note
    content: Ampit Asa 12.2.
  - type: text
    content: '; '
  '4':
  - type: text
    content: 'Dia hoy iretsy hoe:'
  - type: text
    content: –Navelan’i Mosesy «hanao taratasy fisaraham-panambadiana sy hanary vady
  - type: note
    content: Jereo Deot 24.1.
  - type: text
    content: » ny lehilahy.
  '40':
  - type: text
    content: fa izany hoe hipetraka eo ankavanako na eo ankaviako izany kosa tsy miankina amiko, fa ho an’izay nanomanan’Andriamanitra azy.
  '41':
  - type: text
    content: 'Nony nandre izany izy folo lahy, dia tezitra tamin’i Jakôba sy i Jôhany. '
  '42':
  - type: text
    content: 'Fa nantsoin’i Jesoa hanatona azy izy rehetra ka nilazany hoe:'
  - type: text
    content: '–Fantatrareo fa, eo amin’ny hafa firenena, ireo heverina hoe filohany dia manjakazaka; ary ny lehibeny dia manampatra fahefana. '
  '43':
  - type: text
    content: 'Tsy mba toy izany kosa eo aminareo; fa izay te ho lehibe eo aminareo dia ho mpiasanareo, '
  '44':
  - type: text
    content: 'ary izay te ho voalohany eo aminareo dia ho mpanomponareo. '
  '45':
  - type: text
    content: 'Satria tsy hotompoina no nahatongavan’ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: ', fa hanompo ary hanolotra ny ainy ho fanavotana ny besinimaro'
  - type: note
    content: Ampit 14.24; 1Tim 2.6.
  - type: text
    content: '!'
  - type: heading
    content: Ampahiratin’i Jesoa ny mason’i Bartimeo jamba
  - type: heading
    content: (Jereo Mt 20.29-34; Lk 18.35-43)
  '46':
  - type: text
    content: 'Dia tonga tao Jerikao ry i Jesoa sy ny mpiara-dia taminy. Ary fony niala ny tanàna i Jesoa sy ny '
  - type: text
    content: mpianany
  - type: text
    content: ' mbamin’ny vahoaka be, dia efa nipetraka teo amoron-dalana i Bartimeo jamba mpangataka. '
  '47':
  - type: text
    content: 'Reny fa i Jesoa avy any Nazareta izay, ka nanomboka niantsoantso mafy izy hoe:'
  - type: text
    content: '–Ry Jesoa '
  - type: text
    content: Zanak’i Davida
  - type: text
    content: ' ô, mamindrà fo amiko!'
  '48':
  - type: text
    content: 'Norahonan’ny olona maro izy hangina, fa vao mainka koa niantsoantso mafy hoe:'
  - type: text
    content: –Ry Zanak’i Davida ô, mamindrà fo amiko!
  '49':
  - type: text
    content: 'Ary nijanona i Jesoa ka nilaza hoe:'
  - type: text
    content: –Antsoy izy!
  - type: text
    content: 'Dia nantsoin’ny olona ilay jamba nataony hoe:'
  - type: text
    content: –Mahereza, antsoiny ianao ka mitsangàna!
  '5':
  - type: text
    content: 'Hoy koa i Jesoa taminy:'
  - type: text
    content: '–Noho ianareo mafy fo no nanoratan’i Mosesy izany didy izany ho anareo. '
  '50':
  - type: text
    content: 'Natsipin’i Bartimeo ny lambany, ka niantsambotra nanatona an’i Jesoa izy. '
  '51':
  - type: text
    content: 'Dia niteny i Jesoa nanao taminy hoe:'
  - type: text
    content: –Inona no tianao hataoko aminao?
  - type: text
    content: 'Dia hoy ilay jamba taminy:'
  - type: text
    content: –Mpampianatra ô, ny hampahiratra ahy!
  '52':
  - type: text
    content: 'Ka hoy i Jesoa:'
  - type: text
    content: –Mandehana, ny finoanao no nahasitrana anao
  - type: note
    content: nahasitrana anao na hoe nahavonjy anao.
  - type: text
    content: '!'
  - type: text
    content: Dia nahiratra niaraka tamin’izay ilay jamba, ka lasa nanaraka an’i Jesoa teny an-dalana.
  '6':
  - type: text
    content: Fa hatrany am-piandohana, fony nahary izao tontolo izao Andriamanitra, «dia nanao ny olona ho lahy sy vavy
  - type: note
    content: Gen 1.27; 5.2.
  - type: text
    content: '.» '
  '7':
  - type: text
    content: '«Noho izany, dia handao ny ray aman-dreniny ny lehilahy ka hikambana amin’ny vadiny '
  '8':
  - type: text
    content: ary dia ho tena iray ihany izy roroa
  - type: note
    content: Gen 2.24. –Misy stf sasany tsy ahitana ny hoe ka hikambana amin’ny vadiny.
  - type: text
    content: '.» Koa tsy roa intsony rehefa mpivady, fa tena iray ihany; '
  '9':
  - type: text
    content: noho izany, izay nakamban’Andriamanitra, aoka tsy hosarahin’olombelona.
