      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaga ny mpianatra noho izany teniny izany, kanefa dia mbola namerina ny teniny indray i Jesoa ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
