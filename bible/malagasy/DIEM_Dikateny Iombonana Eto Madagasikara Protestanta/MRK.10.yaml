  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao mainka talanjona ireo mpianatra ka nifanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ka iza àry no mety ho voavonjy?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nojeren’i Jesoa tsara ireto mpianany sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha amin’ny olombelona, dia zavatra tsy hainy izany; fa tsy mba toy izany amin’Andriamanitra. Raha amin’Andriamanitra manko, dia hainy avokoa ny zava-drehetra.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Petera tamin’i Jesoa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Indro izahay efa nahafoy ny zavatra rehetra ary dia izao miaraka aminao izao.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
