verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampianaran’i Jesoa momba ny fanambadiana
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 19.1-12; Lk 16.18)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony niala teo i Jesoa, dia nankany amin’ny faritra antsisin’i Jodea, eny andafin’ny ony Jôrdàna. Ary tonga maro teo aminy indray ny olona, ka nampianariny toy ny fanaony.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony mby tao an-trano, dia nanontanian’ny mpianatra ny amin’izany indray i Jesoa; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Na iza na iza lehilahy manary vady ka mampakatra vehivavy hafa dia manitsakitsaka ny vadiny teo aloha. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ary raha ny vavy no manary ny vadiny ka manambady lehilahy hafa, dia manitsakitsaka ny vadiny teo aloha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsofin’i Jesoa rano ny zaza
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 19.13-15; Lk 18.15-18)
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy olona maro nitondra ankizy madinika nankeo amin’i Jesoa hametrahany tanana; nefa notenenin’ny mpianatra mafy ireo olona ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahita izany i Jesoa ka tezitra ary nilaza tamin’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Avelao ny ankizy madinika hanatona Ahy, fa aza raràna, satria an’ny toa azy ireny ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fanjakàn’Andriamanitra
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Lazaiko marina aminareo fa na iza na iza tsy mandray ny Fanjakàn’Andriamanitra toy ny andraisan’ny ankizy madinika azy, dia tsy ho tafiditra ao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy eo dia notrotroin’i Jesoa ireo zaza ireo ary nametrahany tanana ka notsofiny rano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay lehilahy mpanankarena
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 19.16-30; Lk 18.18-30)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niainga handeha i Jesoa, dia nisy lehilahy nanatona Azy, ka nandohalika teo anoloany ary nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ry Mpampianatra tapitra ohatra ô, inona no tokony hataoko hananako anjara amin’ny fiaina-maharitra mandrakizay?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Nahoana Aho no ataonao hoe tapitra ohatra? Tsy misy tapitra ohatra afa-tsy Andriamanitra irery ihany. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fantatrao ny didy hoe: «Aza mamono olona, aza maka vadin’olona, aza mangalatra, aza manao vavolombelona tsy marina», aza manambaka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
