    - type: text
      text: ' nanatona an’i Jesoa mba hamandrika Azy ka nanontany Azy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Azon’ny lehilahy atao ve ny manary vady?
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ralehilahy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mpampianatra ô, izany rehetra izany dia efa voatandriko hatramin’ny fahatanorako!
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijery azy tsara i Jesoa ka velom-pitiavana azy ary niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Zavatra iray no tsy ampy aminao; ndeha amidio ny fanananao rehetra ka zarao amin’ny mahantra ny vidiny, dia hanana rakitra any an-danitra ianao; raha efa izany, dia hiaraka amiko.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanjombona endrika ralehilahy noho izany teny izany; ka lasa nandeha tamin’alahelo, satria nanan-karembe.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa i Jesoa kosa nijerijery manodidina azy ka niteny tamin’ny mpianany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Sarotra mihitsy amin’ny mpanankarena ny hiditra ao amin’ny '
    - type: usfm
      marker: w
