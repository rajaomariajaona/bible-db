  - type: usfm
    marker: m
    children:
    - type: text
      text: Moramora kokoa ny idiran’ny rameva ao amin’ny vodifanjaikely noho ny idiran’ny mpanankarena ao amin’ny Fanjakàn’Andriamanitra
    - type: usfm
