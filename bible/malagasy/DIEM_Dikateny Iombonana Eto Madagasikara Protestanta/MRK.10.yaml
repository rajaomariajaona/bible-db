      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'aza manambaka:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tsy anisan’ny didy folo mivantana izany sady tsy raketin’ireo perikôpa mifanandrify ao amin’ny Mt sy Lio.'
      marker-yv: yv-n
    - type: text
      text: ', «hajao ny rainao sy ny reninao.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy '
    - type: usfm
      marker: w
