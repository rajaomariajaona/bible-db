        text: '1'
    - type: text
      text: –Miverena, miverena, ry Solemita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miverena, miverena hijerenay anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Nahoana ianareo no mijery ilay Solemita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mijery ny dihin’ny roa tonta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Solemita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'iadian-kevitra ny hevitr’ity fiantsoana an-drazazavavy ity: angamba mety avy amin’ny Salômôna ihany. Na fampahatsiarovana ny hatsaran-tarehin’i Abisaga avy any Sonema (ilay Sonamita / Solemita.) Jereo 1 Mp 1.3-4; 2.17,21. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny dihin’ny roa tonta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': mety ho dihy izay fanao amin’ny mariazy.'
      marker-yv: yv-n
    - type: text
      text: '?'
