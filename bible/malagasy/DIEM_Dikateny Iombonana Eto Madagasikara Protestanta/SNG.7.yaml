document_id: SNG.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: –Miverena, miverena, ry Solemita;
  - type: text
    content: miverena, miverena hijerenay anao.
  - type: text
    content: –Nahoana ianareo no mijery ilay Solemita,
  - type: text
    content: toy ny mijery ny dihin’ny roa tonta
  - type: note
    content: 'Solemita: iadian-kevitra ny hevitr’ity fiantsoana an-drazazavavy ity: angamba mety avy amin’ny Salômôna ihany. Na fampahatsiarovana ny hatsaran-tarehin’i Abisaga avy any Sonema (ilay Sonamita / Solemita.) Jereo 1 Mp 1.3-4; 2.17,21. –ny dihin’ny roa tonta: mety ho dihy izay fanao amin’ny mariazy.'
  - type: text
    content: '?'
  - type: heading
    content: (Ralehilahy)
  '10':
  - type: text
    content: ary ny vavanao hankafiziko
  - type: text
    content: tahaka ny divay tsara...!
  - type: heading
    content: (Ravehivavy)
  - type: text
    content: '...eny, divay tsara voatokana ho an’ny malalako'
  - type: text
    content: ary hisoko amin’ny molotray rehefa matory.
  '11':
  - type: text
    content: An’ny malalako aho
  - type: text
    content: ary ho amiko ny faniriany.
  - type: heading
    content: Sambatra fa tiana
  - type: heading
    content: (Ravehivavy)
  '12':
  - type: text
    content: Avia, ry malalako,
  - type: text
    content: ndeha isika ho any an-tsaha
  - type: text
    content: ka hialina eny anivon’ny voninkazo dia
  - type: note
    content: 'eny... voninkazo dia: dkt hafa eny ambanivohitra.'
  - type: text
    content: .
  '13':
  - type: text
    content: Hankany an-tanimboaloboka isika,
  - type: text
    content: dieny vao maraina ny andro,
  - type: text
    content: hijery raha mitsimoka ny voaloboka
  - type: text
    content: na efa mivelatra ny voniny,
  - type: text
    content: ary mamelana ny ampongabendanitra.
  - type: text
    content: Any no hanomezako safosafo anao.
  '14':
  - type: text
    content: Mihanaka ny hanitry ny paomam-pitiavana
  - type: note
    content: paomam-pitiavana na hoe mandragôra (jereo Gen 30.14-16).
  - type: text
    content: .
  - type: text
    content: Ary eo am-baravarantsika avokoa
  - type: text
    content: ireo voankazo matsiro, na ny vao na ny ela;
  - type: text
    content: samy atokako ho anao ireny, ry malalako.
  '2':
  - type: text
    content: Endrey, ry ilay zanakavavin’olom-banona,
  - type: text
    content: ny hatsaran’ny tongotrao mikapa!
  - type: text
    content: Ny amboampenao dia toa fehivozona
  - type: text
    content: izay sangan’asan’ny mpahay taozavatra.
  '3':
  - type: text
    content: Ny foitranao dia miendrika kaopy boribory
  - type: note
    content: Ampit. Ezek 16.4.
  - type: text
    content: ;
  - type: text
    content: tsy ho diso divay nolaroin-java-manitra anie izany.
  - type: text
    content: Ny kibonao dia toa antontam-barimbazaha
  - type: text
    content: izay voaravaka lisy manodidina.
  '4':
  - type: text
    content: Ny nononao roa dia hoatra zana-gazela,
  - type: text
    content: dia gazela kambana mbola tanora.
  '5':
  - type: text
    content: Ny vozonao dia toa tilikambo ivoary.
  - type: text
    content: Ny masonao dia manahaka
  - type: text
    content: ireo kamory any Hesbôna,
  - type: text
    content: eo am-bavahadin’i Baty-Rabima
  - type: note
    content: 'tilikambo ivoary: toa noho ny lokony fotsy no ilazana ilay tilikambo hoe ivoara. –Hesbôna: tanàna tranain’i Môaba, 35 km atsinanan’i Jerikao eo ho eo.'
  - type: text
    content: .
  - type: text
    content: Ny oronao dia maranidranitra
  - type: text
    content: tahaka ilay Tilikambon’i Libano
  - type: text
    content: izay mpiambina tandrifin’i Damasy.
  '6':
  - type: text
    content: Eo ambonin’ny tenabenao,
  - type: text
    content: ny lohanao dia meva fisandratra
  - type: text
    content: tahaka ny tendrombohitra Karmela;
  - type: text
    content: ny volon-dohanao dia sady mivolomparasy
  - type: text
    content: no olioly mambabo ny mpanjaka.
  '7':
  - type: text
    content: Tsara tarehy sady mahafinaritra tokoa ianao,
  - type: text
    content: ry tiako sy vehivavy loharanon-kasambarako.
  '8':
  - type: text
    content: Izato tsangananao dia matsoraka
  - type: text
    content: tahaka ny hazo palma;
  - type: text
    content: ary ireo nononao
  - type: text
    content: dia toa sampahom-boaloboka.
  '9':
  - type: text
    content: 'Izany no mampiteny ahy hoe:'
  - type: text
    content: «Hianika ny hazo palma aho
  - type: text
    content: ka handray ny rantsany.»
  - type: text
    content: Enga anie ireo nononao
  - type: text
    content: ho toa sampahom-boaloboka ho ahy;
  - type: text
    content: enga anie ny hanitry ny fofonainao
  - type: text
    content: hamerovero tahaka ny paoma,
