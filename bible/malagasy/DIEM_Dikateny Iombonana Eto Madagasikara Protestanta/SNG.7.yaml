  - type: usfm
    marker: q1
    children:
    - type: text
      text: '...eny, divay tsara voatokana ho an’ny malalako'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisoko amin’ny molotray rehefa matory.
  '11':
  - type: usfm
