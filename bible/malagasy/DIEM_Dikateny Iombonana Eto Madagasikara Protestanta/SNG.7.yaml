        - type: text
          text: ' (jereo Gen 30.14-16).'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eo am-baravarantsika avokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo voankazo matsiro, na ny vao na ny ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: samy atokako ho anao ireny, ry malalako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Endrey, ry ilay zanakavavin’olom-banona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hatsaran’ny tongotrao mikapa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny amboampenao dia toa fehivozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay sangan’asan’ny mpahay taozavatra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny foitranao dia miendrika kaopy boribory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit. Ezek 16.4.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho diso divay nolaroin-java-manitra anie izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kibonao dia toa antontam-barimbazaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay voaravaka lisy manodidina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny nononao roa dia hoatra zana-gazela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia gazela kambana mbola tanora.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny vozonao dia toa tilikambo ivoary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao dia manahaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo kamory any Hesbôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-bavahadin’i Baty-Rabima
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tilikambo ivoary: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa noho ny lokony fotsy no ilazana ilay tilikambo hoe ivoara. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Hesbôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': tanàna tranain’i Môaba, 35 km atsinanan’i Jerikao eo ho eo.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny oronao dia maranidranitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ilay Tilikambon’i Libano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mpiambina tandrifin’i Damasy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Eo ambonin’ny tenabenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny lohanao dia meva fisandratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny tendrombohitra Karmela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny volon-dohanao dia sady mivolomparasy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no olioly mambabo ny mpanjaka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsara tarehy sady mahafinaritra tokoa ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry tiako sy vehivavy loharanon-kasambarako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izato tsangananao dia matsoraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny hazo palma;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ireo nononao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia toa sampahom-boaloboka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izany no mampiteny ahy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hianika ny hazo palma aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handray ny rantsany.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ireo nononao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho toa sampahom-boaloboka ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enga anie ny hanitry ny fofonainao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hamerovero tahaka ny paoma,
