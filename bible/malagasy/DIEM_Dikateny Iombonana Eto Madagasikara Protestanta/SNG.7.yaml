  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hankany an-tanimboaloboka isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dieny vao maraina ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hijery raha mitsimoka ny voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na efa mivelatra ny voniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mamelana ny ampongabendanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no hanomezako safosafo anao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
