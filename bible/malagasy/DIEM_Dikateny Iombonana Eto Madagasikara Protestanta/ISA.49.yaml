document_id: ISA.49,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Mpanompon’ny Tompo
  - type: heading
    content: (tononkira faharoa)
  - type: text
    content: Mihainoa ahy ianareo,
  - type: text
    content: ry mponina any amin’ny nosy any;
  - type: text
    content: ary atongilano ny sofinareo,
  - type: text
    content: ry firenena any lavitra.
  - type: text
    content: Ny TOMPO no niantso ahy hatrany am-bohòka;
  - type: text
    content: vao teraka aho, dia nantsoiny tamin’ny anarako
  - type: note
    content: Jereo Jer 1.5; Gal 1.15.
  - type: text
    content: .
  '10':
  - type: text
    content: Tsy ho noana sady tsy hangetaheta ireo
  - type: text
    content: ary tsy hampaninona azy akory
  - type: text
    content: na ny rivo-mahamay na ny masoandro,
  - type: text
    content: satria am-pitiavana no hitarihako azy
  - type: text
    content: ary any amin’ny loharano miboiboika
  - type: text
    content: no hitondrako azy hiala hetaheta
  - type: note
    content: Ampit Apôk 7.16-17.
  - type: text
    content: .
  '11':
  - type: text
    content: Ny tendrombohitra rehetra hasiako lalana;
  - type: text
    content: ary ny arabe kosa hataoko tsara voatra.
  '12':
  - type: text
    content: Indreny izy fa tonga avy any lavitra,
  - type: text
    content: ny sasany avy any avaratra,
  - type: text
    content: ny sasany avy any andrefana, avy any an-dranomasina,
  - type: text
    content: ny sasany avy any atsimo, avy any Ejipta.»
  '13':
  - type: text
    content: Mifalia, ry lanitra, miravoravoa, ry tany;
  - type: text
    content: manaova horakora-pifaliana, ry tendrombohitra,
  - type: text
    content: fa ny TOMPO efa nampahery ny vahoakany
  - type: text
    content: ary naneho indrafo tamin’ny mahantrany.
  - type: heading
    content: Fatra-pitia an’i Tsiôna ny Tompo
  '14':
  - type: text
    content: 'I Tsiôna nanao hoe:'
  - type: text
    content: «Efa nandao sy nanadino ahy
  - type: text
    content: ilay ANDRIANANAHARY Tompo.»
  '15':
  - type: text
    content: 'Fa ny TOMPO kosa mamaly hoe:'
  - type: text
    content: Moa manadino ny zanany minono ve ny vehivavy
  - type: text
    content: na tsy tia ny zaza naloaky ny kibony intsony?
  - type: text
    content: Na dia mety manadino aza izy,
  - type: text
    content: Izaho kosa tsy mba hanadino anao.
  '16':
  - type: text
    content: Indro efa vitako tombokavatsa
  - type: text
    content: eo am-pelatanako ny anaranao,
  - type: text
    content: ary eo imasoko hatrany ny mandanao.
  '17':
  - type: text
    content: Tamy faingana ireo mpanarina anao;
  - type: text
    content: fa miala manalavitra anao kosa
  - type: text
    content: ireo nandrava sy nanimba anao,
  '18':
  - type: text
    content: Atopazo ny masonao hijery manodidina,
  - type: text
    content: ny zanakao rehetra dia mivory mankeo aminao.
  - type: text
    content: Velona Aho, hoy ny teny hentitry ny TOMPO,
  - type: text
    content: ka mianiana fa izy rehetra
  - type: text
    content: dia hataonao fihaingo toy ny firavaka
  - type: text
    content: ary hataonao fietra toy ny fehikibon’ny ampakarina.
  '19':
  - type: text
    content: Eny, toerana rava sy fonenana lao
  - type: text
    content: ary koa tany simba no fahitana anao izao;
  - type: text
    content: kanefa tsy ho omby mponina intsony ianao atsy ho atsy
  - type: text
    content: ary handositra lavitra ireo nandripaka anao.
  '2':
  - type: text
    content: Nataony toy ny sabatra maranitra ny teniko,
  - type: text
    content: sady arovany ao ambany aloky ny tanany aho;
  - type: text
    content: nataony toy ny zana-tsipîka voarangitra tsara aho
  - type: text
    content: ka voaafiny tao amin’ny tranon-jana-tsipîkany
  - type: note
    content: Ampit Heb 4.12; Apôk 1.16.
  - type: text
    content: .
  '20':
  - type: text
    content: Nihevi-tena tsy hanan-janaka intsony ianao,
  - type: text
    content: kanefa hiteny eo an-tsofinao indray ny zanakao
  - type: text
    content: 'hifampilaza hoe: «Tery ny toerako,'
  - type: text
    content: fa mikisaha kely mba hipetrahako.»
  '21':
  - type: text
    content: 'Ianao kosa, ry Tsiôna, dia hanontany tena hoe:'
  - type: text
    content: «Iza no nanome ahy ireto zanaka ireto?
  - type: text
    content: Maty anaka aho teo
  - type: text
    content: ary tsy mba nanantena
  - type: text
    content: ny hanan-janaka intsony,
  - type: text
    content: sady natao sesitany sy ankilabao.
  - type: text
    content: Koa iza no nahalehibe an’ireto?
  - type: text
    content: Indro aho navela hanirery,
  - type: text
    content: fa mba avy taiza kosa ireto?»
  '22':
  - type: text
    content: 'Izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: text
    content: «Indro hasandratro ny tanako hanatsika ny firenen-kafa;
  - type: text
    content: ary hatsangako ny fanevako ho hitan’ny vahoaka.
  - type: text
    content: Dia hotrotroiny no fitondra ny zanakao lahy;
  - type: text
    content: ary hoentiny an-tsoroka ny zanakao vavy.
  '23':
  - type: text
    content: Mpanjaka no ho mpanabe ny zanakao
  - type: text
    content: ary andriambavy no ho reny mpampinono azy.
  - type: text
    content: Hiankohoka eo anatrehanao ireo manankaja ireo
  - type: text
    content: ary hilelaka ny vovoka amin’ny tongotrao,
  - type: text
    content: dia hoekenao fa Izaho no TOMPO
  - type: text
    content: ka izay miandry Ahy tsy ho diso fanantenana.
  '24':
  - type: text
    content: Alaina amin’ny miaramila mahery ve ny rembiny?
  - type: text
    content: Sarihina amin’ny olon-doza ve ny babony?
  '25':
  - type: text
    content: Eny, hoy ny famalin’ny TOMPO,
  - type: text
    content: na dia ny babon’ny miaramila mahery aza
  - type: text
    content: dia halaiko aminy;
  - type: text
    content: ary hosarihiko amin’ny olon-doza ny rembiny.
  - type: text
    content: Fa Izaho mihitsy, ry Jerosalema,
  - type: text
    content: no hiady amin’izay miady aminao
  - type: text
    content: sady hanafaka ny zanakao.
  '26':
  - type: text
    content: Ireo olona mpampahory anao kosa
  - type: text
    content: hampihinaniko ny nofon’ny tenany ihany
  - type: text
    content: ary hataoko mamon’ny ran’ny tenany ihany
  - type: text
    content: toy ny mimamo amin’ny divay vaovao.
  - type: text
    content: Amin’izay dia ho fantatry ny olona rehetra
  - type: text
    content: fa Izaho TOMPO no mpamonjy anao,
  - type: text
    content: ary Izaho ilay Maherin’i Jakôba no mpanavotra anao.»
  '3':
  - type: text
    content: 'Hoy Izy tamiko: «Ianao no mpanompoko,'
  - type: text
    content: ilay Israely entiko maneho ny voninahitro.»
  '4':
  - type: text
    content: 'Fa izaho kosa manao anakampo hoe:'
  - type: text
    content: Very maina ny nisasarako;
  - type: text
    content: zava-poana sy tsinontsinona
  - type: text
    content: no nandaniako ny heriko.
  - type: text
    content: Kanefa ny rariny ananako dia ao amin’ny TOMPO;
  - type: text
    content: ary Izy Andriamanitro no valisoako.
  '5':
  - type: text
    content: Ankehitriny kosa niteny tamiko ny TOMPO,
  - type: text
    content: Izay namorona ahy hatrany am-bohòka
  - type: text
    content: mba hahatonga ahy ho mpanompony
  - type: text
    content: ka hampodiako aminy ny taranak’i Jakôba
  - type: text
    content: sy hamoriako ny vahoaka Israely ho eo anilany;
  - type: text
    content: fa mahazo voninahitra eo imason’ny TOMPO aho,
  - type: text
    content: ary Izy Andriamanitro no heriko.
  '6':
  - type: text
    content: 'Dia nitenenany aho ka nataony hoe:'
  - type: text
    content: «Tsy ampy raha tonga mpanompoko fotsiny ianao
  - type: text
    content: mba hampitraka ireo foko taranak’i Jakôba
  - type: text
    content: sy hampody ny sisa velona amin’ny vahoaka Israely.
  - type: text
    content: Fa omeko ho fanazavana ho an’ny firenen-kafa koa ianao
  - type: text
    content: mba hitaran’ny famonjeko hatrany amin’ny faran’ny tany
  - type: note
    content: Ny and 6 dia voatsiahy ao amin’ny Asa 13.47, ary voateny ao amin’ny Lk 2.32. Jereo koa Is 42.6; Jôh 8.12; Asa 26.23.
  - type: text
    content: .»
  - type: heading
    content: Famerenana ny fampanantenana fanafahana
  '7':
  - type: text
    content: Ny TOMPO Mpanavotra sady Masin’i Israely,
  - type: text
    content: dia miteny aminao, ry voaeson’ny olona
  - type: text
    content: sy ankahalain’ny firenen-kafa,
  - type: text
    content: ary andevozin’ireo mpanjakazaka;
  - type: text
    content: 'ka izao no lazainy aminao:'
  - type: text
    content: «Raha vao mahita anao ny mpanjaka
  - type: text
    content: dia hitsangana hiala amin’ny sezafiandrianany;
  - type: text
    content: ary hiankohoka ny manampahefana,
  - type: text
    content: raha vao mahatazana anao.
  - type: text
    content: Izany no hanajany Ahy TOMPO mahatoky,
  - type: text
    content: dia Ilay Masin’i Israely efa nifidy anao.»
  '8':
  - type: text
    content: 'Izao koa no lazain’ny TOMPO:'
  - type: text
    content: «Tamin’ny fotoana mety
  - type: text
    content: dia namaly ny antsonao Aho,
  - type: text
    content: ary tamin’ny androm-pamonjena
  - type: text
    content: dia tonga namonjy anao Aho.
  - type: text
    content: Nokolokoloiko ianao mba hataoko
  - type: text
    content: ho antoky ny fanekempihavanako amin’ny olona
  - type: note
    content: 'androm-pamonjena: jereo 2Kôr 6.2. ho antoky... olona: jereo Is 42.6 sy nta. –Ny faran’ity and ity dia milaza kely ny fizaràna ny tany Kanahàna, teo ambany fitantanan’i Josoa (jereo Jos 13–21).'
  - type: text
    content: .
  - type: text
    content: Noho izany, dia hanarina ny tany Aho
  - type: text
    content: sy hizara indray ny lova efa rava;
  '9':
  - type: text
    content: ka ny mpifatotra izay ao anaty haizina
  - type: text
    content: 'dia hitenenako hoe:'
  - type: text
    content: ‹Mivoaha tao ianareo, misehoa.›
  - type: text
    content: Eny an-dalana eny izy dia hahazo sakafo,
  - type: text
    content: ka ho tahaka ny andiam-biby fiompy
  - type: text
    content: mirao-bilona amin’ny havoana rehetra.
