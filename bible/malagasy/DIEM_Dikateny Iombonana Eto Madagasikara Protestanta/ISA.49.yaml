document_id: ISA.49,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Ilay Mpanompon’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: (tononkira faharoa)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ahy ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry mponina any amin’ny nosy any;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary atongilano ny sofinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ry firenena any lavitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no niantso ahy hatrany am-bohòka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vao teraka aho, dia nantsoiny tamin’ny anarako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 1.5; Gal 1.15.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho noana sady tsy hangetaheta ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy hampaninona azy akory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny rivo-mahamay na ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria am-pitiavana no hitarihako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary any amin’ny loharano miboiboika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hitondrako azy hiala hetaheta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Apôk 7.16-17.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra rehetra hasiako lalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny arabe kosa hataoko tsara voatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreny izy fa tonga avy any lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sasany avy any avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sasany avy any andrefana, avy any an-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sasany avy any atsimo, avy any Ejipta.»
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia, ry lanitra, miravoravoa, ry tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova horakora-pifaliana, ry tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny TOMPO efa nampahery ny vahoakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary naneho indrafo tamin’ny mahantrany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fatra-pitia an’i Tsiôna ny Tompo
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I Tsiôna nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Efa nandao sy nanadino ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay ANDRIANANAHARY Tompo.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa ny TOMPO kosa mamaly hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa manadino ny zanany minono ve ny vehivavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na tsy tia ny zaza naloaky ny kibony intsony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mety manadino aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa tsy mba hanadino anao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro efa vitako tombokavatsa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eo am-pelatanako ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary eo imasoko hatrany ny mandanao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamy faingana ireo mpanarina anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa miala manalavitra anao kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo nandrava sy nanimba anao,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atopazo ny masonao hijery manodidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanakao rehetra dia mivory mankeo aminao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velona Aho, hoy ny teny hentitry ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mianiana fa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hataonao fihaingo toy ny firavaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataonao fietra toy ny fehikibon’ny ampakarina.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, toerana rava sy fonenana lao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary koa tany simba no fahitana anao izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy ho omby mponina intsony ianao atsy ho atsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handositra lavitra ireo nandripaka anao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataony toy ny sabatra maranitra ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady arovany ao ambany aloky ny tanany aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataony toy ny zana-tsipîka voarangitra tsara aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voaafiny tao amin’ny tranon-jana-tsipîkany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Heb 4.12; Apôk 1.16.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihevi-tena tsy hanan-janaka intsony ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa hiteny eo an-tsofinao indray ny zanakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'hifampilaza hoe: «Tery ny toerako,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mikisaha kely mba hipetrahako.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ianao kosa, ry Tsiôna, dia hanontany tena hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Iza no nanome ahy ireto zanaka ireto?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maty anaka aho teo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy mba nanantena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hanan-janaka intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady natao sesitany sy ankilabao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa iza no nahalehibe an’ireto?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro aho navela hanirery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mba avy taiza kosa ireto?»
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’ny Tompo ANDRIANANAHARY:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro hasandratro ny tanako hanatsika ny firenen-kafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatsangako ny fanevako ho hitan’ny vahoaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotrotroiny no fitondra ny zanakao lahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hoentiny an-tsoroka ny zanakao vavy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka no ho mpanabe ny zanakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary andriambavy no ho reny mpampinono azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiankohoka eo anatrehanao ireo manankaja ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hilelaka ny vovoka amin’ny tongotrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hoekenao fa Izaho no TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka izay miandry Ahy tsy ho diso fanantenana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alaina amin’ny miaramila mahery ve ny rembiny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sarihina amin’ny olon-doza ve ny babony?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hoy ny famalin’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia ny babon’ny miaramila mahery aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia halaiko aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hosarihiko amin’ny olon-doza ny rembiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho mihitsy, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no hiady amin’izay miady aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hanafaka ny zanakao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo olona mpampahory anao kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hampihinaniko ny nofon’ny tenany ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hataoko mamon’ny ran’ny tenany ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny mimamo amin’ny divay vaovao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay dia ho fantatry ny olona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izaho TOMPO no mpamonjy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izaho ilay Maherin’i Jakôba no mpanavotra anao.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy Izy tamiko: «Ianao no mpanompoko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ilay Israely entiko maneho ny voninahitro.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izaho kosa manao anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very maina ny nisasarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zava-poana sy tsinontsinona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nandaniako ny heriko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ny rariny ananako dia ao amin’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy Andriamanitro no valisoako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny kosa niteny tamiko ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namorona ahy hatrany am-bohòka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hahatonga ahy ho mpanompony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hampodiako aminy ny taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hamoriako ny vahoaka Israely ho eo anilany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mahazo voninahitra eo imason’ny TOMPO aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary Izy Andriamanitro no heriko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nitenenany aho ka nataony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy ampy raha tonga mpanompoko fotsiny ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hampitraka ireo foko taranak’i Jakôba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampody ny sisa velona amin’ny vahoaka Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa omeko ho fanazavana ho an’ny firenen-kafa koa ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hitaran’ny famonjeko hatrany amin’ny faran’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny and 6 dia voatsiahy ao amin’ny Asa 13.47, ary voateny ao amin’ny Lk 2.32. Jereo koa Is 42.6; Jôh 8.12; Asa 26.23.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famerenana ny fampanantenana fanafahana
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO Mpanavotra sady Masin’i Israely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia miteny aminao, ry voaeson’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ankahalain’ny firenen-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary andevozin’ireo mpanjakazaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka izao no lazainy aminao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Raha vao mahita anao ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hitsangana hiala amin’ny sezafiandrianany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hiankohoka ny manampahefana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raha vao mahatazana anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hanajany Ahy TOMPO mahatoky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ilay Masin’i Israely efa nifidy anao.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao koa no lazain’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tamin’ny fotoana mety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia namaly ny antsonao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tamin’ny androm-pamonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga namonjy anao Aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nokolokoloiko ianao mba hataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho antoky ny fanekempihavanako amin’ny olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'androm-pamonjena: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'jereo 2Kôr 6.2. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'ho antoky... olona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Is 42.6 sy nta. –Ny faran’ity and ity dia milaza kely ny fizaràna ny tany Kanahàna, teo ambany fitantanan’i Josoa (jereo Jos 13–21).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany, dia hanarina ny tany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hizara indray ny lova efa rava;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny mpifatotra izay ao anaty haizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia hitenenako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‹Mivoaha tao ianareo, misehoa.›
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-dalana eny izy dia hahazo sakafo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho tahaka ny andiam-biby fiompy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirao-bilona amin’ny havoana rehetra.
