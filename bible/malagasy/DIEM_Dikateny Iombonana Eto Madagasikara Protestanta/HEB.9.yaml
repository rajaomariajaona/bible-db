      - type: text
        text: lalàna
    - type: text
      text: '; avy eo dia nalainy ny ran-janakomby sy ny ran’osilahy nampiana rano, ka nafafiny tamin’ny bokin’ny lalàna sy tamin’ny vahoaka manontolo; ravina hisôpa sy volonondry mena no namafazany izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy tranolay voavoatra, dia ny tranolay voalohany izay antsoina hoe Toeramasina: tao no nisy ny fitoeran-jiro sy ny latabatra fametrahana ny mofo atolotra ho an’Andriamanitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandritra ny fafy ra, dia hoy i Mosesy hoe: «Ity no ra iorenan’ny Fanekempihavanana izay nodidian’Andriamanitra harahinareo'
