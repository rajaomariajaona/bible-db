document_id: HEB.9,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay Toeramasina teto an-tany sy ilay Toeramasina any an-danitra
  - type: text
    content: 'Ny '
  - type: text
    content: Fanekempihavanana
  - type: text
    content: ' voalohany dia nanana fitsipika momba ny fanompoam-pivavahana ary nanana Toeramasina tetỳ an-tany. '
  '10':
  - type: text
    content: Zavatra momba ny hanina sy ny fisotro ary ny fidiovana samihafa ireo, dia fitsipika ivelambelany ihany izay voadidy hatao mandra-piavin’ny fotoanandro hanaovan’Andriamanitra ny zavatra rehetra
  - type: note
    content: Dia ny fotoanandron’ny Fanekempihavanana Vaovao izany.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Fa tonga kosa i '
  - type: text
    content: Kristy
  - type: text
    content: ' ho Mpisorombe ny amin’ny zava-tsoa efa tanteraka ankehitriny'
  - type: note
    content: 'efa tanteraka ankehitriny: misy stf sasany ahitana hoe ho avy.'
  - type: text
    content: '. I Kristy dia namakivaky tranolay lehibe lavitra sady tsara lavitra, izay tsy nataon’olombelona ka tsy mba isan’izao zavaboaary izao. '
  '12':
  - type: text
    content: 'Indray mandeha monja no nidirany tao amin’ny Toeramasina Indrindra, dia ampy; ary tsy mba ran’osilahy na ran-janakomby no nentiny hatolotra, fa ny ra nafoin’ny tenany no nentiny hatolotra ka nahazoany fanavotana mandrakizay ho antsika. '
  '13':
  - type: text
    content: Na dia ny ran’osilahy sy ny ran’ombilahy ary ny lavenom-bantotr’ombivavy nodorana
  - type: note
    content: Jereo Fisor 16.14-16; Nom 19.9, 17-19.
  - type: text
    content: ' aza, rehefa afafy amin’ny olona voaloto, dia manadio azy ho afaka amin’ny fahalotoana ivelany; '
  '14':
  - type: text
    content: vao mainka ny ran’i Kristy no hanadio ny fieritreretantsika; fa tamin’ny alalan’ny Fanahy Masina Izay velona mandrakizay no nanoloran’i Kristy ny tenany ho sorona tsy manan-tsiny ho an’Andriamanitra; ka ny rany dia manadio ny fieritreretantsika ho afaka amin’ireo asa mitondra fahafatesana, mba hanompoantsika an’ilay Andriamanitra velona.
  '15':
  - type: text
    content: Ary noho izany, dia mpanalalana amina Fanekempihavanana Vaovao i Kristy, mba hahazoan’ireo voaantson’Andriamanitra ny lova mandrakizay efa nampanantenainy ho an’ny vahoakany. Tanteraka izany rehefa niharan’ny fahafatesana i Kristy mba hanavotra ny olona amin’ny fahotana vitany tamin’ny andron’ilay Fanekempihavanana voalohany.
  '16':
  - type: text
    content: Raha misy didim-pananana
  - type: note
    content: 'didim-pananana: voambolana grika anankiray ihany no midika hoe didim-pananana sy fanekempihavanana.'
  - type: text
    content: ', dia ilaina hoporofoina fa maty tokoa ilay nanao izany didim-pananana izany. '
  '17':
  - type: text
    content: 'Satria tsy manan-kery ny didim-pananana raha mbola velona ilay nanao azy; fa manan-kery kosa izy, rehefa maty ilay nanao azy. '
  '18':
  - type: text
    content: 'Koa, na ilay Fanekempihavanana voalohany aza, dia tsy nosantarina raha tsy tamin’ny ra nafafy. '
  '19':
  - type: text
    content: 'Fa nolazain’i Mosesy tamin’ny vahoaka manontolo aloha ny didy rehetra araka ny '
  - type: text
    content: lalàna
  - type: text
    content: '; avy eo dia nalainy ny ran-janakomby sy ny ran’osilahy nampiana rano, ka nafafiny tamin’ny bokin’ny lalàna sy tamin’ny vahoaka manontolo; ravina hisôpa sy volonondry mena no namafazany izany. '
  '2':
  - type: text
    content: 'Fa nisy tranolay voavoatra, dia ny tranolay voalohany izay antsoina hoe Toeramasina: tao no nisy ny fitoeran-jiro sy ny latabatra fametrahana ny mofo atolotra ho an’Andriamanitra. '
  '20':
  - type: text
    content: 'Nandritra ny fafy ra, dia hoy i Mosesy hoe: «Ity no ra iorenan’ny Fanekempihavanana izay nodidian’Andriamanitra harahinareo'
  - type: note
    content: Eks 24.8. –Momba ny and 19-20, jereo Eks 24.3-8.
  - type: text
    content: '.» '
  '21':
  - type: text
    content: 'Nofafazan’i Mosesy ra toy izany koa ny tranolay sy ireo fanaka rehetra fampiasa amin’ny fanompoam-pivavahana. '
  '22':
  - type: text
    content: Araka ny lalàna, dia saika diovina amin’ny ra avokoa ny zavatra rehetra; ary tsy voavela ny fahotana, raha tsy misy ra afafy
  - type: note
    content: 'And 21: jereo Fisor 8.15. –And 22: jereo Fisor 17.11.'
  - type: text
    content: .
  - type: heading
    content: Ny soron’i Kristy no manaisotra ny fahotana
  '23':
  - type: text
    content: 'Koa toy izany no tsy maintsy nanadiovana ireo zavatra sarintsarin’ny any an-danitra ireo; fa ny tenan’ny zavatra any an-danitra kosa nodiovina tamina sorona tsara lavitra. '
  '24':
  - type: text
    content: 'Fa ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' nataon’olombelona, izay sarintsarin’ny tena izy, no nidiran’i Kristy; fa ny lanitra mihitsy no nidirany mba hahazoany ankehitriny mangataka amin’Andriamanitra ho antsika. '
  '25':
  - type: text
    content: 'Ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' jiosy dia niditra tao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' Indrindra isan-taona nitondra ram-biby; i Kristy kosa tsy niditra tao an-danitra mba hanolotra ny tenany matetika; '
  '26':
  - type: text
    content: raha izany, dia tsy maintsy ho nijaly matetika Izy hatrizay nahariana an’
  - type: text
    content: izao tontolo izao
  - type: text
    content: '. Fa niseho indray mandeha monja Izy tamin’izao andro tena farany izao, mba hanaisotra ny ota tamin’ny nanolorany tena ho sorona. '
  '27':
  - type: text
    content: 'Tendry ho an’ny olona tokoa ny ho faty indray mandeha, ary avy eo dia hotsarain’Andriamanitra izy; '
  '28':
  - type: text
    content: 'toy izany koa i Kristy: voatolotra ho sorona indray mandeha monja Izy, mba hanesorana ny otan’ny besinimaro'
  - type: note
    content: Ampit Is 53.12.
  - type: text
    content: . Hiseho fanindroany Izy, kanefa tsy hanaisotra ota intsony amin’izay fa hamonjy an’ireo miandry Azy.
  '3':
  - type: text
    content: 'Tambadiky ny efitra lamba faharoa, dia nisy tranolay izay antsoina hoe '
  - type: text
    content: Toeramasina Indrindra
  - type: text
    content: ': '
  '4':
  - type: text
    content: 'tao no nisy ny '
  - type: text
    content: alitara
  - type: text
    content: ' volamena fandoroana ditin-kazo manitra ary ny vata mirakitra ny Fanekempihavanana, vata voapetaka takela-bolamena manontolo; ary tanatin’io vata io dia nisy ny siny volamena nitahirizana ny '
  - type: text
    content: mana
  - type: text
    content: ', ny tehin’i '
  - type: text
    content: Aharôna
  - type: text
    content: ' izay nitsiry, ary ny vatofisaka nanoratana ny Fanekempihavanana. '
  '5':
  - type: text
    content: Teo ambonin’io vata io dia nisy sarina kerobima mamirapiratra izay nanaloka ny toerana fanaovana sorom-panonerana. Tsy ary voalaza amin’ny antsipiriany etoana ny zavatra rehetra
  - type: note
    content: 'Momba ny and 2-5: and 2: Eks 26.1-30; 25.31-40; 25.23-30. –And 3: Eks 26.31-33. –And 4: Eks 30.1-6; 25.10-16, 33; Nom 17.16-26; Eks 25.16; Fifan 10.3-5. –And 5: Eks 25.17-22. kerobima: sarin-javamananaina foronina izay miendrika bibiolona sady misy elany, ka natao hanambara ny fanatrehan’Andriamanitra eo amin’ilay Toeramasina Indrindra ary koa natao hiambina ny vata mirakitra ny Fanekempihavanana.'
  - type: text
    content: '!'
  '6':
  - type: text
    content: 'Rehefa voavoatra toy izany ireo zavatra ireo, dia ao amin’ny tranolay voalohany no idiran’ny mpisorona mandrakariva hanefa ny fanompoam-pivavahana; '
  '7':
  - type: text
    content: 'fa ao amin’ny tranolay faharoa kosa dia ny '
  - type: text
    content: mpisorombe
  - type: text
    content: ' irery ihany no miditra ao indray mandeha isan-taona, sady mitondra ram-biby hatolony an’Andriamanitra ho fanalana ny hadisoana tsy nahy vitan’ny tenany sy vitan’ny vahoaka'
  - type: note
    content: 'And 6: jereo Nom 18.2-6. –And 7: jereo Fisor 16.2-34.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ahariharin’ny Fanahy Masina amin’izany fa mbola naseho ny lalana mankany amin’ny Toeramasina Indrindra, raha mbola ao koa ilay tranolay voalohany. '
  '9':
  - type: text
    content: 'Izany dia fanoharana tandrifin’izao andro ankehitriny izao, ka manambara fa ny fanatitra aman-tsorona, atolotra araka izany fomba izany, dia tsy mahalavorary ny fieritreretan’ny olona manao fanompoam-pivavahana. '
