  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zavatra momba ny hanina sy ny fisotro ary ny fidiovana samihafa ireo, dia fitsipika ivelambelany ihany izay voadidy hatao mandra-piavin’ny fotoanandro hanaovan’Andriamanitra ny zavatra rehetra
