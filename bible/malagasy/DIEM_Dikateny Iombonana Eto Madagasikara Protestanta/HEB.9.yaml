  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria tsy manan-kery ny didim-pananana raha mbola velona ilay nanao azy; fa manan-kery kosa izy, rehefa maty ilay nanao azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa, na ilay Fanekempihavanana voalohany aza, dia tsy nosantarina raha tsy tamin’ny ra nafafy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nolazain’i Mosesy tamin’ny vahoaka manontolo aloha ny didy rehetra araka ny '
