      marker-yv: yv-n
    - type: text
      text: ' aza, rehefa afafy amin’ny olona voaloto, dia manadio azy ho afaka amin’ny fahalotoana ivelany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: vao mainka ny ran’i Kristy no hanadio ny fieritreretantsika; fa tamin’ny alalan’ny Fanahy Masina Izay velona mandrakizay no nanoloran’i Kristy ny tenany ho sorona tsy manan-tsiny ho an’Andriamanitra; ka ny rany dia manadio ny fieritreretantsika ho afaka amin’ireo asa mitondra fahafatesana, mba hanompoantsika an’ilay Andriamanitra velona.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary noho izany, dia mpanalalana amina Fanekempihavanana Vaovao i Kristy, mba hahazoan’ireo voaantson’Andriamanitra ny lova mandrakizay efa nampanantenainy ho an’ny vahoakany. Tanteraka izany rehefa niharan’ny fahafatesana i Kristy mba hanavotra ny olona amin’ny fahotana vitany tamin’ny andron’ilay Fanekempihavanana voalohany.
