      marker-yv: yv-n
    - type: text
      text: '. I Kristy dia namakivaky tranolay lehibe lavitra sady tsara lavitra, izay tsy nataon’olombelona ka tsy mba isan’izao zavaboaary izao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indray mandeha monja no nidirany tao amin’ny Toeramasina Indrindra, dia ampy; ary tsy mba ran’osilahy na ran-janakomby no nentiny hatolotra, fa ny ra nafoin’ny tenany no nentiny hatolotra ka nahazoany fanavotana mandrakizay ho antsika. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia ny ran’osilahy sy ny ran’ombilahy ary ny lavenom-bantotr’ombivavy nodorana
