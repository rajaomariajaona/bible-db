document_id: 2CH.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Voahosotra ho mpanjakan’i Joda i Jôasy
  - type: heading
    content: (Jereo 2 Mp 11.4-20)
  - type: text
    content: 'Tamin’ny taona fahafito dia nanapa-kevitra hentitra i Jôiadà ka nanao fifanekena tamin’ireo mpifehy andia-miaramila: dia i Hazarià zanakalahin’i Jerôhama, i Jismahela zanakalahin’i Jôhanàna, i Hazarià zanakalahin’i Hôbeda, i Mahaseià zanakalahin’i Hadaià, ary i Elisafata zanakalahin’i Zikrỳ. '
  '10':
  - type: text
    content: 'Ireo miaramila rehetra samy nitam-piadiana ireo dia nalahatr’i Jôiadà hanodidina ny mpanjaka manomboka eo amin’ny lafiny havanan’ny tempoly ka hatramin’ny lafiny havia, dia teo anoloan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana sy ny vatan-trano, ary efa vonona hanodidina ny mpanjaka. '
  '11':
  - type: text
    content: Tamin’izay dia navoaka i Jôasy zanakalahin’i Ahazià, ka nampisatrohina ny satroboninahitra maha-mpanjaka sady notolorana ny rakitsoratra momba ny zo aman’andraikitry ny mpanjaka
  - type: note
    content: 'raki-tsoratry... mpanjaka: jereo 2 Mp 11.12 sy nta.'
  - type: text
    content: '. Ary nanosotra menaka hanokanana azy i Jôiadà sy ireo zanany lahy ka niantso hoe: «Ho ela velona anie ny mpanjaka!»'
  '12':
  - type: text
    content: 'Nony ren’i Hatalià ny kotaban’ny vahoaka nifamoivoy sy niarahaba ny mpanjaka, dia mba nankao amin’ny vahoaka tao an-tranon’ny TOMPO koa izy. '
  '13':
  - type: text
    content: 'Ary indro hitany ny mpanjaka vaovao nitsangana tambonin’ny lampihazo teo amin’ny fidirana, ka ny mpihira sy ny mpitsoka trompetra no teo anilany; nifaly ny vahoaka rehetra, nampaneno trompetra ny mpitsoka mozika, ary nandredona hira fiderana ireo mpihira omban’ny zava-maneno isan-karazany. Fa i Hatalià kosa '
  - type: text
    content: nandriatra ny fitafiany
  - type: text
    content: ' sady niantsoantso hoe: «Fikomiana! Fikomiana!»'
  '14':
  - type: text
    content: 'I Joiadà moa efa nandrara ny hamonoana ho faty an’i Hatalià ao an-tranon’ny TOMPO, ka dia nasainy nanatona ireo mpifehy andia-miaramila sady mpiandraikitra ny mpiambina ary nilazany hoe:'
  - type: text
    content: –Avoahy any ivelany any i Hatalià ka ampandalovy eo anelanelan’ny laharanareo; ary izay manaraka azy, dia vonoy ho faty amin’ny sabatra.
  '15':
  - type: text
    content: Dia nosamborin’ireo i Hatalià ka notaritaritiny ho any an-dapan’ny mpanjaka; ary rehefa tafapaka ny fidirana teo amin’ny vavahadin-tsoavaly
  - type: note
    content: Jereo 2 Mp 11.6 sy nta.
  - type: text
    content: ' ravehivavy, dia novonoina ho faty teo.'
  '16':
  - type: text
    content: 'Nampanaovin’i Jôiadà fanekempihavanana ny olona rehetra sy ny mpanjaka mbamin’ny tenany mba ho vahoakan’ny TOMPO. '
  '17':
  - type: text
    content: 'Avy eo dia niditra tao an-tempolin’i '
  - type: text
    content: Bahala
  - type: text
    content: ' ny besinimaro ka nandrava azy: nomontsaniny tanteraka ireo alitara sy ireo sarivongan-tsampy; ary novonoiny ho faty teo anoloan’ny alitara i Matàna mpisoron’i Bahala. '
  '18':
  - type: text
    content: Tamin’izay koa no voatendrin’i Jôiadà ny olona hitandrina ny tranon’ny TOMPO ka hofehezin’ireo levita mpisorona
  - type: note
    content: 'levita mpisorona: jereo Deot 17.9 sy nta.'
  - type: text
    content: ', izay efa notsinjarain’i Davida ho antokony mba hanolotra ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo ao an-tranon’ny TOMPO araka ny voasoratra ao amin’ny lalànan’i Mosesy; ka amin-kafaliana sady ombàn-kira no hanatontosany izany, araka ny fepetra nataon’i Davida. '
  '19':
  - type: text
    content: 'Dia nametrahan’i Jôiadà mpiandry varavarana teo am-bavahadin’ny tranon’ny TOMPO mba tsy hisy zavatra na olona '
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana ho tafiditra ao na inona na inona antony.'
  '2':
  - type: text
    content: 'Ary nitety an’i Joda ireo ka namory ny '
  - type: text
    content: levita
  - type: text
    content: ' sy ny loham-pianakaviana israelita avy tany amin’ny tanàna jodeanina rehetra, dia niara-tonga tany Jerosalema ireo. '
  '20':
  - type: text
    content: 'Dia novorin’i Jôiadà ny mpifehy andia-miaramila sy ny loholona ary ny manampahefana mbamin’ny vahoaka rehetra; ary nentina avy tao an-tranon’ny TOMPO ity mpanjaka, ka ny vavahady ambony no nandalovana hanatitra azy ao an-dapany. Rehefa tafapetraka teo amin’ny sezafiandrianana maha-mpanjaka azy i Jôasy, '
  '21':
  - type: text
    content: dia nifaly ny vahoaka rehetra.
  - type: text
    content: Ary nandry feizay ny tanàna, satria efa matin-tsabatra i Hatalià.
  '3':
  - type: text
    content: 'Ary ny olona rehetra vory teo dia nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' tao an-'
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: ' ny amin’ny mpanjaka, sady nilazan’i Jôiadà hoe:'
  - type: text
    content: –Indro i Jôasy zanakalahin’ny mpanjaka. Izy no tokony hanjaka araka ny nampanantenain’ny TOMPO ny amin’ny taranak’i Davida
  - type: note
    content: Jereo 2 Sam 7.16.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Koa izao no hataonareo: ianareo '
  - type: text
    content: mpisorona
  - type: text
    content: ' sy levita izay milatsaka amin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ', dia aoka ny ampahatelonareo ho mpiandry ny varavaran’ny tempoly, '
  '5':
  - type: text
    content: ny ampahatelo hafa hiambina ao an-dapan’ny mpanjaka, ary ny ampahatelo sisa hiambina ilay vavahadin’ny Fanorenana
  - type: note
    content: 'ilay vavahadin’ny Fanorenana: ampit 2 Mp 11.6.'
  - type: text
    content: '; ary ny vahoaka rehetra kosa dia ho eo an-kianjan’ny tranon’ny TOMPO. '
  '6':
  - type: text
    content: 'Fa aza avela hisy hiditra ao an-tranon’ny TOMPO, afa-tsy ny mpisorona sy ny levita mpanao raharaha; ireo no hahazo miditra satria voatokana ho an’Andriamanitra; fa ny vahoaka rehetra dia hitandrina izay fepetra nasain’ny TOMPO hotandremana. '
  '7':
  - type: text
    content: Ianareo levita hafa kosa dia hanemitra manodidina ny mpanjaka, samy mitam-piadiana avy, ary koa hanaraka azy amin’izay toerana halehany; fa na iza na iza miditra ao an-tempoly, dia vonoy ho faty.
  '8':
  - type: text
    content: 'Araka izay baiko rehetra nomen’i Jôiadà mpisorona no nataon’ny levita sy ny Jodeanina rehetra; ka ny tompon’andraikitra tsirairay dia samy nitondra ny olom-peheziny, dia izay nilatsaka na izay niala tamin’ny andro sabata, satria tsy nisy andiany navelan’i Jôiadà mpisorona hahazo lalana hody. '
  '9':
  - type: text
    content: 'Nomen’i Jôiadà an’ireo mpifehy andia-miaramila ny lefona aman’ampinga isan-karazany, izay an’i Davida mpanjaka saingy natoby tao an-tranon’Andriamanitra. '
