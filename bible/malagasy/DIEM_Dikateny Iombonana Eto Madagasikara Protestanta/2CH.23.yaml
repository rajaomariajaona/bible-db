document_id: 2CH.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voahosotra ho mpanjakan’i Joda i Jôasy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Mp 11.4-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona fahafito dia nanapa-kevitra hentitra i Jôiadà ka nanao fifanekena tamin’ireo mpifehy andia-miaramila: dia i Hazarià zanakalahin’i Jerôhama, i Jismahela zanakalahin’i Jôhanàna, i Hazarià zanakalahin’i Hôbeda, i Mahaseià zanakalahin’i Hadaià, ary i Elisafata zanakalahin’i Zikrỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nitety an’i Joda ireo ka namory ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny loham-pianakaviana israelita avy tany amin’ny tanàna jodeanina rehetra, dia niara-tonga tany Jerosalema ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny olona rehetra vory teo dia nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' tao an-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: ' ny amin’ny mpanjaka, sady nilazan’i Jôiadà hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Indro i Jôasy zanakalahin’ny mpanjaka. Izy no tokony hanjaka araka ny nampanantenain’ny TOMPO ny amin’ny taranak’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Sam 7.16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa izao no hataonareo: ianareo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: ' sy levita izay milatsaka amin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ', dia aoka ny ampahatelonareo ho mpiandry ny varavaran’ny tempoly, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ny ampahatelo hafa hiambina ao an-dapan’ny mpanjaka, ary ny ampahatelo sisa hiambina ilay vavahadin’ny Fanorenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ilay vavahadin’ny Fanorenana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit 2 Mp 11.6.
    marker-yv: yv-n
  - type: text
    text: '; ary ny vahoaka rehetra kosa dia ho eo an-kianjan’ny tranon’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa aza avela hisy hiditra ao an-tranon’ny TOMPO, afa-tsy ny mpisorona sy ny levita mpanao raharaha; ireo no hahazo miditra satria voatokana ho an’Andriamanitra; fa ny vahoaka rehetra dia hitandrina izay fepetra nasain’ny TOMPO hotandremana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ianareo levita hafa kosa dia hanemitra manodidina ny mpanjaka, samy mitam-piadiana avy, ary koa hanaraka azy amin’izay toerana halehany; fa na iza na iza miditra ao an-tempoly, dia vonoy ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Araka izay baiko rehetra nomen’i Jôiadà mpisorona no nataon’ny levita sy ny Jodeanina rehetra; ka ny tompon’andraikitra tsirairay dia samy nitondra ny olom-peheziny, dia izay nilatsaka na izay niala tamin’ny andro sabata, satria tsy nisy andiany navelan’i Jôiadà mpisorona hahazo lalana hody. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nomen’i Jôiadà an’ireo mpifehy andia-miaramila ny lefona aman’ampinga isan-karazany, izay an’i Davida mpanjaka saingy natoby tao an-tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ireo miaramila rehetra samy nitam-piadiana ireo dia nalahatr’i Jôiadà hanodidina ny mpanjaka manomboka eo amin’ny lafiny havanan’ny tempoly ka hatramin’ny lafiny havia, dia teo anoloan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana sy ny vatan-trano, ary efa vonona hanodidina ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tamin’izay dia navoaka i Jôasy zanakalahin’i Ahazià, ka nampisatrohina ny satroboninahitra maha-mpanjaka sady notolorana ny rakitsoratra momba ny zo aman’andraikitry ny mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'raki-tsoratry... mpanjaka:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Mp 11.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: '. Ary nanosotra menaka hanokanana azy i Jôiadà sy ireo zanany lahy ka niantso hoe: «Ho ela velona anie ny mpanjaka!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nony ren’i Hatalià ny kotaban’ny vahoaka nifamoivoy sy niarahaba ny mpanjaka, dia mba nankao amin’ny vahoaka tao an-tranon’ny TOMPO koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary indro hitany ny mpanjaka vaovao nitsangana tambonin’ny lampihazo teo amin’ny fidirana, ka ny mpihira sy ny mpitsoka trompetra no teo anilany; nifaly ny vahoaka rehetra, nampaneno trompetra ny mpitsoka mozika, ary nandredona hira fiderana ireo mpihira omban’ny zava-maneno isan-karazany. Fa i Hatalià kosa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nandriatra ny fitafiany
  - type: text
    text: ' sady niantsoantso hoe: «Fikomiana! Fikomiana!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I Joiadà moa efa nandrara ny hamonoana ho faty an’i Hatalià ao an-tranon’ny TOMPO, ka dia nasainy nanatona ireo mpifehy andia-miaramila sady mpiandraikitra ny mpiambina ary nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Avoahy any ivelany any i Hatalià ka ampandalovy eo anelanelan’ny laharanareo; ary izay manaraka azy, dia vonoy ho faty amin’ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nosamborin’ireo i Hatalià ka notaritaritiny ho any an-dapan’ny mpanjaka; ary rehefa tafapaka ny fidirana teo amin’ny vavahadin-tsoavaly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 11.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ravehivavy, dia novonoina ho faty teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nampanaovin’i Jôiadà fanekempihavanana ny olona rehetra sy ny mpanjaka mbamin’ny tenany mba ho vahoakan’ny TOMPO. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Avy eo dia niditra tao an-tempolin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: ' ny besinimaro ka nandrava azy: nomontsaniny tanteraka ireo alitara sy ireo sarivongan-tsampy; ary novonoiny ho faty teo anoloan’ny alitara i Matàna mpisoron’i Bahala. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tamin’izay koa no voatendrin’i Jôiadà ny olona hitandrina ny tranon’ny TOMPO ka hofehezin’ireo levita mpisorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'levita mpisorona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Deot 17.9 sy nta.
    marker-yv: yv-n
  - type: text
    text: ', izay efa notsinjarain’i Davida ho antokony mba hanolotra ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo ao an-tranon’ny TOMPO araka ny voasoratra ao amin’ny lalànan’i Mosesy; ka amin-kafaliana sady ombàn-kira no hanatontosany izany, araka ny fepetra nataon’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nametrahan’i Jôiadà mpiandry varavarana teo am-bavahadin’ny tranon’ny TOMPO mba tsy hisy zavatra na olona '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' ara-pivavahana ho tafiditra ao na inona na inona antony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia novorin’i Jôiadà ny mpifehy andia-miaramila sy ny loholona ary ny manampahefana mbamin’ny vahoaka rehetra; ary nentina avy tao an-tranon’ny TOMPO ity mpanjaka, ka ny vavahady ambony no nandalovana hanatitra azy ao an-dapany. Rehefa tafapetraka teo amin’ny sezafiandrianana maha-mpanjaka azy i Jôasy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia nifaly ny vahoaka rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nandry feizay ny tanàna, satria efa matin-tsabatra i Hatalià.
