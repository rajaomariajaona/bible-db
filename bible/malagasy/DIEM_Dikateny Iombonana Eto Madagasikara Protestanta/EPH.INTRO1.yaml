document_id: EPH.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Nitombo isa faingana ireo Fiangonana tany Azia Minôra (i Torkia any Azia ankehitriny) teo antenatenan’ny taonjato voalohany taorian’i Jesoa Kristy. Nifandray ireo Fiangonana ireo, ary ny tao Efeso dia tsy maintsy nanan-daza manokana nampiavaka azy. Nitoetra tao Efeso telo taona ngarangidina i Paoly tamin’ny diany fahatelo (Asa 19.1–20.1). Nigadra i Paoly fony izy nanoratra ity taratasy ity (Ef 3.1; 4.1); koa ny taratasy ho an’ny Efesianina dia iray tarika amin’ireo antsoina hoe «taratasy voasoratra tany am-pigadrana»: dia ny taratasy ho an’ny Filipianina, ho an’i Filemôna, ary ho an’ny Kôlôsianina.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mahasahan-davitra ny fampianarana raketin’ity taratasy ity ka azo lazaina fa tsy dia taratasy natao ho an’ny Fiangonana anankiray amin’ny toerana anankiray ihany, fa natao ho ana faritra midadasika kokoa. «Ilay tsiambaratelon’Andriamanitra hatrizay hatrizay» no fotokevitr’ity taratasy ity: dia ny «hampivondrona ny zavatra rehetra, ny any an-danitra sy ny eto an-tany, ao amin’i Kristy Filoha tokana» (1.10).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Misy sasin-teny fohy kely (1.1-2) sy fehiteny toraka izany koa (6.21-24); ary eo anelanelan’ireo kosa dia misy fizaràna roa lehibe momba ny hafatra ampitain’ity taratasy ity:'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Fizarana voalohany (1.3–3.21). Talanjona i Paoly ny amin’izay nataon’Andriamanitra ho antsika tamin’ny alalan’i Jesoa Kristy; avy eo dia velabelariny tsara ny maha iray ny mpino rehetra, ka asehony fa Andriamanitra dia nampitambatra ny hafa firenena (izay anoratan’i Paoly eto) sy ny Jiosy ho vahoaka tokana, ho vahoakany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Fizarana faharoa (4.1–6.20). Asain’i Paoly iainan’ireo mpamaky ny taratasiny izany maha iray ny mpino izany, araka ny toetra mendrika ny olona efa tafaray amin’i Jesoa Kristy. Izany koa dia misy fiantèfany amin’ny fifandraisan’izy ireo amin’ny hafa, eo amin’ny mpiray Fiangonana, eo amin’ny ankohonana, ary eo amin’ny fiaraha-monina.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Sary an’ohatra telo no entin’i Paoly manazava ny maha iray ny vahoakan’Andriamanitra: ny tena, dia ny Fiangonana, izay manana an’i Jesoa Kristy ho lohany;'
  - type: text
    text: ' ny taotrano, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izay manana an’i Jesoa Kristy ho vato fehizoro; ny mpivady, satria vadin’i Kristy ny Fiangonana. Hita amin’izany fa tsy mety vanona ny maha iray ny mpino, raha toa ny mpino tsy miraiki-po tanteraka hatrany hatrany amin’ilay hany Tompon’izy rehetra.
