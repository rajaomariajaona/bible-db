document_id: PSA.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Tompo ô, Ianao no fianteherako
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Salamo nataon’i Davida.
  '10':
  - type: text
    content: Mba iantrao aho, TOMPO ô,
  - type: text
    content: fa ao an-katerena
  - type: text
    content: ny tena amam-panahiko
  - type: text
    content: ary jembin’alahelo ny masoko.
  '11':
  - type: text
    content: Kikisam-pahoriana ny aiko,
  - type: text
    content: lanin-tsentosento ny taonako,
  - type: text
    content: ritran’ny heloka vitako ny heriko,
  - type: text
    content: ka dia indro maina mbamin’ny taolako.
  '12':
  - type: text
    content: Mandatsa ahy avokoa ny fahavaloko,
  - type: text
    content: eny, na dia ny mpiara-monina amiko aza;
  - type: text
    content: ny olom-pantatro koa matahotra ahy,
  - type: text
    content: ka mandositra raha mifanena amiko.
  '13':
  - type: text
    content: Tsy fantatra intsony aho
  - type: text
    content: fa hadino toy ny maty
  - type: text
    content: sy toy ny zavatra nariana.
  '14':
  - type: text
    content: Efa reko ny besinimaro mifosa ahy
  - type: text
    content: ka mampihorohoro hatraiza hatraiza
  - type: note
    content: Jereo Jer 6.25; 20.3,10; 46.5; 49.29.
  - type: text
    content: .
  - type: text
    content: Mikaon-doha hamely ahy izy
  - type: text
    content: sy miray tetika hanala ny aiko.
  '15':
  - type: text
    content: Izaho kosa mitoky aminao, TOMPO ô,
  - type: text
    content: 'ka hoy aho hoe: «Andriamanitro Ianao.»'
  '16':
  - type: text
    content: Eo ambany fiahianao ny androm-piainako
  - type: text
    content: ka afaho amin’ny fahavalo sy mpanenjika aho.
  '17':
  - type: text
    content: Jereo amin-kamorampo izaho mpanomponao,
  - type: text
    content: ka vonjeo satria be fitiavana Ianao.
  '18':
  - type: text
    content: Tsy ho diso fanantenana anie aho,
  - type: text
    content: satria miantso vonjy aminao, TOMPO ô;
  - type: text
    content: fa aoka ireo ratsy fanahy no ho menatra
  - type: text
    content: ka hangina any amin’ny toeran’ny maty!
  '19':
  - type: text
    content: Ataovy moana ireo fa mpandainga
  - type: text
    content: sady sahisahy mamely olo-marina
  - type: text
    content: amin’avonavona sy fanamavoana.
  '2':
  - type: text
    content: TOMPO ô, Ianao no fialofako;
  - type: text
    content: tsy ho diso fanantenana
  - type: text
    content: na oviana na oviana aho.
  - type: text
    content: Araka ny fahamarinanao
  - type: text
    content: dia afaho amin’ny loza aho!
  '20':
  - type: text
    content: Kanefa, Tompo ô, akory ny hamaroan’ny soa
  - type: text
    content: atokanao ho an’ireo manaja Anao!
  - type: text
    content: Eo imason’ny olona no anaovanao izany
  - type: text
    content: ho an’izay mialoka aminao hatrany.
  '21':
  - type: text
    content: Ampierenao tsara eo anatrehanao Izy
  - type: text
    content: mba ho lavitra ny ankaso ataon’olona;
  - type: text
    content: Ao an-tranonao no anafenanao azy
  - type: text
    content: mba ho lavitra ny mpifosa manangana ady.
  '22':
  - type: text
    content: Hisaorana anie Ianao, TOMPO ô,
  - type: text
    content: fa nigagàna tokoa ny fitiavanao ahy
  - type: text
    content: fony aho toy ny tanàna voafahirano!
  '23':
  - type: text
    content: 'Tamin’ny fahatairako no nilazako hoe:'
  - type: text
    content: «Indro aho voaroaka tsy ho eo imasonao.»
  - type: text
    content: Kanjo nohenoinao ny fitalahoako,
  - type: text
    content: rehefa niantso vonjy taminao aho.
  '24':
  - type: text
    content: Ry mpivavaka rehetra, tiava ny TOMPO
  - type: text
    content: satria Izy miaro an’izay mino Azy;
  - type: text
    content: fa ireo mpiavonavona kosa
  - type: text
    content: dia valiany tsy an’erany izay nataony.
  '25':
  - type: text
    content: Ianareo rehetra manantena ny TOMPO,
  - type: text
    content: matanjaha sy mahereza.
  '3':
  - type: text
    content: Mba anongilano sofina aho ka vonjeo faingana;
  - type: text
    content: aoka Ianao ho Vatolampy fiereko
  - type: text
    content: ary ho manda hahitako famonjena!
  '4':
  - type: text
    content: Eny, harambato sy manda fiarovana ho ahy Ianao
  - type: note
    content: 'And 2-4: jereo Sal 71.1-3.'
  - type: text
    content: ;
  - type: text
    content: ary mba ho voninahitry ny anaranao,
  - type: text
    content: 'dia aoka Ianao hitarika ahy sy '
  - type: text
    content: hiandry
  - type: text
    content: ' ahy!'
  '5':
  - type: text
    content: Tsoahy amin’ny fandrika harato
  - type: text
    content: izay novelarina tamiko aho,
  - type: text
    content: satria Ianao no miaro ahy.
  '6':
  - type: text
    content: Eo an-tananao no apetrako ny fiainako
  - type: note
    content: 'Eo... ny fiainako: ity andalana ity dia naverin’i Jesoa teo ambony hazofijaliana araka ny Lk 23.46.'
  - type: text
    content: ;
  - type: text
    content: TOMPO ô, Ianao no nanafaka ahy,
  - type: text
    content: Ianao Ilay Andriamanitra mahatoky.
  '7':
  - type: text
    content: Halako ny mivavaka amin’ny sampy;
  - type: text
    content: fa izaho, TOMPO ô, dia mitoky aminao.
  '8':
  - type: text
    content: Te hifaly sy hiravo aho noho ny fitiavanao,
  - type: text
    content: satria hitanao ny fahantrako
  - type: text
    content: sady fantatrao ny fahoriako;
  '9':
  - type: text
    content: ary tsy navelanao ho azom-pahavalo aho
  - type: text
    content: fa najoronao ho eo an-kalalahana.
