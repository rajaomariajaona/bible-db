document_id: PSA.31,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Tompo ô, Ianao no fianteherako
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tao amin’ny tahirin-kiran’ny
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: filohan’antoko-mpihira
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba iantrao aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ao an-katerena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tena amam-panahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary jembin’alahelo ny masoko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kikisam-pahoriana ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lanin-tsentosento ny taonako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ritran’ny heloka vitako ny heriko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia indro maina mbamin’ny taolako.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandatsa ahy avokoa ny fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, na dia ny mpiara-monina amiko aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny olom-pantatro koa matahotra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mandositra raha mifanena amiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantatra intsony aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hadino toy ny maty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy toy ny zavatra nariana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa reko ny besinimaro mifosa ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka mampihorohoro hatraiza hatraiza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 6.25; 20.3,10; 46.5; 49.29.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikaon-doha hamely ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy miray tetika hanala ny aiko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa mitoky aminao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hoy aho hoe: «Andriamanitro Ianao.»'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo ambany fiahianao ny androm-piainako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho amin’ny fahavalo sy mpanenjika aho.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo amin-kamorampo izaho mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka vonjeo satria be fitiavana Ianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho diso fanantenana anie aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria miantso vonjy aminao, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka ireo ratsy fanahy no ho menatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hangina any amin’ny toeran’ny maty!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy moana ireo fa mpandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady sahisahy mamely olo-marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’avonavona sy fanamavoana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no fialofako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho diso fanantenana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na oviana na oviana aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny fahamarinanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia afaho amin’ny loza aho!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, Tompo ô, akory ny hamaroan’ny soa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atokanao ho an’ireo manaja Anao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo imason’ny olona no anaovanao izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay mialoka aminao hatrany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampierenao tsara eo anatrehanao Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho lavitra ny ankaso ataon’olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao an-tranonao no anafenanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba ho lavitra ny mpifosa manangana ady.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisaorana anie Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nigagàna tokoa ny fitiavanao ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fony aho toy ny tanàna voafahirano!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tamin’ny fahatairako no nilazako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Indro aho voaroaka tsy ho eo imasonao.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo nohenoinao ny fitalahoako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa niantso vonjy taminao aho.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpivavaka rehetra, tiava ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Izy miaro an’izay mino Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ireo mpiavonavona kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia valiany tsy an’erany izay nataony.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo rehetra manantena ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: matanjaha sy mahereza.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba anongilano sofina aho ka vonjeo faingana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka Ianao ho Vatolampy fiereko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ho manda hahitako famonjena!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, harambato sy manda fiarovana ho ahy Ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 2-4: jereo Sal 71.1-3.'
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mba ho voninahitry ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dia aoka Ianao hitarika ahy sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hiandry
    - type: text
      text: ' ahy!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsoahy amin’ny fandrika harato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay novelarina tamiko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no miaro ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo an-tananao no apetrako ny fiainako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Eo... ny fiainako: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ity andalana ity dia naverin’i Jesoa teo ambony hazofijaliana araka ny Lk 23.46.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no nanafaka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao Ilay Andriamanitra mahatoky.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halako ny mivavaka amin’ny sampy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izaho, TOMPO ô, dia mitoky aminao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te hifaly sy hiravo aho noho ny fitiavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria hitanao ny fahantrako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady fantatrao ny fahoriako;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsy navelanao ho azom-pahavalo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa najoronao ho eo an-kalalahana.
