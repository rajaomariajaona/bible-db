document_id: AMO.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Filaminana sandoka
  - type: text
    content: 'Lozanareo izay manorina fiadanana amin’i '
  - type: text
    content: Tsiôna
  - type: text
    content: sy mitoky amin’ny tendrombohitr’i Samaria
  - type: note
    content: 'Samaria: jereo 3.9 sy nta.'
  - type: text
    content: ','
  - type: text
    content: dia ianareo mihevi-teny ho sangany eo amin’ilay
  - type: text
    content: firenena malaza indrindra
  - type: text
    content: ka hatonin’ny taranak’i Israely!
  '10':
  - type: text
    content: Ny tompo-manjo no haka ny faty,
  - type: text
    content: sy voatery hamoaka azy hiala ny trano,
  - type: text
    content: sady hiteny amin’izay anankiray sisa velona
  - type: text
    content: 'ao an-trano hoe:'
  - type: text
    content: «Mbola misy ve miaraka aminao?»
  - type: text
    content: 'Ka hovaliany hoe: «Tsy misy intsony!»'
  - type: text
    content: 'Ary hampiany hoe: «Mangina!'
  - type: text
    content: Fa aza tonontononina ny anaran’ny TOMPO
  - type: note
    content: 'Ny tompo-manjo... ny trano: tsy mazava ny fiandohan’ny and 10 ao amin’ny RM, koa ny dkt aroso eto dia miankina amina rijan-teny hebreo hafa izay ho niaingan’ny dkt tranainy grika. –Mangina...: ireo sisa velona dia toa matahotra sao hisarika ny Tompo hamely azy indray.'
  - type: text
    content: .»
  '11':
  - type: text
    content: Eny, tandremo fa manome baiko ny TOMPO;
  - type: text
    content: dia ho montsamontsana ny trano vaventy
  - type: text
    content: ary ho samatsamaka ny trano madinika.
  - type: heading
    content: Fandresena anankiroa tsy misy fotony
  '12':
  - type: text
    content: Moa mihazakazaka eny an-kisolasola-bato ve ny soavaly,
  - type: text
    content: ary moa ampihosena ranomasina ve ny omby,
  - type: text
    content: no dia navadikareo ho poizina ny rariny,
  - type: text
    content: ary ho zava-mangidy ny fanarahan-dalàna?
  '13':
  - type: text
    content: Mifaly amin’ny tanàna Lôdabara azonareo indray ianareo;
  - type: text
    content: 'dia milaza koa ianareo hoe: «Tsy tamin’ny herintsika ve'
  - type: text
    content: no nakantsika ny tanàna Karnaîma
  - type: note
    content: 'Lôdabara, Karnaîma: tanàn-dehibe roa eny an-dafy atsinanan’i Jôrdàna. Misy tsilalaon-teny amin’izany satria i Lôdabara dia midika hoe zava-poana, ary i Karnaîma dia midika hoe tandroka roa izay manambara hery.'
  - type: text
    content: ?»
  '14':
  - type: text
    content: Kanefa izao no teny hentitra
  - type: text
    content: 'ataon’ny TOMPO Andriamanitr’izao rehetra izao:'
  - type: text
    content: «Indro Aho, ry taranak’i Israely,
  - type: text
    content: hanangana firenena hamely anareo,
  - type: text
    content: dia firenena hampahory anareo
  - type: text
    content: manomboka hatreo Lebô-Hamata
  - type: text
    content: ka hatrany amin’ny lohasahan-driaka Harabà
  - type: note
    content: 'I Lebô-Hamata no faritra farany avaratra tamin’ny fanjakan’i Israely taloha (jereo Jos 13.5). –lohasahan-driaka Harabà: faritra atsimo amin’ny fanjakan’i Israely; ka eo atsinanan’i Jôrdàna, akaikin’ny ranomasina Maty, no misy azy.'
  - type: text
    content: .
  '2':
  - type: text
    content: Mankanesa any Kalnè ianareo ka mijere;
  - type: text
    content: avy ao dia mandehana any Hamata, tanàna lehibe;
  - type: text
    content: ary midina ho any Gata tanànan’ny Filistinina.
  - type: text
    content: tsy miroborobo noho ireo fanjakana ireo ny anareo,
  - type: text
    content: na dia kely noho ny taninareo aza ny taniny
  - type: note
    content: 'Kalnè, Hamata: tanàn-dehibe aramianina anankiroa tafiditra teo ambany fanapahan’ny Asirianina tamin’ny 738 tal J.K. –Gata: anankiray amin’ireo tanàn-dehibe dimy any Filistia; nanjary lasa ho eo ambany fiarovan’ny Asirianina io tanàna io tamin’ny taona 734 tal J.K. –Toy izao no fahazoan’ny sasany ny fehezanteny faran’ity andininy ity: Tsara noho ireo fanjakana ireo ve ny anareo (Israely sy Joda), ary lehibe noho ny azy ve ny taninareo?'
  - type: text
    content: '!'
  '3':
  - type: text
    content: Mitady hampihemotra ny andron’ny loza ianareo
  - type: text
    content: nefa mampanatona ny fanjakan’ny herisetra;
  '4':
  - type: text
    content: mandrimandry eo ambony farafara miravaka ivoara ianareo
  - type: text
    content: ary mitsilailay eo ambony divà
  - type: text
    content: sady mihinana zanak’ondry avy tamin’ny andriany
  - type: text
    content: sy zanak’omby matavy.
  '5':
  - type: text
    content: Mihirahira manaraka ny feon-dokanga ianareo
  - type: text
    content: sy mamorona zava-maneno tahaka an’i Davida.
  '6':
  - type: text
    content: Misotro divay amin’ny kaopy lehibe ianareo
  - type: text
    content: sady manosotra ilomanitra ny lohanareo,
  - type: text
    content: fa tsy mba malahelo amin’ny fahavoazan’ny fokon’i Jôsefa
  - type: note
    content: 'fokon’i Jôsefa: jereo ny 5.6 sy nta momba ny hoe taranak’i Jôsefa.'
  - type: text
    content: .
  '7':
  - type: text
    content: Noho izany, ankehitriny dia ianareo
  - type: text
    content: no ho voalohany amin’izay ho lasan-ko babo
  - type: text
    content: ka hifarana hatreo ny korananareo mpanao filibàna
  - type: note
    content: 'ka hifarana... filibàna: misy mihevitra fa ny RM dia azo adika koa hoe efa antomotra ny fitomaniana ho anareo mpanao filibàna.'
  - type: text
    content: .
  - type: heading
    content: Ny fandravana an’i Samaria
  '8':
  - type: text
    content: Ny TOMPO efa mianiana amin’ny tenany;
  - type: text
    content: Ilay TOMPO Andriamanitr’izao rehetra izao
  - type: text
    content: 'dia manao teny hentitra hoe:'
  - type: text
    content: «Mahatsiravina Ahy ny avonavon’ny fanjakan’i Israely
  - type: text
    content: ary hàlako ireo lapany,
  - type: text
    content: ka hatolotro ny fahavalony ny renivohitra Samaria
  - type: text
    content: mbamin’izay rehetra ao anatiny.»
  '9':
  - type: text
    content: Koa raha mbola misy olona folo sisa
  - type: text
    content: ao amin’ny trano iray
  - type: text
    content: dia ho faty ao ireo.
