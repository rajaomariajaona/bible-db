document_id: REV.19,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Taorian’izany, dia nisy hoatra ny feo mafy navoakan’olona maro tany an-danitra, reko nanao hoe: «'
  - type: text
    content: Haleloià
  - type: text
    content: '! Ny famonjena sy ny voninahitra ary ny hery dia an’ilay Andriamanitsika; '
  '10':
  - type: text
    content: 'Dia niankohoka teo an-tongony aho mba hitsaoka azy, satria nilazany hoe:'
  - type: text
    content: –Tandremo, aza manao izany
  - type: note
    content: Ampit 22.8-9.
  - type: text
    content: '! Fa mpanompo miaraka aminao aho sady miaraka amin’ireo namanao iray finoana, izay mitana ny hafatra nijoroan’i Jesoa ho vavolombelona. Andriamanitra no tsaohy!'
  - type: text
    content: Eny, ny Fanahy Masina Izay manentana hilaza hafatra avy amin’Andriamanitra dia ahariharin’ny fijoroana ho vavolombelon’i Jesoa.
  - type: heading
    content: Ilay mpitaingina soavaly fotsy
  '11':
  - type: text
    content: Dia nahita ny lanitra voasokatra aho, ka indro nisy soavaly fotsy niseho. Ilay mitaingina azy dia atao hoe Imahatoky sy Imahitsy. Ara-drariny no itsarany sy iadiany
  - type: note
    content: Ampit Ezek 1.1; Sal 96.13; Is 11.4.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Tahaka ny lelafo ny masony; ary satroboninahitra maro no teo an-dohany. Izy dia manana anarana anankiray voasoratra, izay tsy nisy nahalala afa-tsy ny tenany ihany. '
  '13':
  - type: text
    content: 'Miakanjo akanjo voahosin-dra Izy; ary ny anarany dia natao hoe: «ilay Tenin’Andriamanitra.» '
  '14':
  - type: text
    content: 'Nanaraka Azy ny tafiky ny lanitra, ka samy nitaingina soavaly fotsy sy nitafy lamba rongony madinika sady fotsy no madio. '
  '15':
  - type: text
    content: Misy sabatra maranitra mivoaka avy amin’ny vavan’Ilay mitaingina soavaly, mba hamelezany ny firenena. Dia hifehy ny firenena amin’ny tehim-by Izy, sady hanitsaka ny famiazan-divay, dia ny divay manambara ny firehetam-
  - type: text
    content: pahatezeran
  - type: text
    content: ’Andriamanitra Tsitoha
  - type: note
    content: Ampit Sal 2.9; Apôk 14.19-20 sy nta.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary izao no anarana voasoratra teo amin’ny akanjobe nanarona ny feny: «Mpanjakan’ny mpanjaka sy Tompon’ny tompo.»'
  '17':
  - type: text
    content: 'Ary hitako nisy '
  - type: text
    content: anjely
  - type: text
    content: ' anankiray nitsangana teo amin’ny masoandro. Niantso tamin’ny feo mahery io anjely io ka nanao tamin’ny voro-manidina rehetra teny ana habakabaka hoe: «Avia, mivoria ianareo ho amin’ny fanasana lehibe ataon’Andriamanitra ho anareo, '
  '18':
  - type: text
    content: ka hihinananareo ny nofon’ireo mpanjaka, ny nofon’ireo komandin-tafika, ny nofon’ireo mahery an’ady, ny nofon’ireo soavaly mbamin’ny an’ny mpitaingina azy, ary ny nofon’ny olona rehetra, na mpanompo na tsy mpanompo, na kely na lehibe
  - type: note
    content: 'And 17-18: ampit Ezek 39.17-20.'
  - type: text
    content: .»
  '19':
  - type: text
    content: 'Ary hitako nivory ilay biby sy ireo mpanjakan’ny tany mbamin’ny tafiny, mba hiady amin’Ilay mitaingina soavaly fotsy sy amin’ny tafiny. '
  '2':
  - type: text
    content: 'fa mahitsy sy ara-drariny ny fitsarana ataony, satria Izy efa nanameloka ilay vehivavy janga malaza izay nandoto ny tany tamin’ny '
  - type: text
    content: fijangajangàny
  - type: text
    content: ', ary efa namaly azy noho ny ran’ireo mpanompon’Andriamanitra efa nalatsany.» '
  '20':
  - type: text
    content: 'Dia voasambotra ilay biby sy ilay '
  - type: text
    content: mpaminany
  - type: text
    content: ' sandoka, izay nanao zava-mampitolagaga teo anatrehan’ilay biby mba hoenti-mamitaka ireo nandray ny mariky ny biby sy nivavaka tamin’ny sariny; ary natsipy velona ho any amin’ny farihy afo arehi-tsolifara'
  - type: note
    content: 'Jereo 13.1-18. –solifara: jereo Lk 17.29 sy nta.'
  - type: text
    content: ' ilay biby sy ilay mpaminany sandoka. '
  '21':
  - type: text
    content: Ny olona sisa dia matin’ny sabatra nivoaka avy tamin’ny vavan’Ilay mitaingina soavaly fotsy, ka vokin’ny nofony avokoa ny vorona rehetra.
  '3':
  - type: text
    content: 'Dia niteny indray ireo hoe: «Haleloià! Fa miakatra mandrakizay mandrakizay ny setroka avy amin’ny fandoroana an’i Babilôna'
  - type: note
    content: Ampit 14.11 sy nta.
  - type: text
    content: '!» '
  '4':
  - type: text
    content: 'Tamin’izay ny *loholona 24 sy ny zava-miaina efatra dia niankohoka nitsaoka an’Andriamanitra, Izay mipetraka eo ambonin’ilay sezafiandrianana, ka nanao hoe: «'
  - type: text
    content: Amen
  - type: text
    content: '! Haleloià!»'
  - type: heading
    content: Lanonana fampakaram-badin’ny Zanakondry
  '5':
  - type: text
    content: 'Dia nisy feo nivoaka avy teo amin’ilay sezafiandrianana ka nanao hoe: «Derao ny Andriamanitsika, ianareo rehetra mpanompony sy ianareo manaja Azy, na ny kely na ny lehibe!» '
  '6':
  - type: text
    content: 'Ary nisy hoatra ny feon’olona maro, sy hoatra ny firohondrohon’ny ranobe, ary hoatra ny kotro-baratra mipoaka mafy, reko nanao hoe: «'
  - type: text
    content: Haleloià
  - type: text
    content: '! Fa ny Tompo Andriamanitsika, ilay Tsitoha, dia efa nandray ny '
  - type: text
    content: Fanjakàny
  - type: note
    content: 'And 5-6: ampit Sal 135.1; Ezek 1.24; Sal 97.1; 99.1.'
  - type: text
    content: '! '
  '7':
  - type: text
    content: 'Aoka isika hifaly sy hiravo ary hanome voninahitra Azy, satria tonga ny fampakaram-badin’ilay Zanakondry; ary efa niomana ny vadiny, '
  '8':
  - type: text
    content: 'ka akanjo madio mangatsakatsaka, natao tamin’ny kiran-drongony madinika, no natolotra hiakanjoany.» (Fa izany akanjo rongony madinika izany dia tandindon’ny asa ara-drariny vitan’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ).
  '9':
  - type: text
    content: 'Tamin’izay dia nisy '
  - type: text
    content: anjely
  - type: text
    content: ' nanao tamiko hoe:'
  - type: text
    content: –Soraty! Sambatra izay voaantso amin’ny fanasana fampakaram-badin’ny Zanakondry
  - type: note
    content: Ampit Mt 22.1-14; Lk 14.15-24.
  - type: text
    content: '!'
  - type: text
    content: 'Ary hoy koa ny anjely tamiko:'
  - type: text
    content: –Teny marim-pototra avy amin’Andriamanitra ireo!
