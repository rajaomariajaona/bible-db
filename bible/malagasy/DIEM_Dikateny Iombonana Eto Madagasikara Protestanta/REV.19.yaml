  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taorian’izany, dia nisy hoatra ny feo mafy navoakan’olona maro tany an-danitra, reko nanao hoe: «'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Haleloià
    - type: text
      text: '! Ny famonjena sy ny voninahitra ary ny hery dia an’ilay Andriamanitsika; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka teo an-tongony aho mba hitsaoka azy, satria nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tandremo, aza manao izany
    - type: usfm
