      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny lelafo ny masony; ary satroboninahitra maro no teo an-dohany. Izy dia manana anarana anankiray voasoratra, izay tsy nisy nahalala afa-tsy ny tenany ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miakanjo akanjo voahosin-dra Izy; ary ny anarany dia natao hoe: «ilay Tenin’Andriamanitra.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanaraka Azy ny tafiky ny lanitra, ka samy nitaingina soavaly fotsy sy nitafy lamba rongony madinika sady fotsy no madio. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misy sabatra maranitra mivoaka avy amin’ny vavan’Ilay mitaingina soavaly, mba hamelezany ny firenena. Dia hifehy ny firenena amin’ny tehim-by Izy, sady hanitsaka ny famiazan-divay, dia ny divay manambara ny firehetam-
