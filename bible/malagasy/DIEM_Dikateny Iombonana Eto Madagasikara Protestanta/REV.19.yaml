        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 22.8-9.
      marker-yv: yv-n
    - type: text
      text: '! Fa mpanompo miaraka aminao aho sady miaraka amin’ireo namanao iray finoana, izay mitana ny hafatra nijoroan’i Jesoa ho vavolombelona. Andriamanitra no tsaohy!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ny Fanahy Masina Izay manentana hilaza hafatra avy amin’Andriamanitra dia ahariharin’ny fijoroana ho vavolombelon’i Jesoa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay mpitaingina soavaly fotsy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nahita ny lanitra voasokatra aho, ka indro nisy soavaly fotsy niseho. Ilay mitaingina azy dia atao hoe Imahatoky sy Imahitsy. Ara-drariny no itsarany sy iadiany
    - type: usfm
      marker: f
      children:
      - type: usfm
