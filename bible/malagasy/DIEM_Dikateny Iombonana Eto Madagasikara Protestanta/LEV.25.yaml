          text: jereo Eks 21.2-6; Deot 15.12-18.
      marker-yv: yv-n
    - type: text
      text: .
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy tonga manankarena ny vahiny valovotaka eo anivonareo, fa ny mpiray firenena aminareo kosa misy mihamahantra ka mivarotra ny tenany ho mpanompon’ilay vahiny na ho mpanompon’olona taranak’ilay vahiny, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia azo avotana izy na efa lasa mpanompo aza. Ny anankiray amin’ireo rahalahiny no mahavotra azy, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na ny rahalahin-drainy, na ny zana-drahalahin-drainy, na ny anankiray amin’ireo havany akaiky; mahazo miavo-tena koa izy, raha tàhiny manana ny ampy ho an’izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy hojinjanareo akory aza izay vokatry ny voa nihintsana tamin’ny fararano lasa, ary tsy hotoazanareo akory ny sampaho vokatry ny voaloboka tsy norantsananareo, fa aoka ho taona fialàn-tsasatra ho an’ny tany volena izany. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa havotana izy, dia hanisa taona miaraka amin’ilay tompony, manomboka eo amin’ny taona nahampanompo azy ka miafara amin’ny taona Jobily; araka izay isan’ny taona no hanamboarana ny vola nividianana azy, ary araka izay fanao amin’ny mpikarama isan’andro no hanombanana ny asa vitany. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola maro ny taona sisa mandra-pahatongan’ny taona Jobily, dia ara-keviny amin’ilay vola nividianana azy no fanavotana haloa. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha vitsy kosa ny taona sisa, dia hoisaina izany ka ara-kevitr’ireo taona ireo no fanavotana haloa. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny mpikarama isan-taona izy mandritra ny itoerany eo amin’ilay tompony; ka harahinareo maso ilay tompony mba tsy hanao toetra mitratrevatreva aminy sy mampahory azy. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tsy misy hanavotana an’ilay mpiray firenena aminareo, dia ho afaka teo an-tanan’ny tompony izy mbamin’ny zanany amin’ny taona Jobily.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Izaho no Tompo Andriamanitrareo
    marker-yv: yv-h
  '55':
