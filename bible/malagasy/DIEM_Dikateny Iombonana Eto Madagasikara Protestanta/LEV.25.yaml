    children:
    - type: text
      text: «Eny, mpanompoko ny Israelita, dia mpanompoko navoakako hiala tany Ejipta. Izaho no TOMPO Andriamanitrareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay zava-maniry voajanahary, mandritra ny fialàn-tsasatry ny tany volena, dia azo hanina ho anareo sy ny mpanomponareo mbamin’ny mpikarama sy vahiny tafaraka aminareo; '
  '7':
