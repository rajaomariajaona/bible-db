  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hanisa fito taona mitsingerina impito ianareo, izany fito taona impito, ka 49 taona no halàvan’izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro fahafolon’ny volana fahafito, andro fankalazana ny Famelàn-keloka, dia hitsoka anjomara ombàm-pihobiana ianareo ka manerana ny taninareo no hitsofanareo azy. '
