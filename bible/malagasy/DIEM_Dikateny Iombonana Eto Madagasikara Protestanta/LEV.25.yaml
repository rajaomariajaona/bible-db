          text: 'And 36-37:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 22.24; Deot 15.7-11; 23.20-21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo hiala tany Ejipta mba hanome anareo ny tany Kanahàna sady ho Andriamanitrareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zo hanavotra olona
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy mihamahantra ny mpiray firenena aminareo ka mitolo-tena ho mpanomponareo, dia aza ampanaovina asan’andevo izy '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny taona fahafito kosa dia fialan-tsasatra tanteraka no homenareo ny tany volenareo mba ho mari-panajana AHY: aza amafazana ny tanimbarinareo, ary aza rantsanana ny voalobokareo; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ataovy toy ny mpikarama na vahiny valovotaka; ary mandra-pahatongan’ny taona Jobily no hanompoany anareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay, dia ho afaka teo an-tananareo izy mbamin’ny zanany ka hody any amin’ny fianakaviany sy hizaka indray ny fananany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mpanompoko ny Israelita izay navoakako hiala tany Ejipta, ka tsy tokony hamidy tahaka ny andevo. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza itratrevatrevana sy ampahoriana izy, fa izany no hanehoanareo fanajana Ahy Andriamanitrareo.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ny amin’izay ho andevolahinareo na andevovavinareo, dia amin’ny firenena manodidina anareo no hividiananareo azy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azonareo ividianana koa amin’ny zanak’ireo vahiny valovotaka eo anivonareo sy amin’ny taranaka haterany eo amin’ny taninareo; ary dia ho fanananareo ireny. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hataonareo lovan’ny zanakareo mandimby anareo ireny, mba hozakainy ho fananany. Ho mpanomponareo hatrany hatrany ireny; fa ny Israelita mpiray firenena aminareo kosa dia tsy azonareo itratrevatrevana sy ampahoriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
