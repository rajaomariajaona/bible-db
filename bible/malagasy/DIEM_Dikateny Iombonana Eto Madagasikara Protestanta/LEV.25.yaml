document_id: LEV.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taona fialan-tsasatra ho an’ny tany volena
  - type: text
    content: 'Teo an-tendrombohitra Sinay, dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: text
    content: 'Izany no hanambarànareo fa voatokana ho Ahy ny taona fahadimampolo sy hiantsoanareo fanafahana ho an’ny mponina rehetra ao amin’ilay tany. Jobily ho anareo io taona io, ka samia mody amin’ny taninareo sy amin’ny fianakavianareo avy ianareo. '
  '11':
  - type: text
    content: 'Jobily ho anareo io taona fahadimampolo io; ka tsy hanao famafazam-bary ianareo, tsy hojinjanareo ny vokatry ny voa nihintsana tamin’ny fararano lasa, ary tsy hotoazanareo ny sampaho vokatry ny voaloboka tsy norantsananareo. '
  '12':
  - type: text
    content: Eny, Jobily tokoa io taona io ka hatokanareo ho Ahy. Kanefa izay zavatra voajanahary vokatry ny saha dia azonareo hanina.
  '13':
  - type: text
    content: '«Amin’io taona Jobily io, dia samy hody amin’ny taninareo avy ianareo. '
  '14':
  - type: text
    content: 'Rehefa mivarotra na mividy tany amin’ny namanareo ianareo, dia aza misy mamono antoka azy. '
  '15':
  - type: text
    content: 'Araka ny isan’ny taona, manomboka tamin’ny Jobily lasa, na koa araka ny isan’ny taom-pahavokarana ho avy no hividiananareo sy hivarotanareo azy amin’ny namanareo. '
  '16':
  - type: text
    content: 'Araka ny hamaro na havitsin’ny taona sisa no hampitomboana na hampihenana ny vidiny, satria araka ny isan’ny taom-pahavokarana no hivarotana azy. '
  '17':
  - type: text
    content: 'Koa aza misy mamono antoka ny mpiray firenena ianareo; izany no hanehoanareo fanajana Ahy satria Izaho no TOMPO Andriamanitrareo. '
  '18':
  - type: text
    content: 'Tanteraho ny didiko ary imasoy hotanterahinareo ny fitsipiko, dia handry feizay ao amin’ilay tany ianareo. '
  '19':
  - type: text
    content: Ary hahavoka-javatra ny tany, dia hihinana sady ho afa-po ianareo, ka handry feizay eo.
  '2':
  - type: text
    content: 'mba hamepetra ny Israelita hoe:'
  - type: text
    content: '«Rehefa tafiditra ny tany izay omeko anareo ianareo, dia aoka ny tany volena homenareo fialàn-tsasatra mitsingerina mba ho mari-panajàna Ahy TOMPO. '
  '20':
  - type: text
    content: '«Angamba ianareo hanontany anakampo hoe: ‹Inona no hohaninay amin’ny taona fahafito, rehefa tsy manao famafazam-bary na fanangonam-bokatra izahay?› '
  '21':
  - type: text
    content: 'Izaho Tompo no hampidina aminareo ny fitahiako amin’ny taona fahenina ka hisy vokatra ampy telo taona ho anareo. '
  '22':
  - type: text
    content: Amin’ny taona fahavalo
  - type: note
    content: 'Amin’ny taona fahavalo: izany hoe rehefa mety ho taona manaraka ny taona ahazoan’ny tany fialàn-tsasatra (jereo and 2-4).'
  - type: text
    content: ', dia hanao famafazam-bary ianareo kanefa mbola hihinana ny vokatra voaangona taloha; hatrany amin’ny taona fahasivy, mandra-pahatongan’ny fiakaram-bokatra, dia mbola afaka hihinana izany vokatra voaangona taloha izany ihany ianareo.'
  - type: heading
    content: Ny zo hanavotra ny tany namidy
  '23':
  - type: text
    content: '«Ny tany dia tsy azo atao varo-maty, satria Ahy Tompo izany; fa vahiny sy mpivahiny eo amin’ny taniko ianareo. '
  '24':
  - type: text
    content: Noho izany, eran’ny tany izay holovanareo, dia havelanareo ho azo avotana ny tany namidy.
  '25':
  - type: text
    content: '«Raha tàhiny misy mihamahantra ny mpiray firenena aminao ka mivarotra ampahany amin’ny taniny, dia ho avy ny havany akaiky ka hanavotra izay tany amidiny. '
  '26':
  - type: text
    content: 'Raha tsy manan-kavana hanavotra ralehilahy, nefa hambinina izy atỳ aoriana ka hahazo izay ampy hoenti-manavotra ny taniny, '
  '27':
  - type: text
    content: 'dia izao no hataony: hanisa taona manomboka hatreo amin’ny nivarotany azy izy, ka ny an-kevitry ny taona sisa mandra-piavin’ny taona Jobily no haloany vola amin’ilay nivarotany azy; dia hody amin’ny fananany indray ralehilahy tompony. '
  '28':
  - type: text
    content: Fa raha tsy nahazo izay ampy handoavana izany izy, dia hitoetra eo an-tanan’ilay nivily azy ny tany mandra-pahatongan’ny taona Jobily. Io tany io, amin’ny taona Jobily, dia ho afaka teo an-tanan’ilay nividy azy; ka hody amin’ny fananany indray ralehilahy tompony.
  '29':
  - type: text
    content: '«Raha misy mivarotra trano itoerana ao anaty tanàna mimanda, dia azony avotana izany mandra-pahatapitry ny herintaona nivarotany azy; fa ao anatin’io fe-potoana io no hahazoany manavotra azy. '
  '3':
  - type: text
    content: 'Enin-taona no hamafazanareo ny tanimbarinareo sy handrantsananareo ny voalobokareo ka hanangonanareo vokatra. '
  '30':
  - type: text
    content: 'Fa raha tsy voaavotra mandra-pahatapitry ny herintaona kosa ilay trano, dia tapaka ho varo-maty ho an’ilay nividy azy sy ho an’ny taranany; na amin’ny taona Jobily aza, dia tsy ho afaka teo an-tanan’ilay nividy azy izany trano izany. '
  '31':
  - type: text
    content: 'Fa ny trano, ao anaty tanàna tsy misy manda manodidina kosa, dia hatao tahaka ny tany ihany: ho azo avotana izany na koa ho afaka teo an-tanan’ilay nividy azy amin’ny taona Jobily.'
  '32':
  - type: text
    content: '«Momba ny tanànan’ny '
  - type: text
    content: levita
  - type: text
    content: ' kosa dia izao: ny trano, izay anjarany eo an-tanàna, dia ho azon’ny levita avotana hatrany hatrany'
  - type: note
    content: 'tanànan’ny levita: jereo Nom 35.1-8; Jos 21.1-42; 1 Tan 6.39-66. Nanana zara tany avokoa ny foko israelita rehetra, afa-tsy ny fokon’i Levỳ; jereo Jos 14.4. –Manjavozavo ny rijan-teny hebreo, eto amin’ny and 32.33, ka tsy azo antoka ny dkt.'
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Na levita aza no mividy azy, dia ho afaka teo an-tanan’ilay nividy azy izany, amin’ny taona Jobily. Ny trano ao an-tanànan’ny levita manko no mba fananan’ny levita eo afovoan’ny Israelita. '
  '34':
  - type: text
    content: Fa ny saha manodidina ny tanànany kosa dia tsy azo amidy, satria fananana raikitra hatrany izany ho an’ny levita.
  - type: heading
    content: Ny fampisamboran-javatra amin’ny mahantra
  '35':
  - type: text
    content: «Raha misy mihamahantra ny mpiray firenena aminareo, na ny vahiny valovotaka aza, ka tsy afa-manefa ny trosanareo, dia ampio izy mba hahazoany mivelona eo anilanareo
  - type: note
    content: Jereo Deot 15.7-8.
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Aza maka zana-bola na tombony aminy; izany no hanehoanareo fanajana Ahy Andriamanitrareo sady hahazoany mivelona eo anilanareo. '
  '37':
  - type: text
    content: Aza asiana zana-bola raha mampisambotra vola aza ianareo, ary aza maka tombony raha mampisambotra hanina azy ianareo
  - type: note
    content: 'And 36-37: jereo Eks 22.24; Deot 15.7-11; 23.20-21.'
  - type: text
    content: '. '
  '38':
  - type: text
    content: Izaho no TOMPO Andriamanitrareo, Ilay namoaka anareo hiala tany Ejipta mba hanome anareo ny tany Kanahàna sady ho Andriamanitrareo.
  - type: heading
    content: Ny zo hanavotra olona
  '39':
  - type: text
    content: '«Raha misy mihamahantra ny mpiray firenena aminareo ka mitolo-tena ho mpanomponareo, dia aza ampanaovina asan’andevo izy '
  '4':
  - type: text
    content: 'Fa ny taona fahafito kosa dia fialan-tsasatra tanteraka no homenareo ny tany volenareo mba ho mari-panajana AHY: aza amafazana ny tanimbarinareo, ary aza rantsanana ny voalobokareo; '
  '40':
  - type: text
    content: 'fa ataovy toy ny mpikarama na vahiny valovotaka; ary mandra-pahatongan’ny taona Jobily no hanompoany anareo. '
  '41':
  - type: text
    content: 'Amin’izay, dia ho afaka teo an-tananareo izy mbamin’ny zanany ka hody any amin’ny fianakaviany sy hizaka indray ny fananany. '
  '42':
  - type: text
    content: 'Fa mpanompoko ny Israelita izay navoakako hiala tany Ejipta, ka tsy tokony hamidy tahaka ny andevo. '
  '43':
  - type: text
    content: Aza itratrevatrevana sy ampahoriana izy, fa izany no hanehoanareo fanajana Ahy Andriamanitrareo.
  '44':
  - type: text
    content: '«Ny amin’izay ho andevolahinareo na andevovavinareo, dia amin’ny firenena manodidina anareo no hividiananareo azy. '
  '45':
  - type: text
    content: 'Azonareo ividianana koa amin’ny zanak’ireo vahiny valovotaka eo anivonareo sy amin’ny taranaka haterany eo amin’ny taninareo; ary dia ho fanananareo ireny. '
  '46':
  - type: text
    content: Hataonareo lovan’ny zanakareo mandimby anareo ireny, mba hozakainy ho fananany. Ho mpanomponareo hatrany hatrany ireny; fa ny Israelita mpiray firenena aminareo kosa dia tsy azonareo itratrevatrevana sy ampahoriana
  - type: note
    content: 'And 39-46: jereo Eks 21.2-6; Deot 15.12-18.'
  - type: text
    content: .
  '47':
  - type: text
    content: '«Raha misy tonga manankarena ny vahiny valovotaka eo anivonareo, fa ny mpiray firenena aminareo kosa misy mihamahantra ka mivarotra ny tenany ho mpanompon’ilay vahiny na ho mpanompon’olona taranak’ilay vahiny, '
  '48':
  - type: text
    content: 'dia azo avotana izy na efa lasa mpanompo aza. Ny anankiray amin’ireo rahalahiny no mahavotra azy, '
  '49':
  - type: text
    content: 'na ny rahalahin-drainy, na ny zana-drahalahin-drainy, na ny anankiray amin’ireo havany akaiky; mahazo miavo-tena koa izy, raha tàhiny manana ny ampy ho an’izany. '
  '5':
  - type: text
    content: 'tsy hojinjanareo akory aza izay vokatry ny voa nihintsana tamin’ny fararano lasa, ary tsy hotoazanareo akory ny sampaho vokatry ny voaloboka tsy norantsananareo, fa aoka ho taona fialàn-tsasatra ho an’ny tany volena izany. '
  '50':
  - type: text
    content: 'Rehefa havotana izy, dia hanisa taona miaraka amin’ilay tompony, manomboka eo amin’ny taona nahampanompo azy ka miafara amin’ny taona Jobily; araka izay isan’ny taona no hanamboarana ny vola nividianana azy, ary araka izay fanao amin’ny mpikarama isan’andro no hanombanana ny asa vitany. '
  '51':
  - type: text
    content: 'Raha mbola maro ny taona sisa mandra-pahatongan’ny taona Jobily, dia ara-keviny amin’ilay vola nividianana azy no fanavotana haloa. '
  '52':
  - type: text
    content: 'Raha vitsy kosa ny taona sisa, dia hoisaina izany ka ara-kevitr’ireo taona ireo no fanavotana haloa. '
  '53':
  - type: text
    content: 'Tahaka ny mpikarama isan-taona izy mandritra ny itoerany eo amin’ilay tompony; ka harahinareo maso ilay tompony mba tsy hanao toetra mitratrevatreva aminy sy mampahory azy. '
  '54':
  - type: text
    content: Raha tsy misy hanavotana an’ilay mpiray firenena aminareo, dia ho afaka teo an-tanan’ny tompony izy mbamin’ny zanany amin’ny taona Jobily.
  - type: heading
    content: Izaho no Tompo Andriamanitrareo
  '55':
  - type: text
    content: «Eny, mpanompoko ny Israelita, dia mpanompoko navoakako hiala tany Ejipta. Izaho no TOMPO Andriamanitrareo.
  '6':
  - type: text
    content: 'Izay zava-maniry voajanahary, mandritra ny fialàn-tsasatry ny tany volena, dia azo hanina ho anareo sy ny mpanomponareo mbamin’ny mpikarama sy vahiny tafaraka aminareo; '
  '7':
  - type: text
    content: ny biby fiompianareo sy ny bibidia izay eo amin’ny taninareo koa aza, dia ny zavatra rehetra voajanahary vokatry ny tany no hohaniny
  - type: note
    content: 'And 1-7: jereo Eks 23.10-11.'
  - type: text
    content: .
  - type: heading
    content: Ny taona Jobily, taom-panafahana
  '8':
  - type: text
    content: '«Hanisa fito taona mitsingerina impito ianareo, izany fito taona impito, ka 49 taona no halàvan’izany. '
  '9':
  - type: text
    content: 'Ny andro fahafolon’ny volana fahafito, andro fankalazana ny Famelàn-keloka, dia hitsoka anjomara ombàm-pihobiana ianareo ka manerana ny taninareo no hitsofanareo azy. '
