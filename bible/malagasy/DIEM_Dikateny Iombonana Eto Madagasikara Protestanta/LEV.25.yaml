document_id: LEV.25,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taona fialan-tsasatra ho an’ny tany volena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo an-tendrombohitra Sinay, dia niteny tamin’i Mosesy ny TOMPO '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no hanambarànareo fa voatokana ho Ahy ny taona fahadimampolo sy hiantsoanareo fanafahana ho an’ny mponina rehetra ao amin’ilay tany. Jobily ho anareo io taona io, ka samia mody amin’ny taninareo sy amin’ny fianakavianareo avy ianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jobily ho anareo io taona fahadimampolo io; ka tsy hanao famafazam-bary ianareo, tsy hojinjanareo ny vokatry ny voa nihintsana tamin’ny fararano lasa, ary tsy hotoazanareo ny sampaho vokatry ny voaloboka tsy norantsananareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, Jobily tokoa io taona io ka hatokanareo ho Ahy. Kanefa izay zavatra voajanahary vokatry ny saha dia azonareo hanina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Amin’io taona Jobily io, dia samy hody amin’ny taninareo avy ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa mivarotra na mividy tany amin’ny namanareo ianareo, dia aza misy mamono antoka azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny isan’ny taona, manomboka tamin’ny Jobily lasa, na koa araka ny isan’ny taom-pahavokarana ho avy no hividiananareo sy hivarotanareo azy amin’ny namanareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny hamaro na havitsin’ny taona sisa no hampitomboana na hampihenana ny vidiny, satria araka ny isan’ny taom-pahavokarana no hivarotana azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza misy mamono antoka ny mpiray firenena ianareo; izany no hanehoanareo fanajana Ahy satria Izaho no TOMPO Andriamanitrareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tanteraho ny didiko ary imasoy hotanterahinareo ny fitsipiko, dia handry feizay ao amin’ilay tany ianareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hahavoka-javatra ny tany, dia hihinana sady ho afa-po ianareo, ka handry feizay eo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hamepetra ny Israelita hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rehefa tafiditra ny tany izay omeko anareo ianareo, dia aoka ny tany volena homenareo fialàn-tsasatra mitsingerina mba ho mari-panajàna Ahy TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Angamba ianareo hanontany anakampo hoe: ‹Inona no hohaninay amin’ny taona fahafito, rehefa tsy manao famafazam-bary na fanangonam-bokatra izahay?› '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho Tompo no hampidina aminareo ny fitahiako amin’ny taona fahenina ka hisy vokatra ampy telo taona ho anareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’ny taona fahavalo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Amin’ny taona fahavalo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe rehefa mety ho taona manaraka ny taona ahazoan’ny tany fialàn-tsasatra (jereo and 2-4).
      marker-yv: yv-n
    - type: text
      text: ', dia hanao famafazam-bary ianareo kanefa mbola hihinana ny vokatra voaangona taloha; hatrany amin’ny taona fahasivy, mandra-pahatongan’ny fiakaram-bokatra, dia mbola afaka hihinana izany vokatra voaangona taloha izany ihany ianareo.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zo hanavotra ny tany namidy
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ny tany dia tsy azo atao varo-maty, satria Ahy Tompo izany; fa vahiny sy mpivahiny eo amin’ny taniko ianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, eran’ny tany izay holovanareo, dia havelanareo ho azo avotana ny tany namidy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha tàhiny misy mihamahantra ny mpiray firenena aminao ka mivarotra ampahany amin’ny taniny, dia ho avy ny havany akaiky ka hanavotra izay tany amidiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy manan-kavana hanavotra ralehilahy, nefa hambinina izy atỳ aoriana ka hahazo izay ampy hoenti-manavotra ny taniny, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no hataony: hanisa taona manomboka hatreo amin’ny nivarotany azy izy, ka ny an-kevitry ny taona sisa mandra-piavin’ny taona Jobily no haloany vola amin’ilay nivarotany azy; dia hody amin’ny fananany indray ralehilahy tompony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy nahazo izay ampy handoavana izany izy, dia hitoetra eo an-tanan’ilay nivily azy ny tany mandra-pahatongan’ny taona Jobily. Io tany io, amin’ny taona Jobily, dia ho afaka teo an-tanan’ilay nividy azy; ka hody amin’ny fananany indray ralehilahy tompony.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Raha misy mivarotra trano itoerana ao anaty tanàna mimanda, dia azony avotana izany mandra-pahatapitry ny herintaona nivarotany azy; fa ao anatin’io fe-potoana io no hahazoany manavotra azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enin-taona no hamafazanareo ny tanimbarinareo sy handrantsananareo ny voalobokareo ka hanangonanareo vokatra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy voaavotra mandra-pahatapitry ny herintaona kosa ilay trano, dia tapaka ho varo-maty ho an’ilay nividy azy sy ho an’ny taranany; na amin’ny taona Jobily aza, dia tsy ho afaka teo an-tanan’ilay nividy azy izany trano izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny trano, ao anaty tanàna tsy misy manda manodidina kosa, dia hatao tahaka ny tany ihany: ho azo avotana izany na koa ho afaka teo an-tanan’ilay nividy azy amin’ny taona Jobily.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Momba ny tanànan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levita
    - type: text
      text: ' kosa dia izao: ny trano, izay anjarany eo an-tanàna, dia ho azon’ny levita avotana hatrany hatrany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'tanànan’ny levita: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 35.1-8; Jos 21.1-42; 1 Tan 6.39-66. Nanana zara tany avokoa ny foko israelita rehetra, afa-tsy ny fokon’i Levỳ; jereo Jos 14.4. –Manjavozavo ny rijan-teny hebreo, eto amin’ny and 32.33, ka tsy azo antoka ny dkt.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na levita aza no mividy azy, dia ho afaka teo an-tanan’ilay nividy azy izany, amin’ny taona Jobily. Ny trano ao an-tanànan’ny levita manko no mba fananan’ny levita eo afovoan’ny Israelita. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny saha manodidina ny tanànany kosa dia tsy azo amidy, satria fananana raikitra hatrany izany ho an’ny levita.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fampisamboran-javatra amin’ny mahantra
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Raha misy mihamahantra ny mpiray firenena aminareo, na ny vahiny valovotaka aza, ka tsy afa-manefa ny trosanareo, dia ampio izy mba hahazoany mivelona eo anilanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 15.7-8.
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza maka zana-bola na tombony aminy; izany no hanehoanareo fanajana Ahy Andriamanitrareo sady hahazoany mivelona eo anilanareo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza asiana zana-bola raha mampisambotra vola aza ianareo, ary aza maka tombony raha mampisambotra hanina azy ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.37 '
      - type: usfm
        marker: bd
