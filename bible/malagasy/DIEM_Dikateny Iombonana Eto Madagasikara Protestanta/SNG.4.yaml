document_id: SNG.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Tsara tarehy ianao, rahavako;
  - type: text
    content: eny, tsara tarehy ianao!
  - type: text
    content: Mahafinaritra toa voromahailala
  - type: text
    content: ny masonao anatin’ny voalinao;
  - type: text
    content: ny volon-dohanao dia toy ny andian’osy
  - type: text
    content: midina ny tendrombohitra Gilehada.
  '10':
  - type: text
    content: Mamy tokoa ny safosafonao,
  - type: text
    content: ry havako fofombadiko;
  - type: text
    content: fy tokoa ny safosafonao,
  - type: text
    content: eny, fy mihoatra noho ny divay;
  - type: text
    content: ary ny ilomanitrao dia mahasintona ahy
  - type: text
    content: mihoatra noho ny zava-manitra hafa rehetra.
  '11':
  - type: text
    content: Ny molotrao, ry fofombadiko,
  - type: text
    content: dia toa mitsonika hamamiana
  - type: text
    content: avy amin’ny vonin-javamaniry.
  - type: text
    content: Mamy toa ronono aman-tantely ny teninao;
  - type: text
    content: ary ny hanitr’ireo akanjonao
  - type: text
    content: dia toy ny an’ireo hazo any Libano.
  '12':
  - type: text
    content: Zaridaina mifefy tsara hidy ianao,
  - type: text
    content: ry havako fofombadiko;
  - type: text
    content: zaridaina mifefy tsara hidy ianao
  - type: text
    content: sady loharano voaisy tombokase.
  '13':
  - type: text
    content: Ianao toa sahan’ampongabendanitra
  - type: text
    content: izay misy voany matsiro;
  - type: text
    content: samy mamerovero ao koa
  - type: text
    content: 'ny kôfera sy ny '
  - type: text
    content: narda
  - type: text
    content: ','
  '14':
  - type: text
    content: ny narda sy ny safràna,
  - type: text
    content: ny veromanitra sy ny kanelina
  - type: text
    content: mbamin’ny hazo manitra rehetra;
  - type: text
    content: mandraradrara-pofona eo koa ny miora
  - type: text
    content: sy ny aloesy ary ny menaka manitra rehetra.
  '15':
  - type: text
    content: Loharano ao an-jaridaina ianao,
  - type: text
    content: dia fantsakana miboiboika ranovelona
  - type: text
    content: izay mikoriana avy any Libano.
  - type: heading
    content: (Ravehivavy)
  '16':
  - type: text
    content: Mifohaza, ry rivotra avy any avaratra;
  - type: text
    content: ary avia, ry rivotra avy any atsimo.
  - type: text
    content: Mitsofa ao an-jaridainako ianareo,
  - type: text
    content: dia handraraka ny zava-manitra eo aminy.
  - type: text
    content: Aoka ny malalako hankatỳ an-jaridainany
  - type: text
    content: ka hihinana ireo voankazony matsiro.
  - type: heading
    content: (Ralehilahy)
  '2':
  - type: text
    content: Ny nifinao dia fotsy toa andian’ondrivavy
  - type: text
    content: izay efa voahety sy avy nampandroana;
  - type: text
    content: samy manana rahavavy kambana ireo,
  - type: text
    content: ka tsy misy izay tsy tahaka izany.
  '3':
  - type: text
    content: Toa ribà mena ny molotrao;
  - type: text
    content: ary mahafatifaty ny vavanao.
  - type: text
    content: Menamena toa hasin’ampongabendanitra
  - type: text
    content: ireo takolakao anatin’ny voalinao.
  '4':
  - type: text
    content: Ny vozonao dia toy ny tilikambon’i Davida
  - type: note
    content: Ny tilikambon’i Davida dia tsy voalaza n’aiza n’aiza.
  - type: text
    content: ','
  - type: text
    content: izay naorina hiendrika boribory;
  - type: text
    content: ampinga arivo
  - type: note
    content: 'Ampinga arivo: ny ravaky ny tilikambo dia fampitahana ihany hilazana ny fehivozona voaravaka karazam-bola izay niambozonan’ilay zazavavy, ampitahao Lk 15.8-10.'
  - type: text
    content: ' no mihantona eo,'
  - type: text
    content: dia ny ampingan’ireo maherifo.
  '5':
  - type: text
    content: Ny nononao roa dia hoatra zana-gazela,
  - type: text
    content: dia gazela kambana vao natera-dreniny
  - type: text
    content: ka mirao-bilona eny anivon’ny lisy.
  '6':
  - type: text
    content: Amin’ny takariva mangatsiatsiaka,
  - type: text
    content: rehefa hilentika ny masoandro,
  - type: text
    content: dia tapa-kevitra aho ny handeha
  - type: text
    content: 'ho etỳ an-tendrombohitrao mandraraka '
  - type: text
    content: miora
  - type: text
    content: sy ho etỳ an-kavoanao mamerovero zava-manitra
  - type: note
    content: Ampitahao 2.17 sy nta.
  - type: text
    content: .
  '7':
  - type: text
    content: Tsara avokoa ny bikanao, rahavako;
  - type: text
    content: eny, tsara tsy misy tomika ianao.
  '8':
  - type: text
    content: Andao hiaraka amiko, ry fofombadiko;
  - type: text
    content: ialao i Libano ka andao hiaraka amiko.
  - type: text
    content: Hidina avy eny an-tampon’i Amanà ianao,
  - type: text
    content: ary hidina avy eny Senira
  - type: note
    content: 'Amanà: iray amin’ireo tendron’ny havoana mitomandavan’i Antilibano. –Senira: anarana tranain’ny tendrombohitra Hermôna na ampahany anankiray aminy (1 Tan 5.23).'
  - type: text
    content: ' sy Hermôna.'
  - type: text
    content: Andosiro ireny fa toeram-pieren’ny liona
  - type: text
    content: sy tendrombohitra fiafenan’ny leôparda.
  '9':
  - type: text
    content: Mambabo ny foko ianao, ry havako fofombadiko;
  - type: text
    content: mambabo ny foko ny indray mipimasonao
  - type: text
    content: ary na dia ny rojo anankiray eny am-bozonao aza.
