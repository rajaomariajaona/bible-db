document_id: SNG.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara tarehy ianao, rahavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsara tarehy ianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahafinaritra toa voromahailala
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny masonao anatin’ny voalinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny volon-dohanao dia toy ny andian’osy
- type: usfm
  marker: q1
  children:
  - type: text
    text: midina ny tendrombohitra Gilehada.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny nifinao dia fotsy toa andian’ondrivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa voahety sy avy nampandroana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy manana rahavavy kambana ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy misy izay tsy tahaka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toa ribà mena ny molotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary mahafatifaty ny vavanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Menamena toa hasin’ampongabendanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ireo takolakao anatin’ny voalinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny vozonao dia toy ny tilikambon’i Davida
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4a '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ny tilikambon’i Davida '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia tsy voalaza n’aiza n’aiza.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay naorina hiendrika boribory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ampinga arivo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4b '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampinga arivo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ravaky ny tilikambo dia fampitahana ihany hilazana ny fehivozona voaravaka karazam-bola izay niambozonan’ilay zazavavy, ampitahao Lk 15.8-10.
    marker-yv: yv-n
  - type: text
    text: ' no mihantona eo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia ny ampingan’ireo maherifo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny nononao roa dia hoatra zana-gazela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia gazela kambana vao natera-dreniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka mirao-bilona eny anivon’ny lisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny takariva mangatsiatsiaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rehefa hilentika ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tapa-kevitra aho ny handeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ho etỳ an-tendrombohitrao mandraraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: miora
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ho etỳ an-kavoanao mamerovero zava-manitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampitahao 2.17 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsara avokoa ny bikanao, rahavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, tsara tsy misy tomika ianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andao hiaraka amiko, ry fofombadiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ialao i Libano ka andao hiaraka amiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidina avy eny an-tampon’i Amanà ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hidina avy eny Senira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Amanà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iray amin’ireo tendron’ny havoana mitomandavan’i Antilibano. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Senira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': anarana tranain’ny tendrombohitra Hermôna na ampahany anankiray aminy (1 Tan 5.23).'
    marker-yv: yv-n
  - type: text
    text: ' sy Hermôna.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andosiro ireny fa toeram-pieren’ny liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy tendrombohitra fiafenan’ny leôparda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mambabo ny foko ianao, ry havako fofombadiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mambabo ny foko ny indray mipimasonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary na dia ny rojo anankiray eny am-bozonao aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mamy tokoa ny safosafonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry havako fofombadiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fy tokoa ny safosafonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eny, fy mihoatra noho ny divay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny ilomanitrao dia mahasintona ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: mihoatra noho ny zava-manitra hafa rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny molotrao, ry fofombadiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toa mitsonika hamamiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: avy amin’ny vonin-javamaniry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamy toa ronono aman-tantely ny teninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny hanitr’ireo akanjonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia toy ny an’ireo hazo any Libano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Zaridaina mifefy tsara hidy ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry havako fofombadiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: zaridaina mifefy tsara hidy ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady loharano voaisy tombokase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ianao toa sahan’ampongabendanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay misy voany matsiro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: samy mamerovero ao koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ny kôfera sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: narda
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ny narda sy ny safràna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny veromanitra sy ny kanelina
- type: usfm
  marker: q1
  children:
  - type: text
    text: mbamin’ny hazo manitra rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mandraradrara-pofona eo koa ny miora
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy ny aloesy ary ny menaka manitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Loharano ao an-jaridaina ianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia fantsakana miboiboika ranovelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay mikoriana avy any Libano.
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Ravehivavy)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mifohaza, ry rivotra avy any avaratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary avia, ry rivotra avy any atsimo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsofa ao an-jaridainako ianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia handraraka ny zava-manitra eo aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny malalako hankatỳ an-jaridainany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hihinana ireo voankazony matsiro.
- type: usfm
  marker: sp
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: (Ralehilahy)
  marker-yv: yv-h
