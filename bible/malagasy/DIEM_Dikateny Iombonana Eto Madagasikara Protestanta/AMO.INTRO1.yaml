verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: –I Hamôsa dia avy any Tekôa, tanàna kely ao amin’ny fanjakan’i Joda. Tokony ho tamin’ny taona 760 tal J.K. izy no tonga tao Betela izay nisy ny toeram-panasinana lehibe indrindra tany amin’ny fanjakan’i Israely (jereo 1.1 sy nta). Miaraka amin’izay dia toy ny kotrobaratra no mipoaka eny amin’ny lanitra manga.
  - type: text
    content: Raha mbola manararaotra ny fotoana milamina kely nomen’ny Sirianina mpifanolo-bodirindrina aminy ny fanjakan’i Israely eo ambany fitondran’i Jerôbohama II (taona 787-747), ka milomano amin’ny fandrosoana vaovao, dia ambaran’i Hamôsa tampotampoka sy amin’ny fomba mahery vaika ny fiafaran’ilay vahoaka voafidy. Ao amin’ny fanjakan’i Israely anefa dia mandeha tsara ny raharaham-pivavahana. Koa inona àry no anton’izao tadin-dokanga tsy mitovy izao?
  - type: text
    content: Ny olona tsirairay na ny firenena tsirairay dia samy tokony ho afa-miara-miaina amin’ny hafa. Nanangana zo momba izany Andriamanitra. Io zo io anefa matetika dia hosihosen’ny matanjaka. Koa Andriamanitra dia miseho ho mpiaro ny zon’ireo malemy, ary mpiaro tsy azo vazivazina mihitsy.
  - type: text
    content: Tantarain’i Hamôsa ny anton’ny tsy maintsy nanekeny hitondra ny hafatra mivaivay toy izany (jereo ny fahitana ao amin’ny toko 7–9). Ny fanambaràna izany hafatra izany rahateo no androahana azy haingana hiala tany Israely (7.10-17).
  - type: text
    content: Hita ao amin’ny toko 1–2 ny fanakianana izay alefan’Andriamanitra ho an’ny fanjakan’i Israely sy ireo manodidina azy.
  - type: text
    content: Ny hafatra raketin’ny toko 3–6 kosa no mamaritra ny zavatra ifanolanan’ilay Andriamanitra tia rariny sy ilay vahoakany.
  - type: text
    content: 'Ary farany ny toko 7–9 dia ahafahana mahita ny loharano nipoiran’ny hafatr’i Hamôsa: fahitana dimy izay ohatra mivaingana momba ny zavatra hataon’Andriamanitra tsy ho ela, rehefa hirotsaka an-tsehatra Izy.'
  - type: text
    content: Ny bokin’i Hamôsa dia mahatonga antsika hieritreritra ny amin’izay fanoitra rehetra ananan’ny hafatr’Andriamanitra hoenti-manova an’izao tontolo misy antsika izao. Ary ny nandroahana an’i Hamôsa
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
    content: ' '
  - type: text
    content: dia mampisaina antsika sahady ny amin’izay hanjo an’i Jesoa; iraka mitondra fanovana koa i Jesoa, dia fanovana tsy mampiasa herisetra, kanefa lalina kokoa noho izay nambaran’i Hamôsa.
