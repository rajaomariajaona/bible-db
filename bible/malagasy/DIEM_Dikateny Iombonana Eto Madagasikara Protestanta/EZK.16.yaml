document_id: EZK.16,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Zaza nariana i Jerosalema
  - type: text
    content: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: 'Nomeko fitafiana vita peta-kofehy sy kapa hoditra tsara ary fehikibo rongony fotsy sy lamba landy ianao. '
  '11':
  - type: text
    content: 'Noravahako firavaka ianao ka nasiako haba ny hato-tananao ary vakana ny vozonao; '
  '12':
  - type: text
    content: 'nametahako kavina ny oronao sy ny sofinao sady nasiako satroboninahitra tsara tarehy ny lohanao. '
  '13':
  - type: text
    content: Volafotsy sy volamena ny firavakao, rongony sy landy ary lamba vita peta-kofehy ny fitafianao. Koba tsara sy tantely ary menaka ôliva no sakafonao ka tonga tsara tarehy indrindra ianao ary sahaza ny ho mpanjakavavy
  - type: note
    content: I Jerosalema no tena tanànan’andriamanjaka tokoa, jereo 1 Mp 11.36; 15.4.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Niely eran’izao tontolo izao ny lazanao noho ny hatsaran-tarehinao, fa tena kanto ianao satria nohaingoiko fatratra. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  - type: heading
    content: Nijangajanga i Jerosalema
  '15':
  - type: text
    content: '«Kanjo niantehitra tamin’ny hatsaran-tarehinao ianao ka nanararaotra ny lazanao mba hijangajangana ary nanaram-po nijangajanga tamin’izay rehetra nandalo. '
  '16':
  - type: text
    content: Nofidinao ireo fitafiana marevaka sasany mba handravahanao ireo toeram-panasinanao, dia nijangajanga teo amboniny ianao
  - type: note
    content: 'nijangajanga teo amboniny ianao: Ny Test. T. matetika dia mampiasa ny sarin’ny fijangajangana hanehoana ny fivavahana amin’ny sampy, jereo Eks 34.15; Hôs 2.4 sns.'
  - type: text
    content: '. Zavatra tsy tokony hitranga na hisy akory izany. '
  '17':
  - type: text
    content: 'Nalainao ny firavaka volamena sy volafotsy izay nomeko anao ka nampiasainao hanamboarana sampy miendri-dehilahy, dia nanaram-po nijangajanga taminy ianao. '
  '18':
  - type: text
    content: Norakofanao ireo fitafiana vita petakofehy izy, dia narosonao teo anatrehany ny menaka sy ny zava-manitra izay nomeko anao
  - type: note
    content: Ny sarivongan-tsampy amin’ny ankapobeny dia hazo voarakotra volamena na volafotsy (jereo Is 40.19-20; 44.9-20) indraindray dia nampiankanjoina, jereo Jer 10.9.
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Nataonao fanatitra taminy mba ho hanitra ankasitrahiny ny sakafo rehetra izay nomeko anao, dia ny koba tsara indrindra sy ny menaka ary ny tantely izay nafahako anao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '2':
  - type: text
    content: '«Ry ilay taranak’olombelona, ampahafantaro an’i Jerosalema fa maharikoriko loatra ny fitondrantenany. '
  '20':
  - type: text
    content: Nalainao koa ireo zanakao lahy sy vavy izay naterakao ho Ahy ka nataonao sorona taminy
  - type: note
    content: Na dia tao Israely aza dia nisy mihitsy ny fanaovana sorona ankizy tamin’ny fandoroana azy araka ny fomban’ny Kanahanita (20.31) na dia voararan’ny lalàna aza izany (jereo Lev 18.21).
  - type: text
    content: '. Tsy ampy anao angaha ny fijangajangana? '
  '21':
  - type: text
    content: 'Fa tsy maintsy novonoinao ho faty mba hatolotra ny sampy ny zanako! '
  '22':
  - type: text
    content: Nandritra izany fiainanao nanaram-po sy nakaloiloy izany dia tsy mba nahatsiaro akory ny fahazazànao ianao, fony ianao nitanjaka sy niboridana sady nihosina tamin’ny ranao.
  '23':
  - type: text
    content: '«Izaho Tompo ANDRIANANAHARY dia manao teny hentitra hoe: Lozanao, lozanao, fa rehefa vitanao izany ratsy rehetra izany, '
  '24':
  - type: text
    content: 'dia nanorenanao lampihazo sy nanaovanao toeram-panasinana koa teny amin’ny kianja malalaka rehetra teny. '
  '25':
  - type: text
    content: 'Isaky ny vavalalana dia nanorenanao toeram-panasinana; ary nandoto ny hatsaran-tarehinao teo ianao fa vao mainka nijangajanga bebe kokoa tamin’izay rehetra nandalo. '
  '26':
  - type: text
    content: Nijangajanga tamin’ny Ejiptianina nofosana mpifanila aminao ianao ary nampisafoaka Ahy tamin’ny asam-pijangajangana maro
  - type: note
    content: Ny fifanekena ara-pôlitika nataon’i Israely tamin’i Ejipta dia oharina amin’ny fijangajangana. Nomelohin’ireo mpaminany hatrany ny fifanekena toy izany, jereo Is 30.1; Hôs 7.11, 12.2.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Koa nanampatra ny heriko hamelezana anao Aho: notapahiko ny sakafonao sady natolotro hiaranan’ny fahavalonao ianao'
  - type: note
    content: Ny pôlitikan’ny mpanjaka sasany tany Joda dia niteraka ny fibodoan’ny Filistinina ny faritaniny sasany, jereo 25.15-17; 2 Tan 28.18.
  - type: text
    content: ', dia ireo tanàna filistinina izay menatra noho ny fitondrantenanao tsy mendrika. '
  '28':
  - type: text
    content: Saingy tsy afa-po ny filànao fa nijangajanga tamin’i Asiria koa ianao
  - type: note
    content: Mpanjaka maro tany Joda sy Israely no nitady fifanekena tamin’i Asiria, jereo 2 Mp 15.19; 16.7-9; Hôs 5.13; 8.9.
  - type: text
    content: '. Kanefa mbola tsy afa-po ihany ianao. '
  '29':
  - type: text
    content: 'Nanao fijangajangana maro tany amin’ny tanin’ny Babilônianina ianao, dia tamin’ireo mpivarotra; nefa mbola tsy nahafa-po anao ihany. '
  '3':
  - type: text
    content: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: I Kanahàna no tanin’ny razambenao sy tany nahaterahanao. '
  - type: text
    content: Amôrita
  - type: text
    content: ' ny rainao ary Hetita ny reninao'
  - type: note
    content: 'Kanahàna: alohan’ny nahazoana sy nifidianan’i Davida an’i Jerosalema ho renivohiny dia tanàna kanahanita i Jerosalema ary Jebosita no mponina tao, jereo Jos 15.63. –Amôrita, Hetita: jereo Gen 10.15-17. Tsindrian’i Ezekiela mafy eto ny tsy maha an’ny Israelita an’i Jerosalema tany am-piandohana.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Maimay erỳ ny fonao raha nanao ireny zavatra isan-karazany ireny, tahaka ny fanaon’ireo vehivavy janga tsivalahara. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  '31':
  - type: text
    content: 'Nanorina lampihazo isaky ny vavalalana ianao sy nanao toeram-panasinana teny amin’ny kianja malalaka rehetra, nefa tsy nitaky tambiny akory tahaka ny vehivavy janga! '
  '32':
  - type: text
    content: 'Ianao dia mitovy amin’ny vehivavy mpanitsakitsa-tokantrano izay tsy tia vady fa mitady ny an’ny hafa. '
  '33':
  - type: text
    content: Ny vehivavy janga dia mila tambiny fa ianao kosa manome tambiny ho an’ireo lehilahinao; eny, nandoa vola taminy ianao
  - type: note
    content: 'nandoa vola taminy ianao: mba hahazoana fifanekena iray dia tsy maintsy mandoa vola hetra be, jereo 2 Mp 15.19; 16.8.'
  - type: text
    content: ' mba hiaviany avy eny amin’ny manodidina handry aminao. '
  '34':
  - type: text
    content: Hafa noho ireo vehivavy janga ianao raha mijangajanga, satria tsy mba notadiavina na nomena tambiny, fa ianao indray no mandoa vola; ka dia izany mihitsy no mahahafa anao.
  '35':
  - type: text
    content: '«Noho izany, ry Jerosalema janga, henoy ny tenin’ny TOMPO. '
  '36':
  - type: text
    content: 'Fa izao no lazain’ny Tompo ANDRIANANAHARY: Nahanjahanjanao sy nasehonao tokoa ny fitanjahanao fony ianao nijangajanga tamin’ireo lehilahinao, dia ireo sampinao rehetra maharikoriko; eny, namono ho faty ny zanakao aza ianao ka nanao sorona azy tamin’ireo sampinao. '
  '37':
  - type: text
    content: Noho izany, hovoriko mba hamely anao ireo lehilahinao rehetra izay nankamamy anao, na izay tianao na izay halanao. Rehefa vory avy amin’ny manodidina ireo, dia hasehoko azy ny fitanjahanao, ka ho hitany avokoa izany
  - type: note
    content: Ny fitanjahana eto dia mariky ny fahalemena sy ny henatra. Ho avy hanafika an’i Jerosalema ireo sakaizany na koa handre ny faharavany.
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Hampihariko aminao ny sazy natokana ho an’ny vehivavy manitsakitsa-tokantrano sy mahafaty olona. Hataoko mihosin-dra ianao satria hampiharako ny fahatezerako sy ny hasarotam-piaroko. '
  '39':
  - type: text
    content: 'Hatolotro ho eo an-tanan’ireo lehilahinao ianao, ka horavany ny lampihazonao ary harodany ny toeram-panasinanao; hendahany ny fitafianao, ary hesoriny ny firavakao soa ka havelany hitanjaka sy hiboridana ianao. '
  '4':
  - type: text
    content: Tamin’ny andro nahaterahanao dia tsy nisy olona nanapaka ny tadim-poitranao akory sady tsy nisy nampandro anao tamin’ny rano; tsy nohosorana sira
  - type: note
    content: Nohosorana sy nokosehina tamin’ny sira ny zaza vao teraka mba hampahatanjaka azy.
  - type: text
    content: ' na nohodidinina lamban-jaza ianao. '
  '40':
  - type: text
    content: 'Avy eo dia hisy vahoaka hampirisihiny hikomy aminao ka hitora-bato anao sy hitetitetika anao amin’ny sabatra, '
  '41':
  - type: text
    content: 'ary handoro ny tranonao. Hotanterahiny eo imason’ny vehivavy marobe ny didim-pitsarana famaizana anao. Hofaranako hatreo ny fiainam-pijangajanganao ka tsy handoa tamby amin’ny lehilahy intsony ianao. '
  '42':
  - type: text
    content: 'Hanamparako ny fahatezerako ianao ambara-pahafaka ny hasarotam-piaroko; amin’izay vao hionona Aho ka tsy hisafoaka intsony. '
  '43':
  - type: text
    content: Satria tsy nahatsiaro izay vitako taminao fony fahazaza ianao fa nampahatezitra Ahy tamin’ireo ratsy rehetra ireo, dia hatambesatro aminao ny vokatry ny fitondrantenanao! Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Moa tsy nanao izany toetra tsivalahara izany ve ianao ho fanampin’ny fanompoan-tsampy rehetra vitanao?»
  - type: heading
    content: Ratsy noho ny tanàna hafa i Jerosalema
  '44':
  - type: text
    content: '«Ry Jerosalema, hamely anao ny mpanao ohabolana rehetra ka hiteny hoe: ‹Manahaka an-dreniny ihany ny zanany vavy.› '
  '45':
  - type: text
    content: 'Hay tokoa moa ianao no zanakavavin-dreninao, dia ilay vehivavy nankahala ny vady aman-janany. Mitovy amin’ireo rahavavinao izay nankahala ny vady aman-janany ianao. Hetita ny reninareo ary '
  - type: text
    content: Amôrita
  - type: text
    content: ' ny rainareo. '
  '46':
  - type: text
    content: 'I Samaria any avaratra mbamin’ireo zana-bohiny no zokinao vavy, ary i Sôdôma ao atsimo mbamin’ireo zana-bohiny no zandrinao vavy. '
  '47':
  - type: text
    content: 'Tsy nionona fotsiny tamin’ny fakana tahaka ny fitondrantenany sy ny fomba maharikoriko nataony ianao, fa kely ihany raha izany! Saingy ratsy lavitra noho ny azy ny fitondrantenanao manontolo. '
  '48':
  - type: text
    content: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa i Sôdôma rahavavinao sy ireo zana-bohiny dia tsy mbola nanao ratsy tahaka anao sy ireo zana-bohitrao. '
  '49':
  - type: text
    content: 'Ireto monja no hany fahadisoany: niaina tamin’ny avonavona sy ny fihinanam-be ary ny toetra bonaika tsy miraika izy fa tsy namonjy ny mahantra sy ny fadiranovana. '
  '5':
  - type: text
    content: 'Tsy nisy olona niantra na nangoraka mba hikarakara anao. Fa naharikoriko azy ianao ka natsipiny hitanjaka teo amin’ny tany raha vao teraka. '
  '50':
  - type: text
    content: 'Niavonavona sy nanao zavatra maharikoriko teo anatrehako izy; ka nofoanako tsy ho eto ambonin’ny tany araka ny fantatrao. '
  '51':
  - type: text
    content: 'Ary i Samaria ihany koa dia tsy nahavita ny antsasaky ny fahotana nataonao akory! Maharikoriko lavitra noho izay vitany no nataonao. Koa i Sôdôma sy i Samaria rahavavinao dia toa tsy manan-tsiny raha ampitahaina aminao! '
  '52':
  - type: text
    content: 'Koa zakao ny fahafaham-baràkanao fa nanamarina ireo rahavavinao ianao tamin’ny nanaovanao fahotana maharikoriko kokoa noho ny azy, ka toa miseho ho marina eo anatrehanao izy izao. Mba menatra kosa ianao ka zakao ny fahafaham-baràkanao noho ny nampisehoanao ireo rahavavinao ho toa marina! '
  '53':
  - type: text
    content: 'Hamboariko ireo tanàna ireo: haveriko amin’ny laoniny ny fiainana ao Sôdôma sy ireo zana-bohiny ary ny ao Samaria mbamin’ny zana-bohiny; ary haveriko amin’ny laoniny tahaka azy koa ianao eo afovoan’ireo. '
  '54':
  - type: text
    content: 'Hionona ireo rahavavinao raha mahita anao menatra sy afa-baràka tamin’izay rehetra nataonao. '
  '55':
  - type: text
    content: 'Hiverina amin’ny laoniny taloha i Sôdôma sy i Samaria mbamin’ireo zana-bohiny; ary ho tahaka izany koa ianao sy ireo zana-bohitrao. '
  '56':
  - type: text
    content: 'Tamin’ny andro mbola nireharehanao dia fanarabiana no niresahanao an’i Sôdôma rahavavinao. '
  '57':
  - type: text
    content: Talohan’ny nisehoan’ny faharatsianao an-karihary izany. Anjaranao kosa izao no latsain’ireo tanàna edômita sy ny zana-bohitra rehetra manodidina ary vingavingain’ireo tanàna filistinina
  - type: note
    content: 'Edômita: araka ny stf hebreo sasany sy ny dkt siriaka tranainy izany; ny RM kosa manao hoe Sirianina. –Ny Filistinina dia nipetraka teny amoron-tsiraka hatramin’ny andron’ny Mpitsara ary fahavalon’i Israely, jereo Mpits 15–16.'
  - type: text
    content: ' etsy sy eroa. '
  '58':
  - type: text
    content: Izany no hizakanao ny vokatry ny fitondrantenanao tsivalahara sy maharikoriko. Teny hentitra avy amiko TOMPO izany.
  '59':
  - type: text
    content: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: Tsy noraharahainao ny fianianana nataonao fa nivadika tamin’ny fanekempihavanako ianao; koa araka izany no hataoko aminao. '
  '6':
  - type: text
    content: 'Nandalo teo anilanao Aho ka nahita anao nihosina tao amin’ny ranao. Koa nilaza taminao Aho fa tsy maintsy velona ianao na dia mihosin-dra aza; eny, tsy maintsy velona ianao, hoy Aho taminao. '
  '60':
  - type: text
    content: 'Izaho anefa tsy hivadika amin’ny fanekempihavanana izay nataoko taminao tamin’ny andron’ny fahatanoranao fa hanova azy ho fanekempihavanana maharitra mandrakizay. '
  '61':
  - type: text
    content: 'Hahatsiaro ny fitondrantenanao ianao ka ho menatra rehefa mahita indray ireo zokinao vavy sy zandrinao vavy; fa hatolotro anao ho toy ny zanakavavy ireo na dia tsy anisan’ny zavatra nanaovako fanekempihavanana taminareo aza izany. '
  '62':
  - type: text
    content: 'Hohavaoziko ny fanekempihavanako aminao, ka dia hoekenao fa Izaho no TOMPO. '
  '63':
  - type: text
    content: Amin’izay dia hahatsiaro ny lasa ianao ka ho menatra tsy hahateny, fa Izaho kosa hamela anao amin’izay ratsy rehetra nataonao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '7':
  - type: text
    content: 'Dia nampitomboiko toy ny zava-maniry eny an-tsaha ianao. Nihalehibe ianao sady nivelatra ka tonga tsara tarehy erỳ: naniry nono sady naniry volo ianao, nefa mbola nitanjaka sy niboridana. '
  '8':
  - type: text
    content: Nandalo teo anilanao indray Aho, ka hitako fa tonga amin’ny taonan’ny fitiavana ianao. Koa narakotro anao ny lambako mba hanarona ny fitanjahanao
  - type: note
    content: 'narakotro anao ny lambako mba hanarona ny fitanjahanao: ao amin’ny Baiboly ny fihetsika tahaka izany dia maneho fiarovana ary koa fahavononan-kiroso amin’ny fanambadiana. –Ny fanekempihavanana eto dia enti-manondro ny fanambadiana ihany koa. Hatramin’ny andron’i Hôsea mpaminany ny fanambadiana dia sary nampiasaina matetika hoenti-milaza ny fifandraisan’Andriamanitra sy i Israely, jereo ohatra Is 54.4-8; Jer 2.2.'
  - type: text
    content: '. Nianiana Aho fa tsy hivadika aminao sady nanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' taminao, ka Ahy ianao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
  '9':
  - type: text
    content: '«Nampandroiko tamin’ny rano ianao hanadiovana ny ra teny aminao sady nohosorako ilomanitra. '
