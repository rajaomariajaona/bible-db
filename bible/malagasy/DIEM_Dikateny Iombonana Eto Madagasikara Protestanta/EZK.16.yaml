document_id: EZK.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zaza nariana i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy indray tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ry ilay taranak’olombelona, ampahafantaro an’i Jerosalema fa maharikoriko loatra ny fitondrantenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambarao aminy fa izao no lazain’ny Tompo ANDRIANANAHARY: I Kanahàna no tanin’ny razambenao sy tany nahaterahanao. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ny rainao ary Hetita ny reninao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Kanahàna: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: alohan’ny nahazoana sy nifidianan’i Davida an’i Jerosalema ho renivohiny dia tanàna kanahanita i Jerosalema ary Jebosita no mponina tao, jereo Jos 15.63. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Amôrita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hetita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Gen 10.15-17. Tsindrian’i Ezekiela mafy eto ny tsy maha an’ny Israelita an’i Jerosalema tany am-piandohana.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin’ny andro nahaterahanao dia tsy nisy olona nanapaka ny tadim-poitranao akory sady tsy nisy nampandro anao tamin’ny rano; tsy nohosorana sira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nohosorana sy nokosehina tamin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ny zaza vao teraka mba hampahatanjaka azy.'
    marker-yv: yv-n
  - type: text
    text: ' na nohodidinina lamban-jaza ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy nisy olona niantra na nangoraka mba hikarakara anao. Fa naharikoriko azy ianao ka natsipiny hitanjaka teo amin’ny tany raha vao teraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandalo teo anilanao Aho ka nahita anao nihosina tao amin’ny ranao. Koa nilaza taminao Aho fa tsy maintsy velona ianao na dia mihosin-dra aza; eny, tsy maintsy velona ianao, hoy Aho taminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nampitomboiko toy ny zava-maniry eny an-tsaha ianao. Nihalehibe ianao sady nivelatra ka tonga tsara tarehy erỳ: naniry nono sady naniry volo ianao, nefa mbola nitanjaka sy niboridana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nandalo teo anilanao indray Aho, ka hitako fa tonga amin’ny taonan’ny fitiavana ianao. Koa narakotro anao ny lambako mba hanarona ny fitanjahanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'narakotro anao ny lambako mba hanarona ny fitanjahanao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ao amin’ny Baiboly ny fihetsika tahaka izany dia maneho fiarovana ary koa fahavononan-kiroso amin’ny fanambadiana. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanekempihavanana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia enti-manondro ny fanambadiana ihany koa. Hatramin’ny andron’i Hôsea mpaminany ny fanambadiana dia sary nampiasaina matetika hoenti-milaza ny fifandraisan’Andriamanitra sy i Israely, jereo ohatra Is 54.4-8; Jer 2.2.'
    marker-yv: yv-n
  - type: text
    text: '. Nianiana Aho fa tsy hivadika aminao sady nanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' taminao, ka Ahy ianao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Nampandroiko tamin’ny rano ianao hanadiovana ny ra teny aminao sady nohosorako ilomanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nomeko fitafiana vita peta-kofehy sy kapa hoditra tsara ary fehikibo rongony fotsy sy lamba landy ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noravahako firavaka ianao ka nasiako haba ny hato-tananao ary vakana ny vozonao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nametahako kavina ny oronao sy ny sofinao sady nasiako satroboninahitra tsara tarehy ny lohanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Volafotsy sy volamena ny firavakao, rongony sy landy ary lamba vita peta-kofehy ny fitafianao. Koba tsara sy tantely ary menaka ôliva no sakafonao ka tonga tsara tarehy indrindra ianao ary sahaza ny ho mpanjakavavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I Jerosalema no tena tanànan’andriamanjaka tokoa, jereo 1 Mp 11.36; 15.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Niely eran’izao tontolo izao ny lazanao noho ny hatsaran-tarehinao, fa tena kanto ianao satria nohaingoiko fatratra. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nijangajanga i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Kanjo niantehitra tamin’ny hatsaran-tarehinao ianao ka nanararaotra ny lazanao mba hijangajangana ary nanaram-po nijangajanga tamin’izay rehetra nandalo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nofidinao ireo fitafiana marevaka sasany mba handravahanao ireo toeram-panasinanao, dia nijangajanga teo amboniny ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nijangajanga teo amboniny ianao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny Test. T. matetika dia mampiasa ny sarin’ny fijangajangana hanehoana ny fivavahana amin’ny sampy, jereo Eks 34.15; Hôs 2.4 sns.
    marker-yv: yv-n
  - type: text
    text: '. Zavatra tsy tokony hitranga na hisy akory izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nalainao ny firavaka volamena sy volafotsy izay nomeko anao ka nampiasainao hanamboarana sampy miendri-dehilahy, dia nanaram-po nijangajanga taminy ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Norakofanao ireo fitafiana vita petakofehy izy, dia narosonao teo anatrehany ny menaka sy ny zava-manitra izay nomeko anao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny sarivongan-tsampy amin’ny ankapobeny dia hazo voarakotra volamena na volafotsy (jereo Is 40.19-20; 44.9-20) indraindray dia nampiankanjoina, jereo Jer 10.9.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nataonao fanatitra taminy mba ho hanitra ankasitrahiny ny sakafo rehetra izay nomeko anao, dia ny koba tsara indrindra sy ny menaka ary ny tantely izay nafahako anao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nalainao koa ireo zanakao lahy sy vavy izay naterakao ho Ahy ka nataonao sorona taminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Na dia tao Israely aza dia nisy mihitsy ny fanaovana sorona ankizy tamin’ny fandoroana azy araka ny fomban’ny Kanahanita (20.31) na dia voararan’ny lalàna aza izany (jereo Lev 18.21).
    marker-yv: yv-n
  - type: text
    text: '. Tsy ampy anao angaha ny fijangajangana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa tsy maintsy novonoinao ho faty mba hatolotra ny sampy ny zanako! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nandritra izany fiainanao nanaram-po sy nakaloiloy izany dia tsy mba nahatsiaro akory ny fahazazànao ianao, fony ianao nitanjaka sy niboridana sady nihosina tamin’ny ranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Izaho Tompo ANDRIANANAHARY dia manao teny hentitra hoe: Lozanao, lozanao, fa rehefa vitanao izany ratsy rehetra izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia nanorenanao lampihazo sy nanaovanao toeram-panasinana koa teny amin’ny kianja malalaka rehetra teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Isaky ny vavalalana dia nanorenanao toeram-panasinana; ary nandoto ny hatsaran-tarehinao teo ianao fa vao mainka nijangajanga bebe kokoa tamin’izay rehetra nandalo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nijangajanga tamin’ny Ejiptianina nofosana mpifanila aminao ianao ary nampisafoaka Ahy tamin’ny asam-pijangajangana maro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fifanekena ara-pôlitika nataon’i Israely tamin’i Ejipta dia oharina amin’ny fijangajangana. Nomelohin’ireo mpaminany hatrany ny fifanekena toy izany, jereo Is 30.1; Hôs 7.11, 12.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa nanampatra ny heriko hamelezana anao Aho: notapahiko ny sakafonao sady natolotro hiaranan’ny fahavalonao ianao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny pôlitikan’ny mpanjaka sasany tany Joda dia niteraka ny fibodoan’ny Filistinina ny faritaniny sasany, jereo 25.15-17; 2 Tan 28.18.
    marker-yv: yv-n
  - type: text
    text: ', dia ireo tanàna filistinina izay menatra noho ny fitondrantenanao tsy mendrika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Saingy tsy afa-po ny filànao fa nijangajanga tamin’i Asiria koa ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mpanjaka maro tany Joda sy Israely no nitady fifanekena tamin’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asiria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo 2 Mp 15.19; 16.7-9; Hôs 5.13; 8.9.'
    marker-yv: yv-n
  - type: text
    text: '. Kanefa mbola tsy afa-po ihany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nanao fijangajangana maro tany amin’ny tanin’ny Babilônianina ianao, dia tamin’ireo mpivarotra; nefa mbola tsy nahafa-po anao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maimay erỳ ny fonao raha nanao ireny zavatra isan-karazany ireny, tahaka ny fanaon’ireo vehivavy janga tsivalahara. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nanorina lampihazo isaky ny vavalalana ianao sy nanao toeram-panasinana teny amin’ny kianja malalaka rehetra, nefa tsy nitaky tambiny akory tahaka ny vehivavy janga! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ianao dia mitovy amin’ny vehivavy mpanitsakitsa-tokantrano izay tsy tia vady fa mitady ny an’ny hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny vehivavy janga dia mila tambiny fa ianao kosa manome tambiny ho an’ireo lehilahinao; eny, nandoa vola taminy ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nandoa vola taminy ianao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mba hahazoana fifanekena iray dia tsy maintsy mandoa vola hetra be, jereo 2 Mp 15.19; 16.8.
    marker-yv: yv-n
  - type: text
    text: ' mba hiaviany avy eny amin’ny manodidina handry aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Hafa noho ireo vehivavy janga ianao raha mijangajanga, satria tsy mba notadiavina na nomena tambiny, fa ianao indray no mandoa vola; ka dia izany mihitsy no mahahafa anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Noho izany, ry Jerosalema janga, henoy ny tenin’ny TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa izao no lazain’ny Tompo ANDRIANANAHARY: Nahanjahanjanao sy nasehonao tokoa ny fitanjahanao fony ianao nijangajanga tamin’ireo lehilahinao, dia ireo sampinao rehetra maharikoriko; eny, namono ho faty ny zanakao aza ianao ka nanao sorona azy tamin’ireo sampinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Noho izany, hovoriko mba hamely anao ireo lehilahinao rehetra izay nankamamy anao, na izay tianao na izay halanao. Rehefa vory avy amin’ny manodidina ireo, dia hasehoko azy ny fitanjahanao, ka ho hitany avokoa izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fitanjahana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' eto dia mariky ny fahalemena sy ny henatra. Ho avy hanafika an’i Jerosalema ireo sakaizany na koa handre ny faharavany.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hampihariko aminao ny sazy natokana ho an’ny vehivavy manitsakitsa-tokantrano sy mahafaty olona. Hataoko mihosin-dra ianao satria hampiharako ny fahatezerako sy ny hasarotam-piaroko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hatolotro ho eo an-tanan’ireo lehilahinao ianao, ka horavany ny lampihazonao ary harodany ny toeram-panasinanao; hendahany ny fitafianao, ary hesoriny ny firavakao soa ka havelany hitanjaka sy hiboridana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Avy eo dia hisy vahoaka hampirisihiny hikomy aminao ka hitora-bato anao sy hitetitetika anao amin’ny sabatra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary handoro ny tranonao. Hotanterahiny eo imason’ny vehivavy marobe ny didim-pitsarana famaizana anao. Hofaranako hatreo ny fiainam-pijangajanganao ka tsy handoa tamby amin’ny lehilahy intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Hanamparako ny fahatezerako ianao ambara-pahafaka ny hasarotam-piaroko; amin’izay vao hionona Aho ka tsy hisafoaka intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Satria tsy nahatsiaro izay vitako taminao fony fahazaza ianao fa nampahatezitra Ahy tamin’ireo ratsy rehetra ireo, dia hatambesatro aminao ny vokatry ny fitondrantenanao! Teny hentitra avy amiko Tompo ANDRIANANAHARY izany. Moa tsy nanao izany toetra tsivalahara izany ve ianao ho fanampin’ny fanompoan-tsampy rehetra vitanao?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ratsy noho ny tanàna hafa i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '«Ry Jerosalema, hamely anao ny mpanao ohabolana rehetra ka hiteny hoe: ‹Manahaka an-dreniny ihany ny zanany vavy.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hay tokoa moa ianao no zanakavavin-dreninao, dia ilay vehivavy nankahala ny vady aman-janany. Mitovy amin’ireo rahavavinao izay nankahala ny vady aman-janany ianao. Hetita ny reninareo ary '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ny rainareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'I Samaria any avaratra mbamin’ireo zana-bohiny no zokinao vavy, ary i Sôdôma ao atsimo mbamin’ireo zana-bohiny no zandrinao vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tsy nionona fotsiny tamin’ny fakana tahaka ny fitondrantenany sy ny fomba maharikoriko nataony ianao, fa kely ihany raha izany! Saingy ratsy lavitra noho ny azy ny fitondrantenanao manontolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Velona Izaho Tompo ANDRIANANAHARY ka manao teny hentitra sy mianiana fa i Sôdôma rahavavinao sy ireo zana-bohiny dia tsy mbola nanao ratsy tahaka anao sy ireo zana-bohitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ireto monja no hany fahadisoany: niaina tamin’ny avonavona sy ny fihinanam-be ary ny toetra bonaika tsy miraika izy fa tsy namonjy ny mahantra sy ny fadiranovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Niavonavona sy nanao zavatra maharikoriko teo anatrehako izy; ka nofoanako tsy ho eto ambonin’ny tany araka ny fantatrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary i Samaria ihany koa dia tsy nahavita ny antsasaky ny fahotana nataonao akory! Maharikoriko lavitra noho izay vitany no nataonao. Koa i Sôdôma sy i Samaria rahavavinao dia toa tsy manan-tsiny raha ampitahaina aminao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Koa zakao ny fahafaham-baràkanao fa nanamarina ireo rahavavinao ianao tamin’ny nanaovanao fahotana maharikoriko kokoa noho ny azy, ka toa miseho ho marina eo anatrehanao izy izao. Mba menatra kosa ianao ka zakao ny fahafaham-baràkanao noho ny nampisehoanao ireo rahavavinao ho toa marina! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Hamboariko ireo tanàna ireo: haveriko amin’ny laoniny ny fiainana ao Sôdôma sy ireo zana-bohiny ary ny ao Samaria mbamin’ny zana-bohiny; ary haveriko amin’ny laoniny tahaka azy koa ianao eo afovoan’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Hionona ireo rahavavinao raha mahita anao menatra sy afa-baràka tamin’izay rehetra nataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Hiverina amin’ny laoniny taloha i Sôdôma sy i Samaria mbamin’ireo zana-bohiny; ary ho tahaka izany koa ianao sy ireo zana-bohitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Tamin’ny andro mbola nireharehanao dia fanarabiana no niresahanao an’i Sôdôma rahavavinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Talohan’ny nisehoan’ny faharatsianao an-karihary izany. Anjaranao kosa izao no latsain’ireo tanàna edômita sy ny zana-bohitra rehetra manodidina ary vingavingain’ireo tanàna filistinina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.57 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Edômita: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka ny stf hebreo sasany sy ny dkt siriaka tranainy izany; ny RM kosa manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sirianina.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' –Ny '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Filistinina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia nipetraka teny amoron-tsiraka hatramin’ny andron’ny Mpitsara ary fahavalon’i Israely, jereo Mpits 15–16.
    marker-yv: yv-n
  - type: text
    text: ' etsy sy eroa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Izany no hizakanao ny vokatry ny fitondrantenanao tsivalahara sy maharikoriko. Teny hentitra avy amiko TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: Tsy noraharahainao ny fianianana nataonao fa nivadika tamin’ny fanekempihavanako ianao; koa araka izany no hataoko aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Izaho anefa tsy hivadika amin’ny fanekempihavanana izay nataoko taminao tamin’ny andron’ny fahatanoranao fa hanova azy ho fanekempihavanana maharitra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Hahatsiaro ny fitondrantenanao ianao ka ho menatra rehefa mahita indray ireo zokinao vavy sy zandrinao vavy; fa hatolotro anao ho toy ny zanakavavy ireo na dia tsy anisan’ny zavatra nanaovako fanekempihavanana taminareo aza izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Hohavaoziko ny fanekempihavanako aminao, ka dia hoekenao fa Izaho no TOMPO. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Amin’izay dia hahatsiaro ny lasa ianao ka ho menatra tsy hahateny, fa Izaho kosa hamela anao amin’izay ratsy rehetra nataonao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
