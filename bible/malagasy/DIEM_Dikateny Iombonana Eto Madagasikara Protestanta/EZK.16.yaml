    marker: p
    children:
    - type: text
      text: Amin’izay dia hahatsiaro ny lasa ianao ka ho menatra tsy hahateny, fa Izaho kosa hamela anao amin’izay ratsy rehetra nataonao. Teny hentitra avy amiko Tompo ANDRIANANAHARY izany.»
  '7':
