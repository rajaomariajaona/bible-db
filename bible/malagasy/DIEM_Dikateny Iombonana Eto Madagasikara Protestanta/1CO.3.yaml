document_id: 1CO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mpiara-miasa amin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa izaho, ry havako, dia tsy afaka niteny taminareo toy ny amin’ny olona manana ny Fanahin’Andriamanitra; fa toy ny amin’ny olona mbola fehezin’ny maha olombelona no nitenenako taminareo, toy ny amin’ny olona zazavao amin’ny maha kristianina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia ronono no namahanako anareo fa tsy ventin-kanina, satria tsy mbola nozakanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Heb 5.12-13.
    marker-yv: yv-n
  - type: text
    text: '. Na ankehitriny izao aza, dia tsy mbola zakanareo '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'noho ianareo mbola fehezin’ny maha olombelona. Matoa fialonana sy adiady no mahazo laka eo aminareo, tsy miharihary ve fa fehezin’ny maha olombelona ianareo ka mitondra tena araka ny filamatr’olombelona? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha hoy ny anankiray hoe: «Izaho an’i Paoly», ary hoy kosa ny anankiray hoe: «Izaho an’i Apôlao'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.12.
    marker-yv: yv-n
  - type: text
    text: », moa tsy ny fanaon’olombelona ve no ataonareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa inona moa i Apôlao, ary inona moa i Paoly? Mpanompon’Andriamanitra fotsiny izahay, ka nahatonga anareo ho mpino samy araka izay nomen’ny Tompo hataonay avy: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izaho moa namboly, ary i Apôlao kosa nanondraka, fa Andriamanitra no nampitsimoka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy izay mamboly na izay manondraka no tena zavatra, fa Andriamanitra Izay mampitsimoka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mitovy ihany izay mamboly sy izay manondraka; ary samy homen’Andriamanitra ny valisoa tandrify azy arakaraka ny fisasarany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa izahay dia mpiara-miasa amin’Andriamanitra ary ianareo no sahan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Trano aorin’Andriamanitra koa ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Araka ny tombon-tsoa nomen’Andriamanitra ahy, dia nametraka ny fototra toy ny mpità-marika mahay aho; ary olon-kafa no mandrafitra eo ambonin’izany. Kanefa aoka samy hitandrina tsara ny fomba andrafetany; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'satria tsy misy mahazo mametraka fototra hafa, ankoatra ilay efa eo, dia i Jesoa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Kristy
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny arafitra eo ambonin’izany fototra izany dia mety ho volamena, na volafotsy, na vatosoa, na hazo, na bozaka, na mololo; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'kanefa dia hiseho ny asan’ny tsirairay amin’ilay andro fitsarana izay hampiharihary izany. Fa amin’ny afo no hisehoan’izany andro izany, ka dia hosedrain’io afo io ny asa vitan’ny tsirairay hahitana izay hamafiny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha asa mahatanty afo moa no narafiny teo ambony fototra, dia handraisany valisoa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha asa kilan’ny afo kosa, dia hahafaty antoka azy; kanefa ny tenany dia hovonjena ihany, saingy toy ny namakivaky afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy fantatrareo ve fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tempolin
  - type: text
    text: '’Andriamanitra ianareo ary ao aminareo ny Fanahin’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha misy olona manimba ny tempolin’Andriamanitra, dia mba hosimbàn’Andriamanitra koa. Fa masina ny tempolin’Andriamanitra, ary ianareo no tempoliny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary ianareo no tempoliny: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ary dia masina koa ianareo.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka tsy hisy hamita-tena. Raha misy aminareo mihevi-tena ho hendry araka ny filamatr’
  - type: usfm
    marker: w
    children:
    - type: text
      text: izao tontolo izao
  - type: text
    text: ', aoka hanjary adala izy mba ho hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ny fahendrena araka ny filamatr’izao tontolo izao dia fahadalana eo imason’Andriamanitra; satria izao no voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ': «Ny hafetsen’ny olon-kendry no amandrihan’Andriamanitra azy»; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary izao koa: «Fantatry ny Tompo ny fisainan’ny olon-kendry fa zava-poana izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 19:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jôb 5.13. –
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 20:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Sal 94.11.'
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Noho izany, aoka tsy hisy hanao olona ho reharehany. Fa anareo ny zavatra rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'na i Paoly, na i Apôlao, na i Petera, na izao tontolo izao, na fiainana, na fahafatesana, na zavatra ankehitriny, na zavatra ho avy: anareo avokoa izany rehetra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ianareo kosa an’i Kristy, ary i Kristy an’Andriamanitra.
