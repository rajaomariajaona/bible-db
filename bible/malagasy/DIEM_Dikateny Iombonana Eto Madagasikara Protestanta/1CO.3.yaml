document_id: 1CO.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mpiara-miasa amin’Andriamanitra
  - type: text
    content: 'Koa izaho, ry havako, dia tsy afaka niteny taminareo toy ny amin’ny olona manana ny Fanahin’Andriamanitra; fa toy ny amin’ny olona mbola fehezin’ny maha olombelona no nitenenako taminareo, toy ny amin’ny olona zazavao amin’ny maha kristianina. '
  '10':
  - type: text
    content: 'Araka ny tombon-tsoa nomen’Andriamanitra ahy, dia nametraka ny fototra toy ny mpità-marika mahay aho; ary olon-kafa no mandrafitra eo ambonin’izany. Kanefa aoka samy hitandrina tsara ny fomba andrafetany; '
  '11':
  - type: text
    content: 'satria tsy misy mahazo mametraka fototra hafa, ankoatra ilay efa eo, dia i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ny arafitra eo ambonin’izany fototra izany dia mety ho volamena, na volafotsy, na vatosoa, na hazo, na bozaka, na mololo; '
  '13':
  - type: text
    content: 'kanefa dia hiseho ny asan’ny tsirairay amin’ilay andro fitsarana izay hampiharihary izany. Fa amin’ny afo no hisehoan’izany andro izany, ka dia hosedrain’io afo io ny asa vitan’ny tsirairay hahitana izay hamafiny. '
  '14':
  - type: text
    content: 'Raha asa mahatanty afo moa no narafiny teo ambony fototra, dia handraisany valisoa. '
  '15':
  - type: text
    content: Raha asa kilan’ny afo kosa, dia hahafaty antoka azy; kanefa ny tenany dia hovonjena ihany, saingy toy ny namakivaky afo.
  '16':
  - type: text
    content: 'Tsy fantatrareo ve fa '
  - type: text
    content: tempolin
  - type: text
    content: '’Andriamanitra ianareo ary ao aminareo ny Fanahin’Andriamanitra? '
  '17':
  - type: text
    content: Raha misy olona manimba ny tempolin’Andriamanitra, dia mba hosimbàn’Andriamanitra koa. Fa masina ny tempolin’Andriamanitra, ary ianareo no tempoliny
  - type: note
    content: 'ary ianareo no tempoliny: dkt hafa ary dia masina koa ianareo.'
  - type: text
    content: '!'
  '18':
  - type: text
    content: Aoka tsy hisy hamita-tena. Raha misy aminareo mihevi-tena ho hendry araka ny filamatr’
  - type: text
    content: izao tontolo izao
  - type: text
    content: ', aoka hanjary adala izy mba ho hendry. '
  '19':
  - type: text
    content: 'Fa ny fahendrena araka ny filamatr’izao tontolo izao dia fahadalana eo imason’Andriamanitra; satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ': «Ny hafetsen’ny olon-kendry no amandrihan’Andriamanitra azy»; '
  '2':
  - type: text
    content: Dia ronono no namahanako anareo fa tsy ventin-kanina, satria tsy mbola nozakanareo
  - type: note
    content: Ampit Heb 5.12-13.
  - type: text
    content: '. Na ankehitriny izao aza, dia tsy mbola zakanareo '
  '20':
  - type: text
    content: 'ary izao koa: «Fantatry ny Tompo ny fisainan’ny olon-kendry fa zava-poana izany'
  - type: note
    content: 'And 19: Jôb 5.13. –And 20: Sal 94.11.'
  - type: text
    content: '.» '
  '21':
  - type: text
    content: 'Noho izany, aoka tsy hisy hanao olona ho reharehany. Fa anareo ny zavatra rehetra, '
  '22':
  - type: text
    content: 'na i Paoly, na i Apôlao, na i Petera, na izao tontolo izao, na fiainana, na fahafatesana, na zavatra ankehitriny, na zavatra ho avy: anareo avokoa izany rehetra izany; '
  '23':
  - type: text
    content: ianareo kosa an’i Kristy, ary i Kristy an’Andriamanitra.
  '3':
  - type: text
    content: 'noho ianareo mbola fehezin’ny maha olombelona. Matoa fialonana sy adiady no mahazo laka eo aminareo, tsy miharihary ve fa fehezin’ny maha olombelona ianareo ka mitondra tena araka ny filamatr’olombelona? '
  '4':
  - type: text
    content: 'Raha hoy ny anankiray hoe: «Izaho an’i Paoly», ary hoy kosa ny anankiray hoe: «Izaho an’i Apôlao'
  - type: note
    content: Jereo 1.12.
  - type: text
    content: », moa tsy ny fanaon’olombelona ve no ataonareo?
  '5':
  - type: text
    content: 'Fa inona moa i Apôlao, ary inona moa i Paoly? Mpanompon’Andriamanitra fotsiny izahay, ka nahatonga anareo ho mpino samy araka izay nomen’ny Tompo hataonay avy: '
  '6':
  - type: text
    content: 'izaho moa namboly, ary i Apôlao kosa nanondraka, fa Andriamanitra no nampitsimoka. '
  '7':
  - type: text
    content: 'Tsy izay mamboly na izay manondraka no tena zavatra, fa Andriamanitra Izay mampitsimoka. '
  '8':
  - type: text
    content: 'Mitovy ihany izay mamboly sy izay manondraka; ary samy homen’Andriamanitra ny valisoa tandrify azy arakaraka ny fisasarany avy. '
  '9':
  - type: text
    content: Fa izahay dia mpiara-miasa amin’Andriamanitra ary ianareo no sahan’Andriamanitra.
  - type: text
    content: 'Trano aorin’Andriamanitra koa ianareo. '
