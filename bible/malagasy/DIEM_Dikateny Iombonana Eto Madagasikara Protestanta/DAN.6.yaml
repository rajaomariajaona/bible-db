document_id: DAN.6,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ary i Dariôsa, ilay Medianina, no nandray ny fanjakana teo amin’ny faha-62 taonany
  - type: note
    content: Io Dariôsa izay Medianina io dia tsy mba voalaza mihitsy na aiza na aiza ao amin’ny tantara tranainy afa-tsy eto ihany. –Ao amin’ny dkt sasany ny and 6.1-29 dia mitondra ny laharana 5.31–6.28.
  - type: text
    content: .
  - type: heading
    content: Mamandrika an’i Daniela ireo fahavalony.
  '10':
  - type: text
    content: Koa dia nosoniavin’i Dariôsa mpanjaka izany didy aman-dalàna izany.
  - type: heading
    content: Natsipy tao an-davaky ny liona i Daniela
  '11':
  - type: text
    content: 'Ary nony fantatr’i Daniela fa nosoniavin’ny mpanjaka ny didy, dia nody tany an-tranony izy; ary novohany ny varavarankeliny tany ambony rihana nanandrify an’i Jerosalema. Intelo isan’andro izy no nandohalika nivavaka sy nidera an’ilay Andriamaniny satria efa fanaony hatry ny taloha izany. '
  '12':
  - type: text
    content: 'Dodona erỳ ireo lehilahy ireo nitsikilo ka nahita an’i Daniela nivavaka sy nitalaho tamin’ny Andriamaniny; '
  '13':
  - type: text
    content: 'dia nanatona ny mpanjaka izy ary niteny teo anatrehany momba ilay didy ka nanao hoe:'
  - type: text
    content: –Ry mpanjaka ô, moa tsy nisy didy nosoniavinao va fa ato anatin’ny telopolo andro, na zovy na zovy no hanao fivavahana na amin’Andriamanitra na amin’olona, afa-tsy aminao ihany, dia hatsipy ao an-davaky ny liona?
  - type: text
    content: 'Dia namaly kosa ny mpanjaka nanao hoe:'
  - type: text
    content: –Marina tokoa izany, dia araka ny lalànan’ny Medianina sy ny Persianina izay tsy azo foanana.
  '14':
  - type: text
    content: 'Fa niteny indray ireo ka nanao teo anatrehan’ny mpanjaka hoe:'
  - type: text
    content: –I Daniela, isan’ireo babo avy any Joda, dia tsy mba miraharaha anao na ny didy izay nosoniavinao, ry mpanjaka ô; fa intelo isan’andro izy no manao fivavahana amin’ny Andriamaniny.
  '15':
  - type: text
    content: 'Nalahelo mafy ny mpanjaka raha nandre izany zavatra izany; dia nisaintsaina ny hanavotra an’i Daniela izy ary nitady izay hamonjena azy mandra-pilentiky ny masoandro. '
  '16':
  - type: text
    content: 'Fa dodona niverina tany amin’ny mpanjaka ireo lehilahy ireo ka nanao taminy hoe:'
  - type: text
    content: –Aoka ho fantatrao, ry mpanjaka, fa araka ny lalànan’ny Medianina sy ny Persianina, ny didy aman-dalàna izay navoakan’ny mpanjaka dia tsy azo ovana.
  '17':
  - type: text
    content: 'Tamin’izay dia nanome baiko ny mpanjaka mba halaina i Daniela ka hatsipy ao an-davaky ny liona. Dia niteny kosa ny mpanjaka ka nanao tamin’i Daniela hoe: «Andriamanitrao, Izay tompoinao fatratra, no hany hamonjy anao!»'
  '18':
  - type: text
    content: 'Dia nisy vato natampina ny vavan-davaka; ary ny mpanjaka nanomboka izany tamin’ny '
  - type: text
    content: tombokaseny
  - type: text
    content: ' sy tamin’ny an’ireo olo-manan-kajany mba tsy hisy hovana ny amin’i Daniela. '
  '19':
  - type: text
    content: Dia nody tany an-dapany ny mpanjaka ary tsy nihinan-kanina nandritra ny alina sady tsy nampiditra vehivavy
  - type: note
    content: 'nampiditra vehivavy: tsy azo antoka loatra ny hevitry ny teny aramianina nadika eto.'
  - type: text
    content: ' teo anatrehany, na dia tsy nahita tory aza.'
  - type: heading
    content: Nivoaka tsy naninon-tsy naninona avy tao an-davaky ny liona i Daniela.
  '2':
  - type: text
    content: Sitrak’i Dariôsa ny hanendry solotenan’andriamanjaka 120 izay hanapaka manerana ny fanjakana
  - type: note
    content: Ny solotenan’andriamanjaka dia ireo governora mitondra faritany tao amin’ny fanjakana manontolo.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Fa raha vao nangiran-dratsy ny andro, dia nifoha ny mpanjaka ka nandeha faingana nankany amin’ny lavaky ny liona. '
  '21':
  - type: text
    content: 'Ary raha nanatona ny lavaka izy, dia niantso an’i Daniela tamin’ny feo malahelo hoe:'
  - type: text
    content: –Ry Daniela mpanompon’Andriamanitra velona ô, moa Andriamanitrao Izay tompoinao fatratra va afaka namonjy anao tamin’ny liona?
  '22':
  - type: text
    content: 'Dia niteny tamin’ny mpanjaka i Daniela hoe:'
  - type: text
    content: '–Ho ela velona anie ianao, ry mpanjaka! '
  '23':
  - type: text
    content: 'Ny Andriamanitro efa naniraka ny '
  - type: text
    content: anjeliny
  - type: text
    content: ' hanakombona ny vavan’ny liona tsy handratra ahy, satria hita tsy manan-tsiny teo anatrehany aho; ary tsy nanao ratsy teo anatrehanao koa aho, ry mpanjaka.'
  '24':
  - type: text
    content: 'Tamin’izay dia faly tokoa ny mpanjaka, ka nasainy nakarina avy ao an-davaka i Daniela; rehefa tafakatra izy, dia tsy nahitana ratra akory satria natoky an’ilay Andriamaniny. '
  '25':
  - type: text
    content: Ary nanome baiko ny mpanjaka mba halaina ireo lehilahy izay niampanga an’i Daniela ka hatsipy ao an-davaky ny liona izy mbamin’ny vady aman-janany. Fa raha tsy mbola nipaka tamin’ny vody lavaka akory izy mianakavy, dia nifandrombahan’ny liona ka nopotipotehiny ny taolany rehetra.
  '26':
  - type: text
    content: 'Taorian’izany i Dariôsa mpanjaka dia nanoratra ho an’ny vahoaka avy amin’ny foko sy firenena ary samy hafa fiteny rehetra izay monina ambonin’ny tany tontolo hoe:'
  - type: text
    content: –Hitombo anie ny fiadananareo!
  '27':
  - type: text
    content: Mamoaka izao didy izao aho mba hangovitan’ny olona sy hatahorany eo anatrehan’ny Andriamanitr’i Daniela manerana ny fanjakako.
  - type: text
    content: Fa Izy no Andriamanitra velona
  - type: text
    content: sady maharitra mandrakizay;
  - type: text
    content: ny fanjakany tsy mety rava
  - type: text
    content: ary ny fanapahany haharitra tsisy farany.
  '28':
  - type: text
    content: Izy no mamonjy sy manafaka
  - type: text
    content: ary manao famantarana sy zava-mahagaga
  - type: text
    content: any an-danitra sy etỳ an-tany;
  - type: text
    content: Izy no namonjy an’i Daniela
  - type: text
    content: ho afaka tamin’ny vahohon’ny liona.»
  '29':
  - type: text
    content: Ary izany Daniela izany dia nitana toerana ambony tamin’ny nanjakan’i Dariôsa sy tamin’ny nanjakan’i Kirôsa ilay Persianina.
  - type: note
    content: Jereo Hez 1.1 sy nta.
  '3':
  - type: text
    content: 'Ary teo ambonin’ireo dia nisy telo lahy mpitantan-draharaha, ka i Daniela ny anankiray; izy telo lahy no hanaovan’ireo solotenan’andriamanjaka tatitra mba tsy hisy hanimba ny tombon-tsoan’ny mpanjaka. '
  '4':
  - type: text
    content: Ary nihoaran’io Daniela io avokoa ireo mpitantan-draharaha anankiroa sy ireo solotenan’andriamanjaka tamin’ny fananany fanahy tena fatratra, koa nokasain’ny mpanjaka hatao lehibe eo amin’ny fanjakana manontolo izy
  - type: note
    content: Tetehina ho praiminisitra mihitsy izany i Daniela.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Noho izany ireo mpitantan-draharaha ambony sy ireo solotenan’andriamanjaka dia nikaroka izay hiampangana an’i Daniela momba ny raharaham-panjakana; kanefa tsy nahita izay fahadisoany na tsininy akory ireo, satria nahatoky izy, fa tsy nisy mihitsy lesoka na tsiny teo aminy. '
  '6':
  - type: text
    content: 'Tamin’izay dia hoy ireo lehilahy ireo: «Tsy ho hitantsika mihitsy izay hiampangantsika io Daniela io raha tsy zavatra momba ny lalànan’ny Andriamaniny ihany».'
  '7':
  - type: text
    content: 'Dia dodona nankany amin’ny mpanjaka ireo mpitantan-draharaha ambony sy solotenan’andriamanjaka, ary nanao taminy hoe:'
  - type: text
    content: '–Ho ela velona anie ianao, ry Dariôsa mpanjaka! '
  '8':
  - type: text
    content: 'Ny mpitantan-draharaha ambony ato amin’ny fanjakana sy ny mpanapaka sy ny solotenan’andriamanjaka sy ny mpanolotsaina ary ny governora dia nifanaraka fa tokony hamoaka lalàm-panjakana ianao, ry mpanjaka, fa ato anatin’ny telopolo andro, na iza na iza manao fivavahana na amin’Andriamanitra na amin’olona, afa-tsy aminao ihany, ry mpanjaka ô, dia hatsipy ao an-davaky ny liona izy. '
  '9':
  - type: text
    content: 'Ankehitriny, ry mpanjaka ô, avoahy ny didy ka asio sonia mba tsy ho azo ovana, araka ny lalànan’ny Medianina sy ny Persianina izay tsy azo foanana.» '
