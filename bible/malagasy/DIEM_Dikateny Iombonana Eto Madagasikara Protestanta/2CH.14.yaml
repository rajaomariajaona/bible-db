document_id: 2CH.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiandohan’ny nanjakàn’i Asà
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 1 Mp 15.9-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nandritra ny andro nanjakàn’i Asà, dia nandry folo taona ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nanao izay tsara sy mahitsy eo imason’ny TOMPO Andriamaniny i Asà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa noravany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' aman-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinan
  - type: text
    text: '’ireo firenena vahiny, notorotoroiny ny tsangambaton-tsampy ary nokapainy ny tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nomeny baiko ny Jodeanina hitady ny TOMPO Andriamanitry ny razany sy hankatò ny lalànany sy ny didiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noravan’i Asà ny toeram-panasinana sy ny alitara fandoroana vovo-javamanitra teny amin’ny tanàna rehetra manerana an’i Joda; ka nandry feizay ny fanjakana nandritra ny fitondrany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, nandry feizay tokoa ny tany fa tsy nisy niady tamin’i Asà nandritra ireo taona ireo, satria ny TOMPO no nanome azy fiadanana ary nanamafy tanàna maro tao Joda ny mpanjaka nandritra izany fotoam-pilaminana izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sady niteny tamin’ny Jodeanina hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ndeha hohamafisintsika ireto tanàna ireto ka hasiantsika manda manodidina ary koa tilikambo sy vavahady mafy hidy, satria mbola eo ambany fitondrantsika ny tany. Ny TOMPO Andriamanitsika manko no efa notadiavintsika; eny, nitady Azy isika ka nomeny fiadanana amin’ny sisin-tany manodidina.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nohamafisin’ny Jodeanina ireo tanàna ireo ka tontosa tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nanan-tafika i Asà, dia miaramila jodeanina nisy antokony telonjato samy mpirongo ampinga lehibe sy lefona ary koa miaramila benjaminita nisy antokony 280 samy mpirongo ampinga maivana sy tsipîka; ireo rehetra ireo dia vantan-dehilahy maherifo avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary i Zera, ilay Etiôpianina, dia niainga hiady tamin’izany tafika izany sady nitondra miaramila nisy antokony arivo sy kalesy telonjato, ka tonga tao Maresà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Maresà: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana 40 km eo ho eo ao atsimo andrefan’i Jerosalema.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niroso hifanandrina aminy kosa i Asà; ka samy nilahatra hiady teo an-dohasaha Tsefatà akaikin’i Maresà izy roa tonta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niantso vonjy tamin’ny TOMPO Andriamaniny i Asà ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –TOMPO ô, tsy misy afa-tsy Ianao no mahavonjy ny tsy manan-kery, raha iadian’ny matanjaka izy; ka vonjeo izahay, ry TOMPO Andriamanitray ô, fa Ianao no iankinanay ary ny anaranao no irosoanay hiady amin’ity tafika goavana ity. TOMPO ô, Ianao no Andriamanitray, ka aza avela hisy olombelona haharesy Anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia noresen’ny TOMPO teo anoloan’i Asà sy ny miaramila jodeanina ireo Etiôpianina ka nandositra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary nenjehin’i Asà sy ny tafiny hatrany Gerara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gerara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toerana 40 km eo ho eo ao atsimo andrefan’i Maresà (and 8).
    marker-yv: yv-n
  - type: text
    text: '. Ary nahafatesana be tokoa ny Etiôpianina sady tsy nisy afa-nitsoaka akory aza, satria montsana teo anoloan’ny TOMPO sy ny tafika nombany. Babo betsaka no azon’ny Jodeanina tamin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nasian’ny tafik’i Asà koa ny tanàna rehetra manodidina an’i Gerara, satria nataon’ny TOMPO voagejan’ny horohoro ireo; dia norobain’ny tafik’i Asà avokoa ny tanàna, ka nahazoany babo betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nasiany koa ny vala fitobian’ny biby fiompy, ka namaboany ondry aman’osy marobe sy rameva. Avy eo dia niverina ho any Jerosalema i Asà sy ny tafiny.
