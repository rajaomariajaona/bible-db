document_id: 2CH.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiandohan’ny nanjakàn’i Asà
  - type: heading
    content: (Jereo 1 Mp 15.9-11)
  - type: text
    content: 'Nandritra ny andro nanjakàn’i Asà, dia nandry folo taona ny tany. '
  - type: text
    content: 'Nanao izay tsara sy mahitsy eo imason’ny TOMPO Andriamaniny i Asà, '
  '10':
  - type: text
    content: 'Dia niantso vonjy tamin’ny TOMPO Andriamaniny i Asà ka nanao hoe:'
  - type: text
    content: –TOMPO ô, tsy misy afa-tsy Ianao no mahavonjy ny tsy manan-kery, raha iadian’ny matanjaka izy; ka vonjeo izahay, ry TOMPO Andriamanitray ô, fa Ianao no iankinanay ary ny anaranao no irosoanay hiady amin’ity tafika goavana ity. TOMPO ô, Ianao no Andriamanitray, ka aza avela hisy olombelona haharesy Anao.
  '11':
  - type: text
    content: 'Dia noresen’ny TOMPO teo anoloan’i Asà sy ny miaramila jodeanina ireo Etiôpianina ka nandositra '
  '12':
  - type: text
    content: ary nenjehin’i Asà sy ny tafiny hatrany Gerara
  - type: note
    content: 'Gerara: toerana 40 km eo ho eo ao atsimo andrefan’i Maresà (and 8).'
  - type: text
    content: '. Ary nahafatesana be tokoa ny Etiôpianina sady tsy nisy afa-nitsoaka akory aza, satria montsana teo anoloan’ny TOMPO sy ny tafika nombany. Babo betsaka no azon’ny Jodeanina tamin’izay. '
  '13':
  - type: text
    content: 'Nasian’ny tafik’i Asà koa ny tanàna rehetra manodidina an’i Gerara, satria nataon’ny TOMPO voagejan’ny horohoro ireo; dia norobain’ny tafik’i Asà avokoa ny tanàna, ka nahazoany babo betsaka. '
  '14':
  - type: text
    content: Nasiany koa ny vala fitobian’ny biby fiompy, ka namaboany ondry aman’osy marobe sy rameva. Avy eo dia niverina ho any Jerosalema i Asà sy ny tafiny.
  '2':
  - type: text
    content: 'fa noravany ny '
  - type: text
    content: alitara
  - type: text
    content: ' aman-'
  - type: text
    content: toeram-panasinan
  - type: text
    content: '’ireo firenena vahiny, notorotoroiny ny tsangambaton-tsampy ary nokapainy ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Nomeny baiko ny Jodeanina hitady ny TOMPO Andriamanitry ny razany sy hankatò ny lalànany sy ny didiny. '
  '4':
  - type: text
    content: 'Noravan’i Asà ny toeram-panasinana sy ny alitara fandoroana vovo-javamanitra teny amin’ny tanàna rehetra manerana an’i Joda; ka nandry feizay ny fanjakana nandritra ny fitondrany. '
  '5':
  - type: text
    content: 'Eny, nandry feizay tokoa ny tany fa tsy nisy niady tamin’i Asà nandritra ireo taona ireo, satria ny TOMPO no nanome azy fiadanana ary nanamafy tanàna maro tao Joda ny mpanjaka nandritra izany fotoam-pilaminana izany '
  '6':
  - type: text
    content: 'sady niteny tamin’ny Jodeanina hoe:'
  - type: text
    content: –Ndeha hohamafisintsika ireto tanàna ireto ka hasiantsika manda manodidina ary koa tilikambo sy vavahady mafy hidy, satria mbola eo ambany fitondrantsika ny tany. Ny TOMPO Andriamanitsika manko no efa notadiavintsika; eny, nitady Azy isika ka nomeny fiadanana amin’ny sisin-tany manodidina.
  - type: text
    content: Dia nohamafisin’ny Jodeanina ireo tanàna ireo ka tontosa tsara.
  '7':
  - type: text
    content: 'Ary nanan-tafika i Asà, dia miaramila jodeanina nisy antokony telonjato samy mpirongo ampinga lehibe sy lefona ary koa miaramila benjaminita nisy antokony 280 samy mpirongo ampinga maivana sy tsipîka; ireo rehetra ireo dia vantan-dehilahy maherifo avokoa. '
  '8':
  - type: text
    content: Ary i Zera, ilay Etiôpianina, dia niainga hiady tamin’izany tafika izany sady nitondra miaramila nisy antokony arivo sy kalesy telonjato, ka tonga tao Maresà
  - type: note
    content: 'Maresà: toerana 40 km eo ho eo ao atsimo andrefan’i Jerosalema.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ary niroso hifanandrina aminy kosa i Asà; ka samy nilahatra hiady teo an-dohasaha Tsefatà akaikin’i Maresà izy roa tonta. '
