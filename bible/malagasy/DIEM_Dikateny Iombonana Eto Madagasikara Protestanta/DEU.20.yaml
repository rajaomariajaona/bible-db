document_id: DEU.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fepetra momba ny ady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha miainga hanafika fahavalo ianareo, ka mahita soavaly sy kalesy ary tafika maro noho ny anareo, dia aza matahotra azy; satria ny TOMPO Andriamanitrareo, Ilay nampiakatra anareo avy tany Ejipta, no momba anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Iny vonon-kanafika iny ianareo, dia hohatonin’ny mpisorona ka hilazany hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Mihainoa, ry miaramila israelita! Efa hanafika fahavalo ianareo izao, koa aza rera-po na matahotra na mikoropaka foana na mangorohoro eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny TOMPO Andriamanitrareo no miara-mandeha aminareo hiady ho anareo amin’ny fahavalonareo mba hampandresy anareo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy eo dia hiteny amin’ny miaramila ireo manamboninahitra mpamory azy ka hanao hoe: «Iza aminareo no nahavita trano vaovao nefa mbola tsy nitokanany? Aoka hiverina any an-tranony izy fandrao maty any amin’ny ady, ka olon-kafa no hitokana ny tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary iza aminareo no efa namboly voaloboka nefa tsy mbola nioty vokatra taminy? Aoka hiverina any an-tranony izy fandrao maty any amin’ny ady, ka olon-kafa no hioty ny vokatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary iza aminareo no manana fofombady nefa tsy mbola nampakatra azy? Aoka hiverina any an-tranony izy, fandrao maty any amin’ny ady, ka olon-kafa no hampakatra ny vadiny.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia mbola hiteny amin’ny miaramila ireo manamboninahitra mpamory azy ka hanao hoe: «Iza aminareo no matahotra ka rera-po? Aoka hiverina any an-tranony izy, fandrao ho rera-po tahaka azy koa ny namany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rehefa tapi-niteny tamin’ny miaramila ireo manamboninahitra ireo, dia hanendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'dia hanendry mpifehy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'na hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia hotendrena ny mpifehy.
    marker-yv: yv-n
  - type: text
    text: mpifehy hitarika antoko miaramila.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa mby akaikin’ny tanàna hiadiana ianareo, dia taomy hanao raharaham-pihavanana ny mponina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha manaiky ireo ka mampandroso anareo, dia ho mpandoa hetra ho anareo sy ho mpanomponareo ny olona rehetra ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha tsy manaiky hanao raharaham-pihavanana kosa ireo, fa hiady aminareo, dia ataovy fahirano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa atolotry ny TOMPO Andriamanitrareo eo an-tananareo ilay tanàna, dia hovonoinareo amin’ny lelan-tsabatra ny lehilahy rehetra ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoentinareo ho anareo kosa ny babo rehetra ao, dia ny zaza amam-behivavy sy ny biby fiompy mbamin’izay rehetra ao an-tanàna; ary hitompoanareo ny babo azo tamin’ny fahavalonareo, satria omen’ny TOMPO Andriamanitrareo ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toy izany no hataonareo amin’ny tanàna rehetra tena lavitra anareo, ka tsy tanànan’ireto firenena ho lasanareo tany ireto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny tanànan’ireto firenena ireto, tanàna izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia tsy havelanareo hisy miangana izay olona sy mananaina rehetra ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hataonareo ringana tanteraka ireto firenena ireto, dia ny Hetita sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Amôrita
  - type: text
    text: ' ary ny Kanahanîta mbamin’ny Perizîta sy ny Hivita ary ny Jebôsita; hataonareo ringana tanteraka ireo, araka izay nandidian’ny TOMPO Andriamanitrareo anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba tsy hampianarany anareo hanao ny zavatra mahatsiravina rehetra fanaony amin’ny andriamaniny, ka tsy hanotanareo amin’ilay TOMPO Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha ela no hanaovanareo fahirano ny tanàna izay tafihinareo halaina, dia aza simbana kapaina amin’ny famaky ny hazo fihinam-boa eny manodidina, fa hisy voany hohaninareo; koa aza kapaina, fa tsy olona natao hiadiana tsy akory ny hazo fihinam-boa any an-tsaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Saingy ny hazo izay fantatrareo fa tsy fihinam-boa dia ho azonareo kapaina ihany ka hanamboaranareo fitaovana hamelezana ny tanàna izay miady aminareo, mandra-paharesiny.
