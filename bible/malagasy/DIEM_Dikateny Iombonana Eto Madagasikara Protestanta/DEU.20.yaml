document_id: DEU.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fepetra momba ny ady
  - type: text
    content: 'Raha miainga hanafika fahavalo ianareo, ka mahita soavaly sy kalesy ary tafika maro noho ny anareo, dia aza matahotra azy; satria ny TOMPO Andriamanitrareo, Ilay nampiakatra anareo avy tany Ejipta, no momba anareo. '
  '10':
  - type: text
    content: 'Rehefa mby akaikin’ny tanàna hiadiana ianareo, dia taomy hanao raharaham-pihavanana ny mponina. '
  '11':
  - type: text
    content: 'Raha manaiky ireo ka mampandroso anareo, dia ho mpandoa hetra ho anareo sy ho mpanomponareo ny olona rehetra ao. '
  '12':
  - type: text
    content: 'Raha tsy manaiky hanao raharaham-pihavanana kosa ireo, fa hiady aminareo, dia ataovy fahirano. '
  '13':
  - type: text
    content: 'Ary rehefa atolotry ny TOMPO Andriamanitrareo eo an-tananareo ilay tanàna, dia hovonoinareo amin’ny lelan-tsabatra ny lehilahy rehetra ao. '
  '14':
  - type: text
    content: 'Fa hoentinareo ho anareo kosa ny babo rehetra ao, dia ny zaza amam-behivavy sy ny biby fiompy mbamin’izay rehetra ao an-tanàna; ary hitompoanareo ny babo azo tamin’ny fahavalonareo, satria omen’ny TOMPO Andriamanitrareo ho anareo. '
  '15':
  - type: text
    content: 'Toy izany no hataonareo amin’ny tanàna rehetra tena lavitra anareo, ka tsy tanànan’ireto firenena ho lasanareo tany ireto. '
  '16':
  - type: text
    content: 'Fa ny tanànan’ireto firenena ireto, tanàna izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia tsy havelanareo hisy miangana izay olona sy mananaina rehetra ao. '
  '17':
  - type: text
    content: 'Hataonareo ringana tanteraka ireto firenena ireto, dia ny Hetita sy ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' ary ny Kanahanîta mbamin’ny Perizîta sy ny Hivita ary ny Jebôsita; hataonareo ringana tanteraka ireo, araka izay nandidian’ny TOMPO Andriamanitrareo anareo, '
  '18':
  - type: text
    content: mba tsy hampianarany anareo hanao ny zavatra mahatsiravina rehetra fanaony amin’ny andriamaniny, ka tsy hanotanareo amin’ilay TOMPO Andriamanitrareo.
  '19':
  - type: text
    content: 'Raha ela no hanaovanareo fahirano ny tanàna izay tafihinareo halaina, dia aza simbana kapaina amin’ny famaky ny hazo fihinam-boa eny manodidina, fa hisy voany hohaninareo; koa aza kapaina, fa tsy olona natao hiadiana tsy akory ny hazo fihinam-boa any an-tsaha. '
  '2':
  - type: text
    content: 'Iny vonon-kanafika iny ianareo, dia hohatonin’ny mpisorona ka hilazany hoe: '
  '20':
  - type: text
    content: Saingy ny hazo izay fantatrareo fa tsy fihinam-boa dia ho azonareo kapaina ihany ka hanamboaranareo fitaovana hamelezana ny tanàna izay miady aminareo, mandra-paharesiny.
  '3':
  - type: text
    content: '«Mihainoa, ry miaramila israelita! Efa hanafika fahavalo ianareo izao, koa aza rera-po na matahotra na mikoropaka foana na mangorohoro eo anatrehany. '
  '4':
  - type: text
    content: Fa ny TOMPO Andriamanitrareo no miara-mandeha aminareo hiady ho anareo amin’ny fahavalonareo mba hampandresy anareo.»
  '5':
  - type: text
    content: 'Avy eo dia hiteny amin’ny miaramila ireo manamboninahitra mpamory azy ka hanao hoe: «Iza aminareo no nahavita trano vaovao nefa mbola tsy nitokanany? Aoka hiverina any an-tranony izy fandrao maty any amin’ny ady, ka olon-kafa no hitokana ny tranony. '
  '6':
  - type: text
    content: 'Ary iza aminareo no efa namboly voaloboka nefa tsy mbola nioty vokatra taminy? Aoka hiverina any an-tranony izy fandrao maty any amin’ny ady, ka olon-kafa no hioty ny vokatra. '
  '7':
  - type: text
    content: 'Ary iza aminareo no manana fofombady nefa tsy mbola nampakatra azy? Aoka hiverina any an-tranony izy, fandrao maty any amin’ny ady, ka olon-kafa no hampakatra ny vadiny.» '
  '8':
  - type: text
    content: 'Dia mbola hiteny amin’ny miaramila ireo manamboninahitra mpamory azy ka hanao hoe: «Iza aminareo no matahotra ka rera-po? Aoka hiverina any an-tranony izy, fandrao ho rera-po tahaka azy koa ny namany.» '
  '9':
  - type: text
    content: Rehefa tapi-niteny tamin’ny miaramila ireo manamboninahitra ireo, dia hanendry
  - type: note
    content: dia hanendry mpifehy na hoe dia hotendrena ny mpifehy.
  - type: text
    content: mpifehy hitarika antoko miaramila.
