      children:
      - type: text
        text: '4'
    - type: text
      text: Amin’ny tsinam-bolana sy volam-penomanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsofy ny trômpetra ho an’ny andro fetintsika
    - type: usfm
      marker: f
