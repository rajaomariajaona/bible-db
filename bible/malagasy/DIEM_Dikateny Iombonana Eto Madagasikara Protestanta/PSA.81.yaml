        marker: fr
        children:
        - type: text
          text: '81.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny tsinam-bolana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia fiandohan’ny volana jiosy (jereo Nom 28.11-15) sady andro fety tsy iasana (jereo Ham 8.5). Fa amin’ny volana fahafito, rehefa tonga ny fararano, no tena ankalazaina manetriketrika kokoa izany (jereo Lev 23.23-25; Nom 29.1-6). Tapa-bolana atỳ aoriana, izany hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amin’ny volam-penomanana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', no manomboka ny fetin’ny Tranotomboka (Lev 23.33-43; Nom 29.12-39), izay indraindray antsoina fotsiny hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ilay fety
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (1 Mp 12.32 sns).'
      marker-yv: yv-n
    - type: text
      text: ','
