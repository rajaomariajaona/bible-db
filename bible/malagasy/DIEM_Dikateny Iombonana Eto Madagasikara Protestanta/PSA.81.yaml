document_id: PSA.81,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Hiram-piravoravoana amin’ny fety
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: filohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny jejilava. Salamo nataon’i Asafa.
  '10':
  - type: text
    content: Aoka tsy hisy andriamani-kafa eo aminareo,
  - type: text
    content: aoka ny andriamanitra vahiny tsy hivavahanareo,
  '11':
  - type: text
    content: satria Izaho no TOMPO Andriamanitrareo
  - type: text
    content: Izay nampiakatra anareo hiala tany Ejipta
  - type: note
    content: 'And 10-11: jereo Eks 20.2-3; Deot 5.5-6.'
  - type: text
    content: '!'
  - type: text
    content: Atanatanao ny vavanareo, dia hofenoiko.»
  '12':
  - type: text
    content: Kanjo ny vahoakako tsy nihaino Ahy,
  - type: text
    content: ny Israelita tsy nila Ahy,
  '13':
  - type: text
    content: koa navelako izy hizotra amin’ny ditran’ny fony
  - type: text
    content: sy hanaraka izay tiany hatao.
  '14':
  - type: text
    content: Raha mba nihaino Ahy ny vahoakako,
  - type: text
    content: raha mba nanaraka ny torolalako ny Israelita,
  '15':
  - type: text
    content: dia ho nampietreko faingana ireo fahavalony
  - type: text
    content: ary ho nofaiziko ireo mpampahory azy.
  '16':
  - type: text
    content: Izay mpankahala ny TOMPO ho nikoy tamiko;
  - type: text
    content: ny famaizany azy ho naharitra mandrakizay.
  '17':
  - type: text
    content: Ny Israelita kosa ho nofahanany vary tsara indrindra
  - type: text
    content: ary ho novokisany tantely avy amin’ny vatolampy.
  '2':
  - type: text
    content: Manaova hobim-pifaliana
  - type: text
    content: ho an’Andriamanitra herintsika,
  - type: text
    content: ankalazao ny Andriamanitr’i Jakôba.
  '3':
  - type: text
    content: Ingao ny hira, velezo ny amponga,
  - type: text
    content: tendreo ny lokanga tsara feo mbamin’ny valiha.
  '4':
  - type: text
    content: Amin’ny tsinam-bolana sy volam-penomanana,
  - type: text
    content: tsofy ny trômpetra ho an’ny andro fetintsika
  - type: note
    content: Ny tsinam-bolana dia fiandohan’ny volana jiosy (jereo Nom 28.11-15) sady andro fety tsy iasana (jereo Ham 8.5). Fa amin’ny volana fahafito, rehefa tonga ny fararano, no tena ankalazaina manetriketrika kokoa izany (jereo Lev 23.23-25; Nom 29.1-6). Tapa-bolana atỳ aoriana, izany hoe amin’ny volam-penomanana, no manomboka ny fetin’ny Tranotomboka (Lev 23.33-43; Nom 29.12-39), izay indraindray antsoina fotsiny hoe ilay fety (1 Mp 12.32 sns).
  - type: text
    content: ','
  '5':
  - type: text
    content: satria lalàna ho an’ny Israelita izany,
  - type: text
    content: didin’ny Andriamanitr’i Jakôba,
  '6':
  - type: text
    content: fitsipika nataony ho an’ny taranak’i Jôsefa
  - type: text
    content: fony Izy namely an’i Ejipta
  - type: note
    content: 'fony Izy namely an’i Ejipta: dia izay nataon’Andriamanitra hanerena ny Ejiptianina handefa ny Israelita (Eks 7–12).'
  - type: text
    content: .
  - type: text
    content: '–Feo tsy fantatro no reko nanao hoe:'
  '7':
  - type: text
    content: «Nesoriko teo an-tsorokareo ny entana;
  - type: text
    content: ny tananareo afa-namela ny sobika mavesatra
  - type: note
    content: 'Tsiahy momba ny asa an-terivozona nampanaovin’ny Ejiptianina an’ireo Israelita: jereo Eks 1.11.'
  - type: text
    content: .
  '8':
  - type: text
    content: Fony noporetina ianareo,
  - type: text
    content: dia niantso Ahy ka nafahako;
  - type: text
    content: novaliako tao anaty kotrokorana ianareo
  - type: text
    content: ary nozahako toetra teo amin’ny ranon’i Meribà
  - type: note
    content: 'Meribà: Eks 17.1-7; Nom 20.1-13.'
  - type: text
    content: .
  - type: text
    content: Fiatoana
  '9':
  - type: text
    content: Ry vahoakako, mihainoa fa mampitandrina Aho;
  - type: text
    content: 'satriko hihaino Ahy ianareo, ry Israelita:'
