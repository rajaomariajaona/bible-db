    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ingao ny hira, velezo ny amponga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendreo ny lokanga tsara feo mbamin’ny valiha.
  '4':
