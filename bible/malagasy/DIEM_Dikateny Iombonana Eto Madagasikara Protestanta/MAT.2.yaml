document_id: MAT.2,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Vangian’ireo olon-kendry i Jesoa zazakely
  - type: text
    content: 'Rehefa teraka tao Betlehema tanànan’i Jodea i Jesoa tamin’ny andron’i '
  - type: text
    content: Herôda
  - type: text
    content: ' mpanjaka'
  - type: note
    content: Araka 1 Sam 16.1, dia i Betlehema no tanàna fiavian’i Davida.
  - type: text
    content: ', dia indreny nisy olon-kendry mpandinika momba ny kintana niainga avy tany atsinanana ary tonga tao Jerosalema, '
  '11':
  - type: text
    content: 'Niditra tao an-trano ireo olon-kendry ka nahita ny zaza teny amin’i Maria reniny ary niankohoka teo anatrehan’ilay zaza ho fanajana azy. Rehefa izany, nanokatra ny vata fasiany rakitra ireto mpamangy ary nanolotra fanatitra ho azy: dia volamena sy '
  - type: text
    content: ditin-kazo manitra
  - type: text
    content: ' ary '
  - type: text
    content: miora
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ary notoroan’Andriamanitra hevitra tamin’ny nofy izy ireo tsy hiverina any amin’i Herôda, ka dia lalan-kafa no nizorany hody any amin’ny tany fonenany.
  - type: heading
    content: Entina mandositra any Ejipta i Jesoa zazakely
  '13':
  - type: text
    content: Rehefa lasa nody ireo olon-kendry, dia nisehoan’
  - type: text
    content: anjelin
  - type: text
    content: '’ny Tompo tamin’ny nofy i Jôsefa ka nilazany hoe:'
  - type: text
    content: '–Mifohaza ianao, ka ento mandositra any Ejipta ny zazakely sy ny reniny; ary mitoera any ambara-pilazako aminao indray. Fa efa hotadiavin’i '
  - type: text
    content: Herôda
  - type: text
    content: ' ny zazakely mba hamonoany azy.'
  '14':
  - type: text
    content: Dia nifoha i Jôsefa ka nitondra ny zazakely sy ny reniny nankany Ejipta
  - type: note
    content: Jereo 1 Mp 11.40; 2 Mp 25.26; Jer 43.5-7.
  - type: text
    content: ' dieny mbola alina. '
  '15':
  - type: text
    content: 'Ary nitoetra tany i Jôsefa telo mianaka ambara-pahafatin’i Herôda; koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: «Avy any Ejipta no niantsoako ny zanako
  - type: note
    content: Hôs 11.1.
  - type: text
    content: '!»'
  - type: heading
    content: Asain’i Herôda vonoina ireo zazakely tao Betlehema
  '16':
  - type: text
    content: 'Tamin’izay dia tsinjon’i '
  - type: text
    content: Herôda
  - type: text
    content: ' fa voafitak’ireo olon-kendry izy ka tena vinitra. Ary naniraka olona izy hamono tsy an-kanavaka ny zazalahikely tao Betlehema sy ny manodidina rehetra, hatramin’ny roa taona no ho midina, araka ilay fotoana nofotopotoriny tsara tamin’ireo olon-kendry. '
  '17':
  - type: text
    content: 'Tamin’izay no tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Jeremià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  '18':
  - type: text
    content: '«Injay nisy fitomaniana sy dradradradra tsy anerany heno tao Ramà:'
  - type: text
    content: I Rahely no nitomany ny zanany,
  - type: text
    content: ka tsy nety nampiononina satria tsy eo intsony ireny
  - type: note
    content: Jer 31.15.
  - type: text
    content: '!»'
  - type: heading
    content: Entina miverina an-tanindrazana i Jesoa zazakely
  '19':
  - type: text
    content: 'Rehefa maty kosa i '
  - type: text
    content: Herôda
  - type: text
    content: ', dia nisehoan’'
  - type: text
    content: anjelin
  - type: text
    content: '’ny Tompo tamin’ny nofy i Jôsefa raha tany Ejipta ka nilazany hoe:'
  '2':
  - type: text
    content: 'ka nanontany hoe:'
  - type: text
    content: –Aiza moa ilay Mpanjakan’ny Jiosy vao teraka? Efa hitanay niposaka tany atsinanana manko ny kintany, koa indreto izahay tonga hiankohoka eo anatrehany.
  '20':
  - type: text
    content: –Mifohaza ianao, ka ento mody any amin’ny tanin’i Israely ny zazakely sy ny reniny, fa efa maty ireo nitady ny ain’ny zaza.
  '21':
  - type: text
    content: 'Dia nifoha i Jôsefa ka nitondra ny zazakely sy ny reniny niverina tany amin’ny tanin’i Israely. '
  '22':
  - type: text
    content: 'Nony ren’i Jôsefa kosa fa i '
  - type: text
    content: Arkelaosy
  - type: text
    content: ' no nanjaka tany Jodea nandimby an’i Herôda rainy, dia natahotra ny hankany izy. Notoroan’Andriamanitra hevitra tamin’ny nofy indray anefa izy ka lasa nankany amin’ny faritany Galilea. '
  '23':
  - type: text
    content: 'Ary nony tonga tany izy telo mianaka, dia niorim-ponenana tao amin’ny tanàna atao hoe Nazareta; koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny mpaminany hoe:'
  - type: text
    content: '«Hantsoina hoe '
  - type: text
    content: Nazareanina
  - type: text
    content: ' Izy'
  - type: note
    content: Tsy fantatra izay rijan-teny nisintonan’i Matio izany lazainy hoe tenin’ny mpaminany izany; ary fanazavana samy hafa koa no aroson’ireo mpanao heviteny momba ny hoe Nazareanina.
  - type: text
    content: '!»'
  '3':
  - type: text
    content: 'Vao nandre izany i Herôda mpanjaka, dia nihorohoro izy mbamin’i Jerosalema iray vohitra. '
  '4':
  - type: text
    content: 'Novorîny avokoa ny lohandoha-mpisorona sy ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' teo amin’ny vahoakany, ka nanontaniany hoe:'
  - type: text
    content: '–Aiza moa no tokony hahaterahan’ny '
  - type: text
    content: Mesia
  - type: text
    content: '?'
  '5':
  - type: text
    content: 'Dia hoy ireo taminy:'
  - type: text
    content: '–Ao Betlehema, tanàna any Jodea, fa izao no voalazan’ny Soratra Masina tamin’ny alalan’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ':'
  '6':
  - type: text
    content: «Ary ianao, ry Betlehema, tanin’i Joda,
  - type: text
    content: tsy ianao tsy akory no kely indrindra amin’ireo tanàna malazan’i Jodea;
  - type: text
    content: fa avy aminao no hipoiran’ilay filoha
  - type: text
    content: izay ho mpiandry an’i Israely vahoakako
  - type: note
    content: Mi 5.1.
  - type: text
    content: .»
  '7':
  - type: text
    content: 'Tamin’izay dia nampiantsoin’i Herôda mangingina ireto olon-kendry ka nofotopotoriny tsara taminy ilay fotoana nisehoan’ny kintana; '
  '8':
  - type: text
    content: 'izay vao nalefany ho any Betlehema sady nataony hoe:'
  - type: text
    content: –Ndeha àry ka fotopotory tsara ny amin’ilay zaza; rehefa hitanareo dia ilazao aho, fa te hankany koa aho hiankohoka eo anatrehany.
  '9':
  - type: text
    content: Nony avy nandre ny tenin’ny mpanjaka ireo olon-kendry, dia niainga. Ary indro tazany indray ilay kintana
  - type: note
    content: Jereo Nom 24.17.
  - type: text
    content: ' hitany fony niposaka, hany ka faly dia faly aoka izany ry zareo. Nialoha lalana azy ireo hatrany ilay kintana ary tsy nijanona raha tsy efa teo ambonin’ny toerana nisy ny zaza. '
