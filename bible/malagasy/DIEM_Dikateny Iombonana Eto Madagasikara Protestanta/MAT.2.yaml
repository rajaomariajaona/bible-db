document_id: MAT.2,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vangian’ireo olon-kendry i Jesoa zazakely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa teraka tao Betlehema tanànan’i Jodea i Jesoa tamin’ny andron’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' mpanjaka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Araka 1 Sam 16.1, dia i Betlehema no tanàna fiavian’i Davida.
      marker-yv: yv-n
    - type: text
      text: ', dia indreny nisy olon-kendry mpandinika momba ny kintana niainga avy tany atsinanana ary tonga tao Jerosalema, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niditra tao an-trano ireo olon-kendry ka nahita ny zaza teny amin’i Maria reniny ary niankohoka teo anatrehan’ilay zaza ho fanajana azy. Rehefa izany, nanokatra ny vata fasiany rakitra ireto mpamangy ary nanolotra fanatitra ho azy: dia volamena sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ditin-kazo manitra
    - type: text
      text: ' ary '
    - type: usfm
      marker: w
      children:
      - type: text
        text: miora
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary notoroan’Andriamanitra hevitra tamin’ny nofy izy ireo tsy hiverina any amin’i Herôda, ka dia lalan-kafa no nizorany hody any amin’ny tany fonenany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entina mandositra any Ejipta i Jesoa zazakely
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa lasa nody ireo olon-kendry, dia nisehoan’
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: '’ny Tompo tamin’ny nofy i Jôsefa ka nilazany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mifohaza ianao, ka ento mandositra any Ejipta ny zazakely sy ny reniny; ary mitoera any ambara-pilazako aminao indray. Fa efa hotadiavin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' ny zazakely mba hamonoany azy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nifoha i Jôsefa ka nitondra ny zazakely sy ny reniny nankany Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 1 Mp 11.40; 2 Mp 25.26; Jer 43.5-7.
      marker-yv: yv-n
    - type: text
      text: ' dieny mbola alina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitoetra tany i Jôsefa telo mianaka ambara-pahafatin’i Herôda; koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Avy any Ejipta no niantsoako ny zanako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hôs 11.1.
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asain’i Herôda vonoina ireo zazakely tao Betlehema
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia tsinjon’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' fa voafitak’ireo olon-kendry izy ka tena vinitra. Ary naniraka olona izy hamono tsy an-kanavaka ny zazalahikely tao Betlehema sy ny manodidina rehetra, hatramin’ny roa taona no ho midina, araka ilay fotoana nofotopotoriny tsara tamin’ireo olon-kendry. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay no tanteraka ilay voalazan’ny Tompo tamin’ny alalan’i Jeremià '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' hoe:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Injay nisy fitomaniana sy dradradradra tsy anerany heno tao Ramà:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I Rahely no nitomany ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nety nampiononina satria tsy eo intsony ireny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 31.15.
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entina miverina an-tanindrazana i Jesoa zazakely
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa maty kosa i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ', dia nisehoan’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjelin
    - type: text
      text: '’ny Tompo tamin’ny nofy i Jôsefa raha tany Ejipta ka nilazany hoe:'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanontany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aiza moa ilay Mpanjakan’ny Jiosy vao teraka? Efa hitanay niposaka tany atsinanana manko ny kintany, koa indreto izahay tonga hiankohoka eo anatrehany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: –Mifohaza ianao, ka ento mody any amin’ny tanin’i Israely ny zazakely sy ny reniny, fa efa maty ireo nitady ny ain’ny zaza.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha i Jôsefa ka nitondra ny zazakely sy ny reniny niverina tany amin’ny tanin’i Israely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony ren’i Jôsefa kosa fa i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Arkelaosy
    - type: text
      text: ' no nanjaka tany Jodea nandimby an’i Herôda rainy, dia natahotra ny hankany izy. Notoroan’Andriamanitra hevitra tamin’ny nofy indray anefa izy ka lasa nankany amin’ny faritany Galilea. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tany izy telo mianaka, dia niorim-ponenana tao amin’ny tanàna atao hoe Nazareta; koa tanteraka ilay voalazan’ny Tompo tamin’ny alalan’ny mpaminany hoe:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hantsoina hoe '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Nazareanina
    - type: text
      text: ' Izy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy fantatra izay rijan-teny nisintonan’i Matio izany lazainy hoe tenin’ny mpaminany izany; ary fanazavana samy hafa koa no aroson’ireo mpanao heviteny momba ny hoe Nazareanina.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vao nandre izany i Herôda mpanjaka, dia nihorohoro izy mbamin’i Jerosalema iray vohitra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Novorîny avokoa ny lohandoha-mpisorona sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpahay lalàna
    - type: text
      text: ' teo amin’ny vahoakany, ka nanontaniany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aiza moa no tokony hahaterahan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: '?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ao Betlehema, tanàna any Jodea, fa izao no voalazan’ny Soratra Masina tamin’ny alalan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ':'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ary ianao, ry Betlehema, tanin’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ianao tsy akory no kely indrindra amin’ireo tanàna malazan’i Jodea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa avy aminao no hipoiran’ilay filoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay ho mpiandry an’i Israely vahoakako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mi 5.1.
      marker-yv: yv-n
    - type: text
      text: .»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izay dia nampiantsoin’i Herôda mangingina ireto olon-kendry ka nofotopotoriny tsara taminy ilay fotoana nisehoan’ny kintana; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay vao nalefany ho any Betlehema sady nataony hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha àry ka fotopotory tsara ny amin’ilay zaza; rehefa hitanareo dia ilazao aho, fa te hankany koa aho hiankohoka eo anatrehany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nony avy nandre ny tenin’ny mpanjaka ireo olon-kendry, dia niainga. Ary indro tazany indray ilay kintana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 24.17.
      marker-yv: yv-n
    - type: text
      text: ' hitany fony niposaka, hany ka faly dia faly aoka izany ry zareo. Nialoha lalana azy ireo hatrany ilay kintana ary tsy nijanona raha tsy efa teo ambonin’ny toerana nisy ny zaza. '
