document_id: LUK.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ampianarin’i Jesoa hivavaka ny mpianany
  - type: heading
    content: (Jereo Mt 6.9-13; 7.7-11)
  - type: text
    content: 'Nivavaka tao amin’ny toerana anankiray i Jesoa indray andro izay. Nony nitsahatra Izy, dia nilazan’ny anankiray tamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ' hoe:'
  - type: text
    content: –Tompo ô, mba ampianaro mivavaka izahay, toy ny nampianaran’i Jôhany
  - type: note
    content: I Jôhany Mpanao batisa no tenenina eto.
  - type: text
    content: ' ny mpianany!'
  '10':
  - type: text
    content: 'Fa izay rehetra mangataka no mahazo; izay mitady no mahita; ary izay mandondòna no hovohana. '
  '11':
  - type: text
    content: Araka ny hevitrareo, iza no raim-pianakaviana hangatahan-janany
  - type: note
    content: Aorian’ny hoe hangatahan-janany, misy stf sasany manampy hoe mofo ka hanome azy vato? na hangatahany... Jereo Mt 7.9.
  - type: text
    content: ' trondro ka tsy hanome azy trondro fa bibilava? '
  '12':
  - type: text
    content: 'Na hangatahany atody ka hanome azy maingoka? '
  '13':
  - type: text
    content: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ny zanakareo; tsy mainka ve ny Ray Izay any an-danitra no hanome ny Fanahy Masina an’izay mangataka aminy?
  - type: heading
    content: Ny avalin’i Jesoa ny fiampangana natao taminy
  - type: heading
    content: (Jereo Mt 12.22-30; Mk 3.22-27)
  '14':
  - type: text
    content: 'Sendra nandroaka '
  - type: text
    content: demony
  - type: text
    content: ' mampahamoana tamin’izay i Jesoa. Nony tafavoaka ilay demony, dia niteny ilay moana ka talanjona ny vahoaka. '
  '15':
  - type: text
    content: 'Fa nisy kosa niteny hoe:'
  - type: text
    content: '–Fahefana avy amin’i '
  - type: text
    content: Belzeboba
  - type: text
    content: ' filohan’ny demony ange no androahany ny demony e!'
  '16':
  - type: text
    content: 'Ny sasany kosa te hamandrika an’i Jesoa, ary dia nangataka Azy hanao '
  - type: text
    content: famantarana
  - type: text
    content: ' ho porofo fa hoe avy amin’Andriamanitra ny fahefàny. '
  '17':
  - type: text
    content: 'I Jesoa anefa nahalala ny tao am-pony ka nanao taminy hoe:'
  - type: text
    content: '–Ho rava izay fanjakana mifanao an-kolafiny ary hirodana tsy hisy tavela ny trano ao aminy. '
  '18':
  - type: text
    content: 'Koa raha mifanao an-kolafiny ry i '
  - type: text
    content: Satàna
  - type: text
    content: ', ahoana no mbola haharetan’ny fanjakany? Ianareo manko milaza hoe fahefana avy amin’i Belzeboba no androahako ny demony. '
  '19':
  - type: text
    content: 'Ary raha hoe fahefana avy amin’i Belzeboba tokoa no androahako ny demony, mba fahefana avy amin’iza kosa no androahan’ny mpomba anareo azy? Noho izany dia ireo mpomba anareo ihany no hanameloka anareo. '
  '2':
  - type: text
    content: 'Dia hoy i Jesoa taminy:'
  - type: text
    content: '–Izao àry no atao rehefa mivavaka ianareo:'
  - type: text
    content: «Ray ô,
  - type: text
    content: hohamasinina anie ny anaranao;
  - type: text
    content: ho tonga anie ny Fanjakanao.
  '20':
  - type: text
    content: 'Raha Izaho dia ny herin’Andriamanitra mihitsy no androahako ny demony ary miharihary amin’izany fa efa eto aminareo ny '
  - type: text
    content: Fanjakàn’Andriamanitra
  - type: text
    content: .
  '21':
  - type: text
    content: 'Raha olona matanjaka sady tsara fiadiana no miambina ny tranony, dia voaaro ny fananany. '
  '22':
  - type: text
    content: Fa raha matanjaka noho izy kosa no tonga ka mandresy azy, dia io no haka ny fiadiana rehetra nitokiany ary handroba sy hizara ny fananany.
  '23':
  - type: text
    content: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia mampihahaka.
  - type: heading
    content: Mitampody ny fanahy ratsy
  - type: heading
    content: (Jereo Mt 12.43-45)
  '24':
  - type: text
    content: '–Rehefa miala amin’ny olona ny fanahy maloto, dia mivezika etsy mivezika eroa any an-tany karakaina, mitady toerana hialana sasatra kanefa tsy mahita! Amin’izany dia hoy izy hoe: «Hody any amin’ilay trano izay nialako ihany aho.» '
  '25':
  - type: text
    content: 'Ary iny tokoa izy miverina ka mahita ilay tranony teo aloha voafafa sy voalamina tsara. '
  '26':
  - type: text
    content: Dia lasa indray izy maka fanahy fito ratsy kokoa noho ny tenany ary miara-miditra ao izy rehetra ka miorim-ponenana. Ary ny toetra hiafaran’izany olona izany dia hahatsiravina kokoa noho ny toetrany voalohany.
  - type: heading
    content: Ny tena hasambarana marina
  '27':
  - type: text
    content: 'Nony avy nilaza izany i Jesoa, dia nisy vehivavy anankiray teo afovoan’ny vahoaka nanandra-peo nanao taminy hoe:'
  - type: text
    content: –Sambatra izay reny nitondra Anao tao an-kibony sy nampinono Anao!
  '28':
  - type: text
    content: 'Fa hoy i Jesoa:'
  - type: text
    content: –Vao mainka sambatra aza ireo mihaino ny tenin’Andriamanitra ka mitandrina azy!
  - type: heading
    content: Angatahana famantarana i Jesoa
  - type: heading
    content: (Jereo Mt 12.38-42; Mk 8.12)
  '29':
  - type: text
    content: 'Nihamaro hatrany kosa ny vahoaka tafangona ka niteny i Jesoa nanao hoe:'
  - type: text
    content: '–Ratsy fanahy ny olona ankehitriny: mitady '
  - type: text
    content: famantarana
  - type: text
    content: ' nefa tsy homena famantarana afa-tsy ilay momba an’i '
  - type: text
    content: Jônà mpaminany
  - type: text
    content: '. '
  '3':
  - type: text
    content: Omeo anay isan’andro ny hanina sahaza anay
  - type: note
    content: 'sahaza... anay: dkt hafa ilainay na koa ho an’ny rahampitso.'
  - type: text
    content: .
  '30':
  - type: text
    content: 'Famantarana ho an’ireo mponina tao '
  - type: text
    content: Ninive
  - type: text
    content: ' manko i Jônà'
  - type: note
    content: 'Jônà (and 29 sy 30): jereo Jônà 3.3-5. –Ninive: jereo Mt 12.41 sy nta.'
  - type: text
    content: '; toy izany koa, ho famantarana ho an’ny olona ankehitriny ny '
  - type: text
    content: Zanak’olona
  - type: text
    content: '. '
  '31':
  - type: text
    content: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ilay mpanjakavavy avy any atsimo ka hanameloka azy; fa niala avy any am-paran’ny tany izy hihaino ny fahendren’i Salômôna mpanjaka
  - type: note
    content: Jereo 1 Mp 10.1-10.
  - type: text
    content: '! Indro anefa misy mihoatra noho i Salômôna eto! '
  '32':
  - type: text
    content: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ireo mponina tao Ninive ka hanameloka azy; fa niala tamin’ny toe-dratsy ireo mponina tao Ninive nony nandre ny toritenin’i Jônà
  - type: note
    content: Jereo Jônà 3.5,8,10.
  - type: text
    content: '! Indro anefa misy mihoatra noho i Jônà eto!'
  - type: heading
    content: Ny maso no toy ny jiron’ny tena
  - type: heading
    content: (Jereo Mt 5.15; 6.22-23)
  '33':
  - type: text
    content: –Tsy misy mampirehitra jiro ka mametraka azy any amin’ny takona na manarona azy amin’ny vata famarana
  - type: note
    content: Misy stf sasany tsy ahitana ny hoe na manarona azy amin’ny vata famarana (jereo Mt 5.15; Mk 4.21).
  - type: text
    content: '; fa eo ambony fitoeran-jiro no apetrany, hany ka izay miditra ao an-trano dia mahita ny hazavana. '
  '34':
  - type: text
    content: 'Ny masonao no toy ny jiron’ny tenanao; raha mahiratra ny masonao, dia mazava koa ny tenanao manontolo; fa raha jamba kosa ny masonao, dia maizina koa ny tenanao. '
  '35':
  - type: text
    content: 'Tandremo àry mba tsy hanjary haizina ilay hazavana ao aminao. '
  '36':
  - type: text
    content: Eny, raha tarafin’ny hazavana ny tenanao manontolo fa tsy misy ilany maizina, dia hazava tanteraka araka izany toy ny hazavain’ny jiro mamirapiratra.
  - type: heading
    content: Mampalahelo ireo Farisianina sy mpahay lalàna
  - type: heading
    content: (Jereo Mt 23.1-36; Mk 12.38-40; Lk 20.45-47)
  '37':
  - type: text
    content: 'Nony avy niteny i Jesoa, dia nasain’ny '
  - type: text
    content: Farisianina
  - type: text
    content: ' anankiray hisakafo any an-tranony. Nandroso i Jesoa ary nipetraka hihinana. '
  '38':
  - type: text
    content: 'Gaga ilay Farisianina nahita Azy tsy nisasa tanana talohan’ny sakafo. '
  '39':
  - type: text
    content: 'Fa hoy kosa ny Tompo taminy:'
  - type: text
    content: '–Ianareo Farisianina itony, diovinareo tsara ny etỳ ivelany hatramin’ny vohon’ny kaopy sy ny vilia; kanefa ny ao anatinareo feno halatra sy haratsiam-panahy. '
  '4':
  - type: text
    content: Ary avelao ny fahotanay;
  - type: text
    content: dia izany koa no amelanay izay rehetra meloka taminay.
  - type: text
    content: Ary aza avela ho azon’ny fakampanahy izahay.»
  '40':
  - type: text
    content: 'Tsy misaina ianareo! Moa tsy ilay Andriamanitra nanao ny etỳ ivelany ve no nanao ny ao anatiny koa? '
  '41':
  - type: text
    content: Manaova asa fiantrana araka izay anananareo, dia hadio aminareo ny zavatra rehetra.
  '42':
  - type: text
    content: Mampalahelo ianareo, ry Farisianina! Fa voaloanareo ho an’Andriamanitra ny ampahafolon’ny solila sy ny veromanitra mbamin’ny anana famboly isan-karazany
  - type: note
    content: Jereo Lev 27.30; Deot 14.22.
  - type: text
    content: ', nefa ataonareo tsirambina ny rariny sy ny fitiavana an’Andriamanitra; ireto indrindra no tsy maintsy tontosaina, na tsy azo avela aza ireroa.'
  '43':
  - type: text
    content: 'Mampalahelo ianareo, ry Farisianina! Fa tianareo ny mipetraka eny aloha ao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ary ny arahabain’ny olona eny an-kianja. '
  '44':
  - type: text
    content: Mampalahelo ianareo, fa toy ny fasana tsy misy famantarana ka voahitsakitsaky ny olona tsy ampoiziny.
  '45':
  - type: text
    content: 'Niteny tamin’i Jesoa kosa ny anankiray amin’ny '
  - type: text
    content: mpahay lalàna
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: –Mpampianatra ô, izahay koa dia alànao baràka amin’izany teninao izany?
  '46':
  - type: text
    content: 'Fa hoy i Jesoa:'
  - type: text
    content: '–Mampalahelo koa ianareo, ry mpahay lalàna! Fa vesaranareo entan-tsy zaka ny olona, nefa na dia anankiray amin’ny rantsan-tananareo aza tsy akasikareo an’izany akory! '
  '47':
  - type: text
    content: 'Mampalahelo ianareo, fa anaovanareo rarivato ny fasan’ireo mpaminany izay novonoin’ny razanareo. '
  '48':
  - type: text
    content: 'Ny tenanareo ihany no vavolombelona manambara fa sitrakareo ny nataon’ny razanareo: ny razanareo moa namono, ianareo kosa manao rarivato. '
  '49':
  - type: text
    content: 'Izany no efa nitenenan’Andriamanitra araka ny fahendreny hoe: «Haniraka '
  - type: text
    content: mpaminany
  - type: text
    content: ' sy '
  - type: text
    content: apôstôly
  - type: text
    content: ' any aminy Aho: ka ny sasany amin’ireny hovonoiny ary ny sasany hoenjehiny.» '
  '5':
  - type: text
    content: 'Ary hoy indray i Jesoa tamin’ireto mpianany:'
  - type: text
    content: '–Aoka hataontsika hoe misy aminareo midodododo amin-kavana misasakalina ka mitaraina aminy hoe: «Rahavako ô, mba ampisambory mofo telo aho, '
  '50':
  - type: text
    content: 'Koa hanadinan’Andriamanitra ny olona ankehitriny ireo mpaminany rehetra izay nalatsa-dra hatramin’ny nahariana izao tontolo izao, '
  '51':
  - type: text
    content: 'nanomboka tamin’i Abela ka niafara tamin’i Zakarià ilay novonoina teo anelanelan’ny '
  - type: text
    content: alitara
  - type: text
    content: ' fisoronana sy ny '
  - type: text
    content: Toeramasina
  - type: note
    content: Jereo Gen 4.8; 2 Tan 24.20-22.
  - type: text
    content: '. Eny, hoy Aho aminareo, hanadinan’Andriamanitra ny olona ankehitriny avokoa izany. '
  '52':
  - type: text
    content: 'Mampalahelo ianareo, ry mpahay lalàna! Fa nalainareo ny fanalahidin’ny fahalalàna: ianareo moa tsy miditra ary izay te hiditra sakananareo.'
  '53':
  - type: text
    content: 'Nony niala teo i Jesoa, dia tezitra mafy ireo mpahay lalàna sy Farisianina; ary nanontaniany tamin’ny zavatra maro i Jesoa '
  '54':
  - type: text
    content: sady nofandrimpandrihany mba hitadiavany vava latsaka.
  '6':
  - type: text
    content: 'fa misy havako mivahiny vao tonga ao amiko nefa tsy manan-karoso azy aho!» '
  '7':
  - type: text
    content: 'Hamaly kosa angamba ny ao an-trano hanao hoe: «Aza sahiranina aho, fa ny varavarana efa mihidy ary izaho sy ny vady aman-janako efa samy am-pandriana, ka tsy afaka hifoha hanome mofo anao aho.» '
  '8':
  - type: text
    content: 'Lazaiko aminareo fa na tsy hifoha hanome mofo azy noho ny fihavanana aza ilay ao an-trano, dia hifoha ihany hanome izay rehetra ilainy mba tsy ho voatabataba tsy misy farany. '
  '9':
  - type: text
    content: 'Ka hoy Aho aminareo: mangataha, dia homena; mitadiava, dia hahita; dondòny, dia hovohana. '
