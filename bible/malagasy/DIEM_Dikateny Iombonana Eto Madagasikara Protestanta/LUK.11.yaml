document_id: LUK.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampianarin’i Jesoa hivavaka ny mpianany
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 6.9-13; 7.7-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nivavaka tao amin’ny toerana anankiray i Jesoa indray andro izay. Nony nitsahatra Izy, dia nilazan’ny anankiray tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpianany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tompo ô, mba ampianaro mivavaka izahay, toy ny nampianaran’i Jôhany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Jôhany '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mpanao batisa no tenenina eto.
    marker-yv: yv-n
  - type: text
    text: ' ny mpianany!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy i Jesoa taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Izao àry no atao rehefa mivavaka ianareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ray ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hohamasinina anie ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ho tonga anie ny Fanjakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Omeo anay isan’andro ny hanina sahaza anay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sahaza... anay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilainay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na koa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho an’ny rahampitso.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary avelao ny fahotanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia izany koa no amelanay izay rehetra meloka taminay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza avela ho azon’ny fakampanahy izahay.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy indray i Jesoa tamin’ireto mpianany:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Aoka hataontsika hoe misy aminareo midodododo amin-kavana misasakalina ka mitaraina aminy hoe: «Rahavako ô, mba ampisambory mofo telo aho, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa misy havako mivahiny vao tonga ao amiko nefa tsy manan-karoso azy aho!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hamaly kosa angamba ny ao an-trano hanao hoe: «Aza sahiranina aho, fa ny varavarana efa mihidy ary izaho sy ny vady aman-janako efa samy am-pandriana, ka tsy afaka hifoha hanome mofo anao aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lazaiko aminareo fa na tsy hifoha hanome mofo azy noho ny fihavanana aza ilay ao an-trano, dia hifoha ihany hanome izay rehetra ilainy mba tsy ho voatabataba tsy misy farany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka hoy Aho aminareo: mangataha, dia homena; mitadiava, dia hahita; dondòny, dia hovohana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izay rehetra mangataka no mahazo; izay mitady no mahita; ary izay mandondòna no hovohana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Araka ny hevitrareo, iza no raim-pianakaviana hangatahan-janany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aorian’ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hangatahan-janany,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' misy stf sasany manampy hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mofo ka hanome azy vato? na hangatahany...
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' Jereo Mt 7.9.'
    marker-yv: yv-n
  - type: text
    text: ' trondro ka tsy hanome azy trondro fa bibilava? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Na hangatahany atody ka hanome azy maingoka? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha ianareo, na dia ratsy aza, mahalala manome zava-tsoa ny zanakareo; tsy mainka ve ny Ray Izay any an-danitra no hanome ny Fanahy Masina an’izay mangataka aminy?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny avalin’i Jesoa ny fiampangana natao taminy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 12.22-30; Mk 3.22-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sendra nandroaka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: demony
  - type: text
    text: ' mampahamoana tamin’izay i Jesoa. Nony tafavoaka ilay demony, dia niteny ilay moana ka talanjona ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa nisy kosa niteny hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Fahefana avy amin’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Belzeboba
  - type: text
    text: ' filohan’ny demony ange no androahany ny demony e!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny sasany kosa te hamandrika an’i Jesoa, ary dia nangataka Azy hanao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' ho porofo fa hoe avy amin’Andriamanitra ny fahefàny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I Jesoa anefa nahalala ny tao am-pony ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ho rava izay fanjakana mifanao an-kolafiny ary hirodana tsy hisy tavela ny trano ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa raha mifanao an-kolafiny ry i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Satàna
  - type: text
    text: ', ahoana no mbola haharetan’ny fanjakany? Ianareo manko milaza hoe fahefana avy amin’i Belzeboba no androahako ny demony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha hoe fahefana avy amin’i Belzeboba tokoa no androahako ny demony, mba fahefana avy amin’iza kosa no androahan’ny mpomba anareo azy? Noho izany dia ireo mpomba anareo ihany no hanameloka anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha Izaho dia ny herin’Andriamanitra mihitsy no androahako ny demony ary miharihary amin’izany fa efa eto aminareo ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Fanjakàn’Andriamanitra
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha olona matanjaka sady tsara fiadiana no miambina ny tranony, dia voaaro ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha matanjaka noho izy kosa no tonga ka mandresy azy, dia io no haka ny fiadiana rehetra nitokiany ary handroba sy hizara ny fananany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia mampihahaka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitampody ny fanahy ratsy
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 12.43-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '–Rehefa miala amin’ny olona ny fanahy maloto, dia mivezika etsy mivezika eroa any an-tany karakaina, mitady toerana hialana sasatra kanefa tsy mahita! Amin’izany dia hoy izy hoe: «Hody any amin’ilay trano izay nialako ihany aho.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary iny tokoa izy miverina ka mahita ilay tranony teo aloha voafafa sy voalamina tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia lasa indray izy maka fanahy fito ratsy kokoa noho ny tenany ary miara-miditra ao izy rehetra ka miorim-ponenana. Ary ny toetra hiafaran’izany olona izany dia hahatsiravina kokoa noho ny toetrany voalohany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tena hasambarana marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nony avy nilaza izany i Jesoa, dia nisy vehivavy anankiray teo afovoan’ny vahoaka nanandra-peo nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Sambatra izay reny nitondra Anao tao an-kibony sy nampinono Anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Vao mainka sambatra aza ireo mihaino ny tenin’Andriamanitra ka mitandrina azy!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Angatahana famantarana i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 12.38-42; Mk 8.12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nihamaro hatrany kosa ny vahoaka tafangona ka niteny i Jesoa nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ratsy fanahy ny olona ankehitriny: mitady '
  - type: usfm
    marker: w
    children:
    - type: text
      text: famantarana
  - type: text
    text: ' nefa tsy homena famantarana afa-tsy ilay momba an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jônà mpaminany
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Famantarana ho an’ireo mponina tao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Ninive
  - type: text
    text: ' manko i Jônà'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jônà '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(and 29 sy 30): jereo Jônà 3.3-5. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ninive:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Mt 12.41 sy nta.'
    marker-yv: yv-n
  - type: text
    text: '; toy izany koa, ho famantarana ho an’ny olona ankehitriny ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zanak’olona
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ilay mpanjakavavy avy any atsimo ka hanameloka azy; fa niala avy any am-paran’ny tany izy hihaino ny fahendren’i Salômôna mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Mp 10.1-10.
    marker-yv: yv-n
  - type: text
    text: '! Indro anefa misy mihoatra noho i Salômôna eto! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Amin’ny andro fitsarana, dia hitsangana manoloana ny olona ankehitriny ireo mponina tao Ninive ka hanameloka azy; fa niala tamin’ny toe-dratsy ireo mponina tao Ninive nony nandre ny toritenin’i Jônà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Jônà 3.5,8,10.
    marker-yv: yv-n
  - type: text
    text: '! Indro anefa misy mihoatra noho i Jônà eto!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny maso no toy ny jiron’ny tena
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 5.15; 6.22-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: –Tsy misy mampirehitra jiro ka mametraka azy any amin’ny takona na manarona azy amin’ny vata famarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy stf sasany tsy ahitana ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na manarona azy amin’ny vata famarana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (jereo Mt 5.15; Mk 4.21).'
    marker-yv: yv-n
  - type: text
    text: '; fa eo ambony fitoeran-jiro no apetrany, hany ka izay miditra ao an-trano dia mahita ny hazavana. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny masonao no toy ny jiron’ny tenanao; raha mahiratra ny masonao, dia mazava koa ny tenanao manontolo; fa raha jamba kosa ny masonao, dia maizina koa ny tenanao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tandremo àry mba tsy hanjary haizina ilay hazavana ao aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Eny, raha tarafin’ny hazavana ny tenanao manontolo fa tsy misy ilany maizina, dia hazava tanteraka araka izany toy ny hazavain’ny jiro mamirapiratra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mampalahelo ireo Farisianina sy mpahay lalàna
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 23.1-36; Mk 12.38-40; Lk 20.45-47)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nony avy niteny i Jesoa, dia nasain’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Farisianina
  - type: text
    text: ' anankiray hisakafo any an-tranony. Nandroso i Jesoa ary nipetraka hihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Gaga ilay Farisianina nahita Azy tsy nisasa tanana talohan’ny sakafo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa hoy kosa ny Tompo taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ianareo Farisianina itony, diovinareo tsara ny etỳ ivelany hatramin’ny vohon’ny kaopy sy ny vilia; kanefa ny ao anatinareo feno halatra sy haratsiam-panahy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tsy misaina ianareo! Moa tsy ilay Andriamanitra nanao ny etỳ ivelany ve no nanao ny ao anatiny koa? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Manaova asa fiantrana araka izay anananareo, dia hadio aminareo ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Mampalahelo ianareo, ry Farisianina! Fa voaloanareo ho an’Andriamanitra ny ampahafolon’ny solila sy ny veromanitra mbamin’ny anana famboly isan-karazany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Lev 27.30; Deot 14.22.
    marker-yv: yv-n
  - type: text
    text: ', nefa ataonareo tsirambina ny rariny sy ny fitiavana an’Andriamanitra; ireto indrindra no tsy maintsy tontosaina, na tsy azo avela aza ireroa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Mampalahelo ianareo, ry Farisianina! Fa tianareo ny mipetraka eny aloha ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sinagôga
  - type: text
    text: ' ary ny arahabain’ny olona eny an-kianja. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Mampalahelo ianareo, fa toy ny fasana tsy misy famantarana ka voahitsakitsaky ny olona tsy ampoiziny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Niteny tamin’i Jesoa kosa ny anankiray amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpahay lalàna
  - type: text
    text: ' nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, izahay koa dia alànao baràka amin’izany teninao izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa hoy i Jesoa:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mampalahelo koa ianareo, ry mpahay lalàna! Fa vesaranareo entan-tsy zaka ny olona, nefa na dia anankiray amin’ny rantsan-tananareo aza tsy akasikareo an’izany akory! '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Mampalahelo ianareo, fa anaovanareo rarivato ny fasan’ireo mpaminany izay novonoin’ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ny tenanareo ihany no vavolombelona manambara fa sitrakareo ny nataon’ny razanareo: ny razanareo moa namono, ianareo kosa manao rarivato. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Izany no efa nitenenan’Andriamanitra araka ny fahendreny hoe: «Haniraka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' sy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôstôly
  - type: text
    text: ' any aminy Aho: ka ny sasany amin’ireny hovonoiny ary ny sasany hoenjehiny.» '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Koa hanadinan’Andriamanitra ny olona ankehitriny ireo mpaminany rehetra izay nalatsa-dra hatramin’ny nahariana izao tontolo izao, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'nanomboka tamin’i Abela ka niafara tamin’i Zakarià ilay novonoina teo anelanelan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: alitara
  - type: text
    text: ' fisoronana sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Toeramasina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Gen 4.8; 2 Tan 24.20-22.
    marker-yv: yv-n
  - type: text
    text: '. Eny, hoy Aho aminareo, hanadinan’Andriamanitra ny olona ankehitriny avokoa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Mampalahelo ianareo, ry mpahay lalàna! Fa nalainareo ny fanalahidin’ny fahalalàna: ianareo moa tsy miditra ary izay te hiditra sakananareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Nony niala teo i Jesoa, dia tezitra mafy ireo mpahay lalàna sy Farisianina; ary nanontaniany tamin’ny zavatra maro i Jesoa '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: sady nofandrimpandrihany mba hitadiavany vava latsaka.
