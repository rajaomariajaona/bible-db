document_id: 2CH.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanjakàn’i Jôsafata
  - type: heading
    content: Ny firaiketam-pony tamin’Andriamanitra
  - type: text
    content: 'I Jôsafata, zanakalahin’i Asà, no nanjaka nandimby azy; ary nitombo hery teo anoloan’ny fanjakàn’i '
  - type: text
    content: Israely
  - type: text
    content: ' izy'
  - type: note
    content: 'nitombo... izy: araka izany ny hoe Israely dia ny fanjakana avaratra miavaka amin’ny fanjakàn’i Joda. Kanefa azo adika hoe nanamafy ny fahefàny tamin’i Israely izy: amin’izay ny hoe Israely dia ny fanjakàn’i Joda mihitsy satria heverin’ilay mpanoratra ny 1 sy 2 Tantara fa ny fanjakàn’i Joda no hany tena vahoaka Israely ka izany rahateo no iantsoany azy imbetsaka hoe Israely.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Nahazo ny fanjakana rehetra tamin’ny tany manodidina an’i Joda ny tahotra ny TOMPO, hany ka tsy nisy sahy niady tamin’i Jôsafata ireo. '
  '11':
  - type: text
    content: Nisy aza Filistinina sasany nitondra fanomezana sy volafotsy hetra ho an’i Jôsafata; ary nisy koa Arabo nitondra ondry aman’osy, dia ondrilahy 7 700 sy osilahy 7 700.
  '12':
  - type: text
    content: 'Nandroso hery hatrany i Jôsafata ka nanao manda fiarovana sy tanàna fitahirizam-bokatra manerana an’i Joda. '
  '13':
  - type: text
    content: 'Nanana tahirim-bokatra betsaka tao amin’ny tanànan’i Joda izy, ary koa miaramila maherifo tao Jerosalema. '
  '14':
  - type: text
    content: 'Nalamina araka ny fianakaviany avy ireo, ka ny mpifehy vondro-miaramila avy tamin’ny fokon’i Joda dia ireto: i Hadnà no mpifehy lehilahy maherifo nisy andiany telonjato; '
  '15':
  - type: text
    content: 'nanarakaraka azy dia i Jôhanàna mpifehy lehilahy maherifo nisy andiany 280; '
  '16':
  - type: text
    content: 'ary nanarakaraka azy indray dia i Hamasià, zanakalahin’i Zikry sady nanolo-tena an-tsitrapo ho an’ny TOMPO, mpifehy lehilahy maherifo nisy andiany roanjato. '
  '17':
  - type: text
    content: 'Ny mpifehy vondro-miaramila avy tamin’ny fokon’i Benjamîna kosa dia ireto: i Eliadà, lehilahy maherifo, no mpifehy miaramila nisy andiany roanjato samy mpirongo tsipîka sy ampinga; '
  '18':
  - type: text
    content: 'ary nanarakaraka azy dia i Jôzabada, izay mpifehy miaramila nisy andiany 180 samy ary fiadiana. '
  '19':
  - type: text
    content: Ireo no vondro-miaramila nivonon-kanompo ny mpanjaka, ankoatra izay napetrany tany amin’ny tanànamimanda rehetra eran’i Joda manontolo.
  '2':
  - type: text
    content: 'Nametrahany miaramila tamin’ny tanànamimanda rehetra eran’i Joda ary koa toby miaramila tao amin’ny tanin’i Joda sy tamin’ireo tanàna efraimita efa azon’i Asà rainy. '
  '3':
  - type: text
    content: 'Niaraka tamin’i Jôsafata ny TOMPO, satria nanaraka ny toetran’i Davida razany fahiny izy fa tsy mba nitady ireo andriamanitra '
  - type: text
    content: Bahala
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Nitady ny Andriamanitry ny razany kosa izy, ka nizotra araka ny didiny fa tsy araka ny fanaon’ny Israelita tavaratra. '
  '5':
  - type: text
    content: 'Koa nohamafisin’ny TOMPO ny fahefàm-panjakana teo an-tanany; ary dia nitondra fanomezana ho an’i Jôsafata ny Jodeanina rehetra, hany ka nanan-karena sy voninahitra be izy. '
  '6':
  - type: text
    content: 'Nandroso tamin’ny sori-dalan’ny TOMPO tokoa ny fony, hany ka nofoanany tsy ho eo amin’ny fanjakàn’i Joda ny '
  - type: text
    content: toeram-panasinana
  - type: text
    content: ' sy ny tsatokazo fanajana an’i '
  - type: text
    content: Aserà
  - type: text
    content: .
  '7':
  - type: text
    content: 'Tamin’ny taona fahatelo nanjakàn’i Jôsafata dia nisy manampahefana nirahiny mba hampianatra tany amin’ny tanànan’i Joda, dia i Beny-Haîla sy i Hôbadià, i Zakarià sy i Natanaela ary i Mikaià. '
  '8':
  - type: text
    content: 'Nisy koa '
  - type: text
    content: levita
  - type: text
    content: ' niaraka tamin’ireo, dia i Semahià sy i Netanià, i Zebadià sy i Hasahela, i Semiramôta sy i Jônatàna ary i Adônià sy i Tôbià; ary tafaraka taminy koa i Elisamà sy i Jôrama '
  - type: text
    content: mpisorona
  - type: text
    content: '. '
  '9':
  - type: text
    content: Nampianatra eran’i Joda ireo; fa sady nitondra ny bokin’ny lalànan’ny TOMPO izy no nitety ny tanàna rehetra tany Joda, ka nampianatra ny olona.
  - type: heading
    content: Ny hery amam-pahefàn’i Jôsafata
