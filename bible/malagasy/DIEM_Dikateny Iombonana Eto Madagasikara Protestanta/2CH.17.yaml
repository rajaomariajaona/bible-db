document_id: 2CH.17
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Fanjakàn’i Jôsafata
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny firaiketam-pony tamin’Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I Jôsafata, zanakalahin’i Asà, no nanjaka nandimby azy; ary nitombo hery teo anoloan’ny fanjakàn’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israely
  - type: text
    text: ' izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nitombo... izy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka izany ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ny fanjakana avaratra miavaka amin’ny fanjakàn’i Joda. Kanefa azo adika hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'nanamafy ny fahefàny tamin’i Israely izy:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' amin’izay ny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ny fanjakàn’i Joda mihitsy satria heverin’ilay mpanoratra ny 1 sy 2 Tantara fa ny fanjakàn’i Joda no hany tena vahoaka Israely ka izany rahateo no iantsoany azy imbetsaka hoe Israely.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nametrahany miaramila tamin’ny tanànamimanda rehetra eran’i Joda ary koa toby miaramila tao amin’ny tanin’i Joda sy tamin’ireo tanàna efraimita efa azon’i Asà rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Niaraka tamin’i Jôsafata ny TOMPO, satria nanaraka ny toetran’i Davida razany fahiny izy fa tsy mba nitady ireo andriamanitra '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bahala
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nitady ny Andriamanitry ny razany kosa izy, ka nizotra araka ny didiny fa tsy araka ny fanaon’ny Israelita tavaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa nohamafisin’ny TOMPO ny fahefàm-panjakana teo an-tanany; ary dia nitondra fanomezana ho an’i Jôsafata ny Jodeanina rehetra, hany ka nanan-karena sy voninahitra be izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nandroso tamin’ny sori-dalan’ny TOMPO tokoa ny fony, hany ka nofoanany tsy ho eo amin’ny fanjakàn’i Joda ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toeram-panasinana
  - type: text
    text: ' sy ny tsatokazo fanajana an’i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Aserà
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin’ny taona fahatelo nanjakàn’i Jôsafata dia nisy manampahefana nirahiny mba hampianatra tany amin’ny tanànan’i Joda, dia i Beny-Haîla sy i Hôbadià, i Zakarià sy i Natanaela ary i Mikaià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nisy koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' niaraka tamin’ireo, dia i Semahià sy i Netanià, i Zebadià sy i Hasahela, i Semiramôta sy i Jônatàna ary i Adônià sy i Tôbià; ary tafaraka taminy koa i Elisamà sy i Jôrama '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nampianatra eran’i Joda ireo; fa sady nitondra ny bokin’ny lalànan’ny TOMPO izy no nitety ny tanàna rehetra tany Joda, ka nampianatra ny olona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hery amam-pahefàn’i Jôsafata
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahazo ny fanjakana rehetra tamin’ny tany manodidina an’i Joda ny tahotra ny TOMPO, hany ka tsy nisy sahy niady tamin’i Jôsafata ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nisy aza Filistinina sasany nitondra fanomezana sy volafotsy hetra ho an’i Jôsafata; ary nisy koa Arabo nitondra ondry aman’osy, dia ondrilahy 7 700 sy osilahy 7 700.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nandroso hery hatrany i Jôsafata ka nanao manda fiarovana sy tanàna fitahirizam-bokatra manerana an’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nanana tahirim-bokatra betsaka tao amin’ny tanànan’i Joda izy, ary koa miaramila maherifo tao Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nalamina araka ny fianakaviany avy ireo, ka ny mpifehy vondro-miaramila avy tamin’ny fokon’i Joda dia ireto: i Hadnà no mpifehy lehilahy maherifo nisy andiany telonjato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nanarakaraka azy dia i Jôhanàna mpifehy lehilahy maherifo nisy andiany 280; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary nanarakaraka azy indray dia i Hamasià, zanakalahin’i Zikry sady nanolo-tena an-tsitrapo ho an’ny TOMPO, mpifehy lehilahy maherifo nisy andiany roanjato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny mpifehy vondro-miaramila avy tamin’ny fokon’i Benjamîna kosa dia ireto: i Eliadà, lehilahy maherifo, no mpifehy miaramila nisy andiany roanjato samy mpirongo tsipîka sy ampinga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nanarakaraka azy dia i Jôzabada, izay mpifehy miaramila nisy andiany 180 samy ary fiadiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo no vondro-miaramila nivonon-kanompo ny mpanjaka, ankoatra izay napetrany tany amin’ny tanànamimanda rehetra eran’i Joda manontolo.
