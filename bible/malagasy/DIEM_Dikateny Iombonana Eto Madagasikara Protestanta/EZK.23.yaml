document_id: EZK.23,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Nijangajanga i Samaria
  - type: text
    content: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  '10':
  - type: text
    content: Koa naboridany tanteraka izy
  - type: note
    content: 'naboridany tanteraka izy: filazana an-kolaka ny fandrobana an’i Samaria tamin’ny 722-721 tal J.K. sy ny fanaovana sesitany ny mponina tao aminy, jereo 16.37; 2 Mp 17.6; Hôs 2.5.'
  - type: text
    content: ', ary novonoiny ho faty tamin’ny sabatra; fa ny zanany lahy sy vavy kosa nentiny. Niharan’ny famaizana izy mba hatao ohatra ho an’ny vehivavy hafa.»'
  - type: heading
    content: Nijangajanga i Jerosalema
  '11':
  - type: text
    content: '«Nahita izany i Ôhôlibà rahavaviny, kanefa vao mainka ratsy kokoa noho i Ôhôlà izy tamin’ny fahamaimaizany, ary dia nijangajanga manoatra azy. '
  '12':
  - type: text
    content: 'Fa nahamaimay azy koa ireo asirianina mpifanila aminy, dia ireo governora sy mpitsara mareva-pitafiana sady kinga fitaingin-tsoavaly; samy tovolahy bikàna izy rehetra. '
  '13':
  - type: text
    content: 'Ary nandoto tena tamin’izany koa izy; eny, hitako fa nitovy fitondrantena izy mirahavavy. '
  '14':
  - type: text
    content: 'Kanefa lasa lavitra kokoa i Ôhôlibà tamin’ny fanaranam-po. Indray andro izy dia nahita sarin-dehilahy voaloko mena teo amin’ny rindrina, dia sary nampiseho ny Babilônianina. '
  '15':
  - type: text
    content: 'Samy nisy fehikibo teny an-tehezany ary fehiloha misoratsoratra teny an-dohany. Hoatry ny mpiady mahery no fijery azy; ary ny bikabikan’izy rehetra dia tahaka ireo Babilônianina miaina any Kaldea izay tany nahaterahany. '
  '16':
  - type: text
    content: Maimay tamin’ny Babilônianina i Ôhôlibà raha vao nahita ny sary ka nandefa iraka tany amin’ny taniny
  - type: note
    content: 'nandefa iraka: mety ho filazana an-kolaka ny fifandraisana nisy teo amin’i Hezekià sy Merodaky Baladàna, jereo 2 Mp 20.12-19; Is 39.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Koa tonga mba handry aminy ireo Babilônianina ary nandoto azy tamin’ny fanaranam-pijangajanganay; saingy nony efa voalotony kosa i Ôhôlibà, dia naharikoriko azy. '
  '18':
  - type: text
    content: 'Niseho ampahibemaso ho vehivavy janga izy ary nampiseho ny fitanjahany; ka narikoriko azy aho tahaka izay namparikoriko ahy tamin’ny rahavaviny. '
  '19':
  - type: text
    content: 'Kanefa vao mainka nijangajanga kokoa aza izy ka nahatsiaro ny androm-pahatanorana izay nijangajangany tany Ejipta. '
  '2':
  - type: text
    content: «Ry ilay taranak’olombelona, nisy vehivavy roa mirahavavy iray tampo
  - type: note
    content: 'iray tampo: jereo 16.3, 44-46.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: Fa maimay tamin’ireo lehilahiny izy, dia lehilahy mitrifana sy mitroatra toa boriky na soavaly miandra vavy.»
  - type: heading
    content: Ny famaizana an’i Jerosalema
  '21':
  - type: text
    content: '«Niverina nijangajanga indray ianao, ry Ôhôlibà, ka nanao toy ny tamin’ny fahatanoranao, fony ireo Ejiptianina nisafosafo ny tratranao sy nitsapatsapa ny nononao somondrara. '
  '22':
  - type: text
    content: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Indro hotairiko hamely anao ireo lehilahinao. Ankehitriny efa namparikoriko anao izy, ka hoentiko avy any amin’ny manodidina mba hamely anao. '
  '23':
  - type: text
    content: Hotaomiko hikomy aminao avokoa ny mponin’i Babilôna sy ny Kaldeanina rehetra, ny mponina ao Pekôda sy Sôha ary Kôha
  - type: note
    content: Pekôda dia foko aramianina iray tany atsinanan’i Babilônia (jereo Jer 20.21). Sôha sy Kôha dia mety ho foko aramianina roa hafa amin’iny faritra iny ihany.
  - type: text
    content: ' mbamin’ny Asirianina rehetra: Tovolahy bikàna izy rehetra, dia governora sy mpitsara, mpiady voafantina sy olo-manan-kaja, samy kinga fitaingin-tsoavaly. '
  '24':
  - type: text
    content: Ho tonga avy any avaratra izy, miaraka amin’ny kalesy sy fitaovana isan-karazany ary koa tafika goavana hamelezana anao. Hanemitra anao izy, mitondra ampinga lehibe sy kely ary fiarovan-doha; hoentiko eo anatrehany ny raharahanao ary hotsarainy araka ny fitsipiny ianao
  - type: note
    content: 'avy any avaratra: araka ny dkt tranainy grika izany. –araka ny fitsipiny: i Jerosalema sy i Samaria dia tsy ho voaaron’ny lalànany intsony; nefa raha ny tokony ho izy, izay meloka dia tsaraina araka ny fitsipiky ny taniny.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Noho ny fahatezerako aminao dia havelako hanao herisetra aminao ireo: hotapahiny ny oronao sy ny sofinao ary hovonoiny ho faty amin’ny sabatra ianao. Halainy ho babo ny zanakao lahy sy ny vavy fa holevonin’ny afo kosa ireo olona sisa tavela aminao. '
  '26':
  - type: text
    content: 'Horobainy ny fitafianao sy ny firavaka fihaingoanao. '
  '27':
  - type: text
    content: Hatsahatro ny filibànao amam-pijangajangana izay natombokao tany Ejipta. Tsy hangata-maso olona intsony ianao ary tsy hahatsiaro ny Ejiptianina intsony.›
  '28':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Indro hatolotro eo an-tanan’ireo halanao ianao, dia ireo namparikoriko anao. '
  '29':
  - type: text
    content: 'Hamely anao amim-pankahalana izy ka haka ny vokatry ny asanao. Havelany hitanjaka sy hiboridana ianao ary hiharihary eo imason’ny rehetra toy ny vehivavy janga. Ny filibànao sy ny fanaranam-batanao '
  '3':
  - type: text
    content: 'Fony mbola tanora izy, dia efa lasa vehivavy janga tany Ejipta izay nonenany. Tany no nisafosafoana ny tratrany sy nitsapatsapana ny nonony somondrara. '
  '30':
  - type: text
    content: 'no nahatonga anao toy izany. Nijangajanga tamin’ireo lehilahin’ny tany hafa ianao ary nandoto tena tamin’ny fanompoana ireo sampiny. '
  '31':
  - type: text
    content: Nanaraka ny lalana nalehan’ny rahavavinao ianao; ka dia hampisotroiko amin’ny tsatokatim-pahatezerako tahaka azy
  - type: note
    content: 'ny tsatokatim-pahatezerako: jereo Is 51.17,22; Jer 25.15-17,28; 49.12.'
  - type: text
    content: .›
  '32':
  - type: text
    content: '«Izao no lazain’ny Tompo ANDRIANANAHARY aminao:'
  - type: text
    content: ‹Ny tsatokaty hisotroanao
  - type: text
    content: dia mitovy amin’ny an-drahavavinao,
  - type: text
    content: dia tsatokaty lehibe sady lalina.
  - type: text
    content: Hihomehezana sy hoesoina ianao
  - type: text
    content: noho ny tsatokatinao feno mihatihaty.
  '33':
  - type: text
    content: Hahatonga anao ho leom-pahoriana
  - type: text
    content: io tsatokatin’ny tahotra amam-pijaliana io,
  - type: text
    content: izay efa nisotroan’i Samaria rahavavinao.
  '34':
  - type: text
    content: Hosotroinao hatramin’ny farany izy
  - type: text
    content: ary hovakînao amin’ny nifinao;
  - type: text
    content: ka ny vakivakiny no handratranao ny nononao
  - type: text
    content: Izaho no manambara izany,
  - type: text
    content: hoy ny teny hentitra avy amiko Tompo ANDRIANANAHARY.›
  '35':
  - type: text
    content: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: ‹Satria nanadino Ahy ianao ka niodina tamiko, dia hizaka ny vokatry ny filibàna amam-pijangajanganao›. »'
  - type: heading
    content: Melohin’ny Tompo i Samaria sy i Jerosalema
  '36':
  - type: text
    content: 'Ary hoy ny TOMPO tamiko: «Ry ilay taranak’olombelona, miomàna hitsara an’i Ôhôlà sy i Ôhôlibà. Vakio bantsilana ireo asany maharikoriko. '
  '37':
  - type: text
    content: Fa vehivavy mpanitsakitsa-bady sy mpamono olona ireo. Nanitsakitsa-bady tamin’ny fanompoan-tsampy
  - type: note
    content: Ny fakam-badin’olona sy ny fijangajangana dia matetika sary fampisehoana ny fanompoan-tsampy, jereo and 2.10; 16.17; Hôs 3.1-5.
  - type: text
    content: ' izy sy namono olona ho faty tamin’ny nanaovany sorona ny zanany lahy izay efa naterany ho Ahy. '
  '38':
  - type: text
    content: 'Sady izao koa no nataony tamiko: Andro iray ihany no nandotoany ny '
  - type: text
    content: toerako masina
  - type: text
    content: ' sady nanimbazimbany ny '
  - type: text
    content: sabatako
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Fa ny andro nanaovany '
  - type: text
    content: sorona
  - type: text
    content: ' ny zanany lahy tamin’ny sampiny iny ihany no nidirany tao amin’ny toerako masina, teo anivon’ny tranoko, ka nandotoany azy. '
  '4':
  - type: text
    content: I Ôhôlà no anaran’ny zokiny ary i Ôhôliba no anaran’ny zandriny
  - type: note
    content: Ôhôlà sy Ôhôlibà dia mety ho anarana mifono hevi-miafina saingy tsy fantatsika intsony ankehitriny ny heviny.
  - type: text
    content: '. Ny voalohany dia manondro an’i Samaria fa ity faharoa kosa manondro an’i Jerosalema. Samy nalaiko ho vady izy roa, ary niteraka zanakalahy sy zanakavavy ho ahy. '
  '40':
  - type: text
    content: 'Ankoatra izany, nandefa iraka hanasa lehilahy avy any an-tany lavitra izy. Raha vao naharay hafatra ireny, dia nirohotra ho atỳ amin’i Ôhôlà sy i Ôhôlibà izay samy efa nandro sy nandoko maso ary nametaka firavaka rahateo. '
  '41':
  - type: text
    content: 'Dia nipetraka tamina farafara mirenty izy roa vavy, ary namelatra latabatra nametrahany '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' mifangaro sy ilomanitra izay samy avy amiko. '
  '42':
  - type: text
    content: 'Marobe ny olona tonga tao aminy, ka re tao ny kotaban’olona tsy manana ahiahy. Tonga tao koa ireo lehilahy avy amin’ireo toerana rehetra any an-taniefitra, ary nametaka haba teny amin’ny hato-tanan’izy mirahavavy sy nametraka satroboninahitra mahafinaritra teny an-dohany. '
  '43':
  - type: text
    content: 'Dia hoy Aho anakampo: ‹Na dia izay efa tontan’ny fanitsakitsaham-bady hatry ny ela aza, dia mbola mirotsaka hijangajanga ihany ankehitriny!› '
  '44':
  - type: text
    content: 'Misy lehilahy mankao aminy toy ny ankanesana amin’ny vehivavy mpivarotena. Toy izany no ankanesany tao amin’i Ôhôlà sy i Ôhôlibà izay vehivavy janga! '
  '45':
  - type: text
    content: Fa hisy kosa lehilahy marina hanameloka ireo vehivavy roa ireo ho mpanitsakitsa-bady sy mpamono olona, satria mpanitsakitsa-bady tokoa izy sady misy ra eny an-tanany.
  '46':
  - type: text
    content: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: ‹Anaingao famoriam-bahoaka hanafay azy roa, ary aoka hatolotra hampihorohoroina sy horobaina izy. '
  '47':
  - type: text
    content: 'Torahy vato izy ary tetiteteho amin’ny sabatra, vonoy ho faty ny zanany lahy sy vavy ary doroy ny tranony. '
  '48':
  - type: text
    content: 'Hatsahatro ny filibàna mihanaka eo amin’ity tany ity. Hahazo fampitandremana ny vehivavy rehetra ka tsy hanahaka ny filibàn’izy roa vavy intsony. '
  '49':
  - type: text
    content: Fa hovaliana aminy kosa ny filibàny ary hozakainy ny vokatry ny fanompoan-tsampiny. Amin’izay dia hoekenareo fa Izaho no Tompo ANDRIANANAHARY›. »
  '5':
  - type: text
    content: 'Kinanjo nijangajanga i Ôhôlà na dia efa Ahy aza. Maimay izy tamin’ireo lehilahy sakaizany, dia ny Asirianina '
  '6':
  - type: text
    content: 'izay niakanjo jaky avokoa noho ny maha governora sy mpitsara azy, sady tovolahy bikàna sy kinga fitaingin-tsoavaly. '
  '7':
  - type: text
    content: 'I Ôhôlà dia nanome tombony manokana ireo manampahefana asirianina ireo, ka tamin’izay naha maimay azy dia nandoto tena tamin’ny fanompoana ny sampiny rehetra izy. '
  '8':
  - type: text
    content: 'Notohizany ny fiainam-pijangajangana efa nataony tany Ejipta. Fa tany, fony mbola tanora izy, dia nisy lehilahy nandry taminy sy nitsapatsapa ny nonony somondrara ka nanaram-po nijangajanga taminy. '
  '9':
  - type: text
    content: 'Noho izany dia navelako ho eo an-tanan’ny Asirianina sakaizany izay nahamaimay azy izy. '
