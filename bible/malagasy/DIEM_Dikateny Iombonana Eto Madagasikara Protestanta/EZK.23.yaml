document_id: EZK.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nijangajanga i Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy tenin’ny TOMPO tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ry ilay taranak’olombelona, nisy vehivavy roa mirahavavy iray tampo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'iray tampo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 16.3, 44-46.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fony mbola tanora izy, dia efa lasa vehivavy janga tany Ejipta izay nonenany. Tany no nisafosafoana ny tratrany sy nitsapatsapana ny nonony somondrara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I Ôhôlà no anaran’ny zokiny ary i Ôhôliba no anaran’ny zandriny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ôhôlà sy Ôhôlibà dia mety ho anarana mifono hevi-miafina saingy tsy fantatsika intsony ankehitriny ny heviny.
    marker-yv: yv-n
  - type: text
    text: '. Ny voalohany dia manondro an’i Samaria fa ity faharoa kosa manondro an’i Jerosalema. Samy nalaiko ho vady izy roa, ary niteraka zanakalahy sy zanakavavy ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kinanjo nijangajanga i Ôhôlà na dia efa Ahy aza. Maimay izy tamin’ireo lehilahy sakaizany, dia ny Asirianina '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay niakanjo jaky avokoa noho ny maha governora sy mpitsara azy, sady tovolahy bikàna sy kinga fitaingin-tsoavaly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I Ôhôlà dia nanome tombony manokana ireo manampahefana asirianina ireo, ka tamin’izay naha maimay azy dia nandoto tena tamin’ny fanompoana ny sampiny rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Notohizany ny fiainam-pijangajangana efa nataony tany Ejipta. Fa tany, fony mbola tanora izy, dia nisy lehilahy nandry taminy sy nitsapatsapa ny nonony somondrara ka nanaram-po nijangajanga taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noho izany dia navelako ho eo an-tanan’ny Asirianina sakaizany izay nahamaimay azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa naboridany tanteraka izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'naboridany tanteraka izy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: filazana an-kolaka ny fandrobana an’i Samaria tamin’ny 722-721 tal J.K. sy ny fanaovana sesitany ny mponina tao aminy, jereo 16.37; 2 Mp 17.6; Hôs 2.5.
    marker-yv: yv-n
  - type: text
    text: ', ary novonoiny ho faty tamin’ny sabatra; fa ny zanany lahy sy vavy kosa nentiny. Niharan’ny famaizana izy mba hatao ohatra ho an’ny vehivavy hafa.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nijangajanga i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Nahita izany i Ôhôlibà rahavaviny, kanefa vao mainka ratsy kokoa noho i Ôhôlà izy tamin’ny fahamaimaizany, ary dia nijangajanga manoatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa nahamaimay azy koa ireo asirianina mpifanila aminy, dia ireo governora sy mpitsara mareva-pitafiana sady kinga fitaingin-tsoavaly; samy tovolahy bikàna izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nandoto tena tamin’izany koa izy; eny, hitako fa nitovy fitondrantena izy mirahavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa lasa lavitra kokoa i Ôhôlibà tamin’ny fanaranam-po. Indray andro izy dia nahita sarin-dehilahy voaloko mena teo amin’ny rindrina, dia sary nampiseho ny Babilônianina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samy nisy fehikibo teny an-tehezany ary fehiloha misoratsoratra teny an-dohany. Hoatry ny mpiady mahery no fijery azy; ary ny bikabikan’izy rehetra dia tahaka ireo Babilônianina miaina any Kaldea izay tany nahaterahany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maimay tamin’ny Babilônianina i Ôhôlibà raha vao nahita ny sary ka nandefa iraka tany amin’ny taniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'nandefa iraka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mety ho filazana an-kolaka ny fifandraisana nisy teo amin’i Hezekià sy Merodaky Baladàna, jereo 2 Mp 20.12-19; Is 39.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa tonga mba handry aminy ireo Babilônianina ary nandoto azy tamin’ny fanaranam-pijangajanganay; saingy nony efa voalotony kosa i Ôhôlibà, dia naharikoriko azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Niseho ampahibemaso ho vehivavy janga izy ary nampiseho ny fitanjahany; ka narikoriko azy aho tahaka izay namparikoriko ahy tamin’ny rahavaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa vao mainka nijangajanga kokoa aza izy ka nahatsiaro ny androm-pahatanorana izay nijangajangany tany Ejipta. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa maimay tamin’ireo lehilahiny izy, dia lehilahy mitrifana sy mitroatra toa boriky na soavaly miandra vavy.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famaizana an’i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Niverina nijangajanga indray ianao, ry Ôhôlibà, ka nanao toy ny tamin’ny fahatanoranao, fony ireo Ejiptianina nisafosafo ny tratranao sy nitsapatsapa ny nononao somondrara. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa izao no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Indro hotairiko hamely anao ireo lehilahinao. Ankehitriny efa namparikoriko anao izy, ka hoentiko avy any amin’ny manodidina mba hamely anao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hotaomiko hikomy aminao avokoa ny mponin’i Babilôna sy ny Kaldeanina rehetra, ny mponina ao Pekôda sy Sôha ary Kôha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Pekôda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia foko aramianina iray tany atsinanan’i Babilônia (jereo Jer 20.21). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sôha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' sy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kôha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia mety ho foko aramianina roa hafa amin’iny faritra iny ihany.'
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny Asirianina rehetra: Tovolahy bikàna izy rehetra, dia governora sy mpitsara, mpiady voafantina sy olo-manan-kaja, samy kinga fitaingin-tsoavaly. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ho tonga avy any avaratra izy, miaraka amin’ny kalesy sy fitaovana isan-karazany ary koa tafika goavana hamelezana anao. Hanemitra anao izy, mitondra ampinga lehibe sy kely ary fiarovan-doha; hoentiko eo anatrehany ny raharahanao ary hotsarainy araka ny fitsipiny ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'avy any avaratra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny dkt tranainy grika izany. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'araka ny fitsipiny:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' i Jerosalema sy i Samaria dia tsy ho voaaron’ny lalànany intsony; nefa raha ny tokony ho izy, izay meloka dia tsaraina araka ny fitsipiky ny taniny.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Noho ny fahatezerako aminao dia havelako hanao herisetra aminao ireo: hotapahiny ny oronao sy ny sofinao ary hovonoiny ho faty amin’ny sabatra ianao. Halainy ho babo ny zanakao lahy sy ny vavy fa holevonin’ny afo kosa ireo olona sisa tavela aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Horobainy ny fitafianao sy ny firavaka fihaingoanao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hatsahatro ny filibànao amam-pijangajangana izay natombokao tany Ejipta. Tsy hangata-maso olona intsony ianao ary tsy hahatsiaro ny Ejiptianina intsony.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY aminao: ‹Indro hatolotro eo an-tanan’ireo halanao ianao, dia ireo namparikoriko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hamely anao amim-pankahalana izy ka haka ny vokatry ny asanao. Havelany hitanjaka sy hiboridana ianao ary hiharihary eo imason’ny rehetra toy ny vehivavy janga. Ny filibànao sy ny fanaranam-batanao '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'no nahatonga anao toy izany. Nijangajanga tamin’ireo lehilahin’ny tany hafa ianao ary nandoto tena tamin’ny fanompoana ireo sampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nanaraka ny lalana nalehan’ny rahavavinao ianao; ka dia hampisotroiko amin’ny tsatokatim-pahatezerako tahaka azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny tsatokatim-pahatezerako: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Is 51.17,22; Jer 25.15-17,28; 49.12.
    marker-yv: yv-n
  - type: text
    text: .›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Izao no lazain’ny Tompo ANDRIANANAHARY aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‹Ny tsatokaty hisotroanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia mitovy amin’ny an-drahavavinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia tsatokaty lehibe sady lalina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihomehezana sy hoesoina ianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: noho ny tsatokatinao feno mihatihaty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Hahatonga anao ho leom-pahoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: io tsatokatin’ny tahotra amam-pijaliana io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay efa nisotroan’i Samaria rahavavinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Hosotroinao hatramin’ny farany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary hovakînao amin’ny nifinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka ny vakivakiny no handratranao ny nononao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no manambara izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hoy ny teny hentitra avy amiko Tompo ANDRIANANAHARY.›
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: ‹Satria nanadino Ahy ianao ka niodina tamiko, dia hizaka ny vokatry ny filibàna amam-pijangajanganao›. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melohin’ny Tompo i Samaria sy i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy ny TOMPO tamiko: «Ry ilay taranak’olombelona, miomàna hitsara an’i Ôhôlà sy i Ôhôlibà. Vakio bantsilana ireo asany maharikoriko. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa vehivavy mpanitsakitsa-bady sy mpamono olona ireo. Nanitsakitsa-bady tamin’ny fanompoan-tsampy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fakam-badin’olona sy ny fijangajangana dia matetika sary fampisehoana ny fanompoan-tsampy, jereo and 2.10; 16.17; Hôs 3.1-5.
    marker-yv: yv-n
  - type: text
    text: ' izy sy namono olona ho faty tamin’ny nanaovany sorona ny zanany lahy izay efa naterany ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Sady izao koa no nataony tamiko: Andro iray ihany no nandotoany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: toerako masina
  - type: text
    text: ' sady nanimbazimbany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabatako
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa ny andro nanaovany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' ny zanany lahy tamin’ny sampiny iny ihany no nidirany tao amin’ny toerako masina, teo anivon’ny tranoko, ka nandotoany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ankoatra izany, nandefa iraka hanasa lehilahy avy any an-tany lavitra izy. Raha vao naharay hafatra ireny, dia nirohotra ho atỳ amin’i Ôhôlà sy i Ôhôlibà izay samy efa nandro sy nandoko maso ary nametaka firavaka rahateo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia nipetraka tamina farafara mirenty izy roa vavy, ary namelatra latabatra nametrahany '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' mifangaro sy ilomanitra izay samy avy amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Marobe ny olona tonga tao aminy, ka re tao ny kotaban’olona tsy manana ahiahy. Tonga tao koa ireo lehilahy avy amin’ireo toerana rehetra any an-taniefitra, ary nametaka haba teny amin’ny hato-tanan’izy mirahavavy sy nametraka satroboninahitra mahafinaritra teny an-dohany. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia hoy Aho anakampo: ‹Na dia izay efa tontan’ny fanitsakitsaham-bady hatry ny ela aza, dia mbola mirotsaka hijangajanga ihany ankehitriny!› '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Misy lehilahy mankao aminy toy ny ankanesana amin’ny vehivavy mpivarotena. Toy izany no ankanesany tao amin’i Ôhôlà sy i Ôhôlibà izay vehivavy janga! '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Fa hisy kosa lehilahy marina hanameloka ireo vehivavy roa ireo ho mpanitsakitsa-bady sy mpamono olona, satria mpanitsakitsa-bady tokoa izy sady misy ra eny an-tanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '«Izao manko no lazain’ny Tompo ANDRIANANAHARY: ‹Anaingao famoriam-bahoaka hanafay azy roa, ary aoka hatolotra hampihorohoroina sy horobaina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Torahy vato izy ary tetiteteho amin’ny sabatra, vonoy ho faty ny zanany lahy sy vavy ary doroy ny tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hatsahatro ny filibàna mihanaka eo amin’ity tany ity. Hahazo fampitandremana ny vehivavy rehetra ka tsy hanahaka ny filibàn’izy roa vavy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa hovaliana aminy kosa ny filibàny ary hozakainy ny vokatry ny fanompoan-tsampiny. Amin’izay dia hoekenareo fa Izaho no Tompo ANDRIANANAHARY›. »
