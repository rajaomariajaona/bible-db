document_id: ISA.52,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mifohaza, ry Jerosalema
  - type: text
    content: 'Mifohaza ianao, ry '
  - type: text
    content: Tsiôna
  - type: text
    content: ' ô,'
  - type: text
    content: mifohaza ka tafio indray ny herinao;
  - type: text
    content: tafio indray ny fitafianao tsara tarehy,
  - type: text
    content: ry Jerosalema tanàna masina!
  - type: text
    content: Satria tsy hiditra ao aminao intsony ny tsy mifora
  - type: text
    content: 'sy ny olona '
  - type: text
    content: maloto
  - type: text
    content: ' ara-pivavahana'
  - type: note
    content: Ampit Apôk 21.2, 27.
  - type: text
    content: .
  '10':
  - type: text
    content: Nahariharin’ny TOMPO
  - type: text
    content: teo imason’ny firenen-kafa rehetra
  - type: text
    content: ny hery maneho ny fahamasinany
  - type: text
    content: ka hahita ny famonjen’Andriamanitsika
  - type: text
    content: ny vazan-tany rehetra.
  - type: heading
    content: Ilaozy i Babilôna.
  '11':
  - type: text
    content: Mialà ianareo mpitondra ny fanaky ny TOMPO,
  - type: text
    content: mialà, mivoaha avy ao Babilôna.
  - type: text
    content: 'Aza mikasika izay '
  - type: text
    content: maloto
  - type: note
    content: And voatsiahy ao amin’ny 2Kôr 6.17 araka ny dkt tranainy grika.
  - type: text
    content: ','
  - type: text
    content: fa aoka hadio ianareo no mivoaka tao!
  '12':
  - type: text
    content: Satria tsy hikoropaka ianareo
  - type: text
    content: raha miainga hivoaka ny tanàna,
  - type: text
    content: ary tsy hihorohoro raha miala teto;
  - type: text
    content: fa ny TOMPO no hialoha lalana anareo
  - type: text
    content: ary ny Andriamanitr’i Israely no ho vodilalanareo.
  - type: heading
    content: Ilay Mpanompon’ny Tompo
  - type: heading
    content: (tononkira fahefatra)
  '13':
  - type: text
    content: Indro fa hahomby ny Mpanompoko;
  - type: text
    content: hisandratra ho avo izy ka hapetraka
  - type: text
    content: eo amin’ny toeram-boninahitra ambony indrindra.
  '14':
  - type: text
    content: Maro be ny olona no tsiravina raha nijery azy
  - type: text
    content: satria niova loatra ny endriny
  - type: text
    content: ka tsy toy ny endrik’olona akory;
  - type: text
    content: ary ny tarehiny tsy toy ny tarehin’olombelona intsony.
  '15':
  - type: text
    content: Firenen-kafa maro kosa no ho talanjona ny aminy;
  - type: text
    content: ka hitampim-bava eo anatrehany aza ireo mpanjaka,
  - type: text
    content: satria izay tsy mbola notantaraina taminy no hitany
  - type: text
    content: ary izay tsy mbola reny akory no saintsaininy
  - type: note
    content: Ny faran’ny and 15 dia tsiahivina ao amin’ny Rm 15.21 araka ny dkt tranainy grika.
  - type: text
    content: .
  '2':
  - type: text
    content: Ahintsano ny vovoka nandrakotra anao, ka mitsangàna;
  - type: text
    content: dia aoka ho amin’ny sezafiandriananao indray
  - type: text
    content: no hipetrahanao, ry Jerosalema ô!
  - type: text
    content: Ny fatorana mangeja ny tendanao
  - type: text
    content: dia aoka hovahanao, ry Tsiôna babo!
  '3':
  - type: text
    content: 'Fa izao no lazain’ny TOMPO amin’ny vahoakany: «Maimaim-poana no nanolorana anareo handevozina, ka tsy handaniana vola ny hanavotana anareo.» '
  '4':
  - type: text
    content: 'Izao koa no lazain’ny Tompo ANDRIANANAHARY: «Tamin’ny voalohany dia nidina tany Ejipta ny vahoakako mba hivahiny; avy teo dia ny Asirianina no nampahory azy tsy amin’antony. '
  '5':
  - type: text
    content: 'Ary amin’izao toe-javatra ankehitriny eto izao, inona no tombony azoko?» Ka hoy ny teny hentitry ny TOMPO hoe: «Natao babo maimaimpoana ny vahoakako. Mirehaka manakora ny mpanjakazaka mampahory azy; ary hamavoina isan’andro ny anarako'
  - type: note
    content: Ity andalana farany ity dia voatsiahy ao amin’ny Rm 2.24 araka ny dkt tranainy grika.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Noho izany, dia ho avy ny andro hahalalan’ny vahoakako ny anarako; ka amin’izay no hahafantarany fa Izaho mihitsy no Ilay miteny hoe: Inty Aho.»'
  - type: heading
    content: Ny fiverenan’ny Tompo ao Jerosalema
  '7':
  - type: text
    content: Endrey tsara tokoa erỳ an-tendrombohitra
  - type: text
    content: ny famindran’ilay mpitondra hafatra
  - type: note
    content: Ampit Na 2.1; Ef 6.15. –Ny fiandohan’ny and 7 dia voatsiahy ao amin’ny Rm 10.15.
  - type: text
    content: ','
  - type: text
    content: izay manambara fiadanana
  - type: text
    content: sy mampita hafatra mahasambatra
  - type: text
    content: ary manambara famonjena
  - type: text
    content: 'ka manao amin’i Tsiôna hoe:'
  - type: text
    content: «Mpanjaka ny Andriamanitrao.»
  '8':
  - type: text
    content: Injany ny feon’ireo napetrakao ho mpitily!
  - type: text
    content: Manandra-peo izy ka miara-mihorakoraka-pifaliana,
  - type: text
    content: 'satria mahita maso ny fiverenan’ny TOMPO ao '
  - type: text
    content: Tsiôna
  - type: text
    content: .
  '9':
  - type: text
    content: Manaova horakora-pifaliana
  - type: text
    content: ka redòny ny hiram-pihobiana,
  - type: text
    content: ry toerana rava ao Jerosalema,
  - type: text
    content: satria efa nampahery ny vahoakany ny TOMPO
  - type: text
    content: sady efa nanavotra an’i Jerosalema!
