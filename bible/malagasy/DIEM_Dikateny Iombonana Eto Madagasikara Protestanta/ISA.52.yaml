    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mifohaza ianao, ry '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: ' ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mifohaza ka tafio indray ny herinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tafio indray ny fitafianao tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry Jerosalema tanàna masina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy hiditra ao aminao intsony ny tsy mifora
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny olona '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: text
    text: ' ara-pivavahana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Apôk 21.2, 27.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ahintsano ny vovoka nandrakotra anao, ka mitsangàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka ho amin’ny sezafiandriananao indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: no hipetrahanao, ry Jerosalema ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fatorana mangeja ny tendanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: dia aoka hovahanao, ry Tsiôna babo!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain’ny TOMPO amin’ny vahoakany: «Maimaim-poana no nanolorana anareo handevozina, ka tsy handaniana vola ny hanavotana anareo.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao koa no lazain’ny Tompo ANDRIANANAHARY: «Tamin’ny voalohany dia nidina tany Ejipta ny vahoakako mba hivahiny; avy teo dia ny Asirianina no nampahory azy tsy amin’antony. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary amin’izao toe-javatra ankehitriny eto izao, inona no tombony azoko?» Ka hoy ny teny hentitry ny TOMPO hoe: «Natao babo maimaimpoana ny vahoakako. Mirehaka manakora ny mpanjakazaka mampahory azy; ary hamavoina isan’andro ny anarako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity andalana farany ity dia voatsiahy ao amin’ny Rm 2.24 araka ny dkt tranainy grika.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noho izany, dia ho avy ny andro hahalalan’ny vahoakako ny anarako; ka amin’izay no hahafantarany fa Izaho mihitsy no Ilay miteny hoe: Inty Aho.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiverenan’ny Tompo ao Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Endrey tsara tokoa erỳ an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny famindran’ilay mpitondra hafatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Na 2.1; Ef 6.15. –Ny fiandohan’ny and 7 dia voatsiahy ao amin’ny Rm 10.15.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: izay manambara fiadanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: sy mampita hafatra mahasambatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary manambara famonjena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ka manao amin’i Tsiôna hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mpanjaka ny Andriamanitrao.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Injany ny feon’ireo napetrakao ho mpitily!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manandra-peo izy ka miara-mihorakoraka-pifaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'satria mahita maso ny fiverenan’ny TOMPO ao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tsiôna
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manaova horakora-pifaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka redòny ny hiram-pihobiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ry toerana rava ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria efa nampahery ny vahoakany ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: sady efa nanavotra an’i Jerosalema!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahariharin’ny TOMPO
- type: usfm
  marker: q1
  children:
  - type: text
    text: teo imason’ny firenen-kafa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny hery maneho ny fahamasinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hahita ny famonjen’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: ny vazan-tany rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ilaozy i Babilôna.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mialà ianareo mpitondra ny fanaky ny TOMPO,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mialà, mivoaha avy ao Babilôna.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aza mikasika izay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: maloto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: And voatsiahy ao amin’ny 2Kôr 6.17 araka ny dkt tranainy grika.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa aoka hadio ianareo no mivoaka tao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria tsy hikoropaka ianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: raha miainga hivoaka ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary tsy hihorohoro raha miala teto;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fa ny TOMPO no hialoha lalana anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny Andriamanitr’i Israely no ho vodilalanareo.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ilay Mpanompon’ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: (tononkira fahefatra)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro fa hahomby ny Mpanompoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hisandratra ho avo izy ka hapetraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: eo amin’ny toeram-boninahitra ambony indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maro be ny olona no tsiravina raha nijery azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria niova loatra ny endriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka tsy toy ny endrik’olona akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tarehiny tsy toy ny tarehin’olombelona intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Firenen-kafa maro kosa no ho talanjona ny aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka hitampim-bava eo anatrehany aza ireo mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: satria izay tsy mbola notantaraina taminy no hitany
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary izay tsy mbola reny akory no saintsaininy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.15 '
    - type: usfm
      marker: ft
