document_id: ECC.7,396
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo manana laza tsara toy izay manana ilomanitra lafo vidy
  - type: note
    content: Jereo Oha 22.1
  - type: text
    content: ; ary aleo ny andro hahafatesan’ny olona toy izay ny andro nahaterahany.
  '10':
  - type: text
    content: 'Aza manontany hoe: Nahoana no tsara ny taloha noho ny ankehitriny? Fa tsy fahendrena ny anontanianao izany. '
  '11':
  - type: text
    content: Tsara tahaka ny lova ny fahendrena ka mahasoa ny olon-drehetra
  - type: note
    content: Jereo Oha 3.13-16; 8.11; Jôb 28.12-19.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ny fahendrena dia toy ny vola ka miaro amin’ny loza maro; manalava ny andron’izay manana azy izy, ka mahasoa ny fahalalana azy
  - type: note
    content: Jereo Oha 3.18 sy nta.
  - type: text
    content: .
  '13':
  - type: text
    content: Hevero ny asan’Andriamanitra, fa izay nataony mibiloka tsy misy afa-manitsy.
  '14':
  - type: text
    content: Amin’ny androm-pahasambarana dia aoka ho sambatra; fa amin’ny androm-pahoriana kosa dia mieritrereta. Samy nataon’Andriamanitra na ny fahasambarana na ny fahoriana mba tsy hahafantaran’ny olona akory izay hitranga amin’ny hoavy.
  '15':
  - type: text
    content: 'Nandritra ny androm-piainako mihelina no nahatsapako fa mety hitranga ny zava-drehetra. Misy olo-marina maty, satria olo-marina izy; kanefa misy olon-dratsy ela velona, satria ratsy toetra izy. '
  '16':
  - type: text
    content: Aoka tsy ho marina loatra na diso hendry koa. Nahoana no manimba tena ianao
  - type: note
    content: Dkt hafa Nahoana ianao no miadaladala?
  - type: text
    content: '? '
  '17':
  - type: text
    content: 'Aza dia ratsy fanahy loatra na mitondra tena toy ny adala koa. Nahoana ianao no ho faty alohan’ny fotoanandronao? '
  '18':
  - type: text
    content: Tsara ny manaraka ireo torohevitra roa ireo, fa izay manaja an’Andriamanitra no hiala amin’ny toetra mihoa-pampana.
  '19':
  - type: text
    content: 'Ny fahendrena dia mahatarika ny hendry mihoatra noho ny mpitondra folo mifehy tanàna iray. '
  '2':
  - type: text
    content: Aleo miditra amin’ny trano misy fisaonana toy izay mankany amin’ny trano misy fanasana. Ny fahafatesana no fiafaran’ny olona rehetra ka tsara ny hahatsiarovan’ny velona izany.
  '20':
  - type: text
    content: Eto ambonin’ny tany manko dia tsy misy olo-marina izay manao ny tsara kanefa tsy diso
  - type: note
    content: Jereo Sal 143.2; Oha 20.9.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Aza henoina avokoa izay rehetra lazain’ny olona, fandrao handre ny mpanomponao hiteny ratsy anao ianao amin’ny farany. '
  '22':
  - type: text
    content: Fantatrao koa fa matetika ny tenanao no miteny fanaratsiana ny hafa.
  '23':
  - type: text
    content: 'Nodinihiko tamim-pahendrena izany rehetra izany, ka hoy aho anakampoko: «Mba ho hendry aho.» Nefa ambony ho ahy io tanjona io. '
  '24':
  - type: text
    content: 'Ambony noho ny zava-misy izany sady lalina dia lalina! Iza no hahatakatra azy? '
  '25':
  - type: text
    content: 'Koa dia nifantoka tamin’ny fianarana sy ny fikarohana aho. Notadiaviko ny atao hoe fahendrena sy ny antom-pisian-javatra. Nofantariko fa fahadalana, eny, fahadalana maha very saina ny haratsiam-panahy. '
  '26':
  - type: text
    content: 'Hitako fa mangidy noho ny fahafatesana ny vehivavy izay toy ny fandrika. Ny fitiavany dia toy ny harato ary ny sandriny toy ny fatorana. Izay lehilahy sitrak’Andriamanitra dia afa-mandositra azy, fa ny mpanota kosa: ho azony'
  - type: note
    content: Jereo Oha 2.16-19; 6.24 –7.27; 22.14.
  - type: text
    content: .
  '27':
  - type: text
    content: 'Nodinihiko tsirairay ny zava-drehetra mba hahitako ny dikany, nefa ela nikarohana tsy nahita valiny aho. Izao no hitako, hoy i Kôheleta: Lehilahy iray ao anatin’ny arivo no mendrika io anarana io; nefa amin’ny vehivavy maro dia tsy nisy hitako mendri-panajana na dia iray aza. '
  '29':
  - type: text
    content: 'Izao no zavatra hany mba fantatro: Andriamanitra dia nanao ny olombelona mahitsy fo, saingy ireo no nampananosarotra zavatra maro.'
  '3':
  - type: text
    content: 'Aleo ny fijaliana toy izay ny fihomehezana; fa na dia manjombona aza ny tarehy, dia mety sambatra ihany ny fo. '
  '4':
  - type: text
    content: Ao amin’ny toerana misy fisaonana no ahitana ny fon’olon-kendry ary ao amin’ny toerana misy fifaliana no ahitana ny fon’olona adala.
  '5':
  - type: text
    content: 'Aleo mihaino ny anatry ny hendry toy izay ny hiran’adala. '
  '6':
  - type: text
    content: Fa ny fihomehezan’ny adala dia toy ny fipoapoaky ny tsilo mirehitra ao ambany vilany; zava-poana koa izany.
  '7':
  - type: text
    content: Fa mety hahalasa adala ny hendry ny fahazoa-mampahory; ary mety hahasimba toetra azy ny fandraisan-kolikoly.
  '8':
  - type: text
    content: Aleo ny mamarana asa toy izay ny manomboka azy; aleo olona mahari-po toy izay ny miavonavona.
  '9':
  - type: text
    content: Aoka tsy ho mora tezitra ianao fa ny adala ihany no malaky tezitra.
