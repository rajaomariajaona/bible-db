document_id: ECC.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aleo manana laza tsara toy izay manana ilomanitra lafo vidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 22.1
    marker-yv: yv-n
  - type: text
    text: ; ary aleo ny andro hahafatesan’ny olona toy izay ny andro nahaterahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aleo miditra amin’ny trano misy fisaonana toy izay mankany amin’ny trano misy fanasana. Ny fahafatesana no fiafaran’ny olona rehetra ka tsara ny hahatsiarovan’ny velona izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aleo ny fijaliana toy izay ny fihomehezana; fa na dia manjombona aza ny tarehy, dia mety sambatra ihany ny fo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ao amin’ny toerana misy fisaonana no ahitana ny fon’olon-kendry ary ao amin’ny toerana misy fifaliana no ahitana ny fon’olona adala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aleo mihaino ny anatry ny hendry toy izay ny hiran’adala. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny fihomehezan’ny adala dia toy ny fipoapoaky ny tsilo mirehitra ao ambany vilany; zava-poana koa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa mety hahalasa adala ny hendry ny fahazoa-mampahory; ary mety hahasimba toetra azy ny fandraisan-kolikoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aleo ny mamarana asa toy izay ny manomboka azy; aleo olona mahari-po toy izay ny miavonavona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka tsy ho mora tezitra ianao fa ny adala ihany no malaky tezitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza manontany hoe: Nahoana no tsara ny taloha noho ny ankehitriny? Fa tsy fahendrena ny anontanianao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsara tahaka ny lova ny fahendrena ka mahasoa ny olon-drehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 3.13-16; 8.11; Jôb 28.12-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fahendrena dia toy ny vola ka miaro amin’ny loza maro; manalava ny andron’izay manana azy izy, ka mahasoa ny fahalalana azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 3.18 sy nta.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hevero ny asan’Andriamanitra, fa izay nataony mibiloka tsy misy afa-manitsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amin’ny androm-pahasambarana dia aoka ho sambatra; fa amin’ny androm-pahoriana kosa dia mieritrereta. Samy nataon’Andriamanitra na ny fahasambarana na ny fahoriana mba tsy hahafantaran’ny olona akory izay hitranga amin’ny hoavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nandritra ny androm-piainako mihelina no nahatsapako fa mety hitranga ny zava-drehetra. Misy olo-marina maty, satria olo-marina izy; kanefa misy olon-dratsy ela velona, satria ratsy toetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka tsy ho marina loatra na diso hendry koa. Nahoana no manimba tena ianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nahoana ianao no miadaladala?
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza dia ratsy fanahy loatra na mitondra tena toy ny adala koa. Nahoana ianao no ho faty alohan’ny fotoanandronao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsara ny manaraka ireo torohevitra roa ireo, fa izay manaja an’Andriamanitra no hiala amin’ny toetra mihoa-pampana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny fahendrena dia mahatarika ny hendry mihoatra noho ny mpitondra folo mifehy tanàna iray. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eto ambonin’ny tany manko dia tsy misy olo-marina izay manao ny tsara kanefa tsy diso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Sal 143.2; Oha 20.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza henoina avokoa izay rehetra lazain’ny olona, fandrao handre ny mpanomponao hiteny ratsy anao ianao amin’ny farany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fantatrao koa fa matetika ny tenanao no miteny fanaratsiana ny hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nodinihiko tamim-pahendrena izany rehetra izany, ka hoy aho anakampoko: «Mba ho hendry aho.» Nefa ambony ho ahy io tanjona io. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ambony noho ny zava-misy izany sady lalina dia lalina! Iza no hahatakatra azy? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa dia nifantoka tamin’ny fianarana sy ny fikarohana aho. Notadiaviko ny atao hoe fahendrena sy ny antom-pisian-javatra. Nofantariko fa fahadalana, eny, fahadalana maha very saina ny haratsiam-panahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hitako fa mangidy noho ny fahafatesana ny vehivavy izay toy ny fandrika. Ny fitiavany dia toy ny harato ary ny sandriny toy ny fatorana. Izay lehilahy sitrak’Andriamanitra dia afa-mandositra azy, fa ny mpanota kosa: ho azony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Oha 2.16-19; 6.24 –7.27; 22.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: 'Nodinihiko tsirairay ny zava-drehetra mba hahitako ny dikany, nefa ela nikarohana tsy nahita valiny aho. Izao no hitako, hoy i Kôheleta: Lehilahy iray ao anatin’ny arivo no mendrika io anarana io; nefa amin’ny vehivavy maro dia tsy nisy hitako mendri-panajana na dia iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izao no zavatra hany mba fantatro: Andriamanitra dia nanao ny olombelona mahitsy fo, saingy ireo no nampananosarotra zavatra maro.'
