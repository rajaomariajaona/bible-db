document_id: PSA.4,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Arovan’Andriamanitra amin’ny fiampangana tsy marina
  - type: text
    content: ' '
  - type: text
    content: Tao amin’ny tahirin-kiran’ny
  - type: text
    content: ' '
  - type: text
    content: ilohan’antoko-mpihira
  - type: text
    content: '. '
  - type: text
    content: Hampiarahina amin’ny valiha. Salamo nataon’i Davida.
  '2':
  - type: text
    content: Ry Andriamanitra mpanome rariny ahy ô,
  - type: text
    content: raha miantso vonjy aho, mba valio.
  - type: text
    content: Tao an-katerena aho no efa nafahanao;
  - type: text
    content: iantrao àry aho ka henoy vavaka.
  '3':
  - type: text
    content: Mandra-pahoviana, rey olona,
  - type: text
    content: no handotoanareo ny voninahitro?
  - type: text
    content: Ny hanendrikendrika ahy tsy amin’antony
  - type: text
    content: 'sy ny hamoron-dainga hiampangana ahy:'
  - type: text
    content: izany no kendrenareo hatrany hatrany.
  - type: text
    content: Fiatoana
  '4':
  - type: text
    content: Fantaro kosa fa igagana ny fitiavan’ny TOMPO ahy;
  - type: text
    content: henoiny aho rehefa miantso vonjy aminy.
  '5':
  - type: text
    content: Tezera kanefa aza manota ianareo
  - type: note
    content: Jereo Ef 4.26.
  - type: text
    content: ','
  - type: text
    content: mieritrereta eo am-pandriana kanefa aza manahy.
  - type: text
    content: Fiatoana
  '6':
  - type: text
    content: 'Fa manaova kosa '
  - type: text
    content: sorona
  - type: text
    content: ' araka ny lalàna'
  - type: text
    content: ary dia matokia ny TOMPO.
  '7':
  - type: text
    content: 'Maro ny olona mitaraina hoe:'
  - type: text
    content: «Mba te hahita fahasambarana izahay,
  - type: text
    content: ka jereo amin-kamorampo, TOMPO ô.»
  '8':
  - type: text
    content: Nasianao fifaliana kosa ato am-poko
  - type: text
    content: mihoatra noho ilay fifalian’ireo,
  - type: text
    content: amin’ny itobahan’ny variny sy ny divainy.
  '9':
  - type: text
    content: Vao mandry aho dia renoka am-piadanana,
  - type: text
    content: satria Ianao irery ihany, TOMPO ô,
  - type: text
    content: no mampitombina ahy tsy hanana ahiahy.
