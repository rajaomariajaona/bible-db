  - type: text
    text: no handotoanareo ny voninahitro?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hanendrikendrika ahy tsy amin’antony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sy ny hamoron-dainga hiampangana ahy:'
- type: usfm
