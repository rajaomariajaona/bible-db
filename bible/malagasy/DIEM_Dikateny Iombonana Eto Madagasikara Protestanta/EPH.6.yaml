  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy olombelona nofo aman-dra tsy akory no ifanandrinantsika, fa ireo fanahy ratsy eny ana habakabaka: dia ireo fanapahana, ireo fahefana, ireo hery mifehy ny sehatry ny haizina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho izany, raiso avokoa ny fiadiana omen’Andriamanitra, mba hahazoanareo manohitra ny fahavalo amin’ny andro ratsy; ka rehefa nandresy ny famelezana rehetra nafitsony ianareo, dia mbola hamahatra tsara ihany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mamahara tsara hatrany ianareo: ny marina no ataovy toy ny etra fehikibonareo; ny rariny no tafio ho toy ny fiarovan-tratra; '
