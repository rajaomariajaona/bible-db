    marker: p
    children:
    - type: text
      text: Ary ianareo tompo, manaova toy izany koa amin’ny mpanomponareo, ka atsaharo ny fandrahonana; satria fantatrareo fa na ianareo, na ny mpanomponareo, dia samy an’ilay Tompo Izay monina ao an-danitra sady tsy mba mizaha tavan’olona
