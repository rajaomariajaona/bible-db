  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivavaha hatrany ary mangataha ny fanampian’Andriamanitra amin’izany; eny, mivavaha mandrakariva araka izay anentanan’ny Fanahy Masina anareo. Miambena sy mazotoa hatrany mba hahatongavana amin’io tanjona io, ary dia mivavaha ho an’ny '
    - type: usfm
