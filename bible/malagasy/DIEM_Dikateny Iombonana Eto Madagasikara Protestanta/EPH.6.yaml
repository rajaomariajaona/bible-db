  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Tsy olombelona nofo aman-dra tsy akory no ifanandrinantsika, fa ireo fanahy ratsy eny ana habakabaka: dia ireo fanapahana, ireo fahefana, ireo hery mifehy ny sehatry ny haizina. '
  '13':
  - type: text
    content: Noho izany, raiso avokoa ny fiadiana omen’Andriamanitra, mba hahazoanareo manohitra ny fahavalo amin’ny andro ratsy; ka rehefa nandresy ny famelezana rehetra nafitsony ianareo, dia mbola hamahatra tsara ihany.
  '14':
  - type: text
    content: 'Koa mamahara tsara hatrany ianareo: ny marina no ataovy toy ny etra fehikibonareo; ny rariny no tafio ho toy ny fiarovan-tratra; '
  '15':
  - type: text
    content: 'ny fahavononan-kitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' mampihavana no ataovy toy ny kiraro eny an-tongotrareo; '
  '16':
  - type: text
    content: tano lalandava ny finoana ho toy ny ampinga hahazoanareo mamono ny zanatsipîka mirehitra rehetra alefan’
  - type: text
