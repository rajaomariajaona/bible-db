  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo mpanompo, maneke ny tomponareo ara-nofo amin-tahotra sy fanajana ary amin’ny fahatsorampo toy ny anekenareo an’i '
    - type: usfm
