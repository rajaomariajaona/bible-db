    - type: text
      text: 'Farany, noho ianareo tafaray amin’ny Tompo dia matanjaha ombàn’ny heriny tsy hay tohaina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Itafio avokoa ny fiadiana omen’Andriamanitra, mba hahazoanareo hamahatra tsara eo anatrehan’ireo tetika afitsoky ny '
