  '18':
  - type: text
    content: 'Mivavaha hatrany ary mangataha ny fanampian’Andriamanitra amin’izany; eny, mivavaha mandrakariva araka izay anentanan’ny Fanahy Masina anareo. Miambena sy mazotoa hatrany mba hahatongavana amin’io tanjona io, ary dia mivavaha ho an’ny '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ' rehetra. '
  '19':
  - type: text
    content: 'Mivavaha ho ahy koa mba homen’Andriamanitra ny teny hotononiko rehefa hiloa-bava aho, ka dia ho sahy hampahafantatra ny tsiambaratelo raketin’ny Vaovao Mahafaly. '
  '2':
  - type: text
    content: '«Hajao ny rainao sy ny reninao»; izany no didy voalohany miampy ny fampanantenana hoe: '
  '20':
  - type: text
    content: Iraka mitondra izany Vaovao Mahafaly izany aho, na dia migadra aza ankehitriny; koa mivavaha ho ahy mba hilazako izany amim-pahasahiana, araka ny tokony hoteneniko.
  - type: heading
    content: Fanaovam-beloma
  '21':
  - type: text
    content: I Tisiko
  - type: note
    content: 'Tisiko: jereo Asa 20.4.'
  - type: text
    content: ', hava-malalantsika sady mpanompo mahatoky eo amin’ny asan’ny Tompo, dia hampahafantatra anareo ny vaovao rehetra, mba hahalalanareo ny mahazo ahy sy izay ataoko. '
  '22':
  - type: text
    content: Izany indrindra no andefasako azy ho atỳ aminareo, mba hahafantaranareo ny momba anay sy hampahery fo anareo.
  '23':
  - type: text
    content: 'Ho amin’ny havana rehetra anie ny fiadanana sy ny fitiavana mbamin’ny finoana avy amin’Andriamanitra Ray sy i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompo. '
  '24':
  - type: text
    content: Ny fahasoavan’Andriamanitra anie homba izay rehetra tia an’i Jesoa Kristy Tompontsika amin’ny fitiavana tsy mety lefy!
  '3':
  - type: text
    content: «mba hahita soa sy ho ela velona eto ambonin’ny tany ianao
  - type: note
    content: 'And 2-3: Eks 20.12; Fifan 5.16.'
  - type: text
    content: .»
  '4':
  - type: text
    content: Ary ianareo, ray aman-dreny, aza manao izay hampahatezitra ny zanakareo. Fa tezao amin’ny fanabeazana sy fifehezana araka ny Tompo izy.
  - type: heading
    content: Ny mpanompo sy ny tompo ara-nofo
  '5':
  - type: text
    content: 'Ianareo mpanompo, maneke ny tomponareo ara-nofo amin-tahotra sy fanajana ary amin’ny fahatsorampo toy ny anekenareo an’i '
  - type: text
    content: Kristy
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Tsy hoe raha eo imason’ny tomponareo ara-nofo ihany no manaiky, toy ny mila sitraka amin’ny olona; fa tontosao amin’ny fo tokoa ny sitrapon’Andriamanitra, toy ny ataon’ny mpanompon’i Kristy. '
  '7':
  - type: text
    content: 'Ataovy amin’ny fo mirana ny asa fanompoanareo, tahaka ny atao amin’ny Tompo fa tsy amin’ny olona; '
  '8':
  - type: text
    content: satria fantatrareo fa ny olona tsirairay, na mpanompo na tsy mpanompo, dia samy hovalian’ny Tompo, amin’izay soa nataony avy.
  '9':
  - type: text
    content: Ary ianareo tompo, manaova toy izany koa amin’ny mpanomponareo, ka atsaharo ny fandrahonana; satria fantatrareo fa na ianareo, na ny mpanomponareo, dia samy an’ilay Tompo Izay monina ao an-danitra sady tsy mba mizaha tavan’olona
  - type: note
    content: Ampit Fifan 10.17.
