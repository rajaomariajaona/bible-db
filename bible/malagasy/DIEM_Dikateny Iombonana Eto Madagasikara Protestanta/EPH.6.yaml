  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivavaha ho ahy koa mba homen’Andriamanitra ny teny hotononiko rehefa hiloa-bava aho, ka dia ho sahy hampahafantatra ny tsiambaratelo raketin’ny Vaovao Mahafaly. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Hajao ny rainao sy ny reninao»; izany no didy voalohany miampy ny fampanantenana hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iraka mitondra izany Vaovao Mahafaly izany aho, na dia migadra aza ankehitriny; koa mivavaha ho ahy mba hilazako izany amim-pahasahiana, araka ny tokony hoteneniko.
  - type: usfm
