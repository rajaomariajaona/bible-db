  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hoe raha eo imason’ny tomponareo ara-nofo ihany no manaiky, toy ny mila sitraka amin’ny olona; fa tontosao amin’ny fo tokoa ny sitrapon’Andriamanitra, toy ny ataon’ny mpanompon’i Kristy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy amin’ny fo mirana ny asa fanompoanareo, tahaka ny atao amin’ny Tompo fa tsy amin’ny olona; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria fantatrareo fa ny olona tsirairay, na mpanompo na tsy mpanompo, dia samy hovalian’ny Tompo, amin’izay soa nataony avy.
  '9':
