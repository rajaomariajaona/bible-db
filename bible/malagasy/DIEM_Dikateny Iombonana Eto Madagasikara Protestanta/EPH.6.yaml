    content: Ny zanaka sy ny ray aman-dreny
  - type: text
    content: Ianareo zanaka, mpanaraka ny Tompo ianareo
  - type: note
    content: Misy stf sasany tsy ahitana hoe mpanaraka ny Tompo ianareo.
  - type: text
    content: 'ka maneke ny ray aman-dreninareo, fa rariny izany. '
  '10':
  - type: text
    content: 'Farany, noho ianareo tafaray amin’ny Tompo dia matanjaha ombàn’ny heriny tsy hay tohaina. '
  '11':
  - type: text
    content: 'Itafio avokoa ny fiadiana omen’Andriamanitra, mba hahazoanareo hamahatra tsara eo anatrehan’ireo tetika afitsoky ny '
  - type: text
