document_id: MAT.28,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tafatsangana velona i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 16.1-10; Lk 24.1-12; Jôh 20.1-10)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Taorian’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ', raha vao nazava ratsy ny andro alahady, dia lasa nizaha ny fasana i Maria ilay avy any Magdalà sy i Maria'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 27.56.
      marker-yv: yv-n
    - type: text
      text: ' anankiray hafa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tamin’izay dia hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Aoka izay ny tahotra! Ndeha ampandreneso ireo mpianatro izay rahalahiko, ary asaovy mankany Galilea fa any no hahitany Ahy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voatambim-bola ny miaramila mpiambina
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha mbola teny an-dalana ireto vehivavy, dia indreny tafaverina tao an-tanànan’i Jerosalema ny sasany tamin’ireo mpiambina ny fasana ka nitantara ny zava-nitranga rehetra tamin’ny lohandoha-mpisorona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nivory niaraka tamin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' ny lohandoha-mpisorona; ka rehefa nikaon-doha, dia nanome vola be ny miaramila ry zareo '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'sady nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Lazao fa tonga alina ny mpianatr’i Jesoa nangalatra ny fatiny, raha sendra natory ianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 27.64.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary raha ren’ny governora izany, dia izahay no handresy lahatra azy sady hanao izay tsy hampaninona anareo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nandray ny vola ny miaramila ka nanao araka ny teny nomen-dry zareo azy. Ary izany tantara izany no niely tamin’ireo Jiosy mandraka androany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Irahin’i Jesoa ny mpianatra 11 lahy
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mk 16.14-18; Lk 24.36-49; Jôh 20.19-23; Asa 1.6-8)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' 11 lahy dia nankany Galilea, any amin’ilay tendrombohitra nasain’i Jesoa halehany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 26.32.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nony nahita an’i Jesoa ny mpianatra, dia nitsaoka Azy; kanefa mbola nisalasala ihany ny sasany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nanatona azy rehetra i Jesoa ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Efa nomena Ahy avokoa ny fahefana any an-danitra sy etỳ an-tany; '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: koa mandehana ianareo, ataovy mpianatro ny firenena rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Asa 1.8.
      marker-yv: yv-n
    - type: text
      text: '; ka ataovy batisa ho amin’ny anaran’ny Ray sy ny Zanaka ary ny Fanahy Masina, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary injay nisy horohorontany mahery vaika, fa nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeli
    - type: text
      text: 'n’ny Tompo nidina avy tany an-danitra tonga nanakodia ny vato hidim-pasana ary nipetraka teo amboniny. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: sady ampianaro hitandrina ny zavatra rehetra nandidiako anareo. Ary indro Aho miaraka aminareo isan’andro vaky mandra-pahatongan’ny fiafaran’izao tontolo izao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Namiratra tahaka ny tselatra ny tarehiny ary fotsy tahaka ny oram-panala ny fitafiany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Azon’ny tahotra ireo mpiambina raha nahita azy ka nivadi-po ary nody maty. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niteny tamin’ireto vehivavy ilay anjely nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aoka tsy hatahotra ianareo! Fantatro fa i Jesoa, Ilay nohomboana tamin’ny hazofijaliana, no tadiavinareo. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tsy ato Izy, satria efa nitsangana velona araka ny voalazany. Avia ka jereo ny toerana nametrahana Azy. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ndeha haingana lazao amin’ny mpianany hoe: «Efa nitsangana velona avy tany amin’ny maty Izy, ary indro mialoha anareo any Galilea'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 26.32.
      marker-yv: yv-n
    - type: text
      text: ', ka any no hahitanareo Azy.» Izany àry, fa efa nilazako ianareo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia niala haingana tao am-pasana ireo vehivavy, sady natahotra no faly tokoa, ary nihazakazaka hampandre ny mpianatr’i Jesoa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tampotampoka eo dia nifanatrika tamin’ireto vehivavy i Jesoa ary niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ho ao aminareo anie ny fiadanana!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona an’i Jesoa ireto vehivavy ka namihina ny tongony sady nitsaoka Azy. '
