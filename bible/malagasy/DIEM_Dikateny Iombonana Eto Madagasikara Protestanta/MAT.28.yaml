document_id: MAT.28,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tafatsangana velona i Jesoa
  - type: heading
    content: (Jereo Mk 16.1-10; Lk 24.1-12; Jôh 20.1-10)
  - type: text
    content: 'Taorian’ny '
  - type: text
    content: sabata
  - type: text
    content: ', raha vao nazava ratsy ny andro alahady, dia lasa nizaha ny fasana i Maria ilay avy any Magdalà sy i Maria'
  - type: note
    content: Jereo 27.56.
  - type: text
    content: ' anankiray hafa. '
  '10':
  - type: text
    content: 'Tamin’izay dia hoy i Jesoa taminy:'
  - type: text
    content: –Aoka izay ny tahotra! Ndeha ampandreneso ireo mpianatro izay rahalahiko, ary asaovy mankany Galilea fa any no hahitany Ahy.
  - type: heading
    content: Voatambim-bola ny miaramila mpiambina
  '11':
  - type: text
    content: 'Raha mbola teny an-dalana ireto vehivavy, dia indreny tafaverina tao an-tanànan’i Jerosalema ny sasany tamin’ireo mpiambina ny fasana ka nitantara ny zava-nitranga rehetra tamin’ny lohandoha-mpisorona. '
  '12':
  - type: text
    content: 'Dia nivory niaraka tamin’ireo '
  - type: text
    content: loholona
  - type: text
    content: ' ny lohandoha-mpisorona; ka rehefa nikaon-doha, dia nanome vola be ny miaramila ry zareo '
  '13':
  - type: text
    content: 'sady nanao taminy hoe:'
  - type: text
    content: –Lazao fa tonga alina ny mpianatr’i Jesoa nangalatra ny fatiny, raha sendra natory ianareo
  - type: note
    content: Ampit 27.64.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Ary raha ren’ny governora izany, dia izahay no handresy lahatra azy sady hanao izay tsy hampaninona anareo.
  '15':
  - type: text
    content: Dia nandray ny vola ny miaramila ka nanao araka ny teny nomen-dry zareo azy. Ary izany tantara izany no niely tamin’ireo Jiosy mandraka androany.
  - type: heading
    content: Irahin’i Jesoa ny mpianatra 11 lahy
  - type: heading
    content: (Jereo Mk 16.14-18; Lk 24.36-49; Jôh 20.19-23; Asa 1.6-8)
  '16':
  - type: text
    content: 'Ary ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' 11 lahy dia nankany Galilea, any amin’ilay tendrombohitra nasain’i Jesoa halehany'
  - type: note
    content: Jereo 26.32.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Nony nahita an’i Jesoa ny mpianatra, dia nitsaoka Azy; kanefa mbola nisalasala ihany ny sasany. '
  '18':
  - type: text
    content: 'Dia nanatona azy rehetra i Jesoa ka nanao taminy hoe:'
  - type: text
    content: '–Efa nomena Ahy avokoa ny fahefana any an-danitra sy etỳ an-tany; '
  '19':
  - type: text
    content: koa mandehana ianareo, ataovy mpianatro ny firenena rehetra
  - type: note
    content: Ampit Asa 1.8.
  - type: text
    content: '; ka ataovy batisa ho amin’ny anaran’ny Ray sy ny Zanaka ary ny Fanahy Masina, '
  '2':
  - type: text
    content: 'Ary injay nisy horohorontany mahery vaika, fa nisy '
  - type: text
    content: anjeli
  - type: text
    content: 'n’ny Tompo nidina avy tany an-danitra tonga nanakodia ny vato hidim-pasana ary nipetraka teo amboniny. '
  '20':
  - type: text
    content: sady ampianaro hitandrina ny zavatra rehetra nandidiako anareo. Ary indro Aho miaraka aminareo isan’andro vaky mandra-pahatongan’ny fiafaran’izao tontolo izao.
  '3':
  - type: text
    content: 'Namiratra tahaka ny tselatra ny tarehiny ary fotsy tahaka ny oram-panala ny fitafiany. '
  '4':
  - type: text
    content: 'Azon’ny tahotra ireo mpiambina raha nahita azy ka nivadi-po ary nody maty. '
  '5':
  - type: text
    content: 'Dia niteny tamin’ireto vehivavy ilay anjely nanao hoe:'
  - type: text
    content: '–Aoka tsy hatahotra ianareo! Fantatro fa i Jesoa, Ilay nohomboana tamin’ny hazofijaliana, no tadiavinareo. '
  '6':
  - type: text
    content: 'Tsy ato Izy, satria efa nitsangana velona araka ny voalazany. Avia ka jereo ny toerana nametrahana Azy. '
  '7':
  - type: text
    content: 'Ndeha haingana lazao amin’ny mpianany hoe: «Efa nitsangana velona avy tany amin’ny maty Izy, ary indro mialoha anareo any Galilea'
  - type: note
    content: Jereo 26.32.
  - type: text
    content: ', ka any no hahitanareo Azy.» Izany àry, fa efa nilazako ianareo.'
  '8':
  - type: text
    content: 'Dia niala haingana tao am-pasana ireo vehivavy, sady natahotra no faly tokoa, ary nihazakazaka hampandre ny mpianatr’i Jesoa. '
  '9':
  - type: text
    content: 'Tampotampoka eo dia nifanatrika tamin’ireto vehivavy i Jesoa ary niteny taminy hoe:'
  - type: text
    content: –Ho ao aminareo anie ny fiadanana!
  - type: text
    content: 'Dia nanatona an’i Jesoa ireto vehivavy ka namihina ny tongony sady nitsaoka Azy. '
