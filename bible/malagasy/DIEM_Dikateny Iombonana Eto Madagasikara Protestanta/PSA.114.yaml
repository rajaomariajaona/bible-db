document_id: PSA.114,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Fony niala tany Ejipta ny vahoaka Israely
  - type: text
    content: ' '
  - type: text
    content: Haleloià
  - type: text
    content: '!'
  - type: text
    content: Fony niala tany Ejipta
  - type: note
    content: Jereo Eks 12.51.
  - type: text
    content: ' ireo Israelita, taranak’i Jakôba,'
  - type: text
    content: ka nandao an’ilay firenena lozabe sady hafa fiteny,
  '2':
  - type: text
    content: 'dia tonga '
  - type: text
    content: Toeramasin’ny Tompo
  - type: text
    content: ' i Joda'
  - type: text
    content: ary faritany anjakany i Israely
  - type: note
    content: Mifanako amin’ny Joda eto ny hoe Israely ka angamba manondro ny fitambaran’ireo foko tavaratra izay namorona ny fanjakana nantsoina hoe Israely taorian’ny nahafatesan’i Salômôna.
  - type: text
    content: .
  '3':
  - type: text
    content: Ny ranomasina nahita ny Israelita ka nandositra;
  - type: text
    content: ny ony Jôrdàna nanjary niorika
  - type: note
    content: 'ny ranomasina: Eks 14.21. –Jôrdàna: Jos 3.15-16; 4.23.'
  - type: text
    content: ;
  '4':
  - type: text
    content: ny tendrombohitra niantsambotra toa ondrilahy
  - type: text
    content: ary ny havoana nitsambikina toa zanakosy.
  '5':
  - type: text
    content: Ahoana ianao, ry ranomasina, no mandositra,
  - type: text
    content: ary ianao, ry ony Jôrdàna, no manjary miorika?
  '6':
  - type: text
    content: Ahoana ianareo, ry tendrombohitra,
  - type: text
    content: no miantsambotra toa ondrilahy,
  - type: text
    content: ary ianareo, ry havoana,
  - type: text
    content: no mitsambikina toa zanakosy?
  '7':
  - type: text
    content: Aoka ianao, ry tany, hientanentan-kafaliana
  - type: text
    content: eo anoloan’ny Tompo, dia ny Andriamanitr’i Jakôba,
  '8':
  - type: text
    content: fa manova ny vatolampy ho farihy Izy,
  - type: text
    content: mahatonga ny karaobato ho loharano
  - type: note
    content: Jereo Eks 17.1-6; Nom 20.1-11.
  - type: text
    content: '!'
