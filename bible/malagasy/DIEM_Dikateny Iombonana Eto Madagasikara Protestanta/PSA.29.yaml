document_id: PSA.29,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ambaran’ny kotro-baratra ny herin’ny Tompo
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: Ianareo anjely
  - type: note
    content: 'Ianareo anjely: and 9; Sal 82.1; 89.7; Jôb 1.6 sns.'
  - type: text
    content: ', tolory haja ny TOMPO,'
  - type: text
    content: 'eny, tolory haja IZY fa be '
  - type: text
    content: voninahitra
  - type: text
    content: ' sy hery;'
  '10':
  - type: text
    content: Ny TOMPO no mitoetra ho mpifehy
  - type: text
    content: na dia ny rano tsy hita faritra aza;
  - type: text
    content: mitoetra ho mpanjaka mandrakizay IZY.
  '11':
  - type: text
    content: Homen’ny TOMPO hery anie ny vahoakany
  - type: text
    content: 'ka dia '
  - type: text
    content: hotahîny
  - type: text
    content: ' hombam-piadanana!'
  '2':
  - type: text
    content: Atolory AZY ny voninahitry ny anarany,
  - type: text
    content: ka dia miankohofa eo anatrehan’ny TOMPO
  - type: text
    content: rehefa miseho ny fahamasinany
  - type: note
    content: 'And 1-2: jereo Sal 97.7-9.'
  - type: text
    content: .
  '3':
  - type: text
    content: Andriamanitra be voninahitra
  - type: text
    content: no mampikotrokotroka ny orana;
  - type: text
    content: 'mitrena eny ambony rano ny feon’ny TOMPO:'
  - type: text
    content: ny TOMPO no manapaka eny ambony ranobe.
  '4':
  - type: text
    content: Midoboka mafy ny feon’ny TOMPO,
  - type: text
    content: satria heni-pahefana sy be fiandrianana IZY.
  '5':
  - type: text
    content: 'Mandripaka hazo sedera ny feon’ny TOMPO:'
  - type: text
    content: eny, ripaky ny TOMPO ireo sederan’i Libano.
  '6':
  - type: text
    content: Ampitroariny toa zanak’omby
  - type: text
    content: ny tendrombohitr’i Libano;
  - type: text
    content: ampitroariny toa vantotr’ombimanga
  - type: text
    content: ny tendrombohitr’i Hermôna.
  '7':
  - type: text
    content: Mampitselaka ny tselatra ny feon’ny TOMPO.
  '8':
  - type: text
    content: Mampihovotra ny taniefitra ny feon’ny TOMPO;
  - type: text
    content: eny, ny TOMPO no mampihovotra ny taniefitr’i Kedesa.
  '9':
  - type: text
    content: Mampangovitra ny ôaka ny feon’ny TOMPO
  - type: text
    content: ary mampihintsan-dravina ny ala be.
  - type: text
    content: 'Ny ao an-dapan’ny Tompo samy manao hoe:'
  - type: text
    content: «Voninahitra anie ho an’Andriamanitra!»
