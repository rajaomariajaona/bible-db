document_id: PSA.29,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ambaran’ny kotro-baratra ny herin’ny Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianareo anjely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ianareo anjely: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and 9; Sal 82.1; 89.7; Jôb 1.6 sns.
      marker-yv: yv-n
    - type: text
      text: ', tolory haja ny TOMPO,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'eny, tolory haja IZY fa be '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voninahitra
    - type: text
      text: ' sy hery;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny TOMPO no mitoetra ho mpifehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na dia ny rano tsy hita faritra aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mitoetra ho mpanjaka mandrakizay IZY.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homen’ny TOMPO hery anie ny vahoakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka dia '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hotahîny
    - type: text
      text: ' hombam-piadanana!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atolory AZY ny voninahitry ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia miankohofa eo anatrehan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa miseho ny fahamasinany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'And 1-2: jereo Sal 97.7-9.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra be voninahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no mampikotrokotroka ny orana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mitrena eny ambony rano ny feon’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny TOMPO no manapaka eny ambony ranobe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midoboka mafy ny feon’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria heni-pahefana sy be fiandrianana IZY.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mandripaka hazo sedera ny feon’ny TOMPO:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ripaky ny TOMPO ireo sederan’i Libano.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitroariny toa zanak’omby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendrombohitr’i Libano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ampitroariny toa vantotr’ombimanga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tendrombohitr’i Hermôna.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampitselaka ny tselatra ny feon’ny TOMPO.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampihovotra ny taniefitra ny feon’ny TOMPO;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, ny TOMPO no mampihovotra ny taniefitr’i Kedesa.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampangovitra ny ôaka ny feon’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary mampihintsan-dravina ny ala be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny ao an-dapan’ny Tompo samy manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Voninahitra anie ho an’Andriamanitra!»
