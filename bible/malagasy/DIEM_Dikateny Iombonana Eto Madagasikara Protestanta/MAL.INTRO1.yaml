  - type: text
    content: dia nanaraka ny antson’i Hagay sy i Zakarià ny Israelita ka nandrafitra indray ny
  - type: text
    content: ' '
  - type: text
    content: tempolin’i Jerosalema
  - type: text
    content: ' '
  - type: text
    content: '(taona 520 - 515 tal. J.K.). Hatreo anefa dia very an-javony ilay fanantenana fihavaozam-pirenena teo ambany fitarihan’i Zerobabela governora, ary tsy mbola nitranga ilay fanitsiam-pivavahan’i Hezrà (tokony ho tamin’ny 440 tal. J.K.). Nihasimba ny lafiny fivavahana sy môraly: natao an-tsirambina ny fanompoam-pivavahana (1.6-14), fitahina aza Andriamanitra rehefa manao fanatitra ny olona (3.6-11), tsy mahavita ny asa nanirahana azy intsony ny mpisorona ary tsy hajaina intsony ny lalàna izay nomen’Andriamanitra ny vahoakany (2.1-16).'
  - type: text
    content: Amin’ny mpaminany dia fanararaotra izany toe-javatra izany mba hampirisihana ny mpisorona sy ny vahoaka ho amin’ny fiovana tanteraka, ka ny nataony dia ny mampahatsiaro azy ireo ny fitiavan’Andriamanitra (1.1-5) nefa koa ny maha antomotra ny fitsaràny sy ny fiaviany (2.17–3.5; 3.13-24). Nambarany taminy ny fandefasan’Andriamanitra ny irany (3.1) sy ny mpaminany iray toa an’i Elià (3.23). Ao amin’ny Vaovao Mahafalin’i Matio sy i Lioka, izany fampanantenana izany dia manambara an’i Jôhany Mpanao Batisa, izay natao hanomana ny fiavian’i Jesoa (Mt 17.11-13; Lk 1.17).
  - type: text
    content: Tsy tantin’i Malakỳ ny fahasimbàn’ny fiainam-pivavahana sy môraly tamin’ny androny; ka izany no ijoroany amin-kery hanomana ny mpino hihaona amin’Andriamaniny. Izany fihaonana izany koa no mbola anasany antsika ankehitriny.
