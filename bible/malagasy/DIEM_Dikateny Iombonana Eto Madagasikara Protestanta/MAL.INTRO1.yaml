  - type: text
    content: ' Malakỳ '
  - type: text
    content: dia voasoratra tamin’ny tapany voalohan’ny taonjato fahadimy tal J.K., efa ho taonjato iray taorian’ny niverenan’ny Jiosy avy tany Babilônia izay nanaovana sesitany azy nanomboka tamin’ny fiandohan’ny taonjato fahenina ka hatramin’ny taona 538 tal J.K. Taorian’ny fiverenana avy any an-tsesitany, ny fikambanambe israelita dia tafalentika tsikelikely tao anatin’ny hakiviana. Telopolo na dimampolo taona mialoha ny toritenin’i Malakỳ
  - type: text
    content: ' '
  - type: text
    content: mpaminany
  - type: text
