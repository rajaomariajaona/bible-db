document_id: 1CH.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azon’i Jôaba i Rabà renivohitry ny Hamônita
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 11.1; 12.26-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rehefa niherina ny lohataona, fotoana fiaingan’ny mpanjaka handeha hiady, dia i Jôaba no nitarika ny tafika manontolo ka nandrava ny tanin’ny Hamônita sy tonga nanao fahirano an’i Rabà renivohiny; fa i Davida kosa nijanona tao Jerosalema ihany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nony azon’i Jôaba sy noravany i Rabà, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia avy i Davida nanaisotra ny satroboninahitra teny an-dohan’i Milkôma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Milkôma: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 12.30 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ilay andriamanitry ny Hamônita. Mihoatra ny telopolo kilao no hita fa lanjan’io satroboninahitra volamena io; sady nisy vatosoa anankiray koa taminy, vatosoa izay napetraka teo an-tampon’ny satroboninahitr’i Davida. Be dia be ny zavatra voababo tao an-drenivohitra no nentin’i Davida; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary ny mponina izay tao dia navoakany ka notereny hiasa amin’ny tsofa sy ny hersa ary ny famaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'famaky: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'araka 2 Sam 12.31; ny RM etoana dia mamerina ny voambolana efa voadika etsy aloha hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsofa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jereo koa ny naoty tandrifin’ny 2 Sam 12.31.
    marker-yv: yv-n
  - type: text
    text: . Nataon’i Davida toy izany avokoa ny tanàna hafa rehetra fonenan’ny Hamônita. Dia niverina nankany Jerosalema i Davida sy ny tafiny manontolo.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Resin’ny Israelita ny Filistinina
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo 2 Sam 21.18-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taorian’izany, dia nisy ady tamin’ny Filistinina tao Gezera. Tamin’izay i Sibekay, avy any Hosà, no nahafaty an’i Sipay isan’ny taranak’i Rafà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gezera: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 2 Sam 5.25 sy nta. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: taranak’i Rafà
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': talohan’ny fahatongavan’ny Israelita avy tany Ejipta, dia nonina teny an-dafy atsinanan’ny ony Jôrdàna izy ireo (jereo Deot 3.11).'
    marker-yv: yv-n
  - type: text
    text: ; ka dia voaetry ny Filistinina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nisy ady tamin’ny Filistinina indray. Ka i Elihanàna, zanakalahin’i Jahîry, no nahafaty an’i Lahemỳ, rahalahin’i Gôliata avy any Gata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gôliata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Sam 17.4-7. –
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Gata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo 1 Sam 5.8 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', dia i Gôliata izay nanana zaran-defona vaventy tahaka ny voditenon’ny mpanenona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy ady koa tao Gata. Tao dia nisy lehilahy anankiray avo be sady enin-drantsana isan-tanana aman-tongotra ka dia 24 no fitambarany; taranak’i Rafà koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nohantsiny ny Israelita, ka i Jonatàna, zanakalahin’i Simehà izay rahalahin’i Davida, no nahafaty azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo miaramila filistinina ireo dia samy taranak’i Rafà tao Gata, ka matin’ny tanan’i Davida sy ny tanan’ny mpanompony.
