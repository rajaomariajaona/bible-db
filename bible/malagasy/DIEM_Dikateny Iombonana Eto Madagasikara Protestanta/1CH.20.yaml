document_id: 1CH.20,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Azon’i Jôaba i Rabà renivohitry ny Hamônita
  - type: heading
    content: (Jereo 2 Sam 11.1; 12.26-31)
  - type: text
    content: Rehefa niherina ny lohataona, fotoana fiaingan’ny mpanjaka handeha hiady, dia i Jôaba no nitarika ny tafika manontolo ka nandrava ny tanin’ny Hamônita sy tonga nanao fahirano an’i Rabà renivohiny; fa i Davida kosa nijanona tao Jerosalema ihany.
  - type: text
    content: 'Nony azon’i Jôaba sy noravany i Rabà, '
  '2':
  - type: text
    content: dia avy i Davida nanaisotra ny satroboninahitra teny an-dohan’i Milkôma
  - type: note
    content: 'Milkôma: jereo 2 Sam 12.30 sy nta.'
  - type: text
    content: ' ilay andriamanitry ny Hamônita. Mihoatra ny telopolo kilao no hita fa lanjan’io satroboninahitra volamena io; sady nisy vatosoa anankiray koa taminy, vatosoa izay napetraka teo an-tampon’ny satroboninahitr’i Davida. Be dia be ny zavatra voababo tao an-drenivohitra no nentin’i Davida; '
  '3':
  - type: text
    content: ary ny mponina izay tao dia navoakany ka notereny hiasa amin’ny tsofa sy ny hersa ary ny famaky
  - type: note
    content: 'famaky: araka 2 Sam 12.31; ny RM etoana dia mamerina ny voambolana efa voadika etsy aloha hoe tsofa. Jereo koa ny naoty tandrifin’ny 2 Sam 12.31.'
  - type: text
    content: . Nataon’i Davida toy izany avokoa ny tanàna hafa rehetra fonenan’ny Hamônita. Dia niverina nankany Jerosalema i Davida sy ny tafiny manontolo.
  - type: heading
    content: Resin’ny Israelita ny Filistinina
  - type: heading
    content: (Jereo 2 Sam 21.18-22)
  '4':
  - type: text
    content: Taorian’izany, dia nisy ady tamin’ny Filistinina tao Gezera. Tamin’izay i Sibekay, avy any Hosà, no nahafaty an’i Sipay isan’ny taranak’i Rafà
  - type: note
    content: 'Gezera: jereo 2 Sam 5.25 sy nta. –taranak’i Rafà: talohan’ny fahatongavan’ny Israelita avy tany Ejipta, dia nonina teny an-dafy atsinanan’ny ony Jôrdàna izy ireo (jereo Deot 3.11).'
  - type: text
    content: ; ka dia voaetry ny Filistinina.
  '5':
  - type: text
    content: Dia nisy ady tamin’ny Filistinina indray. Ka i Elihanàna, zanakalahin’i Jahîry, no nahafaty an’i Lahemỳ, rahalahin’i Gôliata avy any Gata
  - type: note
    content: 'Gôliata: jereo 1 Sam 17.4-7. –Gata: jereo 1 Sam 5.8 sy nta.'
  - type: text
    content: ', dia i Gôliata izay nanana zaran-defona vaventy tahaka ny voditenon’ny mpanenona.'
  '6':
  - type: text
    content: 'Nisy ady koa tao Gata. Tao dia nisy lehilahy anankiray avo be sady enin-drantsana isan-tanana aman-tongotra ka dia 24 no fitambarany; taranak’i Rafà koa izy. '
  '7':
  - type: text
    content: Nohantsiny ny Israelita, ka i Jonatàna, zanakalahin’i Simehà izay rahalahin’i Davida, no nahafaty azy.
  '8':
  - type: text
    content: Ireo miaramila filistinina ireo dia samy taranak’i Rafà tao Gata, ka matin’ny tanan’i Davida sy ny tanan’ny mpanompony.
