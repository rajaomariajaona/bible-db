document_id: NEH.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanitsiana isan-karazany notontosain’i Nehemià
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’izany fotoanandro izany, dia novakîna ho ren’ny vahoaka ny teny raketin’ny bokin’i Mosesy; ka hita voasoratra tao fa ny Hamônita sy ny Môabita dia tsy mahazo miditra amin’ny fiangonan’Andriamanitra na oviana na oviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsy mba nitsena sakafo sy rano ny Israelita manko ry zareo, fa nanamby an’i Balahama hanozona azy; kanjo nampodîn’Andriamanitsika ho '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fitahiana
  - type: text
    text: ' kosa ny fanozonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa rehefa ren’ny vahoaka ny lalàna, dia navahana tsy ho anisan’ny Israelita ny olona hafa firenena rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Talohan’izany i Eliasiba mpisorona no voatendry ho mpiandraikitra ny efitrano fanampiny ao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’Andriamanitra
  - type: text
    text: '. Noho izy mpihavana akaiky tamin’i Tôbià, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia nanomanany efitrano lehibe io Tôbià io, dia ilay efitrano nitehirizana hatrizay ny fanatitra vokatry ny tany sy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' ary ny fanaka mbamin’ny ampahafolon’ny vary sy divay ary menaka; tao koa no nitehirizana ny fanatitra voatokana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: levita
  - type: text
    text: ' sy ny mpihira ary ny mpiandry varavarana mbamin’ny fanatitra navahana ho an’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorona
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saingy, tamin’izany rehetra izany, dia tsy mba tany Jerosalema aho; satria niverina tany amin’i Artakserksesa amperôran’i Babilôna aho tamin’ny taona faha-32 nanjakany. Nony taoriandriana kely, dia nahazo lalana tamin’ny amperôra aho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mba hankany Jerosalema indray; ka hitako tao ny ratsy afitsok’i Eliasiba tamin’ny nanomanany efitrano ho an’i Tôbià, teo anatin’ny kianjan’ny tranon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tezitra mafy aho ka natsipiko tany ivelan’ny efitrano ireo fanaka rehetra izay an’i Tôbià. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nasaiko nodiovin’ny olona ilay efitrano, dia naveriko tao indray ny fanaky ny tranon’Andriamanitra mbamin’ny fanatitra vokatry ny tany sy ny ditin-kazo manitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Reko ihany koa fa tsy voaloa ny fiveloman’ny levita; ka dia samy efa nandositra ho any an-tsahany avy ireo levita, toy izay hanao ny raharaha fanompoany. Toy izany koa no nihatra tamin’ny mpihira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Deot 12.19
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nifandahatra tamin’ny mpanapaka aho ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana no dia navela hilaozana ny tranon’Andriamanitra?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namory ny levita sy ny mpihira aho ka nametraka azy teo amin’ny anjara toerany avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ny Jiosy rehetra kosa nitondra ny ampahafolon’ny vary sy divay ary menaka ho ao an-trano fitehirizana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Mal 3.10
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary notendreko ho mpitandrina ny trano fitehirizana i Selemià mpisorona sy i Tsadôka mpitan-tsoratra ary i Pedaià levita; ary nataoko mpanampy azy telo lahy i Hanàna zanakalahin’i Zakora sady zafin’i Matanià. Hita toetra ho mahatoky manko ireo; ary ny hanao ny fizaràna ho an’ireo namany no adidiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Tsarovy aho noho izany, ry Andriamanitra ô! Ka aza kosehina ny soa vitako momba ny tranonao sy momba ny fanompoam-pivavahana.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin’izay koa no nahitako ny olona sasany tao Joda nanosihosy famiazam-boaloboka tamin’ny andro '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabata
  - type: text
    text: ; nisy nitaona amboaram-bary, nampitondra entana ny borikiny aza, dia divay sy voaloboka sy aviavy ary entana isan-karazany, mba hoentina any Jerosalema amin’ny andro sabata; dia nananatra azy mafy aho ny amin’izany andro ivarotany entana izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 20.8-10; Deot 5.12-14; Jer 17.21-22. –ny amin’izany andro ivarotany... dkt hafa tamin’izany andro nivarotany...
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nisy Tirianina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tirianina: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: noho izy mpiantsambo, dia nirona ho azy tamin’ny varotra trondro.
    marker-yv: yv-n
  - type: text
    text: ' nonina tao Jerosalema, izay nitondra trondro sy entam-barotra isan-karazany hamidy andro sabata amin’ny mponin’i Jerosalema sy i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nifandahatra tamin’ireo loholon’i Joda aho ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Inona izao zava-dratsy ataonareo izao, no dia tsy hajainareo ny andro sabata? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nanao ratsy toy izao ny razanareo ka dia nahatran’Andriamanitsika amintsika sy amin’ity tanàna ity izao loza rehetra izao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izao loza rehetra izao: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia ny fandravana ny tanàna sy ny fanaovana ny sesitany ny mponina.
    marker-yv: yv-n
  - type: text
    text: ' Ianareo kosa, noho ny tsy anajanareo ny sabata, dia efa mampitombo ny fahatezeran’Andriamanitra amin’i Israely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Taorian’izany, raha vao maizimaizina teo amin’ny vavahadin’i Jerosalema alohan’ny sabata,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'sabata: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia manomboka amin’ny filentehan’ny masoandro, izany hoe ny zoma amin’ny enina ora hariva eo ho eo, ary mifarana ny Sabotsy amin’izany ora izany ihany.
    marker-yv: yv-n
  - type: text
    text: ' dia nasaiko nohidiana ny vavahady ka tsy navelako hovohana raha tsy efa tapitra ny sabata; ary notendreko ny zatovo sasany mpiara-miasa amiko hiambina teo am-bavahady mba tsy hampidirana entana amin’ny andro sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ka dia tafandry nilafika teo ivelan’i Jerosalema, indray mandeha na indroa, ny mpandranto sy ny mpivarotra zavatra samy hafa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy afaka mivarotra ao anaty tanàna amin’ny andro sabata ireo mpivarotra ka dia teo ivelan’ny manda no nanokona tsena ivarotana ny entany.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia nananatra azy mafy aho ka nanao taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Nahoana ianareo no mandry eto anoloan’ny manda? Raha mbola manao izany ianareo, dia asaiko samborina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa nanomboka tamin’io andro io, dia tsy tonga tamin’ny sabata intsony ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nasaiko '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nidio
  - type: text
    text: ' tena ny levita ka ho avy hiambina eo am-bavahady, mba hanokanana ny andro sabata ho an’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Tsarovy aho noho izany koa, ry Andriamanitro ô; ary iantrao aho fa be indrafo ianao!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tamin’izany fotoanandro izany, dia hitako fa nisy Jiosy efa nanambady vehivavy asdôdita sy hamônita ary môabita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba ny Asdôdita sy ny Hamônita, jereo 4.1 sy nta; ny Môabita dia nonina tamin’iny faritany atsinanan’ny Ranomasina Maty iny.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny antsasaky ny zanak’ireo dia nampiasa ny fiteny asdôdita, ny sasany kosa nanaraka ny fiteny isam-pireneny avy, fa tsy nahay ny fiteny jiosy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nifandahatra tamin’ireo lehilahy ireo aho ka nanozona azy; nokapohiko aza ny sasany ary norombotako ny volon-dohany. Dia nampianiana azy tamin’Andriamanitra aho mba tsy hanome ny zanakavaviny ho vadin’ny hafa firenena, ary mba tsy haka ny zanakavavin’ny hafa firenena ho vadin’ny tenany na ny zanakalahiny; sady hoy aho hoe:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'And 23-25:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Eks 34.11-16; Deot 7.1-5.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: –Tsy izany ve no nanotan’i Salômôna mpanjakan’i Israely? Kanefa tsy nisy mpanjaka tahaka azy, teo amin’ny firenena maro. Fa notiavin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'notiavin’Andriamanitra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 2 Sam 12.24-25. –nampanotain’ny... firenena: jereo 1 Mp 11.1-8.'
    marker-yv: yv-n
  - type: text
    text: ' izy ka nataony ho mpanjakan’i Israely manontolo; kanjo, na dia izy aza, dia nampanotain’ny vehivavy hafa firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Koa mety ve raha ianareo no re fa manao izao haratsiana lehibe izao ka manota amin’Andriamanitsika, satria vehivavy hafa firenena no alainareo ho vadinareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny anankiray tamin’ny zanakalahin’i Jôiadà sady zafin’i Eliasiba mpisorombe dia vinantolahin’i Sanebalato ilay Hôrônita, ka dia noroahiko niala tao Jerosalema
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2.10; 3.33.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: «Tsarovy ireo, ry Andriamanitro ô, satria nanala baràka ny fisoronana sady nanazimba ny fanekempihavananao tamin’ny mpisorona sy ny levita.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toy izany no nanadiovako ny Jiosy ho afaka tamin’ny olona hafa firenena rehetra sy namerenako tamin’ny laoniny indray ny fandaharana momba ny mpisorona sy ny levita mba samy ho amin’ny anjara raharahany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Naveriko tamin’ny laoniny ihany koa ny fanaterana kitay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fanaterana kitay: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jereo 10.35 sy nta. –ka hasaovy: dkt hafa noho ny soa vitako.'
    marker-yv: yv-n
  - type: text
    text: ' araka ny fotoanandro voatondro sy ny fanaterana voaloham-bokatra.'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Tsarovy aho ka hasoavy, ry Andriamanitro ô!»
