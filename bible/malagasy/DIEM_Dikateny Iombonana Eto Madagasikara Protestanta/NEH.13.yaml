document_id: NEH.13,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanitsiana isan-karazany notontosain’i Nehemià
  - type: text
    content: 'Tamin’izany fotoanandro izany, dia novakîna ho ren’ny vahoaka ny teny raketin’ny bokin’i Mosesy; ka hita voasoratra tao fa ny Hamônita sy ny Môabita dia tsy mahazo miditra amin’ny fiangonan’Andriamanitra na oviana na oviana. '
  '10':
  - type: text
    content: Reko ihany koa fa tsy voaloa ny fiveloman’ny levita; ka dia samy efa nandositra ho any an-tsahany avy ireo levita, toy izay hanao ny raharaha fanompoany. Toy izany koa no nihatra tamin’ny mpihira
  - type: note
    content: Jereo Deot 12.19
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Dia nifandahatra tamin’ny mpanapaka aho ka nanao hoe:'
  - type: text
    content: –Nahoana no dia navela hilaozana ny tranon’Andriamanitra?
  - type: text
    content: 'Dia namory ny levita sy ny mpihira aho ka nametraka azy teo amin’ny anjara toerany avy; '
  '12':
  - type: text
    content: ny Jiosy rehetra kosa nitondra ny ampahafolon’ny vary sy divay ary menaka ho ao an-trano fitehirizana
  - type: note
    content: Jereo Mal 3.10
  - type: text
    content: '. '
  '13':
  - type: text
    content: Ary notendreko ho mpitandrina ny trano fitehirizana i Selemià mpisorona sy i Tsadôka mpitan-tsoratra ary i Pedaià levita; ary nataoko mpanampy azy telo lahy i Hanàna zanakalahin’i Zakora sady zafin’i Matanià. Hita toetra ho mahatoky manko ireo; ary ny hanao ny fizaràna ho an’ireo namany no adidiny.
  '14':
  - type: text
    content: «Tsarovy aho noho izany, ry Andriamanitra ô! Ka aza kosehina ny soa vitako momba ny tranonao sy momba ny fanompoam-pivavahana.»
  '15':
  - type: text
    content: 'Tamin’izay koa no nahitako ny olona sasany tao Joda nanosihosy famiazam-boaloboka tamin’ny andro '
  - type: text
    content: sabata
  - type: text
    content: ; nisy nitaona amboaram-bary, nampitondra entana ny borikiny aza, dia divay sy voaloboka sy aviavy ary entana isan-karazany, mba hoentina any Jerosalema amin’ny andro sabata; dia nananatra azy mafy aho ny amin’izany andro ivarotany entana izany
  - type: note
    content: Jereo Eks 20.8-10; Deot 5.12-14; Jer 17.21-22. –ny amin’izany andro ivarotany... dkt hafa tamin’izany andro nivarotany...
  - type: text
    content: '. '
  '16':
  - type: text
    content: Nisy Tirianina
  - type: note
    content: 'Tirianina: noho izy mpiantsambo, dia nirona ho azy tamin’ny varotra trondro.'
  - type: text
    content: ' nonina tao Jerosalema, izay nitondra trondro sy entam-barotra isan-karazany hamidy andro sabata amin’ny mponin’i Jerosalema sy i Joda. '
  '17':
  - type: text
    content: 'Dia nifandahatra tamin’ireo loholon’i Joda aho ka nanao taminy hoe:'
  - type: text
    content: '–Inona izao zava-dratsy ataonareo izao, no dia tsy hajainareo ny andro sabata? '
  '18':
  - type: text
    content: Nanao ratsy toy izao ny razanareo ka dia nahatran’Andriamanitsika amintsika sy amin’ity tanàna ity izao loza rehetra izao.
  - type: note
    content: 'Izao loza rehetra izao: dia ny fandravana ny tanàna sy ny fanaovana ny sesitany ny mponina.'
  - type: text
    content: ' Ianareo kosa, noho ny tsy anajanareo ny sabata, dia efa mampitombo ny fahatezeran’Andriamanitra amin’i Israely.'
  '19':
  - type: text
    content: Taorian’izany, raha vao maizimaizina teo amin’ny vavahadin’i Jerosalema alohan’ny sabata,
  - type: note
    content: 'sabata: dia manomboka amin’ny filentehan’ny masoandro, izany hoe ny zoma amin’ny enina ora hariva eo ho eo, ary mifarana ny Sabotsy amin’izany ora izany ihany.'
  - type: text
    content: ' dia nasaiko nohidiana ny vavahady ka tsy navelako hovohana raha tsy efa tapitra ny sabata; ary notendreko ny zatovo sasany mpiara-miasa amiko hiambina teo am-bavahady mba tsy hampidirana entana amin’ny andro sabata. '
  '2':
  - type: text
    content: 'Tsy mba nitsena sakafo sy rano ny Israelita manko ry zareo, fa nanamby an’i Balahama hanozona azy; kanjo nampodîn’Andriamanitsika ho '
  - type: text
    content: fitahiana
  - type: text
    content: ' kosa ny fanozonana. '
  '20':
  - type: text
    content: Ka dia tafandry nilafika teo ivelan’i Jerosalema, indray mandeha na indroa, ny mpandranto sy ny mpivarotra zavatra samy hafa
  - type: note
    content: Tsy afaka mivarotra ao anaty tanàna amin’ny andro sabata ireo mpivarotra ka dia teo ivelan’ny manda no nanokona tsena ivarotana ny entany.
  - type: text
    content: '; '
  '21':
  - type: text
    content: 'dia nananatra azy mafy aho ka nanao taminy hoe:'
  - type: text
    content: –Nahoana ianareo no mandry eto anoloan’ny manda? Raha mbola manao izany ianareo, dia asaiko samborina.
  - type: text
    content: 'Koa nanomboka tamin’io andro io, dia tsy tonga tamin’ny sabata intsony ireo. '
  '22':
  - type: text
    content: 'Ary nasaiko '
  - type: text
    content: nidio
  - type: text
    content: ' tena ny levita ka ho avy hiambina eo am-bavahady, mba hanokanana ny andro sabata ho an’Andriamanitra.'
  - type: text
    content: «Tsarovy aho noho izany koa, ry Andriamanitro ô; ary iantrao aho fa be indrafo ianao!»
  '23':
  - type: text
    content: Tamin’izany fotoanandro izany, dia hitako fa nisy Jiosy efa nanambady vehivavy asdôdita sy hamônita ary môabita
  - type: note
    content: Momba ny Asdôdita sy ny Hamônita, jereo 4.1 sy nta; ny Môabita dia nonina tamin’iny faritany atsinanan’ny Ranomasina Maty iny.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ny antsasaky ny zanak’ireo dia nampiasa ny fiteny asdôdita, ny sasany kosa nanaraka ny fiteny isam-pireneny avy, fa tsy nahay ny fiteny jiosy intsony. '
  '25':
  - type: text
    content: 'Dia nifandahatra tamin’ireo lehilahy ireo aho ka nanozona azy; nokapohiko aza ny sasany ary norombotako ny volon-dohany. Dia nampianiana azy tamin’Andriamanitra aho mba tsy hanome ny zanakavaviny ho vadin’ny hafa firenena, ary mba tsy haka ny zanakavavin’ny hafa firenena ho vadin’ny tenany na ny zanakalahiny; sady hoy aho hoe:'
  - type: note
    content: 'And 23-25: jereo Eks 34.11-16; Deot 7.1-5.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: –Tsy izany ve no nanotan’i Salômôna mpanjakan’i Israely? Kanefa tsy nisy mpanjaka tahaka azy, teo amin’ny firenena maro. Fa notiavin’Andriamanitra
  - type: note
    content: 'notiavin’Andriamanitra: jereo 2 Sam 12.24-25. –nampanotain’ny... firenena: jereo 1 Mp 11.1-8.'
  - type: text
    content: ' izy ka nataony ho mpanjakan’i Israely manontolo; kanjo, na dia izy aza, dia nampanotain’ny vehivavy hafa firenena. '
  '27':
  - type: text
    content: Koa mety ve raha ianareo no re fa manao izao haratsiana lehibe izao ka manota amin’Andriamanitsika, satria vehivavy hafa firenena no alainareo ho vadinareo?
  '28':
  - type: text
    content: Ny anankiray tamin’ny zanakalahin’i Jôiadà sady zafin’i Eliasiba mpisorombe dia vinantolahin’i Sanebalato ilay Hôrônita, ka dia noroahiko niala tao Jerosalema
  - type: note
    content: Jereo 2.10; 3.33.
  - type: text
    content: .
  '29':
  - type: text
    content: «Tsarovy ireo, ry Andriamanitro ô, satria nanala baràka ny fisoronana sady nanazimba ny fanekempihavananao tamin’ny mpisorona sy ny levita.»
  '3':
  - type: text
    content: Koa rehefa ren’ny vahoaka ny lalàna, dia navahana tsy ho anisan’ny Israelita ny olona hafa firenena rehetra.
  '30':
  - type: text
    content: 'Toy izany no nanadiovako ny Jiosy ho afaka tamin’ny olona hafa firenena rehetra sy namerenako tamin’ny laoniny indray ny fandaharana momba ny mpisorona sy ny levita mba samy ho amin’ny anjara raharahany avy. '
  '31':
  - type: text
    content: Naveriko tamin’ny laoniny ihany koa ny fanaterana kitay
  - type: note
    content: 'fanaterana kitay: jereo 10.35 sy nta. –ka hasaovy: dkt hafa noho ny soa vitako.'
  - type: text
    content: ' araka ny fotoanandro voatondro sy ny fanaterana voaloham-bokatra.'
  - type: text
    content: «Tsarovy aho ka hasoavy, ry Andriamanitro ô!»
  '4':
  - type: text
    content: Talohan’izany i Eliasiba mpisorona no voatendry ho mpiandraikitra ny efitrano fanampiny ao an-
  - type: text
    content: tranon’Andriamanitra
  - type: text
    content: '. Noho izy mpihavana akaiky tamin’i Tôbià, '
  '5':
  - type: text
    content: 'dia nanomanany efitrano lehibe io Tôbià io, dia ilay efitrano nitehirizana hatrizay ny fanatitra vokatry ny tany sy ny '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ary ny fanaka mbamin’ny ampahafolon’ny vary sy divay ary menaka; tao koa no nitehirizana ny fanatitra voatokana ho an’ny '
  - type: text
    content: levita
  - type: text
    content: ' sy ny mpihira ary ny mpiandry varavarana mbamin’ny fanatitra navahana ho an’ny '
  - type: text
    content: mpisorona
  - type: text
    content: .
  '6':
  - type: text
    content: 'Saingy, tamin’izany rehetra izany, dia tsy mba tany Jerosalema aho; satria niverina tany amin’i Artakserksesa amperôran’i Babilôna aho tamin’ny taona faha-32 nanjakany. Nony taoriandriana kely, dia nahazo lalana tamin’ny amperôra aho '
  '7':
  - type: text
    content: 'mba hankany Jerosalema indray; ka hitako tao ny ratsy afitsok’i Eliasiba tamin’ny nanomanany efitrano ho an’i Tôbià, teo anatin’ny kianjan’ny tranon’Andriamanitra. '
  '8':
  - type: text
    content: 'Dia tezitra mafy aho ka natsipiko tany ivelan’ny efitrano ireo fanaka rehetra izay an’i Tôbià. '
  '9':
  - type: text
    content: Ary nasaiko nodiovin’ny olona ilay efitrano, dia naveriko tao indray ny fanaky ny tranon’Andriamanitra mbamin’ny fanatitra vokatry ny tany sy ny ditin-kazo manitra.
