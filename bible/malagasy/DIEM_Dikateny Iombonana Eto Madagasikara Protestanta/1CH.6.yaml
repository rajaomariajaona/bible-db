    marker-yv: yv-n
  - type: text
    text: ' dia i Gersôna sy i Kehata ary i Merarỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ireto avy no anaran’ny zanakalahin’i Gersôna: i Libnỳ sy i Simehỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin’i Kehata dia i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireto ny tarika ao anatin’ny fokon’i Levỳ, araka ny razana nipoirany:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy amin’i Gersôna; i Libnỳ zanakalahin’i Gersôna, i Jahata zanakalahin’i Libnỳ, i Zimà zanakalahin’i Jahata, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: i Jôà zanakalahin’i Zimà, i Hidao zanakalahin’i Jôà, i Zera zanakalahin’i Hidao, ary i Jeôtray zanakalahin’i Zera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Taranak’i Kehata: i Jitsehara'
  - type: usfm
