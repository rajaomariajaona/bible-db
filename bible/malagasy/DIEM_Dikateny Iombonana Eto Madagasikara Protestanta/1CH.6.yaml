        text: '6.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jitsehara: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Haminadaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' araka ny RM, kanefa jereo 6.23.'
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Kehata, i Kôra zanakalahin’i Jitsehara, i Asiry zanakalahin’i Kôra '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'i Elkanà zanakalahin’i Asiry, i Abiasafa zanakalahin’i Elkanà, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: i Tahata zanakalahin’i Abiasafa, i Oriela zanakalahin’i Tahata, i Hozià zanakalahin’i Oriela, ary i Saoly zanakalahin’i Ozià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Taranak’i Elkanà: i Hamasay sy i Mahata mirahalahy, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia i Elkanà zanakalahin’i Mahata, i Tsofo zanakalahin’i Elkanà, i Tôa zanakalahin’i Tsofo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Misy tsy mazava ny RM eto, ka dkt araka ny 6.20 no natao. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '–i Tôa... Tsofo: i Nahata zanakalahin’i Tsôfay'
    - type: usfm
      marker: ft
      children:
      - type: text
