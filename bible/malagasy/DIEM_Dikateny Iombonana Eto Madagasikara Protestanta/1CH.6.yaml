document_id: 1CH.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Taranaka hafa avy amin’i Levỳ
  - type: text
    content: Ny zanakalahin’i Levỳ
  - type: note
    content: 'Ao amin’ny dkt sasantsasany, dia voalahatra ho 6.16-81 ny 6.1-66 (jereo ny naoty etsy aloha). –and 1-4: jereo Eks 6.16-19; Nom 3.17-20.'
  - type: text
    content: ' dia i Gersôna sy i Kehata ary i Merarỳ. '
  '10':
  - type: text
    content: 'Taranak’i Elkanà: i Hamasay sy i Mahata mirahalahy, '
  '11':
  - type: text
    content: dia i Elkanà zanakalahin’i Mahata, i Tsofo zanakalahin’i Elkanà, i Tôa zanakalahin’i Tsofo
  - type: note
    content: 'Misy tsy mazava ny RM eto, ka dkt araka ny 6.20 no natao. –i Tôa... Tsofo: i Nahata zanakalahin’i Tsôfay araka ny RM, kanefa jereo 6.19-20 sy 1 Sam 1.1.'
  - type: text
    content: ', '
  '12':
  - type: text
    content: i Eliela zanakalahin’i Tôa, i Jerôhama zanakalahin’i Eliela, (ary i Samoela zanakalahin’i Jerôhama
  - type: note
    content: 'Eliela: Eliaba araka ny RM, kanefa jereo 6.19. –ary i Samoela... Jerôhama: fanampiny hita ao amin’ny stf grika anankiray.'
  - type: text
    content: '). '
  '13':
  - type: text
    content: Ny zanakalahin’i Samoela dia i Jôela ny zokiny ary i Abià ny zandriny
  - type: note
    content: Ity and ity dia voadika araka ny 1 Sam 8.2 sy araka ny dkt grika tranainy. Tsy mazava loatra eto ny RM izay azo adika tokoa hoe Ny zanakalahin’i Samoela lahimatoa dia i Vasnỳ sy i Abià, kanefa jereo 6.18.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Taranak’i Merarỳ: i Mahilỳ zanakalahin’i Merarỳ, i Libnỳ zanakalahin’i Mahilỳ, i Simehỳ zanakalahin’i Libnỳ, i Hozà zanakalahin’i Simehỳ, '
  '15':
  - type: text
    content: i Simehà zanakalahin’i Hozà, i Hagià zanakalahin’i Simehà, ary i Hasaià zanakalahin’i Hagià.
  '16':
  - type: text
    content: Taranak’i Levỳ no voatendrin’i Davida hihira tao an-
  - type: text
    content: tranon’ny TOMPO
  - type: text
    content: ', niantomboka hatramin’ny nametrahana tao ilay '
  - type: text
    content: Vatamasina mirakitra ny fanekempihavanana
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ambara-panorin’i Salômôna ny tranon’ny TOMPO tao Jerosalema, dia nanao ny raharahan’ny mpihira teo anoloan’ny tranolay atao hoe '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' ireo, ary nanatontosa ny fanompoany araka ny filaharany avy.'
  '18':
  - type: text
    content: 'Ireto àry no mpanatontosa izany fanompoana izany ombàn’ny antokom-pihirany:'
  - type: text
    content: 'Avy amin’ny taranak’i Kehata: i Hemàna mpiventy hira, zanakalahin’i Jôela sy zafin’i Samoela '
  '19':
  - type: text
    content: 'sy zafiafin’i Elkanà sy zafin-dohalik’i Jerôhama sy zafin-kitrokelin’i Eliela sy zafim-paladian’i Tôa '
  '2':
  - type: text
    content: 'Ireto avy no anaran’ny zanakalahin’i Gersôna: i Libnỳ sy i Simehỳ. '
  '20':
  - type: text
    content: 'ary zafin-dorian’i Tsofo, dia i Tsofo zanakalahin’i Elkanà sy zafin’i Mahata sy zafiafin’i Hamasay '
  '21':
  - type: text
    content: 'sy zafin-dohalik’i Elkanà sy zafin-kitrokelin’i Jôela sy zafim-paladian’i Hazarià ary zafin-dorian’i Tsefanià, '
  '22':
  - type: text
    content: 'dia i Tsefanià zanakalahin’i Tahata sy zafin’i Asiry sy zafiafin’i Abiasafa sy zafin-dohalik’i Kôra '
  '23':
  - type: text
    content: sy zafin-kitrokelin’i Jitsehara sy zafim-paladian’i Kehata ary zafin-dorian’i Levỳ, dia i Levỳ zanakalahin’i Jakôba.
  '24':
  - type: text
    content: 'Teo ankavanan’i Hemàna no nipetrahan’i Asafa mpiventy hira namany. I Asafa dia zanakalahin’i Berekià sy zafin’i Simehà '
  '25':
  - type: text
    content: 'sy zafiafin’i Mikaela sy zafin-dohalik’i Bahaseià sy zafin-kitrokelin’i Malkià '
  '26':
  - type: text
    content: 'sy zafim-paladian’i Jeôtray ary zafin-dorian’i Zera, dia i Zera zanakalahin’i Hadaià '
  '27':
  - type: text
    content: 'sy zafin’i Etàna sy zafiafin’i Zimà sy zafin-dohalik’i Simehỳ '
  '28':
  - type: text
    content: sy zafin-kitrokelin’i Jahata sy zafim-paladian’i Gersôna ary zafin-dorian’i Levỳ.
  '29':
  - type: text
    content: 'Teo ankavian’i Hemàna kosa i Etàna mpiventy hira naman-dry i Hemàna sy i Asafa. Avy amin’ny taranak’i Merarỳ izy, fa zanakalahin’i Kisy sy zafin’i Habdỳ sy zafiafin’i Malòka '
  '3':
  - type: text
    content: 'Ny zanakalahin’i Kehata dia i Hamrama sy i Jitsehara ary i Hebrôna sy i Hoziela. '
  '30':
  - type: text
    content: 'sy zafin-dohalik’i Hasabià sy zafin-kitrokelin’i Amatsià sy zafim-paladian’i Hilkià '
  '31':
  - type: text
    content: 'sy zafin-dorian’i Ametsỳ, dia i Ametsỳ zanakalahin’i Banỳ sy zafin’i Semera '
  '32':
  - type: text
    content: sy zafiafin’i Mahilỳ sy zafin-dohalik’i Mosỳ sy zafin-kitrokelin’i Merarỳ ary zafim-paladian’i Levỳ.
  '33':
  - type: text
    content: Ary ny levîta naman’ireo no nanankinana ny fanompoana hafa rehetra momba ny Tranolay fihaonana, tao an-tranon’Andriamanitra.
  '34':
  - type: text
    content: 'I Aharôna sy ny taranany no mampanetona ny '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo eo ambony alitara fisoronana sy mampanetona ny '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' eo ambony '
  - type: text
    content: alitara
  - type: text
    content: ' fandoroana azy; ka nanatanteraka ny raharaha rehetra tao amin’ny Toeramasina Indrindra izy ireo ary nanao ny fombam-pivavahana famelan-keloka ho an’ny vahoaka Israely, araka izay rehetra nandidian’i Mosesy mpanompon’Andriamanitra. '
  '35':
  - type: text
    content: Ireto avy ny taranak’i Aharôna
  - type: note
    content: 'And 35-38: ampit 5.30-34.'
  - type: text
    content: ': i Elehazara zanakalahin’i Aharôna, i Pinehasa zanakalahin’i Elehazara, i Abisoa zanakalahin’i Pinehasa, '
  '36':
  - type: text
    content: 'i Bokỳ zanakalahin’i Abisoa, i Hozỳ zanakalahin’i Bokỳ, i Zerahià zanakalahin’i Hozỳ, '
  '37':
  - type: text
    content: 'i Meraiôta zanakalahin’i Zerahià, i Amarià zanakalahin’i Meraiôta, i Ahitoba zanakalahin’i Amarià, '
  '38':
  - type: text
    content: i Tsadôka zanakalahin’i Ahitoba, ary i Ahimahatsa zanakalahin’i Tsadôka.
  - type: heading
    content: Ireo tanàna nomena ho fonenan’ny taranak’i Levỳ.
  '39':
  - type: text
    content: Ireto
  - type: note
    content: 'And 39-45: ampit Jos 21.10-19; and 46-48: ampit Jos 21.5-8; and 51-66: ampit Jos 21.20-39.'
  - type: text
    content: ' no fonenan’ny taranak’i Levỳ, araka ny toerana nisy azy tao amin’ny zara taniny avy. Ny taranak’i Aharôna, avy amin’ny tarik’i Kehata, no voatendrin’ny antsapaka ho voalohany, '
  '4':
  - type: text
    content: Ny zanakalahin’i Merarỳ dia i Mahilỳ sy i Mosỳ.
  - type: text
    content: 'Ireto ny tarika ao anatin’ny fokon’i Levỳ, araka ny razana nipoirany:'
  '40':
  - type: text
    content: 'ka dia nomena ny tanàna Hebrôna mbamin’ny kijàna manodidina azy tao amin’ny Joda; '
  '41':
  - type: text
    content: fa ny saha sy ny tanàna kely miankina amin’i Hebrôna kosa efa nomena an’i Kaleba zanakalahin’i Jefonè
  - type: note
    content: Jereo Jos 14.13-14.
  - type: text
    content: '. '
  '42':
  - type: text
    content: Ny nomena ny taranak’i Aharôna dia ireto tanàna fialofana
  - type: note
    content: 'tanàna fialofana: raha misy nahafaty olona tsy nahy, dia afaka mialokaloka any amina tanàna fialofana iray toy ireny izy mba tsy hiharan’ny valifaty (jereo Jos 21.1-9).'
  - type: text
    content: ' ireto: i Hebrôna sy i Libnà, i Jatîra sy i Estemôa, i Hilèna sy i Debira ary i Hasàna, sy i Bety-Semesy mbamin’ny kijàna samy manodidina azy; '
  '45':
  - type: text
    content: ny avy tamin’ny fokon’i Benjamîna dia i Geba sy i Halemeta ary i Hanatôta mbamin’ny kijàna samy manodidina azy. Dia 13
  - type: note
    content: Tanàna 11 ihany no voatanisa amin’ity lisitra ity (and 42-45); ny lisitra ao amin’ny Jos 21.16-17 manampy ny hoe Jotà sy Gibehôna.
  - type: text
    content: izany no isan’ny tanàna rehetra anjaran’ny taranak’i Aharôna araka ny fianakaviany avy.
  '46':
  - type: text
    content: 'Ny an’ny taranak’i Kehata sisa, araka ny fianakaviany avy, dia tanàna folo no azony tamin’ny antsapaka: ireo tanàna ireo dia avy tamin’ny fokon’i Efraîma sy ny fokon’i Dana ary ny antsasa-pokon’i Manase'
  - type: note
    content: Tsy mazava ny RM; ka eto amin’ity and ity ny dkt dia namboarina kely araka ny Jos 21.5.
  - type: text
    content: '. '
  '47':
  - type: text
    content: 'Ny an’i taranak’i Gersôna, araka ny fianakaviany avy, dia tanàna 13 no azony tamin’ny antsapaka: ireo tanàna ireo dia avy tamin’ny fokon’i Jisakara sy ny fokon’i Asera ary ny fokon’i Naftalỳ mbamin’ny antsasa-pokon’i Manase any '
  - type: text
    content: Basàna
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Ny taranak’i Merarỳ, araka ny fianakaviany avy, dia tanàna 12 no azony tamin’ny antsapaka: ireo tanàna ireo dia avy tamin’ny fokon’i Reobena sy ny fokon’i Gada ary ny fokon’i Zebolòna. '
  '49':
  - type: text
    content: 'Nomen’ny Israelita ho an’ny Levita ireo tanàna ireo sy ny kijàna samy manodidina azy. '
  '5':
  - type: text
    content: 'Avy amin’i Gersôna; i Libnỳ zanakalahin’i Gersôna, i Jahata zanakalahin’i Libnỳ, i Zimà zanakalahin’i Jahata, '
  '50':
  - type: text
    content: Tamin’ny antsapaka ihany koa no nanomezana ireo tanàna avy tamin’ny fokon’i Joda sy ny fokon’i Simehôna ary ny fokon’i Benjamîna, dia ireo tanàna efa voatanisa etsy aloha.
  '51':
  - type: text
    content: 'Ho an’ireo fianakaviana sasany anisan’ny taranak’i Kehata, dia nisy tanàna ho faritra fonenany avy tamin’ny fokon’i Efraîma; '
  '52':
  - type: text
    content: 'ka nomena azy ireto tanàna fialofana ireto: dia i Sekema, teo amin’ny tendrombohitr’i Efraîma, i Gezera sy i Jôknehama, i Bety-Hôrôna sy i Aialôna'
  - type: note
    content: 'Alohan’ny hoe Aialôna, araka ny Jos 21.23 izay mifandraika amin’ity and ity, dia mbola ahitàna hoe tanàna avy tamin’ny fokon’i Dana: dia i Eltekè, i Gibetôna; izay vao hita tsara ny foko telo sy ny tanàna folo voatanisa ao amin’ny Jos 21.5 (jereo ny naoty z etsy aloha).'
  - type: text
    content: ' ary i Gata-Rimôna mbamin’ny kijàna samy manodidina azy; '
  '55':
  - type: text
    content: ny tanàna avy tamin’ny antsasa-pokon’i Manase kosa, izany hoe i Tahanàka sy i Jiblehama mbamin’ny kijàna samy manodidina azy, dia nomena an’ireo fianakaviana sisa anisan’ny taranak’i Kehata.
  '56':
  - type: text
    content: Ho an’ny taranak’i Gersôna, araka ny fianakaviany avy, dia nisy tanàna
  - type: note
    content: Tsy mazava ny RM eto amin’ny fiandohan’ity and ity, ary ny dkt dia notakarina avy amin’ny fiandohan’ny 6.47 izay mifandraidraika aminy.
  - type: text
    content: ' avy tamin’ny antsasa-pokon’i Manase: dia i Gôlàna any Basàna sy i Hastarôta mbamin’ny kijàna samy manodidina azy; '
  '57':
  - type: text
    content: 'nisy avy tamin’ny fokon’i Jisakara: dia i Kisiôna sy i Daberata ary i Ramôta sy i Hanema mbamin’ny kijàna samy manodidina azy; '
  '59':
  - type: text
    content: 'avy tamin’ny fokon’i Asera: dia i Masala sy i Habdôna ary i Hokôta sy i Rehôta mbamin’ny kijàna samy manodidina azy; '
  '6':
  - type: text
    content: i Jôà zanakalahin’i Zimà, i Hidao zanakalahin’i Jôà, i Zera zanakalahin’i Hidao, ary i Jeôtray zanakalahin’i Zera.
  '61':
  - type: text
    content: 'nisy avy tamin’ny fokon’i Naftalỳ: dia i Kedesa any Galilea sy i Hamôsa ary i Kiriataîma mbamin’ny kijàna samy manodidina azy.'
  '62':
  - type: text
    content: 'Ho an’ireo taranak’i Merarỳ, izany hoe ny Levita sisa, dia nisy tanàna avy tamin’ny fokon’i Zebolòna: dia i Rimôna sy i Tabôra mbamin’ny kijàna samy manodidina azy; '
  '63':
  - type: text
    content: 'nisy avy tamin’ny fokon’i Reobena, eny andafy atsinanan’i Jôrdàna tandrifin’i Jerikao: dia i Betsera any an-taniefitra sy i Jahatsa ary i Kedemôta sy i Mefahata mbamin’ny kijàna samy manodidina azy; '
  '65':
  - type: text
    content: 'nisy avy tamin’ny fokon’i Gada: dia i Ramôta any Gilehada sy i Mahanaîma ary i Hesbôna sy i Jahizera mbamin’ny kijàna samy manodidina azy.'
  '7':
  - type: text
    content: 'Taranak’i Kehata: i Jitsehara'
  - type: note
    content: 'Jitsehara: Haminadaba araka ny RM, kanefa jereo 6.23.'
  - type: text
    content: ' zanakalahin’i Kehata, i Kôra zanakalahin’i Jitsehara, i Asiry zanakalahin’i Kôra '
  '8':
  - type: text
    content: 'i Elkanà zanakalahin’i Asiry, i Abiasafa zanakalahin’i Elkanà, '
  '9':
  - type: text
    content: i Tahata zanakalahin’i Abiasafa, i Oriela zanakalahin’i Tahata, i Hozià zanakalahin’i Oriela, ary i Saoly zanakalahin’i Ozià.
