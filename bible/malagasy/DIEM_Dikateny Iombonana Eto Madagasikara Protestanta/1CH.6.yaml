    marker-yv: yv-n
  - type: text
    text: ' no fonenan’ny taranak’i Levỳ, araka ny toerana nisy azy tao amin’ny zara taniny avy. Ny taranak’i Aharôna, avy amin’ny tarik’i Kehata, no voatendrin’ny antsapaka ho voalohany, '
  - type: usfm
