      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ao amin’ny dkt sasantsasany, dia voalahatra ho 6.16-81 ny 6.1-66 (jereo ny naoty etsy aloha). '
    - type: usfm
      marker: bd
      children:
      - type: text
