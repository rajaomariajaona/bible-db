        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ity and ity dia voadika araka ny 1 Sam 8.2 sy araka ny dkt grika tranainy. Tsy mazava loatra eto ny RM izay azo adika tokoa hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny zanakalahin’i Samoela lahimatoa dia i Vasnỳ sy i Abià
    - type: usfm
