    children:
    - type: text
      text: '14'
  - type: text
    text: 'Taranak’i Merarỳ: i Mahilỳ zanakalahin’i Merarỳ, i Libnỳ zanakalahin’i Mahilỳ, i Simehỳ zanakalahin’i Libnỳ, i Hozà zanakalahin’i Simehỳ, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: i Simehà zanakalahin’i Hozà, i Hagià zanakalahin’i Simehà, ary i Hasaià zanakalahin’i Hagià.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Taranak’i Levỳ no voatendrin’i Davida hihira tao an-
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ny TOMPO
  - type: text
    text: ', niantomboka hatramin’ny nametrahana tao ilay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina mirakitra ny fanekempihavanana
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ambara-panorin’i Salômôna ny tranon’ny TOMPO tao Jerosalema, dia nanao ny raharahan’ny mpihira teo anoloan’ny tranolay atao hoe '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' ireo, ary nanatontosa ny fanompoany araka ny filaharany avy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ireto àry no mpanatontosa izany fanompoana izany ombàn’ny antokom-pihirany:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Avy amin’ny taranak’i Kehata: i Hemàna mpiventy hira, zanakalahin’i Jôela sy zafin’i Samoela '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sy zafiafin’i Elkanà sy zafin-dohalik’i Jerôhama sy zafin-kitrokelin’i Eliela sy zafim-paladian’i Tôa '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary zafin-dorian’i Tsofo, dia i Tsofo zanakalahin’i Elkanà sy zafin’i Mahata sy zafiafin’i Hamasay '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sy zafin-dohalik’i Elkanà sy zafin-kitrokelin’i Jôela sy zafim-paladian’i Hazarià ary zafin-dorian’i Tsefanià, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'dia i Tsefanià zanakalahin’i Tahata sy zafin’i Asiry sy zafiafin’i Abiasafa sy zafin-dohalik’i Kôra '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: sy zafin-kitrokelin’i Jitsehara sy zafim-paladian’i Kehata ary zafin-dorian’i Levỳ, dia i Levỳ zanakalahin’i Jakôba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo ankavanan’i Hemàna no nipetrahan’i Asafa mpiventy hira namany. I Asafa dia zanakalahin’i Berekià sy zafin’i Simehà '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'sy zafiafin’i Mikaela sy zafin-dohalik’i Bahaseià sy zafin-kitrokelin’i Malkià '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'sy zafim-paladian’i Jeôtray ary zafin-dorian’i Zera, dia i Zera zanakalahin’i Hadaià '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'sy zafin’i Etàna sy zafiafin’i Zimà sy zafin-dohalik’i Simehỳ '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: sy zafin-kitrokelin’i Jahata sy zafim-paladian’i Gersôna ary zafin-dorian’i Levỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Teo ankavian’i Hemàna kosa i Etàna mpiventy hira naman-dry i Hemàna sy i Asafa. Avy amin’ny taranak’i Merarỳ izy, fa zanakalahin’i Kisy sy zafin’i Habdỳ sy zafiafin’i Malòka '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sy zafin-dohalik’i Hasabià sy zafin-kitrokelin’i Amatsià sy zafim-paladian’i Hilkià '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy zafin-dorian’i Ametsỳ, dia i Ametsỳ zanakalahin’i Banỳ sy zafin’i Semera '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: sy zafiafin’i Mahilỳ sy zafin-dohalik’i Mosỳ sy zafin-kitrokelin’i Merarỳ ary zafim-paladian’i Levỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny levîta naman’ireo no nanankinana ny fanompoana hafa rehetra momba ny Tranolay fihaonana, tao an-tranon’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
