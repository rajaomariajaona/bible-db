document_id: HAG.1,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fotoana hananganana indray ny tempoly
  - type: text
    content: 'Tamin’ny taona faharoa nanjakan’i Dariôsa, fony andro voalohan’ny volana fahenina, dia nisy tenin’ny TOMPO tamin’ny alalan’i Hagay '
  - type: text
    content: mpaminany
  - type: text
    content: . Hafatra ho an’ny governoran’i Joda, dia i Zerobabela zanakalahin’i Sealtiela
  - type: note
    content: 'I Dariôsa dia mpanjakan’ny Persianina ny taona faharoa... ny volana fahenina: izany hoe tokony ho tamin’ny faran’ny volana aogositra 520 tal. J.K. –i Zerobabela zanakalahin’i Sealtiela: araka ny 1 Tan 3.17-19 dia zafikelin’i Jekônià mpanjaka izay nantsoina koa hoe Jôakîna. Noho izany dia taranak’i Davida izy. Ny mpanjakan’i Persia dia nanendry azy ho governoran’i Joda.'
  - type: text
    content: ', sy ho an’i Josoa mpisorombe zanakalahin’i Jôtsadaky izany ka nanao hoe:'
  '10':
  - type: text
    content: 'Izany no tsy nisian’ny orana latsaka na zavatra naniry. '
  '11':
  - type: text
    content: 'Nantsoiko ny fahamainana hamely ny tany: dia ny tendrombohitra, ny tanimbary sy ny tanimboaloboka ary ny tanin’ôliva sy ny tanimboly hafa; hahita faisana amin’izany koa ny olona mbamin’ny biby fiompy ary ny zavatra rehetra nisasaran’ny tananareo.»'
  '12':
  - type: text
    content: I Zerobabela zanakalahin’i Sealtiela ary koa i Josoa mpisorombe zanakalahin’i Jôtsadaky mbamin’izay rehetra tafaverina avy any an-tsesitany
  - type: note
    content: 'izay rehetra tafaverina avy any an-tsesitany: ny rijan-teny hebreo dia manao hoe ny sisa rehetra tamin’ny vahoaka, jereo Hez 1.4; 9.8,14; Za 8.6,11.'
  - type: text
    content: ' dia nandray tsara ny tenin’ny TOMPO Andriamaniny, izay nampitain’i Hagay mpaminany araka ny efa nanirahan’ny TOMPO Andriamaniny azy; ary naneho fanajana ny TOMPO ireo olona ireo. '
  '13':
  - type: text
    content: 'Dia araka ny hafatra nampitondrain’ny TOMPO ho an’ny vahoaka no nitenenan’i Hagay iraky ny TOMPO hoe:'
  - type: text
    content: –Izaho no miaraka aminareo. Fampanantenana hentitra avy amiko TOMPO izany.
  '14':
  - type: text
    content: 'Dia notairin’ny TOMPO ny risi-pon’i Zerobabela governoran’i Joda sy ny an’i Josoa mpisorombe ary ny an’izay rehetra tafaverina avy any an-tsesitany; ary dia rafitra ireo nanao ny tranon’ilay TOMPOn’izao rehetra izao sady Andriamaniny, '
  '15':
  - type: text
    content: tamin’ny taona faharoa nanjakan’i Dariôsa, volana fahenina, andro faha-24.
  '2':
  - type: text
    content: '–Izao no lazain’ny TOMPOn’izao rehetra izao: «Ny vahoakan’ity firenena ity milaza fa tsy mbola tonga ny fotoana hananganana indray ny '
  - type: text
    content: tranoko
  - type: note
    content: Ny tranon’ny Tompo na ny tempolin’i Jerosalema dia voaroba sy voadotran’ny Babilônianina tamin’ny 587 tal. J.K. (Jer 52.12-23). Ireo olona voalohany tafaverina avy any an-tsesitany, ka anisan’ireny i Zerobabela sy i Josoa (Hez 3.1-9) dia nanomboka nanangana indray ny tempoly. Nefa ny fanoheran’ny Samaritanina no nanery azy ireo hampijanona ny asa.
  - type: text
    content: '.» '
  '3':
  - type: text
    content: 'Dia nisy indray tenin’ny Tompo tamin’ny alalan’i Hagay mpaminany. Hafatra ho an’ny vahoaka izany ka nanao hoe: '
  '4':
  - type: text
    content: '–Moa ve fotoana tokony hipetrahanareo amina trano voaravaka zava-tsarobidy ankehitriny, kanefa rava ity tempoly ity? '
  '5':
  - type: text
    content: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao aminareo: Hevero tsara ny manjo anareo. '
  '6':
  - type: text
    content: 'Namafy be ianareo nefa kely no jinjainareo; mihinana ianareo nefa tsy voky ary misotro nefa tsy afa-po; mitafy ianareo nefa tsy mafana; ary ny karaman’ny mpiasa dia mora lany toy ny amin’ny kitapo loaka.» '
  '7':
  - type: text
    content: 'Izany no ilazan’ny TOMPOn’izao rehetra izao aminareo hoe: Hevero tsara ny manjo anareo. '
  '8':
  - type: text
    content: 'Miakara any an-tendrombohitra, dia makà hazo ary atsangano indray ny tranoko. Ho sitrako sady hahazoako voninahitra izany, hoy AHO aminareo. '
  '9':
  - type: text
    content: 'Vokatra betsaka no nantenainareo, nefa hitanareo fa kely no azo. Ary izay notaominareo dia notsofiko hiparitaka. Koa manontany hentitra anareo Izaho TOMPOn’izao rehetra izao hoe: Ahoana izany? Valiny: Satria rava ny tranoko nefa ianareo samy sahirana manao ny tranonareo avy. '
