document_id: HAG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fotoana hananganana indray ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin’ny taona faharoa nanjakan’i Dariôsa, fony andro voalohan’ny volana fahenina, dia nisy tenin’ny TOMPO tamin’ny alalan’i Hagay '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: . Hafatra ho an’ny governoran’i Joda, dia i Zerobabela zanakalahin’i Sealtiela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Dariôsa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia mpanjakan’ny Persianina '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ny taona faharoa... ny volana fahenina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': izany hoe tokony ho tamin’ny faran’ny volana aogositra 520 tal. J.K. –'
    - type: usfm
      marker: fk
      children:
      - type: text
        text: i Zerobabela zanakalahin’i Sealtiela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': araka ny 1 Tan 3.17-19 dia zafikelin’i Jekônià mpanjaka izay nantsoina koa hoe Jôakîna. Noho izany dia taranak’i Davida izy. Ny mpanjakan’i Persia dia nanendry azy ho governoran’i Joda.'
    marker-yv: yv-n
  - type: text
    text: ', sy ho an’i Josoa mpisorombe zanakalahin’i Jôtsadaky izany ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '–Izao no lazain’ny TOMPOn’izao rehetra izao: «Ny vahoakan’ity firenena ity milaza fa tsy mbola tonga ny fotoana hananganana indray ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny tranon’ny Tompo na ny tempolin’i Jerosalema dia voaroba sy voadotran’ny Babilônianina tamin’ny 587 tal. J.K. (Jer 52.12-23). Ireo olona voalohany tafaverina avy any an-tsesitany, ka anisan’ireny i Zerobabela sy i Josoa (Hez 3.1-9) dia nanomboka nanangana indray ny tempoly. Nefa ny fanoheran’ny Samaritanina no nanery azy ireo hampijanona ny asa.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nisy indray tenin’ny Tompo tamin’ny alalan’i Hagay mpaminany. Hafatra ho an’ny vahoaka izany ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '–Moa ve fotoana tokony hipetrahanareo amina trano voaravaka zava-tsarobidy ankehitriny, kanefa rava ity tempoly ity? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa izao no lazain’ny TOMPOn’izao rehetra izao aminareo: Hevero tsara ny manjo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Namafy be ianareo nefa kely no jinjainareo; mihinana ianareo nefa tsy voky ary misotro nefa tsy afa-po; mitafy ianareo nefa tsy mafana; ary ny karaman’ny mpiasa dia mora lany toy ny amin’ny kitapo loaka.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izany no ilazan’ny TOMPOn’izao rehetra izao aminareo hoe: Hevero tsara ny manjo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Miakara any an-tendrombohitra, dia makà hazo ary atsangano indray ny tranoko. Ho sitrako sady hahazoako voninahitra izany, hoy AHO aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vokatra betsaka no nantenainareo, nefa hitanareo fa kely no azo. Ary izay notaominareo dia notsofiko hiparitaka. Koa manontany hentitra anareo Izaho TOMPOn’izao rehetra izao hoe: Ahoana izany? Valiny: Satria rava ny tranoko nefa ianareo samy sahirana manao ny tranonareo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no tsy nisian’ny orana latsaka na zavatra naniry. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nantsoiko ny fahamainana hamely ny tany: dia ny tendrombohitra, ny tanimbary sy ny tanimboaloboka ary ny tanin’ôliva sy ny tanimboly hafa; hahita faisana amin’izany koa ny olona mbamin’ny biby fiompy ary ny zavatra rehetra nisasaran’ny tananareo.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I Zerobabela zanakalahin’i Sealtiela ary koa i Josoa mpisorombe zanakalahin’i Jôtsadaky mbamin’izay rehetra tafaverina avy any an-tsesitany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izay rehetra tafaverina avy any an-tsesitany: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny rijan-teny hebreo dia manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny sisa rehetra tamin’ny vahoaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Hez 1.4; 9.8,14; Za 8.6,11.'
    marker-yv: yv-n
  - type: text
    text: ' dia nandray tsara ny tenin’ny TOMPO Andriamaniny, izay nampitain’i Hagay mpaminany araka ny efa nanirahan’ny TOMPO Andriamaniny azy; ary naneho fanajana ny TOMPO ireo olona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia araka ny hafatra nampitondrain’ny TOMPO ho an’ny vahoaka no nitenenan’i Hagay iraky ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izaho no miaraka aminareo. Fampanantenana hentitra avy amiko TOMPO izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia notairin’ny TOMPO ny risi-pon’i Zerobabela governoran’i Joda sy ny an’i Josoa mpisorombe ary ny an’izay rehetra tafaverina avy any an-tsesitany; ary dia rafitra ireo nanao ny tranon’ilay TOMPOn’izao rehetra izao sady Andriamaniny, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: tamin’ny taona faharoa nanjakan’i Dariôsa, volana fahenina, andro faha-24.
