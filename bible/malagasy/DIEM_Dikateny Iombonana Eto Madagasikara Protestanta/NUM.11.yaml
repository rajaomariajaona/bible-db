document_id: NUM.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Israelita tao Tabiherà
  - type: text
    content: 'Indray andro dia nanao fitarainana tamin’ny TOMPO ireo Israelita. Rehefa nahare izany ny TOMPO, dia tezitra mafy ary nandefa ny afony ka nandoro ny vahoaka sy nandevona ny sisin’ny toby. '
  '10':
  - type: text
    content: 'Ren’i Mosesy fa samy nitomany isam-pianakaviany teo am-baravaran’ny lainy avy ny vahoaka. Nirehitra aoka izany ny fahatezeran’ny TOMPO. Ary nalahelo mafy i Mosesy '
  '11':
  - type: text
    content: 'ka niteny tamin’ny TOMPO hoe:'
  - type: text
    content: '–Nahoana izaho mpanomponao no ampahorianao toy izao? ary nahoana no tsy anehoanao hatsarampo aho fa ampitondrainao enta-mavesatra amin’ny fitondrana ity firenena manontolo ity? '
  '12':
  - type: text
    content: 'Moa ve izaho no torontoronina an’ireo vahoaka rehetra ireo! Sa izaho ve no niteraka azy no ilazanao hoe: «Trotroy eo an-tratranao toy ny fitrotron’ny mpitaiza zaza izy, mandra-pahatonga azy any amin’ny tany izay nianianako tamin’ny razany fa homena azy». '
  '13':
  - type: text
    content: 'Aiza no hahitako hena homena ireo vahoaka rehetra ireo izay mitomany amiko hoe: «Omeo hena izahay hohaninay»? '
  '14':
  - type: text
    content: 'Tsy zakako samirery ireo vahoaka rehetra ireo fa mavesatra loatra amiko. '
  '15':
  - type: text
    content: Raha toy izany no hanaovanao ahy, dia vonoy mihitsy aho ho faty. Izany ahay no hanehoanao hatsarampo amiko; fa aza avela hahita ny fahoriako intsony aho.
  '16':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Anangòny fitopolo lahy amin’ny loholon’i Israely aho, dia izay fantatrao fa '
  - type: text
    content: loholona
  - type: text
    content: ' sy tompon’andraikitra amin’ny vahoaka. Ento miaraka aminao ao amin’ny '
  - type: text
    content: Tranolay fihaonana
  - type: text
    content: ' izy. '
  '17':
  - type: text
    content: 'Fa hidina eo Aho ka hiteny aminao; ary haka amin’ny fanahy izay nomeko anao Aho ka hametraka izany amin’izy ireo mba hiarahany mitondra aminao ity firenena ity; koa tsy ianao irery intsony no hitondra azy. '
  '18':
  - type: text
    content: 'Ny amin’ny vahoaka kosa dia izao no holazainao azy: «'
  - type: text
    content: Diovy
  - type: text
    content: ' ny tenanareo ho amin’ny rahampitso, fa hahazo hena hohanina ianareo, satria ny TOMPO efa nandre ny fitarainanareo hoe: ‹Iza no hanome hena hohaninay? Fa sambatra izahay tany Ejipta›. Homen’ny TOMPO hena ianareo, ka hihinana tokoa ianareo. '
  '19':
  - type: text
    content: 'Tsy andro iray na roa na koa andro dimy na folo na roapolo aza no hihinananareo izany, '
  '2':
  - type: text
    content: 'Dia nitalaho sy nikiakiaka tamin’i Mosesy ny vahoaka; koa nifona tamin’ny TOMPO i Mosesy, dia maty ny afo. '
  '20':
  - type: text
    content: 'fa iray volana maninjitra manda-pahafeno hatreny am-bavoronareo ka hampaharikoriko anareo. Ho sazinareo izany noho ny nandavanareo ny TOMPO Izay eo aminareo sy ny nitomanianareo teo anatrehany hoe: ‹Nahoana re no niala tany Ejipta izahay?› »'
  '21':
  - type: text
    content: 'Dia hoy i Mosesy hoe:'
  - type: text
    content: –Ireo vahoaka manodidina ahy ireo dia ahitana miaramila mpandeha an-tongotra misy andiany eninjato
  - type: note
    content: 'misy andiany eninjato: misy manao hoe miisa enina hetsy kanefa toa be loatra, raha oharina amin’ny tokony ho isan’ny Israelita fahizay. Jereo 1.45 sy nta.'
  - type: text
    content: ', ka hoy Ianao hoe: «Homeko hena izy ka hihinana izany iray volana maninjitra!» '
  '22':
  - type: text
    content: Fa na dia ny ondry aman’osy ary ny ombiny rehetra aza no hovonoina ho azy ireo, dia tsy ho ampy azy izany. Na ny trondro rehetra any an-dranomasina aza no haratoina ho azy ireo, dia mbola tsy ho ampy azy koa.
  '23':
  - type: text
    content: 'Fa hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: –Ary ny heriko, moa mba misy fetrany va? Ho hitanao izao ankehitriny izao na ho tanteraka aminao ny teniko na tsia.
  - type: heading
    content: Nomen’Andriamanitra ny fanahiny ny loholona fitopolo lahy
  '24':
  - type: text
    content: 'Nisinda kely i Mosesy ka nilaza ny tenin’ny TOMPO tamin’ny vahoaka. Nangoniny avy eo ireo fitopolo lahy tamin’ny '
  - type: text
    content: loholom-bahoaka
  - type: text
    content: ', dia napetrany nanodidina ny Tranolay fihaonana. '
  '25':
  - type: text
    content: Ary nidina teo amin’ny rahona ny TOMPO
  - type: note
    content: Jereo Eks 13.21 sy nta.
  - type: text
    content: ' ka niresaka tamin’i Mosesy. Nangalany ny fanahy tamin’i Mosesy ka nanomezany ho an’ny loholona fitopolo lahy. Ary raha vao nipetraka tamin’izy ireo ny fanahy, dia nanomboka '
  - type: text
    content: naminany
  - type: text
    content: ' izy ireo, nefa tsy notohizany izany.'
  '26':
  - type: text
    content: 'Fa nisy olona anankiroa nijanona tao an-toby, i Eldada no anaran’ny iray ary i Medada kosa ny iray; anisan’ny loholona fitopolo lahy izy ireo, nefa tsy mba lasa nankany amin’ny Tranolay. Nahazo ny fanahy koa izy ireo ary dia naminany tao an-toby. '
  '27':
  - type: text
    content: 'Nihazakazaka nampandre an’i Mosesy ny tovolahy iray ka nanao hoe:'
  - type: text
    content: –Maminany ao an-toby i Eldada sy i Medada.
  '28':
  - type: text
    content: 'Dia loa-bolana i Josoa, zanakalahin’i Nona sady mpanompon’i Mosesy hatramin’ny fahatanorany, ka nanao hoe:'
  - type: text
    content: –Ry Mosesy tompoko, mba rarao re izy roa lahy.
  '29':
  - type: text
    content: 'Fa hoy i Mosesy taminy:'
  - type: text
    content: –Moa mialona azy noho ny amiko ve ianao? Enga anie homen’ny TOMPO ny Fanahiny avokoa ny vahoakany rehetra ka ho tonga mpaminany!
  '3':
  - type: text
    content: Ny anaran’izany toerana izany dia natao hoe Tabiherà na Fandoroana, satria teo ny Israelita no voadoron’ny afon’ny TOMPO.
  - type: heading
    content: Nitaky hena ny vahoaka
  '30':
  - type: text
    content: Dia niverina nankao an-toby indray i Mosesy sy ireto loholona.
  - type: heading
    content: 'Tao Kibrôty-Taavà: ny papelika'
  '31':
  - type: text
    content: 'Fa ny TOMPO nampitsoka rivotra mifofofofo avy any an-dranomasina izay nitondra papelika ka nampihahaka ireny teo amin’ny toby. Feno azy avokoa ny manodidina ny toby tokony ho lalana indray andro ary tokony ho iray metatra miala amin’ny tany ny hateviny. '
  '32':
  - type: text
    content: 'Dia nitsangana tontolo andro sy tontolo alina ary koa ny ampitso tontolo ny vahoaka mba hanangona papelika; ary izay nahangona kely indrindra no nanana aman-taonina. Dia nahahiny ho maina manodidina ny toby ireny. '
  '33':
  - type: text
    content: 'Fa raha mbola tsy voatsako tao am-bavany akory ny hena, dia nirehi-pahatezerana tamin’ny vahoaka ny TOMPO, ka namely azy tamin’ny areti-mandringana. '
  '34':
  - type: text
    content: Dia natao hoe Kibrôty-Taavà na hoe Fasan’ny Fahalian-kanina ny anaran’izany toerana izany, satria teo no nandevenana ireo olona lian-kena.
  '35':
  - type: text
    content: Dia niala tao Kibrôty-Taavà ny Israelita ka nankany Hatserôta ary nitoby tao.
  '4':
  - type: text
    content: 'Nisy vahiny maro samy hafa fiaviana tafaharo tamin’ny Israelita izay liana te hihinan-kena aoka izany; ary ny Israelita koa dia nanomboka nitaraina indray ka nitomany hoe: «Iza no hanome hena hohaninay? '
  '5':
  - type: text
    content: 'Tsaroanay ny trondro nohanina maimaimpoana tany Ejipta, ny voatango, ny voanketsihetsy, ny tongolobe, ny tongolo isan-karazany. '
  '6':
  - type: text
    content: 'Izao anefa maina ny tenda; tsy misy na inona na inona mba hitanay afa-tsy ny '
  - type: text
    content: mana
  - type: text
    content: ' ihany!»'
  '7':
  - type: text
    content: Ny mana dia mitovy amin’ny voan-drafy sady miloko mavofotsy tahaka ny bideliôma
  - type: note
    content: Momba ny mana dia jereo Eks 16.31 sy nta. –Ny rafy etoana dia anaran-kazo madinika misy voany; ny bideliôma dia hazo madinika fahita any Arabia ary mamokatra dity manitra tena ankafizin’ny olona; ampit Gen 2.12.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Amin’ny alina no nilatsaka teo amin’ny toby miaraka amin’ando izy
  - type: note
    content: Jereo Eks 16.13-15.
  - type: text
    content: . Amin’ny maraina kosa dia miparitaka manangona azy ny olona; totoina amin’ny vatobe fikosehana na amin’ny laona izany, dia ahandroina amin’ny vilany na atao mofo. Mitovy amin’ny an’ny mofomamy misy menaka ny tsirony.
