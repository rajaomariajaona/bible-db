document_id: NUM.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny Israelita tao Tabiherà
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro dia nanao fitarainana tamin’ny TOMPO ireo Israelita. Rehefa nahare izany ny TOMPO, dia tezitra mafy ary nandefa ny afony ka nandoro ny vahoaka sy nandevona ny sisin’ny toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitalaho sy nikiakiaka tamin’i Mosesy ny vahoaka; koa nifona tamin’ny TOMPO i Mosesy, dia maty ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny anaran’izany toerana izany dia natao hoe Tabiherà na Fandoroana, satria teo ny Israelita no voadoron’ny afon’ny TOMPO.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nitaky hena ny vahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nisy vahiny maro samy hafa fiaviana tafaharo tamin’ny Israelita izay liana te hihinan-kena aoka izany; ary ny Israelita koa dia nanomboka nitaraina indray ka nitomany hoe: «Iza no hanome hena hohaninay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsaroanay ny trondro nohanina maimaimpoana tany Ejipta, ny voatango, ny voanketsihetsy, ny tongolobe, ny tongolo isan-karazany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao anefa maina ny tenda; tsy misy na inona na inona mba hitanay afa-tsy ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ' ihany!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny mana dia mitovy amin’ny voan-drafy sady miloko mavofotsy tahaka ny bideliôma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia jereo Eks 16.31 sy nta. –Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rafy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' etoana dia anaran-kazo madinika misy voany; ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bideliôma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia hazo madinika fahita any Arabia ary mamokatra dity manitra tena ankafizin’ny olona; ampit Gen 2.12.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Amin’ny alina no nilatsaka teo amin’ny toby miaraka amin’ando izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 16.13-15.
    marker-yv: yv-n
  - type: text
    text: . Amin’ny maraina kosa dia miparitaka manangona azy ny olona; totoina amin’ny vatobe fikosehana na amin’ny laona izany, dia ahandroina amin’ny vilany na atao mofo. Mitovy amin’ny an’ny mofomamy misy menaka ny tsirony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ren’i Mosesy fa samy nitomany isam-pianakaviany teo am-baravaran’ny lainy avy ny vahoaka. Nirehitra aoka izany ny fahatezeran’ny TOMPO. Ary nalahelo mafy i Mosesy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka niteny tamin’ny TOMPO hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana izaho mpanomponao no ampahorianao toy izao? ary nahoana no tsy anehoanao hatsarampo aho fa ampitondrainao enta-mavesatra amin’ny fitondrana ity firenena manontolo ity? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moa ve izaho no torontoronina an’ireo vahoaka rehetra ireo! Sa izaho ve no niteraka azy no ilazanao hoe: «Trotroy eo an-tratranao toy ny fitrotron’ny mpitaiza zaza izy, mandra-pahatonga azy any amin’ny tany izay nianianako tamin’ny razany fa homena azy». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aiza no hahitako hena homena ireo vahoaka rehetra ireo izay mitomany amiko hoe: «Omeo hena izahay hohaninay»? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy zakako samirery ireo vahoaka rehetra ireo fa mavesatra loatra amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha toy izany no hanaovanao ahy, dia vonoy mihitsy aho ho faty. Izany ahay no hanehoanao hatsarampo amiko; fa aza avela hahita ny fahoriako intsony aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Anangòny fitopolo lahy amin’ny loholon’i Israely aho, dia izay fantatrao fa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholona
  - type: text
    text: ' sy tompon’andraikitra amin’ny vahoaka. Ento miaraka aminao ao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Tranolay fihaonana
  - type: text
    text: ' izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hidina eo Aho ka hiteny aminao; ary haka amin’ny fanahy izay nomeko anao Aho ka hametraka izany amin’izy ireo mba hiarahany mitondra aminao ity firenena ity; koa tsy ianao irery intsony no hitondra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny amin’ny vahoaka kosa dia izao no holazainao azy: «'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Diovy
  - type: text
    text: ' ny tenanareo ho amin’ny rahampitso, fa hahazo hena hohanina ianareo, satria ny TOMPO efa nandre ny fitarainanareo hoe: ‹Iza no hanome hena hohaninay? Fa sambatra izahay tany Ejipta›. Homen’ny TOMPO hena ianareo, ka hihinana tokoa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy andro iray na roa na koa andro dimy na folo na roapolo aza no hihinananareo izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa iray volana maninjitra manda-pahafeno hatreny am-bavoronareo ka hampaharikoriko anareo. Ho sazinareo izany noho ny nandavanareo ny TOMPO Izay eo aminareo sy ny nitomanianareo teo anatrehany hoe: ‹Nahoana re no niala tany Ejipta izahay?› »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy i Mosesy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ireo vahoaka manodidina ahy ireo dia ahitana miaramila mpandeha an-tongotra misy andiany eninjato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'misy andiany eninjato: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'misy manao hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miisa enina hetsy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' kanefa toa be loatra, raha oharina amin’ny tokony ho isan’ny Israelita fahizay. Jereo 1.45 sy nta.'
    marker-yv: yv-n
  - type: text
    text: ', ka hoy Ianao hoe: «Homeko hena izy ka hihinana izany iray volana maninjitra!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa na dia ny ondry aman’osy ary ny ombiny rehetra aza no hovonoina ho azy ireo, dia tsy ho ampy azy izany. Na ny trondro rehetra any an-dranomasina aza no haratoina ho azy ireo, dia mbola tsy ho ampy azy koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy ny TOMPO tamin’i Mosesy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ary ny heriko, moa mba misy fetrany va? Ho hitanao izao ankehitriny izao na ho tanteraka aminao ny teniko na tsia.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nomen’Andriamanitra ny fanahiny ny loholona fitopolo lahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nisinda kely i Mosesy ka nilaza ny tenin’ny TOMPO tamin’ny vahoaka. Nangoniny avy eo ireo fitopolo lahy tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: loholom-bahoaka
  - type: text
    text: ', dia napetrany nanodidina ny Tranolay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nidina teo amin’ny rahona ny TOMPO
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Eks 13.21 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' ka niresaka tamin’i Mosesy. Nangalany ny fanahy tamin’i Mosesy ka nanomezany ho an’ny loholona fitopolo lahy. Ary raha vao nipetraka tamin’izy ireo ny fanahy, dia nanomboka '
  - type: usfm
    marker: w
    children:
    - type: text
      text: naminany
  - type: text
    text: ' izy ireo, nefa tsy notohizany izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa nisy olona anankiroa nijanona tao an-toby, i Eldada no anaran’ny iray ary i Medada kosa ny iray; anisan’ny loholona fitopolo lahy izy ireo, nefa tsy mba lasa nankany amin’ny Tranolay. Nahazo ny fanahy koa izy ireo ary dia naminany tao an-toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nihazakazaka nampandre an’i Mosesy ny tovolahy iray ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Maminany ao an-toby i Eldada sy i Medada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia loa-bolana i Josoa, zanakalahin’i Nona sady mpanompon’i Mosesy hatramin’ny fahatanorany, ka nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ry Mosesy tompoko, mba rarao re izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy i Mosesy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Moa mialona azy noho ny amiko ve ianao? Enga anie homen’ny TOMPO ny Fanahiny avokoa ny vahoakany rehetra ka ho tonga mpaminany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia niverina nankao an-toby indray i Mosesy sy ireto loholona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Tao Kibrôty-Taavà: ny papelika'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny TOMPO nampitsoka rivotra mifofofofo avy any an-dranomasina izay nitondra papelika ka nampihahaka ireny teo amin’ny toby. Feno azy avokoa ny manodidina ny toby tokony ho lalana indray andro ary tokony ho iray metatra miala amin’ny tany ny hateviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nitsangana tontolo andro sy tontolo alina ary koa ny ampitso tontolo ny vahoaka mba hanangona papelika; ary izay nahangona kely indrindra no nanana aman-taonina. Dia nahahiny ho maina manodidina ny toby ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa raha mbola tsy voatsako tao am-bavany akory ny hena, dia nirehi-pahatezerana tamin’ny vahoaka ny TOMPO, ka namely azy tamin’ny areti-mandringana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia natao hoe Kibrôty-Taavà na hoe Fasan’ny Fahalian-kanina ny anaran’izany toerana izany, satria teo no nandevenana ireo olona lian-kena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia niala tao Kibrôty-Taavà ny Israelita ka nankany Hatserôta ary nitoby tao.
