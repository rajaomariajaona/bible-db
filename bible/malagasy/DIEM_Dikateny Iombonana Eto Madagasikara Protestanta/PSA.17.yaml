document_id: PSA.17,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Ankehitriny miantso Anao aho
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vavaka nataon’i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa, TOMPO ô! Mitaky rariny aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ho tandrinao izato fitarainako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba henoy re ny vavaka ataoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa teny tsisy fitaka izany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba manana fo mangoraka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny teniny feno avonavona.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsongo dia ahy no ataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indreo izy manodidina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady mibandrina ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa te hamotraka ahy an-tany,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa liona mamitsaka am-pierena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: efa may ny hamiravira remby.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirotsaha amin’izay Ianao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanohitra sy handaboka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny sabatrao re no anafaho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho azon’ny olon-dratsy aho.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny sandrinao, TOMPO ô, handroaka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho eo amin’ny velona intsony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa izany no natao ho anjarany etoana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampigohy azy ny mafaitra tahirizinao ho azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zanany koa anie hisotro amin’izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hamela ny sisa ho an’ny zafikeliny!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa nomenao rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ho afaka hanatri-tava Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary isaky ny mifoha aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ho afa-po amin’ny endrikao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aminao no tokony hivoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny didim-pitsarana momba ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mahita ny hitsiny Ianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nandinika ny foko Ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary avy alina namotopototra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nizaha sy nisedra ny toetrako Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nahita n’inona n’inona hokianina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy niteny ratsy
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny ataon’ny olona aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny baiko voalazanao no hany notandremako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sori-dalan’ny didinao
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nifikiran’ny diako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny tongotro tsy mba nivoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hiala amin’ireo soritrao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miantso Anao aho, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mamaly vavaka Ianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka mba hanongilan-tsofina amiko Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: handrenesanao izay lazaiko!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asehoy ahy ny fitiavanao mahagaga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Ianao Izay mpamonjy amin’ny mpampahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’ireo mialoka eo ankavananao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'eo ankavananao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 16.8 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo toy ny anakandriamaso aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afeno sy arovy eo ambany elatrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'elatrao: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Sal 36.8; 61.5; 63.8; ampit 1 Mp 6.23-29.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba tsy ho azon’ny olon-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay mampahory ahy tokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia ireo fahavalo romotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tonga manemitra ahy.
