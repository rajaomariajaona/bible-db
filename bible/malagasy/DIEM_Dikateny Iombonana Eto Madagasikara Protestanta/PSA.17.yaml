document_id: PSA.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ankehitriny miantso Anao aho
  - type: text
    content: ' '
  - type: text
    content: Vavaka nataon’i Davida
  - type: text
    content: Mandrenesa, TOMPO ô! Mitaky rariny aho.
  - type: text
    content: Enga anie ho tandrinao izato fitarainako!
  - type: text
    content: Mba henoy re ny vavaka ataoko
  - type: text
    content: fa teny tsisy fitaka izany.
  '10':
  - type: text
    content: Tsy mba manana fo mangoraka izy,
  - type: text
    content: ary ny teniny feno avonavona.
  '11':
  - type: text
    content: Mitsongo dia ahy no ataony;
  - type: text
    content: ka indreo izy manodidina ahy
  - type: text
    content: sady mibandrina ahy
  - type: text
    content: fa te hamotraka ahy an-tany,
  '12':
  - type: text
    content: toa liona mamitsaka am-pierena
  - type: text
    content: efa may ny hamiravira remby.
  '13':
  - type: text
    content: Mirotsaha amin’izay Ianao, TOMPO ô,
  - type: text
    content: mba hanohitra sy handaboka azy;
  - type: text
    content: ny sabatrao re no anafaho ahy
  - type: text
    content: mba tsy ho azon’ny olon-dratsy aho.
  '14':
  - type: text
    content: Aoka ny sandrinao, TOMPO ô, handroaka azy
  - type: text
    content: mba tsy ho eo amin’ny velona intsony
  - type: text
    content: fa izany no natao ho anjarany etoana.
  - type: text
    content: Ampigohy azy ny mafaitra tahirizinao ho azy;
  - type: text
    content: ny zanany koa anie hisotro amin’izany
  - type: text
    content: ka hamela ny sisa ho an’ny zafikeliny!
  '15':
  - type: text
    content: Fa izaho kosa nomenao rariny,
  - type: text
    content: ka ho afaka hanatri-tava Anao;
  - type: text
    content: ary isaky ny mifoha aho,
  - type: text
    content: dia ho afa-po amin’ny endrikao.
  '2':
  - type: text
    content: Avy aminao no tokony hivoaka
  - type: text
    content: ny didim-pitsarana momba ahy,
  - type: text
    content: satria mahita ny hitsiny Ianao.
  '3':
  - type: text
    content: Efa nandinika ny foko Ianao,
  - type: text
    content: ary avy alina namotopototra ahy;
  - type: text
    content: nizaha sy nisedra ny toetrako Ianao
  - type: text
    content: fa tsy nahita n’inona n’inona hokianina.
  - type: text
    content: Tsy niteny ratsy
  '4':
  - type: text
    content: toy ny ataon’ny olona aho
  - type: text
    content: fa ny baiko voalazanao no hany notandremako.
  - type: text
    content: Ny sori-dalan’ny didinao
  '5':
  - type: text
    content: no nifikiran’ny diako;
  - type: text
    content: ny tongotro tsy mba nivoana
  - type: text
    content: hiala amin’ireo soritrao.
  '6':
  - type: text
    content: Koa miantso Anao aho, Andriamanitra ô,
  - type: text
    content: satria mamaly vavaka Ianao.
  - type: text
    content: Aoka mba hanongilan-tsofina amiko Ianao
  - type: text
    content: handrenesanao izay lazaiko!
  '7':
  - type: text
    content: Asehoy ahy ny fitiavanao mahagaga,
  - type: text
    content: dia Ianao Izay mpamonjy amin’ny mpampahory
  - type: text
    content: ho an’ireo mialoka eo ankavananao
  - type: note
    content: 'eo ankavananao: jereo Sal 16.8 sy nta.'
  - type: text
    content: .
  '8':
  - type: text
    content: Tandremo toy ny anakandriamaso aho
  - type: text
    content: ka afeno sy arovy eo ambany elatrao
  - type: note
    content: 'elatrao: jereo Sal 36.8; 61.5; 63.8; ampit 1 Mp 6.23-29.'
  '9':
  - type: text
    content: mba tsy ho azon’ny olon-dratsy
  - type: text
    content: izay mampahory ahy tokoa,
  - type: text
    content: dia ireo fahavalo romotra
  - type: text
    content: tonga manemitra ahy.
