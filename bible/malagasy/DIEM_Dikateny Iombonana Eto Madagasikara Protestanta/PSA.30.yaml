document_id: PSA.30,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Nampody ny aiko Ianao, ry Tompo
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida. Hira tamin’ny fitokanana ny lapany.
  '10':
  - type: text
    content: Inona no soa azonao raha maty aho
  - type: text
    content: na aidina halevina any am-pasana?
  - type: text
    content: Izay lasa vovoka ve hidera Anao
  - type: text
    content: na afaka hanambara fa mahatoky Ianao?
  '11':
  - type: text
    content: TOMPO ô, henoy aho ka iantrao;
  - type: text
    content: TOMPO ô, aoka hamonjy ahy Ianao!
  '12':
  - type: text
    content: Dia navadikao ho dihy ny alaheloko.
  - type: text
    content: Nesorinao tamiko ny fitafiam-pisaonako
  - type: text
    content: ka nosoloanao akanjom-pifaliana.
  '13':
  - type: text
    content: Izany no tsy hitsaharako
  - type: text
    content: ny hisaotra Anao eram-po.
  - type: text
    content: Ry TOMPO Andriamanitro ô,
  - type: text
    content: hoderaiko mandrakizay Ianao.
  '2':
  - type: text
    content: TOMPO ô, hankalaza Anao tokoa aho
  - type: text
    content: noho Ianao nanafaka ahy tsy ho faty
  - type: text
    content: ka tsy namela ahy hoesoim-pahavalo.
  '3':
  - type: text
    content: Ry TOMPO Andriamanitro ô,
  - type: text
    content: niantso vonjy taminao aho
  - type: text
    content: ka dia nositraninao tokoa.
  '4':
  - type: text
    content: Toa efa lasa tany am-pasana aho
  - type: text
    content: fa novelominao indray, TOMPO ô;
  - type: text
    content: toa efa tany amin’ny fonenan’ny maty aho
  - type: text
    content: no nakarinao avy any.
  '5':
  - type: text
    content: Mihirà salamo ho an’ny TOMPO,
  - type: text
    content: ianareo mpivavaka aminy;
  - type: text
    content: manaova fiderana Azy
  - type: text
    content: ka tsarovy fa masina Izy.
  '6':
  - type: text
    content: Indray mipi-maso ny hatezerany,
  - type: text
    content: fa mandritra ny fiainana tontolo
  - type: text
    content: no itosahan’ny fanambinany.
  - type: text
    content: Hariva sy mandraka alina mbola misy ny tomany;
  - type: text
    content: fa maraina kosa dia hobim-pifaliana.
  '7':
  - type: text
    content: 'Tamin’ny fiadanako no nilazako hoe:'
  - type: text
    content: «Tsy hihontsona aho na oviana na oviana.
  '8':
  - type: text
    content: Noho ny fanambinanao, TOMPO ô,
  - type: text
    content: dia najoronao tamin-toerana avo aho.»
  - type: text
    content: Kanjo tsy nanaiky hijery ahy Ianao
  - type: text
    content: ka indro raiki-tahotra mafy aho.
  '9':
  - type: text
    content: TOMPO ô, miantso vonjy aminao aho;
  - type: text
    content: Ianao, ry Tompoko, no italahoako.
