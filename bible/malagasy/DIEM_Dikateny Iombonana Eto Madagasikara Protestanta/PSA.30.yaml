document_id: PSA.30,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: SALAMO Nampody ny aiko Ianao, ry Tompo
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida. Hira tamin’ny fitokanana ny lapany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no soa azonao raha maty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na aidina halevina any am-pasana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay lasa vovoka ve hidera Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na afaka hanambara fa mahatoky Ianao?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, henoy aho ka iantrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, aoka hamonjy ahy Ianao!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia navadikao ho dihy ny alaheloko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nesorinao tamiko ny fitafiam-pisaonako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nosoloanao akanjom-pifaliana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no tsy hitsaharako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny hisaotra Anao eram-po.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry TOMPO Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoderaiko mandrakizay Ianao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, hankalaza Anao tokoa aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho Ianao nanafaka ahy tsy ho faty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy namela ahy hoesoim-pahavalo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry TOMPO Andriamanitro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: niantso vonjy taminao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka dia nositraninao tokoa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toa efa lasa tany am-pasana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa novelominao indray, TOMPO ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toa efa tany amin’ny fonenan’ny maty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nakarinao avy any.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà salamo ho an’ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ianareo mpivavaka aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manaova fiderana Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsarovy fa masina Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray mipi-maso ny hatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa mandritra ny fiainana tontolo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no itosahan’ny fanambinany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hariva sy mandraka alina mbola misy ny tomany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa maraina kosa dia hobim-pifaliana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tamin’ny fiadanako no nilazako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy hihontsona aho na oviana na oviana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fanambinanao, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia najoronao tamin-toerana avo aho.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy nanaiky hijery ahy Ianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka indro raiki-tahotra mafy aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, miantso vonjy aminao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao, ry Tompoko, no italahoako.
