document_id: DEU.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nobeazin’ny Tompo tany an-taniefitra ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny didy izay ampitaiko aminareo anio dia imasoy avokoa ny hanatanteraka azy, mba ho velona ianareo sy hihamaro ary hiditra haka ho fanananareo ny tany izay tamim-pianianana no nampanantenan’ny TOMPO azy ny razambenareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsarovy avokoa ny lalana izay nasain’ny TOMPO Andriamanitrareo halehanareo tatỳ an-taniefitra, nandritra izay efapolo taona izay, mba hampanetry tena anareo; nizaha toetra anareo Izy tamin’izany mba hahalalany izay ao am-ponareo na hitandrina ny didiny ianareo na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rehefa nampanetry tena sy namela anareo ho noana Izy, dia namahana anareo tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ' izay hanina tsy fantatrareo na ny razanareo; tiany hampahalalaina anareo manko fa tsy ny mofo ihany no iveloman’ny olona, fa izay teny rehetra aloaky ny vavan’ny TOMPO'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Eks 16.31 sy nta. –Ny tapany faharoa amin’ity and ity dia voatsiahy ao amin’ny Mt 4.4 sy Lk 4.4.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fitafianareo tsy rovitra, ny tongotrareo tsy mivonto, nandritra izay efapolo taona izay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoekenareo ao am-ponareo fa tahaka ny anabeazan’ny raim-pianakaviana ireo zanany no nanabeazan’ny TOMPO Andriamanitrareo anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka hotandremanareo ny didiny mba hizoranareo amin’ny lalany sy hanajanareo Azy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zavatra mety hanadinoana ny Tompo any amin’ny tany nampanantenaina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tany soa no efa hampidiran’ny TOMPO Andriamanitrareo anareo: dia tany misy renirano sy loharano ary rano mitoby anaty tany ka miboiboika eny amin’ny lemaka na eny an-tendrombohitra; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tany vokatra varimbazaha sy vary ôrza ary koa voaloboka sy aviavy aman’ampongabendanitra; tany itobahan’ny menaka ôliva sy tantely; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tany hahitanareo vy sy vato eo aminy ary hihadianareo varahina ny tendrombohiny. Hanaram-po hihinan-kanina ianareo sady tsy hanan-java-mahory akory eo amin’izany tany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary rehefa hihinana ka ho voky ianareo, dia hisaotra ny TOMPO Andriamanitrareo noho ny tany soa nomeny anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa tandremo fandrao hadinoinareo ny TOMPO Andriamanitrareo ka tsy tandremanareo ny didy sy ny fitsipika aman-dalàny, izay ampitaiko aminareo anio. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, hihinana sy ho voky ianareo, hanao trano tsara hitoeranareo, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'hihamaro omby sy ondry aman’osy, hitombo volafotsy sy volamena, ary hiavosa fananana isan-karazany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'saingy tandremo fandrao hiavonavona ny fonareo ka hohadinoinareo ny TOMPO Andriamanitrareo, Izay nampiala anareo tany Ejipta toera-nanandevozana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izy no nitondra anareo hitety taniefitra midadasika sy mahatahotra, izay ahitana menarana misy poizina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Nom 21.6 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' sy maingoka; kanefa izany tany mangentana tsy misy rano izany no nampiboiboihany rano ho anareo, avy tamin’ny vatolampy mafy indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izy koa, tatỳ an-taniefitra, no namahana anareo tamin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mana
  - type: text
    text: ', izay hanina tsy fantatry ny razanareo; nampanetry tena anareo sy nizaha toetra anareo Izy mba hahasambatra anareo rahatrizay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Momba ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo Eks 16.31 sy nta. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: –and 11-16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': jereo Hôs 13.5-6.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aoka ianareo tsy hanao anakampo hoe: «Ny tanjakay sy ny herinay no nahavorianay izao harena izao!»; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'tsarovy kosa fa ny TOMPO Andriamanitrareo no manome anareo ny hery hamoriana harena, ka mahatò tahaka ny amin’izao anio izao ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fanekempihavanana
  - type: text
    text: ' izay nataony sady nianianany tamin’ny razambenareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha hadinoinareo tokoa ny TOMPO Andriamanitrareo ka andriamani-kafa no harahinareo sy hotompoinareo ary hiankohofanareo, dia milaza marimarina aminareo aho fa haringana mihitsy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tahaka ny handringanan’ny TOMPO ireo firenen-tsamy hafa eo anoloanareo no handringanana anareo koa, satria tsy nohenoinareo ny feon’ilay TOMPO Andriamanitrareo.
