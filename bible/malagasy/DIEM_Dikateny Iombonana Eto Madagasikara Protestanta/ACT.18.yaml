document_id: ACT.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Paoly tao Kôrinto
  - type: text
    content: Taorian’izany, dia tafala tao Atena i Paoly ka tonga tany Kôrinto
  - type: note
    content: I Kôrinto dia renivohitry ny faritany Akaîa. Tanàna be mponina sady nahitana karazan’olona samihafa, noho izy foibe ara-barotra nanan-tseranana anankiroa; nefa nalaza ratsy ihany koa noho ny fahalòvan’ny fitondrantenan’ny olona mbamin’ny fanompoana an’ilay andriamanibavy atao hoe Afrôdita.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Fa momba anao Aho, ary tsy hisy olona afaka hihazona anao mba hampahorîna, satria vahoaka maro no voatokana ho Ahy amin’ity tanàna ity.
  '11':
  - type: text
    content: Nitoetra herintaona sy tapany tao Kôrinto i Paoly, ka nampianatra ny tenin’Andriamanitra tamin’ny olona.
  '12':
  - type: text
    content: Fony i Galiôna no governora tany Akaîa
  - type: note
    content: Ny raki-tsoratra tamin’izany fotoana izany dia ahazoana manondro ny taona 51-52 na 52-53 ho taona niasan’i Galiôna tao Kôrinto.
  - type: text
    content: ', dia niara-nioko namely an’i Paoly ny Jiosy ary nitondra azy teo amin’ny fitsarana '
  '13':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: '–Mitaona ny olona hanaraka fivavahana mifanohitra amin’ny '
  - type: text
    content: lalànan
  - type: text
    content: ’i Mosesy io lehilahy io!
  '14':
  - type: text
    content: 'Efa ndeha hiteny indrindra i Paoly no nilaza tamin’ny Jiosy i Galiôna hoe:'
  - type: text
    content: '–Ry Jiosy, raha momba ny hoe heloka bevava na zavatra ratsy natao, dia vonon-kihaino anareo aho. '
  '15':
  - type: text
    content: Fa raha voambolana sy anarana ary lalànanareo manokana no iadianareo hevitra, dia raharahanareo; fa izaho tsy te hitsara an’izany.
  '16':
  - type: text
    content: 'Dia noroahin’i Galiôna hiala teo amin’ny fitsarana ny Jiosy. '
  '17':
  - type: text
    content: Fa nosamborin’izy rehetra kosa i Sôstena, lehiben’ny sinagôga, ka nokapohiny teo anoloan’ny fitsarana. Nefa tsy nisy nahoan’i Galiôna izany.
  - type: heading
    content: Miverina any Antiôkia i Paoly
  '18':
  - type: text
    content: 'Mbola tafajanona elaela tao Kôrinto i Paoly. Avy eo dia nanao veloma ny havana iray finoana izy ka niondrana nankany Siria, niarahan-dry i Prisila sy i Akoilà. Talohan’ny hiondrana, dia niharatra volon-doha tao Senkrea i Paoly, satria nisy '
  - type: text
    content: voady
  - type: text
    content: ' nataony'
  - type: note
    content: 'Mandritra ny fe-potoana aharetan’ny voady kosa dia tsy haratana ny volon-doha: jereo Nom 6.5-18. –Senkrea: anankiray amin’ireo seranan’i Kôrinto, dia ilay teo atsinanan’ny andilantany.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ary tonga tao Efeso izy ireo; dia nandao azy mivady i Paoly ka nankany amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' ary nifanakalo hevitra tamin’ny Jiosy. '
  '2':
  - type: text
    content: Hitany tao ity Jiosy atao hoe Akoilà izay teraka tany Pônto; vao tonga avy any Italia i Akoilà mbamin’i Prisila vadiny, satria nodidian’ny amperôra Klaody
  - type: note
    content: 'I Pônto dia faritany amin’ny avaratr’i Azia Minôra, manamorona ny Ranomasina Mainty. Klaody: jereo 11.28 sy nta. Fantatra fa nisy tokoa io didin’ny amperôra Klaody io tamin’ny taona 49 na 50.'
  - type: text
    content: ' hiala tany Rôma daholo ny Jiosy. Nanatona azy mivady i Paoly; '
  '20':
  - type: text
    content: 'Nangatahin-dry zareo izy mba hitoetra maharitraritra, kanefa tsy nety '
  '21':
  - type: text
    content: 'fa nanao veloma azy sady niteny hoe:'
  - type: text
    content: –Raha sitrapon’Andriamanitra, dia mbola hiverina atỳ aminareo aho.
  - type: text
    content: 'Ary dia niondrana an-tsambo niala tao Efeso i Paoly. '
  '22':
  - type: text
    content: 'Nony tody tao Kesaria izy, dia niakatra tany Jerosalema mba hiarahaba ny Fiangonana; izay vao nidina nankany Antiôkia. '
  '23':
  - type: text
    content: Rehefa avy nijanona kelikely tao izy, dia lasa indray nitety mifanesy ny faritany Galatia sy Frijia
  - type: note
    content: Jereo 16.6 sy nta.
  - type: text
    content: ', ka nampahery ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' rehetra.'
  - type: heading
    content: Mitoriteny ao Efeso sy ao Kôrinto i Apôlao
  '24':
  - type: text
    content: 'Tonga tao Efeso ity Jiosy atao hoe Apôlao, teraka tany Aleksandria, lehilahy mpandaha-teny mahay sady nahalala tsara dia tsara ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Efa nianatra ny lalana nosoritan’ny Tompo izy ary nafana fo nanambara sy nampianatra mazava tsara momba an’i Jesoa, saingy ny '
  - type: text
    content: batisan’i Jôhany
  - type: note
    content: Ampit 19.3-4.
  - type: text
    content: ' no hany fantany. '
  '26':
  - type: text
    content: 'Niteny tamim-pahasahiana tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Apôlao; ary nony nandre azy i Prisila sy i Akoilà, dia naka azy ho any aminy ka nanazava marina kokoa taminy momba ny lalana nosoritan’Andriamanitra. '
  '27':
  - type: text
    content: 'Avy eo dia nanam-paniriana ho any Akaîa i Apôlao; ka nampirisika azy ny havana iray finoana sady nanoratra taratasy ho an’ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' amin’io faritany io mba handraisany azy tsara. Nony tafapaka tany i Apôlao, dia nanampy tokoa ireo olona efa niasan’ny fahasoavan’Andriamanitra ka tonga mpino; '
  '28':
  - type: text
    content: 'teny feno hery tokoa no nandreseny lahatra ny Jiosy ampahibemaso ka nanaporofoany tamin’ny alalan’ny Soratra Masina fa i Jesoa no ilay '
  - type: text
    content: Mesia
  - type: text
    content: .
  '3':
  - type: text
    content: 'ary satria mitovy asa tanana aminy rahateo i Paoly (fa samy mpanao lay izy ireo), dia nitoetra tao amin-dry i Akoilà sy i Prisila izy ary nifarimbona asa taminy. '
  '4':
  - type: text
    content: 'Isaky ny andro '
  - type: text
    content: sabata
  - type: text
    content: ', dia nifanakalo hevitra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Paoly ary niezahany horesen-dahatra na ny Jiosy na ny Grika.'
  '5':
  - type: text
    content: Rehefa tonga avy any Masedônia
  - type: note
    content: Jereo 17.15.
  - type: text
    content: ' i Silasy mbamin’i Timôty, dia ny toriteny no nimasoan’i Paoly, ary nambarany tamin’ny Jiosy fa i Jesoa no ilay '
  - type: text
    content: Mesia
  - type: text
    content: '. '
  '6':
  - type: text
    content: Kanefa nanohitra sy nanevateva azy ry zareo; ka dia nanopakopa-damba
  - type: note
    content: Ny manopakopa-damba toy izany dia isan’ny fihetsika manambara fa afaka andraikitra amin’ireo Jiosy ireo i Paoly. Ampit Mk 6.11 sy nta ary koa Asa 13.51; 22.23.
  - type: text
    content: ' i Paoly sady nanao taminy hoe:'
  - type: text
    content: '–Anareo ny andraikitra raha toa ka manalavitra an’Andriamanitra ianareo, fa afaka adidy aminareo aho. Manomboka anio dia any amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' no halehako.'
  '7':
  - type: text
    content: 'Dia niala teo i Paoly ka nankao amin’i Tisio Josta, '
  - type: text
    content: mpanaja an’Andriamanitra
  - type: text
    content: ', izay nanan-trano nifanolotra tamin’ny sinagôga. '
  '8':
  - type: text
    content: Kanefa nino ny Tompo i Krispo, lehiben’ny sinagôga, mbamin’ny ankohonany
  - type: note
    content: Ampit 16.15, 33.
  - type: text
    content: ' manontolo; ary maro koa ny Kôrintianina nihaino an’i Paoly no tonga mpino ary natao '
  - type: text
    content: batisa
  - type: text
    content: .
  '9':
  - type: text
    content: 'Indray alina dia nisehoam-pahitana i Paoly, ka nilazan’ny Tompo hoe:'
  - type: text
    content: '–Aza matahotra, fa mitenena hatrany ary aza mangina. '
