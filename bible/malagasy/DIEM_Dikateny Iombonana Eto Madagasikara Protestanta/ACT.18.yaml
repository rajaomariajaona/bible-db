document_id: ACT.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Paoly tao Kôrinto
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Taorian’izany, dia tafala tao Atena i Paoly ka tonga tany Kôrinto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Kôrinto '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia renivohitry ny faritany Akaîa. Tanàna be mponina sady nahitana karazan’olona samihafa, noho izy foibe ara-barotra nanan-tseranana anankiroa; nefa nalaza ratsy ihany koa noho ny fahalòvan’ny fitondrantenan’ny olona mbamin’ny fanompoana an’ilay andriamanibavy atao hoe Afrôdita.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa momba anao Aho, ary tsy hisy olona afaka hihazona anao mba hampahorîna, satria vahoaka maro no voatokana ho Ahy amin’ity tanàna ity.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nitoetra herintaona sy tapany tao Kôrinto i Paoly, ka nampianatra ny tenin’Andriamanitra tamin’ny olona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fony i Galiôna no governora tany Akaîa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny raki-tsoratra tamin’izany fotoana izany dia ahazoana manondro ny taona 51-52 na 52-53 ho taona niasan’i '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Galiôna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tao Kôrinto.'
      marker-yv: yv-n
    - type: text
      text: ', dia niara-nioko namely an’i Paoly ny Jiosy ary nitondra azy teo amin’ny fitsarana '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Mitaona ny olona hanaraka fivavahana mifanohitra amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: ’i Mosesy io lehilahy io!
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Efa ndeha hiteny indrindra i Paoly no nilaza tamin’ny Jiosy i Galiôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry Jiosy, raha momba ny hoe heloka bevava na zavatra ratsy natao, dia vonon-kihaino anareo aho. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa raha voambolana sy anarana ary lalànanareo manokana no iadianareo hevitra, dia raharahanareo; fa izaho tsy te hitsara an’izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia noroahin’i Galiôna hiala teo amin’ny fitsarana ny Jiosy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa nosamborin’izy rehetra kosa i Sôstena, lehiben’ny sinagôga, ka nokapohiny teo anoloan’ny fitsarana. Nefa tsy nisy nahoan’i Galiôna izany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Miverina any Antiôkia i Paoly
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mbola tafajanona elaela tao Kôrinto i Paoly. Avy eo dia nanao veloma ny havana iray finoana izy ka niondrana nankany Siria, niarahan-dry i Prisila sy i Akoilà. Talohan’ny hiondrana, dia niharatra volon-doha tao Senkrea i Paoly, satria nisy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: voady
    - type: text
      text: ' nataony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mandritra ny fe-potoana aharetan’ny '
      - type: usfm
        marker: it
        children:
        - type: text
          text: voady
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' kosa dia tsy haratana ny volon-doha: jereo Nom 6.5-18. –'
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Senkrea:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' anankiray amin’ireo seranan’i Kôrinto, dia ilay teo atsinanan’ny andilantany.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary tonga tao Efeso izy ireo; dia nandao azy mivady i Paoly ka nankany amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' ary nifanakalo hevitra tamin’ny Jiosy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hitany tao ity Jiosy atao hoe Akoilà izay teraka tany Pônto; vao tonga avy any Italia i Akoilà mbamin’i Prisila vadiny, satria nodidian’ny amperôra Klaody
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Pônto '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia faritany amin’ny avaratr’i Azia Minôra, manamorona ny Ranomasina Mainty. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Klaody:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' jereo 11.28 sy nta. Fantatra fa nisy tokoa io didin’ny amperôra Klaody io tamin’ny taona 49 na 50.'
      marker-yv: yv-n
    - type: text
      text: ' hiala tany Rôma daholo ny Jiosy. Nanatona azy mivady i Paoly; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nangatahin-dry zareo izy mba hitoetra maharitraritra, kanefa tsy nety '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'fa nanao veloma azy sady niteny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Raha sitrapon’Andriamanitra, dia mbola hiverina atỳ aminareo aho.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia niondrana an-tsambo niala tao Efeso i Paoly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nony tody tao Kesaria izy, dia niakatra tany Jerosalema mba hiarahaba ny Fiangonana; izay vao nidina nankany Antiôkia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Rehefa avy nijanona kelikely tao izy, dia lasa indray nitety mifanesy ny faritany Galatia sy Frijia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 16.6 sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ka nampahery ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' rehetra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mitoriteny ao Efeso sy ao Kôrinto i Apôlao
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tonga tao Efeso ity Jiosy atao hoe Apôlao, teraka tany Aleksandria, lehilahy mpandaha-teny mahay sady nahalala tsara dia tsara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Efa nianatra ny lalana nosoritan’ny Tompo izy ary nafana fo nanambara sy nampianatra mazava tsara momba an’i Jesoa, saingy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisan’i Jôhany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 19.3-4.
      marker-yv: yv-n
    - type: text
      text: ' no hany fantany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Niteny tamim-pahasahiana tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' i Apôlao; ary nony nandre azy i Prisila sy i Akoilà, dia naka azy ho any aminy ka nanazava marina kokoa taminy momba ny lalana nosoritan’Andriamanitra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avy eo dia nanam-paniriana ho any Akaîa i Apôlao; ka nampirisika azy ny havana iray finoana sady nanoratra taratasy ho an’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' amin’io faritany io mba handraisany azy tsara. Nony tafapaka tany i Apôlao, dia nanampy tokoa ireo olona efa niasan’ny fahasoavan’Andriamanitra ka tonga mpino; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'teny feno hery tokoa no nandreseny lahatra ny Jiosy ampahibemaso ka nanaporofoany tamin’ny alalan’ny Soratra Masina fa i Jesoa no ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary satria mitovy asa tanana aminy rahateo i Paoly (fa samy mpanao lay izy ireo), dia nitoetra tao amin-dry i Akoilà sy i Prisila izy ary nifarimbona asa taminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Isaky ny andro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ', dia nifanakalo hevitra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' i Paoly ary niezahany horesen-dahatra na ny Jiosy na ny Grika.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rehefa tonga avy any Masedônia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 17.15.
      marker-yv: yv-n
    - type: text
      text: ' i Silasy mbamin’i Timôty, dia ny toriteny no nimasoan’i Paoly, ary nambarany tamin’ny Jiosy fa i Jesoa no ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mesia
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Kanefa nanohitra sy nanevateva azy ry zareo; ka dia nanopakopa-damba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: manopakopa-damba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' toy izany dia isan’ny fihetsika manambara fa afaka andraikitra amin’ireo Jiosy ireo i Paoly. Ampit Mk 6.11 sy nta ary koa Asa 13.51; 22.23.'
      marker-yv: yv-n
    - type: text
      text: ' i Paoly sady nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Anareo ny andraikitra raha toa ka manalavitra an’Andriamanitra ianareo, fa afaka adidy aminareo aho. Manomboka anio dia any amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' no halehako.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia niala teo i Paoly ka nankao amin’i Tisio Josta, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpanaja an’Andriamanitra
    - type: text
      text: ', izay nanan-trano nifanolotra tamin’ny sinagôga. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanefa nino ny Tompo i Krispo, lehiben’ny sinagôga, mbamin’ny ankohonany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 16.15, 33.
      marker-yv: yv-n
    - type: text
      text: ' manontolo; ary maro koa ny Kôrintianina nihaino an’i Paoly no tonga mpino ary natao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Indray alina dia nisehoam-pahitana i Paoly, ka nilazan’ny Tompo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza matahotra, fa mitenena hatrany ary aza mangina. '
