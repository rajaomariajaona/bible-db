document_id: ISA.63,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ilay mpanosihosy voaloboka mahatahotra
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iza àry ity tonga avy any Edôma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy any Bôtserà renivohiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka manao fitafiana miloko mena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izato izy miedinedina amin’akanjo marevaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miandranandrana amin’ny haben’ny heriny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: –Izaho izany, hoy ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia Izaho izay mitory ny fanafahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady manan-kery hamonjy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Edôma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'faritra ao atsimon’ny Ranomasina Maty. Ny Edômita dia noheverin’ny Israelita ho fahavalo nentim-paharazana, indrindra taorian’ny faharavàn’i Jerosalema tamin’ny taona 587 tal J.K. (Sal 137.7; Fit 4.21-22; Ezek 25.12; 35.5,12,15; 36.5; Hôb 10-15; jereo koa Is 34.5 sy nta.) –Ny anarana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Edôma sy Bôtserà '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dia milaza loko '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'mena '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ny voalohany ary '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'fiotazam-boaloboka '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny faharoa.
      marker-yv: yv-n
    - type: text
      text: '!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Saingy nikomy tamin’ny Tompo ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanome alahelo ny Fanahiny Masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tonga fahavalon’ireo Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady niady taminy mihitsy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tamin’izay ny vahoakan’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nahatsiaro ny tantarany fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izay tamin’ny andron’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia izay...Mosesy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 14.15-23.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nankaiza Ilay nampakatra avy ao amin’ny ony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ilay ho '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: text
      text: ' ny andianondriny?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nankaiza Ilay nametraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny Fanahiny Masina tao aminy?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izy no nampandroso ny sandriny mamirapiratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo ankavanan’i Mosesy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nampisaraka ny ranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo anoloan’ny vahoakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hananany laza mandrakizay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izy no nampandeha azy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teo amin’ny fanambanin’ny ranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toy ny soavaly mikarenjy any an-taniefitra ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy mba solafa-mamindra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toy ny biby fiompy midina an-dohasaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitondran’ny Fanahin’ny TOMPO azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho amin’ny toerana fialan-tsasatra.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, tahaka izany tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nitarihanao ny vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hanananao laza mamirapiratra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka fangatahana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mba mitsinjova avy eny an-danitra, Tompo ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy eo amin’ny fonenanao masina sy mamirapiratra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba jereo izay manjo anay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nankaiza izao ny fitiavanao miredareda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ny fahasahianao hiady ary ny fahaizanao mangoraka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ny famindramponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tsy ho sakantsakananao hihatra aminay!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Satria Ianao mihitsy no Rainay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa i Abrahama tsy mahalala anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary i Jakôba tsy mahafantatra anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, TOMPO ô, Ianao no Rainay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ianao ilay nantsoina hatrizay hatrizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny anaranao hoe «Mpanavotra anay.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: TOMPO ô, nahoana re izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no avelanao haniasia lavitra ny lalanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy hampikiry ny fonay tsy hanaja Anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena noho ny fitiavanao ny mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia izahay foko anjara fanananao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vahoaka natokana ho Anao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saingy fotoana fohy no nanananay ny tany lovanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa nohitsakitsahin’ny fahavalonay ny Toeramasinao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Efa ela izahay no vahoaka tsy nofehezinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady tsy niantsoana ny anaranao intsony!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie hotriarinao ny lanitra mba hidinanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hihorohoro eo anatrehanao ny tendrombohitra!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: –Nahoana no mena ny akanjonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nahoana ny fitafianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no tahaka ny an’ny mpanosihosy voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ao amin’ny famiazam-boaloboka?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: –Izaho irery no nanosihosy ny famiazam-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy nisy niaraka tamiko na dia iray aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ireo olona avy tamin’ny vahoakako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanosihosy hafa firenena tamin’ny fahatezerako Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary nanitsakitsaka azy tamin’ny fahavinirako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia nipitipitika tamin’ny fitafiako ny rany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka voalotoko ny akanjoko rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'nanosihosy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Apôk 14.20; 19.15. –
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia nipitipitika... rehetra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampit Apôk 19.13a.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa efa tao am-poko tao izao andro famaliana izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria tonga ny taona hanavotako ny vahoakako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia nijerijery olona Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanefa tsy nisy afaka hanampy Ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaga Aho satria tsy nisy nanohana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: koa ny fahefàko ihany no nentiko hamonjy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny fahavinirako no nandrisika Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Is 59.16.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia nentanim-pahatezerana Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nanamontsana ireo hafa firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nataoko boboky ny fahavinirako ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady napariakako tamin’ny tany ny rany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tantaran’ny hatsarampon’ny Tompo
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hampahatsiaroviko ireo mari-pitiavan’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo antony tokony hiderantsika AZY,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: araka izay rehetra nataony tamintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny soa be nafafiny ho an’ny taranak’Israely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famindrampo sy fitiavana tsy hita lany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nanaovany an’izany ho azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy ny TOMPO ny amin’ny Israelita hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tena vahoakako tokoa ianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: zanaka tsy handiso fanantenana Ahy.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tonga Mpamonjy azy ireo ny Tompo
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: tamin’ny fahoriana rehetra nanjo azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy solotena na anjely no namonjy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ny tenan’ny Tompo mihitsy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitiavany sy indrafony no nanavotany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nivimbinany azy sy nitondrany azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nandritra ny androny rehetra fahiny.
