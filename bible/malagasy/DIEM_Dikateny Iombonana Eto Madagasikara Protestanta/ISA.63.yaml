document_id: ISA.63,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ilay mpanosihosy voaloboka mahatahotra
  - type: text
    content: Iza àry ity tonga avy any Edôma,
  - type: text
    content: avy any Bôtserà renivohiny,
  - type: text
    content: ka manao fitafiana miloko mena?
  - type: text
    content: Izato izy miedinedina amin’akanjo marevaka,
  - type: text
    content: miandranandrana amin’ny haben’ny heriny!
  - type: text
    content: –Izaho izany, hoy ny Tompo,
  - type: text
    content: dia Izaho izay mitory ny fanafahana
  - type: text
    content: sady manan-kery hamonjy
  - type: note
    content: 'Edôma: faritra ao atsimon’ny Ranomasina Maty. Ny Edômita dia noheverin’ny Israelita ho fahavalo nentim-paharazana, indrindra taorian’ny faharavàn’i Jerosalema tamin’ny taona 587 tal J.K. (Sal 137.7; Fit 4.21-22; Ezek 25.12; 35.5,12,15; 36.5; Hôb 10-15; jereo koa Is 34.5 sy nta.) –Ny anarana hoe Edôma sy Bôtserà dia milaza loko mena ny voalohany ary fiotazam-boaloboka ny faharoa.'
  - type: text
    content: '!'
  '10':
  - type: text
    content: Saingy nikomy tamin’ny Tompo ireo
  - type: text
    content: ka nanome alahelo ny Fanahiny Masina;
  - type: text
    content: dia tonga fahavalon’ireo Izy
  - type: text
    content: sady niady taminy mihitsy.
  '11':
  - type: text
    content: Tamin’izay ny vahoakan’Andriamanitra
  - type: text
    content: dia nahatsiaro ny tantarany fahiny,
  - type: text
    content: dia izay tamin’ny andron’i Mosesy
  - type: note
    content: 'dia izay...Mosesy: jereo Eks 14.15-23.'
  - type: text
    content: ':'
  - type: text
    content: «Nankaiza Ilay nampakatra avy ao amin’ny ony,
  - type: text
    content: 'Ilay ho '
  - type: text
    content: mpiandry
  - type: text
    content: ' ny andianondriny?'
  - type: text
    content: Nankaiza Ilay nametraka
  - type: text
    content: ny Fanahiny Masina tao aminy?
  '12':
  - type: text
    content: Izy no nampandroso ny sandriny mamirapiratra
  - type: text
    content: teo ankavanan’i Mosesy,
  - type: text
    content: ka nampisaraka ny ranomasina
  - type: text
    content: teo anoloan’ny vahoakany
  - type: text
    content: mba hananany laza mandrakizay.
  '13':
  - type: text
    content: Izy no nampandeha azy ireo
  - type: text
    content: teo amin’ny fanambanin’ny ranomasina;
  - type: text
    content: toy ny soavaly mikarenjy any an-taniefitra ireo
  - type: text
    content: ka tsy mba solafa-mamindra.
  '14':
  - type: text
    content: Toy ny biby fiompy midina an-dohasaha
  - type: text
    content: no nitondran’ny Fanahin’ny TOMPO azy
  - type: text
    content: ho amin’ny toerana fialan-tsasatra.»
  - type: text
    content: Tompo ô, tahaka izany tokoa
  - type: text
    content: no nitarihanao ny vahoakanao
  - type: text
    content: mba hanananao laza mamirapiratra.
  - type: heading
    content: Vavaka fangatahana
  '15':
  - type: text
    content: Mba mitsinjova avy eny an-danitra, Tompo ô;
  - type: text
    content: avy eo amin’ny fonenanao masina sy mamirapiratra
  - type: text
    content: mba jereo izay manjo anay.
  - type: text
    content: Nankaiza izao ny fitiavanao miredareda
  - type: text
    content: sy ny fahasahianao hiady ary ny fahaizanao mangoraka?
  - type: text
    content: Enga anie ny famindramponao,
  - type: text
    content: tsy ho sakantsakananao hihatra aminay!
  '16':
  - type: text
    content: Satria Ianao mihitsy no Rainay,
  - type: text
    content: fa i Abrahama tsy mahalala anay,
  - type: text
    content: ary i Jakôba tsy mahafantatra anay;
  - type: text
    content: eny, TOMPO ô, Ianao no Rainay,
  - type: text
    content: Ianao ilay nantsoina hatrizay hatrizay
  - type: text
    content: amin’ny anaranao hoe «Mpanavotra anay.»
  '17':
  - type: text
    content: TOMPO ô, nahoana re izahay
  - type: text
    content: no avelanao haniasia lavitra ny lalanao,
  - type: text
    content: sy hampikiry ny fonay tsy hanaja Anao?
  - type: text
    content: Miverena noho ny fitiavanao ny mpanomponao,
  - type: text
    content: dia izahay foko anjara fanananao.
  '18':
  - type: text
    content: Vahoaka natokana ho Anao izahay,
  - type: text
    content: saingy fotoana fohy no nanananay ny tany lovanay;
  - type: text
    content: fa nohitsakitsahin’ny fahavalonay ny Toeramasinao.
  '19':
  - type: text
    content: Efa ela izahay no vahoaka tsy nofehezinao
  - type: text
    content: sady tsy niantsoana ny anaranao intsony!
  - type: text
    content: Enga anie hotriarinao ny lanitra mba hidinanao,
  - type: text
    content: ka hihorohoro eo anatrehanao ny tendrombohitra!
  '2':
  - type: text
    content: –Nahoana no mena ny akanjonao
  - type: text
    content: ary nahoana ny fitafianao
  - type: text
    content: no tahaka ny an’ny mpanosihosy voaloboka
  - type: text
    content: ao amin’ny famiazam-boaloboka?
  '3':
  - type: text
    content: –Izaho irery no nanosihosy ny famiazam-boaloboka
  - type: text
    content: fa tsy nisy niaraka tamiko na dia iray aza
  - type: text
    content: ireo olona avy tamin’ny vahoakako.
  - type: text
    content: Nanosihosy hafa firenena tamin’ny fahatezerako Aho
  - type: text
    content: ary nanitsakitsaka azy tamin’ny fahavinirako;
  - type: text
    content: dia nipitipitika tamin’ny fitafiako ny rany
  - type: text
    content: ka voalotoko ny akanjoko rehetra
  - type: note
    content: 'nanosihosy: ampit Apôk 14.20; 19.15. –dia nipitipitika... rehetra: ampit Apôk 19.13a.'
  - type: text
    content: .
  '4':
  - type: text
    content: Fa efa tao am-poko tao izao andro famaliana izao,
  - type: text
    content: satria tonga ny taona hanavotako ny vahoakako.
  '5':
  - type: text
    content: Dia nijerijery olona Aho,
  - type: text
    content: kanefa tsy nisy afaka hanampy Ahy.
  - type: text
    content: Gaga Aho satria tsy nisy nanohana,
  - type: text
    content: koa ny fahefàko ihany no nentiko hamonjy
  - type: text
    content: ary ny fahavinirako no nandrisika Ahy
  - type: note
    content: Jereo Is 59.16.
  - type: text
    content: .
  '6':
  - type: text
    content: Dia nentanim-pahatezerana Aho
  - type: text
    content: ka nanamontsana ireo hafa firenena;
  - type: text
    content: nataoko boboky ny fahavinirako ireny,
  - type: text
    content: sady napariakako tamin’ny tany ny rany.
  - type: heading
    content: Tantaran’ny hatsarampon’ny Tompo
  '7':
  - type: text
    content: Hampahatsiaroviko ireo mari-pitiavan’ny TOMPO
  - type: text
    content: sy ireo antony tokony hiderantsika AZY,
  - type: text
    content: araka izay rehetra nataony tamintsika
  - type: text
    content: mbamin’ny soa be nafafiny ho an’ny taranak’Israely.
  - type: text
    content: Famindrampo sy fitiavana tsy hita lany
  - type: text
    content: no nanaovany an’izany ho azy.
  '8':
  - type: text
    content: 'Hoy ny TOMPO ny amin’ny Israelita hoe:'
  - type: text
    content: «Tena vahoakako tokoa ianareo,
  - type: text
    content: zanaka tsy handiso fanantenana Ahy.»
  - type: text
    content: Ka dia tonga Mpamonjy azy ireo ny Tompo
  '9':
  - type: text
    content: tamin’ny fahoriana rehetra nanjo azy.
  - type: text
    content: Tsy solotena na anjely no namonjy azy
  - type: text
    content: fa ny tenan’ny Tompo mihitsy.
  - type: text
    content: Ny fitiavany sy indrafony no nanavotany azy,
  - type: text
    content: ka nivimbinany azy sy nitondrany azy
  - type: text
    content: nandritra ny androny rehetra fahiny.
