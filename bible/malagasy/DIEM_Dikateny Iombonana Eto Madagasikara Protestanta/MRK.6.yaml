      children:
      - type: text
        text: '56'
    - type: text
      text: 'Ary tany amin’ny toerana rehetra nalehan’i Jesoa, na tanàna kely na tanàn-dehibe na ambanivohitra, dia teny amin’ny kianja no nametrahana ny marary; ary dia niangavian’ny olona i Jesoa mba hamela ny marary hikasika na dia ny '
