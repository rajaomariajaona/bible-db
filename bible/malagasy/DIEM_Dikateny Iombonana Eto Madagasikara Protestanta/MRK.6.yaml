document_id: MRK.6,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy inoan’ny olona tao Nazareta i Jesoa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 13.53-58; Lk 4.16-30)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia niala teo i Jesoa ka nankany amin’ny tanàna nahabe Azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny tanàna nahabe Azy, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany hoe Nazareta. Ampit Mt 13.54. sy nta.
      marker-yv: yv-n
    - type: text
      text: ', ary nanaraka Azy tany koa ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianany
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy koa Izy taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izay trano hampandrosoana anareo no itoero mandra-pialanareo ny tanàna. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary izay toerana tsy handraisan’ny olona anareo na tsy hihainoany anareo, dia ialao; ka ahintsano eo ny vovoka avy amin’ny tongotrareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Ny manintsana ny vovoka avy amin’ny tongotra ka nipetaka tamin’ny moron-tongotr’akanjo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia fihetsika enti-milaza fandaozana sy fisarahana tanteraka; afaka adidy amin’ireo olona natao hitoriany manko ny iraka. Ampit Asa 13.51; 18.6.
      marker-yv: yv-n
    - type: text
      text: ' ho fiampangana azy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia lasa izy 12 lahy ary nitory tamin’ny olona fa hoe tokony hiala amin’ny toe-dratsy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Demony
    - type: text
      text: ' maro no noroahiny ary marary maro no nohosorany diloilo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jak 5.14.
      marker-yv: yv-n
    - type: text
      text: ' ka nositraniny.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan’i Jôhany Mpanao batisa
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 14.1-12; Lk 9.7-9; 3.19-20)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nandre ny resadresaka maro i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôda
    - type: text
      text: ' mpanjaka satria efa niely ny lazan’i Jesoa; fa hoy ny olona sasany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I Jôhany Mpanao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: batisa
    - type: text
      text: ', ilay efa maty io, fa velona indray, ka izany no ananany hery ahavitany asa mahagaga.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hoy kosa ny sasany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–I '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Elià
    - type: text
      text: ' io!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray ny hafa:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' io, tahaka ny anankiray tamin’ireo mpaminany fahizay.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy i Herôda rehefa nandre izany:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –I Jôhany Mpanao batisa izay, ilay efa nasaiko notapahina iny ny lohany, kanefa dia izany izy velona izany indray!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny tenan’i Herôda mihitsy manko no naniraka olona hisambotra an’i Jôhany, ary nampigadra azy tao am-ponja. Ny antony dia ny amin’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Herôdiada
    - type: text
      text: ', vadin’i Filipo rahalahiny, nefa nalain’i Herôda ho vady. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy i Jôhany tamin’i Herôda:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy azonao atao ny maka ny vadin’ny rahalahinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 18.16; 20.21.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nanao otri-po tamin’i Jôhany i Herôdiada ka nifofo ny ainy, saingy tsy afa-nanoatra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nony sabata ny andro, dia nampianatra tao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' i Jesoa; dia talanjona ireo olona maro nihaino Azy ka vaky vava hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Avy taiza re no nahazoan’ilay io izany zavatra izany? Ary ahoana izato fahendrena nomena azy sy ireto asa mahagaga vitany? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Natahotra an’i Jôhany i Herôda satria hitany fa lehilahy mandala ny rariny sady masim-pitondrantena i Jôhany ka narovany. Isaky ny nihaino azy i Herôda, dia sahiran-tsaina mafy, nefa dia nahafinaritra azy ny nihaino azy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Kanjo tonga ny fotoana nifanojo indrindra tamin’izay nilan’i Herôdiada azy, dia ny fitsingerenan’ny andro nahaterahan’i Herôda, ka nanaovan’ity mpanjaka fanasana ho an’ireo tandapany sy ireo komandin’ny tafiny ary ireo loholona tao Galilea. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia niditra ny zanakavavin’i Herôdiada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny zanakavavin’i Herôdiada: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'misy stf sasany ahitana hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: i Herôdiada zanany vavy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (satria rahalahin’i Herôda Antipasy no rainy).'
      marker-yv: yv-n
    - type: text
      text: ' ary nandihy, ka nahafaly an’i Herôda sy ny olona niara-nisakafo taminy. Dia hoy ny mpanjaka tamin-drazazavavy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Angataho amiko izay tianao na inona na inona, fa homeko anao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary niozona mafy tamin-drazazavavy ny mpanjaka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Na inona na inona hangatahinao amiko dia homeko anao na dia hatramin’ny antsasaky ny fanjakako aza.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia lasa nivoaka ny efitrano fisakafoana razazavavy ka nanao tamin-dreniny hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Inona no hangatahiko?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireniny:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ny lohan’i Jôhany Mpanao batisa.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia niditra faingana niaraka tamin’izay razazavavy nankeo amin’ny mpanjaka ary niteny taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tiako homenao ahy izao dia izao an-dovia ny lohan’i Jôhany Mpanao batisa.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nalahelo fatratra ny mpanjaka, saingy noho ilay fianianana efa nataony ary noho ireo olona niara-nisakafo taminy, dia tsy te handà ny fangatahan-drazazavavy izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Teo no ho eo ny mpanjaka dia naniraka mpiambina nomeny baiko hitondra ny lohan’i Jôhany. Dia lasa ilay io ka nanapa-doha azy tany am-ponja. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nentiny an-dovia ny lohan’i Jôhany ka nomeny an-drazazavavy; ary razazavavy kosa nanome azy an-dreniny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Nandre izany ny mpianatr’i Jôhany, ka tonga naka ny fatiny ary nandevina azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Jereo Mt 14.13-21; Lk 9.10-17; Jôh 6.1-14)
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy ilay mpandrafitra ve io, ilay zanak’i Maria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jôh 6.42.
      marker-yv: yv-n
    - type: text
      text: ' sady rahalahin’i Jakôba sy i Jôsèta ary i Joda sy i Simôna? Ary tsy ireto miara-monina amintsika ireto ve ny anabaviny?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia voasakana hino Azy ry zareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary dia niverina teo amin’i Jesoa ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' nitantara taminy izay rehetra nataony sy nampianariny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndao ianareo hitokana any an-taniefitra hiala sasatra kely.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maro loatra mantsy ireo olona nifamoivoy, ka tsy nisy fotoana hisakafoan’i Jesoa sy ny apôstôly akory. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia niondrana an-tsambokely ry i Jesoa ka nandeha nitokana any an-taniefitra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Hitan’ny olona fa niainga ry zareo ary maro no nahalala ny toerana halehany; dia nirohotra nandeha an-tongotra avy tany amin’ny tanàna rehetra ny olona, ka tonga talohany teo.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rehefa niala tao an-tsambokely i Jesoa, dia nahita vahoaka maro; ka onena azy ireo ny fony satria tahaka ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ondry
    - type: text
      text: ' tsy misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpiandry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Nom 27.17; 1 Mp 22.17.
      marker-yv: yv-n
    - type: text
      text: ' ireo, ary dia zavatra maro no nampianariny azy ireo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Efa hariva ny andro vao nanatona an’i Jesoa ny mpianany ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Taniefitra ity toerana ity ary ny andro efa hariva; '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ka ravao ny olona mba handeha hividy sakafo eny amin’ny trano an-tsaha sy tanàna kely manodidina.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa novalian’i Jesoa hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ianareo ihany no aoka hanome hanina azy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpianatra taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ka handeha àry ve izahay hividy mofo denàry roanjato homena hohaniny? '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Misy mofo firy any aminareo? Ndeha hoe jereo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka nony fantatry ny mpianany, dia hoy ireo hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Mofo dimy, ary koa trondro roa!
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nomen’i Jesoa baiko ny mpianatra hampipetraka ny olona rehetra, ka hampitsitokotoko azy eny ambony ahi-maitso. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy i Jesoa taminy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' tsy hajaina eo amin’ny tanàna nahabe azy sy eo amin’ny havany ary eo amin’ny fianakaviany, na dia heni-kaja any an-kafa aza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lk 4.24; Jôh 4.44.
      marker-yv: yv-n
    - type: text
      text: '!'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nipetraka nitsitokotoko zato sy dimampolo avy ny olona. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Noraisin’i Jesoa tamin’izay ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra ka nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianany harosony amin’ny olona; ary nozarain’i Jesoa tamin’ny olon-drehetra koa ny trondro anankiroa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Dia samy nihinana avokoa izy rehetra ka voky. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Nangonin’ireo mpianatra ny tapa-mofo ambiny ka nahafeno sobika 12
    - type: usfm
