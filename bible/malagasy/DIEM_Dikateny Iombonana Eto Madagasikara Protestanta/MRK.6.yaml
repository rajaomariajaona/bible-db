    - type: text
      text: 'Nahatazana an’i Jesoa nandeha teny ambony rano ireo mpianatra ary nihevitra Azy ho matoatoa, ka niantsoantso mafy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary tsy afaka nanao asa mahagaga teo Izy, afa-tsy tamin’ny nanasitranany marary vitsivitsy nametrahany tanana. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
