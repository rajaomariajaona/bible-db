document_id: MRK.6,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Tsy inoan’ny olona tao Nazareta i Jesoa
  - type: heading
    content: (Jereo Mt 13.53-58; Lk 4.16-30)
  - type: text
    content: Dia niala teo i Jesoa ka nankany amin’ny tanàna nahabe Azy
  - type: note
    content: ny tanàna nahabe Azy, izany hoe Nazareta. Ampit Mt 13.54. sy nta.
  - type: text
    content: ', ary nanaraka Azy tany koa ny '
  - type: text
    content: mpianany
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dia hoy koa Izy taminy:'
  - type: text
    content: '–Izay trano hampandrosoana anareo no itoero mandra-pialanareo ny tanàna. '
  '11':
  - type: text
    content: Ary izay toerana tsy handraisan’ny olona anareo na tsy hihainoany anareo, dia ialao; ka ahintsano eo ny vovoka avy amin’ny tongotrareo
  - type: note
    content: Ny manintsana ny vovoka avy amin’ny tongotra ka nipetaka tamin’ny moron-tongotr’akanjo dia fihetsika enti-milaza fandaozana sy fisarahana tanteraka; afaka adidy amin’ireo olona natao hitoriany manko ny iraka. Ampit Asa 13.51; 18.6.
  - type: text
    content: ' ho fiampangana azy.'
  '12':
  - type: text
    content: 'Dia lasa izy 12 lahy ary nitory tamin’ny olona fa hoe tokony hiala amin’ny toe-dratsy. '
  '13':
  - type: text
    content: Demony
  - type: text
    content: ' maro no noroahiny ary marary maro no nohosorany diloilo'
  - type: note
    content: Ampit Jak 5.14.
  - type: text
    content: ' ka nositraniny.'
  - type: heading
    content: Ny nahafatesan’i Jôhany Mpanao batisa
  - type: heading
    content: (Jereo Mt 14.1-12; Lk 9.7-9; 3.19-20)
  '14':
  - type: text
    content: 'Nandre ny resadresaka maro i '
  - type: text
    content: Herôda
  - type: text
    content: ' mpanjaka satria efa niely ny lazan’i Jesoa; fa hoy ny olona sasany:'
  - type: text
    content: '–I Jôhany Mpanao '
  - type: text
    content: batisa
  - type: text
    content: ', ilay efa maty io, fa velona indray, ka izany no ananany hery ahavitany asa mahagaga.'
  '15':
  - type: text
    content: 'Hoy kosa ny sasany:'
  - type: text
    content: '–I '
  - type: text
    content: Elià
  - type: text
    content: ' io!'
  - type: text
    content: 'Ary hoy indray ny hafa:'
  - type: text
    content: –
  - type: text
    content: Mpaminany
  - type: text
    content: ' io, tahaka ny anankiray tamin’ireo mpaminany fahizay.'
  '16':
  - type: text
    content: 'Dia hoy i Herôda rehefa nandre izany:'
  - type: text
    content: –I Jôhany Mpanao batisa izay, ilay efa nasaiko notapahina iny ny lohany, kanefa dia izany izy velona izany indray!
  '17':
  - type: text
    content: 'Ny tenan’i Herôda mihitsy manko no naniraka olona hisambotra an’i Jôhany, ary nampigadra azy tao am-ponja. Ny antony dia ny amin’i '
  - type: text
    content: Herôdiada
  - type: text
    content: ', vadin’i Filipo rahalahiny, nefa nalain’i Herôda ho vady. '
  '18':
  - type: text
    content: 'Fa hoy i Jôhany tamin’i Herôda:'
  - type: text
    content: –Tsy azonao atao ny maka ny vadin’ny rahalahinao
  - type: note
    content: Jereo Lev 18.16; 20.21.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Dia nanao otri-po tamin’i Jôhany i Herôdiada ka nifofo ny ainy, saingy tsy afa-nanoatra. '
  '2':
  - type: text
    content: 'Ary nony sabata ny andro, dia nampianatra tao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' i Jesoa; dia talanjona ireo olona maro nihaino Azy ka vaky vava hoe:'
  - type: text
    content: '–Avy taiza re no nahazoan’ilay io izany zavatra izany? Ary ahoana izato fahendrena nomena azy sy ireto asa mahagaga vitany? '
  '20':
  - type: text
    content: Natahotra an’i Jôhany i Herôda satria hitany fa lehilahy mandala ny rariny sady masim-pitondrantena i Jôhany ka narovany. Isaky ny nihaino azy i Herôda, dia sahiran-tsaina mafy, nefa dia nahafinaritra azy ny nihaino azy.
  '21':
  - type: text
    content: 'Kanjo tonga ny fotoana nifanojo indrindra tamin’izay nilan’i Herôdiada azy, dia ny fitsingerenan’ny andro nahaterahan’i Herôda, ka nanaovan’ity mpanjaka fanasana ho an’ireo tandapany sy ireo komandin’ny tafiny ary ireo loholona tao Galilea. '
  '22':
  - type: text
    content: Dia niditra ny zanakavavin’i Herôdiada
  - type: note
    content: 'ny zanakavavin’i Herôdiada: misy stf sasany ahitana hoe i Herôdiada zanany vavy (satria rahalahin’i Herôda Antipasy no rainy).'
  - type: text
    content: ' ary nandihy, ka nahafaly an’i Herôda sy ny olona niara-nisakafo taminy. Dia hoy ny mpanjaka tamin-drazazavavy:'
  - type: text
    content: –Angataho amiko izay tianao na inona na inona, fa homeko anao.
  '23':
  - type: text
    content: 'Ary niozona mafy tamin-drazazavavy ny mpanjaka nanao hoe:'
  - type: text
    content: –Na inona na inona hangatahinao amiko dia homeko anao na dia hatramin’ny antsasaky ny fanjakako aza.
  '24':
  - type: text
    content: 'Dia lasa nivoaka ny efitrano fisakafoana razazavavy ka nanao tamin-dreniny hoe:'
  - type: text
    content: –Inona no hangatahiko?
  - type: text
    content: 'Ary hoy ireniny:'
  - type: text
    content: –Ny lohan’i Jôhany Mpanao batisa.
  '25':
  - type: text
    content: 'Dia niditra faingana niaraka tamin’izay razazavavy nankeo amin’ny mpanjaka ary niteny taminy hoe:'
  - type: text
    content: –Tiako homenao ahy izao dia izao an-dovia ny lohan’i Jôhany Mpanao batisa.
  '26':
  - type: text
    content: 'Nalahelo fatratra ny mpanjaka, saingy noho ilay fianianana efa nataony ary noho ireo olona niara-nisakafo taminy, dia tsy te handà ny fangatahan-drazazavavy izy. '
  '27':
  - type: text
    content: 'Teo no ho eo ny mpanjaka dia naniraka mpiambina nomeny baiko hitondra ny lohan’i Jôhany. Dia lasa ilay io ka nanapa-doha azy tany am-ponja. '
  '28':
  - type: text
    content: 'Nentiny an-dovia ny lohan’i Jôhany ka nomeny an-drazazavavy; ary razazavavy kosa nanome azy an-dreniny. '
  '29':
  - type: text
    content: Nandre izany ny mpianatr’i Jôhany, ka tonga naka ny fatiny ary nandevina azy.
  - type: heading
    content: Omen’i Jesoa sakafo ny olona mihoatra ny dimy arivo
  - type: heading
    content: (Jereo Mt 14.13-21; Lk 9.10-17; Jôh 6.1-14)
  '3':
  - type: text
    content: Tsy ilay mpandrafitra ve io, ilay zanak’i Maria
  - type: note
    content: Ampit Jôh 6.42.
  - type: text
    content: ' sady rahalahin’i Jakôba sy i Jôsèta ary i Joda sy i Simôna? Ary tsy ireto miara-monina amintsika ireto ve ny anabaviny?'
  - type: text
    content: 'Dia voasakana hino Azy ry zareo. '
  '30':
  - type: text
    content: 'Ary dia niverina teo amin’i Jesoa ireo '
  - type: text
    content: apôstôly
  - type: text
    content: ' nitantara taminy izay rehetra nataony sy nampianariny. '
  '31':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Ndao ianareo hitokana any an-taniefitra hiala sasatra kely.
  - type: text
    content: 'Maro loatra mantsy ireo olona nifamoivoy, ka tsy nisy fotoana hisakafoan’i Jesoa sy ny apôstôly akory. '
  '32':
  - type: text
    content: 'Dia niondrana an-tsambokely ry i Jesoa ka nandeha nitokana any an-taniefitra. '
  '33':
  - type: text
    content: Hitan’ny olona fa niainga ry zareo ary maro no nahalala ny toerana halehany; dia nirohotra nandeha an-tongotra avy tany amin’ny tanàna rehetra ny olona, ka tonga talohany teo.
  '34':
  - type: text
    content: 'Rehefa niala tao an-tsambokely i Jesoa, dia nahita vahoaka maro; ka onena azy ireo ny fony satria tahaka ny '
  - type: text
    content: ondry
  - type: text
    content: ' tsy misy '
  - type: text
    content: mpiandry
  - type: note
    content: Ampit Nom 27.17; 1 Mp 22.17.
  - type: text
    content: ' ireo, ary dia zavatra maro no nampianariny azy ireo. '
  '35':
  - type: text
    content: 'Efa hariva ny andro vao nanatona an’i Jesoa ny mpianany ka nanao hoe:'
  - type: text
    content: '–Taniefitra ity toerana ity ary ny andro efa hariva; '
  '36':
  - type: text
    content: ka ravao ny olona mba handeha hividy sakafo eny amin’ny trano an-tsaha sy tanàna kely manodidina.
  '37':
  - type: text
    content: 'Fa novalian’i Jesoa hoe:'
  - type: text
    content: –Ianareo ihany no aoka hanome hanina azy.
  - type: text
    content: 'Dia hoy ny mpianatra taminy:'
  - type: text
    content: '–Ka handeha àry ve izahay hividy mofo denàry roanjato homena hohaniny? '
  '38':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –Misy mofo firy any aminareo? Ndeha hoe jereo.
  - type: text
    content: 'Ka nony fantatry ny mpianany, dia hoy ireo hoe:'
  - type: text
    content: –Mofo dimy, ary koa trondro roa!
  '39':
  - type: text
    content: 'Dia nomen’i Jesoa baiko ny mpianatra hampipetraka ny olona rehetra, ka hampitsitokotoko azy eny ambony ahi-maitso. '
  '4':
  - type: text
    content: 'Fa hoy i Jesoa taminy:'
  - type: text
    content: –
  - type: text
    content: Mpaminany
  - type: text
    content: ' tsy hajaina eo amin’ny tanàna nahabe azy sy eo amin’ny havany ary eo amin’ny fianakaviany, na dia heni-kaja any an-kafa aza'
  - type: note
    content: Ampit Lk 4.24; Jôh 4.44.
  - type: text
    content: '!'
  '40':
  - type: text
    content: 'Dia nipetraka nitsitokotoko zato sy dimampolo avy ny olona. '
  '41':
  - type: text
    content: 'Noraisin’i Jesoa tamin’izay ny mofo dimy sy ny trondro anankiroa; ary rehefa niandrandra ny lanitra ka nisaotra an’Andriamanitra Izy, dia nanapaka ny mofo sy nanome azy ny mpianany harosony amin’ny olona; ary nozarain’i Jesoa tamin’ny olon-drehetra koa ny trondro anankiroa. '
  '42':
  - type: text
    content: 'Dia samy nihinana avokoa izy rehetra ka voky. '
  '43':
  - type: text
    content: Nangonin’ireo mpianatra ny tapa-mofo ambiny ka nahafeno sobika 12
  - type: note
    content: Ampit 2 Mp 4.42-44.
  - type: text
    content: ', ary nangoniny koa ny trondro sisa. '
  '44':
  - type: text
    content: Nefa dia nisy dimy arivo ny vatan-dehilahy nihinana mofo teo.
  - type: heading
    content: Andehanan’i Jesoa an-tongotra eny ambony rano
  - type: heading
    content: (Jereo Mt 14.22-33; Jôh 6.15-21)
  '45':
  - type: text
    content: 'Vetivety foana taorian’izay, dia noteren’i Jesoa hiondrana an-tsambokely ny '
  - type: text
    content: mpianany
  - type: text
    content: ' ary nasainy hiampita mialoha hankeny Betsaidà; fa Izy mbola handefa ny vahoaka hody. '
  '46':
  - type: text
    content: 'Ary rehefa avy nanao veloma ny vahoaka i Jesoa, dia lasa nankany an-tendrombohitra hivavaka. '
  '47':
  - type: text
    content: 'Efa maizina ny andro no teo ampovoan’ny farihy ny sambokely, ary i Jesoa irery sisa teny an-tanety; '
  '48':
  - type: text
    content: hitany fa sahirana mafy ny mpianatra nivoy ny sambokely, satria notohain’ny rivotra ry zareo. Ary tokony ho tamin’ny maraina efa naneno akoho, dia lasa nanatona ny mpianany i Jesoa, nandeha teny ambony farihy ka efa hihoatra azy
  - type: note
    content: 'hihoatra azy: dkt hafa hanatratra azy, hanakaiky azy.'
  - type: text
    content: '. '
  '49':
  - type: text
    content: 'Nahatazana an’i Jesoa nandeha teny ambony rano ireo mpianatra ary nihevitra Azy ho matoatoa, ka niantsoantso mafy. '
  '5':
  - type: text
    content: 'Ary tsy afaka nanao asa mahagaga teo Izy, afa-tsy tamin’ny nanasitranany marary vitsivitsy nametrahany tanana. '
  '50':
  - type: text
    content: 'Samy nahatazana an’i Jesoa izy rehetra ka raiki-tahotra. Avy hatrany dia niteny taminy anefa i Jesoa ka nanao hoe:'
  - type: text
    content: –Matokia, fa Izaho ity. Aoka izay ny tahotra!
  '51':
  - type: text
    content: 'Niakatra nankeo aminy tao an-tsambokely i Jesoa, dia indro nijanona ny rivotra; ka talanjona fatratra ny mpianatra, '
  '52':
  - type: text
    content: satria tsy azony an-tsaina ilay nampitomboana ny mofo, noho ny hamafin’ny fony.
  - type: heading
    content: Sitranin’i Jesoa ireo marary tao Genesareta
  - type: heading
    content: (Jereo Mt 14.34-36)
  '53':
  - type: text
    content: 'Ary nony tafita ny rano i Jesoa mbamin’ny '
  - type: text
    content: mpianany
  - type: text
    content: ', dia tonga tao amin’ny faritanin’i '
  - type: text
    content: Genesareta
  - type: note
    content: 'faritanin’i Genesareta: tany lemaka mahavokatra eo atsimo andrefan’i Kafarnahòma.'
  - type: text
    content: ', ka niantsona teo. '
  '54':
  - type: text
    content: 'Rehefa niala tao an-tsambokely ry zareo, dia nahafantatra an’i Jesoa avy hatrany ny olona, '
  '55':
  - type: text
    content: 'ka lasa nitety haingana ny faritany manontolo ary nitondra ny marary tamin’ny filanjana hankany amin’izay reny fa nisy Azy. '
  '56':
  - type: text
    content: 'Ary tany amin’ny toerana rehetra nalehan’i Jesoa, na tanàna kely na tanàn-dehibe na ambanivohitra, dia teny amin’ny kianja no nametrahana ny marary; ary dia niangavian’ny olona i Jesoa mba hamela ny marary hikasika na dia ny '
  - type: text
    content: somotraviavin-dambany
  - type: text
    content: ' fotsiny ihany aza; ary izay rehetra nikasika Azy dia sitrana avokoa.'
  '6':
  - type: text
    content: Dia gaga i Jesoa, satria tsy nanam-pinoana ry zareo.
  - type: heading
    content: Irahin’i Jesoa ny 12 lahy
  - type: heading
    content: (Jereo Mt 10.5-15; Lk 9.1-6)
  - type: text
    content: 'Ary nitety ny tanàna kely manodidina i Jesoa, ka nampianatra. '
  '7':
  - type: text
    content: 'Dia nantsoiny hankeo aminy ny 12 lahy ary nirahiny tsiroaroa ka nomeny fahefana handroaka ny '
  - type: text
    content: fanahy maloto
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary izao no hafatrafatra nataony taminy:'
  - type: text
    content: '–Aza mitondra na inona na inona rehefa handeha, afa-tsy tehina; aza mitondra vatsy na kitapom-batsy na vola am-paosy; '
  '9':
  - type: text
    content: manaova kapa ary aza mitondra akanjo hisoloana.
