document_id: EXO.32,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: TAPAHIN’I ISRAELY NY FANEKEMPIHAVANANA AMIN’ANDRIAMANITRA
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny ombilahikely volamena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony hitan’ny vahoaka israelita fa tara ny fidinan’i Mosesy avy any an-tendrombohitra, dia nivory teo amin’i Aharôna izy, ka nanao taminy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ndeha anaovy andriamanitra iray izahay handeha eo alohanay, satria tsy fantatray izay nanjo an’i Mosesy, ilay lehilahy namoaka anay hiala tany Ejipta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'andriamanitra iray izahay: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'azo atao koa ny mandika azy hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: andriamanitra izahay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jereo Asa 7.40.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa ankehitriny, avelao hanaovako azy: haringako amin’ny fahatezerako izy, fa ianao kosa hataoko firenena lehibe.»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa niangavy ny TOMPO Andriamaniny i Mosesy mba ho tony ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–TOMPO ô, nahoana no hanampatra ny fahatezeranao amin’ny vahoakanao Ianao, rehefa avy nampiasa hery lehibe sy fahefana tsy hay tohaina mba hamoaka azy hiala tany Ejipta? '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha izany no hataonao, dia hiteny ny Ejiptianina hoe: «Halozana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Halozana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'na hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hampidi-doza azy ireo.
      marker-yv: yv-n
    - type: text
      text: 'no namoahan’ny Tompo ireo Israelita ireo hiala ny tanintsika, mba handringanany azy any an-tendrombohitra, ary hanafoanany azy tsy ho eto ambonin’ny tany intsony.» TOMPO ô, toneo ny hatezeranao, ary avelao ny loza saika hamelezanao ny vahoakanao. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsarovy i Abrahama sy i Itsehàka ary i Jakôba mpanomponao izay nianiananao ka nilazanao hoe: «Hataoko marobe toy ny kintana eny amin’ny habakabaka ny taranakareo. Homeko azy ny tany rehetra izay nampanantenaiko, ka ho fananany raikitra izany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Gen 17.8; 22.16-17.
      marker-yv: yv-n
    - type: text
      text: .»
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia najanon’ny TOMPO tamin’izay ny loza nolazainy hamelezana ny vahoakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.14 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 11-14:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Nom 14.13-19.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nitodi-doha i Mosesy, ka nidina avy eny an-tendrombohitra. Nentiny teny an-tanany ny vatofisaka roa izay nanoratana ny didin’Andriamanitra, samy voasikotra teo amin’ny lafiny anankiray. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Asan’Andriamanitra ireo vatofisaka roa ireo, nosoratan’ny tanan’Andriamanitra mihitsy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ren’i Josoa ny feon’ny vahoaka nihorakoraka, ka hoy izy tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Horakoraky ny ady any an-toby izany!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa namaly azy i Mosesy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsia, tsy horakora-pandresena, na kiakiakam-paharesena no reko, fa hiram-pety.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Raha vao nanatona ny toby izy, dia hitan’i Mosesy ny sarivongana ombilahikely sy ny vahoaka nandihy. Tezitra i Mosesy, ka natsipiny ny vatofisaka teny an-tanany sady nopotipotehiny teo am-pototry ny tendrombohitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa novalian’i Aharôna hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Esory ny kavim-bolamena eny an-tsofin’ny vadinareo sy ny zanakalahinareo ary ny zanakavavinareo, ka ento atỳ amiko.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nalain’i Mosesy koa ny sarivongana ombilahikely izay namboarin’ireo ka nodorany tamin’ny afo. Avy eo, notorotoroiny ho vovoka ny sisa tavela, dia naparitany tamin’ny rano izay nasainy nosotroin’ny Israelita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nanontany an’i Aharôna izy hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nanao inona anao ity vahoaka ity no dia nentinao amin’izao heloka bevava izao?
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa novaliany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Aza tezitra ianao, tompoko. Fantatrao ihany fa mailaka hanao ratsy ity vahoaka ity. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tonga nilaza tamiko izy hoe: «Anaovy andriamanitra izahay hitarika anay satria tsy fantatray izay nanjo an’i Mosesy, ilay lehilahy namoaka anay hiala tany Ejipta.» '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nanontany azy aho hoe: «Iza àry no manana volamena?» Niaraka tamin’izay dia nesorin-dry zareo ny firavaka teny aminy ka natolony ahy. Narendriko tamin’ny afo kosa izany, ary io ombilahikely io no nivoaka avy tao.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famaizana
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Tsapan’i Mosesy tamin’izay fa navelan’i Aharôna hanao izay tiany hatao ny vahoaka, sady navelany hataon’ny fahavalony ho fihomehezana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Koa nitsangana teo am-bavahadin’ny toby izy, ary niantso hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Izay an’ny TOMPO, mankanesa etỳ amiko!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitangorona teo amin’i Mosesy ny Levita rehetra, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ka nitenenany hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Izao no baikon’ny TOMPO, Andriamanitr’i Israely: «Samia mandray ny sabany avy ianareo, ka mandehàna mivezivezy isam-baravarana ato amin’ny toby, vonoy ny rahalahinareo sy ny namanareo ary ny mpifanolo-bodirindrina aminareo.»'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nankatoavin’ny Levita ny tenin’i Mosesy, ka Israelita telo arivo eo ho eo no maty tamin’izany andro izany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hoy i Mosesy tamin’ny Levita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Androany dia voatokana ho amin’ny fanompoana ny TOMPO ianareo, satria novonoinareo na dia ny zanakareo sy ny rahalahinareo aza. Homen’ny TOMPO anareo anio anie ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fitahiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Voatokana ho... ianareo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'araka ny dkt tranainy grika sy latinina; fa ny RM kosa manao hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: atokany ny tenanareo ho amin’ny fanompoana ny Tompo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Tsy mazava ny RM koa tsy azo antoka ny dkt eto.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nitaraina tamin’Andriamanitra i Mosesy mba havelany ny helok’i Israely
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia samy manaisotra ny kavim-bolamena teny an-tsofiny ny Israelita rehetra, ka nitondra ny azy tany amin’i Aharôna. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nony ampitso dia hoy i Mosesy tamin’ny vahoaka israelita:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Nanao heloka bevava ianareo. Koa hiakatra ho any an-tendrombohitra any amin’ny TOMPO aho izao; angamba hahazo famelana ny helokareo aho.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia niverina tany amin’ny Tompo i Mosesy ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Indrisy, TOMPO ô! Efa nanao heloka bevava ity vahoaka ity fa nanao andriamani-bolamena. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Koa ankehitriny raha sitrakao dia avelao ny helony, raha tsy izany dia vonoy ny anarako ao amin’ny bokim-piainana izay nosoratanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Araka ny Sal 62.29; Apôk 3.5, dia mitana '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bokim-piainana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izay anoratany ny anaran’ny mpino Andriamanitra. Izany fomba fiteny izany dia mety ho hevitra nalaina avy amin’ny lisitra misy ny anarana tamin’ny fanisam-bahoaka; raha misy voakosoka tsy ho ao anatin’ny lisitra toy izany, dia tsy anisan’ny vahoakan’Andriamanitra intsony.'
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Tsia, tsy misy hovonoiko ao amin’ny bokiko afa-tsy ny anaran’ireo izay nanota tamiko ihany. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Koa ankehitriny mandehàna, ento any amin’ny toerana izay natoroko anao io vahoaka io; indro ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anjeliko
    - type: text
      text: ' hiaraka aminao. Fa amin’ny andro iray hamaizako azy, dia hanafay azy aho noho ny helony.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Koa namely ny Israelita ny TOMPO satria nangataka tamin’i Aharôna ireo mba hanao sarivongana ombilahikely ho azy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Noraisin’i Aharôna ireny ka nempoiny ary nararany tamin’ny lasitra, dia nanaovany sarivongana ombilahikely iray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.4 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Nararany tamin’ny lasitra ny volamena:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: notefeny tamin’ny fandraka ny volamena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . –Tany amin’iny faritra atsinanana iny fahiny, ny sarivongana toy ny ombilahikely dia tsy maneho ny andriamanitra fa faladia itoeran’ny sarivongan’ilay andriamanitra. Tany moa ny ombilahy amin’ny ankapobeny dia mariky ny hery sy ny fananahana; noho izany dia karazana fanesoana ihany no niantsoana ny sarivongana hoe ombilahikely eto. –Jereo Asa 7.41; ampit 1 Mp 12.28.
      marker-yv: yv-n
    - type: text
      text: '. Dia nihoraka ny Israelita hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Ity no andriamanitsika izay namoaka antsika hiala tany Ejipta!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nony hitan’i Aharôna izany, dia namboatra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alitara
    - type: text
      text: ' iray teo anoloan’ny sarivongana izy, ary nanambara hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Hisy fety hanomezam-boninahitra ny TOMPO rahampitso!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nony ampitso dia nifoha maraina ny vahoaka israelita ka nanolotra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' dorana manontolo sy sorom-pihavanana teo amin’io alitara io. Ary nipetraka hihinana sy hisotro ny vahoaka, ary avy eo dia nitsangana mba hifalifaly'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jereo 1Kôr 10.7. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: '–Ary nipetraka... hifalifaly:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Avy teo ny olona dia nipetraka hihinana sakafom-pety, izay nivadika ho fibobohan-toaka.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nilaza tamin’i Mosesy ny TOMPO hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Andeha midina izao ianao, fa efa nanao heloka bevava ny vahoaka izay navoakanao hiala tany Ejipta. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nalaky nivily hiala tamin’ny lalana izay nasaiko nalehany izy, fa nanamboatra sarivongana ombilahikely ho azy, sady niankohoka taminy ary nanao sorona ho azy. Nilaza aza izy hoe: «Ity no andriamanitsika izay namoaka antsika hiala tany Ejipta!» '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Izaho TOMPO taminao: «Hitako tsara io vahoaka io fa mafy hatoka. '
