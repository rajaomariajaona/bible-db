document_id: EXO.32,396
type_code: plt
verses:
  '1':
  - type: heading
    content: TAPAHIN’I ISRAELY NY FANEKEMPIHAVANANA AMIN’ANDRIAMANITRA
  - type: heading
    content: Ny ombilahikely volamena
  - type: text
    content: 'Nony hitan’ny vahoaka israelita fa tara ny fidinan’i Mosesy avy any an-tendrombohitra, dia nivory teo amin’i Aharôna izy, ka nanao taminy hoe:'
  - type: text
    content: –Ndeha anaovy andriamanitra iray izahay handeha eo alohanay, satria tsy fantatray izay nanjo an’i Mosesy, ilay lehilahy namoaka anay hiala tany Ejipta
  - type: note
    content: 'andriamanitra iray izahay: azo atao koa ny mandika azy hoe andriamanitra izahay. Jereo Asa 7.40.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'Koa ankehitriny, avelao hanaovako azy: haringako amin’ny fahatezerako izy, fa ianao kosa hataoko firenena lehibe.»'
  '11':
  - type: text
    content: 'Fa niangavy ny TOMPO Andriamaniny i Mosesy mba ho tony ka nanao hoe:'
  - type: text
    content: '–TOMPO ô, nahoana no hanampatra ny fahatezeranao amin’ny vahoakanao Ianao, rehefa avy nampiasa hery lehibe sy fahefana tsy hay tohaina mba hamoaka azy hiala tany Ejipta? '
  '12':
  - type: text
    content: 'Raha izany no hataonao, dia hiteny ny Ejiptianina hoe: «Halozana'
  - type: note
    content: Halozana na hoe Hampidi-doza azy ireo.
  - type: text
    content: 'no namoahan’ny Tompo ireo Israelita ireo hiala ny tanintsika, mba handringanany azy any an-tendrombohitra, ary hanafoanany azy tsy ho eto ambonin’ny tany intsony.» TOMPO ô, toneo ny hatezeranao, ary avelao ny loza saika hamelezanao ny vahoakanao. '
  '13':
  - type: text
    content: 'Tsarovy i Abrahama sy i Itsehàka ary i Jakôba mpanomponao izay nianiananao ka nilazanao hoe: «Hataoko marobe toy ny kintana eny amin’ny habakabaka ny taranakareo. Homeko azy ny tany rehetra izay nampanantenaiko, ka ho fananany raikitra izany'
  - type: note
    content: Jereo Gen 17.8; 22.16-17.
  - type: text
    content: .»
  '14':
  - type: text
    content: Dia najanon’ny TOMPO tamin’izay ny loza nolazainy hamelezana ny vahoakany
  - type: note
    content: 'And 11-14: jereo Nom 14.13-19.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Ary nitodi-doha i Mosesy, ka nidina avy eny an-tendrombohitra. Nentiny teny an-tanany ny vatofisaka roa izay nanoratana ny didin’Andriamanitra, samy voasikotra teo amin’ny lafiny anankiray. '
  '16':
  - type: text
    content: 'Asan’Andriamanitra ireo vatofisaka roa ireo, nosoratan’ny tanan’Andriamanitra mihitsy. '
  '17':
  - type: text
    content: 'Ren’i Josoa ny feon’ny vahoaka nihorakoraka, ka hoy izy tamin’i Mosesy:'
  - type: text
    content: –Horakoraky ny ady any an-toby izany!
  '18':
  - type: text
    content: 'Fa namaly azy i Mosesy hoe:'
  - type: text
    content: –Tsia, tsy horakora-pandresena, na kiakiakam-paharesena no reko, fa hiram-pety.
  '19':
  - type: text
    content: 'Raha vao nanatona ny toby izy, dia hitan’i Mosesy ny sarivongana ombilahikely sy ny vahoaka nandihy. Tezitra i Mosesy, ka natsipiny ny vatofisaka teny an-tanany sady nopotipotehiny teo am-pototry ny tendrombohitra. '
  '2':
  - type: text
    content: 'Fa novalian’i Aharôna hoe:'
  - type: text
    content: –Esory ny kavim-bolamena eny an-tsofin’ny vadinareo sy ny zanakalahinareo ary ny zanakavavinareo, ka ento atỳ amiko.
  '20':
  - type: text
    content: 'Nalain’i Mosesy koa ny sarivongana ombilahikely izay namboarin’ireo ka nodorany tamin’ny afo. Avy eo, notorotoroiny ho vovoka ny sisa tavela, dia naparitany tamin’ny rano izay nasainy nosotroin’ny Israelita. '
  '21':
  - type: text
    content: 'Ary nanontany an’i Aharôna izy hoe:'
  - type: text
    content: –Nanao inona anao ity vahoaka ity no dia nentinao amin’izao heloka bevava izao?
  '22':
  - type: text
    content: 'Fa novaliany hoe:'
  - type: text
    content: '–Aza tezitra ianao, tompoko. Fantatrao ihany fa mailaka hanao ratsy ity vahoaka ity. '
  '23':
  - type: text
    content: 'Tonga nilaza tamiko izy hoe: «Anaovy andriamanitra izahay hitarika anay satria tsy fantatray izay nanjo an’i Mosesy, ilay lehilahy namoaka anay hiala tany Ejipta.» '
  '24':
  - type: text
    content: 'Dia nanontany azy aho hoe: «Iza àry no manana volamena?» Niaraka tamin’izay dia nesorin-dry zareo ny firavaka teny aminy ka natolony ahy. Narendriko tamin’ny afo kosa izany, ary io ombilahikely io no nivoaka avy tao.'
  - type: heading
    content: Ny famaizana
  '25':
  - type: text
    content: 'Tsapan’i Mosesy tamin’izay fa navelan’i Aharôna hanao izay tiany hatao ny vahoaka, sady navelany hataon’ny fahavalony ho fihomehezana. '
  '26':
  - type: text
    content: 'Koa nitsangana teo am-bavahadin’ny toby izy, ary niantso hoe:'
  - type: text
    content: –Izay an’ny TOMPO, mankanesa etỳ amiko!
  - type: text
    content: 'Dia nitangorona teo amin’i Mosesy ny Levita rehetra, '
  '27':
  - type: text
    content: 'ka nitenenany hoe:'
  - type: text
    content: '–Izao no baikon’ny TOMPO, Andriamanitr’i Israely: «Samia mandray ny sabany avy ianareo, ka mandehàna mivezivezy isam-baravarana ato amin’ny toby, vonoy ny rahalahinareo sy ny namanareo ary ny mpifanolo-bodirindrina aminareo.»'
  '28':
  - type: text
    content: 'Nankatoavin’ny Levita ny tenin’i Mosesy, ka Israelita telo arivo eo ho eo no maty tamin’izany andro izany. '
  '29':
  - type: text
    content: 'Dia hoy i Mosesy tamin’ny Levita:'
  - type: text
    content: '–Androany dia voatokana ho amin’ny fanompoana ny TOMPO ianareo, satria novonoinareo na dia ny zanakareo sy ny rahalahinareo aza. Homen’ny TOMPO anareo anio anie ny '
  - type: text
    content: fitahiana
  - type: note
    content: 'Voatokana ho... ianareo: araka ny dkt tranainy grika sy latinina; fa ny RM kosa manao hoe atokany ny tenanareo ho amin’ny fanompoana ny Tompo. Tsy mazava ny RM koa tsy azo antoka ny dkt eto.'
  - type: text
    content: .
  - type: heading
    content: Nitaraina tamin’Andriamanitra i Mosesy mba havelany ny helok’i Israely
  '3':
  - type: text
    content: 'Dia samy manaisotra ny kavim-bolamena teny an-tsofiny ny Israelita rehetra, ka nitondra ny azy tany amin’i Aharôna. '
  '30':
  - type: text
    content: 'Nony ampitso dia hoy i Mosesy tamin’ny vahoaka israelita:'
  - type: text
    content: –Nanao heloka bevava ianareo. Koa hiakatra ho any an-tendrombohitra any amin’ny TOMPO aho izao; angamba hahazo famelana ny helokareo aho.
  '31':
  - type: text
    content: 'Dia niverina tany amin’ny Tompo i Mosesy ka nanao hoe:'
  - type: text
    content: '–Indrisy, TOMPO ô! Efa nanao heloka bevava ity vahoaka ity fa nanao andriamani-bolamena. '
  '32':
  - type: text
    content: Koa ankehitriny raha sitrakao dia avelao ny helony, raha tsy izany dia vonoy ny anarako ao amin’ny bokim-piainana izay nosoratanao
  - type: note
    content: Araka ny Sal 62.29; Apôk 3.5, dia mitana bokim-piainana izay anoratany ny anaran’ny mpino Andriamanitra. Izany fomba fiteny izany dia mety ho hevitra nalaina avy amin’ny lisitra misy ny anarana tamin’ny fanisam-bahoaka; raha misy voakosoka tsy ho ao anatin’ny lisitra toy izany, dia tsy anisan’ny vahoakan’Andriamanitra intsony.
  - type: text
    content: .
  '33':
  - type: text
    content: 'Dia hoy ny TOMPO tamin’i Mosesy:'
  - type: text
    content: '–Tsia, tsy misy hovonoiko ao amin’ny bokiko afa-tsy ny anaran’ireo izay nanota tamiko ihany. '
  '34':
  - type: text
    content: 'Koa ankehitriny mandehàna, ento any amin’ny toerana izay natoroko anao io vahoaka io; indro ny '
  - type: text
    content: anjeliko
  - type: text
    content: ' hiaraka aminao. Fa amin’ny andro iray hamaizako azy, dia hanafay azy aho noho ny helony.'
  '35':
  - type: text
    content: Koa namely ny Israelita ny TOMPO satria nangataka tamin’i Aharôna ireo mba hanao sarivongana ombilahikely ho azy.
  '4':
  - type: text
    content: Noraisin’i Aharôna ireny ka nempoiny ary nararany tamin’ny lasitra, dia nanaovany sarivongana ombilahikely iray
  - type: note
    content: 'Nararany tamin’ny lasitra ny volamena: dkt hafa notefeny tamin’ny fandraka ny volamena. –Tany amin’iny faritra atsinanana iny fahiny, ny sarivongana toy ny ombilahikely dia tsy maneho ny andriamanitra fa faladia itoeran’ny sarivongan’ilay andriamanitra. Tany moa ny ombilahy amin’ny ankapobeny dia mariky ny hery sy ny fananahana; noho izany dia karazana fanesoana ihany no niantsoana ny sarivongana hoe ombilahikely eto. –Jereo Asa 7.41; ampit 1 Mp 12.28.'
  - type: text
    content: '. Dia nihoraka ny Israelita hoe:'
  - type: text
    content: –Ity no andriamanitsika izay namoaka antsika hiala tany Ejipta!
  '5':
  - type: text
    content: 'Nony hitan’i Aharôna izany, dia namboatra '
  - type: text
    content: alitara
  - type: text
    content: ' iray teo anoloan’ny sarivongana izy, ary nanambara hoe:'
  - type: text
    content: –Hisy fety hanomezam-boninahitra ny TOMPO rahampitso!
  '6':
  - type: text
    content: 'Nony ampitso dia nifoha maraina ny vahoaka israelita ka nanolotra '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo sy sorom-pihavanana teo amin’io alitara io. Ary nipetraka hihinana sy hisotro ny vahoaka, ary avy eo dia nitsangana mba hifalifaly'
  - type: note
    content: 'Jereo 1Kôr 10.7. –Ary nipetraka... hifalifaly: dkt hafa Avy teo ny olona dia nipetraka hihinana sakafom-pety, izay nivadika ho fibobohan-toaka.'
  - type: text
    content: .
  '7':
  - type: text
    content: 'Dia nilaza tamin’i Mosesy ny TOMPO hoe:'
  - type: text
    content: '–Andeha midina izao ianao, fa efa nanao heloka bevava ny vahoaka izay navoakanao hiala tany Ejipta. '
  '8':
  - type: text
    content: 'Nalaky nivily hiala tamin’ny lalana izay nasaiko nalehany izy, fa nanamboatra sarivongana ombilahikely ho azy, sady niankohoka taminy ary nanao sorona ho azy. Nilaza aza izy hoe: «Ity no andriamanitsika izay namoaka antsika hiala tany Ejipta!» '
  '9':
  - type: text
    content: 'Ary hoy Izaho TOMPO taminao: «Hitako tsara io vahoaka io fa mafy hatoka. '
