document_id: REV.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Babilôna, ilay vehivavy janga
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nanatona ahy ny anankiray tamin’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anjely
  - type: text
    text: ' fito izay nanana ny lovia fito, ka niteny tamiko nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Avia atỳ fa hasehoko anao ny fitsarana ilay vehivavy janga malaza ratsy, izay mipetraka eo ambonin’ny ranobe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa io vehivavy io no nijangajangan’ny mpanjakan’ny tany, ary nahaboboka ny mponina ambonin’ny tany tamin’ny divaim-
  - type: usfm
    marker: w
    children:
    - type: text
      text: pijangajangàny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: 'And 1-2:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ampit Jer 52.13; Is 23.17; Jer 51.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho ka nentin’ny anjely ho any an-taniefitra, ary nahita vehivavy mitaingina biby. Mivolon-jaky ilay biby, rakotra anarana manevateva an’Andriamanitra ny tenany, sady nanana loha fito sy tandroka folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ravehivavy dia nitafy lamba volomparasy sy jaky sady niravaka volamena sy vatosoa ary perla; teny an-tanany kosa nisy tsatokaty volamena feno fanazimbazimbana, dia ny zava-maloto vokatry ny fijangajangàny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary nisy anarana voasoratra teo an-kandriny, dia anarana mifono hevi-miafina manao hoe: «Izaho no Babilôna lehibe, foiben’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fijangajangana
  - type: text
    text: ' sy ny fanazimbazimbana eto ambonin’ny tany.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hitako ravehivavy fa boboky ny ran’ireo '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vahoakan’Andriamanitra
  - type: text
    text: ', boboky ny ran’ireo vavolombelona nanambara an’i Jesoa ka novonoina ho faty noho izany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Gaga dia gaga tokoa aho nahita an-dravehivavy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka hoy ny anjely tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahoana no gaga ianao? Holazaiko anao ny hevi-miafina ny amin-dravehivavy sy ny amin’ilay biby fito loha sy folo tandroka mitondra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny biby izay hitanao dia nanan-kery taloha, fa tsy manana intsony izao, ary efa hiakatra avy any amin’ny hantsambe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 11.7 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' mba hizotra ho amin’ny fandringanana. Dia ho gaga ny mponina ambonin’ny tany raha mahita ilay biby: satria nanan-kery izy io taloha, fa tsy manana intsony izao, nefa mbola hanan-kery indray. Ho gaga ny mponina ambonin’ny tany, izany hoe ny olona tsy voasoratra anarana ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay; io horonamboky io dia nisy hatramin’ny fiandohan’izao tontolo izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eto no ilàna saina manam-pahendrena. Ny loha fito dia tendrombohitra fito izay ipetrahan-dravehivavy; ary milaza mpanjaka fito koa ireo: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'efa lavo ny dimy fa iray ihany no eo izao, ary ny iray mbola tsy tonga; ary rehefa tonga izy dia vetivety fotsiny no tsy maintsy hitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny biby, izay nanan-kery taloha nefa tsy manana intsony izao, dia ilay mpanjaka laharana fahavalo naman’ireo fito ireo ary mizotra ho amin’ny fandringanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny tandroka folo, izay hitanao, dia mpanjaka folo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Dan 7.24.
    marker-yv: yv-n
  - type: text
    text: ' tsy mbola nahazo fanjakana; kanefa handray fahefana maha mpanjaka izy ireo ka hanjaka mandritra ny adiny iray monja miaraka amin’ilay biby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miray hevitra ireo mpanjaka folo ireo ka manolotra ny hery sy ny fahefàny ho an’ilay biby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hiady amin’ny Zanakondry izy rehetra, nefa haharesy azy ny Zanakondry satria Izy no Tompon’ny tompo sy Mpanjakan’ny mpanjaka; ary haharesy miaraka amin’ny Zanakondry koa ireo olona voaantso sy voafidy, dia ireo mpino Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy koa ny anjely tamiko:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny ranobe, izay hitanao ipetrahan’ilay vehivavy janga, dia vahoaka sy olona maro mbamin’ny firenena sy ny samy hafa fiteny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny tandroka folo sy ny biby efa hitanao kosa no hankahala ilay vehivavy janga, ka hahatonga azy hanirery sy hampitanjaka azy ary hihinana ny nofony sy handevona ny tenany amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nanome fo azy ireo Andriamanitra hanatanteraka ny heviny, dia hevitra tokana: ny hanomezan’ireo ny fanjakany ho an’ilay biby, mandra-pahatanteraky ny tenin’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ravehivavy efa hitanao no ilay tanàna lehibe izay manjaka amin’ireo mpanjakan’ny tany.
