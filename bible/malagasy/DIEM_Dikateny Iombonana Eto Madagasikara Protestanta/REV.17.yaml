document_id: REV.17,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Babilôna, ilay vehivavy janga
  - type: text
    content: 'Dia nanatona ahy ny anankiray tamin’ireo '
  - type: text
    content: anjely
  - type: text
    content: ' fito izay nanana ny lovia fito, ka niteny tamiko nanao hoe:'
  - type: text
    content: '–Avia atỳ fa hasehoko anao ny fitsarana ilay vehivavy janga malaza ratsy, izay mipetraka eo ambonin’ny ranobe. '
  '10':
  - type: text
    content: 'efa lavo ny dimy fa iray ihany no eo izao, ary ny iray mbola tsy tonga; ary rehefa tonga izy dia vetivety fotsiny no tsy maintsy hitoerany. '
  '11':
  - type: text
    content: Ny biby, izay nanan-kery taloha nefa tsy manana intsony izao, dia ilay mpanjaka laharana fahavalo naman’ireo fito ireo ary mizotra ho amin’ny fandringanana.
  '12':
  - type: text
    content: Ny tandroka folo, izay hitanao, dia mpanjaka folo
  - type: note
    content: Ampit Dan 7.24.
  - type: text
    content: ' tsy mbola nahazo fanjakana; kanefa handray fahefana maha mpanjaka izy ireo ka hanjaka mandritra ny adiny iray monja miaraka amin’ilay biby. '
  '13':
  - type: text
    content: 'Miray hevitra ireo mpanjaka folo ireo ka manolotra ny hery sy ny fahefàny ho an’ilay biby. '
  '14':
  - type: text
    content: Hiady amin’ny Zanakondry izy rehetra, nefa haharesy azy ny Zanakondry satria Izy no Tompon’ny tompo sy Mpanjakan’ny mpanjaka; ary haharesy miaraka amin’ny Zanakondry koa ireo olona voaantso sy voafidy, dia ireo mpino Azy.
  '15':
  - type: text
    content: 'Dia hoy koa ny anjely tamiko:'
  - type: text
    content: '–Ny ranobe, izay hitanao ipetrahan’ilay vehivavy janga, dia vahoaka sy olona maro mbamin’ny firenena sy ny samy hafa fiteny. '
  '16':
  - type: text
    content: 'Ny tandroka folo sy ny biby efa hitanao kosa no hankahala ilay vehivavy janga, ka hahatonga azy hanirery sy hampitanjaka azy ary hihinana ny nofony sy handevona ny tenany amin’ny afo. '
  '17':
  - type: text
    content: 'Fa nanome fo azy ireo Andriamanitra hanatanteraka ny heviny, dia hevitra tokana: ny hanomezan’ireo ny fanjakany ho an’ilay biby, mandra-pahatanteraky ny tenin’Andriamanitra.'
  '18':
  - type: text
    content: Ravehivavy efa hitanao no ilay tanàna lehibe izay manjaka amin’ireo mpanjakan’ny tany.
  '2':
  - type: text
    content: Fa io vehivavy io no nijangajangan’ny mpanjakan’ny tany, ary nahaboboka ny mponina ambonin’ny tany tamin’ny divaim-
  - type: text
    content: pijangajangàny
  - type: note
    content: 'And 1-2: ampit Jer 52.13; Is 23.17; Jer 51.7.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nahazo tsindrimandry avy amin’ny Fanahy Masina aho ka nentin’ny anjely ho any an-taniefitra, ary nahita vehivavy mitaingina biby. Mivolon-jaky ilay biby, rakotra anarana manevateva an’Andriamanitra ny tenany, sady nanana loha fito sy tandroka folo. '
  '4':
  - type: text
    content: 'Ravehivavy dia nitafy lamba volomparasy sy jaky sady niravaka volamena sy vatosoa ary perla; teny an-tanany kosa nisy tsatokaty volamena feno fanazimbazimbana, dia ny zava-maloto vokatry ny fijangajangàny; '
  '5':
  - type: text
    content: 'ary nisy anarana voasoratra teo an-kandriny, dia anarana mifono hevi-miafina manao hoe: «Izaho no Babilôna lehibe, foiben’ny '
  - type: text
    content: fijangajangana
  - type: text
    content: ' sy ny fanazimbazimbana eto ambonin’ny tany.» '
  '6':
  - type: text
    content: 'Hitako ravehivavy fa boboky ny ran’ireo '
  - type: text
    content: vahoakan’Andriamanitra
  - type: text
    content: ', boboky ny ran’ireo vavolombelona nanambara an’i Jesoa ka novonoina ho faty noho izany.'
  - type: text
    content: 'Gaga dia gaga tokoa aho nahita an-dravehivavy; '
  '7':
  - type: text
    content: 'ka hoy ny anjely tamiko:'
  - type: text
    content: '–Nahoana no gaga ianao? Holazaiko anao ny hevi-miafina ny amin-dravehivavy sy ny amin’ilay biby fito loha sy folo tandroka mitondra azy. '
  '8':
  - type: text
    content: Ny biby izay hitanao dia nanan-kery taloha, fa tsy manana intsony izao, ary efa hiakatra avy any amin’ny hantsambe
  - type: note
    content: Jereo 11.7 sy nta.
  - type: text
    content: ' mba hizotra ho amin’ny fandringanana. Dia ho gaga ny mponina ambonin’ny tany raha mahita ilay biby: satria nanan-kery izy io taloha, fa tsy manana intsony izao, nefa mbola hanan-kery indray. Ho gaga ny mponina ambonin’ny tany, izany hoe ny olona tsy voasoratra anarana ao amin’ny horonamboky mirakitra ny lisitr’ireo hanana ny fiaina-maharitra mandrakizay; io horonamboky io dia nisy hatramin’ny fiandohan’izao tontolo izao.'
  '9':
  - type: text
    content: 'Eto no ilàna saina manam-pahendrena. Ny loha fito dia tendrombohitra fito izay ipetrahan-dravehivavy; ary milaza mpanjaka fito koa ireo: '
