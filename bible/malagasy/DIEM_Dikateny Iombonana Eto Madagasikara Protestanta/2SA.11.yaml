document_id: 2SA.11,396
type_code: plt
verses:
  '1':
  - type: heading
    content: I Davida sy i Bàty-Sèba
  - type: text
    content: Ny taona manaraka, rehefa tonga ny fotoana fandehanan’ny mpanjaka hiady, dia naniraka an’i Jôaba sy ny manamboninahiny ary ny tafika israelita manontolo i Davida mba handringana ny Hamônita sy hanao fahirano an’i Rabà. I Davida kosa nijanona tany Jerosalema ihany
  - type: note
    content: Jereo 1 Tan 20.1.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Rehefa nambara tamin’i Davida fa tsy nody tany aminy akory i Orià, dia nilazany hoe:'
  - type: text
    content: –Tsy avy lavitra ve ianao? Koa nahoana no tsy nody tany an-tranonao ianao?
  '11':
  - type: text
    content: 'Fa hoy i Orià tamin’i Davida:'
  - type: text
    content: '–Ny '
  - type: text
    content: Vatamasina
  - type: text
    content: ' ary koa ny tafik’i Israely sy i Joda dia mitoetra an-day; i Jôaba filohan-tafika sy ireo manamboninahiny dia mitoby any an-tsaha, koa izaho kosa ve hody any an-tranoko hihinana sy hisotro ary handry amin’ny vadiko? Raha velona koa ianao, ary raha velona koa ny ainao, dia mianiana aminao aho fa tsy hanao izany.'
  '12':
  - type: text
    content: 'Ary hoy i Davida tamin’i Orià:'
  - type: text
    content: –Mijanòna ihany àry atỳ anio. Fa rahampitso dia halefako ianao.
  - type: text
    content: 'Dia nijanona tao Jerosalema hatramin’ny ampitson’iny i Orià. '
  '13':
  - type: text
    content: Nanasa azy i Davida mba hihinana sy hisotro teo amin’ny latabany, ka dia nomamoiny; kanefa nony hariva ny andro, dia lasa nandry teo anilan’ireo mpiambina ny mpanjaka ihany izy fa tsy nandeha nody tany aminy.
  '14':
  - type: text
    content: 'Ny ampitso maraina, dia nanoratra taratasy ho an’i Jôaba i Davida, ka nampitondrainy an’i Orià izany. '
  '15':
  - type: text
    content: 'Izao no voalazany tao amin’ilay taratasy: «Apetraho amin’ny voalohan-daharana i Orià, dia amin’izay toerana mahamafy indrindra ny ady, dia mihemora aoriany ianareo mba hamelezam-pahavalo azy ho faty.»'
  - type: heading
    content: Ny nahafatesan’i Orià vadin’i Bàty-Seba
  '16':
  - type: text
    content: 'Rehefa nanara-maso ny fahiranon’ny tanàna i Jôaba, dia nametraka an’i Orià tamin’ny toerana izay fantany fa nisy ny fahavalo mahery fo. '
  '17':
  - type: text
    content: 'Nivoaka ny tanàna voafahirano ny miaramila tao ka nanafika an’i Jôaba. Nisy tamin’ny tafik’i Davida sy ireo manamboninahiny no tavela; ary maty koa i Orià ilay Hetita. '
  '18':
  - type: text
    content: 'Dia nandefa tatitra tany amin’i Davida momba ny fizotry ny ady i Jôaba, '
  '19':
  - type: text
    content: 'ka nanome baiko ilay iraka hoe:'
  - type: text
    content: '–Rehefa voatantaranao an-tsipiriany amin’ny mpanjaka ny fizotry ny ady, '
  '2':
  - type: text
    content: 'Indray takariva dia niarina avy teo am-pandriany i Davida ka nitsangantsangana teo an-tafon-trano marin-tampon’ny lapam-panjakana. Avy teny no nahatazanany vehivavy iray nandro. Tsara tarehy aoka izany ravehivavy. '
  '20':
  - type: text
    content: 'dia mety ho tezitra ny mpanjaka ka hiteny aminao hoe: «Nahoana no nanakaiky ny tanàna ianareo raha niady? Tsy fantatrareo ve fa hisy hitifitra anareo avy eny amin’ny manda? '
  '21':
  - type: text
    content: Fa iza no namely an’i Abimelèka zanakalahin’i Jerobahala, tao Tebetsy
  - type: note
    content: Fampahatsiarovana izay voatantara ao amin’ny Mpits 9.50-54.
  - type: text
    content: '? Moa tsy vehivavy anankiray no nanjera vato fikoseham-bary taminy avy teny ambony manda ka nahafaty azy? Koa nahoana no nanakaiky ny manda ianareo?» Raha izany no tenin’ny mpanjaka, dia valio hoe: «Maty koa i Orià, ilay Hetita manamboninahitra».'
  '22':
  - type: text
    content: 'Dia lasa ilay iraka, ka tonga nanambara tamin’i Davida ny tatitra nampitondrain’i Jôaba azy '
  '23':
  - type: text
    content: 'ary niteny taminy hoe:'
  - type: text
    content: '–Nahery noho izahay ireo fahavalo sady nivoaka ny tanàna hiady taminay teny an-tanety; kanefa dia voatosikay hatreo am-bavahady ihany izy. '
  '24':
  - type: text
    content: Saingy nisy namely anay ny mpitifitra zana-tsipîka avy teny amin’ny manda; ka izay no nahafaty ny manamboninahitrao sasany, ary anisan’ireo i Orià ilay Hetita.
  '25':
  - type: text
    content: 'Dia hoy i Davida tamin’ilay iraka:'
  - type: text
    content: '–Lazao amin’i Jôaba hoe: «Aza malahelo amin’izany ianao, fa na ny an-kilany na ny an-daniny dia mety misy maty an’ady. Hamafiso hatrany ny fanafihanao ny tanàna ka ravao izy.» Izany no hampaherezanao an’i Jôaba.'
  '26':
  - type: text
    content: 'Rehefa fantatry ny vadin’i Orià fa maty ny vadiny, dia nitomany azy izy. '
  '27':
  - type: text
    content: Nony afa-tsaona izy, dia nampiantsoin’i Davida hankany aminy, ka nalainy ho vady ary niteraka zazalahy taminy.
  '3':
  - type: text
    content: 'Dia naniraka olona i Davida hanadihady ny momba io vehivavy io, ka izao no voalaza: «I Bàty-Sèba, zanakavavin’i Eliama ary vadin’i Orià ilay Hetita io!» '
  '4':
  - type: text
    content: 'Nampanalain’i Davida izy, ka tonga tao aminy, dia niraisany, ary nody tany an-tranony indray. Vao avy '
  - type: text
    content: nanadio
  - type: text
    content: ' ny tenany noho ny fadimbolana ravehivavy tamin’izay'
  - type: note
    content: Ity fehezanteny farany ity dia sady manazava ny fidiovana ao amin’ny and 2, sy ny tsy isalasalana fa i Davida no rain’ilay zaza (and.5).
  - type: text
    content: .
  '5':
  - type: text
    content: 'Bevohòka anefa ravehivavy ka naniraka olona hilaza amin’i Davida hoe:'
  - type: text
    content: –Manana anaka aho.
  '6':
  - type: text
    content: 'Nanafatra haingana an’i Jôaba i Davida hoe:'
  - type: text
    content: '–Alefaso atỳ amiko i Orià ilay Hetita. Dia nalefan’i Jôaba nankany amin’i Davida i Orià. '
  '7':
  - type: text
    content: 'Rehefa tonga teo amin’i Davida izy, dia nanontanian’i Davida izay vaovao momba an’i Jôaba sy ny miaramila ary ny fizotry ny ady. '
  '8':
  - type: text
    content: 'Dia hoy i Davida tamin’i Orià:'
  - type: text
    content: '–Mandehana mody ary makà aina kely. Nandao ny lapan’ny mpanjaka i Orià narahina fanomezana avy taminy. '
  '9':
  - type: text
    content: 'Kanefa nandry teo am-bavahadin’ny lapam-panjakana niaraka tamin’ny mpiambina ny mpanjaka i Orià, fa tsy nandeha nody tany an-tranony. '
