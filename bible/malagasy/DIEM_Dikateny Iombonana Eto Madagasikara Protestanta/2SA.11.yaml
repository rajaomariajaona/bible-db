document_id: 2SA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: I Davida sy i Bàty-Sèba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny taona manaraka, rehefa tonga ny fotoana fandehanan’ny mpanjaka hiady, dia naniraka an’i Jôaba sy ny manamboninahiny ary ny tafika israelita manontolo i Davida mba handringana ny Hamônita sy hanao fahirano an’i Rabà. I Davida kosa nijanona tany Jerosalema ihany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Tan 20.1.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indray takariva dia niarina avy teo am-pandriany i Davida ka nitsangantsangana teo an-tafon-trano marin-tampon’ny lapam-panjakana. Avy teny no nahatazanany vehivavy iray nandro. Tsara tarehy aoka izany ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia naniraka olona i Davida hanadihady ny momba io vehivavy io, ka izao no voalaza: «I Bàty-Sèba, zanakavavin’i Eliama ary vadin’i Orià ilay Hetita io!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nampanalain’i Davida izy, ka tonga tao aminy, dia niraisany, ary nody tany an-tranony indray. Vao avy '
  - type: usfm
    marker: w
    children:
    - type: text
      text: nanadio
  - type: text
    text: ' ny tenany noho ny fadimbolana ravehivavy tamin’izay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity fehezanteny farany ity dia sady manazava ny fidiovana ao amin’ny and 2, sy ny tsy isalasalana fa i Davida no rain’ilay zaza (and.5).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Bevohòka anefa ravehivavy ka naniraka olona hilaza amin’i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Manana anaka aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nanafatra haingana an’i Jôaba i Davida hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Alefaso atỳ amiko i Orià ilay Hetita. Dia nalefan’i Jôaba nankany amin’i Davida i Orià. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rehefa tonga teo amin’i Davida izy, dia nanontanian’i Davida izay vaovao momba an’i Jôaba sy ny miaramila ary ny fizotry ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy i Davida tamin’i Orià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Mandehana mody ary makà aina kely. Nandao ny lapan’ny mpanjaka i Orià narahina fanomezana avy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanefa nandry teo am-bavahadin’ny lapam-panjakana niaraka tamin’ny mpiambina ny mpanjaka i Orià, fa tsy nandeha nody tany an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rehefa nambara tamin’i Davida fa tsy nody tany aminy akory i Orià, dia nilazany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Tsy avy lavitra ve ianao? Koa nahoana no tsy nody tany an-tranonao ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy i Orià tamin’i Davida:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vatamasina
  - type: text
    text: ' ary koa ny tafik’i Israely sy i Joda dia mitoetra an-day; i Jôaba filohan-tafika sy ireo manamboninahiny dia mitoby any an-tsaha, koa izaho kosa ve hody any an-tranoko hihinana sy hisotro ary handry amin’ny vadiko? Raha velona koa ianao, ary raha velona koa ny ainao, dia mianiana aminao aho fa tsy hanao izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy i Davida tamin’i Orià:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mijanòna ihany àry atỳ anio. Fa rahampitso dia halefako ianao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia nijanona tao Jerosalema hatramin’ny ampitson’iny i Orià. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanasa azy i Davida mba hihinana sy hisotro teo amin’ny latabany, ka dia nomamoiny; kanefa nony hariva ny andro, dia lasa nandry teo anilan’ireo mpiambina ny mpanjaka ihany izy fa tsy nandeha nody tany aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny ampitso maraina, dia nanoratra taratasy ho an’i Jôaba i Davida, ka nampitondrainy an’i Orià izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no voalazany tao amin’ilay taratasy: «Apetraho amin’ny voalohan-daharana i Orià, dia amin’izay toerana mahamafy indrindra ny ady, dia mihemora aoriany ianareo mba hamelezam-pahavalo azy ho faty.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan’i Orià vadin’i Bàty-Seba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rehefa nanara-maso ny fahiranon’ny tanàna i Jôaba, dia nametraka an’i Orià tamin’ny toerana izay fantany fa nisy ny fahavalo mahery fo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nivoaka ny tanàna voafahirano ny miaramila tao ka nanafika an’i Jôaba. Nisy tamin’ny tafik’i Davida sy ireo manamboninahiny no tavela; ary maty koa i Orià ilay Hetita. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nandefa tatitra tany amin’i Davida momba ny fizotry ny ady i Jôaba, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nanome baiko ilay iraka hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Rehefa voatantaranao an-tsipiriany amin’ny mpanjaka ny fizotry ny ady, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia mety ho tezitra ny mpanjaka ka hiteny aminao hoe: «Nahoana no nanakaiky ny tanàna ianareo raha niady? Tsy fantatrareo ve fa hisy hitifitra anareo avy eny amin’ny manda? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa iza no namely an’i Abimelèka zanakalahin’i Jerobahala, tao Tebetsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fampahatsiarovana izay voatantara ao amin’ny Mpits 9.50-54.
    marker-yv: yv-n
  - type: text
    text: '? Moa tsy vehivavy anankiray no nanjera vato fikoseham-bary taminy avy teny ambony manda ka nahafaty azy? Koa nahoana no nanakaiky ny manda ianareo?» Raha izany no tenin’ny mpanjaka, dia valio hoe: «Maty koa i Orià, ilay Hetita manamboninahitra».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia lasa ilay iraka, ka tonga nanambara tamin’i Davida ny tatitra nampitondrain’i Jôaba azy '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary niteny taminy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Nahery noho izahay ireo fahavalo sady nivoaka ny tanàna hiady taminay teny an-tanety; kanefa dia voatosikay hatreo am-bavahady ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Saingy nisy namely anay ny mpitifitra zana-tsipîka avy teny amin’ny manda; ka izay no nahafaty ny manamboninahitrao sasany, ary anisan’ireo i Orià ilay Hetita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy i Davida tamin’ilay iraka:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Lazao amin’i Jôaba hoe: «Aza malahelo amin’izany ianao, fa na ny an-kilany na ny an-daniny dia mety misy maty an’ady. Hamafiso hatrany ny fanafihanao ny tanàna ka ravao izy.» Izany no hampaherezanao an’i Jôaba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehefa fantatry ny vadin’i Orià fa maty ny vadiny, dia nitomany azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nony afa-tsaona izy, dia nampiantsoin’i Davida hankany aminy, ka nalainy ho vady ary niteraka zazalahy taminy.
