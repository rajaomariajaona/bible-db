document_id: EXO.34,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vatofisaka vaovao misy ny lalàna
  - type: text
    content: 'Nandidy an’i Mosesy ny TOMPO hoe:'
  - type: text
    content: –Manamboara vatofisaka roa toy ny teo aloha
  - type: note
    content: Jereo 32.15-19.
  - type: text
    content: '; hosoratako amin’ireo ny teny mitovy amin’izay voasoratra tamin’ireo vatofisaka voalohany efa nopotipotehinao. '
  '10':
  - type: text
    content: 'Ary hoy ny TOMPO hoe:'
  - type: text
    content: '–Hanao '
  - type: text
    content: fanekempihavanana
  - type: text
    content: ' aminareo Aho. Eo anatrehan’ny vahoakanao manontolo no hanaovako zava-mahagaga tsy mbola nisy toa azy teto ambonin’ny tany manontolo sy tamin’ny firenena rehetra; ho hitan’ireo Israelita rehetra manodidina anao fa tena mampitolagaga ny asa hotanterahiko amin’ny alalanao.'
  '11':
  - type: text
    content: '«Tandremo tsara izay rehetra andidiako anareo anio, dia horoahiko eo anoloanareo ny '
  - type: text
    content: Amôrita
  - type: text
    content: ' sy ny Kanahanita, ny Hetita sy ny Perizita ary ny Hivita sy ny Jebosita. '
  '12':
  - type: text
    content: 'Tandremo tsara mba tsy hanao fanekempihavanana amin’ny mponina amin’ny tany izay hidiranareo, fa ho fandrika ho anareo izany. '
  '13':
  - type: text
    content: 'Fa ravao ny '
  - type: text
    content: alitarany
  - type: text
    content: ', poteho ny tsangambatony, ary kapao ireo tsato-kazo fanajany an’i '
  - type: text
    content: Aserà
  - type: note
    content: Jereo Deot 16.21-22.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Aza miankohoka amin’andriamani-kafa ianareo, satria Izaho TOMPO dia antsoina hoe ‹Ilay mpitandro hasina›, ka Izaho irery ihany no ho Andriamanitrareo. '
  '15':
  - type: text
    content: 'Koa aza manao fanekempihavanana mihitsy amin’ny mponina amin’izany tany izany. Rehefa manao fanompoam-pivavahana sy manolotra sorona amin’ireo andriamaniny manko izy, dia hanasa anareo handray anjara, ka hihinana amin’ireo sorona fanaony koa ianareo. '
  '16':
  - type: text
    content: Ary haka vady amin’ny zanany vavy ireo zanakalahinareo, ka ireo vehivavy ireo dia hitarika ny zanakalahinareo hanaraka ny fanompoam-pivavahana fanaony amin’ireo andriamaniny.
  '17':
  - type: text
    content: «Aza manao andriamanitra sarivongana ho anareo
  - type: note
    content: Jereo 20.4-5; Lev 19.4; 26.1; Deot 4.15-18; 5.8; 27.25.
  - type: text
    content: .
  '18':
  - type: text
    content: '«Ankalazao ny fetin’ny mofo tsy misy '
  - type: text
    content: leviora
  - type: text
    content: ; mandritra ny fito andro voatondro amin’ny volana Abiba
  - type: note
    content: 'And 18-26: ampit 23.14-19; Deot 16.1-17; and 19-20: ampit 13.11-15; and 21: ampit 23.12. Jereo koa 12.14-20; Lev 23.6-8; Nom 28.16-25 –Momba ny fetin’ny mofo tsy misy leviora sy ireo fety roa hafa eo amin’ny and 22 ary ny volana Abiba dia jereo ny FTS amin’ny voambolana hoe FANISANANDRO.'
  - type: text
    content: ' no hihinananareo ny mofo tsy misy leviora araka izay efa nandidiako anareo. Fa volana Abiba toy izany no nialanareo tany Ejipta.'
  '19':
  - type: text
    content: «Ahy ny voalohan-teraka rehetra, ary anatin’izany ny bibinareo; ka ny voalohan-teraky ny omby na ondry na osy dia tsy maintsy atolotra Ahy
  - type: note
    content: Jereo 13.2; Nom 13.13; Lk 2.23.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Mivonòna ianao ho amin’ny rahampitso maraina; ka vao maraina dia miakara any an-tampon’ny tendrombohitra Sinay, ary andraso eo Aho. '
  '20':
  - type: text
    content: Kanefa ny lahy voalohan-teraky ny borikivavy dia hosoloinareo zanakondry na zanak’osy lahy, na hovonoinareo ka haolanareo ny tendany
  - type: note
    content: Jereo 13.13 sy nta; Nom 18.16.
  - type: text
    content: . Ary ny zanaka lahimatoanareo kosa dia havotanareo.
  - type: text
    content: '«Aza mankao amin’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: ' mitondra tanam-polo.'
  '21':
  - type: text
    content: «Manana andro enina isan-kerinandro ianareo hiasanareo, fa amin’ny andro fahafito dia hitsahatra amin’ny raharahanareo ianareo na dia amin’ny fotoam-pamafazana sy fijinjana aza
  - type: note
    content: Jereo 20.8-11; 23.12; 31.12-17; 35.2; Lev 23.3; Deot 5.13-14.
  - type: text
    content: .
  '22':
  - type: text
    content: '«Ankalazao ny fetin’ny '
  - type: text
    content: Pentekôsta
  - type: text
    content: ' amin’ny fotoana hijinjanareo ny santa-bary, ary ny fetim-bokatra amin’ny fararano'
  - type: note
    content: Jereo 23.16; Lev 23.15-21, 39-43; Nom 28.26-31.
  - type: text
    content: .
  '23':
  - type: text
    content: '«Intelo isan-taona ny lehilahy rehetra ao aminareo no hiseho eo anatrehako TOMPO Andriamanitr’i Israely. '
  '24':
  - type: text
    content: Fa haka ny tanin’ny firenen-kafa Aho mba hanitarana ny faritaninareo, nefa tsy hisy olona hihevitra handrombaka ny taninareo mandritra ny intelo isan-taona hiakaranareo hiseho eo anatrehako TOMPO Andriamanitrareo.
  '25':
  - type: text
    content: '«Aza ampiarahina amin’ny mofo misy '
  - type: text
    content: leviora
  - type: text
    content: ' ny sorona alatsa-dra, ary aza avela ho tra-maraina ny henan’ny sorona atao harivan’ny fetin’ny '
  - type: text
    content: Paska
  - type: note
    content: Jereo 12.10.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Haterinareo ao an-tranoko ny santa-bokatry ny taninareo satria Izaho no TOMPO Andriamanitrareo; nefa aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: note
    content: Jereo 23.19 sy nta.
  - type: text
    content: .»
  '27':
  - type: text
    content: 'Mbola nandidy an’i Mosesy koa ny TOMPO hoe:'
  - type: text
    content: –Soraty ireto didy ireto fa fototry ny fanekempihavanana ataoko aminao sy ny vahoaka israelita.
  '28':
  - type: text
    content: Dia nijanona tao niaraka tamin’ny TOMPO efapolo andro sy efapolo alina i Mosesy, nefa tsy nihinana na nisotro; ary izy no nanoratra
  - type: note
    content: 'efapolo andro sy efapolo alina: ampit 24.18. –Ary izy no nanoratra: dkt hafa Ary ny Tompo no nanoratra. Ampit 34.1.'
  - type: text
    content: ' tamin’ny vatofisaka roa ny didy folo, fototry ny fanekempihavanana.'
  '29':
  - type: text
    content: 'Dia nidina avy eny an-tendrombohitra Sinay indray i Mosesy, nitondra teny an-tanany ny vatofisaka roa misy ilay '
  - type: text
    content: raki-tsoratry ny fanekempihavanana
  - type: text
    content: '; tsy fantany anefa fa namirapiratra ny tarehiny noho ny niresahany tamin’Andriamanitra. '
  '3':
  - type: text
    content: Aoka tsy hisy olona hiaraka aminao! Aoka koa tsy hisy olona ho hita mihitsy eny an-tendrombohitra manontolo; ary aoka tsy hisy biby handrasana eny akaiky eny na iray aza, na ondry aman’osy na omby.
  '30':
  - type: text
    content: 'Koa raha nahita ny tarehin’i Mosesy namirapiratra i Aharôna sy ny Israelita rehetra, dia natahotra ny hanatona azy. '
  '31':
  - type: text
    content: 'Niantso an-dry zareo i Mosesy, koa nanatona i Aharôna sy ny lehiben’ny vahoaka, dia niresaka taminy. '
  '32':
  - type: text
    content: Avy eo dia nanatona koa ny Israelita sisa rehetra, ka nampitain’i Mosesy taminy ny baiko rehetra izay nandidian’ny TOMPO azy tao an-tendrombohitra Sinay.
  '33':
  - type: text
    content: 'Rehefa vitan’i Mosesy ny teny nataony, dia nosaronany voaly ny tarehiny. '
  '34':
  - type: text
    content: 'Hatreo dia esorin’i Mosesy ny voaly manarona ny tarehiny isaky ny tonga eo anatrehan’ny TOMPO izy hiresaka aminy. Rehefa mivoaka ny tranolay hampita ny baiko voarainy ho an’ny Israelita izy, '
  '35':
  - type: text
    content: dia azon’izy ireo jerena ny tarehiny mamirapiratra. Avy eo dia saronany voaly indray ny tarehiny mandra-piveriny hiresaka amin’Andriamanitra
  - type: note
    content: 'And 29-35: jereo 2Kôr 3.7-16.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Dia nanamboatra vatofisaka roa mitovy amin’ny teo aloha i Mosesy. Ny ampitso vao maraina dia niakatra teny Sinay araka ny baiko nomen’ny TOMPO azy izy, sady nitondra ireo vatofisaka roa. '
  '5':
  - type: text
    content: Nidina tao tamin’ny andry rahona ny TOMPO
  - type: note
    content: Jereo 13.21 sy nta.
  - type: text
    content: ', ka nijanona tao niaraka tamin’i Mosesy. Nambarany azy ny anarany hoe «Ny TOMPO». '
  '6':
  - type: text
    content: Avy eo dia nandalo teo anatrehan’i Mosesy IZY sady mbola nanambara hoe
  - type: note
    content: 'Nambarany azy...nanambara hoe: dkt hafa Niantso mafy ny anarany i Mosesy hoe «Ny Tompo». 6 –Avy eo dia nandalo teo anatrehany ny Tompo sady nilaza hoe:'
  - type: text
    content: ': «Izaho no TOMPO, TOMPO Andriamanitra mamindrafo sy miantra, mahari-po sy be fitiavana sady mahatoky. '
  '7':
  - type: text
    content: Maneho ny fitiavako hatramin’ny taranaka faharivo Aho, ka mahalefitra ny heloka amam-pahadisoana ary ny ota; nefa kosa tsy manamarina izay meloka, fa mamaly ny heloky ny ray amin’ny zanaka amam-parany hatramin’ny zafiafy sy zafindohalika
  - type: note
    content: 'hatramin’ny taranaka faharivo: na amin’ny olona an’arivony. –And 6-7: jereo 20.5-6; Nom 14.18; Deot 5.9-10; 7.9-10.'
  - type: text
    content: .»
  '8':
  - type: text
    content: 'Dia niankohoka haingana hatreo amin’ny tany i Mosesy mba hitsaoka ny TOMPO, '
  '9':
  - type: text
    content: 'sady niantso hoe:'
  - type: text
    content: –Tompo ô, efa nahazo fanambinana teo imasonao ihany aho, koa miangavy anao mba hiara-dia aminay. Maditra mafy hatoka ity vahoaka ity, nefa mba avelao ny heloka amam-pahotany, ka raiso ho vahoakanao izahay.
  - type: heading
    content: Ny nanavaozana ny fanekempihavanana
