      - type: text
        text: '1'
    - type: text
      text: Amin’izany andro izany, dia vehivavy fito
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'no indray hihazona lehilahy iray ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Tsy hiantohanao na sakafo na fitafiana izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa aoka izahay mba hahazo mitondra ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka afaho amin’ny fahafaham-baràkanay.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ireo sisa velona tao Jerosalema
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amin’izany andro izany, izay ampanirin’ny TOMPO eo amin’ny tany dia ho tabiha sy ho voninahitra ho an’izay sisa velona teo amin’i Israely, ka izay vokatry ny tany no ho mariky ny fiandrianany sy reharehany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa izay sisa tafajanona tao Jerosalema na izay sisa velona tao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tsiôna
    - type: text
      text: ' dia hantsoina hoe «voatokana ho an’ny Tompo»: ireo rehetra ireo no voasoratry ny Tompo mba ho velona ao Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hisy Fanahy fahamarinana sy fanadiovana hitsoka; koa rehefa voadion’ny Tompo ho afaka amin’ny lotony ireo andriambavilanitr’i Tsiôna, ary voasasan’ny Tompo ho afaka amin’ny ra nalatsaka tao aminy i Jerosalema, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: dia hisy rahona matevina amin’ny antoandro sy afo mazava midedadeda amin’ny alina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'rahona... alina: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Eks 3.21; 24.16-17.
      marker-yv: yv-n
    - type: text
      text: ' ho tonga eo ambonin’ny tendrombohitr’i Tsiôna manontolo sy amin’ny olona vory ao. Eny ambonin’ireo rehetra ireo kosa ny voninahitry ny TOMPO mba ho fiarovana, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ho toy ny tranotomboka hanalokaloka amin’ny hainandro ary hialofana sy hierena amin’ny tafio-drivotra sy ny ranonorana.
