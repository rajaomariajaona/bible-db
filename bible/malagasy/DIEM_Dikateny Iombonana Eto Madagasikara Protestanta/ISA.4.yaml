document_id: ISA.4,396
type_code: plt
verses:
  '1':
  - type: text
    content: Amin’izany andro izany, dia vehivavy fito
  - type: text
    content: 'no indray hihazona lehilahy iray ka hanao hoe:'
  - type: text
    content: «Tsy hiantohanao na sakafo na fitafiana izahay,
  - type: text
    content: fa aoka izahay mba hahazo mitondra ny anaranao,
  - type: text
    content: ka afaho amin’ny fahafaham-baràkanay.»
  - type: heading
    content: Ireo sisa velona tao Jerosalema
  '2':
  - type: text
    content: 'Amin’izany andro izany, izay ampanirin’ny TOMPO eo amin’ny tany dia ho tabiha sy ho voninahitra ho an’izay sisa velona teo amin’i Israely, ka izay vokatry ny tany no ho mariky ny fiandrianany sy reharehany. '
  '3':
  - type: text
    content: 'Koa izay sisa tafajanona tao Jerosalema na izay sisa velona tao '
  - type: text
    content: Tsiôna
  - type: text
    content: ' dia hantsoina hoe «voatokana ho an’ny Tompo»: ireo rehetra ireo no voasoratry ny Tompo mba ho velona ao Jerosalema. '
  '4':
  - type: text
    content: 'Hisy Fanahy fahamarinana sy fanadiovana hitsoka; koa rehefa voadion’ny Tompo ho afaka amin’ny lotony ireo andriambavilanitr’i Tsiôna, ary voasasan’ny Tompo ho afaka amin’ny ra nalatsaka tao aminy i Jerosalema, '
  '5':
  - type: text
    content: dia hisy rahona matevina amin’ny antoandro sy afo mazava midedadeda amin’ny alina
  - type: note
    content: 'rahona... alina: jereo Eks 3.21; 24.16-17.'
  - type: text
    content: ' ho tonga eo ambonin’ny tendrombohitr’i Tsiôna manontolo sy amin’ny olona vory ao. Eny ambonin’ireo rehetra ireo kosa ny voninahitry ny TOMPO mba ho fiarovana, '
  '6':
  - type: text
    content: ho toy ny tranotomboka hanalokaloka amin’ny hainandro ary hialofana sy hierena amin’ny tafio-drivotra sy ny ranonorana.
