document_id: GEN.INTRO1
type_code: plt
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Sava lalana
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: –Ny boky voalohany ao amin’ny Baiboly dia atao hoe «Genesỳ» na Fiandohana, satria mitantara ny niandohan’izao tontolo izao sy ny olombelona ary ny vahoaka Israely.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Toko 1–11: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ahoana no ahatakarantsika an’ity izao tontolo izao iainantsika ity? Inona moa ny olombelona? Inona no anjara toerany eo amin’izao tontolo izao? Nahoana no voapoizina matetika ny fifandraisana eo amin’ny samy olombelona? Moa misy fanafana ve izany? Ireo fanontaniana mbola mitombina mandraka ankehitriny ireo no iezahan’ny tapany voalohany amin’ny boky Genesỳ valiana: ny lehilahy sy ny vehivavy eo anivon’ny zava-boaary (1–2); ny fisarahan’ireo tamin’Andriamanitra (3); i Kaina sy i Abela (4); i Noà tao amin’ny safo-drano lehibe (6–9); ny tilikambon’i Babela (11). Ny zava-nitranga resahina amin’ireo fitantarana ireo dia tsy azo faritana mazava amin’ny fanisan-taonan’ny tantaran’ny olombelona.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ny toko 12–50 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'dia mitantara ny fomba nitondran’Andriamanitra famonjena ho an’ny olombelona tamin’ny niantsoany ireo razamben’ny vahoaka Israely hanompo Azy: i'
  - type: text
    text: ' Abrahama '
  - type: usfm
    marker: it
    children:
    - type: text
      text: (12.1–25.18) izay nalaza tokoa tamin’ny finoany sy ny fankatoavany an’Andriamanitra ka fakan-tahaka mandraka ankehitriny; i
  - type: text
    text: ' Itsehàka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanany lahy sy i
  - type: text
    text: ' Jakôba '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zafikeliny (25.19–37.1) izay nomena anarana hoe Israely. I Jôsefa, iray tamin’ny zanakalahin’i Jakôba, razamben’ny foko roa, no ivon’ireo zava-nitranga izay nahatonga an’i Jakôba sy ireo zanany lahy hafa mbamin’ny ankohonany avy hitoetra tany Ejipta.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ny Genesỳ aloha voalohany indrindra dia fampianarana momba izay nataon’Andriamanitra. Manomboka amin’ny filazana fa Andriamanitra no namorona izao tontolo izao izy, ka sady mampiseho ny maha goavana izao tontolo izao no mampiankina izany tanteraka amin’Andriamanitra. Ny boky dia mifarana amin’ny teny fanomezan-toky fa hanohy ny fikarakarana ny vahoakany Andriamanitra. Hatramin’ny voalohany ka hatramin’ny farany dia Andriamanitra no tena omen-danja: Izy no mampahafantatra ny tenany, mitsara sy mitarika ary manampy ny vahoakany sady mamolavola ny tantarany.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ho setrin’izany dia takîn’Andriamanitra ny hinoana Azy sy hinoana ireo fampanantenàny ary ny hankatoavana ny baikony sy ny lalànany.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ny boky Genesỳ dia nanangona ireo lovan-tsofina tranainy tany Israely hanehoana ny fomba niainan’io firenena io ny finoany sy hanampiana azy hitahiry izany finoana izany ho velona.
