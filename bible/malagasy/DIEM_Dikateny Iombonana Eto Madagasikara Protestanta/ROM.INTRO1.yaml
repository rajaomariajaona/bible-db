document_id: ROM.INTRO1,396
type_code: plt
verses:
  '1':
  - type: text
    content: Sava lalana
  - type: text
    content: Taona vitsivitsy monja taorian’ny nahafatesan’i Kristy sy ny nitsanganany ho velona, dia toa nisy Jiosy kristianina nanomboka nampiely sahady ny Vaovao Mahafaly tany Rôma, renivohitry ny fanjakana rômanina. Anisan’ireo Jiosy kristianina tany Rôma ireo i Akoilà sy i Prisila vadiny (jereo Asa 18.2). Efa nisy Fiangonana santatra izany tao Rôma raha nitory teny tany Siria sy tany Azia Minôra ary tany Gresy i Paoly. Nasain’Andriamanitra handeha «hankany am-paran’ny tany» i Paoly, ka niriny tokoa ny hankany Rôma sy Espaina. Tsy fantatra raha tontosa io fikasan’i Paoly hankany Espaina io, fa mba hanomanany io dia io no nanoratany taratasy anankiray ho «anareo atỳ Rôma» (1.7), izany hoe ho an’ireo kristianina ireo nivory tao an-tranon-dry i Prisila sy i Akoilà (jereo 16.3-5).
  - type: text
    content: 'Hararaotin’i Paoly ity taratasy ity mba hanazavana amin’ireo kristianina tao Rôma ny fomba iheveran’ny tenany manokana ny asa nanirahan’Andriamanitra azy eo anivon’ny hafa firenena. Ny taratasy nalefany ho an’ny kristianina tany Rôma no famelabelarana feno indrindra momba ny hafatra tian’i Paoly hampitaina, sady fintininy araka izao: ny Vaovao Mahafaly no hery ampiasain’Andriamanitra ho famonjena izay rehetra mino, dia ny Jiosy aloha, ary koa ireo hafa firenena (1.16).'
  - type: text
    content: 'Teo ny olana nateraky ny fifandraisan’ny Jiosy sy ny hafa firenena, indrindra momba izay fenitra tokony harahin’ny hafa firenena tonga kristianina eo anatrehan’ny lalàna jiosy. Nisy fiantraikany lehibe izany olana izany tamin’ireo kristianina voalohany ary mbola hitantsika voateny amin’ny taratasy hafa nosoratan’i Paoly apôstôly, ohatra ny taratasy ho an’ny kristianina tany Galatia. Koa ireto avy ny fizarazarana vaventy raketin’ity taratasy ity:'
  - type: text
    content: –Ambaran’i Paoly avy hatrany aorian’ny sasin-teny (1.1-15), fa ny Vaovao Mahafaly izay torîny dia natao ho an’ny olombelona rehetra tsy an-kanavaka (1.16-17).
  - type: text
    content: –Hazavain’i Paoly avy eo ny fomba amonjen’Andriamanitra ny olom-bery, na iza na iza, rehefa mitoky aminy (1.18–8.39).
  - type: text
    content: '–Manaraka izany, dia tomorin’i Paoly ny olana ateraky ny ampahan’ny vahoaka Israely iray firazanana aminy: dia ny andavan’izy ireo an’i Kristy mandritra ny fotoana voafetra. Ambaran’i Paoly fa izany fandavana izany dia tsy hahasakana ny fikasan’Andriamanitra, ka ny fahasoavan’Andriamanitra no hanana ny teny farany (9–11).'
  - type: text
    content: –Anehoan’Andriamanitra ny famindrampo aloha amin’izao fotoana izao ireo hafa firenena; ary izany no manainga hiaina ho an’Andriamanitra amin’ny fomba fiaina vaovao tokoa (12.1–15.13).
  - type: text
    content: –Faranan’i Paoly ny taratasiny ka lazainy fa mikasa ho any Rôma izy no sady ataony veloma ireo anabavy sy rahalahy kristianina izay samy tononiny am-pitiavana amin’ny anarany avy (15.14–16.27).
  - type: text
    content: Izay rehetra mitady famelabelarana voalahatra tsara momba ny famonjen’Andriamanitra ny olombelona amin’ny alalan’i Jesoa Kristy, dia hiaiky ihany koa, rehefa namaky ity taratasy ity, fa tsy taka-pesimpesenina ny fikasan’Andriamanitra (11.33-36). Miaraka amin’izany, dia ho voataona izy ireo hanolotra amin’Andriamanitra ny fanompoam-pivavahana tokony hataontsika aminy (12.1).
