document_id: DEU.21,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny faty hita saingy tsy fantatra ny mpamono nahafaty azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia mety hisy maty novonoin’olona hita miampatra any an-tsaha saingy tsy fantatra izay namely nahafaty azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha miainga hanafika fahavalo ianareo ary atolotry ny TOMPO Andriamanitrareo ho eo an-tananareo izy ka voababonareo, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia mety hisy aminareo hahita vehivavy anankiray tsara tarehy amin’ireo babo ka ho raiki-pitia azy sy haniry hanambady azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoentin’io lehilahy io ho ao an-trano ravehivavy, ka hiharatra volon-doha sy hanala hoho, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: hanaisotra ny fitafiany tamin’ny nahababo azy sy hiova akanjo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: miharatra volon-doha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sy '
      - type: usfm
        marker: it
        children:
        - type: text
          text: manala hoho ary miova akanjo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' no zavatra telo anehoan’ilay vehivavy babo fa miala amin’ny fiainany taloha izy ary manomboka fiainana vaovao idirany ho anisan’ny vahoaka israelita.'
      marker-yv: yv-n
    - type: text
      text: ', ary hitoetra ao amin-dralehilahy. Mandritra ny iray volana dia hisaona ny ray aman-dreniny ravehivavy; aorian’izany ralehilahy vao hahazo manatona azy sy hampakatra azy ary hanana azy ho vady. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha avy izay tsy itiavany an-dravehivavy intsony dia halefany handeha araka izay sitrapony izy; fa tsy azony amidy hatao vola aman-karena izy na andevoziny, satria efa novinadiny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zon’ny lahimatoa eo amin’ny fandovana
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety hisy lehilahy mampirafy roa, ka ny iray tiany bebe kokoa ary ny iray tiany kelikely kokoa. Samy niteraka zazalahy aminy izy roa vavy; ary ny zanak’ilay vehivavy tiany kelikely kokoa no lahimatoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro handidiany fananana ho an’ireo zanany lahy, dia tsy azon-dralehilahy atao lahimatoa ny zanak’ilay vehivavy tiany bebe kokoa, raha mbola eo ihany ny zanak’ilay vehivavy tiany kelikely kokoa, satria io no tena lahimatoany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ny zanak’ilay vehivavy tiany kelikely kokoa ihany no hekeny ho lahimatoa ka homeny anjaran-droa amin’izay rehetra ananany: noho izy voalohan-janany, dia azy ny fizokiana.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny zanakalahy maditra tsy zaka anarina
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety hisy olona manana zanakalahy maditra sy manohitra, ka tsy mihaino ny tenin’ny ray aman-dreniny sady tsy zakany anarina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hosamborin’ireo ray aman-dreniny izy ka hoentiny amin’ny fitsarana eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholon
    - type: text
      text: '’ny tanàna onenany; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izay, dia hiainga ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' ama-mpitsaranareo ka handrefy ny elanelan’ireo tanàna manodidina sy ilay toerana misy ny faty, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hiteny amin’ny loholona izy mivady hoe: «Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny teninay fa mpandany sy mpimamo.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo; ary handre izany ny Israelita rehetra ka hatahotra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fatin’ny meloka nahantona tamin’ny hazo
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mety hisy olona manao heloka tokony hahafaty azy ka novonoina ary nahantona amin’ny hazo ilay fatiny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy havelanareo hiloaka alina eo amin’ny hazo izany faty izany, fa tsy maintsy halevinareo androtriny ihany, satria voaozon’Andriamanitra ny faty mihantona amin’ny hazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'satria... hazo: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: satria mahatonga ny tany hiharan’ny ozon’Andriamanitra ny faty mihantona.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Jereo Gal 3.13.'
      marker-yv: yv-n
    - type: text
      text: '; koa aza '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lotoina
    - type: text
      text: ' ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hahafantarana ny tanàna izay akaikin’ny faty indrindra. Ary ny loholon’io tanàna io dia haka vantotr’ombivavy iray izay tsy mbola nampiasaina na novesaran-
    - type: usfm
      marker: w
      children:
      - type: text
        text: jioga
    - type: text
      text: ' hitarihany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka ireo ihany no hitondra azy midina amina-lohasaha tsy voaasa na voafafy sady misy renirano tsy ritra; ary ao anatin’io renirano io no hamolahan’ireto loholona ny vozon’ilay vantotr’ombivavy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanatona eo ny mpisorona taranak’i Levỳ, satria izy no voafidin’ny TOMPO Andriamanitrareo hanompo AZY sy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitsodrano
    - type: text
      text: ' amin’ny anarany; koa araka ny tenin’ny mpisorona no handaminana ny ady sy vonoana isan-karazany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny loholona rehetra amin’izany tanàna tena akaikin’ny faty izany kosa dia hanasa ny tanany amin’ny renirano, eo ambonin’ilay vantotr’ombivavy izay efa voafolaka ny vozony; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hiloa-bava ireo ka hanao hoe: «Ny tananay tsy nandatsaka aina an’io olona io, ary ny masonay tsy nahita ny zava-nitranga. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: TOMPO ô, afaho andraikitra amin’izany ilay Israely vahoaka navotanao, ary aoka ny famonoana olona tsy manan-tsiny mba tsy havelanao hanjaka eo anivony.» Dia ho afaka andraikitra amin’izany famonoana olona izany ireo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no hialanareo andraikitra amin’ny famonoana olona tsy manan-tsiny, satria nanao izay mahitsy eo imason’ny TOMPO ianareo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin’ny vehivavy babo hovadîn’izay nahazo azy
    marker-yv: yv-h
