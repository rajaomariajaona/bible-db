document_id: DEU.21,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny faty hita saingy tsy fantatra ny mpamono nahafaty azy
  - type: text
    content: 'Eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo, dia mety hisy maty novonoin’olona hita miampatra any an-tsaha saingy tsy fantatra izay namely nahafaty azy. '
  '10':
  - type: text
    content: 'Raha miainga hanafika fahavalo ianareo ary atolotry ny TOMPO Andriamanitrareo ho eo an-tananareo izy ka voababonareo, '
  '11':
  - type: text
    content: 'dia mety hisy aminareo hahita vehivavy anankiray tsara tarehy amin’ireo babo ka ho raiki-pitia azy sy haniry hanambady azy. '
  '12':
  - type: text
    content: 'Hoentin’io lehilahy io ho ao an-trano ravehivavy, ka hiharatra volon-doha sy hanala hoho, '
  '13':
  - type: text
    content: hanaisotra ny fitafiany tamin’ny nahababo azy sy hiova akanjo
  - type: note
    content: Ny miharatra volon-doha sy manala hoho ary miova akanjo no zavatra telo anehoan’ilay vehivavy babo fa miala amin’ny fiainany taloha izy ary manomboka fiainana vaovao idirany ho anisan’ny vahoaka israelita.
  - type: text
    content: ', ary hitoetra ao amin-dralehilahy. Mandritra ny iray volana dia hisaona ny ray aman-dreniny ravehivavy; aorian’izany ralehilahy vao hahazo manatona azy sy hampakatra azy ary hanana azy ho vady. '
  '14':
  - type: text
    content: Fa raha avy izay tsy itiavany an-dravehivavy intsony dia halefany handeha araka izay sitrapony izy; fa tsy azony amidy hatao vola aman-karena izy na andevoziny, satria efa novinadiny.
  - type: heading
    content: Zon’ny lahimatoa eo amin’ny fandovana
  '15':
  - type: text
    content: 'Mety hisy lehilahy mampirafy roa, ka ny iray tiany bebe kokoa ary ny iray tiany kelikely kokoa. Samy niteraka zazalahy aminy izy roa vavy; ary ny zanak’ilay vehivavy tiany kelikely kokoa no lahimatoa. '
  '16':
  - type: text
    content: 'Amin’ny andro handidiany fananana ho an’ireo zanany lahy, dia tsy azon-dralehilahy atao lahimatoa ny zanak’ilay vehivavy tiany bebe kokoa, raha mbola eo ihany ny zanak’ilay vehivavy tiany kelikely kokoa, satria io no tena lahimatoany. '
  '17':
  - type: text
    content: 'Eny, ny zanak’ilay vehivavy tiany kelikely kokoa ihany no hekeny ho lahimatoa ka homeny anjaran-droa amin’izay rehetra ananany: noho izy voalohan-janany, dia azy ny fizokiana.'
  - type: heading
    content: Ny zanakalahy maditra tsy zaka anarina
  '18':
  - type: text
    content: 'Mety hisy olona manana zanakalahy maditra sy manohitra, ka tsy mihaino ny tenin’ny ray aman-dreniny sady tsy zakany anarina. '
  '19':
  - type: text
    content: 'Hosamborin’ireo ray aman-dreniny izy ka hoentiny amin’ny fitsarana eo anoloan’ny '
  - type: text
    content: loholon
  - type: text
    content: '’ny tanàna onenany; '
  '2':
  - type: text
    content: 'Amin’izay, dia hiainga ny '
  - type: text
    content: loholona
  - type: text
    content: ' ama-mpitsaranareo ka handrefy ny elanelan’ireo tanàna manodidina sy ilay toerana misy ny faty, '
  '20':
  - type: text
    content: 'ary hiteny amin’ny loholona izy mivady hoe: «Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny teninay fa mpandany sy mpimamo.» '
  '21':
  - type: text
    content: Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany. Izany no hanesoranareo ny fanao ratsy ho fongotra eo anivonareo; ary handre izany ny Israelita rehetra ka hatahotra.
  - type: heading
    content: Ny fatin’ny meloka nahantona tamin’ny hazo
  '22':
  - type: text
    content: 'Mety hisy olona manao heloka tokony hahafaty azy ka novonoina ary nahantona amin’ny hazo ilay fatiny. '
  '23':
  - type: text
    content: Tsy havelanareo hiloaka alina eo amin’ny hazo izany faty izany, fa tsy maintsy halevinareo androtriny ihany, satria voaozon’Andriamanitra ny faty mihantona amin’ny hazo
  - type: note
    content: 'satria... hazo: dkt hafa satria mahatonga ny tany hiharan’ny ozon’Andriamanitra ny faty mihantona. Jereo Gal 3.13.'
  - type: text
    content: '; koa aza '
  - type: text
    content: lotoina
  - type: text
    content: ' ny tany izay omen’ny TOMPO Andriamanitrareo ho fanananareo.'
  '3':
  - type: text
    content: mba hahafantarana ny tanàna izay akaikin’ny faty indrindra. Ary ny loholon’io tanàna io dia haka vantotr’ombivavy iray izay tsy mbola nampiasaina na novesaran-
  - type: text
    content: jioga
  - type: text
    content: ' hitarihany; '
  '4':
  - type: text
    content: ka ireo ihany no hitondra azy midina amina-lohasaha tsy voaasa na voafafy sady misy renirano tsy ritra; ary ao anatin’io renirano io no hamolahan’ireto loholona ny vozon’ilay vantotr’ombivavy.
  '5':
  - type: text
    content: 'Dia hanatona eo ny mpisorona taranak’i Levỳ, satria izy no voafidin’ny TOMPO Andriamanitrareo hanompo AZY sy '
  - type: text
    content: hitsodrano
  - type: text
    content: ' amin’ny anarany; koa araka ny tenin’ny mpisorona no handaminana ny ady sy vonoana isan-karazany.'
  '6':
  - type: text
    content: 'Ny loholona rehetra amin’izany tanàna tena akaikin’ny faty izany kosa dia hanasa ny tanany amin’ny renirano, eo ambonin’ilay vantotr’ombivavy izay efa voafolaka ny vozony; '
  '7':
  - type: text
    content: 'dia hiloa-bava ireo ka hanao hoe: «Ny tananay tsy nandatsaka aina an’io olona io, ary ny masonay tsy nahita ny zava-nitranga. '
  '8':
  - type: text
    content: TOMPO ô, afaho andraikitra amin’izany ilay Israely vahoaka navotanao, ary aoka ny famonoana olona tsy manan-tsiny mba tsy havelanao hanjaka eo anivony.» Dia ho afaka andraikitra amin’izany famonoana olona izany ireo.
  '9':
  - type: text
    content: Izany no hialanareo andraikitra amin’ny famonoana olona tsy manan-tsiny, satria nanao izay mahitsy eo imason’ny TOMPO ianareo.
  - type: heading
    content: Ny amin’ny vehivavy babo hovadîn’izay nahazo azy
