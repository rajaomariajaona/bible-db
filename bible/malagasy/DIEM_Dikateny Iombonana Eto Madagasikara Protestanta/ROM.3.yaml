      marker-yv: yv-n
    - type: text
      text: '; ary tsy avy amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' velively izany. Ny lalànan’i Mosesy mbamin’ireo bokin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ' rahateo dia efa mijoro ho vavolombelona manambara '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'fa ny finoana niainan’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' no haneken’Andriamanitra ny olombelona ho marina; ary mankamin’ny mpino rehetra izany, satria tsy misy fanavakavahana intsony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Eny, nanota ny olon-drehetra ka tsy eo afovoan’izy ireo intsony ilay Andriamanitra be voninahitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kanefa, noho ny fahasoavan’Andriamanitra, dia nekeny maimaimpoana ho marina izy ireo tamin’ny alalan’ny fanavotana izay ao amin’i Kristy Jesoa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa notendren’Andriamanitra ho sorom-panonerana ho an’ireo manam-pinoana i Kristy Jesoa Izay nahafoy ny rany: izany no maneho ny fomba aneken’Andriamanitra ny olombelona ho marina! Ireo heloka vitan’ny olombelona fahiny dia noleferin’Andriamanitra '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ary tsy nosazîny, satria tiana haseho ankehitriny ny fomba aneken’Andriamanitra ny olombelona ho marina. Hita amin’izany fa marina tokoa Andriamanitra sady mahatonga ho marina izay entanin’ny finoana niainan’i Jesoa!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Koa misy antony hireharehan’ny olona ve? Efa nofoanana izany. Satria nahoana? Noho ny olona manatanteraka ny lalàna ve? Tsia, fa noho ny olona manam-pinoana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Miaiky manko isika fa ny olona manam-pinoana no eken’Andriamanitra ho marina, fa tsy izay manatanteraka ny lalàna. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Sa Andriamanitry ny Jiosy ihany ve Andriamanitra? Moa tsy Andriamanitry ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' koa ve? Eny, Andriamanitry ny hafa firenena koa Izy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ahoana kosa ny amin’izay tsy nahatoky tamin’ireo Jiosy ireo? Noho ireny tsy nahatoky ireny ve no hampiova an’Andriamanitra ka hahatonga an’Andriamanitra ho tsy mahatoky? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: satria tokana ihany Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Deot 6.4.
      marker-yv: yv-n
    - type: text
      text: '; ka ny Jiosy dia ekeny ho marina noho izy ireo mino; ary ny hafa firenena dia ekeny ho marina noho izy ireo mino ihany koa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Moa ve manafoana ny lalàna amin’ny alalan’ny finoana isika amin’izany? Sanatria! Vao mainka koa aza manamafy orina ny lalàna!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sanatria! Fa tsy maintsy azo antoka Andriamanitra na dia mpandainga avokoa aza ny olona, araka ny voalazan’ny Soratra Masina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Hoekena ho marina Ianao raha miteny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary handresy lahatra raha alaina am-bava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sal 51.6, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: '!»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa raha asehon’ny tsy rariny vitantsika fa marina Andriamanitra, inona no holazaintsika? Zavatra tsy rariny ve ny ataon’Andriamanitra raha ampihariny amintsika ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hatezerany
    - type: text
      text: '? (Araka ny fiheveran’ny besinimaro no itenenako). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sanatria izany! Fa raha zavatra tsy rariny no ampiharin’Andriamanitra, hataony ahoana no fitsara an’izao tontolo izao? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Raha ohatra kosa ny laingako no vao mainka maneho an’Andriamanitra ho azo antoka sy mampitombo ny voninahiny, nahoana no mbola melohina ho mpanota aho? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ahoana no tsy ahazoana manao hoe: «Ndeha hanao ratsy hiavian’ny soa»? Misy tokoa manendrikendrika ahy ho mpilaza izany; mendrika hohelohina ireo olona ireo!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tsy misy olo-marina
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ahoana àry? Manan-tombony amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' tokoa ve isika Jiosy? Tsia dia tsia! Efa voalazako fa samy eo ambany fahefan’ny fahotana avokoa na Jiosy na hafa firenena, '
