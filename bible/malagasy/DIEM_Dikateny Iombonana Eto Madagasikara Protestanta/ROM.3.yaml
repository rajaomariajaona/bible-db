      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fantatsika kosa fa izay rehetra voalaza ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalàna
    - type: text
      text: ' dia voalaza ho an’izay eo ambanin’io lalàna io. Noho izany, dia tsy hisy hanan-kalahatra eo anatrehan’Andriamanitra; ary izao tontolo izao no hiaiky fa diso eo anoloany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Eny, misy maro tokoa amin’ny lafiny rehetra. Voalohany, ry zareo Jiosy no nanankinan’Andriamanitra ny teny izay nambàrany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Koa tsy misy olombelona hoeken’Andriamanitra ho marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Sal 143.2.
      marker-yv: yv-n
    - type: text
      text: ', noho izy manatanteraka ny lalàna; fa ny lalàna dia miasa hahafantaran’ny olombelona mazava hoe nanota izy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny finoana no aneken’Andriamanitra ny olona ho marina
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ankehitriny kosa dia efa nahariharin’Andriamanitra ny fomba anekeny antsika ho marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny fomba... ho marina: '
      - type: usfm
        marker: ft
        children:
        - type: text
