document_id: ROM.3,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Misy tombony àry ve ny maha Jiosy? Misy mahasoa ve ny '
  - type: text
    content: famorana
  - type: text
    content: '? '
  '10':
  - type: text
    content: 'araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: «Tsy misy olo-marina, na dia iray akory aza;
  '11':
  - type: text
    content: tsy misy manam-pahalalana;
  - type: text
    content: tsy misy mitady an’Andriamanitra.
  '12':
  - type: text
    content: Be siasia avokoa izy rehetra ary samy tsy misy antony;
  - type: text
    content: tsy misy manao ny tsara, na dia iray akory aza.»
  '13':
  - type: text
    content: '«Fasana misokatra ny tendany:'
  - type: text
    content: entiny mamitaka ny lelany.»
  - type: text
    content: «Poizina menarana ny teniny»;
  '14':
  - type: text
    content: «ozona sy teny mangidy no mameno ny vavany!»
  '15':
  - type: text
    content: «Mailaka erỳ izy raha ndeha handatsaka aina,
  '16':
  - type: text
    content: ka mandrava sy mampahory amin’izay alehany;
  '17':
  - type: text
    content: ny lalana mitondra amin’ny fiadanana tsy fantany!»
  '18':
  - type: text
    content: «Ny tahotra an’Andriamanitra, tsy ananany mihitsy
  - type: note
    content: 'Momba ny and 10-18: and 10-12: Sal 14.1-3; 53.2-4, voatsiahy araka ny dkt grika tranainy Septoazinta. –And 13: Sal 5.10, voatsiahy araka ny dkt grika tranainy Septoazinta; Sal 140.4. –And 14: Sal 10.7, voatsiahy araka ny dkt grika Septoazinta. –And 15-17: Is 59.7-8. –And 18: Sal 36.2.'
  - type: text
    content: '!»'
  '19':
  - type: text
    content: 'Fantatsika kosa fa izay rehetra voalaza ao amin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' dia voalaza ho an’izay eo ambanin’io lalàna io. Noho izany, dia tsy hisy hanan-kalahatra eo anatrehan’Andriamanitra; ary izao tontolo izao no hiaiky fa diso eo anoloany. '
  '2':
  - type: text
    content: 'Eny, misy maro tokoa amin’ny lafiny rehetra. Voalohany, ry zareo Jiosy no nanankinan’Andriamanitra ny teny izay nambàrany. '
  '20':
  - type: text
    content: Koa tsy misy olombelona hoeken’Andriamanitra ho marina
  - type: note
    content: Jereo Sal 143.2.
  - type: text
    content: ', noho izy manatanteraka ny lalàna; fa ny lalàna dia miasa hahafantaran’ny olombelona mazava hoe nanota izy.'
  - type: heading
    content: Ny finoana no aneken’Andriamanitra ny olona ho marina
  '21':
  - type: text
    content: Ankehitriny kosa dia efa nahariharin’Andriamanitra ny fomba anekeny antsika ho marina
  - type: note
    content: 'ny fomba... ho marina: jereo 1.17 sy nta.'
  - type: text
    content: '; ary tsy avy amin’ny '
  - type: text
    content: lalàna
  - type: text
    content: ' velively izany. Ny lalànan’i Mosesy mbamin’ireo bokin’ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' rahateo dia efa mijoro ho vavolombelona manambara '
  '22':
  - type: text
    content: 'fa ny finoana niainan’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' no haneken’Andriamanitra ny olombelona ho marina; ary mankamin’ny mpino rehetra izany, satria tsy misy fanavakavahana intsony. '
  '23':
  - type: text
    content: 'Eny, nanota ny olon-drehetra ka tsy eo afovoan’izy ireo intsony ilay Andriamanitra be voninahitra. '
  '24':
  - type: text
    content: 'Kanefa, noho ny fahasoavan’Andriamanitra, dia nekeny maimaimpoana ho marina izy ireo tamin’ny alalan’ny fanavotana izay ao amin’i Kristy Jesoa. '
  '25':
  - type: text
    content: 'Fa notendren’Andriamanitra ho sorom-panonerana ho an’ireo manam-pinoana i Kristy Jesoa Izay nahafoy ny rany: izany no maneho ny fomba aneken’Andriamanitra ny olombelona ho marina! Ireo heloka vitan’ny olombelona fahiny dia noleferin’Andriamanitra '
  '26':
  - type: text
    content: ary tsy nosazîny, satria tiana haseho ankehitriny ny fomba aneken’Andriamanitra ny olombelona ho marina. Hita amin’izany fa marina tokoa Andriamanitra sady mahatonga ho marina izay entanin’ny finoana niainan’i Jesoa!
  '27':
  - type: text
    content: 'Koa misy antony hireharehan’ny olona ve? Efa nofoanana izany. Satria nahoana? Noho ny olona manatanteraka ny lalàna ve? Tsia, fa noho ny olona manam-pinoana. '
  '28':
  - type: text
    content: 'Miaiky manko isika fa ny olona manam-pinoana no eken’Andriamanitra ho marina, fa tsy izay manatanteraka ny lalàna. '
  '29':
  - type: text
    content: 'Sa Andriamanitry ny Jiosy ihany ve Andriamanitra? Moa tsy Andriamanitry ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' koa ve? Eny, Andriamanitry ny hafa firenena koa Izy, '
  '3':
  - type: text
    content: 'Fa ahoana kosa ny amin’izay tsy nahatoky tamin’ireo Jiosy ireo? Noho ireny tsy nahatoky ireny ve no hampiova an’Andriamanitra ka hahatonga an’Andriamanitra ho tsy mahatoky? '
  '30':
  - type: text
    content: satria tokana ihany Andriamanitra
  - type: note
    content: Jereo Deot 6.4.
  - type: text
    content: '; ka ny Jiosy dia ekeny ho marina noho izy ireo mino; ary ny hafa firenena dia ekeny ho marina noho izy ireo mino ihany koa. '
  '31':
  - type: text
    content: Moa ve manafoana ny lalàna amin’ny alalan’ny finoana isika amin’izany? Sanatria! Vao mainka koa aza manamafy orina ny lalàna!
  '4':
  - type: text
    content: 'Sanatria! Fa tsy maintsy azo antoka Andriamanitra na dia mpandainga avokoa aza ny olona, araka ny voalazan’ny Soratra Masina hoe:'
  - type: text
    content: «Hoekena ho marina Ianao raha miteny,
  - type: text
    content: ary handresy lahatra raha alaina am-bava
  - type: note
    content: Sal 51.6, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '5':
  - type: text
    content: 'Koa raha asehon’ny tsy rariny vitantsika fa marina Andriamanitra, inona no holazaintsika? Zavatra tsy rariny ve ny ataon’Andriamanitra raha ampihariny amintsika ny '
  - type: text
    content: hatezerany
  - type: text
    content: '? (Araka ny fiheveran’ny besinimaro no itenenako). '
  '6':
  - type: text
    content: 'Sanatria izany! Fa raha zavatra tsy rariny no ampiharin’Andriamanitra, hataony ahoana no fitsara an’izao tontolo izao? '
  '7':
  - type: text
    content: 'Raha ohatra kosa ny laingako no vao mainka maneho an’Andriamanitra ho azo antoka sy mampitombo ny voninahiny, nahoana no mbola melohina ho mpanota aho? '
  '8':
  - type: text
    content: 'Ary ahoana no tsy ahazoana manao hoe: «Ndeha hanao ratsy hiavian’ny soa»? Misy tokoa manendrikendrika ahy ho mpilaza izany; mendrika hohelohina ireo olona ireo!'
  - type: heading
    content: Tsy misy olo-marina
  '9':
  - type: text
    content: 'Ahoana àry? Manan-tombony amin’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' tokoa ve isika Jiosy? Tsia dia tsia! Efa voalazako fa samy eo ambany fahefan’ny fahotana avokoa na Jiosy na hafa firenena, '
