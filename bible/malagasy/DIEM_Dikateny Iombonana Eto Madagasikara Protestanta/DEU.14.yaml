document_id: DEU.14,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fomba fisaonana tokony hofadina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Zanak’ilay TOMPO Andriamanitrareo ianareo, koa aza mitetika ny tenanareo na manaratra ny volon-doha eo ambonin’ny handrinareo noho ny amin’ny maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy ho fihinanareo kosa izay tsy misy vombony na kirany, fa ho maloto aminareo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny vorona madio rehetra dia ho fihinanareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Kanefa ireto kosa no vorona tsy fihinanareo: ny voromahery sy ankoay isan-karazany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ny fanindry sy papango isan-karazany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ny goaika isan-karazany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ny vorombe, ny tararaka, ny vorondriaka, ny hitsikitsika isan-karazany, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ny vorondolo, ny vorondolobe, ny gisabe, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ny sama, ny arosy, ny manàrana, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ny takatra, ny vano isan-karazany, ny takodara ary ny ramanavy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny bibikely rehetra manana elatra dia ho maloto aminareo ka tsy ho fihinanareo, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo; ianareo no efa nofidiny tamin’ny firenena rehetra ambonin’ny tany mba ho vahoaka fananany sarobidy indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hena fihinana sy hena fady
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: afa-tsy ny bibikely manana elatra saingy madio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit ny and 20 sy Lev 11.21-22, izay mamaritra mazava ny bibikely madio.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aza mihinam-biby maty ho azy fa omeo ho an’ny vahiny izay ao an-tanànanareo izany mba hohaniny, na amidio amin’ny olona hafa firenena. Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo. Aza mahandro zanak’osy amin’ny rononon-dreniny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 23.19 sy nta.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fepetra momba ny ampahafolon-karena
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Havahanareo ny ampahafolon’ny vokatra rehetra avy amin’ny voa nafafinareo, izany hoe ny vokatry ny sahanareo isan-taona. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasin
    - type: text
      text: ’ny TOMPO Andriamanitrareo, eo amin’ny toerana izay hofidiny mba hipetrahan’ny voninahiny, no hihinananareo ny ampahafolon’ny vary sy divay ary menaka vokatry ny taninareo, ary koa hihinananareo ny voalohan-teraky ny omby sy ondry aman’osinareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'And 22.23:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Lev 27.30-33.
      marker-yv: yv-n
    - type: text
      text: '. Izany no hianaranareo hanaja mandrakariva ny TOMPO Andriamanitrareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Rehefa notahin’ny TOMPO Andriamanitrareo tamin’ny famokarana ianareo, dia mety tsy hahazaka ny ampahafolon-bokatrareo hankany amin’ny toerana izay hofidiny mba hipetrahan’ny voninahiny, satria lavitra loatra ho anareo ny lalan-kaleha. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Amin’izay, dia hamidinareo ny ampahafolom-bokatrareo, ka ny vola vidiny no hataonareo tsara fihina mankany amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Io vola io no hividiananareo izay sakafo rehetra irinareo, na omby na ondry na osy na divay na zava-pisotro hafa misy alikaola; eny, hovidinareo avokoa izay rehetra tianareo, dia eo anoloan’ny Toeramasin’ny TOMPO Andriamanitrareo no hihinana izany an-kafaliana ianareo mbamin’ny ankohonanareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Aza ataonareo tsirambina ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' izay ao an-tanànanareo, satria tsy mba manana zaratany na anjara miaraka aminareo ny Levita.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Isan-telo taona, dia havahanareo ny ampahafolon’ny vokatra rehetra azonareo amin’izany taona izany, ka hatobinareo ao an-tanànanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ho avy hizaràna an’izany ny Levita (izay tsy manana zaratany na anjara miaraka aminareo) sy ny vahiny ary ny kamboty mbamin’ny mpitondratena izay eo an-tanànanareo; dia hihinana ireo ka ho voky, mba '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hitahian
    - type: text
      text: ’ny TOMPO Andriamanitrareo anareo amin’ny asa rehetra izay ataonareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aza mihinan-javatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Lev 11.1-23 sy ny and 3-20 eto. Ao amin’ny lisitry ny anaram-biby sy anaram-borona, dia misy karazana tsy fantatsika mazava tsara.
      marker-yv: yv-n
    - type: text
      text: ' maloto na inona na inona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izao no biby ho fihinanareo: ny omby, ny ondry aman’osy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ny diera, ny gazela, ny kapreôla, ny osidia, ny ombimanga, ny antilopa ary ny ropikapra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'izany hoe ny biby rehetra mivaky kitro sady mandinika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Kanefa ny biby mandinika fotsiny na mivaky kitro fotsiny dia tsy hohaninareo, fa maloto aminareo ireny, ohatra: ny rameva sy ny bitro ary ny hiràka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'hiràka: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: karazam-biby mampinono, manahatahaka ny bitro ny halehibeny.
      marker-yv: yv-n
    - type: text
      text: ', satria mandinika ihany ireo saingy tsy mba mivaky kitro; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ary ny kisoa koa, satria mivaky kitro ihany izy saingy tsy mba mandinika. Koa aza haninareo ny henan’ireo biby ireo ary aza kasihinareo akory ny fatiny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amin’ny biby rehetra ao anaty rano dia izao no ho fihinanareo: ny biby rehetra misy vombony sy kirany. '
