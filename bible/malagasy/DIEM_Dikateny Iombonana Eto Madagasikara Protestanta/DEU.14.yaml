document_id: DEU.14,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fomba fisaonana tokony hofadina
  - type: text
    content: 'Zanak’ilay TOMPO Andriamanitrareo ianareo, koa aza mitetika ny tenanareo na manaratra ny volon-doha eo ambonin’ny handrinareo noho ny amin’ny maty. '
  '10':
  - type: text
    content: Tsy ho fihinanareo kosa izay tsy misy vombony na kirany, fa ho maloto aminareo.
  '11':
  - type: text
    content: 'Ny vorona madio rehetra dia ho fihinanareo. '
  '12':
  - type: text
    content: 'Kanefa ireto kosa no vorona tsy fihinanareo: ny voromahery sy ankoay isan-karazany; '
  '13':
  - type: text
    content: 'ny fanindry sy papango isan-karazany; '
  '14':
  - type: text
    content: 'ny goaika isan-karazany; '
  '15':
  - type: text
    content: 'ny vorombe, ny tararaka, ny vorondriaka, ny hitsikitsika isan-karazany, '
  '16':
  - type: text
    content: 'ny vorondolo, ny vorondolobe, ny gisabe, '
  '17':
  - type: text
    content: 'ny sama, ny arosy, ny manàrana, '
  '18':
  - type: text
    content: ny takatra, ny vano isan-karazany, ny takodara ary ny ramanavy.
  '19':
  - type: text
    content: 'Ny bibikely rehetra manana elatra dia ho maloto aminareo ka tsy ho fihinanareo, '
  '2':
  - type: text
    content: Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo; ianareo no efa nofidiny tamin’ny firenena rehetra ambonin’ny tany mba ho vahoaka fananany sarobidy indrindra
  - type: note
    content: Jereo Eks 19.5; Tit 2.14; 1Pt 2.9.
  - type: text
    content: .
  - type: heading
    content: Hena fihinana sy hena fady
  '20':
  - type: text
    content: afa-tsy ny bibikely manana elatra saingy madio
  - type: note
    content: Ampit ny and 20 sy Lev 11.21-22, izay mamaritra mazava ny bibikely madio.
  - type: text
    content: .
  '21':
  - type: text
    content: Aza mihinam-biby maty ho azy fa omeo ho an’ny vahiny izay ao an-tanànanareo izany mba hohaniny, na amidio amin’ny olona hafa firenena. Ianareo manko dia vahoaka voatokana ho an’ny TOMPO Andriamanitrareo. Aza mahandro zanak’osy amin’ny rononon-dreniny
  - type: note
    content: Jereo Eks 23.19 sy nta.
  - type: text
    content: .
  - type: heading
    content: Fepetra momba ny ampahafolon-karena
  '22':
  - type: text
    content: 'Havahanareo ny ampahafolon’ny vokatra rehetra avy amin’ny voa nafafinareo, izany hoe ny vokatry ny sahanareo isan-taona. '
  '23':
  - type: text
    content: 'Dia eo anoloan’ny '
  - type: text
    content: Toeramasin
  - type: text
    content: ’ny TOMPO Andriamanitrareo, eo amin’ny toerana izay hofidiny mba hipetrahan’ny voninahiny, no hihinananareo ny ampahafolon’ny vary sy divay ary menaka vokatry ny taninareo, ary koa hihinananareo ny voalohan-teraky ny omby sy ondry aman’osinareo
  - type: note
    content: 'And 22.23: jereo Lev 27.30-33.'
  - type: text
    content: '. Izany no hianaranareo hanaja mandrakariva ny TOMPO Andriamanitrareo. '
  '24':
  - type: text
    content: 'Rehefa notahin’ny TOMPO Andriamanitrareo tamin’ny famokarana ianareo, dia mety tsy hahazaka ny ampahafolon-bokatrareo hankany amin’ny toerana izay hofidiny mba hipetrahan’ny voninahiny, satria lavitra loatra ho anareo ny lalan-kaleha. '
  '25':
  - type: text
    content: 'Amin’izay, dia hamidinareo ny ampahafolom-bokatrareo, ka ny vola vidiny no hataonareo tsara fihina mankany amin’ny toerana izay hofidin’ny TOMPO Andriamanitrareo. '
  '26':
  - type: text
    content: 'Io vola io no hividiananareo izay sakafo rehetra irinareo, na omby na ondry na osy na divay na zava-pisotro hafa misy alikaola; eny, hovidinareo avokoa izay rehetra tianareo, dia eo anoloan’ny Toeramasin’ny TOMPO Andriamanitrareo no hihinana izany an-kafaliana ianareo mbamin’ny ankohonanareo. '
  '27':
  - type: text
    content: 'Aza ataonareo tsirambina ny '
  - type: text
    content: Levita
  - type: text
    content: ' izay ao an-tanànanareo, satria tsy mba manana zaratany na anjara miaraka aminareo ny Levita.'
  '28':
  - type: text
    content: 'Isan-telo taona, dia havahanareo ny ampahafolon’ny vokatra rehetra azonareo amin’izany taona izany, ka hatobinareo ao an-tanànanareo. '
  '29':
  - type: text
    content: 'Ary ho avy hizaràna an’izany ny Levita (izay tsy manana zaratany na anjara miaraka aminareo) sy ny vahiny ary ny kamboty mbamin’ny mpitondratena izay eo an-tanànanareo; dia hihinana ireo ka ho voky, mba '
  - type: text
    content: hitahian
  - type: text
    content: ’ny TOMPO Andriamanitrareo anareo amin’ny asa rehetra izay ataonareo.
  '3':
  - type: text
    content: Aza mihinan-javatra
  - type: note
    content: Ampit Lev 11.1-23 sy ny and 3-20 eto. Ao amin’ny lisitry ny anaram-biby sy anaram-borona, dia misy karazana tsy fantatsika mazava tsara.
  - type: text
    content: ' maloto na inona na inona. '
  '4':
  - type: text
    content: 'Izao no biby ho fihinanareo: ny omby, ny ondry aman’osy, '
  '5':
  - type: text
    content: 'ny diera, ny gazela, ny kapreôla, ny osidia, ny ombimanga, ny antilopa ary ny ropikapra; '
  '6':
  - type: text
    content: 'izany hoe ny biby rehetra mivaky kitro sady mandinika. '
  '7':
  - type: text
    content: 'Kanefa ny biby mandinika fotsiny na mivaky kitro fotsiny dia tsy hohaninareo, fa maloto aminareo ireny, ohatra: ny rameva sy ny bitro ary ny hiràka'
  - type: note
    content: 'hiràka: karazam-biby mampinono, manahatahaka ny bitro ny halehibeny.'
  - type: text
    content: ', satria mandinika ihany ireo saingy tsy mba mivaky kitro; '
  '8':
  - type: text
    content: ary ny kisoa koa, satria mivaky kitro ihany izy saingy tsy mba mandinika. Koa aza haninareo ny henan’ireo biby ireo ary aza kasihinareo akory ny fatiny.
  '9':
  - type: text
    content: 'Amin’ny biby rehetra ao anaty rano dia izao no ho fihinanareo: ny biby rehetra misy vombony sy kirany. '
