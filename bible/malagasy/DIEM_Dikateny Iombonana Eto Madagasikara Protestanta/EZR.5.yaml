document_id: EZR.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indray andro, ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' Hagay sy ny mpaminany Zakarià'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo Hag 1.1; Za 1.1.
    marker-yv: yv-n
  - type: text
    text: ' zanakalahin’i Hidao dia nitondra hafatra ho an’ny Jiosy tao Jerosalema sy Joda, tamin’ny anaran’Ilay Andriamanitr’i Israely, Izay nanentana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia niroso niasa indray i Zerobabela, zanakalahin’i Sealtiela, sy i Jesoa, zanakalahin’i Jôtsadaka, mba hanorina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny asa nataon’i Sesebatsàro, lehiben’ny andiany voalohany tamin’ny olona tafaverina avy any an-tsesitany (jereo 1.8,11), dia toa fiomanana fotsiny amin’ny fanorenana ny tempoly vaovao (jereo 5.16). –Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zerobabela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' jereo Hag 1.12; Za 4.6-9.'
    marker-yv: yv-n
  - type: text
    text: ' ny tranon’Andriamanitra ao Jerosalema ary nanampy azy roa lahy koa ireo mpaminanin’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’izay ihany dia tonga teo amin’ireto mpanorina ny tranon’Andriamanitra i Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy i Setara-Bôzenay mbamin’ireo namany ka nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Iza no nanome baiko anareo hanorina indray io trano io sy hanangana ny manda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'manda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny hevitr’ilay voambolana aramianina voadika toy izany etoana dia tsy azo antoka; dkt hafa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vatan-kazo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toeramasina.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa takînay aminareo ny anaran’ireo lehilahy manorina ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Saingy nitsinjo an’ireto loholona jiosy hatrany Ilay Andriamaniny; ka tsy nahasakana azy hanohy ny asa ry i Tatenay sy ny namany, mandra-pahatongan’ny tatitra tany amin’i Dariôsa sy nahazoana taratasy ôfisialy momba izany toe-javatra izany.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ampangaina amin’ny amperôra Dariôsa ny Jiosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no kôpian’ny taratasy ho an’ny amperôra Dariôsa, taratasy nalefan’i Tatenay governora sy i Setara-Bôzenay ary ny namany mpifehy ny Afarsekita izay teo andafy andrefan’ny ony Eofrata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nandefa tatitra ho an’ny amperôra ry zareo ka hoy ny voasoratra ao anatiny hoe:'
- type: usfm
  marker: p
  children:
  - type: text
    text: «Ho an’ny amperôra Dariôsa,
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Mirary soa sy fiadanana feno ho anao izahay, ry Andriamanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka mba ho fantatrao fa teny amin’ny faritanin’i Joda sy tao amin’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tranon’ilay Andriamanitra
  - type: text
    text: ' lehibe izahay. Aorina indray io trano io izao, ka vato vaventy no ampiasaina ary hazo matevina no alatsaka amin’ny rindrina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Momba izany teknika fanorenan-trano izany, jereo 1 Mp 6.36.
    marker-yv: yv-n
  - type: text
    text: '; voakaly tsara ary mandroso haingana izany asa eo am-pelatanan’ny Jiosy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanontanianay ireo loholony hoe: Iza no nanome baiko anareo hanorina indray io trano io sy hanangana ny manda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo and 3 sy nta.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nanontanianay azy koa ny anarany mba hahazoanay manoratra aminao sy hampahafantatra anao ny anaran’ireo lehilahy mpitarika asa izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka izao no teny navaliny anay: ‹Mpanompon’ilay Andriamanitry ny tany aman-'
  - type: usfm
    marker: w
    children:
    - type: text
      text: danitra
  - type: text
    text: ' izahay; ary trano efa vita ela be ihany no amboarinay indray, fa mpanjaka lehibe anankiray tamin’i Israely'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mpanjaka lehibe anankiray tamin’i Israely
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia i Salômôna, jereo 1 Mp 6.'
    marker-yv: yv-n
  - type: text
    text: ' no nanorina sy nahavita azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanefa ny nampahatezeran’ireo razanay an’Ilay Andriamanitry ny lanitra no nanolorany azy ho eo an-tanan’i Nebokadnetsara ilay Kaldeanina mpanjakan’i Babilôna. Nandrava io trano io i Nebokadnetsara sady nitondra ny olona ho babo tany Babilôna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 2 Mp 25.8-12; 2 Tan 36.17-20; Jer 52.12-16.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ny fanaka volamena sy volafotsy momba ny tranon’Andriamanitra koa dia nalainy tao amin’ny tempolin’i Jerosalema ka nentiny ho any amin’ny tempolin’i Babilôna. Fa ny taona voalohany nanjakàn’i Kirôsa tamin’i Babilôna, dia namoaka didy ity amperôra ity mba haorina indray io tranon’Andriamanitra io
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1.1-4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Navoakan’i Kirôsa tao amin’ny tempoli-tsampy koa ireo fanaka ireo ka natolony an’ilay atao hoe Sesebatsàro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tempolin’i Babilôna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dia ilay tempolin’i Mardòka izay andriamanitra sampy lehibe tao Babilôna. –Momba an’i '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sesebatsàro
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', jereo 1.8.'
    marker-yv: yv-n
  - type: text
    text: ' izay notendreny ho governoran’i Joda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia nasainy noraisin’i Sesebatsàro ireo fanaka ireo mba hapetrany ao amin’ny tempolin’i Jerosalema rehefa voaorina indray eo amin’izay toerany taloha izany tranon’Andriamanitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga tao Jerosalema i Sesebatsàro ka nandatsaka ny fototr’ilay tranon’Andriamanitra; ary hatramin’izany andro izany ka mandraka ankehitriny dia natao ihany izy saingy tsy mbola vita.› '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa raha sitrakao, ry Andriamanjaka, aoka mba hozahana ny trano firaketan’ny amperôra any Babilôna, na misy didy navoakan’ny amperôra Kirôsa hanorenana indray io tranon’Andriamanitra ao Jerosalema io na tsia; ary aoka mba hambaranao, ry Andriamanjaka, ny fanapahan-kevitrao ny amin’izany zavatra izany».
