document_id: EZR.5,396
type_code: plt
verses:
  '1':
  - type: text
    content: 'Indray andro, ny '
  - type: text
    content: mpaminany
  - type: text
    content: ' Hagay sy ny mpaminany Zakarià'
  - type: note
    content: Jereo Hag 1.1; Za 1.1.
  - type: text
    content: ' zanakalahin’i Hidao dia nitondra hafatra ho an’ny Jiosy tao Jerosalema sy Joda, tamin’ny anaran’Ilay Andriamanitr’i Israely, Izay nanentana azy. '
  '10':
  - type: text
    content: 'Nanontanianay azy koa ny anarany mba hahazoanay manoratra aminao sy hampahafantatra anao ny anaran’ireo lehilahy mpitarika asa izao. '
  '11':
  - type: text
    content: 'Ka izao no teny navaliny anay: ‹Mpanompon’ilay Andriamanitry ny tany aman-'
  - type: text
    content: danitra
  - type: text
    content: ' izahay; ary trano efa vita ela be ihany no amboarinay indray, fa mpanjaka lehibe anankiray tamin’i Israely'
  - type: note
    content: Ilay mpanjaka lehibe anankiray tamin’i Israely dia i Salômôna, jereo 1 Mp 6.
  - type: text
    content: ' no nanorina sy nahavita azy. '
  '12':
  - type: text
    content: Kanefa ny nampahatezeran’ireo razanay an’Ilay Andriamanitry ny lanitra no nanolorany azy ho eo an-tanan’i Nebokadnetsara ilay Kaldeanina mpanjakan’i Babilôna. Nandrava io trano io i Nebokadnetsara sady nitondra ny olona ho babo tany Babilôna
  - type: note
    content: Jereo 2 Mp 25.8-12; 2 Tan 36.17-20; Jer 52.12-16.
  - type: text
    content: '; '
  '13':
  - type: text
    content: ny fanaka volamena sy volafotsy momba ny tranon’Andriamanitra koa dia nalainy tao amin’ny tempolin’i Jerosalema ka nentiny ho any amin’ny tempolin’i Babilôna. Fa ny taona voalohany nanjakàn’i Kirôsa tamin’i Babilôna, dia namoaka didy ity amperôra ity mba haorina indray io tranon’Andriamanitra io
  - type: note
    content: Jereo 1.1-4.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Navoakan’i Kirôsa tao amin’ny tempoli-tsampy koa ireo fanaka ireo ka natolony an’ilay atao hoe Sesebatsàro
  - type: note
    content: Ny tempolin’i Babilôna dia ilay tempolin’i Mardòka izay andriamanitra sampy lehibe tao Babilôna. –Momba an’i Sesebatsàro, jereo 1.8.
  - type: text
    content: ' izay notendreny ho governoran’i Joda; '
  '15':
  - type: text
    content: 'dia nasainy noraisin’i Sesebatsàro ireo fanaka ireo mba hapetrany ao amin’ny tempolin’i Jerosalema rehefa voaorina indray eo amin’izay toerany taloha izany tranon’Andriamanitra izany. '
  '16':
  - type: text
    content: 'Dia tonga tao Jerosalema i Sesebatsàro ka nandatsaka ny fototr’ilay tranon’Andriamanitra; ary hatramin’izany andro izany ka mandraka ankehitriny dia natao ihany izy saingy tsy mbola vita.› '
  '17':
  - type: text
    content: Koa raha sitrakao, ry Andriamanjaka, aoka mba hozahana ny trano firaketan’ny amperôra any Babilôna, na misy didy navoakan’ny amperôra Kirôsa hanorenana indray io tranon’Andriamanitra ao Jerosalema io na tsia; ary aoka mba hambaranao, ry Andriamanjaka, ny fanapahan-kevitrao ny amin’izany zavatra izany».
  '2':
  - type: text
    content: Dia niroso niasa indray i Zerobabela, zanakalahin’i Sealtiela, sy i Jesoa, zanakalahin’i Jôtsadaka, mba hanorina
  - type: note
    content: Ny asa nataon’i Sesebatsàro, lehiben’ny andiany voalohany tamin’ny olona tafaverina avy any an-tsesitany (jereo 1.8,11), dia toa fiomanana fotsiny amin’ny fanorenana ny tempoly vaovao (jereo 5.16). –Momba an’i Zerobabela jereo Hag 1.12; Za 4.6-9.
  - type: text
    content: ' ny tranon’Andriamanitra ao Jerosalema ary nanampy azy roa lahy koa ireo mpaminanin’Andriamanitra.'
  '3':
  - type: text
    content: 'Tamin’izay ihany dia tonga teo amin’ireto mpanorina ny tranon’Andriamanitra i Tatenay governoran’ny faritra andrefan’ny ony Eofrata sy i Setara-Bôzenay mbamin’ireo namany ka nanontany azy hoe:'
  - type: text
    content: –Iza no nanome baiko anareo hanorina indray io trano io sy hanangana ny manda
  - type: note
    content: manda ny hevitr’ilay voambolana aramianina voadika toy izany etoana dia tsy azo antoka; dkt hafa vatan-kazo na Toeramasina.
  - type: text
    content: '? '
  '4':
  - type: text
    content: Koa takînay aminareo ny anaran’ireo lehilahy manorina ny trano.
  '5':
  - type: text
    content: Saingy nitsinjo an’ireto loholona jiosy hatrany Ilay Andriamaniny; ka tsy nahasakana azy hanohy ny asa ry i Tatenay sy ny namany, mandra-pahatongan’ny tatitra tany amin’i Dariôsa sy nahazoana taratasy ôfisialy momba izany toe-javatra izany.
  - type: heading
    content: Ampangaina amin’ny amperôra Dariôsa ny Jiosy
  '6':
  - type: text
    content: 'Izao no kôpian’ny taratasy ho an’ny amperôra Dariôsa, taratasy nalefan’i Tatenay governora sy i Setara-Bôzenay ary ny namany mpifehy ny Afarsekita izay teo andafy andrefan’ny ony Eofrata. '
  '7':
  - type: text
    content: 'Nandefa tatitra ho an’ny amperôra ry zareo ka hoy ny voasoratra ao anatiny hoe:'
  - type: text
    content: «Ho an’ny amperôra Dariôsa,
  - type: text
    content: '«Mirary soa sy fiadanana feno ho anao izahay, ry Andriamanjaka. '
  '8':
  - type: text
    content: 'Aoka mba ho fantatrao fa teny amin’ny faritanin’i Joda sy tao amin’ny '
  - type: text
    content: tranon’ilay Andriamanitra
  - type: text
    content: ' lehibe izahay. Aorina indray io trano io izao, ka vato vaventy no ampiasaina ary hazo matevina no alatsaka amin’ny rindrina'
  - type: note
    content: Momba izany teknika fanorenan-trano izany, jereo 1 Mp 6.36.
  - type: text
    content: '; voakaly tsara ary mandroso haingana izany asa eo am-pelatanan’ny Jiosy izany. '
  '9':
  - type: text
    content: 'Nanontanianay ireo loholony hoe: Iza no nanome baiko anareo hanorina indray io trano io sy hanangana ny manda'
  - type: note
    content: Jereo and 3 sy nta.
  - type: text
    content: '? '
