    - type: text
      text: SALAMO Ampahafantaro ahy ny sitraponao ary avelao ny hadisoako
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salamo nataon’i Davida
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, Ianao no ifantohako;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny torohevitra rehetra ataon’ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia maneho fitiavana tsy miova
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ho an’izay manaraka ny baiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'raketin’ilay '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fanekempihavanany
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, mba ho voninahitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia avelao ny heloko na lehibe aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy olona manaja ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hotoroany ny làlan-kofidina koa izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiaina amim-piadanana izany olona izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny taranany no handova ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'handova ny tany: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Mt 5.5.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo mpanaja ny TOMPO
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no anehoany ny tsiambaratelony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria ampahafantariny azy tokoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay raketin’ny fanekempihavanany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Banjiniko mandrakariva ny TOMPO,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa Izy ihany no hanafaka ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny harato namandrihana ahy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, todiho aho ka iantrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa irery sady fadiranovana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toneo ny tebitebin’ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary tsoahy avy ato an-katerena aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny fahoriako sy ny fijaliako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka avelao ny fahotako rehetra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny hamaroan’ny fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady loza tokoa ny fankahalàny ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, Ianao no itokiako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka aza avela ho diso fanantenana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ho resy hifalian’ny fahavaloko!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovy re aho ka vonjeo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aoka tsy ho diso fanantenana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no fialofako!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantehitra aminao aho, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba hiarovanao ahy hadio sy hahitsy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, ilay Israely vahoakanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mba afaho amin’ny zava-drehetra mahory azy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra miantehitra aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy mba ho diso fanantenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa ireo mivadika aminao no ho menatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka enga anie hitondra tanam-polo mody!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TOMPO ô, ampahafantaro ny lalanao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ampianaro hiaina araka ny sitrakao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tariho amin’ny fahamarinanao aho ka ampianaro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria Ianao no Andriamanitra mpamonjy ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady hany ianteherako isan’andro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy, TOMPO ô, fa hatrizay hatrizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia be indrafo sy be fitiavana Ianao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hadinoy ny fahotako, fony aho tanora;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, hadinoy re izay hadisoana vitako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nefa mba tsarovy kosa aho, TOMPO ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria be fitiavana sy tsara fo Ianao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara fo sy mahitsy tokoa ny Tompo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka ny mpanota toroany lalan-kaleha,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny ory tarihiny amin’ny hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady ampianariny ny sitrapony.
