document_id: PSA.25,396
type_code: plt
verses:
  '1':
  - type: heading
    content: SALAMO Ampahafantaro ahy ny sitraponao ary avelao ny hadisoako
  - type: text
    content: ' '
  - type: text
    content: Salamo nataon’i Davida
  - type: text
    content: TOMPO ô, Ianao no ifantohako;
  '10':
  - type: text
    content: Ny torohevitra rehetra ataon’ny TOMPO
  - type: text
    content: dia maneho fitiavana tsy miova
  - type: text
    content: ho an’izay manaraka ny baiko
  - type: text
    content: 'raketin’ilay '
  - type: text
    content: fanekempihavanany
  - type: text
    content: .
  '11':
  - type: text
    content: TOMPO ô, mba ho voninahitrao,
  - type: text
    content: dia avelao ny heloko na lehibe aza.
  '12':
  - type: text
    content: Raha misy olona manaja ny TOMPO,
  - type: text
    content: dia hotoroany ny làlan-kofidina koa izy.
  '13':
  - type: text
    content: Hiaina amim-piadanana izany olona izany;
  - type: text
    content: ary ny taranany no handova ny tany
  - type: note
    content: 'handova ny tany: jereo Mt 5.5.'
  - type: text
    content: .
  '14':
  - type: text
    content: Ireo mpanaja ny TOMPO
  - type: text
    content: no anehoany ny tsiambaratelony,
  - type: text
    content: satria ampahafantariny azy tokoa
  - type: text
    content: izay raketin’ny fanekempihavanany.
  '15':
  - type: text
    content: Banjiniko mandrakariva ny TOMPO,
  - type: text
    content: fa Izy ihany no hanafaka ahy
  - type: text
    content: amin’ny harato namandrihana ahy.
  '16':
  - type: text
    content: Tompo ô, todiho aho ka iantrao
  - type: text
    content: fa irery sady fadiranovana.
  '17':
  - type: text
    content: Toneo ny tebitebin’ny foko
  - type: text
    content: ary tsoahy avy ato an-katerena aho.
  '18':
  - type: text
    content: Jereo ny fahoriako sy ny fijaliako,
  - type: text
    content: ka avelao ny fahotako rehetra.
  '19':
  - type: text
    content: Jereo ny hamaroan’ny fahavaloko,
  - type: text
    content: sady loza tokoa ny fankahalàny ahy.
  '2':
  - type: text
    content: Andriamanitra ô, Ianao no itokiako
  - type: text
    content: ka aza avela ho diso fanantenana aho
  - type: text
    content: na ho resy hifalian’ny fahavaloko!
  '20':
  - type: text
    content: Arovy re aho ka vonjeo;
  - type: text
    content: aoka tsy ho diso fanantenana aho,
  - type: text
    content: satria Ianao no fialofako!
  '21':
  - type: text
    content: Miantehitra aminao aho, Tompo ô,
  - type: text
    content: mba hiarovanao ahy hadio sy hahitsy.
  '22':
  - type: text
    content: Andriamanitra ô, ilay Israely vahoakanao
  - type: text
    content: mba afaho amin’ny zava-drehetra mahory azy!
  '3':
  - type: text
    content: Izay rehetra miantehitra aminao
  - type: text
    content: dia tsy mba ho diso fanantenana;
  - type: text
    content: fa ireo mivadika aminao no ho menatra,
  - type: text
    content: ka enga anie hitondra tanam-polo mody!
  '4':
  - type: text
    content: TOMPO ô, ampahafantaro ny lalanao aho
  - type: text
    content: ary ampianaro hiaina araka ny sitrakao.
  '5':
  - type: text
    content: Tariho amin’ny fahamarinanao aho ka ampianaro,
  - type: text
    content: satria Ianao no Andriamanitra mpamonjy ahy
  - type: text
    content: sady hany ianteherako isan’andro.
  '6':
  - type: text
    content: Tsarovy, TOMPO ô, fa hatrizay hatrizay
  - type: text
    content: dia be indrafo sy be fitiavana Ianao.
  '7':
  - type: text
    content: Koa hadinoy ny fahotako, fony aho tanora;
  - type: text
    content: eny, hadinoy re izay hadisoana vitako;
  - type: text
    content: nefa mba tsarovy kosa aho, TOMPO ô,
  - type: text
    content: satria be fitiavana sy tsara fo Ianao.
  '8':
  - type: text
    content: Tsara fo sy mahitsy tokoa ny Tompo
  - type: text
    content: ka ny mpanota toroany lalan-kaleha,
  '9':
  - type: text
    content: ny ory tarihiny amin’ny hitsiny
  - type: text
    content: sady ampianariny ny sitrapony.
