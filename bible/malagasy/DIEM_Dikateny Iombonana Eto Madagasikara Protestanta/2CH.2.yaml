document_id: 2CH.2,396
type_code: plt
verses:
  '1':
  - type: text
    content: Ary i Salômôna nandray mpiasa 70 000 ho mpitondra entana, 80 000 ho mpipai-bato eny an-tendrombohitra, ary 3 600 ho mpifehy azy ireo.
  '10':
  - type: text
    content: 'Dia hoy i Hirama, mpanjakan’i Tiro, tamin’ny taratasy nalefany ho an’i Salômôna: «Fitiavan’ny TOMPO ny vahoakany no nanendreny anao ho mpanjakany.» '
  '11':
  - type: text
    content: 'Hoy koa i Hirama: «Hisaorana anie ny TOMPO Andriamanitr’i Israely, Izay nanao ny lanitra sy ny tany, noho ny nanomezany an’i Davida zanakalahy hendry, malina sy mahira-tsaina, ka hanao trano ho an’ny TOMPO sy lapa ho an’ny tenany. '
  '12':
  - type: text
    content: Ankehitriny, indro irahiko atỳ aminao ny lehilahy anankiray manampahaizana sady mahira-tsaina, dia i Horama-Abỳ
  - type: note
    content: i Horama-Abỳ (na Hirama-Abỳ) dia antsoina fotsiny hoe Horama ao amin’ny 4.11 ary Hirama ao amin’ny 1 Mp 7.13.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'zanaky ny vehivavy danita sy lehilahy tirianina. Izy io dia mahay miasa volamena sy volafotsy, halimo sy vy ary koa vato sy hazo, mahay mamboatra lamba jaky sy volomparasy ary menamena sy lamba rongony fotsy, mahay ny karazan’asa sokitra rehetra sady mahay mamolavola tetikasa amin’ny zavatra rehetra asaina ataony; ka dia hiara-miasa amin’ny mpahaikanto anananao sy nananan’itompokolahy Davida rainao izy. '
  '14':
  - type: text
    content: 'Ny varimbazaha sy ny vary ôrza ary ny menaka sy ny divay izay nolazainao, ry andriamanjaka, dia aoka hampanaterinao ho atỳ aminay. '
  '15':
  - type: text
    content: Ary izahay hikapa hazo any Libano araka izay rehetra ilainao; ary hatambatray ireny ka hampandehaninay mitsinkafona amin’ny ranomasina hatrany Jôpa
  - type: note
    content: 'Jôpa: tanànan’i Palestinina eo amoron-tsiraky ny Ranomasina Mediteranea.'
  - type: text
    content: . Ianao kosa no hampiakatra azy mankany Jerosalema.»
  '16':
  - type: text
    content: Dia nisain’i Salômôna avokoa ny lehilahy hafa firenena izay nonina tao amin’ny tanin’i Israely; araka ny nanisan’i Davida rainy azy
  - type: note
    content: Jereo 1 Tan 22.2.
  - type: text
    content: ', dia nisy 153 000 izy ireo. '
  '17':
  - type: text
    content: Ka ny 70 000 dia nataon’i Salômôna mpitondra entana, ny 80 000 nataony mpipai-bato teny an-tendrombohitra, ary ny 3 600 nataony mpifehy ireo mpiasa ireo.
  '2':
  - type: text
    content: Naniraka olona hankany amin’i Hirama
  - type: note
    content: 'Hirama: ny dkt sasany dia manoratra izany anarana izany hoe Horama, tahaka ny ataon’ny ankamaroan’ny stf hebreo.'
  - type: text
    content: ' mpanjakan’i Tiro i Salômôna hanao hoe: «Tahaka ny nataonao tamin’i Davida raiko, izay nampanateranao hazo sedera hanaovany trano fonenana'
  - type: note
    content: 'Tahaka... fonenana: jereo 1 Tan 14.1.'
  - type: text
    content: ', no aoka hataonao amiko. '
  '3':
  - type: text
    content: 'Fa indro aho efa hanao trano ho voninahitry ny TOMPO Andriamanitro, dia trano izay hatokako ho Azy; ao no handoroana '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' eo anatrehan’ny Tompo sy hasiana ny mofo apetraka'
  - type: note
    content: 'ny mofo apetraka: jereo Lev 24.5-9.'
  - type: text
    content: ' tsy tapaka ary hanolorana '
  - type: text
    content: sorona
  - type: text
    content: ' dorana manontolo, dia ny sorona dorana manontolo isa-maraina sy isan-kariva ary koa izay fanao amin’ny sabata sy amin’ny voaloham-bolana ary amin’ny fetin’ny TOMPO Andriamanitray; ho fepetra raikitra ho an’ny Israelita izany. '
  '4':
  - type: text
    content: 'Ny tempoly hataoko dia ho lehibe, satria lehibe noho ny andriamanitra rehetra ilay Andriamanitray. '
  '5':
  - type: text
    content: 'Nefa iza no afaka manao tempoly ho Azy? Fa ny '
  - type: text
    content: lanitra
  - type: text
    content: ', na dia midadasika tokoa aza, tsy omby Azy'
  - type: note
    content: Jereo 6.18; 1 Mp 8.27.
  - type: text
    content: '. Ary iza aho no mihambo hanao tempoly ho Azy, afa-tsy toerana handoroana sorona hanetona eo anatrehany ihany! '
  '6':
  - type: text
    content: 'Ankehitriny àry, andefaso lehilahy anankiray manam-pahaizana manokana momba ny asa volamena sy volafotsy ary halimo sy vy aho, dia lehilahy havanana koa amin’ny famboarana lamba jaky sy menamena ary volomparasy sady havanana amin’ny asa sokitra; izy io no hiara-miasa amin’ireo mpahaikanto eto amiko atỳ Joda sy Jerosalema, izay efa nomanin’i Davida raiko. '
  '7':
  - type: text
    content: 'Andefaso hazo sedera sy kipreso ary hazo sarobidy avy any Libano koa aho, satria fantatro fa mahay mikapa hazo any Libano ireo mpiasanao; ary indreto ny mpiasako fa hiaraka amin’ny mpiasanao '
  '8':
  - type: text
    content: 'mba hanamboatra hazo betsaka ho ahy, fa ny trano izay tiako hatao dia ho lehibe sy higagana. '
  '9':
  - type: text
    content: Koa indro aho hanome varimbazaha sy vary ôrza samy enina arivo taonina ary koa divay sy menaka samy 800 000 litatra avy, ho sakafon’ireo mpiasanao mpikapa hazo.»
