document_id: 2CH.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary i Salômôna nandray mpiasa 70 000 ho mpitondra entana, 80 000 ho mpipai-bato eny an-tendrombohitra, ary 3 600 ho mpifehy azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Naniraka olona hankany amin’i Hirama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hirama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny dkt sasany dia manoratra izany anarana izany hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Horama,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tahaka ny ataon’ny ankamaroan’ny stf hebreo.'
    marker-yv: yv-n
  - type: text
    text: ' mpanjakan’i Tiro i Salômôna hanao hoe: «Tahaka ny nataonao tamin’i Davida raiko, izay nampanateranao hazo sedera hanaovany trano fonenana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tahaka... fonenana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo 1 Tan 14.1.
    marker-yv: yv-n
  - type: text
    text: ', no aoka hataonao amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa indro aho efa hanao trano ho voninahitry ny TOMPO Andriamanitro, dia trano izay hatokako ho Azy; ao no handoroana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vovo-javamanitra
  - type: text
    text: ' eo anatrehan’ny Tompo sy hasiana ny mofo apetraka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny mofo apetraka: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Lev 24.5-9.
    marker-yv: yv-n
  - type: text
    text: ' tsy tapaka ary hanolorana '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sorona
  - type: text
    text: ' dorana manontolo, dia ny sorona dorana manontolo isa-maraina sy isan-kariva ary koa izay fanao amin’ny sabata sy amin’ny voaloham-bolana ary amin’ny fetin’ny TOMPO Andriamanitray; ho fepetra raikitra ho an’ny Israelita izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny tempoly hataoko dia ho lehibe, satria lehibe noho ny andriamanitra rehetra ilay Andriamanitray. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nefa iza no afaka manao tempoly ho Azy? Fa ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lanitra
  - type: text
    text: ', na dia midadasika tokoa aza, tsy omby Azy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 6.18; 1 Mp 8.27.
    marker-yv: yv-n
  - type: text
    text: '. Ary iza aho no mihambo hanao tempoly ho Azy, afa-tsy toerana handoroana sorona hanetona eo anatrehany ihany! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ankehitriny àry, andefaso lehilahy anankiray manam-pahaizana manokana momba ny asa volamena sy volafotsy ary halimo sy vy aho, dia lehilahy havanana koa amin’ny famboarana lamba jaky sy menamena ary volomparasy sady havanana amin’ny asa sokitra; izy io no hiara-miasa amin’ireo mpahaikanto eto amiko atỳ Joda sy Jerosalema, izay efa nomanin’i Davida raiko. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andefaso hazo sedera sy kipreso ary hazo sarobidy avy any Libano koa aho, satria fantatro fa mahay mikapa hazo any Libano ireo mpiasanao; ary indreto ny mpiasako fa hiaraka amin’ny mpiasanao '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mba hanamboatra hazo betsaka ho ahy, fa ny trano izay tiako hatao dia ho lehibe sy higagana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa indro aho hanome varimbazaha sy vary ôrza samy enina arivo taonina ary koa divay sy menaka samy 800 000 litatra avy, ho sakafon’ireo mpiasanao mpikapa hazo.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy i Hirama, mpanjakan’i Tiro, tamin’ny taratasy nalefany ho an’i Salômôna: «Fitiavan’ny TOMPO ny vahoakany no nanendreny anao ho mpanjakany.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy koa i Hirama: «Hisaorana anie ny TOMPO Andriamanitr’i Israely, Izay nanao ny lanitra sy ny tany, noho ny nanomezany an’i Davida zanakalahy hendry, malina sy mahira-tsaina, ka hanao trano ho an’ny TOMPO sy lapa ho an’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ankehitriny, indro irahiko atỳ aminao ny lehilahy anankiray manampahaizana sady mahira-tsaina, dia i Horama-Abỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: i Horama-Abỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (na '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hirama-Abỳ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia antsoina fotsiny hoe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Horama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 4.11 ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hirama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ao amin’ny 1 Mp 7.13.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'zanaky ny vehivavy danita sy lehilahy tirianina. Izy io dia mahay miasa volamena sy volafotsy, halimo sy vy ary koa vato sy hazo, mahay mamboatra lamba jaky sy volomparasy ary menamena sy lamba rongony fotsy, mahay ny karazan’asa sokitra rehetra sady mahay mamolavola tetikasa amin’ny zavatra rehetra asaina ataony; ka dia hiara-miasa amin’ny mpahaikanto anananao sy nananan’itompokolahy Davida rainao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny varimbazaha sy ny vary ôrza ary ny menaka sy ny divay izay nolazainao, ry andriamanjaka, dia aoka hampanaterinao ho atỳ aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary izahay hikapa hazo any Libano araka izay rehetra ilainao; ary hatambatray ireny ka hampandehaninay mitsinkafona amin’ny ranomasina hatrany Jôpa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Jôpa: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tanànan’i Palestinina eo amoron-tsiraky ny Ranomasina Mediteranea.
    marker-yv: yv-n
  - type: text
    text: . Ianao kosa no hampiakatra azy mankany Jerosalema.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nisain’i Salômôna avokoa ny lehilahy hafa firenena izay nonina tao amin’ny tanin’i Israely; araka ny nanisan’i Davida rainy azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo 1 Tan 22.2.
    marker-yv: yv-n
  - type: text
    text: ', dia nisy 153 000 izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ka ny 70 000 dia nataon’i Salômôna mpitondra entana, ny 80 000 nataony mpipai-bato teny an-tendrombohitra, ary ny 3 600 nataony mpifehy ireo mpiasa ireo.
