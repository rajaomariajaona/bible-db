document_id: JER.7,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fianteherana poakaty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy baiko avy amin’ny TOMPO tonga tamin’i Jeremià ka nandidy azy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nefa ianareo mbola miseho eo anatrehako eto amin’ity trano izay natokana ho Ahy ity ihany ka manao hoe: ‹Voavonjy izahay›; ary avy eo dia tohizinareo indray ireo asa rehetra maharikoriko ireo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moa ataonareo ho zohy fieren’ny jiolahy ve ity trano izay natokana ho Ahy ity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 21.13; Mk 11.17; Lk 19.46.
      marker-yv: yv-n
    - type: text
      text: '? Fa izany no fahitako azy, hoy ny teny hentitry ny TOMPO.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mankanesa any amin’ny toerako masina any Silao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Jer 26.9; Jos 18.1; 1 Sam 1.3; 3.21; 4.3; Sal 78.60.
      marker-yv: yv-n
    - type: text
      text: ' izay namponenako ny voninahitro fahiny, ka jereo izay nanaovako azy noho ny haratsian’ilay Israely vahoakako. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ankehitriny dia manao ireny zava-dratsy rehetra fanaony ireny koa ianareo, hoy ny teny hentitry ny TOMPO. Efa nambarako sy naverimberiko taminareo izany nefa tsy nohenoinareo; efa nantsoiko ianareo nefa tsy namaly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Noho izany ity trano izay natokana ho Ahy ity, ity trano izay ianteheranareo ity, ity toerana izay nomeko anareo sy ny razanareo ity dia hataoko tahaka ny nanaovako an’i Silao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ianareo kosa horoahiko lavitra Ahy tahaka ny nandroahako ny olona rehetra mpiray firenena aminareo, dia ny taranaka rehetra tao Efraîma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Efraîma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: foko lehibe fototra tao amin’ny fanjakana Israelita tany avaratra fahiny. Ny anarany matetika no nampiasaina hanondroana ny fitambaran’io fanjakana io. Tsy hita teo amin’ny sehatra pôlitika intsony anefa izy efa ho zato taona talohan’ny fiantombohan’ny asan’i Jeremià.
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka tsy hohenoin’ny Tompo
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ianao kosa, ry Jeremià, aza mivavaka amiko ho an’ity vahoaka ity intsony na mampakatra fitarainana sy fifonana ho azy, fa tsy hihaino anao Aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tsy hitanao angaha izay ataony any amin’ireo tanànan’i Joda sy eny an-dalamben’i Jerosalema? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny ankizy mifako kitay, ny rainy mandrehitra afo, ny vehivavy kosa mametafeta koba hatao mofo hatolotra ho an’ny mpanjakavavin’ny lanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny mpanjakavavin’ny lanitra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiantsoana ny andriamani-bavy Istara na (Hastôreta), nohajaina fatratra tany Mezôpôtamia ary ampitoviana amin’ny Planeta Venus (jereo Jer 44.7-19).
      marker-yv: yv-n
    - type: text
      text: '; manao izay mahasosotra Ahy ireo fa manolotra fanatitra divay ho an’ny andriamani-kafa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa mampahasosotra Ahy tokoa ve izy, hoy ny teny hentitry ny TOMPO. Tsia, fa ny tenany ihany no ampahasosoriny, ka hampahamenatra azy izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'hitsangana eo am-bavahadin’ny tranon’ny TOMPO sy hiantsoantso izao hafatra izao: «Mihainoa ny tenin’ny TOMPO ianareo olon’i Joda rehetra izay miditra amin’ity vavahady ity mba hivavaka amin’ny TOMPO. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Noho izany dia izao no lazain’ny Tompo ANDRIANANAHARY: Indro ny fahatezerako amam-pahavinirako hatobako amin’ity tanàna ity amin’ny olona sy ny biby fiompy, ary amin’ny hazo eny an-tsaha sy amin’ny vokatry ny tany; ka ho toy ny afo tsy mety maty izany.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Firenena tsy mihaino ny Andriamaniny
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Ny henan’ny sorona dorana manontolo dia ampio ny henan’ny sorom-pihavanana nataonareo, ka mahereza mihinan-kena. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa raha nitondra ny razanareo niala tany Ejipta Aho, dia tsy nilaza taminy akory na nangataka azy hanao sorona dorana manontolo na sorom-pihavanana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa izao kosa no nandidiako azy: Henoy izay lazaiko, dia ho Andriamanitrareo Aho ary ianareo ho vahoakako. Araho ny lalàna izay nandidiako anareo, dia hahita soa ianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kanjo tsy nihaino sady tsy niraharaha Ahy izy fa nanaraka ny heviny araka ny ditran’ny fony. Tsy nitodika tamiko izy fa niamboho Ahy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hatry ny nialan’ny razanareo tany Ejipta ka mandraka androany, dia tsy nitsahatra Aho naniraka ny mpaminany mpanompoko rehetra tany aminareo isan’andro tsy tapaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit 25.4; 26.5; 29.19; 35.15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nefa tsy nihaino Ahy ianareo sady tsy niraharaha Ahy fa nanamafy hatoka sy nanao ratsy mihoatra noho ny razanareo aza.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary ianao, ry Jeremià, na dia hilaza izany teny rehetra izany aminy aza, dia tsy hihaino anao izy; ary na dia hampita ny antsoko aminy aza ianao, dia tsy hamaly anao akory izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Koa ambarao aminy hoe: «Ianareo no firenena tsy mba mihaino ny feon’ny TOMPO Andriamaniny sady tsy mety mandray anatra. Efa very teo aminareo ny toetra mahatoky ary efa niala teo am-bavanareo izany.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny lohasaham-pandringanana
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hoy ny TOMPO hoe: «Ry vahoakan’i Joda,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hetezo ka ario ny volonao lava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: izay marika fa voatokana ho Ahy ianao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 6.1-21, indrindra fa ny and 5-9.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova hira fisaonana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny amin’ny havoana mangadihady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa hariako sady ho laviko ianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria taranaka mahatezitra Ahy.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Ataovy tsara ny fitondrantenanareo sy ny asanareo, dia hamponeniko amin’ity tany ity ianareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rijan-teny hafa tohanan’ny dkt tranainy roa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: dia hipetraka eo aminareo hatrany Aho.
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nanao izay ratsy eo imasoko ny vahoakan’i Joda, hoy ny teny hentitry ny TOMPO. Nametraka sampy maharikoriko tao amin’ny trano izay natokana ho Ahy izy, ka nandoto azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nanorina toeram-panasinana atao hoe Tôfeta tao amin’ny lohasahan’i Hinôma izy mba handoroany ho sorona ny zanany lahy sy ny zanany vavy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny lohasahan’i Hinôma: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ao atsimon’i Jerosalema; jereo 19.2-6; 32.35. –momba ny '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: sorona ankizy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': jereo Lev 18.21; 2 Mp 23.10.'
      marker-yv: yv-n
    - type: text
      text: . Nefa zavatra tsy nandidiako azy akory izany, sady tsy mba tonga tao am-poko velively.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Noho izany, hoy ny teny hentitry ny TOMPO, indro avy ny andro izay tsy hilazana intsony hoe «Tôfeta» na «Lohasahan’i Hinôma» fa «Lohasaha Famonoana». Ao no handevenana ireo maty fa tsy misy toerana intsony any an-kafa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fisian’ny faty ao dia hahatonga io toerana io ho maloto, izany hoe tsy mendrika na dia amin’ny fivavahana fanompoan-tsampy aza.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ny fatin’ireo olona ireo dia ho sakafon’ny voromahery sy ny bibidia izay tsy hisy hanaitaitra hampiala azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary eny an-tanàn-dehiben’i Joda sy eny an-dalamben’i Jerosalema dia hatsahatro ny kotabam-pifaliana amin’ny fety sy ny horakora-piravoana ary ny hiran’ireo mpanambady satria ho lao ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ampit Jer 16.9; 25.10; Apôk 18.23.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza miantehitra amin’ny teny fitaka hoe: ‹Eto no tempolin’ny TOMPO, eto no tempolin’ny TOMPO, eto tokoa no tempolin’ny TOMPO!› '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ahitsio tsara ny fitondrantena sy ny fanaonareo: anaovy fitsarana ara-drariny ny adin’ny olona eo amin’ny fitsarana, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'aza mitsentsitra ny vahiny sy ny kamboty ary ny mpitondratena, atsaharo ny famonoana ny tsy manan-tsiny eto sy ny fifikirana amin’ny andriamani-kafa izay mahatonga loza ho anareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa hamponeniko eto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo ny naoty momba ny and 3.
      marker-yv: yv-n
    - type: text
      text: ' ianareo, dia eto amin’ity tany ity izay efa nomeko ny razanareo hatry ny ela ka ho mandrakizay.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa teny fitaka sy tsy misy lanjany akory no ianteheranareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hay ve ianareo mangalatra sy mamono olona, mijangajanga sy mianiana lainga, mandoro '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vovo-javamanitra
    - type: text
      text: ' ho an’i '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bahala
    - type: text
      text: ' ary mifikitra amin’ireo andriamani-kafa izay tsy fantatrareo akory? '
