document_id: JER.7,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Fianteherana poakaty
  - type: text
    content: 'Nisy baiko avy amin’ny TOMPO tonga tamin’i Jeremià ka nandidy azy '
  '10':
  - type: text
    content: 'Nefa ianareo mbola miseho eo anatrehako eto amin’ity trano izay natokana ho Ahy ity ihany ka manao hoe: ‹Voavonjy izahay›; ary avy eo dia tohizinareo indray ireo asa rehetra maharikoriko ireo. '
  '11':
  - type: text
    content: Moa ataonareo ho zohy fieren’ny jiolahy ve ity trano izay natokana ho Ahy ity
  - type: note
    content: Jereo Mt 21.13; Mk 11.17; Lk 19.46.
  - type: text
    content: '? Fa izany no fahitako azy, hoy ny teny hentitry ny TOMPO.'
  '12':
  - type: text
    content: Mankanesa any amin’ny toerako masina any Silao
  - type: note
    content: Jereo Jer 26.9; Jos 18.1; 1 Sam 1.3; 3.21; 4.3; Sal 78.60.
  - type: text
    content: ' izay namponenako ny voninahitro fahiny, ka jereo izay nanaovako azy noho ny haratsian’ilay Israely vahoakako. '
  '13':
  - type: text
    content: 'Ankehitriny dia manao ireny zava-dratsy rehetra fanaony ireny koa ianareo, hoy ny teny hentitry ny TOMPO. Efa nambarako sy naverimberiko taminareo izany nefa tsy nohenoinareo; efa nantsoiko ianareo nefa tsy namaly. '
  '14':
  - type: text
    content: 'Noho izany ity trano izay natokana ho Ahy ity, ity trano izay ianteheranareo ity, ity toerana izay nomeko anareo sy ny razanareo ity dia hataoko tahaka ny nanaovako an’i Silao. '
  '15':
  - type: text
    content: Ary ianareo kosa horoahiko lavitra Ahy tahaka ny nandroahako ny olona rehetra mpiray firenena aminareo, dia ny taranaka rehetra tao Efraîma
  - type: note
    content: 'Efraîma: foko lehibe fototra tao amin’ny fanjakana Israelita tany avaratra fahiny. Ny anarany matetika no nampiasaina hanondroana ny fitambaran’io fanjakana io. Tsy hita teo amin’ny sehatra pôlitika intsony anefa izy efa ho zato taona talohan’ny fiantombohan’ny asan’i Jeremià.'
  - type: text
    content: .»
  - type: heading
    content: Vavaka tsy hohenoin’ny Tompo
  '16':
  - type: text
    content: 'Ianao kosa, ry Jeremià, aza mivavaka amiko ho an’ity vahoaka ity intsony na mampakatra fitarainana sy fifonana ho azy, fa tsy hihaino anao Aho. '
  '17':
  - type: text
    content: 'Tsy hitanao angaha izay ataony any amin’ireo tanànan’i Joda sy eny an-dalamben’i Jerosalema? '
  '18':
  - type: text
    content: Ny ankizy mifako kitay, ny rainy mandrehitra afo, ny vehivavy kosa mametafeta koba hatao mofo hatolotra ho an’ny mpanjakavavin’ny lanitra
  - type: note
    content: 'ny mpanjakavavin’ny lanitra: fiantsoana ny andriamani-bavy Istara na (Hastôreta), nohajaina fatratra tany Mezôpôtamia ary ampitoviana amin’ny Planeta Venus (jereo Jer 44.7-19).'
  - type: text
    content: '; manao izay mahasosotra Ahy ireo fa manolotra fanatitra divay ho an’ny andriamani-kafa. '
  '19':
  - type: text
    content: Koa mampahasosotra Ahy tokoa ve izy, hoy ny teny hentitry ny TOMPO. Tsia, fa ny tenany ihany no ampahasosoriny, ka hampahamenatra azy izany.
  '2':
  - type: text
    content: 'hitsangana eo am-bavahadin’ny tranon’ny TOMPO sy hiantsoantso izao hafatra izao: «Mihainoa ny tenin’ny TOMPO ianareo olon’i Joda rehetra izay miditra amin’ity vavahady ity mba hivavaka amin’ny TOMPO. '
  '20':
  - type: text
    content: 'Noho izany dia izao no lazain’ny Tompo ANDRIANANAHARY: Indro ny fahatezerako amam-pahavinirako hatobako amin’ity tanàna ity amin’ny olona sy ny biby fiompy, ary amin’ny hazo eny an-tsaha sy amin’ny vokatry ny tany; ka ho toy ny afo tsy mety maty izany.'
  - type: heading
    content: Firenena tsy mihaino ny Andriamaniny
  '21':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Ny henan’ny sorona dorana manontolo dia ampio ny henan’ny sorom-pihavanana nataonareo, ka mahereza mihinan-kena. '
  '22':
  - type: text
    content: 'Fa raha nitondra ny razanareo niala tany Ejipta Aho, dia tsy nilaza taminy akory na nangataka azy hanao sorona dorana manontolo na sorom-pihavanana. '
  '23':
  - type: text
    content: 'Fa izao kosa no nandidiako azy: Henoy izay lazaiko, dia ho Andriamanitrareo Aho ary ianareo ho vahoakako. Araho ny lalàna izay nandidiako anareo, dia hahita soa ianareo. '
  '24':
  - type: text
    content: 'Kanjo tsy nihaino sady tsy niraharaha Ahy izy fa nanaraka ny heviny araka ny ditran’ny fony. Tsy nitodika tamiko izy fa niamboho Ahy. '
  '25':
  - type: text
    content: Hatry ny nialan’ny razanareo tany Ejipta ka mandraka androany, dia tsy nitsahatra Aho naniraka ny mpaminany mpanompoko rehetra tany aminareo isan’andro tsy tapaka
  - type: note
    content: Ampit 25.4; 26.5; 29.19; 35.15.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Nefa tsy nihaino Ahy ianareo sady tsy niraharaha Ahy fa nanamafy hatoka sy nanao ratsy mihoatra noho ny razanareo aza.
  '27':
  - type: text
    content: 'Ary ianao, ry Jeremià, na dia hilaza izany teny rehetra izany aminy aza, dia tsy hihaino anao izy; ary na dia hampita ny antsoko aminy aza ianao, dia tsy hamaly anao akory izy. '
  '28':
  - type: text
    content: 'Koa ambarao aminy hoe: «Ianareo no firenena tsy mba mihaino ny feon’ny TOMPO Andriamaniny sady tsy mety mandray anatra. Efa very teo aminareo ny toetra mahatoky ary efa niala teo am-bavanareo izany.»'
  - type: heading
    content: Ny lohasaham-pandringanana
  '29':
  - type: text
    content: 'Hoy ny TOMPO hoe: «Ry vahoakan’i Joda,'
  - type: text
    content: hetezo ka ario ny volonao lava
  - type: text
    content: izay marika fa voatokana ho Ahy ianao
  - type: note
    content: Jereo Nom 6.1-21, indrindra fa ny and 5-9.
  - type: text
    content: .
  - type: text
    content: Manaova hira fisaonana
  - type: text
    content: eny amin’ny havoana mangadihady;
  - type: text
    content: fa hariako sady ho laviko ianao,
  - type: text
    content: satria taranaka mahatezitra Ahy.»
  '3':
  - type: text
    content: 'Izao no lazain’ny TOMPOn’izao rehetra izao sady Andriamanitr’i Israely: Ataovy tsara ny fitondrantenanareo sy ny asanareo, dia hamponeniko amin’ity tany ity ianareo'
  - type: note
    content: Rijan-teny hafa tohanan’ny dkt tranainy roa dia hipetraka eo aminareo hatrany Aho.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Nanao izay ratsy eo imasoko ny vahoakan’i Joda, hoy ny teny hentitry ny TOMPO. Nametraka sampy maharikoriko tao amin’ny trano izay natokana ho Ahy izy, ka nandoto azy. '
  '31':
  - type: text
    content: Nanorina toeram-panasinana atao hoe Tôfeta tao amin’ny lohasahan’i Hinôma izy mba handoroany ho sorona ny zanany lahy sy ny zanany vavy
  - type: note
    content: 'Ny lohasahan’i Hinôma: ao atsimon’i Jerosalema; jereo 19.2-6; 32.35. –momba ny sorona ankizy: jereo Lev 18.21; 2 Mp 23.10.'
  - type: text
    content: . Nefa zavatra tsy nandidiako azy akory izany, sady tsy mba tonga tao am-poko velively.
  '32':
  - type: text
    content: Noho izany, hoy ny teny hentitry ny TOMPO, indro avy ny andro izay tsy hilazana intsony hoe «Tôfeta» na «Lohasahan’i Hinôma» fa «Lohasaha Famonoana». Ao no handevenana ireo maty fa tsy misy toerana intsony any an-kafa
  - type: note
    content: Ny fisian’ny faty ao dia hahatonga io toerana io ho maloto, izany hoe tsy mendrika na dia amin’ny fivavahana fanompoan-tsampy aza.
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ny fatin’ireo olona ireo dia ho sakafon’ny voromahery sy ny bibidia izay tsy hisy hanaitaitra hampiala azy. '
  '34':
  - type: text
    content: Ary eny an-tanàn-dehiben’i Joda sy eny an-dalamben’i Jerosalema dia hatsahatro ny kotabam-pifaliana amin’ny fety sy ny horakora-piravoana ary ny hiran’ireo mpanambady satria ho lao ny tany
  - type: note
    content: Ampit Jer 16.9; 25.10; Apôk 18.23.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Aza miantehitra amin’ny teny fitaka hoe: ‹Eto no tempolin’ny TOMPO, eto no tempolin’ny TOMPO, eto tokoa no tempolin’ny TOMPO!› '
  '5':
  - type: text
    content: 'Fa ahitsio tsara ny fitondrantena sy ny fanaonareo: anaovy fitsarana ara-drariny ny adin’ny olona eo amin’ny fitsarana, '
  '6':
  - type: text
    content: 'aza mitsentsitra ny vahiny sy ny kamboty ary ny mpitondratena, atsaharo ny famonoana ny tsy manan-tsiny eto sy ny fifikirana amin’ny andriamani-kafa izay mahatonga loza ho anareo. '
  '7':
  - type: text
    content: Fa hamponeniko eto
  - type: note
    content: Jereo ny naoty momba ny and 3.
  - type: text
    content: ' ianareo, dia eto amin’ity tany ity izay efa nomeko ny razanareo hatry ny ela ka ho mandrakizay.'
  '8':
  - type: text
    content: 'Kanefa teny fitaka sy tsy misy lanjany akory no ianteheranareo. '
  '9':
  - type: text
    content: 'Hay ve ianareo mangalatra sy mamono olona, mijangajanga sy mianiana lainga, mandoro '
  - type: text
    content: vovo-javamanitra
  - type: text
    content: ' ho an’i '
  - type: text
    content: Bahala
  - type: text
    content: ' ary mifikitra amin’ireo andriamani-kafa izay tsy fantatrareo akory? '
