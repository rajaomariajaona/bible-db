document_id: LUK.3,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Mitoriteny i Jôhany Mpanao batisa ary atao am-ponja
  - type: heading
    content: (Jereo Mt 3.1-12; Mk 10.1-8; Jôh 1.19-28)
  - type: text
    content: Tamin’ny taona faha-15 nanjakan’ny amperôra Tibèry
  - type: note
    content: I Tibèry dia nandimby ny amperôra Aogosta tao Rôma (jereo 2.1 sy nta); taona 14–37 taor J.K. no naha-amperôra an’i Tibèry. Faramparan’ny taona 27 taor J.K. no nifanandrify amin’ny vaninandro tondroin’i Lioka eo.
  - type: text
    content: ' –fony i Pônty '
  - type: text
    content: Pilato
  - type: text
    content: ' no nifehy an’i Jodea, i '
  - type: text
    content: Herôda
  - type: text
    content: ' no nanjaka tao Galilea, i Filipo rahalahiny no nanjaka tao Itorea sy Trakônitida, i Lisania no nanjaka tao Abilèna, '
  '10':
  - type: text
    content: 'Ary hoy ny vahoaka nanontany an’i Jôhany hoe:'
  - type: text
    content: –Inona àry no tokony hataonay?
  '11':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Izay manana akanjo roa, aoka hizara amin’izay tsy manana; ary izay manan-kohanina, aoka hanao toy izany koa.
  '12':
  - type: text
    content: 'Mba nisy koa '
  - type: text
    content: mpamory hetra
  - type: text
    content: ' tonga hatao batisa ka niteny tamin’i Jôhany hoe:'
  - type: text
    content: –Mpampianatra ô, inona no tokony hataonay?
  '13':
  - type: text
    content: 'Dia novaliany hoe:'
  - type: text
    content: –Aza mitaky mihoatra noho izay voafetra halainareo.
  '14':
  - type: text
    content: 'Nisy ihany koa miaramila nanontany azy hoe:'
  - type: text
    content: –Mba inona kosa no tokony hataonay?
  - type: text
    content: 'Dia hoy izy taminy:'
  - type: text
    content: –Aza maka zavatr’olona an-keriny na am-pitaka, fa aoka ianareo ho afa-po amin’ny karamanareo.
  '15':
  - type: text
    content: 'Velom-panantenana tokoa ny vahoaka ary samy nieritreritra tao am-pony hoe: «I Jôhany va re sa tsia no '
  - type: text
    content: Mesia
  - type: text
    content: '?» '
  '16':
  - type: text
    content: 'Fa i Jôhany kosa niteny tamin’izy rehetra hoe:'
  - type: text
    content: '–Ny ahy, rano no anaovako batisa anareo. Indro tamy kosa ilay Mahery noho izaho, ary tsy mendrika hamaha ny fehikapany akory aho; ny Azy, ao amin’ny Fanahy Masina sy afo no hanaovany batisa anareo. '
  '17':
  - type: text
    content: Eny an-tanany ny fikororohana
  - type: note
    content: 'fikororohana: jereo Mt 3.12 sy nta.'
  - type: text
    content: ' hanadiovany tanteraka ny vary eo am-pamoloana: ka ny vary moa hangoniny an-tsompitra, fa ny mololo hodorany amin’ny afo tsy mitsaha-mirehitra.'
  '18':
  - type: text
    content: 'Fananarana maro samihafa koa no nanambaràn’i Jôhany ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' tamin’ny olona.'
  '19':
  - type: text
    content: 'Notsinîn’i Jôhany hatrany kosa i Herôda mpanjaka noho izy naka an’i Herôdiada vadin-drahalahiny ary noho ny ratsy hafa rehetra vitan’ity mpanjaka. '
  '2':
  - type: text
    content: ary i Hàna
  - type: note
    content: I Hàna dia mpisorombe nesorina tamin’ny asany teo amin’ny taona 15 taor J.K.; mbola nanampatra ny fahefàny ihany anefa izy, na tamin’ny andron’ilay mpisorombe dimbiny aza, dia i Kaiàfa vinantolahiny (jereo Jôh 18.13; Asa 4.6).
  - type: text
    content: ' mbamin’i Kaiàfa no '
  - type: text
    content: mpisorombe
  - type: text
    content: ' – dia tonga tamin’i Jôhany zanakalahin’i Zakarià tany an-taniefitra ny tenin’Andriamanitra. '
  '20':
  - type: text
    content: Kanjo vao mainka nanampy heloka indray i Herôda, fa nanidy an’i Jôhany tao am-ponja.
  - type: heading
    content: Atao batisa miaraka amin’ny vahoaka i Jesoa
  - type: heading
    content: (Jereo Mt 3.13-17; Mk 1.9-11)
  '21':
  - type: text
    content: 'Indray andro, raha mbola natao '
  - type: text
    content: batisa
  - type: text
    content: ' ny vahoaka rehetra, dia mba natao batisa koa i Jesoa. Ary nivavaka Izy nandritra izany, ka nisokatra ny lanitra. '
  '22':
  - type: text
    content: 'Dia nidina teo ambonin’i Jesoa ny Fanahy Masina, niendri-batana toa voromahailala; sady nisy feo avy tany an-danitra nanao hoe:'
  - type: text
    content: –Ianao no Zanako, ilay Malalako; Ianao no sitrako
  - type: note
    content: Ampit Sal 2.7; Is 42.1.
  - type: text
    content: '!'
  - type: heading
    content: Taranak’i Abrahama sy taranak’i Adama i Jesoa
  - type: heading
    content: (Jereo Mt 1.1-17)
  '23':
  - type: text
    content: 'Tokony ho telopolo taona i Jesoa fony nanomboka ny asany, ka noheverin’ny olona fa zanak’i Jôsefa, zafin’i Helỳ, '
  '24':
  - type: text
    content: 'zafiafin’i Matatà, zafin-dohalik’i Levỳ, zafin-kitrokelin’i Melkỳ, zafim-paladian’i Janày, ary zafin-dorian’i Jôsefa; '
  '25':
  - type: text
    content: 'dia i Jôsefa zanakalahin’i Matatîa, zafin’i Amôsa, zafiafin’i Nahoma, zafin-dohalik’i Jeslỳ, zafin-kitrokelin’i Nagày, '
  '26':
  - type: text
    content: 'zafim-paladian’i Mahàta, ary zafin-dorian’i Matatîa; dia i Matatià zanakalahin’i Semehỳ, zafin’i Jôsèka, zafiafin’i Jôdà, '
  '27':
  - type: text
    content: 'zafin-dohalik’i Jôhanàna, zafin-kitrokelin’i Resà, zafim-paladian’i Zerobabèla ary zafin-dorian’i Sealtièla; dia i Sealtièla zanakalahin’i Nerỳ, '
  '28':
  - type: text
    content: 'zafin’i Melkỳ, zafiafin’i Adỳ, zafin-dohalik’i Kôsàma, zafin-kitrokelin’i Elmadàma, zafim-paladian’i Era, '
  '29':
  - type: text
    content: 'ary zafin-dorian’i Josoa; dia i Josoa zanakalahin’i Eliezèra, zafin’i Jorîma, zafiafin’i Matàta, zafin-dohalik’i Levỳ, '
  '3':
  - type: text
    content: 'Dia lasa i Jôhany nitety ny faritany manontolo amoron’ny ony Jôrdàna sady nanao antso avo hoe:'
  - type: text
    content: –Ialao ny toe-dratsy
  - type: note
    content: 'Ialao ny toe-dratsy: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.'
  - type: text
    content: ', meteza hatao batisa, dia havelan’Andriamanitra ny helokareo.'
  '30':
  - type: text
    content: 'zafin-kitrokelin’i Simehôna, zafim-paladian’i Jodà, ary zafin-dorian’i Jôsefa; dia i Jôsefa zanakalahin’i Jônàma, zafin’i Eliakîma, '
  '31':
  - type: text
    content: 'zafiafin’i Meleà, zafin-dohalik’i Menà, zafin-kitrokelin’i Matatà, zafim-paladian’i Natàna, ary zafin-dorian’i Davida; '
  '32':
  - type: text
    content: 'dia i Davida zanakalahin’i Jisay, zafin’i Ôbeda, zafiafin’i Bôhaza, zafin-dohalik’i Salà, zafin-kitrokelin’i Nahasôna, '
  '33':
  - type: text
    content: 'zafim-paladian’i Haminadàba, ary zafin-dorian’i Admîna, dia i Admîna zanakalahin’i Arama, zafin’i Arnỳ, zafiafin’i Hesrôna, zafin-dohalik’i Peretsa, zafin-kitrokelin’i Jodà, '
  '34':
  - type: text
    content: 'zafim-paladian’i Jakôba, ary zafin-dorian’i Itsehàka; dia i Itsehàka zanakalahin’i Abrahama, zafin’i Terà, zafiafin’i Nahôra, '
  '35':
  - type: text
    content: 'zafin-dohalik’i Seròga, zafin-kitrokelin’i Rehò, zafim-paladian’i Falèga ary zafin-dorian’i Ebèra; dia i Ebèra zanakalahin’i Salà, '
  '36':
  - type: text
    content: 'zafin’i Kainàma, zafiafin’i Arfaksàda, zafin-dohalik’i Sema, zafin-kitrokelin’i Noà, zafim-paladian’i Lamèka, '
  '37':
  - type: text
    content: 'ary zafin-dorian’i Metosalà; dia i Metosalà zanakalahin’i Henôka, zafin’i Jarèda, zafiafin’i Malaleèla, zafin-dohalik’i Kainàma, '
  '38':
  - type: text
    content: 'zafin-kitrokelin’i Enôsa, zafim-paladian’i Sèta ary zafin-dorian’i Adama, dia i Adama '
  - type: text
    content: zanak’Andriamanitra
  - type: text
    content: .
  '4':
  - type: text
    content: 'Izany dia araka ny voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ' ao amin’ny boky mirakitra ny tenin’i Isaià '
  - type: text
    content: mpaminany
  - type: text
    content: ' hoe:'
  - type: text
    content: '«Injany misy feon’olona miantso mafy any an-taniefitra hoe:'
  - type: text
    content: Amboary ny lalan’ny Tompo;
  - type: text
    content: ahitsio ny hizorany.
  '5':
  - type: text
    content: Ny lohasaha rehetra hototofana;
  - type: text
    content: ary ny tendrombohitra sy ny havoana rehetra haetry.
  - type: text
    content: Ny miolakolaka hahitsy
  - type: text
    content: 'ary ny mikitoantoana harenina:'
  '6':
  - type: text
    content: dia ho hitan’ny olombelona rehetra ny famonjena avy
  - type: text
    content: amin’Andriamanitra
  - type: note
    content: Is 40.3-5, voatsiahy araka ny dkt grika tranainy Septoazinta.
  - type: text
    content: '!»'
  '7':
  - type: text
    content: 'Toy izao àry no tenin’i Jôhany tamin’ny vahoaka nidodododo hataony '
  - type: text
    content: batisa
  - type: text
    content: ':'
  - type: text
    content: '–Ry tarana-menarana, iza no nanoro hevitra anareo mba tsy ho tratry ny fahatezeran’Andriamanitra izay efa antomotra? '
  '8':
  - type: text
    content: 'Asehoy amin’ny fitondrantena mendrika fa nialanareo tokoa ny toe-dratsinareo. Ary aza manao anakampo hoe: «Manana an’i Abrahama ho razambenay izahay'
  - type: note
    content: Ampit Jôh 8.33,37,39.
  - type: text
    content: '!» Satria lazaiko aminareo fa hain’Andriamanitra ny manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  '9':
  - type: text
    content: 'Indro efa eo am-poto-kazo rahateo ny famaky: koa ny hazo rehetra tsy mamoa voa tsara, dia hokapaina ka hatsipy any anaty afo.'
