document_id: LUK.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mitoriteny i Jôhany Mpanao batisa ary atao am-ponja
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 3.1-12; Mk 10.1-8; Jôh 1.19-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tamin’ny taona faha-15 nanjakan’ny amperôra Tibèry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Tibèry '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia nandimby ny amperôra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aogosta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' tao Rôma (jereo 2.1 sy nta); taona 14–37 taor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: J.K.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no naha-amperôra an’i Tibèry. Faramparan’ny taona 27 taor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: J.K.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' no nifanandrify amin’ny vaninandro tondroin’i Lioka eo.'
    marker-yv: yv-n
  - type: text
    text: ' –fony i Pônty '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pilato
  - type: text
    text: ' no nifehy an’i Jodea, i '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Herôda
  - type: text
    text: ' no nanjaka tao Galilea, i Filipo rahalahiny no nanjaka tao Itorea sy Trakônitida, i Lisania no nanjaka tao Abilèna, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary i Hàna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'I Hàna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dia mpisorombe nesorina tamin’ny asany teo amin’ny taona 15 taor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: J.K.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; mbola nanampatra ny fahefàny ihany anefa izy, na tamin’ny andron’ilay mpisorombe dimbiny aza, dia i Kaiàfa vinantolahiny (jereo Jôh 18.13; Asa 4.6).
    marker-yv: yv-n
  - type: text
    text: ' mbamin’i Kaiàfa no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpisorombe
  - type: text
    text: ' – dia tonga tamin’i Jôhany zanakalahin’i Zakarià tany an-taniefitra ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia lasa i Jôhany nitety ny faritany manontolo amoron’ny ony Jôrdàna sady nanao antso avo hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ialao ny toe-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ialao ny toe-dratsy: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo ny FTS amin’ny voambolana hoe FIBEBAHANA.
    marker-yv: yv-n
  - type: text
    text: ', meteza hatao batisa, dia havelan’Andriamanitra ny helokareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izany dia araka ny voalazan’ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Soratra Masina
  - type: text
    text: ' ao amin’ny boky mirakitra ny tenin’i Isaià '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpaminany
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Injany misy feon’olona miantso mafy any an-taniefitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny lalan’ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ahitsio ny hizorany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny lohasaha rehetra hototofana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ary ny tendrombohitra sy ny havoana rehetra haetry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny miolakolaka hahitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ary ny mikitoantoana harenina:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia ho hitan’ny olombelona rehetra ny famonjena avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: amin’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Is 40.3-5, voatsiahy araka ny dkt grika tranainy Septoazinta.
    marker-yv: yv-n
  - type: text
    text: '!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toy izao àry no tenin’i Jôhany tamin’ny vahoaka nidodododo hataony '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ':'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ry tarana-menarana, iza no nanoro hevitra anareo mba tsy ho tratry ny fahatezeran’Andriamanitra izay efa antomotra? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Asehoy amin’ny fitondrantena mendrika fa nialanareo tokoa ny toe-dratsinareo. Ary aza manao anakampo hoe: «Manana an’i Abrahama ho razambenay izahay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Jôh 8.33,37,39.
    marker-yv: yv-n
  - type: text
    text: '!» Satria lazaiko aminareo fa hain’Andriamanitra ny manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro efa eo am-poto-kazo rahateo ny famaky: koa ny hazo rehetra tsy mamoa voa tsara, dia hokapaina ka hatsipy any anaty afo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ny vahoaka nanontany an’i Jôhany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Inona àry no tokony hataonay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Izay manana akanjo roa, aoka hizara amin’izay tsy manana; ary izay manan-kohanina, aoka hanao toy izany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mba nisy koa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mpamory hetra
  - type: text
    text: ' tonga hatao batisa ka niteny tamin’i Jôhany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mpampianatra ô, inona no tokony hataonay?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia novaliany hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza mitaky mihoatra noho izay voafetra halainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nisy ihany koa miaramila nanontany azy hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Mba inona kosa no tokony hataonay?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia hoy izy taminy:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Aza maka zavatr’olona an-keriny na am-pitaka, fa aoka ianareo ho afa-po amin’ny karamanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Velom-panantenana tokoa ny vahoaka ary samy nieritreritra tao am-pony hoe: «I Jôhany va re sa tsia no '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Mesia
  - type: text
    text: '?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa i Jôhany kosa niteny tamin’izy rehetra hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: '–Ny ahy, rano no anaovako batisa anareo. Indro tamy kosa ilay Mahery noho izaho, ary tsy mendrika hamaha ny fehikapany akory aho; ny Azy, ao amin’ny Fanahy Masina sy afo no hanaovany batisa anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny an-tanany ny fikororohana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'fikororohana: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jereo Mt 3.12 sy nta.
    marker-yv: yv-n
  - type: text
    text: ' hanadiovany tanteraka ny vary eo am-pamoloana: ka ny vary moa hangoniny an-tsompitra, fa ny mololo hodorany amin’ny afo tsy mitsaha-mirehitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fananarana maro samihafa koa no nanambaràn’i Jôhany ny '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Vaovao Mahafaly
  - type: text
    text: ' tamin’ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Notsinîn’i Jôhany hatrany kosa i Herôda mpanjaka noho izy naka an’i Herôdiada vadin-drahalahiny ary noho ny ratsy hafa rehetra vitan’ity mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanjo vao mainka nanampy heloka indray i Herôda, fa nanidy an’i Jôhany tao am-ponja.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Atao batisa miaraka amin’ny vahoaka i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 3.13-17; Mk 1.9-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Indray andro, raha mbola natao '
  - type: usfm
    marker: w
    children:
    - type: text
      text: batisa
  - type: text
    text: ' ny vahoaka rehetra, dia mba natao batisa koa i Jesoa. Ary nivavaka Izy nandritra izany, ka nisokatra ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nidina teo ambonin’i Jesoa ny Fanahy Masina, niendri-batana toa voromahailala; sady nisy feo avy tany an-danitra nanao hoe:'
- type: usfm
  marker: m
  children:
  - type: text
    text: –Ianao no Zanako, ilay Malalako; Ianao no sitrako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ampit Sal 2.7; Is 42.1.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Taranak’i Abrahama sy taranak’i Adama i Jesoa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Jereo Mt 1.1-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tokony ho telopolo taona i Jesoa fony nanomboka ny asany, ka noheverin’ny olona fa zanak’i Jôsefa, zafin’i Helỳ, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'zafiafin’i Matatà, zafin-dohalik’i Levỳ, zafin-kitrokelin’i Melkỳ, zafim-paladian’i Janày, ary zafin-dorian’i Jôsefa; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia i Jôsefa zanakalahin’i Matatîa, zafin’i Amôsa, zafiafin’i Nahoma, zafin-dohalik’i Jeslỳ, zafin-kitrokelin’i Nagày, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'zafim-paladian’i Mahàta, ary zafin-dorian’i Matatîa; dia i Matatià zanakalahin’i Semehỳ, zafin’i Jôsèka, zafiafin’i Jôdà, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'zafin-dohalik’i Jôhanàna, zafin-kitrokelin’i Resà, zafim-paladian’i Zerobabèla ary zafin-dorian’i Sealtièla; dia i Sealtièla zanakalahin’i Nerỳ, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'zafin’i Melkỳ, zafiafin’i Adỳ, zafin-dohalik’i Kôsàma, zafin-kitrokelin’i Elmadàma, zafim-paladian’i Era, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary zafin-dorian’i Josoa; dia i Josoa zanakalahin’i Eliezèra, zafin’i Jorîma, zafiafin’i Matàta, zafin-dohalik’i Levỳ, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'zafin-kitrokelin’i Simehôna, zafim-paladian’i Jodà, ary zafin-dorian’i Jôsefa; dia i Jôsefa zanakalahin’i Jônàma, zafin’i Eliakîma, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'zafiafin’i Meleà, zafin-dohalik’i Menà, zafin-kitrokelin’i Matatà, zafim-paladian’i Natàna, ary zafin-dorian’i Davida; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'dia i Davida zanakalahin’i Jisay, zafin’i Ôbeda, zafiafin’i Bôhaza, zafin-dohalik’i Salà, zafin-kitrokelin’i Nahasôna, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'zafim-paladian’i Haminadàba, ary zafin-dorian’i Admîna, dia i Admîna zanakalahin’i Arama, zafin’i Arnỳ, zafiafin’i Hesrôna, zafin-dohalik’i Peretsa, zafin-kitrokelin’i Jodà, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'zafim-paladian’i Jakôba, ary zafin-dorian’i Itsehàka; dia i Itsehàka zanakalahin’i Abrahama, zafin’i Terà, zafiafin’i Nahôra, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'zafin-dohalik’i Seròga, zafin-kitrokelin’i Rehò, zafim-paladian’i Falèga ary zafin-dorian’i Ebèra; dia i Ebèra zanakalahin’i Salà, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
