document_id: ACT.15,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fivoriana tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nisy kristianina sasany nidina avy tany Jodea, tonga tao Antiôkia ka nikatroka nampianatra ny havana iray finoana hoe: «Tsy ho voavonjy ianareo raha tsy foràna araka ny fomba amam-panao voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lalànan
    - type: text
      text: ’i Mosesy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Lev 12.3.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa nahoana àry no mizaha toetra an’Andriamanitra ianareo ankehitriny ka mampitondra zioga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zioga: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia ny famorana sy ny fitambaran’ny lalànan’i Mosesy (jereo Asa 15.5; Gal 5.3) hatramin’ny antsipiriany.
      marker-yv: yv-n
    - type: text
      text: ' mavesatra ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpianatra
    - type: text
      text: ' nefa samy tsy nahazaka izany na ny razantsika na ny tenantsika? '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mino koa isika fa ny fahasoavan’i Jesoa Tompo no amonjena antsika toy ny amonjena azy ireo ihany koa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nangina ny mpivory rehetra, ka nihaino an’i Barnabà sy i Paoly nitantara ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: famantarana
    - type: text
      text: ' sy zava-mahagaga rehetra nampanaovin’Andriamanitra azy tany amin’ny hafa firenena. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nony vita ny azy roa lahy, dia niteny kosa i Jakôba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 12.17 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: '–Ry rahalahy, henoy aho! '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Notantarain’i Simôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Simôna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anaran’i Petera tam-boalohany (jereo Mt 4.18).
      marker-yv: yv-n
    - type: text
      text: ' teo ny fomba niahian’Andriamanitra ny hafa firenena hatrany am-boalohany, hahazoany vahoaka voatokana ho Azy avy amin’ny hafa firenena. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mifanaraka tsara amin’izany ny tenin’ireo '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminanin
    - type: text
      text: '’Andriamanitra, satria izao no voalazan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Soratra Masina
    - type: text
      text: ':'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: «Rehefa afaka izany, dia hiverina Aho, hoy ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haoriko indray ilay tranolain’i Davida izay rava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: haoriko indray izay nirodana ka hajoroko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia hitady ny Tompo ny olona sisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mbamin’ny hafa firenena rehetra izay efa voatokana ho fananako.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Izany no ambaran’ny Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa nampahafantatra izany zavatra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hatramin’ny fahagolan-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: 'And 16-18:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ham 9.11-12, voatsiahy araka ny dkt grika tranainy Septoazinta.
      marker-yv: yv-n
    - type: text
      text: .»
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa dia izao no hevitro: tsy tokony homentsika fahasahiranana ny hafa firenena mitodika amin’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Notoherin’i Paoly sy i Barnabà ry zareo ary niadiany hevitra mafy ka izao no nifanarahana: hiakatra any Jerosalema i Paoly sy i Barnabà mbamin’ny olona sasantsasany avy ao Antiôkia mba hifampidinika amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' momba izany raharaha iadian-kevitra izany.'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa aoka hanoratantsika izy ka hangatahina tsy hihinana ny hena '
    - type: usfm
      marker: w
      children:
      - type: text
        text: maloto
    - type: text
      text: ' natao sorona tamin’ny sampy, tsy hanao fifandraisana mamoafady ara-panambadiana, tsy hihinana ny henam-biby tsy nosomindaina, ary hifady ny ra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'fifandraisana mamoafady: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Eks 34.15-16; Lev 18.6-23; 17.10-16 ary koa Mt 5.32 sy nta.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Satria efa torîna hatramin’ny ela isan-tanàna ary famaky ao amin’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sinagôga
    - type: text
      text: ' isaky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabata
    - type: text
      text: ' ny lalànan’i Mosesy.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Taratasy naely ho an’ny mpino '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tamin’izay dia hitan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôstôly
    - type: text
      text: ' sy ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: loholona
    - type: text
      text: ' mbamin’ny Fiangonana manontolo fa mety ny hifidianana solotena avy amin’ny mpivory ka halefa hiara-dia amin’i Paoly sy i Barnabà hankany Antiôkia. Dia voafidy i Joda, atao hoe Barsabasy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ity hoe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Joda Barsabasy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ity dia tsy misy fantatra ny momba azy; fa i Silasy kosa dia matetika voateny ao amin’ny Test. V. satria mpanampy an’i Paoly (15.40; jereo 1 Tes 1.1; 2 Tes 1.1; 2 Kôr 1.19) ary toa mpanampy an’i Petera ihany koa (1 Pt 5.12).'
      marker-yv: yv-n
    - type: text
      text: ', ary koa i Silasy, samy lehilahy eken-teny teo amin’ny havana iray finoana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Toy izao no vakin’ilay taratasy nampitondraina azy roa lahy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Izahay apôstôly sy loholona havanareo dia manolotra ny fiarahabana ho anareo havana hafa firenena monina any Antiôkia sy Siria ary Silisia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Renay fa misy olona avy atỳ aminay manao fampianarana mampikorontan-tsaina sy mampitebiteby fanahy anareo, kanefa tsy nahazo teny taminay velively. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Noho izany, dia hitanay fa mety ary lany eranay rehetra ny hifidianana solotena halefa atỳ aminareo. Ireo solotena ireo dia hiaraka amin’i Barnabà sy i Paoly, rahalahy malalanay, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'izay nanao vy very ny ainy ho voninahitr’i Jesoa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Kristy
    - type: text
      text: ' Tompontsika. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Indreny àry irahinay i Joda sy i Silasy hilaza mivantana aminareo izany teny izany koa. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa sitraky ny Fanahy Masina sy ny tenanay ny tsy hampitondra enta-mavesatra anareo, afa-tsy ireto zavatra tsy maintsy hotandremana ireto: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: tsy mihinana ny hena natao sorona tamin’ny sampy; mifady ny ra; tsy mihinana ny henam-biby tsy nosomindaina; ary tsy manao fifandraisana mamoafady ara-panambadiana. Tsara tokoa no ataonareo raha mitandrin-tena tsy hanao izany. Veloma!»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Rehefa novatsîn’ny Fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Novatsîn’ny Fiangonana: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dkt hafa '
      - type: usfm
        marker: it
        children:
        - type: text
          text: naterin’ny Fiangonana teny ho eny. –Ny Fiangonana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' tao Antiôkia any Siria izany tenenina eto izany.'
      marker-yv: yv-n
    - type: text
      text: ' ry i Paoly, dia lasa namakivaky an’i Fenisia sy i Samaria sady nitantara ombieny ombieny ny fitodihan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hafa firenena
    - type: text
      text: ' amin’Andriamanitra, ka nahafaly aoka izany ireo havana rehetra iray finoana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nalefa ireo iraka mbamin’i Barnabà sy i Paoly ka nidina nankany Antiôkia. Novorîn’izy efa-dahy ny mpino marobe tao an-tanàna ka notolorany an’ilay taratasy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Novakîna izany ka samy dibo-kafaliana izy rehetra noho ny fampaherezana nentin’ilay taratasy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'I Joda sy i Silasy izay samy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: mpaminany
    - type: text
      text: ', dia niteny naharitra tamin’ny havana iray finoana ka nampirisika sy nampahery azy ireo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary rehefa nitoetra elaela tao Antiôkia izy roa lahy, dia nalefan’ireo hiverina soa aman-tsara any amin’ny naniraka azy. [ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Kanefa sitrak’i Silasy ny hijanona tao.]
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Nitoetra tany Antiôkia kosa i Paoly sy i Barnabà; ary nampianatra sy nitory ny tenin’ny Tompo izy roa lahy mbamin’ny namany maro.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misara-dia i Paoly sy i Barnabà
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Rehefa afaka andro vitsivitsy, dia hoy i Paoly tamin’i Barnabà:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Andeha hiverenantsika hovangiana ireo havana iray finoana any amin’ny tanàna rehetra izay efa nitoriantsika ny tenin’ny Tompo mba hahitana izay manjo azy any.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tian’i Barnabà hoentina hiara-dia amin’izy roa lahy i Jôhany, ilay atao hoe Marka; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: saingy noheverin’i Paoly fa tsy tokony hoentina izy io satria nandao azy roa lahy tany Pamfilia ka tsy niara-niasa taminy intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 13.13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nifanditra mafy izy roa lahy ka nisara-dia. I Barnabà moa nitondra an’i Marka, ary niondrana an-tsambo ho any Sipra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nony tonga tao Jerosalema ry i Paoly sy ny namany, dia noraisin’ny Fiangonana sy ny apôstôly ary ny loholona ka nitantara taminy ny zavatra rehetra nampanaovin’Andriamanitra azy ireo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'I Paoly kosa nifidy an’i Silasy ho mpiara-miasa, ary niainga rehefa nankinin’ireo havana iray finoana tamin’ny fahasoavan’ny Tompo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Dia lasa ry i Paoly namakivaky an’i Siria sy i Silisia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'I Silisia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia faritany manodidina ny tanànan’i Tarsa.
      marker-yv: yv-n
    - type: text
      text: ' ka nampahery ny Fiangonana rehetra.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ny mpino sasany, isan’ny tariky ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Farisianina
    - type: text
      text: ', dia nitsangana ka nanao hoe:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: –Tsy maintsy foràna ireo mpino hafa firenena, ka asaina mitandrina ny lalànan’i Mosesy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nivory ny apôstôly sy ny loholona hifampidinika momba izany raharaha izany. '
  '7':
  - type: usfm
    marker: p
