document_id: ACT.15,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivoriana tao Jerosalema
  - type: text
    content: 'Nisy kristianina sasany nidina avy tany Jodea, tonga tao Antiôkia ka nikatroka nampianatra ny havana iray finoana hoe: «Tsy ho voavonjy ianareo raha tsy foràna araka ny fomba amam-panao voalazan’ny '
  - type: text
    content: lalànan
  - type: text
    content: ’i Mosesy
  - type: note
    content: Jereo Lev 12.3.
  - type: text
    content: '.» '
  '10':
  - type: text
    content: Koa nahoana àry no mizaha toetra an’Andriamanitra ianareo ankehitriny ka mampitondra zioga
  - type: note
    content: 'zioga: dia ny famorana sy ny fitambaran’ny lalànan’i Mosesy (jereo Asa 15.5; Gal 5.3) hatramin’ny antsipiriany.'
  - type: text
    content: ' mavesatra ny '
  - type: text
    content: mpianatra
  - type: text
    content: ' nefa samy tsy nahazaka izany na ny razantsika na ny tenantsika? '
  '11':
  - type: text
    content: Mino koa isika fa ny fahasoavan’i Jesoa Tompo no amonjena antsika toy ny amonjena azy ireo ihany koa.
  '12':
  - type: text
    content: 'Dia nangina ny mpivory rehetra, ka nihaino an’i Barnabà sy i Paoly nitantara ny '
  - type: text
    content: famantarana
  - type: text
    content: ' sy zava-mahagaga rehetra nampanaovin’Andriamanitra azy tany amin’ny hafa firenena. '
  '13':
  - type: text
    content: Nony vita ny azy roa lahy, dia niteny kosa i Jakôba
  - type: note
    content: Jereo 12.17 sy nta.
  - type: text
    content: ' nanao hoe:'
  - type: text
    content: '–Ry rahalahy, henoy aho! '
  '14':
  - type: text
    content: Notantarain’i Simôna
  - type: note
    content: 'Simôna: anaran’i Petera tam-boalohany (jereo Mt 4.18).'
  - type: text
    content: ' teo ny fomba niahian’Andriamanitra ny hafa firenena hatrany am-boalohany, hahazoany vahoaka voatokana ho Azy avy amin’ny hafa firenena. '
  '15':
  - type: text
    content: 'Mifanaraka tsara amin’izany ny tenin’ireo '
  - type: text
    content: mpaminanin
  - type: text
    content: '’Andriamanitra, satria izao no voalazan’ny '
  - type: text
    content: Soratra Masina
  - type: text
    content: ':'
  '16':
  - type: text
    content: «Rehefa afaka izany, dia hiverina Aho, hoy ny Tompo;
  - type: text
    content: haoriko indray ilay tranolain’i Davida izay rava,
  - type: text
    content: haoriko indray izay nirodana ka hajoroko.
  '17':
  - type: text
    content: Dia hitady ny Tompo ny olona sisa,
  - type: text
    content: mbamin’ny hafa firenena rehetra izay efa voatokana ho fananako.
  '18':
  - type: text
    content: Izany no ambaran’ny Tompo,
  - type: text
    content: Izay efa nampahafantatra izany zavatra izany
  - type: text
    content: hatramin’ny fahagolan-tany
  - type: note
    content: 'And 16-18: Ham 9.11-12, voatsiahy araka ny dkt grika tranainy Septoazinta.'
  - type: text
    content: .»
  '19':
  - type: text
    content: 'Koa dia izao no hevitro: tsy tokony homentsika fahasahiranana ny hafa firenena mitodika amin’Andriamanitra. '
  '2':
  - type: text
    content: 'Notoherin’i Paoly sy i Barnabà ry zareo ary niadiany hevitra mafy ka izao no nifanarahana: hiakatra any Jerosalema i Paoly sy i Barnabà mbamin’ny olona sasantsasany avy ao Antiôkia mba hifampidinika amin’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' momba izany raharaha iadian-kevitra izany.'
  '20':
  - type: text
    content: 'Fa aoka hanoratantsika izy ka hangatahina tsy hihinana ny hena '
  - type: text
    content: maloto
  - type: text
    content: ' natao sorona tamin’ny sampy, tsy hanao fifandraisana mamoafady ara-panambadiana, tsy hihinana ny henam-biby tsy nosomindaina, ary hifady ny ra'
  - type: note
    content: 'fifandraisana mamoafady: Jereo Eks 34.15-16; Lev 18.6-23; 17.10-16 ary koa Mt 5.32 sy nta.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Satria efa torîna hatramin’ny ela isan-tanàna ary famaky ao amin’ny '
  - type: text
    content: sinagôga
  - type: text
    content: ' isaky ny '
  - type: text
    content: sabata
  - type: text
    content: ' ny lalànan’i Mosesy.'
  - type: heading
    content: Taratasy naely ho an’ny mpino hafa firenena
  '22':
  - type: text
    content: 'Tamin’izay dia hitan’ny '
  - type: text
    content: apôstôly
  - type: text
    content: ' sy ny '
  - type: text
    content: loholona
  - type: text
    content: ' mbamin’ny Fiangonana manontolo fa mety ny hifidianana solotena avy amin’ny mpivory ka halefa hiara-dia amin’i Paoly sy i Barnabà hankany Antiôkia. Dia voafidy i Joda, atao hoe Barsabasy'
  - type: note
    content: Ity hoe Joda Barsabasy ity dia tsy misy fantatra ny momba azy; fa i Silasy kosa dia matetika voateny ao amin’ny Test. V. satria mpanampy an’i Paoly (15.40; jereo 1 Tes 1.1; 2 Tes 1.1; 2 Kôr 1.19) ary toa mpanampy an’i Petera ihany koa (1 Pt 5.12).
  - type: text
    content: ', ary koa i Silasy, samy lehilahy eken-teny teo amin’ny havana iray finoana. '
  '23':
  - type: text
    content: 'Toy izao no vakin’ilay taratasy nampitondraina azy roa lahy:'
  - type: text
    content: '«Izahay apôstôly sy loholona havanareo dia manolotra ny fiarahabana ho anareo havana hafa firenena monina any Antiôkia sy Siria ary Silisia. '
  '24':
  - type: text
    content: 'Renay fa misy olona avy atỳ aminay manao fampianarana mampikorontan-tsaina sy mampitebiteby fanahy anareo, kanefa tsy nahazo teny taminay velively. '
  '25':
  - type: text
    content: 'Noho izany, dia hitanay fa mety ary lany eranay rehetra ny hifidianana solotena halefa atỳ aminareo. Ireo solotena ireo dia hiaraka amin’i Barnabà sy i Paoly, rahalahy malalanay, '
  '26':
  - type: text
    content: 'izay nanao vy very ny ainy ho voninahitr’i Jesoa '
  - type: text
    content: Kristy
  - type: text
    content: ' Tompontsika. '
  '27':
  - type: text
    content: 'Indreny àry irahinay i Joda sy i Silasy hilaza mivantana aminareo izany teny izany koa. '
  '28':
  - type: text
    content: 'Fa sitraky ny Fanahy Masina sy ny tenanay ny tsy hampitondra enta-mavesatra anareo, afa-tsy ireto zavatra tsy maintsy hotandremana ireto: '
  '29':
  - type: text
    content: tsy mihinana ny hena natao sorona tamin’ny sampy; mifady ny ra; tsy mihinana ny henam-biby tsy nosomindaina; ary tsy manao fifandraisana mamoafady ara-panambadiana. Tsara tokoa no ataonareo raha mitandrin-tena tsy hanao izany. Veloma!»
  '3':
  - type: text
    content: Rehefa novatsîn’ny Fiangonana
  - type: note
    content: 'Novatsîn’ny Fiangonana: dkt hafa naterin’ny Fiangonana teny ho eny. –Ny Fiangonana tao Antiôkia any Siria izany tenenina eto izany.'
  - type: text
    content: ' ry i Paoly, dia lasa namakivaky an’i Fenisia sy i Samaria sady nitantara ombieny ombieny ny fitodihan’ny '
  - type: text
    content: hafa firenena
  - type: text
    content: ' amin’Andriamanitra, ka nahafaly aoka izany ireo havana rehetra iray finoana. '
  '30':
  - type: text
    content: 'Dia nalefa ireo iraka mbamin’i Barnabà sy i Paoly ka nidina nankany Antiôkia. Novorîn’izy efa-dahy ny mpino marobe tao an-tanàna ka notolorany an’ilay taratasy. '
  '31':
  - type: text
    content: 'Novakîna izany ka samy dibo-kafaliana izy rehetra noho ny fampaherezana nentin’ilay taratasy. '
  '32':
  - type: text
    content: 'I Joda sy i Silasy izay samy '
  - type: text
    content: mpaminany
  - type: text
    content: ', dia niteny naharitra tamin’ny havana iray finoana ka nampirisika sy nampahery azy ireo. '
  '33':
  - type: text
    content: 'Ary rehefa nitoetra elaela tao Antiôkia izy roa lahy, dia nalefan’ireo hiverina soa aman-tsara any amin’ny naniraka azy. [ '
  '34':
  - type: text
    content: Kanefa sitrak’i Silasy ny hijanona tao.]
  '35':
  - type: text
    content: Nitoetra tany Antiôkia kosa i Paoly sy i Barnabà; ary nampianatra sy nitory ny tenin’ny Tompo izy roa lahy mbamin’ny namany maro.
  - type: heading
    content: Misara-dia i Paoly sy i Barnabà
  '36':
  - type: text
    content: 'Rehefa afaka andro vitsivitsy, dia hoy i Paoly tamin’i Barnabà:'
  - type: text
    content: –Andeha hiverenantsika hovangiana ireo havana iray finoana any amin’ny tanàna rehetra izay efa nitoriantsika ny tenin’ny Tompo mba hahitana izay manjo azy any.
  '37':
  - type: text
    content: 'Tian’i Barnabà hoentina hiara-dia amin’izy roa lahy i Jôhany, ilay atao hoe Marka; '
  '38':
  - type: text
    content: saingy noheverin’i Paoly fa tsy tokony hoentina izy io satria nandao azy roa lahy tany Pamfilia ka tsy niara-niasa taminy intsony
  - type: note
    content: Jereo 13.13.
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Dia nifanditra mafy izy roa lahy ka nisara-dia. I Barnabà moa nitondra an’i Marka, ary niondrana an-tsambo ho any Sipra. '
  '4':
  - type: text
    content: 'Nony tonga tao Jerosalema ry i Paoly sy ny namany, dia noraisin’ny Fiangonana sy ny apôstôly ary ny loholona ka nitantara taminy ny zavatra rehetra nampanaovin’Andriamanitra azy ireo. '
  '40':
  - type: text
    content: 'I Paoly kosa nifidy an’i Silasy ho mpiara-miasa, ary niainga rehefa nankinin’ireo havana iray finoana tamin’ny fahasoavan’ny Tompo. '
  '41':
  - type: text
    content: Dia lasa ry i Paoly namakivaky an’i Siria sy i Silisia
  - type: note
    content: I Silisia dia faritany manodidina ny tanànan’i Tarsa.
  - type: text
    content: ' ka nampahery ny Fiangonana rehetra.'
  '5':
  - type: text
    content: 'Fa ny mpino sasany, isan’ny tariky ny '
  - type: text
    content: Farisianina
  - type: text
    content: ', dia nitsangana ka nanao hoe:'
  - type: text
    content: –Tsy maintsy foràna ireo mpino hafa firenena, ka asaina mitandrina ny lalànan’i Mosesy.
  '6':
  - type: text
    content: 'Dia nivory ny apôstôly sy ny loholona hifampidinika momba izany raharaha izany. '
  '7':
  - type: text
    content: 'Taorian’ny ady hevitra naharitra, dia nitsangana i Petera ka nanao hoe:'
  - type: text
    content: '–Ry rahalahy, fantatrareo fa nofidin’Andriamanitra avy eo aminareo aho, efa ela ihany izay, mba hitory ny '
  - type: text
    content: Vaovao Mahafaly
  - type: text
    content: ' amin’ny hafa firenena ka handrenesany sy hinoany azy. '
  '8':
  - type: text
    content: Ary Andriamanitra, Izay mahalala ny fon’ny olona, no vavolombelona niantoka azy ireo tamin’ny nanomezany azy ny Fanahy Masina, tahaka antsika koa
  - type: note
    content: 'And 7-8: jereo 10.44; 11.15.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Tsy nasiany tombo sy hala isika sy ny hafa firenena fa nodioviny fo izy ireo satria nino. '
