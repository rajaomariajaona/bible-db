document_id: DEU.18,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zo ananan’ireo taranak’i Levỳ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Levita mpisorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'levita mpisorona: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo 17.9 sy nta.
      marker-yv: yv-n
    - type: text
      text: ' sy ny hafa rehetra anisan’ny fokon’i Levỳ dia tsy mba hanana zaratany na anjara miaraka amin’ny Israelita namany; fa ny ho fihinany dia ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ' sy anjara atolotra ho an’ny TOMPO. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka eo aminareo tsy hisy olona mpandefa ny zanany lahy na ny zanany vavy hatao '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sorona
    - type: text
      text: ', na mpimasy, na mpanandro, na mpisikidy na mpamosavy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: aoka eo aminareo tsy hisy manao fandraikiraikena na manadina ny olona tsindrian-javatra, na mamoha angatra, na manontany ny maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Endrika maro isehoan’ny fanaovana majika sy fanontaniana ny maty no tanisaina etoana. –Jereo Eks 22.17; Lev 19.26,31.
      marker-yv: yv-n
    - type: text
      text: ', '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izay rehetra mpanao ireny zavatra ireny dia mahatsiravina eo imason’ny TOMPO; ary izany no handroahan’ny TOMPO Andriamanitrareo an’ireny firenena ireny eo anoloanareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ianareo hifikitra tanteraka amin’ny TOMPO Andriamanitrareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Mt 5.48.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo firenena izay efa horoahinareo ireo no mihaino ny mpanandro sy ny mpimasy; fa ianareo kosa tsy avelan’ny TOMPO Andriamanitrareo hanao izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Mpaminany
    - type: text
      text: ' anankiray tahaka ahy izao, mpaminany hipoitra avy amin’ny mpiray firenena aminareo, no hatsangan’ny TOMPO Andriamanitrareo ho anareo; izy no hohenoinareo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 3.22; 7.37.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany indrindra no nangatahinareo tamin’ny TOMPO Andriamanitrareo fony ianareo tafavondrona tany '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Hôreba
    - type: text
      text: ' ka nitenenanareo hoe: «Aoka tsy ny feon’ny TOMPO Andriamanitray intsony no ho henonay, ary aoka tsy ho hitanay intsony izany afo lehibe izany, fandrao maty izahay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo 5.25.
      marker-yv: yv-n
    - type: text
      text: '». '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny TOMPO tamiko: «Tsara ny nilazany an’izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpaminany anankiray tahaka anao izao, mpaminany hipoitra avy amin’ny mpiray firenena aminy, no hatsangako ho azy; hataoko eo am-bavan’io mpaminany io ny teniko, ka izay rehetra hasaiko hambarany no holazainy amin’ireo mpiray firenena aminy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra tsy mihaino ny teny izay holazain’io mpaminany io amin’ny anarako, dia Izaho no hampamoaka azy ny amin’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Asa 3.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hanana anjara eo anivon’ny mpiray firenena aminy tsy akory ny Levita: ny TOMPO no anjarany, araka izay nampanantenainy taminy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jereo Nom 18.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny mpaminany izay sahy hilaza amin’ny anarako zavatra tsy nasaiko nambarany, na izay miteny amin’ny anaran’andriamani-kafa, dia hatao maty izany mpaminany izany.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ianareo angamba hanao anakampo hoe: «Ahoana no hahafantaranay ny teny tsy nolazain’ny TOMPO!» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hoe miteny amin’ny anaran’ny TOMPO ilay mpaminany, kanefa tsy mitranga na tsy tanteraka ny zavatra nolazainy, dia teny tsy nolazain’ny TOMPO izany: fahasahisahiana no nilazan’ny mpaminany izany ka aoka tsy hampihontsina anareo izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no zo ananan’ny mpisorona amin’ny vahoaka, izany hoe amin’ireo olona manolotra omby na ondry na osy hatao sorona: homena ho an’ny mpisorona ny sorok’ilay biby sy ny valanoranony ary ny vavoniny; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'homenareo azy koa ny voaloham-bokatrareo na vary na divay na menaka; ary homenareo azy ny volon’ireo ondry aman’osy voalohany hetezanareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny taranak’i Levỳ no voafidin’ny TOMPO Andriamanitra tamin’ny foko israelita rehetra hanao lalandava ny fanompoam-pivavahana amin’ny anaran’ny TOMPO.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Levita
    - type: text
      text: ' maniry mafy hiala ny tanàna nonenany, na aiza na aiza manerana an’i Israely, ka mandeha any amin’ilay toerana izay hofidin’ny TOMPO, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hanao fanompoam-pivavahana amin’ilay TOMPO Andriamaniny izy, tahaka ny ataon’ny Levita rehetra mpiray foko aminy eo anoloan’ny '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Toeramasina
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary anjara mitovy amin’ny an’ireo ihany no ho fihinany, na dia misy aza izay azony tamin’ny fivarotana ny fananan-drainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na dia misy aza... fananan-drainy: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mazava ny RM.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiavahan’ny mpaminany sandoka sy ny mpaminany tena izy
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rahatrizay ianareo tafiditra eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo, dia aza mianatra maka tahaka ny fomba mahatsiravina fanaon’ireo firenena monina ao ireo. '
