document_id: DEU.18,396
type_code: plt
verses:
  '1':
  - type: heading
    content: Zo ananan’ireo taranak’i Levỳ
  - type: text
    content: Ny Levita mpisorona
  - type: note
    content: 'levita mpisorona: jereo 17.9 sy nta.'
  - type: text
    content: ' sy ny hafa rehetra anisan’ny fokon’i Levỳ dia tsy mba hanana zaratany na anjara miaraka amin’ny Israelita namany; fa ny ho fihinany dia ny '
  - type: text
    content: sorona
  - type: text
    content: ' sy anjara atolotra ho an’ny TOMPO. '
  '10':
  - type: text
    content: 'Aoka eo aminareo tsy hisy olona mpandefa ny zanany lahy na ny zanany vavy hatao '
  - type: text
    content: sorona
  - type: text
    content: ', na mpimasy, na mpanandro, na mpisikidy na mpamosavy; '
  '11':
  - type: text
    content: aoka eo aminareo tsy hisy manao fandraikiraikena na manadina ny olona tsindrian-javatra, na mamoha angatra, na manontany ny maty
  - type: note
    content: Endrika maro isehoan’ny fanaovana majika sy fanontaniana ny maty no tanisaina etoana. –Jereo Eks 22.17; Lev 19.26,31.
  - type: text
    content: ', '
  '12':
  - type: text
    content: 'fa izay rehetra mpanao ireny zavatra ireny dia mahatsiravina eo imason’ny TOMPO; ary izany no handroahan’ny TOMPO Andriamanitrareo an’ireny firenena ireny eo anoloanareo. '
  '13':
  - type: text
    content: Aoka ianareo hifikitra tanteraka amin’ny TOMPO Andriamanitrareo
  - type: note
    content: Jereo Mt 5.48.
  - type: text
    content: .
  '14':
  - type: text
    content: 'Ireo firenena izay efa horoahinareo ireo no mihaino ny mpanandro sy ny mpimasy; fa ianareo kosa tsy avelan’ny TOMPO Andriamanitrareo hanao izany. '
  '15':
  - type: text
    content: Mpaminany
  - type: text
    content: ' anankiray tahaka ahy izao, mpaminany hipoitra avy amin’ny mpiray firenena aminareo, no hatsangan’ny TOMPO Andriamanitrareo ho anareo; izy no hohenoinareo'
  - type: note
    content: Jereo Asa 3.22; 7.37.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Izany indrindra no nangatahinareo tamin’ny TOMPO Andriamanitrareo fony ianareo tafavondrona tany '
  - type: text
    content: Hôreba
  - type: text
    content: ' ka nitenenanareo hoe: «Aoka tsy ny feon’ny TOMPO Andriamanitray intsony no ho henonay, ary aoka tsy ho hitanay intsony izany afo lehibe izany, fandrao maty izahay'
  - type: note
    content: Jereo 5.25.
  - type: text
    content: '». '
  '17':
  - type: text
    content: 'Dia hoy ny TOMPO tamiko: «Tsara ny nilazany an’izany. '
  '18':
  - type: text
    content: 'Mpaminany anankiray tahaka anao izao, mpaminany hipoitra avy amin’ny mpiray firenena aminy, no hatsangako ho azy; hataoko eo am-bavan’io mpaminany io ny teniko, ka izay rehetra hasaiko hambarany no holazainy amin’ireo mpiray firenena aminy. '
  '19':
  - type: text
    content: Izay rehetra tsy mihaino ny teny izay holazain’io mpaminany io amin’ny anarako, dia Izaho no hampamoaka azy ny amin’izany
  - type: note
    content: Jereo Asa 3.23.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Tsy hanana anjara eo anivon’ny mpiray firenena aminy tsy akory ny Levita: ny TOMPO no anjarany, araka izay nampanantenainy taminy'
  - type: note
    content: Jereo Nom 18.20.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Fa ny mpaminany izay sahy hilaza amin’ny anarako zavatra tsy nasaiko nambarany, na izay miteny amin’ny anaran’andriamani-kafa, dia hatao maty izany mpaminany izany.»
  '21':
  - type: text
    content: 'Ianareo angamba hanao anakampo hoe: «Ahoana no hahafantaranay ny teny tsy nolazain’ny TOMPO!» '
  '22':
  - type: text
    content: 'Raha hoe miteny amin’ny anaran’ny TOMPO ilay mpaminany, kanefa tsy mitranga na tsy tanteraka ny zavatra nolazainy, dia teny tsy nolazain’ny TOMPO izany: fahasahisahiana no nilazan’ny mpaminany izany ka aoka tsy hampihontsina anareo izy.'
  '3':
  - type: text
    content: 'Izao no zo ananan’ny mpisorona amin’ny vahoaka, izany hoe amin’ireo olona manolotra omby na ondry na osy hatao sorona: homena ho an’ny mpisorona ny sorok’ilay biby sy ny valanoranony ary ny vavoniny; '
  '4':
  - type: text
    content: 'homenareo azy koa ny voaloham-bokatrareo na vary na divay na menaka; ary homenareo azy ny volon’ireo ondry aman’osy voalohany hetezanareo. '
  '5':
  - type: text
    content: Fa ny taranak’i Levỳ no voafidin’ny TOMPO Andriamanitra tamin’ny foko israelita rehetra hanao lalandava ny fanompoam-pivavahana amin’ny anaran’ny TOMPO.
  '6':
  - type: text
    content: 'Raha misy '
  - type: text
    content: Levita
  - type: text
    content: ' maniry mafy hiala ny tanàna nonenany, na aiza na aiza manerana an’i Israely, ka mandeha any amin’ilay toerana izay hofidin’ny TOMPO, '
  '7':
  - type: text
    content: 'dia hanao fanompoam-pivavahana amin’ilay TOMPO Andriamaniny izy, tahaka ny ataon’ny Levita rehetra mpiray foko aminy eo anoloan’ny '
  - type: text
    content: Toeramasina
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ary anjara mitovy amin’ny an’ireo ihany no ho fihinany, na dia misy aza izay azony tamin’ny fivarotana ny fananan-drainy
  - type: note
    content: 'na dia misy aza... fananan-drainy: tsy mazava ny RM.'
  - type: text
    content: .
  - type: heading
    content: Fiavahan’ny mpaminany sandoka sy ny mpaminany tena izy
  '9':
  - type: text
    content: 'Rahatrizay ianareo tafiditra eo amin’ny tany izay omen’ny TOMPO Andriamanitrareo, dia aza mianatra maka tahaka ny fomba mahatsiravina fanaon’ireo firenena monina ao ireo. '
