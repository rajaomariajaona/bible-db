document_id: JOB.31,396
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Valinteny farany nataon’i Jôba (farany): Loha mitraka no anatrehako an’Andriamanitra'
  - type: text
    content: Efa nanao fanekena tamin’ny masoko aho,
  - type: text
    content: fa tsy hanam-pijery mitsiriritra tovovavy.
  '10':
  - type: text
    content: dia aoka hampiasain’olon-kafa ny vadiko
  - type: note
    content: hampiasaina na hasaina manodina vato fikoseham-bary.
  - type: text
    content: ','
  - type: text
    content: ary aoka ny olon-drehetra no handry aminy!
  '11':
  - type: text
    content: Fa fanitsakitsaham-bady izany nataoko izany,
  - type: text
    content: eny, heloka melohin’ny mpitsara.
  '12':
  - type: text
    content: Afo mandevona hatrany am-pahaverezana izany,
  - type: text
    content: ka handrava ny vokatro manontolo.
  - type: heading
    content: '*'
  '13':
  - type: text
    content: Raha tàhiny nanan-drariny ny mpanompolahiko
  - type: text
    content: na ny mpanompovaviko izay nifamaly tamiko,
  - type: text
    content: dia tsy nolaviko fa notandroviko tokoa.
  '14':
  - type: text
    content: Raha tsy izany, dia inona no hataoko,
  - type: text
    content: rehefa hitsangana hiampanga ahy Andriamanitra?
  - type: text
    content: Ary inona no havaliko, rehefa mamototra Izy?
  '15':
  - type: text
    content: Moa tsy Andriamanitra iray ihany
  - type: text
    content: no nahary anay tao an-kibon-dreninay,
  - type: text
    content: sady Izy koa no namolavola anay tao am-bohoka
  - type: text
    content: na ny tenako na ireo mpanompoko ireo?
  - type: heading
    content: '*'
  '16':
  - type: text
    content: Moa efa nanosi-bohon-tanana ny mahantra ve aho
  - type: text
    content: ka nahapahina ny mason’ny mpitondratena,
  '17':
  - type: text
    content: na nihinana samirery ny mofoko,
  - type: text
    content: ka tsy namela akory ho an’ny kamboty?
  '18':
  - type: text
    content: Fa hatramin’ny fahatanorako aho
  - type: text
    content: dia tahaka ny ray niahy ny kamboty;
  - type: text
    content: ary hatramin’ny fahazazako aho
  - type: text
    content: ny mpitondratena no nikarakara.
  '19':
  - type: text
    content: Moa efa nahita mahantra mitanjaka ve aho
  - type: text
    content: na fadiranovana tsy nanan-kitafy,
  '2':
  - type: text
    content: Raha tsy izany dia inona no lova ho ahy
  - type: text
    content: avy amin’ilay Andriamanitra Tsitoha
  - type: text
    content: any amin’ny toerana ambony any?
  '20':
  - type: text
    content: ka tsy nisaotra ahy ny tenany
  - type: text
    content: noho izy nomeko akanjo nanafana azy
  - type: text
    content: dia akanjo natao tamin’ny volon’ondriko?
  '21':
  - type: text
    content: Raha naninji-tanana hampahory ny kamboty aho
  - type: text
    content: satria mahita fa iandaniam-pitsarana,
  '22':
  - type: text
    content: dia aoka ny soroko hiendaka amin’ny toerany
  - type: text
    content: ary ny sandriko hitsoaka amin’ny kihoko.
  '23':
  - type: text
    content: Satria matahotra ny famaizan’Andriamanitra aho
  - type: text
    content: ka tsy afa-manoatra manoloana ny fiandrianany.
  - type: heading
    content: '*'
  '24':
  - type: text
    content: Moa nametra-pitokiana tamin’ny volamena ve aho
  - type: text
    content: 'na nanao taminy hoe: «Ianao no aroko»?'
  '25':
  - type: text
    content: Tsy nifaliako noho ny habetsahan’ny fananako
  - type: text
    content: sy ireo harena voaangon’ny tanako.
  '26':
  - type: text
    content: Raha nahita ny masoandro mamirapiratra aho
  - type: text
    content: na ny volana mizotra mangarangarana,
  '27':
  - type: text
    content: moa voababo mangingina hitsaoka azy ve ny foko,
  - type: text
    content: ary moa nanoroka tanana ve aho ho fanajana azy?
  '28':
  - type: text
    content: Ny fanaovako izany zavatra izany
  - type: text
    content: dia heloka melohin’ny mpitsara ihany koa,
  - type: text
    content: satria fandavako an’Andriamanitra Avo Indrindra.
  - type: heading
    content: '*'
  '29':
  - type: text
    content: Moa faly tamin’ny fahavoazan’ny fahavaloko ve aho
  - type: text
    content: na nibitabitaka raha nianjadiam-pahoriana izy?
  '3':
  - type: text
    content: Tsy loza va no anjaran’ny ratsy fanahy,
  - type: text
    content: ary fahoriana ho an’ny mpanao heloka?
  '30':
  - type: text
    content: Tsia, fa tsy navelako hanota akory ny vavako
  - type: text
    content: ka hanompa azy sy hanozona azy ho faty.
  '31':
  - type: text
    content: 'Moa ny fianakaviambeko tsy efa nanao hoe:'
  - type: text
    content: «Iza no tsy novokisany hena?»
  '32':
  - type: text
    content: Tsy nandry tany alatrano ny vahiny,
  - type: text
    content: fa novohako varavarana hatrany
  - type: note
    content: 'Momba ny fandraisam-bahiny: jereo Gen 18.6-8.'
  - type: text
    content: .
  - type: heading
    content: '*'
  '33':
  - type: text
    content: Moa nanafina ny fahadisoako
  - type: text
    content: tahaka ny sarambaben’olona
  - type: note
    content: 'Dkt hafa: tahaka an’i Adama fahizay.'
  - type: text
    content: ve aho
  - type: text
    content: na nikobona ny heloko tato anatiko?
  '34':
  - type: text
    content: Tsia, tsy natahotra ny vavam-bahoaka aho
  - type: text
    content: na nanahy ny fanaratsian’ny fokonolona,
  - type: text
    content: ka hoe hangina ary tsy sahy hivoaka ny trano.
  - type: heading
    content: '*'
  '35':
  - type: text
    content: Satriko mba hisy hihaino ahy,
  - type: text
    content: fa azoko soniavina izay voalazako
  - type: note
    content: Ny sonia antsoina eto dia ny tào, litera farany amin’ny abidỳ hebreo. Dkt hafa izay no teniko farany.
  - type: text
    content: '!'
  - type: text
    content: Hamaly ahy anie Andriamanitra Tsitoha.
  - type: text
    content: Fa ny amin’ny taratasy fiampangana
  - type: text
    content: voasoratry ny mpifanandrina amiko
  '36':
  - type: text
    content: dia hiantsorohako tokoa izany
  - type: text
    content: ary hisatrohako toy ny satroboninahitra aza.
  '37':
  - type: text
    content: Hambarako amin’Andriamanitra
  - type: text
    content: ny zavatra tsirairay nataoko;
  - type: text
    content: ary toy ny zanak’andriana aho
  - type: note
    content: Misy mamindra ny and 35-37 ao aorian’ny and 40a satria ireo no tena mamarana ny lahatenin’i Jôba.
  - type: text
    content: ka tsy matahotra hanatona Azy.
  - type: heading
    content: '*'
  '38':
  - type: text
    content: Raha niantso tody tamiko ny tany voleko
  - type: text
    content: ka niara-nitomany ny vavasako,
  '39':
  - type: text
    content: raha nihinam-bokatra maimaim-poana aho
  - type: text
    content: ka tsy nanaja ny zon’ireo mpiasako,
  '4':
  - type: text
    content: Moa tsy hitan’Andriamanitra ve ny toetrako?
  - type: text
    content: Moa tsy manisa ny diako rehetra ve Izy?
  - type: heading
    content: '*'
  '40':
  - type: text
    content: dia aoka ny tsilo no haniry hisolo ny varimbazaha
  - type: text
    content: ary ny ahi-dratsy no hirobona hisolo ny ôrza!
  - type: heading
    content: '*'
  - type: text
    content: Tapitra ny tenin’i Jôba.
  '5':
  - type: text
    content: Raha tàhiny nandeha tamin’ny lainga aho
  - type: text
    content: na nihazakazaka ho amin’ny fitaka,
  '6':
  - type: text
    content: dia enga anie holanjain’Andriamanitra
  - type: text
    content: amin’ny mizana tsy mandainga
  - type: text
    content: hahafantarany fa tsy manan-tsiny aho.
  '7':
  - type: text
    content: Fa raha niala tamin’ny lalany ny diako
  - type: text
    content: na nanaraka ny filan’ny maso ny foko
  - type: text
    content: na nisy tsiny niraikitra tamin’ny tanako,
  '8':
  - type: text
    content: dia aoka olon-kafa no hihinana izay nafafiko
  - type: text
    content: na aoka hongotana ny zavatra izay namboleko.
  - type: heading
    content: '*'
  '9':
  - type: text
    content: Raha tàhiny sodokam-behivavy iray ny foko
  - type: text
    content: ka namitsaka teo am-baravaran’ny namako aho,
