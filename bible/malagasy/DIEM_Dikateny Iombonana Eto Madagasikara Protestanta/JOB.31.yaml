document_id: JOB.31,396
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Valinteny farany nataon’i Jôba (farany): Loha mitraka no anatrehako an’Andriamanitra'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Efa nanao fanekena tamin’ny masoko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa tsy hanam-pijery mitsiriritra tovovavy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia aoka hampiasain’olon-kafa ny vadiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hampiasaina na hasaina manodina vato fikoseham-bary.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary aoka ny olon-drehetra no handry aminy!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa fanitsakitsaham-bady izany nataoko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eny, heloka melohin’ny mpitsara.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Afo mandevona hatrany am-pahaverezana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka handrava ny vokatro manontolo.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha tàhiny nanan-drariny ny mpanompolahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny mpanompovaviko izay nifamaly tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tsy nolaviko fa notandroviko tokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha tsy izany, dia inona no hataoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rehefa hitsangana hiampanga ahy Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no havaliko, rehefa mamototra Izy?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moa tsy Andriamanitra iray ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no nahary anay tao an-kibon-dreninay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sady Izy koa no namolavola anay tao am-bohoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny tenako na ireo mpanompoko ireo?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Moa efa nanosi-bohon-tanana ny mahantra ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka nahapahina ny mason’ny mpitondratena,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: na nihinana samirery ny mofoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy namela akory ho an’ny kamboty?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa hatramin’ny fahatanorako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia tahaka ny ray niahy ny kamboty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hatramin’ny fahazazako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny mpitondratena no nikarakara.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moa efa nahita mahantra mitanjaka ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na fadiranovana tsy nanan-kitafy,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha tsy izany dia inona no lova ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avy amin’ilay Andriamanitra Tsitoha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: any amin’ny toerana ambony any?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ka tsy nisaotra ahy ny tenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: noho izy nomeko akanjo nanafana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia akanjo natao tamin’ny volon’ondriko?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Raha naninji-tanana hampahory ny kamboty aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria mahita fa iandaniam-pitsarana,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: dia aoka ny soroko hiendaka amin’ny toerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny sandriko hitsoaka amin’ny kihoko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Satria matahotra ny famaizan’Andriamanitra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy afa-manoatra manoloana ny fiandrianany.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Moa nametra-pitokiana tamin’ny volamena ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'na nanao taminy hoe: «Ianao no aroko»?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tsy nifaliako noho ny habetsahan’ny fananako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy ireo harena voaangon’ny tanako.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Raha nahita ny masoandro mamirapiratra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na ny volana mizotra mangarangarana,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: moa voababo mangingina hitsaoka azy ve ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary moa nanoroka tanana ve aho ho fanajana azy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny fanaovako izany zavatra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia heloka melohin’ny mpitsara ihany koa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satria fandavako an’Andriamanitra Avo Indrindra.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Moa faly tamin’ny fahavoazan’ny fahavaloko ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nibitabitaka raha nianjadiam-pahoriana izy?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy loza va no anjaran’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary fahoriana ho an’ny mpanao heloka?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tsia, fa tsy navelako hanota akory ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hanompa azy sy hanozona azy ho faty.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Moa ny fianakaviambeko tsy efa nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Iza no tsy novokisany hena?»
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Tsy nandry tany alatrano ny vahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa novohako varavarana hatrany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.32 '
      - type: usfm
        marker: bd
        children:
        - type: text
          text: 'Momba ny fandraisam-bahiny:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jereo Gen 18.6-8.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Moa nanafina ny fahadisoako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tahaka ny sarambaben’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dkt hafa: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tahaka an’i Adama fahizay
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ve aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nikobona ny heloko tato anatiko?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Tsia, tsy natahotra ny vavam-bahoaka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nanahy ny fanaratsian’ny fokonolona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka hoe hangina ary tsy sahy hivoaka ny trano.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Satriko mba hisy hihaino ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fa azoko soniavina izay voalazako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny sonia antsoina eto dia ny tào, litera farany amin’ny abidỳ hebreo. Dkt hafa izay no teniko farany.
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaly ahy anie Andriamanitra Tsitoha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny amin’ny taratasy fiampangana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voasoratry ny mpifanandrina amiko
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: dia hiantsorohako tokoa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary hisatrohako toy ny satroboninahitra aza.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Hambarako amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ny zavatra tsirairay nataoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary toy ny zanak’andriana aho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Misy mamindra ny and 35-37 ao aorian’ny and 40a satria ireo no tena mamarana ny lahatenin’i Jôba.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy matahotra hanatona Azy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Raha niantso tody tamiko ny tany voleko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka niara-nitomany ny vavasako,
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: raha nihinam-bokatra maimaim-poana aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka tsy nanaja ny zon’ireo mpiasako,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moa tsy hitan’Andriamanitra ve ny toetrako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy manisa ny diako rehetra ve Izy?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: dia aoka ny tsilo no haniry hisolo ny varimbazaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ny ahi-dratsy no hirobona hisolo ny ôrza!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapitra ny tenin’i Jôba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha tàhiny nandeha tamin’ny lainga aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nihazakazaka ho amin’ny fitaka,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: dia enga anie holanjain’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amin’ny mizana tsy mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hahafantarany fa tsy manan-tsiny aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa raha niala tamin’ny lalany ny diako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nanaraka ny filan’ny maso ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na nisy tsiny niraikitra tamin’ny tanako,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia aoka olon-kafa no hihinana izay nafafiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: na aoka hongotana ny zavatra izay namboleko.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '*'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha tàhiny sodokam-behivavy iray ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ka namitsaka teo am-baravaran’ny namako aho,
