document_id: ISA.24
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hitsarana ny tany, sy ny hanjakan’i Jehovah ao Ziona.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: INDRO, Jehovah mahafoana ny tany ka mahalao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampihohoka azy ka manely izay mponina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tompolahy sy ny mpanompolahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tompovavy sy ny mpanompovaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpivarotra sy ny mpividy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpampisambotra sy ny mpisambotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpampanàna vola sy ny mpanàna vola.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hatao foana dia foana ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hobaboina dia hobaboina tokoa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no efa niteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misaona sy malazo ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Milofika sy malazo izao tontolo izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Milofika ny lehibe indrindra amin’ny olona etỳ an-tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny tany dia efa voavetavetan’ny mponina ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nandika ny lalàna sy nanota ny didy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nivadika ny fanekena mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary noho izany dia ozona no mandevona ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mponina ao dia valiana noho ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voadotra ny mponina amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia olona vitsy foana no sisa ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misaona ny ranom-boaloboka, milofika ny taro-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misento avokoa ilay nifaly am-po;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsahatra ny firavoravoana amin’ny ampongatapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapitra ny fitabataban’ny niravoravo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsahatra ny fifaliana amin-dokanga;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy mihira eo am-pisotroan-divay intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangidy amin’izay misotro azy ny toaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rava ny tanàna be fikorontanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mirindrina ny trano rehetra ka tsy azo idiran’olona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Misy fitarainana divay eny an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafalentika toy ny masoandro ny fifaliana rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voaroaka ny faharavoravoan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fahafoanana ihany no sisa ao an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria rava sady montsamontsana ny vavahady,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ao amin’ny tany, ao amin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hisy toy ny amin’ny fikapohana hazo oliva
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitsimpontsimponam-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa tapitra ny andro fiotazana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo dia hanandratra ny feony ka hihoby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Noho ny fahalehibiazan’i Jehovah dia hiantso mafy eny amin’ny ranomasina izy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mankalazà an’i Jehovah any amin’ny tany atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny anaran’i Jehovah, Andriamanitry ny Isiraely, any amin’ny amoron-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hatrany am-paran’ny tany no nandrenesanay hira hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voninahitra ho an’ny marina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy izaho: Indrisy izato halevonako! Indrisy ity halevonako!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpamitaka dia mamitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny mpamitaka dia mamitaka fatratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tahotra sy longoa ary fandrika
- type: usfm
  marker: q1
  children:
  - type: text
    text: No mahazo anao, ry mponina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary izay mandositra noho ny fandrenesana ny tahotra dia ho latsaka any an-davaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay miakatra avy ao anatin’ny lavaka dia ho voan’ny fandrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa misy varavarana mivoha any amin’ny avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihorohoro ny fanorenan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Rava dia rava ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitresaka dia mitresaka ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihorohoro dia mihorohoro ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mivembena dia mivembena tahaka ny mamo ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitsingevaheva toy ny fandriana mihantona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitambesatra aminy ny fahadisoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia potraka izy ka tsy ho tafarina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary amin’izany andro izany dia any an-danitra no hamalian’i Jehovah ny antokon’ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary etỳ an-tany kosa ny mpanjakan’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hangonina ao an-davaka tahaka ny mpifatotra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hohidiana ao an-trano-maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa afaka andro maro, dia hovangiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hovaliana.
    marker-yv: yv-n
  - type: text
    text: ' ihany izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hivoaramena ny volana, ary hivaloarika ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah, Tompon’ny maro, no Mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao an-tendrombohitra Ziona sy any Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo anatrehan’ny loholony dia misy voninahitra.
