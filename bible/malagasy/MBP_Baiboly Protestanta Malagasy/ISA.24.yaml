document_id: ISA.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hitsarana ny tany, sy ny hanjakan’i Jehovah ao Ziona.
  - type: text
    content: INDRO, Jehovah mahafoana ny tany ka mahalao azy
  - type: text
    content: Ary mampihohoka azy ka manely izay mponina ao aminy.
  '10':
  - type: text
    content: Rava ny tanàna be fikorontanana,
  - type: text
    content: Mirindrina ny trano rehetra ka tsy azo idiran’olona;
  '11':
  - type: text
    content: Misy fitarainana divay eny an-tsaha,
  - type: text
    content: Tafalentika toy ny masoandro ny fifaliana rehetra;
  - type: text
    content: Voaroaka ny faharavoravoan’ny tany.
  '12':
  - type: text
    content: Fahafoanana ihany no sisa ao an-tanàna,
  - type: text
    content: Satria rava sady montsamontsana ny vavahady,
  '13':
  - type: text
    content: Fa ao amin’ny tany, ao amin’ny olona,
  - type: text
    content: Dia hisy toy ny amin’ny fikapohana hazo oliva
  - type: text
    content: Sy ny fitsimpontsimponam-boaloboka,
  - type: text
    content: Rehefa tapitra ny andro fiotazana azy.
  '14':
  - type: text
    content: Ireo dia hanandratra ny feony ka hihoby;
  - type: text
    content: 'Noho ny fahalehibiazan’i Jehovah dia hiantso mafy eny amin’ny ranomasina izy '
  - type: text
    content: 'hoe:'
  '15':
  - type: text
    content: Mankalazà an’i Jehovah any amin’ny tany atsinanana,
  - type: text
    content: Dia ny anaran’i Jehovah, Andriamanitry ny Isiraely, any amin’ny amoron-dranomasina.
  '16':
  - type: text
    content: 'Hatrany am-paran’ny tany no nandrenesanay hira hoe:'
  - type: text
    content: Voninahitra ho an’ny marina.
  - type: text
    content: 'Fa hoy izaho: Indrisy izato halevonako! Indrisy ity halevonako!'
  - type: text
    content: Ny mpamitaka dia mamitaka;
  - type: text
    content: Eny, ny mpamitaka dia mamitaka fatratra.
  '17':
  - type: text
    content: Tahotra sy longoa ary fandrika
  - type: text
    content: No mahazo anao, ry mponina amin’ny tany.
  '18':
  - type: text
    content: Ary izay mandositra noho ny fandrenesana ny tahotra dia ho latsaka any an-davaka;
  - type: text
    content: Ary izay miakatra avy ao anatin’ny lavaka dia ho voan’ny fandrika;
  - type: text
    content: Fa misy varavarana mivoha any amin’ny avo,
  - type: text
    content: Ary mihorohoro ny fanorenan’ny tany.
  '19':
  - type: text
    content: Rava dia rava ny tany;
  - type: text
    content: Mitresaka dia mitresaka ny tany;
  - type: text
    content: Mihorohoro dia mihorohoro ny tany;
  '2':
  - type: text
    content: Koa ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka,
  - type: text
    content: Ny tompolahy sy ny mpanompolahiny,
  - type: text
    content: Ny tompovavy sy ny mpanompovaviny,
  - type: text
    content: Ny mpivarotra sy ny mpividy,
  - type: text
    content: Ny mpampisambotra sy ny mpisambotra,
  - type: text
    content: Ny mpampanàna vola sy ny mpanàna vola.
  '20':
  - type: text
    content: Mivembena dia mivembena tahaka ny mamo ny tany
  - type: text
    content: Ka mitsingevaheva toy ny fandriana mihantona;
  - type: text
    content: Ary mitambesatra aminy ny fahadisoany,
  - type: text
    content: Dia potraka izy ka tsy ho tafarina intsony.
  '21':
  - type: text
    content: Ary amin’izany andro izany dia any an-danitra no hamalian’i Jehovah ny antokon’ny lanitra,
  - type: text
    content: Ary etỳ an-tany kosa ny mpanjakan’ny tany.
  '22':
  - type: text
    content: Dia hangonina ao an-davaka tahaka ny mpifatotra ireny
  - type: text
    content: Ka hohidiana ao an-trano-maizina,
  - type: text
    content: Ary rehefa afaka andro maro, dia hovangiana
  - type: note
    content: 'Na: hovaliana.'
  - type: text
    content: ' ihany izy.'
  '23':
  - type: text
    content: Dia hivoaramena ny volana, ary hivaloarika ny masoandro,
  - type: text
    content: Fa Jehovah, Tompon’ny maro, no Mpanjaka
  - type: text
    content: Ao an-tendrombohitra Ziona sy any Jerosalema,
  - type: text
    content: Ary eo anatrehan’ny loholony dia misy voninahitra.
  '3':
  - type: text
    content: Hatao foana dia foana ny tany,
  - type: text
    content: Ary hobaboina dia hobaboina tokoa izy,
  - type: text
    content: Fa Jehovah no efa niteny.
  '4':
  - type: text
    content: Misaona sy malazo ny tany;
  - type: text
    content: Milofika sy malazo izao tontolo izao;
  - type: text
    content: Milofika ny lehibe indrindra amin’ny olona etỳ an-tany.
  '5':
  - type: text
    content: Ary ny tany dia efa voavetavetan’ny mponina ao aminy,
  - type: text
    content: Satria nandika ny lalàna sy nanota ny didy izy
  - type: text
    content: Ary nivadika ny fanekena mandrakizay.
  '6':
  - type: text
    content: Ary noho izany dia ozona no mandevona ny tany,
  - type: text
    content: Ary ny mponina ao dia valiana noho ny helony,
  - type: text
    content: Sady voadotra ny mponina amin’ny tany
  - type: text
    content: Ka dia olona vitsy foana no sisa ao.
  '7':
  - type: text
    content: Misaona ny ranom-boaloboka, milofika ny taro-boaloboka,
  - type: text
    content: Misento avokoa ilay nifaly am-po;
  '8':
  - type: text
    content: Mitsahatra ny firavoravoana amin’ny ampongatapaka,
  - type: text
    content: Tapitra ny fitabataban’ny niravoravo;
  - type: text
    content: Mitsahatra ny fifaliana amin-dokanga;
  '9':
  - type: text
    content: Tsy mihira eo am-pisotroan-divay intsony izy,
  - type: text
    content: Mangidy amin’izay misotro azy ny toaka;
