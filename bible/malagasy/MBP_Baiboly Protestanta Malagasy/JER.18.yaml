document_id: JER.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny tanimanga sy ny mpanefy, ary ny anatra manaraka izany.
  - type: text
    content: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  '10':
  - type: text
    content: Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko,
  - type: text
    content: Dia hanenenako kosa ny soa izay nolazaiko hanasoavako azy.
  '11':
  - type: text
    content: 'Koa amin’izany, lazao amin’ny Joda sy amin’ny mponina eto Jerosalema hoe: Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, Izaho mamorona loza hihatra aminareo
  - type: text
    content: Ary mihevitra izay hamelezako anareo;
  - type: text
    content: Koa samia miala amin’ny làlany ratsy avy hianareo,
  - type: text
    content: Ary ataovy tsara ny làlanareo sy ny ataonareo.
  '12':
  - type: text
    content: 'Nefa hoy ireo: Kivy izahay izany!'
  - type: text
    content: Fa mbola hanaraka ny hevitray ihany izahay;
  - type: text
    content: Eny, samy hanao araka ny ditry ny fo ratsinay avy izahay rehetra.
  '13':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: 'Anontanio any amin’ny jentilisa hoe:'
  - type: text
    content: Iza no nandre zavatra toy izany?
  - type: text
    content: Zavatra mahatsiravina indrindra no nataon’Isiraely virijina.
  '14':
  - type: text
    content: Hitsahatra tsy ho eo amin’ny vatolampy any an-tsaha va ny orampanalan’i Libanona,
  - type: text
    content: Ary mety ho ritra va ny rano maria sady mangatsiaka avy amin’ny tany hafa?
  '15':
  - type: text
    content: Fa efa nanadino Ahy ny oloko,
  - type: text
    content: Ka ho an’ny sampy
  - type: note
    content: Heb. zava-poana.
  - type: text
    content: ' no nandoroany ditin-kazo manitra;'
  - type: text
    content: Ary nanafintohina azy teo amin’ny làlany ireny; dia ny làlana fahagola,
  - type: text
    content: Handehanany amin’ny sakeli-dàlana madinika, dia amin’ny làlana tsy voavoatra,
  '16':
  - type: text
    content: Mba hahatonga ny taniny ho figagana
  - type: text
    content: Sy ho zavatra mampisitrisitra mandrakizay;
  - type: text
    content: Izay rehetra mandalo azy dia ho gaga sy hihifikifi-doha.
  '17':
  - type: text
    content: Toy ny fampielin’ny rivotra avy any atsinanana
  - type: text
    content: No hampielezako azy eo anoloan’ny fahavalony;
  - type: text
    content: Hiamboho azy Aho, fa tsy hanatrika azy,
  - type: text
    content: Amin’ny andro hahitany loza.
  - type: heading
    content: Ny nitadiavan’ny olona hamely an’i Jeremia, sy ny vavaka nataon’i Jeremia tamin’izany.
  '18':
  - type: text
    content: 'DIA hoy ny olona: Andeha isika hihevitra izay hamelezana an’i Jeremia; fa tsy ho tapaka tsy akory ny làlana avy amin’ny mpisorona, na ny saina avy amin’ny hendry, na ny teny avy amin’ny mpaminany. Aoka ny vavantsika'
  - type: note
    content: Heb. lelantsika.
  - type: text
    content: ' ho enti-mamely azy, ary aoka tsy hohenointsika akory izay teniny.'
  '19':
  - type: text
    content: Mihainoa ahy, Jehovah ô;
  - type: text
    content: Ary mihainoa ny tenin’izay miady amiko
  '2':
  - type: text
    content: 'Mitsangàna, ka midìna ho any amin’ny tranon’ny mpanefy tanimanga, ary any no hampandrenesako anao ny teniko. '
  '20':
  - type: text
    content: Ratsy va no havaly ny soa?
  - type: text
    content: Fa efa nihady lavaka hamandrihana ahy ireo.
  - type: text
    content: Tsarovy ny nitsanganako teo anatrehanao nitaraina ho azy
  - type: text
    content: Hampiala ny fahatezeranao aminy.
  '21':
  - type: text
    content: Koa aoka ho mosarena ny zanany, ary atolory ho amin’ny herin’ny sabatra izy,
  - type: text
    content: Ka ho foana anaka ny vadiny sady ho tonga mpitondratena;
  - type: text
    content: Ary aoka ny lehilahy lehibe aminy haripaky ny aretina,
  - type: text
    content: Ary ny zatovony ho fatin-tsabatra amin’ny ady.
  '22':
  - type: text
    content: Aoka hisy fidradradradrana ho re ao an-tranony,
  - type: text
    content: Raha mitondra miaramila iray toko any aminy tampoka Hianao;
  - type: text
    content: Fa efa nihady lavaka hamandrihana ahy izy
  - type: text
    content: Sady nanafim-pandrika haningorana ny tongotro.
  '23':
  - type: text
    content: Fa Hianao, Jehovah ô, no mahalala ny fisainana rehetra ataony hamelezany ahy ho faty;
  - type: text
    content: Aza avela ny helony;
  - type: text
    content: Ary aza vonoina tsy ho eo imasonao ny fahotany,
  - type: text
    content: Fa aoka ho solafaka eo anatrehanao izy;
  - type: text
    content: Mameleza azy amin’ny andro fahatezeranao.
  '3':
  - type: text
    content: 'Dia nidina tany amin’ny tranon’ny mpanefy tanimanga aho, ary, indro, nanao ny asany teo amin’ny ankodina fanaovana izy. '
  '4':
  - type: text
    content: Ary raha simba ny vilany ataony–araka izay mazàna miseho amin’ny tanimanga eny an-tànan’ny mpanefy–dia ataony vilany hafa indray, araka izay tian’izy mpanefy tanimanga hanaovana azy.
  '5':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah hoe:'
  '6':
  - type: text
    content: Moa tsy mahazo manao aminareo toy ny ataon’ity mpanefy tanimanga ity va Aho, ry taranak’i Isiraely? hoy Jehovah.
  - type: text
    content: Indro, toy ny ranimanga eo an-tànan’ny mpanefy azy,
  - type: text
    content: Dia toy izany hianareo eo an-tànako, ry taranak’Isiraely.
  '7':
  - type: text
    content: Vetivety
  - type: note
    content: Heb. indray mipì-maso.
  - type: text
    content: ' Aho dia milaza firenena sy fanjakana'
  - type: text
    content: Hongotako sy hazerako ary horavako;
  '8':
  - type: text
    content: Nefa raha miala amin’ny ratsy izany firenena noteneniko izany,
  - type: text
    content: Dia hanenenako kosa ny loza izay nokasaiko hamelezako azy.
  '9':
  - type: text
    content: Ary vetivety
  - type: note
    content: Heb. indray mipì-maso.
  - type: text
    content: ' kosa Aho dia milaza firenena sy fanjakana'
  - type: text
    content: Haoriko sy hamboleko;
