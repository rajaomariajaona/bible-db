document_id: JER.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanoharana ny amin’ny tanimanga sy ny mpanefy, ary ny anatra manaraka izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanenenako kosa ny soa izay nolazaiko hanasoavako azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa amin’izany, lazao amin’ny Joda sy amin’ny mponina eto Jerosalema hoe: Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho mamorona loza hihatra aminareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihevitra izay hamelezako anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa samia miala amin’ny làlany ratsy avy hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ataovy tsara ny làlanareo sy ny ataonareo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa hoy ireo: Kivy izahay izany!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola hanaraka ny hevitray ihany izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, samy hanao araka ny ditry ny fo ratsinay avy izahay rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Anontanio any amin’ny jentilisa hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nandre zavatra toy izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra mahatsiravina indrindra no nataon’Isiraely virijina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hitsahatra tsy ho eo amin’ny vatolampy any an-tsaha va ny orampanalan’i Libanona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mety ho ritra va ny rano maria sady mangatsiaka avy amin’ny tany hafa?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa efa nanadino Ahy ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho an’ny sampy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zava-poana.
      marker-yv: yv-n
    - type: text
      text: ' no nandoroany ditin-kazo manitra;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanafintohina azy teo amin’ny làlany ireny; dia ny làlana fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handehanany amin’ny sakeli-dàlana madinika, dia amin’ny làlana tsy voavoatra,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mba hahatonga ny taniny ho figagana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho zavatra mampisitrisitra mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mandalo azy dia ho gaga sy hihifikifi-doha.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toy ny fampielin’ny rivotra avy any atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hampielezako azy eo anoloan’ny fahavalony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiamboho azy Aho, fa tsy hanatrika azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hahitany loza.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitadiavan’ny olona hamely an’i Jeremia, sy ny vavaka nataon’i Jeremia tamin’izany.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'DIA hoy ny olona: Andeha isika hihevitra izay hamelezana an’i Jeremia; fa tsy ho tapaka tsy akory ny làlana avy amin’ny mpisorona, na ny saina avy amin’ny hendry, na ny teny avy amin’ny mpaminany. Aoka ny vavantsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lelantsika.
      marker-yv: yv-n
    - type: text
      text: ' ho enti-mamely azy, ary aoka tsy hohenointsika akory izay teniny.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mihainoa ahy, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihainoa ny tenin’izay miady amiko
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitsangàna, ka midìna ho any amin’ny tranon’ny mpanefy tanimanga, ary any no hampandrenesako anao ny teniko. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ratsy va no havaly ny soa?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nihady lavaka hamandrihana ahy ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny nitsanganako teo anatrehanao nitaraina ho azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampiala ny fahatezeranao aminy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa aoka ho mosarena ny zanany, ary atolory ho amin’ny herin’ny sabatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho foana anaka ny vadiny sady ho tonga mpitondratena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny lehilahy lehibe aminy haripaky ny aretina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zatovony ho fatin-tsabatra amin’ny ady.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aoka hisy fidradradradrana ho re ao an-tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitondra miaramila iray toko any aminy tampoka Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nihady lavaka hamandrihana ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nanafim-pandrika haningorana ny tongotro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa Hianao, Jehovah ô, no mahalala ny fisainana rehetra ataony hamelezany ahy ho faty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza avela ny helony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza vonoina tsy ho eo imasonao ny fahotany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aoka ho solafaka eo anatrehanao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mameleza azy amin’ny andro fahatezeranao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nidina tany amin’ny tranon’ny mpanefy tanimanga aho, ary, indro, nanao ny asany teo amin’ny ankodina fanaovana izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary raha simba ny vilany ataony–araka izay mazàna miseho amin’ny tanimanga eny an-tànan’ny mpanefy–dia ataony vilany hafa indray, araka izay tian’izy mpanefy tanimanga hanaovana azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia tonga tamiko ny tenin’i Jehovah hoe:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moa tsy mahazo manao aminareo toy ny ataon’ity mpanefy tanimanga ity va Aho, ry taranak’i Isiraely? hoy Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, toy ny ranimanga eo an-tànan’ny mpanefy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany hianareo eo an-tànako, ry taranak’Isiraely.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vetivety
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: indray mipì-maso.
      marker-yv: yv-n
    - type: text
      text: ' Aho dia milaza firenena sy fanjakana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hongotako sy hazerako ary horavako;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nefa raha miala amin’ny ratsy izany firenena noteneniko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanenenako kosa ny loza izay nokasaiko hamelezako azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary vetivety
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: indray mipì-maso.
      marker-yv: yv-n
    - type: text
      text: ' kosa Aho dia milaza firenena sy fanjakana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haoriko sy hamboleko;
