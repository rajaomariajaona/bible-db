document_id: GEN.37,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nankahalan’ny rahalahin’i Josefa azy, sy ny nivarotany azy ho andevo.
  - type: text
    content: 'ARY Jakoba nonina tany amin’ny tany fivahinian’ny rainy, dia tany amin’ny tany Kanana. '
  '10':
  - type: text
    content: 'Ary nambarany tamin’ny rainy sy ireo rahalahiny koa izany; dia niteny mafy azy ny rainy ka nanao taminy hoe: Manao ahoana izany nofy efa nonofisinao izany? Moa ho avy tokoa va aho sy ny reninao ary ny rahalahinao ka hiankohoka amin’ny tany eo anatrehanao? '
  '11':
  - type: text
    content: Dia nialona azy ny rahalahiny; fa ny rainy kosa nitadidy izany zavatra izany.
  '12':
  - type: text
    content: 'Ary lasa ny rahalahiny niandry ny ondrin’ny rainy tany Sekema. '
  '13':
  - type: text
    content: 'Ary hoy Isiraely tamin’i Josefa: Tsy miandry ondry any Sekema va ny rahalahinao? Avia mba hirahiko hankany aminy hianao. Ary hoy izy taminy: Inty Aho. '
  '14':
  - type: text
    content: 'Ary hoy ny rainy taminy: Masìna hianao, andeha, izahao na tsara ihany ny rahalahinao sy ny ondry aman-osy, na manao ahoana; ka miverena hilaza amiko.'
  - type: text
    content: 'Dia nirahiny hiala avy teo amin’ny lohasahan’i Hebrona izy, dia nankany Sekema. '
  '15':
  - type: text
    content: 'Ary nisy lehilahy nahita azy, fa, indro, nirenireny tany an-tsaha izy; dia nanontany azy ralehilahy ka nanao hoe: Inona moa no tadiavinao? '
  '16':
  - type: text
    content: 'Dia hoy kosa izy: Ny rahalahiko no tadiaviko; koa masìna hianao, mba lazao amiko izay iandrasany ondry. '
  '17':
  - type: text
    content: 'Ary hoy ralehilahy: Efa nifindra niala teto izy: fa efa reko izy niresaka hoe: Andeha isika hankany Dotana. Dia lasa Josefa nanaraka ny rahalahiny ka nahita azy tany Dotana.'
  '18':
  - type: text
    content: 'Ary nahatazana azy eny lavidavitra eny ny rahalahiny; koa raha tsy mbola nanakaiky azy Josefa, dia niray tetika hamono azy izy. '
  '19':
  - type: text
    content: 'Dia niresaka hoe izy: Indro, tamy ilay mpanonofy. '
  '2':
  - type: text
    content: 'Ary izao no tantaran’i Jakoba:'
  - type: text
    content: 'Rehefa fito ambin’ny folo taona Josefa, dia niara-niandry ondry tamin’ny rahalahiny izy (fa mbola zaza izy), dia tamin’ny zanak’i Bila sy ny zanak’i Zilpa, vadin’i Jakoba rainy; ary Josefa nitati-bolana tamin-drainy. '
  '20':
  - type: text
    content: 'Koa ankehitriny, andeha hovonointsika izy ka hatsipintsika ao anatin’ny anankiray amin’ireto lavaka ireto; ary dia aoka holazaintsika hoe: Efa lànin’ny biby masiaka izy; dia ho hitantsika amin’izany na hanao ahoana ny nofiny.'
  '21':
  - type: text
    content: 'Ary Robena nandre izany, dia namonjy azy tamin’ny tànany ka nanao hoe: Aza dia mamono ny ainy isika. '
  '22':
  - type: text
    content: 'Ary hoy koa Robena taminy: Aoka tsy handatsa-dra hianareo; atsipazo ao anatin’io lavaka etỳ an-efitra io izy, fa aza misy maninji-tànana aminy hianareo,–mba hamonjeny azy amin’ny tànan’ny rahalahiny hitondrany azy any amin’ny rainy indray.'
  '23':
  - type: text
    content: 'Ary rehefa tonga teo amin’ny rahalahiny Josefa, dia nendahany ny akanjony, dia ilay akanjo lava teny aminy; '
  '24':
  - type: text
    content: dia nobetainy izy ka natsipiny tao an-davaka; ary maina ny lavaka tamin’izay, fa tsy nisy raino tao.
  '25':
  - type: text
    content: Ary nipetraka nihinan-kanina izy ireo, ary sendra nanopy ny masony ka nahatazana fa, indreo, nisy Isimaelita niara-dia, avy tany Gileada, ary ny ramevany nitondra ditin-kazo, dia nekota
  - type: note
    content: tragakanta (?).
  - type: text
    content: ' sy balsama ary lota,'
  - type: note
    content: làdana (?).
  - type: text
    content: ' izay nentiny hidina any Egypta. '
  '26':
  - type: text
    content: 'Ary hoy Joda tamin’ny rahalahiny: Inona no soa ho azontsika, raha hamono ny rahalahintsika sy hanafina ny rany isika? '
  '27':
  - type: text
    content: Andeha hamidintsika amin’ireo Isimaelita ireo izy, ary aoka tsy haninona azy ny tànantsika; fa rahalahintsika sy nofontsika ihany izy. Dia nanaiky ny rahalahiny.
  '28':
  - type: text
    content: Ary raha nandalo teo ny Midianita mpandranto, dia nakarin’ny rahalahiny niala tao an-davaka Josefa ka namidiny sekely volafotsy roa-polo tamin’ny Isimaelita; ary dia nitondra an’i Josefa ho any Egypta ireo.
  '29':
  - type: text
    content: 'Dia niverina nankeo amin’ny lavaka Robena, ka, indro, tsy tao an-davaka intsony Josefa; dia nandriatra ny fitafiany izy. '
  '3':
  - type: text
    content: Ary tian’Isiraely mihoatra noho ny zanany rehetra Josefa, satria zanaky ny fahanterany izy, ka nanaovany akanjo lava.
  - type: note
    content: 'Na: akanjo misoratsoratra.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Dia niverina nankeo amin’ny rahalahiny izy ka nanao hoe: Tsy ao ny zaza, ary izaho, aiza no halehako?'
  '31':
  - type: text
    content: 'Ary nalain’ireo rahalahiny ilay akanjon’i Josefa, dia namono zanak’osy izy, ka natsobony tamin’ny ra ny akanjo. '
  '32':
  - type: text
    content: 'Dia nampanateriny ho any amin’ny rainy ilay akanjo, sady hoy no filàzany azy: Ity no efa hitanay; koa fantaro na akanjon’ny zanakao ity, na tsia? '
  '33':
  - type: text
    content: 'Dia fantany, ka hoy izy: Akanjon’ny zanako io: efa lànin’ny biby masiaka izy; voaviravira tokoa Josefa.'
  '34':
  - type: text
    content: Ary Jakoba dia nandriatra ny fitafiany ka nisikina lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' tamin’ny valahany; ary nisaona ny zanany andro maro. '
  '35':
  - type: text
    content: 'Dia avy ny zanani-lahy rehetra sy ny zanani-vavy rehetra mba hampionona azy, fa tsy nety nampiononina izy, fa hoy izy: Tsia, fa hidina misaona ho any amin’ny zanako any amin’ny fiainan-tsi-hita'
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' aho. Ary dia mbola nitomany azy ny rainy.'
  '36':
  - type: text
    content: Ary ny Midianita nivarotra an’i Josefa tany Egypta tamin’i Potifara, tandapan’i Farao sady mpifehy ny mpiambina.
  '4':
  - type: text
    content: Ary nony hitan’ny rahalahiny fa Josefa no tian’ny rainy mihoatra noho izy mirahalahy avy, dia nankahala azy izy ka tsy nahazaka hanao teny tsara taminy.
  '5':
  - type: text
    content: 'Ary nanonofy Josefa, ka nambarany tamin’ireo rahalahiny; dia vao mainka nankahalany azy izany. '
  '6':
  - type: text
    content: 'Fa efa nilaza taminy hoe izy: Mba henoy kely ange izao nofy izao: '
  '7':
  - type: text
    content: 'Indro, namehy amboara tany an-tsaha isika, ary, indro, niarina ny amboarako sady nijoro; ary, indreo, nilahatra manodidina kosa ny amboaranareo ka niankohoka teo anatrehan’ny amboarako. '
  '8':
  - type: text
    content: 'Ary hoy ny rahalahiny taminy: Moa hanjaka aminay tokoa va hianao? na hanapaka anay tokoa va hianao? Ary izany nofiny sy teniny izany dia vao mainka nankahalany azy.'
  '9':
  - type: text
    content: 'Ary nanonofy indray izy ka nolazainy tamin’ny rahalahiny; dia hoy izy: Indro, nanonofy indray aho; ary, indreo, ny masoandro sy ny volana ary ny kintana iraika ambin’ny folo niankohoka teo anatrehako. '
