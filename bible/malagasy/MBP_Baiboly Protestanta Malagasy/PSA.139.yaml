document_id: PSA.139,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fankalazana an’Andriamanitra, Izay mahalala ny zavatra rehetra sady manerana izao rehetra izao.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, efa nandinika ahy Hianao ka mahalala ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia mbola entin’ny tànanao ihany aho, na dia any aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hazonin’ny tànanao ankavanana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary na dia hoy izaho aza: Aoka ny maizina hanarona ahy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny mazava manodidina ahy ho tonga alina,–
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Na dia hoy izaho aza: Hanarona ahy tokoa ny maizina, Dia ny alina aza no ho mazava manodidina ahy; Eny, etc.'
      marker-yv: yv-n
    - type: text
      text: ' fa ny maizina aza tsy mahamaizina aminao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny alina dia mahazava toy ny andro ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka sahala ny mazava sy ny maizina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa Hianao no nahary ny voako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namolavola ahy tao an-kibon-dreniko Hianao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hidera Anao aho; fa mahatahotra sy mahatalanjona ny nanaovana ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahagaga ny asanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fantatry ny fanahiko marimarina izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny tenako tsy niafina taminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony natao tao amin’ny miafina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka noforoninao hisy endrika tany ambanin’ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny masonao efa nahita ahy na dia fony tsy mbola ary fady aza aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voasoratra teo amin’ny bokinao avokoa ny andro voatendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola nisy na dia iray akory aza.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Endrey, zava-tsoa amiko indrindra ny hevitrao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory ny hamaron’ny isany!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha hanisa azy aho, dia maro isa lavitra noho ny fasika izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mifoha aho, dia mbola aminao ihany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Haringanao mihitsy ny ratsy fanahy, Andriamanitra ô,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Haringanao mihitsy anie ny ratsy fanahy, Anriamanitra ô.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mialà amiko, hianareo mpandatsa-dra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hianao no mahalala ny fipetrako sy ny fitsangako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahafantatra ny hevitro eny lavitra eny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia izay manonona Anao ho enti-mamitaka, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny fahavalonao izay manonona Anao foana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy hankahala izay mankahala Anao va aho, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho tezitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho maloiloy.
      marker-yv: yv-n
    - type: text
      text: ' amin’izay mitsangana hanohitra Anao?'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Halako dia halako marina tokoa ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa fahavaloko ireny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Diniho aho, Andriamanitra ô, ary fantaro ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izahao toetra aho, ary fantaro ny eritreritro;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary izahao na misy làlana mampahory ato anatiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tariho amin’ny làlana mandrakizay aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voadinikao ny toetro, na mandeha aho, na mandry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fantatrao tsara ny alehako rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa, indro, tsy misy teny tsy fantatrao eo amin’ny lelako, Jehovah ô.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manodidina ahy eo ivohoko sy eo anatrehako Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary apetrakao amiko ny tànanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fahalalana mahagaga ahy loatra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, avo loatra ka tsy tratro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aiza no hialako amin’ny Fanahinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Na dia miakatra any an-danitra aza aho, dia any Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia manao ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ho fandriako aza aho, indro, any Hianao.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Na dia maka ny elatry ny maraina aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitoetra any am-paran’ny ranomasina,
