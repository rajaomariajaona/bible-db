document_id: PSA.139,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fankalazana an’Andriamanitra, Izay mahalala ny zavatra rehetra sady manerana izao rehetra izao.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, efa nandinika ahy Hianao ka mahalala ahy.
  '10':
  - type: text
    content: Dia mbola entin’ny tànanao ihany aho, na dia any aza,
  - type: text
    content: Sy hazonin’ny tànanao ankavanana.
  '11':
  - type: text
    content: 'Ary na dia hoy izaho aza: Aoka ny maizina hanarona ahy,'
  - type: text
    content: Ary aoka ny mazava manodidina ahy ho tonga alina,–
  '12':
  - type: text
    content: Tsia,
  - type: note
    content: 'Na: Na dia hoy izaho aza: Hanarona ahy tokoa ny maizina, Dia ny alina aza no ho mazava manodidina ahy; Eny, etc.'
  - type: text
    content: ' fa ny maizina aza tsy mahamaizina aminao;'
  - type: text
    content: Fa ny alina dia mahazava toy ny andro ihany,
  - type: text
    content: Ka sahala ny mazava sy ny maizina.
  '13':
  - type: text
    content: Fa Hianao no nahary ny voako;
  - type: text
    content: Namolavola ahy tao an-kibon-dreniko Hianao.
  '14':
  - type: text
    content: Hidera Anao aho; fa mahatahotra sy mahatalanjona ny nanaovana ahy;
  - type: text
    content: Mahagaga ny asanao;
  - type: text
    content: Ary fantatry ny fanahiko marimarina izany.
  '15':
  - type: text
    content: Ny tenako tsy niafina taminao,
  - type: text
    content: Fony natao tao amin’ny miafina aho,
  - type: text
    content: Ka noforoninao hisy endrika tany ambanin’ny tany.
  '16':
  - type: text
    content: Ny masonao efa nahita ahy na dia fony tsy mbola ary fady aza aho;
  - type: text
    content: Voasoratra teo amin’ny bokinao avokoa ny andro voatendry,
  - type: text
    content: Fony tsy mbola nisy na dia iray akory aza.
  '17':
  - type: text
    content: Endrey, zava-tsoa amiko indrindra ny hevitrao, Andriamanitra ô!
  - type: text
    content: Akory ny hamaron’ny isany!
  '18':
  - type: text
    content: Raha hanisa azy aho, dia maro isa lavitra noho ny fasika izy;
  - type: text
    content: Raha mifoha aho, dia mbola aminao ihany.
  '19':
  - type: text
    content: Haringanao mihitsy ny ratsy fanahy, Andriamanitra ô,
  - type: note
    content: 'Na: Haringanao mihitsy anie ny ratsy fanahy, Anriamanitra ô.'
  - type: text
    content: Ary mialà amiko, hianareo mpandatsa-dra.
  '2':
  - type: text
    content: Hianao no mahalala ny fipetrako sy ny fitsangako
  - type: text
    content: Sady mahafantatra ny hevitro eny lavitra eny.
  '20':
  - type: text
    content: Dia izay manonona Anao ho enti-mamitaka, Jehovah ô,
  - type: text
    content: Eny, ny fahavalonao izay manonona Anao foana.
  '21':
  - type: text
    content: Tsy hankahala izay mankahala Anao va aho, Jehovah ô,
  - type: text
    content: Sy ho tezitra
  - type: note
    content: Heb. ho maloiloy.
  - type: text
    content: ' amin’izay mitsangana hanohitra Anao?'
  '22':
  - type: text
    content: Halako dia halako marina tokoa ireny;
  - type: text
    content: Efa fahavaloko ireny.
  '23':
  - type: text
    content: Diniho aho, Andriamanitra ô, ary fantaro ny foko;
  - type: text
    content: Izahao toetra aho, ary fantaro ny eritreritro;
  '24':
  - type: text
    content: Ary izahao na misy làlana mampahory ato anatiko,
  - type: text
    content: Dia tariho amin’ny làlana mandrakizay aho.
  '3':
  - type: text
    content: Voadinikao ny toetro, na mandeha aho, na mandry;
  - type: text
    content: Ary fantatrao tsara ny alehako rehetra.
  '4':
  - type: text
    content: Fa, indro, tsy misy teny tsy fantatrao eo amin’ny lelako, Jehovah ô.
  '5':
  - type: text
    content: Manodidina ahy eo ivohoko sy eo anatrehako Hianao,
  - type: text
    content: Ary apetrakao amiko ny tànanao.
  '6':
  - type: text
    content: Fahalalana mahagaga ahy loatra izany,
  - type: text
    content: Eny, avo loatra ka tsy tratro.
  '7':
  - type: text
    content: Aiza no hialako amin’ny Fanahinao?
  - type: text
    content: Aiza no handosirako tsy ho eo anatrehanao?
  '8':
  - type: text
    content: Na dia miakatra any an-danitra aza aho, dia any Hianao;
  - type: text
    content: Ary na dia manao ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ho fandriako aza aho, indro, any Hianao.'
  '9':
  - type: text
    content: Na dia maka ny elatry ny maraina aza aho,
  - type: text
    content: Mba hitoetra any am-paran’ny ranomasina,
