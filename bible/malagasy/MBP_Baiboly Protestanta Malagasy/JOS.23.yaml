document_id: JOS.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana nataon’i Josoa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa ela, taorian’ny nanomezan’i Jehovah fitsaharana ho an’ny Isiraely ho afaka amin’ny fahavalony rehetra manodidina, ary Josoa dia efa zoki-olona sady nandroso fahanterana, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nantsoin’i Josoa ny Isiraely rehetra, dia ny loholony sy ny lehibeny sy ny mpitsara azy ary ny mpifehy azy, ka hoy izy taminy: Efa zoki-olona aho izao ka mandroso fahanterana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary hianareo efa nahita izay rehetra nataon’i Jehovah Andriamanitrareo tamin’ireo firenena rehetra ireo teo anoloanareo; fa Jehovah Andriamanitrareo no niady ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indreo, efa voazarako ho lovan’ny firenenareo tamin’ny filokana ireo firenena sisa ireo, hatrany Jordana, mbamin’ny firenena rehetra izay nofongorako, ka hatramin’ny Ranomasina Lehibe andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah Andriamanitrareo, Izy no handroaka ireny eo anoloanareo, dia hampiala azy eo anoloanareo; ary handova ny taniny hianareo araka izay nolazain’i Jehovah Andriamanitrareo taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia mahereza tsara hianareo hitandrina sy hanao izay rehetra voasoratra ao amin’ny bokin’ny làlan’i Mosesy, mba tsy hivilianareo hiala aminy, na ho amin’ny ankavanana, na ho amin’ny ankavia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mba tsy hankanesanareo any amin’ireo firenena sisa eo aminareo ireo; ny anaran’ny andriamaniny dia aoka tsy hotononinareo na hampianiananareo akory, ary aza manompo azy na miankohoka eo anatrehany; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa Jehovah Andriamanitrareo ihany no ifikiro, araka ny nataonareo mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa nandroaka firenena lehibe sy mahery teo anoloanareo Jehovah; ary dia tsy nisy olona nahajanona teo anoloanareo mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny lehilahy iray aminareo manenjika ny arivo; fa Jehovah Andriamanitrareo, Izy no miady ho anareo, araka izay nolazainy taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tandremo tsara ny fanahinareo mba ho tia an’i Jehovah Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha mihemotra hianareo ka miray amin’ireo firenena sisa eo aminareo ireo ary mifanambady aminy ka miditra ao aminy, ary izy kosa ao aminareo, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia ho fantatrareo tokoa fa tsy handroaka ireo firenena ireo eo anoloanareo intsony Jehovah Andriamanitrareo; fa ho fandrika sy tonta aminareo ireo, ary ho fanindronana amin’ny tehezanareo, sy ho tsilo eo amin’ny masonareo, mandra-pahalany ritranareo tsy ho eo amin’ity tany soa nomen’i Jehovah Andriamanitrareo anareo ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary, indro, efa handeha ho amin’ny làlana falehan’ny tany rehetra aho izao; ary fantatrareo ao amin’ny fonareo rehetra sy ny fanahinareo rehetra fa tsy misy latsaka na dia zavatra iray akory aza ny zava-tsoa rehetra izay nilazan’i Jehovah Andriamanitrareo anareo; efa tanteraka taminareo avokoa izy rehetra: tsy nisy latsaka izy na dia zavatra iray akory aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tahaka ny efa nanatanterahana taminareo ny zava-tsoa rehetra, izay nolazain’i Jehovah Andriamanitrareo taminareo, no hanatanterahan’i Jehovah aminareo kosa ny loza rehetra mandra-paharingany anareo tsy ho eo amin’ity tany soa nomen’i Jehovah Andriamanitrareo anareo ity. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Amin’izay hivadihanareo ny faneken’i Jehovah Andriamanitrareo, izay nandidiany anareo, sy handehananareo hanompo ireo andriamani-kafa ary hiankohofanareo eo anatrehany, dia hirehitra aminareo ny fahatezeran’i Jehovah, ary ho lany ringana faingana hianareo tsy ho eo amin’ny tany soa nomeny anareo.
