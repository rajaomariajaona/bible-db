document_id: JOS.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana nataon’i Josoa.
  - type: text
    content: 'ARY rehefa ela, taorian’ny nanomezan’i Jehovah fitsaharana ho an’ny Isiraely ho afaka amin’ny fahavalony rehetra manodidina, ary Josoa dia efa zoki-olona sady nandroso fahanterana, '
  '10':
  - type: text
    content: Ny lehilahy iray aminareo manenjika ny arivo; fa Jehovah Andriamanitrareo, Izy no miady ho anareo, araka izay nolazainy taminareo.
  '11':
  - type: text
    content: 'Dia tandremo tsara ny fanahinareo mba ho tia an’i Jehovah Andriamanitrareo. '
  '12':
  - type: text
    content: 'Fa raha mihemotra hianareo ka miray amin’ireo firenena sisa eo aminareo ireo ary mifanambady aminy ka miditra ao aminy, ary izy kosa ao aminareo, '
  '13':
  - type: text
    content: dia ho fantatrareo tokoa fa tsy handroaka ireo firenena ireo eo anoloanareo intsony Jehovah Andriamanitrareo; fa ho fandrika sy tonta aminareo ireo, ary ho fanindronana amin’ny tehezanareo, sy ho tsilo eo amin’ny masonareo, mandra-pahalany ritranareo tsy ho eo amin’ity tany soa nomen’i Jehovah Andriamanitrareo anareo ity.
  '14':
  - type: text
    content: 'Ary, indro, efa handeha ho amin’ny làlana falehan’ny tany rehetra aho izao; ary fantatrareo ao amin’ny fonareo rehetra sy ny fanahinareo rehetra fa tsy misy latsaka na dia zavatra iray akory aza ny zava-tsoa rehetra izay nilazan’i Jehovah Andriamanitrareo anareo; efa tanteraka taminareo avokoa izy rehetra: tsy nisy latsaka izy na dia zavatra iray akory aza.'
  '15':
  - type: text
    content: 'Ary tahaka ny efa nanatanterahana taminareo ny zava-tsoa rehetra, izay nolazain’i Jehovah Andriamanitrareo taminareo, no hanatanterahan’i Jehovah aminareo kosa ny loza rehetra mandra-paharingany anareo tsy ho eo amin’ity tany soa nomen’i Jehovah Andriamanitrareo anareo ity. '
  '16':
  - type: text
    content: Amin’izay hivadihanareo ny faneken’i Jehovah Andriamanitrareo, izay nandidiany anareo, sy handehananareo hanompo ireo andriamani-kafa ary hiankohofanareo eo anatrehany, dia hirehitra aminareo ny fahatezeran’i Jehovah, ary ho lany ringana faingana hianareo tsy ho eo amin’ny tany soa nomeny anareo.
  '2':
  - type: text
    content: 'dia nantsoin’i Josoa ny Isiraely rehetra, dia ny loholony sy ny lehibeny sy ny mpitsara azy ary ny mpifehy azy, ka hoy izy taminy: Efa zoki-olona aho izao ka mandroso fahanterana, '
  '3':
  - type: text
    content: 'ary hianareo efa nahita izay rehetra nataon’i Jehovah Andriamanitrareo tamin’ireo firenena rehetra ireo teo anoloanareo; fa Jehovah Andriamanitrareo no niady ho anareo. '
  '4':
  - type: text
    content: Indreo, efa voazarako ho lovan’ny firenenareo tamin’ny filokana ireo firenena sisa ireo, hatrany Jordana, mbamin’ny firenena rehetra izay nofongorako, ka hatramin’ny Ranomasina Lehibe andrefana.
  '5':
  - type: text
    content: 'Ary Jehovah Andriamanitrareo, Izy no handroaka ireny eo anoloanareo, dia hampiala azy eo anoloanareo; ary handova ny taniny hianareo araka izay nolazain’i Jehovah Andriamanitrareo taminareo. '
  '6':
  - type: text
    content: 'Dia mahereza tsara hianareo hitandrina sy hanao izay rehetra voasoratra ao amin’ny bokin’ny làlan’i Mosesy, mba tsy hivilianareo hiala aminy, na ho amin’ny ankavanana, na ho amin’ny ankavia, '
  '7':
  - type: text
    content: 'mba tsy hankanesanareo any amin’ireo firenena sisa eo aminareo ireo; ny anaran’ny andriamaniny dia aoka tsy hotononinareo na hampianiananareo akory, ary aza manompo azy na miankohoka eo anatrehany; '
  '8':
  - type: text
    content: 'fa Jehovah Andriamanitrareo ihany no ifikiro, araka ny nataonareo mandraka andro-any. '
  '9':
  - type: text
    content: 'Fa nandroaka firenena lehibe sy mahery teo anoloanareo Jehovah; ary dia tsy nisy olona nahajanona teo anoloanareo mandraka andro-any. '
