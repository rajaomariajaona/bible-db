document_id: PSA.44,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny Isiraely nony saiky resim-pahavalo, nefa tsy nahafoy an’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Maskila.
  - type: text
    content: NY sofinay no nandrenesanay, Andriamanitra ô,
  - type: text
    content: Ny razanay nilaza taminay
  - type: text
    content: Ny asa nataonao tamin’ny androny, dia tamin’ny andro fahiny.
  '10':
  - type: text
    content: Ataonao miamboho ny fahavalonay izahay,
  - type: text
    content: Koa ny mankahala anay dia nanaram-po namabo.
  '11':
  - type: text
    content: Atolotrao tahaka ny ondry hohanina izahay,
  - type: text
    content: Ary aelinao any amin’ny firenen-tsamy hafa.
  '12':
  - type: text
    content: Mivarotra ny olonao tsy vola tsy harena Hianao,
  - type: text
    content: Ka tsy mahazo tombony amin’ny vidiny.
  '13':
  - type: text
    content: Ataonao fandàtsan’ny olona miray monina aminay izahay,
  - type: text
    content: Dia fanakora sy faneson’izay manodidina anay.
  '14':
  - type: text
    content: Ataonao ho ambentinteny amin’ny firenen-tsamy hafa izahay,
  - type: text
    content: Dia fihifikifihan-doha amin’ny olona maro.
  '15':
  - type: text
    content: Tsaroako mandrakariva ny fahafaham-boninahitro,
  - type: text
    content: Ary efa manafotra ahy ny fangaihaizako,
  '16':
  - type: text
    content: Noho ny feon’ny mpanaratsy sy ny mpanamavo,
  - type: text
    content: Noho ny fahavalo sy ny mpamaly ratsy.
  '17':
  - type: text
    content: Izany rehetra izany no manjo anay, nefa tsy manadino Anao izahay
  - type: text
    content: Ary tsy mivadika ny fanekenao.
  '18':
  - type: text
    content: Tsy mihemotra ny fonay,
  - type: text
    content: Ary tsy miala amin’ny làlanao ny dianay,
  '19':
  - type: text
    content: Nefa Hianao nanorotoro anay teo amin’ny fitoeran’ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: Sy nanarona anay tamin’ny aloky ny fahafatesana.
  '2':
  - type: text
    content: Ny tànanao no nandroahanao ny firenen-tsamy hafa, fa izy kosa nampitoerinao;
  - type: text
    content: Efa nampahorinao ny firenena maro, fa izy kosa nataonao mahafeno tany.
  '20':
  - type: text
    content: Raha nanadino ny anaran’Andriamanitray izahay,
  - type: text
    content: Na nananty tànana tamin’ny andriamani-kafa,
  '21':
  - type: text
    content: Tsy handinika izany va Andriamanitra?
  - type: text
    content: Fa Izy mahalala ny miafina ao am-po.
  '22':
  - type: text
    content: Fa noho ny aminao no amonoana anay mandrakariva;
  - type: text
    content: Toy ny ondry hovonoina no fijery anay.
  '23':
  - type: text
    content: Mifohaza, ry Tompo ô, nahoana no matory Hianao?
  - type: text
    content: Mitsangàna, aza manary mandrakizay.
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Hianao
  - type: text
    content: Ka manadino ny fahantranay sy ny fahorianay?
  '25':
  - type: text
    content: Fa miankohoka amin’ny vovoka ny fanahinay,
  - type: text
    content: Miraikitra amin’ny tany ny kibonay.
  '26':
  - type: text
    content: Mitsangàna hamonjy anay,
  - type: text
    content: Ary avoty izahay araka ny famindramponao.
  '3':
  - type: text
    content: Fa tsy ny sabany no nahazoany ny tany,
  - type: text
    content: Ary tsy ny sandriny no namonjy azy;
  - type: text
    content: Fa ny tànanao ankavanana sy ny sandrinao ary ny fahazavan’ny tavanao, satria efa sitrakao izy.
  '4':
  - type: text
    content: Hianao dia Hianao no Mpanjakako, Andriamanitra ô;
  - type: text
    content: Mandidia famonjena ho an’i Jakoba.
  '5':
  - type: text
    content: Hianao no hanosehanay ny fahavalonay;
  - type: text
    content: Ny anaranao no hanitsahanay izay mitsangana hamely anay.
  '6':
  - type: text
    content: Fa tsy ny tsipìkako no itokiako,
  - type: text
    content: Ary ny sabatro tsy hahavonjy ahy.
  '7':
  - type: text
    content: Fa namonjy anay tamin’ny fahavalonay Hianao,
  - type: text
    content: Ary ny nankahala anay dia nataonao menatra.
  '8':
  - type: text
    content: Andriamanitra no ankalazainay mandrakariva;
  - type: text
    content: Ary ny anaranao no hoderainay mandrakizay.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Fa efa nanary anay Hianao ka nampahamenatra anay,
  - type: text
    content: Ary tsy mba mivoaka miaraka amin’ny antokon’ny miaramilanay Hianao.
