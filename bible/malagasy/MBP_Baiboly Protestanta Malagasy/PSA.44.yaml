document_id: PSA.44,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fivavaky ny Isiraely nony saiky resim-pahavalo, nefa tsy nahafoy an’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Maskila.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY sofinay no nandrenesanay, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny razanay nilaza taminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny asa nataonao tamin’ny androny, dia tamin’ny andro fahiny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataonao miamboho ny fahavalonay izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny mankahala anay dia nanaram-po namabo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atolotrao tahaka ny ondry hohanina izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aelinao any amin’ny firenen-tsamy hafa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivarotra ny olonao tsy vola tsy harena Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mahazo tombony amin’ny vidiny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataonao fandàtsan’ny olona miray monina aminay izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fanakora sy faneson’izay manodidina anay.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataonao ho ambentinteny amin’ny firenen-tsamy hafa izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fihifikifihan-doha amin’ny olona maro.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsaroako mandrakariva ny fahafaham-boninahitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa manafotra ahy ny fangaihaizako,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny feon’ny mpanaratsy sy ny mpanamavo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahavalo sy ny mpamaly ratsy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany rehetra izany no manjo anay, nefa tsy manadino Anao izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mivadika ny fanekenao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mihemotra ny fonay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy miala amin’ny làlanao ny dianay,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Hianao nanorotoro anay teo amin’ny fitoeran’ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nanarona anay tamin’ny aloky ny fahafatesana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànanao no nandroahanao ny firenen-tsamy hafa, fa izy kosa nampitoerinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampahorinao ny firenena maro, fa izy kosa nataonao mahafeno tany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nanadino ny anaran’Andriamanitray izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nananty tànana tamin’ny andriamani-kafa,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy handinika izany va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy mahalala ny miafina ao am-po.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa noho ny aminao no amonoana anay mandrakariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny ondry hovonoina no fijery anay.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, ry Tompo ô, nahoana no matory Hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, aza manary mandrakizay.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no manafina ny tavanao Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manadino ny fahantranay sy ny fahorianay?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miankohoka amin’ny vovoka ny fanahinay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miraikitra amin’ny tany ny kibonay.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna hamonjy anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avoty izahay araka ny famindramponao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ny sabany no nahazoany ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ny sandriny no namonjy azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tànanao ankavanana sy ny sandrinao ary ny fahazavan’ny tavanao, satria efa sitrakao izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao dia Hianao no Mpanjakako, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandidia famonjena ho an’i Jakoba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no hanosehanay ny fahavalonay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anaranao no hanitsahanay izay mitsangana hamely anay.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ny tsipìkako no itokiako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sabatro tsy hahavonjy ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa namonjy anay tamin’ny fahavalonay Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nankahala anay dia nataonao menatra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no ankalazainay mandrakariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anaranao no hoderainay mandrakizay.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanary anay Hianao ka nampahamenatra anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba mivoaka miaraka amin’ny antokon’ny miaramilanay Hianao.
