document_id: ISA.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahitan’Isaia, zanak’i Amoza, izay hitany ny amin’ny Joda sy Jerosalema tamin’ny andron’i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan’ny Joda.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny alahelon’i Jehovah noho ny niodinan’ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa ny tenin’i Jehovah, ry mpitsaran’i Sodoma;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny lalàn’Andriamanitsika, ry vahoakan’i Gomora.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran’ny zanak’omby mifahy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy sitrako ny ran’ny vantotr’ombilahy sy ny an’ny zanak’ondry ary ny an’ny osilahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha avy miseho eo anatrehako hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nitady anareo hanitsakitsaka ny kianjako?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mitondra fanati-poana intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fofona fahavetavetana amiko izany!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny emboka dia fahavetavetana amiko.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy zakako ny fivoriana masina haroharoam-paharatsiana!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan’ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mavesatra amiko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka sasatra mitondra azy Aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mananty tànana hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitampi-maso tsy hijery anareo Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na dia manao vavaka be aza hianareo, dia tsy hihaino Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ran’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ra nalatsaka.
      marker-yv: yv-n
    - type: text
      text: ' ny tànanareo.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misasà hianareo, diovy ny tenanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory tsy ho eo anoloan’ny masoko ny ratsy fanaonareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsahara, fa aza manao ratsy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mianara hanao ny tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Diniho izay rariny, anaro ny mpampahory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo rariny ny kamboty, tsarao ny adin’ny mpitondratena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avia ary hifandahatra isika, hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tahaka ny jaky aza ny fahotanareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho fotsy tahaka ny orampanala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mangatrakatraka tahaka ny sily aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny volon’ondry fotsy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manaiky sy mankatò hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hihinana ny voka-tsoa amin’ny tany;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MANDRENESA, ry lanitra, ary mihainoa, ry tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa Jehovah no miteny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nitaiza sy nahalehibe zaza Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo niodina tamiko ireo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha mbola mandà sy miodina ihany hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ho lanin’ny sabatra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vavan’i Jehovah no efa niteny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! tonga janga ity tanàna mahatoky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay feno ny rariny taloha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nitoeran’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny kosa mpamono olona no ao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny volafotsinao efa tonga tain-drendrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny divainao efa voatsatso rano;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lehibenao dia mpiodina sady naman’ny mpangalatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy tia kolikoly sy fatra-nitady tambitamby avokoa izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kamboty tsy mba omeny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny adin’ny mpitondratena tsy avelany ho entina eo anatrehany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hoy Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ilay Maherin’ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! hiala fo amin’ny mandrafy Ahy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamaly ny fahavaloko.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hamerina ny tànako ho aminao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hodioviko amin’ny lavenona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sirahazo.
      marker-yv: yv-n
    - type: text
      text: ' hianao hahafahan’ny tain-drendrikao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hesoriko ny firaka rehetra aminao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampodiko ho toy ny teo aloha ny mpitsaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanolo-tsainao ho toy ny tamin’ny voalohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary rehefa afaka izany, hianao dia hantsoina hoe: Tanànan’ny fahamarinana, Tanàna mahatoky.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ziona havotana amin’ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay efa mibebaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miverina.
      marker-yv: yv-n
    - type: text
      text: ' ao dia havotana amin’ny fahamarinana;'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samy haringana avokoa ny mpiodina sy ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho lany ritra izay mahafoy an’i Jehovah.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahazo henatra hianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izy.
      marker-yv: yv-n
    - type: text
      text: ' noho ny amin’ny hazo terebinta izay nifalianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hangaihay hianareo noho ny amin’ny saha izay natokanareo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny omby mahalala ny tompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny boriky ny fihinanam-bilon’ny tompony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Isiraely tsy mahalala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny oloko tsy misaina.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho tahaka ny hazo terebinta malazo ravina hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho tahaka ny saha tsy misy rano.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mahery ho tahaka ny vohavoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny asany ho tahaka ny kilalaon’afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiaraka hodorana izy roa tonta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy hamono ny afo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! firenena mpanota, olona mavesa-keloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taranaka mpanao ratsy, zanaka mpanao meloka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahafoy an’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanamavo ny Iray Masin’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nihodina izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mbola ta-hasiana ihany hianareo noho izao fiodinanareo lalandava izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henika aretina avokoa ny loha rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary marary ny fo rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny faladia ka hatramin’ny loha dia tsy misy izay tsy marary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ratra sy dian-kapoka ary fery vao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mbola voaporitra, na voafehy, na voalemin’ny diloilo izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taninareo dia efa lao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanànanareo dia voadotra tamin’ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tany volenareo dia lanin’ny fahavalo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hafa firenena.
      marker-yv: yv-n
    - type: text
      text: ' eo imasonareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary lao izy toy ny efa noravan’ny fahavalo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hafa firenena.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanimboaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny fandriana mihantona an’ny mpiandry voly ao anaty tanimbolim-boantango,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voantangombazaha.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny tanàna atao fahirano.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy nosisan’i Jehovah, Tompon’ny maro, olona vitsivitsy isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa tonga tahaka an’i Sodoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitovy tamin’i Gomora.
