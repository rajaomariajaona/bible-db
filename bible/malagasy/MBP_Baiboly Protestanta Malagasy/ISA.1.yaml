document_id: ISA.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny fahitan’Isaia, zanak’i Amoza, izay hitany ny amin’ny Joda sy Jerosalema tamin’ny andron’i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan’ny Joda.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny alahelon’i Jehovah noho ny niodinan’ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: MANDRENESA, ry lanitra, ary mihainoa, ry tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa Jehovah no miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nitaiza sy nahalehibe zaza Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo niodina tamiko ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny omby mahalala ny tompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny boriky ny fihinanam-bilon’ny tompony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny Isiraely tsy mahalala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny oloko tsy misaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indrisy! firenena mpanota, olona mavesa-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taranaka mpanao ratsy, zanaka mpanao meloka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nahafoy an’i Jehovah izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanamavo ny Iray Masin’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nihodina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana no mbola ta-hasiana ihany hianareo noho izao fiodinanareo lalandava izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henika aretina avokoa ny loha rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary marary ny fo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hatramin’ny faladia ka hatramin’ny loha dia tsy misy izay tsy marary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ratra sy dian-kapoka ary fery vao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mbola voaporitra, na voafehy, na voalemin’ny diloilo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny taninareo dia efa lao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tanànanareo dia voadotra tamin’ny afo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tany volenareo dia lanin’ny fahavalo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hafa firenena.
    marker-yv: yv-n
  - type: text
    text: ' eo imasonareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lao izy toy ny efa noravan’ny fahavalo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hafa firenena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanimboaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny fandriana mihantona an’ny mpiandry voly ao anaty tanimbolim-boantango,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voantangombazaha.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny tanàna atao fahirano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha tsy nosisan’i Jehovah, Tompon’ny maro, olona vitsivitsy isika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia efa tonga tahaka an’i Sodoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitovy tamin’i Gomora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandrenesa ny tenin’i Jehovah, ry mpitsaran’i Sodoma;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ny lalàn’Andriamanitsika, ry vahoakan’i Gomora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran’ny zanak’omby mifahy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy sitrako ny ran’ny vantotr’ombilahy sy ny an’ny zanak’ondry ary ny an’ny osilahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha avy miseho eo anatrehako hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no nitady anareo hanitsakitsaka ny kianjako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza mitondra fanati-poana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fofona fahavetavetana amiko izany!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny emboka dia fahavetavetana amiko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy zakako ny fivoriana masina haroharoam-paharatsiana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan’ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mavesatra amiko izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka sasatra mitondra azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha mananty tànana hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitampi-maso tsy hijery anareo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia manao vavaka be aza hianareo, dia tsy hihaino Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno ran’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ra nalatsaka.
    marker-yv: yv-n
  - type: text
    text: ' ny tànanareo.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Misasà hianareo, diovy ny tenanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory tsy ho eo anoloan’ny masoko ny ratsy fanaonareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsahara, fa aza manao ratsy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mianara hanao ny tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Diniho izay rariny, anaro ny mpampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omeo rariny ny kamboty, tsarao ny adin’ny mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avia ary hifandahatra isika, hoy Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia tahaka ny jaky aza ny fahotanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fotsy tahaka ny orampanala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia mangatrakatraka tahaka ny sily aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka ny volon’ondry fotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha manaiky sy mankatò hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hihinana ny voka-tsoa amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa raha mbola mandà sy miodina ihany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia ho lanin’ny sabatra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’i Jehovah no efa niteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Indrisy! tonga janga ity tanàna mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay feno ny rariny taloha
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nitoeran’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ankehitriny kosa mpamono olona no ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny volafotsinao efa tonga tain-drendrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny divainao efa voatsatso rano;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny lehibenao dia mpiodina sady naman’ny mpangalatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy tia kolikoly sy fatra-nitady tambitamby avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny kamboty tsy mba omeny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny adin’ny mpitondratena tsy avelany ho entina eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ka dia hoy Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ilay Maherin’ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: E! hiala fo amin’ny mandrafy Ahy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamaly ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia hamerina ny tànako ho aminao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hodioviko amin’ny lavenona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sirahazo.
    marker-yv: yv-n
  - type: text
    text: ' hianao hahafahan’ny tain-drendrikao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hesoriko ny firaka rehetra aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia hampodiko ho toy ny teo aloha ny mpitsaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanolo-tsainao ho toy ny tamin’ny voalohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary rehefa afaka izany, hianao dia hantsoina hoe: Tanànan’ny fahamarinana, Tanàna mahatoky.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ziona havotana amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay efa mibebaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miverina.
    marker-yv: yv-n
  - type: text
    text: ' ao dia havotana amin’ny fahamarinana;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary samy haringana avokoa ny mpiodina sy ny mpanota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho lany ritra izay mahafoy an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa hahazo henatra hianareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izy.
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin’ny hazo terebinta izay nifalianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hangaihay hianareo noho ny amin’ny saha izay natokanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ho tahaka ny hazo terebinta malazo ravina hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho tahaka ny saha tsy misy rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny mahery ho tahaka ny vohavoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asany ho tahaka ny kilalaon’afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiaraka hodorana izy roa tonta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisy hamono ny afo.
