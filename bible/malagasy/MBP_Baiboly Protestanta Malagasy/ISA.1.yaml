document_id: ISA.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fahitan’Isaia, zanak’i Amoza, izay hitany ny amin’ny Joda sy Jerosalema tamin’ny andron’i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan’ny Joda.
  - type: heading
    content: Ny alahelon’i Jehovah noho ny niodinan’ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy.
  '10':
  - type: text
    content: Mandrenesa ny tenin’i Jehovah, ry mpitsaran’i Sodoma;
  - type: text
    content: Mihainoa ny lalàn’Andriamanitsika, ry vahoakan’i Gomora.
  '11':
  - type: text
    content: Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah;
  - type: text
    content: Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran’ny zanak’omby mifahy Aho,
  - type: text
    content: Ary tsy sitrako ny ran’ny vantotr’ombilahy sy ny an’ny zanak’ondry ary ny an’ny osilahy.
  '12':
  - type: text
    content: Raha avy miseho eo anatrehako hianareo,
  - type: text
    content: Iza moa no nitady anareo hanitsakitsaka ny kianjako?
  '13':
  - type: text
    content: Aza mitondra fanati-poana intsony;
  - type: text
    content: Fofona fahavetavetana amiko izany!
  - type: note
    content: 'Na: Ny emboka dia fahavetavetana amiko.'
  - type: text
    content: Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana–
  - type: text
    content: Tsy zakako ny fivoriana masina haroharoam-paharatsiana!
  '14':
  - type: text
    content: Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan’ny fanahiko,
  - type: text
    content: Mavesatra amiko izany,
  - type: text
    content: Ka sasatra mitondra azy Aho.
  '15':
  - type: text
    content: Raha mananty tànana hianareo,
  - type: text
    content: Dia hitampi-maso tsy hijery anareo Aho;
  - type: text
    content: Eny, na dia manao vavaka be aza hianareo, dia tsy hihaino Aho;
  - type: text
    content: Feno ran’olona
  - type: note
    content: Heb. ra nalatsaka.
  - type: text
    content: ' ny tànanareo.'
  '16':
  - type: text
    content: Misasà hianareo, diovy ny tenanareo,
  - type: text
    content: Esory tsy ho eo anoloan’ny masoko ny ratsy fanaonareo;
  - type: text
    content: Mitsahara, fa aza manao ratsy;
  '17':
  - type: text
    content: Mianara hanao ny tsara,
  - type: text
    content: Diniho izay rariny, anaro ny mpampahory,
  - type: text
    content: Omeo rariny ny kamboty, tsarao ny adin’ny mpitondratena.
  '18':
  - type: text
    content: 'Avia ary hifandahatra isika, hoy Jehovah:'
  - type: text
    content: Na dia tahaka ny jaky aza ny fahotanareo,
  - type: text
    content: Dia ho fotsy tahaka ny orampanala,
  - type: text
    content: Na dia mangatrakatraka tahaka ny sily aza,
  - type: text
    content: Dia ho tahaka ny volon’ondry fotsy.
  '19':
  - type: text
    content: Raha manaiky sy mankatò hianareo,
  - type: text
    content: Dia hihinana ny voka-tsoa amin’ny tany;
  '2':
  - type: text
    content: MANDRENESA, ry lanitra, ary mihainoa, ry tany,
  - type: text
    content: 'Fa Jehovah no miteny hoe:'
  - type: text
    content: Efa nitaiza sy nahalehibe zaza Aho,
  - type: text
    content: Kanjo niodina tamiko ireo.
  '20':
  - type: text
    content: Fa raha mbola mandà sy miodina ihany hianareo,
  - type: text
    content: 'Dia ho lanin’ny sabatra:'
  - type: text
    content: Fa ny vavan’i Jehovah no efa niteny.
  '21':
  - type: text
    content: Indrisy! tonga janga ity tanàna mahatoky
  - type: text
    content: Izay feno ny rariny taloha
  - type: text
    content: Sady nitoeran’ny fahamarinana,
  - type: text
    content: Fa ankehitriny kosa mpamono olona no ao.
  '22':
  - type: text
    content: Ny volafotsinao efa tonga tain-drendrika;
  - type: text
    content: Ny divainao efa voatsatso rano;
  '23':
  - type: text
    content: Ny lehibenao dia mpiodina sady naman’ny mpangalatra;
  - type: text
    content: Samy tia kolikoly sy fatra-nitady tambitamby avokoa izy rehetra;
  - type: text
    content: Ny kamboty tsy mba omeny rariny,
  - type: text
    content: Ary ny adin’ny mpitondratena tsy avelany ho entina eo anatrehany.
  '24':
  - type: text
    content: Ka dia hoy Jehovah, Tompon’ny maro,
  - type: text
    content: 'Ilay Maherin’ny Isiraely:'
  - type: text
    content: E! hiala fo amin’ny mandrafy Ahy Aho
  - type: text
    content: Ary hamaly ny fahavaloko.
  '25':
  - type: text
    content: Dia hamerina ny tànako ho aminao Aho,
  - type: text
    content: Ka hodioviko amin’ny lavenona
  - type: note
    content: Heb. sirahazo.
  - type: text
    content: ' hianao hahafahan’ny tain-drendrikao,'
  - type: text
    content: Ary hesoriko ny firaka rehetra aminao.
  '26':
  - type: text
    content: Dia hampodiko ho toy ny teo aloha ny mpitsaranao,
  - type: text
    content: Ary ny mpanolo-tsainao ho toy ny tamin’ny voalohany;
  - type: text
    content: 'Ary rehefa afaka izany, hianao dia hantsoina hoe: Tanànan’ny fahamarinana, Tanàna mahatoky.'
  '27':
  - type: text
    content: Ziona havotana amin’ny fitsarana,
  - type: text
    content: Ary izay efa mibebaka
  - type: note
    content: Heb. miverina.
  - type: text
    content: ' ao dia havotana amin’ny fahamarinana;'
  '28':
  - type: text
    content: Ary samy haringana avokoa ny mpiodina sy ny mpanota,
  - type: text
    content: Eny, ho lany ritra izay mahafoy an’i Jehovah.
  '29':
  - type: text
    content: Fa hahazo henatra hianareo
  - type: note
    content: Heb. izy.
  - type: text
    content: ' noho ny amin’ny hazo terebinta izay nifalianareo,'
  - type: text
    content: Ary hangaihay hianareo noho ny amin’ny saha izay natokanareo.
  '3':
  - type: text
    content: Ny omby mahalala ny tompony,
  - type: text
    content: Ary ny boriky ny fihinanam-bilon’ny tompony;
  - type: text
    content: Fa ny Isiraely tsy mahalala,
  - type: text
    content: Ny oloko tsy misaina.
  '30':
  - type: text
    content: Fa ho tahaka ny hazo terebinta malazo ravina hianareo,
  - type: text
    content: Sy ho tahaka ny saha tsy misy rano.
  '31':
  - type: text
    content: Ny mahery ho tahaka ny vohavoha,
  - type: text
    content: Ary ny asany ho tahaka ny kilalaon’afo,
  - type: text
    content: Dia hiaraka hodorana izy roa tonta,
  - type: text
    content: Ka tsy hisy hamono ny afo.
  '4':
  - type: text
    content: Indrisy! firenena mpanota, olona mavesa-keloka,
  - type: text
    content: Taranaka mpanao ratsy, zanaka mpanao meloka!
  - type: text
    content: Efa nahafoy an’i Jehovah izy,
  - type: text
    content: Efa nanamavo ny Iray Masin’ny Isiraely,
  - type: text
    content: Efa nihodina izy.
  '5':
  - type: text
    content: Nahoana no mbola ta-hasiana ihany hianareo noho izao fiodinanareo lalandava izao?
  - type: text
    content: Henika aretina avokoa ny loha rehetra,
  - type: text
    content: Ary marary ny fo rehetra.
  '6':
  - type: text
    content: Hatramin’ny faladia ka hatramin’ny loha dia tsy misy izay tsy marary,
  - type: text
    content: Fa ratra sy dian-kapoka ary fery vao;
  - type: text
    content: Tsy mbola voaporitra, na voafehy, na voalemin’ny diloilo izy.
  '7':
  - type: text
    content: Ny taninareo dia efa lao;
  - type: text
    content: Ny tanànanareo dia voadotra tamin’ny afo;
  - type: text
    content: Ny tany volenareo dia lanin’ny fahavalo
  - type: note
    content: Heb. hafa firenena.
  - type: text
    content: ' eo imasonareo,'
  - type: text
    content: Ary lao izy toy ny efa noravan’ny fahavalo.
  - type: note
    content: Heb. hafa firenena.
  '8':
  - type: text
    content: Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanimboaloboka,
  - type: text
    content: Sy tahaka ny fandriana mihantona an’ny mpiandry voly ao anaty tanimbolim-boantango,
  - type: note
    content: voantangombazaha.
  - type: text
    content: Dia tahaka ny tanàna atao fahirano.
  '9':
  - type: text
    content: Raha tsy nosisan’i Jehovah, Tompon’ny maro, olona vitsivitsy isika,
  - type: text
    content: Dia efa tonga tahaka an’i Sodoma
  - type: text
    content: Ary nitovy tamin’i Gomora.
