document_id: EPH.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa amin’izany dia aoka hanahaka an’Andriamanitra hianareo tahaka ny zanaka malala; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'mamantatra izay ankasitrahan’ny Tompo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary aza miray amin’ny asan’ny maizina tsy mahavoka-tsoa, fa aleo mananatra izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa izay ataony ao amin’ny miafina, dia mahamenatra na dia ny milaza izany aza. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ny zavatra rehetra, raha anarina, dia asehon’ny mazava; fa na inona na inona aseho dia mazava. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa izany no ilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza hianao izay matory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitsangàna amin’ny maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampahazava anao Kristy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa tandremo tsara izay fandehanareo, mba tsy hitondranareo tena tahaka ny adala, fa tahaka ny hendry, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ka hararaoty ny andro azo anaovan-tsoa, fa ratsy izao fiainana izao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary noho izany dia aza manao adaladala, fa aoka ho fantatrareo izay sitrapon’ny Tompo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary aza ho mamon-divay hianareo, fa amin’izany dia misy fanaranam-po amin’ny ratsy, fa aoka hofenoina ny Fanahy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka mifampilazà amin’ny salamo sy ny fihirana ary ny tonon-kiram-panahy, dia mihira sy mikalo ao am-ponareo ho an’ny Tompo, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ary mandehana amin’ny fitiavana, toy ny nitiavan’i Kristy anareo, dia ny nanolorany ny tenany ho fanatitra sy ho fanavotana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanatitra alatsa-dra.
      marker-yv: yv-n
    - type: text
      text: ' amin’Andriamanitra, ho hanitra ankasitrahana, hamonjy antsika.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'misaotra an’Andriamanitra Ray mandrakariva noho ny zavatra rehetra, amin’ny anaran’i Jesosy Kristy Tompontsika, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: sady mifanaiky amin’ny fahatahorana an’i Kristy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hianareo vehivavy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: maneke
    - type: text
      text: ' ny vadinareo tahaka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny anekena
    - type: text
      text: ' ny Tompo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa ny lahy no lohan’ny vavy, dia tahaka an’i Kristy koa no Lohan’ny fiangonana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ary Izy no mpamonjy ny tena. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa tahaka ny aneken’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' an’i Kristy no haneken’ny vavy ny lahy koa amin’ny zavatra rehetra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hianareo lehilahy, tiava ny vadinareo, dia tahaka ny nitiavan’i Kristy ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ka nanolorany ny tenany hamonjy azy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'mba hahamasina azy amin’ny anadiovany azy amin’ny rano fanasana amin’ny teny; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: mba horaisiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatolony.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny tenany izany ho fiangonana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' malaza tsy misy pentimpentina, na fiketronana, na izay toy izany, fa mba ho masina sady tsy misy tsiny izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia tahaka izany koa, ny lehilahy tokony ho tia ny vadiny tahaka ny tenany ihany. Izay tia ny vadiny dia tia ny tenany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Fa tsy mba nisy olona tsy tia ny nofony, fa mamelona sy mitaiza azy, dia tahaka an’i Kristy amin’ny fiangonana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ny fijangajangana sy ny fahalotoana rehetra, na ny fieremana, dia aza avela hotononina eo aminareo akory aza, fa tsy maha-mendrika ny olona masina izany, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fa momba ny tenany isika. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ',,Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hiray amin’ny vadiny, ary dia ho nofo iray ihany izy roroa’’ (Gen. 2.24). '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Zava-miafina lehibe izany; fa milaza ny amin’i Kristy sy ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' aho. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Na dia izany aza, samia tia ny vadiny tahaka ny tenany hianareo lehilahy rehetra, ary aoka kosa ny vavy hanaja
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatahotra.
      marker-yv: yv-n
    - type: text
      text: ' ny lahy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'na fahavetavetana, na resaka fahadalana, na voso-dratsy, izay tsy tokony hatao, fa aleo misaotra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa fantatrareo marimarina fa samy tsy manana lova eo amin’ny fanjakan’i Kristy sy Andriamanitra na ny mpijangajanga rehetra, na ny olom-betaveta, na ny olona mierina (mpanompo sampy izany). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Aza mety hofitahin’olona amin’ny teny foana hianareo; fa izany zavatra izany no mahatonga ny fahatezeran’Andriamanitra amin’ny zanaky ny tsi-fanarahana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa aza mety ho mpiombona aminy hianareo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa maizina hianareo fahiny, fa efa mazava ao amin’ny Tompo kosa ankehitriny; mandehana tahaka ny zanaky ny mazava (
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'fa ny vokatry ny mazava dia ao amin’ny fahatsarana rehetra sy ny fahamarinana ary ny fahitsiana), '
