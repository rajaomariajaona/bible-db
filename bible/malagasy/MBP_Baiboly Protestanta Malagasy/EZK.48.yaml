document_id: EZK.48,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary izao no anaran’ny firenena: Hatramin’ny farany avaratra any amoron-dranomasina amin’ny làlana mankany Hetlona any akaikin’i Hamata sy Hazar-enana, fari-tanin’i Damaskosy eo avaratra, any anilan’i Hamata; izany no ho lafiny atsinanana sy andrefana; '
  - type: text
    content: anjara
  - type: text
    content: ' iray ho an’i Dana. '
  '10':
  - type: text
    content: 'Ary ho an’ny mpisorona izany tany masina voatokana izany, dimy arivo amby roa alina ny lavany avaratra, ary iray alina ny sakany andrefana, ary iray alina ny sakany atsinanana, ary dimy arivo amby roa alina ny lavany atsimo; ary ny fitoerana masin’i Jehovah no ho eo afovoany. '
  '11':
  - type: text
    content: 'Ho an’ny mpisorona izay nohamasinina avy amin’ny taranak’i Zadoka izany, dia ireo nitandrina ny nasaiko notandremana ka tsy nivily tamin’ny nivilian’ny Zanak’Isiraely, tahaka ny nivilian’ny Levita,– '
  '12':
  - type: text
    content: eny, ho azy izany ho tany halaina amin’ilay efa voatokana, dia zavatra masina indrindra, mifanolotra amin’ny faritanin’ny Levita.
  '13':
  - type: text
    content: 'Ary ny Levita koa dia hahazo ny mifanolotra amin’ny fari-tanin’ny mpisorona, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany, eny, samy dimy arivo amby roa alina ny lavany, sy iray alina ny sakany. '
  '14':
  - type: text
    content: Ary tsy ho azony hamidy izany, na hatakalo, ary tsy hafindrany ny voaloham-bokatra amin’ny tany; fa masina ho an’i Jehovah izany.
  '15':
  - type: text
    content: 'Ary ny dimy arivo, ilay navela tamin’ny sakany mifanolotra amin’ny dimy arivo amby roa alina, dia tsy masina, fa ho an’ny tanàna, ho fonenana sy ho tany fiandrasana; ary ny tanàna no ho ao afovoany. '
  '16':
  - type: text
    content: 'Ary izao no ohany: Ny avaratra ho diman-jato amby efatra arivo, ary ny atsimo ho diman-jato amby efatra arivo, ary ny atsinanana ho diman-jato amby efatra arivo, ary ny andrefana ho diman-jato amby efatra arivo. '
  '17':
  - type: text
    content: Ary ny amin’ny tany fiandrasana momba ny tanàna, ny eo amin’ny avaratra dia ho dimam-polo amby roan-jato, ary ny eo amin’ny atsinanana dia ho dimam-polo amby roan-jato, ary ny eo amin’ny andrefana dia ho dimam-polo amby roan-jato.
  '18':
  - type: text
    content: 'Ary ny lavany sisa mifanolotra amin’ny anjara masina voatokana dia iray alina atsinanana ary iray alina andrefana, ary hifanolotra amin’ny anjara masina voatokana izany; ary ny vokany hohanin’ny mpiasa ao an-tanàna. '
  '19':
  - type: text
    content: Ary izay mpiasa ao an-tanàna avy amin’ny firenen’Isiraely rehetra no hiasa azy.
  '2':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Dana hatrany atsinanana ka hatrany andrefana dia iray koa ho an’i Asera. '
  '20':
  - type: text
    content: 'Ny tany voatokana rehetra dia dimy arivo amby roa alina sokera; ny ampahefatry ny anjara masina voatokana dia halainareo ho zara-tany momba ny tanàna. '
  '21':
  - type: text
    content: 'Ary ho an’ny mpanjaka ny sisa an-daniny roa amin’ny anjara masina voatokana sy ny zara-tany momba ny tanàna; mifanolotra amin’ny dimy arivo amby roa alina amin’ny anjara voatokana hatramin’ny fari-tany atsinanana, ary mifanolotra amin’ny dimy arivo amby roa alina hatramin’ny fari-tany andrefana, mifanolotra amin’ireo anjaran’ny sasany, ho an’ny mpanjaka izany; ary ny anjara masina voatokana sy ny trano fitoerana masina no ho eo afovoany. '
  '22':
  - type: text
    content: Ary hatramin’ny zara-tanin’ny Levita sy ny zara-tany momba ny tanàna, izay ao ampovoan’ny an’ny mpanjaka, anelanelan’ny fari-tanin’i Joda sy Benjamina, dia ho an’ny mpanjaka izany.
  '23':
  - type: text
    content: 'Ary ny amin’ny firenena sisa, dia hatramin’ny lafiny atsinanana ka hatramin’ny andrefana, dia hisy '
  - type: text
    content: anjara
  - type: text
    content: ' iray ho an’i Benjamina. '
  '24':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Benjamina, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Simeona. '
  '25':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Simeona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’Isakara. '
  '26':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’Isakara, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Zebolona. '
  '27':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Zebolona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Gada. '
  '28':
  - type: text
    content: Ary mifanolotra amin’ny fari-tanin’i Gada, amin’ny lafiny atsimo, dia hatrany Tamara sy ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe.
  '29':
  - type: text
    content: Izany no tany hozarainareo amin’ny filokana ho an’ny firenen’Isiraely ho lovany, ary izany no ho anjarany avy, hoy Jehovah Tompo.
  '3':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Asera, hatrany atsinanana ka hatrany andrefana dia iray koa ho an’i Naftaly. '
  '30':
  - type: text
    content: 'Ary izao no ohatry ny tanàna amin’ny lafiny avaratra: diman-jato amby efatra arivo. '
  '31':
  - type: text
    content: 'Ary ny anaran’ny vavahady dia ho toy ny anaran’ny firenen’Isiraely: ny vavahady telo avaratra, dia vavahadin’i Robena ny iray, vavahadin’i Joda ny iray, vavahadin’i Levy ny iray. '
  '32':
  - type: text
    content: 'Ary amin’ny atsinanana diman-jato amby efatra arivo; ary ny vavahady telo, dia vavahadin’i Josefa ny iray, vavahadin’i Benjamina ny iray, ary vavahadin’i Dana ny iray. '
  '33':
  - type: text
    content: 'Ary amin’ny atsimo diman-jato amby efatra arivo ohatra, ary ny vavahady telo, dia vavahadin’i Simeona ny iray, vavahadin’Isakara ny iray, vavahadin’i Zebolona ny iray. '
  '34':
  - type: text
    content: 'Ary amin’ny andrefana diman-jato amby efatra arivo sy vavahady telo, dia vavahadin’i Gada ny iray, vavahadin’i Asera ny iray, vavahadin’i Naftaly ny iray. '
  '35':
  - type: text
    content: Valo arivo amby iray alina ny manodidina.
  - type: text
    content: 'Ary ny anaran’ny tanàna hatramin’izay andro izay dia: '
  - type: heading
    content: jehovah no ao.
  '4':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Naftaly, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Manase. '
  '5':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Manase, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Efraima. '
  '6':
  - type: text
    content: 'Ary mifanolotra amin’ny fari-tanin’i Efraima, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Robena. '
  '7':
  - type: text
    content: Ary mifanolotra amin’ny fari-tanin’i Robena, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an’i Joda.
  '8':
  - type: text
    content: Ary mifanolotra amin’ny faritanin’i Joda, hatrany atsinanana ka hatrany andrefana, no hisian’ilay tany hatokanareo, indimy arivo amby roa alin’
  - type: text
    content: ny volotara
  - type: text
    content: ' ny sakany, ary ny lavany mitovy amin’ny anjaran’ny sasany hatrany atsinanana ka hatrany andrefana; ary ny fitoerana masina no ho eo afovoany. '
  '9':
  - type: text
    content: 'Ny tany izay hatokanareo ho an’i Jehovah, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany. '
