document_id: EZK.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toetry ny Isiraely hatramin’ny ela, sy ny zavatra hanjo azy, ary ny mbola hampodian’Andriamanitra azy.
  - type: text
    content: ARY tamin’ny andro fahafolo tamin’ny volana fahadimy tamin’ny taona fahafito dia nisy tonga ny loholon’ny Isiraely mba hanontany amin’i Jehovah, ka nipetraka teo anatrehako izy.
  '10':
  - type: text
    content: 'Koa dia nentiko nivoaka avy tany amin’ny tany Egypta izy ka nentiko ho any an-efitra. '
  '11':
  - type: text
    content: 'Dia nomeko azy ny didiko, ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manaraka izany. '
  '12':
  - type: text
    content: Ary nomeko azy koa ny Sabatako ho famantarana ho amiko sy ho aminy, mba ho fantany fa Izaho Jehovah no manamasina azy.
  '13':
  - type: text
    content: 'Kanjo niodina tamiko tany an-efitra ihany ny taranak’Isiraely, ka tsy nandeha araka ny didiko izy, fa nanamavo ny fitsipiko, izay mahavelona ny olona manaraka izany, ary nandoto dia nandoto ny Sabatako izy, dia hoy Izaho: Haidiko aminy any an-efitra ny fahatezerako hahalany ringana azy. '
  '14':
  - type: text
    content: Kanefa niasa noho ny amin’ny anarako Aho, mba tsy handotoana izany eo anatrehan’ny jentilisa izay nahita ny nitondrako azy nivoaka.
  '15':
  - type: text
    content: 'Ary Izaho dia nanangan-tànana taminy tany an-efitra koa fa tsy hitondra azy ho any amin’ny tany efa nomeko azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra, '
  '16':
  - type: text
    content: 'satria efa nanamavo ny fitsipiko izy ary tsy nandeha araka ny didiko, fa nandoto ny Sabatakao; fa ny fony dia nanaraka ny sampiny. '
  '17':
  - type: text
    content: Nefa niantra azy ihany ny masoko, ka dia tsy naringako na nolevoniko tany an-efitra izy.
  '18':
  - type: text
    content: 'Fa hoy Izaho tamin’ny zanany tany an-efitra: Aza mandeha araka ny fanaon-drazanareo hianareo, na mitandrina ny fitsipiny, na mandoto tena amin’ny sampiny; '
  '19':
  - type: text
    content: 'fa Izaho no Jehovah Andriamanitrareo; koa mandehana araka ny didiko, ary mitandrema ny fitsipiko, ka araho izany. '
  '2':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '20':
  - type: text
    content: Ary manamasìna sy Sabatako, mba ho famantarana ho amiko sy ho aminareo, ka dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.
  '21':
  - type: text
    content: 'Kanjo niodina tamiko koa ny zanany: tsy nandeha araka ny didiko izy, na nitandrina hanaraka ny fitsipiko, izay mahavelona ny olona manaraka izany, fa nandoto ny Sabatako izy; ka dia hoy Izaho: Haidiko aminy ny fahavinirako, ary hotanterahiko aminy any an-efitra ny fahatezerako. '
  '22':
  - type: text
    content: Nefa nampihemotra ny tànako Aho, ka dia niasa noho ny amin’ny anarako, mba tsy ho voaloto izany eo anatrehan’ny jentilisa izay nahita ny nitondrako azy nivoaka.
  '23':
  - type: text
    content: 'Dia nanangan-tànana taminy tany an-efitra, indray Aho, hampiely azy any amin’ny jentilisa sy hampihahaka azy any amin’ny tany samy hafa, '
  '24':
  - type: text
    content: 'satria tsy nanaraka ny fitsipiko izy, fa nanamavo ny didiko sy nandoto ny Sabatako, ary ny masony nanaraka ny sampin’ny razany. '
  '25':
  - type: text
    content: 'Ary nomeko didy tsy tsara koa izy sy fitsipika izay tsy mahavelona azy. '
  '26':
  - type: text
    content: 'Dia nandoto azy tamin’ny fanatiny Aho, dia tamin’ny nampandehanany ny voalohan-teraka rehetra hamaky '
  - type: text
    content: ny afo,
  - type: text
    content: ' '
  - type: note
    content: 'Na: dia tamin’ny nanokanany ny voalohan-teraka rehetra; izahao Eks. xiii. 12.'
  - type: text
    content: hampahatalanjonako azy, mba hahafantarany fa Izaho no Jehovah.
  '27':
  - type: text
    content: 'Koa mitenena amin’ny taranak’Isiraely, ry zanak’olona, ka ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Tamin’izao no mbola nanamavoan’ny razanareo Ahy tamin’ny nivadihany tamiko: '
  '28':
  - type: text
    content: 'Nony nitondra azy ho any amin’ny tany izay nananganako tànana homena azy Aho, dia nahita ny havoana andrandraina rehetra sy ny hazo misandrahaka rehetra izy, ka tao no namonoany zavatra hatao fanatitra, ary tao koa no nametrahany ny fanatiny mahatezitra; tao koa no nanaterany hanitra ankasitrahana, ary tao no nanidinany ny fanatitra aidiny. '
  '29':
  - type: text
    content: 'Ka dia hoy Izaho taminy: Ahoana moa ny amin’ny fitoerana avo alehanareo? Ka dia fitoerana avo no natao anarany mandraka andro-any.'
  '3':
  - type: text
    content: 'Ry zanak’olona, mitenena amin’ireo loholon’ny Isiraely, ka ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Moa hanontany amiko va no ihavianareo? Raha velona koa Aho, hoy Jehovah Tompo, dia tsy hety hanontanianareo mihitsy Aho. '
  '30':
  - type: text
    content: 'Koa ataovy amin’ny taranak’Isiraely hoe: Izao no lazain’i Jehovah Tompo:–Moa mandoto tena araka ny fanaon’'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' ny razanareo va hianareo, sy mijangajanga manaraka ny fahavetavetany va, '
  '31':
  - type: text
    content: 'ary mandoto tena amin’ny sampinareo rehetra mandraka andro-any va hianareo amin’ny anateranareo ny fanomezanareo sy ny ampandehananareo ny zanakareo hamaky ny afo? Ary Izaho va hety hanontanianareo, ry taranak’Isiraely? Raha velona koa Aho, hoy Jehovah Tompo, tsy hety hanontanianareo mihitsy Aho. '
  '32':
  - type: text
    content: 'Ary tsy ho tanteraka mihitsy ny eritreritry ny fanahinareo hoe: Ho tahaka ny jentilisa izahay, dia tahaka ny firenena amin’ny tany samy hafa, ka hanao fanompoam-pivavahana ho an’ny vato aman-kazo. '
  '33':
  - type: text
    content: 'Raha velona koa Aho, hoy Jehovah Tompo, dia tànana mahery sy sandry ahinjitra ary fahatezerana aidina no hanjakako aminareo. '
  '34':
  - type: text
    content: 'Ary amin’ny tànana mahery sy ny sandry ahinjitra ary amin’ny fahatezerana aidina no hitondrako anareo mivoaka avy any amin’ny firenena sy hamoriako anareo avy any amin’ny tany izay nampielezana anareo. '
  '35':
  - type: text
    content: 'Dia ho entiko ho any an-efitry ny firenena hianareo, ary any no hifandaharako mifanatrika aminareo. '
  '36':
  - type: text
    content: 'Tahaka ny nifandaharako tamin’ny razanareo tany an-efitry ny tany Egypta, dia toy izany koa no hifandaharako aminareo, hoy Jehovah Tompo. '
  '37':
  - type: text
    content: 'Ary hampandaloviko eo ambanin’ny tehina hianareo ka hampidiriko hofehezin’ny fanekena. '
  '38':
  - type: text
    content: Ary havahako hiala aminareo ny mpiodina sy izay manota amiko; eny, ho entiko hiala amin’ny tany ivahiniany ireo, nefa tsy hisy ho tafiditra ao amin’ny tanin’ny Isiraely izy; ka dia ho fantatrareo fa Izaho no Jehovah.
  '39':
  - type: text
    content: 'Ary ny aminareo, ry taranak’Isiraely, izao no lazain’i Jehovah Tompo: Samia mandeha hianareo, ka manompoa ny sampinareo; nefa any aoriana kosa dia hihaino Ahy mihitsy hianareo ka tsy handoto ny anarako masina intsony amin’ny fanatitrareo sy amin’ny sampinareo. '
  '4':
  - type: text
    content: Tsy hotsarainao va izy, ry zanak’olona, tsy hotsarainao va izy? Ampahalalao ny fahevetavetan’ny razany izy.
  '40':
  - type: text
    content: 'Fa ao an-tendrombohitro masina, dia ao an-tendrombohitra avon’ny Isiraely, hoy Jehovah Tompo, no hanompoan’ny taranak’Isiraely rehetra Ahy, dia izay rehetra amin’ny tany; ao no hankasitrahako azy, ary ao no hilako ny fanatitrareo sy ny voaloham-bokatra aterinareo amin’ny zava-masinareo rehetra. '
  '41':
  - type: text
    content: Hankasitrahako toy ny hanitra ankasitrahana hianareo amin’ny hitondrako anareo mivoaka avy any amin’ny firenena sy ny hamoriako anareo avy any amin’ny tany samy hafa nampielezana anareo, ka dia hiseho ho masina eo anatrehan’ny jentilisa Aho amin’ny hataoko aminareo.
  '42':
  - type: text
    content: 'Ary ho fantatrareo fa Izaho no Jehovah, raha mitondra anareo ho any amin’ny tanin’ny Isiraely Aho, dia ny tany izay nananganako tànana nomena ny razanareo. '
  '43':
  - type: text
    content: 'Ary hotsaroanareo any ny nalehanareo sy ny nataonareo rehetra izay nahaloto anareo; ary haharikoriko anareo ny tenanareo noho ny ratsy rehetra izay nataonareo. '
  '44':
  - type: text
    content: Dia ho fantatrareo fa Izaho no Jehovah, rehefa miasa aminareo Aho noho ny amin’ny anarako, fa tsy araka ny làlan-dratsinareo, na araka ny ratsy fanaonareo, ry taranak’Isiraely, hoy Jehovah Tompo.
  '5':
  - type: text
    content: 'Ary ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Tamin’ny andro nifidianako ny Isiraely sy nananganako tànana tamin’ny taranak’i Jakoba sy nanaovako izay hahafantarany Ahy tany amin’ny tany Egypta raha nanangan-tànana taminy Aho ka nanao hoe: Izaho no Jehovah Andriamanitrareo,– '
  '6':
  - type: text
    content: 'tamin’izany andro izany no nananganako tànana taminy hitondra azy hivoaka avy tany amin’ny tany Egypta ho any amin’ny tany notadiaviko ho azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra, '
  '7':
  - type: text
    content: 'dia hoy Izaho taminy: Samia manary ny fahavetavetan’ny masonareo avy hianareo, ary aza mandoto tena amin’ny sampin’i Egypta; Izaho no Jehovah Andriamanitrareo.'
  '8':
  - type: text
    content: 'Nefa niodina tamiko izy ka tsy nety nihaino Ahy; samy tsy nanary ny fahavetavetan’ny masony na nahafoy ny sampin’i Egypta, ka dia hoy Izaho: Haidiko aminy ny fahavinirako, ary hotanterahiko aminy eo amin’ny tany Egypta ny fahatezerako. '
  '9':
  - type: text
    content: 'Kanefa niasa noho ny amin’ny anarako Aho, mba tsy handotoana izany eo imason’ny jentilisa izay nitoerany, sady teo imasony no nanaovako izay hahafantarany Ahy tamin’ny nitondrako azy nivoaka avy tany amin’ny tany Egypta. '
