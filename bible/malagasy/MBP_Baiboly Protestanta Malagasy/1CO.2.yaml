document_id: 1CO.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary izaho koa, ry rahalahy, raha tonga tany aminareo, dia tsy tonga tamin’ny teny sy fahendrena marevaka, raha nitory taminareo ny zava-miafina izay
  - type: note
    content: 'Na: [ny filazana].'
  - type: text
    content: ' an’Andriamanitra. '
  '10':
  - type: text
    content: 'dia isika no nanambaran’Andriamanitra izany tamin’ny Fanahy; fa ny Fanahy mamantatra ny zavatra rehetra, na dia ny saina lalina izay an’Andriamanitra aza. '
  '11':
  - type: text
    content: Fa iza no olona mahalala ny ao am-pon’olona, afa-tsy ny fanahin’ny olona izay ao anatiny ihany? Ary toy izany koa, tsy misy mahalala ny ao am-pon’Andriamanitra afa-tsy ny Fanahin’Andriamanitra ihany.
  '12':
  - type: text
    content: 'Fa isika tsy nandray ny fanahin’izao tontolo izao, fa ny Fanahy Izay avy amin’Andriamanitra, mba ho fantatsika izay zavatra nomen’Andriamanitra antsika. '
  '13':
  - type: text
    content: Izany koa no lazainay, tsy amin’ny teny ampianarin’ny fahendren’olona, fa amin’ny teny ampianarin’ny Fanahy, raha milaza zava-panahy amin’izay olona
  - type: note
    content: 'Na: teny'
  - type: text
    content: ' araka ny Fanahy'
  - type: note
    content: 'Na: raha mampikambana zava-panahy; na: raha mampitaha zava-panahy.'
  - type: text
    content: ' izahay. '
  '14':
  - type: text
    content: 'Fa ny olona izay araka ny nofo ihany dia tsy mba mandray izay an’ny Fanahin’Andriamanitra; fa fahadalana aminy izany sady tsy azony, satria araka ny Fanahy no amantarana izany. '
  '15':
  - type: text
    content: 'Fa ny olona araka ny Fanahy kosa dia mahafantatra ny zavatra rehetra, kanefa izy tsy fantarin’olona. '
  '16':
  - type: text
    content: Fa ,,iza no nahafantatra ny sain’ny Tompo mba hampianatra Azy?’’
  - type: note
    content: 'Na: azy.'
  - type: text
    content: ' (Isa. 40.13). Fa izahay manana ny sain’i Kristy.'
  '2':
  - type: text
    content: 'Fa ninia tsy hahafantatra zavatra hafa teo aminareo aho, afa-tsy Jesosy Kristy, indrindra fa Izy voahombo tamin’ny hazofijaliana; '
  '3':
  - type: text
    content: 'ary izaho, raha tany aminareo, dia azon’ny fahalemena sy ny fahatahorana ary ny fangovitana be; '
  '4':
  - type: text
    content: 'ary ny teniko sy ny tori-teniko dia tsy tamin’ny teny fahendrena mahataona, fa tamin’ny fanehoan’ny Fanahy sy ny hery, '
  '5':
  - type: text
    content: mba tsy hiorenan’ny finoanareo amin’ny fahendren’ny olona, fa amin’ny herin’Andriamanitra ihany.
  '6':
  - type: text
    content: 'Anefa milaza fahendrena amin’ny efa matanjaka izahay, fa tsy ny fahendren’izao tontolo izao, na ny an’ny mpanapaka izao tontolo izao, izay olona mihalevona; '
  '7':
  - type: text
    content: 'fa milaza ny fahendren’Andriamanitra izahay ka maneho zava-niafina, '
  - type: text
    content: dia fahendrena
  - type: text
    content: ' izay nafenina sady voatendrin’Andriamanitra ho voninahitsika talohan’ny nanaovana izao tontolo izao; '
  '8':
  - type: text
    content: 'ary tsy nisy nahalala izany ny mpanapaka izao tontolo izao; fa raha nahalala izy, dia tsy nohomboany tamin’ny hazofijaliana ny Tompon’ny voninahitra. '
  '9':
  - type: text
    content: 'Fa araka ny voasoratra hoe: ,,Izay tsy mbola hitan’ny maso ary tsy mbola ren’ny sofina, na niditra tao am-pon’ny olona, na inona na inona no efa namboarin’Andriamanitra ho an’izay tia Azy’’ (Isa. 64.3), '
