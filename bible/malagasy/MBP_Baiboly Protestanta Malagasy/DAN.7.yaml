document_id: DAN.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fahitana niseho tamin’i Daniela ny amin’ny fanjakana efatra lehibe, sy ny hitsaran’Andriamanitra ireo.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TAMIN’ny taona voalohany nanjakan’i Belsazara, mpanjakan’i Babylona, dia nanonofy Daniela sady nahita fahitana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Ar.
        - type: text
          text: ' fahitan’ny lohany.'
      marker-yv: yv-n
    - type: text
      text: ' tao am-pandriany, ary nosoratany ny nofy, ka nambarany ny fotopototry ny teny.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ony afo no nivoaka sy nandeha avy teo anatrehany; arivoarivo no nanompo Azy, ary alinalina no nitsangana teo anatrehany; nipetraka ny Mpitsara, ary novelarina ny boky. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia mbola nijery ihany aho noho ny feon’ny teny mihoa-pampana notenenin’ilay tandroka; eny, nijery aho ambara-pamono ny biby, ka nolevonina ny tenany, ary natao teo amin’ny afo mirehitra izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny amin’ny biby sasany, dia nesorina taminy ny fanapahany; nefa nohalavaina ihany ny andro hiainany mandra-pahalanin’ny andro sy ny fotoana.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary mbola nahita tamin’ny fahitana tamin’ny alina ihany aho, ary, indro, nisy toy ny zanak’olona avy tamin’ny rahon’ny lanitra, ary nankeo amin’ny Fahagola Izy, dia nampanakekeny teo anatrehany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nomena fanapahana sy voninahitra ary fanjakana Izy, mba hanompoan’ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra Azy; ny fanapahany dia fanapahana mandrakizay ka tsy ho tapaka, ary ny fanjakany tsy ho rava.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izaho Daniela nalahelo tam-panahy, ary ny fahitan’ny lohako naharaiki-tahotra ahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nanakaiky ilay anankiray tamin’izay nitsangana teo aho ka nanontany azy ny fototr’izany rehetra izany. Dia nambarany tamiko, ka nampahafantariny ahy ny hevitry ny zavatra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ireo biby lehibe efatra ireo dia mpanjaka efatra izay hitsangana avy amin’ny tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa ny olo-masin’ny Avo Indrindra no hahazo ny fanjakana ary hanana ny fanjakana mandrakizay alaovalo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia naniry hahalala izay fototra marina ny amin’ny fahefatra aho, dia ilay biby hafa noho izy rehetra sady mahatsiravina indrindra izay nanana nify vy sy hoho varahina sady nihinana sy nanotahota, ary ny sisa tsy laniny dia nohosihosen’ny tongony; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia niteny Daniela ka nanao hoe: Nahita tamin’ny fahitako tamin’ny alina aho, fa, indreo, ny rivotra efatry ny lanitra nibosesika teny amin’ny ranomasina lehibe. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny amin’ny tandroka folo teo an-dohany sy ny anankiray koa izay nipoitra, ka nisy telo potraka teo anoloany, dia ilay tandroka nanana maso sy vava izay niteny zavatra mihoapampana, ary ny fijery azy dia lehibe noho ny namany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Mbola nijery ihany aho, ary izany tandroka izany nanoto ny olo-masina ka naharesy azy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ambara-pihavin’ny Fahagola, ka nomena rariny ny olo-masin’ny Avo Indrindra; ary tonga ny fotoana nahazoan’ny olo-masina ny fanjakana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao no nolazainy: Ilay fahefatra amin’ny biby dia fanjakana fahefatra etỳ ambonin’ny tany, izay ho hafa noho ny fanjakana rehetra sady handrava ny tany rehetra ary hanosihosy sy hanorotoro azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny tandroka folo dia mpanjaka folo izay hitsangana avy amin’izany fanjakana izany; ary hisy iray koa hitsangana manaraka azy; hafa noho ny voalohany izy ary handresy mpanjaka telo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary hiteny hanohitra ny Avo Indrindra izy sy hampahory ny olo-masin’ny Avo Indrindra ary hitady hanova fotoana sy lalàna; ary hatolotra eny an-tànany ireo ambara-pahatapitry ny fetr’andro iray sy ny fetr’andro '
    - type: usfm
      marker: it
      children:
      - type: text
        text: roa
    - type: text
      text: ' ary ny antsasaky ny fetr’andro. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa hipetraka ny Mpitsara, ary hesorina ny fanapahany, ka horavana sy hosimbana hatramin’ny farany izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ny fanjakana sy ny fanapahana ary ny fahalehibiazan’ny fanjakana eny ambanin’ny lanitra rehetra dia homena ny olo-masin’ny Avo Indrindra; ny fanjakany dia fanjakana mandrakizay, ary ny fanapahana rehetra dia hanompo sy hanoa Azy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Hatramin’izao no faran’izany zavatra izany. Ny amiko, izaho Daniela, dia naharaiki-tahotra ahy indrindra ny eritreritro, ka nivaloarika ny tarehiko, nefa notehiriziko tao am-poko ihany izany zavatra izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nisy biby efatra lehibe samy hafa niakatra avy tamin’ny ranomasina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny voalohany dia toy ny liona ary nanana elatry ny voromahery; nijery aho ambara-panongotra ny elany, ary natsangana avy tamin’ny tany izy ka najoro tamin’ny tongony roa toy ny fijoron’ny olona, sady natao manana fon’olombelona izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary indro koa ny faharoa, biby hafa tahaka ny bera, izay nampisondrotra ny ila-tenany, sady nisy taolan-tehezana telo teo am-bavany anelanelan’ny nifiny; ary toy izao no voalaza taminy: Mitsangàna, homàna nofo be.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nony afaka izany, dia nahita aho fa, indro, nisy hafa koa toy ny leoparda, izay nanana ela-borona efatra teo an-damosiny, ary io biby io nanana loha efatra, ary nomena fanapahana izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nony afaka izany, dia nahita tamin’ny fahitana tamin’ny alina aho, ary, indro ny fahefatra, biby mahatsiravina sady matanjaka sy mahery indrindra, ary nanana nify vy lehibe izy; nihinana sy nanotahota izy, ary ny sisa tsy laniny dia nohosihosen’ny tongony; ary hafa noho ny biby rehetra teo alohany izy sady nanana tandroka folo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nodinihiko ny tandroka, ka, indro, nisy tandroka iray kely koa nipoitra teo aminy, ary novòhana teo anoloan’io ny tandroka telo tamin’ireo taloha; ary, indro, nanana maso toy ny mason’olona sy vava miteny zavatra mihoa-pampana izy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mbola nijery ihany aho mandra-pametraka ny seza fiandrianana, ary ny Fahagola no nipetraka teo, ny fitafiany dia fotsy toy ny fanala, ary ny volon-dohany toy ny volon’ondry madio; ny seza fiandrianany dia lelafo, ary ny kodiany dia afo mirehitra. '
