document_id: ISA.48,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampahatsiarovana ny lasa, sy filazana ny ho avy, indrindra fa ny hanafahana ny Isiraely avy any Babylona.
  - type: text
    content: MIHAINOA, ry taranak’i Jakoba,
  - type: text
    content: Dia hianareo izay antsoina amin’ny anaran’Isiraely
  - type: text
    content: Sy avy amin’ny loharanon’i Joda,
  - type: text
    content: Hianareo izay mianiana amin’ny anaran’i Jehovah
  - type: text
    content: Ary mankalaza ny anaran’Andriamanitry ny Isiraely,
  - type: text
    content: Kanefa tsy araka ny marina, na araka ny hitsiny;
  '10':
  - type: text
    content: Indro, nodioviko hianao, nefa tsy toy ny volafotsy;
  - type: text
    content: Efa nizaha toetra anao tao amin’ny memy fahoriana Aho.
  '11':
  - type: text
    content: Noho ny tenako, eny, noho ny tenako ihany no anaovako izany;
  - type: text
    content: 'Indrisy, lotoina '
  - type: text
    content: ny anarako
  - type: text
    content: '!'
  - type: text
    content: Ary ny voninahitro tsy homeko ny hafa.
  '12':
  - type: text
    content: Mihainoa Ahy, ry Jakoba,
  - type: text
    content: 'Sy ry Isiraely izay nantsoiko:'
  - type: text
    content: Tsy miova Aho;
  - type: text
    content: Izaho no voalohany, ary Izaho koa no farany.
  '13':
  - type: text
    content: Eny, ny tànako no nanorina ny fanambanin’ny tany,
  - type: text
    content: Ary ny tànako ankavanana no namelatra ny lanitra;
  - type: text
    content: Raha antsoiko ireo, dia indray miseho avokoa.
  '14':
  - type: text
    content: 'Mivoria hianareo rehetra, ka mihainoa:'
  - type: text
    content: Iza moa amin’ireny no mba efa nanambara izany;
  - type: text
    content: Ilay tian’i Jehovah no hahefa ny sitrapony amin’i Babylona,
  - type: text
    content: Ary ny sandriny ho amin’ny Kaldeana.
  '15':
  - type: text
    content: Izaho dia Izaho ihany no miteny sady miantso azy,
  - type: text
    content: Nitondra azy Aho, ka hambinina ny làlany.
  '16':
  - type: text
    content: Manatòna Ahy hianareo, ka mihainoa;
  - type: text
    content: Hatramin’ny taloha no efa tsy nitenenako tamin’ny mangingina,
  - type: text
    content: Hatry ny fony vao nisian’ireo dia teo Aho,
  - type: text
    content: Ary ankehitriny Jehovah Tompo no naniraka Ahy sy ny Fanahiny.
  '17':
  - type: text
    content: Izao no lazain’i Jehovah, Mpanavotra anao,
  - type: text
    content: 'Dia ny Iray Masin’ny Isiraely:'
  - type: text
    content: Izaho, Jehovah Andriamanitrao,
  - type: text
    content: No nampianatra anao hahita soa
  - type: text
    content: Sady mitarika anao amin’ny làlana tokony halehanao.
  '18':
  - type: text
    content: Toy izay anie hianao mba nihaino ny didiko!
  - type: note
    content: 'Na: Enga anie ka hihaino ny didiko hianao.'
  - type: text
    content: Dia ho tonga tahaka ny ony ny fiadananao,
  - type: text
    content: Ary ho tahaka ny onjan-drano-masina ny fahamarinanao,
  '19':
  - type: text
    content: Ary ho tahaka ny fasika ny taranakao,
  - type: text
    content: Ary ny aloaky ny kibonao ho tahaka ny sombim-pasika;
  - type: text
    content: Ny anarany tsy ho tapaka na ho foana eo anatrehako.
  '2':
  - type: text
    content: Fa milaza ny tenany ho avy amin’ny tanàna masina izy
  - type: text
    content: Ka miankina amin’Andriamanitry ny Isiraely;
  - type: text
    content: Jehovah, Tompon’ny maro, no anarany.
  '20':
  - type: text
    content: Mivoaha hiala any Babylona;
  - type: text
    content: Miezaha avy any amin’ny Kaldeana;
  - type: text
    content: Torio amin’ny feo mahafaly,
  - type: text
    content: Ary ambarao, ka aelezo hatrany amin’ny faran’ny tany,
  - type: text
    content: 'Lazao hoe: Jehovah efa nanavotra an’i Jakoba mpanompony.'
  '21':
  - type: text
    content: Ary tsy nangetaheta ireo tamin’ny nitondrany azy tany an-efitra;
  - type: text
    content: Nampiboiboika rano ho azy avy tamin’ny vatolampy Izy,
  - type: text
    content: Eny, nampitresaka ny vatolampy Izy, ka dia nigororoana ny rano.
  '22':
  - type: text
    content: Tsy misy fiadanana ho an’ny ratsy fanahy, hoy Jehovah.
  '3':
  - type: text
    content: Ny zavatra taloha dia efa voalazako hatramin’ny fahiny,
  - type: text
    content: Ary naloaky ny vavako izany sady nambarako;
  - type: text
    content: Tampoka no nanaovako izany, ary tonga izany.
  '4':
  - type: text
    content: Satria fantatro fa maditra hianao,
  - type: text
    content: Ka oza-by ny hatokao,
  - type: text
    content: Ary varahina ny handrinao,
  '5':
  - type: text
    content: Dia nambarako taminao hatramin’ny fahiny izany,
  - type: text
    content: Eny, fony tsy mbola tonga aza izany, dia efa nambarako taminao rahateo,
  - type: text
    content: 'Fandrao hataonao hoe: Ny sampiko no nanao izany,'
  - type: text
    content: Ary ny sarin-javatra voasokitra sy ny sarin-javatra an-idina no nandidy izany.
  '6':
  - type: text
    content: Efa renao, ka dia jereo izany rehetra izany,
  - type: text
    content: Moa hianareo tsy hanambara izany va?
  - type: text
    content: Mampandre anao zava-baovao kosa Aho hatramin’izao,
  - type: text
    content: Dia zavatra miafina izay tsy fantatrao.
  '7':
  - type: text
    content: Vao izao no namoronana azy, fa tsy hatramin’ny fahiny,
  - type: text
    content: Ary tsy mbola nandre azy hianao talohan’ny andro anio,
  - type: text
    content: 'Fandrao hianao hanao hoe: Indro, ny efa fantatro ihany izany.'
  '8':
  - type: text
    content: Fa tsy nandre na nahalala hianao;
  - type: text
    content: Eny, hatramin’ny fahiny aza no tsy mbola nisokatra ny sofinao;
  - type: text
    content: Fa fantatro fa tena mpivadika hianao
  - type: text
    content: Sady natao hoe mpiodina hatrany an-kibo.
  '9':
  - type: text
    content: Noho ny anarako dia ononiko ny fahatezerako,
  - type: text
    content: Ary mba hiderana Ahy dia manindry fo ny aminao Aho,
  - type: text
    content: Mba tsy hamongorana anao.
