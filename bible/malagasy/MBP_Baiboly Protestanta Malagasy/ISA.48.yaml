document_id: ISA.48
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fampahatsiarovana ny lasa, sy filazana ny ho avy, indrindra fa ny hanafahana ny Isiraely avy any Babylona.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHAINOA, ry taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo izay antsoina amin’ny anaran’Isiraely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy avy amin’ny loharanon’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo izay mianiana amin’ny anaran’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mankalaza ny anaran’Andriamanitry ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa tsy araka ny marina, na araka ny hitsiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa milaza ny tenany ho avy amin’ny tanàna masina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miankina amin’Andriamanitry ny Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah, Tompon’ny maro, no anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zavatra taloha dia efa voalazako hatramin’ny fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary naloaky ny vavako izany sady nambarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tampoka no nanaovako izany, ary tonga izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Satria fantatro fa maditra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka oza-by ny hatokao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary varahina ny handrinao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nambarako taminao hatramin’ny fahiny izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fony tsy mbola tonga aza izany, dia efa nambarako taminao rahateo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fandrao hataonao hoe: Ny sampiko no nanao izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sarin-javatra voasokitra sy ny sarin-javatra an-idina no nandidy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa renao, ka dia jereo izany rehetra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa hianareo tsy hanambara izany va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampandre anao zava-baovao kosa Aho hatramin’izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zavatra miafina izay tsy fantatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vao izao no namoronana azy, fa tsy hatramin’ny fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mbola nandre azy hianao talohan’ny andro anio,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fandrao hianao hanao hoe: Indro, ny efa fantatro ihany izany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa tsy nandre na nahalala hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hatramin’ny fahiny aza no tsy mbola nisokatra ny sofinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fantatro fa tena mpivadika hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady natao hoe mpiodina hatrany an-kibo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny anarako dia ononiko ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mba hiderana Ahy dia manindry fo ny aminao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hamongorana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indro, nodioviko hianao, nefa tsy toy ny volafotsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nizaha toetra anao tao amin’ny memy fahoriana Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny tenako, eny, noho ny tenako ihany no anaovako izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indrisy, lotoina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny anarako
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voninahitro tsy homeko ny hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihainoa Ahy, ry Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy ry Isiraely izay nantsoiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy miova Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no voalohany, ary Izaho koa no farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, ny tànako no nanorina ny fanambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànako ankavanana no namelatra ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha antsoiko ireo, dia indray miseho avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mivoria hianareo rehetra, ka mihainoa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa amin’ireny no mba efa nanambara izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay tian’i Jehovah no hahefa ny sitrapony amin’i Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sandriny ho amin’ny Kaldeana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izaho dia Izaho ihany no miteny sady miantso azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitondra azy Aho, ka hambinina ny làlany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manatòna Ahy hianareo, ka mihainoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taloha no efa tsy nitenenako tamin’ny mangingina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatry ny fony vao nisian’ireo dia teo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ankehitriny Jehovah Tompo no naniraka Ahy sy ny Fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izao no lazain’i Jehovah, Mpanavotra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia ny Iray Masin’ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho, Jehovah Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nampianatra anao hahita soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitarika anao amin’ny làlana tokony halehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy izay anie hianao mba nihaino ny didiko!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Enga anie ka hihaino ny didiko hianao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tonga tahaka ny ony ny fiadananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tahaka ny onjan-drano-masina ny fahamarinanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ho tahaka ny fasika ny taranakao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny aloaky ny kibonao ho tahaka ny sombim-pasika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny anarany tsy ho tapaka na ho foana eo anatrehako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mivoaha hiala any Babylona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miezaha avy any amin’ny Kaldeana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Torio amin’ny feo mahafaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ambarao, ka aelezo hatrany amin’ny faran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lazao hoe: Jehovah efa nanavotra an’i Jakoba mpanompony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary tsy nangetaheta ireo tamin’ny nitondrany azy tany an-efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampiboiboika rano ho azy avy tamin’ny vatolampy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nampitresaka ny vatolampy Izy, ka dia nigororoana ny rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy fiadanana ho an’ny ratsy fanahy, hoy Jehovah.
