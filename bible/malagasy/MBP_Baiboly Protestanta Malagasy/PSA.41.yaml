document_id: PSA.41
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainan’ilay ampahorin’ny olon-tsy tia sy ny sakaiza mamadika.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: SAMBATRA izay mahatsiaro ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah hamonjy azy amin’ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehovah hitandrina azy sy hiaro azy tsy ho faty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatao ho sambatra ambonin’ny tany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mba hatolotrao amin’ny sitrapon’ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah hanohana azy eo ambonin’ny farafara itsaboana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fandriany rehetra eo am-paharariany dia hovanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izaho: Jehovah ô, mamindrà fo amiko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sitrano ny fanahiko, fa efa nanota taminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny fahavaloko maniry ahy ho simba ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana no ho faty izy, ka ho very ny anarany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha avy mamangy izy, dia miteny zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fony mamory faharatsiana ho an’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaka eny ivelany izy ka milazalaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitakoritsika ahy izay rehetra mankahala ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaina hanisy ratsy ahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tena zava-dratsy, hoy izy, no aidina aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mandry izy, dia tsy hitsangana intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eny, ny sakaizako, izay nahatoky ahy sady nihinana ny haniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nanangana ny ombelahin-tongony hamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa Hianao kosa, Jehovah ô, mamindrà fo amiko, ka atsangano aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hamaliako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izao no hahafantarako fa mankasitraka ahy Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny tsy anakoran’ny fahavaloko ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny amiko, dia manohana ahy amin’ny fahitsiako Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampitoetra ahy eo anatrehanao mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Isaorana anie Jehovah, Andriamanitry ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taloha indrindra ka mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amena dia Amena.
