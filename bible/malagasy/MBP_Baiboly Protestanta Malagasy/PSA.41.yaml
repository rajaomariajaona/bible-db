document_id: PSA.41,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’ilay ampahorin’ny olon-tsy tia sy ny sakaiza mamadika.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: SAMBATRA izay mahatsiaro ny malahelo;
  - type: text
    content: Jehovah hamonjy azy amin’ny andro fahoriana.
  '10':
  - type: text
    content: Fa Hianao kosa, Jehovah ô, mamindrà fo amiko, ka atsangano aho,
  - type: text
    content: Mba hamaliako azy.
  '11':
  - type: text
    content: Izao no hahafantarako fa mankasitraka ahy Hianao,
  - type: text
    content: Dia ny tsy anakoran’ny fahavaloko ahy.
  '12':
  - type: text
    content: Ary ny amiko, dia manohana ahy amin’ny fahitsiako Hianao
  - type: text
    content: Ka mampitoetra ahy eo anatrehanao mandrakizay.
  '13':
  - type: text
    content: Isaorana anie Jehovah, Andriamanitry ny Isiraely,
  - type: text
    content: Hatramin’ny taloha indrindra ka mandrakizay.
  - type: text
    content: Amena dia Amena.
  '2':
  - type: text
    content: Jehovah hitandrina azy sy hiaro azy tsy ho faty;
  - type: text
    content: Hatao ho sambatra ambonin’ny tany izy,
  - type: text
    content: Ary tsy mba hatolotrao amin’ny sitrapon’ny fahavalony.
  '3':
  - type: text
    content: Jehovah hanohana azy eo ambonin’ny farafara itsaboana azy;
  - type: text
    content: Ny fandriany rehetra eo am-paharariany dia hovanao.
  '4':
  - type: text
    content: 'Hoy izaho: Jehovah ô, mamindrà fo amiko;'
  - type: text
    content: Sitrano ny fanahiko, fa efa nanota taminao aho.
  '5':
  - type: text
    content: 'Ny fahavaloko maniry ahy ho simba ka manao hoe:'
  - type: text
    content: Rahoviana no ho faty izy, ka ho very ny anarany?
  '6':
  - type: text
    content: Ary raha avy mamangy izy, dia miteny zava-poana;
  - type: text
    content: Ny fony mamory faharatsiana ho an’ny tenany;
  - type: text
    content: Mivoaka eny ivelany izy ka milazalaza.
  '7':
  - type: text
    content: Mitakoritsika ahy izay rehetra mankahala ahy;
  - type: text
    content: Misaina hanisy ratsy ahy izy.
  '8':
  - type: text
    content: Tena zava-dratsy, hoy izy, no aidina aminy;
  - type: text
    content: Ary raha mandry izy, dia tsy hitsangana intsony.
  '9':
  - type: text
    content: Eny, ny sakaizako, izay nahatoky ahy sady nihinana ny haniko,
  - type: text
    content: No nanangana ny ombelahin-tongony hamely ahy.
