document_id: PRO.20
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mpaniratsira ny divay, ary mpitabataba ny toaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izay miraikiraiky azon’izany dia tsy hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fampitahoran’ny mpanjaka dia toy ny fieron’ny liona tanora;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampahatezitra azy dia mankahà-doza hihatra amin’ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voninahitry ny olona ny hanalavitra ny ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny adala rehetra kosa misafoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny malaina tsy mety miasa amin’ny ririnina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'noho ny ririnina; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: noho ny haben’ny vokatra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hangataka izy raha fararano, fa tsy hahazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rano lalina ny hevitra ao am-pon’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manan-tsaina dia mahay manovo azy ihany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro ny olona samy midera ny soa ataon’ny tenany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay olo-mahatoky, iza moa no mahita azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay olona marina mandeha amin’ny fahitsiany–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ny zanany mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mipetraka eo amin’ny seza fitsarana ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mikororoka manaisotra ny ratsy rehetra ny masony–.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Iza no mahazo manao hoe: Efa nahadio ny foko aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka madio tsy manana ota?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vato mizana samy hafa sy ny vata famarana samy hafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy fahavetavetana eo imason’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Na dia ny zaza aza dia mampiseho amin’ny fanaony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na madio sy mahitsy ny fitondrantenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sofina mandre sy ny maso mahita
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy nataon’i Jehovah avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza tia torimaso hianao, fandrao tonga malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahirato ny masonao, dia ho voky hanina hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ratsy! ratsy! hoy ny mpividy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nony lasa izy, dia mandoka tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ao ihany ny volamena sy ny voahangy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: perla.
    marker-yv: yv-n
  - type: text
    text: ' betsaka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny molotra misy fahalalana no ravaka soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alao ny lambany, fa efa niantoka olon-kafa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tano ho solon’ny vahiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vahiny janga.
    marker-yv: yv-n
  - type: text
    text: ' niantohany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mamin’ny olona ny hanina azo amin’ny fitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo ho feno fasika ny vavany any am-parany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny hevitra rehetra dia aorin’ny fisainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahaizana mandamina tsara no entonao miady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay mandehandeha manaratsy dia manambara ny hevitra afenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa aza miraharaha amin’izay mibedibedy foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay manozona ny rainy na ny reniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho faty ao amin’ny alim-pito ny jirony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny harena malaky azo foana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahamahimahina.
    marker-yv: yv-n
  - type: text
    text: ' eo am-boalohany'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hotahina any am-parany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza manao hoe: Hamaly ny ratsy nataony aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa andraso Jehovah, fa Izy no hamonjy anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fahavetavetana eo imason’i Jehovah ny vato samy hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mizana mandainga dia tsy tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Avy amin’i Jehovah ny dian’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataon’izay olombelona ahoana no hahafantatra ny làlany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fandrika amin’ny olona ny malaky manao hoe: Zavatra masina ity;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nony vita ny voady, vao mamototra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny mpanjaka hendry mikororoka manaisotra ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitarika ny kodia fivelezana eo amboniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jiron’i Jehovah ny fanahin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Itsilovana ny efitrefitra rehetra ao am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Famindrampo sy fahamarinana no miaro ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampitoeriny amin’ny famindrampo ny seza fiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Voninahitry ny zatovo ny fahatanjahany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ravaky ny anti-panahy ny volo fotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny fampangirifiriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratra avy amin’ny kapoka.
    marker-yv: yv-n
  - type: text
    text: ' dia mahafaka ny faharatsiana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kapoka mahadio ny efitrefitra ao an-kibo.
