document_id: PRO.20,873
type_code: plt
verses:
  '1':
  - type: text
    content: Mpaniratsira ny divay, ary mpitabataba ny toaka,
  - type: text
    content: Koa izay miraikiraiky azon’izany dia tsy hendry.
  '10':
  - type: text
    content: Ny vato mizana samy hafa sy ny vata famarana samy hafa
  - type: text
    content: Dia samy fahavetavetana eo imason’i Jehovah.
  '11':
  - type: text
    content: Na dia ny zaza aza dia mampiseho amin’ny fanaony
  - type: text
    content: Na madio sy mahitsy ny fitondrantenany.
  '12':
  - type: text
    content: Ny sofina mandre sy ny maso mahita
  - type: text
    content: Dia samy nataon’i Jehovah avokoa.
  '13':
  - type: text
    content: Aza tia torimaso hianao, fandrao tonga malahelo;
  - type: text
    content: Ahirato ny masonao, dia ho voky hanina hianao.
  '14':
  - type: text
    content: Ratsy! ratsy! hoy ny mpividy;
  - type: text
    content: Kanjo nony lasa izy, dia mandoka tena.
  '15':
  - type: text
    content: Ao ihany ny volamena sy ny voahangy
  - type: note
    content: 'Na: perla.'
  - type: text
    content: ' betsaka;'
  - type: text
    content: Fa ny molotra misy fahalalana no ravaka soa.
  '16':
  - type: text
    content: Alao ny lambany, fa efa niantoka olon-kafa izy,
  - type: text
    content: Ary tano ho solon’ny vahiny
  - type: note
    content: 'Na: vahiny janga.'
  - type: text
    content: ' niantohany.'
  '17':
  - type: text
    content: Mamin’ny olona ny hanina azo amin’ny fitaka;
  - type: text
    content: Kanjo ho feno fasika ny vavany any am-parany.
  '18':
  - type: text
    content: Ny hevitra rehetra dia aorin’ny fisainana,
  - type: text
    content: Ary ny fahaizana mandamina tsara no entonao miady.
  '19':
  - type: text
    content: Izay mandehandeha manaratsy dia manambara ny hevitra afenina,
  - type: text
    content: Koa aza miraharaha amin’izay mibedibedy foana.
  '2':
  - type: text
    content: Ny fampitahoran’ny mpanjaka dia toy ny fieron’ny liona tanora;
  - type: text
    content: Izay mampahatezitra azy dia mankahà-doza hihatra amin’ny ainy.
  '20':
  - type: text
    content: Izay manozona ny rainy na ny reniny,
  - type: text
    content: Dia ho faty ao amin’ny alim-pito ny jirony.
  '21':
  - type: text
    content: Ny harena malaky azo foana
  - type: note
    content: 'Na: mahamahimahina.'
  - type: text
    content: ' eo am-boalohany'
  - type: text
    content: Dia tsy hotahina any am-parany.
  '22':
  - type: text
    content: 'Aza manao hoe: Hamaly ny ratsy nataony aho;'
  - type: text
    content: Fa andraso Jehovah, fa Izy no hamonjy anao.
  '23':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah ny vato samy hafa,
  - type: text
    content: Ary ny mizana mandainga dia tsy tsara.
  '24':
  - type: text
    content: Avy amin’i Jehovah ny dian’ny olona,
  - type: text
    content: Ary hataon’izay olombelona ahoana no hahafantatra ny làlany?
  '25':
  - type: text
    content: 'Fandrika amin’ny olona ny malaky manao hoe: Zavatra masina ity;'
  - type: text
    content: Ka nony vita ny voady, vao mamototra.
  '26':
  - type: text
    content: Ny mpanjaka hendry mikororoka manaisotra ny ratsy fanahy
  - type: text
    content: Sady mitarika ny kodia fivelezana eo amboniny.
  '27':
  - type: text
    content: Jiron’i Jehovah ny fanahin’ny olona,
  - type: text
    content: Itsilovana ny efitrefitra rehetra ao am-po.
  '28':
  - type: text
    content: Famindrampo sy fahamarinana no miaro ny mpanjaka,
  - type: text
    content: Ary ampitoeriny amin’ny famindrampo ny seza fiandrianany.
  '29':
  - type: text
    content: Voninahitry ny zatovo ny fahatanjahany,
  - type: text
    content: Ary ravaky ny anti-panahy ny volo fotsy.
  '3':
  - type: text
    content: Voninahitry ny olona ny hanalavitra ny ady;
  - type: text
    content: Fa ny adala rehetra kosa misafoaka.
  '30':
  - type: text
    content: Ny fampangirifiriana
  - type: note
    content: Heb. ratra avy amin’ny kapoka.
  - type: text
    content: ' dia mahafaka ny faharatsiana,'
  - type: text
    content: Ary ny kapoka mahadio ny efitrefitra ao an-kibo.
  '4':
  - type: text
    content: Ny malaina tsy mety miasa amin’ny ririnina,
  - type: note
    content: 'Na: noho ny ririnina; na: noho ny haben’ny vokatra.'
  - type: text
    content: Ka dia hangataka izy raha fararano, fa tsy hahazo.
  '5':
  - type: text
    content: Rano lalina ny hevitra ao am-pon’ny olona;
  - type: text
    content: Fa izay manan-tsaina dia mahay manovo azy ihany,
  '6':
  - type: text
    content: Maro ny olona samy midera ny soa ataon’ny tenany avy;
  - type: text
    content: Fa izay olo-mahatoky, iza moa no mahita azy?
  '7':
  - type: text
    content: Izay olona marina mandeha amin’ny fahitsiany–
  - type: text
    content: Sambatra ny zanany mandimby azy.
  '8':
  - type: text
    content: Mipetraka eo amin’ny seza fitsarana ny mpanjaka,
  - type: text
    content: Ka mikororoka manaisotra ny ratsy rehetra ny masony–.
  '9':
  - type: text
    content: 'Iza no mahazo manao hoe: Efa nahadio ny foko aho'
  - type: text
    content: Ka madio tsy manana ota?
