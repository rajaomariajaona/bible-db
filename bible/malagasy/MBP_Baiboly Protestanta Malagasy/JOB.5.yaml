document_id: JOB.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Miantsoa ange! moa misy hamaly anao va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza amin’ireo masina no hotodihinao?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia Izay mampilatsaka ranonorana etỳ ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampandeha rano eny amin’ny saha,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ka apetrany amin’ny avo izay ambany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asandrany ho amin’ny fahafinaretana ny miory,–
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia Izay mahafoana ny hevitry ny fetsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hahefan’ny tànany na inona na inona hahasoa ny tenany;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fahafetsen’ny hendry ihany no entiny misambotra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny saina ataon’ny mpiolakolaka dia rava;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Na dia amin’ny antoandro aza dia tafatsarapaka ao amin’ny maizina ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miraparapa amin’ny mitataovovonana tahaka ny amin’ny alina;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa vonjeny kosa ny malahelo tsy ho voan’ny sabatry ny vavany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, vonjeny tsy ho azon’ny tànan’ny mahery izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia misy fanantenana ho an’ny reraka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny faharatsiana kosa mihombom-bava.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Indro, sambatra ny zanak’olombelona izay anarin’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aza atao ho zavatra kely ny famaizan’ny Tsitoha.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa sady mandratra Izy no mamehy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manorotoro Izy, ary ny tànany ihany no manasitrana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Amin’ny fahoriana enina dia hamonjy anao Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, amin’ny fito aza dia tsy hisy loza hihatra aminao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa ny adala dia vonoin’ny fahasosorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kely saina dia matin’ny fialonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny firehetan’ny fahatezerana.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Raha avy ny mosary, dia hiaro anao amin’ny fahafatesana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha avy ny ady, dia hiaro anao tsy ho voan’ny sabatra Izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Hampiereny tsy ho voan’ny kapo-bava hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hatahotra, raha avy ny fandringanana;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny fandringanana sy ny mosary dia hihomehezanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hatahoranao ny bibi-dia;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa vita fanekena amin’ny vato any an-tsaha aza hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny bibi-dia hihavana aminao;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ho hitanao fa ny fiadanana no lainao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mizaha ny kijanao hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho hitanao fa tsy misy very ny ao;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary ho hitanao koa fa maro ny zanakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny terakao ho tahaka ny ahitra amin’ny tany;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Haharitra hianao ambara-piditrao any am-pasana, raha mbola henjana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny amboaram-bary akarina amin’ny fotoana.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Izany ary no izy, fa efa nandinika azy izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hevero ary izany, ka fantaro tsara.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izaho nahita olona adala mamaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa vetivety indray dia tsy maintsy nanozona ny fonenany aho;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lavitra ny famonjena ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka torotoro eo am-bavahady, nefa tsy manan-kamonjy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny vokatry ny taniny dia lanin’ny noana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, alainy na dia voafefy tsilo aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fandrika mitanatana vava hahazo ny fananany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa tsy mivoaka avy amin’ny vovoka ny alahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mitrebona avy amin’ny tany ny fahoriana,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nefa teraka ho amin’ny fahoriana ny olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny fanidin’ny kilalaon’afo miakatra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa raha toa ahy kosa dia hitady an’Andriamanitra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Andriamanitra ihany no hotolorako ny teniko,–
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia Izay manao zava-dehibe tsy takatry ny saina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy zava-mahagaga tsy hita isa,–
