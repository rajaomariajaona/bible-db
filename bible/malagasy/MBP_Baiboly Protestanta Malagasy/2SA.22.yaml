      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' nihodidina tamiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisakana ahy ny fandriky ny fahafatesana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony azom-pahoriana aho, dia niantso an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Andriamanitro no nitarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihaino ny feoko tao an-tempoliny Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fitarainako dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: efa tonga
    - type: text
      text: ' eo an-tsofiny.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nihozongozona sy nihorohoro ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiorenan’ny lanitra nihorohoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nihozongozona ireo, satria tezitra Jehovah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy setroka nisavoana teo am-bavorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary afo avy teo am-bavany no nandevona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nisy vainafo nidedadeda teo aminy.
