document_id: 2SA.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hira fisaorana nataon’i Davida noho ny nandreseny ny fahavalony rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Davida nanao izao fihirana izao ho an’i Jehovah tamin’ny andro namonjen’i Jehovah azy tamin’ny tànan’ny fahavalony rehetra, indrindra fa tamin’ny tànan’i Saoly, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia naondriny ny lanitra, ka nidina Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aizim-pito no teo ambanin’ny tongony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nitaingina kerobima Izy ka nanidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, niseho teo amin’ny ela-drivotra Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanao ny maizina ho tranony manodidina Azy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fivorian-drano sy rahona matevina
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy teo amin’ny famirapiratana teo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy vainafo nidedadeda.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampikotroka tany an-danitra Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Avo Indrindra niloa-peo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nandefa zana-tsipìka Izy ka nampiely ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahavaloko
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nampandeha helatra ka nampifanaritaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hita ny fitoeran-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary niseho ny fanambanin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny teny mafy nataon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fifofofofon’ny fofonain’ny vavorony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naninjitra ny tànany avy tany ambony Izy ka nandray ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanintona ahy niala tamin’ny rano be Izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namonjy ahy tamin’ny fahavaloko mahery Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tamin’izay nankahala ahy, satria tsy leoko ireny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisakana ahy tamin’ny andro nahitako loza ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Jehovah no niseho ho Mpanohana ahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nitondra ahy ho any amin’ny malalaka Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namonjy ahy Izy, satria tiany aho.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanisy soa ahy araka ny fahamarinako Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny fahadiovan’ny tànako no namaliany ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nitandrina ny làlan’i Jehovah aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mba nanao ratsy hialana tamin’Andriamanitro;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitsipiny rehetra dia teo anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny làlany tsy mba nialako;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanan-tsiny taminy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady niaro tena tsy ho azon’ny fahotako;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa namaly ahy araka ny fahamarinako Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia araka ny fahadiovako teo imasony.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona tsara no isehoanao fa tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tena olo-marina no isehoanao fa marina;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny madio no isehoanao fa madio;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miolakolaka.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olona ory dia vonjenao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny masonao manandrina ny mpiavonavona, ka aetrinao ireny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no jiroko, Jehovah ô; Jehovah mampahazava ny fahamaizinako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra vatolampiko, Izy no ialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampingako sy tandroko famonjena Izy ary fiarovana avo ho ahy sy fandosirako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Mpamonjy ahy, mahafaka ahy amin’ny fampahoriana Hianao.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Andriamanitro no ahazoako mitsambikina mihoatra ny mànda.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny amin’Andriamanitra, dia marina ny làlany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’i Jehovah dia voazaha toetra amin’ny memy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no ampingan’izay rehetra mialoka aminy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no Andriamanitra afa-tsy Jehovah?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no vatolampy afa-tsy Andriamanitsika?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany Andriamanitra izany no fiarovana mafy ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondra ny marina amin’ny làlany Izy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ny tongony ho tahaka ny an’ny dieravavy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampitoetra ahy eo amin’ny fitoerako avo Izy.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampianatra ny tànako hiady Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahahenjana tsipìka varahina ny sandriko.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omenao ahy ny ampingan’ny famonjenao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamoram-panahinao no maha-lehibe ahy.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halalahinao ny làlana hodiaviko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mangovitra ny hato-tongotro.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenjika ny fahavaloko aho ka mandripaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba miverina aho mandrapahalany ritrany.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandringana sy mandripaka azy aho, ka tsy maharina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavo eo ambanin’ny tongotro izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantso an’i Jehovah Izay mendrika hoderaina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia vonjena ho afaka amin’ny fahavaloko.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao mampisikina ahy hery hiady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aripakao ho ambaniko izay mitsangana hamely ahy.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ataonao miamboho ahy ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka aringako izay mankahala ahy.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miherikerika izy, fa tsy misy mpamonjy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, maniry an’i Jehovah izy, fa tsy mamaly azy Izy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torotoroiko madinika tahaka ny vovotany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoseko tahaka ny fotaka eny an-dàlana izy ka apariako.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamonjy ahy amin’ny fifanoheran’ny oloko Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy miaro ahy ho lohan’ny firenen-tsamy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena tsy fantatro aza dia manompo ahy.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hafa firenena mikoy ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hafa firenena dia mihaketraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miala amin-kovitra avy ao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.46 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao Sal. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'xviii.46. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny dikan’ny teny Hebreo eto dia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misikina avy ao, etc.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fiarovany mafy.'
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velona Jehovah; isaorana anie ny Vatolampiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandratra anie Andriamanitry ny vatolampy famonjena ahy,
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Andriamanitra, Izay manao famaliana ho ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampanaiky ny firenena ahy,
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Ilay mitondra ahy ho afaka amin’ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manandratra ahy ho ambonin’izay mitsangana hanohitra ahy Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamonjy ahy amin’ny olon-dozabe;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nihodidina tamiko ny onjan’ny fahafatesana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny riaky ny faharatsiana nampahatahotra ahy.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no hiderako Anao eny amin’ny firenen-tsamy hafa, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hankalazako ny anaranao.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao famonjen-dehibe ho an’ny mpanjaka voatendriny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamindra fo amin’ny voahosony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’i Davida sy ny taranany mandrakizay.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny famatoran’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
