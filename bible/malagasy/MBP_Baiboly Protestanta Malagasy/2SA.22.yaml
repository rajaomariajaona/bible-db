document_id: 2SA.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaorana nataon’i Davida noho ny nandreseny ny fahavalony rehetra.
  - type: text
    content: 'ARY Davida nanao izao fihirana izao ho an’i Jehovah tamin’ny andro namonjen’i Jehovah azy tamin’ny tànan’ny fahavalony rehetra, indrindra fa tamin’ny tànan’i Saoly, '
  '10':
  - type: text
    content: Dia naondriny ny lanitra, ka nidina Izy;
  - type: text
    content: Ary aizim-pito no teo ambanin’ny tongony.
  '11':
  - type: text
    content: Dia nitaingina kerobima Izy ka nanidina,
  - type: text
    content: Eny, niseho teo amin’ny ela-drivotra Izy.
  '12':
  - type: text
    content: Efa nanao ny maizina ho tranony manodidina Azy Izy,
  - type: text
    content: Dia fivorian-drano sy rahona matevina
  '13':
  - type: text
    content: Ary avy teo amin’ny famirapiratana teo anatrehany
  - type: text
    content: Nisy vainafo nidedadeda.
  '14':
  - type: text
    content: Dia nampikotroka tany an-danitra Jehovah,
  - type: text
    content: Ny Avo Indrindra niloa-peo.
  '15':
  - type: text
    content: 'Dia nandefa zana-tsipìka Izy ka nampiely ny '
  - type: text
    content: fahavaloko
  - type: text
    content: ','
  - type: text
    content: Ary nampandeha helatra ka nampifanaritaka azy.
  '16':
  - type: text
    content: Dia hita ny fitoeran-dranomasina,
  - type: text
    content: Ary niseho ny fanambanin’ny tany,
  - type: text
    content: Noho ny teny mafy nataon’i Jehovah,
  - type: text
    content: Noho ny fifofofofon’ny fofonain’ny vavorony.
  '17':
  - type: text
    content: Naninjitra ny tànany avy tany ambony Izy ka nandray ahy;
  - type: text
    content: Nanintona ahy niala tamin’ny rano be Izy.
  '18':
  - type: text
    content: Namonjy ahy tamin’ny fahavaloko mahery Izy
  - type: text
    content: Sy tamin’izay nankahala ahy, satria tsy leoko ireny.
  '19':
  - type: text
    content: Nisakana ahy tamin’ny andro nahitako loza ireny,
  - type: text
    content: Nefa Jehovah no niseho ho Mpanohana ahy.
  '2':
  - type: text
    content: 'ka hoy izy:'
  - type: text
    content: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy,
  '20':
  - type: text
    content: Dia nitondra ahy ho any amin’ny malalaka Izy;
  - type: text
    content: Namonjy ahy Izy, satria tiany aho.
  '21':
  - type: text
    content: Nanisy soa ahy araka ny fahamarinako Jehovah;
  - type: text
    content: Araka ny fahadiovan’ny tànako no namaliany ahy.
  '22':
  - type: text
    content: Fa nitandrina ny làlan’i Jehovah aho
  - type: text
    content: Ka tsy mba nanao ratsy hialana tamin’Andriamanitro;
  '23':
  - type: text
    content: Ny fitsipiny rehetra dia teo anatrehako,
  - type: text
    content: Ary ny làlany tsy mba nialako;
  '24':
  - type: text
    content: Tsy nanan-tsiny taminy aho
  - type: text
    content: Sady niaro tena tsy ho azon’ny fahotako;
  '25':
  - type: text
    content: Koa namaly ahy araka ny fahamarinako Jehovah,
  - type: text
    content: Dia araka ny fahadiovako teo imasony.
  '26':
  - type: text
    content: Ny olona tsara no isehoanao fa tsara;
  - type: text
    content: Ny tena olo-marina no isehoanao fa marina;
  '27':
  - type: text
    content: Ny madio no isehoanao fa madio;
  - type: text
    content: Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina.
  - type: note
    content: Heb. miolakolaka.
  '28':
  - type: text
    content: Fa ny olona ory dia vonjenao;
  - type: text
    content: Fa ny masonao manandrina ny mpiavonavona, ka aetrinao ireny.
  '29':
  - type: text
    content: Fa Hianao no jiroko, Jehovah ô; Jehovah mampahazava ny fahamaizinako.
  '3':
  - type: text
    content: Andriamanitra vatolampiko, Izy no ialofako,
  - type: text
    content: Ampingako sy tandroko famonjena Izy ary fiarovana avo ho ahy sy fandosirako;
  - type: text
    content: Ry Mpamonjy ahy, mahafaka ahy amin’ny fampahoriana Hianao.
  '30':
  - type: text
    content: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko;
  - type: text
    content: Ary Andriamanitro no ahazoako mitsambikina mihoatra ny mànda.
  '31':
  - type: text
    content: Raha ny amin’Andriamanitra, dia marina ny làlany;
  - type: text
    content: Ny tenin’i Jehovah dia voazaha toetra amin’ny memy;
  - type: text
    content: Jehovah no ampingan’izay rehetra mialoka aminy.
  '32':
  - type: text
    content: Fa iza no Andriamanitra afa-tsy Jehovah?
  - type: text
    content: Ary iza no vatolampy afa-tsy Andriamanitsika?
  '33':
  - type: text
    content: Izany Andriamanitra izany no fiarovana mafy ho ahy;
  - type: text
    content: Mitondra ny marina amin’ny làlany Izy.
  '34':
  - type: text
    content: Ary manao ny tongony ho tahaka ny an’ny dieravavy Izy;
  - type: text
    content: Mampitoetra ahy eo amin’ny fitoerako avo Izy.
  '35':
  - type: text
    content: Mampianatra ny tànako hiady Izy,
  - type: text
    content: Ka mahahenjana tsipìka varahina ny sandriko.
  '36':
  - type: text
    content: Omenao ahy ny ampingan’ny famonjenao;
  - type: text
    content: Ary ny fahamoram-panahinao no maha-lehibe ahy.
  '37':
  - type: text
    content: Halalahinao ny làlana hodiaviko,
  - type: text
    content: Ka tsy mangovitra ny hato-tongotro.
  '38':
  - type: text
    content: Manenjika ny fahavaloko aho ka mandripaka azy;
  - type: text
    content: Ary tsy mba miverina aho mandrapahalany ritrany.
  '39':
  - type: text
    content: Mandringana sy mandripaka azy aho, ka tsy maharina izy;
  - type: text
    content: Lavo eo ambanin’ny tongotro izy.
  '4':
  - type: text
    content: Miantso an’i Jehovah Izay mendrika hoderaina aho,
  - type: text
    content: Ka dia vonjena ho afaka amin’ny fahavaloko.
  '40':
  - type: text
    content: Hianao mampisikina ahy hery hiady;
  - type: text
    content: Aripakao ho ambaniko izay mitsangana hamely ahy.
  '41':
  - type: text
    content: Ary ataonao miamboho ahy ny fahavaloko;
  - type: text
    content: Ka aringako izay mankahala ahy.
  '42':
  - type: text
    content: Miherikerika izy, fa tsy misy mpamonjy,
  - type: text
    content: Eny, maniry an’i Jehovah izy, fa tsy mamaly azy Izy.
  '43':
  - type: text
    content: Torotoroiko madinika tahaka ny vovotany izy;
  - type: text
    content: Hoseko tahaka ny fotaka eny an-dàlana izy ka apariako.
  '44':
  - type: text
    content: Mamonjy ahy amin’ny fifanoheran’ny oloko Hianao
  - type: text
    content: Sy miaro ahy ho lohan’ny firenen-tsamy hafa;
  - type: text
    content: Ny firenena tsy fantatro aza dia manompo ahy.
  '45':
  - type: text
    content: Ny hafa firenena mikoy ahy;
  - type: text
    content: Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy.
  '46':
  - type: text
    content: Ny hafa firenena dia mihaketraka
  - type: text
    content: Ka miala amin-kovitra avy ao
  - type: note
    content: Izahao Sal. xviii.46. Ny dikan’ny teny Hebreo eto dia misikina avy ao, etc.
  - type: text
    content: ' amin’ny fiarovany mafy.'
  '47':
  - type: text
    content: Velona Jehovah; isaorana anie ny Vatolampiko;
  - type: text
    content: Asandratra anie Andriamanitry ny vatolampy famonjena ahy,
  '48':
  - type: text
    content: Dia Andriamanitra, Izay manao famaliana ho ahy
  - type: text
    content: Ka mampanaiky ny firenena ahy,
  '49':
  - type: text
    content: Dia Ilay mitondra ahy ho afaka amin’ny fahavaloko;
  - type: text
    content: Eny, manandratra ahy ho ambonin’izay mitsangana hanohitra ahy Hianao
  - type: text
    content: Ary mamonjy ahy amin’ny olon-dozabe;
  '5':
  - type: text
    content: Fa nihodidina tamiko ny onjan’ny fahafatesana.
  - type: text
    content: Ary ny riaky ny faharatsiana nampahatahotra ahy.
  '50':
  - type: text
    content: Koa izany no hiderako Anao eny amin’ny firenen-tsamy hafa, Jehovah ô,
  - type: text
    content: Sy hankalazako ny anaranao.
  '51':
  - type: text
    content: Manao famonjen-dehibe ho an’ny mpanjaka voatendriny Izy
  - type: text
    content: Ary mamindra fo amin’ny voahosony,
  - type: text
    content: Dia amin’i Davida sy ny taranany mandrakizay.
  '6':
  - type: text
    content: Ny famatoran’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' nihodidina tamiko,'
  - type: text
    content: Nisakana ahy ny fandriky ny fahafatesana.
  '7':
  - type: text
    content: Fony azom-pahoriana aho, dia niantso an’i Jehovah,
  - type: text
    content: Eny, Andriamanitro no nitarainako;
  - type: text
    content: Nihaino ny feoko tao an-tempoliny Izy,
  - type: text
    content: 'Ary ny fitarainako dia '
  - type: text
    content: efa tonga
  - type: text
    content: ' eo an-tsofiny.'
  '8':
  - type: text
    content: Dia nihozongozona sy nihorohoro ny tany,
  - type: text
    content: Ary ny fiorenan’ny lanitra nihorohoro,
  - type: text
    content: Eny, nihozongozona ireo, satria tezitra Jehovah.
  '9':
  - type: text
    content: Nisy setroka nisavoana teo am-bavorony,
  - type: text
    content: Ary afo avy teo am-bavany no nandevona
  - type: text
    content: Ka nisy vainafo nidedadeda teo aminy.
