document_id: PHP.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary amin’izany, ry rahalahy sady malalako no mahamanina ahy, fifaliako sy satroboninahitro, tomoera tsara ao amin’ny Tompo hianareo, ry malalako.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ARY faly indrindra ao amin’ny Tompo aho, satria nampitsimohinareo indray ankehitriny ny fiheverana ahy, izay efa noheverinareo rahateo, saingy tsy mbola nahita andro hanaovana hianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tsy filan-javatra anefa no anaovako izany; fa izaho efa nianatra tsy hierina na manao ahoana na manao ahoana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mahalala hietry aho, ary mahalala hitombo; na aiza na aiza, ary na amin’inona na amin’inona, dia efa nampianarina ny ho voky sy ho noana aho ary hanam-be sy halahelo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mahay ny zavatra rehetra aho ao amin’Ilay mampahery ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Kanefa nanao soa hianareo no niaraka ory tamiko ka niantra ahy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary fantatrareo koa, ry Filipiana, fa tamin’ny niandohan’ny filazantsara, rehefa niala tany Makedonia aho, tsy nisy fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' nanan-draharaha tamiko ny amin’ny fanomezana sy fandraisana, afa-tsy hianareo ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa fony tany Tesalonika aza aho, dia nampanatitra ho ahy indray mandeha amana indroa hianareo hamonjy ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nefa tsy toy ny mitady ny fanomezana no ilazako izany; fa mitady ny vokatra izay hitombo ho voninahitrareo aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa manana ny zavatra rehetra aho sady manana amby ampy aza; feno aho, rehefa nandray tamin’i Epafrodito ilay zavatra nampitondrainareo, dia hanitra ankasitrahana, fanatitra tian’Andriamanitra sady ankasitrahany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa Andriamanitro hahatanteraka izay rehetra tokony ho anareo araka ny hareny amin’ny voninahitra ao amin’i Kristy Jesosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mananatra an’i Eodia aho, ary mananatra an’i Syntyke, mba hiray saina ao amin’ny Tompo izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ho an’Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay. Amena.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Manaova veloma ny olona masina rehetra ao amin’i Kristy Jesosy. Manao veloma anareo ny rahalahy izay ato amiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Manao veloma anareo ny olona masina rehetra, indrindra fa ny ankohonan’i Kaisara.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, mangataka aminao koa aho, ry ilay tena mpiara-miasa amiko, manampia azy roa vavy, fa niara-niasa fatratra tamiko teo amin’ny filazantsara izy, mbamin’i Klementa koa sy ny mpiara-miasa amiko sisa, izay voasoratra ao amin’ny bokin’ny fiainana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mifalia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Veloma.
      marker-yv: yv-n
    - type: text
      text: ' mandrakariva amin’ny Tompo; hoy izaho indray: Mifalia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Veloma.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aoka ho fantatry ny olona rehetra ny fandeferanareo. Efa mby akaiky ny Tompo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Aza manahy na inona na inona; fa aoka ny fivavahana sy ny fifonana mbamin’ny fisaorana no ho entinareo manambara ny fangatahanareo amin’Andriamanitra amin’ny zavatra rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny fiadanan’Andriamanitra, izay mihoatra noho ny fahalalana rehetra, hiaro ny fonareo sy ny hevitrareo ao amin’i Kristy Jesosy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Farany, ry rahalahy, na inona na inona marina, na inona na inona manan-kaja, na inona na inona mahitsy, na inona na inona madio, na inona na inona mahate-ho-tia, na inona na inona tsara laza, raha misy hatsaram-panahy, ary raha misy dera, dia hevero izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ataovy izay efa nianaranareo sy efa noraisinareo ary efa renareo sy efa hitanareo tamiko; ary ho aminareo ny Andriamanitry ny fiadanana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saotra nataon’i Paoly ny Filipiana noho ny fanomezana nampitondrainy an’i Epafrodito, ary fanaovam-beloma sy tsodrano.
    marker-yv: yv-h
