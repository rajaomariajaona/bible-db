document_id: PHP.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary amin’izany, ry rahalahy sady malalako no mahamanina ahy, fifaliako sy satroboninahitro, tomoera tsara ao amin’ny Tompo hianareo, ry malalako.
  '10':
  - type: text
    content: 'ARY faly indrindra ao amin’ny Tompo aho, satria nampitsimohinareo indray ankehitriny ny fiheverana ahy, izay efa noheverinareo rahateo, saingy tsy mbola nahita andro hanaovana hianareo. '
  '11':
  - type: text
    content: 'Tsy filan-javatra anefa no anaovako izany; fa izaho efa nianatra tsy hierina na manao ahoana na manao ahoana. '
  '12':
  - type: text
    content: 'Mahalala hietry aho, ary mahalala hitombo; na aiza na aiza, ary na amin’inona na amin’inona, dia efa nampianarina ny ho voky sy ho noana aho ary hanam-be sy halahelo. '
  '13':
  - type: text
    content: 'Mahay ny zavatra rehetra aho ao amin’Ilay mampahery ahy. '
  '14':
  - type: text
    content: Kanefa nanao soa hianareo no niaraka ory tamiko ka niantra ahy.
  '15':
  - type: text
    content: Ary fantatrareo koa, ry Filipiana, fa tamin’ny niandohan’ny filazantsara, rehefa niala tany Makedonia aho, tsy nisy fiangonana
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' nanan-draharaha tamiko ny amin’ny fanomezana sy fandraisana, afa-tsy hianareo ihany. '
  '16':
  - type: text
    content: 'Fa fony tany Tesalonika aza aho, dia nampanatitra ho ahy indray mandeha amana indroa hianareo hamonjy ahy. '
  '17':
  - type: text
    content: 'Nefa tsy toy ny mitady ny fanomezana no ilazako izany; fa mitady ny vokatra izay hitombo ho voninahitrareo aho. '
  '18':
  - type: text
    content: 'Fa manana ny zavatra rehetra aho sady manana amby ampy aza; feno aho, rehefa nandray tamin’i Epafrodito ilay zavatra nampitondrainareo, dia hanitra ankasitrahana, fanatitra tian’Andriamanitra sady ankasitrahany. '
  '19':
  - type: text
    content: Fa Andriamanitro hahatanteraka izay rehetra tokony ho anareo araka ny hareny amin’ny voninahitra ao amin’i Kristy Jesosy.
  '2':
  - type: text
    content: 'Mananatra an’i Eodia aho, ary mananatra an’i Syntyke, mba hiray saina ao amin’ny Tompo izy. '
  '20':
  - type: text
    content: Ary ho an’Andriamanitra Raintsika anie ny voninahitra mandrakizay mandrakizay. Amena.
  '21':
  - type: text
    content: 'Manaova veloma ny olona masina rehetra ao amin’i Kristy Jesosy. Manao veloma anareo ny rahalahy izay ato amiko. '
  '22':
  - type: text
    content: Manao veloma anareo ny olona masina rehetra, indrindra fa ny ankohonan’i Kaisara.
  '23':
  - type: text
    content: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompo.
  '3':
  - type: text
    content: Eny, mangataka aminao koa aho, ry ilay tena mpiara-miasa amiko, manampia azy roa vavy, fa niara-niasa fatratra tamiko teo amin’ny filazantsara izy, mbamin’i Klementa koa sy ny mpiara-miasa amiko sisa, izay voasoratra ao amin’ny bokin’ny fiainana.
  '4':
  - type: text
    content: Mifalia
  - type: note
    content: 'Na: Veloma.'
  - type: text
    content: ' mandrakariva amin’ny Tompo; hoy izaho indray: Mifalia.'
  - type: note
    content: 'Na: Veloma.'
  '5':
  - type: text
    content: Aoka ho fantatry ny olona rehetra ny fandeferanareo. Efa mby akaiky ny Tompo.
  '6':
  - type: text
    content: 'Aza manahy na inona na inona; fa aoka ny fivavahana sy ny fifonana mbamin’ny fisaorana no ho entinareo manambara ny fangatahanareo amin’Andriamanitra amin’ny zavatra rehetra. '
  '7':
  - type: text
    content: Ary ny fiadanan’Andriamanitra, izay mihoatra noho ny fahalalana rehetra, hiaro ny fonareo sy ny hevitrareo ao amin’i Kristy Jesosy.
  '8':
  - type: text
    content: 'Farany, ry rahalahy, na inona na inona marina, na inona na inona manan-kaja, na inona na inona mahitsy, na inona na inona madio, na inona na inona mahate-ho-tia, na inona na inona tsara laza, raha misy hatsaram-panahy, ary raha misy dera, dia hevero izany. '
  '9':
  - type: text
    content: Ataovy izay efa nianaranareo sy efa noraisinareo ary efa renareo sy efa hitanareo tamiko; ary ho aminareo ny Andriamanitry ny fiadanana.
  - type: heading
    content: Saotra nataon’i Paoly ny Filipiana noho ny fanomezana nampitondrainy an’i Epafrodito, ary fanaovam-beloma sy tsodrano.
