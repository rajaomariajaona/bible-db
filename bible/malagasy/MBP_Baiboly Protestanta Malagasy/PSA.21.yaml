document_id: PSA.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, ny herinao no hifalian’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary endrey ny haben’ny hiravoravoany amin’ny famonjenao!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vokany.
      marker-yv: yv-n
    - type: text
      text: ' haringanao tsy ho eo amin’ny tany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany tsy ho eo amin’ny zanak’olombelona;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nikasa hanisy ratsy anao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka namoron-kevi-dratsy, fa tsy nahefa.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hampiamboho azy hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsipìkanao no ikendrenao ny tavany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata amin’ny herinao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira sy hankalaza ny herinao izahay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nirin’ny fony dia nomenao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nangatahin’ny molony tsy mba nolavinao.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa notsenainao fitahiana soa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo an-dohany nasianao satroboninahitra tena volamena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aina no nangatahiny taminao, dia nomenao azy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia andro lava mandrakizay doria.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny voninahiny amin’ny famonjenao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laza sy voninahitra no nataonao taminy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nataonao ho fitahiana mandrakizay izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampifalinao indrindra amin’ny tavanao izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpanjaka matoky an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho ny famindrampon’ny Avo Indrindra dia tsy hangozohozo izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho azon’ny tànanao ny fahavalonao rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho azon’ny tànanao ankavanana ny mankahala anao;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataonao tahaka ny fatana misy afo mirehitra izy amin’ny andro hisehoanao–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah handany azy amin’ny fahatezerany, ary handevona azy ny afo–
