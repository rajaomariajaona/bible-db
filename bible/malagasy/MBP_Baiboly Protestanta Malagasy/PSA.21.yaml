document_id: PSA.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, ny herinao no hifalian’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary endrey ny haben’ny hiravoravoany amin’ny famonjenao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny nirin’ny fony dia nomenao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nangatahin’ny molony tsy mba nolavinao.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa notsenainao fitahiana soa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teo an-dohany nasianao satroboninahitra tena volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aina no nangatahiny taminao, dia nomenao azy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia andro lava mandrakizay doria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lehibe ny voninahiny amin’ny famonjenao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laza sy voninahitra no nataonao taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa nataonao ho fitahiana mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampifalinao indrindra amin’ny tavanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ny mpanjaka matoky an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho ny famindrampon’ny Avo Indrindra dia tsy hangozohozo izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho azon’ny tànanao ny fahavalonao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho azon’ny tànanao ankavanana ny mankahala anao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hataonao tahaka ny fatana misy afo mirehitra izy amin’ny andro hisehoanao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah handany azy amin’ny fahatezerany, ary handevona azy ny afo–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny zanany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vokany.
    marker-yv: yv-n
  - type: text
    text: ' haringanao tsy ho eo amin’ny tany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranany tsy ho eo amin’ny zanak’olombelona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa nikasa hanisy ratsy anao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka namoron-kevi-dratsy, fa tsy nahefa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa hampiamboho azy hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tsipìkanao no ikendrenao ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misandrata amin’ny herinao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihira sy hankalaza ny herinao izahay.
