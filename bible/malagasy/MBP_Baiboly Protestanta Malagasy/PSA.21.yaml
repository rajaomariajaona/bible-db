document_id: PSA.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, ny herinao no hifalian’ny mpanjaka;
  - type: text
    content: Ary endrey ny haben’ny hiravoravoany amin’ny famonjenao!
  '10':
  - type: text
    content: Ny zanany
  - type: note
    content: Heb. vokany.
  - type: text
    content: ' haringanao tsy ho eo amin’ny tany,'
  - type: text
    content: Ary ny taranany tsy ho eo amin’ny zanak’olombelona;
  '11':
  - type: text
    content: Fa nikasa hanisy ratsy anao izy
  - type: text
    content: Ka namoron-kevi-dratsy, fa tsy nahefa.
  '12':
  - type: text
    content: Fa hampiamboho azy hianao;
  - type: text
    content: Ny tsipìkanao no ikendrenao ny tavany.
  '13':
  - type: text
    content: Misandrata amin’ny herinao, Jehovah ô,
  - type: text
    content: Hihira sy hankalaza ny herinao izahay.
  '2':
  - type: text
    content: Ny nirin’ny fony dia nomenao azy,
  - type: text
    content: Ary ny nangatahin’ny molony tsy mba nolavinao.
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Fa notsenainao fitahiana soa izy;
  - type: text
    content: Teo an-dohany nasianao satroboninahitra tena volamena.
  '4':
  - type: text
    content: Aina no nangatahiny taminao, dia nomenao azy izany,
  - type: text
    content: Dia andro lava mandrakizay doria.
  '5':
  - type: text
    content: Lehibe ny voninahiny amin’ny famonjenao;
  - type: text
    content: Laza sy voninahitra no nataonao taminy.
  '6':
  - type: text
    content: Fa nataonao ho fitahiana mandrakizay izy;
  - type: text
    content: Ampifalinao indrindra amin’ny tavanao izy.
  '7':
  - type: text
    content: Fa ny mpanjaka matoky an’i Jehovah,
  - type: text
    content: Ary noho ny famindrampon’ny Avo Indrindra dia tsy hangozohozo izy.
  '8':
  - type: text
    content: Ho azon’ny tànanao ny fahavalonao rehetra;
  - type: text
    content: Eny, ho azon’ny tànanao ankavanana ny mankahala anao;
  '9':
  - type: text
    content: Hataonao tahaka ny fatana misy afo mirehitra izy amin’ny andro hisehoanao–
  - type: text
    content: Jehovah handany azy amin’ny fahatezerany, ary handevona azy ny afo–
