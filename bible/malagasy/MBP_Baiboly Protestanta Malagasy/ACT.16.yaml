document_id: ACT.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: Dia tonga tany Derbe sy Lystra koa izy; ary, indro, nisy mpianatra anankiray teo atao hoe Timoty–zanaky ny vehivavy Jiosy izay nino, fa jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' rainy– '
  '10':
  - type: text
    content: Ary nony nahita ny fahitana izy, dia nitady handeha niaraka tamin’izay hankany Makedonia izahay, satria nataonay fa Andriamanitra no efa niantso anay hitory ny filazantsara amin’ny olona any.
  '11':
  - type: text
    content: 'Ary nony niondrana an-tsambo niala tany Troasy izahay, dia nizotra nankany Samotrakia; ary nony ampitso dia nankany Neapolia. '
  '12':
  - type: text
    content: Ary nony niala teo izahay, dia nankany Filipy, izay tanàna voalohany amin’izany zara-tanin’i Makedonia izany sady zana-panjakana;
  - type: note
    content: Gr. kolonia.
  - type: text
    content: ' ary nitoetra teo amin’izany tanàna izany andro vitsivitsy izahay.'
  '13':
  - type: text
    content: 'Ary tamin’ny andro Sabata dia nivoaka teo ivelan’ny vavahady izahay nankeny amoron’ony, izay nataonay fa nisy fitoerana fivavahana; ary nipetraka teo izahay ka niresaka tamin’ny vehivavy vory teo. '
  '14':
  - type: text
    content: 'Ary nisy vehivavy atao hoe Lydia, mpivarotra lamba volomparasy, avy any an-tanàna Tyatira, izay nivavaka tamin’Andriamanitra, dia nihaino izy, ary ny Tompo nanokatra ny fony hitandrina ny teny izay nolazain’i Paoly. '
  '15':
  - type: text
    content: 'Ary rehefa natao batisa ravehivavy mbamin’ny ankohonany, dia nangataka izy nanao hoe: Raha ataonareo ho mahatoky amin’ny Tompo aho, dia midira ao an-tranoko ka mitoera ao. Dia nanery anay izy.'
  '16':
  - type: text
    content: 'Ary raha nandeha ho any amin’ilay fitoerana fivavahana izahay, dia nisy ankizivavy anankiray nanam-panahy mahavaly nifanena taminay, ary ny faminaniana nataony no nahazoan’ny tompony harena be. '
  '17':
  - type: text
    content: 'Izy nanaraka an’i Paoly sy izahay ka niantso hoe: Ireo lehilahy ireo dia mpanompon’Andriamanitra Avo Indrindra, izay manoro anareo làlam-pamonjena. '
  '18':
  - type: text
    content: 'Ary nataony tamin’ny andro maro izany. Ary sosotra Paoly, dia nitodika taminy ka nanao tamin’ny fanahy hoe: Mandidy anao amin’ny anaran’i Jesosy Kristy aho hivoaka aminy. Dia nivoaka tamin’izany ora izany indrindra izy.'
  '19':
  - type: text
    content: 'Ary nony hitan’ireo tompony fa very ny fanantenany hahazoany harena, dia nisambotra an’i Paoly sy Silasy izy ka nitondra azy ho any an-tsena any amin’ny lehibe; '
  '2':
  - type: text
    content: 'ary tsara laza teo amin’ny rahalahy tany Lystra sy Ikonioma izy. '
  '20':
  - type: text
    content: 'ary rehefa nentiny tany amin’ireo governora izy roa lahy, dia nolazainy hoe: Ireto lehilahy Jiosy ireto mampitabataba ny tanànantsika loatra '
  '21':
  - type: text
    content: 'ka mampianatra fanao tsy mety horaisintsika na hataontsika, fa Romana isika. '
  '22':
  - type: text
    content: 'Ary ny vahoaka niara-nitsangana hamely azy; ary ireo governora nanaisotra ny lambany, ka nasainy nokapohina tamin’ny hazo izy. '
  '23':
  - type: text
    content: 'Ary nony efa nokapohiny mafy dia mafy izy, dia nataony tao an-trano-maizina, ka nasainy niambina azy tsara ny mpiandry trano-maizina. '
  '24':
  - type: text
    content: Ary rehefa nahazo teny toy izany ralehilahy, dia nataony tao amin’ny trano-maizina anatiny indrindra izy, ary ny tongony nobolokiny mafy tamin’ny boloky hazo.
  '25':
  - type: text
    content: 'Ary nony namatonalina, dia nivavaka sy nihira fiderana an’Andriamanitra Paoly sy Silasy; ary nihaino azy ny mpifatotra. '
  '26':
  - type: text
    content: 'Ary nisy horohorontany mafy dia mafy avy tampoka, ka nihozongozona ny fanorenen’ny trano-maizina; dia nivoha niaraka tamin’izay ny varavarana rehetra, ary nivaha avokoa ny fatoran’izy rehetra. '
  '27':
  - type: text
    content: 'Dia nahatsiaro ny mpiandry trano-maizina ka nahita ny varavaran’ny trano-maizina nivoha, dia nanatsoaka ny sabany izy ka saiky hamono tena, satria nataony fa efa nandositra ny mpifatotra. '
  '28':
  - type: text
    content: 'Fa Paoly niantso tamin’ny feo mahery ka nanao hoe: Aza mamono tena, fa ato ihany izahay rehetra. '
  '29':
  - type: text
    content: 'Ary izy niantso jiro, dia nikaretsaka niditra sady toran-kovitra ka niankohoka teo anatrehan’i Paoly sy Silasy. '
  '3':
  - type: text
    content: Koa tian’i Paoly ho entiny miaraka aminy izy; dia nalainy izy ka noforany noho ny Jiosy tany amin’izany tany izany, satria fantatr’izy rehetra fa jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' rainy. '
  '30':
  - type: text
    content: 'Ary rehefa nentiny nivoaka izy roa lahy, dia hoy izy: Tompoko, inona no mety hataoko, mba hovonjena aho? '
  '31':
  - type: text
    content: 'Dia hoy izy roa lahy: Minoa an’i Jesosy Tompo, dia hovonjena hianao sy ny ankohonanao. '
  '32':
  - type: text
    content: 'Ary izy roa lahy nitory ny tenin’ny Tompo taminy sy tamin’izay rehetra tao an-tranony. '
  '33':
  - type: text
    content: 'Ary nandray azy roa lahy izy tamin’izany ora amin’ny alina izany ka nanasa ny dian-kapoka; ary natao batisa tamin’izay izy mbamin’izay azy rehetra. '
  '34':
  - type: text
    content: Ary rehefa nentiny niakatra ho ao an-trano izy roa lahy, dia norosoany hanina teo anoloany, dia nifaly indrindra izy mbamin’izay rehetra tao an-tranony, satria efa nino an’Andriamanitra.
  '35':
  - type: text
    content: 'Ary rehefa maraina ny andro, ireo governora dia naniraka ny mpitan-defona ka nanao hoe: Alefaso ireo olona ireo. '
  '36':
  - type: text
    content: 'Ary ny mpiandry trano-maizina nilaza izany teny izany tamin’i Paoly hoe: Ireo governora efa naniraka handefa anareo, koa ankehitriny mivoaha hianareo ka mandehana soa aman-tsara. '
  '37':
  - type: text
    content: 'Fa hoy Paoly taminy: Efa nokapohiny tsy voatsara teo amin’ny miharihary izahay, kanefa Romana izahay, ka nataony tao an-trano-maizina, ary ankehitriny moa mamoaka anay mangingina va izy? Tsia, fa aoka izy ihany ho hankatỳ hamoaka anay. '
  '38':
  - type: text
    content: 'Ary ny mpitan-defona nilaza izany teny izany tamin’ireo governora; dia natahotra izy, raha nahare fa Romana izy roa lahy. '
  '39':
  - type: text
    content: 'Dia tonga izy ka nanony azy sady nitondra azy nivoaka ary nangataka azy handeha hiala ao an-tanàna. '
  '4':
  - type: text
    content: Ary raha nandeha nitety ny tanàna tao izy, dia natolony hotandreman’ny olona ireo didy navoaky ny Apostoly sy ny loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' tany Jerosalema. '
  '40':
  - type: text
    content: Dia niala tao an-trano-maizina, izy ka niditra tao an-tranon’i Lydia; ary rehefa nahita ny rahalahy izy, dia nananatra azy ka lasa nandeha.
  '5':
  - type: text
    content: Ary nihanahery finoana ny fiangonana sady nihamaro isan-andro.
  - type: heading
    content: Ny niantsoan’Andriamanitra an’i Paoly hankany Makedonia, sy ny nataon’i Paoly tao Filipy.
  '6':
  - type: text
    content: 'ARY rehefa noraran’ny Fanahy Masina tsy hitory ny teny tany Asia izy, dia nandeha namaky ny tany Frygia sy Galatia '
  '7':
  - type: text
    content: 'ka efa tonga tany an-tsisin’i Mysia, dia nitady hankany Bitynia izy, fa tsy navelan’ny Fanahin’i Jesosy. '
  '8':
  - type: text
    content: Ary rehefa nandalo an’i Mysia izy, dia nidina nankany Troasy.
  '9':
  - type: text
    content: 'Ary nony alina dia nisy fahitana niseho tamin’i Paoly, koa, indro, nisy lehilahy Makedoniana nitsangana teo ka nangataka azy hoe: Mità mankatỳ Makedonia, ka vonjeo izahay! '
