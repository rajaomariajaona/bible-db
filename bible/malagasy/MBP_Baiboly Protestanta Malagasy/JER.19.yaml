document_id: JER.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny tavoara vaky.
  - type: text
    content: 'IZAO no lazain’i Jehovah: Andeha mividy tavoara tanimanga, ary makà anti-panahy amin’ny vahoaka sy anti-panahy amin’ny mpisorona, '
  '10':
  - type: text
    content: 'Dia torotoroy eo imason’ny olona izay miaraka aminao ilay tavoara, '
  '11':
  - type: text
    content: 'ka ataovy aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Toy izao no hanorotoroako ity firenena sy ity tanàna ity, dia toy ny famakin’ny mpanefy tanimanga ny vilany tany, ka tsy azo atambatra intsony. Ary any Tofeta aza no handevenany noho ny tsi-fisian-tany hafa handevenana. '
  '12':
  - type: text
    content: 'Dia toy izany no hataoko amin’ity tanàna ity sy amin’izay mponina ato, ka dia hatao tahaka an’i Tofeta ity tanàna ity, hoy Jehovah. '
  '13':
  - type: text
    content: Ary ny tranon’i Jerosalema sy ny tranon’ny mpanjakan’ny Joda dia ho tonga maloto tahaka an’i Tofeta, dia ny trano rehetra izay nandoroany ditin-kazo manitra teo an-tampony ho an’izay rehetra eny amin’ny lanitra sy nanidinany fanatitra aidina ho an’izay andriamani-kafa.
  - type: heading
    content: Ny faminanian’i Jeremia ny loza, sy ny nanoheran’i Pasora azy
  '14':
  - type: text
    content: 'ARY Jeremia dia tonga avy tany Tofeta, izay nanirahan’i Jehovah azy haminany, ka nitsangana teo amin’ny kianjan’ny tranon’i Jehovah izy, dia nanao tamin’ny vahoaka rehetra hoe: '
  '15':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Indro, hataoko mihatra amin’ity tanàna ity sy amin’ny zana-bohiny rehetra ny loza rehetra izay nolazaiko hatao aminy noho ny nanamafiany ny hatony tsy hihainoany ny teniko.'
  '2':
  - type: text
    content: dia mivoaha ho any amin’ny Lohasahan’ny taranak’i Hinoma, izay eo anoloan’ny vavahady Harsota,
  - type: note
    content: Harsota = tavim-bilany(?)
  - type: text
    content: ' ary torio eo ny teny izay holazaiko aminao, '
  '3':
  - type: text
    content: 'ka ataovy hoe: Mihainoa ny tenin’i Jehovah, ry mpanjakan’ny Joda sy ry mponina ato Jerosalema! Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Indro, hahatonga loza amin’ity tanàna ity Aho–izay mandre izany, dia hangintsingintsina ny sofiny– '
  '4':
  - type: text
    content: 'satria efa nahafoy Ahy izy ka nahatonga ity tanàna ity ho hafahafa, fa nandoro ditin-kazo manitra tato ho an’andriamani-kafa, izay tsy fantany, na fantatry ny razany, na ny mpanjakan’ny Joda, sady efa nameno ran’ny marina ity tanàna ity '
  '5':
  - type: text
    content: ary nanorina ny fitoerana avo ho an’i Bala handoroany ny zanany ho fanatitra dorana ho an’i Bala, izay tsy nandidiako, na nolazaiko, na tao an-tsaiko akory aza.
  '6':
  - type: text
    content: 'Koa, indro, avy ny andro, hoy Jehovah, izay tsy hanaovana ity fitoerana ity intsony hoe Tofeta, na Lohasahan’ny taranak’i Hinoma, fa Lohasaha Famonoana kosa. '
  '7':
  - type: text
    content: Ary hofoanako
  - type: note
    content: Heb. hararako.
  - type: text
    content: ' amin’ity tanàna ity ny fisainan’ny Joda sy Jerosalema, ka hataoko lavon-tsabatra eo anoloan’ny fahavalony sy amin’ny tànan’izay mitady ny ainy izy; ary ny fatiny dia homeko ho fihinan’ny voro-manidina sy ny bibi-dia. '
  '8':
  - type: text
    content: 'Ary ity tanàna ity dia hataoko ho figagana sy ho zavatra mampisitrisitra, ka izay rehetra mandalo azy dia ho gaga sady hisitrisitra noho ny loza rehetra efa namelezana azy. '
  '9':
  - type: text
    content: Ary hampihinaniko ny nofon’ny zanani-lahy sy ny nofon’ny zanani-vavy izy, ary samy hihinana ny nofon’ny namany avy izy eo amin’ny fahirano sy ny fahaterena, izay haneren’ny fahavalony sy izay mitady ny ainy azy.
