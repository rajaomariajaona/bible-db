document_id: 1CH.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Filaharan’ny firazanana hatramin’i Adama ka hatramin’i Abrahama.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ADAMA, Seta, Enosy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Kosy niteraka an’i Nimroda; izy no voalohany izay tonga olona mahery teo ambonin’ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Mizraima niteraka ny Lodita sy ny Anamita sy ny Lehabita sy ny Naftohita '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'sy ny Patrosita sy ny Kaslohita (izay nihavian’ny Filistina) ary ny Kaftorita. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Kanana niteraka an’i Sidona, lahimatoany, sy Heta '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary ny Jebosita sy ny Amorita sy ny Girgasita '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'sy ny Hivita sy ny Arkita sy ny Sinita '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: sy ny Arvadita sy ny Zemarita ary ny Hamatita.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny zanakalahin’i Sema dia Elama sy Asyra sy Arpaksada sy Loda sy Arama sy Oza sy Hola sy Gatera ary Maseka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary Arpaksada niteraka an’i Sela; ary Sela niteraka an’i Ebera. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Ebera niteraka roa lahy: ny anaran’ny iray natao hoe Palega'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Palega = Fizarana.
      marker-yv: yv-n
    - type: text
      text: ', satria tamin’ny androny no nizarana ny tany; ary Joktana no anaran’ny rahalahiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Kenana, Mahalalila, Jareda, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Joktana niteraka an’i Almodada sy Salefa sy Hazarmaveta sy Jera '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'sy Hadorama sy Ozala sy Dikla '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'sy Ebala sy Abimaela sy Sheba '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: sy Ofira sy Havila ary Jobaba; ireo rehetra ireo no zanakalahin’i Joktana.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Sema, Arpaksada, Sela, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ebera, Palega, Reo, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Seroga, Nahora, Tera, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Abrama (dia Abrahama izany).
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny taranak’i Abrahama sy Isaka ary Esao sy Jakoba.
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'NY zanakalahin’i Abrahama dia Isaka sy Isimaela. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Izao no taranany: Nebaiota, lahimatoan’Isimaela, dia Kedara sy Abdela sy Mibsama '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Enoka, Metosela, Lameka, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'sy Misma sy Doma sy Masa sy Hadada sy Tema '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'sy Jetora sy Nafisy ary Kedma. Ireo no zanakalahin’Isimaela. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary ny zanakalahin’i Ketora, vaditsindranon’i Abrahama: izy no niteraka an’i Zimrama sy Joksana sy Medana sy Midiana sy Jisbaka ary Soaha. Ary ny zanakalahin’i Joksana dia Sheba sy Dedana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary ny zanakalahin’i Midiana dia Efaha sy Efera sy Hanoka sy Abida ary Eldaha. Ireo rehetra ireo no zanakalahin’i Ketora.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary Abrahama niteraka an’Isaka. Ny zanakalahin’i Isaka dia Esao sy Isiraely.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny zanakalahin’i Esao dia Elifaza sy Regoela sy Jeosy sy Jalama ary Kora. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ny zanak’i Elifaza dia Temana sy Omara sy Zefo sy Gatama sy Kenaza sy Timna ary Amaleka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ny zanakalahin’i Regoela dia Nahata sy Zera sy Sama ary Miza. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary ny zanakalahin’i Seïra dia Lotana sy Sobala sy Zibona sy Ana sy Disona sy Ezera ary Disana. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary ny zanakalahin’i Lotana dia Hory sy Homama; ary Timna no anabavin’i Lotana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Noa, Sema, Hama ary Jafeta.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary ny zanakalahin’i Sobala dia Aliana sy Manahata sy Ebala sy Sefy ary Onama. Ary ny zanakalahin’i Zibona dia Aia sy Ana. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary ny zanakalahin’i Ana dia Disona. Ary ny zanakalahin’i Disona dia Hamrana sy Esbana sy Jitrana ary Kerana. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary ny zanakalahin i Ezera dia Bilana sy Zavana ary Jakana. Ny zanakalahin’i Disana dia Oza sy Arana.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary izao no mpanjaka izay nanjaka tany amin’ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Zanak’Isiraely: Bela, zanak’i Beora; ary Dinaba no anaran’ny tanànany. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary maty Bela, dia nanjaka nandimby azy Jobaba, zanak’i Zera, avy any Bozra. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary maty Jobaba, dia nanjaka nandimby azy Hosama, avy any amin’ny tanin’ny Temanita. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary maty Hosama, dia nanjaka nandimby azy Hadada, zanak’i Bedada, izay namely ny Midianita tany amin’ny tany Moaba; ary Avita no anaran’ny tanànany. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary maty Hadada, dia nanjaka nandimby azy Samla avy any Masreka. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ary maty Samla, dia nanjaka nandimby azy Saoly avy any Rehobota eo amoron’ny Ony. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Ary maty Saoly, dia nanjaka nandimby azy Bala-hanana, zanak’i Akbora. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny zanakalahin’i Jafeta dia Gomera sy Magoga sy Maday sy Javana sy Tobala sy Maseka ary Tirasa. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary maty Bala-hanana, dia nanjaka nandimby azy Hadada; ary Pao no anaran’ny tanànany; ary ny anaran’ny vadiny dia Mehetabela, zanakavavin’i Matreda, zanakavavin’i Me-zahaba. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Dia maty koa Hadada.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loham-pirenen’i Edoma dia Timna loham-pireneny, Alva loham-pireneny, Jetata loham-pireneny, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Oholibama loham-pireneny, Elaha loham-pireneny, Pinona loham-pireneny, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Kenaza loham-pireneny, Temana loham-pireneny, Mibzara loham-pireneny, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Magdiela loham-pireneny, Irama loham-pireneny. Ireo no loham-pirenenen’i Edoma.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny zanakalahin’i Gomera dia Askenaza sy Rifata ary Togarma. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny zanakalahin’i Javana dia Elisaha sy Tarsisy sy ny Kitima ary ny Dodanita.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny zanakalahin’i Hama dia Kosy sy Mizraima sy Pota ary Kanana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny zanakalahin’i Kosy dia Seba sy Havila sy Sabta sy Ragama ary Sabteka. Ary ny zanakalahin’i Ragama dia Seba sy Dedana. '
