document_id: JOB.36,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary mbola nandroso niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: text
    content: Dia manokatra ny sofiny hihaino fananarana Izy
  - type: text
    content: Ka mandidy azy hibebaka hiala amin’ny ratsy.
  '11':
  - type: text
    content: Raha mihaino ka manaiky Azy izy,
  - type: text
    content: Dia lany amin’ny fiadanana ny androny,
  - type: text
    content: Ary ny taonany amin’ny fahafinaretana.
  '12':
  - type: text
    content: Fa raha tsy mihaino kosa izy,
  - type: text
    content: Dia ho voan’ny fiadiana
  - type: text
    content: Ka ho faty tsy amim-pahalalana.
  '13':
  - type: text
    content: Fa ny mpihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' dia mirakitra fahatezerana;'
  - type: text
    content: Tsy mitaraina izy, na dia afatony aza;
  '14':
  - type: text
    content: Ka dia maty raha mbola tanora izy,
  - type: text
    content: Eny, afaka ny ainy eo amin’ny olom-betaveta,
  - type: note
    content: Dia ny olona mpanolo-tena ho amin’ny fijangajangana ho fanompoan-tsampy; izahao Deo. xxiii. 19.
  '15':
  - type: text
    content: Fa ny fahorian’ny ory kosa no entin’Andriamanitra mamonjy azy,
  - type: text
    content: Ary ny manjo azy no entiny manokatra ny sofiny.
  '16':
  - type: text
    content: Ary na dia hianao aza dia ampialainy amin’ny fahaterena
  - type: text
    content: Ho amin’ny malalaka izay tsy misy mahatery;
  - type: text
    content: Ary ny matavy indrindra no aroso ho eo ambonin’ny latabatrao.
  '17':
  - type: text
    content: Nefa raha fatra-pikikitra amin’ny adin’ny ratsy fanahy hianao,
  - type: text
    content: 'Dia hihazona '
  - type: text
    content: anao
  - type: text
    content: ' ny ady sy ny fanamelohana;'
  - type: note
    content: 'Na: Dia hifanakaiky ny ady sy ny fanamelohana.'
  '18':
  - type: text
    content: Aoka tsy hamporisika anao hiteny ratsy ny fahatezerana,
  - type: text
    content: Ary aoka tsy hampivily hevitra anao ny halehiben’ny avotra.
  '19':
  - type: text
    content: Moa hahatonga anao ho ao amin’izay tsy misy fahoriana va ny fitarainanao
  - type: text
    content: Na izay rehetra tratry ny fahatanjahana?
  '2':
  - type: text
    content: Mahareta kely amiko, dia hambarako aminao,
  - type: text
    content: Fa mbola misy teny holazaina hanamarina an’Andriamanitra.
  '20':
  - type: text
    content: Aza irinao ny hihavian’ny alina,
  - type: text
    content: Izay ampialana ny olona amin’ny fitoerany.
  '21':
  - type: text
    content: Tandremo, aza mivily ho amin’ny ratsy;
  - type: text
    content: Fa saingy ozoim-pahoriana hianao, dia mifidy izany.
  '22':
  - type: text
    content: Indro, Andriamanitra miasa amin’ny heriny mampiseho ny fisandratany;
  - type: text
    content: Iza no mba mpampianatra tahaka Azy?
  '23':
  - type: text
    content: Iza no efa nandidy Azy ny amin’izay làlan-kalehany?
  - type: text
    content: 'Ary iza no efa nilaza taminy hoe: Efa nanao ratsy Hianao?'
  '24':
  - type: text
    content: Tsarovy ny hankalaza ny asany,
  - type: text
    content: Izay efa nataon’ny olona an-kira.
  '25':
  - type: text
    content: Fa faly mahita izany ny olona rehetra;
  - type: text
    content: Ary jeren’ny zanak’olombelona eny lavitra eny izany.
  '26':
  - type: text
    content: Indro, lehibe Andriamanitra, ka tsy takatry ny saintsika Izy;
  - type: text
    content: Ary tsy hita isa ny taonany.
  '27':
  - type: text
    content: Fa mampisavoana ny rano Izy,
  - type: text
    content: Dia milatsaka ho ranonorana aman-javona izany,
  '28':
  - type: text
    content: Izay aidin’ny rahona
  - type: text
    content: Ka alatsany amin’ny olona maro be.
  '29':
  - type: text
    content: Ary koa, iza moa no mahalala ny amin’ny fivelatry ny rahona
  - type: text
    content: Sy ny fikotrokotroka ao an-dainy?
  '3':
  - type: text
    content: Halaiko avy lavitra ny fahalalako,
  - type: text
    content: Ka hanamarina ny Mpanao ahy aho.
  '30':
  - type: text
    content: Indro, mamelatra ny fahazavany eo amboniny Izy
  - type: text
    content: Ary manao ny fanambanin’ny ranomasina ho firakofany.
  '31':
  - type: text
    content: Fa ireny zavatra ireny no itsarany ny firenena
  - type: text
    content: Sady anomezany hanina betsaka.
  '32':
  - type: text
    content: Mifono fahazavana ny tànany,
  - type: text
    content: Ary baikoiny iny mba hahavoa ny fahavalony;
  - type: note
    content: 'Na: Ary baikoiny iny toy ny fanaon’ny mpikendry zavatra.'
  '33':
  - type: text
    content: Ny fikotrokotrony dia manambara Azy,
  - type: text
    content: Ary ny omby aman-ondry koa aza milaza ny hihaviany.
  '4':
  - type: text
    content: Fa tsy lainga tsy akory ny teniko;
  - type: text
    content: Lehilahy tanteraka amin’ny fahalalana no eto aminao.
  '5':
  - type: text
    content: Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga;
  - type: text
    content: Lehibe amin’ny herin’ny fahalalana Izy.
  '6':
  - type: text
    content: Tsy mitsimbina ny ain’ny ratsy fanahy Izy,
  - type: text
    content: Fa manome rariny ho an’ny ory.
  '7':
  - type: text
    content: Tsy mampiala ny masony amin’ny marina Izy.
  - type: text
    content: Eo amin’ny mpanjaka ambonin’ny seza fiandrianany
  - type: text
    content: No ampitoerany azy ho mandrakizay, ka dia tafasandratra.
  '8':
  - type: text
    content: Ary raha voafatotra amin’ny gadra izy
  - type: text
    content: Sy voafehy amin’ny tadin’ny fahoriana.
  '9':
  - type: text
    content: Dia ambarany azy ny asany sy ny fahotany,
  - type: text
    content: Fa efa nanandra-tena izy ireny.
