document_id: PSA.57,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamindrampo sy fahatokiana an’Andriamanitra, na dia hodidinim-pahavalo aza.
  - type: text
    content: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida tamin’ny nandosirany an’i Saoly tao anaty zohy.
  - type: text
    content: MAMINDRÀ fo amiko, Andriamanitra ô, mamindrà fo amiko;
  - type: text
    content: Fa Hianao no ialofan’ny fanahiko;
  - type: text
    content: Eny, ao amin’ny aloky ny elatrao no ialofako,
  - type: text
    content: Mandra-pahalasan’ny loza.
  '10':
  - type: text
    content: Fa lehibe mihatra amin’ny lanitra ny famindramponao
  - type: text
    content: Ary mihatra amin’ny rahona ny fahamarinanao.
  '11':
  - type: text
    content: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô;
  - type: text
    content: Aoka ho ambonin’ny tany rehetra ny voninahitrao.
  '2':
  - type: text
    content: Hitaraina amin’Andriamanitra Avo Indrindra aho,
  - type: text
    content: Dia amin’Andriamanitra Izay mahatanteraka ho ahy.
  '3':
  - type: text
    content: Haniraka avy any an-danitra Izy ka hamonjy ahy,
  - type: text
    content: Raha miteny ratsy izay misafoaka manenjika ahy;
  - type: text
    content: '[Sela.]'
  - type: text
    content: Eny, Andriamanitra haniraka ny famindrampony sy ny fahamarinany.
  '4':
  - type: text
    content: Ny fanahiko dia eo afovoan’ny liona;
  - type: text
    content: Handry eo amin’ny masiaka aho,
  - type: text
    content: Dia eo amin’ny zanak’olombelona,–
  - type: text
    content: Lefona sy zana-tsipìka ny nifiny, ary sabatra maranitra ny lelany.
  '5':
  - type: text
    content: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô!
  - type: text
    content: Aoka ho ambonin’ny tany rehetra ny voninahitrao.
  '6':
  - type: text
    content: Efa namela-pandrika harato haningotra ny diako izy
  - type: text
    content: Ary nampitanondrika ny fanahiko;
  - type: note
    content: 'Na: nitanondrika ny fanahiko.'
  - type: text
    content: Nihady lavaka teo anoloako izy,
  - type: text
    content: Kanjo ny tenany ihany no latsaka ao anatiny.
  - type: text
    content: '[Sela.]'
  '7':
  - type: text
    content: Tafatoetra ny foko, Andriamanitra ô, eny, tafatoetra ny foko;
  - type: text
    content: Hihira sy hankalaza aho.
  '8':
  - type: text
    content: Mifohaza, ry voninahitro;
  - type: text
    content: Mifohaza, ry valiha sy lokanga;
  - type: text
    content: Hifoha maraina koa
  - type: note
    content: 'Na: Hampifoha ny maraina aho.'
  - type: text
    content: ' aho.'
  '9':
  - type: text
    content: Hidera Anao eny amin’ny vahoaka aho, Tompo ô,
  - type: text
    content: Hankalaza Anao eny amin’ny firenena aho.
