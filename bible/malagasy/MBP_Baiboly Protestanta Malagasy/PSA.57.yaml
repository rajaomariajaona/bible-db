document_id: PSA.57,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fangataham-pamindrampo sy fahatokiana an’Andriamanitra, na dia hodidinim-pahavalo aza.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida tamin’ny nandosirany an’i Saoly tao anaty zohy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MAMINDRÀ fo amiko, Andriamanitra ô, mamindrà fo amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no ialofan’ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ao amin’ny aloky ny elatrao no ialofako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahalasan’ny loza.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lehibe mihatra amin’ny lanitra ny famindramponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihatra amin’ny rahona ny fahamarinanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ambonin’ny tany rehetra ny voninahitrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitaraina amin’Andriamanitra Avo Indrindra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’Andriamanitra Izay mahatanteraka ho ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haniraka avy any an-danitra Izy ka hamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miteny ratsy izay misafoaka manenjika ahy;
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Andriamanitra haniraka ny famindrampony sy ny fahamarinany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahiko dia eo afovoan’ny liona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handry eo amin’ny masiaka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo amin’ny zanak’olombelona,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lefona sy zana-tsipìka ny nifiny, ary sabatra maranitra ny lelany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho ambonin’ny tany rehetra ny voninahitrao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa namela-pandrika harato haningotra ny diako izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nampitanondrika ny fanahiko;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nitanondrika ny fanahiko.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihady lavaka teo anoloako izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo ny tenany ihany no latsaka ao anatiny.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tafatoetra ny foko, Andriamanitra ô, eny, tafatoetra ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira sy hankalaza aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, ry voninahitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, ry valiha sy lokanga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifoha maraina koa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hampifoha ny maraina aho.
      marker-yv: yv-n
    - type: text
      text: ' aho.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao eny amin’ny vahoaka aho, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankalaza Anao eny amin’ny firenena aho.
