document_id: GEN.22
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nizahan’Andriamanitra toetra an’i Abrahama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa afaka izany zavatra izany, dia nizahan’Andriamanitra toetra Abrahama, ka hoy Izy taminy: Ry Abrahama ô! ary hoy izy: Inty aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy: Ento ny zanakao, ny lahitokanao, izay tianao, dia Isaka, ka mankanesa any amin’ny tany Moria;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moria = Asehon’i Jehovah.
    marker-yv: yv-n
  - type: text
    text: ' ary atero any izy ho fanatitra dorana ao amin’ny tendrombohitra anankiray izay holazaiko aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nifoha maraina koa Abrahama, dia nanisy lasely ny borikiny ka nitondra zatovony roa lahy koa niaraka taminy sy Isaka zanany; ary namaky ny hazo hataina amin’ny fanatitra dorana izy, dia niainga ka nankany amin’ny tany izay efa nolazain’Andriamanitra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony tamin’ny andro fahatelo Abrahama dia nanopy ny masony ka nahatazana ny tany tery lavitra ery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Abrahama tamin’ny zatovony: Mijanòna eto amin’ny boriky hianareo, fa izaho sy ny zazalahy handeha hankery; ary hivavaka izahay, dia hiverina eto aminareo indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nalain’i Abrahama ny hazo hataina amin’ny fanatitra dorana ka natataony an’Isaka zanany; fa izy kosa nitondra ny afo sy ny antsy teny an-tànany; ary dia niara-nandeha izy mianaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Isaka niteny tamin’i Abrahama rainy ka nanao hoe: Ry ikaky ô! dia hoy izy: Inty aho, anaka. Ary hoy izy: Indreto ny afo sy ny kitay; fa aiza kosa izay ondry hatao fanatitra dorana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy Abrahama: Anaka, Andriamanitra no hahita izay ondry hatao fanatitra dorana; dia niara-nandeha izy mianaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa tonga teo amin’ny tany izay efa nolazain’Andriamanitra taminy izy, dia nanorina ny alitara teo Abrahama ka nandahatra ny kitay; dia namatotra an’Isaka zanany izy ka nametraka azy tambonin’ny alitara teo ambonin’ny kitay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Abrahama naninjitra ny tànany ka nandray ny antsy mba hamonoany ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa niantso azy Ilay Anjelin’i Jehovah tany an-danitra ka nanao hoe: Ry Abrahama, ry Abrahama ô! ary hoy kosa izy: Inty aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Izy: Aza maninjitra ny tànanao amin’ny zazalahy, ary aza maninona azy akory hianao; fa hitako izao fa matahotra an’Andriamanitra hianao, ka tsy narovanao tamiko ny zanakao, dia ny lahitokanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Abrahama niherika nijery, ka, indro, nisy ondrilahy teo ivohony, voasangazotry ny kirihitrala ny tandrony; dia lasa Abrahama ka naka ny ondrilahy ary nanatitra azy ho fanatitra dorana ho solon’ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny anaran’izany tany izany dia nataon’i Abrahama hoe Jehovah-jire;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jehovah-jire = Jehovah no hahita.
    marker-yv: yv-n
  - type: text
    text: ' dia izany no anaovana mandraka ankehitriny ny hoe: ,Any an-tendrombohitra no hisehoan’i Jehovah.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Any an-tendrombohitr’i Jehovah no hahitana
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niantso an’i Abrahama fanindroany any an-danitra Ilay Anjelin’i Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nanao hoe: Ny tenako no nianianako, hoy Jehovah: Satria nanao izany zavatra izany hianao ka tsy niaro ny zanakao, ilay lahitokanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia hitahy anao tokoa Aho ary hahamaro dia hahamaro ny taranakao, ho tahaka ny kintana eny amin’ny lanitra sy ho tahaka ny fasika izay any amoron-dranomasina; ary ny taranakao hahazo ny vavahadin’ny fahavalony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary ny taranakao horaisin’ny firenena rehetra ho fiarahabana ny tenany.
    marker-yv: yv-n
  - type: text
    text: ' –satria nanaiky ny teniko hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Abrahama dia niverina nankeny amin’ny zatovony; dia niainga izy ka niaraka nankany Beri-sheba; ary Abrahama dia nonina tany Beri-sheba.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’i Nahora.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY rehefa afaka izany, dia nisy nanambara tamin’i Abrahama hoe: Indro, efa niteraka zazalahy koa Milka tamin’i Nahora rahalahinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia Oza lahimatoany sy Boza lahiaivo ary Kemoela, rain’i Arama, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary Kaseda sy Hazo sy Pildasy sy Jidlafa ary Betoela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Betoela niteraka an-dRebeka. Ireo valo ireo no naterak’i Milka tamin’i Nahora, rahalahin’i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny vaditsindranony, izay atao hoe Reoma, izy koa dia niteraka an’i Teba sy Gahama sy Tahasy ary Meaka.
