document_id: GEN.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nizahan’Andriamanitra toetra an’i Abrahama.
  - type: text
    content: 'ARY rehefa afaka izany zavatra izany, dia nizahan’Andriamanitra toetra Abrahama, ka hoy Izy taminy: Ry Abrahama ô! ary hoy izy: Inty aho. '
  '10':
  - type: text
    content: 'Ary Abrahama naninjitra ny tànany ka nandray ny antsy mba hamonoany ny zanany. '
  '11':
  - type: text
    content: 'Fa niantso azy Ilay Anjelin’i Jehovah tany an-danitra ka nanao hoe: Ry Abrahama, ry Abrahama ô! ary hoy kosa izy: Inty aho. '
  '12':
  - type: text
    content: 'Dia hoy Izy: Aza maninjitra ny tànanao amin’ny zazalahy, ary aza maninona azy akory hianao; fa hitako izao fa matahotra an’Andriamanitra hianao, ka tsy narovanao tamiko ny zanakao, dia ny lahitokanao. '
  '13':
  - type: text
    content: Ary Abrahama niherika nijery, ka, indro, nisy ondrilahy teo ivohony, voasangazotry ny kirihitrala ny tandrony; dia lasa Abrahama ka naka ny ondrilahy ary nanatitra azy ho fanatitra dorana ho solon’ny zanany.
  '14':
  - type: text
    content: Ary ny anaran’izany tany izany dia nataon’i Abrahama hoe Jehovah-jire;
  - type: note
    content: Jehovah-jire = Jehovah no hahita.
  - type: text
    content: ' dia izany no anaovana mandraka ankehitriny ny hoe: ,Any an-tendrombohitra no hisehoan’i Jehovah.’'
  - type: note
    content: 'Na: Any an-tendrombohitr’i Jehovah no hahitana'
  '15':
  - type: text
    content: 'Dia niantso an’i Abrahama fanindroany any an-danitra Ilay Anjelin’i Jehovah '
  '16':
  - type: text
    content: 'ka nanao hoe: Ny tenako no nianianako, hoy Jehovah: Satria nanao izany zavatra izany hianao ka tsy niaro ny zanakao, ilay lahitokanao, '
  '17':
  - type: text
    content: 'dia hitahy anao tokoa Aho ary hahamaro dia hahamaro ny taranakao, ho tahaka ny kintana eny amin’ny lanitra sy ho tahaka ny fasika izay any amoron-dranomasina; ary ny taranakao hahazo ny vavahadin’ny fahavalony; '
  '18':
  - type: text
    content: ary amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany,
  - type: note
    content: 'Na: ary ny taranakao horaisin’ny firenena rehetra ho fiarahabana ny tenany.'
  - type: text
    content: ' –satria nanaiky ny teniko hianao.'
  '19':
  - type: text
    content: Ary Abrahama dia niverina nankeny amin’ny zatovony; dia niainga izy ka niaraka nankany Beri-sheba; ary Abrahama dia nonina tany Beri-sheba.
  - type: heading
    content: Ny taranak’i Nahora.
  '2':
  - type: text
    content: 'Ary hoy Izy: Ento ny zanakao, ny lahitokanao, izay tianao, dia Isaka, ka mankanesa any amin’ny tany Moria;'
  - type: note
    content: Moria = Asehon’i Jehovah.
  - type: text
    content: ' ary atero any izy ho fanatitra dorana ao amin’ny tendrombohitra anankiray izay holazaiko aminao.'
  '20':
  - type: text
    content: 'ARY rehefa afaka izany, dia nisy nanambara tamin’i Abrahama hoe: Indro, efa niteraka zazalahy koa Milka tamin’i Nahora rahalahinao, '
  '21':
  - type: text
    content: 'dia Oza lahimatoany sy Boza lahiaivo ary Kemoela, rain’i Arama, '
  '22':
  - type: text
    content: 'ary Kaseda sy Hazo sy Pildasy sy Jidlafa ary Betoela. '
  '23':
  - type: text
    content: 'Ary Betoela niteraka an-dRebeka. Ireo valo ireo no naterak’i Milka tamin’i Nahora, rahalahin’i Abrahama. '
  '24':
  - type: text
    content: Ary ny vaditsindranony, izay atao hoe Reoma, izy koa dia niteraka an’i Teba sy Gahama sy Tahasy ary Meaka.
  '3':
  - type: text
    content: 'Ary nifoha maraina koa Abrahama, dia nanisy lasely ny borikiny ka nitondra zatovony roa lahy koa niaraka taminy sy Isaka zanany; ary namaky ny hazo hataina amin’ny fanatitra dorana izy, dia niainga ka nankany amin’ny tany izay efa nolazain’Andriamanitra taminy. '
  '4':
  - type: text
    content: 'Nony tamin’ny andro fahatelo Abrahama dia nanopy ny masony ka nahatazana ny tany tery lavitra ery. '
  '5':
  - type: text
    content: 'Ary hoy Abrahama tamin’ny zatovony: Mijanòna eto amin’ny boriky hianareo, fa izaho sy ny zazalahy handeha hankery; ary hivavaka izahay, dia hiverina eto aminareo indray. '
  '6':
  - type: text
    content: Dia nalain’i Abrahama ny hazo hataina amin’ny fanatitra dorana ka natataony an’Isaka zanany; fa izy kosa nitondra ny afo sy ny antsy teny an-tànany; ary dia niara-nandeha izy mianaka.
  '7':
  - type: text
    content: 'Ary Isaka niteny tamin’i Abrahama rainy ka nanao hoe: Ry ikaky ô! dia hoy izy: Inty aho, anaka. Ary hoy izy: Indreto ny afo sy ny kitay; fa aiza kosa izay ondry hatao fanatitra dorana? '
  '8':
  - type: text
    content: 'Fa hoy Abrahama: Anaka, Andriamanitra no hahita izay ondry hatao fanatitra dorana; dia niara-nandeha izy mianaka.'
  '9':
  - type: text
    content: 'Ary rehefa tonga teo amin’ny tany izay efa nolazain’Andriamanitra taminy izy, dia nanorina ny alitara teo Abrahama ka nandahatra ny kitay; dia namatotra an’Isaka zanany izy ka nametraka azy tambonin’ny alitara teo ambonin’ny kitay. '
