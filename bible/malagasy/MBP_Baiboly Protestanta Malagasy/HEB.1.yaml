document_id: HEB.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fampitahana an’i Kristy sy ny anjely.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'REHEFA nampitenenin’Andriamanitra tamin’ny razana fahiny ny mpaminany tamin’ny andro samy hafa sy ny fanao samy hafa; '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izao koa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Hianao, Jehovah ô, tany aloha no nanorenanao ny tany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asan’ny tànanao ny lanitra;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo dia ho levona, fa Hianao no maharitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy rehetra ho rovitra toy ny fitafiana,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny lamba no hamalonanao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy ny fitafiana, ka hovana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no tsy miova,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taonanao no tsy ho tapitra’’ (Sal. 102.25–27).
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa anjely iza no mba nilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Mipetraha eo an-tànako ankavanana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao’’? (Sal. 110.1.)
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tsy fanahy manompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manao fanompoam-pivavahana.
      marker-yv: yv-n
    - type: text
      text: ' va izy rehetra, nirahina hanao fanompoana ho an’izay handova famonjena?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia amin’izao andro farany izao kosa no nampitenenany tamintsika ny Zanany, Izay voatendriny ho Mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy koa no famirapiratan’ny voninahiny sy endriky ny tenany indrindra ary mihazona ny zavatra rehetra amin’ny herin’ny teniny; ary rehefa nanao fanadiovana hahafaka ny fahotana Izy, dia nipetraka teo amin’ny tànana ankavanan’ny Lehibe any amin’ny avo '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka natao tsara noho ny anjely, araka ny nandovany anarana tsara noho ireny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa anjely iza no mba nilazany hoe: ,,Zanako Hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho niteraka Anao andro-any’’? (Sal. 2.7).
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary koa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Izaho ho Rainy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy ho Zanako’’? (2 Sam. 7.14)
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary raha mitondra ny Lahimatoa ho amin’izao fiainana izao indray, dia hoy Izy: ,,Ary aoka ny anjelin’Andriamanitra rehetra hiankohoka eo anoloany’’ (Sal. 97.7). '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ary ny anjely dia ilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Izy manao ny anjeliny ho rivotra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanompony ho lelafo’’ (Sal. 104.4).
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny Zanaka kosa dia nilazany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tehim-pahitsiana no tehim-panjakanao;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tianao ny fahamarinana, fa halanao ny heloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihoatra noho ny namanao’’ (Sal. 45.6, 7).
