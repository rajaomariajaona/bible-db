document_id: HEB.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana an’i Kristy sy ny anjely.
  - type: text
    content: 'REHEFA nampitenenin’Andriamanitra tamin’ny razana fahiny ny mpaminany tamin’ny andro samy hafa sy ny fanao samy hafa; '
  '10':
  - type: text
    content: 'Ary izao koa:'
  - type: text
    content: ',,Hianao, Jehovah ô, tany aloha no nanorenanao ny tany,'
  - type: text
    content: Ary asan’ny tànanao ny lanitra;
  '11':
  - type: text
    content: Ireo dia ho levona, fa Hianao no maharitra;
  - type: text
    content: Ary izy rehetra ho rovitra toy ny fitafiana,
  '12':
  - type: text
    content: Ary toy ny lamba no hamalonanao azy,
  - type: text
    content: Dia toy ny fitafiana, ka hovana izy;
  - type: text
    content: Fa Hianao no tsy miova,
  - type: text
    content: Ary ny taonanao no tsy ho tapitra’’ (Sal. 102.25–27).
  '13':
  - type: text
    content: 'Fa anjely iza no mba nilazany hoe:'
  - type: text
    content: ',,Mipetraha eo an-tànako ankavanana,'
  - type: text
    content: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao’’? (Sal. 110.1.)
  '14':
  - type: text
    content: Tsy fanahy manompo
  - type: note
    content: 'Na: manao fanompoam-pivavahana.'
  - type: text
    content: ' va izy rehetra, nirahina hanao fanompoana ho an’izay handova famonjena?'
  '2':
  - type: text
    content: 'dia amin’izao andro farany izao kosa no nampitenenany tamintsika ny Zanany, Izay voatendriny ho Mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao, '
  '3':
  - type: text
    content: 'Izy koa no famirapiratan’ny voninahiny sy endriky ny tenany indrindra ary mihazona ny zavatra rehetra amin’ny herin’ny teniny; ary rehefa nanao fanadiovana hahafaka ny fahotana Izy, dia nipetraka teo amin’ny tànana ankavanan’ny Lehibe any amin’ny avo '
  '4':
  - type: text
    content: ka natao tsara noho ny anjely, araka ny nandovany anarana tsara noho ireny.
  '5':
  - type: text
    content: 'Fa anjely iza no mba nilazany hoe: ,,Zanako Hianao,'
  - type: text
    content: Izaho niteraka Anao andro-any’’? (Sal. 2.7).
  - type: text
    content: 'Ary koa:'
  - type: text
    content: ',,Izaho ho Rainy,'
  - type: text
    content: Ary Izy ho Zanako’’? (2 Sam. 7.14)
  '6':
  - type: text
    content: 'Ary raha mitondra ny Lahimatoa ho amin’izao fiainana izao indray, dia hoy Izy: ,,Ary aoka ny anjelin’Andriamanitra rehetra hiankohoka eo anoloany’’ (Sal. 97.7). '
  '7':
  - type: text
    content: 'Ary ny anjely dia ilazany hoe:'
  - type: text
    content: ',,Izy manao ny anjeliny ho rivotra,'
  - type: text
    content: Ary ny mpanompony ho lelafo’’ (Sal. 104.4).
  '8':
  - type: text
    content: 'Fa ny Zanaka kosa dia nilazany hoe:'
  - type: text
    content: ',,Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria;'
  - type: text
    content: Ary ny tehim-pahitsiana no tehim-panjakanao;
  '9':
  - type: text
    content: Tianao ny fahamarinana, fa halanao ny heloka;
  - type: text
    content: Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana Anao
  - type: text
    content: Mihoatra noho ny namanao’’ (Sal. 45.6, 7).
