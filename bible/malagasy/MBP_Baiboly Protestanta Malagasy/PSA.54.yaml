document_id: PSA.54,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamonjena amin’Andriamanitra sy fahatokiana Azy, na dia be aza ny fahavalo.
  - type: text
    content: 'Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida, fony tonga ny Zifita ka nanao tamin’i Saoly hoe: Tsy miery any aminay va Davida?'
  - type: text
    content: VONJEO amin’ny anaranao aho, Andriamanitra ô,
  - type: text
    content: Ary omeo rariny aho araka ny herinao.
  '2':
  - type: text
    content: Andriamanitra ô, henoy ny fivavako;
  - type: text
    content: Mihainoa ny tenin’ny vavako.
  '3':
  - type: text
    content: Fa olona hafa firenena no mitsangana hamely ahy,
  - type: text
    content: Ary olon-dozabe no mitady ny aiko;
  - type: text
    content: Tsy mihevitra an’Andriamanitra ho eo anatrehany izy.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Indro, Andriamanitra no Mpamonjy ahy;
  - type: text
    content: Ny Tompo no Mpanohana ny fanahiko.
  '5':
  - type: text
    content: Hamaly ny ratsy ataon’ny mpampahory ahy Izy;
  - type: text
    content: Aoka ny fahamarinanao no handringananao azy.
  '6':
  - type: text
    content: Sitrapoko ihany no hanaterako fanatitra ho Anao;
  - type: text
    content: Hidera ny anaranao aho, Jehovah ô, fa tsara izy.
  '7':
  - type: text
    content: Fa efa namonjy ahy ho afaka tamin’ny fahoriana rehetra Izy;
  - type: text
    content: Ary ny masoko dia faly mijery ny amin’ny fahavaloko.
