document_id: PSA.54
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fangataham-pamonjena amin’Andriamanitra sy fahatokiana Azy, na dia be aza ny fahavalo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida, fony tonga ny Zifita ka nanao tamin’i Saoly hoe: Tsy miery any aminay va Davida?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: VONJEO amin’ny anaranao aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary omeo rariny aho araka ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitra ô, henoy ny fivavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ny tenin’ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa olona hafa firenena no mitsangana hamely ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary olon-dozabe no mitady ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mihevitra an’Andriamanitra ho eo anatrehany izy.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, Andriamanitra no Mpamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Tompo no Mpanohana ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hamaly ny ratsy ataon’ny mpampahory ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny fahamarinanao no handringananao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sitrapoko ihany no hanaterako fanatitra ho Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera ny anaranao aho, Jehovah ô, fa tsara izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa namonjy ahy ho afaka tamin’ny fahoriana rehetra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny masoko dia faly mijery ny amin’ny fahavaloko.
