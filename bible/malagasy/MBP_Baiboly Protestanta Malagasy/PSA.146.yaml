document_id: PSA.146,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Dera ho an’Andriamanitra, Mpamonjy tokana.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà an’i Jehovah, ry fanahiko.
  '10':
  - type: text
    content: Manjaka mandrakizay Jehovah,
  - type: text
    content: Hatramin’ny taranaka fara mandimby Andriamanitrao, ry Ziona.
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: Hidera an’i Jehovah aho, raha mbola miaina koa;
  - type: text
    content: Eny, hankalaza an’Andriamanitro aho,
  - type: text
    content: Raha mbola velona koa.
  '3':
  - type: text
    content: Aza matoky ny lehibe,
  - type: text
    content: Na ny zanak’olombelona izay tsy mahavonjy.
  '4':
  - type: text
    content: Miala ny fofonainy, ka miverina ho amin’ny taniny izy;
  - type: text
    content: Ary amin’izay indrindra no hahafoanan’ny fikasany.
  '5':
  - type: text
    content: Sambatra izay manana an’Andriamanitr’i Jakoba ho Mpanampy azy
  - type: text
    content: Sady manantena an’i Jehovah Andriamaniny,
  '6':
  - type: text
    content: Izay nanao ny lanitra sy ny tany,
  - type: text
    content: Ny ranomasina sy izay rehetra ao anatiny,
  - type: text
    content: Izay mitandrina fahamarinana mandrakizay,
  '7':
  - type: text
    content: Izay manome rariny ho an’ny ampahorina,
  - type: text
    content: Izay manome hanina ho an’ny noana.
  - type: text
    content: Jehovah mamaha ny mpifatotra;
  '8':
  - type: text
    content: Jehovah mampahiratra ny jamba;
  - type: text
    content: Jehovah mampitraka ny mitanondrika;
  - type: text
    content: Jehovah tia ny marina;
  '9':
  - type: text
    content: Jehovah miaro ny vahiny
  - type: text
    content: Ary manandratra ny kamboty sy ny mpitondratena,
  - type: text
    content: Fa mamadika ny làlan’ny ratsy fanahy kosa.
