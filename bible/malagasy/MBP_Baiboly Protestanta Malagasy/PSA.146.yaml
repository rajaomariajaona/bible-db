document_id: PSA.146
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dera ho an’Andriamanitra, Mpamonjy tokana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HALELOIA.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà an’i Jehovah, ry fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hidera an’i Jehovah aho, raha mbola miaina koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hankalaza an’Andriamanitro aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola velona koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza matoky ny lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny zanak’olombelona izay tsy mahavonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miala ny fofonainy, ka miverina ho amin’ny taniny izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’izay indrindra no hahafoanan’ny fikasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra izay manana an’Andriamanitr’i Jakoba ho Mpanampy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manantena an’i Jehovah Andriamaniny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay nanao ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ranomasina sy izay rehetra ao anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitandrina fahamarinana mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay manome rariny ho an’ny ampahorina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manome hanina ho an’ny noana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah mamaha ny mpifatotra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah mampahiratra ny jamba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah mampitraka ny mitanondrika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah tia ny marina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah miaro ny vahiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manandratra ny kamboty sy ny mpitondratena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mamadika ny làlan’ny ratsy fanahy kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Manjaka mandrakizay Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taranaka fara mandimby Andriamanitrao, ry Ziona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
