document_id: ROM.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny famonjen’i Kristy ny mino Azy, izay miantomboka amin’izao fiainana izao ary mbola hotanterahina ho mandrakizay.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY amin’izany dia tsy misy fanamelohana ho an’izay ao amin’i Kristy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ao amin’i Kristy Jesosy ny lalàn’ny Fanahin’aina no nahafaka ahy tamin’ny lalàn’ny fahotana sy ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izay tsy hain’ny lalàna, satria ny nofo no nahalemy azy, dia vitan’Andriamanitra tamin’Izy naniraka ny Zanany, naka ny endriky ny nofo ota sy ny amin’ny ota, ka nanameloka ny ota tao amin’ny nofo, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba hahatanteraka ny fahamarinana ilain’ny lalàna amintsika, izay tsy mandeha araka ny nofo, fa araka ny Fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa izay araka ny nofo dia mihevitra izay zavatry ny nofo; fa izay araka ny Fanahy kosa mihevitra izay zavatry ny Fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny fihevitry ny nofo dia fahafatesana; fa ny fihevitry ny Fanahy kosa fiainana, (sy fiadanana) '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'satria fandrafiana an’Andriamanitra ny fihevitry ny nofo; fa tsy manaiky ny lalàn’Andriamanitra izy, sady tsy hainy akory izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary izay ao amin’ny nofo dia tsy mahay manao ny sitrapon’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hianareo tsy ao amin’ny nofo, fa ao amin’ny Fanahy, raha ny Fanahin’Andriamanitra no mitoetra ao anatinareo. Fa raha misy kosa tsy manana ny Fanahin’i Kristy dia tsy Azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa raha Kristy no mitoetra ao anatinareo, na dia maty ihany aza ny tena noho ny ota,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia maty ny tena noho ny ota, fa.
    marker-yv: yv-n
  - type: text
    text: ' dia fiainana kosa ny fanahy noho ny fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha ny Fanahin’Izay nanangana an’i Jesosy tamin’ny maty no mitoetra ao anatinareo, dia Izay nanangana an’i Kristy Jesosy tamin’ny maty no hamelona ny tenanareo mety maty amin’ny Fanahiny, Izay mitoetra ao anatinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary amin’izany, ry rahalahy, dia mpitrosa isika–tsy amin’ny nofo anefa, ka ho velona araka ny nofo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha velona araka ny nofo hianareo, dia tsy maintsy maty; fa raha ny Fanahy no amonoanareo ny asan’ny tena, dia ho velona hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izay tarihin’ny Fanahin’Andriamanitra no zanak’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa tsy nandray ny fanahim-pahandevozana ho amin’ny tahotra indray hianareo, fa nandray ny fanahin’ny zanaka natsangana, izay iantsoantsika hoe: Aba, Ray ô. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny Fanahy dia miara-milaza amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary raha zanaka, dia mpandova; eny, sady mpandova an’Andriamanitra no mpiray lova amin’i Kristy koa, raha miara-miaritra aminy isika mba hiara-manam-boninahitra aminy koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ataoko fa ny fahoriana amin’ izao andro ankehitriny izao dia tsy tokony hoharina amin’ny voninahitra izay haseho amintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izao zavatra ary rehetra izao dia samy maniry fatratra ka miandry ny fampisehoana ireo zanak’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa izao zavatra ary rehetra izao dia nampanekena ho zava-poana, nefa tsy noho ny sitrapony, fa noho Izay nampanaiky azy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: sady nahazo fanantenana koa fa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: satria.
    marker-yv: yv-n
  - type: text
    text: ' izao zavatra ary rehetra izao aza dia hovotsorana amin’ny fahandevozana, dia ny fahalòvana, ho amin’ny fahafahana izay momba ny voninahitr’ireo zanak’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa fantatsika fa izao zavatra ary rehetra izao dia miara-misento sy miara-marary toy izay efa hiteraka mandraka ankehitriny; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary tsy izany ihany, fa isika koa, na dia manana ny voaloham-bokatry ny Fanahy aza, eny, isika aza dia misento ato anatintsika, miandry ny fananganan-anaka, dia ny fanavotana ny tenantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa ny fanantenana no namonjena antsika; nefa ny fanantenana hita dia tsy mba fanantenana intsony; fa ahoana no mbola anantenan’ny olona izay efa hitany? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa raha isika manantena izay tsy mbola hitantsika, dia miandry amin’ny faharetana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary toy izany koa, ny Fanahy no mamonjy ny fahalementsika: fa tsy fantatsika izay vavaka tokony hataontsika; fa ny Fanahy no mifona amin’ny fitarainana tsy azo tononina. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Izay mandinika ny fo no mahalala, izay hevitry ny Fanahy, satria araka an’Andriamanitra ny fifonany ho an’ny olona masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary fantatsika fa ny zavatra rehetra dia miara-miasa hahasoa izay tia an’Andriamanitra, dia izay voantso araka ny fikasany rahateo, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'satria izay fantany rahateo no notendreny koa hitovy endrika amin’ny Zanany, mba ho Lahimatoa amin’ny rahalahy maro Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary izay notendreny no nantsoiny koa; ary izay nantsoiny no nohamarininy koa; ary izay nohamarininy no nomeny voninahitra koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Inona ary no holazaintsika ny amin’izany zavatra izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izay tsy niaro ny Zanani-lahy, fa natolony hamonjy antsika rehetra Izy, tsy homeny antsika miaraka aminy maimaimpoana koa va ny zavatra rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Iza no hiampanga ny olom-boafidin’Andriamanitra? Andriamanitra no manamarina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Iza no manameloka? Kristy Jesosy no efa maty, eny, sady nitsangana tamin’ny maty koa ka mitoetra eo amin’ny tànana ankavanan’Andriamanitra ary mifona ho antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana va, sa fahantrana, sa fanenjehana, sa mosary, sa fitanjahana, sa loza, sa sabatra? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Fa noho ny aminao no namonoana anay mandrakariva;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny ondry hovonoina no fijery anay’’ (Sal. 44.22).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kanefa amin’izany rehetra izany dia manoatra noho ny mpandresy isika amin’ny alalan’Ilay tia antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa matoky aho fa na fahafatesana, na fiainana, na anjely, na ireo fanapahana, na zavatra ankehitriny, na zavatra ho avy, na hery, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: na ny ambony, na ny ambany, na inona na inona amin’izao zavatra ary rehetra izao, dia tsy hahasaraka antsika amin’ny fitiavan’Andriamanitra izay ao amin’i Kristy Jesosy Tompontsika.
