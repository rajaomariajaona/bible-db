document_id: ROM.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famonjen’i Kristy ny mino Azy, izay miantomboka amin’izao fiainana izao ary mbola hotanterahina ho mandrakizay.
  - type: text
    content: 'ARY amin’izany dia tsy misy fanamelohana ho an’izay ao amin’i Kristy Jesosy. '
  '10':
  - type: text
    content: Fa raha Kristy no mitoetra ao anatinareo, na dia maty ihany aza ny tena noho ny ota,
  - type: note
    content: 'Na: dia maty ny tena noho ny ota, fa.'
  - type: text
    content: ' dia fiainana kosa ny fanahy noho ny fahamarinana. '
  '11':
  - type: text
    content: Ary raha ny Fanahin’Izay nanangana an’i Jesosy tamin’ny maty no mitoetra ao anatinareo, dia Izay nanangana an’i Kristy Jesosy tamin’ny maty no hamelona ny tenanareo mety maty amin’ny Fanahiny, Izay mitoetra ao anatinareo.
  '12':
  - type: text
    content: 'Ary amin’izany, ry rahalahy, dia mpitrosa isika–tsy amin’ny nofo anefa, ka ho velona araka ny nofo. '
  '13':
  - type: text
    content: Fa raha velona araka ny nofo hianareo, dia tsy maintsy maty; fa raha ny Fanahy no amonoanareo ny asan’ny tena, dia ho velona hianareo.
  '14':
  - type: text
    content: 'Fa izay tarihin’ny Fanahin’Andriamanitra no zanak’Andriamanitra. '
  '15':
  - type: text
    content: 'Fa tsy nandray ny fanahim-pahandevozana ho amin’ny tahotra indray hianareo, fa nandray ny fanahin’ny zanaka natsangana, izay iantsoantsika hoe: Aba, Ray ô. '
  '16':
  - type: text
    content: 'Ny Fanahy dia miara-milaza amin’ny fanahintsika fa zanak’Andriamanitra isika. '
  '17':
  - type: text
    content: Ary raha zanaka, dia mpandova; eny, sady mpandova an’Andriamanitra no mpiray lova amin’i Kristy koa, raha miara-miaritra aminy isika mba hiara-manam-boninahitra aminy koa.
  '18':
  - type: text
    content: 'Fa ataoko fa ny fahoriana amin’ izao andro ankehitriny izao dia tsy tokony hoharina amin’ny voninahitra izay haseho amintsika. '
  '19':
  - type: text
    content: 'Fa izao zavatra ary rehetra izao dia samy maniry fatratra ka miandry ny fampisehoana ireo zanak’Andriamanitra; '
  '2':
  - type: text
    content: 'Fa ao amin’i Kristy Jesosy ny lalàn’ny Fanahin’aina no nahafaka ahy tamin’ny lalàn’ny fahotana sy ny fahafatesana. '
  '20':
  - type: text
    content: 'fa izao zavatra ary rehetra izao dia nampanekena ho zava-poana, nefa tsy noho ny sitrapony, fa noho Izay nampanaiky azy, '
  '21':
  - type: text
    content: sady nahazo fanantenana koa fa
  - type: note
    content: 'Na: satria.'
  - type: text
    content: ' izao zavatra ary rehetra izao aza dia hovotsorana amin’ny fahandevozana, dia ny fahalòvana, ho amin’ny fahafahana izay momba ny voninahitr’ireo zanak’Andriamanitra. '
  '22':
  - type: text
    content: 'Fa fantatsika fa izao zavatra ary rehetra izao dia miara-misento sy miara-marary toy izay efa hiteraka mandraka ankehitriny; '
  '23':
  - type: text
    content: 'ary tsy izany ihany, fa isika koa, na dia manana ny voaloham-bokatry ny Fanahy aza, eny, isika aza dia misento ato anatintsika, miandry ny fananganan-anaka, dia ny fanavotana ny tenantsika. '
  '24':
  - type: text
    content: 'Fa ny fanantenana no namonjena antsika; nefa ny fanantenana hita dia tsy mba fanantenana intsony; fa ahoana no mbola anantenan’ny olona izay efa hitany? '
  '25':
  - type: text
    content: Fa raha isika manantena izay tsy mbola hitantsika, dia miandry amin’ny faharetana.
  '26':
  - type: text
    content: 'Ary toy izany koa, ny Fanahy no mamonjy ny fahalementsika: fa tsy fantatsika izay vavaka tokony hataontsika; fa ny Fanahy no mifona amin’ny fitarainana tsy azo tononina. '
  '27':
  - type: text
    content: Ary Izay mandinika ny fo no mahalala, izay hevitry ny Fanahy, satria araka an’Andriamanitra ny fifonany ho an’ny olona masina.
  '28':
  - type: text
    content: 'Ary fantatsika fa ny zavatra rehetra dia miara-miasa hahasoa izay tia an’Andriamanitra, dia izay voantso araka ny fikasany rahateo, '
  '29':
  - type: text
    content: 'satria izay fantany rahateo no notendreny koa hitovy endrika amin’ny Zanany, mba ho Lahimatoa amin’ny rahalahy maro Izy. '
  '3':
  - type: text
    content: 'Fa izay tsy hain’ny lalàna, satria ny nofo no nahalemy azy, dia vitan’Andriamanitra tamin’Izy naniraka ny Zanany, naka ny endriky ny nofo ota sy ny amin’ny ota, ka nanameloka ny ota tao amin’ny nofo, '
  '30':
  - type: text
    content: Ary izay notendreny no nantsoiny koa; ary izay nantsoiny no nohamarininy koa; ary izay nohamarininy no nomeny voninahitra koa.
  '31':
  - type: text
    content: 'Inona ary no holazaintsika ny amin’izany zavatra izany? Raha Andriamanitra no momba antsika, iza no hahatohitra antsika? '
  '32':
  - type: text
    content: 'Izay tsy niaro ny Zanani-lahy, fa natolony hamonjy antsika rehetra Izy, tsy homeny antsika miaraka aminy maimaimpoana koa va ny zavatra rehetra? '
  '33':
  - type: text
    content: 'Iza no hiampanga ny olom-boafidin’Andriamanitra? Andriamanitra no manamarina azy. '
  '34':
  - type: text
    content: 'Iza no manameloka? Kristy Jesosy no efa maty, eny, sady nitsangana tamin’ny maty koa ka mitoetra eo amin’ny tànana ankavanan’Andriamanitra ary mifona ho antsika. '
  '35':
  - type: text
    content: 'Iza no hahasaraka antsika amin’ny fitiavan’i Kristy? Fahoriana va, sa fahantrana, sa fanenjehana, sa mosary, sa fitanjahana, sa loza, sa sabatra? '
  '36':
  - type: text
    content: 'Araka ny voasoratra hoe:'
  - type: text
    content: ',,Fa noho ny aminao no namonoana anay mandrakariva;'
  - type: text
    content: Toy ny ondry hovonoina no fijery anay’’ (Sal. 44.22).
  '37':
  - type: text
    content: 'Kanefa amin’izany rehetra izany dia manoatra noho ny mpandresy isika amin’ny alalan’Ilay tia antsika. '
  '38':
  - type: text
    content: 'Fa matoky aho fa na fahafatesana, na fiainana, na anjely, na ireo fanapahana, na zavatra ankehitriny, na zavatra ho avy, na hery, '
  '39':
  - type: text
    content: na ny ambony, na ny ambany, na inona na inona amin’izao zavatra ary rehetra izao, dia tsy hahasaraka antsika amin’ny fitiavan’Andriamanitra izay ao amin’i Kristy Jesosy Tompontsika.
  '4':
  - type: text
    content: mba hahatanteraka ny fahamarinana ilain’ny lalàna amintsika, izay tsy mandeha araka ny nofo, fa araka ny Fanahy.
  '5':
  - type: text
    content: 'Fa izay araka ny nofo dia mihevitra izay zavatry ny nofo; fa izay araka ny Fanahy kosa mihevitra izay zavatry ny Fanahy. '
  '6':
  - type: text
    content: 'Fa ny fihevitry ny nofo dia fahafatesana; fa ny fihevitry ny Fanahy kosa fiainana, (sy fiadanana) '
  '7':
  - type: text
    content: 'satria fandrafiana an’Andriamanitra ny fihevitry ny nofo; fa tsy manaiky ny lalàn’Andriamanitra izy, sady tsy hainy akory izany. '
  '8':
  - type: text
    content: Ary izay ao amin’ny nofo dia tsy mahay manao ny sitrapon’Andriamanitra.
  '9':
  - type: text
    content: 'Fa hianareo tsy ao amin’ny nofo, fa ao amin’ny Fanahy, raha ny Fanahin’Andriamanitra no mitoetra ao anatinareo. Fa raha misy kosa tsy manana ny Fanahin’i Kristy dia tsy Azy izy. '
