document_id: PRO.21,873
type_code: plt
verses:
  '1':
  - type: text
    content: Rano velona eo an-tànan’i Jehovah ny fon’ny mpanjaka,
  - type: text
    content: Ka tarihiny amin’izay tiany.
  '10':
  - type: text
    content: Ny fanahin’ny ratsy fanahy maniry ny ratsy,
  - type: text
    content: Ka na dia ny havany aza tsy mahita fitia eo imasony.
  '11':
  - type: text
    content: Raha ampijalina ny mpaniratsira, dia ho hendry ny kely saina;
  - type: text
    content: Ary raha toroan-kevitra ny hendry, dia hahazo fahalalana izy.
  '12':
  - type: text
    content: Ny Iray Marina no mandinika ny tranon’ny ratsy fanahy
  - type: text
    content: Ka mamarina azy ho amin’ny loza.
  '13':
  - type: text
    content: Izay manentsin-tadìny amin’ny fitarainan’ny malahelo,
  - type: text
    content: Dia mba hitaraina kosa izy, fa tsy hohenoina.
  '14':
  - type: text
    content: Ny fanomezana mangingina mampionona ny fahatezerana,
  - type: text
    content: Ary ny kolikoly amin’ny takona mampitsahatra ny fahavinirana mafy.
  '15':
  - type: text
    content: Fifalian’ny marina ny hanao araka ny rariny;
  - type: text
    content: Fa zava-mahatahotra ny mpanao ratsy kosa izany.
  '16':
  - type: text
    content: Ny olona izay mivily miala amin’ny làlan’ny fahendrena
  - type: text
    content: Dia hitoetra ao amin’ny fivorian’ny fanahin’ny maty.
  '17':
  - type: text
    content: Izay tia fanaranam-po dia olona halahelo,
  - type: text
    content: Eny, izay tia divay sy diloilo tsy mba hanan-karena.
  '18':
  - type: text
    content: Ny ratsy fanahy dia ho avotry ny marina,
  - type: text
    content: Ary ny mpivadika ho solon’ny mahitsy.
  '19':
  - type: text
    content: Aleo mitoetra any an-efitra
  - type: text
    content: Toy izay amin’ny vehivavy tia ady sady foizina.
  '2':
  - type: text
    content: Ataon’ny olona ho marina avokoa ny làlana rehetra alehany;
  - type: text
    content: Fa Jehovah ihany no Mpandanja ny fo.
  '20':
  - type: text
    content: Harena mahafinaritra sy diloilo no ao amin’ny tranon’ny hendry;
  - type: text
    content: Fa ny adala mandany azy.
  '21':
  - type: text
    content: Izay fatra-panaraka fahamarinana sy famindrampo
  - type: text
    content: Dia hahazo fiainana sy fahamarinana ary voninahitra.
  '22':
  - type: text
    content: Ny hendry mananika ny vohitry ny mahery
  - type: text
    content: Ka mandrodana ny fiarovana mafy izay itokiany.
  '23':
  - type: text
    content: Izay miambina ny vavany sy ny lelany
  - type: text
    content: Dia miaro ny fanahiny tsy ho azom-pahoriana.
  '24':
  - type: text
    content: Izay mirehareha sy miavonavona no atao hoe mpaniratsira,
  - type: text
    content: Dia izay olona fatra-piavonavona.
  '25':
  - type: text
    content: Ny fanirian’ny malaina hahafaty azy,
  - type: text
    content: Satria ny tànany tsy mety miasa tsinona;
  '26':
  - type: text
    content: Maniry fatratra mandritra ny andro izy;
  - type: text
    content: Fa ny marina kosa manome ka tsy mba mahihitra.
  '27':
  - type: text
    content: Ny fanatitry ny ratsy fanahy dia fahavetavetana,
  - type: text
    content: Ka indrindra raha amin’ny sain-dratsy no itondrany azy.
  '28':
  - type: text
    content: Ho faty ny vavolombelona mandainga;
  - type: text
    content: Fa izay mihaino dia hiteny mandrakariva.
  '29':
  - type: text
    content: Ny ratsy fanahy mampiseho ny fahasahisahiany amin’ny tarehiny;
  - type: text
    content: Fa ny marina kosa dia mihevitra izay halehany.
  '3':
  - type: text
    content: Ny hanao izay marina sy mahitsy
  - type: text
    content: No sitrak’i Jehovah mihoatra noho ny fanatitra alatsa-dra.
  '30':
  - type: text
    content: Tsy misy fahendrena, na fahalalana,
  - type: text
    content: Na fisainana mahaleo an’i Jehovah.
  '31':
  - type: text
    content: Voaomana ny soavaly ho amin’ny andro iadiana;
  - type: text
    content: Fa an’i Jehovah ihany ny fandresena.
  '4':
  - type: text
    content: Ny fiandranandran’ny maso sy ny fiavonavon’ny fo–
  - type: text
    content: Izay jiron’
  - type: note
    content: 'Na: asan’.'
  - type: text
    content: ' ny ratsy fanahy–dia ota.'
  '5':
  - type: text
    content: Ny hevitry ny mazoto dia mampanan-karena;
  - type: text
    content: Fa ny maimaika rehetra dia halahelo ihany.
  '6':
  - type: text
    content: Ny fahazoan-karena amin’ny lela mandainga
  - type: text
    content: Dia fofonaina mihelina ho an’izay mitady fahafatesana.
  '7':
  - type: text
    content: Ny fitohatohan’ny ratsy fanahy hamongotra azy,
  - type: text
    content: Satria mandà tsy hanao izay marina izy.
  '8':
  - type: text
    content: Miolikolika ny làlan’ny mavesa-keloka;
  - type: text
    content: Fa mahitsy ny ataon’ny madio.
  '9':
  - type: text
    content: Aleo mitoetra eo an-joron’ny tampon-trano
  - type: text
    content: Toy izay hiray trano amin’ny vehivavy tia ady.
