document_id: PRO.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Rano velona eo an-tànan’i Jehovah ny fon’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tarihiny amin’izay tiany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fanahin’ny ratsy fanahy maniry ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka na dia ny havany aza tsy mahita fitia eo imasony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha ampijalina ny mpaniratsira, dia ho hendry ny kely saina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha toroan-kevitra ny hendry, dia hahazo fahalalana izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny Iray Marina no mandinika ny tranon’ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamarina azy ho amin’ny loza.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izay manentsin-tadìny amin’ny fitarainan’ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mba hitaraina kosa izy, fa tsy hohenoina.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny fanomezana mangingina mampionona ny fahatezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kolikoly amin’ny takona mampitsahatra ny fahavinirana mafy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fifalian’ny marina ny hanao araka ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa zava-mahatahotra ny mpanao ratsy kosa izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny olona izay mivily miala amin’ny làlan’ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitoetra ao amin’ny fivorian’ny fanahin’ny maty.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay tia fanaranam-po dia olona halahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izay tia divay sy diloilo tsy mba hanan-karena.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny ratsy fanahy dia ho avotry ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpivadika ho solon’ny mahitsy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aleo mitoetra any an-efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay amin’ny vehivavy tia ady sady foizina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ataon’ny olona ho marina avokoa ny làlana rehetra alehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah ihany no Mpandanja ny fo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Harena mahafinaritra sy diloilo no ao amin’ny tranon’ny hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny adala mandany azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izay fatra-panaraka fahamarinana sy famindrampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahazo fiainana sy fahamarinana ary voninahitra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny hendry mananika ny vohitry ny mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandrodana ny fiarovana mafy izay itokiany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Izay miambina ny vavany sy ny lelany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miaro ny fanahiny tsy ho azom-pahoriana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay mirehareha sy miavonavona no atao hoe mpaniratsira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay olona fatra-piavonavona.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny fanirian’ny malaina hahafaty azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny tànany tsy mety miasa tsinona;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Maniry fatratra mandritra ny andro izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina kosa manome ka tsy mba mahihitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny fanatitry ny ratsy fanahy dia fahavetavetana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka indrindra raha amin’ny sain-dratsy no itondrany azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ho faty ny vavolombelona mandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mihaino dia hiteny mandrakariva.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny ratsy fanahy mampiseho ny fahasahisahiany amin’ny tarehiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina kosa dia mihevitra izay halehany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny hanao izay marina sy mahitsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No sitrak’i Jehovah mihoatra noho ny fanatitra alatsa-dra.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tsy misy fahendrena, na fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na fisainana mahaleo an’i Jehovah.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Voaomana ny soavaly ho amin’ny andro iadiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa an’i Jehovah ihany ny fandresena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny fiandranandran’ny maso sy ny fiavonavon’ny fo–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay jiron’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: asan’.
      marker-yv: yv-n
    - type: text
      text: ' ny ratsy fanahy–dia ota.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny hevitry ny mazoto dia mampanan-karena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny maimaika rehetra dia halahelo ihany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fahazoan-karena amin’ny lela mandainga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fofonaina mihelina ho an’izay mitady fahafatesana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny fitohatohan’ny ratsy fanahy hamongotra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria mandà tsy hanao izay marina izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Miolikolika ny làlan’ny mavesa-keloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahitsy ny ataon’ny madio.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aleo mitoetra eo an-joron’ny tampon-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay hiray trano amin’ny vehivavy tia ady.
