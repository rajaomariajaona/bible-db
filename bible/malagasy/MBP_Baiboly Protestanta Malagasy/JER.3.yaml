document_id: JER.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa hoy Izy:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hoy ny olona.
      marker-yv: yv-n
    - type: text
      text: ' Raha misy lehilahy misao-bady,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa miala ravehivavy ka vadin’olon-kafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa mahazo miverina aminy indray va ralehilahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy haloto tokoa va izany tany izany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianao dia efa nijangajanga tamin-tsakaiza maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka moa hahazo miverina amiko va hianao? hoy Jehovah.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa na dia izany rehetra izany aza dia tsy nety niverina tamiko tamin’ny fony rehetra Joda mpivadika rahavaviny, fa tamin’ny fihatsarambelatsihy ihany, hoy Jehovah.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy Jehovah tamiko: Isiraely mpiodina dia hita fa marimarina kokoa noho Joda mpivadika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mandehana, ka torio manatrika ny avaratra izao teny izao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena hianao, ry Isiraely mpiodina, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hampanjombona ny tavako aminareo Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamindra fo Aho, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hitahiry fahatezerana mandrakizay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Kanefa kosa ekeo ny helokao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’i Jehovah Andriamanitrao no niodinanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nivezivezy nankany amin’ny hafa hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny ambanin’ny hazo maitso rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mba nihaino ny feoko hianareo, hoy Jehovah.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Miverena, ry zaza mpiodina, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho ihany no vadinareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hangalako iray isan-tanàna hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy roa isam-pokony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho entiko ho any Ziona hianareo;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia homeko mpitondra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpiandry ondry.
      marker-yv: yv-n
    - type: text
      text: ' araka ny sitrapoko hianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hitondra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiandry.
      marker-yv: yv-n
    - type: text
      text: ' anareo amin’ny fahalalana sy ny fahendrena.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Koa rehefa mitombo sy mihamaro amin’ny tany hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No tsy hanaovany intsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiaran’ny faneken’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hosaintsaininy akory izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hahatsiaro na ho manina izany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hanao fiara intsony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Amin’izany andro izany no hanononana an’i Jerosalema hoe Seza fiandrianan’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hivory any ny jentilisa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny anaran’i Jehovah any Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy tsy handeha intsony araka ny ditry ny fo ratsiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Amin’izany andro izany ny taranak’i Joda sy ny taranak’Isiraely dia hiara-mandeha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hiara-tonga avy any amin’ny tany avaratra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’ny tany nomeko ny razanareo ho lovany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Izaho efa nanao hoe: He! fa hataoko isan-janako hianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka homeko tany mahafinaritra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia lova izay tena endriky ny firenena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, hoy Izaho: Hianao hanao Ahy hoe Raiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hiala amin’ny fanarahana Ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Andrandrao amin’ny tendrombohitra mangadihady ny masonao, ka jereo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taiza no tsy nandrian’olona taminao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teny an-dàlambe no niandrasanao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny Arabo any an-efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Kanefa toy ny vehivavy misintaka miala amin’ny lahy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sakaizany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany tokoa no nisintahanareo niala tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry taranak’Isiraely, hoy Jehovah.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Injay! feo re any an-tendrombohitra mangadihady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fitomaniana amam-pitarainan’ny Zanak’Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nivilivily tamin’ny nalehany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanadino an’i Jehovah Andriamaniny.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Miverena hianareo, ry zaza mpiodina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hositraniko ny fiodinanareo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreto, manatona Anao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao Jehovah no Andriamanitray.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Foana tokoa ny horakoraka any amin’ny tendrombohitra sy ny havoana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Foana tokoa ny fihorakorahana any amin’ny havoana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina fa ao amin’i Jehovah Andriamanitray ny famonjena ny Isiraely.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa lanin’ilay mampahamenatra hatramin’ny fahazazanay ny zavatra efa nisasaran’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny ondry aman-osiny sy ny ombiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanani-lahy sy ny zanani-vavy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aoka handry ao amin’ny henatray izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hanarona anay ny fahafaham-boninahitray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tamin’i Jehovah Andriamanitray no efa nanotanay–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izahay sy ny razanay, hatramin’ny fahazazanay ka ambaraka andro-any–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy nihaino ny feon’i Jehovah Andriamanitray izahay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ka dia voasakana ny orana mivatravatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy tonga ny fara-orana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny handrinao dia handrin’ny vehivavyj anga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy manan-kenatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moa tsy hitaraina amiko va hianao amin’izao sisa izao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Raiko ô, Hianao no nahazatra ahy, hatry ny fony aho mbola tanora?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ho tezitra mandrakizay va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahiry fahatezerana hatramin’ny farany va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indro, efa niteny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toy izany
    - type: text
      text: ' hianao, nefa nanao izany ratsy izany ihany ka nahatanteraka izany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny nanariana ny Isiraely, sy ny mbola handraisana azy indray.
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ARY hoy Jehovah tamiko tamin’ny andro nanjakan’i Josia mpanjaka: Moa efa hitanao va izay nataon’Isiraely mpiodina? Niakatra ho eny amin’ny tendrombohitra avo rehetra sy ho eny ambanin’ny hazo maitso rehetra izy ka nijangajanga teny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nataoko fa rehefa nanao izany rehetra izany izy, dia hiverina amiko. Kanjo tsy niverina izy. Ary Joda mpivadika rahavaviny dia nahita izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hitako fa na dia efa nisaorako aza Isiraely mpiodina ka nomeko taratasy fisaorana noho ny fijangajangany, dia tsy nety natahotra Joda mpivadika rahavaviny na dia izany aza, fa nandeha nijangajanga koa izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary tamin’ny fihorakorahan’ny fijangajangany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Noho ny fijejojejoany sy ny fijangajangany.
      marker-yv: yv-n
    - type: text
      text: ' no nandotoany ny tany, ary nijangajanga tamin’ny vato sy ny hazo izy. '
