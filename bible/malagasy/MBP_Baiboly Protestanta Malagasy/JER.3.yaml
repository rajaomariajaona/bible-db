document_id: JER.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa hoy Izy:'
  - type: note
    content: 'Na: hoy ny olona.'
  - type: text
    content: ' Raha misy lehilahy misao-bady,'
  - type: text
    content: Ary efa miala ravehivavy ka vadin’olon-kafa,
  - type: text
    content: Moa mahazo miverina aminy indray va ralehilahy?
  - type: text
    content: Tsy haloto tokoa va izany tany izany?
  - type: text
    content: Fa hianao dia efa nijangajanga tamin-tsakaiza maro,
  - type: text
    content: Ka moa hahazo miverina amiko va hianao? hoy Jehovah.
  '10':
  - type: text
    content: Fa na dia izany rehetra izany aza dia tsy nety niverina tamiko tamin’ny fony rehetra Joda mpivadika rahavaviny, fa tamin’ny fihatsarambelatsihy ihany, hoy Jehovah.
  '11':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Isiraely mpiodina dia hita fa marimarina kokoa noho Joda mpivadika. '
  '12':
  - type: text
    content: 'Mandehana, ka torio manatrika ny avaratra izao teny izao hoe:'
  - type: text
    content: Miverena hianao, ry Isiraely mpiodina, hoy Jehovah;
  - type: text
    content: Tsy hampanjombona ny tavako aminareo Aho;
  - type: text
    content: Fa mamindra fo Aho, hoy Jehovah,
  - type: text
    content: Ka tsy hitahiry fahatezerana mandrakizay.
  '13':
  - type: text
    content: Kanefa kosa ekeo ny helokao,
  - type: text
    content: Fa tamin’i Jehovah Andriamanitrao no niodinanao,
  - type: text
    content: Ary nivezivezy nankany amin’ny hafa hianao
  - type: text
    content: Teny ambanin’ny hazo maitso rehetra,
  - type: text
    content: Fa tsy mba nihaino ny feoko hianareo, hoy Jehovah.
  '14':
  - type: text
    content: Miverena, ry zaza mpiodina, hoy Jehovah,
  - type: text
    content: Fa Izaho ihany no vadinareo;
  - type: text
    content: Ary hangalako iray isan-tanàna hianareo
  - type: text
    content: Sy roa isam-pokony,
  - type: text
    content: Ka ho entiko ho any Ziona hianareo;
  '15':
  - type: text
    content: Dia homeko mpitondra
  - type: note
    content: Heb. mpiandry ondry.
  - type: text
    content: ' araka ny sitrapoko hianareo,'
  - type: text
    content: Izay hitondra
  - type: note
    content: Heb. hiandry.
  - type: text
    content: ' anareo amin’ny fahalalana sy ny fahendrena.'
  '16':
  - type: text
    content: Koa rehefa mitombo sy mihamaro amin’ny tany hianareo,
  - type: text
    content: Dia amin’izany andro izany, hoy Jehovah,
  - type: text
    content: 'No tsy hanaovany intsony hoe:'
  - type: text
    content: Ny fiaran’ny faneken’i Jehovah;
  - type: text
    content: Ary tsy hosaintsaininy akory izany,
  - type: text
    content: Sady tsy hahatsiaro na ho manina izany izy,
  - type: text
    content: Na hanao fiara intsony.
  '17':
  - type: text
    content: Amin’izany andro izany no hanononana an’i Jerosalema hoe Seza fiandrianan’i Jehovah;
  - type: text
    content: Ary hivory any ny jentilisa rehetra
  - type: text
    content: Noho ny anaran’i Jehovah any Jerosalema,
  - type: text
    content: Ary izy tsy handeha intsony araka ny ditry ny fo ratsiny.
  '18':
  - type: text
    content: Amin’izany andro izany ny taranak’i Joda sy ny taranak’Isiraely dia hiara-mandeha,
  - type: text
    content: Ka hiara-tonga avy any amin’ny tany avaratra izy
  - type: text
    content: Ho any amin’ny tany nomeko ny razanareo ho lovany.
  '19':
  - type: text
    content: 'Ary Izaho efa nanao hoe: He! fa hataoko isan-janako hianao'
  - type: text
    content: Ka homeko tany mahafinaritra,
  - type: text
    content: Dia lova izay tena endriky ny firenena.
  - type: text
    content: 'Eny, hoy Izaho: Hianao hanao Ahy hoe Raiko,'
  - type: text
    content: Ka tsy hiala amin’ny fanarahana Ahy.
  '2':
  - type: text
    content: Andrandrao amin’ny tendrombohitra mangadihady ny masonao, ka jereo,
  - type: text
    content: Taiza no tsy nandrian’olona taminao?
  - type: text
    content: Teny an-dàlambe no niandrasanao azy
  - type: text
    content: Toy ny Arabo any an-efitra;
  - type: text
    content: Ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany,
  '20':
  - type: text
    content: Kanefa toy ny vehivavy misintaka miala amin’ny lahy,
  - type: note
    content: Heb. sakaizany.
  - type: text
    content: Dia toy izany tokoa no nisintahanareo niala tamiko,
  - type: text
    content: Ry taranak’Isiraely, hoy Jehovah.
  '21':
  - type: text
    content: Injay! feo re any an-tendrombohitra mangadihady,
  - type: text
    content: Dia fitomaniana amam-pitarainan’ny Zanak’Isiraely;
  - type: text
    content: Fa nivilivily tamin’ny nalehany izy
  - type: text
    content: Ary nanadino an’i Jehovah Andriamaniny.
  '22':
  - type: text
    content: Miverena hianareo, ry zaza mpiodina,
  - type: text
    content: Fa hositraniko ny fiodinanareo.
  - type: text
    content: Indreto, manatona Anao izahay,
  - type: text
    content: Fa Hianao Jehovah no Andriamanitray.
  '23':
  - type: text
    content: Foana tokoa ny horakoraka any amin’ny tendrombohitra sy ny havoana;
  - type: note
    content: 'Na: Foana tokoa ny fihorakorahana any amin’ny havoana.'
  - type: text
    content: Marina fa ao amin’i Jehovah Andriamanitray ny famonjena ny Isiraely.
  '24':
  - type: text
    content: Fa lanin’ilay mampahamenatra hatramin’ny fahazazanay ny zavatra efa nisasaran’ny razanay,
  - type: text
    content: Dia ny ondry aman-osiny sy ny ombiny,
  - type: text
    content: Ny zanani-lahy sy ny zanani-vavy.
  '25':
  - type: text
    content: Aoka handry ao amin’ny henatray izahay,
  - type: text
    content: Ary aoka hanarona anay ny fahafaham-boninahitray,
  - type: text
    content: Satria tamin’i Jehovah Andriamanitray no efa nanotanay–
  - type: text
    content: Dia izahay sy ny razanay, hatramin’ny fahazazanay ka ambaraka andro-any–
  - type: text
    content: Sady tsy nihaino ny feon’i Jehovah Andriamanitray izahay.
  '3':
  - type: text
    content: Ka dia voasakana ny orana mivatravatra,
  - type: text
    content: Sady tsy tonga ny fara-orana;
  - type: text
    content: Ary ny handrinao dia handrin’ny vehivavyj anga
  - type: text
    content: Ka tsy manan-kenatra.
  '4':
  - type: text
    content: 'Moa tsy hitaraina amiko va hianao amin’izao sisa izao hoe:'
  - type: text
    content: Ry Raiko ô, Hianao no nahazatra ahy, hatry ny fony aho mbola tanora?
  '5':
  - type: text
    content: Ho tezitra mandrakizay va Izy?
  - type: text
    content: Hitahiry fahatezerana hatramin’ny farany va Izy?
  - type: text
    content: 'Indro, efa niteny '
  - type: text
    content: toy izany
  - type: text
    content: ' hianao, nefa nanao izany ratsy izany ihany ka nahatanteraka izany.'
  - type: heading
    content: Ny amin’ny nanariana ny Isiraely, sy ny mbola handraisana azy indray.
  '6':
  - type: text
    content: 'ARY hoy Jehovah tamiko tamin’ny andro nanjakan’i Josia mpanjaka: Moa efa hitanao va izay nataon’Isiraely mpiodina? Niakatra ho eny amin’ny tendrombohitra avo rehetra sy ho eny ambanin’ny hazo maitso rehetra izy ka nijangajanga teny. '
  '7':
  - type: text
    content: 'Ary nataoko fa rehefa nanao izany rehetra izany izy, dia hiverina amiko. Kanjo tsy niverina izy. Ary Joda mpivadika rahavaviny dia nahita izany. '
  '8':
  - type: text
    content: 'Ary hitako fa na dia efa nisaorako aza Isiraely mpiodina ka nomeko taratasy fisaorana noho ny fijangajangany, dia tsy nety natahotra Joda mpivadika rahavaviny na dia izany aza, fa nandeha nijangajanga koa izy. '
  '9':
  - type: text
    content: Ary tamin’ny fihorakorahan’ny fijangajangany
  - type: note
    content: 'Na: Noho ny fijejojejoany sy ny fijangajangany.'
  - type: text
    content: ' no nandotoany ny tany, ary nijangajanga tamin’ny vato sy ny hazo izy. '
