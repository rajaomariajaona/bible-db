document_id: MAT.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsaran’i Pilato an’i Jesosy, sy ny nanolorany Azy hohomboana amin’ny hazo fijaliana, ary ny nanenenan’i Jodasy.
  - type: heading
    content: Mar. 15.1-15; Lio. 23.1-25; Jao. 18.28-40.
  - type: text
    content: 'ARY nony maraina ny andro, ny lohan’ny mpisorona rehetra sy ny loholona dia niara-nihevitra hiampanga an’i Jesosy mba hamonoany Azy. '
  '10':
  - type: text
    content: ka nomeny hamidy ny sahan’ny mpanefy vilany izany, araka izay efa nandidian’i Jehovah ahy’’ (Jer. 18.2; Zak. 11.13).
  '11':
  - type: text
    content: 'Ary Jesosy nitsangana teo anatrehan’ny governora; ary ny governora nanontany Azy ka nanao hoe: Hianao va no Mpnajakan’ny Jiosy? Dia hoy Jesosy taminy: Voalazanao. '
  '12':
  - type: text
    content: 'Ary raha nampangain’ny lohan’ny mpisorona mbamin’ny loholona Izy, dia tsy namaly akory. '
  '13':
  - type: text
    content: 'Dia hoy Pilato taminy: Tsy renao va izany zavatra maro iampangany Anao izany? '
  '14':
  - type: text
    content: Fa tsy namaly azy Izy na dia indraim-bava akory aza, ka dia gaga indrindra ny governora.
  '15':
  - type: text
    content: 'Ary isaky ny tonga ny andro firavoravoana dia fanaon’ny governora ny mandefa mpifatotra anankiray ho an’ny vahoaka, araka izay tiany. '
  '16':
  - type: text
    content: 'Ary tamin’izany dia nisy mpifatotra malaza atao hoe Barabasy. '
  '17':
  - type: text
    content: 'Koa nony tafangona teo ny olona, dia hoy Pilato taminy: Iza moa no tianareo halefako ho anareo, Barabasy sa Jesosy, Izay atao hoe Kristy? '
  '18':
  - type: text
    content: Fa fantany fa fialonana no nanoloran’ireo Azy.
  '19':
  - type: text
    content: 'Ary raha nipetraka teo amin’ny fitsarana izy, ny vadiny dia naniraka hankeo aminy ka nanao hoe: Aza manao na inona na inona amin’izany Lehilahy marina izany, fa nampahory ahy be ihany ny nanofisako Azy any naraina.'
  '2':
  - type: text
    content: Ary rehefa nafatony Izy, dia nentiny ka natolony an’i Pilato governora.
  '20':
  - type: text
    content: 'Ary ny lohan’ny mpisorana mbamin’ny loholona nitaona ny vahoaka mba hangataka an’i Barabasy ary hamono an’i Jesosy. '
  '21':
  - type: text
    content: 'Fa ny governora namaly ka nanao taminy hoe: Iza moa amin’izy roa lahy no tianareo halefako ho anareo? Dia hoy izy: Barabasy. '
  '22':
  - type: text
    content: 'Hoy Pilato taminy: Ka ahoana kosa ary no hataoko amin’i Jesosy, Izay atao hoe Kristy? Dia hoy izy rehetra: Aoka hohomboana amin’ny hazofijaliana Izy. '
  '23':
  - type: text
    content: 'Fa hoy ny governora: Inona ary no ratsy nataony? Fa vao mainka niantsoantso izy ka nanao hoe: Aoka hohomboana amin’ny hazofijaliana Izy!'
  '24':
  - type: text
    content: 'Ary raha hitan’i Pilato, fa tsy nahaleo ditra azy izy, fa vao mainka nandroso ihany aza ny tabataba, dia naka rano izy ka nanasa tànana teo anatrehan’ny vahoaka ary nanao hoe: Afaka amin’ny ran’ity Lehilahy marina ity aho, fa asa anareo. '
  '25':
  - type: text
    content: 'Ary ny olona rehetra dia namaly ka nanao hoe: Aoka ny rany ho aminay mbamin’ny zanakay. '
  '26':
  - type: text
    content: Ary dia nandefa an’i Barabasy ho an’ny olona izy; fa Jesosy nasainy nokapohina,
  - type: note
    content: Gr. dia nokapohiny; ny teny Grika milaza ny nokapohina tamin’ny fikapohana hoditra lehibe nisy varahina.
  - type: text
    content: ' dia natolony mba hohomboana tamin’ny hazofijaliana.'
  - type: heading
    content: Ny nanomboana an’i Jesosy amin’ny hazo fijaliana.
  - type: heading
    content: Mar. 15.16-41; Lio. 23.26-49; Jao. 19.1-37.
  '27':
  - type: text
    content: ARY ny miaramilan’ny governora dia nitondra an’i Jesosy ho ao anati-rova
  - type: note
    content: Gr. pretoria.
  - type: text
    content: ' sady nanangona ny miaramila namany rehetra ho eo aminy. '
  '28':
  - type: text
    content: 'Ary rehefa nanala ny fitafiany, dia nanafy Azy lamba jaky izy. '
  '29':
  - type: text
    content: 'Ary nandrandrana satroka tsilo izy, ka nasatrony ny lohany, ary nampitaniny volotara ny tànany ankavanana, dia nandohalika teo anatrehany izy ka naneso Azy hoe: Arahaba, ry Mpanjakan’ny Jiosy! '
  '3':
  - type: text
    content: 'Ary Jodasy, ilay namadika Azy, raha nahita fa nohelohina Jesosy, dia nanenina ka namerina ny sekely volafotsy telo-polo tamin’ny lohan’ny mpisorona sy ny loholona '
  '30':
  - type: text
    content: 'Dia nororany Izy, ary nalainy ny volotara, ka nokapohiny ny lohany. '
  '31':
  - type: text
    content: Ary rehefa naneso Azy izy, dia nanala ilay lamba taminy, ka nampitafiny Azy indray ny fitafiany, ary dia nentiny Izy mba hohomboana amin’ny hazofijaliana.
  '32':
  - type: text
    content: 'Ary raha nandeha izy, dia nahita lehilahy Kyreniana anankiray, atao hoe Simona, ka izy no notereny hitondra ny hazofijalian’i Jesosy. '
  '33':
  - type: text
    content: 'Ary rehefa tonga teo amin’ny tany atao hoe Golgota izy, izany hoe Ikarandoha, '
  '34':
  - type: text
    content: dia nomeny divay miharo afero Izy hosotroiny; ary nony nanandrana izany Izy, dia tsy nety nisotro.
  '35':
  - type: text
    content: 'Ary rehefa voahombony tamin’ny hazofijaliana Izy, dia nanaovany loka no fizàrany ny fitafiany. '
  '36':
  - type: text
    content: Ary nipetraka izy, dia niambina Azy teo.
  '37':
  - type: text
    content: 'Ary napetany teo ambonin’ny lohany ny soratra milaza ny nanamelohana Azy, dia izao: '
  - type: heading
    content: ity no jesosy, mpanjakan’ny jiosy
  - type: text
    content: .
  '38':
  - type: text
    content: Ary nisy jiolahy roa nohomboana tamin’ny hazofijaliana teo an-daniny roa, ny anankiray teo amin’ny ankavanany, ary ny anankiray teo amin’ny an-kaviany.
  '39':
  - type: text
    content: Ary izay nandalo dia niteny ratsy
  - type: note
    content: Gr. nanao blasfemia; izahao ix.3.
  - type: text
    content: ' Azy, sady nihifikifi-doha '
  '4':
  - type: text
    content: 'ka nanao hoe: Nanota aho, satria, namadika ra marina. Fa hoy ireo: Ahoanay izany? fa asa anao. '
  '40':
  - type: text
    content: 'ka nanao hoe: Ry Ilay mandrava ny tempoly sy manangana azy amin’ny hateloana, vonjeo ny tenanao. Raha Zanak’Andriamanitra Hianao, midìna hiala amin’ny hazofijaliana. '
  '41':
  - type: text
    content: 'Ary dia naneso toy izany koa ny lohan’ny mpisorona mbamin’ny mpanora-dalàna sy ny loholona ka nanao hoe: '
  '42':
  - type: text
    content: 'Ny sasany novonjeny; fa ny tenany tsy hainy vonjena. Mpanjakan’ny Isiraely Izy, aoka hidina hiala amin’ny hazofijaliana Izy ankehitriny, dia hino Azy izahay; '
  '43':
  - type: text
    content: 'natoky an’Andriamanitra Izy, aoka Izy hamonjy Azy ankehitriny, raha ankasitrahany Izy (Sal. 22.8), satria hoy Izy: Zanak’Andriamanitra Aho. '
  '44':
  - type: text
    content: Ary nandatsa Azy toy izany koa ireo jiolahy niaraka nohomboana taminy tamin’ny hazofijaliana.
  '45':
  - type: text
    content: 'Ary hatramin’ny ora fahenina ka hatramin’ny ora fahasivy dia maizina ny tany rehetra. '
  '46':
  - type: text
    content: 'Ary nony tokony ho tamin’ny ora fahasivy, dia niantso tamin’ny feo mahery Jesosy ka nanao hoe: ,,Ely, Ely, lamà sabaktany?’’ izany hoe: ,,Andriamanitro ô, Andriamanitro ô, nahoana no dia mahafoy Ahy Hianao?’’ (Sal. 22.1). '
  '47':
  - type: text
    content: 'Ary ny sasany tamin’izay nijanona teo, raha nandre izany, dia nanao hoe: Miantso an’i Elia Ilehio. '
  '48':
  - type: text
    content: 'Ary niaraka tamin’izay ny anankiray teo aminy dia nihazakazaka ka nandray sipaonjy, ary rehefa natsobony tamin’ny vinaingitra izany ka notohiziny tamin’ny volotara, dia natohony hotsentsefin’i Jesosy. '
  '49':
  - type: text
    content: 'Fa ny sasany kosa nanao hoe: Aoka hoe hizahantsika na ho avy hamonjy Azy Elia, na tsia.'
  '5':
  - type: text
    content: Ary nony natsipiny teo amin’ny tempoly ny vola, dia niala izy ka lasa nandeha, dia nanao tadimody ary nananton-tena, ka dia maty.
  '50':
  - type: text
    content: Ary rehefa niantso tamin’ny feo mahery indray Jesosy, dia nanolotra ny fanahiny.
  '51':
  - type: text
    content: 'Ary indro, ny efitra lamba tao amin’ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany; dia nihorohoro ny tany, ka nitresaka ny vatolampy; '
  '52':
  - type: text
    content: 'ary nisokatra ny fasana, ka maro ny fatin’ny olona masina izay efa nodi-mandry no natsangana, '
  '53':
  - type: text
    content: ka nivoaka avy tao amin’ny fasana ireo taorian’
  - type: note
    content: 'Na: ary taorian’, etc.'
  - type: text
    content: ' ny nitsanganan’i Jesosy, dia nankao amin’ny Tanàna Masina ka niseho tamin’ny maro.'
  '54':
  - type: text
    content: 'Ary ny kapiteny sy ny fehiny, izay niambina an’i Jesosy, raha nahita ny horohorontany mbamin’izay zavatra tonga teo, dia raiki-tahotra indrindra ka nanao hoe: Marina tokoa fa Zanak’Andriamanitra io Lehilahy io.'
  '55':
  - type: text
    content: 'Ary nisy vehivavy maro nitsinjo teny lavitra eny, izay nanaraka an’i Jesosy hatrany Galilia ka nanompo Azy. '
  '56':
  - type: text
    content: Isan’ireny Maria Magdalena sy Maria, renin’i Jakoba sy Josesy, ary ny renin’ny zanak’i Zebedio.
  - type: heading
    content: Ny nandevenana an’i Jesosy.
  - type: heading
    content: Mar. 15.42-47; Lio. 23.50-56; Jao. 19.38-42.
  '57':
  - type: text
    content: 'ARY nony hariva ny andro, dia avy ny lehilahy manan-karena anankiray, avy any Arimatia, ny anarany atao hoe Josefa, ary izy koa dia mpianatr’i Jesosy. '
  '58':
  - type: text
    content: 'Izany lehilahy izany dia nankao amin’i Pilato ka nangataka ny fatin’i Jesosy. Dia nasain’i Pilato homena azy izany. '
  '59':
  - type: text
    content: 'Ary rehefa nalain’i Josefa ny faty ka nofonosiny hariry madinika madio, '
  '6':
  - type: text
    content: 'Ary ny lohan’ny mpisorona nandray ny vola ka nanao hoe: Tsy mety raha alatsaka ao amin’ny rakitry ny tempoly io, fa vidin-dra. '
  '60':
  - type: text
    content: 'dia naleviny tao amin’ny fasany vaovao, izay efa nolavahany tamin’ny vatolampy; ary rehefa nanakodia vato lehibe ho eo amin’ny varavaran’ny fasana izy, dia lasa nandeha. '
  '61':
  - type: text
    content: Ary tao Maria Magdalena sy ilay Maria anankiray ka nipetraka tandrifin’ny fasana.
  '62':
  - type: text
    content: 'Ary nony ampitson’ny andro fiomanana, dia nivory nankeo amin’i Pilato ny lohan’ny mpisorona sy ny Fariseo '
  '63':
  - type: text
    content: 'ka nanao hoe: Tompoko, tsaroanay fa iny mpamitaka iny, fony Izy mbola velona, dia nanao hoe: Raha afaka hateloana, dia hitsangana Aho. '
  '64':
  - type: text
    content: 'Koa asaovy hambenana mafy ny fasana mandra-pahatongan’ny andro fahatelo, fandrao avy ny mpianany ka mangalatra Azy, dia hilaza amin’ny olona hoe: Efa natsangana tamin’ny maty Izy; ka dia ho ratsy ny fitaka farany noho ny voalohany. '
  '65':
  - type: text
    content: 'Hoy Pilato taminy: Makà mpiambina ka mandehana, ary ataovy mafy araka izay hainareo ny fiambenana. '
  '66':
  - type: text
    content: Ary nony lasa izy, dia nalatsany ny mpiambina hiambina mafy ny fasana, rehefa nasiany tombo-kase ny vato.
  '7':
  - type: text
    content: 'Ary nony niara-nihevitra izy, dia namidiny ny sahan’ny mpanefy vilany ny vola ho fandevenam-bahiny. '
  '8':
  - type: text
    content: Koa izany no anaovana ny anaran’izany saha izany mandraka andro-any hoe Sahan-dra.
  '9':
  - type: text
    content: 'Ary tamin’izany dia tanteraka izay nampilazaina an’i Jeremia mpaminany hoe: ,,Dia nalainy ny sekely volafotsy telo-polo, vidin’ilay notombanana,'
  - type: note
    content: 'Na: nohajaina.'
  - type: text
    content: ' dia ilay notombanan’ny Zanak’Isiraely, '
