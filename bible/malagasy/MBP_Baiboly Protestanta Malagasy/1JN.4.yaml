document_id: 1JN.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fampianarana sandoka, sy ny tokony hitiavantsika ny rahalahy, ary ny hanekentsika ny fanambaran’Andriamanitra ny Zanany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'RY malala, aza mino ny fanahy rehetra, fa izahao toetra ny fanahy, na avy amin’Andriamanitra ireny, na tsia, satria maro ny mpaminany sandoka efa lasa any amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no ahafantaranareo ny Fanahin’Andriamanitra: Ny fanahy rehetra izay manaiky fa efa tonga tamin’ny nofo Jesosy Kristy no avy amin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary ny fanahy rehetra izay tsy manaiky an’i Jesosy dia tsy mba avy amin’Andriamanitra; ary izany no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fanahin’
  - type: text
    text: ' ny antikristy, izay efa renareo fa ho avy, sady efa eo amin’izao tontolo izao sahady izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anaka, hianareo dia avy amin’Andriamanitra ary efa naharesy ireny, satria lehibe Izay ao aminareo noho izay ao amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Isan’izao tontolo izao ireny, ka dia miteny araka ny an’izao tontolo izao izy, ary mihaino azy izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avy amin’Andriamanitra izahay; izay mahalala an’Andriamanitra no mihaino anay; izay tsy avy amin’Andriamanitra tsy mba mihaino anay. Izany no ahafantarantsika ny fanahin’ny fahamarinana sy ny fanahin’ny fampiviliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry malala, aoka hifankatia isika; fa avy amin’Andriamanitra ny fitiavana, ary izay rehetra tia no naterak’Andriamanitra sady mahalala an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay tsy tia dia tsy mba mahalala an’Andriamanitra; fa Andriamanitra dia fitiavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no nanehoana ny fitiavan’Andriamanitra antsika: Andriamanitra naniraka ny Zanani-lahy Tokana tamin’izao tontolo izao, mba hahavelona antsika amin’ny alalany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no fitiavana: tsy ny nitiavantsika an’Andriamanitra, fa ny nitiavany antsika, ka nirahiny ny Zanany ho avotra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fanatitra fampiononam-pahatezerana; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ii.2.
    marker-yv: yv-n
  - type: text
    text: ' noho ny fahotantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ry malala, raha izany no nitiavan’Andriamanitra antsika, dia mba tokony hifankatia kosa isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy mbola nisy olona nahita an’Andriamanitra na oviana na oviana. Raha mifankatia isika, dia mitoetra ato amintsika Andriamanitra, ary tanteraka ato amintsika ny fitiavany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fitiavana Azy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no ahafantarantsika fa mitoetra ao aminy isika, ary Izy ato amintsika, dia ny nanomezany antsika ny Fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izahay efa nahita ka manambara fa ny Ray efa naniraka ny Zanaka ho Mpamonjy izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na iza na iza manaiky fa Zanak’Andriamanitra Jesosy, dia mitoetra ao aminy Andriamanitra, ary izy kosa ao amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary isika efa mahalala sy mino ny fitiavan’Andriamanitra antsika. Andriamanitra dia fitiavana; ary izay mitoetra amin’ny fitiavana no mitoetra ao amin’Andriamanitra, ary Andriamanitra ao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany no ahatanterahana ny fitiavana amintsika, mba hananantsika fahasahiana amin’ny andro fitsarana; fa tahaka Azy isika eo amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy manan-tahotra ny fitiavana; fa ny fitiavana tanteraka mandroaka ny tahotra; fa mampahory ny tahotra. Fa izay matahotra dia tsy mbola tanteraka amin’ny fitiavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Isika tia, satria Izy efa tia antsika taloha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha misy manao hoe: Tia an’Andriamanitra aho, nefa mankahala ny rahalahiny, dia mpandainga izy; fa izay tsy tia ny rahalahiny izay hitany, hataony ahoana no fitia an’Andriamanitra Izay tsy hitany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izao no didy efa azontsika taminy: Izay tia an’Andriamanitra dia tsy maintsy tia ny rahalahiny koa.'
