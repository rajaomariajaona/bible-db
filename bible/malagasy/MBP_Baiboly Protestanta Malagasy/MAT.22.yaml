document_id: MAT.22,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jesosy namaly, dia nilaza fanoharana taminy indray ka nanao hoe: '
  '10':
  - type: text
    content: Dia nivoaka ho any amin’ny làlana ireny mpanompo ireny ka namory izay rehetra hitany, na ny ratsy, na ny tsara; ary dia feno mpihinana ny fampakaram-bady.
  '11':
  - type: text
    content: 'Ary nony efa niditra ny mpanjaka hizaha ny mpihinana, dia nahita lehilahy anankiray izay tsy niakanjo ny akanjo fitondra amin’ny fampakaram-bady. '
  '12':
  - type: text
    content: 'Dia hoy izy taminy: Ry sakaiza, ahoana no idiranao eto, nefa hianao tsy miakanjo ny akanjo fitondra amin’ny fampakaram-bady? Dia sina izy. '
  '13':
  - type: text
    content: 'Ary dia hoy ny mpanjaka tamin’ny mpanompony: Afatory ny tongony aman-tànany, dia ario any amin’ny maizina any ivelany izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '14':
  - type: text
    content: Fa maro no antsoina, nefa vitsy no fidina.
  - type: heading
    content: Ny nanontaniana an’i Jesosy ny amin’ny mandoa vola hetra ho an’i Kaisara.
  - type: heading
    content: Mar. 12.13-17; Lio. 20.20-26.
  '15':
  - type: text
    content: 'ARY tamin’izay dia lasa ny Fariseo ka niara-nisaina mba hamandrika Azy amin’ ny teniny. '
  '16':
  - type: text
    content: 'Dia naniraka ny mpianany mbamin’ny Herodiana hankeo aminy izy ka nanao hoe: Mpampianatra ô, fantatray fa marina Hianao ka mampianatra marina ny làlan’Andriamanitra ary tsy manahy olona, satria tsy mba mizaha tavan’olona. '
  '17':
  - type: text
    content: 'Koa lazao aminay ary izay hevitrao: Moa mety va ny mandoa vola hetra ho an’i Kaisara, sa tsia?'
  '18':
  - type: text
    content: 'Fa Jesosy nahalala ny faharatsiany, dia nanao hoe: Nahoana no maka fanahy Ahy hianareo, ry mpihatsaravelatsihy? '
  '19':
  - type: text
    content: 'Asehoy Ahy ny farantsakely fandoa amin’ny hetra. Dia nitondrany denaria Izy. '
  '2':
  - type: text
    content: 'Ny fanjakan’ny lanitra dia tahaka ny mpanjaka, izay nanao fanasana fampakaram-bady ho an’ny zanani-lahy. '
  '20':
  - type: text
    content: 'Ary hoy Jesosy taminy: An’iza ity sary sy soratra ity? '
  '21':
  - type: text
    content: 'Hoy izy taminy: An’i Kaisara. Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara, ary ho an’Andriamanitra izay an’Andriamanitra.'
  '22':
  - type: text
    content: Ary nony nahare izy, dia gaga, ary dia nandao Azy ka lasa nandeha.
  - type: heading
    content: Ny nanontanian’ny Sadoseo an’i Jesosy ny amin’ny hitsanganan’ny maty.
  - type: heading
    content: Mar. 12.18-27; Lio. 20.27-40.
  '23':
  - type: text
    content: 'TAMIN’izany andro izany dia nankeo amin’i Jesosy ny Sadoseo sasany, izay milaza fa tsy misy fitsanganan’ny maty, ka nanontany Azy hoe: '
  '24':
  - type: text
    content: 'Mpampianatra ô, Mosesy nilaza hoe: Raha misy maty momba, aoka ny rahalahiny hampakatra ny vadiny ka hiteraka hamelo-maso ny rahalahiny (Deo. 25.5). '
  '25':
  - type: text
    content: 'Koa nisy fito mirahalahy tetỳ aminay; ary ny zokiny nampaka-bady, dia maty, ary satria tsy nanan-janaka izy, dia navelany ho an’ny rahalahiny ny vadiny; '
  '26':
  - type: text
    content: 'ary toy izany koa ny faharoa sy ny fahatelo, hatramin’ny fahafito. '
  '27':
  - type: text
    content: 'Koa faran’izy rehetra dia maty koa ravehivavy. '
  '28':
  - type: text
    content: Ary amin’ny fitsanganan’ny maty, ho vadin’iza amin’izy fito mirahalahy moa ravehivavy? satria efa samy nanambady azy avokoa izy rehetra.
  '29':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Mahadiso hevitra anareo ny tsi-fahafantaranareo ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' na ny herin’Andriamanitra. '
  '3':
  - type: text
    content: 'Ary izy naniraka ny mpanompony hiantso izay efa nasaina mba hankao amin’ny fampakaram-bady; fa tsy nety ho avy ireo. '
  '30':
  - type: text
    content: Fa amin’ny fitsanganan’ny maty dia tsy mba hisy hampaka-bady, na havoaka hampakarina, fa ho tahaka ny anjely
  - type: note
    content: 'Na: [anjelin’Andriamanitra.]'
  - type: text
    content: ' any an-danitra izy. '
  '31':
  - type: text
    content: 'Fa ny amin’ny fitsanganan’ny maty, moa tsy mbola novakinareo va ny teny nataon’Andriamanitra taminareo manao hoe: '
  '32':
  - type: text
    content: ',,Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba’’ (Eks. 3.6)? Andriamanitra tsy an’ny maty, fa an’ny velona.'
  '33':
  - type: text
    content: Ary ny vahoaka, raha nandre, dia talanjona tamin’ny fampianarany.
  - type: heading
    content: Ny nanontaniana an’i Jesosy ny amin’izay didy lehibe.
  - type: heading
    content: Mar. 12.28-34.
  '34':
  - type: text
    content: 'FA ny Fariseo, nony nandre fa nampahasina ny Sadoseo Izy, dia niangona. '
  '35':
  - type: text
    content: 'Ary ny anankiray tamin’ireo, izay mpahay lalàna, nanontany naka fanahy Azy ka nanao hoe: '
  '36':
  - type: text
    content: 'Mpampianatra ô, ny didy manao ahoana moa no lehibe ao amin’ny lalàna? '
  '37':
  - type: text
    content: 'Dia hoy Jesosy taminy: ,,Tiava an’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra ary ny sainao rehetra’’ (Deo. 6.5). '
  '38':
  - type: text
    content: 'Izany no didy lehibe sady voalohany. '
  '39':
  - type: text
    content: 'Ary ny faharoa, izay tahaka azy ihany, dia izao: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18). '
  '4':
  - type: text
    content: 'Dia naniraka mpanompo hafa koa indray izy ka nanao hoe: Lazao amin’izay efa nasaina hoe: Indro, efa voavoatra ny nahandroko; efa voavono ny ombiko sy ny nafahiko, ka efa voavoatra avokoa ny zavatra rehetra; koa mankanesa atỳ amin’ny fampakaram-bady hianareo. '
  '40':
  - type: text
    content: Izany didy roa izany no ihantonan’ny lalàna rehetra sy ny mpaminany.
  - type: heading
    content: Ny nanontanian’i Jesosy ny Fariseo ny amin’izay maha-Zanak’i Davida ny Mesia.
  - type: heading
    content: Mar. 12.35-37; Lio. 20.41-44.
  '41':
  - type: text
    content: 'ARY rehefa tafangona ny Fariseo, dia nanontany azy Jesosy ka nanao hoe: '
  '42':
  - type: text
    content: 'Ahoana no hevitrareo ny amin’i Kristy? Zanak’iza moa Izy? Hoy izy taminy: Zanak’i Davida. '
  '43':
  - type: text
    content: 'Hoy Jesosy taminy: Koa nahoana ary Davida amin’ny Fanahy no manao Azy hoe ,,Tompo’’, ka manao hoe:'
  '44':
  - type: text
    content: ',,Jehovah nilaza tamin’ny Tompoko hoe:'
  - type: text
    content: Mipetraha eo an-tànako ankavanana
  - type: text
    content: Ambara-panaoko ny fahavalonao ho eo ambanin’ny tongotrao’’ (Sal. 110.1)?
  '45':
  - type: text
    content: Koa raha Davida ary manao Azy hoe ,,Tompo’’, ahoana no maha-zanany Azy?
  '46':
  - type: text
    content: Dia tsy nisy nahavaly Azy na dia teny iray akory aza; ary hatramin’izay andro izay dia tsy nisy sahy nanontany Azy intsony.
  '5':
  - type: text
    content: 'Nefa tsy nahoany akory izany, fa samy lasa nandeha izy, ny anankiray ho any amin’ny sahany, ary ny anankiray ho any amin’ny varony. '
  '6':
  - type: text
    content: 'Ary ny sisa nisambotra ny mpanompony, dia nisetrasetra taminy ka namono azy. '
  '7':
  - type: text
    content: Ary dia tezitra ilay mpanjaka ka naniraka ny miaramilany, dia nandringana izany mpamono olona izany sady nandoro ny tanànany.
  '8':
  - type: text
    content: 'Dia hoy izy tamin’ny mpanompony: Efa voavoatra ny fampakaram-bady, fa izay efa nasaina no tsy mendrika. '
  '9':
  - type: text
    content: 'Koa mankanesa hianareo any amin’ny sampanan-dàlana, ary izay hitanareo, dia asao ho ao amin’ny fampakaram-bady. '
