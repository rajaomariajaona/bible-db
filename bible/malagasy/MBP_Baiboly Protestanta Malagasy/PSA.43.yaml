document_id: PSA.43
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: OMEO rariny aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary alaharo ny teniko haharesy ny firenena tsy misy famindrampo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho ho afaka amin’ny lehilahy mpamitaka sy mpanao meloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Hianao no Andriamanitry ny heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no manary ahy Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no mandeha mijoretra aho noho ny fampahorian’ny fahavaloko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ampandehano ny fahazavanao sy ny fahamarinanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hitarika ahy ireo ka hitondra ahy ho any an-tendrombohitrao masina, dia ho any amin’ny tabernakelinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia hankany amin’ny alitaran’Andriamanitra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’Andriamanitry ny fifaliako indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hidera Anao amin’ny lokanga aho, ry Andriamanitra ô, dia Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana no mitanondrika hianao, ry fanahiko? ary nahoana no mitoloko ato anatiko hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manantenà an’Andriamanitra, fa mbola hidera Azy ihany aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no famonjena ny tavako sady Andriamanitro.
