document_id: PSA.43,873
type_code: plt
verses:
  '1':
  - type: text
    content: OMEO rariny aho, Andriamanitra ô,
  - type: text
    content: Ary alaharo ny teniko haharesy ny firenena tsy misy famindrampo;
  - type: text
    content: Vonjeo aho ho afaka amin’ny lehilahy mpamitaka sy mpanao meloka.
  '2':
  - type: text
    content: Fa Hianao no Andriamanitry ny heriko;
  - type: text
    content: Nahoana no manary ahy Hianao?
  - type: text
    content: Nahoana no mandeha mijoretra aho noho ny fampahorian’ny fahavaloko?
  '3':
  - type: text
    content: Ampandehano ny fahazavanao sy ny fahamarinanao;
  - type: text
    content: Aoka hitarika ahy ireo ka hitondra ahy ho any an-tendrombohitrao masina, dia ho any amin’ny tabernakelinao.
  '4':
  - type: text
    content: Dia hankany amin’ny alitaran’Andriamanitra aho,
  - type: text
    content: Dia any amin’Andriamanitry ny fifaliako indrindra;
  - type: text
    content: Ary hidera Anao amin’ny lokanga aho, ry Andriamanitra ô, dia Andriamanitro.
  '5':
  - type: text
    content: Nahoana no mitanondrika hianao, ry fanahiko? ary nahoana no mitoloko ato anatiko hianao?
  - type: text
    content: Manantenà an’Andriamanitra, fa mbola hidera Azy ihany aho.
  - type: text
    content: Izy no famonjena ny tavako sady Andriamanitro.
