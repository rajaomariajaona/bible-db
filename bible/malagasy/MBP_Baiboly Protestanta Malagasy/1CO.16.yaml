document_id: 1CO.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny famoriam-bola ho an’ny olona malahelo tany Jerosalema. Teny farany sy fanaovam-beloma.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny amin’ny famoriam-bola ho an’ny olona masina, dia mba manaova koa hianareo toy izay nasaiko nataon’ny fiangonana any Galatia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny andro voalohany isan-kerinandro dia samia manokana ao aminy avy ho rakitra na amin’inona na amin’inona no anambinana azy, mba ho vita rahateo ny famoriam-bola mandra-pahatongako. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa tonga aho, dia izay sitrakareo no hirahiko hitondra taratasy hanatitra ny fiantranareo ho any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha tokony handehanako izany, dia hiaraka amiko ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hankatỳ aminareo aho, rehefa namaky an’i Makedonia–fa hamaky an’i Makedonia aho– '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary angamba hitoetra eo aminareo aho, na handany ny ririnina aza, mba hanateranareo ahy amin’izay halehako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy mikasa hamangy anareo toy ny mandalo aho ankehitriny; fa manantena hitoetra elaela eo aminareo aho, raha sitrapon’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa hitoetra any Efesosy aho mandra-pihavin’ny Pentekosta; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa varavarana lehibe no voavoha ho ahy hahazoako miasa tsara, nefa maro ny mpanohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa tonga Timoty, dia tandremo mba tsy hanan-tahotra eo aminareo izy; fa ny asan’ny Tompo no ataony, tahaka ny ataoko koa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa aza avela hisy olona hanao tsinontsinona azy; fa atero soa aman-tsara izy mba ho tonga atỳ amiko; fa miandry azy mbamin’ny rahalahy sasany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny amin’i Apolosy rahalahy, dia nangataka azy fatratra aho hiara-mandeha amin’ny rahalahy hankatỳ aminareo, saingy tsy sitrapony akory ny handeha tamin’izany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saingy tsy sitrapon’
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Andriamanitra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny handehanany ankehitriny.
    marker-yv: yv-n
  - type: text
    text: ' nefa ho avy ihany izy, rehefa misy andro mahalalaka azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Miambena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Miareta tory.
    marker-yv: yv-n
  - type: text
    text: ' hianareo, tomoera tsara amin’ny finoana, aoka hitomba-ndahy, mahereza. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay rehetra ataonareo dia ataovy amin’ny fitiavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatrareo ny ankohonan’i Stefanasy, fa voaloham-bokatr’i Akaia izy sady efa nanolo-tena ho amin’ny fanompoana ny olona masina; dia mangataka aminareo aho, ry rahalahy, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: mba hanaiky tsara ny olona tahaka ireny sy izay rehetra miara-miasa sy mikely aina koa hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Faly aho noho ny fihavian’i Stefanasy sy Fortonato ary Akaïko; fa ireo no nahefa ny tsy vitanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: fa namelombelona ny fanahiko sy ny anareo koa izy; ka mba ekeo ny tahaka ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manao veloma anareo ny fiangonana atỳ Asia. Manao veloma anareo indrindra ao amin’ny Tompo Akoila sy Prisila mbamin’ny fiangonana izay ao an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manao veloma anareo ny rahalahy rehetra. Mifanaova veloma amin’ny fanorohana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tànako, izaho Paoly, no anaovako veloma. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha misy tsy tia ny Tompo, aoka ho voaozona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anatema.
    marker-yv: yv-n
  - type: text
    text: ' izy. Maran ata.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Maran ata = Avy ny Tompontsika (?).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompo; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ny fitiavako dia ao aminareo rehetra ao amin’i Kristy Jesosy. Amena.
