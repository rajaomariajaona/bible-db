document_id: 1CO.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny famoriam-bola ho an’ny olona malahelo tany Jerosalema. Teny farany sy fanaovam-beloma.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ny amin’ny famoriam-bola ho an’ny olona masina, dia mba manaova koa hianareo toy izay nasaiko nataon’ny fiangonana any Galatia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga Timoty, dia tandremo mba tsy hanan-tahotra eo aminareo izy; fa ny asan’ny Tompo no ataony, tahaka ny ataoko koa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aza avela hisy olona hanao tsinontsinona azy; fa atero soa aman-tsara izy mba ho tonga atỳ amiko; fa miandry azy mbamin’ny rahalahy sasany aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny amin’i Apolosy rahalahy, dia nangataka azy fatratra aho hiara-mandeha amin’ny rahalahy hankatỳ aminareo, saingy tsy sitrapony akory ny handeha tamin’izany;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saingy tsy sitrapon’
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andriamanitra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny handehanany ankehitriny.
      marker-yv: yv-n
    - type: text
      text: ' nefa ho avy ihany izy, rehefa misy andro mahalalaka azy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miambena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miareta tory.
      marker-yv: yv-n
    - type: text
      text: ' hianareo, tomoera tsara amin’ny finoana, aoka hitomba-ndahy, mahereza. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra ataonareo dia ataovy amin’ny fitiavana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrareo ny ankohonan’i Stefanasy, fa voaloham-bokatr’i Akaia izy sady efa nanolo-tena ho amin’ny fanompoana ny olona masina; dia mangataka aminareo aho, ry rahalahy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hanaiky tsara ny olona tahaka ireny sy izay rehetra miara-miasa sy mikely aina koa hianareo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faly aho noho ny fihavian’i Stefanasy sy Fortonato ary Akaïko; fa ireo no nahefa ny tsy vitanareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa namelombelona ny fanahiko sy ny anareo koa izy; ka mba ekeo ny tahaka ireny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manao veloma anareo ny fiangonana atỳ Asia. Manao veloma anareo indrindra ao amin’ny Tompo Akoila sy Prisila mbamin’ny fiangonana izay ao an-tranony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro voalohany isan-kerinandro dia samia manokana ao aminy avy ho rakitra na amin’inona na amin’inona no anambinana azy, mba ho vita rahateo ny famoriam-bola mandra-pahatongako. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anareo ny rahalahy rehetra. Mifanaova veloma amin’ny fanorohana masina.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tànako, izaho Paoly, no anaovako veloma. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy tsy tia ny Tompo, aoka ho voaozona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anatema.
      marker-yv: yv-n
    - type: text
      text: ' izy. Maran ata.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Maran ata = Avy ny Tompontsika (?).
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompo; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fitiavako dia ao aminareo rehetra ao amin’i Kristy Jesosy. Amena.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga aho, dia izay sitrakareo no hirahiko hitondra taratasy hanatitra ny fiantranareo ho any Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tokony handehanako izany, dia hiaraka amiko ireo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hankatỳ aminareo aho, rehefa namaky an’i Makedonia–fa hamaky an’i Makedonia aho– '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary angamba hitoetra eo aminareo aho, na handany ny ririnina aza, mba hanateranareo ahy amin’izay halehako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mikasa hamangy anareo toy ny mandalo aho ankehitriny; fa manantena hitoetra elaela eo aminareo aho, raha sitrapon’ny Tompo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hitoetra any Efesosy aho mandra-pihavin’ny Pentekosta; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa varavarana lehibe no voavoha ho ahy hahazoako miasa tsara, nefa maro ny mpanohitra.
