document_id: PSA.85
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fangatahana mba hampodin’Andriamanitra indray ny fankasitrahany ny olony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’ny Koraïta.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, efa naneho fitia tamin’ny taninao Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampodinao Jakoba avy tamin’ny fahababoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voaesotrao ny heloky ny olonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voasaronao ny fahotany rehetra.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa nampijanona ny fahatezeranao rehetra Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niala tamin’ny fahatezeranao mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miverena aminay, ry Andriamanitry ny famonjena anay ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampitsaharo ny fahatezeranao aminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho tezitra aminay mandrakizay va Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampaharetinao hahatratra ny taranaka fara mandimby va ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy hovelominao indray va izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hifalian’ny olonao aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asehoy anay ny famindramponao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka omeo anay ny famonjenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hihaino izay holazain’i Jehovah Andriamanitra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hilaza fiadanana amin’ny olony Izy, dia amin’ny olony masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa aoka tsy hiverina ho ao amin’ny fahadalana ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eny tokoa, akaikin’izay matahotra Azy ny famonjeny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitoeran’ny voninahitra eo amin’ny tanintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mihaona ny famindrampo sy ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifanoroka ny rariny sy ny fihavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fahamarinana mitsimoka amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rariny mitsinjo eny an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, Jehovah hanome ny tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tanintsika hahavoka-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rariny no hialoha Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hizotra hanaraka ny diany eny an-dàlana.
