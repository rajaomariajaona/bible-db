document_id: PSA.85,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahana mba hampodin’Andriamanitra indray ny fankasitrahany ny olony.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’ny Koraïta.
  - type: text
    content: JEHOVAH ô, efa naneho fitia tamin’ny taninao Hianao,
  - type: text
    content: Efa nampodinao Jakoba avy tamin’ny fahababoany.
  '10':
  - type: text
    content: Mihaona ny famindrampo sy ny fahamarinana;
  - type: text
    content: Mifanoroka ny rariny sy ny fihavanana.
  '11':
  - type: text
    content: Ny fahamarinana mitsimoka amin’ny tany;
  - type: text
    content: Ary ny rariny mitsinjo eny an-danitra.
  '12':
  - type: text
    content: Eny, Jehovah hanome ny tsara;
  - type: text
    content: Ary ny tanintsika hahavoka-javatra.
  '13':
  - type: text
    content: Ny rariny no hialoha Azy
  - type: text
    content: Sady hizotra hanaraka ny diany eny an-dàlana.
  '2':
  - type: text
    content: Voaesotrao ny heloky ny olonao,
  - type: text
    content: Voasaronao ny fahotany rehetra.
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Efa nampijanona ny fahatezeranao rehetra Hianao
  - type: text
    content: Ary niala tamin’ny fahatezeranao mirehitra.
  '4':
  - type: text
    content: Miverena aminay, ry Andriamanitry ny famonjena anay ô,
  - type: text
    content: Ary ampitsaharo ny fahatezeranao aminay.
  '5':
  - type: text
    content: Ho tezitra aminay mandrakizay va Hianao?
  - type: text
    content: Hampaharetinao hahatratra ny taranaka fara mandimby va ny fahatezeranao?
  '6':
  - type: text
    content: Tsy hovelominao indray va izahay,
  - type: text
    content: Mba hifalian’ny olonao aminao?
  '7':
  - type: text
    content: Asehoy anay ny famindramponao, Jehovah ô,
  - type: text
    content: Ka omeo anay ny famonjenao.
  '8':
  - type: text
    content: Hihaino izay holazain’i Jehovah Andriamanitra aho;
  - type: text
    content: Fa hilaza fiadanana amin’ny olony Izy, dia amin’ny olony masina;
  - type: text
    content: Koa aoka tsy hiverina ho ao amin’ny fahadalana ireo.
  '9':
  - type: text
    content: Eny tokoa, akaikin’izay matahotra Azy ny famonjeny,
  - type: text
    content: Mba hitoeran’ny voninahitra eo amin’ny tanintsika.
