document_id: EST.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nifidianana an’i Estera ho vadin’i Ahasoerosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'REHEFA afaka izany, nony efa nionona ny fahatezeran’i Ahasoerosy mpanjaka, dia nahatsiaro an’i Vasty sy izay efa nataony izy ary ny efa nitsarana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka dia hoy ireo zatovon’ny mpanjaka izay nanompo azy: Aoka ny mpanjaka hitadiavana zazavavy virijina tsara tarehy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary aoka ny mpanjaka hanendry olona any amin’ny isan-tokony eran’ny ny fanjakany rehetra, dia aoka hovorin’ireny ny zazavavy virijina tsara tarehy rehetra ho ato Sosana renivohitra ho ao an-tranom-behivavy amin’ny fehin’i Hegay, tsindranolahin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka, mpifehy ny vehivavy; ary aoka homena ny zavatra fidiovany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: koa izay zazavavy sitraky ny mpanjaka no aoka hanjaka hisolo an’i Vasty. Dia sitraky ny mpanjaka izany teny izany, ka dia nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy Jiosy anankiray tany Sosana renivohitra, Mordekay no anarany, zanak’i Jaïra, zanak’i Simey, zanak’i Kisy, avy tamin’ny taranak’i Benjamina, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay efa nentina ho babo avy tany Jerosalema tamin’ny babo izay nentina niaraka tamin’i Jekonia, mpanjakan’ny Joda, izay nobaboin’i Nebokadnezara, mpanjakan’i Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary izy nitaiza an’i Hadasa (Estera izany), zanakavavin’ny rahalahin-drainy, izay tsy nanana ray sy reny intsony; ary razazavavy dia soa sady tsara tarehy, ary noraisin’i Mordekay ho zanany izy, rehefa maty rainy sy reniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nony re ny tenin’ny mpanjaka sy ny lalàny, ka voavory tany Sosana renivohitra ny zazavavy maro ho amin’ny fehin’i Hegay, dia mba nentina ho ao an-tranon’ny mpanjaka koa Estera ho amin’ny fehin’i Hegay, mpifehy ny vehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nahafaly azy razazavavy ka nahita fitia teo imasony; dia nomeny faingana an-drazazavavy ny zavatra fidiovany sy ny anjara-haniny ary ny ankizivavy fito izay voafantina homena azy avy tao an-tranon’ny mpanjaka; ary nafindrany ho ao amin’ny fitoerana tsara indrindra ao an-tranom-behivavy izy sy ny ankizivaviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa Estera tsy mbola nilaza ny fireneny na ny fianakaviany, satria nopeperan’i Mordekay mba tsy hilaza izany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Mordekay nitsangantsangana isan-andro teo anoloan’ny kianjan’ny tranom-behivavy, mba hahafantarany izay toetran’i Estera sy izay anaovana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony tonga ny andro hidiran’ny zazavavy tsirairay isan-andro tany amin’i Ahasoerosy mpanjaka, rehefa tapitra taminy ny roa ambin’ny folo volana, araka ny fomba fanomanana ny vehivavy (fa tapitra tamin’izay ny andro fidiovany, dia enim-bolana tamin’ny diloilo nisy miora, ary enim-bolana tamin’ny zava-manitra sy ny zavatra sasany koa fidiovan’ny vehivavy),– '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'koa nony hiditra ao amin’ny mpanjaka ny zazavavy tamin’izany, dia nomena azy izay rehetra nilainy ho entiny avy amin’ny tranom-behivavy ho ao an-tranon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tamin’ny hariva no nandeha izy, ary nony maraina dia niverina izy ho ao an-trano faharoa nitoeran’ny vehivavy, ho amin’ny fehin’i Sasegaza, tsindranolahin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka, mpitandrina ny vaditsindrano; ary tsy mba niditra tao amin’ny mpanjaka intsony izy, raha tsy tian’ny mpanjaka, ka voatonona ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary rehefa tonga ny anjara-andron’i Estera, zanakavavin’i Abihaila, rahalahin-drain’i Mordekay, izay efa nandray azy ho zanani-vavy, hidirany ao an-tranon’ny mpanjaka, dia tsy nila na inona na inona izy mihoatra noho izay notononin’i Hegay, tsindranolahin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka, mpitandrina ny vehivavy. Ary Estera nahita fitia teo imason’ny olona rehetra izay nijery azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nentina ho ao amin’i Ahasoerosy mpanjaka Estera, ho ao an-tranon’ny fanjakana, tamin’ny volana fahafolo (volana Tebeta izany) tamin’ny taona fahafito nanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary tian’ny mpanjaka mihoatra noho ny vehivavy rehetra Estera, ka nahita fitia sy sitraka teo imasony mihoatra noho ny virijina rehetra izy, ka dia nosatrohany ny satroboninahitry ny fanjakana izy ka nampanjakainy hisolo an i Vasty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny mpanjaka nanao fanasana lehibe ho an’ny mpanapaka rehetra sy ny mpanompony, dia fanasan’i Estera izany; ary nanendry andro fifaliana ho an’ny fanjakana rehetra isan-tokony izy sady nanome zavatra araka ny fanomen’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha nisy virijina novorina fanindroany, dia nipetraka teo am-bavahadin’ny mpanjaka Mordekay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa Estera tsy mbola nilaza izay fianakaviany na izay fireneny, araka ilay nameperan’i Mordekay azy ihany; fa ny tenin’i Mordekay dia nankatoavin’i Estera tahaka ny fony izy mbola nitaiza azy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’izany andro izany, raha Mordekay nipetraka teo am-bavahadin’ny mpanjaka, dia tezitra Bigtana sy Taresy, roa lahy isan’ny tsindranolahin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka, dia ilay mpiambina teo am-baravarana, ka nitady hamono an’i Ahasoerosy mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary fantatr’i Mordekay izany ka nambarany tamin’i Estera, vadin’ny mpanjaka; dia nambaran’i Estera tamin’ny mpanjaka kosa izany araka ny nampilazain’i Mordekay azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa nodinihina izany zavatra izany, dia, indro, marina; ka dia nahantona tamin’ny hazo izy roa lahy; ary nosoratana tao amin’ny bokin’ny tantara teo anatrehan’ny mpanjaka izany.
