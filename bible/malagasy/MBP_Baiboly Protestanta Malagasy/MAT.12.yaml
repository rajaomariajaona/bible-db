document_id: MAT.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanotazan’ny mpianatra salohimbary tamin’ny Sabata, sy ny naninian’ny Fariseo azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 2.23-28; Lio. 6.1-5.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'TAMIN’izany andro izany Jesosy nandeha namaky ny tanimbary tamin’ny Sabata; ary noana ny mpianany ka nanoty salohim-bary, dia nihinana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary, indro, nisy lehilahy maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'efa maina, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: malazo.
      marker-yv: yv-n
    - type: text
      text: ' tànana teo. Ary ny olona nanontany Azy hoe: Mety va ny mahasitrana amin’ny Sabata? mba hiampangany Azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Iza moa no olona ao aminareo, raha manana ondry anankiray, ka latsaka any an-kady amin’ny Sabata, no tsy handray azy sy hampakatra azy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy mihoatra lavitra noho ny ondry va ny olona? Koa amin’izany dia mety ny manao soa amin’ny Sabata. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamin-dralehilahy: Ahinjiro ny tànanao. Dia nahinjiny ka sitrana ho tahaka ny anankiray.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Fariseo dia lasa nivoaka ka niara-nisaina mba hahafaty Azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Jesosy nahalala izany, ka dia niala teo.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy olona betsaka nanaraka Azy, ka dia nositraniny avokoa izy rehetra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nandrara azy Izy tsy hanao izay hahafantarana Azy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hahatanteraka izay nampilazaina an’Isaia mpaminany hoe:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Indro ny Mpanompoko, Izay nofidiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Malalako, Izay sitraky ny foko indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hapetrako ao aminy ny Fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitory ny rariny amin’ny jentilisa Izy;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hifanditra, na hiantso mafy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy handre ny feony any an-dàlana;
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony nahita izany ny Fariseo, dia hoy izy taminy: Indro, ny mpianatrao manao izay tsy mety hatao amin’ny Sabata. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hotapahiny ny volotara torotoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hovonoiny ny lahin-jiro manetona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pamoakany ny rariny ho mpandresy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anarany no hitokian’ny jentilisa’’ (Isa. 42.1–4).
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Jesosy ny demoniaka anankiray, sy ny namaliany ny teny ratsy nataon’ny Fariseo.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 3.20-30.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: DIA nentina tany amin’i Jesosy ny lehilahy anankiray izay demoniaka, sady jamba no moana; dia nositraniny, ka dia niteny sy nahita ilay moana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia talanjona ny vahoaka rehetra ka nanao hoe: Moa Ity va Ilay Zanak’i Davida? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony ren’ny Fariseo izany, dia hoy izy: Tsy misy amoahan’Ilehiny ny demonia, afa-tsy Belzeboba, lohan’ny demonia.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nahalala ny eritreriny, dia nanao taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary tsy haharitra ny tanàna rehetra, na ny trano, izay miady an-trano. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Satana no mamoaka an’i Satana, dia miady an-trano izy; ka ahoana no haharetan’ny fanjakany? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Belzeboba no amoahako ny demonia, iza kosa no mba amoahan’ny zanakareo azy? ary noho izany dia izy ihany no ho mpitsara anareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ny Fanahin’Andriamanitra kosa no amoahako ny demonia, dia efa tonga aminareo sahady ny fanjakan’Andriamanitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hataon’ny olona ahoana no fiditra ao an-tranon’ny mahery handroba ny entany, raha tsy afatony aloha ny mahery? dia vao handroba ny ao an-tranony izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Tsy mbola novakinareo va '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny teny milaza
    - type: text
      text: ' ilay nataon’i Davida, raha noana izy mbamin’izay nanaraka azy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia manahaka.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany dia lazaiko aminareo hoe: Hahazo famelan-keloka ny olona amin’ny ota sy fitenenan-dratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix.3.
      marker-yv: yv-n
    - type: text
      text: ' samy hafa rehetra; fa tsy hahazo famelan-keloka ny olona amin’ny fitenenan-dratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix.3.
      marker-yv: yv-n
    - type: text
      text: ' ny Fanahy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na iza na iza no manao teny hanohitra ny Zanak’olona, dia hahazo famelan-keloka ihany; fa na iza na iza no miteny hanohitra ny Fanahy Masina, dia tsy mba hahazo famelan-keloka, na amin’izao fiainana izao, na amin’ny ho avy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ataovy tsara ny hazo mbamin’ny voany, na ataovy ratsy ny hazo mbamin’ny voany; fa ny voany no ahafantarana ny hazo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry taranaky ny menarana! hataonareo, izay ratsy fanahy, ahoana no fahay miteny zavatra tsara? fa avy amin’ny haben’ny ao am-po no itenenan’ny vava. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rakitra tsara no amoahan’ny olona tsara fanahy zavatra tsara; ary ny rakitra ratsy kosa no amoahan’ny olona ratsy fanahy zavatra ratsy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazaiko aminareo fa hampamoahina ny olona amin’ny andro fitsarana noho ny amin’ny teny foana rehetra izay ataony. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny teninao no hanamarinana anao, ary ny teninao no hanamelohana anao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitadiavan’ny mpanora-dalàna sy ny Fariseo famantarana, sy ny navalin’i Jesosy azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Lio. 11.14-26,29-36.
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’izany ny sasany tamin’ny mpanora-dalàna sy ny Fariseo namaly Azy ka nanao hoe: Mpampianatra ô, ta-hahita famantarana avy aminao izahay. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy namaly ka nanao taminy hoe: Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy hisy famantarana homena azy, afa-tsy famantarana ny amin’i Jona mpaminany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa niditra tao amin’ny tranon’Andriamanitra izy ka nihinana ny mofo aseho, izay nahadiso raha haniny, na izay nanaraka azy, afa-tsy ny mpisorona ihany? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tahaka ny nitoeran’i Jona hateloan’andro sy hateloan’alina tao an-kibon’ny hazandrano lehibe, dia toy izany no hitoeran’ny Zanak’olona hateloan’andro sy hateloan’alina ao anatin’ny tany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona tany Ninive hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa nibebaka izy tamin’ny nitorian’i Jona teny; nefa, indro, misy lehibe noho Jona eto. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpanjakavavy avy tany atsimo hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa avy tany amin’ny faran’ny tany izy hihaino ny fahendren’i Solomona; nefa, indro, misy lehibe noho Solomona eto.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mivoaka amin’ny olona ny fanahy maloto, dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana, fa tsy mahita. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy: Hody any amin’ny tranoko izay nivoahako aho; ary nony tonga izy, dia hitany fa foana ny trano sady voafafa no voavoatra. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia mandeha izy ka mitondra fanahy fito hafa koa miaraka aminy izay ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny faran’izany olona izany dia tonga ratsy noho ny voalohany. Ary dia tahaka izany koa no ho amin’ity taranaka ratsy fanahy ity.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitadiavan’ny renin’i Jesosy sy ny rahalahiny Azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 3.20,21,31-35; Lio. 8.19-21.
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha mbola niteny tamin’ny vahoaka Jesosy, indreo, ny reniny mbamin’ny rahalahiny nijanona teo ala-trano nitady hiteny aminy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anankiray nanao taminy hoe: Indreo, ny reninao mbamin’ny rahalahinao mijanona ato ala-trano mitady hiteny aminao. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa namaly Izy ka nanao tamin’ilay nilaza taminy hoe: Iza moa no reniko, ary iza no rahalahiko? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naninjitra ny tànany nanondro ny mpianany Izy ka nanao hoe: Indreo ny reniko sy ny rahalahiko; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy mbola novakinareo ao amin’ny lalàna va fa amin’ny Sabata ny mpisorona ao amin’ny tempoly manota ny Sabata, nefa tsy manan-tsiny? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na iza na iza no hanao ny sitrapon’ny Raiko Izay any an-danitra, dia izy no rahalahiko sy anabaviko ary reniko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia lazaiko aminareo fa misy eto lehibe noho ny tempoly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha fantatrareo izay hevitry ny teny hoe: ,,Famindrampo no sitrako, fa tsy fanatitra alatsa-dra’’ (Hos. 6.6), dia tsy mba nanameloka ny tsy manan-tsiny hianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Tompon’ny Sabata ny Zanak’olona.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Jesosy ny lehilahy anankiray maty tànana tamin’ny Sabata, sy ny fahatezeran’ny Fariseo noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 3.1-6; Lio. 6.6-11.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony niala teo Jesosy, dia niditra tao amin’ny synagoga; '
