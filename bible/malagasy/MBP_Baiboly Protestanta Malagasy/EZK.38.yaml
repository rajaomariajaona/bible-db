document_id: EZK.38,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handresena an’i Goga sy Magoga mbamin’ny firenena maro izay ho entiny hiady amin’ny Isiraely.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Amin’izany andro izany dia hisy eritreritra hiditra ao an-tsainao, ary hamoron-kevi-dratsy hianao '
  '11':
  - type: text
    content: 'ka hanao hoe: Hiakatra aho hamely ny tany izay misy tanàna tsy mimànda; hankamin’izay mandry fahizay sy mitoetra tsy manana ahiahy aho, samy monina ao an-tanàna tsy misy mànda na hidy na vavahady izy rehetra,– '
  '12':
  - type: text
    content: mba hamabo sy handroba ary hamely indray izay efa rava, saingy vao misy mponina ankehitriny izao, ary ny firenena izay nangonina avy tany amin’ny jentilisa sady nihary omby sy fananana, dia ireo mitoetra ao amin’ny foi-ben’ny tany.
  '13':
  - type: text
    content: 'Sheba sy Dedana ary ny mpandranton’i Tarsisy rehetra mbamin’ireo lionany tanora rehetra dia hanao aminao hoe: Tonga hamabo va hianao? Nangoninao handroba va ireto olonao betsaka ireto, hahalasa volafotsy sy volamena, handroba harena sy fananana ary hahazo babo betsaka?'
  '14':
  - type: text
    content: 'Koa maminania, ry zanak’olona, ka ataovy amin’i Goga hoe: Izao no lazain’i Jehovah Tompo: Moa amin’izany andro hitoeran’ny Isiraely oloko mandry fahizay izany dia tsy ho fantatrao va izany? '
  '15':
  - type: text
    content: 'Ary ho tonga avy any amin’ny fonenanao avy any amin’ny farany avaratra hianao mbamin’ny firenena maro miaraka aminao, izay samy mitaingin-tsoavaly, dia olona maro be sy miaramila betsaka; '
  '16':
  - type: text
    content: ary hiakatra hamely ny Isiraely oloko tahaka ny fiakatry ny rahona hanarona ny tany hianao; any am-parany no ho tonga izany; ary ho entiko hamely ny taniko hianao, mba hahafantaran’ny firenena Ahy, rehefa miseho ho masina eo anatrehany Aho amin’ny ataoko aminao, ry Goga.
  '17':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Moa hianao va ilay nampilazaiko ny mpanompoko hatramin’ny fahiny, dia ny mpaminanin’ny Isiraely, izay naminany ela tamin’izany andro izany ny hampakarako anao hamely azy?'
  '18':
  - type: text
    content: 'Ary amin’izany andro izany, dia ny andro hihavian’i Goga hamely ny tanin’ny Isiraely, hoy Jehovah Tompo, dia hiefona eo am-bavoroko ny fahatezerako. '
  '19':
  - type: text
    content: 'Fa amin’ny fahasaro-piaroko sy ny afon’ny fahatezerako no nitenenako hoe: Amin’izany andro izany dia hisy horohoro mafy any amin’ny tanin’ny Isiraely, '
  '2':
  - type: text
    content: 'Ry zanak’olona, manandrifia an’i Goga avy any amin’ny tany Magoga, izay mpanjakan’i Rosy sy Meseka ary Tobala, ary maminania ny hamelezana azy, '
  '20':
  - type: text
    content: 'ka hangorohoro eo anatrehako ny hazandrano any an-dranomasina sy ny voro-manidina sy ny bibi-dia ary ny biby mandady sy mikisaka rehetra izay mandady sy mikisaka amin’ny tany ary ny olona rehetra ambonin’ny tany; dia hazera ny tendrombohitra, hikoa ny fiakarana mideza, ary hirodana ny ampiantany rehetra. '
  '21':
  - type: text
    content: 'Dia hiantso sabatra Aho hamely azy eny amin’ny tendrombohitro rehetra, hoy Jehovah Tompo: ary hifamely sabatra amin’ny namany avy izy rehetra. '
  '22':
  - type: text
    content: Ary hamaly azy
  - type: note
    content: Heb. hifandahatra aminy.
  - type: text
    content: ' amin’ny areti-mandringana sy ny ra sy ny ranonorana manafotra ary ny havandra vaventy Aho; ary koa, handatsaka afo sy solifara aminy sy amin’ny miaramilany mbamin’ny firenena maro izay miaraka aminy Aho. '
  '23':
  - type: text
    content: 'Ka dia hasehoko ny fahalehibiazako sy ny fahamasinako; ary ho fantatra eo imason’ny firenena maro Aho: ka dia ho fantany fa Izaho no Jehovah.'
  '3':
  - type: text
    content: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo: Indro, avy hamely anao Aho, ry Goga, mpanjakan’i Rosy sy Meseka ary Tobala. '
  '4':
  - type: text
    content: 'Ary hitarika anao Aho ka hanisy masom-by ny valanoranonao, ary ho entiko mivoaka hianao sy ny tafikao rehetra, dia ny soavaly sy ny mpitaingin-tsoavaly, samy mitafy marevaka izy rehetra, dia olona maro be mitondra ampinga lehibe sy ampinga kely, ary samy mitan-tsabatra; '
  '5':
  - type: text
    content: miaraka aminy ny Persiana sy ny Etiopiana ary ny Libyana,
  - type: note
    content: Heb. Pota.
  - type: text
    content: ' samy mitondra ampinga lehibe sy fiarovan-doha avokoa, '
  '6':
  - type: text
    content: Gomera koa mbamin’ny miaramilany rehetra, ny taranak’i Togarma avy any amin’ny farany avaratra mbamin’ny miaramilany rehetra, dia firenena maro izay miaraka aminao.
  '7':
  - type: text
    content: Miomàna, ka mitaova tsara hianao, eny, hianao sy ireo momba anao izay efa mivory ao aminao, ary aoka hianao no ho mpitarika
  - type: note
    content: 'Na: mpitandrina.'
  - type: text
    content: ' azy.'
  '8':
  - type: text
    content: 'Rehefa afaka andro maro, dia hotadiavina hianao, raha mby any am-parany, dia ho tonga any amin’ny tany izay novonjena ka afaka tamin’ny sabatra hianao, dia tany novorina avy tany amin’ny firenena maro, any an-tendrombohitry ny Isiraely, izay efa lao hatry ny ela; fa efa navoaka avy tany amin’ny firenena izy, ka dia mandry fahizay izy rehetra. '
  '9':
  - type: text
    content: Eny, hiakatra hianao, ary ho tahaka ny fihavin’ny rivo-doza no hihavianao, ka ho tahaka ny rahona hanarona ny tany, dia hianao sy ny miaramilanao rehetra mbamin’ny firenena maro izay miaraka aminao.
