document_id: JAS.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fakam-panahy, sy ny fandraisana ny tenin’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: JAKOBA, mpanompon’Andriamanitra sy Jesosy Kristy Tompo, mamangy ny firenena roa ambin’ny folo monina any am-pielezana.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa ny manan-karena kosa ny fietreny, satria ho levona tahaka ny vonin’ny ahitra izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa miposaka ny masoandro mbamin’ny hainandro mahamay, dia mampahalazo ny ahitra, ka mihintsana ny voniny, ary levona ny hatsaran-tarehiny; dia toy izany koa no ho fahalazon’ny manan-karena amin’ny alehany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Sambatra izay olona maharitra fakam-panahy; fa rehefa voazaha toetra izy, dia handray ny satroboninahitra fiainana, izay nolazain’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Tompo
    - type: text
      text: ' homena izay tia Azy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Raha misy alaim-panahy, aoka izy tsy hanao hoe: Andriamanitra no maka fanahy ahy; fa Andriamanitra tsy azon’ny ratsy alaim-panahy, sady tsy mba maka fanahy olona Izy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa samy alaim-panahy ny olona, raha tarihin’ny filany sy fitahiny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ny filana, rehefa torontoronina, dia miteraka ota; ary ny ota, rehefa tanteraka, dia miteraka fahafatesana.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aza mety hofitahina hianareo, ry rahalahy malalako. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny fanomezan-tsoa rehetra sy ny fanomezana tanteraka rehetra dia avy any ambony ka midina avy amin’ny Rain’ny fanazavana, Izay tsy misy fiovaovana na aloka avy amin’ny fihodinana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tamin’ny sitrapony no niterahany antsika tamin’ny teny fahamarinana, mba ho santatry ny zavatra noforoniny isika.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fantatrareo izany, ry rahalahy malalako. Kanefa aoka ny olona rehetra halady hihaino ho malai-miteny, ho malain-ko tezitra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry rahalahiko, ataovy ho fifaliana avokoa, raha iharan’ny fakam-panahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fizahan-toetra.
      marker-yv: yv-n
    - type: text
      text: ' samy hafa hianareo, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fa ny fahatezeran’ny olona tsy ahefana izay marina eo imason’Andriamanitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa ario ny fahalotoana sy ny lolom-po rehetra, ary ekeo amin’ny fahalemem-panahy ny teny nambolena, izay mahavonjy ny fanahinareo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa aoka ho mpankatò ny teny hianareo, fa aza mpihaino fotsiny ihany ka mamitaka ny tenanareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa raha misy mpihaino ny teny, nefa tsy mpankatò, dia toy ny olona mizaha ny tarehiny eo amin’ny fitaratra izy; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa mijery ny tenany izy, dia lasa, ary miaraka amin’izay dia hadinony ny tarehiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa izay mandinika ny lalàna tanteraka, dia ny lalàn’ny fahafahana, ka maharitra amin’izany, raha tsy mpihaino manadino, fa mpanao ny asa, dia ho sambatra amin’ny asany izany olona izany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha misy manao azy ho mpivavaka, nefa tsy mamehy ny vavany, fa mamitaka ny fony, dia zava-poana ny fivavahan’izany olona izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Izao no fivavahana madio sady tsy misy loto eo anatrehan’Andriamanitra Ray: ny mamangy ny kamboty sy ny mpitondratena amin’ny fahoriany, sy ny miaro ny tena tsy hisy pentimpentina avy amin’izao tontolo izao.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'satria fantatrareo fa ny fizahan-toetra ny finoanareo dia mahatonga faharetana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary aoka ny faharetana hisy asa tanteraka, mba ho tanteraka sy tonga ohatra hianareo, ka tsy hisy tsy ampy na inona na inona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary raha misy hianareo tsy manam-pahendrena,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kely fahendrena.
      marker-yv: yv-n
    - type: text
      text: ' aoka izy hangataka amin’Andriamanitra, Izay manome malalaka ho an’ny olona rehetra sady tsy mandatsa; ary dia homena azy izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nefa aoka hangataka amin’ny finoana izy ka tsy hiahanahana akory; fa izay miahanahana dia toy ny alon-dranomasina entin’ny rivotra ka atopatopany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa aoka tsy hanampo handray zavatra amin’ny Tompo izany olona izany: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: olona miroa saina izy, miovaova amin’ny alehany rehetra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aoka ny rahalahy izay ambany hanao ny fisandratany ho reharehany; '
