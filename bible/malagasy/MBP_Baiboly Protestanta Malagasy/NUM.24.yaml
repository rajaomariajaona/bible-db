    - type: text
      text: ' ny masony,'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandre ny tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahita fahitana avy amin’ny Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Torana, kanefa voahiratra ny masony:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ny hatsaran’ny lainao, ry Jakoba ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lasinao, ry Isiraely ô!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny lohasaha malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny saha ao amoron’ony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny hazo manitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ahalima.
      marker-yv: yv-n
    - type: text
      text: ' nambolen’i Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny hazo sedera ao amoron-drano.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisy rano mandeha avy eo amin’ny sininy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany ho any amoron’ny renirano maro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisandratra noho Agaga ny mpanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary handroso voninahitra ny fanjakany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nentin’Andriamanitra nivoaka avy tany Egypta izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manan-kery
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tandroka.
      marker-yv: yv-n
    - type: text
      text: ' toy ny ombimanga;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handany ny jentilisa fahavalony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hotapatapahiny ny taolany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary haripany amin’ny zanatsipìkany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamitsaka izy, mandry toy ny liona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny liom-bavy, ka iza no hanaitra azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohasoavina anie izay manisy soa anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho voaozona anie izay manozona anao!
