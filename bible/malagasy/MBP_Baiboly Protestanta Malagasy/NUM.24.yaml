document_id: NUM.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa hitan’i Balama fa sitrak’i Jehovah ny hitahy ny Isiraely, dia tsy nandeha tahaka ny teo hanao sikidy intsony izy, fa nitodika nanatrika ny efitra fotsiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’i Balama ny fahatezeran’i Balaka, ka niteha-tànana izy; dia hoy izy tamin’i Balama: Hanozona ny fahavaloko no niantsoako anao, kanjo efa nitso-drano azy intelo hianao izao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, mandosira ho any amin ny fonenanao hianao. Hoy izaho teo: Hanome voninahitra anao tokoa aho; fa, indro, Jehovah efa nisakana anao tsy hahazo voninahitra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Balama tamin’i Balaka: Moa tsy efa nilaza tamin’ny irakao izay nirahinao tamiko va aho ka nanao hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia homen’i Balaka volafotsy sy volamena eran’ny tranony aza aho, dia tsy mahazo manoatra ny didin’i Jehovah, na hanao soa, na hanao ratsy, avy amin’ny saiko; izay holazain’i Jehovah ihany no holazaiko? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, indro, efa handeha ho any amin’ny fireneko aho, dia aoka hananatra anao aho ny amin’izay hataon’ity firenena ity amin’ny vahoakanao any am-parany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao oha-teny izy ka nilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Balama, zanak’i Beora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny lehilahy izay voakimpy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voahiratra.
      marker-yv: yv-n
    - type: text
      text: ' ny masony;'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandre ny tenin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahalala ny fahalalan’ny Avo Indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahita fahitana avy amin’ny Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Torana, kanefa voahiratra ny masony:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitako Izy, nefa tsy ankehitriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tazako Izy, nefa tsy akaiky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy kintana miseho avy amin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tehim-panjakana miposaka avy amin’Isiraely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandrava ny sisin-tanin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandringana ny mpitabataba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny taranak’i Seta.
      marker-yv: yv-n
    - type: text
      text: ' rehetra.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Edoma sy Seïra fahavalony dia samy lasany ho azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Isiraely mandroso amin-kery.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy amin’i Jakoba no isehoan’Izay hanapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handringana izay sisa avy ao an-tanàna.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natopin’i Balama ny masony, ka nahita ny Isiraely mitoby araka ny fireneny izy; ary ny Fanahin’Andriamanitra tonga tamin’i Balama. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nahita ny Amalekita izy, dia nanao oha-teny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voalohany tamin’ny jentilisa Amaleka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho lany ringana no hiafarany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nahita ny Kenita izy, dia nanao oha-teny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy orina ny fonenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary atao ao amin’ny vatolampy ny akaninao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa ho ringana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy ho ringana.
      marker-yv: yv-n
    - type: text
      text: ' Kaina,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alohan’ny hamaboan’i Asyra anao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia nanao oha-teny koa izy ka nilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! iza no ho velona, raha manao izany Andriamanitra?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy sambo avy any amin’ny tany Kitima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampietry an’i Asyra sy Ebera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho lany ringana no hiafarany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga Balama ka lasa nody tany amin’ny fonenany; fa Balaka kosa nandeha tany amin’izay nalehany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao oha-teny izy ka nilaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Balama, zanak’i Beora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny lehilahy izay voakimpy
    - type: usfm
