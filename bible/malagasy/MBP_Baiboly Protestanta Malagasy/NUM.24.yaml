document_id: NUM.24,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'ARY rehefa hitan’i Balama fa sitrak’i Jehovah ny hitahy ny Isiraely, dia tsy nandeha tahaka ny teo hanao sikidy intsony izy, fa nitodika nanatrika ny efitra fotsiny. '
  '10':
  - type: text
    content: 'Dia nirehitra tamin’i Balama ny fahatezeran’i Balaka, ka niteha-tànana izy; dia hoy izy tamin’i Balama: Hanozona ny fahavaloko no niantsoako anao, kanjo efa nitso-drano azy intelo hianao izao. '
  '11':
  - type: text
    content: 'Koa ankehitriny, mandosira ho any amin ny fonenanao hianao. Hoy izaho teo: Hanome voninahitra anao tokoa aho; fa, indro, Jehovah efa nisakana anao tsy hahazo voninahitra.'
  '12':
  - type: text
    content: 'Dia hoy Balama tamin’i Balaka: Moa tsy efa nilaza tamin’ny irakao izay nirahinao tamiko va aho ka nanao hoe: '
  '13':
  - type: text
    content: 'Na dia homen’i Balaka volafotsy sy volamena eran’ny tranony aza aho, dia tsy mahazo manoatra ny didin’i Jehovah, na hanao soa, na hanao ratsy, avy amin’ny saiko; izay holazain’i Jehovah ihany no holazaiko? '
  '14':
  - type: text
    content: 'Ary ankehitriny, indro, efa handeha ho any amin’ny fireneko aho, dia aoka hananatra anao aho ny amin’izay hataon’ity firenena ity amin’ny vahoakanao any am-parany. '
  '15':
  - type: text
    content: 'Dia nanao oha-teny izy ka nilaza hoe:'
  - type: text
    content: Hoy Balama, zanak’i Beora,
  - type: text
    content: Dia ny lehilahy izay voakimpy
  - type: note
    content: 'Na: voahiratra.'
  - type: text
    content: ' ny masony;'
  '16':
  - type: text
    content: Izay mandre ny tenin’Andriamanitra
  - type: text
    content: Sady mahalala ny fahalalan’ny Avo Indrindra,
  - type: text
    content: Izay mahita fahitana avy amin’ny Tsitoha,
  - type: text
    content: 'Torana, kanefa voahiratra ny masony:'
  '17':
  - type: text
    content: Hitako Izy, nefa tsy ankehitriny;
  - type: text
    content: Tazako Izy, nefa tsy akaiky;
  - type: text
    content: Misy kintana miseho avy amin’i Jakoba
  - type: text
    content: Sy tehim-panjakana miposaka avy amin’Isiraely
  - type: text
    content: Ka mandrava ny sisin-tanin’i Moaba
  - type: text
    content: Ary mandringana ny mpitabataba
  - type: note
    content: 'Na: ny taranak’i Seta.'
  - type: text
    content: ' rehetra.'
  '18':
  - type: text
    content: Edoma sy Seïra fahavalony dia samy lasany ho azy,
  - type: text
    content: Ary ny Isiraely mandroso amin-kery.
  '19':
  - type: text
    content: Ary avy amin’i Jakoba no isehoan’Izay hanapaka
  - type: text
    content: Ka handringana izay sisa avy ao an-tanàna.
  '2':
  - type: text
    content: 'Dia natopin’i Balama ny masony, ka nahita ny Isiraely mitoby araka ny fireneny izy; ary ny Fanahin’Andriamanitra tonga tamin’i Balama. '
  '20':
  - type: text
    content: 'Ary nahita ny Amalekita izy, dia nanao oha-teny hoe:'
  - type: text
    content: Voalohany tamin’ny jentilisa Amaleka,
  - type: text
    content: Fa ho lany ringana no hiafarany.
  '21':
  - type: text
    content: 'Ary nahita ny Kenita izy, dia nanao oha-teny hoe:'
  - type: text
    content: Mafy orina ny fonenanao,
  - type: text
    content: Ary atao ao amin’ny vatolampy ny akaninao.
  '22':
  - type: text
    content: Kanefa ho ringana
  - type: note
    content: 'Na: tsy ho ringana.'
  - type: text
    content: ' Kaina,'
  - type: text
    content: Alohan’ny hamaboan’i Asyra anao.
  '23':
  - type: text
    content: 'Dia nanao oha-teny koa izy ka nilaza hoe:'
  - type: text
    content: Indrisy! iza no ho velona, raha manao izany Andriamanitra?
  '24':
  - type: text
    content: Ary hisy sambo avy any amin’ny tany Kitima,
  - type: text
    content: Dia hampietry an’i Asyra sy Ebera,
  - type: text
    content: Ka ho lany ringana no hiafarany.
  '25':
  - type: text
    content: Dia niainga Balama ka lasa nody tany amin’ny fonenany; fa Balaka kosa nandeha tany amin’izay nalehany.
  '3':
  - type: text
    content: 'Dia nanao oha-teny izy ka nilaza hoe:'
  - type: text
    content: Hoy Balama, zanak’i Beora,
  - type: text
    content: Dia ny lehilahy izay voakimpy
  - type: note
    content: 'Na: voahiratra.'
  - type: text
    content: ' ny masony,'
  '4':
  - type: text
    content: Izay mandre ny tenin’Andriamanitra
  - type: text
    content: Sady mahita fahitana avy amin’ny Tsitoha,
  - type: text
    content: 'Torana, kanefa voahiratra ny masony:'
  '5':
  - type: text
    content: Endrey ny hatsaran’ny lainao, ry Jakoba ô!
  - type: text
    content: Sy ny lasinao, ry Isiraely ô!
  '6':
  - type: text
    content: Tahaka ny lohasaha malalaka,
  - type: text
    content: Tahaka ny saha ao amoron’ony,
  - type: text
    content: Tahaka ny hazo manitra
  - type: note
    content: Heb. ahalima.
  - type: text
    content: ' nambolen’i Jehovah,'
  - type: text
    content: Tahaka ny hazo sedera ao amoron-drano.
  '7':
  - type: text
    content: Hisy rano mandeha avy eo amin’ny sininy,
  - type: text
    content: Ary ny taranany ho any amoron’ny renirano maro.
  - type: text
    content: Hisandratra noho Agaga ny mpanjakany,
  - type: text
    content: Ary handroso voninahitra ny fanjakany.
  '8':
  - type: text
    content: Nentin’Andriamanitra nivoaka avy tany Egypta izy.
  - type: text
    content: Ary manan-kery
  - type: note
    content: 'Na: tandroka.'
  - type: text
    content: ' toy ny ombimanga;'
  - type: text
    content: Handany ny jentilisa fahavalony izy,
  - type: text
    content: Ka hotapatapahiny ny taolany,
  - type: text
    content: Ary haripany amin’ny zanatsipìkany.
  '9':
  - type: text
    content: Mamitsaka izy, mandry toy ny liona,
  - type: text
    content: Ary toy ny liom-bavy, ka iza no hanaitra azy?
  - type: text
    content: Hohasoavina anie izay manisy soa anao,
  - type: text
    content: Ary ho voaozona anie izay manozona anao!
