document_id: ISA.38,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahararian’i Hezekia, sy ny nanalavan’Andriamanitra ny androny, ary ny fiderana nataony amin’izany.
  - type: text
    content: 'ARY tamin’izany andro izany dia narary saiky maty Hezekia; ary Isaia mpaminany, zanak’i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain’i Jehovah: Hafaro ny ankohonanao, fa ho faty hianao, fa tsy ho velona.'
  '10':
  - type: text
    content: 'Hoy izaho: Amin’izao andro mbola iadanako izao'
  - type: text
    content: No tsy maintsy idirako amin’ny vavahadin’ny fiainan-tsi-hita;
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Nesorina tamiko ny androko sisa.
  '11':
  - type: text
    content: 'Hoy izaho: Tsy mba hahita an’i Jehovah intsony aho.'
  - type: text
    content: Eny, tsy mba hahita an’i Jehovah ao amin’ny velona intsony aho;
  - type: text
    content: Tsy mba hahita olona intsony aho, fa ho isan’ny mponina any amin’ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
  '12':
  - type: text
    content: Ny fonenako nesorina ka nafindra tsy ho amiko,
  - type: text
    content: Tahaka ny lain’ny mpiandry ondry;
  - type: text
    content: Ahoroko tahaka ny tenona ny androko,
  - type: text
    content: Fa efa hotapahiny ho afaka amin’ny haraka izy;
  - type: text
    content: Indray andro monja no anaperanao ny aiko.
  '13':
  - type: text
    content: Nampionona ny foko aho mandra-pahamarain’ny andro;
  - type: text
    content: Tahaka ny fanapatapaky ny liona no anapatapahany ny taolako rehetra;
  - type: text
    content: Indray andro monja no anaperanao ny aiko.
  '14':
  - type: text
    content: Ka dia mikoraraika tahaka ny sidintsidina sy ny vano aho
  - type: text
    content: Ary mitolokoloko tahaka ny voromailala.
  - type: text
    content: Pahina ny masoko noho ny faniriako ho any amin’ny avo;
  - type: text
    content: Jehovah ô, ory loatra aho, aoka hiantoka ahy Hianao.
  '15':
  - type: text
    content: Ahoana no holazaiko?
  - type: text
    content: Sady nilaza tamiko Izy no nahatanteraka koa;
  - type: text
    content: Handeha mijoretra aho amin’ny taonako sisa rehetra
  - type: text
    content: Noho
  - type: note
    content: 'Na: Rehefa afaka.'
  - type: text
    content: ' ny fangidian’ny aiko.'
  '16':
  - type: text
    content: Tompo ô, izany no iveloman’ny olona,
  - type: text
    content: Ary amin’izany tokoa no iainan’ny fanahiko,
  - type: text
    content: Ka dia mahasitrana sy mahavelona ahy Hianao.
  '17':
  - type: text
    content: Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy,
  - type: text
    content: Ary ny fitiavanao no namonjenao ny fanahiko tsy hankany amin’ny lavaka fahalevonana;
  - type: text
    content: Fa narianao teo ivohonao ny fahotako rehetra.
  '18':
  - type: text
    content: Fa ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' tsy mba mahasaotra Anao,'
  - type: text
    content: Ny fahafatesana tsy mahadera Anao;
  - type: text
    content: Fa izay midina any an-davaka dia tsy mahazo manantena ny fahamarinanao.
  '19':
  - type: text
    content: Ny velona dia ny velona ihany no hidera Anao, tahaka izao izaho anio izao;
  - type: text
    content: Ny ray hampahalala ny zanany ny fahamarinanao.
  '2':
  - type: text
    content: 'Dia nitodika nankany amin’ny rindrina Hezekia ka nivavaka tamin’i Jehovah '
  '20':
  - type: text
    content: Jehovah efa vonona hamonjy Ahy,
  - type: text
    content: Ka dia hitendry ny lokangako ao an-tranon’i Jehovah izahay
  - type: text
    content: Amin’ny andro rehetra iainanay.
  '21':
  - type: text
    content: 'Ary hoy Isaia: Makà ampempan’aviavy, ary apetaho amin’ny vay izany, mba ho sitrana izy. '
  '22':
  - type: text
    content: 'Ary hoy Hezekia: Inona no famantarana fa hiakatra ao an-tranon’i Jehovah aho?'
  '3':
  - type: text
    content: 'hoe: Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy.'
  '4':
  - type: text
    content: 'Dia tonga tamin’Isaia ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: text
    content: 'Mandehana, ka lazao amin’i Hezekia hoe: Izao no lazain’i Jehovah, Andriamanitr’i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hampiako dimy ambin’ny folo taona ny andronao, '
  '6':
  - type: text
    content: 'sady hamonjy anao sy ity tanàna ity amin’ny tànan’ny mpanjakan’i Asyria Aho; ary hiaro ity tanàna ity Aho. '
  '7':
  - type: text
    content: 'Ary izao no ho famantarana ho anao avy amin’i Jehovah, hahalalanao fa Jehovah hanao izay zavatra nolazainy: '
  '8':
  - type: text
    content: Indro, hampiverina ny aloka hàdiny
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo Aho araka ny nampidinan’ny masoandro azy teo amin’ny dialin’'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' i Ahaza. Ka dia niverina hàdiny'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo ny masoandro, dia ilay efa nidinany.'
  '9':
  - type: text
    content: Ny teny nosoratan’i Hezekia, mpanjakan’ny Joda, raha narary izy ka sitrana tamin’ny aretiny:–
