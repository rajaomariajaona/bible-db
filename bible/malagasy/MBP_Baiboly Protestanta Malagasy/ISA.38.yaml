document_id: ISA.38,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahararian’i Hezekia, sy ny nanalavan’Andriamanitra ny androny, ary ny fiderana nataony amin’izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’izany andro izany dia narary saiky maty Hezekia; ary Isaia mpaminany, zanak’i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain’i Jehovah: Hafaro ny ankohonanao, fa ho faty hianao, fa tsy ho velona.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hoy izaho: Amin’izao andro mbola iadanako izao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No tsy maintsy idirako amin’ny vavahadin’ny fiainan-tsi-hita;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nesorina tamiko ny androko sisa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy izaho: Tsy mba hahita an’i Jehovah intsony aho.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy mba hahita an’i Jehovah ao amin’ny velona intsony aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba hahita olona intsony aho, fa ho isan’ny mponina any amin’ny fiainan-tsi-hita.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny fonenako nesorina ka nafindra tsy ho amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny lain’ny mpiandry ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoroko tahaka ny tenona ny androko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa hotapahiny ho afaka amin’ny haraka izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray andro monja no anaperanao ny aiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nampionona ny foko aho mandra-pahamarain’ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fanapatapaky ny liona no anapatapahany ny taolako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray andro monja no anaperanao ny aiko.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ka dia mikoraraika tahaka ny sidintsidina sy ny vano aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitolokoloko tahaka ny voromailala.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pahina ny masoko noho ny faniriako ho any amin’ny avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, ory loatra aho, aoka hiantoka ahy Hianao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ahoana no holazaiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nilaza tamiko Izy no nahatanteraka koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha mijoretra aho amin’ny taonako sisa rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehefa afaka.
      marker-yv: yv-n
    - type: text
      text: ' ny fangidian’ny aiko.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tompo ô, izany no iveloman’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany tokoa no iainan’ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia mahasitrana sy mahavelona ahy Hianao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitiavanao no namonjenao ny fanahiko tsy hankany amin’ny lavaka fahalevonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa narianao teo ivohonao ny fahotako rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' tsy mba mahasaotra Anao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahafatesana tsy mahadera Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay midina any an-davaka dia tsy mahazo manantena ny fahamarinanao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny velona dia ny velona ihany no hidera Anao, tahaka izao izaho anio izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ray hampahalala ny zanany ny fahamarinanao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitodika nankany amin’ny rindrina Hezekia ka nivavaka tamin’i Jehovah '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jehovah efa vonona hamonjy Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hitendry ny lokangako ao an-tranon’i Jehovah izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro rehetra iainanay.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy Isaia: Makà ampempan’aviavy, ary apetaho amin’ny vay izany, mba ho sitrana izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy Hezekia: Inona no famantarana fa hiakatra ao an-tranon’i Jehovah aho?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'hoe: Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia tonga tamin’Isaia ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mandehana, ka lazao amin’i Hezekia hoe: Izao no lazain’i Jehovah, Andriamanitr’i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hampiako dimy ambin’ny folo taona ny andronao, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'sady hamonjy anao sy ity tanàna ity amin’ny tànan’ny mpanjakan’i Asyria Aho; ary hiaro ity tanàna ity Aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary izao no ho famantarana ho anao avy amin’i Jehovah, hahalalanao fa Jehovah hanao izay zavatra nolazainy: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Indro, hampiverina ny aloka hàdiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo Aho araka ny nampidinan’ny masoandro azy teo amin’ny dialin’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' i Ahaza. Ka dia niverina hàdiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo ny masoandro, dia ilay efa nidinany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny teny nosoratan’i Hezekia, mpanjakan’ny Joda, raha narary izy ka sitrana tamin’ny aretiny:–
