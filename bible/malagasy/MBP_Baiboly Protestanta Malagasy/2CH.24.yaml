document_id: 2CH.24
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Joasy, sy ny nanamboarana ny rafitry ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FITO taona no niainan’i Joasy, fony izy vao nanjaka, ary efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Zibia, avy any Beri-sheba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary Joasy nanao izay mahitsy eo imason’i Jehovah tamin’ny andro rehetra niainan’i Joiada mpisorona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nangalan’i Joiada vady roa Joasy, dia niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony afaka izany, dia mby ao am-pon i Joasy ny hanamboatra ny tranon’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namory ny mpisorona sy ny Levita izy ka nanao taminy hoe: Mandehana ho any amin’ny tanànan’ny Joda, ka mamoria vola isan-taona amin’ny Isiraely rehetra hanamboarana ny tranon’Andriamanitrareo; ary hafainganonareo ny raharaha. Nefa ny Levita tsy nanafaingana izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mpanjaka dia nampaka an’i Joiada, lohany tamin’ireo, ka nanao taminy hoe: Nahoana no tsy nasainao nitondra ny hetra avy tany Joda sy Jerosalema ny Levita, araka ny didin’i Mosesy, mpanompon’i Jehovah, sy ny fiangonan’ny Isiraely ho ao amin’ny tabernakelin’ny vavolombelona? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny zanak’i Atalia, ilay vehivavy ratsy fanahy, efa nandrava ny tranon’Andriamanitra; ary ny zavatra masina rehetra tao an-tranon’i Jehovah koa dia efa nateriny ho an’ireo Bala. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nasain’ny mpanjaka nanao vata anankiray izy, dia napetrany teo ivelan’ny vavahadin’ny tranon’i Jehovah izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nandefa teny eran’i Joda sy Jerosalema izy mba haterina ho an’i Jehovah ny hetra izay nasain’i Mosesy, mpanompon’Andriamanitra, haloan’ny Isiraely, fony izy tany an-efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia faly ny mpanapaka rehetra sy ny vahoaka rehetra, ka dia nitondra izany ary nandatsaka azy tao amin’ny vata ambara-pahatapiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tamin’izay andro nitondran’ny Levita ny vata ho any amin’ny toniany voatendrin’ny mpanjaka, raha hitany fa be ny vola, dia avy ny mpanoratry ny mpanjaka sy ny toniany voatendrin’ny mpisoronabe ka nanaisotra izay rehetra tao amin’ny vata, dia nitondra ny vata niverina ho eo amin’ny fitoerany indray. Toy izany no nataony mandrakariva, ka nahavory vola betsaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nomen’ny mpanjaka sy Joiada ho an’izay nanao ny raharahan’ny tranon’i Jehovah ny vola, ka nanakaraman’ireo mpipai-bato sy mpandrafitra ary mpanefy vy sy varahina mba hanamboatra ny tranon’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nanao ny mpiasa, ka vita tsara ny asa; ary namboariny ho toy ny teo aloha ny tranon’Andriamanitra ka nataony mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nony vitany izany, dia nentiny teo anatrehan’ny mpanjaka sy Joiada ny vola sisa ka nanaovany fanaka ho an’ny tranon’i Jehovah, dia fanaka ho enti-manao fanompoam-pivavahana sy manatitra fanatitra ary lovia kely sy fanaka volamena sy volafotsy. Ary nanatitra fanatitra dorana tao an-tranon’i Jehovah mandrakariva izy tamin’ny andron’i Joiada rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa tratrantitra sy ela niainana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voky andro, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: afa-pon’ny miaina.
    marker-yv: yv-n
  - type: text
    text: ' Joiada vao maty: telo-polo amby zato taona izy vao maty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nalevina tao an-Tanànan’i Davida tao amin’ny mpanjaka izy, satria nanao soa teo amin’ny Isiraely ary tamin’Andriamanitra sy ny tranony koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa maty Joiada, dia avy ireo mpanapaka ny Joda ka niankohoka teo anatrehan’ny mpanjaka. Dia nihaino azy ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nandao ny tranon’i Jehovah, Andriamanitry ny razany, ireo ka nanompo ny Aseraha sy ny sampy, dia nisy fahatezerana nihatra tamin’ny Joda sy Jerosalema noho ny fahadisoany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary naniraka mpaminany tany aminy Izy hampiverina azy amin’i Jehovah; dia nananatra azy mafy ireo, nefa tsy nety nihaino izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Zakaria, zanak’i Joiada mpisorona, notsindrian’ny Fanahin’Andriamanitra, dia nitsangana teo amin’ny avoavo teo anatrehan’ny vahoaka izy ka nanao taminy hoe: Izao no lazain’Andriamanitra: Nahoana hianareo no mandika ny didin’i Jehovah ka tsy mahita fanambinana? Satria efa nahafoy an’i Jehovah hianareo, dia nahafoy anareo kosa Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nanao teti-dratsy ireo ka nitora-bato azy teo amin’ny kianjan’ny tranon’i Jehovah araka ny tenin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toy izany no tsy nahatsiarovan’i Joasy mpanjaka ny soa nataon’i Joiada rainy taminy, fa namono ny zanany izy. Ary nony efa ho faty Zakaria, dia niteny hoe: Jehovah anie hijery sy hamaly izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony efa niherina ny taona, dia avy ny miaramilan’i Syria hiady taminy; ary tonga tany Joda sy Jerosalema izy, ka matiny avokoa ny mpanapaka rehetra tao amin’ny olona, ary nampitondrainy ho any amin’ny mpanjakan’i Damaskosy ny babo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa vitsy ny miaramilan’ny Syriana izay tonga teo, nefa Jehovah nanolotra miaramila maro ho eo an-tànany noho ny nahafoizany an’i Jehovah, Andriamanitry ny razany. Toy izany no nahatanterahan’ireo ny famaliana an’i Joasy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony nilaozany tamin’ny faharariany mafy izy, ny mpanompony dia niodina taminy noho ny ran’ny zanak’i Joiada mpisorona, ka namono azy teo am-pandriany, dia maty izy; ary naleviny tany an-Tanànan’i Davida ihany izy, nefa tsy tao amin’ny fasan’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary izao no niodina taminy: Zabada, zanak’i Simata Amonita, sy Jozabada, zanak’i Simrita Moabita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny amin’ny zanany sy ny hamafin’ny faminaniana nilaza ny loza hanjo azy ary ny nanamboarany ny tranon’Andriamanitra, indro, efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjaka izany. Ary Amazia zanany no nanjaka nandimby azy.
