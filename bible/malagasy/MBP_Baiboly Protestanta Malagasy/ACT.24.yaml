document_id: ACT.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsarana an’i Paoly teo anarehan’i Feliksa, sy ny nifatorany roa taona tao Kaisaria.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa afaka hadimiana dia nidina Ananiasy mpisoronabe mbamin’ny loholona sasany sy Tertylo, mpandaha-teny anankiray, izay nanambara tamin’ny mpanapaka ny niampangany an’i Paoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa notondroin’ny mpanapaka hiteny Paoly, dia namaly ka nanao hoe: Fantatro fa hianao dia efa mpitsara ela tamin’ity firenena ity, ka dia faly aho handaha-teny hanala tsiny ny tenako; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa azonao fantarina mora fa tsy mba mihoatra noho ny roa ambin’ny folo andro izay no niakarako hivavaka tany Jerosalema. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nisy nahita ahy niady hevitra tamin’olona teo an-kianjan’ny tempoly, na nampitabataba ny vahoaka tao amin’ny synagoga, na tao an-tanàna; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy hainy hamarinina eto anatrehanao izay zavatra iampangany ahy ankehitriny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izao no ekeko aminao, fa araka ny fampianarana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: làlana.
      marker-yv: yv-n
    - type: text
      text: ' izay ataony hoe fitokoana no anompoako an’Andriamanitry ny razako, sady inoako izay rehetra voasoratra eo amin’ny lalàna sy ny mpaminany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary manantena amin’Andriamanitra aho, izay antenain’izy ireo koa, fa hisy fitsanganan’ny marina sy ny meloka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany dia mikely aina koa aho mba hanana fieritreretana tsy manameloka ahy na amin’Andriamanitra na amin’olombelona mandrakariva. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka taona maro, dia tonga aho hitondra fiantrana sy fanatitra ho an’ny fireneko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izay dia hitany voadio teo an-kianjan’ny tempoly aho, tsy tamin’ny olona maro anefa, na tamin’ny fitabatabana; fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nisy
    - type: text
      text: ' Jiosy sasany avy any Asia,– '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tokony hiseho eto anatrehanao ireo mba hiampanga ahy, raha tàhiny misy izay hiampangany ahy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nantsoina izy, dia niampanga azy Tertylo ka nanao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na aoka ireto olona ireto ihany no hilaza izay ratsy hitany, raha nitsangana teo anatrehan’ny Synedriona aho, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy izao teny iray loha izao ihany, dia ilay nantsoiko raha nijanona teo afovoany aho hoe: Ny amin’ny fitsanganan’ny maty no itsarana ahy eto anatrehanareo anio.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary satria fantatr’i Feliksa tsaratsara kokoa ny amin’izany fampianarana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: làlana.
      marker-yv: yv-n
    - type: text
      text: ' izany, dia nampandeha azy rehetra izy aloha ka nanao hoe: Rehefa tafidina atỳ Lysia, mpifehy arivo, dia hofotorako tsara ny raharahanareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy nandidy ny kapiteny hiambina an’i Paoly sy hamela azy hitsangantsangana ary tsy handrara olona na dia iray akory aza amin’ny sakaizany izay ho avy hanompo azy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka andro vitsivitsy, dia tonga Feliksa sy Drosila vadiny, vehivavy Jiosy, dia nampaka an’i Paoly izy ka nihaino azy nitory ny finoana an’i Kristy Jesosy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nitory ny amin’ny fahamarinana sy ny fahononana ary ny fitsarana ho avy izy, dia raiki-tahotra Feliksa ka namaly hoe: Mandehana angaloha; fa raha malalaka, dia hampaka anao indray aho. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sady nanantena koa izy fa homen’i Paoly vola; ka dia nampaka azy matetika izy ka niresaka taminy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa afaka roa taona, dia Porsio Festosy no nandimby an’i Feliksa; ary Feliksa ta-hahazo sitraka tamin’ny Jiosy, ka dia mbola navelany ho mpifatotra ihany Paoly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao no ahazoanay fiadanana lehibe, ary ny fitondranao efa nampandry tsara ity firenena ity; koa raisinay amin’ny fankasitrahana mandrakariva eny tontolo eny izany, ry Feliksa tsara indrindra ô. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mba tsy hanahirana anao ela loatra aho, tratrantitra hianao, henoy kely amin’ny faharetana izahay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa io lehilahy io dia hitanay fa tena ratsy fanahy sady mpampikomy ny Jiosy rehetra eny tontolo eny, ary izy no tari-dàlan’ilay antoko atao hoe Nazarena. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izy io koa nitady handoto ny tempoly; dia nosamborinay izy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka tianay ho tsaraina araka ny lalànay. 7 Fa tonga Lysia, mpifehy arivo, dia nanao an-keriny ka naka azy teo an-tànanay. Ary nasainy nankatỳ aminao ny mpiampanga azy.]'
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary rehefa manadina azy hianao, dia ho fantatrao marina izay rehetra iampanganay azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Jiosy koa dia nanaiky sy nilaza fa izany no izy.
