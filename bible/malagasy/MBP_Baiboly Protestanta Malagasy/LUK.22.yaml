document_id: LUK.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nihendren’ny lohan’ny mpisorona sy ny mpanora-dalana hahafaty an’i Jesosy.
  - type: heading
    content: Mat. 26.1-5; Mar. 14.1,10,11.
  - type: text
    content: 'ARY efa mby akaiky ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia ilay andro atao hoe Paska. '
  '10':
  - type: text
    content: 'Dia hoy Izy taminy: Indro, raha miditra ao an-tanàna hianareo, dia hisy lehilahy mitondra siny feno rano hifanena aminareo; manaraha azy ao amin’ny trano izay hidirany. '
  '11':
  - type: text
    content: 'Dia lazao amin’ny tompon-trano hoe: Izao no lazain’ny Mpampianatra aminao: Aiza ny efi-trano hiarahako mihinana ny Paska amin’ny mpianatro? '
  '12':
  - type: text
    content: 'Ary izy hanoro anareo efi-trano malalaka ambony rihana, izay efa nasiana fipetrahana; any no amboary. '
  '13':
  - type: text
    content: Dia nandeha izy ka nahita araka izay efa nolazainy taminy; dia namboatra ny Paska izy.
  '14':
  - type: text
    content: 'Ary nony tonga ny fotoana, dia nipetraka hihinana Izy mbamin’ny Apostoly. '
  '15':
  - type: text
    content: 'Ary hoy Izy taminy: Naniry koa raha naniry Aho hiara-mihinana ity Paska ity aminareo, dieny mbola tsy mijaly Aho. '
  '16':
  - type: text
    content: 'Fa lazaiko aminareo fa tsy mba hihinana izany intsony Aho ambara-pahatanterak’izany ao amin’ny fanjakan’Andriamanitra. '
  '17':
  - type: text
    content: 'Ary nandray kapoaka Izy, dia nisaotra ka nanao hoe: Raiso ity, ka zarao aminareo; '
  '18':
  - type: text
    content: fa lazaiko aminareo fa hatramin’izao dia tsy hisotro ny vokatry ny voaloboka intsony Aho mandra-pahatongan’ny fanjakan’Andriamanitra.
  '19':
  - type: text
    content: 'Ary nandray mofo Izy, ary rehefa nisaotra, dia novakiny ka natolony azy sady nataony hoe: Ity no tenako izay omena ho anareo; izao no ataovinareo ho fahatsiarovana Ahy. '
  '2':
  - type: text
    content: Ary ny lohan’ny mpisorona sy ny mpanora-dalàna nitady izay hamonoany an’i Jesosy; nefa natahotra ny olona izy.
  '20':
  - type: text
    content: 'Ary araka izany koa ny kapoaka, rehefa vita ny sakafo, dia hoy Izy: Ity kapoaka ity no fanekena vaovao amin’ny rako, izay aidina ho anareo.'
  '21':
  - type: text
    content: 'Fa, indro, ny tànan’izay mamadika Ahy dia eto amiko eto ambonin’ny latabatra. '
  '22':
  - type: text
    content: 'Fa ny Zanak’olona mandeha tokoa, araka izay nanendrena; nefa lozan’izay lehilahy hahazoana manolotra Azy! '
  '23':
  - type: text
    content: Ary ireo nifanontany izay anankiray eo aminy hahefa izany.
  - type: heading
    content: Ny nifandiran’ny Apostoly ny amin’izay ho lehibe, sy ny anatra nataon’i Jesosy tamin’izany.
  '24':
  - type: text
    content: 'ARY nisy koa fifandirana tao aminy ny amin’izay anankiray aminy hatao lehibe. '
  '25':
  - type: text
    content: 'Ary hoy Jesosy taminy: Ny mpanjakan’ny jentilisa mampanompo azy, ary izay manapaka azy no atao hoe mpanao soa. '
  '26':
  - type: text
    content: 'Fa tsy mba toy izany hianareo; fa izay lehibe aminareo dia aoka ho toy ny zandry; ary izay manapaka dia aoka ho toy ny mpanompo. '
  '27':
  - type: text
    content: 'Fa iza moa no lehibe, izay mipetraka mihinana va, sa izay manompo? Tsy izay mipetraka mihinana va? Fa Izaho dia eo aminareo toy izay manompo. '
  '28':
  - type: text
    content: 'Ary hianareo no naharitra nanaraka Ahy tamin’ny fakam-panahy nihatra tamiko; '
  '29':
  - type: text
    content: 'koa Izaho dia manendry fanjakana ho anareo tahaka ny nanendren’ny Raiko ho Ahy, '
  '3':
  - type: text
    content: 'Fa Satana niditra tao anatin’i Jodasy, ilay atao hoe Iskariota, anankiray tamin’ny roa ambin’ny folo lahy; '
  '30':
  - type: text
    content: mba hihinana sy hisotro eo amin’ny latabatro amin’ny fanjakako hianareo sady hipetraka ambony seza fiandrianana hitsara ny firenen’Isiraely roa ambin’ny folo.
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Ary hoy ny Tompo:'
  - type: text
    content: ' Ry Simona, ry Simona, indro, Satana efa nilofo nitady anareo hokororohiny toy ny vary. '
  '32':
  - type: text
    content: 'Nefa Izaho nangataka ho anao, mba tsy ho levona ny finoanao; ary rehefa mibebaka hianao, dia ampaherezo ireo rahalahinao. '
  '33':
  - type: text
    content: 'Ary hoy izy taminy: Tompoko, vonona hanaraka Anao aho, na ho ao an-tranomaizina, na dia ho any amin’ny fahafatesana aza. '
  '34':
  - type: text
    content: 'Fa hoy Jesosy: Lazaiko aminao, ry Petera: Raha tsy mbola misy akoho maneno anio, dia handa intelo ho tsy mahalala Ahy hianao.'
  '35':
  - type: text
    content: 'Ary hoy koa Izy taminy: Raha nirahiko tsy nitondra kitapom-bola na kitapom-batsy na kapa hianareo, moa nisy zavatra nahory anareo va? Dia hoy ireo: Tsy nisy. '
  '36':
  - type: text
    content: 'Fa hoy Izy taminy: Fa amin’izao kosa, izay manana kitapom-bola dia aoka hitondra azy; ary toy izany koa ny kitapom-batsy; ary izay tsy manan-tsabatra kosa, dia aoka hivarotra ny lambany izy ka hividy. '
  '37':
  - type: text
    content: 'Fa lazaiko aminareo: Tsy maintsy ho tanteraka amiko izao voasoratra izao hoe: ,,Ary Izy natao ho isan’ny mpanota’’ (Isa. 53.12); fa efa ho tanteraka ny amiko. '
  '38':
  - type: text
    content: 'Ary hoy ireo: Tompoko, ndreto sabatra roa. Dia hoy Jesosy taminy: Aoka izay.'
  - type: heading
    content: Jesosy tao Getsemane.
  - type: heading
    content: Mat. 26.36-46; Mar. 14.32-42.
  '39':
  - type: text
    content: 'ARY nivoaka Jesosy, koa araka ny fanaony dia nankao an-tendrombohitra Oliva Izy, ary ny mpianatra koa nanaraka Azy. '
  '4':
  - type: text
    content: 'dia nankao amin’ny lohan’ny mpisorona sy ny lehiben’ny mpiambina izy ka niresaka taminy ny amin’izay hamadihany an’i Jesosy amin’ireo. '
  '40':
  - type: text
    content: 'Ary raha vao tonga tao amin’izany tany izany, dia hoy Izy taminy: Mivavaha mba tsy hidiranareo amin’ny fakam-panahy.'
  '41':
  - type: text
    content: 'Ary Izy nihataka taminy tokony ho indray mitora-bato, dia nandohalika ka nivavaka hoe: '
  '42':
  - type: text
    content: 'Raiko ô, raha sitrakao, dia esory amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao. '
  '43':
  - type: text
    content: 'Ary nisy anjely avy tany an-danitra niseho teo aminy ka nampahery Azy. '
  '44':
  - type: text
    content: 'Ary fadiranovana Izy, ka dia nivavaka mafimafy kokoa; ary ny dininy dia tahaka ny ra nipotrapotraka tamin’ny tany. '
  '45':
  - type: text
    content: 'Ary nony nitsangana avy nivavaka Izy, dia nankeo amin’ny mpianatra ka nahita azy matorin’alahelo. '
  '46':
  - type: text
    content: 'Dia hoy Izy taminy: Nahoana no dia matory hianareo? Mitsangàna, ka mivavaha, mba tsy hidiranareo amin’ny fakam-panahy.'
  - type: heading
    content: Ny nisamborana an’i Jesosy.
  - type: heading
    content: Mat. 26.47-56; Mar. 14.43-52; Jao. 18.1-11.
  '47':
  - type: text
    content: 'ARY raha mbola niteny Jesosy, indreo, tamy ny vahoaka, ary ilay atao hoe Jodasy, isan’ny roa ambin’ny folo lahy, dia nandeha teo alohany ka nanatona an’i Jesosy hanoroka Azy. '
  '48':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ry Jodasy, fanorohana va no amadihanao ny Zanak’olona?'
  '49':
  - type: text
    content: 'Ary izay teo aminy, raha nahita izay efa hanjo, dia nanao hoe: Tompoko, hamely amin’ny sabatra va izahay? '
  '5':
  - type: text
    content: 'Dia faly ireo ka nanaiky hanome vola azy. '
  '50':
  - type: text
    content: 'Ary ny anankiray teo aminy dia nikapa ny mpanompon’ny mpisoronabe ka nahafaka ny sofiny ankavanana. '
  '51':
  - type: text
    content: 'Fa Jesosy namaly ka nanao hoe: Aoka ihany na dia izao aza. Dia nanendry ny sofiny Izy ka nahasitrana azy.'
  '52':
  - type: text
    content: 'Ary hoy Jesosy tamin’ny lohan’ny mpisorona sy ny lehiben’ny mpiambina ny tempoly ary ny loholona izay tonga hisambotra Azy: Mivoaka mitondra sabatra sy langilangy toy ny hisambotra jiolahy va hianareo? '
  '53':
  - type: text
    content: Raha teo aminareo isan-andro teo an-kianjan’ny tempoly Aho, dia tsy naninji-tanana tamiko hianareo; fa izao no fotoanareo sy herin’ny maizina.
  - type: heading
    content: Ny nitsarana an’i Jesosy teo anatrehan’i Kaiafa, sy ny nandavan’i Petera Azy intelo.
  - type: heading
    content: Mat. 26.57-75; Mar. 14.53-72; Jao. 18.12-27.
  '54':
  - type: text
    content: 'ARY izy ireo nisambotra an’i Jesosy, dia nitondra Azy ho ao an-tranon’ny mpisoronabe. Ary Petera nanaraka teny lavidavitra eny. '
  '55':
  - type: text
    content: 'Ary raha namelona afo teo an-kianja ireo ka nipetraka, dia mba nipetraka teo aminy koa Petera. '
  '56':
  - type: text
    content: 'Ary ny ankizivavy anankiray, nony nahita azy nipetraka teo anilan’ny afo, dia nandinika azy ka nanao hoe: Ity koa nomba Azy. '
  '57':
  - type: text
    content: 'Fa izy nanda ka nanao hoe: Ravehivavy, tsy fantatro Izy. '
  '58':
  - type: text
    content: 'Ary vetivety foana rehefa afaka izany, dia nisy olona hafa koa nahita azy ka nanao hoe: Hianao koa mba naman’ireny. Fa Petera nanao hoe: Ralehilahy, tsy mba namany aho. '
  '59':
  - type: text
    content: 'Ary rehefa afaka tokony ho ora iray, dia nisy anankiray koa nitompo teny ka nanao hoe: Ilehio nomba Azy marina tokoa, fa Galiliana izy. '
  '6':
  - type: text
    content: Ary nanaiky izy ka nitady izay andro hahazoany hamadika Azy amin’ireo amin’ny tsy misy olona.
  - type: heading
    content: Ny niarahan’i Jesosy nihinana ny Paska tamin’ny mpianany.
  - type: heading
    content: Mat. 26.17-29; Mar. 14.12-25.
  '60':
  - type: text
    content: 'Fa hoy Petera: Ralehilahy, tsy fantatro izay lazainao. Ary niaraka tamin’izay, raha mbola niteny izy, dia nisy akoho naneno. '
  '61':
  - type: text
    content: 'Ary ny Tompo nitodika, dia nijery an’i Petera. Ary Petera nahatsiaro ilay tenin’ny Tompo nolazainy taminy hoe: ’Raha tsy mbola misy akoho maneno anio, dia handa Ahy intelo hianao.’ '
  '62':
  - type: text
    content: Ary nivoaka Petera, dia nitomany mafy indrindra.
  '63':
  - type: text
    content: 'Ary ny lehilahy izay nitana an’i Jesosy dia nanao Azy ho fihomehezana sady nikapoka Azy. '
  '64':
  - type: text
    content: 'Ary rehefa nanampi-maso Azy izy, dia nanontany Azy hoe: Maminania; iza moa no namely Anao? '
  '65':
  - type: text
    content: Ary niteny ratsy izy nilaza zavatra maro hafa koa nanaratsiany Azy.
  '66':
  - type: text
    content: 'Ary raha vao nazava ny andro, niangona ny loholona, dia ny lohan’ny mpisorona sy ny mpanora-dalàna, ka nitondra an’i Jesosy ho eo amin’ny Synedriona, dia nanao hoe: '
  '67':
  - type: text
    content: 'Raha Hianao no Kristy, dia lazao aminay. Fa hoy Izy taminy: Na dia hilaza aminareo aza Aho, dia tsy hino hianareo. '
  '68':
  - type: text
    content: 'Ary na dia hanontany aza Aho, dia tsy hamaly akory hianareo. '
  '69':
  - type: text
    content: Fa hatramin’izao ny Zanak’olona dia hipetraka eo an-tànana ankavanan’ny herin’Andriamanitra.
  '7':
  - type: text
    content: 'ARY tonga ny andro fihinanana ny mofo tsy misy masirasira, dia ilay tsy maintsy hamonoana ny Paska. '
  '70':
  - type: text
    content: 'Dia hoy izy rehetra: Zanak’Andriamanitra va ary Hianao? Ary hoy Izy taminy: Voalazanareo fa Izaho no Izy. '
  '71':
  - type: text
    content: 'Ary hoy ireo: Ka inona indray no ilantsika vavolombelona? fa ny tenantsika no efa nandre tamin’ny vavany.'
  '8':
  - type: text
    content: 'Ary Jesosy naniraka an’i Petera sy Jaona ka nanao hoe: Mandehana, ka amboary ny Paska hohanintsika. '
  '9':
  - type: text
    content: 'Ary hoy ireo taminy: Aiza no tianao hanamboaranay azy? '
