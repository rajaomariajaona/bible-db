document_id: JOB.19,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nandrava ahy manodidina Izy, ka efa ho faty aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampirehetiny tamiko ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nataony ho fahavalony aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-mandroso ny antokon’ny miaramilany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manandratra tovon-tany hamelezany ahy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitoby manodidina ny laiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rahalahiko efa nampanalaviriny ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tsy misy eto intsony ny havako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sakaizako efa nanadino ahy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vahiny izay mitoetra ao an-tranoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ankizivaviko aza samy manao ahy ho olon-kafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga olon-ko azy eo imasony aho.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsoiko ny mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy namaly ahy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifona aminy amin’ny vavako aho.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fofonaiko mahaloiloy ny vadiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maharikoriko ny zanak’ineny aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny ankizilahy madinika aza mamingavinga ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha te-hitsangana aho, dia miteny mamely ahy ireny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hampalahelovanareo ny fanahiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanorotoroanareo ahy amin’ny fiteny?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taolako miraikitra amin’ny hoditro sy ny nofoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindrà fo amiko, mamindrà fo amiko hianareo, ry sakaizako ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tànan’Andriamanitra efa mikasika ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no manenjika ahy tahaka an’Andriamanitra koa hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mety afa-po amin’ny nofoko?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho voasoratra ny teniko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho voatomboka eo amin’ny boky ireny!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho voasoratra amin’ny vy fanoratana sady voasy firaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny vatolampy ho mandrakizay izy!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Goela.
      marker-yv: yv-n
    - type: text
      text: ' ahy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hitsangana any am-parany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho farany.
      marker-yv: yv-n
    - type: text
      text: ' eo ambonin’ny vovoka Izy.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa levona ny hoditro, izao simba izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady afaka amin’ny nofoko aho, dia hahita an’Andriamanitra;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia hahita an’Andriamanitra amin’ny nofoko aho.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izaho no hahita Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny masoko no hijery, fa tsy olon-kafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa matim-paniriana ny saiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voako.
      marker-yv: yv-n
    - type: text
      text: ' ato anatiko.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha hoy hianareo: Andeha hanenjika azy fatratra isika.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hita ao anatiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anatiko.
      marker-yv: yv-n
    - type: text
      text: ' ny fototry ny maha-meloka azy,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ahy.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia matahora ny sabatra hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa impolo izay no nanaratsianareo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misoroka izay hampahory ahy hianareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha diso tokoa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izaho ihany no andrian’ny fahadisoako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mirehareha amiko kosa hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampiaiky ahy ho nanao izay maha-menatra,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka efa naningotra ahy tamin’ny fandrika haratony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaraina aho, nefa tsy mahita rariny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny làlako dia nofefeny, ka tsy afa-mandroso aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nasiany maizina teo amin’ny làlana alehako.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voninahitro nalany tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nesoriny ny satroboninahitra teo an-dohako.
