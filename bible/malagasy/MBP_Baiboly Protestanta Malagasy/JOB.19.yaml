document_id: JOB.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hampalahelovanareo ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanorotoroanareo ahy amin’ny fiteny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa impolo izay no nanaratsianareo ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misoroka izay hampahory ahy hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha diso tokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izaho ihany no andrian’ny fahadisoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha mirehareha amiko kosa hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampiaiky ahy ho nanao izay maha-menatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa naningotra ahy tamin’ny fandrika haratony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitaraina aho, nefa tsy mahita rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny làlako dia nofefeny, ka tsy afa-mandroso aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nasiany maizina teo amin’ny làlana alehako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny voninahitro nalany tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nesoriny ny satroboninahitra teo an-dohako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa nandrava ahy manodidina Izy, ka efa ho faty aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nofongorany tahaka ny hazo ny fanantenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nampirehetiny tamiko ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nataony ho fahavalony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miara-mandroso ny antokon’ny miaramilany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manandratra tovon-tany hamelezany ahy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitoby manodidina ny laiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rahalahiko efa nampanalaviriny ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa tsy misy eto intsony ny havako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sakaizako efa nanadino ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny vahiny izay mitoetra ao an-tranoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ankizivaviko aza samy manao ahy ho olon-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga olon-ko azy eo imasony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Antsoiko ny mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy namaly ahy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifona aminy amin’ny vavako aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fofonaiko mahaloiloy ny vadiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maharikoriko ny zanak’ineny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eny, ny ankizilahy madinika aza mamingavinga ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha te-hitsangana aho, dia miteny mamely ahy ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay olon-tiako dia mivadika ho fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny taolako miraikitra amin’ny hoditro sy ny nofoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mamindrà fo amiko, mamindrà fo amiko hianareo, ry sakaizako ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tànan’Andriamanitra efa mikasika ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nahoana no manenjika ahy tahaka an’Andriamanitra koa hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mety afa-po amin’ny nofoko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Enga anie ka ho voasoratra ny teniko!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka ho voatomboka eo amin’ny boky ireny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Enga anie ka ho voasoratra amin’ny vy fanoratana sady voasy firaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny vatolampy ho mandrakizay izy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Goela.
    marker-yv: yv-n
  - type: text
    text: ' ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hitsangana any am-parany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho farany.
    marker-yv: yv-n
  - type: text
    text: ' eo ambonin’ny vovoka Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa levona ny hoditro, izao simba izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady afaka amin’ny nofoko aho, dia hahita an’Andriamanitra;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia hahita an’Andriamanitra amin’ny nofoko aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Eny, izaho no hahita Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny masoko no hijery, fa tsy olon-kafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa matim-paniriana ny saiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voako.
    marker-yv: yv-n
  - type: text
    text: ' ato anatiko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha hoy hianareo: Andeha hanenjika azy fatratra isika.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hita ao anatiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anatiko.
    marker-yv: yv-n
  - type: text
    text: ' ny fototry ny maha-meloka azy,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia matahora ny sabatra hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho fantatrareo fa misy fitsarana.
