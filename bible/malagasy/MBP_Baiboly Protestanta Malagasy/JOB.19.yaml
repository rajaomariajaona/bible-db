document_id: JOB.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Efa nandrava ahy manodidina Izy, ka efa ho faty aho;
  - type: text
    content: Ary efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: text
    content: Dia nampirehetiny tamiko ny fahatezerany,
  - type: text
    content: Ka nataony ho fahavalony aho.
  '12':
  - type: text
    content: Miara-mandroso ny antokon’ny miaramilany
  - type: text
    content: Ary manandratra tovon-tany hamelezany ahy izy
  - type: text
    content: Ka mitoby manodidina ny laiko.
  '13':
  - type: text
    content: Ny rahalahiko efa nampanalaviriny ahy;
  - type: text
    content: Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.
  '14':
  - type: text
    content: Efa tsy misy eto intsony ny havako,
  - type: text
    content: Ary ny sakaizako efa nanadino ahy.
  '15':
  - type: text
    content: Ny vahiny izay mitoetra ao an-tranoko
  - type: text
    content: Sy ny ankizivaviko aza samy manao ahy ho olon-kafa;
  - type: text
    content: Tonga olon-ko azy eo imasony aho.
  '16':
  - type: text
    content: Antsoiko ny mpanompoko,
  - type: text
    content: Nefa tsy namaly ahy izy;
  - type: text
    content: Mifona aminy amin’ny vavako aho.
  '17':
  - type: text
    content: Ny fofonaiko mahaloiloy ny vadiko,
  - type: text
    content: Ary maharikoriko ny zanak’ineny aho.
  '18':
  - type: text
    content: Eny, ny ankizilahy madinika aza mamingavinga ahy;
  - type: text
    content: Raha te-hitsangana aho, dia miteny mamely ahy ireny.
  '19':
  - type: text
    content: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta,
  - type: text
    content: Ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: text
    content: Mandra-pahoviana no hampalahelovanareo ny fanahiko
  - type: text
    content: Sy hanorotoroanareo ahy amin’ny fiteny?
  '20':
  - type: text
    content: Ny taolako miraikitra amin’ny hoditro sy ny nofoko,
  - type: text
    content: Ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: text
    content: Mamindrà fo amiko, mamindrà fo amiko hianareo, ry sakaizako ô;
  - type: text
    content: Fa ny tànan’Andriamanitra efa mikasika ahy.
  '22':
  - type: text
    content: Nahoana no manenjika ahy tahaka an’Andriamanitra koa hianareo
  - type: text
    content: Ka tsy mety afa-po amin’ny nofoko?
  '23':
  - type: text
    content: Enga anie ka ho voasoratra ny teniko!
  - type: text
    content: Enga anie ka ho voatomboka eo amin’ny boky ireny!
  '24':
  - type: text
    content: Enga anie ka ho voasoratra amin’ny vy fanoratana sady voasy firaka
  - type: text
    content: Eo amin’ny vatolampy ho mandrakizay izy!
  '25':
  - type: text
    content: Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra
  - type: note
    content: Heb. Goela.
  - type: text
    content: ' ahy,'
  - type: text
    content: Ka hitsangana any am-parany
  - type: note
    content: 'Na: ho farany.'
  - type: text
    content: ' eo ambonin’ny vovoka Izy.'
  '26':
  - type: text
    content: Ary rehefa levona ny hoditro, izao simba izao,
  - type: text
    content: Sady afaka amin’ny nofoko aho, dia hahita an’Andriamanitra;
  - type: note
    content: 'Na: Dia hahita an’Andriamanitra amin’ny nofoko aho.'
  '27':
  - type: text
    content: Eny, izaho no hahita Azy,
  - type: text
    content: Ary ny masoko no hijery, fa tsy olon-kafa.
  - type: text
    content: Efa matim-paniriana ny saiko
  - type: note
    content: Heb. voako.
  - type: text
    content: ' ato anatiko.'
  '28':
  - type: text
    content: 'Raha hoy hianareo: Andeha hanenjika azy fatratra isika.'
  - type: text
    content: Fa hita ao anatiny
  - type: note
    content: Heb. anatiko.
  - type: text
    content: ' ny fototry ny maha-meloka azy,'
  - type: note
    content: Heb. ahy.
  '29':
  - type: text
    content: Dia matahora ny sabatra hianareo;
  - type: text
    content: Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra,
  - type: text
    content: Mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: text
    content: Efa impolo izay no nanaratsianareo ahy;
  - type: text
    content: Tsy misoroka izay hampahory ahy hianareo.
  '4':
  - type: text
    content: Ary raha diso tokoa aho,
  - type: text
    content: Dia izaho ihany no andrian’ny fahadisoako.
  '5':
  - type: text
    content: Raha mirehareha amiko kosa hianareo
  - type: text
    content: Ka mampiaiky ahy ho nanao izay maha-menatra,
  '6':
  - type: text
    content: Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy
  - type: text
    content: Ka efa naningotra ahy tamin’ny fandrika haratony.
  '7':
  - type: text
    content: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy;'
  - type: text
    content: Mitaraina aho, nefa tsy mahita rariny.
  '8':
  - type: text
    content: Ny làlako dia nofefeny, ka tsy afa-mandroso aho;
  - type: text
    content: Ary nasiany maizina teo amin’ny làlana alehako.
  '9':
  - type: text
    content: Ny voninahitro nalany tamiko,
  - type: text
    content: Ary nesoriny ny satroboninahitra teo an-dohako.
