document_id: JER.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Jehovah tamiko: Na dia Mosesy sy Samoela aza no mitsangana eto anatrehako, dia tsy hankasitraka ity firenena ity ny fanahiko; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: LOZAKO, ry neny, ny niterahanao ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay lehilahy ilana ady sy fifandirana eny amin’ny tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nampanàna vola aho, ary tsy nisy nanana vola tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ozonin’ny olona rehetra ihany aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahafaka anao Aho hahasoa anao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny hahasoa anao ihany no nisehoako ho fahavalonao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko tonga mifona aminao tokoa ny fahavalo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro ahitan-doza sy amin’izay andro mahory.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mety tapaka va ny vy, dia ny vy avy any avaratra, na ny varahina?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fanananao sy ny rakitrao ao anatin’ny fari-taninao rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatolotro ho babo maimaimpoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahotana rehetra izay nataonao;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary hampitondraiko ny fahavalonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’ny tany tsy fantatrao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa arehitra ny afon’ny fahatezerako,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa misy afo arehitra amin’ny fahatezerako.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handoro anareo no irehetany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hianao no mahalala, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy aho, ka vangio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary valio izay manenjika ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza dia mandefitra aminy Hianao, fandrao ho afaka ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fantatrao fa noho ny aminao no nitondrako latsa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hitako ny teninao ka nohaniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny teninao no fifaliako sy firavoravoan’ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nantsoina tamin’ny anaranao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Andriamanitry ny maro ô.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izaho tsy nipetraka na nifaly teo amin’ny fivorian’ny mpikorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitoetra irery aho noho ny fihazonan’ny tànanao ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nofenoinao fahatezerana aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nahoana re no dia tsy mety mitsahatra ny faharariako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fatratra ny feriko ka tsy mety sitrana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga amiko tahaka ny rano-trambo va Hianao, dia rano tsy azo itokiana?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hiverina hianao, dia horaisiko indray,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hampivereniko.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hitsangana eo anatrehako hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha manavaka ny zava-tsoa hiala amin’ny zava-poana hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho solom-bavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanatona anao indray ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hianao no hanatona azy,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary raha tàhiny izy manao aminao hoe: Hiala hankaiza izahay? dia ataovy aminy hoe: Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay ho amin’ny areti-mandringana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahafatesana.
      marker-yv: yv-n
    - type: text
      text: ' dia ho amin’ny areti-mandringana,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahafatesana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay ho amin’ny sabatra dia ho amin’ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay ho amin’ny mosary dia ho amin’ny mosary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hataoko mànda varahina mirova ho amin’ity firenena ity hianao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiady aminao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy hahaleo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa momba anao hamonjy sy hanafaka anao Aho, hoy Jehovah;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary hanafaka anao amin’ny tànan’ny ratsy fanahy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanavotra anao amin’ny tànan’ny mpampahory.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny sabatra hamono sy ny amboa hamiravira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voro-manidina sy ny bibi-dia hihinana sy handany;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary manolotra azy ho mpanjenjena any amin’ny fanjakana rehetra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho fampangovitana ny fanjakana rehetra.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny tany Aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny amin’i Manase, zanak’i Hezekia, mpanjakan’ny Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noho izay nataony tany Jerosalema.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa iza no hangoraka anao, ry Jerosalema?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no hitsapa alahelo anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no hivily hanantsafa anao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hianao efa nahafoy Ahy sady efa nihemotra, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ahinjitro kosa ny tànako hamely anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka efa mandringana anao Aho, fa efa sasatra ny mandefitra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manenina.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary kororohiko amin’ny fikororohana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’ny vava-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary foanako anaka ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aringako izy–tsy mety miala amin’ny fanaony mba hiverina izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny mpitondratenany mihamaro eo imasoko mihoatra noho ny fasika any an-dranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondra mpandringana ho ao aminy Aho handripaka ny renin’ny zatovo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mitataovovonana aza ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataoko tonga tampoka aminy ny fanaintainana sy ny tahotra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Izay niteraka fito dia mihaosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miala aina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milentika mbola antoandro ny masoandrony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menarina sy mangaihay izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay sisa aminy dia hatolotro ho voan’ny sabatra eo anoloan’ny fahavalony, hoy Jehovah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainan’i Jeremia tamin’Andriamanitra, sy ny teny fampiononana navaliny azy.
    marker-yv: yv-h
