document_id: JER.15,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Na dia Mosesy sy Samoela aza no mitsangana eto anatrehako, dia tsy hankasitraka ity firenena ity ny fanahiko; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy. '
  '10':
  - type: text
    content: LOZAKO, ry neny, ny niterahanao ahy,
  - type: text
    content: Izay lehilahy ilana ady sy fifandirana eny amin’ny tany rehetra!
  - type: text
    content: Tsy nampanàna vola aho, ary tsy nisy nanana vola tamiko,
  - type: text
    content: Nefa ozonin’ny olona rehetra ihany aho.
  '11':
  - type: text
    content: 'Dia hoy Jehovah:'
  - type: text
    content: Nahafaka anao Aho hahasoa anao;
  - type: note
    content: 'Na: Ny hahasoa anao ihany no nisehoako ho fahavalonao.'
  - type: text
    content: Hataoko tonga mifona aminao tokoa ny fahavalo
  - type: text
    content: Amin’ny andro ahitan-doza sy amin’izay andro mahory.
  '12':
  - type: text
    content: Mety tapaka va ny vy, dia ny vy avy any avaratra, na ny varahina?
  '13':
  - type: text
    content: Ny fanananao sy ny rakitrao ao anatin’ny fari-taninao rehetra
  - type: text
    content: Dia hatolotro ho babo maimaimpoana
  - type: text
    content: Noho ny fahotana rehetra izay nataonao;
  '14':
  - type: text
    content: Ary hampitondraiko ny fahavalonao
  - type: text
    content: Ho any amin’ny tany tsy fantatrao izany;
  - type: text
    content: Fa arehitra ny afon’ny fahatezerako,
  - type: note
    content: Heb. Fa misy afo arehitra amin’ny fahatezerako.
  - type: text
    content: Ka handoro anareo no irehetany.
  '15':
  - type: text
    content: Hianao no mahalala, Jehovah ô;
  - type: text
    content: Tsarovy aho, ka vangio,
  - type: text
    content: Ary valio izay manenjika ahy;
  - type: text
    content: Aza dia mandefitra aminy Hianao, fandrao ho afaka ny aiko;
  - type: text
    content: Aoka ho fantatrao fa noho ny aminao no nitondrako latsa.
  '16':
  - type: text
    content: Hitako ny teninao ka nohaniko,
  - type: text
    content: Ary ny teninao no fifaliako sy firavoravoan’ny foko;
  - type: text
    content: Fa nantsoina tamin’ny anaranao aho,
  - type: text
    content: Jehovah, Andriamanitry ny maro ô.
  '17':
  - type: text
    content: Izaho tsy nipetraka na nifaly teo amin’ny fivorian’ny mpikorana,
  - type: text
    content: Nitoetra irery aho noho ny fihazonan’ny tànanao ahy,
  - type: text
    content: Fa nofenoinao fahatezerana aho.
  '18':
  - type: text
    content: Nahoana re no dia tsy mety mitsahatra ny faharariako,
  - type: text
    content: Ary fatratra ny feriko ka tsy mety sitrana?
  - type: text
    content: Ho tonga amiko tahaka ny rano-trambo va Hianao, dia rano tsy azo itokiana?
  '19':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Raha hiverina hianao, dia horaisiko indray,
  - type: note
    content: Heb. hampivereniko.
  - type: text
    content: Ka dia hitsangana eo anatrehako hianao;
  - type: text
    content: Ary raha manavaka ny zava-tsoa hiala amin’ny zava-poana hianao,
  - type: text
    content: Dia ho solom-bavako;
  - type: text
    content: Hanatona anao indray ireny;
  - type: text
    content: Fa tsy hianao no hanatona azy,
  '2':
  - type: text
    content: 'Ary raha tàhiny izy manao aminao hoe: Hiala hankaiza izahay? dia ataovy aminy hoe: Izao no lazain’i Jehovah:'
  - type: text
    content: Izay ho amin’ny areti-mandringana
  - type: note
    content: Heb. fahafatesana.
  - type: text
    content: ' dia ho amin’ny areti-mandringana,'
  - type: note
    content: Heb. fahafatesana.
  - type: text
    content: Ary izay ho amin’ny sabatra dia ho amin’ny sabatra,
  - type: text
    content: Ary izay ho amin’ny mosary dia ho amin’ny mosary,
  - type: text
    content: Ary izay ho amin’ny fahababoana dia ho amin’ny fahababoana.
  '20':
  - type: text
    content: 'Ary hataoko mànda varahina mirova ho amin’ity firenena ity hianao:'
  - type: text
    content: Hiady aminao izy,
  - type: text
    content: Nefa tsy hahaleo anao;
  - type: text
    content: Fa momba anao hamonjy sy hanafaka anao Aho, hoy Jehovah;
  '21':
  - type: text
    content: Ary hanafaka anao amin’ny tànan’ny ratsy fanahy Aho
  - type: text
    content: Sy hanavotra anao amin’ny tànan’ny mpampahory.
  '3':
  - type: text
    content: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy Jehovah:'
  - type: text
    content: Dia ny sabatra hamono sy ny amboa hamiravira
  - type: text
    content: Ary ny voro-manidina sy ny bibi-dia hihinana sy handany;
  '4':
  - type: text
    content: Ary manolotra azy ho mpanjenjena any amin’ny fanjakana rehetra
  - type: note
    content: 'Na: ho fampangovitana ny fanjakana rehetra.'
  - type: text
    content: ' amin’ny tany Aho'
  - type: text
    content: Noho ny amin’i Manase, zanak’i Hezekia, mpanjakan’ny Joda,
  - type: text
    content: Dia noho izay nataony tany Jerosalema.
  '5':
  - type: text
    content: Fa iza no hangoraka anao, ry Jerosalema?
  - type: text
    content: Ary iza no hitsapa alahelo anao?
  - type: text
    content: Ary iza no hivily hanantsafa anao?
  '6':
  - type: text
    content: Hianao efa nahafoy Ahy sady efa nihemotra, hoy Jehovah,
  - type: text
    content: Ka dia ahinjitro kosa ny tànako hamely anao,
  - type: text
    content: Ka efa mandringana anao Aho, fa efa sasatra ny mandefitra.
  - type: note
    content: Heb. manenina.
  '7':
  - type: text
    content: Ary kororohiko amin’ny fikororohana izy
  - type: text
    content: Ho any amin’ny vava-tany;
  - type: text
    content: Ary foanako anaka ny oloko,
  - type: text
    content: Eny, aringako izy–tsy mety miala amin’ny fanaony mba hiverina izy.
  '8':
  - type: text
    content: Ny mpitondratenany mihamaro eo imasoko mihoatra noho ny fasika any an-dranomasina;
  - type: text
    content: Mitondra mpandringana ho ao aminy Aho handripaka ny renin’ny zatovo,
  - type: text
    content: Na dia mitataovovonana aza ny andro;
  - type: text
    content: Ataoko tonga tampoka aminy ny fanaintainana sy ny tahotra.
  '9':
  - type: text
    content: Izay niteraka fito dia mihaosa,
  - type: text
    content: Miala aina izy,
  - type: text
    content: Milentika mbola antoandro ny masoandrony,
  - type: text
    content: Menarina sy mangaihay izy;
  - type: text
    content: Ary izay sisa aminy dia hatolotro ho voan’ny sabatra eo anoloan’ny fahavalony, hoy Jehovah.
  - type: heading
    content: Fitarainan’i Jeremia tamin’Andriamanitra, sy ny teny fampiononana navaliny azy.
