document_id: JOS.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'Ny nanombohan’i Josoa ny nizarany ny tany: ny anjaran’i Kaleba.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no nolovan’ny Zanak’Isiraely teo amin’ny tany Kanana, izay nampandovain’i Eleazara mpisorona sy Josoa, zanak’i Nona, ary ny loholon’ny firenen’ny Zanak’Isiraely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tamin’ny filokana no nahazoany ny lovany, araka izay efa nandidian’i Jehovah an’i Mosesy ny amin’ny firenena sivy sy sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa efa nomen’i Mosesy lova tany an-dafin’i Jordana ny firenena roa sy sasany; fa ny taranak’i Levy tsy mba nomeny lova teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa firenena roa ny taranak’i Josefa, dia Manase sy Efraima; ary tsy mba nomeny anjara teo amin’ny tany ny taranak’i Levy, afa-tsy ny tanàna honenany sy ny tany manodidina ny tanànany ho an’ny omby aman-ondriny sy ny fananany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Araka izay efa nandidian’i Jehovah an’i Mosesy no nataon’ny Zanak’Isiraely, ka dia nizara ny tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nankany amin’i Josoa tany Gilgala ny taranak’i Joda; ary Kaleba, zanak’i Jefone, Kenizita, nanao taminy hoe: Fantatrao ny teny izay nolazain’i Jehovah tamin’i Mosesy, lehilahin’Andriamanitra, ny amiko sy hianao tany Kadesy-barnea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa-polo taona no andro niainako, fony aho nirahin’i Mosesy, mpanompon’i Jehovah, niala tany Kadesy-barnea hisafo ny tany; dia niverina aho nitondra teny taminy araka izay tao am-poko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa ireo rahalahiko izay niara-niakatra tamiko dia nanaketraka ny fon’ny olona; fa izaho kosa dia tanteraka tamin’ny fanarahana an’i Jehovah Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nianiana tamin’izany andro izany Mosesy ka nanao hoe: Ny tany izay nodiavin’ny tongotrao dia ho lovanao sy ny taranakao tokoa mandrakizay, satria tanteraka tamin’ny fanarahana an’i Jehovah Andriamanitro hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ankehitriny, indro, efa namelona ahy Jehovah, araka izay nolazainy hatramin’ny dimy amby efa-polo taona lasa izay, dia hatramin’ny nilazan’i Jehovah izany teny izany tamin’i Mosesy no ho mankatỳ, raha mbola nandehandeha tany an-efitra ny Isiraely; ary ankehitriny, indro, efa dimy amby valo-polo taona aho izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa mbola matanjaka ihany aho izao tahaka ny tamin’ny andro nanirahan’i Mosesy ahy: tahaka ny tanjako tamin’izany ihany no mbola tanjako ankehitriny, mba hiady, na hivoaka, na hiditra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ankehitriny omeo ahy irỳ tendrombohitra irỳ, izay nolazain’i Jehovah tamin’izany andro izany; fa efa renao tamin’izany andro izany fa nitoetra teo ny Anakita, sady nisy tanàna lehibe mimanda; angamba homba ahy Jehovah, dia haharoaka azy aho, araka izay nolazain’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nitso-drano azy Josoa ka nanome an’i Hebrona ho lovan’i Kaleba, zanak’i Jefone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no nahatongavan’i Hebrona ho lovan’i Kaleba, zanak’i Jefone, Kenizita, mandraka andro-any, satria tanteraka tamin’ny fanarahana an’i Jehovah, Andriamanitry ny Isiraely, izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tanànan’i Arba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kiriat-arba; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Jos. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xv. 54.
    marker-yv: yv-n
  - type: text
    text: ' no anaran’i Hebrona taloha; ilay lehiiahy vaventy tamin’ny Anakita izany Arba izany. Dia nandry ny tany, ka tsy nisy ady lntsony.'
