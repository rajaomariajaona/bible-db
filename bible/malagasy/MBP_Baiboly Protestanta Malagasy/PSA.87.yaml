document_id: PSA.87,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanànan’i Jehovah, izay hahaterahan’ny firenena maro ho isan’ny Isiraely.
  - type: text
    content: Salamo nataon’ny Koraïta. Tonon-kira.
  - type: text
    content: 'NY naorin’i '
  - type: text
    content: Jehovah
  - type: text
    content: ' dia ao an-tendrombohitra masina;'
  '2':
  - type: text
    content: Ny vavahadin’i Ziona dia tian’i Jehovah
  - type: text
    content: Mihoatra noho ny fonenana rehetra izay an’i Jakoba.
  '3':
  - type: text
    content: Zava-malaza no anambarana anao,
  - type: text
    content: Ry tanànan’Andriamanitra.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Hanonona an-dRahaba
  - type: note
    content: 'Na: Egypta.'
  - type: text
    content: ' sy Babylona Aho ho isan’izay mahalala Ahy;'
  - type: text
    content: Indro Filistia sy Tyro mbamin’i Etiopia,–
  - type: text
    content: Ity no efa teraka teo.
  '5':
  - type: text
    content: 'Ary Ziona hilazana hoe:'
  - type: text
    content: Ireto sy ireroa samy efa teraka teo;
  - type: text
    content: Ary ny Avo Indrindra no mampitoetra azy.
  '6':
  - type: text
    content: 'Jehovah hanisa, raha manoratra ny firenena Izy:'
  - type: text
    content: Ity no efa teraka teo.
  - type: text
    content: '[Sela.]'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Hoy
  - type: text
    content: ' izay mihira sy mandihy:'
  - type: text
    content: Ny loharanoko rehetra dia ao aminao.
