document_id: PSA.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainana ataon’izay azom-pahoriana mafy loatra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, mandra-pahoviana no mbola hanadinoanao ahy ihany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no mbola hanafenanao ny tavanao amiko?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandra-pahoviana no mbola hisaintsainako am-panahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hahalahelovako am-po isan-andro?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no mbola hisandratan’ny fahavaloko ho amboniko?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jereo aho ka valio, Jehovah Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahazavao ny masoko, fandrao renoky ny torimaso fahafatesana aho;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fandrao ny fahavaloko hanao hoe: Naharesy azy aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hifaly ny rafilahiko, raha mangozohozo aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa raha izaho kosa, dia ny famindramponao no itokiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faly amin’ny famonjenao ny foko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hihira ho an’i Jehovah aho, satria nanisy soa ahy Izy.
