document_id: PSA.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana ataon’izay azom-pahoriana mafy loatra.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, mandra-pahoviana no mbola hanadinoanao ahy ihany?
  - type: text
    content: Mandra-pahoviana no mbola hanafenanao ny tavanao amiko?
  '2':
  - type: text
    content: Mandra-pahoviana no mbola hisaintsainako am-panahy
  - type: text
    content: Sy hahalahelovako am-po isan-andro?
  - type: text
    content: Mandra-pahoviana no mbola hisandratan’ny fahavaloko ho amboniko?
  '3':
  - type: text
    content: Jereo aho ka valio, Jehovah Andriamanitro ô;
  - type: text
    content: Ampahazavao ny masoko, fandrao renoky ny torimaso fahafatesana aho;
  '4':
  - type: text
    content: 'Fandrao ny fahavaloko hanao hoe: Naharesy azy aho,'
  - type: text
    content: Fandrao hifaly ny rafilahiko, raha mangozohozo aho.
  '5':
  - type: text
    content: Fa raha izaho kosa, dia ny famindramponao no itokiako;
  - type: text
    content: Ho faly amin’ny famonjenao ny foko.
  '6':
  - type: text
    content: Hihira ho an’i Jehovah aho, satria nanisy soa ahy Izy.
