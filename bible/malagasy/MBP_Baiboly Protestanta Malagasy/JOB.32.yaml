document_id: JOB.32,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny nataon’i Eliho.
  - type: text
    content: 'ARY nitsahatra tsy namaly intsony izy telo lahy ireo, satria nanamarin-tena Joba. '
  '10':
  - type: text
    content: 'Ary noho izany dia hoy izaho: Aoka samy hihaino ahy;'
  - type: text
    content: Izaho koa mba hanambara izay fantatro.
  '11':
  - type: text
    content: Indro, niandry ny teninareo aho,
  - type: text
    content: Ary nandinika ny teny nalahatrareo,
  - type: text
    content: Mandra-pihevitrareo izay holazaina;
  '12':
  - type: text
    content: Eny, nihaino dia nihaino anareo aho,
  - type: text
    content: Fa he! tsy nisy naharesy lahatra an’i Joba hianareo,
  - type: text
    content: Na nahavaly ny teniny akory;
  '13':
  - type: text
    content: 'Fandrao hianareo hanao hoe: Hitanay ny fotony:'
  - type: note
    content: Heb. fahendrena.
  - type: text
    content: Andriamanitra no maharesy azy, fa tsy olona.
  '14':
  - type: text
    content: Tsy nandaha-teny hamely ahy anefa izy;
  - type: text
    content: Ary tsy araka ny teninareo no havaliko azy.
  '15':
  - type: text
    content: Very hevitra terỳ izy ireo, ka tsy namaly intsony;
  - type: text
    content: Efa nanalavitra azy ny teny.
  '16':
  - type: text
    content: Hangina va aho, raha tsy miteny izy ireo,
  - type: text
    content: Fa mijanona foana izy ka tsy mamaly intsony?
  '17':
  - type: text
    content: Anjarako kosa izao, koa dia hamaly aho;
  - type: text
    content: Eny, izaho hanambara izay fantatro;
  '18':
  - type: text
    content: Fa feno teny ny foko;
  - type: text
    content: Manery ahy ny fanahy ato anatiko.
  '19':
  - type: text
    content: Endrey! ny ato anatiko dia efa tahaka ny divay izay tsy misy hiainana,
  - type: text
    content: Efa ho triatra tahaka ny siny hoditra vaovao izy.
  '2':
  - type: text
    content: 'Ary nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela, Bozita, avy amin’ny fokon’i Rama; eny, tamin’i Joba no nirehetan’ny fahatezerany, satria nanao ny tenany ho marina noho Andriamanitra izy. '
  '20':
  - type: text
    content: Hiteny aho mba hisy hiainako tsara;
  - type: text
    content: Hiloa-bava aho ka hamaly.
  '21':
  - type: text
    content: Aoka tsy hizaha tavan’olona akory aho,
  - type: text
    content: Ary aoka tsy handrobo olona.
  '22':
  - type: text
    content: Fa tsy mba mahay mandrobo aho;
  - type: text
    content: Raha izany, dia halain’ny Mpanao ahy faingana aho.
  '3':
  - type: text
    content: Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany, satria tsy nahita teny havaliny izy ireo, kanefa nanameloka an’i Joba.
  - type: note
    content: 'Na: teny havaliny an’i Joba hanamelohany azy.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Ary Eliho mbola niandry an-dr’i Joba aloha vao niteny, fa ireo no ela niainana kokoa noho izy. '
  '5':
  - type: text
    content: 'Ary rehefa hitany fa tsy nanan-kavaly izy telo lahy, dia nirehitra ny fahatezerany; '
  '6':
  - type: text
    content: 'ka dia niteny Eliho, zanak’i Barakela, Bozita, ka nanao hoe:'
  - type: text
    content: Mbola tanora aho, fa hianareo kosa efa fotsy volo,
  - type: text
    content: Koa dia niaoriandriana aho aloha, fa tsy sahy nanambara aminareo izay fantatro.
  '7':
  - type: text
    content: 'Hoy izaho: Aoka ny fahanterana no hiteny,'
  - type: text
    content: Ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
  '8':
  - type: text
    content: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
  - type: text
    content: Sy
  - type: note
    content: 'Na: Dia.'
  - type: text
    content: ' ny fofonoin’ny Tsitoha no mahahendry azy.'
  '9':
  - type: text
    content: Tsy dia ny fahalehibiazana no mahahendry,
  - type: text
    content: Ary tsy dia ny fahanterana no ahalalana ny rariny;
