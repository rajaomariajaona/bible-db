document_id: JOB.32
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny nataon’i Eliho.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nitsahatra tsy namaly intsony izy telo lahy ireo, satria nanamarin-tena Joba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela, Bozita, avy amin’ny fokon’i Rama; eny, tamin’i Joba no nirehetan’ny fahatezerany, satria nanao ny tenany ho marina noho Andriamanitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany, satria tsy nahita teny havaliny izy ireo, kanefa nanameloka an’i Joba.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: teny havaliny an’i Joba hanamelohany azy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Eliho mbola niandry an-dr’i Joba aloha vao niteny, fa ireo no ela niainana kokoa noho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa hitany fa tsy nanan-kavaly izy telo lahy, dia nirehitra ny fahatezerany; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka dia niteny Eliho, zanak’i Barakela, Bozita, ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola tanora aho, fa hianareo kosa efa fotsy volo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa dia niaoriandriana aho aloha, fa tsy sahy nanambara aminareo izay fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izaho: Aoka ny fahanterana no hiteny,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia.
    marker-yv: yv-n
  - type: text
    text: ' ny fofonoin’ny Tsitoha no mahahendry azy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy dia ny fahalehibiazana no mahahendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy dia ny fahanterana no ahalalana ny rariny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho izany dia hoy izaho: Aoka samy hihaino ahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho koa mba hanambara izay fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, niandry ny teninareo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandinika ny teny nalahatrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pihevitrareo izay holazaina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, nihaino dia nihaino anareo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa he! tsy nisy naharesy lahatra an’i Joba hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nahavaly ny teniny akory;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fandrao hianareo hanao hoe: Hitanay ny fotony:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahendrena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no maharesy azy, fa tsy olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy nandaha-teny hamely ahy anefa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy araka ny teninareo no havaliko azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Very hevitra terỳ izy ireo, ka tsy namaly intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanalavitra azy ny teny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hangina va aho, raha tsy miteny izy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mijanona foana izy ka tsy mamaly intsony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anjarako kosa izao, koa dia hamaly aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izaho hanambara izay fantatro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa feno teny ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manery ahy ny fanahy ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Endrey! ny ato anatiko dia efa tahaka ny divay izay tsy misy hiainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa ho triatra tahaka ny siny hoditra vaovao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hiteny aho mba hisy hiainako tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiloa-bava aho ka hamaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aoka tsy hizaha tavan’olona akory aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy handrobo olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tsy mba mahay mandrobo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha izany, dia halain’ny Mpanao ahy faingana aho.
