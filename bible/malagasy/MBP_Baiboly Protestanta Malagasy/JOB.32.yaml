document_id: JOB.32,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny nataon’i Eliho.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY nitsahatra tsy namaly intsony izy telo lahy ireo, satria nanamarin-tena Joba. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary noho izany dia hoy izaho: Aoka samy hihaino ahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho koa mba hanambara izay fantatro.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Indro, niandry ny teninareo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandinika ny teny nalahatrareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pihevitrareo izay holazaina;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny, nihaino dia nihaino anareo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa he! tsy nisy naharesy lahatra an’i Joba hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nahavaly ny teniny akory;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fandrao hianareo hanao hoe: Hitanay ny fotony:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahendrena.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no maharesy azy, fa tsy olona.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tsy nandaha-teny hamely ahy anefa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy araka ny teninareo no havaliko azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Very hevitra terỳ izy ireo, ka tsy namaly intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanalavitra azy ny teny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hangina va aho, raha tsy miteny izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mijanona foana izy ka tsy mamaly intsony?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Anjarako kosa izao, koa dia hamaly aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izaho hanambara izay fantatro;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa feno teny ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manery ahy ny fanahy ato anatiko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Endrey! ny ato anatiko dia efa tahaka ny divay izay tsy misy hiainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ho triatra tahaka ny siny hoditra vaovao izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nirehitra kosa ny fahatezeran’i Eliho, zanak’i Barakela, Bozita, avy amin’ny fokon’i Rama; eny, tamin’i Joba no nirehetan’ny fahatezerany, satria nanao ny tenany ho marina noho Andriamanitra izy. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hiteny aho mba hisy hiainako tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiloa-bava aho ka hamaly.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aoka tsy hizaha tavan’olona akory aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy handrobo olona.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa tsy mba mahay mandrobo aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha izany, dia halain’ny Mpanao ahy faingana aho.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary tamin’ny sakaizany telo lahy koa no nirehetan’ny fahatezerany, satria tsy nahita teny havaliny izy ireo, kanefa nanameloka an’i Joba.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: teny havaliny an’i Joba hanamelohany azy.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Eliho mbola niandry an-dr’i Joba aloha vao niteny, fa ireo no ela niainana kokoa noho izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary rehefa hitany fa tsy nanan-kavaly izy telo lahy, dia nirehitra ny fahatezerany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ka dia niteny Eliho, zanak’i Barakela, Bozita, ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola tanora aho, fa hianareo kosa efa fotsy volo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia niaoriandriana aho aloha, fa tsy sahy nanambara aminareo izay fantatro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy izaho: Aoka ny fahanterana no hiteny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny hamaroan’ny taona no hampianatra fahendrena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanefa ny fanahy izay ao anatin’ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia.
      marker-yv: yv-n
    - type: text
      text: ' ny fofonoin’ny Tsitoha no mahahendry azy.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy dia ny fahalehibiazana no mahahendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy dia ny fahanterana no ahalalana ny rariny;
