document_id: JOS.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niomanan’i Josoa sy ny olona hita an’i Jordana.
  - type: text
    content: 'ARY rehefa maty Mosesy, mpanompon’i Jehovah, dia hoy Jehovah tamin’i Josoa, zanak’i Nona, mpanompon’i Mosesy: '
  '10':
  - type: text
    content: 'Ary Josoa nandidy ny mpifehy ka nanao hoe: '
  '11':
  - type: text
    content: 'Andeha mamaky ny toby, ka mandidia ny olona hoe: Manamboara vatsy ho anareo; fa raha afaka hateloana, dia hita ity Jordana ity hianareo ka hiditra sy handova ny tany izay omen’i Jehovah Andriamanitrareo ho lovanareo.'
  '12':
  - type: text
    content: 'Ary ny Robenita sy ny Gadita ary ny antsasaky ny firenen’i Manase dia nilazan’i Josoa hoe: '
  '13':
  - type: text
    content: 'Tsarovy ny teny izay nandidian’i Mosesy, mpanompon’i Jehovah, anareo hoe: Jehovah Andriamanitrareo manome fitsaharana ho anareo, ary homeny ho anareo izao tany izao. '
  '14':
  - type: text
    content: 'Ny vadinareo sy ny zanakareo madinika ary ny biby fiompinareo dia hitoetra eo amin’ny tany izay nomen’i Mosesy anareo etỳ an-dafin’i Jordana; fa hianareo lehilahy mahery rehetra dia samy ho voaomana hiady ka hita eo alohan’ny rahalahinareo hanampy azy, '
  '15':
  - type: text
    content: mandra-panomen’i Jehovah fitsaharana ny rahalahinareo tahaka anareo, ka mba holovany kosa ny tany izay nomen’i Jehovah Andriamanitrareo azy; dia hiverina ho any amin’ny taninareo hianareo ka handova azy, dia ilay nomen’i Mosesy, mpanompon’i Jehovah, anareo etỳ an-dafy atsinanan’i Jordana.
  '16':
  - type: text
    content: 'Dia namaly an’i Josoa izy ireo ka nanao hoe: Izay rehetra andidianao anay dia hataonay; ary izay rehetra anirahanao anay dia halehanay. '
  '17':
  - type: text
    content: 'Araka ny nihainoanay an’i Mosesy tamin’ny zavatra rehetra no hihainoanay anao koa; homba anao anie Jehovah Andriamanitrao tahaka ny nombany an’i Mosesy. '
  '18':
  - type: text
    content: Izay rehetra mandà ny didinao ka tsy mihaino ny teninao amin’izay rehetra andidianao azy dia hatao maty; koa mahereza sy matanjaha hianao.
  '2':
  - type: text
    content: 'Efa maty Mosesy mpanompoko; koa mitsangàna, mità ity Jordana ity hianao sy ireo olona rehetra ireo ho any amin’ny tany izay omeko azy, dia ny Zanak’Isiraely. '
  '3':
  - type: text
    content: 'Ny tany rehetra izay hodiavin’ny faladianareo dia efa nomeko anareo, araka izay voalazako tamin’i Mosesy. '
  '4':
  - type: text
    content: Hatramin’ny efitra sy irỳ Libanona irỳ ary hatramin’ny ony lehibe, dia ny ony Eofrata, ny tany rehetra izay an’ny Hetita, ka hatramin’ny Ranomasina Lehibe any andrefana no ho taninareo.
  '5':
  - type: text
    content: 'Tsy hisy olona hahajanona eo anoloanao amin’ny andro rehetra hiainanao; tahaka ny nombako an’i Mosesy no hombako anao koa; tsy handao anao na hahafoy anao Aho. '
  '6':
  - type: text
    content: 'Mahereza sy matanjaha; fa hianao no hampandova ity firenena ity ny tany izay nianianako tamin’ny razany homena azy. '
  '7':
  - type: text
    content: Koa mahereza sy matanjaha tsara hianao, hitandremanao hanao araka ny lalàna rehetra, izay nandidian’i Mosesy mpanompoko anao; aza miala aminy, na ho amin’ny ankavanana, na ho amin’ny ankavia, mba hambinina
  - type: note
    content: 'Na: ho hita ho hendry.'
  - type: text
    content: ' hianao amin’izay rehetra alehanao. '
  '8':
  - type: text
    content: Aoka tsy hiala amin’ny vavanao ity bokin’ny lalàna ity, fa saintsaino andro aman-alina, hitandremanao hanao araka izay rehetra voasoratra eo; ary amin’izany dia hahalavorary ny lalanao hianao sady hambinina.
  - type: note
    content: 'Na: ho hita ho hendry.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Tsy efa nandidy anao va Aho? Koa mahereza sy matanjaha; aza matahotra na mivadi-po, fa momba anao Jehovah Andriamanitrao amin’izay rehetra alehanao.
