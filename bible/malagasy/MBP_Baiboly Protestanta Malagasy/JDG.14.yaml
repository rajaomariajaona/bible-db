document_id: JDG.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanambadian’i Samsona ny vehivavy Filistina anankiray, sy ny namaliany ny Filistina.
  - type: text
    content: 'ARY Samsona nidina nankany Timna ka nahita vehivavy tao avy amin’ny zanakavavin’ny Filistina. '
  '10':
  - type: text
    content: 'Dia nidina ho any amin-dravehivavy ny rain’i Samsona; ary nanao fanasana teo Samsona, fa izany no fanaon’ny zatovo. '
  '11':
  - type: text
    content: 'Ary rehefa nahita azy izy mianakavy, dia nametraka namana telo-polo lahy hitoetra ao aminy. '
  '12':
  - type: text
    content: 'Ary hoy Samsona tamin’ireo: Hanao fampanonona aminareo aho; koa raha lazainareo amiko ny heviny ao anatin’ny hafitoana fanasana ka fantatrareo, dia homeko lobaka telo-polo sy akanjo intelo-polo miova hianareo. '
  '13':
  - type: text
    content: 'Fa raha tsy mahalaza amiko kosa hianareo, dia homenareo lobaka telo-polo sy akanjo intelo-polo miova aho. Dia hoy izy ireo: Ataovy ary ny fampanonona mba hohenoinay. '
  '14':
  - type: text
    content: 'Dia hoy Samsona aminy:'
  - type: text
    content: Avy tao amin’ny mpihinana no nivoahan’ny hanina;
  - type: text
    content: Ary avy tao amin’ny mahery no nivoahan’ny mamy.
  - type: text
    content: 'Dia tsy nahalaza ny fampanonona izy tao anatin’ny hateloana. '
  '15':
  - type: text
    content: Ary nony tamin’ny andro fahafito,
  - type: note
    content: 'Na: (fahefatra).'
  - type: text
    content: ' dia hoy izy tamin’ny vadin’i Samsona: Taomy ny vadinao hilaza ny fampanonona aminay, fandrao hodoranay amin’ny afo hianao sy ny ankohonan-drainao; efa nanasa anay va hianareo ho entinareo mifafa izay anananay? Moa tsy izany va? '
  '16':
  - type: text
    content: 'Ary ny vadin’i Samsona dia nitomany teo anatrehany ka nanao hoe: Halanao aho, fa tsy tianao tsy akory; efa nanao fampanonona tamin’ny zanaky ny fireneko hianao, nefa tsy nolazainao tamiko ny heviny. Fa hoy izy taminy: Indro, na dia ny raiko sy ny reniko aza tsy nilazako azy, ka hianao va no hilazako? '
  '17':
  - type: text
    content: 'Dia nitomany teo anatrehany tamin’ny hafitoana izay nisian’ny fanasana ravehivavy; ary nony tamin’ny andro fahafito dia nolazain’i Samsona taminy, satria nitorikisina taminy izy; ary izy kosa nilaza ny fampanonona tamin’ny zanaky ny fireneny. '
  '18':
  - type: text
    content: 'Ary nony tamin’ny andro fahafito, raha tsy mbola maty ny masoandro, dia hoy ny lehilahy tao an-tanàna tamin’i Samsona:'
  - type: text
    content: Inona no mamy noho ny tantely;
  - type: text
    content: Ary inona no mahery noho ny liona?
  - type: text
    content: 'Ary hoy kosa izy taminy:'
  - type: text
    content: Raha tsy nampiasa ny ombivavikeliko hianareo
  - type: text
    content: Dia tsy ho nahalala ny fampanonona nataoko.
  '19':
  - type: text
    content: Dia nilatsaka tamin’i Samsona ny Fanahin’i Jehovah ka nidina nankany Askelona izy, dia namono telo-polo lahy tao, ary nalainy ny fitafian’ireo ka nomeny ho an’izay nilaza ny fampanonona.
  - type: text
    content: 'Dia nirehitra ny fahatezeran’i Samsona, ka niakatra nankany amin’ny tranon-drainy izy. '
  '2':
  - type: text
    content: 'Ary niakatra izy, dia nilaza tamin-drainy sy reniny hoe: Efa nahita vehivavy tany Timna avy amin’ny zanakavavin’ny Filistina aho; koa alao ho vadiko izy ankehitriny. '
  '20':
  - type: text
    content: Ary ny vadiny dia lasan’ny namany, izay efa nataony sakaizany.
  '3':
  - type: text
    content: 'Fa hoy ny rainy sy ny reniny taminy: Moa tsy misy vehivavy va eto amin’ny zana-kavanao, na ato amin’ny fireneko rehetra, no dia mandeha maka vady any amin’ny Filistina tsy mifora hianao? Dia hoy Samsona tamin-drainy: Izy ihany no alao ho ahy, fa izy no mahafinaritra ahy. '
  '4':
  - type: text
    content: Fa tsy fantatry ny rainy sy ny reniny fa avy tamin’i Jehovah izany, satria nitady izay hiadiany tamin’ny Filistina Izy;
  - type: note
    content: 'Na: izy.'
  - type: text
    content: ' fa tamin’izany andro izany ny Filistina no nanapaka ny Isiraely.'
  '5':
  - type: text
    content: 'Dia nidina Samsona sy ny rainy aman-dreniny nankany Timna. Ary nony tonga tao amin’ny tanimboaloboka tany Timna izy, indro, nisy liona tanora nierona taminy. '
  '6':
  - type: text
    content: Dia nilatsaka tamin’i Samsona ny Fanahin’i Jehovah, ary ilay liona tanora dia nosamatsamahiny hoatra ny fanasamaka zanak’osy, nefa tsy nisy na inona na inona teny an-tànany; ary tsy nambarany tamin’ny rainy na tamin’ny reniny izay efa nataony.
  '7':
  - type: text
    content: 'Dia nidina izy ka niresaka tamin-dravehivavy; ary nahafinaritra an’i Samsona izy. '
  '8':
  - type: text
    content: 'Ary rehefa afaka kelikely, dia niverina hampakatra azy Samsona ka nivily hizaha ny fatin’ilay liona; ary, indro, nisy renitantely nivangongo sy tantely tao amin’ilay fatin’ny liona. '
  '9':
  - type: text
    content: Ary nalain’i Samsona izany ka nentiny teny an-tànany, dia nihinana teny am-pandehanana izy; ary nankany amin’ny rainy aman-dreniny izy, dia nanome azy, ka nihinana koa izy mivady; nefa tsy nambarany taminy fa tao amin’ny fatin’ilay liona no nangalany ny tantely.
