document_id: DEU.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny miaramila sy ny tafika.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: RAHA mivoaka hanafika ny fahavalonao hianao ka mahita soavaly sy kalesy ary olona maro noho hianao, dia aza matahotra azy; fa Jehovah Andriamanitrao kosa, Izay nitondra anao niakatra avy tany amin’ny tany Egypta, no momba anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa hanafika hianareo, dia hanatona ny mpisorona ka hiteny amin’ny olona hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mihainoa, ry Isiraely ô, fa efa hanafika ny fahavalonareo hianareo anio; koa aza ketraka ny fonareo ary aza matahotra, na mikorapaka foana, na mangorohoro noho ny tahotra azy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa Jehovah Andriamanitrareo no miara-mandeha aminareo hiady ho anareo amin’ny fahavalonareo mba hamonjy anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hiteny amin’ny olona ireo mpifehy azy ka hanao hoe: Iza no olona izay efa nanao trano vaovao, nefa tsy mbola nitokanany? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady, ka olon-kafa no hitokana ny tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary iza no olona izay efa nanao tanimboaloboka, nefa tsy mbola nihinana ny vokatra? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady, ka olon-kafa no hihinana ny vokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary iza no olona izay efa nifofo vady, nefa tsy mbola nampakatra azy? Aoka handeha hiverina any an-tranony izy, fandrao maty any amin’ny ady, ka olon-kafa no hampakatra ny vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mbola hiteny amin’ny olona ihany ny mpifehy azy ka hanao hoe: Iza no olona izay matahotra ka osa fo? Aoka handeha hiverina any an-tranony izy, fandrao ho ketraka tahaka ny fony koa ny fon’ny rahalahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary rehefa vitan’ny mpifehy vahoaka ny teny ataony amin’ny olona, dia hasiany mpifehy ny miaramila hitarika azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mby akaikin’izay tanàna hiadiana hianao, dia milazà fihavanana aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha fihavanana no avaliny anao, ka mampandroso anao izy, dia hampanaovinao fanompoana ny olona rehetra ao, ka hanompo anao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha tsy mety manao fihavanana aminao kosa izy, fa te-hiady aminao, dia ataovy fahirano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa atolotr’i Jehovah Andriamanitrao eo an-tànanao izy, dia hovonoinao amin’ny lelan-tsabatra ny lehilahy rehetra ao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny babo rehetra ao, dia ny zaza amim-behivavy sy ny biby fiompy ary izay rehetra ao an-tanàna, dia ho entinao ho anao; ary hohaninao ny babo azo tamin’ny fahavalonao, izay omen’i Jehovah Andriamanitrao anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toy izany no hataonao amin’ny tanàna rehetra izay lavitra anao indrindra ka tsy tanànan’ireto firenena ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny tanànan’ireto firenena ireto kosa, izay omen’i Jehovah Andriamanitrao ho lovanao, dia aza asiana miangana izay olona rehetra ao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa aringano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ataovy herema.
    marker-yv: yv-n
  - type: text
    text: ' tokoa ireo, dia ny Hetita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita, araka izay nandidian’i Jehovah Andriamanitrao anao,– '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba tsy hampianarany anareo hanao araka ny fahavetavetany rehetra izay nataony tamin’ireo andriamaniny, ka tsy hanotanareo amin’i Jehovah Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha hataonao fahirano ela ny tanàna izay tafihinao halaina, dia aza simbana kapaina amin’ny famaky ny hazo eo; fa hisy hohaninao amin’ireo, koa aza kapaina, fa olona va ny hazo any an-tsaha, no hataonao fahirano? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kanefa ny hazo izay fantatrao fa tsy fihinam-boa dia kapao ihany, ka ataovy mànda hamelezana ny tanàna izay miady aminao mandra-paharesiny.
