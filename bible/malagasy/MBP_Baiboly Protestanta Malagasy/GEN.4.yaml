document_id: GEN.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Kaina sy Abela.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Adama nahalala an’i Eva vadiny; dia nanan-anaka Eva ka niteraka an’i Kaina, ary hoy izy: Efa nahazo zazalahy tamin’i Jehovah aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary niteraka an’i Abela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Abela = Fofonaina, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zava-poana.
    marker-yv: yv-n
  - type: text
    text: ' rahalahiny koa izy. Ary Abela dia mpiandry ondry, fa Kaina kosa mpiasa tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa afaka elaela, dia nitondran’i Kaina ny vokatry ny tany ho fanatitra ho an’i Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: fa nitondran’i Abela kosa ny voalohan-terak’ondriny, dia izay matavy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary Jehovah nankasitraka an’i Abela mbamin’ny fanatiny; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa Kaina mbamin’ny fanatiny kosa tsy mba nankasitrahany. Dia tezitra indrindra Kaina, sady nanjombona ny tarehiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Kaina: Nahoana no tezitra hianao? Ary nahoana no manjombona ny tarehinao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha tsara toetra hianao, moa tsy ho miramirana va?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hisy fisandratana va?
    marker-yv: yv-n
  - type: text
    text: ' Fa raha tsy tsara toetra kosa hianao, dia mamitsaka eo am-baravarana ny ota; ary hianao no kendren’ny faniriany, kanefa hianao no tokony hanapaka azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Kaina niteny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanao hoe.
    marker-yv: yv-n
  - type: text
    text: ' tamin’i Abela rahalahiny; ary nony tany an-tsaha izy mirahalahy, dia nitsangana Kaina nanatona an’i Abela rahalahiny ka namono azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Kaina: Aiza Abela rahalahinao? Fa hoy izy: Asa; moa mpitandrina ny rahalahiko va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Izy: Inona no nataonao? Ny feon’ny ran’ny rahalahinao mitaraina amiko avy amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ankehitriny dia voaozona hianao hiala amin’ny tany onenana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia hihatra aminao ny ozona avy amin’ny tany.
    marker-yv: yv-n
  - type: text
    text: ' izay nivava hitelina ny ran’ny rahalahinao nalatsaky ny tànanao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha miasa ny tany hianao, tsy mba hahavokatra ho anao intsony izy; ho mpanjenjena sy mpirenireny eny ambonin’ny tany hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Kaina tamin’i Jehovah: Lehibe ny valin’ny heloko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny heloko.
    marker-yv: yv-n
  - type: text
    text: ' mihoatra noho izay zakako.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mihoatra noho ny azo avela.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, efa noroahinao hiala amin’ny tany onenana aho andro-any; dia hiery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka ho takona.
    marker-yv: yv-n
  - type: text
    text: ' ny tavanao aho ary ho mpanjenjena sy mpirenireny eny ambonin’ny tany; koa na iza na iza hahita ahy dia hamono ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Jehovah taminy: Noho izany na iza na iza hamono an’i Kaina, dia hovaliana fito heny izy. Ary Jehovah nanao famantarana ho an’i Kaina, mba tsy hisy hamono azy izay rehetra hahita azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary Kaina dia niala teo anatrehan’i Jehovah ka nonina tao amin’ny tany Noda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noda = Firenirenena.
    marker-yv: yv-n
  - type: text
    text: ' tandrifin’i Edena.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’i Kaina, sy ny nahaterahan’i Seta.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ARY Kaina nahalala ny vadiny, dia nanan-anaka ravehivavy ka niteraka an’i Enoka; ary nanorina vohitra Kaina, ka ny anaran’ny vohitra dia nataony hoe Enoka, araka ny anaran’ny zanani-lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Enoka niteraka an’Irada; ary Irada niteraka an’i Mehojaela; ary Mehojaela niteraka an’i Metosaela; ary Metosaela niteraka an’i Lameka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Lameka nampirafy roa: ny anaran’ny anankiray Ada, ary ny anaran’ny anankiray Zila. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Ada niteraka an’i Jabala; izy no rain’ny mpitoetra an-day, miandry omby aman’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny anaran’ny rahalahiny dia Jobala; izy no rain’ny mpitendry lokanga sy mpitsoka sodina rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Zila kosa niteraka an’i Tobala-kaina, mpanefy fiasana maranitra, na varahina na vy; ary ny anabavin’i Tobala-kaina dia Nama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy Lameka tamin’ny vadiny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Ada sy Zila ô, mihainoa ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ry vadin’i Lameka, mitandrema ny teniko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa namono
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamono.
    marker-yv: yv-n
  - type: text
    text: ' lehilahy aho noho ny feriko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tovolahy noho ny faharatrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha valiana fito heny izay mamono an’i Kaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fito amby fito-polo heny kosa izay mamono an’i Lameka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Adama nahalala ny vadiny indray, ka dia niteraka zazalahy ravehivavy; ary ny anarany nataony hoe Seta;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seta = Nomena (ho solo).
    marker-yv: yv-n
  - type: text
    text: ' fa Andriamanitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy izy
  - type: text
    text: ', efa namome ahy zanaka anankiray koa ho solon’i Abela, satria novonoin’i Kaina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Seta koa niteraka zazalahy; ary ny anarany nataony hoe Enosy. Tamin’izany no vao niantsoana ny anaran’i Jehovah.
