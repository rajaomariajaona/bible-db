document_id: GEN.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’i Kaina sy Abela.
  - type: text
    content: 'ARY Adama nahalala an’i Eva vadiny; dia nanan-anaka Eva ka niteraka an’i Kaina, ary hoy izy: Efa nahazo zazalahy tamin’i Jehovah aho. '
  '10':
  - type: text
    content: 'Ary hoy Izy: Inona no nataonao? Ny feon’ny ran’ny rahalahinao mitaraina amiko avy amin’ny tany. '
  '11':
  - type: text
    content: Ary ankehitriny dia voaozona hianao hiala amin’ny tany onenana,
  - type: note
    content: 'Na: dia hihatra aminao ny ozona avy amin’ny tany.'
  - type: text
    content: ' izay nivava hitelina ny ran’ny rahalahinao nalatsaky ny tànanao. '
  '12':
  - type: text
    content: Raha miasa ny tany hianao, tsy mba hahavokatra ho anao intsony izy; ho mpanjenjena sy mpirenireny eny ambonin’ny tany hianao.
  '13':
  - type: text
    content: 'Dia hoy Kaina tamin’i Jehovah: Lehibe ny valin’ny heloko'
  - type: note
    content: Heb. ny heloko.
  - type: text
    content: ' mihoatra noho izay zakako.'
  - type: note
    content: 'Na: mihoatra noho ny azo avela.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Indro, efa noroahinao hiala amin’ny tany onenana aho andro-any; dia hiery
  - type: note
    content: 'Na: ka ho takona.'
  - type: text
    content: ' ny tavanao aho ary ho mpanjenjena sy mpirenireny eny ambonin’ny tany; koa na iza na iza hahita ahy dia hamono ahy.'
  '15':
  - type: text
    content: 'Ary hoy Jehovah taminy: Noho izany na iza na iza hamono an’i Kaina, dia hovaliana fito heny izy. Ary Jehovah nanao famantarana ho an’i Kaina, mba tsy hisy hamono azy izay rehetra hahita azy.'
  '16':
  - type: text
    content: Ary Kaina dia niala teo anatrehan’i Jehovah ka nonina tao amin’ny tany Noda
  - type: note
    content: Noda = Firenirenena.
  - type: text
    content: ' tandrifin’i Edena.'
  - type: heading
    content: Ny taranak’i Kaina, sy ny nahaterahan’i Seta.
  '17':
  - type: text
    content: ARY Kaina nahalala ny vadiny, dia nanan-anaka ravehivavy ka niteraka an’i Enoka; ary nanorina vohitra Kaina, ka ny anaran’ny vohitra dia nataony hoe Enoka, araka ny anaran’ny zanani-lahy.
  '18':
  - type: text
    content: Ary Enoka niteraka an’Irada; ary Irada niteraka an’i Mehojaela; ary Mehojaela niteraka an’i Metosaela; ary Metosaela niteraka an’i Lameka.
  '19':
  - type: text
    content: 'Ary Lameka nampirafy roa: ny anaran’ny anankiray Ada, ary ny anaran’ny anankiray Zila. '
  '2':
  - type: text
    content: Ary niteraka an’i Abela
  - type: note
    content: Abela = Fofonaina, na Zava-poana.
  - type: text
    content: ' rahalahiny koa izy. Ary Abela dia mpiandry ondry, fa Kaina kosa mpiasa tany.'
  '20':
  - type: text
    content: 'Ary Ada niteraka an’i Jabala; izy no rain’ny mpitoetra an-day, miandry omby aman’ondry. '
  '21':
  - type: text
    content: 'Ary ny anaran’ny rahalahiny dia Jobala; izy no rain’ny mpitendry lokanga sy mpitsoka sodina rehetra. '
  '22':
  - type: text
    content: Ary Zila kosa niteraka an’i Tobala-kaina, mpanefy fiasana maranitra, na varahina na vy; ary ny anabavin’i Tobala-kaina dia Nama.
  '23':
  - type: text
    content: 'Ary hoy Lameka tamin’ny vadiny:'
  - type: text
    content: Ry Ada sy Zila ô, mihainoa ny feoko;
  - type: text
    content: 'Ry vadin’i Lameka, mitandrema ny teniko:'
  - type: text
    content: Efa namono
  - type: note
    content: 'Na: mamono.'
  - type: text
    content: ' lehilahy aho noho ny feriko,'
  - type: text
    content: Ary tovolahy noho ny faharatrako.
  '24':
  - type: text
    content: Raha valiana fito heny izay mamono an’i Kaina,
  - type: text
    content: Dia fito amby fito-polo heny kosa izay mamono an’i Lameka.
  '25':
  - type: text
    content: Ary Adama nahalala ny vadiny indray, ka dia niteraka zazalahy ravehivavy; ary ny anarany nataony hoe Seta;
  - type: note
    content: Seta = Nomena (ho solo).
  - type: text
    content: ' fa Andriamanitra '
  - type: text
    content: hoy izy
  - type: text
    content: ', efa namome ahy zanaka anankiray koa ho solon’i Abela, satria novonoin’i Kaina izy. '
  '26':
  - type: text
    content: Ary Seta koa niteraka zazalahy; ary ny anarany nataony hoe Enosy. Tamin’izany no vao niantsoana ny anaran’i Jehovah.
  '3':
  - type: text
    content: 'Ary rehefa afaka elaela, dia nitondran’i Kaina ny vokatry ny tany ho fanatitra ho an’i Jehovah; '
  '4':
  - type: text
    content: fa nitondran’i Abela kosa ny voalohan-terak’ondriny, dia izay matavy.
  - type: text
    content: 'Ary Jehovah nankasitraka an’i Abela mbamin’ny fanatiny; '
  '5':
  - type: text
    content: fa Kaina mbamin’ny fanatiny kosa tsy mba nankasitrahany. Dia tezitra indrindra Kaina, sady nanjombona ny tarehiny.
  '6':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Kaina: Nahoana no tezitra hianao? Ary nahoana no manjombona ny tarehinao? '
  '7':
  - type: text
    content: Raha tsara toetra hianao, moa tsy ho miramirana va?
  - type: note
    content: Heb. tsy hisy fisandratana va?
  - type: text
    content: ' Fa raha tsy tsara toetra kosa hianao, dia mamitsaka eo am-baravarana ny ota; ary hianao no kendren’ny faniriany, kanefa hianao no tokony hanapaka azy.'
  '8':
  - type: text
    content: Ary Kaina niteny
  - type: note
    content: Heb. nanao hoe.
  - type: text
    content: ' tamin’i Abela rahalahiny; ary nony tany an-tsaha izy mirahalahy, dia nitsangana Kaina nanatona an’i Abela rahalahiny ka namono azy.'
  '9':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Kaina: Aiza Abela rahalahinao? Fa hoy izy: Asa; moa mpitandrina ny rahalahiko va aho? '
