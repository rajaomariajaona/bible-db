document_id: LUK.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nakan’ny devoly fanahy an’i Jesosy.
  - type: heading
    content: Mat. 4.1-11; Mar. 1.12,13.
  - type: text
    content: 'ARY Jesosy feno ny Fanahy Masina dia niverina avy tany Jordana, ary nentin’ny Fanahy tany an-efitra efa-polo andro Izy '
  '10':
  - type: text
    content: 'fa voasoratra hoe:'
  - type: text
    content: „Izy handidy ny anjeliny ny aminao mba hiaro Anao;
  '11':
  - type: text
    content: Ary eny an-tànany no hitondran’ireo Anao,
  - type: text
    content: Fandrao ho tafintohina amin’ny vato ny tongotrao” (Sal. 91.11, 12).
  '12':
  - type: text
    content: 'Fa Jesosy namaly ka nanao taminy hoe: Voalaza hoe: „Aza maka fanahy an’i Jehovah Andriamanitrao” (Deo. 6.16).'
  '13':
  - type: text
    content: Ary rehefa nahatapitra izay fakam-panahy rehetra ny devoly, dia nandao Azy izy aloha.
  - type: heading
    content: Ny niverenan’i Jesosy nankany Galilia, sy ny nitoriany teny tao Nazareta.
  - type: heading
    content: Mat. 4.12; Mar. 1.14,15; Mat. 13.53-58; Mar. 6.1-6?
  '14':
  - type: text
    content: 'ARY Jesosy niverina tamin’ny herin’ny Fanahy nankany Galilia; dia niely tamin’ny tany rehetra manodidina ny lazany. '
  '15':
  - type: text
    content: Ary Izy nampianatra teny amin’ny synagogan’ny olona ka nankalazain’izy rehetra.
  '16':
  - type: text
    content: 'Dia tonga tao Nazareta, izay nahabe Azy, Izy; ary araka ny fanaony dia niditra tao amin’ny synagoga tamin’ny andro Sabata Izy ka nitsangana hamaky teny. '
  '17':
  - type: text
    content: 'Dia natolotra Azy ny bokin’Isaia mpaminany; ary nony namelatra ny boky Izy, dia nahita ny teny voasoratra hoe:'
  '18':
  - type: text
    content: ',,Ny Fanahin’i Jehovah no ato amiko,'
  - type: text
    content: Satria nanosotra Ahy hitory teny soa mahafaly amin’ny malahelo Izy;
  - type: text
    content: Naniraka Ahy hitory fandefasana amin’ny mpifatotra Izy,
  - type: text
    content: Sy fampahiratana amin’ny jamba,
  - type: text
    content: Hanafaka izay nampahorina,
  '19':
  - type: text
    content: Hitory ny taona ankasitrahan’i Jehovah’’ (Isa. 61.1, 2).
  '2':
  - type: text
    content: 'ka nalain’ny devoly fanahy. Ary tsy nihinan-kanina akory Izy tamin’izany andro izany, ka rehefa tapitra izany, dia noana Izy. '
  '20':
  - type: text
    content: Ary rehefa nahorony ny boky ka naveriny tamin’ny mpanao raharaha, dia nipetraka Izy. Ary nandinika Azy ny mason’izay rehetra teo amin’ny synagoga.
  '21':
  - type: text
    content: 'Ary Jesosy niteny taminy hoe: Andro-any no efa tanteraka eto anatrehanareo izany soratra izany. '
  '22':
  - type: text
    content: 'Ary izy rehetra nankalaza Azy sady talanjona noho ny tenin’ny fahasoavana naloaky ny vavany, ka hoy izy: Tsy Zanak’i Josefa va Ity?'
  '23':
  - type: text
    content: 'Ary hoy kosa Jesosy taminy: Hataonareo amiko tokoa izao ohabolana izao hoe: ,Mpanao fanafody, sitrano ny tenanao:’ izay renay fa nataonao tao Kapernaomy dia mba ataovy eto amin’ny taninao koa. '
  '24':
  - type: text
    content: 'Ary hoy koa Izy: Lazaiko aminareo marina tokoa: Tsy misy mpaminany izay ankasitrahana ao amin’ny taniny. '
  '25':
  - type: text
    content: 'Fa lazaiko aminareo marina tokoa: Maro no mpitondratena teo amin’ny Isiraely tamin’ny andron’i Elia, raha nihantona ny andro'
  - type: note
    content: Gr. nirindrina ny lanitra.
  - type: text
    content: ' telo taona sy enim-bolana, ka nisy mosary mafy tamin’ny tany rehetra; '
  '26':
  - type: text
    content: 'nefa tsy mba nirahina ho any amin’ny anankiray tamin’ireo Elia, fa ho any Zarefata any amin’ny tany Sidona ihany, dia ho any amin’izay vehivavy mpitondratena. '
  '27':
  - type: text
    content: Ary maro no boka teo amin’ny Isiraely tamin’ny andron’i Elisa mpaminany, nefa tsy mba nisy nodiovina na dia iray akory aza, fa Namàna Syriana ihany.
  '28':
  - type: text
    content: 'Dia tezitra loatra izay rehetra teo amin’ny synagoga, raha nandre izany, '
  '29':
  - type: text
    content: 'ka nitsangana izy, dia nandroaka Azy hiala ao an-tanàna ary nitondra Azy ho any an-tampon’ny havoana niorenan’ny tanàna, mba hazerany amin’ny hantsana. '
  '3':
  - type: text
    content: 'Ary hoy ny devoly taminy: raha Zanak’Andriamanitra Hianao, teneno io vato io mba ho tonga mofo. '
  '30':
  - type: text
    content: Nefa Izy namaky teo afovoany, ka dia lasa nandeha.
  - type: heading
    content: Ny nifindran’i Jesosy nankany Kapernaomy, sy ny nahasitranany ny demoniaka anankiray.
  - type: heading
    content: Mat. 4.13,14; Mar. 1.21-23.
  '31':
  - type: text
    content: 'ARY nidina tany Kapernaomy, tanàna any Galilia, Jesosy ka nampianatra ny olona tamin’ny Sabata. '
  '32':
  - type: text
    content: Dia talanjona ny olona tamin’ny fampianarany, satria nisy fahefana ny teniny.
  '33':
  - type: text
    content: 'Ary nisy olona tao amin’ny synagoga, izay nanana ny fanahin’ny demonia maloto, dia niantso tamin’ny feo mahery izy '
  '34':
  - type: text
    content: 'ka nanao hoe: Indrisy! moa mifaninona akory izahay sy Hianao, ry Jesosy avy any Nazareta? avy handringana anay va Hianao? Fantatro fa Ilay Masin’Andriamanitra Hianao. '
  '35':
  - type: text
    content: 'Fa Jesosy niteny mafy azy ka nanao hoe: Mangìna hianao, ka mivoaha aminy. Ary ny demonia, nony namotraka azy teo afovoan’ny olona, dia nivoaka taminy, nefa tsy naharatra azy.'
  '36':
  - type: text
    content: 'Ary talanjona avokoa izy rehetra ka niresaka hoe: Manao ahoana izao teny izao! fa amin’ny fahefana sy ny hery no andidiany ny fanahy maloto, dia mivoaka ireo. '
  '37':
  - type: text
    content: Ary niely teny amin’ny tany manodidina rehetra ny lazany.
  - type: heading
    content: Ny nahasitranan’i Jesosy ny rafozambavin’i Petera sy ny olona maro koa.
  - type: heading
    content: Mat. 8.14-17; Mar. 1.29-34.
  '38':
  - type: text
    content: 'ARY nony nitsangana niala tao amin’ny synagoga Jesosy, dia niditra tao an-tranon’i Simona. Ary azon’ny tazo mafy ny rafozambavin’i Simona; ary izy ireo nangataka taminy hahasitrana azy. '
  '39':
  - type: text
    content: Dia nitsangana teo akaikiny Izy, ka noteneniny mafy ny tazo, dia niala tamin-dravehivavy izany; ary nitsangana niaraka tamin’izay izy ka nanompo azy ireo.
  '4':
  - type: text
    content: 'Fa Jesosy namaly azy ka nanao hoe: Voasoratra hoe: „Tsy mofo ihany no hiveloman’ny olona” (Deo. 8.3).'
  '40':
  - type: text
    content: 'Ary raha nilentika ny masoandro, ny olona rehetra izay nanana marary tamin’ny aretina samy hafa dia nitondra azy teo aminy; ary dia nametra-tànana tamin’izy rehetra tsirairay Izy ka nahasitrana azy. '
  '41':
  - type: text
    content: 'Ary nisy demonia nivoaka tamin’ny maro ka niantso hoe: Hianao no Zanak’Andriamanitra. Nefa norarany ireo ka tsy navelany hiteny, satria nahalala Azy ho Kristy.'
  - type: heading
    content: Ny nankanesan’i Jesosy tany an-tany foana sy ny nandehanany nitety vohitra tany Galilia.
  - type: heading
    content: Mar. 1.35-39.
  '42':
  - type: text
    content: 'ARY nony maraina ny andro, dia niala Jesosy ka nankany an-tany foana; ary ny vahoaka nitady Azy, dia nankeo aminy ka te-hihazona Azy mba tsy hialany tao aminy. '
  '43':
  - type: text
    content: 'Fa hoy Izy taminy: Tsy maintsy mitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra any amin’ny tanàna hafa koa Aho, satria izany no nanirahana Ahy.'
  '44':
  - type: text
    content: Ary Izy nitori-teny tao amin’ny synagoga eran’i Galilia.
  '5':
  - type: text
    content: 'Ary ny devoly nitondra Azy niakatra, dia naneho Azy indray mipìmaso ny fanjakana rehetra amin’izao tontolo izao. '
  '6':
  - type: text
    content: 'Dia hoy ny devoly taminy: Homeko Anao izao fanapahana rehetra izao mbamin’ny voninahiny, fa efa natolotra ahy izany, ka izay tiako no homeko azy; '
  '7':
  - type: text
    content: 'koa raha hiankohoka eto anatrehako Hianao, dia ho Anao avokoa izany rehetra izany. '
  '8':
  - type: text
    content: 'Fa Jesosy namaly ka nanao taminy hoe: Voasoratra hoe: „Jehovah Andriamanitrao no hiankohofanao, ary Izy irery ihany no hotompoinao” (Deo. 6.13; 10.20).'
  '9':
  - type: text
    content: 'Ary nitondra Azy nankany Jerosalema izy, dia nampitoetra Azy teo an-tampon’ny tempoly ka nanao taminy hoe: Raha Zanak’Andriamanitra Hianao, mivarìna any ambany any; '
