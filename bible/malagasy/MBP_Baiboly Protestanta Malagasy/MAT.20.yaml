document_id: MAT.20,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ny fanjakan’ny lanitra dia tahaka ny lehilahy tompon-trano, izay nivoaka maraina koa hanakarama mpiasa ho any an-tanimboalobony. '
  '10':
  - type: text
    content: 'Fa rehefa tonga ireo voalohany, dia nanantena hahazo mihoatra izy; kanjo samy denaria misesy avy ihany no azony. '
  '11':
  - type: text
    content: 'Ary rehefa nahazo izany izy, dia nimonomonona tamin’ny tompon-trano ka nanao hoe: '
  '12':
  - type: text
    content: 'Ireo olona farany ireo dia niasa ora iray monja, kanefa nataonao mitovy aminay, izay niaritra ny fahatrotrahana sy ny hainandro. '
  '13':
  - type: text
    content: 'Fa izy namaly ka nanao tamin’ny anankiray amin’ireny hoe: Ry sakaiza, tsy mba manao izay tsy marina aminao aho; tsy efa denaria va no nifanekenao tamiko? '
  '14':
  - type: text
    content: 'Raiso ny anao, ka mandehana; fa ilay farany dia tiako homena toraka ny anao koa. '
  '15':
  - type: text
    content: Tsy mahazo manao izay tiako amin’ny ahy va aho? Ratsy va ny masonao, satria tsara aho?
  '16':
  - type: text
    content: Dia toy izany, ny farany ho voalohany, ary ny voalohany ho farany.
  - type: heading
    content: Ny nilazan’i Jesosy fanintelony ny hiaretany.
  - type: heading
    content: Mar. 10.32-34; Lio. 18.31-34.
  '17':
  - type: text
    content: 'ARY Jesosy, nony niakatra ho any Jerosalema, dia naka mangingina ny mpianatra roa ambin’ny folo lahy ka niteny taminy teny an-dàlana hoe: '
  '18':
  - type: text
    content: 'Indro, miakatra ho any Jerosalema isika; ary ny Zanak’olona hatolotra ho amin’ireo lohan’ny mpisorona sy ny mpanora-dalàna, dia hohelohiny ho faty Izy '
  '19':
  - type: text
    content: ka hatolony amin’ny jentilisa mba hataony ho fihomehezana sy hokapohiny sy hohomboany amin’ny hazofijaliana; ary amin’ny andro fahatelo dia hatsangana indray Izy.
  - type: heading
    content: Ny fangatahana nataon’ny renin’ny zanak’i Zebedio, sy ny navalin’i Jesosy azy.
  - type: heading
    content: Mar. 10.35-45.
  '2':
  - type: text
    content: 'Ary rehefa nifanekeny tamin’ny mpiasa fa ho denaria isan-andro, ny karamany, dia nasainy nankany amin’ny tanimboalobony ireny. '
  '20':
  - type: text
    content: 'ARY tamin’izany dia nanatona an’i Jesosy ny renin’ny zanak’i Zebedio mbamin’ny zananilahy, dia niankohoka ka nangataka zavatra taminy. '
  '21':
  - type: text
    content: 'Ary hoy Izy taminy: Inona no irinao? Dia hoy ravehivavy taminy: Mandidia mba hipetrahan’ireto zanako roa lahy ireto, ny anankiray ho eo amin’ny ankavananao, ary ny anankiray ho eo amin’ny ankavianao, ao amin’ny fanjakanao.'
  '22':
  - type: text
    content: 'Fa Jesosy namaly ka nanao hoe: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin’ny kapoaka izay efa hisotroako? Hoy izy roa lahy taminy: Hainay ihany. '
  '23':
  - type: text
    content: 'Hoy kosa Izy taminy: Hisotro amin’ny kapoakako tokoa hianareo; fa ny hipetraka eo an-tànako ankavanana sy eo an-tànako ankavia, dia tsy Ahy ny hanome izany; fa izay nanamboaran’ny Raiko izany '
  - type: text
    content: no homena.
  '24':
  - type: text
    content: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon’izy mirahalahy. '
  '25':
  - type: text
    content: 'Fa Jesosy niantso azy hankeo aminy ka nanao hoe: Fantatrareo fa ny andrianan’ny jentilisa mampanompo azy tokoa, ary ny lehibeny manapaka azy fatratra. '
  '26':
  - type: text
    content: 'Fa tsy mba ho toy izany aminareo; fa izay te-ho lehibe aminareo dia ho mpanompo anareo; '
  '27':
  - type: text
    content: 'ary izay te-ho ambony indrindra aminareo dia ho mpanomponareo. '
  '28':
  - type: text
    content: Fa tahaka izany, ny Zanak’olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.
  - type: heading
    content: Ny nampahiratan’i Jesosy ny jamba roa lahy tao akaikin’i Jeriko.
  - type: heading
    content: Mar. 10.46-52; Lio. 18.35-43.
  '29':
  - type: text
    content: 'ARY raha niala tao Jeriko izy, dia nisy vahoaka betsaka nanaraka an’i Jesosy. '
  '3':
  - type: text
    content: 'Ary nivoaka tamin’ny ora fahatelo izy, dia nahita ny sasany nitoetra foana tany an-tsena, '
  '30':
  - type: text
    content: 'Ary, indreo, nisy jamba roa lahy nipetraka teo amoron-dàlana, ary nony reny fa Jesosy no mandalo, dia niantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô! '
  '31':
  - type: text
    content: 'Ary ny vahoaka niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô!'
  '32':
  - type: text
    content: 'Ary Jesosy nijanona, dia niantso azy ka nanao hoe: Inona no tianareo hataoko aminareo? '
  '33':
  - type: text
    content: 'Hoy izy taminy: Tompoko ô, ny mba hampahiratina ny masonay. '
  '34':
  - type: text
    content: Ary Jesosy dia onena azy ka nanendry ny masony; ary nahiratra niaraka tamin’izay izy, dia nanaraka an’i Jesosy.
  '4':
  - type: text
    content: 'ka hoy izy taminy: Mandehana koa hianareo hankany amin’ny tanimboaloboka, fa izay an-keviny marina dia homeko anareo. Ka dia lasa ireny. '
  '5':
  - type: text
    content: 'Ary nivoaka tamin’ny ora fahenina sy fahasivy indray izy ka nanao toy izany koa. '
  '6':
  - type: text
    content: 'Ary rehefa tokony ho tamin’ny ora fahiraika ambin’ny folo dia nivoaka izy ka nahita ny sasany mitoetra eo, dia hoy izy taminy: Nahoana hianareo no mitoetra foana eto mandritra ny andro? '
  '7':
  - type: text
    content: 'Hoy izy taminy: Satria tsy nisy olona nanakarama anay. Dia hoy ralehilahy taminy: Mandehana koa hianareo mankany amin’ny tanimboaloboka.'
  '8':
  - type: text
    content: 'Ary rehefa hariva ny andro, dia hoy ny tompon’ny tanimboaloboka tamin’ny mpitandrina ny raharahany: Antsoy ny mpiasa, ka aloavy ny karamany: atombohy amin’ireo taoriana ka vao hatramin’ireo voalohany. '
  '9':
  - type: text
    content: 'Ary rehefa tonga ireo nokaramaina tamin’ny ora fahiraika ambin’ny folo, dia nahazo denaria misesy avy izy. '
