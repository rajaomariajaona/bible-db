document_id: MAT.20
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny fanjakan’ny lanitra dia tahaka ny lehilahy tompon-trano, izay nivoaka maraina koa hanakarama mpiasa ho any an-tanimboalobony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nifanekeny tamin’ny mpiasa fa ho denaria isan-andro, ny karamany, dia nasainy nankany amin’ny tanimboalobony ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nivoaka tamin’ny ora fahatelo izy, dia nahita ny sasany nitoetra foana tany an-tsena, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka hoy izy taminy: Mandehana koa hianareo hankany amin’ny tanimboaloboka, fa izay an-keviny marina dia homeko anareo. Ka dia lasa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nivoaka tamin’ny ora fahenina sy fahasivy indray izy ka nanao toy izany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa tokony ho tamin’ny ora fahiraika ambin’ny folo dia nivoaka izy ka nahita ny sasany mitoetra eo, dia hoy izy taminy: Nahoana hianareo no mitoetra foana eto mandritra ny andro? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izy taminy: Satria tsy nisy olona nanakarama anay. Dia hoy ralehilahy taminy: Mandehana koa hianareo mankany amin’ny tanimboaloboka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa hariva ny andro, dia hoy ny tompon’ny tanimboaloboka tamin’ny mpitandrina ny raharahany: Antsoy ny mpiasa, ka aloavy ny karamany: atombohy amin’ireo taoriana ka vao hatramin’ireo voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa tonga ireo nokaramaina tamin’ny ora fahiraika ambin’ny folo, dia nahazo denaria misesy avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa rehefa tonga ireo voalohany, dia nanantena hahazo mihoatra izy; kanjo samy denaria misesy avy ihany no azony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary rehefa nahazo izany izy, dia nimonomonona tamin’ny tompon-trano ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo olona farany ireo dia niasa ora iray monja, kanefa nataonao mitovy aminay, izay niaritra ny fahatrotrahana sy ny hainandro. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izy namaly ka nanao tamin’ny anankiray amin’ireny hoe: Ry sakaiza, tsy mba manao izay tsy marina aminao aho; tsy efa denaria va no nifanekenao tamiko? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raiso ny anao, ka mandehana; fa ilay farany dia tiako homena toraka ny anao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsy mahazo manao izay tiako amin’ny ahy va aho? Ratsy va ny masonao, satria tsara aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia toy izany, ny farany ho voalohany, ary ny voalohany ho farany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilazan’i Jesosy fanintelony ny hiaretany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 10.32-34; Lio. 18.31-34.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ARY Jesosy, nony niakatra ho any Jerosalema, dia naka mangingina ny mpianatra roa ambin’ny folo lahy ka niteny taminy teny an-dàlana hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indro, miakatra ho any Jerosalema isika; ary ny Zanak’olona hatolotra ho amin’ireo lohan’ny mpisorona sy ny mpanora-dalàna, dia hohelohiny ho faty Izy '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ka hatolony amin’ny jentilisa mba hataony ho fihomehezana sy hokapohiny sy hohomboany amin’ny hazofijaliana; ary amin’ny andro fahatelo dia hatsangana indray Izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fangatahana nataon’ny renin’ny zanak’i Zebedio, sy ny navalin’i Jesosy azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 10.35-45.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY tamin’izany dia nanatona an’i Jesosy ny renin’ny zanak’i Zebedio mbamin’ny zananilahy, dia niankohoka ka nangataka zavatra taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Izy taminy: Inona no irinao? Dia hoy ravehivavy taminy: Mandidia mba hipetrahan’ireto zanako roa lahy ireto, ny anankiray ho eo amin’ny ankavananao, ary ny anankiray ho eo amin’ny ankavianao, ao amin’ny fanjakanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Jesosy namaly ka nanao hoe: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin’ny kapoaka izay efa hisotroako? Hoy izy roa lahy taminy: Hainay ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hoy kosa Izy taminy: Hisotro amin’ny kapoakako tokoa hianareo; fa ny hipetraka eo an-tànako ankavanana sy eo an-tànako ankavia, dia tsy Ahy ny hanome izany; fa izay nanamboaran’ny Raiko izany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no homena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon’izy mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa Jesosy niantso azy hankeo aminy ka nanao hoe: Fantatrareo fa ny andrianan’ny jentilisa mampanompo azy tokoa, ary ny lehibeny manapaka azy fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tsy mba ho toy izany aminareo; fa izay te-ho lehibe aminareo dia ho mpanompo anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary izay te-ho ambony indrindra aminareo dia ho mpanomponareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa tahaka izany, ny Zanak’olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ny jamba roa lahy tao akaikin’i Jeriko.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 10.46-52; Lio. 18.35-43.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ARY raha niala tao Jeriko izy, dia nisy vahoaka betsaka nanaraka an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary, indreo, nisy jamba roa lahy nipetraka teo amoron-dàlana, ary nony reny fa Jesosy no mandalo, dia niantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny vahoaka niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Mamindrà fo aminay, ry Tompo, Zanak’i Davida ô!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jesosy nijanona, dia niantso azy ka nanao hoe: Inona no tianareo hataoko aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hoy izy taminy: Tompoko ô, ny mba hampahiratina ny masonay. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary Jesosy dia onena azy ka nanendry ny masony; ary nahiratra niaraka tamin’izay izy, dia nanaraka an’i Jesosy.
