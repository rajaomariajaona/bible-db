document_id: JER.51,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hamporisihiko ny fanahin’ny mpandringana
  - type: text
    content: Hamely an’i Babylona sy izay monina ao Leba-kamay.
  - type: note
    content: Leba-kamay = Kaldea.
  '10':
  - type: text
    content: Nasehon’i Jehovah ny fahamarinantsika;
  - type: text
    content: Andeha, ka aoka hotorintsika ao Ziona ny asan’i Jehovah Andriamanitsika.
  '11':
  - type: text
    content: Lambolamboy ny zana-tsipìka, tano ny ampìnga;
  - type: text
    content: Jehovah efa nampirisika ny fanahin’ny mpanjakan’ny Mediana;
  - type: text
    content: Fa ny hamely an’i Babylona no nosaininy, mba handringanana azy;
  - type: text
    content: Fa famalian’i Jehovah izany,
  - type: text
    content: Eny, famaliana noho ny tempoliny.
  '12':
  - type: text
    content: Manangàna faneva eo akaikin’ny màndan’i Babylona;
  - type: text
    content: Ataovy mafy ny fiambenana;
  - type: text
    content: Alatsaho ny mpiambina, alamino ny otrika;
  - type: text
    content: Fa Jehovah sady efa nisaina no nahatanteraka
  - type: text
    content: Izay nolazainy ny amin’ny mponina any Babylona.
  '13':
  - type: text
    content: Hianao izay monina eny amoron’ny rano be
  - type: text
    content: Sady be rakitra,
  - type: text
    content: Tonga ny fiafaranao,
  - type: text
    content: Ka tsy hisy intsony ny filanao harena.
  '14':
  - type: text
    content: 'Jehovah, Tompon’ny maro, nianiana tamin’ny tenany hoe:'
  - type: text
    content: Hofenoiko olona maro toy ny valala tokoa hianao,
  - type: text
    content: Ary ireny dia
  - type: note
    content: 'Na: na dia hofenoiko olona maro toy ny valala aza hianao, dia ireny no.'
  - type: text
    content: ' hanakora hamely anao,–'
  '15':
  - type: text
    content: Dia Ilay nanao ny tany tamin’ny heriny
  - type: text
    content: Sy nampiorina izao tontolo izao tamin’ny fahendreny
  - type: text
    content: Ary namelatra ny lanitra tamin’ny fisainany.
  '16':
  - type: text
    content: Raha nampirohondrohona ny rano any an-danitra Izy,
  - type: text
    content: Dia nampiakatra zavona avy tany amin’ny faran’ny tany;
  - type: text
    content: Manao ny helatra ho an’ny ranonorana Izy
  - type: text
    content: Sady mamoaka ny rivotra avy amin’ny firaketany.
  '17':
  - type: text
    content: Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana;
  - type: text
    content: Menarina ny mpanefy volamena rehetra noho ny amin’ny sarin-javatra voasokitra;
  - type: text
    content: Fa fitaka ny sarin-javatra an-idina,
  - type: text
    content: Satria tsy misy aina ao aminy.
  '18':
  - type: text
    content: Zava-poana ireny, dia asa mahatsikaiky foana;
  - type: text
    content: Amin’ny andro hamaliana azy dia ho levona izy.
  '19':
  - type: text
    content: Tsy mba tahaka ireo ny Anjaran’i Jakoba,
  - type: text
    content: Fa Mpamorona ny zavatra rehetra Izy;
  - type: text
    content: 'Ary '
  - type: text
    content: ny Isiraely
  - type: text
    content: ' no firenena lovany;'
  - type: text
    content: Jehovah, Tompon’ny maro, no anarany.
  '2':
  - type: text
    content: Ary haniraka olona hafa firenena ho any Babylona Aho,
  - type: text
    content: Izay hikororoka azy ka hahafoana ny taniny;
  - type: text
    content: Fa hamely azy manodidina amin’ny andro fahoriana ireo.
  '20':
  - type: text
    content: Langilangiko sy fiadiako hianao;
  - type: text
    content: Fa hianao no ho entiko manorotoro firenena,
  - type: text
    content: Ary hianao no ho entiko mandringana fanjakana,
  '21':
  - type: text
    content: Ary hianao no ho entiko manorotoro soavaly sy ny mpitaingina azy,
  - type: text
    content: Ary hianao no ho entiko manorotoro ny kalesy sy ny mpitaingina azy;
  '22':
  - type: text
    content: Hianao koa no ho entiko manorotoro ny lehilahy sy ny vehivavy,
  - type: text
    content: Ary hianao no ho entiko manorotoro ny antitra sy ny tanora,
  - type: text
    content: Ary hianao no ho entiko manorotoro ny zatovo sy ny virijina;
  '23':
  - type: text
    content: Hianao koa no ho entiko manorotoro ny mpiandry ondry sy ny ondry andiany,
  - type: text
    content: Ary hianao no ho entiko manorotoro ny mpiasa tany sy ny ombiny roa mizioga,
  - type: text
    content: Ary hianao no ho entiko manorotoro ny governora sy ny lefiny.
  '24':
  - type: text
    content: Ary hampanodiaviko an’i Babylona sy ny mponina rehetra any Kaldea
  - type: text
    content: Ny ratsy rehetra izay efa nataony tao Ziona teo imasonareo, hoy Jehovah.
  '25':
  - type: text
    content: Indro mamely anao Aho, ry tendrombohitra ahitan-doza,
  - type: text
    content: Izay mandringana ny tany rehetra, hoy Jehovah;
  - type: text
    content: Ary hahinjitro ny tànako hamelezana anao,
  - type: text
    content: Dia hakodiako hianjera amin’ny harambato hianao
  - type: text
    content: Ka hataoko tendrombohitra mirehitra.
  '26':
  - type: text
    content: Ary tsy mba hakana vato hatao fehizoro hianao,
  - type: text
    content: Na hatao vato fanorenana;
  - type: text
    content: Fa ho lao mandrakizay hianao, hoy Jehovah.
  '27':
  - type: text
    content: Manangàna faneva eny amin’ny tany;
  - type: text
    content: Mitsofa anjomara any amin’ny firenena;
  - type: text
    content: Manendre
  - type: note
    content: Heb. Manamasìna.
  - type: text
    content: ' firenena hamely azy;'
  - type: text
    content: Antsoy ny fanjakan’i Ararata sy Miny ary Askenaza hamely azy;
  - type: text
    content: Asio mpifehy hamely azy;
  - type: text
    content: Mampiakara soavaly toy ny valala volovoloina.
  - type: note
    content: 'Na: mahatsiravina.'
  '28':
  - type: text
    content: Manendre
  - type: note
    content: Heb. Manamasìna.
  - type: text
    content: ' firenena sy ireo mpanjakan’ny Mediana hamely azy,'
  - type: text
    content: Ny governora sy ny lefiny rehetra
  - type: text
    content: Ary ny tany rehetra anjakany.
  '29':
  - type: text
    content: Mihorohoro sy mangovitra ny tany;
  - type: text
    content: Fa tanterahina amin’i Babylona ny fikasan’i Jehovah rehetra,
  - type: text
    content: Mba hahatonga ny tany Babylona ho lao tsy misy mponina.
  '3':
  - type: text
    content: Izay manenjana tsipìka
  - type: text
    content: Mbamin’izay miandranandrana amin’ny akanjo fiarovan-tenany,
  - type: text
    content: Dia aoka samy hasian’izay manenjana tsipìka;
  - type: text
    content: Aza tsitsinareo ny zatovony,
  - type: text
    content: Aringano
  - type: note
    content: Heb. Ataovy herema.
  - type: text
    content: ' avokoa ny miaramilany rehetra,'
  '30':
  - type: text
    content: Nitsahatra tamin’ny ady ny lehilahy maherin’i Babylona,
  - type: text
    content: Nitoetra tao amin’ny batery fiarovana izy,
  - type: text
    content: Lany ny heriny;
  - type: text
    content: Tonga toy ny vehivavy izy;
  - type: text
    content: Nodorana ny fonenany,
  - type: text
    content: Tapaka ny hidiny.
  '31':
  - type: text
    content: Mifamoivoy be ihany ny iraka mpihazakazaka, ary mifamoivoy be ihany ny mpitondra teny,
  - type: text
    content: Mba hanambara amin’ny mpanjakan’i Babylona
  - type: text
    content: Fa afaka ny tanànany manontolo.
  '32':
  - type: text
    content: Ary efa azo ny fitana, ary nodorany tamin’ny afo ny heniheny,
  - type: text
    content: Sady toran-kovitra ny miaramila.
  '33':
  - type: text
    content: 'Fa izao no lazain i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Babylona zanakavavy dia tahaka ny famoloana amin’ny andro anosena azy;
  - type: text
    content: Ary raha mbola tsy toy inona dia ho avy ny andro hijinjana azy.
  '34':
  - type: text
    content: Efa lanin’i Nebokadnezara, mpanjakan’i Babylona, izahay;
  - type: text
    content: Naringany izahay;
  - type: text
    content: Napetrany toy ny vata tsy misy entana izahay;
  - type: text
    content: Nateliny toy ny fitelin’ny mamba izahay;
  - type: text
    content: Nivokisan’ny kibony ny zava-piko,
  - type: text
    content: Ka dia nandroaka ahy izy.
  '35':
  - type: text
    content: 'Aoka ny mponina ao Ziona hanao hoe:'
  - type: text
    content: Hanody an’i Babylona anie ny loza nanjo ahy sy ny nofoko!
  - type: text
    content: 'Ary aoka Jerosalema hanao hoe:'
  - type: text
    content: Hanody ny mponina any Kaldea anie ny rako!
  '36':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hisolo vava anao amin’ny adinao Aho
  - type: text
    content: Sady hanao famaliana ho anao, ary horitiko ny ranomasiny,
  - type: text
    content: Sy hataoko tankina ny loharanony.
  '37':
  - type: text
    content: Ary Babylona ho tonga korontam-bato,
  - type: text
    content: Ho fonenan’ny amboadia,
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: Ho figagana sy ho zavatra mampisitrisitra
  - type: text
    content: Ka tsy hisy mponina.
  '38':
  - type: text
    content: Hiara-mierona toy ny liona tanora izy;
  - type: text
    content: Hikaonkaona toy ny zana-diona izy.
  '39':
  - type: text
    content: Raha mbola liana izy, dia hanaovako fanasana ho azy,
  - type: text
    content: Ka hataoko mamo izy mba hiravoravo,
  - type: text
    content: Dia hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy Jehovah.
  '4':
  - type: text
    content: Mba hiampatrampatra any amin’ny tanin’ny Kaldeana ny faty,
  - type: text
    content: Ary izay voatrobaka dia hiampatrampatra any an-dàlambeny.
  '40':
  - type: text
    content: Hampidiniko ho any amin’ny famonoana toy ny zanak’ondry izy,
  - type: text
    content: Sy toy ny ondrilahy mbamin’ny osilahy.
  '41':
  - type: text
    content: Endrey! afaka Sesaka!
  - type: note
    content: Sesaka = Babela.
  - type: text
    content: Ary azo ilay fidèran’ny tany rehetra,
  - type: text
    content: Endrey! tonga figagana any amin’ny firenena Babylona.
  '42':
  - type: text
    content: Ny ranomasina nanafotra an’i Babylona;
  - type: text
    content: Voasaron’ny habetsahan’ny onjany izy.
  '43':
  - type: text
    content: Ny tanànany dia lao
  - type: text
    content: Sy karankaina ary tani-hay,
  - type: text
    content: Dia tany tsy onenan’olona sady tsy misy zanak’olombelona mamaky eo.
  '44':
  - type: text
    content: Ary Bela dia hampijaliko any Babylona,
  - type: text
    content: Ka hasaiko haloany izay nateliny;
  - type: text
    content: Ary ny firenena tsy hitanjozotra hankany aminy intsony;
  - type: text
    content: Ny màndan’i Babylona dia hirodana.
  '45':
  - type: text
    content: Mivoaha avy ao afovoany hianareo, ry oloko,
  - type: text
    content: Ary samia mamonjy ny ainareo avy hianareo,
  - type: text
    content: Mba tsy ho azon’ny firehetan’ny fahatezeran’i Jehovah.
  '46':
  - type: text
    content: Ary fandrao ketraka ny fonareo,
  - type: text
    content: Ka matahotra hianareo noho ny tsaho miely amin’ny tany;
  - type: text
    content: Fa amin’ny iray taona dia hisy tsaho, ary amin’ny taona manaraka indray dia mbola hisy tsaho ihany koa
  - type: text
    content: Sy loza amin’ny tany,
  - type: text
    content: Dia mpanapaka mamely mpanapaka.
  '47':
  - type: text
    content: Koa, indro, avy ny andro
  - type: text
    content: Hamaliako ny sarin-javatr’i Babylona;
  - type: text
    content: Ho menatra ny taniny rehetra;
  - type: text
    content: Ary ny fatiny rehetra dia hiampatrampatra eo aminy.
  '48':
  - type: text
    content: Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby noho ny amin’i Babylona,
  - type: text
    content: Satria tonga ao aminy avy any avaratra ireo mpandringana, hoy Jehovah.
  '49':
  - type: text
    content: Toy ny nampiampatramparan’i Babylona ny faty tamin’ny Isiraely,
  - type: text
    content: Dia ho toy izany no hiampatramparan’ny faty amin’ny tany rehetra noho ny amin’i Babylona.
  '5':
  - type: text
    content: Fa Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely sy ny Joda,
  - type: text
    content: Dia tsy hahafoy azy ho mpitondratena,
  - type: text
    content: Na dia henika ny fahotany amin’ny Iray Masin’ny Isiraely aza ny taniny.
  '50':
  - type: text
    content: Hianareo izay tsy voan’ny sabatra,
  - type: text
    content: Mialà, fa aza mijanona;
  - type: text
    content: Tsarovy Jehovah, raha mbola lavitra hianareo,
  - type: text
    content: Ary aoka ho mby an-tsainareo Jerosalema.
  '51':
  - type: text
    content: Menatra izahay, fa efa nandre latsa;
  - type: text
    content: Manarona ny atrehinay ny henatra;
  - type: text
    content: Fa ny hafa firenena no niditra teo amin’ny fitoerana masina amin’ny tranon’i Jehovah.
  '52':
  - type: text
    content: Koa, indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hamaliako ny sarin-javatra voasokitra ao koa;
  - type: text
    content: Ary hitoloko eran’ny taniny rehetra ny voatrobaka.
  '53':
  - type: text
    content: Na dia miakatra any an-danitra aza Babylona,
  - type: text
    content: Ary na dia ataony mafy aza ny fitoerana avo izay heriny,
  - type: text
    content: Dia avy amiko no hihavian’ny mpandringana azy, hoy Jehovah.
  '54':
  - type: text
    content: Injany! misy feo mitaraina avy any Babylona sy fandringanana be avy any amin’ny tanin’ny Kaldeana!
  '55':
  - type: text
    content: Fa Jehovah no mandrava an’i Babylona
  - type: text
    content: Sy mampitsahatra ny fihorakorahana eo aminy,
  - type: text
    content: Ary hirohondrohona toy ny rano be ny onjany,
  - type: text
    content: Eny, re tokoa ny feon’ny firohondrohony.
  '56':
  - type: text
    content: Fa tonga ao aminy, dia ao Babylona, ny mpandringana,
  - type: text
    content: Ary voasambotra ny lehilahy maheriny;
  - type: text
    content: Tapatapaka avokoa ny tsipìkany;
  - type: text
    content: Satria Jehovah dia Andriamanitry ny famaliana ka hamaly tokoa.
  '57':
  - type: text
    content: Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny,
  - type: text
    content: Ny governorany sy ny lefiny ary ny olo-maheriny;
  - type: text
    content: Ary hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony,
  - type: text
    content: Hoy ny Mpanjaka,–Jehovah, Tompon’ny maro, no anarany.
  '58':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Ny mànda malalaka any Babylona dia horavana tokoa hatramin’ny fanorenany,
  - type: text
    content: Ary ny vavahadiny avo hodorana amin’ny afo.
  - type: text
    content: Ka dia ho nisasatra foana ny firenena,
  - type: text
    content: Ary ny olona ho nisasatra ho an’ny afo ka ho reraka.
  '59':
  - type: text
    content: Ny teny izay nandidian’i Jeremia mpaminany an’i Seraia, zanak’i Neria, zanak’i Mahaseia, fony izy nandeha niaraka tamin’i Zedekia, mpanjakan’ny Joda, ho any Babylona tamin’ny taona fahefatra nanjakany. Fa Seraia no lehiben’ny mpanorin-dasy.
  '6':
  - type: text
    content: Mandosira hiala an’i Babylona hianareo,
  - type: text
    content: Ary samia mamonjy ny ainareo avy;
  - type: text
    content: Aoka tsy ho voaringana noho ny fahotany hianareo;
  - type: text
    content: Fa izao no andro famalian’i Jehovah,
  - type: text
    content: Izy no hamaly azy.
  '60':
  - type: text
    content: 'Ary nosoratan’i Jeremia teo amin’ny boky iray ny loza rehetra izay hanjo an’i Babylona, dia ireo teny rehetra ireo, izay voasoratra ny amin’i Babylona. '
  '61':
  - type: text
    content: 'Ary hoy Jeremia tamin’i Seraia: Rehefa tonga any Babylona hianao, dia tandremo tsara mba hovakinao ireo teny rehetra ireo, '
  '62':
  - type: text
    content: 'ka manaova hoe: Jehovah ô, Hianao no niteny hamely ity tany ity handringana azy, ka tsy hisy hitoetra eto, na olona na biby, fa ho tany lao mandrakizay izy. '
  '63':
  - type: text
    content: 'Ary rehefa tapitra ny famakianao ity boky ity, dia asio vato afehy aminy, ary atsipazo ao Eofrata izy, '
  '64':
  - type: text
    content: 'ka ataovy hoe: Toy izao no hilentehan’i Babylona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ka dia ho reraka izy.'
  - type: text
    content: Hatreto no tenin’i Jeremia.
  '7':
  - type: text
    content: Babylona dia kapoaka volamena teny an-tànan’i Jehovah,
  - type: text
    content: Izay nahamamo ny tany rehetra;
  - type: text
    content: Ny divainy efa nisotroan’ny firenena,
  - type: text
    content: Koa izany no nahavery saina ireny.
  '8':
  - type: text
    content: Tampoka no naharavan’i Babylona sy nahatorotoroany;
  - type: text
    content: Idradradradrao izy;
  - type: text
    content: Makà balsama hatao amin’ny feriny maharary azy,
  - type: text
    content: Fa angamba ho sitrana ihany izy.
  '9':
  - type: text
    content: Nitady hanasitrana an’i Babylona izahay, nefa tsy nety sitrana izy;
  - type: text
    content: Afoizo izy, ka andeha isika samy handeha ho any amin’ny tanintsika avy;
  - type: text
    content: Fa mahatakatra ny lanitra ny helony
  - type: text
    content: Ary mitehika amin’ny rahona.
