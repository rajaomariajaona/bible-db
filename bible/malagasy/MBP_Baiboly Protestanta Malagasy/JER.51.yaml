document_id: JER.51,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hamporisihiko ny fanahin’ny mpandringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamely an’i Babylona sy izay monina ao Leba-kamay.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Leba-kamay = Kaldea.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nasehon’i Jehovah ny fahamarinantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha, ka aoka hotorintsika ao Ziona ny asan’i Jehovah Andriamanitsika.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lambolamboy ny zana-tsipìka, tano ny ampìnga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah efa nampirisika ny fanahin’ny mpanjakan’ny Mediana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hamely an’i Babylona no nosaininy, mba handringanana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famalian’i Jehovah izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, famaliana noho ny tempoliny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangàna faneva eo akaikin’ny màndan’i Babylona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy mafy ny fiambenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alatsaho ny mpiambina, alamino ny otrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah sady efa nisaina no nahatanteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nolazainy ny amin’ny mponina any Babylona.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao izay monina eny amoron’ny rano be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady be rakitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ny fiafaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy intsony ny filanao harena.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jehovah, Tompon’ny maro, nianiana tamin’ny tenany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofenoiko olona maro toy ny valala tokoa hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ireny dia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na dia hofenoiko olona maro toy ny valala aza hianao, dia ireny no.
      marker-yv: yv-n
    - type: text
      text: ' hanakora hamely anao,–'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Ilay nanao ny tany tamin’ny heriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nampiorina izao tontolo izao tamin’ny fahendreny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary namelatra ny lanitra tamin’ny fisainany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nampirohondrohona ny rano any an-danitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampiakatra zavona avy tany amin’ny faran’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao ny helatra ho an’ny ranonorana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mamoaka ny rivotra avy amin’ny firaketany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menarina ny mpanefy volamena rehetra noho ny amin’ny sarin-javatra voasokitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fitaka ny sarin-javatra an-idina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy misy aina ao aminy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana ireny, dia asa mahatsikaiky foana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hamaliana azy dia ho levona izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba tahaka ireo ny Anjaran’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Mpamorona ny zavatra rehetra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny Isiraely
    - type: text
      text: ' no firenena lovany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Tompon’ny maro, no anarany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary haniraka olona hafa firenena ho any Babylona Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hikororoka azy ka hahafoana ny taniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamely azy manodidina amin’ny andro fahoriana ireo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Langilangiko sy fiadiako hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianao no ho entiko manorotoro firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko mandringana fanjakana,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro soavaly sy ny mpitaingina azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro ny kalesy sy ny mpitaingina azy;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao koa no ho entiko manorotoro ny lehilahy sy ny vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro ny antitra sy ny tanora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro ny zatovo sy ny virijina;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao koa no ho entiko manorotoro ny mpiandry ondry sy ny ondry andiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro ny mpiasa tany sy ny ombiny roa mizioga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao no ho entiko manorotoro ny governora sy ny lefiny.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampanodiaviko an’i Babylona sy ny mponina rehetra any Kaldea
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy rehetra izay efa nataony tao Ziona teo imasonareo, hoy Jehovah.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro mamely anao Aho, ry tendrombohitra ahitan-doza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandringana ny tany rehetra, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hahinjitro ny tànako hamelezana anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hakodiako hianjera amin’ny harambato hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hataoko tendrombohitra mirehitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba hakana vato hatao fehizoro hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hatao vato fanorenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho lao mandrakizay hianao, hoy Jehovah.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangàna faneva eny amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsofa anjomara any amin’ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manendre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manamasìna.
      marker-yv: yv-n
    - type: text
      text: ' firenena hamely azy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsoy ny fanjakan’i Ararata sy Miny ary Askenaza hamely azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asio mpifehy hamely azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampiakara soavaly toy ny valala volovoloina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mahatsiravina.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manendre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manamasìna.
      marker-yv: yv-n
    - type: text
      text: ' firenena sy ireo mpanjakan’ny Mediana hamely azy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny governora sy ny lefiny rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany rehetra anjakany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoro sy mangovitra ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tanterahina amin’i Babylona ny fikasan’i Jehovah rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hahatonga ny tany Babylona ho lao tsy misy mponina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manenjana tsipìka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’izay miandranandrana amin’ny akanjo fiarovan-tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka samy hasian’izay manenjana tsipìka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza tsitsinareo ny zatovony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ataovy herema.
      marker-yv: yv-n
    - type: text
      text: ' avokoa ny miaramilany rehetra,'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsahatra tamin’ny ady ny lehilahy maherin’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitoetra tao amin’ny batery fiarovana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lany ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga toy ny vehivavy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nodorana ny fonenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapaka ny hidiny.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifamoivoy be ihany ny iraka mpihazakazaka, ary mifamoivoy be ihany ny mpitondra teny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanambara amin’ny mpanjakan’i Babylona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa afaka ny tanànany manontolo.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa azo ny fitana, ary nodorany tamin’ny afo ny heniheny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady toran-kovitra ny miaramila.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylona zanakavavy dia tahaka ny famoloana amin’ny andro anosena azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mbola tsy toy inona dia ho avy ny andro hijinjana azy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa lanin’i Nebokadnezara, mpanjakan’i Babylona, izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naringany izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Napetrany toy ny vata tsy misy entana izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nateliny toy ny fitelin’ny mamba izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivokisan’ny kibony ny zava-piko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nandroaka ahy izy.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka ny mponina ao Ziona hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanody an’i Babylona anie ny loza nanjo ahy sy ny nofoko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka Jerosalema hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanody ny mponina any Kaldea anie ny rako!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hisolo vava anao amin’ny adinao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hanao famaliana ho anao, ary horitiko ny ranomasiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hataoko tankina ny loharanony.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Babylona ho tonga korontam-bato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fonenan’ny amboadia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho figagana sy ho zavatra mampisitrisitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy mponina.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiara-mierona toy ny liona tanora izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikaonkaona toy ny zana-diona izy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola liana izy, dia hanaovako fanasana ho azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hataoko mamo izy mba hiravoravo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hiampatrampatra any amin’ny tanin’ny Kaldeana ny faty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay voatrobaka dia hiampatrampatra any an-dàlambeny.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampidiniko ho any amin’ny famonoana toy ny zanak’ondry izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy toy ny ondrilahy mbamin’ny osilahy.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! afaka Sesaka!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sesaka = Babela.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary azo ilay fidèran’ny tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! tonga figagana any amin’ny firenena Babylona.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ranomasina nanafotra an’i Babylona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voasaron’ny habetsahan’ny onjany izy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanànany dia lao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy karankaina ary tani-hay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tany tsy onenan’olona sady tsy misy zanak’olombelona mamaky eo.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Bela dia hampijaliko any Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hasaiko haloany izay nateliny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena tsy hitanjozotra hankany aminy intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny màndan’i Babylona dia hirodana.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoaha avy ao afovoany hianareo, ry oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samia mamonjy ny ainareo avy hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsy ho azon’ny firehetan’ny fahatezeran’i Jehovah.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fandrao ketraka ny fonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka matahotra hianareo noho ny tsaho miely amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny iray taona dia hisy tsaho, ary amin’ny taona manaraka indray dia mbola hisy tsaho ihany koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy loza amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mpanapaka mamely mpanapaka.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa, indro, avy ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaliako ny sarin-javatr’i Babylona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho menatra ny taniny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fatiny rehetra dia hiampatrampatra eo aminy.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby noho ny amin’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tonga ao aminy avy any avaratra ireo mpandringana, hoy Jehovah.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nampiampatramparan’i Babylona ny faty tamin’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho toy izany no hiampatramparan’ny faty amin’ny tany rehetra noho ny amin’i Babylona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely sy ny Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hahafoy azy ho mpitondratena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia henika ny fahotany amin’ny Iray Masin’ny Isiraely aza ny taniny.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo izay tsy voan’ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà, fa aza mijanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy Jehovah, raha mbola lavitra hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho mby an-tsainareo Jerosalema.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menatra izahay, fa efa nandre latsa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manarona ny atrehinay ny henatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hafa firenena no niditra teo amin’ny fitoerana masina amin’ny tranon’i Jehovah.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa, indro, avy ny andro, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hamaliako ny sarin-javatra voasokitra ao koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitoloko eran’ny taniny rehetra ny voatrobaka.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia miakatra any an-danitra aza Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia ataony mafy aza ny fitoerana avo izay heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia avy amiko no hihavian’ny mpandringana azy, hoy Jehovah.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany! misy feo mitaraina avy any Babylona sy fandringanana be avy any amin’ny tanin’ny Kaldeana!
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no mandrava an’i Babylona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mampitsahatra ny fihorakorahana eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hirohondrohona toy ny rano be ny onjany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, re tokoa ny feon’ny firohondrohony.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tonga ao aminy, dia ao Babylona, ny mpandringana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary voasambotra ny lehilahy maheriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapatapaka avokoa ny tsipìkany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Jehovah dia Andriamanitry ny famaliana ka hamaly tokoa.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny governorany sy ny lefiny ary ny olo-maheriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatory amin’ny torimaso mandrakizay izy ka tsy hifoha intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy ny Mpanjaka,–Jehovah, Tompon’ny maro, no anarany.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mànda malalaka any Babylona dia horavana tokoa hatramin’ny fanorenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vavahadiny avo hodorana amin’ny afo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho nisasatra foana ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona ho nisasatra ho an’ny afo ka ho reraka.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny teny izay nandidian’i Jeremia mpaminany an’i Seraia, zanak’i Neria, zanak’i Mahaseia, fony izy nandeha niaraka tamin’i Zedekia, mpanjakan’ny Joda, ho any Babylona tamin’ny taona fahefatra nanjakany. Fa Seraia no lehiben’ny mpanorin-dasy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira hiala an’i Babylona hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samia mamonjy ny ainareo avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho voaringana noho ny fahotany hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao no andro famalian’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hamaly azy.
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nosoratan’i Jeremia teo amin’ny boky iray ny loza rehetra izay hanjo an’i Babylona, dia ireo teny rehetra ireo, izay voasoratra ny amin’i Babylona. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jeremia tamin’i Seraia: Rehefa tonga any Babylona hianao, dia tandremo tsara mba hovakinao ireo teny rehetra ireo, '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka manaova hoe: Jehovah ô, Hianao no niteny hamely ity tany ity handringana azy, ka tsy hisy hitoetra eto, na olona na biby, fa ho tany lao mandrakizay izy. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra ny famakianao ity boky ity, dia asio vato afehy aminy, ary atsipazo ao Eofrata izy, '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ataovy hoe: Toy izao no hilentehan’i Babylona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ka dia ho reraka izy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatreto no tenin’i Jeremia.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylona dia kapoaka volamena teny an-tànan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nahamamo ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny divainy efa nisotroan’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no nahavery saina ireny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tampoka no naharavan’i Babylona sy nahatorotoroany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Idradradradrao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Makà balsama hatao amin’ny feriny maharary azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa angamba ho sitrana ihany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitady hanasitrana an’i Babylona izahay, nefa tsy nety sitrana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afoizo izy, ka andeha isika samy handeha ho any amin’ny tanintsika avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahatakatra ny lanitra ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitehika amin’ny rahona.
