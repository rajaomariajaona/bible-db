document_id: PSA.47,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fihobiana noho ny niakaran’ny Tompo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Salamo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MITEHAFA tànana, ry firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia ho an’Andriamanitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no avo indrindra ka tokony hatahorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjaka lehibe ambonin’ny tany rehetra Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandresy firenena maro Izy ho ambanintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary firenen-tsamy hafa ho ambanin’ny tongotsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifidy ny lovantsika ho antsika Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny voninahitr’i Jakoba izay tiany.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa niakatra tamin’ny fihobiana Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah niakatra tamin’ny fitsofana ny anjomara.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankalazà an’Andriamanitra, eny, mankalazà;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankalazà ny Mpanjakantsika, eny, mankalazà.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Mpanjaka amin’ny tany rehetra Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahaiza mankalaza tsara hianareo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra manjaka amin’ny firenen-tsamy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra mipetraka eo ambonin’ny seza fiandrianany masina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanapaka ny firenen-tsamy hafa miangona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho olon’Andriamanitr’i Abrahama;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa an’Andriamanitra ny ampingan’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo indrindra Izy.
