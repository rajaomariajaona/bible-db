document_id: PSA.47
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fihobiana noho ny niakaran’ny Tompo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Salamo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MITEHAFA tànana, ry firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihobia ho an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Jehovah no avo indrindra ka tokony hatahorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanjaka lehibe ambonin’ny tany rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandresy firenena maro Izy ho ambanintsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary firenen-tsamy hafa ho ambanin’ny tongotsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mifidy ny lovantsika ho antsika Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny voninahitr’i Jakoba izay tiany.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa niakatra tamin’ny fihobiana Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah niakatra tamin’ny fitsofana ny anjomara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mankalazà an’Andriamanitra, eny, mankalazà;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankalazà ny Mpanjakantsika, eny, mankalazà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa Mpanjaka amin’ny tany rehetra Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahaiza mankalaza tsara hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andriamanitra manjaka amin’ny firenen-tsamy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra mipetraka eo ambonin’ny seza fiandrianany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny mpanapaka ny firenen-tsamy hafa miangona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho olon’Andriamanitr’i Abrahama;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa an’Andriamanitra ny ampingan’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avo indrindra Izy.
