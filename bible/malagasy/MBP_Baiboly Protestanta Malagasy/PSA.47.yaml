document_id: PSA.47,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fihobiana noho ny niakaran’ny Tompo.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Salamo.
  - type: text
    content: MITEHAFA tànana, ry firenena rehetra;
  - type: text
    content: Mihobia ho an’Andriamanitra.
  '2':
  - type: text
    content: Fa Jehovah no avo indrindra ka tokony hatahorana;
  - type: text
    content: Mpanjaka lehibe ambonin’ny tany rehetra Izy.
  '3':
  - type: text
    content: Mandresy firenena maro Izy ho ambanintsika
  - type: text
    content: Ary firenen-tsamy hafa ho ambanin’ny tongotsika.
  '4':
  - type: text
    content: Mifidy ny lovantsika ho antsika Izy,
  - type: text
    content: Dia ny voninahitr’i Jakoba izay tiany.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Efa niakatra tamin’ny fihobiana Andriamanitra,
  - type: text
    content: Jehovah niakatra tamin’ny fitsofana ny anjomara.
  '6':
  - type: text
    content: Mankalazà an’Andriamanitra, eny, mankalazà;
  - type: text
    content: Mankalazà ny Mpanjakantsika, eny, mankalazà.
  '7':
  - type: text
    content: Fa Mpanjaka amin’ny tany rehetra Andriamanitra;
  - type: text
    content: Mahaiza mankalaza tsara hianareo.
  '8':
  - type: text
    content: Andriamanitra manjaka amin’ny firenen-tsamy hafa;
  - type: text
    content: Andriamanitra mipetraka eo ambonin’ny seza fiandrianany masina.
  '9':
  - type: text
    content: Ny mpanapaka ny firenen-tsamy hafa miangona
  - type: text
    content: Ho olon’Andriamanitr’i Abrahama;
  - type: text
    content: Fa an’Andriamanitra ny ampingan’ny tany;
  - type: text
    content: Avo indrindra Izy.
