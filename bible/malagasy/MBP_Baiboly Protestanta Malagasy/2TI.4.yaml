document_id: 2TI.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo anatrehan’Andriamanitra sy Kristy Jesosy, Izay hitsara ny velona sy ny maty, ary noho ny amin’ny fisehoany sy ny fanjakany, no ananarako anao mafy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Demasy efa nandao ahy, satria tia izao fiainana izao izy ka lasa nankany Tesalonika; Kreska nankany Galatia, Titosy nankany Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lioka ihany no ato amiko. Alao Marka, ka ento miaraka aminao, fa mahasoa ahy amin’ny fanompoana izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tykiko dia nirahiko ho any Efesosy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay kapôty navelako tany Troasy tao amin’i Karpo, dia ento, raha mankatỳ hianao, ary ny boky, indrindra fa ireo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: boky
    - type: text
      text: ' hoditra.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aleksandro, mpanefy varahina, efa nanisy ratsy ahy be loatra; ny Tompo hamaly azy araka ny asany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tandremonao ihany izy iny, fa nanohitra fatratra ny teninay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny nandaharako voalohany hanala tsiny ny tenako dia tsy nisy nomba ahy, fa nandao ahy avokoa izy rehetra (aza mba isaina ho helony anie izany). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny Tompo nitsangana teo anilako ka nampahery ahy, mba hotanterahina tokoa amin’ny ataoko ny fitorian-teny, ary mba ho ren’ny jentilisa rehetra izany; ary izaho novonjena tao am-bavan’ny liona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Tompo hanafaka ahy amin’ny asa ratsy rehetra ka hamonjy ahy ho any amin’ny fanjakany any an-danitra; ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaova veloma amin’i Prisila sy Akoila mbamin’ny ankohonan’i Onesiforosy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mitoria ny teny, mazotoa, na amin’ny fotoana, na tsy amin’ny fotoana, mandrese lahatra, mamporisiha, mananara mafy amin’ny fahari-po sy ny fampianarana rehetra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Erasto nitoetra tany Korinto; fa Trofimo nilaozako tany Mileto, satria narary izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mazotoa hankatỳ alohan’ny ririnina.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao veloma anao Eobolo sy Poda sy Lino sy Klaodia mbamin’ny rahalahy rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho amin’ny fanahinao anie ny Tompo. Ho aminareo anie ny fahasoavana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ho avy ny andro izay tsy hahazakan’ny olona ny fampianarana tsy misy kilema;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: salama.
      marker-yv: yv-n
    - type: text
      text: ' fa hangidihidy sofina izy, dia hamory mpampianatra ho azy araka ny filany; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hampiala ny sofiny amin’ny teny marina tokoa izy ka hivily ho amin’ny anganongano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hianao kosa mahonona tena amin’ny zavatra rehetra, miareta fahoriana, ataovy ny asan’ny evanjelista, tanteraho ny fanompoanao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izaho dia efa hatolotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: haidina ho fanatitra aidina.
      marker-yv: yv-n
    - type: text
      text: ' sahady, ary efa mba akaiky ny andro fialako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa niady ny ady tsara aho; nahatanteraka ny fihazakazahako aho; nitahiry ny finoana aho; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: hatrizao dia tehirizina ho ahy ny satroboninahitry ny fahamarinana, izay homen’ny Tompo, Mpitsara marina, ho ahy amin’izay andro izay; ary tsy ho ahy ihany, fa ho an’izay rehetra tia ny fisehoany koa.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanaovam-beloma sy hafatra.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'MAZOTOA hankatỳ amiko faingana hianao '
