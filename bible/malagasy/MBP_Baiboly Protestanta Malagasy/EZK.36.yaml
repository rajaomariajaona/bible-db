document_id: EZK.36,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hitahian’i Jehovah ny tanin’ny Isiraely.
  - type: text
    content: 'ARY hianao, ry zanak’olona, maminania amin’ny tendrombohitry ny Isiraely, ka ataovy hoe:'
  - type: text
    content: Ry tendrombohitry ny Isiraely,
  - type: text
    content: 'Mihainoa ny tenin’i Jehovah:'
  '10':
  - type: text
    content: Ary hahamaro ny olona eny aminareo Aho,
  - type: text
    content: Dia ny taranak’Isiraely rehetra rehetra,
  - type: text
    content: Ary honenana ny tanàna,
  - type: text
    content: Ka haorina indray ny efa rava;
  '11':
  - type: text
    content: Dia hampitombo olona sy biby fiompy eny aminareo Aho,
  - type: text
    content: Ka hitombo sy hiteraka ireo;
  - type: text
    content: Hametrahako mponina tahaka ny taloha any aminareo,
  - type: text
    content: Ary hanisy soa anareo mihoatra noho ny tamin’ny niandohanareo Aho;
  - type: text
    content: Ka dia ho fantatrareo fa Izaho no Jehovah.
  '12':
  - type: text
    content: Eny, hampivoivoy olona eny aminareo Aho, dia ny Isiraely oloko;
  - type: text
    content: Dia hanana anareo
  - type: note
    content: Heb. anao.
  - type: text
    content: ' izy ka hahalasa anareo'
  - type: note
    content: Heb. anao.
  - type: text
    content: ' ho lovany,'
  - type: text
    content: Ary tsy hahalany fara azy intsony hianareo.
  - type: note
    content: Heb. hianao.
  '13':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: 'Noho ny nanaovany taminareo hoe:'
  - type: text
    content: 'Hianao, '
  - type: text
    content: ry tany,
  - type: text
    content: ' dia mandany olona,'
  - type: text
    content: Sady mahalany fara ny firenenao,
  '14':
  - type: text
    content: Dia tsy handany olona intsony hianao,
  - type: text
    content: Na hahalavo ny firenenao intsony, hoy Jehovah Tompo.
  '15':
  - type: text
    content: Ary hataoko tsy mahare ny latsan’ny jentilisa intsony hianao
  - type: text
    content: Sady tsy hitondra ny fanaratsian’olona intsony;
  - type: text
    content: Ary tsy hahalavo ny firenenao intsony hianao, hoy Jehovah Tompo.
  - type: heading
    content: Ny fifampiankinan’ny famonjena ny Isiraely sy ny fahamasinany.
  '16':
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '17':
  - type: text
    content: Ry zanak’olona, ny taranak’Isiraely nonina tany amin’ny taniny, dia nandoto izany tamin’ny fanaony
  - type: note
    content: Heb. làlany.
  - type: text
    content: ' sy tamin’ny asany izy; fa tahaka ny fahalotoan’ny vehivavy mararin’ny fadimbolana no fahalotoan’ny fanaony'
  - type: note
    content: Heb. làlany.
  - type: text
    content: ' eo anatrehako. '
  '18':
  - type: text
    content: 'Ka dia naidiko ho aminy ny fahatezerako mirehitra noho ny ra nalatsany teo amin’ny tany sy noho ny nandotoany izany tamin’ny sampiny. '
  '19':
  - type: text
    content: Ary naeliko ho any amin’ny firenena izy ka nahahaka ho any amin’ny tany samy hafa; araka ny fanaony
  - type: note
    content: Heb. làlany.
  - type: text
    content: ' sy ny asany no nitsarako azy. '
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: 'Noho ny nanaovan’ny fahavalo anareo hoe:'
  - type: text
    content: Hia! efa lasanay ny havoana fahagola!
  '20':
  - type: text
    content: 'Ary nony tonga tany amin’ny firenena izay nalehany izy, dia tonga fandotoana ny anarako masina tamin’ny nanaovan’ny olona azy hoe: Ireo no olon’i Jehovah, nefa niala tamin’ny tanin’i Jehovah izy. '
  '21':
  - type: text
    content: Dia namindrako fo ny anarako masina, izay nolotoin’ny taranak’Isiraely tany amin’ny firenena izay nalehany.
  '22':
  - type: text
    content: 'Koa ataovy amin’ny taranak’Isiraely hoe: Izao no lazain’i Jehovah Tompo: Tsy noho ny aminareo no anaovako izany, ry taranak’Isiraely, fa noho ny anarako, masina, izay nolotoinareo tany amin’ny jentilisa izay nalehanareo. '
  '23':
  - type: text
    content: 'Ary hohamasiniko ny anarako lehibe izay efa nolotoinareo tany amin’ny jentilisa, ka dia ho fantany fa Izaho no Jehovah, hoy Jehovah Tompo, rehefa miseho ho masina eo imasony Aho amin’ny ataoko aminareo. '
  '24':
  - type: text
    content: 'Fa halaiko avy any amin’ny jentilisa hianareo ary hangoniko avy any amin’ny tany rehetra ka ho entiko ho any amin’ny taninareo. '
  '25':
  - type: text
    content: 'Dia hofafazako rano madio hianareo, ka hadio; ny mba ho afaka amin’ny fahalotoanareo rehetra sy ny sampinareo rehetra no hanadiovako anareo. '
  '26':
  - type: text
    content: 'Ary homeko fo vaovao hianareo, ary fanahy vaovao no hataoko ao anatinareo, ary hesoriko amin’ny nofonareo ny fo vato, ka homeko fo nofo hianareo. '
  '27':
  - type: text
    content: 'Ary ny Fanahiko no hataoko ao anatinareo, ka hahatonga anareo handeha araka ny lalàko sy hitandrina ny fitsipiko ka hanaraka azy. '
  '28':
  - type: text
    content: 'Ary honina any amin’ny tany izay nomeko ny razanareo hianareo, ka ho oloko hianareo, ary Izaho ho Andriamanitrareo. '
  '29':
  - type: text
    content: 'Ary hovonjeko ho afaka amin’ny fahalotoanareo rehetra hianareo, ary hantsoiko sy hataoko vokatra ny vary, ary tsy hanaterako mosary intsony hianareo; '
  '3':
  - type: text
    content: 'Dia maminania, ka lazao hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Noho ny nandravany anareo sy ny nisafoahany nanenjika anareo avy amin’ny tany manodidina,
  - type: text
    content: Ka dia efa lasan’ny jentilisa sisa ho fananany hianareo,
  - type: text
    content: Sady efa nataon’ny molotry ny mpibedibedy fitenenana
  - type: text
    content: Ka efa ambentinteny amin’ny firenena,–
  '30':
  - type: text
    content: ary hataoko vokatra koa ny voankazo sy ny vokatry ny saha, mba tsy ho voalatsan’ny jentilisa amin’ny mosary intsony hianareo.
  '31':
  - type: text
    content: 'Dia hotsarovanareo ny làlan-dratsinareo sy ny fanao tsy metinareo, ka dia haharikoriko anareo ny tenanareo noho ny fahadisoanareo sy ny fahavetavetanareo. '
  '32':
  - type: text
    content: Tsy noho ny aminareo no anaovako izany, hoy Jehovah Tompo–aoka ho fantatrareo izany; koa menara sy mangaihaiza hianareo noho ny làlanareo, ry taranak’Isiraely.
  '33':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Amin’ny andro hanadiovako anareo ho afaka amin’ny helokareo rehetra dia hametrahako mponina ao amin’ny tanàna, ary haorina indray ny efa rava. '
  '34':
  - type: text
    content: 'Ary hasaina ny tany efa lao, fa tsy ho lao eo imason’ny mpandalo rehetra intsony izy. '
  '35':
  - type: text
    content: 'Fa holazainy hoe: Ity tany efa lao ity dia tonga tahaka ny saha Edena; ary ny tanàna efa foana sy lao dia misy mponina sady asiana mànda; '
  '36':
  - type: text
    content: ka dia ho fantatry ny jentilisa sisa manodidina anareo fa Izaho Jehovah no manorina indray ny efa rava sy mamboly izay efa foana. Izaho Jehovah no niteny sady hahatanteraka izany.
  '37':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Mbola hotadiavin’ny taranak’Isiraely Aho amin’ny hanaovako izao ho azy; hohamaroiko toy ny ondry ny olony. '
  '38':
  - type: text
    content: Toy ny ondry aman-osy masina, izay any Jerosalema amin’ny fotoam-pivavahana, dia toy izany no hahafenoan’ny tanànany efa lao amin’ny olona maro toy ny ondry aman-osy; ka dia ho fantatra fa Izaho no Jehovah.
  '4':
  - type: text
    content: 'Dia mihainoa ny tenin’i Jehovah Tompo, ry tendrombohitry ny Isiraely:'
  - type: text
    content: Izao no lazain’i Jehovah Tompo amin’ny tendrombohitra sy ny havoana,
  - type: text
    content: Ny lohasahan-driaka sy ny lohasaha
  - type: text
    content: Ary amin’ny korontam-bato sy ny tanànaolo,
  - type: text
    content: Izay efa babo sy fandatsa ho an’ny firenena sisa amin’ny manodidina,–
  '5':
  - type: text
    content: 'Eny, izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Tamin’ny afon’ny fahasaro-piaroko no nitenenako tokoa
  - type: text
    content: Namely ny firenena sisa sy Edoma rehetra,
  - type: text
    content: Izay nahalasa ny taniko ho fananany
  - type: text
    content: Tamin’ny hafalian’ny fony tokoa
  - type: text
    content: Sy tamin’ny fanahy mamingavinga, mba hangoronany azy ho babo.
  '6':
  - type: text
    content: Koa maminania ny amin’ny tanin’ny Isiraely,
  - type: text
    content: Ka lazao amin’ny tendrombohitra sy ny havoana
  - type: text
    content: 'Ary ny lohasahan-driaka sy ny lohasaha hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: '(Indro, tamin’ny fahasaro-piaroko sy ny fahatezerako no nitenenako):'
  - type: text
    content: Noho ny nitondranareo latsa tamin’ny firenena,
  '7':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Izaho efa nanangan-tànana nanao hoe;
  - type: text
    content: Ny firenena manodidina anareo no hitondra henatra.
  '8':
  - type: text
    content: Fa hianareo kosa, ry tendrombohitry ny Isiraely,
  - type: text
    content: Dia hisandrahaka sy hahavokatra ho an’ny Isiraely oloko;
  - type: text
    content: Fa efa antomotra ny hihavian’ireny.
  '9':
  - type: text
    content: Fa, indro, hitodika ho aminareo Aho
  - type: text
    content: Ka hanatrika anareo;
  - type: text
    content: Dia hasaina sy hofafazana hianareo,
