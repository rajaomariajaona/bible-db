document_id: 1KI.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanaovan’i Solomona ny lapany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY telo ambin’ny folo taona no nanaovan’i Solomona ny lapany, dia vita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary vato tsara sady lehibe ny fanorenany, dia vato folo hakiho sy valo hakiho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary teo ambony nisy vato tsara voapaika araka ny marika sy hazo sedera; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary manodidina ny kianja lehibe dia nasiany vato voapaika telo andalana sy hazo sedera iray andalana, tahaka ny amin’ny kianja anatiny amin’ny tranon’i Jehovah sy amin’ny lavarangana fidirana amin’ny trano.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanaovan’i Solomona ny fanaka momba ny tempoly.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ARY Solomona mpanjaka naniraka haka an’i Hirama avy tany Tyro. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Zanaky ny vehivavy mpitondratena tamin’ny firenen’i Naftaly izy, nefa rainy dia lehilahy Tyriana, mpiasa varahina; feno fahendrena sy fahiratan-tsaina ary fahaizana izy hahavitany ny asa varahina rehetra. Dia tonga tao amin’i Solomona mpanjaka Hirama ka nanao izay asa rehetra tao aminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nanao ny andry varahina roa izy: valo ambin’ny folo hakiho avy ny hahavony, ary roa ambin’ny folo hakiho ny manodidina azy.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny faharoa.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nanao kapitaly varahina roa an-idina izy hatao eo amin’ny tampon’ny andry: dimy hakiho avy ny hahavony, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary harato sy fesitona miolana amin’ny kapitaly izay teo amin’ny tampon’ny andry avy: fito amin’ny kapitaly iray, ary fito koa amin’ny kapitaly iray. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nanao ny andry izy, ary nisy roa andalana manodidina tamin’ny asa harato iray, hafono ny kapitaly izay teo an-tampon’ny andry; ary toy izany koa no nataony tamin’ny kapitaly iray. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny kapitaly izay teo an-tampon’ny andry dia nataony mitarehim-boninkazo lilia tahaka ny amin’ny lavarangana fidirana, ary efatra hakiho ny hahavony; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa nanao ilay trano Alan’i Libanona izy: zato hakiho ny lavany, dimam-polo hakiho ny sakany, ary telo-polo hakiho ny hahavony, teo ambonin’ny andry sedera efatra andalana mbamin’ny sedera rairainy teo ambonin’ny andry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ary ny kapitaly teo an-tampon’ ny andry roa dia teo ambony koa, teo akaikin’ny kibony izay anatin’ny harato; ary nisy sarin’ampongabendanitra roan-jato nifanandalana nanodidina ny kapitaly avy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny andry dia natsangany teo amin’ny lavarangana fidirana amin’ny efitra lehibe: ny andry ankavanana natsangany, ka ny anarany nataony hoe Jakina;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jakina = Hampiorina izy.
      marker-yv: yv-n
    - type: text
      text: ' ary ny andry ankavia natsangany koa, ka ny anarany nataony hoe Boaza.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Boaza = Ao aminy no misy hery (?).
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary nisy natao mitarehim-boninkazo lilia teo an-tampon’ny andry. Toy izany no nahavitany ny asa tamin’ny andry.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary nanao ny tavin-drano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' an-idina boribory lehibe izy, ka folo hakiho no halehiben’ny vavany, ary dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary tambanin’ny molotry ny tavin-drano lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' manodidina nisy sarim-boantango manodidina azy, folo amin’ny iray hakiho manodidina ny tavin-drano lehibe,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' ary naidiny ho roa andalana ny sarim-boantango sady niara-nataony an-idina tamin’ny tavin-drano. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary ny tavin-drano dia nipetraka tambonin’ny sarin’omby roa ambin’ny folo; ny telo nanatrika ny avaratra, ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ary ny tavin-drano lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' dia teo ambonin’ireo, ary niady vody izy rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ny hateviny dia vodivoam-pelatanana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin’ny lilia; ary nahalany roa arivo bata izy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nanao ny fitoeran-tavin-drano varahina folo izy: efatra hakiho ny lavan’ny anankiray, ary efatra hakiho koa ny sakany, ary telo hakiho ny hahavony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary toy izao ny asa amin’ireo fitoeran-tavin-drano ireo: nisy kobany izy, ary ireo kobany ireo dia teo anatin’ny sisiny; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ary tamin’ny kobany izay nohodidinin’ny sisiny dia nisy sarin-diona sy omby ary kerobima; ary teo ambonin’ny sisiny koa nisy faladiany; ary teo ambanin’ny sarin-diona sy omby nisy fesitona mihantona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ireo efi-trano teo ambonin’ny andry notafoany hazo sedera; ary ny isany dia dimy ambin’ny folo isan-andalana, ka dimy amby efa-polo izy rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary isan’ireo fitoeran-tavin-drano ireo nisy kodia varahina efatra sy tanan-kodia varahina, ary ny tongony efatra nisy sorony; teo ambanin’ny tavin-drano no nisy ny sorony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary ny tongony efatra dia tonga sorony.
      marker-yv: yv-n
    - type: text
      text: ' an-idina manandrify ny fesitona tsirairay. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny vavan’ny fitoeran-tavin-drano dia teo anatin’ny kapitaliny, ary mbola nisy iray hakiho teo ambonin’io; ary ny vavany dia hakiho iray sy tapany sady boribory tahaka ny amin’ny faladia, ary tamin’ny vavany koa nisy soratra, ary ny kobany teo aminy dia efa-joro, fa tsy boribory. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary ny kodia efatra dia teo ambanin’ny kobany; ary ny fihazonana ny tanan-kodia dia nikambana tamin’ny fitoeran-tavin-drano ihany; ary hakiho iray sy tapany ny hahavon’ny kodia. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary ny fomban’ny kodia dia tahaka ny amin’ny kodian-kalesy: ny tànany sy ny boriboriny manodidina azy sy ny tanamasoandrony ary ny foitrany dia nataony an-idina avokoa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary nisy sorony efatra tamin’ny zorony efatra amin’ny fitoeran-tavin-drano iray, sady nitranga avy teo amin’ny fitoeran-tavin-drano ireo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary teo an-tampon’ny fitoeran-tavin-drano dia nisy boribory manodidina, irain-jehy ny hahavony; ary teo an-tampon’ny fitoeran-tavin-drano koa ny fitombenany sy ny kobany dia natao an-idina iray aminy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa ny koban’ny sorony sy ny kobany hafa nosoratany nasiany sarin’ny kerobima sy liona ary hazo rofia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: palma.
      marker-yv: yv-n
    - type: text
      text: ' araka izay nahafeno azy avy, sady nasiany fesitona manodidina. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tahaka izany no nanaovany ny fitoeran-tavin-drano folo: samy natao an-idina avokoa, ary nitovy halehibe sy nitovy tarehy izy.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ary nanao tavin-drano varahina folo koa izy; ny tavin-drano samy nahalany efa-polo bata avy; ary samy efatra hakiho avy ny tavin-drano; ary tavin-drano iray avy no tamin’ny fitoerany folo.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ary nametraka ny fitoeran-tavin-drano dimy teo ankavanan’ny trano izy, ary ny dimy teo ankavian’ny trano, ary ilay tavin-drano lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' nataony teo ankavanan’ny trano, dia teo atsimo-atsinanana.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny rairainy dia telo andalana, ary ny varavarankely dia nifanandrify intelo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary Hirama nanao ny tavin-drano sy ny sotron’afo ary ny lovia famafazana; ka dia vitan’i Hirama ny asa rehetra izay nataony ho an’i Solomona mpanjaka ho amin’ny tranon’i Jehovah: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'dia ny andry roa sy ny boriboriny roa amin’ny kapitaly izay teny an-tampon’ny andry roa, sy ny harato roa izay hafono ny boriboriny roa amin’ny kapitaly izay teo an-tampon’ny andry avy, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'ary ny sarin’ampongabendanitra efa-jato ho amin’ny harato roa, ampongabendanitra roa andalana ho amin’ny harato iray hafono ny boriboriny roa amin’ny kapitaly izay teny an-tampon’ny andry avy, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'ary ny fitoeran-tavin-drano folo sy ny tavin-drano folo ho eo ambonin’ny fitoerany, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ary ny tavin-drano lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' iray sy ny sarin’omby roa ambin’ny folo teo ambaniny, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'ary ny vilany fandraofan-davenona sy ny sotron’afo ary ny lovia famafazana. Ary ireo fanaka rehetra ireo, izay nataon’i Hirama ho an’i Solomona mpanjaka ho amin’ny tranon’i Jehovah, dia varahina manganohano avokoa. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Teo amin’ny tany amoron’i Jordana no nanaovan’ny mpanjaka an-idina azy tamin’ny tanimanga teo anelanelan’i Sokota sy Zaretana. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Ary tsy nolanjain’i Solomona ny fanaka rehetra, satria be loatra izy; ary tsy nozahana izay lanjan’ny varahina.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ary Solomona nanao ny fanaka rehetra izay ao amin’ny tranon’i Jehovah: ny alitara volamena sy ny latabatra volamena, izay fitoeran’ny mofo aseho, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'ary ny fanaovan-jiro, dimy amin’ny ankavanana ary dimy amin’ny ankavia, teo anoloan’ny efitra anatiny, dia samy volamena tsara; ary ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia volamena koa; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny varavarana rehetra sy ny tolana dia natao efa-joro; ary ny varavarankely nifanandrify intelo. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: ary ny vilia sy ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia volamena tsara; ary ny vavin-tsavily ho amin’ny lela-varavaran’ny efitra anatiny, dia ny fitoerana masina indrindra, sy ho amin’ny lela-varavaran’ny efi-trano lehibe dia volamena avokoa.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Toy izany no nahavitana ny asa nataon’i Solomona mpanjaka ho amin’ny tranon’i Jehovah; ary nampidirin’i Solomona ny zavatra izay efa nohamasinin’i Davida rainy, dia ny volafotsy sy ny volamena ary ny fanaka, ka nataony tao amin’ny rakitry ny tranon’i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary dia nataony koa ny lavarangana maro andry; dimam-polo hakiho ny lavany, ary telo-polo hakiho ny sakany; nisy koa ny lavarangana fidirana teo anoloany; ary nisy andry sy tokonana koa teo anoloan’io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary nataony koa ny lavarangana hitoeran’ny seza fiandrianana izay hitsarany, dia ny lavarangana fitsarana; ary nataony hazo sedera avokoa ny gorodona rehetra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na ny gorodony, na ny rihany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny tranony izay nitoerany teo amin’ny kianja hafa tao anatinatiny kokoa noho ny lavarangana fidirana dia nitovy rafitra tamin’io koa. Ary Solomona nanao trano tahaka izany lavarangana fidirana izany koa ho an’ny zanakavavin’i Farao, izay efa nampakariny ho vady.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izany rehetra izany dia vato tsara avokoa voapaika araka ny marika, sady voatsofa ny atiny sy ny ivelany, hatramin’ny fanambaniny ka hatramin’ny tongolany, ary teo ivelany koa hatramin’ny kianja lehibe. '
