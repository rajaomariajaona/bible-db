document_id: 1SA.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanendrena an’i Saoly ho mpanjakan’ny Isiraely.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nisy lehilahy avy amin’ny Benjamina, atao hoe Kisy, zanak’i Abiela, zanak’i Zerora, zanak’i Bekorata, zanak’i Afia, Benjamita izy sy mpanjatobe. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Saoly tamin’ny mpanompony: Tsara izany, fa andeha isika hankany. Dia lasa izy roa lahy nankany amin’ny tanàna nitoeran’ilay lehilahin’Andriamanitra.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola niakatra teo amin’ny fiakarana ho any an-tanàna izy roa lahy, dia nahita zazavavy mivoaka hantsaka, ka hoy izy taminy: Ao ihany va ny mpahita? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly azy ireo ka nanao hoe: Ao ihany izy; indro ao alohanao ao izy; mandehana faingana, fa efa tonga ao an-tanàna izy izao, satria misy fanatitra hataon’ny vahoaka ao amin’ny fitoerana avo anio; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary raha vao miditra ao an-tanàna hianareo, dia ho hitanareo izy, raha tsy mbola miakatra hihinana ao amin’ny fitoerana avo, fa tsy hihinana ny vahoaka mandra-pahatongany, fa izy no manao fisaorana amin’ny fanatitra, ary rehefa afaka izany, dia vao mihinana izay nasaina; koa miakara hianareo ankehitriny, fa amin’izao no hahitanareo azy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra tao an-tanàna izy roa lahy; ary nony tonga tao izy, dia, indro, Samoela nivoaka niakatra ho any amin’ny fitoerana avo ka nifanena taminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah efa nanambara tamin’i Samoela omalin’ny andro nahatongavan’i Saoly ka nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rahampitso toy izao dia hampandehaniko ho atỳ aminao ny lehilahy anankiray avy amin’ny tanin’ny Benjamina, ary hohosoranao ho mpanapaka ny Isiraely oloko izy ka hamonjy azy amin’ny tànan’ny Filistina, fa efa nijery ny oloko Aho, satria efa mby etỳ amiko ny fitarainany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hitan’i Samoela Saoly, dia hoy Jehovah taminy:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jehovah namaly azy hoe.
      marker-yv: yv-n
    - type: text
      text: ' Indro ny lehilahy voalazako taminao; io no hanjaka amin’ny oloko.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly dia nanatona an’i Samoela teo am-bavahady ka nanao hoe: Masìna hianao, atoroy ahy ny tranon’ny mpahita. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Samoela dia namaly an’i Saoly hoe: Izaho no mpahita; miakara eo alohako ho any amin’ny fitoerana avo; fa hiara-mihinana amiko hianareo anio, ary raha maraina dia halefako handeha hianao ka holazaiko aminao izay rehetra ao am-ponao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanan-janakalahy atao hoe Saoly izy, izay mbola tanora sady tsara tarehy, ka tsy nisy tsara tarehy noho izy teo amin’ny Zanak’Isiraely, ary nanan-tombo noho ny olona rehetra hatramin’ny sorony no ho miakatra ny halavany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza malahelo ny amin’ny borikinao izay efa very hateloana, fa efa hita ireny; ary ho an’iza ny zavatra irina rehetra eo amin’ny Isiraely? Tsy ho anao sy ny ankohonan-drainao va?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Saoly ka nanao hoe: Tsy Benjamita va aho, avy amin’ilay kely indrindra amin’ny firenen’Isiraely? ary tsy kely indrindra va ny mpianakaviko eo amin’ny mpianakavin’ny firenen’i Benjamina rehetra? ka nahoana no miteny amiko toy izany hianao?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Samoela dia nitondra an’i Saoly sy ny zatovony ka nampiditra azy tao amin’ny efi-trano, dia nanome azy toerana aloha teo amin’izay nasaina; ary tokony ho olona telo-polo ireo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Samoela tamin’ny mpanao nahandro: Ento ilay anjara nomeko anao, izay efa nolazaiko taminao hoe. Tehirizo ity. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nalain’ny mpanao nahandro ny soro-kena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fe.
      marker-yv: yv-n
    - type: text
      text: ' mbamin’ny eo aminy ka napetrany teo anoloan’i Saoly, ary hoy Samoela: Indro, izay efa natokana dia voapetraka eto anoloanao, koa hano; fa ho amin’izao fotoana izao no nitehirizana izany ho anao hatramin’izay nanaovako hoe: Efa nanasa ny vahoaka aho. Ary Saoly dia niara-nihinana tamin’i Samoela androtrizay.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy roa lahy nidina avy tao amin’ny fitoerana avo hankany an-tanàna, ary dia niresaka tamin’i Saoly teo an-tampon-trano Samoela. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifoha maraina koa izy ireo; ary nony nazavaratsy ny andro, dia niantso an’i Saoly teo an-tampon-trano Samoela ka nanao hoe: Mitsangàna hianao mba havoakako. Dia nitsangana Saoly, ka lasa nivoaka ho any ala-trano izy roa lahy, dia izy sy Samoela. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nidina teo amin’ny faran’ny tanàna izy, dia hoy Samoela tamin’i Saoly: Ampandehano eo alohantsika ny zatovo (dia lasa nandeha izy), fa mijanòna kely hianao hilazako ny tenin’Andriamanitra.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary very ny borikivavin’i Kisy, rain’i Saoly. Dia hoy Kisy tamin’i Saoly zanany: Mitondrà zatovo anankiray hanaraka anao, dia miaingà, ka mandehana hitady ny boriky. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha namaky ny tany havoan’i Efraima izy ka namaky ny tany Salisa, fa tsy nahita azy; dia nandeha namaky ny tany Salima indray izy, nefa tsy tany ireny; dia nandeha namaky ny tanin’ny Benjamina izy, fa mbola tsy nahita azy ihany indray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga teo amin’ny tany Zofa izy, dia hoy Saoly tamin’ny zatovony nanaraka azy: Andeha isika hiverina, fandrao isika indray no ahin’ikaky, fa tsy ny boriky intsony.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanompony taminy: Indro, misy lehilahin’Andriamanitra amin’iroa tanàna iroa, ary lehilahy malaza izy, fa izay rehetra lazainy dia tanteraka tokoa; koa andeha isika hankany, fa angamba hatorony antsika izay làlana tokony halehantsika.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Saoly tamin’ny zatovony: indro, raha mankany isika, inona moa no haterintsika ho an-dralehilahy? fa efa lany ny mofo rehetra tao amin’ny fitondrantsika, ary tsy misy zavatra haterintsika ho an’ny lehilahin’Andriamanitra; ka inona moa no atỳ amintsika? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Saoly indray ilay zatovo ka nanao hoe: Indro, atỳ an-tànako misy vola ampahefatry ny sekely; koa homeko ny lehilahin’Andriamanitra izany, mba hanoroany antsika izay làlana tokony halehantsika. ('
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahiny teo amin’ny Isiraely, raha nisy olona nandeha hanontany amin’Andriamanitra, dia izao no fanaony: Andeha, aoka hankany amin’ny mpahita isika; fa izay atao hoe mpaminany’ ankehitriny no natao hoe ,mpahita’ tany aloha.) '
