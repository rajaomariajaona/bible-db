document_id: PSA.63,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hetahetan’ny fanahy maniry an’Andriamanitra.
  - type: text
    content: Salamo nataon’i Davida, fony tany an-efitr’i Joda izy.
  - type: text
    content: ANDRIAMANITRA ô, Andriamanitro Hianao;
  - type: text
    content: Mitady Anao fatratra aho;
  - type: text
    content: Mangetaheta Anao ny fanahiko, maniry Anao ny nofoko
  - type: text
    content: Eto amin’ny tany maina sy mangentana tsy misy rano;
  '10':
  - type: text
    content: Hatolotra ho amin’ny herin’ny sabatra izy;
  - type: text
    content: Ho anjaran’ny amboahaolo
  - type: note
    content: volpa.
  - type: text
    content: ' izy.'
  '11':
  - type: text
    content: Fa ny mpanjaka hifaly amin’Andriamanitra;
  - type: text
    content: Ho ravoravo izay rehetra mianiana aminy;
  - type: text
    content: Fa hakombona ny vavan’izay rehetra mandainga.
  '2':
  - type: text
    content: Toy izany no nijereko Anao tao amin’ny fitoerana masina,
  - type: text
    content: Hahitako ny herinao sy ny voninahitrao.
  '3':
  - type: text
    content: Fa tsara noho ny aina ny famindramponao;
  - type: text
    content: Ny molotro hidera Anao.
  '4':
  - type: text
    content: Toy izany no hisaorako Anao, raha mbola velona koa aho;
  - type: text
    content: Amin’ny anaranao no hanandratako ny tànako.
  '5':
  - type: text
    content: Toy ny voky tsoka sy tavy no hahavokisan’ny fanahiko;
  - type: text
    content: Ary amin’ny molotra falifaly no hideran’ny vavako Anao.
  '6':
  - type: text
    content: Raha mahatsiaro Anao eo am-pandriako aho,
  - type: text
    content: Dia mieritreritra Anao amin’ny fiambenan-alina.
  '7':
  - type: text
    content: Fa efa namonjy ahy Hianao,
  - type: text
    content: Ary ao ambanin’ny aloky ny elatrao no hihobiako.
  '8':
  - type: text
    content: Mifikitra aminao ny fanahiko;
  - type: text
    content: Manohana ahy ny tànanao ankavanana.
  '9':
  - type: text
    content: Fa ireny dia mitady ny aiko ka mampidi-doza amin’ny tenany;
  - type: text
    content: Hiditra any ambanin’ny tany izy;
