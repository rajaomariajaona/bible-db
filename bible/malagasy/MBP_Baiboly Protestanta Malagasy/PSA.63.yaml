document_id: PSA.63
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hetahetan’ny fanahy maniry an’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida, fony tany an-efitr’i Joda izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, Andriamanitro Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitady Anao fatratra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangetaheta Anao ny fanahiko, maniry Anao ny nofoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eto amin’ny tany maina sy mangentana tsy misy rano;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy izany no nijereko Anao tao amin’ny fitoerana masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahitako ny herinao sy ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsara noho ny aina ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny molotro hidera Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toy izany no hisaorako Anao, raha mbola velona koa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny anaranao no hanandratako ny tànako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny voky tsoka sy tavy no hahavokisan’ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny molotra falifaly no hideran’ny vavako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha mahatsiaro Anao eo am-pandriako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mieritreritra Anao amin’ny fiambenan-alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa namonjy ahy Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao ambanin’ny aloky ny elatrao no hihobiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mifikitra aminao ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manohana ahy ny tànanao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ireny dia mitady ny aiko ka mampidi-doza amin’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiditra any ambanin’ny tany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hatolotra ho amin’ny herin’ny sabatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho anjaran’ny amboahaolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: volpa.
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny mpanjaka hifaly amin’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ravoravo izay rehetra mianiana aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hakombona ny vavan’izay rehetra mandainga.
