document_id: 2PE.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hahafantarana ny mpampianatra sandoka, sy faminaniana ny handringanana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FA nisy mpaminany sandoka teo amin’ny olona Isiraely, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hahatonga mangingina sain-diso
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitokoana.
    marker-yv: yv-n
  - type: text
    text: ' mahavery ary handa ny Tompo Izay nividy azy aza ka hahatonga fahaverezana tampoka ho amin’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary maro no hanaraka ny fijejojejoany; ka ireny no hitenenan-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hanaovana blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny làlan’ny fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary amin’ny hafatratry ny fitiavany harena no hanaovany varotra anareo amin’ny teny mamitaka; efa ela izay no tsy nijanonjanona ny fitsarana ireny, ary tsy rendremana ny fahaverezany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha tsy navelan’Andriamanitra ny anjely fony nanota, fa noroahiny ho any amin’ny helo ka natolony ho ao an-davaka maizina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[nafatony tamin’ny gadra fahamaizinana].'
    marker-yv: yv-n
  - type: text
    text: ' mba hotehirizina ho amin’ny fitsarana,– '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary raha tsy namela izao rehetra izao taloha Izy, fa namonjy an’i Noa, mpitory ny fahamarinana, sy ireo fito, fony nahatonga ny Safodrano tamin’ny ratsy fanahy teo amin’izao tontolo izao,– '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony fananarana ho an’izay ratsy fanahy ato aoriana,– '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa Lota marina, izay ory dia ory noho ny fijejojejoan’ny olona ratsy fanahy, no novonjeny ho afaka (
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa izany lehilahy marina izany, raha nitoetra teo aminy, dia nahory loatra ny fanahiny marina isan-andro isan-andro noho ny nahitany sy ny nandrenesany ny fandikan’ireo ny lalàna): '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia fantatry ny Tompo izay hamonjeny ny tsara fanahy amin’ny fakam-panahy sy ny hitehirizany ny olona tsy marina amin’ny fijaliana ho amin’ny andro fitsarana,– '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'indrindra fa izay mandeha araka ny fitarihan’ny nofo hila zava-mahaloto ka manamavo ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: manana
  - type: text
    text: ' fahalehibiazana.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ireo dia olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: manana
  - type: text
    text: ' voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny anjely aza, izay mihoatra amin’ny tanjaka sy ny hery, tsy mitondra fiampangana hitenenan-dratsy azy eo anatrehan’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ireo kosa izay miteny ratsy ny zavatra tsy fantany (tahaka ny biby tsy manan-tsaina, fa zava-manan-aina fotsiny ihany, izay teraka ho fisambotra sy ho famono) dia haringana tokoa amin’ny fahalotoany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary hiharan’ny ratsy ho valin’ny faharatsiany izy. Ataony ho zava-mahafinaritra ny velona vetivety amin’ny fy, ka be pentimpentina sy tsiny izy sady velona amin’ny fy eo amin’ny fanasam-pifankatiavany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[amin’ny famitahany].'
    marker-yv: yv-n
  - type: text
    text: ' raha miara-mihinana aminareo, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'manana maso feno fijangajangana, izay tsy mety mitsahatra amin’ny fahotana: dia mamitaka ny tsy miorina tsara izy; ary mampahazatra ny fony amin’ny hafatratry ny fitiavany harena, dia zanaky ny fanozonana izy; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: efa niala tamin’ny làlana mahitsy izy ka nivily nanaraka ny làlan’i Balama, zanak’i Beora,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Bosora].'
    marker-yv: yv-n
  - type: text
    text: ' izay tia ny tambin’ny tsifahamarinana, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nefa voanatra izy noho ny fahotany: ny boriky moana dia nanao feon’olona ka nisakana ny hadalan’ilay mpaminany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireo dia loharano ritra, zavona entin’ny tafio-drivotra, ka efa tehirizina ho azy ny fahamaintisan’ny maizina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa mandoka fatratra ny zava-poana ireo, ka ny filan’ny nofo, dia ny fijejojejoana, no entiny mamitaka ny olona izay saiky afaka tsy ho naman’ny velona eo amin’ny fahadisoana intsony;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Satria velona amin’ny filan ny’ nofo ireo, dia ny fandokafany fatratra ny zava-poana no entiny mitaona ny olona izay saiky afaka tsy ho naman’ny velona eo amin’ny fahadisoana intsony ho amin’ny fijejojejoana.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon’ny fahalotoana; fa izay maharesy ny olona dia mahandevo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha misy efa afaka amin’ny fahalotoan’izao tontolo izao noho ny fahalalana tsara an’i Jesosy Kristy, Tompo sy Mpamonjy, nefa voasingotr’izany indray ka resy, ny farany dia ratsy noho ny voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa tsara aminy raha tsy nahalala ny làlan’ny fahamarinana toy izay hiala amin’ny didy masina natolotra azy, rehefa nahalala izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa mihatra aminy ny ohabolana marina hoe: ,,Ny amboa miverina indray amin’ny loany’’ (Oha. 26.11), ary: Ny kisoavavy efa nisasa dia mihosim-potaka indray.'
