document_id: 2PE.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hahafantarana ny mpampianatra sandoka, sy faminaniana ny handringanana azy.
  - type: text
    content: FA nisy mpaminany sandoka teo amin’ny olona Isiraely, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hahatonga mangingina sain-diso
  - type: note
    content: 'Na: fitokoana.'
  - type: text
    content: ' mahavery ary handa ny Tompo Izay nividy azy aza ka hahatonga fahaverezana tampoka ho amin’ny tenany. '
  '10':
  - type: text
    content: 'indrindra fa izay mandeha araka ny fitarihan’ny nofo hila zava-mahaloto ka manamavo ny '
  - type: text
    content: manana
  - type: text
    content: ' fahalehibiazana.'
  - type: text
    content: 'Ireo dia olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny '
  - type: text
    content: manana
  - type: text
    content: ' voninahitra. '
  '11':
  - type: text
    content: 'Fa ny anjely aza, izay mihoatra amin’ny tanjaka sy ny hery, tsy mitondra fiampangana hitenenan-dratsy azy eo anatrehan’ny Tompo. '
  '12':
  - type: text
    content: 'Fa ireo kosa izay miteny ratsy ny zavatra tsy fantany (tahaka ny biby tsy manan-tsaina, fa zava-manan-aina fotsiny ihany, izay teraka ho fisambotra sy ho famono) dia haringana tokoa amin’ny fahalotoany, '
  '13':
  - type: text
    content: ary hiharan’ny ratsy ho valin’ny faharatsiany izy. Ataony ho zava-mahafinaritra ny velona vetivety amin’ny fy, ka be pentimpentina sy tsiny izy sady velona amin’ny fy eo amin’ny fanasam-pifankatiavany,
  - type: note
    content: 'Na: [amin’ny famitahany].'
  - type: text
    content: ' raha miara-mihinana aminareo, '
  '14':
  - type: text
    content: 'manana maso feno fijangajangana, izay tsy mety mitsahatra amin’ny fahotana: dia mamitaka ny tsy miorina tsara izy; ary mampahazatra ny fony amin’ny hafatratry ny fitiavany harena, dia zanaky ny fanozonana izy; '
  '15':
  - type: text
    content: efa niala tamin’ny làlana mahitsy izy ka nivily nanaraka ny làlan’i Balama, zanak’i Beora,
  - type: note
    content: 'Na: [Bosora].'
  - type: text
    content: ' izay tia ny tambin’ny tsifahamarinana, '
  '16':
  - type: text
    content: 'nefa voanatra izy noho ny fahotany: ny boriky moana dia nanao feon’olona ka nisakana ny hadalan’ilay mpaminany.'
  '17':
  - type: text
    content: 'Ireo dia loharano ritra, zavona entin’ny tafio-drivotra, ka efa tehirizina ho azy ny fahamaintisan’ny maizina. '
  '18':
  - type: text
    content: Fa mandoka fatratra ny zava-poana ireo, ka ny filan’ny nofo, dia ny fijejojejoana, no entiny mamitaka ny olona izay saiky afaka tsy ho naman’ny velona eo amin’ny fahadisoana intsony;
  - type: note
    content: 'Na: Satria velona amin’ny filan ny’ nofo ireo, dia ny fandokafany fatratra ny zava-poana no entiny mitaona ny olona izay saiky afaka tsy ho naman’ny velona eo amin’ny fahadisoana intsony ho amin’ny fijejojejoana.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon’ny fahalotoana; fa izay maharesy ny olona dia mahandevo azy.
  '2':
  - type: text
    content: Ary maro no hanaraka ny fijejojejoany; ka ireny no hitenenan-dratsy
  - type: note
    content: Gr. hanaovana blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny làlan’ny fahamarinana. '
  '20':
  - type: text
    content: 'Fa raha misy efa afaka amin’ny fahalotoan’izao tontolo izao noho ny fahalalana tsara an’i Jesosy Kristy, Tompo sy Mpamonjy, nefa voasingotr’izany indray ka resy, ny farany dia ratsy noho ny voalohany. '
  '21':
  - type: text
    content: 'Fa tsara aminy raha tsy nahalala ny làlan’ny fahamarinana toy izay hiala amin’ny didy masina natolotra azy, rehefa nahalala izany izy. '
  '22':
  - type: text
    content: 'Efa mihatra aminy ny ohabolana marina hoe: ,,Ny amboa miverina indray amin’ny loany’’ (Oha. 26.11), ary: Ny kisoavavy efa nisasa dia mihosim-potaka indray.'
  '3':
  - type: text
    content: Ary amin’ny hafatratry ny fitiavany harena no hanaovany varotra anareo amin’ny teny mamitaka; efa ela izay no tsy nijanonjanona ny fitsarana ireny, ary tsy rendremana ny fahaverezany.
  '4':
  - type: text
    content: Fa raha tsy navelan’Andriamanitra ny anjely fony nanota, fa noroahiny ho any amin’ny helo ka natolony ho ao an-davaka maizina
  - type: note
    content: 'Na: [nafatony tamin’ny gadra fahamaizinana].'
  - type: text
    content: ' mba hotehirizina ho amin’ny fitsarana,– '
  '5':
  - type: text
    content: 'ary raha tsy namela izao rehetra izao taloha Izy, fa namonjy an’i Noa, mpitory ny fahamarinana, sy ireo fito, fony nahatonga ny Safodrano tamin’ny ratsy fanahy teo amin’izao tontolo izao,– '
  '6':
  - type: text
    content: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony fananarana ho an’izay ratsy fanahy ato aoriana,– '
  '7':
  - type: text
    content: fa Lota marina, izay ory dia ory noho ny fijejojejoan’ny olona ratsy fanahy, no novonjeny ho afaka (
  '8':
  - type: text
    content: 'fa izany lehilahy marina izany, raha nitoetra teo aminy, dia nahory loatra ny fanahiny marina isan-andro isan-andro noho ny nahitany sy ny nandrenesany ny fandikan’ireo ny lalàna): '
  '9':
  - type: text
    content: 'dia fantatry ny Tompo izay hamonjeny ny tsara fanahy amin’ny fakam-panahy sy ny hitehirizany ny olona tsy marina amin’ny fijaliana ho amin’ny andro fitsarana,– '
