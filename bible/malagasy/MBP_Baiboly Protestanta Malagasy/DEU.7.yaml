document_id: DEU.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny handringanana ny Kananita.
  - type: text
    content: 'REHEFA entin’i Jehovah Andriamanitrao hianao ka tafiditra any amin’ny tany izay efa hidiranao holovana, ary firenena maro no voaroakany hiala eo anoloanao, dia ny Hetita sy ny Girgasita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita, dia firenena fito izay lehibe sy mahery noho hianao. '
  '10':
  - type: text
    content: 'ary mamaly miharihary izay mandrafy Azy amin’ny fandringanana azy; tsy hitaredretra Izy ny amin’izay mandrafy Azy, fa hamaly azy miharihary. '
  '11':
  - type: text
    content: Koa tandremo ny lalàna sy ny didy ary ny fitsipika, izay andidiako anao anio, ka araho izy.
  '12':
  - type: text
    content: 'Ary raha mihaino ireo fitsipika ireo hianareo ka mitandrina sy manaraka azy, dia hotanterahin’i Jehovah Andriamanitrao aminao ny fanekena sy ny famindrampo, izay nianianany tamin’ny razanao; '
  '13':
  - type: text
    content: 'dia ho tia anao sy hitahy anao ary hahamaro anao Izy; ary Izy hitahy ny ateraky ny kibonao sy ny vokatry ny taninao, dia ny varinao sy ny ranom-boalobokao sy ny diloilonao, ary ny ateraky ny ombinao sy ny ateraky ny ondry aman-osinao any amin’ny tany izay nianianany tamin’ny razanao homena anao. '
  '14':
  - type: text
    content: 'Hotahina hianao mihoatra noho ny firenena rehetra; tsy hisy lahy na vavy tsy hiteraka, na hianareo na ny biby fiompinareo. '
  '15':
  - type: text
    content: Ary harovan’i Jehovah tsy ho azon’aretina hianao, ka tsy hisy hameliny anao ny aretin-dratsin’i Egypta, izay fantatrao; fa hataony amin’izay rehetra mankahala anao kosa ireny.
  '16':
  - type: text
    content: Ary aoka holaninao ny firenena rehetra, izay hatolotr’i Jehovah Andriamanitrao anao, ka aoka tsy hiantra azy ny masonao; ary aza manompo ny andriamaniny, fa ho fandrika aminao ireny.
  '17':
  - type: text
    content: 'Raha hianao hanao anakampo hoe: Maro noho izaho ireo firenena ireo, ka hataoko ahoana no fahay mandroaka azy? '
  '18':
  - type: text
    content: 'Dia aza matahotra azy hianao; fa tsarovy tsara izay nataon’i Jehovah Andriamanitrao tamin’i Farao sy ny Egyptiana rehetra, '
  '19':
  - type: text
    content: dia ny fizahan-toetra lehibe, izay efa hitan’ny masonao, sy ny famantarana sy ny fahagagana sy ny tànana mahery ary ny sandry nahinjitra, izay nitondran’i Jehovah Andriamanitrao anao nivoaka; fa toy izany no hataon’i Jehovah Andriamanitrao amin’ny firenena rehetra izay atahoranao.
  '2':
  - type: text
    content: 'ary rehefa voatolotr’i Jehovah Andriamanitrao eo anoloanao ireny ka resinao: dia aringano'
  - type: note
    content: Heb. ataovy herema.
  - type: text
    content: ' mihitsy izy; aza manao fanekena aminy, na mamindra fo aminy; '
  '20':
  - type: text
    content: 'Ary ny fanenitra koa dia hampandehanin’i Jehovah Andriamanitrao ho eo aminy mandra-paharingan’izay sisa sy izay efa niery ka tsy hitanao. '
  '21':
  - type: text
    content: 'Aza matahotra azy hianao; fa Jehovah Andriamanitrao no eo aminao, dia Andriamanitra lehibe sy mahatahotra. '
  '22':
  - type: text
    content: 'Ary horoahin’i Jehovah Andriamanitrao eo alohanao tsikelikely ireny firenena ireny; tsy haharoaka azy faingana hianao, fandrao hihamaro ny bibi-dia ka hamely anao. '
  '23':
  - type: text
    content: 'Fa hatolotr’i Jehovah Andriamanitrao eo anoloanao izy ka hataony mifanaritaka be ihany mandra-pahalany ritrany. '
  '24':
  - type: text
    content: Dia hatolony eo an-tànanao tsy ho re intsony atỳ ambanin’ny lanitra ny anarany; tsy hisy olona hahajanona eo anoloanao, fa haringanao avokoa izy mandra-pahalaniny.
  '25':
  - type: text
    content: 'Ny sarin-javatra voasokitra, izay andriamaniny, dia hodoranareo amin’ny afo; aza mitsiriritra ny volafotsy na ny volamena izay eo aminy, na maka izany ho anao, fandrao ho voafandriny hianao, fa fahavetavetana eo imason’i Jehovah Andriamanitrao izany. '
  '26':
  - type: text
    content: Ary aza mitondra fahavetavetana ho ao an-tranonao, fandrao ho voaozona
  - type: note
    content: Heb. herema.
  - type: text
    content: ' tahaka izany koa hianao; ho halanao sy ho fahavetavetana eo imasonao indrindra izany, fa zavatra voaozona.'
  - type: note
    content: Heb. herema.
  '3':
  - type: text
    content: 'ary aza mifanambady anaka aminy: ny zanakao-vavy tsy homenao ho vadin’ny zanani-lahy, ary ny zanani-vavy tsy halainao ho vadin’ny zanakao-lahy. '
  '4':
  - type: text
    content: 'Fa hampiala ny zanakao-lahy amin’ny fanarahana Ahy izy mba hanompoany andriamani-kafa, dia hirehitra aminareo ny fahatezeran’i Jehovah, ka handringana anao vetivety Izy. '
  '5':
  - type: text
    content: 'Fa izao kosa no ataovinareo aminy: ny alitarany horavanao, ary ny tsangam-baton-tsampiny hovakivakinao; ny Aserahany'
  - type: note
    content: Anaran’andriamni-tsi-izy, na ny sariny.
  - type: text
    content: ' hokapainao, ary ny sarin-javatra voasokitra hodoranao amin’ny afo.'
  '6':
  - type: text
    content: 'Fa firenena masina ho an’i Jehovah Andriamanitrao hianao; fa hianao efa nofidin’i Jehovah Andriamanitrao ho firenena rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin’ny tany. '
  '7':
  - type: text
    content: 'Tsy ny hamaroanareo noho ny firenena rehetra anefa no niraiketan’ny fitiavan’i Jehovah taminareo sy nifidianany anareo, fa hianareo dia vitsy noho ny firenena rehetra aza; '
  '8':
  - type: text
    content: fa ny nitiavan’i Jehovah anareo sy ny nitandremany ny fianianana izay efa nianianany tamin’ny razanareo no nitondran’i Jehovah anareo tamin’ny tànana mahery sy nanavotany anao tamin’ ny trano nahandevozana, dia tamin’ny tànan’i Farao, mpanjakan’i Egypta.
  '9':
  - type: text
    content: 'Koa aoka ho fantatrao fa Jehovah Andriamanitrao ihany no Andriamanitra, dia Andriamanitra mahatoky, Izay mitandrina fanekena sy famindrampo amin’izay tia Azy sy mitandrina ni didiny, hatramin’ny taranaka arivo mandimby, '
