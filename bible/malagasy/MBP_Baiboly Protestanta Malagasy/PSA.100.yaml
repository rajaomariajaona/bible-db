  - type: text
    text: Manompoa an’i Jehovah amin’ny fifaliana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankanesa eo anatrehany amin’ny fihobiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka ho fantatrareo fa Jehovah no Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no nanao antsika, ary Azy isika,
  - type: usfm
    marker: f
    children:
