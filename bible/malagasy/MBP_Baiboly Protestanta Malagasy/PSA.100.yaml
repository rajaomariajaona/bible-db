document_id: PSA.100,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiantsoana izao tontolo izao hanompo an’i Jehovah.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo ho fiderana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIHOBIA ho an’i Jehovah, ry tany rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manompoa an’i Jehovah amin’ny fifaliana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankanesa eo anatrehany amin’ny fihobiana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fantatrareo fa Jehovah no Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nanao antsika, ary Azy isika,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '100.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa tsy isika.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia olony sy ondry fiandriny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midira eo amin’ny vavahadiny amin’ny fisaorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eo an-kianjany amin’ny fiderana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora Azy, mankalazà ny anarany,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsara Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrakizay ny famindrampony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihatra amin’ny taranaka fara mandimby ny fahamarinany.
