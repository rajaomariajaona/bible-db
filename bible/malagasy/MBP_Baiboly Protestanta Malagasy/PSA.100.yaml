      marker: fr
      children:
      - type: text
        text: '100.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa tsy isika.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia olony sy ondry fiandriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Midira eo amin’ny vavahadiny amin’ny fisaorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo an-kianjany amin’ny fiderana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaora Azy, mankalazà ny anarany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsara Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihatra amin’ny taranaka fara mandimby ny fahamarinany.
