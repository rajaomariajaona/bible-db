document_id: PSA.100,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao tontolo izao hanompo an’i Jehovah.
  - type: text
    content: Salamo ho fiderana.
  - type: text
    content: MIHOBIA ho an’i Jehovah, ry tany rehetra.
  '2':
  - type: text
    content: Manompoa an’i Jehovah amin’ny fifaliana;
  - type: text
    content: Mankanesa eo anatrehany amin’ny fihobiana.
  '3':
  - type: text
    content: Aoka ho fantatrareo fa Jehovah no Andriamanitra;
  - type: text
    content: Izy no nanao antsika, ary Azy isika,
  - type: note
    content: 'Na: fa tsy isika.'
  - type: text
    content: Dia olony sy ondry fiandriny.
  '4':
  - type: text
    content: Midira eo amin’ny vavahadiny amin’ny fisaorana,
  - type: text
    content: Ary eo an-kianjany amin’ny fiderana;
  - type: text
    content: Misaora Azy, mankalazà ny anarany,
  '5':
  - type: text
    content: Fa tsara Jehovah;
  - type: text
    content: Mandrakizay ny famindrampony,
  - type: text
    content: Ary mihatra amin’ny taranaka fara mandimby ny fahamarinany.
