document_id: JER.47
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny Filistina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’ny Filistina, fony Farao tsy mbola namely an’i Gaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, misy rano mizotra avy any avaratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho tonga ony maria
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manafotra ny tany mbamin’izay rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny tanàna mbamin’izay monina ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hitaraina ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hidradradradra ny mponina rehetra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho ny fikatrokatroky ny kitron’ny soavaliny matanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fikorodondrodon’ny kalesiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fikotrokotroky ny kodiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ray dia tsy miherika ny zanany, fa efa miraviravy tànana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho ny hihavian’ny andro handravana ny Filistina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handringanana izay sisa rehetra amin’ny mpamonjy an’i Tyro sy Sidona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa horavan’i Jehovah ny Filistina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny sisa avy any amin’ny nosy Kaftora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voaharatra Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mangina.
    marker-yv: yv-n
  - type: text
    text: ' Askelona mbamin’ny sisa amin’ny lohasahany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no mbola hitetika ny tenanao hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indrisy, ry sabatr’i Jehovah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no tsy hitsaharanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midira ao amin’ny tranonao ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsahara, ka mijanòna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hataony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hataonao.
    marker-yv: yv-n
  - type: text
    text: ' ahoana no fitsahatra.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no nandidy azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hamely an’i Askelona mbamin’ny eny amoron-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: No efa nanendreny azy.
