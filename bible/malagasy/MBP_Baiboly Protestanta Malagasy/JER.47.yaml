document_id: JER.47,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny Filistina.
  - type: text
    content: NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’ny Filistina, fony Farao tsy mbola namely an’i Gaza.
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, misy rano mizotra avy any avaratra
  - type: text
    content: Ka ho tonga ony maria
  - type: text
    content: Manafotra ny tany mbamin’izay rehetra ao aminy,
  - type: text
    content: Dia ny tanàna mbamin’izay monina ao aminy;
  - type: text
    content: Ka dia hitaraina ny olona,
  - type: text
    content: Ary hidradradradra ny mponina rehetra amin’ny tany.
  '3':
  - type: text
    content: Noho ny fikatrokatroky ny kitron’ny soavaliny matanjaka
  - type: text
    content: Sy ny fikorodondrodon’ny kalesiny
  - type: text
    content: Ary ny fikotrokotroky ny kodiany
  - type: text
    content: Ny ray dia tsy miherika ny zanany, fa efa miraviravy tànana,
  '4':
  - type: text
    content: Noho ny hihavian’ny andro handravana ny Filistina rehetra
  - type: text
    content: Sy handringanana izay sisa rehetra amin’ny mpamonjy an’i Tyro sy Sidona;
  - type: text
    content: Fa horavan’i Jehovah ny Filistina,
  - type: text
    content: Dia ny sisa avy any amin’ny nosy Kaftora.
  '5':
  - type: text
    content: Voaharatra Gaza,
  - type: text
    content: Ringana
  - type: note
    content: 'Na: Mangina.'
  - type: text
    content: ' Askelona mbamin’ny sisa amin’ny lohasahany;'
  - type: text
    content: Mandra-pahoviana no mbola hitetika ny tenanao hianao?
  '6':
  - type: text
    content: Indrisy, ry sabatr’i Jehovah!
  - type: text
    content: Mandra-pahoviana no tsy hitsaharanao?
  - type: text
    content: Midira ao amin’ny tranonao ihany;
  - type: text
    content: Mitsahara, ka mijanòna.
  '7':
  - type: text
    content: Hataony
  - type: note
    content: Heb. Hataonao.
  - type: text
    content: ' ahoana no fitsahatra.'
  - type: text
    content: Fa Jehovah no nandidy azy,
  - type: text
    content: Eny, hamely an’i Askelona mbamin’ny eny amoron-dranomasina
  - type: text
    content: No efa nanendreny azy.
