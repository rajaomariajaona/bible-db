document_id: 2SA.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namindrana ny fiaran’i Jehovah nankany Jerosalema.
  - type: text
    content: 'ARY novorin’i Davida indray ny lehilahy voafantina rehetra tamin’ny Isiraely, dia telo alina. '
  '10':
  - type: text
    content: 'Ary Davida dia tsy nety namindra ny fiaran’i Jehovah ho ao aminy ao an-Tanànan’i Davida; fa naviliny ho ao an-tranon’i Obed-edoma Gatita. '
  '11':
  - type: text
    content: Ary nipetraka telo volana tao an-tranon’i Obed-edoma Gatita ny fiaran’i Jehovah; ka dia notahin’i Jehovah Obed-edoma sy ny ankohonany rehetra.
  '12':
  - type: text
    content: 'Ary nambara tamin’i Davida mpanjaka hoe: Jehovah efa nitahy ny ankohonan’i Obed-edoma sy izay nananany rehetra noho ny fiaran’Andriamanitra. Dia nandeha Davida ka nampakatra ny fiaran’Andriamanitra tamim-pifaliana avy tao an-tranon’i Obed-edoma ho any an-Tanànan’i Davida. '
  '13':
  - type: text
    content: 'Ary rehefa namindra inenina ny mpitondra ny fiaran’i Jehovah, dia namono omby sy zanak’omby mifahy izy hatao fanatitra. '
  '14':
  - type: text
    content: 'Ary Davida nitsinjaka mafy dia mafy teo anatrehan’i Jehovah sady nisalotra efoda rongony fotsy. '
  '15':
  - type: text
    content: Ary Davida sy ny taranak’i Isiraely rehetra nampakatra ny fiaran’i Jehovah tamin’ny hoby sy ny feon’ny anjomara.
  '16':
  - type: text
    content: Ary nony tonga teo an-Tanànan’i Davida ny fiaran’i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin’i Saoly, ka nahita an’i Davida mpanjaka nibitaka sy nitsinjaka teo anatrehan’i Jehovah; ka dia nikizaka azy tao am-pony izy.
  '17':
  - type: text
    content: 'Ary nampiditra ny fiaran’i Jehovah ny olona ka nametraka azy teo amin’ny fitoerany tao amin’ny lay izay naorin’i Davida hitoerany; ary Davida nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan’i Jehovah. '
  '18':
  - type: text
    content: 'Ary nony voàtitr’i Davida ny fanatitra dorana sy ny fanati-pihavanana, dia nitso-drano ny vahoaka tamin’ny anaran’i Jehovah, Tompon’ny maro, izy. '
  '19':
  - type: text
    content: Dia nomeny mofo iray sy hena iray didy
  - type: note
    content: 'Na: divay eran’ny kapoaka.'
  - type: text
    content: ' ary ampempam-boaloboka iray avy ny olona rehetra, dia ny Isiraely rehetra, na lahy na vavy. Ary dia samy nody tany an-tranony avy ny olona rehetra.'
  '2':
  - type: text
    content: Dia niainga Davida sy ny olona rehetra izay nanaraka azy ka niala tany Bala-joda hampakatra ny fiaran’Andriamanitra izay niantsoana
  - type: note
    content: 'Na: izay nantsoina tamin’.'
  - type: text
    content: ' ny anaran’i Jehovah, Tompon’ny maro, Izay mipetraka amin’ny kerobima.'
  '20':
  - type: text
    content: 'Ary Davida koa mba nody hitso-drano ny ankohonany. Fa Mikala, zanakavavin’i Saoly, nivoaka hitsena an’i Davida ka nanao hoe: Akory ity voninahitry ny mpanjakan’ny Isiraely andro-any! ilay nanary lamba anikeheo teo imason’ny zanakavavin’ny mpanompony, tahaka ny adala manary lamba ka tsy manan-kenatra.'
  '21':
  - type: text
    content: 'Ary hoy kosa Davida tamin’i Mikala: Teo anatrehan’i Jehovah, Izay nifidy ahy noho ny rainao sy ny ankohonany rehetra ka nanendry ahy ho mpanapaka ny Isiraely, olon’i Jehovah,– eny, teo anatrehan’i Jehovah no nitsinjahako. '
  '22':
  - type: text
    content: 'Ary mbola hivazina kokoa noho izany aza aho, ka hataoko tsinontsinona ny tenako; nefa hiaraka hanam-boninahitra amin’ireo tovovavy nantsoinao ireo kosa aho. '
  '23':
  - type: text
    content: Ka dia tsy nanan-janaka intsony mandra-pahafatiny Mikala, zanakavavin’i Saoly.
  '3':
  - type: text
    content: Ary nataony teo amin’ny sariety vaovao ny fiaran’Andriamanitra ka nentiny avy tao an-tranon’i Abinadaba teo an-kavoana;
  - type: note
    content: 'Na: Gibea.'
  - type: text
    content: ' ary Oza sy Ahio, zanak’i Abinadaba, no nampandeha ny sariety vaovao. '
  '4':
  - type: text
    content: Ary dia nentiny niala tao an-tranon’i Abinadaba teo an-kavoana
  - type: note
    content: 'Na: Gibea.'
  - type: text
    content: ' niaraka tamin’ny fiaran’Andriamanitra izany; ary Ahio nandeha teo alohan’ny fiara. '
  '5':
  - type: text
    content: 'Ary Davida sy ny taranak’Isiraely rehetra nitsinjaka teo anatrehan’i Jehovah tamin’ny karazan’ny '
  - type: text
    content: zava-maneno
  - type: text
    content: ' rehetra '
  - type: text
    content: natao tamin’
  - type: text
    content: ' ny hazo kypreso, dia tamin’ny lokanga sy ny valiha sy ny ampongatapaka sy ny korintsana ary ny kipantsona.'
  '6':
  - type: text
    content: 'Ary nony tonga teo amin’ny famoloan’i Nakona izy, dia naninjitra '
  - type: text
    content: ny tanany
  - type: text
    content: ' tamin’ny fiaran’Andriamanitra Oza ka nihazona azy, satria nazeran’ny omby ny fiara. '
  '7':
  - type: text
    content: 'Dia nirehitra tamin’i Oza ny fahatezeran’i Jehovah; ary namely azy teo Andriamanitra noho ny fahadisoany, ka dia maty teo anilan’ny fiaran’Andriamanitra izy. '
  '8':
  - type: text
    content: Ary dia tezitra
  - type: note
    content: 'Na: nalahelo.'
  - type: text
    content: ' Davida noho ny namelezan’i Jehovah an’i Oza, ka dia nataony hoe Perez-oza'
  - type: note
    content: Perez-oza = Famelezana an’i Oza.
  - type: text
    content: ' ny anaran’izany tany izany mandraka andro-any.'
  '9':
  - type: text
    content: 'Ary Davida natahotra an’i Jehovah tamin’izany andro izany ka nanao hoe: Nahoana no ho entina atỳ amiko ny fiaran’i Jehovah? '
