document_id: 2SA.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namindrana ny fiaran’i Jehovah nankany Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY novorin’i Davida indray ny lehilahy voafantina rehetra tamin’ny Isiraely, dia telo alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia niainga Davida sy ny olona rehetra izay nanaraka azy ka niala tany Bala-joda hampakatra ny fiaran’Andriamanitra izay niantsoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay nantsoina tamin’.
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’i Jehovah, Tompon’ny maro, Izay mipetraka amin’ny kerobima.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nataony teo amin’ny sariety vaovao ny fiaran’Andriamanitra ka nentiny avy tao an-tranon’i Abinadaba teo an-kavoana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gibea.
    marker-yv: yv-n
  - type: text
    text: ' ary Oza sy Ahio, zanak’i Abinadaba, no nampandeha ny sariety vaovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary dia nentiny niala tao an-tranon’i Abinadaba teo an-kavoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gibea.
    marker-yv: yv-n
  - type: text
    text: ' niaraka tamin’ny fiaran’Andriamanitra izany; ary Ahio nandeha teo alohan’ny fiara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Davida sy ny taranak’Isiraely rehetra nitsinjaka teo anatrehan’i Jehovah tamin’ny karazan’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zava-maneno
  - type: text
    text: ' rehetra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: natao tamin’
  - type: text
    text: ' ny hazo kypreso, dia tamin’ny lokanga sy ny valiha sy ny ampongatapaka sy ny korintsana ary ny kipantsona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony tonga teo amin’ny famoloan’i Nakona izy, dia naninjitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny tanany
  - type: text
    text: ' tamin’ny fiaran’Andriamanitra Oza ka nihazona azy, satria nazeran’ny omby ny fiara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nirehitra tamin’i Oza ny fahatezeran’i Jehovah; ary namely azy teo Andriamanitra noho ny fahadisoany, ka dia maty teo anilan’ny fiaran’Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary dia tezitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nalahelo.
    marker-yv: yv-n
  - type: text
    text: ' Davida noho ny namelezan’i Jehovah an’i Oza, ka dia nataony hoe Perez-oza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perez-oza = Famelezana an’i Oza.
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’izany tany izany mandraka andro-any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Davida natahotra an’i Jehovah tamin’izany andro izany ka nanao hoe: Nahoana no ho entina atỳ amiko ny fiaran’i Jehovah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Davida dia tsy nety namindra ny fiaran’i Jehovah ho ao aminy ao an-Tanànan’i Davida; fa naviliny ho ao an-tranon’i Obed-edoma Gatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nipetraka telo volana tao an-tranon’i Obed-edoma Gatita ny fiaran’i Jehovah; ka dia notahin’i Jehovah Obed-edoma sy ny ankohonany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nambara tamin’i Davida mpanjaka hoe: Jehovah efa nitahy ny ankohonan’i Obed-edoma sy izay nananany rehetra noho ny fiaran’Andriamanitra. Dia nandeha Davida ka nampakatra ny fiaran’Andriamanitra tamim-pifaliana avy tao an-tranon’i Obed-edoma ho any an-Tanànan’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa namindra inenina ny mpitondra ny fiaran’i Jehovah, dia namono omby sy zanak’omby mifahy izy hatao fanatitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Davida nitsinjaka mafy dia mafy teo anatrehan’i Jehovah sady nisalotra efoda rongony fotsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Davida sy ny taranak’i Isiraely rehetra nampakatra ny fiaran’i Jehovah tamin’ny hoby sy ny feon’ny anjomara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nony tonga teo an-Tanànan’i Davida ny fiaran’i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin’i Saoly, ka nahita an’i Davida mpanjaka nibitaka sy nitsinjaka teo anatrehan’i Jehovah; ka dia nikizaka azy tao am-pony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nampiditra ny fiaran’i Jehovah ny olona ka nametraka azy teo amin’ny fitoerany tao amin’ny lay izay naorin’i Davida hitoerany; ary Davida nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony voàtitr’i Davida ny fanatitra dorana sy ny fanati-pihavanana, dia nitso-drano ny vahoaka tamin’ny anaran’i Jehovah, Tompon’ny maro, izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nomeny mofo iray sy hena iray didy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: divay eran’ny kapoaka.
    marker-yv: yv-n
  - type: text
    text: ' ary ampempam-boaloboka iray avy ny olona rehetra, dia ny Isiraely rehetra, na lahy na vavy. Ary dia samy nody tany an-tranony avy ny olona rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Davida koa mba nody hitso-drano ny ankohonany. Fa Mikala, zanakavavin’i Saoly, nivoaka hitsena an’i Davida ka nanao hoe: Akory ity voninahitry ny mpanjakan’ny Isiraely andro-any! ilay nanary lamba anikeheo teo imason’ny zanakavavin’ny mpanompony, tahaka ny adala manary lamba ka tsy manan-kenatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy kosa Davida tamin’i Mikala: Teo anatrehan’i Jehovah, Izay nifidy ahy noho ny rainao sy ny ankohonany rehetra ka nanendry ahy ho mpanapaka ny Isiraely, olon’i Jehovah,– eny, teo anatrehan’i Jehovah no nitsinjahako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary mbola hivazina kokoa noho izany aza aho, ka hataoko tsinontsinona ny tenako; nefa hiaraka hanam-boninahitra amin’ireo tovovavy nantsoinao ireo kosa aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ka dia tsy nanan-janaka intsony mandra-pahafatiny Mikala, zanakavavin’i Saoly.
