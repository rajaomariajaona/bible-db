document_id: PRO.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana tsy hijejojejo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ANAKA, tandremo ny fahendreko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary atongilano ny sofinao ho amin’ny fahalalako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiheveranao tsara ny fisainana mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hitandreman’ny molotrao ny fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny molotry ny vehivavy jejo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadiny.
    marker-yv: yv-n
  - type: text
    text: ' dia mitete toy ny tantely avy amin’ny tohotra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vavany dia malama noho ny diloilo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nefa ny farany mangidy tahaka ny hazo mahafaty
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maranitra hoatra ny sabatra roa lela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tongony midina ho any amin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny diany mizotra ho any amin’ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy mahazo mandia ny làlan’aina mihitsy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manjenjena, ka tsy fantany akory izay halehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa mihainoa ahy, ry zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza miala amin’ny teny aloaky ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampanalaviro azy ny alehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manakaiky ny varavaran’ny tranony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fandrao omenao ho an’ny sasany ny voninahitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taonanao ho an’izay lozabe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fandrao hivokisan’ny vahiny ny fanananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nisasaranao ho tonga ao an-tranon’ny vahiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ka dia hitoloko hianao any am-parany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mihalevona ny nofonao sy ny tenanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanao hoe hianao: Nahoana re no nankahala famaizana aho?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no naniratsira fanaranana ny foko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka tsy nihaino ny tenin’ny mpanoro hevitra ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa saiky azon’ny ratsy rehetra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao amin’ny fiangonana sy ny fivoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Misotroa rano avy amin’ny lavaka famorian-dranonao ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy rano miboiboika avy amin’ny fantsakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hipasaka eny ivelany va ny rano avy amin’ny loharanonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eny an-dàlambe ny rano velonao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ho anao irery ihany izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aza iombonana amin’ny hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka hotahina ny loharanonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifalia amin’ny vadin’ny fahatanoranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa dieravavy mahate-ho-tia sy osi-dia tsara bika izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho feno faharavoravoana làlandava amin’ny fitiavany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahoana hianao, anaka, no ho renoka amin’ny fitiavana vehivavy jejo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanohona ny tratran’ny vahiny janga?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa eo imason’i Jehovah ny alehan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny diany rehetra dia dinihiny avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny heloky ny ratsy fanahy dia mahazo ny tenany ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kofehin’ny fahotany no itanana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maty noho ny tsi-fahazoany famaizana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mikorapaka noho ny haben’ny fahadalany.
