document_id: PRO.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana tsy hijejojejo.
  - type: text
    content: ANAKA, tandremo ny fahendreko,
  - type: text
    content: Ary atongilano ny sofinao ho amin’ny fahalalako,
  '10':
  - type: text
    content: Fandrao hivokisan’ny vahiny ny fanananao;
  - type: text
    content: Ary izay nisasaranao ho tonga ao an-tranon’ny vahiny;
  '11':
  - type: text
    content: Ka dia hitoloko hianao any am-parany,
  - type: text
    content: Raha mihalevona ny nofonao sy ny tenanao;
  '12':
  - type: text
    content: 'Dia hanao hoe hianao: Nahoana re no nankahala famaizana aho?'
  - type: text
    content: Ary nahoana no naniratsira fanaranana ny foko,
  '13':
  - type: text
    content: Ka tsy nihaino ny tenin’ny mpanoro hevitra ahy,
  - type: text
    content: Ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy?
  '14':
  - type: text
    content: Efa saiky azon’ny ratsy rehetra aho
  - type: text
    content: Tao amin’ny fiangonana sy ny fivoriana.
  '15':
  - type: text
    content: Misotroa rano avy amin’ny lavaka famorian-dranonao ihany
  - type: text
    content: Sy rano miboiboika avy amin’ny fantsakanao.
  '16':
  - type: text
    content: Hipasaka eny ivelany va ny rano avy amin’ny loharanonao,
  - type: text
    content: Ary eny an-dàlambe ny rano velonao?
  '17':
  - type: text
    content: Aoka ho anao irery ihany izany,
  - type: text
    content: Fa aza iombonana amin’ny hafa.
  '18':
  - type: text
    content: Aoka hotahina ny loharanonao,
  - type: text
    content: Ary mifalia amin’ny vadin’ny fahatanoranao.
  '19':
  - type: text
    content: Fa dieravavy mahate-ho-tia sy osi-dia tsara bika izy,
  - type: text
    content: Dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva,
  - type: text
    content: Ary aoka ho feno faharavoravoana làlandava amin’ny fitiavany hianao.
  '2':
  - type: text
    content: Hiheveranao tsara ny fisainana mazava
  - type: text
    content: Sy hitandreman’ny molotrao ny fahalalana.
  '20':
  - type: text
    content: Nahoana hianao, anaka, no ho renoka amin’ny fitiavana vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadiny.
  - type: text
    content: Ka hanohona ny tratran’ny vahiny janga?
  '21':
  - type: text
    content: Fa eo imason’i Jehovah ny alehan’ny olona,
  - type: text
    content: Ary ny diany rehetra dia dinihiny avokoa.
  '22':
  - type: text
    content: Ny heloky ny ratsy fanahy dia mahazo ny tenany ihany,
  - type: text
    content: Ary ny kofehin’ny fahotany no itanana azy.
  '23':
  - type: text
    content: Maty noho ny tsi-fahazoany famaizana izy,
  - type: text
    content: Eny, mikorapaka noho ny haben’ny fahadalany.
  '3':
  - type: text
    content: Fa ny molotry ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadiny.
  - type: text
    content: ' dia mitete toy ny tantely avy amin’ny tohotra,'
  - type: text
    content: Ary ny vavany dia malama noho ny diloilo;
  '4':
  - type: text
    content: Nefa ny farany mangidy tahaka ny hazo mahafaty
  - type: text
    content: Ary maranitra hoatra ny sabatra roa lela.
  '5':
  - type: text
    content: Ny tongony midina ho any amin’ny fahafatesana,
  - type: text
    content: Ary ny diany mizotra ho any amin’ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
  '6':
  - type: text
    content: Tsy mahazo mandia ny làlan’aina mihitsy izy,
  - type: text
    content: Fa manjenjena, ka tsy fantany akory izay halehany.
  '7':
  - type: text
    content: Koa mihainoa ahy, ry zanaka,
  - type: text
    content: Ary aza miala amin’ny teny aloaky ny vavako.
  '8':
  - type: text
    content: Ampanalaviro azy ny alehanao,
  - type: text
    content: Ary aza manakaiky ny varavaran’ny tranony;
  '9':
  - type: text
    content: Fandrao omenao ho an’ny sasany ny voninahitrao,
  - type: text
    content: Ary ny taonanao ho an’izay lozabe;
