document_id: EZK.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fanoharana ny amin’ny ala may sy ny sabatra voatsoaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry zanak’olona, manatreha ny atsimo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitenena manandrify ny atsimo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka maminania ny amin’ny hamelezana ny ala amin’ny tany atsimo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary lazao amin’ny ala amin’ny tany atsimo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Henoy ny tenin’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hampirehitra afo ao aminao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay handevona ny hazo maitso sy ny hazo maina rehetra ao aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hovonoina ny lelafo midedadeda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho main’ny afo ny tava rehetra hatrany atsimo ka hatrany avaratra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ka dia ho hitan’ny nofo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho Jehovah no nampirehitra io,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hovonoina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô! Hoy ny fitenin’ny olona ahy: Tsy fanoharana va no ataony?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry zanak’olona, manandrifia an’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitenena manandrify ny fitoerana masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka maminania ny amin’ny hamelezana ny tanin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ataovy amin’ny tanin’ny Isiraely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Izaho no mamely anao, ary hotsoahako amin’ny tranony ny sabatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka haringako ny marina sy ny meloka eo aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary noho ny handringanako ny marina sy ny meloka eo aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izany no hitsoahan’ny sabatro amin’ny tranony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamely ny nofo rehetra hatrany atsimo ka hatrany avaratra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ka dia ho fantatry ny nofo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho Jehovah no nanatsoaka ny sabatro tamin’ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra intsony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hianao, ry zanak’olona, midridridridria toy ny tapa-balahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, midridridridria amin’ny fangidiana eo imasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha izy manao aminao hoe: Nahoana hianao no midridridridry?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia valio hoe: Noho ny teny efa re, fa ho avy izany–'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho kivy ny fo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiraviravy ny tànana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hivarahontsana ny fanahy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hanjary ho toy ny rano ny lohalika rehetra–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho avy izany ka ho tanteraka, hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ry zanak’olona, maminania, ka ataovy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injao! sabatra! sabatra re!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voaranitra sady voafotsy koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voaranitra hahafaty be izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafotsy hanelatselatra izy–
- type: usfm
  marker: q1
  children:
  - type: text
    text: '(Sa isika hifaly hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tsorakazon’ny zanako mamingavinga ny hazo rehetra?)–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nomena hofotsiana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba horaisin-tànana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voaranitra io sabatra io sady voafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hatolotra eo an-tanan’ny mpamono.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mitomania sy midradradradrà, ry zanak’olona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihatra amin’ny oloko izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny lehibe rehetra amin’ny Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavon’ny sabatra miaraka amin’ny oloko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa misafoa sirana hianao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa vita ny fizahan-toetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manao ahoana, raha ilay tehim-panjakana namingavinga iny aza no ho tonga tsinontsinona? hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hianao, ry zanak’olona, dia maminania,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitehafa tànana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hihaloza roa heny, na telo heny aza, ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny sabatra izay efa nahatrabaka olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny sabatra izay efa nahatrabaka ny andriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lehibe.
    marker-yv: yv-n
  - type: text
    text: ' no manemitra azy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahebihebiko teny amin’ny vavahadiny rehetra ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahakivy ny fo sy hahatonga fahatafintohinana maro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! nataoko nanelatselatra izy sady voaranitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voatsoaka.
    marker-yv: yv-n
  - type: text
    text: ' hamono.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Miomàna, ka mandrosoa eo an-kavanana hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijoroa, ka mandrosoa eo an-kavia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izay voatendry hamelezanao na aiza na aiza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hiteha-tànana koa Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiala fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Jehovah no nilaza izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tonga tamiko ny tenin’i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hianao, ry zanak’olona, manaova làlana roa ho anao hihavian’ny sabatry ny mpanjakan’i Babylona; avy amin’ny tany iray no hihavian’izy roa; ka manaova sarin’ny famantaran-dàlana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tànana.
    marker-yv: yv-n
  - type: text
    text: ' eo an-tsampanan-dàlana mankany amin’ny tanàna no anaovinao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Manaova làlana hihavian’ny sabatra ho any Raban’ny taranak’i Amona sy ho any ny Joda ao Jerosalema mimanda. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa ny mpanjakan’i Babylona mijanona eo amin ny sampanan-dàlana, dia eo an-dohan’ny làlana roa, mba hanao sikidy; dia manetsiketsika ny zanatsipìka izy ary manontany amin’ny sampy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terafima.
    marker-yv: yv-n
  - type: text
    text: ' sy mizaha amin’ny atin-kena. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mby eo an-tànany ankavanana ny sikidy, dia ny ho an’i Jerosalema, mba hametraka lohondry vy fandravana, hisoka-bava hiantsoantso, hanandra-peo amin’ny akoran’ady, hametraka lohondry vy fandravana eo akaikin’ny vavahady, hanandratra tovon-tany sy tilikambo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nefa tahaka ny sikidy lainga izany eo imason’ireny izay efa nianiana mafy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay efa nianianana mafy.
    marker-yv: yv-n
  - type: text
    text: ' nefa Jehovah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izy.
    marker-yv: yv-n
  - type: text
    text: ' no mampahatsiaro ny helony mba hisamborana azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo: Noho ny nampahatsiarovanareo ny helokareo tamin’ny nampiharihariana ny fahadisoanareo mba hampisehoana ny fahotanareo tamin’izay rehetra nataonareo,–noho ny nahatsiarovana anareo dia hosamborin-tànana hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hianao, ry ilay ratsy fanahy voatrabaka, dia ilay mpanjakan’ny Isiraely, izay tapitra andro amin’ny fotoan’ny heloka mahafaty, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'izao no lazain’i Jehovah Tompo: Hesorina ny hamama, ary halàna ny satroboninahitra, tsy ho ao intsony ireo; hasandratra ny iva, ary haetry ny avo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Havadiko, havadiko, havadiko izany; fa izany koa aza dia tsy mba haharitra mandra-pahatongan’izay tena tompony tokoa, ka homeko azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary hianao, ry zanak’olona, dia maminania, ka ataovy hoe: Izao no lazain’i Jehovah Tompo: Ny amin’ny taranak’i Amona sy ny latsa ataony, dia ataovy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro sabatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia sabatra voatsoaka hamono!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafotsy handringana sy hanelatselatra izy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: (Raha mahita zava-poana ho anao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy maminany lainga aminao)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handavoany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hametrahany.
    marker-yv: yv-n
  - type: text
    text: ' anao ao amin’ny vozon’ny ratsy fanahy voatrabaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tapitra andro amin’ny fotoan’ny heloka mahafaty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ampidiro amin’ny tranony izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’ny tany namoronana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny tany nahaterahanao, no hitsarako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary haidiko aminao ny fahavinirako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny afon’ny fahatezerako no hotsofiko aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hatolotro eo an-tànan’ny olona ketrina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay mpamorona fandringanana hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Dia ho kitain’ny afo hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho eny amin’ny tany ny ranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hotsaroana hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho Jehovah no niteny izany.
