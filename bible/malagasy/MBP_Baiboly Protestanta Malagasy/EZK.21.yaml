document_id: EZK.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny ala may sy ny sabatra voatsoaka.
  - type: text
    content: 'DIA tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '10':
  - type: text
    content: Ka dia ho fantatry ny nofo rehetra
  - type: text
    content: Fa Izaho Jehovah no nanatsoaka ny sabatro tamin’ny tranony;
  - type: text
    content: Tsy hiditra intsony izy.
  '11':
  - type: text
    content: Ary hianao, ry zanak’olona, midridridridria toy ny tapa-balahana,
  - type: text
    content: Eny, midridridridria amin’ny fangidiana eo imasony.
  '12':
  - type: text
    content: 'Ary raha izy manao aminao hoe: Nahoana hianao no midridridridry?'
  - type: text
    content: 'Dia valio hoe: Noho ny teny efa re, fa ho avy izany–'
  - type: text
    content: Ho kivy ny fo rehetra,
  - type: text
    content: Hiraviravy ny tànana rehetra,
  - type: text
    content: Ary hivarahontsana ny fanahy rehetra,
  - type: text
    content: Sady hanjary ho toy ny rano ny lohalika rehetra–
  - type: text
    content: Eny, ho avy izany ka ho tanteraka, hoy Jehovah Tompo.
  '13':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '14':
  - type: text
    content: 'Ry zanak’olona, maminania, ka ataovy hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Injao! sabatra! sabatra re!
  - type: text
    content: Voaranitra sady voafotsy koa.
  '15':
  - type: text
    content: Voaranitra hahafaty be izy;
  - type: text
    content: Voafotsy hanelatselatra izy–
  - type: text
    content: '(Sa isika hifaly hoe:'
  - type: text
    content: Ny tsorakazon’ny zanako mamingavinga ny hazo rehetra?)–
  '16':
  - type: text
    content: Ary nomena hofotsiana izy
  - type: text
    content: Mba horaisin-tànana;
  - type: text
    content: Voaranitra io sabatra io sady voafotsy,
  - type: text
    content: Mba hatolotra eo an-tanan’ny mpamono.
  '17':
  - type: text
    content: Mitomania sy midradradradrà, ry zanak’olona!
  - type: text
    content: Fa mihatra amin’ny oloko izany,
  - type: text
    content: Dia amin’ny lehibe rehetra amin’ny Isiraely;
  - type: text
    content: Lavon’ny sabatra miaraka amin’ny oloko izy,
  - type: text
    content: Koa misafoa sirana hianao;
  '18':
  - type: text
    content: Fa vita ny fizahan-toetra,
  - type: text
    content: Ka manao ahoana, raha ilay tehim-panjakana namingavinga iny aza no ho tonga tsinontsinona? hoy Jehovah Tompo.
  '19':
  - type: text
    content: Ary hianao, ry zanak’olona, dia maminania,
  - type: text
    content: Ka mitehafa tànana,
  - type: text
    content: Ary aoka hihaloza roa heny, na telo heny aza, ny sabatra,
  - type: text
    content: Dia ny sabatra izay efa nahatrabaka olona;
  - type: text
    content: Eny, ny sabatra izay efa nahatrabaka ny andriana
  - type: note
    content: Heb. lehibe.
  - type: text
    content: ' no manemitra azy.'
  '2':
  - type: text
    content: Ry zanak’olona, manatreha ny atsimo,
  - type: text
    content: Ary mitenena manandrify ny atsimo,
  - type: text
    content: Ka maminania ny amin’ny hamelezana ny ala amin’ny tany atsimo.
  '20':
  - type: text
    content: Nahebihebiko teny amin’ny vavahadiny rehetra ny sabatra,
  - type: text
    content: Mba hahakivy ny fo sy hahatonga fahatafintohinana maro.
  - type: text
    content: Indrisy! nataoko nanelatselatra izy sady voaranitra
  - type: note
    content: 'Na: voatsoaka.'
  - type: text
    content: ' hamono.'
  '21':
  - type: text
    content: Miomàna, ka mandrosoa eo an-kavanana hianao,
  - type: text
    content: Mijoroa, ka mandrosoa eo an-kavia,
  - type: text
    content: Amin’izay voatendry hamelezanao na aiza na aiza.
  '22':
  - type: text
    content: Hiteha-tànana koa Aho
  - type: text
    content: Ary hiala fo;
  - type: text
    content: Izaho Jehovah no nilaza izany.
  '23':
  - type: text
    content: 'Ary tonga tamiko ny tenin’i Jehovah hoe: '
  '24':
  - type: text
    content: Hianao, ry zanak’olona, manaova làlana roa ho anao hihavian’ny sabatry ny mpanjakan’i Babylona; avy amin’ny tany iray no hihavian’izy roa; ka manaova sarin’ny famantaran-dàlana,
  - type: note
    content: Heb. tànana.
  - type: text
    content: ' eo an-tsampanan-dàlana mankany amin’ny tanàna no anaovinao azy. '
  '25':
  - type: text
    content: 'Manaova làlana hihavian’ny sabatra ho any Raban’ny taranak’i Amona sy ho any ny Joda ao Jerosalema mimanda. '
  '26':
  - type: text
    content: Fa ny mpanjakan’i Babylona mijanona eo amin ny sampanan-dàlana, dia eo an-dohan’ny làlana roa, mba hanao sikidy; dia manetsiketsika ny zanatsipìka izy ary manontany amin’ny sampy
  - type: note
    content: Heb. terafima.
  - type: text
    content: ' sy mizaha amin’ny atin-kena. '
  '27':
  - type: text
    content: 'Mby eo an-tànany ankavanana ny sikidy, dia ny ho an’i Jerosalema, mba hametraka lohondry vy fandravana, hisoka-bava hiantsoantso, hanandra-peo amin’ny akoran’ady, hametraka lohondry vy fandravana eo akaikin’ny vavahady, hanandratra tovon-tany sy tilikambo. '
  '28':
  - type: text
    content: Nefa tahaka ny sikidy lainga izany eo imason’ireny izay efa nianiana mafy,
  - type: note
    content: 'Na: izay efa nianianana mafy.'
  - type: text
    content: ' nefa Jehovah'
  - type: note
    content: Heb. Izy.
  - type: text
    content: ' no mampahatsiaro ny helony mba hisamborana azy.'
  '29':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo: Noho ny nampahatsiarovanareo ny helokareo tamin’ny nampiharihariana ny fahadisoanareo mba hampisehoana ny fahotanareo tamin’izay rehetra nataonareo,–noho ny nahatsiarovana anareo dia hosamborin-tànana hianareo.'
  '3':
  - type: text
    content: 'Ary lazao amin’ny ala amin’ny tany atsimo hoe:'
  - type: text
    content: 'Henoy ny tenin’i Jehovah:'
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, hampirehitra afo ao aminao Aho,
  - type: text
    content: Izay handevona ny hazo maitso sy ny hazo maina rehetra ao aminao;
  - type: text
    content: Tsy hovonoina ny lelafo midedadeda,
  - type: text
    content: Fa ho main’ny afo ny tava rehetra hatrany atsimo ka hatrany avaratra;
  '30':
  - type: text
    content: 'Ary hianao, ry ilay ratsy fanahy voatrabaka, dia ilay mpanjakan’ny Isiraely, izay tapitra andro amin’ny fotoan’ny heloka mahafaty, '
  '31':
  - type: text
    content: 'izao no lazain’i Jehovah Tompo: Hesorina ny hamama, ary halàna ny satroboninahitra, tsy ho ao intsony ireo; hasandratra ny iva, ary haetry ny avo. '
  '32':
  - type: text
    content: Havadiko, havadiko, havadiko izany; fa izany koa aza dia tsy mba haharitra mandra-pahatongan’izay tena tompony tokoa, ka homeko azy izany.
  '33':
  - type: text
    content: 'Ary hianao, ry zanak’olona, dia maminania, ka ataovy hoe: Izao no lazain’i Jehovah Tompo: Ny amin’ny taranak’i Amona sy ny latsa ataony, dia ataovy hoe:'
  - type: text
    content: Indro sabatra!
  - type: text
    content: Dia sabatra voatsoaka hamono!
  - type: text
    content: Voafotsy handringana sy hanelatselatra izy
  '34':
  - type: text
    content: (Raha mahita zava-poana ho anao izy
  - type: text
    content: Sy maminany lainga aminao)
  - type: text
    content: Handavoany
  - type: note
    content: Heb. hametrahany.
  - type: text
    content: ' anao ao amin’ny vozon’ny ratsy fanahy voatrabaka,'
  - type: text
    content: Izay tapitra andro amin’ny fotoan’ny heloka mahafaty.
  '35':
  - type: text
    content: Ampidiro amin’ny tranony izy.
  - type: text
    content: Any amin’ny tany namoronana anao,
  - type: text
    content: Dia any amin’ny tany nahaterahanao, no hitsarako anao.
  '36':
  - type: text
    content: Ary haidiko aminao ny fahavinirako,
  - type: text
    content: Ny afon’ny fahatezerako no hotsofiko aminao,
  - type: text
    content: Ka hatolotro eo an-tànan’ny olona ketrina
  - type: text
    content: Sy izay mpamorona fandringanana hianao,
  '37':
  - type: text
    content: Dia ho kitain’ny afo hianao;
  - type: text
    content: Ho eny amin’ny tany ny ranao;
  - type: text
    content: Tsy hotsaroana hianao;
  - type: text
    content: Fa Izaho Jehovah no niteny izany.
  '4':
  - type: text
    content: Ka dia ho hitan’ny nofo rehetra
  - type: text
    content: Fa Izaho Jehovah no nampirehitra io,
  - type: text
    content: Ka tsy hovonoina.
  '5':
  - type: text
    content: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô! Hoy ny fitenin’ny olona ahy: Tsy fanoharana va no ataony?'
  '6':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '7':
  - type: text
    content: Ry zanak’olona, manandrifia an’i Jerosalema,
  - type: text
    content: Ary mitenena manandrify ny fitoerana masina,
  - type: text
    content: Ka maminania ny amin’ny hamelezana ny tanin’ny Isiraely.
  '8':
  - type: text
    content: 'Ary ataovy amin’ny tanin’ny Isiraely hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, Izaho no mamely anao, ary hotsoahako amin’ny tranony ny sabatro,
  - type: text
    content: Ka haringako ny marina sy ny meloka eo aminao.
  '9':
  - type: text
    content: Ary noho ny handringanako ny marina sy ny meloka eo aminao,
  - type: text
    content: Dia izany no hitsoahan’ny sabatro amin’ny tranony
  - type: text
    content: Hamely ny nofo rehetra hatrany atsimo ka hatrany avaratra,
