document_id: 2CO.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no fanintelon’ny hankanesako atỳ aminareo. ,,Amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny rehetra’’ (Deo. 19.15). '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Efa nambarako fahiny, sady milaza rahateo koa aho–toy ny nataoko fony mbola teo aminareo fanindroany ihany, ary ankehitriny raha tsy eo kosa–amin’izay nanota teo aloha sy amin’ny sisa rehetra, fa rehefa tonga indray aho, dia tsy hiantra, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'satria hianareo mitady famantarana fa miteny ato anatiko Kristy, Izay tsy malemy aminareo, fa mahery ao aminareo kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa voahombo tamin’ny hazofijaliana Izy noho ny fahalemena, nefa velona kosa noho ny herin’Andriamanitra. Fa izahay koa dia malemy ao aminy, nefa hiara-belona aminy ho anareo izahay noho ny herin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Diniho ny tenanareo, na mitoetra amin’ny finoana hianareo, na tsia; izahao toetra ny tenanareo. Moa tsy fantatrareo va ny amin’ny tenanareo, fa ao anatinareo Jesosy Kristy, raha tsy olona nolavina hianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa manantena aho fa ho fantatrareo fa izahay dia tsy olona nolavina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary mangataka amin’Andriamanitra izahay mba tsy hanao izay ratsy hianareo, tsy ny hisehoanay ho olona voazaha toetra anefa, fa ny mba hanaovanareo izay tsara, na dia ho toy ny olona nolavina aza izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy mahavita na inona na inona hanohitra ny marina izahay, fa hampandroso ny marina kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa faly izahay, raha malemy izahay, fa hianareo no mahery; ary izao no angatahinay, dia ny fanatanterahana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izany no anoratako izany zavatra izany, raha tsy eo aminareo aho, fandrao, rehefa tonga aho, dia hanao izay mafy araka ny hery izay nomen’ny Tompo ahy ho fananganana, fa tsy ho fandravana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Farany, ry rahalahy, mifalia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: veloma.
    marker-yv: yv-n
  - type: text
    text: ' aoka ho tanteraka hianareo, mandraisa ny fampiononana, miraisa saina, mihavàna; ary Andriamanitry ny fitiavana sy ny fiadanana ho aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mifanaova veloma amin’ny fanorohana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny olona masina rehetra manao veloma anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana amin’ny Fanahy Masina.
