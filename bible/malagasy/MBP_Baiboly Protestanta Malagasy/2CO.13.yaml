document_id: 2CO.13,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no fanintelon’ny hankanesako atỳ aminareo. ,,Amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny rehetra’’ (Deo. 19.15). '
  '10':
  - type: text
    content: Izany no anoratako izany zavatra izany, raha tsy eo aminareo aho, fandrao, rehefa tonga aho, dia hanao izay mafy araka ny hery izay nomen’ny Tompo ahy ho fananganana, fa tsy ho fandravana.
  '11':
  - type: text
    content: Farany, ry rahalahy, mifalia,
  - type: note
    content: 'Na: veloma.'
  - type: text
    content: ' aoka ho tanteraka hianareo, mandraisa ny fampiononana, miraisa saina, mihavàna; ary Andriamanitry ny fitiavana sy ny fiadanana ho aminareo. '
  '12':
  - type: text
    content: Mifanaova veloma amin’ny fanorohana masina.
  '13':
  - type: text
    content: Ny olona masina rehetra manao veloma anareo.
  '14':
  - type: text
    content: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompo sy ny fitiavan’Andriamanitra ary ny firaisana amin’ny Fanahy Masina.
  '2':
  - type: text
    content: 'Efa nambarako fahiny, sady milaza rahateo koa aho–toy ny nataoko fony mbola teo aminareo fanindroany ihany, ary ankehitriny raha tsy eo kosa–amin’izay nanota teo aloha sy amin’ny sisa rehetra, fa rehefa tonga indray aho, dia tsy hiantra, '
  '3':
  - type: text
    content: 'satria hianareo mitady famantarana fa miteny ato anatiko Kristy, Izay tsy malemy aminareo, fa mahery ao aminareo kosa. '
  '4':
  - type: text
    content: Fa voahombo tamin’ny hazofijaliana Izy noho ny fahalemena, nefa velona kosa noho ny herin’Andriamanitra. Fa izahay koa dia malemy ao aminy, nefa hiara-belona aminy ho anareo izahay noho ny herin’Andriamanitra.
  '5':
  - type: text
    content: 'Diniho ny tenanareo, na mitoetra amin’ny finoana hianareo, na tsia; izahao toetra ny tenanareo. Moa tsy fantatrareo va ny amin’ny tenanareo, fa ao anatinareo Jesosy Kristy, raha tsy olona nolavina hianareo? '
  '6':
  - type: text
    content: 'Nefa manantena aho fa ho fantatrareo fa izahay dia tsy olona nolavina. '
  '7':
  - type: text
    content: 'Ary mangataka amin’Andriamanitra izahay mba tsy hanao izay ratsy hianareo, tsy ny hisehoanay ho olona voazaha toetra anefa, fa ny mba hanaovanareo izay tsara, na dia ho toy ny olona nolavina aza izahay. '
  '8':
  - type: text
    content: 'Fa tsy mahavita na inona na inona hanohitra ny marina izahay, fa hampandroso ny marina kosa. '
  '9':
  - type: text
    content: 'Fa faly izahay, raha malemy izahay, fa hianareo no mahery; ary izao no angatahinay, dia ny fanatanterahana anareo. '
