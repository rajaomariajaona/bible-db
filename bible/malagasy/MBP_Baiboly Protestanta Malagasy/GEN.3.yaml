document_id: GEN.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanotan’i Adama sy Eva, sy izay nataon’Andriamanitra taminy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny menarana dia fetsy noho ny bibi-dia rehetra izay nataon’i Jehovah Andriamanitra. Ary hoy izy tamin-dravehivavy: Hanky! efa nataon’Andriamanitra hoe: Aza ihinananareo ny hazo rehetra eo amin’ny saha? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy ravehivavy tamin’ny menarana: Ny voan’ny hazo eo amin’ny saha dia azonay ihinanana ihany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa ny voan’ny hazo eo afovoan’ny saha kosa no efa nataon’Andriamanitra hoe: Aza ihinananareo na tendrenareo izany, fandrao maty hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny menarana tamin-dravehivavy: Tsy ho faty tsy akory hianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa fantatr’Andriamanitra fa amin’izay andro hihinananareo azy dia hahiratra ny masonareo, ka ho tahaka an’Andriamanitra hianareo, hahalala ny tsara sy ny ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary hitan-dravehivavy fa tsara ho fihinana ny hazo sady mahafinaritra ny maso ary hazo mahatsiriritra hampahahendry,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maha-te-hizaha.
    marker-yv: yv-n
  - type: text
    text: ' dia nanotazany ny voany ka nihinanany; ary nomeny koa ny vadiny, ka dia nihinana izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nahiratra ny mason’izy mivady, ka fantany fa mitanjaka izy; ary nanjaitra ravin’aviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aviavimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' izy, ka nataony sikina ho azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nandre an’i Jehovah Andriamanitra nitsangantsangana teo amin’ny saha izy, rehefa ho hariva ny andro; ary ralehilahy sy ny vadiny niery ny tavan’i Jehovah Andriamanitra tao anaty hazo tao amin’ny saha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Jehovah Andriamanitra dia niantso an-dralehilahy ka nanao taminy hoe: Aiza moa hianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Nandre Anao tao amin’ny saha aho; dia natahotra aho, satria mitanjaka, ka dia niery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Izy: Iza moa no nanambara taminao fa mitanjaka hianao? Efa nihinananao va ny hazo izay nandrarako anao tsy hihinananao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ralehilahy: Ny vehivavy izay nomenao ho namako, izy no nanome ahy ny voankazo, ka dia nihinana aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Jehovah Andriamanitra tamin-dravehivavy: Inona izao nataonao izao? Dia hoy ravehivavy: Ny menarana no namitaka ahy, ka dia nihinana aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Jehovah Andriamanitra tamin’ny menarana: Satria nanao izany hianao, koa amin’ny biby fiompy rehetra sy ny bibi-dia rehetra dia hianao no voaozona:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Satria nanao izany hianao, dia voaozona mihoatra noho ny biby, etc.
    marker-yv: yv-n
  - type: text
    text: ' ny kibonao no handehananao, ary vovo-tany no hohaninao amin’ny andro rehetra hiainanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hampifandrafesiko hianao sy ny vehivavy ary ny taranakao sy ny taranany: izy hanorotoro ny lohanao, ary hianao kosa hanorotoro ny ombelahin-tongony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy koa Izy tamin-dravehivavy: Hahabe dia hahabe ny fahorianao Aho, indrindra fa raha manan-anaka hianao; ary fahoriana no hiterahanao zanaka; ary ny vadinao no hianteheran’ny fanirianao, ka izy no hanapaka anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy koa Izy tamin’i Adama: Satria efa nihaino ny feon’ny vadinao hianao, ka nihinananao ny hazo izay nandrarako anao hoe: Aza ihinananao izany, dia voaozona ny tany noho izay nataonao; fahoriana no hihinananao ny vokany amin’ny andro rehetra hiainanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary haniry tsilo sy hery ho anao izy; ary hohaninao ny anana famboly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fahatsembohan’ny tavanao no hahazoanao hanina mandra-piverinao any amin’ny tany; fa ny tany no nanalana anao; fa vovoka hianao, ary hiverina ho amin’ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hody.
    marker-yv: yv-n
  - type: text
    text: ' vovoka indray hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ralehilahy nanao ny anaran’ny vadiny hoe Eva,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eva = Aina.
    marker-yv: yv-n
  - type: text
    text: ' satria izy no renin’ny olombelona rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Jehovah Andriamanitra nanao akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Jehovah Andriamanitra: Indro, ny olona efa tonga tahaka ny anankiray amintsika ka hahalala ny tsara sy ny ratsy; ary ankehitriny, andrao haninjitra ny tànany izy, ka hakany koa ny hazon’aina, ary hohaniny, ka ho velona mandrakizay izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ka dia nesorin’i Jehovah Andriamanitra tamin’ny saha Edena izy hiasa ny tany izay nanalana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eny, noroahiny ny olona; ary nampitoeriny tany atsinanan’ny saha Edena ny kerobima sy ny lelafon’ny sabatra mihebiheby hiambina ny làlana mankany amin’ny hazon’aina.
