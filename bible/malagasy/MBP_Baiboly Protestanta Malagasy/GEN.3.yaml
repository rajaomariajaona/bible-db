document_id: GEN.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanotan’i Adama sy Eva, sy izay nataon’Andriamanitra taminy.
  - type: text
    content: 'ARY ny menarana dia fetsy noho ny bibi-dia rehetra izay nataon’i Jehovah Andriamanitra. Ary hoy izy tamin-dravehivavy: Hanky! efa nataon’Andriamanitra hoe: Aza ihinananareo ny hazo rehetra eo amin’ny saha? '
  '10':
  - type: text
    content: 'Dia hoy izy: Nandre Anao tao amin’ny saha aho; dia natahotra aho, satria mitanjaka, ka dia niery.'
  '11':
  - type: text
    content: 'Ary hoy Izy: Iza moa no nanambara taminao fa mitanjaka hianao? Efa nihinananao va ny hazo izay nandrarako anao tsy hihinananao? '
  '12':
  - type: text
    content: 'Dia hoy ralehilahy: Ny vehivavy izay nomenao ho namako, izy no nanome ahy ny voankazo, ka dia nihinana aho.'
  '13':
  - type: text
    content: 'Ary hoy Jehovah Andriamanitra tamin-dravehivavy: Inona izao nataonao izao? Dia hoy ravehivavy: Ny menarana no namitaka ahy, ka dia nihinana aho.'
  '14':
  - type: text
    content: 'Ary hoy Jehovah Andriamanitra tamin’ny menarana: Satria nanao izany hianao, koa amin’ny biby fiompy rehetra sy ny bibi-dia rehetra dia hianao no voaozona:'
  - type: note
    content: 'Na: Satria nanao izany hianao, dia voaozona mihoatra noho ny biby, etc.'
  - type: text
    content: ' ny kibonao no handehananao, ary vovo-tany no hohaninao amin’ny andro rehetra hiainanao. '
  '15':
  - type: text
    content: 'Dia hampifandrafesiko hianao sy ny vehivavy ary ny taranakao sy ny taranany: izy hanorotoro ny lohanao, ary hianao kosa hanorotoro ny ombelahin-tongony.'
  '16':
  - type: text
    content: 'Ary hoy koa Izy tamin-dravehivavy: Hahabe dia hahabe ny fahorianao Aho, indrindra fa raha manan-anaka hianao; ary fahoriana no hiterahanao zanaka; ary ny vadinao no hianteheran’ny fanirianao, ka izy no hanapaka anao.'
  '17':
  - type: text
    content: 'Ary hoy koa Izy tamin’i Adama: Satria efa nihaino ny feon’ny vadinao hianao, ka nihinananao ny hazo izay nandrarako anao hoe: Aza ihinananao izany, dia voaozona ny tany noho izay nataonao; fahoriana no hihinananao ny vokany amin’ny andro rehetra hiainanao. '
  '18':
  - type: text
    content: 'Ary haniry tsilo sy hery ho anao izy; ary hohaninao ny anana famboly. '
  '19':
  - type: text
    content: Ny fahatsembohan’ny tavanao no hahazoanao hanina mandra-piverinao any amin’ny tany; fa ny tany no nanalana anao; fa vovoka hianao, ary hiverina ho amin’ny
  - type: note
    content: 'Na: hody.'
  - type: text
    content: ' vovoka indray hianao.'
  '2':
  - type: text
    content: 'Fa hoy ravehivavy tamin’ny menarana: Ny voan’ny hazo eo amin’ny saha dia azonay ihinanana ihany; '
  '20':
  - type: text
    content: Ary ralehilahy nanao ny anaran’ny vadiny hoe Eva,
  - type: note
    content: Eva = Aina.
  - type: text
    content: ' satria izy no renin’ny olombelona rehetra.'
  '21':
  - type: text
    content: Ary Jehovah Andriamanitra nanao akanjo hoditra ho an’i Adama sy ny vadiny ka nampiakanjo azy.
  '22':
  - type: text
    content: 'Ary hoy Jehovah Andriamanitra: Indro, ny olona efa tonga tahaka ny anankiray amintsika ka hahalala ny tsara sy ny ratsy; ary ankehitriny, andrao haninjitra ny tànany izy, ka hakany koa ny hazon’aina, ary hohaniny, ka ho velona mandrakizay izy; '
  '23':
  - type: text
    content: 'ka dia nesorin’i Jehovah Andriamanitra tamin’ny saha Edena izy hiasa ny tany izay nanalana azy. '
  '24':
  - type: text
    content: Eny, noroahiny ny olona; ary nampitoeriny tany atsinanan’ny saha Edena ny kerobima sy ny lelafon’ny sabatra mihebiheby hiambina ny làlana mankany amin’ny hazon’aina.
  '3':
  - type: text
    content: 'fa ny voan’ny hazo eo afovoan’ny saha kosa no efa nataon’Andriamanitra hoe: Aza ihinananareo na tendrenareo izany, fandrao maty hianareo. '
  '4':
  - type: text
    content: 'Ary hoy ny menarana tamin-dravehivavy: Tsy ho faty tsy akory hianareo; '
  '5':
  - type: text
    content: fa fantatr’Andriamanitra fa amin’izay andro hihinananareo azy dia hahiratra ny masonareo, ka ho tahaka an’Andriamanitra hianareo, hahalala ny tsara sy ny ratsy.
  '6':
  - type: text
    content: Ary hitan-dravehivavy fa tsara ho fihinana ny hazo sady mahafinaritra ny maso ary hazo mahatsiriritra hampahahendry,
  - type: note
    content: 'Na: maha-te-hizaha.'
  - type: text
    content: ' dia nanotazany ny voany ka nihinanany; ary nomeny koa ny vadiny, ka dia nihinana izy.'
  '7':
  - type: text
    content: Dia nahiratra ny mason’izy mivady, ka fantany fa mitanjaka izy; ary nanjaitra ravin’aviavy
  - type: note
    content: aviavimbazaha.
  - type: text
    content: ' izy, ka nataony sikina ho azy.'
  '8':
  - type: text
    content: Ary nandre an’i Jehovah Andriamanitra nitsangantsangana teo amin’ny saha izy, rehefa ho hariva ny andro; ary ralehilahy sy ny vadiny niery ny tavan’i Jehovah Andriamanitra tao anaty hazo tao amin’ny saha.
  '9':
  - type: text
    content: 'Ary Jehovah Andriamanitra dia niantso an-dralehilahy ka nanao taminy hoe: Aiza moa hianao? '
