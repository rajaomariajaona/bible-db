document_id: GEN.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanaovan’Andriamanitra fanekena tamin’i Abrama.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'REHEFA afaka izany, dia tonga tamin’i Abrama ny tenin’i Jehovah tamin’ny fahitana ka nanao hoe: Aza matahotra, ry Abrama; Izaho no ampinganao sy valim-pitia lehibe indrindra ho anao.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary ho lehibe indrindra ny valim-pitianao.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentiny teo aminy izany rehetra izany; ary nosasahiny ireny, ka nampifanandrifiny avy ny tapany; fa ny vorona tsy mba nosasahiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nidina teo amin’ny fatin’ireo ny vorona mpihaza, fa nandroaka azy Abrama. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa hilentika ny masoandro, dia sondrian-tory Abrama; ary, indro, aizina mahatsiravina indrindra no nahazo azy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Abrama: Aoka ho fantatrao marina fa ho vahiny any amin’ny tany izay tsy azy ny taranakao ary hanompo ny olona any; ary hampahoriny efa-jato taona izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany firenena izany kosa, izay hotompoiny, dia hotsaraiko; ary rehefa afaka izany, dia hivoaka mitondra harem-bevava izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hianao kosa ho any amin’ny razanao amin’ny fiadanana; ho tratrantitra indrindra hianao vao hodi-mandry. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mby amin’ny zafiafy, dia hiverina atỳ izy; fa tsy mbola tanteraka ny heloky ny Amorita. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa maty ny masoandro, ka maizina dia maizina ny andro, dia, indro, nisy fatana fandoroana mivoa-tsetroka sy fanilo mirehitra, izay nandeha namaky teo anelanelan’ireo zavatra voasasaka ireo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany Jehovah nanao fanekena tamin’i Abrama ka nanao hoe: Ny taranakao efa nomeko ity tany ity hatrany amin’ny onin’i Egypta ka hatrany amin’ny ony lehibe, dia ny ony Eofrata, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny Kenita sy ny Kenizita sy ny Kadmonita '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abrama: Jehovah Tompo ô, inona no homenao ahy? fa izaho mandroso fahanterana nefa tsy manan-janaka, ary ny ho tompon’ny ahy dia ilay Eliezera avy any Damaskosy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny Hetita sy ny Perizita sy ny Refaïta '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny Amorita sy ny Kananita sy ny Girgasita ary ny Jebosita.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Abrama: Indro, izaho tsy nomenao fara handimby, ka, indro, ny anankiray amin’ny ato an-tranoko no handova ahy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, ny tenin’i Jehovah tonga taminy hoe: Tsy handova anao izany; fa izay haterakao, dia izy no handova anao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra azy nivoaka teo ivelan’ny lay Izy ka nanao hoe: Jereo ange ny lanitra, ka isao ny kintana, raha mahìsa azy hianao. Dia hoy Izy taminy: Ho tahaka izany ny taranakao.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nino an’i Jehovah izy; ka dia nisainy ho fahamarinany izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Izaho no Jehovah Izay nitondra anao nivoaka avy tany Oran’ny Kaldeana, mba homeko anao ity tany ity ho lovanao.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Jehovah Tompo ô, ahoana no hahafantarako fa handova ity aho?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Itondray ombivavy kely efa telo taona Aho sy osivavy efa telo taona sy ondrilahy efa telo taona ary domohina sy zana-boromailala. '
