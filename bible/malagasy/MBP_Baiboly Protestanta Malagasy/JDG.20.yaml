document_id: JDG.20,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nivoaka ny Zanak’Isiraely rehetra, ary ny fiangonana hatrany Dana ka hatrany Beri-sheba ary ny tany Gileada koa nivory tahaka ny olona iray ho any amin’i Jehovah tany Mizpa. '
  '10':
  - type: text
    content: Ary haka folo lahy isan-jato amin’ny firenen’Isiraely rehetra isika, dia zato amin’ny arivo, ary arivo amin’ny iray alina, mba haka vatsy ho an’ny olona, ka rehefa tonga any Gibean’ny Benjamina izy, dia araka ilay zavatra fady indrindra
  - type: note
    content: Heb. fahadalana.
  - type: text
    content: ' efa nataony teo amin’ny Isiraely no hataony aminy. '
  '11':
  - type: text
    content: Dia nivory ny lehilahy rehetra amin’ny Isiraely ka efa nikambana tahaka ny olona iray hamely ny tanàna.
  '12':
  - type: text
    content: 'Ary ny firenen’Isiraely dia naniraka olona tany amin’ny firenen’i Benjamina rehetra hanao hoe: Inona izao ratsy natao teto aminareo izao? '
  '13':
  - type: text
    content: Koa ankehitriny atolory anay ireo olona tena ratsy fanahy avy any Gibea ireo, mba hataonay maty izy, ka hesorinay tsy ho eo amin’ny Isiraely ny ratsy. Fa ny taranak’i Benjamina tsy nety nihaino ny feon’ny Zanak’Isiraely rahalahiny.
  '14':
  - type: text
    content: 'Ary nivory ny taranak’i Benjamina avy tamin’ny tanànany rehetra hankany Gibea mba handeha hiady amin’ny Zanak’Isiraely. '
  '15':
  - type: text
    content: 'Dia voalamina tamin’izany andro izany ny taranak’i Benjamina avy tamin’ireo tanàna ireo, ka enina arivo sy roa alin-dahy nahatan-tsabatra, afa-tsy ny mponina tao Gibea izay voalamina, dia fiton-jato lahy voafantina. '
  '16':
  - type: text
    content: 'Ary teo amin’izany olona rehetra izany nisy olona kavia fiton-jato lahy nofantenany, samy nahay nitoraka tamin’ny antsamotady, ka tsy nisy nivena na dia hoatra ny singam-bolo aza. '
  '17':
  - type: text
    content: Ary ny lehilahy voalamina tamin’ny Isiraely, afa-tsy ny Benjamita, dia efatra hetsy nahatan-tsabatra; mpanafika avokoa ireo rehetra ireo.
  '18':
  - type: text
    content: 'Dia niainga ny Zanak’Isiraely ka niakatra tany Betela ary nanontany tamin’Andriamanitra hoe: Iza no hiakatra voalohany hiady amin’ny taranak’i Benjamina ho anay? Dia hoy Jehovah: Joda no ho voalohany.'
  '19':
  - type: text
    content: 'Dia niainga maraina koa ny Zanak’Isiraely ka nitoby tandrifin’i Gibea. '
  '2':
  - type: text
    content: 'Ary ny loholona rehetra tamin’ny firenen’Isiraely niseho teo amin’ ny fiangonan’ny olon’Andriamanitra, dia lehilahy efatra hetsy mandeha tòngotra sady mahatan-tsabatra. '
  '20':
  - type: text
    content: 'Ary nivoaka ny lehilahy amin’ny Isiraely hiady amin’ny Benjamita; ary nilahatra ny lehilahy amin’ny Isiraely hiady aminy tao akaiky an’i Gibea. '
  '21':
  - type: text
    content: Ary nivoaka avy tany Gibea kosa ny taranak’i Benjamina ka naharingana ny Zanak’Isiraely roa arivo sy roa alin-dahy niampatrampatra tamin’ny tany tamin’izany andro izany.
  '22':
  - type: text
    content: Fa nifanome toky ny lehilahy amin’ny Isiraely ka nilahatra hiady indray teo amin’ilay nilaharany tamin’ny andro voalohany. (
  '23':
  - type: text
    content: 'Ary niakatra ny Zanak’Isiraely ka nitomany teo anatrehan’i Jehovah mandra-paharivan’ny andro, dia nanontany tamin’i Jehovah hoe: Handroso indray va aho hiady amin’ny taranak’i Benjamina rahalahiko? Ary hoy Jehovah: Miakara hiady aminy.)'
  '24':
  - type: text
    content: 'Ary ny Zanak’Isiraely dia nandroso tamin’ ny andro faharoa hiady amin’ny taranak’i Benjamina. '
  '25':
  - type: text
    content: Dia nivoaka avy tany Gibea ny Benjamita hiady aminy indray tamin’ny andro faharoa ka naharingana ny Zanak’ Isiraely valo arivo sy iray alin-dahy niampatrampatra tamin’ny tany; nahatan-tsabatra avokoa ireo rehetra ireo.
  '26':
  - type: text
    content: 'Dia niakatra ny Zanak’Isiraely rehetra sy ny olona rehetra ka nankany Betela, dia nitomany sy nipetraka teo anatrehan’i Jehovah ary nifady hanina tamin’izany andro izany mandra-paharivan’ny andro; ary nanatitra fanatitra odorana sy fanati-pihavanana teo anatrehan’i Jehovah izy. '
  '27':
  - type: text
    content: 'Dia nanontany tamin’i Jehovah ny Zanak’Isiraely (fa tao ny fiaran’ny faneken’Andriamanitra tamin’izany andro izany, '
  '28':
  - type: text
    content: 'ary Finehasa, zanak’i Eleazara, zanak’i Arona, nijanona teo anoloany tamin’izany andro izany) ka nanao hoe: Mbola hivoaka indray va aho hiady amin’ny taranak’i Benjamina rahalahiko, sa hitsahatra? Ary hoy Jehovah: Miakara, fa rahampitso dia hatolotro ho eo an-tànanao izy.'
  '29':
  - type: text
    content: 'Ary nasian’ny Isiraely otrika manodidina an’i Gibea. '
  '3':
  - type: text
    content: 'Ary ren’ny taranak’i Benjamina fa niakatra ho any Mizpa ny Zanak’Isiraely. Dia hoy ny Zanak’Isiraely: Lazao izay nahatonga izao ratsy izao. '
  '30':
  - type: text
    content: 'Dia niakatra ny Zanak’Isiraely tamin’ny andro fahatelo hiady amin’ny taranak’i Benjamina ka nilahatra tandrifin’i Gibea tahaka ilay teo aloha ihany. '
  '31':
  - type: text
    content: 'Dia nivoaka ny taranak’i Benjamina hiady tamin’ny olona ka voatarika niala tamin’ny tanàna izy ary nanomboka namely sy nahafaty ny olona tahaka ny teo aloha, dia tokony ho telo-polo lahy teo amin’ny Isiraely tany an-tsampanan-dàlana, miakatra ho any Betela ny anankiray, ary ny anankiray kosa ho any Gibea any an-tsaha '
  '32':
  - type: text
    content: 'Ary hoy ny taranak’i Benjamina: Resy eo anoloantsika tahaka ilay teo alona ihany izy. Fa hoy ny Zanak’Isiraely: Andeha hanao tari-dositra isika mba hampiala azy amin’ny tanàna ho any an-dàlambe. '
  '33':
  - type: text
    content: 'Ary ny lehilahy rehetra amin’ny Isiraely nitsangana niala tamin’ny fitoerany ka nilahatra tany Bala-tamara; ary ny Isiraely izay nanotrika dia niroatra avy tamin’ny fitoerany, avy tao an-tsahan’i Gibea. '
  '34':
  - type: text
    content: 'Ary tonga tandrifin’i Gibea ny iray alin-dahy voafantina tamin’ny Isiraely rehetra, ary efa mafy ny ady, nefa tsy fantatry ny Benjamita fa efa hiharan-doza izy. '
  '35':
  - type: text
    content: Ary Jehovah namely ny Benjamita teo anoloan’ny Isiraely, ary tamin’izany andro izany ny taranak’i Benjamina dia nahafatesan’ny Zanak’Isiraely zato sy dimy arivo amby roa alin-dahy; nahatan-tsabatra avokoa ireo rehetra ireo.
  '36':
  - type: text
    content: 'Ary hitan’ny taranak’i Benjamina fa resy izy; ary ny lehilahy amin’ny Isiraely nanao tari-dositra tamin’ny Benjamita, satria natoky ny otrika izay efa napetrany teo akaikin’i Gibea izy. '
  '37':
  - type: text
    content: Ary ny otrika niroatra faingana hankany Gibea, dia nandeha faingana ka namely ny tanàna rehetra tamin’ny lelan-tsabatra.
  '38':
  - type: text
    content: 'Ary ny famantarana nifaneken’ny lehilahy amin’ny Isiraely sy ny otrika dia tsangan-afo lehibe hisavoana ao an-tanàna. '
  '39':
  - type: text
    content: 'Ary nirona tamin’ny ady ny lehilahy amin’ny Isiraely (ny taranak’i Benjamina nanomboka namely sy nahafaty ny lehilahy amin’ny Isiraely tokony ho telo-polo lahy; fa hoy izy: Resy tokoa eo anoloantsika izy tahaka ny tamin’ny ady voalohany; '
  '4':
  - type: text
    content: 'Dia namaly ilay Levita, vadin-dravehivavy novonoina, ka nanao hoe: Tonga tany Gibea, izay an’ny Benjamita, izaho sy ny vaditsindranoko handry tao. '
  '40':
  - type: text
    content: 'fa raha vao niakatra avy tao amin’ny tanàna ny setroka mitankosina, dia niherika ny taranak’i Benjamina; ary, indro, niakatra ho amin’ny lanitra avokoa ny '
  - type: text
    content: setroky
  - type: text
    content: ' ny tanàna). '
  '41':
  - type: text
    content: 'Ary raha niverina ny lehilahy amin’ny Isiraely, dia talanjona ny Benjamita, satria hitany fa efa nidiran-doza izy. '
  '42':
  - type: text
    content: 'Dia niamboho teo anoloan’ny lehilahy amin’ny Isiraely hankany amin’ny làlana ho any an-efitra izy, fa ny ady nahatratra azy: ary izay nivoaka avy tao amin’ny tanàna koa dia novonoiny teo. '
  '43':
  - type: text
    content: Nanemitra ny Benjamita izy ka nanenjika azy ary nanitsaka azy mora foana
  - type: note
    content: 'Na: teo Menoha.'
  - type: text
    content: ' tandrifin’i Gibea atsinanany. '
  '44':
  - type: text
    content: Ary ny Benjamita dia nahafatesany valo arivo sy iray alin-dahy; lehilahy nahery avokoa ireo rehetra ireo.
  '45':
  - type: text
    content: 'Dia nivily ny sisa ka nandositra nankany an-efitra ho any amin’ny harambato any Rimona; ary ny voatsimpona teny an-dàlana dia dimy arivo lahy, ary mbola nenjehiny mafy ihany hatrany Gidoma izy ka nahafatesany roa arivo lahy. '
  '46':
  - type: text
    content: 'Ary ny Benjamita rehetra izay lavo tamin’izany andro izany dia dimy arivo sy roa alin-dahy nahatan-tsabatra; lehilahy nahery avokoa ireo rehetra ireo. '
  '47':
  - type: text
    content: Fa nisy enin-jato lahy nihodina ka nandositra nankany an-efitra ho any amin’ny harambato any Rimona, dia nitoetra tao efa-bolana.
  '48':
  - type: text
    content: Ary ny lehilahy amin’ny Isiraely niverina indray tany amin’ny taranak’i Benjamina ka namely azy tamin’ny lelan-tsabatra, hatramin’ny olona tao an-tanàna ka hatramin’ny biby fiompy ary izay rehetra hita; ary ny tanàna rehetra izay hitany dia nodorany tamin’ny afo avokoa.
  '5':
  - type: text
    content: 'Dia nitsangana hamely ahy ny mponina tao Gibea ka nanodidina ny trano hamely ahy tamin’ny alina; izaho saiky novonoiny, ary ny vaditsindranoko nandriany ka matiny. '
  '6':
  - type: text
    content: Dia nalaiko ny vaditsindranoko ka norasaiko ary nampitondraiko tany amin’ny tany rehetra izay lovan’ny Isiraely, satria efa nanao fahavetavetana sy zavatra fady indrindra
  - type: note
    content: Heb. fahadalana.
  - type: text
    content: ' teo amin’ny Isiraely ireo. '
  '7':
  - type: text
    content: Koa indreto hianareo Zanak’Isiraely rehetra, mba alaharo izay teny sy hevitrareo.
  '8':
  - type: text
    content: 'Dia nitsangana tahaka ny olona iray ny vahoaka rehetra ka nanao hoe: Tsy hisy hankany amin’ny laintsika akory isika, ary tsy hisy hody any an-tranontsika akory. '
  '9':
  - type: text
    content: 'Fa ankehitriny, izao no hataontsika amin’i Gibea: araka ny filokana no aoka hanaovantsika azy. '
