document_id: MRK.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampianaran’i Jesosy tany amin’ny taniny, sy ny tsi-finoan’ny olona Azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 13.53-58; Lio. 4.14-30?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY niala teo Izy ka tonga tany amin’ny taniny, sady nanaraka Azy ny mpianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa tonga ny Sabata, dia nampianatra tao amin’ny synogaga Izy; ary maro izay nihaino Azy dia talanjona indrindra ka nanao hoe: Taiza no nahazoan’Ilehity izany zavatra izany, ary manao ahoana ny fahendrena nomena Azy sy izao asa lehibe ataon’ny tànany izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy ilay mpandrafitra, zanak’i Maria, ary rahalahin’i Jakoba sy Josesy sy Jodasy sy Simona va Ilehity? Ary tsy etỳ amintsika va ireo anabaviny? Dia tafintohina taminy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy misy mpaminany tsy hajaina afa-tsy eo amin’ny taniny sy ny havany ary ny ankohonany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tsy nahazo nampiseho hery akory Izy teo, afa-tsy ny nametraka ny tànany tamin’ny olona marary vitsy foana ka nahasitrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary gaga Izy noho ny tsi-finoany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia nitety ny vohitra manodidina Izy ka nampianatra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny nataon’i Jesosy tamin’ny Apostoly roa ambin’ny folo lahy tamin’ny nanirahany azy hitoriteny.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 10.1-42; Lio. 9.1-6.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ARY niantso ny roa ambin’ny folo lahy hankeo aminy Izy ka naniraka azy tsiroaroa sy nanome azy fahefana hamoaka fanahy maloto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nandrara azy Izy mba tsy hitondra zavatra ho any amin’ny halehany, na hanina, na kitapo, na vola
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: varahina.
    marker-yv: yv-n
  - type: text
    text: ' ao amin’ny fehin-kibony, afa-tsy tehina ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa asio kapa ny tongotrareo; ary aza mitondra akanjo roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy koa Izy taminy: Izay trano hidiranareo, dia mitoera ao mandra-pialanareo any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary izay tanàna tsy hampandroso anareo, na tsy hihaino anareo, raha miala hianareo, dia ahintsano ny vovoka ao am-paladianareo ho vavolombelona aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia lasa nandeha izy ireo ka nitory fa tokony hibebaka ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary demonia maro no navoakany; ary nohosorany diloilo ny marary maro ka nositraniny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Heroda sy Jaona Mpanao-batisa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 14.1-12; Lio. 3.19,20; 9.7-9.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ARY nahare izany Heroda mpanjaka (fa efa nalaza ny anaran’i Jesosy), dia hoy izy: Jaona Mpanao-batisa efa nitsangana tamin’ny maty izay, ka izany no ananany hery hanao ireo asa lehibe ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny sasany: Elia Izy; ary hoy ny sasany: Mpaminany Izy, dia toy ny anankiray amin’ny mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa nahare izany Heroda, dia hoy izy: Jaona izay, ilay notapahiko ny lohany; efa nitsangana izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Heroda ihany no naniraka sy nisambotra an’i Jaona ka namatotra azy tao an-trano-maizina noho ny amin’i Herodiasy, vadin’i Filipo rahalahiny; fa nanambady azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Jaona efa nilaza tamin’i Heroda hoe: Diso hianao, raha manambady ny vadin’ny rahalahinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Herodiasy dia nanao otri-po taminy ka naniry hahafaty, azy nefa tsy nahazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa Heroda natahotra an’i Jaona, satria fantany fa lehilahy marina sy masina izy, ka dia niaro azy izy; ary rehefa nandre azy izy, dia very hevitra be ihany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanao zavatra maro.
    marker-yv: yv-n
  - type: text
    text: ' ary nihaino azy tamin’ny hafaliana izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary rehefa tonga izay andro antonona, dia ilay nanaovan’i Heroda fanasana ho an’ny lehibe sy ny mpifehy arivo ary ny loholona tany Galilia tamin’ny andro fahatsiarovana ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tamin’ny fitsingerenan’ny taona.
    marker-yv: yv-n
  - type: text
    text: ' nahaterahany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka niditra ny zanakavavin’i Herodiasy ary nandihy ka nahafaly an’i Heroda mbamin’izay niara-nipetraka nihinana teo aminy, dia hoy ny mpanjaka tamin-drazazavavy: Angataho amiko izay tianao na inona na inona, dia homeko anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nianiana taminy hoe izy: Na inona na inona hangatahinao amiko dia homeko anao na dia hatramin’ny antsasaky ny fanjakako aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nivoaka razazavavy ka nanao tamin-dreniny hoe: Inona no hangatahiko? Ary hoy reniny: Ny lohan’i Jaona Mpanao-batisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niditra faingana niaraka tamin’izay izy ho ao amin’ny mpanjaka ka nangataka hoe: Tiako raha homenao ahy faingana eto an-dovia ny lohan’i Jaona Mpanao-batisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nalahelo indrindra ny mpanjaka, kanefa noho ny fianianany sy ny olona izay nipetraka nihinana teo, dia tsy sahy nandà azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary niaraka tamin’izay ny mpanjaka dia naniraka mpiambina, ka nasainy nentiny ny lohan’i Jaona. Ary dia nandeha izy, ka notapahiny tao an-trano-maizina ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nentiny teo an-dovia ny lohany ka nomeny an-drazazavavy; ary razazavavy kosa dia nanome azy an-dreniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary rehefa nandre izany ny mpianany, dia tonga ka naka ny faty ary nandevina azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampihinanan’i Jesosy ny olona tsy omby dimy arivo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 14.13-23; Lio. 9.10-17; Jao. 6.1-15.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ARY ny Apostoly niangona teo amin’i Jesosy ka nilaza taminy izay rehetra efa nataony mbamin’izay nampianariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Jesosy taminy: Avia hianareo hitokana any an-tany foana, ka mialà sasatra kelikely (fa maro no nifamoivoy, ka tsy nisy hihinanana aza). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nandeha an-tsambokely izy hitokana any an-tany foana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny olona nahita azy mandeha, sady betsaka no nahalala an’i Jesosy, dia niala avy teny amin’ny tanàna rehetra ny olona ka nihazakazaka nandeha an-tanety,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nandeha tongotra.
    marker-yv: yv-n
  - type: text
    text: ' dia tonga talohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nony niala Jesosy, dia nahita vahoaka betsaka Izy ka onena azy, fa tahaka ny ondry tsy manana mpiandry ireo; dia nampianatra azy zavatra maro Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary rehefa hariva ny andro, dia nanatona Azy ny mpianany ka nanao hoe: Tany foana ity, ka efa hariva ny andro ankehitriny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ravao ny olona mba hankanesany eny an-tsaha sy eny amin’ny vohitra manodidina hividy hanina ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa Izy namaly ka nanao taminy hoe: Omeonareo hanina izy. Fa hoy kosa izy ireo taminy: Handeha hividy mofo izay azon’ny denaria roan-jato va izahay, ka homenay azy hohaniny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy Izy taminy: Misy mofo firy any aminareo? Andeha, izahao. Ary rehefa fantany, dia hoy izy: Dimy sy hazandrano roa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nasain’i Jesosy nampipetraka ny olona rehetra hatao an-tokotokony eny ambonin’ny ahi-maitso izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nipetraka an-tokony zato sy dimam-polo avy ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary rehefa voarain’i Jesosy ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ny mofo ka natolony ny mpianatra mba harosony eny anoloan’ny olona; ary ny hazandrano roa nozarainy tamin’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary samy nihinana avokoa ny olona rehetra ka voky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary nangoniny izay sombinstombin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny mofo
  - type: text
    text: ' sy ny hazandrano, ka dia nahafeno harona roa ambin’ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary izay nihinana ny mofo dia dimy arivo lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary niaraka tamin’izay Jesosy dia nanery ny mpianany hiondrana an-tsambokely hita hialoha ho any Betsaida, mandra-pandràvany ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary rehefa nanao veloma ny olona Izy, dia lasa nankany an-tendrombohitra hivavaka.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitsangantsanganan’i Jesosy tambonin’ny ranomasina.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 14.24-36; Jao. 6.16-21.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ARY nony hariva ny andro, dia efa mby teo ampovoan’ny ranomasina ny sambokely, ary Izy irery ihany no teo an-tanety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary nahita azy ireo sahirana nivoy fatratra Izy, fa notohain’ny rivotra: ary tokony ho tamin’ny fiambenana fahefatra amin’ny alina dia nankeny aminy nitsangantsangana tambonin’ny ranomasina Jesosy ka nikasa handalo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary rehefa hitany nitsangantsangana tambonin’ny ranomasina Izy, dia nataony ho matoatoa, ka niantso mafy izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa izy rehetra samy nahita Azy avokoa, ka dia raiki-tahotra. Ary izy niteny taminy niaraka tamin’izay ka nanao taminy hoe: Matokia, fa Izaho ihany; aza matahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary niakatra nankeo aminy teo an-tsambokely Izy; dia nitsahatra ny rivotra, ka dia talanjona izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ary tsy fantany ny amin’ny mofo; fa efa mafy ny fony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary nony tafita izy, dia tonga teo amin’ny tany Genesareta ka niantsona teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary raha niala teo an-tsambokely izy, dia nahalala an’i Jesosy niaraka tamin’izay ny olona teo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'ka nihazakazaka tamin’izany tany rehetra izany ary nitondra ny marary tamin’ny fandriana ho any amin’izay reny fa nitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary na taiza na taiza no nidiran’i Jesosy, na tao amin’ny vohitra, na tao an-tanàna, na tany an-tsaha, dia napetraka teo an-kianja ny marary, ary ny olona nangataka hanendry na dia ny somotraviavin-dambany ihany aza; ary sitrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.56 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voavonjy.
    marker-yv: yv-n
  - type: text
    text: ' izay rehetra nanendry Azy.'
