document_id: PSA.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Salamo abidy. Fitarainana sy fangataham-pamonjena noho ny fireharehan’ny ratsy fanahy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: JEHOVAH ô, nahoana no mijanona eny lavitra eny Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miery amin’ny andro fahoriana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Noho ny fireharehan’ny ratsy fanahy dia enjehina mafy ny malahelo;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miolomay manenjika ny malahelo izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azon’ny fihendrena nataony izy ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny ratsy fanahy mandoka izay irin’ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpierina mahafoy sy manamavo an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny ratsy fanahy mirehareha hoe: Tsy hanadina Izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ,,Tsy misy Andriamanitra’’ no tontalin-keviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tanteraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mahery.
    marker-yv: yv-n
  - type: text
    text: ' mandrakariva ny alehany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’ny avo lavitra azy ny fitsaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny mpandrafy azy rehetra dia ataony hoe: Zinona ireny?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izy am-pony: Tsy hangozohozo aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho azon-doza mandrakizay doria aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Feno ozona sy fitaka ary fanaovana an-keriny ny vavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao ambanin’ny lelany dia misy fampahoriana sy faharatsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamitsaka amin’ny fanotrehana ao an-tanàna izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao an-katakonana no amonoany ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masony mikendry ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manotrika ao an-katakonana tahaka ny liona ao amin’ny famitsahany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manotrika hisambotra ny malahelo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrihany amin’ny haratony no fisambony ny malahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Torotoro sy mitanondrika ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka lavo amin’ny herin’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy izy anakampony: Efa nanadino Andriamanitra;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanafina ny tavany Izy ka tsy hahita mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitsangàna, Jehovah ô; Andriamanitra ô, atsangano ny tànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manadino ny ory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nahoana no mamingavinga an’Andriamanitra ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao anakampo hoe: Tsy hanadina Hianao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa nahita ihany Hianao, satria mijery fahoriana sy alahelo, mba hovalian’ny tànanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no iononan’ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no Mpamonjy ny kamboty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Torotoroy ny sandrin’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary adino ny heloky ny mpanao ratsy mandra-paha-tsy hisy hitanao intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jehovah no Mpanjaka mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafongotra tsy ho amin’ny taniny intsony ny jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa nohenoinao, Jehovah ô, ny irin’ny mpandefitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampiomana ny fony Hianao sady mampihaino ny sofinao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hanomezanao rariny ny kamboty sy ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy handroso hampitahotra intsony ny zanak’olombelona etỳ an-tany.
