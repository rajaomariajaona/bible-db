document_id: PSA.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fitarainana sy fangataham-pamonjena noho ny fireharehan’ny ratsy fanahy.
  - type: text
    content: JEHOVAH ô, nahoana no mijanona eny lavitra eny Hianao
  - type: text
    content: Ka miery amin’ny andro fahoriana?
  '10':
  - type: text
    content: Torotoro sy mitanondrika ny mahantra
  - type: text
    content: Ka lavo amin’ny herin’ny ratsy fanahy.
  '11':
  - type: text
    content: 'Hoy izy anakampony: Efa nanadino Andriamanitra;'
  - type: text
    content: Efa nanafina ny tavany Izy ka tsy hahita mandrakizay.
  '12':
  - type: text
    content: Mitsangàna, Jehovah ô; Andriamanitra ô, atsangano ny tànanao;
  - type: text
    content: Aza manadino ny ory.
  '13':
  - type: text
    content: Nahoana no mamingavinga an’Andriamanitra ny ratsy fanahy
  - type: text
    content: 'Ka manao anakampo hoe: Tsy hanadina Hianao?'
  '14':
  - type: text
    content: Efa nahita ihany Hianao, satria mijery fahoriana sy alahelo, mba hovalian’ny tànanao.
  - type: text
    content: Hianao no iononan’ny mahantra;
  - type: text
    content: Hianao no Mpamonjy ny kamboty.
  '15':
  - type: text
    content: Torotoroy ny sandrin’ny ratsy fanahy;
  - type: text
    content: Ary adino ny heloky ny mpanao ratsy mandra-paha-tsy hisy hitanao intsony.
  '16':
  - type: text
    content: Jehovah no Mpanjaka mandrakizay doria;
  - type: text
    content: Voafongotra tsy ho amin’ny taniny intsony ny jentilisa.
  '17':
  - type: text
    content: Efa nohenoinao, Jehovah ô, ny irin’ny mpandefitra;
  - type: text
    content: Mampiomana ny fony Hianao sady mampihaino ny sofinao,
  '18':
  - type: text
    content: Hanomezanao rariny ny kamboty sy ny mahantra,
  - type: text
    content: Mba tsy handroso hampitahotra intsony ny zanak’olombelona etỳ an-tany.
  '2':
  - type: text
    content: Noho ny fireharehan’ny ratsy fanahy dia enjehina mafy ny malahelo;
  - type: note
    content: 'Na: miolomay manenjika ny malahelo izy.'
  - type: text
    content: Azon’ny fihendrena nataony izy ireny.
  '3':
  - type: text
    content: Ny ratsy fanahy mandoka izay irin’ny fony;
  - type: text
    content: Ary ny mpierina mahafoy sy manamavo an’i Jehovah.
  '4':
  - type: text
    content: 'Ny ratsy fanahy mirehareha hoe: Tsy hanadina Izy;'
  - type: text
    content: Eny, ,,Tsy misy Andriamanitra’’ no tontalin-keviny.
  '5':
  - type: text
    content: Tanteraka
  - type: note
    content: Heb. Mahery.
  - type: text
    content: ' mandrakariva ny alehany;'
  - type: text
    content: Any amin’ny avo lavitra azy ny fitsaranao;
  - type: text
    content: 'Ny mpandrafy azy rehetra dia ataony hoe: Zinona ireny?'
  '6':
  - type: text
    content: 'Hoy izy am-pony: Tsy hangozohozo aho,'
  - type: text
    content: Tsy ho azon-doza mandrakizay doria aho.
  '7':
  - type: text
    content: Feno ozona sy fitaka ary fanaovana an-keriny ny vavany;
  - type: text
    content: Ao ambanin’ny lelany dia misy fampahoriana sy faharatsiana.
  '8':
  - type: text
    content: Mamitsaka amin’ny fanotrehana ao an-tanàna izy,
  - type: text
    content: Ao an-katakonana no amonoany ny marina;
  - type: text
    content: Ny masony mikendry ny mahantra.
  '9':
  - type: text
    content: Manotrika ao an-katakonana tahaka ny liona ao amin’ny famitsahany izy;
  - type: text
    content: Manotrika hisambotra ny malahelo izy;
  - type: text
    content: Fandrihany amin’ny haratony no fisambony ny malahelo.
