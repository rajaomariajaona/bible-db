document_id: 2KI.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny namonjena an’i Jerosalema, sy ny nandringanana ny miaramilan’i Sankeriba, mbamin’ny nahafatesan’ny tenany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raha nandre izany Hezekia mpanjaka, dia nandriatra ny fitafiany izy sady nitafy lamba fisaonana ka lasa niditra tao an-tranon’i Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary izy naniraka an’i Eliakima, lehiben’ny tao an-dapa, sy Sebna mpanoratra ary ny lohan’ny mpisorona samy nitafy lamba fisaonana hankany amin’Isaia mpaminany, zanak’i Amoza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary hoy ireo taminy: Izao no lazain’i Hezekia: Andro fahoriana sy famaizana ary fanalam-baraka ity andro ity; fa mby ao am-piterahana ny zaza, nefa tsy misy hery hiterahana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Angamba ho ren’i Jehovah Andriamanitrao ny teny rehetra nataon-dRabsake, izay nirahin’ny mpanjakan’i Asyria tompony hihaika an’Andriamanitra velona, ka mba hovaliany izy noho ny teniny izay efa ren’i Jehovah Andriamanitrao; koa aingao ny fivavakao hamonjy izay mbola sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nankany amin’Isaia ny mpanompon’i Hezekia mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Isaia taminy: Ambarao amin’ny tomponareo hoe: Izao no lazain’i Jehovah: Aza matahotra ny teny efa renao, dia izay nanompan’iretsy ankizilahin’ny mpanjakan’i Asyria iretsy Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa, indro, Izaho efa hanisy fanahy ao anatiny, ary hahare siosio izy ka hiverina ho any amin’ny taniny; dia hataoko lavon-tsabatra any an-taniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia niverina Rabsaka ka nankany Libna, izay nataon’ny mpanjakan’i Asyria fahirano tamin’izay, satria efa reny fa efa niala tany Lakisy ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony ren’i Sankeriba ny amin’i Tiraka, mpanjakan’i Etiopia, nanao hoe: Indro, avy hiady aminao izy, dia naniraka olona indray ho any amin’i Hezekia izy nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no holazainareo amin’i Hezekia, mpanjakan’ny Joda: Aza mety hofitahin’ny Andriamanitrao Izay itokianao hianao hoe: Jerosalema tsy hatolotra eo an-tànan’ny mpanjakan’i Asyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, hianao efa nandre izay nataon’ireo mpanjakan’i Asyria tamin’ny tany rehetra, dia ny nandravany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanaovany herema
    marker-yv: yv-n
  - type: text
    text: ' azy; ka hianao kosa va no ho voavonjy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moa nahavonjy azy va ireo andriamanitry ny firenena noravan’ny razako, dia Gozana sy Harana sy Razefa ary ny taranak’i Edena, izay tao Telasara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aiza ny mpanjakan’i Hamata sy ny mpanjakan’i Arpada ary ny mpanjakan’ny tanàna Sefarvaima sy Hena ary Iva?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia noraisin’i Hezekia tamin’ny tànan’ny iraka ny taratasy ka novakiny, dia niakatra nankao an-tranon’i Jehovah izy ka namelatra iny teo anatrehan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Hezekia nivavaka teo anatrehan’i Jehovah nanao hoe: Ry Jehovah, Andriamanitry ny Isiraely ô, Izay mipetraka amin’ny kerobima, Hianao dia Hianao irery ihany no Andriamanitry ny fanjakana rehetra ambonin’ny tany, fa Hianao no nanao ny lanitra sy ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Atongilano ny sofinao, Jehovah ô, ka mihainoa; ahirato ny masonao, Jehovah ô, ka mijere, ary mandrenesa ny tenin’i Sankeriba, izay nampitondrainy hihaika an’Andriamanitra velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehovah ô, marina ihany tokoa fa ireo mpanjakan’i Asyria dia efa nandrava ny jentilisa sy ny taniny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary efa nanary ny andriamaniny tao anaty afo, satria tsy Andriamanitra ireny, fa asan’ny tànan’olona ihany, dia hazo sy vato; ka dia azony nosimbana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa ankehitriny, Jehovah Andriamanitray ô, mitaraina aminao aho, vonjeo izahay amin’ny tànany, mba hahafantaran’ny fanjakana rehetra ambonin’ny tany fa Hianao dia Hianao irery ihany, Jehovah ô, no Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Isaia, zanak’i Amoza, dia naniraka hankany amin’i Hezekia, nanao hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Ilay fitarainana nataonao tamiko ny amin’i Sankeriba, mpanjakan’i Asyria, dia efa nohenoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no teny nolazain’i Jehovah ny amin’i Sankeriba:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Manao tsinontsinona sy mandatsalatsa anao Ziona, zanakavavy virijina:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihifikifi-doha mahita anao mandositra Jerosalema zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa iza no nohaikainao sy nompanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanohitra an’iza no nanandratanao ny feonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nampiandrandranao ny masonao any ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanohitra ny Iray Masin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny irakao no nihaikanao ny Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny kalesiko maro no niakarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany an-tampon’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao afovoan’i Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hokapaiko ny sedera avo sy ny kypreso voafantina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiditra any amin’ny faran’ny azo iakarana ao aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy any amin’ny alany midokadoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izaho no nihady ka nisotro rano vao niseho,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ranon’ny firenena hafa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny faladiako no handritako ny ony mbamin’ny lahindrano rehetra any Egypta.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mazora.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tsy mbola renao va, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy Jehovah
  - type: text
    text: ', fa hatry ny fony ela no nanomanako izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatramin’ny andro taloha no nikasako izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ankehitriny dia efa nahatanteraka izany Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nandrava tanàna mimànda ho tonga korontam-bato hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary efa tsy nahatohitra ny mponina any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady raiki-tahotra no mangaihay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tahaka ny ahitra any an-tsaha izy ary tahaka ny ahi-maitso
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ahitra eo amin’ny tampon-trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny vary maty raha vao mitsiry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa samy fantatro avokoa ny ipetrahanao sy ny ivoahanao sy ny idiranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahatezeranao amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Satria efa tezitra amiko hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa tonga ato an-tsofiko ny fireharehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hasiako ny masom-biko ny oronao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasiako ny lamboridiko ny vavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampivereniko amin’ny làlana izay nihavianao hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izao no ho famantarana ho anao kosa: Hihinana ny maniry ho azy avy tamin’ny voa mihintsana hianareo iray taona, ary amin’ny taona manaraka dia ny kolokolon’izany, fa amin’ny taona fahatelo kosa dia mamafaza hianareo, ka mijinjà, ary manaova tanimboaloboka, ka mihinana izay vokatra eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary izay sisa amin’ny taranak’i Joda dia mbola hamaka lalindalina kokoa sady hisondrotra hamoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa hisy sisa hiseho avy any Jerosalema sy sisa afaka avy any an-tendrombohitra Ziona; ny fahasaro-piaron’i Jehovah, Tompon’ny maro, no hanao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa izao no lazain’i Jehovah ny amin’ny mpanjakan’i Asyria: Tsy ho tafiditra amin’ity tanàna ity izy, na handefa zana-tsipìka ho ato, na hitondra ampinga eo anoloany, na hanandratra tovon-tany hamelezany ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny làlana izay nihaviany ihany no hiverenany, fa tsy ho tafiditra amin’ity tanàna ity izy, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa hiaro ity tanàna ity Aho ka hamonjy azy noho ny amin’ny tenako sy Davida mpanompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary tamin’ny alin’io dia avy ilay Anjelin’i Jehovah ka namely olona dimy arivo amby valo alina sy iray hetsy tao an-tobin’ny Asyriana; ary nony maraina koa vao nifoha olona, dia hita fa, indreo, efa maty avokoa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia niainga Sankeriba, mpanjakan’i Asyria, ka lasa nody ary nitoetra tany Ninive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary raha niankohoka tao an-tranon’i Nisroka andriamaniny izy, dia nasian’i Adrameleka sy Sarezera zanani-lahy ny sabatra izy; ary dia afaka nandositra nankany amin’ny tany Ararata izy mirahalahy. Ary Esara-hadona zanani-lahy no nanjaka nandimby azy.
