document_id: REV.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Jerosalema vaovao.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY nahita lanitra vaovao sy tany vaovao aho; fa efa lasa ny lanitra voalohany sy ny tany voalohany, ary ny ranomasina dia tsy misy intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nahita aho fa, indro, ny tanàna masina, dia Jerosalema vaovao, nidina avy any an-danitra tamin’Andriamanitra, voaomana tahaka ny ampakarina efa mihaingo hihaona amin’ny vadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nahare feo mahery avy teo amin’ny seza fiandrianana aho nanao hoe: Indro, ny tabernakelin’Andriamanitra dia eo amin’ny olona, ary Izy hitoetra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hitoetra an-day.
    marker-yv: yv-n
  - type: text
    text: ' eo aminy, ary ireo ho olony, ary Andriamanitra no hitoetra eo aminy, dia ho Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hofafany ny ranomaso rehetra amin’ny masony; ary tsy hisy fahafatesana intsony, sady tsy hisy alahelo, na fitarainana, na fanaintainana; fa efa lasa ny zavatra taloha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Ilay mipetraka eo ambonin’ny seza fiandrianana: Indro, havaoziko ny zavatra rehetra. Ary hoy koa Izy: Soraty; fa mahatoky sy marina ireo teny ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy koa Izy tamiko: Tanteraka ireo. Izaho no Alfa sy Omega, ny fiandohana sy ny fiafarana. Izaho hanome maimaimpoana amin’ny loharanon’ny ranon’aina ho an’izay mangetaheta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay maharesy no handova izany zavatra izany; ary ho Andriamaniny Aho, ary izy ho zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny osa sy ny tsy mino sy ny vetaveta sy ny mpamono olona sy ny mpijangajanga sy ny mpanao ody ratsy sy ny mpanompo sampy ary ny mpandainga rehetra dia hanana ny anjarany ao anatin’ny farihy mirehitra afo sy solifara; izany no fahafatesana faharoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tonga ny anankiray tamin’ny anjely fito izay nanana ny lovia fito, dia ireo nitondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feno.
    marker-yv: yv-n
  - type: text
    text: ' ny loza fito farany ka nanao tamiko hoe: Avia etỳ, dia hasehoko anao ny ampakarina, vadin’ny Zanak’ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nitondra ahy tamin’ny Fanahy ho any an-tendrombohitra sady lehibe no avo izy ka naneho ahy ny tanàna masina, dia Jerosalema, midina avy tamin’Andriamanitra any an-danitra, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sady manana ny voninahitr’Andriamanitra izy; ny famirapirany dia tahaka ny vato soa indrindra, dia tahaka ny vato jaspy, manganohano toy ny vato krystaly; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary manana mànda lehibe sady avo sy vavahady roa ambin’ny folo izy, ary eo amin’ny vavahady dia misy anjely roa ambin’ny folo, ary misy anarana voasoratra eo, dia ny an’ny firenena roa ambin’ny folo amin’ny Zanak’Isiraely; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'eo atsinanana vavahady telo; eo avaratra vavahady telo; eo atsimo vavahady telo; eo andrefana vavahady telo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny màndan’ny tanàna dia misy fanorenana roa ambin’ny folo, ary misy anarana roa ambin’ny folo koa eo, dia ny an’ny Apostoly roa ambin’ny folon’ny Zanak’ondry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ilay niteny tamiko dia nanana fandrefesana volotara volamena handrefesany ny tanàna sy ny vavahadiny ary ny màndany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny tanàna dia efa-joro, ka mitovy ny lavany sy ny sakany; ary nandrefy ny tanàna tamin’ny volotara izy, ka roa arivo sy iray alina stadio. Mitovy ny lavany sy ny sakany ary ny hahavony. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nandrefy ny màndany izy, ka efatra amby efa-polo amby zato hakiho, araka ny refin’ny olona, dia ny an’ny anjely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny màndany dia vato jaspy; ary ny tanàna dia tena volamena, toy ny fitaratra madio. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny fanorenan’ny màndan’ny tanàna dia voaravaka vato soa samy hafa rehetra. Ny fanorenana voalohany jaspy, ny faharoa safira, ny fahatelo kalkedona, ny fahefatra emeralda, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny fahadimy sardonyksa, ny fahenina karneola, ny fahafito krysolita, ny fahavalo beryla, ny fahasivy topaza, ny fahafolo krysopraso, ny fahiraika ambin’ny folo hyakinta, ny faharoa ambin’ny folo ametysta. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny vavahady roa ambin’ny folo dia pèrila roa ambin’ny folo; pèrila iray avy ny isam-bavahady; ary ny làlambe teo an-tanàna dia tena volamena, toy ny fitaratra manganohano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tsy nahita tempoly teo aho; fa ny Tompo Andriamanitra, dia ny Tsitoha, sy ny Zanak’ondry no tempoliny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny tanàna tsy mba mila ny masoandro na ny volana hamirapiratra aminy; fa ny voninahitr’Andriamanitra no nanazava azy, ary ny Zanak’ondry no fanazavana azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jirony.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny firenena maro no handeha amin’ny fahazavany; ary ny mpanjakan’ny tany dia mitondra ny voninahiny ho ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny vavahadiny tsy harindrina akory amin’ny andro (fa tsy mba hisy alina ao). '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny voninahitra sy ny hajan’ny firenena maro dia ho entina ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tsy mba hiditra ao mihitsy izay tsy masina, na izay manao vetaveta, na izay mandainga, fa izay voasoratra ao anatin’ny bokin’ny fiainana izay an’ny Zanak’ondry ihany.
