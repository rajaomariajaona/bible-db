document_id: PSA.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny avalin’ny mahery finoana izay sakaizany saro-tahotra.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida.
  - type: text
    content: JEHOVAH no ialofako;
  - type: text
    content: 'Ahoana no anaovanareo amin’ny fanahiko hoe:'
  - type: text
    content: Mandosira ho any an-tendrombohitrareo toy ny voron-kely?
  - type: note
    content: 'Na: ry voron-kely.'
  '2':
  - type: text
    content: Fa, indro, ny ratsy fanahy manenjana ny tsipìkany;
  - type: text
    content: Efa nanamboatra ny zana-tsipìkany eo amin’ny kofehy izy,
  - type: text
    content: Nikendry tao amin’ny maizina hitifitra ny mahitsy fo.
  '3':
  - type: text
    content: Fa rava ny fanorenana,
  - type: note
    content: 'Na: voazera ny andry.'
  - type: text
    content: Ka inona indray no azon’ny marina atao?
  '4':
  - type: text
    content: Jehovah dia ao amin’ny tempoliny masina,
  - type: text
    content: Ny seza fiandrianan’i Jehovah dia any an-danitra;
  - type: text
    content: Ny masony mijery, eny, ny hodi-masony mizaha toetra ny zanak’olombelona.
  '5':
  - type: text
    content: Jehovah mizaha toetra ny marina;
  - type: text
    content: Fa ny ratsy fanahy sy ny mifaly hampidi-doza dia samy halan’ny fanahiny.
  '6':
  - type: text
    content: Handatsaka fandrika amin’ny ratsy fanahy Izy tahaka ny fandatsaka ranonorana;
  - type: text
    content: Afo sy solifara ary rivo-mahamay no ho anjara kapoakany.
  '7':
  - type: text
    content: Fa marina Jehovah, ka fahamarinana no tiany;
  - type: text
    content: Ny mahitsy no hahita ny tavany.
  - type: note
    content: 'Na: Ny mahitsy no hitan’ny tavany.'
