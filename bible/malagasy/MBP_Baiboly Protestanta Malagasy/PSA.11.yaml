segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny avalin’ny mahery finoana izay sakaizany saro-tahotra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH no ialofako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ahoana no anaovanareo amin’ny fanahiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandosira ho any an-tendrombohitrareo toy ny voron-kely?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ry voron-kely.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa, indro, ny ratsy fanahy manenjana ny tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanamboatra ny zana-tsipìkany eo amin’ny kofehy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nikendry tao amin’ny maizina hitifitra ny mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa rava ny fanorenana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voazera ny andry.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka inona indray no azon’ny marina atao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jehovah dia ao amin’ny tempoliny masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny seza fiandrianan’i Jehovah dia any an-danitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masony mijery, eny, ny hodi-masony mizaha toetra ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah mizaha toetra ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ratsy fanahy sy ny mifaly hampidi-doza dia samy halan’ny fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Handatsaka fandrika amin’ny ratsy fanahy Izy tahaka ny fandatsaka ranonorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afo sy solifara ary rivo-mahamay no ho anjara kapoakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa marina Jehovah, ka fahamarinana no tiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mahitsy no hahita ny tavany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny mahitsy no hitan’ny tavany.
    marker-yv: yv-n
