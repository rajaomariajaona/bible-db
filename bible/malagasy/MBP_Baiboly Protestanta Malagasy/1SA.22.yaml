document_id: 1SA.22
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nirenirenen’i Davida tany Joda sy Moaba, ary ny namonoan’i Saoly ny mpisorona maro.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Davida niala teo ka nandositra nankany amin’ny zohin’i Adolama: ary nony nandre izany ny rahalahiny sy ny mpianakavin-drainy, dia nidina tany aminy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary izay mahantra rehetra sy izay mpitrosa rehetra ary izay manana alahelo am-po rehetra dia nivory tao aminy, ary izy no tonga mpifehy azy; ka dia tonga tokony ho efa-jato lahy ny tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida niala tao nankany Mizpa any Moaba ka nanao tamin’ny mpanjakan’i Moaba hoe: Masìna hianao, avelao ny raiko sy ny reniko ho avy atỳ hitoetra etỳ aminao ambara-pahafantatro izay hataon’Andriamanitra amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary dia nentiny ho eo anatrehan’ny mpanjakan’i Moaba izy ireo ka nonina teo aminy tamin’ny andro rehetra nitoeran’i Davida tao amin’ny batery fiarovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Gada mpaminany tamin’i Davida: Aza mitoetra ao amin’ny batery fiarovana; fa mialà, ka mankanesa any amin’ny tanin’ny Joda. Dia nandeha Davida ka tonga tany an-ala Hareta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ren’i Saoly fa hita Davida sy ny olona nanaraka azy (nipetraka tao Gibea teo ambanin’ny hazo tamariska teo an-kavoana Saoly tamin’izay, sady nisy lefona teny an-tànany, ary ny mpanompony rehetra nitsangana teo anoloany), '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia hoy Saoly tamin’ny mpanompony izay teo anoloany: Henoy kely, ry taranak’i Benjamina: Moa hianareo rehetra koa mba homen’ny zanak’i Jese saha sy tanimboaloboka, ary mba hataony mpifehy arivo sy mpifehy zato hianareo rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: no dia miray tetika hanohitra ahy hianareo rehetra, ka tsy nisy nanambara tamiko fa ny zanako nanao fanekena tamin’ny zanak’i Jese, ary tsy nisy nalahelo ahy akory hianareo, na nanambara tamiko fa ny zanako efa nanome fo ny mpanompoko ho mpanotrika ahy tahaka ny amin’izao anio izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Doega Edomita, mpifehy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay nitsangana teo amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanompon’i Saoly, namaly ka nanao hoe: Nahita ny zanak’i Jese tonga tany Noba aho tany amin’i Ahimeleka, zanak’i Ahitoba. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Ahimeleka nanontany ho azy tamin’i Jehovah sady nanome azy vatsy; ary nomeny azy koa ny sabatr’i Goliata Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpanjaka dia naniraka naka an’i Ahimeleka mpisorona, zanak’i Ahitoba, sy ny tarana-drainy rehetra, izay mpisorona, tao Noba; ka dia tonga tany amin’ny mpanjaka izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Saoly: Mba mihainoa hianao, ry zanak’i Ahitoba. Ary izy namaly hoe: Inty aho, tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Saoly taminy: Nahoana hianareo no niray tetika hanohitra ahy, dia hianao sy ny zanak’i Jese, tamin’ilay nanomezanao azy mofo sy sabatra ary nanontanianao ho azy tamin’Andriamanitra hahatongavany ho mpanotrika ahy tahaka ny amin’izao anio izao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Ahimeleka namaly ny mpanjaka hoe: Iza moa amin’ny mpanomponao rehetra no mba mahatoky tahaka an’i Davida, izay vinanton’ny mpanjaka sady mpanolo-tsaina anao sy malaza ao an-tranonao? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary vao izay va no nanontaniako ho azy tamin’Andriamanitra? Sanatria ahy izany! Aoka ny mpanjaka tsy hanome tsiny ny mpanompony na ny tarana-draiko rehetra; fa ny mpanomponao tsy nahalala na inona na inona ny amin’izany rehetra izany, na kely na be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy ny mpanjaka: Hatao maty tokoa hianao, ry Ahimeleka, dia hianao sy ny tarana-drainao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hoy ny mpanjaka tamin’ny mpiambina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpihazakazaka.
    marker-yv: yv-n
  - type: text
    text: ' izay teo anoloany: Mihodìna, ka vonoy ny mpisoron’i Jehovah; fa ny tànan’ireo koa momba an’i Davida, satria fantany ihany fa nandositra izy, nefa tsy nambarany tamiko izany. Fa ny mpanompon’ny mpanjaka tsy nety naninjitra ny tànany hamely ny mpisoron’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Doega: Mihodìna hianao, ka asio ny mpisorona. Ary Doega Edomita nihodina ka namely ny mpisorona, dia nahafaty olona dimy amby valo-polo izay nisalotra efoda rongony fotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nasiany tamin’ny lelan-tsabatra koa Noba, tanànan’ny mpisorona, dia ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono, ny omby sy ny boriky ary ny ondry aman-osy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny anankiray tamin’ny zanak’i Ahimeleka, zanak’i Ahitoba, Abiatara no anarany, dia afa-nandositra ka nanaraka an’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Abiatara nanambara tamin’i Davida ny namonoan’i Saoly ny mpisoron’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Davida tamin’i Abiatara: Fantatro androtriny ihany fa tao Doega Edomita ka hilaza amin’i Saoly tokoa; koa izaho no anton’ny nahafaty ny olona rehetra tamin’ny tarana-drainao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tomoera etỳ amiko, ka aza matahotra; fa izay mikatsaka ny aiko no mikatsaka ny ainao koa; fa eto amiko no hahavoavonjy anao.
