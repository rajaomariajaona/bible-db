document_id: ISA.52
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hanafahana an’i Jerosalema amin’ny fahandevozana sy ny fatorana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIFOHAZA, mifohaza, tafio ny herinao, ry Ziona ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafio ny fitafianao tsara tarehy, ry Jerosalema ô, tanàna masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hiditra any aminao intsony ny tsy voafora sy ny maloto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ahintsano ny vovoka hiala amin’ny tenanao, ka mitsangàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mipetraha, ry Jerosalema ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vahao ny fatorana amin’ny tendanao, ry Ziona, zanakavavy babo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy vola tsy harena no nivarotana anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy vola tsy harena koa no hanavotana anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany Egypta no nidinan’ny oloko tamin’ny voalohany mba hivahiny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Asyriana koa nampahory azy tsy ahoan-tsy ahoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ankehitriny inona no hataoko eto? hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nobaboina tsy ahoan-tsy ahoana ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanapaka azy dia manakora, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandrakariva dia hamavoina mandritra ny andro ny anarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa ny oloko dia hahalala ny anarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’izany andro izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eny, ho fantany amin’izany andro izany Aho.
    marker-yv: yv-n
  - type: text
    text: ' dia ho fantany fa Izaho no miteny hoe: Inty Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Akory ny hatsaran’ny tongotr’irỳ mitondra teny soa mahafaly erỳ an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitory fiadanana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mitondra teny soa mahafaly
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitory famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, izay manao amin’i Ziona hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanjaka Andriamanitrao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Injany ny feon’ny mpitilinao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manandratra ny feony izy ka miara-mihoby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho faly izy mahita mifanatri-maso
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hodian’i Jehovah ho any Ziona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Velomy ny hoby, ry fitoeran-drava any Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah efa nampionona ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady efa nanavotra an’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jehovah efa nampiseho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampitanjaka.
    marker-yv: yv-n
  - type: text
    text: ' ny sandriny masina teo imason’ny firenena rehetra;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny faran’ny tany rehetra hahita ny famonjen’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mialà, mialà hianareo, mivoaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mikasika izay maloto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaha avy eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Madiova, hianareo izay mitondra ny fanak’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa tsy tampoka no hivoahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy lositra no handehananareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no hitarika anareo eo aloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitry ny Isiraely no ho vodi-làlanareo.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Mpanompon’i Jehovah, dia ny zava-mahagaga nataony, sy ny nandavan’ny maro Azy, sy ny fahoriana nentiny, sy ny avotra vitany, ary ny voninahitra homena Azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: INDRO, ny Mpanompoko ho hita ho hendry,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hambinina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisandratra sy ho ambony Izy ka ho avo indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa toy ny nigagan’ny maro Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Ny tarehiny dia simba ka hoatra ny tsy tarehin’olombelona akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny endriny hoatra ny tsy endriky ny zanak’olombelona),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia toy izany no hampihendratrendratany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanafànany.
    marker-yv: yv-n
  - type: text
    text: ' ny firenena maro;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanjaka hitampim-bava aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay tsy mbola nolazaina tamin’ireny no ho hitany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tsy mbola reny akory no hosaintsaininy.
