document_id: ISA.52,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanafahana an’i Jerosalema amin’ny fahandevozana sy ny fatorana.
  - type: text
    content: MIFOHAZA, mifohaza, tafio ny herinao, ry Ziona ô;
  - type: text
    content: Tafio ny fitafianao tsara tarehy, ry Jerosalema ô, tanàna masina;
  - type: text
    content: Fa tsy hiditra any aminao intsony ny tsy voafora sy ny maloto.
  '10':
  - type: text
    content: Jehovah efa nampiseho
  - type: note
    content: Heb. nampitanjaka.
  - type: text
    content: ' ny sandriny masina teo imason’ny firenena rehetra;'
  - type: text
    content: Ary ny faran’ny tany rehetra hahita ny famonjen’Andriamanitsika.
  '11':
  - type: text
    content: Mialà, mialà hianareo, mivoaha,
  - type: text
    content: Aza mikasika izay maloto,
  - type: text
    content: Mivoaha avy eo aminy;
  - type: text
    content: Madiova, hianareo izay mitondra ny fanak’i Jehovah.
  '12':
  - type: text
    content: Fa tsy tampoka no hivoahanareo,
  - type: text
    content: Ary tsy lositra no handehananareo;
  - type: text
    content: Fa Jehovah no hitarika anareo eo aloha,
  - type: text
    content: Ary Andriamanitry ny Isiraely no ho vodi-làlanareo.
  - type: heading
    content: Ny amin’ny Mpanompon’i Jehovah, dia ny zava-mahagaga nataony, sy ny nandavan’ny maro Azy, sy ny fahoriana nentiny, sy ny avotra vitany, ary ny voninahitra homena Azy.
  '13':
  - type: text
    content: INDRO, ny Mpanompoko ho hita ho hendry,
  - type: note
    content: Heb. hambinina.
  - type: text
    content: Hisandratra sy ho ambony Izy ka ho avo indrindra.
  '14':
  - type: text
    content: Fa toy ny nigagan’ny maro Anao
  - type: text
    content: (Ny tarehiny dia simba ka hoatra ny tsy tarehin’olombelona akory,
  - type: text
    content: Ary ny endriny hoatra ny tsy endriky ny zanak’olombelona),
  '15':
  - type: text
    content: Dia toy izany no hampihendratrendratany
  - type: note
    content: Heb. hanafànany.
  - type: text
    content: ' ny firenena maro;'
  - type: text
    content: Ny mpanjaka hitampim-bava aminy;
  - type: text
    content: Fa izay tsy mbola nolazaina tamin’ireny no ho hitany,
  - type: text
    content: Ary izay tsy mbola reny akory no hosaintsaininy.
  '2':
  - type: text
    content: Ahintsano ny vovoka hiala amin’ny tenanao, ka mitsangàna,
  - type: text
    content: Ary mipetraha, ry Jerosalema ô;
  - type: text
    content: Vahao ny fatorana amin’ny tendanao, ry Ziona, zanakavavy babo.
  '3':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Tsy vola tsy harena no nivarotana anareo,
  - type: text
    content: Ka dia tsy vola tsy harena koa no hanavotana anareo.
  '4':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Tany Egypta no nidinan’ny oloko tamin’ny voalohany mba hivahiny tany;
  - type: text
    content: Ary ny Asyriana koa nampahory azy tsy ahoan-tsy ahoana.
  '5':
  - type: text
    content: Ary ankehitriny inona no hataoko eto? hoy Jehovah,
  - type: text
    content: Fa nobaboina tsy ahoan-tsy ahoana ny oloko;
  - type: text
    content: Ny mpanapaka azy dia manakora, hoy Jehovah;
  - type: text
    content: Ary mandrakariva dia hamavoina mandritra ny andro ny anarako.
  '6':
  - type: text
    content: Koa ny oloko dia hahalala ny anarako;
  - type: text
    content: Eny, amin’izany andro izany
  - type: note
    content: 'Na: Eny, ho fantany amin’izany andro izany Aho.'
  - type: text
    content: ' dia ho fantany fa Izaho no miteny hoe: Inty Aho.'
  '7':
  - type: text
    content: Akory ny hatsaran’ny tongotr’irỳ mitondra teny soa mahafaly erỳ an-tendrombohitra
  - type: text
    content: Sady mitory fiadanana!
  - type: text
    content: Dia izay mitondra teny soa mahafaly
  - type: text
    content: Sady mitory famonjena,
  - type: text
    content: 'Eny, izay manao amin’i Ziona hoe:'
  - type: text
    content: Mpanjaka Andriamanitrao!
  '8':
  - type: text
    content: Injany ny feon’ny mpitilinao!
  - type: text
    content: Manandratra ny feony izy ka miara-mihoby;
  - type: text
    content: Fa ho faly izy mahita mifanatri-maso
  - type: text
    content: Ny hodian’i Jehovah ho any Ziona.
  '9':
  - type: text
    content: Velomy ny hoby, ry fitoeran-drava any Jerosalema;
  - type: text
    content: Fa Jehovah efa nampionona ny olony
  - type: text
    content: Sady efa nanavotra an’i Jerosalema.
