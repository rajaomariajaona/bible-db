document_id: NUM.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanomezan’i Miriama sy Arona tsiny an’i Mosesy, sy ny nataon’Andriamanitra tamin’izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Miriama sy Arona niteny nanaome tsiny an’i Mosesy noho ny vehivavy Kosita izay efa nampakariny; fa efa nampakatra vehivavy Kosita izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rahona niala tamin’ny trano-lay; ary, indro, boka Miriama ka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fotsy
    - type: text
      text: ' tahaka ny oram-panala; ary Arona dia nijery an’i Miriama, ka indro fa boka izy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Arona tamin’i Mosesy: Indrisy, tompoko, masìna hianao, aza atao ho helokay ny nanaovanay adaladala sy ny nanotanay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza dia avela ho toy ny maty izy, izay lany ny antsasaky ny nofony, raha vao teraka izy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy dia nitaraina tamin’i Jehovah ka nanao hoe: Andriamanitra ô, mifona aminao aho, mba sitrano re izy! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin’i Mosesy: Raha nandrora tamin’ny tavany rainy, moa tsy ho menatra hafitoana va izy? koa atokàny any ivelan’ny toby hafitoana izy, ary rehefa afaka izany, dia ampidiro indray. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natokana tany ivelan’ny toby hafitoana Miriama; ary ny olona tsy niainga, raha tsy efa nampidirina Miriama.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa afaka izany, dia niainga niala tany Hazerota ny olona ka nitoby tany an-efitra Parana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy mianadahy: Moa Mosesy ihany va no efa nitenenan’i Jehovah? tsy izahay koa va no nitenenany? Dia ren’i Jehovah izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy dia lehilahy nalemy fanahy mihoatra noho ny olona rehetra atỳ ambonin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah dia niteny tampoka tamin’i Mosesy sy Arona ary Miriama hoe: Mivoaha hianareo telo mianadahy ho any amin’ny trano-lay fihaonana. Dia nivoaka izy telo mianadahy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary andri-rahona no nidinan’i Jehovah, ka nitsangana teo am-baravaran’ny trano-lay Izy; dia niantso an’i Arona sy Miriama Izy, ka nivoaka izy mianadahy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy: Mba mihainoa ny teniko: Raha misy mpaminanin’i Jehovah eo aminareo, dia amin’ny fahitana no hisehoako aminy, ary amin’ny nofy no hitenenako aminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy toy izany kosa Mosesy mpanompoko, izay mahatoky amin’ny tranoko rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifanatrika no itenenako aminy, dia amin’ny fahitana, fa tsy amin’ny teny saro-pantarina, ary mijery ny endrik’i Jehovah izy; ka nahoana hianareo no tsy natahotra hanome tsiny an’i Mosesy mpanompoko?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra ny fahatezeran’i Jehovah tamin’izy mianadahy, ka niala Izy. '
