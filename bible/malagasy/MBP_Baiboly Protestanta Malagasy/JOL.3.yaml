document_id: JOL.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny handatsahana ny Fanahy Masina, sy ny hitsarana ny firenena rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY rehefa afaka izany, dia handatsaka ny Fanahiko amin’ny nofo rehetra Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia haminany ny zanakalahinareo sy ny zanakavavinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lahi-antitrareo hanonofy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zatovonareo hahita fahitana;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary na dia ny mpanompolahy sy ny mpanompovavy aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia handatsahako ny Fanahiko amin’izany andro izany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary hanisy fahagagana eny amin’ny lanitra sy etỳ amin’ny tany Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ra sy afo ary setroka mitankosina.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny masoandro hampodina ho aizina, ary ny volana ho ra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alohan’ny hahatongavan’ny andron’i Jehovah, izay sady lehibe no mahatsiravina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary na zovy na zovy no hiantso ny anaran’i Jehovah dia ho afa-mandositra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ao an-tendrombohitra Ziona sy any Jerosalema dia hisy sisa afaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay efa voalazan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay antsoin’i Jehovah dia ho isan’izay afa-mandositra.
