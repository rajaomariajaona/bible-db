document_id: JOL.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny handatsahana ny Fanahy Masina, sy ny hitsarana ny firenena rehetra.
  - type: text
    content: ARY rehefa afaka izany, dia handatsaka ny Fanahiko amin’ny nofo rehetra Aho;
  - type: text
    content: Dia haminany ny zanakalahinareo sy ny zanakavavinareo,
  - type: text
    content: Ny lahi-antitrareo hanonofy,
  - type: text
    content: Ary ny zatovonareo hahita fahitana;
  '2':
  - type: text
    content: Ary na dia ny mpanompolahy sy ny mpanompovavy aza
  - type: text
    content: Dia handatsahako ny Fanahiko amin’izany andro izany.
  '3':
  - type: text
    content: Ary hanisy fahagagana eny amin’ny lanitra sy etỳ amin’ny tany Aho,
  - type: text
    content: Dia ra sy afo ary setroka mitankosina.
  '4':
  - type: text
    content: Ny masoandro hampodina ho aizina, ary ny volana ho ra,
  - type: text
    content: Alohan’ny hahatongavan’ny andron’i Jehovah, izay sady lehibe no mahatsiravina.
  '5':
  - type: text
    content: Ary na zovy na zovy no hiantso ny anaran’i Jehovah dia ho afa-mandositra;
  - type: text
    content: Fa ao an-tendrombohitra Ziona sy any Jerosalema dia hisy sisa afaka,
  - type: text
    content: Araka izay efa voalazan’i Jehovah,
  - type: text
    content: Ary izay antsoin’i Jehovah dia ho isan’izay afa-mandositra.
