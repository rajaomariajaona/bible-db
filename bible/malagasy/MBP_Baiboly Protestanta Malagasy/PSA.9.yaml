document_id: PSA.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Salamo abidy. Fiderana an’Andriamanitra, Mpitsara marina, sy fahatokiana Azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira, Almoth-laben. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: HIDERA an’i Jehovah amin’ny foko rehetra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanambara ny fahagaganao rehetra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho faly sy ho ravoravo aminao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hankalaza ny anaranao aho ry Avo Indrindra ô,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Satria lasa nihodina ny fahavaloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nirepirepy izy ka ringana tsy ho eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa nitsara ahy Hianao ka nanome ahy ny rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraka eo amin’ny seza fitsaranao Hianao ho Mpitsara marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa nanarinao mafy ny jentilisa, efa naringanao ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny anarany efa nokosehinao ho faty mandrakizay doria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny amin’ny fahavalo, dia tanteraka ho mandrakizay ny fandravana azy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ry fahavalo tanteraka ho mandrakizay ny fandravana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tanàna efa noravanao, dia very na dia ny fahatsiarovana azy aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa Jehovah mitoetra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nametraka ny sezany hitsarany Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Izy hitsara izao tontolo izao amin’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hitsara ny firenena amin’ny fahitsiana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ka dia Jehovah no ho fiarovana avo ho an’ny mahantra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fiarovana avo amin’ny andro fahoriana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary hatoky Anao izay mahalala ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy foinao izay mitady Anao, Jehovah ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mankalazà an’i Jehovah, Izay mitoetra any Ziona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao any amin’ny firenena ny asany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Izay manadin-dra dia mahatsiaro ny ory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manadino ny fitarainany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mamindrà fo amiko, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsinjova ny fahoriako avy amin’izay mankahala ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Mpanandratra ahy ho afaka amin’ny vavahadin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mba holazaiko avokoa ny fiderana Anao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo am-bavahadin’i Ziona zanakavavy no hifaliako amin’ny famonjenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny jentilisa efa latsaka tamin’ny lavaka izay nohadiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fandrika harato izay nafeniny efa nahazo ny tongony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jehovah efa nanao izay mampiseho ny tenany ho Mpitsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namandrika ny ratsy fanahy tamin’ny asan’ny tànany Izy.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Higaiona. Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiverina ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ny ratsy fanahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny jentilisa rehetra izay manadino an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa tsy ho mandrakizay no hanadinoana ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho very mandrakizay ny fanantenan’ny mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mitsangàna, Jehovah ô, aoka tsy hahery ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hotsaraina eo anatrehanao ny jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Asio fampahatahorana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fampianarana.
    marker-yv: yv-n
  - type: text
    text: ' izy, Jehovah ô;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho fantatry ny jentilisa fa olona ihany izy.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
