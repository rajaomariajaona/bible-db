document_id: PSA.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fiderana an’Andriamanitra, Mpitsara marina, sy fahatokiana Azy.
  - type: text
    content: Ho an’ny mpiventy hira, Almoth-laben. Salamo nataon’i Davida.
  - type: text
    content: HIDERA an’i Jehovah amin’ny foko rehetra aho;
  - type: text
    content: Hanambara ny fahagaganao rehetra aho.
  '10':
  - type: text
    content: Ary hatoky Anao izay mahalala ny anaranao;
  - type: text
    content: Fa tsy foinao izay mitady Anao, Jehovah ô.
  '11':
  - type: text
    content: Mankalazà an’i Jehovah, Izay mitoetra any Ziona;
  - type: text
    content: Ambarao any amin’ny firenena ny asany.
  '12':
  - type: text
    content: Fa Izay manadin-dra dia mahatsiaro ny ory;
  - type: text
    content: Tsy manadino ny fitarainany Izy.
  '13':
  - type: text
    content: Mamindrà fo amiko, Jehovah ô;
  - type: text
    content: Mitsinjova ny fahoriako avy amin’izay mankahala ahy,
  - type: text
    content: Ry Mpanandratra ahy ho afaka amin’ny vavahadin’ny fahafatesana,
  '14':
  - type: text
    content: Mba holazaiko avokoa ny fiderana Anao rehetra;
  - type: text
    content: Eo am-bavahadin’i Ziona zanakavavy no hifaliako amin’ny famonjenao.
  '15':
  - type: text
    content: Ny jentilisa efa latsaka tamin’ny lavaka izay nohadiny;
  - type: text
    content: Ny fandrika harato izay nafeniny efa nahazo ny tongony,
  '16':
  - type: text
    content: Jehovah efa nanao izay mampiseho ny tenany ho Mpitsara;
  - type: text
    content: Namandrika ny ratsy fanahy tamin’ny asan’ny tànany Izy.
  - type: text
    content: '[Higaiona. Sela.]'
  '17':
  - type: text
    content: Hiverina ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny ratsy fanahy,'
  - type: text
    content: Dia ny jentilisa rehetra izay manadino an’Andriamanitra.
  '18':
  - type: text
    content: Fa tsy ho mandrakizay no hanadinoana ny malahelo;
  - type: text
    content: Ary tsy ho very mandrakizay ny fanantenan’ny mahantra.
  '19':
  - type: text
    content: Mitsangàna, Jehovah ô, aoka tsy hahery ny olona;
  - type: text
    content: Aoka hotsaraina eo anatrehanao ny jentilisa.
  '2':
  - type: text
    content: Ho faly sy ho ravoravo aminao aho;
  - type: text
    content: Hankalaza ny anaranao aho ry Avo Indrindra ô,
  '20':
  - type: text
    content: Asio fampahatahorana
  - type: note
    content: 'Na: fampianarana.'
  - type: text
    content: ' izy, Jehovah ô;'
  - type: text
    content: Aoka ho fantatry ny jentilisa fa olona ihany izy.
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Satria lasa nihodina ny fahavaloko,
  - type: text
    content: Nirepirepy izy ka ringana tsy ho eo anatrehanao.
  '4':
  - type: text
    content: Fa efa nitsara ahy Hianao ka nanome ahy ny rariny;
  - type: text
    content: Mipetraka eo amin’ny seza fitsaranao Hianao ho Mpitsara marina.
  '5':
  - type: text
    content: Efa nanarinao mafy ny jentilisa, efa naringanao ny ratsy fanahy;
  - type: text
    content: Ny anarany efa nokosehinao ho faty mandrakizay doria.
  '6':
  - type: text
    content: Ny amin’ny fahavalo, dia tanteraka ho mandrakizay ny fandravana azy;
  - type: note
    content: 'Na: Ry fahavalo tanteraka ho mandrakizay ny fandravana.'
  - type: text
    content: Ary izay tanàna efa noravanao, dia very na dia ny fahatsiarovana azy aza.
  '7':
  - type: text
    content: Kanefa Jehovah mitoetra mandrakizay,
  - type: text
    content: Efa nametraka ny sezany hitsarany Izy,
  '8':
  - type: text
    content: Ary Izy hitsara izao tontolo izao amin’ny fahamarinana,
  - type: text
    content: Eny, hitsara ny firenena amin’ny fahitsiana Izy.
  '9':
  - type: text
    content: Ka dia Jehovah no ho fiarovana avo ho an’ny mahantra,
  - type: text
    content: Ho fiarovana avo amin’ny andro fahoriana Izy.
