document_id: 2SA.19,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary dia niontana terỳ ny fon’ny mpanjaka, ka niakatra nankeo amin’ny efi-trano teo ambony vavahady izy sady nitomany teny am-pandehanana ka nanao hoe: Ry Absaloma, zanako, zanako, ry Absaloma, zanako ô! Inay anie aho no maty nisolo anao, ry Absaloma zanako, zanako ô!'
  '10':
  - type: text
    content: 'Ary ny vahoaka rehetra tamin’ny firenen’Isiraely nifanditra hoe: Ny mpanjaka no namonjy antsika tamin’ny tànan’ny fahavalontsika, indrindra fa tamin’ny tànan’ny Filistina; nefa ankehitriny dia efa nandositra niala tamin’ny tany izy noho ny amin’i Absaloma. '
  '11':
  - type: text
    content: Ary Absaloma, izay nohosorantsika hanjaka amintsika, dia efa maty tamin’ny ady. Koa nahoana hianareo no tsy miteny akory ny amin’ny hampodiana ny mpanjaka?
  '12':
  - type: text
    content: 'Ary Davida mpanjaka naniraka tany amin’i Zadoka sy Abiatara mpisorona ka nanao hoe: Ataovy amin’ny loholon’ny Joda hoe: Nahoana no dia hianareo indray no ho farany amin’ny fampodiana ny mpanjaka ho any an-tranony? –fa ny tenin’ny Isiraely rehetra efa tonga tao amin’ny mpanjaka tao an-tranony– '
  '13':
  - type: text
    content: 'rahalahiko hianareo, ary taolako sy nofoko hianareo; koa nahoana no dia hianareo indray no ho farany amin’ny fampodiana ny mpanjaka? '
  '14':
  - type: text
    content: 'Ary ataovy amin’i Amasa koa hoe: Tsy taolako sy nofoko va hianao? Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy ho komandin’ny miaramila eo anatrehako mandra-kariva ho solon’i Joaba hianao.'
  '15':
  - type: text
    content: 'Ary dia nampitodika ny fon’ny lehilahy rehetra amin’ny Joda ho toy ny olona iray izy; ka dia naniraka tany amin’ny mpanjaka izy ka nanao hoe: Modia hianao sy ny mpanomponao rehetra. '
  '16':
  - type: text
    content: Ary dia nody ny mpanjaka ka tonga tao Jordana; ary ny Joda tonga tao Gilgala hitsena ny mpanjaka hitondra azy hita an’i Jordana.
  '17':
  - type: text
    content: 'Ary Simey, zanak’i Gera, Benjamita avy any Bahorima, dia nidodododo nidina niaraka tamin’ny lehilahy amin’ny Joda hitsena an’i Davida mpanjaka. '
  '18':
  - type: text
    content: 'Ary nisy Benjamita arivo lahy koa nanaraka azy, ary Ziba, mpanompon’ny taranak’i Saoly, mbamin’ny zanani-lahy dimy ambin’ny folo sy ny mpanompony roa-polo lahy izay nanaraka azy; ary dia nita an’i Jordana teo alohan’ny mpanjaka izy ireo. '
  '19':
  - type: text
    content: Ary navoivoy teo ny lakana hampitana ny ankohonan’ny mpanjaka sy hanaovany izay sitrany.
  - type: text
    content: 'Ary nony efa hita an’i Jordana ny mpanjaka, dia indro Simey, zanak’i Gera, niankohoka teo anatrehany. '
  '2':
  - type: text
    content: 'Ary nambara tamin’i Joaba hoe: Indro, mitomany sy misaona an’i Absaloma ny mpanjaka. '
  '20':
  - type: text
    content: 'Ary hoy izy tamin’ny mpanjaka: Aoka tsy hisain’ny tompoko heloka aho, ary aoka tsy hotsarovanao ny ratsy nataon’ny mpanomponao tamin’ny andro nivoahan’ny mpanjaka tompoko niala tany Jerosalema, ary aoka tsy ho eritreretin’ny mpanjaka izany; '
  '21':
  - type: text
    content: fa fantatro, izaho mpanomponao, fa nanota aho; ka he! izaho no avy voalohany andro-any amin’ny taranak’i Josefa rehetra ka nidina hitsena ny mpanjaka tompoko.
  '22':
  - type: text
    content: 'Fa namaly Abisay, zanak’i Zeroia, ka nanao hoe: Tsy hovonoina va Simey noho izany, satria efa nanozona ny voahosotr’i Jehovah izy? '
  '23':
  - type: text
    content: 'Dia hoy Davida: Moa mifaninona akory izaho sy hianareo, ry zanak’i Zeroia, no tonga mpanohitra ahy hianareo anio? Tokony hisy olona hatao maty va eto amin’ny Isiraely izao? Fa moa tsy fantatro va fa izaho no mpanjakan’ny Isiraely anio? '
  '24':
  - type: text
    content: 'Ary dia hoy ny mpanjaka tamin’i Simey: Tsy ho faty hianao. Ary ny mpanjaka dia nianiana taminy.'
  '25':
  - type: text
    content: 'Ary Mefiboseta, zanakalahin’i Saoly, nidina hitsena ny mpanjaka, ary tsy nanasa tongotra na namboatra volom-bava na nanasa lamba izy hatramin’ny andro nialan’ny mpanjaka ka hatramin’ny andro nahatongavany soa aman-tsara. '
  '26':
  - type: text
    content: 'Ary nony efa tonga hitsena ny mpanjaka ny avy any Jerosalema, dia hoy ny mpanjaka taminy: Nahoana no tsy mba nandeha niaraka tamiko hianao, ry Mefiboseta? '
  '27':
  - type: text
    content: 'Fa hoy izy: Ry mpanjaka tompoko, nofitahin’ny mpanompoko aho: Hanisy lasely ny boriky aho hitaingenako ka hankany amin’ny mpanjaka; fa malemy tongotra ny mpanomponao. '
  '28':
  - type: text
    content: 'Nefa nendrikendrehiny tamin’ny mpanjaka tompoko izaho mpanomponao; fa ny mpanjaka tompoko dia toy Ilay Anjelin’Andriamanitra; koa ataovy izay sitrakao. '
  '29':
  - type: text
    content: 'Fa ny taranaky ny raiko rehetra dia samy olona tokony ho faty teo anatrehan’ny mpanjaka tompoko; nefa hianao nampitoetra ahy mpanomponao ho isan’izay mihinana amin’ny latabatrao. Koa inona intsony no rariny ho ahy, ary inona no mbola hitarainako amin’ny mpanjaka? '
  '3':
  - type: text
    content: 'Ary ny famonjena dia tonga fisaonana tamin’ny vahoaka rehetra androtrizay, satria ren’ny vahoaka tamin’izany andro izany hoe: Malahelo ny zanany ny mpanjaka. '
  '30':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Nahoana no lazainao indray ny raharahanao? Nefa izaho efa nilaza hoe: Hianao sy Ziba no hizara ny tany. '
  '31':
  - type: text
    content: 'Ary hoy Mefiboseta tamin’ny mpanjaka: Aoka dia ho azy avokoa izy rehetra, fa hianao mpanjaka tompoko efa tonga soa aman-tsara ao amin’ny tranonao indray.'
  '32':
  - type: text
    content: 'Ary Barzilay Gileadita nidina avy tany Rogelima, dia niara-nita an’i Jordana tamin’ny mpanjaka izy mba hanatitra azy hita an’i Jordana. '
  '33':
  - type: text
    content: 'Ary Barzilay dia lehilahy antitra, efa valo-polo taona; ary izy efa nanome hanina ny mpanjaka, raha nitoetra tany Mahanaima izy; fa mpanjatobe indrindra izy. '
  '34':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Barzilay: Andeha hiara-mita amiko hianao hovelomiko any amiko any Jerosalema. '
  '35':
  - type: text
    content: 'Fa hoy Barzilay tamin’ny mpanjaka: Hoatrinona intsony moa no andro hahavelomako, no hiara-miakatra amin’ny mpanjaka hankany Jerosalema aho? '
  '36':
  - type: text
    content: 'Valo-polo taona izay ny andro nahavelomako, ka mahalala izay soa sy ratsy intsony va aho? Mahatsiaro ny tsiron-javatra haniko sy sotroiko intsony va aho mpanomponao? Mahare izay feon’ny mpihiralahy sy ny mpihiravavy intsony va aho? Koa nahoana ny mpanomponao no mbola ho enta-mavesatra amin’ny mpanjaka tompoko? '
  '37':
  - type: text
    content: 'Kely foana no handehanan’ny mpanomponao eo an-dafin’i Jordana hiaraka amin’ny mpanjaka; koa nahoana ny mpanjaka no dia hamaly fitia ahy loatra toy izany? '
  '38':
  - type: text
    content: 'Trarantitra hianao, aoka aho mpanomponao hody ihany ka ho faty any amin’ny vohitro ao akaikin’ny fasan’ikaky sy ineny. Fa indro Kimama mpanomponao; aoka izy no hiaraka amin’ny mpanjaka tompoko, ary ataovy aminy izay sitrakao. '
  '39':
  - type: text
    content: 'Dia hoy ny mpanjaka: Handeha hiaraka amiko tokoa Kimama, ka hataoko aminy izay sitrakao, ary izay angatahinao dia hataoko ho anao.'
  '4':
  - type: text
    content: 'Ka dia niakatra nisokosoko tao an-tanàna ny olona tamin’izany andro izany, toy ny fisokosokon’ny olona menatra raha mandositra amin’ny ady. '
  '40':
  - type: text
    content: 'Ary ny vahoaka rehetra nita an’i Jordana. Ary nony tafita ny mpanjaka, dia norohan’ny mpanjaka Barzilay sady notsofiny rano, ary dia lasa nody ho any amin’ny fonenany izy. '
  '41':
  - type: text
    content: Dia nandroso nankany Gilgala ny mpanjaka, ary Kimama niaraka taminy. Ary ny lehilahy rehetra amin’ny Joda sy ny antsasaky ny lehilahy amin’ny Isiraely koa nanatitra ny mpanjaka.
  - type: heading
    content: Ny nifandiran’ny Isiraely sy ny Joda, ary ny niodinan’i Seba.
  '42':
  - type: text
    content: 'ARY, indreo, ny lehilahy rehetra amin’ny Isiraely nankao amin’ny mpanjaka ka nanao taminy hoe: Nahoana ny lehilahy amin’ny Joda, rahalahinay, no nangalatra anao ka nitondra ny mpanjaka sy ny ankohonany ary ny olon’i Davida rehetra teny aminy hita an’i Jordana?'
  '43':
  - type: text
    content: 'Ary ny lehilahy rehetra amin’ny Joda dia namaly ny lehilahy amin’ny Isirealy hoe: Satria havanay akaiky ny mpanjaka; ka ahoana no mahatezitra anareo amin’izany? Nandany ny mpanjaka va izahay? Na nanome zavatra anay akory va izy? '
  '44':
  - type: text
    content: 'Ary ny lehilahy amin’ny Isiraely kosa namaly ny lehilahy amin’ny Joda hoe: Izahay manana anjaram-polo amin’ny mpanjaka; eny, izahay manana an’i Davida mihoatra noho hianareo; koa nahoana hianareo no nanao tsinontsinona anay? Tsy izahay va no niteny talohanareo hampody ny mpanjakanay? Ary ny tenin’ny lehilahy amin’ny Joda dia lozaloza kokoa noho ny tenin’ny lehilahy amin’ny Isiraely.'
  '5':
  - type: text
    content: 'Fa ny mpanjaka nanarona ny tavany sady nidradradradra tamin’ny feo mafy hoe: Ry Absaloma, zanako, ry Absaloma, zanako, zanako ô!'
  '6':
  - type: text
    content: 'Ary niditra tao amin’ny mpanjaka tao an-trano Joaba ka nanao hoe: Efa nomenarinao andro-any ny mpanomponao rehetra izay namonjy ny ainao andro-any sy ny ain’ny zanakao-lahy sy ny zanakao-vavy ary ny ain’ny vadinao sy ny vaditsindranonao; '
  '7':
  - type: text
    content: 'fa ny mankahala anao no tianao, ary ny tia anao kosa no halanao, ka nasehonao andro-any fa tsinontsinona aminao ny manamboninahitra sy ny miaramila; ary hitako izao fa raha velona Absaloma, ka izahay rehetra no maty andro-any, dia izany no sitrakao. '
  '8':
  - type: text
    content: Koa mitsangàna ankehitriny, ka mivoaha, ary manaova teny soa amin’ny mpanomponao; fa mianiana amin’i Jehovah aho fa raha tsy mivoaka hianao, dia tsy hisy na dia iray akory aza hitoetra eto aminao anio alina; ka dia izany no ho mafy lavitra aminao noho ny fahoriana rehetra izay nanjo anao hatry ny fony hianao vao zaza ka ambaraka ankehitriny.
  '9':
  - type: text
    content: 'Dia nivoaka ny mpanjaka ka nijanona teo am-bavahady; ary nolazaina tamin’ny vahoaka rehetra hoe: Indro, ny mpanjaka mijanona eo am-bavahady. Ary ny vahoaka rehetra dia nankeo anatrehan’ny mpanjaka.'
  - type: heading
    content: Ny nodian’i Davida indray.
  - type: text
    content: 'ARY ny Isiraely dia samy efa lasa nandositra ho any amin’ny lainy avy. '
