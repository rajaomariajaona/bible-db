document_id: 2SA.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary dia niontana terỳ ny fon’ny mpanjaka, ka niakatra nankeo amin’ny efi-trano teo ambony vavahady izy sady nitomany teny am-pandehanana ka nanao hoe: Ry Absaloma, zanako, zanako, ry Absaloma, zanako ô! Inay anie aho no maty nisolo anao, ry Absaloma zanako, zanako ô!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nambara tamin’i Joaba hoe: Indro, mitomany sy misaona an’i Absaloma ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny famonjena dia tonga fisaonana tamin’ny vahoaka rehetra androtrizay, satria ren’ny vahoaka tamin’izany andro izany hoe: Malahelo ny zanany ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka dia niakatra nisokosoko tao an-tanàna ny olona tamin’izany andro izany, toy ny fisokosokon’ny olona menatra raha mandositra amin’ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny mpanjaka nanarona ny tavany sady nidradradradra tamin’ny feo mafy hoe: Ry Absaloma, zanako, ry Absaloma, zanako, zanako ô!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niditra tao amin’ny mpanjaka tao an-trano Joaba ka nanao hoe: Efa nomenarinao andro-any ny mpanomponao rehetra izay namonjy ny ainao andro-any sy ny ain’ny zanakao-lahy sy ny zanakao-vavy ary ny ain’ny vadinao sy ny vaditsindranonao; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa ny mankahala anao no tianao, ary ny tia anao kosa no halanao, ka nasehonao andro-any fa tsinontsinona aminao ny manamboninahitra sy ny miaramila; ary hitako izao fa raha velona Absaloma, ka izahay rehetra no maty andro-any, dia izany no sitrakao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mitsangàna ankehitriny, ka mivoaha, ary manaova teny soa amin’ny mpanomponao; fa mianiana amin’i Jehovah aho fa raha tsy mivoaka hianao, dia tsy hisy na dia iray akory aza hitoetra eto aminao anio alina; ka dia izany no ho mafy lavitra aminao noho ny fahoriana rehetra izay nanjo anao hatry ny fony hianao vao zaza ka ambaraka ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nivoaka ny mpanjaka ka nijanona teo am-bavahady; ary nolazaina tamin’ny vahoaka rehetra hoe: Indro, ny mpanjaka mijanona eo am-bavahady. Ary ny vahoaka rehetra dia nankeo anatrehan’ny mpanjaka.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nodian’i Davida indray.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'ARY ny Isiraely dia samy efa lasa nandositra ho any amin’ny lainy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny vahoaka rehetra tamin’ny firenen’Isiraely nifanditra hoe: Ny mpanjaka no namonjy antsika tamin’ny tànan’ny fahavalontsika, indrindra fa tamin’ny tànan’ny Filistina; nefa ankehitriny dia efa nandositra niala tamin’ny tany izy noho ny amin’i Absaloma. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Absaloma, izay nohosorantsika hanjaka amintsika, dia efa maty tamin’ny ady. Koa nahoana hianareo no tsy miteny akory ny amin’ny hampodiana ny mpanjaka?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Davida mpanjaka naniraka tany amin’i Zadoka sy Abiatara mpisorona ka nanao hoe: Ataovy amin’ny loholon’ny Joda hoe: Nahoana no dia hianareo indray no ho farany amin’ny fampodiana ny mpanjaka ho any an-tranony? –fa ny tenin’ny Isiraely rehetra efa tonga tao amin’ny mpanjaka tao an-tranony– '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'rahalahiko hianareo, ary taolako sy nofoko hianareo; koa nahoana no dia hianareo indray no ho farany amin’ny fampodiana ny mpanjaka? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ataovy amin’i Amasa koa hoe: Tsy taolako sy nofoko va hianao? Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy ho komandin’ny miaramila eo anatrehako mandra-kariva ho solon’i Joaba hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia nampitodika ny fon’ny lehilahy rehetra amin’ny Joda ho toy ny olona iray izy; ka dia naniraka tany amin’ny mpanjaka izy ka nanao hoe: Modia hianao sy ny mpanomponao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary dia nody ny mpanjaka ka tonga tao Jordana; ary ny Joda tonga tao Gilgala hitsena ny mpanjaka hitondra azy hita an’i Jordana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Simey, zanak’i Gera, Benjamita avy any Bahorima, dia nidodododo nidina niaraka tamin’ny lehilahy amin’ny Joda hitsena an’i Davida mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nisy Benjamita arivo lahy koa nanaraka azy, ary Ziba, mpanompon’ny taranak’i Saoly, mbamin’ny zanani-lahy dimy ambin’ny folo sy ny mpanompony roa-polo lahy izay nanaraka azy; ary dia nita an’i Jordana teo alohan’ny mpanjaka izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary navoivoy teo ny lakana hampitana ny ankohonan’ny mpanjaka sy hanaovany izay sitrany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nony efa hita an’i Jordana ny mpanjaka, dia indro Simey, zanak’i Gera, niankohoka teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy tamin’ny mpanjaka: Aoka tsy hisain’ny tompoko heloka aho, ary aoka tsy hotsarovanao ny ratsy nataon’ny mpanomponao tamin’ny andro nivoahan’ny mpanjaka tompoko niala tany Jerosalema, ary aoka tsy ho eritreretin’ny mpanjaka izany; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fa fantatro, izaho mpanomponao, fa nanota aho; ka he! izaho no avy voalohany andro-any amin’ny taranak’i Josefa rehetra ka nidina hitsena ny mpanjaka tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa namaly Abisay, zanak’i Zeroia, ka nanao hoe: Tsy hovonoina va Simey noho izany, satria efa nanozona ny voahosotr’i Jehovah izy? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy Davida: Moa mifaninona akory izaho sy hianareo, ry zanak’i Zeroia, no tonga mpanohitra ahy hianareo anio? Tokony hisy olona hatao maty va eto amin’ny Isiraely izao? Fa moa tsy fantatro va fa izaho no mpanjakan’ny Isiraely anio? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary dia hoy ny mpanjaka tamin’i Simey: Tsy ho faty hianao. Ary ny mpanjaka dia nianiana taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Mefiboseta, zanakalahin’i Saoly, nidina hitsena ny mpanjaka, ary tsy nanasa tongotra na namboatra volom-bava na nanasa lamba izy hatramin’ny andro nialan’ny mpanjaka ka hatramin’ny andro nahatongavany soa aman-tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony efa tonga hitsena ny mpanjaka ny avy any Jerosalema, dia hoy ny mpanjaka taminy: Nahoana no tsy mba nandeha niaraka tamiko hianao, ry Mefiboseta? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy izy: Ry mpanjaka tompoko, nofitahin’ny mpanompoko aho: Hanisy lasely ny boriky aho hitaingenako ka hankany amin’ny mpanjaka; fa malemy tongotra ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nefa nendrikendrehiny tamin’ny mpanjaka tompoko izaho mpanomponao; fa ny mpanjaka tompoko dia toy Ilay Anjelin’Andriamanitra; koa ataovy izay sitrakao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny taranaky ny raiko rehetra dia samy olona tokony ho faty teo anatrehan’ny mpanjaka tompoko; nefa hianao nampitoetra ahy mpanomponao ho isan’izay mihinana amin’ny latabatrao. Koa inona intsony no rariny ho ahy, ary inona no mbola hitarainako amin’ny mpanjaka? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Nahoana no lazainao indray ny raharahanao? Nefa izaho efa nilaza hoe: Hianao sy Ziba no hizara ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Mefiboseta tamin’ny mpanjaka: Aoka dia ho azy avokoa izy rehetra, fa hianao mpanjaka tompoko efa tonga soa aman-tsara ao amin’ny tranonao indray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Barzilay Gileadita nidina avy tany Rogelima, dia niara-nita an’i Jordana tamin’ny mpanjaka izy mba hanatitra azy hita an’i Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Barzilay dia lehilahy antitra, efa valo-polo taona; ary izy efa nanome hanina ny mpanjaka, raha nitoetra tany Mahanaima izy; fa mpanjatobe indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Barzilay: Andeha hiara-mita amiko hianao hovelomiko any amiko any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa hoy Barzilay tamin’ny mpanjaka: Hoatrinona intsony moa no andro hahavelomako, no hiara-miakatra amin’ny mpanjaka hankany Jerosalema aho? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Valo-polo taona izay ny andro nahavelomako, ka mahalala izay soa sy ratsy intsony va aho? Mahatsiaro ny tsiron-javatra haniko sy sotroiko intsony va aho mpanomponao? Mahare izay feon’ny mpihiralahy sy ny mpihiravavy intsony va aho? Koa nahoana ny mpanomponao no mbola ho enta-mavesatra amin’ny mpanjaka tompoko? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kely foana no handehanan’ny mpanomponao eo an-dafin’i Jordana hiaraka amin’ny mpanjaka; koa nahoana ny mpanjaka no dia hamaly fitia ahy loatra toy izany? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Trarantitra hianao, aoka aho mpanomponao hody ihany ka ho faty any amin’ny vohitro ao akaikin’ny fasan’ikaky sy ineny. Fa indro Kimama mpanomponao; aoka izy no hiaraka amin’ny mpanjaka tompoko, ary ataovy aminy izay sitrakao. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy ny mpanjaka: Handeha hiaraka amiko tokoa Kimama, ka hataoko aminy izay sitrakao, ary izay angatahinao dia hataoko ho anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny vahoaka rehetra nita an’i Jordana. Ary nony tafita ny mpanjaka, dia norohan’ny mpanjaka Barzilay sady notsofiny rano, ary dia lasa nody ho any amin’ny fonenany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Dia nandroso nankany Gilgala ny mpanjaka, ary Kimama niaraka taminy. Ary ny lehilahy rehetra amin’ny Joda sy ny antsasaky ny lehilahy amin’ny Isiraely koa nanatitra ny mpanjaka.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nifandiran’ny Isiraely sy ny Joda, ary ny niodinan’i Seba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ARY, indreo, ny lehilahy rehetra amin’ny Isiraely nankao amin’ny mpanjaka ka nanao taminy hoe: Nahoana ny lehilahy amin’ny Joda, rahalahinay, no nangalatra anao ka nitondra ny mpanjaka sy ny ankohonany ary ny olon’i Davida rehetra teny aminy hita an’i Jordana?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary ny lehilahy rehetra amin’ny Joda dia namaly ny lehilahy amin’ny Isirealy hoe: Satria havanay akaiky ny mpanjaka; ka ahoana no mahatezitra anareo amin’izany? Nandany ny mpanjaka va izahay? Na nanome zavatra anay akory va izy? '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary ny lehilahy amin’ny Isiraely kosa namaly ny lehilahy amin’ny Joda hoe: Izahay manana anjaram-polo amin’ny mpanjaka; eny, izahay manana an’i Davida mihoatra noho hianareo; koa nahoana hianareo no nanao tsinontsinona anay? Tsy izahay va no niteny talohanareo hampody ny mpanjakanay? Ary ny tenin’ny lehilahy amin’ny Joda dia lozaloza kokoa noho ny tenin’ny lehilahy amin’ny Isiraely.'
