document_id: ISA.54,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanitarana ny Fiangonana, sy ny voninahitra ho azony.
  - type: text
    content: MIHOBIA, ry momba, hianao izay tsy niteraka,
  - type: text
    content: Eny, velomy ny hoby, ka manandrata feo, hianao izay tsy mba nihetsi-jaza;
  - type: text
    content: Fa ny zanaky ny mpitondra tena dia maro
  - type: text
    content: Noho ny zanaky ny manam-bady, hoy Jehovah.
  '10':
  - type: text
    content: Fa na dia hifindra aza ny tendrombohitra
  - type: text
    content: Ary na dia hihetsika aza ny havoana,
  - type: text
    content: Tsy mba hiala aminao ny famindrampoko,
  - type: text
    content: Ary tsy hitsoaka ny faneken’ny fihavanako,
  - type: text
    content: Hoy Jehovah, Mpamindra fo aminao.
  '11':
  - type: text
    content: Hianao, ry ory izay afotofoton’ny tafio-drivotra sady tsy manana fampiononana,
  - type: text
    content: Indro, Izaho handatsaka ny vatonao amin’ny antimony
  - type: text
    content: Sy hanorina ny fanambaninao amin’ny safira,
  '12':
  - type: text
    content: Hataoko robina ny tilikambo madinikao,
  - type: text
    content: Sy karbonkolo ny vavahadinao,
  - type: text
    content: Ary vato soa ny fari-taninao manodidina.
  '13':
  - type: text
    content: Ary ny zanakao rehetra dia ho samy efa nampianarin’i Jehovah,
  - type: text
    content: Ka dia ho be ny fiadanan’ny zanakao.
  '14':
  - type: text
    content: Amin’ny fahamarinana no hampiorenana anao;
  - type: text
    content: Aza manahy
  - type: note
    content: Heb. Manalavira.
  - type: text
    content: ' ny fampahoriana, fa tsy hatahotra hianao,'
  - type: text
    content: Na ny fampahatahorana, fa tsy hanakaiky anao izany.
  '15':
  - type: text
    content: Na dia misy miara-mioko aza, dia tsy avy amiko izany;
  - type: text
    content: Ary na iza na iza miara-mioko hamely anao dia ho tonga hiandany aminao
  - type: note
    content: 'Na: ho lavo noho ny aminao.'
  - type: text
    content: ' kosa.'
  '16':
  - type: text
    content: Indro, Izaho no nahary ny mpanefy izay mifofotra ny afo amin’ny arina
  - type: text
    content: Ka mahavita fiasana hanaovany ny asany;
  - type: note
    content: 'Na: fiadiana araka ny asany.'
  - type: text
    content: Ary Izaho koa no nahary ny mpandringana mba handringana.
  '17':
  - type: text
    content: Ny fiadiana rehetra izay voaforona hamelezana anao dia tsy hisy hambinina,
  - type: text
    content: Ary ny lela rehetra izay miady aminao dia horesenao lahatra.
  - type: text
    content: Izany no lovan’ny mpanompon’i Jehovah
  - type: text
    content: Sy fahamarinany avy amiko, hoy Jehovah.
  '2':
  - type: text
    content: Halalaho ny itoeran’ny lainao,
  - type: text
    content: Ary aoka hohenjanina ny ambain-dainao, ka aza avela hisy hiketrona;
  - type: text
    content: Halavao ny kofehinao,
  - type: text
    content: Ary aoreno mafy ny tsima-dainao;
  '3':
  - type: text
    content: Fa hitatra any amin’ny ankavanana sy any amin’ny ankavia hianao,
  - type: text
    content: Ary ny taranakao hahazo ny jentilisa,
  - type: text
    content: Ka dia hasiany mponina ny tanàna lao.
  '4':
  - type: text
    content: Aza matahotra, fa tsy ho menatra hianao;
  - type: text
    content: Ary aza mangaihay, fa tsy havela ho afa-baraka hianao;
  - type: text
    content: Fa ho hadinonao ny henatry ny fahatanoranao,
  - type: text
    content: Ary tsy ho tsaroanao intsony ny tondro-masonao fony mpitondratena.
  '5':
  - type: text
    content: Fa ny Mpanao anao no Vadinao,
  - type: text
    content: Jehovah, Tompon’ny maro, no anarany;
  - type: text
    content: Ary ny Iray Masin’ny Isiraely no Mpanavotra anao,
  - type: text
    content: Andriamanitry ny tany rehetra no anarany.
  '6':
  - type: text
    content: Fa Jehovah efa nampody
  - type: note
    content: Heb. niantso.
  - type: text
    content: ' anao, izay tahaka ny vady efa nafoy ka ory am-panahy,'
  - type: text
    content: Ary tahaka ny vady efa novadina hatry ny fony mbola tanora, fa efa napetraka, hoy Andriamanitrao.
  '7':
  - type: text
    content: Indray mipì-maso monja no nahafoizako anao;
  - type: text
    content: Fa amin’ny indrafo lehibe kosa no ampodiako anao.
  '8':
  - type: text
    content: Tamin’ny firehetan’ny fahatezerako no nanafenako ny tavako taminao indray mipì-maso monja,
  - type: text
    content: Fa amin’ny famindrampo mandrakizay kosa no amindrako fo aminao,
  - type: text
    content: Hoy Jehovah, Mpanavotra anao.
  '9':
  - type: text
    content: Fa amiko izany dia tahaka ilay ranon’i Noa,
  - type: text
    content: Ka toy ny nianianako fa tsy hanafotra ny tany intsony ilay ranon’i Noa.
  - type: text
    content: Dia toy izany no ianianako fa tsy ho tezitra aminao na hiteny mafy anao intsony Aho.
