document_id: ISA.54,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hanitarana ny Fiangonana, sy ny voninahitra ho azony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIHOBIA, ry momba, hianao izay tsy niteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, velomy ny hoby, ka manandrata feo, hianao izay tsy mba nihetsi-jaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zanaky ny mpitondra tena dia maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny zanaky ny manam-bady, hoy Jehovah.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia hifindra aza ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia hihetsika aza ny havoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba hiala aminao ny famindrampoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hitsoaka ny faneken’ny fihavanako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Mpamindra fo aminao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, ry ory izay afotofoton’ny tafio-drivotra sady tsy manana fampiononana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho handatsaka ny vatonao amin’ny antimony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanorina ny fanambaninao amin’ny safira,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko robina ny tilikambo madinikao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy karbonkolo ny vavahadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vato soa ny fari-taninao manodidina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zanakao rehetra dia ho samy efa nampianarin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho be ny fiadanan’ny zanakao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fahamarinana no hampiorenana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manalavira.
      marker-yv: yv-n
    - type: text
      text: ' ny fampahoriana, fa tsy hatahotra hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny fampahatahorana, fa tsy hanakaiky anao izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy miara-mioko aza, dia tsy avy amiko izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na iza na iza miara-mioko hamely anao dia ho tonga hiandany aminao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho lavo noho ny aminao.
      marker-yv: yv-n
    - type: text
      text: ' kosa.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho no nahary ny mpanefy izay mifofotra ny afo amin’ny arina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahavita fiasana hanaovany ny asany;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiadiana araka ny asany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho koa no nahary ny mpandringana mba handringana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiadiana rehetra izay voaforona hamelezana anao dia tsy hisy hambinina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lela rehetra izay miady aminao dia horesenao lahatra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no lovan’ny mpanompon’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fahamarinany avy amiko, hoy Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halalaho ny itoeran’ny lainao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hohenjanina ny ambain-dainao, ka aza avela hisy hiketrona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halavao ny kofehinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoreno mafy ny tsima-dainao;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hitatra any amin’ny ankavanana sy any amin’ny ankavia hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranakao hahazo ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hasiany mponina ny tanàna lao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra, fa tsy ho menatra hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mangaihay, fa tsy havela ho afa-baraka hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho hadinonao ny henatry ny fahatanoranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ho tsaroanao intsony ny tondro-masonao fony mpitondratena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Mpanao anao no Vadinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Tompon’ny maro, no anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Iray Masin’ny Isiraely no Mpanavotra anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitry ny tany rehetra no anarany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah efa nampody
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niantso.
      marker-yv: yv-n
    - type: text
      text: ' anao, izay tahaka ny vady efa nafoy ka ory am-panahy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny vady efa novadina hatry ny fony mbola tanora, fa efa napetraka, hoy Andriamanitrao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray mipì-maso monja no nahafoizako anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny indrafo lehibe kosa no ampodiako anao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny firehetan’ny fahatezerako no nanafenako ny tavako taminao indray mipì-maso monja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny famindrampo mandrakizay kosa no amindrako fo aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Mpanavotra anao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amiko izany dia tahaka ilay ranon’i Noa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka toy ny nianianako fa tsy hanafotra ny tany intsony ilay ranon’i Noa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany no ianianako fa tsy ho tezitra aminao na hiteny mafy anao intsony Aho.
