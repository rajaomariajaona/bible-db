document_id: DEU.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fampahatsiarovana ny nitondran’Andriamanitra ny Isiraely sy ny nampanetreny tena azy, ary fananarana azy, andrao miavonavona izy ka manadino an’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY lalàna rehetra izay andidiako anao anio dia tandremo harahinareo, mba ho velona hianareo ka hihamaro ary hiditra sady handova ny tany izay nianianan’i Jehovah tamin’ny razanareo homena azy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary rehefa nihinana hianao ka voky ary misaotra an’i Jehovah Andriamanitrao noho ny tany soa izay nomeny anao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia mitandrema, fandrao hadinoinao Jehovah Andriamanitrao, ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalàny, izay andidiako anao anio; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'fandrao–rehefa nihinana hianao ka voky ary nanao trano tsara ka mitoetra ao, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary mihamaro ny ombinao sy ny ondry aman-osinao, ary mitombo koa ny volafotsinao sy ny volamenanao, ary mitombo ny fanananao rehetra– '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'dia hiavonavona ny fonao, ka hohadinoinao Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin’ny tany Egypta, tamin’ny trano nahandevozana,– '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izay nitondra anao tany amin’ny efitra lehibe sady mahatahotra, izay misy menaran’afo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sarafa.
      marker-yv: yv-n
    - type: text
      text: 'sy maingoka, dia ny tany mangentana tsy misy rano, ary nampivoaka rano ho anao avy tamin’ny vatolampy afo-vato,– '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay nanome anao mana hohanina tany an-efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizaha toetra anao ary hanisy soa anao any am-parany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary andrao hianao hanao anakampo hoe: Ny tanjako sy ny herin’ny tànako no nahavoriako izao harena izao; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: fa tsarovy Jehovah Andriamanitrao, fa Izy no manome anao hery hahavory harena, mba haoriny ny fanekeny, izay nianianany tamin’ny razanao, tahaka ny amin’izao anio izao.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa raha manadino an’i Jehovah Andriamanitrao mihitsy hianao ka manaraka izay andriamani-kafa sady manompo azy sy miankohoka eo anatrehany, dia milaza aminareo marimarina aho fa haringana tokoa hianareo: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary tsarovy ny làlana rehetra izay nitondran’i Jehovah Andriamanitrao anao tany an-efitra izao efo-polo taona izao, hampanetry tena anao sy hizaha toetra anao ary hahalala izay ao amponao, na hitandrina ny didiny hianao, na tsia. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: tahaka ny andringanana ny firenen-tsamy hafa, izay aringan’i Jehovah eo anoloanareo, no handringanana anareo, satria tsy nihaino ny feon’i Jehovah Andriamanitrareo hianareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nampanetry tena anao Izy ka namela anao ho noana, dia nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, hampahafantarany anao fa tsy mofo ihany no iveloman’ny olona; fa izay rehetra aloaky ny vavan’i Jehovah no iveloman’ny olona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny fitafianao teny aminao tsy rovitra, ary ny tongotrao tsy nivonto izao efa-polo taona izao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa aoka ho fantatrao amin’ny fonao, fa tahaka ny fananaran’ny olona ny zanany no fananaran’i Jehovah Andriamanitrao anao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary tandremo ny didin’i Jehovah Andriamanitrao, mba handehananao amin’ny làlany sy hatahoranao Azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa Jehovah Andriamanitrao efa hampiditra anao any amin’ny tany soa, dia tany misy renirano sy loharano ary rano lalina eny amin’ny lohasaha sy ny tendrombohitra,– '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'tany misy vary tritika sy vary hordea sy voaloboka sy aviavy ary ampongabendanitra,– tany misy hazo oliva sy tantely,– '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: tany izay hihinananao hanina amin’ny fanaranam-po, sady tsy hanan-java-mahory akory eo hianao, – tany misy vy ny vato ao aminy, ary ao amin’ny tendrombohiny no hihadianao varahina.
