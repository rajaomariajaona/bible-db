document_id: ISA.27
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amin’izany andro izany ny sabatr’i Jehovah, izay mafy sady lehibe no mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No ho entiny mamaly ny leviatana, dia ilay menarana mandositra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny leviatana, dia ilay menarana miforoporotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hovonoiny ilay dragona ao an-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amin’izany andro izany no hihiranareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny amin’ny tanimboaloboka ahazoana divay mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho Jehovah no mpiaro io;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaky ny indray mipì-maso no andemako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao misy manimba azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na andro na alina dia miaro azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy fahatezerana ato amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka hisy hery sy tsilo eto anatrehako hiadiako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiroatako ireo ka hodorako avokoa!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha tsy izany, dia aoka hifikitra amin’ny heriko kosa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hihavana amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka hihavana amiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny andro ho avy dia hamaka tsara Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Isiraely hamony sy hitsimoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hameno izao tontolo izao amin’ny fahavokarany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namaizan’i Jehovah ny Isiraely sy ny mbola hamindrany fo aminy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: MOA tahaka ny namelezana izay namely azy va no mba namelezany azy koa?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny namonoana izay novonoiny va no mba namonoana azy koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tamin’ny nandroahany azy dia voafetra no niadiany taminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nokororohiny tamin’ny rivony mahery izy tamin’ny andron’ny rivotra avy any atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ka izao no hamelana ny helok’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izao ihany no vokatry ny nanesorana ny fahotany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny anaovany ny vato rehetra amin’ny alitara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tahaka ny vato sokay voatorotoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Aseraha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran’andriamani-tsi-izy, na ny sariny.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tsangan-kazo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsangam-bato.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny masoandro dia tsy hitsangana intsony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ho foana ny tanàna mimànda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fonenana afoy sy ilaozana tahaka ny efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao no hihinanan’ny zanak’omby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao no handriany sy handaniany ny rantsan-kazony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha malazo ny rantsany, dia hotapatapahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho avy ny vehivavy hitaina azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria firenena tsy manam-pahalalana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hiantra azy ny Mpanao azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hamindra fo aminy ny Mpamorona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary amin’izany andro izany dia hisy fampihintsanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fivelezam-bary.
    marker-yv: yv-n
  - type: text
    text: ' ataon’i Jehovah hatramin’ny ony mandriaka'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hatramin’ny lohasahan-driak’i Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianareo samy hotsimponina tsirairay, ry Zanak’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary amin’izany andro izany koa no hitsofana anjomara lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho avy izay very tany amin’ny tany Asyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay efa voaroaka tany amin’ny tany Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiankohoka eo anatrehan’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny tendrombohitra masina any Jerosalema.
