document_id: ISA.27,873
type_code: plt
verses:
  '1':
  - type: text
    content: Amin’izany andro izany ny sabatr’i Jehovah, izay mafy sady lehibe no mahery,
  - type: text
    content: No ho entiny mamaly ny leviatana, dia ilay menarana mandositra,
  - type: text
    content: Sy ny leviatana, dia ilay menarana miforoporotra,
  - type: text
    content: Ary hovonoiny ilay dragona ao an-dranomasina.
  '10':
  - type: text
    content: Fa ho foana ny tanàna mimànda,
  - type: text
    content: Ka dia ho fonenana afoy sy ilaozana tahaka ny efitra;
  - type: text
    content: Ao no hihinanan’ny zanak’omby,
  - type: text
    content: Ary ao no handriany sy handaniany ny rantsan-kazony.
  '11':
  - type: text
    content: Raha malazo ny rantsany, dia hotapatapahina,
  - type: text
    content: Ka ho avy ny vehivavy hitaina azy,
  - type: text
    content: Satria firenena tsy manam-pahalalana izy,
  - type: text
    content: Dia tsy hiantra azy ny Mpanao azy,
  - type: text
    content: Ary tsy hamindra fo aminy ny Mpamorona azy.
  '12':
  - type: text
    content: Ary amin’izany andro izany dia hisy fampihintsanana
  - type: note
    content: 'Na: fivelezam-bary.'
  - type: text
    content: ' ataon’i Jehovah hatramin’ny ony mandriaka'
  - type: text
    content: Ka hatramin’ny lohasahan-driak’i Egypta;
  - type: text
    content: Ary hianareo samy hotsimponina tsirairay, ry Zanak’Isiraely.
  '13':
  - type: text
    content: Ary amin’izany andro izany koa no hitsofana anjomara lehibe,
  - type: text
    content: Dia ho avy izay very tany amin’ny tany Asyria
  - type: text
    content: Sy izay efa voaroaka tany amin’ny tany Egypta,
  - type: text
    content: Ka hiankohoka eo anatrehan’i Jehovah
  - type: text
    content: Ao amin’ny tendrombohitra masina any Jerosalema.
  '2':
  - type: text
    content: Amin’izany andro izany no hihiranareo
  - type: text
    content: 'Ny amin’ny tanimboaloboka ahazoana divay mahery hoe:'
  '3':
  - type: text
    content: Izaho Jehovah no mpiaro io;
  - type: text
    content: Isaky ny indray mipì-maso no andemako azy,
  - type: text
    content: Fandrao misy manimba azy;
  - type: text
    content: Na andro na alina dia miaro azy Aho.
  '4':
  - type: text
    content: Tsy misy fahatezerana ato amiko;
  - type: text
    content: Enga anie ka hisy hery sy tsilo eto anatrehako hiadiako.
  - type: text
    content: Dia hiroatako ireo ka hodorako avokoa!
  '5':
  - type: text
    content: Fa raha tsy izany, dia aoka hifikitra amin’ny heriko kosa izy
  - type: text
    content: Ka hihavana amiko;
  - type: text
    content: Eny, aoka hihavana amiko izy.
  '6':
  - type: text
    content: Amin’ny andro ho avy dia hamaka tsara Jakoba;
  - type: text
    content: Ary Isiraely hamony sy hitsimoka
  - type: text
    content: Ka hameno izao tontolo izao amin’ny fahavokarany.
  - type: heading
    content: Ny namaizan’i Jehovah ny Isiraely sy ny mbola hamindrany fo aminy.
  '7':
  - type: text
    content: MOA tahaka ny namelezana izay namely azy va no mba namelezany azy koa?
  - type: text
    content: Ary tahaka ny namonoana izay novonoiny va no mba namonoana azy koa?
  '8':
  - type: text
    content: Tamin’ny nandroahany azy dia voafetra no niadiany taminy;
  - type: text
    content: Nokororohiny tamin’ny rivony mahery izy tamin’ny andron’ny rivotra avy any atsinanana.
  '9':
  - type: text
    content: Ka izao no hamelana ny helok’i Jakoba,
  - type: text
    content: Ary izao ihany no vokatry ny nanesorana ny fahotany,
  - type: text
    content: Dia amin’ny anaovany ny vato rehetra amin’ny alitara
  - type: text
    content: Ho tahaka ny vato sokay voatorotoro,
  - type: text
    content: Ary ny Aseraha
  - type: note
    content: Anaran’andriamani-tsi-izy, na ny sariny.
  - type: text
    content: ' sy ny tsangan-kazo'
  - type: note
    content: 'Na: tsangam-bato.'
  - type: text
    content: ' ho an’ny masoandro dia tsy hitsangana intsony.'
