document_id: GAL.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy izaho: Raha mbola zaza ny mpandova, dia tsy hafa noho ny andevo izy, na dia tompon’ny zavatra rehetra aza; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa fehezin’izay mpitondra sy mpitaiza azy izy mandra-pahatongan’ny fetr’andro voatendrin’ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia tahaka izany koa isika, fony mbola zaza, dia nandevozin’ny abidim-pianaran’izao tontolo izao; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa rehefa tonga ny fotoan’andro, dia nirahin’Andriamanitra ny Zanany, nateraky ny vehivavy, nateraka tao ambanin’ny lalàna, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hanavotany izay ambanin’ny lalàna, mba handraisantsika ny fananganan-anaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary satria zanaka hianareo, dia nirahin’Andriamanitra ho ato am-pontsika ny Fanahin’ny Zanany, miantso hoe: Aba, Ray ô. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka dia tsy mpanompo intsony hianao, fa zanaka: ary raha zanaka, dia mpandova koa noho ny ataon’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa tamin’izany, fony mbola tsy nahalala an’Andriamanitra hianareo, dia nanompo izay andriamani-tsy-izy; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'fa ankehitriny, rehefa mahalala an’Andriamanitra hianareo–nefa tsy izany, fa Izy no mahalala anareo–nahoana hianareo no dia miverina indray ho amin’ny abidim-pianarana malemy sady tsy misy na inona na inona, nefa tianareo hotompoina indray? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Andro sy volana sy fotoana ary taona no tandremanareo fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Matahotra ny aminareo aho, fandrao dia nisasatra foana taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry rahalahy, mangataka aminareo aho, aoka ho tonga tahaka ahy hianareo, fa izaho kosa mba efa tonga tahaka anareo. Tsy naninona ahy akory hianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'nefa fantatrareo fa noho ny fahalemen’ny nofo no nitoriako ny filazantsara taminareo tamin’ilay voalohany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny teo amin’ny nofoko izay tonga fakam-panahy anareo dia tsy mba nohamavoinareo na nolavinareo; fa nandray ahy tahaka ny mandray anjelin’Andriamanitra hianareo, eny, dia tahaka an’i Kristy Jesosy aza. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aiza àry ilay nataonareo ho fahasambarana? Fa vavolombelonareo aho fa raha azo natao, na dia ny masonareo aza dia ho nesorinareo ka nomenareo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa efa tonga fahavalonareo va aho, satria milaza ny marina aminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mazoto mila fitia aminareo izy ireo, nefa tsy araka ny mety; fa izy ta-hanidy anareo any ivelany, mba hampahazoto anareo hila fitia aminy kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tsara raha ilam-pitia amin’ny tsara mandrakariva, na dia sendra tsy eo aminareo aza aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Anaka, izay aharariako indray amin’ny fiterahana mandra-paharin’i Kristy ao anatinareo, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: enga anie ka ho tonga eo aminareo aho ankehitriny ka hanova ny feoko; fa misalasala aho ny aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Milazà amiko, hianareo izay te-ho ambanin’ny lalàna: tsy renareo va ny lalàna? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'fa voasoratra hoe: Abrahama nanana zanaka roa lahy, ny anankiray tamin’ny andevovavy, ary ny anankiray tamin’ny tsy andevo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa ilay tamin’ny andevovavy dia nateraka araka ny nofo; fa ilay tamin’ny tsy andevo kosa dia nateraka tamin’ny teny fikasana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary izany dia azo atao fanoharana; fa izy roa vavy ireo dia fanekena roa; ny anankiray avy tamin’ny tendrombohitra Sinay ka miteraka ho amin’ny fahandevozana, dia Hagara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Fa].'
    marker-yv: yv-n
  - type: text
    text: ' ny hoe Hagara dia ny tendrombohitra Sinay any Arabia ka mifamaly amin’i Jerosalema ankehitriny; fa andevo izy mbamin’ny zanany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa Jerosalema any ambony kosa, izay renintsika, dia tsy mba andevo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Mifalia, ramomba, izay tsy miteraka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoa sy minanananà, hianao izay tsy mbola mihetsi-jaza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny zanaky ny mpitondratena dia maro noho ny an’ny manam-bady’’ (Isa. 54.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa isika, ry rahalahy, dia zanaky ny teny fikasana tahaka an’Isaka. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Kanefa tahaka ny tamin’izany andro izany, ilay teraka araka ny nofo dia nanenjika ilay araka ny Fanahy, dia tahaka izany koa ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nefa ahoana no lazain’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: '? ,,Roahy io andevo-vavy io sy ny zanani-lahy; fa ny zanaky ny andevo tsy hiray lova amin’ny zanaky ny tsy andevo’’ (Gen. 21.10). '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary amin’izany, ry rahalahy, tsy zanak’andevo-vavy isika, fa zanaky ny tsy andevo.
