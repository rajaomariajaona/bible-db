document_id: PRO.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fikasan’ny fo no amin’ny olona;
  - type: text
    content: Fa ny famalian’ny lela dia avy amin’i Jehovah.
  '10':
  - type: text
    content: Ny teny marina dia eo amin’ny molotry ny mpanjaka,
  - type: text
    content: Ary tsy diso teny izy, raha mitsara.
  '11':
  - type: text
    content: An’i Jehovah ny fandanjana sy ny mizana marina,
  - type: text
    content: Avy aminy
  - type: note
    content: Heb. Asany.
  - type: text
    content: ' avokoa ireo vato rehetra an-kitapo.'
  '12':
  - type: text
    content: Fahavetavetana eo imason’ny mpanjaka ny fanaovan-dratsy;
  - type: text
    content: Fa fahamarinana no iorenan’ny seza fiandrianana.
  '13':
  - type: text
    content: Sitraky ny mpanjaka ny molotra marina,
  - type: text
    content: Ary izay miteny mahitsy no tiany.
  '14':
  - type: text
    content: Ny fahatezeran’ny mpanjaka dia iraky ny fahafatesana.
  - type: text
    content: Fa ny olon-kendry mampionona izany.
  '15':
  - type: text
    content: Amin’ny fahamiramiranan’ny tarehin’ny mpanjaka dia misy fiainana,
  - type: text
    content: Ary ny fankasitrahany dia toy ny rahona amin’ny fararano.
  '16':
  - type: text
    content: Tsara ny mahazo fahendrena noho ny volamena,
  - type: text
    content: Ary tsara ny mahazo fahalalana noho ny volafotsy.
  '17':
  - type: text
    content: Ny manalavitra ny ratsy no làlamben’ny marina,
  - type: text
    content: Ary izay mitandrina ny alehany no miaro ny ainy.
  - type: note
    content: 'Na: fanahiny.'
  '18':
  - type: text
    content: Ny fiavonavonana mialoha ny fahasimbana,
  - type: text
    content: Ary ny fanahy mirehareha mialoha ny fahalavoana.
  '19':
  - type: text
    content: Tsara ny malemy fanahy ao amin’izay manetry tena
  - type: text
    content: Noho ny mizara babo amin’izay miavonavona.
  '2':
  - type: text
    content: Ataon’ny olona ho madio avokoa ny làlana rehetra alehany;
  - type: text
    content: Fa Jehovah ihany no mpandanja ny fanahy.
  '20':
  - type: text
    content: Izay mandinika ny teny no hahita soa;
  - type: text
    content: Ary izay matoky an’i Jehovah no ho sambatra.
  '21':
  - type: text
    content: Izay hendry am-po dia lazaina hoe manan-tsaina,
  - type: text
    content: Ary ny hamamian’ny molotra mampandroso fahendrena.
  '22':
  - type: text
    content: Loharanon’aina ny fahazavan-tsaina amin’izay manana izany;
  - type: text
    content: Fa ny famaizana ataon’ny adala dia fahadalana ihany.
  '23':
  - type: text
    content: Ny fon’ny hendry mahahendry ny vavany
  - type: text
    content: Sady manampy fahendrena eo amin’ny molony.
  '24':
  - type: text
    content: Toho-tantely ny teny mahafinaritra,
  - type: text
    content: Ka sady mamin’ny fanahy no mahatsara ny taolana.
  '25':
  - type: text
    content: Misy làlana ataon’ny olona ho mahitsy,
  - type: text
    content: Kanjo làlana mivarina any amin’ny fahafatesana no iafarany.
  '26':
  - type: text
    content: Ny fahanoanan’ny mpiasa dia mampiasa azy,
  - type: note
    content: Heb. miasa ho azy.
  - type: text
    content: Fa ny tendany
  - type: note
    content: Heb. vavany.
  - type: text
    content: ' no manesika azy.'
  '27':
  - type: text
    content: Ny ratsy fanahy mihady lavaka fanimbana,
  - type: text
    content: Sady misy toy ny afo mahamay eo amin’ny molony.
  '28':
  - type: text
    content: Ny mpivadibadika mamafy ady;
  - type: text
    content: Ary ny mpibitsibitsika mampisaraka ny tena mpisakaiza.
  '29':
  - type: text
    content: Ny lozabe mitaona ny namany
  - type: text
    content: Ka mitarika azy amin’ny làlana tsy tsara.
  '3':
  - type: text
    content: Ankino amin’i Jehvoah ny asanao,
  - type: text
    content: Dia ho lavorary izay kasainao.
  '30':
  - type: text
    content: Izay manakimpy ny masony hieritreritra ny ratsy
  - type: text
    content: Sady manaikitraiki-molotra dia efa mikasa hanao ratsy.
  '31':
  - type: text
    content: Satroboninahitra tsara tarehy ny volo fotsy,
  - type: text
    content: Ao amin’ny làlan’ny fahamarinana no ahazoana azy.
  '32':
  - type: text
    content: Tsara ny mahatsindry fo noho ny mahery,
  - type: text
    content: Ary izay mahazaka ny fanahiny noho izay mahafa-bohitra.
  '33':
  - type: text
    content: Ny filokana dia atsipy ao am-pofoany;
  - type: text
    content: Fa avy amin’i Jehovah ihany no isehoan’ny fitsarany.
  '4':
  - type: text
    content: Ny zavatra rehetra nataon’i Jehovah dia samy misy antony avokoa;
  - type: text
    content: Eny, ny ratsy fanahy koa aza dia nataony ho amin’ny andro hahitan-doza.
  '5':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah izay rehetra miavonavona am-po,
  - type: text
    content: Azo itompoana tokoa fa
  - type: note
    content: 'Heb. Azo ifandraisan-tànana; na: Hatramin’ny taranaka fara mandimby dia.'
  - type: text
    content: ' tsy maintsy hampijalina izy.'
  '6':
  - type: text
    content: Ny famindrampo sy ny fahamarinana no avotra amin’ny heloka;
  - type: text
    content: Ary ny fahatahorana an’i Jehovah no analavirana ny ratsy.
  '7':
  - type: text
    content: Raha sitrak’i Jehovah ny alehan’ny olona,
  - type: text
    content: Na dia ny fahavalony aza dia hampihavaniny aminy.
  '8':
  - type: text
    content: Aleo ny kely omban’ny fahamarinana
  - type: text
    content: Toy izay ny harem-bevava azo amin’ny tsy rariny.
  '9':
  - type: text
    content: Ny fon’ny olona mihevitra tsara ny halehany;
  - type: text
    content: Fa Jehovah ihany no mahalavorary ny diany.
