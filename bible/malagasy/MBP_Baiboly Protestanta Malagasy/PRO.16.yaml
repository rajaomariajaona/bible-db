document_id: PRO.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny fikasan’ny fo no amin’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny famalian’ny lela dia avy amin’i Jehovah.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny teny marina dia eo amin’ny molotry ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy diso teny izy, raha mitsara.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: An’i Jehovah ny fandanjana sy ny mizana marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Asany.
      marker-yv: yv-n
    - type: text
      text: ' avokoa ireo vato rehetra an-kitapo.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fahavetavetana eo imason’ny mpanjaka ny fanaovan-dratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fahamarinana no iorenan’ny seza fiandrianana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Sitraky ny mpanjaka ny molotra marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay miteny mahitsy no tiany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny fahatezeran’ny mpanjaka dia iraky ny fahafatesana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olon-kendry mampionona izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Amin’ny fahamiramiranan’ny tarehin’ny mpanjaka dia misy fiainana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fankasitrahany dia toy ny rahona amin’ny fararano.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsara ny mahazo fahendrena noho ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsara ny mahazo fahalalana noho ny volafotsy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny manalavitra ny ratsy no làlamben’ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay mitandrina ny alehany no miaro ny ainy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanahiny.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fiavonavonana mialoha ny fahasimbana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanahy mirehareha mialoha ny fahalavoana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsara ny malemy fanahy ao amin’izay manetry tena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny mizara babo amin’izay miavonavona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ataon’ny olona ho madio avokoa ny làlana rehetra alehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah ihany no mpandanja ny fanahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izay mandinika ny teny no hahita soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay matoky an’i Jehovah no ho sambatra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izay hendry am-po dia lazaina hoe manan-tsaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hamamian’ny molotra mampandroso fahendrena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Loharanon’aina ny fahazavan-tsaina amin’izay manana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny famaizana ataon’ny adala dia fahadalana ihany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny fon’ny hendry mahahendry ny vavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manampy fahendrena eo amin’ny molony.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Toho-tantely ny teny mahafinaritra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka sady mamin’ny fanahy no mahatsara ny taolana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Misy làlana ataon’ny olona ho mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo làlana mivarina any amin’ny fahafatesana no iafarany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny fahanoanan’ny mpiasa dia mampiasa azy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miasa ho azy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tendany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vavany.
      marker-yv: yv-n
    - type: text
      text: ' no manesika azy.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny ratsy fanahy mihady lavaka fanimbana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady misy toy ny afo mahamay eo amin’ny molony.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny mpivadibadika mamafy ady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpibitsibitsika mampisaraka ny tena mpisakaiza.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny lozabe mitaona ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitarika azy amin’ny làlana tsy tsara.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ankino amin’i Jehvoah ny asanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho lavorary izay kasainao.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izay manakimpy ny masony hieritreritra ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manaikitraiki-molotra dia efa mikasa hanao ratsy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Satroboninahitra tsara tarehy ny volo fotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny làlan’ny fahamarinana no ahazoana azy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Tsara ny mahatsindry fo noho ny mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay mahazaka ny fanahiny noho izay mahafa-bohitra.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny filokana dia atsipy ao am-pofoany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy amin’i Jehovah ihany no isehoan’ny fitsarany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny zavatra rehetra nataon’i Jehovah dia samy misy antony avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny ratsy fanahy koa aza dia nataony ho amin’ny andro hahitan-doza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fahavetavetana eo imason’i Jehovah izay rehetra miavonavona am-po,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azo itompoana tokoa fa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Azo ifandraisan-tànana; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hatramin’ny taranaka fara mandimby dia.
      marker-yv: yv-n
    - type: text
      text: ' tsy maintsy hampijalina izy.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny famindrampo sy ny fahamarinana no avotra amin’ny heloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahatahorana an’i Jehovah no analavirana ny ratsy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha sitrak’i Jehovah ny alehan’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny fahavalony aza dia hampihavaniny aminy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aleo ny kely omban’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay ny harem-bevava azo amin’ny tsy rariny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny fon’ny olona mihevitra tsara ny halehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah ihany no mahalavorary ny diany.
