document_id: JER.45,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny nasain’Andriamanitra nolazain’i Jeremia tamin’i Baroka.
  - type: text
    content: 'NY teny izay nataon’i Jeremia mpaminany tamin’i Baroka, zanak’i Neria, fony izy nanoratra ireto teny ireto tamin’ny taratasy avy tamin’ny vavan’i Jeremia tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’i Joda, hoe:'
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely, ny aminao, ry Baroka: '
  '3':
  - type: text
    content: 'Hoy hianao: Idiran-doza aho ity! fa nampian’i Jehovah alahelo ny fanaintainako; efa sasatra ny misento aho ka tsy mahita fitsaharana. '
  '4':
  - type: text
    content: 'Lazao aminy hoe: Izao no lazain’i Jehovah: Indro, horavako izay efa naoriko, ary hongotako izay efa namboleko, dia izao tany rehetra izao. '
  '5':
  - type: text
    content: Mitady zavatra lehibe ho anao va hianao? aza mitady izany! fa, indro, hahatonga loza ho amin’ny nofo rehetra Aho, hoy Jehovah; fa raha ny ainao dia homeko anao ho babonao ihany any amin’izay rehetra halehanao.
