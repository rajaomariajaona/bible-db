document_id: JER.45
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Teny nasain’Andriamanitra nolazain’i Jeremia tamin’i Baroka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'NY teny izay nataon’i Jeremia mpaminany tamin’i Baroka, zanak’i Neria, fony izy nanoratra ireto teny ireto tamin’ny taratasy avy tamin’ny vavan’i Jeremia tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’i Joda, hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely, ny aminao, ry Baroka: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy hianao: Idiran-doza aho ity! fa nampian’i Jehovah alahelo ny fanaintainako; efa sasatra ny misento aho ka tsy mahita fitsaharana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lazao aminy hoe: Izao no lazain’i Jehovah: Indro, horavako izay efa naoriko, ary hongotako izay efa namboleko, dia izao tany rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitady zavatra lehibe ho anao va hianao? aza mitady izany! fa, indro, hahatonga loza ho amin’ny nofo rehetra Aho, hoy Jehovah; fa raha ny ainao dia homeko anao ho babonao ihany any amin’izay rehetra halehanao.
