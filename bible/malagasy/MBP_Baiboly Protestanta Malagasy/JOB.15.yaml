document_id: JOB.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny fanindroany nataon’i Elifaza.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Elifaza Temanita ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tokony handahatra hevi-dravina va ny olon-kendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hameno ny kibony amin’ny rivotra avy any atsinanana va,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hamaly amin’ny teny tsy mahasoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny teny tsy mahatsara?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, foananao ny fahatahorana an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tampenanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamavoinao.
    marker-yv: yv-n
  - type: text
    text: ' ny fivavahana eo anatrehany;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny helokao no manesika ny vavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mianatra ny lelan’ny fetsy hianao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy maneho ny helokao va ny vavanao, Na dia mianatra ny lelan’ny fetsy aza hianao?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny vavanao ihany no manameloka anao, fa tsy izaho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny molotrao ihany no mamely anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao va no voalohany izay nateraka ho olombelona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na naloaky ny kibo talohan’ny tendrombohitra va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Isan’ny mpihevitra teo amin’Andriamanitra va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka voarombakao ho anao irery ny fahendrena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no fantatrao, ka tsy mba fantatray koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na saina azonao, ka tsy ato aminay koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny anti-panahy sy ny fotsy volo dia misy ato aminay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, olona ela niainana noho ny rainao aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ataonao ho tsinontsinona va ny fampiononana avy amin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny teny natao aminao amin’ny fahalemem-panahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no dia entin’ny fonao hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no mipipy foana ny masonao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka miefonefona amin’Andriamanitra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miteniteny foana ny vavanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Inona ny zanak’olombelona no mba hadio izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tera-behivavy no mba ho marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, ireo anjeliny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: masina.
    marker-yv: yv-n
  - type: text
    text: ' aza tsy mahatoky Azy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lanitra aza tsy madio eo imasony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa mainka fa izay vetaveta sy tena ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny olona izay misotro heloka toa rano!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hanambara aminao aho, ka mihainoa ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay efa hitako no holazaiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia zavatra notorin’ny olon-kendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy nafeniny,–dia izay azony avy tamin’ny razany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireny ihany no nomena ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisy olona hafa firenena nisisika teo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny ratsy fanahy mijalijaly amin’ny androny rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny taona rehetra voatendry ho an’ny lozabe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Feo mampitahotra no ren’ny sofiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia miadana aza izy, dia avy hamely azy ihany ny mpandroba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy manantena ho afaka amin’ny maizina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andrasan’ny sabatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mirenireny hitady izay hohaniny izy ka manao hoe: Aiza re?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantany fa antomotra azy ny andro maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fahoriana sy fahaporitana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Alahelo sy ahiahy.
    marker-yv: yv-n
  - type: text
    text: ' no mampitahotra azy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin’ny ady,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Satria naninjitra ny tànany hanohitra an’Andriamanitra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nirehareha hanohitra ny Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mimaona amin’ny fahamafian-katoka hamely Azy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny foitran’ampingany matevina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Satria efa matavitavy tarehy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mivalon-kotraka ny valahany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary monina ao an-tanàna rava izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ao an-trano tokony tsy hitoeran’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa voatendry ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hanan-karena izy, sady tsy haharitra ny heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho vokatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hilonjehitra amin’ny tany toy ny vary efa vokatra.
    marker-yv: yv-n
  - type: text
    text: ' ambonin’ny tany ny fananany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy ho afaka amin’ny maizina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny solofony hikainkona azon’ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho levon’ny fofonain’Andriamanitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aoka tsy ho voafitaka hatoky zava-poana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa zava-poana no ho valiny homena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha mbola tsy tonga aza ny androny, dia manjo azy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho maitso ny sampany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho tahaka ny voaloboka manintsana ny voany manta izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tahaka ny hazo oliva mampiraraka ny voniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa tsy ho vanona ny ankohonan’ny mpihatsaravelatsihy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lanin’ny afo ny tranon’ny mpitoroka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Torontoronina fampahoriana izy ka miteraka fandozana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kibony mamorom-pitaka.
