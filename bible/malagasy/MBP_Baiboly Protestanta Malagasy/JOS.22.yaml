document_id: JOS.22
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampodiana ny firenena roa sy sasany ho any an-dafy atsinanan’i Jordana, sy ny nanorenay ilay alitara teo amoron’i Jordana, ary ny nataon’ny firenena sasany tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’izay dia nantsoin’i Josoa ny Robenita sy ny Gadita sy ny antsasaky ny firenen’i Manase, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy taminy: Hianareo efa nitandrina izay rehetra nandidian’i Mosesy, mpanompon’i Jehovah, anareo sady efa nihaino ny feoko koa tamin’izay rehetra nandidiako anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy nilaozanareo ny rahalahinareo hatramin’izany andro maro izany ka mandraka andro-any, fa notandremanareo ny lalàna nasain’i Jehovah Andriamanitrareo notandremanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ankehitriny, dia efa nomen’i Jehovah Andriamanitrareo fitsaharana ny rahalahinareo, araka izay nolazainy taminy; koa modia ankehitriny, ka mankanesa any amin’ny lainareo avy, ho any amin’ny taninareo, izay nomen’i Mosesy, mpanompon’i Jehovah, anareo any an-dafin’i Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanefa mitandrema tsara mba hanaraka ny didy sy ny lalàna izay nandidian’i Mosesy, mpanompon’i Jehovah, anareo, hitiavanareo an’i Jehovah Andriamanitrareo sy handehananareo amin’ny làlany rehetra sy hitandremanareo ny didiny sy hifikiranareo aminy ary hanompoanareo Azy amin’ny fonareo rehetra sy ny fanahinareo rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nitso-drano azy Josoa ka nampody azy; dia lasa nankany amin’ny lainy avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny antsasaky ny firenen’i Manase efa nomen’i Mosesy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lova
  - type: text
    text: ' tany Basana; fa ny antsasany kosa efa nomen’i Josoa teo amin’ny rahalahiny etỳ an-dafy andrefan’i Jordana. Ary raha nampodin’i Josoa ho any amin’ny lainy koa ireo, dia notsofiny rano izy '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nilazany hoe: Modia ho any amin’ny lainareo avy hianareo, mitondra harena be sy omby aman-ondry be indrindra sy volafotsy sy volamena sy varahina sy vy ary fitafiana be dia be; ary iombony amin’ny rahalahinareo ny babo azo tamin’ny fahavalonareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nody ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase ka nandao ny Zanak’Isiraely tao Silo, izay ao amin’ny tany Kanana, hankany amin’ny tany Gileada ho any amin’ny zara-taniny, izay azony araka ny tenin’i Jehovah nasainy nolazain’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary raha tonga teo amoron’i Jordana eo amin’ny tany Kanana ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase, dia nanorina alitara teo izy, ary lehibe ny fiijery izany alitara izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Zanak’Isiraely nahare hoe: Indreo, ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase efa nanorina alitara an-tsisin’ny tany Kanana, eo amoron’i Jordana, anatin’ny tanin’ny Zanak’Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nony ren’ny Zanak’Isiraely izany, dia niangona tao Silo ny fiangonana, dia ny Zanak’Isiraely rehetra, mba hiakatra hiady aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia naniraka an’i Finehasa, zanak’i Eleazara mpisorona, ny Zanak’Isiraely ho any amin’ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase, any amin’ny tany Gileada, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'sy loholona folo lahy koa niaraka taminy, dia loholona iray isam-pirenena tamin’Isiraely rehetra: samy lohan’ny fianakaviany tamin’ny arivon’ny Isiraely ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia tonga tany amin’ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase tany amin’ny tany Gileada ireo ka niteny taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’ny fiangonan’i Jehovah rehetra: Inona izato fahotana nataonareo amin’Andriamanitry ny Isiraely, no niala tamin’ny fanarahana an’i Jehovah hianareo andro-any tamin’ny nanorenanareo alitara ka miodina amin’i Jehovah ankehitriny? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zavatra kely loatra amintsika va ilay heloka ny amin’i Peora, izay tsy mbola nahadiovantsika ny tenantsika ho afaka amin’izany mandraka andro-any, na dia efa nisy aza ilay areti-mandringana tamin’ny fiangonan’i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'no dia mihodina miala amin’ny fanarahana an’i Jehovah hianareo anio? Raha miodina amin’i Jehovah hianareo anio, dia ho tezitra amin’ny fiangonana, dia ny Isiraely rehetra, Izy rahampitso. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa raha maloto ny taninareo, dia mità ho any amin’ny tanin’i Jehovah, izay itoeran’ny tabernakelin’i Jehovah, ka any aminay maka fonenana; fa aza miodina amin’i Jehovah, na miodina aminay, amin’ny anorenanareo alitara afa-tsy ny alitaran’i Jehovah Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy nandika ny didy va Akana, zanak’i Zera, tamin’ny zavatra voaozona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii. 28.
    marker-yv: yv-n
  - type: text
    text: ' ka nisy fahatezerana nahatratra ny fiangonana, dia ny Isiraely rehetra? Ary tsy io lehilahy irery io ihany no maty tamin’izany helony izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia namaly ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase ka nanao tamin’ny mpifehy arivo tamin’ny Isiraely hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Andriamanitra Andriananahary, dia Jehovah–eny, Andriamanitra Andriananahary, dia Jehovah, Izy no mahalala, ary ny Israely hahalala koa; raha fiodinana na fahadisoana amin’i Jehovah (aza mba mamonjy anay akory Hianao anio),– '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'raha izany no nanorenanay alitara, mba hiala amin’ny fanarahana an’i Jehovah, na hanatitra fanatitra odorana, na fanatitra hohanina, na fanati-pihavanana, eo amboniny, dia aoka Jehovah no hanadina; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa tahotra tokoa no anton’ny nanaovanay izao; fa hoy izahay: Rahatrizay dia hanontany ny taranakay ny taranakareo hoe: Moa mifaninona akory hianareo sy Jehovah, Andriamanitry ny Isiraely? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa Jordana no nataon’i Jehovah ho faritra eo anelanelantsika, ry taranak’i Robena sy Gada, ka tsy manana anjara amin’i Jehovah hianareo; ka dia hampitsaharan’ny taranakareo tsy hatahotra an’i Jehovah ny taranakay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy izahay: Aoka isika hanorina alitara ho antsika, tsy hanaterana fanatitra odorana anefa, na fanatitra hafa alatsa-dra, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa mba ho vavolombelona ho amintsika sy ny taranatsika mandimby antsika, hanaovanay ny fanompoana an’i Jehovah eo anatrehany amin’ny hanaterana fanatitra odorana sy fanatitra hafa alatsa-dra ary fanati-pihavanana mba tsy holazain’ny taranakareo amin’ny taranakay rahatrizay hoe: Tsy manana anjara amin’i Jehovah hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy izahay: Raha tàhiny lazainy aminay na ny taranakay izany rahatrizay, dia hataonay hoe: Jereo ny endriky ny alitaran’i Jehovah, izay nataon’ny razanay, tsy hanaterana fanatitra, odorana anefa na fanatitra hafa alatsa-dra, fa mba ho vavolombelona ho amintsika roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sanatria aminay raha hiodina amin’i Jehovah ka hiala anio amin’ny fanarahana an’i Jehovah hanorina alitara hanaterana fanatitra odorana, na fanatitra hohanina, na fanatitra hafa alatsa-dra, afa-tsy ny alitaran’i Jehovah Andriamanitsika, izay eo anoloan’ny tabernakeliny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa ren’i Finehasa mpisorona sy ny lohan’ny fiangonana, dia ny mpifehy arivo tamin’ny Isiraely, izay niaraka taminy, ny teny izay nolazain’ny taranak’i Robena sy Gada ary ny taranak’i Manase, dia sitrany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Finehasa, zanak’i Eleazara mpisorona, tamin’ny taranak’i Robena sy Gada ary ny taranak’i Manase: Fantatray anio fa eto amintsika Jehovah, satria tsy nanao izany fahadisoana izany tamin’i Jehovah hianareo; ary amin’izany dia efa namonjy ny Zanak’Isiraely tamin’ny tànan’i Jehovah hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Finehasa, zanak’i Eleazara mpisorona, sy ny loholona dia niverina nandao ny taranak’i Robena sy Gada tany amin’ny tany Gileada ka nankany amin’ny tany Kanana ho any amin’ny Zanak’Isiraely ary nitondra valin-teny ho any aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary sitraky ny Zanak’Isiraely izany, dia nisaotra an’Andriamanitra ny Zanak’Isiraely ka tsy nihevitra hiakatra hiady aminy intsony handrava ny tany izay nonenan’ny taranak’i Robena sy Gada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia nasian’ny taranak’i Robena sy Gada anarana ilay alitara–fa vavolombelona ho amintsika roa tonta io fa Jehovah no Andriamanitra.
