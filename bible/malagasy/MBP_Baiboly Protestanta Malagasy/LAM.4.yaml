document_id: LAM.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fietren-tena noho ny fitsarana ataon’Andriamanitra, ary fanantenam-pamonjena.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: INDRISY! efa matromatroka ny volamena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa niova ny tena volamena tsara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vato nohamasinina dia efa nahahany eny an-joron-dàlambe rehetra eny.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny tànan’ny vehivavy malemy fanahy aza dia nahandro ny zanany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izany no nohaniny tamin’ny fandringanana ny oloko zanakavavy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tanterahin’i Jehovah ny fahavinirany, naidiny ny fahatezerany mirehitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy nampirehitra afo tao Ziona, handevonana ny fanorenany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny mpanjakan’ny tany sy ny mponina rehetra amin’izao tontolo izao dia tsy nanampo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny rafilahy sy ny fahavalo no ho tafiditra ao amin’ny vavahadin’i Jerosalema.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Noho ny fahotan’ny mpaminany sy ny heloky ny mpisorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nandatsaka ny ran’ny marina tao aminy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no nahatongavan’izao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Niraparapa toy ny jamba teny an-dàlambe izy, sady voahosin-dra ny tenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nisy sahy nikasika ny akanjony.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny olona niantsoantso azy hoe: Mialà hianareo, fa maloto, mialà, mialà, aza mikasika anay.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha nandositra sy niraparapa izy, dia hoy ny olona tany amin’ny jentilisa: Tsy mahazo mivahiny atỳ intsony ireny.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny fahatezeran’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tavany.
      marker-yv: yv-n
    - type: text
      text: ' i Jehovah no nampihahakahaka azy, ary tsy mijery azy intsony Izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpisorona tsy hajain’ireny, ary ny antitra tsy amindrany fo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mbola pahina ny masonay miandry foana ny hamonjy anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitazana teo amin’ny tilikambo izahay nanantena ny firenena izay tsy nahavonjy anay.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mitsongo-dia anay izy, ka tsy mahazo mandeha eny an-dàlambe aza izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akaiky ny fara-fiainanay, tapitra ny andronay, eny, tonga ny fara-fiainanay.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny mpanenjika anay dia haingam-pandeha noho ny voromahery eny amin’ny lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miolomay manenjika anay any an-tendrombohitra ary manotrika anay any an-efitra izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Indrisy! ny zanaka mahafinaritr’i Ziona, izay saro-bidy tahaka ny tena volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa atao ho toy ny siny, asan-tànan’ny mpanefy tanimanga!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny fofonainay, ilay voahosotr’i Jehovah, dia efa voafandriky ny longoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ilay nataonay hoe: Ao ambanin’ny alokalony no hahavelona anay any amin’ny firenena.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mifalia sy miravoravoa ihany ary, ry Edoma zanakavavy, izay monina any amin’ny tany Oza,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao koa no horosoana ny kapoaka, ka ho mamo sy hitanjaka hianao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy misy intsony ny helokao, ry Ziona zanakavavy, tsy ho entina ho babo intsony hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaly anao Izy, ry Edoma zanakavavy, noho ny helokao ka hampiseho ny fahotanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Na dia ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
    - type: text
      text: ' aza dia manolotra nono hampinonoany ny zanany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny oloko zanakavavy kosa dia efa masiaka toy ny ostritsa any an-efitra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny lelan’ny zaza minono miraikitra amin’ny lanilaniny noho ny hetaheta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ankizy madinika mangataka hanina, nefa tsy misy mizara ho azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay nihinana zava-py dia mahantra eny an-dàlambe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay notezaina tamin’ny jaky dia mandamaka eny amin’ny zezika.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manohona ny zezika.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ny heloky ny oloko zanakavavy dia lehibe noho ny helok’i Sodoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay noravana indray mipì-maso monja, nefa tsy nokasihin-tànana akory,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny lehibeny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Naziritany.
      marker-yv: yv-n
    - type: text
      text: ' dia mangatsakatsaka noho ny fanala, eny, fotsy noho ny ronono;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mena noho ny voahangy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pèrila.
      marker-yv: yv-n
    - type: text
      text: ' ny tenany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny vato safira ny endriny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa izao kosa dia mainty noho ny arina ny tarehiny, ka tsy fantatra eny an-dàlana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hodiny miraikitra amin’ny taolany ka tonga maina toy ny hazo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsara ny matin-tsabatra noho ny maty mosary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ireto dia mihareraka toy ny voatrobaka noho ny tsi-fisian’ny vokatry ny saha.
