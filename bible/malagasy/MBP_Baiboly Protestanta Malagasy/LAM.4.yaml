document_id: LAM.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fietren-tena noho ny fitsarana ataon’Andriamanitra, ary fanantenam-pamonjena.
  - type: text
    content: INDRISY! efa matromatroka ny volamena;
  - type: text
    content: Efa niova ny tena volamena tsara!
  - type: text
    content: Ny vato nohamasinina dia efa nahahany eny an-joron-dàlambe rehetra eny.
  '10':
  - type: text
    content: 'Ny tànan’ny vehivavy malemy fanahy aza dia nahandro ny zanany:'
  - type: text
    content: Eny, izany no nohaniny tamin’ny fandringanana ny oloko zanakavavy.
  '11':
  - type: text
    content: Tanterahin’i Jehovah ny fahavinirany, naidiny ny fahatezerany mirehitra,
  - type: text
    content: Ary Izy nampirehitra afo tao Ziona, handevonana ny fanorenany.
  '12':
  - type: text
    content: Ny mpanjakan’ny tany sy ny mponina rehetra amin’izao tontolo izao dia tsy nanampo
  - type: text
    content: Fa ny rafilahy sy ny fahavalo no ho tafiditra ao amin’ny vavahadin’i Jerosalema.
  '13':
  - type: text
    content: Noho ny fahotan’ny mpaminany sy ny heloky ny mpisorony,
  - type: text
    content: 'Izay nandatsaka ny ran’ny marina tao aminy, '
  - type: text
    content: no nahatongavan’izao.
  '14':
  - type: text
    content: Niraparapa toy ny jamba teny an-dàlambe izy, sady voahosin-dra ny tenany,
  - type: text
    content: Ka tsy nisy sahy nikasika ny akanjony.
  '15':
  - type: text
    content: 'Ny olona niantsoantso azy hoe: Mialà hianareo, fa maloto, mialà, mialà, aza mikasika anay.'
  - type: text
    content: 'Raha nandositra sy niraparapa izy, dia hoy ny olona tany amin’ny jentilisa: Tsy mahazo mivahiny atỳ intsony ireny.'
  '16':
  - type: text
    content: Ny fahatezeran’
  - type: note
    content: Heb. tavany.
  - type: text
    content: ' i Jehovah no nampihahakahaka azy, ary tsy mijery azy intsony Izy;'
  - type: text
    content: Ny mpisorona tsy hajain’ireny, ary ny antitra tsy amindrany fo.
  '17':
  - type: text
    content: Mbola pahina ny masonay miandry foana ny hamonjy anay;
  - type: text
    content: Nitazana teo amin’ny tilikambo izahay nanantena ny firenena izay tsy nahavonjy anay.
  '18':
  - type: text
    content: Mitsongo-dia anay izy, ka tsy mahazo mandeha eny an-dàlambe aza izahay;
  - type: text
    content: Akaiky ny fara-fiainanay, tapitra ny andronay, eny, tonga ny fara-fiainanay.
  '19':
  - type: text
    content: Ny mpanenjika anay dia haingam-pandeha noho ny voromahery eny amin’ny lanitra,
  - type: text
    content: Ka miolomay manenjika anay any an-tendrombohitra ary manotrika anay any an-efitra izy.
  '2':
  - type: text
    content: Indrisy! ny zanaka mahafinaritr’i Ziona, izay saro-bidy tahaka ny tena volamena,
  - type: text
    content: Dia efa atao ho toy ny siny, asan-tànan’ny mpanefy tanimanga!
  '20':
  - type: text
    content: Ny fofonainay, ilay voahosotr’i Jehovah, dia efa voafandriky ny longoany,
  - type: text
    content: 'Dia ilay nataonay hoe: Ao ambanin’ny alokalony no hahavelona anay any amin’ny firenena.'
  '21':
  - type: text
    content: Mifalia sy miravoravoa ihany ary, ry Edoma zanakavavy, izay monina any amin’ny tany Oza,–
  - type: text
    content: Hianao koa no horosoana ny kapoaka, ka ho mamo sy hitanjaka hianao.
  '22':
  - type: text
    content: Tsy misy intsony ny helokao, ry Ziona zanakavavy, tsy ho entina ho babo intsony hianao;
  - type: text
    content: Hamaly anao Izy, ry Edoma zanakavavy, noho ny helokao ka hampiseho ny fahotanao.
  '3':
  - type: text
    content: Na dia ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' aza dia manolotra nono hampinonoany ny zanany;'
  - type: text
    content: Fa ny oloko zanakavavy kosa dia efa masiaka toy ny ostritsa any an-efitra.
  '4':
  - type: text
    content: Ny lelan’ny zaza minono miraikitra amin’ny lanilaniny noho ny hetaheta;
  - type: text
    content: Ny ankizy madinika mangataka hanina, nefa tsy misy mizara ho azy.
  '5':
  - type: text
    content: Izay nihinana zava-py dia mahantra eny an-dàlambe;
  - type: text
    content: Izay notezaina tamin’ny jaky dia mandamaka eny amin’ny zezika.
  - type: note
    content: Heb. manohona ny zezika.
  '6':
  - type: text
    content: Fa ny heloky ny oloko zanakavavy dia lehibe noho ny helok’i Sodoma,
  - type: text
    content: Izay noravana indray mipì-maso monja, nefa tsy nokasihin-tànana akory,
  '7':
  - type: text
    content: Ny lehibeny
  - type: note
    content: Heb. Naziritany.
  - type: text
    content: ' dia mangatsakatsaka noho ny fanala, eny, fotsy noho ny ronono;'
  - type: text
    content: Mena noho ny voahangy
  - type: note
    content: Na. pèrila.
  - type: text
    content: ' ny tenany;'
  - type: text
    content: Tahaka ny vato safira ny endriny.
  '8':
  - type: text
    content: Fa izao kosa dia mainty noho ny arina ny tarehiny, ka tsy fantatra eny an-dàlana izy;
  - type: text
    content: Ny hodiny miraikitra amin’ny taolany ka tonga maina toy ny hazo.
  '9':
  - type: text
    content: Tsara ny matin-tsabatra noho ny maty mosary;
  - type: text
    content: Fa ireto dia mihareraka toy ny voatrobaka noho ny tsi-fisian’ny vokatry ny saha.
