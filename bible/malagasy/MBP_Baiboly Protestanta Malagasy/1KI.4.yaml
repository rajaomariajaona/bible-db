document_id: 1KI.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny mpanao raharaham-panjakana, ary ny voninahitr’i Solomona sy ny fahendreny.
  - type: text
    content: 'ARY nanjaka tamin’ny Isiraely rehetra Solomona mpanjaka. '
  '10':
  - type: text
    content: 'Beni-haseda tao Arobota; Soko sy ny tany Hefera rehetra no azy; '
  '11':
  - type: text
    content: 'Ben-abinadaba tao amin’ny havoan’i Dora rehetra (Tafata, zanakavavin’i Solomona, no vadiny); '
  '12':
  - type: text
    content: 'Bana, zanak’i Ahiloda; azy Tanaka sy Megido ary Beti-sana rehetra, izay anilan’i Zaretana, ambanin’i Jezirela, hatrany Beti-sana ka hatrany Abela-mehola, dia hatrany ankoatr’i Jokneama no azy. '
  '13':
  - type: text
    content: Beni-gabera tao Ramota-gileada; ny tanàna madinika an’i Jaïra,
  - type: note
    content: Havota-jaïra; izahao Nom. xxxii.41.
  - type: text
    content: ' zanak’i Manase, izay any Gileada, no azy; azy koa ny tany Argoba, izay any Basana, dia tanàna enim-polo lehibe nisy mànda sy hidy varahina; '
  '14':
  - type: text
    content: 'Ahinadaba, zanak’Ido, tany Mahanaima; '
  '15':
  - type: text
    content: 'Ahimaza tany Naftaly; izy kosa nanambady an’i Basemata, zanakavavin’i Solomona; '
  '16':
  - type: text
    content: 'Bana, zanak’i Hosay, tany Asera sy Alota; '
  '17':
  - type: text
    content: 'Josafata, zanak’i Paroa, tany Isakara; '
  '18':
  - type: text
    content: 'Simey, zanak’i Ela, tany Benjamina; '
  '19':
  - type: text
    content: Gabera, zanak’i Ory, tany amin’ny tany Gileada, tanin’i Sihona, mpanjakan’ny Amorita, sy Oga, mpanjakan’i Basana; ary izy ihany no voatendry ho amin’izany tany izany.
  '2':
  - type: text
    content: 'Ary izao no lehibe tao aminy: Azaria, zanak’i Zadoka, no mpisorona;'
  - type: note
    content: 'Na: zanak’i Zadoka mpisorona.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Ary ny Joda sy ny Isiraely dia maro, tahaka ny fasika amoron-dranomasina ny hamarony, sady mihinana sy misotro ary mifaly.
  '3':
  - type: text
    content: 'Elihorefa sy Ahia, zanak’i Sisa, no mpanoratra; Josafata, zanak’i Ahiloda, no mpitadidy ny raharaha-mpanjakana; '
  '4':
  - type: text
    content: 'ary Benaia, zanak’i Joiada, no komandin’ny miaramila; ary Zadoka sy Abiatara no mpisorona; '
  '5':
  - type: text
    content: ary Azaria, zanak’i Natana, no lehiben’ny olona voatendry; ary Zaboda, zanak’i Natana, no mpanolo-tsaina,
  - type: note
    content: Heb. mpisorona.
  - type: text
    content: ' sakaizan’ny mpanjaka; '
  '6':
  - type: text
    content: ary Ahisara no lehiben’ny tao an-dapa; ary Adonirama, zanak’i Abda, no komandin’ny mpanao fanompoana.
  '7':
  - type: text
    content: 'Ary Solomona nanendry roa ambin’ny folo lahy ho amin’ny Isiraely rehetra hiadidy ny zavatra rehetra nilain’ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin’ny herintaona izy. '
  '8':
  - type: text
    content: 'Ary izao no anarany: Beni-hora tany amin’ny tany havoan’i Efraima; '
  '9':
  - type: text
    content: 'Beni-dakera tao Makaza sy tao Salbima sy Beti-semesy ary Elon-beti-hanana; '
