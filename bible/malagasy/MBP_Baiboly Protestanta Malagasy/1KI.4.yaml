document_id: 1KI.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny mpanao raharaham-panjakana, ary ny voninahitr’i Solomona sy ny fahendreny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nanjaka tamin’ny Isiraely rehetra Solomona mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izao no lehibe tao aminy: Azaria, zanak’i Zadoka, no mpisorona;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanak’i Zadoka mpisorona.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elihorefa sy Ahia, zanak’i Sisa, no mpanoratra; Josafata, zanak’i Ahiloda, no mpitadidy ny raharaha-mpanjakana; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Benaia, zanak’i Joiada, no komandin’ny miaramila; ary Zadoka sy Abiatara no mpisorona; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary Azaria, zanak’i Natana, no lehiben’ny olona voatendry; ary Zaboda, zanak’i Natana, no mpanolo-tsaina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpisorona.
    marker-yv: yv-n
  - type: text
    text: ' sakaizan’ny mpanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary Ahisara no lehiben’ny tao an-dapa; ary Adonirama, zanak’i Abda, no komandin’ny mpanao fanompoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Solomona nanendry roa ambin’ny folo lahy ho amin’ny Isiraely rehetra hiadidy ny zavatra rehetra nilain’ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin’ny herintaona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izao no anarany: Beni-hora tany amin’ny tany havoan’i Efraima; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Beni-dakera tao Makaza sy tao Salbima sy Beti-semesy ary Elon-beti-hanana; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Beni-haseda tao Arobota; Soko sy ny tany Hefera rehetra no azy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ben-abinadaba tao amin’ny havoan’i Dora rehetra (Tafata, zanakavavin’i Solomona, no vadiny); '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Bana, zanak’i Ahiloda; azy Tanaka sy Megido ary Beti-sana rehetra, izay anilan’i Zaretana, ambanin’i Jezirela, hatrany Beti-sana ka hatrany Abela-mehola, dia hatrany ankoatr’i Jokneama no azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Beni-gabera tao Ramota-gileada; ny tanàna madinika an’i Jaïra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Havota-jaïra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Nom. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxxii.41.
    marker-yv: yv-n
  - type: text
    text: ' zanak’i Manase, izay any Gileada, no azy; azy koa ny tany Argoba, izay any Basana, dia tanàna enim-polo lehibe nisy mànda sy hidy varahina; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahinadaba, zanak’Ido, tany Mahanaima; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahimaza tany Naftaly; izy kosa nanambady an’i Basemata, zanakavavin’i Solomona; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bana, zanak’i Hosay, tany Asera sy Alota; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josafata, zanak’i Paroa, tany Isakara; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Simey, zanak’i Ela, tany Benjamina; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Gabera, zanak’i Ory, tany amin’ny tany Gileada, tanin’i Sihona, mpanjakan’ny Amorita, sy Oga, mpanjakan’i Basana; ary izy ihany no voatendry ho amin’izany tany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny Joda sy ny Isiraely dia maro, tahaka ny fasika amoron-dranomasina ny hamarony, sady mihinana sy misotro ary mifaly.
