document_id: DEU.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany no nilazan’i Jehovah tamiko hoe: Manamboara vato fisaka roa ho anao tahaka ilay teo, ka miakara ho etỳ amiiko etỳ an-tendrombohitra, ary manaova fiara hazo ho anao; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho nitoetra efa-polo andro sy efa-polo alina tao an-tendrombohitra tahaka ilay teo ihany; ary Jehovah nihaino ahy tamin’izany andro izany koa ka tsy nety nandringana anao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamiko: Miaingà, mandehana eo alohan’ny olona, hidirany sy handovany ny tany, izay nianianako tamin’ny razany homena azy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra ny amin’ny fahatahorana an’Andriamanitra sy ny fitiavana Azy, ary filazana ny soa ho azon’ny manaraka ny lalàna sy ny loza hanjo ny tsy manaraka azy.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ankehitriny, ry Isiraely ô, inona moa no ilain’i Jehovah Andriamanitrao aminao, afa-tsy ny hatahotra an’i Jehovah Andriamanitrao sy ny handeha amin’ny làlany rehetra ary ny ho tia Azy sy hanompo an’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hitandrina ny didin’i Jehovah sy ny lalàny izay andidiako anao anio, mba hahita soa hianao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, an’i Jehovah Andriamanitrao ny lanitra sy ny lanitry ny lanitra ary ny tany mbamin’izay rehetra eo aminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny razanao no niraiketan’ny fitiavan’i Jehovah, ka nifidy anareo zanany mandimby azy Izy mihoatra noho ny firenena rehetra, tahaka ny amin’izao anio izao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa forao ny fonareo, fa aza mafy hatoka intsony hianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Jehovah Andriamanitrareo no Andriamanitra Avo Indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andrimanitry ny andriamanitra.
      marker-yv: yv-n
    - type: text
      text: 'sy Tompon’ny tompo, Andriamanitra lehibe sy mahery ary mahatahotra, Izay tsy mizaha tavan’olona, na mandray kolikoly; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'manome rariny ny kamboty sy ny mpitondratena Izy, sady tia ny vahiny ka manome azy hanina sy fitafiana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tiava vahiny; fa efa mba vahiny tany amin’ny tany Egypta hianareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hosoratako amin’ny vato fisaka ilay teny teo amin’ny vato fisaka nomontsamontsaninao, ka hataonao ao anatin’ny fiara ireny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah Andriamanitrao no hatahoranao; Izy no hotompoinao, ary Izy no hifikiranao, ary ny anarany no hianiananao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no fidèranao, ary Izy no Andriamanitrao, Izay efa nanao ireo zavatra lehibe sy mahatahotra ireo taminao, izay efa hitan’ny masonao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Olona fito-polo ny razanao izay nidina tany Egypta; nefa ankehitriny efa nataon’i Jehovah Andriamanitrao maro tahaka ny kintana eny amin’ny lanitra hianao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao fiara tamin’ny hazo akasia aho ka nanamboatra vato fisaka roa tahaka ny teo, dia niakatra tao an-tendrombohitra aho ka nitondra ny vato fisaka roa teny an-tànako. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nasiany soratra tahaka ny teo ihany ny vato fisaka, dia ny Didy Folo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Teny Folo.
      marker-yv: yv-n
    - type: text
      text: 'izay nolazain’i Jehovah taminareo tao an-tendrombohitra tao amin’ny afo tamin’ny andro nivoriana; dia nomen’i Jehovah ahy ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nihodina aho ka nidina niala teo amin’ny tendrombohitra, ary ny vato fisaka napetrako tao anatin’ny fiara izay efa nataoko–dia mbola ao ihany ireny–araka izay nandidian’i Jehovah ahy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Zanak’i Isiraely nandeha niala tamin’ny fantsakan’i Bene-Jakana ka nankany Mosera; tao no nahafatesan’i Arona, ary tao no nandevenana azy; ary i Eleazara zanany no tonga mpisorona nandimby azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony niala tao izy, dia nankany Godgoda; ary nony niala tao Godgoda izy, dia nankany Jotbata, tany be ony.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’izany andro izany no nanokanan’i Jehovah ny firenen’i Levy hitondra ny fiaran’ny faneken’i Jehovah sy hijanona eo anatrehan’i Jehovah hanao fanompoam-pivavahana aminy sy hitsodrano amin’ny anarany mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no tsy ananan’ny Levita anjara na lova eo amin’ny rahalahiny; Jehovah no lovany, araka izay nolazain’i Jehovah Andriamanitrao taminy.
