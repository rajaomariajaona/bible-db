document_id: JOL.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY tenin’i Jehovah, izay tonga tamin’i Joela, zanak’i Petoela.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Filazana ny loza nanjo, ary fitarainana sy anatra noho izany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: HENOY izao, ry anti-panahy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandrenesa, hianareo mponina rehetra amin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa mba efa nisy tamin’ny andronareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na tamin’ny andron’ny razanareo, va izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lazao amin’ny zanakareo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny zanakareo hilaza amin’ny zanany kosa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’ireo kosa indray amin’ny taranaka mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay sisan’ny kijeja
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpikiky.
    marker-yv: yv-n
  - type: text
    text: ' dia nohanin’ny koraika;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary izay sisan’ny koraika dia nohanin’ny valalavao:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpilelaka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay sisan’ny valalavao dia nohanin’ny sompanga.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpandany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mifohaza, hianareo mpimamo, ka mitomania,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, midradradradrà, hianareo mpisotro divay rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny ranom-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tapaka tsy ho amin’ny vavanareo izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa misy firenena mahery sady tsy hita isa miakatra hamely ny taniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny nifiny dia nifin-diona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vazany dia vazan’ny liom-bavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nataony simba tokoa ny voaloboko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary notapatapahiny ny aviaviko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataony nakiky tokoa ireny ka nariany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tonga fotsy ny rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Midradradradrà toy ny virijina misikin-damba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin’ny vadin’ny fahatanorany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa tapaka tsy ho ao amin’ny tranon’i Jehovah ny fanatitra hohanina sy ny fanatitra aidina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mariry ny saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaona ny tany fambolena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa simba ny vary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ritra ny ranom-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Malazo.
    marker-yv: yv-n
  - type: text
    text: ' ny diloilo.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ho menatra hianareo mpiasa tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà, hianareo mpamboatra tanimboaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny vary tritika sy ny vary hordea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa majifa ny vokatry ny saha;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maina ny voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malazo ny aviavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary malazo koa ny ampongabendanitra sy ny rofia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
  - type: text
    text: ' ary ny paoma aza,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny hazo rehetra any an-tsaha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, malazo ny fifalian’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misìkina sy mitomania, hianareo mpisorona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà, hianareo mpanao fanompoam-pivavahana eo amin’ny alitara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha mandry amin’ny lamba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' mandritra ny alina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo mpanao fanompoam-pivavahana ho an’Andriamanitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tapaka tsy ho ao amin’ny tranon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanatitra hohanina sy ny fanatitra aidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manamasìna andro fifadian-kanina, miantsoa fivoriana masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angony ny loholona sy ny mponina rehetra amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ao an-tranon’i Jehovah Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa andeha mitaraina amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indrisy ny andro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa antomotra ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tahaka ny loza tsy toha avy amin’ny Tsitoha no fihaviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moa tsy efa tapaka teo imasontsika va ny hanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny fifaliana sy ny faharavoravoana tsy ho ao an-tranon’Andriamanitsika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Matimaso ao ambanin’ny baingan-tany ny vary nafafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana ny sompitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mirodana ny trano fitehirizam-bary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nalazo ny vary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indrisy, ny fitoreon’ny biby!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very hevitra ny omby andiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy misy ahitra ho azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia ny andian’ny ondry aman-osy aza dia mijaly noho ny heloka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jehovah ô, Hianao no itarainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa levon’ny afo ny kijana any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nisy lelafo efa nandoro ny hazo rehetra any an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ritra ny renirano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa levon’ny afo ny kijana any an-efitra.
