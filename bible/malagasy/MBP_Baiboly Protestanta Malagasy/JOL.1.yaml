document_id: JOL.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Jehovah, izay tonga tamin’i Joela, zanak’i Petoela.
  - type: heading
    content: Filazana ny loza nanjo, ary fitarainana sy anatra noho izany.
  '10':
  - type: text
    content: Mariry ny saha,
  - type: text
    content: Misaona ny tany fambolena;
  - type: text
    content: Fa simba ny vary,
  - type: text
    content: Ritra ny ranom-boaloboka,
  - type: text
    content: Mihena
  - type: note
    content: Heb. Malazo.
  - type: text
    content: ' ny diloilo.'
  '11':
  - type: text
    content: Aoka ho menatra hianareo mpiasa tany;
  - type: text
    content: Midradradradrà, hianareo mpamboatra tanimboaloboka,
  - type: text
    content: Noho ny vary tritika sy ny vary hordea;
  - type: text
    content: Fa majifa ny vokatry ny saha;
  '12':
  - type: text
    content: Maina ny voaloboka,
  - type: text
    content: Malazo ny aviavy,
  - type: text
    content: Ary malazo koa ny ampongabendanitra sy ny rofia
  - type: note
    content: palma.
  - type: text
    content: ' ary ny paoma aza,'
  - type: text
    content: Dia ny hazo rehetra any an-tsaha;
  - type: text
    content: Eny, malazo ny fifalian’ny zanak’olombelona.
  '13':
  - type: text
    content: Misìkina sy mitomania, hianareo mpisorona;
  - type: text
    content: Midradradradrà, hianareo mpanao fanompoam-pivavahana eo amin’ny alitara;
  - type: text
    content: Andeha mandry amin’ny lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' mandritra ny alina,'
  - type: text
    content: Hianareo mpanao fanompoam-pivavahana ho an’Andriamanitro,
  - type: text
    content: Fa tapaka tsy ho ao amin’ny tranon’Andriamanitra
  - type: text
    content: Ny fanatitra hohanina sy ny fanatitra aidina.
  '14':
  - type: text
    content: Manamasìna andro fifadian-kanina, miantsoa fivoriana masina,
  - type: text
    content: Angony ny loholona sy ny mponina rehetra amin’ny tany
  - type: text
    content: Ho ao an-tranon’i Jehovah Andriamanitrareo,
  - type: text
    content: Koa andeha mitaraina amin’i Jehovah.
  '15':
  - type: text
    content: Indrisy ny andro!
  - type: text
    content: Fa efa antomotra ny andron’i Jehovah,
  - type: text
    content: Ka tahaka ny loza tsy toha avy amin’ny Tsitoha no fihaviny.
  '16':
  - type: text
    content: Moa tsy efa tapaka teo imasontsika va ny hanina,
  - type: text
    content: Eny, ny fifaliana sy ny faharavoravoana tsy ho ao an-tranon’Andriamanitsika?
  '17':
  - type: text
    content: Matimaso ao ambanin’ny baingan-tany ny vary nafafy,
  - type: text
    content: Foana ny sompitra,
  - type: text
    content: Mirodana ny trano fitehirizam-bary;
  - type: text
    content: Fa nalazo ny vary.
  '18':
  - type: text
    content: Indrisy, ny fitoreon’ny biby!
  - type: text
    content: Very hevitra ny omby andiany,
  - type: text
    content: Satria tsy misy ahitra ho azy;
  - type: text
    content: Eny, na dia ny andian’ny ondry aman-osy aza dia mijaly noho ny heloka.
  '19':
  - type: text
    content: Jehovah ô, Hianao no itarainako,
  - type: text
    content: Fa efa levon’ny afo ny kijana any an-efitra,
  - type: text
    content: Ary nisy lelafo efa nandoro ny hazo rehetra any an-tsaha.
  '2':
  - type: text
    content: HENOY izao, ry anti-panahy!
  - type: text
    content: Ary mandrenesa, hianareo mponina rehetra amin’ny tany!
  - type: text
    content: Moa mba efa nisy tamin’ny andronareo
  - type: text
    content: Na tamin’ny andron’ny razanareo, va izao?
  '20':
  - type: text
    content: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao,
  - type: text
    content: Satria ritra ny renirano,
  - type: text
    content: Ary efa levon’ny afo ny kijana any an-efitra.
  '3':
  - type: text
    content: Lazao amin’ny zanakareo izao,
  - type: text
    content: Ary aoka ny zanakareo hilaza amin’ny zanany kosa,
  - type: text
    content: Ary ny zanak’ireo kosa indray amin’ny taranaka mandimby azy.
  '4':
  - type: text
    content: Izay sisan’ny kijeja
  - type: note
    content: Heb. mpikiky.
  - type: text
    content: ' dia nohanin’ny koraika;'
  - type: text
    content: 'Ary izay sisan’ny koraika dia nohanin’ny valalavao:'
  - type: note
    content: Heb. mpilelaka.
  - type: text
    content: Ary izay sisan’ny valalavao dia nohanin’ny sompanga.
  - type: note
    content: Heb. mpandany.
  '5':
  - type: text
    content: Mifohaza, hianareo mpimamo, ka mitomania,
  - type: text
    content: Eny, midradradradrà, hianareo mpisotro divay rehetra,
  - type: text
    content: Noho ny ranom-boaloboka,
  - type: text
    content: Satria tapaka tsy ho amin’ny vavanareo izany.
  '6':
  - type: text
    content: Fa misy firenena mahery sady tsy hita isa miakatra hamely ny taniko;
  - type: text
    content: Ny nifiny dia nifin-diona,
  - type: text
    content: Ary ny vazany dia vazan’ny liom-bavy.
  '7':
  - type: text
    content: Nataony simba tokoa ny voaloboko,
  - type: text
    content: Ary notapatapahiny ny aviaviko;
  - type: text
    content: Nataony nakiky tokoa ireny ka nariany,
  - type: text
    content: Eny, tonga fotsy ny rantsany.
  '8':
  - type: text
    content: Midradradradrà toy ny virijina misikin-damba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' noho ny amin’ny vadin’ny fahatanorany.'
  '9':
  - type: text
    content: Efa tapaka tsy ho ao amin’ny tranon’i Jehovah ny fanatitra hohanina sy ny fanatitra aidina;
  - type: text
    content: Mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an’i Jehovah.
