document_id: 1TI.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny hihemoran’ny sasany, sy fananarana an’i Timoty hazoto hanefa ny anjara-fanompoany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'FA ny Fanahy milaza marina fa amin’ny andro aoriana dia hihemotra amin’ny finoana ny sasany, manaiky fanahy mamitaka sy fampianaran’ny demonia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'amin’ny fihatsarambelatsihin’ny mpilaza lainga, ka voapetaky ny vy mahamay ny fieritreretany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'izay mandrara tsy hanam-bady, ary mampifady hanina, izay nataon’Andriamanitra ho an’izay mino sady mahalala ny marina, mba horaisiny amin’ny fisaorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny zavatra rehetra nataon’Andriamanitra dia tsara avokoa, ka tsy misy tokony holavina, raha raisina amin’ny fisaorana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: satria hamasinin’ny tenin’Andriamanitra sy ny fivavahana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha manoro hevitra ny rahalahy ny amin’izany zavatra izany hianao, dia ho mpanompo tsara an’i Kristy Jesosy, tezaina amin’ny tenin’ny finoana sy ny fampianarana tsara izay efa narahinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny anganongano ratsy fanaom-bavy antitra dia lavo, ka mampiasà ny tenanao ho amin’ny toe-panahy araka an’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa mahasoa kely ihany ny fampiasana ny tena; fa ny toe-panahy araka an’Andriamanitra no mahasoa amin’ny zavatra rehetra ka manana ny teny fikasana ny amin’ny fiainana ankehitriny sy ny ho avy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mahatoky izao teny izao ka tokony hekena amin’ny fankasitrahana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izany no ikelezanay aina sy iezahanay, satria izahay manantena an’Andriamanitra velona, Izay Mpamonjy ny olona rehetra, indrindra fa izay mino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany zavatra izany no andidio sy ampianaro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka tsy hisy olona hanao tsinontsinona anao noho ny hatanoranao; fa aoka ho tonga fianarana ho an’ny mino hianao amin’ny fiteny, amin’ny fitondrantena, amin’ny fitiavana, amin’ny finoana, amin’ny fahadiovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandra-pihaviko tandremo ny famakian-teny, ny fananarana, ny fampianarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza tsy mitandrina ny fanomezam-pahasoavana izay ao anatinao, izay nomena anao tamin’ny faminaniana sy ny fametrahan-tànan’ny loholona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbyteria.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mazotoa hihevitra izany zavatra izany, dia mikeleza aina fatratra amin’izany, mba hiseho amin’ny olona rehetra ny fandrosoanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tandremo ny tenanao sy ny fampianaranao, ka mahareta amin’izany; fa raha manao izany hianao, dia hamonjy ny tenanao sy izay mihaino anao.
