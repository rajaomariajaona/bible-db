document_id: PSA.89,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra noho ny fahatsarany, indrindra fa noho ny fanekeny tamin’i Davida.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Maskila nataon’i Etana Ezrahita.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY famindrampon’i Jehovah no hohiraiko mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny taranaka fara mandimby no hampahafantaran’ny vavako ny fahamarinanao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hianao nanorotoro an-dRahaba ho tahaka izay voavono;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sandrinao mahery no nampielezanao ny fahavalonao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Anao ny lanitra, Anao koa ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao tontolo izao sy izay rehetra eo aminy, Hianao no nanorina azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny avaratra sy ny atsimo, Hianao no nahary azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anaranao no ihobian’i Tabara sy Hermona.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Manan-tsandry mahery Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahery ny tananao, avo ny tànanao ankavanana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rariny sy fitsarana no fanorenan’ny seza fiandriananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famindrampo sy fahamarinana no mialoha ny tavanao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sambatra izay olona mahalala ny feo mahafaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, amin’ny fahazavan’ny tavanao no handehanany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny anaranao no hifaliany mandrakariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinanao no hisandratany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa voninahitry ny heriny Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny fankasitrahanao no hisandratan’ny tandrokay.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa an’i Jehovah ny ampinganay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary an’ny Iray Masin’ny Isiraely ny mpanjakanay.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa ny ampinganay dia an’i Jehovah, dia ny Iray Masin’ny Isiraely Mpanjakanay.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tamin’izany ny olonao masina dia nilazanao tamin’ny fahitana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nametraka famonjena tamin’izay mahery Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanandratra ny anankiray voafidy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nanandratra zatovo avy.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny olona.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa hoy izaho: Hotovonana mandrakizay ny famindrampo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinanao hampitoerinao any an-danitra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Efa nahita an’i Davida mpanompoko Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny diloiloko masina no nanosorako azy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izy no homban’ny tànako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny sandriko no hampahery azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy hamitaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hitaky trosa aminy.
      marker-yv: yv-n
    - type: text
      text: ' azy ny fahavalo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hampahory azy ny ratsy fanahy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa handripaka ny fahavalony eo anoloan’ny tavany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hamely izay mankahala azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny fahamarinako sy ny famindrampoko homba azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anarako no hisandratan’ny tandrony.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia hampitoetra ny tànany amin’ny ranomasina Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tànany ankavanana amin’ny ony.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Izy hiantso Ahy hoe: Raiko Hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro sy Vatolampin’ny famonjena ahy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary Izaho kosa hanao azy ho lahimatoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambony indrindra amin’ny mpanjakan’ny tany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Hitahiry ny famindrampoko ho azy mandrakizay Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanekeko hampaharetiko aminy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Hampaharitra ny taranany ho mandrakizay Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny seza fiandrianany ho tahaka ny faharetan’ny lanitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ',,Efa nanao fanekena tamin’ny voafidiko Aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, efa nianiana tamin’i Davida mpanompoko Aho hoe:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Raha mahafoy ny lalàko ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mandeha araka ny fitsipiko,–
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Raha ny teniko no ataony ho fahavetavetana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny didiko no tsy tandremany,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dia hovaliako tsorakazo ny fahadisoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary kapoka ny helony.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Nefa ny famindrampoko tsy hofoanako aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinako tsy havadiko,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ny fanekeko tsy hotsoahako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nolazain’ny molotro tsy hovako.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Izao zavatra iray loha izao no nianianako tamin’ny fahamasinako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy handainga amin’i Davida mihitsy Aho:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ny taranany haharitra mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny seza fiandrianany ho tahaka ny masoandro eo anatrehako;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Hampitoerina mandrakizay tahaka ny volana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny vavolombelona marina any an-danitra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary ny vavolombelona any an-danitra dia marina.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Fa efa narianao sy nolavinao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tezitra tamin’ny voahosotrao Hianao.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Efa nahafoana ny fanekena tamin’ny mpanomponao Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nataonao ho fahavetavetana ny satro-boninahiny ka narianao teny an-tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hampitoetra ny taranakao ho mandrakizay Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanangana ny seza fiandriananao hatramin’ny taranaka fara mandimby’’
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Efa noravanao ny fefiny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nosimbanao ny fiarovany mafy.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Izay rehetra mandalo eny an-dàlana dia manimba azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa fandàtsan’ny mpiray monina aminy izy.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Efa nampisandratra ny tànana ankavanan’ny rafilahiny Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nampifaly ny fahavalony rehetra.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Efa nampihemotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.43 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nampilefitra.
      marker-yv: yv-n
    - type: text
      text: ' ny lelan’ny sabany Hianao.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nampaharitra azy tamin’ny ady.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Efa nampitsahatra ny voninahiny Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanongana ny seza fiandrianany ho amin’ny tany.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Efa nahafohy ny andron’ny fahatanorany Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nanaron-kenatra azy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Mandra-pahoviana, Jehovah ô? Hiery mandrakizay va Hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hirehitra tahaka ny afo va ny fahatezeranao?
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Tsarovy ny hafohin’ny androko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toa zava-poana mihitsy ny namoronanao ny zanak’olombelona rehetra!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Iza no olona ho velona tsy hahita fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamonjy ny fanahiny tsy ho azon’ny tànan’ny fiainan-tsi-hita?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.48 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Tompo ô, aiza ny famindramponao fahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nianiananao tamin’i Davida tamin’ny fahamarinanao?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary ny lanitra hidera ny fahagagana ataonao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinanao koa ao amin’ny fiangonan’ny olomasina.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Tompo ô, tsarovy ny latsa manjo ny mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tratrako vesaran’ny firenena rehetra,
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Dia ny nandatsan’ny fahavalonao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny nandatsany ny dian’ny voahosotrao.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Isaorana mandrakizay anie Jehovah. Amena dia Amena.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
