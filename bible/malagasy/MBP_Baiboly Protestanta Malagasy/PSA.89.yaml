document_id: PSA.89,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny fahatsarany, indrindra fa noho ny fanekeny tamin’i Davida.
  - type: text
    content: Maskila nataon’i Etana Ezrahita.
  - type: text
    content: NY famindrampon’i Jehovah no hohiraiko mandrakizay;
  - type: text
    content: Hatramin’ny taranaka fara mandimby no hampahafantaran’ny vavako ny fahamarinanao.
  '10':
  - type: text
    content: Hianao nanorotoro an-dRahaba ho tahaka izay voavono;
  - type: text
    content: Ny sandrinao mahery no nampielezanao ny fahavalonao.
  '11':
  - type: text
    content: Anao ny lanitra, Anao koa ny tany;
  - type: text
    content: Izao tontolo izao sy izay rehetra eo aminy, Hianao no nanorina azy.
  '12':
  - type: text
    content: Ny avaratra sy ny atsimo, Hianao no nahary azy;
  - type: text
    content: Ny anaranao no ihobian’i Tabara sy Hermona.
  '13':
  - type: text
    content: Manan-tsandry mahery Hianao;
  - type: text
    content: Mahery ny tananao, avo ny tànanao ankavanana.
  '14':
  - type: text
    content: Rariny sy fitsarana no fanorenan’ny seza fiandriananao;
  - type: text
    content: Famindrampo sy fahamarinana no mialoha ny tavanao.
  '15':
  - type: text
    content: Sambatra izay olona mahalala ny feo mahafaly;
  - type: text
    content: Jehovah ô, amin’ny fahazavan’ny tavanao no handehanany.
  '16':
  - type: text
    content: Ny anaranao no hifaliany mandrakariva;
  - type: text
    content: Ary ny fahamarinanao no hisandratany.
  '17':
  - type: text
    content: Fa voninahitry ny heriny Hianao;
  - type: text
    content: Ary amin’ny fankasitrahanao no hisandratan’ny tandrokay.
  '18':
  - type: text
    content: Fa an’i Jehovah ny ampinganay;
  - type: text
    content: Ary an’ny Iray Masin’ny Isiraely ny mpanjakanay.
  - type: note
    content: 'Na: Fa ny ampinganay dia an’i Jehovah, dia ny Iray Masin’ny Isiraely Mpanjakanay.'
  '19':
  - type: text
    content: 'Tamin’izany ny olonao masina dia nilazanao tamin’ny fahitana hoe:'
  - type: text
    content: Nametraka famonjena tamin’izay mahery Aho
  - type: text
    content: Ary nanandratra ny anankiray voafidy
  - type: note
    content: 'Na: nanandratra zatovo avy.'
  - type: text
    content: ' tamin’ny olona.'
  '2':
  - type: text
    content: 'Fa hoy izaho: Hotovonana mandrakizay ny famindrampo;'
  - type: text
    content: Ny fahamarinanao hampitoerinao any an-danitra.
  '20':
  - type: text
    content: Efa nahita an’i Davida mpanompoko Aho;
  - type: text
    content: Ny diloiloko masina no nanosorako azy;
  '21':
  - type: text
    content: Izy no homban’ny tànako;
  - type: text
    content: Eny, ny sandriko no hampahery azy.
  '22':
  - type: text
    content: Tsy hamitaka
  - type: note
    content: 'Na: hitaky trosa aminy.'
  - type: text
    content: ' azy ny fahavalo;'
  - type: text
    content: Ary tsy hampahory azy ny ratsy fanahy.
  '23':
  - type: text
    content: Fa handripaka ny fahavalony eo anoloan’ny tavany Aho
  - type: text
    content: Sady hamely izay mankahala azy.
  '24':
  - type: text
    content: Ny fahamarinako sy ny famindrampoko homba azy;
  - type: text
    content: Ary ny anarako no hisandratan’ny tandrony.
  '25':
  - type: text
    content: Dia hampitoetra ny tànany amin’ny ranomasina Aho
  - type: text
    content: Ary ny tànany ankavanana amin’ny ony.
  '26':
  - type: text
    content: 'Izy hiantso Ahy hoe: Raiko Hianao,'
  - type: text
    content: Andriamanitro sy Vatolampin’ny famonjena ahy.
  '27':
  - type: text
    content: Ary Izaho kosa hanao azy ho lahimatoa,
  - type: text
    content: Ambony indrindra amin’ny mpanjakan’ny tany.
  '28':
  - type: text
    content: Hitahiry ny famindrampoko ho azy mandrakizay Aho,
  - type: text
    content: Ary ny fanekeko hampaharetiko aminy.
  '29':
  - type: text
    content: Hampaharitra ny taranany ho mandrakizay Aho,
  - type: text
    content: Ary ny seza fiandrianany ho tahaka ny faharetan’ny lanitra.
  '3':
  - type: text
    content: ',,Efa nanao fanekena tamin’ny voafidiko Aho;'
  - type: text
    content: 'Eny, efa nianiana tamin’i Davida mpanompoko Aho hoe:'
  '30':
  - type: text
    content: Raha mahafoy ny lalàko ny zanany
  - type: text
    content: Ka tsy mandeha araka ny fitsipiko,–
  '31':
  - type: text
    content: Raha ny teniko no ataony ho fahavetavetana,
  - type: text
    content: Ary ny didiko no tsy tandremany,
  '32':
  - type: text
    content: Dia hovaliako tsorakazo ny fahadisoany,
  - type: text
    content: Ary kapoka ny helony.
  '33':
  - type: text
    content: Nefa ny famindrampoko tsy hofoanako aminy,
  - type: text
    content: Ary ny fahamarinako tsy havadiko,
  '34':
  - type: text
    content: Ny fanekeko tsy hotsoahako,
  - type: text
    content: Ary ny nolazain’ny molotro tsy hovako.
  '35':
  - type: text
    content: Izao zavatra iray loha izao no nianianako tamin’ny fahamasinako,
  - type: text
    content: 'Tsy handainga amin’i Davida mihitsy Aho:'
  '36':
  - type: text
    content: Ny taranany haharitra mandrakizay,
  - type: text
    content: Ary ny seza fiandrianany ho tahaka ny masoandro eo anatrehako;
  '37':
  - type: text
    content: Hampitoerina mandrakizay tahaka ny volana izy,
  - type: text
    content: Tahaka ny vavolombelona marina any an-danitra.
  - type: note
    content: 'Na: Ary ny vavolombelona any an-danitra dia marina.'
  - type: text
    content: '[Sela.]'
  '38':
  - type: text
    content: Fa efa narianao sy nolavinao izy;
  - type: text
    content: Efa tezitra tamin’ny voahosotrao Hianao.
  '39':
  - type: text
    content: Efa nahafoana ny fanekena tamin’ny mpanomponao Hianao;
  - type: text
    content: Efa nataonao ho fahavetavetana ny satro-boninahiny ka narianao teny an-tany.
  '4':
  - type: text
    content: Hampitoetra ny taranakao ho mandrakizay Aho
  - type: text
    content: Ka hanangana ny seza fiandriananao hatramin’ny taranaka fara mandimby’’
  - type: text
    content: '[Sela.]'
  '40':
  - type: text
    content: Efa noravanao ny fefiny rehetra;
  - type: text
    content: Efa nosimbanao ny fiarovany mafy.
  '41':
  - type: text
    content: Izay rehetra mandalo eny an-dàlana dia manimba azy;
  - type: text
    content: Efa fandàtsan’ny mpiray monina aminy izy.
  '42':
  - type: text
    content: Efa nampisandratra ny tànana ankavanan’ny rafilahiny Hianao
  - type: text
    content: Ary efa nampifaly ny fahavalony rehetra.
  '43':
  - type: text
    content: Efa nampihemotra
  - type: note
    content: 'Na: nampilefitra.'
  - type: text
    content: ' ny lelan’ny sabany Hianao.'
  - type: text
    content: Ka tsy nampaharitra azy tamin’ny ady.
  '44':
  - type: text
    content: Efa nampitsahatra ny voninahiny Hianao
  - type: text
    content: Ka nanongana ny seza fiandrianany ho amin’ny tany.
  '45':
  - type: text
    content: Efa nahafohy ny andron’ny fahatanorany Hianao
  - type: text
    content: Ary efa nanaron-kenatra azy.
  - type: text
    content: '[Sela.]'
  '46':
  - type: text
    content: Mandra-pahoviana, Jehovah ô? Hiery mandrakizay va Hianao?
  - type: text
    content: Hirehitra tahaka ny afo va ny fahatezeranao?
  '47':
  - type: text
    content: Tsarovy ny hafohin’ny androko;
  - type: text
    content: Toa zava-poana mihitsy ny namoronanao ny zanak’olombelona rehetra!
  '48':
  - type: text
    content: Iza no olona ho velona tsy hahita fahafatesana,
  - type: text
    content: Fa hamonjy ny fanahiny tsy ho azon’ny tànan’ny fiainan-tsi-hita?
  - type: note
    content: Heb. Sheola.
  - type: text
    content: '[Sela.]'
  '49':
  - type: text
    content: Tompo ô, aiza ny famindramponao fahiny,
  - type: text
    content: Izay nianiananao tamin’i Davida tamin’ny fahamarinanao?
  '5':
  - type: text
    content: Ary ny lanitra hidera ny fahagagana ataonao, Jehovah ô,
  - type: text
    content: Ary ny fahamarinanao koa ao amin’ny fiangonan’ny olomasina.
  '50':
  - type: text
    content: Tompo ô, tsarovy ny latsa manjo ny mpanomponao,
  - type: text
    content: Ny tratrako vesaran’ny firenena rehetra,
  '51':
  - type: text
    content: Dia ny nandatsan’ny fahavalonao, Jehovah ô,
  - type: text
    content: Eny, ny nandatsany ny dian’ny voahosotrao.
  '52':
  - type: text
    content: Isaorana mandrakizay anie Jehovah. Amena dia Amena.
  '6':
  - type: text
    content: Fa iza any an-danitra no mitovy amin’i Jehovah?
  - type: text
    content: Ary iza amin’ny zanak’ireo andriamanitra no manahaka an’i Jehovah,
  '7':
  - type: text
    content: Dia Andriamanitra mahatahotra indrindra eo amin’ny fiangonan’ny olo-masiny
  - type: text
    content: Ary hajain’izay rehetra manodidina Azy?
  '8':
  - type: text
    content: Jehovah, Andriamanitry ny maro, ô, iza no mahery tahaka Anao, Jehovah?
  - type: text
    content: Ary manodidina Anao ny fahamarinanao.
  '9':
  - type: text
    content: Hianao manapaka ny fisavoan’ny ranomasina;
  - type: text
    content: Raha manonja ny alony, dia mampitsahatra azy Hianao.
