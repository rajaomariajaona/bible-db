verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vita ny lanitra sy ny tany sy izay rehetra ao aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ony nivoaka avy tao Edena handena ny saha; hatreo izy dia nizara ka nisampana efatra:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tonga lohany efatra.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anaran’ny voalohany dia Pisona; io no mandeha manodidina ny tany Havila rehetra, izay misy ny volamena;
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsara ny volamena amin’izany tany izany; any ny bedola sy ny vato beryla. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran’ny ony faharoa dia Gihona; io no mandeha manodidina ny tany Kosy rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran’ny ony fahatelo dia Hidekela; io no mandeha tandrifin’i Asyria. Ary ny ony fahefatra dia Eofrata.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jehovah Andriamanitra nitondra an-dralehilahy ka namponina azy tao amin’ny saha Edena hiasa sy hitandrina azy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah Andriamanitra nandidy an-dralehilahy ka nanao hoe: Ny hazo rehetra eo amin’ny saha dia azonao ihinanana ihany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny hazo fahalalana ny tsara sy ny ratsy dia aza ihinanana; fa amin’ny andro izay ihinananao azy dia ho faty tokoa hianao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah Andriamanitra nanao hoe: Tsy tsara raha irery ralehilahy; dia hanaovako vady sahaza'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanampy tandrifiny.
      marker-yv: yv-n
    - type: text
      text: ' ho azy izy.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tany no namoronan’i Jehovah Andriamanitra ny bibi-dia rehetra sy ny voro-manidina rehetra; dia nentiny tany amin-dralehilahy ireny hahitany izay hanononany azy avy; ary izay rehetra nanononan-dralehilahy ny zava-manan-aina rehetra, dia izany no anarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny andro fahafito dia vitan’Andriamanitra ny asa efa nataony; ary dia nitsahatra tamin’ny andro fahafito Izy tamin’ny asany rehetra izay efa nataony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen-dralehilahy anarana ny biby fiompy rehetra sy ny voro-manidina mbamin’ny bidi-dia rehetra; nefa tsy hita izay vady sahaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanampy tandrifiny.
      marker-yv: yv-n
    - type: text
      text: ' ho an-dralehilahy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah Andriamanitra nahasondrian-tory an-dralehilahy, ka dia natory izy; dia naka ny taolan-tehezany anankiray Izy ka nanakombona nofo ho solony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny taolan-tehezana izay nalain’i Jehovah Andriamanitra tamin-dralehilahy dia nataony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: narafiny.
      marker-yv: yv-n
    - type: text
      text: ' vehivavy ka nentiny tany amin-dralehilahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ralehilahy: Ankehitriny dia taolana avy amin’ny taolako sy nofo avy amin’ny nofoko ity; ity dia hatao hoe ,vehivavy,’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ishah.
      marker-yv: yv-n
    - type: text
      text: ' satria lehilahy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ish.
      marker-yv: yv-n
    - type: text
      text: ' no nanalana azy.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; ary dia ho nofo iray ihany ireo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nitanjaka izy mivady, dia ralehilahy sy ny vadiny, nefa tsy nahalala henatra izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Andriamanitra nitahy ny andro fahafito sy nanamasina azy, satria tamin’izany no nitsaharan’Andriamanitra tamin’ny asany rehetra izay noforoniny tamin’ny nanaovany azy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny saha tao Edena, sy ny toetry ny olombelona fony tsy mbola nanota izy.
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY izao no tantaran’ny lanitra sy ny tany tamin’ny namoronana azy, dia tamin’ny andro nanaovan’i Jehovah Andriamanitra ny tany sy ny lanitra: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hazo madinika famboly dia tsy mbola nisy teo amin’ny tany, ary ny anana famboly tsy mbola nisy naniry; fa tsy mbola nampilatsaka ranonorana tambonin’ny tany Jehovah Andriamanitra, ary tsy nisy olona hiasa ny tany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa nisy zavona niakatra avy tamin’ny tany ka nandena ny tany rehetra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary vovo-tany no namoronan’i Jehovah Andriamanitra ny olona, ary nofofoniny fofonaina mahavelona ny vavorony; dia tonga olombelona izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Hebreo, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tonga manan-aina ny olona.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah Andriamanitra nanao saha tao Edena tany atsinanana, ka napetrany tao ralehilahy izay noforoniny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampanirin’i Jehovah Andriamanitra teo amin’ny tany ny hazo rehetra izay maha-te-hizaha sady tsara ho fihinana, ary ny hazon’aina teo afovoan’ny saha sy ny hazo fahalalana ny tsara sy ny ratsy.
