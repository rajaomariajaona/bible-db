document_id: ISA.12
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hiteny hianao amin’izany andro izany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera Anao aho, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na dia tezitra tamiko aza Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa tezitra tamiko Hianao, nefa.
    marker-yv: yv-n
  - type: text
    text: ' afaka ny fahatezeranao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampionona ahy Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, Andriamanitra no famonjena ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hatoky aho, fa tsy mba hatahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah Tompo no heriko sy fiderako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa famonjena ahy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa amin’ny fifaliana no hantsakanareo rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny loharanom-pamonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hiteny hianao amin’izany andro izany ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà an’i Jehovah, miantsoa ny anarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahafantaro any amin’ny firenena ny asany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahatsiarovy fa efa misandratra ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mankalazà an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa asa lehibe no nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho fantatra any amin’ny tany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miantsoa mafy sy mihobia, ry mponina any Ziona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lehibe ao afovoanao ny Iray Masin’ny Isiraely.
