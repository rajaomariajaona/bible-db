document_id: ISA.12,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hiteny hianao amin’izany andro izany hoe:'
  - type: text
    content: Hidera Anao aho, Jehovah ô;
  - type: text
    content: Fa na dia tezitra tamiko aza Hianao,
  - type: text
    content: Dia
  - type: note
    content: 'Na: Fa tezitra tamiko Hianao, nefa.'
  - type: text
    content: ' afaka ny fahatezeranao,'
  - type: text
    content: Ka mampionona ahy Hianao.
  '2':
  - type: text
    content: Indro, Andriamanitra no famonjena ahy;
  - type: text
    content: Dia hatoky aho, fa tsy mba hatahotra;
  - type: text
    content: Fa Jehovah Tompo no heriko sy fiderako
  - type: text
    content: Fa efa famonjena ahy Izy.
  '3':
  - type: text
    content: Koa amin’ny fifaliana no hantsakanareo rano
  - type: text
    content: Amin’ny loharanom-pamonjena.
  '4':
  - type: text
    content: 'Ary hiteny hianao amin’izany andro izany ka hanao hoe:'
  - type: text
    content: Miderà an’i Jehovah, miantsoa ny anarany,
  - type: text
    content: Ampahafantaro any amin’ny firenena ny asany.
  - type: text
    content: Ampahatsiarovy fa efa misandratra ny anarany.
  '5':
  - type: text
    content: Mankalazà an’i Jehovah,
  - type: text
    content: Fa asa lehibe no nataony;
  - type: text
    content: Ary aoka ho fantatra any amin’ny tany rehetra izany.
  '6':
  - type: text
    content: Miantsoa mafy sy mihobia, ry mponina any Ziona;
  - type: text
    content: Fa lehibe ao afovoanao ny Iray Masin’ny Isiraely.
