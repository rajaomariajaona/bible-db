document_id: ACT.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahatongavan’i Paoly tany Jerosalema, sy ny nataony hampihena ny tsi-fitiavan’ny Kristiana tany Palestina azy.
  - type: text
    content: 'ARY rehefa tafasaraka taminy izahay, dia niondrana an-tsambo ka nizotra nankany Kosy; ary nony ampitso dia tonga tao Rodo, dia niala tao nankany Patara; '
  '10':
  - type: text
    content: 'Ary raha nitoetra tao andro maro izahay, dia nisy mpaminany anankiray atao hoe Agabo nidina avy tany Jodia. '
  '11':
  - type: text
    content: 'Ary rehefa tonga tao aminay izy, dia noraisiny ny fehin-kibon’i Paoly, ka namatorany ny tongotra aman-tànan’ny tenany, dia hoy izy; Izao no lazain’ny Fanahy Masina: Toy izao no hamatoran’ny Jiosy any Jerosalema ny lehilahy tompon’ity fehin-kibo ity, ka hatolony ho eo an-tànan’ny jentilisa izy. '
  '12':
  - type: text
    content: 'Ary raha vao renay izany, dia nangataka taminy izahay mbamin’izay nonina teo mba tsy hiakarany any Jerosalema. '
  '13':
  - type: text
    content: 'Fa Paoly namaly ka nanao hoe: Nahoana hianareo no mitomany ka mampangorakoraka ny foko? Fa vonona aho tsy ny hafatotra ihany, fa ny ho faty any Jerosalema koa aza mba ho voninahitry ny anaran’i Jesosy Tompo. '
  '14':
  - type: text
    content: 'Ary nony tsy nanaiky izy, dia nitsahatra izahay ka nanao hoe: Aoka ny sitrapon’ny Tompo no hatao.'
  '15':
  - type: text
    content: 'Ary rehefa afaka izany andro izany, dia nifehy entana izahay ka niakatra nankany Jerosalema. '
  '16':
  - type: text
    content: Dia niaraka taminay koa ny mpianatra sasany avy tany Kaisaria, izay nitondra anay ho any amin’i Menasona, olona avy any Kyprosy sady mpianatra maintimolaly, izay nokasainay hitoerana.
  '17':
  - type: text
    content: 'Ary nony tonga tany Jerosalema izahay, dia nandray anay tamin’ny fifaliana ny rahalahy. '
  '18':
  - type: text
    content: Ary nony ampitso dia niara-niditra tany amin’i Jakoba izahay sy Paoly; ary vory teo ny loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' rehetra. '
  '19':
  - type: text
    content: 'Ary rehefa niarahaba azy Paoly, dia nilaza tsirairay ny zavatra rehetra izay efa nampanaovin’Andriamanitra azy tany amin’ny jentilisa izy. '
  '2':
  - type: text
    content: 'ary nony nahita sambo nita ho any Foinika izahay, dia nifindra sambo teo ka lasa nandeha. '
  '20':
  - type: text
    content: 'Ary rehefa nandre izany ireo, dia nankalaza an’Andriamanitra; ary hoy koa izy tamin’i Paoly: Hitanao, rahalahy, fa tsy omby alinalina ny Jiosy izay efa mino; ary fatra-pitana ny lalàna izy rehetra, '
  '21':
  - type: text
    content: 'sady efa novokisan’olona ny aminao, fa hianao, hono, mampianatra ny Jiosy rehetra izay any amin’ny jentilisa hahafoy an’i Mosesy ka mandrara azy tsy hamora ny zaza na hanaraka ny fanaon-drazana. '
  '22':
  - type: text
    content: 'Ahoana ary no izy? Tsy maintsy ho reny ny nahatongavanao. '
  '23':
  - type: text
    content: 'Ary noho izany dia ataovy izao lazainay aminao izao: Misy efa-dahy etỳ izay nivoady; '
  '24':
  - type: text
    content: 'raiso ireo ka manadiova ny tenanao miaraka aminy, ary mandoava ny vola ho lany mba hanaratany ny lohany, ka dia ho fantatry ny olona rehetra fa tsinontsinona izay zavatra namokisana azy ny aminao, fa hianao aza mandeha manaraka ny lalàna kosa. '
  '25':
  - type: text
    content: Fa ny amin’ny jentilisa izay efa mino, dia efa nampitondra epistily izahay nandidy azy hifady ny hena aterina amin’ny sampy sy ny ra sy ny zavatra kendaina ary ny fijangajangana.
  '26':
  - type: text
    content: Dia noraisin’i Paoly ireo lehilahy ireo, ary nony ampitso dia nanadio ny tenany niaraka taminy izy ka niditra teo an-kianjan’ny tempoly, nanambara ny fahatanterahan’ny andro fahadiovana mandra-panatitra ny fanatitra ho an ny isan-dahy.
  - type: heading
    content: Ny nisamborana an’i Paoly, sy ny teny nalahany tamin’izany.
  '27':
  - type: text
    content: 'ARY rehefa ho tapitra ny hafitoana, dia nahita an’i Paoly teo an-kianjan’ny tempoly ny Jiosy avy tany Asia, ka nampikotaba ny vahoaka rehetra izy sady nisambotra an’i Paoly, '
  '28':
  - type: text
    content: 'ka dia niantso hoe: Avia, ry lehilahy Isiraely, fa io no lehilahy mampianatra ny olona rehetra ombieniombieny manohitra ny olona Isiraely sy ny lalàna sy ity fitoerana ity, sady nampiditra jentilisa'
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' teo an-kianjan’ny tempoly izy ka nandoto ity fitoerana masina ity ('
  '29':
  - type: text
    content: fa efa hitany rahateo fa niaraka taminy tao an-tanàna Trofimo Efesiana, ka nataony fa nampidirin’i Paoly teo an-kianjan’ny tempoly izy).
  '3':
  - type: text
    content: 'Ary nony nahatsinjo an’i Kyprosy izahay, dia nandalo azy tamin’ny ankavia ka nankany Syria, dia niantsona tao Tyro; fa tao no notaterina ny entan’ny sambo. '
  '30':
  - type: text
    content: Dia nifanaritaka be ihany ny tao an-tanàna rehetra, ka nihazakazaka nivory ny olona; ary Paoly dia nosamboriny ka nosarihany hiala eo an-kianjan’ny tempoly; ary niaraka tamin’izay dia narindrina ny vavahady.
  '31':
  - type: text
    content: 'Ary raha nitady hamono azy ny olona, dia nisy teny nakarina tany amin’ny mpifehy arivo tamin’ny antokon’ny miaramila nilaza fa mikotaba avokoa Jerosalema rehetra; '
  '32':
  - type: text
    content: 'ary niaraka tamin’izay dia naka miaramila sy kapiteny izy ka nihazakazaka nidina nankeo aminy; ary raha nahita ny mpifehy arivo sy ny miaramila ny olona, dia nitsahatra tsy nikapoka an’i Paoly. '
  '33':
  - type: text
    content: 'Ary ny mpifehy arivo nanakaiky, dia nisambotra azy ka nandidy hamatotra azy tamin’ny gadra roa, dia nanontany hoe: Iza moa izy, ary inona moa no nataony? '
  '34':
  - type: text
    content: 'Ary ny sasany tamin’ny olona maro niantso mafy nilaza zavatra iray, ary ny sasany kosa zavatra hafa; ary rehefa tsy azony nofantarina izay marina noho ny fikotranana, dia nasainy nentina ho any anati-rova Paoly. '
  '35':
  - type: text
    content: 'Ary rehefa tonga teo amin’ny ambaratonga izy, dia nobetain’ny miaramila noho ny fifanosehan’ny olona; '
  '36':
  - type: text
    content: 'fa ny olona maro nanaraka ka niantso hoe: Vonoy ilehio!'
  '37':
  - type: text
    content: 'Ary rehefa nentiny tany anati-rova Paoly, dia hoy izy tamin’ny mpifehy arivo: Mahazo miteny aminao va aho? Dia hoy izy: Mahay teny Grika va hianao? '
  '38':
  - type: text
    content: 'Moa tsy hianao va ilay Egyptiana, izay nampikomy ny olona fahiny ka nitarika ny efatra arivo lahy mpitondra lefom-pohy nankany an-efitra? '
  '39':
  - type: text
    content: 'Fa hoy Paoly: Izaho Jiosy avy any Tarsosy any Kilikia, tompon-tany amin’izay tanàna tsy kely laza; koa trarantitra hianao, aoka aho mba hiteny amin’ny olona. '
  '4':
  - type: text
    content: Ary nony nitady ny mpianatra izahay ka nahita azy, dia nitoetra teo hafitoana; ary izy ireo dia voatsindrin’ny Fanahy hilaza amin’i Paoly mba tsy hiakatra any Jerosalema.
  '40':
  - type: text
    content: 'Ary Paoly, rehefa navelany, dia nitsangana teo amin’ny ambaratonga ka nanofa tànana tamin’ny olona. Ary rehefa nangina tsara ny olona, dia niteny mafy tamin’ny teny Hebreo izy ka nanao hoe:'
  '5':
  - type: text
    content: 'Ary rehefa tapitra izany andro izany, dia niala izahay ka lasa nandeha; ary izy rehetra mbamin’ny vadiny aman-janany dia nanatitra anay hatrany ivelan’ny tanàna; ary nandohalika teo amoron-dranomasina izahay ka nivavaka; '
  '6':
  - type: text
    content: ary rehefa nifanao veloma izahay, dia nirotsaka an-tsambo; fa izy ireo kosa niverina nody.
  '7':
  - type: text
    content: 'Ary ny niafaran’ny nandehananay an-tsambo dia tany Tolemaia, rehefa avy tany Tyro; ary niarahaba ny rahalahy izahay ka nitoetra teo aminy indray andro. '
  '8':
  - type: text
    content: 'Ary nony ampitso dia niala teo izahay ka tonga tany Kaisaria ary niditra tao an-tranon’i Filipo evanjelista, izay anankiray tamin’izy fito lahy, dia nitoetra tao aminy izahay. '
  '9':
  - type: text
    content: Ary izany lehilahy izany dia nanana zanakavavy virijina efatra izay naminany.
