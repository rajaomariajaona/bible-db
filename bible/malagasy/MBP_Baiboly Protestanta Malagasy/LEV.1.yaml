document_id: LEV.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanatitra odorana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Jehovah niantso an’i Mosesy ka niteny taminy tao amin’ny trano-lay fihaonana hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary raha ondry na osy no ateriny ho fanatitra dorana, dia lahy tsy misy kilema koa no hateriny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hamono azy eo avaratry ny alitara eo anatrehan’i Jehovah izy; ary ireo mpisorona, zanak’i Arona, dia hanopy ny ra manodidina amin’ny lafin’ny alitara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia horasainy tsara izy mbamin’ny lohany sy ny saborany; ary halahatry ny mpisorona eo ambonin’ny kitay izy eo amin’ny afo izay eo ambonin’ny alitara; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa ny taovany sy ny tongony kosa hosasany amin’ny rano; dia ho entin’ny mpisorona izy rehetra ka hodorany ho fofona eo ambonin’ny alitara; ho fanatitra dorana izany, dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha vorona no ateriny ho an’i Jehovah ho fanatitra dorana, dia domohina na zana-boromailala no hateriny ho fanatiny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary haterin’ny mpisorona ho eo amin’ny alitara izany, ka hotapahiny amin’ny hoho ny lohany, dia hodorany ho fofona eo ambonin’ny alitara, ary hofiazany eo amin’ny rindrin’ny alitara ny rany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary hesoriny ny takorobabony sy ny ao anatiny, ka hariany eo atsinanan’ny alitara, dia eo amin’ny fitoeran-davenona; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary hosamahiny amin’ny elany no fameraka azy, fa tsy hohenteriny; ary ny mpisorona handoro azy ho fofona eo ambonin’ny alitara, ambonin’ny kitay izay eo amin ny afo; fanatitra dorana izany, dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Raha misy aminareo manatitra biby fiompy ho fanatitra ho an’i Jehovah, dia omby na ondry na osy no haterinareo ho fanatitrareo.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Raha omby no ateriny ho fanatitra dorana, dia lahy tsy misy kilema no hateriny; eo anoloan’ny varavaran’ny trano-lay fihaonana no hanaterany azy, mba hankasitrahana eo anatrehan’i Jehovah izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hametraka ny tànany eo amin’ny lohan’ny fanatitra dorana izy, dia hahazoany fankasitrahana izany, hanaovana fanatovana ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hamono ny zanak’omby eo anatrehan’i Jehovah izy; ary ireo mpisorona, zanak’i Arona, dia hanatitra ny ra ka hanopy azy manodidina amin’ny lafin’ny alitara, izay eo anoloan’ny varavaran’ny trano-lay fihaonana; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary hohodirany ny fanatitra dorana, dia horasainy tsara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ireo zanak’i Arona mpisorona dia hanisy afo eo ambonin’ny alitara ka handahatra kitay eo amin’ny afo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ireo mpisorona, zanak’i Arona, dia handahatra ny voarasa mbamin’ny lohany sy ny saborany eo ambonin’ny kitay eo amin’ny afo izay eo ambonin’ny alitara; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: fa ny taovany, sy ny tongony kosa hosasany amin’ny rano; dia hodoran’ny mpisorona ho fofona izy rehetra eo ambonin’ny alitara; fanatitra dorana izany, dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah.
