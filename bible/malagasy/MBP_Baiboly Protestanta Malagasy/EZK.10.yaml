    children:
    - type: text
      text: Fahitana ny amin’ny handoroana an’i Jerosalema, sy ny hialan’ny voninahitr’i Jehovah aminy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY hitako fa, indro, teo ambonin’ny eloelo izay teo ambonin’ny lohan’ny kerobima dia nisy tahaka ny vato safira; tahaka ny endriky ny seza fiandrianana no fijery azy; ary Jehovah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy.
      marker-yv: yv-n
    - type: text
      text: ' niseho teo amboniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy efatra dia nitovy tarehy, toy ny kodia anatin’ny kodia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nandeha izy, dia nandeha tamin’ny hitsin’ny lafiny efatra; tsy niherika izy raha nandeha, fa tamin’ny hitsin’izay natrehin’ny lohany ihany no nalehany; tsy niherika izy raha nandeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary feno maso manodidina ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nofony.
      marker-yv: yv-n
    - type: text
      text: ' rehetra sy ny lamosiny sy ny tànany sy ny elany mbamin’ny kodia; izy efatra dia samy nisy kodia avokoa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’ny kodia dia reko nisy niantso azy hoe: Ry kodia!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mikodiadiava!
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary samy nanana tarehy efatra avy izy: ny tarehin’ny voalohany dia nitarehin-kerobima, ary ny tarehin’ny faharoa dia nitarehin’olona, ary ny fahatelo nitarehin-diona, ary ny fahefatra nitarehim-boromahery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra ny kerobima. Izany dia ilay zava-manan-aina hitako teo amoron’ny ony Kebara ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nandeha ny kerobima, dia mba nandeha teo anilany koa ny kodia; ary raha nasandratry ny kerobima ny elany hiainga tsy hipaka amin’ny tany, dia tsy nisaraka taminy koa ny kodia. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nijanona izy, dia mba nijanona koa ireo; ary raha niainga izy, dia mba niainga koa ireo: fa ny fanahin’ny zava-manan-aina no tao aminy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala avy teo ambonin’ny tokonam-baravaran’ny trano ny voninahitr’i Jehovah ka nijanona teo ambonin’ny kerobima. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasandratry ny kerobima ny elany, ka niainga tsy nipaka tamin’ny tany teo imasoko izy, raha nivoaka, ary teo anilany ny kodia ary samy nijanona teo anoloan’ny vavahady atsinanana amin’ny tranon’i Jehovah izy ireo; ary ny voninahitr’Andriamanitry ny Isiraely no teo amboniny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niteny tamin-dralehilahy nitafy rongony fotsy Izy nanao hoe: Midira eo anelanelan’ny kodia, dia eo ambanin’ny kerobima, ary fenoy vain’afo avy eo anelanelan’ny kerobima ny tànanao roa, ka afafazo amin’ny tanàna izany. Dia niditra teo imasoko izy.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany dia ilay zava-manan-aina hitako teo ambanin’Andriamanitry ny Isiraely teo amoron’ny ony Kebara; ary fantatro fa kerobima ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samy nanana tarehy efatra avy izy, sady samy nanana elatra efatra avy koa; ary nisy nitarehin-tànan’olona teo ambanin’ny elany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny endriky ny tarehiny dia nitovy tamin’ilay efa hitako teo amoron’ny ony Kebara ihany, dia ny endriny sy ny tenany; ary ny hitsin’ny tavany no nalehany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny kerobima nitsangana teo amin’ny ankavanan’ny trano, raha niditra ralehilahy; ary feno ilay rahona ny kianja anatiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra niala teo amin’ny kerobima ny voninahitr’i Jehovah ho eo amin’ny tokonam-baravaran’ny trano; ary feno ilay rahona ny trano, ary ny kianja dia feno ny famirapiratan’ny voninahitr’i Jehovah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fikopakopaky ny elatry ny kerobima dia re hatrany amin’ny kianja ivelany, toy ny feon’Andriamanitra Tsitoha, raha miteny.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nodidiany ralehilahy nitafy rongony fotsy, nataony hoe: Manalà afo avy eo analenelan’ny kodia, eo anelanelan’ny kerobima, dia niditra izy ka nitsangana teo anilan’ny kodia. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny kerobima anankiray naninjitra ny tànany avy teo anelanelan’ny kerobima, tamin’ny afo izay teo anelanelan’ny kerobima, dia nangalany ka nataony teny amin’ny tànan-droan’ilay nitafy rongony fotsy; ary rehefa nandray izany ralehilahy, dia nivoaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy nitarehin-tànan’olona niseho teo ambanin’ny elatry ny kerobima.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa, indreo, nisy kodia efatra teo anilan’ny kerobima, dia kodia iray avy teo anilan’ny isan-kerobima; ary ny tarehin’ny kodia dia toy ny volon’ny vato krysolita. '
