document_id: EXO.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Lazao amin’i Arona hoe: Ahinjiro ny tànanao mitana ny tehinao eny ambonin’ny sampan-drano ary eny ambonin ny lahin-drano sy ny heniheny, ka mampiakara ny sahona ho eny amin’ny tany Egypta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nangonina hivangongo teny rehetra eny ireny, ka efa maimbo ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa nony hitan’i Farao fa nisy hiainana, dia nanamafy ny fony izy ka tsy mba nihaino azy mirahalahy, dia araka izay efa nolazain’i Jehovah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahatelo: ny moka.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'DIA hoy Jehovah tamin’i Mosesy: Lazao amin’i Arona hoe; Ahinjiro ny tehinao, ka kapohy ny vovo-tany, dia ho tonga moka eran’ny tany Egypta rehetra izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nanao toy izany izy, ka nahinjitr’i Arona ny tànany mitana ny tehiny, ary nokapohiny ny vovo-tany, dia nisy moka teny amin’ny olona sy teny amin’ny biby fiompy: fa tonga moka avokoa ny vovo-tany rehetra eran’ny tany Egypta rehetra.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary mba nanao toy izany koa ny ombiasy tamin’ny fankatovany mba hahatonga moka, kanjo tsy nahay izy; ary ny moka dia teny amin’ny olona sy teny amin’ny biby fiompy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy ny ombiasy tamin’i Farao: Rantsantànan’Andriamanitra ity; nefa nihamafy ny fon’i Farao, ka tsy nihaino azy mirahalahy izy, dia araka izay efa nolazain’i Jehovah.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahefatra: ny lalitra.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'DIA hoy Jehovah tamin’i Mosesy: Mifohaza maraina koa, ka mitsangàna eo anatrehan’i Farao (fa, indro, hivoaka ho any amin’ny rano izy), ka lazao aminy hoe: Izao no lazain’i Jehovah: Alefaso ny oloko hanompo Ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa raha tsy mandefa ny oloko hianao, indro Aho handefa lalitra betsaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fihitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kalalao.
      marker-yv: yv-n
    - type: text
      text: ' hamely anao sy ny mpanomponao sy ny vahoakanao ary ny tranonao; dia ho feno lalitra ny tranon’ny Egyptiana sy ny tany izay itoerany koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa havahako amin’izany andro izany ny tany Gosena, izay itoeran’ny oloko, ka tsy mba hisy lalitra ao, mba hahafantaranao fa Izaho no Jehovah afovoan’ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia hasiako fiavahana amin’ny oloko sy ny olonao; rahampitso no hisian’izany famantarana izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nahinjitri’i Arona tambonin’ny rano tany Egypta ny tànany; dia niakatra ny sahona ka nandrakotra ny tany Egypta. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary nataon’i Jehovah izany; ka dia nisy lalitra be dia be tao amin’ny tranon’i Farao sy tao amin’ny tranon’ny mpanompony ary teny amin’ny tany Egypta rehetra; koa dia simba ny tany noho ny lalitra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Farao nampaka an’i Mosesy sy Arona ka nanao hoe: Mandehana hianareo hamono zavatra hatao fanatitra ho an’Andriamanitrareo eto amin’ity tany ity. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa hoy Mosesy: Tsy azo atao izany; fa izay fàdin’ny Egyptiana no hovonoinay hatao fanatitra ho an’i Jehovah Andriamanitray; koa, indro, raha izay fàdin’ny Egyptiana no vonoinay eo imasony hatao fanatitra, moa tsy hotorahany vato va izahay? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Handeha làlan-kateloana any an-efitra izahay, dia hamono zavatra hatao fanatitra ho an’i Jehovah Andriamanitray, araka izay holazainy aminay.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy Farao: Izaho dia handefa anareo ihany mba hamono zavatra hatao fanatitra ho an’i Jehovah Andriamanitrareo any an-efitra; fa hany ataoko: aza mandeha lavitra loatra hianareo; dia mangataha ho ahy.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary hoy Mosesy: Indro, izaho hiala eto aminao ka hangataka amin’i Jehovah mba hialan’ny lalitra amin’i Farao sy ny mpanompony ary ny vahoakany rahampitso; fa aoka kosa tsy hamitaka intsony Farao ka tsy handefa ny olona hamono zavatra hatao fanatitra ho an i’ Jehovah.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary Mosesy niala teo amin’i Farao ka nangataka tamin’i Jehovah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary Jehovah dia nanao araka ny tenin’i Mosesy ka nampiala ny lalitra betsaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fihitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kalalao.
      marker-yv: yv-n
    - type: text
      text: ' tamin’i Farao sy ny mpanompony ary ny vahoakany, ka tsy nisy niangana ireny na dia iray akory aza. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Kanjo Farao nanamafy ny fony indray tamin’izany ka tsy nandefa ny olona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ny ombiasy mba nanao toy izany koa tamin’ny fankatovany ka nampiakatra ny sahona ho eny amin’ny tany Egypta.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Farao dia nampaka an’i Mosesy sy Arona ka nanao hoe: Mangataha amin’i Jehovah hampialany ny sahona amiko sy amin’ny vahoakako; dia halefako ny olona mba hamonoany zavatra hatao fanatitra ho an’i Jehovah.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Mosesy tamin’i Farao: Aoka hiseho ny voninahitrao noho izay hataoko;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tonòny amiko ary izay tianao.
      marker-yv: yv-n
    - type: text
      text: ' rahoviana no hangatahako ho anao sy ny mpanomponao ary ny vahoakanao, hanesorana ny sahona aminao sy amin’ny tranonao, ka ho ao Neily ihany no hisy azy? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy izy: Rahampitso. Ary hoy kosa izy: Aoka ary dia ho araka ny teninao, mba hahafantaranao fa tsy misy tahaka an’i Jehovah Andriamanitray. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny sahona dia hiala aminao sy amin’ny tranonao sy ny mpanomponao ary ny vahoakanao, ka ho ao Neily ihany no hisy azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary Mosesy sy Arona niala teo amin’i Farao; ary Mosesy nitaraina tamin’i Jehovah ny amin’ny sahona izay efa nataony tamin’i Farao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nataon’i Jehovah araka ny tenin’i Mosesy, ka maty ny sahona teny amin’ny trano sy teny amin’ny tokotany ary tany an-tsaha. '
