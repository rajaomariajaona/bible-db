document_id: PSA.55
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana nataon’izay navadiky ny sakaizany nahatoky azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MIHAINOA ny fivavako, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza miery amin’ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy aho, ka valio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miriorio ny eritreritro, ka mitoloko aho
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho ny feon’ny fahavalo sy ny fampahorian’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mampianjera loza amiko ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fahatezerana no ankahalany ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mangorohoro ato anatiko ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamely ahy ny tahotra ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahotra sy hovitra no mahazo ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manafotra ahy ny horohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka hoy izaho: Enga anie ka manana elatra tahaka ny voromailala aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handositra aho ka hahita izay hitoerako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eny, handositra lavitra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hitoetra any an-efitra.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handeha faingana aho hamonjy fialofana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy ho azon’ny tafio-drivotra sy ny ranonoram-baratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aringano izy, ary akoroy ny fiteniny, Tompo ô.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahita loza sy ady ao an-tanàna aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hodidininy andro aman-alina eny ambonin’ny màndany io;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary heloka sy fampahoriana no ao aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ratsy no ao anatiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitaka sy ny fanangolena tsy mba miala amin’ny làlambeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa tsy fahavalo no nanaratsy ahy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha izany, dia niaritra ihany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy olona nankahala ahy no nanandra-tena namely ahy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha izany, dia niery azy aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa hianao, lehilahy mitovy saranga amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namako sy sakaizako indrindra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia isika izay nifankamamy resaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka niara-nandeha tamin’ny maro ho ao an-tranon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka hanampoka azy ny fahafatesana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aoka hahazo azy ny fandringanana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hidina velona any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ratsy no ao amin’ny fonenany, dia ao afovoany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa hevi-dratsy no ao amin’ny firaketany, dia ao am-pony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha izaho, dia Andriamanitra no hantsoiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jehovah no hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hariva sy maraina ary mitataovovonana no hitarainako sy hitolokoako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hihaino ny feoko Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka hanavotra ny fanahiko ho amin’ny fiadanana hahafahako amin’ny adin’ireny amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa maro no miady amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hihaino Andriamanitra, Izay mipetraka hatramin’ny taloha,
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamaly ireo olona tsy miova toetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy matahotra an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Efa naninjitra ny tànany hamely izay nihavana taminy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namadika ny fanekeny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Malambo noho ny rononomandry ny vavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo ady no ao am-pony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malemy noho ny diloilo ny teniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo sabatra voatsoaka ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Apetraho amin’i Jehovah ny entanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izy no hanohana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy havelany hangozohozo mandrakizay ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Hianao, Andriamanitra ô, no hampidina ireo any an-davaka fanimbana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpandatsa-dra sy mpamitaka tsy hahatratra ny antsasaky ny androny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho kosa dia hatoky Anao.
