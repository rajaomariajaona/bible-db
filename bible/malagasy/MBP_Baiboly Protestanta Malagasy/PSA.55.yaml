document_id: PSA.55,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana nataon’izay navadiky ny sakaizany nahatoky azy.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Maskila nataon’i Davida.
  - type: text
    content: MIHAINOA ny fivavako, Andriamanitra ô,
  - type: text
    content: Ary aza miery amin’ny fitarainako.
  '10':
  - type: text
    content: Hodidininy andro aman-alina eny ambonin’ny màndany io;
  - type: text
    content: Ary heloka sy fampahoriana no ao aminy;
  '11':
  - type: text
    content: Ratsy no ao anatiny;
  - type: text
    content: Ary ny fitaka sy ny fanangolena tsy mba miala amin’ny làlambeny.
  '12':
  - type: text
    content: Fa tsy fahavalo no nanaratsy ahy,–
  - type: text
    content: Fa raha izany, dia niaritra ihany aho;
  - type: text
    content: Tsy olona nankahala ahy no nanandra-tena namely ahy,–
  - type: text
    content: Fa raha izany, dia niery azy aho;
  '13':
  - type: text
    content: Fa hianao, lehilahy mitovy saranga amiko,
  - type: text
    content: Namako sy sakaizako indrindra,
  '14':
  - type: text
    content: Dia isika izay nifankamamy resaka
  - type: text
    content: Ka niara-nandeha tamin’ny maro ho ao an-tranon’Andriamanitra.
  '15':
  - type: text
    content: Aoka hanampoka azy ny fahafatesana.
  - type: note
    content: 'Na: Aoka hahazo azy ny fandringanana.'
  - type: text
    content: Aoka hidina velona any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izy;'
  - type: text
    content: Fa ratsy no ao amin’ny fonenany, dia ao afovoany.
  - type: note
    content: 'Na: Fa hevi-dratsy no ao amin’ny firaketany, dia ao am-pony.'
  '16':
  - type: text
    content: Raha izaho, dia Andriamanitra no hantsoiko;
  - type: text
    content: Ary Jehovah no hamonjy ahy.
  '17':
  - type: text
    content: Hariva sy maraina ary mitataovovonana no hitarainako sy hitolokoako;
  - type: text
    content: Dia hihaino ny feoko Izy,
  '18':
  - type: text
    content: Ka hanavotra ny fanahiko ho amin’ny fiadanana hahafahako amin’ny adin’ireny amiko,
  - type: text
    content: Fa maro no miady amiko.
  '19':
  - type: text
    content: Hihaino Andriamanitra, Izay mipetraka hatramin’ny taloha,
  - type: text
    content: '[Sela.]'
  - type: text
    content: Ka hamaly ireo olona tsy miova toetra
  - type: text
    content: Sady tsy matahotra an’Andriamanitra.
  '2':
  - type: text
    content: Henoy aho, ka valio;
  - type: text
    content: Miriorio ny eritreritro, ka mitoloko aho
  '20':
  - type: text
    content: Efa naninjitra ny tànany hamely izay nihavana taminy izy;
  - type: text
    content: Namadika ny fanekeny izy.
  '21':
  - type: text
    content: Malambo noho ny rononomandry ny vavany,
  - type: text
    content: Kanjo ady no ao am-pony;
  - type: text
    content: Malemy noho ny diloilo ny teniny,
  - type: text
    content: Kanjo sabatra voatsoaka ireny.
  '22':
  - type: text
    content: Apetraho amin’i Jehovah ny entanao,
  - type: text
    content: Ary Izy no hanohana anao;
  - type: text
    content: Tsy havelany hangozohozo mandrakizay ny marina.
  '23':
  - type: text
    content: Fa Hianao, Andriamanitra ô, no hampidina ireo any an-davaka fanimbana;
  - type: text
    content: Ny mpandatsa-dra sy mpamitaka tsy hahatratra ny antsasaky ny androny;
  - type: text
    content: Fa izaho kosa dia hatoky Anao.
  '3':
  - type: text
    content: Noho ny feon’ny fahavalo sy ny fampahorian’ny ratsy fanahy;
  - type: text
    content: Fa mampianjera loza amiko ireny,
  - type: text
    content: Ary amin’ny fahatezerana no ankahalany ahy.
  '4':
  - type: text
    content: Mangorohoro ato anatiko ny foko;
  - type: text
    content: Ary mamely ahy ny tahotra ny fahafatesana.
  '5':
  - type: text
    content: Tahotra sy hovitra no mahazo ahy,
  - type: text
    content: Ary manafotra ahy ny horohoro.
  '6':
  - type: text
    content: 'Ka hoy izaho: Enga anie ka manana elatra tahaka ny voromailala aho,'
  - type: text
    content: Dia handositra aho ka hahita izay hitoerako;
  '7':
  - type: text
    content: Eny, handositra lavitra aho
  - type: text
    content: Ka hitoetra any an-efitra.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Handeha faingana aho hamonjy fialofana
  - type: text
    content: Mba tsy ho azon’ny tafio-drivotra sy ny ranonoram-baratra.
  '9':
  - type: text
    content: Aringano izy, ary akoroy ny fiteniny, Tompo ô.
  - type: text
    content: Fa mahita loza sy ady ao an-tanàna aho.
