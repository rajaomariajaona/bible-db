document_id: 1CH.28
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hafatra nataon’i Davida ny amin’ny hanaovana ny tempoly sy ny amin’ny fivavahana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY novorin’i Davida tany Jerosalema ny lehibe rehetra tamin’ny Isiraely, dia ny lohan’ny firenena sy ny komandin’ny antokony izay nanompo ny andriamanjaka, ary ny mpifehy arivo sy ny mpifehy zato sy ny mpitandrina ny harena mbamin’ny fananana rehetra an’ny mpanjaka sy ny zanany mbamin’ny tandapa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' sy ny lehilahy mahery, dia ny lehibe rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Davida mpanjaka nitsangana ka nanao hoe: Mihainoa ahy, ry rahalahiko sy ry vahoakako! Raha izaho, dia efa mby tato am-poko ny hanao trano fitsaharana ho an’ny fiaran’ny faneken’i Jehovah sy ho an’ny fitoeran-tongotr’Andriamanitsika, ary efa novononiko izay ho enti-manao azy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nefa hoy Andriamanitra tamiko: Tsy hanao trano ho an’ny anarako hianao, satria lehilahy mpiady sy mpandatsa-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa kosa Jehovah, Andriamanitry ny Isiraely, efa nifidy ahy tamin’ny ankohonan’ny raiko rehetra ho mpanjakan’ny Isiraely mandrakizay; fa Joda no nofidiny ho mpanapaka, ary tamin’ny taranak’i Joda indray dia ny ankohonan’ny raiko no nofidiny; ary tamin’ny ankohonan’ny raiko dia izaho kosa no nankasitrahany ka nataony mpanjaka amin’ny Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tamin’ny zanako rehetra (fa zanaka maro no nomen’i Jehovah ahy) dia Solomona zanako no nofidiny hipetraka amin’ny seza fiandrianan’ny fanjakan’i Jehovah hanjaka amin’ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Izy tamiko: Solomona zanakao no hanao ny tranoko sy ny kianjako, fa efa nifidy azy ho zanako Aho, ary Izaho ho rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary hampitoetra ny fanjakany ho mandrakizay Aho, raha maharitra mitandrina ny didiko sy ny fitsipiko mandra-kariva izy tahaka ny amin’izao anio izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ankehitriny, eto anatrehan’ny Isiraely rehetra, fiangonan’i Jehovah, sy eto anatrehan’Andriamanitsika, tandremo sy diniho ny didin’i Jehovah Andriamanitrareo rehetra, mba hahatananareo ity tany soa ity, sady havelanareo ho lovan’ny zanakareo mandimby anareo mandrakizay izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hianao, ry Solomona zanako, aoka ho fantatrao Andriamanitry ny rainao, ka manompoa Azy amin’ny fo rehetra sy ny fanahy mazoto; fa Jehovah, dia mpandinika ny fo rehetra, ary ny fieritreretana rehetra dia fantany avokoa. Raha mitady Azy hianao, dia hahita Azy; fa raha mahafoy Azy kosa hianao, dia hariany mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa mitandrema; fa Jehovah efa nifidy anao hanao trano ho fitoerana masina; dia mahereza ka mahefà.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Davida nanome an’i Solomona zanany ny sarin’ny lavarangana fidirana sy ny tranony sy ny trano firaketany sy ny efi-trano ambony sy ny efi-trano anatiny ary ny trano misy ny rakotra fanaovam-panavotana, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary ny sarin’izay rehetra efa niseho tamin’ny fanahiny; dia ny amin’ny kianjan’ny tranon’i Jehovah sy ny efi-trano rehetra manodidina azy ho an’ny rakitry ny tranon’i Jehovah sy ny zavatra nohamasinina ho rakitra, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sy ho an’ny antokon’ny mpisorona sy ny Levita koa, ary ho an’ny fanompoana rehetra ao an-tranon’i Jehovah sy ho an’ny fanaka rehetra ho enti-manompo ao an-tranon’i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny lanjan’ny volamena hanaovana ny fanaka volamena samy hafa rehetra, ary ny lanjan’ny volafotsy koa hanaovana ny fanaka volafotsy samy hafa rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary ny lanjan’ny volamena hanaovana ny fanaovan-jiro volamena sy ny lela fanaovan-jirony araka ny lanjany avy, ary ny lanjan’ny volafotsy hanaovana ny fanaovan-jiro volafotsy sy ny lela fanaovan-jirony araka ny fombany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary ny lanjan’ny volamena hanaovana ireo latabatra hametrahana ny mofo aseho, ary ny amin’ny volafotsy ho amin’ny latabatra volafotsy, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny amin’ny fitrebika sy ny lovia famafazana ary ny fitoeran-divay, izay samy volamena tsara, ary ny amin’ny kapoaka misarona, na ny volamena, na ny volafotsy, araka ny lanjany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny lanjan’ny volamena voadio hanaovana ny alitara fandoroana ditin-kazo manitra; ary nomeny koa ny sarin’ny kalesy, dia ny kerobima volamena, izay manana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: elatra
  - type: text
    text: ' mivelatra ka manaloka ny fiaran’ny faneken’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izany asa rehetra araka ny sary izany, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy Davida
  - type: text
    text: ', no nampahafantarin’i Jehovah ahy tamin’ny soratra avy tamin’ny tànany, izay atỳ amiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy koa Davida tamin’i Solomona zanany: Mahereza sy matanjaha ka mahefà; aza matahotra na mivadi-po; fa Jehovah Andriamanitra, dia Andriamanitro, no momba anao; tsy handao na hahafoy anao Izy ambara-pahavitanao ny asa rehetra hanaovana ny tranon’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary indreo ny antokon’ny mpisorona sy ny Levita hanao ny fanompoana rehetra ao an-tranon’Andriamanitra; ary ao aminao hanampy amin’ny asa samy hafa rehetra ny olon-kendry izay manolo-tena mba hahavita ny fanompoana rehetra sy ny mpifehy ary ny vahoaka rehetra hankatò ny didinao.
