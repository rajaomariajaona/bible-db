document_id: 2TH.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Farany, ry rahalahy, mivavaha ho anay, mba handehanan’ny tenin’ny Tompo faingana ka hankalazaina toy ny eo aminareo, '
  '10':
  - type: text
    content: 'Fa fony mbola teo aminareo ihany aza izahay, dia nandidy anareo hoe: Raha misy tsy mety miasa, dia aoka tsy hihinana izy. '
  '11':
  - type: text
    content: 'Fa renay fa misy ny sasany eo aminareo tsy mitoetra tsara, ka tsy miasa akory, fa mivezivezy foana miraharaha ny an’olona. '
  '12':
  - type: text
    content: 'Ary izay manao toy izany no didianay sy anarinay ao amin’i Jesosy Kristy Tompo mba hiasa tsara amin’ny fiadanana ka hihinana izay azy ihany. '
  '13':
  - type: text
    content: Fa hianareo, ry rahalahy, aza ketraka amin’ny fanaovan-tsoa.
  '14':
  - type: text
    content: 'Ary raha misy olona tsy manaiky ny teninay amin’ity epistily ity, mariho izany olona izany, ka aza mikambana aminy, mba hahamenatra azy. '
  '15':
  - type: text
    content: Anefa aza dia atao fahavalo izy, fa anaro toy ny rahalahy.
  '16':
  - type: text
    content: Ary ny Tompon’ny fiadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra. Ho aminareo rehetra anie ny Tompo.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Ity no
  - type: text
    content: ' veloma ataon’ny tànako, izaho Paoly; izao no famantarana eo amin’ny epistily rehetra; izao no soratro.'
  '18':
  - type: text
    content: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompontsika.
  '2':
  - type: text
    content: 'ary mba hovonjena ho afaka amin’ny olona hafahafa sy ratsy fanahy izahay; fa tsy ary manana finoana avokoa ny olona rehetra. '
  '3':
  - type: text
    content: Fa mahatoky ny Tompo, Izay hampahery sy hiaro anareo tsy ho azon’ny
  - type: note
    content: 'Na: ilay.'
  - type: text
    content: ' ratsy. '
  '4':
  - type: text
    content: 'Fa izahay matoky anareo ao amin’ny Tompo, fa izay zavatra andidianay dia efa ataonareo sady mbola hataonareo ihany koa. '
  '5':
  - type: text
    content: Ary ny Tompo anie hanitsy làlana ny fonareo ho amin’ny fit iavana an’Andriamanitra sy ho amin ny faharetan’i Kristy.
  '6':
  - type: text
    content: 'Ary mandidy anareo izahay, ry rahalahy, amin’ny anaran’i Jesosy Kristy Tompontsika, mba hialanareo amin’ny rahalahy rehetra izay tsy mitoetra tsara ka tsy manaraka ny fampianarana natolotra izay noraisiny taminay. '
  '7':
  - type: text
    content: 'Fa ny tenanareo mahalala izay tokony hianaranareo anay; fa nitoetra tsara teo aminareo izahay, '
  '8':
  - type: text
    content: 'ary tsy nihinana foana izay hanin’olona, fa niasa andro aman-alina tamin’ny fikelezan-aina sy ny fisasarana mba tsy hahavaky tratra na dia iray akory aminareo aza; '
  '9':
  - type: text
    content: 'tsy noho ny tsy anananay fahefana anefa, fa mba hatolotray aminareo ho fianaranareo ny tenanay. '
