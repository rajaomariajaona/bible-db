document_id: 2TH.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Farany, ry rahalahy, mivavaha ho anay, mba handehanan’ny tenin’ny Tompo faingana ka hankalazaina toy ny eo aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary mba hovonjena ho afaka amin’ny olona hafahafa sy ratsy fanahy izahay; fa tsy ary manana finoana avokoa ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa mahatoky ny Tompo, Izay hampahery sy hiaro anareo tsy ho azon’ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ilay.
    marker-yv: yv-n
  - type: text
    text: ' ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izahay matoky anareo ao amin’ny Tompo, fa izay zavatra andidianay dia efa ataonareo sady mbola hataonareo ihany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny Tompo anie hanitsy làlana ny fonareo ho amin’ny fit iavana an’Andriamanitra sy ho amin ny faharetan’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mandidy anareo izahay, ry rahalahy, amin’ny anaran’i Jesosy Kristy Tompontsika, mba hialanareo amin’ny rahalahy rehetra izay tsy mitoetra tsara ka tsy manaraka ny fampianarana natolotra izay noraisiny taminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny tenanareo mahalala izay tokony hianaranareo anay; fa nitoetra tsara teo aminareo izahay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy nihinana foana izay hanin’olona, fa niasa andro aman-alina tamin’ny fikelezan-aina sy ny fisasarana mba tsy hahavaky tratra na dia iray akory aminareo aza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy noho ny tsy anananay fahefana anefa, fa mba hatolotray aminareo ho fianaranareo ny tenanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa fony mbola teo aminareo ihany aza izahay, dia nandidy anareo hoe: Raha misy tsy mety miasa, dia aoka tsy hihinana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa renay fa misy ny sasany eo aminareo tsy mitoetra tsara, ka tsy miasa akory, fa mivezivezy foana miraharaha ny an’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izay manao toy izany no didianay sy anarinay ao amin’i Jesosy Kristy Tompo mba hiasa tsara amin’ny fiadanana ka hihinana izay azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa hianareo, ry rahalahy, aza ketraka amin’ny fanaovan-tsoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha misy olona tsy manaiky ny teninay amin’ity epistily ity, mariho izany olona izany, ka aza mikambana aminy, mba hahamenatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Anefa aza dia atao fahavalo izy, fa anaro toy ny rahalahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny Tompon’ny fiadanana anie hanome anareo fiadanana mandrakariva amin’ny zavatra rehetra. Ho aminareo rehetra anie ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity no
  - type: text
    text: ' veloma ataon’ny tànako, izaho Paoly; izao no famantarana eo amin’ny epistily rehetra; izao no soratro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ho aminareo rehetra anie ny fahasoavan’i Jesosy Kristy Tompontsika.
