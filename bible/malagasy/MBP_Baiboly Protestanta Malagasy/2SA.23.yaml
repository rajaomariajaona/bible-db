document_id: 2SA.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fara-teny nataon’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no fara-teny nataon’i Davida:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Davida, zanak’i Jese,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny lehilahy izay voasandratra ho ambony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay voahosotry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay nampanantenaina ny amin’ny voahosotry, etc.
    marker-yv: yv-n
  - type: text
    text: ' ny Andriamanitr’i Jakoba'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady mpanao fihirana mahafinaritra amin’ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny Fanahin’i Jehovah no mampiteny ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny teniny no eo amin’ny lelako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitry ny Isiraely manao hoe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, ny Vatolampin’ny Isiraely miteny amiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Indro ny
  - type: text
    text: ' Mpanapaka ny olona;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina Izy sady manapaka amin’ny fahatahorana an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary izany dia toy ny fahazavan’ny maraina, raha mpisoaka ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay maraina tsy misy rahona iny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ahitra manorobona amin’ny tany noho ny hain’andro manarakaraka ny ranonorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary tsy toy izany indrindra amin’Andriamanitra va ny taranako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fanekena mandrakizay no nataony tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voalamina amin’ny zavatra rehetra sady voatandrina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny famonjena ahy rehetra sy ny iriko rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy hampitsimohiny va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny tena ratsy fanahy rehetra kosa dia tahaka ny tsilo ariana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy azo raisin’ny tànana izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny olona izay mikasika azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy maintsy mitondra vy sy zaran-defona;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feno vy sy zaran-defona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hodorana amin’ny afo avokoa amin’izay itoerany ireny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anaran’ny lehilahy maherin’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ARY izao no anaran’ny lehilahy maherin’i Davida: Joseba-basebeta Takemonita no lehiben’ny mpanafika malaza; izy ilay Edino Eznita izay namely ny valon-jato lahy ka nahafaty azy tamin’ny ady indray mandeha monja.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny manarakaraka azy dia Eleazara, zanak’i Dodo, zanak’i Ahohita, anankiray amin’izy telo lahy mahery teo amin’i Davida, raha nihaika ny Filistina izay niangona hiady ireo, ka niakatra ny lehilahy amin’ny Isiraely; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia nitsangana Eleazara ka namely ny Filistina mandra-pahavizan’ny tànany ka efa niraikitra tamin’ny sabatra; ary Jehovah nanao famonjena lehibe tamin’izany andro izany, ka ny haka babo ihany no sisa nanarahan’ny olona azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny manarakaraka azy dia Sama, zanak’i Age Hararita. Ary nony nivory ho iray toko teo amin’ny tany nisy voanemba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: erva lenta.
    marker-yv: yv-n
  - type: text
    text: ' maniry ny Filistina, ary ny olona nandositra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nijanona teo afovoan’io tany io kosa izy ka nahazo io ary namono ny Filistina; ka dia nanao famonjena lehibe Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy telo lahy samy malaza avy tamin’ny telo-polo lahy nidina ka tonga tao amin’i Davida tao amin’ny zohin’i Adolama nony fararano; ary ny miaramilan’ny Filistina nitoby teo amin’ny Lohasahan’ny Refaïta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Davida dia tao amin’ny batery fiarovana tamin’izay, ary ny miaramilan’ny Filistina kosa dia tao Betlehema. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Davida naniry ka nanao hoe: Enga anie ka hisy hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay ao akaikin’ny vavahady! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ireo telo lahy mahery namaky teo amin’ny miaramilan’ny Filistina ka nanovo rano tamin’ny fantsakana tao Betlehema, izay teo anilan’ny vavahady, dia nentiny ho any amin’i Davida; kanjo tsy nety nisotro izy, fa naidiny ho an’i Jehovah iny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy Davida: Sanatria, Jehovah ô, raha hanao izany aho; tsy ran’ny lehilahy izay nandeha nanao vy very ny ainy va ity? Ka dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Abisay, rahalahin’i Joaba, zanak’i Zeroia, no lehibe amin’izy telo lahy, ary izy namely ny telon-jato lahy tamin’ny lefona ka nahafaty azy, ka dia izy no nalaza tamin’izy telo lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy izy va no be voninahitra noho izy telo lahy? Fa izy no lehibeny; nefa tsy nahomby ny telo lahy teo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Benaia, zanak’i Joiada, zanaky ny lehilahy mahay tany Kabezela, izay nahavita asa be, izy no namono ny roa lahy mahery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lionan’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' tany Moaba; ary izy no nidina ka namono ny liona tao an-davaka fantsakana tamin’ilay andro nisy orampanala iny; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary izy koa no namono ilay Egyptiana makadiry be; ary ilay Egyptiana nitondra lefona teny an-tànany, nefa namorotsahan’i Benaia tamin’ny tehiny ihany izy, dia nosarihany ny lefona teny an-tànan’ilay Egyptiana, ka iny lefony iny ihany no namonoany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany no nataon’i Benaia, zanak’i Joiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izy no nalaza noho ny telo-polo lahy, nefa tsy nahomby azy telo lahy teo izy. Ary Davida nanendry azy ho isan’ny mpanolo-tsaina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Asahela, rahalahin’i Joaba, no anankiray amin’ny telo-polo, ary Elanana, zanak’i Dodo, avy any Betlehema, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sama Harodita, Elika Harodita, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Heleza Paltita, Ira, zanak’Ikesy Tekoita, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abiezera Anatotita, Mebonay Hosatita, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Zalmona Ahohita, Maharay Netofatita, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Haleba, zanak’i Bana Netofatita, Itahy, zanak’i Ribay, avy any Gibean’ny taranak’i Benjamina, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Benaia Piratonita, Hiday, avy any amin’ny lohasahandriak’i Gasy, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Abi-albona Arbatita, Azmaveta Baromita, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Eliaba Salbonita, tamin’ny zanak’i Jasena, Jonatana, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Sama Hararita, Ahiama, zanak’i Sarara Hararita, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Elifeleta, zanak’i Ahasbay, zanaky ny Makatita, Eliama, zanak’i Ahitofela Gilonita, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hezray Karmelita, Paray Arbita, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jigala, zanak’i Natana, avy any Zoba, Bany Gadita, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zaleka Amonita, Naharay Berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ira Jitrita, Gareba Jitrita, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Oria Hetita; fito amby telo-polo no isan’izy rehetra.
