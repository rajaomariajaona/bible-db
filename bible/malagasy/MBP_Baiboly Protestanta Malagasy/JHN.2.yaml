document_id: JHN.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampodian’i Jesosy ny rano ho divay tao Kana, sy ny nankanesany tao Kapernaomy.
  - type: text
    content: 'ARY tamin’ny andro fahatelo dia nisy fampakaram-bady tao Kana any Galilia; ary tao ny renin’i Jesosy. '
  '10':
  - type: text
    content: 'ka nanao taminy hoe: Araka ny fanaon’ny olona dia ny divay tsara no arosony aloha; ary rehefa nisotro be'
  - type: note
    content: Gr. mamo.
  - type: text
    content: ' ny olona, dia vao izay ratsiratsy kokoa; fa hianao kosa dia efa nitahiry ny divay tsara ambaraka ankehitriny.'
  '11':
  - type: text
    content: Izany no nataon’i Jesosy tao Kana any Galilia ho voaloham-pamantarana, ka nasehony ny voninahiny; ary nino Azy ny mpianany.
  '12':
  - type: text
    content: Rehefa afaka izany, dia nidina nankany Kapernaomy Jesosy mbamin’ny reniny sy ny rahalahiny ary ny mpianany; nefa tsy nitoetra ela teo Izy.
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema tamin’ny Paska, sy ny nandroahany ny mpivarotra, sy ny nanesorany ny varony hiala teo an-kianjan’ny tempoly.
  '13':
  - type: text
    content: 'ARY efa akaiky ny Pasky ny Jiosy, ka dia niakatra tany Jerosalema Jesosy. '
  '14':
  - type: text
    content: 'Ary hitany teo an-kianjan’ny tempoly ny nivarotra omby sy ondry sy voromailala ary ny mpanakalo vola izay nipetraka teo; '
  '15':
  - type: text
    content: 'dia nanao kotopia kofehy Izy ka nandroaka azy rehetra hiala teo an-kianjan’ny tempoly, na ny ondry na ny omby, ary nararany ny volan’ny mpanakalo vola, sady nazerany ny latabatra; '
  '16':
  - type: text
    content: 'dia hoy Izy tamin’ny nivarotra ny voromailala: Ento mivoaka ireto zavatra ireto; aza atao trano fivarotana ny tranon’ny Raiko.'
  '17':
  - type: text
    content: 'Ary ny mpianany nahatsiaro fa voasoratra hoe: ,,Ny firehetako ny amin’ny tranonao no haharìtra aina ahy’’ (Sal. 69.9).'
  '18':
  - type: text
    content: 'Fa namaly ny Jiosy ka nanao taminy hoe: Inona no famantarana asehonao aminay, no manao izao zavatra izao Hianao? '
  '19':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Ravao ity tempoly ity, ary amin’ny hateloana dia hatsangako indray izy. '
  '2':
  - type: text
    content: Ary Jesosy sy ny mpianany koa dia nalainy ho ao amin’ny fampakaram-bady.
  '20':
  - type: text
    content: 'Fa hoy ny Jiosy: Enina amby efa-polo taona izay no efa nanaovana ity tempoly ity, ka Hianao va hahatsangana azy amin’ny hateloana? '
  '21':
  - type: text
    content: 'Fa ny tenany no tempoly nolazainy. '
  '22':
  - type: text
    content: 'Ary koa, rehefa nitsangana tamin’ny maty Izy, dia tsaroan’ny mpianany fa efa nilaza izany Izy; ary dia nino ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' sy ny teny izay nolazain’i Jesosy izy.'
  '23':
  - type: text
    content: 'Ary nony tao Jerosalema Jesosy tamin’ny Paska, dia tamin’ny andro firavoravoana, maro no nino ny anarany, raha nahita ny famantarana izay nataony. '
  '24':
  - type: text
    content: 'Fa Jesosy tsy natoky azy, satria Izy nahalala ny olona rehetra; '
  '25':
  - type: text
    content: ary tsy nitady olona hanambara olona Izy; fa ny tenany nahalala izay tao am-pon’ny olona.
  '3':
  - type: text
    content: 'Ary rehefa lany ny divay, dia hoy ny renin’i Jesosy taminy: Tsy manana divay izy. '
  '4':
  - type: text
    content: 'Hoy Jesosy taminy: Ravehivavy, moa mifaninona akory Izaho sy hianao? tsy mbola tonga ny fotoako. '
  '5':
  - type: text
    content: 'Fa hoy ny reniny tamin’ny mpanompo: Ataovy izay asainy ataonareo. '
  '6':
  - type: text
    content: Ary nisy siny vato enina mahalany rano indroa na intelon’ny vata
  - type: note
    content: Gr. metreta.
  - type: text
    content: ' avy nipetraka teo ho fanadiovana araka ny fanaon’ny Jiosy. '
  '7':
  - type: text
    content: 'Dia hoy Jesosy taminy: Fenoy rano ny siny. Dia nofenoiny hatramin’ny molony. '
  '8':
  - type: text
    content: 'Ary hoy Jesosy taminy: Tovozy amin’izao, ka ento ho eo amin’ny mpandahatra ny fanasana. Dia nentiny.'
  '9':
  - type: text
    content: 'Ary raha nanandrana ny rano tonga divay ny mpandahatra ny fanasana, nefa tsy nahalala izay nihaviany (fa ny mpanompo izay nanovo ny rano no nahalala), dia niantso ny mpampakatra izy '
