document_id: JHN.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampodian’i Jesosy ny rano ho divay tao Kana, sy ny nankanesany tao Kapernaomy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’ny andro fahatelo dia nisy fampakaram-bady tao Kana any Galilia; ary tao ny renin’i Jesosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ka nanao taminy hoe: Araka ny fanaon’ny olona dia ny divay tsara no arosony aloha; ary rehefa nisotro be'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mamo.
      marker-yv: yv-n
    - type: text
      text: ' ny olona, dia vao izay ratsiratsy kokoa; fa hianao kosa dia efa nitahiry ny divay tsara ambaraka ankehitriny.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izany no nataon’i Jesosy tao Kana any Galilia ho voaloham-pamantarana, ka nasehony ny voninahiny; ary nino Azy ny mpianany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Rehefa afaka izany, dia nidina nankany Kapernaomy Jesosy mbamin’ny reniny sy ny rahalahiny ary ny mpianany; nefa tsy nitoetra ela teo Izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niakaran’i Jesosy tany Jerosalema tamin’ny Paska, sy ny nandroahany ny mpivarotra, sy ny nanesorany ny varony hiala teo an-kianjan’ny tempoly.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ARY efa akaiky ny Pasky ny Jiosy, ka dia niakatra tany Jerosalema Jesosy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hitany teo an-kianjan’ny tempoly ny nivarotra omby sy ondry sy voromailala ary ny mpanakalo vola izay nipetraka teo; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'dia nanao kotopia kofehy Izy ka nandroaka azy rehetra hiala teo an-kianjan’ny tempoly, na ny ondry na ny omby, ary nararany ny volan’ny mpanakalo vola, sady nazerany ny latabatra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia hoy Izy tamin’ny nivarotra ny voromailala: Ento mivoaka ireto zavatra ireto; aza atao trano fivarotana ny tranon’ny Raiko.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny mpianany nahatsiaro fa voasoratra hoe: ,,Ny firehetako ny amin’ny tranonao no haharìtra aina ahy’’ (Sal. 69.9).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa namaly ny Jiosy ka nanao taminy hoe: Inona no famantarana asehonao aminay, no manao izao zavatra izao Hianao? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Ravao ity tempoly ity, ary amin’ny hateloana dia hatsangako indray izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary Jesosy sy ny mpianany koa dia nalainy ho ao amin’ny fampakaram-bady.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hoy ny Jiosy: Enina amby efa-polo taona izay no efa nanaovana ity tempoly ity, ka Hianao va hahatsangana azy amin’ny hateloana? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ny tenany no tempoly nolazainy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary koa, rehefa nitsangana tamin’ny maty Izy, dia tsaroan’ny mpianany fa efa nilaza izany Izy; ary dia nino ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' sy ny teny izay nolazain’i Jesosy izy.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nony tao Jerosalema Jesosy tamin’ny Paska, dia tamin’ny andro firavoravoana, maro no nino ny anarany, raha nahita ny famantarana izay nataony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa Jesosy tsy natoky azy, satria Izy nahalala ny olona rehetra; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ary tsy nitady olona hanambara olona Izy; fa ny tenany nahalala izay tao am-pon’ny olona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa lany ny divay, dia hoy ny renin’i Jesosy taminy: Tsy manana divay izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy Jesosy taminy: Ravehivavy, moa mifaninona akory Izaho sy hianao? tsy mbola tonga ny fotoako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa hoy ny reniny tamin’ny mpanompo: Ataovy izay asainy ataonareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nisy siny vato enina mahalany rano indroa na intelon’ny vata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: metreta.
      marker-yv: yv-n
    - type: text
      text: ' avy nipetraka teo ho fanadiovana araka ny fanaon’ny Jiosy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Jesosy taminy: Fenoy rano ny siny. Dia nofenoiny hatramin’ny molony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Jesosy taminy: Tovozy amin’izao, ka ento ho eo amin’ny mpandahatra ny fanasana. Dia nentiny.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary raha nanandrana ny rano tonga divay ny mpandahatra ny fanasana, nefa tsy nahalala izay nihaviany (fa ny mpanompo izay nanovo ny rano no nahalala), dia niantso ny mpampakatra izy '
