document_id: GEN.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandosiran’i Jakoba avy tany Mesopotamia hody any Kanana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Jakoba nandre ny tenin’ny zanakalahin’i Labana nanao hoe: Efa lasan’i Jakoba avokoa izay rehetra nananan’ny raintsika; ary avy tamin’ny fananan’ny raintsika no nahazoany izao voninahitra rehetra izao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa mby amin’ny andro izay nikambanan’ny ondry aman-osy, dia natopiko ny masoko, ka hitako tamin’ny nofy, ary indro, sadika sy mara ary sada ny lahy izay nikambana tamin’ny ondrivavy sy ny osivavy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ilay Anjelin’Andriamanitra tamiko tamin’ny nofy: Ry Jakoba; dia hoy izaho: Inty aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Mba atopazy ny masonao ka jereo, fa sadika sy mara ary sada ny lahy rehetra izay mikambana amin’ny ondrivavy sy ny osivavy, satria efa hitako izay rehetra nataon’i Labana taminao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no Andriamanitr’i Betela, izay nanosoranao tsangam-bato sy nivoadianao tamiko; miaingà ankehitriny hiala amin’ity tany ity, ka modia any amin’ny tany nahaterahanao.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Rahely sy Lea ka nanao taminy hoe: Mbola misy anjara sy lova ho anay va ao an-tranon’ny rainay? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nataony toy ny vahiny va izahay? fa efa namidiny izahay sady nohaniny làlandava ny volanay rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny harena rehetra izay nalain’Andriamanitra tamin’ny rainay, dia anay sy an’ny zanakay izany; koa ankehitriny, izay rehetra nolazain’Andriamanitra taminao dia ataovy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga Jakoba, ka nampitaingeniny ny rameva ny zanany sy ny vadiny; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nitondra ny ombiny sy ny ondry aman-osiny rehetra izy, mbamin’ny fananana rehetra izay efa nohariny, dia ny omby aman-ondry izay efa azony tany Mesopotamia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Padan-arama.
      marker-yv: yv-n
    - type: text
      text: ' mba hankany amin’Isaka rainy any amin’ny tany Kanana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Labana efa lasa nandeha hanety ny ondry aman-osiny; dia nangalarin-dRahely ny sampin-drainy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terafiman-drainy.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitan’i Jakoba ny tarehin’i Labana, fa indro tsy mba miramirana taminy tahaka ny taloha izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jakoba dia nangala-dia tamin’i Labana Syriana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aramiana.
      marker-yv: yv-n
    - type: text
      text: ' fa tsy nambarany taminy ny amin’ny handosirany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandositra izy ka nitondra ny fananany rehetra; dia niainga izy ka nita ny Ony,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
    - type: text
      text: ' ary nizotra hankany an-tendrombohitra Gileada.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny andro fahatelo dia nisy nanambara tamin’i Labana fa lasa nandositra Jakoba. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra ny havany homba azy izy ka nanenjika azy làlan-kafitoana, dia nahatratra azy teo an-tendrombohitra Gileada. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Andriamanitra nankeo amin’i Labana Syriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aramiana.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny nofy nony alina ka nanao taminy hoe: Tandremo mba tsy hasianao teny akory Jakoba, na soa na ratsy.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Labana dia nahatratra an’i Jakoba. Ary Jakoba dia efa nanorina ny lainy teo an-tendrombohitra; ary Labana sy ny havany kosa nanorin-day teo an-tendrombohitr’i Gileada.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Labana tamin’i Jakoba: Inona izao ataonao izao, no dia nangala-dia tamiko hianao ka nitondra ny zanako-vavy toy ny babo azo tamin’ny sabatra? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no nandositra mangingina hianao ka nangala-dia tamiko; ary tsy nanambara tamiko hianao mba hanaterako anao amin’ny fifaliana sy ny hira, amin’ny amponga-tapaka sy ny lokanga, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady tsy mba navelanao hanoroka ny zanako-lahy sy ny zanako-vavy aho? Fa izao dia efa nanao adaladala hianao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manan-kery hanisy ratsy anareo ny tànako; fa Andriamanitry ny rainareo efa niteny tamiko halina ka nanao hoe: Tandremo mba tsy hasianao teny akory Jakoba, na soa na ratsy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Jakoba: Modia any amin’ny tanin’ny razanao sy any amin’ny havanao; ary homba anao Aho.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny, raha mandeha tokoa hianao, satria manina ny tranon’ny rainao indrindra hianao, nahoana no nangalarinao ny andriamanitro?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Jakoba ka nanao tamin’i Labana hoe: Satria natahotra aho; fa hoy izaho: Angamba halainao an-keriny amiko ny zanakao-vavy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay hahitanao ny andriamanitrao dia aza velomina; eto anatrehan’ny havantsika savao izay ato amiko, ka ento ny anao. Fa tsy fantatr’i Jakoba fa Rahely no efa nangalatra azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Labana niditra tao an-dain’i Jakoba sy tao an-dain’i Lea ary tao an-dain’ny ankiziny roa vavy, fa tsy nahita. Dia niala tao an-dain’i Lea izy ka niditra tao an-dain-dRahely. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa efa nalain-dRahely ny sampy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terafima.
      marker-yv: yv-n
    - type: text
      text: ' ka nataony tao anatin’ny laselin’ny rameva, dia nipetraka teo amboniny izy. Ary Labana dia nikaroka eran’ny lay rehetra, fa tsy nahita. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Rahely tamin’ny rainy: Aza fady aho, tompokolahy, fa tsy mahazo mitsangana eto anatrehanao aho, satria azon’ny fombam-behivavy. Dia nikaroka fatratra izy, fa tsy nahita ny sampy.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra Jakoba ka nifamaly tamin’i Labana; ary namaly Jakoba ka nanao tamin’i Labana hoe: Inona no heloko? inona no otako, no dia niolomay nanenjika ahy hianao? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nosavanao avokoa ny entako rehetra, koa inona no fanaka avy tany an-tranonao hitanao tao? Apetraho eto anatrehan’ny havako sy ny havanao izany, hitsarany antsika roa lahy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao roa-polo taona izao no nitoerako tany aminao; ny ondrivavinao sy ny osivavinao tsy mba namotsotra, ary tsy mba nihinana ny ondrilahy avy tamin’ny ondrinao aho. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay voaviraviram-biby tsy mba nentiko tany aminao, fa izaho no nanolo azy; teo an-tànako no nitadiavanao azy, na ny nangalarina andro, na ny nangalarina alina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba naniraka ka nampaka an-dRahely sy Lea hankany an-tsaha ho any amin’ny ondry aman-osiny '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony antoandro matin’ny hain’andro aho, ary nony alina dia matin’ny fanala; ary nandositra ny masoko ny torimaso. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao roa-polo taona izao no nitoerako tany an-tranonao, ka efatra ambin’ny folo taona no nanompoako anao hahazoako azy mirahavavy zanakao, ary enin-taona kosa hahazoako ny ondry aman-osinao; ary efa nanova ny karamako impolo hianao. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tsy ny Andriamanitry ny raiko, dia Andriamanitr’i Abrahama, Ilay natahoran’Isaka, no nomba ahy, dia ho nampandehaninao maina tokoa aho ankehitriny. Andriamanitra efa nitsinjo ny fahoriako sy ny fisasaran’ny tànako ka nananatra anao halina.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Labana ka nanao tamin’i Jakoba hoe: Ireo zazavavy ireo dia zanako-vavy; ary ireo zazalahy ireo dia zanako-lahy; ary ireo ondry aman-osy ireo dia ondry aman-osiko; ary izao rehetra hitanao izao dia ahy avokoa; ary ahoana no hataoko anio amin’ireto zanako-vavy, na amin’ny zanany naterany? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny avia hanao fanekena isika, dia izaho sy hianao, ka aoka ho vavolombelona amiko sy aminao izany.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka vato iray Jakoba ka nanangana azy ho tsangam-bato. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba tamin’ireo havany: Manangòna vato; dia naka vato izy, ka nataony antontany; ary dia nihinana teo anilan’ny antontam-bato izy rehetra. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran’ny antontam-bato dia nataon’i Labana hoe Jegara-sahadota;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jegara sahadota '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: '(Ar.) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sy Galeda '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: '(Heb.) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia samy = Antontam-bato vavolombelona.
      marker-yv: yv-n
    - type: text
      text: ' fa Jakoba kosa nanao azy hoe Galeda.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jegara sahadota '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: '(Ar.) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sy Galeda '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: '(Heb.) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia samy = Antontam-bato vavolombelona.
      marker-yv: yv-n
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Labana: Ity antontam-bato ity no vavolombelona amintsika anio. Izany no nanaovany ny anarany hoe Galeda. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nataony hoe Mizpa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mizpa = Fitazanana.
      marker-yv: yv-n
    - type: text
      text: ' koa izy; fa hoy izy: Jehovah hitazana ahy sy hianao, rehefa tsy mifankahita isika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Hitako ny tarehin’ny rainareo, fa tsy mba miramirana amiko tahaka ny taloha; fa Andriamanitry ny raiko no efa nomba ahy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tàhiny hampahory ny zanako-vavy hianao, na hanambady afa-tsy ireo zanako-vavy ireo ihany, tsy misy olona eto amintsika, fa, indro, Andriamanitra no ho vavolombelona amintsika.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray Labana tamin’i Jakoba: Indro ity antontam-bato ity, ary indro ity tsangam-bato ity izay naoriko eto anelanelantsika, izaho sy hianao; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia aoka ho vavolombelona ity antontam-bato ity, ary aoka ho vavolombelona ity tsangam-bato ity, mba tsy hihoarako ity antontam-bato ity hankany aminao, ary mba tsy hihoaranao ity antontam-bato ity sy ity tsangam-bato ity hankatỳ amiko kosa hanisy ratsy. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny andriamanitr’i
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.53 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andriamanitr’i.
      marker-yv: yv-n
    - type: text
      text: ' Abrahama sy ny andriamanitr’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.53 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andriamanitr’i.
      marker-yv: yv-n
    - type: text
      text: ' i Nahora, dia ny andriamanitry'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.53 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terafima.
      marker-yv: yv-n
    - type: text
      text: ' ny rain’izy mirahalahy anie hitsara antsika. Fa Ilay natahoran’i Isaka rainy kosa no nianianan’i Jakoba.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia namono zavatra hatao fanatitra teo an-tendrombohitra Jakoba ka nanasa ny havany mba hihinan-kanina; dia nihinana izy ka nitoetra teo an-tendrombohitra nandritra ny alina.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fantatrareo fa tamin’ny heriko rehetra no nanompoako ny rainareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny rainareo efa namitaka ahy ka efa nanova ny karamako impolo; nefa tsy navelan’Andriamanitra hahatonga loza tamiko izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nilaza hoe izy: Ny mara rehetra ho karamanao, dia niteraka mara ny ondry aman-osy rehetra: ary raha nilaza hoe indray izy: Ny sadika rehetra ho karamanao, dia niteraka sadika ny ondry aman-osy rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’Andriamanitra ny fananan’ny rainareo ka nomeny ahy. '
