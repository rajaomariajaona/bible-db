document_id: EXO.34
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanavaozan’Andriamanitra ny fanekena.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hoy Jehovah tamin’i Mosesy: Manamboara ho anao vato fisaka roa tahaka ilay teo, dia hosoratako amin’ireo vato fisaka ireo ny teny izay tamin’ilay vato fisaka teo, izay novakivakinao; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary aoka hivonona hianao mandra-pahamaraina; dia miakara raha maraina ho ao amin’ny tendrombohitra Sinay, ka mitsangàna eo anatrehako ao an-tampon’ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary aoka tsy hisy olona hiakatra afa-tsy hianao, ary aoka tsy hisy olona ho hita eny amin’ny tendrombohitra Sinay rehetra; ary ny ondry aman-osy koa sy ny omby dia aoka tsy hisy handrasana eny akaikin’izany tendrombohitra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nanamboatra vato fisaka roa tahaka ilay teo Mosesy, ary nifoha maraina koa izy ka niakatra tao amin’ny tendrombohitra Sinay, araka izay nandidian’i Jehovah azy; ary nentiny teny an-tànany ny vato fisaka roa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Jehovah nidina tao anatin’ny rahona ka nijanona teo aminy, dia nanonona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary Mosesy nijanona teo aminy ka niantso.
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jehovah nandalo teo anatrehany ka niantso hoe: Jehovah, Jehovah, Andriamanitra mamindra fo sy miantra, mahari-po sady be famindrampo sy fahamarinana, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mitahiry famindrampo ho an’ny olona arivo mandimby, mamela heloka sy fahadisoana ary fahotana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin’ny zanaka sy ny zafy hatramin’ny zafiafy sy ny zafindohalika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Mosesy dia niondrika faingana tamin’ny tany ka niankohoka; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia hoy izy: Tompo ô, raha mba mahita fitia eo imasonao aho, aoka Hianao, Tompo ô, handeha ao afovoanay (fa firenena mafy hatoka izy), ka mamelà ny helokay sy ny fahotanay ary raiso ho lovanao izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Izy: Indro, manao fanekena Aho, ka eo anatrehan’ny olonao rehetra no hanaovako zava-mahagaga, izay tsy mbola nisy natao tany amin’ny tany rehetra sy tany amin’ny firenena rehetra; ary ny olona rehetra izay itoeranao dia hahita ny asan’i Jehovah, fa mahatahotra izay zavatra efa hataoko amin’ny fombako anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tandremo izay andidiako anao anio; indro, efa horoahiko hiala eo anatrehanao ny Amorita sy ny Kananita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa mitandrema, fandrao hanao fanekena amin’ny mponina eo amin’ny tany izay halehanao hianao, ka ho fandrika eo afovoanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ravao ny alitarany, ary torotoroy ny tsangam-baton-tsampiny, ary jinjao ny Aserahany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran’andriamani-tsi-izy, na ny sariny.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tsy hiankohoka eo anatrehan’izay andriamani-kafa hianao; fa Jehovah, dia saro-piaro no anarany, satria Andriamanitra saro-piaro Izy, – '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'kandrao hianao hanao fanekena amin’ny mponina eo amin’ny tany, ka hijangajanga hanaraka ny andriamaniny sy hamono zavatra hatao fanatitra ho an’ny andriamaniny izy, ary hasainy hianao ka hihinana amin’ny fanatiny; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ary andrao koa haka amin’ny zanani-vavy ho vadin’ny zanakao-lahy hianao, ary hijangajanga hanaraka ny andriamaniny ny zanani-vavy ka hampandeha ny zanakao-lahy hijangajanga hanaraka ny andriamaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza manao andriamanitra an-idina ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tandremo ny andro firavoravoana, dia ny andro fihinanana ny mofo tsy misy masirasira. Hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin’ny fotoan’andro amin’ny volana Abiba, fa tamin’ny volana Abiba no nivoahanao avy tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izay voalohan-teraka rehetra no Ahy, dia ny lahy amin’ny voalohan-teraky ny bibinao, na omby na ondry aman-osy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa ny voalohan-teraky ny boriky kosa dia hosoloanao zanak’ondry; ary raha tsy hanolo azy hianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin’ny zanakao dia havotanao. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Henemana no hiasanao, fa amin’ny andro fahafito dia hitsahatra hianao: na dia amin’ny taom-pamafazana sy amin’ny taom-pijinjana aza dia hitsahatra ihany hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary tandremo ny andro firavoravoana manarakaraka ireo herinandro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Pentekosta; izahao Deo. xvi. 9, 10.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fanaterana ny voalohambokatra, raha mijinja ny vary tritika, sy ny andro firavoravoana amin’ny fanangonana amin’ny fitsingerenan’ny taona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan’i Jehovah Tompo, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa handroaka firenena eo alohanao Aho ka hanitatra ny fari-taninao; ary tsy hisy olona haniry ny taninao, raha miakatra hiseho eo anatrehan’i Jehovah Andriamanitrao intelo isan-kerintaona hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza manatitra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy hianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny zavatra vonoina hatao fanatitra ho Ahy amin’ny andro firavoravoana amin’ny Paska.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny santatra amin’ny voaloham-bokatry ny taninao dia haterinao ho ao an-tranon’i Jehovah Andriamanitrao.
- type: usfm
  marker: p
  children:
  - type: text
    text: Aza mahandro zanak’osy amin’ny rononon-dreniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Soraty ireo teny ireo, fa araka ireo teny ireo no nanaovako fanekena aminao sy amin’ny Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia teo amin’i Jehovah efa-polo andro sy efa-polo alina izy sady tsy nihinan-kanina na nisotro rano.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nosoratan’i Jehovah tamin’ny vato fisaka ny tenin’ny fanekena, dia ny Didy Folo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny Teny Folo.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary Mosesy nidina avy tao an-tendrombohitra Sinay, ary teny an-tànany ny vato roa izay nisy ny Vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' tamin’izy nidina avy teo an-tendrombohitra, ary tsy fantany ho namirapiratra ny hoditry ny tavany noho ny nitenenany taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nony hitan’i Arona sy ny Zanak’Isiraely rehetra Mosesy, ka, indro, namirapiratra ny hoditry ny tavany, dia natahotra azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Mosesy niantso azy, dia niverina Arona sy ny lohan’ny fiangonana rehetra ho eo aminy; ary Mosesy niteny taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary rehefa afaka izany, dia nanakaiky koa ny Zanak’Isiraely rehetra; ary Mosesy nandidy azy araka izay rehetra nolazain’i Jehovah taminy tao amin’ny tendrombohitra Sinay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary rehefa vita ny teny nataon’i Mosesy taminy, dia nasiany fisalobonana ny tavany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha niditra teo anatrehan’i Jehovah Mosesy hiteny aminy, dia nanaisotra ny fisalobonana izy mandra-pivoakany. Dia nivoaka izy ka nilaza tamin’ny Zanak’Isiraely izay efa nandidiana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary hitan’ny Zanak’Isiraely ny tavan’i Mosesy, fa, indro, namirapiratra ny hoditry ny tavany; dia nasaron’i Mosesy ny tavany indray ny fisalobonana mandra-pidiny hiteny aminy indray.
