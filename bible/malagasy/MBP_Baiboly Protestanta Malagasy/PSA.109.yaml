document_id: PSA.109,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny loza hanjo ny manao teny ratsy sy tia ozona.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: RY Andriamanitra fiderako ô, aza mangina Hianao,
  '10':
  - type: text
    content: Aoka hirenireny mangataka ny zanany,
  - type: text
    content: Ary aoka hiremby lavitra ny tranony efa rava izy.
  '11':
  - type: text
    content: Aoka ny mpampanàna vola hamandrika izay rehetra ananany;
  - type: text
    content: Ary aoka ny olon-kafa hifaoka ny vokatry ny asany.
  '12':
  - type: text
    content: Aoka tsy hisy haharitra hamindra fo aminy,
  - type: text
    content: Na hiantra ny zanany kamboty.
  '13':
  - type: text
    content: Aoka ho fongotra ny taranany;
  - type: text
    content: Ary aoka hovonoina amin’ny taranaka mandimby ny anarany.
  '14':
  - type: text
    content: Aoka hotsarovan’i Jehovah ny helo-drainy;
  - type: text
    content: Ary aoka tsy hovonoina ny helo-dreniny.
  '15':
  - type: text
    content: Aoka ho eo anatrehan’i Jehovah mandrakariva izany,
  - type: text
    content: Ary hofoanany tsy ho eo ambonin’ny tany anie ny fahatsiarovana azy.
  '16':
  - type: text
    content: Satria tsy mba nahatsiaro hamindra fo izy,
  - type: text
    content: Fa nanenjika ny ory sy ny malahelo
  - type: text
    content: Ary ny reraka am-po mba hahafaty azy;
  '17':
  - type: text
    content: Tia ozona izy, ka nanody azy izany;
  - type: text
    content: Tsy tia indrafo izy, ka nanalavitra azy izany.
  '18':
  - type: text
    content: Nitafy ozona tahaka ny lambany izy,
  - type: text
    content: Ka niditra tao an-kibony tahaka ny rano izany,
  - type: text
    content: Ary tao amin’ny taolany tahaka ny diloilo;
  '19':
  - type: text
    content: Dia aoka ho tahaka ny lamba itafiany izany,
  - type: text
    content: Ary ho fisikinana isikinany mandrakariva.
  '2':
  - type: text
    content: Fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy;
  - type: text
    content: Niteny ahy tamin’ny lela mandainga izy.
  '20':
  - type: text
    content: Izany no famaliana avy amin’i Jehovah ho an’ny mpanohitra ahy,
  - type: text
    content: Dia izay manendrikendrika ahy.
  '21':
  - type: text
    content: Fa Hianao, Jehovah Tompo ô, miasa ho ahy noho ny anaranao;
  - type: text
    content: Vonjeo aho, fa tsara ny famindramponao.
  '22':
  - type: text
    content: Fa mahantra sy malahelo aho,
  - type: text
    content: Ary ny foko dia voatsindrona ato anatiko.
  '23':
  - type: text
    content: Lasa tahaka ny aloka mihelina aho;
  - type: text
    content: Roahina tahaka ny valala aho.
  '24':
  - type: text
    content: Efa malemy ny lohaliko noho ny fifadian-kanina;
  - type: text
    content: Ary efa mihena ny hatavin’ny nofoko.
  '25':
  - type: text
    content: Ary izaho dia tonga fandàtsan’ireny;
  - type: text
    content: Mijery ahy izy ka mihifikifi-doha.
  '26':
  - type: text
    content: Ampio aho, Jehovah Andriamanitro ô;
  - type: text
    content: Vonjeo araka ny famindramponao aho;
  '27':
  - type: text
    content: Ary aoka ho fantany fa tànanao izany;
  - type: text
    content: Hianao, Jehovah ô, no nanao izany.
  '28':
  - type: text
    content: Manozona izy ireo, fa Hianao kosa mitahy;
  - type: text
    content: Mitsanga-menatra izy, fa mifaly kosa ny mpanomponao.
  '29':
  - type: text
    content: Mitafy henatra ny fahavaloko
  - type: text
    content: Ka misaron-kenatra tahaka ny lamba.
  '3':
  - type: text
    content: Teny fankahalana no nanodidinany ahy;
  - type: text
    content: Ary niady tamiko tsy ahoan-tsy ahoana izy.
  '30':
  - type: text
    content: Hidera an’i Jehovah indrindra amin’ny vavako aho;
  - type: text
    content: Eny, eo amin’ny olona maro no hiderako Azy.
  '31':
  - type: text
    content: Fa mitsangana eo an-kavanan’ny malahelo Izy
  - type: text
    content: Mba hamonjy azy amin’izay manameloka ny fanahiny.
  '4':
  - type: text
    content: Ny fitiavako dia valiany fandrafiana;
  - type: text
    content: Fa izaho kosa dia mivavaka.
  '5':
  - type: text
    content: Ny soa nataoko novaliany ratsy,
  - type: text
    content: Ary ny fitiavako novaliany fankahalana.
  '6':
  - type: text
    content: Anendreo olona ratsy fanahy hanapaka azy;
  - type: text
    content: Ary aoka hisy mpanohitra
  - type: note
    content: 'Na: aoka Satana.'
  - type: text
    content: ' hitsangana eo an-kavanany.'
  '7':
  - type: text
    content: Raha hotsaraina izy, dia aoka ho meloka;
  - type: text
    content: Ary aoka ny fivavahany ho tonga fahotana.
  '8':
  - type: text
    content: Aoka ho vitsy ny androny;
  - type: text
    content: Ary aoka ho lasan’olon-kafa ny anjara-raharahany.
  '9':
  - type: text
    content: Aoka ho kamboty ny zanany;
  - type: text
    content: Ary aoka ho mpitondratena ny vadiny.
