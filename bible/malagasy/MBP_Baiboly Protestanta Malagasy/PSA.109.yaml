document_id: PSA.109,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny loza hanjo ny manao teny ratsy sy tia ozona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY Andriamanitra fiderako ô, aza mangina Hianao,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aoka hirenireny mangataka ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hiremby lavitra ny tranony efa rava izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aoka ny mpampanàna vola hamandrika izay rehetra ananany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny olon-kafa hifaoka ny vokatry ny asany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aoka tsy hisy haharitra hamindra fo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hiantra ny zanany kamboty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aoka ho fongotra ny taranany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hovonoina amin’ny taranaka mandimby ny anarany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aoka hotsarovan’i Jehovah ny helo-drainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hovonoina ny helo-dreniny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Aoka ho eo anatrehan’i Jehovah mandrakariva izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hofoanany tsy ho eo ambonin’ny tany anie ny fahatsiarovana azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Satria tsy mba nahatsiaro hamindra fo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nanenjika ny ory sy ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny reraka am-po mba hahafaty azy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tia ozona izy, ka nanody azy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tia indrafo izy, ka nanalavitra azy izany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nitafy ozona tahaka ny lambany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka niditra tao an-kibony tahaka ny rano izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tao amin’ny taolany tahaka ny diloilo;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia aoka ho tahaka ny lamba itafiany izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho fisikinana isikinany mandrakariva.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niteny ahy tamin’ny lela mandainga izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izany no famaliana avy amin’i Jehovah ho an’ny mpanohitra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay manendrikendrika ahy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa Hianao, Jehovah Tompo ô, miasa ho ahy noho ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo aho, fa tsara ny famindramponao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa mahantra sy malahelo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny foko dia voatsindrona ato anatiko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Lasa tahaka ny aloka mihelina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahina tahaka ny valala aho.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Efa malemy ny lohaliko noho ny fifadian-kanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa mihena ny hatavin’ny nofoko.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary izaho dia tonga fandàtsan’ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijery ahy izy ka mihifikifi-doha.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ampio aho, Jehovah Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo araka ny famindramponao aho;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary aoka ho fantany fa tànanao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, Jehovah ô, no nanao izany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Manozona izy ireo, fa Hianao kosa mitahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsanga-menatra izy, fa mifaly kosa ny mpanomponao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Mitafy henatra ny fahavaloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka misaron-kenatra tahaka ny lamba.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Teny fankahalana no nanodidinany ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary niady tamiko tsy ahoan-tsy ahoana izy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hidera an’i Jehovah indrindra amin’ny vavako aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, eo amin’ny olona maro no hiderako Azy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa mitsangana eo an-kavanan’ny malahelo Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamonjy azy amin’izay manameloka ny fanahiny.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny fitiavako dia valiany fandrafiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia mivavaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny soa nataoko novaliany ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitiavako novaliany fankahalana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Anendreo olona ratsy fanahy hanapaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hisy mpanohitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '109.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aoka Satana.
      marker-yv: yv-n
    - type: text
      text: ' hitsangana eo an-kavanany.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha hotsaraina izy, dia aoka ho meloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny fivavahany ho tonga fahotana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka ho vitsy ny androny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho lasan’olon-kafa ny anjara-raharahany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aoka ho kamboty ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho mpitondratena ny vadiny.
