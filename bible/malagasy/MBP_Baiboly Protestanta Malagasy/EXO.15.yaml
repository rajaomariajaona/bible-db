document_id: EXO.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fihirana nataon’i Mosesy sy ny Zanak’Isiraely, rehefa tafita ny Ranomasina Mena izy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Mosesy sy ny Zanak’Isiraely dia nihira izao fihirana izao ho an’i Jehovah ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira ho an’i Jehovah aho, fa avo indrindra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny soavaly sy ny mpitaingina azy efa nariany ao amin’ny ranomasina.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny fofonainao no nitsofanao, dia nanarona azy ny ranomasina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nilentika tahaka ny firaka ao amin’ny rano mahery izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Jehovah ô, iza moa no tahaka Anao amin’izay andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no tahaka Anao, Izay ankalazaina amin’ny fahamasinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deraina amin’ny fahatahorana, Mpanao fahagagana?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nahinjitrao ny tànanao ankavanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nitelina ireo ny tany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tarihinao amin’ny famindramponao ny firenena izay navotanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka entinao amin’ny herinao ho any amin’ny fonenanao masina izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mandre ny firenena ka raiki-tahotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovitra no mahazo ny mponina any Filistia;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Toran-kovitra ny loham-pirenen’i Edoma;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azon-korohoro ny lehilahy maherin’i Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reraka ny fon’izay rehetra monina any Kanana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mahazo azy ny tahotra sy ny hovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny halehiben’ny sandrinao dia mangina tahaka ny vato izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pandalon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mandra-pitan’.
      marker-yv: yv-n
    - type: text
      text: ' ny olonao, Jehovah ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pandalon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mandra-pitan’.
      marker-yv: yv-n
    - type: text
      text: ' ny olona izay navotanao.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia hampiditra azy Hianao ka hamponina azy ao amin’ny tendrombohitra lovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny fitoerana nataonao hitoeranao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao amin’ny fitoerana masina naorin’ny tànanao, Tompo ô.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efa nanao fitoerana hitoeranao Hianao, Jehovah ô; eny, fitoerana masina no naorin’ny tànanao, Tompo ô.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Jehovah hanjaka mandrakizay doria.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa niditra teo amin’ny ranomasina ny soavalin’i Farao sy ny kalesiny ary ny mpitaingin-tsoavaliny, ary Jehovah nampikatona ny ranomasina taminy; fa ny Zanak’Isiraely kosa nandeha tamin’ny tany maina teo afovoan’ny ranomasina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jehovah no heriko sy fidèrako, fa efa famonjena ahy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no Andriamanitro, ka hankalaza Azy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Andriamanitry ny razako, ka hanandratra Azy aho.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Miriama mpaminanivavy, anabavin’i Arona, dia nitondra ny ampongatapaka teny an-tànany; ary nivoaka nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Miriama namaly ireo lehilahy ireo ka nihira hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho an’i Jehovah, fa avo indrindra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny soavaly sy ny mpitaingina azy nariany ao amin’ny ranomasina.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandehanan’ny Zanak’Isiraely tany amin’ny efitra Sora, sy ny nitobiany tao Mara.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ARY Mosesy nitondra ny Isiraely nifindra avy teo amoron’ny Ranomasina Mena, dia nandroso ho any amin’ny efitra Sora izy; ary nandeha hateloana tany an-efitra izy fa tsy nahita rano.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia tonga tao Mara izy, fa tsy nahasotro ny rano tao Mara, satria nangidy izany; koa izany no nanaovany ny anarany hoe Mara.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mara = Mangidy.
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nimonomonona tamin’i Mosesy ny olona ka nanao hoe: Inona no hosotroinay? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary dia nitaraina tamin’i Jehovah izy, ka dia nanehoan’i Jehovah hazo anankiray, ary rehefa natsipiny tao anatin’ny rano izany, dia tonga mamy ny rano.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao no nanomezan’i Jehovah lalàna sy fitsipika ho azy, ary tao no nizahany toetra azy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'ka hoy Izy: Raha hazoto hihaino ny feon’i Jehovah Andriamanitrao hianao ka hanao izay mahitsy eo imasony sy hihaino ny lalàny ary hitandrina ny didiny rehetra, dia tsy hisy hataoko aminao ireny aretina rehetra ireny, izay nataoko tamin’ny Egyptiana; fa Izaho no Jehovah Izay mahasitrana anao.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahatongavan’ny Zanak’Isiraely tao Elima, sy ny nimonomononany tany an-efitr’i Sinay noho ny tsi-fisian-kanina, ary ny nanomezan’Andriamanitia azy mana sy papelika hohaniny.
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ARY tonga tao Elima izy; ary tao nisy loharano roa ambin’ny folo sy hazo rofia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: palma.
      marker-yv: yv-n
    - type: text
      text: ' fito-polo, dia nitoby teo anilan’ny rano izy.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehovah dia mpiady mahery,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miaramila.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no anarany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny kalesin’i Farao sy ny miaramilany natsipiny ao amin’ny ranomasina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kapiteny voafantina nasitrika ao amin’ny Ranomasina Mena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny lalina nanarona azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nilentika tany ambany indrindra tahaka ny vato izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny tànanao ankavanana, Jehovah ô, efa malaza amin’ny hery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànanao ankavanana, Jehovah ô, manorotoro ny fahavalo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Amin’ny halehiben’ny voninahitrao no andringananao izay nitsangana hanohitra Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alefanao ny fahatezeranao mirehitra, izay mandevona azy toy ny mololo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny fofonain’ny vavoronao no nanangonanao ny rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivongovongo toy ny antontan-javatra ny rano maria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandry teo afovoan’ny ranomasina ny lalina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hizara babo aho ka hanao izay sitraky ny foko aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotsoahako ny sabatro, ka hamongotra azy ny tànako.
