document_id: EXO.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihirana nataon’i Mosesy sy ny Zanak’Isiraely, rehefa tafita ny Ranomasina Mena izy.
  - type: text
    content: 'ARY Mosesy sy ny Zanak’Isiraely dia nihira izao fihirana izao ho an’i Jehovah ka nanao hoe:'
  - type: text
    content: Hihira ho an’i Jehovah aho, fa avo indrindra Izy;
  - type: text
    content: Ny soavaly sy ny mpitaingina azy efa nariany ao amin’ny ranomasina.
  '10':
  - type: text
    content: 'Ny fofonainao no nitsofanao, dia nanarona azy ny ranomasina:'
  - type: text
    content: Nilentika tahaka ny firaka ao amin’ny rano mahery izy.
  '11':
  - type: text
    content: Jehovah ô, iza moa no tahaka Anao amin’izay andriamanitra?
  - type: text
    content: Iza moa no tahaka Anao, Izay ankalazaina amin’ny fahamasinana,
  - type: text
    content: Deraina amin’ny fahatahorana, Mpanao fahagagana?
  '12':
  - type: text
    content: Nahinjitrao ny tànanao ankavanana,
  - type: text
    content: Dia nitelina ireo ny tany.
  '13':
  - type: text
    content: Tarihinao amin’ny famindramponao ny firenena izay navotanao,
  - type: text
    content: Ka entinao amin’ny herinao ho any amin’ny fonenanao masina izy.
  '14':
  - type: text
    content: Mandre ny firenena ka raiki-tahotra;
  - type: text
    content: Hovitra no mahazo ny mponina any Filistia;
  '15':
  - type: text
    content: Toran-kovitra ny loham-pirenen’i Edoma;
  - type: text
    content: Azon-korohoro ny lehilahy maherin’i Moaba;
  - type: text
    content: Reraka ny fon’izay rehetra monina any Kanana.
  '16':
  - type: text
    content: Mahazo azy ny tahotra sy ny hovitra;
  - type: text
    content: Noho ny halehiben’ny sandrinao dia mangina tahaka ny vato izy.
  - type: text
    content: Mandra-pandalon’
  - type: note
    content: 'Na: Mandra-pitan’.'
  - type: text
    content: ' ny olonao, Jehovah ô,'
  - type: text
    content: Mandra-pandalon’
  - type: note
    content: 'Na: Mandra-pitan’.'
  - type: text
    content: ' ny olona izay navotanao.'
  '17':
  - type: text
    content: Dia hampiditra azy Hianao ka hamponina azy ao amin’ny tendrombohitra lovanao,
  - type: text
    content: Ao amin’ny fitoerana nataonao hitoeranao, Jehovah ô,
  - type: text
    content: Dia ao amin’ny fitoerana masina naorin’ny tànanao, Tompo ô.
  - type: note
    content: 'Na: Efa nanao fitoerana hitoeranao Hianao, Jehovah ô; eny, fitoerana masina no naorin’ny tànanao, Tompo ô.'
  '18':
  - type: text
    content: Jehovah hanjaka mandrakizay doria.
  '19':
  - type: text
    content: Fa niditra teo amin’ny ranomasina ny soavalin’i Farao sy ny kalesiny ary ny mpitaingin-tsoavaliny, ary Jehovah nampikatona ny ranomasina taminy; fa ny Zanak’Isiraely kosa nandeha tamin’ny tany maina teo afovoan’ny ranomasina.
  '2':
  - type: text
    content: Jehovah no heriko sy fidèrako, fa efa famonjena ahy Izy;
  - type: text
    content: Izy no Andriamanitro, ka hankalaza Azy aho,
  - type: text
    content: Dia Andriamanitry ny razako, ka hanandratra Azy aho.
  '20':
  - type: text
    content: 'Ary Miriama mpaminanivavy, anabavin’i Arona, dia nitondra ny ampongatapaka teny an-tànany; ary nivoaka nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy. '
  '21':
  - type: text
    content: 'Ary Miriama namaly ireo lehilahy ireo ka nihira hoe:'
  - type: text
    content: Mihirà ho an’i Jehovah, fa avo indrindra Izy;
  - type: text
    content: Ny soavaly sy ny mpitaingina azy nariany ao amin’ny ranomasina.
  - type: heading
    content: Ny nandehanan’ny Zanak’Isiraely tany amin’ny efitra Sora, sy ny nitobiany tao Mara.
  '22':
  - type: text
    content: ARY Mosesy nitondra ny Isiraely nifindra avy teo amoron’ny Ranomasina Mena, dia nandroso ho any amin’ny efitra Sora izy; ary nandeha hateloana tany an-efitra izy fa tsy nahita rano.
  '23':
  - type: text
    content: Dia tonga tao Mara izy, fa tsy nahasotro ny rano tao Mara, satria nangidy izany; koa izany no nanaovany ny anarany hoe Mara.
  - type: note
    content: Mara = Mangidy.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Dia nimonomonona tamin’i Mosesy ny olona ka nanao hoe: Inona no hosotroinay? '
  '25':
  - type: text
    content: Ary dia nitaraina tamin’i Jehovah izy, ka dia nanehoan’i Jehovah hazo anankiray, ary rehefa natsipiny tao anatin’ny rano izany, dia tonga mamy ny rano.
  - type: text
    content: 'Tao no nanomezan’i Jehovah lalàna sy fitsipika ho azy, ary tao no nizahany toetra azy, '
  '26':
  - type: text
    content: 'ka hoy Izy: Raha hazoto hihaino ny feon’i Jehovah Andriamanitrao hianao ka hanao izay mahitsy eo imasony sy hihaino ny lalàny ary hitandrina ny didiny rehetra, dia tsy hisy hataoko aminao ireny aretina rehetra ireny, izay nataoko tamin’ny Egyptiana; fa Izaho no Jehovah Izay mahasitrana anao.'
  - type: heading
    content: Ny nahatongavan’ny Zanak’Isiraely tao Elima, sy ny nimonomononany tany an-efitr’i Sinay noho ny tsi-fisian-kanina, ary ny nanomezan’Andriamanitia azy mana sy papelika hohaniny.
  '27':
  - type: text
    content: ARY tonga tao Elima izy; ary tao nisy loharano roa ambin’ny folo sy hazo rofia
  - type: note
    content: palma.
  - type: text
    content: ' fito-polo, dia nitoby teo anilan’ny rano izy.'
  '3':
  - type: text
    content: Jehovah dia mpiady mahery,
  - type: note
    content: Heb. miaramila.
  - type: text
    content: Jehovah no anarany.
  '4':
  - type: text
    content: Ny kalesin’i Farao sy ny miaramilany natsipiny ao amin’ny ranomasina;
  - type: text
    content: Ary ny kapiteny voafantina nasitrika ao amin’ny Ranomasina Mena.
  '5':
  - type: text
    content: 'Ny lalina nanarona azy:'
  - type: text
    content: Nilentika tany ambany indrindra tahaka ny vato izy.
  '6':
  - type: text
    content: Ny tànanao ankavanana, Jehovah ô, efa malaza amin’ny hery;
  - type: text
    content: Ny tànanao ankavanana, Jehovah ô, manorotoro ny fahavalo.
  '7':
  - type: text
    content: Amin’ny halehiben’ny voninahitrao no andringananao izay nitsangana hanohitra Anao;
  - type: text
    content: Alefanao ny fahatezeranao mirehitra, izay mandevona azy toy ny mololo.
  '8':
  - type: text
    content: Ary ny fofonain’ny vavoronao no nanangonanao ny rano;
  - type: text
    content: Nivongovongo toy ny antontan-javatra ny rano maria;
  - type: text
    content: Nandry teo afovoan’ny ranomasina ny lalina.
  '9':
  - type: text
    content: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho,'
  - type: text
    content: Hizara babo aho ka hanao izay sitraky ny foko aminy,
  - type: text
    content: Hotsoahako ny sabatro, ka hamongotra azy ny tànako.
