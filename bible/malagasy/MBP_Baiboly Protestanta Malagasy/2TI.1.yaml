document_id: 2TI.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahatsiarovan’i Paoly an’i Timoty sy ny fitiavany azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin’i Kristy Jesosy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mamangy an’i Timoty, zanako malala: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho aminao
  - type: text
    text: ' anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Misaotra an’Andriamanitra aho, Izay tompoiko araka ny nataon’ny razako amin’ny fieritreretana madio, fa tsy manam-pitsaharana akory ny fahatsiarovako anao amin’ny fivavahako andro aman-alina; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary maniry hahita anao aho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa andro aman-alina dia maniry hahita anao aho.
    marker-yv: yv-n
  - type: text
    text: ' (satria tsaroako ny ranomasonao), mba ho feno fifaliana aho; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao anatin’i Loisa renibenao sy Eonika reninao, ary matoky aho fa ao anatinao koa izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Famporisihana an’i Timoty mba hamelona tsara ny fanomezam-pahasoavana azony avy tamin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ARY noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin’Andriamanitra, izay ao anatinao tamin’ny fametrahako ny tànako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy nomen’Andriamanitra fanahy osa isika, fa fanahy mahery sy fitiavana ary fahononan-tena. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa aza menatra ny ho vavolombelon’ny Tompontsika, na ahy mpifatony hianao; fa aoka hianao ho mpiombona ny fahoriana noho ny filazantsara araka ny herin’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay namonjy antsika sy niantso antsika tamin’ny fiantsoana masina, tsy araka ny asantsika, fa araka ny fikasany sy ny fahasoavany izay nomena antsika tao amin’i Kristy Jesosy hatry ny fony fahagola; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa naharihary ankehitriny tamin’ny nisehoan’i Kristy Jesosy, Mpamonjy antsika, Izay nahafoana ny herin’ny fahafatesana, ka ny filazantsara no nampisehoany mazava ny fiainana sy ny tsi-fahalòvana mandrakizay; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ny amin’io filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[mpampianatra ny jentilisa].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary noho izany koa no iaretako izao zavatra izao, ka tsy menatra aho, satria fantatro Izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolotro '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Azy
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ilay zavatra natolo
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ny '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahy.
    marker-yv: yv-n
  - type: text
    text: mandra-pihavin’izay andro izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tano amin’ny finoana sy ny fitiavana ao amin’i Kristy Jesosy ny mariky ny teny tsy misy kilema,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: salama.
    marker-yv: yv-n
  - type: text
    text: ' izay efa renao tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ilay zavatra tsara natolotra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anao
  - type: text
    text: ' dia tehirizo amin’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny fampaherezan’
  - type: text
    text: ' ny Fanahy Masina, Izay mitoetra ao anatintsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fantatrao fa efa nahafoy ahy izay rehetra any Asia; isan’ireny Fygelo sy Hermogena. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Homen’ny Tompo famindrampo anie ny ankohonan’i Onesiforosy; satria namelombelona ny fanahiko matetika izy, fa tsy menatra ny gadrako; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa raha tany Roma izy, dia nitady ahy fatratra ka nahita '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (ny Tompo anie hampahita azy famindrampo amin’ny Tompo amin’izay andro izay); ary ny hafatratry ny nanompoany ahy tany Efesosy dia fantatrao tsara.
