document_id: 2TI.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsiarovan’i Paoly an’i Timoty sy ny fitiavany azy.
  - type: text
    content: 'PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin’i Kristy Jesosy, '
  '10':
  - type: text
    content: 'fa naharihary ankehitriny tamin’ny nisehoan’i Kristy Jesosy, Mpamonjy antsika, Izay nahafoana ny herin’ny fahafatesana, ka ny filazantsara no nampisehoany mazava ny fiainana sy ny tsi-fahalòvana mandrakizay; '
  '11':
  - type: text
    content: ny amin’io filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra.
  - type: note
    content: 'Na: [mpampianatra ny jentilisa].'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Ary noho izany koa no iaretako izao zavatra izao, ka tsy menatra aho, satria fantatro Izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolotro '
  - type: text
    content: Azy
  - type: text
    content: ' '
  - type: note
    content: 'Na: ilay zavatra natolony ahy.'
  - type: text
    content: mandra-pihavin’izay andro izay.
  '13':
  - type: text
    content: Tano amin’ny finoana sy ny fitiavana ao amin’i Kristy Jesosy ny mariky ny teny tsy misy kilema,
  - type: note
    content: Gr. salama.
  - type: text
    content: ' izay efa renao tamiko. '
  '14':
  - type: text
    content: 'Ilay zavatra tsara natolotra '
  - type: text
    content: anao
  - type: text
    content: ' dia tehirizo amin’'
  - type: text
    content: ny fampaherezan’
  - type: text
    content: ' ny Fanahy Masina, Izay mitoetra ao anatintsika.'
  '15':
  - type: text
    content: 'Fantatrao fa efa nahafoy ahy izay rehetra any Asia; isan’ireny Fygelo sy Hermogena. '
  '16':
  - type: text
    content: 'Homen’ny Tompo famindrampo anie ny ankohonan’i Onesiforosy; satria namelombelona ny fanahiko matetika izy, fa tsy menatra ny gadrako; '
  '17':
  - type: text
    content: 'fa raha tany Roma izy, dia nitady ahy fatratra ka nahita '
  '18':
  - type: text
    content: (ny Tompo anie hampahita azy famindrampo amin’ny Tompo amin’izay andro izay); ary ny hafatratry ny nanompoany ahy tany Efesosy dia fantatrao tsara.
  '2':
  - type: text
    content: 'mamangy an’i Timoty, zanako malala: '
  - type: text
    content: ho aminao
  - type: text
    content: ' anie ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
  '3':
  - type: text
    content: 'Misaotra an’Andriamanitra aho, Izay tompoiko araka ny nataon’ny razako amin’ny fieritreretana madio, fa tsy manam-pitsaharana akory ny fahatsiarovako anao amin’ny fivavahako andro aman-alina; '
  '4':
  - type: text
    content: ary maniry hahita anao aho
  - type: note
    content: 'Na: fa andro aman-alina dia maniry hahita anao aho.'
  - type: text
    content: ' (satria tsaroako ny ranomasonao), mba ho feno fifaliana aho; '
  '5':
  - type: text
    content: fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao anatin’i Loisa renibenao sy Eonika reninao, ary matoky aho fa ao anatinao koa izany.
  - type: heading
    content: Famporisihana an’i Timoty mba hamelona tsara ny fanomezam-pahasoavana azony avy tamin’Andriamanitra.
  '6':
  - type: text
    content: 'ARY noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin’Andriamanitra, izay ao anatinao tamin’ny fametrahako ny tànako. '
  '7':
  - type: text
    content: 'Fa tsy nomen’Andriamanitra fanahy osa isika, fa fanahy mahery sy fitiavana ary fahononan-tena. '
  '8':
  - type: text
    content: 'Koa aza menatra ny ho vavolombelon’ny Tompontsika, na ahy mpifatony hianao; fa aoka hianao ho mpiombona ny fahoriana noho ny filazantsara araka ny herin’Andriamanitra, '
  '9':
  - type: text
    content: 'Izay namonjy antsika sy niantso antsika tamin’ny fiantsoana masina, tsy araka ny asantsika, fa araka ny fikasany sy ny fahasoavany izay nomena antsika tao amin’i Kristy Jesosy hatry ny fony fahagola; '
