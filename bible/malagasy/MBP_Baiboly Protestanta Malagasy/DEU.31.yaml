document_id: DEU.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra farany nataon’i Mosesy tamin’ny Isiraely sy Josoa, ary ny fanaperany ny lalàna.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Mosesy nandeha, dia nilaza izao teny izao tamin’ny Isiraely rehetra '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nandidy azy Mosesy ka nanao hoe: Isam-pito taona, dia amin’ny taom-panafahana, amin’ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ka avy hiseho eo anatrehan’i Jehovah Andriamanitrao eo amin’ny tany izay hofidiny ny Isiraely rehetra, dia aoka hovakinao eo anatrehan’ny Isiraely rehetra ny tenin’ity lalàna ity hihainoany azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Vorio ny vahoaka rehetra, na lehilahy, na vehivavy, na ankizy madinika, na ny vahiny ao an-tanànanao, hihainoany sy hianarany ka hatahorany an’i Jehovah Andriamanitrao sy hitandremany hanaraka ny teny rehetra amin’ity lalàna ity. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ny zanany koa, izay tsy nahalala, dia handre ka hianatra hatahotra an’i Jehovah Andriamanitrareo amin’ny andro rehetra hiainanareo eo amin’ny tany, izay efa hidiranareo holovana, rehefa tafita an’i Jordana hianareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy Jehovah tamin’i Mosesy: Indro, antomotra ny andro hahafatesanao; koa miantsoa an’i Josoa, ary mitoera ao amin’ny trano-lay fihaonana hianareo mba handidiako azy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha Mosesy sy Josoa ka nitoetra tao amin’ny trano-lay fihaonana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary Jehovah niseho teo amin’ny trano-lay tamin’ny andri-rahona; dia nijanona teo anoloan’ny varavaran’ny trano-lay ny andri-rahona.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Indro fa hodi-mandry any amin’ny razanao hianao; ary hitsangana ity firenena ity ka hijangajanga hanaraka ny andriamani-kafa any amin’ny tany izay efa hidirany honenana, dia hahafoy Ahy izy ka hivadika ny fanekeko izay nataoko taminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hirehitra aminy ny fahatezerako amin’izany andro izany, ka hahafoy azy Aho ary hanafina ny tavako aminy, ka ho lany ritra izy, ary loza maro sy fahoriana no hanjo azy; dia hiteny izy amin’izany andro izany ka hanao hoe: Moa tsy ny tsy itoeran’Andriamanitro eto amiko va no mahatonga izao fahoriana izao amiko? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary Izaho dia hanafina ny tavako tokoa amin’izany andro izany noho ny ratsy rehetra izay nataony, fa nivily nanaraka andriamani-kafa izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ankehitriny soraty ho anareo izao fihirana izao, ka ampianaro ny Zanak’Isiraely, ary aoka tsy ho afaka am-bavany izao fihirana izao mba ho vavolombelona amin’ny Zanak’Isiraely. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka nanao taminy hoe: Efa roa-polo amby zato taona andro-any aho ka tsy afa-mivoaka sy miditra intsony, ary Jehovah efa nilaza tamiko hoe: Tsy hita io Jordana io hianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa rehefa entiko any amin’ny tany tondra-dronono sy tantely, izay nianianako tamin’ny razany homena azy izy, ary hihinana ka ho voky sy hihamatavy, dia hivily hanaraka andriamani-kafa izy ka hanompo azy, ary handa Ahy ka hivadika ny fanekeko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary raha manjo azy ny zava-dratsy maro sy ny fahoriana, dia ho vavolombelona aminy izao fihirana izao, fa tsy ho afaka am-bavan’ny taranany izao, fa fantatro ny fisainany izay efa hataony, na dia ankehitriny aza, raha tsy mbola nentiko any amin’ny tany izay nianianako homena azy izy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nosoratan’i Mosesy androtrizay ihany izao fihirana izao ka nampianariny ny Zanak’Isiraely. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Jehovah nandidy an’i Josoa, zanak’i Mona, ka nanao hoe: Mahereza sy matanjaha; fa hianao no hitondra ny Zanak’Isiraely hiditra ao amin’ny tany izay nianianako taminy homena azy, ary homba anao Aho.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary rehefa voasoratr’i Mosesy teo amin’ny boky avokoa ny tenin’ity lalàna ity, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'dia nandidy ny Levita, izay mpitondra ny fiaran’ny faneken’i Jehovah, izy ka nanao hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raiso ity bokin’ny lalàna ity, ka apetraho eo anilan’ny fiaran’ny faneken’i Jehovah Andriamanitrareo mba ho vavolombelona aminao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa izaho mahalala ny ditranao sy ny hamafi-hatokao; indro, na dia mbola velona eto aminareo ankehitriny aza aho, dia miodina amin’i Jehovah hianareo, ka mainka fa rehefa maty aho. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Vorio ho eto amiko ny loholona rehetra amin’ny firenenareo sy ny mpifehy anareo, mba holazaiko eo anatrehany izao teny izao; ary hiantso ny lanitra sy ny tany ho vavolombelona aminy aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Fa fantatro fa rehefa maty aho, dia hanao ratsy tokoa hianareo ka hiala amin’ny làlana izay nasaiko nalehanareo; dia ho tratry ny loza hianareo any am-parany, satria hanao izay ratsy eo imason’i Jehovah hianareo ka hampahatezitra Azy amin’ny asan’ny tànanareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jehovah Andriamanitrao no hita eo alohanao, ary Izy no handringana ireo firenena ireo tsy ho eo anoloanao, ka hahazo ny taniny hianao; ary Josoa no hita eo alohanao, araka izay efa nolazain’i Jehovah. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nolazain’i Mosesy teo anatrehan’ny fiangonana, dia ny Isiraely rehetra, ny tenin’izao fihirana izao mandra-pahavitany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Jehovah hanao amin’ireo tahaka ny nataony tamin’i Sihona sy Oga, mpanjakan’ny Amorita, izay naringany, sy tahaka ny nataony tamin’ny taniny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hatolotr’i Jehovah eo anoloanareo ireo hanaovanareo azy araka ny lalàna rehetra izay nandidiako anareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mahereza sy matanjaha; aza matahotra na manahy azy; fa Jehovah Andriamanitrao no miara-mandeha aminao; tsy handao anao na hahafoy anao Izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Mosesy niantso an’i Josoa ka niteny taminy teo imason’ny Isiraely rehetra hoe: Mahereza sy matanjaha; fa hianao sy ity firenena ity dia hiara-miditra ao amin’ny tany izay nianianan’i Jehovah tamin’ny razany homena azy; ary hianao no hampandova azy izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary Jehovah no mandeha eo alohanao; ary Izy no hiaraka aminao; tsy handao anao na hahafoy anao Izy; koa aza matahotra na mivadi-po hianao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nosoratan’i Mosesy izany lalàna izany ka natolony ireo mpisorona, taranak’i Levy, izay mpitondra ny fiaran’ny faneken’i Jehovah, sy ny loholon’ny Isiraely rehetra. '
