document_id: ECC.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny maha-zava-poana ny fahafinaretana sy ny voninahitra momba izao fiainana izao, na dia omban’ny fahendrena aza.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'HOY izaho anakampo: Aoka mba hizahako toetra amin’ny hafaliana hianao, ka dia mifalia amin’ny fahitana ny fahafinaretana; kanjo, indro, zava-poana koa izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na inona na inona nirin’ny masoko dia tsy nisy narovako taminy; tsy nisakana ny foko tamin’izay mety ho fifaliana aho; fa nahazo hafaliana avy tamin’ny fisasarako rehetra ny foko; ary izany no anjarako avy tamin’ny fisasarako rehetra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa nitodika aho nandinika ny asa rehetra nataon’ny tànako sy ny fisasarana izay nisasarako, ka, indreo, zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana izany rehetra izany, fa tsy nisy nahasoa tatỳ ambanin’ny masoandro.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fihoaran’ny fahendrena noho ny fahadalana, ary ny mahatsara ny fiononana, na dia hita aza fa misy zavatra maro itovian’ny hendry sy ny adala.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nitodika aho hijery ny fahendrena sy ny fahaverezan-tsaina ary ny fahadalana; fa inona no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hataon’
    - type: text
      text: ' ny olona izay handimby ny mpanjaka? Izay efa natao hatramin’ny ela ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitako fa ny fahendrena dia tsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mihoatra.'
      marker-yv: yv-n
    - type: text
      text: ' noho ny fahadalana, toy ny fahatsaran’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fihoaran’.'
      marker-yv: yv-n
    - type: text
      text: ' ny mazava noho ny maizina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mason’ny hendry dia eo an-dohany; fa ny adala kosa mandeha amin’ny maizina; nefa hitako fa mitovy ihany ny manjo azy roa tonta.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izaho anakampo: Mitovy amin’ny manjo ny adala ihany ny manjo ahy; koa nahoana ary no nanan-tombom-pahendrena aho? Dia hoy izaho anakampo: Zava-poana koa izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa samy tsy misy fahatsiarovana mandrakizay na ny hendry na ny adala; fa amin’ny andro ho avy dia samy ho hadino ela izy. Indrisy! samy ho faty na ny adala na ny hendry.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia efa halako ny aina, satria nataoko ho ratsy ny asa atao atỳ ambanin’ny masoandro; fa zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana izy rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, efa halako ny fisasarako rehetra izay nisasarako tatỳ ambanin’ny masoandro, fa havelako ho an’ny olona izay handimby ahy izany, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary iza no mahalala na ho hendry na ho adala izy? Nefa izy no ho tompon’izay rehetra nisasarako sy nataoko tamin’ny fahendreko tatỳ ambanin’ny masoandro. Zava-poana koa izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izaho, miantso ny fihomehezana: Fahadalana, ary ny fifaliana hoe: Mahefa inona?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitodika aho hampamoy ny foko amin’ny fahakiviana ny amin’ny fisasarana rehetra izay nisasarako tatỳ ambanin’ny masoandro. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa misy olona izay misasatra amin’ny fahendrena sy ny fahalalana ary ny fahaizana, nefa ny olona izay tsy nisasatra tamin’izany akory no tsy maintsy hamelany azy ho lovany. Zava-poana sy faharatsiana lehibe koa izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa inona no azon’ny olona amin’ny fisasarany rehetra sy amin’ny fikatsahan’ny fony, izay nisasarany tatỳ ambanin’ny masoandro? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny androny rehetra dia fanaintainana avokoa, ary ny fisasarany dia fahasorisorena; eny, na dia amin’ny alina aza dia tsy manam-pitsaharana ny fony. Zava-poana koa izany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy mahasoa ny olona mihoatra noho ny mihinana sy misotro ary ny mampahafinaritra ny tenany amin’ny fisasarany. Izany koa aza dia efa hitako fa avy amin’ny tànan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Tsy misy tsara amin’ny olona. Ny mihinana sy misotro ary ny mampahafinaritra ny tenany amin’ny fisasarany dia hitako fa avy amin’ny tànan’Andriamanitra koa.'
      marker-yv: yv-n
    - type: text
      text: ' ('
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa iza no mahalany, ary iza no mahazo manaram-po mihoatra noho izaho?). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny olona izay ankasitrahan’Andriamanitra dia omeny fahendrena sy fahalalana ary fifaliana; fa ny mpanota kosa ampiasainy hanangona sy hahory, mba hisy homeny izay ankasitrahan’Andriamanitra. Zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana koa izany.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisaina tato am-poko hamalifaly ny nofoko tamin’ny divay aho (ny foko anefa mbola hitondra azy amin’ny fahendrena ihany) ary hitana ny fahadalana, mandra-pahitako izay tsara ho an’ny zanak’olombelona ka tokony hataony atỳ ambanin’ny lanitra amin’ny andro vitsy iainany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao asa lehibe ho ahy aho, nanao trano, nanao tanimboaloboka, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanao tanimboly sy saha aho ka namboly hazo fihinam-boa samy hafa karazana tao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanao kamory aho handemana ny ala be zana-kazo; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nahazo ankizilahy sy ankizivavy aho sady nanana ompikely; ary nanana fananana be aho, dia omby sy ondry aman-osy mihoatra noho izay rehetra talohako teto Jerosalema. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nihary volafotsy sy volamena koa aho ary fanaka tsara fanan’ny mpanjaka sy izay avy amin’ny tany samy hafa; ary nahazo mpihiralahy sy mpihiravavy aho mbamin’izay mahafinaritra ny zanak’olombelona, dia vady sy vaditsindrano betsaka.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fahafinaretan’ny zanak’olombelona be dia be.'
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia efa nisandratra mihoatra noho izay rehetra talohako teto Jerosalema aho; ary ny fahendreko anefa dia mbola tato amiko ihany. '
