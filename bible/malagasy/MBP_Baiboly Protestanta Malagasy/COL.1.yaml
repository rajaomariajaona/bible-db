document_id: COL.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana ny Kolosiana, sy fisaorana an’Andriamanitra noho ny toetr’ireo.
  - type: text
    content: 'PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, ary Timoty rahalahy, '
  '10':
  - type: text
    content: 'mba handehananareo mendrika ny Tompo, hanaovana ny sitrapony amin’ny zavatra rehetra, dia mahavokatra amin’ny asa tsara rehetra sady mitombo amin’ny fahalalana tsara an’Andriamanitra, '
  '11':
  - type: text
    content: 'ary ampahatanjahina amin’ny hery rehetra araka ny herin’ny voninahiny ho amin’ny faharetana rehetra sy ny fandeferana amin’ny hafaliana, '
  '12':
  - type: text
    content: 'ka misaotra ny Ray, Izay nampahamendrika antsika hanana anjara amin’ny lovan’ny olona masina eo amin’ny mazava, '
  '13':
  - type: text
    content: 'sady nahafaka antsika tamin’ny fahefan’ny maizina ka namindra antsika ho amin’ny fanjakan’ny Zanany malalany, '
  '14':
  - type: text
    content: Izay ananantsika fanavotana, dia ny famelana ny helotsika.
  '15':
  - type: text
    content: 'Izy no endrik’Andriamanitra tsy hita, ny Lahimatoa talohan’izao zavatra ary rehetra izao; '
  '16':
  - type: text
    content: fa tao aminy no nahariana ny zavatra rehetra any an-danitra sy etỳ ambonin’ny tany, dia ny hita sy ny tsy hita, na fiandrianana,
  - type: note
    content: Gr. seza fiandrianana.
  - type: text
    content: ' na fanjakana, na fanapahana, na fahefana, Izy no nahariana ny zavatra rehetra, sady ho Azy izany; '
  '17':
  - type: text
    content: 'ary Izy no talohan’ny zavatra rehetra, sady ao aminy no aharetan’ny zavatra rehetra. '
  '18':
  - type: text
    content: Ary Izy no Lohan’ny tena, dia ny fiangonana;
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' Izy no voalohany, dia ny Lahimatoa tamin’ny maty, mba ho Lohany amin’ny zavatra rehetra Izy. '
  '19':
  - type: text
    content: 'Fa sitraky '
  - type: text
    content: ny Ray
  - type: text
    content: ' ho ao aminy no hitoeran’ny fahafenoana rehetra, '
  '2':
  - type: text
    content: 'mamangy ny olona masina any Kolosia, dia ny rahalahy mahatoky ao amin’i Kristy: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika.'
  '20':
  - type: text
    content: 'sady Izy no hampihavanany ny zavatra rehetra aminy, ka dia ny rany teo amin’ny hazofijaliana no nanaovany fampihavanana–eny, Izy, '
  - type: text
    content: hoy izaho, no fampihavanana izany,
  - type: text
    content: ' na ny etỳ ambonin’ny tany, na ny any an-danitra.'
  '21':
  - type: text
    content: 'Ary hianareo, izay olon-ko azy fahiny sy fahavalo tamin’ny sainareo noho ny fanaovan-dratsy, no efa nampihavaniny ankehitriny '
  '22':
  - type: text
    content: 'tao amin’ny tenan’ny nofony, tamin’ny fahafatesana, mba hatolony ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany, '
  '23':
  - type: text
    content: raha maharitra amin’ny finoana hianareo ka mafy orina sady tafatoetra ary tsy mety hafindra hiala amin’ny fanantenana avy amin’ny filazantsara, izay efa renareo sady notorina eny ambanin’ny lanitra rehetra eny; ary izany no nanaovana ahy Paoly ho mpanompo.
  '24':
  - type: text
    content: Ankehitriny dia mifaly amin’ny fiaretako ho anareo aho, ary mahatanteraka ao amin’ny nofoko izay tsy vita tamin’ny fahorian’i Kristy ho an’ny tenany, dia ny fiangonana,
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'izay nanaovana ahy ho mpanompo araka ny fitondran’Andriamanitra nomena ahy ho anareo, hahatanteraka ny fitoriana ny tenin’Andriamanitra, '
  '26':
  - type: text
    content: 'dia ny zava-miafina, ilay voàfina hatramin’ny fahagola sy ny taranaka maro, fa voaseho ankehitriny amin’ny olony masina, '
  '27':
  - type: text
    content: 'izay efa tian’Andriamanitra ho nampahafantarina ny haren’ny voninahitr’ity zava-niafina ity any amin’ny jentilisa, dia Kristy ao anatinareo, Izay fanantenana ny voninahitra; '
  '28':
  - type: text
    content: 'Izy no torinay, ka samy anarinay sy ampianarinay amin’ny fahendrena rehetra ny olona rehetra, mba samy hatolotray ho tanteraka ao amin’i Kristy izy rehetra. '
  '29':
  - type: text
    content: Ary ny hahatanteraka izany no ikelezako aina koa sy iezahako fatratra araka ny fiàsan’ny herin’Ilay miasa mahery ato anatiko.
  '3':
  - type: text
    content: 'Misaotra an’Andriamanitra, Rain’i Jesosy Kristy Tompontsika, izahay amin’ny fangatahanay mandrakariva ho anareo, '
  '4':
  - type: text
    content: 'rehefa renay ny finoanareo an’i Kristy Jesosy sy ny fitiavanareo ny olona masina rehetra, '
  '5':
  - type: text
    content: 'noho ny fanantenana izay tehirizina any an-danitra ho anareo, dia ilay efa renareo fahiny tamin’ny tenin’ny fahamarinan’ny filazantsara, '
  '6':
  - type: text
    content: 'izay efa mby eo aminareo, tahaka ny eny amin’izao tontolo izao koa, sady vokatra sy mitombo tahaka ny eo aminareo koa hatramin’ny andro nandraisanareo sy nahalalanareo tsara ny fahasoavan’Andriamanitra araka ny marina; '
  '7':
  - type: text
    content: tahaka ny efa renareo tamin’i Epafra, mpanompo namanay sady malala, izay mpanompon’i Kristy mahatoky ho anay,
  - type: note
    content: 'Na: [anareo].'
  - type: text
    content: ' '
  '8':
  - type: text
    content: sady efa nanambara taminay koa ny fitiavanareo ao amin’ny Fanahy.
  - type: heading
    content: Fivavahan’i Paoly ho an’ny Kolosiana, sy filazana ny fahalehibiazan’ny voninahitr’i Kristy.
  '9':
  - type: text
    content: 'ARY noho izany izahay koa hatramin’ny andro nandrenesanay dia tsy mitsahatra mivavaka sy mangataka ho anareo, mba hofenoina fahalalana tsara ny sitrapony hianareo amin’ny fahendrena sy ny fahazavan-tsaina rehetra avy amin’ny Fanahy, '
