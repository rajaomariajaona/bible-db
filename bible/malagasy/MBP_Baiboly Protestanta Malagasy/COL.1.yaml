document_id: COL.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiarahabana ny Kolosiana, sy fisaorana an’Andriamanitra noho ny toetr’ireo.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, ary Timoty rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mamangy ny olona masina any Kolosia, dia ny rahalahy mahatoky ao amin’i Kristy: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Misaotra an’Andriamanitra, Rain’i Jesosy Kristy Tompontsika, izahay amin’ny fangatahanay mandrakariva ho anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'rehefa renay ny finoanareo an’i Kristy Jesosy sy ny fitiavanareo ny olona masina rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'noho ny fanantenana izay tehirizina any an-danitra ho anareo, dia ilay efa renareo fahiny tamin’ny tenin’ny fahamarinan’ny filazantsara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay efa mby eo aminareo, tahaka ny eny amin’izao tontolo izao koa, sady vokatra sy mitombo tahaka ny eo aminareo koa hatramin’ny andro nandraisanareo sy nahalalanareo tsara ny fahasoavan’Andriamanitra araka ny marina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tahaka ny efa renareo tamin’i Epafra, mpanompo namanay sady malala, izay mpanompon’i Kristy mahatoky ho anay,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[anareo].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: sady efa nanambara taminay koa ny fitiavanareo ao amin’ny Fanahy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fivavahan’i Paoly ho an’ny Kolosiana, sy filazana ny fahalehibiazan’ny voninahitr’i Kristy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ARY noho izany izahay koa hatramin’ny andro nandrenesanay dia tsy mitsahatra mivavaka sy mangataka ho anareo, mba hofenoina fahalalana tsara ny sitrapony hianareo amin’ny fahendrena sy ny fahazavan-tsaina rehetra avy amin’ny Fanahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mba handehananareo mendrika ny Tompo, hanaovana ny sitrapony amin’ny zavatra rehetra, dia mahavokatra amin’ny asa tsara rehetra sady mitombo amin’ny fahalalana tsara an’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary ampahatanjahina amin’ny hery rehetra araka ny herin’ny voninahiny ho amin’ny faharetana rehetra sy ny fandeferana amin’ny hafaliana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka misaotra ny Ray, Izay nampahamendrika antsika hanana anjara amin’ny lovan’ny olona masina eo amin’ny mazava, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sady nahafaka antsika tamin’ny fahefan’ny maizina ka namindra antsika ho amin’ny fanjakan’ny Zanany malalany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay ananantsika fanavotana, dia ny famelana ny helotsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izy no endrik’Andriamanitra tsy hita, ny Lahimatoa talohan’izao zavatra ary rehetra izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa tao aminy no nahariana ny zavatra rehetra any an-danitra sy etỳ ambonin’ny tany, dia ny hita sy ny tsy hita, na fiandrianana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: seza fiandrianana.
    marker-yv: yv-n
  - type: text
    text: ' na fanjakana, na fanapahana, na fahefana, Izy no nahariana ny zavatra rehetra, sady ho Azy izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary Izy no talohan’ny zavatra rehetra, sady ao aminy no aharetan’ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Izy no Lohan’ny tena, dia ny fiangonana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' Izy no voalohany, dia ny Lahimatoa tamin’ny maty, mba ho Lohany amin’ny zavatra rehetra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa sitraky '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny Ray
  - type: text
    text: ' ho ao aminy no hitoeran’ny fahafenoana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'sady Izy no hampihavanany ny zavatra rehetra aminy, ka dia ny rany teo amin’ny hazofijaliana no nanaovany fampihavanana–eny, Izy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy izaho, no fampihavanana izany,
  - type: text
    text: ' na ny etỳ ambonin’ny tany, na ny any an-danitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hianareo, izay olon-ko azy fahiny sy fahavalo tamin’ny sainareo noho ny fanaovan-dratsy, no efa nampihavaniny ankehitriny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'tao amin’ny tenan’ny nofony, tamin’ny fahafatesana, mba hatolony ho masina sady tsy hanan-tsiny amam-pondro eo anatrehany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: raha maharitra amin’ny finoana hianareo ka mafy orina sady tafatoetra ary tsy mety hafindra hiala amin’ny fanantenana avy amin’ny filazantsara, izay efa renareo sady notorina eny ambanin’ny lanitra rehetra eny; ary izany no nanaovana ahy Paoly ho mpanompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ankehitriny dia mifaly amin’ny fiaretako ho anareo aho, ary mahatanteraka ao amin’ny nofoko izay tsy vita tamin’ny fahorian’i Kristy ho an’ny tenany, dia ny fiangonana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'izay nanaovana ahy ho mpanompo araka ny fitondran’Andriamanitra nomena ahy ho anareo, hahatanteraka ny fitoriana ny tenin’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia ny zava-miafina, ilay voàfina hatramin’ny fahagola sy ny taranaka maro, fa voaseho ankehitriny amin’ny olony masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'izay efa tian’Andriamanitra ho nampahafantarina ny haren’ny voninahitr’ity zava-niafina ity any amin’ny jentilisa, dia Kristy ao anatinareo, Izay fanantenana ny voninahitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izy no torinay, ka samy anarinay sy ampianarinay amin’ny fahendrena rehetra ny olona rehetra, mba samy hatolotray ho tanteraka ao amin’i Kristy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny hahatanteraka izany no ikelezako aina koa sy iezahako fatratra araka ny fiàsan’ny herin’Ilay miasa mahery ato anatiko.
