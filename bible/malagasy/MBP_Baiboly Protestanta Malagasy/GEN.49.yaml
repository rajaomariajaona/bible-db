document_id: GEN.49,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tso-dranon’Isiraely nanambarany izay ho toetry ny zanany mirahalahy avy.
  - type: text
    content: 'ARY Jakoba namory ny zanani-lahy ka nanao hoe: Mivoria hianareo, mba hanambarako aminareo izay ho tonga aminareo any am-parany.'
  '10':
  - type: text
    content: Ny tehim-panjakana tsy hiala amin’i Joda,
  - type: text
    content: Na ny tehina fanapahana
  - type: note
    content: 'Na: ny mpanapaka.'
  - type: text
    content: ' eo anelanelan’ny tongony,'
  - type: text
    content: Mandra-pahatongan’i Silo,
  - type: note
    content: 'Na: any Silo. Silo = Fiadanana (?).'
  - type: text
    content: Ka hanoa Azy
  - type: note
    content: 'Na: azy.'
  - type: text
    content: ' ny firenena.'
  '11':
  - type: text
    content: Mamatotra ny borikiny tanora eo amin’ny tahom-boaloboka izy.
  - type: text
    content: Ary ny zanaky ny borikivaviny eo amin’ny tahom-boaloboka tsara;
  - type: text
    content: Nanasa ny fitafiany tamin’ny divay izy,
  - type: text
    content: Ary ny akanjony tamin’ny ram-boaloboka.
  '12':
  - type: text
    content: Mangamanga
  - type: note
    content: 'Na: Mivoaramena.'
  - type: text
    content: ' ny masony azon’ny divay'
  - type: text
    content: Ary fotsy ny nifiny azon’ny ronono.
  - type: note
    content: 'Na: Mena mihoatra noho ny divay ny masony, ary fotsy mihoatra noho ny ronono ny nifiny.'
  '13':
  - type: text
    content: ' '
  - type: heading
    content: zebolona
  - type: text
    content: ', ao amoron-dranomasina no honenany,'
  - type: text
    content: Dia ao amoron-dranomasina fitodian-tsambo;
  - type: text
    content: Ary ny sisin-taniny hifanolotra amin’i Sidona.
  '14':
  - type: text
    content: ' '
  - type: heading
    content: isakara
  - type: text
    content: ' dia boriky henjana,'
  - type: text
    content: Mandry eo anelanelan’ny vala;
  '15':
  - type: text
    content: Ary hitany fa tsara ny fialan-tsasatra,
  - type: text
    content: Sady mahafinaritra ny tany;
  - type: text
    content: Dia nanongilana ny sorony hitondra entana izy
  - type: text
    content: Ka tonga mpanompo mandoa hetra.
  '16':
  - type: text
    content: ' '
  - type: heading
    content: dana
  - type: text
    content: ' '
  - type: note
    content: Dana = Mpitsara.
  - type: text
    content: hitsara ny olony
  - type: text
    content: Tahaka ny anankiray amin’ny firenen’ny Isiraely.
  '17':
  - type: text
    content: Dana ho menarana ao amoron-dàlana,
  - type: text
    content: Ho bibilava misy tandroka ao an-dàlana izy,
  - type: text
    content: Izay manaikitra ny kitrokelin’ny soavaly,
  - type: text
    content: Ka potraka miantsilany ny mpitaingina azy.
  '18':
  - type: text
    content: Ny famonjenao no andrasako, Jehovah ô!
  '19':
  - type: text
    content: ' '
  - type: heading
    content: gada
  - type: text
    content: ', ny manao andiany hamoritra azy;'
  - type: text
    content: Fa izy kosa hamely ny otrika.
  '2':
  - type: text
    content: Miangòna, ka mandrenesa, ry zanakalahin’i Jakoba,
  - type: text
    content: 'Eny, mihainoa an’Isiraely rainareo:'
  '20':
  - type: text
    content: ' '
  - type: heading
    content: asera
  - type: text
    content: ' dia avy, ao aminy ny matavy fihinany,'
  - type: text
    content: Ary izy no ihavian’ny hanim-pin’andriana.
  '21':
  - type: text
    content: ' '
  - type: heading
    content: naftaly
  - type: text
    content: ' dia dieravavy alefa; Manao teny mahafinaritra izy.'
  '22':
  - type: text
    content: ' '
  - type: heading
    content: josefa
  - type: text
    content: ' dia sampana mahavokatra.'
  - type: text
    content: Eny, sampana mahavokatra eo anilan-doharano;
  - type: text
    content: Ny rantsany mananika mihoatra ny fefy.
  '23':
  - type: text
    content: Nampahory azy ny mpitifitra,
  - type: text
    content: Dia nitifitra azy sy nanenjika azy;
  '24':
  - type: text
    content: Kanefa mateza hery ny tsipìkany,
  - type: text
    content: Ary mailamailaka ny sandrin-tànany,
  - type: text
    content: Avy amin’ny tànan’Ilay Maherin’i Jakoba.
  - type: text
    content: Dia avy ao amin’ny Mpiandry, Izay Vatolampon’ny Isiraely,
  '25':
  - type: text
    content: Avy amin’ny Andriamanitry ny rainao, ka Izy hamonjy anao–
  - type: text
    content: 'Avy amin’ny Tsitoha, ka Izy hitahy anao:'
  - type: text
    content: Dia fitahiana avy amin’ny lanitra any ambony,
  - type: text
    content: Sy fitahiana avy amin’ny lalina, Izay mamitsaka any ambany,
  - type: text
    content: Ary fitahiana avy amin’ny nono sy ny kibo.
  '26':
  - type: text
    content: Ny tso-dranon’ny rainao dia mihoatra
  - type: note
    content: Heb. mahery.
  - type: text
    content: ' noho ny havoana mandrakizay'
  - type: text
    content: Sy ny zavatra mahafinaritra amin’ny tendrombohitra fahagola;
  - type: text
    content: Ho eo an-dohan’i Josefa izany,
  - type: text
    content: Dia ho eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
  '27':
  - type: text
    content: ' '
  - type: heading
    content: benjamina
  - type: text
    content: ' dia amboadia'
  - type: note
    content: Lopa.
  - type: text
    content: ' mamiravira:'
  - type: text
    content: Nony maraina homan-dremby izy,
  - type: text
    content: Nony hariva mizara babo.
  '28':
  - type: text
    content: Ireo rehetra ireo no firenen’ny Isiraely roa ambin’ny folo; ary izany no nolazain’ny rainy taminy sy nitsofany rano azy; samy araka ny tso-drano izay tokony ho azy avy no nitsofany rano azy.
  '29':
  - type: text
    content: 'Dia nanafatra azy izy ka nanao taminy hoe: Izaho efa madiva hangonina ho any amin’ny razako; aleveno ao amin’ny razako aho, dia ao anatin’ny zohy izay any amin’ny sahan’i Efrona Hetita, '
  '3':
  - type: text
    content: 'Ry '
  - type: heading
    content: robena
  - type: text
    content: ', lahimatoako hianao,'
  - type: text
    content: Heriko sy voalohan’ny tanjako,
  - type: text
    content: Manan-tombom-pisandratana, manan-tombon-kery.
  '30':
  - type: text
    content: 'ao anatin’ny zohy izay any amin’ny saha Makpela, izay tandrifin’i Mamre, any amin’ny tany Kanana, dia ilay novidin’i Abrahama mbamin’ny saha tamin’i Efrona Hetita ho tany fandevenana. '
  '31':
  - type: text
    content: 'Tao no nandevenany an’i Abrahama sy Saraha vadiny; ary tao koa no nandevenany an’Isaka sy Rebeka vadiny; ary tao koa no nandevenako an’i Lea,– '
  '32':
  - type: text
    content: ny saha sy ny zohy ao anatiny izay novidiny tamin’ny taranak’i Heta.
  - type: heading
    content: Ny nahafatesan’i Jakoba sy ny nandevenana azy, ary ny nahafatesan’i Josefa.
  '33':
  - type: text
    content: ARY rehefa vitan’i Jakoba ny hafatra nataony tamin’ny zanani-lahy rehetra, dia navonkiny teo am-parafara ny tongony, dia niala aina izy ka voangona any amin’ny razany.
  '4':
  - type: text
    content: Mandroadroatra toy ny rano hianao ka tsy hanan-tombo,
  - type: note
    content: 'Na: aza manan-tombo.'
  - type: text
    content: Fa niakatra tamin’ny fandrian’ny rainao hianao,
  - type: text
    content: Tamin’izany no nandotoanao azy.
  - type: note
    content: xxxv.22.
  - type: text
    content: Endrey, ny farafarako lahy, ka dia niakarany!
  '5':
  - type: text
    content: ' '
  - type: heading
    content: simeona
  - type: text
    content: ' sy '
  - type: heading
    content: levy
  - type: text
    content: ' dia mpirahalahy,'
  - type: text
    content: Fiadia-mandoza ny sabany;
  - type: note
    content: 'xxxiv.25–31; na: ny tetika ataony.'
  '6':
  - type: text
    content: Aza mankeo amin’izay iokoany, ry foko,
  - type: text
    content: Ary aza miray amin’ny fiangonany, ry fanahiko;
  - type: note
    content: Heb. voninahitro.
  - type: text
    content: Fa tamin’ny fahatezerany no namonoany olona,
  - type: text
    content: Ary tamin’ny fahasahisahiany no nanatraingoany omby.
  '7':
  - type: text
    content: Ho voaozona anie ny fahatezerany, fa nasiaka izany,
  - type: text
    content: Ary ny fahavinirany, fa loza izany;
  - type: text
    content: Hampihahakahaka azy eny amin’i Jakoba aho,
  - type: text
    content: Ary hanely azy eny amin’Isiraely.
  '8':
  - type: text
    content: 'Ry '
  - type: heading
    content: joda
  - type: text
    content: ','
  - type: note
    content: xxix.35.
  - type: text
    content: ' hoderain’ny rahalahinao hianao,'
  - type: text
    content: Ny tànanao ho ao amin’ny vozon’ny fahavalonao;
  - type: text
    content: Hiankohoka eo anatrehanao ny zanaky ny rainao.
  '9':
  - type: text
    content: Zana-diona, Joda,
  - type: text
    content: Avy niremby hianao, anaka;
  - type: text
    content: Mamitsaka, mandry toy ny liona izy,
  - type: text
    content: Ary toy ny liom-bavy, ka iza no hanaitra azy!
