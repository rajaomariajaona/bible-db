document_id: GEN.49
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tso-dranon’Isiraely nanambarany izay ho toetry ny zanany mirahalahy avy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jakoba namory ny zanani-lahy ka nanao hoe: Mivoria hianareo, mba hanambarako aminareo izay ho tonga aminareo any am-parany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miangòna, ka mandrenesa, ry zanakalahin’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, mihainoa an’Isiraely rainareo:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: robena
  - type: text
    text: ', lahimatoako hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heriko sy voalohan’ny tanjako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manan-tombom-pisandratana, manan-tombon-kery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mandroadroatra toy ny rano hianao ka tsy hanan-tombo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aza manan-tombo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa niakatra tamin’ny fandrian’ny rainao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’izany no nandotoanao azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxxv.22.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endrey, ny farafarako lahy, ka dia niakarany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: simeona
  - type: text
    text: ' sy '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: levy
  - type: text
    text: ' dia mpirahalahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fiadia-mandoza ny sabany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'xxxiv.25–31; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tetika ataony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mankeo amin’izay iokoany, ry foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza miray amin’ny fiangonany, ry fanahiko;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voninahitro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tamin’ny fahatezerany no namonoany olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tamin’ny fahasahisahiany no nanatraingoany omby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho voaozona anie ny fahatezerany, fa nasiaka izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahavinirany, fa loza izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampihahakahaka azy eny amin’i Jakoba aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanely azy eny amin’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ry '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: joda
  - type: text
    text: ','
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxix.35.
    marker-yv: yv-n
  - type: text
    text: ' hoderain’ny rahalahinao hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànanao ho ao amin’ny vozon’ny fahavalonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiankohoka eo anatrehanao ny zanaky ny rainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Zana-diona, Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy niremby hianao, anaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitsaka, mandry toy ny liona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny liom-bavy, ka iza no hanaitra azy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny tehim-panjakana tsy hiala amin’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny tehina fanapahana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpanapaka.
    marker-yv: yv-n
  - type: text
    text: ' eo anelanelan’ny tongony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahatongan’i Silo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any Silo. Silo = Fiadanana (?).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanoa Azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
  - type: text
    text: ' ny firenena.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamatotra ny borikiny tanora eo amin’ny tahom-boaloboka izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanaky ny borikivaviny eo amin’ny tahom-boaloboka tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanasa ny fitafiany tamin’ny divay izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny akanjony tamin’ny ram-boaloboka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mangamanga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mivoaramena.
    marker-yv: yv-n
  - type: text
    text: ' ny masony azon’ny divay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fotsy ny nifiny azon’ny ronono.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mena mihoatra noho ny divay ny masony, ary fotsy mihoatra noho ny ronono ny nifiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: zebolona
  - type: text
    text: ', ao amoron-dranomasina no honenany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ao amoron-dranomasina fitodian-tsambo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sisin-taniny hifanolotra amin’i Sidona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: isakara
  - type: text
    text: ' dia boriky henjana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandry eo anelanelan’ny vala;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hitany fa tsara ny fialan-tsasatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mahafinaritra ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanongilana ny sorony hitondra entana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tonga mpanompo mandoa hetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: dana
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dana = Mpitsara.
    marker-yv: yv-n
  - type: text
    text: hitsara ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny anankiray amin’ny firenen’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dana ho menarana ao amoron-dàlana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho bibilava misy tandroka ao an-dàlana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manaikitra ny kitrokelin’ny soavaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka potraka miantsilany ny mpitaingina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny famonjenao no andrasako, Jehovah ô!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: gada
  - type: text
    text: ', ny manao andiany hamoritra azy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izy kosa hamely ny otrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: asera
  - type: text
    text: ' dia avy, ao aminy ny matavy fihinany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izy no ihavian’ny hanim-pin’andriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: naftaly
  - type: text
    text: ' dia dieravavy alefa; Manao teny mahafinaritra izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: josefa
  - type: text
    text: ' dia sampana mahavokatra.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, sampana mahavokatra eo anilan-doharano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny rantsany mananika mihoatra ny fefy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nampahory azy ny mpitifitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nitifitra azy sy nanenjika azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa mateza hery ny tsipìkany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mailamailaka ny sandrin-tànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy amin’ny tànan’Ilay Maherin’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia avy ao amin’ny Mpiandry, Izay Vatolampon’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avy amin’ny Andriamanitry ny rainao, ka Izy hamonjy anao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Avy amin’ny Tsitoha, ka Izy hitahy anao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fitahiana avy amin’ny lanitra any ambony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fitahiana avy amin’ny lalina, Izay mamitsaka any ambany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fitahiana avy amin’ny nono sy ny kibo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny tso-dranon’ny rainao dia mihoatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahery.
    marker-yv: yv-n
  - type: text
    text: ' noho ny havoana mandrakizay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zavatra mahafinaritra amin’ny tendrombohitra fahagola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho eo an-dohan’i Josefa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: benjamina
  - type: text
    text: ' dia amboadia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lopa.
    marker-yv: yv-n
  - type: text
    text: ' mamiravira:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nony maraina homan-dremby izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nony hariva mizara babo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ireo rehetra ireo no firenen’ny Isiraely roa ambin’ny folo; ary izany no nolazain’ny rainy taminy sy nitsofany rano azy; samy araka ny tso-drano izay tokony ho azy avy no nitsofany rano azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanafatra azy izy ka nanao taminy hoe: Izaho efa madiva hangonina ho any amin’ny razako; aleveno ao amin’ny razako aho, dia ao anatin’ny zohy izay any amin’ny sahan’i Efrona Hetita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ao anatin’ny zohy izay any amin’ny saha Makpela, izay tandrifin’i Mamre, any amin’ny tany Kanana, dia ilay novidin’i Abrahama mbamin’ny saha tamin’i Efrona Hetita ho tany fandevenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tao no nandevenany an’i Abrahama sy Saraha vadiny; ary tao koa no nandevenany an’Isaka sy Rebeka vadiny; ary tao koa no nandevenako an’i Lea,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ny saha sy ny zohy ao anatiny izay novidiny tamin’ny taranak’i Heta.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahafatesan’i Jakoba sy ny nandevenana azy, ary ny nahafatesan’i Josefa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ARY rehefa vitan’i Jakoba ny hafatra nataony tamin’ny zanani-lahy rehetra, dia navonkiny teo am-parafara ny tongony, dia niala aina izy ka voangona any amin’ny razany.
