document_id: ZEC.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'Fahitana fahafito: ny amin’ny kalesy efatra.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY natopiko indray ny masoko ka hitako fa, indreo, nisy kalesy efatra nivoaka avy teo anelanelan’ny tendrombohitra roa; ary tendrombohitra varahina ireo tendrombohitra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny kalesy voalohany dia nisy soavaly mena; tamin’ny kalesy faharoa dia soavaly mainty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: tamin’ny kalesy fahatelo dia soavaly fotsy; ary tamin’ny kalesy fahefatra dia soavaly sadamena.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sada sady matanjaka.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanontany tamin’ilay anjely niresaka tamiko aho ka nanao hoe: Inona moa ireo, tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ilay anjely namaly ka nilaza tamiko hoe: Ireo no rivotra efatry ny lanitra, izay mivoaka avy nitsangana teo anatrehan’ny Tompon’ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Io misy ny soavaly mainty dia mivoaka mankamin’ny tany avaratra; ary ny fotsy nivoaka nanaraka azy; ary ny sada nivoaka nankamin’ny tany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny mena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matanjaka.
    marker-yv: yv-n
  - type: text
    text: ' dia nivoaka ka nitady handeha hivoivoy eny amin’ny tany; dia hoy izy: Mandehana hianareo, mivoivoiza eny amin’ny tany. Ka dia nandeha nivoivoy teny amin’ny tany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nitaraina mafy tamiko izy ka niteny tamiko hoe: Indro, ireo izay mivoaka mankamin’ny tany avaratra dia nampionona ny fanahiko tany amin’ny tany avaratra.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny satroboninahitra teo an-dohan’i Josoa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mandraisa avy amin’ny babo, dia amin’i Helday sy Tobia ary Jedaia, eny, mandehana amin’izany andro izany ihany hianao, ka midira ao an-tranon’i Josia, zanak’i Zefania, izay novantaniny nony vao tonga avy tany Babylona izy,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'eny, mandraisa volafotsy sy volamena, ka ataovy satroboninahitra, dia apetraho eo an-dohan’i Josoa, zanak’i Jozadaka, mpisoronabe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia lazao aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Indro Lehilahy atao hoe Rantsana;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solofo.
    marker-yv: yv-n
  - type: text
    text: ' ary hitsimoka eo am-pitoerany ihany Izy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary hisy hitsimoka eo ambaniny.
    marker-yv: yv-n
  - type: text
    text: ' sady hanao ny tempolin’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, Izy no hanao ny tempolin’i Jehovah, ary Izy no hitondra voninahitra ka hipetraka sy hanapaka eo amin’ny seza fiandrianany; ary ho mpisorona eo amin’ny seza fiandrianany Izy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary hisy mpisorona eo amin’ny seza fiandrianana.
    marker-yv: yv-n
  - type: text
    text: ' ary hisy fisainam-pihavanana amin’izy roroa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny satroboninahitra dia ho an’i Helema sy Tobia sy Jedaia ary Hena, zanak’i Zefania, ho fampahatsiarovana ao amin’ny tempolin’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary izay lavitra dia ho avy ka hanao ao amin’ny tempolin’i Jehovah, ka dia ho fantatrareo fa Jehovah, Tompon’ny maro, no naniraka ahy ho aminareo. Dia ho tonga izany, raha hazoto hihaino ny feon’i Jehovah Andriamanitrareo hianareo.
