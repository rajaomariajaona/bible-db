document_id: PRO.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ohabolana samy hafa ny amin’ny tsi-fitovian’ny toetry ny hendry sy ny adala, mbamin’ny valin’ny ataony avy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: OHABOLAN’i Solomona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanaka hendry mahafaly ny rainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny zanaka adala mampalahelo ny reniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny harena azo amin’ny tsy marina dia tsy mahasoa na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahamarinana no mamonjy amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy avelan’i Jehovah ho mosarena ny fanahin’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa foanany ny fanirian’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho tonga malahelo ny miraviravy tànana amin’ny asany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mampanan-karena ny tànan’ny mazoto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manangona amin’ny fararano no zanaka hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay sondrian-tory amin’ny taom-pijinjana no zanaka mampahamenatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fitahiana no ho ao amin’ny lohan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa loza no mandrakotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa manaron-doza.
    marker-yv: yv-n
  - type: text
    text: ' ny vavan’ny ratsy fanahy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hankasitrahana ny fahatsiarovana ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho lo ny anaran’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay hendry am-po no handray ny didy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho lavo ny adala maro vava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mandeha tsy misy tsiny no mandeha matoky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay maniasia amin’ny alehany dia fantatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mamì-maso manome alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho lavo ny adala maro vava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Loharanon’aina ny vavan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa loza no mandrakotra ny vavan’ny ratsy fanahy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao and. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fankahalana dia manetsika ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fitiavana manarona ny ota rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’ny molotry ny manan-tsaina no ahitam-pahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsorakazo no ho amin’ny lamosin’ny tsy ampy saina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny hendry mirakitra fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’ny adala eo akaikin’ny fandringanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny haren’ny manan-karena no vohiny mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tsi-fananan’ny ory no fandringanana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ho fiainana ny asan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho ota ny fitomboan’ny haren’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mino anatra dia ho tonga eo amin’ny làlan’ny fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mivily izay mandà anatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mitahiry lolompo dia manana molotra mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mampiely endrikendrika dia adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny teny maro tsy ilaozan’izay ota;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mahatana ny molony no hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Volafotsy voafantina ny lelan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fon’ny ratsy fanahy tsy misy vidiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny molotry ny marina mamelona ny maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa maty ny adala noho ny tsi-fananany fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fitahian’i Jehovah no mampanan-karena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy azon’ny fisasarana ampiana izany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary tsy ampiany alahelo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toa laolaon’ny adala ny fanaovan-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha ny manan-tsaina, dia fahendrena kosa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toa laolaon’ny adala ny fahafetsena; Fa ny manan-tsaina no manam-pahendrena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny tahotry ny ratsy fanahy hihatra aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny irin’ny marina no homena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa mipaoka ny tafio-drivotra, dia tsy ao intsony ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny marina voaorina ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toy ny vinaingitra amin’ny nify sy ny setroka amin’ny maso.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mba toy izany koa ny malaina amin’izay maniraka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny fahatahorana an’i Jehovah no mahela velona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny taonan’ny ratsy fanahy hohafohezina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny fanantenan’ny marina dia fifaliana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fanantenan’ny ratsy fanahy ho foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny làlan’i Jehovah dia fiarovana mafy ho an’izay tsy misy tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fandringanana kosa ho an’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny marina tsy hangozohozo mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ratsy fanahy tsy honina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Eo amin’ny vavan’ny marina no itsimohan’ny fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny lela fandainga hofongorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny molotry ny marina mahalala izay ankasitrahana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’ny ratsy fanahy dia feno fitaka.
