document_id: EZK.35
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handravana an’i Edoma noho ny nandrafiany ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, manandrifia ny tendrombohitra Seïra, ka maminania ny hamelezana azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ataovy aminy hoe: Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, avy hamely anao Aho, ry tendrombohitra Seïra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahinjitro aminao ny tànako, ka hataoko foana sy lao hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tanànanao hataoko korontam-bato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianao ho lao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrao fa Izaho no Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny fandrafianao hatry ny fony ela
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nanoloranao ny Zanak’Isiraely ho fatin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho eo an-tànan’.
    marker-yv: yv-n
  - type: text
    text: ' ny sabatra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fony tamin’ny andro nahitany loza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fotoan’ny heloka mahafaty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia izao no lazain’i Jehovah: Raha velona koa Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hataoko manjary ra hianao, ary ra no hanenjika anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy nankahalainao ny ra, dia ra kosa no hanenjika anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hataoko foana sy lao ny tendrombohitra Seïra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hataoko tsy misy intsony ny mandroso sy ny miverina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hofenoiko ny olony voavono ny tendrombohiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ao amin’ny havoananao sy ny lohasahanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amoron’ny lohasahan-driakanao rehetra no hiampatramparan’izay voatrabaky ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hataoko rava mandrakizay hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy honenana intsony ny tanànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrareo fa Izaho no Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho ny nanaovanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanana azy izahay–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa teo ihany Jehovah–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia izao no lazain’i Jehovah: Raha velona koa Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanao araka ny fahatezeranao sy ny fialonanao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nataonao noho ny fandrafianao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampahafantariko ao aminy ny tenako amin’ny hitsarako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ka dia ho fantatrao fa Izaho Jehovah no efa nandre ny fanaratsiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay nolazainao ny amin’ireny tendrombohitry ny Isiraely hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana ireny ka nomena anay ho fivelomanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nanao teny miavonavona namely Ahy hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nanamaro ny teninareo namely Ahy; efa reko izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa mifaly ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hofoanako kosa hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toy ny nifalianao ny amin’ny lovan’ny taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nofoanana ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia toy izany kosa no hataoko aminao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho foana hianao, ry tendrombohitra Seïra sy Edoma rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah.
