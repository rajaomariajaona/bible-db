document_id: EZK.35,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana an’i Edoma noho ny nandrafiany ny Isiraely.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Ary noho ny nanaovanao hoe:'
  - type: text
    content: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa,
  - type: text
    content: Ka hanana azy izahay–
  - type: text
    content: Kanefa teo ihany Jehovah–
  '11':
  - type: text
    content: 'Dia izao no lazain’i Jehovah: Raha velona koa Aho,'
  - type: text
    content: Dia hanao araka ny fahatezeranao sy ny fialonanao Aho,
  - type: text
    content: Izay nataonao noho ny fandrafianao azy;
  - type: text
    content: Ary hampahafantariko ao aminy ny tenako amin’ny hitsarako anao.
  '12':
  - type: text
    content: Ka dia ho fantatrao fa Izaho Jehovah no efa nandre ny fanaratsiana,
  - type: text
    content: 'Izay nolazainao ny amin’ireny tendrombohitry ny Isiraely hoe:'
  - type: text
    content: Foana ireny ka nomena anay ho fivelomanay.
  '13':
  - type: text
    content: Ary nanao teny miavonavona namely Ahy hianareo
  - type: text
    content: Sy nanamaro ny teninareo namely Ahy; efa reko izany.
  '14':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Rehefa mifaly ny tany rehetra,
  - type: text
    content: Dia hofoanako kosa hianao,
  '15':
  - type: text
    content: Toy ny nifalianao ny amin’ny lovan’ny taranak’Isiraely,
  - type: text
    content: Satria nofoanana ireny,
  - type: text
    content: 'Dia toy izany kosa no hataoko aminao:'
  - type: text
    content: Ho foana hianao, ry tendrombohitra Seïra sy Edoma rehetra;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  '2':
  - type: text
    content: 'Ry zanak’olona, manandrifia ny tendrombohitra Seïra, ka maminania ny hamelezana azy, '
  '3':
  - type: text
    content: 'dia ataovy aminy hoe: Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, avy hamely anao Aho, ry tendrombohitra Seïra,
  - type: text
    content: Ary hahinjitro aminao ny tànako, ka hataoko foana sy lao hianao.
  '4':
  - type: text
    content: Ny tanànanao hataoko korontam-bato,
  - type: text
    content: Ary hianao ho lao;
  - type: text
    content: Ka dia ho fantatrao fa Izaho no Jehovah.
  '5':
  - type: text
    content: Noho ny fandrafianao hatry ny fony ela
  - type: text
    content: Sy ny nanoloranao ny Zanak’Isiraely ho fatin’
  - type: note
    content: Heb. ho eo an-tànan’.
  - type: text
    content: ' ny sabatra,'
  - type: text
    content: Fony tamin’ny andro nahitany loza,
  - type: text
    content: Dia ny fotoan’ny heloka mahafaty,
  '6':
  - type: text
    content: 'Dia izao no lazain’i Jehovah: Raha velona koa Aho,'
  - type: text
    content: Dia hataoko manjary ra hianao, ary ra no hanenjika anao;
  - type: text
    content: Satria tsy nankahalainao ny ra, dia ra kosa no hanenjika anao.
  '7':
  - type: text
    content: Hataoko foana sy lao ny tendrombohitra Seïra,
  - type: text
    content: Sady hataoko tsy misy intsony ny mandroso sy ny miverina,
  '8':
  - type: text
    content: Ary hofenoiko ny olony voavono ny tendrombohiny;
  - type: text
    content: Eny, ao amin’ny havoananao sy ny lohasahanao
  - type: text
    content: Ary amoron’ny lohasahan-driakanao rehetra no hiampatramparan’izay voatrabaky ny sabatra.
  '9':
  - type: text
    content: Hataoko rava mandrakizay hianao,
  - type: text
    content: Ary tsy honenana intsony ny tanànanao;
  - type: text
    content: Ka dia ho fantatrareo fa Izaho no Jehovah.
