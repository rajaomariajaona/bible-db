document_id: ECC.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsarovy ny Mpanao anao amin’ny andro fahatanoranao, dieny tsy mbola tonga ny andro mahory, ary tsy mbola mihatra ny taona izay hanaovanao hoe: Tsy sitrako izao; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mpitoriteny nitady hahita teny mahafinaritra; ary izay mahitsy no voasorany, dia tenin’ny fahamarinana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tenin’ny hendry dia toy ny fanindronan–omby sy toy ny hombo voatsatoka, ry mpanangona,–omen’ny mpiandry iray izy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary he koa, anaka! minoa anatra hianao; fa tsy misy farany ny manao boky maro, ary manasatra ny tena ny fianarana be.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa re izany rehetra izany, dia izao no faran’ny teny: Andriamanitra no atahory, ary ny didiny no tandremo, fa izany no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tokony hataon’
    - type: text
      text: ' ny olona rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny atao rehetra dia ho entin’Andriamanitra ho amin’ny fitsarana ny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mbamin’ny.'
      marker-yv: yv-n
    - type: text
      text: ' zava-miafina rehetra, na soa na ratsy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dieny tsy mbola maizina ny masoandro sy ny fahazavana sy ny volana sy ny kintana, ary tsy mbola mitambatra indray ny rahona, rehefa latsaka ny ranonorana; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin’izay dia hangovitra ny mpiandry trano, ary hanjoko ny lehilahy matanjaka, ary hitsahatra ny ankizivavy mpitoto, satria efa vitsy ireo, ary ho maizina ny vehivavy mitsirika eo am-baravarankely, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hirindrina ny varavarana kopa-droa mankeny an-dàlambe, rehefa malemy ny feon’ny fikosoham-bary; ary ho taitra ny olona, raha vao maneno ny voron-kely,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ka tsy mafy noho ny an’ny voron-kely aza ny feony.'
      marker-yv: yv-n
    - type: text
      text: ' ary halemy feo ny zazavavy mpihira rehetra; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary koa, hatahotra ny fiakarana izy, ary toa hisy zava-mahatahotra eny an-dàlana; ary hamony ny hazo amygdala, ary ny valala aza ho tonga mavesatra, ary ny voan-tsimperifery aza tsy hanan-kery intsony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' hitsaha-panirian-javatra izy.'
      marker-yv: yv-n
    - type: text
      text: ' –fa mandroso ho any amin’ny tranony mandrakizay ny olona, ary ny mpisaona mandehandeha eny an-dàlambe– '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dieny tsy mbola mivaha ny kofehy volafotsy, ary tsy mbola vaky ny vilia volamena fitoeran-diloilo, ary tsy mbola rava ny barika eo an-doharano, ary tsy mbola tapaka ny kodia eo an-davaka famorian-drano, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka ny vovoka dia hiverina amin’ny tany ho toy ny teo, fa ny fanahy kosa hiverina amin’Andriamanitra, Izay nanome iny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zava-poana dia zava-poana, hoy Mpitoriteny, eny, zava-poana ny zavatra rehetra!
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Teny farany.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY koa, satria hendry Mpitoriteny, dia nampianatra ny olona fahalalana izy; eny, nandinika sy nieritreritra ary nandahatra ohabolana maro izy. '
