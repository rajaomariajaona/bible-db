document_id: 2SA.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahatonga ny niadian’i Davida tamin’ny Amonita sy ny Syriana, ary ny nandreseny azy.
  - type: text
    content: 'ARY rehefa afaka izany, dia maty ny mpanjakan’ny taranak’i Amona, ka Hanona zanany no nanjaka nandimby azy. '
  '10':
  - type: text
    content: 'Ary ny olona sisa kosa nomeny ho entin’i Abisay rahalahiny halahany hiady amin’ny taranak’i Amona. '
  '11':
  - type: text
    content: 'Ary hoy izy: Raha tsy tohako ny Syriana, dia vonjeo aho; fa raha tsy tohanao kosa ny taranak’i Amona, dia hovonjeko hianao. '
  '12':
  - type: text
    content: Mahereza ary, ka aoka hitombandahy isika ho an’ny firenentsika sy ny tanànan’Andriamanitsika; ary aoka Jehovah hanao izay sitrapony.
  '13':
  - type: text
    content: 'Ary Joaba sy ny olona nanaraka azy nandroso hiady amin’ny Syriana; ary dia nandositra niala teo anoloany ireo. '
  '14':
  - type: text
    content: Ary nony hitan’ny taranak’i Amona fa nandositra ny Syriana, dia mba nandositra koa izy niala teo anoloan’i Abisay ka niditra tao an-tanàna. Ary Joaba niverina avy namely ny taranak’i Amona ka tonga tany Jerosalema.
  '15':
  - type: text
    content: 'Ary nony hitan’ny Syriana fa resy teo anoloan’ny Isiraely izy, dia nivory izy. '
  '16':
  - type: text
    content: Ary Hadadezera naniraka naka ny Syriana izay tany an-dafin’ny Ony;
  - type: note
    content: Eofrata.
  - type: text
    content: ' ary dia tonga tany Helama izy; ary Sobaka, komandin’ny miaramilan’i Hadadezera, no nitarika azy. '
  '17':
  - type: text
    content: 'Ary nony nambara tamin’i Davida izany, dia nampamory ny Isiraely rehetra izy ka lasa nita an’i Jordana, dia tonga tany Helama. Ary nilahatra ny Syriana hiady amin’i Davida, ka dia rafitra ny ady. '
  '18':
  - type: text
    content: Ary vaky nandositra teo anoloan’ny Isiraely ny Syriana, ka nahafaty ny tao an-kalesy fiton-jato sy ny an-tsoavaly efatra alina tamin’ny Syriana Davida sady namely an’i Sobaka koa, ilay komandin’ny miaramila, ka nahafaty azy teo.
  '19':
  - type: text
    content: Ary nony hitan’ny mpanjaka rehetra izay nanoa an’i Hadadezera fa resy teo anoloan’ny Isiraely izy, dia nanao fihavanana tamin’ny Isiraely izy ireo ka nanompo azy. Dia natahotra ny Syriana, ka tsy nety namonjy ny taranak’i Amona intsony.
  '2':
  - type: text
    content: 'Ary hoy Davida: Hanisy soa an’i Hanona, zanak’i Nahasy, aho, toy ny soa nataon-drainy tamiko. Ary Davida naniraka ny mpanompony hitsapa alahelo azy ny amin-drainy. Ary tonga tany amin’ny tanin’ny taranak’i Amona ny mpanompon’i Davida. '
  '3':
  - type: text
    content: 'Ary hoy ireo mpanapaka ny taranak’i Amona tamin’i Hanona tompony: Moa ataonao ho fanajana ny rainao no anirahan’i Davida hitsapa alahelo anao? Fa tsy hizaha ny tanàna sy hisafo azy ary handrava azy va no nanirahan’i Davida ireo mpanompony ireo hankatỳ aminao? '
  '4':
  - type: text
    content: 'Dia nosamborin’i Hanona ny mpanompon’i Davida, ka noharatany ny ila-somony, sady nofolonany hatreo amin’ny foto-peny ny akanjony, ka dia nalefany hody izy. '
  '5':
  - type: text
    content: Ary dia nisy lasa nanambara izany tamin’i Davida, ary izy naniraka hitsena azy, fa afa-baraka
  - type: note
    content: 'Na: menatra.'
  - type: text
    content: ' loatra ireo lehilahy ireo; ka dia hoy ny tenin’ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin’ny somotrareo, vao mody hianareo.'
  '6':
  - type: text
    content: 'Ary nony hitan’ny taranak’i Amona fa efa mangidy hoditra eo anatrehan’i Davida izy, dia naniraka nanakarama ny Syriana any Beti-rehoba sy ny Syriana any Zoba izy, dia miaramila an-tongotra roa alina, ary tamin’ny mpanjakan’i Maka, olona arivo lahy, ary tamin’ny olona tany Toba, roa arivo sy iray alina. '
  '7':
  - type: text
    content: 'Ary nony ren’i Davida izany, dia naniraka an’i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  '8':
  - type: text
    content: Ary ny taranak’i Amona nivoaka ka nilahatra hiady teo anoloan’ny vavahady; ary ny Syriana avy any Zoba sy Rehoba sy ny olona avy tany Toba ary Maka nitokana teny an-tsaha kosa.
  '9':
  - type: text
    content: 'Ary rehefa hitan’i Joaba fa teo anoloany sady teo ivohony ny fahavalo, dia nifidy olona tamin’ireo voafantina tamin’ny Isiraely rehetra izy, ka nalahany hiady tamin’ny Syriana. '
