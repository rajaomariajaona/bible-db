document_id: PSA.29,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny heriny sy ny fiandrianany izay miseho amin’ny kotrokorana.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: MANOMEZA an’i Jehovah, ry zanak’Andriamanitra,
  - type: text
    content: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
  '10':
  - type: text
    content: Jehovah nipetraka teo ambonin’ny Safo-drano;
  - type: text
    content: Eny, Jehovah mipetraka ho Mpanjaka mandrakizay.
  '11':
  - type: text
    content: Jehovah hanome hery ny olony;
  - type: text
    content: Jehovah hitahy ny olony amin’ny fiadanana.
  '2':
  - type: text
    content: Omeo an’i Jehovah ny voninahitry ny anarany;
  - type: text
    content: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina.
  '3':
  - type: text
    content: Ny feon’i Jehovah no eny ambonin’ny rano be;
  - type: text
    content: Andriamanitry ny voninahitra no mampikotrokorana;
  - type: text
    content: Jehovah no eny ambonin’ny rano be.
  '4':
  - type: text
    content: Ny feon’i Jehovah be hery;
  - type: text
    content: Ny feon’i Jehovah be voninahitra.
  '5':
  - type: text
    content: Ny feon’i Jehovah manorotoro ny hazo sedera;
  - type: text
    content: Eny, Jehovah manorotoro ny hazo sedera any Libanona.
  '6':
  - type: text
    content: Dia mampitsambikina azy tahaka ny zanak’omby Izy,
  - type: text
    content: Libanona sy Siriona dia tahaka ny zanaky ny ombimanga.
  '7':
  - type: text
    content: Ny feon’i Jehovah mampisaraka ny lelafo;
  '8':
  - type: text
    content: Ny feon’i Jehovah mampihorohoro ny efitra;
  - type: text
    content: Jehovah mampihorohoro ny efitr’i Kadesy.
  '9':
  - type: text
    content: Ny feon’i Jehovah mampiteraka ny dieravavy
  - type: text
    content: Ary mivaofy ny ala be.
  - type: text
    content: 'Ary ny ao an-tempoliny samy manao hoe: Voninahitra e!'
