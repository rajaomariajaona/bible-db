document_id: PSA.29
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny heriny sy ny fiandrianany izay miseho amin’ny kotrokorana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MANOMEZA an’i Jehovah, ry zanak’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Omeo an’i Jehovah ny voninahitry ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny feon’i Jehovah no eny ambonin’ny rano be;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitry ny voninahitra no mampikotrokorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no eny ambonin’ny rano be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny feon’i Jehovah be hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feon’i Jehovah be voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny feon’i Jehovah manorotoro ny hazo sedera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Jehovah manorotoro ny hazo sedera any Libanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia mampitsambikina azy tahaka ny zanak’omby Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Libanona sy Siriona dia tahaka ny zanaky ny ombimanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny feon’i Jehovah mampisaraka ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny feon’i Jehovah mampihorohoro ny efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah mampihorohoro ny efitr’i Kadesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny feon’i Jehovah mampiteraka ny dieravavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mivaofy ny ala be.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny ao an-tempoliny samy manao hoe: Voninahitra e!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jehovah nipetraka teo ambonin’ny Safo-drano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Jehovah mipetraka ho Mpanjaka mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah hanome hery ny olony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah hitahy ny olony amin’ny fiadanana.
