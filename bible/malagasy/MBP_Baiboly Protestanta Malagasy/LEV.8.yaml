document_id: LEV.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanokanana an’i Arona sy ny zanany ho mpisorona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao Arona sy ny zanany ary ny fitafiana sy ny diloilo fanosorana sy ny vantotr’ombilahy iray hatao fanatitra noho ny ota sy ny ondrilahy roa ary ny harona misy mofo tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary vorio ny fiangonana rehetra ho eo anoloan’ny varavaran’ny trano-lay fihaonana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Mosesy nanao araka izay nandidian’i Jehovah azy; dia vory teo anoloan’ny varavaran’ny trano-lay fihaonana ny fiangonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Mosesy tamin’ny fiangonana: Izao atao izao no raharaha izay nandidian’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Arona sy ny zanany dia nentin’i Mosesy nanatona ka nampandroiny tamin’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nampiakanjoiny ny akanjo lava izy ary nasiany ny fehin-kibo, dia nampiakanjoiny ny akanjo ivelany izy, ary ny efoda dia nataony taminy, dia nasiany ny fehin-kibo momba ny efoda izy, ka nataony fehin’ny efoda taminy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny saron-tratra dia nataony taminy, ka nataony tao ny Orima sy ny Tomima.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Orima sy Tomima = Fahazavana sy Fahatanterahana.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny hamama dia nataony teo an-dohany; ary ny takela-bolamena, ilay diadema masina, dia nataony teo anoloana amin’ny hamama, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nalain’i Mosesy ny diloilo fanosorana, dia nohosorany ny tabernakely sy izay rehetra tao ka nohamasininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia namafazany impito teo ambonin’ny alitara ny diloilo; ary nohosorany avokoa ny alitara mbamin’ny fanaka rehetra momba azy ary ny tavy sy ny faladiany hahamasina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nanidinany teo amin’ny lohan’i Arona ny diloilo fanosorana, ka nanosotra azy izy hahamasina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary dia nentin’i Mosesy nanatona koa ny zanak’i Arona ka nampiakanjoiny akanjo lava, ary nasiany fehin-kibo, dia nampisatrohiny, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nentiny nanatona koa ny vantotr’ombilahy izay hatao fanatitra noho ny ota; ary Arona sy ny zanany nametraka ny tànany tamin’ny lohan’ny vantotr’ombilahy izay hatao fanatitra noho ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia novonoiny iny, ary nalain’i Mosesy ny ra, ka notentenany tamin’ny fanondrony ny tandroky ny alitara teo amin’ny zorony efatra nanadiovany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanafahany ota azy.
    marker-yv: yv-n
  - type: text
    text: ' azy; ary ny ra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sisa
  - type: text
    text: ' dia naidiny teo am-bodin’ny alitara, ka nahamasina azy, mba hanao fanavotana ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nalainy ny saboran-tsinainy rehetra sy ny ila-atiny lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' sy ny voany mbamin’ny fonom-boany, ka nodoran’i Mosesy ho fofona teo ambonin’ny alitara ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny hoditry ny vantotr’ombilahy sy ny henany ary ny tain-drorohany kosa dia nodorany tamin’ny afo teny ivelan’ny toby, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nentiny nanatona ny ondrilahy izay hatao fanatitra dorana; ary Arona sy ny zanany nametraka ny tànany tamin’ny lohan’ny ondrilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia novonoina iny; ary Mosesy nanipy ny ra manododina tamin’ny lafin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary norasainy tsara ny ondrilahy; dia nodoran’i Mosesy ho fofona ny lohany sy ireo voarasa ireo ary ny saborany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny taovany sy ny tongony nosasany tamin’ny rano; dia nodoran’i Mosesy ho fofona teo ambonin’ny alitara ny tenan’ny ondrilahy; fanatitra dorana izany ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nentiny nanatona koa ny ondrilahy anankiray, dia ny ondrilahy fanokanana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: famenoana.
    marker-yv: yv-n
  - type: text
    text: ' ary Arona sy ny zanany dia nametraka ny tànany tamin’ny lohan’ny ondrilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia novonoiny iny; ary nangalan’i Mosesy ny ra ka, natentiny teo amin’ny tendron’ny ravin-tsofin’i Arona ankavanana sy tamin’ny ankihiben-tànany ankavanana ary tamin’ny ankihiben-tongony ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nentiny nanatona koa ny zanak’i Arona, ka notentenan’i Mosesy ny ra ny tendron’ny ravin-tsofiny ankavanana sy ny ankihiben-tànany ankavanana ary ny ankihiben-tongony ankavanana; ary ny ra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sisa
  - type: text
    text: ' dia natopin’i Mosesy manodidina tamin’ny lafin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nalainy ny hofany sy ny saborany, dia ny safodrorohany sy ny ila-atiny lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' sy ny voany roa mbamin’ny fonom-boany ary ny sorony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feny.
    marker-yv: yv-n
  - type: text
    text: ' ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ilay harona nisy ny mofo tsy misy masirasira, izay teo anatrehan’i Jehovah, dia nangalany iray tamin’ny mofo tsy misy masirasira sy iray tamin’ny mofo voaisy diloilo ary iray tamin’ny mofo manify ka napetrany teo ambonin’ny saborany sy ny sorok’ondry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feny.
    marker-yv: yv-n
  - type: text
    text: ' ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia napetrany teo amin’ny tànan’i Arona sy ny zanany ireo rehetra ireo ka nahevahevany ho fanatitra ahevaheva eo anatrehan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nalain’i Mosesy tamin’ny tànany indray ireo ka nodorany ho fofona teo ambonin’ny alitara niaraka tamin’ny fanatitra dorana; fanati-panokanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: famenoana.
    marker-yv: yv-n
  - type: text
    text: ' ireo ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia nalain’i Mosesy koa ny tratran’ondry ka nahevahevany ho fanatitra ahevaheva eo anatrehan’i Jehovah; anjaran’i Mosesy avy amin’ny ondrilahy fanokanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: famenoana.
    marker-yv: yv-n
  - type: text
    text: ' izany, araka izay efa nandidian’i Jehovah azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary nangalan’i Mosesy ny diloilo fanosorana sy ny ra izay teo ambonin’ny alitara ka nafafiny tamin’i Arona sy tamin’ny fitafiany ary tamin’ny zanany sy tamin’ny fitafian’ny zanany koa; dia nanamasina an’i Arona sy ny fitafiany ary ny zanany sy ny fitafian’ny zanany koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Mosesy tamin’i Arona sy ny zanany: Andrahoy eo anoloan’ny varavaran’ny trano-lay fihaonana ny hena; ary eo no hihinananareo azy mbamin’ny mofo izay eo amin’ny haron’ny fanati-panokanana, araka izay nandidiako hoe: Arona sy ny zanany no hihinana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izay sisa amin’ny hena sy ny mofo dia hodoranareo amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary tsy hiala eo anoloan’ny varavaran’ny trano-lay fihaonana hafitoana hianareo, dia mandra-pahatapitry ny andro fanokanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: famenoana.
    marker-yv: yv-n
  - type: text
    text: ' anareo; fa hafitoana no hanokanany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamenoany ny tànanareo.
    marker-yv: yv-n
  - type: text
    text: ' anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tahaka ny efa natao androany no nandidian’i Jehovah hatao, hanaovana fanavotana ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hitoetra eo anoloan’ny varavaran’ny trano-lay fihaonana hafitoana andro aman-alina hianareo ka hitandrina izay asain’i Jehovah hotandremana, dia tsy ho faty hianareo: fa izany no nandidiana ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia nataon’i Arona sy ny zanany izay rehetra efa nandidian’i Jehovah ka nampilazainy an’i Mosesy.
