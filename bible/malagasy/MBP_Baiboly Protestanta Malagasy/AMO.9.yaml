document_id: AMO.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana ny amin’ny handravana ny fanjakana be ota, sy ny hananganana indray ny tabernakelin’i Davida.
  - type: text
    content: NAHITA ny Tompo nitsangana teo anilan’
  - type: note
    content: 'Na: ambonin’.'
  - type: text
    content: ' ny alitara aho,'
  - type: text
    content: 'Ka hoy Izy: Asio ny kapitaly hihetsiketsehan’ny tokonana,'
  - type: text
    content: Ary torotoroy hianjera amin’ny lohan’izy rehetra,
  - type: text
    content: Ka izay sisa aminy dia hovonoiko amin’ny sabatra;
  - type: text
    content: Ary tsy hisy afa-mandositra izy,
  - type: text
    content: Sady tsy hisy izay sisa ho afaka akory.
  '10':
  - type: text
    content: Sabatra no hamonoana ny mpanota rehetra amin’ny oloko,–
  - type: text
    content: 'Dia ireo izay manao hoe: Ny loza tsy hanakaiky na hahatratra anay.'
  '11':
  - type: text
    content: Amin’izany andro izany dia hatsangako indray ny trano-bongon’i Davida izay efa nianjera,
  - type: text
    content: Ary hotampenako ny efa banga ao;
  - type: text
    content: Ary hamboariko izay efa rava aminy,
  - type: text
    content: Ka hataoko tahaka ny taloha izy,
  '12':
  - type: text
    content: Mba hananany izay sisa amin’i Edoma
  - type: text
    content: Sy amin’ny jentilisa rehetra,
  - type: text
    content: Izay hantsoina amin’ny anarako,
  - type: text
    content: Hoy Jehovah, Izay manao izany.
  '13':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hahatraran’ny mpiasa tany ny mpijinja,
  - type: text
    content: Ary ny mpanosihosy voaloboka hahatratra ny mpamafy;
  - type: text
    content: Ny tendrombohitra hipoipoitra ranom-boaloboka,
  - type: text
    content: Ary ny havoana rehetra hiempo.
  '14':
  - type: text
    content: Ary hampodiko ny Isiraely avy amin’ny fahababoana,
  - type: text
    content: Dia hanangana ny tanàna efa rava izy ka honina ao,
  - type: text
    content: Ary hanao tanimboaloboka izy ka hisotro ny divay avy aminy;
  - type: text
    content: Hanao saha koa izy ka hihinana ny vokatra.
  '15':
  - type: text
    content: Eny, hamboleko ao amin’ny taniny izy,
  - type: text
    content: Ka tsy hongotana amin’ny taniny izay nomeko azy intsony izy,
  - type: text
    content: Hoy Jehovah Andriamanitrao.
  '2':
  - type: text
    content: Na dia mibosesika ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' aza izy,'
  - type: text
    content: Dia any no hanalan’ny tànako azy;
  - type: text
    content: Ary na dia miakatra ho any an-danitra aza izy,
  - type: text
    content: Dia avy any no hampidinako azy.
  '3':
  - type: text
    content: Ary na dia miery any an-tampon’i Karmela aza izy,
  - type: text
    content: Dia any no hitadiavako sy hangalako azy;
  - type: text
    content: Ary na dia manafin-tena any ambanin’ny ranomasina aza izy, mba tsy ho hitan’ny masoko,
  - type: text
    content: Dia any no handidiako ny menarana, ka hanaikitra azy.
  '4':
  - type: text
    content: Ary na dia lasan-ko babo eo anoloan’ny fahavalony aza izy,
  - type: text
    content: Dia any no handidiako ny sabatra, ka hamono azy;
  - type: text
    content: Ary hampanandriniko azy ny masoko hahatonga ny loza aminy, fa tsy ny soa.
  '5':
  - type: text
    content: Ary Jehovah, Tompon’ny maro,
  - type: text
    content: No manendry ny tany, ka dia miempo izany,
  - type: text
    content: Ka misaona ny mponina rehetra ao aminy;
  - type: text
    content: Ary dia hihatondraka tahaka an’i Neily avokoa izany,
  - type: text
    content: Ary hihena indray izy toy ny Neilin’i Egypta,
  '6':
  - type: text
    content: Ary manao ny tranony ambony any an-danitra Izy,
  - type: text
    content: Sady manorina ny andohalambony eny ambonin’ny tany;
  - type: text
    content: Ary miantso ny rano eny an-dranomasina
  - type: text
    content: Ka mampilatsaka azy eny amin’ny tany,–
  - type: text
    content: Jehovah no anarany.
  '7':
  - type: text
    content: Moa tsy toy ny taranaky ny Etiopiana va hianareo raha amiko,
  - type: text
    content: Ry Zanak’Isiraely? hoy Jehovah.
  - type: text
    content: Tsy ny Isiraely va no nentiko nivoaka avy tany amin’ny tany Egypta.
  - type: text
    content: Ary ny Filistina avy tany Kaftora,
  - type: text
    content: Ary ny Syriana avy tany Kira?
  '8':
  - type: text
    content: Indro, ny mason’i Jehovah Tompo no manandrina ity fanjakana feno ota ity,
  - type: text
    content: Ka dia hofongorako tsy ho eo ambonin’ny tany izy;
  - type: text
    content: Kanefa tsy dia hofongorako avokoa ny taranak’i Jakoba, hoy Jehovah.
  '9':
  - type: text
    content: Fa, indro, Izaho no handidy,
  - type: text
    content: Ka hosivaniko any amin’ny firenena rehetra ny taranak’Isiraely,
  - type: text
    content: Tahaka ny fanasivana vary amin’ny sivana;
  - type: text
    content: Nefa tsy hisy voam-bary ho latsaka amin’ny tany na dia iray akory aza.
