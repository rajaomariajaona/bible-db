document_id: AMO.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahitana ny amin’ny handravana ny fanjakana be ota, sy ny hananganana indray ny tabernakelin’i Davida.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NAHITA ny Tompo nitsangana teo anilan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambonin’.
      marker-yv: yv-n
    - type: text
      text: ' ny alitara aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy Izy: Asio ny kapitaly hihetsiketsehan’ny tokonana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary torotoroy hianjera amin’ny lohan’izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay sisa aminy dia hovonoiko amin’ny sabatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy afa-mandositra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hisy izay sisa ho afaka akory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sabatra no hamonoana ny mpanota rehetra amin’ny oloko,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ireo izay manao hoe: Ny loza tsy hanakaiky na hahatratra anay.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hatsangako indray ny trano-bongon’i Davida izay efa nianjera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hotampenako ny efa banga ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamboariko izay efa rava aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hataoko tahaka ny taloha izy,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hananany izay sisa amin’i Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny jentilisa rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hantsoina amin’ny anarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Izay manao izany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, avy ny andro, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hahatraran’ny mpiasa tany ny mpijinja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanosihosy voaloboka hahatratra ny mpamafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra hipoipoitra ranom-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny havoana rehetra hiempo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampodiko ny Isiraely avy amin’ny fahababoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanangana ny tanàna efa rava izy ka honina ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao tanimboaloboka izy ka hisotro ny divay avy aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao saha koa izy ka hihinana ny vokatra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hamboleko ao amin’ny taniny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hongotana amin’ny taniny izay nomeko azy intsony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah Andriamanitrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mibosesika ho any amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' aza izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no hanalan’ny tànako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia miakatra ho any an-danitra aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia avy any no hampidinako azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia miery any an-tampon’i Karmela aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no hitadiavako sy hangalako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia manafin-tena any ambanin’ny ranomasina aza izy, mba tsy ho hitan’ny masoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no handidiako ny menarana, ka hanaikitra azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia lasan-ko babo eo anoloan’ny fahavalony aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no handidiako ny sabatra, ka hamono azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampanandriniko azy ny masoko hahatonga ny loza aminy, fa tsy ny soa.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No manendry ny tany, ka dia miempo izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka misaona ny mponina rehetra ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia hihatondraka tahaka an’i Neily avokoa izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihena indray izy toy ny Neilin’i Egypta,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ny tranony ambony any an-danitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manorina ny andohalambony eny ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miantso ny rano eny an-dranomasina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampilatsaka azy eny amin’ny tany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no anarany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy toy ny taranaky ny Etiopiana va hianareo raha amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Zanak’Isiraely? hoy Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny Isiraely va no nentiko nivoaka avy tany amin’ny tany Egypta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Filistina avy tany Kaftora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Syriana avy tany Kira?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny mason’i Jehovah Tompo no manandrina ity fanjakana feno ota ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hofongorako tsy ho eo ambonin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy dia hofongorako avokoa ny taranak’i Jakoba, hoy Jehovah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, Izaho no handidy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hosivaniko any amin’ny firenena rehetra ny taranak’Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fanasivana vary amin’ny sivana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy hisy voam-bary ho latsaka amin’ny tany na dia iray akory aza.
