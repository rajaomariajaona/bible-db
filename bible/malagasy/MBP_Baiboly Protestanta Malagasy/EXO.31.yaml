document_id: EXO.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanendrena an’i Bezalila sy Oholiaba ho lohan’ny mpiasa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indro, efa notononiko anarana Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny firenen’i Joda; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary efa nofenoiko fanahin’Andriamanitra izy, dia fahendrena sy fahiratan-tsaina sy fahalalana ny amin’ny tao-zavatra samy hafa: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia ny hihevitra hanao asa kanto, ny hiasa volamena sy volafotsy ary varahina '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: sy ny hamboatra vato halatsaka an-tranontranony ary ny handrafitra hazo, mba hanaovany ny tao-zavatra samy hafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary, indro, Izaho efa nanome an’i Oholiaba, zanak’i Ahisamaka, avy amin’ny firenen’i Dana, ho namany; ary ny fon’izay hendry rehetra dia efa nasiako fahendrena, mba hanaovany izay rehetra efa nandidiako anao: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia ny trano-lay fihaonana sy ny fiara hasiana ny Vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' sy ny rakotra fanaovam-panavotana, izay eo amboniny, sy ny fanaka rehetra momba ny trano-lay, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sy ny latabatra mbamin’ny fanaka momba azy, sy ny fanaovan-jiro tsara mbamin’ny fanaka rehetra momba azy, sy ny alitara fandoroana ditin-kazo manitra '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sy ny alitara fandoroana ny fanatitra odorana mbamin’ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary ny fitafiana makarakara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitondra manompo.
    marker-yv: yv-n
  - type: text
    text: ' sy ny fitafiana masina ho an’i Arona mpisorona sy ny fitafian’ny zanany ho entiny misorona, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary ny diloilo fanosorana sy ny ditin-kazo manitra ho ao amin’ny fitoerana masina: araka izay rehetra nandidiako anao no aoka hataon’ireo.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fitandremana ny Sabata.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary dia milazà amin’ny Zanak’Isiraely hianao hoe: Ny Sabatako no tandremo; fa famantarana ho amiko, sy ho aminareo hatramin’ny taranakareo fara mandimby izany, mba ho fantatrareo fa Izaho no Jehovah Izay manamasina anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa tandremo ny Sabata, fa masina aminareo izany; izay tsy manamasina azy dia hatao maty tokoa, fa izay rehetra manao raharaha amin’izany dia hofongorana tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena fitsaharana ka masina ho an’i Jehovah: izay rehetra manao raharaha amin’ny andro Sabata dia hatao maty tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hotandreman’ny Zanak’Isiraely ny Sabata hankatoavany azy hatramin’ny taranany fara mandimby, dia fanekena mandrakizay izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho famantarana amiko sy amin’ny Zanak’Isiraely mandrakizay izany; fa tamin’ny henemana no nanaovan’i Jehovah ny lanitra sy ny tany, ary tamin’ny andro fahafito dia nitsahatra Izy ka niala sasatra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanomezan’Andriamanitra ny vato fisaka izay nisy ny Lalàna.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ARY rehefa vita ny teny nataony tamin’i Mosesy tao an-tendrombohitra Sinay, dia nomeny azy ny vato fisaka roa, izay nisy ny Vavolombelona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' dia vato fisaka voasoratry ny rantsan-tànan’Andriamanitra.'
