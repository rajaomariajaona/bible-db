document_id: EXO.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanendrena an’i Bezalila sy Oholiaba ho lohan’ny mpiasa.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: ary ny fitafiana makarakara
  - type: note
    content: 'Na: fitondra manompo.'
  - type: text
    content: ' sy ny fitafiana masina ho an’i Arona mpisorona sy ny fitafian’ny zanany ho entiny misorona, '
  '11':
  - type: text
    content: 'ary ny diloilo fanosorana sy ny ditin-kazo manitra ho ao amin’ny fitoerana masina: araka izay rehetra nandidiako anao no aoka hataon’ireo.'
  - type: heading
    content: Ny amin’ny fitandremana ny Sabata.
  '12':
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '13':
  - type: text
    content: 'Ary dia milazà amin’ny Zanak’Isiraely hianao hoe: Ny Sabatako no tandremo; fa famantarana ho amiko, sy ho aminareo hatramin’ny taranakareo fara mandimby izany, mba ho fantatrareo fa Izaho no Jehovah Izay manamasina anareo. '
  '14':
  - type: text
    content: 'Koa tandremo ny Sabata, fa masina aminareo izany; izay tsy manamasina azy dia hatao maty tokoa, fa izay rehetra manao raharaha amin’izany dia hofongorana tsy ho amin’ny fireneny. '
  '15':
  - type: text
    content: 'Henemana no hanaovana raharaha; fa ny andro fahafito dia tena fitsaharana ka masina ho an’i Jehovah: izay rehetra manao raharaha amin’ny andro Sabata dia hatao maty tokoa. '
  '16':
  - type: text
    content: 'Dia hotandreman’ny Zanak’Isiraely ny Sabata hankatoavany azy hatramin’ny taranany fara mandimby, dia fanekena mandrakizay izany. '
  '17':
  - type: text
    content: Ho famantarana amiko sy amin’ny Zanak’Isiraely mandrakizay izany; fa tamin’ny henemana no nanaovan’i Jehovah ny lanitra sy ny tany, ary tamin’ny andro fahafito dia nitsahatra Izy ka niala sasatra.
  - type: heading
    content: Ny nanomezan’Andriamanitra ny vato fisaka izay nisy ny Lalàna.
  '18':
  - type: text
    content: ARY rehefa vita ny teny nataony tamin’i Mosesy tao an-tendrombohitra Sinay, dia nomeny azy ny vato fisaka roa, izay nisy ny Vavolombelona,
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' dia vato fisaka voasoratry ny rantsan-tànan’Andriamanitra.'
  '2':
  - type: text
    content: 'Indro, efa notononiko anarana Bezalila, zanak’i Ory, zanak’i Hora, avy amin’ny firenen’i Joda; '
  '3':
  - type: text
    content: 'ary efa nofenoiko fanahin’Andriamanitra izy, dia fahendrena sy fahiratan-tsaina sy fahalalana ny amin’ny tao-zavatra samy hafa: '
  '4':
  - type: text
    content: 'dia ny hihevitra hanao asa kanto, ny hiasa volamena sy volafotsy ary varahina '
  '5':
  - type: text
    content: sy ny hamboatra vato halatsaka an-tranontranony ary ny handrafitra hazo, mba hanaovany ny tao-zavatra samy hafa.
  '6':
  - type: text
    content: 'Ary, indro, Izaho efa nanome an’i Oholiaba, zanak’i Ahisamaka, avy amin’ny firenen’i Dana, ho namany; ary ny fon’izay hendry rehetra dia efa nasiako fahendrena, mba hanaovany izay rehetra efa nandidiako anao: '
  '7':
  - type: text
    content: dia ny trano-lay fihaonana sy ny fiara hasiana ny Vavolombelona
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' sy ny rakotra fanaovam-panavotana, izay eo amboniny, sy ny fanaka rehetra momba ny trano-lay, '
  '8':
  - type: text
    content: 'sy ny latabatra mbamin’ny fanaka momba azy, sy ny fanaovan-jiro tsara mbamin’ny fanaka rehetra momba azy, sy ny alitara fandoroana ditin-kazo manitra '
  '9':
  - type: text
    content: 'sy ny alitara fandoroana ny fanatitra odorana mbamin’ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany, '
