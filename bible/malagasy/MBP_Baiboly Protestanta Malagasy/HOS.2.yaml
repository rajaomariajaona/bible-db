document_id: HOS.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Kanefa, na dia izany aza, ny isan’ny Zanak’Isiraely dia ho betsaka toy ny fasika amin’ny ranomasina, izay tsy azo afatra sady tsy tambo isaina; ary any amin’ny tany izay nilazana taminy hoe: Tsy oloko hianareo, dia any no hanaovana aminy hoe: Zanak’Andriamanitra velona hianareo. '
  '10':
  - type: text
    content: Ary tsy fantany fa Izaho no nanome azy ny vary sy ny ranom-boaloboka sy ny diloilo,
  - type: text
    content: Sady nataoko be ny volafotsiny sy ny volamenany,
  - type: text
    content: Izay nolaniny ho an’
  - type: note
    content: 'Na: nataony ho.'
  - type: text
    content: ' i Bala,'
  '11':
  - type: text
    content: Koa dia halaiko indray ny variko amin’ny androny
  - type: text
    content: Sy ny ranom-boaloboko amin’ny taonany,
  - type: text
    content: Ary hesoriko ny volon’ondriko sy ny rongoniko,
  - type: text
    content: Izay nomena hasarony ny fitanjahany.
  '12':
  - type: text
    content: Ary ankehitriny hasehoko eo imason’ireo lehilahiny ny fahamenarany,
  - type: text
    content: Ka tsy hisy hahafaka azy amin’ny tànako.
  '13':
  - type: text
    content: Ary hatsahatro ny fifaliany rehetra,
  - type: text
    content: Dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany,
  - type: text
    content: Eny, ny fotoam-pivavahany rehetra.
  '14':
  - type: text
    content: Ary hofongorako ny voalobony sy ny aviaviny,
  - type: text
    content: 'Izay nataony hoe: Tangiko avy tamin’ireo lehilahiko ireto;'
  - type: text
    content: Ary hataoko ho tonga ala ireny
  - type: text
    content: Ka hohanin’ny bibi-dia.
  '15':
  - type: text
    content: Ary hovaliako izy noho ny andron’ireo Bala,
  - type: text
    content: Izay efa nandoroany ditin-kazo manitra
  - type: text
    content: Sady niravahany ny kaviny sy ny firavany,
  - type: text
    content: Ka nanaraka ireo lehilahiny izy;
  - type: text
    content: Fa Izaho kosa nohadinoiny, hoy Jehovah.
  '16':
  - type: text
    content: Koa, indro, Izaho dia hitaona azy
  - type: text
    content: Ka hitondra azy ho any an-efitra
  - type: text
    content: Ary hanao teny malefaka hahafinaritra azy.
  '17':
  - type: text
    content: Ary hatrany dia homeko azy ny tanimboalobony
  - type: text
    content: Sy ny lohasaha Akora ho varavaram-panantenana;
  - type: text
    content: Ary any no hamaliany
  - type: note
    content: 'Na: hihirany.'
  - type: text
    content: ' toy ny tamin’ny andro fahatanorany,'
  - type: text
    content: Dia toy ny tamin’ny andro niakarany avy tany amin’ny tany Egypta.
  '18':
  - type: text
    content: Ary raha mby amin’izany andro izany, hoy Jehovah,
  - type: text
    content: Dia hataonao hoe Aho Vadiko,
  - type: text
    content: Fa tsy hataonao intsony hoe Balako.
  - type: note
    content: Balako = Tompoko.
  '19':
  - type: text
    content: Fa hesoriko amin’ny vavany ny anaran’ireo Bala,
  - type: text
    content: Ka tsy hotsarovana amin’ny anarany intsony ireo.
  '2':
  - type: text
    content: 'Dia hiara-mivory ny taranak’i Joda sy ny taranak’Isiraely ka hifidy anankiray ho lohany izy, dia hiakatra hiala amin’ny tany; fa ho lehibe ny andron’i Jezirela. '
  '20':
  - type: text
    content: Ary raha mby amin’izany andro izany,
  - type: text
    content: Izaho dia hanao fanekena ho azy amin’ny bibi-dia
  - type: text
    content: Sy amin’ny voro-manidina
  - type: text
    content: Ary amin’ny biby mandady sy mikisaka amin’ny tany;
  - type: text
    content: Ary hotapatapahiko tsy hisy amin’ny tany intsony ny tsipìka sy ny sabatra ary ny fiadiana,
  - type: text
    content: Dia hataoko mandry fahizay izy;
  '21':
  - type: text
    content: Ary hofofoiko ho vadiko mandrakizay hianao,
  - type: text
    content: Eny, hofofoiko ho vadiko amin’ny rariny sy ny hitsiny
  - type: text
    content: Ary amin’ny fitiavana sy ny indrafo hianao;
  '22':
  - type: text
    content: Eny, hofofoiko ho vadiko amin’ny fahamarinana hianao,
  - type: text
    content: Ka dia hahalala an’i Jehovah.
  '23':
  - type: text
    content: Ary amin’izany andro izany dia hihaino
  - type: note
    content: 'Na: hamaly.'
  - type: text
    content: ' Aho, hoy Jehovah,'
  - type: text
    content: Eny, hihaino
  - type: note
    content: 'Na: hamaly.'
  - type: text
    content: ' ny lanitra Aho,'
  - type: text
    content: Ary izy kosa hihaino
  - type: note
    content: 'Na: hamaly.'
  - type: text
    content: ' ny tany;'
  '24':
  - type: text
    content: Ary ny tany kosa hihaino
  - type: note
    content: 'Na: hamaly.'
  - type: text
    content: ' ny vary sy ny ranom-boaloboka ary ny diloilo;'
  - type: text
    content: Ary ireo kosa dia hihaino
  - type: note
    content: 'Na: hamaly.'
  - type: text
    content: ' an’i Jezirela,'
  '25':
  - type: text
    content: Dia hafafiko ho Ahy amin’ny tany izy;
  - type: text
    content: Ary hamindra fo amin’i Lô-rohama
  - type: note
    content: Izahao i.6.
  - type: text
    content: ' Aho'
  - type: text
    content: Sady hanao amin’i Lô-amỳ
  - type: note
    content: Izahao i.9.
  - type: text
    content: ' hoe: Oloko hianao;'
  - type: text
    content: 'Ary izy kosa hanao hoe: Andriamanitro Hianao.'
  '3':
  - type: text
    content: 'Manaova amin’ny rahalahinareo hoe: Amỳ,'
  - type: note
    content: Amỳ = Oloko.
  - type: text
    content: ' ary amin’ny anabavinareo hoe: Rohama.'
  - type: note
    content: Rohama = Namindrana fo.
  - type: heading
    content: Ny hamaizana ny Isiraely, sy ny mbola hampodian’i Jehovah azy.
  '4':
  - type: text
    content: MIFANDAHARA amin-dreninareo, eny, mifandahara–
  - type: text
    content: Fa izy tsy vadiko, ary Izaho tsy vadiny–
  - type: text
    content: Ary aoka hesoriny ny fijejojejoany hiala eo amin’ny tavany
  - type: text
    content: Sy ny fijangajangany tsy ho eo an-tratrany;
  '5':
  - type: text
    content: Fandrao hampihanjahanjaiko izy
  - type: text
    content: Ka hataoko toy ny tamin’ny andro nahaterahany,
  - type: text
    content: Ary hataoko toy ny efitra sy ny tany karankaina izy,
  - type: text
    content: Eny, hataoko matin-ketaheta izy.
  '6':
  - type: text
    content: Ary tsy hamindrako fo ny zanany,
  - type: text
    content: Satria zanaky ny fijangajangana ireny.
  '7':
  - type: text
    content: Fa efa nijangajanga ny reniny, eny, ilay torontoronina azy efa nanao izay mahamenatra;
  - type: text
    content: 'Fa hoy izy: Hanaraka ireo lehilahiko ihany aho,'
  - type: text
    content: Izay manome ahy ny haninkohaniko sy ny rano hosotroiko,
  - type: text
    content: Sy ny volon’ondriko sy ny rongoniko
  - type: text
    content: Sy ny diloiloko ary ny fisotroko.
  '8':
  - type: text
    content: Koa, indro, hotampenako tsilo ny làlanao
  - type: text
    content: Sady hasiako fefy,
  - type: text
    content: Ary tsy hahita izay làlan-kalehany izy.
  '9':
  - type: text
    content: Ary hiezaka hanenjika ireo lehilahiny izy, nefa tsy hahatratra azy;
  - type: text
    content: Eny, hitady ireo izy, nefa tsy hahita;
  - type: text
    content: 'Dia hanao hoe izy: Handeha hody amin’ny vadiko taloha aho;'
  - type: text
    content: Fa niadana aho tamin’izay noho ny ankehitriny.
