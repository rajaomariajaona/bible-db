document_id: HOS.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Kanefa, na dia izany aza, ny isan’ny Zanak’Isiraely dia ho betsaka toy ny fasika amin’ny ranomasina, izay tsy azo afatra sady tsy tambo isaina; ary any amin’ny tany izay nilazana taminy hoe: Tsy oloko hianareo, dia any no hanaovana aminy hoe: Zanak’Andriamanitra velona hianareo. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary tsy fantany fa Izaho no nanome azy ny vary sy ny ranom-boaloboka sy ny diloilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nataoko be ny volafotsiny sy ny volamenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nolaniny ho an’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nataony ho.
      marker-yv: yv-n
    - type: text
      text: ' i Bala,'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa dia halaiko indray ny variko amin’ny androny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ranom-boaloboko amin’ny taonany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hesoriko ny volon’ondriko sy ny rongoniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nomena hasarony ny fitanjahany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ankehitriny hasehoko eo imason’ireo lehilahiny ny fahamenarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy hahafaka azy amin’ny tànako.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary hatsahatro ny fifaliany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny fotoam-pivavahany rehetra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary hofongorako ny voalobony sy ny aviaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nataony hoe: Tangiko avy tamin’ireo lehilahiko ireto;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko ho tonga ala ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hohanin’ny bibi-dia.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary hovaliako izy noho ny andron’ireo Bala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa nandoroany ditin-kazo manitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady niravahany ny kaviny sy ny firavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanaraka ireo lehilahiny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho kosa nohadinoiny, hoy Jehovah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Koa, indro, Izaho dia hitaona azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hitondra azy ho any an-efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao teny malefaka hahafinaritra azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary hatrany dia homeko azy ny tanimboalobony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lohasaha Akora ho varavaram-panantenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any no hamaliany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hihirany.
      marker-yv: yv-n
    - type: text
      text: ' toy ny tamin’ny andro fahatanorany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy ny tamin’ny andro niakarany avy tany amin’ny tany Egypta.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary raha mby amin’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hataonao hoe Aho Vadiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hataonao intsony hoe Balako.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Balako = Tompoko.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa hesoriko amin’ny vavany ny anaran’ireo Bala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hotsarovana amin’ny anarany intsony ireo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hiara-mivory ny taranak’i Joda sy ny taranak’Isiraely ka hifidy anankiray ho lohany izy, dia hiakatra hiala amin’ny tany; fa ho lehibe ny andron’i Jezirela. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary raha mby amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia hanao fanekena ho azy amin’ny bibi-dia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny voro-manidina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny biby mandady sy mikisaka amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hotapatapahiko tsy hisy amin’ny tany intsony ny tsipìka sy ny sabatra ary ny fiadiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hataoko mandry fahizay izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary hofofoiko ho vadiko mandrakizay hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hofofoiko ho vadiko amin’ny rariny sy ny hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny fitiavana sy ny indrafo hianao;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Eny, hofofoiko ho vadiko amin’ny fahamarinana hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hahalala an’i Jehovah.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary amin’izany andro izany dia hihaino
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamaly.
      marker-yv: yv-n
    - type: text
      text: ' Aho, hoy Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hihaino
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamaly.
      marker-yv: yv-n
    - type: text
      text: ' ny lanitra Aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy kosa hihaino
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamaly.
      marker-yv: yv-n
    - type: text
      text: ' ny tany;'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ny tany kosa hihaino
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamaly.
      marker-yv: yv-n
    - type: text
      text: ' ny vary sy ny ranom-boaloboka ary ny diloilo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ireo kosa dia hihaino
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamaly.
      marker-yv: yv-n
    - type: text
      text: ' an’i Jezirela,'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia hafafiko ho Ahy amin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamindra fo amin’i Lô-rohama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i.6.
      marker-yv: yv-n
    - type: text
      text: ' Aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hanao amin’i Lô-amỳ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: i.9.
      marker-yv: yv-n
    - type: text
      text: ' hoe: Oloko hianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izy kosa hanao hoe: Andriamanitro Hianao.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Manaova amin’ny rahalahinareo hoe: Amỳ,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amỳ = Oloko.
      marker-yv: yv-n
    - type: text
      text: ' ary amin’ny anabavinareo hoe: Rohama.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rohama = Namindrana fo.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hamaizana ny Isiraely, sy ny mbola hampodian’i Jehovah azy.
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: MIFANDAHARA amin-dreninareo, eny, mifandahara–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izy tsy vadiko, ary Izaho tsy vadiny–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hesoriny ny fijejojejoany hiala eo amin’ny tavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fijangajangany tsy ho eo an-tratrany;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fandrao hampihanjahanjaiko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hataoko toy ny tamin’ny andro nahaterahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko toy ny efitra sy ny tany karankaina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hataoko matin-ketaheta izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary tsy hamindrako fo ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria zanaky ny fijangajangana ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa efa nijangajanga ny reniny, eny, ilay torontoronina azy efa nanao izay mahamenatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy izy: Hanaraka ireo lehilahiko ihany aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manome ahy ny haninkohaniko sy ny rano hosotroiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny volon’ondriko sy ny rongoniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny diloiloko ary ny fisotroko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa, indro, hotampenako tsilo ny làlanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hasiako fefy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hahita izay làlan-kalehany izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary hiezaka hanenjika ireo lehilahiny izy, nefa tsy hahatratra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitady ireo izy, nefa tsy hahita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hanao hoe izy: Handeha hody amin’ny vadiko taloha aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niadana aho tamin’izay noho ny ankehitriny.
