document_id: REV.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary izy naneho ahy onin’ny ranon’aina, manganohano tahaka ny vato krystaly, nivoaka avy teo amin’ny seza fiandrianan’Andriamanitra sy ny Zanak’ondry '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy izy tamiko: Aza asiana tombo-kase ny tenin’ny faminaniana amin’ity boky ity, fa antomotra ny andro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Izay manao ny tsy marina, aoka mbola hanao ny tsy marina ihany izy; ary izay maloto, aoka mbola hihaloto ihany izy; ary izay marina kosa, aoka mbola hanao ny marina ihany izy, ary izay masina, aoka mbola hihamasina ihany izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Indro, avy faingana Aho; ary eto amiko ny famaliako, mba hamaliako ny olona rehetra araka ny asany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izaho no Alfa sy Omega, ny Voalohany sy ny Farany, ny fiandohana sy ny fiafarana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Sambatra izay manasa ny akanjony, mba hananany fahefana amin’ny hazon’aina sy hidirany amin’ny vavahady ho ao an-tanàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa any ivelany ny alika sy ny mpanao ody ratsy sy ny mpijangajanga sy ny mpamono olona sy ny mpanompo sampy ary izay rehetra tia lainga sady mandainga.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izaho Jesosy naniraka ny anjeliko hanambara aminareo ireo zavatra ireo ho an’ny fiangonana. Izaho no Solofo sy taranak’i Davida, ny Kintana mamirapiratra fitarika andro.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny Fanahy sy ny ampakarina manao hoe: Avia; ary aoka izay mahare hanao hoe: Avia. Ary aoka ho avy izay mangetaheta; ary izay mety, aoka izy hisotro maimaimpoana amin’ny ranon’aina.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izaho dia manambara amin’izay rehetra mandre ny tenin’ny faminaniana amin’ity boky ity: Raha misy manampy ireo, Andriamanitra hanampy ireo loza voasoratra eto anatin’ity boky ity ho azy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ary raha misy manaisotra amin’ny teny amin’ny bokin’ity faminaniana ity, dia hesorin’Andriamanitra ny anjarany amin’ny hazon’aina sy amin’ny tanàna masina, dia izay zavatra voasoratra eto anatin’ity boky ity.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: teo afovoan’ny làlambeny. Ary teny an-daniny roa amin’ny ony nisy hazon’aina mamoa voa roa ambin’ny folo samy hafa sady mamoa isam-bolana; ary ny ravin’ny hazo dia ho fanasitranana ny firenena maro.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy Izay manambara ireo zavatra ireo: Eny, avy faingana Aho. Amena. Avia, Jesosy Tompo!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ho amin’ny olona masina anie ny fahasoavan’i Jesosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Jesosy Kristy].'
      marker-yv: yv-n
    - type: text
      text: ' Tompo. Amena.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary tsy hisy ozona intsony; ary ny seza fiandrianan’Andriamanitra sy ny Zanak’ondry ho eo aminy; ary ny mpanompony dia hanompo Azy '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka hahita ny tavany, ary ny anarany dia ho eo amin’ny handriny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary tsy hisy alina intsony; ary tsy mba mila fahazavan’ny jiro na fahazavan’ny masoandro izy; fa ny Tompo Andriamanitra no hanazava azy; ary hanjaka mandrakizay mandrakizay izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Teny farany.
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ARY hoy izy tamiko: Mahatoky sady marina ireo teny ireo; ary ny Tompo, Andriamanitry ny fanahin’ny mpaminany, naniraka ny anjeliny haneho amin’ny mpanompony izay zavatra tsy maintsy ho tonga faingana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary, indro, avy faingana Aho; sambatra izay mitandrina ny tenin’ny faminaniana amin’ity boky ity.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary izaho Jaona no nahare sy nahita ireo zavatra ireo. Ary rehefa nahare sy nahita aho, dia niankohoka hivavaka teo anoloan’ny tongotr’ilay anjely naneho ahy ireo zavatra ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy izy tamiko: Tandremo, aza manao izao; fa mpanompo namanao ihany aho sady naman’ny mpaminany rahalahinao sy izay mitandrina ny teny amin’ity boky ity; Andriamanitra ihany no ivavaho.'
