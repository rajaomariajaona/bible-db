document_id: 2CH.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandravan’ny olona ny zavatra momba ny sampy, sy ny nandaminan’i Hezekia ny fanompoam-pivavahana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY nony vita izany rehetra izany, dia niainga nankany an-tanànan’ny Joda ny Isiraely rehetra izay tao ka nanorotoro ny tsangam-baton-tsampy sy nikapa ny Aseraha ary nandrava ny fitoerana avo sy ny alitara eran’i Joda sy Benjamina rehetra ary tany Efraima sy Manase koa ambara-paharavany azy rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Dia samy nody ho any amin’ny taniny sy ny tanànany avy ny Zanak’Isiraely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Hezekia nanendry ny antokon’ny mpisorona sy ny Levita araka ny antokony avy, samy araka ny fanompoany avy, dia ny mpisorona sy ny Levita ho amin’ny fanatitra dorana sy ny fanati-pihavavana sy hanao fanompoam-pivavahana sy hisaotra ary hidera eny amin’ny vavahadin’ny tobin’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny hatao fanatitra dorana rehetra dia nomen’ny mpanjaka avy tamin’ny fananany, dia ny fanatitra dorana maraina sy hariva sy ny fanatitra dorana atao amin’ny Sabata sy amin’ny voaloham-bolana sy amin’ny fotoam-pivavahana, araka ny voasoratra ao amin’ny lalàn’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny olona izay nonina tany Jerosalema nasainy nandoa ny anjaran’ny mpisorona sy ny Levita hipetrahany tsara amin’ny lalàn’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony niely izany teny izany, dia nitondra voaloham-bokatra betsaka ny Zanak’Isiraely, dia vary sy ranom-boaloboka sy diloilo sy tantely ary vokatry ny tany isan-karazany; ary ny fahafolon-karena tamin’ny zavatra rehetra, dia betsaka koa no nentiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny Isiraely sy ny Joda, izay nonina tany an-tanànan’ny Joda, nitondra ny fahafolon-karena koa, dia omby sy ondry aman-osy, ary ny fahafolon’ny zavatra masina izay nohamasinina ho an’i Jehovah Andriamaniny, ary navosainy nitokotoko maro ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin’ny volana fahatelo no vao nanomboka nanokotoko azy izy, ary tamin’ny volana fahafito no nahavitany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony avy Hezekia sy ny mpanapaka ka nahita ireo niavosa ireo, dia nisaotra an’i Jehovah sy ny Isiraely olony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Hezekia nanontany ny mpisorona sy ny Levita ny amin’ireo niavosa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Azaria mpisoronabe, taranak’i Zadoka, namaly azy hoe: Hatramin’ny niandohan’ny nitondran’ny olona ny fanatitra ho ao an-tranon’i Jehovah dia nihinana izahay ka voky, sady be koa ny sisa; fa Jehovah nitahy ny olony, ary ny sisa dia ireo betsaka ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nasain’i Hezekia namboatra efi-trano fitehirizana tao amin’ny tranon’i Jehovah izy; dia namboariny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin’ny fahamarinany no nampidirany ny fanatitra sy ny fahafolon-karena sy ny zavatra nohamasininy; ary Konania Levita no mpitahiry ireny, ary Simey rahalahiny no manarakaraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Jehiela sy Azazia sy Nahata sy Asahela sy Jerimota sy Jozabada sy Eliala sy Jismakia sy Mahata ary Benaia, fehin’i Konania sy Simey rahalahiny, no tonian’ireny, araka ny didin’i Hezekia mpanjaka sy Azaria, mpanapaka ny tranon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Kore Levita, zanak’i Jimna, mpiandry varavarana tao atsinanana, no tonian’ny fanati-tsitrapo ho an’Andriamanitra, hizara ny fanatitra asandratra ho an’i Jehovah sy ny zava-masina indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny fehin’i Kore dia Edena sy Miniamina sy Jesoa sy Semaia sy Amaria ary Sekania tao amin’ny tanànan’ny mpisorona; ary adidin’ireo ny hizara ho an’ny rahalahiny araka ny antokony avy, na ny lehibe na ny kely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'afa-tsy ny lehilahy voasoratra hatramin’ny telo taona no ho miakatra, dia izay miditra ao an-tranon’i Jehovah handray ny anjarany isan-andro noho ny fanompoany amin’ny anjara-raharahany araka ny antokony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny amin’ny fanoratana ny mpisorona koa, dia nosoratana araka ny fianakaviany avy, ary ny Levita koa hatramin’ny roa-polo taona no ho miakatra, araka ny anjara-raharahany sy ny antokony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nomena koa ny ankohonany rehetra izay voasoratra, dia ny vadiny mbamin’ny zanani-lahy sy ny zanani-vavy rehetra; fa tamin’ny fahamarinany no nanamasinany ny tenany ny amin’ny zavatra masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ho an’ny mpisorona, taranak’i Arona, koa, izay tany amin’ny tany manodidina ny tanànany, dia nisy olona voatonona anarana tamin’ny isan-tanàna hanome anjara ny lehilahy rehetra amin’ny mpisorona sy ny Levita rehetra voasoratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary toy izany no nataon’i Hezekia eran’i Joda rehetra; fa nanao izay tsara sy mety ary marina eo anatrehan’i Jehovah Andriamaniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny raharaha rehetra izay natombony ny amin’ny fanompoana ao an-tranon’Andriamanitra sy ny lalàna ary ny didy hitadiavana an’Andriamaniny dia nataony tamin’ny fony rehetra, ka nambinina izy.
