document_id: PSA.102,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainan’ny mpanompon’Andriamanitra noho ny fahoriana nahazo azy sy ny naharavan’i Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fivavaky ny ory, raha reraka izy ka mandoatra ny alahelony eo anatrehan’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, henoy ny fivavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hankeo aminao ny fitarainako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho ny fahaviniranao sy ny fahatezeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa naingainao aho, kanefa natontanao indray.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny androko dia tahaka ny aloka efa mandroso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa malazo tahaka ny ahitra aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa Hianao, Jehovah ô, mipetraka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manjaka
    - type: text
      text: ' mandrakizay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahatsiarovana Anao mihatra amin’ny taranaka fara mandimby.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hianao hitsangana ka hamindra fo amin’i Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa andro hamindram-po aminy izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tonga ny fotoana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa sitraky ny mpanomponao ny vatony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady malahelo ny vovo-taniny izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hatahotra ny anaran’i Jehovah ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanjaka rehetra amin’ny tany hatahotra ny voninahitrao;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa Jehovah nanangana an’i Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niseho tamin’ny voninahiny Izy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nijery ny fivavaky ny mahantra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nanevateva ny fivavany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hosoratana ho an’ny taranaka mandimby izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay firenena mbola hoforonina no hidera an’i Jehovah;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa Izy nitazana tany amin’ny fitoerany masina any amin’ny avo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany an-danitra no nitsinjovan’i Jehovah ny tany,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aza manafina ny tavanao amiko amin’ny andro fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amiko ny sofinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro itarainako dia faingàna hamaly ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mba hihaino ny fisentoan’ny mpifatotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanafaka izay voatendry ho faty,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zanaky ny fahafatesana.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mba hotorina any Ziona ny anaran’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiderana Azy any Jerosalema,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Rehefa tafangona ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fanjakana maro hanompo an’i Jehovah.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Efa nahaketraka ny heriko tany an-dàlana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahafohy ny androko Izy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hoy izaho: Andriamanitro ô, aza maka ahy an-tenatenan’ny androko;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taonanao mihatra amin’ny taranaka fara mandimby.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tany aloha no nanorenanao ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asan’ny tànanao ny lanitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ireo dia ho levona, fa Hianao no maharitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy rehetra ho rovitra toy ny fitafiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny lamba no hanovanao azy, ka hovana izy;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa Hianao no tsy miova,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taonanao no tsy ho tapitra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny zanaky ny mpanomponao handry fahizay,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia mbola haharitra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany hampitoerina eo anatrehanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa levon-ko setroka ny androko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taolako mahamay tahaka ny forohana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Taninina tahaka ny ahitra ny foko ka malazo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hadinoko na dia ny fihinanan-kanina aza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho ny fisentoan’ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taolako miraikitra amin’ny hoditro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tahaka ny sama any an-efitra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny vorondolo any an-tanànaolo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mahita tory aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tahaka ny tsikirity irery eo an-tampon-trano.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mandatsa ahy mandrakariva ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay misafoaka amiko dia manao ahy ho fiozonana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa lavenona no nohaniko tahaka ny mofo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zavatra nosotroiko noharoharoako ny ranomasoko,
