document_id: PSA.102,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’ny mpanompon’Andriamanitra noho ny fahoriana nahazo azy sy ny naharavan’i Jerosalema.
  - type: text
    content: Fivavaky ny ory, raha reraka izy ka mandoatra ny alahelony eo anatrehan’i Jehovah.
  - type: text
    content: JEHOVAH ô, henoy ny fivavako,
  - type: text
    content: Ary aoka hankeo aminao ny fitarainako.
  '10':
  - type: text
    content: Noho ny fahaviniranao sy ny fahatezeranao;
  - type: text
    content: Fa naingainao aho, kanefa natontanao indray.
  '11':
  - type: text
    content: Ny androko dia tahaka ny aloka efa mandroso;
  - type: text
    content: Ary efa malazo tahaka ny ahitra aho.
  '12':
  - type: text
    content: 'Nefa Hianao, Jehovah ô, mipetraka '
  - type: text
    content: manjaka
  - type: text
    content: ' mandrakizay;'
  - type: text
    content: Ary ny fahatsiarovana Anao mihatra amin’ny taranaka fara mandimby.
  '13':
  - type: text
    content: Hianao hitsangana ka hamindra fo amin’i Ziona;
  - type: text
    content: Fa efa andro hamindram-po aminy izao;
  - type: text
    content: Eny, tonga ny fotoana.
  '14':
  - type: text
    content: Fa sitraky ny mpanomponao ny vatony,
  - type: text
    content: Sady malahelo ny vovo-taniny izy.
  '15':
  - type: text
    content: Hatahotra ny anaran’i Jehovah ny jentilisa,
  - type: text
    content: Ary ny mpanjaka rehetra amin’ny tany hatahotra ny voninahitrao;
  '16':
  - type: text
    content: Fa Jehovah nanangana an’i Ziona;
  - type: text
    content: Niseho tamin’ny voninahiny Izy;
  '17':
  - type: text
    content: Nijery ny fivavaky ny mahantra Izy
  - type: text
    content: Ka tsy nanevateva ny fivavany.
  '18':
  - type: text
    content: Hosoratana ho an’ny taranaka mandimby izany;
  - type: text
    content: Ary izay firenena mbola hoforonina no hidera an’i Jehovah;
  '19':
  - type: text
    content: Fa Izy nitazana tany amin’ny fitoerany masina any amin’ny avo.
  - type: text
    content: Tany an-danitra no nitsinjovan’i Jehovah ny tany,
  '2':
  - type: text
    content: Aza manafina ny tavanao amiko amin’ny andro fahoriako;
  - type: text
    content: Atongilano amiko ny sofinao;
  - type: text
    content: Amin’ny andro itarainako dia faingàna hamaly ahy.
  '20':
  - type: text
    content: Mba hihaino ny fisentoan’ny mpifatotra
  - type: text
    content: Sy hanafaka izay voatendry ho faty,
  - type: note
    content: Heb. zanaky ny fahafatesana.
  '21':
  - type: text
    content: Mba hotorina any Ziona ny anaran’i Jehovah,
  - type: text
    content: Ary ny fiderana Azy any Jerosalema,
  '22':
  - type: text
    content: Rehefa tafangona ny firenena
  - type: text
    content: Sy ny fanjakana maro hanompo an’i Jehovah.
  '23':
  - type: text
    content: Efa nahaketraka ny heriko tany an-dàlana Izy;
  - type: text
    content: Efa nahafohy ny androko Izy.
  '24':
  - type: text
    content: 'Hoy izaho: Andriamanitro ô, aza maka ahy an-tenatenan’ny androko;'
  - type: text
    content: Ny taonanao mihatra amin’ny taranaka fara mandimby.
  '25':
  - type: text
    content: Tany aloha no nanorenanao ny tany;
  - type: text
    content: Ary asan’ny tànanao ny lanitra.
  '26':
  - type: text
    content: Ireo dia ho levona, fa Hianao no maharitra;
  - type: text
    content: Izy rehetra ho rovitra toy ny fitafiana;
  - type: text
    content: Toy ny lamba no hanovanao azy, ka hovana izy;
  '27':
  - type: text
    content: Fa Hianao no tsy miova,
  - type: text
    content: Ary ny taonanao no tsy ho tapitra.
  '28':
  - type: text
    content: Ny zanaky ny mpanomponao handry fahizay,
  - type: note
    content: 'Na: dia mbola haharitra.'
  - type: text
    content: Ary ny taranany hampitoerina eo anatrehanao.
  '3':
  - type: text
    content: Fa levon-ko setroka ny androko,
  - type: text
    content: Ary ny taolako mahamay tahaka ny forohana.
  '4':
  - type: text
    content: Taninina tahaka ny ahitra ny foko ka malazo;
  - type: text
    content: Fa hadinoko na dia ny fihinanan-kanina aza.
  '5':
  - type: text
    content: Noho ny fisentoan’ny foko
  - type: text
    content: Ny taolako miraikitra amin’ny hoditro.
  '6':
  - type: text
    content: Tahaka ny sama any an-efitra aho,
  - type: text
    content: Ary tahaka ny vorondolo any an-tanànaolo.
  '7':
  - type: text
    content: Tsy mahita tory aho
  - type: text
    content: Sady tahaka ny tsikirity irery eo an-tampon-trano.
  '8':
  - type: text
    content: Mandatsa ahy mandrakariva ny fahavaloko;
  - type: text
    content: Izay misafoaka amiko dia manao ahy ho fiozonana.
  '9':
  - type: text
    content: Fa lavenona no nohaniko tahaka ny mofo;
  - type: text
    content: Ary ny zavatra nosotroiko noharoharoako ny ranomasoko,
