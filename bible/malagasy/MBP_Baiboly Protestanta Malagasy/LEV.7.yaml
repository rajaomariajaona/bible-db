document_id: LEV.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no lalàna ny amin’ny fanati-panonerana: masina dia masina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eo amin’izay famonoana ny fanatitra dorana no hamonoana ny fanati-panonerana; ary ny ra dia hatopiny manodidina amin’ny lafin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary dia hateriny avokoa ny hofany sy ny saborany rehetra, dia ny safodrorohany sy ny saboran-tsinainy '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary ny voany roa mbamin’ny fonom-boany, izay eo amin’ny takibany, ary ny ila-atiny lehibe;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' hatao indray manala amin’ny voany no fanaisony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hodoran’ ny mpisorona ho fofona eo ambonin’ny alitara ireo ho fanatitra atao amin’ny afo ho an’i Jehovah; dia fanati-panonerana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny lehilahy rehetra amin’ny mpisorona no mahazo mihinana izany; eo amin’izay fitoerana masina no hihinanany azy: masina dia masina izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho tahaka ny fanatitra noho ny ota ny fanati-panonerana, ka lalàna iray no ho amin’izy roa: ho an’ny mpisorona izay manao fanavotana aminy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ilay mpisorona manatitra ny fanatitra dorana izay aterin’ny olona dia hahazo ny hoditr’izany fanatitra dorana nateriny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny fanatitra hohanina rehetra izay voaendy amin’ny fanendasa-mofo sy izay rehetra atao amin’ny vilany fandrahoana, na amin’ny lapoely, dia ho an’ilay mpisorona manatitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny fanatitra hohanina rehetra, izay voaharo diloilo, na ny maina, dia ho an’ny zanak’i Arona rehetra kosa, ka hiara-misalahy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izao no lalàna ny amin’ny fanati-pihavanana izay haterina ho an’i Jehovah: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha misy manatitra izany ho fanati-pisaorana, dia izao no hateriny ho fanampiny: mofo izay tsy misy masirasira sady voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo ary mofo atao amin’ny koba tsara toto voaendy sady voaharo diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary miaraka amin’ny mofo tsy misy masirasira dia mofo misy masirasira kosa no hateriny ho fanampin’ny fanati-pihavanana izay ataony ho fanati-pisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hangalany iray avy ny isam-panatitra ho fanatitra asandratra ho an’i Jehovah; ho an’ilay mpisorona manopy ny ran’ny fanati-pihavanana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny henan’ny fanati-pihavanana izay ataony ho fanati-pisaorana dia hohanina amin’ny andro anaterana azy; tsy hisy havela ho tra-maraina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha fanati-panalam-boady na fanati-tsitra-po kosa no ateriny, dia amin’ny andro anaterany ny fanatiny no hihinanana azy, ary ampitson’iny no hihinanana izay ambiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny sisa amin’ny henan’ny fanatitra dia hodorana amin’ny afo amin’ny andro fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha tàhiny hihinanana amin’ny andro fahatelo ny henan’ny fanati-pihavanana, na dia kely aza, dia tsy horaisina na hisaina ho an’izay manatitra azy izany, fa fahavetavetana; ary ny olona izay mihinana amin’izany dia ho meloka. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary na ny hena izay mikasika zava-maloto aza dia tsy hohanina, fa hodorana amin’ny afo; ary ny amin’ny hena, dia izay madio rehetra no mahazo mihinana azy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa ny olona izay misy fahalotoana, nefa mihinana hena avy amin’ny fanati-pihavanana, izay an’i Jehovah, dia hofongorana tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny olona izay mikasika zava-maloto, na fahalotoan’olona, na biby maloto, na izay zava-betaveta maloto, ka mihinana amin’ny henan’ny fanati-pihavanana izay an’i Jehovah, dia hofongorana tsy ho amin’ny fireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mitenana amin’ny Zanak’Isiraely hoe: Aza mihinana sabora akory hianareo, na ny an’ny omby, na ny an’ny ondry, na ny an’ny osy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny saboran’ny biby izay maty ho azy sy ny saboran’izay noviraviraim-biby dia azo atao amin’ny azvatra hafa ihany, fa aza mihinana azy hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay rehetra mihinana saboran’ny biby fiompy, izay fanao fanatitra, atao amin’ny afo ho an’i Jehovah, dia hofongorana tsy ho amin’ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary aza mihinana ra eny amin’izay rehetra itoeranareo, na ny an’ny vorona, na ny an’ny biby fiompy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay rehetra mihinana ra dia hofongorana tsy ho amin’ny fireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mitenena amin’ny Zanak’Isiraely hoe: Izay manatitra ny fanati-pihavanany ho an’i Jehovah dia hitondra ny fanatiny ho an’i Jehovah avy amin’ny fanati-pihavanany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny tànany ihany no hitondra ny fanatitra atao amin’ny afo ho an’i Jehovah; ny saborany mbamin’ny tratrany no ho entiny, ka ny tratrany dia hahevaheva ho fanatitra ahevaheva eo anatrehan’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hodoran’ny mpisorona ho fofona eo ambonin’ny alitara ny saborany; fa ny tratrany kosa dia ho an’i Arona sy ireo zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny soroka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fe.
    marker-yv: yv-n
  - type: text
    text: ' ankavanana dia homenareo ny mpisorona ho fanatitra asandratra avy amin’ny fanati-pihavananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny anankiray amin’ny zanak’i Arona izay manatitra ny ran’ny fanati-pihavanana sy ny saborany no hanana ny soroka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fe.
    marker-yv: yv-n
  - type: text
    text: ' ankavanana ho anjarany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa ny tratra ahevaheva sy ny soroka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fe.
    marker-yv: yv-n
  - type: text
    text: ' asandrata dia efa nalaiko tamin’ny Zanak’Isiraely avy amin’ny fanati-pihavanany, ary nomeko ho an’i Arona mpisorona sy ny zanany, ho anjarany mandrakizay avy amin’ny Zanak’Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izany no anjaran’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anjarany tamin’ny nanosorana azy.
    marker-yv: yv-n
  - type: text
    text: ' i Arona sy ny zanany avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah, amin’ilay andro ampanakekeny azy mba ho mpisorona ho an’i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: dia izay nandidian’i Jehovah homena azy avy amin’ny Zanak’Isiraely amin’ilay andro anosorana azy, ho anjarany mandrakizay amin’ny taranany hatramin’ny fara mandimby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izany no lalàna ny amin’ny fanatitra dorana sy ny fanatitra hohanina sy ny fanatitra noho ny ota sy ny fanati-panonerana sy ny fanati-panokanana ary ny fanati-pihavanana, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: izay nandidian’i Jehovah an’i Mosesy tao amin’ny tendrombohitra Sinay, tamin’ny andro izay nandidiany ny Zanak’Isiraely hanatitra ny fanatiny ho an’i Jehovah, tany an-efitr’i Sinay.
