document_id: PSA.68
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fankalazana an’Andriamanitra noho ny fitondrany ny Isiraely sy ny fandreseny ny fahavalony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tonon-kira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: AOKA hitsangana Andriamanitra, ka hiely ny fahavalony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka izay mankahala Azy handositra ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tahaka ny fanely setroka no fanelinao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fiempon’ny savoka eo anoloan’ny afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: No aoka hahalevonan’ny ratsy fanahy eo anatrehan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny marina mifaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ravoravo eo anatrehan’Andriamanitra izy ka faly tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihirà ho an’Andriamanitra, mankalazà ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manamboara làlana ho an’Izay mitaingina mamaky ny efitra–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no anarany–ary mifalia eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rain’ny kamboty sy Mpanome rariny ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra ao amin’ny fonenany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andriamanitra mampitoetra an-trano izay irery tena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamoaka ny mpifatotra ho amin’ny fanambinana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny maditra hitoetra amin’ny tany karankaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Andriamanitra ô, raha nandeha teo alohan’ny olonao Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka namaky ny efitra,
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nihorohoro ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitaitaika ny lanitra, tamin’ny fanatrehan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na iry Sinay iry aza tamin’ny fanatrehan’Andriamanitra, Andriamanitry ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ranonoram-pitahiana no nalatsakao tamin’ny lovanao, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha kotra izy, dia novelombelominao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny olonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: bibinao.
    marker-yv: yv-n
  - type: text
    text: ' taman-toerana teo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamboatra ho an’ny ory araka ny fahasoavanao Hianao, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny Tompo manome ny teny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vehivavy mpilaza soa dia antokony lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ireo mpanjaka be miaramila dia vaky mandositra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mandry eo amin’ny vala hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho tahaka
  - type: text
    text: ' ny ela-boromailala miravaka volafotsy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volony miravaka volamena tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha aelin’ny Tsitoha eo ny mpanjaka maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia latsaka ny orampanala ao Zalmona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tendrombohitr’Andriamanitra ny tendrombohitr’i Basana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tendrombohitra maro tampona ny tendrombohitr’i Basana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ry tendrombohitra maro tampona, nahoana hianareo no mihendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tendrombohitra izay tian’Andriamanitra hitoerany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hitoetra ao mandrakizay Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny kalesin’Andriamanitra dia roa alina, eny, arivo arivo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Tompo no eo aminy; Sinay dia eo amin’ny itoerana masina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny fahamasinana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa niakatra ho any amin’ny avo Hianao ka nitondra babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nandray fanomezana teo amin’ny olombelona Hianao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, teo amin’ny maditra aza,–mba hitoeran’i Jehovah Andriamanitra any.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ao aminy; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mba hitoeranao any, ry Jehovah Andriamanitra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Efa nandray olona ho fanomezana Hianao–Eny, na dia ny maditra aza–mba hitoerany ao amin’i Jehovah Andriamanitra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Isaorana anie ny Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitondra ny entantsika isan-andro isan-andro,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Isaorana isan-andro isan-andro anie ny Tompo; Raha misy mahavesatra antsika, Dia Andriamanitra no famonjena antsika; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaorana anie ny Tompo, Izay mampitondra entana antsika isan-andro isan-andro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Andriamanitra Izay famonjena antsika.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Andriamanitra no Andriamanitry ny famonjena ho antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary an’i Jehovah Tompo ny fanafahana amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa Andriamanitra mamely mafy ny lohan’ny fahavalony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny tampon-doha lava volo an’izay mandroso amin’ny fahadisoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lazain’ny Tompo hoe: Hampody ny any Basana Aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampody ny amin’ny ranomasina lalina Aho,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mba hampihosenanao ra ny tongotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho anjaran’ny lelan’ny amboanao ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Efa hita ny fandehananao, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fandehanan’Andriamanitro, Mpanjakako, ao amin’ny fitoerana masina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny fahamasinana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mialoha ny mpihira, ary manaraka ny mpitendry valiha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo afovoan’ny zatovovavy mively ampongatapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Misaora an’Andriamanitra eo amin’ny fiangonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, misaora ny Tompo, hianareo avy amin’ny loharanon’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indry Benjamina kely, mpanapaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny antokon’ny mpanapaka ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Andriamanitrao no nampahery anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Andriamanitra Izay miasa ho anay ô, asehoy ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Noho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Avy amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny tempolinao eo an-tampon’i Jerosalema'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hitondran’ny mpanjaka maro fanatitra ho Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Teneno mafy ny biby eny anaty zozoro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fivorian’ny ombilahy mbamin’ireo vahoaka zanak’omby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay miankohoka manatitra anja-bolafotsy–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aelezo ny olona tia ady–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ho avy ny tremalahin’i Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Etiopia halaky hananty tànana amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ry fanjakana ambonin’ny tany, mihirà ho an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankalazà ny Tompo,
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, mamoaka ny feony Izy, dia feo mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ekeo ho an’Andriamanitra ny hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambonin’ny Isiraely ny voninahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny heriny any amin’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mahatahotra Hianao, Andriamanitra ô, ao amin’ny fitoeranao masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitry ny Isiraely no manome hery sy tanjaka ho an’ny olona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaorana anie Andriamanitra.
