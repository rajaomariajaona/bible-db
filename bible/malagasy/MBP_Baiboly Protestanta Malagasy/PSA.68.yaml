document_id: PSA.68,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fankalazana an’Andriamanitra noho ny fitondrany ny Isiraely sy ny fandreseny ny fahavalony.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tonon-kira.
  - type: text
    content: AOKA hitsangana Andriamanitra, ka hiely ny fahavalony;
  - type: text
    content: Ary aoka izay mankahala Azy handositra ny tavany.
  '10':
  - type: text
    content: Ny olonao
  - type: note
    content: Heb. bibinao.
  - type: text
    content: ' taman-toerana teo;'
  - type: text
    content: Mamboatra ho an’ny ory araka ny fahasoavanao Hianao, Andriamanitra ô.
  '11':
  - type: text
    content: Ny Tompo manome ny teny;
  - type: text
    content: Ary ny vehivavy mpilaza soa dia antokony lehibe.
  '12':
  - type: text
    content: Ireo mpanjaka be miaramila dia vaky mandositra;
  - type: text
    content: Ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo.
  '13':
  - type: text
    content: Raha mandry eo amin’ny vala hianareo,
  - type: text
    content: 'Dia '
  - type: text
    content: ho tahaka
  - type: text
    content: ' ny ela-boromailala miravaka volafotsy,'
  - type: text
    content: Ary ny volony miravaka volamena tsara.
  '14':
  - type: text
    content: Raha aelin’ny Tsitoha eo ny mpanjaka maro,
  - type: text
    content: Dia latsaka ny orampanala ao Zalmona.
  '15':
  - type: text
    content: Tendrombohitr’Andriamanitra ny tendrombohitr’i Basana.
  - type: text
    content: Tendrombohitra maro tampona ny tendrombohitr’i Basana.
  '16':
  - type: text
    content: Ry tendrombohitra maro tampona, nahoana hianareo no mihendry
  - type: text
    content: Ny tendrombohitra izay tian’Andriamanitra hitoerany?
  - type: text
    content: Eny, hitoetra ao mandrakizay Jehovah.
  '17':
  - type: text
    content: Ny kalesin’Andriamanitra dia roa alina, eny, arivo arivo;
  - type: text
    content: Ny Tompo no eo aminy; Sinay dia eo amin’ny itoerana masina.
  - type: note
    content: 'Na: amin’ny fahamasinana.'
  '18':
  - type: text
    content: Efa niakatra ho any amin’ny avo Hianao ka nitondra babo;
  - type: text
    content: Efa nandray fanomezana teo amin’ny olombelona Hianao–
  - type: text
    content: Eny, teo amin’ny maditra aza,–mba hitoeran’i Jehovah Andriamanitra any.
  - type: note
    content: 'Na: ao aminy; na: mba hitoeranao any, ry Jehovah Andriamanitra; na: Efa nandray olona ho fanomezana Hianao–Eny, na dia ny maditra aza–mba hitoerany ao amin’i Jehovah Andriamanitra.'
  '19':
  - type: text
    content: Isaorana anie ny Tompo,
  - type: text
    content: Izay mitondra ny entantsika isan-andro isan-andro,
  - type: note
    content: 'Na: Isaorana isan-andro isan-andro anie ny Tompo; Raha misy mahavesatra antsika, Dia Andriamanitra no famonjena antsika; na: Isaorana anie ny Tompo, Izay mampitondra entana antsika isan-andro isan-andro.'
  - type: text
    content: Eny, Andriamanitra Izay famonjena antsika.
  - type: text
    content: '[Sela.]'
  '2':
  - type: text
    content: Tahaka ny fanely setroka no fanelinao azy;
  - type: text
    content: Tahaka ny fiempon’ny savoka eo anoloan’ny afo
  - type: text
    content: No aoka hahalevonan’ny ratsy fanahy eo anatrehan’Andriamanitra.
  '20':
  - type: text
    content: Andriamanitra no Andriamanitry ny famonjena ho antsika;
  - type: text
    content: Ary an’i Jehovah Tompo ny fanafahana amin’ny fahafatesana.
  '21':
  - type: text
    content: Fa Andriamanitra mamely mafy ny lohan’ny fahavalony,
  - type: text
    content: Dia ny tampon-doha lava volo an’izay mandroso amin’ny fahadisoany.
  '22':
  - type: text
    content: 'Lazain’ny Tompo hoe: Hampody ny any Basana Aho;'
  - type: text
    content: Hampody ny amin’ny ranomasina lalina Aho,–
  '23':
  - type: text
    content: Mba hampihosenanao ra ny tongotrao,
  - type: text
    content: Ary ho anjaran’ny lelan’ny amboanao ny fahavalo.
  '24':
  - type: text
    content: Efa hita ny fandehananao, Andriamanitra ô,
  - type: text
    content: Dia ny fandehanan’Andriamanitro, Mpanjakako, ao amin’ny fitoerana masina.
  - type: note
    content: 'Na: amin’ny fahamasinana.'
  '25':
  - type: text
    content: Mialoha ny mpihira, ary manaraka ny mpitendry valiha,
  - type: text
    content: Eo afovoan’ny zatovovavy mively ampongatapaka.
  '26':
  - type: text
    content: Misaora an’Andriamanitra eo amin’ny fiangonana,
  - type: text
    content: Eny, misaora ny Tompo, hianareo avy amin’ny loharanon’ny Isiraely.
  '27':
  - type: text
    content: Indry Benjamina kely, mpanapaka azy,
  - type: text
    content: Ny antokon’ny mpanapaka ny Joda,
  - type: text
    content: Ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.
  '28':
  - type: text
    content: Andriamanitrao no nampahery anao;
  - type: text
    content: Ry Andriamanitra Izay miasa ho anay ô, asehoy ny herinao.
  '29':
  - type: text
    content: Noho
  - type: note
    content: 'Na: Avy amin’.'
  - type: text
    content: ' ny tempolinao eo an-tampon’i Jerosalema'
  - type: text
    content: No hitondran’ny mpanjaka maro fanatitra ho Anao.
  '3':
  - type: text
    content: Fa ny marina mifaly;
  - type: text
    content: Eny, ravoravo eo anatrehan’Andriamanitra izy ka faly tokoa.
  '30':
  - type: text
    content: Teneno mafy ny biby eny anaty zozoro
  - type: text
    content: Sy ny fivorian’ny ombilahy mbamin’ireo vahoaka zanak’omby,
  - type: text
    content: Dia izay miankohoka manatitra anja-bolafotsy–
  - type: text
    content: Aelezo ny olona tia ady–
  '31':
  - type: text
    content: Ho avy ny tremalahin’i Egypta;
  - type: text
    content: Etiopia halaky hananty tànana amin’Andriamanitra.
  '32':
  - type: text
    content: Ry fanjakana ambonin’ny tany, mihirà ho an’Andriamanitra;
  - type: text
    content: Mankalazà ny Tompo,
  - type: text
    content: '[Sela.]'
  '33':
  - type: text
    content: Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola;
  - type: text
    content: Indro, mamoaka ny feony Izy, dia feo mahery.
  '34':
  - type: text
    content: Ekeo ho an’Andriamanitra ny hery;
  - type: text
    content: Ambonin’ny Isiraely ny voninahiny,
  - type: text
    content: Ary ny heriny any amin’ny lanitra.
  '35':
  - type: text
    content: Mahatahotra Hianao, Andriamanitra ô, ao amin’ny fitoeranao masina;
  - type: text
    content: Andriamanitry ny Isiraely no manome hery sy tanjaka ho an’ny olona.
  - type: text
    content: Isaorana anie Andriamanitra.
  '4':
  - type: text
    content: Mihirà ho an’Andriamanitra, mankalazà ny anarany;
  - type: text
    content: Manamboara làlana ho an’Izay mitaingina mamaky ny efitra–
  - type: text
    content: Jehovah no anarany–ary mifalia eo anatrehany.
  '5':
  - type: text
    content: Rain’ny kamboty sy Mpanome rariny ny mpitondratena
  - type: text
    content: Andriamanitra ao amin’ny fonenany masina.
  '6':
  - type: text
    content: Andriamanitra mampitoetra an-trano izay irery tena;
  - type: text
    content: Mamoaka ny mpifatotra ho amin’ny fanambinana Izy;
  - type: text
    content: Fa ny maditra hitoetra amin’ny tany karankaina.
  '7':
  - type: text
    content: Andriamanitra ô, raha nandeha teo alohan’ny olonao Hianao
  - type: text
    content: Ka namaky ny efitra,
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Dia nihorohoro ny tany,
  - type: text
    content: Ary nitaitaika ny lanitra, tamin’ny fanatrehan’Andriamanitra,
  - type: text
    content: Na iry Sinay iry aza tamin’ny fanatrehan’Andriamanitra, Andriamanitry ny Isiraely.
  '9':
  - type: text
    content: Ranonoram-pitahiana no nalatsakao tamin’ny lovanao, Andriamanitra ô;
  - type: text
    content: Ary raha kotra izy, dia novelombelominao.
