document_id: JOB.30
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ankehitriny kosa dia mihomehy ahy na dia izay tokon-jandriko aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zanak’ireo izay nolaviko tsy ho isan’ny amboa miandry ny ondriko akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, mampaninona ahy ny herin’ny tànan’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa very fahatanjahana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manjenjena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ana, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kaozatra, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy manan-janaka.
    marker-yv: yv-n
  - type: text
    text: ' noho ny tsi-fisian-kanina sy ny mosary izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homankomana foana any an-tany karankaina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo an-katoky ny loza sy ny fandringanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsongo anambodihena eo amin’ny kirihitrala izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fàkan’ny anjavidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rotema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao 1 Mpan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xix. 4.
    marker-yv: yv-n
  - type: text
    text: ' no fihinany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Roahina tsy ho eo amin’ny olona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady akoraina toy ny mpangalatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Any an-dohasaha mahatsiravina no tsy maintsy itoerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ao an-dava-tany sy an-dava-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Minananana eny amin’ny kirihitrala izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitangorona eo ambanin’ny amiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Zanaky ny adala izy sady zanaky ny tsy manan-kaja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka roahina tsy ho eo amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ankehitriny efa ataony an-kira aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa ambentinteniny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataony toy ny zava-betaveta aho ka halaviriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy menatra handrora ny tavako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa noketrahin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' ny kofehiko, ka nampietreny aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mba nesorin’iretsy kosa teo anatrehako ny lamboridiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Misy androvolahy mitsangana eo an-kavanako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manosika ny tongotro hiala izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manandratra tovon-tany hampidirany loza amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandrava ny làlako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manararaotra ny andravana ahy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny tenany tsy manan-kamonjy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny fiditra eo amin’ny banga lehibe no fihaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka avy ao amin’ny voarava no imaonany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha mbola miezinezina, dia mimaona izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voatodika hamely ahy ny fampitahorana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manenjika ny voninahitro tahaka ny rivotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka levona tahaka ny rahona ny famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ankehitriny, raraka ato anatiko ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fenjàn’ny andro fahoriana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny alina mampahalò
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manindrona.
    marker-yv: yv-n
  - type: text
    text: ' ny taolako ho afaka amiko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mitsahatra ireo manotahota ahy ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Noho ny haben’ny hery dia tonga tsy antonona ny akanjoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manenda ahy tahaka ny vozon-dobaka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, nanary ahy teo amin’ny fotaka Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa tahaka ny vovoka sy ny lavenona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mitaraina aminao aho, nefa tsy mihaino ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijoro eo aho, nefa jerenao foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Efa manjary lozabe amiko Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny herin’ny tànanao no andrafianao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aingainao ho eny amin’ny rivotra aho ka alefanao handeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary levoninao amin’ny tafio-drivotra mifofofofo ho tsinontsinona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa fantatro fa hampodinao any amin’ny fahafatesana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny trano fivorian’ny olombelona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa tsy manainga ny tànany va ny olona, raha ianjeran’ny rava?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: raha mila ho potraka izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mitaraina va izy, raha tratry ny loza?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy nitomany ny ory va aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nangorakoraka ny malahelo va ny fanahiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa niandry ny soa aho, kanjo tonga ny ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanantena ny mazava aho, kanjo avy ny maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nandevilevy ny tsinaiko ka tsy nanam-pitsaharana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitsena ahy ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Efa mainty aho, fa tsy avy amin’ny hain’andro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangana aho ka mitaraina eo am-pivorian’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rahalahin’ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
  - type: text
    text: ' aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary naman’ny ostritsa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Efa mainty ny hoditro sady miendakendaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa karankaina noho ny hafanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahamainana.
    marker-yv: yv-n
  - type: text
    text: ' ny taolako.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nanjary fisaonana ny lokangako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary feon’ny mitomany ny sodiko.
