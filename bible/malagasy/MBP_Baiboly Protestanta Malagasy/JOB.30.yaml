document_id: JOB.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny kosa dia mihomehy ahy na dia izay tokon-jandriko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zanak’ireo izay nolaviko tsy ho isan’ny amboa miandry ny ondriko akory aza.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataony toy ny zava-betaveta aho ka halaviriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy menatra handrora ny tavako izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa noketrahin’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' ny kofehiko, ka nampietreny aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia mba nesorin’iretsy kosa teo anatrehako ny lamboridiny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy androvolahy mitsangana eo an-kavanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manosika ny tongotro hiala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manandratra tovon-tany hampidirany loza amiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrava ny làlako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy manararaotra ny andravana ahy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny tenany tsy manan-kamonjy,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fiditra eo amin’ny banga lehibe no fihaviny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka avy ao amin’ny voarava no imaonany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha mbola miezinezina, dia mimaona izy.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voatodika hamely ahy ny fampitahorana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenjika ny voninahitro tahaka ny rivotra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka levona tahaka ny rahona ny famonjena ahy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny, raraka ato anatiko ny fanahiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fenjàn’ny andro fahoriana aho.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alina mampahalò
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manindrona.
      marker-yv: yv-n
    - type: text
      text: ' ny taolako ho afaka amiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mitsahatra ireo manotahota ahy ireo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny haben’ny hery dia tonga tsy antonona ny akanjoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manenda ahy tahaka ny vozon-dobaka izany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nanary ahy teo amin’ny fotaka Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka efa tahaka ny vovoka sy ny lavenona aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mampaninona ahy ny herin’ny tànan’ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa very fahatanjahana?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaraina aminao aho, nefa tsy mihaino ahy Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijoro eo aho, nefa jerenao foana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa manjary lozabe amiko Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny herin’ny tànanao no andrafianao ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aingainao ho eny amin’ny rivotra aho ka alefanao handeha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary levoninao amin’ny tafio-drivotra mifofofofo ho tsinontsinona aho.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fantatro fa hampodinao any amin’ny fahafatesana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any amin’ny trano fivorian’ny olombelona rehetra.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy manainga ny tànany va ny olona, raha ianjeran’ny rava?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: raha mila ho potraka izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mitaraina va izy, raha tratry ny loza?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nitomany ny ory va aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nangorakoraka ny malahelo va ny fanahiko?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niandry ny soa aho, kanjo tonga ny ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanantena ny mazava aho, kanjo avy ny maizina.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandevilevy ny tsinaiko ka tsy nanam-pitsaharana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsena ahy ny andro fahoriana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efa mainty aho, fa tsy avy amin’ny hain’andro.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangana aho ka mitaraina eo am-pivorian’ny olona.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahalahin’ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
    - type: text
      text: ' aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary naman’ny ostritsa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manjenjena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ana, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Kaozatra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy manan-janaka.
      marker-yv: yv-n
    - type: text
      text: ' noho ny tsi-fisian-kanina sy ny mosary izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homankomana foana any an-tany karankaina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo an-katoky ny loza sy ny fandringanana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa mainty ny hoditro sady miendakendaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa karankaina noho ny hafanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahamainana.
      marker-yv: yv-n
    - type: text
      text: ' ny taolako.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanjary fisaonana ny lokangako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary feon’ny mitomany ny sodiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsongo anambodihena eo amin’ny kirihitrala izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fàkan’ny anjavidy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'rotema; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao 1 Mpan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xix. 4.
      marker-yv: yv-n
    - type: text
      text: ' no fihinany.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahina tsy ho eo amin’ny olona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady akoraina toy ny mpangalatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any an-dohasaha mahatsiravina no tsy maintsy itoerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao an-dava-tany sy an-dava-bato.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Minananana eny amin’ny kirihitrala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitangorona eo ambanin’ny amiana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zanaky ny adala izy sady zanaky ny tsy manan-kaja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka roahina tsy ho eo amin’ny tany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny efa ataony an-kira aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efa ambentinteniny aho.
