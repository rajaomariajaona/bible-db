document_id: JOB.30,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa ankehitriny kosa dia mihomehy ahy na dia izay tokon-jandriko aza,
  - type: text
    content: Dia zanak’ireo izay nolaviko tsy ho isan’ny amboa miandry ny ondriko akory aza.
  '10':
  - type: text
    content: Ataony toy ny zava-betaveta aho ka halaviriny,
  - type: text
    content: Ary tsy menatra handrora ny tavako izy.
  '11':
  - type: text
    content: Fa noketrahin’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' ny kofehiko, ka nampietreny aho;'
  - type: text
    content: Ka dia mba nesorin’iretsy kosa teo anatrehako ny lamboridiny.
  '12':
  - type: text
    content: Misy androvolahy mitsangana eo an-kavanako;
  - type: text
    content: Manosika ny tongotro hiala izy
  - type: text
    content: Ary manandratra tovon-tany hampidirany loza amiko.
  '13':
  - type: text
    content: Mandrava ny làlako
  - type: text
    content: Sy manararaotra ny andravana ahy izy,
  - type: text
    content: Nefa ny tenany tsy manan-kamonjy,
  '14':
  - type: text
    content: Toy ny fiditra eo amin’ny banga lehibe no fihaviny,
  - type: text
    content: Ka avy ao amin’ny voarava no imaonany.
  - type: note
    content: 'Na: Raha mbola miezinezina, dia mimaona izy.'
  '15':
  - type: text
    content: 'Voatodika hamely ahy ny fampitahorana:'
  - type: text
    content: Manenjika ny voninahitro tahaka ny rivotra izy,
  - type: text
    content: Ka levona tahaka ny rahona ny famonjena ahy.
  '16':
  - type: text
    content: Ary ankehitriny, raraka ato anatiko ny fanahiko.
  - type: text
    content: Fenjàn’ny andro fahoriana aho.
  '17':
  - type: text
    content: Ny alina mampahalò
  - type: note
    content: Heb. manindrona.
  - type: text
    content: ' ny taolako ho afaka amiko,'
  - type: text
    content: Ary tsy mitsahatra ireo manotahota ahy ireo.
  '18':
  - type: text
    content: Noho ny haben’ny hery dia tonga tsy antonona ny akanjoko,
  - type: text
    content: Manenda ahy tahaka ny vozon-dobaka izany.
  '19':
  - type: text
    content: Eny, nanary ahy teo amin’ny fotaka Izy,
  - type: text
    content: Ka efa tahaka ny vovoka sy ny lavenona aho.
  '2':
  - type: text
    content: Eny, mampaninona ahy ny herin’ny tànan’ireo,
  - type: text
    content: Izay efa very fahatanjahana?
  '20':
  - type: text
    content: Mitaraina aminao aho, nefa tsy mihaino ahy Hianao;
  - type: text
    content: Mijoro eo aho, nefa jerenao foana.
  '21':
  - type: text
    content: Efa manjary lozabe amiko Hianao;
  - type: text
    content: Ny herin’ny tànanao no andrafianao ahy.
  '22':
  - type: text
    content: Aingainao ho eny amin’ny rivotra aho ka alefanao handeha,
  - type: text
    content: Ary levoninao amin’ny tafio-drivotra mifofofofo ho tsinontsinona aho.
  '23':
  - type: text
    content: Fa fantatro fa hampodinao any amin’ny fahafatesana aho,
  - type: text
    content: Dia any amin’ny trano fivorian’ny olombelona rehetra.
  '24':
  - type: text
    content: Kanefa tsy manainga ny tànany va ny olona, raha ianjeran’ny rava?
  - type: note
    content: 'Na: raha mila ho potraka izy.'
  - type: text
    content: Ary tsy mitaraina va izy, raha tratry ny loza?
  '25':
  - type: text
    content: Tsy nitomany ny ory va aho?
  - type: text
    content: Tsy nangorakoraka ny malahelo va ny fanahiko?
  '26':
  - type: text
    content: Fa niandry ny soa aho, kanjo tonga ny ratsy;
  - type: text
    content: Ary nanantena ny mazava aho, kanjo avy ny maizina.
  '27':
  - type: text
    content: Nandevilevy ny tsinaiko ka tsy nanam-pitsaharana;
  - type: text
    content: Nitsena ahy ny andro fahoriana.
  '28':
  - type: text
    content: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro;
  - type: note
    content: 'Na: Efa mainty aho, fa tsy avy amin’ny hain’andro.'
  - type: text
    content: Mitsangana aho ka mitaraina eo am-pivorian’ny olona.
  '29':
  - type: text
    content: Rahalahin’ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' aho'
  - type: text
    content: Ary naman’ny ostritsa.
  '3':
  - type: text
    content: Manjenjena
  - type: note
    content: 'Na: Ana, na Kaozatra, na Tsy manan-janaka.'
  - type: text
    content: ' noho ny tsi-fisian-kanina sy ny mosary izy;'
  - type: text
    content: Homankomana foana any an-tany karankaina izy,
  - type: text
    content: Dia eo an-katoky ny loza sy ny fandringanana.
  '30':
  - type: text
    content: Efa mainty ny hoditro sady miendakendaka,
  - type: text
    content: Ary efa karankaina noho ny hafanana
  - type: note
    content: Heb. fahamainana.
  - type: text
    content: ' ny taolako.'
  '31':
  - type: text
    content: Nanjary fisaonana ny lokangako,
  - type: text
    content: Ary feon’ny mitomany ny sodiko.
  '4':
  - type: text
    content: Mitsongo anambodihena eo amin’ny kirihitrala izy,
  - type: text
    content: Ary ny fàkan’ny anjavidy
  - type: note
    content: Heb. rotema; izahao 1 Mpan xix. 4.
  - type: text
    content: ' no fihinany.'
  '5':
  - type: text
    content: Roahina tsy ho eo amin’ny olona izy
  - type: text
    content: Sady akoraina toy ny mpangalatra.
  '6':
  - type: text
    content: Any an-dohasaha mahatsiravina no tsy maintsy itoerany,
  - type: text
    content: Dia ao an-dava-tany sy an-dava-bato.
  '7':
  - type: text
    content: Minananana eny amin’ny kirihitrala izy
  - type: text
    content: Ary mitangorona eo ambanin’ny amiana.
  '8':
  - type: text
    content: Zanaky ny adala izy sady zanaky ny tsy manan-kaja,
  - type: text
    content: Ka roahina tsy ho eo amin’ny tany.
  '9':
  - type: text
    content: Ary ankehitriny efa ataony an-kira aho.
  - type: text
    content: Eny, efa ambentinteniny aho.
