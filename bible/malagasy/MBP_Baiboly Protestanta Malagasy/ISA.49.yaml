document_id: ISA.49
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Mpanompon’i Jehovah, Izay voatendry hamory sy hamonjy ny Isiraely sy ny firenena rehetra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHAINOA Ahy, ry nosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary atongilano ny sofinareo, ry firenena lavitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah efa niantso Ahy hatrany am-bohoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatry ny fony Aho mbola tao an-kibon’ineny no efa nankalazainy ny anarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nataony tahaka ny sabatra maranitra ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao amin’ny aloky ny tànany no nanafenany Ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nataony zana-tsipìka voalambolambo tsara Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teo amin’ny tranon-jana-tsipìkany no nanafenany Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izy tamiko: Mpanompoko Hianao, ry Isiraely ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay entiko mampiseho ny voninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy kosa Aho: Foana ny nisasarako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zava-poana sy tsinontsinona no nandaniako ny heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa ao amin’i Jehovah ny rariny tokony ho Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny valin’ny asako dia ao amin’Andriamanitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ankehitriny, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay namorona Ahy hatrany am-bohoka ho Mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampodiana ny Jakoba ho ao aminy indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamoriana ny Isiraely ho ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Fa mahazo voninahitra eo imason’i Jehovah Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitro no heriko),–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny, hoy Izy: Mbola zavatra kely foana, raha tonga Mpanompoko hanandratra ny firenen’i Jakoba Hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampody ny Isiraely sisa voaro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa homeko ho fanazavana ny jentilisa koa Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho famonjeko hatrany amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izao no lazain’i Jehovah, Mpanavotra ny Isiraely, dia ny Iray Masiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’Ilay hamavoin’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy halan’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka tonga mpanompon’ny mpanapaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanjaka hahita ka hitsangana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanapaka koa, ka dia hiankohoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny amin’i Jehovah, Izay mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny Iray Masin’ny Isiraely, Izay efa nifidy Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain’i Jehovah: Tamin’ny taona fankasitrahana no nihainoako Anao.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tamin’ny andro famonjena no namonjeko Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiaro Anao Aho ka hanome Anao ho fanekena ho an’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanangana ny tany indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampandova ny lova izay efa rava
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka hanao amin’ny mpifatotra hoe: Mivoaha,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’izay ao amin’ny maizina hoe: Misehoa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihinana eny an-dàlana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia any an-tendrombohitra mangadihady aza dia hisy ahitra ho azy ihany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ho noana na hangetaheta izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hamely azy ny hainandro migaingaina na ny masoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izay mamindra fo aminy no hitarika azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any amin’ny loharano miboiboika no hitondrany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hataoko làlana ny tendrombohitro rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasandratra ny làlambeko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indreo, tonga avy lavitra ireto;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary, indreo, avy any avaratra sy andrefana ireto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary avy any amin’ny tany Sinima ireto.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mihobia, ry lanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifalia, ry tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka velomy ny hoby, ry tendrombohitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah efa nampionona ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mamindra fo amin’ny olony mahantra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Ziona: Jehovah efa nahafoy ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Tompoko efa nanadino ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mety manadino ny zanany minono va ny vehivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hamindra fo amin’ny zanaka naloaky ny kibony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mety manadino ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho kosa tsy mba manadino anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, efa vitako tombo-kavatsa eo am-pelatànako hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny màndanao dia eo anatrehako mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tamy faingana ny zanakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nanimba sy nandrava anao dia miala aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Atopazy manodidina ny masonao, ka mijere;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo rehetra ireo dia mivory ka mankeo aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha velona koa Aho, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo rehetra ireo dia hihaingoanao tokoa tahaka ny firavaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hiravahanao tahaka ny fanaon’ny ampakarina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ny taninao rava sy ny fonenanao lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taninao simba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy ho omby amin’izany noho ny habetsahan’ny mponina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lasa lavitra ireo nihinana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanakao izay efa lasa teo dia mbola hilaza eo an-tsofinao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy omby ahy loatra ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mikisaha kely mba hitoerako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hanao anakampo hianao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no niteraka ireto ho ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa maty ny zanako, ary nitsaha-jaza aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babo aho sady noroahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa iza no namelona ireto?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, nilaozana ho irery aho, fa taiza kosa moa ireto?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izao no lazain’i Jehovah Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hanandratra ’ny tànako amin’ny jentilisa Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanangana ny fanevako amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitrotro ny zanakao eo an-tratrany ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanakao-vavy ho entiny eny an-tsorony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mpanjaka no ho rainao mpitaiza anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zanakavavin’andriana no ho reninao mpampinono anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiankohoka amin’ny tany eo anatrehanao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hilelaka ny vovoka amin’ny tongotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fantatrao fa Izaho no Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho menatra izay miandry Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Azo alaina eny amin’ny mahery va ny sambotra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho afaka va ny babo marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia ny sambotry ny mahery aza dia halaina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho afaka ny babon’ny mpandrombaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho no hiady amin’izay miady aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho no hamonjy ny zanakao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sady hampihinaniko ny nofon’ny tenany ihany izay mampahory anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho leon’ny ran’ny tenany ihany ireny, toy ny amin’ny ranom-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fantatry ny nofo rehetra fa Izaho Jehovah no Mpamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ilay Maherin’i Jakoba no Mpanavotra anao.
