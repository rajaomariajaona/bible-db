document_id: ISA.49,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Mpanompon’i Jehovah, Izay voatendry hamory sy hamonjy ny Isiraely sy ny firenena rehetra.
  - type: text
    content: MIHAINOA Ahy, ry nosy,
  - type: text
    content: Ary atongilano ny sofinareo, ry firenena lavitra;
  - type: text
    content: Jehovah efa niantso Ahy hatrany am-bohoka;
  - type: text
    content: Hatry ny fony Aho mbola tao an-kibon’ineny no efa nankalazainy ny anarako.
  '10':
  - type: text
    content: Tsy ho noana na hangetaheta izy,
  - type: text
    content: Ary tsy hamely azy ny hainandro migaingaina na ny masoandro;
  - type: text
    content: Fa Izay mamindra fo aminy no hitarika azy,
  - type: text
    content: Ary any amin’ny loharano miboiboika no hitondrany azy.
  '11':
  - type: text
    content: Hataoko làlana ny tendrombohitro rehetra,
  - type: text
    content: Ary hasandratra ny làlambeko.
  '12':
  - type: text
    content: Indreo, tonga avy lavitra ireto;
  - type: text
    content: Ary, indreo, avy any avaratra sy andrefana ireto,
  - type: text
    content: Ary avy any amin’ny tany Sinima ireto.
  '13':
  - type: text
    content: Mihobia, ry lanitra!
  - type: text
    content: Ary mifalia, ry tany!
  - type: text
    content: Ka velomy ny hoby, ry tendrombohitra!
  - type: text
    content: Fa Jehovah efa nampionona ny olony
  - type: text
    content: Sy mamindra fo amin’ny olony mahantra.
  '14':
  - type: text
    content: 'Fa hoy Ziona: Jehovah efa nahafoy ahy,'
  - type: text
    content: Ary ny Tompoko efa nanadino ahy.
  '15':
  - type: text
    content: Mety manadino ny zanany minono va ny vehivavy
  - type: text
    content: Ka tsy hamindra fo amin’ny zanaka naloaky ny kibony?
  - type: text
    content: Eny, mety manadino ihany izy,
  - type: text
    content: Fa Izaho kosa tsy mba manadino anao.
  '16':
  - type: text
    content: Indro, efa vitako tombo-kavatsa eo am-pelatànako hianao,
  - type: text
    content: Ary ny màndanao dia eo anatrehako mandrakariva.
  '17':
  - type: text
    content: Tamy faingana ny zanakao;
  - type: text
    content: Ary izay nanimba sy nandrava anao dia miala aminao.
  '18':
  - type: text
    content: Atopazy manodidina ny masonao, ka mijere;
  - type: text
    content: Ireo rehetra ireo dia mivory ka mankeo aminao;
  - type: text
    content: Raha velona koa Aho, hoy Jehovah,
  - type: text
    content: Ireo rehetra ireo dia hihaingoanao tokoa tahaka ny firavaka
  - type: text
    content: Sy hiravahanao tahaka ny fanaon’ny ampakarina.
  '19':
  - type: text
    content: Fa ny taninao rava sy ny fonenanao lao
  - type: text
    content: Ary ny taninao simba
  - type: text
    content: Dia tsy ho omby amin’izany noho ny habetsahan’ny mponina,
  - type: text
    content: Ary ho lasa lavitra ireo nihinana anao.
  '2':
  - type: text
    content: Ary nataony tahaka ny sabatra maranitra ny vavako;
  - type: text
    content: Tao amin’ny aloky ny tànany no nanafenany Ahy.
  - type: text
    content: Ary nataony zana-tsipìka voalambolambo tsara Aho;
  - type: text
    content: Teo amin’ny tranon-jana-tsipìkany no nanafenany Ahy.
  '20':
  - type: text
    content: 'Ny zanakao izay efa lasa teo dia mbola hilaza eo an-tsofinao hoe:'
  - type: text
    content: Tsy omby ahy loatra ity tany ity,
  - type: text
    content: Mikisaha kely mba hitoerako.
  '21':
  - type: text
    content: 'Dia hanao anakampo hianao hoe:'
  - type: text
    content: Iza no niteraka ireto ho ahy?
  - type: text
    content: Fa efa maty ny zanako, ary nitsaha-jaza aho.
  - type: text
    content: Babo aho sady noroahina,
  - type: text
    content: Koa iza no namelona ireto?
  - type: text
    content: Indro, nilaozana ho irery aho, fa taiza kosa moa ireto?
  '22':
  - type: text
    content: Izao no lazain’i Jehovah Tompo;
  - type: text
    content: Indro, hanandratra ’ny tànako amin’ny jentilisa Aho
  - type: text
    content: Ary hanangana ny fanevako amin’ny firenena;
  - type: text
    content: Dia hitrotro ny zanakao eo an-tratrany ireo,
  - type: text
    content: Ary ny zanakao-vavy ho entiny eny an-tsorony.
  '23':
  - type: text
    content: Mpanjaka no ho rainao mpitaiza anao,
  - type: text
    content: Ary zanakavavin’andriana no ho reninao mpampinono anao;
  - type: text
    content: Hiankohoka amin’ny tany eo anatrehanao izy
  - type: text
    content: Ka hilelaka ny vovoka amin’ny tongotrao;
  - type: text
    content: Dia ho fantatrao fa Izaho no Jehovah,
  - type: text
    content: Ka tsy ho menatra izay miandry Ahy.
  '24':
  - type: text
    content: Azo alaina eny amin’ny mahery va ny sambotra?
  - type: text
    content: Na ho afaka va ny babo marina?
  '25':
  - type: text
    content: 'Nefa izao no lazain’i Jehovah:'
  - type: text
    content: Na dia ny sambotry ny mahery aza dia halaina ihany,
  - type: text
    content: Ary ho afaka ny babon’ny mpandrombaka;
  - type: text
    content: Fa Izaho no hiady amin’izay miady aminao,
  - type: text
    content: Ary Izaho no hamonjy ny zanakao.
  '26':
  - type: text
    content: Sady hampihinaniko ny nofon’ny tenany ihany izay mampahory anao,
  - type: text
    content: Ary ho leon’ny ran’ny tenany ihany ireny, toy ny amin’ny ranom-boaloboka;
  - type: text
    content: Dia ho fantatry ny nofo rehetra fa Izaho Jehovah no Mpamonjy anao,
  - type: text
    content: Ary Ilay Maherin’i Jakoba no Mpanavotra anao.
  '3':
  - type: text
    content: 'Ary hoy Izy tamiko: Mpanompoko Hianao, ry Isiraely ô,'
  - type: text
    content: Izay entiko mampiseho ny voninahitro.
  '4':
  - type: text
    content: 'Fa hoy kosa Aho: Foana ny nisasarako,'
  - type: text
    content: Zava-poana sy tsinontsinona no nandaniako ny heriko;
  - type: text
    content: Kanefa ao amin’i Jehovah ny rariny tokony ho Ahy,
  - type: text
    content: Ary ny valin’ny asako dia ao amin’Andriamanitro.
  '5':
  - type: text
    content: Ary ankehitriny, hoy Jehovah,
  - type: text
    content: Izay namorona Ahy hatrany am-bohoka ho Mpanompony,
  - type: text
    content: Hampodiana ny Jakoba ho ao aminy indray
  - type: text
    content: Sy hamoriana ny Isiraely ho ao aminy,
  - type: text
    content: (Fa mahazo voninahitra eo imason’i Jehovah Aho,
  - type: text
    content: Ary Andriamanitro no heriko),–
  '6':
  - type: text
    content: 'Eny, hoy Izy: Mbola zavatra kely foana, raha tonga Mpanompoko hanandratra ny firenen’i Jakoba Hianao'
  - type: text
    content: Sy hampody ny Isiraely sisa voaro;
  - type: text
    content: Fa homeko ho fanazavana ny jentilisa koa Hianao,
  - type: text
    content: Mba ho famonjeko hatrany amin’ny faran’ny tany.
  '7':
  - type: text
    content: Izao no lazain’i Jehovah, Mpanavotra ny Isiraely, dia ny Iray Masiny,
  - type: text
    content: Amin’Ilay hamavoin’ny olona
  - type: text
    content: Sy halan’ny firenena
  - type: text
    content: 'Ka tonga mpanompon’ny mpanapaka:'
  - type: text
    content: Ny mpanjaka hahita ka hitsangana,
  - type: text
    content: Ary ny mpanapaka koa, ka dia hiankohoka
  - type: text
    content: Noho ny amin’i Jehovah, Izay mahatoky
  - type: text
    content: Dia ny Iray Masin’ny Isiraely, Izay efa nifidy Anao.
  '8':
  - type: text
    content: 'Izao no lazain’i Jehovah: Tamin’ny taona fankasitrahana no nihainoako Anao.'
  - type: text
    content: Ary tamin’ny andro famonjena no namonjeko Anao;
  - type: text
    content: Dia hiaro Anao Aho ka hanome Anao ho fanekena ho an’ny olona,
  - type: text
    content: Mba hanangana ny tany indray
  - type: text
    content: Sy hampandova ny lova izay efa rava
  '9':
  - type: text
    content: 'Ka hanao amin’ny mpifatotra hoe: Mivoaha,'
  - type: text
    content: 'Ary amin’izay ao amin’ny maizina hoe: Misehoa;'
  - type: text
    content: Hihinana eny an-dàlana izy,
  - type: text
    content: Ary na dia any an-tendrombohitra mangadihady aza dia hisy ahitra ho azy ihany;
