document_id: REV.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namahana ny tombo-kase enina.
  - type: text
    content: 'ARY nahita aho, rehefa novahan’ny Zanak’ondry ny anankiray tamin’ny tombo-kase fito, ary reko ny anankiray tamin’ny zava-manan-aina efatra, tahaka ny fikotrokotroky ny kotrokorana, nanao hoe: Avia.'
  - type: note
    content: 'Ampio hoe: [ka izahao].'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Ary niantso tamin’ny feo mahery izy nanao hoe: Tompo masina sy marina ô, mandra-pahoviana no tsy hitsaranao sy hamalianao ny ranay amin’izay monina eny ambonin’ny tany? '
  '11':
  - type: text
    content: Ary samy nomena akanjo fotsy lava izy rehetra; ary nasaina niala sasatra kely aloha izy mandra-pahatapitry ny mpanompo namany sy ny rahalahiny, izay efa hovonoina tahaka azy koa.
  '12':
  - type: text
    content: 'Ary nahita aho, rehefa novahany ny tombo-kase fahenina, dia nisy horohorontany mafy; ary tonga mainty tahaka ny lamba volon’osy fisaonana ny masoandro, ary tonga tahaka ny ra avokoa ny volana. '
  '13':
  - type: text
    content: 'Ary ny kintana tamin’ny lanitra dia niraraka tamin’ny tany, toy ny aviavy manintsana ny voany manta, raha hozongozonin’ny rivotra mahery izy. '
  '14':
  - type: text
    content: 'Dia lasa tahaka ny taratasy voahorona ny lanitra, ary ny tendrombohitra sy ny nosy rehetra dia nafindra niala tamin’ny fitoerany. '
  '15':
  - type: text
    content: 'Ary ny mpanjakan’ny tany sy ny lehibe sy ny mpifehy arivo sy ny mpanan-karena sy ny lehilahy mahery mbamin’ny andevo rehetra sy ny tsy andevo rehetra dia niery tao amin’ny lavaka sy tao amin’ny vatolampy eny an-tendrombohitra; '
  '16':
  - type: text
    content: 'ary hoy izy tamin’ny tendrombohitra sy ny vatolampy; Mianjerà aminay, ka afeno izahay amin’ny tavan’Ilay mipetraka eo ambonin’ny seza fiandrianana sy amin’ny fahatezeran’ny Zanak’ondry; '
  '17':
  - type: text
    content: fa tonga ny andro lehiben’ny fahatezeran’ireo,
  - type: note
    content: 'Na: ny fahatezerany.'
  - type: text
    content: ' ka iza no mahajanona?'
  '2':
  - type: text
    content: Ary hitako fa, indro, nisy soavaly fotsy; ary izay nitaingina azy dia nanana tsipìka; ary nomena satroboninahitra izy; dia nivoaka izy ka naharesy sady mbola haharesy.
  '3':
  - type: text
    content: 'Ary rehefa novahany ny tombo-kase faharoa, dia reko ny zava-manan-aina faharoa nanao hoe: Avia.'
  - type: note
    content: 'Ampio hoe: [ka izahao].'
  - type: text
    content: ' '
  '4':
  - type: text
    content: Dia nisy soavaly hafa mena kosa nivoaka; ary izay nitaingina azy dia navela hanaisotra ny fihavanana amin’ny tany mba hifamonoan’ny olona; ary nomena sabatra lehibe izy.
  '5':
  - type: text
    content: 'Ary rehefa novahany ny tombo-kase fahatelo, dia reko ny zava-manan-aina fahatelo nanao hoe: Avia.'
  - type: note
    content: 'Ampio hoe: [ka izahao].'
  - type: text
    content: ' Ary hitako fa, indro, nisy soavaly mainty: ary izay nitaingina azy nitondra mizana teny an-tànany. '
  '6':
  - type: text
    content: 'Ary nahare aho, ka toa nisy feo teo afovoan’ny zava-manan-aina efatra nanao hoe: Venty'
  - type: note
    content: Gr. denaria.
  - type: text
    content: ' ny vary tritika eran’ny fatam-bary kely,'
  - type: note
    content: Gr. koiniksa.
  - type: text
    content: ' ary venty'
  - type: note
    content: Gr. denaria.
  - type: text
    content: ' koa ny vary hordea intelon’ny fatam-bary;'
  - type: note
    content: Gr. koiniksa.
  - type: text
    content: ' ary aza manimba ny diloilo na ny divay hianao.'
  '7':
  - type: text
    content: 'Ary rehefa novahany ny tombo-kase fahefatra, dia reko ny feon’ny zava-manan-aina fahefatra nanao hoe: Avia.'
  - type: note
    content: 'Ampio hoe: [ka izahao].'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Ary hitako fa, indro, nisy soavaly hatsatra, ary ny anaran’izay nitaingina azy atao hoe Fahafatesana, ary ny Fiainan-tsi-hita
  - type: note
    content: Gr. Hadesy.
  - type: text
    content: ' nanaraka azy. Ary nomena fahefana tamin’ny ampahefatry ny tany ireo hamono amin’ny sabatra sy ny mosary sy ny fahafatesana sy ny bibi-dia etỳ an-tany.'
  '9':
  - type: text
    content: 'Ary rehefa novahany ny tombo-kase fahadimy, dia hitako teo ambanin’ny alitara ny fanahin’izay voavono noho ny tenin’Andriamanitra sy ny filazana izay nohazoniny. '
