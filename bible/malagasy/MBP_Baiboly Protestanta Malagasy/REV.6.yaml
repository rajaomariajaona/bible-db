document_id: REV.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namahana ny tombo-kase enina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY nahita aho, rehefa novahan’ny Zanak’ondry ny anankiray tamin’ny tombo-kase fito, ary reko ny anankiray tamin’ny zava-manan-aina efatra, tahaka ny fikotrokotroky ny kotrokorana, nanao hoe: Avia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka izahao].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary niantso tamin’ny feo mahery izy nanao hoe: Tompo masina sy marina ô, mandra-pahoviana no tsy hitsaranao sy hamalianao ny ranay amin’izay monina eny ambonin’ny tany? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary samy nomena akanjo fotsy lava izy rehetra; ary nasaina niala sasatra kely aloha izy mandra-pahatapitry ny mpanompo namany sy ny rahalahiny, izay efa hovonoina tahaka azy koa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nahita aho, rehefa novahany ny tombo-kase fahenina, dia nisy horohorontany mafy; ary tonga mainty tahaka ny lamba volon’osy fisaonana ny masoandro, ary tonga tahaka ny ra avokoa ny volana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny kintana tamin’ny lanitra dia niraraka tamin’ny tany, toy ny aviavy manintsana ny voany manta, raha hozongozonin’ny rivotra mahery izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia lasa tahaka ny taratasy voahorona ny lanitra, ary ny tendrombohitra sy ny nosy rehetra dia nafindra niala tamin’ny fitoerany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny mpanjakan’ny tany sy ny lehibe sy ny mpifehy arivo sy ny mpanan-karena sy ny lehilahy mahery mbamin’ny andevo rehetra sy ny tsy andevo rehetra dia niery tao amin’ny lavaka sy tao amin’ny vatolampy eny an-tendrombohitra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary hoy izy tamin’ny tendrombohitra sy ny vatolampy; Mianjerà aminay, ka afeno izahay amin’ny tavan’Ilay mipetraka eo ambonin’ny seza fiandrianana sy amin’ny fahatezeran’ny Zanak’ondry; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa tonga ny andro lehiben’ny fahatezeran’ireo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fahatezerany.
      marker-yv: yv-n
    - type: text
      text: ' ka iza no mahajanona?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary hitako fa, indro, nisy soavaly fotsy; ary izay nitaingina azy dia nanana tsipìka; ary nomena satroboninahitra izy; dia nivoaka izy ka naharesy sady mbola haharesy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa novahany ny tombo-kase faharoa, dia reko ny zava-manan-aina faharoa nanao hoe: Avia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka izahao].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia nisy soavaly hafa mena kosa nivoaka; ary izay nitaingina azy dia navela hanaisotra ny fihavanana amin’ny tany mba hifamonoan’ny olona; ary nomena sabatra lehibe izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary rehefa novahany ny tombo-kase fahatelo, dia reko ny zava-manan-aina fahatelo nanao hoe: Avia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka izahao].'
      marker-yv: yv-n
    - type: text
      text: ' Ary hitako fa, indro, nisy soavaly mainty: ary izay nitaingina azy nitondra mizana teny an-tànany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nahare aho, ka toa nisy feo teo afovoan’ny zava-manan-aina efatra nanao hoe: Venty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: denaria.
      marker-yv: yv-n
    - type: text
      text: ' ny vary tritika eran’ny fatam-bary kely,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: koiniksa.
      marker-yv: yv-n
    - type: text
      text: ' ary venty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: denaria.
      marker-yv: yv-n
    - type: text
      text: ' koa ny vary hordea intelon’ny fatam-bary;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: koiniksa.
      marker-yv: yv-n
    - type: text
      text: ' ary aza manimba ny diloilo na ny divay hianao.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary rehefa novahany ny tombo-kase fahefatra, dia reko ny feon’ny zava-manan-aina fahefatra nanao hoe: Avia.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka izahao].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary hitako fa, indro, nisy soavaly hatsatra, ary ny anaran’izay nitaingina azy atao hoe Fahafatesana, ary ny Fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hadesy.
      marker-yv: yv-n
    - type: text
      text: ' nanaraka azy. Ary nomena fahefana tamin’ny ampahefatry ny tany ireo hamono amin’ny sabatra sy ny mosary sy ny fahafatesana sy ny bibi-dia etỳ an-tany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary rehefa novahany ny tombo-kase fahadimy, dia hitako teo ambanin’ny alitara ny fanahin’izay voavono noho ny tenin’Andriamanitra sy ny filazana izay nohazoniny. '
