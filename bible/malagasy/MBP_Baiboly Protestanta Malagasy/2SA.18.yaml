document_id: 2SA.18,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Davida nandamina ny olona izay nomba azy ka nanendry mpifehy arivo sy mpifehy zato hifehy azy. '
  '10':
  - type: text
    content: 'Ary nisy lehilahy anankiray nahita izany, dia nanambara tamin’i Joaba hoe: Indro, hitako mihantona amin’ny hazo terebinta Absaloma. '
  '11':
  - type: text
    content: 'Ary hoy Joaba tamin’ilay lehilahy nilaza taminy: Koa nahoana, raha nahita azy hianao, no tsy nasianao hianjera amin’ny tany izy, ka dia tsy maintsy ho nomeko sekely volafotsy folo sy fehin-kibo hianao? '
  '12':
  - type: text
    content: 'Fa hoy ralehilahy tamin’i Joaba: Na dia efa mby an-tànako aza ny sekely volafotsy arivo, tsy haninjitra ny tànako hamely ny zanaky ny mpanjaka aho; fa teo anatrehanay no nandidian’ny mpanjaka anao sy Abisay ary Itahy hoe: Samia mitandrina an’i Absaloma zatovo. '
  '13':
  - type: text
    content: Tsy misy zavatra azo afenina amin’ny mpanjaka, koa raha nanao hafahafa taminy aho, na dia hianao io aza dia ho nitsangana hanameloka ahy.
  - type: note
    content: 'Na: ho nahafoy ahy.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Dia hoy Joaba: Tsy handany andro foana eto aminao aho. Ary nitondra lefona telo teny an-tànany izy, ka natsatony tamin’ny fon’i Absaloma, raha mbola velona teo amin’ny hazo terebinta izy. '
  '15':
  - type: text
    content: Ary nisy tovolahy folo, mpitondra ny fiadian’i Joaba, nanodidina an’i Absaloma ka namely azy ho faty.
  '16':
  - type: text
    content: 'Ary Joaba nitsoka ny anjomara, ka dia niverina avy nanenjika ny Isiraely ny vahoaka, satria niantran’i Joaba izy. '
  '17':
  - type: text
    content: Dia nalain’ny olona Absaloma ka natsipiny tao an-davaka lehibe anankiray tao anaty ala, dia nasiany antontam-bato lehibe teo amboniny; ary ny Isiraely rehetra samy nandositra ho any amin’ny lainy avy.
  '18':
  - type: text
    content: 'Ary fony mbola velona Absaloma, dia efa naka vato izy ka nanao ilay tsangam-bato ho azy tao an-Dohasahan’ny Mpanjaka, fa hoy izy: Tsy manan-janakalahy hamelo-maso ahy aho; ary dia nataony araka ny anaran’ny tenany ihany ilay tsangam-bato, ka mbola atao hoe ,Fahatsiarovana an’i Absaloma’ no anarany mandraka andro-any.'
  - type: heading
    content: Ny nandrenesan’i Davida ny nahafatesan’i Absaloma sy ny hamafin’ny alahelony azy.
  '19':
  - type: text
    content: 'DIA hoy Ahimaza, zanak’i Zadoka: Aoka aho hihazakazaka hitondra teny mahafaly ho any amin’ny mpanjaka ny amin’ny nanomezan’i Jehovah azy ny rariny ka nahafahany tamin’ny fahavalony. '
  '2':
  - type: text
    content: Ary Davida nampandeha ny olona, ka ny ampahatelony nofehezin’i Joaba, ary ny ampahatelony nofehezin’i Abisay, zanak’i Zeroia, rahalahin’i Joaba, ary ny ampahatelony kosa nofehezin’Itahy Gatita.
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ny vahoaka: Izaho koa dia handeha hiaraka aminareo tokoa. '
  '20':
  - type: text
    content: 'Fa hoy Joaba taminy: Tsy ho mpitondra teny mahafaly hianao, raha mandeha anio, satria maty ny zanakalahin’ny mpanjaka, fa andro hafa dia mbola hitondra teny mahafaly ihany hianao.'
  '21':
  - type: text
    content: 'Ary hoy Joaba tamin’ilay Kosita: Andeha, ambarao amin’ny mpanjaka izay efa hitanao. Ary ilay Kosita niankohoka teo anatrehan’i Joaba, dia lasa nihazakazaka.'
  '22':
  - type: text
    content: 'Fa Ahimaza, zanak’i Zadoka, dia mbola niteny tamin’i Joaba ihany nanao hoe: Ka nahoana aza, aoka ihany aho mba hiezaka koa hanaraka ilay Kosita. Fa hoy Joaba: Ahoana no hiezahanao, anaka; fa na dia mandeha aza hianao, tsy hisy teny mahafaly hahazoanao fitia tsinona? '
  '23':
  - type: text
    content: 'Ka nahoana aza, '
  - type: text
    content: 'hoy izy:'
  - type: text
    content: ' Aoka ihany aho hiezaka. Dia hoy Joaba taminy: Miezaha ary. Ary dia niezaka tamin’ny làlana eny amin’ny lemaka Ahimaza ka nihoatra an’ilay Kosita.'
  '24':
  - type: text
    content: 'Ary Davida nipetraka teo anelanelan’ny vavahady roa; ary ny mpitily niakatra teo ambony vavahady teo amin’ny mànda, ka nanopy ny masony, dia nahita, ka indrỳ misy lehilahy iray mihazakazaka. '
  '25':
  - type: text
    content: 'Ary ny mpitily niantso ka nilaza tamin’ny mpanjaka. Dia hoy ny mpanjaka: Raha irery izy, dia ho teny mahafaly no entiny. Ary mbola nanatona nanatona ihany ralehilahy. '
  '26':
  - type: text
    content: 'Ary ny mpitily nahita lehilahy iray koa nihazakazaka, dia niantso ny mpiandry vavahady izy nanao hoe: Indrỳ koa misy lehilahy iray tamy mihazakazaka. Dia hoy ny mpanjaka: Mitondra teny mahafaly ihany koa izy. '
  '27':
  - type: text
    content: 'Ary hoy ny mpitily: Raha toa ahy, dia tahaka ny fihazakazak’i Ahimaza, zanak’i Zadoka, no fihazakazak’iny aloha. Ary hoy ny mpanjaka: Lehilahy tsara fanahy iny, ka hitondra teny soa mahafaly no ihaviany.'
  '28':
  - type: text
    content: 'Ary Ahimaza niantso ka nanao tamin’ny mpanjaka hoe: Fiadanana! sady niankohoka tamin’ny tany teo anatrehan’ny mpanjaka izy ka nanao hoe: Isaorana anie Jehovah Andriamanitrao, Izay efa nanolotra ny olona nanainga tànana hikomy amin’ny mpanjaka tompoko.'
  '29':
  - type: text
    content: 'Dia hoy ny mpanjaka: Tsara ihany va Absaloma zatovo? Fa hoy Ahimaza: Tamin’ny nanirahan’i Joaba ny mpanompon’ny mpanjaka sy izaho mpanomponao koa dia nandre tabataba be aho, nefa tsy fantatro izay antony. '
  '3':
  - type: text
    content: 'Fa hoy ny vahoaka: Tsy avelanay handeha hianao; fa raha mandositra izahay, dia tsy hahoany; ary na matiny sasaka aza izahay, dia tsy hahoany akory; fa hianao no hoatra ny iray alina aminay; koa tsara raha hamonjy anay avy tao an-tanàna hianao. '
  '30':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Mitanilà kely ary, ka mijanòna etsy; dia nitanila izy ka nitoetra teo.'
  '31':
  - type: text
    content: 'Ary, indro, avy ilay Kosita ka nanao hoe: Aoka ny mpanjaka tompoko hihaino teny mahafaly; fa Jehovah efa nanome anao ny rariny ka nahafaka anao ankehitriny tamin’izay rehetra nitsangana hikomy aminao. '
  '32':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’ilay Kosita: Tsara ihany va Absaloma zatovo? Fa hoy ilay Kosita: Aoka ny fahavalon’ny mpanjaka tompoko sy izay rehetra mitsangana hanisy ratsy anao ho tahaka iny zatovo iny.'
  '4':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Izay sitrakareo ary no hataoko.'
  - type: text
    content: 'Dia nitsangana teo anilan’ny vavahady ny mpanjaka, ary ny vahoaka rehetra nivoaka isan-jato sy isan-arivo. '
  '5':
  - type: text
    content: 'Ary ny mpanjaka nandidy an’i Joaba sy Abisay ary Itahy hoe: Noho ny amiko dia mamindrà fo amin’i Absaloma zatovo. Ary ny olona rehetra dia nahare ny nandidian’ny mpanjaka ny mpifehy rehetra ny amin’i Absaloma.'
  '6':
  - type: text
    content: 'Ka dia nivoaka teny an-tsaha ny vahoaka hiady amin’ny Isiraely, ka rafitra tao amin’ny alan’i Efraima ny ady; '
  '7':
  - type: text
    content: 'ary resy tao ny lehilahy amin’ny Isiraely teo anoloan’ny mpanompon’i Davida, ka be dia be no ringana androtrizay, dia olona roa alina. '
  '8':
  - type: text
    content: Fa nihahakahaka teny rehetra teny ny ady; ka ny matin’ny ala androtrizay dia be noho ny matin’ny sabatra.
  '9':
  - type: text
    content: 'Ary Absaloma nifanehatra tamin’ny mpanompon’i Davida. Ary nitaingina ampondra izy, ary ny ampondra nandeha teo ambanin’ny rantsan-kazo mikirindro tamin’ny hazo terebinta, ka voahazon’ny hazo terebinta ny lohan’i Absaloma, ka dia nikiraviravy teo anelanelan’ny lanitra sy ny tany izy; fa lasa ny ampondra nitaingenany. '
