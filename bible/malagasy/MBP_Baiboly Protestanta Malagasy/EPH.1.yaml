document_id: EPH.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana nataon’i Paoly, sy fiderany an’Andriamanitra noho ny soa avy amin’ny avotra nataon’i Kristy.
  - type: text
    content: PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, mamangy ny olona masina any Efesosy, izay mahatoky ao amin’
  - type: note
    content: 'Na: mino an’.'
  - type: text
    content: ' i Kristy Jesosy: '
  '10':
  - type: text
    content: hahatanterahany ny fitondrana hatao mandra-pahatapitry ny andro voatendry, hanangonany
  - type: note
    content: 'Na: hanangonany indray.'
  - type: text
    content: ' ny zavatra rehetra ho iray ao amin’i Kristy, na ny any an-danitra, na ny etỳ an-tany, dia ho ao aminy; '
  '11':
  - type: text
    content: ao aminy koa no nanaovana antsika ho lovany,
  - type: note
    content: 'Na: no nandraisantsika ny lova.'
  - type: text
    content: ' rehefa notendrena rahateo isika araka ny fikasan’Izay mahefa ny zavatra rehetra araka ny ankasitrahan’ny fony, '
  '12':
  - type: text
    content: 'mba ho fiderana ny voninahiny izahay, izay nanantena an’i Kristy rahateo. '
  '13':
  - type: text
    content: 'Ao aminy koa hianareo, rehefa renareo ny tenin’ny fahamarinana, dia ny filazantsara famonjena anareo,–eny, ao aminy koa hianareo, rehefa nino, no nasiana tombo-kase tamin’ny Fanahy Masina araka ny teny fikasana. '
  '14':
  - type: text
    content: 'Izany Fanahy izany no santatry ny lovantsika ho amin’ny fanavotana '
  - type: text
    content: ny olona
  - type: text
    content: ' izay nalainy ho an’ny tenany, ho fiderana ny voninahiny.'
  - type: heading
    content: Fivavahana ho an’ny Kristiana tao Efesosy mba handrosoany hahalala ny hatsaran’ny famonjena, sy fampahatsiarovana azy ny halehiben’ny fitiavan’Andriamanitra.
  '15':
  - type: text
    content: 'ARY noho izany izaho koa, rehefa nandre ny finoanareo an’i Jesosy Tompo '
  - type: text
    content: izay hitan’
  - type: text
    content: ' '
  - type: note
    content: 'Na: [ny finoanareo an’i Jesosy Tompo sy ny fitiavanareo].'
  - type: text
    content: 'ny olona masina rehetra, '
  '16':
  - type: text
    content: 'dia tsy mitsahatra misaotra noho ny aminareo ka mahatsiaro '
  - type: text
    content: anareo
  - type: text
    content: ' amin’ny fivavahako, '
  '17':
  - type: text
    content: 'mba homen’Andriamanitr’i Jesosy Kristy Tompontsika, Rain’ny voninahitra, ho anareo ny fanahin’ny fahendrena sy ny fanambarana amin’ny fahalalana Azy tsara, '
  '18':
  - type: text
    content: 'ary mba hampahiratina ny mason’ny sainareo, mba ho fantatrareo izay fanantenana avy amin’ny fiantsoany sy izay haren’ny voninahitry ny lovany eo amin’ny olona masina, '
  '19':
  - type: text
    content: 'ary ny fihoaran’ny halehiben’ny heriny ho antsika izay mino, araka ny fiàsan’ny herin’ny faherezany, '
  '2':
  - type: text
    content: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  '20':
  - type: text
    content: 'izay nataony tao amin’i Kristy tamin’ny nananganany Azy tamin’ny maty sy ny nampitoerany Azy eo amin’ny tànany ankavanana any an-danitra, '
  '21':
  - type: text
    content: 'ambony lavitra noho ny fanapahana rehetra sy ny fahefana sy ny hery sy ny fanjakana ary ny anarana rehetra izay tononina, tsy amin’izao fiainana izao ihany, fa amin’ny ho avy koa, '
  '22':
  - type: text
    content: dia nampanaiky ny zavatra rehetra ho eo ambanin’ny tongony Izy ka nanao Azy ho Lohany manapaka ny zavatra rehetra ho an’ny fiangonana,
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' '
  '23':
  - type: text
    content: izay tenany, dia ny fahafenoan’Izay mameno izao zavatra rehetra izao amin’ny rehetra.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy Kristy Tompontsika, Izay nitahy antsika tao amin’i Kristy amin’ny fitahiam-panahy rehetra any an-danitra, '
  '4':
  - type: text
    content: 'araka ny nifidianany antsika tao aminy, fony tsy mbola ary ny fanorenan’izao tontolo izao, mba ho masina sady tsy misy tsiny eo anatrehany isika, '
  '5':
  - type: text
    content: rehefa notendreny rahateo amin’ny fitiavana isika mba ho Azy
  - type: note
    content: 'Na: amin’ny fitiavana, rehefa notendreny rahateo ho Azy isika.'
  - type: text
    content: ' amin’ny fananganan-anaka amin’ny alalan’i Jesosy Kristy, araka izay ankasitrahan’ny fony, '
  '6':
  - type: text
    content: ho fiderana ny voninahitry ny fahasoavany, izay nanasoavany antsika maimaimpoana ao amin’ny Malala.
  '7':
  - type: text
    content: 'Izy no ananantsika fanavotana amin’ny rany, dia ny famelana ny fahadisoantsika, araka ny haren’ny fahasoavany, '
  '8':
  - type: text
    content: 'izay nataony be ho antsika tamin’ny fahendrena sy ny fisainana rehetra, '
  '9':
  - type: text
    content: 'rehefa nampahafantariny ny zava-miafina ny amin’ny sitrapony isika, araka ny safidiny izay nokasain’ny tenany, '
