document_id: HOS.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoinareo izao, ry mpisorona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandrenesa, ry taranak’Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary atongilano ny sofinareo, ry mpianakavin’ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianareo no hihiran’ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tonga fandrika ao Mizpa hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fandrika harato voavelatra ao Tabara.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanapaka ny Joda dia efa tonga toy izay mamindra faritany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ireo no hampidinako ny fahatezerako toy ny fampidina rano.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahorina Efraima sady voatorotoron’ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ninia nanaraka didin’
    - type: usfm
      marker: it
      children:
      - type: text
        text: olombelona
    - type: text
      text: ' izy,'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa amin’i Efraima dia tahaka ny kalalao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny taranak’i Joda dia toy ny fositra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: momoka.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa hitan’i Efraima ny aretiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Joda ny feriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nankany amin’ny Asyriana Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, naniraka ho any amin’i Jareba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jareba = Mpandahatra '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpiady.
      marker-yv: yv-n
    - type: text
      text: ' mpanjaka izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa izy tsy mahasitrana anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mampanaritra ny ferinareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’i Efraima dia tahaka ny liona Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’ny taranak’i Joda dia tahaka ny liona tanora:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia Izaho no mamiravira, dia lasa mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahalasa Aho, ka tsy misy mahavonjy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha hody any amin’ny fitoerako Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-piaikiny ny helony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hitadiavany ny tavako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa azom-pahoriana izy, dia hitady Ahy fatratra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpivadika dia fatra-pamono;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fatra-panao ratsy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho kosa famaizana azy rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho mahalala an’i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Isiraely tsy takona amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia tonga mpijangajanga hianao, ry Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaloto Isiraely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy avelan’ny ataony hiverina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mety manao izay hiverenany.
      marker-yv: yv-n
    - type: text
      text: ' amin’Andriamanitra izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fanahim-pijangajangana no ao anatiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah tsy fantany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny avonavon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Reharehany.
      marker-yv: yv-n
    - type: text
      text: ' Isiraely dia vavolombelona manameloka azy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Isiraely, indrindra fa Efraima, ho lavon-keloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joda hiara-davo aminy koa.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitondra ny ombiny aman-ondriny izy ka handeha hitady an’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy hahita Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah efa niala taminy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivadika tamin’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niteraka zaza sary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia ho levon’ny voaloham-bolana izy mbamin’ny zara-lovany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsofy ao Gibea ny anjomara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny trompetra ao Rama!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miantsoa mafy ao Betavena!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inay! misy manenjika anao, ry Benjamina!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lao Efraima, raha mby amin’ny andro fanamelohana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy maintsy ho to no nambarako tao amin’ny firenen’Isiraely.
