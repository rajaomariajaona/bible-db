document_id: HOS.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Henoinareo izao, ry mpisorona,
  - type: text
    content: Ary mandrenesa, ry taranak’Isiraely;
  - type: text
    content: Ary atongilano ny sofinareo, ry mpianakavin’ny mpanjaka;
  - type: text
    content: Fa hianareo no hihiran’ny fitsarana,
  - type: text
    content: Satria tonga fandrika ao Mizpa hianareo
  - type: text
    content: Sy fandrika harato voavelatra ao Tabara.
  '10':
  - type: text
    content: Ny mpanapaka ny Joda dia efa tonga toy izay mamindra faritany,
  - type: text
    content: Ka dia ireo no hampidinako ny fahatezerako toy ny fampidina rano.
  '11':
  - type: text
    content: Ampahorina Efraima sady voatorotoron’ny fitsarana,
  - type: text
    content: Satria ninia nanaraka didin’
  - type: text
    content: olombelona
  - type: text
    content: ' izy,'
  '12':
  - type: text
    content: Koa amin’i Efraima dia tahaka ny kalalao Aho
  - type: text
    content: Ary amin’ny taranak’i Joda dia toy ny fositra.
  - type: note
    content: 'Na: momoka.'
  '13':
  - type: text
    content: Rehefa hitan’i Efraima ny aretiny,
  - type: text
    content: Ary Joda ny feriny,
  - type: text
    content: Dia nankany amin’ny Asyriana Efraima,
  - type: text
    content: Eny, naniraka ho any amin’i Jareba
  - type: note
    content: Jareba = Mpandahatra na Mpiady.
  - type: text
    content: ' mpanjaka izy;'
  - type: text
    content: Nefa izy tsy mahasitrana anareo,
  - type: text
    content: Na mampanaritra ny ferinareo.
  '14':
  - type: text
    content: Fa amin’i Efraima dia tahaka ny liona Aho,
  - type: text
    content: 'Ary amin’ny taranak’i Joda dia tahaka ny liona tanora:'
  - type: text
    content: Izaho dia Izaho no mamiravira, dia lasa mandeha;
  - type: text
    content: Mahalasa Aho, ka tsy misy mahavonjy.
  '15':
  - type: text
    content: Handeha hody any amin’ny fitoerako Aho
  - type: text
    content: Ambara-piaikiny ny helony
  - type: text
    content: Sy hitadiavany ny tavako.
  - type: text
    content: Rehefa azom-pahoriana izy, dia hitady Ahy fatratra.
  '2':
  - type: text
    content: Ny mpivadika dia fatra-pamono;
  - type: note
    content: 'Na: fatra-panao ratsy.'
  - type: text
    content: Fa Izaho kosa famaizana azy rehetra.
  '3':
  - type: text
    content: Izaho mahalala an’i Efraima,
  - type: text
    content: Ary Isiraely tsy takona amiko;
  - type: text
    content: Ankehitriny dia tonga mpijangajanga hianao, ry Efraima,
  - type: text
    content: Voaloto Isiraely.
  '4':
  - type: text
    content: Tsy avelan’ny ataony hiverina
  - type: note
    content: 'Na: Tsy mety manao izay hiverenany.'
  - type: text
    content: ' amin’Andriamanitra izy;'
  - type: text
    content: Fa ny fanahim-pijangajangana no ao anatiny,
  - type: text
    content: Ary Jehovah tsy fantany.
  '5':
  - type: text
    content: Ary ny avonavon’
  - type: note
    content: 'Na: ny Reharehany.'
  - type: text
    content: ' Isiraely dia vavolombelona manameloka azy;'
  - type: text
    content: Ary Isiraely, indrindra fa Efraima, ho lavon-keloka;
  - type: text
    content: Joda hiara-davo aminy koa.
  '6':
  - type: text
    content: Hitondra ny ombiny aman-ondriny izy ka handeha hitady an’i Jehovah.
  - type: text
    content: Nefa tsy hahita Azy;
  - type: text
    content: Jehovah efa niala taminy.
  '7':
  - type: text
    content: Nivadika tamin’i Jehovah izy,
  - type: text
    content: Fa niteraka zaza sary;
  - type: text
    content: Ankehitriny dia ho levon’ny voaloham-bolana izy mbamin’ny zara-lovany.
  '8':
  - type: text
    content: Tsofy ao Gibea ny anjomara
  - type: text
    content: Ary ny trompetra ao Rama!
  - type: text
    content: Miantsoa mafy ao Betavena!
  - type: text
    content: Inay! misy manenjika anao, ry Benjamina!
  '9':
  - type: text
    content: Ho lao Efraima, raha mby amin’ny andro fanamelohana;
  - type: text
    content: Izay tsy maintsy ho to no nambarako tao amin’ny firenen’Isiraely.
