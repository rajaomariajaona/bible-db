document_id: ISA.59,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny ota, izay efitra fisarahana, sy ny fandravana azy.
  - type: text
    content: INDRO, ny tànan’i Jehovah tsy fohy, fa mahavonjy,
  - type: text
    content: Ary ny sofiny tsy lalodalovana, fa mahare;
  '10':
  - type: text
    content: Mitsapatsapa manara-drindrina tahaka ny jamba isika
  - type: text
    content: Eny, mitsapatsapa tahaka ny tsy mana-maso;
  - type: text
    content: Tafintohina amin’ny mitataovovonana tahaka ny amin’ny maizimaizina isika,
  - type: text
    content: Ary eo amin’ny matanjaka
  - type: note
    content: 'Na: any an-efitra.'
  - type: text
    content: ' dia tahaka ny maty isika.'
  '11':
  - type: text
    content: Isika rehetra mampierona tahaka ny bera
  - type: text
    content: Ary mitoloko tokoa tahaka ny voromailala;
  - type: text
    content: Miandry ny rariny isika, nefa tsy misy,
  - type: text
    content: Ary ny famonjena, nefa lavitra antsika izany.
  '12':
  - type: text
    content: Fa efa betsaka eo anatrehanao ny fiodinanay,
  - type: text
    content: Ary ny fahotanay miampanga anay;
  - type: text
    content: Eny, tsaroanay ny fahadisoanay,
  - type: text
    content: Ary ny helokay dia fantatray,
  '13':
  - type: text
    content: Dia ny miodina sy ny mandà an’i Jehovah.
  - type: text
    content: Ary ny miala amin’ny fanarahana an’Andriamanitray,
  - type: text
    content: Ny miteny fampahoriana sy fikomiana,
  - type: text
    content: Ary ny mamorona
  - type: note
    content: Heb. torontoronina.
  - type: text
    content: ' sy mamoaka teny lainga avy ao am-po.'
  '14':
  - type: text
    content: Nahemotra ny rariny,
  - type: text
    content: Ary mijanon-davitra ny hitsiny;
  - type: text
    content: Fa tafintohina eny an-kalalahana ny fahamarinana,
  - type: text
    content: Ary ny hitsim-po tsy mahazo miditra.
  '15':
  - type: text
    content: Eny, tsy eo ny fahamarinana;
  - type: text
    content: Ary izay mifady ny ratsy dia hoatra ny manolo-tena hobaboin’ny sasany.
  - type: text
    content: Ary hitan’i Jehovah ny tsi-fisian’ny rariny,
  - type: text
    content: Ka nataony fa ratsy izany;
  '16':
  - type: text
    content: Eny, hitany fa tsy nisy olona,
  - type: text
    content: Sady talanjona Izy, satria tsy nisy mpanalalana,
  - type: text
    content: Ka dia ny sandriny ihany no nanao famonjena ho Azy,
  - type: text
    content: Ary ny fahamarinany no nanohana Azy.
  '17':
  - type: text
    content: Niakanjo fahamarinana tahaka ny akanjo fiarovan-tratra Izy,
  - type: text
    content: Ary fiarovan-doha famonjena no teo amin’ny lohany;
  - type: text
    content: Ary niakanjo ny akanjo famaliana Izy
  - type: text
    content: Eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy.
  '18':
  - type: text
    content: Araka ny asa natao no hamaliany,
  - type: text
    content: Dia fahatezerana mirehitra ho an’ny fahavalony,
  - type: text
    content: Famaliana ho an’ny rafiny;
  - type: text
    content: Ary ny nosy dia hovaliany tokoa.
  '19':
  - type: text
    content: Ary hatrany andrefana dia hatahotra ny anaran’i Jehovah ny olona
  - type: text
    content: Ary ny voninahiny hatramin’ny fiposahan’ny masoandro;
  - type: text
    content: Ary ny fihaviny dia ho toy ny rano maria,
  - type: text
    content: Ampandehanin’ny Fanahin’i Jehovah.
  - type: note
    content: 'Na: Fa raha avy toy ny ony ny fahavalo. Ny Fanahin’i Jehovah hanangana faneva hisakanana azy.'
  '2':
  - type: text
    content: Fa ny helokareo no efitra mampisaraka anareo amin’Andriamanitrareo,
  - type: text
    content: Ary ny fahotanareo no mampiafina ny tavany aminareo, ka dia tsy mihaino Izy.
  '20':
  - type: text
    content: Dia hisy Mpanavotra ho tonga any Ziona,
  - type: text
    content: Ho amin’ny Jakoba izay miala amin’ny fahadisoana, hoy Jehovah.
  '21':
  - type: text
    content: 'Raha Izaho, dia izao no fanekeko aminy, hoy Jehovah:'
  - type: text
    content: Ny Fanahiko Izay ao aminao
  - type: text
    content: Sy ny teniko izay nataoko teo am-bavanao
  - type: text
    content: Dia tsy hiala amin’ny vavanao,
  - type: text
    content: Na amin’ny vavan’ny taranakao,
  - type: text
    content: Na amin’ny vavan’ny taranaky ny taranakao,
  - type: text
    content: Hatramin’izao ka ho mandrakizay, hoy Jehovah.
  '3':
  - type: text
    content: Fa ny tànanareo dia voaloto amin’ny ra,
  - type: text
    content: Ary ny rantsan-tànanareo amin’ny heloka;
  - type: text
    content: Ny molotrareo miteny lainga,
  - type: text
    content: Ny lelanareo mibedibedy faharatsiana.
  '4':
  - type: text
    content: Tsy misy mitory olona araka ny fahamarinana,
  - type: text
    content: Na mandahatra ny rariny araka izay mahatoky;
  - type: text
    content: Matoky ny tsy izy sy miteny zava-poana izy;
  - type: text
    content: Torontoronina fampahoriana izy ka miteraka fandozana.
  '5':
  - type: text
    content: Mikotrika ny atodin’ny menarana izy
  - type: text
    content: Ary manenona ny tranon-kala;
  - type: text
    content: Izay homana ny atodin’ireny dia ho faty,
  - type: text
    content: Fa raha poritra iny, dia menarana no miporitsaka avy ao.
  '6':
  - type: text
    content: Ny tranon-kalany tsy azo atao fitafiana,
  - type: text
    content: Ary ny asany tsy mahatafy azy;
  - type: text
    content: Ny asany dia asa fampahoriana,
  - type: text
    content: Ary asan-doza no eo an-tànany.
  '7':
  - type: text
    content: Ny tongony miriotra ho amin’ny ratsy
  - type: text
    content: Sy mimaona handatsaka ra marina;
  - type: text
    content: Ny fisainany dia fisainana fampahoriana,
  - type: text
    content: Fandravana sy fandringanana no eo amin’ny alehany.
  '8':
  - type: text
    content: Ny làlan’ny fiadanana tsy fantany;
  - type: text
    content: Ary tsy misy rariny ao amin’ny alehany;
  - type: text
    content: Làlana miolakolaka ny làlany,
  - type: text
    content: Ka na iza na iza mandia izany dia tsy mahita fiadanana.
  '9':
  - type: text
    content: Ary noho izany dia lavitra antsika ny rariny,
  - type: text
    content: Ary ny fahamarinana tsy mahatratra antsika;
  - type: text
    content: Miandry ny mazava isika, nefa indro ny maizina,
  - type: text
    content: Ary fahazavana, fa mbola ao amin’ny aizim-pito ihany no andehanantsika.
