document_id: ISA.59
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny ota, izay efitra fisarahana, sy ny fandravana azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: INDRO, ny tànan’i Jehovah tsy fohy, fa mahavonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sofiny tsy lalodalovana, fa mahare;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny helokareo no efitra mampisaraka anareo amin’Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahotanareo no mampiafina ny tavany aminareo, ka dia tsy mihaino Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny tànanareo dia voaloto amin’ny ra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rantsan-tànanareo amin’ny heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny molotrareo miteny lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lelanareo mibedibedy faharatsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy mitory olona araka ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mandahatra ny rariny araka izay mahatoky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matoky ny tsy izy sy miteny zava-poana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Torontoronina fampahoriana izy ka miteraka fandozana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mikotrika ny atodin’ny menarana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manenona ny tranon-kala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay homana ny atodin’ireny dia ho faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha poritra iny, dia menarana no miporitsaka avy ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tranon-kalany tsy azo atao fitafiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asany tsy mahatafy azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny asany dia asa fampahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary asan-doza no eo an-tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tongony miriotra ho amin’ny ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mimaona handatsaka ra marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fisainany dia fisainana fampahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandravana sy fandringanana no eo amin’ny alehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny làlan’ny fiadanana tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy rariny ao amin’ny alehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Làlana miolakolaka ny làlany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na iza na iza mandia izany dia tsy mahita fiadanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary noho izany dia lavitra antsika ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinana tsy mahatratra antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miandry ny mazava isika, nefa indro ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahazavana, fa mbola ao amin’ny aizim-pito ihany no andehanantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsapatsapa manara-drindrina tahaka ny jamba isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mitsapatsapa tahaka ny tsy mana-maso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafintohina amin’ny mitataovovonana tahaka ny amin’ny maizimaizina isika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo amin’ny matanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any an-efitra.
    marker-yv: yv-n
  - type: text
    text: ' dia tahaka ny maty isika.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Isika rehetra mampierona tahaka ny bera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitoloko tokoa tahaka ny voromailala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miandry ny rariny isika, nefa tsy misy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny famonjena, nefa lavitra antsika izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa efa betsaka eo anatrehanao ny fiodinanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahotanay miampanga anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsaroanay ny fahadisoanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny helokay dia fantatray,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia ny miodina sy ny mandà an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny miala amin’ny fanarahana an’Andriamanitray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny miteny fampahoriana sy fikomiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mamorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: torontoronina.
    marker-yv: yv-n
  - type: text
    text: ' sy mamoaka teny lainga avy ao am-po.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nahemotra ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mijanon-davitra ny hitsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tafintohina eny an-kalalahana ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hitsim-po tsy mahazo miditra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eny, tsy eo ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mifady ny ratsy dia hoatra ny manolo-tena hobaboin’ny sasany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitan’i Jehovah ny tsi-fisian’ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nataony fa ratsy izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, hitany fa tsy nisy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady talanjona Izy, satria tsy nisy mpanalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ny sandriny ihany no nanao famonjena ho Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinany no nanohana Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Niakanjo fahamarinana tahaka ny akanjo fiarovan-tratra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fiarovan-doha famonjena no teo amin’ny lohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niakanjo ny akanjo famaliana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Araka ny asa natao no hamaliany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fahatezerana mirehitra ho an’ny fahavalony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Famaliana ho an’ny rafiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nosy dia hovaliany tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hatrany andrefana dia hatahotra ny anaran’i Jehovah ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voninahiny hatramin’ny fiposahan’ny masoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fihaviny dia ho toy ny rano maria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampandehanin’ny Fanahin’i Jehovah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa raha avy toy ny ony ny fahavalo. Ny Fanahin’i Jehovah hanangana faneva hisakanana azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia hisy Mpanavotra ho tonga any Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho amin’ny Jakoba izay miala amin’ny fahadisoana, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha Izaho, dia izao no fanekeko aminy, hoy Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Fanahiko Izay ao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny teniko izay nataoko teo am-bavanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hiala amin’ny vavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na amin’ny vavan’ny taranakao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na amin’ny vavan’ny taranaky ny taranakao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’izao ka ho mandrakizay, hoy Jehovah.
