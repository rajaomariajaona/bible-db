document_id: LEV.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanatitra hohanina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha misy manatitra fanatitra hohanina ho an’i Jehovah, dia koba tsara toto no hataony fanatiny; ary hanidina diloilo aminy izy sy hanisy ditin-kazo mani-pofona eo amboniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny sisa amin’ny fanatitra hohanina dia ho an’i Arona sy ny zanany; ho masina dia masina avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanatitra hohanina rehetra, izay aterinareo ho an’i Jehovah, dia aza asiana zava-maharikivy; fa ny masirasira sy ny tantely dia samy tsy hangalanareo hodorana ho fofona ho fanatitra atao amin’ny afo ho an’i Jehovah; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ho fanatitra voaloham-bokatra ihany no hahazoanareo manatitra ireo ho an’i Jehovah; kanefa tsy hakarina eo ambonin’ny alitara ho hanitra ankasitrahana izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary samy asio sira ny fanatitra hohaninao rehetra; ary ny siran’ny faneken’Andriamanitrao dia aza atsahatra amin’ny fanatitra hohaninao; fa manatera sira miaraka amin’ny fanatitrao rehetra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha manatitra fanatitra hohanina ho an’i Jehovah avy amin’ny voaloham-bokatra hianao, dia salohim-bary voaendy amin’ny afo, dia lango avy amin’ny salohy maitso, no haterinao ho fanatitra hohanina avy amin’ny voaloham-bokatrao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hasianao diloilo izy, sady hasianao ditin-kazo mani-pofona eo amboniny; dia fanatitra hohanina izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hodoran’ny mpisorona ho fofona ny fanati-pahatsiarovana avy amin’ny langony sy avy amin’ny diloilony ary ny ditin-kazo mani-pofona rehetra; dia fanatitra atao amin’ny afo ho an’i Jehovah izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitondra azy ho amin’ireo mpisorona, zanak’i Arona, izy, dia handraofan’ireo eran-tànan-ila ny kobany sy ny diloilony mbamin’ny ditin-kazo mani-pofona rehetra; ary hodoran’ny mpisorona ho fofona eo ambonin’ny alitara izany fanati-pahatsiarovana avy aminy izany; dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny sisa amin’ny fanatitra hohanina dia ho an’i Arona sy ny zanany; ho masina dia masina avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha manatitra fanatitra hohanina voaendy amin’ny fanendasa-mofo hianao, dia aoka ho mofo tsy misy masirasira atao amin’ny koba tsara toto sady voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha fanatitra hohanina voaendy amin’ny lapoely no fanatitrao, dia aoka ho koba tsara toto voaharo diloilo sady tsy misy masirasira. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hovakivakinao izy ary hanidinanao diloilo; dia fanatitra hohanina izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha fanatitra hohanina voahandro amin’ny vilany no fanatitrao, dia koba tsara toto asian-diloilo no hatao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho entinao ho an’i Jehovah ny fanatitra hohanina izay atao amin’ireo zavatra ireo; ary rehefa voatitra eo amin’ny mpisorona izany, dia ho entiny eo amin ny alitara. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona haka ny fanati-pahatsiarovana avy amin’ny fanatitra hohanina ka handoro azy ho fofona eo ambonin’ny alitara; dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah izany. '
