document_id: JER.44,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny Jiosy any Egypta mba tsy hanompo sampy.
  - type: text
    content: NY teny izay tonga tamin’i Jeremia ho amin’ny Jiosy rehetra izay nonina tany amin’ny tany Egypta, dia izay nonina tao Migdola sy Tapanesa sy Memfisa,
  - type: note
    content: Heb. Nofa.
  - type: text
    content: ' ary tany amin’ny tany Patrosa, nanao hoe:'
  '10':
  - type: text
    content: Tsy mbola torotoro fo izy na dia mandraka andro-any aza sady tsy natahotra na nandeha araka ny lalàko sy ny didiko, izay napetrako teo anoloanareo sy teo anoloan’ny razanareo.
  '11':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Indro, hanandrina anareo Aho hahatonga loza haharingana ny Joda rehetra. '
  '12':
  - type: text
    content: 'Ary halaiko ny sisa amin’ny Joda, izay nikiry hankany amin’ny tany Egypta hivahiny any, ka ho lany ritra izy rehetra; any amin’ny tany Egypta no hahalavoany, samy ho ringan’ny sabatra sy ny mosary,–eny, na ny kely na ny lehibe dia samy ho fatin-tsabatra sy mosary izy rehetra ka ho tonga fianianana sy figagana sy fanozonana ary fandatsa. '
  '13':
  - type: text
    content: 'Fa hovaliako izay monina any amin’ny tany Egypta, toy ny namaliako an’i Jerosalema, dia amin’ny sabatra sy ny mosary ary ny areti-mandringana. '
  '14':
  - type: text
    content: Ary ny sisa amin’ny Joda izay lasa nivahiny tany Egypta dia tsy hisy ho afa-mandositra ho tafaverina any amin’ny tanin’ny Joda, izay niriny hiverenana mba honenany, afa-tsy izay vitsy sendra afa-mandositra ihany.
  '15':
  - type: text
    content: 'Ary ny lehilahy rehetra, izay nahalala fa ny vadiny efa nandoro ditin-kazo manitra ho an’andriamani-kafa, sy ny vehivavy rehetra izay nitsangana teo, dia vahoaka be dia be, ary ny olona rehetra izay nonina tany amin’ny tany Egypta, tao Patrosa, dia namaly an’i Jeremia hoe: '
  '16':
  - type: text
    content: 'Raha ny amin’ilay teny voalazanao taminay tamin’ny anaran’i Jehovah, dia tsy hihaino anao izahay. '
  '17':
  - type: text
    content: 'Fa hataonay tokoa ny teny rehetra izay naloaky ny vavanay, dia ny handoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra sy ny hanidina fanatitra aidina ho azy, toy ny efa nataonay sy ny razanay sy ny mpanjakanay ary ny mpanapaka anay tany amin’ny tanànan’ny Joda sy teny amin’ny làlamben’i Jerosalema; fa fahizany dia voky hanina izahay sady nambinina ary tsy nahita loza. '
  '18':
  - type: text
    content: 'Fa hatrizay nitsaharanay tsy nandoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra na nanidina fanatitra aidina ho azy izay, dia saiky tsy nanana na inona na inona akory izahay sady ringan’ny sabatra sy ny mosary. '
  '19':
  - type: text
    content: Ary raha nandoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra izahay sy nanidina fanatitra aidina ho azy, moa tsy fantatry ny vadinay va ny nanaovanay mofo hasiana ny sariny
  - type: note
    content: 'Na: ho enti-mivavaka aminy.'
  - type: text
    content: ' sy ny nanidinanay fanatitra aidina ho azy?'
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro. Andriamanitry ny Isiraely: Hianareo efa nahita ny loza rehetra izay nataoko nihatra tamin’i Jerosalema sy ny tanànan’ny Joda rehetra; ary, indro, efa tany lao ireo ankehitriny, ka tsy misy olona monina intsony ao aminy, '
  '20':
  - type: text
    content: 'Ary hoy Jeremia tamin’ny olona rehetra, na ny lehilahy na ny vehivavy, dia ny olona rehetra izay efa namaly azy: '
  '21':
  - type: text
    content: 'Ny nandoroanareo ditin-kazo manitra tany an-tanànan’ny Joda sy tany an-dàlamben’i Jerosalema, dia hianareo sy ny razanareo sy ny mpanjakanareo sy ny mpanapaka anareo mbamin’ny vahoaka,–moa tsy hotsarovan’i Jehovah va izany, ary tsy tao an-tsainy va? '
  '22':
  - type: text
    content: 'Ka dia tsy nahalefitra intsony Jehovah noho ny faharatsian’ny nataonareo sy noho ny fahavetavetana izay nataonareo; koa izany no nanaovana ny taninareo ho lao sy ho figagana ary ho fanozonana, ka tsy misy mponina, tahaka ny amin’izao anio izao. '
  '23':
  - type: text
    content: Noho ny nandoroanareo ditin-kazo manitra sy ny nanotanareo tamin’i Jehovah, fa tsy nihaino ny feon’i Jehovah, na nandeha araka ny lalàny sy ny didiny ary ny teny vavolombelony hianareo, dia izany no nahatonga izao loza izao taminareo tahaka ny amin’izao anio izao.
  '24':
  - type: text
    content: 'Ary hoy koa Jeremia tamin’ny olona rehetra sy tamin’ny vehivavy rehetra: Mihainoa ny tenin’i Jehovah, ry Joda rehetra, izay atỳ amin’ny tany Egypta: '
  '25':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Hianareo sy ny vadinareo samy niteny tamin’ny vavanareo sady nanatanteraka tamin’ny tànanareo ka nanao hoe: Hanefa tokoa izay efa nivoadianay izahay ka handoro ditin-kazo manitra ho an’ny mpanjakavavin’ny lanitra sy hanidina fanatitra aidina ho azy; eny, hefainareo tokoa ny voadinareo sady hataonareo tanteraka.'
  '26':
  - type: text
    content: 'Koa henoinareo ny tenin’i Jehovah, ry Joda rehetra, izay monina atỳ amin’nỳ tany Egypta: Indro Aho efa nianiana tamin’ny anarako lehibe, hoy Jehovah, fa tsy hotononin’ny vavan’ny lehilahy amin’ny Joda eran’ny tany Egypta intsony ny anarako hanao hoe: Raha velona koa Jehovah Tompo. '
  '27':
  - type: text
    content: 'Indro, miambina anareo Aho hahatonga loza, fa tsy soa; ary ny lehilahy rehetra amin’ny Joda, izay atỳ amin’ny tany Egypta, dia ho ringan’ny sabatra sy ny mosary mandra-pahalany ritrany. '
  '28':
  - type: text
    content: Ary izay afa-mandositra ny sabatra dia ho tafaverina avy atỳ amin’ny tany Egypta ho any amin’ny tanin’ny Joda,–ho vitsy foana anefa ireny; ary ny sisa amin’ny Joda rehetra izay mankany amin’ny tany Egypta hivahiny any dia hahafantatra izay ho to teny, na ho Izaho, na ho izy.
  '29':
  - type: text
    content: 'Ary izao no famantarana ho anareo, hoy Jehovah, fa hovaliako eto amin’ity tany ity hianareo, mba hahafantaranareo fa to tokoa ny teniko hahatonga loza aminareo: '
  '3':
  - type: text
    content: 'noho ny ratsy nataony hampahatezitra Azy tamin’ny nandehanany handoro ditin-kazo manitra sy hanompo andriamani-kafa izay tsy fantany, na izy, na hianareo, na ny razanareo. '
  '30':
  - type: text
    content: 'Izao no lazain’i Jehovah: Indro, Farao-hofra, mpanjakan’i Egypta, hatolotro eo an-tànan’ny fahavalony sy eo an-tànan’izay mitady ny ainy, toy ny efa nanolorako an’i Zedekia, mpanjakan’ny Joda, ho eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona, izay fahavalony nitady ny ainy.'
  '4':
  - type: text
    content: 'Ary naniraka ny mpaminany mpanompoko rehetra taminareo Aho,–eny, nifoha maraina koa Aho ka naniraka azy hanao hoe: Masìna hianareo, aza manao izany fahavetavetana halako izany. '
  '5':
  - type: text
    content: 'Nefa tsy nihaino, izy na nanongilana ny sofiny hialany amin’ny haratsiany tsy handoro ditin-kazo manitra ho an’andriamani-kafa. '
  '6':
  - type: text
    content: Ka dia naidina ny fahavinirako sy ny fahatezerako, eny, nandoro ny tanànan’ny Joda, sy ny teny amin’ny làlamben’i Jerosalema izany, ka dia rava sy lao ireny tahaka ny amin’izao anio izao.
  '7':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Andriamanitry ny maro, dia Andriamanitry ny Isiraely: Ahoana no anaovanareo izao ratsy lehibe singotry ny ainareo izao, haharingana ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono ao amin’ny Joda tsy haha-misy miangana anareo, '
  '8':
  - type: text
    content: 'noho ny ampahatezeranareo Ahy amin’ny asan’ny tànanareo sy amin’ny andoroana ditin-kazo manitra ho an’andriamani-kafa any amin’ny tany Egypta izay alehanareo hivahiniana, mba haharingana anareo ka hahatonga anareo ho fanozonana sy ho fandatsa any amin’ny firenena rehetra ambonin’ny tany? '
  '9':
  - type: text
    content: 'Moa hadinonareo va ny ratsy nataon’ny razanareo sy ny mpanjakan’ny Joda sy ny vadiny ary ny tenanareo sy ny vadinareo, dia izay nataony tany amin’ny tanin’ny Joda sy teny amin’ny làlamben’i Jerosalema? '
