document_id: JOS.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tafita an’i Jordana avokoa ny olona rehetra, Jehovah dia niteny tamin’i Josoa hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny mpisorona izay nitondra ny fiara nijanona teo afovoan’i Jordana mandra-pahavitan’ny zavatra rehetra izay nandidian’i Jehovah an’i Josoa holazaina amin’ny olona, araka izay rehetra nandidian’i Mosesy an’i Josoa; dia nita faingana ny olona. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa tafita avokoa ny olona rehetra, dia nita koa ny fiaran’i Jehovah sy ireo mpisorona teo anoloan’ ny olona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Robena sy ny taranak’i Gada ary ny antsasaky ny firenen’i Manase dia samy efa voaomana hiady ka nita teo alohan’ny Zanak’Isiraely koa, araka izay efa nolazain’i Mosesy taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tokony ho lehilahy efatra alina efa voaomana hiady no nita teo anatrehan’i Jehovah hanafika, ho eo amin’ny tani-hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' any Jeriko.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany andro izany no nanandratan’i Jehovah an’i Josoa teo imason’ny Isiraely rehetra; ka dia natahotra azy ny olona, tahaka ny efa natahorany an’i Mosesy, tamin’ny andro rehetra niainany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Josoa ka nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandidia ny mpisorona izay mitondra ny fiaran’ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' hiakatra hiala eo Jordana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny mpisorona Josoa ka nanao hoe: Miakara hiala eo Jordana hianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa niakatra niala teo afovoan’i Jordana ka nanainga ny faladiany ho eo amin’ny tanety ireo mpisorona izay nitondra ny fiaran’ny faneken’i Jehovah ireo, dia avy indray ny rano Jordana nankamin’ny fitoerany ka nihoatra ny morony rehetra tahaka ny teo aloha ihany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny olona niakatra niala teo Jordana tamin’ny andro fahafolo tamin’ny volana voalohany ka nitoby tany Gilgala, teo amin’ny sisin-tany atsinanan’i Jeriko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mangalà lehilahy roa ambin’ny folo amin’ny olona, dia iray avy isam-pirenena, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireny vato roa ambin’ny folo nalainy teo Jordana ireny dia natsangan’i Josoa tany Gilgala. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’ny Zanak’Isiraely izy ka nanao hoe: Raha manontany ny rainy ny taranakareo any amin’ny andro ho avy hoe: Inona no anton’ireo vato ireo? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hambaranareo aminy hoe: Tamin’ny tany maina no nitan’ny Isiraely ity Jordana ity. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nataon’i Jehovah Andriamanitrareo maina ny falehan’ny rano Jordana teo anoloanareo mandra-pitanareo, dia tahaka ny nataon’i Jehovah Andriamanitrareo tamin’ny Ranomasina Mena, izay nataony maina teo anoloantsika mandra-pitantsika, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba ho fantatry ny firenena rehetra ambonin’ny tany fa mahery ny tànan’i Jehovah, ary mba hatahorany an’i Jehovah Andriamanitrareo mandrakizay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka mandidia azy hoe: Makà vato roa ambin’ny folo eo afovoan’i Jordana eo amin’ilay nijoroan’ny tongotry ny mpisorona, dia ento miaraka aminareo, ka avelao eo amin’izay handrianareo anio alina.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoin’i Josoa ny lehilahy roa ambin’ny folo, izay nofidiny tamin’ny Zanak’Isiraely, dia iray avy isam-pirenena, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hoy izy taminy: Mandehana eo alohan’ny fiaran’i Jehovah Andriamanitrareo ho eo afovoan’i Jordana, ka samia manainga vato iray avy ho eny an-tsorony hianareo rehetra, araka ny isan’ny firenen’ny Zanak’Isiraely, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho famantarana eo aminareo izany, raha manontany ny zanakareo amin’ny andro ho avy manao hoe: Inona no ataonareo ho anton’ireo vato ireo? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia holazainareo aminy hoe: Tapaka ny rano Jordana teo anoloan’ny fiaran’ny faneken’i Jehovah; fa raha nita an’i Jordana ny fiara, dia tapaka ny rano; ary ireo vato ireo dia ho fahatsiarovana mandrakizay ho an’ny Zanak’Isiraely.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao izany ny Zanak’Isiraely araka izay nandidian’i Josoa ka naka vato roa ambin’ny folo teo afovoan’i Jordana, araka izay nolazain’i Jehovah tamin’i Josoa, araka ny isan’ny firenen’ny Zanak’Isiraely, ka nentiny nita niaraka taminy ho eo amin’izay nitobiany ka napetrany teo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary vato roa ambin’ny folo no natsangan’i Josoa teo Jordana, teo amin’ilay nijoroan’ny tongotry ny mpisorona izay nitondra ny fiaran’ny fanekena; ary mbola ao ihany ireny mandraka andro-any.
