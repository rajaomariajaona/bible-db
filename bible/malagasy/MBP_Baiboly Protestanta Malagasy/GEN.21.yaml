document_id: GEN.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahaterahan’Isaka, sy ny nandroahana an’i Hagara mianaka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Jehovah namangy an’i Saraha araka ilay efa nolazainy, ary dia nataon’i Jehovah tamin’i Saraha araka ilay efa noteneniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy izy tamin’i Abrahama: Roahy io andevovavy io sy ny zanany; fa ny zanak’io andevovavy io tsy hiray lova amin’ny zanako, dia amin’Isaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ratsy teo imason’i Abrahama indrindra izany teny izany noho ny amin’ny zanany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Andriamanitra tamin’i Abrahama: Aoka tsy ho ratsy eo imasonao ny amin’ny zaza sy ny andevovavinao; fa izay rehetra lazain’i Saraha aminao, dia ekeo ny teniny, fa avy amin’Isaka no hantsoina izay taranaka ho anao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nefa ny zanaky ny andevovavy kosa dia hataoko ho firenena, satria terakao ihany izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nifoha maraina koa Abrahama ka naka mofo sy siny hoditra iray feno rano, ary nomeny an’i Hagara ka napetrany teo an-tsorony, ary natolony azy koa ny zaza, dia nampandehaniny izy mianaka; ary lasa nandeha izy ka nirenireny tany an-efitr’i Beri-sheba. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary rehefa lany ny rano tao amin’ny siny hoditra, dia nariany teo ampototry ny hazo kely anankiray ny zaza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia lasa izy ka nipetraka tery lavidavitra tandrifiny, tokony ho tra-tsipìka; fa hoy izy: Aza mba ho hitako anie izay hahafatesan’ny zaza. Ary nipetraka tandrifiny izy, dia nanandratra ny feony nitomany.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ren’Andriamanitra ny feon’ny zaza, dia niantso an’i Hagara Ilay Anjelin’Andriamanitra tany an-danitra ka nanao taminy hoe: Inona izato manjo anao, ry Hagara? aza matahotra, fa efa ren’Andriamanitra ny feon’ny zaza eo amin’ny itoerany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mitsangàna, areno ny zaza, ka tantano; fa hataoko firenena lehibe izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia nampahiratin’Andriamanitra ny mason’i Hagara, ka nahita lavaka fantsakana izy; ary lasa izy, dia nameno rano ny siny hoditra ka nampisotro rano ny zaza.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nanan-anaka Saraha ka niteraka zazalahy tamin’i Abrahama, rehefa antitra izy, tamin’ny fotoana izay efa nolazain’Andriamanitra taminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nomban’Andriamanitra ny zaza, dia nitombo izy; ary nonina tany an-efitra izy ka nony efa lehibe, dia tonga mpandefa tsipìka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary nonina tany an-efitra Parana izy-ka nakan’ny reniny vady avy tany amin’ny; tany Egypta izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanekena nataon’i Abrahama sy Abimeleka
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ARY tamin’izany andro izany Abimeleka sy Pikola, komandin’ny miaramilany, dia niteny tamin’i Abrahama ka nanao hoe: Omban’Andriamanitra hianao amin’izay rehetra ataonao; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'koa ankehitriny, ianiano amin’Andriamanitra aho fa tsy hamitaka ahy na ny zanako na ny taranako hianao; fa araka ny soa izay efa nataoko taminao no mba ataovy amiko sy amin’ny tany izay ivahinianao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy Abrahama: Hianiana ihany aho.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary Abrahama nananatra an’i Abimeleka noho ny lavaka fantsakana anankiray, izay efa nalain’ny mpanompon’i Abimeleka an-keriny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia hoy Abimeleka: Tsy fantatro izay nanao izany; fa hianao tsy mbola nanambara tamiko, ary izaho koa tsy mba nahare, raha tsy vao izao.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary Abrahama naka ondry aman-osy sy omby, ka nomeny an’i Abimeleka; dia nanao fanekena izy roa lahy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary Abrahama nanokana ondrivavy kely fito navahana tamin’ny ondry. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy Abimeleka tamin’i Abrahama: Hatao inona ireo ondrivavy kely fito natokanao ireo? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ny anaran’ny zanany izay teraka, ilay naterak’i Saraha taminy, dia nataon’i Abrahama hoe Isaka.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy izy: Mba horaisinao avy amin’ny tànako ireo ondrivavy kely fito ireo ho vavolombelona amiko fa izaho nihady io lavaka fantsakana io. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izany no nanaovana io tany io hoe Beri-sheba;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beri-sheba = Fantsakam-pianianana.
      marker-yv: yv-n
    - type: text
      text: ' satria teo no nianianan’izy roa lahy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dia nanao fanekena tany Beri-sheba izy; ary dia niainga Abimeleka sy Pikola, komandin’ny miaramilany, ka niverina ho any amin’ny tanin’ny Filistina.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia namboly hazo tamariska tany Beri-sheba Abrahama ka tao no niantsoany ny anaran’i Jehovah, dia Andriamanitra Mandrakizay. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary Abrahama nivahiny elaela ihany tany amin’ny tanin’ny Filistina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia noforan’i Abrahama Isaka zanany, rehefa teraka havaloana izy, araka izay efa nandidian’Andriamanitra azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary efa zato taona Abrahama, raha niteraka an’Isaka zanany izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Saraha: Efa nampihomehezin’Andriamanitra aho; izay rehetra mandre dia hiara-mihomehy amiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy koa izy: Nampoizin’iza akory moa no hilaza amin’i Abrahama fa hampinono zaza Saraha? kanjo efa niteraka zazalahy taminy aho, rehefa antitra izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary rehefa lehibe ny zaza, dia notazana; ary Abrahama nanao fanasana lehibe tamin’ny andro nanotazana an’Isaka.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary Saraha nahita fa nihomehy ny zanak’i Hagara Egyptiana, izay efa naterany tamin’i Abrahama. '
