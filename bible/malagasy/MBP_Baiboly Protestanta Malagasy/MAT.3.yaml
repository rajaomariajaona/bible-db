document_id: MAT.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’i Jaona Mpanao-batisa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 1.1-8; Lio. 3.1-18.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’izany andro izany dia niseho Jaona Mpanao-batisa, nitory tany an-efitr’i Jodia nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mibebaha hianareo; fa efa akaiky ny fanjakan’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izy no ilay nampilazaina an’Isaia mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Injany! misy feon’ny miantso mafy any an-efitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny làlan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy mahitsy ny làlan-kalehany’’ (Isa. 40.3).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny fitafian’izany Jaona izany dia lamba volon-drameva, ary fehin-kibo hoditra no tamin’ny valahany; ary ny fihinany dia valala sy tantely remby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jerosalema sy Jodia rehetra mbamin’ny tany rehetra amoron’i Jordana dia nivoaka nankany amin’i Jaona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ka nataony batisa tao amin’ny ony Jordana ireny, rehefa niaiky ny fahotany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nony nahita ny Fariseo sy ny Sadoseo maro nanatona ny batisany izy, dia hoy izy taminy: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa mamoaza voa mendrika ny fibebahana hianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary aza manao anakampo hoe: Manana an’i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary, indro, efa mipetraka eo amin’ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izaho dia manao batisa anareo amin’ny rano ho amin’ny fibebahana; fa Ilay avy ao aoriako no mahery noho izaho, ka tsy mendrika hitondra ny kapany aza aho; Izy no hanao batisa anareo amin’ny Fanahy Masina sy ny afo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: eny an-tànany ny fikororohany, ary Izy hanadio tsara ny eo am-pamoloany ka hanangona ny variny ho any an-tsompitra; fa ny akofa sy ny mololo hodorany amin’ny afo tsy mety maty.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovan’i Jaona batisa an’i Jesosy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 1.9-11; Lio. 3.21,22.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY tamin’izay Jesosy dia avy tany Galilia ka tonga teo amoron’i Jordana, dia nanatona an’i Jaona Izy mba hataony batisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Jaona nandà Azy ka nanao hoe: Izaho no tokony hataonao batisa, ka Hianao indray va no mankaty amiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa namaly Jesosy ka niteny taminy hoe: Ekeo ihany ankehitriny, fa izao no mety amintsika hahatanteraka ny fahamarinana rehetra. Ka dia nekeny Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha vao natao batisa Jesosy, dia niakatra avy teo amin’ny rano niaraka tamin’izay Izy; ary, indro, nisokatra taminy ny lanitra, ary hitany ny Fanahin’Andriamanitra nidina tahaka ny voromailala ka nankeo amboniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary, injao! nisy feo avy tany an-danitra nanao hoe: Ity no Zanako malalako Izay sitrako.'
