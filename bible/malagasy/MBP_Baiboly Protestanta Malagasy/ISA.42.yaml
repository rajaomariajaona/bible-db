document_id: ISA.42,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Mpanompon’i Jehovah, mpitondra famonjena ho an’ny Isiraely sy ny firenena rehetra.
  - type: text
    content: INDRO ny Mpanompoko, Izay tantanako,
  - type: text
    content: Dia Ilay voafidiko sady sitraky ny foko;
  - type: text
    content: Napetrako tao aminy ny Fanahiko;
  - type: text
    content: Hamoaka fitsipika ho an’ny jentilisa Izy.
  '10':
  - type: text
    content: Hianareo izay midina any amin’ny ranomasina sy ny ao aminy rehetra,
  - type: text
    content: Dia hianareo nosy sy ny mponina ao aminy,
  - type: text
    content: Samia mihira fihiram-baovao ho an’i Jehovah,
  - type: text
    content: Dia ny fiderana Azy hatramin’ny faran’ny tany.
  '11':
  - type: text
    content: Aoka ny efitra sy ireo tanàna eny aminy hanandratra ny feony,
  - type: text
    content: Dia ny vohitra izay onenan’i Kedara;
  - type: text
    content: Aoka hihoby ny mponina any Sela;
  - type: note
    content: 'Na: any amin’ny harambato.'
  - type: text
    content: Ary aoka hanao feo avo any an-tampon’ny tendrombohitra izy.
  '12':
  - type: text
    content: Aoka hanome voninahitra an’i Jehovah izy
  - type: text
    content: Ary hitory ny fiderana Azy any amin’ny nosy.
  '13':
  - type: text
    content: Jehovah mivoaka tahaka ny lehilahy mahery,
  - type: text
    content: Tahaka ny fanaon’ny mpiady no amohazany ny fahatezerany;
  - type: note
    content: 'Na: fahasaro-piarony.'
  - type: text
    content: Miantsoantso Izy, eny, mihiaka mafy;
  - type: text
    content: Mampiseho hery haharesy ny fahavalony Izy.
  '14':
  - type: text
    content: Efa tsy niteny Aho hatrizay hatrizay,
  - type: text
    content: Nangina ihany Aho ka nanindry fo;
  - type: text
    content: Fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka,
  - type: text
    content: Eny, miehakehaka tsy avy miaina.
  '15':
  - type: text
    content: Hataoko mariry ny tendrombohitra sy ny havoana,
  - type: text
    content: Hataoko maina ny ahitra rehetra ao aminy,
  - type: text
    content: Ary ny ony ho tonga nosy,
  - type: text
    content: Ary hataoko tankina ny farihy.
  '16':
  - type: text
    content: Hitarika ny jamba amin’izay làlana tsy fantany Aho;
  - type: text
    content: Ary amin’ny làlana tsy fantany no hitondrako azy;
  - type: text
    content: Ny maizina dia hataoko mazava eo anoloany,
  - type: text
    content: Ary ny mikitoantoana halamako tsara;
  - type: text
    content: Izany zavatra izany no hataoko aminy
  - type: text
    content: Ka tsy hamelako.
  '17':
  - type: text
    content: Hihemotra sady ho menatra tokoa izay matoky ny sarin-javatra voasokitra,
  - type: text
    content: 'Dia izay manao amin’ny sarin-javatra an-idina hoe: Hianareo no andriamanitray.'
  '18':
  - type: text
    content: Mihainoa hianareo, ry marenina;
  - type: text
    content: Ary mijere, ry jamba, mba hahita.
  '19':
  - type: text
    content: Iza no jamba, afa-tsy ny mpanompoko?
  - type: text
    content: Ary iza no marenina tahaka ny iraka izay irahiko?
  - type: text
    content: Iza no jamba tahaka ny sakaizan’i Jehovah,
  - type: text
    content: Ary jamba tahaka ny mpanompony?
  '2':
  - type: text
    content: Tsy hiantsoantso Izy, na hanandratra ny feony,
  - type: text
    content: Na hanao izay handrenesana ny feony eny an-dàlana.
  '20':
  - type: text
    content: Mahita zavatra maro hianao, nefa tsy mitandrina;
  - type: text
    content: Manongilana ny sofiny izy, nefa tsy mihaino.
  '21':
  - type: text
    content: Sitrak’i Jehovah noho ny fahamarinany
  - type: text
    content: Ny hahalehibe ny lalàna sy ny hahabe voninahitra azy.
  '22':
  - type: text
    content: Kanefa ity dia firenena nobaboina sy norobaina;
  - type: text
    content: Voafandrika ao an-davaka avokoa izy rehetra
  - type: text
    content: Ary voàfina ao an-trano-maizina;
  - type: text
    content: Voababo izy, ka tsy misy mamonjy;
  - type: text
    content: 'Voasambotra izy, ka tsy misy manao hoe: Ampodio.'
  '23':
  - type: text
    content: Iza aminareo no hihaino izany?
  - type: text
    content: Iza no handre, dia hitandrina izany amin’ny andro ho avy?
  '24':
  - type: text
    content: Iza no nanolotra an’i Jakoba hosamborina,
  - type: text
    content: Ary Isiraely ho an’ny mpamabo?
  - type: text
    content: Tsy Jehovah, Izay efa nanotantsika va?
  - type: text
    content: Satria tsy nety nandeha tamin’ny làlany ireo,
  - type: text
    content: Sady tsy nety nihaino ny lalàny;
  '25':
  - type: text
    content: Ka dia nalatsany taminy ny firehitry ny fahatezerany
  - type: text
    content: Sy ny halozan’ny ady;
  - type: text
    content: Dia nampirehitra azy manodidina izany, nefa tsy fantany;
  - type: text
    content: Ary nandoro azy, nefa tsy noheverin’ny fony.
  '3':
  - type: text
    content: Tsy hotapahiny ny volotara torotoro,
  - type: text
    content: Ary tsy hovonoiny ny lahin-jiro manetona;
  - type: text
    content: Hamoaka izay tena rariny tokoa Izy.
  '4':
  - type: text
    content: Tsy ho reraka na ho kivy Izy,
  - type: text
    content: Mandra-panoriny ny rariny amin’ny tany,
  - type: text
    content: Ary ny nosy hiandry ny lalàny.
  '5':
  - type: text
    content: Izao no lazain’i Jehovah Andriamanitra,
  - type: text
    content: Izay nahary ny lanitra sy nanenjana azy,
  - type: text
    content: Izay namelatra ny tany sy ny vokatra avy aminy,
  - type: text
    content: Izay manome fofonaina ny olona eo aminy
  - type: text
    content: 'Sy fanahy ho an’izay mandeha eo aminy:'
  '6':
  - type: text
    content: Izaho Jehovah efa niantso Anao tamin’ny fahamarinana
  - type: text
    content: Sy nitantana ny tànanao,
  - type: text
    content: Ary hiaro Anao Aho ka hanome Anao ho fanekena ho an’ny olona,
  - type: text
    content: Ho fanazavana ny jentilisa,
  '7':
  - type: text
    content: Hampahiratra ny mason’ny jamba,
  - type: text
    content: Hamoaka ny mpifatotra hiala ao an-trano-maizina
  - type: text
    content: Ary izay mipetraka ao amin’ny maizina hiala ao an-trano famatorana.
  '8':
  - type: text
    content: Izaho no Jehovah, izany no anarako,
  - type: text
    content: Ka ny voninahitro tsy homeko ny hafa,
  - type: text
    content: Na ny fiderana Ahy ho an’ny sarin-javatra voasokitra.
  '9':
  - type: text
    content: Ny amin’ny zavatra taloha, dia indreo, efa miseho;
  - type: text
    content: Ary zava-baovao kosa no toriko izao;
  - type: text
    content: Na dia tsy mbola miposaka aza ireny,
  - type: text
    content: Dia ambarako aminareo.
