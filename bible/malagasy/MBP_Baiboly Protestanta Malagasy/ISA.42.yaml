document_id: ISA.42
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Mpanompon’i Jehovah, mpitondra famonjena ho an’ny Isiraely sy ny firenena rehetra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: INDRO ny Mpanompoko, Izay tantanako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Ilay voafidiko sady sitraky ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Napetrako tao aminy ny Fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamoaka fitsipika ho an’ny jentilisa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy hiantsoantso Izy, na hanandratra ny feony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanao izay handrenesana ny feony eny an-dàlana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy hotapahiny ny volotara torotoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hovonoiny ny lahin-jiro manetona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamoaka izay tena rariny tokoa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy ho reraka na ho kivy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-panoriny ny rariny amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nosy hiandry ny lalàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izao no lazain’i Jehovah Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nahary ny lanitra sy nanenjana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay namelatra ny tany sy ny vokatra avy aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manome fofonaina ny olona eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy fanahy ho an’izay mandeha eo aminy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho Jehovah efa niantso Anao tamin’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nitantana ny tànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiaro Anao Aho ka hanome Anao ho fanekena ho an’ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fanazavana ny jentilisa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hampahiratra ny mason’ny jamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamoaka ny mpifatotra hiala ao an-trano-maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mipetraka ao amin’ny maizina hiala ao an-trano famatorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho no Jehovah, izany no anarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny voninahitro tsy homeko ny hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fiderana Ahy ho an’ny sarin-javatra voasokitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny amin’ny zavatra taloha, dia indreo, efa miseho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zava-baovao kosa no toriko izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia tsy mbola miposaka aza ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ambarako aminareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hianareo izay midina any amin’ny ranomasina sy ny ao aminy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo nosy sy ny mponina ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samia mihira fihiram-baovao ho an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fiderana Azy hatramin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ny efitra sy ireo tanàna eny aminy hanandratra ny feony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny vohitra izay onenan’i Kedara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hihoby ny mponina any Sela;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any amin’ny harambato.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hanao feo avo any an-tampon’ny tendrombohitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka hanome voninahitra an’i Jehovah izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitory ny fiderana Azy any amin’ny nosy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jehovah mivoaka tahaka ny lehilahy mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fanaon’ny mpiady no amohazany ny fahatezerany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahasaro-piarony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoantso Izy, eny, mihiaka mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampiseho hery haharesy ny fahavalony Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa tsy niteny Aho hatrizay hatrizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nangina ihany Aho ka nanindry fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, miehakehaka tsy avy miaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hataoko mariry ny tendrombohitra sy ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataoko maina ny ahitra rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ony ho tonga nosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataoko tankina ny farihy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hitarika ny jamba amin’izay làlana tsy fantany Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny làlana tsy fantany no hitondrako azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny maizina dia hataoko mazava eo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mikitoantoana halamako tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany zavatra izany no hataoko aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hamelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hihemotra sady ho menatra tokoa izay matoky ny sarin-javatra voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia izay manao amin’ny sarin-javatra an-idina hoe: Hianareo no andriamanitray.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mihainoa hianareo, ry marenina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mijere, ry jamba, mba hahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza no jamba, afa-tsy ny mpanompoko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no marenina tahaka ny iraka izay irahiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no jamba tahaka ny sakaizan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary jamba tahaka ny mpanompony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahita zavatra maro hianao, nefa tsy mitandrina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manongilana ny sofiny izy, nefa tsy mihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sitrak’i Jehovah noho ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hahalehibe ny lalàna sy ny hahabe voninahitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Kanefa ity dia firenena nobaboina sy norobaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafandrika ao an-davaka avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voàfina ao an-trano-maizina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voababo izy, ka tsy misy mamonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voasambotra izy, ka tsy misy manao hoe: Ampodio.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Iza aminareo no hihaino izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no handre, dia hitandrina izany amin’ny andro ho avy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Iza no nanolotra an’i Jakoba hosamborina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Isiraely ho an’ny mpamabo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy Jehovah, Izay efa nanotantsika va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy nety nandeha tamin’ny làlany ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy nety nihaino ny lalàny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ka dia nalatsany taminy ny firehitry ny fahatezerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny halozan’ny ady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nampirehitra azy manodidina izany, nefa tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandoro azy, nefa tsy noheverin’ny fony.
