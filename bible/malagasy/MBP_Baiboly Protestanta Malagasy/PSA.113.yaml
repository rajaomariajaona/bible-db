document_id: PSA.113
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra lehibe, Izay manandratra ny malahelo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HALELOIA.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà, hianareo mpanompon’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà ny anaran’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Isaorana anie ny anaran’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’izao ka ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hoderaina anie ny anaran’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avo ambonin’ny jentilisa Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambonin’ny lanitra ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no tahaka an’i Jehovah Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mipetraka any amin’ny avo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nefa miondrika mijery
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny any an-danitra sy ny etỳ an-tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manangana ny malahelo hiala amin’ny vovoka Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manandratra ny mahantra ho afaka eo amin’ny zezika,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mba hametraka azy ho naman’ny mpanapaka ny olony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mampitoetra tsara ny momba Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahatonga azy ho renin-jaza mifaly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
