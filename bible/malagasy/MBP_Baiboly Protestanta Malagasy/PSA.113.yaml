document_id: PSA.113,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra lehibe, Izay manandratra ny malahelo.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà, hianareo mpanompon’i Jehovah,
  - type: text
    content: Miderà ny anaran’i Jehovah.
  '2':
  - type: text
    content: Isaorana anie ny anaran’i Jehovah
  - type: text
    content: Hatramin’izao ka ho mandrakizay.
  '3':
  - type: text
    content: Hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
  - type: text
    content: No hoderaina anie ny anaran’i Jehovah.
  '4':
  - type: text
    content: Avo ambonin’ny jentilisa Jehovah;
  - type: text
    content: Ambonin’ny lanitra ny voninahiny.
  '5':
  - type: text
    content: Iza no tahaka an’i Jehovah Andriamanitsika,
  - type: text
    content: Izay mipetraka any amin’ny avo,
  '6':
  - type: text
    content: Nefa miondrika mijery
  - type: text
    content: Ny any an-danitra sy ny etỳ an-tany?
  '7':
  - type: text
    content: Manangana ny malahelo hiala amin’ny vovoka Izy
  - type: text
    content: Ary manandratra ny mahantra ho afaka eo amin’ny zezika,
  '8':
  - type: text
    content: Mba hametraka azy ho naman’ny mpanapaka ny olony.
  '9':
  - type: text
    content: Mampitoetra tsara ny momba Izy,
  - type: text
    content: Fa mahatonga azy ho renin-jaza mifaly.
  - type: text
    content: Haleloia.
