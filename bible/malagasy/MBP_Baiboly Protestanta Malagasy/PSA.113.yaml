document_id: PSA.113,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra lehibe, Izay manandratra ny malahelo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HALELOIA.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà, hianareo mpanompon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà ny anaran’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny anaran’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao ka ho mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hoderaina anie ny anaran’i Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo ambonin’ny jentilisa Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambonin’ny lanitra ny voninahiny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no tahaka an’i Jehovah Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mipetraka any amin’ny avo,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa miondrika mijery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny any an-danitra sy ny etỳ an-tany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangana ny malahelo hiala amin’ny vovoka Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manandratra ny mahantra ho afaka eo amin’ny zezika,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hametraka azy ho naman’ny mpanapaka ny olony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampitoetra tsara ny momba Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahatonga azy ho renin-jaza mifaly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
