document_id: 1CH.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nizarana ny mpisorona ho efatra amby roa-polo toko.
  - type: text
    content: 'ARY ny amin’ny taranak’i Arona dia izao no nizarana azy ho antokony: Ny zanakalahin’i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara; '
  '10':
  - type: text
    content: 'ny fahafito an’i Hakoza, ny fahavalo an’i Abia, '
  '11':
  - type: text
    content: 'ny fahasivy an’i Jesoa, ny fahafolo an’i Sekania. '
  '12':
  - type: text
    content: 'ny fahiraika ambin’ny folo an’i Eliasiba, ny faharoa ambin’ny folo an’i Jakima, '
  '13':
  - type: text
    content: 'ny fahatelo ambin’ny folo an’i Hopa, ny fahefatra ambin’ny folo an’i Jesebaba, '
  '14':
  - type: text
    content: 'ny fahadimy ambin’ny folo an’i Bilga, ny fahenina ambin’ny folo an’i Imera, '
  '15':
  - type: text
    content: 'ny fahafito ambin’ny folo an’i Hezira, ny fahavalo ambin’ny folo an’i Hafizeza, '
  '16':
  - type: text
    content: 'ny fahasivy ambin’ny folo an’i Petahia, ny faharoa-polo an’i Jehezekela, '
  '17':
  - type: text
    content: 'ny fahiraika amby roa-polo an’i Jakina, ny faharoa amby roa-polo an’i Gamola, '
  '18':
  - type: text
    content: ny fahatelo amby roa-polo an’i Delaia, ny fahefatra amby roa-polo an’i Mazia.
  '19':
  - type: text
    content: Ireo avy no antokony amin’ny fanompoany izay idirany
  - type: note
    content: 'Na: Ary ny raharahan’ireo tamin’ny fanompoana dia ny hiditra.'
  - type: text
    content: ' ao an-tranon’i Jehovah araka ny fitsipika voatendrin’i Arona rainy, araka ny nandidian’i Jehovah, Andriamanitry ny Isiraely, azy.'
  '2':
  - type: text
    content: 'fa Nadaba sy Abiho dia maty talohan-drainy sady samy tsy nanan-janaka, koa dia Eleazara sy Itamara no nanao fisoronana. '
  '20':
  - type: text
    content: 'Ary tamin’ny taranak’i Levy sisa dia izao; Tamin’ny taranak’i Amrama dia Sobaela; tamin’ny zanak’i Sobaela dia Jedaia. '
  '21':
  - type: text
    content: 'Ny amin’i Rehabia: tamin’ny taranak’i Rehabia dia Jisia no voalohany. '
  '22':
  - type: text
    content: 'Tamin’ny Jizarita dia Selomota; tamin’ny taranak’i Selomota dia Jahata. '
  '23':
  - type: text
    content: 'Ary ny amin’ny taranak’i '
  - type: text
    content: Hebrona
  - type: text
    content: ' dia Jeria '
  - type: text
    content: no voalohany
  - type: text
    content: ', Amaria no faharoa, Jahaziela no fahatelo, Jekameama no fahefatra. '
  '24':
  - type: text
    content: 'Ny zanakalahin’i Oziela dia Mika; tamin’ny taranak’i Mika dia Samira; '
  '25':
  - type: text
    content: 'ny rahalahin’i Mika dia Jisia; tamin’ny taranak’i Jisia dia Zakaria. '
  '26':
  - type: text
    content: 'Ny zanakalahin’i Merary dia Maly sy Mosy; ny zanakalahin’i Jazia dia Beno. '
  '27':
  - type: text
    content: 'Ny zanakalahin’i Merary tamin’i Jazia dia Beno sy Sohama sy Zakora ary Ibry. '
  '28':
  - type: text
    content: 'Avy tamin’i Maly no nihavian’i Eleazara, izay tsy nanan-janakalahy. '
  '29':
  - type: text
    content: 'Ny amin’i Kisy, ny zanani-lahy dia Jeramela. '
  '3':
  - type: text
    content: Ary Davida sy Zadoka, isan’ny taranak’i Eleazara, sy Ahimeleka, isan’ny taranak’Itamara, dia nizara azy araka ny antokony sy ny fanompoany avy.
  '30':
  - type: text
    content: Ary ny zanakalahin’i Mosy dia Maly sy Edera ary Jerimota.
  - type: text
    content: 'Ireo no taranaky ny Levita araka ny fianakaviany avy. '
  '31':
  - type: text
    content: 'Ary ireo dia mba niara-niloka tamin’ny rahalahiny, taranak’i Arona, teo anatrehan’i Davida mpanjaka sy Zadoka sy Ahimeleka sy ny lohan’ny fianakavian’ny mpisorona sy ny Levita: niara-niloka avokoa na ny zokiny na ny zandriny.'
  '4':
  - type: text
    content: 'Ary ny lohany tamin’ireo, dia tamin’ny taranak’i Eleazara, no maromaro kokoa noho ny tamin’ny taranak’Itamara, ka dia nozarainy toy izao izy: Tamin’ny taranak’i Eleazara dia enina ambin’ny folo no lohan’ny fianakaviana; ary tamin’ny taranak’Itamara dia valo kosa no lohan’ny fianakaviana. '
  '5':
  - type: text
    content: 'Ary samy nozarazaraina tamin’ny filokana avokoa izy rehetra; fa samy mpifehy masina, dia mpifehy ho an’Andriamanitra avokoa, na ny avy tamin’ny taranak’i Eleazara, na ny avy tamin’ny taranak’Itamara. '
  '6':
  - type: text
    content: 'Ary Semaia, zanak’i Netanela, mpanoratra anankiray tamin’ny Levita, no nanoratra azy teo anatrehan’ny mpanjaka sy ny mpanapaka sy Zadoka mpisorona sy Ahimeleka, zanak’i Abiatara, sy teo anatrehan’ny lohan’ny fianakaviana tamin’ny mpisorona sy ny Levita: fianakaviana iray no nalaina ho an’i Eleazara, ary iray kosa ho an’Itamara.'
  '7':
  - type: text
    content: 'Ny loka voalohany dia azon’i Joariba, ny faharoa an’i Jedaia, '
  '8':
  - type: text
    content: 'ny fahatelo an’i Harima, ny fahefatra an’i Seorima, '
  '9':
  - type: text
    content: 'ny fahadimy an’i Malkia, ny fahenina an’i Miamina, '
