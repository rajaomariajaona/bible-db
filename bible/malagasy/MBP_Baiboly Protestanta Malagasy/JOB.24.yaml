document_id: JOB.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nahoana no tsy misy fotoan’andro voatendrin’ny Tsitoha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana no tsy hitan’ny mahalala Azy izany androny izany?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mandeha mitsaitsaika ireo, fa mitanjaka tsy manan-kitafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noana eo am-pitondrana ny amboaram-bary
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manao diloilo eo anatin’ny tambohon’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny mpampahory azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tambohon’ireny.
      marker-yv: yv-n
    - type: text
      text: ' izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manosihosy ny famiazam-boaloboka izy, nefa mangetaheta ihany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mitrona ny lehilahy ao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitaraina ny fanahin’ny voalefona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy ahoan’Andriamanitra akory ny ratsy atao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ireny no mpikomy amin’ny mazava;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mihevitra ny làlany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mitoetra eo amin’ny alehany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha vao mangiran-dratsy, dia mifoha ny mpamono olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamono ny ory sy ny malahelo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nony alina, dia tahaka ny mpangalatra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny mason’ny mpijangajanga miandry ny maizimaizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy izy: Tsy misy hahalala ahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia manao very maso izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Misy manamy trano nony maizina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa nony antoandro dia miery izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala ny mazava izy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny aizim-pito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aloky ny fahafatesana.
      marker-yv: yv-n
    - type: text
      text: ' no marainan’ireo rehetra ireo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa mahazatra azy ny fampahatahoran’ny aizim-pito
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aloky ny fahafatesana.
      marker-yv: yv-n
    - type: text
      text: ' izy.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mitsinkafona paohin’ny rano izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaozona ny anjarany eo amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mivily ho amin’ny làlana mankeny amin’ny tanimboaloboka izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy ny andevonan’ny maina sy ny mafana ny ranom-panala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No andevonan’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanota.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misy mamindra fari-tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mangalatra omby aman-ondry sady miandry azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Manadino azy ny vohoka; manjary hanim-py ho an’ny olitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy tsarovana intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tapaka tahaka ny hazo ny ratsy fanahy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: faharatsiana.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia ilay nandroba ny momba izay tsy niteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nanisy soa ny mpitondratena.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kanefa halavain’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' amin’ny heriny ny andron’ny olo-mahery;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangana indray ireo, na dia tsy nanampo izay ho velona intsony aza.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ataony mandry fahizay sy tsara tohana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsinjoviny mandrakariva ny làlany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nasandratra izy, kanjo vetivety dia tsy ao intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mihalevona izy ka otazana tahaka ny olona rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tangosana tahaka ny salohim-bary.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Raha tsy izany, dia aoka hisy hamaky lainga ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiseho ny teniko ho tsinontsinona.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandroaka ny borikin’ny kamboty izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maka ny ombin’ny mpitondratena ho tsatòka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Manosika ny mahantra hiala amin’ny làlana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia miery azy avokoa ny malahelo amin’ny tany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, tahaka ny fivoaky ny boriki-dia any an-efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No fivoak’ireny ho amin’ny asany hiremby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tani-hay no ahazoany hanina ho an’ny zanany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Any an-tsaha izy maka vilona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mandry mitanjaka amin’ny alina izy, satria tsy manan-damba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tsy manana firakotra amin’ny hatsiaka;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kotsan’ny ranonoram-baratra any an-tendrombohitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitampisaka amin’ny vatolampy, fa tsy manam-pialofana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Misarika ny kamboty eo am-pinonoana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maka tsatòka amin’ny ory.
