document_id: JOB.24,873
type_code: plt
verses:
  '1':
  - type: text
    content: Nahoana no tsy misy fotoan’andro voatendrin’ny Tsitoha,
  - type: text
    content: Ary nahoana no tsy hitan’ny mahalala Azy izany androny izany?
  '10':
  - type: text
    content: Mandeha mitsaitsaika ireo, fa mitanjaka tsy manan-kitafy,
  - type: text
    content: Ary noana eo am-pitondrana ny amboaram-bary
  '11':
  - type: text
    content: Manao diloilo eo anatin’ny tambohon’
  - type: text
    content: ny mpampahory azy
  - type: note
    content: Heb. tambohon’ireny.
  - type: text
    content: ' izy;'
  - type: text
    content: Ary manosihosy ny famiazam-boaloboka izy, nefa mangetaheta ihany.
  '12':
  - type: text
    content: Mitrona ny lehilahy ao an-tanàna,
  - type: text
    content: Ary mitaraina ny fanahin’ny voalefona;
  - type: text
    content: Nefa tsy ahoan’Andriamanitra akory ny ratsy atao.
  '13':
  - type: text
    content: Ireny no mpikomy amin’ny mazava;
  - type: text
    content: Tsy mba mihevitra ny làlany izy,
  - type: text
    content: Na mitoetra eo amin’ny alehany.
  '14':
  - type: text
    content: Raha vao mangiran-dratsy, dia mifoha ny mpamono olona;
  - type: text
    content: Mamono ny ory sy ny malahelo izy,
  - type: text
    content: Ary nony alina, dia tahaka ny mpangalatra.
  '15':
  - type: text
    content: Ny mason’ny mpijangajanga miandry ny maizimaizina,
  - type: text
    content: 'Ka hoy izy: Tsy misy hahalala ahy;'
  - type: text
    content: Ka dia manao very maso izy.
  '16':
  - type: text
    content: Misy manamy trano nony maizina;
  - type: text
    content: Nefa nony antoandro dia miery izy;
  - type: text
    content: Tsy mahalala ny mazava izy;
  '17':
  - type: text
    content: Fa ny aizim-pito
  - type: note
    content: Heb. aloky ny fahafatesana.
  - type: text
    content: ' no marainan’ireo rehetra ireo;'
  - type: text
    content: Satria efa mahazatra azy ny fampahatahoran’ny aizim-pito
  - type: note
    content: Heb. aloky ny fahafatesana.
  - type: text
    content: ' izy.'
  '18':
  - type: text
    content: Mitsinkafona paohin’ny rano izy;
  - type: text
    content: Voaozona ny anjarany eo amin’ny tany;
  - type: text
    content: Tsy mivily ho amin’ny làlana mankeny amin’ny tanimboaloboka izy.
  '19':
  - type: text
    content: Toy ny andevonan’ny maina sy ny mafana ny ranom-panala
  - type: text
    content: No andevonan’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny mpanota.'
  '2':
  - type: text
    content: Misy mamindra fari-tany
  - type: text
    content: Sy mangalatra omby aman-ondry sady miandry azy.
  '20':
  - type: text
    content: Manadino azy ny vohoka; manjary hanim-py ho an’ny olitra izy
  - type: text
    content: Ka tsy tsarovana intsony;
  - type: text
    content: Ary tapaka tahaka ny hazo ny ratsy fanahy,
  - type: note
    content: Heb. faharatsiana.
  '21':
  - type: text
    content: Dia ilay nandroba ny momba izay tsy niteraka
  - type: text
    content: Ary tsy nanisy soa ny mpitondratena.
  '22':
  - type: text
    content: Kanefa halavain’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' amin’ny heriny ny andron’ny olo-mahery;'
  - type: text
    content: Mitsangana indray ireo, na dia tsy nanampo izay ho velona intsony aza.
  '23':
  - type: text
    content: Ataony mandry fahizay sy tsara tohana izy,
  - type: text
    content: Sady tsinjoviny mandrakariva ny làlany.
  '24':
  - type: text
    content: Nasandratra izy, kanjo vetivety dia tsy ao intsony,
  - type: text
    content: Dia mihalevona izy ka otazana tahaka ny olona rehetra,
  - type: text
    content: Ary tangosana tahaka ny salohim-bary.
  '25':
  - type: text
    content: Raha tsy izany, dia aoka hisy hamaky lainga ahy
  - type: text
    content: Ka hampiseho ny teniko ho tsinontsinona.
  '3':
  - type: text
    content: Mandroaka ny borikin’ny kamboty izy,
  - type: text
    content: Ary maka ny ombin’ny mpitondratena ho tsatòka.
  '4':
  - type: text
    content: Manosika ny mahantra hiala amin’ny làlana izy,
  - type: text
    content: Ka dia miery azy avokoa ny malahelo amin’ny tany.
  '5':
  - type: text
    content: Indro, tahaka ny fivoaky ny boriki-dia any an-efitra
  - type: text
    content: No fivoak’ireny ho amin’ny asany hiremby;
  - type: text
    content: Ny tani-hay no ahazoany hanina ho an’ny zanany.
  '6':
  - type: text
    content: Any an-tsaha izy maka vilona
  - type: text
    content: Sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
  '7':
  - type: text
    content: Mandry mitanjaka amin’ny alina izy, satria tsy manan-damba,
  - type: text
    content: Ka dia tsy manana firakotra amin’ny hatsiaka;
  '8':
  - type: text
    content: Kotsan’ny ranonoram-baratra any an-tendrombohitra izy,
  - type: text
    content: Ka mitampisaka amin’ny vatolampy, fa tsy manam-pialofana.
  '9':
  - type: text
    content: Misarika ny kamboty eo am-pinonoana izy
  - type: text
    content: Ary maka tsatòka amin’ny ory.
