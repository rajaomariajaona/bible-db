          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' na ny tany havoan’ny Isiraely sy ny tany lemaka aminy koa, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hatramin’ny tendrombohitra mangadihady, izay fiakarana ho any Seïra, ka hatrany Bala-gada eo amin’ny lohasahan’i Libanona am-bodin’ny tendrombohitra Hermona; ary ny mpanjakany rehetra nosamboriny ka novonoiny ho faty. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ela no niadian’i Josoa tamin’ireny mpanjaka rehetra ireny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nisy tanàna izay nanao fihavanana tamin’ny Zanak’Isiraely, afa-tsy ny Hivita izay nonina tany Gibeona ihany; fa azony tamin’ny ady avokoa izy rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ireo mpanjaka tany amin’ny tany havoana any avaratra koa sy tany amin’ny tani-hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
