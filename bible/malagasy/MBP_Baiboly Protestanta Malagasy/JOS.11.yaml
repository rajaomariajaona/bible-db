          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' atsimon’i Kinerota sy tany amin’ny tany lemaka amoron-tsiraka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
