document_id: JOS.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandresena ny mpanjaka rehetra any Kanana Avaratra, sy ny nahazoan’ny Isiraely ny tany Kanana rehetra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa nahare Jabina, mpanjakan’i Hazora, dia naniraka tany amin’i Jobaba, mpanjakan’i Madona, sy ny mpanjakan’i Simrona sy ny mpanjakan’i Aksafa, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary ireo mpanjaka tany amin’ny tany havoana any avaratra koa sy tany amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' atsimon’i Kinerota sy tany amin’ny tany lemaka amoron-tsiraka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' ary tany amin’ny havoan’i Dora andrefana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia tamin’ny Kananita any atsinanana sy any andrefana, ary tamin’ny Amorita sy ny Hetita sy ny Perizita ary ny Jebosita tany amin’ny tany havoana, ary tamin’ny Hivita tany am-bodin’i Hermona, tany amin’ny tany Mizpa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivoaka izy ireo sy ny miaramilany rehetra teo aminy, dia olona maro be toy ny fasika eny amoron-dranomasina ny hamaroany, ary ny soavaliny sy ny kalesiny dia maro indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa nivory ireo mpanjaka rehetra ireo, dia nandeha izy hiady tamin’ny Isiraely ka nitoby teo anilan’ny rano Meroma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Josoa: Aza matahotra azy; fa rahampitso toy izao Izaho dia hanolotra azy rehetra ho faty eo anatrehan’ny Isiraely; traingoy ny soavaliny, ary dory amin’ny afo ny kalesiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandeha Josoa sy ny vahoaka rehetra mpanafika teo aminy ka tonga tampoka taminy teo amoron’ny rano Meroma, dia namely azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jehovah nanolotra azy teo an-tànan’ny Isiraely, izay namely azy ka nanenjika azy hatrany Sidona lehibe sy hatrany Misrefota-maima ary hatramin’ny lohasaha Mizpa atsinanana; dia namely azy izy mandra-paha-tsy nisy niangana na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Josoa dia nanao taminy araka izay efa nandidian’i Jehovah azy: ny soavalin’ireny notraingoiny, ary ny kalesiny nodorany tamin’ny afo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tamin’izany dia niverina Josoa ka nahafaka an’i Hazora ary namely ny mpanjakany tamin’ny sabatra, satria Hazora no lohan’ireny fanjakana rehetra ireny fahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nasiany tamin’ny lelan-tsabatra ny olona rehetra tao ka naringany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nataony herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii.28.
    marker-yv: yv-n
  - type: text
    text: ' avokoa: tsy nisy olo-miaina sisa na dia iray akory aza; ary Hazora nodorany tamin’ny afo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny tanàna rehetra izay an’ireny mpanjaka ireny sy ny mpanjakany rehetra dia azon’i Josoa ary nasiany tamin’ny lelan-tsabatra ka naringany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nataony herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii.28.
    marker-yv: yv-n
  - type: text
    text: ' araka izay efa nandidian’i Mosesy, mpanompon’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny tanàna rehetra izay teny an-kavoana dia tsy mba nodoran’ny Isiraely, afa-tsy Hazora ihany, izay nodoran’i Josoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny fananana rehetra tao amin’ireny tanàna ireny sy ny biby fiompy dia nalain’ny Zanak’Isiraely ho babony; fa ny olona rehetra nasiany tamin’ny lelan-tsabatra mandra-pandringany azy; tsy nasiany niangana na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Araka izay efa nandidian’i Jehovah an’i Mosesy mpanompony no nandidian’i Mosesy an’i Josoa; ka dia izany no nataon’i Josoa: tsy nisy namelany izay rehetra efa nandidian’i Jehovah an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia lasan’i Josoa avokoa izany tany rehetra izany, na ny tany havoana, na ny tany atsimo rehetra, na ny tany Gosena rehetra, na ny tany lemaka amoron-tsiraka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' na ny tani-hay,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' na ny tany havoan’ny Isiraely sy ny tany lemaka aminy koa, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'hatramin’ny tendrombohitra mangadihady, izay fiakarana ho any Seïra, ka hatrany Bala-gada eo amin’ny lohasahan’i Libanona am-bodin’ny tendrombohitra Hermona; ary ny mpanjakany rehetra nosamboriny ka novonoiny ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ela no niadian’i Josoa tamin’ireny mpanjaka rehetra ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy nisy tanàna izay nanao fihavanana tamin’ny Zanak’Isiraely, afa-tsy ny Hivita izay nonina tany Gibeona ihany; fa azony tamin’ny ady avokoa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa avy tamin’i Jehovah no nanamafian’ireo ny fony hiady amin’ny Isiraely, mba hanaovany azy ho zavatra voaozona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: herema.
    marker-yv: yv-n
  - type: text
    text: ' ka tsy nisy famindrampo,–handringanana azy araka izay efa nandidian’i Jehovah an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nandeha tamin’izany andro izany Josoa ka namongotra ny Anakita tany amin’ny tany havoana, dia tany Hebrona sy Debira sy Anaba, ary tany amin’ny tany havoan’i Joda rehetra, ary tany amin’ny tany havoan’Isiraely rehetra: naringan’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nataony herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii.28.
    marker-yv: yv-n
  - type: text
    text: ' i Josoa avokoa izy sy ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy nisy sisa tany amin’ny tanin’ny Zanak’Isiraely ny Anakita; fa tany Gaza sy Gata ary Asdoda ihany no mbola nisy sisa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia lasan’i Josoa avokoa ny tany rehetra, araka izay rehetra nolazain’i Jehovah tamin’i Mosesy; ary nomen’i Josoa ho lovan’ny Isiraely izany, araka ny fizaran’ny fireneny. Dia nitsahatra ny ady ka nandry ny tany.
