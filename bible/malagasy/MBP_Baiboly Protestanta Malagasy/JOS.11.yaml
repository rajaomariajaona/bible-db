document_id: JOS.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandresena ny mpanjaka rehetra any Kanana Avaratra, sy ny nahazoan’ny Isiraely ny tany Kanana rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa nahare Jabina, mpanjakan’i Hazora, dia naniraka tany amin’i Jobaba, mpanjakan’i Madona, sy ny mpanjakan’i Simrona sy ny mpanjakan’i Aksafa, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany dia niverina Josoa ka nahafaka an’i Hazora ary namely ny mpanjakany tamin’ny sabatra, satria Hazora no lohan’ireny fanjakana rehetra ireny fahiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasiany tamin’ny lelan-tsabatra ny olona rehetra tao ka naringany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nataony herema; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxvii.28.
      marker-yv: yv-n
    - type: text
      text: ' avokoa: tsy nisy olo-miaina sisa na dia iray akory aza; ary Hazora nodorany tamin’ny afo.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tanàna rehetra izay an’ireny mpanjaka ireny sy ny mpanjakany rehetra dia azon’i Josoa ary nasiany tamin’ny lelan-tsabatra ka naringany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nataony herema; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxvii.28.
      marker-yv: yv-n
    - type: text
      text: ' araka izay efa nandidian’i Mosesy, mpanompon’i Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tanàna rehetra izay teny an-kavoana dia tsy mba nodoran’ny Isiraely, afa-tsy Hazora ihany, izay nodoran’i Josoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fananana rehetra tao amin’ireny tanàna ireny sy ny biby fiompy dia nalain’ny Zanak’Isiraely ho babony; fa ny olona rehetra nasiany tamin’ny lelan-tsabatra mandra-pandringany azy; tsy nasiany niangana na dia iray akory aza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izay efa nandidian’i Jehovah an’i Mosesy mpanompony no nandidian’i Mosesy an’i Josoa; ka dia izany no nataon’i Josoa: tsy nisy namelany izay rehetra efa nandidian’i Jehovah an’i Mosesy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasan’i Josoa avokoa izany tany rehetra izany, na ny tany havoana, na ny tany atsimo rehetra, na ny tany Gosena rehetra, na ny tany lemaka amoron-tsiraka,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fk
        children:
