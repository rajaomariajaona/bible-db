      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sefela.
      marker-yv: yv-n
    - type: text
      text: ' na ny tani-hay,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fk
