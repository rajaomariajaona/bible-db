document_id: LEV.23,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Lalàna ny amin’ny fanamasinana ny fotoam-pivavahana voatendrin’i Jehovah.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Rehefa tonga any amin’ny tany izay omeko anareo hianareo ka hijinja ny vokatra any, dia mitondrà amboara iray amin’ny voaloham-bokatrareo ho any amin’ny mpisorona hianareo; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hanevaheva ny amboara eo anatrehan’i Jehovah izy, hankasitrahana anareo; amin’ny ampitson’ny Sabata no hanevahevan’ny mpisorona azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’izay andro hanevahevanareo ny amboara dia manatera zanak’ondrilahy tsy misy kilema izay iray taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' ho fanatitra dorana ho an’i Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanatitra hohanina momba azy dia koba tsara toto roa ampahafolon’ny efaha voaharo diloilo hatao fanatitra atao amin ny afo ho hanitra ankasitrahana ho an’i Jehovah; ary ny fanatitra aidina momba azy dia divay ampahefatry ny hina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza mihinana mofo, na lango, na salohim-bary maitso, mandra-pahatongan’ny andro izay hitondranareo fanatitra ho an’Andriamanitrareo; ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany eny amin’izay fonenanareo rehetra.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary manisà ho anareo hatramin’ny ampitson’ny Sabata, dia hatramin’izay andro itondranareo ny amboara ho fanatitra ahevaheva, dia fito herinandro mipaka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia amin’ny ampitson’ny Sabata fahafito no hahataperan’ny andro dimam-polo hisainareo, dia manatera fanatitra hohanina vaovao ho an’i Jehovah indray. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mitondrà mofo roa avy amin’ny fonenanareo ho fanatitra ahevaheva; hatao amin’ny koba tsara toto roa ampahafolon’ny efaha izy ka hasiana masirasira raha hendasina; voaloham-bokatra ho an’i Jehovah izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary manatera miaraka amin’ny mofo zanak ondrilahy fito tsy misy kilema, izay iray taona,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' sy vantotr’ombilahy iray ary ondrilahy roa–hatao fanatitra dorana ho an’i Jehovah ireo–mbamin’ny fanatitra hohanina momba azy sy ny fanatitra aidina momba azy, dia hanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia manatera osilahy iray ho fanatitra noho ny ota sy zanak’ondrilahy roa izay iray taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' ho fanati-pihavanana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Ny amin’ny fotoam-pivavahana voatendrin’i Jehovah, izay hantsoinareo ho fivoriana masina, dia izao no izy:–'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona hanevaheva ireo mbamin’ny mofon’ny voaloham-bokatra ho fanatitra ahevaheva eo anatrehan’i Jehovah mbamin’ny zanak’ondrilahy roa koa; ireo dia ho masina ho an’i Jehovah ho anjaran’ny mpisorona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary miantsoa izany andro izany ho fivoriana masina ho anareo, ka aza manao tao-zavatra akory; ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany eny amin’izay fonenanareo rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mijinja ny vokatry ny tanimbarinareo hianareo, dia aza jinjana avokoa ny eny an-tsisiny, ary aza tsimponina izay latsaka avy amin’ny vokatrao, fa avelao ho an’ny malahelo sy ny vahiny izany: Izaho no Jehovah Andriamanitrareo.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Ny andro voalohany amin’ny volana fahafito dia ho andro fitsaharana ho anareo, dia fahatsiarovana amin ny fitsofana trompetra, ho fivoriana masina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manao tao-zavatra akory hianareo; fa manatera fanatitra atao amin’ny afo ho an’i Jehovah.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny andro fahafolo amin’izany volana fahafito izany (dia ny andro fanavotana) hisy fivoriana masina ho anareo; ary hampahory ny tenanareo hianareo ka hanatitra fanatitra atao amin’ny afo ho an’i Jehovah. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza manao raharaha akory amin’izany andro izany; fa andro fanavotana izany, hanaovana fanavotana ho anareo eo anatrehan’i Jehovah Andriamanitrareo– '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny olona rehetra izay tsy mety miory amin’izany andro izany dia hofongorana tsy ho amin’ny fireneny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Henemana no hanaovana raharaha; fa ny andro fahafito dia tena andro fitsaharana, dia fivorina masina; aza manao raharaha akory hianareo, fa Sabata ho an’i Jehovah eny amin’izay fonenanareo rehetra izany.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra izay manao raharaha akory amin’izany andro izany dia hofongorako tsy ho amin’ny fireneny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao raharaha akory; ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany eny amin’izay rehetra honenanareo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho tena andro fitsaharana ho anareo izany, ary hampahory ny tenanareo hianareo; amin’ny andro fahasivy amin’ny volana, rehefa hariva–dia hatramin’ny hariva ka hatramin’ny ampitso hariva–no hitandremanareo ny andro fitsaharanareo.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Amin’ny andro fahadimy ambin’ny folo amin’izany volana fahafolo izany no hiantombohan’ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo hafitoana ho an’i Jehovah. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro voalohany dia hisy fivoriana masina: aza manao tao-zavatra akory. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafitoana no hanateranareo fanatitra atao amin’ny afo ho an’i Jehovah; ary amin’ny andro fahavalo dia hisy fivoriana masina ho anareo koa, ka hanatitra fanatitra atao amin’ny afo ho an’i Jehovah hianareo; fara-fivoriana izany, koa aza manao tao-zavatra akory.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no fotoam-pivavahana voatendrin’i Jehovah, ka hantsoinareo ho fivoriana masina, hanaterana fanatitra atao amin’ny afo ho an’i Jehovah, dia fanatitra dorana sy fanatitra hohanina sy fanatitra hafa alatsa-dra sy fanatitra aidina, samy amin’ny fotoany avy izy rehetra,– '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izay fanao amin’
    - type: text
      text: ' ny Sabatan’i Jehovah sy ny zavatra omenareo sy ny fanatitra rehetra hanalanareo voady ary ny fanati-tsitraponareo rehetra, izay omenareo ho an’i Jehovah.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny andro fahadimy ambin’ny folo amin’ny volana fahafito, raha manangona ny vokatry ny tany hianareo, dia tandremo ny andro firavoravoana hafitoana ho an’i Jehovah; ny andro voalohany dia andro fitsaharana, ary ny andro fahavalo dia andro fitsaharana koa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no fotoam-pivavahana voatendrin’i Jehovah, dia fivoriana masina hantsoinareo amin’ny fotoany avy: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’ny andro voalohany dia makà voan’ny hazo tsara tarehy, dia sampan-drofia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: palma.
      marker-yv: yv-n
    - type: text
      text: ' sy rantsan’ny hazo mikirindro ary hazomalahelo amoron’ny renirano, ho anareo; dia mifalia hafitoana eo anatrehan’i Jehovah Andriamanitrareo hianareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tandremo izany ho andro firavoravoana ho an’i Jehovah hafitoana isan-taona. Ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany; amin’ny volana fahafito nohitandremanareo azy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao amin’ny trano rantsan-kazo no hitoeranareo hafitoana; ny tompon-tany rehetra amin’ny Zanak’Isiraely dia samy hitoetra ao amin’ny trano rantsan-kazo avokoa, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho fantatry ny taranakareo fa nampilasy ny Zanak’Isiraely tao amin’ny trano rantsan-kazo Aho, raha nitondra azy nivoaka avy tany amin’ny tany Egypta: Izaho no Jehovah Andriamanitrareo.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Mosesy dia nilaza tamin’ny Zanak’Isiraely ny fotoam-pivavahana voatendrin’i Jehovah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny andro fahefatra ambin’ny folo amin’ny volana voalohany, rehefa hariva, dia Paskan’i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny andro fahadimy ambin’ny folo amin’izany volana izany dia andro firavoravoana ho an’i Jehovah, fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananareo mofo tsy misy masirasira. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny andro voalohany dia hisy fivoriana masina ho anareo: aza manao tao-zavatra akory hianareo; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa manatera fanatitra atao amin’ny afo ho an’i Jehovah hafitoana; ary amin’ny andro fahafito dia hisy fivoriana masina koa; aza manao tao-zavatra akory hianareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
