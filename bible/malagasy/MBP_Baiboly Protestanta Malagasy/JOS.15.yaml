document_id: JOS.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anjaran’ny firenen’i Joda.
  - type: text
    content: 'ARY izao no anjaran’ny firenena taranak’i Joda tamin’ny filokana araka ny fokony: hatramin’ny fari-tanin’i Edoma, dia ny efitra Zina atsimo, izay faran’ny fari-tany atsimo.'
  '10':
  - type: text
    content: 'dia niolaka hatrany Bala andrefana ka hatramin’ny tendrombohitra Seïra ka nandroso hatramin’ny ilany avaratry ny tendrombohitra Jearima (Kesalona izany), dia nidina hatrany Beti-semesy ka nandroso hatrany Timna. '
  '11':
  - type: text
    content: dia nihatra tamin’ny lafiny avaratr’i Ekrona, dia nizotra hatrany Sikerona ka nandroso hatramin’ny tendrombohitra Bala, dia nihatra tamin’i Jabniela, ary dia nihatra tany amin’ny ranomasina.
  '12':
  - type: text
    content: Ary ny fari-tany andrefana dia ny moron’ny Ranomasina Lehibe.
  - type: text
    content: Izany no fari-tany manodidina ny anjaran’ny taranak’i Joda araka ny fokony.
  '13':
  - type: text
    content: Ary Kaleba, zanak’i Jefone, dia nomeny anjara teo amin’ny taranak’i Joda, araka ny didin’i Jehovah tamin’i Josoa, dia ny tanànan’i Arba,
  - type: note
    content: 'Na: Kiriat-arba; izahao Jos. xv. 54.'
  - type: text
    content: ' rain’i Anàka (Hebrona izany). '
  '14':
  - type: text
    content: Dia noroahin’i Kaleba niala tao izy telo lahy, taranaky ny Anakita, dia Sesay sy Ahimana ary Talmay.
  '15':
  - type: text
    content: 'Dia niakatra avy tao izy hankany amin’ny mponina any Debira (Kiriata-sefera no anaran’i Debira taloha). '
  '16':
  - type: text
    content: 'Ary hoy Kaleba: Izay mamely an’i Kiriata-sefera ka mahafaka azy, dia homeko azy Aksa zanako-vavy ho vadiny. '
  '17':
  - type: text
    content: 'Ary Otniela, zanak’i Kenaza, rahalahin’i Kaleba, no nahafaka azy; ka dia nomeny azy Aksa zanani-vavy ho vadiny. '
  '18':
  - type: text
    content: 'Ary rehefa voampakatra ravehivavy, dia nanome vava ny lahy hangataka saha tamin-drainy; dia niala faingana tamin’ny borikiny ravehivavy, ka hoy Kaleba taminy: Inona no ilainao? '
  '19':
  - type: text
    content: 'Ary hoy izy: Omeo tso-drano aho; fa tsy tany misy rano no efa nomenao ahy, ka mba omeo loharano koa aho. Dia nomeny azy ny loharano ambony sy ny loharano ambany.'
  '2':
  - type: text
    content: 'Ary ny fari-taniny atsimo dia hatramin’ny faran’ny Ranomasin-tsira, dia hatramin’ny helo-drano atsimo, '
  '20':
  - type: text
    content: 'Izao no lovan’ny firenena taranak’i Joda araka ny fokony: '
  '21':
  - type: text
    content: 'Ny tanàna farany amin’ny firenena taranak’i Joda, eo akaikin’ny fari-tanin’i Edoma amin’ny tany atsimo, dia Kabzela sy Edera sy Jagora '
  '22':
  - type: text
    content: 'sy Kina sy Dimona sy Adada '
  '23':
  - type: text
    content: 'sy Kadesy sy Hazora sy Itnana '
  '24':
  - type: text
    content: 'sy Zifa sy Talema sy Bealota '
  '25':
  - type: text
    content: 'sy Hazora-hadata sy Keriota-hezrona (Hazora izany), '
  '26':
  - type: text
    content: 'sy Amama sy Sema sy Molada '
  '27':
  - type: text
    content: 'sy Hazara-gada sy Hesmona sy Beti-paleta '
  '28':
  - type: text
    content: 'sy Hazara-soala sy Beri-sheba sy Biziotia '
  '29':
  - type: text
    content: 'sy Bala sy Ie sy Azema '
  '3':
  - type: text
    content: 'dia nandroso hatrany atsimon’ny fiakarana Akrabima, dia nandroso hatrany Zina, dia niakatra any atsimon’i Kadesi-barnea ka nandroso hatrany Hezrona, dia niakatra any Adara ary niolaka hatrany Karka. '
  '30':
  - type: text
    content: 'sy Eltolada sy Kesila sy Horma '
  '31':
  - type: text
    content: 'sy Ziklaga sy Madmana sy Sansana '
  '32':
  - type: text
    content: sy Lebaota sy Silima sy Aina sy Rimona; sivy amby roa-polo ny tanàna rehetra sy ny zana-bohiny.
  '33':
  - type: text
    content: Ary teo amin’ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela.
  - type: text
    content: ' dia Estaola sy Zora sy Asna '
  '34':
  - type: text
    content: 'sy Zanoa sy En-ganima sy Tapoa sy Enama '
  '35':
  - type: text
    content: 'sy Jarmota sy Adolama sy Soko sy Azeka '
  '36':
  - type: text
    content: 'sy Saraima sy Aditaima sy Gadera sy Gederotaima: tanàna efatra ambin’ny folo sy ny zana-bohiny; '
  '37':
  - type: text
    content: 'ary Zenana sy Hadasa sy Migdala-gada '
  '38':
  - type: text
    content: 'sy Dilana sy Mizpa ary Joktela '
  '39':
  - type: text
    content: 'sy Lakisy sy Bozkata sy Eglona '
  '4':
  - type: text
    content: Dia nandroso hatrany Azmona ka nahazo ny lohasahan-driak’i Egypta, ary dia nihatra tamin’ny ranomasina; izany no ho fari-taninareo atsimo.
  '40':
  - type: text
    content: 'sy Kabona sy Lamasa sy Kitlisa '
  '41':
  - type: text
    content: 'sy Gederota sy Beti-dagona sy Nama sy Makeda: tanàna enina ambin’ny folo sy ny zana-bohiny; '
  '42':
  - type: text
    content: 'Libna sy Atera sy Asana '
  '43':
  - type: text
    content: 'sy Jifta sy Asna ary Neziba '
  '44':
  - type: text
    content: 'sy Keila sy Akziba ary Maresa: tanàna sivy sy ny zana-bohiny; '
  '45':
  - type: text
    content: 'Ekrona sy ny tanànany ary ny zana-bohiny; '
  '46':
  - type: text
    content: 'hatrany Ekrona no ho miankandrefana, dia izay rehetra akaiky an’i Asdoda, sy ny zana-bohitr’ireo, '
  '47':
  - type: text
    content: Asdoda sy ny tanànany ary ny zana-bohiny, Gaza sy ny tanànany ary ny zana-bohiny, hatramin’ny lohasahan-driak’i Egypta sy ny amoron’ny Ranomasina Lehibe.
  '48':
  - type: text
    content: 'Ary tany amin’ny tany havoana dia Samira sy Jatira sy Soko '
  '49':
  - type: text
    content: 'sy Dana sy Kiriata-sana (Debira izany) '
  '5':
  - type: text
    content: Ary ny fari-tany atsinanana dia ny Ranomasin-tsira hatramin’ny faran’i Jordana.
  - type: text
    content: 'Ary ny fari-taniny tamin’ny lafiny avaratra dia hatramin’ny helo-drano eo amin’ny faran’i Jordana, '
  '50':
  - type: text
    content: 'sy Anaba sy Estemo sy Anima '
  '51':
  - type: text
    content: 'sy Gosena sy Holona sy Gilo: tanàna iraika ambin’ny folo sy ny zana-bohiny; '
  '52':
  - type: text
    content: 'Araba sy Doma sy Esana '
  '53':
  - type: text
    content: 'sy Janoma sy Beti-tapoa sy Afeka '
  '54':
  - type: text
    content: 'sy Homta sy Kiriat-arba (Hebrona izany) ary Ziora: tanàna sivy sy ny zana-bohiny; '
  '55':
  - type: text
    content: 'Maona sy Karmela sy Zifa sy Jota '
  '56':
  - type: text
    content: 'sy Jezirela sy Jokdeama sy Zanoa '
  '57':
  - type: text
    content: 'sy Kaina sy Gibea sy Timna: tanàna folo sy ny zana-bohiny; '
  '58':
  - type: text
    content: 'sy Halola sy Beti-zora sy Gedora '
  '59':
  - type: text
    content: 'sy Marata sy Bet-anota sy Eltekona: tanàna enina sy ny zana-bohiny; '
  '6':
  - type: text
    content: 'dia niakatra hatrany Beti-hogla ka nandroso any avaratr’i Bet-araba, dia niakatra hatramin’ny vaton’i Bohana, zanak’i Robena, '
  '60':
  - type: text
    content: sy Kiriata-bala (Kiriata-jearima izany) sy Raba; tanàna roa sy ny zana-bohiny.
  '61':
  - type: text
    content: 'Tany an-efitra dia Bet-araba sy Midina sy Sekaka '
  '62':
  - type: text
    content: 'sy Nibsana sy ilay Tanànan-tsira ary En-jedy: tanàna enina sy ny zana-bohiny.'
  '63':
  - type: text
    content: Ary ny amin’ny Jebosita, mponina any Jerosalema, dia tsy naharoaka azy ny taranak’i Joda; fa miara-monina amin’ny taranak’i Joda any Jerosalema amndraka andro-any izy ireny.
  '7':
  - type: text
    content: 'dia niakatra ho any Debira hatramin’ny lohasaha Akora ary nianavaratra manandrify an’i Gilgala tandrifin’ny fiakarana Adomina, izay eo atsimon’ny lohasahan-driaka, dia nandroso hatramin’ny rano Ensemesy ary nihatra tany En-rogela, '
  '8':
  - type: text
    content: 'dia niakatra teo amin’ny lohasahan’ny taranak’i Hinoma, ho eo anilany atsimon’ny Jebosita (Jerosalema izany), dia niakatra hatramin’ny tampon’ny tendrombohitra, izay manandrify ny lohasahan’i Hinoma eo andrefany, amin’ny farany avaratry ny Lohasahan’ny Refaïta, '
  '9':
  - type: text
    content: 'dia nizotra hatramin’ny tampon’ny tendrombohitra ka nihatra tamin’ny loharano Neftoa, dia nahazo ny tanàna tao an-tendrombohitra Efrona, dia nizotra hatrany Bala (Kiriata-jearima izany), '
