document_id: EPH.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanendrena an’i Paoly ho Apostolin’ny jentilisa, sy ny vavaka aman-tsaotra nataony ho an’ny fiangonana tao Efesosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY noho izany, izaho Paoly, mpifatotra an’i Kristy Jesosy, noho ny aminareo jentilisa,– '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'raha mba renareo ny fitondrana ny fahasoavan’Andriamanitra izay nomena ahy ho anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa fanambarana no nampahafantarana ahy ny zava-niafina, araka ny voasoratro tamin’ny teny fohifohy teo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary araka izany, raha mamaky hianareo, dia ho hainareo fantarina ny fahafantarako ny zava-niafina ny amin’i Kristy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'izay tsy mbola nampahafantarina ny zanak’olombelona tamin’ny taranaka lasa tahaka ny fanambaran’ny Fanahy ankehitriny amin’ny Apostoly masina sy ny mpaminany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia ny ahatongavan’ny jentilisa ho mpiray lova sy ho tena iray ary ho mpiombona ny teny fikasana ao amin’i Kristy Jesosy noho ny filazantsara, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'izay nanaovana ahy ho mpanompo araka ny fanomezan’ny fahasoavan’Andriamanitra, izay nomena ahy araka ny fiàsan’ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, izaho, izay kely noho ny kely indrindra amin’ny olona masina rehetra, no nomena izao fahasoavana izao, dia ny hitory amin’ny jentilisa ny haren’i Kristy tsy hita lany, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary ny hampahazava ny olona rehetra mba hahalalany izay fitondrana ny zava-miafina, dia ilay voàfina hatramin’ny nanaovana izao tontolo izao tao amin’Andriamanitra, Izay nanao ny zavatra rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba hampahafantarina ireo fanapahana sy fahefana any an-danitra amin’izao ankehitriny izao ny mahamaro samy hafa ny fahendren’Andriamanitra amin’ny fitondrany ny fiangonana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'araka ny fikasana hatrizay hatrizay izay nataony tao amin’i Kristy Jesosy Tompontsika, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay ananantsika fahasahiana sy fanatonana amin’ny fahatokiana noho ny finoana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa izany no angatahako aminareo mba tsy ho ketraka amin’ny fahoriako ho anareo, fa voninahitrareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary noho izany no andohalehako amin’ny Ray, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay ahazoan’ny fianakaviana rehetra any an-danitra sy etỳ an-tany anarana, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mba homeny anareo, araka ny haren’ny voninahiny, ny mba hohatanjahina fatratra amin’ny Fanahiny ny toe-panahinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mba hitoeran’i Kristy ao am-ponareo amin’ny finoana, ka hamaka sy hiorina mafy amin’ny fitiavana hianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba hahaizanareo mbamin’ny olona masina rehetra ny hahafantatra tsara izay sakany sy lavany ary hahavony sy halaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary hahalala ny fitiavan’i Kristy, izay mihoatra noho ny fahalalana, mba hamenoana anareo ho amin’ny fahafenoan’Andriamanitra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ho an’Izay mahay manao mihoatra noho ny zavatra rehetra, eny, mihoatra lavitra noho izay rehetra angatahintsika na heverintsika aza, araka ny hery izay miasa ato amintsika, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ho Azy anie ny voninahitra ao amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' sy ao amin’i Kristy Jesosy hatramin’ny taranaka farany indrindra mandrakizay mandrakizay. Amena.'
