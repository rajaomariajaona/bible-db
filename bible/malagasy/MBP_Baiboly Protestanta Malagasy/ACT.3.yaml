document_id: ACT.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Petera ilay lehilahy nalemy tongotra, sy ny toriteny nataony tamin’ny olona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Petera sy Jaona niakatra ho eo an-kianjan’ny tempoly tamin’ny ora fahasivy fotoam-pivavahana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary fantany tsara fa io no ilay nipetraka teo amin’ny vavahady Itsaraendrika eo amin’ny tempoly mba hiantrana; dia gaga sady talanjona ny olona noho izay tonga tamin-dralehilahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary raha nihazona an’i Petera sy Jaona izy, dia niara-nirohitra ny olona rehetra ho eo amin’izy telo lahy teo amin’ny fialofana izay atao hoe Fialofan’i Solomona, ka talanjona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Petera, nony nahita, dia namaly ny vahoaka hoe: Ry lehilahy Isiraely, nahoana no talanjona amin’izany hianareo? Ary nahoana no mandinika anay hianareo, toa herinay na fahamasinanay no nanaovanay azy ho afa-mandeha? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Andriamanitr’i Abrahama sy Isaka ary Jakoba, Andriamanitry ny razantsika, no nanome voninahitra an’i Jesosy Mpanompony,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zanany.
      marker-yv: yv-n
    - type: text
      text: ' Izay natolotrareo sy nolavinareo teo anatrehan’i Pilato, rehefa nokasainy halefa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa hianareo nandà Ilay Masina sy Marina, ary mpamono olona no nangatahinareo halefa ho anareo; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa ny Tompon’ny aina kosa no novonoinareo; fa Izy natsangan’Andriamanitra tamin’ny maty, ary vavolombelon’izany izahay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ny anarany no nampahatanjaka io lehilahy hitanareo sy fantatrareo io noho ny finoana ny anarany; eny, ny finoana izay azo amin’ny alalany no nahazoany izao fahasitranana tsara eto imasonareo rehetra izao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ankehitriny, ry rahalahy, fantatro fa tamin’ny tsi-fahalalana no nanaovanareo izany, tahaka ny mpanapaka anareo koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa izany no nahatanterahan’Andriamanitra ny zavatra nampilazainy ny mpaminany rehetra rahateo, fa hiaretan’ny Kristiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa mibebaha hianareo, ka miverena hamonoana ny fahotanareo, mba ho avy izay andro famelombelomana avy amin’ny fanatrehan’ny Tompo, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy nitondra lehilahy nalemy tongotra hatrany an-kibon-dreniny, izay napetrany isan-andro teo anoloan’ny vavahadin’ny tempoly, ilay atao hoe Itsaraendrika, mba hangataka fiantrana amin’izay niditra teo an-kianjan’ny tempoly; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary mba hanirahany ny Kristy voatendry ho anareo, dia Jesosy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ilay tsy maintsy horaisin’ny lanitra mandra-pihavin’ny andro fampodiana ny zavatra rehetra, izay nampilazain’Andriamanitra ny mpaminaniny masina hatramin’ny voalohany indrindra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa Mosesy nilaza hoe: ,,Mpaminany no hatsangan’i Jehovah Andriamanitra ho anareo avy amin’ny rahalahinareo, tahaka ahy; izy no hohenoinareo amin’izay rehetra holazainy aminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary izay rehetra tsy hihaino izany mpaminany izany dia haringana tsy ho eo amin’ny olona’’ (Deo. 18.15, 19). '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ny mpaminany rehetra koa hatramin’i Samoela sy izay nanarakaraka, na iza na iza niteny, dia nanambara izao andro izao.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hianareo no zanaky ny mpaminany sy ny fanekena nataon’Andriamanitra tamin’ny razanareo, raha hoy Izy tamin’i Abrahama: ,,Ary amin’ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany’’ (Gen. 22.18). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Andriamanitra, rehefa nanangana ny Mpanompony,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Zanany.
      marker-yv: yv-n
    - type: text
      text: ' dia naniraka Azy ho aminareo voalohany, mitahy anareo amin’ny fialanareo rehetra amin’ny faharatsianareo isam-batan’olona.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'nony nahita an’i Petera sy Jaona efa hiditra eo an-kianjan’ny tempoly izy, dia nangataka mba homena fiantrana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Petera sy Jaona nibanjina azy ka nanao hoe: Mijere anay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nibanjina azy roa lahy tsara izy, fa nanantena hahazo zavatra taminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy Petera: Tsy manana volafotsy na volamena aho, fa izay ananako no omeko anao: Amin’ny anaran’i Jesosy Kristy avy any Nazareta, mitsangantsangàna. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary noraisiny tamin’ny tànany ankavanana ralehilahy ka natsangany; dia natanjaka niaraka tamin’izay ny tongony sy ny kitrokeliny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary niantsambotra izy ka nijoro, dia nitsangantsangana ary niara-niditra taminy ho eo an-kianjan’ny tempoly, nitsangantsangana sy niantsambotsambotra sady nidera an’Andriamanitra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny vahoaka rehetra nahita azy mitsangantsangana sy midera an’Andriamanitra. '
