document_id: JHN.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nisehoan’i Jesosy tamin’ny mpianatra teo amoron’ny Ranomasin’i Galilia.
  - type: text
    content: 'REHEFA afaka izany, dia niseho tamin’ny mpianatra indray Jesosy teo amoron’ny Ranomasin’i Tiberiasy; ary toy izao no nisehoany: '
  '10':
  - type: text
    content: 'Hoy Jesosy taminy: Analao hazandrano amin’ireo vao azonareo teo. '
  '11':
  - type: text
    content: Dia niakatra Simona Petera, ka nosarihany ho eo an-tanety ny harato feno hazandrano vaventy, telo amby dimam-polo amby zato; ary na dia be tahaka izany aza izy, dia tsy triatra ny harato.
  '12':
  - type: text
    content: 'Hoy Jesosy taminy: Avia hisakafo. Fa tsy nisy mpianatra sahy nanontany Azy hoe: Iza moa Hianao? satria fantany ihany fa ny Tompo Izy. '
  '13':
  - type: text
    content: 'Ary tonga Jesosy, dia nandray ny mofo, ka natolony azy, dia vao ny hazandrano indray. '
  '14':
  - type: text
    content: Izany no fanintelon’ny nisehoan’i Jesosy tamin’ny mpianatra, rehefa nitsangana tamin’ny maty Izy.
  '15':
  - type: text
    content: 'Ary rehefa nisakafo izy, dia hoy Jesosy tamin’i Simona Petera: Simona, zanak’i Jaona, moa ny fitiavanao Ahy mihoatra noho ny fitiavan’ireto? Hoy izy taminy: Eny, Tompoko; Hianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Fahano ary ny ondrikeliko. '
  '16':
  - type: text
    content: 'Hoy indray Izy taminy fanindroany: Simona, zanak’i Jaona, moa tia Ahy va hianao? Dia hoy izy taminy: Eny, Tompoko; Hianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Andraso ary ny ondriko. '
  '17':
  - type: text
    content: 'Hoy Izy fanintelony: Simona, zanak’i Jaona, moa tia Ahy va hianao? Dia nalahelo Petera, satria Izy nanao intelo taminy hoe: Moa tia Ahy va hianao? Ka hoy izy taminy: Tompoko, Hianao mahalala ny zavatra rehetra; fantatrao fa tia Anao aho. Hoy Jesosy taminy: Fahano ary ny ondriko. '
  '18':
  - type: text
    content: 'Lazaiko aminao marina dia marina tokoa: Raha mbola tanora hianao, dia nisikina ka nandeha tamin’izay tianao; fa rehefa antitra kosa hianao, dia haninjitra ny tànanao, ary olon-kafa no hanikina anao ka hitondra anao amin’izay tsy tianao. '
  '19':
  - type: text
    content: 'Ary izany no nolazainy hanambara ny fomban’ny fahafatesana izay hankalazany an’Andriamanitra. Ary rehefa voalazany izany, dia hoy Izy taminy: Manaraha Ahy.'
  '2':
  - type: text
    content: 'Niaraka Simona Petera sy Tomasy, izay atao hoe Didymo, sy Natanaela, ilay avy tany Kana any Galilia, sy ireo zanak’i Zebedio ary mpianatra roa lahy hafa koa. '
  '20':
  - type: text
    content: 'Dia nitodika Petera ka nahita ny mpianatra izay tian’i Jesosy manaraka, dia ilay niankina tamin’ny tratrany tamin’ny fisakafoana ka nanao hoe: Tompoko, iza no hamadika Anao? '
  '21':
  - type: text
    content: 'Koa rehefa nahita azy Petera, dia hoy izy: Tompoko, inona no ho amin’ity lehilahy ity? '
  '22':
  - type: text
    content: 'Hoy Jesosy taminy: Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany? fa manaraha Ahy hianao.'
  '23':
  - type: text
    content: 'Ary niely tamin’ny rahalahy izany teny izany, fa tsy ho faty izany mpianatra izany; nefa Jesosy tsy nilaza taminy fa tsy ho faty izy, fa: ,Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany?’'
  '24':
  - type: text
    content: Izy no ilay mpianatra izay vavolombelona manambara izany sy nanoratra izany; ary fantatsika fa marina ny fanambarany.
  '25':
  - type: text
    content: Ary misy zavatra maro hafa koa izay nataon’i Jesosy, ka raha voasoratra tsirairay avokoa izany rehetra izany, ataoko fa izao tontolo izao aza dia tsy omby ny boky voasoratra.
  '3':
  - type: text
    content: 'Hoy Simona Petera taminy: Handeha hanarato aho. Hoy ireo taminy: Handeha hiaraka aminao koa izahay. Dia nandeha izy ka niditra an-tsambokely, ary tamin’iny alina iny dia tsy nahazo na inona na inona akory izy. '
  '4':
  - type: text
    content: 'Ary nony efa nazava ratsy ny andro, dia nitsangana teo amoron-dranomasina Jesosy, kanefa tsy fantatry ny mpianatra ho Jesosy izany. '
  '5':
  - type: text
    content: 'Dia hoy Jesosy taminy: Anaka, manan-kanina'
  - type: note
    content: Gr. laoka.
  - type: text
    content: ' va hianareo? Dia namaly Azy hoe izy: Tsia. '
  '6':
  - type: text
    content: 'Ary hoy Izy taminy: Alatsaho eo amin’ny sisiny ankavanan’ny sambokely ny haratonareo, dia hahazo hianareo. Koa dia nalatsany izany, ka tsy zakany nakarina noho ny habetsahan’ny hazandrano. '
  '7':
  - type: text
    content: 'Ary hoy ny mpianatra izay tian’i Jesosy tamin’i Petera: Ny Tompo irỳ. Ary raha ren’i Simona Petera fa ny Tompo iny, dia nisikinany ny akanjo ivelany (fa tsy niakanjo izy), ka nirotsaka teo amin’ny ranomasina izy. '
  '8':
  - type: text
    content: Fa ny mpianatra sasany nandeha an-tsambokely ihany nisarika ny harato feno hazandrano; fa tsy lavitra ny tany izy, fa tokony ho roan-jato hakiho ihany.
  '9':
  - type: text
    content: 'Raha vao niakatra teo an-tanety izy, dia nahita afon’arina teo sy hazandrano teo amboniny ary mofo. '
