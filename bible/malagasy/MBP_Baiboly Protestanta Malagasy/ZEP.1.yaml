document_id: ZEP.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY tenin’i Jehovah, izay tonga tamin’i Zefania, zanak’i Kosy, zanak’i Gedalia, zanak’i Amaria, zanak’i Hezekia, tamin’ny andro nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hamaliana ny firenena rehetra noho ny ratsy nataony, indrindra fa ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: HAKIFAKO tokoa ny zavatra rehetra tsy ho eny ambonin’ny tany, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, hakifako ny olona sy ny biby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hakifako ny vorona eny amin’ny habakabaka sy ny hazandrano any an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zavatra mahatafintohina mbamin’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haringako tsy ho amin’ny tany ny olona, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hahinjitro ny tànako hamely ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny mponina rehetra any Jerosalema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia haringako tsy ho eo amin’ity tany ity ny sisa amin’i Bala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny anaran’ny mpisorona amin’ny andriamani-tsi-izy mbamin’ny tena mpisorona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sy izay mivavaka any an-tampon-trano amin’izay eny amin’ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay miankohoka sy mianiana ho an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mianiana amin’i Malkama,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny mpanjakany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary izay nihemotra niala tamin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay tsy nitady an’i Jehovah na nanontany taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mangìna eo anatrehan’i Jehovah Tompo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa antomotra ny andron’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah efa niomana hamono zavatra hatao fanatitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka efa nanamasina ny olona nasainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary raha mby amin’ny andro hamonoan’i Jehovah zavatra hatao fanatitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hovaliako ny lehibe sy ny zanak’andriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’izay rehetra mitafy ny fitafin’ny firenena hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary amin’izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo mameno loza sy fitaka ny tranon’ny tompony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary amin’izany andro izany, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hisy feo re mitaraina any am-bavahadin-kazandrano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fidradradradrana ao amin’ny tanàna ambany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fidarabohana miezinezina any amin’ny havoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Midradradradrà, hianareo mponina ao Maktesy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Maktesy = Laona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ringana avokoa ny mpandranto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vahoakan’i Kanana.
    marker-yv: yv-n
  - type: text
    text: ' rehetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, lany ringana izay rehetra nivesatra volafotsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary amin’izany andro izany dia hotsiloviko amin’ny jiro Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hovaliako ny olona izay efa lefy ao amin’ny faikany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia izay manao anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hanao soa Jehovah no tsy hanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka dia ho tonga babo ny fananan’ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lao ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanao trano izy, nefa tsy hitoetra ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamboly voaloboka izy, nefa tsy hisotro ny divay avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa antomotra ny andro lehiben’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa antomotra sady mihafaingana indrindra–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injay! feon’ny andron’i Jehovah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lehilahy mahery dia mitomany mafy any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Andro fahatezerana izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro fahoriana sy fahalahelovana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro fandravana sy fanafoanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro maizina sy manjombona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro mandrahona sy maizim-pito.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Andro fahaveloman’ny anjomara sy ny akora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamelezana ny tanàna mimanda sy ny tilikambo avo eny amin’ny zorony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hampahory ny olona Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handehanany toy ny jamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nanota tamin’i Jehovah izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny rany dia haidina toy ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nofony ho toy ny zezika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy amin’ny andro fahatezeran’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa holevonin’ny afon’ny fahasaro-piarony ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahafonganana, eny, fahafonganana tampoka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahatsiravina.
    marker-yv: yv-n
  - type: text
    text: ' tokoa no hataony amin’ny mponina amin’ny tany.'
