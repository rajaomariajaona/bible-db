document_id: ZEP.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Jehovah, izay tonga tamin’i Zefania, zanak’i Kosy, zanak’i Gedalia, zanak’i Amaria, zanak’i Hezekia, tamin’ny andro nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda.
  - type: heading
    content: Ny hamaliana ny firenena rehetra noho ny ratsy nataony, indrindra fa ny Joda.
  '10':
  - type: text
    content: Ary amin’izany andro izany, hoy Jehovah,
  - type: text
    content: Dia hisy feo re mitaraina any am-bavahadin-kazandrano,
  - type: text
    content: Sy fidradradradrana ao amin’ny tanàna ambany,
  - type: text
    content: Ary fidarabohana miezinezina any amin’ny havoana.
  '11':
  - type: text
    content: Midradradradrà, hianareo mponina ao Maktesy;
  - type: note
    content: Maktesy = Laona.
  - type: text
    content: Fa ringana avokoa ny mpandranto
  - type: note
    content: 'Na: vahoakan’i Kanana.'
  - type: text
    content: ' rehetra,'
  - type: text
    content: Eny, lany ringana izay rehetra nivesatra volafotsy.
  '12':
  - type: text
    content: Ary amin’izany andro izany dia hotsiloviko amin’ny jiro Jerosalema,
  - type: text
    content: Ka hovaliako ny olona izay efa lefy ao amin’ny faikany,
  - type: text
    content: 'Dia izay manao anakampo hoe:'
  - type: text
    content: Sady tsy hanao soa Jehovah no tsy hanao ratsy.
  '13':
  - type: text
    content: Ka dia ho tonga babo ny fananan’ireny,
  - type: text
    content: Ary ho lao ny tranony;
  - type: text
    content: Dia hanao trano izy, nefa tsy hitoetra ao;
  - type: text
    content: Hamboly voaloboka izy, nefa tsy hisotro ny divay avy aminy.
  '14':
  - type: text
    content: Efa antomotra ny andro lehiben’i Jehovah;
  - type: text
    content: Eny, efa antomotra sady mihafaingana indrindra–
  - type: text
    content: Injay! feon’ny andron’i Jehovah!
  - type: text
    content: Ny lehilahy mahery dia mitomany mafy any.
  '15':
  - type: text
    content: Andro fahatezerana izany andro izany,
  - type: text
    content: Andro fahoriana sy fahalahelovana,
  - type: text
    content: Andro fandravana sy fanafoanana,
  - type: text
    content: Andro maizina sy manjombona,
  - type: text
    content: Andro mandrahona sy maizim-pito.
  '16':
  - type: text
    content: Andro fahaveloman’ny anjomara sy ny akora,
  - type: text
    content: Hamelezana ny tanàna mimanda sy ny tilikambo avo eny amin’ny zorony.
  '17':
  - type: text
    content: Ary hampahory ny olona Aho,
  - type: text
    content: Handehanany toy ny jamba,
  - type: text
    content: Satria efa nanota tamin’i Jehovah izy;
  - type: text
    content: Ny rany dia haidina toy ny vovoka,
  - type: text
    content: Ary ny nofony ho toy ny zezika.
  '18':
  - type: text
    content: Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy amin’ny andro fahatezeran’i Jehovah,
  - type: text
    content: Fa holevonin’ny afon’ny fahasaro-piarony ny tany rehetra;
  - type: text
    content: Fa fahafonganana, eny, fahafonganana tampoka
  - type: note
    content: 'Na: mahatsiravina.'
  - type: text
    content: ' tokoa no hataony amin’ny mponina amin’ny tany.'
  '2':
  - type: text
    content: HAKIFAKO tokoa ny zavatra rehetra tsy ho eny ambonin’ny tany, hoy Jehovah;
  '3':
  - type: text
    content: Eny, hakifako ny olona sy ny biby;
  - type: text
    content: Hakifako ny vorona eny amin’ny habakabaka sy ny hazandrano any an-dranomasina
  - type: text
    content: Ary ny zavatra mahatafintohina mbamin’ny ratsy fanahy;
  - type: text
    content: Haringako tsy ho amin’ny tany ny olona, hoy Jehovah.
  '4':
  - type: text
    content: Ary hahinjitro ny tànako hamely ny Joda
  - type: text
    content: Sy ny mponina rehetra any Jerosalema;
  - type: text
    content: Dia haringako tsy ho eo amin’ity tany ity ny sisa amin’i Bala,
  - type: text
    content: Sy ny anaran’ny mpisorona amin’ny andriamani-tsi-izy mbamin’ny tena mpisorona,
  '5':
  - type: text
    content: Sy izay mivavaka any an-tampon-trano amin’izay eny amin’ny lanitra,
  - type: text
    content: Ary izay miankohoka sy mianiana ho an’i Jehovah
  - type: text
    content: Sady mianiana amin’i Malkama,
  - type: note
    content: 'Na: ny mpanjakany.'
  '6':
  - type: text
    content: Ary izay nihemotra niala tamin’i Jehovah,
  - type: text
    content: Sy izay tsy nitady an’i Jehovah na nanontany taminy.
  '7':
  - type: text
    content: Mangìna eo anatrehan’i Jehovah Tompo!
  - type: text
    content: Fa efa antomotra ny andron’i Jehovah;
  - type: text
    content: Fa Jehovah efa niomana hamono zavatra hatao fanatitra
  - type: text
    content: ka efa nanamasina ny olona nasainy.
  '8':
  - type: text
    content: Ary raha mby amin’ny andro hamonoan’i Jehovah zavatra hatao fanatitra,
  - type: text
    content: Dia hovaliako ny lehibe sy ny zanak’andriana
  - type: text
    content: Mbamin’izay rehetra mitafy ny fitafin’ny firenena hafa.
  '9':
  - type: text
    content: Ary amin’izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana,
  - type: text
    content: Dia ireo mameno loza sy fitaka ny tranon’ny tompony.
