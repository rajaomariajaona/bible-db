document_id: PSA.72,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handrosoan’ny fanjakan’ny mpanjaka voatendrin’Andriamanitra.
  - type: text
    content: Nataon’i Solomona.
  - type: text
    content: ANDRIAMANITRA ô, omeo ho an’ny mpanjaka ny fitsaranao,
  - type: text
    content: Ary ho an’ny zanaky ny mpanjaka ny fahamarinanao.
  '10':
  - type: text
    content: Ny mpanjakan’i Tarsisy sy ny nosy handoa hetra;
  - type: text
    content: Ny mpanjakan’i Sheba sy Seba hanatitra fanomezana.
  '11':
  - type: text
    content: Ary ny mpanjaka rehetra hiankohoka eo anatrehany;
  - type: text
    content: Ny firenena rehetra hanompo azy.
  '12':
  - type: text
    content: Fa hamonjy ny mahantra mitaraina izy
  - type: text
    content: Sy ny ory tsy manan-kamonjy;
  '13':
  - type: text
    content: Hiantra ny reraka sy ny malahelo izy
  - type: text
    content: Ary hamonjy ny fanahin’ny malahelo.
  '14':
  - type: text
    content: Hanavotra ny fanahiny amin’ny fampahoriana sy ny fanaovana an-keriny izy;
  - type: text
    content: Ary ho zava-dehibe eo imasony ny rany.
  '15':
  - type: text
    content: Dia ho velona ireny ka hanome azy
  - type: note
    content: 'Na: Dia ho velona Izy ka homena.'
  - type: text
    content: ' volamena avy any Sheba,'
  - type: text
    content: Ary hanao fifonana ho azy mandrakariva, izy, ary isan-andro no hisaorany azy.
  '16':
  - type: text
    content: Hahavoka-bary betsaka ny tany, na dia any an-tampon’ny tendrombohitra aza;
  - type: text
    content: Hiròndròna tahaka ny any Libanona ny fahavokarany;
  - type: text
    content: Ary ny ao an-tanàna hidokadoka tahaka ny ahitra amin’ny tany.
  '17':
  - type: text
    content: Ho mandrakizay ny anarany;
  - type: text
    content: Raha mbola maharitra koa ny masoandro, dia hanorobona ny anarany;
  - type: text
    content: Ary izy ho fitahiana ny olona;
  - type: text
    content: Ny firenena rehetra hanao azy ho sambatra.
  - type: note
    content: Izahao Gen. xxii. 18.
  '18':
  - type: text
    content: Isaorana anie Jehovah Andriamanitra, Andriamanitry ny Isiraely;
  - type: text
    content: Izy irery ihany no manao fahagagana;
  '19':
  - type: text
    content: Ary isaorana mandrakizay anie ny anarany malaza;
  - type: text
    content: Ary aoka ny tany rehetra ho henika ny voninahiny. Amena dia Amena.
  '2':
  - type: text
    content: Hitsara
  - type: note
    content: 'Na: Aoka, etc.'
  - type: text
    content: ' ny olonao amin’ny fahamarinana izy,'
  - type: text
    content: Ary ny malahelonao amin’ny fahitsiana.
  '20':
  - type: text
    content: Tapitra ny fivavak’i Davida, zanak’i Jese.
  '3':
  - type: text
    content: Ny tendrombohitra hahavokatra fiadanana ho an’ny olona,
  - type: text
    content: Eny, ny havoana koa amin’ny fahamarinana.
  '4':
  - type: text
    content: Hitsara
  - type: note
    content: 'Na: Aoka, etc.'
  - type: text
    content: ' ny olona ory izy'
  - type: text
    content: Sy hamonjy ny zanaky ny mahantra
  - type: text
    content: Ary hanorotoro ny mpampahory.
  '5':
  - type: text
    content: Hatahotra
  - type: note
    content: 'Na: Aoka, etc.'
  - type: text
    content: ' anao ny olona, raha mbola maharitra koa ny masoandro'
  - type: text
    content: Sy ny volana hatramin’ny taranaka fara mandimby.
  '6':
  - type: text
    content: Hidina
  - type: note
    content: 'Na: Aoka, etc.'
  - type: text
    content: ' tahaka ny ranonorana amin’ny saha voajinja izy,'
  - type: text
    content: Tahaka ny ranonorana mivatravatra amin’ny tany.
  '7':
  - type: text
    content: Ny
  - type: note
    content: 'Na: Aoka, etc.'
  - type: text
    content: ' marina hitrebona amin’ny androny,'
  - type: text
    content: Ary ho be ny fiadanana mandra-paha-tsy hisy volana intsony.
  '8':
  - type: text
    content: Ary hanjaka hatramin’ny ranomasina ka hatramin’ny ranomasina izy,
  - type: text
    content: Ary hatramin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' ka hatramin’ny faran’ny tany.'
  '9':
  - type: text
    content: Ny mponina any an-efitra handohalika eo anatrehany;
  - type: text
    content: Ary ny fahavalony hilelaka ny vovoka.
