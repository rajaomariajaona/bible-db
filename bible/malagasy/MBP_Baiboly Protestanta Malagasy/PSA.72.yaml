document_id: PSA.72,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny handrosoan’ny fanjakan’ny mpanjaka voatendrin’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’i Solomona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA ô, omeo ho an’ny mpanjaka ny fitsaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho an’ny zanaky ny mpanjaka ny fahamarinanao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjakan’i Tarsisy sy ny nosy handoa hetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjakan’i Sheba sy Seba hanatitra fanomezana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanjaka rehetra hiankohoka eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena rehetra hanompo azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamonjy ny mahantra mitaraina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ory tsy manan-kamonjy;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantra ny reraka sy ny malahelo izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamonjy ny fanahin’ny malahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanavotra ny fanahiny amin’ny fampahoriana sy ny fanaovana an-keriny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho zava-dehibe eo imasony ny rany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho velona ireny ka hanome azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ho velona Izy ka homena.
      marker-yv: yv-n
    - type: text
      text: ' volamena avy any Sheba,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao fifonana ho azy mandrakariva, izy, ary isan-andro no hisaorany azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahavoka-bary betsaka ny tany, na dia any an-tampon’ny tendrombohitra aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiròndròna tahaka ny any Libanona ny fahavokarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ao an-tanàna hidokadoka tahaka ny ahitra amin’ny tany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mandrakizay ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola maharitra koa ny masoandro, dia hanorobona ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy ho fitahiana ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena rehetra hanao azy ho sambatra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao Gen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxii. 18.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Jehovah Andriamanitra, Andriamanitry ny Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery ihany no manao fahagagana;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary isaorana mandrakizay anie ny anarany malaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny tany rehetra ho henika ny voninahiny. Amena dia Amena.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aoka, etc.
      marker-yv: yv-n
    - type: text
      text: ' ny olonao amin’ny fahamarinana izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny malahelonao amin’ny fahitsiana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapitra ny fivavak’i Davida, zanak’i Jese.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra hahavokatra fiadanana ho an’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny havoana koa amin’ny fahamarinana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aoka, etc.
      marker-yv: yv-n
    - type: text
      text: ' ny olona ory izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamonjy ny zanaky ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanorotoro ny mpampahory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatahotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aoka, etc.
      marker-yv: yv-n
    - type: text
      text: ' anao ny olona, raha mbola maharitra koa ny masoandro'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny volana hatramin’ny taranaka fara mandimby.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aoka, etc.
      marker-yv: yv-n
    - type: text
      text: ' tahaka ny ranonorana amin’ny saha voajinja izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny ranonorana mivatravatra amin’ny tany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aoka, etc.
      marker-yv: yv-n
    - type: text
      text: ' marina hitrebona amin’ny androny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho be ny fiadanana mandra-paha-tsy hisy volana intsony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanjaka hatramin’ny ranomasina ka hatramin’ny ranomasina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatramin’ny Ony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
    - type: text
      text: ' ka hatramin’ny faran’ny tany.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina any an-efitra handohalika eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavalony hilelaka ny vovoka.
