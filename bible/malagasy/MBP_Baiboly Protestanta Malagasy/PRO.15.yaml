  marker: q1
  children:
  - type: text
    text: Fa ny vava ratsy mandratra ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala maniratsira ny famaizan-drainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitandrina ny fananarana no hita ho hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ao an-tranon’ny marina misy harena be;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fitomboan’ny haren’ny ratsy fanahy dia misy loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny molotry ny hendry mampiely fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mba toy izany ny fon’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fivavaky ny marina no sitrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fahavetavetana eo imason’i Jehovah ny làlan’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay fatra-panaraka ny fahamarinana no tiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Famaizana mafy no hihatra amin’izay mivily làlana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izay mankahala anatra dia ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
