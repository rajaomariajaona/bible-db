    children:
    - type: text
      text: '1'
  - type: text
    text: Ny famaliana mora dia mampianina ny fahatezerana mafy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny teny maharary mahatonga fahasosorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lelan’ny hendry mampiseho fahalalana tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’ny adala miboiboika fahadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny mason’i Jehovah amin’izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijery ny ratsy fanahy sy ny tsara fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
