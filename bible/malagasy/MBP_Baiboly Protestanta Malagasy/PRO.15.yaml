    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanaka hendry mahafaly ny rainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny adala manao tsinontsinona an-dreniny.
- type: usfm
