    - type: text
      text: '15'
  - type: text
    text: Ratsy avokoa ny andron’ny ory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny faharavoravoam-po dia fanasana mandrakariva.
- type: usfm
  marker: q1
