document_id: PRO.15,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny famaliana mora dia mampianina ny fahatezerana mafy;
  - type: text
    content: Fa ny teny maharary mahatonga fahasosorana.
  '10':
  - type: text
    content: Famaizana mafy no hihatra amin’izay mivily làlana.
  - type: text
    content: Eny, izay mankahala anatra dia ho faty.
  '11':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' sy ny fandringanana aza dia miharihary eo anatrehan’i Jehovah,'
  - type: text
    content: Koa mainka ny fon’ny zanak’olombelona!
  '12':
  - type: text
    content: Tsy tian’ny mpaniratsira izay mananatra azy,
  - type: text
    content: Ary tsy mety manatona ny hendry izy.
  '13':
  - type: text
    content: Ny fo ravoravo mahamiramirana ny tarehy;
  - type: text
    content: Fa ny alahelon’ny fo mahareraka ny fanahy.
  '14':
  - type: text
    content: Ny fon’ny manan-tsaina mitady fahendrena;
  - type: text
    content: Fa ny vavan’ny adala mankamamy ny fahadalana.
  '15':
  - type: text
    content: Ratsy avokoa ny andron’ny ory;
  - type: text
    content: Fa ny faharavoravoam-po dia fanasana mandrakariva.
  '16':
  - type: text
    content: Aleo ny kely misy ny fahatahorana an’i Jehovah
  - type: text
    content: Toy izay harena be misy ahiahy.
  '17':
  - type: text
    content: Aleo sakafo anana ampian-tsetsetra
  - type: note
    content: Heb. fitiavana.
  - type: text
    content: Toy izay omby mifahy asian-dromoromo.
  - type: note
    content: Heb. fankahalana.
  '18':
  - type: text
    content: Izay malaky tezitra manetsika ady;
  - type: text
    content: Fa izay mahatsindry fo mampitsahatra fifandirana.
  '19':
  - type: text
    content: Ny làlan’ny malaina dia toy ny fefy tsilo
  - type: text
    content: Fa ny làlamben’ny marina dia voalamina tsara.
  '2':
  - type: text
    content: Ny lelan’ny hendry mampiseho fahalalana tsara;
  - type: text
    content: Fa ny vavan’ny adala miboiboika fahadalana.
  '20':
  - type: text
    content: Ny zanaka hendry mahafaly ny rainy;
  - type: text
    content: Fa ny adala manao tsinontsinona an-dreniny.
  '21':
  - type: text
    content: Ny fahadalana dia fifalian’ny tsy ampy saina;
  - type: text
    content: Fa ny manan-tsaina kosa mizotra mahitsy
  '22':
  - type: text
    content: Ho foana ny fikasana, raha tsy misy mpisaina;
  - type: text
    content: Fa raha maro ny mpanolo-tsaina, dia tanteraka izany.
  '23':
  - type: text
    content: Faly ny olona, raha mahavaly tsara ny vavany,
  - type: text
    content: Ary endrey ny hatsaran’ny teny atao amin’izay andro mahamety azy!
  '24':
  - type: text
    content: Làlan’aina ho any ambony no alehan’ny hendry,
  - type: text
    content: Hanalavirany ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' any ambany,'
  '25':
  - type: text
    content: Ravan’i Jehovah ny tranon’ny mpiavonavona;
  - type: text
    content: Fa ny fari-tanin’ny mpitondra-tena aoriny mafy.
  '26':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah ny hevi-dratsy;
  - type: text
    content: Fa madio ny
  - type: note
    content: 'Na: Fa ny madio manao.'
  - type: text
    content: teny mahafinaritra.
  '27':
  - type: text
    content: Izay fatra-pila harena dia mampidi-doza amin’ny ankohonany;
  - type: text
    content: Fa izay mankahala kolikoly no ho velona.
  '28':
  - type: text
    content: Ny fon’ny marina mihevitra vao mamaly;
  - type: text
    content: Fa ny vavan’ny ratsy fanahy kosa miboiboika faharatsiana.
  '29':
  - type: text
    content: Jehovah dia lavitra ny ratsy fanahy;
  - type: text
    content: Fa ny fivavaky ny marina no henoiny.
  '3':
  - type: text
    content: Ny mason’i Jehovah amin’izao rehetra izao,
  - type: text
    content: Mijery ny ratsy fanahy sy ny tsara fanahy.
  '30':
  - type: text
    content: Ny tarehy miramirana
  - type: note
    content: Heb. Ny fahazavan’ny maso.
  - type: text
    content: ' mahafaly ny fo;'
  - type: text
    content: Ary ny filazan-tsoa mamelombelona ny taolana.
  '31':
  - type: text
    content: Ny sofina izay mihaino anatra mahavelona
  - type: text
    content: Dia miara-mitoetra amin’ny hendry.
  '32':
  - type: text
    content: Izay mandà anatra dia manary tena;
  - type: text
    content: Fa izay mihaino ny fananarana no mahazo fahalalana.
  '33':
  - type: text
    content: Ny fahatahorana an’i Jehovah dia fananarana mampahahendry;
  - type: text
    content: Ary ny fanetren-tena mialoha ny fisandratana.
  '4':
  - type: text
    content: Ny teny
  - type: note
    content: Heb. lela.
  - type: text
    content: ' malemy dia hazon’aina;'
  - type: text
    content: Fa ny vava ratsy mandratra ny fanahy.
  '5':
  - type: text
    content: Ny adala maniratsira ny famaizan-drainy;
  - type: text
    content: Fa izay mitandrina ny fananarana no hita ho hendry.
  '6':
  - type: text
    content: Ao an-tranon’ny marina misy harena be;
  - type: text
    content: Fa ny fitomboan’ny haren’ny ratsy fanahy dia misy loza.
  '7':
  - type: text
    content: Ny molotry ny hendry mampiely fahendrena;
  - type: text
    content: Fa tsy mba toy izany ny fon’ny adala.
  '8':
  - type: text
    content: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason’i Jehovah;
  - type: text
    content: Fa ny fivavaky ny marina no sitrany.
  '9':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah ny làlan’ny ratsy fanahy;
  - type: text
    content: Fa izay fatra-panaraka ny fahamarinana no tiany.
