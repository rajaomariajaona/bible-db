  - type: text
    text: ' sy ny fandringanana aza dia miharihary eo anatrehan’i Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mainka ny fon’ny zanak’olombelona!
- type: usfm
  marker: q1
