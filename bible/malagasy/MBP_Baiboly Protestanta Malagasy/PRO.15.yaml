    - type: text
      text: '12'
  - type: text
    text: Tsy tian’ny mpaniratsira izay mananatra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mety manatona ny hendry izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fo ravoravo mahamiramirana ny tarehy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny alahelon’ny fo mahareraka ny fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fon’ny manan-tsaina mitady fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’ny adala mankamamy ny fahadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
