document_id: DAN.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nofin’i Nebokadnezara, sy ny nilazan’i Daniela ny hevitr’izany.
  - type: text
    content: 'ARY tamin’ny taona faharoa nanjakan’i Nebokadnezara dia nanonofy Nebokadnezara, ka nitebiteby ny fanahiny, ary tsy nahita torimaso izy. '
  '10':
  - type: text
    content: 'Ny Kaldeana namaly teo anatrehan’ny mpanjaka hoe: Tsy misy olona etỳ ambonin’ny tany mahay milaza izany nofin’'
  - type: note
    content: Ar. tenin’.
  - type: text
    content: ' ny mpanjaka izany; fa tsy mbola nisy mpanjaka, na dia izay lehibe sy mahery aza, nila zavatra toy izany tamin’ny ombiasy sy ny mpisikidy ary ny Kaldeana. '
  '11':
  - type: text
    content: Ary sarotra ny zavatra anontanian’ny mpanjaka, ka tsy misy mahay milaza izany eo anatrehan’ny mpanjaka afa-tsy ireo andriamanitra, izay tsy manam-ponenana amin’ny nofo.
  '12':
  - type: text
    content: 'Dia vinitra sady tezitra indrindra ny mpanjaka noho izany, ka nasainy naringana ny olon-kendrin’i Babylona rehetra. '
  '13':
  - type: text
    content: Ary navoaka ny didy nampamono ny olon-kendry; ary Daniela sy ny namany koa mba notadiaviny hovonoina.
  '14':
  - type: text
    content: 'Dia novalian’i Daniela tamin’ny fanahy sy ny fahendrena Arioka lehiben’ny mpiambina ny mpanjaka, izay nivoaka hamono ny olon-kendrin’i Babylona; '
  '15':
  - type: text
    content: 'eny, namaly izy ka nanao tamin’i Arioka, lehibe voatendrin’ny mpanjaka, hoe: Nahoana no dia mafy toy izany ny teny avy amin’ny mpanjaka? Dia nambaran’i Arioka tamin’i Daniela ilay teny. '
  '16':
  - type: text
    content: Dia niditra Daniela ka nangataka tamin’ny mpanjaka hanome andro azy, dia holazainy amin’ny mpanjaka ny hevitry ny nofy.
  '17':
  - type: text
    content: 'Ary Daniela nody tany an-tranony ka nanambara ilay teny tamin’i Hanania sy Misaela ary Azaria namany, '
  '18':
  - type: text
    content: mba hangatahan’ireo famindrampo amin’Andriamanitry ny lanitra ny amin’izany zava-miafina izany, mba tsy haringana Daniela sy ny namany mbamin’ny olon-kendrin’i Babylona rehetra.
  '19':
  - type: text
    content: 'Dia naseho an’i Daniela tamin’ny fahitana amin’ny alina izany zava-miafina izany, ka dia nisaotra an’Andriamanitry ny lanitra Daniela. '
  '2':
  - type: text
    content: 'Dia nasain’ny mpanjaka nantsoina ny ombiasy sy ny mpisikidy sy ny mpanana ody ary ny Kaldeana hilaza amin’ny mpanjaka ny nofiny. Dia tonga ireny ka nitsangana teo anatrehan’ny mpanjaka. '
  '20':
  - type: text
    content: 'Eny, niteny izy ka nanao hoe: Isaorana anie ny anaran’Andriamanitra mandrakizay mandrakizay, fa Azy ny fahendrena sy ny hery. '
  '21':
  - type: text
    content: Ary Izy no mandahatra
  - type: note
    content: Ar. manova.
  - type: text
    content: ' ny andro sy ny fotoana; Izy no manaisotra mpanjaka sy manangana mpanjaka; Izy no manome fahendrena ho an’ny hendry sy fahalalana ho an’izay mazava saina. '
  '22':
  - type: text
    content: 'Izy no mampiseho ny zavatra lalina sy miafina; Izy no mahalala izay ao amin’ny maizina, ary ny mazava mitoetra ao aminy. '
  '23':
  - type: text
    content: Hianao, ry Andriamanitry ny razako ô, no deraiko sy isaorako, satria nomenao fahendrena sy hery aho, ary ankehitriny efa nampahafantarinao ahy izay nangatahinay taminao; fa nampahafantarinao anay ilay nofin’
  - type: note
    content: Ar. tenin’.
  - type: text
    content: ny mpanjaka.
  '24':
  - type: text
    content: 'Ary noho izany Daniela dia niditra nankao amin’i Arioka, izay notendren’ny mpanjaka handringana ny olon-kendrin’i Babylona,–eny, nandeha izy ka nanao taminy hoe: Aza mandringana ny olon-kendrin’i Babylona; fa ento ho eo anatrehan’ny mpanjaka aho, dia hambarako aminy ny hevitry ny nofiny.'
  '25':
  - type: text
    content: 'Dia nentin’i Arioka faingana ho eo anatrehan’ny mpanjaka Daniela, ka hoy izy taminy: Nahita lehilahy isan’ny babo avy any Joda aho, izay hilaza amin’ny mpanjaka ny hevitry ny nofy.'
  '26':
  - type: text
    content: 'Ny mpanjaka namaly ka nilaza tamin’i Daniela, izay atao hoe koa Beltesazara, hoe: Moa mahay manambara amiko ny nofy izay hitako mbamin’ny heviny va hianao?'
  '27':
  - type: text
    content: 'Dia namaly teo anatrehan’ny mpanjaka Daniela nanao hoe: Ilay zava-miafina nanontanian’ny mpanjaka dia tsy hain’ny olon-kendry, na ny mpisikidy, na ny ombiasy, na ny mpanandro, nolazaina tamin’ny mpanjaka; '
  '28':
  - type: text
    content: kanefa misy Andriamanitra any an-danitra, Izay mampiseho zava-miafina ka mampahafantatra an’i Nebokadnezara mpanjaka izay ho tonga any am-parany.
  - type: text
    content: 'Ny nofinao sy ny fahitan’ny lohanao teo amin’ny farafaranao dia izao: '
  '29':
  - type: text
    content: 'Ny aminao, ry mpanjaka ô, raha nandry hianao, dia tonga ny eritreritrao ny amin’izay ho avy rahatrizay; ary Izay mampiseho zava-miafina dia mampahafantatra anao izay ho avy. '
  '3':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Nanonofy aho, ka mitebiteby ta-hahalala ny nofy ny fanahiko.'
  '30':
  - type: text
    content: Ary izaho aza, dia tsy noho ny fahendrena ananako mihoatra noho ny olombelona rehetra tsy akory no nampisehoana tamiko ny zava-miafina, fa ny mba hampahafantarana ny mpanjaka ilay hevitra, ka hahafantaranao ny eritreritry ny fonao.
  '31':
  - type: text
    content: 'Hianao, ry mpanjaka ô, nahita fa, indro, nisy sariolona lehibe anankiray. Izany sary izany dia lehibe sady namirapiratra tsara, nijoro teo anatrehanao izy, ary ny tarehiny dia nahatahotra. '
  '32':
  - type: text
    content: 'Ny lohan’izany sary izany dia volamena tsara, ny tratrany sy ny sandriny dia volafotsy, ny kibony sy ny feny dia varahina, '
  '33':
  - type: text
    content: 'ny ranjony dia vy, ary ny tongony dia vy sy tani-manga. '
  '34':
  - type: text
    content: 'Nijery hianao ambara-pahanisy vato voaendaka, nefa tsy nendahan-tànana, ary namely ilay sary teo amin’ny tongony vy sy tanimanga iny ka nahatorotoro azy. '
  '35':
  - type: text
    content: Dia niara-torotoro
  - type: note
    content: 'Na: torotoro tamin’ny indray namely monja.'
  - type: text
    content: ' ny vy sy ny tanimanga sy ny varahina sy ny volafotsy ary ny volamena ka tonga toy ny akofa eo am-pamoloana fahavaratra; ary nopaohin’ny rivotra izy, ka tsy nisy hitoerany; ary ilay vato namely ny sary dia tonga tendrombohitra lehibe nahafeno ny tany rehetra. '
  '36':
  - type: text
    content: Izany no nofy, ary holazainay eto anatrehan’ny mpanjaka koa ny heviny.
  '37':
  - type: text
    content: 'Hianao, ry mpanjaka ô, izay mpanjakan’ny mpanjaka sady nomen’Andriamanitry ny lanitra fanjakana sy hery sy fahaleovana ary voninahitra, '
  '38':
  - type: text
    content: 'ka ny zanak’olombelona sy ny bibi-dia ary ny voro-manidina, na aiza na aiza itoerany, dia nomeny ho eo an-tànanao, ary nataony ho mpanjakan’izy rehetra hianao,–dia hianao izany loha volamena izany. '
  '39':
  - type: text
    content: 'Ary manarakaraka anao dia hisy fanjakana hafa hitsangana ambany noho ny anao, ary hisy fanjakana fahatelo koa izay varahina sady hanam-pahefana amin’ny tany rehetra. '
  '4':
  - type: text
    content: 'Dia niteny tamin’ny mpanjaka amin’ny teny Aramiana ireny Kaldeana ireny ka nanao hoe: Ry mpanjaka ô, ho velona mandrakizay anie hianao, ambarao aminay mpanomponao ny nofy, dia holazainay ny heviny. '
  '40':
  - type: text
    content: 'Ary ny fanjakana fahefatra dia ho mafy toy ny vy; fa toy ny vy manorotoro sy mahamongomongo ny zavatra rehetra, ary toy ny famakivakin’ ny vy ireo rehetra ireo, dia toy izany no amakivakiany sy anorotoroany azy. '
  '41':
  - type: text
    content: 'Ary satria hitanao ny tongotra sy ny rantsan-tongotra, fa ny tapany tanimangan’ny mpanefy tanimanga, ary ny tapany vy dia ho fanjakana mizarazara izy; nefa hisy herim-by ao aminy, satria nahita vy miharo tanimanga mbola fotaka hianao. '
  '42':
  - type: text
    content: 'Ary toy ny rantsan-tongotra, ny tapany vy, ny tapany tanimanga, dia ho toy izany ny fanjakana, ny tapany ho mafy, ary ny tapany ho malemy. '
  '43':
  - type: text
    content: 'Ary toy ny nahitanao ny vy miharo tanimanga mbola fotaka, dia ho toy izany no hiharoany amin’ny taranak’olombelona; nefa tsy hitambatra izy, dia toy ny tsi-fetezan’ny vy miharo amin’ny tanimanga. '
  '44':
  - type: text
    content: 'Ary amin’ny andron’ ireo mpanjaka ireo Andriamanitry ny lanitra dia hanorina fanjakana izay tsy ho rava mandrakizay; ary izany fanjakana izany tsy havela ho an’olon-kafa, fa ireo fanjakana rehetra ireo dia hotorotoroiny sy holevoniny, fa izy kosa hitoetra mandrakizay. '
  '45':
  - type: text
    content: 'Fa toy ilay nahitanao ny vato nendahana tamin’ny tendrombohitra, nefa tsy nendahan-tànana, sy ny nanorotoroany ny vy sy ny varahina sy ny tanimanga sy ny volafotsy ary ny volamena, dia ampahafantarin’Andriamanitra lehibe ny mpanjaka ny amin’ny zavatra ho avy rahatrizay: marina ny nofy, ary tsy maintsy ho to ny heviny.'
  '46':
  - type: text
    content: 'Dia niankohoka Nebokadnezara mpanjaka ka nivavaka tamin’i Daniela ary nampanatitra fanatitra sy hanitra ankasitrahana ho azy. '
  '47':
  - type: text
    content: 'Ny mpanjaka namaly an’i Daniela ka nanao hoe: Marina tokoa fa Andriamanitrareo dia Andriamanitry ny andriamanitra sy Tompon’ny mpanjaka ary Mpampiseho zava-miafina, ka dia nahay nampiseho izany zava-miafina izany hianao.'
  '48':
  - type: text
    content: Ary tamin’izany ny mpanjaka dia nanandratra an’i Daniela ho lehibe, ka nanome azy zavatra maro sady lehibe ary nanendry azy ho mpanapaka any Babylona sy ny fehiny rehetra, sy ho lehiben’ny mpanapaka ny olon-kendrin’i Babylona rehetra.
  '49':
  - type: text
    content: Ary Daniela nangataka tamin’ny mpanjaka, ary izy nanendry an’i Sadraka sy Mesaka ary Abednego ho tonian’ny raharahan’i Babylona sy ny fehiny; ary Daniela dia teo am-bavahadin’ny mpanjaka.
  '5':
  - type: text
    content: 'Dia namaly ny mpanjaka ka nanao tamin’ireny Kaldeana ireny hoe: Efa niloa-bava aho;'
  - type: note
    content: 'Na: efa hadinoko ilay nonofisiko.'
  - type: text
    content: ' raha tsy hampahafantarinareo ahy ny nofy sy ny heviny, dia hotetitetehina hianareo, ary ny tranonareo hatao trano fivoahana. '
  '6':
  - type: text
    content: Fa raha milaza ny nofy sy ny heviny kosa hianareo, dia hahazo fanomezana sy valim-pitia ary voninahitra be; koa ambarao ahy ny nofy mbamin’ny heviny.
  '7':
  - type: text
    content: 'Dia namaly indray ireo ka nanao hoe: Aoka ny mpanjaka hilaza ny nofy aminay mpanompony, dia hambaranay ny heviny.'
  '8':
  - type: text
    content: 'Fa ny mpanjaka namaly ka nanao hoe: Fantatro marimarina fa mandany andro foana hianareo, satria hitanareo fa efa niloa-bava aho.'
  - type: note
    content: 'Na: efa hadinoko ilay nonofisiko.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Fa raha tsy hampahafantarinareo ahy ny nofy, dia lalàna iray monja no hitondrana anareo; fa hianareo miray tetika hilaza teny lainga sy arirarira foana eto anatrehako mandra-pahatongan’izay andro mahamety;
  - type: note
    content: Aramiana, mandra-piovan’ny andro.
  - type: text
    content: ' koa ambarao ahy ny nofy, dia ho fantatro fa mahalaza ny heviny amiko koa hianareo.'
