document_id: DAN.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nofin’i Nebokadnezara, sy ny nilazan’i Daniela ny hevitr’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny taona faharoa nanjakan’i Nebokadnezara dia nanonofy Nebokadnezara, ka nitebiteby ny fanahiny, ary tsy nahita torimaso izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nasain’ny mpanjaka nantsoina ny ombiasy sy ny mpisikidy sy ny mpanana ody ary ny Kaldeana hilaza amin’ny mpanjaka ny nofiny. Dia tonga ireny ka nitsangana teo anatrehan’ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Nanonofy aho, ka mitebiteby ta-hahalala ny nofy ny fanahiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niteny tamin’ny mpanjaka amin’ny teny Aramiana ireny Kaldeana ireny ka nanao hoe: Ry mpanjaka ô, ho velona mandrakizay anie hianao, ambarao aminay mpanomponao ny nofy, dia holazainay ny heviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namaly ny mpanjaka ka nanao tamin’ireny Kaldeana ireny hoe: Efa niloa-bava aho;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' efa hadinoko ilay nonofisiko.'
    marker-yv: yv-n
  - type: text
    text: ' raha tsy hampahafantarinareo ahy ny nofy sy ny heviny, dia hotetitetehina hianareo, ary ny tranonareo hatao trano fivoahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa raha milaza ny nofy sy ny heviny kosa hianareo, dia hahazo fanomezana sy valim-pitia ary voninahitra be; koa ambarao ahy ny nofy mbamin’ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly indray ireo ka nanao hoe: Aoka ny mpanjaka hilaza ny nofy aminay mpanompony, dia hambaranay ny heviny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny mpanjaka namaly ka nanao hoe: Fantatro marimarina fa mandany andro foana hianareo, satria hitanareo fa efa niloa-bava aho.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' efa hadinoko ilay nonofisiko.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha tsy hampahafantarinareo ahy ny nofy, dia lalàna iray monja no hitondrana anareo; fa hianareo miray tetika hilaza teny lainga sy arirarira foana eto anatrehako mandra-pahatongan’izay andro mahamety;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aramiana,
      - type: text
        text: ' mandra-piovan’ny andro.'
    marker-yv: yv-n
  - type: text
    text: ' koa ambarao ahy ny nofy, dia ho fantatro fa mahalaza ny heviny amiko koa hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny Kaldeana namaly teo anatrehan’ny mpanjaka hoe: Tsy misy olona etỳ ambonin’ny tany mahay milaza izany nofin’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ar.
      - type: text
        text: ' tenin’.'
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjaka izany; fa tsy mbola nisy mpanjaka, na dia izay lehibe sy mahery aza, nila zavatra toy izany tamin’ny ombiasy sy ny mpisikidy ary ny Kaldeana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary sarotra ny zavatra anontanian’ny mpanjaka, ka tsy misy mahay milaza izany eo anatrehan’ny mpanjaka afa-tsy ireo andriamanitra, izay tsy manam-ponenana amin’ny nofo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia vinitra sady tezitra indrindra ny mpanjaka noho izany, ka nasainy naringana ny olon-kendrin’i Babylona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary navoaka ny didy nampamono ny olon-kendry; ary Daniela sy ny namany koa mba notadiaviny hovonoina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia novalian’i Daniela tamin’ny fanahy sy ny fahendrena Arioka lehiben’ny mpiambina ny mpanjaka, izay nivoaka hamono ny olon-kendrin’i Babylona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'eny, namaly izy ka nanao tamin’i Arioka, lehibe voatendrin’ny mpanjaka, hoe: Nahoana no dia mafy toy izany ny teny avy amin’ny mpanjaka? Dia nambaran’i Arioka tamin’i Daniela ilay teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niditra Daniela ka nangataka tamin’ny mpanjaka hanome andro azy, dia holazainy amin’ny mpanjaka ny hevitry ny nofy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Daniela nody tany an-tranony ka nanambara ilay teny tamin’i Hanania sy Misaela ary Azaria namany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba hangatahan’ireo famindrampo amin’Andriamanitry ny lanitra ny amin’izany zava-miafina izany, mba tsy haringana Daniela sy ny namany mbamin’ny olon-kendrin’i Babylona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia naseho an’i Daniela tamin’ny fahitana amin’ny alina izany zava-miafina izany, ka dia nisaotra an’Andriamanitry ny lanitra Daniela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eny, niteny izy ka nanao hoe: Isaorana anie ny anaran’Andriamanitra mandrakizay mandrakizay, fa Azy ny fahendrena sy ny hery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Izy no mandahatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ar.
      - type: text
        text: ' manova.'
    marker-yv: yv-n
  - type: text
    text: ' ny andro sy ny fotoana; Izy no manaisotra mpanjaka sy manangana mpanjaka; Izy no manome fahendrena ho an’ny hendry sy fahalalana ho an’izay mazava saina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izy no mampiseho ny zavatra lalina sy miafina; Izy no mahalala izay ao amin’ny maizina, ary ny mazava mitoetra ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hianao, ry Andriamanitry ny razako ô, no deraiko sy isaorako, satria nomenao fahendrena sy hery aho, ary ankehitriny efa nampahafantarinao ahy izay nangatahinay taminao; fa nampahafantarinao anay ilay nofin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ar.
      - type: text
        text: ' tenin’.'
    marker-yv: yv-n
  - type: text
    text: ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary noho izany Daniela dia niditra nankao amin’i Arioka, izay notendren’ny mpanjaka handringana ny olon-kendrin’i Babylona,–eny, nandeha izy ka nanao taminy hoe: Aza mandringana ny olon-kendrin’i Babylona; fa ento ho eo anatrehan’ny mpanjaka aho, dia hambarako aminy ny hevitry ny nofiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nentin’i Arioka faingana ho eo anatrehan’ny mpanjaka Daniela, ka hoy izy taminy: Nahita lehilahy isan’ny babo avy any Joda aho, izay hilaza amin’ny mpanjaka ny hevitry ny nofy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny mpanjaka namaly ka nilaza tamin’i Daniela, izay atao hoe koa Beltesazara, hoe: Moa mahay manambara amiko ny nofy izay hitako mbamin’ny heviny va hianao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly teo anatrehan’ny mpanjaka Daniela nanao hoe: Ilay zava-miafina nanontanian’ny mpanjaka dia tsy hain’ny olon-kendry, na ny mpisikidy, na ny ombiasy, na ny mpanandro, nolazaina tamin’ny mpanjaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: kanefa misy Andriamanitra any an-danitra, Izay mampiseho zava-miafina ka mampahafantatra an’i Nebokadnezara mpanjaka izay ho tonga any am-parany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ny nofinao sy ny fahitan’ny lohanao teo amin’ny farafaranao dia izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny aminao, ry mpanjaka ô, raha nandry hianao, dia tonga ny eritreritrao ny amin’izay ho avy rahatrizay; ary Izay mampiseho zava-miafina dia mampahafantatra anao izay ho avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary izaho aza, dia tsy noho ny fahendrena ananako mihoatra noho ny olombelona rehetra tsy akory no nampisehoana tamiko ny zava-miafina, fa ny mba hampahafantarana ny mpanjaka ilay hevitra, ka hahafantaranao ny eritreritry ny fonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Hianao, ry mpanjaka ô, nahita fa, indro, nisy sariolona lehibe anankiray. Izany sary izany dia lehibe sady namirapiratra tsara, nijoro teo anatrehanao izy, ary ny tarehiny dia nahatahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny lohan’izany sary izany dia volamena tsara, ny tratrany sy ny sandriny dia volafotsy, ny kibony sy ny feny dia varahina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ny ranjony dia vy, ary ny tongony dia vy sy tani-manga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nijery hianao ambara-pahanisy vato voaendaka, nefa tsy nendahan-tànana, ary namely ilay sary teo amin’ny tongony vy sy tanimanga iny ka nahatorotoro azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia niara-torotoro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.35 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' torotoro tamin’ny indray namely monja.'
    marker-yv: yv-n
  - type: text
    text: ' ny vy sy ny tanimanga sy ny varahina sy ny volafotsy ary ny volamena ka tonga toy ny akofa eo am-pamoloana fahavaratra; ary nopaohin’ny rivotra izy, ka tsy nisy hitoerany; ary ilay vato namely ny sary dia tonga tendrombohitra lehibe nahafeno ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Izany no nofy, ary holazainay eto anatrehan’ny mpanjaka koa ny heviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hianao, ry mpanjaka ô, izay mpanjakan’ny mpanjaka sady nomen’Andriamanitry ny lanitra fanjakana sy hery sy fahaleovana ary voninahitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ka ny zanak’olombelona sy ny bibi-dia ary ny voro-manidina, na aiza na aiza itoerany, dia nomeny ho eo an-tànanao, ary nataony ho mpanjakan’izy rehetra hianao,–dia hianao izany loha volamena izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary manarakaraka anao dia hisy fanjakana hafa hitsangana ambany noho ny anao, ary hisy fanjakana fahatelo koa izay varahina sady hanam-pahefana amin’ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny fanjakana fahefatra dia ho mafy toy ny vy; fa toy ny vy manorotoro sy mahamongomongo ny zavatra rehetra, ary toy ny famakivakin’ ny vy ireo rehetra ireo, dia toy izany no amakivakiany sy anorotoroany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary satria hitanao ny tongotra sy ny rantsan-tongotra, fa ny tapany tanimangan’ny mpanefy tanimanga, ary ny tapany vy dia ho fanjakana mizarazara izy; nefa hisy herim-by ao aminy, satria nahita vy miharo tanimanga mbola fotaka hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary toy ny rantsan-tongotra, ny tapany vy, ny tapany tanimanga, dia ho toy izany ny fanjakana, ny tapany ho mafy, ary ny tapany ho malemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary toy ny nahitanao ny vy miharo tanimanga mbola fotaka, dia ho toy izany no hiharoany amin’ny taranak’olombelona; nefa tsy hitambatra izy, dia toy ny tsi-fetezan’ny vy miharo amin’ny tanimanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary amin’ny andron’ ireo mpanjaka ireo Andriamanitry ny lanitra dia hanorina fanjakana izay tsy ho rava mandrakizay; ary izany fanjakana izany tsy havela ho an’olon-kafa, fa ireo fanjakana rehetra ireo dia hotorotoroiny sy holevoniny, fa izy kosa hitoetra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa toy ilay nahitanao ny vato nendahana tamin’ny tendrombohitra, nefa tsy nendahan-tànana, sy ny nanorotoroany ny vy sy ny varahina sy ny tanimanga sy ny volafotsy ary ny volamena, dia ampahafantarin’Andriamanitra lehibe ny mpanjaka ny amin’ny zavatra ho avy rahatrizay: marina ny nofy, ary tsy maintsy ho to ny heviny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia niankohoka Nebokadnezara mpanjaka ka nivavaka tamin’i Daniela ary nampanatitra fanatitra sy hanitra ankasitrahana ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ny mpanjaka namaly an’i Daniela ka nanao hoe: Marina tokoa fa Andriamanitrareo dia Andriamanitry ny andriamanitra sy Tompon’ny mpanjaka ary Mpampiseho zava-miafina, ka dia nahay nampiseho izany zava-miafina izany hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ary tamin’izany ny mpanjaka dia nanandratra an’i Daniela ho lehibe, ka nanome azy zavatra maro sady lehibe ary nanendry azy ho mpanapaka any Babylona sy ny fehiny rehetra, sy ho lehiben’ny mpanapaka ny olon-kendrin’i Babylona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Ary Daniela nangataka tamin’ny mpanjaka, ary izy nanendry an’i Sadraka sy Mesaka ary Abednego ho tonian’ny raharahan’i Babylona sy ny fehiny; ary Daniela dia teo am-bavahadin’ny mpanjaka.
