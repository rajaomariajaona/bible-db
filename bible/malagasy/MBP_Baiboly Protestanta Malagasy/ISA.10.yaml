document_id: ISA.10,873
type_code: plt
verses:
  '1':
  - type: text
    content: Lozan’izay mamorona fikasana tsy marina
  - type: text
    content: Sy izay mpanoratra manoratra fampahoriana,
  '10':
  - type: text
    content: Tahaka ny nahatraran’ny tànako ny fanjakan’ny andriamani-tsi-izy,
  - type: text
    content: Na dia nihoatra noho ny an’i Jerosalema sy ny an’i Samaria aza ny sampin’
  - type: note
    content: Heb. sarin-javatra voasokitra.
  - type: text
    content: ' ireo,'
  '11':
  - type: text
    content: Dia tsy tahaka ny nataoko tamin’i Samaria sy ny andriamanini-tsi-izy va
  - type: text
    content: No hataoko amin’i Jerosalema sy ny sampiny
  - type: note
    content: Heb. sarin-javatra voasokitra.
  - type: text
    content: ' koa?'
  '12':
  - type: text
    content: Kanefa rehefa vitan’ny Tompo ny asany rehetra
  - type: text
    content: Ao an-tendrombohitra Ziona sy Jerosalema,
  - type: text
    content: Dia hovaliany
  - type: note
    content: Heb. hovaliako.
  - type: text
    content: ' kosa ny vokatry ny fiavonavonan’ny fon’ny mpanjakan’i Asyria'
  - type: text
    content: Sy ny reharehan’ny fiandranandran’ny masony;
  '13':
  - type: text
    content: 'Fa izy manao hoe: tamin’ny herin’ny tànako no nanaovako izany,'
  - type: text
    content: Sy tamin’ny fahendreko, fa mahira-tsaina aho;
  - type: text
    content: Ary nanaisotra ny fari-tanin’ny firenena aho
  - type: text
    content: Sady namabo ny hareny,
  - type: text
    content: Ary tahaka ny famotraky ny ombilahy no namotrahako mpanapaka;
  - type: note
    content: 'Na: Ary tahaka ny fanaon’ny lehilahy mahery no nanonganako mpanapaka.'
  '14':
  - type: text
    content: Ary tahaka ny fakàna ny ao amin’ny akanim-borona
  - type: text
    content: No nakan’ny tanako ny haren’ny firenena;
  - type: text
    content: Ary tahaka ny famory atody nilaozan-dreniny
  - type: text
    content: No namoriako ny any amin’ny tany rehetra,
  - type: text
    content: Ka tsy nisy nikopaka elatra, na nisoka-bava, na nikiakiaka.
  '15':
  - type: text
    content: Ny famaky va hirehareha amin’izay mikapa aminy?
  - type: text
    content: Ny tsofa va hiavonavona amin’izay manatsofa aminy?
  - type: text
    content: Toy ny tsorakazo, raha manetsika izay manainga azy!
  - type: text
    content: Ary toy ny tehina, raha manandratra ny tompony!
  - type: note
    content: Heb. manandratra izay tsy hazo.
  '16':
  - type: text
    content: Koa izany no anateran’ny Tompo, dia ny Tompon’ny maro, fahahiazana amin’ny tremalahiny;
  - type: text
    content: Ary ao ambanin’ny voninahiny dia hisy mirehitra toy ny firehitry ny afo.
  '17':
  - type: text
    content: Ary ny fahazavan’ny Isiraely ho tonga afo,
  - type: text
    content: Ary ny Iray Masiny ho tonga lelafo,
  - type: text
    content: Ka hodorany ho levona indray andro monja ny tsilony sy ny heriny;
  '18':
  - type: text
    content: Ary ny voninahitry ny alany sy ny sahany mahavokatra dia holevoniny,
  - type: text
    content: Na ny fanahiny, na ny nofony,
  - type: text
    content: Ka ho tahaka ny fifezak’izay marary mafy
  - type: note
    content: 'Na: ho tahaka ny fahatoranan’ny mpitondra faneva.'
  - type: text
    content: ' izany.'
  '19':
  - type: text
    content: Ary ho vitsy ny hazo sisa any an-alany,
  - type: text
    content: Ka na dia izay mbola zaza aza hahasoratra azy.
  '2':
  - type: text
    content: Hampialany ny mahantra amin’ny fitsarana
  - type: text
    content: Sy hanalany ny rariny amin’izay ory eo amin’ny oloko,
  - type: text
    content: Handrobany ny mpitondratena
  - type: text
    content: Sy hamaboany ny kamboty!
  '20':
  - type: text
    content: Ary amin’izany andro izany ny Isiraely sisa,
  - type: text
    content: Izay tsy ringana amin’ny taranak’i Jakoba,
  - type: text
    content: Dia tsy hiankina amin’izay namely azy intsony;
  - type: text
    content: Fa Jehovah, Iray Masin’ny Isiraely, ihany no hiankinany marina tokoa.
  '21':
  - type: text
    content: Ary izay sisa amin’i Jakoba
  - type: text
    content: Dia hiverina ho amin’Andriamanitra Mahery.
  '22':
  - type: text
    content: Fa na dia tahaka ny fasika any amin’ny ranomasina aza ny isan’ny Isiraely olonao,
  - type: text
    content: Dia izay sisa aminy ihany no hiverina;
  - type: text
    content: Voatendry ny fandringanana izay hanafotra ho famaliana marina;
  '23':
  - type: text
    content: Fa fahafonganana voatendry no hataon’i Jehovah, Tompon’ny maro,
  - type: text
    content: Ao amin’ny tany.
  '24':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Ry oloko, izay monina any Ziona,
  - type: text
    content: Aza matahotra ny Asyriana,
  - type: text
    content: Raha mamely anao amin’ny tsorakazo izy ary manainga ny tehiny aminao,
  - type: text
    content: Tahaka ny fanao tany Egypta;
  '25':
  - type: text
    content: Fa rehefa afaka vetivety, dia hitsahatra ny fahavinirana,
  - type: text
    content: Ary ny fahatezerako dia handringana azy kosa.
  '26':
  - type: text
    content: Eny, Jehovah, Tompon’ny maro, hamely azy amin’ny kotopia,
  - type: text
    content: Tahaka ny namelezana ny Midiana teo am-batolampy Oreba;
  - type: text
    content: Ary ny tsorakazony haingainy eny ambonin’ny ranomasina
  - type: text
    content: Ka hatsangany tahaka ny fanao tany Egypta.
  '27':
  - type: text
    content: Ary amin’izany andro izany dia ho afaka eo an-tsorokao ny entany
  - type: text
    content: Ary ny bao fitondrany ho afaka amin’ny vozonao,
  - type: text
    content: Ary ho tapaka
  - type: note
    content: Heb. simba.
  - type: text
    content: ' ny bao fitondrana noho ny fihatavezany.'
  '28':
  - type: text
    content: Injao! tonga any Aiata izy,
  - type: text
    content: Mamaky an’i Migrona izy
  - type: text
    content: Ary mametraka ny entany ao Mikmasy,
  '29':
  - type: text
    content: Mihoatra ao an-kadilanana izy,
  - type: text
    content: 'Ao Geba isika no handry, '
  - type: text
    content: hoy izy;
  - type: text
    content: Mangovitra Rama,
  - type: text
    content: Mandositra Gibean’i Saoly;
  '3':
  - type: text
    content: Ary ahoana no hataonareo amin’ny andro famaliana
  - type: text
    content: Sy amin’ny fandravana izay avy amin’ny lavitra?
  - type: text
    content: Ho any amin’iza no handosiranareo hamonjy anareo?
  - type: text
    content: Ary aiza no hametrahanareo ny harenareo?
  - type: note
    content: Heb. voninahitrareo.
  '30':
  - type: text
    content: Mikiakiaha mafy, ry zanakavavin’i Galima,
  - type: text
    content: Mampandria sofina, ry Laisy.
  - type: text
    content: Indrisy, ry Anatota mahantra!
  '31':
  - type: text
    content: Lasa mandositra Madmena,
  - type: text
    content: Ny mponina any Gebima mitondra ny entany mandositra.
  '32':
  - type: text
    content: Anio izy mbola mitoetra any Noba,
  - type: text
    content: Maninjitra ny tànany manambana ny tendrombohitr’i Ziona zanakavavy,
  - type: text
    content: Dia ny havoan’i Jerosalema.
  '33':
  - type: text
    content: Indro, Jehovah, Tompon’ny maro, manapaka ny rantsany madinika amin’ny heriny mahatahotra;
  - type: text
    content: Ary izay mijoaka lava no voakapa,
  - type: text
    content: Ary izay avo no aetry;
  '34':
  - type: text
    content: Ary kapaina vy ny ala mikirindro,
  - type: text
    content: Ary Libanona dia alamaky ny Iray Mahery.
  '4':
  - type: text
    content: Tsy misy azony atao afa-tsy ny mihohoka voatsindrin’ny mpifatotra
  - type: text
    content: Sy ny lavo voatsindrin’ny voavono.
  - type: note
    content: 'Na: Izay tsy mihohoka voatsindrin’ny babo dia ho lavo voatsindrin’ny voavono; na: Raha misaraka amiko, dia hihohoka, etc.'
  - type: text
    content: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: text
    content: Fa mbola mihinjitra ihany ny tànany.
  - type: heading
    content: Ny amin’ny fanjakan’i Asyria sy ny mbola handravana azy.
  '5':
  - type: text
    content: ENDREY! ry Asyria, tsorakazon’ny fahatezerako ô,
  - type: text
    content: Eny, tehina eny an-tànany ny fahavinirako!
  '6':
  - type: text
    content: Hamely firenena mihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' no anirahako azy,'
  - type: text
    content: Ary hamely ny firenena izay iharan’ny fahatezerako no andidiako azy,
  - type: text
    content: Hamabo sy handroba
  - type: text
    content: Ary hanao azy ho fanitsakitsaka tahaka ny fotaka eny an-dàlambe.
  '7':
  - type: text
    content: Kanjo tsy izany no kasainy,
  - type: text
    content: Ary tsy izany no heverin’ny fony;
  - type: text
    content: Fa ny handringana sy ny hamongotra firenena tsy vitsy no ao am-pony.
  '8':
  - type: text
    content: 'Fa hoy izy:'
  - type: text
    content: Tsy mpanjaka avokoa va ireny governorako ireny?
  '9':
  - type: text
    content: Tsy tahaka an’i Karkemisy va Kalno?
  - type: text
    content: Tsy tahaka an’i Arpada va Hamata?
  - type: text
    content: Ary tsy tahaka an’i Damaskosy va Samaria?
