document_id: ISA.10
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’izay mamorona fikasana tsy marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay mpanoratra manoratra fampahoriana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hampialany ny mahantra amin’ny fitsarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanalany ny rariny amin’izay ory eo amin’ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handrobany ny mpitondratena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamaboany ny kamboty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ahoana no hataonareo amin’ny andro famaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fandravana izay avy amin’ny lavitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any amin’iza no handosiranareo hamonjy anareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza no hametrahanareo ny harenareo?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voninahitrareo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy misy azony atao afa-tsy ny mihohoka voatsindrin’ny mpifatotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny lavo voatsindrin’ny voavono.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izay tsy mihohoka voatsindrin’ny babo dia ho lavo voatsindrin’ny voavono; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha misaraka amiko, dia hihohoka, etc.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola mihinjitra ihany ny tànany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fanjakan’i Asyria sy ny mbola handravana azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ENDREY! ry Asyria, tsorakazon’ny fahatezerako ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tehina eny an-tànany ny fahavinirako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hamely firenena mihatsaravelatsihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
  - type: text
    text: ' no anirahako azy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamely ny firenena izay iharan’ny fahatezerako no andidiako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamabo sy handroba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao azy ho fanitsakitsaka tahaka ny fotaka eny an-dàlambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanjo tsy izany no kasainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy izany no heverin’ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny handringana sy ny hamongotra firenena tsy vitsy no ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mpanjaka avokoa va ireny governorako ireny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy tahaka an’i Karkemisy va Kalno?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tahaka an’i Arpada va Hamata?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy tahaka an’i Damaskosy va Samaria?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tahaka ny nahatraran’ny tànako ny fanjakan’ny andriamani-tsi-izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia nihoatra noho ny an’i Jerosalema sy ny an’i Samaria aza ny sampin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarin-javatra voasokitra.
    marker-yv: yv-n
  - type: text
    text: ' ireo,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia tsy tahaka ny nataoko tamin’i Samaria sy ny andriamanini-tsi-izy va
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hataoko amin’i Jerosalema sy ny sampiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarin-javatra voasokitra.
    marker-yv: yv-n
  - type: text
    text: ' koa?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanefa rehefa vitan’ny Tompo ny asany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao an-tendrombohitra Ziona sy Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hovaliany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hovaliako.
    marker-yv: yv-n
  - type: text
    text: ' kosa ny vokatry ny fiavonavonan’ny fon’ny mpanjakan’i Asyria'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny reharehan’ny fiandranandran’ny masony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izy manao hoe: tamin’ny herin’ny tànako no nanaovako izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tamin’ny fahendreko, fa mahira-tsaina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanaisotra ny fari-tanin’ny firenena aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady namabo ny hareny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny famotraky ny ombilahy no namotrahako mpanapaka;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary tahaka ny fanaon’ny lehilahy mahery no nanonganako mpanapaka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tahaka ny fakàna ny ao amin’ny akanim-borona
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nakan’ny tanako ny haren’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny famory atody nilaozan-dreniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: No namoriako ny any amin’ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nisy nikopaka elatra, na nisoka-bava, na nikiakiaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny famaky va hirehareha amin’izay mikapa aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tsofa va hiavonavona amin’izay manatsofa aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny tsorakazo, raha manetsika izay manainga azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny tehina, raha manandratra ny tompony!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manandratra izay tsy hazo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa izany no anateran’ny Tompo, dia ny Tompon’ny maro, fahahiazana amin’ny tremalahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao ambanin’ny voninahiny dia hisy mirehitra toy ny firehitry ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny fahazavan’ny Isiraely ho tonga afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Iray Masiny ho tonga lelafo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hodorany ho levona indray andro monja ny tsilony sy ny heriny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny voninahitry ny alany sy ny sahany mahavokatra dia holevoniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fanahiny, na ny nofony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho tahaka ny fifezak’izay marary mafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho tahaka ny fahatoranan’ny mpitondra faneva.
    marker-yv: yv-n
  - type: text
    text: ' izany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ho vitsy ny hazo sisa any an-alany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na dia izay mbola zaza aza hahasoratra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary amin’izany andro izany ny Isiraely sisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy ringana amin’ny taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hiankina amin’izay namely azy intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah, Iray Masin’ny Isiraely, ihany no hiankinany marina tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary izay sisa amin’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiverina ho amin’Andriamanitra Mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa na dia tahaka ny fasika any amin’ny ranomasina aza ny isan’ny Isiraely olonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay sisa aminy ihany no hiverina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatendry ny fandringanana izay hanafotra ho famaliana marina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa fahafonganana voatendry no hataon’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry oloko, izay monina any Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra ny Asyriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mamely anao amin’ny tsorakazo izy ary manainga ny tehiny aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fanao tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa rehefa afaka vetivety, dia hitsahatra ny fahavinirana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahatezerako dia handringana azy kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Eny, Jehovah, Tompon’ny maro, hamely azy amin’ny kotopia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny namelezana ny Midiana teo am-batolampy Oreba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsorakazony haingainy eny ambonin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hatsangany tahaka ny fanao tany Egypta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary amin’izany andro izany dia ho afaka eo an-tsorokao ny entany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny bao fitondrany ho afaka amin’ny vozonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tapaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: simba.
    marker-yv: yv-n
  - type: text
    text: ' ny bao fitondrana noho ny fihatavezany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Injao! tonga any Aiata izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamaky an’i Migrona izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mametraka ny entany ao Mikmasy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mihoatra ao an-kadilanana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ao Geba isika no handry, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangovitra Rama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandositra Gibean’i Saoly;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mikiakiaha mafy, ry zanakavavin’i Galima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampandria sofina, ry Laisy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy, ry Anatota mahantra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lasa mandositra Madmena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mponina any Gebima mitondra ny entany mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Anio izy mbola mitoetra any Noba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maninjitra ny tànany manambana ny tendrombohitr’i Ziona zanakavavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny havoan’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Indro, Jehovah, Tompon’ny maro, manapaka ny rantsany madinika amin’ny heriny mahatahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mijoaka lava no voakapa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay avo no aetry;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary kapaina vy ny ala mikirindro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Libanona dia alamaky ny Iray Mahery.
