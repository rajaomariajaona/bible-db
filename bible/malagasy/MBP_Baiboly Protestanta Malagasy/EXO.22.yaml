document_id: EXO.22,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Raha azo manamitrano ny mpangalatra ka asiana ho faty, dia tsy hisy valin-dra amin’izany; '
  '10':
  - type: text
    content: 'dia fianianana amin’i Jehovah no hitsarana azy roa tonta, hahafantarana na efa naninjitra ny tànany ka naka ny fananan’ny namany ilay anankiray, na tsia; ary heken’ny tompony izany, dia tsy hisy onitra. '
  '11':
  - type: text
    content: 'Fa raha nangalarina tany aminy tokoa izany, dia hanonitra ho an’ny tompon-javatra izy. '
  '12':
  - type: text
    content: Raha voaviraviram-biby izany, dia hitondra azy ho vavolombelona izy; tsy hanonitra izay voaviravira izy.
  '13':
  - type: text
    content: 'Ary raha misy olona mindran-javatra amin’ny namany, ka simba na maty izany, nefa tsy mba teo aminy ny tompon-javatra, dia hanonitra tokoa izy. '
  '14':
  - type: text
    content: Fa raha teo aminy ihany ny tompon-javatra, dia tsy hanonitra izy; ary raha zavatra ahofa kosa, dia vitan’
  - type: note
    content: Heb. tonga noho.
  - type: text
    content: ny hofany izany.
  '15':
  - type: text
    content: 'Ary raha misy olona mitaona zazavavy, izay tsy voafofo, ka mandry aminy, dia hanome harena azy izy mba ho vadiny. '
  '16':
  - type: text
    content: Fa raha mandà tokoa ny rainy ka tsy manome azy ho vadiny, dia handoa vola ralehilahy araka ny harena fanome zazavavy hampakarina.
  '17':
  - type: text
    content: Aza velomina ny vehivavy manana ody.
  '18':
  - type: text
    content: Izay rehetra mandry amin’ny biby dia hatao maty tokoa.
  '19':
  - type: text
    content: Izay mamono zavatra hatao fanatitra amin’ny andriamanitra hafa, afa-tsy amin’i Jehovah ihany, dia ho voaozaona.
  - type: note
    content: Heb. herema; izahao Lev. xxvii. 29.
  '2':
  - type: text
    content: 'fa raha tratry ny masoandro miposaka kosa izy, dia hisy valin-dra ihany amin’izany; hanonitra tokoa izy; ary raha tsy manana na inona na inona, dia hamidy izy noho ny halatra nataony. '
  '20':
  - type: text
    content: Ary aza manao izay sarotra amin’ny vahiny, na mampahory azy; fa efa mba vahiny tany amin’ny tany Egypta ihany hianareo.
  '21':
  - type: text
    content: 'Aza mampahory ny mpitondratena sy ny kamboty akory hianareo. '
  '22':
  - type: text
    content: 'Fa raha mampahory azy na amin’inona na amin’inona hianao, ka mitaraina amiko izy, dia hihaino ny fitarainany tokoa Aho, '
  '23':
  - type: text
    content: ka hirehitra ny fahatezerako, ary hamono anareo amin’ny sabatra Aho; dia mba ho mpitondratena ny vadinareo, ary ho kamboty kosa ny zanakareo.
  '24':
  - type: text
    content: Raha mampisambo-bola ny oloko izay malahelo eo aminao hianao, dia tsy ho toy ny mpampanàna vola aminy; fa tsy hampandoa zana-bola azy hianao.
  '25':
  - type: text
    content: 'Raha maka ny lamban’ny namanao ho tsatòka hianao, dia hampodinao aminy izany, raha mbola tsy milentika ny masoandro. '
  '26':
  - type: text
    content: Fa izany ihany no firakofany sady fitafiany amin’ny hodiny, ka inona no ho entiny mandry? ary raha mitaraina amiko izy, dia hohenoiko, fa mamindra fo Aho.
  '27':
  - type: text
    content: Aza miteny ratsy an’Andriamanitra hianao, na manozona ny mpanapaka ny firenenao.
  '28':
  - type: text
    content: Aza atao ela vao manatitra ny santatry ny vokatrao sy ny fisotronao; ny matoa amin’ny zanakao-lahy dia omeo Ahy.
  '29':
  - type: text
    content: Izao no hataonao amin’ny ombinao sy ny ondry aman-osinao; hafitoana no hitoerany ao amin’ny reniny; ary amin’ny andro fahavalo no hanateranao azy ho Ahy.
  '3':
  - type: text
    content: Raha hita marina velona eo aminy ny halatra – na omby, na boriky, na ondry, na osy, – dia hanonitra roa heny izy.
  '30':
  - type: text
    content: Ary ho olona masina ho Ahy hianareo, koa izay hena voaviraviram-biby any an-tsaha dia tsy hohaninareo; fa harianareo ho an’ny amboa izany.
  '4':
  - type: text
    content: Raha misy olona mampitondraka amin’ny voly na tanimboaloboka, fa alefany handeha ny bibiny, ka homana ny volin’olona izany biby izany, dia amin’ny tsara indrindra ao amin’ny sahany, ary amin’ny tsara indrindra ao amin’ny tanimboalobony, no hanonerany.
  '5':
  - type: text
    content: Raha misy afo mirehitra ka mahazo ny tsilo, ka may ny antontam-bary, na ny vary maniry, na ny saha, dia hanonitra tokoa izay nampirehitra ny afo.
  '6':
  - type: text
    content: 'Raha misy olona mampitahiry vola na fanaka ny namany, ka angalarin’ny sasany ao amin’ny tranon’ilay olona izany, raha hita ny mpangalatra, dia hanonitra roa heny izy. '
  '7':
  - type: text
    content: Fa raha tsy hita kosa ny mpangalatra, dia ho entina eo anatrehan’Andriamanitra ny tompon’ny trano mba hizahana na naninjitra ny tànany ka naka ny fananan’ny namany izy, na tsia.
  '8':
  - type: text
    content: Ny amin’ny zavatra ifandirana rehetra, na omby, na boriky, na ondry, na osy, na fitafiana, na zavatra very, izay ataon’olona ho azy, dia ho entina eo anatrehan’Andriamanitra ny tenin’izy roa tonta, koa izay helohin’Andriamanitra dia hanonitra roa heny ho an’ny namany.
  '9':
  - type: text
    content: 'Raha misy olona mampitahiry ny namany boriky, na omby, na ondry, na osy, na biby fiompy hafa, ka maty izany, na maratra, na roahina ka tsy misy mahita, '
