document_id: PRO.17,873
type_code: plt
verses:
  '1':
  - type: text
    content: Tsara ny sombi-mofo maina misy fiadanana
  - type: text
    content: Noho ny trano feno hena misy fifandirana.
  '10':
  - type: text
    content: Ny anatra dia manan-kery kokoa amin’ny hendry
  - type: text
    content: Noho ny kapoka injato amin’ny adala.
  '11':
  - type: text
    content: Ny maditra dia fatra-pitady ny ratsy,
  - type: text
    content: Ka dia iraka lozabe no irahina hamely azy.
  '12':
  - type: text
    content: Aleo mifanena amin’ny bera very anaka
  - type: text
    content: Toy izay amin’ny adala feno hadalana.
  '13':
  - type: text
    content: Izay mamaly ratsy ny soa,
  - type: text
    content: Ny ratsy tsy hiala ao an-tranony.
  '14':
  - type: text
    content: Ny fiandohan’ny ady dia toy ny manata-drano,
  - type: text
    content: Koa ilaozy ny fifandirana, dieny tsy mbola mifandramatra.
  '15':
  - type: text
    content: Izay manamarina ny meloka, na izay manameloka ny marina,
  - type: text
    content: Dia samy fahavetavetana eo imason’i Jehovah.
  '16':
  - type: text
    content: Hatao inona re ity vola an-tànan’ny adala?
  - type: text
    content: Hamidy fahendrena va?– tsy manan-tsaina izy.
  '17':
  - type: text
    content: Izay tena sakaiza tokoa dia tia amin’ny andro rehetra,
  - type: text
    content: Sady miseho
  - type: note
    content: Heb. ateraka.
  - type: text
    content: ' ho rahalahy hamonjy amin’ny fahoriana.'
  '18':
  - type: text
    content: Olona tsy ampy saina izay mifandray tànana
  - type: text
    content: Hiantoka eo anatrehan’ny sakaizany.
  '19':
  - type: text
    content: Izay tia ady dia tia heloka;
  - type: text
    content: Ary izay manao vavahady avo mitady fahasimbana.
  '2':
  - type: text
    content: Ny mpanompo hendry dia hanapaka ny zanaka manao izay mahamenatra
  - type: text
    content: Sady hizara lova amin’ny mpirahalahy.
  '20':
  - type: text
    content: Izay madì-po tsy hahita soa;
  - type: text
    content: Ary izay manana lela mandainga hivarina any amin’ny loza.
  '21':
  - type: text
    content: Izay miteraka adala hahazo alahelo;
  - type: text
    content: Ary ny rain’ ny adala tsy ho faly.
  '22':
  - type: text
    content: Ny fo ravoravo mahasalama tsara;
  - type: text
    content: Fa ny fanahy kivy mahamaina ny taolana.
  '23':
  - type: text
    content: Ny ratsy fanahy mandray kolikoly avy any anaty lamba
  - type: text
    content: Ho entiny mamadika ny rariny.
  '24':
  - type: text
    content: Eo anoloan’ny manan-tsaina ny fahendrena;
  - type: text
    content: Fa ny mason’ny adala dia mibirioka any amin’ny faran’ny tany.
  '25':
  - type: text
    content: Ny zanaka adala mampalahelo ny rainy
  - type: text
    content: Sady fahoriana mangidy amin’ny reniny niteraka azy.
  '26':
  - type: text
    content: Tsy mety raha mampijaly ny marina,
  - type: text
    content: Na mamely ny manan-kaja noho ny fahamarinany.
  - type: note
    content: 'Na: tsy amin’ny rariny.'
  '27':
  - type: text
    content: Izay mahafihim-bava no manam-pahalalana;
  - type: text
    content: Ary izay mahatsindry fo no manan-tsaina.
  '28':
  - type: text
    content: Na ny adala aza, raha tsy miteny, dia atao ho hendry,
  - type: text
    content: Ary izay mahafihim-bava dia toa manan-tsaina.
  '3':
  - type: text
    content: Ny memy ho an’ny volafotsy, ary ny fatana fandrendrehana ho an’ny volamena;
  - type: text
    content: Fa Jehovah ihany no Mpamantatra ny fo.
  '4':
  - type: text
    content: Ny mpanao ratsy mampandry sofina amin’ny molotra mandainga;
  - type: text
    content: Ary ny mpandainga mihaino ny lela mampidi-doza.
  '5':
  - type: text
    content: Izay mihomehy ny malahelo manala baraka ny Mpanao azy;
  - type: text
    content: Ary izay faly amin’ny fahorian’ny sasany dia tsy maintsy hampijalina.
  '6':
  - type: text
    content: Satroboninahitry ny antitra ny zafiny;
  - type: text
    content: Ary voninahitry ny zanaka ny rainy.
  '7':
  - type: text
    content: Ny teny jadona tsy tandrifiny halahatry ny adala,
  - type: text
    content: Koa mainka fa tsy tokony ho an’ny zanak’andriana ny molotra mandainga.
  '8':
  - type: text
    content: Ny kolikoly dia toy ny vato soa eo imason’izay mahazo azy,
  - type: text
    content: Ka na aiza na aiza alehany dia ambinina ihany.
  '9':
  - type: text
    content: Izay te-ho be fitiavana dia manaron-keloka;
  - type: text
    content: Fa izay mamohafoha teny mampisaraka ny tena mpisakaiza.
