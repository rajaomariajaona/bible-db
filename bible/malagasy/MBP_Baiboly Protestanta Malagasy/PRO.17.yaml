document_id: PRO.17
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny sombi-mofo maina misy fiadanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny trano feno hena misy fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny mpanompo hendry dia hanapaka ny zanaka manao izay mahamenatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hizara lova amin’ny mpirahalahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny memy ho an’ny volafotsy, ary ny fatana fandrendrehana ho an’ny volamena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah ihany no Mpamantatra ny fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpanao ratsy mampandry sofina amin’ny molotra mandainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpandainga mihaino ny lela mampidi-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mihomehy ny malahelo manala baraka ny Mpanao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay faly amin’ny fahorian’ny sasany dia tsy maintsy hampijalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satroboninahitry ny antitra ny zafiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voninahitry ny zanaka ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny teny jadona tsy tandrifiny halahatry ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mainka fa tsy tokony ho an’ny zanak’andriana ny molotra mandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny kolikoly dia toy ny vato soa eo imason’izay mahazo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na aiza na aiza alehany dia ambinina ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay te-ho be fitiavana dia manaron-keloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mamohafoha teny mampisaraka ny tena mpisakaiza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny anatra dia manan-kery kokoa amin’ny hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny kapoka injato amin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny maditra dia fatra-pitady ny ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia iraka lozabe no irahina hamely azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aleo mifanena amin’ny bera very anaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay amin’ny adala feno hadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamaly ratsy ny soa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ratsy tsy hiala ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fiandohan’ny ady dia toy ny manata-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ilaozy ny fifandirana, dieny tsy mbola mifandramatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay manamarina ny meloka, na izay manameloka ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy fahavetavetana eo imason’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatao inona re ity vola an-tànan’ny adala?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamidy fahendrena va?– tsy manan-tsaina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay tena sakaiza tokoa dia tia amin’ny andro rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miseho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ateraka.
    marker-yv: yv-n
  - type: text
    text: ' ho rahalahy hamonjy amin’ny fahoriana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Olona tsy ampy saina izay mifandray tànana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiantoka eo anatrehan’ny sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay tia ady dia tia heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay manao vavahady avo mitady fahasimbana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay madì-po tsy hahita soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay manana lela mandainga hivarina any amin’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay miteraka adala hahazo alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rain’ ny adala tsy ho faly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fo ravoravo mahasalama tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fanahy kivy mahamaina ny taolana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny ratsy fanahy mandray kolikoly avy any anaty lamba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho entiny mamadika ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eo anoloan’ny manan-tsaina ny fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mason’ny adala dia mibirioka any amin’ny faran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny zanaka adala mampalahelo ny rainy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady fahoriana mangidy amin’ny reniny niteraka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mety raha mampijaly ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mamely ny manan-kaja noho ny fahamarinany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy amin’ny rariny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mahafihim-bava no manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mahatsindry fo no manan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Na ny adala aza, raha tsy miteny, dia atao ho hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mahafihim-bava dia toa manan-tsaina.
