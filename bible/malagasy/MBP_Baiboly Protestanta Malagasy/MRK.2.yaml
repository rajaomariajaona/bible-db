document_id: MRK.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahasitranan’i Jesosy an-dralehilahy nararin’ny paralysisa tao Kapernaomy.
  - type: heading
    content: Mat. 9.1-8; Lio. 5.17-26.
  - type: text
    content: 'ARY nony niditra tao Kapernaony indray Izy, rehefa afaka andro vitsivitsy, dia re fa tao an-trano Izy, '
  '10':
  - type: text
    content: 'Fa mba ho fantatrareo fa ny Zanak’olona manana fahefana etỳ ambonin’ny tany hamela heloka, dia lazaiko aminao (hoy Izy tamin’ilay mararin’ny paralysisa): '
  '11':
  - type: text
    content: 'Mitsangàna, betao ny fandrianao, ka modia any an-tranonao. '
  '12':
  - type: text
    content: 'Dia nitsangana izy ka nambeta ny fandriany niaraka tamin’izay ary niala teo anatrehan’ny olona rehetra; dia talanjona izy rehetra ka nankalaza an’Andriamanitra nanao hoe: Tsy mbola nahita izay toy izao izahay.'
  - type: heading
    content: Ny niantsoana an’i Levy (Matio), sy ny fanasana nataony tao an-tranony, ary ny tori-teny nataon’i Jesosy ny amin’ny fifadian-kanina.
  - type: heading
    content: Mat. 9.9-17; Lio. 5.27-39.
  '13':
  - type: text
    content: ARY lasa nandeha teny amoron-dranomasina indray Jesosy; ary ny vahoaka rehetra nanatona Azy, ka dia nampianatra azy Izy.
  '14':
  - type: text
    content: Ary nony nandalo Izy, dia nahita an’i Levy, zanak’i Alfeo, nipetraka teo am-pamorian-ketra;
  - type: note
    content: Izahao Mat. ix.9.
  - type: text
    content: ' ka hoy Izy taminy: Manaraha Ahy. Dia nitsangana izy ka nanaraka Azy.'
  '15':
  - type: text
    content: 'Ary raha nipetraka nihinana tao an-tranony Izy, dia maro ny mpamory hetra sy ny mpanota no niara-nipetraka nihinana tamin’i Jesosy mbamin’ny mpianany; fa nisy maro tao, dia nanaraka Azy izy. '
  '16':
  - type: text
    content: Ary ny mpanora-dalàna, izay isan’ny Fariseo,
  - type: note
    content: 'Na: Ary ny mpanora-dàlana sy ny Fariseo.'
  - type: text
    content: ' raha nahita fa niara-nipetraka nihinana tamin’ny mpanota sy ny mpamory hetra Izy, dia niteny tamin’ny mpianatra hoe: Miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota Izy! '
  '17':
  - type: text
    content: 'Ary raha nahare izany Jesosy, dia nanao taminy hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary; tsy tonga hiantso ny marina Aho, fa ny mpanota.'
  '18':
  - type: text
    content: 'Ary ny mpianatr’i Jaona sy ny Fariseo nifady hanina tamin’izany; dia avy izy ka nanao tamin’i Jesosy hoe: Nahoana ny mpianatr’i Jaona sy ny mpianatry ny Fariseo no mifady hanina, fa ny mpianatrao kosa tsy mba mifady? '
  '19':
  - type: text
    content: 'Ary Jesosy niteny taminy hoe: Mahay mifady va ny havan’ny mpampakatra, raha mbola ao aminy ihany ny mpampakatra? Raha mbola ao aminy ihany ny mpampakatra, dia tsy mahay mifady izy. '
  '2':
  - type: text
    content: ka dia tafangona ny maro, ka tsy nisy hitoerana intsony, na dia teny anoloan’ny varavarana aza; ary Izy nitory ny teny taminy.
  '20':
  - type: text
    content: 'Fa ho avy ny andro izay hanalana ny mpampakatra hiala ao aminy, ka amin’izany andro izany vao hifady izy. '
  '21':
  - type: text
    content: 'Tsy misy olona manjaitra tapa-damba tsy mbola voalòna amin’ny lamba tonta; fa raha izany, ny vaovao izay natampina dia handrompitra ny tonta, ka dia hitatra ny triatra. '
  '22':
  - type: text
    content: Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta; fa raha izany, ny divay dia hahatriatra ny siny hoditra, ka dia samy ho very foana ny divay sy ny siny hoditra; fa divay vaovao no ho ao anaty siny hoditra vaovao.
  - type: heading
    content: Ny nanotazan’ny mpianatra salohim-bary tamin’ny Sabata, sy ny naninian’ny Fariseo azy.
  - type: heading
    content: Mat. 12.1-8; Lio. 6.1-5.
  '23':
  - type: text
    content: 'ARY nandeha namaky ny tanim-bary tamin’ny Sabata Jesosy; ary ny mpianany dia nanoty ny salohim-bary teny am-pandehanana. '
  '24':
  - type: text
    content: 'Ary ny Fariseo nanao taminy hoe: Indro, nahoana ireo no manao izay tsy mety amin’ny Sabata? '
  '25':
  - type: text
    content: 'Fa hoy Izy taminy; Tsy mbola novakinareo va '
  - type: text
    content: ny teny milaza
  - type: text
    content: ' ilay nataon’i Davida, raha reraky ny hanoanana izy mbamin’izay nanaraka azy, '
  '26':
  - type: text
    content: 'fa niditra tao an-tranon’Andriamanitra tamin’ny andron’i Abiatara mpisoronabe izy ka nihinana ny mofo aseho, izay mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany, ary nomeny koa izay nanaraka azy? '
  '27':
  - type: text
    content: 'Ary hoy izy taminy: Ny Sabata no natao ho an’ny olona, fa tsy ny olona ho an’ny Sabata; '
  '28':
  - type: text
    content: ka dia Tompon’ny Sabata aza ny Zanak’olona.
  '3':
  - type: text
    content: 'Ary nisy nanatona nitondra ny anankiray mararin’ny paralysisa ho eo aminy, izay nolanjain’efa-dahy. '
  '4':
  - type: text
    content: 'Ary satria tsy afaka nanakaiky Azy izy noho ny habetsahan’ny vahoaka, dia nanesorany ny tafon’ny trano nitoeran’i Jesosy, ka nony efa voasokatra, dia nampidininy teo ny fandriana izay nandrian’ilay nararin’ny paralysisa. '
  '5':
  - type: text
    content: 'Ary Jesosy, nony nahita ny finoan’ireo dia, nanao tamin’ilay mararin’ny paralysisa hoe: Anaka, voavela ny helokao.'
  '6':
  - type: text
    content: 'Ary nisy mpanora-dalàna sasany nipetraka teo ka nieritreritra tao am-pony hoe: '
  '7':
  - type: text
    content: Nahoana Ilehity no miteny toy izany? Miteny ratsy
  - type: note
    content: Gr. manao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' Izy. Iza no mahavela heloka afa-tsy Iray ihany, dia Andriamanitra? '
  '8':
  - type: text
    content: 'Ary niaraka tamin’izay Jesosy dia nahalala tao am-panahiny fa nieritreritra izany tao am-pony ireo, dia hoy Izy taminy: Nahoana hianareo no mieritreritra izany zavatra izany ao am-ponareo? '
  '9':
  - type: text
    content: 'Iza moa no moramora kokoa, ny manao amin’ilay mararin’ny paralysisa hoe: Voavela ny helokao, sa ny manao hoe: Mitsangàna, betao ny fandrianao, ka mandehana? '
