document_id: JDG.19,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny ratsy nataon’ny mponina tao Gibea, sy ny namalian’ny Isiraely rehetra azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’izany andro izany, raha tsy nisy mpanjaka teo amin’ny Isiraely, dia nisy Levita anankiray nivahiny tary an-tsisin’ny tany havoan’i Efraima, ka naka vaditsindrano avy any Betlehema-joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nety nijanona intsony ralehilahy tamin’izany alina izany, fa niainga ihany izy ka nandeha, dia tonga tandrifin’i Jebosa (Jerosalema izany); ary boriky roa samy voaisy lasely no nentiny, ary ny vaditsindranony niaraka taminy koa.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa mby teo akaiky an’i Jebosa izy, ka efa ho hariva ny andro, dia hoy ny zatovo tamin’ ny tompony: Andeha hiakatra ato amin’ ity tanànan’ny Jebosita ity isika ka handry ato. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny tompony taminy: Tsy hiakatra amin’ny tanànan’ny olona hafa firenena izay tsy isan’ny Zanak’Isiraely isika, fa handroso ihany ho any Gibea. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin’ny zatovony: Andeha isika hankamin’ny anankiray amin’ireto tanàna ireto, dia any Gibea, na any Rama, ka handry any. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandroso izy ka nandeha; ary raha mbola teo akaiky an’i Gibea, izay an’ny Benjamita, izy, dia nilentika ny masoandro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia nivily teo izy handeha handry any Gibea; ary niakatra izy ka nipetraka teo amin’ny kianjan’ny tanàna; fa tsy nisy olona nampiantrano azy handry tao an-tranony.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, nisy lehilahy anti-panahy avy niasa tany an-tsaha nony hariva, sady olona avy any amin’ny tany havoan’i Efraima koa izy, saingy nitoetra tany Gibea; fa ny mponina tao amin’izany tanàna izany dia Benjamita. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanopy ny masony izy ka nahita ilay vahiny teo an-kianjan’ny tanàna, dia hoy ilay lehilahy anti-panahy: Hankaiza moa hianao? ary avy taiza? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Avy tany Betlehema-joda izahay ka hankarỳ an-tsisin’ny tany havoan’i Efraima, fa any no tany nihaviako; ary nankany Betlehema-joda aho, fa mpankany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mankany.
      marker-yv: yv-n
    - type: text
      text: ' an-tranon’i Jehovah; ary tsy misy olona mampiantrano ahy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa misy mololo sy hanina ihany ho an’ny borikinay, sady misy mofo sy divay ho ahy sy ny ankizivavinao ary ho an’ny zatovo manaraka ny mpanomponao: tsy misy zavatra ilainay intsony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vaditsindranony nijangajanga sy nisintaka taminy ka nandao azy ary nankany an-tranon-drainy any Betlehem-joda, dia nitoetra tao efa-bolana mipaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ilay lehilahy anti-panahy: Fiadanana anie ho anao; aoka ho adidiko izay rehetra ilainao, fa aza mandry foana eto an-kianja. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitondra azy tany an-tranony izy ka nampihinana ny boriky; dia nanasa tongotra izy ireo ka nihinana sy nisotro.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola nampifaly ny fony izy, indro, ny mponina tao an-tanàna, olona tena ratsy fanahy, dia nanodidina ny trano ka nandòndòna mafy ny varavarana ary niteny tamin’ilay lehilahy anti-panahy tompon-trano hoe: Avoahy ny lehilahy izay niditra ato an-tranonao, mba hahalalanay azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka nankeo aminy ralehilahy tompon-trano ka nanao taminy hoe: Tsia, ry rahalahiko, masìna hianareo, aza manao ratsy; fa tonga ato an-tranoko ity lehilahy ity, koa aza manao izany zavatra fady indrindra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahadalana.
      marker-yv: yv-n
    - type: text
      text: ' izany hianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indreto ny zanako-vavy virijina sy ny vaditsindranon-dralehilahy, aoka mba ho entiko mivoaka ireo, ka mandria aminy, ary ataovy aminy izay sitrakareo; fa aza ity lehilahy ity no anaovanareo izany zavatra fady indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahadalana.
      marker-yv: yv-n
    - type: text
      text: ' izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nety nihaino azy ireo lehilahy ireo, ka dia nalain-dralehilahy ilay vaditsindrano ka navoakany taminy teo ala-trano; dia nahalala azy ireo ka nanao ditra taminy mandritra ny alina mandra-pahamarain’ny andro; ary rehefa hiposaka ny masoandro, vao nalefany handeha izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa ho maraina ny andro, dia tonga ravehivavy, ka lavo teo am-baravaran’ny tranon-dralehilahy, izay nitoeran’ ny vadiny, ka nivalandotra teo mandra-pahazavan’ny andro.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina ralehilahy ka namoha ny varavaran’ny trano, dia nivoaka handeha tamin’ny làlan-kalehany; ary, indro, ravehivavy vaditsindranony miampatra eo am-baravaran’ny trano, ary ny tànany eo amin’ny tokonana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ralehilahy taminy: Mitsangàna, andeha isika. Kanjo tsy nisy namaly. Dia nobetain-dralehilahy izy ka nasampiny teo amin’ny borikiny; dia niainga izy nandeha ho any amin’ny fonenany.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga tao an-tranony izy, dia naka antsy, ka noraisiny ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fatin’ny
    - type: text
      text: ' vaditsindranony, dia norasainy araka ny famavanin’ny taolana ho roa ambin’ny folo toko, ka nampitondrainy eran’ny tanin’ny Isiraely rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niainga ralehilahy ka nandeha nanaraka azy hanao teny malefaka taminy hampody azy ary nitondra ny zatovony sy boriky roa; dia nampiantranoin-dravehivavy ho ao an-tranon-drainy izy, ka nony hitan’ny rain-drazazavavy ralehilahy, dia faly izy nihaona taminy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izay rehetra nahita: Tsy nisy zavatra natao na hita toy izany hatramin’ny andro niakaran’ny Zanak’Isiraely avy tany amin’ny tany Egypta ka mandraka andro-any; hevero izany, samia maka saina, ka ambarao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nihazona azy ny rafozany, rain-drazazavavy, ka nitoetra teo aminy hateloana izy, dia nihinana sy nisotro ary nandry tao izy roa lahy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tamin’ny andro fahefatra, dia nifoha maraina koa izy ka niomana handeha; fa hoy ny rain-drazazavavy tamin’ny vinantony: Aoka aloha mba hanao ody am-bavafo kely hianao, ary rehefa afaka izany, dia handeha hianareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nipetraka izy roa lahy ka niara-nihinana sy nisotro; dia hoy ny rain-drazazavavy tamin-dralehilahy: Mba maneke ny handry eto anio alina, ary aoka ho faly ny fonao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha niomana handeha ralehilahy, dia nanery azy hitoetra ny rafozany, ka dia tafandriana tao indray izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina koa izy handeha nony tamin’ny andro fahadimy; fa hoy ny rain-drazavazavy: Aoka mba hanao ody am-bavafo kely hianao, ary mijanonjanòna aloha mandra-pihilan’ny andro; ary dia niara-nihinana izy roa lahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha niainga handeha ralehilahy sy ny vaditsindranony ary ny ankizilahiny, dia hoy ny rafozany, rain-drazazavavy, taminy: Indro, efa ho hariva ny andro izao, koa masìna hianao, mandria re anio alina; indro, efa hilentika ny masoandro, ka mandria eto, mba hifalian’ny fonao; ary rahampitso dia hifoha maraina koa hianareo, ka handeha hody hianao. '
