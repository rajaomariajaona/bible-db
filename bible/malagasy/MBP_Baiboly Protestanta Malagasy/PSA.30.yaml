document_id: PSA.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana nataon’izay narary mafy noho ny namonjen’Andriamanitra ny ainy.
  - type: text
    content: Salamo. Fihirana tamin’ny nitokanana ny trano. Nataon’i Davida.
  - type: text
    content: HANANDRATRA Anao aho, Jehovah ô; fa nanintona ahy niakatra Hianao,
  - type: text
    content: Ka tsy nataonao ho fifalian’ny fahavaloko aho.
  '10':
  - type: text
    content: Mihainoa, Jehovah ô, ka mamindrà fo amiko;
  - type: text
    content: Jehovah ô, aoka ho Mpamonjy ahy Hianao.
  '11':
  - type: text
    content: Efa nampody ny fisaonako ho fandihizana Hianao;
  - type: text
    content: Efa nanaisotra ny lamba fisaonako Hianao ka nampisikina ahy fifaliana,
  '12':
  - type: text
    content: Mba hankalazan’ny fanahiko
  - type: note
    content: Heb. voninahitra.
  - type: text
    content: ' Anao ka tsy hangina.'
  - type: text
    content: Jehovah Andriamanitro ô, hidera Anao mandrakizay aho.
  '2':
  - type: text
    content: Jehovah Andriamanitro ô, nitaraina taminao aho,
  - type: text
    content: Dia nahasitrana ahy Hianao.
  '3':
  - type: text
    content: Jehovah ô, efa nampakatra ny fanahiko avy tany amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' Hianao;'
  - type: text
    content: Efa nampody ny aiko Hianao, mba tsy ho isan’izay midina any an-davaka aho.
  '4':
  - type: text
    content: Mankalazà an’i Jehovah, ry olony masina,
  - type: text
    content: Ka miderà ny anarany
  - type: note
    content: Heb. fahatsiarovana.
  - type: text
    content: ' masina.'
  '5':
  - type: text
    content: Fa indray mipì-maso ihany ny fahatezerany;
  - type: text
    content: Nefa mandritra ny andro iainana kosa ny fankasitrahany;
  - type: text
    content: Amin’ny hariva dia misy fitomaniana tonga hivahiny miloaka alina;
  - type: text
    content: Fa nony maraina kosa dia misy fihobiana.
  '6':
  - type: text
    content: 'Ary hoy izaho, raha mbola niadana:'
  - type: note
    content: 'Na: noho ny fiadanako.'
  - type: text
    content: Tsy hangozohozo mandrakizay aho.
  '7':
  - type: text
    content: Jehovah ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro;
  - type: text
    content: Nanafina ny tavanao Hianao, dia ory aho.
  '8':
  - type: text
    content: Hianao no nantsoiko, Jehovah ô;
  - type: text
    content: 'Ary Jehovah no nifonako hoe:'
  '9':
  - type: text
    content: Inona no soa azo amin’ny rako sy ny hidinako any an-davaka?
  - type: text
    content: Hidera Anao va ny vovoka? hanambara ny fahamarinanao va izany?
