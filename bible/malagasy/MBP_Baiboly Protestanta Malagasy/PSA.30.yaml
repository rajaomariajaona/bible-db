document_id: PSA.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fisaorana nataon’izay narary mafy noho ny namonjen’Andriamanitra ny ainy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo. Fihirana tamin’ny nitokanana ny trano. Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HANANDRATRA Anao aho, Jehovah ô; fa nanintona ahy niakatra Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nataonao ho fifalian’ny fahavaloko aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa, Jehovah ô, ka mamindrà fo amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, aoka ho Mpamonjy ahy Hianao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampody ny fisaonako ho fandihizana Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanaisotra ny lamba fisaonako Hianao ka nampisikina ahy fifaliana,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hankalazan’ny fanahiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voninahitra.
      marker-yv: yv-n
    - type: text
      text: ' Anao ka tsy hangina.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitro ô, hidera Anao mandrakizay aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitro ô, nitaraina taminao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nahasitrana ahy Hianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, efa nampakatra ny fanahiko avy tany amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' Hianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampody ny aiko Hianao, mba tsy ho isan’izay midina any an-davaka aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankalazà an’i Jehovah, ry olony masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miderà ny anarany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahatsiarovana.
      marker-yv: yv-n
    - type: text
      text: ' masina.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa indray mipì-maso ihany ny fahatezerany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mandritra ny andro iainana kosa ny fankasitrahany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny hariva dia misy fitomaniana tonga hivahiny miloaka alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nony maraina kosa dia misy fihobiana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hoy izaho, raha mbola niadana:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: noho ny fiadanako.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hangozohozo mandrakizay aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanafina ny tavanao Hianao, dia ory aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no nantsoiko, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary Jehovah no nifonako hoe:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no soa azo amin’ny rako sy ny hidinako any an-davaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao va ny vovoka? hanambara ny fahamarinanao va izany?
