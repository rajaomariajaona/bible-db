document_id: JOB.10
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maharikoriko ahy ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamoaka ny fitarainako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hiteny noho ny fangidian’ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hanao amin’Andriamanitra hoe aho: Aza manameloka ahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ampahalalao izay anton’ny iadianao amiko aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mahafaly Anao va ny hampahory
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanary ny efa nisasaranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamirapiratra amin’ny fisainan’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manana maso nofo va Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mijery tahaka ny fijerin’ny zanak’olombelona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny andron’ny zanak’olombelona va ny andronao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na tahaka ny taonan’ny olombelona ny taonanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: No dia mikaroka izay heloko Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mikatsaka izay fahotako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia fantatrao aza fa tsy mba ratsy fanahy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy mahavonjy amin’ny tànanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tànanao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo levoninao indray aho izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Masìna Hianao, tsarovy fa notefenao toy ny tanimanga aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamerina ahy amin’ny vovoka indray Hianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy naidinao toy ny ronono va aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nampandrinao toy ny ronono-mandry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, notafianao hoditra sy nofo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary norarinao tamin’ny taolana sy ny ozatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aina sy famindrampo no nomenao ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fiahianao no niaro ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saingy izao no nafeninao tao am-ponao,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, fantatro fa tao aminao izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha manota aho, dia mamantatra ahy Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy manafaka ahy amin’ny heloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha meloka aho, dia lozako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia marina aza aho, dia tsy ho sahy miandrandra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria feno henatra sady mahatsiaro fahoriana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiverina indray Hianao, ka ho mahagaga ny famelinao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampitombo ny fahatezeranao amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahavalo mifanontona no mamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka nahoana no namoaka ahy foana avy tany am-bohoka Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary efa toy ny tsy ary aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nentina avy tany an-kibo ho any am-pasana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy vitsy va ny androko? Koa mitsahara Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihataha mba hakako aina kely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dieny tsy mbola lasa tsy hiverina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho any amin’ny tanin’ny aizina sy ny aloky ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho any amin’ny tany maizim-pito,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny an’ny aloky ny fahafatesana sy ny fikorontanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady maizim-pito ny famirapiratana any.
