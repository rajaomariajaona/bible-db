document_id: JOB.10,873
type_code: plt
verses:
  '1':
  - type: text
    content: Maharikoriko ahy ny aiko;
  - type: text
    content: Hamoaka ny fitarainako aho
  - type: text
    content: Sy hiteny noho ny fangidian’ny fanahiko.
  '10':
  - type: text
    content: Tsy naidinao toy ny ronono va aho
  - type: text
    content: Ka nampandrinao toy ny ronono-mandry?
  '11':
  - type: text
    content: Eny, notafianao hoditra sy nofo aho
  - type: text
    content: Ary norarinao tamin’ny taolana sy ny ozatra.
  '12':
  - type: text
    content: Aina sy famindrampo no nomenao ahy;
  - type: text
    content: Ary ny fiahianao no niaro ny aiko.
  '13':
  - type: text
    content: Saingy izao no nafeninao tao am-ponao,–
  - type: text
    content: 'Eny, fantatro fa tao aminao izao:'
  '14':
  - type: text
    content: Raha manota aho, dia mamantatra ahy Hianao
  - type: text
    content: Ka tsy manafaka ahy amin’ny heloko.
  '15':
  - type: text
    content: Raha meloka aho, dia lozako!
  - type: text
    content: Ary na dia marina aza aho, dia tsy ho sahy miandrandra,
  - type: text
    content: Satria feno henatra sady mahatsiaro fahoriana aho.
  '16':
  - type: text
    content: Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Hianao;
  - type: text
    content: Ary hiverina indray Hianao, ka ho mahagaga ny famelinao ahy.
  '17':
  - type: text
    content: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Hianao
  - type: text
    content: Sy hampitombo ny fahatezeranao amiko;
  - type: text
    content: Fahavalo mifanontona no mamely ahy.
  '18':
  - type: text
    content: Ka nahoana no namoaka ahy foana avy tany am-bohoka Hianao?
  - type: text
    content: Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.
  '19':
  - type: text
    content: Ary efa toy ny tsy ary aho.
  - type: text
    content: Ka nentina avy tany an-kibo ho any am-pasana.
  '2':
  - type: text
    content: 'Hanao amin’Andriamanitra hoe aho: Aza manameloka ahy;'
  - type: text
    content: Mba ampahalalao izay anton’ny iadianao amiko aho.
  '20':
  - type: text
    content: Tsy vitsy va ny androko? Koa mitsahara Hianao,
  - type: text
    content: Mihataha mba hakako aina kely,
  '21':
  - type: text
    content: Dieny tsy mbola lasa tsy hiverina aho,
  - type: text
    content: Dia ho any amin’ny tanin’ny aizina sy ny aloky ny fahafatesana,
  '22':
  - type: text
    content: Ho any amin’ny tany maizim-pito,
  - type: text
    content: Dia ny an’ny aloky ny fahafatesana sy ny fikorontanana,
  - type: text
    content: Sady maizim-pito ny famirapiratana any.
  '3':
  - type: text
    content: Mahafaly Anao va ny hampahory
  - type: text
    content: Sy hanary ny efa nisasaranao
  - type: text
    content: Ka hamirapiratra amin’ny fisainan’ny ratsy fanahy?
  '4':
  - type: text
    content: Manana maso nofo va Hianao?
  - type: text
    content: Na mijery tahaka ny fijerin’ny zanak’olombelona?
  '5':
  - type: text
    content: Tahaka ny andron’ny zanak’olombelona va ny andronao?
  - type: text
    content: Na tahaka ny taonan’ny olombelona ny taonanao,
  '6':
  - type: text
    content: No dia mikaroka izay heloko Hianao
  - type: text
    content: Sy mikatsaka izay fahotako,
  '7':
  - type: text
    content: Na dia fantatrao aza fa tsy mba ratsy fanahy aho,
  - type: text
    content: Ary tsy misy mahavonjy amin’ny tànanao?
  '8':
  - type: text
    content: Ny tànanao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao,
  - type: text
    content: Kanjo levoninao indray aho izao.
  '9':
  - type: text
    content: Masìna Hianao, tsarovy fa notefenao toy ny tanimanga aho,
  - type: text
    content: Ka hamerina ahy amin’ny vovoka indray Hianao!
