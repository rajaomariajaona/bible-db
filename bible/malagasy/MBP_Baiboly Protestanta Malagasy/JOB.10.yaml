document_id: JOB.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maharikoriko ahy ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamoaka ny fitarainako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hiteny noho ny fangidian’ny fanahiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy naidinao toy ny ronono va aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampandrinao toy ny ronono-mandry?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, notafianao hoditra sy nofo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary norarinao tamin’ny taolana sy ny ozatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aina sy famindrampo no nomenao ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiahianao no niaro ny aiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy izao no nafeninao tao am-ponao,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, fantatro fa tao aminao izao:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manota aho, dia mamantatra ahy Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy manafaka ahy amin’ny heloko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha meloka aho, dia lozako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia marina aza aho, dia tsy ho sahy miandrandra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria feno henatra sady mahatsiaro fahoriana aho.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiverina indray Hianao, ka ho mahagaga ny famelinao ahy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampitombo ny fahatezeranao amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahavalo mifanontona no mamely ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahoana no namoaka ahy foana avy tany am-bohoka Hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa toy ny tsy ary aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nentina avy tany an-kibo ho any am-pasana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hanao amin’Andriamanitra hoe aho: Aza manameloka ahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ampahalalao izay anton’ny iadianao amiko aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy vitsy va ny androko? Koa mitsahara Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihataha mba hakako aina kely,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieny tsy mbola lasa tsy hiverina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho any amin’ny tanin’ny aizina sy ny aloky ny fahafatesana,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’ny tany maizim-pito,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny an’ny aloky ny fahafatesana sy ny fikorontanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady maizim-pito ny famirapiratana any.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahafaly Anao va ny hampahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanary ny efa nisasaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hamirapiratra amin’ny fisainan’ny ratsy fanahy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana maso nofo va Hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mijery tahaka ny fijerin’ny zanak’olombelona?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny andron’ny zanak’olombelona va ny andronao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na tahaka ny taonan’ny olombelona ny taonanao,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia mikaroka izay heloko Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mikatsaka izay fahotako,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia fantatrao aza fa tsy mba ratsy fanahy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy mahavonjy amin’ny tànanao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànanao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo levoninao indray aho izao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masìna Hianao, tsarovy fa notefenao toy ny tanimanga aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hamerina ahy amin’ny vovoka indray Hianao!
