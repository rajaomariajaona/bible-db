document_id: SNG.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Enga anie ka ho tahaka ny anadahiko, izay ninono an’ineny, hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho nahita anao teny ala-trano aho ka ho nanoroka anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy ho azon’olona notevatevaina aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mànda aho, dia toy ny tilikambo ny nonoko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha eo imasony dia toy ny efa mahita soa aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Solomona nanan-tanimboaloboka tao Bala-hamona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahofany tamin’olona mpiandry voly ny tanimboaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka samy tsy maintsy mitondra sekely volafotsy arivo ho solon’ny vokatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny tanimboaloboko, eny, ilay an’ny tenako, dia eto anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny arivo kosa dia anao ry Solomona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny roan-jato ho an’izay mpiandry voly.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ry mitoetra eny an-tsaha!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te-hihaino ny feonao ireo namako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ampandreneso izany koa aho.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mandosira, ry malalako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hianao mba ho toy ny gazela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ii.7, 17.
      marker-yv: yv-n
    - type: text
      text: ' na ny diera tanora'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ii.7, 17.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tendrombohitry ny zava-manitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia ho entiko ka hampidiriko ho ao an-tranon’ineny hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampianarinao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampisotroiko divay noharoharoan-java-manitra mbamin’ny ranon’ampongabendanitro hianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka hanondana ahy ny tànany ankavia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hanohona ahy ny tànany ankavanana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandehanany ho any amin’ny tany nihavian’ny ampakarina.
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: IZA moa irỳ vehivavy miakatra avy any an-efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitehina amin’ny malalany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo ambanin’ny hazo poma no namohazako anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo no niterahan-dreninao anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, teo no nahararian’ilay niteraka anao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ataovy toy ny fanombohan-kase ao am-ponao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy toy ny fanombohan-kase eo an-tsandrinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahery toy ny fahafatesana ny fitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masiaka tahaka ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ny fahasaro-piaro;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lelafony dia lelafo midedadeda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, lelafon’i Jehovah.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Na dia ny ony maro aza tsy mahavono ny afon’ny fitiavana, ary ny renirano tsy mahapaoka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy olona manome ny fananany rehetra ao an-tranony aza hamidy fitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatao tsinontsinona izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manana zandrivavy tsy mbola misy nono izahay;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: isika.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahoana no hataonay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hataontsika.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny zandrivavinay,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zandrivavintsika.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mby amin’izay andro hangatahan’olona azy ho vady?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha mànda izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanangananay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hananganantsika.
      marker-yv: yv-n
    - type: text
      text: ' tilikambo volafotsy eo an-tampony;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha varavarana kosa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotampenanay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hotampenantsika.
      marker-yv: yv-n
    - type: text
      text: ' hazo fisaka sedera.'
