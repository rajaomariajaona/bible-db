document_id: SNG.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: Enga anie ka ho tahaka ny anadahiko, izay ninono an’ineny, hianao!
  - type: text
    content: Dia ho nahita anao teny ala-trano aho ka ho nanoroka anao.
  - type: text
    content: Eny, tsy ho azon’olona notevatevaina aho.
  '10':
  - type: text
    content: Mànda aho, dia toy ny tilikambo ny nonoko.
  - type: text
    content: Raha eo imasony dia toy ny efa mahita soa aho.
  '11':
  - type: text
    content: Solomona nanan-tanimboaloboka tao Bala-hamona;
  - type: text
    content: Nahofany tamin’olona mpiandry voly ny tanimboaloboka,
  - type: text
    content: Ka samy tsy maintsy mitondra sekely volafotsy arivo ho solon’ny vokatra.
  '12':
  - type: text
    content: Ny tanimboaloboko, eny, ilay an’ny tenako, dia eto anatrehako,
  - type: text
    content: Ny arivo kosa dia anao ry Solomona,
  - type: text
    content: Ary ny roan-jato ho an’izay mpiandry voly.
  '13':
  - type: text
    content: Ry mitoetra eny an-tsaha!
  - type: text
    content: Te-hihaino ny feonao ireo namako;
  - type: text
    content: Mba ampandreneso izany koa aho.
  '14':
  - type: text
    content: Mandosira, ry malalako,
  - type: text
    content: Ary aoka hianao mba ho toy ny gazela
  - type: note
    content: Izahao ii.7, 17.
  - type: text
    content: ' na ny diera tanora'
  - type: note
    content: Izahao ii.7, 17.
  - type: text
    content: Eny an-tendrombohitry ny zava-manitra.
  '2':
  - type: text
    content: Dia ho entiko ka hampidiriko ho ao an-tranon’ineny hianao,
  - type: text
    content: Ary hampianarinao aho;
  - type: text
    content: Hampisotroiko divay noharoharoan-java-manitra mbamin’ny ranon’ampongabendanitro hianao.
  '3':
  - type: text
    content: Aoka hanondana ahy ny tànany ankavia,
  - type: text
    content: Ary aoka hanohona ahy ny tànany ankavanana.
  '4':
  - type: text
    content: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.
  - type: heading
    content: Ny nandehanany ho any amin’ny tany nihavian’ny ampakarina.
  '5':
  - type: text
    content: IZA moa irỳ vehivavy miakatra avy any an-efitra,
  - type: text
    content: Mitehina amin’ny malalany?
  - type: text
    content: Teo ambanin’ny hazo poma no namohazako anao;
  - type: text
    content: Teo no niterahan-dreninao anao,
  - type: text
    content: Eny, teo no nahararian’ilay niteraka anao.
  '6':
  - type: text
    content: Ataovy toy ny fanombohan-kase ao am-ponao aho
  - type: text
    content: Sy toy ny fanombohan-kase eo an-tsandrinao;
  - type: text
    content: Fa mahery toy ny fahafatesana ny fitiavana,
  - type: text
    content: Masiaka tahaka ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny fahasaro-piaro;'
  - type: text
    content: Ny lelafony dia lelafo midedadeda,
  - type: text
    content: Eny, lelafon’i Jehovah.
  '7':
  - type: text
    content: Na dia ny ony maro aza tsy mahavono ny afon’ny fitiavana, ary ny renirano tsy mahapaoka azy;
  - type: text
    content: Na dia misy olona manome ny fananany rehetra ao an-tranony aza hamidy fitiavana,
  - type: text
    content: Dia hatao tsinontsinona izy.
  '8':
  - type: text
    content: Manana zandrivavy tsy mbola misy nono izahay;
  - type: note
    content: 'Na: isika.'
  - type: text
    content: Ahoana no hataonay
  - type: note
    content: 'Na: hataontsika.'
  - type: text
    content: ' amin’ny zandrivavinay,'
  - type: note
    content: 'Na: zandrivavintsika.'
  - type: text
    content: Raha mby amin’izay andro hangatahan’olona azy ho vady?
  '9':
  - type: text
    content: Raha mànda izy,
  - type: text
    content: Dia hanangananay
  - type: note
    content: 'Na: hananganantsika.'
  - type: text
    content: ' tilikambo volafotsy eo an-tampony;'
  - type: text
    content: Fa raha varavarana kosa izy,
  - type: text
    content: Dia hotampenanay
  - type: note
    content: 'Na: hotampenantsika.'
  - type: text
    content: ' hazo fisaka sedera.'
