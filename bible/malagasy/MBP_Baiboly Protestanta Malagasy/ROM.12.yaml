document_id: ROM.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fitondrantena mahamendrika ny Kristiana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: KOA amin’izany mangataka aminareo aho, ry rahalahy, noho ny famindrampon’Andriamanitra, mba hatolotrareo ny tenanareo ho fanatitra velona, masina, sitrak’Andriamanitra, dia fanompoam-panahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanompoam-pivavahana.
      marker-yv: yv-n
    - type: text
      text: ' mety hataonareo izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifankatiava araka ny fifankatiavan’ny mpirahalahy; mitariha làlana amin’ny fifanomezam-boninahitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mazotoa, fa aza malaina, ary aoka hafana fo amin’ny fanompoana ny Tompo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifalia amin’ny fanantenana; miareta amin’ny fahoriana; mahareta amin’ny fivavahana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miantrà ny olona masina araka izay ilainy; mazotoa mampiantrano vahiny.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaora izay manenjika anareo; misaora, fa aza manozona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miaraha mifaly amin’izay mifaly, ary miaraha mitomany amin’izay mitomany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miraisa saina. Aza mihevitra izay hiavonavonana, fa aoka mba ho zatra amin’ny fietrena hianareo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manetre tena amin ny’ malahelo.
      marker-yv: yv-n
    - type: text
      text: ' Aza manao ny tenanareo ho hendry.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mamaly ratsy na amin’iza na amin’iza. Miomàna hanao izay mahamendrika eo imason’ny olona rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha azo atao, dia ataovy izay hihavananareo amin’ny olona rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry malala, aza mamaly ratsy, fa omeo làlana ny fahatezerana; fa voasoratra hoe: ,,Ahy ny famaliana; Izaho no hamaly, hoy Jehovah’’ (Deo. 32.35). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza manaraka ny fanaon’izao tontolo izao; fa miovà amin’ny fanavaozana ny saina, hamantaranareo ny sitrapon’Andriamanitra, dia izay tsara sady ankasitrahana no marina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanteraka.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha noana ny fahavalonao, omeo hanina izy; raha mangetaheta izy, omeo hosotroiny; fa raha manao izany hianao, dia hanambatra vainafo ho eo an-dohany (Oha. 25.21, 22). '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mety ho resin’ny ratsy hianao, fa reseo amin’ny soa ny ratsy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa noho ny fahasoavana nomena ahy dia izao no lazaiko amin’ny olona rehetra izay eo aminareo: Aza miavonavon-kevitra ka mihevitra mihoatra noho izay tokony hoheverina; fa mihevera izay onony araka ny ohatry ny finoana izay nozarain’Andriamanitra ho anareo avy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa toy ny ananantsika zavatra maro momba ny tena iray, nefa tsy mitovy asa izay rehetra momba ny tena, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia toy izany koa isika, na dia maro aza, dia tena iray ihany ao amin’i Kristy, ary samy miara-momba ny tena isika rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria samy manana fanomezam-pahasoavana samy hafa isika, araka ny fahasoavana izay nomena antsika: raha faminaniana, dia aoka hatao araka ny ohatry ny finoana; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha fanompoana amin’ny fiangonana, dia aoka ho amin’ny fanompoana; raha mampianatra, dia aoka ho amin’ny fampianarana; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: raha mananatra, dia aoka ho amin’ny fananarana; izay manome, dia aoka ho amin’ny fahatsoram-po; izay manapaka, dia aoka ho amin’ny fahazotoana; izay mamindra fo, dia aoka ho amin’ny fifaliana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny fitiavana ho amin’ny tsi-fihatsarambelatsihy; mankahalà ny ratsy; mifikira amin’ny tsara. '
