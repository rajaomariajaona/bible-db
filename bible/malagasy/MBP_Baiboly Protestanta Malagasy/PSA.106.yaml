document_id: PSA.106,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivadibadihan’ny Isiraely ampitahaina amin’ny fahamarinan’Andriamanitra.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà an’i Jehovah, fa tsara Izy,
  - type: text
    content: Fa mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Namonjy azy tamin’ny tànan’ny mpandrafy Izy
  - type: text
    content: Ary nanavotra azy tamin’ny tànan’ny fahavalo.
  '11':
  - type: text
    content: Dia nosaronan’ny rano kosa ny rafiny,
  - type: text
    content: Ka tsy nisy niangana na dia iray akory aza.
  '12':
  - type: text
    content: Dia nino ny teniny izy
  - type: text
    content: Ka nihira ny fiderana Azy.
  '13':
  - type: text
    content: Nalaky nanadino ny asany izy
  - type: text
    content: Ka tsy niandry ny saina hatolony,
  '14':
  - type: text
    content: Fa fatra-pila izy tany an-efitra,
  - type: text
    content: Sady naka fanahy an’Andriamanitra tany an-tany foana.
  '15':
  - type: text
    content: Dia nomeny azy izay nilainy,
  - type: text
    content: Kanefa nampahahiaziny kosa izy.
  - type: note
    content: 'Na: ny fanahiny.'
  '16':
  - type: text
    content: Dia nialona an’i Mosesy tany an-toby izy ireo
  - type: text
    content: Sady nialona an’i Arona, olo-masin’i Jehovah.
  '17':
  - type: text
    content: Nisokatra ny tany, dia nitelina an’i Datana
  - type: text
    content: Ka nanarona ny antokon’
  - type: note
    content: Heb. ny fiangonany.
  - type: text
    content: ' i Abìrama.'
  '18':
  - type: text
    content: Dia nisy afo nirehitra tamin’ny antokony;
  - type: note
    content: Heb. ny fiangonany.
  - type: text
    content: Lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: text
    content: Nanao ombilahy kely tany Horeba izy
  - type: text
    content: Ka niankohoka teo anoloan’ny sarin-javatra an-idina.
  '2':
  - type: text
    content: Iza no mahalaza ny asa lehibe ataon’i Jehovah,
  - type: text
    content: Na mahatonona ny fiderana Azy rehetra?
  '20':
  - type: text
    content: Ary ny voninahiny dia natakalony
  - type: text
    content: Sarin’ny omby homana ahitra.
  '21':
  - type: text
    content: Nohadinoiny Andriamanitra, Mpamonjy azy,
  - type: text
    content: Izay efa nanao zava-dehibe tany Egypta,
  '22':
  - type: text
    content: Dia fahagagana tany amin’ny tanin’i Hama
  - type: text
    content: Sy zava-mahatahotra teo amin’ny Ranomasina Mena.
  '23':
  - type: text
    content: Ary nikasa
  - type: note
    content: Heb. nilaza.
  - type: text
    content: ' handringana azy Izy,'
  - type: text
    content: Raha tsy Mosesy voafidiny
  - type: text
    content: No nandroso hijoro tamin’ny banga teo anatrehany
  - type: text
    content: Hampiala ny fahatezerany mba tsy handringanany azy.
  '24':
  - type: text
    content: Ary nanamavo ny tany mahafinaritra ireo
  - type: text
    content: Sady tsy mba nino ny teniny,
  '25':
  - type: text
    content: Fa nimonomonona tany an-dainy
  - type: text
    content: Ka tsy nihaino ny feon’i Jehovah.
  '26':
  - type: text
    content: Dia nanandratra ny tànany taminy Izy,
  - type: text
    content: Fa hampiampatrampatra azy any an-efitra.
  '27':
  - type: text
    content: Ary ny taranany kosa any amin’ny jentilisa,
  - type: text
    content: Ary hampihahakahaka azy any amin’ny tany maro Izy.
  '28':
  - type: text
    content: Nikambana tamin’i Bala-peora ireo
  - type: text
    content: Ka nihinana ny fanatitra ho an’ny maty,
  '29':
  - type: text
    content: Dia nampahatezitra an’i Jehovah tamin’ny nataony,
  - type: text
    content: Ka dia namely azy tampoka ny areti-mandringana.
  '3':
  - type: text
    content: Sambatra izay mitandrina ny mety
  - type: text
    content: Ka manao ny marina mandrakariva.
  '30':
  - type: text
    content: Fa nitsangana nandroso Finehasa ka nanao fitsarana;
  - type: text
    content: Dia nitsahatra ny areti-mandringana.
  '31':
  - type: text
    content: Ary nisaina ho fahamarinany izany
  - type: text
    content: Hatramin’ny taranaka fara mandimby mandrakizay.
  '32':
  - type: text
    content: Nampahatezitra an’i Jehovah teo anilan’ny ranon’i Meriba ireo,
  - type: text
    content: Ka nisy nanjo an’i Mosesy noho ny nataon’ireo;
  '33':
  - type: text
    content: Fa niodina tamin’ny Fanahin’i Jehovah ireo,
  - type: text
    content: Ka dia nihoa-bava Mosesy.
  '34':
  - type: text
    content: Tsy naringany ny firenena
  - type: text
    content: Izay nasain’i Jehovah naringany;
  '35':
  - type: text
    content: Fa nifangaro tamin’ny jentilisa izy
  - type: text
    content: Ka nianatra ny fanaony,
  '36':
  - type: text
    content: Dia nanompo ny sampiny izy,
  - type: text
    content: Ka dia nody fandrika ho azy izany.
  '37':
  - type: text
    content: Namono ny zanani-lahy sy ny zanani-vavy ho fanatitra ho an’ny demonia
  - type: note
    content: Heb. ireo tompo.
  - type: text
    content: ' ireo;'
  '38':
  - type: text
    content: Eny, nandatsaka ra marina izy,
  - type: text
    content: Dia ny ran’ny zanani-lahy sy ny zanani-vavy,
  - type: text
    content: Izay novonoiny ho fanatitra ho an’ny sampin’i Kanana;
  - type: text
    content: Ka dia nametaveta ny tany tamin’ny ra izy.
  '39':
  - type: text
    content: Ary naloto tamin’ny asany izy
  - type: text
    content: Ary nahatonga azy ho mijangajanga ny nataony.
  '4':
  - type: text
    content: Jehovah ô, tsarovy aho araka ny fankasitrahanao ny olonao;
  - type: text
    content: Vangio amin’ny famonjenao aho,
  '40':
  - type: text
    content: Dia nirehitra tamin’ny olony ny fahatezeran’i Jehovah,
  - type: text
    content: Ka nataony ho zava-betaveta ny lovany.
  '41':
  - type: text
    content: Dia nanolotra azy teo an-tànan’ny jentilisa Izy,
  - type: text
    content: Ka izay nankahala azy no nanapaka azy.
  '42':
  - type: text
    content: Ary nampahory azy ny fahavalony,
  - type: text
    content: Ka naetry tambanin’ny tànany izy.
  '43':
  - type: text
    content: Matetika Izy no nahafaka azy;
  - type: text
    content: Fa ireo kosa niodina taminy ihany araka ny fisainany
  - type: text
    content: Ka nihalevona noho ny helony.
  '44':
  - type: text
    content: Kanefa nijery ny fahoriany ihany Izy,
  - type: text
    content: Raha nandre ny fitarainany;
  '45':
  - type: text
    content: Dia nahatsiaro ny fanekeny Izy
  - type: text
    content: Ka nanenina araka ny haben’ny famindrampony.
  '46':
  - type: text
    content: Dia nataony nahita famindrampo ireny
  - type: text
    content: Tamin’izay rehetra namabo azy.
  '47':
  - type: text
    content: Vonjeo izahay, ry Jehovah Andriamanitray ô,
  - type: text
    content: Ka angony avy amin’ny jentilisa,
  - type: text
    content: Mba hisaoranay ny anaranao masina
  - type: text
    content: Sy hifalianay amin’ny fiderana Anao.
  '48':
  - type: text
    content: Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin’ny taloha indrindra ka mandrakizay;
  - type: text
    content: 'Ary aoka ny olona rehetra hanao hoe: Amena!'
  - type: text
    content: Haleloia.
  '5':
  - type: text
    content: Hahitako ny soa azon’ny voafidinao,
  - type: text
    content: Hifaliako amin’ny fifalian’ny firenenao,
  - type: text
    content: Hiravoravoako miaraka amin’ny lovanao.
  '6':
  - type: text
    content: Efa nanota izahay mbamin’ny razanay,
  - type: text
    content: Efa nanao izay meloka sy ratsy izahay.
  '7':
  - type: text
    content: Ny razanay tany Egypta tsy mba nandinika ny fahagagana nataonao;
  - type: text
    content: Tsy mba nahatsiaro ny habetsahan’ny famindramponao ireny,
  - type: text
    content: Fa niodina teo amoron-dranomasina,
  - type: text
    content: Dia teo amoron’ny Ranomasina Mena.
  '8':
  - type: text
    content: Kanefa namonjy azy ihany Izy noho ny anarany,
  - type: text
    content: Mba hampahafantarany ny asany lehibe.
  '9':
  - type: text
    content: Dia noteneniny mafy ny Ranomasina Mena, ka tonga maina iny;
  - type: text
    content: Ary nitondra azy nita ny rano lalina tahaka ny efitra Izy.
