document_id: PSA.106,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fivadibadihan’ny Isiraely ampitahaina amin’ny fahamarinan’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HALELOIA.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’i Jehovah, fa tsara Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namonjy azy tamin’ny tànan’ny mpandrafy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanavotra azy tamin’ny tànan’ny fahavalo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nosaronan’ny rano kosa ny rafiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nisy niangana na dia iray akory aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nino ny teniny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nihira ny fiderana Azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nalaky nanadino ny asany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy niandry ny saina hatolony,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fatra-pila izy tany an-efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady naka fanahy an’Andriamanitra tany an-tany foana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nomeny azy izay nilainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nampahahiaziny kosa izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fanahiny.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nialona an’i Mosesy tany an-toby izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nialona an’i Arona, olo-masin’i Jehovah.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisokatra ny tany, dia nitelina an’i Datana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanarona ny antokon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fiangonany.
      marker-yv: yv-n
    - type: text
      text: ' i Abìrama.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nisy afo nirehitra tamin’ny antokony;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fiangonany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao ombilahy kely tany Horeba izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka niankohoka teo anoloan’ny sarin-javatra an-idina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahalaza ny asa lehibe ataon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahatonona ny fiderana Azy rehetra?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voninahiny dia natakalony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sarin’ny omby homana ahitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nohadinoiny Andriamanitra, Mpamonjy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa nanao zava-dehibe tany Egypta,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fahagagana tany amin’ny tanin’i Hama
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy zava-mahatahotra teo amin’ny Ranomasina Mena.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nikasa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nilaza.
      marker-yv: yv-n
    - type: text
      text: ' handringana azy Izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy Mosesy voafidiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nandroso hijoro tamin’ny banga teo anatrehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampiala ny fahatezerany mba tsy handringanany azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanamavo ny tany mahafinaritra ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy mba nino ny teniny,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nimonomonona tany an-dainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nihaino ny feon’i Jehovah.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nanandratra ny tànany taminy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hampiampatrampatra azy any an-efitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany kosa any amin’ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampihahakahaka azy any amin’ny tany maro Izy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nikambana tamin’i Bala-peora ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nihinana ny fanatitra ho an’ny maty,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampahatezitra an’i Jehovah tamin’ny nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia namely azy tampoka ny areti-mandringana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay mitandrina ny mety
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manao ny marina mandrakariva.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nitsangana nandroso Finehasa ka nanao fitsarana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nitsahatra ny areti-mandringana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisaina ho fahamarinany izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny taranaka fara mandimby mandrakizay.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahatezitra an’i Jehovah teo anilan’ny ranon’i Meriba ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nisy nanjo an’i Mosesy noho ny nataon’ireo;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niodina tamin’ny Fanahin’i Jehovah ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nihoa-bava Mosesy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy naringany ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nasain’i Jehovah naringany;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nifangaro tamin’ny jentilisa izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nianatra ny fanaony,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nanompo ny sampiny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nody fandrika ho azy izany.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namono ny zanani-lahy sy ny zanani-vavy ho fanatitra ho an’ny demonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo tompo.
      marker-yv: yv-n
    - type: text
      text: ' ireo;'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nandatsaka ra marina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny ran’ny zanani-lahy sy ny zanani-vavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay novonoiny ho fanatitra ho an’ny sampin’i Kanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nametaveta ny tany tamin’ny ra izy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary naloto tamin’ny asany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahatonga azy ho mijangajanga ny nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, tsarovy aho araka ny fankasitrahanao ny olonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vangio amin’ny famonjenao aho,
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nirehitra tamin’ny olony ny fahatezeran’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nataony ho zava-betaveta ny lovany.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nanolotra azy teo an-tànan’ny jentilisa Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay nankahala azy no nanapaka azy.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nampahory azy ny fahavalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka naetry tambanin’ny tànany izy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matetika Izy no nahafaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ireo kosa niodina taminy ihany araka ny fisainany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nihalevona noho ny helony.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nijery ny fahoriany ihany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nandre ny fitarainany;
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nahatsiaro ny fanekeny Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanenina araka ny haben’ny famindrampony.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nataony nahita famindrampo ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izay rehetra namabo azy.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo izahay, ry Jehovah Andriamanitray ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka angony avy amin’ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hisaoranay ny anaranao masina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hifalianay amin’ny fiderana Anao.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin’ny taloha indrindra ka mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka ny olona rehetra hanao hoe: Amena!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahitako ny soa azon’ny voafidinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifaliako amin’ny fifalian’ny firenenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiravoravoako miaraka amin’ny lovanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanota izahay mbamin’ny razanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanao izay meloka sy ratsy izahay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny razanay tany Egypta tsy mba nandinika ny fahagagana nataonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba nahatsiaro ny habetsahan’ny famindramponao ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niodina teo amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia teo amoron’ny Ranomasina Mena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa namonjy azy ihany Izy noho ny anarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampahafantarany ny asany lehibe.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noteneniny mafy ny Ranomasina Mena, ka tonga maina iny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitondra azy nita ny rano lalina tahaka ny efitra Izy.
