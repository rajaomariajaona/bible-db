document_id: GEN.32,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifoha maraina koa Labana, dia nanoroka ny zanani-lahy sy ny zanani-vavy ka nitso-drano azy; dia lasa nandeha Labana nody any amin’ny fonenany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba: E Andriamanitr’i Abrahama raiko, sady Andriamanitr’Isaka raiko, dia Jehovah Izay efa nanao tamiko hoe: Modia any amin’ny taninao sy any amin’ny havanao dia hanao soa aminao Aho; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy mendrika ho nahazo na kely akory aza aho tamin’ny famindrampo rehetra sy ny fahamarinana rehetra, izay nataonao tamiko mpanomponao; fa tsy nitondra na inona na inona afa-tsy ny tehiko ihany aho fony nita ity Jordana ity; nefa ankehitriny efa tonga toby roa aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O vonjeo aho amin’ny tànan’ny rahalahiko, dia amin’ny tànan’i Esao; fa matahotra azy aho, fandrao avy mamely ahy mbamin’ny vadiko aman-janako izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao efa nanao hoe: Hanisy soa anao tokoa Aho, ka hataoko maro ny taranakao ho tahaka ny fasika any an-drano-masina, izay tsy azo isaina noho ny hamaroany.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitoetra teo izy tamin’iny alina iny; ary naka tamin’izay teo an-tànany izy mba hampanaterina ho an’i Esao rahalahiny, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia osivavy roan-jato sy osilahy roa-polo, ondrivavy roan-jato sy ondrilahy roa-polo '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rameva telo-polo ampianahany, vantotr’ombivavy efa-polo sy vantotr’ombilahy folo, borikivavy roa-polo ary zana-boriky folo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolony teo an-tànan’ny mpanompony ireny, mitokantokana isan-toko; ary hoy izy tamin’ny mpanompony: Mandehana eo alohako, ary asio elanelany eo amin’ny isan-toko.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanome teny ny voalohany izy ka nanao hoe: Raha mifanena aminao Esao rahalahiko ka manontany anao hoe: An’iza hianao? ary hankaiza moa? ary an’iza ireo alohanao? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia lazaonao hoe: An’i Jakoba mpanomponao ireo, dia zavatra nampanaterina ho an’itompokolahy Esao; ary indro koa izy ao aorianay ao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba nizotra tamin’ny làlan-kalehany, dia nisy anjelin’Andriamanitra nitsena azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanome teny ny faharoa sy ny fahatelo koa izy, ary izay rehetra nandeha nanaraka ny isan-toko, ka nanao hoe: Araka izany teny izany no lazaonareo amin’i Esao, raha hitanareo izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazao hoe koa: Indro, Jakoba mpanomponao ao aorianay ao. Fa hoy izy: Hampionona ny hatezerany aho amin’ireo zavatra nampialohaiko ireo, ary rehefa afaka izany, dia vao hahita ny tavany aho; angamba hahazo fitia aminy aho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia lasa nialoha azy ireny zavatra nampanateriny ireny; fa izy mbola nitoetra teo amin’ny toby ihany tamin’iny alina iny.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana tamin’iny alina iny ihany izy ka nitondra ny vadiny roa vavy sy ny ankizivaviny roa ary ny zanani-lahy iraika ambin’ny folo, dia nita tamin’ny fitana tao Jaboka izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary naka azy ireo izy, dia nampita azy tamin’ny renirano, ary nampita ny fananany koa izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia Jakoba irery no sisa nitoetra teo; ary nisy lehilahy anankiray nitolona taminy ambara-pahazavaratsin’ny andro. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitany fa tsy naharesy azy Izy, dia notendreny ny foto-peny; ka dia nivika ny foto-pen’i Jakoba, raha mbola nitolona taminy Izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Avelao Aho handeha, fa efa mazavaratsy ny andro. Fa hoy kosa Jakoba: Tsy havelako handeha Hianao, raha tsy tahinao aho.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Iza moa no anaranao? dia hoy izy: Jakoba. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray Izy: Tsy hatao hoe Jakoba intsony ny anaranao, fa Isiraely;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isiraely = Mpitolona amin’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' satria efa nitolona tamin’Andriamanitra sy tamin’ny olona hianao ka nahery.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba, raha nahita ireo: Tobin’Andriamanitra ity; ary ny anaran’izany tany izany nataony hoe Mahanaima.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mahanaima-Toby roa.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nihaonan’i Jakoba sy Esao.
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany Jakoba ka nanao hoe: Masìna Hianao, lazao kely izay anaranao. Ary hoy Izy: Ahoana no anontanianao ny anarako? Dia nitahy azy teo Izy.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran’izany tany izany dia nataon’i Jakoba hoe Peniela;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peniela = Tavan’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' fa, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy izy
    - type: text
      text: ', efa nahita an’Andriamanitra nifanatrika tamiko aho, nefa voavonjy ny aiko.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niposaka taminy ny masoandro, raha niala teo Peniela izy, ary nitolitsika izy noho ny feny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no tsy ihinanan’ny Zanak’Isiraely ny ozatry ny atodiakanga mandraka androany; satria nanendry ny foto-pen’i Jakoba teo amin’ny ozatry ny atodiakanga Izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nandefa iraka Jakoba hialoha azy ho any amin’i Esao rahalahiny, ho any Seïra, tanin’i Edoma. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanome teny azy izy ka nanao hoe: Izao no holazainareo amin’i Esao tompoko: Izao no tenin’i Jakoba mpanomponao: Efa nivahiny tany amin’i Labana aho ka nitoetra tany mandraka ankehitriny; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary manana omby sy boriky sy ondry aman-osy ary andevolahy aho; dia efa mba naniraka hanambara aminao tompokolahy ihany aho mba hahitako fitia eo imasonao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niverina tany amin’i Jakoba ny iraka ka nanao hoe: Tafahaona tamin’i Esao rahalahinao izahay, ary izy koa dia avy hitsena anao mitondra olona efa-jato lahy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natahotra indrindra Jakoba ka poritra dia poritra; dia nozarainy roa toko ny olona izay nomba azy mbamin’ny ondry aman-osy sy ny omby ary ny rameva; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hoy izy: Raha tafahaona amin’ny antokony anankiray Esao ka mamely azy, dia handositra kosa ny antokony anankiray.'
