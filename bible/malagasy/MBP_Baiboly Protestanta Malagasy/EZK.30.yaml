segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny andro hitsarana an’i Egypta.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, maminania, ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà hianareo! Indrisy ny andro!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa efa antomotra ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, antomotra ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia andro mandrahona sy fotoana hamaliana ny jentilisa izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hisy sabatra tonga any Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fangorohoroana fatratra any Etiopia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miampatrampatra any Egypta ny voatrabaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lasa ny hareny, sady ho rava ny fanorenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Etiopia sy Libya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pota.
    marker-yv: yv-n
  - type: text
    text: ' sy Lydia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Loda.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny olona samy hafa firenena rehetra sy ny Kobiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zanaky ny tany vita fanekena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiaraka ho lavon-tsabatra aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavo koa izay manohana an’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hietry ny fiavonavonan’ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatrany Migdola ka hatrany Syena
- type: usfm
  marker: q1
  children:
  - type: text
    text: No ho lavon-tsabatra izy, hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho rava dia ho rava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rava ao amin’ny tany rava.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tanànany ho lao dia ho lao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lao ao amin’ny tanàna lao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mampirehitra afo any Egypta Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka torotoro izay rehetra manampy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izany andro izany dia hisy iraka mivoaka avy amiko handeha an-tsambo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampahatahotra ny Etiopiana izay mitoetra tsy manahinahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hangorohoro tahaka ny tamin’ny andro namelezana an’i Egypta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa, indro, avy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànan’i Nebokadnezara, mpanjakan’i Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No ho entiko mahafoana ny horakorak’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandevona ny hareny.
    marker-yv: yv-n
  - type: text
    text: ' i Egypta.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No ho entina handrava ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanatsoaka ny sabany hamely an’i Egypta ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho feno faty ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hahatankina an’i Neily
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hivarotra ny tany ho eo an-tànan’ny ratsy fanahy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànan’ny fahavalo no ho entiko mandrava ny tany mbamin’izay rehetra ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Jehovah no niteny izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horavako koa ny sampy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatsahatro ny andriamani-tsi-izy ao Memifisa;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nofa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy mpanjaka intsony amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Handrava an’i Patrosa Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampirehitra afo any Zoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotanterahiko ny fitsarana an’i No;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hampidina ny fahatezerako amin’i Sina, fiarovana mafy any Egypta, Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofongorako ny vahoaka be any No.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hampirehitra afo any Egypta Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiolanolana fatratra Sina noho ny faharariany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho banga No,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Memifisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nofa.
    marker-yv: yv-n
  - type: text
    text: ' dia hasian’ny fahavalo antoandro.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny zatovon’i Avena sy Pi-beseta ho lavon-tsabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho lasan-ko babo ny ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Any Tapanesa dia ho maizina ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tapahiko any ny ziogan’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitsahatra ny fiavonavonan’ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voasaron’ny rahona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho lasan-ko babo ny zanani-vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy izany no hanatanterahako ny fitsarana an’i Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hahafoanan’i Nebokadnezara ny herin’i Farao.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY tamin’ny andro fahafito tamin’ny volana voalohany tamin’ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ry zanak’olona, ny sandrin’i Farao, mpanjakan’i Egypta, dia efa notorotoroiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary he! tsy noharatoina mba ho sitrana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nofehezina lamba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanatanjaka azy hahatan-tsabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa izany no nanaovan’i Jehovah Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, efa hamely an’i Farao, mpanjakan’i Egypta, Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hotorotoroiko ny sandriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny mbola matanjaka, na ny efa torotoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampilatsaka ny sabatra eny an-tànany Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia haeliko ho any amin’ny firenena samy hafa ny Egyptiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hahahako any amin’ny tany samy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa hampahatanjahiko kosa ny sandrin’ny mpanjakan’i Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hataoko eny an-tànany ny sabatro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hotorotoroiko ny sandrin’i Farao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitrona eo anatrehany toy ny fitronan’ny voatrabaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny, hampahatanjahiko ny sandrin’ny mpanjakan’i Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hiraviravy ny sandrin’i Farao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hataoko eny an-tànan’ny mpanjakan’i Babylona ny sabatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka haingainy hamelezana ny tany Egypta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia haeliko ho any amin’ny firenena samy hafa ny Egyptiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hahahako any amin’ny tany samy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah.
