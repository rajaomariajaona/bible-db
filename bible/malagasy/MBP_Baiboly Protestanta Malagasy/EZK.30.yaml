document_id: EZK.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny andro hitsarana an’i Egypta.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Ny tànan’i Nebokadnezara, mpanjakan’i Babylona,
  - type: text
    content: No ho entiko mahafoana ny horakorak’
  - type: note
    content: 'Na: mandevona ny hareny.'
  - type: text
    content: ' i Egypta.'
  '11':
  - type: text
    content: Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin’ny firenena,
  - type: text
    content: No ho entina handrava ny tany;
  - type: text
    content: Ary hanatsoaka ny sabany hamely an’i Egypta ireny,
  - type: text
    content: Ka ho feno faty ny tany.
  '12':
  - type: text
    content: Hahatankina an’i Neily
  - type: text
    content: Sy hivarotra ny tany ho eo an-tànan’ny ratsy fanahy Aho,
  - type: text
    content: Ary ny tànan’ny fahavalo no ho entiko mandrava ny tany mbamin’izay rehetra ao aminy;
  - type: text
    content: Izaho Jehovah no niteny izany.
  '13':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Horavako koa ny sampy,
  - type: text
    content: Ary hatsahatro ny andriamani-tsi-izy ao Memifisa;
  - type: note
    content: Heb. Nofa.
  - type: text
    content: Ary tsy hisy mpanjaka intsony amin’ny tany Egypta;
  '14':
  - type: text
    content: Handrava an’i Patrosa Aho
  - type: text
    content: Sy hampirehitra afo any Zoana,
  - type: text
    content: Ary hotanterahiko ny fitsarana an’i No;
  '15':
  - type: text
    content: Hampidina ny fahatezerako amin’i Sina, fiarovana mafy any Egypta, Aho,
  - type: text
    content: Ary hofongorako ny vahoaka be any No.
  '16':
  - type: text
    content: Hampirehitra afo any Egypta Aho;
  - type: text
    content: Hiolanolana fatratra Sina noho ny faharariany;
  - type: text
    content: Ho banga No,
  - type: text
    content: Ary Memifisa
  - type: note
    content: Heb. Nofa.
  - type: text
    content: ' dia hasian’ny fahavalo antoandro.'
  '17':
  - type: text
    content: Ny zatovon’i Avena sy Pi-beseta ho lavon-tsabatra,
  - type: text
    content: Sady ho lasan-ko babo ny ao.
  '18':
  - type: text
    content: Any Tapanesa dia ho maizina ny andro,
  - type: text
    content: Raha tapahiko any ny ziogan’i Egypta,
  - type: text
    content: Ary hitsahatra ny fiavonavonan’ny heriny;
  - type: text
    content: Ho voasaron’ny rahona izy,
  - type: text
    content: Sady ho lasan-ko babo ny zanani-vavy.
  '19':
  - type: text
    content: Toy izany no hanatanterahako ny fitsarana an’i Egypta;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  - type: heading
    content: Ny hahafoanan’i Nebokadnezara ny herin’i Farao.
  '2':
  - type: text
    content: 'Ry zanak’olona, maminania, ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Midradradradrà hianareo! Indrisy ny andro!
  '20':
  - type: text
    content: 'ARY tamin’ny andro fahafito tamin’ny volana voalohany tamin’ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '21':
  - type: text
    content: Ry zanak’olona, ny sandrin’i Farao, mpanjakan’i Egypta, dia efa notorotoroiko,
  - type: text
    content: Ary he! tsy noharatoina mba ho sitrana izy,
  - type: text
    content: Na nofehezina lamba,
  - type: text
    content: Mba hanatanjaka azy hahatan-tsabatra.
  '22':
  - type: text
    content: 'Koa izany no nanaovan’i Jehovah Tompo hoe:'
  - type: text
    content: Indro, efa hamely an’i Farao, mpanjakan’i Egypta, Aho,
  - type: text
    content: Ka hotorotoroiko ny sandriny,
  - type: text
    content: Na ny mbola matanjaka, na ny efa torotoro;
  - type: text
    content: Ary hampilatsaka ny sabatra eny an-tànany Aho.
  '23':
  - type: text
    content: Dia haeliko ho any amin’ny firenena samy hafa ny Egyptiana,
  - type: text
    content: Ka hahahako any amin’ny tany samy hafa.
  '24':
  - type: text
    content: Fa hampahatanjahiko kosa ny sandrin’ny mpanjakan’i Babylona,
  - type: text
    content: Ka hataoko eny an-tànany ny sabatro;
  - type: text
    content: Fa hotorotoroiko ny sandrin’i Farao,
  - type: text
    content: Dia hitrona eo anatrehany toy ny fitronan’ny voatrabaka izy.
  '25':
  - type: text
    content: Eny, hampahatanjahiko ny sandrin’ny mpanjakan’i Babylona,
  - type: text
    content: 'Dia hiraviravy ny sandrin’i Farao:'
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah,
  - type: text
    content: Raha hataoko eny an-tànan’ny mpanjakan’i Babylona ny sabatro,
  - type: text
    content: Ka haingainy hamelezana ny tany Egypta.
  '26':
  - type: text
    content: Dia haeliko ho any amin’ny firenena samy hafa ny Egyptiana
  - type: text
    content: Ka hahahako any amin’ny tany samy hafa;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  '3':
  - type: text
    content: Fa efa antomotra ny andro,
  - type: text
    content: Eny, antomotra ny andron’i Jehovah,
  - type: text
    content: Dia andro mandrahona sy fotoana hamaliana ny jentilisa izany.
  '4':
  - type: text
    content: Ary hisy sabatra tonga any Egypta
  - type: text
    content: Sy fangorohoroana fatratra any Etiopia,
  - type: text
    content: Raha miampatrampatra any Egypta ny voatrabaka;
  - type: text
    content: Ary ho lasa ny hareny, sady ho rava ny fanorenany.
  '5':
  - type: text
    content: Etiopia sy Libya
  - type: note
    content: Heb. Pota.
  - type: text
    content: ' sy Lydia'
  - type: note
    content: Heb. Loda.
  - type: text
    content: Sy ny olona samy hafa firenena rehetra sy ny Kobiana
  - type: text
    content: Sy ny zanaky ny tany vita fanekena
  - type: text
    content: Dia hiaraka ho lavon-tsabatra aminy.
  '6':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Ho lavo koa izay manohana an’i Egypta,
  - type: text
    content: Ary hietry ny fiavonavonan’ny heriny;
  - type: text
    content: Hatrany Migdola ka hatrany Syena
  - type: text
    content: No ho lavon-tsabatra izy, hoy Jehovah Tompo.
  '7':
  - type: text
    content: Ho rava dia ho rava
  - type: note
    content: Heb. rava ao amin’ny tany rava.
  - type: text
    content: ' izy,'
  - type: text
    content: Ary ny tanànany ho lao dia ho lao.
  - type: note
    content: Heb. lao ao amin’ny tanàna lao.
  '8':
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah,
  - type: text
    content: Raha mampirehitra afo any Egypta Aho,
  - type: text
    content: Ka torotoro izay rehetra manampy azy.
  '9':
  - type: text
    content: Amin’izany andro izany dia hisy iraka mivoaka avy amiko handeha an-tsambo
  - type: text
    content: Hampahatahotra ny Etiopiana izay mitoetra tsy manahinahy,
  - type: text
    content: Ka dia hangorohoro tahaka ny tamin’ny andro namelezana an’i Egypta izy;
  - type: text
    content: Fa, indro, avy izany.
