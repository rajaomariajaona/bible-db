document_id: ROM.15,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa isika izay matanjaka dia tokony hitondra ny fahalemen’ny malemy ka tsy hitady izay hahafaly ny tenantsika ihany. '
  '10':
  - type: text
    content: 'Ary hoy koa Izy:'
  - type: text
    content: ',,Miravoravoa, ry jentilisa, mbamin’ny olony’’ (Deo. 32.43).'
  '11':
  - type: text
    content: 'Ary koa:'
  - type: text
    content: ',,Miderà an’i Jehovah, ry jentilisa rehetra,'
  - type: text
    content: Ary aoka hankalaza Azy ny firenena rehetra’’ (Sal. 117.1).
  '12':
  - type: text
    content: 'Ary hoy koa Isaia:'
  - type: text
    content: ',,Hisy Solofon’i Jese,'
  - type: text
    content: 'Dia Ilay hitsangana hanapaka ny jentilisa:'
  - type: text
    content: Izy no hitokian’ny jentilisa’’ (Iza. 11.10).
  '13':
  - type: text
    content: Ary Andriamanitry ny fanantenana anie hameno anareo amin’ny fifaliana sy ny fiadanana rehetra amin’ny finoanareo, mba hitomboanareo amin’ny fanantenana noho ny herin’ny Fanahy Masina.
  '14':
  - type: text
    content: 'Fa izaho koa, ry rahalahiko, dia matoky ny aminareo fa feno fahatsarana hianareo, dia feno ny fahalalana rehetra sady mahay mifananatra koa. '
  '15':
  - type: text
    content: 'Kanefa amin’ny fahasahiana no anoratako ny teny sasany aminareo, toy ny mampahatsiaro anareo indray noho ny fahasoavana nomen’Andriamanitra ahy, '
  '16':
  - type: text
    content: 'mba ho mpanompon’i Kristy Jesosy ho an’ny jentilisa aho ka manao fanompoam-pivavahana amin’ny itoriako ny filazantsaran’Andriamanitra, mba horaisina amin’ny fankasitrahana ny fanatitra, dia ny jentilisa, rehefa nohamasinin’ny Fanahy Masina. '
  '17':
  - type: text
    content: 'Ka dia manana izay hataoko rehareha ao amin’i Kristy Jesosy aho noho ny amin’Andriamanitra. '
  '18':
  - type: text
    content: 'Fa tsy sahiko lazaina izay zavatra tsy nampanaovin’i Kristy ahy, na tamin’ny teny, na tamin’ny asa, mba hampanaiky ny jentilisa, '
  '19':
  - type: text
    content: dia tamin’ny herin’ny famantarana sy ny fahagagana, ary tamin’ny herin’ny Fanahy Masina,
  - type: note
    content: 'Na: [Fanahin’Andriamanitra].'
  - type: text
    content: ' dia hatrany Jerosalema ka manodidina hatrany Ilyrikiona, no nahatanterahako ny fitoriako ny filazantsaran’i Kristy. '
  '2':
  - type: text
    content: 'Aoka isika rehetra samy hitady izay hahafaly ny namantsika amin’izay hahasoa sy hampandroso azy. '
  '20':
  - type: text
    content: 'Koa dia nataoko ho voninahitro ny hitory ny filazantsara toy izao: tsy eo amin’izay efa niantsoana an’i Kristy anefa, fandrao hanovona eo ambonin’izay efa naorin’ny sasany aho; '
  '21':
  - type: text
    content: 'fa araka ny voasoratra hoe:'
  - type: text
    content: ',,Izay tsy nilazana Azy no hahita,'
  - type: text
    content: Ary izay tsy nandre no hahafantatra’’ (Isa. 52.15).
  '22':
  - type: text
    content: 'Ary izany no nahasampona ahy matetika tsy hankany aminareo. '
  '23':
  - type: text
    content: 'Fa ankehitriny, satria tsy misy antony intsony ny itoerako amin’ireto, sady efa naniry hatramin’ny taona maro hankany aminareo aho, '
  '24':
  - type: text
    content: raha mankany Spania; fa manantena hahita anareo amin’ny alehako aho ka haterinareo ho any, rehefa afakafaka ny alaheloko anareo.
  '25':
  - type: text
    content: 'Fa ankehitriny dia efa hankany Jerosalema aho hanompo ny olona masina. '
  '26':
  - type: text
    content: 'Fa efa sitrapon’i Makedonia sy Akaia ny hamory vola hiantrana ny malahelo amin’ny olona masina any Jerosalema. '
  '27':
  - type: text
    content: 'Eny, sitrapony izany, sady mpitrosa aminy izy. Fa raha ny jentilisa no niombona ny zava-panahy taminy, dia tokony hanompo azy kosa amin’ny zavatra momba ny nofo izy. '
  '28':
  - type: text
    content: 'Ary rehefa vitako izany, ka voatolotro azy soa aman-tsara izany vokatra izany, dia hihazo any aminareo aho, raha mankany Spania. '
  '29':
  - type: text
    content: Ary fantatro fa raha mankany aminareo aho, dia homba ahy ny fahafenoan’ny fitahian’i Kristy.
  '3':
  - type: text
    content: 'Fa Kristy aza tsy nitady izay hahafaly ny tenany; fa araka ny voasoratra hoe: ,,Ny latsa nataon’izay nandatsa Anao dia nihatra tamiko’’ (Sal.69.9). '
  '30':
  - type: text
    content: 'Ary mangataka aminareo aho, ry rahalahy, noho ny amin’i Jesosy Kristy Tompontsika sy ny fitiavana avy amin’ny Fanahy, mba hiarahanareo miezaka amiko amin’ny fivavahanareo amin’Andriamanitra ho ahy, '
  '31':
  - type: text
    content: 'mba ho voavonjy amin’ny tsy mino any Jodia aho, ary mba hankasitrahan’ny olona masina izay fanompoana hataoko any Jerosalema, '
  '32':
  - type: text
    content: 'mba hankanesako any aminareo amin’ny fifaliana, raha sitrapon’Andriamanitra, ka samy ho velombelona ny fontsika. '
  '33':
  - type: text
    content: Ary Andriamanitry ny fiadanana anie ho aminareo rehetra. Amena.
  '4':
  - type: text
    content: 'Fa izay rehetra voasoratra fahiny dia nosoratana ho fianarantsika hananantsika ny fanantenana amin’ny faharetana sy ny fiononana avy amin’ny Soratra '
  - type: text
    content: Masina.
  '5':
  - type: text
    content: 'Fa Andriamanitry ny faharetana sy ny fiononana anie hampiray hevitra anareo araka an’i Kristy Jesosy, '
  '6':
  - type: text
    content: mba ho saina iray sy vava iray no hiarahanareo mankalaza an’Andriamanitra, Rain’i Jesosy Kristy Tompontsika.
  '7':
  - type: text
    content: Koa mifandraisa hianareo tahaka ny nandraisan’i Kristy anareo
  - type: note
    content: 'Na: [antsika].'
  - type: text
    content: ' koa ho voninahitr’Andriamanitra. '
  '8':
  - type: text
    content: 'Fa lazaiko fa Kristy efa tonga mpanompon’ny voafora noho ny fahamarinan’Andriamanitra hahatò ny teny fikasana tamin’ny razana, '
  '9':
  - type: text
    content: 'mba hankalazan’ny jentilisa an’Andriamanitra koa noho ny famindrampo, araka ny voasoratra hoe:'
  - type: text
    content: ',,Izany no hiderako Anao any amin’ny jentilisa'
  - type: text
    content: Sy hankalazako ny anaranao’’ (Sal. 18.49).
