document_id: ROM.15
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa isika izay matanjaka dia tokony hitondra ny fahalemen’ny malemy ka tsy hitady izay hahafaly ny tenantsika ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka isika rehetra samy hitady izay hahafaly ny namantsika amin’izay hahasoa sy hampandroso azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Kristy aza tsy nitady izay hahafaly ny tenany; fa araka ny voasoratra hoe: ,,Ny latsa nataon’izay nandatsa Anao dia nihatra tamiko’’ (Sal.69.9). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izay rehetra voasoratra fahiny dia nosoratana ho fianarantsika hananantsika ny fanantenana amin’ny faharetana sy ny fiononana avy amin’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Andriamanitry ny faharetana sy ny fiononana anie hampiray hevitra anareo araka an’i Kristy Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: mba ho saina iray sy vava iray no hiarahanareo mankalaza an’Andriamanitra, Rain’i Jesosy Kristy Tompontsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa mifandraisa hianareo tahaka ny nandraisan’i Kristy anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[antsika].'
    marker-yv: yv-n
  - type: text
    text: ' koa ho voninahitr’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa lazaiko fa Kristy efa tonga mpanompon’ny voafora noho ny fahamarinan’Andriamanitra hahatò ny teny fikasana tamin’ny razana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mba hankalazan’ny jentilisa an’Andriamanitra koa noho ny famindrampo, araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Izany no hiderako Anao any amin’ny jentilisa'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hankalazako ny anaranao’’ (Sal. 18.49).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy koa Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Miravoravoa, ry jentilisa, mbamin’ny olony’’ (Deo. 32.43).'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Miderà an’i Jehovah, ry jentilisa rehetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hankalaza Azy ny firenena rehetra’’ (Sal. 117.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy koa Isaia:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Hisy Solofon’i Jese,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia Ilay hitsangana hanapaka ny jentilisa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hitokian’ny jentilisa’’ (Iza. 11.10).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Andriamanitry ny fanantenana anie hameno anareo amin’ny fifaliana sy ny fiadanana rehetra amin’ny finoanareo, mba hitomboanareo amin’ny fanantenana noho ny herin’ny Fanahy Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izaho koa, ry rahalahiko, dia matoky ny aminareo fa feno fahatsarana hianareo, dia feno ny fahalalana rehetra sady mahay mifananatra koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa amin’ny fahasahiana no anoratako ny teny sasany aminareo, toy ny mampahatsiaro anareo indray noho ny fahasoavana nomen’Andriamanitra ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mba ho mpanompon’i Kristy Jesosy ho an’ny jentilisa aho ka manao fanompoam-pivavahana amin’ny itoriako ny filazantsaran’Andriamanitra, mba horaisina amin’ny fankasitrahana ny fanatitra, dia ny jentilisa, rehefa nohamasinin’ny Fanahy Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka dia manana izay hataoko rehareha ao amin’i Kristy Jesosy aho noho ny amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tsy sahiko lazaina izay zavatra tsy nampanaovin’i Kristy ahy, na tamin’ny teny, na tamin’ny asa, mba hampanaiky ny jentilisa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia tamin’ny herin’ny famantarana sy ny fahagagana, ary tamin’ny herin’ny Fanahy Masina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Fanahin’Andriamanitra].'
    marker-yv: yv-n
  - type: text
    text: ' dia hatrany Jerosalema ka manodidina hatrany Ilyrikiona, no nahatanterahako ny fitoriako ny filazantsaran’i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa dia nataoko ho voninahitro ny hitory ny filazantsara toy izao: tsy eo amin’izay efa niantsoana an’i Kristy anefa, fandrao hanovona eo ambonin’izay efa naorin’ny sasany aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Izay tsy nilazana Azy no hahita,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tsy nandre no hahafantatra’’ (Isa. 52.15).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izany no nahasampona ahy matetika tsy hankany aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ankehitriny, satria tsy misy antony intsony ny itoerako amin’ireto, sady efa naniry hatramin’ny taona maro hankany aminareo aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: raha mankany Spania; fa manantena hahita anareo amin’ny alehako aho ka haterinareo ho any, rehefa afakafaka ny alaheloko anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ankehitriny dia efa hankany Jerosalema aho hanompo ny olona masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa efa sitrapon’i Makedonia sy Akaia ny hamory vola hiantrana ny malahelo amin’ny olona masina any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Eny, sitrapony izany, sady mpitrosa aminy izy. Fa raha ny jentilisa no niombona ny zava-panahy taminy, dia tokony hanompo azy kosa amin’ny zavatra momba ny nofo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa vitako izany, ka voatolotro azy soa aman-tsara izany vokatra izany, dia hihazo any aminareo aho, raha mankany Spania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary fantatro fa raha mankany aminareo aho, dia homba ahy ny fahafenoan’ny fitahian’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary mangataka aminareo aho, ry rahalahy, noho ny amin’i Jesosy Kristy Tompontsika sy ny fitiavana avy amin’ny Fanahy, mba hiarahanareo miezaka amiko amin’ny fivavahanareo amin’Andriamanitra ho ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'mba ho voavonjy amin’ny tsy mino any Jodia aho, ary mba hankasitrahan’ny olona masina izay fanompoana hataoko any Jerosalema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'mba hankanesako any aminareo amin’ny fifaliana, raha sitrapon’Andriamanitra, ka samy ho velombelona ny fontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary Andriamanitry ny fiadanana anie ho aminareo rehetra. Amena.
