document_id: LEV.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lalàna ny amin’ny fanadiovana ny vehivavy velom-bao.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Isiraely hoe: Raha misy vehivavy manan-anaka ka tera-dahy, dia haloto hafitoana izy; tahaka ny andro fahalotoany raha mararin’ny fadimbolany no hahalotoany. '
  '3':
  - type: text
    content: 'Ary amin’ny andro fahavalo dia hoforana ny zaza. '
  '4':
  - type: text
    content: 'Ary telo amby telo-polo andro no hitoeran-dravehivavy amin’ny rany izay mahadio azy; tsy hanendry zava-masina izy, na hiditra ao amin’ny fitoerana masina, mandra-pahatapitry ny andro fidiovany. '
  '5':
  - type: text
    content: Fa raha tera-bavy kosa izy, dia haloto tapa-bolana, tahaka ny tamin’ny fahalotoany ihany koa; ary enina amby enim-polo andro no hitoerany hidiovany amin’ny rany izay mahadio azy.
  '6':
  - type: text
    content: Ary raha tapitra ny andro fidiovany ny amin’ny zanany, na lahy na vavy, dia zanak’ondry izay iray taona
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' no halainy ho fanatitra dorana sy zana-boromailala, na domohina, ho fanatitra noho ny ota, ka ho entiny eo anoloan’ny varavaran’ny trano-lay fihaonana ho eo amin’ny mpisorona ireo. '
  '7':
  - type: text
    content: 'Ary izy hanatitra izany eo anatrehan’i Jehovah ka hanao fanavotana ho an-dravehivavy, dia hadio tamin’ny fandehanan’ny rany izy. Izany no lalàna ny amin’ny vehivavy tera-dahy na tera-bavy. '
  '8':
  - type: text
    content: Ary raha tsy tratry ny ananany ny zanak’ondry, dia hitondra domohina roa na zana-boromailala roa izy, ny anankiray hatao fanatitra dorana, ary ny anankiray kosa hatao fanatitra noho ny ota; ary ny mpisorona hanao fanavotana ho an-dravehivavy, dia hadio izy.
