document_id: PSA.58,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny famaliana ny mpanao fitsarana tsy marina.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MOA ny tsi-fitenenana va ataonareo ho filazana ny marina?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Moa milaza ny marina tokoa va hianareo, ry mahery?]'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsara mahitsy va hianareo, ry zanak’olombelona?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hifaly ny marina, raha mahita ny famaliana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanasa ny tongony amin’ny ran’ny ratsy fanahy izy;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hiteny ny olona ka hanao hoe: Misy valiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vokatra.
      marker-yv: yv-n
    - type: text
      text: ' tokoa ho an’ny marina;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy tokoa Andriamanitra Izay mitsara etỳ ambonin’ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy izany, fa ny fonareo no amoronanareo ny ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandanja ny fandozan’ny tànanareo etỳ an-tany hianareo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mivily hatrany am-bohoka ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mania hatrany an-kibo izy ka miteny lainga.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Misy poizina tahaka ny an’ny menarana aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tahaka ny vipera marenina izay manentsin-tadìny izy
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ka tsy mihaino ny feon’ny mpanao ody,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia izay mpahay ody indrindra aza.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitra ô, torotoroy ny nifiny eo am-bavany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omboty ny vazan’ny liona tanora, Jehovah ô.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka ho ritra tahaka ny rano-trambo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha atraniny ny zana-tsipìkany, dia aoka ho tapa-doha ireny;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka ho tahaka ny lelosy izay mihalevona eny am-pandehanana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tahaka ny zaza-vakimanta izay tsy mahita masoandro izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieny tsy mbola mafanan’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: afon
    - type: text
      text: -tsilo ny vilaninareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho entin’ny tafio-drivotra ireny, na ny lena na ny maina.
