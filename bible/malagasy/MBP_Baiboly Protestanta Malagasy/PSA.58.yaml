document_id: PSA.58,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny famaliana ny mpanao fitsarana tsy marina.
  - type: text
    content: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida.
  - type: text
    content: MOA ny tsi-fitenenana va ataonareo ho filazana ny marina?
  - type: note
    content: 'Na: [Moa milaza ny marina tokoa va hianareo, ry mahery?]'
  - type: text
    content: Mitsara mahitsy va hianareo, ry zanak’olombelona?
  '10':
  - type: text
    content: Hifaly ny marina, raha mahita ny famaliana;
  - type: text
    content: Hanasa ny tongony amin’ny ran’ny ratsy fanahy izy;
  '11':
  - type: text
    content: 'Dia hiteny ny olona ka hanao hoe: Misy valiny'
  - type: note
    content: Heb. vokatra.
  - type: text
    content: ' tokoa ho an’ny marina;'
  - type: text
    content: Misy tokoa Andriamanitra Izay mitsara etỳ ambonin’ny tany.
  '2':
  - type: text
    content: Tsy izany, fa ny fonareo no amoronanareo ny ratsy;
  - type: text
    content: Mandanja ny fandozan’ny tànanareo etỳ an-tany hianareo.
  '3':
  - type: text
    content: Mivily hatrany am-bohoka ny ratsy fanahy;
  - type: text
    content: Mania hatrany an-kibo izy ka miteny lainga.
  '4':
  - type: text
    content: Misy poizina tahaka ny an’ny menarana aminy;
  - type: text
    content: Eny, tahaka ny vipera marenina izay manentsin-tadìny izy
  '5':
  - type: text
    content: Ka tsy mihaino ny feon’ny mpanao ody,
  - type: text
    content: Na dia izay mpahay ody indrindra aza.
  '6':
  - type: text
    content: Andriamanitra ô, torotoroy ny nifiny eo am-bavany;
  - type: text
    content: Omboty ny vazan’ny liona tanora, Jehovah ô.
  '7':
  - type: text
    content: Aoka ho ritra tahaka ny rano-trambo izy;
  - type: text
    content: Raha atraniny ny zana-tsipìkany, dia aoka ho tapa-doha ireny;
  '8':
  - type: text
    content: Aoka ho tahaka ny lelosy izay mihalevona eny am-pandehanana izy;
  - type: text
    content: Aoka ho tahaka ny zaza-vakimanta izay tsy mahita masoandro izy.
  '9':
  - type: text
    content: 'Dieny tsy mbola mafanan’ny '
  - type: text
    content: afon
  - type: text
    content: -tsilo ny vilaninareo,
  - type: text
    content: Aoka ho entin’ny tafio-drivotra ireny, na ny lena na ny maina.
