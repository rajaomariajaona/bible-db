document_id: PSA.132
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vavaka ho an’ny tranon’Andriamanitra sy ny ankohonan’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '132.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, tsarovy Davida
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fiahiany rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia ilay nianiana tamin’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy nivoady tamin’ny Maherin’i Jakoba hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy mba hiditra ao an-daiko aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hiakatra amin’ny farafara fandriako,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mba havelako hatory ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho rendrehana ny hodi-masoko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandra-pahitako fitoerana ho an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fonenana ho an’ny Maherin’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, nandre azy tany Efrata isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahita azy tao amin’ny saha anaty ala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '132.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tany an-tsahan’i Jara.
    marker-yv: yv-n
  - type: text
    text: ' isika.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hiditra any amin’ny fonenany isika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hivavaka eo amin’ny fitoeran-tongony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsangàna, Jehovah ô, ho amin’ny fitsaharanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Hianao sy ny fiaran’ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ny mpisoronao hitafy fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny olonao masina hihoby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho ny amin’i Davida mpanomponao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia aza mampiala maina ny tavan’ny voahosotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah efa nianiana tamin’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary marina izany ka tsy hitsoahany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ateraky ny kibonao no hapetrako eo ambonin’ny seza fiandriananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha hotandreman’ny zanakao ny fanekeko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny teny vavolombeloko izay hampianariko azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hieptraka eo ambonin’ny seza fiandriananao mandrakizay doria kosa ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa Jehovah efa nifidy an’i Ziona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary naniry azy ho fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ity, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy Izy,
  - type: text
    text: ' no fitsaharako mandrakizay doria;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eto no honenako, fa efa niriko ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hotahiko tokoa ny fihinana ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovokisako hanina ny malahelo ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mpisorona ao dia hampitafiko famonjena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hihoby tokoa ny olo-masina ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ao no hampitsimohako tandroka ho an’i Davida
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanamboarako jiro ho an’ny voahosotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fahavalony hampitafiko henatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa eo aminy kosa no hamirapiratra ny satroboninahiny.
