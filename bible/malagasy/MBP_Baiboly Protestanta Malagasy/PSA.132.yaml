document_id: PSA.132,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ho an’ny tranon’Andriamanitra sy ny ankohonan’i Davida.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: JEHOVAH ô, tsarovy Davida
  - type: text
    content: Noho ny fiahiany rehetra,
  '10':
  - type: text
    content: Noho ny amin’i Davida mpanomponao
  - type: text
    content: Dia aza mampiala maina ny tavan’ny voahosotrao.
  '11':
  - type: text
    content: Jehovah efa nianiana tamin’i Davida,
  - type: text
    content: 'Ary marina izany ka tsy hitsoahany:'
  - type: text
    content: Ny ateraky ny kibonao no hapetrako eo ambonin’ny seza fiandriananao.
  '12':
  - type: text
    content: Raha hotandreman’ny zanakao ny fanekeko
  - type: text
    content: Sy ny teny vavolombeloko izay hampianariko azy,
  - type: text
    content: Dia hieptraka eo ambonin’ny seza fiandriananao mandrakizay doria kosa ny zanany.
  '13':
  - type: text
    content: Fa Jehovah efa nifidy an’i Ziona.
  - type: text
    content: Ary naniry azy ho fonenany.
  '14':
  - type: text
    content: 'Ity, '
  - type: text
    content: hoy Izy,
  - type: text
    content: ' no fitsaharako mandrakizay doria;'
  - type: text
    content: Eto no honenako, fa efa niriko ity.
  '15':
  - type: text
    content: Hotahiko tokoa ny fihinana ao;
  - type: text
    content: Hovokisako hanina ny malahelo ao.
  '16':
  - type: text
    content: Ny mpisorona ao dia hampitafiko famonjena;
  - type: text
    content: Ary hihoby tokoa ny olo-masina ao.
  '17':
  - type: text
    content: Ao no hampitsimohako tandroka ho an’i Davida
  - type: text
    content: Sy hanamboarako jiro ho an’ny voahosotro.
  '18':
  - type: text
    content: Ny fahavalony hampitafiko henatra;
  - type: text
    content: Fa eo aminy kosa no hamirapiratra ny satroboninahiny.
  '2':
  - type: text
    content: Dia ilay nianiana tamin’i Jehovah
  - type: text
    content: 'Sy nivoady tamin’ny Maherin’i Jakoba hoe:'
  '3':
  - type: text
    content: Tsy mba hiditra ao an-daiko aho
  - type: text
    content: Na hiakatra amin’ny farafara fandriako,–
  '4':
  - type: text
    content: Tsy mba havelako hatory ny masoko,
  - type: text
    content: Na ho rendrehana ny hodi-masoko,
  '5':
  - type: text
    content: Mandra-pahitako fitoerana ho an’i Jehovah.
  - type: text
    content: Dia fonenana ho an’ny Maherin’i Jakoba.
  '6':
  - type: text
    content: Indro, nandre azy tany Efrata isika;
  - type: text
    content: Nahita azy tao amin’ny saha anaty ala
  - type: note
    content: 'Na: tany an-tsahan’i Jara.'
  - type: text
    content: ' isika.'
  '7':
  - type: text
    content: Aoka hiditra any amin’ny fonenany isika
  - type: text
    content: Ka hivavaka eo amin’ny fitoeran-tongony.
  '8':
  - type: text
    content: Mitsangàna, Jehovah ô, ho amin’ny fitsaharanao,
  - type: text
    content: Dia Hianao sy ny fiaran’ny herinao.
  '9':
  - type: text
    content: Aoka ny mpisoronao hitafy fahamarinana;
  - type: text
    content: Ary aoka ny olonao masina hihoby.
