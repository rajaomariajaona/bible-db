document_id: GEN.33,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jakoba dia nanopy ny masony ka nahatazana fa indro tamy Esao, mitondra efa-jato lahy. Dia nozarazarainy ny zaza ho amin’i Lea sy Rahely ary ho amin’ny ankizivavy roa. '
  '10':
  - type: text
    content: 'Ary hoy Jakoba: Trarantitra hianao, aza an’izany; raha mba mahita fitia eto imasonao aho, dia raiso amin’ny tànako ny zavatra nampanateriko; fa efa nahita ny tavanao aho tahaka ny mahita ny tavan’Andriamanitra, ary efa sitrakao aho. '
  '11':
  - type: text
    content: Trarantitra hianao, raiso re ny saotro izay nampanaterina ho anao; fa efa nanisy soa ahy Andriamanitra, ka manam-be
  - type: note
    content: Heb. ny zavatra rehetra.
  - type: text
    content: ' aho. Dia nanery azy izy, ka dia noraisiny ihany ny zavatra.'
  '12':
  - type: text
    content: 'Ary hoy Esao: Aoka hiainga isika, ka handeha hialoha anao aho. '
  '13':
  - type: text
    content: 'Fa hoy Jakoba taminy: Fantatr’itompokolahy fa mbola osa ny zaza, sady ampianahany ny ondry aman-osy sy ny omby ato amiko; koa raha hokorodonina indray andro aza ireo, dia ho faty avokoa ny ondry aman-osy rehetra. '
  '14':
  - type: text
    content: Trarantitra hianao, aoka itompokolahy hialoha ny mpanompony; ary izaho handeha miadana araka izay dian’ny omby aman-ondry, izay ho eo alohako, sy ny dian’ny zaza, mandra-pahatongako any amin’itompokolahy any Seïra.
  '15':
  - type: text
    content: 'Ary hoy Esao: Masìna hianao, aoka ary mba hamelako hiaraka aminao ny olona izay momba ahy. Fa hoy Jakoba: Ahoana no anaovanao izany? Aoka hahita fitia eto imason’itompokolahy aho.'
  '16':
  - type: text
    content: Dia niverina androtrizay Esao tamin’ny làlany ho any Seïra.
  '17':
  - type: text
    content: Ary Jakoba nifindra nankany Sokota ka nanao trano ho azy ary nanao trano rantsan-kazo maromaro ho an’ny omby aman-ondriny; izany no nanaovana ny anaran’io tany io hoe Sokota.
  - type: note
    content: Sokota = Trano rantsan-kazo.
  '18':
  - type: text
    content: Ary Jakoba tonga soa aman-tsara tao an-tanàna Sekema, izay eo amin’ny tany Kanana, rehefa avy tany Mesopotamia
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' izy; dia nitoby tandrifin’ny tanàna. '
  '19':
  - type: text
    content: Dia novidiny vola
  - type: note
    content: Kesita no anaran’ny vola, fa tsy fantatra izay lanjany.
  - type: text
    content: ' zato tamin’ny zanak’i Hamora, rain’i Sekema, ny tany izay nanorenany ny lainy. '
  '2':
  - type: text
    content: Ary nataony loha-làlana ny ankizivavy roa sy ny zanany, ary Lea sy ny zanany nanarakaraka, ary Rahely sy Josefa no vodi-làlana.
  '20':
  - type: text
    content: Ary nanorina alitara teo izy, ka nataony hoe El-elohe-Isiraely
  - type: note
    content: El-elohe-Isiraely = Andriamanitra, Andriamanitr’Isiraely.
  - type: text
    content: ' ny anarany.'
  '3':
  - type: text
    content: 'Ary Jakoba nandeha teo alohan’izy rehetra ka niankohoka impito tamin’ny tany mandra-pahatongany teo akaikin’ny rahalahiny. '
  '4':
  - type: text
    content: 'Dia nihazakazaka hitsena azy Esao, ary nisakambina ny tendany, dia namihina sy nanoroka azy; ary samy nitomany izy mirahalahy. '
  '5':
  - type: text
    content: 'Ary Esao nanopy ny masony ka nahita ny zaza amim-behivavy; dia hoy izy: Iza moa ireto miaraka aminao ireto? Ary hoy kosa Jakoba: Ny zaza izay nomen’Andriamanitra ny mpanomponao noho ny fahasoavany. '
  '6':
  - type: text
    content: 'Dia nanatona ny ankizivavy sy ny zanany ka niankohoka. '
  '7':
  - type: text
    content: Dia nanatona koa Lea sy ny zanany ka niankohoka; ary farany, dia nanatona koa Josefa sy Rahely ka niankohoka.
  '8':
  - type: text
    content: 'Ary hoy Esao: Inona moa no hevitr’ireny antokony rehetra nifanena tamiko ireny? Ary hoy izy: Mba hahitako fitia eto imason’itompokolahy. '
  '9':
  - type: text
    content: 'Ary dia hoy Esao: Manam-be ihany aho, ry rahalahiko; aoka ihany ho anao ny anao. '
