document_id: GEN.33
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jakoba dia nanopy ny masony ka nahatazana fa indro tamy Esao, mitondra efa-jato lahy. Dia nozarazarainy ny zaza ho amin’i Lea sy Rahely ary ho amin’ny ankizivavy roa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nataony loha-làlana ny ankizivavy roa sy ny zanany, ary Lea sy ny zanany nanarakaraka, ary Rahely sy Josefa no vodi-làlana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jakoba nandeha teo alohan’izy rehetra ka niankohoka impito tamin’ny tany mandra-pahatongany teo akaikin’ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihazakazaka hitsena azy Esao, ary nisakambina ny tendany, dia namihina sy nanoroka azy; ary samy nitomany izy mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Esao nanopy ny masony ka nahita ny zaza amim-behivavy; dia hoy izy: Iza moa ireto miaraka aminao ireto? Ary hoy kosa Jakoba: Ny zaza izay nomen’Andriamanitra ny mpanomponao noho ny fahasoavany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanatona ny ankizivavy sy ny zanany ka niankohoka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nanatona koa Lea sy ny zanany ka niankohoka; ary farany, dia nanatona koa Josefa sy Rahely ka niankohoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Esao: Inona moa no hevitr’ireny antokony rehetra nifanena tamiko ireny? Ary hoy izy: Mba hahitako fitia eto imason’itompokolahy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary dia hoy Esao: Manam-be ihany aho, ry rahalahiko; aoka ihany ho anao ny anao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Jakoba: Trarantitra hianao, aza an’izany; raha mba mahita fitia eto imasonao aho, dia raiso amin’ny tànako ny zavatra nampanateriko; fa efa nahita ny tavanao aho tahaka ny mahita ny tavan’Andriamanitra, ary efa sitrakao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Trarantitra hianao, raiso re ny saotro izay nampanaterina ho anao; fa efa nanisy soa ahy Andriamanitra, ka manam-be
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny zavatra rehetra.
    marker-yv: yv-n
  - type: text
    text: ' aho. Dia nanery azy izy, ka dia noraisiny ihany ny zavatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Esao: Aoka hiainga isika, ka handeha hialoha anao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy Jakoba taminy: Fantatr’itompokolahy fa mbola osa ny zaza, sady ampianahany ny ondry aman-osy sy ny omby ato amiko; koa raha hokorodonina indray andro aza ireo, dia ho faty avokoa ny ondry aman-osy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Trarantitra hianao, aoka itompokolahy hialoha ny mpanompony; ary izaho handeha miadana araka izay dian’ny omby aman-ondry, izay ho eo alohako, sy ny dian’ny zaza, mandra-pahatongako any amin’itompokolahy any Seïra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Esao: Masìna hianao, aoka ary mba hamelako hiaraka aminao ny olona izay momba ahy. Fa hoy Jakoba: Ahoana no anaovanao izany? Aoka hahita fitia eto imason’itompokolahy aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niverina androtrizay Esao tamin’ny làlany ho any Seïra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Jakoba nifindra nankany Sokota ka nanao trano ho azy ary nanao trano rantsan-kazo maromaro ho an’ny omby aman-ondriny; izany no nanaovana ny anaran’io tany io hoe Sokota.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sokota = Trano rantsan-kazo.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Jakoba tonga soa aman-tsara tao an-tanàna Sekema, izay eo amin’ny tany Kanana, rehefa avy tany Mesopotamia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Padan-arama.
    marker-yv: yv-n
  - type: text
    text: ' izy; dia nitoby tandrifin’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia novidiny vola
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Kesita '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: no anaran’ny vola, fa tsy fantatra izay lanjany.
    marker-yv: yv-n
  - type: text
    text: ' zato tamin’ny zanak’i Hamora, rain’i Sekema, ny tany izay nanorenany ny lainy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nanorina alitara teo izy, ka nataony hoe El-elohe-Isiraely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: El-elohe-Isiraely = Andriamanitra, Andriamanitr’Isiraely.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
