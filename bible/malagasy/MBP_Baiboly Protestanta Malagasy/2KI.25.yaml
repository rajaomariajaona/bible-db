document_id: 2KI.25
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’ny andro fahafolo tamin’ny volana fahafolo tamin’ny taona fahasivy nanjakan’i Zedekia dia tonga Nebokadnezara, mpanjakan’i Babylona, sy ny miaramilany rehetra hamely an’i Jerosalema '
  - type: usfm
    marker: it
    children:
    - type: text
      text: indray
  - type: text
    text: ' ka nitoby tandrifiny; ary nanao tilikambo manodidina azy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nataony fahirano ny tanàna hatramin’ny taona fahiraika ambin’ny folo nanjakan’i Zedekia mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tamin’ny andro fahasivy tamin’ny volana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fahefatra
  - type: text
    text: ' dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an’ny olona tompon-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy voabanga ny tanàna, dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nandositra
  - type: text
    text: ' alina ny miaramila rehetra tamin’ny làlana nankamin’ny vavahady tanelanelan’ny mànda roa, izay eo anilan’ny sahan’ny mpanjaka (fa ny Kaldeana nanodidina ny tanàna), ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny mpanjaka
  - type: text
    text: ' nandeha tamin’ny làlana mankeny amin’ny tani-hay.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny miaramilan’ny Kaldeana nanenjika ny mpanjaka ka nahatratra azy teny amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary voasambotra ny mpanjaka ka nentina niakatra ho any amin’ny mpanjakan’i Babylona tao Ribla, ka dia notsaraina tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny zanakalahin’i Zedekia dia novonoiny teo imason-drainy, ary ny mason’i Zedekia kosa nopotsiriny, dia nafatony tamin’ny gadra varahina izy ka nentiny nankany Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tamin’ny andro fahafito tamin’ny volana fahadimy tamin’ny taona fahasivy ambin’ny folo nanjakan’i Nebokadnezara, mpanjakan’i Babylona, dia tonga tany Jerosalema Nebozaradana, lehiben’ny mpiambina, mpanompon’ny mpanjakan’i Babylona, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nandoro ny tranon’i Jehovah sy ny tranon’ny mpanjaka mbamin’ny trano rehetra tany Jerosalema: ny trano lehibe rehetra dia nodorany tamin’ny afo avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mànda manodidina an’i Jerosalema dia noravan’ny miaramilan’ny Kaldeana rehetra, izay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nanaraka
  - type: text
    text: ' ny lehiben’ny mpiambina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izay olona sisa tao an-tanàna sy izay efa nandositra nanatona ny mpanjakan’i Babylona ary ny vahoaka betsaka sisa dia nentin’i Neborazadana, lehiben’ny mpiambina, ho babo avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa ny olona malahelo dia nisy navelany ihany ho mpamboatra tanimboaloboka sy ho mpiasa tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ireo andry varahina teo an-tranon’i Jehovah sy ny fitoeran-tavin-drano sy ny tavin-drano varahina lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ranomasina.
    marker-yv: yv-n
  - type: text
    text: ' izay teo an-tranon’i Jehovah dia notorotoroin’ny Kaldeana, ka nentiny ho any Babylona ny varahina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nentiny koa ny vilany fandraofan-davenona sy ny sotron’afo sy ny antsy sy ny lovia kely ary ny fanaka varahina rehetra izay nenti-nanao fanompoam-pivavahana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nentiny koa ny fitoeran-davenon-jiro sy ny lovia famafazana–na ny volamena na ny volafotsy dia samy nentiny avokoa– '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ary ny andry roa sy ny tavin-drano lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ranomasina.
    marker-yv: yv-n
  - type: text
    text: ' iray ary ireo fitoeran-tavin-drano, izay nataon’i Solomona ho amin’ny tranon’i Jehovah; ny varahina tamin’izany fanaka rehetra izany dia tsy hita lanja. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Valo ambin’ny folo hakiho ny hahavon’ny andry iray, ary varahina ny kapitaliny sady telo hakiho ny hahavony; ary varahina avokoa ny harato sy ny ampongabendanitra amin’ny kapitaliny manodidina; ary tahaka izany koa ny andry faharoa mbamin’ny harato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny lehiben’ny mpiambina nisambotra an’i Seraia mpisoronabe sy Zefania, mpisorona manarakaraka, ary mpiandry varavarana koa telo lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary tao an-tanàna no nisamborany ny tandapa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Hev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' anankiray, mpifehy ny miaramila, ary dimy lahy tamin’izay mpitoetra teo anatrehan’ny mpanjaka, izay hita tao an-tanàna, ary ny mpanoratry ny komandin’ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enim-polo lahy, izay hitany tao an-tanàna; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia nosamborin’i Nebozaradana, lehiben’ny mpiambina, ireo ka nentiny ho any amin’ny mpanjakan’i Babylona tao Ribla. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia novonoin’ny mpanjakan’i Babylona tao Ribla any amin’ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny amin’ny olona izay sisa tany amin’ny tanin’ny Joda, izay navelan’i Nebokadnezara, mpanjakan’i Babylona, dia Gedalia, zanak’i Ahikama, zanak’i Safana, no notendreny ho mpanapaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony ren’ny komandin’ny miaramila rehetra mbamin’ny olom-peheziny avy fa Gedalia no notendren’i Nebokadnezara, mpanjakan’i Babylona, ho mpanapaka, dia nankany amin’i Gedalia tany Mizpa Isimaela, zanak’i Netania, sy Johanana, zanak’i Karea, sy Seraia, zanak’i Tanometa Netofatita, ary Jazania, zanak’ilay Makatita, dia ireo sy ny olom-peheziny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Gedalia nianiana taminy sy tamin’ny olom-peheziny ka nanao hoe: Aza matahotra ny amin’ny mpanompon’ny Kaldeana, fa mitomoera amin’ny tany, ary manompoa ny mpanjakan’i Babylona, fa izany no hahasoa anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary tamin’ny volana fahafito, dia avy Isimaela, zanak’i Netania, zanak’i Elisama, isan’ny fianakavian’ny mpanjaka, mbamin’ny olona folo lahy koa ka namely an’i Gedalia, dia nahafaty azy sy ny Jiosy ary ny Kaldeana izay tao aminy tany Mizpa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary niainga ny olona rehetra, na kely na lehibe, mbamin’ny komandin’ny miaramila, nankany Egypta, fa natahotra ny Kaldeana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tamin’ny andro fahafito amby roa-polo tamin’ny volana faharoa ambin’ny folo tamin’ny taona fahafito amby telo-polo taorian’ny namaboana an’i Joiakina, mpanjakan’ny Joda, tamin’ny taona vao nanjakan’i Evila-merodaka, mpanjakan’i Babylona, dia nasandrany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nasandratra ny lohany.
    marker-yv: yv-n
  - type: text
    text: ' hiala tao an-trano-maizina Joiakina, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nitenenany soa izy, ka ny seza fiandrianany nataony ambony noho ny seza fiandrianan’ireo mpanjaka namany tao Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ka dia novan’i Joiakina ny fitafiany fony mbola tao an-trano-maizina; ary nihinan-kanina teo anatrehany mandrakariva izy tamin’ny andro niainany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ny hanina nohaniny dia hanina nomena avy amin’ny mpanjaka araka ny tokony ho anjarany isan-andro isan-andro tamin’ny andro rehetra niainany.
