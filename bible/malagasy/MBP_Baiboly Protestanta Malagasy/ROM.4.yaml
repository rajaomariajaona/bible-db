document_id: ROM.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Inona ary no holazaintsika ho efa azon’i Abrahama, razantsika araka ny nofo? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha asa no nanamarinana an’i Abrahama, dia misy hireharehany ihany, nefa tsy amin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ahoana hoy ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: '? ,,Ary Abrahama nino an’Andriamanitra, ka dia nisaina ho fahamarinany izany’’ (Gen. 15.6). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ho an’izay miasa, dia tsy isaina ho fahasoavana ny karama, fa ho trosa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ho an’izay tsy miasa kosa, fa mino Izay manamarina ny ratsy fanahy, dia ny finoany no isaina ho fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia araka izany koa no ilazan’i Davida fa sambatra ny olona izay isain’Andriamanitra fahamarinana tsy amin’ny asa, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ',,Sambatra izay voavela ny helony sy voasarona ny fahotany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sambatra izay olona tsy hisain’i Jehovah heloka.’’ (Sal. 32.1, 2)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa izany fahasambarana izany moa an’ny voafora ihany va, sa an’ny tsy voafora koa? fa lazaintsika fa ny finoana no nisaina ho fahamarinan’i Abrahama. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ahoana no nanisana izany? Tamin’izy efa voafora va, sa fony izy tsy mbola voafora? Tsy tamin’izy efa voafora tsy akory, fa fony izy tsy mbola voafora. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny famorana, izay famantarana, dia noraisiny ho tombo-kasen’ny fahamarinana amin’ny finoana izay nananany fony izy tsy mbola voafora, mba ho rain’ny olona rehetra izay mino izy, na dia ny tsy voafora aza, mba hisaina ho an’ireny ny fahamarinana, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary ho rain’ny voafora, dia tsy izay voafora ihany, fa izay mandeha araka ny dian’ny finoan’i Abrahama razantsika koa, izay nananany fony izy tsy mbola voafora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa tsy lalàna, fa fahamarinana amin’ny finoana, no nahazoan’i Abrahama sy ny taranany ny teny fikasana ho mpandova izao tontolo izao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha izay amin’ny lalàna no mpandova, dia efa foana ny finoana, ary efa tsinontsinona ny teny fikasana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ny lalàna mahatonga fahatezerana; fa raha tsy misy lalàna, dia tsy misy fandikan-dalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa finoana no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: andovana,
  - type: text
    text: ' mba ho araka ny fahasoavana, hahatò ny teny fikasana ho an’ny taranaka rehetra,–tsy ho an’izay amin’ny lalàna ihany, fa ho an’izay amin’ny finoan’i Abrahama koa, dia ilay razantsika rehetra– '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'araka ny voasoratra hoe: ,,Nataoko ho rain’ny firenena maro hianao’’(Gen. 17.5) –teo anatrehan’Izay ninoany, dia Andriamanitra Izay mamelona ny maty sy miantso ny tsy misy toy ny misy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary na dia efa tsy nisy nanantenana aza, dia nanantena ihany izy ka nino, mba ho rain’ny firenena maro; araka ny voalaza hoe: ,,Ho tahaka izany ny taranakao“(Gen. 15.5). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary satria tsy mba nalemy finoana izy, dia nihevitra ny tenany izay efa hoatra ny maty (fa efa tokony ho zato taona izy) sy ny fahafatesan’ny kibon’i Saraha, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary tsy niahanahana ny amin’ny teny fikasan’Andriamanitra tamin’ny tsi-finoana izy, fa nampaherezin’ny finoana ka nanome voninahitra an’Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary natoky indrindra fa izay nolazainy dia hainy hatao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nisaina ho fahamarinany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa tsy ho azy ihany no nanoratana fa nisaina ho azy izany, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa ho antsika izay hanisana izany koa, dia isika izay mino Ilay nanangana an’i Jesosy Tompontsika tamin’ny maty, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay natolotra noho ny fahadisoantsika ka natsangana indray ho fanamarinana antsika.
