document_id: PHP.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny sy fiarahabana ary fisaorana.
  - type: text
    content: PAOLY sy Timoty, mpanompon’i Kristy Jesosy, mamangy ny olona masina rehetra ao amin’i Kristy Jesosy mbamin’ny mpitandrina
  - type: note
    content: Gr. episkopo.
  - type: text
    content: ' sy ny diakona izay any Filipy: '
  '10':
  - type: text
    content: mba hamantaranareo izay zavatra tsara indrindra,
  - type: note
    content: 'Na: samy hafa.'
  - type: text
    content: ' mba ho madio am-po ary tsy hanan-tsiny ho amin’ny andron’i Kristy hianareo, '
  '11':
  - type: text
    content: sady feno ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesosy Kristy, ho voninahitra sy fiderana an’Andriamanitra.
  - type: heading
    content: Ny toetr’i Paoly tao amin’ny fifatorana, sy ny fanantenany.
  '12':
  - type: text
    content: 'ARY tiako ho fantatrareo, ry rahalahy, fa izay zavatra nanjo ahy dia efa tonga fampandrosoana ny filazantsara kosa; '
  '13':
  - type: text
    content: ka ao amin’i Kristy ny fifatorako dia fantatry ny mpiambina andriana rehetra
  - type: note
    content: 'Gr. mpiambina pretoriana rehetra; na: eran’ny pretoria.'
  - type: text
    content: ' mbamin’ny olona hafa rehetra; '
  '14':
  - type: text
    content: ary ny ankabiazan’ny rahalahy dia efa matoky ao amin’ny Tompo noho ny fifatorako ka mihasahisahy kokoa hitory ny tenin’Andriamanitra tsy amin’ny tahotra.
  '15':
  - type: text
    content: 'Fialonana sy fifandirana aza no itorian’ny sasany an’i Kristy, ary fifaliana kosa ny an’ny sasany; '
  '16':
  - type: text
    content: 'fitiavana ny an’ny sasany, satria fantany fa voatendry ho mpanafa-tsiny ny filazantsara aho; '
  '17':
  - type: text
    content: 'fifampiandaniana kosa no itorian’ny sasany an’i Kristy, fa tsy mba fo madio, ka mihevitra hanampy fahoriana ny fifatorako. '
  '18':
  - type: text
    content: Ahoana ary no izy, afa-tsy izao? Amin’ny atao rehetra, na amin’ny fihatsarambelatsihy, na amin’ny marina, dia Kristy no torina, ary mifaly amin’izany aho; eny, mbola hifaly ihany aho.
  '19':
  - type: text
    content: Fa fantatro fa ho tonga famonjena ahy izany noho ny fangatahanareo sy ny fanomezana
  - type: note
    content: 'Na: fanomezan’.'
  - type: text
    content: ' ny Fanahin’i Jesosy Kristy, '
  '2':
  - type: text
    content: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  '20':
  - type: text
    content: 'araka ny hafatratry ny faniriako sy ny fanantenako fa tsy hahazo henatra aho, na amin’inona na amin’inona; fa amin’ny fahasahiana rehetra, tahaka ny amin’ny mandrakariva, dia ankehitriny koa no hankalazana an’i Kristy ao amin’ny tenako, na amin’ny fiainana, na amin’ny fahafatesana. '
  '21':
  - type: text
    content: 'Fa Kristy no anton’ny ahavelomako, ary ny fahafatesana no hahazoako tombony. '
  '22':
  - type: text
    content: 'Kanefa raha ny ho velona amin’ny nofo no hahavokaran’ny asako, dia tsy hitako izay hofidiko; '
  '23':
  - type: text
    content: 'fa sanganehana eo anelanelan’izy roroa aho, maniry hiala ka ho ao amin’i Kristy, satria tsara lavitra izany; '
  '24':
  - type: text
    content: 'kanefa kosa ny hitoetra eo amin’ny nofo no mahasoa anareo kokoa. '
  '25':
  - type: text
    content: 'Ary satria matoky izany aho, dia fantatro fa hitoetra sy haharitra eo aminareo rehetra aho hahazoanareo fandrosoana sy fifaliana amin’ny finoanareo, '
  '26':
  - type: text
    content: mba hitombo noho ny ataoko ny firavoravoanareo ao amin’i Kristy Jesosy amin’ny hankanesako atỳ aminareo indray.
  '27':
  - type: text
    content: 'Fa hany ataoko: aoka ny fitondrantenanareo ho mendrika ny filazantsaran’i Kristy, mba handrenesako ny toetrareo (na ho tonga aho ka hahita anareo, na tsy ho tonga), fa maharitra amin’ny fanahy iray hianareo ka miray fo hiara-miezaka hampandroso ny finoana ny filazantsara, '
  '28':
  - type: text
    content: 'ka tsy ho azon’ny fahavalo ampitahorina hianareo na amin’inona na amin’inona; fa amin’ireo dia mariky ny fahaverezana izany, nefa mariky ny famonjena anareo kosa, sady avy amin’Andriamanitra. '
  '29':
  - type: text
    content: 'Fa hianareo efa nomena noho ny an’i Kristy, tsy ny hino Azy ihany, fa ny hiharam-pahoriana koa noho ny aminy, '
  '3':
  - type: text
    content: 'Misaotra an’Andriamanitra amin’ny fahatsiarovako anareo '
  '30':
  - type: text
    content: dia manana izany ady izany hianareo, izay hitanareo teo amiko sady mbola renareo fa ato amiko ihany ankehitriny.
  '4':
  - type: text
    content: 'mandrakariva aho amin’ny fivavahako rehetra ho anareo rehetra, ka mangataka amin’ny fifaliana, '
  '5':
  - type: text
    content: 'noho ny firaisanareo hampandroso ny filazantsara hatramin’ny andro voalohany ka mandraka ankehitriny; '
  '6':
  - type: text
    content: 'ary matoky indrindra aho fa Izay nanomboka asa tsara tao anatinareo no hahatanteraka izany mandra-pihavin’ny andron’i Jesosy Kristy; '
  '7':
  - type: text
    content: 'fa marina izany fiheverako anareo rehetra izany, satria efa mby ato am-poko hianareo, fa mpiombona ny fahasoavana ananako hianareo rehetra, na amin’ny fifatorako, na amin’ny famaliako hahafa-tsiny ny filazantsara sy ny fampianarako hahamafy orina azy. '
  '8':
  - type: text
    content: Fa Andriamanitra no vavolombeloko fa manina anareo rehetra indrindra aho amin’ny famindrampon’i Kristy Jesosy.
  '9':
  - type: text
    content: 'Ary izao no angatahiko, dia ny mbola hitomboan’ny fitiavanareo bebe kokoa amin’ny fahalalana tsara sy ny fahafantarana rehetra, '
