document_id: PHP.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarihan-teny sy fiarahabana ary fisaorana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: PAOLY sy Timoty, mpanompon’i Kristy Jesosy, mamangy ny olona masina rehetra ao amin’i Kristy Jesosy mbamin’ny mpitandrina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: episkopo.
    marker-yv: yv-n
  - type: text
    text: ' sy ny diakona izay any Filipy: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Misaotra an’Andriamanitra amin’ny fahatsiarovako anareo '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mandrakariva aho amin’ny fivavahako rehetra ho anareo rehetra, ka mangataka amin’ny fifaliana, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'noho ny firaisanareo hampandroso ny filazantsara hatramin’ny andro voalohany ka mandraka ankehitriny; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary matoky indrindra aho fa Izay nanomboka asa tsara tao anatinareo no hahatanteraka izany mandra-pihavin’ny andron’i Jesosy Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa marina izany fiheverako anareo rehetra izany, satria efa mby ato am-poko hianareo, fa mpiombona ny fahasoavana ananako hianareo rehetra, na amin’ny fifatorako, na amin’ny famaliako hahafa-tsiny ny filazantsara sy ny fampianarako hahamafy orina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Andriamanitra no vavolombeloko fa manina anareo rehetra indrindra aho amin’ny famindrampon’i Kristy Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no angatahiko, dia ny mbola hitomboan’ny fitiavanareo bebe kokoa amin’ny fahalalana tsara sy ny fahafantarana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba hamantaranareo izay zavatra tsara indrindra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: samy hafa.
    marker-yv: yv-n
  - type: text
    text: ' mba ho madio am-po ary tsy hanan-tsiny ho amin’ny andron’i Kristy hianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sady feno ny vokatry ny fahamarinana, izay avy amin’ny alalan’i Jesosy Kristy, ho voninahitra sy fiderana an’Andriamanitra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny toetr’i Paoly tao amin’ny fifatorana, sy ny fanantenany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ARY tiako ho fantatrareo, ry rahalahy, fa izay zavatra nanjo ahy dia efa tonga fampandrosoana ny filazantsara kosa; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka ao amin’i Kristy ny fifatorako dia fantatry ny mpiambina andriana rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mpiambina pretoriana rehetra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eran’ny pretoria.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny olona hafa rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary ny ankabiazan’ny rahalahy dia efa matoky ao amin’ny Tompo noho ny fifatorako ka mihasahisahy kokoa hitory ny tenin’Andriamanitra tsy amin’ny tahotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fialonana sy fifandirana aza no itorian’ny sasany an’i Kristy, ary fifaliana kosa ny an’ny sasany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fitiavana ny an’ny sasany, satria fantany fa voatendry ho mpanafa-tsiny ny filazantsara aho; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fifampiandaniana kosa no itorian’ny sasany an’i Kristy, fa tsy mba fo madio, ka mihevitra hanampy fahoriana ny fifatorako. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ahoana ary no izy, afa-tsy izao? Amin’ny atao rehetra, na amin’ny fihatsarambelatsihy, na amin’ny marina, dia Kristy no torina, ary mifaly amin’izany aho; eny, mbola hifaly ihany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa fantatro fa ho tonga famonjena ahy izany noho ny fangatahanareo sy ny fanomezana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanomezan’.
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahin’i Jesosy Kristy, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'araka ny hafatratry ny faniriako sy ny fanantenako fa tsy hahazo henatra aho, na amin’inona na amin’inona; fa amin’ny fahasahiana rehetra, tahaka ny amin’ny mandrakariva, dia ankehitriny koa no hankalazana an’i Kristy ao amin’ny tenako, na amin’ny fiainana, na amin’ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Kristy no anton’ny ahavelomako, ary ny fahafatesana no hahazoako tombony. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa raha ny ho velona amin’ny nofo no hahavokaran’ny asako, dia tsy hitako izay hofidiko; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa sanganehana eo anelanelan’izy roroa aho, maniry hiala ka ho ao amin’i Kristy, satria tsara lavitra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'kanefa kosa ny hitoetra eo amin’ny nofo no mahasoa anareo kokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary satria matoky izany aho, dia fantatro fa hitoetra sy haharitra eo aminareo rehetra aho hahazoanareo fandrosoana sy fifaliana amin’ny finoanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: mba hitombo noho ny ataoko ny firavoravoanareo ao amin’i Kristy Jesosy amin’ny hankanesako atỳ aminareo indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hany ataoko: aoka ny fitondrantenanareo ho mendrika ny filazantsaran’i Kristy, mba handrenesako ny toetrareo (na ho tonga aho ka hahita anareo, na tsy ho tonga), fa maharitra amin’ny fanahy iray hianareo ka miray fo hiara-miezaka hampandroso ny finoana ny filazantsara, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ka tsy ho azon’ny fahavalo ampitahorina hianareo na amin’inona na amin’inona; fa amin’ireo dia mariky ny fahaverezana izany, nefa mariky ny famonjena anareo kosa, sady avy amin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hianareo efa nomena noho ny an’i Kristy, tsy ny hino Azy ihany, fa ny hiharam-pahoriana koa noho ny aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: dia manana izany ady izany hianareo, izay hitanareo teo amiko sady mbola renareo fa ato amiko ihany ankehitriny.
