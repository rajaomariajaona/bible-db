document_id: JAS.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra ny amin’izay mety hataon’ny mpampianatra, indrindra fa ny tsy hanotany amin’ny lelany, ary ny toetry ny fahendrena avy any ambony.
  - type: text
    content: 'RY rahalahiko, aza dia samy ho mpampianatra be ihany hianareo, satria fantatrareo fa ho mafimafy kokoa no hitsarana anay '
  - type: text
    content: mpampianatra.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Ny vava iray ihany no ivoahan’ny fisaorana sy ny fanozonana.
  - type: text
    content: 'Ry rahalahiko, tsy mety raha misy izany. '
  '11':
  - type: text
    content: 'Moa ny loharano va mamoaka rano mamy sy mangidy eo amin’ny vavany iray ihany? '
  '12':
  - type: text
    content: Ry rahalahiko, ny aviavy va mety mamoa voan’oliva, na ny voaloboka mamoa voan’aviavy? Toy izany ny rano masirasira tsy mba ivoahan’ny mamy.
  '13':
  - type: text
    content: 'Iza eo aminareo no hendry sy manam-pahalalana? Aoka hasehony amin’ny fitondrantena tsara ny asany amin’ny fahalemem-panahin’ny fahendrena. '
  '14':
  - type: text
    content: Fa raha misy fialonana mirehitra
  - type: note
    content: Gr. mangidy.
  - type: text
    content: ' sy fifampiandaniana ao am-ponareo, aza mirehareha na mandainga manohitra ny marina. '
  '15':
  - type: text
    content: 'Izany fahendrena izany dia tsy ny avy any ambony, fa araka ny etỳ an-tany ihany, araka ny nofo, araka ny an’ny demonia. '
  '16':
  - type: text
    content: 'Fa izay misy fialonana sy fifampiandaniana dia misy fikorontanana mbamin’izay asa ratsy rehetra. '
  '17':
  - type: text
    content: Fa ny fahendrena izay avy any ambony dia madio aloha, ary tia fihavanana, mandefitra, mora alahatra, be famindrampo sy be voka-tsoa, tsy miahanahana
  - type: note
    content: 'Na: miangatra.'
  - type: text
    content: ' na mihatsaravelatsihy. '
  '18':
  - type: text
    content: Ary ny vokatry ny fahamarinana dia afafy amin’ny fihavanana ho an’izay mampandroso ny fihavanana.
  - type: note
    content: 'Na: Izay mampandroso ny fihavanana no mamafy ny vokatry ny fahamarinana amin’ny fihavanana.'
  '2':
  - type: text
    content: 'Fa tafintohina amin’ny zavatra maro isika rehetra. Raha misy olona tsy mba tafintohina amin’ny teny, dia izy no lehilahy tanteraka ka mahafehy ny tenany rehetra koa. '
  '3':
  - type: text
    content: 'Ary raha asiantsika lamboridy amin’ny vavan’ny soavaly mba hanarahany antsika, dia mitondra ny tenany rehetra isika. '
  '4':
  - type: text
    content: 'Indreo koa ny sambo, na dia lehibe aza ireny ka entin’ny rivotra mahery, dia ahodin’ny familiana kely foana izy ho any amin’izay tian’ny mpitondra. '
  '5':
  - type: text
    content: Dia toy izany koa ny lela, rantsana kely izy, kanefa mirehareha fatratra. Indro, ny fiavovon’ny antontan-kazo
  - type: note
    content: 'Na: ala.'
  - type: text
    content: ' arehitry ny afo kely! '
  '6':
  - type: text
    content: Ary afo ny lela, dia faharatsiana tsy hita lany; eo amin’ny momba ny tenantsika dia ny lela no mampipentimpentina ny tena rehetra ka mampirehitra izao zavatra ary rehetra izao, sady arehitry ny helo
  - type: note
    content: Gr. Gehena.
  - type: text
    content: ' izy. '
  '7':
  - type: text
    content: Fa folaka avokoa ny karazan’
  - type: note
    content: Gr. fomban’.
  - type: text
    content: ' ny bibi-dia rehetra sy ny vorona sy ny biby mandady sy mikisaka mbamin’ny any an-dranomasina, eny, voafolaky ny olombelona ireny; '
  '8':
  - type: text
    content: 'fa tsy misy olona mahafolaka ny lela; zava-dratsy tsy manam-pijanonana izy sady feno ody mahafaty. '
  '9':
  - type: text
    content: 'Izy no isaorantsika ny Tompo, dia ny Ray; ary izy ihany koa no anozonantsika ny olona, izay natao araka ny endrik’Andriamanitra. '
