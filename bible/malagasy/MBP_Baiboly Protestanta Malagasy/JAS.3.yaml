document_id: JAS.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra ny amin’izay mety hataon’ny mpampianatra, indrindra fa ny tsy hanotany amin’ny lelany, ary ny toetry ny fahendrena avy any ambony.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'RY rahalahiko, aza dia samy ho mpampianatra be ihany hianareo, satria fantatrareo fa ho mafimafy kokoa no hitsarana anay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mpampianatra.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tafintohina amin’ny zavatra maro isika rehetra. Raha misy olona tsy mba tafintohina amin’ny teny, dia izy no lehilahy tanteraka ka mahafehy ny tenany rehetra koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha asiantsika lamboridy amin’ny vavan’ny soavaly mba hanarahany antsika, dia mitondra ny tenany rehetra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indreo koa ny sambo, na dia lehibe aza ireny ka entin’ny rivotra mahery, dia ahodin’ny familiana kely foana izy ho any amin’izay tian’ny mpitondra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia toy izany koa ny lela, rantsana kely izy, kanefa mirehareha fatratra. Indro, ny fiavovon’ny antontan-kazo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ala.
    marker-yv: yv-n
  - type: text
    text: ' arehitry ny afo kely! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary afo ny lela, dia faharatsiana tsy hita lany; eo amin’ny momba ny tenantsika dia ny lela no mampipentimpentina ny tena rehetra ka mampirehitra izao zavatra ary rehetra izao, sady arehitry ny helo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gehena.
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa folaka avokoa ny karazan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fomban’.
    marker-yv: yv-n
  - type: text
    text: ' ny bibi-dia rehetra sy ny vorona sy ny biby mandady sy mikisaka mbamin’ny any an-dranomasina, eny, voafolaky ny olombelona ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa tsy misy olona mahafolaka ny lela; zava-dratsy tsy manam-pijanonana izy sady feno ody mahafaty. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izy no isaorantsika ny Tompo, dia ny Ray; ary izy ihany koa no anozonantsika ny olona, izay natao araka ny endrik’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vava iray ihany no ivoahan’ny fisaorana sy ny fanozonana.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ry rahalahiko, tsy mety raha misy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moa ny loharano va mamoaka rano mamy sy mangidy eo amin’ny vavany iray ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ry rahalahiko, ny aviavy va mety mamoa voan’oliva, na ny voaloboka mamoa voan’aviavy? Toy izany ny rano masirasira tsy mba ivoahan’ny mamy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Iza eo aminareo no hendry sy manam-pahalalana? Aoka hasehony amin’ny fitondrantena tsara ny asany amin’ny fahalemem-panahin’ny fahendrena. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa raha misy fialonana mirehitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mangidy.
    marker-yv: yv-n
  - type: text
    text: ' sy fifampiandaniana ao am-ponareo, aza mirehareha na mandainga manohitra ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izany fahendrena izany dia tsy ny avy any ambony, fa araka ny etỳ an-tany ihany, araka ny nofo, araka ny an’ny demonia. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izay misy fialonana sy fifampiandaniana dia misy fikorontanana mbamin’izay asa ratsy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny fahendrena izay avy any ambony dia madio aloha, ary tia fihavanana, mandefitra, mora alahatra, be famindrampo sy be voka-tsoa, tsy miahanahana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miangatra.
    marker-yv: yv-n
  - type: text
    text: ' na mihatsaravelatsihy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny vokatry ny fahamarinana dia afafy amin’ny fihavanana ho an’izay mampandroso ny fihavanana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay mampandroso ny fihavanana no mamafy ny vokatry ny fahamarinana amin’ny fihavanana.
    marker-yv: yv-n
