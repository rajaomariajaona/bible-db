document_id: 1SA.23,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namonjen’i Davida an’i Keila.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nisy nanambara tamin’i Davida hoe: Indro, ny Filistina mamely an’i Keila ka mamabo ny ao amin’ny famoloana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Davida: Ry Jehovah, Andriamanitry ny Isiraely ô, efa ren’ny mpanomponao tokoa fa Saoly mitady hankatỳ Keila mba handrava ny tanàna noho ny amiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka moa ny mponina etỳ Keila hanolotra ahy ho eo an-tànany va? Hidina etỳ va Saoly toy ny efa ren’ny mpanomponao? Ry Jehovah, Andriamanitry ny Isiraely ô, mifona aminao aho, ambarao amin’ny mpanomponao. Ary hoy Jehovah: Hidina izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Davida: Ny mponina etỳ Keila hanolotra ahy sy ny oloko ho eo an-tànan’i Saoly va? Ary hoy Jehovah: Hanolotra anao izy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia niainga Davida sy ny olony tokony ho enin-jato lahy ka niala tao Keila ary nandeha tamin’izay azony naleha. Ary nolazaina tamin’i Saoly fa efa nandositra niala tao Keila Davida, dia nijanona tsy nandeha izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Davida nitoetra tany an-efitra tao amin’ny batery fiarovana sy nitoetra tany amin’ny tany havoana tany an-efitr’i Zifa. Ary Saoly nitady azy isan-andro, fa Andriamanitra tsy nanolotra azy ho eo an-tànany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitoeran’i Davida tany an-efitr’i Zifa sy Maona, ary ny hevitra nataon’ny Zifita hahazoan’i Saoly azy.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY hitan’i Davida fa Saoly nivoaka hitady ny ainy; fa Davida dia tany an-efitr’i Zifa tany anaty ala.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jonatana, zanak’i Saoly, niainga, dia nankany amin’i Davida tany an-ala ka nampahery ny tànany tamin’Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin’i Davida: Aza matahotra, fa tsy hahazo anao ny tànan’i Saoly raiko; fa hianao no ho mpanjaka amin’ny Isiraely, ary izaho no hanarakaraka anao, ary fantatr’i Saoly raiko koa izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanao fanekena teo anatrehan’i Jehovah izy roa lahy; ary Davida dia nitoetra tany an-ala, fa Jonatana kosa nankany an-tranony.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra nankany amin’i Saoly tany Gibea ny Zifita ka nanao hoe: Tsy miery any aminay ao amin’ny batery fiarovana any an-ala, any amin’ny havoana Hakila, izay atsimon’ny efitra, va Davida? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida nanontany tamin’i Jehovah hoe: Handeha hamely izao Filistina izao va aho? Ary hoy Jehovah tamin’i Davida: Mandehana, asio ny Filistina, ka vonjeo Keila.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny, ry mpanjaka, araka ny fanirian’ny fonao hidina, dia midìna hianao, fa azonay atolotra eo an-tànan’ny mpanjaka izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Saoly: Hotahin’i Jehovah anie hianareo; fa hianareo namindra fo tamiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Masìna hianareo, mandehana, hevero indray, ka tsongoy tsara ny diany, ary fantaro izay nahita azy tany; fa manao saina lalina dia lalina, hono, izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izahao sy fantaro tsara ny fierena rehetra izay iereny, dia miverena etỳ amiko indray hilaza marimarina, ary izaho dia hiaraka aminareo; koa raha mitoetra amin’ny tany izy, dia hotadiaviko eran’ny arivon’i Joda rehetra.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga nankany Zifa ireo hialoha an’i Saoly; fa Davida sy ny olony dia tany amin’ny efitr’i Maona, tamin’ny tani-hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' atsimon’ny efitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandeha Saoly sy ny mpanompony hitady azy. Ary nolazaina tamin’i Davida izany, ka dia nidina tany amin’ny harambato izy ka nitoetra tany an-efitr’i Maona. Ary nony ren’i Saoly izany, dia nanenjika an’i Davida tany an-efitr’i Maona izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Saoly nandeha tamin’ny ilan’ny tendrombohitra iray, fa Davida sy ny olony tamin’ny ilany kosa; ary niezaka mafy handositra Davida noho ny tahony an’i Saoly; fa Saoly sy ny olony saiky nahodidina an’i Davida sy ny olony hisambotra azy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy iraka tonga tao amin’i Saoly nanao hoe: Avia haingana hianao, fa ny Filistina efa manafika ny tany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina Saoly tamin’ny nanenjehany an’i Davida ary nandeha niady tamin’ny Filistina; ary ny anaran’izany tany izany dia nataony hoe Sela-hamalekota.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sela-hamalekota=Harambato fandosirana.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny olon’i Davida taminy: He! atỳ Joda aza isika matahotra, koa mainka raha mankany Keila hiady amin’ny miaramilan’ny Filistina? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany tamin’i Jehovah indray Davida. Ary Jehovah namaly azy hoe: Miaingà, midìna hankany Keila, fa Izaho no hanolotra ny Filistina ho eo an-tànanao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa Davida sy ny olony nankany Keila ary niady tamin’ny Filistina ka namabo ny ombiny sady nahafaty olona be dia be. Ary dia voavonjin’i Davida ny mponina tao Keila.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha nandositra nankany amin’i Davida tany Keila Abiatara, zanak’i Ahimeleka, dia nitondra efoda teny an-tànany izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambara tamin’i Saoly fa tonga tao Keila Davida. Dia hoy Saoly: Andriamanitra efa nanolotra azy ho eo an-tànako, satria efa voahidy izy izao noho ny nidirany amin’ny tanàna misy vavahady mihidy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Saoly namory ny olona rehetra hidina hankany Keila hanafika ka hanao fahirano an’i Davida sy ny olony.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fantatr’i Davida fa Saoly namorona sain-dratsy hamelezana azy; dia hoy izy tamin’i Abiatara mpisorona: Ento etỳ ny efoda. '
