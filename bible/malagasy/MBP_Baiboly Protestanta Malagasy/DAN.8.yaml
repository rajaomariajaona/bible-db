document_id: DAN.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fahavalo anankiray izay nampahory ny olon’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TAMIN’ny taona fahatelo nanjakan’i Belsazara mpanjaka dia nisy fahitana niseho tamiko, izaho Daniela, taorian’ilay niseho tamiko tamin’ny voalohany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nihalehibe izy ka nihatra tamin’ireo maro be eny amin’ny lanitra; ary nisy nazerany ho amin’ny tany ireo maro be sy ny kintana ka nohitsakitsahiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eny, nihalehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: 'Na:'
        - type: text
          text: ' niavonavona.'
      marker-yv: yv-n
    - type: text
      text: ' izy ka dia niady tamin’ny Komandin’ireo maro be, ary nesorina taminy ny fanatitra isan-andro, ary ny fitoerana masina noravana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nisy maro be mbamin’ny fanatitra isan-andro natolotra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: azy
    - type: text
      text: ' noho ny fahadisoana, dia nazerany ho amin’ny tany ny fahamarinana; ary niasa izy sady nambinina.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nandre ny masina anankiray niteny aho, ary nisy masina iray koa nanao tamin’ilay niteny hoe: Mandra-pahoviana ny fahitana mandrakariva'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: 'Na:'
        - type: text
          text: ' ny amin’'
        - type: usfm
          marker: it
          children:
          - type: text
            text: ny fanatitra
        - type: text
          text: ' isan-andro.'
      marker-yv: yv-n
    - type: text
      text: ' sy ny fahotana mahatonga fandravana mba hanolorana ny fitoerana masina sy ireo maro be ho fanitsaka? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hoy izy tamiko: Telon-jato sy roa arivo andro;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Heb.
        - type: text
          text: ' hariva sy maraina.'
      marker-yv: yv-n
    - type: text
      text: ' ary nony afaka izany, dia amin’izay vao hodiovina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Heb.
        - type: text
          text: ' ho marina.'
      marker-yv: yv-n
    - type: text
      text: ' ny fitoerana masina.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nony nahita ny fahitana izaho Daniela ka nitady hahafantatra izany, dia, indro, nisy nanana tarehy tahaka ny olona nitsangana teo anatrehako. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nandre feon’olona tao afovoan’i Olay aho, izay niantso ka nanao hoe: Ry Gabriela, ampahalalao ny fahitana ity lehilahy ity. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary dia nankeo amin’ilay nitsanganako izy; ary nony tonga izy, dia raiki-tahotra aho ka nikarapoka nihohoka; nefa hoy izy tamiko: Aoka ho fantatrao, ry zanak’olona, fa io fahitana io dia milaza ny farany.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary raha niresaka tamiko izy, dia renoky ny torimaso teo amin’ny tany aho; fa izy nanohina nampitsangana ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy izy: Indro, hampahafantariko anao izay ho tonga amin’ny fahatezerana farany; fa ho amin’ny fotoana any am-parany izany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary nahita tamin’ny fahitana aho, ka raha mbola nijery aho, dia, indro, tao Sosana tao amin’ny lapan’ny mpanjaka izay ao amin’ny tany Elama aho; ary nahita tamin’ny fahitana aho, ka teo amoron’ny ony Olay aho.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ilay ondrilahy hitanao nanana tandroka roa dia ny mpanjakan’i Media sy Persia. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny osilahy lava volo dia ny mpanjakan’i Grisia; ary ny tandroka lehibe teo anelanelan’ny masony dia ny mpanjaka voalohany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny amin’ilay efa tapaka, ka nisy efatra nitsangana nandimby azy, dia hisy fanjakana efatra hitsangana avy amin’ny jentilisa, nefa tsy mitovy hery aminy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny hiafaran’ny fanjakany, rehefa tanteraky ny mpanota '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny asany
    - type: text
      text: ', dia hisy mpanjaka hitsangana, izay masia-tarehy sy mahafantatra zavatra saro-pantarina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ho be ny heriny, nefa tsy amin’ny herin’ny tenany; ary mahagaga ny fanimbana hataony; ary hambinina izy ka hahefa ary hanimba ny mahery sy ny olo-masina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ny fahafetseny koa no hahatanteraka ny fitaka eny an-tànany; ary izy hiavonavona am-po ka handringana ny maro amin’izay tsy ampoiziny; ary hitsangana hanohitra ny Andrianan’ny andriana izy, kanjo ho torotoro kosa, nefa tsy hisy tànana hamely azy tsinona. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary dia marina ny amin’ireo andro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Heb.
        - type: text
          text: ' hariva sy maraina.'
      marker-yv: yv-n
    - type: text
      text: ' voalaza ireo, nefa ahoròny ny fahitana, fa mbola ho andro maro izany.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary izaho Daniela dia torana ka nandraiky narary andro vitsivitsy; ary nony afaka izany, dia nitsangana aho ka nanao ny raharahan’ny mpanjaka; ary gaga aho ny amin’ny fahitana, nefa tsy nisy nahafantatra izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia natopiko ny masoko, ka hitako, fa, indro, nisy ondrilahy iray nitsangana teo amoron’ny ony, izay nanana tandroka roa; lava ireo tandroka ireo, ary ny anankiray lava noho ny anankiray, nefa ilay lavalava kokoa no niposaka taoriana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hitako ny ondrilahy manoto miankandrefana sy mianavaratra ary mianatsimo; ary tsy nisy biby nahajanona teo anoloany, ary tsy nisy naharombaka izay mby teny an-tànany; fa nanao araka izay sitrapony izy ka tonga lehibe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: 'Na:'
        - type: text
          text: ' niavonavona.'
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha mbola nandinika aho, dia, indro, nisy osilahy nivoaka avy tany andrefana ka nitety ny tany rehetra, nefa tsy nikasika ny tany; ary ilay osilahy dia nanana tandroka lehibe teo anelanelan’ny masony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izy nankeo amin’ilay ondrilahy nanana tandroka roa, dia ilay efa hitako nitsangana eo amoron’ny ony, ka nanazakazaka azy tamin’ny fahatezeran’ny heriny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hitako nanatona ho eo anilan’ny ondrilahy izy, dia nisafoaka taminy ka namely ny ondrilahy ary nanapaka ny tandrony roa, ka tsy nahajanona teo anoloany intsony ilay ondrilahy, fa nazerany teo amin’ny tany ka nohitsakitsahiny; ary tsy nisy nahavonjy ilay ondrilahy teny an-tànany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary dia nihahery indrindra ilay osilahy; nefa nony nahery izy, dia tapaka ilay tandrony lehibe; ary nisy efatra lehibe nipoitra nisolo iny nifanandrify tamin’ny rivotra efatry ny lanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nisy tandroka kely nipoitra avy tamin’ny anankiray amin’ireny ka nihalehibe indrindra nianatsimo sy niantsinanana ary nankany amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tany
    - type: text
      text: ' mahafinaritra. '
