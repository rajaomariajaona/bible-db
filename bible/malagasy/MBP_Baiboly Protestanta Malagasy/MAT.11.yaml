document_id: MAT.11,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary rehefa vitan’i Jesosy ny nandidiany ny mpianany roa ambin’ny folo lahy, dia niala teo Izy hampianatra sy hitori-teny any an-tanànan’ny olona.
  - type: heading
    content: Ny nanirahan’i Jaona Mpanao-batisa tany amin’i Jesosy, sy ny teny nataon’i Jesosy tamin’izany.
  - type: heading
    content: Lio. 7.18-35.
  '10':
  - type: text
    content: 'Izy no ilay voasoratra hoe:'
  - type: text
    content: ',,Indro, Izaho maniraka ny irako hialoha Anao,'
  - type: text
    content: Izay hamboatra ny làlanao eo alohanao’’ (Mal. 3.1).
  '11':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Amin’izay nateraky ny vehivavy tsy mbola nisy nitsangana izay lehibe noho Jaona Mpanao-batisa; nefa ny kely indrindra amin’ny fanjakan’ny lanitra dia lehibe noho izy. '
  '12':
  - type: text
    content: 'Ary hatramin’ny andron’i Jaona Mpanao-batisa ka mandraka ankehitriny ny fanjakan’ny lanitra dia rombahina, ary ny mpandrombaka maka azy an-keriny. '
  '13':
  - type: text
    content: 'Fa ny mpaminany rehetra sy ny lalàna dia naminany hatramin’i Jaona. '
  '14':
  - type: text
    content: 'Ary raha mety mandray hianareo, dia izy no ilay Elia izay ho avy. '
  '15':
  - type: text
    content: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.
  '16':
  - type: text
    content: 'Fa tahaka ny inona no hanoharako ity taranaka ity? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay miantso ny namany ka manao hoe: '
  '17':
  - type: text
    content: 'Efa nitsoka sodina taminareo izahay, nefa tsy nandihy hianareo, efa nanao feo fisaonana izahay, nefa tsy niteha-tratra hianareo. '
  '18':
  - type: text
    content: 'Fa tonga Jaona tsy nihinana na nisotro, ka hoy ny olona: Manana demonia izy. '
  '19':
  - type: text
    content: 'Tonga ny Zanak’olona mihinana sy misotro kosa, ka hoy ny olona: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. Fa ny fahendrena dia hamarinin’ny asany.'
  - type: note
    content: 'Na: [ny zanany].'
  - type: heading
    content: Ny nitenenan’i Jesosy mafy ny tanàna izay efa nanaovany fahagagana maro.
  - type: heading
    content: Lio. 10.12-16?
  '2':
  - type: text
    content: 'ARY rehefa ren’i Jaona tao an-trano-maizina ny asa nataon’i Kristy, dia naniraka ny mpianany izy '
  '20':
  - type: text
    content: 'ARY tamin’izany dia vao niteny mafy ny tanàna izay nanaovany ny ankamaroan’ny asany lehibe Izy, satria tsy nibebaka ireo, ka nanao hoe: '
  '21':
  - type: text
    content: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! fa raha mba tany Tyro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho efa nibebaka ela tamin’ny lamba fisaonana sy ny lavenona ireny. '
  '22':
  - type: text
    content: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’i Tyro sy Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  '23':
  - type: text
    content: Ary hianao, ry Kapernaomy, hasandratra hatrany an-danitra va hianao? Hietry hatrany amin’ny fiainan-tsi-hita
  - type: note
    content: Gr. Hadesy.
  - type: text
    content: ' hianao; fa raha mba tany Sodoma no natao ny asa lehibe izay natao teo aminao, dia ho naharitra ambaraka andro-any izy. '
  '24':
  - type: text
    content: Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’ny tany Sodoma amin’ny andro fitsarana noho ny ho aminao.
  '25':
  - type: text
    content: 'Tamin’izany andro izany dia namaly Jesosy ka nanao hoe: Midera Anao Aho, Raiko, Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany zavatra izany ka nasehonao tamin’ny zaza madinika. '
  '26':
  - type: text
    content: 'Eny, Raiko; fa izany no sitraponao. '
  '27':
  - type: text
    content: Ny zavatra rehetra natolotry ny Raiko Ahy; ary tsy misy mahalala tsara ny Zanaka, afa-tsy ny Ray; ary tsy misy mahalala tsara ny Ray, afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
  '28':
  - type: text
    content: 'Mankanesa atỳ amiko, hianareo rehetra izay miasa fatratra sy mavesatra entana, fa Izaho no hanome anareo fitsaharana. '
  '29':
  - type: text
    content: 'Ento ny ziogako, ka mianara amiko; fa malemy fanahy sady tsy miavona am-po Aho; dia hahita fitsaharana ho an’ny fanahinareo hianareo. '
  '3':
  - type: text
    content: 'hanao aminy hoe: Hianao va Ilay ho avy, sa mbola hafa no andrasantsika? '
  '30':
  - type: text
    content: Fa mora ny ziogako, ary maivana ny entako.
  '4':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Mandehana hianareo, ka ambarao amin’i Jaona izao renareo sy hitanareo izao: '
  '5':
  - type: text
    content: 'Mahiratra ny jamba, ary afaka ny mandringa; diovina ny boka, ary malady ny marenina; atsangana ny maty, ary ny malahelo dia itoriana ny filazantsara. '
  '6':
  - type: text
    content: Ary sambatra izay tsy ho tafintohina noho ny amiko.
  '7':
  - type: text
    content: 'Ary nony lasa ireny, dia vao nilaza an’i Jaona tamin’ny vahoaka Jesosy ka nanao hoe: Hizaha inona no nivoahanareo nankany an-efitra? Volotara nohozongozonin’ny rivotra va? '
  '8':
  - type: text
    content: Sa hizaha inona no nivoahanareo? Olona mitafy soa
  - type: note
    content: Gr. malemy.
  - type: text
    content: ' va? Indro, ny mitafy soa'
  - type: note
    content: Gr. malemy.
  - type: text
    content: ' dia ao an-tranon’ny mpanjaka. '
  '9':
  - type: text
    content: 'Sa hizaha inona no nivoahanareo? Mpaminany va? Eny, hoy Izaho aminareo, sady mihoatra lavitra noho ny mpaminany izy. '
