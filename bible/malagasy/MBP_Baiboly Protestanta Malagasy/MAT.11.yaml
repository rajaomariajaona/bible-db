document_id: MAT.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary rehefa vitan’i Jesosy ny nandidiany ny mpianany roa ambin’ny folo lahy, dia niala teo Izy hampianatra sy hitori-teny any an-tanànan’ny olona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanirahan’i Jaona Mpanao-batisa tany amin’i Jesosy, sy ny teny nataon’i Jesosy tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 7.18-35.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ARY rehefa ren’i Jaona tao an-trano-maizina ny asa nataon’i Kristy, dia naniraka ny mpianany izy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hanao aminy hoe: Hianao va Ilay ho avy, sa mbola hafa no andrasantsika? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Mandehana hianareo, ka ambarao amin’i Jaona izao renareo sy hitanareo izao: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mahiratra ny jamba, ary afaka ny mandringa; diovina ny boka, ary malady ny marenina; atsangana ny maty, ary ny malahelo dia itoriana ny filazantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary sambatra izay tsy ho tafintohina noho ny amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony lasa ireny, dia vao nilaza an’i Jaona tamin’ny vahoaka Jesosy ka nanao hoe: Hizaha inona no nivoahanareo nankany an-efitra? Volotara nohozongozonin’ny rivotra va? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sa hizaha inona no nivoahanareo? Olona mitafy soa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malemy.
    marker-yv: yv-n
  - type: text
    text: ' va? Indro, ny mitafy soa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malemy.
    marker-yv: yv-n
  - type: text
    text: ' dia ao an-tranon’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sa hizaha inona no nivoahanareo? Mpaminany va? Eny, hoy Izaho aminareo, sady mihoatra lavitra noho ny mpaminany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izy no ilay voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Indro, Izaho maniraka ny irako hialoha Anao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hamboatra ny làlanao eo alohanao’’ (Mal. 3.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Amin’izay nateraky ny vehivavy tsy mbola nisy nitsangana izay lehibe noho Jaona Mpanao-batisa; nefa ny kely indrindra amin’ny fanjakan’ny lanitra dia lehibe noho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hatramin’ny andron’i Jaona Mpanao-batisa ka mandraka ankehitriny ny fanjakan’ny lanitra dia rombahina, ary ny mpandrombaka maka azy an-keriny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny mpaminany rehetra sy ny lalàna dia naminany hatramin’i Jaona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha mety mandray hianareo, dia izy no ilay Elia izay ho avy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa tahaka ny inona no hanoharako ity taranaka ity? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay miantso ny namany ka manao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efa nitsoka sodina taminareo izahay, nefa tsy nandihy hianareo, efa nanao feo fisaonana izahay, nefa tsy niteha-tratra hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tonga Jaona tsy nihinana na nisotro, ka hoy ny olona: Manana demonia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tonga ny Zanak’olona mihinana sy misotro kosa, ka hoy ny olona: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. Fa ny fahendrena dia hamarinin’ny asany.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ny zanany].'
    marker-yv: yv-n
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitenenan’i Jesosy mafy ny tanàna izay efa nanaovany fahagagana maro.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 10.12-16?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY tamin’izany dia vao niteny mafy ny tanàna izay nanaovany ny ankamaroan’ny asany lehibe Izy, satria tsy nibebaka ireo, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lozanao, ry Korazina! Lozanao, ry Betsaida! fa raha mba tany Tyro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho efa nibebaka ela tamin’ny lamba fisaonana sy ny lavenona ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’i Tyro sy Sidona amin’ny andro fitsarana noho ny ho aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hianao, ry Kapernaomy, hasandratra hatrany an-danitra va hianao? Hietry hatrany amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' hianao; fa raha mba tany Sodoma no natao ny asa lehibe izay natao teo aminao, dia ho naharitra ambaraka andro-any izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa lazaiko aminareo fa ho moramora kokoa ny ho amin’ny tany Sodoma amin’ny andro fitsarana noho ny ho aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tamin’izany andro izany dia namaly Jesosy ka nanao hoe: Midera Anao Aho, Raiko, Tompon’ny lanitra sy ny tany, fa nafeninao tamin’ny hendry sy ny manan-tsaina izany zavatra izany ka nasehonao tamin’ny zaza madinika. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Eny, Raiko; fa izany no sitraponao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny zavatra rehetra natolotry ny Raiko Ahy; ary tsy misy mahalala tsara ny Zanaka, afa-tsy ny Ray; ary tsy misy mahalala tsara ny Ray, afa-tsy ny Zanaka sy izay tian’ny Zanaka hanehoana Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mankanesa atỳ amiko, hianareo rehetra izay miasa fatratra sy mavesatra entana, fa Izaho no hanome anareo fitsaharana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ento ny ziogako, ka mianara amiko; fa malemy fanahy sady tsy miavona am-po Aho; dia hahita fitsaharana ho an’ny fanahinareo hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa mora ny ziogako, ary maivana ny entako.
