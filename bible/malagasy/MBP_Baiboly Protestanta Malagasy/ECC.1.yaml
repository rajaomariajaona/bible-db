document_id: ECC.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarihan-teny milaza ny maha-zava-poana ny zavatra rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: NY tenin’i Mpitoriteny, zanak’i Davida, mpanjaka tany Jerosalema.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy zavatra azo lazaina hoe: He! ity no vaovao, dia ilay efa teo ela tany amin’ny andro talohantsika ihany izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy fahatsiarovana ny taloha; ary ny ho avy koa dia tsy hotsarovan’izay handimby azy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tsy ahitana fahafaham-po, na dia amin’ny fitadiavam-pahendrena aza.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAHO Mpitoriteny dia mpanjakan’ny Isiraely tany Jerosalema; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary nampiasaiko ny foko mba hitady sy hikatsaka amim-pahendrena ny zavatra rehetra izay atao atỳ ambanin’ny lanitra; asa mahareraka omen’Andriamanitra hisasaran’ny zanak’olombelona izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa hitako ny zavatra rehetra izay atao atỳ ambanin’ny masoandro; fa, indro, zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: homan-drivotra.
      marker-yv: yv-n
    - type: text
      text: ' foana izany rehetra izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny meloka tsy mety tonga mahitsy; ary ny tsy ao tsy mba azo isaina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ny tsi-fahampiana dia tsy tambo isaina.'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izaho tamin’ny foko: Indro, izaho nahazo fahendrena be dia be mihoatra noho izay rehetra talohako teto Jerosalema; eny, ny foko nahita ny fahendrena sy ny fahalalana betsaka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampiasaiko ny foko hahalala fahendrena sy hahalala fahaverezan-tsaina sy fahadalana; dia fantatro fa misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana koa izany, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: satria izay be fahendrena dia be alahelo, ary izay mitombo fahalalana dia mitombo fahoriana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zava-poana dia zava-poana, hoy Mpitoriteny, zava-poana dia zava-poana, eny, zava-poana ny zavatra rehetra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inona no soa azon’ny olona amin’ny fisasarany rehetra izay isasarany atỳ ambanin’ny masoandro?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lasa ny taranaka iray, ary mandimby kosa ny taranaka iray; fa ny tany mbola maharitra mandrakizay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny masoandro koa miposaka, ary ny masoandro milentika sady miriotra ho any amin’ny fitoerana izay niposahany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mianatsimo ny rivotra, dia mihodina mianavaratra, mivezivezy mandrakariva izy ka miverimberina manodidina indray. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny renirano rehetra dia samy mankamin’ny ranomasina, nefa tsy tondraka ny ranomasina; any amin’izay falehan’ny reni
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Feno fahasasarana ny zavatra rehetra ka tsy hain’ny olona lazaina.
      marker-yv: yv-n
    - type: text
      text: ' rano ihany no iverenany indray. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maivana-ny teny rehetra, ka tsy misy olona mahalaza; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Feno fahasasarana.
      marker-yv: yv-n
    - type: text
      text: ny maso tsy mamo mijery, ary ny sofina tsy mamo mihaino.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay efa teo ihany no ho tonga indray, ary izay efa natao ihany no mbola hatao indray; fa tsy misy zava-baovao akory atỳ ambanin’ny masoandro. '
