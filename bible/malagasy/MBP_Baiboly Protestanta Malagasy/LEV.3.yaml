document_id: LEV.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fanati-pihavanana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raha fanati-pihavanana no fanatiny, ka ombilahy na ombivavy no ateriny, dia izay tsy misy kilema no hateriny eo anatrehan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hametraka ny tànany amin’ny lohan’ny fanatiny izy, dia hamono azy eo anoloan’ny varavaran’ny trano-lay fihaonana; ary ireo mpisorona, zanak’i Arona, hanopy ny ra manodidina amin’ny lafin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hangalan’ny mpisorona ny fanati-pihavanana, ka hateriny ho fanatitra atao amin’ny afo ho an’i Jehovah, dia ny safodrorohany sy ny saboran-tsinainy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sy ny voany roa mbamin’ny fonom-boany, izay eo amin’ny takibany, ary ny ila-atiny lehibe;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' hataony indray manala amin’ny voany no fanaisony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ireo zanak’i Arona dia handoro izany ho fofona eo ambonin’ny alitara miaraka amin’ny fanatitra dorana izay eo ambonin’ny kitay eo amin’ny afo; dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha ondry na osy no ateriny ho fanati-pihavanana ho an’i Jehovah, dia izay tsy misy kilema, na lahy na vavy, no hateriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha zanak’ondry no hateriny ho fanatiny, dia hanatitra azy eo anatrehan’i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hametraka ny tànany amin’ny lohan’ny fanatiny izy, dia hamono azy eo anoloan’ny trano-lay fihaonana; ary ireo zanak’i Arona hanopy ny ra manodidina amin’ny lafin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hangalan’ireo ny fanati-pihavanana ka hateriny ho fanatitra atao amin’ny afo ho an’i Jehovah, dia ny hofany manontolo (faranana hatreo amin’ny faran’ny taolan-damosina no fanaisony izany) sy ny saborany, dia ny safodrorohany sy ny saboran-tsinainy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary ny voany roa mbamin’ny fonom-boany, izay eo amin’ny takibany, sy ny ila-atiny lehibe;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' hataony indray manala amin’ny voany no fanaisony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny mpisorona dia handoro izany ho fofona eo ambonin’ny alitara; hanina avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha osy no fanatiny, dia hanatitra azy eo anatrehan’i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hametraka ny tànany amin’ny lohany izy, dia hamono azy eo anoloan’ny trano-lay fihaonana; ary ireo zanak’i Arona dia hanopy ny ra manodidina amin’ny lafin’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary avy aminy no hanaterany ny fanatiny atao amin’ny afo ho an’i Jehovah, dia ny safodrorohany sy ny saboran-tsinainy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary ny voany roa mbamin’ny fonom-boany, izay eo amin’ny takibany, sy ny ila-atiny lehibe;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: saron’atiny.
    marker-yv: yv-n
  - type: text
    text: ' hataony indray manala amin’ny voany no fanaisony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny mpisorona handoro azy ho fofona eo ambonin’ny alitara; hanina avy amin’ny fanatitra atao amin’ny afo ho hanitra ankasitrahana izany; an’i Jehovah ny sabora rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao no ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby eny amin’izay rehetra itoeranareo: tsy hihinana sabora na ra akory hianareo.'
