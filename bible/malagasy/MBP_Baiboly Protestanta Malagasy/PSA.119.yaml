document_id: PSA.119,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fankalazana ny lalàn’Andriamanitra.
  - type: heading
    content: ALEFA.
  - type: text
    content: SAMBATRA ny mahitsy làlana,
  - type: text
    content: Izay mandeha araka ny lalàn’i Jehovah.
  '10':
  - type: text
    content: Tamin’ny foko rehetra no nitadiavako Anao;
  - type: text
    content: Aza avela hivily hiala amin’ny didinao aho.
  '100':
  - type: text
    content: Hendry noho ny anti-panahy aho,
  - type: text
    content: Satria ny didinao no notandremako.
  '101':
  - type: text
    content: Efa narovako ny tongotro tsy ho amin’izay làlan-dratsy,
  - type: text
    content: Mba hitandremako ny teninao.
  '102':
  - type: text
    content: Tsy mba miala amin’ny fitsipikao aho;
  - type: text
    content: Fa Hianao no mampianatra ahy.
  '103':
  - type: text
    content: Endrey ny hamamin’ny teninao, raha andramako!
  - type: text
    content: Mihoatra noho ny tantely ato am-bavako aza!
  '104':
  - type: text
    content: Ny didinao no nahazoako fahalalana;
  - type: text
    content: Izany no ankahalako ny làlam-pitaka rehetra.
  - type: heading
    content: NONA.
  '105':
  - type: text
    content: Fanilon’ny tongotro
  - type: text
    content: Sy fanazavana ny làlako ny teninao.
  '106':
  - type: text
    content: Efa nianiana aho fa hitandrina ny fitsipikao marina,
  - type: text
    content: Ka nefaiko izany.
  '107':
  - type: text
    content: Ampahorina indrindra aho;
  - type: text
    content: Jehovah ô, velomy aho araka ny teninao.
  '108':
  - type: text
    content: Jehovah ô, aoka anie mba hankasitrahanao ny fanati-tsitrapo aloaky ny vavako,
  - type: text
    content: Ary ampianaro ahy ny fitsipikao.
  '109':
  - type: text
    content: An-tenda
  - type: note
    content: Heb. An-tànako.
  - type: text
    content: ' ihany ny aiko mandrakariva;'
  - type: text
    content: Kanefa tsy manadino ny lalànao aho.
  '11':
  - type: text
    content: Ato am-poko no iraketako ny teninao,
  - type: text
    content: Mba tsy hanotako aminao.
  '110':
  - type: text
    content: Ny ratsy fanahy mamela-pandrika haningotra ahy;
  - type: text
    content: Kanefa tsy mania miala amin’ny didinao aho.
  '111':
  - type: text
    content: Efa noraisiko ho lovako mandrakizay ny teni-vavolombelonao,
  - type: text
    content: Satria fifalian’ny foko izany.
  '112':
  - type: text
    content: Apetrako ny foko hankatò ny didinao
  - type: text
    content: Mandrakizay hatramin’ny farany.
  - type: heading
    content: SAMEKA.
  '113':
  - type: text
    content: Halako ny mpiroa saina;
  - type: text
    content: Fa ny lalànao no tiako.
  '114':
  - type: text
    content: Fiereko sy ampingako Hianao;
  - type: text
    content: Ny teninao no andrasako.
  '115':
  - type: text
    content: Mialà amiko hianareo mpanao ratsy,
  - type: text
    content: Mba hitandremako ny didin’Andriamanitro.
  '116':
  - type: text
    content: Tohàny aho araka ny teninao, mba ho velona,
  - type: text
    content: Ary aoka tsy ho menatra amin’ny fanantenako aho.
  '117':
  - type: text
    content: Tohàny aho mba ho voavonjy,
  - type: text
    content: Ka ho faly hijery ny didinao mandrakariva.
  '118':
  - type: text
    content: Ataonao tsinontsinona izay rehetra mania amin’ny didinao;
  - type: text
    content: Fa famitahan-tena ihany ny laingany.
  '119':
  - type: text
    content: Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin’ny tany;
  - type: text
    content: Izany no itiavako ny teni-vavolombelonao.
  '12':
  - type: text
    content: Isaorana anie Hianao, Jehovah ô;
  - type: text
    content: Ampianaro ahy ny didinao.
  '120':
  - type: text
    content: Mipararetra ny nofoko ny fahatahorana Anao,
  - type: text
    content: Ary matahotra ny fitsaranao aho.
  - type: heading
    content: AINA.
  '121':
  - type: text
    content: Manaraka ny fitsipika sy ny fahamarinana aho;
  - type: text
    content: Aza manolotra ahy ho amin’ny mpampahory ahy.
  '122':
  - type: text
    content: Iantohy mba ho soa ny mpanomponao;
  - type: text
    content: Aza avela hampahory ahy ny mpirehareha.
  '123':
  - type: text
    content: Pahina ny masoko miandry ny famonjenao
  - type: text
    content: Sy ny tenin’ny fahamarinanao.
  '124':
  - type: text
    content: Ataovy amin’ny mpanomponao araka ny famindramponao;
  - type: text
    content: Ary ampianaro ahy ny didinao.
  '125':
  - type: text
    content: Mpanomponao aho, ka ampianaro,
  - type: text
    content: Mba ho fantatro ny teni-vavolombelonao.
  '126':
  - type: text
    content: Efa andro tokony hampisehoan’i Jehovah ny heriny
  - type: note
    content: Heb. hiasan’i Jehovah.
  - type: text
    content: ' izao;'
  - type: text
    content: Fa nandika ny lalànao ny olona.
  '127':
  - type: text
    content: Izany no itiavako ny didinao mihoatra noho ny volamena,
  - type: text
    content: Eny, noho ny tena volamena aza.
  '128':
  - type: text
    content: Izany no iheverako ny didy rehetra ho marina avokoa;
  - type: text
    content: Halako ny làlam-pitaka rehetra.
  - type: heading
    content: PE.
  '129':
  - type: text
    content: Mahagaga ny teni-vavolombelonao,
  - type: text
    content: Ka dia mitandrina azy ny fanahiko.
  '13':
  - type: text
    content: Ny molotro no nentiko nilaza
  - type: text
    content: Ny fitsipika rehetra naloaky ny vavanao.
  '130':
  - type: text
    content: Mahazava ny famoahana ny hevitry ny teninao
  - type: text
    content: Ka manome fahalalana ho an’ny kely saina.
  '131':
  - type: text
    content: Mitanatana vava aho ka mihanahana,
  - type: text
    content: Fa ny didinao no iriko.
  '132':
  - type: text
    content: Todiho aho, ka mamindrà fo amiko,
  - type: text
    content: Araka ny tokony ho anjaran’izay tia ny anaranao.
  '133':
  - type: text
    content: Ampitoero eo amin’ny teninao ny diako;
  - type: text
    content: Ary aza avela hanapaka ahy izay mety ho faharatsiana.
  '134':
  - type: text
    content: Vonjeo amin’ny fampahorian’ny olona aho,
  - type: text
    content: Dia hitandrina ny didinao.
  '135':
  - type: text
    content: Ampamirapirato amin’ny mpanomponao ny tavanao;
  - type: text
    content: Ary ampianaro ahy ny didinao.
  '136':
  - type: text
    content: Rano mandriaka no mijononoka amin’ny masoko
  - type: text
    content: Noho ny tsi-fitandreman’ny olona ny lalànao.
  - type: heading
    content: TSADE.
  '137':
  - type: text
    content: Marina Hianao, Jehovah ô,
  - type: text
    content: Ary mahitsy ny fitsipikao.
  '138':
  - type: text
    content: Efa voadidinao amin’ny fahamarinana
  - type: text
    content: Sy ny fahatokiana indrindra ny teni-vavolombelonao.
  '139':
  - type: text
    content: Efa maharìtra aina ahy ny fahasaro-piaroko,
  - type: text
    content: Satria nanadino ny teninao ny mpandrafy ahy.
  '14':
  - type: text
    content: Ny làlan’ny teni-vavolombelonao no ifaliako,
  - type: text
    content: Tahaka ny ifaliako amin’ny harena rehetra.
  '140':
  - type: text
    content: Voazaha toetra tamin’ny memy ny teninao,
  - type: text
    content: Ka dia tian’ny mpanomponao.
  '141':
  - type: text
    content: Kely aho ka natao ho tsinontsinona;
  - type: text
    content: Nefa tsy hadinoiko ny didinao.
  '142':
  - type: text
    content: Ny fahamarinanao dia fahamarinana mandrakizay,
  - type: text
    content: Ary marina ny lalànao.
  '143':
  - type: text
    content: Fahoriana sy fahaterena no nahazo ahy;
  - type: text
    content: Ny didinao no firavoravoako.
  '144':
  - type: text
    content: Ny fahamarinan’ny teni-vavolombelonao dia mandrakizay;
  - type: text
    content: Ampianaro aho, mba ho velona.
  - type: heading
    content: KOFA.
  '145':
  - type: text
    content: 'Ny foko rehetra no nentiko nitaraina hoe: Valio aho, Jehovah ô;'
  - type: text
    content: Ny didinao no hotandremako;
  '146':
  - type: text
    content: 'Nitaraina taminao aho nanao hoe: Vonjeo aho,'
  - type: text
    content: Dia hitandrina ny didinao.
  '147':
  - type: text
    content: Raha mbola tsy nazavaratsy aza ny andro, dia nitaraina aho;
  - type: text
    content: Ny teninao no andrasako.
  '148':
  - type: text
    content: Nialoha ny fiambenana amin’ny alina ny masoko,
  - type: text
    content: Mba hisaintsainako ny teninao.
  '149':
  - type: text
    content: Henoy ny feoko araka ny famindramponao, Jehovah ô,
  - type: text
    content: Velomy aho araka ny fitsipikao.
  '15':
  - type: text
    content: Ny didinao no hosaintsainiko,
  - type: text
    content: Ary hodinihiko ny làlanao.
  '150':
  - type: text
    content: Efa mby akaiky izay fatra-panaraka ny ratsy,
  - type: text
    content: Dia izay manalavitra ny lalànao.
  '151':
  - type: text
    content: Akaiky Hianao, Jehovah ô;
  - type: text
    content: Ary marina ny didinao rehetra.
  '152':
  - type: text
    content: Efa fantatro ela tamin’ny tenivavolombelonao
  - type: text
    content: Fa nampitoerinao ho mandrakizay ireny.
  - type: heading
    content: RESY.
  '153':
  - type: text
    content: Jereo ny fahoriako, ka vonjeo aho;
  - type: text
    content: Fa ny lalànao tsy mba hadinoiko.
  '154':
  - type: text
    content: Soloy vava aho, ka vonjeo;
  - type: text
    content: Velomy aho araka ny teninao.
  '155':
  - type: text
    content: Lavitra ny ratsy fanahy ny famonjena,
  - type: text
    content: Satria ny didinao tsy tadiaviny.
  '156':
  - type: text
    content: Lehibe ny antranao, Jehovah ô;
  - type: text
    content: Velomy aho araka ny fitsipikao.
  '157':
  - type: text
    content: Maro ny mpanenjika sy mpandrafy ahy;
  - type: text
    content: Tsy mba niala tamin’ny teni-vavolombelonao aho.
  '158':
  - type: text
    content: Mijery ny mpivadika aho, ka maharikoriko ahy ireny,
  - type: text
    content: Dia izay tsy nitandrina ny teninao.
  '159':
  - type: text
    content: He ny fitiavako ny didinao!
  - type: text
    content: Jehovah ô, velomy aho araka ny famindramponao.
  '16':
  - type: text
    content: Ny didinao no hiravoravoako;
  - type: text
    content: Tsy hohadinoiko ny teninao.
  - type: heading
    content: GIMELA.
  '160':
  - type: text
    content: Fahamarinana no tontalin-kevitry ny teninao;
  - type: text
    content: Ary mandrakizay ny fitsipikao marina rehetra.
  - type: heading
    content: SINA.
  '161':
  - type: text
    content: Na dia ny mpanapaka aza dia nanenjika ahy tsy ahoan-tsy ahoana;
  - type: text
    content: Nefa ny teninao no atahoran’ny foko.
  '162':
  - type: text
    content: Faly aho noho ny teninao
  - type: text
    content: Tahaka ny mahazo babo be.
  '163':
  - type: text
    content: Halako ny lainga ka ataoko ho fahavetavetana;
  - type: text
    content: Ny lalànao no tiako.
  '164':
  - type: text
    content: Impito isan-andro no iderako Anao
  - type: text
    content: Noho ny fitsipikao marina.
  '165':
  - type: text
    content: Be fiadanana izay tia ny lalànao,
  - type: text
    content: Ary tsy misy mahatafintohina azy.
  '166':
  - type: text
    content: Miandry ny famonjenao aho, Jehovah ô,
  - type: text
    content: Ka mankatô ny didinao.
  '167':
  - type: text
    content: Mitandrina ny teni-vavolombelonao ny fanahiko,
  - type: text
    content: Ka tiako indrindra izy.
  '168':
  - type: text
    content: Mitandrina ny didinao sy ny teni-vavolombelonao aho;
  - type: text
    content: Fa ny làlan-kalehako rehetra dia eo anatrehanao.
  - type: heading
    content: TAO.
  '169':
  - type: text
    content: Aoka anie ho tonga eo anatrehanao ny fitarainako, Jehovah ô;
  - type: text
    content: Ampianaro aho araka ny teninao.
  '17':
  - type: text
    content: Asio soa aho mpanomponao, mba ho velona
  - type: text
    content: Ka hitandrina ny teninao.
  '170':
  - type: text
    content: Aoka anie ho tonga eo anatrehanao ny fifonako;
  - type: text
    content: Vonjeo aho araka ny teninao.
  '171':
  - type: text
    content: Aoka hiboiboika fiderana ny molotro,
  - type: text
    content: Fa ampianarinao ahy ny didinao.
  '172':
  - type: text
    content: Hihira ny teninao ny lelako,
  - type: text
    content: Fa marina ny didinao rehetra.
  '173':
  - type: text
    content: Aoka anie hamonjy ahy ny tànanao;
  - type: text
    content: Fa efa nifidy ny didinao aho.
  '174':
  - type: text
    content: Efa manina ny famonjenao aho, Jehovah ô;
  - type: text
    content: Ary ny lalànao no firavoravoako.
  '175':
  - type: text
    content: Aoka anie ho velona ny fanahiko ka hidera Anao;
  - type: text
    content: Ary aoka anie hamonjy ahy ny fitsaranao.
  '176':
  - type: text
    content: Efa nania aho; tadiavo ny mpanomponao toy ny fitady ondry very;
  - type: text
    content: Fa ny didinao tsy mba hadinoiko.
  '18':
  - type: text
    content: Ampahirato ny masoko, mba hahitako
  - type: text
    content: Zava-mahagaga ao amin’ny lalànao.
  '19':
  - type: text
    content: Vahiny etỳ an-tany aho;
  - type: text
    content: Aza afeninao ahy ny didinao.
  '2':
  - type: text
    content: Sambatra izay mitandrina ny teni-vavolombelony
  - type: text
    content: Ka mitady Azy amin’ny fo rehetra;
  '20':
  - type: text
    content: Torotoro ny fanahiko noho ny faniriany
  - type: text
    content: Ny fitsipikao mandrakariva.
  '21':
  - type: text
    content: Voateninao mafy ny mpirehareha, dia ny olom-boaozona,
  - type: text
    content: Izay mania miala amin’ny didinao.
  '22':
  - type: text
    content: Esory amiko ny fahafaham-baraka sy ny fanamavoana;
  - type: text
    content: Fa efa nitandrina ny teni-vavolombelonao aho.
  '23':
  - type: text
    content: Na dia ny mpanapaka aza dia mipetraka, ka iokoany aho;
  - type: text
    content: Izaho mpanomponao misaintsaina ny didinao.
  '24':
  - type: text
    content: Ny teni-vavolombelonao koa no firavoravoako,
  - type: text
    content: Eny, mpanolo-tsaina ahy izany.
  - type: heading
    content: DALETA.
  '25':
  - type: text
    content: Miraikitra amin’ny vovoka ny fanahiko;
  - type: text
    content: Velomy aho araka ny teninao.
  '26':
  - type: text
    content: Ny làlako no nolazaiko, ary namaly ahy Hianao;
  - type: text
    content: Ampianaro ahy ny didinao.
  '27':
  - type: text
    content: Ampahalalao ahy ny làlan’ny didinao;
  - type: text
    content: Dia hoheveriko ny fahagagana nataonao.
  '28':
  - type: text
    content: Mipotrapotra-dranomaso aho noho ny alaheloko;
  - type: text
    content: Ampaherezo aho araka ny teninao.
  '29':
  - type: text
    content: Ny làlan’ny lainga no esory amiko;
  - type: text
    content: Ary ny lalànao no anasoavy ahy.
  '3':
  - type: text
    content: Eny, izay tsy manao ratsy,
  - type: text
    content: Fa mandeha araka ny làlany.
  '30':
  - type: text
    content: Ny làlan’ny fahamarinanao no fidiko;
  - type: text
    content: 'Apetrako '
  - type: text
    content: eo anatrehako
  - type: text
    content: ' ny fitsipikao.'
  '31':
  - type: text
    content: Mifikitra amin’ny teni-vavolombelonao aho;
  - type: text
    content: Jehovah ô, aza avela ho azon-kenatra aho.
  '32':
  - type: text
    content: Ny làlan’ny didinao no ihazakazahako,
  - type: text
    content: Fa
  - type: note
    content: 'Na: Raha.'
  - type: text
    content: ' ampahalalahinao ny foko.'
  - type: heading
    content: HE.
  '33':
  - type: text
    content: Jehovah ô, toroy ny làlan’ny didinao aho;
  - type: text
    content: Dia hotandremako hatramin’ny farany izany.
  '34':
  - type: text
    content: Omeo fahalalana aho mba hitandrina ny lalànao;
  - type: text
    content: Eny, hitandrina azy amin’ny foko rehetra aho.
  '35':
  - type: text
    content: Ampandehano amin’ny làlan’ny didinao aho;
  - type: text
    content: Fa izany no sitrako.
  '36':
  - type: text
    content: Amporisiho ny foko ho amin’ny teni-vavolombelonao,
  - type: text
    content: Fa tsy ho amin’ny fieremana.
  '37':
  - type: text
    content: Avilio ny masoko tsy hijery zava-poana;
  - type: text
    content: Velomy amin’ny làlanao aho.
  '38':
  - type: text
    content: Tovy ny teninao amin’ny mpanomponao,
  - type: text
    content: Izay matahotra Anao indrindra.
  - type: note
    content: Tovy amin’ny mpanomponao ny teninao, Izay mahatonga ny fahatahorana Anao.
  '39':
  - type: text
    content: Esory ny fahafaham-baraka, izay atahorako;
  - type: text
    content: Fa tsara ny fitsipikao.
  '4':
  - type: text
    content: Hianao namoaka ny didinao
  - type: text
    content: Mba hotandremana tsara.
  '40':
  - type: text
    content: Indro, manina ny didinao aho,
  - type: text
    content: Velomy amin’ny fahamarinanao.
  - type: heading
    content: VAO.
  '41':
  - type: text
    content: Aoka ho tonga amiko ny famindramponao, Jehovah ô,
  - type: text
    content: Dia ny famonjenao, araka ny teninao.
  '42':
  - type: text
    content: Dia hamaly izay miteny ratsy ahy aho,
  - type: text
    content: Satria matoky ny teninao.
  '43':
  - type: text
    content: Ary aza dia esorina amin’ny vavako ny teny marina;
  - type: text
    content: Fa miandry ny fitsaranao aho.
  '44':
  - type: text
    content: Dia hitandrina ny lalànao mandrakariva aho,
  - type: text
    content: Dia mandrakizay doria.
  '45':
  - type: text
    content: Ary handeha amin’ny malalaka aho;
  - type: text
    content: Fa ny didinao no tadiaviko.
  '46':
  - type: text
    content: Hilaza ny teni-vavolombelonao eo anatrehan’ireo mpanjaka aho
  - type: text
    content: Ka tsy ho menatra.
  '47':
  - type: text
    content: Ary hiravoravo amin’ny didinao aho,
  - type: text
    content: Satria tiako ireny.
  '48':
  - type: text
    content: Hasandratro ny tànako ho amin’ny didinao, satria tiako ireny;
  - type: text
    content: Hosaintsainiko ny didinao.
  - type: heading
    content: ZAINA.
  '49':
  - type: text
    content: Tsarovy ny teny natao tamiko mpanomponao,
  - type: text
    content: Izay nampanantenanao ahy.
  - type: note
    content: 'Na: Satria nampanantenainao aho.'
  '5':
  - type: text
    content: Enga anie ka ho tafatoetra ny làlako
  - type: text
    content: Hitandremako ny didinao!
  '50':
  - type: text
    content: Izao no mampionona ahy amin’ny fahoriako;
  - type: text
    content: Ny teninao no mamelona ahy.
  '51':
  - type: text
    content: Ny mpirehareha maniratsira ahy;
  - type: text
    content: Tsy mba mivily miala amin’ny lalànao aho.
  '52':
  - type: text
    content: Mahatsiaro ny fitsipikao izay hatramin’ny taloha aho, Jehovah ô,
  - type: text
    content: Dia mionona aho.
  '53':
  - type: text
    content: Fahatezerana mirehitra no nahazo ahy
  - type: text
    content: Noho ny amin’ny ratsy fanahy izay mahafoy ny lalànao.
  '54':
  - type: text
    content: Ny didinao no ataoko an-kira
  - type: text
    content: Ao amin’ny trano fivahiniako.
  '55':
  - type: text
    content: Mahatsiaro ny anaranao nony alina aho, Jehovah ô,
  - type: text
    content: Ka mitandrina ny lalànao.
  '56':
  - type: text
    content: 'Izao no ahy:'
  - type: text
    content: Mitandrina ny didinao aho.
  - type: heading
    content: HETA.
  '57':
  - type: text
    content: Anjarako Jehovah;
  - type: text
    content: Minia mitandrina ny teninao aho.
  '58':
  - type: text
    content: Mifona aminao amin’ny foko rehetra aho;
  - type: text
    content: Mamindrà fo amiko araka ny teninao.
  '59':
  - type: text
    content: Mihevitra ny làlako aho
  - type: text
    content: Ka mamerina ny tongotro ho amin’ny teni-vavolombelonao.
  '6':
  - type: text
    content: Dia tsy ho menatra aho,
  - type: text
    content: Raha mandinika ny didinao rehetra.
  '60':
  - type: text
    content: Mandeha faingana aho ka tsy mitaredretra,
  - type: text
    content: Amin’ny fitandremana ny didinao.
  '61':
  - type: text
    content: Nihodidina tamiko ny famatoran’ny ratsy fanahy;
  - type: text
    content: Tsy mba nanadino ny lalànao aho.
  '62':
  - type: text
    content: Mamatonalina no hifohazako hidera Anao
  - type: text
    content: Noho ny fitsipikao marina.
  '63':
  - type: text
    content: Naman’izay rehetra matahotra Anao aho
  - type: text
    content: Sy naman’izay mitandrina ny didinao.
  '64':
  - type: text
    content: Jehovah ô, henika ny famindramponao ny tany;
  - type: text
    content: Ampianaro ahy ny didinao.
  - type: heading
    content: TETA.
  '65':
  - type: text
    content: Jehovah ô, efa nasianao soa ny mpanomponao,
  - type: text
    content: Araka ny teninao.
  '66':
  - type: text
    content: Ampianaro fahafantarana tsara sy fahalalana aho,
  - type: text
    content: Fa matoky ny didinao aho.
  '67':
  - type: text
    content: Fony tsy mbola azom-pahoriana aho, dia naniasia;
  - type: text
    content: Fa ankehitriny dia mitandrina ny teninao aho.
  '68':
  - type: text
    content: Sady tsara Hianao no Mpanao ny tsara;
  - type: text
    content: Ampianaro ahy ny didinao.
  '69':
  - type: text
    content: Namoron-dainga hamelezana ahy ny mpirehareha;
  - type: text
    content: Amin’ny foko rehetra no itandremako ny didinao.
  '7':
  - type: text
    content: Hidera Anao amin’ny hitsim-po aho
  - type: text
    content: Amin’ny ianarako ny fitsipikao marina.
  '70':
  - type: text
    content: Matavy tahaka ny menaka ny fony;
  - type: text
    content: Fa izaho kosa, dia ny lalànao no iravoravoako.
  '71':
  - type: text
    content: Soa ihany aho nampahorina,
  - type: text
    content: Mba hianarako ny didinao.
  '72':
  - type: text
    content: Ny lalàn’ny vavanao no mahatsara ahy
  - type: text
    content: Mihoatra noho ny volamena sy ny volafotsy tsy omby arivo.
  - type: heading
    content: JODA.
  '73':
  - type: text
    content: Ny tànanao nanao ahy sy namboatra ahy;
  - type: text
    content: Ampianaro aho, mba hianarako ny didinao.
  '74':
  - type: text
    content: Izay matahotra Anao hahita ahy ka ho faly;
  - type: text
    content: Fa ny teninao no andrasako.
  '75':
  - type: text
    content: Fantatro, Jehovah ô, fa marina ny fitsaranao.
  - type: text
    content: Ary ny fahamarina
  - type: text
    content: nao
  - type: text
    content: ' no nampahorianao ahy.'
  '76':
  - type: text
    content: Ny famindramponao anie no hampiononana ahy
  - type: text
    content: Araka ny teninao tamin’ny mpanomponao.
  '77':
  - type: text
    content: Aoka ho tonga amiko ny fiantranao, mba ho velona aho;
  - type: text
    content: Fa ny lalànao no firavoravoako.
  '78':
  - type: text
    content: Aoka ho menatra ny mpirehareha, fa nampahory ahy tsy ahoan-tsy ahoana
  - type: note
    content: 'Na: nanoloky ahy tamin’ny lainga.'
  - type: text
    content: ' izy;'
  - type: text
    content: Izaho hisaintsaina ny didinao.
  '79':
  - type: text
    content: Aoka hiverina amiko izay matahotra Anao
  - type: text
    content: Sy izay mahalala ny teni-vavolombelonao.
  '8':
  - type: text
    content: Ny didinao no hotandremako;
  - type: text
    content: Aza dia mahafoy ahy Hianao
  - type: heading
    content: BETA.
  '80':
  - type: text
    content: Aoka ho marina tsara ny foko amin’ny fitanana ny didinao,
  - type: text
    content: Mba tsy ho menatra aho.
  - type: heading
    content: KAFA.
  '81':
  - type: text
    content: Ritra ny aiko, satria manina ny famonjenao aho;
  - type: text
    content: Ny teninao no andrasako.
  '82':
  - type: text
    content: Pahina ny masoko miandry ny teninao,
  - type: text
    content: 'Ka hoy izaho: Rahoviana no hampionona ahy Hianao?'
  '83':
  - type: text
    content: Fa tahaka ny siny hoditra ao amin’ny setroka aho,
  - type: text
    content: Nefa ny didinao tsy mba hadinoiko.
  '84':
  - type: text
    content: Hoatrinona no andron’ny mpanomponao?
  - type: text
    content: Rahoviana no hanao fitsarana amin’izay manenjika ahy Hianao?
  '85':
  - type: text
    content: Efa nanao longoa hianjerako ny mpirehareha,
  - type: text
    content: Dia izay tsy manaraka ny lalànao.
  '86':
  - type: text
    content: Marina ny didinao rehetra;
  - type: text
    content: Manenjika ahy tsy ahoan-tsy ahoana ireny; vonjeo aho.
  '87':
  - type: text
    content: Saiky laniny teo amin’ny tany aho,
  - type: text
    content: Kanefa tsy mba mahafoy ny didinao.
  '88':
  - type: text
    content: Velomy aho araka ny famindramponao;
  - type: text
    content: Dia hitandrina ny teni-vavolombelona naloaky ny vavanao aho.
  - type: heading
    content: LAMEDA.
  '89':
  - type: text
    content: Ho mandrakizay, Jehovah ô,
  - type: text
    content: No nanorenanao any an-danitra ny teninao.
  '9':
  - type: text
    content: Inona no hiarovan’ny zatovo ny làlan-kalehany tsy ho voaloto?
  - type: text
    content: Ny fitandremana araka ny teninao.
  '90':
  - type: text
    content: Hihatra amin’ny taranaka fara mandimby ny fahamarinanao;
  - type: text
    content: Efa nampitoetra ny tany Hianao, ka, indro, mitoetra izy.
  '91':
  - type: text
    content: Hanefa ny fitsaranao
  - type: note
    content: 'Na: Araka ny nanendrenao azy.'
  - type: text
    content: ' no itoerany mandraka andro-any;'
  - type: text
    content: Fa mpanomponao ny zavatra rehetra.
  '92':
  - type: text
    content: Raha tsy ny lalànao no niravoravoako,
  - type: text
    content: Dia maty tamin’ny fahoriako aho.
  '93':
  - type: text
    content: Tsy hohadinoiko mandrakizay ny didinao;
  - type: text
    content: Fa ireny no amelomanao ahy.
  '94':
  - type: text
    content: Anao aho, vonjeo aho;
  - type: text
    content: Fa ny didinao no tadiaviko.
  '95':
  - type: text
    content: Miandry ahy ny ratsy fanahy mba hahafaty ahy;
  - type: text
    content: Mandinika ny teni-vavolombelonao aho
  '96':
  - type: text
    content: Efa hitako fa manam-pahataperana avo koa ny tanteraka rehetra;
  - type: text
    content: Malalaka indrindra ny didinao.
  - type: heading
    content: MEMA.
  '97':
  - type: text
    content: Endrey ny fitiavako ny lalànao!
  - type: text
    content: Fisaintsainako mandrakariva izany.
  '98':
  - type: text
    content: Ny didinao mampahahendry ahy mihoatra noho ny fahavaloko,
  - type: text
    content: Satria ato amiko mandrakizay ireny.
  '99':
  - type: text
    content: Hendry noho ny mpampianatra ahy rehetra aho,
  - type: text
    content: Satria ny teni-vavolombelonao no fisaintsainako.
