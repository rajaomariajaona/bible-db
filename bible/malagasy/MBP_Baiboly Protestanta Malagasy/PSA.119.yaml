document_id: PSA.119,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Fankalazana ny lalàn’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: ALEFA.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: SAMBATRA ny mahitsy làlana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandeha araka ny lalàn’i Jehovah.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tamin’ny foko rehetra no nitadiavako Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza avela hivily hiala amin’ny didinao aho.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: Hendry noho ny anti-panahy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny didinao no notandremako.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: Efa narovako ny tongotro tsy ho amin’izay làlan-dratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitandremako ny teninao.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: Tsy mba miala amin’ny fitsipikao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no mampianatra ahy.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: Endrey ny hamamin’ny teninao, raha andramako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihoatra noho ny tantely ato am-bavako aza!
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: Ny didinao no nahazoako fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no ankahalako ny làlam-pitaka rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: NONA.
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: Fanilon’ny tongotro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fanazavana ny làlako ny teninao.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: Efa nianiana aho fa hitandrina ny fitsipikao marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nefaiko izany.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: Ampahorina indrindra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, velomy aho araka ny teninao.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: Jehovah ô, aoka anie mba hankasitrahanao ny fanati-tsitrapo aloaky ny vavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampianaro ahy ny fitsipikao.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: An-tenda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.109 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An-tànako.
      marker-yv: yv-n
    - type: text
      text: ' ihany ny aiko mandrakariva;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy manadino ny lalànao aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ato am-poko no iraketako ny teninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsy hanotako aminao.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: Ny ratsy fanahy mamela-pandrika haningotra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy mania miala amin’ny didinao aho.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: Efa noraisiko ho lovako mandrakizay ny teni-vavolombelonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fifalian’ny foko izany.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: Apetrako ny foko hankatò ny didinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrakizay hatramin’ny farany.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: SAMEKA.
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: Halako ny mpiroa saina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny lalànao no tiako.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: Fiereko sy ampingako Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teninao no andrasako.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: Mialà amiko hianareo mpanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitandremako ny didin’Andriamanitro.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: Tohàny aho araka ny teninao, mba ho velona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy ho menatra amin’ny fanantenako aho.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: Tohàny aho mba ho voavonjy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho faly hijery ny didinao mandrakariva.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: Ataonao tsinontsinona izay rehetra mania amin’ny didinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famitahan-tena ihany ny laingany.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no itiavako ny teni-vavolombelonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Isaorana anie Hianao, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampianaro ahy ny didinao.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: Mipararetra ny nofoko ny fahatahorana Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matahotra ny fitsaranao aho.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: AINA.
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: Manaraka ny fitsipika sy ny fahamarinana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manolotra ahy ho amin’ny mpampahory ahy.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: Iantohy mba ho soa ny mpanomponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza avela hampahory ahy ny mpirehareha.
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: Pahina ny masoko miandry ny famonjenao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tenin’ny fahamarinanao.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: Ataovy amin’ny mpanomponao araka ny famindramponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampianaro ahy ny didinao.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: Mpanomponao aho, ka ampianaro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho fantatro ny teni-vavolombelonao.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: Efa andro tokony hampisehoan’i Jehovah ny heriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.126 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiasan’i Jehovah.
      marker-yv: yv-n
    - type: text
      text: ' izao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nandika ny lalànao ny olona.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: Izany no itiavako ny didinao mihoatra noho ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, noho ny tena volamena aza.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: Izany no iheverako ny didy rehetra ho marina avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halako ny làlam-pitaka rehetra.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: PE.
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: Mahagaga ny teni-vavolombelonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia mitandrina azy ny fanahiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny molotro no nentiko nilaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitsipika rehetra naloaky ny vavanao.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: Mahazava ny famoahana ny hevitry ny teninao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manome fahalalana ho an’ny kely saina.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: Mitanatana vava aho ka mihanahana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny didinao no iriko.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Todiho aho, ka mamindrà fo amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny tokony ho anjaran’izay tia ny anaranao.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: Ampitoero eo amin’ny teninao ny diako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza avela hanapaka ahy izay mety ho faharatsiana.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: Vonjeo amin’ny fampahorian’ny olona aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitandrina ny didinao.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: Ampamirapirato amin’ny mpanomponao ny tavanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampianaro ahy ny didinao.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: Rano mandriaka no mijononoka amin’ny masoko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tsi-fitandreman’ny olona ny lalànao.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: TSADE.
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: Marina Hianao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahitsy ny fitsipikao.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: Efa voadidinao amin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fahatokiana indrindra ny teni-vavolombelonao.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: Efa maharìtra aina ahy ny fahasaro-piaroko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nanadino ny teninao ny mpandrafy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny làlan’ny teni-vavolombelonao no ifaliako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny ifaliako amin’ny harena rehetra.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: Voazaha toetra tamin’ny memy ny teninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tian’ny mpanomponao.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: Kely aho ka natao ho tsinontsinona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy hadinoiko ny didinao.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: Ny fahamarinanao dia fahamarinana mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary marina ny lalànao.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: Fahoriana sy fahaterena no nahazo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didinao no firavoravoako.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '144'
    - type: text
      text: Ny fahamarinan’ny teni-vavolombelonao dia mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampianaro aho, mba ho velona.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: KOFA.
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '145'
    - type: text
      text: 'Ny foko rehetra no nentiko nitaraina hoe: Valio aho, Jehovah ô;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didinao no hotandremako;
  '146':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '146'
    - type: text
      text: 'Nitaraina taminao aho nanao hoe: Vonjeo aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitandrina ny didinao.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '147'
    - type: text
      text: Raha mbola tsy nazavaratsy aza ny andro, dia nitaraina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teninao no andrasako.
  '148':
  - type: usfm
