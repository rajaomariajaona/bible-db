document_id: JER.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niantsoana an’i Jeremia ho mpaminany, sy ny nanambarana taminy izay ho raharahany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'NY tenin’i Jeremia, zanak’i Hilkia, isan’ny mpisorona tao Anatota, tamin’ny tanin’ny Benjamina, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ary indro Aho manendry anao izao andro anio izao hanam-pahefana amin’ny firenena sy ny fanjakana hanongotra sy hanjera sy handrava sy handrodana ary hanorina sy hamboly.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary tonga tamiko indray ny tenin’i Jehovah nanao hoe: Ry Jeremia, inona izao hitanao izao? Ary hoy izaho: Rantsan-kazo mahatsiaro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Ny amygdala no ataon’ny Hebreo hoe ,,hazo mahatsiaro’’, satria mamony alohan’ny hazo sasany.
      marker-yv: yv-n
    - type: text
      text: ' no hitako. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Marina ny ahitanao azy; fa mahatsiaro Aho mba hahatanteraka ny teniko.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary tonga tamiko fanindroany indray ny tenin’i Jehovah nanao hoe: Inona izao hitanao izao? Ary hoy izaho: Vilany mangotraka no hitako, ary mitongilana mianatsimo ny vavany.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Hiroatra avy any avaratra ny loza hanjo ny mponina rehetra amin’ny tany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa, indro, hantsoiko ny firenena rehetra amin’ny fanjakana any avaratra, hoy Jehovah; dia ho tonga izy, ka samy hametraka ny seza fiandrianany eo anoloan’ny vavahadin’i Jerosalema avokoa hamelezany ny màndany rehetra manodidina sy ny tanàna rehetra any Joda. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary hifandahatra aminy Aho noho ny haratsiany rehetra, dia ny nahafoizany Ahy sy ny nandoroany ditin-kazo manitra ho an’ny andriamani-kafa ary ny niankohofany teo anatrehan’ny asan’ny tànany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa hianao kosa dia misikìna, ary miomàna, ka lazao aminy izao rehetra andidiako anao izao; aza matahotra ireo, fandrao dia hataoko raiki-tahotra eo anatrehany hianao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Indro, Izaho hanao anao ho tanàna mimànda sy andry vy ary mànda varahina mba tsy ho leon’ny tany rehetra, na ny mpanjakan’ny Joda, na ny lehibeny, na ny mpisorony, na ny vahoaka. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa hiady aminao ireny, nefa tsy hahaleo anao, satria momba anao hamonjy anao Aho, hoy Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'izay nanambarana ny tenin’i Jehovah tamin’ny andron’i Josia, zanak’i Amona, mpanjakan’ny Joda, tamin’ny taona fahatelo ambin’ny folo nanjakany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: sy tamin’ny andron’i Joiakima, zanak’i Josia, mpanjakan’ny Joda koa, ka hatramin’ny faran’ny taona fahiraika ambin’ny folo nanjakan’i Zedekia, zanak’i Josia, mpanjakan’ny Joda, dia hatramin’ny namaboana an’i Jerosalema tamin’ny volana fahadimy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hatry ny fony hianao tsy mbola noforoniko tany an-kibo no efa fantatro; ary hatry ny fony hianao tsy mbola teraka no efa nohamasiniko sy notendreko ho mpaminany ho an’ny firenena.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy kosa aho: Indrisy, Jehovah Tompo ô! indro, tsy mahay mandaha-teny aho, fa mbola zaza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hoy Jehovah tamiko: Aza manao hoe: Mbola zaza aho; fa handeha amin’izay rehetra hanirahako anao hianao, ary izay rehetra handidiako anao no hambaranao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza matahotra azy hianao; fa momba anao hamonjy anao Aho, hoy Jehovah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia naninjitra ny tànany Jehovah ka nanendry ny vavako, ary hoy Jehovah tamiko: Indro, efa nataoko ao am-bavanao ny teniko, '
