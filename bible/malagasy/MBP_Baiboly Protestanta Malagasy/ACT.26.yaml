document_id: ACT.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Agripa tamin’i Paoly: Mahazo mandahatra ny teninao hianao. Ary Paoly naninjitra ny tànany ka nandaha-teny hanala tsiny ny tenany nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'sady nataoko tany Jerosalema izany, ka maro ny olona masina no nohidiako tao an-trano-maizina, rehefa nahazo fahefana tamin’ny lohan’ny mpisorona aho; ary raha hovonoina ireny, dia mba nandatsa-bato nanaiky izany koa aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary nampijaly azy matetika teo amin’ny synagoga rehetra aho ka nanery azy hiteny ratsy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hanao blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix.3.
      marker-yv: yv-n
    - type: text
      text: ' ary satria very saina tamin’ny fahatezerako taminy aho, dia nanenjika azy hatramin’ny tanàna any ivelany koa aza.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary tamin’izany, raha nankany Damaskosy aho, nitondra fahefana sy teny izay efa azoko tamin’ny lohan’ny mpisorona, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'koa nony ilay nitatao-vovonana iny ny andro, ry mpanjaka ô, dia hitako teny an-dàlana fa, indro, nisy mazava avy tany an-danitra nanelatrelatra manodidina ahy mbamin’izay niaraka tamiko mihoatra noho ny famirapiratry ny masoandro. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary rehefa lavo tamin’ny tany izahay rehetra, dia nandre feo nilaza tamiko aho nanao tamin’ny teny Hebreo hoe: Saoly, Saoly, nahoana hianao no manenjika Ahy? Zavatra sarotra aminao ny hanipaka ny fanindronana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy izaho: Iza moa Hianao, Tompoko? Ary hoy ny Tompo: Izaho no Jesosy Izay enjehinao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa mitsangàna, ka mijoroa amin’ny tongotrao; fa izao no nisehoako taminao, dia ny hanendry anao ho mpanompo sy ho vavolombelona ny amin’izay efa nahitanao Ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[izay efa hitanao].'
      marker-yv: yv-n
    - type: text
      text: ' sy izay hisehoako aminao, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'hamonjy anao amin’ny olona Isiraely sy ny jentilisa, izay anirahako anao, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: hampahiratra ny masony hialany amin’ny maizina ho amin’ny mazava, ary amin’ny fahefan’i Satana ho amin’Andriamanitra, mba hahazoany famelankeloka sy lova eo amin’izay nohamasinina noho ny finoana Ahy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary amin’izany, ry Agripa mpanjaka ô, dia tsy nandà ny fahitana avy tany an-danitra aho; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny amin’ny zavatra rehetra iampangan’ny Jiosy ahy, ry Agripa mpanjaka, dia ataoko fa sambatra aho, satria mahazo mandaha-teny hanala tsiny ny tenako eto anatrehanao anio, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: fa nambarako voalohany tamin’izay tany Damaskosy sy Jerosalema sy tany amin’ny tany Jodia rehetra ary tany amin’ny jentilisa, mba hibebaka sy hiverina amin’Andriamanitra izy ka hanao asa mendrika ny fibebahana.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary izany no nisamboran’ny Jiosy ahy teo an-kianjan’ny tempoly sy nitadiavany hahafaty ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary noho ny fitahian’Andriamanitra ahy dia mbola maharitra mandraka androany aho ka manambara na amin’ny kely na amin’ny lehibe, ary tsy milaza na inona na inona afa-tsy izay nolazain’ny mpaminany sy Mosesy fa ho avy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: fa Kristy tsy maintsy mijaly ary ho voalohany hitsangana amin’ny maty ka hitory fahazavana amin’ny olona Isiraely sy amin’ny jentilisa.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary raha nandahatra izany izy, dia hoy Festosy tamin’ny feo mahery: Ry Paoly ô, very saina hianao; ny fianarana be loatra no efa nahavery saina anao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa hoy Paoly: Tsy very saina aho, ry Festosy tsara indrindra, fa mandahatra tenin’ny fahamarinana sy ny fahononana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa fantatry ny mpanjaka izany zavatra izany, ka dia miteny amin’ny fahasahiana eto anatrehany aho; fa mino aho fa tsy miafina aminy izany zavatra izany, satria tsy natao tao amin’ny takona izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ry Agripa mpanjaka ô, mino ny mpaminany va hianao? Fantatro fa mino hianao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa hoy Agripa tamin’i Paoly: Hay! ataonao fa mora toy izany no hampanekenao ahy ho Kristiana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy Paoly: Mangataka amin’Andriamanitra aho, fa na amin’ny mora, na amin’ny sarotra, tsy hianao ihany, fa izay rehetra mandre ahy anio, dia hitovy amiko, afa-tsy amin’ireto gadra ireto ihany.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: indrindra fa efa fantatrao tsara ny fanao sy ny ady hevitra rehetra amin’ny Jiosy; koa trarantitra hianao, mba mahareta hihaino ahy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary nitsangana ny mpanjaka sy ny governora ary Berenika mbamin’izay niara-nipetraka teo aminy; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary rehefa niala teo izy, dia niresaka hoe: Tsy manao izay tokony hahafaty na hamatorana azy tsy akory izany lehilahy izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy Agripa tamin’i Festosy: Azo nalefa ihany io lehilahy io, saingy efa nifidy ny handahatra any anatrehan’i Kaisara izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fantatry ny Jiosy rehetra ny fitondrantenako hatry ny fony aho mbola kely teo amin’ny fireneko tany Jerosalema hatramin’ny voalohany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'eny, fantany hatramin’ny voalohany aho (raha mety milaza izy), fa efa Fariseo aho araka ny antoko, fatra-pitana indrindra ny lalàna amin’ny fivavahantsika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ankehitriny ny fanantenana ny teny fikasana izay nataon’Andriamanitra tamin’ny razantsika no itsanganako hotsaraina eto, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia ilay fanantenana andrasan’ny firenentsika roa ambin’ny folo, izay mazoto manao fanompoam-pivavahana ho an’Andriamanitra andro aman-alina. Izany fanantenana izany no iampangan’ny Jiosy ahy, ry mpanjaka ô. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nahoana no ataonareo ho zavatra tsy azo inoana, raha Andriamanitra manangana ny maty?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary izaho efa nihevitra tao am-poko tokoa fa tsy mety raha tsy manao zavatra maro hanohitra ny anaran’i Jesosy avy any Nazareta, '
