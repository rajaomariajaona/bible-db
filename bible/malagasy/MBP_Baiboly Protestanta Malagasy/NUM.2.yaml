document_id: NUM.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny filaharan’ny tobin’ny Isiraely araka ny fireneny avy.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary ny fanevan’ny tobin’i Robena no ho eo amin’ny lafiny atsimo, araka ny antokony; ary ny lohan’ny taranak’i Robena dia Elizora, zanak’i Sedeora; '
  '11':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia diman-jato amby enina arivo sy efatra alina. '
  '12':
  - type: text
    content: 'Ary ny hitoby eo anilany dia ny firenen’i Simeona; ary ny lohan’ny taranak’i Simeona dia Selomiela, zanak’i Zorisaday; '
  '13':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia telon-jato amby sivy arivo sy dimy alina. '
  '14':
  - type: text
    content: Dia vao ny firenen’i Gada; ary ny lohan’ny taranak’i Gada dia Eliasafa, zanak’i Roela;
  - type: note
    content: (Doela).
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia dimam-polo amby enin-jato sy dimy arivo sy efatra alina. '
  '16':
  - type: text
    content: Ny tontalin’izay nalamina teo amin’ny tobin’i Robena dia dimam-polo amby efa-jato sy arivo sy dimy alina sy iray hetsy, araka ny antokony. Ireo no mandeha faharoany.
  '17':
  - type: text
    content: Dia handroso ny trano-lay fihaonana sy ny tobin’ny Levita, eo afovoan’ny toby rehetra; ka araka ny itobiany ihany no handrosoany, samy eo amin’ny filaharany avy, araka ny fanevany.
  '18':
  - type: text
    content: 'Ary ny fanevan’ny tobin’i Efraima, araka ny antokony, dia ho eo amin’ny lafiny andrefana; ary ny lohan’ny taranak’i Efraima dia Elisama, zanak’i Amihoda; '
  '19':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia diman-jato amby efatra alina. '
  '2':
  - type: text
    content: Samy eo amin’ny fanevany sy eo amin’ny faneva kelin’ny fianakaviany avy no hitobian’ny Zanak’Isiraely; manodidina ny trano-lay fihaonana sady manandrify azy no hitobiany.
  '20':
  - type: text
    content: 'Ary ny firenen’i Manase ho eo anilany; ary ny lohan’ny taranak’i Manase dia Gamaliela, zanak’i Pedazora; '
  '21':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia roan-jato amby roa arivo amby telo alina. '
  '22':
  - type: text
    content: 'Dia vao ny firenen’i Benjamina; ary ny lohan’ny taranak’i Benjamina dia Abidana, zanak’i Gideony; '
  '23':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia efa-jato amby dimy arivo amby telo alina. '
  '24':
  - type: text
    content: Ny tontalin’izay nalamina teo amin’ny tobin’i Efraima dia zato amby valo arivo sy iray hetsy, araka ny antokony. Ireo no mandeha fahatelony.
  '25':
  - type: text
    content: 'Ary ny fanevan’ny tobin’i Dana, araka ny antokony, dia ho eo amin’ny lafiny avaratra; ary ny lohan’ny taranak’i Dana dia Ahiezera, zanak’i Amisaday; '
  '26':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia fiton-jato amby roa arivo sy enina alina. '
  '27':
  - type: text
    content: 'Ary ny hitoby eo anilany dia ny firenen’i Asera; ary ny lohan’ny taranak’i Asera dia Pagiela, zanak’i Okrana; '
  '28':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia dimam-jato amby arivo sy efatra alina. '
  '29':
  - type: text
    content: 'Dia vao ny firenen’i Naftaly; ary ny lohan’ny taranak’i Naftaly dia Ahira, zanak’i Enana; '
  '3':
  - type: text
    content: 'Ary ny hitoby eo amin’ny lafiny atsinanana, tandrifin’ny fiposahan’ny masoandro, dia izay momba ny fanevan’ny tobin’i Joda, araka ny antokony; ary ny lohan’ny taranak’i Joda dia Nasona, zanak’i Aminadaba; '
  '30':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia efa-jato amby telo arivo sy dimy alina. '
  '31':
  - type: text
    content: Ny tontalin’izay nalamina teo amin’ny tobin’i Dana dia enin-jato amby fito arivo sy dimy alina sy iray hetsy. Dia ireo kosa no vodi-làlana.
  '32':
  - type: text
    content: 'Ireo no nalamina avy tamin’ny Zanak’Isiraely, araka ny fianakaviany; ny tontalin’izay nalamina tamin’ny toby rehetra, araka ny antokony, dia dimam-polo amby diman-jato amby telo arivo sy enina hetsy. '
  '33':
  - type: text
    content: Fa ny Levita dia tsy mba niaraka nalamina tamin’ny Zanak’Isiraely, araka izay efa nandidian’i Jehovah an’i Mosesy.
  '34':
  - type: text
    content: Ary ny Zanak’Isiraely dia nanao araka izay rehetra efa nandidian’i Jehovah an’i Mosesy ka nitoby araka ny fanevany avy, ary samy nandroso araka ny fokony avy sy ny fianakaviany avy izy.
  '4':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia enin-jato amby efatra arivo sy fito alina. '
  '5':
  - type: text
    content: 'Ary ny hitoby eo anilany dia ny firenen’Isakara; ary ny lohan’ny taranak’Isakara dia Netanela, zanak’i Zoara; '
  '6':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia efa-jato amby efatra arivo sy dimy alina. '
  '7':
  - type: text
    content: 'Dia vao ny firenen’i Zebolona; ary ny lohan’ny taranak’i Zebolona dia Eliaba, zanak’i Helona; '
  '8':
  - type: text
    content: 'ary ny miaramilany izay nalamina dia efa-jato amby fito arivo sy dimy alina. '
  '9':
  - type: text
    content: Ny tontalin’izay nalamina teo amin’ny tobin i Joda dia efa-jato amby enina arivo sy valo alina sy iray hetsy, araka ny antokony. Ireo no loha-làlana.
