document_id: NUM.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny filaharan’ny tobin’ny Isiraely araka ny fireneny avy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanevan’ny tobin’i Robena no ho eo amin’ny lafiny atsimo, araka ny antokony; ary ny lohan’ny taranak’i Robena dia Elizora, zanak’i Sedeora; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia diman-jato amby enina arivo sy efatra alina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hitoby eo anilany dia ny firenen’i Simeona; ary ny lohan’ny taranak’i Simeona dia Selomiela, zanak’i Zorisaday; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia telon-jato amby sivy arivo sy dimy alina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia vao ny firenen’i Gada; ary ny lohan’ny taranak’i Gada dia Eliasafa, zanak’i Roela;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Doela).
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia dimam-polo amby enin-jato sy dimy arivo sy efatra alina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay nalamina teo amin’ny tobin’i Robena dia dimam-polo amby efa-jato sy arivo sy dimy alina sy iray hetsy, araka ny antokony. Ireo no mandeha faharoany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia handroso ny trano-lay fihaonana sy ny tobin’ny Levita, eo afovoan’ny toby rehetra; ka araka ny itobiany ihany no handrosoany, samy eo amin’ny filaharany avy, araka ny fanevany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanevan’ny tobin’i Efraima, araka ny antokony, dia ho eo amin’ny lafiny andrefana; ary ny lohan’ny taranak’i Efraima dia Elisama, zanak’i Amihoda; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia diman-jato amby efatra alina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy eo amin’ny fanevany sy eo amin’ny faneva kelin’ny fianakaviany avy no hitobian’ny Zanak’Isiraely; manodidina ny trano-lay fihaonana sady manandrify azy no hitobiany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenen’i Manase ho eo anilany; ary ny lohan’ny taranak’i Manase dia Gamaliela, zanak’i Pedazora; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia roan-jato amby roa arivo amby telo alina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vao ny firenen’i Benjamina; ary ny lohan’ny taranak’i Benjamina dia Abidana, zanak’i Gideony; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia efa-jato amby dimy arivo amby telo alina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay nalamina teo amin’ny tobin’i Efraima dia zato amby valo arivo sy iray hetsy, araka ny antokony. Ireo no mandeha fahatelony.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanevan’ny tobin’i Dana, araka ny antokony, dia ho eo amin’ny lafiny avaratra; ary ny lohan’ny taranak’i Dana dia Ahiezera, zanak’i Amisaday; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia fiton-jato amby roa arivo sy enina alina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hitoby eo anilany dia ny firenen’i Asera; ary ny lohan’ny taranak’i Asera dia Pagiela, zanak’i Okrana; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia dimam-jato amby arivo sy efatra alina. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vao ny firenen’i Naftaly; ary ny lohan’ny taranak’i Naftaly dia Ahira, zanak’i Enana; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hitoby eo amin’ny lafiny atsinanana, tandrifin’ny fiposahan’ny masoandro, dia izay momba ny fanevan’ny tobin’i Joda, araka ny antokony; ary ny lohan’ny taranak’i Joda dia Nasona, zanak’i Aminadaba; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia efa-jato amby telo arivo sy dimy alina. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay nalamina teo amin’ny tobin’i Dana dia enin-jato amby fito arivo sy dimy alina sy iray hetsy. Dia ireo kosa no vodi-làlana.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no nalamina avy tamin’ny Zanak’Isiraely, araka ny fianakaviany; ny tontalin’izay nalamina tamin’ny toby rehetra, araka ny antokony, dia dimam-polo amby diman-jato amby telo arivo sy enina hetsy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny Levita dia tsy mba niaraka nalamina tamin’ny Zanak’Isiraely, araka izay efa nandidian’i Jehovah an’i Mosesy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Zanak’Isiraely dia nanao araka izay rehetra efa nandidian’i Jehovah an’i Mosesy ka nitoby araka ny fanevany avy, ary samy nandroso araka ny fokony avy sy ny fianakaviany avy izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia enin-jato amby efatra arivo sy fito alina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hitoby eo anilany dia ny firenen’Isakara; ary ny lohan’ny taranak’Isakara dia Netanela, zanak’i Zoara; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia efa-jato amby efatra arivo sy dimy alina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vao ny firenen’i Zebolona; ary ny lohan’ny taranak’i Zebolona dia Eliaba, zanak’i Helona; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny miaramilany izay nalamina dia efa-jato amby fito arivo sy dimy alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tontalin’izay nalamina teo amin’ny tobin i Joda dia efa-jato amby enina arivo sy valo alina sy iray hetsy, araka ny antokony. Ireo no loha-làlana.
