document_id: 1SA.14
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’ny indray andro dia hoy Jonatana, zanak’i Saoly, tamin’ny zatovo, mpitondra ny fiadiany: Andeha isika hankany amin’ny miaramilan’ny Filistina izay erỳ an-dafy erỳ. Nefa tsy nilaza tamin-drainy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Saoly nitoetra tao an-tsisin’i Gibea teo ambanin’ny hazo ampongabendanitra any Migrona; ary ny vahoaka teo aminy dia tokony ho enin-jato lahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary teo koa nisalotra efoda Ahia, zanak’i Ahitoba, rahalahin’i Ikaboda, zanak’i Finehasa, zanak’i Ely, mpisoron’i Jehovah tany Silo. Fa tsy fantatry ny olona fa lasa Jonatana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary teo an-daniny roa teo an-tenatenan’ny hadilanana izay nitadiavan’i Jonatana hankanesana ao amin’ny miaramilan’ny Filistina dia nisy harambato kitso loha: ny anaran’ny anankiray dia Bozeza, ary ny anaran’ny anankiray kosa Sene. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny iray amin’ireo harambato ireo dia nijoro avo teo an-daniny avaratra manandrify an’i Mikmasy, ary ny iray kosa nijoro avo teo atsimo manandrify an’i Gibea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jonatana tamin’ny zatovo, mpitondra ny fiadiany: Andeha isika hankany amin’ny miaramilan’ireo tsy mifora ireo; angamba homba antsika Jehovah, fa tsy misy mahasakana an’i Jehovah tsy hamonjy, na amin’ny maro, na amin’ny vitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy kosa ny mpitondra ny fiadiany taminy: Ataovy izay rehetra ao am-ponao; mandrosoa ihany; indro, hanaraka anao aho araka ny sitraponao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jonatana: Indro, handroso ho amin’ireo olona ireo isika ka hiseho aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha hoy izy: Andraso mandra-pahatonganay any aminareo, dia hitoetra ao amin’izay itoerantsika ihany isika ka tsy hiakatra eny aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha hoy kosa izy: Miakara etỳ aminay, dia hiakatra isika, fa efa natolotr’i Jehovah eo an-tànantsika izy; ary izany no ho famantarana ho antsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niseho tamin’ny miaramilan’ny Filistina izy roa lahy, ary hoy ny Filistina: Indreo, misy Hebreo mifongatra avy any an-davaka niereny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny miaramila namaly an’i Jonatana sy ny mpitondra ny fiadiany hoe: Miakara etỳ aminay, dia hanehoanay zavatra hianareo. Ary hoy Jonatana tamin’ny mpitondra ny fiadiany: Manaraha ahy, fa efa natolotr’i Jehovah eo an-tànan’ny Isiraely izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Jonatana nananika, nandady tongotra aman-tànana, ary nanaraka azy ny mpitondra ny fiadiany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lavo teo anatrehan’i Jonatana ny Filistina, ary ny mpitondra ny fiadiany namono teo aoriany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tokony ho roa-polo lahy no matiny aloha, izay novonoin’i Jonatana sy ny mpitondra ny fiadiany tao anatin’ny tany tokony ho antsasaky ny vavasa iray akera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa nisy hovitra tao amin’ny toby tany an-tsaha sy tamin’ny vahoaka rehetra; ary ny teo amin’ny miaramila sy ny mpandrava nangovitra koa, ary nihorohoro ny tany, ka dia nisy fampangovitana avy tamin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny mpitilin’i Saoly ao Gibean’ny Benjamina dia nitazana, ka, indro, niely ny vahoaka sady nifanaritaka be ihany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanenjehan’i Saoly sy ny Isiraely ny Filistina, sy ny nampianianan’i Saoly ny olona, ary ny zavatra niseho avy tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ARY hoy Saoly tamin’ny olona teo aminy: Alaharo, ka izahao izay niala tamintsika. Ary nony voalahatra ny olona, dia Jonatana sy ny mpitondra ny fiadiany no tsy teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy Saoly tamin’i Ahia: Ento etỳ ny fiaran’Andriamanitra (fa teo amin’ny Zanak’Isiraely ny fiaran’Andriamanitra fahizany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ento etỳ ny efoda. (Fa nisalotra ny efoda teo anatrehan’ny Isiraely izy fahizany.)
    marker-yv: yv-n
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha Saoly mbola niresaka tamin’ny mpisorona, dia nandroso sy nitombo ny tabataba terỳ an-tobin’ny Filistina. Ary hoy Saoly tamin’ny mpisorona: Aoka ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Saoly sy ny vahoaka rehetra izay teo aminy nivory, ka dia tonga tany amin’ny ady izy, ary indreo ny Filistina nifamely tamin’ny sabany, dia izy samy izy, ka nifanaritaka be ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny Hebreo izay teo amin’ny Filistina taloha ka niara-niakatra taminy ho any an-toby '
  - type: usfm
    marker: it
    children:
    - type: text
      text: avy
  - type: text
    text: ' tamin’ny tany manodidina dia nikambana tamin’ny Isiraely izay teo amin’i Saoly sy Jonatana koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny lehilahy rehetra amin’ny Isiraely izay niery tany amin’ny tany havoan’i Efraima, raha nandre ny nandosiran’ny Filistina, dia nanenjika azy fatratra koa tamin’ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Jehovah namonjy ny Isiraely tamin’izany andro izany; ary tafahoatra any Betavena ny ady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ory ny lehilahy amin’ny Isiraely tamin’izany andro izany, nefa Saoly efa nampianiana ny olona hoe: Ho voaozona anie izay olona homan-kanina anio tontolo andro mandra-pamaliko ny fahavaloko. Dia tsy nisy olona nitendry hanina na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny olona rehetra amin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tany rehetra.
    marker-yv: yv-n
  - type: text
    text: ' dia niditra ny ala; ary nisy tantely teny ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa tonga teo anaty ala ny olona, indro, nisy tantely nitsororoka; fa tsy nisy olona sahy nanainga ny tànany ho amin’ny vavany, fa natahotra ny fianianana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Jonatana kosa tsy nandre ny nampianianan-drainy ny olona; koa dia narosony ny loha-tehiny teny an-tànany ka natsobony teo amin’ny tantely, ary nataony teo am-bavany ny tànany, ka dia nazava ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nisy olona anankiray niteny taminy ka nanao hoe: Rainao anie ka efa nampianiana mafy ny olona hoe: Ho voaozona anie izay olona homan-kanina anio; ka efa reraka ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy Jonatana: Ikaky efa nampiditra loza tamin’ny tany; koa jereo, masìna hianareo, he! izato fahazavan’ny masoko tamin’ilay nanandramako kely tamin’ity tantely ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ka mainka fa raha navela hihinanan’ny olona ny babo azony tamin’ny fahavalony, tsy ho nahafatesana be lavitra va ny Filistina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary izy ireo namely ny Filistina tamin’izany andro izany hatrany Mikmasy ka hatrany Aialona, ary reraka indrindra ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nanaovan’ny olona an-kazakazaka ny babo, ka naka ondry aman-osy sy omby ary zanak’omby izy, dia namono azy teo amin’ny tany, ka dia nohanin’ny olona mbamin’ny rany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy nanambara tamin’i Saoly hoe: Indro, ny olona manota amin’i Jehovah, fa mihinana zavatra mbamin’ny rany izy. Ary hoy Saoly: Efa diso hianareo, manakodiava vato lehibe etỳ amiko anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy koa izy: Mieleza eny amin’ny olona hianareo, ka lazao aminy hoe: Samia mitondra ny ombiny etỳ amiko, ary samia mitondra ny ondriny, ka vonoy eto izy, dia hano, ary aza manota amin’i Jehovah amin’ny fihinanana zavatra mbamin’ny rany. Ary ny vahoaka rehetra samy nitondra ny ombiny niaraka taminy tamin’izany alina izany ka namono azy teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary Saoly nanao alitara ho an’i Jehovah; io no alitara voalohany naoriny ho an’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Saoly: Andeha isika hidina hanenjika ny Filistina anio alina ka hamabo azy ambara-pahazavan’ny andro, ary tsy hasiantsika miangana izy. Dia hoy ny olona: Ataovy izay sitrakao. Fa hoy ny mpisorona: Andeha isika hanatona an’Andriamanitra etoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Saoly nanontany tamin’Andriamanitra hoe: Hidina hanenjika ny Filistina va aho? Hatolotrao eo an-tànan’ny Isiraely va izy? Fa tsy namaly azy akory Izy androtriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy Saoly: Manatòna etỳ, hianareo loholona rehetra, ary fantaro ka izahao izay nahatonga izao fahotana androany izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fa raha velona koa Jehovah, Izay Mpamonjy ny Isiraely, dia na amin’i Jonatana zanako aza no hahitana izany, dia ho faty tokoa izy. Fa tsy nisy namaly azy ny vahoaka rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hoy kosa izy tamin’ny Isiraely rehetra: Hianareo no aoka ho an-daniny, ary izaho sy Jonatana zanako kosa ho an-daniny. Ary hoy ny vahoaka tamin’i Saoly: Ataovy izay sitrakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia hoy Saoly tamin’i Jehovah, Andriamanitry ny Isiraely: Asehoy izay marina. Ary Jonatana sy Saoly no notànany, fa afaka ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary hoy Saoly; Manaova filokana ny amiko sy Jonatana zanako. Ary Jonatana no notànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia hoy Saoly tamin’i Jonatana: Ambarao amiko izay nataonao. Ary Jonatana nanambara taminy hoe: Nanandrana tantely kely monja tamin’ny tendron’ny tehina tetỳ an-tànako aho, ary, indro, tsy maintsy ho faty aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia hoy Saoly: Hataon’Andriamanitra toy izany anie, eny mihoatra noho izany aza, raha tsy hatao maty tokoa hianao, ry Jonatana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa hoy ny vahoaka tamin’i Saoly: Ho faty va Jonatana, izay nanao izao famonjena lehibe izao tamin’ny Isiraely? Sanatria izany! Raha velona koa Jehovah, tsy hisy na dia ny singam-bolony iray akory aza ho latsaka amin’ny tany, fa niara-niasa tamin’Andriamanitra izy andro-any. Ary ny vahoaka namonjy an’i Jonatana, ka dia tsy maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary Saoly niakatra rehefa avy nanenjika ny Filistina; ary ny Filistina kosa dia lasa nankany amin’ny taniny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ady nataon’i Saoly, sy ny filazana ny amin’ny taranany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ARY Saoly nahazo ny fanjakan’Isiraely ary niady tamin’ny fahavalony rehetra manodidina, dia tamin’ny Moaba sy ny taranak’i Amona sy ny Edomita sy ny mpanjakan’i Zoba ary ny Filistina; ary izay nalehany rehetra dia resiny avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ary namory miaramila izy, dia namely ny Amalekita ka namonjy ny Isiraely tamin’ny tànan’izay namabo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary izao no zanakalahin’i Saoly: Jonatana sy Jisvy sy Malkisoa; izao kosa no anaran’ny zanani-vavy roa: ny anaran’ ny vavimatoa Meraba, ary ny anaran’ny faravavy Mikala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary ny anaran’ny vadin’i Saoly dia Ahinoama, zanakavavin’i Ahimaza: ary ny anaran’ny komandin’ny miaramilany dia Abnera, zanak’i Nera, rahalahin-drain’i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ary Kisy no rain’i Saoly; ary Nera, rain’i Abnera, dia zanak’i Abiela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ary mafy ny ady tamin’ny Filistina tamin’ny andron’i Saoly rehetra; koa raha nisy olona matanjaka sy mahery hitan’i Saoly, dia nalainy ho azy.
