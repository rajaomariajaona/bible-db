document_id: EXO.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary namaly Mosesy ka nanao hoe: Indro, tsy hino ahy na hihaino ny feoko izy, fa hanao hoe: Tsy niseho taminao Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Jehovah taminy: Inona moa iny an-tànanao? Dia novaliany hoe: Tehina ity. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izy: Atsipazo amin’ny tany iny. Dia natsipiny tamin’ny tany ka tonga menarana, dia nandositra azy Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Ahinjiro ny tànanao, ka raiso amin’ny rambony iny (dia naninjitra ny tànany izy ka nandray azy; dia tonga tehina teo an-tànany indray izy), '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: mba hinoan’ireo fa efa niseho taminao Jehovah, Andriamanitry ny razany, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy koa Jehovah taminy: Atsofohy ao an-tratranao ny tànanao. Dia natsofony tao an-tratrany ny tànany; ary nony notsoahany, dia, indro, efa boka ny tànany ka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fotsy
  - type: text
    text: ' tahaka ny orampanala. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy koa Izy: Atsofohy ao an-tratranao indray ny tànanao (dia natsofony tao an-tratrany indray ny tànany; ary nony notsoahany tamin’ny tratrany, dia, indro, efa tonga tahaka ny hodiny indray izy). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary raha tsy hino anao izy ka tsy hihaino ny feon’ny famantarana voalohany, dia hino ny feon’ny famantarana aoriana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary raha tsy hino izany famantarana roa izany aza izy, na hihaino ny feonao, dia haka rano avy ao Neily hianao, ka haidinao amin’ny tany maina; ary izay rano alainao avy ao Neily dia ho tonga ra eo amin’ny tany maina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Mosesy tamin’i Jehovah: Tompo ô, mifona aminao aho, olona tsy mahay mandaha-teny aho, na hatrany aloha, na hatramin’izao itenenanao amin’ny mpanomponao izao aza; fa votsa vava sy miadam-piteny aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jehovah taminy; Iza moa no nanao ny vavan’ny olona? ary iza no mampahamoana, na mampaharenina, na mampahiratra, na mampahajamba? tsy Izaho Jehovah va? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa ankehitriny, dia mandehana, fa Izaho no homba ny vavanao ka hanoro anao izay holazainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy izy: Tompo ô, mifona aminao aho, iraho izay tianao hirahina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nirehitra tamin’i Mosesy ny fahatezeran’i Jehovah, ka hoy Izy: Tsy ao ihany va Arona Levita rahalahinao? fantatro fa mahay mandaha-teny izy. Ary indro koa, avy hitsena anao izy; koa rehefa mahita anao izy, dia ho faly ny fony. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hiteny aminy ianao ka hanolo-teny azy; ary Izaho homba ny vavanao sy ny vavany ka hanoro anareo izay hataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izy hiteny amin’ny olona hisolo anao; ka dia izy no ho solovavanao, ary hianao kosa ho solon’Andriamanitra aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia ho entinao eny an-tànanao io tehina io, izay hanaovanao ireo famantarana ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia lasa nandeha Mosesy ka niverina ho any amin’i Jetro rafozany ka nanao taminy hoe: Masìna hianao, aoka aho handeha hiverina ho any amin’ny rahalahiko, izay any Egypta, ka hizaha na mbola velona ihany izy, na tsia. Ary hoy Jetro tamin’i Mosesy: Mandehana soa aman-tsara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy tany Midiana: Mandehana miverina any Egypta, fa maty ny olona rehetra izay nitady ny ainao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nalain’i Mosesy ny vadiny sy ny zanani-lahy ka nampitaingeniny boriky, dia niverina ho any amin’ny tany Egypta izy; ary nentin’i Mosesy teny an-tànany ilay tehin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Raha mandeha miverina ho any Egypta hianao, indreo ireo fahagagana rehetra ireo, izay nataoko eo an-tànanao, dia ataovy eo anatrehan’i Farao; ary Izaho hanamafy ny fony, ka tsy handefa ny olona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary lazao amin’i Farao hoe: Izao no lazain’i Jehovah: Zanako lahimatoa Isiraely; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'koa efa nolazaiko taminao hoe: Alefaso ny zanako mba hanompo Ahy; fa efa nandà tsy handefa azy hianao, koa, indro, Izaho hamono ny zanakao lahimatoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony tany an-dàlana tao amin’ny fandriam-bahiny izy, dia nitsena azy Jehovah ka nitady hamono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia naka fiharatra vato Zipora ka namora ny zanany, ary izay nesoriny dia natsipiny teo anilan’ny tongony,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nahatrany tamin’ny tongony.
    marker-yv: yv-n
  - type: text
    text: ' ka hoy izy: Efa vady azoko amin’ny fandatsahan-dra hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niala taminy Izy; ary hoy ravehivavy: Vady azo amin’ny fandatsahan-dra hianao, noho ny fora.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Arona: Mandehana hitsena an’i Mosesy any an-efitra. Dia lasa nandeha izy ka nifanena taminy tao amin’ny tendrombohitr’Andriamanitra, dia nanoroka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary nambaran’i Mosesy tamin’i Arona izay teny rehetra efa nanirahan’i Jehovah azy sy izay famantarana rehetra efa nandidiany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia lasa nandeha Mosesy sy Arona ka nanangona ny loholon’ny Zanak’Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nolazain’i Arona ny teny rehetra izay efa nolazain’i Jehovah tamin’i Mosesy, sady nataony teo imason’ny olona ny famantarana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nino ny olona; ary rehefa reny fa Jehovah efa namangy ny Zanak’Isiraely ka efa nitsinjo ny fahoriany, dia niondrika izy ka niankohoka.
