document_id: ZEC.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahitana fahadimy: ny amin’ny fanaovan-jiro, sy ny hazo oliva roa.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY niverina ilay anjely niresaka tamiko ka namoha ahy toy ny olona fohazina amin-tory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa iza no nanamavo ny andron’ny zava-madinika? Ho faly mahita ny pilao eny an-tànan’i Zerobabela ireo fito ireo, dia ny mason’i Jehovah, izay mijery eny tontolo eny eran’ny tany rehetra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia namaly aho ka nanao taminy hoe: Inona moa ireo hazo oliva roa eo an-kavanan’ny fanaovan-jiro sy eo an-kaviany ireo? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary namaly koa aho ka nanao taminy hoe: Inona moa ireo sampahon’oliva roa eo amin’ny fantsona volamena izay mampijononoka ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: diloilo
    - type: text
      text: ' volamena avy ao aminy ireo? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia namaly izy hoe: Tsy fantatrao va ireo? Ary hoy izaho: Tsia, tompoko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy izy: Ireo no zana-diloilo roa, izay mitsangana eo anoloan’ny Tompon’ny tany rehetra.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy izy tamiko: Inona no hitanao? Ary hoy izaho: Hitako fa, indro, misy fanaovan-jiro tena volamena, ary ny fitoeran-diloilony dia eo an-tampony, ary ny lela fanaovan-jirony fito kosa dia eo aminy, ary misy fantsona fito avy amin’ny isan’ny lela fanaovan-jiro izay eo an-tampony; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary misy hazo oliva roa eo anilany, ny anankiray eo an-kavanan’ny fitoeran-diloilo, ary ny anankiray eo an-kaviany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia niteny tamin’ilay anjely niresaka tamiko aho nanao hoe: Inona moa ireo, tompoko? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ilay anjely niresaka tamiko dia namaly ka nanao tamiko hoe: Tsy fantatrao va ireo? Fa hoy izaho: Tsia, tompoko.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia namaly izy ka nanao tamiko hoe: Izao no tenin’i Jehovah amin’i Zerobabela: Tsy amin-kery na amim-pahatanjahana, fa amin’ny Fanahiko, hoy Jehovah, Tompon’ny maro. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Iza moa hianao, ry tendrombohitra lehibe? Ho tonga tany lemaka eo anoloan’i Zerobabela hianao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ry tendrombohitra lehibe eo anoloan’i Zerobabela? Ho tonga tany lemaka hianao.
      marker-yv: yv-n
    - type: text
      text: ' ary ho entiny mivoaka ny vato hatao tendrony sady hisy fiantsoana hoe: Fahasoavana, fahasoavana anie ho aminy!'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia tonga tamiko indray ny tenin’i Jehovah nanao hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny tànan’i Zerobabela no nanao ny fanorenan’ity trano ity, ary ny tànany koa no hamita azy; ka dia ho fantatrao fa Jehovah, Tompon’ny maro, no naniraka ahy ho aminao. '
