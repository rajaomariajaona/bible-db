document_id: ISA.32,873
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, fa araka ny fahamarinana no hanjakan’ny mpanjaka,
  - type: text
    content: Ary ny lehibe hanapaka araka ny rariny.
  '10':
  - type: text
    content: Raha afaka herintaona mahery dia ho raiki-tahotra hianareo, ry vehivavy matokitoky foana;
  - type: text
    content: Fa hanjahitra ny taom-piotazam-boaloboka,
  - type: text
    content: Ary tsy hisy ny fanangonam-boankazo.
  '11':
  - type: text
    content: Mangovita, ry vehivavy miadana,
  - type: text
    content: Mangorohoroa, ry vehivavy matokitoky foana;
  - type: text
    content: Endaho ny akanjonareo, ka mitanjaha,
  - type: text
    content: Ary misikìna lamba fisaonana.
  '12':
  - type: text
    content: Miteha-tratra izy,
  - type: text
    content: Fa malahelo ny saha nahafinaritra sy ny voaloboka vokatra.
  '13':
  - type: text
    content: Ho rakotry ny tsilo sy ny hery ny tanin’ny oloko,
  - type: text
    content: Eny, na dia ny ao amin’ny trano mahafaly rehetra ao an-tanàna ravoravo aza;
  '14':
  - type: text
    content: Fa ho foana ny lapan’ny mpanjaka;
  - type: text
    content: Hitsahatra ny fihorikoriky ny tanàna;
  - type: text
    content: Ofela
  - type: note
    content: 'Na: Ny havoana.'
  - type: text
    content: ' sy ny tilikambo fitazanana ho tonga naman’ny zohy ho mandrakizay,'
  - type: text
    content: Dia fikarenjen’ny boriki-dia
  - type: text
    content: Sy fiandrasana ny andian’ny ondry aman-osy,
  '15':
  - type: text
    content: Mandra-pandatsaka ny Fanahy avy amin’ny avo ho amintsika,
  - type: text
    content: Ka ny efitra ho tonga saha mahavokatra,
  - type: text
    content: Ary ny saha mahavokatra hoheverina ho ala.
  '16':
  - type: text
    content: Ary hitoetra any an-efitra ny rariny,
  - type: text
    content: Ary ny fahamarinana honina ao amin’ny saha mahavokatra.
  '17':
  - type: text
    content: Ny asan’ny fahamarinana ho fiadanana;
  - type: text
    content: Ary ny vokatry ny fahamarinana dia ho fiadanana sy fahatokiana mandrakizay;
  '18':
  - type: text
    content: Ary ny oloko hitoetra ao amin’ny fonenana mandry fahizay
  - type: text
    content: Sy ao amin’ny fitoerana mahatoky
  - type: text
    content: Ary ao amin’ny fialan-tsasatra feno fiadanam-po;
  '19':
  - type: text
    content: Nefa hilatsaka ny havandra, rehefa aripaka ny ala,
  - type: text
    content: Ary halamaka dia halamaka ny tanàna.
  '2':
  - type: text
    content: Ary hisy lehilahy
  - type: note
    content: 'Na: Ary samy.'
  - type: text
    content: ' ho fierena amin’ny rivotra'
  - type: text
    content: Sy ho fialofana amin’ny ranonoram-baratra;
  - type: text
    content: Ho ranovelona ao amin’ny tany karankaina izy,
  - type: text
    content: Ho alo-batolampy lehibe amin’ny tany mahana.
  '20':
  - type: text
    content: Sambatra izay mamafy eny amoron’ny rano rehetra
  - type: text
    content: Sady mampiriaria ny omby sy ny boriky.
  '3':
  - type: text
    content: Ary tsy hikimpy ny mason’izay mahita,
  - type: text
    content: Ary ny sofin’izay mandre dia hihaino.
  '4':
  - type: text
    content: Ny fon’izay maimaika hahazo fahalalana,
  - type: text
    content: Ary ny lelan’izay mikodedidedy hahay miteny mahitsy.
  '5':
  - type: text
    content: Ny adala tsy holazaina intsony hoe mitoetr’andriana,
  - type: text
    content: Ary ny mpifetsy tsy holazaina hoe mahafoy be.
  - type: note
    content: Heb. mpanan-karena.
  '6':
  - type: text
    content: Fa ny adala mbola miteny fahadalana ihany,
  - type: text
    content: Ary ny fony mamoron-keloka,
  - type: text
    content: Mba hanaovany fihatsarambelatsihy
  - type: note
    content: 'Na: ratsy.'
  - type: text
    content: Sy hitenenany hevi-diso ny amin’i Jehovah
  - type: text
    content: Ary hanaovany izay tsy hahazoan’ny noana hanina
  - type: text
    content: Sy izay tsy hahazoan’ny mangetaheta rano hosotroina.
  '7':
  - type: text
    content: Ary ratsy ny hafetsen’
  - type: note
    content: Heb. fiasan’.
  - type: text
    content: ' ny mpifetsy;'
  - type: text
    content: Mamoron-tsain-dratsy izy hanimbany ny ory amin’ny teny lainga,
  - type: text
    content: Na dia miteny manan-drariny aza ny malahelo;
  '8':
  - type: text
    content: Fa ny mitoetr’andriana kosa dia mamoron-tsaina araka izay mahamendrika andriana,
  - type: text
    content: Ary izay mahamendrika andriana no ifikirany.
  - type: heading
    content: Anatra mafy tamin’ny vehivavy tao Jerosalema.
  '9':
  - type: text
    content: MITSANGÀNA, ry vehivavy miadana, ka mandrenesa ny feoko;
  - type: text
    content: Ry zazavavy matokitoky foana, mihainoa ny teniko.
