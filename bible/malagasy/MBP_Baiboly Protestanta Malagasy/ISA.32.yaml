document_id: ISA.32
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, fa araka ny fahamarinana no hanjakan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lehibe hanapaka araka ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary hisy lehilahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary samy.
    marker-yv: yv-n
  - type: text
    text: ' ho fierena amin’ny rivotra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho fialofana amin’ny ranonoram-baratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ranovelona ao amin’ny tany karankaina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho alo-batolampy lehibe amin’ny tany mahana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary tsy hikimpy ny mason’izay mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sofin’izay mandre dia hihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fon’izay maimaika hahazo fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelan’izay mikodedidedy hahay miteny mahitsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala tsy holazaina intsony hoe mitoetr’andriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpifetsy tsy holazaina hoe mahafoy be.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpanan-karena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny adala mbola miteny fahadalana ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fony mamoron-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanaovany fihatsarambelatsihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hitenenany hevi-diso ny amin’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanaovany izay tsy hahazoan’ny noana hanina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay tsy hahazoan’ny mangetaheta rano hosotroina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ratsy ny hafetsen’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiasan’.
    marker-yv: yv-n
  - type: text
    text: ' ny mpifetsy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamoron-tsain-dratsy izy hanimbany ny ory amin’ny teny lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia miteny manan-drariny aza ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny mitoetr’andriana kosa dia mamoron-tsaina araka izay mahamendrika andriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mahamendrika andriana no ifikirany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra mafy tamin’ny vehivavy tao Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: MITSANGÀNA, ry vehivavy miadana, ka mandrenesa ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry zazavavy matokitoky foana, mihainoa ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha afaka herintaona mahery dia ho raiki-tahotra hianareo, ry vehivavy matokitoky foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hanjahitra ny taom-piotazam-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy ny fanangonam-boankazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mangovita, ry vehivavy miadana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangorohoroa, ry vehivavy matokitoky foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endaho ny akanjonareo, ka mitanjaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misikìna lamba fisaonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miteha-tratra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa malahelo ny saha nahafinaritra sy ny voaloboka vokatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ho rakotry ny tsilo sy ny hery ny tanin’ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia ny ao amin’ny trano mahafaly rehetra ao an-tanàna ravoravo aza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho foana ny lapan’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsahatra ny fihorikoriky ny tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ofela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny havoana.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tilikambo fitazanana ho tonga naman’ny zohy ho mandrakizay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fikarenjen’ny boriki-dia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fiandrasana ny andian’ny ondry aman-osy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mandra-pandatsaka ny Fanahy avy amin’ny avo ho amintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny efitra ho tonga saha mahavokatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny saha mahavokatra hoheverina ho ala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hitoetra any an-efitra ny rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinana honina ao amin’ny saha mahavokatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny asan’ny fahamarinana ho fiadanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vokatry ny fahamarinana dia ho fiadanana sy fahatokiana mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny oloko hitoetra ao amin’ny fonenana mandry fahizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ao amin’ny fitoerana mahatoky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao amin’ny fialan-tsasatra feno fiadanam-po;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa hilatsaka ny havandra, rehefa aripaka ny ala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary halamaka dia halamaka ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sambatra izay mamafy eny amoron’ny rano rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mampiriaria ny omby sy ny boriky.
