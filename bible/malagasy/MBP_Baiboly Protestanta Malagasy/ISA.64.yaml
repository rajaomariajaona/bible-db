document_id: ISA.64,873
type_code: plt
verses:
  '1':
  - type: text
    content: Dia tahaka ny fandevon’ny afo ny tapa-kazo maina
  - type: text
    content: Sy ny fampangotraky ny afo ny rano–
  - type: text
    content: Mba hampahafantatra ny fahavalonao ny anaranao,
  - type: text
    content: Ka hangovitra eo anoloanao ny jentilisa.
  '10':
  - type: text
    content: Ny tranonay masina sady mendrika,
  - type: text
    content: Izay nideran’ny razanay Anao,
  - type: text
    content: Dia voadotry ny afo,
  - type: text
    content: Ary rava ny zavatray mahafinaritra rehetra.
  '11':
  - type: text
    content: Ary mbola mahatsindry fo amin’izany zavatra izany ihany va Hianao, Jehovah ô?
  - type: text
    content: Hangina va Hianao ka hampahory anay mafy loatra?
  '2':
  - type: text
    content: Raha nanao zava-mahatahotra izay tsy nantenainay Hianao,
  - type: text
    content: Dia nidina, ka nihorohoro
  - type: note
    content: 'Na: niempo.'
  - type: text
    content: ' teo anoloanao ny tendrombohitra.'
  '3':
  - type: text
    content: Fa hatrizay hatrizay dia tsy mbola ren’ny olona, na nohenoiny,
  - type: text
    content: Na hitan’ny masony, Izay Andriamanitra miasa ho an’ny miandry Azy afa-tsy Hianao.
  '4':
  - type: text
    content: Mitsena
  - type: note
    content: 'Na: Miantra.'
  - type: text
    content: ' izay mifaly hanao ny marina Hianao'
  - type: text
    content: Dia izay mahatsiaro Anao amin’ny làlanao;
  - type: text
    content: Indro, Hianao dia tezitra, ary hita fa meloka
  - type: note
    content: 'Na: ary efa nanota.'
  - type: text
    content: ' izahay;'
  - type: text
    content: Hatramin’ny ela dia izany no toetray, ka dia hovonjena va?
  '5':
  - type: text
    content: Fa samy efa tahaka ny olo-maloto izahay rehetra,
  - type: text
    content: Ary tahaka ny lamba mihosin-dra ny fahamarinanay rehetra;
  - type: text
    content: Malazo tahaka ny ravina izahay rehetra,
  - type: text
    content: Ary ny helokay mipaoka anay tahaka ny rivotra,
  '6':
  - type: text
    content: Tsy misy miantso ny anaranao,
  - type: text
    content: Na mifoha hifikitra aminao;
  - type: text
    content: Fa efa nanafina ny tavanao taminay Hianao
  - type: text
    content: Ka nandevona anay noho ny helokay.
  '7':
  - type: text
    content: Fa ankehitriny, Jehovah ô, Rainay Hianao;
  - type: text
    content: Izahay dia tanimanga, ary Hianao no mpanefy anay,
  - type: text
    content: Ary asan’ny tànanao izahay rehetra.
  '8':
  - type: text
    content: Aza dia tezitra mafy loatra, Jehovah ô,
  - type: text
    content: Ary aza dia mahatsiaro heloka mandrakizay;
  - type: text
    content: Masìna Hianao, tsinjovy, fa olonao izahay rehetra.
  '9':
  - type: text
    content: Tonga efitra ireo tanànanao masina,
  - type: text
    content: Eny, tany lavavolo Ziona,
  - type: text
    content: Ary efa lao Jerosalema.
