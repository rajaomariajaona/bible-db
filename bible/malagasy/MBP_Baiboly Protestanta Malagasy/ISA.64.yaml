document_id: ISA.64
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia tahaka ny fandevon’ny afo ny tapa-kazo maina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fampangotraky ny afo ny rano–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampahafantatra ny fahavalonao ny anaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hangovitra eo anoloanao ny jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha nanao zava-mahatahotra izay tsy nantenainay Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nidina, ka nihorohoro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: niempo.
    marker-yv: yv-n
  - type: text
    text: ' teo anoloanao ny tendrombohitra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa hatrizay hatrizay dia tsy mbola ren’ny olona, na nohenoiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hitan’ny masony, Izay Andriamanitra miasa ho an’ny miandry Azy afa-tsy Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Miantra.
    marker-yv: yv-n
  - type: text
    text: ' izay mifaly hanao ny marina Hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mahatsiaro Anao amin’ny làlanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Hianao dia tezitra, ary hita fa meloka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary efa nanota.
    marker-yv: yv-n
  - type: text
    text: ' izahay;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny ela dia izany no toetray, ka dia hovonjena va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa samy efa tahaka ny olo-maloto izahay rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny lamba mihosin-dra ny fahamarinanay rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malazo tahaka ny ravina izahay rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny helokay mipaoka anay tahaka ny rivotra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy misy miantso ny anaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mifoha hifikitra aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nanafina ny tavanao taminay Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nandevona anay noho ny helokay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ankehitriny, Jehovah ô, Rainay Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izahay dia tanimanga, ary Hianao no mpanefy anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary asan’ny tànanao izahay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza dia tezitra mafy loatra, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza dia mahatsiaro heloka mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masìna Hianao, tsinjovy, fa olonao izahay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tonga efitra ireo tanànanao masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tany lavavolo Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa lao Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny tranonay masina sady mendrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nideran’ny razanay Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia voadotry ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rava ny zavatray mahafinaritra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary mbola mahatsindry fo amin’izany zavatra izany ihany va Hianao, Jehovah ô?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hangina va Hianao ka hampahory anay mafy loatra?
