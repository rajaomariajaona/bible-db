document_id: ISA.64,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny fandevon’ny afo ny tapa-kazo maina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fampangotraky ny afo ny rano–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampahafantatra ny fahavalonao ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hangovitra eo anoloanao ny jentilisa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranonay masina sady mendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nideran’ny razanay Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia voadotry ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rava ny zavatray mahafinaritra rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mbola mahatsindry fo amin’izany zavatra izany ihany va Hianao, Jehovah ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hangina va Hianao ka hampahory anay mafy loatra?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nanao zava-mahatahotra izay tsy nantenainay Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nidina, ka nihorohoro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niempo.
      marker-yv: yv-n
    - type: text
      text: ' teo anoloanao ny tendrombohitra.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hatrizay hatrizay dia tsy mbola ren’ny olona, na nohenoiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hitan’ny masony, Izay Andriamanitra miasa ho an’ny miandry Azy afa-tsy Hianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miantra.
      marker-yv: yv-n
    - type: text
      text: ' izay mifaly hanao ny marina Hianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay mahatsiaro Anao amin’ny làlanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Hianao dia tezitra, ary hita fa meloka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary efa nanota.
      marker-yv: yv-n
    - type: text
      text: ' izahay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny ela dia izany no toetray, ka dia hovonjena va?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy efa tahaka ny olo-maloto izahay rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny lamba mihosin-dra ny fahamarinanay rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malazo tahaka ny ravina izahay rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny helokay mipaoka anay tahaka ny rivotra,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy miantso ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mifoha hifikitra aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanafina ny tavanao taminay Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nandevona anay noho ny helokay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny, Jehovah ô, Rainay Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izahay dia tanimanga, ary Hianao no mpanefy anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asan’ny tànanao izahay rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza dia tezitra mafy loatra, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza dia mahatsiaro heloka mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masìna Hianao, tsinjovy, fa olonao izahay rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga efitra ireo tanànanao masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tany lavavolo Ziona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa lao Jerosalema.
