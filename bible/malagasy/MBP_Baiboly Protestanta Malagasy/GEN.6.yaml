document_id: GEN.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Noa sy ny Safo-drano.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raha vao nihamaro ny olona tambonin’ny tany ka niteraka zazavavy maro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia hitan’ny zanak’Andriamanitra fa tsara tarehy ny zanakavavin’ny olona; ka dia nifidy vady ho azy tamin’izy rehetra araka izay tiany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jehovah: Tsy mba hanapaka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hitsara, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hifandahatra.
    marker-yv: yv-n
  - type: text
    text: ' mandrakariva ao amin’ny olona ny Fanahiko, fa amin’ny faniavany dia nofo izy;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: satria nofo koa izy.
    marker-yv: yv-n
  - type: text
    text: ' nefa ho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka.
    marker-yv: yv-n
  - type: text
    text: ' roa-polo amby zato taona ny androny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny Nefilima nitoetra tambonin’ny tany tamin’izany andro izany, sy taorian’izany koa, raha nivady tamin’ny zanakavavin’ny olona ny zanak’Andriamanitra, ka niterahany; ireo no ilay olo-mahery hatrizay ela izay, dia ny lehilahy nanan-daza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hitan’i Jehovah fa be ny faharatsian’ny olona tambonin’ny tany, ka izay fisainana rehetra avy amin’ny fony dia ratsy ihany mandritra ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jehovah nanenina noho ny nanaovany olona tambonin’ny tany, ka nalahelo ny fony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Jehovah: Haringako tsy hisy ambonin’ny tany ny olona izay noforoniko, hatramin’ny olona ka hatramin’ny biby fiompy sy ny biby mandady na mikisaka mbamin’ny voro-manidina; fa manenina Aho noho ny nanaovako azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Noa kosa nahita fitia teo imason’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no tantaran’i Noa:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Noa dia lehilahy marina sady tsy nisy tsiny teo amin’ny olona niara-belona taminy; eny, niara-nandeha tamin’Andriamanitra Noa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Noa niteraka zanaka telo mirahalahy, dia Sema sy Hama ary Jafeta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary simba ny tany teo anatrehan’Andriamanitra sady heni-doza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia hitan’Andriamanitra ny tany, ka, indro, efa simba izy; fa ny nofo rehetra samy efa nanimba ny làlany avy tambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Andriamanitra tamin’i Noa: Ny faran’ny nofo rehetra efa mby eto anatrehako, satria efa heni-doza ny tany noho ny amin’ny olona, ka, indro, efa handringana azy mbamin’ny tany Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa, manaova sambo-fiara ho anao amin’ny hazo gofera;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kypreso (?).
    marker-yv: yv-n
  - type: text
    text: ' ary hasianao efitrefitra ny sambo-fiara, ka hopetahanao dity ao anatiny sy eo ivelany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary toy izao no hanaovanao azy: hakiho telon-jato ny lavan’ny sambo-fiara, hakiho dimam-polo ny sakany, ary hakiho telo-polo ny hahavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hasianao fidiran’ny mazava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tafo.
    marker-yv: yv-n
  - type: text
    text: ' ny sambo-fiara, ary amin’ny hakiho iray no hahavitanao azy hatreo ambony; ary hasianao vara-varana ny rindrin’ny sambo-fiara; hataonao efitra telo mifanongoa izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary, indro, Izaho efa hahatonga ny safo-drano ambonin’ny tany handringana ny nofo rehetra izay manampofonaina ambanin’ny lanitra; dia ho faty izay rehetra eo amin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa kosa haoriko ny fanekeko aminao; ary hiditra ao anatin’ny sambo-fiara hianao sy ny vadinao aman-janakao mbamin’ny vinantonao-vavy miaraka aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zava-manan-aina rehetra, dia ny nofo rehetra, hitondranao roa avy isan-karazany ho ao anatin’ny sambo-fiara, hovelomina miaraka aminao; ho lahy sy vavy avy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny vorona, samy araka ny karazany avy, ary ny biby, samy araka ny karazany avy, ary ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy, dia roa avy isan-karazany no hankeo aminao hovelomina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary analao ho anao ny zavatra rehetra izay mety ho fihinana, ka angony ho eo aminao; dia ho fihinana ho anao sy ho an’ireo koa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nataon’i Noa izany; araka izay rehetra nandidian’Andriamanitra azy no nataony.
