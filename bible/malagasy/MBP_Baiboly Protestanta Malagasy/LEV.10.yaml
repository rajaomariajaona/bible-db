document_id: LEV.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitondran’i Nadaba sy Abiho afo tsy izy, sy ny nataon’Andriamanitra noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Nadaba sy Abiho, zanak’i Arona, samy naka ny fitondran-afony avy ka nanisy afo teo anatiny, ary nanisy ditin-kazo manitra teo, dia nanatitra afo tsy izy teo anatrehan’i Jehovah, izay tsy nandidiany azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary mba hahaizanareo manavaka ny masina sy ny tsy masina, ary ny madio sy ny tsy madio, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ary mba hampianarinareo ny Zanak’Isiraely ny didy rehetra izay nasain’i Jehovah holazain’i Mosesy taminy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Mosesy tamin’i Arona ary tamin’i Eleazara sy Itamara zanani-lahy sisa: Alao ny fanatitra hohanina izay sisa amin’ny fanatitra natao tamin’ny afo ho an’i Jehovah, ka hano eo anilan’ny alitara izany, nefa aza asiana masirasira; fa masina dia masina izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hano eo amin’izay fitoerana masina izany, fa anjaranao sy ny zanakao avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah izany; fa izany no nandidiany ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny tratrany ahevaheva sy ny sorony asandratra hohaninareo eo amin’izay fitoerana madio, dia hianao mbamin’ny zanakao-lahy sy ny zanakao-vavy koa; fa nomena ho anjaranao sy ny zanakao ireo avy amin’ny fanati-pihavanana aterin’ny Zanak’Isiraely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny sorony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: feny.
      marker-yv: yv-n
    - type: text
      text: ' asandratra sy ny tratrany ahevaheva mbamin’ny saborany izay fanatitra atao amin’ny afo dia ho entiny mba hahevaheva ho fanatitra ahevaheva eo anatrehan’i Jehovah; dia ho anao sy ny zanakao koa ireo, ho anjaranareo mandrakizay, araka izay nandidian’i Jehovah.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Mosesy nitady fatratra ny osilahy izay natao fanatitra noho ny ota, kanjo efa voadotra izany; dia tezitra tamin’ny zanak’i Arona sisa izy, dia tamin’i Eleazara sy Itamara, ka hoy izy: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nahoana no tsy nohaninareo teo amin’ny fitoerana masina ny fanatitra noho ny ota? fa masina dia masina izany, ary efa nomeny anareo izy hitondranareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanesoranareo.
      marker-yv: yv-n
    - type: text
      text: ' ny heloky ny fiangonana, hanaovana fanavotana ho azy eo anatrehan’i Jehovah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indro, ny rany tsy nampidirina tao anatin’ny fitoerana masina, koa tokony ho nihinana azy mihitsy teo amin’ny fitoerana masina hianareo, araka izay nandidiako.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Arona niteny tamin’i Mosesy ka nanao hoe: Indro, andro-any no nanaterany ny fanatiny noho ny ota sy ny fanatitra dorany teo anatrehan’i Jehovah, ary efa azon’izao manjo izao aho; koa raha tàhiny nihinana ny fanatitra noho ny ota andro-any aho, moa ho tsara teo imason’i Jehovah va izany? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nisy afo nivoaka avy teo anatrehan’i Jehovah ka nahafaty azy roa lahy, dia maty teo anatrehan’i Jehovah izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary raha ren’i Mosesy izany, dia nankasitrahany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy Mosesy tamin’i Arona: Izany dia ilay nolazain’i Jehovah hoe: Amin’izay akaiky Ahy no hisehoako ho masina, ary eo anatrehan’ny olona rehetra no hampisehoako ny voninahitro. Dia sina Arona.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Mosesy dia nampaka an’i Misaela sy Elzafana, zanak’i Oziela, rahalahin-drain’i Arona, ka nanao taminy hoe: Manatòna, ka ento ny rahalahinareo hiala eo anoloan’ny fitoerana masina ho eny ivelan’ny toby. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia nanatona izy roa lahy ka nitondra azy, mbola miakanjo ny akanjo lavany ihany, ho eny ivelan’ny toby, araka izay efa nolazain’i Mosesy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Mosesy tamin’i Arona ary tamin’i Eleazara sy Itamara, zanani-lahy: Aza mirakaraka volo,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aza tsy misatroka.
      marker-yv: yv-n
    - type: text
      text: ' na mandriatra ny akanjonareo, fandrao mba maty koa hianareo, sady hisy fahatezerana hahatratra ny olona rehetra; fa aoka ny rahalahinareo, dia ny taranak’Isiraely rehetra, no hitomany noho ny fahamaizana izay narehitr’i Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary aza miala eo anoloan’ny varavaran’ny trano-lay fihaonana, fandrao maty hianareo; fa efa mby aminareo ny diloilo fanosoran’i Jehovah. Dia nanao araka ny tenin’i Mosesy izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Arona ka nanao hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza misotro divay na toaka hianao, na ny zanakao, raha miditra ao amin’ny trano-lay fihaonana, mba tsy ho faty hianareo (ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany), '
