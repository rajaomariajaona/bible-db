document_id: 2CH.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Ozia.
  - type: text
    content: ARY ny vahoaka rehetra tamin’ny Joda naka an’i Ozia, izay enina ambin’ny folo taona, ka nampanjaka azy handimby an’i Amazia rainy.
  '10':
  - type: text
    content: Ary nanao tilikambo tany an-efitra koa izy sady nihady lavaka maro ho famorian-drano; fa izy nanana omby aman-ondry betsaka teny an-tany lemaka sy teny an-tanety ary mpiasa koa sy mpamboatra tanimboaloboka teny an-tendrombohitra sy teny Karmela koa; fa tia asa tany izy.
  '11':
  - type: text
    content: 'Ary Ozia nanana miaramila maro, izay nanao antokony handeha hanafika, dia araka ny isany izay nandaminan’i Jeiela mpanoratra sy Mahaseia mpifehy azy, ka nofehezin’i Hanania, anankiray tamin’ny komandy voatendrin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Enin-jato amby roa arivo no isan’ny lohan’ny fianakaviana rehetra, dia lehilahy mahery avokoa. '
  '13':
  - type: text
    content: Ary ny miaramila fehezin’ireo dia diman-jato amby fito arivo sy telo hetsy, izay nahery niady indrindra, homba ny mpanjaka hiady amin’ny fahavalony.
  '14':
  - type: text
    content: 'Ary Ozia namboatra ampinga sy lefona sy fiarovan-doha sy akanjo fiarovan-tratra sy tsipìka ary vaton’antsamotady ho an’ireo miaramila rehetra ireo. '
  '15':
  - type: text
    content: Ary nanao fiadiana lehibe tany Jerosalema izy, natao araka ny marika vitan’ny mahay zavatra, hapetraka eo amin’ny tilikambo sy eo an-tampon’ny mànda mba handefasana zana-tsipìka sy vato lehibe. Ary niely lavitra ny lazan’i Ozia; fa mahagaga ny nanampiana azy, ka tonga mahery tokoa izy.
  '16':
  - type: text
    content: 'Ary nony nahery izy, dia niavonavona ny fony, ka nanao izay ratsy izy, fa nivadika tamin’i Jehovah Andriamaniny ka niditra tao amin’ny tempolin’i Jehovah handoro ditin-kazo manitra teo amin’ny alitara fandoroana ditin-kazo manitra. '
  '17':
  - type: text
    content: 'Fa niditra nanaraka azy kosa Azaria mpisorona mbamin’ny valo-polo lahy amin’ny mpisoron’i Jehovah, lehilahy samy mahery avokoa. '
  '18':
  - type: text
    content: 'Ary nanohitra an’i Ozia mpanjaka ireo ka nanao taminy hoe: Tsy raharahanao, ry Ozia, ny handoro ditin-kazo manitra ho an’i Jehovah, fa an’ny mpisorona ihany, dia ny taranak’i Arona, izay nohamasinina handoro ditin-kazo manitra. Mialà amin’ny fitoerana masina, fa nanao izay mahadiso hianao; ary tsy ho voninahitra ho anao eo anatrehan’i Jehovah Andriamanitra izany.'
  '19':
  - type: text
    content: 'Dia nisafoaka Ozia, ary nisy lovia teny an-tànany handoroany ditin-kazo manitra; koa raha mbola nisafoaka tamin’ny mpisorona izy, dia nisy habokana nipoitra tamin’ny handriny teo anatrehan’ny mpisorona tao an-tranon’i Jehovah, tanilan’ny alitara fandoroana ditin-kazo manitra. '
  '2':
  - type: text
    content: Izy no nanamboatra an’i Elota ka nampody azy ho an’ny Joda indray, rehefa lasa nodi-mandry any amin’ny razany ny mpanajaka.
  '20':
  - type: text
    content: Ary Azaria mpisoronabe sy ny mpisorona rehetra dia nanatrika nijery azy, ka, indro, boka ny handriny; dia noroahiny hiala teo izy; nefa ny tenany dia mba nivoaka faingana ihany koa, satria Jehovah efa namely azy.
  '21':
  - type: text
    content: Ary Ozia mpanjaka dia boka ambara-pahafatiny ka nitoetra tao an-trano mitokana, satria tsy nahazo niditra tao an-tranon’i Jehovah intsony izy. Ka dia Jotama zanany no nanapaka tao an-dapa sady nitsara ny vahoaka.
  '22':
  - type: text
    content: 'Ary ny tantaran’i Ozia sisa, na ny voalohany na ny farany, dia efa nosoratan’Isaia mpaminany, zanak’i Amoza; '
  '23':
  - type: text
    content: 'ary Ozia lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-tsaha fandevenana izay an’ny mpanjaka, satria hoy ny olona: Boka izy. Ary Jotama zanany no nanjaka nandimby azy.'
  '3':
  - type: text
    content: Enina ambin’ny folo taona Ozia, fony izy vao nanjaka, ary roa amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jekolia, avy any Jerosalema.
  '4':
  - type: text
    content: 'Ary nanao izay mahitsy eo imason’i Jehovah izy, tahaka izay rehetra nataon’i Amazia rainy. '
  '5':
  - type: text
    content: Ary nitady an’Andriamanitra izy tamin’ny andron’i Zakaria, izay nahafantatra ny fahitana an’Andriamanitra; ary tamin’ny andro nitadiavany an’i Jehovah dia nambinin’Andriamanitra izy.
  '6':
  - type: text
    content: 'Ary nivoaka izy ka niady tamin’ny Filistina, dia nandrava ny màndan’i Gata sy ny an’i Jabne sy ny an’i Asdoda ary nanao tanàna tany Asdoda sy tany amin’ny Filistina. '
  '7':
  - type: text
    content: 'Ary Andriamanitra nanampy azy hamely ny Filistina sy ny Arabo izay nonina tao Gorabala ary ny Meonita. '
  '8':
  - type: text
    content: Ary ny Amonita nandoa hetra ho an’i Ozia; dia niely ny lazany hatrany akaikin’i Egypta, fa tonga mahery indrindra izy.
  '9':
  - type: text
    content: 'Ary Ozia nanao tilikambo tany Jerosalema, teo amin’ny vavahady an-jorony sy teo amin’ny vavahady mankao amin’ny tany lemaka sy teo an-jorony ka nanamafy azy. '
