document_id: 2CH.26
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Ozia.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY ny vahoaka rehetra tamin’ny Joda naka an’i Ozia, izay enina ambin’ny folo taona, ka nampanjaka azy handimby an’i Amazia rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izy no nanamboatra an’i Elota ka nampody azy ho an’ny Joda indray, rehefa lasa nodi-mandry any amin’ny razany ny mpanajaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Enina ambin’ny folo taona Ozia, fony izy vao nanjaka, ary roa amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jekolia, avy any Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nanao izay mahitsy eo imason’i Jehovah izy, tahaka izay rehetra nataon’i Amazia rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nitady an’Andriamanitra izy tamin’ny andron’i Zakaria, izay nahafantatra ny fahitana an’Andriamanitra; ary tamin’ny andro nitadiavany an’i Jehovah dia nambinin’Andriamanitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nivoaka izy ka niady tamin’ny Filistina, dia nandrava ny màndan’i Gata sy ny an’i Jabne sy ny an’i Asdoda ary nanao tanàna tany Asdoda sy tany amin’ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Andriamanitra nanampy azy hamely ny Filistina sy ny Arabo izay nonina tao Gorabala ary ny Meonita. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny Amonita nandoa hetra ho an’i Ozia; dia niely ny lazany hatrany akaikin’i Egypta, fa tonga mahery indrindra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Ozia nanao tilikambo tany Jerosalema, teo amin’ny vavahady an-jorony sy teo amin’ny vavahady mankao amin’ny tany lemaka sy teo an-jorony ka nanamafy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nanao tilikambo tany an-efitra koa izy sady nihady lavaka maro ho famorian-drano; fa izy nanana omby aman-ondry betsaka teny an-tany lemaka sy teny an-tanety ary mpiasa koa sy mpamboatra tanimboaloboka teny an-tendrombohitra sy teny Karmela koa; fa tia asa tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Ozia nanana miaramila maro, izay nanao antokony handeha hanafika, dia araka ny isany izay nandaminan’i Jeiela mpanoratra sy Mahaseia mpifehy azy, ka nofehezin’i Hanania, anankiray tamin’ny komandy voatendrin’ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Enin-jato amby roa arivo no isan’ny lohan’ny fianakaviana rehetra, dia lehilahy mahery avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny miaramila fehezin’ireo dia diman-jato amby fito arivo sy telo hetsy, izay nahery niady indrindra, homba ny mpanjaka hiady amin’ny fahavalony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Ozia namboatra ampinga sy lefona sy fiarovan-doha sy akanjo fiarovan-tratra sy tsipìka ary vaton’antsamotady ho an’ireo miaramila rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nanao fiadiana lehibe tany Jerosalema izy, natao araka ny marika vitan’ny mahay zavatra, hapetraka eo amin’ny tilikambo sy eo an-tampon’ny mànda mba handefasana zana-tsipìka sy vato lehibe. Ary niely lavitra ny lazan’i Ozia; fa mahagaga ny nanampiana azy, ka tonga mahery tokoa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony nahery izy, dia niavonavona ny fony, ka nanao izay ratsy izy, fa nivadika tamin’i Jehovah Andriamaniny ka niditra tao amin’ny tempolin’i Jehovah handoro ditin-kazo manitra teo amin’ny alitara fandoroana ditin-kazo manitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa niditra nanaraka azy kosa Azaria mpisorona mbamin’ny valo-polo lahy amin’ny mpisoron’i Jehovah, lehilahy samy mahery avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nanohitra an’i Ozia mpanjaka ireo ka nanao taminy hoe: Tsy raharahanao, ry Ozia, ny handoro ditin-kazo manitra ho an’i Jehovah, fa an’ny mpisorona ihany, dia ny taranak’i Arona, izay nohamasinina handoro ditin-kazo manitra. Mialà amin’ny fitoerana masina, fa nanao izay mahadiso hianao; ary tsy ho voninahitra ho anao eo anatrehan’i Jehovah Andriamanitra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nisafoaka Ozia, ary nisy lovia teny an-tànany handoroany ditin-kazo manitra; koa raha mbola nisafoaka tamin’ny mpisorona izy, dia nisy habokana nipoitra tamin’ny handriny teo anatrehan’ny mpisorona tao an-tranon’i Jehovah, tanilan’ny alitara fandoroana ditin-kazo manitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Azaria mpisoronabe sy ny mpisorona rehetra dia nanatrika nijery azy, ka, indro, boka ny handriny; dia noroahiny hiala teo izy; nefa ny tenany dia mba nivoaka faingana ihany koa, satria Jehovah efa namely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Ozia mpanjaka dia boka ambara-pahafatiny ka nitoetra tao an-trano mitokana, satria tsy nahazo niditra tao an-tranon’i Jehovah intsony izy. Ka dia Jotama zanany no nanapaka tao an-dapa sady nitsara ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny tantaran’i Ozia sisa, na ny voalohany na ny farany, dia efa nosoratan’Isaia mpaminany, zanak’i Amoza; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary Ozia lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-tsaha fandevenana izay an’ny mpanjaka, satria hoy ny olona: Boka izy. Ary Jotama zanany no nanjaka nandimby azy.'
