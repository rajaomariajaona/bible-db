document_id: JOB.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ombilahiny mampiteraka ka mahavanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ombivaviny miteraka ka tsy mamotsotra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamoaka ny zanany madinika toy ny ondry aman-osy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mikoriana ny zanany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihoby mitondra ampongatapaka sy lokanga izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mifaly amin’ny feon-tsodina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandany ny androny amin’ny fahafinaretana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny indray mipì-maso monja no idinany any amin’ny fiainan-tsi-hita.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kanefa anie ireo no manao amin’Andriamanitra hoe: Mialà aminay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mba irinay ny hahalala ny làlanao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zinona izay Tsitoha, no hotompoinay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no soa ho azonay, raha mivavaka aminy?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, tsy avy amin’ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy eo an-tànany.
      marker-yv: yv-n
    - type: text
      text: ' ihany ny fahafinaretany!–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavitra ahy anie ny fisainan’ny ratsy fanahy!–
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indraindray foana no mba maty ny jiron’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tonga ny loza manjo azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amelaran’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' fandrika ireny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'izaran’ '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andriamanitra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahoriana ho an’ireny.
      marker-yv: yv-n
    - type: text
      text: ' noho ny fahatezerany,'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tonga tahaka ny mololo voatetika indaosin’ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny akofa entin’ny tafio-drivotra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Andriamanitra, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy hianareo
    - type: text
      text: ', mbola hampijaly ny zanany noho ny helo-drainy!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia; fa ny tenan’ireny ihany no aoka hovaliany, mba hahalalany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa dia mihainoa ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka izany no ho fampiononanareo ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny masony ihany no hahita ny loza manjo azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny tenany ihany no hisotro ny fahatezeran’ny Tsitoha.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mampaninona azy moa ny amin’ny taranany mandimby azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tapaka ny isan’ny androny?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa Andriamanitra va no hampianarim-pahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izy no mitsara ny any an-danitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avo.
      marker-yv: yv-n
    - type: text
      text: ' aza?'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maty ny anankiray, raha tsy mbola mihena ny fahatanjahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miadana tokoa ka tsy manana ahiahy;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno ronono ny fitoeran-drononony,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manotraka ny kibony.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vonton-tsoka ny taolany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anankiray maty amin’ny fahorian’ny fanahiny kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mba nanandrana soa akory.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy mandry ao amin’ny vovoka izy roa tonta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka feno olitra ny tenany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, fantatro ny hevitrareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny saim-petsy amelezanareo ahy;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy hianareo: Aiza ny tranon’ny mpitohatoha?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andriandahy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aiza ny lay fitoeran’ny ratsy fanahy?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy mba nanontany tamin’ny mpandeha amin’ny tany lavitra va hianareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy heverinareo va ny zava-mahagaga,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: famantarana.
      marker-yv: yv-n
    - type: text
      text: ' ambaran’ireo hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandefera amiko hianareo, fa mba hiteny kosa aho izao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa tapitra ny teniko, dia mandatsalatsà ihany indray hianareo.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hahitan-doza dia voaro ihany ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny andro fahatezerana dia enti-miala izy?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hanambara ny làlany eo anatrehany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha misy zavatra nataony, iza no sahy hamaly azy?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Azy.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho entina ho eny an-tany fandevenana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mbola hitazana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mbola misy miambina.
      marker-yv: yv-n
    - type: text
      text: ' ao am-pasana;'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mamy aminy ny bainga any an-dohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona rehetra hanaraka azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nandehanan’ny maro tany alohany.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! ity hianareo mba mampionona ahy foana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny famalianareo anefa, raha voasana tsara, dia lainga ihany!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny amiko, moa ny ataon’ny olona va no itarainako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha izany, nahoana no hahalefitra ny fanahiko?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo aho, dia aoka ho talanjona hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitampena vava.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, raha mahatsiaro izany aho, dia raiki-tahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sady toran-kovitra ny tenako:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no velona ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka sady tratrantitra no be hery?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany koa mitomoetra tsara eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zafiny eo anoloany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ankohonany miadana ka tsy manan-tahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsorakazon’Andriamanitra tsy mamely azy.
