document_id: JOB.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Ny ombilahiny mampiteraka ka mahavanona;
  - type: text
    content: Ny ombivaviny miteraka ka tsy mamotsotra.
  '11':
  - type: text
    content: Mamoaka ny zanany madinika toy ny ondry aman-osy izy,
  - type: text
    content: Ka mikoriana ny zanany.
  '12':
  - type: text
    content: Mihoby mitondra ampongatapaka sy lokanga izy
  - type: text
    content: Ary mifaly amin’ny feon-tsodina.
  '13':
  - type: text
    content: Mandany ny androny amin’ny fahafinaretana izy;
  - type: text
    content: Amin’ny indray mipì-maso monja no idinany any amin’ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
  '14':
  - type: text
    content: 'Kanefa anie ireo no manao amin’Andriamanitra hoe: Mialà aminay!'
  - type: text
    content: Fa tsy mba irinay ny hahalala ny làlanao.
  '15':
  - type: text
    content: Zinona izay Tsitoha, no hotompoinay?
  - type: text
    content: Ary inona no soa ho azonay, raha mivavaka aminy?
  '16':
  - type: text
    content: Indro, tsy avy amin’ny tenany
  - type: note
    content: Heb. tsy eo an-tànany.
  - type: text
    content: ' ihany ny fahafinaretany!–'
  - type: text
    content: Ho lavitra ahy anie ny fisainan’ny ratsy fanahy!–
  '17':
  - type: text
    content: Indraindray foana no mba maty ny jiron’ny ratsy fanahy,
  - type: text
    content: Sy tonga ny loza manjo azy.
  - type: text
    content: Ary amelaran’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' fandrika ireny'
  - type: note
    content: 'Na: izaran’ Andriamanitra fahoriana ho an’ireny.'
  - type: text
    content: ' noho ny fahatezerany,'
  '18':
  - type: text
    content: Ka tonga tahaka ny mololo voatetika indaosin’ny rivotra izy
  - type: text
    content: Sy tahaka ny akofa entin’ny tafio-drivotra.
  '19':
  - type: text
    content: 'Andriamanitra, '
  - type: text
    content: hoy hianareo
  - type: text
    content: ', mbola hampijaly ny zanany noho ny helo-drainy!'
  - type: text
    content: Tsia; fa ny tenan’ireny ihany no aoka hovaliany, mba hahalalany.
  '2':
  - type: text
    content: Mihainoa dia mihainoa ny teniko,
  - type: text
    content: Ary aoka izany no ho fampiononanareo ahy.
  '20':
  - type: text
    content: Aoka ny masony ihany no hahita ny loza manjo azy,
  - type: text
    content: Ary aoka ny tenany ihany no hisotro ny fahatezeran’ny Tsitoha.
  '21':
  - type: text
    content: Fa mampaninona azy moa ny amin’ny taranany mandimby azy,
  - type: text
    content: Raha tapaka ny isan’ny androny?
  '22':
  - type: text
    content: Moa Andriamanitra va no hampianarim-pahalalana,
  - type: text
    content: Nefa Izy no mitsara ny any an-danitra
  - type: note
    content: Heb. avo.
  - type: text
    content: ' aza?'
  '23':
  - type: text
    content: Maty ny anankiray, raha tsy mbola mihena ny fahatanjahany,
  - type: text
    content: Sady miadana tokoa ka tsy manana ahiahy;
  '24':
  - type: text
    content: Feno ronono ny fitoeran-drononony,
  - type: note
    content: 'Na: Manotraka ny kibony.'
  - type: text
    content: Ary vonton-tsoka ny taolany.
  '25':
  - type: text
    content: Ary ny anankiray maty amin’ny fahorian’ny fanahiny kosa
  - type: text
    content: Ka tsy mba nanandrana soa akory.
  '26':
  - type: text
    content: Samy mandry ao amin’ny vovoka izy roa tonta,
  - type: text
    content: Ka feno olitra ny tenany.
  '27':
  - type: text
    content: Indro, fantatro ny hevitrareo
  - type: text
    content: Sy ny saim-petsy amelezanareo ahy;
  '28':
  - type: text
    content: 'Fa hoy hianareo: Aiza ny tranon’ny mpitohatoha?'
  - type: note
    content: Heb. andriandahy.
  - type: text
    content: Ary aiza ny lay fitoeran’ny ratsy fanahy?
  '29':
  - type: text
    content: Kanefa tsy mba nanontany tamin’ny mpandeha amin’ny tany lavitra va hianareo?
  - type: text
    content: Ary tsy heverinareo va ny zava-mahagaga,
  - type: note
    content: Heb. famantarana.
  - type: text
    content: ' ambaran’ireo hoe:'
  '3':
  - type: text
    content: Mandefera amiko hianareo, fa mba hiteny kosa aho izao;
  - type: text
    content: Ary rehefa tapitra ny teniko, dia mandatsalatsà ihany indray hianareo.
  '30':
  - type: text
    content: Amin’ny andro hahitan-doza dia voaro ihany ny ratsy fanahy,
  - type: text
    content: Ary amin’ny andro fahatezerana dia enti-miala izy?
  '31':
  - type: text
    content: Iza no hanambara ny làlany eo anatrehany?
  - type: text
    content: Ary raha misy zavatra nataony, iza no sahy hamaly azy?
  - type: note
    content: 'Na: Azy.'
  '32':
  - type: text
    content: Ary ho entina ho eny an-tany fandevenana izy
  - type: text
    content: Ka mbola hitazana
  - type: note
    content: 'Na: mbola misy miambina.'
  - type: text
    content: ' ao am-pasana;'
  '33':
  - type: text
    content: Ho mamy aminy ny bainga any an-dohasaha,
  - type: text
    content: Ary ny olona rehetra hanaraka azy,
  - type: text
    content: Toy ny nandehanan’ny maro tany alohany.
  '34':
  - type: text
    content: Endrey! ity hianareo mba mampionona ahy foana!
  - type: text
    content: Ary ny famalianareo anefa, raha voasana tsara, dia lainga ihany!
  '4':
  - type: text
    content: Raha ny amiko, moa ny ataon’ny olona va no itarainako?
  - type: text
    content: Ary raha izany, nahoana no hahalefitra ny fanahiko?
  '5':
  - type: text
    content: Jereo aho, dia aoka ho talanjona hianareo,
  - type: text
    content: Ary mitampena vava.
  '6':
  - type: text
    content: Eny, raha mahatsiaro izany aho, dia raiki-tahotra,
  - type: text
    content: 'Sady toran-kovitra ny tenako:'
  '7':
  - type: text
    content: Nahoana no velona ny ratsy fanahy
  - type: text
    content: Ka sady tratrantitra no be hery?
  '8':
  - type: text
    content: Ny zanany koa mitomoetra tsara eo anatrehany,
  - type: text
    content: Ary ny zafiny eo anoloany.
  '9':
  - type: text
    content: Ny ankohonany miadana ka tsy manan-tahotra,
  - type: text
    content: Ary ny tsorakazon’Andriamanitra tsy mamely azy.
