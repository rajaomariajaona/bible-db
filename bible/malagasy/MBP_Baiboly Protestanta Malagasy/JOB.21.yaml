document_id: JOB.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa dia mihainoa ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka izany no ho fampiononanareo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefera amiko hianareo, fa mba hiteny kosa aho izao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa tapitra ny teniko, dia mandatsalatsà ihany indray hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha ny amiko, moa ny ataon’ny olona va no itarainako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha izany, nahoana no hahalefitra ny fanahiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jereo aho, dia aoka ho talanjona hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitampena vava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, raha mahatsiaro izany aho, dia raiki-tahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady toran-kovitra ny tenako:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahoana no velona ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka sady tratrantitra no be hery?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanany koa mitomoetra tsara eo anatrehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zafiny eo anoloany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny ankohonany miadana ka tsy manan-tahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsorakazon’Andriamanitra tsy mamely azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ombilahiny mampiteraka ka mahavanona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ombivaviny miteraka ka tsy mamotsotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamoaka ny zanany madinika toy ny ondry aman-osy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mikoriana ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihoby mitondra ampongatapaka sy lokanga izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifaly amin’ny feon-tsodina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandany ny androny amin’ny fahafinaretana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny indray mipì-maso monja no idinany any amin’ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa anie ireo no manao amin’Andriamanitra hoe: Mialà aminay!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mba irinay ny hahalala ny làlanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zinona izay Tsitoha, no hotompoinay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona no soa ho azonay, raha mivavaka aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, tsy avy amin’ny tenany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy eo an-tànany.
    marker-yv: yv-n
  - type: text
    text: ' ihany ny fahafinaretany!–'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavitra ahy anie ny fisainan’ny ratsy fanahy!–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indraindray foana no mba maty ny jiron’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tonga ny loza manjo azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amelaran’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' fandrika ireny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'izaran’ '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Andriamanitra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahoriana ho an’ireny.
    marker-yv: yv-n
  - type: text
    text: ' noho ny fahatezerany,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka tonga tahaka ny mololo voatetika indaosin’ny rivotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny akofa entin’ny tafio-drivotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Andriamanitra, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy hianareo
  - type: text
    text: ', mbola hampijaly ny zanany noho ny helo-drainy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia; fa ny tenan’ireny ihany no aoka hovaliany, mba hahalalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aoka ny masony ihany no hahita ny loza manjo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny tenany ihany no hisotro ny fahatezeran’ny Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa mampaninona azy moa ny amin’ny taranany mandimby azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tapaka ny isan’ny androny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa Andriamanitra va no hampianarim-pahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa Izy no mitsara ny any an-danitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avo.
    marker-yv: yv-n
  - type: text
    text: ' aza?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maty ny anankiray, raha tsy mbola mihena ny fahatanjahany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miadana tokoa ka tsy manana ahiahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Feno ronono ny fitoeran-drononony,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manotraka ny kibony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vonton-tsoka ny taolany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny anankiray maty amin’ny fahorian’ny fanahiny kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mba nanandrana soa akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Samy mandry ao amin’ny vovoka izy roa tonta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka feno olitra ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indro, fantatro ny hevitrareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny saim-petsy amelezanareo ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy hianareo: Aiza ny tranon’ny mpitohatoha?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: andriandahy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza ny lay fitoeran’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa tsy mba nanontany tamin’ny mpandeha amin’ny tany lavitra va hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy heverinareo va ny zava-mahagaga,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: famantarana.
    marker-yv: yv-n
  - type: text
    text: ' ambaran’ireo hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Amin’ny andro hahitan-doza dia voaro ihany ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny andro fahatezerana dia enti-miala izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Iza no hanambara ny làlany eo anatrehany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha misy zavatra nataony, iza no sahy hamaly azy?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ho entina ho eny an-tany fandevenana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mbola hitazana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mbola misy miambina.
    marker-yv: yv-n
  - type: text
    text: ' ao am-pasana;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho mamy aminy ny bainga any an-dohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona rehetra hanaraka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nandehanan’ny maro tany alohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Endrey! ity hianareo mba mampionona ahy foana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny famalianareo anefa, raha voasana tsara, dia lainga ihany!
