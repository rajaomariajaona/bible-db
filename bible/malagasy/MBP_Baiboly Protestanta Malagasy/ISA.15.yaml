    - type: text
      text: Faminaniana ny amin’ny loza hanjo an’ Moaba.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny amin’ny loza hanjo an’i Moaba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’ny indray alina no nandravana an’i Ara-moaba, ka fongotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’ny indray alina no nandravana an’i Kira-moaba, ka fongotra izy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakatra ho ao amin’ny tempoly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho ao Baita.
      marker-yv: yv-n
    - type: text
      text: ' sy ho ao Dibona ny olona,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao amin’ny fitoerana avo, mba hitomany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any Nebo sy Medeba no idradradradran’i Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mibory ny loha rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaharatra ny somotra rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-dàlambe dia misikina lamba fisaonana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tampon-tranony sy eny an-kalalahana dia midradradradra avokoa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mijohy ny ranomasony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitaraina Hesbona sy Elale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka re hatrany Jahaza ny feony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho izany dia miantso mafy ny miaramilan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voaomany.
      marker-yv: yv-n
    - type: text
      text: ' i Moaba,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangovitra ny fanahiny ao anatiny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko mitaraina noho ny amin’i Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mandositra avy ao dia tonga hatrany Zoara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny hidiny (
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fiarovana azy) dia hatrany Zoara.
      marker-yv: yv-n
    - type: text
      text: ' sy Egleta-selisia;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ilay ombivavy kely telo taona.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miakatra mitomany ao amin’ny fiakarana Lohita izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy midradradradra amin’ny famoizam-po eny an-dàlana mankany Horonaima.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Nimrima tsara rano dia tonga karankaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maina ny ahitra, malazo ny zava-maniry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy zava-maitso intsony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany ny harena be izay noharìny sy ny entany izay mbola voatahiriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia entiny ho any am-pitan’ny lohasahan-driaky ny hazomalahelo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fitarainany manodidina ny sisin’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Re hatrany Eglaima ny fidradradradrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, re hatrany Ber-elima ny fidradradradrany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ranon’i Dimona dia feno ra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola hampiako ny loza manjo an’i Dimona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia liona handrapaka izay efa mandositra avy any Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handany izay sisa amin’ny tany.
