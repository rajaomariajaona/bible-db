document_id: ISA.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’ Moaba.
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Moaba.
  - type: text
    content: Fa tamin’ny indray alina no nandravana an’i Ara-moaba, ka fongotra izy;
  - type: text
    content: Fa tamin’ny indray alina no nandravana an’i Kira-moaba, ka fongotra izy;
  '2':
  - type: text
    content: Miakatra ho ao amin’ny tempoly
  - type: note
    content: 'Na: ho ao Baita.'
  - type: text
    content: ' sy ho ao Dibona ny olona,'
  - type: text
    content: Dia ao amin’ny fitoerana avo, mba hitomany;
  - type: text
    content: Any Nebo sy Medeba no idradradradran’i Moaba;
  - type: text
    content: Mibory ny loha rehetra;
  - type: text
    content: Voaharatra ny somotra rehetra.
  '3':
  - type: text
    content: Eny an-dàlambe dia misikina lamba fisaonana izy;
  - type: text
    content: Eny an-tampon-tranony sy eny an-kalalahana dia midradradradra avokoa izy,
  - type: text
    content: Eny, mijohy ny ranomasony.
  '4':
  - type: text
    content: Ary mitaraina Hesbona sy Elale,
  - type: text
    content: Ka re hatrany Jahaza ny feony,
  - type: text
    content: Ary noho izany dia miantso mafy ny miaramilan’
  - type: note
    content: Heb. voaomany.
  - type: text
    content: ' i Moaba,'
  - type: text
    content: Mangovitra ny fanahiny ao anatiny.
  '5':
  - type: text
    content: Ny foko mitaraina noho ny amin’i Moaba;
  - type: text
    content: Ny mandositra avy ao dia tonga hatrany Zoara
  - type: note
    content: 'Na: ny hidiny (na: ny fiarovana azy) dia hatrany Zoara.'
  - type: text
    content: ' sy Egleta-selisia;'
  - type: note
    content: 'Na: Dia ilay ombivavy kely telo taona.'
  - type: text
    content: Fa miakatra mitomany ao amin’ny fiakarana Lohita izy
  - type: text
    content: Sy midradradradra amin’ny famoizam-po eny an-dàlana mankany Horonaima.
  '6':
  - type: text
    content: Fa Nimrima tsara rano dia tonga karankaina;
  - type: text
    content: Maina ny ahitra, malazo ny zava-maniry,
  - type: text
    content: Ka tsy misy zava-maitso intsony.
  '7':
  - type: text
    content: Ary amin’izany ny harena be izay noharìny sy ny entany izay mbola voatahiriny
  - type: text
    content: Dia entiny ho any am-pitan’ny lohasahan-driaky ny hazomalahelo.
  '8':
  - type: text
    content: Fa ny fitarainany manodidina ny sisin’i Moaba,
  - type: text
    content: Re hatrany Eglaima ny fidradradradrany,
  - type: text
    content: Eny, re hatrany Ber-elima ny fidradradradrany.
  '9':
  - type: text
    content: Fa ny ranon’i Dimona dia feno ra;
  - type: text
    content: Fa mbola hampiako ny loza manjo an’i Dimona,
  - type: text
    content: Dia liona handrapaka izay efa mandositra avy any Moaba,
  - type: text
    content: Sy handany izay sisa amin’ny tany.
