document_id: ZEC.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahefatra: Josoa mpirosonabe nitsangana teo anatrehan’Ilay Anjelin’i Jehovah.'
  - type: text
    content: 'ARY dia nasehony ahy fa, indro, Josoa mpisoronabe nitsangana teo anatrehan’Ilay Anjelin’i Jehovah, ary Satana nitsangana teo an-kavanany hiampanga azy. '
  '10':
  - type: text
    content: Amin’izany andro izany, hoy Jehovah, Tompon’ny maro, dia samy hiantso ny namanareo avy ho eo ambanin’ny voaloboka sy ho eo ambanin’ny aviavy hianareo.
  '2':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Satana: Hananatra anao anie Jehovah, ry Satana; eny, Jehovah Izay nifidy an’i Jerosalema anie hananatra anao; tsy forohana nosarihana tamin’ny afo va ity?'
  '3':
  - type: text
    content: 'Ary Josoa nitafy fitafiana maloto ary nitsangana teo anoloan’Ilay Anjely. '
  '4':
  - type: text
    content: 'Dia namaly Jehovah ka nilaza tamin’izay nitsangana teo anoloany hoe: Esory aminy ny fitafiana maloto. Ary hoy koa Izy taminy: Indro, efa nesoriko ny helokao, ary hampiakanjoiko akanjo fihaingoana hianao. '
  '5':
  - type: text
    content: 'Dia hoy izaho: Aoka hasiany hamama madio eo an-dohany. Ka dia nasiany hamama madio teo an-dohany, sady nampitafiny izy; ary Ilay Anjelin’i Jehovah dia nitsangana teo.'
  '6':
  - type: text
    content: 'Ary Ilay Anjelin’i Jehovah nilaza marimarina tamin’i Josoa hoe: '
  '7':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Raha mizotra amin’ny làlako hianao sy mitandrina ny didiko, dia hianao no hitsara ny amin’ny tranoko sy hitandrina ny kianjako, sady homeko làlana ho amin’ireo mitsangana ireo hianao.'
  '8':
  - type: text
    content: Koa mihainoa, ry Josoa mpisoronabe, dia hianao sy ny namanao izay mipetraka eo anoloanao; fa olona atao fahagagana ireo; fa, indro, ho entiko Rantsana
  - type: note
    content: 'Na: Solofo.'
  - type: text
    content: ' Mpanompoko. '
  '9':
  - type: text
    content: Fa indro, ny vato izay napetrako teo anoloan’i Josoa,–ny vato iray dia banjinin’ny maso fito;
  - type: note
    content: Heb. amin’ny vato iray misy maso fito.
  - type: text
    content: ' indro, hosoratako ny sorany, hoy Jehovah Tompon’ny maro, ary hesoriko indray andro monja ny helok’ity tany ity.'
