document_id: ZEC.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'Fahitana fahefatra: Josoa mpirosonabe nitsangana teo anatrehan’Ilay Anjelin’i Jehovah.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY dia nasehony ahy fa, indro, Josoa mpisoronabe nitsangana teo anatrehan’Ilay Anjelin’i Jehovah, ary Satana nitsangana teo an-kavanany hiampanga azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Satana: Hananatra anao anie Jehovah, ry Satana; eny, Jehovah Izay nifidy an’i Jerosalema anie hananatra anao; tsy forohana nosarihana tamin’ny afo va ity?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Josoa nitafy fitafiana maloto ary nitsangana teo anoloan’Ilay Anjely. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namaly Jehovah ka nilaza tamin’izay nitsangana teo anoloany hoe: Esory aminy ny fitafiana maloto. Ary hoy koa Izy taminy: Indro, efa nesoriko ny helokao, ary hampiakanjoiko akanjo fihaingoana hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izaho: Aoka hasiany hamama madio eo an-dohany. Ka dia nasiany hamama madio teo an-dohany, sady nampitafiny izy; ary Ilay Anjelin’i Jehovah dia nitsangana teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Ilay Anjelin’i Jehovah nilaza marimarina tamin’i Josoa hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro: Raha mizotra amin’ny làlako hianao sy mitandrina ny didiko, dia hianao no hitsara ny amin’ny tranoko sy hitandrina ny kianjako, sady homeko làlana ho amin’ireo mitsangana ireo hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mihainoa, ry Josoa mpisoronabe, dia hianao sy ny namanao izay mipetraka eo anoloanao; fa olona atao fahagagana ireo; fa, indro, ho entiko Rantsana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solofo.
    marker-yv: yv-n
  - type: text
    text: ' Mpanompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa indro, ny vato izay napetrako teo anoloan’i Josoa,–ny vato iray dia banjinin’ny maso fito;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny vato iray misy maso fito.
    marker-yv: yv-n
  - type: text
    text: ' indro, hosoratako ny sorany, hoy Jehovah Tompon’ny maro, ary hesoriko indray andro monja ny helok’ity tany ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amin’izany andro izany, hoy Jehovah, Tompon’ny maro, dia samy hiantso ny namanareo avy ho eo ambanin’ny voaloboka sy ho eo ambanin’ny aviavy hianareo.
