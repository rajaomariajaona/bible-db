document_id: ISA.43,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa ankehitriny, ry Jakoba ô, izao no lazain’i Jehovah, Izay nahary anao
  - type: text
    content: 'Sady namorona anao, ry Isiraely ô:'
  - type: text
    content: Aza matahotra hianao, fa efa nanavotra anao Aho;
  - type: text
    content: Efa niantso ny anaranao Aho, Ahy hianao.
  '10':
  - type: text
    content: Hianareo no vavolombeloko, hoy Jehovah, sady mpanompoko izay efa nofidiko,
  - type: text
    content: Mba hahafantaranareo sy hinoanareo Ahy
  - type: text
    content: Ka ho azonareo tsara fa Izaho no Izy;
  - type: text
    content: Talohako dia tsy nisy andriamanitra voaforona,
  - type: text
    content: Sady tsy hisy handimby Ahy.
  '11':
  - type: text
    content: Izaho dia Izaho ihany no Jehovah,
  - type: text
    content: Ary tsy misy Mpamonjy afa-tsy Izaho.
  '12':
  - type: text
    content: Izaho efa nilaza sy namonjy ary nanambara,
  - type: text
    content: Ary tsy nisy hafa tao aminareo;
  - type: text
    content: Dia hianareo no vavolombeloko, hoy Jehovah, ary Izaho no Andriamanitra.
  '13':
  - type: text
    content: Eny, hatramin’izany andro izany
  - type: note
    content: 'Na: Hatrizay nisian’ny andro.'
  - type: text
    content: ' Izaho no Izy,'
  - type: text
    content: Ary tsy misy maharombaka amin’ny tànako;
  - type: text
    content: Miasa Aho, ka iza moa no mahasakana izany?
  - type: heading
    content: Ny hamindran’i Jehovah fo amin’ny Isiraely, sy ny hampodiany azy avy amin’ny fahababoana, ary ny hampidinany ny Fanahiny.
  '14':
  - type: text
    content: 'IZAO no lazain’i Jehovah, Mpanavotra anareo, dia ny Iray Masin’ny Isiraely:'
  - type: text
    content: Noho ny aminareo no nanirahako tany Babylona,
  - type: text
    content: Ary hampidiniko izy rehetra mbamin’
  - type: note
    content: 'Na: dia.'
  - type: text
    content: ' ny Kaldeana'
  - type: text
    content: Ho mpandositra ho any amin’ny sambo izay efa nifaliany.
  '15':
  - type: text
    content: Izaho no Jehovah, Iray Masinareo,
  - type: text
    content: Mpamorona ny Isiraely sady Mpanjakanareo.
  '16':
  - type: text
    content: Izao no lazain’i Jehovah,
  - type: text
    content: Izay manao làlana eny amin’ny ranomasina
  - type: text
    content: Sy làlan-kaleha eny amin’ny rano manonja,
  '17':
  - type: text
    content: Izay mamoaka ny kalesy sy ny soavaly,
  - type: text
    content: Ny miaramila sy ny lehilahy mahery–
  - type: text
    content: Miara-mandry avokoa izy ka tsy hiarina intsony,
  - type: text
    content: 'Mitsilopilopy izy, ka dia maty toy ny jiro:'
  '18':
  - type: text
    content: Aza mahatsiaro ny lasa,
  - type: text
    content: Na misaina ny taloha.
  '19':
  - type: text
    content: Indro, Izaho efa hanao zava-baovao,
  - type: text
    content: Koa ankehitriny dia efa miposaka izany;
  - type: text
    content: Tsy hahalala izany va hianareo?
  - type: text
    content: Eny, any an-efitra no hanaovako làlana
  - type: text
    content: Ary any amin’ny tany lao no hasiako ony;
  '2':
  - type: text
    content: Raha mita ny rano hianao, dia homba anao Aho;
  - type: text
    content: Ary raha mita ny ony hianao, dia tsy hanafotra anao izy;
  - type: text
    content: Raha mandeha mamaky ny afo hianao, dia tsy ho may,
  - type: text
    content: Ary tsy hirehitra aminao ny lelafo;
  '20':
  - type: text
    content: Dia hanome voninahitra Ahy ny bibi-dia
  - type: text
    content: Sy ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' ary ny ostritsa,'
  - type: text
    content: Satria manisy rano any an-efitra
  - type: text
    content: Sy ony any amin’ny tany lao Aho,
  - type: text
    content: Hampisotroana ny oloko, dia ilay voafidiko.
  '21':
  - type: text
    content: Izao olona noforoniko ho Ahy izao
  - type: text
    content: No hanambara ny fiderana Ahy.
  '22':
  - type: text
    content: Nefa Izaho tsy mba nantsoinao, ry Jakoba;
  - type: text
    content: Fa sasatra amiko hianao,
  - type: note
    content: 'Na: Na nisasaranao akory.'
  - type: text
    content: ' ry Isiraely.'
  '23':
  - type: text
    content: Tsy nitondranao ny zanak’ondry fanatitra doranao Aho,
  - type: text
    content: Na nomenao voninahitra tamin’ny fanatitrao.
  - type: text
    content: Tsy nampahavesatra
  - type: note
    content: Heb. nampanompo.
  - type: text
    content: ' anao tamin’ny fanatitra Aho,'
  - type: text
    content: Na nanasatra anao tamin’ny ditin-kazo mani-pofona.
  '24':
  - type: text
    content: Tsy nandoa vola namidy veromanitra ho Ahy hianao,
  - type: text
    content: Na nahavoky Ahy tamin’ny saboran’ny fanatitrao;
  - type: text
    content: Fa nampahavesatra
  - type: note
    content: Heb. nampanompo.
  - type: text
    content: ' Ahy tamin’ny fahotanao kosa hianao'
  - type: text
    content: Sy nanasatra Ahy tamin’ny helokao.
  '25':
  - type: text
    content: Izaho dia Izaho no mamono ny fahadisoanao noho ny amin’ny tenako,
  - type: text
    content: Ary tsy hotsarovako ny fahotanao.
  '26':
  - type: text
    content: Ampahatsiarovy Aho, ka avia isika hifandahatra;
  - type: text
    content: Alaharo ary ny teninao, mba hahitana izay mahamarina anao.
  '27':
  - type: text
    content: Ny razambenao
  - type: note
    content: Heb. rainao.
  - type: text
    content: ' voalohany indrindra dia efa nanota,'
  - type: text
    content: Ary ireny mpanalalana aminao efa niodina tamiko,
  '28':
  - type: text
    content: Koa izany no nanaovako ny mpanapaka masina ho tsy masina,
  - type: text
    content: Sy nanolorako an’i Jakoba ho fandringana
  - type: note
    content: Heb. herema.
  - type: text
    content: ' ary Isiraely ho latsa.'
  '3':
  - type: text
    content: Fa Izaho Jehovah no Andriamanitrao,
  - type: text
    content: Dia ny Iray Masin’ny Isiraely, Mpamonjy anao;
  - type: text
    content: Omeko ho avotrao Egypta,
  - type: text
    content: Ary Etiopia sy Seba ho solonao.
  '4':
  - type: text
    content: Satria malala eo imasoko hianao,
  - type: text
    content: Eny, be voninahitra hianao sady tiako,
  - type: text
    content: Dia olona no omeko ho solonao,
  - type: text
    content: Ary firenena ho solon’ny ainao.
  '5':
  - type: text
    content: Aza mahatahotra, fa momba anao Aho;
  - type: text
    content: Hitondra ny taranakao avy any atsinanana Aho,
  - type: text
    content: Ary avy any andrefana no hanangonako anao;
  '6':
  - type: text
    content: 'Ny avaratra hilazako hoe: Avoahy,'
  - type: text
    content: 'Ary ny atsimo hoe: Aza hazonina,'
  - type: text
    content: Alao ny zanako-lahy avy lavitra
  - type: text
    content: Sy ny zanako-vavy avy any amin’ny faran’ny tany,
  '7':
  - type: text
    content: Dia izay rehetra antsoina amin’ny anarako
  - type: text
    content: Sady noariko ho voninahitro,
  - type: text
    content: Dia izay noforoniko sy nataoko.
  '8':
  - type: text
    content: Ento mivoaka
  - type: note
    content: 'Na: Entiko mivoaka.'
  - type: text
    content: ' ny olona jamba mana-maso'
  - type: text
    content: Sy ny marenina manan-tsofina.
  '9':
  - type: text
    content: Aoka hiangona
  - type: note
    content: 'Na: Miangona.'
  - type: text
    content: ' ny firenena rehetra,'
  - type: text
    content: Ary aoka hivory
  - type: note
    content: 'Na: mivory.'
  - type: text
    content: ' ny olombelona;'
  - type: text
    content: Iza aminareo no mahalaza izany?
  - type: text
    content: Aoka hambarany amintsika ny fahiny taloha;
  - type: text
    content: Aoka ho entiny ny vavolombelony hahamarina azy;
  - type: text
    content: 'Ary aoka hihaino ireo ka hiaiky hoe: Marina izany.'
