document_id: ISA.43
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ankehitriny, ry Jakoba ô, izao no lazain’i Jehovah, Izay nahary anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady namorona anao, ry Isiraely ô:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra hianao, fa efa nanavotra anao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa niantso ny anaranao Aho, Ahy hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha mita ny rano hianao, dia homba anao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mita ny ony hianao, dia tsy hanafotra anao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mandeha mamaky ny afo hianao, dia tsy ho may,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hirehitra aminao ny lelafo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Izaho Jehovah no Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny Iray Masin’ny Isiraely, Mpamonjy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omeko ho avotrao Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Etiopia sy Seba ho solonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Satria malala eo imasoko hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, be voninahitra hianao sady tiako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia olona no omeko ho solonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary firenena ho solon’ny ainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aza mahatahotra, fa momba anao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitondra ny taranakao avy any atsinanana Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary avy any andrefana no hanangonako anao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny avaratra hilazako hoe: Avoahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny atsimo hoe: Aza hazonina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alao ny zanako-lahy avy lavitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zanako-vavy avy any amin’ny faran’ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia izay rehetra antsoina amin’ny anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady noariko ho voninahitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay noforoniko sy nataoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ento mivoaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Entiko mivoaka.
    marker-yv: yv-n
  - type: text
    text: ' ny olona jamba mana-maso'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny marenina manan-tsofina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka hiangona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Miangona.
    marker-yv: yv-n
  - type: text
    text: ' ny firenena rehetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hivory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mivory.
    marker-yv: yv-n
  - type: text
    text: ' ny olombelona;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza aminareo no mahalaza izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hambarany amintsika ny fahiny taloha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho entiny ny vavolombelony hahamarina azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary aoka hihaino ireo ka hiaiky hoe: Marina izany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hianareo no vavolombeloko, hoy Jehovah, sady mpanompoko izay efa nofidiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahafantaranareo sy hinoanareo Ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho azonareo tsara fa Izaho no Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Talohako dia tsy nisy andriamanitra voaforona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy handimby Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izaho dia Izaho ihany no Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy Mpamonjy afa-tsy Izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho efa nilaza sy namonjy ary nanambara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisy hafa tao aminareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo no vavolombeloko, hoy Jehovah, ary Izaho no Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, hatramin’izany andro izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hatrizay nisian’ny andro.
    marker-yv: yv-n
  - type: text
    text: ' Izaho no Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy maharombaka amin’ny tànako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miasa Aho, ka iza moa no mahasakana izany?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hamindran’i Jehovah fo amin’ny Isiraely, sy ny hampodiany azy avy amin’ny fahababoana, ary ny hampidinany ny Fanahiny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'IZAO no lazain’i Jehovah, Mpanavotra anareo, dia ny Iray Masin’ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny aminareo no nanirahako tany Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampidiniko izy rehetra mbamin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia.
    marker-yv: yv-n
  - type: text
    text: ' ny Kaldeana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho mpandositra ho any amin’ny sambo izay efa nifaliany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izaho no Jehovah, Iray Masinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamorona ny Isiraely sady Mpanjakanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izao no lazain’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao làlana eny amin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy làlan-kaleha eny amin’ny rano manonja,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mamoaka ny kalesy sy ny soavaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny miaramila sy ny lehilahy mahery–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miara-mandry avokoa izy ka tsy hiarina intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mitsilopilopy izy, ka dia maty toy ny jiro:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza mahatsiaro ny lasa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na misaina ny taloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Indro, Izaho efa hanao zava-baovao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ankehitriny dia efa miposaka izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hahalala izany va hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, any an-efitra no hanaovako làlana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any amin’ny tany lao no hasiako ony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia hanome voninahitra Ahy ny bibi-dia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
  - type: text
    text: ' ary ny ostritsa,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria manisy rano any an-efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ony any amin’ny tany lao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampisotroana ny oloko, dia ilay voafidiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izao olona noforoniko ho Ahy izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hanambara ny fiderana Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nefa Izaho tsy mba nantsoinao, ry Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa sasatra amiko hianao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Na nisasaranao akory.
    marker-yv: yv-n
  - type: text
    text: ' ry Isiraely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy nitondranao ny zanak’ondry fanatitra doranao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nomenao voninahitra tamin’ny fanatitrao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nampahavesatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampanompo.
    marker-yv: yv-n
  - type: text
    text: ' anao tamin’ny fanatitra Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nanasatra anao tamin’ny ditin-kazo mani-pofona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy nandoa vola namidy veromanitra ho Ahy hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nahavoky Ahy tamin’ny saboran’ny fanatitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nampahavesatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampanompo.
    marker-yv: yv-n
  - type: text
    text: ' Ahy tamin’ny fahotanao kosa hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nanasatra Ahy tamin’ny helokao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izaho dia Izaho no mamono ny fahadisoanao noho ny amin’ny tenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hotsarovako ny fahotanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ampahatsiarovy Aho, ka avia isika hifandahatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alaharo ary ny teninao, mba hahitana izay mahamarina anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny razambenao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rainao.
    marker-yv: yv-n
  - type: text
    text: ' voalohany indrindra dia efa nanota,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireny mpanalalana aminao efa niodina tamiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Koa izany no nanaovako ny mpanapaka masina ho tsy masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nanolorako an’i Jakoba ho fandringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: herema.
    marker-yv: yv-n
  - type: text
    text: ' ary Isiraely ho latsa.'
