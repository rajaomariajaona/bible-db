- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana ataon’izay latsaka amin’ny fahoriana lalina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '130.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: TAO amin’ny lalina no niantsoako Anao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tompo ô, henoy ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny sofinao hihaino tsara ny feon’ny fifonako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha mandinika heloka Hianao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hahajanona, Tompo ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa eo aminao no misy ny famelan-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hatahorana Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Niandry an’i Jehovah aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, niandry Azy ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny teniny no nanantenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fanahiko miandry ny Tompo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoatra noho ny fiandrin’ny mpiambina ny maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fiandrin’ny mpiambina ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manantenà an’i Jehovah, ry Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa eo amin’i Jehovah no misy famindrampo sy fanavotana be;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Izy no hanavotra ny Isiraely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho afaka amin’ny helony rehetra.
