document_id: PSA.130,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana ataon’izay latsaka amin’ny fahoriana lalina.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: TAO amin’ny lalina no niantsoako Anao, Jehovah ô,
  '2':
  - type: text
    content: Tompo ô, henoy ny feoko;
  - type: text
    content: Aoka ny sofinao hihaino tsara ny feon’ny fifonako.
  '3':
  - type: text
    content: Raha mandinika heloka Hianao, Jehovah ô,
  - type: text
    content: Iza no hahajanona, Tompo ô?
  '4':
  - type: text
    content: Fa eo aminao no misy ny famelan-keloka,
  - type: text
    content: Mba hatahorana Anao.
  '5':
  - type: text
    content: Niandry an’i Jehovah aho;
  - type: text
    content: Eny, niandry Azy ny fanahiko,
  - type: text
    content: Ary ny teniny no nanantenako.
  '6':
  - type: text
    content: Ny fanahiko miandry ny Tompo
  - type: text
    content: Mihoatra noho ny fiandrin’ny mpiambina ny maraina,
  - type: text
    content: Dia ny fiandrin’ny mpiambina ny maraina.
  '7':
  - type: text
    content: Manantenà an’i Jehovah, ry Isiraely;
  - type: text
    content: Fa eo amin’i Jehovah no misy famindrampo sy fanavotana be;
  '8':
  - type: text
    content: Ary Izy no hanavotra ny Isiraely
  - type: text
    content: Ho afaka amin’ny helony rehetra.
