document_id: ZEC.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tonga ny tenin’i Jehovah, Tompon’ny maro, nanao hoe: '
  '10':
  - type: text
    content: 'Fa talohan’izany andro izany dia tsy nisy valim-pahasasarana ho an’ny olona, na valim-pahasasarana ho an’ny biby fiompy; ary tsy nisy fiadanana ho an’izay nivoaka sy izay niditra noho ny fahavalo, fa nalefako samy hifamely amin’ny namany avy ny olona rehetra. '
  '11':
  - type: text
    content: 'Fa amin’izay kosa dia tsy ho toy ny tamin’ny fahiny intsony amin’ny sisa amin’ity firenena ity Aho, hoy Jehovah, Tompon’ny maro. '
  '12':
  - type: text
    content: 'Fa '
  - type: text
    content: hisy
  - type: text
    content: ' vokatry ny fiadanana, ny voaloboka hamoa,'
  - type: note
    content: 'Na: fa hamoa ny voankazo izay vanona amin’ny fiadanana, dia ny voaloboka.'
  - type: text
    content: ' ary ny tany hahavokatra, ary ny lanitra hampilatsaka ny andony, ary ny sisa amin’ity firenena ity no hampandovaiko izany rehetra izany. '
  '13':
  - type: text
    content: Ary toy ny nahatongavanareo ho fanozonana tany amin’ny firenena, ry taranak’i Joda sy ry taranak’Isiraely, dia ho toy izany no hamonjeko anareo, ka dia ho tonga fitsofan-drano kosa hianareo; aza matahotra, fa aoka hatanjaka ny tànanareo.
  '14':
  - type: text
    content: 'Fa izao no lazain’i Jehovah, Tompon’ny maro: Toy ny nisainako hahatonga loza aminareo tamin’ny nampahatezeran’ny razanareo Ahy, hoy Jehovah, Tompon’ny maro, ka tsy nanenina Aho, '
  '15':
  - type: text
    content: 'dia ho toy izany kosa no hisainako hanisy soa an’i Jerosalema sy ny taranak’i Joda amin’izao andro izao: aza matahotra hianareo.'
  '16':
  - type: text
    content: 'Izao no zavatra hataonareo: Samia miteny marina amin’ny namany avy hianareo; mitsarà marina, eny, mitsarà hahatonga fiadanana ao am-bavahadinareo; '
  '17':
  - type: text
    content: ary aza misy mieritreritra ao am-ponareo hanisy ratsy ny namanareo hianareo, ary aza tia fianianan-tsy to; fa izany rehetra izany dia halako, hoy Jehovah.
  '18':
  - type: text
    content: 'Ary ny tenin’i Jehovah, Tompon’ny maro, dia tonga tamiko nanao hoe: '
  '19':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Ny fifadian-kanina amin’ny '
  - type: text
    content: volana
  - type: text
    content: ' fahefatra sy ny fifadian-kanina amin’ny fahadimy sy ny fifadian-kanina amin’ny fahafito ary ny fifadian-kanina amin’ny fahafolo dia samy ho tonga fifaliana sy firavoravoana ary fotoana mahafinaritra avokoa ho an’ny taranak’i Joda; koa tiava ny fahamarinana sy ny fiadanana.'
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Saro-piaro dia saro-piaro an’i Ziona Aho, eny, saro-piaro azy amin’ny fahatezerana mafy Aho.'
  '20':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Mbola hisy firenena sy mponina avy amin’ny tanàna maro ho avy; '
  '21':
  - type: text
    content: 'ary ny mponina ao amin’ny anankiray hankany amin’ny anankiray kosa ka hanao hoe: Aoka handeha tokoa isika hifona amin’i Jehovah sy hitady an’i Jehovah, Tompon’ny maro; izaho koa mba handeha. '
  '22':
  - type: text
    content: Eny, ho avy ny olona maro sy ny firenena mahery mba hitady an’i Jehovah, Tompon’ny maro, any Jerosalema sy hifona amin’i Jehovah.
  '23':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Amin’izany andro izany dia hisy folo lahy avy amin’ny firenena samy hafa fiteny rehetra hihazona ny sisin-damban’ny Jiosy anankiray ka hanao hoe: Mba handeha hiaraka aminareo izahay; fa efa renay fa momba anareo Andriamanitra.'
  '3':
  - type: text
    content: 'Izao no lazain’i Jehovah: Efa tafaverina ho eto Ziona Aho ka honina eto afovoan’i Jerosalema; ary Jerosalema dia hatao hoe Tanànan’ny fahamarinana, ary ny tendrombohitr’i Jehovah, Tompon’ny maro, dia hatao hoe Tendrombohitra masina.'
  '4':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Mbola hisy lahy antitra sy vavy antitra hipetraka eny an-dàlamben’i Jerosalema, samy hitehina amin’ny tehina eny an-tànany isan-olona noho ny fahanterany; '
  '5':
  - type: text
    content: ary eny an-dàlambe any an-tanàna dia ho feno ankizilahy madinika sy ankizivavy madinika milalao eny an-dàlambe.
  '6':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Raha mahagaga izany eo imason’ny sisa amin’ity firenena ity amin’izany andro izany, moa hahagaga eo imasoko koa va? hoy Jehovah, Tompon’ny maro.'
  '7':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Indro, hamonjy ny oloko avy any amin’ny tany atsinanana sy amin’ny tany andrefana Aho; '
  '8':
  - type: text
    content: ary hitondra azy Aho, ka honina any Jerosalema izy; dia ho oloko izy, ary Izaho kosa ho Andriamaniny amin’ny fahamarinana sy ny fahitsiana.
  '9':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Aoka hatanjaka ny tànanareo izay mandre izany teny izany amin’izao andro izao avy amin’ny vavan’ny mpaminany, izay teo tamin’ny andro nanaovana ny fanorenan’ny tranon’i Jehovah, Tompon’ny maro, dia ny nanaovana ny tempoly. '
