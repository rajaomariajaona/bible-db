document_id: 1KI.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nihaonan’i Elia tamin’i Ahaba, sy ny nandreseny ny mpaminanin’i Bala.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony afaka andro maro, dia tonga tamin’i Elia ny tenin’i Jehovah tamin’ny taona fahatelo nanao hoe: Mandehana hiseho amin’i Ahaba, fa handatsaka ranon’orana amin’ny tany Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia niainga Elia hiseho amin’i Ahaba.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary mafy ny mosary tany Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Ahaba niantso an’i Obadia, izay lehiben’ny tao an-dapany (Obadia dia natahotra an’i Jehovah tokoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nony naringan’i Jezebela ny mpaminanin’i Jehovah, dia nalain’i Obadia ny mpaminany zato ka nafeniny, dimam-polo avy no nataony tao an-johy iray, ary novelominy mofo sy rano ireo). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Ahaba tamin’i Obadia: Andeha mitety ny tany, dia hatrany amin’ny loharano rehetra sy hatrany amin’ny lohasahan-driaka rehetra; fa angamba hahita ahitra hamelomana ny soavaly sy ny ampondra isika, mba tsy hisy hovonointsika ny biby fiompintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nizara làlana izy, ka Ahaba nandeha tamin’ny làlana iray, ary Obadia kosa nandeha tamin’ny làlana iray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha tany an-dàlana Obadia indro, Elia nifanena taminy; ary nahalala azy izy, dia niankohoka ka nanao hoe: Hay! hianao va ity, ry Elia tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izy namaly azy hoe: Eny, izaho ity, andeha, lazao amin’ny tomponao hoe: Injao, atsy Elia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Obadia: Inona no heloko, no anoloranao ny mpanomponao ho eo an-tànan’i Ahaba hamonoany ahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha velona koa Jehovah Andriamanitrao, dia tsy misy firenena na fanjakana izay tsy nanirahan’ny tompoko hitady anao; ary raha hoy ny olona: Tsy ato izy, dia nampianianiny izany firenena sy fanjakana izany raha tsy nahita anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ankehitriny hoy hianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy Elia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa raha vao miala aminao aho, dia ho entin’ny Fanahin’i Jehovah any amin’izay tsy fantatro hianao; koa raha tonga aho ka milaza amin’i Ahaba, nefa tsy ho hitany hianao tsinona, dia hovonoiny aho; kanefa izaho mpanomponao matahotra an’i Jehovah hatry ny fony mbola kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moa tsy nolazaina taminao va, tompoko, izay nataoko tamin’ilay namonoan’i Jezebela ny mpaminanin’i Jehovah, dia ny nanafenako ny mpaminanin’i Jehovah zato lahy, ka dimam-polo avy no nataoko tao an-johy iray, ary novelomiko mofo sy rano ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa ankehitriny hoy hianao: Andeha, lazao amin’ny tomponao hoe: Injao, atsy Elia; dia hamono ahy Ahaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy Elia: Raha velona koa Jehovah, Tompon’ny maro, Izay itsanganako eo anatrehany, dia hiseho aminy tokoa aho anio.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia lasa Obadia nitsena an’i Ahaba ka nilaza taminy; ary Ahaba nandeha hitsena an’i Elia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony hitan’i Ahaba Elia, dia hoy izy taminy: Hay! tonga etỳ hianao, ry ilay mampidi-doza amin’ny Isiraely! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Elia namaly hoe: Tsy izaho no nampidi-doza tamin’ny Isiraely, fa hianao sy ny mpianakavin’ny rainao ihany tamin’ny nandavanareo ny didin’i Jehovah sy ny nanarahanao ireo Bala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ankehitriny maniraha hamory ny Isiraely rehetra hihaona amiko any an-tendrombohitra Karmela, ary ny mpaminanin’i Bala dimam-polo amby efa-jato sy ny mpaminanin’ny Aseraha efa-jato, izay mihinana eo amin’ny latabatr’i Jezebela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia naniraka tany amin’ny Zanak’Isiraely rehetra Ahaba ka namory ny mpaminany ho any an-tendrombohitra Karmela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary dia nankeo amin’ny olona rehetra Elia ka nanao hoe: Mandra-pahoviana no hiroa saina hianareo? Raha Jehovah no Andriamanitra, manaraha Azy; fa raha Bala kosa, dia manaraha azy. Fa ny olona tsy namaly azy akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy Elia tamin’ny olona: Izaho dia izaho irery ihany no sisa amin’ny mpaminanin’i Jehovah; fa ny mpaminanin’i Bala kosa dia dimam-polo amby efa-jato lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa aoka ireo no hanome vantotr’ombilahy roa ho antsika; ary aoka izy no hifidy ny iray ho azy, dia handrasa azy ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy hasiana afo ao; ary izaho kosa hamboatra ny iray ka hametraka azy eo ambonin’ny kitay hazo, nefa tsy hasiana afo koa ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary miantsoa ny anaran’ny andriamanitrareo hianareo, ary izaho kosa hiantso ny anaran’i Jehovah; koa Izay Andriamanitra mamaly amin’ny afo, dia aoka Izy no ho Andriamanitra. Ary ny olona rehetra namaly hoe: Marina izany teny izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Elia tamin’ireo mpaminanin’i Bala: Mifidiana vantotr’ombilahy iray ho anareo, ka dia manamboara aloha hianareo, satria hianareo no maro; ary miantsoa ny anaran’ny andriamanitrareo, nefa aza asiana afo ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia naka ny vantotr’ombilahy izay nomeny azy ireo ka namboatra azy, dia niantso ny anaran’i Bala hatramin’ny maraina ka mandra-pitataovovonan’ny andro izy nanao hoe: Ry Bala ô, henoy izahay! Kanjo tsy nisy nanoina na namaly akory. Ary nihinjakinjaka tamin’ny alitara izay nataony izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nony nitataovovonana ny andro, dia nanesoeso azy Elia ka nanao hoe: Miantsoa mafy ihany, fa andriamanitra izy; angamba sondrian-dresaka izy, na miavela, na nisy nalehany, na matory angaha izy ka tsy maintsy hofohazina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niantso mafy indray ireo sady nitetika ny tenany araka ny fanaony amin’ny sabatra sy ny lefona mandra-paha-loa-dra tamin’ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary na dia efa nitsidika aza ny andro, dia mbola naminany ihany izy hatramin’ny fotoan’ny fanatitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hariva;
  - type: text
    text: ' nefa tsy nisy nanoina, na namaly, na nihaino azy akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy Elia tamin’ny olona rehetra: Manatòna ahy. Dia nanatona azy ny olona rehetra. Ary Elia namboatra ny alitaran’i Jehovah izay efa rava '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka naka vato roa ambin’ny folo, araka ny isan’ny firenen’ny zanak’i Jakoba, izay nihavian’ilay tenin’i Jehovah hoe: Isiraely no ho anaranao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ary izany vato izany dia nataony alitara ho an’ny anaran’i Jehovah; ary nanao hady kely manodidina ny alitara koa izy, izay mifafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahalany.
    marker-yv: yv-n
  - type: text
    text: ' voan-javatra indroan’ny famarana.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sea.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nandahatra ny kitay hazo izy, dia nandrasa ny vantotr’ombilahy ka nametraka azy teo ambonin’ny kitay hazo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'dia nanao hoe: Fenoy rano ny siny efatra, ka aidino amin’ny fanatitra dorana sy amin’ny kitay hazo. Dia hoy koa izy: Ataovy indray izany. Dia nataony indray. Ary hoy koa izy: Ataovy indray koa izany. Ary dia nataony indray koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary ny rano nikorotsaka nanodidina ny alitara; ka nofenoiny rano koa ny hady kely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nony tamin’ny fotoan’ny fanatitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hariva
  - type: text
    text: ' dia nanatona Elia mpaminany ka nanao hoe: Jehovah ô, Andriamanitr’i Abrahama sy Isaka ary Isiraely, aoka ho fantatra anio fa Hianao no Andriamanitra amin’ny Isiraely, ary izaho no mpanomponao, ary araka ny teninao no efa nanaovako izao zavatra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mihainoa ahy, mihainoa ahy, Jehovah ô, mba hahafantaran’ireto olona ireto fa Hianao Jehovah no Andriamanitra, ary Hianao no mampiverina ny fony indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia latsaka ny afon’i Jehovah ka nandevona ny fanatitra dorana sy ny kitay hazo sy ny vato ary ny vovoka sady nandritra ny rano tao amin’ny hady kely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary raha nahita izany ny olona rehetra, dia niankohoka ka nanao hoe: Jehovah, Izy no Andriamanitra; Jehovah, Izy no Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary hoy Elia taminy: Sambory ny mpaminanin’i Bala; aza avela hisy afa-mandositra izy na dia iray akory aza. Dia nosamborin’ny olona izy; ary nentin’i Elia ho eo amin’ny ony Kisona, ka dia novonoiny teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy Elia tamin’i Ahaba: Miakara hihinana sy hisotro, fa misasasasa izato ny ranonorana be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia niakatra hihinana sy hisotro Ahaba. Fa Elia kosa niakatra ho eo an-tampon’i Karmela, dia niankohoka tamin’ny tany, ary ny lohany nataony teo anelanelan’ny lohaliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary hoy izy tamin’ny zatovony: Miakara kely, ka tazano ny ranomasina. Dia niakatra izy ka nitazana, dia nanao hoe: Tsy misy na inona na inona. Ary hoy izy: Mandehana koa impito. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary nony fanimpitony, dia hoy izy: Misy rahona kely hoatra ny tànan’olona miakatra avy eny amin’ny ranomasina. Dia hoy izy: Miakara, ka lazao amin’i Ahaba hoe: Amboary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny kalesinao
  - type: text
    text: ', ka midìna, fandrao voasakan’ny ranonorana hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary vetivety dia maintin’ny rahona sy ny rivotra ny lanitra, ka nisy ranonorana be. Ary Ahaba niakatra tamin’ny kalesy ka nankany Jezirela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary ny tànan’i Jehovah dia tao amin’i Elia, dia nisikina izy ka nihazakazaka teo alohan’i Ahaba mandra-pahatongany tany Jezirela.
