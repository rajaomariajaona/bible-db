document_id: PSA.97,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fisehoan’ny fanjakan’Andriamanitra amin’ny hery, izay maharava ny sampy, fa mahasoa ny smpanompon’Andriamanitra kosa.
  - type: text
    content: JEHOVAH no Mpanjaka, aoka ho faly ny tany;
  - type: text
    content: Aoka ho ravoravo ny nosy maro.
  '10':
  - type: text
    content: Hianareo izay tia an’i Jehovah, mankahalà ny ratsy;
  - type: text
    content: Miaro ny fanahin’ny olony masina Izy
  - type: text
    content: Ary mamonjy azy amin’ny tànan’ny ratsy fanahy.
  '11':
  - type: text
    content: Ny fahazavana no voafafy ho an’ny marina,
  - type: text
    content: Ary ny fifaliana ho an’ny mahitsy fo.
  '12':
  - type: text
    content: Mifalia amin’i Jehovah, ry olo-marina,
  - type: text
    content: Ary miderà ny anarany masina.
  - type: note
    content: 'Na: ny fahatsiarovana ny fahamasinany.'
  '2':
  - type: text
    content: Rahona sy aizim-pito no manodidina Azy
  - type: text
    content: Fahamarinana sy fitsarana no fanorenan’ny seza fiandrianany.
  '3':
  - type: text
    content: Misy afo mialoha Azy
  - type: text
    content: Ka mandevona ny fahavalony manodidina.
  '4':
  - type: text
    content: Mahazava izao tontolo izao ny helany;
  - type: text
    content: Mahita izany ny tany ka mihorohoro.
  '5':
  - type: text
    content: Ny tendrombohitra miempo tahaka ny savoka eo anatrehan’i Jehovah,
  - type: text
    content: Dia eo anatrehan’ny Tompon’ny tany rehetra.
  '6':
  - type: text
    content: Ny lanitra maneho ny fahamarinany,
  - type: text
    content: Ary ny firenena rehetra mahita ny voninahiny.
  '7':
  - type: text
    content: Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra
  - type: text
    content: Sy miarahaba tena ny amin’ny andriamani-tsi-izy;
  - type: text
    content: 'Miankohofa eo anoloan’i '
  - type: text
    content: Jehovah,
  - type: text
    content: ' hianareo andriamanitra rehetra.'
  '8':
  - type: text
    content: Ziona mandre ka faly;
  - type: text
    content: Ary ravoravo ny zanakavavin’i Joda
  - type: text
    content: Noho ny fitsaranao, Jehovah ô.
  '9':
  - type: text
    content: Fa Hianao, Jehovah ô, no avo indrindra ambonin’ny tany rehetra;
  - type: text
    content: Efa avo ambonin’ny andriamanitra rehetra Hianao.–
