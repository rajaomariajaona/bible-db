document_id: PSA.97
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fisehoan’ny fanjakan’Andriamanitra amin’ny hery, izay maharava ny sampy, fa mahasoa ny smpanompon’Andriamanitra kosa.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: JEHOVAH no Mpanjaka, aoka ho faly ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho ravoravo ny nosy maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rahona sy aizim-pito no manodidina Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahamarinana sy fitsarana no fanorenan’ny seza fiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misy afo mialoha Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mandevona ny fahavalony manodidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mahazava izao tontolo izao ny helany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahita izany ny tany ka mihorohoro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tendrombohitra miempo tahaka ny savoka eo anatrehan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo anatrehan’ny Tompon’ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lanitra maneho ny fahamarinany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny firenena rehetra mahita ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy miarahaba tena ny amin’ny andriamani-tsi-izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Miankohofa eo anoloan’i '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehovah,
  - type: text
    text: ' hianareo andriamanitra rehetra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ziona mandre ka faly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ravoravo ny zanakavavin’i Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fitsaranao, Jehovah ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Hianao, Jehovah ô, no avo indrindra ambonin’ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa avo ambonin’ny andriamanitra rehetra Hianao.–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hianareo izay tia an’i Jehovah, mankahalà ny ratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaro ny fanahin’ny olony masina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamonjy azy amin’ny tànan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fahazavana no voafafy ho an’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fifaliana ho an’ny mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mifalia amin’i Jehovah, ry olo-marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miderà ny anarany masina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '97.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fahatsiarovana ny fahamasinany.
    marker-yv: yv-n
