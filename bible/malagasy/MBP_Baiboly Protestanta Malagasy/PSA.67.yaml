document_id: PSA.67,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanirian’ny olo-marina mba hanaiky an’Andriamanitra avokoa ny firenena rehetra.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo. Tonon-kira.
  - type: text
    content: ANDRIAMANITRA anie hamindra fo aminay sy hitahy anay;
  - type: text
    content: '[Sela.]'
  - type: text
    content: Hampamirapiratra ny tavany aminay anie Izy;
  '2':
  - type: text
    content: Mba ho fantatra etỳ ambonin’ny tany ny làlanao
  - type: text
    content: Sy ny famonjenao any amin’ny jentilisa rehetra.
  '3':
  - type: text
    content: Hidera Anao ny firenena, Andriamanitra ô;
  - type: text
    content: Eny, hidera Anao ny firenena rehetra.
  '4':
  - type: text
    content: Hifaly sy hihoby ny firenen-tsamy hafa,
  - type: text
    content: Satria mitsara marina ny firenena Hianao;
  - type: text
    content: Ny firenen-tsamy hafa ambonin’ny tany dia entinao.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Hidera Anao ny firenena, Andriamanitra ô;
  - type: text
    content: Eny, hidera Anao ny firenena rehetra.
  '6':
  - type: text
    content: Ny tany efa nahavokatra;
  - type: text
    content: Mitahy antsika Andriamanitra, dia Andriamanitsika.
  '7':
  - type: text
    content: Mitahy antsika Andriamanitra;
  - type: text
    content: Ary hatahotra Azy ny vazan-tany rehetra.
