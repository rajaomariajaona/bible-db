document_id: PSA.67
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fanirian’ny olo-marina mba hanaiky an’Andriamanitra avokoa ny firenena rehetra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo. Tonon-kira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA anie hamindra fo aminay sy hitahy anay;
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampamirapiratra ny tavany aminay anie Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mba ho fantatra etỳ ambonin’ny tany ny làlanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny famonjenao any amin’ny jentilisa rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hidera Anao ny firenena, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hidera Anao ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hifaly sy hihoby ny firenen-tsamy hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria mitsara marina ny firenena Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny firenen-tsamy hafa ambonin’ny tany dia entinao.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hidera Anao ny firenena, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hidera Anao ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tany efa nahavokatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitahy antsika Andriamanitra, dia Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitahy antsika Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatahotra Azy ny vazan-tany rehetra.
