document_id: ISA.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa, indro, Jehovah, Tompon’ny maro,
  - type: text
    content: 'Manaisotra amin’i Jerosalema sy Joda izay andry sy tohana rehetra:'
  - type: text
    content: Dia ny mofo sy ny rano rehetra, izay tohan’aina,
  '10':
  - type: text
    content: Lazaonareo ny amin’ny marina fa hahita soa izy,
  - type: text
    content: Fa ny vokatry ny asany no hohaniny.
  '11':
  - type: text
    content: Lozan’ny ratsy fanahy! hiharan’ny ratsy izy,
  - type: text
    content: Satria ny valin’ny nataon’ny tànany ihany no hanody azy.
  '12':
  - type: text
    content: Ny amin’ny oloko, dia zaza no mampahory azy,
  - type: text
    content: Ary ireo vehivavy no manapaka azy.
  - type: text
    content: Ry oloko ô, ny mpitarika anao no mampivily anao
  - type: text
    content: Sady mandrava ny làlana alehanao.
  '13':
  - type: text
    content: Jehovah mitsangana handahatra
  - type: text
    content: Ka miatrika hitsara ny firenena.
  '14':
  - type: text
    content: 'Jehovah miampanga ny loholona sy ny lehiben’ny olony amin’ny fitsarana hoe:'
  - type: text
    content: Hianareo no efa nandevona ny tanimboaloboka;
  - type: text
    content: Ary ao an-tranonareo ny fananan’ny malahelo izay efa nalaina an-keriny.
  '15':
  - type: text
    content: Ahoana no hevitrareo no dia hosihosenareo ny oloko,
  - type: text
    content: Ary torotoroinareo ny tavan’ny malahelo?
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '16':
  - type: text
    content: 'Ary hoy koa Jehovah:'
  - type: text
    content: Satria miavona ireo zanakavavin’i Ziona ka mandeha mianjonanjona sy manao maso meloka
  - type: text
    content: Sady kasikasy fandeha
  - type: text
    content: Ary mampikorintsandrintsana ny fehin-tongony,
  '17':
  - type: text
    content: Noho izany dia hataon’ny Tompo feno tako-pery ny tampon-dohan’ny zanakavavin’i Ziona,
  - type: text
    content: Ary Jehovah hampiseho ny fitanjahany.
  '18':
  - type: text
    content: Amin’izany andro izany dia hesorin’i Jehovah ny firavaka rehetra, na ny fehin-tongotra,
  - type: text
    content: Na ny fehi-loha,
  - type: note
    content: 'Na: voavola.'
  - type: text
    content: ' na ny sarim-bolantsinana,'
  '19':
  - type: text
    content: Na ny kavina voavola, na ny rojo,
  - type: note
    content: 'Na: haba.'
  - type: text
    content: ' na ny fisalobonana makarakara,'
  '2':
  - type: text
    content: Ny lehilahy mahery sy ny mpiady,
  - type: text
    content: Ny mpitsara sy ny mpaminany,
  - type: text
    content: Ny mpanao fankatovana sy ny loholona,
  '20':
  - type: text
    content: Na ny satroka,
  - type: note
    content: Heb. diadema.
  - type: text
    content: ' na ny rojo parapaingo, na ny fehin-kibo misy haingony,'
  - type: text
    content: Na ny fitoeran-dranomanitra, na ny ody fanaony ravaka,
  '21':
  - type: text
    content: Na ny peratra, na ny kavin’orona,
  '22':
  - type: text
    content: Na ny akanjo fihaingoana, na ny kapôty,
  - type: text
    content: Na ny saly, na ny poketra,
  '23':
  - type: text
    content: Na ny fitaratra fizahana, na ny akanjo somizy anatiny,
  - type: text
    content: Na ny satroka fihaingoana,
  - type: note
    content: Heb. hamama.
  - type: text
    content: ' na ny lamba fisaronana;'
  '24':
  - type: text
    content: Ary ny manitra hosoloana ny maimbo;
  - type: text
    content: Ary ny fehin-kibo tsara hosoloana ny mahazaka;
  - type: text
    content: Ary ny volo voavoatra tsara hosoloana ny boriana;
  - type: text
    content: Ary ny akanjo miebanebana hosoloana ny lamba fisaonana;
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: Ary ny hatsaran-tarehy hosoloana ny tomboka amin’ny vy mahamay.
  '25':
  - type: text
    content: Ny lehilahy ao aminao ho lavon-tsabatra,
  - type: text
    content: Ary ny mahery ao aminao ho faty an-ady;
  '26':
  - type: text
    content: Ka dia hitomany sy hisaona ny vavahadiny;
  - type: text
    content: Ary ho lao ny tanàna ka hanjokaiky,
  '3':
  - type: text
    content: Ny mpifehy ny dimam-polo sy ny manan-kaja,
  - type: text
    content: Ny mpanolo-tsaina sy ny mahay zavatra
  - type: text
    content: Ary ny mahay ny fiboeriboeriky ny mpanao ody.
  '4':
  - type: text
    content: Ary hanendry ankizilahy madinika ho lehibeny Aho,
  - type: text
    content: Ary ny haitraitran-jaza no hanapaka azy.
  '5':
  - type: text
    content: Ary hifanipaka izy samy iray firenena,
  - type: text
    content: Dia samy ny namany avy sy ny akaiky azy avy;
  - type: text
    content: Ny tovolahy hirehareha amin’ny anti-panahy,
  - type: text
    content: Ary ny tsy manan-daza amin’ny manan-daza.
  '6':
  - type: text
    content: Raha misy olona angatahin’
  - type: note
    content: Heb. hazonin’.
  - type: text
    content: ' ny rahalahiny ao an-tranon-drainy ka ataony hoe:'
  - type: text
    content: Hianao no manana lamba, koa aoka ho mpanapaka anay,
  - type: text
    content: Ary aoka ity faharavana ity ho raharahanao,
  '7':
  - type: text
    content: 'Dia hamaly izy amin’izany andro izany hoe:'
  - type: text
    content: Tsy mety ho dokotera aho,
  - type: text
    content: Fa ao an-tranoko tsy misy hanina na lamba;
  - type: text
    content: Koa tsy azonareo hatao mpanapaka ny olona aho.
  '8':
  - type: text
    content: Fa tafintohina Jerosalema,
  - type: text
    content: Ary potraka Joda,
  - type: text
    content: Satria ny lelany sy ny asany dia samy manohitra an’i Jehovah
  - type: text
    content: Mba hihaika ny mason’ny voninanihy.
  '9':
  - type: text
    content: Ny fisehon’ny tarehiny miampanga azy;
  - type: text
    content: Ary mampiharihary ny fahotany tahaka an’i Sodoma izy ka tsy manafina azy.
  - type: text
    content: Lozan’ny fanahiny!
  - type: text
    content: Fa mampidi-doza amin’ny tenany izy.
