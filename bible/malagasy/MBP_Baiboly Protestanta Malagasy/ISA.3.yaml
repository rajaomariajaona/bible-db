document_id: ISA.3
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa, indro, Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Manaisotra amin’i Jerosalema sy Joda izay andry sy tohana rehetra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny mofo sy ny rano rehetra, izay tohan’aina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lehilahy mahery sy ny mpiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpitsara sy ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanao fankatovana sy ny loholona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny mpifehy ny dimam-polo sy ny manan-kaja,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanolo-tsaina sy ny mahay zavatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mahay ny fiboeriboeriky ny mpanao ody.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hanendry ankizilahy madinika ho lehibeny Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny haitraitran-jaza no hanapaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hifanipaka izy samy iray firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy ny namany avy sy ny akaiky azy avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tovolahy hirehareha amin’ny anti-panahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsy manan-daza amin’ny manan-daza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha misy olona angatahin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hazonin’.
    marker-yv: yv-n
  - type: text
    text: ' ny rahalahiny ao an-tranon-drainy ka ataony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no manana lamba, koa aoka ho mpanapaka anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ity faharavana ity ho raharahanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hamaly izy amin’izany andro izany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety ho dokotera aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao an-tranoko tsy misy hanina na lamba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa tsy azonareo hatao mpanapaka ny olona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa tafintohina Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary potraka Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny lelany sy ny asany dia samy manohitra an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hihaika ny mason’ny voninanihy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fisehon’ny tarehiny miampanga azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampiharihary ny fahotany tahaka an’i Sodoma izy ka tsy manafina azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozan’ny fanahiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mampidi-doza amin’ny tenany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lazaonareo ny amin’ny marina fa hahita soa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vokatry ny asany no hohaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lozan’ny ratsy fanahy! hiharan’ny ratsy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny valin’ny nataon’ny tànany ihany no hanody azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny amin’ny oloko, dia zaza no mampahory azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo vehivavy no manapaka azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry oloko ô, ny mpitarika anao no mampivily anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mandrava ny làlana alehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jehovah mitsangana handahatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miatrika hitsara ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jehovah miampanga ny loholona sy ny lehiben’ny olony amin’ny fitsarana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo no efa nandevona ny tanimboaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao an-tranonareo ny fananan’ny malahelo izay efa nalaina an-keriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahoana no hevitrareo no dia hosihosenareo ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary torotoroinareo ny tavan’ny malahelo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy koa Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria miavona ireo zanakavavin’i Ziona ka mandeha mianjonanjona sy manao maso meloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady kasikasy fandeha
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampikorintsandrintsana ny fehin-tongony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Noho izany dia hataon’ny Tompo feno tako-pery ny tampon-dohan’ny zanakavavin’i Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jehovah hampiseho ny fitanjahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany dia hesorin’i Jehovah ny firavaka rehetra, na ny fehin-tongotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fehi-loha,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voavola.
    marker-yv: yv-n
  - type: text
    text: ' na ny sarim-bolantsinana,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Na ny kavina voavola, na ny rojo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: haba.
    marker-yv: yv-n
  - type: text
    text: ' na ny fisalobonana makarakara,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na ny satroka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: diadema.
    marker-yv: yv-n
  - type: text
    text: ' na ny rojo parapaingo, na ny fehin-kibo misy haingony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fitoeran-dranomanitra, na ny ody fanaony ravaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Na ny peratra, na ny kavin’orona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na ny akanjo fihaingoana, na ny kapôty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny saly, na ny poketra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Na ny fitaratra fizahana, na ny akanjo somizy anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny satroka fihaingoana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamama.
    marker-yv: yv-n
  - type: text
    text: ' na ny lamba fisaronana;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny manitra hosoloana ny maimbo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fehin-kibo tsara hosoloana ny mahazaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volo voavoatra tsara hosoloana ny boriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny akanjo miebanebana hosoloana ny lamba fisaonana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hatsaran-tarehy hosoloana ny tomboka amin’ny vy mahamay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny lehilahy ao aminao ho lavon-tsabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mahery ao aminao ho faty an-ady;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ka dia hitomany sy hisaona ny vavahadiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lao ny tanàna ka hanjokaiky,
