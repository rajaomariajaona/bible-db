document_id: PSA.148,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao rehetra izao hidera an’Andriamanitra.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà an’i Jehovah, ry any an-danitra;
  - type: text
    content: Miderà Azy any ambony.
  '10':
  - type: text
    content: Ny bibi-dia sy ny biby fiompy rehetra,
  - type: text
    content: Ny biby mandady na mikisaka ary ny voro-manidina,
  '11':
  - type: text
    content: Ny mpanjaka amin’ny tany sy ny vahoaka rehetra,
  - type: text
    content: Ny mpanapaka sy ny mpitsara rehetra amin’ny tany,
  '12':
  - type: text
    content: Na ny zatovolahy, na ny zatovovavy,
  - type: text
    content: Na ny antitra, na ny tanora,–
  '13':
  - type: text
    content: Samia midera ny anaran’i Jehovah avokoa,
  - type: text
    content: Fa ny anarany ihany no misandratra;
  - type: text
    content: Ambonin’ny tany sy ny lanitra ny voninahiny.
  '14':
  - type: text
    content: Ary manandratra tandroka ho an’ny olony Izy,
  - type: text
    content: Dia fiderana ho an’ny olony masina rehetra,
  - type: text
    content: Eny, ho an’ny Zanak’Isiraely, firenena akaiky Azy.
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: Miderà Azy, ry anjeliny rehetra;
  - type: text
    content: Miderà Azy, ry miaramilany rehetra.
  '3':
  - type: text
    content: Miderà Azy, ry masoandro amam-bolana;
  - type: text
    content: Miderà Azy, ry kintana mazava rehetra.
  '4':
  - type: text
    content: Miderà Azy, ry lanitry ny lanitra,
  - type: text
    content: Ary hianareo rano ambonin’ny lanitra.
  '5':
  - type: text
    content: Aoka hidera ny anaran’i Jehovah ireo;
  - type: text
    content: Fa Izy no nandidy, dia ary ireo.
  '6':
  - type: text
    content: Nampitoetra ireo ho mandrakizay doria Izy;
  - type: text
    content: Nomen-dalàna ireo ka tsy mba mihoatra.
  '7':
  - type: text
    content: Miderà an’i Jehovah etỳ an-tany.
  - type: text
    content: Hianareo dragona sy hianareo rano lalina rehetra,
  '8':
  - type: text
    content: Ny afo sy ny havandra, ny orampanala sy ny zavona,
  - type: text
    content: Ny rivotra mahery izay mankatò ny teniny,
  '9':
  - type: text
    content: Ny tendrombohitra sy ny havoana rehetra,
  - type: text
    content: Ny hazo fihinam-boa sy ny sedera rehetra,
