document_id: NUM.32,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahazoan’ny firenen’i Robena sy Gada ary ny antsasaky ny firenen’i Manase zara-tany tao an-dafy atsinanan’i Jordana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nanana omby aman-ondry be indrindra ny taranak’i Robena sy ny taranak’i Gada; ary rehefa nahita ny tany Jazera sy ny tany Gileada izy, fa tany tsara ho fiandrasana omby aman-ondry io, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nirehitra ny fahatezeran’i Jehovah tamin’izay andro izay, dia nianiana Izy ka nanao hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona izay niakatra avy tany Egypta, hatramin’ny roa-polo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin’i Abrahama sy Isaka ary Jakoba homena azy, satria tsy tanteraka tamin’ny fanarahana Ahy izy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy Kaleba, zanak’i Jefone Kenizita, sy Josoa, zanak’i Nona, izay tanteraka tamin’ny fanarahana an’i Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin’ny Isiraely ny fahatezeran’i Jehovah, ka nampirenireny azy tany an-efitra efa-polo taona Izy mandra-pahalany ritra ny taranaka rehetra izay nanao ratsy teo imason’i Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indreto, hianareo mitsangana hisolo ny rainareo, ho taranaka mbola mpanota, hampitombo ny firehetan’ny fahatezeran’i Jehovah amin’ny Isiraely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha miala amin’ny fanarahana Azy hianareo dia hamela azy any an-efitra indray Izy; ka dia hianareo no handringana izao olona rehetra izao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nanatona azy izy ireo ka nanao hoe: Hanao vala eto izahay ho an’ny omby aman-ondrinay sy tanàna koa ho an’ny zanakay madinika; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny tenanay dia hiomana faingana handroso eo alohan’ny Zanak’Isiraely mandra-pitondranay azy ho any amin’ny taniny; ary ny zanakay madinika dia hitoetra amin’ny tanàna mimanda noho ny mponina amin’ny tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hody any an-tranonay izahay, mandra-pahazon’ny Zanak’Isiraely ny zara-taniny avy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy hiara-mandray zara-tany aminy izahay hatrany an-dafin’i Jordana no ho miankandrefana, satria efa azonay atỳ an-dafy atsinanan’i Jordana atỳ ny zara-taninay.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia avy ny taranak’i Gada sy ny taranak’i Robena ka niteny tamin’i Mosesy sy Eleazara mpisorona sy tamin’ny lohan’ny fiangonana ka nanao hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy taminy: Raha hanao izany zavatra izany hianareo ka hiomana eo anatrehan’i Jehovah ho any an-tafika, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa samy efa voaomana hiady, dia hita ho any an-dafin’i Jordana eo anatrehan’i Jehovah, mandra-pandroakany ny fahavalony hiala eo anoloany, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ho resy eo anatrehan’i Jehovah ny tany; ary rehefa vita izany, dia hody hianareo ka tsy hanan-tsiny, na amin’i Jehovah, na amin’ny Isiraely; ary ity tany ity ho zara-taninareo eo anatrehan’i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy hanao izany kosa hianareo, dia manota amin’i Jehovah; ary aoka ho fantatrareo fa hanody anareo ny fahotanareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manaova tanàna ho an’ny zanakareo madinika sy vala ho an’ny ondry aman-osinareo, ka ataovy izay naloaky ny vavanareo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin’i Mosesy ny taranak’i Gada sy ny taranak’i Robena ka nanao hoe: Ny mpanomponao dia hanao araka izay andidianao, tompoko: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny zanakay madinika sy ny vadinay sy ny ondry aman-osinay ary ny biby fiompinay rehetra dia hitoetra ato amin’ny tanànan’i Gileada; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny mpanomponao handeha hita, samy efa voaomana hiady eo anatrehan’i Jehovah, ho any an-tafika, araka izay nolazainao, tompoko.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy dia nandidy an’i Eleazara mpisorona sy Josoa, zanak’i Nona, ary ny lohan’ny fianakaviana tamin’ny firenen’ny Zanak’Isiraely ny amin’ireo '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Raha handeha hita an’i Jordana hiaraka aminareo ny taranak’i Gada sy ny taranak’i Robena, samy efa voaomana hiady eo anatrehan’i Jehovah, ka ho resy ny tany eo anoloanareo, dia homenareo azy ny tany Gileada ho zara-taniny; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atarota sy Dibona sy Jazera sy Nimra sy Hesbona sy Elale sy Sebama sy Nebo ary Beona, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa raha tsy mandeha samy efa voaomana hiady miaraka aminareo izy, dia eo aminareo amin’ny tany Kanana ihany no hahazoany zara-tany.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny taranak’i Gada sy ny taranak’i Robena ka nanao hoe: Araka izay nolazain’i Jehovah tamin’ny mpanomponao no hataonay: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izahay handeha hita eo anatrehan’i Jehovah ho any amin’ny tany Kanana samy efa voaomana hiady, kanefa etỳ an-dafin’i Jordana etỳ ihany no hahazoanay zara-tany.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen’i Mosesy ho an’ny taranak’i Gada sy ny taranak’i Robena ary ny antsasaky ny firenen’i Manase, zanak’i Josefa, ny fanjakan’i Sihona, mpanjakan’ny Amorita, sy ny fanjakan’i Oga, mpanjakan’i Basana, dia ny tany mbamin’ny tanànany ao amin’ny fari-tany, dia ny tanàna eny amin’ny tany manodidina.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Gada nanao an’i Dibona sy Atarota sy Aroera '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Atrota-sofana sy Jazera ary Jogbeha '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy Beti-nimra sy Beti-harana, tanàna mimanda, ary vala ho an’ny ondry.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Robena nanao an’i Hesbona sy Elale sy Kiriataima '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Nebo sy Bala-meona (nefa novana ny anaran’ireo) ary Sibma; ary nasiany anarana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vaovao
    - type: text
      text: ' ny tanàna izay nataony.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak’i Makira, zanak’i Manase, nankany Gileada ka nahafaka azy, dia nandroaka ny Amorita izay nonina teo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ireo tany noresen’i Jehovah teo anoloan’ny fiangonan’ny Isiraely, dia tany tsara ho fiandrasana omby aman-ondry, ary ny mpanomponao manana omby aman-ondry; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Gileada dia nomen’i Mosesy an’i Makira, zanak’i Manase, ka nonina tao izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jaïra, zanak’i Manase, nandeha ka nahafaka ny tanàna madinika teo, ary ny anarany nataony hoe Havota-jaïra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Havota-jaïra = Tanàna madinika an’i Jaïra.
      marker-yv: yv-n
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Noba nandeha ka nahafaka an’i Kenata sy ny zana-bohiny, dia nataony hoe Noba, araka ny anarany izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy koa izy: Raha mahita fitia eo imasonao izahay; aoka homena anay mpanomponao ho zara-taninay io tany io; fa aza ampitaina an’i Jordana izahay.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy tamin’ny taranak’i Gada sy ny taranak’i Robena: Ny rahalahinareo handeha hanafika, ka hianareo kosa hijanona eto va? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana hianareo no mampiketraka ny fon’ny Zanak’Isiraely, mba tsy handehanany ho any amin’ny tany izay nomen’i Jehovah azy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nataon’ny rainareo, fony nirahiko avy tao Kadesi-barnea hisafo ny tany izy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha niakatra hatrany an-dohasaha Eskola izy ka nahita ny tany, dia nampiketraka ny fon’ny Zanak’Isiraely izy, mba tsy handehanany ho any amin’ny tany izay efa nomen’i Jehovah azy. '
