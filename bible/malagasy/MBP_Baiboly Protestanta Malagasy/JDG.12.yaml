document_id: JDG.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hatezeran’ny Efraima tamin’i Jefta, sy ny niadian’i Jefta taminy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY nivory ny lehilahy amin’ny Efraima, dia nandeha nianavaratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nankany Zafona.
      marker-yv: yv-n
    - type: text
      text: ' ka nanao tamin’i Jefta hoe: Nahoana no nandeha niady tamin’ny taranak’i Amona hianao ka tsy mba niantso anay hiaraka aminao? Hodoranay amin’ny afo ny tranonao sy hianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia maty Ibzana ka nalevina tany Betlehema.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Elona Zebolonita no nitsara ny Isiraely nandimby azy; ary nitsara ny Isiraely folo taona izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia maty Elona Zebolonita ka nalevina tany Aialona ao amin’ny tanin’ny Zebolona.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abdona, zanak’i Elela, avy any Piratona, no nitsara ny Isiraely nandimby azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanana zanakalahy efa-polo sy zafy telo-polo izay nitaingina zana-boriky fito-polo izy, ary nitsara ny Isiraely valo taona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia maty Abdona, zanak’i Elela, avy any Piratona, ka nalevina tany Piratona, any amin’ny tanin’ny Efraima any amin’ny tany havoan’ny Amalekita.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jefta taminy: Izaho sy ny oloko efa nanana ady mafy tamin’ny taranak’i Amona; ary niantso anareo aho, fa tsy namonjy ahy tamin’ny tànany hianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa hitako fa tsy namonjy ahy hianareo, dia nanao ny aiko tsy ho zavatra aho ka nandeha niady tamin’ny taranak’i Amona, ary natolotr’i Jehovah teo an-tànako izy, koa nahoana hianareo no miakatra atỳ amiko anio hila ady amiko?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta dia namory ny lehilahy rehetra amin’ny Gileada ka niady tamin’ny Efraima; ary dia namely an’i Efraima ny lehilahy amin’i Gileada, satria hoy ireo: Hianareo Gileadita dia mpandositra avy amin’ny Efraima ao amin’ny taranak’i Efraima sy Manase. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia novonjen’ny Gileada ny fitana any Jordana mankany amin’ny Efraima; ary nony niteny ny mpandositra avy amin’ny Efraima nanao hoe: Aoka mba hita aho; dia hoy ny lehilahy amin’ny Gileada taminy: Efraimita va hianao? ary raha hoy izy: Tsia, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hoy izy ireo taminy: Tonòny ary ny hoe Shiboleta; fa hoy kosa izy: Siboleta, satria tsy nahay nanonona izany marina izy. Dia nisambotra azy ireo ka namono azy teo amin’ny fitana ao Jordana; ary nahafatesana roa arivo sy efatra alina ny Efraimita tamin’izany andro izany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsara ny Isiraely enin-taona Jefta. Ary maty Jefta Gileadita ka nalevina tao amin’ny tanàna anankiray any Gileada.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tantaran’Ibzana sy Elona ary Abdona.
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Ibzana, avy any Betlehema, no nitsara ny Isiraely nandimby an’i Jefta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy nanana zanakalahy telo-polo sy zanakavavy telo-polo, izay nampanambadiny tany ivelany, ary zazavavy telo-polo kosa no nampidiriny ho an’ny zanani-lahy. Ary nitsara ny Isiraely fito taona izy. '
