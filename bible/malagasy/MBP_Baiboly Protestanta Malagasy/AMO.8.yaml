document_id: AMO.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana nentin’Andriamanitra nilaza tamin’i Amosa ny fahantomotry ny loza hanjo ny Isiraely.
  - type: text
    content: 'IZAO no nasehon’i Jehovah Tompo tamiko: Indro, nisy harona feno voankazo masaka fahavaratra. '
  '10':
  - type: text
    content: Hampodiko ho fitomaniana ny andro firavoravoanareo
  - type: text
    content: Ary ho hira fahalahelovana ny hiranareo rehetra,
  - type: text
    content: Hofeheziko lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' ny valahana rehetra,'
  - type: text
    content: Sady hokakasako ny loha rehetra;
  - type: text
    content: Ary hataoko ho toy ny fisaonana zanakalahy tokana izany,
  - type: text
    content: Ka ny farany dia ho tahaka ny andro mangidy.
  '11':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah Tompo,
  - type: text
    content: Izay hanaterako mosary amin’ny tany,
  - type: text
    content: Tsy fanirian
  - type: note
    content: Heb. mosary.
  - type: text
    content: -kanina anefa, na hetahetan-drano,
  - type: text
    content: Fa faniriana
  - type: note
    content: Heb. mosary.
  - type: text
    content: ' handre ny tenin’i Jehovah;'
  '12':
  - type: text
    content: Ary hivembena hatrany amin’ny ranomasina ka hatrany amin’ny ranomasina ny olona
  - type: text
    content: Ary hatrany amin’ny avaratra ka hatrany amin’ny atsinanana,–
  - type: text
    content: Eny, hivezivezy hitady ny tenin’i Jehovah izy,
  - type: text
    content: Nefa tsy hahita.
  '13':
  - type: text
    content: Amin’izany andro izany dia ho jemby noho ny hetaheta
  - type: text
    content: Ny virijina tsara tarehy sy ny zatovo-lahy,
  '14':
  - type: text
    content: Dia ireo izay mianiana amin’ny fahotan’i Samaria,
  - type: text
    content: 'Ka manao hoe: Raha velona koa ny andriamanitrao, ry Dana,'
  - type: text
    content: Ary raha velona koa ny fanaon’i Beri-sheba;
  - type: text
    content: Eny, ho lavo izy ka tsy hiarina intsony.
  '2':
  - type: text
    content: 'Ary hoy Izy: Inona no hitanao, ry Amosa? Dia hoy izaho: Harona feno voankazo masaka fahavaratra. Dia hoy Jehovah tamiko:'
  - type: text
    content: Tonga amin’ny Isiraely oloko ny farany;
  - type: text
    content: Tsy handefitra aminy
  - type: note
    content: Heb. handalo azy.
  - type: text
    content: ' intsony Aho.'
  '3':
  - type: text
    content: Ho tonga naonaona ny hira ao an-dapa
  - type: note
    content: 'Na: tempoly.'
  - type: text
    content: ' amin’izany andro izany, hoy Jehovah Tompo;'
  - type: text
    content: Ho be ny faty,
  - type: text
    content: Hatraiza hatraiza no hanariany azy.
  - type: text
    content: Mangìna re!
  '4':
  - type: text
    content: Mihainoa izao, hianareo izay mihanahana te-hitelina ny malahelo
  - type: text
    content: Sy te-hahafongana ny mpandefitra amin’ny tany
  '5':
  - type: text
    content: 'Ka manao hoe: Rahoviana no ho tapitra ny voaloham-bolana, hivarotantsika vary,'
  - type: text
    content: Sy ny Sabata, hanokafantsika ny lava-bary,
  - type: text
    content: Ka hanakelezana ny efaha sy hanalehibiazana ny sekely,
  - type: text
    content: Ary hanaovana mizana mandainga,
  '6':
  - type: text
    content: Mba hovidintsika volafotsy ny mahantra
  - type: text
    content: Sy kiraro iray lomisy ny malahelo,
  - type: text
    content: Ary hivarotantsika ny loha-kororoky ny vary?
  '7':
  - type: text
    content: 'Jehovah nianiana tamin’ny Reharehan’i Jakoba ka nanao hoe:'
  - type: text
    content: Tsy hisy hohadinoiko mandrakizay ny asany na dia iray akory aza!
  '8':
  - type: text
    content: Tsy hihorohoro noho izany va ny tany,
  - type: text
    content: Sy hitomany ny mponina rehetra ao aminy?
  - type: text
    content: Eny, ny tany rehetra hihatondraka tahaka an’i Neily
  - type: text
    content: Sy hihena indray toy ny Neilin’i Egypta.
  '9':
  - type: text
    content: Ary amin’izany andro izany, hoy Jehovah Tompo,
  - type: text
    content: Dia halentiko mitataovovonana ny masoandro,
  - type: text
    content: Ary hohamaiziniko antoandro-benanahary ny tany;
