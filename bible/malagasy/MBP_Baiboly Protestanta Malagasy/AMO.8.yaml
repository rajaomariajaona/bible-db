document_id: AMO.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahitana nentin’Andriamanitra nilaza tamin’i Amosa ny fahantomotry ny loza hanjo ny Isiraely.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAO no nasehon’i Jehovah Tompo tamiko: Indro, nisy harona feno voankazo masaka fahavaratra. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampodiko ho fitomaniana ny andro firavoravoanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho hira fahalahelovana ny hiranareo rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofeheziko lamba fisaonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lamba malailay.
      marker-yv: yv-n
    - type: text
      text: ' ny valahana rehetra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hokakasako ny loha rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko ho toy ny fisaonana zanakalahy tokana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny farany dia ho tahaka ny andro mangidy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, avy ny andro, hoy Jehovah Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hanaterako mosary amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fanirian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mosary.
      marker-yv: yv-n
    - type: text
      text: -kanina anefa, na hetahetan-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa faniriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mosary.
      marker-yv: yv-n
    - type: text
      text: ' handre ny tenin’i Jehovah;'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hivembena hatrany amin’ny ranomasina ka hatrany amin’ny ranomasina ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatrany amin’ny avaratra ka hatrany amin’ny atsinanana,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hivezivezy hitady ny tenin’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy hahita.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia ho jemby noho ny hetaheta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny virijina tsara tarehy sy ny zatovo-lahy,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ireo izay mianiana amin’ny fahotan’i Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Raha velona koa ny andriamanitrao, ry Dana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha velona koa ny fanaon’i Beri-sheba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho lavo izy ka tsy hiarina intsony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Inona no hitanao, ry Amosa? Dia hoy izaho: Harona feno voankazo masaka fahavaratra. Dia hoy Jehovah tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga amin’ny Isiraely oloko ny farany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy handefitra aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: handalo azy.
      marker-yv: yv-n
    - type: text
      text: ' intsony Aho.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga naonaona ny hira ao an-dapa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tempoly.
      marker-yv: yv-n
    - type: text
      text: ' amin’izany andro izany, hoy Jehovah Tompo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho be ny faty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatraiza hatraiza no hanariany azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangìna re!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa izao, hianareo izay mihanahana te-hitelina ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy te-hahafongana ny mpandefitra amin’ny tany
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Rahoviana no ho tapitra ny voaloham-bolana, hivarotantsika vary,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny Sabata, hanokafantsika ny lava-bary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanakelezana ny efaha sy hanalehibiazana ny sekely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanaovana mizana mandainga,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hovidintsika volafotsy ny mahantra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy kiraro iray lomisy ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hivarotantsika ny loha-kororoky ny vary?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jehovah nianiana tamin’ny Reharehan’i Jakoba ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy hohadinoiko mandrakizay ny asany na dia iray akory aza!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hihorohoro noho izany va ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hitomany ny mponina rehetra ao aminy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny tany rehetra hihatondraka tahaka an’i Neily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hihena indray toy ny Neilin’i Egypta.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany andro izany, hoy Jehovah Tompo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia halentiko mitataovovonana ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hohamaiziniko antoandro-benanahary ny tany;
