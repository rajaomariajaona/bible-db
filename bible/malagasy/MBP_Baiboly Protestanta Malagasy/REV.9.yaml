document_id: REV.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsofana ny trompetra fahadimy, sy ny nahatongavan’ny loza voalohany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY ny anjely fahadimy nitsoka, dia hitako fa, indro, nisy kintana anankiray avy tany an-danitra latsaka tamin’ny tany; ary nomena ilay anjely ny fanalahidin’ny lavaka tsy hita noanoa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary manan-drambo tahaka ny maingoka izy sady misy fanindronana; ary amin’ny rambony no misy ny heriny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahefana.
      marker-yv: yv-n
    - type: text
      text: ' hampahoriany ny olona dimy volana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary manana ny anjelin’ny lavaka tsy hita noanoa ho mpanjakany izy; ny anarany amin’ny teny Hebreo dia Abadona,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abadona = Fandringanana.
      marker-yv: yv-n
    - type: text
      text: ' fa amin’ny teny Grika kosa dia Apolyona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Apolyona = Mpandringana.
      marker-yv: yv-n
    - type: text
      text: ' no anarany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Lasa ny loza anankiray; indreo, ho avy ny loza roa hafa koa, rehefa afaka izao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsofana ny trompetra fahenina, sy ny nahatongavan’ny loza faharoa.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ARY ny anjely fahenina nitsoka, dia nahare feo avy tamin’ny tandroky ny alitara volamena eo anatrehan’Andriamanitra aho, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'nanao tamin’ny anjely fahenina, izay nanana ny trompetra, hoe: Vahao ny anjely efatra izay mifatotra any Eofrata, ony lehibe. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia novahana ny anjely efatra izay voaomana ho amin’ny ora sy ny andro sy ny volana ary ny taona mba hahafaty ny ampahatelon’ny olona.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny isan’ny miaramila an-tsoavaly dia roa alinalina; nahare ny isany aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary toy izao no nahitako ny soavaly teo amin’ny fahitana sy izay nitaingina azy: manam-piarovan-tratra tahaka ny afo sy ny hyakinta ary ny solifara izy; ary ny lohan’ny soavaly dia tahaka ny lohan’ny liona; ary misy afo sy setroka ary solifara mivoaka avy amin’ny vavany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ireo loza telo loha ireo, dia ny afo sy ny setroka ary ny solifara izay nivoaka avy tamin’ny vavany, no nahafaty ny am-pahatelon’ny olona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa ny herin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahefana.
      marker-yv: yv-n
    - type: text
      text: ' ny soavaly dia eo amin’ny vavany sy ny rambony; fa ny rambony dia tahaka ny menarana sady manan-doha, ka ireny no eutiny mampahory.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nanokatra ny lavaka tsy hita noanoa izy, dia nisy setroka niakatra avy tamin’ny lavaka, tahaka ny setroka avy amin’ny lafaoro lehibe, ary tonga maizina ny masoandro sy ny habahabaka noho ny setroka avy tao amin’ny lavaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nefa ny olona sisa, izay tsy matin’ireo loza ireo, dia tsy nibebaka hiala tamin’ny asan’ny tànany, mba tsy hivavaka amin’ny demonia sy ny sampy volamena sy volafotsy sy varahina sy vato ary hazo, izay tsy mahajery, na mahare, na afa-mamindra; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary tsy nibebaka tamin’ny namonoany olona izy, na tamin’ny nanaovany ody ratsy, na tamin’ny fijangajangany, na tamin’ny halatra nataony koa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nisy valala nivoaka avy tamin’ny setroka nankamin’ny tany; ary nomena hery
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahefana.
      marker-yv: yv-n
    - type: text
      text: ' ireny, tahaka ny herin’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahefana.
      marker-yv: yv-n
    - type: text
      text: ' ny maingoka amin’ny tany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nilazana izy mba tsy hanimba ny ahitra amin’ny tany, na ny zava-maitso, na ny hazo akory aza, fa ny olona izay tsy manana ny tombo-kasen’Andriamanitra eo amin’ny handriny ihany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nefa tsy navela hahafaty azy izy, fa ny hampanaintaina azy dimy volana; ary ny fampanaintainany dia tahaka ny fampanaintainan’ny maingoka, raha mamely olona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary amin’izany andro izany dia hitady fahafatesana ny olona, fa tsy hahita; ary haniry ho faty izy, fa mandositra azy ny fahafatesana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny endriky ny valala dia tahaka ny soavaly voaomana ho enti-miady; ary tamin’ny lohany nisy satroboninahitra toy ny volamena, ary ny tavany tahaka ny tavan’olona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nanam-bolo tahaka ny volom-behivavy izy, ary ny nifiny tahaka ny an’ny liona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nanam-piarovan-tratra tahaka ny fiarovan-tratra vy izy; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy entin’ny soavaly betsaka miriotra ho amin’ny ady. '
