document_id: EZK.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny handringanana ny Isiraely.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Indro ny andro, indro mby akaiky iny!
  - type: text
    content: Miseho ny anjaranao.
  - type: text
    content: Mamony ny tsorakazo,
  - type: text
    content: Manorobona ny avonavona!
  '11':
  - type: text
    content: Ny fanaovana an-keriny dia mitsangana ho tsora-kazo hamelezana ny faharatsiana;
  - type: text
    content: Tsy hisy sisa intsony aminy, na ny hamaroany, na ny hareny,
  - type: note
    content: 'Na: ny hamaroany mitabataba sy mireondreona.'
  - type: text
    content: Na ny zava-mendrika eo aminy.
  '12':
  - type: text
    content: Mby akaiky ny fotoana, antomotra ny andro;
  - type: text
    content: Aoka tsy hifaly ny mpividy,
  - type: text
    content: Ary aoka halahelo ny mpivarotra;
  - type: text
    content: Fa iharan’ny fahatezerana mirehitra ny hamaroany rehetra.
  '13':
  - type: text
    content: Fa ny mpivarotra tsy hifodian’izay efa lafony.
  - type: text
    content: Na dia mbola isan’ny velona aza izy;
  - type: text
    content: Fa ny fahitana ny amin’ny hanjo ny hamaroany dia tsy hitsoaka,
  - type: text
    content: Ary tsy hisy hampahery ny ainy amin’ny helony.
  '14':
  - type: text
    content: Efa nitsoka ny trompetra izy ka nahavonona ny zavatra rehetra,
  - type: text
    content: Nefa tsy misy mankany amin’ny ady,
  - type: text
    content: Satria iharan’ny fahatezerako mirehitra ny hamaroany rehetra.
  '15':
  - type: text
    content: Ny sabatra no eny ivelany,
  - type: text
    content: Ary ny areti-mandringana sy ny mosary kosa no ao anatiny;
  - type: text
    content: Izay any an-tsaha dia ho fatin-tsabatra,
  - type: text
    content: Ary izay any an-tanàna kosa dia ho levon’ny mosary sy ny areti-mandringana.
  '16':
  - type: text
    content: Ary na dia misy afa-mandositra aza,
  - type: text
    content: 'Dia ho eny an-tendrombohitra izy ka ho toy ny voromailala an-dohasaha:'
  - type: text
    content: Izy rehetra dia samy hitoloko avokoa noho ny helony.
  '17':
  - type: text
    content: Hiraviravy ny tànana rehetra,
  - type: text
    content: Ary ho rano ny lohalika rehetra;
  '18':
  - type: text
    content: Hisikina lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' koa izy,'
  - type: text
    content: Ka hanafotra azy ny horohoro,
  - type: text
    content: Dia ho menatra ny tava rehetra,
  - type: text
    content: Ary hibory ny lohan’izay rehetra.
  '19':
  - type: text
    content: Ny volafotsiny dia hariany eny an-dàlambe,
  - type: text
    content: Ary ny volamenany hataony ho maharikoriko–
  - type: text
    content: Ny volafotsiny sy ny volamenany tsy hahavonjy azy amin’ny andro fahatezeran’i Jehovah,
  - type: text
    content: Tsy hahavoky ny fanahiny na hahafeno ny kibony izany–
  - type: text
    content: Fa tonga fahatafintohinana mahameloka azy.
  '2':
  - type: text
    content: 'Ary hianao, ry zanak’olona, dia izao no lazain’i Jehovah Tompo amin’ny tanin’ny Isiraely:'
  - type: text
    content: Injao ny farany!
  - type: text
    content: Eny, mby akaiky ny farany ho amin’ny vazan-tany efatra.
  '20':
  - type: text
    content: Fa ny firàvany tsara tarehy
  - type: text
    content: Dia nataony ho rehareha
  - type: note
    content: 'Na: Fa nataony firavaka tsara tarehy ho entiny mirehareha ireny.'
  - type: text
    content: Sady nentiny nanao ireo sary fahavetavetany, dia ireo zava-dratsiny,
  - type: text
    content: Koa izany no efa nanaovako ireny ho zava-maharikoriko azy.
  '21':
  - type: text
    content: Ary hatolotro ho babo eny an-tànan’ny hafa firenena izy,
  - type: text
    content: Eny, ho babo ho an’ny ratsy fanahy amin’ny tany,
  - type: text
    content: Ka holotoin’ireny izy.
  '22':
  - type: text
    content: Dia hiamboho azy koa Aho,
  - type: text
    content: Ka holotoiny ny rakitro;
  - type: text
    content: Fa hiditra ao aminy ny mpandroba ka handoto azy.
  '23':
  - type: text
    content: Manefe gadra,
  - type: text
    content: Fa efa feno fitsarana ny amin’ny fandatsahan-dra ny tany,
  - type: text
    content: Ary feno fampahoriana ny tanàna.
  '24':
  - type: text
    content: Ka dia hitondra izay jentilisa ratsy indrindra Aho,
  - type: text
    content: Ary ho lasan’ireny ny tranony;
  - type: text
    content: Dia hatsahatro ny avonavon’ny mahery,
  - type: text
    content: Ary holotoina ny fitoerany masina.
  '25':
  - type: text
    content: Ho avy ny fandringanana;
  - type: note
    content: 'Na: fampangovitana.'
  - type: text
    content: Ary hitady fiadanana izy, fa tsy hisy.
  '26':
  - type: text
    content: Mifanontona ny fandravana,
  - type: text
    content: Ary mifanindry ny filazan-doza;
  - type: text
    content: Dia manontany fahitana amin’ny mpaminany izy,
  - type: text
    content: Fa tsy misy lalàna intsony amin’ny mpisorona,
  - type: text
    content: Na fahendrena amin’ny anti-panahy.
  '27':
  - type: text
    content: Hitomany ny mpanjaka, eny, hitafy fahatalanjonana ny andriana,
  - type: text
    content: Ary hangovitra ny tànan’ny vahoaka;
  - type: text
    content: Araka ny alehany no hataoko aminy,
  - type: text
    content: Ary hotsaraiko araka ny fitsarana nataony izy,
  - type: text
    content: Ka dia ho fantany fa Izaho no Jehovah.
  '3':
  - type: text
    content: Ankehitriny dia mby akaikinao ny farany,
  - type: text
    content: Ary halefako aminao ny fahatezerako,
  - type: text
    content: Dia hotsaraiko araka ny alehanao hianao,
  - type: text
    content: Ka hatambesatro aminao ny fahavetavetanao rehetra.
  '4':
  - type: text
    content: Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho;
  - type: text
    content: Fa hatambesatro aminao ny làlanao,
  - type: text
    content: Ary ny fahavetavetanao dia ho eo aminao,
  - type: text
    content: Ka dia ho fantatrareo fa Izaho no Jehovah.
  '5':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Injao! avy ny loza, dia loza izay tsy misy toa azy!
  - type: note
    content: Heb. loza iray.
  '6':
  - type: text
    content: Injao ny farany! Eny, mby akaiky ny farany;
  - type: text
    content: Mifoha hamely anao iny, indro, efa mby akaiky iny.
  '7':
  - type: text
    content: Mby akaiky ny anjaranao, ry mponina amin’ny tany;
  - type: text
    content: Mby akaiky ny fotoana, efa antomotra ny andro,
  - type: text
    content: Dia akoran’ady, fa tsy fihobiana, eny an-tendrombohitra.
  '8':
  - type: text
    content: Ary vetivety foana dia hampidiniko aminao ny fahatezerako,
  - type: text
    content: Ary hotanterahiko aminao ny fahavinirako;
  - type: text
    content: Ka hotsaraiko araka ny alehanao hianao,
  - type: text
    content: Ary hatambesatro aminao ny fahavetavetanao.
  '9':
  - type: text
    content: Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho;
  - type: text
    content: Hatambesatro aminao ny làlanao,
  - type: text
    content: Ary ny fahavetavetanao dia ho eo aminao,
  - type: text
    content: Ka dia ho fantatrareo fa Izaho Jehovah no mamely.
