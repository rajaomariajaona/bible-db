document_id: EZK.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny handringanana ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hianao, ry zanak’olona, dia izao no lazain’i Jehovah Tompo amin’ny tanin’ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injao ny farany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mby akaiky ny farany ho amin’ny vazan-tany efatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ankehitriny dia mby akaikinao ny farany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary halefako aminao ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hotsaraiko araka ny alehanao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hatambesatro aminao ny fahavetavetanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hatambesatro aminao ny làlanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahavetavetanao dia ho eo aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrareo fa Izaho no Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Injao! avy ny loza, dia loza izay tsy misy toa azy!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: loza iray.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Injao ny farany! Eny, mby akaiky ny farany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifoha hamely anao iny, indro, efa mby akaiky iny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mby akaiky ny anjaranao, ry mponina amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mby akaiky ny fotoana, efa antomotra ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia akoran’ady, fa tsy fihobiana, eny an-tendrombohitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary vetivety foana dia hampidiniko aminao ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotanterahiko aminao ny fahavinirako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hotsaraiko araka ny alehanao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatambesatro aminao ny fahavetavetanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tsy hiantra anao ny masoko, sady tsy hamindra fo Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatambesatro aminao ny làlanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahavetavetanao dia ho eo aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrareo fa Izaho Jehovah no mamely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indro ny andro, indro mby akaiky iny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miseho ny anjaranao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamony ny tsorakazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manorobona ny avonavona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fanaovana an-keriny dia mitsangana ho tsora-kazo hamelezana ny faharatsiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy sisa intsony aminy, na ny hamaroany, na ny hareny,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny hamaroany mitabataba sy mireondreona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny zava-mendrika eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mby akaiky ny fotoana, antomotra ny andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hifaly ny mpividy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka halahelo ny mpivarotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa iharan’ny fahatezerana mirehitra ny hamaroany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ny mpivarotra tsy hifodian’izay efa lafony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia mbola isan’ny velona aza izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahitana ny amin’ny hanjo ny hamaroany dia tsy hitsoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy hampahery ny ainy amin’ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa nitsoka ny trompetra izy ka nahavonona ny zavatra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy misy mankany amin’ny ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria iharan’ny fahatezerako mirehitra ny hamaroany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny sabatra no eny ivelany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny areti-mandringana sy ny mosary kosa no ao anatiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay any an-tsaha dia ho fatin-tsabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay any an-tanàna kosa dia ho levon’ny mosary sy ny areti-mandringana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na dia misy afa-mandositra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia ho eny an-tendrombohitra izy ka ho toy ny voromailala an-dohasaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra dia samy hitoloko avokoa noho ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hiraviravy ny tànana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho rano ny lohalika rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hisikina lamba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' koa izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanafotra azy ny horohoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho menatra ny tava rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hibory ny lohan’izay rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny volafotsiny dia hariany eny an-dàlambe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volamenany hataony ho maharikoriko–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volafotsiny sy ny volamenany tsy hahavonjy azy amin’ny andro fahatezeran’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hahavoky ny fanahiny na hahafeno ny kibony izany–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tonga fahatafintohinana mahameloka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny firàvany tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nataony ho rehareha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa nataony firavaka tsara tarehy ho entiny mirehareha ireny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nentiny nanao ireo sary fahavetavetany, dia ireo zava-dratsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no efa nanaovako ireny ho zava-maharikoriko azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary hatolotro ho babo eny an-tànan’ny hafa firenena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho babo ho an’ny ratsy fanahy amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka holotoin’ireny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hiamboho azy koa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka holotoiny ny rakitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hiditra ao aminy ny mpandroba ka handoto azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manefe gadra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa feno fitsarana ny amin’ny fandatsahan-dra ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary feno fampahoriana ny tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ka dia hitondra izay jentilisa ratsy indrindra Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lasan’ireny ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hatsahatro ny avonavon’ny mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary holotoina ny fitoerany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho avy ny fandringanana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fampangovitana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitady fiadanana izy, fa tsy hisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mifanontona ny fandravana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifanindry ny filazan-doza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia manontany fahitana amin’ny mpaminany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy lalàna intsony amin’ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na fahendrena amin’ny anti-panahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hitomany ny mpanjaka, eny, hitafy fahatalanjonana ny andriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hangovitra ny tànan’ny vahoaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny alehany no hataoko aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotsaraiko araka ny fitsarana nataony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantany fa Izaho no Jehovah.
