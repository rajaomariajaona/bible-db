document_id: 2SA.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanirian’i Davida hanao tempoly sy ny toky nomen’Andriamanitra azy ny amin’ny haharetan’ny fanjakany, ary ny vavaka nataon’i Davida tamin’izany.
  - type: text
    content: 'ARY raha nipetraka tao an-tranony ny mpanjaka, ary efa nampiadanin’i Jehovah tamin’ny fahavalony rehetra manodidina azy izy, '
  '10':
  - type: text
    content: 'Ary hifidy tany ho an’ny Isiraely oloko Aho sady hamponina azy, ka dia handry fahizay amin’ny fonenany ary tsy hanana ahiahy intsony izy, ary ny zanaky ny faharatsiana tsy hampahory azy intsony tahaka ny taloha '
  '11':
  - type: text
    content: sy tahaka ny hatramin’ny nanendreko mpitsara ho mpifehy ny Isiraely oloko; ary hampiadana
  - type: note
    content: Heb. nampiadana.
  - type: text
    content: ' anao ho afaka amin’ny fahavalonao rehetra Aho.'
  - type: text
    content: Ary lazain’i Jehovah aminao koa fa hanome taranaka
  - type: note
    content: Heb. hanao trano.
  - type: text
    content: ' ho anao Izy. '
  '12':
  - type: text
    content: 'Ary rehefa tapitra ny andronao, ka hodi-mandry any amin’ny razanao hianao, dia hatsangako handimby anao ny zanakao izay haterakao, ary hampitoeriko ny fanjakany; '
  '13':
  - type: text
    content: 'dia io no hanao trano ho an’ny anarako, ary Izaho kosa hampitoetra ny seza fiandrianan’ny fanjakany ho mandrakizay. '
  '14':
  - type: text
    content: 'Izaho ho rainy, ary izy ho zanako. Raha manao izay meloka izy, dia hanariko amin’ny tsorakazon’ny olona sy ny kapoky ny zanak’olombelona; '
  '15':
  - type: text
    content: 'nefa ny famindrampoko tsy mba hiala aminy, tahaka ny nanesorako izany tamin’i Saoly, izay nesoriko teo alohanao. '
  '16':
  - type: text
    content: Ary ny taranakao sy ny fanjakanao hitoetra eo anatrehanao mandrakizay; ny seza fiandriananao hitoetra mandrakizay.
  '17':
  - type: text
    content: Araka izany teny rehetra izany sy araka izao fahitana rehetra izao no nolazain’i Natana tamin’i Davida.
  '18':
  - type: text
    content: 'Ary Davida mpanjaka niditra ka nipetraka teo anatrehan’i Jehovah ary nanao hoe: Zinona moa aho, Jehovah Tompo ô? Ary zinona ny mpianakaviko, no novimbininao ambaraka ankehitriny aho? '
  '19':
  - type: text
    content: 'Ary mbola ataonao ho zavatra kely ihany aza izany, Jehovah Tompo ô, fa, indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’ny mbola any aoriana lavitra aza. Ary izany dia fanaon’ny olona, Jehovah Tompo ô. '
  '2':
  - type: text
    content: 'dia hoy ny mpanjaka tamin’i Natana mpaminany: Akory izato izaho mitoetra amin’ny trano sedera, nefa ny fiaran’Andriamanitra kosa mitoetra ao anaty lay! '
  '20':
  - type: text
    content: 'Ka inona intsony no holazain’i Davida aminao? Fa Hianao, Jehovah Tompo ô, no mahalala ny mpanomponao. '
  '21':
  - type: text
    content: 'Noho ny teninao sy araka ny sitraponao no nanaovanao io zavatra lehibe rehetra io, hampahalalanao ny mpanomponao. '
  '22':
  - type: text
    content: 'Koa amin’izany dia lehibe Hianao, Jehovah Andriamanitra; fa tsy misy tahaka Anao, ka tsy misy Andriamanitra afa-tsy Hianao araka izay rehetra ren’ny sofinay. '
  '23':
  - type: text
    content: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Isiraely olonao, izay nalehan’Andriamanitra havotana ho olony, sy hanaovany anarana ho Azy, ary hanaovany zavatra lehibe ho anareo sy zava-mahatahotra ho an’ny taninao teo anatrehan’ny olonao, izay navotanao ho Anao avy tamin’ny firenen’i Egypta sy ny andriamaniny? '
  '24':
  - type: text
    content: 'Dia nampitoerinao ny Isiraely olonao ho olonao mandra-kizay: ary Hianao, Jehovah ô, no efa tonga Andriamaniny.'
  '25':
  - type: text
    content: 'Ary ankehitriny, Jehovah Andriamanitra ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay, ary ataovy araka izay nolazainao. '
  '26':
  - type: text
    content: 'Ary aoka hohalehibeazina mandrakizay ny anaranao ka hatao hoe: Jehovah, Tompon’ny maro, no Andriamanitry ny Isiraely; ka dia hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  '27':
  - type: text
    content: 'Fa Hianao, Jehovah Tompon’ny maro, Andriamanitry ny Isiraely, efa nilaza tamin’ny mpanomponao hoe: Izaho hanome taranaka anao;'
  - type: note
    content: Heb. hanao trano ho anao.
  - type: text
    content: ' koa izany no nampahasahy ny fon’ny mpanomponao hanao izao vavaka izao aminao. '
  '28':
  - type: text
    content: 'Ary noho izany, Jehovah Tompo ô, satria Hianao no Andriamanitra, ary marina ny teninao, ary Hianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  '29':
  - type: text
    content: dia aoka ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa Hianao, Jehovah Tompo ô, efa niteny izany; eny, aoka ny fitahianao no hitahianao ny taranaky ny mpanomponao mandrakizay.
  '3':
  - type: text
    content: 'Dia hoy Natana tamin’ny mpanjaka: Andeha, ataovy izay rehetra ao am-ponao; fa Jehovah no momba anao.'
  '4':
  - type: text
    content: 'Ary tamin’ny alin’iny ihany dia tonga tamin’i Natana ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: text
    content: 'Andeha, lazao amin’i Davida mpanompoko hoe: Izao no lazain’i Jehovah: Hianao va no hanao trano hitoerako? '
  '6':
  - type: text
    content: Fa tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Zanak’Isiraely niakatra avy tany Egypta ka mandraka andro-any, fa nifindrafindra toby
  - type: note
    content: Heb. lay.
  - type: text
    content: ' sy nifindrafindra toerana.'
  - type: note
    content: Heb. tabernakely.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Zanak’Isiraely, moa nisy nitenenako akory va ny firenen’Isiraely, izay notendreko ho mpiandry ny Isiraely oloko, ka nanaovako hoe: Nahoana no tsy manao trano sedera ho Ahy hianareo?'
  '8':
  - type: text
    content: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Izaho no naka anao avy tany an-tsaha, dia avy tamin’ny niandrasanao ondry, mba ho mpanapaka ny Isiraely oloko. '
  '9':
  - type: text
    content: 'Ary nomba anao tamin’izay nalehanao rehetra Aho, ka naringako tsy ho eo anoloanao ny fahavalonao rehetra, ary homeko anarana malaza tahaka ny anaran’izay lehibe ambonin’ny tany hianao. '
