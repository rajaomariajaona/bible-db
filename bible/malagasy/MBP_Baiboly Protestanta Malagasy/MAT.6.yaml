document_id: MAT.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tandremo mba tsy hanao ny asan’ny fahamarinanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fiantranareo.
      marker-yv: yv-n
    - type: text
      text: ' eo imason’ny olona hahitany izany; fa raha tsy izany, dia tsy manana valim-pitia amin’ny Rainareo izay any an-danitra hianareo.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ho tonga anie ny fanjakanao. Hatao anie ny sitraponao etỳ an-tany tahaka ny any an-danitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Omeo anay anio izay hanina sahaza ho anay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary mamelà ny helokay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: trosa.
      marker-yv: yv-n
    - type: text
      text: ' tahaka ny namelanay izay meloka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nitrosa.
      marker-yv: yv-n
    - type: text
      text: ' taminay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary aza mitondra anay ho amin’ny fakam-panahy, fa manafaha anay amin’ny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ilay.
      marker-yv: yv-n
    - type: text
      text: ' ratsy.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena.]'
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa raha mamela ny fahadisoan’ny olona hianareo, dia mba hamela ny anareo kosa ny Rainareo Izay any an-danitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa raha tsy mamela ny fahadisoan’ny olona hianareo, dia tsy hamela ny fahadisoanareo ny Rainareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raha mifady hanina hianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay malahelo tarehy; fa mampisotisoty ny tavany izy mba ho hitan’ny olona fa mifady. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa hianao kosa, raha mifady hanina, dia hosory ny lohanao, ary sasao ny tavanao, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'mba tsy ho hitan’ny olona fa mifady, fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ho hitan’
    - type: text
      text: ' ny Rainao, Izay ao amin’ny mangingina; ary ny Rainao, Izay mahita ao amin’ny mangingina, no hamaly anao.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Aza mihary harena ho anareo etỳ an-tany, izay misy kalalao sy harafesina manimba, sady misy mpangalatra manamitrano sy mangalatra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa amin’izany, raha manao fiantrana hianao, aza mba mitsoka trompetra eo alohanao tahaka ny fanaon’ny mpihatsaravelatsihy eo amin’ny synagoga sy eny an-dàlambe mba hankalazan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra manamitrano na mangalatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa izay itoeran’ny harenao, dia ho any koa ny fonao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny maso no jiron’ny tena; koa amin’izany, raha tsara ny masonao, dia hazava avokoa ny tenanao rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa raha ratsy ny masonao, dia ho maizina avokoa ny tenanao rehetra; koa raha maizina ny fahazavana ao anatinao, manao ahoana ny halehiben’izany fahamaizinana izany!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsy misy olona mahay manompo tompo roa; fa ny anankiray ho halany, ary ny anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an’Andriamanitra sy Mamôna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mamôna = Harena.
      marker-yv: yv-n
    - type: text
      text: ' hianareo.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary noho izany dia lazaiko aminareo hoe: Aza manahy ny amin’ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin’ny tenanareo, dia izay hotafinareo. Moa ny aina tsy mihoatra noho ny hanina va, ary ny tena noho ny fitafiana? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tsinjovy ny voro-manidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; ary ny Rainareo Izay any an-danitra mamelona azy. Moa tsy mihoatra lavitra noho ireny va hianareo? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary iza ao aminareo, na dia manahy aza, no mahay manampy ny andro hiainany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny halavan’ny tenany.
      marker-yv: yv-n
    - type: text
      text: ' na dia kely monja'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hakiho iray.
      marker-yv: yv-n
    - type: text
      text: ' aza?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary nahoana no manahy ny amin’ny fitafiana hianareo? Diniho tsara ny fanirin’ny vonin-kazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Karazan’ny lilia.
      marker-yv: yv-n
    - type: text
      text: ' any an-tsaha; tsy mba miasa na mamoly ireny; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'nefa lazaiko aminareo fa na dia Solomona tao amin’ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin’ireny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tànanao ankavia izay ataon’ny tànanao ankavanana, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary raha ny ahitra any an-tsaha, izay any ihany anio ka hatsipy ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va hianareo, ry kely finoana?
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dia aza manahy hianareo ka manao hoe: Inona no hohaninay? na: Inona no hosotroinay? na: Inona no hotafinay? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa izany rehetra izany dia katsahin’ny jentilisa fatratra; fa fantatry ny Rainareo Izay any an-danitra fa tokony ho anareo izany rehetra izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary amin’izany dia aza manahy ny amin’ny ampitso hianareo; fa ny ampitso hanahy ny azy. Ampy ho an’ny andro ny ratsy miseho ao aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: mba hatao ao amin’ny mangingina ny fiantranao; ary ny Rainao, Izay mahita ao amin’ny mangingina, no hamaly anao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha mivavaka hianareo, aza mba ho tahaka ny mpihatsaravelatsihy; fa izy tia ny mivavaka mitsangana eo amin’ny synagoga sy eo an-joron-dàlana hahitan’ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa hianao kosa, raha mivavaka, dia midira ao amin’ny efi-tranonao, ka rehefa voarindrinao ny varavaranao, dia mivavaha amin’ny Rainao, Izay ao amin’ny mangingina; ary ny Rainao, Izay mahita ao amin’ny mangingina, no hamaly anao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary raha mivavaka hianareo, dia aza mba manao teny maro foana tahaka ny jentilisa; fa ataony ho ny hamaroan’ny teniny no hihainoana azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa aza manahaka azy hianareo; fa fantatry ny Rainareo izay tokony ho anareo, raha tsy mbola mangataka aminy aza hianareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa amin’izany mivavaha toy izao hianareo: Rainay Izay any an-danitra, hohamasinina anie ny anaranao. '
