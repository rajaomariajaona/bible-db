document_id: JOS.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandidian’Andriamanitra an’i Josoa hizara ny tany, ary filazana ny anjara efa nomena ny firenena roa sy sasany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Josoa dia efa zoki-olona sady nandroso fahanterana, dia hoy Jehovah taminy: Efa zoki-olona hianao ka mandroso fahanterana, ary be dia be ny tany sisa tsy mbola azo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny tanàna rehetra izay an’i Sihona, mpanjakan’ny Amorita, izay nanjaka tany Hesbona, hatramin’ny fari-tanin’ny taranak’i Amona, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Gileada sy ny tanin’ny Gesorita sy ny Makatita sy ny tendrombohitra Hermona rehetra ary Basana rehetra hatrany Saleka, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny fanjakana rehetra an’i Oga tany Basana, izay nanjaka tany Astarta sy Edrehy (izy ihany no sisa tamin’ny Refaïta); fa resin’i Mosesy ireny ka noroahiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy mba noroahin’ny Zanak’Isiraely ny Gesorita sy ny Makatita; fa mitoetra eo amin’ny Zanak’Isiraely mandraka andro-any ny Gesorita sy ny Makatita.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny firenen’i Levy ihany no tsy nomeny lova; ny fanatitra atao amin’ny afo ho an’i Jehovah, Andriamanitry ny Isiraely, no lovany araka izay nolazainy taminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomen’i Mosesy lova ny firenena taranak’i Robena araka ny fokony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny dia hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, ary ny tanàna izay eo afovoan’ny lohasaha sy ny tany lemaka rehetra any Medeba '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Hesbona sy ny tanànany rehetra, izay eo amin’ny tany lemaka, sy Dibona sy Bamota-bala sy Bety-bala-meona '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Jahaza sy Kedemota sy Mefata '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Kiria-taima sy Sibma sy Zareta-sahara amin’ny tendrombohitra ao an-dohasaha, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no tany sisa tsy mbola azo: Ny tany rehetra an’ny Filistina sy ny Gesorita rehetra, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Bety-peora sy ny ao am-bodin’i Pisga ary Bety-jesimota '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny tanàna rehetra any amin’ny tany lemaka sy ny fanjakana rehetra an’i Sihona, mpanjakan’ny Amorita, izay nanjaka tany Hesbona, fa resin’i Mosesy izy sy ireo andrianan’ny Midianita, dia Evy sy Rekema sy Zora sy Hora ary Reba, andriana izay nanoa an’i Sihona ka nitoetra teo amin’ny tany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Balama, mpanao fankatovana, zanak’i Beora, dia novonoin’ny Zanak’Isiraely tamin’ny sabatra niaraka tamin’izay novonoiny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fari-tanin’ny taranak’i Robena dia ny amoron’i Jordana. Izay no lovan’ny taranak’i Robena araka ny fokony, dia ny tanàna sy ny zana-bohiny.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomen’i Mosesy koa ny firenen’i Gada, dia ny taranak’i Gada araka ny fokony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny faritaniny dia Jazera sy ny tanàna rehetra any Gileada ary ny antsasaky ny tanin’ny taranak’i Amona, hatrany Aroera, izay tandrifin’i Raba, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hatrany Hesbona ka hatrany Ramatamizpa sy Betonima ary hatrany Mahanaima ka hatramin’ny fari-tanin’i Debira; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary teo amin’ny lohasaha Bety-harama sy Bety-nimra sy Sokota sy Zafona ary ny sisa tamin’ny fanjakan’i Sihona, mpanjakan’i Hesbona, sy ny amoron’i Jordana hatramin’ny amoron’ny Ranomasina Kinereta an-dafy atsinanan’i Jordana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no lovan’ny taranak’i Gada araka ny fokony, dia ny tanàna sy ny zana-bohiny.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomen’i Mosesy koa ny antsasaky ny firenen’i Manase; ary izao no an’ny antsasaky ny firenena taranak’i Manase araka ny fokony: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hatrany Sihora, izay atsinanan’i Egypta, ka hatramin’ny fari-tanin’i Ekrona eo avaratra, izay atao ho an’ny Kananita, ireo andriana dimy amin’ny Filistina–dia ny Gazita sy ny Asdodita sy ny Askelonita sy ny Gatita sy ny Ekronita ary ny Avita '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fari-taniny hatrany Mahanaima, dia Basana rehetra, izay fanjakana rehetra an’i Oga, mpanjakan’i Basana, ary ny tanàna madinika rehetra an’i Jaïra, izay any Basana, dia tanàna enim-polo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny antsasak’i Gileada sy Astarta ary Edrehy, tanàna amin’ny fanjakan’i Oga any Basana, dia an’ny taranak’i Makira, zanak’i Manase, dia ho an’ny antsasaky ny taranak’i Makira araka ny fokony.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no voazaran’i Mosesy ho lova tany Arbota-moaba an-dafy atsinanan’i Jordana tandrifin’i Jeriko.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny firenen’i Levy tsy mba nomen’i Mosesy lova; fa Jehovah, Andriamanitry ny Isiraely, no lovany, araka izay efa nolazainy taminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'any atsimo, dia ny tanin’ny Kananita rehetra sy Meara, izay an’ny Sidoniana, hatrany Afeka ka hatramin’ny fari-tanin’ny Amorita, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny tanin’ny Gebalita sy Libanona rehetra any atsinanana, hatrany Bala-gada eo am-bodin’ny tendrombohitra Hermona ka hatrany akaikin’i Hamata, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mponina rehetra any amin’ny tany havoana hatrany Libanona ka hatrany Misrefota-maima, dia ny Sidoniana rehetra,–Izaho no handroaka ireny hiala eo anoloan’ny Zanak’Isiraely; kanefa zarao amin’ny filokana ho lovan’ny Zanak’Isiraely izy araka izay efa nandidiako anao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny zarao izao tany izao ho lovan’ny firenena sivy sy ny antsasaky ny firenen’i Manase.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka tamin’ireo koa no nahazoan’ny Robenita sy ny Gadita ny lovany, dia ilay nomen’i Mosesy azy any an-dafy atsinanan’i Jordana, araka izay nomen’i Mosesy, mpanompon’i Jehovah, azy, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hatrany Aroera, izay eo amoron’ny lohasahandriaka Arnona, ary ny tanàna izay eo afovoan’ny lohasaha sy ny tany lemaka rehetra any Medeba ka hatrany Dibona, '
