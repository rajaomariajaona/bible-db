document_id: PSA.150,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia farany.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà an’Andriamanitra eo amin’ny fitoerany masina.
  - type: text
    content: Miderà Azy eo amin’ny habakabaky ny heriny.
  '2':
  - type: text
    content: Miderà Azy noho ny asany lehibe;
  - type: text
    content: Miderà Azy araka ny haben’ny voninahiny.
  '3':
  - type: text
    content: Miderà Azy amin’ny fitsofana ny anjomara;
  - type: text
    content: Miderà Azy amin’ny valiha sy ny lokanga.
  '4':
  - type: text
    content: Miderà Azy amin’ny ampongatapaka sy ny dihy;
  - type: text
    content: Miderà Azy amin’ny zava-maneno tendrena sy ny sodina.
  '5':
  - type: text
    content: Miderà Azy amin’ny kipantsona maneno;
  - type: text
    content: Miderà Azy amin’ny kipantsona tsara feo.
  '6':
  - type: text
    content: Aoka izay rehetra manam-pofonaina samy hidera an’i Jehovah.
  - type: text
    content: Haleloia.
