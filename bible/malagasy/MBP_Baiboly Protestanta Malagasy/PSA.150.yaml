    - type: text
      text: Haleloia farany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: HALELOIA.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’Andriamanitra eo amin’ny fitoerany masina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy eo amin’ny habakabaky ny heriny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miderà Azy noho ny asany lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy araka ny haben’ny voninahiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Miderà Azy amin’ny fitsofana ny anjomara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy amin’ny valiha sy ny lokanga.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miderà Azy amin’ny ampongatapaka sy ny dihy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy amin’ny zava-maneno tendrena sy ny sodina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Miderà Azy amin’ny kipantsona maneno;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà Azy amin’ny kipantsona tsara feo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka izay rehetra manam-pofonaina samy hidera an’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
