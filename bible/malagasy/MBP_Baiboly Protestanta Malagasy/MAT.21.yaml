document_id: MAT.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema.
  - type: heading
    content: Mar. 11.1-11; Lio. 19.29-44; Jao. 12.12-19.
  - type: text
    content: 'ARY raha nanakaiky an’i Jerosalema izy ka tonga tao Betifaga any an-tendrombohitra Oliva, dia naniraka mpianatra roa lahy Jesosy ka nanao taminy hoe: '
  '10':
  - type: text
    content: 'Ary nony efa tafiditra tany Jerosalema Izy, dia nihorakoraka ny tanàna rehetra ka nanao hoe: Iza moa izao? '
  '11':
  - type: text
    content: 'Ary ny vahoaka nilaza hoe: Izao no Jesosy mpaminany, Izay avy any Nazareta any Galilia.'
  - type: heading
    content: Ny nandroahan’i Jesosy ny mpivarotra sy ny nanesorany ny varony hiala teo an-kianjan’ny tempoly.
  - type: heading
    content: Mar. 11.15-19; Lio. 19.45-48.
  '12':
  - type: text
    content: 'ARY Jesosy niditra teo an-kianjan’ny tempolin’Andriamanitra, dia nandroaka izay rehetra nivarotra sy nividy teo an-kianjan’ny tempoly ka nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan’ny mpivarotra ny voromailala; '
  '13':
  - type: text
    content: 'dia hoy Izy taminy: Efa voasoratra hoe: ,,Ny tranoko hatao hoe trano fivavahana’’ (Isa. 56.7); fa hianareo kosa manao azy ho ,,zohy fieren’ny jiolahy’’ (Jer. 7.11).'
  '14':
  - type: text
    content: Ary nisy jamba sy mandringa nanatona Azy teo an-kianjan’ny tempoly, dia nahasitrana azy Izy.
  '15':
  - type: text
    content: 'Fa nony hitan’ny lohan’ny mpisorona sy ny mpanora-dàlana ny zavatra mahagaga izay nataony sy ny ankizy madinika miantso eo an-kianjan’ny tempoly ka manao hoe: Hosana ho an’ny Zanak’i Davida!–dia tezitra izy '
  '16':
  - type: text
    content: 'ka nanao taminy hoe: Renao va izay lazain’ireo? Dia hoy Jesosy taminy: Eny; tsy mbola novakinareo va ny teny manao hoe: ,,Avy amin’ny vavan’ny ankizy madinika sy ny zaza minono no nanamboaranao fiderana’’ (Sal. 8.2)?'
  '17':
  - type: text
    content: Dia nandao azy Izy ka niala tao an-tanàna hankany Betania; ary dia nitoetra tao mandritra ny alina Izy.
  - type: heading
    content: Ny nanozonan’i Jesosy ny aviavy izay tsy namoa.
  - type: heading
    content: Mar. 11.12-14,20-25.
  '18':
  - type: text
    content: 'ARY nony niverina maraina hankany an-tanàna Izy, dia noana. '
  '19':
  - type: text
    content: Ary nahita hazo aviavy
  - type: note
    content: aviavimbazaha.
  - type: text
    content: 'anankiray teo amoron-dàlana Izy, dia nankeo aminy, kanjo tsy nahita na inona na inona teo aminy, afa-tsy ravina ihany; dia hoy Izy taminy: Aza misy voa avy aminao intsony mandrakizay. Dia maina vetivety foana ilay hazo aviavy. '
  '2':
  - type: text
    content: 'Mankanesa amin’iroa vohitra tandrifinareo iroa, ary miaraka amin’izay dia hahita boriky mifatotra sy ny zanany eo aminy hianareo; vahao izy, dia ento etỳ amiko. '
  '20':
  - type: text
    content: 'Ary nony hitan’ny mpianatra izany, dia gaga izy ka nanao hoe: Nanao ahoana re no dia nahamaina vetivety io aviavy io?'
  '21':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Lazaiko aminareo marina tokoa: Raha manam-pinoana hianareo ka tsy miahanahana, dia tsy izao natao tamin’ny aviavy izao ihany no ho vitanareo, fa raha hiteny amin’ity tendrombihitra ity aza hianareo ka hanao hoe: Mifindrà hianao, ka mianjerà any an-dranomasina, dia ho tonga izany. '
  '22':
  - type: text
    content: Ary na inona na inona no angatahinareo amin’ny fivavahana atao amin’ny finoana dia ho azonareo.
  - type: heading
    content: Ny nanontanian’ny lohan’ny mpisorona sy ny loholona an’i Jesosy ny amin’ny fahefany, ary ny fanoharana navalin’i Jesosy azy.
  - type: heading
    content: Mar. 11.27–12.12; Lio. 20.1-19.
  '23':
  - type: text
    content: 'ARY rehefa tafiditra teo an-kianjan’ny tempoly Jesosy ka nampianatra, dia nanatona Azy ny lohan’ny mpisorona sy ny loholona ka nanao hoe: Fahefana manao ahoana no anaovanao izao? Ary iza no nanome Anao izao fahefana izao?'
  '24':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Izaho kosa hanontany anareo zavatra iray loha, ary raha hovalianareo izany, Izaho kosa dia hilaza aminareo izay fahefana anaovako izany: '
  '25':
  - type: text
    content: Ny batisan’i Jaona, avy taiza moa izany? Avy tany an-danitra va, sa avy tamin’ny olona?
  - type: text
    content: Ary izy ireo niara-nisaina
  - type: note
    content: 'Na: nieritreritra.'
  - type: text
    content: ' ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hovaliany hoe isika: Ka nahoana no tsy nino azy hianareo? '
  '26':
  - type: text
    content: 'Ary raha holazaintsika hoe kosa: Avy tamin’ny olona, dia matahotra ny vahoaka isika, satria ataon’izy rehetra ho mpaminany Jaona. '
  '27':
  - type: text
    content: 'Dia namaly an’i Jesosy izy ka nanao hoe: Tsy fantatray.'
  - type: text
    content: 'Dia hoy Jesosy taminy: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izany. '
  '28':
  - type: text
    content: 'Fa ahoana kosa no hevitrareo? Nisy lehilahy nanana zanaka roa lahy; dia nankeo amin’ny lahimatoa izy ka nanao hoe: Anaka, andeha miasa any amin’ny tanimboaloboko anio. '
  '29':
  - type: text
    content: 'Fa namaly izy ka nanao hoe: Tsy handeha aho; nefa nony afaka izany, dia nanenina izy ka nandeha ihany. '
  '3':
  - type: text
    content: 'Ary raha misy miteny anareo, dia lazao hoe: Misy raharaha analan’ny Tompo azy; ary dia havelany ho entina miaraka amin’izay izy.'
  '30':
  - type: text
    content: 'Dia nankeo amin’ny faralahy izy ka niteny toy izany koa. Ary izy namaly ka nanao hoe: Handeha aho, tompoko; kanjo tsy nandeha izy. '
  '31':
  - type: text
    content: 'Ka iza moa amin’izy mirahalahy no nanao ny sitrapon’ny rainy? Hoy izy: Ny lahimatoa.'
  - type: text
    content: 'Dia hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa ny mpamory hetra sy ny vehivavy janga efa mialoha anareo ho amin’ny fanjakan’Andriamanitra. '
  '32':
  - type: text
    content: Fa Jaona nankany aminareo tamin’ny làlan’ny fahamarinana, nefa tsy nino azy hianareo; fa ny mpamory hetra sy ny vehivavy janga no nino azy; fa hianareo kosa, na dia efa nahita izany aza, dia mbola tsy nanenina mba hinoanareo azy.
  '33':
  - type: text
    content: 'Mihainoa fanoharana hafa koa: Nisy lehilahy tompon-trano nanao tanimboaloboka, dia namefy azy manodidina, dia nihady famiazana teo anatiny, dia nanao tilikambo, ary dia nahofany tamin’olona mpiasa tany izany, ka nandeha ho any amin’ny tany hafa izy. '
  '34':
  - type: text
    content: 'Ary rehefa mby akaiky ny taom-pahavokarana, dia naniraka ny mpanompony izy hankany amin’ny mpiasa tany handray ny vokatra. '
  '35':
  - type: text
    content: 'Fa ny mpiasa tany nisambotra ny mpanompony, ka ny anankiray nokapohiny, ary ny anankiray novonoiny, ary ny anankiray notorahany vato. '
  '36':
  - type: text
    content: 'Dia naniraka mpanompo hafa koa indray izy, maro noho ny teo; fa nataony toy izany koa ireny. '
  '37':
  - type: text
    content: 'Ary nony farany dia naniraka ny zanany hankany aminy izy ka nanao hoe: Hanaja ny zanako izy. '
  '38':
  - type: text
    content: 'Kanjo ny mpiasa tany, nony nahita ny zanaka, dia niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho lasantsika ny lovany. '
  '39':
  - type: text
    content: 'Ary nisambotra azy izy ka namoaka azy teo ivelan’ny tanimboaloboka, dia namono azy. '
  '4':
  - type: text
    content: 'Izany dia tonga mba hahatanteraka izay nampilazaina ny mpaminany hoe:'
  '40':
  - type: text
    content: Koa raha tonga ny tompon’ny tanimboaloboka, hataony ahoana moa izany mpiasa tany izany?
  '41':
  - type: text
    content: 'Hoy izy taminy: Hataony loza tokoa ny handringanany izany olon-doza izany, ary ny tanimboaloboka dia hahofany amin’ny mpiasa tany sasany izay hanome azy ny vokatra amin’izay fotoany avy.'
  '42':
  - type: text
    content: 'Hoy Jesosy taminy: Tsy mbola novakinareo va ny teny ao amin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' hoe:'
  - type: text
    content: ',,Ny vato izay nolavin’ny mpanao trano,'
  - type: text
    content: Dia izy no efa natao fehizoro;
  - type: text
    content: Avy tamin’i Jehovah izao
  - type: text
    content: Ka mahagaga eo imasontsika’’? (Sal. 118.22, 23).
  '43':
  - type: text
    content: 'Ary noho izany dia lazaiko aminareo hoe: Hesorina aminareo ny fanjakan’Andriamanitra ka homena izay firenena mahavokatra ny voany. '
  '44':
  - type: text
    content: Ary izay potraka amin’ity vato ity dia ho torotoro, fa na zovy na zovy no hianjerany, dia ho mongomongo.
  - type: note
    content: Gr. haely toy ny vovoka.
  '45':
  - type: text
    content: 'Ary rehefa ren’ny lohan’ny mpisorona sy ny Fariseo ny fanoharana nataon’i Jesosy, dia fantany fa ny tenany no nolazainy amin’izany. '
  '46':
  - type: text
    content: Dia nitady hisambotra Azy izy, saingy natahotra ny vahoaka, satria nataon’ny vahoaka ho mpaminany Jesosy.
  '5':
  - type: text
    content: ',,Lazao amin’i Ziona zanakavavy;'
  - type: text
    content: Indro, ny Mpanjakanao avy ho anao,
  - type: text
    content: Malemy fanahy sady mitaingina boriky,
  - type: text
    content: Dia zanaky ny boriky miasa’’
  - type: note
    content: Gr. mitondra zioga.
  - type: text
    content: ' (Zak. 9.9).'
  '6':
  - type: text
    content: 'Ary dia nandeha ny mpianatra ka nanao araka izay nandidian’i Jesosy azy, '
  '7':
  - type: text
    content: 'dia nentiny ny boriky sy ny zanany ary nataony teo amboniny ny lambany, ary Jesosy dia nitaingina azy. '
  '8':
  - type: text
    content: 'Ary ny ankabiazan’ny vahoaka dia namelatra ny lambany teny an-dàlana; ary ny sasany nanapaka rantsan-kazo, dia nahahany teny an-dàlana koa izany. '
  '9':
  - type: text
    content: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia niantso hoe:'
  - type: text
    content: Hosana
  - type: note
    content: Hosana = vonjeo re!
  - type: text
    content: ' ho an’ny Zanak’i Davida!'
  - type: text
    content: Isaorana anie Izay avy amin’ny anaran’i Jehovah!
  - type: text
    content: Hosana
  - type: note
    content: Hosana = vonjeo re!
  - type: text
    content: ' any amin’ny avo indrindra (Sal. 118.26).'
