document_id: ISA.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Egypta.
  - type: text
    content: 'FAMINANIANA ny amin’ny loza hanjo an’i Egypta:'
  - type: text
    content: Indro, Jehovah mitaingina rahona miriotra mafy ka mankany Egypta;
  - type: text
    content: Ary ny andriamani-tsi-izy any Egypta dia mangorohoro eo anatrehany,
  - type: note
    content: 'Na: mandositra azy.'
  - type: text
    content: Ary ny fon’i Egypta dia ketraka ao anatiny.
  '10':
  - type: text
    content: Ny andrin’
  - type: note
    content: 'Na: fanorenan’.'
  - type: text
    content: ' ny tany ho torotoro,'
  - type: text
    content: Ary ny mpikarama rehetra halahelo.
  '11':
  - type: text
    content: Efa adala mihitsy ny mpanapaka any Zoana;
  - type: text
    content: Hevi-poana no avoak’izay hendry indrindra amin’ny mpanolotsain’i Farao;
  - type: text
    content: 'Ahoana no ilazanareo amin’i Farao hoe:'
  - type: text
    content: Zanak’olon-kendry aho sady taranak’ireo mpanjaka fahagola?
  '12':
  - type: text
    content: Aiza ary ireo olon-kendrinao ireo?
  - type: text
    content: Aoka hanambara aminao izy,
  - type: text
    content: Ary aoka ho fantany izay nokasain’i Jehovah, Tompon’ny maro, hatao amin’i Egypta.
  '13':
  - type: text
    content: Efa adala ny mpanapaka any Zoana,
  - type: text
    content: Efa voafitaka ny mpanapaka any Memfisa;
  - type: note
    content: Heb. Nofa.
  - type: text
    content: Ary efa nampivembena an’i Egypta ireo fehizoron’ny fireneny.
  '14':
  - type: text
    content: Jehovah efa nampidina
  - type: note
    content: Heb. nangaroharo.
  - type: text
    content: ' fanahy mampandraingiraingy teo Egypta;'
  - type: text
    content: Ka efa nampivembena azy tamin’ny asany rehetra ireo,
  - type: text
    content: Dia tahaka ny olona mamo miraingiraingy sady mandoa.
  '15':
  - type: text
    content: Samy tsy hahatontosa ny asany ny Egyptiana,
  - type: text
    content: Na ny loha na ny rambo, na ny sampan-drofia
  - type: note
    content: palma.
  - type: text
    content: ' na ny zozoro.'
  '16':
  - type: text
    content: Amin’izany andro izany dia ho tahaka ny vehivavy Egypta
  - type: text
    content: Ka ho toran-kovitra sy ho raiki-tahotra
  - type: text
    content: Noho ny faninjitr’i Jehovah, Tompon’ny maro, ny tànany,
  - type: text
    content: Izay ahinjiny hamelezany azy.
  '17':
  - type: text
    content: Ary ny tanin’ny Joda dia ho fahatahoran’i Egypta,
  - type: text
    content: Ka na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy
  - type: text
    content: Noho ny fikasan’i Jehovah, Tompon’ny maro,
  - type: text
    content: Izay kasainy ny amin’ny hamelezana azy.
  '18':
  - type: text
    content: Amin’izany andro izany dia hisy tanàna dimy amin’ny tany Egypta
  - type: text
    content: Samy hiteny ny fitenin’i Kanana
  - type: text
    content: Sy hianiana ho an’i Jehovah, Tompon’ny maro;
  - type: text
    content: Ny anankiray hatao hoe Ira-haresa.
  - type: note
    content: Ira-haresa = Tanàna haringana, na Tanànan’ny masoandro.
  '19':
  - type: text
    content: Amin’izany andro izany dia hisy alitara ho an’i Jehovah eo amin’ny tany Egypta
  - type: text
    content: Sy tsangam-bato eo an-tsisiny ho an’i Jehovah.
  '2':
  - type: text
    content: Ary hamporisihiko hiady izy samy Egyptiana,
  - type: text
    content: Ka samy hiady amin’ny rahalahiny avy sy amin’ny namany avy izy;
  - type: text
    content: Ny tanàna hiady amin’ny tanàna, ary ny fanjakana amin’ny fanjakana.
  '20':
  - type: text
    content: Ary ho famantarana sy vavolombelona ho an’i Jehovah, Tompon’ny maro,
  - type: text
    content: Ao amin’ny tany Egypta izany;
  - type: text
    content: Fa hitaraina
  - type: note
    content: 'Na: Ary izao no ho famantarana sy vavolombelona, etc.: Raha mitaraina.'
  - type: text
    content: ' amin’i Jehovah noho ny mpampahory izy,'
  - type: text
    content: Ary haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy.
  '21':
  - type: text
    content: Ary Jehovah hanao izay hahafantaran’ny Egyptiana Azy,
  - type: text
    content: Ary ny Egyptiana kosa hahalala an’i Jehovah amin’izany andro izany;
  - type: text
    content: Dia hanompo Azy amin’ny fanatitra alatsa-dra sy amin’ny fanatitra hohanina izy
  - type: text
    content: Ka hivoady amin’i Jehovah sady hanefa ny voadiny.
  '22':
  - type: text
    content: Ary Jehovah hamely ny Egyptiana,
  - type: text
    content: Eny, fa sady hamely Izy no hanasitrana;
  - type: text
    content: Dia hiverina ho any amin’i Jehovah ireo,
  - type: text
    content: Ka hekeny ny fangatahany, ary hositraniny izy.
  '23':
  - type: text
    content: Amin’izany andro izany dia hisy làlambe avy any Egypta mankany Asyria,
  - type: text
    content: Koa ny Asyriana dia hankany Egypta, ary ny Egyptiana kosa hankany Asyria,
  - type: text
    content: Ary ny Egyptiana sy ny Asyriana hiara-mivavaka.
  - type: note
    content: Heb. hiara-manompo.
  '24':
  - type: text
    content: Amin’izany andro izany ny Isiraely no ho fahatelony amin’i Egypta sy Asyria
  - type: text
    content: Ho fitahiana eo amin’ny tany;
  '25':
  - type: text
    content: 'Fa hotahin’i Jehovah, Tompon’ny maro, ireo ka hataony hoe:'
  - type: text
    content: Hotahina anie Egypta oloko,
  - type: text
    content: Sy Asyria, asan’ny tànako,
  - type: text
    content: Ary Isiraely lovako.
  '3':
  - type: text
    content: Ary ho very hevitra ny Egyptiana;
  - type: text
    content: Eny, hofoanako ny saina ataony;
  - type: text
    content: Ary hila saina amin’ny andriamani-tsi-izy sy amin’ny mpibitsibitsika amin’ny odiny izy
  - type: text
    content: Sy amin’ny manao azy ho tsindrian-javatra ary amin’ny mpanao sikidy.
  '4':
  - type: text
    content: Ary Egypta dia hatolotro hogiazana amin’izay fitondrana mafy,
  - type: text
    content: Ary mpanjaka masiaka no hanjaka aminy,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '5':
  - type: text
    content: Ny rano amin’ny ranomasina ho tankina,
  - type: text
    content: Ary ny ony ho ritra ka ho maina;
  '6':
  - type: text
    content: Ho maimbo ny sampantsampan’ny ony;
  - type: text
    content: Ary ny lahindranon’i Egypta
  - type: note
    content: Heb. Mazora.
  - type: text
    content: ' hihena ka ho maina;'
  - type: text
    content: Ny volotara sy ny zozoro halazo;
  '7':
  - type: text
    content: Ny tany eny amoron’i Neily
  - type: text
    content: Sy ny tanimbary rehetra eny amoron’i Neily
  - type: text
    content: Samy ho maina sy hanjary vovoka ka tsy ho eo intsony.
  '8':
  - type: text
    content: Dia hitomany ny mpaka hazandrano,
  - type: text
    content: Ary hisaona ny mpamintana rehetra ao Neily,
  - type: text
    content: Ary ho reraka ny mpandatsaka
  - type: note
    content: Heb. mpamelatra.
  - type: text
    content: ' harato amin’ny rano.'
  '9':
  - type: text
    content: Ho very fanantenana izay mandraotra rongony amin’ny fihogo
  - type: text
    content: Sy izay manenona hariry.
