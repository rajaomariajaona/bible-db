document_id: ISA.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny loza hanjo an’i Egypta.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'FAMINANIANA ny amin’ny loza hanjo an’i Egypta:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Jehovah mitaingina rahona miriotra mafy ka mankany Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny andriamani-tsi-izy any Egypta dia mangorohoro eo anatrehany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandositra azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fon’i Egypta dia ketraka ao anatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary hamporisihiko hiady izy samy Egyptiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka samy hiady amin’ny rahalahiny avy sy amin’ny namany avy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tanàna hiady amin’ny tanàna, ary ny fanjakana amin’ny fanjakana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ho very hevitra ny Egyptiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hofoanako ny saina ataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hila saina amin’ny andriamani-tsi-izy sy amin’ny mpibitsibitsika amin’ny odiny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny manao azy ho tsindrian-javatra ary amin’ny mpanao sikidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary Egypta dia hatolotro hogiazana amin’izay fitondrana mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mpanjaka masiaka no hanjaka aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny rano amin’ny ranomasina ho tankina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ony ho ritra ka ho maina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho maimbo ny sampantsampan’ny ony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lahindranon’i Egypta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mazora.
    marker-yv: yv-n
  - type: text
    text: ' hihena ka ho maina;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volotara sy ny zozoro halazo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tany eny amoron’i Neily
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tanimbary rehetra eny amoron’i Neily
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy ho maina sy hanjary vovoka ka tsy ho eo intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia hitomany ny mpaka hazandrano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hisaona ny mpamintana rehetra ao Neily,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho reraka ny mpandatsaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpamelatra.
    marker-yv: yv-n
  - type: text
    text: ' harato amin’ny rano.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho very fanantenana izay mandraotra rongony amin’ny fihogo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay manenona hariry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny andrin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanorenan’.
    marker-yv: yv-n
  - type: text
    text: ' ny tany ho torotoro,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpikarama rehetra halahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa adala mihitsy ny mpanapaka any Zoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevi-poana no avoak’izay hendry indrindra amin’ny mpanolotsain’i Farao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ahoana no ilazanareo amin’i Farao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zanak’olon-kendry aho sady taranak’ireo mpanjaka fahagola?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aiza ary ireo olon-kendrinao ireo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hanambara aminao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho fantany izay nokasain’i Jehovah, Tompon’ny maro, hatao amin’i Egypta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Efa adala ny mpanapaka any Zoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa voafitaka ny mpanapaka any Memfisa;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nofa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nampivembena an’i Egypta ireo fehizoron’ny fireneny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah efa nampidina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nangaroharo.
    marker-yv: yv-n
  - type: text
    text: ' fanahy mampandraingiraingy teo Egypta;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa nampivembena azy tamin’ny asany rehetra ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny olona mamo miraingiraingy sady mandoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samy tsy hahatontosa ny asany ny Egyptiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny loha na ny rambo, na ny sampan-drofia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
  - type: text
    text: ' na ny zozoro.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Amin’izany andro izany dia ho tahaka ny vehivavy Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho toran-kovitra sy ho raiki-tahotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny faninjitr’i Jehovah, Tompon’ny maro, ny tànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ahinjiny hamelezany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny tanin’ny Joda dia ho fahatahoran’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fikasan’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay kasainy ny amin’ny hamelezana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany dia hisy tanàna dimy amin’ny tany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy hiteny ny fitenin’i Kanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hianiana ho an’i Jehovah, Tompon’ny maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny anankiray hatao hoe Ira-haresa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ira-haresa = Tanàna haringana, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tanànan’ny masoandro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’izany andro izany dia hisy alitara ho an’i Jehovah eo amin’ny tany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tsangam-bato eo an-tsisiny ho an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ho famantarana sy vavolombelona ho an’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny tany Egypta izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hitaraina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ary izao no ho famantarana sy vavolombelona, etc.: Raha mitaraina.'
    marker-yv: yv-n
  - type: text
    text: ' amin’i Jehovah noho ny mpampahory izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Jehovah hanao izay hahafantaran’ny Egyptiana Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Egyptiana kosa hahalala an’i Jehovah amin’izany andro izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanompo Azy amin’ny fanatitra alatsa-dra sy amin’ny fanatitra hohanina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hivoady amin’i Jehovah sady hanefa ny voadiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Jehovah hamely ny Egyptiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fa sady hamely Izy no hanasitrana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiverina ho any amin’i Jehovah ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hekeny ny fangatahany, ary hositraniny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Amin’izany andro izany dia hisy làlambe avy any Egypta mankany Asyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ny Asyriana dia hankany Egypta, ary ny Egyptiana kosa hankany Asyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Egyptiana sy ny Asyriana hiara-mivavaka.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiara-manompo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Amin’izany andro izany ny Isiraely no ho fahatelony amin’i Egypta sy Asyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fitahiana eo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hotahin’i Jehovah, Tompon’ny maro, ireo ka hataony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotahina anie Egypta oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Asyria, asan’ny tànako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Isiraely lovako.
