document_id: REV.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namahana ny tombo-kase fahafito, sy ny nitsofana ny trompetra efatra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY rehefa novahany ny tombo-kase fahafito, dia nangina tokony ho antsasaky ny ora ny tany an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary hitako ny anjely fito izay mitsangana eo anatrehan’Andriamanitra; ary nomena trompetra fito ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nisy anjely anankiray koa tonga ka nitsangana teo ambonin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny alitara ary nitondra lovia volamena fandoroana ditin-kazo manitra; ary nomena ditin-kazo manitra betsaka izy, hanaterany azy mbamin’ny vavaky ny olona masina rehetra eo ambonin’ny alitara volamena fandoroana ditin-kazo manitra, izay eo anoloan’ny seza fiandrianana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny fofon’ny ditin-kazo manitra mbamin’ny vavaky ny olona masina dia niakatra avy eo an-tànan’ny anjely ho eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny anjely nandray ny lovia fandoroana ditin-kazo manitra, dia nameno azy tamin’ny afo teo amin’ny alitara ka nanipy izany tamin’ny tany; dia nisy kotrokorana sy feo sy helatra ary horohoron-tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny anjely fito izay nanana ny trompetra fito dia niomana hitsoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny voalohany nitsoka, dia nisy havandra sy afo miharoharo ra, ka nararaka tamin’ny tany izany; ary may ny ampahatelon’ny tany, ary may ny ampahatelon’ny hazo, ary may koa ny ahi-maitso rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny anjely faharoa nitsoka, dia nisy toa tendrombohitra lehibe mirehitra afo natsipy tany an-dranomasina; ary tonga ra ny ampahatelon’ny ranomasina; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary maty ny ampahatelon’ny zava-manan-aina tao an-dranomasina; ary rava ny ampahatelon’ny sambo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny anjely fahatelo nitsoka, dia nisy kintana lehibe mirehitra toy ny fanilo latsaka avy tany an-danitra; ary latsaka tamin’ny ampahatelon’ny ony sy tamin’ny loharano izany; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary ny anaran’ilay kintana dia atao hoe Zava-mangidy; dia tonga mangidy ny ampahatelon’ny rano; ary maro ny olona no matin’ny rano, satria efa nangidy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny anjely fahefatra nitsoka, dia nasiana ny ampahatelon’ny maso-andro sy ny ampahatelon’ny volana ary ny am-pahatelon’ny kintana rehetra, mba ho maizina ny ampahatelony, ka tsy hazava ny ampahatelon’ny andro, mba ho toy izany koa ny alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nahita sy nahare voromahery anankiray nanidina teny afovoan’ny lanitra aho, izay nanao tamin’ny feo mahery hoe: Loza, loza, loza ho an’izay monina eny ambonin’ny tany noho ny feo sisa an’ny trompetry ny anjely telo izay efa hitsoka!'
