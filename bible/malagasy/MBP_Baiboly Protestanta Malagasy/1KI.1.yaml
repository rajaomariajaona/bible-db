document_id: 1KI.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niodinan’i Adonia, sy ny nanosorana an’i Solomona ho mpanjaka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Davida mpanjaka dia efa zoki-olona sady nandroso fahanterana; ary norakofana lamba izy, fa tsy nety nafana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Natana mpaminany sy Benaia sy ny lehilahy mahery ary Solomona rahalahiny no tsy mba nasainy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Natana niteny tamin’i Batseba, renin’i Solomona, hoe: Moa tsy renao va fa efa manjaka Adonia, zanak’i Hagita, nefa tsy fantatr’i Davida tompontsika akory izany? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa etsy homeko saina hianao hamonjenao ny ainao sy ny ain’i Solomona zanakao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana mankany amin’i Davida mpanjaka, ka lazao aminy hoe: Tsy nianiana tamiko mpanompovavinao va hianao, ry mpanjaka tompoko, nanao hoe: Solomona zanakao-lahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin’ny seza fiandrianako? Koa nahoana indray no Adonia no manjaka? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mbola miteny amin’ny mpanjaka hianao, dia, indro, izaho koa hiditra manaraka anao ka hanamarina ny teninao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Batseba dia nankao amin’ny mpanjaka tao amin’ny efi-trano nitoerany; ary efa antitra ny mpanjaka; ary Abisaga Sonemita nanompo azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niondrika Batseba ka niankohoka teo anatrehan’ny mpanjaka. Ary hoy ny mpanjaka: Inona no ilainao? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Tompokolahy ô, Jehovah Andriamanitrao no nianiananao tamiko mpanompovavinao hoe: Solomona zanakao-lahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin’ny seza fiandrianako. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo izao dia, indro, Adonia no manjaka; kanefa tsy fantatrao izany, ry mpanjaka tompoko. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa namono omby sy zanak’omby mifahy ary ondry aman-osy betsaka izy ka efa nanasa ny zanakalahin’ny mpanjaka rehetra sy Abiatara mpisorona ary Joaba, komandin’ny miaramila; fa Solomona mpanomponao ihany no tsy mba nasainy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia hoy ny mpanompony taminy: Aoka hitadiavana zazavavy virijina ny mpanjaka tompoko, dia aoka hitoetra eto anatrehan’ny mpanjaka izy mba ho mpitaiza azy, ary aoka handry eo amin’ny tratranao izy, ka dia hampahafàna ny mpanjaka tompoko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hianao, ry mpanjaka tompoko ô, ny mason’ny Isiraely rehetra manandrandra anao hilazanao izay hipetraka eo amin’ny seza fiandriananao mpanjaka tompoko handimby anao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa rehefa lasa modi-mandry any amin’ny razany ny mpanjaka tompoko, dia izaho sy Solomona zanako no hatao meloka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola niteny tamin’ny mpanjaka ravehivavy, dia, indro, niditra koa Natana mpaminany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nanambara tamin’ny mpanjaka hoe: Indro Natana mpaminany. Dia niditra teo anatrehan’ny mpanjaka izy ka niankohoka tamin’ny tany teo anatrehany.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Natana: Ry mpanjaka tompoko ô, fa angaha hianao efa niteny hoe: Adonia no hanjaka handimby ahy, ary izy no hipetraka eo amin’ny seza fiandrianako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa he! izy nidina androany ary namono omby sy zanak’omby mifahy sy ondry aman’osy betsaka ka nanasa ny zanakalahin’ny mpanjaka rehetra sy ny komandin’ny miaramila sy Abiatara mpisorona; ary indreo izy mihinana ny misotro eo anatrehany ka manao hoe: Ho ela velona anie Adonia mpanjaka! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho mpanomponao sy Zadoka mpisorona sy Benaia, zanak’i Joiada, ary Solomona mpanomponao ihany no tsy mba nasainy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa avy tamin’ny mpanjaka tompoko va no nahatonga izany zavatra izany, ka tsy mba nampahafantarinao ny mpanomponao izay hipetraka eo amin’ny seza fiandriananao mpanjaka tompoko handimby anao?
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namaly Davida mpanjaka ka nanao hoe: Antsoy hankatỳ amiko Batseba. Dia niditra nankeo anatrehan’ny mpanjaka izy ka nitsangana teo anatrehany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka nianiana hoe: Raha velona koa Jehovah, Izay namonjy ny aiko tamin’ny fahoriana rehetra, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nitady zazavavy tsara tarehy eran’ny tanin’ny Isiraely rehetra izy ka nahita an’i Abisaga Sonemita, dia nentiny tany amin’ny mpanjaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tahaka ilay nianianako tamin’i Jehovah, Andriamanitry ny Isiraely, sady nilazako taminao hoe: Solomona zanakao-lahy no hanjaka handimby ahy tokoa, ary izy no hipetraka eo amin’ny seza fiandrianako hisolo ahy, dia izany ihany no hataoko anio. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Batseba niondrika, dia niankohoka tamin’ny tany teo anatrehan’ny mpanjaka ka nanao hoe: Ho velona mandrakizay anie Davida mpanjaka tompoko!'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida mpanjaka: Antsoy hankatỳ amiko Zadoka mpisorona sy Natana mpaminany ary Benaia, zanak’i Joiada. Dia niditra nankeo anatrehan’ny mpanjaka izy telo lahy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka taminy: Ento miaraka aminareo ny mpanompon’ny tomponareo, ary ampitaingeno ny ampondravaviko Solomona zanako-lahy, ka ento midina any Gihona izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka Zadoka mpisorona sy Natana mpaminany hanosotra azy any ho mpanjakan’ny Isiraely; ary tsofinareo ny anjomara, ka lazao hoe: Ho ela velona anie Solomona mpanjaka! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia miakara manaraka azy hianareo, ary aoka izy hiditra ka hipetraka eo amin’ny seza fiandrianako; fa izy no ho mpanjaka hisolo ahy, satria izy no voatendriko ho mpanapaka ny Isiraely sy ny Joda.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Benaia, zanak’i Joiada, namaly ny mpanjaka hoe: Amena! Hiteny tahaka izany koa anie Jehovah, Andriamanitry ny mpanjaka tompoko. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy ny nomban’i Jehovah ny mpanjaka tompoko anie no mba hombany an’i Solomona koa, ary hataony be voninahitra mihoatra noho ny seza fiandrianan’i Davida mpanjaka tompoko anie ny seza fiandrianan’i Solomona.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nidina Zadoka mpisorona sy Natana mpaminany sy Benaia, zanak’i Joiada, ary ny miaramila mpiambina andriana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Keretita sy Peletita.
      marker-yv: yv-n
    - type: text
      text: ' dia nampitaingina an’i Solomona ny ampondravavin’i Davida mpanjaka izy, ka dia nitondra azy nankany Gihona. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zadoka mpisorona naka ny tandroka misy diloilo tao amin’ny trano-lay ka nanosotra an’i Solomona. Ary notsofina ny anjomara, ka dia hoy ny vahoaka rehetra: Ho ela velona anie Solomona mpanjaka! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsara tarehy dia tsara tarehy razazavavy, dia tonga mpitaiza ny mpanjaka sady nanompo azy izy; nefa ny mpanjaka tsy nahalala azy.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra nanaraka azy ny vahoaka rehetra ary nitsoka sodina sady nifaly dia nifaly, ka dia nihorohoro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.40 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nitresaka.
      marker-yv: yv-n
    - type: text
      text: ' ny tany noho ny feony.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Adonia sy ireo olona rehetra izay nasaina teo aminy nandre izany, rehefa nitsahatra nihinana izy. Ka raha nahare ny feon’ny anjomara Joaba, dia hoy izy: Inona re izany hotakotaka mampitabataba ny tànana izany e? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola niteny izy, indro, tonga Jonatana, zanak’i Abiatara mpisorona; ary hoy Adonia taminy: Mandrosoa; fa lehilahy tsara fanahy hianao, ka ho teny tsara no entinao.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jonatana niteny ka nanao tamin’i Adonia hoe: Tsia, tsy izany tsy akory, fa Davida mpanjaka tompontsika efa nanangana an’i Solomona tokoa ho mpanjaka. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpanjaka efa naniraka an’i Zadoka mpisorona sy Natana mpaminany sy Benaia, zanak’i Joiada, ary ny miaramila mpiambina andriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Keretita sy Peletita.
      marker-yv: yv-n
    - type: text
      text: ' hiaraka aminy, ka nampitaingenin’ireo ny ampondravavin’ny mpanjaka izy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zadoka mpisorona sy Natana mpaminany efa nanosotra azy teo Gihona ho mpanjaka; ary niakatra avy teo izy sady nifaly, ka dia nihorika terỳ ny tanàna. Izany no hotakotaka renareo. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa, Solomona izao dia efa mipetraka eo amin’ny seza fiandrianan’ny fanjakana. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia tonga koa ny mpanompon’ny mpanjaka hisaotra an’i Davida mpanjaka tompontsika hoe: Hataon’Andriamanitrao ho tsara noho ny anaranao anie ny anaran’i Solomona, ary hataony ho be voninahitra mihoatra noho ny seza fiandriananao anie ny seza fiandrianany! Dia niankohoka teo am-parafara ny mpanjaka '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, Izay nanome ny hipetraka eo amin’ny seza fiandrianako andro-any, sady hitan’ny masoko koa izany.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia raiki-tahotra izay rehetra nasain’i Adonia ka niainga, ary samy lasa nandeha amin’izay nalehany avy izy rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Adonia, zanakalahin’i Hagita, nanandratra ny tenany ka nanao hoe: Izaho no hanjaka; dia nanomana kalesy sy mpitaingin-tsoavaly ary dimam-polo lahy ho mpihazakazaka eo alohany izy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Adonia koa natahotra an’i Solomona, dia niainga ka lasa nangia ny tandroky ny alitara. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambara tamin’i Solomona hoe: Indro, Adonia matahotra an’i Solomona mpanjaka; koa indro izy efa mangia ny tandroky ny alitara ka manao hoe: Aoka Solomona mpanjaka hianiana amiko aloha fa tsy hamono ahy mpanompony amin’ny sabatra.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Solomona: Raha hita fa lehilahy tsara fanahy izy, dia tsy hisy na dia singam-bolony iray akory aza ho latsaka amin’ny tany; fa raha misy heloka kosa ho hita aminy, dia ho faty ihany izy. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka Solomona mpanjaka nampidina azy hiala tamin’ny alitara. Dia avy izy ka niankohoka teo anatrehan’i Solomona mpanjaka; ary dia hoy Solomona taminy: Modia any an-tranonao.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rainy tsy mbola niteny mafy azy akory hatrizay niainany nanao hoe: Nahoana hianao no manao toy izao? sady lehilahy tsara tarehy tokoa izy; ary izy no natera-dreniny nanarakaraka an’i Absaloma. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa niresaka tamin’i Joaba, zanak’i Zeroia sy Abiatara mpisorona izy; ka dia niandany tamin’i Adonia izy roa lahy ka nanampy azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Zadoka mpisorona sy Benaia, zanak’i Joiada, sy Natana mpaminany sy Simey sy Rey ary ny lehilahy mahery izay an’i Davida kosa tsy mba niandany tamin’i Adonia. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Adonia namono ondry aman-osy sy omby ary zanak’omby mifahy teo anilan’ny vato Zoheleta tanilan’i En-rogela ka nanasa ny rahalahiny zanakalahin’ny mpanjaka rehetra sy ny lehilahy rehetra amin’ny Joda, mpanompon’ny mpanjaka; '
