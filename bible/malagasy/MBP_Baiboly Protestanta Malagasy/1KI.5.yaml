document_id: 1KI.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary Solomona nanjaka tamin’ny fanjakana rehetra hatramin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' sy ny tanin’ny Filistina ka hatramin’ny sisin’i Egypta; nandoa hetra ireo sady nanompo an’i Solomona tamin’ny andro rehetra niainany.'
  '10':
  - type: text
    content: 'Ary ny fahendren’i Solomona nihoatra noho ny fahendren’ny zanaky ny atsinanana rehetra sy ny fahendren’ny Egyptiana rehetra. '
  '11':
  - type: text
    content: Fa hendry noho ny olona rehetra izy; eny, hendry mihoatra noho Etana Ezrahita sy Hemana sy Kalkola sy Darda, zanak’i Mahola, aza izy; ary ny lazany efa niely tamin’ny firenena rehetra manodidina.
  '12':
  - type: text
    content: 'Nanao ohabolana telo arivo izy, sady nanao tononkira dimy amby arivo. '
  '13':
  - type: text
    content: 'Ary nilaza ny amin’ny hazo hatramin’ny hazo sedera any Libanona ka hatramin’ny hysopa izay maniry eny amin’ny ampiantany izy, sady nilaza ny amin’ny biby sy ny vorona sy ny biby mandady sy mikisaka ary ny hazandrano koa. '
  '14':
  - type: text
    content: Ary dia nisy tonga avy tany amin’ny firenena rehetra mba hihaino ny fahendren’i Solomona, dia avy amin’ny mpanjakan’ny tany rehetra izay efa nahare ny amin’ny fahendreny.
  - type: heading
    content: Ny namorian’i Solomona izay ho enti-manao ny tempoly.
  '15':
  - type: text
    content: ARY Hirama, mpanjakan’i Tyro, naniraka ny mpanompony ho any amin’i Solomona, satria reny fa izy no voahosotra ho mpanjaka handimby an-drainy; fa Hirama dia sakaizan’i Davida hatrizay ela izay.
  '16':
  - type: text
    content: 'Ary Solomona naniraka tany amin’i Hirama hanao hoe: '
  '17':
  - type: text
    content: 'Fantatrao fa Davida raiko tsy nahavita trano ho an’ny anaran’i Jehovah Andriamaniny noho ny ady nanodidina azy, ambara-panaon’i Jehovah ireo ho eo ambanin’ny faladiany. '
  '18':
  - type: text
    content: 'Fa ankehitriny Jehovah Andriamanitro efa nanome ahy fitsaharana amin’ny manodidina, ka tsy misy fahavalo na loza manjo intsony. '
  '19':
  - type: text
    content: 'Ary, indro, izaho mikasa hanao trano ho an’ny anaran’i Jehovah Andriamanitro, araka ilay nolazain’i Jehovah tamin’i Davida raiko hoe: Ny zanakao izay hapetrako eo amin’ny seza fiandriananao handimby anao, izy no hanao trano ho an’ny anarako. '
  '2':
  - type: text
    content: 'Ary ny fihinan’i Solomona isan-andro dia koba tsara toto telo-polo kora sy koba hafa enim-polo kora, '
  '20':
  - type: text
    content: Koa dia mba asaovy misy mikapa hazo sedera any Libanona ho ahy; ary ny vahoakako hiaraka amin’ny vahoakanao, ka ny karaman’ny vahoakanao dia homeko anao araka izay hotononinao; fa fantatrao fa tsy mba misy olona atỳ aminay mahay mikapa hazo tahaka ny Sidoniana.
  '21':
  - type: text
    content: 'Ary rehefa ren’i Hirama ny tenin’i Solomona, dia faly indrindra izy ka nanao hoe: Ankehitriny izao dia isaorana anie Jehovah, Izay nanome zanakalahy hendry ho an’i Davida hanapaka izao olona betsaka izao. '
  '22':
  - type: text
    content: 'Ary Hirama naniraka tany amin’i Solomona hanao hoe: Efa reko ny nanirahanao tatỳ amiko; koa izaho dia hanao izay rehetra irinao ny amin’ny hazo sedera sy ny hazo kypreso. '
  '23':
  - type: text
    content: Ny vahoakako hitondra azy midina avy any Libanona ho any amin’ny ranomasina, ary hofeheziko ka hampandehaniko mitsinkafona amin’ny rano ho any amin’izay hotononinao, ary any vao hoborahiko izy, ka dia hianao kosa no hampaka azy; ary hianao dia hanao izay iriko amin’ny fanomezan-kanina ho an’ny ankohonako.
  '24':
  - type: text
    content: 'Ary Hirama dia nanome hazo sedera sy hazo kypreso ho an’i Solomona araka izay rehetra nilainy. '
  '25':
  - type: text
    content: Ary Solomona kosa nanome an’i Hirama vary tritika roa alina kora ho an’ny ankohonany, ary diloilo roa-polo kora avy amin’ny oliva voatoto; izany no nomen’i Solomona an’i Hirama isan-taona isan-taona.
  '26':
  - type: text
    content: Ary Jehovah nanome fahendrena an’i Solomona, araka izay nolazainy taminy; ary nihavana Hirama sy Solomona, ka nanao fanekena izy roa lahy.
  '27':
  - type: text
    content: 'Ary Solomona mpanjaka naka olona tamin’ny Isiraely rehetra hanao fanompoana, ka olona telo alina no nalainy. '
  '28':
  - type: text
    content: 'Ary nirahiny nankany Libanona ireny, dia iray alina no indray milatsaka isam-bolana; iray volana izy no tany Libanona, ary roa volana kosa mba tany an-tranony; ary Adonirama no nifehy azy rehetra. '
  '29':
  - type: text
    content: Ary Solomona nanana mpitondra entana fito alina sy tambato
  - type: note
    content: 'Na: mpikapa hazo.'
  - type: text
    content: ' valo alina teny an-tendrombohitra, '
  '3':
  - type: text
    content: 'sy omby mifahy folo sy omby an-tondraka roa-polo ary ondry aman-osy zato, afa-tsy ny diera koa sy ny gazela sy ny kapreola ary ny vorona mifahy. '
  '30':
  - type: text
    content: afa-tsy ny lehiben’ireo olona voatendrin’i Solomona ireo, izay nitandrina ny raharaha, dia telon-jato amby telo arivo lahy izay nifehy ny mpiasa.
  '31':
  - type: text
    content: 'Ary ny mpanjaka dia nandidy hanamboatra vato vaventy tsara sady voapaika hatao fanorenan’ny trano. '
  '32':
  - type: text
    content: Ary ny mpiasan’i Solomona sy Hirama (indrindra fa ny avy any Gebala) no nipaika sy nanamboatra ny hazo sy ny vato hatao trano.
  '4':
  - type: text
    content: Fa nanapaka ny tany rehetra atỳ
  - type: note
    content: 'Na: any.'
  - type: text
    content: ' an-dafin’ny Ony'
  - type: note
    content: Eofrata.
  - type: text
    content: ' hatrany Tifsa ka hatrany Gaza izy, dia tamin’ny mpanjaka rehetra etỳ'
  - type: note
    content: 'Na: any.'
  - type: text
    content: ' an-dafin’ny Ony;'
  - type: note
    content: Eofrata.
  - type: text
    content: ' ary izy dia tsara fihavanana tamin’ireny rehetra manodidina nanoa azy ireny. '
  '5':
  - type: text
    content: 'Ary ny Joda sy ny Isiraely nandry fahizay tamin’ny andron’i Solomona rehetra, samy teny ambanin’ny voalobony sy ny aviaviny ny olona hatrany Dana ka hatrany Beri-sheba. '
  '6':
  - type: text
    content: Ary Solomona nanana efi-trano efatra alina, fitoeran’ny soavaly mpitarika kalesy, ary soavaly fitaingina roa arivo amby iray alina.
  '7':
  - type: text
    content: 'Ary ireo olona voatendry ireo dia niadidy ny zavatra rehetra nilain’i Solomona mpanjaka sy izay rehetra nentina teo amin’ny latabatr’i Solomona mpanjaka; izy rehetra samy niadidy ny amin’ny iray volany avy, ka tsy navelany ho nisy tsy ampy na inona na inona. '
  '8':
  - type: text
    content: Ny vary hordea koa sy ny mololo ho an’ny soavaly sy ny soavaly haingam-pandeha dia nentiny ho ao amin’ny fitoerana izay tokony hitondrana azy, dia samy araka ny anjarany avy.
  '9':
  - type: text
    content: 'Ary Andriamanitra nanome an’i Solomona fahendrena sy fahiratan-tsaina be indrindra ary fahalalana betsaka tahaka ny fasika amoron-dranomasina. '
