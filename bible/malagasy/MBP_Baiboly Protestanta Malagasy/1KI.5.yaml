document_id: 1KI.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary Solomona nanjaka tamin’ny fanjakana rehetra hatramin’ny Ony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tanin’ny Filistina ka hatramin’ny sisin’i Egypta; nandoa hetra ireo sady nanompo an’i Solomona tamin’ny andro rehetra niainany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny fihinan’i Solomona isan-andro dia koba tsara toto telo-polo kora sy koba hafa enim-polo kora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sy omby mifahy folo sy omby an-tondraka roa-polo ary ondry aman-osy zato, afa-tsy ny diera koa sy ny gazela sy ny kapreola ary ny vorona mifahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa nanapaka ny tany rehetra atỳ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any.
    marker-yv: yv-n
  - type: text
    text: ' an-dafin’ny Ony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' hatrany Tifsa ka hatrany Gaza izy, dia tamin’ny mpanjaka rehetra etỳ'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any.
    marker-yv: yv-n
  - type: text
    text: ' an-dafin’ny Ony;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' ary izy dia tsara fihavanana tamin’ireny rehetra manodidina nanoa azy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny Joda sy ny Isiraely nandry fahizay tamin’ny andron’i Solomona rehetra, samy teny ambanin’ny voalobony sy ny aviaviny ny olona hatrany Dana ka hatrany Beri-sheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary Solomona nanana efi-trano efatra alina, fitoeran’ny soavaly mpitarika kalesy, ary soavaly fitaingina roa arivo amby iray alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ireo olona voatendry ireo dia niadidy ny zavatra rehetra nilain’i Solomona mpanjaka sy izay rehetra nentina teo amin’ny latabatr’i Solomona mpanjaka; izy rehetra samy niadidy ny amin’ny iray volany avy, ka tsy navelany ho nisy tsy ampy na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny vary hordea koa sy ny mololo ho an’ny soavaly sy ny soavaly haingam-pandeha dia nentiny ho ao amin’ny fitoerana izay tokony hitondrana azy, dia samy araka ny anjarany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Andriamanitra nanome an’i Solomona fahendrena sy fahiratan-tsaina be indrindra ary fahalalana betsaka tahaka ny fasika amoron-dranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny fahendren’i Solomona nihoatra noho ny fahendren’ny zanaky ny atsinanana rehetra sy ny fahendren’ny Egyptiana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa hendry noho ny olona rehetra izy; eny, hendry mihoatra noho Etana Ezrahita sy Hemana sy Kalkola sy Darda, zanak’i Mahola, aza izy; ary ny lazany efa niely tamin’ny firenena rehetra manodidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nanao ohabolana telo arivo izy, sady nanao tononkira dimy amby arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nilaza ny amin’ny hazo hatramin’ny hazo sedera any Libanona ka hatramin’ny hysopa izay maniry eny amin’ny ampiantany izy, sady nilaza ny amin’ny biby sy ny vorona sy ny biby mandady sy mikisaka ary ny hazandrano koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary dia nisy tonga avy tany amin’ny firenena rehetra mba hihaino ny fahendren’i Solomona, dia avy amin’ny mpanjakan’ny tany rehetra izay efa nahare ny amin’ny fahendreny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namorian’i Solomona izay ho enti-manao ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ARY Hirama, mpanjakan’i Tyro, naniraka ny mpanompony ho any amin’i Solomona, satria reny fa izy no voahosotra ho mpanjaka handimby an-drainy; fa Hirama dia sakaizan’i Davida hatrizay ela izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Solomona naniraka tany amin’i Hirama hanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fantatrao fa Davida raiko tsy nahavita trano ho an’ny anaran’i Jehovah Andriamaniny noho ny ady nanodidina azy, ambara-panaon’i Jehovah ireo ho eo ambanin’ny faladiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ankehitriny Jehovah Andriamanitro efa nanome ahy fitsaharana amin’ny manodidina, ka tsy misy fahavalo na loza manjo intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary, indro, izaho mikasa hanao trano ho an’ny anaran’i Jehovah Andriamanitro, araka ilay nolazain’i Jehovah tamin’i Davida raiko hoe: Ny zanakao izay hapetrako eo amin’ny seza fiandriananao handimby anao, izy no hanao trano ho an’ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa dia mba asaovy misy mikapa hazo sedera any Libanona ho ahy; ary ny vahoakako hiaraka amin’ny vahoakanao, ka ny karaman’ny vahoakanao dia homeko anao araka izay hotononinao; fa fantatrao fa tsy mba misy olona atỳ aminay mahay mikapa hazo tahaka ny Sidoniana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa ren’i Hirama ny tenin’i Solomona, dia faly indrindra izy ka nanao hoe: Ankehitriny izao dia isaorana anie Jehovah, Izay nanome zanakalahy hendry ho an’i Davida hanapaka izao olona betsaka izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Hirama naniraka tany amin’i Solomona hanao hoe: Efa reko ny nanirahanao tatỳ amiko; koa izaho dia hanao izay rehetra irinao ny amin’ny hazo sedera sy ny hazo kypreso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny vahoakako hitondra azy midina avy any Libanona ho any amin’ny ranomasina, ary hofeheziko ka hampandehaniko mitsinkafona amin’ny rano ho any amin’izay hotononinao, ary any vao hoborahiko izy, ka dia hianao kosa no hampaka azy; ary hianao dia hanao izay iriko amin’ny fanomezan-kanina ho an’ny ankohonako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Hirama dia nanome hazo sedera sy hazo kypreso ho an’i Solomona araka izay rehetra nilainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Solomona kosa nanome an’i Hirama vary tritika roa alina kora ho an’ny ankohonany, ary diloilo roa-polo kora avy amin’ny oliva voatoto; izany no nomen’i Solomona an’i Hirama isan-taona isan-taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Jehovah nanome fahendrena an’i Solomona, araka izay nolazainy taminy; ary nihavana Hirama sy Solomona, ka nanao fanekena izy roa lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Solomona mpanjaka naka olona tamin’ny Isiraely rehetra hanao fanompoana, ka olona telo alina no nalainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nirahiny nankany Libanona ireny, dia iray alina no indray milatsaka isam-bolana; iray volana izy no tany Libanona, ary roa volana kosa mba tany an-tranony; ary Adonirama no nifehy azy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary Solomona nanana mpitondra entana fito alina sy tambato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpikapa hazo.
    marker-yv: yv-n
  - type: text
    text: ' valo alina teny an-tendrombohitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: afa-tsy ny lehiben’ireo olona voatendrin’i Solomona ireo, izay nitandrina ny raharaha, dia telon-jato amby telo arivo lahy izay nifehy ny mpiasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny mpanjaka dia nandidy hanamboatra vato vaventy tsara sady voapaika hatao fanorenan’ny trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny mpiasan’i Solomona sy Hirama (indrindra fa ny avy any Gebala) no nipaika sy nanamboatra ny hazo sy ny vato hatao trano.
