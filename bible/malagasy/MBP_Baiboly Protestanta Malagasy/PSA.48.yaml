document_id: PSA.48
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tsy nahazoan’ny fahavalo hamely ny tanànan’Andriamanitra, Mpanjaka lehibe.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonon-kira. Salamo nataon’ny Koraïta.
- type: usfm
  marker: q1
  children:
  - type: text
    text: LEHIBE Jehovah ka mendrika hoderaina indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao an-tanànan’Andriamanitsika, ao an-tendrombohiny masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avo mahafinaritra, fifalian’ny tany rehetra, ny tendrombohitra Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny ilany avaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tanànan’ny Mpanjaka lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra ao an-tranon’andriana ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanao izay hahafantarana Azy ho fiarovana avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa he! niangona ny mpanjaka maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niara-nandroso avokoa izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nijery izy ka talanjona terỳ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very hevitra izy ka nalaky nandositra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hovitra no nahazo azy teo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny fanaintainan’ny vehivavy raha miteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’ny rivotra avy any atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: No namakianao ny sambon’i Tarsisy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka izay efa rentsika no hitantsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao an-tanànan’i Jehovah, Tompon’ny maro, tao an-tanànan’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra mampitoetra azy mandrakizay.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nieritreritra ny famindramponao izahay, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao anatin’ny tempolinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Araka ny anaranao, Andriamanitra ô, no fiderana Anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feno fahamarinana ny tànanao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka hifaly ny tendrombohitra Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho ravoravo ny zanakavavin’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fitsaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manodidìna an’i Ziona hianareo, eny, mandehana manodidina azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isao ny tilikambony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hevero tsara ny màndany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Diniho ny tranon’andrianany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hambaranareo amin’ny taranaka mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa izany no Andriamanitra, dia Andriamanitsika mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hitarika antsika na dia hatramin’ny fahafatesana aza.
