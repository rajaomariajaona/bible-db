document_id: PSA.48,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy nahazoan’ny fahavalo hamely ny tanànan’Andriamanitra, Mpanjaka lehibe.
  - type: text
    content: Tonon-kira. Salamo nataon’ny Koraïta.
  - type: text
    content: LEHIBE Jehovah ka mendrika hoderaina indrindra,
  - type: text
    content: Ao an-tanànan’Andriamanitsika, ao an-tendrombohiny masina.
  '10':
  - type: text
    content: Araka ny anaranao, Andriamanitra ô, no fiderana Anao
  - type: text
    content: Hatramin’ny faran’ny tany;
  - type: text
    content: Feno fahamarinana ny tànanao ankavanana.
  '11':
  - type: text
    content: Aoka hifaly ny tendrombohitra Ziona,
  - type: text
    content: Aoka ho ravoravo ny zanakavavin’i Joda,
  - type: text
    content: Noho ny fitsaranao.
  '12':
  - type: text
    content: Manodidìna an’i Ziona hianareo, eny, mandehana manodidina azy;
  - type: text
    content: Isao ny tilikambony,
  '13':
  - type: text
    content: Hevero tsara ny màndany,
  - type: text
    content: Diniho ny tranon’andrianany,
  - type: text
    content: Mba hambaranareo amin’ny taranaka mandimby.
  '14':
  - type: text
    content: Fa izany no Andriamanitra, dia Andriamanitsika mandrakizay doria;
  - type: text
    content: Izy no hitarika antsika na dia hatramin’ny fahafatesana aza.
  '2':
  - type: text
    content: Avo mahafinaritra, fifalian’ny tany rehetra, ny tendrombohitra Ziona,
  - type: text
    content: Eo amin’ny ilany avaratra,
  - type: text
    content: Tanànan’ny Mpanjaka lehibe.
  '3':
  - type: text
    content: Andriamanitra ao an-tranon’andriana ao
  - type: text
    content: Dia nanao izay hahafantarana Azy ho fiarovana avo.
  '4':
  - type: text
    content: Fa he! niangona ny mpanjaka maro,
  - type: text
    content: Niara-nandroso avokoa izy;
  '5':
  - type: text
    content: Nijery izy ka talanjona terỳ;
  - type: text
    content: Very hevitra izy ka nalaky nandositra;
  '6':
  - type: text
    content: Hovitra no nahazo azy teo,
  - type: text
    content: Dia tahaka ny fanaintainan’ny vehivavy raha miteraka.
  '7':
  - type: text
    content: Amin’ny rivotra avy any atsinanana
  - type: text
    content: No namakianao ny sambon’i Tarsisy.
  '8':
  - type: text
    content: Araka izay efa rentsika no hitantsika
  - type: text
    content: Tao an-tanànan’i Jehovah, Tompon’ny maro, tao an-tanànan’Andriamanitsika.
  - type: text
    content: Andriamanitra mampitoetra azy mandrakizay.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Efa nieritreritra ny famindramponao izahay, Andriamanitra ô,
  - type: text
    content: Tao anatin’ny tempolinao.
