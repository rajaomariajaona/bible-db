document_id: MAT.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanoharana ny amin’ny virijina folo.
  - type: text
    content: ARY amin’izany ny fanjakan’ny lanitra dia ho tahaka ny virijina folo, izay nitondra ny fanalany
  - type: note
    content: 'Na: fanilony.'
  - type: text
    content: ' ka nivoaka hitsena ny mpampakatra. '
  '10':
  - type: text
    content: 'Fa raha mbola lasa nividy izy, dia tonga ny mpampakatra, ary izay efa niomana dia niara-niditra taminy tao amin’ny fampakaram-bady, ary dia narindrina ny varavarana. '
  '11':
  - type: text
    content: 'Ary rehefa afaka izany, dia tonga kosa ireo virijina teo ka nanao hoe: Tompoko, tompoko, vohay izahay. '
  '12':
  - type: text
    content: 'Fa izy namaly hoe: Lazaiko aminareo marina tokoa: Tsy fantatro hianareo.'
  '13':
  - type: text
    content: Koa amin’izany miambena hianareo, fa tsy fantatrareo na ny andro na ny ora.
  - type: heading
    content: Ny fanoharana ny amin’ny talenta.
  '14':
  - type: text
    content: 'FA '
  - type: text
    content: ny fanjakan’ny lanitra
  - type: text
    content: ' dia tahaka ny olona izay efa handeha ho any an-tany hafa ka niantso ny mpanompony, dia nanolotra azy ny fananany: '
  '15':
  - type: text
    content: koa ny anankiray nomeny talenta dimy, ny anankiray roa, ary ny anankiray iray,–samy araka izay fahaizany avy; dia lasa nandeha izy.
  '16':
  - type: text
    content: 'Ary niaraka tamin’izay dia lasa ilay nandray ny talenta dimy, ka nataony varotra izany; ary nahazo tombony talenta dimy koa izy. '
  '17':
  - type: text
    content: 'Ary toy izany koa, ilay '
  - type: text
    content: nandray
  - type: text
    content: ' ny roa dia nahazo roa ho tombony. '
  '18':
  - type: text
    content: Fa ilay nandray ny iray kosa dia lasa nihady ny tany ka nandevina ny volan’ny tompony.
  '19':
  - type: text
    content: 'Ary nony ela, dia tonga ny tompon’ireo mpanompo ireo ka nampilaza azy ny amin’ny volany. '
  '2':
  - type: text
    content: 'Ary ny dimy tamin’ireo dia adala, fa ny dimy kosa hendry. '
  '20':
  - type: text
    content: 'Ary nony nanatona ilay nandray ny talenta dimy, dia nitondra talenta dimy koa izy ka nanao hoe: Tompoko, talenta dimy no natolotrao ahy; indro, nahazo tombony talenta dimy koa aho. '
  '21':
  - type: text
    content: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky'
  - type: note
    content: 'Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc.'
  - type: text
    content: ' tamin’ny kely hianao, dia hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao. '
  '22':
  - type: text
    content: 'Ary nony nanatona koa ilay '
  - type: text
    content: nandray
  - type: text
    content: ' ny talenta roa, dia hoy izy: Tompoko, talenta roa no natolotrao ahy; indro, nahazo tombony talenta roa koa aho. '
  '23':
  - type: text
    content: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky'
  - type: note
    content: 'Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc.'
  - type: text
    content: tamin’ny kely hianao, dia hotendreko ho mpanapaka ny be; midira amin’ny fifalian’ny tomponao.
  '24':
  - type: text
    content: 'Fa nony nanatona kosa ilay nandray ny talenta iray, dia nilaza hoe: Tompoko, fantatro fa olona mila voatsiary hianao, mijinja eny amin’izay tsy namafazanao, ary manangona eny amin’izay tsy nanahafanao; '
  '25':
  - type: text
    content: 'dia natahotra aho ka lasa nandevina ny talentanao tao anatin’ny tany; indry, lasanao ny anao. '
  '26':
  - type: text
    content: 'Ary ny tompony namaly ka nanao taminy hoe: Ry mpanompo ratsy sady malaina, efa fantatrao fa mijinja eny amin’izay tsy namafazako aho, ary manangona eny amin’izay tsy nanahafako; '
  '27':
  - type: text
    content: 'koa tokony ho nampanàna ny volako tamin’ny mpanàna vola hianao, ka raha tonga aho, dia ho nandray ny ahy mban-janany. '
  '28':
  - type: text
    content: 'Koa alao aminy ny talenta, dia omeo ilay manana ny talenta folo. '
  '29':
  - type: text
    content: 'Fa izay rehetra manana dia homena, ka hanam-be izy; fa izay tsy manana kosa, na dia izay ananany aza dia halaina aminy. '
  '3':
  - type: text
    content: Fa ny adala nandray ny fanalany,
  - type: note
    content: 'Na: fanilony.'
  - type: text
    content: ' nefa tsy nitondra solika fitaiza; '
  '30':
  - type: text
    content: Ary ario ho any amin’ny maizina any ivelany ny mpanompo tsy mahasoa; any no hisy ny fitomaniana sy ny fikitroha-nify.
  - type: heading
    content: Ny hihavian’i Kristy hitsara ny firenena rehetra.
  '31':
  - type: text
    content: 'ARY raha tonga ny Zanak’olona amin’ny voninahiny, arahin’ny anjely rehetra, dia hipetraka eo ambonin’ny seza fiandrianan’ny voninahiny Izy; '
  '32':
  - type: text
    content: ary ny firenena rehetra hangonina eo anatrehany, dia hanavaka azy Izy, tahaka ny mpiandry ondry manavaka ny ondry amin’ny osy;
  - type: note
    content: Gr. zanak’osy.
  - type: text
    content: ' '
  '33':
  - type: text
    content: ary hametraka ny ondry eo amin’ny ankavanany Izy, fa ny osy
  - type: note
    content: Gr. zanak’osy.
  - type: text
    content: ' eo amin’ny ankaviany.'
  '34':
  - type: text
    content: 'Ary amin’izany ny Mpanjaka dia hilaza amin’izay eo amin’ny ankavanany hoe: Avia hianareo izay notahin’ny Raiko, mandovà ny fanjakana izay voavoatra ho anareo hatrizay nanorenana izao tontolo izao; '
  '35':
  - type: text
    content: 'fa noana Aho, dia nomenareo hanina; nangetaheta Aho dia nampisotroinareo; nivahiny Aho, dia nampiantranoinareo; '
  '36':
  - type: text
    content: 'tsy nanan-kitafy Aho, dia notafianareo; narary Aho, dia notsaboinareo; tao an-trano-maizina Aho, dia novangianareo. '
  '37':
  - type: text
    content: 'Ary dia hamaly Azy ny marina ka hanao hoe: Tompoko, oviana no hitanay noana Hianao ka nomenay hanina, na nangetaheta ka nampisotroinay? '
  '38':
  - type: text
    content: 'Ary oviana no hitanay nivahiny Hianao ka nampiantranoinay, na tsy nanan-kitafy ka notafianay? '
  '39':
  - type: text
    content: 'Ary oviana no hitanay narary Hianao, na tao an-trano-maizina, ka novangianay? '
  '4':
  - type: text
    content: ary ny hendry kosa nitondra solika tao anatin’ny fitondrany sy ny fanalany.
  - type: note
    content: 'Na: fanilony.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Dia hamaly ny Mpanjaka ka hanao aminy hoe: Lazaiko aminareo marina tokoa: Araka izay efa nataonareo tamin’ny anankiray amin’ireto rahalahiko kely indrindra ireto no nataonareo tamiko.'
  '41':
  - type: text
    content: 'Ary dia hilaza indray amin’izay eo amin’ny ankaviany kosa Izy hoe: Mialà amiko, hianareo izay voaozona, ho any amin’ny afo maharitra mandrakizay, izay voavoatra ho an’ny devoly sy ny anjeliny; '
  '42':
  - type: text
    content: 'fa noana Aho, fa tsy mba nomenareo hanina; nangetaheta Aho, fa tsy mba nampisotroinareo; '
  '43':
  - type: text
    content: 'nivahiny Aho, fa tsy mba nampiantranoinareo; tsy nanan-kitafy Aho, fa tsy mba notafianareo; narary sy tao an-trano-maizina Aho, fa tsy mba novangianareo. '
  '44':
  - type: text
    content: 'Ary dia hamaly kosa ireo hoe: Tompoko, oviana no hitanay noana Hianao, na nangetaheta, na nivahiny, na tsy nanan-kitafy, na narary, na tao an-trano-maizina, ka tsy mba nanompo Anao izahay? '
  '45':
  - type: text
    content: 'Fa hamaly azy Izy ka hanao hoe: Lazaiko aminareo marina tokoa: Araka izay tsy nataonareo tamin’ny anankiray amin’ireto kely indrindra ireto no tsy mba nataonareo tamiko.'
  '46':
  - type: text
    content: Ary ireo dia hiala ho any amin’ny fampijaliana mandrakizay; fa ny marina ho any amin’ny fiainana mandrakizay.
  '5':
  - type: text
    content: 'Ary raha naharitra ela ny mpampakatra, dia samy rendrehana avy izy rehetra, ka dia natory. '
  '6':
  - type: text
    content: 'Ary nony mamatonalina, dia nisy antso hoe: Indry ny mpampakatra! mivoaha mba hitsena azy. '
  '7':
  - type: text
    content: Dia nitsangana ireo virijina rehetra ireo, ka samy namboatra ny fanalany.
  - type: note
    content: 'Na: fanilony.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Dia hoy ny adala tamin’ny hendry: Mba omeo kely amin’ny solikareo izahay; fa efa ho faty ny fanalanay.'
  - type: note
    content: 'Na: fanilonay.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Fa ny hendry namaly ka nanao hoe: Sao tsy ampy ho anay sy ho anareo, fa mandehana mankany amin’ny mpivarotra hianareo, ka mividiana ho anareo. '
