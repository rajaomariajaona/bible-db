document_id: PSA.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Mpiandry Tsara.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH no Mpiandry ahy,
  - type: text
    content: Tsy hanan-java-mahory aho,
  '2':
  - type: text
    content: Mampandry ahy amin’ny ahi-maitso Izy;
  - type: text
    content: Mitondra ahy eo amoron’ny rano fialan-tsasatra Izy.
  '3':
  - type: text
    content: Mamelombelona ny fanahiko Izy;
  - type: text
    content: Mitarika ahy amin’ny làlan’ny fahamarinana noho ny anarany Izy.
  '4':
  - type: text
    content: Eny, na dia mandeha mamaky ny lohasaha aloky ny fahafatesana aza aho,
  - type: text
    content: Dia tsy hatahotra ny loza aho;
  - type: text
    content: Fa Hianao no amiko;
  - type: text
    content: Ny tsorakazonao sy ny tehinao, ireo no mahafa-tahotra ahy.
  '5':
  - type: text
    content: Mamelatra latabatra eo anoloako eo imason’ny fahavaloko Hianao;
  - type: text
    content: Manosotra diloilo ny lohako Hianao;
  - type: text
    content: Ny kapoakako feno dia feno.
  '6':
  - type: text
    content: Eny tokoa, fahasoavana sy famindrampo no hanaraka ahy amin’ny andro rehetra hiainako,
  - type: text
    content: Dia hitoetra ao an-tranon’i Jehovah andro lava aho.
