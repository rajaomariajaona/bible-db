document_id: PSA.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny Mpiandry Tsara.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH no Mpiandry ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hanan-java-mahory aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mampandry ahy amin’ny ahi-maitso Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitondra ahy eo amoron’ny rano fialan-tsasatra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mamelombelona ny fanahiko Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitarika ahy amin’ny làlan’ny fahamarinana noho ny anarany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, na dia mandeha mamaky ny lohasaha aloky ny fahafatesana aza aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hatahotra ny loza aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tsorakazonao sy ny tehinao, ireo no mahafa-tahotra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mamelatra latabatra eo anoloako eo imason’ny fahavaloko Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manosotra diloilo ny lohako Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny kapoakako feno dia feno.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny tokoa, fahasoavana sy famindrampo no hanaraka ahy amin’ny andro rehetra hiainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitoetra ao an-tranon’i Jehovah andro lava aho.
