document_id: DAN.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Toky ho an’ny olon’Andriamanitra fa tsy ho resin’ny fahavalony izy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'TAMIN’ny taona fahatelo nanjakan’i Kyrosy, mpanjakan’i Persia, dia nisy nambara tamin’i Daniela, izay atao hoe Beltesazara; marina ny teny, ary ady mafy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no nolazainy;
    - type: text
      text: ' ary nahalala ny teny izy sady nahafantatra ny fahitana.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary, indro, nisy tànana nanohina ka nanarina ahy handohalika sy hitehin-tànana, nefa mbola nangozohozo ihany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy izy tamiko: Ry Daniela malala ô, fantaro ny teny izay lazaiko aminao, ka mijoroa; fa nirahina ho atỳ aminao aho ankehitriny. Ary nony nilaza izany teny izany tamiko izy, dia nitsangana nangozohozo teo aho.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy izy tamiko: Aza matahotra, ry Daniela; fa hatramin’ilay andro voalohany nampiasanao ny fonao hahalala sy hampahory ny tenanao teo anatrehan’Andriamanitrao dia reko ny teninao, ary noho ny teninao dia avy aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ilay andrianan’ny fanjakan’i Persia nanohitra ahy iraika amby roa-polo andro; fa indro kosa Mikaela, anankiray amin’ireo andriana lehibe,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Heb.
        - type: text
          text: ' voalohany.'
      marker-yv: yv-n
    - type: text
      text: ' no tonga hanampy ahy; ka dia izaho ihany no sisa nijanona teo amin’ny mpanjakan’i Persia. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary avy hampahafantatra anao izay hanjo ny firenenao any am-parany aho, satria mbola hihatra amin’izany andro izany ny fahitana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nony nilaza izany teny izany tamiko izy, dia niankohoka tamin’ny tany aho sady tsy nahateny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary, indro, nisy anankiray miendri-janak’olombelona nanendry ny molotro, dia niloa-bava aho ka niteny nanao tamin’ilay nitsangana teo anatrehako hoe: Tompoko, azon’ny fanaintainana aho noho ny fahitana ka tsy manan-kery intsony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa aiza no ahazoan’ity izaho mpanompon’ny tompoko ity hiteny aminao tompoko? Ary tamin’izay dia tsy nisy hery nitoetra tato amiko intsony, na nisy aina sisa tato amiko.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nisy indray nanana endrik’olona nanendry ahy koa, dia nampahery ahy '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka nanao hoe: Aza matahotra, ry ilay malala indrindra; fiadanana anie ho anao, mahereza, eny, mahereza. Ary rehefa niteny tamiko izy, dia nihahery aho ka nanao hoe: Aoka hiteny hianao tompoko, satria efa nampahery ahy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin’izany andro izany izaho Daniela dia nisaona roatokombolana mipaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy izy: Moa fantatrao va ny nihaviako atỳ aminao? Ankehitriny dia hiverina hiady amin’ny andrianan’i Persia aho, ary rehefa mivoaka aho, dia, indro, ho avy ny andrianan’i Grisia. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa hambarako aminao izay voasoratra ao amin’ny soratra marina; nefa tsy misy miara-misikina amiko hanohitra ireo, afa-tsy Mikaela andriananareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy nihinana hanim-pỳ aho, sady tsy nanendry hena na divay ny vavako, ary tsy nihosotra diloilo akory aho ambara-pahatapitry ny roatokombolana mipaka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary tamin’ny andro fahefatra amby roa-polo tamin’ny volana voalohany, raha teo amoron’ny ony lehibe aho (Hidekela izany), '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia nanopy ny masoko aho ka nijery, ary, indro, nisy lehilahy iray nitafy rongony fotsy, ka tena volamena avy any Ofaza no nisikinany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'tahaka ny krysolita ny tenany, ary tahaka ny helatra ny tarehiny, ary tahaka ny fanilo mirehitra ny masony, ary mivolom-barahina manganohano ny sandriny sy ny tongony; ary ny feony toy ny feon’olona maro be; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ary izaho Daniela ihany no nahita ny fahitana; fa ny olona izay teo amiko kosa tsy mba nahita izany, fa toran-kovitra indrindra izy ka nandositra niery. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary dia nilaozana ho irery aho ary nahita izany fahitana lehibe izany, dia tsy nisy hery tafajanona tato amiko; fa nihasimba nivaloarika ny tarehiko, ary tsy nisy hery intsony tamiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nefa nandre ny teniny ihany aho; ary nony nandre izany aho, dia renoky ny torimaso niankohoka tamin’ny tany.
