document_id: EXO.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nimonomononan’ny Zanak’Isiraely noho ny tsi-fisian-drano, sy ny nanomezan’Andriamanitra azy rano avy tamin’ny vatolampy.
  - type: text
    content: 'ARY nifindra ny fiangonana, dia ny Zanak’Isiraely rehetra, ka niala tao an-efitra Sina, araka izay natoron’i Jehovah hitobiany, dia nitoby tao Refidima; ary tsy nisy rano hosotroin’ny olona. '
  '10':
  - type: text
    content: Ary Josoa dia nanao araka izay efa nolazain’i Mosesy taminy, ka niady tamin’ny Amalekita izy; ary Mosesy sy Arona sy Hora kosa niakatra ho ao an-tampon’ny havoana.
  '11':
  - type: text
    content: 'Ary raha nasandratr’i Mosesy ny tànany, dia nahery ny Isiraely; fa raha nampidininy ny tànany, dia nahery kosa ny Amalekita. '
  '12':
  - type: text
    content: 'Fa efa vizana ny tànan’i Mosesy; ka dia naka vato izy roa lahy, ka nataony teo ambanin’i Mosesy hipetrahany; ary Arona sy Hora dia nanohana ny tànany, ka ny iray tamin’ny anila, ary ny iray kosa tamin’ny anila; dia naharitra tsy nidina intsony ny tànany mandra-pahafatin’ny masoandro. '
  '13':
  - type: text
    content: Ary Josoa dia nandresy ny Amalekita sy ny olony tamin’ny lelan-tsabatra.
  '14':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Soraty eo amin’ny boky izany ho fahatsiarovana, ka ambarao amin’i Josoa; fa hofoanako tokoa ny fahatsiarovana ny Amalekita tsy ho eny ambanin’ny lanitra.'
  '15':
  - type: text
    content: 'Dia nanorina alitara Mosesy ka nanao ny anarany hoe: Jehovah Nisì.'
  - type: note
    content: Nisì = Fanevako.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Fa hoy izy:'
  - type: text
    content: 'Jehovah nianiana hoe:'
  - type: text
    content: Ny adin’i Jehovah amin’ny Amalekita dia tsy hitsahatra
  - type: note
    content: 'Na: Satria misy tànana mamely ny seza fiandrianan’i Jehovah, dia tsy hitsahatra ny adin’i Jehovah amin’ny Amalekita.'
  - type: text
    content: ' hatramin’izay taranany fara mandimby.'
  '2':
  - type: text
    content: 'Dia nila ady tamin’i Mosesy ny olona ka nanao hoe: Omeo rano izahay mba hosotroinay. Fa hoy Mosesy taminy: Nahoana no mila ady amiko hianareo? Nahoana no maka fanahy an’i Jehovah hianareo?'
  '3':
  - type: text
    content: 'Ary nangetaheta teo ny olona, dia nimonomonona tamin’i Mosesy izy ka nanao hoe: Nahoana hianao no nitondra anay niakatra niala tany Egypta hahafatin-ketaheta anay sy ny zanakay ary ny bibinay?'
  '4':
  - type: text
    content: 'Ary Mosesy nitaraina tamin’i Jehovah ka nanao hoe: Ahoana no hataoko amin’ireto olona ireto? fa mila hitora-bato ahy izy.'
  '5':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Mandrosoa eo alohan’ny olona, ary itondray hiaraka aminao ny loholon’Isiraely; ary ny tehinao, ilay nikapohanao an’i Neily, dia ento eny an-tànanao, ka mandehana. '
  '6':
  - type: text
    content: Ary, indro, hijanona eo anatrehanao eo ambonin’ny harambato any Horeba Aho, dia hikapoka ny harambato hianao, ka hisy rano hivoaka avy aminy hosotroin’ny olona. Dia nanao izany Mosesy teo imason’ny loholon’Isiraely.
  '7':
  - type: text
    content: Ary ny anaran’izany tany izany dia nataony hoe Masa
  - type: note
    content: Masa = Faka-mpanahy.
  - type: text
    content: ' sy Meriba,'
  - type: note
    content: Meriba = Ady.
  - type: text
    content: ' noho ny ady nataon’ny Zanak’Isiraely, sy noho ny nakany fanahy an’i Jehovah hoe: Eto aminay va Jehovah, sa tsia?'
  '8':
  - type: text
    content: 'Ary tonga ny Amalekita ka niady tamin’ny Isiraely tao Refidima. '
  '9':
  - type: text
    content: 'Dia hoy Mosesy tamin’i Josoa: Mifidiana lehilahy ho antsika, dia mandehana ka miadia amin’ny Amalekita; rahampitso dia hijoro eo an-tampon’ny havoana aho ka hitana ny tehin’Andriamanitra etỳ an-tànako. '
