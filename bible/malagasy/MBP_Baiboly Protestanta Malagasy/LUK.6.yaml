document_id: LUK.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanotazan’ny mpianatra salohim-bary tamin’ny Sabata, sy ny naninian’ny Fariseo Azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.1-8; Mar. 2.23-28.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY tamin’ny Sabata anankiray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[faharoa manaraka ny voalohany].'
    marker-yv: yv-n
  - type: text
    text: ' dia nandeha namaky ny tanimbary Jesosy; ary ny mpianany nanoty ny salohim-bary, ka rehefa nokosokosohiny tamin’ny tànany, dia nohaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny Fariseo sasany nanao hoe: Nahoana hianareo no manao izay tsy mety hatao amin’ny Sabata?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy namaly azy ka nanao hoe: Tsy mbola novakinareo va ny teny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: milaza
  - type: text
    text: ' ilay nataon’i Davida, raha noana izy mbamin’izay nanaraka azy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa niditra tao an-tranon’Andriamanitra izy ka nandray ny mofo aseho ary nihinana sady nanome ho an’izay nanaraka azy koa, nefa mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Izy taminy: Tompon’ny Sabata ny Zanak’olona.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny lehilahy anankiray maty tànana tamin’ny Sabata, sy ny fahatezeran’ny Fariseo tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.9-21; Mar. 3.1-6.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ARY nony tamin’ny Sabata hafa koa dia niditra tao amin’ny synagoga Jesosy ka nampianatra; ary nisy lehilahy anankiray maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'efa maina, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malazo.
    marker-yv: yv-n
  - type: text
    text: 'tànana ankavanana tao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny mpanora-dalàna sy ny Fariseo nizaha taratra Azy, na hahasitrana amin’ny Sabata Izy, na tsia, mba hahitany izay hiampangana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Jesosy nahalala ny hevitr’ireo, ka dia niteny tamin-dralehilahy maty tànana hoe: Mitsangàna, ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jesosy tamin’ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin’ny Sabata, sa ny manao ratsy? ny mamonjy aina va, sa ny mahavery aina? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nijery azy rehetra manodidina Izy, dia nanao tamin-dralehilahy hoe: Ahinjiro ny tànanao. Dia nataony izany, ka sitrana ny tànany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia safotry ny hatezerana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: very saina.
    marker-yv: yv-n
  - type: text
    text: ' izy ireo ka nioko ny amin’izay hanaovany an’i Jesosy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nifidianan’i Jesosy ny Apostoly roa ambin’ny folo lahy, ary ny nahasitranany olona maro, sy ny tori-teny nataony tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 10.1-4; Mar. 3.13-19; Mat. 5–7?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ARY tamin’izany andro izany dia lasy nankany an-tendrombohitra Jesosy mba hivavaka; ary naharitra nivavaka tamin’Andriamanitra nandritra ny alina Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony maraina ny andro, dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa ambin’ny folo lahy, izay nataony hoe Apostoly, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia Simona, izay nataony hoe koa Petera, sy Andrea rahalahiny, sy Jakoba sy Jaona sy Filipo sy Bartolomeo '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sy Matio sy Tomasy sy Jakoba, zanak’i Alfeo, sy Simona, izay atao hoe Zelota, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sy Jodasy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanak’i
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: rahalahin’i.'
    marker-yv: yv-n
  - type: text
    text: Jakoba, ary Jodasy Iskariota, ilay tonga namadika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jesosy niara-nidina tamin’ireo, dia nijanona teo an-kamarenana Izy sy ny mpianany maro mbamin’ny vahoaka betsaka avy tany Jodia rehetra sy Jerosalema, ary avy tany amoron-dranomasina any Tyro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin’ny aretiny; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary izay nampahorin’ny fanahy maloto dia nositranina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny vahoaka rehetra nitady hanendry Azy, satria nisy hery niala taminy ka nahasitrana azy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jesosy dia nanopy ny masony tamin’ny mpianany ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra hianareo malahelo, fa anareo ny fanjakan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sambatra hianareo noana ankehitriny, fa hovokisana hianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra hianareo mitomany ankehitriny, fa hihomehy hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sambatra hianareo, raha halan’ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin’ny Zanak’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mifalia hianareo amin’izany andro izany, ka mibitaha;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miantsambora.
    marker-yv: yv-n
  - type: text
    text: ' fa, indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon’ny razany tamin’ny mpaminany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa lozanareo izay manan-karena kosa! fa efa azonareo izay nahafa-po anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lozanareo izay voky ankehitriny! fa mbola ho noana hianareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozanareo izay mihomehy ankehitriny! fa mbola ho ory sy hitomany hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lozanareo, raha milaza soa anareo ny olona rehetra! fa izany no nataon’ny razany tamin’ny mpaminany sandoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Kanefa hoy Izaho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin’izay mankahala anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'misaora izay manozona anareo, ary mivavaha ho an’izay manisy ratsy anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Raha misy mamely ny takolakao anankiray, dia atolory azy koa ny anankiray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Omeo izay rehetra mangataka aminao; ary raha misy maka ny anananao, dia aza manaraka izany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary araka izay tianareo hataon’ny olona aminareo, dia mba ataovy aminy kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa raha izay tia anareo ihany no tianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota koa aza mba tia izay tia azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha izay manisy soa anareo ihany no asianareo soa, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba manao izany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha mampisambotra izay antenainareo fa mbola hanonitra hianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba mampisambotra ny mpanota, handraisany toraka izany indray. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa tiava ny fahavalonareo, ary manaova soa, dia mampisambora, ka aza kivy na amin’inona na amin’inona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aza manantena valiny.
    marker-yv: yv-n
  - type: text
    text: ' dia ho lehibe ny valim-pitianareo, ary ho zanaky ny Avo Indrindra hianareo; fa Izy mora fanahy amin’izay tsy misaotra sy ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Aoka ho mpamindra fo hianareo mba ho tahaka ny Rainareo, Mpamindra fo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary aza mitsara, dia tsy hotsaraina hianareo; aza manameloka, dia tsy hohelohina hianareo; mamelà, dia mba havela hianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: omeo, dia mba homena hianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho ao am-pofoanareo. Fa izay fatra ataonareo no hamarana ho anareo kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary Jesosy nanao fanoharana taminy koa hoe: Ny jamba va mahatari-dàlana ny jamba? Tsy hianjera any an-kady va izy roa? '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ny mpianatra tsy mihoatra noho ny mpampianatra; fa izay rehetra tanteraka dia ho tahaka ny mpampianatra azy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nahoana hianao no mijery ny sombin’kazo izay eo amin’ny mason’ny rahalahinao, nefa ny andry izay eo amin’ny masonao dia tsy mba tsaroanao akory? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ahoana no ilazanao amin’ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin’ny masoanao, nefa tsy mba hitanao ny andry eo amin’ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, ary amin’izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin’ny mason’ny rahalahinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Fa samy fantatra amin’ny voany avy ny hazo rehetra; fa tsy misy manoty aviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aviavimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny tsilo, na voaloboka amin’ny voaroy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ny olona tsara fanahy dia mamoaka ny tsara avy amin’ny rakitra tsaran’ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa amin’ny haben’ny ao am-pony no itenenan’ny vavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nahoana hianareo no miantso Ahy hoe: Tompoko, Tompoko, nefa tsy manao izay lazaiko? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy, dia hasehoko aminareo izay tahaka azy: '
