  - type: text
    text: Fa izay mandre, fa tsy mankatò, dia tahaka ny olona izay nanao trano teo ambonin’ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka, ka dia nirodana niaraka tamin’izay izy; ary loza ny naharavan’izany trano izany.
