document_id: ISA.35,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ravoravo ny efitra sy ny tany karankaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tani-hay mifaly sy mamony tahaka ny lilia.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny navotan’i Jehovah hiverina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hankany Ziona amin’ny fihobiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fifaliana mandrakizay no ho eny an-dohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahazo fifaliana sy faharavoravoana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia handositra ny alahelo sy ny fisentoana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamony be dia be izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mifaly sy mihoby izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voninahitr’i Libanona dia homena azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny hatsaran-tarehin’i Karmela sy Sarôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahita ny voninahitr’i Jehovah izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny famirapiratan’Andriamanitsika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampaherezonareo ny tànana miraviravy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatanjaho ny lohalika malemy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazao amin’izay reraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: maimaika.
      marker-yv: yv-n
    - type: text
      text: ' am-po hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahereza, aza matahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Andriamanitrareo ho avy mitondra famaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny famalian’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Izy tokoa no ho avy ka hamonjy anareo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampahiratina ny mason’ny jamba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampahaladina ny sofin’ny marenina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitsambikina tahaka ny diera ny mandringa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihoby ny lelan’ny moana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hiboiboika any an-efitra ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy renirano any amin’ny tany karankaina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alonalona mitarehin-drano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny miraja.
      marker-yv: yv-n
    - type: text
      text: ' dia ho tonga farihy tokoa,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany mangentana ho loharano miboiboika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fonenana izay amitsahan’ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
    - type: text
      text: ' dia haniry volotara sy zozoro.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy làlambe any, dia làlana voavoatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hatao hoe Làlan’ny fahamasinana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba handia izany ny tsy madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah homba azy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa ho an’ireo izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay mandeha amin’ny làlana dia tsy ho diso any, na dia ny adala aza.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any tsy hisy liona sady tsy hiakaran’ny biby masiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho hita ao ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny navotana no handia azy.
