document_id: ISA.35,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ravoravo ny efitra sy ny tany karankaina,
  - type: text
    content: Ary ny tani-hay mifaly sy mamony tahaka ny lilia.
  '10':
  - type: text
    content: Eny, ny navotan’i Jehovah hiverina
  - type: text
    content: Ka hankany Ziona amin’ny fihobiana,
  - type: text
    content: Ary ny fifaliana mandrakizay no ho eny an-dohany;
  - type: text
    content: Hahazo fifaliana sy faharavoravoana izy,
  - type: text
    content: Ka dia handositra ny alahelo sy ny fisentoana.
  '2':
  - type: text
    content: Mamony be dia be izy,
  - type: text
    content: Eny, mifaly sy mihoby izy,
  - type: text
    content: Ny voninahitr’i Libanona dia homena azy
  - type: text
    content: Mbamin’ny hatsaran-tarehin’i Karmela sy Sarôna,
  - type: text
    content: Dia hahita ny voninahitr’i Jehovah izy
  - type: text
    content: Sy ny famirapiratan’Andriamanitsika.
  '3':
  - type: text
    content: Ampaherezonareo ny tànana miraviravy,
  - type: text
    content: Ary hatanjaho ny lohalika malemy.
  '4':
  - type: text
    content: Lazao amin’izay reraka
  - type: note
    content: Heb. maimaika.
  - type: text
    content: ' am-po hoe:'
  - type: text
    content: Mahereza, aza matahotra,
  - type: text
    content: Indro, Andriamanitrareo ho avy mitondra famaliana,
  - type: text
    content: Dia ny famalian’Andriamanitra,
  - type: text
    content: Eny, Izy tokoa no ho avy ka hamonjy anareo.
  '5':
  - type: text
    content: Dia hampahiratina ny mason’ny jamba,
  - type: text
    content: Ary hampahaladina ny sofin’ny marenina.
  '6':
  - type: text
    content: Dia hitsambikina tahaka ny diera ny mandringa,
  - type: text
    content: Ary hihoby ny lelan’ny moana;
  - type: text
    content: Fa hiboiboika any an-efitra ny rano,
  - type: text
    content: Ary hisy renirano any amin’ny tany karankaina.
  '7':
  - type: text
    content: Ny alonalona mitarehin-drano
  - type: note
    content: ny miraja.
  - type: text
    content: ' dia ho tonga farihy tokoa,'
  - type: text
    content: Ary ny tany mangentana ho loharano miboiboika;
  - type: text
    content: Ny fonenana izay amitsahan’ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' dia haniry volotara sy zozoro.'
  '8':
  - type: text
    content: Ary hisy làlambe any, dia làlana voavoatra,
  - type: text
    content: Izay hatao hoe Làlan’ny fahamasinana;
  - type: text
    content: Tsy mba handia izany ny tsy madio,
  - type: text
    content: Fa Jehovah homba azy,
  - type: note
    content: 'Na: Fa ho an’ireo izy.'
  - type: text
    content: Ka izay mandeha amin’ny làlana dia tsy ho diso any, na dia ny adala aza.
  '9':
  - type: text
    content: Any tsy hisy liona sady tsy hiakaran’ny biby masiaka,
  - type: text
    content: Tsy ho hita ao ireny;
  - type: text
    content: Fa ny navotana no handia azy.
