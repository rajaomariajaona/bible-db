document_id: DEU.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia niverina isika ka nandeha tany an-efitra tamin’ny làlana mankany amin’ny Ranomasina Mena, araka izay nolazain’i Jehovah tamiko; ary nanodidina ny tendrombohitra Seïra ela ihany isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niteny tamiko Jehovah ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka izay ny nandehananareo nanodidina ity tendrombohitra ity, fa miverena hianavaratra hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary mandidia ny olona hoe: Hianareo efa handeha hamaky ny tanin’ny taranak’i Esao rahalahinareo, izay monina any Seïra; dia hatahotra anareo izy; nefa mitandrema tsara hianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka aza mila ady aminy; fa tsy hanomezako anao ny taniny, na dia eram-paladia akory aza, satria nomeko ho lovan’i Esao ny tendrombohitra Seïra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vola no hamidinareo hanina aminy hohaninareo; ary vola koa no hamidinareo rano aminy hosotroinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Jehovah Andriamanitrao efa nitahy anao tamin’izay rehetra nataon’ny tànanao; fantany ny nandehananao namaky ity efitra lehibe ity; izay efa-polo taona izay Jehovah Andriamanitrao no teo aminao, ka tsy nanan-java-mahory akory hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary raha nandalo ny taranak’i Esao rahalahintsika izay monina any Seïra isika ary niala tamin’ny làlana amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' sy tao Elata ary i Ezion-gebera, dia nivily isika ka nandeha tamin’ny làlana mankany amin’ny efitr’i Moaba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Aza mandrafy ny Moabita, na mila ady aminy, fa tsy hanomezako ho lovanao ny taniny, satria Ara dia nomeko ho lovan’ny taranak’i Lota. ( '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny Emima nonina tany fahiny, dia firenena lehibe sy maro isa ary olona lava tahaka ny Anakita. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo koa no natao ho Refaïta tany aloha tahaka ny Anakita; fa ny Moabita kosa nanao azy hoe Emima. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny tany Seïra dia nonenan’ny Horita, fa ny taranak’i Esao nandroaka azy ka nandringana azy tsy ho eo anoloany, dia nonina nisolo azy, araka ny nataon’ny Isiraely tao amin’ny tany izay nomen’i Jehovah azy ho lovany.) '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary miaingà hianareo ankehitriny, ka mandehana mita ny lohasahan-driaka Zareda. Dia nita ny lohasahan-driaka Zareda isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny andro nandehanantsika hatrany Kadesi-barnea ka hatramin’ ny nitantsika ny lohasahan-driaka Zareda dia valo amby telo-polo taona, mandra-pahalany ritran’ny mpanafika rehetra tamin’izany taranaka rehetra izany ka tsy nisy intsony teo amin’ny toby, araka izay efa nianianan’i Jehovah taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary koa, ny tànan’i Jehovah dia namely azy handringanana azy mandra-pahalany ritrany ka tsy nisy intsony teo amin’ny toby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa lany ritra ny mpanafika ka maty avokoa, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia niteny tamiko Jehovah ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ankehitriny efa hamaky ny tany Moaba hianao ka hahazo any Ara, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia ho tonga ao akaikin’ny taranak’i Amona, nefa aza mandrafy azy, na mila ady Aminy; fa tsy hanomezako ho lovanao ny tanin’ny taranak’i Amona, satria nomeko ho lovan’ny taranak’i Lota izany. ( '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izany koa no natao ho tanin’ny Refaïta; fa ny Refaïta no nitoetra tao tany aloha ka nataon’ny Amonita hoe Zamzomita. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Firenena lehibe sy maro isa ary olona lava tahaka ny Anakita ireny, nefa naringan’i Jehovah tsy ho eo anoloany izy, ka ny Amonita no nonina nisolo azy, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'araka izay nataony koa ho an’ny taranak’i Esao, izay mitoetra any Seïra, fa nandringana ny Horita tsy ho eo anoloany Izy, ka dia nandroaka azy ireo ka nonina nisolo azy mandraka andro-any; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary ny amin’ny Avita, izay nonina am-bohitra hatrany Gaza, dia naringan’ny Kaftorita, izay avy tany Kaftora, izy; ary ireo no nonina nisolo azy). '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mitsangàna, miaingà, ka mità ny lohasahan-driaka Arnona hianareo; indro, efa natolotro eo an-tànanao Sihona Amorita, mpanjakan’i Hesbona, mbamin’ ny taniny. Santaro ny handovanao azy, ka tafiho. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Anio no vao hataoko mahazo ny firenena ambanin’ny lanitra rehetra ny horohoro sy tahotra anareo, ka raha reny ny lazanao, dia hangovitra sy hangorohoro eo anoloanao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia naniraka olona avy tany an-efitr’i Kedemota aho hankany amin’i Sihona, mpanjakan’i Hesbona, nitondra teny fihavanana hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aoka mba handeha hamaky ny taninao aho; ny làlambe ihany no halehako, ka tsy hivily aho, na ho amin’ny ankavanana, na ho amin’ny ankavia; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'vola no hamidiko hanina aminao hohaniko, ary vola no hamidiko rano aminao hosotroiko; ary handalo fotsiny ihany aho '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '(araka izay nataon’ny taranak’i Esao, izay monina any Seïra sy ny Moabita, izay monina any Ara, tamiko) mandra-pitako an’i Jordana ho any amin’ny tany izay omen’i Jehovah Andriamanitray anay. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa Sihona, mpanjakan’i Hesbona, tsy nety namela antsika handeha hamaky ny taniny; fa Jehovah Andriamanitrao nanamafy ny fony sy nampahaditra ny fanahiny, mba hanolorany azy eo an-tànanao tahaka ny amin’ izao anio izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niteny tamiko hoe Jehovah: Indro, vao manomboka hanolotra an’i Sihona sy ny taniny eo anoloanao Aho; santaro ny handovanao ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nivoaka Sihona mbamin’ny vahoakany rehetra hiady amintsika tao Jahaza. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nanolotra azy teo anoloantsika Jehovah Andriamanitsika, ka nandresy azy sy ny zanany ary ny vahoakany rehetra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nahafaka ny tanànany rehetra tamin’izany andro izany isika ka nandringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nataontsika herema.
    marker-yv: yv-n
  - type: text
    text: ' ny mponina rehetra tamin’ny isan-tanàna mbamin’ny zaza amim-behivavy; tsy nasiantsika niangana izy na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny biby fiompy sy ny fananany tao amin’ny tanàna izay afatsika ihany no nataontsika ho babo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, dia hatramin’ny tanàna izay ao an-dohasaha ka hatrany Gileada, dia tsy nisy tanàna tsy afatsika; fa izy rehetra dia natolotr’i Jehovah Andriamanitsika teo anoloantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Kanefa ny tanin’ny taranak’i Amona no tsy nakekenareo, dia ny tany amoron’ny lohasahan-driaka Jaboka, sy ny tanàna ao amin’ny tany havoana, ary izay rehetra nandraran’i Jehovah Andriamanitsika antsika.
