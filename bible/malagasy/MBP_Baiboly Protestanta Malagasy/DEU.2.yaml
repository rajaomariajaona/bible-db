document_id: DEU.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: Dia niverina isika ka nandeha tany an-efitra tamin’ny làlana mankany amin’ny Ranomasina Mena, araka izay nolazain’i Jehovah tamiko; ary nanodidina ny tendrombohitra Seïra ela ihany isika.
  '10':
  - type: text
    content: 'Ny Emima nonina tany fahiny, dia firenena lehibe sy maro isa ary olona lava tahaka ny Anakita. '
  '11':
  - type: text
    content: 'Ireo koa no natao ho Refaïta tany aloha tahaka ny Anakita; fa ny Moabita kosa nanao azy hoe Emima. '
  '12':
  - type: text
    content: 'Ary ny tany Seïra dia nonenan’ny Horita, fa ny taranak’i Esao nandroaka azy ka nandringana azy tsy ho eo anoloany, dia nonina nisolo azy, araka ny nataon’ny Isiraely tao amin’ny tany izay nomen’i Jehovah azy ho lovany.) '
  '13':
  - type: text
    content: Ary miaingà hianareo ankehitriny, ka mandehana mita ny lohasahan-driaka Zareda. Dia nita ny lohasahan-driaka Zareda isika.
  '14':
  - type: text
    content: 'Ary ny andro nandehanantsika hatrany Kadesi-barnea ka hatramin’ ny nitantsika ny lohasahan-driaka Zareda dia valo amby telo-polo taona, mandra-pahalany ritran’ny mpanafika rehetra tamin’izany taranaka rehetra izany ka tsy nisy intsony teo amin’ny toby, araka izay efa nianianan’i Jehovah taminy. '
  '15':
  - type: text
    content: Ary koa, ny tànan’i Jehovah dia namely azy handringanana azy mandra-pahalany ritrany ka tsy nisy intsony teo amin’ny toby.
  '16':
  - type: text
    content: 'Ary rehefa lany ritra ny mpanafika ka maty avokoa, '
  '17':
  - type: text
    content: 'dia niteny tamiko Jehovah ka nanao hoe: '
  '18':
  - type: text
    content: 'Ankehitriny efa hamaky ny tany Moaba hianao ka hahazo any Ara, '
  '19':
  - type: text
    content: 'dia ho tonga ao akaikin’ny taranak’i Amona, nefa aza mandrafy azy, na mila ady Aminy; fa tsy hanomezako ho lovanao ny tanin’ny taranak’i Amona, satria nomeko ho lovan’ny taranak’i Lota izany. ( '
  '2':
  - type: text
    content: 'Dia niteny tamiko Jehovah ka nanao hoe: '
  '20':
  - type: text
    content: 'Izany koa no natao ho tanin’ny Refaïta; fa ny Refaïta no nitoetra tao tany aloha ka nataon’ny Amonita hoe Zamzomita. '
  '21':
  - type: text
    content: 'Firenena lehibe sy maro isa ary olona lava tahaka ny Anakita ireny, nefa naringan’i Jehovah tsy ho eo anoloany izy, ka ny Amonita no nonina nisolo azy, '
  '22':
  - type: text
    content: 'araka izay nataony koa ho an’ny taranak’i Esao, izay mitoetra any Seïra, fa nandringana ny Horita tsy ho eo anoloany Izy, ka dia nandroaka azy ireo ka nonina nisolo azy mandraka andro-any; '
  '23':
  - type: text
    content: 'ary ny amin’ny Avita, izay nonina am-bohitra hatrany Gaza, dia naringan’ny Kaftorita, izay avy tany Kaftora, izy; ary ireo no nonina nisolo azy). '
  '24':
  - type: text
    content: 'Mitsangàna, miaingà, ka mità ny lohasahan-driaka Arnona hianareo; indro, efa natolotro eo an-tànanao Sihona Amorita, mpanjakan’i Hesbona, mbamin’ ny taniny. Santaro ny handovanao azy, ka tafiho. '
  '25':
  - type: text
    content: Anio no vao hataoko mahazo ny firenena ambanin’ny lanitra rehetra ny horohoro sy tahotra anareo, ka raha reny ny lazanao, dia hangovitra sy hangorohoro eo anoloanao izy.
  '26':
  - type: text
    content: 'Dia naniraka olona avy tany an-efitr’i Kedemota aho hankany amin’i Sihona, mpanjakan’i Hesbona, nitondra teny fihavanana hoe: '
  '27':
  - type: text
    content: 'Aoka mba handeha hamaky ny taninao aho; ny làlambe ihany no halehako, ka tsy hivily aho, na ho amin’ny ankavanana, na ho amin’ny ankavia; '
  '28':
  - type: text
    content: 'vola no hamidiko hanina aminao hohaniko, ary vola no hamidiko rano aminao hosotroiko; ary handalo fotsiny ihany aho '
  '29':
  - type: text
    content: '(araka izay nataon’ny taranak’i Esao, izay monina any Seïra sy ny Moabita, izay monina any Ara, tamiko) mandra-pitako an’i Jordana ho any amin’ny tany izay omen’i Jehovah Andriamanitray anay. '
  '3':
  - type: text
    content: 'Aoka izay ny nandehananareo nanodidina ity tendrombohitra ity, fa miverena hianavaratra hianareo. '
  '30':
  - type: text
    content: Fa Sihona, mpanjakan’i Hesbona, tsy nety namela antsika handeha hamaky ny taniny; fa Jehovah Andriamanitrao nanamafy ny fony sy nampahaditra ny fanahiny, mba hanolorany azy eo an-tànanao tahaka ny amin’ izao anio izao.
  '31':
  - type: text
    content: 'Dia niteny tamiko hoe Jehovah: Indro, vao manomboka hanolotra an’i Sihona sy ny taniny eo anoloanao Aho; santaro ny handovanao ny taniny. '
  '32':
  - type: text
    content: 'Dia nivoaka Sihona mbamin’ny vahoakany rehetra hiady amintsika tao Jahaza. '
  '33':
  - type: text
    content: 'Dia nanolotra azy teo anoloantsika Jehovah Andriamanitsika, ka nandresy azy sy ny zanany ary ny vahoakany rehetra isika. '
  '34':
  - type: text
    content: Ary nahafaka ny tanànany rehetra tamin’izany andro izany isika ka nandringana
  - type: note
    content: Heb. nataontsika herema.
  - type: text
    content: ' ny mponina rehetra tamin’ny isan-tanàna mbamin’ny zaza amim-behivavy; tsy nasiantsika niangana izy na dia iray akory aza. '
  '35':
  - type: text
    content: 'Ny biby fiompy sy ny fananany tao amin’ny tanàna izay afatsika ihany no nataontsika ho babo. '
  '36':
  - type: text
    content: 'Hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, dia hatramin’ny tanàna izay ao an-dohasaha ka hatrany Gileada, dia tsy nisy tanàna tsy afatsika; fa izy rehetra dia natolotr’i Jehovah Andriamanitsika teo anoloantsika. '
  '37':
  - type: text
    content: Kanefa ny tanin’ny taranak’i Amona no tsy nakekenareo, dia ny tany amoron’ny lohasahan-driaka Jaboka, sy ny tanàna ao amin’ny tany havoana, ary izay rehetra nandraran’i Jehovah Andriamanitsika antsika.
  '4':
  - type: text
    content: 'Ary mandidia ny olona hoe: Hianareo efa handeha hamaky ny tanin’ny taranak’i Esao rahalahinareo, izay monina any Seïra; dia hatahotra anareo izy; nefa mitandrema tsara hianareo, '
  '5':
  - type: text
    content: 'ka aza mila ady aminy; fa tsy hanomezako anao ny taniny, na dia eram-paladia akory aza, satria nomeko ho lovan’i Esao ny tendrombohitra Seïra. '
  '6':
  - type: text
    content: 'Vola no hamidinareo hanina aminy hohaninareo; ary vola koa no hamidinareo rano aminy hosotroinareo. '
  '7':
  - type: text
    content: 'Fa Jehovah Andriamanitrao efa nitahy anao tamin’izay rehetra nataon’ny tànanao; fantany ny nandehananao namaky ity efitra lehibe ity; izay efa-polo taona izay Jehovah Andriamanitrao no teo aminao, ka tsy nanan-java-mahory akory hianao. '
  '8':
  - type: text
    content: Ary raha nandalo ny taranak’i Esao rahalahintsika izay monina any Seïra isika ary niala tamin’ny làlana amin’ny tani-hay
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' sy tao Elata ary i Ezion-gebera, dia nivily isika ka nandeha tamin’ny làlana mankany amin’ny efitr’i Moaba.'
  '9':
  - type: text
    content: 'Dia hoy Jehovah tamiko: Aza mandrafy ny Moabita, na mila ady aminy, fa tsy hanomezako ho lovanao ny taniny, satria Ara dia nomeko ho lovan’ny taranak’i Lota. ( '
