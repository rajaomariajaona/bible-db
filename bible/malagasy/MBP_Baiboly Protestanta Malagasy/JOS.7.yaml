document_id: JOS.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahotan’i Akana sy ny namonoana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FA ny Zanak’Isiraely nandika ny didy ny amin’ny zavatra voaozona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii. 28.
    marker-yv: yv-n
  - type: text
    text: ; fa Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny firenen’i Joda, naka tamin’ny zavatra efa voaozona, ka dia nirehitra tamin’ny Zanak’Isiraely ny fahatezeran’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Josoa naniraka olona hiala tany Jeriko hankany Ay, izay eo anilan’i Betavena, atsinanan’i Betela, ka niteny taminy hoe: Miakara, ka safoy ny tany. Dia niakatra ny olona ka nisafo an’i Ay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niverina tany amin’i Josoa izy ireo ka nanao taminy hoe: Aoka tsy hiakatra avokoa ny vahoaka rehetra; fa olona tokony ho roa arivo na telo arivo no aoka hiakatra hamely an’i Ay; aza manasatra ny vahoaka rehetra hankany, fa vitsy ihany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niakatra nankany ny olona sasany, tokony ho telo arivo lahy; kanjo nandositra teo anoloan’ny mponina tao Ay ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nahafaty tokony ho enina amby telo-polo lahy ny mponina tao Ay sady nanenjika azy teo anoloan’ny vavahady ka hatrany Sebarima izy ary namely azy teny am-pidinana; dia ketraka ny fon’ny vahoaka ka tonga tahaka ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia notriarin’i Josoa ny fitafiany, ka niankohoka tamin’ny tany teo anoloan’ny fiaran’i Jehovah mandra-paharivan’ny andro izy sy ny loholon’ny Isiraely, sady nasiany vovoka ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Josoa: Indrisy, Jehovah Tompo ô! nahoana no nampita ity firenena ity foana teo Jordana Hianao, hanoloranao anay eo an-tànan’ny Amorita handringanana anay? Inay anie izahay mba nety nitoetra tany an-dafin’i Jordana ihany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indrisy, Tompo ô! inona intsony no holazaiko, fa ny Isiraely efa niamboho teo anoloan’ny fahavalony? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ho ren’ny Kananita sy ny mponina rehetra amin’ny tany izany, dia hanodidina anay izy ka hamono ny anaranay tsy ho eo amin’ny tany intsony; ary hataonao ahoana ny anaranao lehibe?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Josoa: Mitsangàna; nahoana no miankohoka toy izao hianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Efa nanota ny Isiraely ka nivadika ny fanekeko izay nandidiako azy; fa efa naka tamin’ny zavatra voaozona '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'herema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvii. 28.
    marker-yv: yv-n
  - type: text
    text: 'izy, sady nangalatra sy namitaka koa, ka nataony ao amin’ny entany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa tsy mahajanona eo anoloan’ny fahavalony ny Zanak’Isiraely; miamboho eo anoloan’ny fahavalony izy, satria tonga voaozona. Tsy homba anareo intsony Aho, raha tsy holevonina tsy ho eo aminareo ny zavatra efa voaozona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mitsangàna, manamasìna ny vahoaka, ka lazao hoe: Manamasìna ny tenanareo mandra-pahamaraina; fa izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Eo aminao misy zavatra efa voaozona, ry Isiraely ô; koa tsy mahajanona eo anoloan’ny fahavalonao hianao mandra-panaisotrareo ny zavatra efa voaozona tsy ho eo aminareo intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hampanatonina hianareo raha maraina araka ny firenenareo avy; koa ny firenena izay tanan’i Jehovah dia hanatona isam-pokony; ary ny foko izay tanan’i Jehovah dia hanatona indray isam-pianakaviana; ary ny fianakaviana izay tanan’i Jehovah dia hanatona indray isam-batan’olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izay azo mitana ny zavatra voazona, dia hodorana amin’ny afo izy mbamin’izay rehetra mety ho azy, satria nivadika ny faneken’i Jehovah izy ka nanao izay fady indrindra '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahadalana.
    marker-yv: yv-n
  - type: text
    text: teo amin’ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifoha maraina koa Josoa ka nampanatona ny Isiraely araka ny fireneny avy; ary ny firenen’i Joda no notanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nitondra ireo fokon’i Joda izy; ka ny fianakavian’i Zera no notanana; dia nampanatona ny fianakavian’i Zera indray isam-batan’olona izy, ka Zabdy no notanana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia nampanatona ny ankohonany araka ny olona tsirairay izy; dia Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny firenen’i Joda, no notanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy Josoa tamin’i Akana: Anaka, masìna hianao, omeo voninahitra Jehovah-Andriamanitry ny Isiraely, ka mitsora aminy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miderà Azy.
    marker-yv: yv-n
  - type: text
    text: ; ary lazao amiko ankehitriny izay nataonao; aza afeninao ahy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Akana namaly an’i Josoa ka nanao hoe: Eny tokoa, izaho no nanota tamin’i Jehovah, Andriamanitry ny Isiraely, ary izao ka izao no nataoko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nahita kapôty tsara avy any Babylona aho sy sekely volafotsy roan-jato ary anja-bolamena, lanjan-tsekely dimam-polo, tamin’ny babo, dia nitsiriritra ireny aho ka naka; ary, indreo, voàfina ao ambanin’ny tany ao amin’ny laiko ireny, ary ny volafotsy ao ambaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia naniraka olona Josoa, ka nihazakazaka nankany amin’ny lay ireo, ary, indro, voàfina tao anatin’ny lainy ny zavatra, ary ny volafotsy tao ambaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nalainy avy tao amin’ny lay ireny ka nentiny teo amin’i Josoa sy ny Zanak’Isiraely rehetra, ary napetrany teo anatrehan’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nalain’i Josoa sy ny Isiraely rehetra Akana, zanak’i Zera, ary ny volafotsy sy ny kapôty sy ny anja-bolamena ary ny zanani-lahy sy ny zanani-vavy ary ny ombiny sy ny borikiny sy ny ondriny aman-osiny ary ny lainy mbamin’izay rehetra nety ho azy; dia nentiny ho ao an-dohasaha Akora ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Josoa: Adray ny loza nampidirinao taminay! Mba hahatonga loza aminao kosa Jehovah anio. Dia nitora-bato azy ny Isiraely rehetra ary nandoro ireny tamin’ny afo sady nanangom-bato teo amboniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nanao antontam-bato lehibe hanarona azy mandraka andro-any izy. Ary Jehovah dia nionona tamin’ny fahatezerany mirehitra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no nanaovana ny anaran’izany tany mandraka andro-any hoe Lohasaha Akora.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Akora = Fampidiran-doza.
    marker-yv: yv-n
