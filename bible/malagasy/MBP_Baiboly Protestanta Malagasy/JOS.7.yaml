document_id: JOS.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahotan’i Akana sy ny namonoana azy.
  - type: text
    content: FA ny Zanak’Isiraely nandika ny didy ny amin’ny zavatra voaozona
  - type: note
    content: Heb. herema; izahao Lev. xxvii. 28.
  - type: text
    content: ; fa Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny firenen’i Joda, naka tamin’ny zavatra efa voaozona, ka dia nirehitra tamin’ny Zanak’Isiraely ny fahatezeran’i Jehovah.
  '10':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Josoa: Mitsangàna; nahoana no miankohoka toy izao hianao? '
  '11':
  - type: text
    content: 'Efa nanota ny Isiraely ka nivadika ny fanekeko izay nandidiako azy; fa efa naka tamin’ny zavatra voaozona '
  - type: note
    content: Heb. herema; izahao Lev. xxvii. 28.
  - type: text
    content: 'izy, sady nangalatra sy namitaka koa, ka nataony ao amin’ny entany. '
  '12':
  - type: text
    content: 'Koa tsy mahajanona eo anoloan’ny fahavalony ny Zanak’Isiraely; miamboho eo anoloan’ny fahavalony izy, satria tonga voaozona. Tsy homba anareo intsony Aho, raha tsy holevonina tsy ho eo aminareo ny zavatra efa voaozona. '
  '13':
  - type: text
    content: 'Mitsangàna, manamasìna ny vahoaka, ka lazao hoe: Manamasìna ny tenanareo mandra-pahamaraina; fa izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Eo aminao misy zavatra efa voaozona, ry Isiraely ô; koa tsy mahajanona eo anoloan’ny fahavalonao hianao mandra-panaisotrareo ny zavatra efa voaozona tsy ho eo aminareo intsony. '
  '14':
  - type: text
    content: 'Dia hampanatonina hianareo raha maraina araka ny firenenareo avy; koa ny firenena izay tanan’i Jehovah dia hanatona isam-pokony; ary ny foko izay tanan’i Jehovah dia hanatona indray isam-pianakaviana; ary ny fianakaviana izay tanan’i Jehovah dia hanatona indray isam-batan’olona. '
  '15':
  - type: text
    content: 'Koa izay azo mitana ny zavatra voazona, dia hodorana amin’ny afo izy mbamin’izay rehetra mety ho azy, satria nivadika ny faneken’i Jehovah izy ka nanao izay fady indrindra '
  - type: note
    content: Heb. fahadalana.
  - type: text
    content: teo amin’ny Isiraely.
  '16':
  - type: text
    content: 'Dia nifoha maraina koa Josoa ka nampanatona ny Isiraely araka ny fireneny avy; ary ny firenen’i Joda no notanana. '
  '17':
  - type: text
    content: 'Dia nitondra ireo fokon’i Joda izy; ka ny fianakavian’i Zera no notanana; dia nampanatona ny fianakavian’i Zera indray isam-batan’olona izy, ka Zabdy no notanana; '
  '18':
  - type: text
    content: dia nampanatona ny ankohonany araka ny olona tsirairay izy; dia Akana, zanak’i Karmy, zanak’i Zabdy, zanak’i Zera, avy tamin’ny firenen’i Joda, no notanana.
  '19':
  - type: text
    content: 'Dia hoy Josoa tamin’i Akana: Anaka, masìna hianao, omeo voninahitra Jehovah-Andriamanitry ny Isiraely, ka mitsora aminy'
  - type: note
    content: 'Na: miderà Azy.'
  - type: text
    content: ; ary lazao amiko ankehitriny izay nataonao; aza afeninao ahy izany.
  '2':
  - type: text
    content: 'Ary Josoa naniraka olona hiala tany Jeriko hankany Ay, izay eo anilan’i Betavena, atsinanan’i Betela, ka niteny taminy hoe: Miakara, ka safoy ny tany. Dia niakatra ny olona ka nisafo an’i Ay. '
  '20':
  - type: text
    content: 'Ary Akana namaly an’i Josoa ka nanao hoe: Eny tokoa, izaho no nanota tamin’i Jehovah, Andriamanitry ny Isiraely, ary izao ka izao no nataoko: '
  '21':
  - type: text
    content: Nahita kapôty tsara avy any Babylona aho sy sekely volafotsy roan-jato ary anja-bolamena, lanjan-tsekely dimam-polo, tamin’ny babo, dia nitsiriritra ireny aho ka naka; ary, indreo, voàfina ao ambanin’ny tany ao amin’ny laiko ireny, ary ny volafotsy ao ambaniny.
  '22':
  - type: text
    content: 'Dia naniraka olona Josoa, ka nihazakazaka nankany amin’ny lay ireo, ary, indro, voàfina tao anatin’ny lainy ny zavatra, ary ny volafotsy tao ambaniny. '
  '23':
  - type: text
    content: Dia nalainy avy tao amin’ny lay ireny ka nentiny teo amin’i Josoa sy ny Zanak’Isiraely rehetra, ary napetrany teo anatrehan’i Jehovah.
  '24':
  - type: text
    content: 'Dia nalain’i Josoa sy ny Isiraely rehetra Akana, zanak’i Zera, ary ny volafotsy sy ny kapôty sy ny anja-bolamena ary ny zanani-lahy sy ny zanani-vavy ary ny ombiny sy ny borikiny sy ny ondriny aman-osiny ary ny lainy mbamin’izay rehetra nety ho azy; dia nentiny ho ao an-dohasaha Akora ireny. '
  '25':
  - type: text
    content: 'Ary hoy Josoa: Adray ny loza nampidirinao taminay! Mba hahatonga loza aminao kosa Jehovah anio. Dia nitora-bato azy ny Isiraely rehetra ary nandoro ireny tamin’ny afo sady nanangom-bato teo amboniny. '
  '26':
  - type: text
    content: Dia nanao antontam-bato lehibe hanarona azy mandraka andro-any izy. Ary Jehovah dia nionona tamin’ny fahatezerany mirehitra.
  - type: text
    content: Izany no nanaovana ny anaran’izany tany mandraka andro-any hoe Lohasaha Akora.
  - type: note
    content: Akora = Fampidiran-doza.
  '3':
  - type: text
    content: 'Ary niverina tany amin’i Josoa izy ireo ka nanao taminy hoe: Aoka tsy hiakatra avokoa ny vahoaka rehetra; fa olona tokony ho roa arivo na telo arivo no aoka hiakatra hamely an’i Ay; aza manasatra ny vahoaka rehetra hankany, fa vitsy ihany izy.'
  '4':
  - type: text
    content: 'Dia niakatra nankany ny olona sasany, tokony ho telo arivo lahy; kanjo nandositra teo anoloan’ny mponina tao Ay ireo. '
  '5':
  - type: text
    content: Dia nahafaty tokony ho enina amby telo-polo lahy ny mponina tao Ay sady nanenjika azy teo anoloan’ny vavahady ka hatrany Sebarima izy ary namely azy teny am-pidinana; dia ketraka ny fon’ny vahoaka ka tonga tahaka ny rano.
  '6':
  - type: text
    content: 'Dia notriarin’i Josoa ny fitafiany, ka niankohoka tamin’ny tany teo anoloan’ny fiaran’i Jehovah mandra-paharivan’ny andro izy sy ny loholon’ny Isiraely, sady nasiany vovoka ny lohany. '
  '7':
  - type: text
    content: 'Ary hoy Josoa: Indrisy, Jehovah Tompo ô! nahoana no nampita ity firenena ity foana teo Jordana Hianao, hanoloranao anay eo an-tànan’ny Amorita handringanana anay? Inay anie izahay mba nety nitoetra tany an-dafin’i Jordana ihany! '
  '8':
  - type: text
    content: 'Indrisy, Tompo ô! inona intsony no holazaiko, fa ny Isiraely efa niamboho teo anoloan’ny fahavalony? '
  '9':
  - type: text
    content: Ary ho ren’ny Kananita sy ny mponina rehetra amin’ny tany izany, dia hanodidina anay izy ka hamono ny anaranay tsy ho eo amin’ny tany intsony; ary hataonao ahoana ny anaranao lehibe?
