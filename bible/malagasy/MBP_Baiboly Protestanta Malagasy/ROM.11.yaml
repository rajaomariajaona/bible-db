document_id: ROM.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mbola handraisana ny Jiosy indray rahatrizay.
  - type: text
    content: 'DIA hoy izaho: Sao narian’Andriamanitra anie ny olony? Sanatria izany! fa izaho koa mba Israelita’ taranak’i Abrahama ihany, avy amin’ny firenen’i Benjamina. '
  '10':
  - type: text
    content: Aoka ny masony ho jamba tsy hahita,
  - type: text
    content: Ary aoka hamokoka mandrakariva izy’’ (Sal. 69.22, 23).
  '11':
  - type: text
    content: 'Dia hoy izaho: Sao dia tafintohina ho lavo anie ny Isiraely? Sanatria izany! Fa ny fahatafintohinany no nahatonga famonjena ho an’ny jentilisa mba hampialona azy. '
  '12':
  - type: text
    content: Ary raha ny fahatafintohinany no tonga haren’izao tontolo izao, ary ny nihenany, no tonga haren’ny jentilisa, mainka fa ny hafenoany.
  '13':
  - type: text
    content: 'Fa hianareo jentilisa no itenenako. Koa satria Apostolin’ny jentilisa aho, dia mankalaza ny fanompoako, '
  '14':
  - type: text
    content: raha mba misy hahazoako hampialona ireo mifanapa-tsinay amiko,
  - type: note
    content: Gr. ny nofoko.
  - type: text
    content: ' mba hamonjeko ny sasany aminy. '
  '15':
  - type: text
    content: Fa raha ny fanariana azy no fampihavanana izao tontolo izao, tsy ho fitsanganana
  - type: note
    content: Gr. fiainana.
  - type: text
    content: ' amin’ny maty va ny fandraisana azy?'
  '16':
  - type: text
    content: 'Ary koa, raha masina ny santatra, dia masina koa ny vongany; ary raha masina ny fàkany, dia masina koa ny sampany. '
  '17':
  - type: text
    content: Fa raha notapahina ny sampany sasany, ary hianao izay tahaka ny hazo oliva maniry ho azy kosa no natsofoka teo aminy ka mba niombona ny fàkan’ny menaky
  - type: note
    content: 'Na: [fàkany sy ny menaky].'
  - type: text
    content: ' ny hazo oliva, '
  '18':
  - type: text
    content: 'dia aza mirehareha amin’ny sampany; fa raha mirehareha hianao, tsy hianao no mitondra ny fàkany, fa ny fàkany no mitondra anao. '
  '19':
  - type: text
    content: 'Ary hianao dia hanao hoe: Notapahina ny sampany sasany hanatsofohana ahy. '
  '2':
  - type: text
    content: 'Andriamanitra tsy nanary ny olony izay efa fantany rahateo; sa tsy fantatrareo izay lazain’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' eo amin’ny tantaran’i Elia, dia ilay fitarainany tamin’Andriamanitra nentiny namely ny Isiraely hoe: '
  '20':
  - type: text
    content: 'Marina ihany izany: ny tsi-finoany no nanapahana azy, ary ny finoanao kosa no itoeranao. Aza miavonavona, fa matahora; '
  '21':
  - type: text
    content: fa raha ny tena sampany aza tsy navelan’Andriamanitra, dia tsy havelany koa hianao.
  '22':
  - type: text
    content: 'Koa indro ny fahamoram-panahin’Andriamanitra sy ny fahasaro-pony: amin’izay lavo dia fahasaro-po; fa aminao kosa dia fahamoram-panahin’Andriamanitra, raha maharitra ao amin’ny fahamoram-panahiny hianao; fa raha tsy izany, dia hotapahina koa hianao. '
  '23':
  - type: text
    content: 'Ary ireny kosa, raha tsy mikikitra eo amin’ny tsi-finoana, dia hatsofoka ihany: fa azon’Andriamanitra atsofoka indray izy. '
  '24':
  - type: text
    content: Fa raha notapahina tamin’ny hazo oliva naniry ho azy hianao ka natsofoka tamin’ny hazo oliva tsara, nefa tsy tena sampany, mainka fa izay tena sampany no hatsofoka amin’ny hazo oliva nanapahana azy.
  '25':
  - type: text
    content: 'Fa tsy tiako tsy ho fantatrareo izany zava-miafina izany, ry rahalahy (fandrao mihevitra ny tenanareo ho hendry hianareo), fa efa misy fahamafiam-po manjo ny Isiraely sasany mandra-piditry ny hafenoan’ny jentilisa; '
  '26':
  - type: text
    content: 'ary amin’izany dia hovonjena avokoa ny Isiraely rehetra,–araka ny voasoratra hoe:'
  - type: text
    content: ',,Hivoaka avy any Ziona ny Mpanafaka,'
  - type: text
    content: Ary hampiala ny haratsiam-panahy amin’i Jakoba Izy;
  '27':
  - type: text
    content: Ary izao no fanekeko aminy,
  - type: text
    content: Raha manaisotra ny fahotany Aho’’ (Isa. 59.20, 21; 27.9).
  '28':
  - type: text
    content: 'Raha ny amin’ny filazantsara dia fahavalo izy noho ny aminareo; fa raha ny amin’ny fifidianana kosa dia malala izy noho ny amin’ny razana. '
  '29':
  - type: text
    content: 'Fa ny fanomezam-pahasoavana sy ny fiantsoan’Andriamanitra dia tsy misy hanenenany. '
  '3':
  - type: text
    content: ',,Jehovah ô, efa namono ny mpaminaninao sy nandrava ny alitaranao izy: ary izaho irery ihany no sisa, ka mitady ny aiko koa izy’’? (1Mpan. 19.14). '
  '30':
  - type: text
    content: 'Fa tahaka anareo izay tsy nanaiky an’Andriamanitra fahiny, nefa ankehitriny ny tsi-faneken’ireny no nahazoanareo famindrampo, '
  '31':
  - type: text
    content: 'dia toy izany kosa ankehitriny, tsy nanaiky ireny, mba hahazoany famindrampo ankehitriny noho ny famindrampo azonareo. '
  '32':
  - type: text
    content: Fa Andriamanitra nanidy azy rehetra tamin’ny tsi-fanekena, mba hamindrany fo amin’izy rehetra.
  '33':
  - type: text
    content: Endrey ny halalin’ny haren’Andriamanitra sy ny fahendreny
  - type: note
    content: 'Na: ny haren’ny fahendren’Andriamanitra.'
  - type: text
    content: ' ary ny fahalalany! ny fitsarany tsy hita lany, ary ny làlany tsy azo fantarina! '
  '34':
  - type: text
    content: 'Fa ,,iza no nahalala ny sain’i Jehovah? ary iza no mpanolo-tsaina Azy?’’ (Isa. 40.13) '
  '35':
  - type: text
    content: 'Na iza no nanome Azy aloha hamaliana azy indray? '
  '36':
  - type: text
    content: Fa Izy no nihavian’izao zavatra rehetra izao, ary Izy no mihazona azy, sady Izy koa no antony; Izy anie no homem-boninahitra mandrakizay. Amena.
  '4':
  - type: text
    content: 'Fa ahoana no navalin’Andriamanitra azy? ,,Izaho efa niaro fito arivo lahy ho Ahy, dia izay tsy mba nandohalika tamin’i Bala’’ (1Mpan. 19.18).) '
  '5':
  - type: text
    content: 'Dia toy izany koa amin’izao andro ankehitriny izao misy sisa ihany araka ny fifidianana amin’ny fahasoavana. '
  '6':
  - type: text
    content: Ary raha avy amin’ny fahasoavana izany, dia tsy mba avy amin’ny asa intsony; fa raha izany, dia tsy fahasoavana intsony ny fahasoavana.
  '7':
  - type: text
    content: 'Ahoana ary? Izay notadiavin’ny Isiraely dia tsy azony, fa ny voafidy ihany no nahazo izany, fa nohamafina kosa ny fon’ny sisa; '
  '8':
  - type: text
    content: 'araka ny voasoratra hoe: ,,Andriamanitra efa nanome azy fanahy sondrian-tory sy maso tsy hahita, ary sofina tsy hahare, mandraka andro-any’’ (Isa. 29.10; Deo. 29.3). '
  '9':
  - type: text
    content: 'Ary hoy Davida:'
  - type: text
    content: ',,Aoka ny latabany ho fandrika sy ho tonta'
  - type: text
    content: Ary ho fahatafintohinana sy ho famaliana azy;
