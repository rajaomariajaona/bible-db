document_id: ROM.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny mbola handraisana ny Jiosy indray rahatrizay.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA hoy izaho: Sao narian’Andriamanitra anie ny olony? Sanatria izany! fa izaho koa mba Israelita’ taranak’i Abrahama ihany, avy amin’ny firenen’i Benjamina. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny masony ho jamba tsy hahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hamokoka mandrakariva izy’’ (Sal. 69.22, 23).
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izaho: Sao dia tafintohina ho lavo anie ny Isiraely? Sanatria izany! Fa ny fahatafintohinany no nahatonga famonjena ho an’ny jentilisa mba hampialona azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha ny fahatafintohinany no tonga haren’izao tontolo izao, ary ny nihenany, no tonga haren’ny jentilisa, mainka fa ny hafenoany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hianareo jentilisa no itenenako. Koa satria Apostolin’ny jentilisa aho, dia mankalaza ny fanompoako, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: raha mba misy hahazoako hampialona ireo mifanapa-tsinay amiko,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny nofoko.
      marker-yv: yv-n
    - type: text
      text: ' mba hamonjeko ny sasany aminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha ny fanariana azy no fampihavanana izao tontolo izao, tsy ho fitsanganana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiainana.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny maty va ny fandraisana azy?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa, raha masina ny santatra, dia masina koa ny vongany; ary raha masina ny fàkany, dia masina koa ny sampany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha notapahina ny sampany sasany, ary hianao izay tahaka ny hazo oliva maniry ho azy kosa no natsofoka teo aminy ka mba niombona ny fàkan’ny menaky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[fàkany sy ny menaky].'
      marker-yv: yv-n
    - type: text
      text: ' ny hazo oliva, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia aza mirehareha amin’ny sampany; fa raha mirehareha hianao, tsy hianao no mitondra ny fàkany, fa ny fàkany no mitondra anao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hianao dia hanao hoe: Notapahina ny sampany sasany hanatsofohana ahy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra tsy nanary ny olony izay efa fantany rahateo; sa tsy fantatrareo izay lazain’ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' eo amin’ny tantaran’i Elia, dia ilay fitarainany tamin’Andriamanitra nentiny namely ny Isiraely hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marina ihany izany: ny tsi-finoany no nanapahana azy, ary ny finoanao kosa no itoeranao. Aza miavonavona, fa matahora; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa raha ny tena sampany aza tsy navelan’Andriamanitra, dia tsy havelany koa hianao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa indro ny fahamoram-panahin’Andriamanitra sy ny fahasaro-pony: amin’izay lavo dia fahasaro-po; fa aminao kosa dia fahamoram-panahin’Andriamanitra, raha maharitra ao amin’ny fahamoram-panahiny hianao; fa raha tsy izany, dia hotapahina koa hianao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireny kosa, raha tsy mikikitra eo amin’ny tsi-finoana, dia hatsofoka ihany: fa azon’Andriamanitra atsofoka indray izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha notapahina tamin’ny hazo oliva naniry ho azy hianao ka natsofoka tamin’ny hazo oliva tsara, nefa tsy tena sampany, mainka fa izay tena sampany no hatsofoka amin’ny hazo oliva nanapahana azy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy tiako tsy ho fantatrareo izany zava-miafina izany, ry rahalahy (fandrao mihevitra ny tenanareo ho hendry hianareo), fa efa misy fahamafiam-po manjo ny Isiraely sasany mandra-piditry ny hafenoan’ny jentilisa; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary amin’izany dia hovonjena avokoa ny Isiraely rehetra,–araka ny voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Hivoaka avy any Ziona ny Mpanafaka,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampiala ny haratsiam-panahy amin’i Jakoba Izy;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izao no fanekeko aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manaisotra ny fahotany Aho’’ (Isa. 59.20, 21; 27.9).
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Raha ny amin’ny filazantsara dia fahavalo izy noho ny aminareo; fa raha ny amin’ny fifidianana kosa dia malala izy noho ny amin’ny razana. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa ny fanomezam-pahasoavana sy ny fiantsoan’Andriamanitra dia tsy misy hanenenany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ',,Jehovah ô, efa namono ny mpaminaninao sy nandrava ny alitaranao izy: ary izaho irery ihany no sisa, ka mitady ny aiko koa izy’’? (1Mpan. 19.14). '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa tahaka anareo izay tsy nanaiky an’Andriamanitra fahiny, nefa ankehitriny ny tsi-faneken’ireny no nahazoanareo famindrampo, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'dia toy izany kosa ankehitriny, tsy nanaiky ireny, mba hahazoany famindrampo ankehitriny noho ny famindrampo azonareo. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Fa Andriamanitra nanidy azy rehetra tamin’ny tsi-fanekena, mba hamindrany fo amin’izy rehetra.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Endrey ny halalin’ny haren’Andriamanitra sy ny fahendreny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny haren’ny fahendren’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' ary ny fahalalany! ny fitsarany tsy hita lany, ary ny làlany tsy azo fantarina! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ,,iza no nahalala ny sain’i Jehovah? ary iza no mpanolo-tsaina Azy?’’ (Isa. 40.13) '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na iza no nanome Azy aloha hamaliana azy indray? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Izy no nihavian’izao zavatra rehetra izao, ary Izy no mihazona azy, sady Izy koa no antony; Izy anie no homem-boninahitra mandrakizay. Amena.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ahoana no navalin’Andriamanitra azy? ,,Izaho efa niaro fito arivo lahy ho Ahy, dia izay tsy mba nandohalika tamin’i Bala’’ (1Mpan. 19.18).) '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany koa amin’izao andro ankehitriny izao misy sisa ihany araka ny fifidianana amin’ny fahasoavana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha avy amin’ny fahasoavana izany, dia tsy mba avy amin’ny asa intsony; fa raha izany, dia tsy fahasoavana intsony ny fahasoavana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana ary? Izay notadiavin’ny Isiraely dia tsy azony, fa ny voafidy ihany no nahazo izany, fa nohamafina kosa ny fon’ny sisa; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voasoratra hoe: ,,Andriamanitra efa nanome azy fanahy sondrian-tory sy maso tsy hahita, ary sofina tsy hahare, mandraka andro-any’’ (Isa. 29.10; Deo. 29.3). '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Aoka ny latabany ho fandrika sy ho tonta'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho fahatafintohinana sy ho famaliana azy;
