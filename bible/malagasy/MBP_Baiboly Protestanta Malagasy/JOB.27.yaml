document_id: JOB.27,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho azony iravoravoana va ny Tsitoha?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahazo miantso an’Andriamanitra mandrakariva va izy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampianatra anareo ny amin’ny tànan’Andriamanitra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisorona anareo aho ny amin’ny hevitry ny Tsitoha.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo, hianareo rehetra samy efa nahita izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana hianareo no manao hevi-poana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no anjaran’ny ratsy fanahy avy amin’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy lovan’ny lozabe raisiny avy amin’ny Tsihota:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mihamaro aza ny zanany, dia ho an’ny sabatra ihany ireny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zaza aterany tsy ho voky hanina;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ankohonany sisa dia hasitrik’Ifahafatesana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: halevina noho ny areti-mandringana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisaona azy ny mpitondratenany;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mahary volafotsy hoatra ny vovoka aza izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahangona fitafiana hoatra ny fotaka,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manangona ihany izy, nefa ny marina no hitafy izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsy manan-tsiny no hizara ny volafotsy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao ny tranony tahaka ny an’ny lolofotsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny trano rantsan-kazo ataon’ny mpiandry voly;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao avokoa ihany ny hareny, raha vao mandry izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa nony ahirany ny masony, dia tsy ao intsony ireny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha velona koa Andriamanitra, Izay efa nandà tsy hanome ahy ny rariny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny Tsitoha, Izay efa nampangidy ny aiko–
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fampahatahorana mahatratra azy tahaka ny riaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony alina paohin’ny tafio-drivotra izy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rivotra avy any atsinanana mampiainga sy mahalasa azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mipaoka azy hiala amin’ny fitoerany;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asian’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Torahan’, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tifirin’.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' izy ka tsy iantrany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandositra dia mandositra ho afaka amin’ny tànany izy;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tehafin’ny olona tànana izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady isitrisirany ka ampialainy amin’ny fonenany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary ny miray monina aminy aza misitrisitra azy.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola ato anatiko ihany ny aiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eo am-bavoroko ny Fanahin’Andriamanitra–
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hanao teny tsy marina ny molotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hanonom-pitaka ny lelako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sanatria raha hanaiky ny anareo ho marina aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pialan’ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinako dia hazoniko mafy ka tsy ho foiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko tsy manome tsiny ahy akory na dia ny amin’ny andro-ko iray monja aza.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho hita fa ratsy fanahy ny fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy marina izay mitsangana hanohitra ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa inona no fanantenan’ny mpihatsaravelatsihy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
    - type: text
      text: ' raha maito ny ainy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa inona no fanantenan’ny mpihatsaravelatsihy, na dia mahazo harena be aza. Raha, etc.
      marker-yv: yv-n
    - type: text
      text: ' tsoahan’Andriamanitra ny fanahiny?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihaino ny fitarainany va Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ozoim-pahoriana izy?
