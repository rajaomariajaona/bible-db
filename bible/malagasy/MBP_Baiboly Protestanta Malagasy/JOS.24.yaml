document_id: JOS.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny farany nataon’i Josoa tamin’ny olona, sy ny nanaovan’ny olona fanekena mafy fa tsy hiala amin’Andriamanitra.
  - type: text
    content: 'ARY Josoa nanangona ny firenen’ny Isiraely rehetra tany Sekema ka niantso ny loholon’ny Isiraely sy ny lehibeny sy ny mpitsara azy ary ny mpifehy azy, ka dia niara-niseho teo anatrehan’Andriamanitra izy ireo. '
  '10':
  - type: text
    content: Fa tsy nety nihaino an’i Balama Aho, koa nitahy anareo tokoa izy; ka dia namonjy anareo tamin’ny tànany Aho.
  '11':
  - type: text
    content: 'Ary nita an’i Jordana hianareo ka nankany Jeriko; dia niady taminareo ny mponina tao Jeriko mbamin’ny Amorita sy ny Perizita sy ny Kananita sy ny Hetita sy ny Girgasita sy ny Hivita ary ny Jebosita, ka natolotro teo an-tànanareo ireny. '
  '12':
  - type: text
    content: 'Dia nampandehaniko teo anoloanareo ny fanenitra, izay nandroaka azy teo anoloanareo, dia ny mpanjaka roa tamin’ny Amorita, fa tsy tamin’ny sabatrao, na tamin’ny tsipìkanao. '
  '13':
  - type: text
    content: Ary nomeko tany izay tsy nasainareo hianareo sy tanàna izay tsy naorinareo hianareo ka dia nonina tao hianareo; ary nihinana ny avy amin’ny tanimboaloboka sy ny tanin-oliva izay tsy nataonareo hianareo.
  '14':
  - type: text
    content: Koa ankehitriny, matahora an’i Jehovah, ka manompoa Azy amin’ny fahitsiana sy ny fahamarinana; ary ario ny andriamanitra izay notompoin’ny razanareo tany an-dafin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' sy tany Fgypta, ka manompoa an’i Jehovah. '
  '15':
  - type: text
    content: Nefa raha tsy sitrakareo ny hanompo an’i Jehovah, dia fidionareo anio ary izay hotompoinareo, na ny andriamanitra izay notompoin’ny razanareo tany an-dafin’ny Ony,
  - type: note
    content: Eofrata.
  - type: text
    content: ' na ny andriamanitry ny Amorita, izay mponina teto amin’ny tany onenanareo fa raha izaho sy ny ankohonako kosa, dia hanompo an’i Jehovah izahay.'
  '16':
  - type: text
    content: 'Dia namaly ny vahoaka ka nanao hoe: Sanatria raha hahafoy an’i Jehovah izahay ka hanompo izay andriamani-kafa. '
  '17':
  - type: text
    content: 'Fa Jehovah Andriamanitsika, Izy no nitondra antsika sy ny razantsika nivoaka avy tany amin’ny tany Egypta, tany amin’ny trano nahandevozana, ary Izy no nanao ireny famantarana lehibe ireny teo imasontsika ka niaro antsika teny amin’ny làlana rehetra nalehantsika sy teny amin’ny firenena rehetra izay notetezintsika. '
  '18':
  - type: text
    content: Ary Jehovah nandroaka ny firenena rehetra teo anoloantsika, dia ny Amorita izay nonina teto amin’ny tany; koa izahay koa dia mba hanompo an’i Jehovah, fa Izy no Andriamanitsika.
  '19':
  - type: text
    content: 'Ary hoy Josoa tamin’ny vahoaka: Tsy mahay manompo an’i Jehovah hianareo; fa Andriamanitra masina Izy, Andriamanitra saro-piaro Izy ka tsy hamela ny fahadisoanareo sy ny fahotanareo. '
  '2':
  - type: text
    content: 'Ary hoy Josoa tamin’ny vahoaka rehetra: Izao no lazain’i Jehovah, Andriamanitry ny Isriaely: Tany an-dafin’ny Ony'
  - type: note
    content: Eofrata.
  - type: text
    content: ' no nonenan’ny razanareo tany aloha, dia Tera, rain’i Abrahama sy Nahora; ary nanompo andriamani-kafa izy. '
  '20':
  - type: text
    content: Raha mahafoy an’i Jehovah hianareo ka manompo andriamani-kafa, dia hiverina Izy ka hampahory anareo sy hahafongana anareo, rehefa nasiany soa.
  '21':
  - type: text
    content: 'Dia hoy ny vahoaka tamin’i Josoa: Tsia; fa Jehovah ihany no hotompoinay.'
  '22':
  - type: text
    content: 'Dia hoy Josoa tamin’ny vahoaka: Vavolombelona ho an’ny tenanareo hianareo fa efa nifidy an’i Jehovah hotompoinareo.'
  - type: text
    content: 'Ary hoy ny olona: Eny, vavolombelona izahay.'
  '23':
  - type: text
    content: Arionareo ankehitriny ary ny andriamani-kafa, izay eo aminareo, ka ampanatony an’i Jehovah, Andriamanitry ny Isiraely, ny fonareo.
  '24':
  - type: text
    content: 'Dia hoy ny vahoaka tamin’i Josoa: Jehovah Andriamanitray no hotompoinay, ary ny feony no hohenoinay.'
  '25':
  - type: text
    content: Ary dia nanao fanekena tamin’ny vahoaka Josoa tamin’izany andro izany ka nanome azy lalàna sy didy tany Sekema.
  '26':
  - type: text
    content: 'Dia nosoratan’i Josoa tao amin’ny bokin’ny lalàn’Andriamanitra ireo teny ireo, ary naka vato lehibe izy ka nanangana azy teo ambanin’ny hazo terebinta, izay teo anilan’ny fitoera-masin’i Jehovah. '
  '27':
  - type: text
    content: 'Dia hoy Josoa tamin’ny vahoaka rehetra: Indro, io vato io ho vavolombelona amintsika; fa efa nahare ny teny rehetra nolazain’i Jehovah tamintsika io, dia ho vavolombelona aminareo io, fandrao handainga amin’Andriamanitrareo hianareo.'
  '28':
  - type: text
    content: Dia nampodin’i Josoa ny vahoaka samy ho any amin’ny lovany avy.
  - type: heading
    content: Ny nahafatesan’i Josoa sy Eleazara, sy ny nandevenana ny taolan’i Josefa.
  '29':
  - type: text
    content: 'ARY rehefa afaka izany zavatra izany, dia maty Josoa, zanak’i Nona, mpanompon’i Jehovah, rehefa folo amby zato taona ny androny. '
  '3':
  - type: text
    content: Dia naka an’i Abrahama razanareo avy tany an-dafin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' Aho ka nitondra azy nitety ny tany Kanana rehetra, dia nahamaro ny taranany ka nanome an’Isaka ho zanany. '
  '30':
  - type: text
    content: 'Dia nalevina tao amin’ ny fari-tanin’ny lovany izy, dia tao Timnata-sera, any amin’ny tany havoan’i Efraima, avaratry ny tendrombohitra Gasa. '
  '31':
  - type: text
    content: Ary nanompo an’i Jehovah ny Isiraely tamin’ny andro rehetra niainan’i Josoa sy tamin’ny andro rehetra niainan’ny loholona izay velona taorian’i Josoa ka nahalala ny asa rehetra izay nataon’i Jehovah ho an’ny Isiraely.
  '32':
  - type: text
    content: Ary ny taolan’i Josefa, izay efa nentin’ny Zanak’Isiraely avy tany Egypta, dia naleviny tao Sekema, tao amin’ny tany izay novidin’i Jakoba volafotsy
  - type: note
    content: Heb. kesita; izahao Gen. xxxiii. 19.
  - type: text
    content: ' zato tamin’ny zanak’i Hamora, rain’i Sekema; dia tonga lovan’ny taranak’i Josefa izany.'
  '33':
  - type: text
    content: Dia maty koa Eleazara, zanak’i Arona, ka naleviny teo amin’ny havoan’i Finehasa zanany, izay nomena azy tany amin’ny tany havoan’i Efraima.
  '4':
  - type: text
    content: 'Ary Isaka koa dia nomeko an’i Jakoba sy Esao ho zanany; ary nomeko ho lovan’i Esao ny tendrombohitra Seïra; fa Jakoba sy ny taranany kosa nankany Egypta. '
  '5':
  - type: text
    content: Dia naniraka an’i Mosesy sy Arona Aho ka namely an’i Egypta, araka izay nataoko teo aminy; ary rehefa afaka izany, dia nitondra anareo nivoaka Aho.
  '6':
  - type: text
    content: 'Ary nony nitondra ny razanareo nivoaka avy tany Egypta Aho, dia tonga teo amin’ny ranomasina hianareo; ary nanenjika ny razanareo hatreo amin’ny Ranomasina Mena ny Egyptiana, nitaingina kalesy sy soavaly. '
  '7':
  - type: text
    content: Dia nitaraina tamin’i Jehovah izy, ka nasiany maizina teo anelanelanareo sy ny Egyptiana, sady nakatony taminy ny ranomasina ka nasarony azy, ary ny masonareo nahita izay nataoko tany Egypta; ary nitoetra ela tany an-efitra hianareo.
  '8':
  - type: text
    content: 'Ary nentiko ho any amin’ny tanin’ny Amorita, izay nonina tany an-dafin’i Jordana hianareo; dia niady taminareo ireo; ary nanolotra azy teo an-tànanareo Aho, mba handovanareo ny taniny, ary nandringana azy teo anoloanareo Aho. '
  '9':
  - type: text
    content: 'Dia nitsangana Balaka, zanak’i Zipora, mpanjakan’i Moaba, ka niady tamin’ny Isiraely; dia naniraka ka nampaka an’i Balama, zanak’i Beora, izy hanozona anareo. '
