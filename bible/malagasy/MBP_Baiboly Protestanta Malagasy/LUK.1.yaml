document_id: LUK.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarihan-teny.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: SATRIA maro no efa nanoratra nandahatra tantara ny amin’ny zavatra izay efa tanteraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: inoana tokoa amintsika.
      marker-yv: yv-n
    - type: text
      text: ' tamintsika tokoa '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka rehetra nitoetra teo ivelany nivavaka tamin’ny ora fandoroana ny ditin-kazo manitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjelin’ny Tompo niseho taminy teo an-kavananan’ny alitara fandoroana ny ditin-kazo manitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nahita azy Zakaria, dia taitra loatra izy ka raiki-tahotra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ilay anjely taminy: Aza matahotra, ry Zakaria; fa efa nohenoina ny fangatahanao, ka Elizabeta vadinao dia hiteraka zazalahy aminao, ary Jaona no hataonao anarany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho faly sy ho ravoravo hianao; ary maro no hifaly amin’ny hahaterahany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ho lehibe eo anatrehan’ny Tompo izy ary tsy hisotro divay na toaka sady hofenoina ny Fanahy Masina hatrany an-kibon-dreniny aza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro amin’ny Zanak’Isiraely no hampodiny amin’i Jehovah Andriamaniny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy handeha eo alohany amin’ny fanahy sy ny herin’i Elia mba hampody ny fon’ny ray ho amin’ny zanaka, ary ny tsy manoa ho amin’ny fahendren’ny marina, hamboatra firenena voaomana ho an’ny Tompo (Mal. 3.23, 24).
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Zakaria tamin’ilay anjely: Inona no hahafantarako izany? fa izaho efa antitra, ary efa antitra koa ny vadiko. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay anjely namaly ka nanao taminy hoe: Izaho no Gabriela, izay mitsangana eo anatrehan’Andriamanitra; ary nirahina hiteny aminao aho ka hilaza aminao izany teny mahafaly izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: araka izay efa noraisintsika natolotry ny vavolombelona izay sady nahita maso no efa mpitory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanompo.
      marker-yv: yv-n
    - type: text
      text: ' ny teny hatramin’ny voalohany: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa, indro, ho moana hianao ka tsy hahay miteny ambara-pahatongan’ny andro hisehoan’izany zavatra izany, ho valin’ny tsy ninoanao ny teniko, izay ho tanteraka amin’ny fotoany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona dia niandry an’i Zakaria ka gaga noho izy naharitra ela tao amin’ny tempoly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo rehefa nivoaka izy, dia tsy nahay niteny taminy; ary dia fantatry ny olona fa efa nahita fahitana tao amin’ny tempoly izy; ary izy nanao baikon’ny moana taminy, ary dia mbola moana ihany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra ny andro nanaovany fanompoam-pivavahana, dia lasa nody tany an-tranony izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary taorian’izany andro izany dia nitoe-jaza Elizabeta vadiny, dia niery dimy volana izy ka nanao hoe: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izao no nataon’ny Tompo tamiko tamin’ny andro izay nitsinjovany hahafa-tondromaso ahy amin’ny olona.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’i Gabriela tamin’i Maria fa hiteraka an’i Jesosy izy.
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny fahenim-bolana dia nirahin’Andriamanitra ny anjely Gabriela ho any an-tanàna anankiray any Galilia atao hoe Nazareta, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho any amin’ny virijina anankiray, izay voafofo ho vadin’ny lehilahy atao hoe Josefa, avy tamin’ny taranak’i Davida; ary ny anaran’ny virijina dia Maria. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niditra tao aminy ilay anjely, dia nanao hoe: Arahaba, ry ilay nohasoavina, ny Tompo momba anao.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[voatahy samy vehivavy hianao].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr’izany fiarahabana izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin’ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mahery indrindra; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: teny fanajana ny lehibe izany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay anjely taminy: Aza matahotra, ry Maria, fa efa nahita fitia tamin’Andriamanitra hianao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, hitoe-jaza hianao ka hiteraka zazalahy, ary ny anarany dia hataonao hoe '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: jesosy
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ho lehibe ka hatao hoe Zanaky ny Avo Indrindra; ary Jehovah Andriamanitra hanome Azy ny seza fiandrianan’i Davida rainy; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hanjaka amin’ny taranak’i Jakoba mandrakizay Izy; ary ny fanjakany tsy hanam-pahataperana.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Maria tamin’ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy mahalala lahy aho? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay anjely namaly ka nanao taminy hoe: Ny Fanahy Masina ho tonga ao aminao, ary hisy herin’ny Avo Indrindra hanaloka anao; koa ny Masina Izay hateraka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[haterakao].'
      marker-yv: yv-n
    - type: text
      text: ' dia hatao hoe Zanak’Andriamanitra. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; ary efa mandray enina izy izao, izay natao hoe momba. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra ataon’Andriamanitra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Maria: Inty ny ankizivavin’ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namangian’i Maria an’i Elizabeta.
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Maria niainga tamin’izany andro izany ka nandeha faingana ho any amin’ny tany havoana, ho ao an-tanàna anankiray any Joda; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’ny anjely tamin’i Zakaria ny amin’ny hahaterahan’i Jaona.
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niditra tao an-tranon’i Zakaria izy ka niarahaba an’i Elizabeta. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa ren’i Elizabeta ny fiarahaban’i Maria, dia nibitaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niantsambotra.
      marker-yv: yv-n
    - type: text
      text: ' ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina Elizabeta, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niantso tamin’ny feo mahery hoe izy: Voatahy samy vehivavy hianao, ary voatahy ny hateraky ny kibonao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy aiza no ahatongavan’izao amiko, no mba vangian’ny renin’ny Tompoko aho? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa, indro, raha vao ren’ny sofiko ny feon’ny fiarahabanao, dia nibitaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niantsambotra.
      marker-yv: yv-n
    - type: text
      text: ' noho ny hafaliana ny zaza ato an-kiboko. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary sambatra hianao izay nino; fa hefaina izay zavatra nampilazain’ny Tompo taminao. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Maria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko mankalaza ny Tompo,
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanahiko efa ravoravo tamin’Andriamanitra, Mpamonjy ahy;
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nijery ny fahambani-toetry ny ankizivaviny Izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, hatramin’ny ankehitriny dia hataon’ny taranaka rehetra ho sambatra aho.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Mahery efa nanao zavatra lehibe tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary masina ny anarany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'TAMIN’ny andron’i Heroda, mpanjakan’i Jodia, nisy mpisorona anankiray atao hoe Zakaria, isan’ny antokon’i Abia; ary ny vadiny dia avy tamin’ny taranak’i Arona, Elizabeta no anarany. '
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny famindrampony dia amin’izay matahotra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny taranaka fara mandimby.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao asa lehibe tamin’ny sandriny Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampihahaka ny mpiavonavona tamin’ny fiheveran’ny fony Izy.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampiala ny lehibe tamin’ny seza fiandrianany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanandratra ny ambany kosa.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny noana novokisany soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny manan-karena kosa nampialainy maina.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niahy an’Isiraely mpanompony Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nahatsiaro ny famindrampony
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Araka ny voalazany tamin’ny razantsika),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’i Abrahama sy ny taranany mandrakizay.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Maria nitoetra teo amin’i Elizabeta tokony ho telo volana vao nody tany an-tranony.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahaterahan’i Jaona Mpanao-batisa.
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga ny andro hahaveloman’i Elizabeta, dia niteraka zazalahy izy. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny niara-monina taminy sy ny havany nandre fa efa nohalehibiazin’ny Tompo ny famindrampony taminy; dia niara-nifaly taminy ireo.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny andro fahavalo dia tonga hamora ny zaza izy, ka efa saiky hataony hoe Zakaria araka ny anaran-drainy ny anarany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary samy marina teo anatrehan’Andriamanitra izy mivady sady nitondra tena tsy nanan-tsiny araka ny didy sy ny fitsipika rehetra nomen’ny Tompo. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny reniny namaly ka nanao hoe: Tsy izany, fa hatao hoe Jaona izy. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin’ny havanao izay manana izany anarana izany. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao baikon’ny moana tamin’ny rainy izy ireo, izay tokony ho tiany hatao anarany. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nangataka fàfana izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia nisokatra niaraka tamin’izay ny vavany, ka afaka niteny ny lelany; dia niteny izy ka nidera an’Andriamanitra.
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin’ny tany havoan’i Jodia rehetra ny lazan’izany rehetra izany. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra nandre dia nandatsaka izany tam-pony ka nanao hoe: Ho zaza hanao ahoana re io? Fa ny tànan’ny Tompo nomba azy.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia feno ny Fanahy Masina Zakaria rainy ka naminany hoe:'
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie ny Tompo Andriamanitry ny Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nitsinjo ny olony Izy ka nanao fanavotana ho azy,
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanangana tandro-pamonjena ho antsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny taranak’i Davida mpanompony Izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy nanan-janaka izy, fa momba Elizabeta; ary samy efa antitra izy mivady.
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Araka izay nampilazainy ny mpaminaniny masina hatramin’ny fahagola),
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia famonjena antsika amin’ny fahavalontsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny tànan’izay rehetra mankahala antsika;
  '72':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manefa famindrampo amin’ny razantsika Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahatsiaro ny fanekeny masina,
  '73':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fianianana izay nianianany tamin’i Abrahama razantsika,
  '74':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao izay hahazoantsika hanompo Azy tsy amin-tahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria afaka amin’ny fahavalontsika isika,
  '75':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fahamasinana sy ny fahamarinana eo anatrehany amin’ny andro rehetra hiainantsika.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao, ry zaza, dia hatao hoe mpaminanin’ny Avo Indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hialoha eo anatrehan’ny Tompo hianao hamboatra ny làlany.
  '77':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanome ny olony ny fahalalam-pamonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny famelana ny helony,
  '78':
  - type: usfm
