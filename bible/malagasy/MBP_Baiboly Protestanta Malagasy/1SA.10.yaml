document_id: 1SA.10,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Samoela nitondra tavoara feno diloilo ka nanidina ny diloilo teo an-dohan’i Saoly, dia nanoroka azy ka nanao hoe: Tsy nanosotra anao va Jehovah mba ho mpanapaka ny lovany? '
  '10':
  - type: text
    content: Ary rehefa tonga tany Gibea, izy indro, ny mpaminany maro irai-dia nifanena taminy; dia nilatsaka tamin’i Saoly ny Fanahin’Andriamanitra, ka naminany teo aminy izy.
  '11':
  - type: text
    content: 'Ary nony hitan’izay rehetra nahalala azy hatramin’ny taloha fa, indro, maminany eo amin’ny mpaminany izy, dia nifampilaza ny olona ka nanao hoe: Inona izao tonga amin’ny zanak’i Kisy izao? Saoly koa va mba isan’ny mpaminany? '
  '12':
  - type: text
    content: 'Ary ny anankiray teo namaly hoe: Fa iza moa no rain’ireny? Ary izany no nisehoan’ny fitenenana hoe: ’Saoly koa va mba isan’ny mpaminany?’'
  '13':
  - type: text
    content: Ary rehefa nitsahatra naminany Saoly, dia nankeo amin’ny fitoerana avo.
  '14':
  - type: text
    content: 'Ary hoy ny rahalahin-drain’i Saoly taminy sy tamin’ny mpanompony: Taiza no nalehanareo? Ary hoy izy: Nitady ny boriky izahay; ka nony tsy hitanay izy, dia nankany amin’i Samoela izahay. '
  '15':
  - type: text
    content: 'Ary hoy ny rahalahin-drain’i Saoly: Masìna hianao, lazao amiko izay nolazain’i Samoela taminao. '
  '16':
  - type: text
    content: 'Dia hoy Saoly tamin’ny rahalahin-drainy: Nolazainy marimarina taminay fa efa hita ny boriky. Fa ilay nolazain’i Samoela ny amin’ny fanjakana tsy mba nambarany taminy.'
  '17':
  - type: text
    content: 'Ary Samoela namory ny vahoaka ho any Mizpa ho any amin’i Jehovah '
  '18':
  - type: text
    content: 'ka nanao tamin’ny Zanak’Isiraely hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Izaho nitondra ny Isiraely niakatra avy tany Egypta ka namonjy anareo tamin’ny tànan’ny Egyptiana sy tamin’ny tànan’ny fanjakana rehetra izay nampahory anareo. '
  '19':
  - type: text
    content: 'Nefa hianareo kosa efa nandà an’Andriamanitrareo andro-any, Izay mamonjy anareo amin’ny zavatra manjo anareo sy ny fahorianareo rehetra; fa hoy hianareo taminy: Tsia, fa manendre mpanjaka ho anay. Koa ankehitriny, mijanòna eo anatrehan’i Jehovah araka ny firenenareo sy ny arivonareo avy.'
  '2':
  - type: text
    content: 'Rehefa misaraka amiko hianao anio, dia hahita olona roa lahy eo anilan’ny fasan-dRahely, ao amin’ny fari-tanin’ny Benjamina, ao Zelza, ary izy ireo hilaza aminao hoe: Efa hita ny boriky izay notadiavinao; ary, indro, tsy ny boriky intsony no heverin’ny rainao, fa hianareo kosa indray no ahìny, ka hoy izy: Ahoana re no hataoko ny amin’ny zanako? '
  '20':
  - type: text
    content: 'Dia nampanatona ny firenen’Isiraely rehetra Samoela, ka ny firenen’i Benjamina no voafidy. '
  '21':
  - type: text
    content: 'Dia nampanatona ny firenen’i Benjamina araka ny fokony avy izy, ary ny fokon’ny Matrita no voafidy. Dia voafidy Saoly, zanak’i Kisy; ary raha nitady azy ny olona, dia tsy nahita azy. '
  '22':
  - type: text
    content: 'Dia nanontany tamin’i Jehovah indray ny olona, na mba efa tonga ao ralehilahy, na tsia. Ary hoy Jehovah: Indro, miery ao amin’ny entana izy. '
  '23':
  - type: text
    content: Dia nihazakazaka ny olona ka naka azy tao; ary rehefa nitsangana teo afovoan’ny olona izy, dia nanan-tombo noho ny olona rehetra hatramin’ny sorony no ho miakatra ny halavany.
  '24':
  - type: text
    content: 'Ary hoy Samoela tamin’ny vahoaka rehetra: Hitanareo va izay nofidin’i Jehovah, fa tsy misy tahaka azy eo amin’ny vahoaka rehetra? Dia nihoby ny vahoaka rehetra ka nanao hoe: Ho ela velona anie ny mpanjaka.'
  '25':
  - type: text
    content: Ary Samoela nilaza tamin’ny olona izay mety ho fitondrana ny fanjakana, dia nosoratany tamin’ny taratasy izany ka napetrany teo anatrehan’i Jehovah.
  - type: text
    content: 'Ary ny vahoaka rehetra samy nampodin’i Samoela ho any an-tranony avy. '
  '26':
  - type: text
    content: 'Fa Saoly kosa nandeha nody tany Gibea, ary nomba azy ny olona maro, izay voatendrin’ny tànan’Andriamanitra ny fony. '
  '27':
  - type: text
    content: 'Fa nisy kosa olona tena ratsy fanahy nanao hoe: Hataon’io lehilahy io ahoana no famonjy antsika? Dia nanazimba an’i Saoly ireo ka tsy nitondra fanomezana ho azy. Nefa Saoly dia tahaka ny marenina.'
  '3':
  - type: text
    content: Dia handroso hiala ao hianao ka ho tonga ao amin’ny hazo terebinta any Tabara, dia hifanena amin’ny olona telo lahy miakatra ho any amin’Andriamanitra any Betela, ny anankiray mitondra zanak’osy telo, ny anankiray mitondra mofo telo, ary ny anankiray mitondra divay iray tavoara;
  - type: note
    content: 'Na: siny hoditra.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'ary hiarahaba anao ireo sy hanome anao mofo roa, dia horaisinao amin’ny tànany izany. '
  '5':
  - type: text
    content: 'Rehefa afaka izany, dia ho tonga any Gibean’Andriamanitra hianao, izay misy miaramilan’ny Filistina; ary rehefa tonga ao an-tanàna hianao, dia hifanena amin’ny mpaminany maro irai-dia midina avy ao amin’ny fitoerana avo mitondra lokanga sy ampongatapaka sy sodina ary valiha eo alohany, dia haminany ireo. '
  '6':
  - type: text
    content: 'Ary hilatsaka aminao ny Fanahin’i Jehovah, ka hiara-maminany aminy hianao, dia ho voaova ho olom-baovao. '
  '7':
  - type: text
    content: 'Ary rehefa tonga aminao ireo famantarana ireo, dia ataovy izay azon’ny tànanao atao, fa Andriamanitra no momba anao. '
  '8':
  - type: text
    content: Ary hianao hidina eo alohako ho any Gilgala, ary indro aho hidina ho any aminao mba hanatitra fanatitra dorana sy fanati-pihavanana; ka hafitoana no hitoeranao mandra-pahatongako aminao, dia holazaiko aminao izay hataonao.
  '9':
  - type: text
    content: 'Ary raha vao nihodina niala tamin’i Samoela izy, dia nomen’Andriamanitra fo vaovao; ary tonga avokoa androtrizay ihany ireo famantarana rehetra ireo. '
