document_id: JER.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hampodiana ny voninahitry ny Isiraely, sy ny hampijaliana izay nampahory azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aza matahotra hianao, ry Jakoba mpanompoko, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mivadi-po, ry Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, hovonjeko avy any lavitra hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranakao avy any amin’ny tany izay nahababo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiverina Jakoba ka hiadana sy handry fahizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy hanaitaitra azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa momba anao hamonjy anao Aho, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa na dia levoniko aza ny firenena rehetra izay nampielezako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao tsy mba holevoniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa kosa mba hanariko araka ny antonony ihany hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy dia havelako fotsiny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no lazain’i Jehovah: Maharary ny faharatrànao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy azo sitranina ny ferinao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy handahatra ny teninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manana plasitera fanasitranana hapetaka amin’ny ferinao hianao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy misy mikarakara ny raharahanao hamoritana ny ferinao, Ary tsy, manana plasitera fanasitranana hianao.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo tia anao dia efa nanadino anao avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba notadiaviny hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famelin’ny fahavalo no namelezako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny famaizan’ny lozabe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny habetsahan’ny helokao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny hamaroan’ny fahotanao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana hianao no mitaraina noho ny faharatrànao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy noho ny fanaintainanao izay tsy azo atsahatra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa noho ny habetsahan’ny helokao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny hamaroan’ny fahotanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nanaovako izany taminao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izay rehetra mihinana anao dia mba hohanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra mampahory anao dia ho lasan-ko babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamabo anao dia hobaboina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra mandroba anao dia hatolotro horobaina.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hotanterahiko ny fanasitranana anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hositraniko ny faharatrànao, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noho ny nanaovany anao hoe: Ilay noroahina,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy hoe: Ziona tsy misy mpitady ity.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hampodiko avy amin’ny fahababoana ny lain’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fonenany dia hamindrako fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny tanàna dia haorina ao amin’ny havoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lapan’andriana hitoetra ao amin’izay mahamety azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy fisaorana sy feon’ny mifaly avy ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahamaro azy Aho, ka tsy ho vitsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hanome voninahitra azy Aho, ka tsy ho ambany izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Soratinao amin’ny boky ny teny rehetra izay efa nolazaiko taminao. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany koa ho tahaka ny tany aloha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiangonany hampitoerina eo anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hovaliako izay rehetra mampahory azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ilay malazany dia ho avy ao aminy ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanapaka azy dia ho avy ao aminy ihany koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampanakaiky azy Aho, ka dia hanatona Ahy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no sahy hanao ny ainy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fony.
      marker-yv: yv-n
    - type: text
      text: ' ho antoka ka hanatona Ahy? hoy Jehovah.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianareo ho oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho ho Andriamanitrareo.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He! ny tadion’i Jehovah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoaka ny fahatezerana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tadio mitambolimbolina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miantonta amin’ny lohan’ny ratsy fanahy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firehetan’ny fahatezeran’i Jehovah tsy ho afaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-panefany sy ambara-panatanterany ny hevitry ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola ho fantatrareo marimarina izany any am-parany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa, indro, avy ny andro, hoy Jehovah, izay hampodiako ny oloko, dia ny Isiraely sy ny Joda, avy amin’ny fahababoany, hoy Jehovah; eny, hampody azy ho amin’ny tany izay efa nomeko ny razany Aho, dia ho azy izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no teny izay nolazain’i Jehovah ny amin’ny Isiraely sy ny Joda,– '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feo mampangovitra no renay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy tahotra, fa tsy fiadanana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anontanionareo ka izahao, raha mba misy lehilahy mihetsi-jaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana no samy hitako manery ny valahany amin’ny tànany avy ny lehilahy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoatra ilay efa mihetsi-jaza iny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tarehy rehetra dia efa tonga hatsatra avokoa?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! fa lehibe izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy tahaka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andro fahoriana ho an’i Jakoba izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho voavonjy ho afaka amin’izany ihany izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izany andro izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotapahiko ny ziogany ho afaka amin’ny vozonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hotosako ny fatoranao,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kofehinao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena hafa tsy hampanompo anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azy.
      marker-yv: yv-n
    - type: text
      text: ' intsony;'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianao hanompo an’i Jehovah Andriamanitrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izy... Andriamaniny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy Davida Mpanjakanao,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpanjakany.
      marker-yv: yv-n
    - type: text
      text: ' Izay hatsangako ho anao.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.9 '
      - type: usfm
