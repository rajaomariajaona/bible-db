document_id: JER.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampodiana ny voninahitry ny Isiraely, sy ny hampijaliana izay nampahory azy.
  - type: text
    content: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  '10':
  - type: text
    content: Koa aza matahotra hianao, ry Jakoba mpanompoko, hoy Jehovah;
  - type: text
    content: Ary aza mivadi-po, ry Isiraely;
  - type: text
    content: Fa, indro, hovonjeko avy any lavitra hianao
  - type: text
    content: Ary ny taranakao avy any amin’ny tany izay nahababo azy;
  - type: text
    content: Dia hiverina Jakoba ka hiadana sy handry fahizay,
  - type: text
    content: Ka tsy hisy hanaitaitra azy.
  '11':
  - type: text
    content: Fa momba anao hamonjy anao Aho, hoy Jehovah;
  - type: text
    content: Koa na dia levoniko aza ny firenena rehetra izay nampielezako anao,
  - type: text
    content: Hianao tsy mba holevoniko;
  - type: text
    content: Nefa kosa mba hanariko araka ny antonony ihany hianao,
  - type: text
    content: Fa tsy dia havelako fotsiny.
  '12':
  - type: text
    content: 'Fa izao no lazain’i Jehovah: Maharary ny faharatrànao,'
  - type: text
    content: Ary tsy azo sitranina ny ferinao.
  '13':
  - type: text
    content: Tsy misy handahatra ny teninao;
  - type: text
    content: Tsy manana plasitera fanasitranana hapetaka amin’ny ferinao hianao.
  - type: note
    content: 'Na: Tsy misy mikarakara ny raharahanao hamoritana ny ferinao, Ary tsy, manana plasitera fanasitranana hianao.'
  '14':
  - type: text
    content: Ireo tia anao dia efa nanadino anao avokoa,
  - type: text
    content: Tsy mba notadiaviny hianao;
  - type: text
    content: Fa famelin’ny fahavalo no namelezako anao,
  - type: text
    content: Dia ny famaizan’ny lozabe,
  - type: text
    content: Noho ny habetsahan’ny helokao
  - type: text
    content: Sy ny hamaroan’ny fahotanao.
  '15':
  - type: text
    content: Nahoana hianao no mitaraina noho ny faharatrànao
  - type: text
    content: Sy noho ny fanaintainanao izay tsy azo atsahatra?
  - type: text
    content: Fa noho ny habetsahan’ny helokao
  - type: text
    content: Sy ny hamaroan’ny fahotanao
  - type: text
    content: No nanaovako izany taminao.
  '16':
  - type: text
    content: Koa izay rehetra mihinana anao dia mba hohanina,
  - type: text
    content: Ary izay rehetra mampahory anao dia ho lasan-ko babo,
  - type: text
    content: Izay mamabo anao dia hobaboina,
  - type: text
    content: Ary izay rehetra mandroba anao dia hatolotro horobaina.
  '17':
  - type: text
    content: Fa hotanterahiko ny fanasitranana anao,
  - type: text
    content: Eny, hositraniko ny faharatrànao, hoy Jehovah,
  - type: text
    content: 'Noho ny nanaovany anao hoe: Ilay noroahina,'
  - type: text
    content: 'Sy hoe: Ziona tsy misy mpitady ity.'
  '18':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hampodiko avy amin’ny fahababoana ny lain’i Jakoba,
  - type: text
    content: Ary ny fonenany dia hamindrako fo;
  - type: text
    content: Ka ny tanàna dia haorina ao amin’ny havoany,
  - type: text
    content: Ary ny lapan’andriana hitoetra ao amin’izay mahamety azy.
  '19':
  - type: text
    content: Ary hisy fisaorana sy feon’ny mifaly avy ao;
  - type: text
    content: Dia hahamaro azy Aho, ka tsy ho vitsy izy,
  - type: text
    content: Sady hanome voninahitra azy Aho, ka tsy ho ambany izy.
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Soratinao amin’ny boky ny teny rehetra izay efa nolazaiko taminao. '
  '20':
  - type: text
    content: Ny zanany koa ho tahaka ny tany aloha,
  - type: text
    content: Ary ny fiangonany hampitoerina eo anatrehako,
  - type: text
    content: Dia hovaliako izay rehetra mampahory azy.
  '21':
  - type: text
    content: Ary ilay malazany dia ho avy ao aminy ihany,
  - type: text
    content: Ary ny mpanapaka azy dia ho avy ao aminy ihany koa;
  - type: text
    content: Ary hampanakaiky azy Aho, ka dia hanatona Ahy izy,
  - type: text
    content: Fa iza no sahy hanao ny ainy
  - type: note
    content: Heb. fony.
  - type: text
    content: ' ho antoka ka hanatona Ahy? hoy Jehovah.'
  '22':
  - type: text
    content: Ary hianareo ho oloko,
  - type: text
    content: Ary Izaho ho Andriamanitrareo.
  '23':
  - type: text
    content: He! ny tadion’i Jehovah!
  - type: text
    content: Mivoaka ny fahatezerana
  - type: text
    content: Sy ny tadio mitambolimbolina
  - type: text
    content: Ka miantonta amin’ny lohan’ny ratsy fanahy.
  '24':
  - type: text
    content: Ny firehetan’ny fahatezeran’i Jehovah tsy ho afaka
  - type: text
    content: Ambara-panefany sy ambara-panatanterany ny hevitry ny fony;
  - type: text
    content: Mbola ho fantatrareo marimarina izany any am-parany.
  '3':
  - type: text
    content: Fa, indro, avy ny andro, hoy Jehovah, izay hampodiako ny oloko, dia ny Isiraely sy ny Joda, avy amin’ny fahababoany, hoy Jehovah; eny, hampody azy ho amin’ny tany izay efa nomeko ny razany Aho, dia ho azy izany.
  '4':
  - type: text
    content: 'Ary izao no teny izay nolazain’i Jehovah ny amin’ny Isiraely sy ny Joda,– '
  '5':
  - type: text
    content: 'eny, izao no lazain’i Jehovah:'
  - type: text
    content: Feo mampangovitra no renay;
  - type: text
    content: Misy tahotra, fa tsy fiadanana.
  '6':
  - type: text
    content: Anontanionareo ka izahao, raha mba misy lehilahy mihetsi-jaza;
  - type: text
    content: Koa nahoana no samy hitako manery ny valahany amin’ny tànany avy ny lehilahy rehetra
  - type: text
    content: Hoatra ilay efa mihetsi-jaza iny,
  - type: text
    content: Ary ny tarehy rehetra dia efa tonga hatsatra avokoa?
  '7':
  - type: text
    content: Indrisy! fa lehibe izany andro izany,
  - type: text
    content: Ka tsy misy tahaka azy
  - type: text
    content: Andro fahoriana ho an’i Jakoba izany,
  - type: text
    content: Nefa ho voavonjy ho afaka amin’izany ihany izy.
  '8':
  - type: text
    content: Fa amin’izany andro izany,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro,
  - type: text
    content: Dia hotapahiko ny ziogany ho afaka amin’ny vozonao
  - type: text
    content: Sy hotosako ny fatoranao,
  - type: note
    content: 'Na: kofehinao.'
  - type: text
    content: Ary ny firenena hafa tsy hampanompo anao
  - type: note
    content: Heb. azy.
  - type: text
    content: ' intsony;'
  '9':
  - type: text
    content: Fa hianao hanompo an’i Jehovah Andriamanitrao
  - type: note
    content: Heb. izy... Andriamaniny.
  - type: text
    content: Sy Davida Mpanjakanao,
  - type: note
    content: Heb. Mpanjakany.
  - type: text
    content: ' Izay hatsangako ho anao.'
  - type: note
    content: Heb. azy.
