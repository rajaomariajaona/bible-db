document_id: ROM.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry rahalahy, ny irin’ny foko sy ny angatahiko amin’Andriamanitra ho an’ireny dia famonjena. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa amin’ny fo no inoana hahazoana fahamarinana, ary amin’ny vava no anekena hahazoana famonjena.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Masina:'
    - type: text
      text: ' ,,Tsy ho menatra izay rehetra mino Azy’’ (Isa. 28.16). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa tsy misy hafa, na Jiosy na jentilisa,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Grika.
      marker-yv: yv-n
    - type: text
      text: ' fa iray ihany no Tompon’izy rehetra, sady manan-karena homeny izay rehetra miantso Azy Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ,,izay rehetra miantso ny anaran’ny Tompo no hovonjena’’ (Joe. 3.5). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hataony ahoana ary no fiantso izay tsy ninoany? Ary hataony ahoana no fino izay Olona tsy reny? Ary hataony ahoana no fandre, raha tsy misy mpitory? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hataony ahoana no fitory, raha tsy nirahina? araka ny voasoratra hoe: ,,Akory ny hatsaran’ny tongotr’iry mitondra teny soa mahafaly!’’ (Isa. 52.7).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nefa tsy izy rehetra no nanaiky ny teny soa mahafaly.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny filazantsara.
      marker-yv: yv-n
    - type: text
      text: ' Fa hoy Isaia: ,,Jehovah ô, iza no nino ny teny nampitondraina anay?’’ (Isa. 53.1.) '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa ny finoana dia avy amin’ny tori-teny, ary ny tori-teny kosa avy amin’ny tenin’i Kristy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy izaho: Sao tsy nahare izy? Tsia; fa'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Efa nivoaka ho any amin’ny tany rehetra ny feony,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny teniny hatramin’ny faran’izao rehetra izao’’ (Sal. 19.4).
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa hoy izaho: Sao tsy nahalala ny Isiraely? Voalohany, Mosesy manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Izaho hampialona anareo amin’izay tsy firenena,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’izay firenena adala no hampahasosorako anareo’’ (Deo. 32.21).
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa vavolombelon’ireny aho fa mazoto ho an’Andriamanitra izy’ saingy tsy araka ny fahalalana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa sahy mihitsy Isaia ka manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Hitan’izay tsy nitady Ahy Aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary niseho tamin’izay tsy nanontany Ahy.’’
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ny amin’ny Isiraely dia hoy izy: ,,Mandritra ny andro no efa naninjirako ny tànako tamin’izay firenena sady tsy manaraka no mandà’’ (Isa. 65.1, 2).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa satria tsy nahalala ny fahamarinana avy amin’Andriamanitra izy ka nitady hanamarina ny tenany, dia tsy nanaiky ny fahamarinana avy amin’Andriamanitra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa Kristy no faran’ny lalàna ho fahamarinana ho an’izay rehetra mino.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa Mosesy nanoratra milaza fa izay olona manao ny fahamarinana avy amin’ny lalàna no ho velona amin’izany (Lev. 18.5). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ny fahamarinana izay avy amin’ny finoana kosa manao hoe: ,,Aza milaza ao am-ponao hoe; Iza no hiakatra any an-danitra?’’ (dia ny hampidina an’i Kristy izany,) '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'na: ,,Iza no hidina any amin’ny lalina?’’ (dia ny hampiakatra an’i Kristy avy any amin’ny maty izany.) '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ahoana no lazainy? ,,Eo akaikinao ny teny, dia eo am-bavanao sy ao am-ponao’’ (Deo. 30.12–14), dia ny teny ny amin’ny finoana, izay torinay; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'satria raha manaiky an’i Jesosy ho Tompo amin’ny vavanao hianao ary mino amin’ny fonao fa Andriamanitra efa nanangana Azy tamin’ny maty, dia hovonjena hianao. '
