    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ny amin’ny fiantrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanompoana.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny olona masina, dia tsy misy tokony hanoratako aminareo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa fantatro ny fahazotoanareo, izay ataoko rehareha ny aminareo amin’ny Makedoniana hoe: Efa vonona hatry ny taon-itsỳ Akaia, ary ny zotom-ponareo dia namporisika ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao dia ho foana ny reharehanay ny aminareo amin’izany zavatra izany, mba ho vonona hianareo araka izay nolazaiko, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fandrao, raha tàhiny hisy hiaraka amiko ny avy eto Makedonia ka hahita anareo tsy mbola vonona, dia ho menatra izahay (mba tsy hanaovanay hoe, hianareo) noho izany fahatokiana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa nataoko fa tsy maintsy mangataka ny rahalahy handeha hialoha ho any aminareo aho ka hahavita rahateo ny fiantranareo izay nokasainareo teo aloha, mba hovitaina toy ny fiantrana izany, fa tsy toy ny fahihirana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'no lazaiko:'
  - type: text
    text: ' Izay mamafy kely, dia kely no hojinjany; fa izay mamafy be, dia be kosa no hojinjany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aoka
  - type: text
    text: ' ny olona rehetra samy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hanao
  - type: text
    text: ' araka izay inian’ny fony avy, tsy amin’ny alahelo, na amin’ny faneriterena; fa ,,ny mpanome amin’ny fifaliana no tian’Andriamanitra’’ (Oha. 22.8, LXX.). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Andriamanitra mahay mampitombo ny fahasoavana rehetra aminareo, mba hanananareo ny onony rehetra mandrakariva amin’ny zavatra rehetra, ka hitombo amin’ny asa tsara rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Namafy izy, eny, nanome ho an’ny malahelo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahamarinany maharitra mandrakizay’’ (Sal. 112.9).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Izay manome voa ho an’ny mpamafy sy mofo hohanina dia hanome sy hahabe ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: dia hanan-karena amin’ny zavatra rehetra hianareo ka handroso amin’ny hitsim-po,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahafoizana.
    marker-yv: yv-n
  - type: text
    text: ' izay mahatonga ny fisaoranay an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafaka ny alahelon’ny olona masina ihany, fa mahabe ny fisaoran’ny maro an’Andriamanitra koa, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'satria ny fizahan-toetra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anareo
  - type: text
    text: ' amin’izany fanompoana izany no ankalazany an’Andriamanitra noho ny fitananareo tsara ny fanekenareo ny filazantsaran’i Kristy sy noho ny fahazotoanareo amin’ny fiantrana ho azy sy ho an’ny olona rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary amin’ny fangatahany ho anareo dia manina anareo izy noho ny haben’ny fahasoavan’Andriamanitra aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Isaorana anie Andriamanitra noho ny fanomezany tsy azo tononina.
