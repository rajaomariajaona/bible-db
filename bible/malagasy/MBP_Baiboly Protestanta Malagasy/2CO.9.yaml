document_id: 2CO.9,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa ny amin’ny fiantrana
  - type: note
    content: Gr. fanompoana.
  - type: text
    content: ' ho an’ny olona masina, dia tsy misy tokony hanoratako aminareo; '
  '10':
  - type: text
    content: 'Ary Izay manome voa ho an’ny mpamafy sy mofo hohanina dia hanome sy hahabe ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo, '
  '11':
  - type: text
    content: dia hanan-karena amin’ny zavatra rehetra hianareo ka handroso amin’ny hitsim-po,
  - type: note
    content: 'Na: fahafoizana.'
  - type: text
    content: ' izay mahatonga ny fisaoranay an’Andriamanitra. '
  '12':
  - type: text
    content: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafaka ny alahelon’ny olona masina ihany, fa mahabe ny fisaoran’ny maro an’Andriamanitra koa, '
  '13':
  - type: text
    content: 'satria ny fizahan-toetra '
  - type: text
    content: anareo
  - type: text
    content: ' amin’izany fanompoana izany no ankalazany an’Andriamanitra noho ny fitananareo tsara ny fanekenareo ny filazantsaran’i Kristy sy noho ny fahazotoanareo amin’ny fiantrana ho azy sy ho an’ny olona rehetra; '
  '14':
  - type: text
    content: 'ary amin’ny fangatahany ho anareo dia manina anareo izy noho ny haben’ny fahasoavan’Andriamanitra aminareo. '
  '15':
  - type: text
    content: Isaorana anie Andriamanitra noho ny fanomezany tsy azo tononina.
  '2':
  - type: text
    content: 'fa fantatro ny fahazotoanareo, izay ataoko rehareha ny aminareo amin’ny Makedoniana hoe: Efa vonona hatry ny taon-itsỳ Akaia, ary ny zotom-ponareo dia namporisika ny maro. '
  '3':
  - type: text
    content: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao dia ho foana ny reharehanay ny aminareo amin’izany zavatra izany, mba ho vonona hianareo araka izay nolazaiko, '
  '4':
  - type: text
    content: 'fandrao, raha tàhiny hisy hiaraka amiko ny avy eto Makedonia ka hahita anareo tsy mbola vonona, dia ho menatra izahay (mba tsy hanaovanay hoe, hianareo) noho izany fahatokiana izany. '
  '5':
  - type: text
    content: Koa nataoko fa tsy maintsy mangataka ny rahalahy handeha hialoha ho any aminareo aho ka hahavita rahateo ny fiantranareo izay nokasainareo teo aloha, mba hovitaina toy ny fiantrana izany, fa tsy toy ny fahihirana.
  '6':
  - type: text
    content: 'Fa izao '
  - type: text
    content: 'no lazaiko:'
  - type: text
    content: ' Izay mamafy kely, dia kely no hojinjany; fa izay mamafy be, dia be kosa no hojinjany. '
  '7':
  - type: text
    content: Aoka
  - type: text
    content: ' ny olona rehetra samy '
  - type: text
    content: hanao
  - type: text
    content: ' araka izay inian’ny fony avy, tsy amin’ny alahelo, na amin’ny faneriterena; fa ,,ny mpanome amin’ny fifaliana no tian’Andriamanitra’’ (Oha. 22.8, LXX.). '
  '8':
  - type: text
    content: 'Ary Andriamanitra mahay mampitombo ny fahasoavana rehetra aminareo, mba hanananareo ny onony rehetra mandrakariva amin’ny zavatra rehetra, ka hitombo amin’ny asa tsara rehetra; '
  '9':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: ',,Namafy izy, eny, nanome ho an’ny malahelo;'
  - type: text
    content: Ny fahamarinany maharitra mandrakizay’’ (Sal. 112.9).
