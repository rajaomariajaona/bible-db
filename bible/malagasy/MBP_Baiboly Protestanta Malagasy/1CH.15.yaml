document_id: 1CH.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny nitondrana ny fiara niakatra tany Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY Davida nanao trano ho azy tao an-Tanànan’i Davida sady namboatra fitoerana sy nanorin-day ho an’ny fiaran’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tamin’izay dia hoy Davida: Tsy misy tokony hitondra ny fiaran’Andriamanitra afa-tsy ny Levita ihany, satria izy no efa nofidin’i Jehovah hitondra ny fiaran’Andriamanitra sy hanao fanompoam-pivavahana ho Azy mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia novorin’i Davida tany Jerosalema ny Isiraely rehetra hampakatra ny fiaran’i Jehovah ho any amin’ny fitoerana izay namboariny ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary novorin’i Davida ny taranak’i Arona sy ny Levita: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'tamin’ny taranak’i Kehata dia Oriela lehibeny sy ny rahalahiny roa-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tamin’ny taranak’i Merary dia Asaia lehibeny sy ny rahalahiny roa-polo amby roan-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tamin’ny taranak’i Gersona dia Joela lehibeny sy ny rahalahiny telo-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tamin’ny taranak’i Elizafana dia Semaia lehibeny sy ny rahalahiny roan-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tamin’ny taranak’i Hebrona dia Eliala lehibeny sy ny rahalahiny valo-polo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: tamin’ny taranak’i Oziela dia Aminadaba lehibeny sy ny rahalahiny roa ambin’ny folo amby zato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Davida niantso an’i Zadoka sy Abiatara mpisorona sy ny Levita, dia Oriela sy Asaia sy Joela sy Semaia sy Eliala ary Aminadaba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nanao taminy hoe: Hianareo lohan’ny fianakavian’ny Levita, hamasino ny tenanareo, dia hianareo sy ny rahalahinareo, mba hampakaranareo ny fiaran’i Jehovah, Andriamanitry ny Isiraely, ho ao amin’ilay namboariko ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Satria tsy hianareo no tamin’ilay teo, dia nasian’i Jehovah Andriamanitsika isika, fa tsy nitady Azy araka ny voadidy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanamasina ny tenany ny mpisorona sy ny Levita hampakatra ny fiaran’i Jehovah, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny Levita nilanja ny fiaran’Andriamanitra tamin’ny hazo, tahaka ny nandidian’i Mosesy araka ny tenin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ireo lehiben’ny Levita dia nasain’i Davida nanendry ny mpihira rahalahiny hitondra ny zava-maneno, dia ny valiha sy ny lokanga ary hampaneno ny kipantsona, mba hanandra-peo amin’ny fifaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka dia notendren’ny Levita Hemana, zanak’i Joela; ary tamin’ny rahalahiny dia Asafa, zanak’i Berekia; ary tamin’ny taranak’i Merary rahalahiny dia Etana, zanak’i Kosaia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary naman’ireo ihany koa ny rahalahiny manarakaraka, dia Zakaria sy Bena sy Jaziela sy Semiramota sy Jehiela sy Ony sy Eliaba sy Benaia sy Mahaseia sy Matitia sy Elifeleho sy Mikneia sy Obed-edoma ary Jeiela, mpiandry varavarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Hemana sy Asafa ary Etana mpihira dia nasaina nitondra kipantsona varahina hampanenoina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Zakaria sy Aziela sy Semiramota sy Jehiela sy Ony sy Eliaba sy Mahaseia sy Benaia no nasaina nitendry valiha tamin’ny Alamota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Matitia sy Elifeleho sy Mikneia sy Obed-edoma sy Jeiela ary Azazia no nasaina nitendry ny lokanga tamin’ny Seminita ho mpitarika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Kenania, lehiben’ny Levita, no tonian’ny fitondrana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny hira.
    marker-yv: yv-n
  - type: text
    text: ' ary nampianatra ny fitondrana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny hira.
    marker-yv: yv-n
  - type: text
    text: ' izy, fa nahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Berekia sy Elikana no mpiandry varavarana amin’ny fiara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Sebania sy Josafata sy Netanela sy Amasay sy Zakaria sy Benaia ary Eliezera, izay samy mpisorona, no nitsoka ny trompetra teo alohan’ny fiaran’Andriamanitra; ary Obed-edoma sy Jehia koa no mpiandry varavarana amin’ny fiara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Davida sy ny loholon’ny Isiraely mbamin’ny mpifehy arivo no nandeha hampakatra ny fiaran’ny faneken’i Jehovah avy tao an-tranon’i Obed-edoma tamin’ny fifaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa nomban’Andriamanitra ny Levita izay nilanja ny fiaran’ny faneken’i Jehovah, dia namono vantotr’ombilahy fito sy ondrilahy fito hatao fanatitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary niakanjo akanjo rongony fotsy madinika Davida, ary niakanjo toy izany koa ny Levita rehetra izay nitondra ny fiara ary ny mpihira sy Kenania, tonian’ny fitondrana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny hira.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny mpihira; ary Davida nisalotra efoda rongony fotsy koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toy izany no nampakaran’ny Isiraely rehetra ny fiaran’ny faneken’i Jehovah tamin’ny fihobiana sy ny feon’ny anjomara sy ny trompetra ary ny kipantsona sy tamin’ny fitendrena ny valiha sy ny lokanga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary nony tonga tao an-Tanànan’i Davida ny fiaran’ny faneken’i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin’i Saoly, ka nahita an’i Davida mpanjaka nibitaka sy nitsinjaka; ka dia nikizaka azy tao am-pony izy.
