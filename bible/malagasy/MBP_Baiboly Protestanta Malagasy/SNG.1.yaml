document_id: SNG.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny tonon-kira tsara indrindra, izay nataon’i Solomona.
  - type: heading
    content: Ny ampakarina sy ny zanakavavin’i Jerosalema.
  '10':
  - type: text
    content: 'Mahatsara ny tarehinao ireo '
  - type: text
    content: voahangy
  - type: text
    content: ' voatohy;'
  - type: text
    content: Manendrika ny vozonao ireo rado.
  '11':
  - type: text
    content: Nefa rojo volamena misy voavola mibontsimbontsina kosa
  - type: text
    content: No hataonay ho anao.
  '12':
  - type: text
    content: Raha mipetraka amin’ny latabany ny mpanjaka,
  - type: text
    content: Dia mamerovero tsara ny nardako.
  '13':
  - type: text
    content: Ny malalako dia miora am-pehezana madinika
  - type: text
    content: Mandry eo an-tratrako.
  '14':
  - type: text
    content: Ny malalako dia tahaka ny vonin’ny kofera amiko,
  - type: text
    content: Any an-tanimbolin’i En-jedy.
  '15':
  - type: text
    content: Indro, tsara tarehy hianao, ry tompokovavy havako;
  - type: text
    content: Indro, tsara tarehy hianao;
  - type: text
    content: Voromailala ny masonao.
  - type: note
    content: 'Na: Manana masom-boromailala hianao.'
  '16':
  - type: text
    content: Indro, tsara tarehy hianao, ry malalako,
  - type: text
    content: Eny, mahafinaritra;
  - type: text
    content: Maitso ny fandriantsika.
  '17':
  - type: text
    content: Sedera ny sakamandimbin’ny tranontsika,
  - type: text
    content: Ary kypreso ny peta-drindrintsika.
  '2':
  - type: text
    content: ENGA anie ka hanoroka ahy amin’ny fanorohan’ny vavany izy!
  - type: text
    content: Fa tsara noho ny divay ny fitiavanao.
  '3':
  - type: text
    content: Mani-pofona ny menakao tsara,
  - type: text
    content: Menaka manitra voaidina ny anaranao,
  - type: text
    content: Koa izany no itiavan’ny zatovovavy anao.
  '4':
  - type: text
    content: Taomy aho, dia hihazakazaka hanaraka anao izahay;
  - type: text
    content: Nentin’ny mpanjaka ho ao an-efi-tranony aho.
  - type: text
    content: Hifaly sy hiravoravo aminao izahay;
  - type: text
    content: Hankalazainay mihoatra noho ny divay ny fitiavanao;
  - type: text
    content: Fitiavana marina no itiavany anao.
  '5':
  - type: text
    content: Mivalomainty aho, nefa tsara tarehy, ry zanakavavin’i Jerosalema,
  - type: text
    content: Toy ny lain’i Kedara,
  - type: text
    content: Toy ny ambain-dain’i Solomona.
  '6':
  - type: text
    content: Aza mibanjina ahy, fa mivalomainty aho,
  - type: text
    content: Satria efa azon’ny hainandro;
  - type: text
    content: Tezitra tamiko ny zanak’ineny;
  - type: text
    content: Notendreny ho mpiandry ny tanimboalobony aho;
  - type: text
    content: Nefa ny tanimboaloboko kosa, dia ny an’ny tenako, tsy mba nandrasako.
  '7':
  - type: text
    content: Lazao amiko, ry ilay tian’ny fanahiko, izay iandrasanao ny ondrinao,
  - type: text
    content: Sy izay ampandrianao azy raha antoandro;
  - type: text
    content: Fa nahoana no ho tahaka izay mivezivezy foana
  - type: note
    content: 'Na: misarona fisalobonana.'
  - type: text
    content: ' aho'
  - type: text
    content: Eny amin’ny andian’ny namanao?
  '8':
  - type: text
    content: Raha tsy fantatrao, ry tsara tarehy indrindra amin’ny vehivavy,
  - type: text
    content: Dia mandehana hanaraka ny andian’ny ondry aman-osy,
  - type: text
    content: Ary andraso eny amin’ny lain’ny mpiandry ondry ny zanak’osinao.
  - type: heading
    content: Ny mpanjaka sy ny ampakarina.
  '9':
  - type: text
    content: RY tompokovavy havako, hianao dia ampitahaiko
  - type: text
    content: Amin’ny soavalivaviko mitarika ny kalesin’i Farao.
