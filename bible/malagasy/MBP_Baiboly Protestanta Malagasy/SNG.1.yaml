document_id: SNG.1
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tonon-kira tsara indrindra, izay nataon’i Solomona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ampakarina sy ny zanakavavin’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ENGA anie ka hanoroka ahy amin’ny fanorohan’ny vavany izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsara noho ny divay ny fitiavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mani-pofona ny menakao tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Menaka manitra voaidina ny anaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no itiavan’ny zatovovavy anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taomy aho, dia hihazakazaka hanaraka anao izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nentin’ny mpanjaka ho ao an-efi-tranony aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifaly sy hiravoravo aminao izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hankalazainay mihoatra noho ny divay ny fitiavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fitiavana marina no itiavany anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mivalomainty aho, nefa tsara tarehy, ry zanakavavin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny lain’i Kedara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny ambain-dain’i Solomona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mibanjina ahy, fa mivalomainty aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa azon’ny hainandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tezitra tamiko ny zanak’ineny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Notendreny ho mpiandry ny tanimboalobony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny tanimboaloboko kosa, dia ny an’ny tenako, tsy mba nandrasako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lazao amiko, ry ilay tian’ny fanahiko, izay iandrasanao ny ondrinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay ampandrianao azy raha antoandro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nahoana no ho tahaka izay mivezivezy foana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misarona fisalobonana.
    marker-yv: yv-n
  - type: text
    text: ' aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny amin’ny andian’ny namanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha tsy fantatrao, ry tsara tarehy indrindra amin’ny vehivavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mandehana hanaraka ny andian’ny ondry aman-osy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary andraso eny amin’ny lain’ny mpiandry ondry ny zanak’osinao.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny mpanjaka sy ny ampakarina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: RY tompokovavy havako, hianao dia ampitahaiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny soavalivaviko mitarika ny kalesin’i Farao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mahatsara ny tarehinao ireo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: voahangy
  - type: text
    text: ' voatohy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manendrika ny vozonao ireo rado.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nefa rojo volamena misy voavola mibontsimbontsina kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hataonay ho anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha mipetraka amin’ny latabany ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mamerovero tsara ny nardako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny malalako dia miora am-pehezana madinika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandry eo an-tratrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny malalako dia tahaka ny vonin’ny kofera amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any an-tanimbolin’i En-jedy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, tsara tarehy hianao, ry tompokovavy havako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, tsara tarehy hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voromailala ny masonao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manana masom-boromailala hianao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, tsara tarehy hianao, ry malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maitso ny fandriantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sedera ny sakamandimbin’ny tranontsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary kypreso ny peta-drindrintsika.
