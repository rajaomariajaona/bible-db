document_id: LUK.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanasan’ny Fariseo anankiray an’i Jesosy, sy ny nahasitranany lehilahy narary manirano, ary ny nitoriany teny tamin’ny olona tao an-trano.
  - type: text
    content: 'ARY raha niditra mba hihinana tao an-tranon’ny loholona anankiray amin’ny Fariseo Izy tamin’ny Sabata, dia nizaha taratra Azy ireo. '
  '10':
  - type: text
    content: 'Fa raha misy manasa anao, mandehana ka mipetraha eo amin’ny fitoerana aoriana indrindra, ary rehefa tonga ilay nanasa anao, dia mahazo manao aminao hoe: Ry sakaiza, mandrosoa etsy alohaloha kokoa; dia hahazo haja eo imason’izay rehetra miara-mipetraka mihinana aminao hianao. '
  '11':
  - type: text
    content: Fa izay rehetra manandra-tena no haetry; ary izay manetry tena no hasandratra.
  '12':
  - type: text
    content: 'Ary hoy Jesosy tamin’ilay nanasa Azy kosa: Raha manasa olona amin’ny sakafo antoandro na ny sakafo hariva hianao, dia aza ny sakaizanao, na ny rahalahinao, na ny havanao, na ny namanao manan-karena, no asainao, fandrao hanasa anao kosa ireo, ka dia ho voavaliny hianao. '
  '13':
  - type: text
    content: 'Fa raha manao fanasana hianao, dia asao ny malahelo, ny kilemaina, ny mandringa, ny jamba; '
  '14':
  - type: text
    content: dia ho sambatra hianao, satria tsy mba manan-kavaly ireo; fa hovaliana kosa hianao amin’ny fitsanganan’ny marina.
  '15':
  - type: text
    content: 'Ary ny anankiray tamin’izay niara-nipetraka nihinana taminy dia nandre izany ka nanao taminy hoe: Sambatra izay hihinan-kanina ao amin’ny fanjakan’Andriamanitra. '
  '16':
  - type: text
    content: 'Fa hoy Jesosy taminy: Nisy olona anankiray nanao fanasana lehibe ka nanasa olona maro. '
  '17':
  - type: text
    content: 'Ary naniraka ny mpanompony izy tamin’ny fotoana fisakafoana hilaza amin’izay efa nasaina hoe: Andeha, fa efa voavoatra izao '
  - type: text
    content: ny fanasana.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Fa izy rehetra dia nitovy saina, ka samy nanao fialana. Hoy ny voalohany taminy: Efa nividy tany aho ka tsy maintsy mandeha hizaha azy; masìna hianao, ekeo ny fandavako. '
  '19':
  - type: text
    content: 'Ary hoy ny anankiray koa: Efa nividy omby folo aho ka handeha hamantatra azy; masìna hianao, ekeo ny fandavako. '
  '2':
  - type: text
    content: 'Ary, indro, nisy olona manirano anankiray teo anatrehany. '
  '20':
  - type: text
    content: 'Ary hoy ny anankiray koa: Efa nampaka-bady aho, koa amin’izany tsy afaka mankany. '
  '21':
  - type: text
    content: 'Ary nony tonga ilay mpanompo, dia nambarany tamin’ny tompony izany. Dia tezitra ny tompon-trano ka nanao tamin’ilay mpanompony hoe: Mandehana faingana ho eny amin’ny lalambe sy ny sakeli-dàlana eto an-tanàna, ka ampidiro ny malahelo sy ny kilemaina sy ny jamba ary ny mandringa. '
  '22':
  - type: text
    content: 'Ary hoy ilay mpanompo: Tompoko, efa natao izay nandidianao, ary mbola tsy feno ihany ny trano. '
  '23':
  - type: text
    content: 'Ary hoy ny tompo tamin’ilay mpanompony: Mandehana ho eny amin’ny lalambe sy ny sisim-boly, ka tereo ny olona hiditra, mba ho feno ny tranoko. '
  '24':
  - type: text
    content: 'Fa lazaiko aminareo: Tsy hisy hanandrana ny nahandroko ireny olona nasaiko ireny na dia iray akory aza.'
  - type: heading
    content: Ny nilazan’i Jesosy tamin’ny olona maro nanaraka Azy izay tokony ho toetra ny mpianany.
  '25':
  - type: text
    content: 'ARY nisy vahoaka betsaka niaraka tamin’i Jesosy, dia nitodika Izy ka nanao taminy hoe: '
  '26':
  - type: text
    content: 'Raha misy manaraka Ahy ka tsy mankahala ny rainy sy ny reniny sy ny vadiny sy ny zanany sy ny rahalahiny sy ny anabaviny, eny, ary ny ainy koa aza, dia tsy azo '
  - type: text
    content: ekena
  - type: text
    content: ' ho mpianatro izy. '
  '27':
  - type: text
    content: 'Na zovy na zovy no tsy mitondra ny hazofijaliana ka tsy manaraka Ahy, dia tsy azo '
  - type: text
    content: ekena
  - type: text
    content: ' ho mpianatro izy.'
  '28':
  - type: text
    content: 'Fa iza moa aminareo, raha ta-hanao tilikambo, no tsy mipetraka aloha mihevitra izay ho lany hanaovany izany, na misy hahavitany azy, na tsia? '
  '29':
  - type: text
    content: 'fandrao, rehefa nanao ny fanorenana izy ka tsy mahavita, dia handatsa azy izay rehetra mahita '
  '3':
  - type: text
    content: 'Ary Jesosy namaly ka nanao tamin’ny mpahay lalàna sy ny Fariseo hoe: Mety va ny mahasitrana amin’ny Sabata, sa tsia? '
  '30':
  - type: text
    content: 'ka hanao hoe: Io olona io dia nanomboka nanao trano, fa tsy nahavita.'
  '31':
  - type: text
    content: 'Ary iza moa no mpanjaka, raha handeha hiady amin’ny mpanjaka hafa, no tsy mipetraka aloha mba haka hevitra tsara, na mahay mandresy ilay mitondra roa alina amin’ny iray alina izy, na tsia? '
  '32':
  - type: text
    content: Fa raha tsy izany, raha mbola lavitra ny mpanjaka anankiray, dia hampitondra teny izy ka hangataka fihavanana.
  '33':
  - type: text
    content: 'Ary toy izany koa hianareo rehetra, izay tsy mahafoy izay rehetra anananareo, dia tsy azo '
  - type: text
    content: ekena
  - type: text
    content: ' ho mpianatro.'
  '34':
  - type: text
    content: 'Koa tsara ny sira; fa raha ny sira aza no tonga matsatso, inona indray no hahasira azy? '
  '35':
  - type: text
    content: Tsy mahasoa ny tany na ny zezika izy, fa harian’ny olona. Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.
  '4':
  - type: text
    content: 'Fa tsy niteny ireo. Ary Izy nanendry '
  - type: text
    content: ilay marary,
  - type: text
    content: ' dia nahasitrana azy ka nandefa azy handeha. '
  '5':
  - type: text
    content: 'Ary Izy nanao tamin’ireo hoe: Iza moa aminareo, raha manana boriky na omby latsaka ao an-davaka fantsakana, no tsy hampakatra azy miaraka amin’izay na dia amin’ny andro Sabata aza? '
  '6':
  - type: text
    content: Ary tsy nahavaly ny amin’izany zavatra izany izy.
  '7':
  - type: text
    content: 'Ary Jesosy nanao fanoharana tamin’izay nasaina, raha nahita azy mifidy ny fitoerana aloha, ka nanao taminy hoe: '
  '8':
  - type: text
    content: 'Raha misy maka anao ho any amin’ny fampakaram-bady, aza mipetraka eo amin’ny fitoerana aloha, fandrao hisy olona nalaina izay mihaja kokoa noho hianao, '
  '9':
  - type: text
    content: 'ary ho avy izay nanasa anao sy izy ka hilaza aminao hoe: Omeo toerana io olona io: dia ho menatra hianao ka hifindra ho any amin’ny fitoerana aoriana indrindra. '
