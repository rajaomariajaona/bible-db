document_id: 2SA.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandrosoan’ny fanjakan’i Davida, sy ny nihenan’ny an’Isboseta kosa, ary ny nivadihan’i Abnera hanaraka an’i Davida, sy ny namonoan’i Joaba azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY naharitra ela ny adin’ny tamingan’i Saoly sy ny tamingan’i Davida, nefa Davida nihahery, fa ny tamingan’i Saoly kosa nihahosa.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hampiala ny fanjakana amin’ny tamingan’i Saoly aho ary hampitoetra ny seza fiandrianan’i Davida amin’ny Isiraely sy amin’ny Joda hatrany Dana ka hatrany Beri-sheba. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy nahavaly an’i Abnera intsony izy noho ny tahony azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Abnera dia naniraka olona tany amin’i Davida niaraka tamin’izay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hisolo vava azy.
      marker-yv: yv-n
    - type: text
      text: ' hanao hoe: An’iza ny tany? Ary koa hoe: Manaova fanekena amiko, ary, indro, ny tànako homba anao hampanaiky ny Isiraely rehetra anao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy: Tsara izany; izaho hanao fanekena aminao; kanefa zavatra iray loha no ilaiko aminao: Tsy hahazo mihaona amiko hianao, raha tsy entinao atỳ Mikala, zanakavavin’i Saoly.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida naniraka olona nankany amin’Isboseta, zanakalahin’i Saoly, hanao hoe: Omeo ahy Mikala vadiko, izay efa nifanekena ho vadiko tamin’ny mariky ny fahafatesan’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron-tsotsoka.
      marker-yv: yv-n
    - type: text
      text: ' ny Filistina zato lahy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isboseta naniraka naka an’i Mikala tany amin’i Paltiela vadiny, zanak’i Laisy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary io vadiny io nanaraka azy ka nitomany teny aoriany hatrany Bahorima. Fa hoy Abnera taminy: Mandehana miverina. Dia niverina izy.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abnera efa niteny tamin’ny loholon’ny Isiraely hoe: Efa ela izay no nitadiavanareo an’i Davida ho mpanjakanareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa tanteraho izany ankehitriny, fa Jehovah efa nilaza an’i Davida hoe: Amin’ny tànan’i Davida mpanompoko no hamonjeko ny Isiraely oloko ho afaka amin’ny tànan’ny Filistina sy amin’ny tànan’ny fahavalony rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abnera efa niteny tamin’ny Benjamita koa, ary lasa izy hilaza amin’i Davida ao Hebrona koa izay rehetra tian’ny Isiraely sy ny taranak’i Benjamina rehetra hatao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida niteraka zazalahy tao Hebrona: koa Amnona, tamin’i Ahinoama Jezirelita, no lahimatoany; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tany amin’i Davida tao Hebrona Abnera sy olona roa-polo lahy nanaraka azy. Ary nanao fanasana ho an’i Abnera sy ny olona nanaraka azy Davida. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abnera tamin’i Davida: Hiainga aho, dia handeha hamory ny Isiraely rehetra ho etỳ aminao mpanjaka tompoko, mba hanaovany fanekena aminao ary hanjakanao amin’izay rehetra irin’ny fonao. Ary Davida nampandeha an’i Abnera; ka dia lasa soa aman-tsara izy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indreo, tonga ny mpanaraka an’i Davida sy Joaba avy nitoha ka nitondra babo be; ary efa tsy teo amin’i Davida tao Hebrona intsony Abnera, fa efa nalefany izy, ka dia lasa soa aman-tsara. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nony tonga Joaba sy ny miaramila rehetra izay nanaraka azy, dia nisy nanambara tamin’i Joaba hoe: Tonga tao amin’ny mpanjaka Abnera, zanak’i Nera, nefa nalefany izy, ka dia lasa soa aman-tsara. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joaba nankao amin’ny mpanjaka ka nanao hoe: Inona izany nataonao izany? Nahoana no efa tonga teto aminao Abnera ka nalefano fotsiny, ka dia afaka soa aman-tsara izy? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatrao anefa ny amin’i Abnera, zanak’i Nera, fa hamitaka anao no nahatongavany hahalalany ny ivoahanao sy ny idiranao ary hahalalany izay rehetra ataonao.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka Joaba avy tao amin’i Davida ka naniraka olona hanaraka an’i Abnera, ary nitondra azy niverina avy any amin’ny lavaka famorian-drano atao hoe Siraha ireo: nefa tsy fantatr’i Davida izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony niverina tao Hebrona Abnera, dia nentin’i Joaba nitanila tao anaty vavahady hiresaka aminy mangingina, kanjo nasiany tamin’ny kibony ka matiny ho todin’ny ran’i Asahela rahalahiny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia nahare Davida, ka hoy izy: Tsy manan-keloka mandrakizay eo anatrehan’i Jehovah izaho sy ny fanjakako ny amin’ny ran’i Abnera, zanak’i Nera. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hitsingerina amin’ny lohan’i Joaba sy ny tarana-drainy rehetra anie ny todin’izany; ary tsy ho tapaka amin’ny taranak’i Joaba anie ny marary mitsika, na ny boka, na ny mamahana amin’ny tehina, na ny lavon-tsabatra, na ny tsy manan-kohanina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Kileaba, tamin’i Abigaila, ilay novinadin’i Nabala Karmelita, no lahiaivo; ary ny fahatelo dia Absaloma, zanak’i Maka, zanakavavin’i Talmay, mpanjakan’i Gesora; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no namonoan’i Joaba sy Abisay rahalahiny an’i Abnera noho ny namonoany an’i Asahela rahalahiny tao Gibeona tamin’ny ady.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin’i Joaba sy ny olona rehetra izay teo aminy: Triaro ny fitafianareo, ary misikìna lamba fisaonana,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lamba malailay.
      marker-yv: yv-n
    - type: text
      text: ' ka aoka hisaona eo anolohan’i Abnera hianareo. Ary Davida mpanjaka nanaraka ny tranovorona. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandevina an’i Abnera tao Hebrona izy; ary ny mpanjaka nanandratra ny feony ka nitomany teo amin’ ny fasan’i Abnera; ary ny vahoaka rehetra dia mba nitomany koa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka nanao hira fisaonana an’i Abnera hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fahafatesan’ny adala va no tokony ho nahafatesan’i Abnera?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànanao tsy nifatotra, ary ny tongotrao tsy nigadra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tahaka ny fikarapok’izay asian’ny olon-dratsy no nikarapohanao.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka rehetra dia mbola nitomany azy indray. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy rehetra dia avy hampihinan-kanina an’i Davida raha mbola antoandro, nefa Davida nianiana hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha mba hitendry hanina na inona na inona akory aho mandra-pilentiky ny masoandro. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary azon’ny vahoaka rehetra ny hevitr’izany ka nankasitrahany, dia tahaka ny nankasitrahany izay rehetra nataon’ny mpanjaka. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia fantatry ny vahoaka rehetra sy ny Isiraely rehetra tamin’izany andro izany fa tsy avy tamin’ny mpanjaka no nahafaty an’i Abnera, zanak’i Nera.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’ny mpanompony: Tsy fantatrareo va fa komandy sady lehilahy malaza no maty andro-any tamin’ny Isiraely? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy mbola manan-kery loatra aho izao, na dia mpanjaka efa voahosotra aza; ary ireo zanak’i Zeroia ireo dia mahery sata loatra amiko; Jehovah anie hamaly izay nanao izao ratsy izao araka ny ratsy nataony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny fahefatra dia Adonia, zanak’i Hagita; ary ny fahadimy dia Sefatia, zanak’i Abitala; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fahenina dia Jitreama, tamin’i Egla, vadin’i Davida. Ireo no naterak’i Davida tao Hebrona.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mbola niady ny tamingan’i Davida sy ny tamingan’i Saoly, Abnera dia nampiseho hery niandany tamin’ny tamingan’i Saoly. (
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly nanana vaditsindrano, Rizpa no anarany, zanakavavin’i Aia.) Kanefa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Isboseta
    - type: text
      text: ' niteny tamin’i Abnera hoe: Nahoana no nalainao ny vaditsindranon’ikaky? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra mafy Abnera noho ny tenin’Isboseta, ka hoy izy: Lohan’alika no miandany amin’ny Joda va aho? He! izato izaho manisy soa ny tamingan’i Saoly rainao sy ny rahalahiny sy ny sakaizany izao ka tsy nanolotra anao ho eo an-tànan’i Davida, nefa aho izao helohinao noho ny amin’iny vehivavy iny? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hataon’Andriamanitra amin’i Abnera anie izany, eny, mihoatra noho izany aza, raha tsy hataoko aminy araka ny nianianan’i Jehovah tamin’i Davida, '
