document_id: 2KI.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namongorana ny taranak’i Ahaba sy ny rahalahin’i Ahazia ary ny mpaminanin’i Bala, sy ny nanjakan’i Jeho tamin’ny Isiraely.
  - type: text
    content: 'ARY nisy zanak’i Ahaba fito-polo lahy tany Samaria. Ary Jeho nanoratra taratasy ka nampitondra iny ho any Samaria any amin’ny mpanapaka any Jezirela–dia ho any amin’ny loholona sy ny mpitaiza '
  - type: text
    content: ny zanak’i
  - type: text
    content: ' Ahaba–nanao hoe: '
  '10':
  - type: text
    content: Aoka ho fantatrareo ary fa tsy hisy raraka an-tany ny tenin’i Jehovah izay nolazainy ny amin’ny taranak’i Ahaba; fa Jehovah efa nanao izay nampilazainy an’i Elia mpanompony.
  '11':
  - type: text
    content: Ka dia novonoin’i Jeho izay sisa rehetra tamin’ny taranak’i Ahaba tao Jezirela sy ny olom-baventy rehetra tao aminy mbamin’ny havany ary ny mpisorony koa, ambara-paha-tsy hisy miangana na dia iray akory aza.
  '12':
  - type: text
    content: Dia niainga izy ka nankany Samaria. Ary nony mby tany an-trano fivorian’
  - type: note
    content: 'Na: Bet-ekeda.'
  - type: text
    content: ' ny mpiandry ondry tany an-dalana Jeho, '
  '13':
  - type: text
    content: 'dia nifanena tamin’ny rahalahin’i Ahazia, mpanjakan’ny Joda, izy ka nanao hoe: Iza ange hianareo? Ary izy ireo namaly hoe: Rahalahin’i Ahazia izahay ary midina mba hamangy ny zanakalahin’ny mpanjaka sy ny zanakalahin’ny andriambavy. '
  '14':
  - type: text
    content: 'Ary hoy Jeho: Sambory velona ireo. Dia nosamboriny ka novonoiny teo akaikin’ny lavaka famorian-drano tao an-trano fivoriana'
  - type: note
    content: 'Na: Bet-ekeda.'
  - type: text
    content: ' izy roa amby efa-polo lahy ireo, ary tsy nasiany miangana na dia iray akory aza. '
  '15':
  - type: text
    content: 'Ary rehefa niala teo Jeho, dia nahita an’i Jonadaba, zanakalahin’i Rekaba, avy manatona azy; dia niarahaba azy izy ary nanao taminy hoe: Marina va ny fonao tahaka ny foko amin’ny fonao? Ary Jonadaba namaly hoe: Eny. Raha izany ary no izy, '
  - type: text
    content: hoy Jeho
  - type: text
    content: ', dia aoka isika hifandray tànana. Dia natolony ny tànany, ka nampiakarin’i Jeho ho eo aminy teo anatin’ny kalesy izy. '
  '16':
  - type: text
    content: 'Ary hoy Jeho: Andeha hiaraka amiko, ka izahao ny zotom-poko ho an’i Jehovah. Dia nentina teo amin’ny kalesy izy.'
  '17':
  - type: text
    content: Ary rehefa tonga tany Samaria Jeho, dia namono izay sisa rehetra tamin’ny tamingan’i Ahaba tany Samaria mandrapaharingany, araka ny tenin’i Jehovah izay nolazainy tamin’i Elia.
  '18':
  - type: text
    content: 'Ary Jeho namory ny vahoaka rehetra ka nanao taminy hoe: Ahaba nanompo an’i Bala kelikely ihany, fa Jeho no hanompo azy fatratra. '
  '19':
  - type: text
    content: Koa ankehitriny vorio ho atỳ amiko ny mpaminanin’i Bala rehetra, ny mpanompony rehetra sy ny mpisorony rehetra; aza avela hisy tsy ho tonga na dia iray akory aza; fa hamono zavatra betsaka ho fanatitra ho an’i Bala aho; koa na iza na iza tsy ho tonga, dia tsy hovelomina izy. Kanjo Jeho nanao izany ho fihendrena handringanany ny mpanompon’i Bala.
  '2':
  - type: text
    content: 'Ary raha tonga atỳ aminareo ity taratasy ity (fa ao aminareo ny zanakalahin’ny tomponareo, ary ao aminareo ny kalesy sy ny soavaly sy ny tanàna mimanda ary ny fiadiana), '
  '20':
  - type: text
    content: 'Ary hoy Jeho: Manendre'
  - type: note
    content: Heb. Manamasìna.
  - type: text
    content: ' fivoriana masina ho an’i Bala. Koa dia nanendry'
  - type: note
    content: Heb. nanamasina.
  - type: text
    content: ' andro izy. '
  '21':
  - type: text
    content: 'Ary Jeho naniraka tany amin’ny Isiraely rehetra, ary dia tonga ny mpanompon’i Bala rehetra, ka tsy nisy lehilahy tsy tonga teo na dia iray akory aza. Ary dia niditra tao an-tranon’i Bala ireo, ka feno hika ny trano. '
  '22':
  - type: text
    content: 'Dia hoy Jeho tamin’ny mpitahiry ny fitafiana: Amoahy fitafiana ny mpanompon’i Bala rehetra. Ary dia namoaka ny fitafiana ho azy izy.'
  '23':
  - type: text
    content: 'Ary Jeho sy Jonadaba, zanak’i Rekaba, nankao an-tranon’i Bala ka niteny tamin’ny mpanompon’i Bala hoe: Fantaro tsara sy izahao, fandrao misy mpanompon’i Jehovah eto aminareo, fa tsy ny mpanompon’i Bala ihany.'
  '24':
  - type: text
    content: 'Ary nony niditra hanatitra fanatitra dorana sy fanatitra hafa alatsa-dra izy, Jeho kosa dia nametraka valo-polo lahy teo ala-trano ka nanao hoe: Raha misy afa-mandositra ny olona izay nentiko ho eto an-tànanareo,–'
  - type: text
    content: izay mamela azy handeha
  - type: text
    content: ', dia ny ainy no hisolo ny ainy. '
  '25':
  - type: text
    content: 'Ary rehefa vita ny nanaterany ny fanatitra dorana, dia hoy Jeho tamin’ny mpiambina sy ny mpanafika malaza: Midira, ka vonoy, ary aza avela hisy ho tafavoaka. Dia namely azy tamin’ny lelan-tsabatra izy; ary ny mpiambina sy ny mpanafika malaza dia nanary ny faty ary niditra tao amin’ny tanàna nisy ny tranon’i Bala. '
  '26':
  - type: text
    content: 'Ary namoaka ny orin-kazo izay tao an-tranon’i Bala izy ka nandoro ireny. '
  '27':
  - type: text
    content: Ary nandrava ny tsangam-baton’i Bala sy ny tranony izy, ary dia nataony trano fivoahana mandraka andro-any izany.
  '28':
  - type: text
    content: 'Toy izany no nandravan’i Jeho an’i Bala tsy ho amin’ny Isiraely. '
  '29':
  - type: text
    content: 'Nefa Jeho tsy dia niala tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Isiraely, dia tamin’ireo ombilahy kely volamena izay tao Betela sy Dana. '
  '3':
  - type: text
    content: 'dia izahao izay tsara sy mendrika indrindra amin’ny zanakalahin’ny tomponareo, ary apetraho amin’ny seza fiandrianan-drainy izy, ka miadia ary ho an’ny mpianakavin’ny tomponareo. '
  '30':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Jeho: Satria efa nanao soa hianao tamin’ny nanaovanao izay mahitsy eo imasoko sady efa nataonao tamin’ny taranak’i Ahaba araka izay rehetra tao am-poko, koa dia hitoetra amin’ny seza fiandrianan’ny Isiraely ny taranakao hatramin’ny zafindohalika. '
  '31':
  - type: text
    content: Nefa Jeho tsy nitandrina handeha amin’ny làlan’i Jehovah, Andriamanitry ny Isiraely, amin’ny fony rehetra; fa tsy niala tamin’ny fahotan’i Jeroboama izay nampanotany ny Isiraely izy.
  '32':
  - type: text
    content: 'Tamin’izany andro izany no niantombohan’ny nanakelezan’i Jehovah ny Isiraely; fa Hazaela namely azy tamin’ny sisin-tanin’ny Isiraely rehetra '
  '33':
  - type: text
    content: hatrany Jordana no ho miantsinanana, dia ny tany Gileada rehetra, ny Gadita sy ny Robenita ary ny Manasita, hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, dia Gileada sy Basana.
  '34':
  - type: text
    content: 'Ary ny tantaran’i Jeho sisa mbamin’izay rehetra nataony ary ny heriny rehetra, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Isiraely va izany? '
  '35':
  - type: text
    content: 'Ary Jeho lasa nodi-mandry any amin’ny razany, dia nalevina tao Samaria izy. Ary Joahaza zanany no nanjaka nandimby azy. '
  '36':
  - type: text
    content: Ary ny andro izay nanjakan’i Jeho tamin’ny Isiraely tao Samaria dia valo amby roa-polo taona.
  '4':
  - type: text
    content: 'Dia raiki-tahotra indrindra ireo ka nifampilaza hoe: Indro ny mpanjaka roa aza tsy nahajanona teo anatrehany, ka hataontsika ahoana no fahajanona? '
  '5':
  - type: text
    content: 'Ary ny lehiben’ny tandapa sy ny mpanapaka ny tanàna ary ny loholona koa sy ireo mpitaiza naniraka tany amin’i Jeho nanao hoe: Mpanomponao izahay, koa izay rehetra andidianao anay dia hataonay; tsy hanangana andriana izahay, fa izay sitraky ny fonao ihany no ataovy.'
  '6':
  - type: text
    content: 'Dia nanoratra taratasy taminy indray Jeho nanao hoe: Raha ahy ary hianareo ka hankatò ny teniko, dia tapaho ny lohan’ireo zanakalahin’ny tomponareo, ary mankanesa atỳ amiko atỳ Jezirela rahampitso toy izao. Ary izy fito-polo lahy zanaky ny mpanjaka dia tao amin’ireo lehiben’ny tanàna, mpitaiza azy. '
  '7':
  - type: text
    content: 'Ary nony efa tonga tany amin’ireo ny taratasy, dia naka ny zanakalahin’ny mpanjaka izy ka namono azy fito-polo lahy, ary nataony tao an-tsobiky ny lohany ka nateriny tany amin’i Jeho tany Jezirela. '
  '8':
  - type: text
    content: 'Ary tonga ny iraka ka nanambara taminy hoe: Indro, efa nitondra ny lohan’ny zanakalahin’ny mpanjaka izy. Ary hoy Jeho: Ampifanongoavy ho roa toko eo anoloan’ny vavahady mandra-pahamarain’ny andro.'
  '9':
  - type: text
    content: 'Ary nony maraina, dia nivoaka Jeho ary nitsangana ka nanao tamin’ny vahoaka rehetra hoe: Marina hianareo, –indro, izaho nikomy tamin’ny tompoko ka nahafaty azy; fa iza kosa no nahafaty ireto rehetra ireto? '
