document_id: JOB.20,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny fanindroany nataon’i Zofara.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Zofara Namatita ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany hitambitamby amin’ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tànany ihany no hampody ny hareny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taolany dia feno ny herin’ny fahatanorana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ota tsy fantatra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa hiara-mandry aminy eo amin’ny vovoka izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mamy ao am-bavany aza ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka afeniny ao ambanin’ny lelany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsitsiny ka tsy foiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tehiriziny ao amin’ny lanilaniny ihany,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miova ny haniny ao an-kibony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka aferon’ny vipera no ao anatiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harena no nateliny, nefa aloany indray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loaran’Andriamanitra hiala ao an-kibony izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny poizin’ny vipera no hotsentsefiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahafaty azy ny lelan’ny menarana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho faly mahita renirano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ony sy riaky ny tantely sy ronono.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy azony atelina izay nikelezany aina, fa tsy maintsy hampodiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia be aza ny hareny, dia tsy ho araka izany ny hafaliany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nampahory sy nahafoy ny reraka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka naka trano an-keriny, fa tsy hahatontosa azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia mamaly ahy ny eritreritro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, noho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary izany no mahatonga.
      marker-yv: yv-n
    - type: text
      text: ' ny fihetsiketsiky ny saiko.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy mahalala mionona ny kibony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hahavonjy ny tenany mbamin’ny tiany indrindra izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy tsy tratry ny fieremany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tsy haharitra ny fiadanany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho poriporitra izy, na dia mihoa-pampana aza ny fananany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànan’ny ory no hamely azy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halefan’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' ny fahatezerany mirehitra hameno ny kibony;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, halatsany aminy toy ny ranonorana izany ho hanina ho azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mandositra ny vy fiadiana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahavoa azy miboroaka ny tsipìka varahina;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsoahany izany, ka mivoaka avy amin’ny tenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny manelatselatra dia mivoaka avy amin’ny aferony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasa izy azon’ny fahatahorana mafy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny aizim-pito no voarakitra ho amin’ny raki-malalany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afo tsy tsofina no handoro azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady handevona izay sisa ao amin’ny lainy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hambaran’ny lanitra ny helony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany hitsangana hiampanga azy,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lasa ny harena tafiditra ao an-tranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho levona izany amin’ny andro fahatezerany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no anjaran’ny ratsy fanahy avy amin’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy lova voatendrin’Andriamanitra ho azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reko lalandava ny anatra mampahamenatra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanakiho mamaly ahy avy amin’ny fahalalako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantatrao va fa hatramin’ny ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hatrizay nampitoerana ny olona tetỳ ambonin’ny tany,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia vetivety foana ny firavoravoan’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary indray mipì-maso monja ny fifalian’ny mpihatsaravelatsihy?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia mipaka amin’ny lanitra aza ny hahavony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitehika amin’ny rahona ny lohany,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho very mandrakizay toy ny dikiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny tain’omby atainy.
      marker-yv: yv-n
    - type: text
      text: ' ihany izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nahita azy dia hanao hoe: Aiza izy?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manidina tahaka ny nofy izy ka tsy ho hita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ampandosirina tahaka ny tsindrimandry amin’ny alina izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maso izay mijery, dia indray mitopy ihany no ahitany azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia tsy hahita azy intsony ny fitoerany.
