document_id: JOB.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanindroany nataon’i Zofara.
  - type: text
    content: 'DIA namaly Zofara Namatita ka nanao hoe:'
  '10':
  - type: text
    content: Ny zanany hitambitamby amin’ny malahelo,
  - type: text
    content: Ary ny tànany ihany no hampody ny hareny.
  '11':
  - type: text
    content: Ny taolany dia feno ny herin’ny fahatanorana,
  - type: note
    content: 'Na: ota tsy fantatra.'
  - type: text
    content: Nefa hiara-mandry aminy eo amin’ny vovoka izany.
  '12':
  - type: text
    content: Na dia mamy ao am-bavany aza ny ratsy,
  - type: text
    content: Ka afeniny ao ambanin’ny lelany,
  '13':
  - type: text
    content: Ary tsitsiny ka tsy foiny,
  - type: text
    content: Fa tehiriziny ao amin’ny lanilaniny ihany,
  '14':
  - type: text
    content: Dia miova ny haniny ao an-kibony,
  - type: text
    content: Ka aferon’ny vipera no ao anatiny.
  '15':
  - type: text
    content: Harena no nateliny, nefa aloany indray;
  - type: text
    content: Loaran’Andriamanitra hiala ao an-kibony izany.
  '16':
  - type: text
    content: Ny poizin’ny vipera no hotsentsefiny;
  - type: text
    content: Hahafaty azy ny lelan’ny menarana.
  '17':
  - type: text
    content: Tsy ho faly mahita renirano izy,
  - type: text
    content: Dia ony sy riaky ny tantely sy ronono.
  '18':
  - type: text
    content: Tsy azony atelina izay nikelezany aina, fa tsy maintsy hampodiny;
  - type: text
    content: Na dia be aza ny hareny, dia tsy ho araka izany ny hafaliany.
  '19':
  - type: text
    content: Fa nampahory sy nahafoy ny reraka izy
  - type: text
    content: Ka naka trano an-keriny, fa tsy hahatontosa azy.
  '2':
  - type: text
    content: Noho izany dia mamaly ahy ny eritreritro,
  - type: text
    content: Eny, noho
  - type: note
    content: 'Na: Ary izany no mahatonga.'
  - type: text
    content: ' ny fihetsiketsiky ny saiko.'
  '20':
  - type: text
    content: Satria tsy mahalala mionona ny kibony,
  - type: text
    content: Dia tsy hahavonjy ny tenany mbamin’ny tiany indrindra izy.
  '21':
  - type: text
    content: Tsy misy tsy tratry ny fieremany;
  - type: text
    content: Ka dia tsy haharitra ny fiadanany.
  '22':
  - type: text
    content: Ho poriporitra izy, na dia mihoa-pampana aza ny fananany;
  - type: text
    content: Ny tànan’ny ory no hamely azy.
  '23':
  - type: text
    content: Halefan’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' ny fahatezerany mirehitra hameno ny kibony;'
  - type: text
    content: Eny, halatsany aminy toy ny ranonorana izany ho hanina ho azy.
  '24':
  - type: text
    content: Raha mandositra ny vy fiadiana izy,
  - type: text
    content: Dia hahavoa azy miboroaka ny tsipìka varahina;
  '25':
  - type: text
    content: Tsoahany izany, ka mivoaka avy amin’ny tenany;
  - type: text
    content: Eny, ny manelatselatra dia mivoaka avy amin’ny aferony;
  - type: text
    content: Lasa izy azon’ny fahatahorana mafy.
  '26':
  - type: text
    content: Ny aizim-pito no voarakitra ho amin’ny raki-malalany;
  - type: text
    content: Afo tsy tsofina no handoro azy
  - type: text
    content: Sady handevona izay sisa ao amin’ny lainy.
  '27':
  - type: text
    content: Hambaran’ny lanitra ny helony,
  - type: text
    content: Ary ny tany hitsangana hiampanga azy,
  '28':
  - type: text
    content: Ho lasa ny harena tafiditra ao an-tranony;
  - type: text
    content: Eny, ho levona izany amin’ny andro fahatezerany.
  '29':
  - type: text
    content: Izany no anjaran’ny ratsy fanahy avy amin’Andriamanitra,
  - type: text
    content: Sy lova voatendrin’Andriamanitra ho azy.
  '3':
  - type: text
    content: Reko lalandava ny anatra mampahamenatra ahy,
  - type: text
    content: Ary ny fanakiho mamaly ahy avy amin’ny fahalalako.
  '4':
  - type: text
    content: Tsy fantatrao va fa hatramin’ny ela,
  - type: text
    content: Eny, hatrizay nampitoerana ny olona tetỳ ambonin’ny tany,
  '5':
  - type: text
    content: Dia vetivety foana ny firavoravoan’ny ratsy fanahy,
  - type: text
    content: Ary indray mipì-maso monja ny fifalian’ny mpihatsaravelatsihy?
  - type: note
    content: 'Na: ratsy fanahy.'
  '6':
  - type: text
    content: Fa na dia mipaka amin’ny lanitra aza ny hahavony,
  - type: text
    content: Ka mitehika amin’ny rahona ny lohany,
  '7':
  - type: text
    content: Dia ho very mandrakizay toy ny dikiny
  - type: note
    content: 'Na: ny tain’omby atainy.'
  - type: text
    content: ' ihany izy;'
  - type: text
    content: 'Izay nahita azy dia hanao hoe: Aiza izy?'
  '8':
  - type: text
    content: Manidina tahaka ny nofy izy ka tsy ho hita;
  - type: text
    content: Eny, ampandosirina tahaka ny tsindrimandry amin’ny alina izy.
  '9':
  - type: text
    content: Ny maso izay mijery, dia indray mitopy ihany no ahitany azy;
  - type: text
    content: Ary dia tsy hahita azy intsony ny fitoerany.
