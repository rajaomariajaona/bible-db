document_id: MRK.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny lehilahy anankiray maty tànana tamin’ny Sabata, sy ny fahatezeran’ny Fariseo tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.9-21; Lio. 6.6-11.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY niditra tao amin’ny synagoga indray Jesosy: ary nisy lehilahy anankiray maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'efa maina, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malazo.
    marker-yv: yv-n
  - type: text
    text: ' tànana teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nizaha taratra Azy ny olona, na hahasitrana io amin’ny Sabata Izy, na tsia, mba hiampangany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia hoy Jesosy tamin’ilay lehilahy maty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'efa maina, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malazo.
    marker-yv: yv-n
  - type: text
    text: ' tànana: Mitsangàna etsy afovoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy koa Izy tamin’ny olona: Inona moa no mety hatao amin’ny Sabata, ny manao soa va, sa ny manao ratsy? ny mamonjy aina va, sa ny mahafaty? Fa tsy nety niteny ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony nijerijery azy tamin’ny fahatezerana Izy sady nalahelo noho ny hamafin’ny fony, dia hoy Izy tamin-dralehilahy: Ahinjiro ny tànanao. Dia nahinjiny, ka sitrana ny tànany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary lasa nivoaka ny Fariseo, ka niaraka tamin’izay dia niray tetika tamin’ny Herodiana izy hanohitra an’i Jesosy mba hahafaty Azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny olona maro teo amoron’ny Ranomasin’i Galilia.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.15?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ARY Jesosy mbamin’ny mpianany niala teo ka nankany amin’ny ranomasina; ary nisy olona maro avy tany Galilia nanaraka Azy; ary nisy olona maro koa avy tany Jodia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: sy Jerosalema sy Edoma sy tany an-dafin’i Jordana ary tamin’ny tany manodidina an’i Tyro sy Sidona nandre izay zavatra nataony, dia nankeo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Izy nilaza tamin’ny mpianany mba hanisy sambokely hiandry Azy noho ny habetsahan’ny vahoaka, fandrao mifanety aminy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa efa nahasitrana olona maro Izy, ka dia nifanety taminy mba hanendry Azy izay rehetra nanana aretina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kapoka.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny fanahy maloto, raha nahita Azy, dia niankohoka teo anatrehany ka niantso hoe: Hianao no Zanak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nandrara azy mafy Izy tsy hanao izay hahafantarana Azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanendren’i Jesosy ny Apostoly roa ambin’ny folo lahy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 10.1-4; Lio. 6.12-16.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY niakatra teo an-tendrombohitra Jesosy ka niantso izay tiany hankeo aminy; dia nankeo aminy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanendry roa ambin’ny folo lahy Izy ho ao aminy sy hirahiny hitori-teny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: sady hanana fahefana hamoaka ny demonia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Simona dia nomeny anarana hafa koa hoe Petera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary Jakoba, zanak’i Zebedio, sy Jaona, rahalahin’i Jakoba; izy mirahalahy dia nomeny anarana hafa koa hoe Boanerjesy, izany hoe Zana-baratra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary Andrea sy Filipo sy Bartolomeo sy Matio sy Tomasy sy Jakoba, zanak’i Alfeo, sy Tadeo sy, Simona Kananeana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zelota; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lio. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vi.15.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary Jodasy Iskariota, ilay namadika Azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitadiavan’ny havan’i Jesosy Azy, sy ny namalian’i Jesosy ny teny ratsy nataon’ny Fariseo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.22-50; Lio. 8.19-21; 11.14-26?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY niditra tao an-trano Izy, dia niangona indray ny vahoaka, ka dia tsy nahazo nihinan-kanina akory izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny havany, raha nandre, dia nivoaka hihazona Azy; fa hoy ireo: Efa very saina Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny mpanora-dalàna izay nidina avy tany Jerosalema dia nanao hoe: Manana an’i Belzeboba Izy, sy hoe: Ny lohan’ny demonia no amoahany ny demonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa niantso ireo hankeo aminy Izy, dia nanao fanoharana taminy hoe: Hataon’i Satana ahoana no famoaka an’i Satana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha misy mpiray trano miady an-trano, dia tsy haharitra izany mpiray trano izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha Satana no mitsangana hanohitra ny tenany ka miady an-trano, dia tsy haharitra izy, fa ho rava ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Kanefa tsy misy olona afaka miditra ao an-tranon’ny mahery ka handroba ny entany, raha tsy afatony aloha ilay mahery, dia vao robainy ny ao an-tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak’olombelona amin’ny ota rehetra sy ny fitenenan-dratsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' rehetra izay ataony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: fa izay miteny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahy Masina kosa dia tsy mahazo famelankeloka mandrakizay, fa mendrika hohelohina ny amin’ny ota mandrakizay izy; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany no nolazainy,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'satria ny olona nanao hoe: Azom-panahy maloto Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary avy ny reniny mbamin’ny rahalahiny ka nijanona teo ala-trano, dia naniraka tao aminy hiantso Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny vahoaka nipetraka manodidina Azy ka nanao taminy hoe: Indreo, ato ala-trano ny reninao sy ny rahalahinao mitady Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Izy namaly azy ka nanao hoe: Iza no reniko sy rahalahiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nony nijery izay nipetraka manodidina Azy Izy, dia hoy Izy: Indreo ny reniko sy ny rahalahiko! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa na iza na iza no manao ny sitrapon’Andriamanitra, dia izy no rahalahiko sy anabaviko ary reniko.
