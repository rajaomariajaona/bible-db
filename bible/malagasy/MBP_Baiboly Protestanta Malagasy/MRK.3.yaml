document_id: MRK.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahasitranan’i Jesosy ny lehilahy anankiray maty tànana tamin’ny Sabata, sy ny fahatezeran’ny Fariseo tamin’izany.
  - type: heading
    content: Mat. 12.9-21; Lio. 6.6-11.
  - type: text
    content: 'ARY niditra tao amin’ny synagoga indray Jesosy: ary nisy lehilahy anankiray maty'
  - type: note
    content: Gr. efa maina, na malazo.
  - type: text
    content: ' tànana teo. '
  '10':
  - type: text
    content: Fa efa nahasitrana olona maro Izy, ka dia nifanety taminy mba hanendry Azy izay rehetra nanana aretina.
  - type: note
    content: Gr. kapoka.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Ary ny fanahy maloto, raha nahita Azy, dia niankohoka teo anatrehany ka niantso hoe: Hianao no Zanak’Andriamanitra. '
  '12':
  - type: text
    content: Ary nandrara azy mafy Izy tsy hanao izay hahafantarana Azy.
  - type: heading
    content: Ny nanendren’i Jesosy ny Apostoly roa ambin’ny folo lahy.
  - type: heading
    content: Mat. 10.1-4; Lio. 6.12-16.
  '13':
  - type: text
    content: 'ARY niakatra teo an-tendrombohitra Jesosy ka niantso izay tiany hankeo aminy; dia nankeo aminy ireo. '
  '14':
  - type: text
    content: 'Ary nanendry roa ambin’ny folo lahy Izy ho ao aminy sy hirahiny hitori-teny '
  '15':
  - type: text
    content: sady hanana fahefana hamoaka ny demonia.
  '16':
  - type: text
    content: 'Ary Simona dia nomeny anarana hafa koa hoe Petera; '
  '17':
  - type: text
    content: 'ary Jakoba, zanak’i Zebedio, sy Jaona, rahalahin’i Jakoba; izy mirahalahy dia nomeny anarana hafa koa hoe Boanerjesy, izany hoe Zana-baratra; '
  '18':
  - type: text
    content: ary Andrea sy Filipo sy Bartolomeo sy Matio sy Tomasy sy Jakoba, zanak’i Alfeo, sy Tadeo sy, Simona Kananeana
  - type: note
    content: 'Na: Zelota; izahao Lio. vi.15.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: ary Jodasy Iskariota, ilay namadika Azy.
  - type: heading
    content: Ny nitadiavan’ny havan’i Jesosy Azy, sy ny namalian’i Jesosy ny teny ratsy nataon’ny Fariseo.
  - type: heading
    content: Mat. 12.22-50; Lio. 8.19-21; 11.14-26?
  '2':
  - type: text
    content: 'Ary nizaha taratra Azy ny olona, na hahasitrana io amin’ny Sabata Izy, na tsia, mba hiampangany Azy. '
  '20':
  - type: text
    content: 'ARY niditra tao an-trano Izy, dia niangona indray ny vahoaka, ka dia tsy nahazo nihinan-kanina akory izy. '
  '21':
  - type: text
    content: 'Ary ny havany, raha nandre, dia nivoaka hihazona Azy; fa hoy ireo: Efa very saina Izy.'
  '22':
  - type: text
    content: 'Ary ny mpanora-dalàna izay nidina avy tany Jerosalema dia nanao hoe: Manana an’i Belzeboba Izy, sy hoe: Ny lohan’ny demonia no amoahany ny demonia. '
  '23':
  - type: text
    content: 'Ary rehefa niantso ireo hankeo aminy Izy, dia nanao fanoharana taminy hoe: Hataon’i Satana ahoana no famoaka an’i Satana? '
  '24':
  - type: text
    content: 'Fa raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany. '
  '25':
  - type: text
    content: 'Ary raha misy mpiray trano miady an-trano, dia tsy haharitra izany mpiray trano izany. '
  '26':
  - type: text
    content: 'Ary raha Satana no mitsangana hanohitra ny tenany ka miady an-trano, dia tsy haharitra izy, fa ho rava ny heriny. '
  '27':
  - type: text
    content: Kanefa tsy misy olona afaka miditra ao an-tranon’ny mahery ka handroba ny entany, raha tsy afatony aloha ilay mahery, dia vao robainy ny ao an-tranony.
  '28':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak’olombelona amin’ny ota rehetra sy ny fitenenan-dratsy'
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' rehetra izay ataony; '
  '29':
  - type: text
    content: fa izay miteny ratsy
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny Fanahy Masina kosa dia tsy mahazo famelankeloka mandrakizay, fa mendrika hohelohina ny amin’ny ota mandrakizay izy; '
  - type: text
    content: izany no nolazainy,
  - type: text
    content: ' '
  '3':
  - type: text
    content: Dia hoy Jesosy tamin’ilay lehilahy maty
  - type: note
    content: Gr. efa maina, na malazo.
  - type: text
    content: ' tànana: Mitsangàna etsy afovoany. '
  '30':
  - type: text
    content: 'satria ny olona nanao hoe: Azom-panahy maloto Izy.'
  '31':
  - type: text
    content: 'Ary avy ny reniny mbamin’ny rahalahiny ka nijanona teo ala-trano, dia naniraka tao aminy hiantso Azy. '
  '32':
  - type: text
    content: 'Ary ny vahoaka nipetraka manodidina Azy ka nanao taminy hoe: Indreo, ato ala-trano ny reninao sy ny rahalahinao mitady Anao. '
  '33':
  - type: text
    content: 'Ary Izy namaly azy ka nanao hoe: Iza no reniko sy rahalahiko? '
  '34':
  - type: text
    content: 'Ary nony nijery izay nipetraka manodidina Azy Izy, dia hoy Izy: Indreo ny reniko sy ny rahalahiko! '
  '35':
  - type: text
    content: Fa na iza na iza no manao ny sitrapon’Andriamanitra, dia izy no rahalahiko sy anabaviko ary reniko.
  '4':
  - type: text
    content: 'Ary hoy koa Izy tamin’ny olona: Inona moa no mety hatao amin’ny Sabata, ny manao soa va, sa ny manao ratsy? ny mamonjy aina va, sa ny mahafaty? Fa tsy nety niteny ny olona. '
  '5':
  - type: text
    content: 'Ary nony nijerijery azy tamin’ny fahatezerana Izy sady nalahelo noho ny hamafin’ny fony, dia hoy Izy tamin-dralehilahy: Ahinjiro ny tànanao. Dia nahinjiny, ka sitrana ny tànany.'
  '6':
  - type: text
    content: Ary lasa nivoaka ny Fariseo, ka niaraka tamin’izay dia niray tetika tamin’ny Herodiana izy hanohitra an’i Jesosy mba hahafaty Azy.
  - type: heading
    content: Ny nahasitranan’i Jesosy ny olona maro teo amoron’ny Ranomasin’i Galilia.
  - type: heading
    content: Mat. 12.15?
  '7':
  - type: text
    content: 'ARY Jesosy mbamin’ny mpianany niala teo ka nankany amin’ny ranomasina; ary nisy olona maro avy tany Galilia nanaraka Azy; ary nisy olona maro koa avy tany Jodia '
  '8':
  - type: text
    content: sy Jerosalema sy Edoma sy tany an-dafin’i Jordana ary tamin’ny tany manodidina an’i Tyro sy Sidona nandre izay zavatra nataony, dia nankeo aminy.
  '9':
  - type: text
    content: 'Ary Izy nilaza tamin’ny mpianany mba hanisy sambokely hiandry Azy noho ny habetsahan’ny vahoaka, fandrao mifanety aminy ireo. '
