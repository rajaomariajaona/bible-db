document_id: 1SA.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Saoly sy ny zanany, ary ny nandevenana azy.
  - type: text
    content: 'ARY ny Filistina niady tamin’ny Isiraely, ary nandositra teo anoloan’ny Filistina ny lehilahy amin’ny Isiraely, ary niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  '10':
  - type: text
    content: Dia napetrany tao amin’ny tranon’i Astarta ny fiadiany; ary ny fatiny nohomboany teo amin’ny màndan’i Beti-sana.
  '11':
  - type: text
    content: 'Ary nony ren’ny mponina tany Jabesi-gileada izay nataon’ny Filistina tamin’i Saoly, '
  '12':
  - type: text
    content: 'dia niainga ny lehilahy mahery rehetra ka nandeha mandritra ny alina ary naka ny fatin’i Saoly sy ny fatin’ny zanany teo amin’ny màndan’i Beti-sana; ary tonga tao Jabesy izy ka nandoro azy tao. '
  '13':
  - type: text
    content: Ary nentiny ny taolany ka naleviny tao ambanin’ilay hazo tamariska tao Jabesy, ary dia nifady hanina hafitoana izy.
  '2':
  - type: text
    content: 'Ary ny Filistina nanenjika mafy an’i Saoly sy ny zanany, ka matin’ny Filistina Jonatana sy Abinadaba ary Malkisoa, zanak’i Saoly. '
  '3':
  - type: text
    content: 'Ary mafy ny ady tamin’i Saoly, dia nifanehatra tamin’ny mpandefa tsipìka izy; ary raiki-tahotra indrindra izy noho ny mpandefa tsipìka. '
  '4':
  - type: text
    content: 'Ary hoy Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao, ka tsatohy miboroaka aho, fandrao avy irerỳ tsy mifora irerỳ ka hotsatohany miboroaka aho, dia hataony ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadany, fa natahotra loatra izy. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  '5':
  - type: text
    content: 'Ary rehefa hitan’ny mpitondra ny fiadiany fa maty Saoly, dia mba nianjera tamin’ny sabany koa izy ka niara-maty taminy. '
  '6':
  - type: text
    content: Ka dia niara-maty androtrizay ihany Saoly sy ny zanany telo lahy sy ny mpitondra ny fiadiany ary ny olony rehetra.
  '7':
  - type: text
    content: Ary nony hitan’ny lehilahy amin’ny Isiraely teny an-dafin’ny lohasaha sy teny an-dafin’i Jordana fa nandositra ny lehilahy amin’ny Isiraely, ary maty Saoly sy ny zanany, dia niala tao an-tanàna izy ka nandositra ary dia tonga ny Filistina ka nonina tao.
  '8':
  - type: text
    content: 'Ary nony ampitso, raha tonga haka ny zavatra teo amin’ny maty ny Filistina, dia nahita an’i Saoly sy ny zanany telo lahy niampatrampatra teo an-tendrombohitra Gilboa izy. '
  '9':
  - type: text
    content: 'Ary notapahiny ny lohany, sady nalainy ny fiadiany, ary dia naniraka tany amin’ny tanin’ny Filistina manodidina izy hanambara izany zavatra mahafaly izany ao amin’ny tranon’ny sampiny sy amin’ny olona. '
