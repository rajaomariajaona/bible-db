document_id: 1SA.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahafatesan’i Saoly sy ny zanany, ary ny nandevenana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny Filistina niady tamin’ny Isiraely, ary nandositra teo anoloan’ny Filistina ny lehilahy amin’ny Isiraely, ary niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny Filistina nanenjika mafy an’i Saoly sy ny zanany, ka matin’ny Filistina Jonatana sy Abinadaba ary Malkisoa, zanak’i Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mafy ny ady tamin’i Saoly, dia nifanehatra tamin’ny mpandefa tsipìka izy; ary raiki-tahotra indrindra izy noho ny mpandefa tsipìka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao, ka tsatohy miboroaka aho, fandrao avy irerỳ tsy mifora irerỳ ka hotsatohany miboroaka aho, dia hataony ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadany, fa natahotra loatra izy. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa hitan’ny mpitondra ny fiadiany fa maty Saoly, dia mba nianjera tamin’ny sabany koa izy ka niara-maty taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka dia niara-maty androtrizay ihany Saoly sy ny zanany telo lahy sy ny mpitondra ny fiadiany ary ny olony rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nony hitan’ny lehilahy amin’ny Isiraely teny an-dafin’ny lohasaha sy teny an-dafin’i Jordana fa nandositra ny lehilahy amin’ny Isiraely, ary maty Saoly sy ny zanany, dia niala tao an-tanàna izy ka nandositra ary dia tonga ny Filistina ka nonina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony ampitso, raha tonga haka ny zavatra teo amin’ny maty ny Filistina, dia nahita an’i Saoly sy ny zanany telo lahy niampatrampatra teo an-tendrombohitra Gilboa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary notapahiny ny lohany, sady nalainy ny fiadiany, ary dia naniraka tany amin’ny tanin’ny Filistina manodidina izy hanambara izany zavatra mahafaly izany ao amin’ny tranon’ny sampiny sy amin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia napetrany tao amin’ny tranon’i Astarta ny fiadiany; ary ny fatiny nohomboany teo amin’ny màndan’i Beti-sana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony ren’ny mponina tany Jabesi-gileada izay nataon’ny Filistina tamin’i Saoly, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia niainga ny lehilahy mahery rehetra ka nandeha mandritra ny alina ary naka ny fatin’i Saoly sy ny fatin’ny zanany teo amin’ny màndan’i Beti-sana; ary tonga tao Jabesy izy ka nandoro azy tao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nentiny ny taolany ka naleviny tao ambanin’ilay hazo tamariska tao Jabesy, ary dia nifady hanina hafitoana izy.
