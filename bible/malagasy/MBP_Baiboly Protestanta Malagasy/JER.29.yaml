document_id: JER.29
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Taratasy nampitondrain’i Jeremia ho any amin’ny babo tany Babylona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY izao no fitenin’ny taratasy izay nampitondrain’i Jeremia mpaminany avy tany Jerosalema ho any amin’ny sisa amin’ny loholona voababo sy ho amin’ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, izay nobaboin’i Nebokadnezara ka nentiny avy tany Jerosalema ho any Babylona (
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'rehefa lasa niala tany Jerosalema Jekonia mpanjaka sy ny reniny sy ny tandapa sy ny mpanapaka ny Joda sy Jerosalema mbamin’ny mahay tao-zavatra sy ny mpanefy vy), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ilay teny nampitondrainy an’i Elasa, zanak’i Safana, sy Gemaria, zanak’i Hilkia, izay nirahin’i Zedekia, mpanjakan’ny Joda, ho any Babylona, ho any amin’i Nebokadnezara, mpanjakan’i Babylona, nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely, amin’ny babo rehetra izay natolotro ho babo avy tany Jerosalema ho any Babylona: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Manaova trano hianareo, ka mitoera aminy; ary manaova tanimboly, ka hano ny vokatra avy aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manambadia, ka miteraha zazalahy sy zazavavy; analao vady ny zanakalahinareo, ary ampanambadio ny zanakavavinareo, mba hiterahany zazalahy sy zazavavy, ka hihamaro anie hianareo, fa tsy hihavitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary katsaho izay hiadanan’ny tanàna izay nampandehanako anareo ho babo, ary mivavaha amin’i Jehovah ho azy; fa raha miadana izy, dia mba hiadana koa hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Aza mety hofitahin’ny mpaminaninareo sy ny mpanao fankatovanareo, izay ao aminareo, ary aza mino ny nofinareo izay nofisinareo.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay nampanonofisinareo.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa lainga no vinaniny aminareo amin’ny anarako; tsy naniraka azy Aho, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izao no lazain’i Jehovah: Rehefa tapitra ny fito-polo taona ny amin’i Babylona, dia hamangy anareo Aho, fa hotanterahiko aminareo ny teniko tsara, ka hampodiko ho amin’ity tany ity hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Izaho mahalala ny hevitra iheverako anareo, hoy Jehovah, dia hevitra hahatonga fiadanana, fa tsy loza, mba hanome anareo fanantenana ny amin’ny farany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: farany sy fanantenana.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hiantso Ahy hianareo ka handeha sy hivavaka amiko, dia hihaino anareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hitady Ahy hianareo, dia ho hitanareo Aho, raha katsahinareo amin’ny fonareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, ho hitanareo Aho, hoy Jehovah; ary hampodiko avy amin’ny fahababoana hianareo, ka hangoniko avy any amin’ny firenena rehetra sy avy any amin’ny tany rehetra izay nandroahako anareo, hoy Jehovah, ka hampodiko ho any amin’ilay tany efa nanolorako anareo hobaboina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy hianareo: Jehovah nanangana mpaminany ho anay eto Babylona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao no lazain’i Jehovah ny amin’ny mpanjaka izay mipetraka eo amin’ny seza fiandrianan’i Davida sy ny amin’ny vahoaka rehetra izay monina amin’ity tanàna ity, dia ny rahalahinareo izay tsy mba lasan-ko babo niaraka taminareo,– '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'izao no lazain’i Jehovah, Tompon’ny maro: Indro, hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana, ka hataoko toy ny aviavy ratsy dia ratsy izay tsy azo hanina noho ny haratsiny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary henjehiko amin’ny sabatra sy ny mosary ary ny areti-mandringana izy ka hatolotro ho mpanjenjena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho fampangovitana.
    marker-yv: yv-n
  - type: text
    text: ' any amin’ny fanjakana rehetra ambonin’ny tany, ho fanozonana sy figagana sy zavatra mampisitrisitra sy fandatsa ho an’ny firenena izay nandroahako, azy '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'noho ny tsy nihainoany ny teniko, hoy Jehovah, izay nampitondraiko ny mpaminany mpanompoko ho any aminy,–eny, nifoha maraina koa Aho ka naniraka azy, nefa tsy nihaino hianareo, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa mihainoa ny tenin’i Jehovah, hianareo babo rehetra izay nesoriko tany Jerosalema ho atỳ Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely, ny amin’i Ahaba, zanak’i Kolaia, sy ny amin’i Zedekia, zanak’i Mahaseia, izay maminany lainga aminareo amin’ny anarako: Indro, hatolotro eo an-tanan’i Nebokadnezara, mpanjakan’i Babylona, izy, ka dia hovonoiny eo imasonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy roa lahy dia hataon’ny babo rehetra amin’ny Joda izay any Babylona ho fanozonana hoe: Hataon’i Jehovah tahaka an’i Zedekia sy Ahaba, izay nodoran’ny mpanjakan’i Babylona tamin’ny afo, anie hianao, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: noho ny nanaovany izay fady indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahadalana.
    marker-yv: yv-n
  - type: text
    text: ' tao amin’ny Isiraely sy ny nijangajangany tamin’ny vadin’ny namany ary ny nitenenany lainga tamin’ny anarako, izay tsy nandidiako azy; Izaho no mahalala, ka ho vavolombelona Aho, hoy Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Semaia Nehelamita dia hilazanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Noho ny nampitondranao taratasy tamin’ny anaranao ho amin’ny vahoaka rehetra izay any Jerosalema sy amin’i Zefania mpisorona, zanak’i Mahaseia, ary amin’ny mpisorona rehetra hafa koa nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jehovah efa nanao anao ho mpisorona ho solon’i Joiada mpisorona, mba hanendry izay ho mpiandraikitra ny tranon’i Jehovah, hisakana izay rehetra very saina sy manao azy ho mpaminany, ka dia hasianao boloky hazo ny vozony sy ny tongony; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'koa nahoana hianao no tsy nananatra mafy an’i Jeremia avy any Anatota, izay manao azy ho mpaminany aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa naniraka ho aminay any Babylona izy nanao hoe: Mbola haharitra ela izao, koa manaova trano hianareo, dia mitoera aminy, ary manaova tanimboly, ka hano ny vokatra aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary Zefania mpisorona namaky izany taratasy izany teo anatrehan’i Jeremia mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia tonga tamin’i Jeremia ny tenin’i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Maniraha ho any amin’ny babo rehetra, ka lazao aminy hoe: Izao no lazain’i Jehovah ny amin’i Semaia Nehelamita: Noho ny naminanian’i Semaia taminareo, kanefa tsy nirahiko izy tsinona, fa nampitoky anareo tamin’ny lainga,– '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'dia izao no lazain’i Jehovah: Indro, efa hamaly an’i Semaia Nehelamita sy ny taranany Aho: tsy hanana zanakalahy honina amin’ity firenena ity izy sady tsy hanam-pifaliana amin’ny hahitana ny soa izay hataoko amin’ny oloko, hoy Jehovah, satria fiodinana tamin’i Jehovah no notoriny.'
