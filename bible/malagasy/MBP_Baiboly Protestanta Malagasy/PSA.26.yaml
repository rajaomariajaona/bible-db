document_id: PSA.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahana mba tsy hatao ho naman’ny ratsy fanahy.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: TSARAO aho, Jehovah ô, fa mandeha amin’ny fahamarinako aho;
  - type: text
    content: Ary Jehovah no itokiako, ka tsy miahanahana aho.
  '10':
  - type: text
    content: Izay misy fitaka eny an-tànany,
  - type: text
    content: Ary feno kolikoly ny tànany ankavanana.
  '11':
  - type: text
    content: Fa izaho kosa dia mandeha amin’ny fahamarinako;
  - type: text
    content: Avoty sy amindrao fo aho.
  '12':
  - type: text
    content: Ny tongotro mijoro eo amin’ny tany marina;
  - type: text
    content: Eo am-piangonana no isaorako an’i Jehovah.
  '2':
  - type: text
    content: Diniho aho, Jehovah ô, ka fantaro;
  - type: text
    content: Izahao toetra ny voako sy ny foko.
  '3':
  - type: text
    content: Fa ny famindramponao no eo anoloan’ny masoko;
  - type: text
    content: Ary mandeha amin’ny fahamarinanao aho.
  '4':
  - type: text
    content: Tsy mba miara-mipetraka amin’ny olon-dratsy aho,
  - type: text
    content: Na manan-draharaha amin’ny olom-petsy.
  '5':
  - type: text
    content: Halako ny fiangonan’ny mpanao ratsy;
  - type: text
    content: Ary tsy miara-mipetraka amin’ny ratsy fanahy aho.
  '6':
  - type: text
    content: Manasa ny tànako noho ny fahamarinako aho
  - type: text
    content: Ka te-hitoetra eo akaikin’ny alitaranao, Jehovah ô,
  '7':
  - type: text
    content: Mba hanao feo fiderana
  - type: text
    content: Ka hilaza ny asanao mahagaga rehetra.
  '8':
  - type: text
    content: Jehovah ô, tiako ny trano itoeranao,
  - type: text
    content: Dia ny fonenan’ny voninahitrao.
  '9':
  - type: text
    content: Aza mitondra ny fanahiko hiara-maty amin’ny mpanota,
  - type: text
    content: Na ny aiko amin’ny mpandatsa-dra,
