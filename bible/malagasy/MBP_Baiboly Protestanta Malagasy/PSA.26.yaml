document_id: PSA.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fangatahana mba tsy hatao ho naman’ny ratsy fanahy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TSARAO aho, Jehovah ô, fa mandeha amin’ny fahamarinako aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah no itokiako, ka tsy miahanahana aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izay misy fitaka eny an-tànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary feno kolikoly ny tànany ankavanana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa izaho kosa dia mandeha amin’ny fahamarinako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoty sy amindrao fo aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny tongotro mijoro eo amin’ny tany marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo am-piangonana no isaorako an’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Diniho aho, Jehovah ô, ka fantaro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izahao toetra ny voako sy ny foko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ny famindramponao no eo anoloan’ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandeha amin’ny fahamarinanao aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mba miara-mipetraka amin’ny olon-dratsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na manan-draharaha amin’ny olom-petsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Halako ny fiangonan’ny mpanao ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy miara-mipetraka amin’ny ratsy fanahy aho.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Manasa ny tànako noho ny fahamarinako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka te-hitoetra eo akaikin’ny alitaranao, Jehovah ô,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mba hanao feo fiderana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hilaza ny asanao mahagaga rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah ô, tiako ny trano itoeranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fonenan’ny voninahitrao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza mitondra ny fanahiko hiara-maty amin’ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny aiko amin’ny mpandatsa-dra,
