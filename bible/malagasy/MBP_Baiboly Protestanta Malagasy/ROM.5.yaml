document_id: ROM.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny soa ananan’ny mino an’i Kristy, sy ny fihoaran’izany noho izay soa verin’i Adama.
  - type: text
    content: KOA amin’izany, satria efa nohamarinina tamin’ny finoana isika, dia aoka isika hanana
  - type: note
    content: 'Na: [dia manana].'
  - type: text
    content: ' fihavanana amin’Andriamanitra amin’ny alalan’i Jesosy Kristy Tompontsika. '
  '10':
  - type: text
    content: 'Fa raha fony mbola fahavalo aza isika no nampihavanina tamin’Andriamanitra tamin’ny nahafatesan’ny Zanany, mainka ny hamonjena antsika amin’ny fahavelomany ankehitriny, rehefa nampihavanina. '
  '11':
  - type: text
    content: Ary tsy izany ihany koa, fa mifaly amin’Andriamanitra isika amin’ny alalan’i Jesosy Kristy Tompontsika, Izay nahazoantsika ny fihavanana ankehitriny.
  '12':
  - type: text
    content: 'Koa '
  - type: text
    content: izany
  - type: text
    content: ' dia tahaka ny nidiran’ny ota avy tamin’ny olona iray ho amin’izao tontolo izao, ary ny ota no nidiran’ny fahafatesana, ka nahatratra ny olona rehetra ny fahafatesana, satria samy efa nanota izy rehetra; '
  '13':
  - type: text
    content: 'fa hatrany alohan’ny lalàna aza dia nisy ota tamin’izao tontolo izao; nefa tsy isaina ny ota, raha tsy misy lalàna; '
  '14':
  - type: text
    content: fa ny fahafatesana nanjaka hatramin’i Adama ka hatramin’i Mosesy, na dia tamin’izay tsy nanota tahaka ny nanotan’i Adama aza, izay tandindon’Ilay ho avy.
  '15':
  - type: text
    content: 'Nefa tsy tahaka ny fahadisoana ny fanomezam-pahasoavana. Fa raha ny fahadisoan’ny anankiray no nahatonga fahafatesana ho an’ny maro, mainka ny fahasoavan’Andriamanitra sy ny fanomezana amin’ny fahasoavan’ny Olona iray, dia Jesosy Kristy, no tonga be ho an’ny maro kosa. '
  '16':
  - type: text
    content: 'Ary tsy tahaka ny avy amin’ny anankiray izay nanota ny fanomezana; fa noho ny nataon’ny anankiray no nisehoan’ny fitsarana ho fanamelohana, fa noho ny fahadisoana maro kosa no nisehoan’ny fanomezam-pahasoavana ho fanamarinana. '
  '17':
  - type: text
    content: 'Fa raha ny fahadisoan’ny olona anankiray no nanjakan’ny fahafatesana noho ny nataon’ny anankiray, mainka izay mahazo ny haben’ny fahasoavana sy ny fanomezan’ny fahamarinana no hanjaka amin’ny fiainana noho ny nataon’ny Anankiray, dia Jesosy Kristy. '
  '18':
  - type: text
    content: 'Koa tahaka ny nahatongavan’ny fanamelohana ho an’ny olona rehetra noho ny fahadisoana iray no nahatongavan’ny fanamarinana ho amin’ny fiainana kosa ho an’ny olona rehetra noho ny fahamarinana iray. '
  '19':
  - type: text
    content: 'Fa tahaka ny nanaovana ny maro ho mpanota noho ny tsi-fanarahan’ny olona iray, no hanaovana ny maro ho marina kosa noho ny fanarahan’ny Anankiray. '
  '2':
  - type: text
    content: 'Tamin’ny alalany koa no efa nahazoantsika fanatonana amin’ny finoana ho amin’izao fahasoavana itoerantsika izao, ka dia aoka isika hifaly amin’ny fanantenana ny voninahitr’Andriamanitra. '
  '20':
  - type: text
    content: 'Ary ny lalàna dia niditra koa hahabe ny fahadisoana. Nefa teo amin’izay nihabiazan’ny ota no nihoaran’ny fahasoavana be lavitra, '
  '21':
  - type: text
    content: mba ho tahaka ny nanjakan’ny ota tao amin’ny fahafatesana no hanjakan’ny fahasoavana kosa amin’ny fahamarinana ho fiainana mandrakizay amin’ny alalan’i Jesosy Kristy Tompontsika.
  '3':
  - type: text
    content: 'Ary tsy izany ihany, fa aoka isika hifaly amin’ny fahoriana aza, satria fantatsika fa ny fahoriana mahatonga faharetana; '
  '4':
  - type: text
    content: 'ary ny faharetana mahatonga fahatsaram-panahy voazaha toetra; ary ny fahatsaram-panahy voazaha toetra mahatonga fanantenana; '
  '5':
  - type: text
    content: ary ny fanantenana dia tsy mampahamenatra, satria ny Fanahy Masina, Izay nomena antsika, no nentiny nampidina ny fitiavan’Andriamanitra
  - type: note
    content: 'Na: ny fitiavana an’Andriamanitra.'
  - type: text
    content: ' ho ao am-pontsika.'
  '6':
  - type: text
    content: 'Fa fony mbola tsy nanan-kery isika, dia maty Kristy tamin’ny fotoan’andro hamonjy ny ratsy fanahy. '
  '7':
  - type: text
    content: 'Fa saiky tsy misy olona manaiky ho faty hamonjy ny marina; fa angamba hisy ihany ny sasany sahy maty aza hamonjy ny manao soa. '
  '8':
  - type: text
    content: Fa Andriamanitra mampiseho
  - type: note
    content: 'Na: midera.'
  - type: text
    content: ' ny fitiavany antsika, fa fony mbola mpanota isika, dia maty hamonjy antsika Kristy. '
  '9':
  - type: text
    content: 'Koa mainka aza ny hamonjeny antsika ho afaka amin’ny fahatezerana ankehitriny, rehefa nohamarinina tamin’ny rany isika. '
