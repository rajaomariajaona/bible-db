document_id: ROM.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny soa ananan’ny mino an’i Kristy, sy ny fihoaran’izany noho izay soa verin’i Adama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: KOA amin’izany, satria efa nohamarinina tamin’ny finoana isika, dia aoka isika hanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[dia manana].'
    marker-yv: yv-n
  - type: text
    text: ' fihavanana amin’Andriamanitra amin’ny alalan’i Jesosy Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin’ny alalany koa no efa nahazoantsika fanatonana amin’ny finoana ho amin’izao fahasoavana itoerantsika izao, ka dia aoka isika hifaly amin’ny fanantenana ny voninahitr’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tsy izany ihany, fa aoka isika hifaly amin’ny fahoriana aza, satria fantatsika fa ny fahoriana mahatonga faharetana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary ny faharetana mahatonga fahatsaram-panahy voazaha toetra; ary ny fahatsaram-panahy voazaha toetra mahatonga fanantenana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny fanantenana dia tsy mampahamenatra, satria ny Fanahy Masina, Izay nomena antsika, no nentiny nampidina ny fitiavan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fitiavana an’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' ho ao am-pontsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa fony mbola tsy nanan-kery isika, dia maty Kristy tamin’ny fotoan’andro hamonjy ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa saiky tsy misy olona manaiky ho faty hamonjy ny marina; fa angamba hisy ihany ny sasany sahy maty aza hamonjy ny manao soa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Andriamanitra mampiseho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: midera.
    marker-yv: yv-n
  - type: text
    text: ' ny fitiavany antsika, fa fony mbola mpanota isika, dia maty hamonjy antsika Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa mainka aza ny hamonjeny antsika ho afaka amin’ny fahatezerana ankehitriny, rehefa nohamarinina tamin’ny rany isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha fony mbola fahavalo aza isika no nampihavanina tamin’Andriamanitra tamin’ny nahafatesan’ny Zanany, mainka ny hamonjena antsika amin’ny fahavelomany ankehitriny, rehefa nampihavanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary tsy izany ihany koa, fa mifaly amin’Andriamanitra isika amin’ny alalan’i Jesosy Kristy Tompontsika, Izay nahazoantsika ny fihavanana ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany
  - type: text
    text: ' dia tahaka ny nidiran’ny ota avy tamin’ny olona iray ho amin’izao tontolo izao, ary ny ota no nidiran’ny fahafatesana, ka nahatratra ny olona rehetra ny fahafatesana, satria samy efa nanota izy rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa hatrany alohan’ny lalàna aza dia nisy ota tamin’izao tontolo izao; nefa tsy isaina ny ota, raha tsy misy lalàna; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa ny fahafatesana nanjaka hatramin’i Adama ka hatramin’i Mosesy, na dia tamin’izay tsy nanota tahaka ny nanotan’i Adama aza, izay tandindon’Ilay ho avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa tsy tahaka ny fahadisoana ny fanomezam-pahasoavana. Fa raha ny fahadisoan’ny anankiray no nahatonga fahafatesana ho an’ny maro, mainka ny fahasoavan’Andriamanitra sy ny fanomezana amin’ny fahasoavan’ny Olona iray, dia Jesosy Kristy, no tonga be ho an’ny maro kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tsy tahaka ny avy amin’ny anankiray izay nanota ny fanomezana; fa noho ny nataon’ny anankiray no nisehoan’ny fitsarana ho fanamelohana, fa noho ny fahadisoana maro kosa no nisehoan’ny fanomezam-pahasoavana ho fanamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha ny fahadisoan’ny olona anankiray no nanjakan’ny fahafatesana noho ny nataon’ny anankiray, mainka izay mahazo ny haben’ny fahasoavana sy ny fanomezan’ny fahamarinana no hanjaka amin’ny fiainana noho ny nataon’ny Anankiray, dia Jesosy Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa tahaka ny nahatongavan’ny fanamelohana ho an’ny olona rehetra noho ny fahadisoana iray no nahatongavan’ny fanamarinana ho amin’ny fiainana kosa ho an’ny olona rehetra noho ny fahamarinana iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa tahaka ny nanaovana ny maro ho mpanota noho ny tsi-fanarahan’ny olona iray, no hanaovana ny maro ho marina kosa noho ny fanarahan’ny Anankiray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny lalàna dia niditra koa hahabe ny fahadisoana. Nefa teo amin’izay nihabiazan’ny ota no nihoaran’ny fahasoavana be lavitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mba ho tahaka ny nanjakan’ny ota tao amin’ny fahafatesana no hanjakan’ny fahasoavana kosa amin’ny fahamarinana ho fiainana mandrakizay amin’ny alalan’i Jesosy Kristy Tompontsika.
