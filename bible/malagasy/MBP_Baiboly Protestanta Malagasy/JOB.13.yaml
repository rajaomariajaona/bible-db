document_id: JOB.13
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, izany rehetra izany efa hitan’ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa ren’ny sofiko ka fantany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay fantatrareo dia mba fantatro koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy latsaka noho hianareo aho tsy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa raha izaho, dia ny Tsitoha no tiako hitenenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitra no iriko handaharan-teny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa hianareo kosa dia mpamoron-dainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dokotera tsy mahomby hianareo rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka hangina mihitsy hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fahendrenareo izany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Masìna hianareo, henoy ny anatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tandremo izay alahatry ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanao teny tsy marina ho enti-manamarina an’Andriamanitra va hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiteny fitaka ho Azy va hianareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiangatra ho Azy va hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handaha-teny ho an’Andriamanitra va hianareo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho tsara aminareo va, raha mandinika anareo Izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho azonareo fitahina hoatra ny famitaka zanak’olombelona va Izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanameloka anareo mihitsy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miangatra mangingina hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hampahatahotra anareo va ny fahalehibiazany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hitsatoka aminareo va ny fahatahorana avy aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ireo teny tononinareo ireo dia ohabolana lavenona foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mànda fotaka ihany ny màndanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mangina, ka mialà amiko hianareo, mba hitenenako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aoka hanjo ahy ihany izay hanjo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nahoana no hitondra ny nofoko amin’ny nifiko aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa manao ny aiko tsy ho zavatra aho.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ka manao ny aiko eo an-tànako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia hamono ahy aza Izy, mbola hanantena Azy ihany aho;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Indro, hamono ahy Izy, tsy manam-panantenana aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa hanamarina ny làlako eo anatrehany aho.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Indro, hamono ahy Izy, tsy manam-panantenana aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no ho famonjena ahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary ho famonjena ahy Izy, fa ny.
    marker-yv: yv-n
  - type: text
    text: ' mpihatsaravelatsihy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
  - type: text
    text: ' tsy sahy mankeo anatrehany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mihainoa dia mihainoa ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho ren’ny sofinareo ny filazàko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, fa efa voatoriko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voalamiko.
    marker-yv: yv-n
  - type: text
    text: ' ny adiko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantatro fa hanan-drariny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza no hahazo hifandahatra amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha izany, dia hangina aho ka hiala aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izao zavatra roa loha izao ihany no aza mba atao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hiery Anao aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Esory hanalavitra ahy ny tànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hampahatsiravina ahy ny fampitahoranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia miantsoa, fa izaho hamaly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na aoka hiteny aho, ka valio aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Firy ary ny heloko sy ny fahotako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ampahalalao izay fiodinako sy fahotako aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahoana no manafina ny tavanao Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manao ahy ho fahavalonao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moa izay ravin-kazo indaosin’ny rivotra avy va no ampitahorinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay vodivary maina avy va no enjehinao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa zava-mangidy no tendrenao hamely ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ampanodiavinao ahy ny heloky ny fahatanorako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia mampiditra ny tongotro eo amin’ny boloky hazo Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitsikilo ny diako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hodiavin’ny tongotro dia feranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia izaho ity izay mihalevona tahaka ny zavatra hanin’ny fositra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tahaka ny fitafiana lanin’ny kalalao.
