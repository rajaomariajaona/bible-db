document_id: JOB.13,873
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, izany rehetra izany efa hitan’ny masoko,
  - type: text
    content: Ary efa ren’ny sofiko ka fantany.
  '10':
  - type: text
    content: Hanameloka anareo mihitsy Izy,
  - type: text
    content: Raha miangatra mangingina hianareo.
  '11':
  - type: text
    content: Tsy hampahatahotra anareo va ny fahalehibiazany?
  - type: text
    content: Ary tsy hitsatoka aminareo va ny fahatahorana avy aminy?
  '12':
  - type: text
    content: Ireo teny tononinareo ireo dia ohabolana lavenona foana,
  - type: text
    content: Ary mànda fotaka ihany ny màndanareo.
  '13':
  - type: text
    content: Mangina, ka mialà amiko hianareo, mba hitenenako;
  - type: text
    content: Fa aoka hanjo ahy ihany izay hanjo ahy.
  '14':
  - type: text
    content: Nahoana no hitondra ny nofoko amin’ny nifiko aho?
  - type: text
    content: Tsia, fa manao ny aiko tsy ho zavatra aho.
  - type: note
    content: 'Na: Ka manao ny aiko eo an-tànako.'
  '15':
  - type: text
    content: Na dia hamono ahy aza Izy, mbola hanantena Azy ihany aho;
  - type: note
    content: 'Na: Indro, hamono ahy Izy, tsy manam-panantenana aho.'
  - type: text
    content: Kanefa hanamarina ny làlako eo anatrehany aho.
  - type: note
    content: 'Na: Indro, hamono ahy Izy, tsy manam-panantenana aho.'
  '16':
  - type: text
    content: 'Ary izao no ho famonjena ahy:'
  - type: text
    content: Ny
  - type: note
    content: 'Na: Ary ho famonjena ahy Izy, fa ny.'
  - type: text
    content: ' mpihatsaravelatsihy'
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' tsy sahy mankeo anatrehany.'
  '17':
  - type: text
    content: Mihainoa dia mihainoa ny teniko,
  - type: text
    content: Ary aoka ho ren’ny sofinareo ny filazàko.
  '18':
  - type: text
    content: Indro, fa efa voatoriko
  - type: note
    content: 'Na: voalamiko.'
  - type: text
    content: ' ny adiko;'
  - type: text
    content: Fantatro fa hanan-drariny aho.
  '19':
  - type: text
    content: Iza no hahazo hifandahatra amiko?
  - type: text
    content: Fa raha izany, dia hangina aho ka hiala aina.
  '2':
  - type: text
    content: Izay fantatrareo dia mba fantatro koa;
  - type: text
    content: Tsy latsaka noho hianareo aho tsy akory.
  '20':
  - type: text
    content: Izao zavatra roa loha izao ihany no aza mba atao amiko,
  - type: text
    content: Dia tsy hiery Anao aho;
  '21':
  - type: text
    content: Esory hanalavitra ahy ny tànanao,
  - type: text
    content: Ary aoka tsy hampahatsiravina ahy ny fampitahoranao.
  '22':
  - type: text
    content: Dia miantsoa, fa izaho hamaly;
  - type: text
    content: Na aoka hiteny aho, ka valio aho.
  '23':
  - type: text
    content: Firy ary ny heloko sy ny fahotako?
  - type: text
    content: Mba ampahalalao izay fiodinako sy fahotako aho.
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Hianao,
  - type: text
    content: Ka manao ahy ho fahavalonao?
  '25':
  - type: text
    content: Moa izay ravin-kazo indaosin’ny rivotra avy va no ampitahorinao?
  - type: text
    content: Ary izay vodivary maina avy va no enjehinao?
  '26':
  - type: text
    content: Fa zava-mangidy no tendrenao hamely ahy,
  - type: text
    content: Ka ampanodiavinao ahy ny heloky ny fahatanorako;
  '27':
  - type: text
    content: Dia mampiditra ny tongotro eo amin’ny boloky hazo Hianao
  - type: text
    content: Ary mitsikilo ny diako rehetra;
  - type: text
    content: Ny hodiavin’ny tongotro dia feranao.
  '28':
  - type: text
    content: Dia izaho ity izay mihalevona tahaka ny zavatra hanin’ny fositra,
  - type: text
    content: Eny, tahaka ny fitafiana lanin’ny kalalao.
  '3':
  - type: text
    content: Kanefa raha izaho, dia ny Tsitoha no tiako hitenenana,
  - type: text
    content: Ary Andriamanitra no iriko handaharan-teny.
  '4':
  - type: text
    content: Fa hianareo kosa dia mpamoron-dainga;
  - type: text
    content: Dokotera tsy mahomby hianareo rehetra,
  '5':
  - type: text
    content: Enga anie ka hangina mihitsy hianareo,
  - type: text
    content: Dia ho fahendrenareo izany!
  '6':
  - type: text
    content: Masìna hianareo, henoy ny anatro,
  - type: text
    content: Ary tandremo izay alahatry ny molotro.
  '7':
  - type: text
    content: Hanao teny tsy marina ho enti-manamarina an’Andriamanitra va hianareo?
  - type: text
    content: Hiteny fitaka ho Azy va hianareo?
  '8':
  - type: text
    content: Hiangatra ho Azy va hianareo?
  - type: text
    content: Handaha-teny ho an’Andriamanitra va hianareo
  '9':
  - type: text
    content: Ho tsara aminareo va, raha mandinika anareo Izy?
  - type: text
    content: Na ho azonareo fitahina hoatra ny famitaka zanak’olombelona va Izy?
