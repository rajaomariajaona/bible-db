document_id: PSA.116,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fisaorana nataon’izay saiky maty, nefa novonjen’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZAHO tia an’i Jehovah, satria efa nandre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’ny fifonako Izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nino aho; hiteny tokoa aho;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa hiteny aho.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahantra indrindra aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy izaho tamin’ny fahatairako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpandainga ny olona rehetra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no havaliko an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny soa rehetra nataony tamiko?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handray ny kapoaky ny famonjena aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hiantso ny anaran’i Jehovah.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanefa ny voadiko amin’i Jehovah aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, eo anatrehan’ny olony rehetra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-dehibe eo imason’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahafatesan’ny olony masina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! Jehovah ô, mpanomponao tokoa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mpanomponao sady zanaky ny ankizivavinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namaha ny fatorako Hianao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no haterako fanati-pisaorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anaran’i Jehovah no hantsoiko.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanefa ny voadiko amin’i Jehovah aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, eo anatrehan’ny olony rehetra,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo an-kianjan’ny tranon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo afovoanao, ry Jerosalema ô.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa nanongilana ny sofiny tamiko izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiantso aho, raha mbola velona koa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihodidina tamiko ny famatoran’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahazo ahy ny fahorian’ny fiainan-tsi-hita;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita fahoriana sy alahelo aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia niantso ny anaran’i Jehovah hoe aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, mifona aminao aho, vonjeo ny fanahiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindra fo sy marina Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, miantra Andriamanitsika.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miaro ny kely saina Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reraka aho, dia namonjy ahy Izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena ho amin’ny fitsaharanao, ry fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah efa nanisy soa anao,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia namonjy ny fanahiko tamin’ny fahafatesana Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny masoko tamin’ny ranomaso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tongotro tamin’ny fahatafintohinana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha eo anatrehan’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny tanin’ny velona aho.
