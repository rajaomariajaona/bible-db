document_id: PSA.116,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana nataon’izay saiky maty, nefa novonjen’Andriamanitra.
  - type: text
    content: IZAHO tia an’i Jehovah, satria efa nandre
  - type: text
    content: Ny feon’ny fifonako Izy.
  '10':
  - type: text
    content: Nino aho; hiteny tokoa aho;
  - type: note
    content: 'Na: fa hiteny aho.'
  - type: text
    content: Mahantra indrindra aho.
  '11':
  - type: text
    content: Hoy izaho tamin’ny fahatairako;
  - type: text
    content: Mpandainga ny olona rehetra.
  '12':
  - type: text
    content: Inona no havaliko an’i Jehovah
  - type: text
    content: Noho ny soa rehetra nataony tamiko?
  '13':
  - type: text
    content: Handray ny kapoaky ny famonjena aho
  - type: text
    content: Ka hiantso ny anaran’i Jehovah.
  '14':
  - type: text
    content: Hanefa ny voadiko amin’i Jehovah aho.
  - type: text
    content: Eny, eo anatrehan’ny olony rehetra.
  '15':
  - type: text
    content: Zava-dehibe eo imason’i Jehovah
  - type: text
    content: Ny fahafatesan’ny olony masina.
  '16':
  - type: text
    content: Indrisy! Jehovah ô, mpanomponao tokoa aho,
  - type: text
    content: Eny, mpanomponao sady zanaky ny ankizivavinao;
  - type: text
    content: Namaha ny fatorako Hianao.
  '17':
  - type: text
    content: Hianao no haterako fanati-pisaorana,
  - type: text
    content: Ary ny anaran’i Jehovah no hantsoiko.
  '18':
  - type: text
    content: Hanefa ny voadiko amin’i Jehovah aho,
  - type: text
    content: Eny, eo anatrehan’ny olony rehetra,
  '19':
  - type: text
    content: Dia eo an-kianjan’ny tranon’i Jehovah,
  - type: text
    content: Eo afovoanao, ry Jerosalema ô.
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: Satria efa nanongilana ny sofiny tamiko izy,
  - type: text
    content: Dia hiantso aho, raha mbola velona koa.
  '3':
  - type: text
    content: Nihodidina tamiko ny famatoran’ny fahafatesana,
  - type: text
    content: Ary nahazo ahy ny fahorian’ny fiainan-tsi-hita;
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Nahita fahoriana sy alahelo aho.
  '4':
  - type: text
    content: 'Dia niantso ny anaran’i Jehovah hoe aho:'
  - type: text
    content: Jehovah ô, mifona aminao aho, vonjeo ny fanahiko.
  '5':
  - type: text
    content: Mamindra fo sy marina Jehovah;
  - type: text
    content: Eny, miantra Andriamanitsika.
  '6':
  - type: text
    content: Miaro ny kely saina Jehovah;
  - type: text
    content: Reraka aho, dia namonjy ahy Izy.
  '7':
  - type: text
    content: Miverena ho amin’ny fitsaharanao, ry fanahiko,
  - type: text
    content: Fa Jehovah efa nanisy soa anao,
  '8':
  - type: text
    content: Dia namonjy ny fanahiko tamin’ny fahafatesana Hianao
  - type: text
    content: Sy ny masoko tamin’ny ranomaso
  - type: text
    content: Ary ny tongotro tamin’ny fahatafintohinana.
  '9':
  - type: text
    content: Handeha eo anatrehan’i Jehovah
  - type: text
    content: Eo amin’ny tanin’ny velona aho.
