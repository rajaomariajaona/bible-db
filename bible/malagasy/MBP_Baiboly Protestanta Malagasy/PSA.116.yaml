document_id: PSA.116
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fisaorana nataon’izay saiky maty, nefa novonjen’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: IZAHO tia an’i Jehovah, satria efa nandre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feon’ny fifonako Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Satria efa nanongilana ny sofiny tamiko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiantso aho, raha mbola velona koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nihodidina tamiko ny famatoran’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahazo ahy ny fahorian’ny fiainan-tsi-hita;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '116.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahita fahoriana sy alahelo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niantso ny anaran’i Jehovah hoe aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, mifona aminao aho, vonjeo ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mamindra fo sy marina Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, miantra Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miaro ny kely saina Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reraka aho, dia namonjy ahy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miverena ho amin’ny fitsaharanao, ry fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah efa nanisy soa anao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia namonjy ny fanahiko tamin’ny fahafatesana Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny masoko tamin’ny ranomaso
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tongotro tamin’ny fahatafintohinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Handeha eo anatrehan’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny tanin’ny velona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nino aho; hiteny tokoa aho;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '116.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa hiteny aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahantra indrindra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hoy izaho tamin’ny fahatairako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpandainga ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Inona no havaliko an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny soa rehetra nataony tamiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Handray ny kapoaky ny famonjena aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiantso ny anaran’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hanefa ny voadiko amin’i Jehovah aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, eo anatrehan’ny olony rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zava-dehibe eo imason’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahafatesan’ny olony masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indrisy! Jehovah ô, mpanomponao tokoa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mpanomponao sady zanaky ny ankizivavinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namaha ny fatorako Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hianao no haterako fanati-pisaorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny anaran’i Jehovah no hantsoiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hanefa ny voadiko amin’i Jehovah aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, eo anatrehan’ny olony rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia eo an-kianjan’ny tranon’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo afovoanao, ry Jerosalema ô.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
