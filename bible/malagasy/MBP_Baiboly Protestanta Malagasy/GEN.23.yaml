document_id: GEN.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahafatesan’i Saraha sy ny nandevenana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny andro niainan’i Saraha dia fito amby roa-polo amby zato taona; izany no taona niainan’i Saraha. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary Saraha dia maty tao Kiriat-arba (Hebrona izany) tany amin’ny tany Kanana; dia tonga Abrahama hisaona an’i Saraha sy hitomany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Abrahama nitsangana niala avy teo anilan’ny fatin’ny vadiny, dia niteny tamin’ny taranak’i Heta ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vahiny sy mpivahiny eto aminareo aho; omeo tany fandevenana eto aminareo aho mba handevenako ny fatin’ny vadiko tsy ho eto anatrehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namaly an’i Abrahama ny taranak’i Heta ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mihainoa anay, tompokolahy: andrian-dehibe eto aminay hianao; koa izay tsara indrindra amin’ny fasanay no andeveno ny fatin’ny vadinao; tsy misy aminay hiaro ny fasany aminao tsy handevenanao ny fatin’ny vadinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitsangana Abrahama ka niankohoka teo anatrehan’ny taranak’i Heta tompon-tany, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia niteny taminy ka nanao hoe: Raha sitrakareo ary ny handevenako ny fatin’ny vadiko mba tsy ho eto anatrehako, dia mihainoa ahy, ka mba iangavio kely amin’i Efrona, zanak’i Zohara, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mba homeny ahy ny zohy ao Makpela, izay azy, dia ilay eo amin’ny sisin’ny sahany; amin’izay vola tokom-bidiny no aoka hanomezany azy ho ahy eto aminareo ho tany fandevenana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Efrona nipetraka teo amin’ny taranak’i Heta; dia namaly an’i Abrahama Efrona Hetita teo anatrehan’ny taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsia, tompokolahy, fa mihainoa ahy: ny saha dia omeko anao, ary ny zohy izay eo anatiny koa dia omeko anao; eto imason’ny zanaky ny fireneko no anomezako azy ho anao; aleveno ny fatin’ny vadinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary niankohoka teo anatrehan’ny olona tompon-tany Abrahama, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia niteny tamin’i Efrona teo anatrehan’ny olona tompon-tany ka nanao hoe: Kanefa raha mba hihaino ahy ihany hianao, dia homeko ny vidin’ny saha; raiso amiko izany, dia haleviko ao ny fatin’ny vadiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Efrona dia namaly an’i Abrahama ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tompokolahy, mihainoa ahy: tany tokony ho lafo sekely volafotsy efa-jato,–inona moa izany amintsika roa lahy? fa aleveno ny fatin’ny vadinao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia neken’i Abrahama ny tenin’i Efrona, ka nolanjainy ho azy ny vola izay efa voalazany teo anatrehan’ny taranak’i Heta, dia sekely volafotsy efa-jato lanin’ny mpivarotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny sahan’i Efrona, ilay teo Makpela, izay tandrifin’i Mamre, dia ny saha sy ny zohy izay teo anatiny mbamin’ny hazo rehetra izay teo anatiny, izay teo amin’ny sisiny rehetra manodidina, dia natao varo-maty '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tamin’i Abrahama ho fananana, teo imason’ny taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehafa afaka izany, Abrahama dia nandevina an’i Saraha vadiny tao amin’ny zohy tao amin’ny saha Makpela tandrifin’i Mamre (Hebrona izany), ao amin’ny tany Kanana; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ka ny saha mbamin’ny zohy izay ao anatiny dia nataon’ny taranak’i Heta varo-maty tamin’i Abrahama ho tany fandevenana.
