document_id: GEN.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Saraha sy ny nandevenana azy.
  - type: text
    content: 'ARY ny andro niainan’i Saraha dia fito amby roa-polo amby zato taona; izany no taona niainan’i Saraha. '
  '10':
  - type: text
    content: 'Ary Efrona nipetraka teo amin’ny taranak’i Heta; dia namaly an’i Abrahama Efrona Hetita teo anatrehan’ny taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany, ka nanao hoe: '
  '11':
  - type: text
    content: 'Tsia, tompokolahy, fa mihainoa ahy: ny saha dia omeko anao, ary ny zohy izay eo anatiny koa dia omeko anao; eto imason’ny zanaky ny fireneko no anomezako azy ho anao; aleveno ny fatin’ny vadinao.'
  '12':
  - type: text
    content: 'Ary niankohoka teo anatrehan’ny olona tompon-tany Abrahama, '
  '13':
  - type: text
    content: 'dia niteny tamin’i Efrona teo anatrehan’ny olona tompon-tany ka nanao hoe: Kanefa raha mba hihaino ahy ihany hianao, dia homeko ny vidin’ny saha; raiso amiko izany, dia haleviko ao ny fatin’ny vadiko.'
  '14':
  - type: text
    content: 'Ary Efrona dia namaly an’i Abrahama ka nanao taminy hoe: '
  '15':
  - type: text
    content: 'Tompokolahy, mihainoa ahy: tany tokony ho lafo sekely volafotsy efa-jato,–inona moa izany amintsika roa lahy? fa aleveno ny fatin’ny vadinao?'
  '16':
  - type: text
    content: Dia neken’i Abrahama ny tenin’i Efrona, ka nolanjainy ho azy ny vola izay efa voalazany teo anatrehan’ny taranak’i Heta, dia sekely volafotsy efa-jato lanin’ny mpivarotra.
  '17':
  - type: text
    content: 'Ary ny sahan’i Efrona, ilay teo Makpela, izay tandrifin’i Mamre, dia ny saha sy ny zohy izay teo anatiny mbamin’ny hazo rehetra izay teo anatiny, izay teo amin’ny sisiny rehetra manodidina, dia natao varo-maty '
  '18':
  - type: text
    content: tamin’i Abrahama ho fananana, teo imason’ny taranak’i Heta, dia izay rehetra niditra teo am-bavahadin’ny tanànany.
  '19':
  - type: text
    content: 'Ary rehafa afaka izany, Abrahama dia nandevina an’i Saraha vadiny tao amin’ny zohy tao amin’ny saha Makpela tandrifin’i Mamre (Hebrona izany), ao amin’ny tany Kanana; '
  '2':
  - type: text
    content: Ary Saraha dia maty tao Kiriat-arba (Hebrona izany) tany amin’ny tany Kanana; dia tonga Abrahama hisaona an’i Saraha sy hitomany azy.
  '20':
  - type: text
    content: ka ny saha mbamin’ny zohy izay ao anatiny dia nataon’ny taranak’i Heta varo-maty tamin’i Abrahama ho tany fandevenana.
  '3':
  - type: text
    content: 'Ary Abrahama nitsangana niala avy teo anilan’ny fatin’ny vadiny, dia niteny tamin’ny taranak’i Heta ka nanao hoe: '
  '4':
  - type: text
    content: Vahiny sy mpivahiny eto aminareo aho; omeo tany fandevenana eto aminareo aho mba handevenako ny fatin’ny vadiko tsy ho eto anatrehako.
  '5':
  - type: text
    content: 'Dia namaly an’i Abrahama ny taranak’i Heta ka nanao taminy hoe: '
  '6':
  - type: text
    content: 'Mihainoa anay, tompokolahy: andrian-dehibe eto aminay hianao; koa izay tsara indrindra amin’ny fasanay no andeveno ny fatin’ny vadinao; tsy misy aminay hiaro ny fasany aminao tsy handevenanao ny fatin’ny vadinao.'
  '7':
  - type: text
    content: 'Dia nitsangana Abrahama ka niankohoka teo anatrehan’ny taranak’i Heta tompon-tany, '
  '8':
  - type: text
    content: 'dia niteny taminy ka nanao hoe: Raha sitrakareo ary ny handevenako ny fatin’ny vadiko mba tsy ho eto anatrehako, dia mihainoa ahy, ka mba iangavio kely amin’i Efrona, zanak’i Zohara, '
  '9':
  - type: text
    content: mba homeny ahy ny zohy ao Makpela, izay azy, dia ilay eo amin’ny sisin’ny sahany; amin’izay vola tokom-bidiny no aoka hanomezany azy ho ahy eto aminareo ho tany fandevenana.
