document_id: ECC.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny filaharan’ny zavatra samy amin’ny fotoany avy, sy ny mbola hitsaran’Andriamanitra ny ratsy fanahy, ary ny anton’ny nanaovana ny olombelona ho faty toy ny biby.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY zavatra rehetra samy manana ny fotoany avy, ary samy manana ny androny avy ny raharaha rehetra atỳ ambanin’ny lanitra:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa hitako ny asa mampahory izay nomen’Andriamanitra ny zanak’olombelona hisasarany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zavatra rehetra samy nataony ho mendrika amin’ny fotoany avy; ary ny mandrakizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' izao tontolo izao.'
      marker-yv: yv-n
    - type: text
      text: ' dia efa nataony tao am-pony, kanefa tsy hitan’ny olona ny asan’Andriamanitra hatramin’ny voalohany ka hatramin’ny farany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro fa tsy misy tsara amin’ny olombelona afa-tsy ny mifaly sy ny manao tsara,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' mahazo soa.'
      marker-yv: yv-n
    - type: text
      text: ' raha mbola velona koa izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary koa, raha mihinana sy misotro ary finaritra amin’ny fisasarany rehetra ny olombelona, dia fanomezan’Andriamanitra izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro fa izay rehetra ataon’Andriamanitra dia haharitra mandrakizay; tsy azo ampiana ary tsy azo analana izany; ka dia ataon’Andriamanitra matahotra eo imasony ny olona.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay atao izao dia efa natao fahiny; ary izay mbola ho avy dia efa nisy fahiny ihany koa; ary mbola tadiavin’Andriamanitra indray izay efa lasa.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' voaroaka.'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao koa no efa hitako atỳ ambanin’ny masoandro: ny fitoeran’ny fitsarana–nisy faharatsiana tao; ary ny fitoeran’ny fahamarinana–nisy faharatsiana koa tao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izaho anakampo: Samy hotsarain’Andriamanitra na ny marina na ny meloka; fa any dia samy manana ny androny avy ny zavatra rehetra sy ny asa rehetra.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izaho anakampo: Noho ny amin’ny zanak’olombelona izany, mba hizahan’Andriamanitra toetra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' hanadiovan’Andriamanitra.'
      marker-yv: yv-n
    - type: text
      text: ' azy, ka ho hitany fa raha ny tenany ihany, dia biby izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa zavatra sendrasendra foana ny zanak’olombelona, ary zavatra sendrasendra foana koa ny biby,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Fa izay manjo ny zanak’olombelona dia manjo ny biby koa.'
      marker-yv: yv-n
    - type: text
      text: ' –mitovy ihany ny mihatra amin’izy roa tonta; fa toy ny ahafatesan’ny iray no ahafatesan’ny iray koa; eny, iray ihany no fofonaina ananan’izy rehetra; ary tsy misy ihoaran’ny olona noho ny biby; fa samy zava-poana izy rehetra. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro ahaterahana, ary ao ny andro ahafatesana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro ambolena, ary ao ny andro anongotana ny nambolena;
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy rehetra samy mankamin’ny fitoerana iray: avy tamin’ny vovoka izy rehetra, ary hiverina ho amin’ny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' hody.'
      marker-yv: yv-n
    - type: text
      text: ' vovoka indray izy rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza no mahalala ny fanahin’ny olombelona, na miakatra any ambony izy, na tsia, ary ny fanahin’ny biby, na midina amin’ny tany izy, na tsia?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Iza no mahalala ny fanahin’ny olombelona izay miakatra any ambony, na ny fanahin’ny biby izay midina amin’ny tany?'
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia efa hitako fa tsy misy tsara noho ny ifalian’ny olona amin’ny asany, satria izany no anjarany; fa iza no hampahalala azy izay ho avy any aoriany?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro amonoana, ary ao ny andro anasitranana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro andravana, ary ao ny andro ananganana;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro itomaniana, ary ao ny andro ihomehezana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro isaonana, ary ao ny andro andihizana;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro anariam-bato, ary ao ny andro anangonam-bato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro anohonana, ary ao ny andro ifadiana tsy hanohona;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro itadiavana, ary ao ny andro ahayerezana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro itehirizana, ary ao ny andro anariana;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro andriarana, ary ao ny andro anjairana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro anginana, ary ao ny andro itenenana;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro itiavana, ary ao ny andro ankahalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny andro iadiana, ary ao ny andro ihavanana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona no soa azon’ny miasa amin’izay isasarany? '
