document_id: LUK.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nideran’i Jesosy ilay mpitondratena nandatsaka farantsakely roa.
  - type: heading
    content: Mar. 12.41-44.
  - type: text
    content: 'ARY Jesosy nanopy ny masony ka nahita ny mpanan-karena mandatsa-drakitra tao amin’ny fandatsahan-drakitra; '
  '10':
  - type: text
    content: 'Ary hoy Izy taminy: Hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana. '
  '11':
  - type: text
    content: Ary hisy horohorontany lehibe ary mosary sy areti-mandringana any amin’ny tany samy hafa, ary hisy zava-mahatahotra sy famantarana lehibe avy any an-danitra.
  '12':
  - type: text
    content: 'Ary raha tsy mbola tonga izany rehetra izany, dia hisambotra anareo izy ka hanenjika ary hanolotra anareo ao amin’ny synagoga sy ao an-trano-maizina, ka ho entina eo anatrehan’ny mpanjaka sy ny mpanapaka hianareo noho ny anarako. '
  '13':
  - type: text
    content: 'Dia ho tonga ho vavolombelona aminareo izany. '
  '14':
  - type: text
    content: 'Koa aoreno ao am-ponareo ny tsy hihevitra rahateo izay havalinareo; '
  '15':
  - type: text
    content: 'fa Izaho no hanome anareo vava sy saina, izay tsy ho azon’ny fahavalonareo rehetra valiana na resena. '
  '16':
  - type: text
    content: 'Ary hatolotry ny ray sy ny reny sy ny rahalahy ary ny havana aman-tsakaiza hianareo, koa ny sasany aminareo dia hovonoiny. '
  '17':
  - type: text
    content: 'Ary ho halan’ny olona rehetra hianareo noho ny anarako. '
  '18':
  - type: text
    content: 'Nefa tsy hisy ho very na dia singam-bolo iray eo amin’ny lohanareo aza. '
  '19':
  - type: text
    content: Amin’ny faharetanareo no hahatananareo ny ainareo.
  '2':
  - type: text
    content: ary nahita mpitondratena malahelo anankiray koa mandatsaka farantsakely roa
  - type: note
    content: Gr. lepta roa, dia farantsakely varahina izany = kodranta iray, tokony ho variroaventy.
  - type: text
    content: ' teo Izy. '
  '20':
  - type: text
    content: 'Ary raha mahita an’i Jerosalema voahodidin’ny miaramila hianareo, dia aoka ho fantatrareo fa efa mby akaiky ny fandravana azy. '
  '21':
  - type: text
    content: 'Ary izay any Jodia amin’izany andro izany aoka handositra ho any an-tendrombohitra; ary izay ao Jerosalema aoka handositra ho any ivelany; ary izay any an-tsaha aoka tsy hiditra ao an-tanàna intsony. '
  '22':
  - type: text
    content: 'Fa ireo dia andro famaliana mba hahatanteraka izay rehetra voasoratra. '
  '23':
  - type: text
    content: 'Fa lozan’ny bevohoka sy ny mitaiza kely amin’izany andro izany! satria hisy fahoriana lehibe eo amin’ny tany ary fahatezerana amin’ity firenena ity. '
  '24':
  - type: text
    content: Dia ho ringana amin’ny lelan-tsabatra izy ka ho entina ho babon’ny firenena rehetra, ary Jerosalema hohitsahin’ny jentilisa mandra-pahatanteraky ny andron’ny jentilisa.
  '25':
  - type: text
    content: 'Ary hisy famantarana eo amin’ny masoandro sy ny volana ary ny kintana, ary etỳ ambonin’ny tany dia hisy fahorian’ny firenena amin’ny fahaverezan-kevitra noho ny firohondrohon’ny ranomasina sy ny fanonjany, '
  '26':
  - type: text
    content: ka ho reraka ny fon’
  - type: note
    content: 'Na: ka hisy ho faty aza.'
  - type: text
    content: ' ny olona noho ny fahatahorany sy ny fiandrasany izay zavatra ho tonga ambonin’ny tany; fa ny herin’ny lanitra dia hohozongozonina. '
  '27':
  - type: text
    content: 'Ary amin’izany andro izany dia hahita ny Zanak’olona avy eo amin’ny rahona amin-kery sy voninahitra lehibe izy. '
  '28':
  - type: text
    content: Ary raha vao miandoha izany zavatra izany dia miandrandrà, ka asandrato ny lohanareo; fa manakaiky ny fanavotana anareo.
  '29':
  - type: text
    content: 'Ary Izy nanao fanoharana taminy hoe: Jereo ny aviavy sy ny hazo rehetra. '
  '3':
  - type: text
    content: 'Dia hoy Izy: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izy rehetra. '
  '30':
  - type: text
    content: 'Raha hitanareo fa vao manaroka ireo, dia fantatrareo ihany fa efa akaiky sahady ny lohataona. '
  '31':
  - type: text
    content: 'Dia tahaka izany koa hianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa akaiky ny fanjakan’Andriamanitra. '
  '32':
  - type: text
    content: 'Lazaiko aminareo marina tokoa fa tsy ho lany ity taranaka ity mandra-pahatongan’izany rehetra izany. '
  '33':
  - type: text
    content: Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.
  '34':
  - type: text
    content: 'Ary mitandrema, fandrao ny fonareo hovesaran’ny vokatry ny fisotroan-toaka sy ny fahamamoana ary ny fiahiahian’izao fiainana izao, ka ho avy tampoka aminareo tahaka ny fandrika izany andro izany. '
  '35':
  - type: text
    content: 'Fa hihatra amin’izay rehetra mitoetra etỳ ambonin’ny tany rehetra izany. '
  '36':
  - type: text
    content: Fa miambena
  - type: note
    content: Gr. miareta tory.
  - type: text
    content: ' ka mivavaha mandra-kariva, mba hahery hianareo ka handositra izany zavatra ho avy rehetra izany ary hitsangana eo anatrehan’ny Zanak’olona.'
  '37':
  - type: text
    content: 'Ary nony antoandro dia nampianatra teo an-kianjan’ny tempoly Izy; ary nony alina dia nivoaka Izy ka nitoetra teo an-tendrombohitra atao hoe Oliva. '
  '38':
  - type: text
    content: Ary ny vahoaka rehetra nankeo aminy maraina koa teo an-kianjan’ny tempoly hihaino Azy.
  '4':
  - type: text
    content: Fa ireo rehetra ireo, dia tamin’ny haben’ny fananany no nandatsahany tao amin’ny rakitra; fa izy kosa tamin’ny fahantrany no nandatsahany ny fivelomany rehetra izay nananany.
  - type: heading
    content: Ny nanambaran’i Jesosy ny handravana an’i Jerosalama, sy ny hihaviany indray.
  - type: heading
    content: Mat. 24.1-51; Mar. 13.1-37.
  '5':
  - type: text
    content: 'ARY nisy nilaza ny tempoly, fa voaravaka vato tsara sy fanatitra izy; fa hoy Jesosy: '
  '6':
  - type: text
    content: Ny amin’ireo zavatra hitanareo ireo, dia ho avy ny andro, ka tsy havela hisy vato hifanongoa eto ka tsy horavana.
  '7':
  - type: text
    content: 'Ary izy ireo nanontany Azy hoe: Mpampianatra ô, rahoviana no ho avy izany? ary inona no ho famantarana, rehefa ho tonga izany? '
  '8':
  - type: text
    content: 'Ary hoy Izy: Mitandrema, fandrao ho voafitaka hianareo; fa maro no ho avy amin’ny anarako sady hanao hoe: Izaho no Izy; ary koa: Efa akaiky ny andro; koa aza manaraka azy. '
  '9':
  - type: text
    content: Ary raha handre ady sy tabataba hianareo, aza matahotra; fa tsy maintsy ho tonga aloha izany, nefa tsy dia miaraka amin’izay ny farany.
