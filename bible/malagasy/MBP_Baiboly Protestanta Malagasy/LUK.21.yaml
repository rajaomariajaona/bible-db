document_id: LUK.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nideran’i Jesosy ilay mpitondratena nandatsaka farantsakely roa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 12.41-44.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jesosy nanopy ny masony ka nahita ny mpanan-karena mandatsa-drakitra tao amin’ny fandatsahan-drakitra; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary nahita mpitondratena malahelo anankiray koa mandatsaka farantsakely roa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lepta roa, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia farantsakely varahina izany = kodranta iray, tokony ho variroaventy.
    marker-yv: yv-n
  - type: text
    text: ' teo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Izy: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ireo rehetra ireo, dia tamin’ny haben’ny fananany no nandatsahany tao amin’ny rakitra; fa izy kosa tamin’ny fahantrany no nandatsahany ny fivelomany rehetra izay nananany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanambaran’i Jesosy ny handravana an’i Jerosalama, sy ny hihaviany indray.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 24.1-51; Mar. 13.1-37.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ARY nisy nilaza ny tempoly, fa voaravaka vato tsara sy fanatitra izy; fa hoy Jesosy: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny amin’ireo zavatra hitanareo ireo, dia ho avy ny andro, ka tsy havela hisy vato hifanongoa eto ka tsy horavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izy ireo nanontany Azy hoe: Mpampianatra ô, rahoviana no ho avy izany? ary inona no ho famantarana, rehefa ho tonga izany? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Izy: Mitandrema, fandrao ho voafitaka hianareo; fa maro no ho avy amin’ny anarako sady hanao hoe: Izaho no Izy; ary koa: Efa akaiky ny andro; koa aza manaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary raha handre ady sy tabataba hianareo, aza matahotra; fa tsy maintsy ho tonga aloha izany, nefa tsy dia miaraka amin’izay ny farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Izy taminy: Hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hisy horohorontany lehibe ary mosary sy areti-mandringana any amin’ny tany samy hafa, ary hisy zava-mahatahotra sy famantarana lehibe avy any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha tsy mbola tonga izany rehetra izany, dia hisambotra anareo izy ka hanenjika ary hanolotra anareo ao amin’ny synagoga sy ao an-trano-maizina, ka ho entina eo anatrehan’ny mpanjaka sy ny mpanapaka hianareo noho ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ho tonga ho vavolombelona aminareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa aoreno ao am-ponareo ny tsy hihevitra rahateo izay havalinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa Izaho no hanome anareo vava sy saina, izay tsy ho azon’ny fahavalonareo rehetra valiana na resena. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hatolotry ny ray sy ny reny sy ny rahalahy ary ny havana aman-tsakaiza hianareo, koa ny sasany aminareo dia hovonoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ho halan’ny olona rehetra hianareo noho ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa tsy hisy ho very na dia singam-bolo iray eo amin’ny lohanareo aza. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin’ny faharetanareo no hahatananareo ny ainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha mahita an’i Jerosalema voahodidin’ny miaramila hianareo, dia aoka ho fantatrareo fa efa mby akaiky ny fandravana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izay any Jodia amin’izany andro izany aoka handositra ho any an-tendrombohitra; ary izay ao Jerosalema aoka handositra ho any ivelany; ary izay any an-tsaha aoka tsy hiditra ao an-tanàna intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ireo dia andro famaliana mba hahatanteraka izay rehetra voasoratra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa lozan’ny bevohoka sy ny mitaiza kely amin’izany andro izany! satria hisy fahoriana lehibe eo amin’ny tany ary fahatezerana amin’ity firenena ity. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia ho ringana amin’ny lelan-tsabatra izy ka ho entina ho babon’ny firenena rehetra, ary Jerosalema hohitsahin’ny jentilisa mandra-pahatanteraky ny andron’ny jentilisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hisy famantarana eo amin’ny masoandro sy ny volana ary ny kintana, ary etỳ ambonin’ny tany dia hisy fahorian’ny firenena amin’ny fahaverezan-kevitra noho ny firohondrohon’ny ranomasina sy ny fanonjany, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ka ho reraka ny fon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka hisy ho faty aza.
    marker-yv: yv-n
  - type: text
    text: ' ny olona noho ny fahatahorany sy ny fiandrasany izay zavatra ho tonga ambonin’ny tany; fa ny herin’ny lanitra dia hohozongozonina. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary amin’izany andro izany dia hahita ny Zanak’olona avy eo amin’ny rahona amin-kery sy voninahitra lehibe izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary raha vao miandoha izany zavatra izany dia miandrandrà, ka asandrato ny lohanareo; fa manakaiky ny fanavotana anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Izy nanao fanoharana taminy hoe: Jereo ny aviavy sy ny hazo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha hitanareo fa vao manaroka ireo, dia fantatrareo ihany fa efa akaiky sahady ny lohataona. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia tahaka izany koa hianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa akaiky ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lazaiko aminareo marina tokoa fa tsy ho lany ity taranaka ity mandra-pahatongan’izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary mitandrema, fandrao ny fonareo hovesaran’ny vokatry ny fisotroan-toaka sy ny fahamamoana ary ny fiahiahian’izao fiainana izao, ka ho avy tampoka aminareo tahaka ny fandrika izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa hihatra amin’izay rehetra mitoetra etỳ ambonin’ny tany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa miambena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miareta tory.
    marker-yv: yv-n
  - type: text
    text: ' ka mivavaha mandra-kariva, mba hahery hianareo ka handositra izany zavatra ho avy rehetra izany ary hitsangana eo anatrehan’ny Zanak’olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nony antoandro dia nampianatra teo an-kianjan’ny tempoly Izy; ary nony alina dia nivoaka Izy ka nitoetra teo an-tendrombohitra atao hoe Oliva. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary ny vahoaka rehetra nankeo aminy maraina koa teo an-kianjan’ny tempoly hihaino Azy.
