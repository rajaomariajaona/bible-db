document_id: ISA.14
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa Jehovah hamindra fo amin’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mbola hifidy ny Isiraely indray
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamponina azy ao amin’ny taniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vahiny hikambana aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranak’i Jakoba ho namany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia haka azy ny firenena ka hanatitra azy hody;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranak’Isiraely hanana azy ho ankizilahiny sy ankizivaviny ao amin’ny tanin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tonga mpamabo izay namabo azy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampanompo izay nampahory azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hira fifaliana hataon’ny Isiraely noho ny nanetrena ny mpanjakan’i Babylona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ARY amin’ny andro hanomezan’i Jehovah fitsaharana anao ho afaka amin’ny fahorianao sy ny fitebitebin’ny fonao ary ny fanompoana mafy izay nampanompoana anao, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia hataonao izao oha-teny ny amin’ny mpanjakan’i Babylona izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hià! mitsahatra ilay mpampahory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsy ao intsony ilay tanàna volamena!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampandoa hetra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah efa nanapatapaka ny tehin’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny tehina fanapahan’ny mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay namely firenena tamin’ny fahatezerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny famelezana tsy nanam-pitsaharana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nampanompo firenena tamin’ny fahatezerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny fanenjehana tsy misy antra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miadana ka mandry fahizay ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Velominy ao ny hoby,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, ny hazo kypreso sy ny sedera any Libanona hifaly anao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatrizay niambohoanao izay dia tsy nisy mpikapa niakatra tatỳ aminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Taitra ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' any ambany noho ny aminao mba hitsena anao amin’ny fihavianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamoha ny matoatoa hitsena anao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireny bibilahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: osilahy.
    marker-yv: yv-n
  - type: text
    text: ' rehetra tambonin’ny tany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aingainy hiala amin’ny seza fiandrianany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanjakan’ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izy rehetra samy hiteny aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hay! hianao koa mba efa osa tahaka anay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tonga tahaka anay hianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa navarina ho etỳ amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ny tabihanao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny feon’ny valihanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kankana no ilafihanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary olitra no mandrakotra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Endrey! latsaka avy tany an-danitra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry ilay fitarik’andro, zanaky ny maraina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voakapa hianjera amin’ny tany hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry ilay mpandripaka firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hianao efa nanao anakampo hoe: Any an-danitra no hiakarako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ambonin’ny kintan’Andriamanitra no hanandratako ny seza fiandrianako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hipetraka eo an-tendrombohitra fivoriana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any am-parany avaratra aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hiakatra ho any ambonin’ny havoan’ny rahona aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho tahaka ny Avo Indrindra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanjo hampidinina hatrany amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any am-para-vodi-lavaka hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay mahita anao hibanjina anao sy hihevitra anao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa io va ilay lehilahy nampihorohoro ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nampihozongozona ny fanjakana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nanao izao tontolo izao ho efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nandrava ny tanànany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nandefa ny mpifatotra hody?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny mpanjaka rehetra amin’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy mandry amin’ny voninahitra avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy ao am-pasany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tranony.
    marker-yv: yv-n
  - type: text
    text: ' avy;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa hianao kosa dia nariana niala lavitra ny fasanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny solofon-kazo ratsy izay ariana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voatsindrin’ny fatin’ny voavono hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo voatrabaky ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka midina ho ao amin’ny vato ao an-davaka,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny faty hitsakitsahin’ny tongotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy halevina tahaka ireny hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nanimba ny taninao sady efa namono ny olonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hotononina mandrakizay ny taranaky ny mpanao ratsy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Manamboara famonoana hamelezana ny zanany noho ny heloky ny razany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitsangana hanana ny tany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanorina tanàna eran’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hitsangana hamely azy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofoanako ny anaran’i Babylona sy izay sisa ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny zanany sy ny taranany, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hataoko fonenan’ny sokina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fihandronan’ny rano izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofafako kifafa fandringanana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jehovah, Tompon’ny maro, efa nianiana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka izay noheveriko no hatao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary araka izay nokasaiko no hotovina aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia ny hanorotoro ny Asyriana ao amin’ny taniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hanitsakitsaka azy eny an-tendrombohitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zioga fitondrany dia hiala amin’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny entany ho afaka amin’ny sorony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izany no fikasana ny amin’ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izany no tànana ahinjitra amin’ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa Jehovah, Tompon’ny maro, no efa nikasa, ka iza indray no hahafoana izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànany dia voahinjitra, ka iza no hampihemotra izany?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny loza hanjo an’i Filistia.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'TAMIN’ny taona nahafatesan’i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aza mifaly, ry Filistia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy tapaka ny tsorakazo namely anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa avy ao an-kibon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fakan’.
    marker-yv: yv-n
  - type: text
    text: ' ny bibilava no hihavian’ny menarana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny aterany ho tonga menaran’afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarafa.
    marker-yv: yv-n
  - type: text
    text: ' manidina.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny faraidina indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matoan’ny mahantra.
    marker-yv: yv-n
  - type: text
    text: ' hihinana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mahantra handry fahizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hataoko maty mosary kosa izay tsy ringana aminao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
