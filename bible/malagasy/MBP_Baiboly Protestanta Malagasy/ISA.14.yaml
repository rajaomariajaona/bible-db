document_id: ISA.14,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa Jehovah hamindra fo amin’i Jakoba,
  - type: text
    content: Ary mbola hifidy ny Isiraely indray
  - type: text
    content: Ka hamponina azy ao amin’ny taniny;
  - type: text
    content: Ary ny vahiny hikambana aminy,
  - type: text
    content: Ary ny taranak’i Jakoba ho namany.
  '10':
  - type: text
    content: 'Izy rehetra samy hiteny aminao hoe:'
  - type: text
    content: Hay! hianao koa mba efa osa tahaka anay!
  - type: text
    content: Efa tonga tahaka anay hianao!
  '11':
  - type: text
    content: Efa navarina ho etỳ amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny tabihanao'
  - type: text
    content: Mbamin’ny feon’ny valihanao;
  - type: text
    content: Kankana no ilafihanao,
  - type: text
    content: Ary olitra no mandrakotra anao.
  '12':
  - type: text
    content: Endrey! latsaka avy tany an-danitra hianao,
  - type: text
    content: Ry ilay fitarik’andro, zanaky ny maraina;
  - type: text
    content: Voakapa hianjera amin’ny tany hianao,
  - type: text
    content: Ry ilay mpandripaka firenena.
  '13':
  - type: text
    content: 'Ary hianao efa nanao anakampo hoe: Any an-danitra no hiakarako,'
  - type: text
    content: Ary ambonin’ny kintan’Andriamanitra no hanandratako ny seza fiandrianako;
  - type: text
    content: Dia hipetraka eo an-tendrombohitra fivoriana
  - type: text
    content: Any am-parany avaratra aho;
  '14':
  - type: text
    content: Hiakatra ho any ambonin’ny havoan’ny rahona aho
  - type: text
    content: Ka ho tahaka ny Avo Indrindra;
  '15':
  - type: text
    content: Kanjo hampidinina hatrany amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Ho any am-para-vodi-lavaka hianao.
  '16':
  - type: text
    content: 'Izay mahita anao hibanjina anao sy hihevitra anao hoe:'
  - type: text
    content: Moa io va ilay lehilahy nampihorohoro ny tany
  - type: text
    content: Sy nampihozongozona ny fanjakana
  '17':
  - type: text
    content: Ary nanao izao tontolo izao ho efitra
  - type: text
    content: Sy nandrava ny tanànany
  - type: text
    content: Ary tsy nandefa ny mpifatotra hody?
  '18':
  - type: text
    content: Ny mpanjaka rehetra amin’ny firenena
  - type: text
    content: Samy mandry amin’ny voninahitra avokoa,
  - type: text
    content: Ary samy ao am-pasany
  - type: note
    content: Heb. tranony.
  - type: text
    content: ' avy;'
  '19':
  - type: text
    content: Fa hianao kosa dia nariana niala lavitra ny fasanao,
  - type: text
    content: Tahaka ny solofon-kazo ratsy izay ariana,
  - type: text
    content: Sady voatsindrin’ny fatin’ny voavono hianao,
  - type: text
    content: Dia ireo voatrabaky ny sabatra,
  - type: text
    content: Ka midina ho ao amin’ny vato ao an-davaka,–
  - type: text
    content: Tahaka ny faty hitsakitsahin’ny tongotra.
  '2':
  - type: text
    content: Dia haka azy ny firenena ka hanatitra azy hody;
  - type: text
    content: Ary ny taranak’Isiraely hanana azy ho ankizilahiny sy ankizivaviny ao amin’ny tanin’i Jehovah;
  - type: text
    content: Dia ho tonga mpamabo izay namabo azy izy
  - type: text
    content: Ary hampanompo izay nampahory azy.
  - type: heading
    content: Hira fifaliana hataon’ny Isiraely noho ny nanetrena ny mpanjakan’i Babylona.
  '20':
  - type: text
    content: Tsy halevina tahaka ireny hianao,
  - type: text
    content: Satria efa nanimba ny taninao sady efa namono ny olonao;
  - type: text
    content: Tsy hotononina mandrakizay ny taranaky ny mpanao ratsy!
  '21':
  - type: text
    content: Manamboara famonoana hamelezana ny zanany noho ny heloky ny razany;
  - type: text
    content: Tsy hitsangana hanana ny tany izy,
  - type: text
    content: Na hanorina tanàna eran’izao tontolo izao.
  '22':
  - type: text
    content: Fa hitsangana hamely azy Aho,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro,
  - type: text
    content: Ary hofoanako ny anaran’i Babylona sy izay sisa ao
  - type: text
    content: Mbamin’ny zanany sy ny taranany, hoy Jehovah.
  '23':
  - type: text
    content: Ary hataoko fonenan’ny sokina
  - type: text
    content: Sy fihandronan’ny rano izy,
  - type: text
    content: Ary hofafako kifafa fandringanana izy,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '24':
  - type: text
    content: 'Jehovah, Tompon’ny maro, efa nianiana hoe:'
  - type: text
    content: Araka izay noheveriko no hatao aminy,
  - type: text
    content: Ary araka izay nokasaiko no hotovina aminy.
  '25':
  - type: text
    content: Dia ny hanorotoro ny Asyriana ao amin’ny taniko,
  - type: text
    content: Ary ny hanitsakitsaka azy eny an-tendrombohitro;
  - type: text
    content: Ny zioga fitondrany dia hiala amin’ireo,
  - type: text
    content: Ary ny entany ho afaka amin’ny sorony.
  '26':
  - type: text
    content: Izany no fikasana ny amin’ny tany rehetra,
  - type: text
    content: Ary izany no tànana ahinjitra amin’ny firenena rehetra.
  '27':
  - type: text
    content: Fa Jehovah, Tompon’ny maro, no efa nikasa, ka iza indray no hahafoana izany?
  - type: text
    content: Ary ny tànany dia voahinjitra, ka iza no hampihemotra izany?
  - type: heading
    content: Faminaniana ny loza hanjo an’i Filistia.
  '28':
  - type: text
    content: 'TAMIN’ny taona nahafatesan’i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao:'
  '29':
  - type: text
    content: Aza mifaly, ry Filistia rehetra,
  - type: text
    content: Saingy tapaka ny tsorakazo namely anao;
  - type: text
    content: Fa avy ao an-kibon’
  - type: note
    content: Heb. fakan’.
  - type: text
    content: ' ny bibilava no hihavian’ny menarana,'
  - type: text
    content: Ary ny aterany ho tonga menaran’afo
  - type: note
    content: Heb. sarafa.
  - type: text
    content: ' manidina.'
  '3':
  - type: text
    content: 'ARY amin’ny andro hanomezan’i Jehovah fitsaharana anao ho afaka amin’ny fahorianao sy ny fitebitebin’ny fonao ary ny fanompoana mafy izay nampanompoana anao, '
  '30':
  - type: text
    content: Ny faraidina indrindra
  - type: note
    content: Heb. matoan’ny mahantra.
  - type: text
    content: ' hihinana,'
  - type: text
    content: Ary ny mahantra handry fahizay;
  - type: text
    content: Fa hataoko maty mosary kosa izay tsy ringana aminao,
  - type: note
    content: Heb. ny fakanao.
  - type: text
    content: Eny, izay sisa aminao ho matiny.
  '31':
  - type: text
    content: Midradradradrà, ry vavahady, ary mitaraina, ry tanàna;
  - type: text
    content: Aoka ho ketraka avokoa hianao, ry Filistia!
  - type: text
    content: Fa misy setroka mitranga avy any avaratra,
  - type: text
    content: Ary tsy misy miala amin’ny laharany akory ny miaramilany.
  '32':
  - type: text
    content: Ary inona moa no valiny ho entin’ny iraky ny jentilisa?
  - type: text
    content: 'Izao: Jehovah efa nanorina an’i Ziona,'
  - type: text
    content: Ary ao no hialofan’izay olony ory.
  '4':
  - type: text
    content: 'dia hataonao izao oha-teny ny amin’ny mpanjakan’i Babylona izao:'
  - type: text
    content: Hià! mitsahatra ilay mpampahory!
  - type: text
    content: Eny, tsy ao intsony ilay tanàna volamena!
  - type: note
    content: 'Na: mampandoa hetra.'
  '5':
  - type: text
    content: Jehovah efa nanapatapaka ny tehin’ny ratsy fanahy,
  - type: text
    content: Dia ny tehina fanapahan’ny mpanapaka,
  '6':
  - type: text
    content: Izay namely firenena tamin’ny fahatezerana,
  - type: text
    content: Tamin’ny famelezana tsy nanam-pitsaharana,
  - type: text
    content: Sady nampanompo firenena tamin’ny fahatezerana,
  - type: text
    content: Tamin’ny fanenjehana tsy misy antra.
  '7':
  - type: text
    content: Miadana ka mandry fahizay ny tany rehetra;
  - type: text
    content: Velominy ao ny hoby,–
  '8':
  - type: text
    content: 'Eny, ny hazo kypreso sy ny sedera any Libanona hifaly anao hoe:'
  - type: text
    content: Hatrizay niambohoanao izay dia tsy nisy mpikapa niakatra tatỳ aminay.
  '9':
  - type: text
    content: Taitra ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' any ambany noho ny aminao mba hitsena anao amin’ny fihavianao;'
  - type: text
    content: Mamoha ny matoatoa hitsena anao izy,
  - type: text
    content: Dia ireny bibilahy
  - type: note
    content: Heb. osilahy.
  - type: text
    content: ' rehetra tambonin’ny tany;'
  - type: text
    content: Aingainy hiala amin’ny seza fiandrianany
  - type: text
    content: Ny mpanjakan’ny firenena rehetra.
