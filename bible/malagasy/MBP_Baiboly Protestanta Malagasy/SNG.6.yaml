document_id: SNG.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nankaiza ny malalanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry tsara tarehy amin’ny vehivavy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nivily nankaiza ny malalanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hiarahanay aminao hitady azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Iza moa io vehivavy mitsidika toy ny maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsara tarehy tahaka ny volana, madio toy ny masoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahatahotra toy ny antokon’ny miaramila mitondra faneva?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lasa nidina nankany an-tsaha tsara hazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: an-tanin’egoza.
      marker-yv: yv-n
    - type: text
      text: ' aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hijerijery ny zava-maitso an-dohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hizaha raha mitsimoka ny voaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mamony ny ampongabendanitra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy nampoiziko ny nanandratan’ny fanahiko ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho eo amin’ny kalesin’ny fireneko be voninahitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lasa nidina ho any an-tsahany ny malalako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any amin’ny tanim-boninkazo misy zava-manitra eo an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiandry ny ondriny eny amin’ny tanimboly sy hioty ny lilia.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: An’ny malalako aho, ary ahy ny malalako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay miandry ny ondry andiany eny amin’ny lilia.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsara tarehy tahaka an’i Tirza hianao, ry tompokovavy havako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsara tarehy tahaka an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatahotra toy ny antokon’ny miaramila mitondra faneva.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Avilio ny masonao tsy hijery ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mampiontanantana ny foko izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny volonao dia tahaka ny osy andiany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandriandry eny ankilan’i Gileada.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny nifinao dia tahaka ny ondrivavy andiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miakatra avy eo amin’ny fampandroana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy kambana avy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy misy tsy mana-manana,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: tahaka ny hasin’ampongabendanitra ny takolakao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny fisalobonanao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny volonao milantolanto.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Misy mpanjakavavy enim-polo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy vaditsindrano valo-polo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary zatovovavy tsy hita isa.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa iray monja kosa no voromailalako, dia ilay ahy tsy misy kilema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vavy tokan-dreniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsongaina amin’izay naterany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zazavavy nahita azy ka nanao azy ho sambatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny mpanjakavavy sy ny vaditsindrano, ka nidera azy.
