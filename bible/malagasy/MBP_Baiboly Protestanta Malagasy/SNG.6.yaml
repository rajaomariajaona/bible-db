document_id: SNG.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: Nankaiza ny malalanao,
  - type: text
    content: Ry tsara tarehy amin’ny vehivavy?
  - type: text
    content: Nivily nankaiza ny malalanao?
  - type: text
    content: Mba hiarahanay aminao hitady azy.
  '10':
  - type: text
    content: Iza moa io vehivavy mitsidika toy ny maraina,
  - type: text
    content: Izay tsara tarehy tahaka ny volana, madio toy ny masoandro
  - type: text
    content: Sady mahatahotra toy ny antokon’ny miaramila mitondra faneva?
  '11':
  - type: text
    content: Lasa nidina nankany an-tsaha tsara hazo
  - type: note
    content: Heb. an-tanin’egoza.
  - type: text
    content: ' aho,'
  - type: text
    content: Hijerijery ny zava-maitso an-dohasaha,
  - type: text
    content: Hizaha raha mitsimoka ny voaloboka
  - type: text
    content: Sy mamony ny ampongabendanitra.
  '12':
  - type: text
    content: Tsy nampoiziko ny nanandratan’ny fanahiko ahy
  - type: text
    content: Ho eo amin’ny kalesin’ny fireneko be voninahitra.
  '2':
  - type: text
    content: Lasa nidina ho any an-tsahany ny malalako,
  - type: text
    content: Dia any amin’ny tanim-boninkazo misy zava-manitra eo an-tsaha,
  - type: text
    content: Hiandry ny ondriny eny amin’ny tanimboly sy hioty ny lilia.
  '3':
  - type: text
    content: An’ny malalako aho, ary ahy ny malalako,
  - type: text
    content: Dia ilay miandry ny ondry andiany eny amin’ny lilia.
  '4':
  - type: text
    content: Tsara tarehy tahaka an’i Tirza hianao, ry tompokovavy havako,
  - type: text
    content: Eny, tsara tarehy tahaka an’i Jerosalema,
  - type: text
    content: Mahatahotra toy ny antokon’ny miaramila mitondra faneva.
  '5':
  - type: text
    content: Avilio ny masonao tsy hijery ahy,
  - type: text
    content: Fa mampiontanantana ny foko izy;
  - type: text
    content: Ny volonao dia tahaka ny osy andiany.
  - type: text
    content: Izay mandriandry eny ankilan’i Gileada.
  '6':
  - type: text
    content: Ny nifinao dia tahaka ny ondrivavy andiany,
  - type: text
    content: Izay miakatra avy eo amin’ny fampandroana;
  - type: text
    content: Samy kambana avy ireo,
  - type: text
    content: Fa tsy misy tsy mana-manana,
  '7':
  - type: text
    content: tahaka ny hasin’ampongabendanitra ny takolakao
  - type: text
    content: Eo amin’ny fisalobonanao.
  - type: note
    content: 'Na: ny volonao milantolanto.'
  '8':
  - type: text
    content: Misy mpanjakavavy enim-polo
  - type: text
    content: Sy vaditsindrano valo-polo
  - type: text
    content: Ary zatovovavy tsy hita isa.
  '9':
  - type: text
    content: Fa iray monja kosa no voromailalako, dia ilay ahy tsy misy kilema,
  - type: text
    content: Vavy tokan-dreniny
  - type: text
    content: Sady tsongaina amin’izay naterany.
  - type: text
    content: Ny zazavavy nahita azy ka nanao azy ho sambatra,
  - type: text
    content: Eny, ny mpanjakavavy sy ny vaditsindrano, ka nidera azy.
