document_id: 2CH.36
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Joahaza sy Joiakima sy Joiakina ary Zedekia, sy ny nandravana an’i Jerosalema, ary ny nitondrana ny olona ho babo tany Babylona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny vahoaka naka an’i Joahaza, zanak’i Josia, ka nampanjaka azy tany Jerosalema handimby an-drainy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Telo amby roa-polo taona Joahaza, fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nesorin’ny mpanjakan’i Egypta tany Jerosalema izy, sady nampandoaviny sazy talenta volafotsy zato sy talenta volamena iray ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny mpanjakan’i Egypta nampanjaka an’i Eliakima, rahalahin’i Joahaza, tamin’ny Joda sy Jerosalema, ary ny anarany dia novany hoe Joiakima; ary Joahaza rahalahiny kosa dia nalainy ka nentiny ho any Egypta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dimy amby roa-polo taona Joiakima, fony izy vao nanjaka, ary iraika ambin’ny folo taona no nanjakany tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nanao izay ratsy eo imason’i Jehovah Andriamaniny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Nebokadnezara, mpanjakan’i Babylona, dia niakatra namely azy ka namatotra azy tamin’ny gadra varahina mba hitondra azy ho any Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny fanaka sasany tao an-tranon’i Jehovah dia nentin’i Nebokadnezara ho any Babylona koa ka nataony tao amin’ny tempoliny tany Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny tantaran’i Joiakima sisa sy ny fahavetavetana nataony mbamin’izay toetoeny rehetra, dia, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Isiraely sy ny Joda izany; ary Joiakina zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Valo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Valo ambin’ny folo], '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao 2 Mpan. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxiv. 8.
    marker-yv: yv-n
  - type: text
    text: ' taona Joiakina, fony izy vao nanjaka, ary telo volana sy hafoloana no nanjakany tany Jerosalema; ary nanao izay ratsy eo imason’i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nony niherina ny taona, dia naniraka Nebokadnezara mpanjaka ka nitondra azy mbamin’ny fanaka tsara tao an-tranon’i Jehovah ho any Babylona, dia nampanjaka an’i Zedekia rahalahin-drainy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rahalahiny.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny Joda sy Jerosalema izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin’ny folo taona no nanjakany tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanao izay ratsy eo imason’i Jehovah Andriamaniny izy, fa tsy nanetry tena teo anatrehan’i Jeremia mpaminany, izay nilaza ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nikomy tamin’i Nebokadnezara mpanjaka izay efa nampianiana azy tamin’Andriamanitra koa izy; ary nanamafy ny hatony sy nanasarotra ny fony izy mba tsy hiverina ho amin’Andriamanitry ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny lehibe rehetra tamin’ny mpisorona sy ny vahoaka koa nanao izay mahadiso indrindra araka ny fahavetavetana rehetra fanaon’ny jentilisa ka nandoto ny tranon’i Jehovah tany Jerosalema izay nohamasininy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa Jehovah, Andriamanitry ny razany, nampitondra teny ny iraka izay nirahiny ho any aminy; eny, nifoha maraina koa Izy ka naniraka, fa namindra fo tamin’ny olony sy ny fonenany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Kanjo ny olona nihomehy ireny irak’Andriamanitra ireny sady nanazimba ny teniny sy namazivazy ny mpaminaniny mandra-pihatry ny fahatezeran’i Jehovah taminy, ka tsy nisy nahavonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa nentiny namely azy ny mpanjakan’ny Kaldeana, izay namono ny zatovony tamin’ny sabatra tao an-trano fitoerana masina, ary tsy nisy namindrany fo, na zatovo na virijina, na ny antitra sy ny fotsy volo; fa izy rehetra dia natolony ho eo an-tànany avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny fanaka rehetra tao an-tranon’Andriamanitra, na ny vaventy na ny madinika, mbamin’ny rakitry ny tranon’i Jehovah ary ny rakitry ny mpanjaka sy ny mpanapaka,–ireny rehetra ireny dia nentiny ho any Babylona avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nodorany koa ny tranon’Andriamanitra, ary noravany ny màndan’i Jerosalema; ny lapan’andriana rehetra tao koa dia nodorany tamin’ny afo, ary ny fanaka tsara rehetra tao nosimbany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny olona sisa tsy matin-tsabatra dia nentiny ho babo tany Babylona, ka tonga mpanompo azy sy ny zanany ireny mandra-panjakan’ny mpanjakan’i Persia, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: hanatanterahana ny tenin’i Jehovah nampilazaina an’i Jeremia, mandra-panonitry ny tany ny Sabatany; fa tamin’ny andro rehetra izay nahafoanany dia natsahatra ny tany mba hanonitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao Lev '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxvi. 34.
    marker-yv: yv-n
  - type: text
    text: ' ny Sabatany mandra-pahatapitry ny fito-polo taona.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny nataon’i Kyrosy nandefasana ny Jiosy hody ho any an-tanin-drazany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ARY tamin’ny taona voalohany nanjakan’i Kyrosy, mpanjakan’i Perisa, dia notairin’i Jehovah ny fanahin’i Kyrosy, mpanjakan’i Persia, mba hanatanteraka ny tenin’i Jehovah izay nampilazainy an’i Jeremia, ka dia nandefa teny eran’ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao no lazain’i Kyrosy, mpanjakan’i Persia: Ny fanjakana rehetra ambonin’ny tany dia efa nomen’i Jehovah, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanao trano ho Azy any Jerosalema, izay any Joda. Koa iza avy moa aminareo rehetra no olony? Jehovah Andriamaniny anie nomba azy, fa aoka hiakatra izy.'
