  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra dia nanoratra taratasy ho any amin’i Artaksersesy mpanjaka hanendrikendrika an’i Jerosalema toy izao:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra ary ny namany sisa, dia ny Dinaita, ny Afarsatkita, ny Tarpelita, ny Afarsaita, ny Arkevita, ny Babyloniana, ny Sosanita, ny Dehavita sy ny Elamita, '
