document_id: EZR.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nataon’ny Samaritana hisakanana ny Jiosy tsy hanao ny tempoly, sy ny nandraran’ny mpanjakan’i Persia azy tsy hanao intsony.
  - type: text
    content: 'ARY nony ren’ny fahavalon’ny Joda sy ny Benjamina fa ireo efa nody avy tamin’ny fahababoana dia efa manao tempoly ho an’i Jehovah, Andriamanitry ny Isiraely, '
  '10':
  - type: text
    content: mbamin’ny firenena sisa izay nentin’i Asnapara lehibe sady malaza ho babo, ka namponeniny tany an-tanàna Samaria sy tany amin’ny tany sasany etỳ an-dafin’ny ony etỳ.....
  '11':
  - type: text
    content: 'Izao no teny amin’ny taratasy nampitondrainy ho any amin’i Artaksersesy mpanjaka:'
  - type: text
    content: 'Ny lehilahy mpanomponao etỳ an-dafin’ny ony etỳ.... '
  '12':
  - type: text
    content: 'Aoka ho fantatry ny mpanjaka fa ny Jiosy, izay niakatra avy tany aminao hankatỳ aminay, dia efa tonga any Jerosalema ka manamboatra ilay tanàna fikomiana sady ratsy, dia mahavita ny màndany izy izao ary manamboatra ny fanorenany koa. '
  '13':
  - type: text
    content: 'Koa aoka ho fantatry ny mpanjaka fa raha hatao io tanàna io, ka hatsangana indray ny màndany, dia tsy hety handoa hetra, na haba, na sara, izy; ka dia hahatonga fatiantoka ho an’ny fanjakana izany any aoriana. '
  '14':
  - type: text
    content: Koa satria mahazo ny fivelomanay
  - type: note
    content: Heb. mihinana ny sira.
  - type: text
    content: ' avy amin’ny lapan’ny mpanjaka izahay, dia tsy mety raha odianay tsy hita ny fatiantoky ny fanjakana, ka dia efa naniraka hampahafantatra ny mpanjaka izany izahay, '
  '15':
  - type: text
    content: 'mba hizahana ny boky tantaran’ny razanao; dia ho hitanao eo amin’ny boky tantara, ka ho fantatrao fa tanàna fikomiana io tanàna io ka nahafatiantoka ny mpanjaka sy ny tany maro, sady efa nisy fikomiana niseho tao hatrizay ela izay; koa izany no nandravana io tanàna io. '
  '16':
  - type: text
    content: Ary mampahafantatra ny mpanjaka izahay fa raha hamboarina io tanàna io, ka vita ny màndany, dia tsy hanana fanjakana amin’ny etỳ an-dafin’ny ony etỳ intsony hianao.
  '17':
  - type: text
    content: 'Dia nampitondrain’ny mpanjaka ny valiny ho any amin-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin’ny namany sisa izay nonina tany Samaria sy tany amin’ny tanàna sasany an-dafin’ny ony, nanao hoe:'
  - type: text
    content: 'Fiadanana.... '
  '18':
  - type: text
    content: 'Ny taratasy izay nampitondrainareo ho atỳ aminay dia efa voavaky tsara teo anatrehako; '
  '19':
  - type: text
    content: 'ary izaho nandidy, ka nasaiko nizahana, dia hita fa nanandra-tena nikomy tamin’ny mpanjaka maro hatrizay ela izay tokoa io tanàna io, ka nisy fikomiana sy fihodinana niseho teo. '
  '2':
  - type: text
    content: 'dia nanatona an’i Zerobabela sy ny lohan’ny fianakaviana izy ka nanao taminy hoe: Aoka mba hiara-manao aminareo izahay, fa mitady an’Andriamanitrareo tahaka anareo ihany koa izahay, ary ho Azy no namonoanay zavatra hatao fanatitra hatramin’ny andron’i Esara-hadona, mpanjakan’i Asyria, izay efa nampakatra anay ho atỳ.'
  '20':
  - type: text
    content: 'Ary efa nisy mpanjaka mahery izay nanjaka tany Jerosalema nanapaka ny tany rehetra any an-dafin’ny ony ka nandoavana hetra sy haba ary sara. '
  '21':
  - type: text
    content: 'Koa dia manaova didy hampitsahatra ireo olona ireo, mba tsy hamboarina io tanàna io, raha tsy mahazo teny avy atỳ amiko. '
  '22':
  - type: text
    content: Ary tandremo tsara, fandrao misy tsy vitanareo izany; fa nahoana no havela handroso ny ratsy ka hahatonga fatiantoka ho an’ny fanjakana?
  '23':
  - type: text
    content: Ary rehefa voavaky teo anatrehan-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin’ny namany ny taratasin’i Artaksersesy mpanjaka, dia niakatra faingana ho any Jerosalema ho any amin’ny Jiosy izy ka nampitsahatra azy an-keriny.
  - type: note
    content: Heb. amin-tsandry aman-kery.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Dia natsahatra tsy natao ny tranon’Andriamanitra, izay tany Jerosalema; ary mbola nitsahatra ihany izany hatramin’ny taona faharoa nanjakan’i Dariosy, mpanjakan’i Persia.
  '3':
  - type: text
    content: 'Fa Zerobabela sy Jesoa mbamin’ny namany lohan’ny fianakaviana tamin’ny Isiraely namaly azy hoe: Tsy misy raharaha hikambananareo aminay amin’ny hanaovana trano ho an’Andriamanitray; fa izahay ihany no hanao trano ho an’i Jehovah, Andriamanitry ny Isiraely, araka izay efa nandidian’itompokolahy Kyrosy, mpanjakan’i Persia, anay.'
  '4':
  - type: text
    content: 'Ary ny tompon-tany nanao izay hampiraviravy tànana ny Jiosy sy nandevilevy azy mba tsy hanao ny trano '
  '5':
  - type: text
    content: sady nanamby olona hanome hevitra hanohitra azy hahafoana ny heviny hatramin’ny andro nanjakan’i Kyrosy tany Persia ka hatramin’ny nanjakan’i Dariosy, mpanjakan’i Persia.
  '6':
  - type: text
    content: Ary raha vao nanjaka Ahasoerosy, dia nanoratra ho any aminy ireo hanendrikendrika ny mponina tany Joda sy Jerosalema.
  '7':
  - type: text
    content: Ary tamin’ny andron’i Artaksersesy no nanoratan’i Bislama sy Mitredata sy Tabela mbamin’ny namany sisa ho any amin’i Artaksersesy, mpanjakan’i Persia; ary ny soratra tamin’ny taratasy dia nataony tarehin-tsoratra Syriana
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' sady nataony teny Syriana'
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' koa. '
  '8':
  - type: text
    content: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra dia nanoratra taratasy ho any amin’i Artaksersesy mpanjaka hanendrikendrika an’i Jerosalema toy izao:'
  '9':
  - type: text
    content: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra ary ny namany sisa, dia ny Dinaita, ny Afarsatkita, ny Tarpelita, ny Afarsaita, ny Arkevita, ny Babyloniana, ny Sosanita, ny Dehavita sy ny Elamita, '
