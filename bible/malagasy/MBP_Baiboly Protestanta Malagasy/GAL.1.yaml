document_id: GAL.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiarahabana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'PAOLY Apostoly–tsy avy tamin’olona, na tamin’ny alalan’olona, fa tamin’ny alalan’i Jesosy Kristy sy Andriamanitra Ray, Izay nanangana Azy tamin’ny maty– '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mbamin’ny rahalahy rehetra izay ato amiko, mamangy ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' atỳ Galatia: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompontsika, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay nanolotra ny tenany noho ny fahotantsika, hanafahany antsika amin’izao miara-belona ratsy fanahy izao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izao andro ratsy izao.
    marker-yv: yv-n
  - type: text
    text: ' araka ny sitrapon’Andriamanitra Raintsika; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny Galatiana noho ny fivadibadihany, sy ny fanambarana ny mah’Apostoly an’i Paoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'GAGA aho, raha mifindra faingana toy izao hianareo hiala amin’Izay efa niantso anareo tamin’ny fahasoavan’i Kristy ho amin’ny filazantsara hafa, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: izay tsy filazantsara akory,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anankiray koa.
    marker-yv: yv-n
  - type: text
    text: ' fa saingy misy ny sasany mampitabataba anareo ka ta-hamadika ny filazantsaran’i Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa na izahay, na anjely avy any an-danitra aza, no mitory filazantsara hafa aminareo afa-tsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manohitra.
    marker-yv: yv-n
  - type: text
    text: ' izay efa notorinay taminareo, aoka ho voaozona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anatema.
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka ny voalazanay fahiny no lazaiko indray ankehitriny: Raha misy olona mitory filazantsara hafa aminareo, afa-tsy izay efa noraisinareo, aoka ho voaozona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anatema.
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ankehitriny, olona va no ilako fitia, sa Andriamanitra? Sa mila sitraka amin’olona aho? Raha mbola mila sitraka amin’olona aho, dia tsy mpanompon’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ampahafantariko anareo, ry rahalahy, ny amin’ny filazantsara izay notoriko, fa tsy araka ny fanaon’ny olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izaho tsy nandray azy tamin’olona, ary tsy mba nampianarina aho, fa tamin’ny fanambaran’i Jesosy Kristy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa efa renareo ny toetro fahiny tamin’ny fivavahan’ny Jiosy, fa nanenjika ny fiangonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra efa izay tsy izy aho ka nandrava azy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary nandroso tamin’ny fivavahan’ny Jiosy mihoatra noho ny maro izay indray mihira amiko eo amin’ny fireneko aho ka fatra-pitana ny fampianarana voatolotry ny razako indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha sitrak’Andriamanitra, Izay nanokana ahy hatrany an-kibon’ineny ny niantso ahy tamin’ny fahasoavany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny nampiseho ny Zanany tato anatiko, mba hitoriako Azy any amin’ny jentilisa, niaraka tamin’izay dia tsy naka saina tamin’ny nofo aman-dra aho, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary tsy niakatra tany Jerosalema ho any amin’izay Apostoly talohako aho, fa lasa nankany Arabia, dia niverina ho any Damaskosy indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa afaka telo taona, dia niakatra tany Jerosalema hamangy an’i Kefasy aho ka nitoetra tao aminy dimy ambin’ny folo andro. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa ny Apostoly sasany dia tsy nisy hitako afa-tsy Jakoba,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa Jakoba kosa.
    marker-yv: yv-n
  - type: text
    text: ' rahalahin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izay zavatra soratako aminareo, indro, eo anatrehan’Andriamanitra fa tsy mandainga aho. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehefa afaka izany, dia tonga tany amin’ny tany Syria sy Kilikia aho; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary tsy mbola fantatry ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' any Jodia, izay ao amin’i Kristy, ny tarehiko. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nandre ihany izy hoe: Ilay mpanenjika antsika fahiny, indro izy ankehitriny mitory ny finoana izay noravany fahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary dia nankalazany an’Andriamanitra aho.
