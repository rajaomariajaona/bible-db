verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fiarovana mahafinaritra hitan’izay matoky an’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana fiakarana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fihirana misy hevitra ambaratonga.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZAY matoky an’i Jehovah dia tahaka ny tendrombohitra Ziona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy mihetsika, fa mitoetra mandrakizay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tahaka ny tendrombohitra manodidina an’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No anodidinan’i Jehovah ny olony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao ka ho mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa tsy hitoetra eo amin’ny anjaran’ny marina ny tehim-panjakan’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao ny marina haninjitra ny tànany hanendry zava-dratsy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jehovah ô, manaova soa amin’ny tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny mahitsy fo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa izay mivily ho amin’ny sakeli-dàlana mivilivily
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia horoahin’i Jehovah miaraka amin’ny mpanao ratsy anie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiadanana anie ho amin’ny Isiraely.
