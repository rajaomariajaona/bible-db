document_id: PSA.125,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiarovana mahafinaritra hitan’izay matoky an’Andriamanitra.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: IZAY matoky an’i Jehovah dia tahaka ny tendrombohitra Ziona,
  - type: text
    content: Izay tsy mihetsika, fa mitoetra mandrakizay.
  '2':
  - type: text
    content: Tahaka ny tendrombohitra manodidina an’i Jerosalema
  - type: text
    content: No anodidinan’i Jehovah ny olony
  - type: text
    content: Hatramin’izao ka ho mandrakizay.
  '3':
  - type: text
    content: Fa tsy hitoetra eo amin’ny anjaran’ny marina ny tehim-panjakan’ny ratsy fanahy,
  - type: text
    content: Fandrao ny marina haninjitra ny tànany hanendry zava-dratsy.
  '4':
  - type: text
    content: Jehovah ô, manaova soa amin’ny tsara
  - type: text
    content: Sy ny mahitsy fo.
  '5':
  - type: text
    content: Fa izay mivily ho amin’ny sakeli-dàlana mivilivily
  - type: text
    content: Dia horoahin’i Jehovah miaraka amin’ny mpanao ratsy anie.
  - type: text
    content: Fiadanana anie ho amin’ny Isiraely.
