document_id: GEN.50
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josefa nihohoka tamin’ny tavan’ny rainy ka nitomany teo amboniny sady nanoroka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nasain’i Josefa nanosotra zava-manitra an-drainy ny mpanompony izay mpanao fanafody; dia nanosotra an’Isiraely ny mpanao fanafody. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary notanterahiny taminy ny efa-polo andro, fa izany no isan’ny andro nanosoram-paty; ary ny Egyptiana nisaona azy fito-polo andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa tapitra ny andro nisaonana azy, Josefa dia niteny tamin’ny tao an-tranon’i Farao ka nanao hoe: Raha mba nahita fitia eo imasonareo aho, masìna hianareo, lazao amin’i Farao, ka ataovy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny raiko efa nampianiana ahy ka nanao hoe: Indro, ho faty aho; koa ao amin’ny fasako, izay nohadiko'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa novidiko.
    marker-yv: yv-n
  - type: text
    text: ' ho ahy any amin’ny tany Kanana, dia ao no andeveno ahy. Koa ankehitriny, trarantitra hianao, aoka aho hiakatra handevina ny raiko, dia hiverina atỳ indray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Farao: Miakara ary, ka aleveno ny rainao araka izay nampianianany anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia lasa niakatra Josefa handevina ny rainy; ary niara-niakatra taminy ny mpanompon’i Farao rehetra, dia ny loholona tao an-tranony sy ny loholona rehetra tany amin’ny tany Egypta, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary ny ankohonan’i Josefa rehetra sy ny rahalahiny ary ny ankohonan-drainy; ny ankizy madinika sy ny ondriny aman-osiny sy ny ombiny ihany no navelany tao amin’ny tany Gosena. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy kalesy sy mpitaingin-tsoavaly niara-niakatra taminy koa, ka lehibe dia lehibe ny tobiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary rehefa tonga teo Goren-atada izy, izay ao an-dafin’i Jordana, dia nanao fisaonana lehibe sy mafy indrindra teo izy; dia nisaona an-drainy hafitoana Josefa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary rehefa hitan’ny Kananita tompon-tany ny fisaonana teo Goren-atada, dia hoy izy: Fisaonana mafy amin’ny Egyptiana izao; izany no nanaovany ny anarany hoe Abel-Egyptiana,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Abel-Egyptiana = Fisaonan’ny Egyptiana, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sahan’ny Egyptiana.
    marker-yv: yv-n
  - type: text
    text: ' izay ao an-dafin’i Jordana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny zanakalahin’i Jakoba nanao taminy araka izay nandidiany azy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia nitondra azy tany amin’ny tany Kanana, ary nandevina azy tao amin ny zohy amin’ny saha Makpela, tandrifin’i Mamre, dia ilay novidin’i Abrahama mbamin’ny saha tamin’i Efrona Hetita ho tany fandevenana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary rehefa voalevin’i Josefa ny rainy, dia niverina tany Egypta izy sy ny rahalahiny mbamin’izay rehetra niara-niakatra taminy handevina ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa hitan’ny rahalahin’i Josefa fa maty ny rainy, dia hoy izy: Andrao hanao fo-lentika amintsika Josefa ka hamaly antsika tokoa noho izay ratsy rehetra nataontsika taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia naniraka nankany amin’i Josefa izy ka nanao hoe: Ny rainao nanafatra, fony izy tsy mbola maty, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka nanao hoe: Izao no holazainareo amin’i Josefa: Mamelà re ny fahadisoan’ny rahalahinao sy ny fahotany, fa efa nanao ratsy taminao izy; eny, mamelà ankehitriny ny fahadisoan’ny mpanompon’ny Andriamanitry ny rainao. Dia nitomany Josefa, raha niteny taminy izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa nanatona azy ny rahalahiny, dia niankohoka teo anatrehany ka nanao hoe: Indreto izahay ho mpanomponao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Josefa taminy: Aza matahotra; fa moa solon’Andriamanitra va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hianareo no nisaina hanisy ratsy ahy; fa Andriamanitra kosa nisaina izany ho soa, hanao tahaka ny amin’izao anio izao, hamelona olona betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa ankehitriny, aza matahotra hianareo; fa izaho hamelona anareo sy ny zanakareo madinika. Dia nampionona azy sy nanao teny malefaka nahafinaritra azy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Josefa sy ny ankohonan’ny rainy nonina tany Egypta; ary ny andro niainan’i Josefa dia folo amby zato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hitan’i Josefa ny zafiafin’i Efraima; ny zanak’i Makira koa, zanakalahin’i Manase, dia noraisin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nateraky.
    marker-yv: yv-n
  - type: text
    text: ' i Josefa ho eo am-pofoany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy Josefa tamin’ny rahalahiny: Ho faty aho; nefa Andriamanitra hamangy anareo tokoa ka hitondra anareo hiala amin’ity tany ity ho any amin’ny tany izay nianianany tamin’i Abrahama sy Isaka ary Jakoba homena azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Josefa dia nampianiana ny zanak’Isiraely ka nanao hoe: Hamangy anareo tokoa Andriamanitra, dia hitondra ny taolako hiala eto hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia maty Josefa, rehefa folo amby zato taona; ary dia nohosorany zava-manitra izy ka napetrany tao anatin’ny vata tany Egypta.
