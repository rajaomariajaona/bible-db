document_id: LAM.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fitondrana alahelo, sy ny fampiononana ataon’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: ALEFA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: IZAHO ilay lehilahy nahita fahoriana tamin’ny tsorakazon’ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho no notarihiny sy nampandehaniny ho amin’ny maizina, fa tsy ho amin’ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho ihany no asian’ny tànany mandritra ny andro mandrakariva.
- type: usfm
  marker: s1
  children:
  - type: text
    text: BETA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nataony antitra ny nofoko sy ny hoditro, notapatapahiny ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manorina izay hamelezany ahy Izy ary manemitra ahy amin’ny zava-mangidy sy ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ampitoeriny ao amin’ny maizina toy izay efa maty fahagola aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: GIMELA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nofefeny manodidina aho ka tsy afa-nivoaka, nataony mavesatra ny gadrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary na dia mitaraina sy minananana aza aho, dia tampenany ny fivavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vato voapaika no narafiny natampiny ny làlako, naolikoliny ny alehako.
- type: usfm
  marker: s1
  children:
  - type: text
    text: DALETA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tonga bera manotrika ahy Izy, ary toy ny liona ao amin’ny fierena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Namily ny alehako Izy, ary noviravirainy aho ka nataony mahatsiravina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanenjana ny tsipìkany Izy ka nanangana ahy ho toy ny marika hokendrena zana-tsipìka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: HE.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampitsatoka ny zana-tsipìkany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanaky ny tranon-jana-tsipìka.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny voako Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tonga fihomehezan’ny fireneko rehetra aho sady ataony an-kira mandritra ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Novokisany zava-mangidy aho ary nobobohany zava-mahafaty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: VAO.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary notorotoroiny tamin’ny sila-bato ny nifiko, sady natsinkasinkasiny tamin’ny lavenona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary noroahinao tsy hahita fiadanana ny fanahiko, ka efa hadinoko ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy izaho: Levona ny faharetako sy ny fanantenako an’i Jehovah.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: ZAINA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsarovy ny fahoriako sy ny fanjenjenako, dia ny zava-mahafaty sy ny rano mangidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsaroan’ny fanahiko indrindra izany, ka mitanondrika ato anatiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany no ho eritreretiko ato am-poko, ka dia hanantena aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: HETA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny famindrampon’i Jehovah no tsy nahalany ritra antsika, fa tsy mitsahatra ny fiantrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vaovao isa-maraina izany; lehibe ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jehovah no anjarako, hoy ny fanahiko, ka dia hanantena Azy aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TETA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsara Jehovah amin’izay manantena Azy, dia amin’ny olona izay mitady Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsara ny miandry ny famonjen’i Jehovah amin’ny fanginana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsara amin’ny olona ny mitondra zioga, raha mbola tanora izy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: JODA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aoka hanjokaiky irery izy ka hangina, raha ampitondraina izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aoka hanohoka ny vavany eo amin’ny vovoka izy, angamba hisy hantenaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aoka hanolotra ny takolany ho amin’izay mamely azy izy ka ho feno latsa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: KAFA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa tsy hanary mandrakizay ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Eny, fa na dia mampahory aza Izy, dia mbola hiantra ihany araka ny haben’ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa tsy sitrany ny mampahory na mampalahelo ny zanak’olombelona.
- type: usfm
  marker: s1
  children:
  - type: text
    text: LAMEDA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny fanitsakitsahana ny mpifatotra rehetra ambonin’ny tany ho eo ambanin’ny tongotra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny familiana ny rariny amin’ny olona eo anatrehan’ny Avo Indrindra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ny famadihana ny adin’ny olona, dia samy tsy sitraky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jeren’.
    marker-yv: yv-n
  - type: text
    text: ' ny Tompo.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: MEMA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Iza moa no miteny, ka dia mahatonga izany, raha tsy zavatra efa nodidian’ny Tompo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tsy avy amin’ny vavan’ny Avo Indrindra va no ivoahan’ny soa sy ny loza?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Koa ahoana no imonomononan’ny olona mbola velona,–fa no tsy aleo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: misento
  - type: text
    text: ' noho ny amin’ny fahotany avy?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eny, nahoana no imonomononan’ny olona, raha mijaly noho ny fahotany?
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: NONA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Aoka isika handinika sy hamantatra ny alehantsika ka hiverina indray amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Aoka hasandratsika amin’Andriamanitra any an-danitra ny fontsika sy ny tànantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Izahay efa nanota sy nanao ditra, ary Hianao kosa tsy namela heloka.
- type: usfm
  marker: s1
  children:
  - type: text
    text: SAMEKA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Nisarona fahatezerana Hianao ka nanenjika anay; eny, novonoinao izahay, fa tsy niantranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Nisarona rahona Hianao, ka dia voasakana ny vavaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nataonao tahaka ny fakofako sy ny zavatra nariana teo afovoan’ny firenena izahay.
- type: usfm
  marker: s1
  children:
  - type: text
    text: PE.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ny fahavalonay rehetra misanasana vava aminay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mahavoa anay ny tahotra sy ny lavaka ary ny fandringanana sy ny fahatorotoroana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Rano mandriaka no mijononoka amin’ny masoko noho ny faharatran’ny oloko zanakavavy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: AINA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Ny masoko mandrotsa-dranomaso ka tsy mijanona, eny, tsy misy fiatoana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ambara-pitazan’i Jehovah ka ho tsinjony any an-danitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ny masoko mampiditra fahoriana ho an’ny fanahiko noho ny amin’ny zanakavavin’ny tanànako rehetra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TSADE.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Izay fahavaloko tsy ahoan-tsy ahoana dia nanenjika ahy mafy hoatra ny fanenjika voron-kely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Nanjera ahy tao an-davaka famorian-drano izy ka nitady hahafaty ahy sady nitora-bato ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Mandifotra ny lohako ny rano, ka dia hoy izaho: Maty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.54 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voajinja.
    marker-yv: yv-n
  - type: text
    text: ' aho ity!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: KOFA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Jehovah ô, niantso ny anaranao tany an-davaka lalina indrindra aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ny feoko dia efa renao, aza tampenana ny sofinao, raha mitaraina mitady izay mba hiainana kely aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Nanakaiky Hianao tamin’ny andro niantsoako Anao, ka dia hoy Hianao: Aza matahotra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: RESY.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Tompo ô, Hianao nandahatra ny adiko izay nikasika ny aiko, eny, nanavotra ny aiko Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Jehovah ô, hitanao ny fitsarana miangatra natao tamiko, ka mba tsarao ny adiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Hitanao ny famalian-dratsy rehetra ataon’ireo, dia ny saina rehetra entiny mamely ahy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: SINA.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Jehovah ô, efa renao ny latsa ataony, dia ny saina rehetra entiny mamely ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Dia ny molotr’izay mitsangana hanohitra ahy sy ny saina ataony mandritra ny andro hamelezana ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Jereo ny fipetrany sy ny fitsangany, fa ataony an-kira aho.
- type: usfm
  marker: s1
  children:
  - type: text
    text: TAO.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Hovalianao araka ny asan’ny tànany izy, Jehovah ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Eny, hohamaizininao ny fony, hihatra aminy ny ozonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Henjehinao amin’ny fahatezerana izy ka haringanao tsy ho etỳ ambanin’ny lanitr’i Jehovah.
