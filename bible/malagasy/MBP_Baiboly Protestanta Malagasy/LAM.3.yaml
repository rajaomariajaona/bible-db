document_id: LAM.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fitondrana alahelo, sy ny fampiononana ataon’Andriamanitra.
  - type: heading
    content: ALEFA.
  - type: text
    content: IZAHO ilay lehilahy nahita fahoriana tamin’ny tsorakazon’ny fahatezerany.
  '10':
  - type: text
    content: Tonga bera manotrika ahy Izy, ary toy ny liona ao amin’ny fierena;
  '11':
  - type: text
    content: Namily ny alehako Izy, ary noviravirainy aho ka nataony mahatsiravina.
  '12':
  - type: text
    content: Nanenjana ny tsipìkany Izy ka nanangana ahy ho toy ny marika hokendrena zana-tsipìka.
  - type: heading
    content: HE.
  '13':
  - type: text
    content: Nampitsatoka ny zana-tsipìkany
  - type: note
    content: Heb. zanaky ny tranon-jana-tsipìka.
  - type: text
    content: ' tamin’ny voako Izy.'
  '14':
  - type: text
    content: Tonga fihomehezan’ny fireneko rehetra aho sady ataony an-kira mandritra ny andro.
  '15':
  - type: text
    content: Novokisany zava-mangidy aho ary nobobohany zava-mahafaty.
  - type: heading
    content: VAO.
  '16':
  - type: text
    content: Ary notorotoroiny tamin’ny sila-bato ny nifiko, sady natsinkasinkasiny tamin’ny lavenona aho.
  '17':
  - type: text
    content: Ary noroahinao tsy hahita fiadanana ny fanahiko, ka efa hadinoko ny tsara.
  '18':
  - type: text
    content: 'Dia hoy izaho: Levona ny faharetako sy ny fanantenako an’i Jehovah.'
  - type: heading
    content: ZAINA.
  '19':
  - type: text
    content: Tsarovy ny fahoriako sy ny fanjenjenako, dia ny zava-mahafaty sy ny rano mangidy.
  '2':
  - type: text
    content: Izaho no notarihiny sy nampandehaniny ho amin’ny maizina, fa tsy ho amin’ny mazava.
  '20':
  - type: text
    content: Tsaroan’ny fanahiko indrindra izany, ka mitanondrika ato anatiko izy.
  '21':
  - type: text
    content: Izany no ho eritreretiko ato am-poko, ka dia hanantena aho.
  - type: heading
    content: HETA.
  '22':
  - type: text
    content: Ny famindrampon’i Jehovah no tsy nahalany ritra antsika, fa tsy mitsahatra ny fiantrany.
  '23':
  - type: text
    content: Vaovao isa-maraina izany; lehibe ny fahamarinanao.
  '24':
  - type: text
    content: Jehovah no anjarako, hoy ny fanahiko, ka dia hanantena Azy aho.
  - type: heading
    content: TETA.
  '25':
  - type: text
    content: Tsara Jehovah amin’izay manantena Azy, dia amin’ny olona izay mitady Azy.
  '26':
  - type: text
    content: Tsara ny miandry ny famonjen’i Jehovah amin’ny fanginana.
  '27':
  - type: text
    content: Tsara amin’ny olona ny mitondra zioga, raha mbola tanora izy.
  - type: heading
    content: JODA.
  '28':
  - type: text
    content: Aoka hanjokaiky irery izy ka hangina, raha ampitondraina izany.
  '29':
  - type: text
    content: Aoka hanohoka ny vavany eo amin’ny vovoka izy, angamba hisy hantenaina.
  '3':
  - type: text
    content: Izaho ihany no asian’ny tànany mandritra ny andro mandrakariva.
  - type: heading
    content: BETA.
  '30':
  - type: text
    content: Aoka hanolotra ny takolany ho amin’izay mamely azy izy ka ho feno latsa.
  - type: heading
    content: KAFA.
  '31':
  - type: text
    content: Fa tsy hanary mandrakizay ny Tompo;
  '32':
  - type: text
    content: Eny, fa na dia mampahory aza Izy, dia mbola hiantra ihany araka ny haben’ny famindrampony.
  '33':
  - type: text
    content: Fa tsy sitrany ny mampahory na mampalahelo ny zanak’olombelona.
  - type: heading
    content: LAMEDA.
  '34':
  - type: text
    content: Ny fanitsakitsahana ny mpifatotra rehetra ambonin’ny tany ho eo ambanin’ny tongotra,
  '35':
  - type: text
    content: Ny familiana ny rariny amin’ny olona eo anatrehan’ny Avo Indrindra,
  '36':
  - type: text
    content: Ny famadihana ny adin’ny olona, dia samy tsy sitraky
  - type: note
    content: Heb. jeren’.
  - type: text
    content: ' ny Tompo.'
  - type: heading
    content: MEMA.
  '37':
  - type: text
    content: Iza moa no miteny, ka dia mahatonga izany, raha tsy zavatra efa nodidian’ny Tompo?
  '38':
  - type: text
    content: Tsy avy amin’ny vavan’ny Avo Indrindra va no ivoahan’ny soa sy ny loza?
  '39':
  - type: text
    content: 'Koa ahoana no imonomononan’ny olona mbola velona,–fa no tsy aleo '
  - type: text
    content: misento
  - type: text
    content: ' noho ny amin’ny fahotany avy?'
  - type: note
    content: 'Na: Eny, nahoana no imonomononan’ny olona, raha mijaly noho ny fahotany?'
  - type: heading
    content: NONA.
  '4':
  - type: text
    content: Nataony antitra ny nofoko sy ny hoditro, notapatapahiny ny taolako.
  '40':
  - type: text
    content: Aoka isika handinika sy hamantatra ny alehantsika ka hiverina indray amin’i Jehovah.
  '41':
  - type: text
    content: Aoka hasandratsika amin’Andriamanitra any an-danitra ny fontsika sy ny tànantsika.
  '42':
  - type: text
    content: Izahay efa nanota sy nanao ditra, ary Hianao kosa tsy namela heloka.
  - type: heading
    content: SAMEKA.
  '43':
  - type: text
    content: Nisarona fahatezerana Hianao ka nanenjika anay; eny, novonoinao izahay, fa tsy niantranao.
  '44':
  - type: text
    content: Nisarona rahona Hianao, ka dia voasakana ny vavaka.
  '45':
  - type: text
    content: Nataonao tahaka ny fakofako sy ny zavatra nariana teo afovoan’ny firenena izahay.
  - type: heading
    content: PE.
  '46':
  - type: text
    content: Ny fahavalonay rehetra misanasana vava aminay.
  '47':
  - type: text
    content: Mahavoa anay ny tahotra sy ny lavaka ary ny fandringanana sy ny fahatorotoroana.
  '48':
  - type: text
    content: Rano mandriaka no mijononoka amin’ny masoko noho ny faharatran’ny oloko zanakavavy.
  - type: heading
    content: AINA.
  '49':
  - type: text
    content: Ny masoko mandrotsa-dranomaso ka tsy mijanona, eny, tsy misy fiatoana,
  '5':
  - type: text
    content: Manorina izay hamelezany ahy Izy ary manemitra ahy amin’ny zava-mangidy sy ny fahoriana.
  '50':
  - type: text
    content: Ambara-pitazan’i Jehovah ka ho tsinjony any an-danitra.
  '51':
  - type: text
    content: Ny masoko mampiditra fahoriana ho an’ny fanahiko noho ny amin’ny zanakavavin’ny tanànako rehetra.
  - type: heading
    content: TSADE.
  '52':
  - type: text
    content: Izay fahavaloko tsy ahoan-tsy ahoana dia nanenjika ahy mafy hoatra ny fanenjika voron-kely.
  '53':
  - type: text
    content: Nanjera ahy tao an-davaka famorian-drano izy ka nitady hahafaty ahy sady nitora-bato ahy.
  '54':
  - type: text
    content: 'Mandifotra ny lohako ny rano, ka dia hoy izaho: Maty'
  - type: note
    content: Heb. Voajinja.
  - type: text
    content: ' aho ity!'
  - type: heading
    content: KOFA.
  '55':
  - type: text
    content: Jehovah ô, niantso ny anaranao tany an-davaka lalina indrindra aho.
  '56':
  - type: text
    content: Ny feoko dia efa renao, aza tampenana ny sofinao, raha mitaraina mitady izay mba hiainana kely aho.
  '57':
  - type: text
    content: 'Nanakaiky Hianao tamin’ny andro niantsoako Anao, ka dia hoy Hianao: Aza matahotra.'
  - type: heading
    content: RESY.
  '58':
  - type: text
    content: Tompo ô, Hianao nandahatra ny adiko izay nikasika ny aiko, eny, nanavotra ny aiko Hianao.
  '59':
  - type: text
    content: Jehovah ô, hitanao ny fitsarana miangatra natao tamiko, ka mba tsarao ny adiko.
  '6':
  - type: text
    content: Ampitoeriny ao amin’ny maizina toy izay efa maty fahagola aho.
  - type: heading
    content: GIMELA.
  '60':
  - type: text
    content: Hitanao ny famalian-dratsy rehetra ataon’ireo, dia ny saina rehetra entiny mamely ahy.
  - type: heading
    content: SINA.
  '61':
  - type: text
    content: Jehovah ô, efa renao ny latsa ataony, dia ny saina rehetra entiny mamely ahy,
  '62':
  - type: text
    content: Dia ny molotr’izay mitsangana hanohitra ahy sy ny saina ataony mandritra ny andro hamelezana ahy.
  '63':
  - type: text
    content: Jereo ny fipetrany sy ny fitsangany, fa ataony an-kira aho.
  - type: heading
    content: TAO.
  '64':
  - type: text
    content: Hovalianao araka ny asan’ny tànany izy, Jehovah ô.
  '65':
  - type: text
    content: Eny, hohamaizininao ny fony, hihatra aminy ny ozonao.
  '66':
  - type: text
    content: Henjehinao amin’ny fahatezerana izy ka haringanao tsy ho etỳ ambanin’ny lanitr’i Jehovah.
  '7':
  - type: text
    content: Nofefeny manodidina aho ka tsy afa-nivoaka, nataony mavesatra ny gadrako.
  '8':
  - type: text
    content: Ary na dia mitaraina sy minananana aza aho, dia tampenany ny fivavako.
  '9':
  - type: text
    content: Vato voapaika no narafiny natampiny ny làlako, naolikoliny ny alehako.
  - type: heading
    content: DALETA.
