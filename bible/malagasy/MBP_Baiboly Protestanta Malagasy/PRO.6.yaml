document_id: PRO.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tsy mahamety ny miantoka olona sy ny hakamoana sy ny fitaka sy ny avonavona; ary ny zavatra fito loha izay halan’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ANAKA, raha niantoka ny namanao hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandray tànana hiantoka ny hafa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ka voafandriky ny teny naloaky ny vavanao hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voasingotry ny teny naloaky ny vavanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia izao no ataovy, anaka, ka afaho ny tenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: '(Satria efa mby eo an-tànan’ny namanao hianao):'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha mihohoka sy mifona mafy amin’ny namanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza avela hatory akory ny masonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza avela hilondolondo ny hodimasonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Afaho ny tenanao toy ny gazela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Sam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ii.18.
    marker-yv: yv-n
  - type: text
    text: ' miala amin’izay mihazona azy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny voron-kely miala amin’ny tànan’ny mpamandrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandehana any amin’ny vitsika, ry ilay malaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Diniho ny fanaony, ka mba hendre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy manana komandy ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mpifehy, na mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa mamory ny haniny raha fahavaratra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manangona ny fihinany amin’ny fararano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mandra-pahoviana no mbola handry ihany hianao, ry ilay malaina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana no hifoha amin’ny torimasonao hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mbola hatory kely ihany, mbola ho renoka kely ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mbola hanohon-tànana kely hatory,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia ho tonga toy ny lehilahy mimaona hamely ny alahelonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahantranao ho toy ny jiolahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny olona tena ratsy fanahy sy mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay mandehandeha manao vava ratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamì-maso sy manao famantarana amin’ny tongony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manao baiko amin’ny rantsan-tànany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fahafetsena no ao am-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihevi-dratsy mandrakariva izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mamafy ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary noho izany dia ho avy tampoka kosa ny loza hanjo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho torotoro tampoka izy, ka tsy hisy fahasitranana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izao enina izao no halan’i Jehovah,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, fito no ataony ho fahavetavetana:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny maso miavonavona, ny lela fandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànana mandatsa-dra marina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fo mamoron-tsain-dratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tongotra malaky mihazakazaka hanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny mamoaka lainga ho vavolombelona tsy marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mamafy ady ao amin’ny rahalahy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana hankatò tsara any ana-dray aman-dreny mba hifady ny fijangajangana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ANAKA, tandremo ny didin-drainao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mahafoy ny lalàn-dreninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afatory amin’ny fonao mandrakariva ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary afehezo eo am-bozonao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mandeha hianao, dia hitari-dàlana anao ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mandry hianao, dia hiambina anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mifoha hianao, dia hamelona eritreritra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa jiro ny didy, ary fanazavana ny lalàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary làlan’aina ny anatra famaizana,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hiarovana anao amin’ny vehivavy ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fandroboan’ny lelan’ny vahiny janga.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lelam-bahiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ny fonao tsy haniry ny hatsaran-tarehiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hahazo anao amin’ny hodi-masony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa noho ny vehivavy mpijangajanga no mila tsy hananan’ny lehilahy sombi-mofo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny amin’ny vadin’ny olona no mihaza ny aina soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mahatondra afo ao an-tratran’akanjony va ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho may ny akanjony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Misy mahadia vain’afo va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho may ny tongony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia toy izany izay mankamin’ny vadin’ny namany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy maintsy hampijalina izay mikasika azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy avelan’ny olona ho afa-maina ny mpangalatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha maka zavatra hahavoky ny tenany izy, na dia noana aza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny olona tsy manome tsiny ny mpangalatra, Raha maka zavatra hahavoky ny tenany izy satria noana; Nefa.
    marker-yv: yv-n
  - type: text
    text: ' raha azo izy, dia hampanoneriny fito heny'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanome ny fananana rehetra ao an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay mijangajanga amin’ny vehivavy dia tsy ampy saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ta-hanimba tena no manao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Voakapoka sy afa-baraka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho afaka amin’ny tondro-molotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran-dehilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa tsy hamindra fo izy amin’ny andro hamaliany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy handray vola ho enti-manalady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avotra.
    marker-yv: yv-n
  - type: text
    text: ' akory izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hety, na dia omenao fanambatambazana be aza.
