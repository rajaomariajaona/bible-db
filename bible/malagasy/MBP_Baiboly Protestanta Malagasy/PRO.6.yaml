document_id: PRO.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy mahamety ny miantoka olona sy ny hakamoana sy ny fitaka sy ny avonavona; ary ny zavatra fito loha izay halan’i Jehovah.
  - type: text
    content: ANAKA, raha niantoka ny namanao hianao
  - type: text
    content: Ary nandray tànana hiantoka ny hafa,
  '10':
  - type: text
    content: Mbola hatory kely ihany, mbola ho renoka kely ihany,
  - type: text
    content: Ary mbola hanohon-tànana kely hatory,
  '11':
  - type: text
    content: Dia ho tonga toy ny lehilahy mimaona hamely ny alahelonao,
  - type: text
    content: Ary ny fahantranao ho toy ny jiolahy.
  '12':
  - type: text
    content: Ny olona tena ratsy fanahy sy mpanao ratsy
  - type: text
    content: Dia ilay mandehandeha manao vava ratsy,
  '13':
  - type: text
    content: Izay mamì-maso sy manao famantarana amin’ny tongony
  - type: text
    content: Ary manao baiko amin’ny rantsan-tànany;
  '14':
  - type: text
    content: Fahafetsena no ao am-pony,
  - type: text
    content: Mihevi-dratsy mandrakariva izy
  - type: text
    content: Sady mamafy ady.
  '15':
  - type: text
    content: Ary noho izany dia ho avy tampoka kosa ny loza hanjo azy;
  - type: text
    content: Ho torotoro tampoka izy, ka tsy hisy fahasitranana.
  '16':
  - type: text
    content: Izao enina izao no halan’i Jehovah,–
  - type: text
    content: 'Eny, fito no ataony ho fahavetavetana:'
  '17':
  - type: text
    content: Ny maso miavonavona, ny lela fandainga,
  - type: text
    content: Ary ny tànana mandatsa-dra marina,
  '18':
  - type: text
    content: Ny fo mamoron-tsain-dratsy,
  - type: text
    content: Ny tongotra malaky mihazakazaka hanao ratsy,
  '19':
  - type: text
    content: Ny mamoaka lainga ho vavolombelona tsy marina,
  - type: text
    content: Ary ny mamafy ady ao amin’ny rahalahy.
  - type: heading
    content: Fananarana hankatò tsara any ana-dray aman-dreny mba hifady ny fijangajangana.
  '2':
  - type: text
    content: Ka voafandriky ny teny naloaky ny vavanao hianao
  - type: text
    content: Sady voasingotry ny teny naloaky ny vavanao,
  '20':
  - type: text
    content: ANAKA, tandremo ny didin-drainao,
  - type: text
    content: Ary aza mahafoy ny lalàn-dreninao.
  '21':
  - type: text
    content: Afatory amin’ny fonao mandrakariva ireo,
  - type: text
    content: Ary afehezo eo am-bozonao,
  '22':
  - type: text
    content: Raha mandeha hianao, dia hitari-dàlana anao ireo;
  - type: text
    content: Raha mandry hianao, dia hiambina anao;
  - type: text
    content: Ary raha mifoha hianao, dia hamelona eritreritra anao.
  '23':
  - type: text
    content: Fa jiro ny didy, ary fanazavana ny lalàna,
  - type: text
    content: Ary làlan’aina ny anatra famaizana,–
  '24':
  - type: text
    content: Hiarovana anao amin’ny vehivavy ratsy fanahy,
  - type: text
    content: Ary amin’ny fandroboan’ny lelan’ny vahiny janga.
  - type: note
    content: Heb. lelam-bahiny.
  '25':
  - type: text
    content: Aoka ny fonao tsy haniry ny hatsaran-tarehiny;
  - type: text
    content: Ary aoka tsy hahazo anao amin’ny hodi-masony izy.
  '26':
  - type: text
    content: Fa noho ny vehivavy mpijangajanga no mila tsy hananan’ny lehilahy sombi-mofo,
  - type: text
    content: Ary ny amin’ny vadin’ny olona no mihaza ny aina soa.
  '27':
  - type: text
    content: Mahatondra afo ao an-tratran’akanjony va ny olona,
  - type: text
    content: Ka tsy ho may ny akanjony?
  '28':
  - type: text
    content: Misy mahadia vain’afo va,
  - type: text
    content: Ka tsy ho may ny tongony?
  '29':
  - type: text
    content: Dia toy izany izay mankamin’ny vadin’ny namany;
  - type: text
    content: Tsy maintsy hampijalina izay mikasika azy.
  '3':
  - type: text
    content: Dia izao no ataovy, anaka, ka afaho ny tenanao
  - type: text
    content: '(Satria efa mby eo an-tànan’ny namanao hianao):'
  - type: text
    content: Andeha mihohoka sy mifona mafy amin’ny namanao.
  '30':
  - type: text
    content: Tsy avelan’ny olona ho afa-maina ny mpangalatra,
  - type: text
    content: Raha maka zavatra hahavoky ny tenany izy, na dia noana aza;
  '31':
  - type: text
    content: Fa
  - type: note
    content: 'Na: Ny olona tsy manome tsiny ny mpangalatra, Raha maka zavatra hahavoky ny tenany izy satria noana; Nefa.'
  - type: text
    content: ' raha azo izy, dia hampanoneriny fito heny'
  - type: text
    content: Ka hanome ny fananana rehetra ao an-tranony.
  '32':
  - type: text
    content: Izay mijangajanga amin’ny vehivavy dia tsy ampy saina;
  - type: text
    content: Izay ta-hanimba tena no manao izany.
  '33':
  - type: text
    content: Voakapoka sy afa-baraka izy
  - type: text
    content: Ary tsy ho afaka amin’ny tondro-molotra.
  '34':
  - type: text
    content: Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran-dehilahy,
  - type: text
    content: Koa tsy hamindra fo izy amin’ny andro hamaliany.
  '35':
  - type: text
    content: Tsy handray vola ho enti-manalady
  - type: note
    content: Heb. avotra.
  - type: text
    content: ' akory izy,'
  - type: text
    content: Ary tsy hety, na dia omenao fanambatambazana be aza.
  '4':
  - type: text
    content: Aza avela hatory akory ny masonao,
  - type: text
    content: Ary aza avela hilondolondo ny hodimasonao.
  '5':
  - type: text
    content: Afaho ny tenanao toy ny gazela
  - type: note
    content: Izahao 2 Sam. ii.18.
  - type: text
    content: ' miala amin’izay mihazona azy,'
  - type: text
    content: Ary toy ny voron-kely miala amin’ny tànan’ny mpamandrika.
  '6':
  - type: text
    content: Mandehana any amin’ny vitsika, ry ilay malaina;
  - type: text
    content: Diniho ny fanaony, ka mba hendre;
  '7':
  - type: text
    content: Tsy manana komandy ireny,
  - type: text
    content: Na mpifehy, na mpanapaka,
  '8':
  - type: text
    content: Nefa mamory ny haniny raha fahavaratra izy,
  - type: text
    content: Ary manangona ny fihinany amin’ny fararano.
  '9':
  - type: text
    content: Mandra-pahoviana no mbola handry ihany hianao, ry ilay malaina?
  - type: text
    content: Rahoviana no hifoha amin’ny torimasonao hianao?
