document_id: RUT.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsimponan’i Rota salohim-bary teny an-tanimbarin’i Boaza, sy ny soa nataon’i Boaza taminy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY nisy havan’ny vadin’i Naomy avy amin’ny fokon’i Elimeleka, lehilahy mpanjatobe, Boaza no anarany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia niondrika sy niankohoka tamin’ny tany Rota ka nanao taminy hoe: Ahoana no mba ahitako fitia eto imasonao sy itsinjovanao ahy, nefa vahiny ihany aho?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia namaly Boaza ka nanao taminy hoe: Efa reko tsara izay rehetra nataonao tamin’ny rafozanao-vavy hatrizay nahafatesan’ny vadinao sy ny nahafoizanao ny rainao sy ny reninao mbamin’ny tany nahaterahanao sy ny nankanesanao atỳ amin’ny firenena tsy mbola fantatrao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hamaly ny nataonao anie Jehovah, ka homen’i Jehovah, Andriamanitry ny Isiraely, valim-pitia lehibe anie hianao, satria avy hialoka eo ambanin’ny elany hianao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy izy: Aoka hahita fitia eo imasonao aho, tompokolahy; fa efa nampifaly ahy hianao, ary efa niteny mora tamin’ny zatovovavinao, na dia tsy tahaka ny anankiray amin’ny zatovovavinao aza aho.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary rehefa tonga ny fotoam-pisakafoana, dia hoy Boaza taminy: Mankanesa atỳ, ka mihinàna mofo, ary atsobohy amin’ny vinaingitra ny sombi-mofonao. Dia nipetraka teo anilan’ny mpijinja izy; ary nangalan-dralehilahy lango izy, dia nihinana ka voky, ary nisy sisa tsy làniny aza.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary raha nitsangana hitsimpona izy, dia nodidian’i Boaza ny ankizilahiny hoe: Aoka izy hitsimpona na dia eny anelanelan’ny amboara aza, ka aza maninona azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary asio latsadatsaka avy amin’ny amboara, ka avelao ireny hotsimponiny, fa aza rarana izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nitsimpona tany an-tsaha mandra-paharivan’ny andro Rota, dia nively izay efa voatsimpony, ka nisy vary hordea tokony ho iray efaha. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nentiny izany, ka nankany an-tanàna izy, ary hitan’ny rafozani-vavy izay efa voatsimpony; ary navoakany koa ilay sisa tsy làniny tamin’ny nisakafoany ka nomeny ny rafozany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ny rafozani-vavy taminy: Taiza no nitsimponanao andro-any, ary taiza no nanaovanao? Hotahina anie izay nitsinjo anao. Dia nambarany tamin’ny rafozani-vavy izay efa nitsimponany, ka hoy izy: Boaza no anaran’ny lehilahy, izay tompon’ny tanimbary nitsimponako andro-any. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy Rota, vehivavy Moabita, tamin’i Naomy: Aoka aho hankany an-tsaha mba hitsimpona salohim-bary eo aorian’izay hahitako fitia eo imasony. Dia hoy izy taminy: Andeha ary, anaka. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy Naomy tamin’ny vinantoni-vavy: Hotahin’i Jehovah anie izay tsy nitsahatra hanao soa amin’ny velona sy ny maty. Ary hoy koa Naomy taminy: Havantsika akaiky ihany ralehilahy, ka isan’izay mahavotra antsika izy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy Rota, vehivavy Moabita: Izao koa no nataony tamiko: Mitoera tsara eo anilan’ny zatovoko hianao mandra-pahatapitry ny fijinjana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy Naomy tamin’i Rota vinantoni-vavy: Tsara izany, anaka, raha miara-mivoaka amin’ny ankizivavy hianao, fandrao hisy haninona anao raha any an-tsaha hafa.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary izy tsy nety nisaraka tamin’ny zatovovavin’i Boaza, fa nitsimpona mandra-pahatapitry ny fijinjana ny vary hordea sy ny vary tritika; ary nitoetra tao amin’ny rafozani-vavy izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia lasa nandeha izy ka nitsimpona tany an-tsaha teo aorian’ny mpijinja; ary sendra tonga tany amin’ny tanimbarin’i Boaza, izay avy amin’ny fokon’i Elimeleka, izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary, indro, Boaza tonga avy tany Betlehema ka niteny tamin’ny mpijinja hoe: Jehovah anie ho aminareo. Dia hoy kosa ireo taminy: Hitahy anao anie Jehovah.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy Boaza tamin’ny zatovony, izay nitandrina ny mpijinja: Zanak’iza moa io zazavavy io? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia namaly ilay zatovo nitandrina ny mpijinja ka nanao hoe: Zazavavy Moabita, izay niverina nomba an’i Naomy avy tany amin’ny tany Moaba io; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'fa hoy izy: Masìna hianao aoka aho hitsimpona sy hanangona eo aorian’ny mpijinja eny anelanelan’ny amboara; dia tonga izy ka nijanona teto hatramin’ny maraina ka mandraka ankehitriny; kely foana no nitoerany tao an-trano.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy Boaza tamin’i Rota: Tsy mandre va hianao, anaka? Aza mandeha hitsimpona any an-tanimbary hafa na miala eto hianao, fa mitoera eto anilan’ny zatovovavy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aoka ny masonao ho amin’ny tanimbary izay jinjany, ka manaraha eo aoriany hianao: tsy efa nodidiako va ny zatovo tsy haninona anao? Ary raha mangetaheta hianao, mankanesa eroa amin’ny siny, ka misotroa amin’izay antsakain’ny zatovo. '
