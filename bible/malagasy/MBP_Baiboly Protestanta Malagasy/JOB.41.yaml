document_id: JOB.41,873
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, foana ny fihendrena azy;
  - type: text
    content: Tsy mahakivy va na dia ny fijery azy aza?
  '10':
  - type: text
    content: Ny fieviny dia mampamirapiratra fahazavana,
  - type: text
    content: Ary ny masony dia tahaka ny hodimason’ny maraina.
  '11':
  - type: text
    content: Lelafo no mivoaka avy amin’ny vavany;
  - type: text
    content: Kilalaon’afo no mipariaka avy aminy.
  '12':
  - type: text
    content: Ny vavorony dia ivoahan’ny setroka,
  - type: text
    content: Tahaka ny avy amin’ny vilany mangotraka, na amin’ny fahandroana.
  - type: note
    content: 'Na: afon-kerana.'
  '13':
  - type: text
    content: Ny fofonainy mampirehitra arina,
  - type: text
    content: Ary misy lelafo mivoaka avy amin’ny vavany.
  '14':
  - type: text
    content: Ny vozony no itoeran’ny hery;
  - type: text
    content: Ary mibitaka eo alohany ny fampahatahorana.
  '15':
  - type: text
    content: Mivalombalona ny hotraka amin’ny tenany;
  - type: text
    content: Mafy ireny ka tsy azo endahana.
  '16':
  - type: text
    content: Mafy tahaka ny vato ny fony;
  - type: text
    content: Eny, mafy tahaka ny vato fikosoham-bary.
  '17':
  - type: text
    content: Raha mitsangana izy, dia raiki-tahotra ny mahery;
  - type: text
    content: Eny, toran-kovitra ireo ka tsy mahavoa.
  '18':
  - type: text
    content: Raha misy mamely azy amin’ny sabatra, dia tsy mahalaitra,
  - type: text
    content: Na amin’ny lefompohy, na ny firombaka, na ny zana-tsipìka.
  '19':
  - type: text
    content: Ataony toy ny mololo ny vy,
  - type: text
    content: Ary toy ny hazo momoka ny varahina.
  '2':
  - type: text
    content: Tsy misy sahy manao vi-very hanaitra azy;
  - type: text
    content: Koa iza kosa no mahajanona eo anatrehako?
  '20':
  - type: text
    content: Tsy mampandositra azy ny zana-tsipìka;
  - type: text
    content: Ataony ho toy ny vodivary ny vaton’antsamotady.
  '21':
  - type: text
    content: Ataony ho toy ny vodivary koa ny langilangy;
  - type: text
    content: Ihomehezany ny fanetsehana ny lefona.
  '22':
  - type: text
    content: Ny takibany dia tahaka ny tavim-bilany maranitra;
  - type: text
    content: Mamelatra fivelezam-bary maranitra eo amin’ny fotaka izy.
  '23':
  - type: text
    content: Mampandevy ny lalina ho tahaka ny ao am-bilany izy;
  - type: text
    content: Manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.
  '24':
  - type: text
    content: Mampahazava ny làlany eo aoriany izy
  - type: text
    content: Ataon’ny olona ho toy ny volo fotsy ny lalina.
  '25':
  - type: text
    content: Tsy misy tahaka azy eny ambonin’ny tany,
  - type: text
    content: Izay voaforona tsy hahalala tahotra.
  '26':
  - type: text
    content: Ny avo rehetra jereny avokoa;
  - type: text
    content: Mpanjakan’ny bibi-dia rehetra izy.
  '3':
  - type: text
    content: Iza no nanome Ahy aloha mba hamaliako azy?
  - type: text
    content: Ny eny ambanin’ny lanitra rehetra dia Ahy avokoa.
  '4':
  - type: text
    content: Tsy mbola hangina Aho ny amin’ny momba ny tenany
  - type: text
    content: Sy ny heriny ary ny fahatsaran’ny endriny.
  '5':
  - type: text
    content: Iza no mahasonga ny fitafiany anoloany?
  - type: text
    content: Na iza no sahy hiditra ao amin’ny nifiny roa sosona?
  '6':
  - type: text
    content: Iza no mahasokatra ny varavararan’ny tavany?
  - type: text
    content: Mahatsiravina ny nifiny manodidina!
  '7':
  - type: text
    content: Reharehany ny faharaoraon’ny kirany,
  - type: note
    content: Heb. ampingany.
  - type: text
    content: Mihidy avokoa toy ny voapetaka mafy amin’ny tombo-kase ireo;
  '8':
  - type: text
    content: Mikirindro ireo,
  - type: text
    content: Ka tsy azon’ny rivotra idirana eo anelanelany.
  '9':
  - type: text
    content: Mifanindry lany ireo
  - type: text
    content: Sady mifaniditra ka tsy azo sarahina,
