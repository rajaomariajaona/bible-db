document_id: DEU.19,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny tanàna handosiran’izay mahafaty olona tsy nahy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'REHEFA aringan’i Jehovah Andriamanitrao ny firenen-tsamy hafa, izay tompon’ny tany omen’i Jehovah Andriamanitrao anao, ary mandresy azy hianao ka monina ao an-tanànany sy ao an-tranony, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: mba tsy hisy ra marina alatsaka eo amin’ny taninao, izay omen’i Jehovah Andriamanitrao anao ho lovanao, ka tsy ho meloka amin’ny ra hianao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa raha misy olona mankahala ny namany ka manotrika azy, ary mitsangana ka mamely mahafaty azy, ary mandositra ho ao amin’ny anankiray amin’ireo tanàna ireo, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ny loholona amin’ny tanànany dia haniraka haka azy ao, dia hanolotra azy eo an-tànan’ny mpamaly ra, mba hovonoiny ho faty izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy hiantra azy ny masonao; fa hesorinao tsy ho eo amin’ny Isiraely ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'heloka '
    - type: text
      text: ny amin’ny ra marina, mba hahita soa hianao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny tsi-famindrana fari-tany sy ny amin’ny vavolombelona.
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: AZA mamindra ny fari-tanin’ny namanao, izay efa vitan’ny razana teo amin’ny zara-taninao, izay azonao eo amin’ny tany izay omen’i Jehovah Andriamanitrao anao holovanao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Raha vavolombelona iray monja, dia aoka tsy hitsangana hiampanga olona ny amin’izay heloka na ota nataony na inona na inona; fa amin’ny tenin’ny vavolombelona roa na telo no hanorenana mafy ny teny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha misy vavolombelona mampidi-doza mitsangana hiampanga olona ho nanao ratsy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho niodina.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'dia hitsangana eo anatrehan’i Jehovah izy roa lahy izay miady, dia eo anatrehan’ny mpisorona sy ny mpitsara amin’izany andro izany; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary raha hadinin’ny mpitsara mafy izy ka hitany fa vavolombelona mandainga, fa miampanga lainga ny namany, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'dia araka izay nokasainy hatao amin’ny namany no hataonareo aminy; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia manokàna tanàna telo ho anao eo afovoan’ny taninao, izay omen’i Jehovah Andriamanitrao anao holovana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny olona sisa dia handre izany ka hatahotra ary tsy hanao araka izany ratsy izany eo aminao intsony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia tsy hiantra azy ny masonao; fa aina no hataonao solon’ny aina, maso solon’ny maso, nify solon’ny nify, tànana solon’ny tànana, tongotra solon’ny tongotra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Amboary ny làlana, ka zarao ho telo toko ny taninao, izay omen’i Jehovah Andriamanitrao holovanao, mba handosiran’ny mahafaty olona rehetra ao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny mahafaty olona izay hovelomina, raha mandositra ao, dia ny mahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha– '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'toy ny olona izay miaraka amin’ny namany ho any an-ala hikapa hazo, koa manainga ny famaky hikapa ny hazo ny tànany, dia mitsoaka amin’ny zarany ny lela-famaky, ary mahavoa ny namany ka mahafaty azy–dia aoka handositra ao amin’ny anankiray amin’ireo tanàna ireo izy ka hovelomina; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: fandrao hanenjika ny nahafaty olona ny mpamaly ra, raha mbola mirehitra ny fony, ka hahatratra azy, noho ny halavitry ny alehany, dia hahafaty azy izy; nefa tsy tokony ho faty izy, satria tsy nankahala ny namany teo aloha.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa izany no andidiako anao hoe: Manokàna tanàna telo ho anao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary raha hitarin’i Jehovah Andriamanitrao ny fari-taninao, araka izay nianianany tamin’ny razanao, ka homeny anao ny tany rehetra izay nolazainy homena ny razanao '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '(raha hitandrina hianao ka hanaraka izao lalàna rehetra izao, izay andidiako anao anio, ka ho tia an’i Jehovah Andriamanitrao, ary handeha mandrakariva amin’ny làlany), dia hampianao tanàna telo koa ireny telo ireny; '
