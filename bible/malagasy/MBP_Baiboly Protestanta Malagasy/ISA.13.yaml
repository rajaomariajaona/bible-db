document_id: ISA.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny loza hanjo an’i Babylona.
  - type: text
    content: FAMINANIANA hitan’Isaia, zanak’i Amoza, ny amin’ny loza hanjo an’i Babylona.
  '10':
  - type: text
    content: Fa ny kintan’ny lanitra, na dia ireo Telonohorefy aza, dia tsy hampamirapiratra ny fahazavany;
  - type: text
    content: Ny masoandro ho maizina amin’ny iposahany;
  - type: text
    content: Ary ny volana tsy hangarangarana.
  '11':
  - type: text
    content: Ary hatsingeriko amin’izao tany rehetra izao ny faharatsiany,
  - type: text
    content: Sy amin’ny ratsy fanahy ny helony;
  - type: text
    content: Ary hatsahatro ny fireharehan’ny mpiavonavona,
  - type: text
    content: Ary haetriko ny fiavonavonan’ny mpampahory.
  '12':
  - type: text
    content: Dia hataoko ho saro-tadiavina mihoatra noho ny volamena tsara ny olombelona,
  - type: text
    content: Eny, noho ny tena volamena avy any Ofira aza.
  '13':
  - type: text
    content: Ary noho izany dia hampihorohoroiko ny lanitra,
  - type: text
    content: Ary ny tany hientanentana hiala amin’ny fitoerany
  - type: text
    content: Noho ny fahatezeran’i Jehovah, Tompon’ny maro,
  - type: text
    content: Sy noho ny andro firehetan’ny fahatezerany.
  '14':
  - type: text
    content: Ary ho tahaka ny gazela hazaina ny olona,
  - type: text
    content: Sy ho tahaka ny ondry aman-osy tsy misy mpamory,
  - type: text
    content: Ka dia samy ho lasa any amin’ny fireneny avy izy,
  - type: text
    content: Eny, samy handositra ho any amin’ny taniny avy izy.
  '15':
  - type: text
    content: Izay rehetra azo dia holefonina,
  - type: text
    content: Ary izay rehetra tratra dia ho lavon’ny sabatra.
  '16':
  - type: text
    content: Ary ny zanany madinika hotorotoroina eo imasony;
  - type: text
    content: Ny tranony hobaboina,
  - type: text
    content: Ary ny vadiny hosavihina.
  '17':
  - type: text
    content: Indro, hamporisihiko hamely azy ny Mediana,
  - type: text
    content: Izay manao ny volafotsy tsy ho zavatra
  - type: text
    content: Ary tsy mankamamy ny volamena.
  '18':
  - type: text
    content: Ny tsipìkany handripaka ny zatovo,
  - type: text
    content: Ary izay ateraky ny kibo tsy hamindrany fo,
  - type: text
    content: Eny, na dia ny zaza aza tsy hiantran’ny masony.
  '19':
  - type: text
    content: Ary Babylona, ravaky ny fanjakana maro
  - type: text
    content: Tabiha sy reharehan’ny Kaldeana,
  - type: text
    content: Dia ho rava tahaka ny nandravan’Andriamanitra an’i Sodoma sy Gomora;
  '2':
  - type: text
    content: Manangàna faneva eo an-tampon’izay tendrombohitra mangadihady hianareo,
  - type: text
    content: Manandrata feo hiantso azy, hofay tànana izy
  - type: text
    content: Hiditra amin’ny vavahadin’ireo mpanapaka.
  '20':
  - type: text
    content: Tsy honenana mandrakizay izy
  - type: text
    content: Ary tsy hitoerana intsony hatramin’ny taranaka fara mandimby,
  - type: text
    content: Tsy hisy Arabo hanorin-day any,
  - type: text
    content: Na mpiandry ondry hampandry ny ondriny any;
  '21':
  - type: text
    content: Fa ny bibi-dia any an-efitra no hitoetra any,
  - type: text
    content: Ho feno vorondolo
  - type: note
    content: 'Na: hyena.'
  - type: text
    content: ' ny tranony,'
  - type: text
    content: Ny ostritsa no hitoetra any,
  - type: text
    content: Ary ny osilahy
  - type: note
    content: Heb. seïrima; izahao Lev. xvii. 7.
  - type: text
    content: ' no hitsambikimbikina any,'
  '22':
  - type: text
    content: Ny kary
  - type: note
    content: Heb. jakala.
  - type: text
    content: ' no hifampierona ao an-tranobeny,'
  - type: note
    content: Heb. mpitondratenany.
  - type: text
    content: Ary ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' ao amin’ny lapa nanaranam-po;'
  - type: text
    content: Efa antomotra ny fotoany,
  - type: text
    content: Ary ny androny tsy hatao ela.
  '3':
  - type: text
    content: Izaho efa nandidy ny nohamasiniko,
  - type: text
    content: Eny, efa niantso ny lehilahy maheriko Aho,
  - type: text
    content: Dia ireo mibitaka amim-pireharehana,
  - type: text
    content: Hahatanteraka ny fahatezerako.
  '4':
  - type: text
    content: Injany! ny horakoraka any an-tendrombohitra,
  - type: text
    content: Tahaka ny an’ny vahoaka be!
  - type: note
    content: 'Na: firenena lehibe.'
  - type: text
    content: Dia ny fitabataban’ny fanjakan’ny firenena efa tafatambatra!
  - type: text
    content: Jehovah, Tompon’ny maro, no manomana miaramila hiady,
  '5':
  - type: text
    content: Izay avy any amin’ny tany lavitra, any amin’ny faravodilanitra,
  - type: text
    content: Dia Jehovah sy ireo fitaovan’ny fahatezerany,
  - type: text
    content: Ho enti-mandrava ny tany rehetra.
  '6':
  - type: text
    content: Midradradradrà hianareo, fa efa antomotra ny andron’i Jehovah,
  - type: text
    content: Ka tahaka ny loza tsy toha avy amin’ny Tsitoha no fihaviny.
  '7':
  - type: text
    content: Ary noho izany dia hiraviravy ny tànana rehetra,
  - type: text
    content: Ary ho kivy ny fon’ny zanak’olombelona rehetra;
  '8':
  - type: text
    content: Ho toran-kovitra izy;
  - type: text
    content: Fanaintainana sy fahoriana no hahazo azy,
  - type: text
    content: Ka hijalijaly tahaka ny vehivavy mihetsi-jaza izy;
  - type: text
    content: Samy ho talanjona izy ka hifampijery;
  - type: text
    content: Mitarehin-delafo ny tarehiny.
  '9':
  - type: text
    content: Indro, avy ny andron’i Jehovah,
  - type: text
    content: Dia loza sy fahavinirana ary firehetan’ny fahatezerana
  - type: text
    content: Hanafoanana ny tany
  - type: text
    content: Sy handringanana ny mpanota tsy ho ao.
