document_id: ISA.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny loza hanjo an’i Babylona.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FAMINANIANA hitan’Isaia, zanak’i Amoza, ny amin’ny loza hanjo an’i Babylona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Manangàna faneva eo an-tampon’izay tendrombohitra mangadihady hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manandrata feo hiantso azy, hofay tànana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiditra amin’ny vavahadin’ireo mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho efa nandidy ny nohamasiniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa niantso ny lehilahy maheriko Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo mibitaka amim-pireharehana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahatanteraka ny fahatezerako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Injany! ny horakoraka any an-tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny an’ny vahoaka be!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: firenena lehibe.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fitabataban’ny fanjakan’ny firenena efa tafatambatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah, Tompon’ny maro, no manomana miaramila hiady,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay avy any amin’ny tany lavitra, any amin’ny faravodilanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Jehovah sy ireo fitaovan’ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho enti-mandrava ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Midradradradrà hianareo, fa efa antomotra ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tahaka ny loza tsy toha avy amin’ny Tsitoha no fihaviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary noho izany dia hiraviravy ny tànana rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho kivy ny fon’ny zanak’olombelona rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho toran-kovitra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanaintainana sy fahoriana no hahazo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hijalijaly tahaka ny vehivavy mihetsi-jaza izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy ho talanjona izy ka hifampijery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitarehin-delafo ny tarehiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indro, avy ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia loza sy fahavinirana ary firehetan’ny fahatezerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanafoanana ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handringanana ny mpanota tsy ho ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny kintan’ny lanitra, na dia ireo Telonohorefy aza, dia tsy hampamirapiratra ny fahazavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masoandro ho maizina amin’ny iposahany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volana tsy hangarangarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hatsingeriko amin’izao tany rehetra izao ny faharatsiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny ratsy fanahy ny helony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatsahatro ny fireharehan’ny mpiavonavona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haetriko ny fiavonavonan’ny mpampahory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hataoko ho saro-tadiavina mihoatra noho ny volamena tsara ny olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, noho ny tena volamena avy any Ofira aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary noho izany dia hampihorohoroiko ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany hientanentana hiala amin’ny fitoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahatezeran’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy noho ny andro firehetan’ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ho tahaka ny gazela hazaina ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho tahaka ny ondry aman-osy tsy misy mpamory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia samy ho lasa any amin’ny fireneny avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, samy handositra ho any amin’ny taniny avy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay rehetra azo dia holefonina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay rehetra tratra dia ho lavon’ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny zanany madinika hotorotoroina eo imasony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tranony hobaboina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vadiny hosavihina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, hamporisihiko hamely azy ny Mediana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao ny volafotsy tsy ho zavatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mankamamy ny volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny tsipìkany handripaka ny zatovo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay ateraky ny kibo tsy hamindrany fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia ny zaza aza tsy hiantran’ny masony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Babylona, ravaky ny fanjakana maro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tabiha sy reharehan’ny Kaldeana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho rava tahaka ny nandravan’Andriamanitra an’i Sodoma sy Gomora;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy honenana mandrakizay izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hitoerana intsony hatramin’ny taranaka fara mandimby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy Arabo hanorin-day any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mpiandry ondry hampandry ny ondriny any;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny bibi-dia any an-efitra no hitoetra any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho feno vorondolo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hyena.
    marker-yv: yv-n
  - type: text
    text: ' ny tranony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ostritsa no hitoetra any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny osilahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'seïrima; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xvii. 7.
    marker-yv: yv-n
  - type: text
    text: ' no hitsambikimbikina any,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny kary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
  - type: text
    text: ' no hifampierona ao an-tranobeny,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpitondratenany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
  - type: text
    text: ' ao amin’ny lapa nanaranam-po;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa antomotra ny fotoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny androny tsy hatao ela.
