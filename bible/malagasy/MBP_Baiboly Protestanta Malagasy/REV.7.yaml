document_id: REV.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niarovana ny Isiraely marina mba tsy hosimban’ny loza ho avy, sy ny fahasambaran’ny tonga any an-danitra ka afaka amin’ny fahoriana lehibe.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: REHEFA afaka izany, dia hitako fa, indreo, nisy anjely efatra nitsangana teo amin’ny vazan-tany efatra, nihazona ny rivotra efatra amin’ny tany, mba tsy hisy rivotra hitsoka amin’ny tany, na amin’ny ranomasina, na amin’ny hazo akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako fa, indro, nisy anjely hafa koa niakatra avy tany amin’ny fiposahan’ny masoandro, nanana ny fanombohan-kasen’Andriamanitra velona; ary izy niantso ny anjely efatra izay navela hanimba ny tany sy ny ranomasina tamin’ny feo mahery nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza manimba ny tany, na ny ranomasina, na ny hazo, mandra-panisinay tombo-kase eo amin’ny handrin’ny mpanompon’Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nahare ny isan’izay voaisy tombo-kase aho: efatra arivo amby efatra alina amby iray hetsy no voaisy tombo-kase avy tamin’ny firenen’ny Zanak’Isiraely rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy tamin’ny firenen’i Joda roa arivo amby iray alina no voaisy tombo-kase. Avy tamin’ny firenen’i Robena roa arivo amby iray alina. Avy tamin’ny firenen’i Gada roa arivo amby iray alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy tamin’ny firenen’i Asera roa arivo amby iray alina. Avy tamin’ny firenen’i Naftaly roa arivo amby iray alina. Avy tamin’ny firenen’i Manase roa arivo amby iray alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy tamin’ny firenen’i Simeona roa arivo amby iray alina. Avy tamin’ny firenen’i Levy roa arivo amby iray alina. Avy tamin’ny firenen’Isakara roa arivo amby iray alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avy tamin’ny firenen’i Zebolona roa arivo amby iray alina. Avy tamin’ny firenen’i Josefa roa arivo amby iray alina. Avy tamin’ny firenen’i Benjamina roa arivo amby iray alina no voaisy tombo-kase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa afaka izany, dia hitako fa, indreo, nisy olona betsaka tsy tambo isaina avy tamin’ny firenena rehetra sy ny fokom-pirenena sy ny olona ary ny samy hafa fiteny nitsangana teo anoloan’ny seza fiandrianana sy teo anatrehan’ny Zanak’ondry, niakanjo akanjo fotsy lava sady nitana sampan-drofia teny an-tànany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia niantso tamin’ny feo mahery izy nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famonjena anie ho an’Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mipetraka eo ambonin’ny seza fiandrianana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho an’ny Zanak’ondry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny anjely rehetra nitsangana manodidina ny seza fiandrianana mbamin’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' sy ny zava-manan-aina efatra, dia niankohoka teo anoloan’ny seza fiandrianana izy ka nivavaka tamin’Andriamanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amena! Ny saotra sy ny voninahitra sy ny fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fisaorana sy ny haja sy ny hery ary ny faherezana anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’Andriamanitsika mandrakizay mandrakizay. Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny anankiray tamin’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' namaly ka nanao tamiko hoe: Iza moa ireo miakanjo akanjo fotsy lava? Ary avy taiza izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy izaho taminy: Tompoko, hianao no mahalala. Dia hoy izy tamiko: Ireo no avy tamin’ny fahoriana lehibe, ary ny akanjony nosasany sy nofotsiany tamin’ny ran’ny Zanak’ondry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary noho izany dia mitoetra eo anoloan’ny seza fiandrianan’Andriamanitra izy ka manompo Azy andro aman-alina eo amin’ny tempoliny; ary Ilay mipetraka eo ambonin’ny seza fiandrianana dia hamelatra ny trano-lainy handrakotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy ho noana na hangetaheta intsony ireo; ary tsy haninona azy ny masoandro na izay hafanana akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny Zanak’ondry Izay eo afovoan’ny seza fiandrianana no ho Mpiandry azy ka hitondra azy ho amin’ny loharanon’ny ranon’aina; ary hofafan’Andriamanitra ny ranomaso rehetra amin’ny masony (Isa. 25.8).
