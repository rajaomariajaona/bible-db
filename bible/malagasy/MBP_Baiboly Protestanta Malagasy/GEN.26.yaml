document_id: GEN.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nivahinian’Isaka tany Gerara.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY nisy mosary indray teo amin’ny tany, afa-tsy ilay mosary voalohany fony fahavelon’i Abrahama. Ary Isaka nankany amin’i Abimeleka, mpanjakan’ny Filistina, tany Gerara.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy Abimeleka: Inona izao nataonao taminay izao? Saiky nisy nandry tamin’ny vadinao ny olona, dia ho nahatonga heloka taminay hianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nandidy ny vahoakany rehetra Abimeleka ka nanao hoe: Izay manendry io lehilahy io na ny vadiny dia hatao maty tokoa.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia namafy tamin’izany tany izany Isaka ka nahazo zato heny tamin’izay taona izay, satria efa notahin’i Jehovah izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nanan-karena ralehilahy ka nandroso sy nitombo ambara-pahatongany ho mpanjatobe indrindra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa nanana fananana be izy, dia ondry aman-osy sy omby ary andevo maro; ka dia nialona azy ny Filistina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny lavaka fantsakana rehetra, izay efa nohadin’ny mpanompon-drainy fony fahavelon’i Abrahama rainy, dia efa novonoin’ny Filistina sy nototofany tany avokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy Abimeleka tamin’Isaka: Mialà atỳ aminay; fa hianao mahery lavitra noho izahay.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary lasa niala teo Isaka, dia nanorina ny lainy teo an-dohasahan’i Gerara ka nonina teo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia noloaran’Isaka indray ny lavaka fantsakana izay voahady fony fahavelon’i Abrahama rainy, fa efa novonoin’ny Filistina ireny, rehefa maty Abrahama; ary dia nasiany anarana ireny araka ny anarana izay efa nanaovan-drainy azy ihany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nihady teo amin’ny lohasaha ny mpanompon’Isaka ka nahita loharano velona teo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Jehovah niseho taminy ka nanao hoe: Aza midina any Egypta hianao; mitoera eo amin’ny tany izay holazaiko aminao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary niady tamin’ny mpiandry ombin’Isaka ny mpiandry omby tao Gerara ka nanao hoe: Anay ny rano; ary ny anaran’ny lavaka fantsakana dia nataon’Isaka hoe Eseka,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eseka = Fifandirana.
      marker-yv: yv-n
    - type: text
      text: ' satria nifanditra taminy izy ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia nihady lavaka fantsakana hafa koa izy, ka niadiany indray io; ary ny anarany dia nataony hoe Sitna.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sitna = Fandrafiana.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia nifindra niala teo izy ka nihady lavaka fantsakana hafa koa indray; fa io kosa tsy mba niadiany; koa ny anarany dia nataony hoe Rehobota;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehobota = Toerana malalaka.
      marker-yv: yv-n
    - type: text
      text: ' fa hoy izy: Efa nomen’i Jehovah toerana malalaka isika ankehitriny, dia hihamaro eo amin’ny tany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nifindran’Isaka nankany Beri-sheba, sy ny nanaovany fanekena tamin’i Abimeleka.
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'DIA niakatra niala teo izy ka nankany Beri-sheba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Jehovah niseho taminy tamin’iny alina iny ka nanao hoe: Izaho no Andriamanitr’i Abrahama rainao; aza matahotra, fa momba anao Aho ka hitahy anao sy hahamaro ny taranakao noho ny amin’i Abrahama mpanompoko. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nanorina alitara teo izy, dia niantso ny anaran’i Jehovah sady nanorina ny lainy teo koa; ary nihady lavaka fantsakana teo ny mpanompon’Isaka.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary Abimeleka mbamin’i Ahozata sakaizany sy Pikola, komandin’ny miaramilany, dia niala tao Gerara hankany amin’Isaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy Isaka taminy: Nahoana hianareo no mankatỳ amiko, kanefa nankahala ahy hianareo ka nandroaka ahy niala teo aminareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy izy ireo: Efa hitanay marimarina fa momba anao Jehovah, ka dia hoy izahay: Aoka samy hanao fianianana isika, dia izahay sy hianao, ary aoka izahay hanao fanekena aminao, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'fa tsy hanisy ratsy anay hianao, tahaka ny tsy nanendrenay anao akory, sy tahaka ny tsy nanaovanay na inona na inona taminao afa-tsy ny soa ihany, fa efa nampandehaninay soa aman-tsara hianao. Fa hianao ankehitriny efa notahin’i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mivahinia eto amin’ity tany ity, hianao, dia homba anao sy hitahy anao Aho; fa hianao sy ny taranakao no homeko ireto tany rehetra ireto, ka hotoviko ny fianianana izay nataoko tamin’i Abrahama rainao; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia nanao fanasana ho azy Isaka, ka dia nihinana sy nisotro izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia nifoha maraina koa izy, ka samy nanao fianianana; dia nampandehanin’Isaka ireo, ka dia lasa nody soa aman-tsara izy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary tamin’izany andro izany dia avy ny mpanompon’Isaka ka nanambara taminy ny amin’ny lavaka fantsakana izay efa nohadiny ka nanao taminy hoe: Efa nahita rano izahay. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia nanao ny anarany hoe Sheba izy; izany no nanaovana ny anaran’ny tanàna hoe Beri-sheba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxi.31.
      marker-yv: yv-n
    - type: text
      text: ' mandraka andro-any.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampakaran’i Esao vehivavy Kananita ho vadiny.
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'ARY rehefa efa-polo taona Esao, dia nampakatra an’i Jodita, zanakavavin’i Bery Hetita, sy Basemata, zanakavavin’i Elona Hetita, izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dia nangidy tamin’ny fanahin’Isaka sy Rebeka indrindra ireny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: dia hahamaro ny taranakao ho tahaka ny kintana eny amin’ny lanitra Aho, ka homeko ny taranakao ireto tany rehetra ireto, ary amin’ny taranakao no hitahiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxii.18.
      marker-yv: yv-n
    - type: text
      text: ' ny firenena rehetra ambonin’ny tany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: satria efa nihaino ny feoko Abrahama ka nitandrina izay nasaiko notandremany, dia ny didiko sy ny teniko ary ny lalàko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary Isaka dia nitoetra tany Gerara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny lehilahy tompon-tany nanontany ny amin’ny vadiny; ary hoy kosa izy: Anabaviko izy; fa natahotra hilaza hoe: Vadiko izy, fandrao, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy izy
    - type: text
      text: ', hamono ahy ny lehilahy tompon-tany noho Rebeka, satria tsara tarehy izy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary rehefa nitoetra ela teo izy, dia nitsirika teo am-baravarankely Abimeleka, mpanjakan’ny Filistina, ka nahita fa, indro, Isaka nisangy tamin-dRebeka vadiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary Abimeleka dia niantso an’Isaka ka nanao hoe: Efa hita mihitsy fa vadinao izy, ka nahoana no nolazainao hoe: Anabaviko izy? Ary hoy Isaka taminy: Satria hoy izaho anakampo: Fandrao maty aho noho ny aminy. '
