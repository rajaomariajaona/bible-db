      marker-yv: yv-n
    - type: text
      text: ' mpampahory, mpiavonavona, mpandoka tena, mpamoron-tsain-dratsy, tsy manoa ray sy reny, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy manam-pahalalana, tsy mitana fanekena, tsy manam-pitiavana, tsy miantra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia olona mahalala tsara ny fitsipika nomen’Andriamanitra fa izay manao izany zavatra izany no mendrika ho faty, nefa tsy manao izany ihany izy, fa mankasitraka ny manao koa.
  '4':
