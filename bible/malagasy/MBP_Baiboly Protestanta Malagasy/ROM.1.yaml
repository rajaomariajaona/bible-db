      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny fombany tsy hita, dia ny heriny mandrakizay sy ny mah’Andriamanitra Azy, dia miseho hatramin’ny nanaovana izao tontolo izao, fa fantatra amin’ny zavatra nataony; ka dia tsy manan-kalahatra
    - type: usfm
