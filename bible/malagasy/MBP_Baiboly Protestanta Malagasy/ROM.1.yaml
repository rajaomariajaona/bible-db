    children:
    - type: text
      text: Fitarihan-teny.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'PAOLY, mpanompon’i Jesosy Kristy, voantso ho Apostoly, voatokana ho amin’ny filazantsaran’Andriamanitra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia mangataka, fandrao mba hisy hahafahako amin’izao ho tonga any aminareo, raha sitrapon’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maniry hahita anareo aho hanomezako fahasoavam-panahy ho anareo, mba hampaherezina hianareo, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izany dia ny mba hiarahako hamporisihina aminareo amin’ny finoantsika, dia ny anareo sy ny ahy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy tiako tsy ho fantatrareo, ry rahalahy, fa matetika aho no efa nikasa hankatỳ aminareo (saingy azon-tsampona mandraka ankehitriny aho), hananako izay vokatra atỳ aminareo koa, toy ny any amin’ny jentilisa sasany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ananan’ny Grika sy ny firenena hafa rehetra, ny hendry sy ny tsy hendry, trosa aho; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa raha izaho, dia mazoto hitory ny filazantsara aminareo izay any Roma koa aho.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy menatra ny filazantsara aho; fa herin’Andriamanitra ho famonjena izay rehetra mino izany, amin’ny Jiosy aloha, dia vao amin’ny jentilisa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fk
        children:
