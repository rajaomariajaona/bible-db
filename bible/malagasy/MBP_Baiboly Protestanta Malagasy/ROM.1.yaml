        - type: text
          text: mba tsy hanan-kalahatra.
      marker-yv: yv-n
    - type: text
      text: ' ireo; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa na dia nahalala an’Andriamanitra aza izy, dia tsy mba nankalaza '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Azy
    - type: text
      text: ' toy izay mendrika ho an’Andriamanitra, na nisaotra Azy, fa tonga zava-poana izy tamin’ny fisainany, ary tonga maizina ny fony donto. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandoka tena ho hendry izy ka tonga adala, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa ny voninahitr’Andriamanitra tsy mety lo dia nosoloany zavatra tahaka ny endriky ny olona mety lo sy ny vorona sy ny biby manan-tongotra efatra ary ny zavatra mandady sy mikisaka.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no nanoloran’Andriamanitra azy tamin’ny filan’ny fony ho amin’ny fahalotoana, dia ny nifanalany voninahitra tamin’ny tenany avy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fahamarinan’Andriamanitra dia nosoloany lainga, ka nanaja sy nanompo ny zavatra natao izy, fa tsy ny Mpanao, Izay isaorana mandrakizay. Amena.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nanoloran’Andriamanitra azy ho amin’ny filan-dratsy mahavoafady; fa ny vehivavy tao aminy nanova ny fanaony ho amin’izay tsy fanaony; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary tahaka izany koa ny lehilahy, fa namela ny fanao amin’ny vehivavy izy ka maimay tamin’ny fifampilany samy lehilahy nifanao izay mahamenatra, dia nandray tao amin’ny tenany ny valiny izay tokony ho azy noho ny fiviliany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary araka ny nanaovany ny fahalalana marina an’Andriamanitra ho tsy mendrika hotanany, dia araka izany kosa no nanoloran’Andriamanitra azy ho amin’ny fisainana tsy mahamendrika hanao izay zavatra tsy tokony hatao, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia feno ny tsi-fahamarinana rehetra, ny faharatsiana, ny fieremana, ny lolompo,–feno fialonana, vonoan-olona, fifandirana, fitaka, otripo,– '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny amin’ny Zanany, Izay nateraka avy tamin’ny taranak’i Davida araka ny nofo, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mpibitsibitsika, mpanendrikendrika, halan’Andriamanitra,
