        children:
        - type: text
          text: Grika.
      marker-yv: yv-n
    - type: text
      text: ' koa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’izany no anehoana fahamarinana avy amin’Andriamanitra avy amin’ny finoana sy ho amin’ny finoana, araka ny voasoratra hoe: ,,Ny marina amin’ny finoana no ho velona’’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ',,Ny marina ho velon’ny finoana.’’'
      marker-yv: yv-n
    - type: text
      text: ' (Hab. 2.4).'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny faharatsian’ny toetry ny jentilisa sy ny mahameloka azy.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA aseho avy any an-danitra ny fahatezeran’Andriamanitra amin’ny faharatsiana rehetra sy ny tsi-fahamarinan’ny olona izay misakana ny fahamarinana amin’ny fanaovan-dratsy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria izay fantatra ny amin’Andriamanitra dia miseho ao am-pon’ireny, fa nasehon’Andriamanitra taminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay nampilazainy ny mpaminany rahateo teo amin’ny Soratra Masina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
