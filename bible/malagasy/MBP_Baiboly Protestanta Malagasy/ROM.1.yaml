    - type: text
      text: ' araka ny fanahin’ny fahamasinana tamin’ny fitsanganana tamin’ny maty,–dia Jesosy Kristy Tompontsika, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay nandraisanay fahasoavana sy ny mah’Apostoly anay hahatonga fanekena ny finoana ho voninahitry ny anarany any amin’ny jentilisa rehetra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hianareo koa, izay isan’ireny, dia voantso ho an’i Jesosy Kristy,– '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho an’izay rehetra any Roma, malalan’Andriamanitra sady voantso no masina: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voalohany, misaotra an’Andriamanitro amin’ny alalan’i Jesosy Kristy aho noho ny aminareo rehetra, satria efa re eran’izao tontolo izao ny lazan’ny finoanareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra, Izay tompoin’ny fanahiko amin’ny filazantsaran’ny Zanany, no vavolombeloko fa tsy mitsahatra mahatsiaro anareo aho, ka mandrakariva, raha mivavaka aho, '
