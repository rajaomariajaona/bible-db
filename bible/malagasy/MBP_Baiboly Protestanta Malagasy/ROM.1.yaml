document_id: ROM.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny.
  - type: text
    content: 'PAOLY, mpanompon’i Jesosy Kristy, voantso ho Apostoly, voatokana ho amin’ny filazantsaran’Andriamanitra, '
  '10':
  - type: text
    content: 'dia mangataka, fandrao mba hisy hahafahako amin’izao ho tonga any aminareo, raha sitrapon’Andriamanitra. '
  '11':
  - type: text
    content: 'Fa maniry hahita anareo aho hanomezako fahasoavam-panahy ho anareo, mba hampaherezina hianareo, '
  '12':
  - type: text
    content: izany dia ny mba hiarahako hamporisihina aminareo amin’ny finoantsika, dia ny anareo sy ny ahy.
  '13':
  - type: text
    content: 'Ary tsy tiako tsy ho fantatrareo, ry rahalahy, fa matetika aho no efa nikasa hankatỳ aminareo (saingy azon-tsampona mandraka ankehitriny aho), hananako izay vokatra atỳ aminareo koa, toy ny any amin’ny jentilisa sasany. '
  '14':
  - type: text
    content: 'Ananan’ny Grika sy ny firenena hafa rehetra, ny hendry sy ny tsy hendry, trosa aho; '
  '15':
  - type: text
    content: koa raha izaho, dia mazoto hitory ny filazantsara aminareo izay any Roma koa aho.
  '16':
  - type: text
    content: Fa tsy menatra ny filazantsara aho; fa herin’Andriamanitra ho famonjena izay rehetra mino izany, amin’ny Jiosy aloha, dia vao amin’ny jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' koa. '
  '17':
  - type: text
    content: 'Fa amin’izany no anehoana fahamarinana avy amin’Andriamanitra avy amin’ny finoana sy ho amin’ny finoana, araka ny voasoratra hoe: ,,Ny marina amin’ny finoana no ho velona’’'
  - type: note
    content: 'Na: ,,Ny marina ho velon’ny finoana.’’'
  - type: text
    content: ' (Hab. 2.4).'
  - type: heading
    content: Ny amin’ny faharatsian’ny toetry ny jentilisa sy ny mahameloka azy.
  '18':
  - type: text
    content: 'FA aseho avy any an-danitra ny fahatezeran’Andriamanitra amin’ny faharatsiana rehetra sy ny tsi-fahamarinan’ny olona izay misakana ny fahamarinana amin’ny fanaovan-dratsy, '
  '19':
  - type: text
    content: 'satria izay fantatra ny amin’Andriamanitra dia miseho ao am-pon’ireny, fa nasehon’Andriamanitra taminy. '
  '2':
  - type: text
    content: izay nampilazainy ny mpaminany rahateo teo amin’ny Soratra Masina,
  - type: note
    content: Gr. teo amin’izay soratra masina.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Fa ny fombany tsy hita, dia ny heriny mandrakizay sy ny mah’Andriamanitra Azy, dia miseho hatramin’ny nanaovana izao tontolo izao, fa fantatra amin’ny zavatra nataony; ka dia tsy manan-kalahatra
  - type: note
    content: 'Na: mba tsy hanan-kalahatra.'
  - type: text
    content: ' ireo; '
  '21':
  - type: text
    content: 'fa na dia nahalala an’Andriamanitra aza izy, dia tsy mba nankalaza '
  - type: text
    content: Azy
  - type: text
    content: ' toy izay mendrika ho an’Andriamanitra, na nisaotra Azy, fa tonga zava-poana izy tamin’ny fisainany, ary tonga maizina ny fony donto. '
  '22':
  - type: text
    content: 'Nandoka tena ho hendry izy ka tonga adala, '
  '23':
  - type: text
    content: koa ny voninahitr’Andriamanitra tsy mety lo dia nosoloany zavatra tahaka ny endriky ny olona mety lo sy ny vorona sy ny biby manan-tongotra efatra ary ny zavatra mandady sy mikisaka.
  '24':
  - type: text
    content: 'Ary izany no nanoloran’Andriamanitra azy tamin’ny filan’ny fony ho amin’ny fahalotoana, dia ny nifanalany voninahitra tamin’ny tenany avy; '
  '25':
  - type: text
    content: ary ny fahamarinan’Andriamanitra dia nosoloany lainga, ka nanaja sy nanompo ny zavatra natao izy, fa tsy ny Mpanao, Izay isaorana mandrakizay. Amena.
  '26':
  - type: text
    content: 'Izany no nanoloran’Andriamanitra azy ho amin’ny filan-dratsy mahavoafady; fa ny vehivavy tao aminy nanova ny fanaony ho amin’izay tsy fanaony; '
  '27':
  - type: text
    content: ary tahaka izany koa ny lehilahy, fa namela ny fanao amin’ny vehivavy izy ka maimay tamin’ny fifampilany samy lehilahy nifanao izay mahamenatra, dia nandray tao amin’ny tenany ny valiny izay tokony ho azy noho ny fiviliany.
  '28':
  - type: text
    content: 'Ary araka ny nanaovany ny fahalalana marina an’Andriamanitra ho tsy mendrika hotanany, dia araka izany kosa no nanoloran’Andriamanitra azy ho amin’ny fisainana tsy mahamendrika hanao izay zavatra tsy tokony hatao, '
  '29':
  - type: text
    content: 'ka dia feno ny tsi-fahamarinana rehetra, ny faharatsiana, ny fieremana, ny lolompo,–feno fialonana, vonoan-olona, fifandirana, fitaka, otripo,– '
  '3':
  - type: text
    content: 'ny amin’ny Zanany, Izay nateraka avy tamin’ny taranak’i Davida araka ny nofo, '
  '30':
  - type: text
    content: mpibitsibitsika, mpanendrikendrika, halan’Andriamanitra,
  - type: note
    content: 'Na: mpankahala an’Andriamanitra.'
  - type: text
    content: ' mpampahory, mpiavonavona, mpandoka tena, mpamoron-tsain-dratsy, tsy manoa ray sy reny, '
  '31':
  - type: text
    content: 'tsy manam-pahalalana, tsy mitana fanekena, tsy manam-pitiavana, tsy miantra; '
  '32':
  - type: text
    content: dia olona mahalala tsara ny fitsipika nomen’Andriamanitra fa izay manao izany zavatra izany no mendrika ho faty, nefa tsy manao izany ihany izy, fa mankasitraka ny manao koa.
  '4':
  - type: text
    content: ary naseho
  - type: note
    content: 'Na: notendrena.'
  - type: text
    content: ' tamin-kery ho Zanak’Andriamanitra'
  - type: note
    content: 'Na: naseho ho Zanak’Andriamanitra mahery.'
  - type: text
    content: ' araka ny fanahin’ny fahamasinana tamin’ny fitsanganana tamin’ny maty,–dia Jesosy Kristy Tompontsika, '
  '5':
  - type: text
    content: 'Izay nandraisanay fahasoavana sy ny mah’Apostoly anay hahatonga fanekena ny finoana ho voninahitry ny anarany any amin’ny jentilisa rehetra; '
  '6':
  - type: text
    content: 'ary hianareo koa, izay isan’ireny, dia voantso ho an’i Jesosy Kristy,– '
  '7':
  - type: text
    content: 'ho an’izay rehetra any Roma, malalan’Andriamanitra sady voantso no masina: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.'
  '8':
  - type: text
    content: 'Voalohany, misaotra an’Andriamanitro amin’ny alalan’i Jesosy Kristy aho noho ny aminareo rehetra, satria efa re eran’izao tontolo izao ny lazan’ny finoanareo. '
  '9':
  - type: text
    content: 'Fa Andriamanitra, Izay tompoin’ny fanahiko amin’ny filazantsaran’ny Zanany, no vavolombeloko fa tsy mitsahatra mahatsiaro anareo aho, ka mandrakariva, raha mivavaka aho, '
