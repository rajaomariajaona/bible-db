document_id: GEN.38,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanambadian’i Joda, sy ny zanany naterany, ary ny nijangajangany tamin’i Tamara.
  - type: text
    content: 'ARY tamin’izany andro izany Joda dia nidina niala teo amin’ny rahalahiny ka lasa nanatona ny lehilahy Adolamita anankiray, Hira no anarany. '
  '10':
  - type: text
    content: 'Ary ratsy teo imason’i Jehovah izay nataony; ka dia novonoiny koa izy. '
  '11':
  - type: text
    content: 'Ary hoy Joda tamin’i Tamara vinantoni-vavy: Tomoera ho mpitondratena ao an-tranon-drainao mandra-pahalehiben’i Sela zanako-lahy (fa hoy izy: Fandrao maty koa tahaka ny rahalahiny '
  - type: text
    content: izy
  - type: text
    content: ); dia nandeha Tamara ka nitoetra tao an-tranon-drainy.
  '12':
  - type: text
    content: Ary rehefa ela, dia maty ny vadin’i Joda, dia ilay zanakavavin’i Soa; ary rehefa nionona ny alahelon’i Joda, dia niakatra tany amin’ny mpanety ondriny tany Timna izy sy Hira Adolamita sakaizany.
  '13':
  - type: text
    content: 'Dia nisy nanambara tamin’i Tamara hoe: Indro, ny rafozanao miakatra ho any Timna hanety ny ondriny. '
  '14':
  - type: text
    content: 'Ary nanaisotra ny akanjony fanaon’ny mpitondratena izy, dia nisarona fisalobonana ka nisalobona, dia nipetraka teo am-bavahadin’i Enaima, izay eo amin’ny làlana mankany Timna; satria efa hitan’i Tamara fa efa lehibe Sela, nefa tsy mbola nomen’i Joda ho vadin’i Sela izy. '
  '15':
  - type: text
    content: 'Ary hitan’i Joda izy ka nataony fa vehivavy janga, satria efa nanarona ny tavany izy. '
  '16':
  - type: text
    content: 'Dia nivily nanatona azy teo amoron-dàlana Joda ka nanao hoe: Aoka mba handry aminao aho (fa tsy fantany ho vinantony izy); dia hoy kosa ravehivavy: Inona ary no homenao ahy, raha handry amiko hianao? '
  '17':
  - type: text
    content: 'Dia hoy izy: Hampanatitra zanak’osy avy amin’ny ondry aman-osy aho. Fa hoy kosa ravehivavy: Hanome fampitanana va hianao mandra-pampanatitrao azy? '
  '18':
  - type: text
    content: 'Ary hoy izy: Inona no fampitanana homeko anao? Ary hoy ravehivavy: Ny fanombohan-kasenao sy ny kofehinao ary iny tehinao eny an-tànanao iny. Ary nomeny azy ireny, dia nandry taminy izy, ka nanan-anaka taminy ravehivavy. '
  '19':
  - type: text
    content: Ary niainga ravehivavy ka lasa nandeha, dia nanala ny fisalobonana izay notafiny ka niakanjo ny akanjony fanaon’ny mpitondratena indray.
  '2':
  - type: text
    content: 'Ary teo no nahitan’i Joda ny zanakavavin’i Soa, lehilahy Kananita anankiray; dia naka azy izy ka nanambady azy. '
  '20':
  - type: text
    content: 'Dia nampitondrain’i Joda ilay Adolamita sakaizany ny zanak’osy, hangalany ilay fampitanana amin-dravehivavy; kanjo tsy hitany izy. '
  '21':
  - type: text
    content: 'Dia nanontany ny olona teo amin’ny fonenan-dravehivavy izy ka nanao hoe: Aiza moa ilay vehivavy janga'
  - type: note
    content: Ny teny adika hoe ’vehivavy janga’ eto dia sahala amin’ny ao amin’ny Deo. xxiii.18.
  - type: text
    content: ' izay tamoron-dàlana teo Enaima? Fa hoy ny olona: Tsy nisy vehivavy janga teo. '
  '22':
  - type: text
    content: 'Dia niverina tany amin’i Joda izy ka nanao hoe: Tsy nahita azy aho; ary nolazain’ny olona tompon-tany fa tsy nisy vehivavy janga teo. '
  '23':
  - type: text
    content: 'Dia hoy Joda: Aoka ho lasany ho azy, fandrao ho afa-baraka isika; indro, efa nampanateriko ity zanak’osy ity, nefa hianao tsy nahita an-dravehivavy.'
  '24':
  - type: text
    content: 'Ary rehefa afaka tokony ho telo volana, dia nisy nanambara tamin’i Joda hoe: Efa nijangajanga Tamara vinantovavinao; ka indro, efa manananaka tamin’ny fijangajangana izy. Dia hoy Joda: Avoahy izy hodorana. '
  '25':
  - type: text
    content: 'Ary rehefa navoaka izy, dia naniraka tany amin’ny rafozany ka nanao hoe: Ny lehilahy izay tompon’ireto no nananako anaka; ary hoy koa izy: Masìna hianao, fantaro izay tompon’ireto fanombohan-kase sy kofehy ary tehina ireto. '
  '26':
  - type: text
    content: 'Dia nahafantatra ireo Joda ka nanao hoe: Marina noho izaho izy, satria tsy nomeko ho vadin’i Sela zanako. Dia tsy nandry taminy intsony izy.'
  '27':
  - type: text
    content: 'Ary tamin’ny andro niterahany, indro, nisy zaza kambana tao an-kibony. '
  '28':
  - type: text
    content: 'Ary raha niteraka izy, dia niseho ny tànan’ny anankiray, ary naka kofehy mena ny mpampivelona, ka nafehiny tamin’ny tànany, sady hoy izy: Ity no niseho voalohany. '
  '29':
  - type: text
    content: 'Ary rehefa nahemony ny tànany, dia, indro, teraka ny rahalahiny; ary hoy ny mpampivelona: Ahoana no nibosesehanao? dia nataony hoe Fareza'
  - type: note
    content: Fareza = Fibosesehana.
  - type: text
    content: ' no anarany. '
  '3':
  - type: text
    content: 'Dia nanan-anaka ravehivavy ka niteraka zazalahy; ary ny anarany nataony hoe Era. '
  '30':
  - type: text
    content: Ary rehefa afaka izany, dia teraka koa ny rahalahiny, izay nisy ilay kofehy mena tamin’ny tànany; dia nataony hoe Zera
  - type: note
    content: Zera = Fiposahana.
  - type: text
    content: ' no anarany.'
  '4':
  - type: text
    content: 'Dia nanan-anaka indray izy ka niteraka zazalahy; ary ny anarany nataony hoe Onana. '
  '5':
  - type: text
    content: Dia nanan-anaka indray koa izy ka niteraka zazalahy; ary ny anarany nataony hoe Sela; ary Joda nitoetra tany Keziba tamin’ny niterahan’ny vadiny an’i Sela.
  '6':
  - type: text
    content: 'Ary Joda naka vady ho an’i Era lahimatoany, Tamara no anarany. '
  '7':
  - type: text
    content: 'Fa ratsy fanahy teo imason’i Jehovah Era, lahimatoan’i Joda; dia novonoin’i Jehovah izy. '
  '8':
  - type: text
    content: 'Ary hoy Joda tamin’i Onana: Vadio ny vadin’ny rahalahinao, ka ento loloha izy, dia velomy maso ny rahalahinao. '
  '9':
  - type: text
    content: 'Ary fantatr’i Onana fa tsy ho azy tsinona ny zaza; koa raha nandry tamin’ny vadin’ny rahalahiny izy, dia nandraraka tamin’ny tany mba tsy hiterahany zanaka ho an’ny rahalahiny. '
