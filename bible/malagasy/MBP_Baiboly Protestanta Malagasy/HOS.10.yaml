document_id: HOS.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaloboka misandrahaka Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamoa ho azy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny habetsahan’ny voany no nanaovany alitara betsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny hatsaran’ny taniny no nanaovany tsangam-baton-tsampy tsara tarehy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny sitrako no hamaizako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovorina hamely azy ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny hamatorana azy noho ny helony roa loha.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Efraima dia tahaka ny ombivavy kely efa voafolaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka faly hively vary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hasiako zioga
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hihoarako.
      marker-yv: yv-n
    - type: text
      text: ' ny vozony tsara tarehy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampandehaniko Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joda hiasa tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jakoba handravona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamafaza ho anareo araka ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijinjà araka ny fitiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hevoy ny tombam-borakareo;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miasà tany vaovao ho anareo.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao no andro hitadiavana an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pihaviny sy handatsahany fahamarinana aminareo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hampianarany anareo ny fahamarinana.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niasa faharatsiana hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka fahadisoana no nojinjanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihinana ny vokatry ny lainga hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nitoky tamin’ny alehanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alehanao, maherinao, hianao, olonao, tanànanao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny habetsahan’ny lehilahy maherinareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alehanao, maherinao, hianao, olonao, tanànanao.
      marker-yv: yv-n
    - type: text
      text: ' hianareo.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alehanao, maherinao, hianao, olonao, tanànanao.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hisy tabataba hamelezana ny olonareo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alehanao, maherinao, hianao, olonao, tanànanao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka horavana ny tanànanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: alehanao, maherinao, hianao, olonao, tanànanao.
      marker-yv: yv-n
    - type: text
      text: ' mimanda rehetra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nandravan’i Salamana an’i Bet-arbela tamin’ny andro niadiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka torotoro avokoa ny reniny mbamin’ny zanany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany no hataon’i Betela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toy izany no hatao aminareo, ry Betela.
      marker-yv: yv-n
    - type: text
      text: ' aminareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny haben’ny faharatsianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha maraina ny andro, dia ho levona mihitsy ny mpanjakan’ny Isiraely.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamitaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Malambolambo.
      marker-yv: yv-n
    - type: text
      text: ' ny fony, koa dia hovaliana izy izao noho ny helony;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no hanimba ny alitarany sy handrava ny tsangam-baton-tsampiny
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’izany dia hiteny izy hoe: Tsy mana-mpanjaka isika;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy natahorantsika Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hahavita inona ho antsika moa izay mpanjaka?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niteniteny foana izy tamin’ny nianianany tsy to sy ny nanaovany fanekena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nitrebona toy ny zava-mangidy eny am-bavasa eny an-tsaha ny rariny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina any Samaria matahotra noho ny amin’ny ombivavy kely ao Betavena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny olony mitomany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpisorony mangovitra noho ny aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noho ny amin’ny voninahiny, fa lasan-ko babo izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iny koa ho entina any Asyria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fanomezana ho an’i Jareba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v.13.
      marker-yv: yv-n
    - type: text
      text: ' mpanjaka;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho afa-baraka Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hangaihay Isiraely noho ny saina nataony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho rava Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanjakany dia ho tonga toy ny sombin-javatra eny ambonin’ny rano.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho rava koa ny fitoerana avo ao Avena, izay anotan’Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho rakotry ny tsilo sy ny ahitra ratsy ny alitarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izy hanao amin’ny tendrombohitra hoe: Saròny izahay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’ny havoana hoe: Mianjerà aminay.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny andro fony tany Gibea no efa nanotanao, ry Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nikikitra tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana.
