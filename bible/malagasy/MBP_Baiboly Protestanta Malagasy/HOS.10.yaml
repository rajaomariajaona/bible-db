document_id: HOS.10,873
type_code: plt
verses:
  '1':
  - type: text
    content: Voaloboka misandrahaka Isiraely,
  - type: text
    content: Mamoa ho azy izy;
  - type: text
    content: Araka ny habetsahan’ny voany no nanaovany alitara betsaka,
  - type: text
    content: Araka ny hatsaran’ny taniny no nanaovany tsangam-baton-tsampy tsara tarehy.
  '10':
  - type: text
    content: Araka ny sitrako no hamaizako azy;
  - type: text
    content: Ary hovorina hamely azy ny firenena,
  - type: text
    content: Amin’ny hamatorana azy noho ny helony roa loha.
  '11':
  - type: text
    content: Ary Efraima dia tahaka ny ombivavy kely efa voafolaka
  - type: text
    content: Ka faly hively vary;
  - type: text
    content: Ary hasiako zioga
  - type: note
    content: Heb. hihoarako.
  - type: text
    content: ' ny vozony tsara tarehy;'
  - type: text
    content: Hampandehaniko Efraima;
  - type: text
    content: Joda hiasa tany,
  - type: text
    content: Ary Jakoba handravona.
  '12':
  - type: text
    content: Mamafaza ho anareo araka ny fahamarinana,
  - type: text
    content: Mijinjà araka ny fitiavana,
  - type: text
    content: Hevoy ny tombam-borakareo;
  - type: note
    content: 'Na: Miasà tany vaovao ho anareo.'
  - type: text
    content: Fa izao no andro hitadiavana an’i Jehovah
  - type: text
    content: Ambara-pihaviny sy handatsahany fahamarinana aminareo.
  - type: note
    content: 'Na: hampianarany anareo ny fahamarinana.'
  '13':
  - type: text
    content: Niasa faharatsiana hianareo,
  - type: text
    content: Ka fahadisoana no nojinjanareo;
  - type: text
    content: Nihinana ny vokatry ny lainga hianareo
  - type: text
    content: Fa nitoky tamin’ny alehanareo
  - type: note
    content: Heb. alehanao, maherinao, hianao, olonao, tanànanao.
  - type: text
    content: Sy ny habetsahan’ny lehilahy maherinareo
  - type: note
    content: Heb. alehanao, maherinao, hianao, olonao, tanànanao.
  - type: text
    content: ' hianareo.'
  - type: note
    content: Heb. alehanao, maherinao, hianao, olonao, tanànanao.
  '14':
  - type: text
    content: Dia hisy tabataba hamelezana ny olonareo,
  - type: note
    content: Heb. alehanao, maherinao, hianao, olonao, tanànanao.
  - type: text
    content: Ka horavana ny tanànanareo
  - type: note
    content: Heb. alehanao, maherinao, hianao, olonao, tanànanao.
  - type: text
    content: ' mimanda rehetra,'
  - type: text
    content: Toy ny nandravan’i Salamana an’i Bet-arbela tamin’ny andro niadiana,
  - type: text
    content: Ka torotoro avokoa ny reniny mbamin’ny zanany.
  '15':
  - type: text
    content: Toy izany no hataon’i Betela
  - type: note
    content: 'Na: Toy izany no hatao aminareo, ry Betela.'
  - type: text
    content: ' aminareo,'
  - type: text
    content: Noho ny haben’ny faharatsianareo;
  - type: text
    content: Raha maraina ny andro, dia ho levona mihitsy ny mpanjakan’ny Isiraely.
  '2':
  - type: text
    content: Mamitaka
  - type: note
    content: Heb. Malambolambo.
  - type: text
    content: ' ny fony, koa dia hovaliana izy izao noho ny helony;'
  - type: text
    content: Jehovah no hanimba ny alitarany sy handrava ny tsangam-baton-tsampiny
  '3':
  - type: text
    content: 'Amin’izany dia hiteny izy hoe: Tsy mana-mpanjaka isika;'
  - type: text
    content: Fa tsy natahorantsika Jehovah,
  - type: text
    content: Koa hahavita inona ho antsika moa izay mpanjaka?
  '4':
  - type: text
    content: Niteniteny foana izy tamin’ny nianianany tsy to sy ny nanaovany fanekena;
  - type: text
    content: Ka nitrebona toy ny zava-mangidy eny am-bavasa eny an-tsaha ny rariny.
  '5':
  - type: text
    content: Ny mponina any Samaria matahotra noho ny amin’ny ombivavy kely ao Betavena;
  - type: text
    content: Fa ny olony mitomany azy,
  - type: text
    content: Ary ny mpisorony mangovitra noho ny aminy,
  - type: text
    content: Dia noho ny amin’ny voninahiny, fa lasan-ko babo izany.
  '6':
  - type: text
    content: Iny koa ho entina any Asyria
  - type: text
    content: Ho fanomezana ho an’i Jareba
  - type: note
    content: Izahao v.13.
  - type: text
    content: ' mpanjaka;'
  - type: text
    content: Ho afa-baraka Efraima,
  - type: text
    content: Eny, hangaihay Isiraely noho ny saina nataony.
  '7':
  - type: text
    content: Ho rava Samaria,
  - type: text
    content: Ny mpanjakany dia ho tonga toy ny sombin-javatra eny ambonin’ny rano.
  '8':
  - type: text
    content: Ary ho rava koa ny fitoerana avo ao Avena, izay anotan’Isiraely;
  - type: text
    content: Ho rakotry ny tsilo sy ny ahitra ratsy ny alitarany;
  - type: text
    content: 'Ary izy hanao amin’ny tendrombohitra hoe: Saròny izahay,'
  - type: text
    content: 'Ary amin’ny havoana hoe: Mianjerà aminay.'
  '9':
  - type: text
    content: Hatramin’ny andro fony tany Gibea no efa nanotanao, ry Isiraely;
  - type: text
    content: Nikikitra tany izy;
  - type: text
    content: Tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana.
