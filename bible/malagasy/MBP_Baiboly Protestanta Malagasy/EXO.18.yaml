document_id: EXO.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namangian’i Jero an’i Mosesy, sy ny hevitra natorony azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY efa ren’i Jetro, mpisorona tao Midiana, rafozan’i Mosesy, izay rehetra nataon’Andriamanitra ho an’i Mosesy sy ny Isiraely olony, dia ny nitondran’i Jehovah ny Isiraely nivoaka avy tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nentin’i Jetro, rafozan’i Mosesy, Zipora, vadin’i Mosesy, rehefa nampivereniny izy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary ny zanany mirahalahy: Gersoma no anaran’ny anankiray, fa hoy izy: Efa vahiny atỳ amin’ny tanin’ny firenena hafa aho; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Eliezera kosa no anaran’ny anankiray, fa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'hoy izy:'
  - type: text
    text: ' Andriamanitry ny razako no namonjy ahy ka nahafaka ahy tsy ho voan’ny sabatr’i Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga Jetro, rafozan’i Mosesy, nitondra ny vady aman-janak’i Mosesy hankany aminy tany an-efitra, izay nitobiany teo anilan’ny tendrombohitr’Andriamanitra: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia nampilaza tamin’i Mosesy izy ka nanao hoe: Izaho Jetro rafozanao avy hamangy anao, ary ny vadinao mbamin’ny zanany roa lahy koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Mosesy nivoaka hitsena ny rafozany, dia niankohoka sady nanoroka azy; ary nifampiarahaba izy mianaka, dia niditra tao an-day. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nambaran’i Mosesy tamin’ny rafozany izay rehetra efa nataon’i Jehovah tamin’i Farao sy tamin’ny Egyptiana noho ny amin’ny Isiraely, mbamin’ny fahoriana rehetra nanjo azy teny an-dàlana, sy ny namonjen’i Jehovah azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia faly Jetro noho ny soa rehetra izay efa nataon’i Jehovah tamin’ny Isiraely, izay novonjeny ho afaka tamin’ny tànan’ny Egyptiana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Jetro: Isaorana anie Jehovah, Izay namonjy anareo ho afaka tamin’ny tànan’ny Egyptiana sy tamin’ny tànan’i Farao, dia Izay namonjy ny olona tsy hotapahin’ny Egyptiana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ankehitriny dia fantatro fa lehibe Jehovah mihoatra noho ny andriamanitra rehetra, dia tamin’izay zavatra nentin’ny Egyptiana nirehareha tamin’ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Jetro, rafozan’i Mosesy, nitondra fanatitra odorana sy fanatitra hafa alatsa-dra ho an’Andriamanitra; dia nankao Arona sy ny loholon’ny Isiraely rehetra hiara-mihinan-kanina amin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony maraina dia nipetraka hitsara ny olona Mosesy; ka dia nijanona teo anatrehan’i Mosesy ny olona hatramin’ny maraina ka hatramin’ny hariva. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa hitan’ny rafozan’i Mosesy izay rehetra nataony tamin’ny olona, dia hoy izy: Inona izao zavatra ataonao amin’ny olona izao? Nahoana no hianao irery ihany no mipetraka, fa ny olona rehetra kosa mitsangana eo anatrehanao hatramin’ny maraina ka hatramin’ny hariva? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Mosesy tamin’ny rafozany: Satria mankatỳ amiko ny olona hanontany amin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha misy manana ady izy, dia mankatỳ amiko, ka mitsara azy roa tonta aho, dia mampahalala azy ny didin’Andriamanitra sy ny lalàny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy ny rafozan’i Mosesy taminy; Tsy tsara izao zavatra ataonao izao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samy ho reraka mihitsy, na hianao na izao olona miaraka aminao izao; fa mavesatra aminao loatra izao zavatra izao, ka tsy ho zakanao irery ny hanao izao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ankehitriny, dia maneke ny teniko, fa hanoro hevitra anao aho, ka Andriamanitra anie homba anao: Aoka hianao ho alalan’ny olona amin’Andriamanitra mba hitondranao ny teniny amin’Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary hampianatra azy ny didy sy ny lalàna izay mety halehany sy ny asa izay mety hataony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary mizahà eo amin’ny olona rehetra izay lehilahy mahay sy matahotra an’Andriamanitra, dia lehilahy marina izay tsy tia kolikoly; ka manendre mpifehy arivo sy mpifehy zato sy mpifehy dimam-polo ary mpifehy folo hifehy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary aoka ireo no hitsara ny olona mandrakariva, ka ny ady lehibe rehetra no aoka ho entiny aminao, fa ny ady madinidinika rehetra kosa dia aoka hotsarainy ihany; dia ho maivamaivana kokoa aminao izany, ka dia hiara-mitondra aminao ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha hanao araka izany zavatra izany hianao, ka hilaza izay didy aminao Andriamanitra, dia haharitra hianao, ary izao olona rehetra izao koa dia ho tonga soa aman-tsara any amin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia neken’i Mosesy ny tenin’ny rafozany, ka nataony avokoa izay rehetra efa nolazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nofidin’i Mosesy izay lehilahy mahay tamin’ny Isiraely rehetra ka nataony lohan’ny olona hanapaka azy, dia ho mpifehy arivo sy ho mpifehy zato sy ho mpifehy dimam-polo ary ho mpifehy folo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nitsara ny olona mandrakariva ireo; koa ny ady sarotra ihany no nentiny tao amin’i Mosesy, fa ny ady madinika rehetra kosa dia notsarainy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Mosesy namoaka ny rafozany; ka dia lasa nody any amin’ny taniny izy.
