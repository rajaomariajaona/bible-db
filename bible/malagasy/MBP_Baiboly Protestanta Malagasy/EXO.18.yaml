document_id: EXO.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’i Jero an’i Mosesy, sy ny hevitra natorony azy.
  - type: text
    content: 'ARY efa ren’i Jetro, mpisorona tao Midiana, rafozan’i Mosesy, izay rehetra nataon’Andriamanitra ho an’i Mosesy sy ny Isiraely olony, dia ny nitondran’i Jehovah ny Isiraely nivoaka avy tany Egypta. '
  '10':
  - type: text
    content: 'Ary hoy Jetro: Isaorana anie Jehovah, Izay namonjy anareo ho afaka tamin’ny tànan’ny Egyptiana sy tamin’ny tànan’i Farao, dia Izay namonjy ny olona tsy hotapahin’ny Egyptiana. '
  '11':
  - type: text
    content: Ankehitriny dia fantatro fa lehibe Jehovah mihoatra noho ny andriamanitra rehetra, dia tamin’izay zavatra nentin’ny Egyptiana nirehareha tamin’ireny.
  '12':
  - type: text
    content: Ary Jetro, rafozan’i Mosesy, nitondra fanatitra odorana sy fanatitra hafa alatsa-dra ho an’Andriamanitra; dia nankao Arona sy ny loholon’ny Isiraely rehetra hiara-mihinan-kanina amin’ny rafozan’i Mosesy teo anatrehan’Andriamanitra.
  '13':
  - type: text
    content: 'Ary nony maraina dia nipetraka hitsara ny olona Mosesy; ka dia nijanona teo anatrehan’i Mosesy ny olona hatramin’ny maraina ka hatramin’ny hariva. '
  '14':
  - type: text
    content: 'Ary rehefa hitan’ny rafozan’i Mosesy izay rehetra nataony tamin’ny olona, dia hoy izy: Inona izao zavatra ataonao amin’ny olona izao? Nahoana no hianao irery ihany no mipetraka, fa ny olona rehetra kosa mitsangana eo anatrehanao hatramin’ny maraina ka hatramin’ny hariva? '
  '15':
  - type: text
    content: 'Ary hoy Mosesy tamin’ny rafozany: Satria mankatỳ amiko ny olona hanontany amin’Andriamanitra. '
  '16':
  - type: text
    content: Raha misy manana ady izy, dia mankatỳ amiko, ka mitsara azy roa tonta aho, dia mampahalala azy ny didin’Andriamanitra sy ny lalàny.
  '17':
  - type: text
    content: 'Ary hoy ny rafozan’i Mosesy taminy; Tsy tsara izao zavatra ataonao izao. '
  '18':
  - type: text
    content: 'Samy ho reraka mihitsy, na hianao na izao olona miaraka aminao izao; fa mavesatra aminao loatra izao zavatra izao, ka tsy ho zakanao irery ny hanao izao. '
  '19':
  - type: text
    content: 'Ary ankehitriny, dia maneke ny teniko, fa hanoro hevitra anao aho, ka Andriamanitra anie homba anao: Aoka hianao ho alalan’ny olona amin’Andriamanitra mba hitondranao ny teniny amin’Andriamanitra; '
  '2':
  - type: text
    content: 'Dia nentin’i Jetro, rafozan’i Mosesy, Zipora, vadin’i Mosesy, rehefa nampivereniny izy, '
  '20':
  - type: text
    content: 'ary hampianatra azy ny didy sy ny lalàna izay mety halehany sy ny asa izay mety hataony. '
  '21':
  - type: text
    content: 'Ary mizahà eo amin’ny olona rehetra izay lehilahy mahay sy matahotra an’Andriamanitra, dia lehilahy marina izay tsy tia kolikoly; ka manendre mpifehy arivo sy mpifehy zato sy mpifehy dimam-polo ary mpifehy folo hifehy azy. '
  '22':
  - type: text
    content: 'Ary aoka ireo no hitsara ny olona mandrakariva, ka ny ady lehibe rehetra no aoka ho entiny aminao, fa ny ady madinidinika rehetra kosa dia aoka hotsarainy ihany; dia ho maivamaivana kokoa aminao izany, ka dia hiara-mitondra aminao ireo. '
  '23':
  - type: text
    content: Raha hanao araka izany zavatra izany hianao, ka hilaza izay didy aminao Andriamanitra, dia haharitra hianao, ary izao olona rehetra izao koa dia ho tonga soa aman-tsara any amin’ny taniny.
  '24':
  - type: text
    content: 'Dia neken’i Mosesy ny tenin’ny rafozany, ka nataony avokoa izay rehetra efa nolazainy. '
  '25':
  - type: text
    content: 'Dia nofidin’i Mosesy izay lehilahy mahay tamin’ny Isiraely rehetra ka nataony lohan’ny olona hanapaka azy, dia ho mpifehy arivo sy ho mpifehy zato sy ho mpifehy dimam-polo ary ho mpifehy folo. '
  '26':
  - type: text
    content: Dia nitsara ny olona mandrakariva ireo; koa ny ady sarotra ihany no nentiny tao amin’i Mosesy, fa ny ady madinika rehetra kosa dia notsarainy ihany.
  '27':
  - type: text
    content: Ary Mosesy namoaka ny rafozany; ka dia lasa nody any amin’ny taniny izy.
  '3':
  - type: text
    content: 'ary ny zanany mirahalahy: Gersoma no anaran’ny anankiray, fa hoy izy: Efa vahiny atỳ amin’ny tanin’ny firenena hafa aho; '
  '4':
  - type: text
    content: 'ary Eliezera kosa no anaran’ny anankiray, fa '
  - type: text
    content: 'hoy izy:'
  - type: text
    content: ' Andriamanitry ny razako no namonjy ahy ka nahafaka ahy tsy ho voan’ny sabatr’i Farao. '
  '5':
  - type: text
    content: 'Dia tonga Jetro, rafozan’i Mosesy, nitondra ny vady aman-janak’i Mosesy hankany aminy tany an-efitra, izay nitobiany teo anilan’ny tendrombohitr’Andriamanitra: '
  '6':
  - type: text
    content: 'dia nampilaza tamin’i Mosesy izy ka nanao hoe: Izaho Jetro rafozanao avy hamangy anao, ary ny vadinao mbamin’ny zanany roa lahy koa.'
  '7':
  - type: text
    content: 'Ary Mosesy nivoaka hitsena ny rafozany, dia niankohoka sady nanoroka azy; ary nifampiarahaba izy mianaka, dia niditra tao an-day. '
  '8':
  - type: text
    content: Ary nambaran’i Mosesy tamin’ny rafozany izay rehetra efa nataon’i Jehovah tamin’i Farao sy tamin’ny Egyptiana noho ny amin’ny Isiraely, mbamin’ny fahoriana rehetra nanjo azy teny an-dàlana, sy ny namonjen’i Jehovah azy.
  '9':
  - type: text
    content: 'Dia faly Jetro noho ny soa rehetra izay efa nataon’i Jehovah tamin’ny Isiraely, izay novonjeny ho afaka tamin’ny tànan’ny Egyptiana. '
