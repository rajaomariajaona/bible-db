document_id: SNG.4
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Endrey, tsara tarehy hianao, ry tompokovavy havako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endrey, tsara tarehy hianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masonao dia voromailala eo amin’ny fisalobonanao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: volonao milantolanto.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volonao dia tahaka ny osy andiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandriandry eny an-kilan’ny tendrombohitr’i Gileada.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny nifinao dia tahaka ny ondrivavy andiany efa voahety,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay miakatra avy eo amin’ny fampandroana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy kambana avy ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy tsy mana-namana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tahaka ny kofehy jaky ny molotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahafinaritra ny vavanao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitenenanao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny hasin’ampongabendanitra ny takolakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny fisalobonanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: volonao milantolanto.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny vozonao dia tahaka ny tilikambon’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Natao ho trano fihantonam-piadiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampinga arivo no voahantona eo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny ampinga rehetra an’ny lehilahy mahery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny nononao roa dia toy ny diera kambana mbola tanora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay homana eny amin’ny lilia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandositra by aloka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handeha aho ho any amin’ny tendrombohitry ny miora
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny havoan’ny ditin-kazo mani-pofona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsara avokoa izato bikanao izato, ry tompokovavy havako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy kilema hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiaraka amiko avy any Libanona hianao, ry ampakariko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hiaraka amiko avy any Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitazana eny an-tampon’i Amana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny an-tampon’i Senira sy Hermona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny an-davaky ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny an-tendrombohitry ny leoparda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa lasanao ny foko, ry havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anabaviko.
    marker-yv: yv-n
  - type: text
    text: ' ampakariko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa lasanao ny foko tamin’ny masonao an-ila
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tamin’ny rojo anankiray amin’ny vozonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Akory ny hatsaran’ny fitiavanao, ry havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anabaviko.
    marker-yv: yv-n
  - type: text
    text: ' ampakariko!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Akory ny hatsaran’ny fitiavanao! eny, tsara noho ny divay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofon’ny menaka manitrao dia mihoatra noho ny zava-manitra rehetra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mitete tantely toy ny avy amin’ny tohotra ny molotrao, ry ampakariko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tantely sy ronono no ao ambanin’ny lelanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofon’ny fitafianao dia tahaka ny fofon’i Libanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Saha voahidy ny havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anabaviko.
    marker-yv: yv-n
  - type: text
    text: ' ampakariko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loharano voahidy, fantsakan-drano voaisy tombo-kase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hianao no saha anirian’ny ampongabendanitra tsara voa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady misy kofera sy narda,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eny, narda sy safrona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veromanitra sy havozomanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny hazo misy ny ditin-kazo mani-pofona rehetra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miora sy hazo manitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahalota.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny zava-manitra tsara rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Loharano ao an-tanimboly hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loharano miboiboika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary renirano kely avy any Libanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsofa eny an-tsahako hielezan’ny fofony manitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny malalako hankatỳ an-tanimboliny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hihinana ny voankazony tsara.
