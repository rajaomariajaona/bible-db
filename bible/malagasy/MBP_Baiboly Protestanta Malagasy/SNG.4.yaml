document_id: SNG.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Endrey, tsara tarehy hianao, ry tompokovavy havako!
  - type: text
    content: Endrey, tsara tarehy hianao!
  - type: text
    content: Ny masonao dia voromailala eo amin’ny fisalobonanao;
  - type: note
    content: 'Na: volonao milantolanto.'
  - type: text
    content: Ny volonao dia tahaka ny osy andiany,
  - type: text
    content: Izay mandriandry eny an-kilan’ny tendrombohitr’i Gileada.
  '10':
  - type: text
    content: Akory ny hatsaran’ny fitiavanao, ry havako
  - type: note
    content: Heb. anabaviko.
  - type: text
    content: ' ampakariko!'
  - type: text
    content: Akory ny hatsaran’ny fitiavanao! eny, tsara noho ny divay!
  - type: text
    content: Ary ny fofon’ny menaka manitrao dia mihoatra noho ny zava-manitra rehetra!
  '11':
  - type: text
    content: Mitete tantely toy ny avy amin’ny tohotra ny molotrao, ry ampakariko;
  - type: text
    content: Tantely sy ronono no ao ambanin’ny lelanao,
  - type: text
    content: Ary ny fofon’ny fitafianao dia tahaka ny fofon’i Libanona.
  '12':
  - type: text
    content: Saha voahidy ny havako
  - type: note
    content: Heb. anabaviko.
  - type: text
    content: ' ampakariko,'
  - type: text
    content: Loharano voahidy, fantsakan-drano voaisy tombo-kase.
  '13':
  - type: text
    content: Hianao no saha anirian’ny ampongabendanitra tsara voa,
  - type: text
    content: Sady misy kofera sy narda,
  '14':
  - type: text
    content: Eny, narda sy safrona,
  - type: text
    content: Veromanitra sy havozomanitra
  - type: text
    content: Sy ny hazo misy ny ditin-kazo mani-pofona rehetra.
  - type: text
    content: Miora sy hazo manitra
  - type: note
    content: Heb. ahalota.
  - type: text
    content: Mbamin’ny zava-manitra tsara rehetra;
  '15':
  - type: text
    content: Loharano ao an-tanimboly hianao,
  - type: text
    content: Loharano miboiboika,
  - type: text
    content: Ary renirano kely avy any Libanona.
  '16':
  - type: text
    content: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo,
  - type: text
    content: Mitsofa eny an-tsahako hielezan’ny fofony manitra.
  - type: text
    content: Aoka ny malalako hankatỳ an-tanimboliny
  - type: text
    content: Ka hihinana ny voankazony tsara.
  '2':
  - type: text
    content: Ny nifinao dia tahaka ny ondrivavy andiany efa voahety,
  - type: text
    content: Izay miakatra avy eo amin’ny fampandroana;
  - type: text
    content: Samy kambana avy ireo,
  - type: text
    content: Fa tsy misy tsy mana-namana.
  '3':
  - type: text
    content: Tahaka ny kofehy jaky ny molotrao,
  - type: text
    content: Ary mahafinaritra ny vavanao;
  - type: note
    content: Heb. fitenenanao.
  - type: text
    content: Tahaka ny hasin’ampongabendanitra ny takolakao
  - type: text
    content: Eo amin’ny fisalobonanao
  - type: note
    content: 'Na: volonao milantolanto.'
  - type: text
    content: ','
  '4':
  - type: text
    content: Ny vozonao dia tahaka ny tilikambon’i Davida,
  - type: text
    content: Natao ho trano fihantonam-piadiana;
  - type: text
    content: Ampinga arivo no voahantona eo,
  - type: text
    content: Dia ny ampinga rehetra an’ny lehilahy mahery.
  '5':
  - type: text
    content: Ny nononao roa dia toy ny diera kambana mbola tanora,
  - type: text
    content: Izay homana eny amin’ny lilia.
  '6':
  - type: text
    content: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro,
  - type: note
    content: Heb. mandositra by aloka.
  - type: text
    content: Dia handeha aho ho any amin’ny tendrombohitry ny miora
  - type: text
    content: Sy ny havoan’ny ditin-kazo mani-pofona.
  '7':
  - type: text
    content: Tsara avokoa izato bikanao izato, ry tompokovavy havako;
  - type: text
    content: Tsy misy kilema hianao.
  '8':
  - type: text
    content: Hiaraka amiko avy any Libanona hianao, ry ampakariko,
  - type: text
    content: Eny, hiaraka amiko avy any Libanona,
  - type: text
    content: Hitazana eny an-tampon’i Amana,
  - type: text
    content: Eny an-tampon’i Senira sy Hermona,
  - type: text
    content: Eny an-davaky ny liona,
  - type: text
    content: Eny an-tendrombohitry ny leoparda.
  '9':
  - type: text
    content: Efa lasanao ny foko, ry havako
  - type: note
    content: Heb. anabaviko.
  - type: text
    content: ' ampakariko,'
  - type: text
    content: Efa lasanao ny foko tamin’ny masonao an-ila
  - type: text
    content: Sy tamin’ny rojo anankiray amin’ny vozonao.
