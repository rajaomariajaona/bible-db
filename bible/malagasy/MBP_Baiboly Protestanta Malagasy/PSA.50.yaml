document_id: PSA.50,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fivavahana marina sy ny fanatitra sitrak’Andriamanitra.
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA Andriananahary, dia Jehovah, no miteny
  - type: text
    content: Ka miantso ny tany hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany.
  '10':
  - type: text
    content: fa Ahy ny biby rehetra any an-ala,
  - type: text
    content: Sy ny biby fiompy arivoarivo eny an-tendrombohitra.
  '11':
  - type: text
    content: Fantatro ny vorona rehetra eny an-tendrombohitra;
  - type: text
    content: Ary eto amiko ny zava-mihetsiketsika eny an-tsaha.
  '12':
  - type: text
    content: Raha mba noana Aho, dia tsy hilaza aminao;
  - type: text
    content: Fa Ahy izao tontolo izao sy izay rehetra eo aminy.
  '13':
  - type: text
    content: Hihinana ny nofon’ombilahy va Aho.
  - type: text
    content: Na hisotro ny ran osilahy?
  '14':
  - type: text
    content: Manatera fanati-pisaorana ho an’Andriamanitra;
  - type: text
    content: Ary efao amin’ny Avo Indrindra ny voadinao;
  '15':
  - type: text
    content: Antsoy Aho amin’ny andro fahoriana;
  - type: text
    content: Dia hamonjy anao Aho, ka hanome voninahitra Ahy hianao.
  '16':
  - type: text
    content: Fa amin’ny ratsy fanahy kosa dia hoy Andriamanitra;
  - type: text
    content: Ahoanao no itorianao ny lalàko
  - type: text
    content: Sy itondranao ny fanekeko eo am-bavanao?
  '17':
  - type: text
    content: Fa hianao mankahala fananarana,
  - type: text
    content: Ary arianao eo ivohonao ny teniko.
  '18':
  - type: text
    content: Raha mahita mpangalatra hianao, dia faly hikambana aminy,
  - type: text
    content: Ary miray anjara amin’ny mpijangajanga.
  '19':
  - type: text
    content: Ny vavanao alefanao hiteny ratsy,
  - type: text
    content: Ary ny lelanao mamorom-pitaka.
  '2':
  - type: text
    content: Avy ao Ziona, izay tena fahatsaran-tarehy, no amirapiratan’Andriamanitra.
  '20':
  - type: text
    content: Mipetraka miteny ratsy ny rahalahinao hianao
  - type: text
    content: Sady manendrikendrika
  - type: note
    content: 'Na: manosika.'
  - type: text
    content: ' ny zanakalahin-dreninao.'
  '21':
  - type: text
    content: Izany no nataonao, nefa nangina ihany Aho,
  - type: text
    content: Ka dia nataonao fa mitovy aminao ihany Aho!
  - type: text
    content: Hananatra anao Aho ka handahatra izany eo imasonao.
  '22':
  - type: text
    content: Mihevera izany ankehitriny, hianareo izay manadino an’Andriamanitra,
  - type: text
    content: Fandrao hamiravira Aho, ka tsy hisy hamonjy.
  '23':
  - type: text
    content: Izay manatitra fanati-pisaorana no manome voninahitra Ahy;
  - type: text
    content: Ary izay mitandrina ny làlany no hanehoako ny famonjen’Andriamanitra.
  '3':
  - type: text
    content: Avy Andriamanitsika ka tsy hangina;
  - type: text
    content: Afo no mandevona eo alohany,
  - type: text
    content: Ary tafio-drivotra mahery no manodidina Azy.
  '4':
  - type: text
    content: Miantso ny lanitra any ambony Izy,
  - type: text
    content: 'Sy ny tany koa, mba hitsarany ny olony:'
  '5':
  - type: text
    content: Angony etỳ amiko ny oloko masina
  - type: text
    content: Izay manao fanekena amiko amin’ny fanatitra.
  '6':
  - type: text
    content: Hasehon’ny lanitra ny fahamarinany;
  - type: text
    content: Fa Andriamanitra no Mpitsara.
  - type: text
    content: '[Sela.]'
  '7':
  - type: text
    content: Mihainoa, ry oloko, fa hiteny Aho;
  - type: text
    content: Ry Isiraely ô, fa hanambara aminao Aho;
  - type: text
    content: Izaho no Andriamanitra, dia Andriamanitrao.
  '8':
  - type: text
    content: Tsy ny fanatitrao no ananarako anao,
  - type: text
    content: Ary efa eo anatrehako mandrakariva ny fanatitra doranao.
  '9':
  - type: text
    content: Tsy maka vantotr’ombilahy amin’ny tranonao Aho,
  - type: text
    content: Na osilahy amin’ny valanao;
