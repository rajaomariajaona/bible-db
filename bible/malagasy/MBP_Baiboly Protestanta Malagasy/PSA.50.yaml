document_id: PSA.50
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fivavahana marina sy ny fanatitra sitrak’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA Andriananahary, dia Jehovah, no miteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miantso ny tany hatramin’ny fiposahan’ny masoandro ka hatramin’ny filentehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avy ao Ziona, izay tena fahatsaran-tarehy, no amirapiratan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Avy Andriamanitsika ka tsy hangina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afo no mandevona eo alohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tafio-drivotra mahery no manodidina Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miantso ny lanitra any ambony Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy ny tany koa, mba hitsarany ny olony:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Angony etỳ amiko ny oloko masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao fanekena amiko amin’ny fanatitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hasehon’ny lanitra ny fahamarinany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Andriamanitra no Mpitsara.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihainoa, ry oloko, fa hiteny Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Isiraely ô, fa hanambara aminao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no Andriamanitra, dia Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy ny fanatitrao no ananarako anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa eo anatrehako mandrakariva ny fanatitra doranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy maka vantotr’ombilahy amin’ny tranonao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na osilahy amin’ny valanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa Ahy ny biby rehetra any an-ala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny biby fiompy arivoarivo eny an-tendrombohitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fantatro ny vorona rehetra eny an-tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eto amiko ny zava-mihetsiketsika eny an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha mba noana Aho, dia tsy hilaza aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Ahy izao tontolo izao sy izay rehetra eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hihinana ny nofon’ombilahy va Aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hisotro ny ran osilahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manatera fanati-pisaorana ho an’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efao amin’ny Avo Indrindra ny voadinao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Antsoy Aho amin’ny andro fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hamonjy anao Aho, ka hanome voninahitra Ahy hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa amin’ny ratsy fanahy kosa dia hoy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoanao no itorianao ny lalàko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy itondranao ny fanekeko eo am-bavanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa hianao mankahala fananarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary arianao eo ivohonao ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha mahita mpangalatra hianao, dia faly hikambana aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miray anjara amin’ny mpijangajanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny vavanao alefanao hiteny ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelanao mamorom-pitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mipetraka miteny ratsy ny rahalahinao hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manendrikendrika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manosika.
    marker-yv: yv-n
  - type: text
    text: ' ny zanakalahin-dreninao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany no nataonao, nefa nangina ihany Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nataonao fa mitovy aminao ihany Aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hananatra anao Aho ka handahatra izany eo imasonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mihevera izany ankehitriny, hianareo izay manadino an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao hamiravira Aho, ka tsy hisy hamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay manatitra fanati-pisaorana no manome voninahitra Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mitandrina ny làlany no hanehoako ny famonjen’Andriamanitra.
