document_id: PSA.93,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiandrianan’Andriamanitra.
  - type: text
    content: JEHOVAH no Mpanjaka, mitafy voninahitra Izy;
  - type: text
    content: Jehovah mitafy,–eny, misikina hery Izy;
  - type: text
    content: Ary izao rehetra izao nampitoerina ka tsy hihetsika.
  '2':
  - type: text
    content: Ny seza fiandriananao nampitoerina hatramin’ny fahagola;
  - type: text
    content: Hatrizay hatrizay Hianao.
  '3':
  - type: text
    content: Manandra-peo ny riaka, Jehovah ô,
  - type: text
    content: Eny, manandra-peo ny riaka;
  - type: text
    content: Mampirohondrohona ny feony ny riaka.
  '4':
  - type: text
    content: Mihoatra noho ny rano sady be no mahery,
  - type: text
    content: Eny, mihoatra noho ny onjan-dranomasina lehibe,
  - type: text
    content: Ny voninahitr’i Jehovah any amin’ny avo.
  '5':
  - type: text
    content: Ny teni-vavolombelonao dia marina indrindra;
  - type: text
    content: Fahamasinana no mendrika ny tranonao mandritra ny andro maro, Jehovah ô.
