document_id: PSA.93
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fiandrianan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: JEHOVAH no Mpanjaka, mitafy voninahitra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah mitafy,–eny, misikina hery Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izao rehetra izao nampitoerina ka tsy hihetsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny seza fiandriananao nampitoerina hatramin’ny fahagola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatrizay hatrizay Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manandra-peo ny riaka, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manandra-peo ny riaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampirohondrohona ny feony ny riaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihoatra noho ny rano sady be no mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mihoatra noho ny onjan-dranomasina lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny voninahitr’i Jehovah any amin’ny avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny teni-vavolombelonao dia marina indrindra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahamasinana no mendrika ny tranonao mandritra ny andro maro, Jehovah ô.
