document_id: DAN.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izaho Nebokadnezara niadana tao an-tranoko ary faly finaritra
  - type: note
    content: Ar. maitso.
  - type: text
    content: ' tao an-dapako. '
  '10':
  - type: text
    content: 'Nijery tamin’ny fahitan’ny lohako teo am-pandriako aho, ka, indro, nisy mpiambina masina anankiray nidina avy tany an-danitra. '
  '11':
  - type: text
    content: 'Niantso mafy izy ka nanao hoe: Kapao io hazo io, dia rantsano; ahintsano ny raviny, ary aelezo ny voany; aoka ny biby hipariaka avy eo ambaniny, ary ny vorona hiboridana avy eny amin’ny rantsany. '
  '12':
  - type: text
    content: 'Nefa avelao amin’ny tany ao amin’ny ahitra maitso any an-tsaha ihany ny fotony, ka asio fehy vy sy varahina; ary aoka ho kotsan’ny andon’ny lanitra izy, ary aoka ny anjarany ho amin’ny biby any amin’ny ahitra amin’ny tany; '
  '13':
  - type: text
    content: 'aoka hovana ny fony tsy ho fon’olombelona, ary aoka ho fom-biby no ho ao aminy; ary aoka ho fetr’andro fito no holanina aminy. '
  '14':
  - type: text
    content: 'Didin’ny mpiambina izany zavatra izany; eny, avy amin’ny tendrin’ireo masina izany zavatra izany, hahafantaran’ny velona fa ny Avo Indrindra no manapaka amin’ny fanjakan’ny olona ka manome izany ho an’izay tiany, ary olona ambany toetra no ampanapahiny azy. '
  '15':
  - type: text
    content: Izany no nofy izay hitako, izaho Nebokadnezara. Ary hianao kosa, ry Beltesazara, milazà ny heviny, fa ny olon-kendry rehetra amin’ny fanjakako tsy nisy nahay nampahafantatra ahy ny hevitr’izany; fa hianao no mahay azy, satria misy fanahin’ireo andriamanitra masina no anatinao.
  '16':
  - type: text
    content: 'Dia gaga vetivety Daniela, izay atao hoe Beltesazara, ary ny eritreriny naharaiki-tahotra azy. Ary niteny ny mpanjaka nanao hoe: Ry Beltesazara ô, aoka tsy haharaiki-tahotra anao ny nofy na ny heviny. Beltesazara namaly ka nanao hoe: Tompokolahy ô, ny nofy anie ho an’izay mankahala anao, ary ny heviny ho an’izay fahavalonao. '
  '17':
  - type: text
    content: 'Io hazo hitanao io, dia ilay nihalehibe sy nihahery, ka ny hahavony nipaka tamin’ny lanitra, ary ny fijery azy hatramin’ny tany rehetra, '
  '18':
  - type: text
    content: 'ny raviny dia tsara tarehy, sady betsaka ny voany, ary teo aminy nisy hanina ho an’ny rehetra, teny ambaniny no nitoeran’ny bibi-dia, ary teny amin’ny rantsany no nitoeran’ny voro-manidina,– '
  '19':
  - type: text
    content: 'hianao indrindra izany, ry mpanjaka ô; hianao dia nihalehibe sy nihahery; fa ny halehibiazanao efa nitombo ka mipaka amin’ny lanitra, ary ny fanapahanao hatramin’ny faran’ny tany. '
  '2':
  - type: text
    content: 'Nanonofy zavatra nahatahotra aho ka nieritreritra teo am-pandriako, ary ny fahitan’ny lohako dia naharaiki-tahotra ahy. '
  '20':
  - type: text
    content: 'Ary ny nahitan’ny mpanjaka ny mpiambina masina anankiray nidina avy tany an-danitra nanao hoe: Kapao io hazo io, ary simbao; nefa avelao amin’ny tany ao amin’ny ahitra maitso any an-tsaha ihany ny fotony, fa asio fehy vy sy varahina, ary aoka ho kotsan’ny andon’ny lanitra izy, ary aoka ny anjarany ho ao amin’ny bibi-dia, ambara-pahalanin’ny fetr’andro fito aminy,– '
  '21':
  - type: text
    content: 'izao no heviny, ry mpanjaka, ary izao no tendrin’ny Avo Indrindra, izay mihatra amin’itompokolahy mpanjaka: '
  '22':
  - type: text
    content: 'Horoahina hiala amin’ny olona hianao, ary ny fonenanao ho any amin’ny bibi-dia’ ary hampihinanina ahitra toy ny omby hianao ary ho kotsan’ny andon’ny lanitra, ary fetr’andro fito no holanina aminao, ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin’ny fanjakan’ny olona ka manome izany ho an’izay tiany. '
  '23':
  - type: text
    content: 'Ary ny nasainy namelana ny fotony: ny fanjakanao mbola hampodina ho anao tokoa, rehefa fantatrao fa ny lanitra no manapaka.'
  '24':
  - type: text
    content: Koa aoka hankasitrahanao ny anatro ry mpanjaka, ka dia ny fahamarinana no ento mampitsahatra
  - type: note
    content: Ar. anapaho.
  - type: text
    content: ' ny fahotanao, ary ny fiantrana ny mahantra no ento mampitsahatra'
  - type: note
    content: Ar. anapaho.
  - type: text
    content: ' ny helokao, fandrao mba hampaharetina ahay ny fiadananao.'
  '25':
  - type: text
    content: 'Izany rehetra izany no nanjo an’i Nebokadnezara mpanjaka. '
  '26':
  - type: text
    content: 'Ary nony afaka roa ambin’ny folo volana, dia nitsangantsangana teo an-tampon’ny tranony tao Babylona izy. '
  '27':
  - type: text
    content: 'Ary ny mpanjaka niteny ka nanao hoe: Tsy ity va no Babylona lehibe, izay nataoko ho lapan’ny fanjakana tamin’ny haben’ny heriko mba ho voninahitry ny fahalehibiazako?'
  '28':
  - type: text
    content: 'Raha mbola teo am-bavan’ny mpanjaka ihany ny teny, dia nisy feo latsaka avy tany an-danitra nanao hoe: Ry Nebokadnezara mpanjaka, hianao indrindra no anaovana hoe: Ny fanjakana niala taminao. '
  '29':
  - type: text
    content: Fa horoahina hiala amin’ny olona hianao, ka ho any amin’ny bibi-dia ny fonenanao; hampihinanina ahitra toy ny omby hianao, ary fetr’andro fito no holanina aminao ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin’ny fanjakan’ny olona ka manome izany ho an’izay tiany.
  '3':
  - type: text
    content: 'Ka dia nandidy aho mba ho entina eo anatrehako ny olon-kendrin’i Babylona rehetra hilaza amiko ny hevitry ny nofy. '
  '30':
  - type: text
    content: Tamin’izay indrindra no nahatanterahan’izany tamin’i Nebokadnezara; fa noroahina niala tamin’ny olona izy ka nihinana ahitra toy ny omby, ary ny tenany dia kotsan’ny andon’ny lanitra ambara-panirin’ny volony ho toy ny an’ny voromahery, ary ny hohony ho toy ny an’ny vorona.
  '31':
  - type: text
    content: 'Ary rehefa tapitra ny andro, izaho Nebokadnezara nanandrandra ny masoko tamin’ny lanitra, ary nody tamiko indray ny saiko, ka dia nisaotra ny Avo Indrindra aho ary nidera sy nankalaza Izay velona mandrakizay,–ny fanapahany dia fanapahana mandrakizay, ary ny fanjakany hahatratra ny taranaka fara mandimby; '
  '32':
  - type: text
    content: 'ary ny mponina rehetra etỳ an-tany hatao tsinontsinona; ary manao izay sitrapony amin’ireo maro be any an-danitra sy amin’ny mponina etỳ an-tany Izy; ary tsy misy mahasakana Azy, na manao aminy hoe: Inona no ataonao?'
  '33':
  - type: text
    content: Tamin’izay dia nody tamiko ny saiko, ary nody tamiko koa ny fahalehibiazako sy ny voninahitro ho tabihan’ny fanjakako, ary ny mpanolotsaiko sy ny andriandahiko nikatsaka ahy, ka nampitoerina teo amin’ny fanjakako aho, sady nanampy ho ahy ny fahalehibiazana malaza.
  '34':
  - type: text
    content: Koa amin’izany, izaho Nebokadnezara midera sy manandratra ary mankalaza ny Mpanjakan’ny lanitra; marina avokoa ny asany rehetra, ary araka ny rariny ny làlany; ary izay mandeha amin’ny fiavonavonana dia hainy aetry.
  '4':
  - type: text
    content: 'Dia niditra ny ombiasy sy ny mpisikidy sy ny Kaldeana ary ny mpanandro; ary nambarako teo anatrehany ny nofy, kanjo tsy nahalaza ny heviny tamiko ireny. '
  '5':
  - type: text
    content: 'Fa nony farany dia niditra teo anatrehako kosa Daniela, izay atao hoe Beltesazara, araka ny anaran’andriamanitro, sady misy fanahin’ireo andriamanitra masina ao anatiny; ary ny nofy dia nambarako teo anatrehany hoe: '
  '6':
  - type: text
    content: 'Ry Beltesazara, lehiben’ny ombiasy, fantatro fa misy fanahin’ireo andriamanitra masina ao anatinao, ary tsy misy zava-miafina manahirana anao, koa ambarao ahy ny fahitana izay hitako tamin’ny nofy mbamin’ny heviny. '
  '7':
  - type: text
    content: 'Fa izao no fahitan’ny lohako teo am-pandriako: Nijery aho, ka, indro, nisy hazo teo afovoan’ny tany, ary fatratra ny hahavony. '
  '8':
  - type: text
    content: 'Nihalehibe sy nihahery io hazo io, ary ny hahavony nipaka tamin’ny lanitra, ary ny fijery azy dia hatrany amin’ny faran’ny tany rehetra. '
  '9':
  - type: text
    content: Tsara tarehy ny raviny, ary betsaka ny voany, sady teo aminy no nisy hanina ho an’ny rehetra; teny ambaniny no nialokalofan’ny bibi-dia, ary teny amin’ny sampany no nitoeran’ny voro-manidina, ary ny nofo rehetra nahazo hanina avy aminy.
