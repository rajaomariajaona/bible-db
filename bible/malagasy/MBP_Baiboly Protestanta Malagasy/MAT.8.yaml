document_id: MAT.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ilay boka.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 1.40-45; Lio. 5.12-16.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY raha nidina avy teo an-tendrombohitra Izy, dia nisy vahoaka betsaka nanaraka Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary, indro, nisy boka anankiray nanatona dia niankohoka teo anatrehany ka nanao hoe: Tompoko ô, raha mety Hianao, dia mahay manadio ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy naninjitra ny tànany, dia nanendry azy ka nanao hoe: Mety Aho; madiova hianao. Dia nadio tamin’ny habokany niaraka tamin’izay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Jesosy taminy: Tandremo mba tsy hilaza amin’olona na dia iray akory aza hianao; fa mandehana, misehoa amin’ny mpisorona, ka mitondrà ny fanatitra izay nandidian’i Mosesy ho vavolombelona amin’ireo.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny mpanompon’ilay kapiteny.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 7.1-10.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ARY nony tonga tao Kapernaomy Jesosy, dia nisy kapiteny anankiray nankao aminy ka nitaraina taminy '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'nanao hoe: Tompoko ô, ny ankizilahiko mandry ao an-trano, mararin’ny paralysisa ka mijaly loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Jesosy taminy: Ho avy Aho hahasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa namaly ilay kapiteny ka nanao hoe: Tompoko, tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho; fa mitenena ihany, dia ho sitrana ny ankizilahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izaho koa mba lehilahy manan-dehibe ihany ka manana miaramila izay feheziko; ary raha hoy izaho amin’ny anankiray: Mandehana, dia mandeha izy; ary amin’ny anankiray koa: Avia, dia avy izy; ary amin’ny andevolahiko: Ataovy izao, dia manao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony nahare izany Jesosy, dia gaga ka niteny tamin’izay nanaraka Azy hoe: Lazaiko aminareo marina tokoa fa tsy mbola nahita finoana lehibe toy izany Aho na dia tamin’ny Isiraely aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary lazaiko aminareo fa maro ny avy any atsinanana sy any andrefana no ho tonga ka hipetraka hiara-mihinana amin’i Abrahama sy Isaka ary Jakoba any amin’ny fanjakan’ny lanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa ny zanaky ny fanjakana dia hariana any amin’ny maizina any ivelany; any no hisy ny fitomaniana sy ny fikitroha-nify.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Jesosy niteny tamin’ilay kapiteny hoe: Mandehana; tongava aminao araka ny ninoanao. Dia sitrana tamin’izany ora izany ilay ankizilahy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny rafozambavin’i Petera mbamin’ny olona maro koa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 1.29-34; Lio. 4.38-41.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ARY Jesosy, nony niditra tao an-tranon’i Petera, dia nahita ny rafozambavin’i Petera nandry teo nanavin’ny tazo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nanendry ny tànany Izy, dia niala taminy ny tazo; dia nitsangana ravehivavy ka nanompo Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony hariva ny andro, dia nentin’ny olona tany aminy ny demoniaka maro; ary ny teniny ihany no namoahany ny fanahy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ratsy,
  - type: text
    text: ' ary izay narary rehetra dia nositraniny avokoa, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mba, hahatanteraka izay nampilazaina an’Isaia mpaminany hoe: ,,Izy naka ny rofintsika sy nitondra ny aretintsika’’ (Isa. 53.4).'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny nataon’i Jesosy tamin’ny lehilahy roa izay nikasa hanaraka Azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 9.57-62.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ARY Jesosy, nony nahita ny vahoaka betsaka manodidina Azy, dia nanome teny hiala ho eny am-pita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nanatona ny mpanora-dalàna anankiray ka nanao taminy hoe: Mpampianatra ô, hanaraka Anao aho na aiza na aiza no halehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ny amboahaolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: volpa.
    marker-yv: yv-n
  - type: text
    text: ' manan-davaka; ary ny voro-manidina manana fialofana; fa ny Zanak’olona tsy mba manana izay hipetrahan’ny lohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nisy hafa koa tamin’ny mpianatra niteny taminy hoe: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy Jesosy taminy: Manaraha Ahy; ary aoka ny maty handevina ny maty ao aminy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampitsaharan’i Jesosy ny tafio-drivotra.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 4.35-41; Lio. 8.22-25.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ARY nony niondrana an-tsambokely Izy, dia nanaraka Azy ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary, indro, nisy tafio-drivotra mafy tonga tamin’ny ranomasina, ka dia efa nila ho voasafotry ny alon-drano ny sambokely; fa Izy natory. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nanatona izy ireo, dia namoha Azy ka nanao hoe: Tompoko, vonjeo, fa maty izahay! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Izy taminy: Nahoana no saro-tahotra hianareo, ry kely finoana? Dia nitsangana Izy, ka noteneniny mafy ny rivotra sy ny ranomasina, dia tonga tony tsara ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary talanjona ny olona ka nanao hoe: Lehilahy manao ahoana re Io, fa ny rivotra sy ny ranomasina aza dia manaiky Azy!'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namoahan’i Jesosy demonia maro tamin’izy roa lahy teo amin’ny tanin’ny Gadarena.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 5.1-20; Lio. 8.26-39.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ARY nony tonga teny am-pita teo amin’ny tanin’ny Gadarena Izy, dia nifanena taminy ny demoniaka roa lahy, nivoaka avy teny amin’ny fasana, sady masiaka loatra, ka tsy nisy olona nahazo nandalo tamin’izany làlana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary, indro, niantso izy ka nanao hoe: Moa mifaninona akory izahay sy Hianao, ry Zanak’Andriamanitra ô? Tonga etỳ va Hianao hampijaly anay alohan’ny fotoana?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nisy kisoa maro andiany iray nihinana teny lavidavitra azy teny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny demonia nifona tamin’i Jesosy ka nanao hoe: Raha avoakanao ary izahay, dia iraho hankany anatin’ireo kisoa andiany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy Izy taminy: Mandehana. Dia nivoaka ireo, ka lasa nankany anatin’ny kisoa; ary, indreny, ny kisoa andiany rehetra nitratrevatreva teny amin’ny hantsana ho any amin’ny ranomasina, ka dia maty tany anatin’ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny mpiandry nandositra, dia nankany an-tanàna ka nilaza ny zavatra rehetra ny amin’ireo demoniaka. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary, indreo, nivoaka ny tao an-tanàna rehetra mba hitsena an’i Jesosy; ka nony nahita Azy izy, dia nifona taminy mba hiala amin’ny fari-taniny.
