document_id: PSA.112
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HALELOIA.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra ny olona izay matahotra an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mankasitraka ny didiny indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hahery ambonin’ny tany ny zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotahina ny taranaky ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fananana sy harena no ao an-tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinany haharitra mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ao amin’ny maizina no iposahan’ny mazava ho an’ny mahitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamindra fo sy miantra ary marina ireny.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '112.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra ny olona izay miantra ka mampisambotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba ho resy eo am-pitsarana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy hangozohozo mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotsarovana mandrakizay ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mba manahinahy hahare loza izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafatoetra matoky an’i Jehovah ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voatohana ny fony, ka tsy hatahotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pifaliny mahita ny amin’ny mpandrafy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Namafy izy, eny, nanome ho an’ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahamarinany maharitra mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisandratra amim-boninahitra ny tandrony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ratsy fanahy hahita ka ho sosotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihidy vazana izy ka ho levona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho foana ny fanirian’ny ratsy fanahy.
