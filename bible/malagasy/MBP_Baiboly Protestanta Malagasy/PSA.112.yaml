document_id: PSA.112,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HALELOIA.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona izay matahotra an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mankasitraka ny didiny indrindra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy fanahy hahita ka ho sosotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihidy vazana izy ka ho levona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho foana ny fanirian’ny ratsy fanahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahery ambonin’ny tany ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahina ny taranaky ny marina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fananana sy harena no ao an-tranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinany haharitra mandrakizay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny maizina no iposahan’ny mazava ho an’ny mahitsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindra fo sy miantra ary marina ireny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '112.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona izay miantra ka mampisambotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba ho resy eo am-pitsarana izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hangozohozo mandrakizay izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotsarovana mandrakizay ny marina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba manahinahy hahare loza izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tafatoetra matoky an’i Jehovah ny fony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voatohana ny fony, ka tsy hatahotra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pifaliny mahita ny amin’ny mpandrafy azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namafy izy, eny, nanome ho an’ny malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinany maharitra mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisandratra amim-boninahitra ny tandrony.
