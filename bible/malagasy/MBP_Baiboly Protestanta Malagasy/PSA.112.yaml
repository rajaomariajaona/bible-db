document_id: PSA.112,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy.
  - type: text
    content: HALELOIA.
  - type: text
    content: Sambatra ny olona izay matahotra an’i Jehovah
  - type: text
    content: Sady mankasitraka ny didiny indrindra.
  '10':
  - type: text
    content: Ny ratsy fanahy hahita ka ho sosotra;
  - type: text
    content: Hihidy vazana izy ka ho levona;
  - type: text
    content: Ho foana ny fanirian’ny ratsy fanahy.
  '2':
  - type: text
    content: Hahery ambonin’ny tany ny zanany;
  - type: text
    content: Hotahina ny taranaky ny marina.
  '3':
  - type: text
    content: Fananana sy harena no ao an-tranony;
  - type: text
    content: Ary ny fahamarinany haharitra mandrakizay.
  '4':
  - type: text
    content: Ao amin’ny maizina no iposahan’ny mazava ho an’ny mahitsy;
  - type: text
    content: Mamindra fo sy miantra ary marina ireny.
  - type: note
    content: 'Na: Izy.'
  '5':
  - type: text
    content: Sambatra ny olona izay miantra ka mampisambotra;
  - type: text
    content: Tsy mba ho resy eo am-pitsarana izy.
  '6':
  - type: text
    content: Fa tsy hangozohozo mandrakizay izy;
  - type: text
    content: Hotsarovana mandrakizay ny marina.
  '7':
  - type: text
    content: Tsy mba manahinahy hahare loza izy;
  - type: text
    content: Tafatoetra matoky an’i Jehovah ny fony.
  '8':
  - type: text
    content: Voatohana ny fony, ka tsy hatahotra izy,
  - type: text
    content: Mandra-pifaliny mahita ny amin’ny mpandrafy azy.
  '9':
  - type: text
    content: Namafy izy, eny, nanome ho an’ny malahelo;
  - type: text
    content: Ny fahamarinany maharitra mandrakizay;
  - type: text
    content: Hisandratra amim-boninahitra ny tandrony.
