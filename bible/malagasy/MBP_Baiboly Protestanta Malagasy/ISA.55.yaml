document_id: ISA.55
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana ny olona rehetra handray ny fahasoavan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HE! hianareo rehetra izay mangetaheta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankanesa amin’ny rano!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianareo izay tsy manam-bola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia, mividia, ka homana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, avia, mividia divay sy ronono,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy amim-bola, na amin-karena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana hianareo no mandany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandania.
    marker-yv: yv-n
  - type: text
    text: ' vola amin’izay tsy hanina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vokatry ny fisasaranareo amin’izay tsy mahavoky?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa dia mihainoa Ahy, ka hano izay tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia aoka hiravoravo amin’ny matavy ny fanahinareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Atongilano ny sofinareo, ka mankanesa atỳ amiko,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa, dia ho velombelona ny fanahinareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao fanekena mandrakizay aminareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny famindrampo mahatoky nampanantenaina an’i Davida.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, nataoko vavolombelona ho an’ny firenena Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho mpanapaka sy komandy amin’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, firenena izay tsy fantatrao no hantsoinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary firenena izay tsy nahalala Anao no hihazakazaka ho aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny amin’i Jehovah Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny Iray Masin’ny Isiraely, fa nomeny voninahitra Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mitadiava an’i Jehovah, dieny mbola hita Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoa Azy, dieny mbola akaiky Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ny ratsy fanahy hahafoy ny làlany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsy marina hahafoy ny heviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hiverina ho amin’i Jehovah ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hamindra fo aminy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho amin’Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hamela heloka dia hamela heloka tokoa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny fihevitro tsy fihevitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny làlanareo kosa tsy mba làlako, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tahaka ny hahavon’ny lanitra noho ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hahavon’ny làlako noho ny làlanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fihevitro noho ny fihevitrareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa toy ny ranonorana sy ny orampanala milatsaka avy any an-danitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy miverina any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy efa nahavonto ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nampaniry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampiteraka.
    marker-yv: yv-n
  - type: text
    text: ' sy nampahavokatra azy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahatonga voa ho an’ny mpamafy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanina ho an’ny mpihinana,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia ho tahaka izany ny teniko izay aloaky ny vavako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiverina amiko foana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy efa mahatanteraka izay sitrako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ambinina amin’izay ampandehanako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa amin’ny fifaliana no hivoahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fiadanana no hitondrana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tendrombohitra sy ny havoana hahavelona hoby eo alohanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hazo rehetra any an-tsaha hiteha-tànana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny hazo kypreso haniry ho solon’ny tsilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: myrta.
    marker-yv: yv-n
  - type: text
    text: ' ho solon’ny sampivato;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho anarana ho an’i Jehovah izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho famantarana mandrakizay izay tsy hesorina.
