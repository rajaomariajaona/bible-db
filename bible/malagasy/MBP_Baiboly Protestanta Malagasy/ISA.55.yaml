document_id: ISA.55,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana ny olona rehetra handray ny fahasoavan’Andriamanitra.
  - type: text
    content: HE! hianareo rehetra izay mangetaheta,
  - type: text
    content: Mankanesa amin’ny rano!
  - type: text
    content: Ary hianareo izay tsy manam-bola,
  - type: text
    content: Avia, mividia, ka homana!
  - type: text
    content: Eny, avia, mividia divay sy ronono,
  - type: text
    content: Nefa tsy amim-bola, na amin-karena.
  '10':
  - type: text
    content: Fa toy ny ranonorana sy ny orampanala milatsaka avy any an-danitra
  - type: text
    content: Ka tsy miverina any,
  - type: text
    content: Raha tsy efa nahavonto ny tany
  - type: text
    content: Ka nampaniry
  - type: note
    content: Heb. nampiteraka.
  - type: text
    content: ' sy nampahavokatra azy,'
  - type: text
    content: Mba hahatonga voa ho an’ny mpamafy
  - type: text
    content: Sy hanina ho an’ny mpihinana,–
  '11':
  - type: text
    content: 'Dia ho tahaka izany ny teniko izay aloaky ny vavako:'
  - type: text
    content: Tsy hiverina amiko foana izy,
  - type: text
    content: Raha tsy efa mahatanteraka izay sitrako
  - type: text
    content: Ary ambinina amin’izay ampandehanako azy.
  '12':
  - type: text
    content: Fa amin’ny fifaliana no hivoahanareo,
  - type: text
    content: Ary amin’ny fiadanana no hitondrana anareo;
  - type: text
    content: Ny tendrombohitra sy ny havoana hahavelona hoby eo alohanareo,
  - type: text
    content: Ary ny hazo rehetra any an-tsaha hiteha-tànana.
  '13':
  - type: text
    content: Ny hazo kypreso haniry ho solon’ny tsilo,
  - type: text
    content: Ary ny rotra
  - type: note
    content: myrta.
  - type: text
    content: ' ho solon’ny sampivato;'
  - type: text
    content: Ary ho anarana ho an’i Jehovah izany,
  - type: text
    content: Dia ho famantarana mandrakizay izay tsy hesorina.
  '2':
  - type: text
    content: Nahoana hianareo no mandany
  - type: note
    content: 'Na: mandania.'
  - type: text
    content: ' vola amin’izay tsy hanina,'
  - type: text
    content: Ary ny vokatry ny fisasaranareo amin’izay tsy mahavoky?
  - type: text
    content: Mihainoa dia mihainoa Ahy, ka hano izay tsara,
  - type: text
    content: Dia aoka hiravoravo amin’ny matavy ny fanahinareo.
  '3':
  - type: text
    content: Atongilano ny sofinareo, ka mankanesa atỳ amiko,–
  - type: text
    content: Mihainoa, dia ho velombelona ny fanahinareo;
  - type: text
    content: Ary hanao fanekena mandrakizay aminareo Aho,
  - type: text
    content: Dia ny famindrampo mahatoky nampanantenaina an’i Davida.
  '4':
  - type: text
    content: Indro, nataoko vavolombelona ho an’ny firenena Izy,
  - type: text
    content: Ho mpanapaka sy komandy amin’ny firenena.
  '5':
  - type: text
    content: Indro, firenena izay tsy fantatrao no hantsoinao,
  - type: text
    content: Ary firenena izay tsy nahalala Anao no hihazakazaka ho aminao
  - type: text
    content: Noho ny amin’i Jehovah Andriamanitrao,
  - type: text
    content: Sy ny Iray Masin’ny Isiraely, fa nomeny voninahitra Hianao.
  '6':
  - type: text
    content: Mitadiava an’i Jehovah, dieny mbola hita Izy,
  - type: text
    content: Miantsoa Azy, dieny mbola akaiky Izy.
  '7':
  - type: text
    content: Aoka ny ratsy fanahy hahafoy ny làlany,
  - type: text
    content: Ary ny tsy marina hahafoy ny heviny;
  - type: text
    content: Ary aoka hiverina ho amin’i Jehovah ireny,
  - type: text
    content: Fa hamindra fo aminy Izy,
  - type: text
    content: Eny, ho amin’Andriamanitsika,
  - type: text
    content: Fa hamela heloka dia hamela heloka tokoa Izy.
  '8':
  - type: text
    content: Fa ny fihevitro tsy fihevitrareo,
  - type: text
    content: Ary ny làlanareo kosa tsy mba làlako, hoy Jehovah.
  '9':
  - type: text
    content: Fa tahaka ny hahavon’ny lanitra noho ny tany
  - type: text
    content: No hahavon’ny làlako noho ny làlanareo
  - type: text
    content: Sy ny fihevitro noho ny fihevitrareo.
