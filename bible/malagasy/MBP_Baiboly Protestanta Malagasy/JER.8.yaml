document_id: JER.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amin’izany andro izany, hoy Jehovah, dia hofongarina avy ao am-pasana ny taolan’ny mpanjakan’ny Joda sy ny taolan’ny lehibeny sy ny taolan’ny mpisorona sy ny taolan’ny mpaminany ary ny taolan’ny mponina any Jerosalema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka haeliny eo anatrehan’ny masoandro sy ny volana ary ny kintana rehetra eny amin’ny lanitra, izay efa tiany sy notompoiny sy efa narahiny sy efa notadiaviny ary efa niankohofany teo anatrehany: tsy hangonina na halevina intsony ireny, fa hatao zezika eny ambonin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny sisa rehetra amin’ity taranaka ratsy ity, izay mbola sisa any amin’ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nikirizan’ny olona tamin’ny fanaovan-dratsy, sy ny hamafin’ny loza hanjo azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ARY koa, lazao aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavo va ny olona ka tsy hiarina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihodina hivily va ny olona ka tsy hitodika hiverina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana ity firenena eto Jerosalema ity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ity firenena Jerosalema ity.
    marker-yv: yv-n
  - type: text
    text: ' no miodina'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny fiodinana tsy mety mitsahatra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mikikitra mafy amin’ny fitaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mety miverina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nihaino Aho, ka nandre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa manao teny tsy marina izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary tsy misy manenina ny amin’ny haratsiany hoe: Endrey izany nataoko izany!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra dia samy mivily mankamin’ny alehany avy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: samy mivily eny am-pandehanany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny soavaly miriotra ho amin’ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia ny vano eny amin’ny lanitra aza dia mahalala ny fotoan’androny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny domohina sy ny sidintsidina ary ny vanobe koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy mitandrina ny fotoana fihaviany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny oloko kosa tsy mba mahalala ny fitsipik’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ahoana no anaovanareo hoe: Hendry izahay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ato aminay ny lalàn’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny fanoratan-daingan’ny mpanoratra mahatonga azy ho lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mahazo henatra ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raiki-tahotra sy voasambotra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny tenin’i Jehovah dia nolaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka inona intsony no fahendrena ananany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary noho izany dia homeko ho an’ny sasany ny vadiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sahany ho an’izay maka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria izy rehetra, na ny kely na ny lehibe, dia samy fatra-pila harena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mpaminany na mpisorona dia samy mamitaka avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa nataotaony foana ny fanasitranany ny faharatran’ny oloko zanakavavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tamin’ny nanaovany hoe: Fiadanana, fiadanana;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo tsy misy fiadanana tsinona!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nomenarina izy noho ny nanaovany fahavetavetana,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy mba menatra akory izy, ary tsy mba valahara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa ho lavo ao amin’izay lavo izy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny andro hamaliana azy dia ho tafintohina izy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hakifako tokoa izy, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mamoa ny voaloboka, ary tsy misy voany ny aviavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malazo ny raviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanendry izay hanafika azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nahoana isika no mbola mipetra-poana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoria hianareo, ka andeha isika hiditra any an-tanàna mimànda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho faty ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah Andriamanitsika efa nanendry antsika ho faty
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanome rano mangidy hosotrointsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nanotantsika tamin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nanantena fiadanana isika, kanjo tsy nahita soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary andro fanasitranana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahafinaretana.
    marker-yv: yv-n
  - type: text
    text: ' fa indro fampitahorana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny fiefonefon’ny soavaly dia re hatrany Dana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihorohoro ny tany rehetra noho ny fanenon’ny soavaliny matanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa avy izy ka mandany ny tany mbamin’izay rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny tanàna sy izay monina ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa indro Aho handefa bibilava hamely anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia menarana izay tsy azon’ody,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanaikitra anareo ireny, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indrisy! enga anie ka hisy fahamiramiranana ho ahy eto amin’ny alaheloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa reraka ny foko ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Injany! misy feo fitarainan’ny oloko zanakavavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hatrany amin’ny tany lavitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa Jehovah tsy ao Ziona va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ao aminy va ny Mpanjakany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no nahatezitra Ahy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny sarin-javatra voasokitra ao aminy sy tamin’ny zava-poana avy amin’ny firenena hafa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lasa ny fararano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapitra ny taom-piotazana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy voavonjy isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Torotoro aho noho ny fahatorotoroan’ny oloko zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misaona aho, ary horohoro no mahazo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa tsy misy balsama va any Gileada?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy misy dokotera va any?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Enga anie ka ho rano ny lohako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho loharanon-dranomaso ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitomaniako andro aman-alina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny voavono amin’ny oloko zanakavavy!
