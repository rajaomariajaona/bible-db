document_id: JER.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Amin’izany andro izany, hoy Jehovah, dia hofongarina avy ao am-pasana ny taolan’ny mpanjakan’ny Joda sy ny taolan’ny lehibeny sy ny taolan’ny mpisorona sy ny taolan’ny mpaminany ary ny taolan’ny mponina any Jerosalema, '
  '10':
  - type: text
    content: Ary noho izany dia homeko ho an’ny sasany ny vadiny,
  - type: text
    content: Ary ny sahany ho an’izay maka azy,
  - type: text
    content: Satria izy rehetra, na ny kely na ny lehibe, dia samy fatra-pila harena,
  - type: text
    content: Na mpaminany na mpisorona dia samy mamitaka avokoa.
  '11':
  - type: text
    content: Fa nataotaony foana ny fanasitranany ny faharatran’ny oloko zanakavavy
  - type: text
    content: 'Tamin’ny nanaovany hoe: Fiadanana, fiadanana;'
  - type: text
    content: Kanjo tsy misy fiadanana tsinona!
  '12':
  - type: text
    content: Nomenarina izy noho ny nanaovany fahavetavetana,–
  - type: text
    content: Nefa tsy mba menatra akory izy, ary tsy mba valahara;
  - type: text
    content: Koa ho lavo ao amin’izay lavo izy,–
  - type: text
    content: Amin’ny andro hamaliana azy dia ho tafintohina izy, hoy Jehovah.
  '13':
  - type: text
    content: Hakifako tokoa izy, hoy Jehovah;
  - type: text
    content: Tsy mamoa ny voaloboka, ary tsy misy voany ny aviavy,
  - type: text
    content: Malazo ny raviny;
  - type: text
    content: Ary nanendry izay hanafika azy Aho.
  '14':
  - type: text
    content: Nahoana isika no mbola mipetra-poana?
  - type: text
    content: Mivoria hianareo, ka andeha isika hiditra any an-tanàna mimànda,
  - type: text
    content: Ka dia ho faty ao;
  - type: text
    content: Fa Jehovah Andriamanitsika efa nanendry antsika ho faty
  - type: text
    content: Ka nanome rano mangidy hosotrointsika
  - type: text
    content: Noho ny nanotantsika tamin’i Jehovah.
  '15':
  - type: text
    content: Nanantena fiadanana isika, kanjo tsy nahita soa;
  - type: text
    content: Ary andro fanasitranana,
  - type: note
    content: 'Na: fahafinaretana.'
  - type: text
    content: ' fa indro fampitahorana.'
  '16':
  - type: text
    content: 'Ny fiefonefon’ny soavaly dia re hatrany Dana:'
  - type: text
    content: Mihorohoro ny tany rehetra noho ny fanenon’ny soavaliny matanjaka;
  - type: text
    content: Fa avy izy ka mandany ny tany mbamin’izay rehetra ao aminy,
  - type: text
    content: Dia ny tanàna sy izay monina ao.
  '17':
  - type: text
    content: Fa indro Aho handefa bibilava hamely anareo,
  - type: text
    content: Dia menarana izay tsy azon’ody,
  - type: text
    content: Ka hanaikitra anareo ireny, hoy Jehovah.
  '18':
  - type: text
    content: Indrisy! enga anie ka hisy fahamiramiranana ho ahy eto amin’ny alaheloko,
  - type: text
    content: Fa reraka ny foko ato anatiko.
  '19':
  - type: text
    content: Injany! misy feo fitarainan’ny oloko zanakavavy
  - type: text
    content: 'Hatrany amin’ny tany lavitra hoe:'
  - type: text
    content: Moa Jehovah tsy ao Ziona va?
  - type: text
    content: Ary tsy ao aminy va ny Mpanjakany?
  - type: text
    content: Nahoana no nahatezitra Ahy ireny
  - type: text
    content: Tamin’ny sarin-javatra voasokitra ao aminy sy tamin’ny zava-poana avy amin’ny firenena hafa?
  '2':
  - type: text
    content: 'ka haeliny eo anatrehan’ny masoandro sy ny volana ary ny kintana rehetra eny amin’ny lanitra, izay efa tiany sy notompoiny sy efa narahiny sy efa notadiaviny ary efa niankohofany teo anatrehany: tsy hangonina na halevina intsony ireny, fa hatao zezika eny ambonin’ny tany. '
  '20':
  - type: text
    content: Lasa ny fararano,
  - type: text
    content: Tapitra ny taom-piotazana,
  - type: text
    content: Nefa tsy voavonjy isika.
  '21':
  - type: text
    content: Torotoro aho noho ny fahatorotoroan’ny oloko zanakavavy;
  - type: text
    content: Misaona aho, ary horohoro no mahazo ahy.
  '22':
  - type: text
    content: Moa tsy misy balsama va any Gileada?
  - type: text
    content: Moa tsy misy dokotera va any?
  - type: text
    content: Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy?
  '23':
  - type: text
    content: Enga anie ka ho rano ny lohako,
  - type: text
    content: Ary ho loharanon-dranomaso ny masoko,
  - type: text
    content: Mba hitomaniako andro aman-alina
  - type: text
    content: Noho ny voavono amin’ny oloko zanakavavy!
  '3':
  - type: text
    content: Ary ny sisa rehetra amin’ity taranaka ratsy ity, izay mbola sisa any amin’ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Jehovah, Tompon’ny maro.
  - type: heading
    content: Ny nikirizan’ny olona tamin’ny fanaovan-dratsy, sy ny hamafin’ny loza hanjo azy.
  '4':
  - type: text
    content: 'ARY koa, lazao aminy hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Ho lavo va ny olona ka tsy hiarina?
  - type: text
    content: Hihodina hivily va ny olona ka tsy hitodika hiverina?
  '5':
  - type: text
    content: Nahoana ity firenena eto Jerosalema ity
  - type: note
    content: Heb. ity firenena Jerosalema ity.
  - type: text
    content: ' no miodina'
  - type: text
    content: Amin’ny fiodinana tsy mety mitsahatra?
  - type: text
    content: Mikikitra mafy amin’ny fitaka izy
  - type: text
    content: Ka tsy mety miverina.
  '6':
  - type: text
    content: Nihaino Aho, ka nandre,
  - type: text
    content: 'Fa manao teny tsy marina izy:'
  - type: text
    content: 'Ary tsy misy manenina ny amin’ny haratsiany hoe: Endrey izany nataoko izany!'
  - type: text
    content: Izy rehetra dia samy mivily mankamin’ny alehany avy
  - type: note
    content: 'Na: samy mivily eny am-pandehanany.'
  - type: text
    content: Tahaka ny soavaly miriotra ho amin’ny ady.
  '7':
  - type: text
    content: Na dia ny vano eny amin’ny lanitra aza dia mahalala ny fotoan’androny,
  - type: text
    content: Ary ny domohina sy ny sidintsidina ary ny vanobe koa
  - type: text
    content: Samy mitandrina ny fotoana fihaviany;
  - type: text
    content: Fa ny oloko kosa tsy mba mahalala ny fitsipik’i Jehovah.
  '8':
  - type: text
    content: 'Ahoana no anaovanareo hoe: Hendry izahay,'
  - type: text
    content: Ary ato aminay ny lalàn’i Jehovah?
  - type: text
    content: Nefa ny fanoratan-daingan’ny mpanoratra mahatonga azy ho lainga.
  '9':
  - type: text
    content: Mahazo henatra ny hendry,
  - type: text
    content: Raiki-tahotra sy voasambotra izy;
  - type: text
    content: Indro, ny tenin’i Jehovah dia nolaviny,
  - type: text
    content: Ka inona intsony no fahendrena ananany?
