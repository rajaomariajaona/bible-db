document_id: JER.42,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nangatahan’ny Jiosy an’i Jeremia haka hevitra amin’i Jehovah, ary ny anatra nataon’i Jeremia tamin’ny Jiosy kosa noho ny tsy nanekeny ny saina avy tamin’i Jehovah.
  - type: text
    content: 'ARY ny mpifehy ny miaramila rehetra sy Johanana, zanak’i Karea, sy Jazania, zanak’i Hosaia, mbamin’ny vahoaka rehetra, na kely na lehibe, dia nanatona '
  '10':
  - type: text
    content: 'Raha mbola honina amin’ity tany ity ihany hianareo, dia haoriko hianareo, fa tsy horavako, ary hamboleko hianareo, fa tsy hongotako; fa manenina Aho ny amin’ny loza namelezako anareo. '
  '11':
  - type: text
    content: 'Aza matahotra ny mpanjakan’i Babylona izay atahoranareo; eny, aza matahotra azy, hoy Jehovah, fa momba anareo Aho hamonjy sy hanafaka anareo amin’ny tànany. '
  '12':
  - type: text
    content: Ary hataoko mahita famindrampo hianareo, dia hamindra fo aminareo izy ka hampody anareo ho any amin’ny taninareo.
  '13':
  - type: text
    content: 'Fa raha hoy kosa hianareo: Tsy honina amin’ity tany ity izahay, ka tsy hihaino ny feon’i Jehovah Andriamanitrareo hianareo, '
  '14':
  - type: text
    content: 'fa manao hoe: Tsia; fa hankany amin’ny tany Egypta izahay, fa any no tsy hahitanay ady, na handrenesanay ny feon’ny anjomara na hahitanay mosary, ka dia any no honenanay, '
  '15':
  - type: text
    content: 'dia mihainoa ny tenin’i Jehovah ankehitriny hianareo izay sisa amin’ny Joda: Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Raha dia mikiry hankany Egypta ihany hianareo ka mandeha hivahiny any, '
  '16':
  - type: text
    content: 'dia hahatratra anareo any amin’ny tany Egypta ny sabatra izay atahoranareo, ary ny mosary izay ahinareo no hanjohy anareo any amin’ny tany Egypta, ary any no hahafaty anareo. '
  '17':
  - type: text
    content: 'Ary ny olona rehetra izay mikiry hankany Egypta hivahiny any dia ho fatin’ny sabatra sy ny mosary ary ny areti-mandringana any; ary tsy hisy sisa ho afa-mandositra ny loza izay hataoko mihatra aminy. '
  '18':
  - type: text
    content: 'Fa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Toy ny nanidinana ny fahatezerako sy ny fahavinirako tamin’ny mponina any Jerosalema, dia toy izany no hanidinana ny fahatezerako aminareo, raha mankany Egypta hianareo; ary ho fianianana sy ho figagana sy ho fanozonana ary ho fandatsa hianareo, sady tsy hahita ity tany ity intsony.'
  '19':
  - type: text
    content: 'Jehovah efa nilaza ny aminareo, ry sisa amin’ny Joda, hoe: Aza mankany Egypta hianareo; aoka ho fantatrareo tokoa fa efa nanariko androany hianareo. '
  '2':
  - type: text
    content: 'ka niteny tamin’i Jeremia mpaminany hoe: Masìna hianao, aoka hoborahina'
  - type: note
    content: Heb. hiankohoka.
  - type: text
    content: ' eto anatrehanao ny fifonanay, ary mba ivavaho amin’i Jehovah Andriamanitrao re izahay, dia ireto sisa rehetra ireto (fa vitsy izahay no sisa, na dia maro aza fahiny, dia araka izao hitan’ny masonao izao), '
  '20':
  - type: text
    content: 'Kanjo efa nivily hianareo ka nahavoa ny ainareo tamin’ny nanirahanareo ahy ho amin’i Jehovah Andriamanitrareo hanao hoe: Mba ivavaho amin’i Jehovah Andriamanitsika re izahay, ary izay rehetra holazain’i Jehovah Andriamanitsika dia ambarao aminay, fa hataonay. '
  '21':
  - type: text
    content: 'Ary efa nambarako taminareo andro-any; nefa tsy nihaino ny feon’i Jehovah Andriamanitrareo hianareo ny amin’izay zavatra nanirahany ahy ho aminareo. '
  '22':
  - type: text
    content: Koa aoka ho fantatrareo marimarina fa ho fatin-tsabatra sy mosary ary areti-mandringana hianareo any amin’ny tany izay tianareo hivahiniana.
  '3':
  - type: text
    content: mba hambaran’i Jehovah Andriamanitrao anay izay làlana mety halehanay sy izay zavatra tokony hataonay.
  '4':
  - type: text
    content: 'Dia hoy Jeremia mpaminany taminy: Efa reko izany; koa, indro, hivavaka amin’i Jehovah Andriamanitrareo ary aho araka ny teninareo; ary ny teny rehetra izay havalin’i Jehovah anareo dia hambarako anareo, fa tsy hisy hafeniko.'
  '5':
  - type: text
    content: 'Dia hoy izy tamin’i Jeremia: Jehovah no aoka ho vavolombelona marina sy mahatoky amintsika, raha tsy manao araka ny teny rehetra izay anirahan’i Jehovah Andriamanitrao anao aminay izahay. '
  '6':
  - type: text
    content: Na ho soa, na ho ratsy, dia hohenoinay ny feon’i Jehovah Andriamanitray, izay nanirahanay anao, mba hahasoa anay, raha mihaino ny feon’i Jehovah Andriamanitray izahay.
  '7':
  - type: text
    content: 'Ary nony afaka hafoloana, dia tonga tamin’i Jeremia ny tenin’i Jehovah. '
  '8':
  - type: text
    content: 'Ary izy niantso an’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay teo aminy mbamin’ny olona rehetra, na kely na lehibe, '
  '9':
  - type: text
    content: 'ka nanao taminy hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely, Izay efa nanirahanareo ahy mba hoborahiko'
  - type: note
    content: Heb. hampiankohoka.
  - type: text
    content: ' eo anatrehany ny fifonanareo:'
