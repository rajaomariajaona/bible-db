document_id: 1KI.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandosiran’i Elia nankany an-efitra, sy ny nisehoan’Andriamanitra taminy tao Horeba, ary ny nanendrena an’i Elisa handimby azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nolazain’i Ahaba tamin’i Jezebela izay rehetra nataon’i Elia, dia ny namonoany ny mpaminany rehetra tamin’ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jezebela naniraka olona tany amin’i Elia hanao hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain’ny anankiray amin’ireny ny ainao raha maraina toy izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha nahita izany izy, dia niainga ka lasa nandeha hamonjy ny ainy, dia nankany Beri-sheba, izay any Joda, ary ny zatovo najanony tao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa izy kosa nandeha làlana indray andro tany an-efitra, ary tonga ka nipetraka teo ambanin’ny anjavidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rotema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: zava-maniry mifanahatahaka amin’ny kifafam-bohitra.
    marker-yv: yv-n
  - type: text
    text: ' anankiray; dia nangataka ho faty izy ka nanao hoe: Aoka izay! alao ny aiko ankehitriny, Jehovah ô, fa tsy tsara noho ny razako aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary raha nandry natory teo ambanin’ny anjavidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rotema; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: zava-maniry mifanahatahaka amin’ny kifafam-bohitra.
    marker-yv: yv-n
  - type: text
    text: ' anankiray izy, indro, nisy anjely nanohina azy ka nanao taminy hoe: Miarena, ka homàna. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nijery izy, ka, indro, teo anilan’ny lohany nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara; ary nihinana sy nisotro izy, dia nandry indray. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary avy fanindroany indray Ilay Anjelin’i Jehovah, dia nanohina azy ka nanao hoe: Mifohaza, ka homàna, fa lavitra loatra ny halehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nifoha izy ka nihinana sy nisotro; ary nandeha tamin’ny tanjaka azony tamin’izany hanina izany efa-polo andro sy efa-polo alina izy ho any Horeba, tendrombohitr’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary niditra tao anatin’ny zohy izy ka nitoetra tao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary, indro, tonga taminy ny tenin’i Jehovah nanao hoe: Manao inona atỳ hianao, ry Elia? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an’i Jehovah, Andriamanitry ny maro; fa ny Zanak’Isiraely nahafoy ny fanekenao; ny alitaranao noravany, ny mpaminaninao novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jehovah: Mivoaha, ka mitsangàna eo ambonin’ny tendrombohitra eo anatrehan’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary, indro, nandalo Jehovah, ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan’i Jehovah; nefa Jehovah tsy tao amin’ny rivotra; ary manarakaraka ny rivotra nisy horohoron-tany; nefa Jehovah tsy tao amin’ny horohoron-tany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary manarakaraka ny horohoron-tany nisy afo; nefa Jehovah tsy tao amin’ny afo; ary manarakaraka ny afo nisy feo nitsoka malemy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary raha ren’i Elia izany, dia nosaronany ny kapôtiny ny tavany, ary nivoaka izy ka nijanona teo am-bava-zohy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary, indro, nisy feo nankao aminy nanao hoe: Manao inona atỳ hianao ry Elia? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fltiavako an’i Jehovah, Andriamanitry ny maro; fa ny Zanak’Isiraely efa nahafoy ny fanekenao; ny alitaranao noravany, ary ny mpaminaninao novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy Jehovah taminy: Mandehana, miverena amin’ny nalehanao ho any amin’ny efitr’i Damaskosy; ary raha mby any hianao, dia hosory Hazaela ho mpanjakan’i Syria; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary Jeho, zanak’i Nimsy, dia hosory ho mpanjakan’ny Isiraely; ary Elisa, zanak’i Safata, avy any Abeal-mehola, dia hosory ho mpaminany handimby anao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izay afa-mandositra ny sabatr’i Hazaela dia hovonoin’i Jeho; ary izay afa-mandositra ny sabatr’i Jeho kosa dia hovonoin’i Elisa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa hamela fito arivo ao amin’ny Isiraely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin’i Bala sy ny vava rehetra izay tsy nanoroka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary niala teo Elia ka nahita an’i Elisa, zanak’i Safata, izay nampiasa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: omby
  - type: text
    text: ' efatra amby roa-polo mikambana tsiroaroa avy, fa izy teo amin’ny roa farany indrindra; ary Elia nandroso nanatona azy, dia nanipy ny kapôtiny hanarona azy '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an’i Elia ary niteny hoe: Masìna hianao, avelao aho aloha hanoroka an’ikaky sy ineny vao manaraka anao. Ary hoy izy taminy: Mandehana miverina, fa naninona anao moa aho? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niverina niala taminy indray izy ka naka ny omby roa mikambana, dia namono azy, ary nandrahoiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: natonony.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny hazo fiasàn’ny omby ny henany ka nomeny ny olona, dia nihinana ireo; ary niainga izy ka nanaraka an’i Elia, dia nanompo azy.'
