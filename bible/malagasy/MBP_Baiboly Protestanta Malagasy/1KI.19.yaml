document_id: 1KI.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandosiran’i Elia nankany an-efitra, sy ny nisehoan’Andriamanitra taminy tao Horeba, ary ny nanendrena an’i Elisa handimby azy.
  - type: text
    content: 'DIA nolazain’i Ahaba tamin’i Jezebela izay rehetra nataon’i Elia, dia ny namonoany ny mpaminany rehetra tamin’ny sabatra. '
  '10':
  - type: text
    content: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an’i Jehovah, Andriamanitry ny maro; fa ny Zanak’Isiraely nahafoy ny fanekenao; ny alitaranao noravany, ny mpaminaninao novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy. '
  '11':
  - type: text
    content: 'Ary hoy Jehovah: Mivoaha, ka mitsangàna eo ambonin’ny tendrombohitra eo anatrehan’i Jehovah.'
  - type: text
    content: 'Ary, indro, nandalo Jehovah, ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan’i Jehovah; nefa Jehovah tsy tao amin’ny rivotra; ary manarakaraka ny rivotra nisy horohoron-tany; nefa Jehovah tsy tao amin’ny horohoron-tany; '
  '12':
  - type: text
    content: 'ary manarakaraka ny horohoron-tany nisy afo; nefa Jehovah tsy tao amin’ny afo; ary manarakaraka ny afo nisy feo nitsoka malemy. '
  '13':
  - type: text
    content: Ary raha ren’i Elia izany, dia nosaronany ny kapôtiny ny tavany, ary nivoaka izy ka nijanona teo am-bava-zohy.
  - type: text
    content: 'Ary, indro, nisy feo nankao aminy nanao hoe: Manao inona atỳ hianao ry Elia? '
  '14':
  - type: text
    content: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fltiavako an’i Jehovah, Andriamanitry ny maro; fa ny Zanak’Isiraely efa nahafoy ny fanekenao; ny alitaranao noravany, ary ny mpaminaninao novonoiny tamin’ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy.'
  '15':
  - type: text
    content: 'Fa hoy Jehovah taminy: Mandehana, miverena amin’ny nalehanao ho any amin’ny efitr’i Damaskosy; ary raha mby any hianao, dia hosory Hazaela ho mpanjakan’i Syria; '
  '16':
  - type: text
    content: 'ary Jeho, zanak’i Nimsy, dia hosory ho mpanjakan’ny Isiraely; ary Elisa, zanak’i Safata, avy any Abeal-mehola, dia hosory ho mpaminany handimby anao. '
  '17':
  - type: text
    content: 'Ary izay afa-mandositra ny sabatr’i Hazaela dia hovonoin’i Jeho; ary izay afa-mandositra ny sabatr’i Jeho kosa dia hovonoin’i Elisa. '
  '18':
  - type: text
    content: Nefa hamela fito arivo ao amin’ny Isiraely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin’i Bala sy ny vava rehetra izay tsy nanoroka azy.
  '19':
  - type: text
    content: 'Ary niala teo Elia ka nahita an’i Elisa, zanak’i Safata, izay nampiasa '
  - type: text
    content: omby
  - type: text
    content: ' efatra amby roa-polo mikambana tsiroaroa avy, fa izy teo amin’ny roa farany indrindra; ary Elia nandroso nanatona azy, dia nanipy ny kapôtiny hanarona azy '
  '2':
  - type: text
    content: 'Ary Jezebela naniraka olona tany amin’i Elia hanao hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain’ny anankiray amin’ireny ny ainao raha maraina toy izao.'
  '20':
  - type: text
    content: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an’i Elia ary niteny hoe: Masìna hianao, avelao aho aloha hanoroka an’ikaky sy ineny vao manaraka anao. Ary hoy izy taminy: Mandehana miverina, fa naninona anao moa aho? '
  '21':
  - type: text
    content: Dia niverina niala taminy indray izy ka naka ny omby roa mikambana, dia namono azy, ary nandrahoiny
  - type: note
    content: 'Na: natonony.'
  - type: text
    content: ' tamin’ny hazo fiasàn’ny omby ny henany ka nomeny ny olona, dia nihinana ireo; ary niainga izy ka nanaraka an’i Elia, dia nanompo azy.'
  '3':
  - type: text
    content: 'Ary raha nahita izany izy, dia niainga ka lasa nandeha hamonjy ny ainy, dia nankany Beri-sheba, izay any Joda, ary ny zatovo najanony tao. '
  '4':
  - type: text
    content: Fa izy kosa nandeha làlana indray andro tany an-efitra, ary tonga ka nipetraka teo ambanin’ny anjavidy
  - type: note
    content: Heb. rotema; zava-maniry mifanahatahaka amin’ny kifafam-bohitra.
  - type: text
    content: ' anankiray; dia nangataka ho faty izy ka nanao hoe: Aoka izay! alao ny aiko ankehitriny, Jehovah ô, fa tsy tsara noho ny razako aho.'
  '5':
  - type: text
    content: Ary raha nandry natory teo ambanin’ny anjavidy
  - type: note
    content: Heb. rotema; zava-maniry mifanahatahaka amin’ny kifafam-bohitra.
  - type: text
    content: ' anankiray izy, indro, nisy anjely nanohina azy ka nanao taminy hoe: Miarena, ka homàna. '
  '6':
  - type: text
    content: 'Dia nijery izy, ka, indro, teo anilan’ny lohany nisy mofo voaendy tamin’ny vato mahamay sy rano iray tavoara; ary nihinana sy nisotro izy, dia nandry indray. '
  '7':
  - type: text
    content: 'Ary avy fanindroany indray Ilay Anjelin’i Jehovah, dia nanohina azy ka nanao hoe: Mifohaza, ka homàna, fa lavitra loatra ny halehanao. '
  '8':
  - type: text
    content: 'Dia nifoha izy ka nihinana sy nisotro; ary nandeha tamin’ny tanjaka azony tamin’izany hanina izany efa-polo andro sy efa-polo alina izy ho any Horeba, tendrombohitr’Andriamanitra. '
  '9':
  - type: text
    content: Ary niditra tao anatin’ny zohy izy ka nitoetra tao.
  - type: text
    content: 'Ary, indro, tonga taminy ny tenin’i Jehovah nanao hoe: Manao inona atỳ hianao, ry Elia? '
