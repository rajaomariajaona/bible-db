document_id: PSA.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toetry ny olona izay mahazo monina ao amin’Andriamanitra.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, iza no hitoetra ao amin’ny tabernakelinao?
  - type: text
    content: Iza no honina ao an-tendrombohitrao masina?
  '2':
  - type: text
    content: Izay mandeha tsy misy tsiny ary manao izay mahitsy,
  - type: text
    content: Sady misaintsaina ny marina ny fony,
  '3':
  - type: text
    content: Tsy manendrikendrika amin’ny lelany,
  - type: text
    content: Sady tsy manisy ratsy ny sakaizany,
  - type: text
    content: Ary tsy manao izay hahafa-baraka ny namany,
  '4':
  - type: text
    content: Tsy manaja ny ratsy fanahy,
  - type: note
    content: 'Heb. Ny lavina. Na: Izay mietry sy maniva tena.'
  - type: text
    content: Fa manome voninahitra ny matahotra an’i Jehovah,
  - type: text
    content: Tsy mivadika amin’ny fianianany, na dia maningotra ny tenany aza,
  '5':
  - type: text
    content: Sady tsy mampihana ny volany,
  - type: text
    content: Na mandray kolikoly hanameloka ny marina,–
  - type: text
    content: Izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
