document_id: PSA.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny toetry ny olona izay mahazo monina ao amin’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, iza no hitoetra ao amin’ny tabernakelinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no honina ao an-tendrombohitrao masina?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandeha tsy misy tsiny ary manao izay mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady misaintsaina ny marina ny fony,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manendrikendrika amin’ny lelany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy manisy ratsy ny sakaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy manao izay hahafa-baraka ny namany,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manaja ny ratsy fanahy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ny lavina. '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izay mietry sy maniva tena.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manome voninahitra ny matahotra an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mivadika amin’ny fianianany, na dia maningotra ny tenany aza,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy mampihana ny volany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mandray kolikoly hanameloka ny marina,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
