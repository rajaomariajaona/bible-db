document_id: PSA.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny toetry ny olona izay mahazo monina ao amin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, iza no hitoetra ao amin’ny tabernakelinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no honina ao an-tendrombohitrao masina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay mandeha tsy misy tsiny ary manao izay mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady misaintsaina ny marina ny fony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy manendrikendrika amin’ny lelany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy manisy ratsy ny sakaizany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy manao izay hahafa-baraka ny namany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy manaja ny ratsy fanahy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ny lavina. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay mietry sy maniva tena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manome voninahitra ny matahotra an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mivadika amin’ny fianianany, na dia maningotra ny tenany aza,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sady tsy mampihana ny volany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mandray kolikoly hanameloka ny marina,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
