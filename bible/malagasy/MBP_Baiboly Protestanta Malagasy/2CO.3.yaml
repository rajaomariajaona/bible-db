document_id: 2CO.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny voninahitra momba ny raharaha nanendrena ny Apostoly, sy ny fihoaran’izany noho ny voninahitry ny lalàna.
  - type: text
    content: 'MOA midera tena indray va izahay, sa toy ny sasany ka mila epistily filazan-tsoa anay ho aminareo, na avy aminareo? '
  '10':
  - type: text
    content: 'Ary izay nisy voninahitra aza dia tsy manana voninahitra kosa amin’izao noho ny voninahitra izay manan-tombo. '
  '11':
  - type: text
    content: Fa raha ny nihalevona aza nisy voninahitra, mainka fa ny mitoetra no misy voninahitra.
  '12':
  - type: text
    content: 'Koa amin’izany, satria manana izany fanantenana izany izahay, dia sahy tokoa, '
  '13':
  - type: text
    content: 'ary tsy tahaka an’i Mosesy, izay nanarona ny tavany tamin’ny fisalobonana, mba tsy hibanjinan’ny Zanak’Isiraely ny faran’izay nihalevona; '
  '14':
  - type: text
    content: 'fa efa donto ny sainy; fa ambaraka andro-any dia mbola tsy nesorina ihany izany fisalobonana izany, raha vakina ny tenin’ny fanekena taloha, satria ao amin’i Kristy ihany no anesorana izany. '
  '15':
  - type: text
    content: 'Fa misy fisalobonana manarona ny fony ambaraka andro-any, raha vakina ny tenin’i Mosesy. '
  '16':
  - type: text
    content: 'Kanefa rehefa miverina amin’ny Tompo izy, dia hesorina ihany ny fisalobonana. '
  '17':
  - type: text
    content: 'Ary ny Tompo izany Fanahy izany; ary izay itoeran’ny Fanahin’ny Tompo no itoeran’ny fahafahana. '
  '18':
  - type: text
    content: Fa isika rehetra kosa amin’ny tava tsy misarona dia mijery ny voninahitry ny Tompo toy ny amin’ny fitaratra,
  - type: note
    content: 'Na: dia tahaka ny fitaratra tarafin’ny voninahitry ny Tompo.'
  - type: text
    content: ' ka ovana hahazo izany endrika izany indrindra avy amin’ny voninahitra ka ho amin’ny voninahitra, toy ny avy amin’ny Tompo, dia ny Fanahy.'
  '2':
  - type: text
    content: 'Hianareo no epistilinay voasoratra ato am-ponay sady fantatra sy vakin’ny olona rehetra; '
  '3':
  - type: text
    content: eny, aseho ho epistilin’i Kristy izay entinay
  - type: note
    content: 'Na: soratanay; Gr. anompoanay.'
  - type: text
    content: ' hianareo, tsy nosoratana tamin’ny ranomainty anefa, fa tamin’ny Fanahin’Andriamanitra velona, tsy teo amin’izay tena vato fisaka, fa teo amin’izay vato fisaka nofo, dia ny fo.'
  '4':
  - type: text
    content: 'Ary manana izany fahatokiana izany ny amin’Andriamanitra izahay amin’ny alalan’i Kristy. '
  '5':
  - type: text
    content: 'Kanefa tsy mihambo hanana fahaleovana avy aminay hihevitra na amin’inona na amin’inona izahay; fa ny fahaleovanay dia avy amin’Andriamanitra, '
  '6':
  - type: text
    content: Izay efa nampahaleo anay koa ho mpanompo amin’izay fanekena vaovao, nefa tsy amin’ny soratra, fa amin’ny Fanahy; fa ny soratra mahafaty, fa ny Fanahy no mahavelona.
  '7':
  - type: text
    content: 'Fa raha ny fanompoana nitondra fahafatesana aza, dia ilay voasoratra teo amin’ny vato, no nisy voninahitra, ka ny Zanak’Isiraely tsy nahabanjina ny tavan’i Mosesy noho ny voninahitry ny tavany, izay nihalevona, '
  '8':
  - type: text
    content: 'tsy mainka hisy voninahitra va ny fanompoana omban’ny Fanahy? '
  '9':
  - type: text
    content: 'Fa raha nisy voninahitra ny fanompoana nitondra ny fanamelohana, mainka hanan-tombom-boninahitra ny fanompoana mitondra ny fahamarinana. '
