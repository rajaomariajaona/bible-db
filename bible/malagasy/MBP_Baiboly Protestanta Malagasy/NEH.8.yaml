document_id: NEH.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: Dia nivory tahaka ny olona iray izy rehetra ho eo an-kalalahana teo anoloan’ny vavahadin-drano; ary niteny tamin’i Ezra mpanora-dalàna izy mba ho entiny ny bokin’ny lalàn’i Mosesy izay nandidian’i Jehovah ny Isiraely.
  '10':
  - type: text
    content: 'Dia hoy izy taminy: Mandehana, hano ny matavy, ary sotroy ny mamy, dia mba anatero anjara izay tsy manan-javatra voavoatra; fa masina ho an’ny Tompontsika ity andro ity; koa aza malahelo hianareo, fa ny fifaliana avy amin’i Jehovah no fiarovana mafy ho anareo.'
  '11':
  - type: text
    content: 'Ary ny Levita nampangina ny olona rehetra ka nanao hoe: Mangìna hianareo, fa masina ity andro ity; koa aza malahelo hianareo. '
  '12':
  - type: text
    content: Dia nandeha ny olona rehetra hihinana sy hisotro sy hanatitra anjara ho an’ny sasany ary hifaly indrindra, satria azony tsara ny teny izay notorina taminy.
  '13':
  - type: text
    content: 'Ary nony ampitson’iny dia vory teo amin’i Ezra mpanora-dalàna ny lohan’ny fianakaviana tamin’ny olona rehetra sy ny mpisorona ary ny Levita mba handinika ny tenin’ny lalàna. '
  '14':
  - type: text
    content: 'Dia hitany voasoratra teo amin’ny lalàna, izay nampandidian’i Jehovah an’i Mosesy, fa tokony hitoetra ao amin’ny trano rantsan-kazo ny Zanak’Isiraely amin’ny andro firavoravoana amin’ny volana fahafito, '
  '15':
  - type: text
    content: 'ary tokony hampandre ny olona sy handefa teny mitety ny tanànany rehetra sy Jerosalema ka hanao hoe: Mandehana any an-tendrombohitra, ka makà sampan’oliva sy sampan’oliva maniry ho azy sy sampan-drotra'
  - type: note
    content: myrta.
  - type: text
    content: ' sy sampan-drofia'
  - type: note
    content: palma.
  - type: text
    content: ' ary sampan-kazo be ravina hanaovana trano rantsan-kazo araka ny voasoratra.'
  '16':
  - type: text
    content: 'Dia nandeha ny olona ka naka, ary samy nanao trano rantsan-kazo ho azy teo amin’ny tampon-tranony avy sy teo anatin’ny tokotaniny avy sy teo anatin’ny kianjan’ny tranon’Andriamanitra sy teo an-kalalahana teo akaikin’ny vavahadin-drano ary teo an-kalalahana akaikin’ny vavahadin’i Efraima. '
  '17':
  - type: text
    content: Eny, nanao trano rantsan-kazo avokoa ny fiangonana rehetra izay efa niverina avy tamin’ny fahababoana, ka nipetraka tao anatiny izy; fa tsy mbola nanao toy izany ny Zanak’Isiraely hatramin’ny andron’i Josoa, zanak’i Nona, ka hatramin’izany andro izany. Ary dia nisy fifaliana lehibe indrindra.
  '18':
  - type: text
    content: Ary namaky ny teny tao amin’ny bokin’ny lalàn’Andriamanitra isan-andro isan-andro izy hatramin’ny andro voalohany ka hatramin’ny andro farany. Ary nanao andro firavoravoana hafitoana izy; ary tamin’ny andro fahavalo dia fara-fivoriana araka ny fanao.
  '2':
  - type: text
    content: 'Dia nentin’i Ezra mpisorona ny lalàna tamin’ny andro voalohany tamin’ny volana fahafito ho eo anatrehan’ny fiangonana, na lehilahy na vehivavy, mbamin’izay rehetra efa mahahaino. '
  '3':
  - type: text
    content: Dia novakina teo an-kalalahana teo anoloan’ny vavahadin-drano izy hatramin’ny vao maraina koa ka ambara-pitataovovonan’ny andro, dia teo anatrehan’ny lehilahy sy ny vehivavy mbamin’izay efa mahahaino; ary ny olona rehetra dia nampandry sofina hihaino ny bokin’ny lalàna.
  '4':
  - type: text
    content: 'Ary Ezra mpanora-dalàna nitsangana teo ambonin’ny lampihazo fitoriana, izay efa natao ho fitoriana izany; ary Matitia sy Sema sy Anaia sy Oria sy Hilkia ary Mahaseia no nitsangana teo anilany ankavanana; ary Pedaia sy Misaela sy Malkia sy Hasoma sy Hasbadana sy Zakaria ary Mesolama no teo anilany ankavia kosa. '
  '5':
  - type: text
    content: 'Dia nosokafan’i Ezra teo imason’ny olona rehetra ny boky (fa ambony toerana noho ny olona rehetra izy); ary rehefa nosokafany izany, dia nitsangana koa ny olona rehetra. '
  '6':
  - type: text
    content: 'Ary Ezra nisaotra an’i Jehovah, Andriamanitra lehibe; ary ny olona rehetra nanandra-tànana ka namaly hoe: Amena, Amena; dia niondrika izy sady niankohoka tamin’ny tany teo anatrehan’i Jehovah.'
  '7':
  - type: text
    content: 'Ary Jesoa sy Bany sy Serebia sy Jamina sy Akoba sy Sabetahy sy Hodia sy Mahaseia sy Kelita sy Azaria sy Jozabada sy Hanana sy Pelaia ary ny Levita dia nampianatra ny olona ny lalàna; ary ny olona dia teo amin’izay nitoerany ihany. '
  '8':
  - type: text
    content: Dia novakiny mazava ny teny tao amin’ny bokin’ny lalàn’Andriamanitra, sady nohazavainy tsara ny heviny, ka dia azon’ny olona tsara ny teny novakina.
  '9':
  - type: text
    content: 'Ary Nehemia governora sy Ezra mpisorona, mpanora-dalàna, ary ny Levita izay nampianatra ny olona dia nanao tamin’ny olona rehetra hoe: Masina ho an’i Jehovah Andriamanitrareo ity andro ity; koa aza malahelo na mitomany. Fa nitomany ny olona rehetra raha nandre ny tenin’ny lalàna. '
