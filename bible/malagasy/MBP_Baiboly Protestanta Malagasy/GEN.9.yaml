document_id: GEN.9,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Andriamanitra nitso-drano an’i Noa sy ny zanany hoe: Maroa fara sy mihabetsaha ary mamenoa ny tany. '
  '10':
  - type: text
    content: 'sy amin’ny zava-manan-aina rehetra eo aminareo, na ny vorona, na ny biby fiompy, na ny bibi-dia rehetra eo aminareo; izay rehetra nivoaka avy tao anatin’ny sambo-fiara, dia ny biby samy hafa rehetra. '
  '11':
  - type: text
    content: Dia aoriko ny fanekeko aminareo, ka tsy haringako amin’ny safo-drano intsony ny nofo rehetra, ary tsy hisy safo-drano hanimba ny tany intsony.
  '12':
  - type: text
    content: 'Ary hoy Andriamanitra: Izao no famantarana ny fanekena izay ataoko ho amiko sy ho aminareo mbamin’ny zava-manan-aina rehetra eo aminareo hatramin’ny taranaka fara-mandimby: '
  '13':
  - type: text
    content: Ny avako efa napetrako
  - type: note
    content: 'Na: dia apetrako.'
  - type: text
    content: ' eo amin’ny rahona ho famantarana ny fanekena ho amiko sy ho amin’ny tany. '
  '14':
  - type: text
    content: 'Ary raha mampiangona rahona eo ambonin’ny tany Aho, ka hita eo amin’ny rahona ny avana, '
  '15':
  - type: text
    content: 'dia hotsarovako ny fanekeko izay ho amiko sy ho aminareo mbamin’ny zava-manan-aina, dia ny nofo rehetra; ary tsy hisy safo-drano handringana ny nofo rehetra intsony. '
  '16':
  - type: text
    content: 'Ary ho eo amin’ny rahona ny avana; ary hitsinjo azy Aho hahatsiarovako ny fanekena mandrakizay izay ho amin’Andriamanitra sy ho amin’ny zava-manan-aina rehetra, dia ny nofo rehetra ambonin’ny tany. '
  '17':
  - type: text
    content: 'Ary hoy Andriamanitra tamin’i Noa: Izany no famantarana ny fanekena izay naoriko ho amiko sy ho amin’ny nofo rehetra ambonin’ny tany.'
  - type: heading
    content: Ny nataon’izy telo mirahalahy, zanak’i Noa, sy ny teny naminanian-drainy azy avy.
  '18':
  - type: text
    content: 'ARY ny zanakalahin’i Noa izay nivoaka avy tamin’ny sambo-fiara dia Sema sy Hama ary Jafeta; ary Hama no rain’i Kanana. '
  '19':
  - type: text
    content: Ireo telo lahy ireo no zanak’i Noa; ary avy tamin’ireo no nielezan’ny olona tambonin’ny tany rehetra.
  '2':
  - type: text
    content: 'Ary ny tahotra sy horohoro anareo hahazo ny bibi-dia rehetra sy ny voromanidina rehetra; ireny mbamin’izay rehetra mandady na mikisaka amin’ny tany sy ny hazandrano rehetra ao amin’ny ranomasina dia efa natolotra eo an-tànanareo. '
  '20':
  - type: text
    content: 'Ary vao tonga mpiasa tany Noa ka nanao tanimboaloboka. '
  '21':
  - type: text
    content: 'Ary nisotro tamin’ny divay izy ka mamo; dia nanary lamba izy ka nitanjaka tao anatin’ny lainy. '
  '22':
  - type: text
    content: 'Ary hitan’i Hama, rain’i Kanana, ny fitanjahan’ny rainy, dia nambarany tamin’ny rahalahiny roa lahy teo ivelany. '
  '23':
  - type: text
    content: 'Ary nalain’i Sema sy Jafeta ny lamba ka nentin’izy mirahalahy teo an-tsorony, dia nanao dia mianotra izy ka nandrakotra ny fitanjahan’ny rainy; ary ny tavany tsy nanatrika, ka dia tsy hitany ny fitanjahan’ny rainy. '
  '24':
  - type: text
    content: 'Dia nahatsiaro Noa, rehefa afaka ny hamamoany, ka nahafantatra izay efa nataon’ny zanany faralahy taminy. '
  '25':
  - type: text
    content: 'Dia hoy izy:'
  - type: text
    content: Ho voaozona anie Kanana;
  - type: text
    content: Ho tena andevon’ny rahalahiny izy.
  '26':
  - type: text
    content: 'Ary hoy koa izy:'
  - type: text
    content: Isaorana anie Jehovah, Andriamanitr’i Sema;
  - type: text
    content: Ary aoka Kanana ho andevony.
  '27':
  - type: text
    content: Hataon’Andriamanitra malalaka anie Jafeta;
  - type: note
    content: Jafeta = Fahalalahana.
  - type: text
    content: Ary aoka honina ao an-dain’i Sema izy;
  - type: note
    content: 'Na: Izy.'
  - type: text
    content: Ary aoka Kanana ho andevony.
  '28':
  - type: text
    content: 'Ary ny andro niainan’i Noa taorian’ny safo-drano dia dimam-polo amby telon-jato taona. '
  '29':
  - type: text
    content: Ary ny andro rehetra niainan’i Noa dia dimam-polo amby sivin-jato taona; dia maty izy.
  '3':
  - type: text
    content: 'Ny biby mihetsiketsika rehetra izay miaina dia ho fihinana ho anareo; dia efa nomeko anareo toy ny zava-maitso izy rehetra. '
  '4':
  - type: text
    content: 'Kanefa ny nofo izay mbola misy aina (dia ny rany) no aza haninareo. '
  '5':
  - type: text
    content: 'Fa ny ranareo kosa dia hadiniko, satria ainareo izany; eo amin’ny tànan’ny manan-aina rehetra no hanadinako azy; ary eo amin’ny tànan’ny olona, dia eo amin’ny tànan’ny olona avy, no hanadinako ny ain’ny olona. '
  '6':
  - type: text
    content: 'Izay mandatsaka ny ran’olona, dia mba halatsak’olona kosa ny rany, satria tahaka ny endrik’Andriamanitra no nanaovany ny olona. '
  '7':
  - type: text
    content: Koa ny aminareo, dia maroa fara sy mihabetsaha; miteraha be eny ambonin’ny tany sy mihabetsaha eny.
  '8':
  - type: text
    content: 'Ary Andriamanitra niteny tamin’i Noa sy tamin’ny zanany, izay niaraka taminy, ka nanao hoe: '
  '9':
  - type: text
    content: 'Indro, Izaho efa manorina ny fanekeko aminareo sy amin’ny taranakareo mandimby anareo '
