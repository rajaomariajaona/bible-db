document_id: ISA.29
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny loza hanjo an’i Jerosalema, sy ny mbola hamonjena azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: LOZAN’i Ariela,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ariela = Fatan’Andriamanitra, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lionan’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' lozan’i Ariela,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tanàna nitoeran’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nitobian’.
    marker-yv: yv-n
  - type: text
    text: ' i Davida!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampio taona ny taona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho tafatsingeringerina ny andro firavoravoana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia hampahory an’i Ariela Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hisy fisentoana sy fitarainana ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tonga Ariela tokoa amiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hanao fahiranao anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hasiako miaramila hanemitra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hananganako mànda hamelezana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia haetry hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiteny ao amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao amin’ny vovoka no hibitsibitsihanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny feonao hivoaka avy amin’ny tany tahaka ny an’ny manao azy ho tsindrian-javatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary avy ao amin’ny vovoka no ikiakiahan’ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Kanefa ny fahavalonao betsaka ho tonga tahaka ny vovoka madinika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olon-dozabe maro ho tahaka ny akofa indaosina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho avy tampoka dia tampoka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avy amin’i Jehovah, Tompon’ny maro, no hihavian’ny famaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia kotrokorana sy horohoron-tany ary rohondrohona mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tadio sy tafio-drivotra ary lelafo mandevona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ho tahaka ny fahitana eo amin’ny nofy amin’ny alina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo firenena betsaka rehetra ireo, izay mivory hamely an’i Ariela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay rehetra mivory hamely azy sy ny màndany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampahatahotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ho tahaka ny olona noana manonofy, fa, indro, mihinana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nony mahatsiaro, dia noana ihany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho tahaka ny olona mangetaheta manonofy, fa, indro, misotro izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Kanjo nony mahatsiaro, indro, ana ihany izy, ary ny fanahiny mbola maniry ihany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka izany ireo firenena betsaka rehetra ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mivory hamely ny tendrombohitra Ziona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mijanòna hianareo, ka mitalanjòna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tampeno ny masonareo, koa aoka ho jamba hianareo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamo ireo, nefa tsy tamin’ny divay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivembena izy, nefa tsy tamin’ny toaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa Jehovah efa nampidina fanahy mahasondrian-tory ao aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nakimpiny ny masonareo (dia ny mpaminany izany),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nosaronany ny lohanareo (dia ny mpahita izany).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny fahitana ny amin’izany rehetra izany raha aminareo dia tahaka ny teny amin’ny taratasy voaisy tombo-kase,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay atolotra olona mahavaky teny ka atao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masìna hianao, vakio ity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy izy: Tsy azoko vakina, fa efa voaisy tombo-kase izy;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masìna hianao, vakio ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hoy izy: Tsy mahavaky teny aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria manatona Ahy amin’ny vavany ity firenena ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mankalaza Ahy amin’ny molony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ampanalaviriny Ahy kosa ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny fahatahorany Ahy dia didin’olombelona ampianarina azy ihany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia, indro koa, mbola hanao zava-mahagaga amin’ity firenena ity Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zava-mahagaga sy mahatalanjona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho foana ny fahendren’ny olon-kendriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho hita ny fahalalan’ny mazava sainany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lozan’izay manafina lalina ny saina ataony mba tsy ho hitan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ao amin’ny maizina ny asany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka dia hoy izy: Iza no mahita antsika, ary iza no mahalala antsika?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Endrey izato fahadalanareo! Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka ny natao va hilaza izay nanao azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nanao ahy izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na ny zavatra voaforona va hilaza izay namorona azy hoe: Tsy manam-pahalalana izy?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy vetivety foana va dia hovana ho saha mahavokatra Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny saha mahavokatra hoheverina ho ala?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany dia ho ren’ny marenina ny tenin’ny taratasy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia ao amin’ny aizina sy ny aizim-pito aza dia hahita ihany ny mason’ny jamba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny mpandefitra hitombo hafaliana amin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny malahelo ao amin’ny olona hifaly amin’ny Iray Masin’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa lasa ny olon-dozabe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ao intsony ny mpaniratsira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fongotra izay rehetra miari-torin-tsaina amin’ny ratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia ireo manameloka olona amin’ny teny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamandrika izay mananatra eo am-bavahady
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mamadika ny marina amin’ny lainga foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ny amin’ny taranak’i Jakoba dia izao no lazain’i Jehovah, Izay nanavotra an’i Abrahama:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho menatra intsony Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hivaloarika intsony ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa raha ny zanany mahita ny asan’ny tànako ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanamasina ny anarako izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hanamasina ny Iray Masin’i Jakoba izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hangovitra eo anatrehan’Andriamanitry ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary izay mivily fanahy dia mbola hahazo fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mimonomonona dia mbola hianatra fahendrena.
