document_id: ISA.29,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an’i Jerosalema, sy ny mbola hamonjena azy.
  - type: text
    content: LOZAN’i Ariela,
  - type: note
    content: 'Ariela = Fatan’Andriamanitra, na: Lionan’Andriamanitra.'
  - type: text
    content: ' lozan’i Ariela,'
  - type: text
    content: Tanàna nitoeran’
  - type: note
    content: Heb. nitobian’.
  - type: text
    content: ' i Davida!'
  - type: text
    content: Ampio taona ny taona,
  - type: text
    content: Aoka ho tafatsingeringerina ny andro firavoravoana;
  '10':
  - type: text
    content: Fa Jehovah efa nampidina fanahy mahasondrian-tory ao aminareo,
  - type: text
    content: Ary efa nakimpiny ny masonareo (dia ny mpaminany izany),
  - type: text
    content: Ary efa nosaronany ny lohanareo (dia ny mpahita izany).
  '11':
  - type: text
    content: Ary ny fahitana ny amin’izany rehetra izany raha aminareo dia tahaka ny teny amin’ny taratasy voaisy tombo-kase,
  - type: text
    content: 'Izay atolotra olona mahavaky teny ka atao hoe:'
  - type: text
    content: Masìna hianao, vakio ity;
  - type: text
    content: 'Fa hoy izy: Tsy azoko vakina, fa efa voaisy tombo-kase izy;'
  '12':
  - type: text
    content: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe:'
  - type: text
    content: Masìna hianao, vakio ity,
  - type: text
    content: 'Dia hoy izy: Tsy mahavaky teny aho.'
  '13':
  - type: text
    content: 'Ary hoy ny Tompo:'
  - type: text
    content: Satria manatona Ahy amin’ny vavany ity firenena ity
  - type: text
    content: Ary mankalaza Ahy amin’ny molony,
  - type: text
    content: Nefa ampanalaviriny Ahy kosa ny fony,
  - type: text
    content: Ka ny fahatahorany Ahy dia didin’olombelona ampianarina azy ihany,
  '14':
  - type: text
    content: Dia, indro koa, mbola hanao zava-mahagaga amin’ity firenena ity Aho,
  - type: text
    content: Dia zava-mahagaga sy mahatalanjona;
  - type: text
    content: Ka ho foana ny fahendren’ny olon-kendriny,
  - type: text
    content: Ary tsy ho hita ny fahalalan’ny mazava sainany.
  '15':
  - type: text
    content: Lozan’izay manafina lalina ny saina ataony mba tsy ho hitan’i Jehovah,
  - type: text
    content: Sady ao amin’ny maizina ny asany,
  - type: text
    content: 'Ka dia hoy izy: Iza no mahita antsika, ary iza no mahalala antsika?'
  '16':
  - type: text
    content: Endrey izato fahadalanareo! Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga,
  - type: text
    content: 'Ka ny natao va hilaza izay nanao azy hoe:'
  - type: text
    content: Tsy nanao ahy izy?
  - type: text
    content: 'Na ny zavatra voaforona va hilaza izay namorona azy hoe: Tsy manam-pahalalana izy?'
  '17':
  - type: text
    content: Tsy vetivety foana va dia hovana ho saha mahavokatra Libanona,
  - type: text
    content: Ary ny saha mahavokatra hoheverina ho ala?
  '18':
  - type: text
    content: Amin’izany andro izany dia ho ren’ny marenina ny tenin’ny taratasy,
  - type: text
    content: Ary na dia ao amin’ny aizina sy ny aizim-pito aza dia hahita ihany ny mason’ny jamba.
  '19':
  - type: text
    content: Ny mpandefitra hitombo hafaliana amin’i Jehovah;
  - type: text
    content: Ary ny malahelo ao amin’ny olona hifaly amin’ny Iray Masin’ny Isiraely,
  '2':
  - type: text
    content: Dia hampahory an’i Ariela Aho,
  - type: text
    content: Ka hisy fisentoana sy fitarainana ao aminy;
  - type: text
    content: Ary ho tonga Ariela tokoa amiko izy.
  '20':
  - type: text
    content: Fa lasa ny olon-dozabe,
  - type: text
    content: Tsy ao intsony ny mpaniratsira;
  - type: text
    content: Ary fongotra izay rehetra miari-torin-tsaina amin’ny ratsy,
  '21':
  - type: text
    content: Dia ireo manameloka olona amin’ny teny
  - type: text
    content: Ary mamandrika izay mananatra eo am-bavahady
  - type: text
    content: Sy mamadika ny marina amin’ny lainga foana.
  '22':
  - type: text
    content: 'Koa ny amin’ny taranak’i Jakoba dia izao no lazain’i Jehovah, Izay nanavotra an’i Abrahama:'
  - type: text
    content: Tsy ho menatra intsony Jakoba,
  - type: text
    content: Ary tsy hivaloarika intsony ny tavany.
  '23':
  - type: text
    content: Fa raha ny zanany mahita ny asan’ny tànako ao aminy,
  - type: text
    content: Dia hanamasina ny anarako izy,
  - type: text
    content: Eny, hanamasina ny Iray Masin’i Jakoba izy
  - type: text
    content: Ary hangovitra eo anatrehan’Andriamanitry ny Isiraely.
  '24':
  - type: text
    content: Ary izay mivily fanahy dia mbola hahazo fahalalana;
  - type: text
    content: Ary izay mimonomonona dia mbola hianatra fahendrena.
  '3':
  - type: text
    content: Ary hanao fahiranao anao Aho,
  - type: text
    content: Ka hasiako miaramila hanemitra anao,
  - type: text
    content: Ary hananganako mànda hamelezana anao.
  '4':
  - type: text
    content: Dia haetry hianao
  - type: text
    content: Ka hiteny ao amin’ny tany,
  - type: text
    content: Ary ao amin’ny vovoka no hibitsibitsihanao,
  - type: text
    content: Eny, ny feonao hivoaka avy amin’ny tany tahaka ny an’ny manao azy ho tsindrian-javatra,
  - type: text
    content: Ary avy ao amin’ny vovoka no ikiakiahan’ny teninao.
  '5':
  - type: text
    content: Kanefa ny fahavalonao betsaka ho tonga tahaka ny vovoka madinika,
  - type: text
    content: Ary ny olon-dozabe maro ho tahaka ny akofa indaosina;
  - type: text
    content: Eny, ho avy tampoka dia tampoka izany.
  '6':
  - type: text
    content: Avy amin’i Jehovah, Tompon’ny maro, no hihavian’ny famaliana,
  - type: text
    content: Dia kotrokorana sy horohoron-tany ary rohondrohona mafy,
  - type: text
    content: Tadio sy tafio-drivotra ary lelafo mandevona.
  '7':
  - type: text
    content: Ary ho tahaka ny fahitana eo amin’ny nofy amin’ny alina
  - type: text
    content: Ireo firenena betsaka rehetra ireo, izay mivory hamely an’i Ariela,
  - type: text
    content: Dia izay rehetra mivory hamely azy sy ny màndany
  - type: text
    content: Ka hampahatahotra azy.
  '8':
  - type: text
    content: Ary ho tahaka ny olona noana manonofy, fa, indro, mihinana izy;
  - type: text
    content: Kanjo nony mahatsiaro, dia noana ihany izy;
  - type: text
    content: Na ho tahaka ny olona mangetaheta manonofy, fa, indro, misotro izy;
  - type: text
    content: 'Kanjo nony mahatsiaro, indro, ana ihany izy, ary ny fanahiny mbola maniry ihany:'
  - type: text
    content: Dia ho tahaka izany ireo firenena betsaka rehetra ireo
  - type: text
    content: Izay mivory hamely ny tendrombohitra Ziona.
  '9':
  - type: text
    content: Mijanòna hianareo, ka mitalanjòna,
  - type: text
    content: Tampeno ny masonareo, koa aoka ho jamba hianareo!
  - type: text
    content: Mamo ireo, nefa tsy tamin’ny divay;
  - type: text
    content: Mivembena izy, nefa tsy tamin’ny toaka.
