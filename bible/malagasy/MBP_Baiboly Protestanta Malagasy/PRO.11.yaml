document_id: PRO.11
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny mizana mandainga dia fahavetavetana eo imason’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vato marina no ankasitrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha tonga ny fiavonavonana, dia tonga koa ny fahafaham-baraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao amin’ny manetry tena no misy fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahitsian’ny mahitsy no mitarika azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny faharatsian’ny mpivadika mahatonga fandringanana amin’ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny harena dia tsy mahasoa amin’ny andro fahatezerana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahamarinana no mamonjy tsy ho azon’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahamarinan’ny marina mandamina ny alehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ratsy fanahy lavon’ny haratsiany ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinan’ny mahitsy mamonjy azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mpivadika dia voafandriky ny filàny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha maty ny ratsy fanahy, dia foana ny fanantenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, foana ny fanantenan’ny mpanao ratsy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahery.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny marina dia vonjena amin’ny fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho avy kosa ny ratsy fanahy hisolo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vavan’ny mpihatsaravela-tsihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
  - type: text
    text: ' no animbany ny namany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahalalana no hanafahana ny marina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fahalalan’ny marina no hanafahana ny namany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha miadana ny marina, dia ravoravo ny tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha ringana ny ratsy fanahy, dia velona ny hoby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fisaoran’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fitahiana avy amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny marina no isandratan’ny tanàna;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vavan’ny ratsy fanahy no aharavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy ampy saina izay manamavo ny namany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay hendry dia mangina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mandehandeha manaratsy dia manambara ny hevitra afenina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny olona mahatoky tsy mba tia lazalaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha tsy misy mpitondra, dia rava ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa handry fahizay, raha maro ny mpanolo-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hahita loza tokoa ny mianto-bahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mitoetra tsy manana ahiahy ny tsy tia antoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny vehivavy tsara tarehy mahazo dera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanao an-keriny mahazo harena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny olona mamindra fo dia mahazo soa ho an’ny tenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny lozabe dia todìn’ny halozany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ratsy fanahy dia mahazo valiny tsy mahasoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mamafy fahamarinana no mahazo izay tena tambiny tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny tena fahamarinana dia mamantana any amin’ny fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay fatra-panaraka ny ratsy dia iharan’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fahavetavetana eo imason’i Jehovah ny meloka am-po;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ankasitrahany kosa izay mandeha tsy misy tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Azo itompoana tokoa fa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Azo ifandraisan-tànana fa; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hatramin’ny taranaka fara mandimby dia.
    marker-yv: yv-n
  - type: text
    text: ' tsy maintsy hampijalina ny ratsy fanahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny taranaky ny marina no hovonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toy ny kavim-bolamena eo amin’ny oron-kisoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vehivavy tsara tarehy tsy manam-pahendrena.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa niala tamin’ny fahendrena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny soa ihany no irin’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahatezerana no fanantenan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misy mahafoy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamafy.
    marker-yv: yv-n
  - type: text
    text: ' nefa mitombo fananana ihany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misy fatra-pahihitra loatra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mihazona ny hareny.
    marker-yv: yv-n
  - type: text
    text: ' nefa tonga malahelo ihany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay manisy soa olona hohatavezina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mandena dia mba holemana kosa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary izay mampisotro dia mba hampisotroina kosa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay tsy mamoaka ny variny dia ozonin’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa saotra no ho amin’ny lohan’izay mivarotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pikatsaka ny tsara no mitady ny mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitady ny ratsy dia hiharan’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izay matoky ny hareny dia ho lavo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny marina ho tahaka ny ravina maitso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay mampidi-doza amin’ny ankohonany dia mandova ny rivotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny adala dia tonga mpanompon’ny hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny vokatry ny marina dia hazon’aina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hendry dia mahataona olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, ny marina aza dia valiana etỳ an-tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mainka fa ny ratsy fanahy sy ny mpanota!
