document_id: PRO.11,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny mizana mandainga dia fahavetavetana eo imason’i Jehovah;
  - type: text
    content: Fa ny vato marina no ankasitrahany.
  '10':
  - type: text
    content: Raha miadana ny marina, dia ravoravo ny tanàna;
  - type: text
    content: Fa raha ringana ny ratsy fanahy, dia velona ny hoby.
  '11':
  - type: text
    content: Ny fisaoran’
  - type: note
    content: 'Na: Ny fitahiana avy amin’.'
  - type: text
    content: ' ny marina no isandratan’ny tanàna;'
  - type: text
    content: Fa ny vavan’ny ratsy fanahy no aharavany.
  '12':
  - type: text
    content: Tsy ampy saina izay manamavo ny namany;
  - type: text
    content: Fa izay hendry dia mangina.
  '13':
  - type: text
    content: Izay mandehandeha manaratsy dia manambara ny hevitra afenina;
  - type: text
    content: Fa ny olona mahatoky tsy mba tia lazalaza.
  '14':
  - type: text
    content: Raha tsy misy mpitondra, dia rava ny firenena;
  - type: text
    content: Fa handry fahizay, raha maro ny mpanolo-tsaina.
  '15':
  - type: text
    content: Hahita loza tokoa ny mianto-bahiny;
  - type: text
    content: Fa mitoetra tsy manana ahiahy ny tsy tia antoka.
  '16':
  - type: text
    content: Ny vehivavy tsara tarehy mahazo dera;
  - type: text
    content: Ary ny mpanao an-keriny mahazo harena.
  '17':
  - type: text
    content: Ny olona mamindra fo dia mahazo soa ho an’ny tenany;
  - type: text
    content: Fa ny lozabe dia todìn’ny halozany.
  '18':
  - type: text
    content: Ny ratsy fanahy dia mahazo valiny tsy mahasoa;
  - type: text
    content: Fa izay mamafy fahamarinana no mahazo izay tena tambiny tokoa.
  '19':
  - type: text
    content: Ny tena fahamarinana dia mamantana any amin’ny fiainana;
  - type: text
    content: Fa izay fatra-panaraka ny ratsy dia iharan’ny fahafatesana.
  '2':
  - type: text
    content: Raha tonga ny fiavonavonana, dia tonga koa ny fahafaham-baraka;
  - type: text
    content: Fa ao amin’ny manetry tena no misy fahendrena.
  '20':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah ny meloka am-po;
  - type: text
    content: Fa ankasitrahany kosa izay mandeha tsy misy tsiny.
  '21':
  - type: text
    content: Azo itompoana tokoa fa
  - type: note
    content: 'Na: Azo ifandraisan-tànana fa; na: Hatramin’ny taranaka fara mandimby dia.'
  - type: text
    content: ' tsy maintsy hampijalina ny ratsy fanahy;'
  - type: text
    content: Fa ny taranaky ny marina no hovonjena.
  '22':
  - type: text
    content: Toy ny kavim-bolamena eo amin’ny oron-kisoa
  - type: text
    content: Ny vehivavy tsara tarehy tsy manam-pahendrena.
  - type: note
    content: 'Na: efa niala tamin’ny fahendrena.'
  '23':
  - type: text
    content: Ny soa ihany no irin’ny marina;
  - type: text
    content: Fa fahatezerana no fanantenan’ny ratsy fanahy.
  '24':
  - type: text
    content: Misy mahafoy,
  - type: note
    content: Heb. mamafy.
  - type: text
    content: ' nefa mitombo fananana ihany;'
  - type: text
    content: Ary misy fatra-pahihitra loatra,
  - type: note
    content: 'Na: mihazona ny hareny.'
  - type: text
    content: ' nefa tonga malahelo ihany.'
  '25':
  - type: text
    content: Izay manisy soa olona hohatavezina;
  - type: text
    content: Ary izay mandena dia mba holemana kosa.
  - type: note
    content: Heb. Ary izay mampisotro dia mba hampisotroina kosa.
  '26':
  - type: text
    content: Izay tsy mamoaka ny variny dia ozonin’ny olona;
  - type: text
    content: Fa saotra no ho amin’ny lohan’izay mivarotra.
  '27':
  - type: text
    content: Izay fatra-pikatsaka ny tsara no mitady ny mahafinaritra;
  - type: text
    content: Fa izay mitady ny ratsy dia hiharan’izany.
  '28':
  - type: text
    content: Izay matoky ny hareny dia ho lavo;
  - type: text
    content: Fa ny marina ho tahaka ny ravina maitso.
  '29':
  - type: text
    content: Izay mampidi-doza amin’ny ankohonany dia mandova ny rivotra;
  - type: text
    content: Ary ny adala dia tonga mpanompon’ny hendry.
  '3':
  - type: text
    content: Ny fahitsian’ny mahitsy no mitarika azy;
  - type: text
    content: Fa ny faharatsian’ny mpivadika mahatonga fandringanana amin’ny tenany.
  '30':
  - type: text
    content: Ny vokatry ny marina dia hazon’aina,
  - type: text
    content: Ary ny hendry dia mahataona olona.
  '31':
  - type: text
    content: Indro, ny marina aza dia valiana etỳ an-tany,
  - type: text
    content: Koa mainka fa ny ratsy fanahy sy ny mpanota!
  '4':
  - type: text
    content: Ny harena dia tsy mahasoa amin’ny andro fahatezerana;
  - type: text
    content: Fa ny fahamarinana no mamonjy tsy ho azon’ny fahafatesana.
  '5':
  - type: text
    content: Ny fahamarinan’ny marina mandamina ny alehany;
  - type: text
    content: Fa ny ratsy fanahy lavon’ny haratsiany ihany.
  '6':
  - type: text
    content: Ny fahamarinan’ny mahitsy mamonjy azy;
  - type: text
    content: Fa ny mpivadika dia voafandriky ny filàny.
  '7':
  - type: text
    content: Raha maty ny ratsy fanahy, dia foana ny fanantenany,
  - type: text
    content: Eny, foana ny fanantenan’ny mpanao ratsy.
  - type: note
    content: 'Na: mahery.'
  '8':
  - type: text
    content: Ny marina dia vonjena amin’ny fahoriana;
  - type: text
    content: Fa ho avy kosa ny ratsy fanahy hisolo azy.
  '9':
  - type: text
    content: Ny vavan’ny mpihatsaravela-tsihy
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' no animbany ny namany;'
  - type: text
    content: Fa ny fahalalana no hanafahana ny marina.
  - type: note
    content: 'Na: Ny fahalalan’ny marina no hanafahana ny namany.'
