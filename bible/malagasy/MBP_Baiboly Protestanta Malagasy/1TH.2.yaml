document_id: 1TH.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ny tenanareo, ry rahalahy, dia mahalala fa tsy foana ny fidiranay tatỳ aminareo; '
  '10':
  - type: text
    content: 'Hianareo no vavolombelona ary Andriamanitra koa fa masina sy marina ary tsy nanan-tsiny tokoa ny fitondrantenanay teo imasonareo izay mino, '
  '11':
  - type: text
    content: 'toy ny fantatrareo fa tahaka ny ray amin’ny zanaka no namporisihanay sy nampiononanay anareo isam-batana sy nananaranay mafy anareo, '
  '12':
  - type: text
    content: mba handehananareo mendrika an’Andriamanitra, Izay miantso anareo ho amin’ny fanjakany sy ny voninahiny.
  '13':
  - type: text
    content: 'Ary noho izany izahay koa dia tsy mitsahatra misaotra an’Andriamanitra, satria rehefa nandray ny tenin’Andriamanitra izay notorinay hianareo, dia tsy noraisinareo '
  - type: text
    content: ho
  - type: text
    content: ' tenin’olona, fa araka izay marina, dia ny tenin’Andriamanitra, izay miasa ao anatinareo izay mino koa. '
  '14':
  - type: text
    content: 'Fa hianareo, ry rahalahy, dia efa tahaka ny fiangonan’Andriamanitra any Jodia izay ao amin’i Kristy Jesosy; fa ny nanjo anareo noho ny nataon’ny iray firenena aminareo dia sahala amin’ny nanjo ireo koa noho ny nataon’ny Jiosy taminy, '
  '15':
  - type: text
    content: 'izay namono an’i Jesosy Tompo sy ny mpaminany koa ary nandroaka anay sady tsy manao ny sitrapon’Andriamanitra ary manohitra ny olona rehetra, '
  '16':
  - type: text
    content: ka mandrara anay tsy hitory amin’ny jentilisa mba tsy hamonjena ireny, mba hameno ny fahotan’ny tenany mandrakariva; kanjo efa niharan’ny fahatezerana hatramin’ny farany izy.
  '17':
  - type: text
    content: 'Ary izahay, ry rahalahy, rehefa tafasaraka taminareo vetivety foana tamin’ny fanatrehana, fa tsy tamin’ny fo, dia vao mainka nitady sy naniry fatratra hahita ny tavanareo. '
  '18':
  - type: text
    content: 'Koa naniry hankany aminareo indray mandeha amana indroa izahay, dia izaho Paoly; nefa nosakanan’i Satana izahay. '
  '19':
  - type: text
    content: 'Fa inona moa no fanantenanay, na fifalianay, na satroboninahitra reharehanay? Moa tsy hianareo eo anatrehan’i Jesosy Tompontsika amin’ny fihaviany va? '
  '2':
  - type: text
    content: 'fa rehefa nampahorina sy nisetrasetrana tany Filipy izahay teo aloha, tahaka ny fantatrareo ihany, dia sahy tao amin’Andriamanitray izahay hiteny taminareo ny filazantsaran’Andriamanitra, na dia be aza ny fanoherana. '
  '20':
  - type: text
    content: Fa hianareo no voninahitray sy fifalianay.
  '3':
  - type: text
    content: 'Fa ny fananaranay dia tsy avy amin’ny fitaka, na ny fahalotoana, na ny soloky. '
  '4':
  - type: text
    content: 'Fa tahaka ny nankasitrahan’Andriamanitra anay, ka notolorana ny filazantsara ho adidinay izahay, dia araka izany koa no itenenanay, tsy toy ny mila sitraka amin’olona, fa amin’Andriamanitra, Izay mizaha toetra ny fonay. '
  '5':
  - type: text
    content: 'Fa tsy nanao teny mandrobo akory izahay na oviana na oviana; tahaka ny fantatrareo ihany, na nihatsaravelatsihy hanafina fieremana (Andriamanitra no vavolombelona); '
  '6':
  - type: text
    content: 'ary tsy nitady voninahitra tamin’olona izahay, na taminareo, na tamin’ny sasany, na dia nanam-pahefana hahavaky tratra aza izahay, araka izay mah’Apostolin’i Kristy anay. '
  '7':
  - type: text
    content: 'Fa nalemy fanahy teo aminareo izahay, tahaka ny reny mitaiza ny zanany naterany, '
  '8':
  - type: text
    content: 'dia toy izany no nahazoto anay, noho ny fitiavanay anareo indrindra, hanome anareo, tsy ny filazantsaran’Andriamanitra ihany, fa ny ainay koa aza, satria efa malalanay hianareo. '
  '9':
  - type: text
    content: 'Fa tsaroanareo, ry rahalahy, ny fikelezanay aina sy ny fisasaranay; fa niasa andro aman-alina, mba tsy hahavaky tratra na dia olona iray akory taminareo aza, no nitorianay ny filazantsaran’Andriamanitra taminareo. '
