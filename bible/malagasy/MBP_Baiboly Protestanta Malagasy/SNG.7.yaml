document_id: SNG.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: Miverena, miverena, ry Solemita; Miverena, miverena, mba hijerenay anao.
  - type: text
    content: Inona no hitanareo amin’ny Solemita?
  - type: text
    content: Dihy tahaka ny an’i Mahanaima.
  - type: note
    content: 'Na: ataon’ny mpandihy roa tonta; izahao Gen. xxxii.2, 3.'
  '10':
  - type: text
    content: Ny vavanao dia toy ny divay tsara,–
  - type: text
    content: Eny, divay mikorotsaka mora eo an-tendan’ny malalako
  - type: text
    content: Sady miditra misononoka amin’ny molotry ny matory.
  '11':
  - type: text
    content: An’ny malalako aho,
  - type: text
    content: Sady manina ahy
  - type: note
    content: Heb. ho amiko ny faniriany; izahao Gen. iii.16.
  - type: text
    content: ' izy.'
  '12':
  - type: text
    content: Avia, ry malalako, aoka handeha ho any an-tsaha isika;
  - type: text
    content: Andeha handry any ambani-vohitra isika.
  '13':
  - type: text
    content: Dia aoka hifoha maraina koa ho any an-tanimboaloboka isika;
  - type: text
    content: Aoka hizahantsika raha mitsimoka ny voaloboka,
  - type: text
    content: Sy mivelatra ny voniny,
  - type: text
    content: Ary mamony ny ampongabendanitra;
  - type: text
    content: Any no hanehoako ny fitiavako anao.
  '14':
  - type: text
    content: Mamerovero tsara ny dodaima,
  - type: note
    content: mandragora; izahao Gen. xxx.14.
  - type: text
    content: Sady ao am-bavahadintsika misy voankazo tsara samy hafa,
  - type: text
    content: 'Na ny vao na ny ela:'
  - type: text
    content: Efa notehiriziko ho anao izany, ry malalako.
  '2':
  - type: text
    content: Endrey! mahate-hijery ny famindran’ny tongotrao mikiraro,
  - type: note
    content: Heb. mikapa.
  - type: text
    content: ' ry zazavavy zanak’andriana!'
  - type: text
    content: Dia tahaka ny firavaka ny amboampenao,
  - type: text
    content: Nataon’ny tànan’ny mahay zavatra.
  '3':
  - type: text
    content: 'Ny foitrao dia '
  - type: text
    content: tahaka ny
  - type: text
    content: ' tomaboha kivorivory;'
  - type: text
    content: Tsy ho diso divay noharoharoan-java-manitra anie izy!
  - type: text
    content: 'Ny kibonao dia '
  - type: text
    content: tahaka ny
  - type: text
    content: ' vary tritika voatoby'
  - type: text
    content: Sady voaravaka lilia manodidina.
  '4':
  - type: text
    content: Ny nononao roa dia tahaka ny gazela kambana mbola tanora.
  '5':
  - type: text
    content: Ny vozonao dia tahaka ny tilikambo ivory;
  - type: text
    content: Ny masonao dia tahaka ny kamory any Hesbona,
  - type: text
    content: Dia eo am-bavahadin’ny tanàna be olona;
  - type: note
    content: 'Na: eo am-bavahadin i Beta-rabima.'
  - type: text
    content: Ny oronao dia tahaka ny tilikambo any Libanona,
  - type: text
    content: Izay manandrify an’i Damaskosy.
  '6':
  - type: text
    content: Ny lohanao dia tahaka an’i Karmela,
  - type: text
    content: Ary ny volon-dohanao milantolanto dia somary volomparasy.
  - type: text
    content: Voatanan’ny volo olioly ny mpanjaka!
  '7':
  - type: text
    content: Endrey! tsara tarehy sady mahafinaritra hianao,
  - type: text
    content: Ry malala,
  - type: note
    content: Heb. ry fitiavana.
  - type: text
    content: ' amin’izao zava-mahafinaritra rehetra izao!'
  '8':
  - type: text
    content: Izato tsangananao dia tahaka ny rofia,
  - type: note
    content: palma.
  - type: text
    content: Ary ny nononao dia tahaka ny sampahony.
  '9':
  - type: text
    content: 'Hoy izaho: Hananika ny rofia aho'
  - type: note
    content: palma.
  - type: text
    content: Ka handray ny rantsany;
  - type: text
    content: Ary aoka ny nononao ho toy ny sampahom-boaloboka amiko,
  - type: text
    content: Ary ny fofonainao ho tahaka ny an’ny poma,
