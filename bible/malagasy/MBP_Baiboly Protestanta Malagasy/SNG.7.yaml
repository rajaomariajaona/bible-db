segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miverena, miverena, ry Solemita; Miverena, miverena, mba hijerenay anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no hitanareo amin’ny Solemita?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dihy tahaka ny an’i Mahanaima.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ataon’ny mpandihy roa tonta; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Gen. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxxii.2, 3.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Endrey! mahate-hijery ny famindran’ny tongotrao mikiraro,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mikapa.
    marker-yv: yv-n
  - type: text
    text: ' ry zazavavy zanak’andriana!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny firavaka ny amboampenao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataon’ny tànan’ny mahay zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny foitrao dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tahaka ny
  - type: text
    text: ' tomaboha kivorivory;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho diso divay noharoharoan-java-manitra anie izy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny kibonao dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tahaka ny
  - type: text
    text: ' vary tritika voatoby'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voaravaka lilia manodidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny nononao roa dia tahaka ny gazela kambana mbola tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vozonao dia tahaka ny tilikambo ivory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masonao dia tahaka ny kamory any Hesbona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo am-bavahadin’ny tanàna be olona;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo am-bavahadin i Beta-rabima.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny oronao dia tahaka ny tilikambo any Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manandrify an’i Damaskosy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lohanao dia tahaka an’i Karmela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volon-dohanao milantolanto dia somary volomparasy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatanan’ny volo olioly ny mpanjaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Endrey! tsara tarehy sady mahafinaritra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry malala,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ry fitiavana.
    marker-yv: yv-n
  - type: text
    text: ' amin’izao zava-mahafinaritra rehetra izao!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izato tsangananao dia tahaka ny rofia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nononao dia tahaka ny sampahony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy izaho: Hananika ny rofia aho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handray ny rantsany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny nononao ho toy ny sampahom-boaloboka amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofonainao ho tahaka ny an’ny poma,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny vavanao dia toy ny divay tsara,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, divay mikorotsaka mora eo an-tendan’ny malalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miditra misononoka amin’ny molotry ny matory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: An’ny malalako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manina ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ho amiko ny faniriany; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Gen. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iii.16.
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avia, ry malalako, aoka handeha ho any an-tsaha isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha handry any ambani-vohitra isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia aoka hifoha maraina koa ho any an-tanimboaloboka isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hizahantsika raha mitsimoka ny voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mivelatra ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamony ny ampongabendanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any no hanehoako ny fitiavako anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mamerovero tsara ny dodaima,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mandragora; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Gen. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxx.14.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ao am-bavahadintsika misy voankazo tsara samy hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na ny vao na ny ela:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa notehiriziko ho anao izany, ry malalako.
