document_id: AMO.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: NY tenin’i Amosa, izay isan’ny mpiandry ondry tao Tekoa, dia izay hitany ny amin’ny Isiraely tamin’ny andro nanjakan’i Ozia, mpanjakan’ny Joda, sy tamin’ny andro nanjakan’i Jeroboama, zanak’i Joasy, mpanjakan’ny Isiraely, roa taona talohan’ny horohorontany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny loza hanjo ny firenena enina amin’ny jentilisa sy ny Joda, ary indrindra fa ny Isiraely.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa haterako afo ny màndan’i Tyro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handevona ny tranobeny izany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahotana telon’i Edoma, eny, efatra aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy havelako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy hahemotro.
      marker-yv: yv-n
    - type: text
      text: ' izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nanenjika ny rahalahiny tamin’ny sabatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nofoanany ny fiantrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatezerany dia namiravira mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavinirany notehiriziny lalandava;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa haterako afo ao Temana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handevona ny tranoben’i Bozra izany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahotana telon’ny taranak’i Amona, eny, efatra aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy havelako
    - type: usfm
