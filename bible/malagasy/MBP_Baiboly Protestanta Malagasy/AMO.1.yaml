    - type: text
      text: ' izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria notatahany izay bevohoka tao Gileada,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanitarany ny fari-taniny;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hampirehitra afo ao amin’ny màndan’i Raba Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handevona ny tranobeny izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hisy akora amin’ny andro iadiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy rivo-mahery amin’ny andron’ny tadio;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho lasan-ko babo ny mpanjakany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ireo mpanapaka rehetra ao aminy, hoy Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah mierona ao Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampikotroka any Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny saha fiandrasana ondry dia mitomany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maina ny tampon’i Karmela.
