document_id: AMO.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Amosa, izay isan’ny mpiandry ondry tao Tekoa, dia izay hitany ny amin’ny Isiraely tamin’ny andro nanjakan’i Ozia, mpanjakan’ny Joda, sy tamin’ny andro nanjakan’i Jeroboama, zanak’i Joasy, mpanjakan’ny Isiraely, roa taona talohan’ny horohorontany.
  - type: heading
    content: Ny loza hanjo ny firenena enina amin’ny jentilisa sy ny Joda, ary indrindra fa ny Isiraely.
  '10':
  - type: text
    content: Fa haterako afo ny màndan’i Tyro,
  - type: text
    content: Ka handevona ny tranobeny izany.
  '11':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Edoma, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria nanenjika ny rahalahiny tamin’ny sabatra izy,
  - type: text
    content: Ka nofoanany ny fiantrany;
  - type: text
    content: Ny fahatezerany dia namiravira mandrakariva,
  - type: text
    content: Ary ny fahavinirany notehiriziny lalandava;
  '12':
  - type: text
    content: Fa haterako afo ao Temana,
  - type: text
    content: Ka handevona ny tranoben’i Bozra izany.
  '13':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’ny taranak’i Amona, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria notatahany izay bevohoka tao Gileada,
  - type: text
    content: Hanitarany ny fari-taniny;
  '14':
  - type: text
    content: Fa hampirehitra afo ao amin’ny màndan’i Raba Aho,
  - type: text
    content: Ka handevona ny tranobeny izany,
  - type: text
    content: Sady hisy akora amin’ny andro iadiana
  - type: text
    content: Sy rivo-mahery amin’ny andron’ny tadio;
  '15':
  - type: text
    content: Dia ho lasan-ko babo ny mpanjakany
  - type: text
    content: Mbamin’ireo mpanapaka rehetra ao aminy, hoy Jehovah.
  '2':
  - type: text
    content: 'ARY hoy izy:'
  - type: text
    content: Jehovah mierona ao Ziona
  - type: text
    content: Ary mampikotroka any Jerosalema;
  - type: text
    content: Ny saha fiandrasana ondry dia mitomany
  - type: text
    content: Ary maina ny tampon’i Karmela.
  '3':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Damaskosy, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria kodia vy no nivelezany an’i Gileada;
  '4':
  - type: text
    content: Fa haterako afo ny tranon’i Hazaela,
  - type: text
    content: Ka handevona ny tranoben’i Beni-hadada izany.
  '5':
  - type: text
    content: Hotorotoroiko koa ny hidin’i Damaskosy,
  - type: text
    content: Ary hofoanako tsy hisy mponina
  - type: note
    content: 'Na: mpanapaka.'
  - type: text
    content: ' ny lohasahan’i Avena,'
  - type: text
    content: Ary Bet-edena tsy hisy hitana tehina fanapahana;
  - type: text
    content: Ary ny vahoakan’i Syria dia ho lasan-ko babo any Kira, hoy Jehovah.
  '6':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Gaza, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria lasany ho babo avokoa ny olona
  - type: text
    content: Hatolony ho any Edoma;
  '7':
  - type: text
    content: Fa haterako afo ny màndan’i Gaza,
  - type: text
    content: Ka handevona ny tranobeny izany;
  '8':
  - type: text
    content: Ary hofoanako Asdoda tsy hisy mponina,
  - type: text
    content: Ary Askelona tsy hisy hitana tehina fanapahana;
  - type: text
    content: Dia haveriko ny tànako hamely an’i Ekrona,
  - type: text
    content: Ka ho faty izay sisa amin’ny Filistina, hoy Jehovah Tompo.
  '9':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Tyro, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria natolony ho any Edoma ny babo rehetra,
  - type: text
    content: Ary tsy notsarovany ny fanekem-pirahalahiana;
