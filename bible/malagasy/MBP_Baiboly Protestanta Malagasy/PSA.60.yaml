document_id: PSA.60,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiantsoan’ny efa resim-pahavalo mba hotsarovan’Andriamanitra ny teniny.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-shoshan-edoth. Miktama nataon’i Davida hampianarana, fony izy nanafika an’i Mesopotamia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arama-naharaima.
      marker-yv: yv-n
    - type: text
      text: ' sy Arama-zoba, tamin’ny niverenan’i Joaba ka namelezany ny Edomita roa arivo amby iray alin-dahy teo amin’ny Lohasahan-tsira.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA ô, efa nanary sy nampihahaka anay Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tezitra Hianao, velombelomy izahay.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy Hianao va, Izay efa nanary anay,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy efa nanary anay va Hianao?
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy nivoaka niaraka tamin’ny antokon’ny miaramilanay, Andriamanitra ô?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vonjeo amin’ny mpandrafy izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa zava-poana ny famonjena ataon’ny olona.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Andriamanitra no haherezantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Efa nampihorohoro ny tany Hianao ka namaky azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary izay rava aminy, fa mihozongozona izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa nampahita ny olonao zava-tsarotra Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nampisotro anay divay mampiraikiraiky.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Efa notoloranao faneva ny matahotra Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsangany noho ny fahamarinana.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mba hahafahan’ny malalanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia vonjeo amin’ny tànanao ankavanana aho, ka valio.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifaly Aho ka hizara an’i Sekema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lohasahan’i Sokota horefesiko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ahy Gileada, Ahy koa Manase;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aron’ny lohako Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tehim-panjakako Joda;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tavin-dranoko fanasana Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Edoma no anipazako ny kapako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia noho ny amiko, ry Filistia.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Iza no hitondra ahy ho any an-tanàna mafy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hitarika ahy ho any Edoma?
