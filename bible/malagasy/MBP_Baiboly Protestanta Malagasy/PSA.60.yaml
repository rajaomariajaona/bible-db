document_id: PSA.60,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoan’ny efa resim-pahavalo mba hotsarovan’Andriamanitra ny teniny.
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshan-edoth. Miktama nataon’i Davida hampianarana, fony izy nanafika an’i Mesopotamia
  - type: note
    content: Arama-naharaima.
  - type: text
    content: ' sy Arama-zoba, tamin’ny niverenan’i Joaba ka namelezany ny Edomita roa arivo amby iray alin-dahy teo amin’ny Lohasahan-tsira.'
  - type: text
    content: ANDRIAMANITRA ô, efa nanary sy nampihahaka anay Hianao;
  - type: text
    content: Efa tezitra Hianao, velombelomy izahay.
  '10':
  - type: text
    content: Tsy Hianao va, Izay efa nanary anay,
  - type: note
    content: 'Na: Tsy efa nanary anay va Hianao?'
  - type: text
    content: ' Andriamanitra ô,'
  - type: text
    content: Sady tsy nivoaka niaraka tamin’ny antokon’ny miaramilanay, Andriamanitra ô?
  '11':
  - type: text
    content: Vonjeo amin’ny mpandrafy izahay;
  - type: text
    content: Fa zava-poana ny famonjena ataon’ny olona.
  '12':
  - type: text
    content: Andriamanitra no haherezantsika;
  - type: text
    content: Fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: Efa nampihorohoro ny tany Hianao ka namaky azy;
  - type: text
    content: Amboary izay rava aminy, fa mihozongozona izy.
  '3':
  - type: text
    content: Efa nampahita ny olonao zava-tsarotra Hianao,
  - type: text
    content: Ary efa nampisotro anay divay mampiraikiraiky.
  '4':
  - type: text
    content: Efa notoloranao faneva ny matahotra Anao,
  - type: text
    content: Hatsangany noho ny fahamarinana.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Mba hahafahan’ny malalanao,
  - type: text
    content: Dia vonjeo amin’ny tànanao ankavanana aho, ka valio.
  '6':
  - type: text
    content: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
  - type: text
    content: Hifaly Aho ka hizara an’i Sekema;
  - type: text
    content: Ary ny lohasahan’i Sokota horefesiko.
  '7':
  - type: text
    content: Ahy Gileada, Ahy koa Manase;
  - type: text
    content: Ary aron’ny lohako Efraima;
  - type: text
    content: Tehim-panjakako Joda;
  '8':
  - type: text
    content: Tavin-dranoko fanasana Moaba;
  - type: text
    content: Edoma no anipazako ny kapako;
  - type: text
    content: Mihobia noho ny amiko, ry Filistia.
  '9':
  - type: text
    content: Iza no hitondra ahy ho any an-tanàna mafy?
  - type: text
    content: Iza no hitarika ahy ho any Edoma?
