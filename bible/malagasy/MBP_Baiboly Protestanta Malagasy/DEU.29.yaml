document_id: DEU.29,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia niantso ny Isiraely rehetra Mosesy ka nanao taminy hoe: Hianareo efa nahita izay rehetra nataon’i Jehovah teo imasonareo tany amin’ny tany Egypta tamin’i Farao sy ny mpanompony rehetra ary ny taniny rehetra, '
  '10':
  - type: text
    content: 'ny zanakareo madinika koa sy ny vadinareo ary ny vahiny eo amin’ny tobinareo mbamin’ny mpikapa hazonao sy ny mpantsaka ranonao– '
  '11':
  - type: text
    content: 'hidiranao amin’ny faneken’i Jehovah Andriamanitrao sy ny fianianana, izay ataon’i Jehovah Andriamanitrao aminao anio, '
  '12':
  - type: text
    content: hanandratany anao ho fireneny, ary mba ho Andriamanitrao Izy, araka izay nolazainy taminao sy araka izay nianianany tamin’ny razanao, dia Abrahama sy Isaka ary Jakoba.
  '13':
  - type: text
    content: 'Ary tsy aminareo ihany no anaovako izao fanekena sy fianianana izao, '
  '14':
  - type: text
    content: 'fa amin’izay eto amintsika anio eto anatrehan’i Jehovah Andriamanitsika sy amin’izay tsy eto amintsika anio koa; '
  '15':
  - type: text
    content: 'fa fantatrareo izay nitoerantsika tany amin’ny tany Egypta sy izay nandehanantsika namaky ny tanin’ny jentilisa; '
  '16':
  - type: text
    content: 'ary efa hitanareo ny fahavetavetany sy ny sampiny hazo sy vato sy volafotsy ary volamena, izay teo aminy; '
  '17':
  - type: text
    content: 'fandrao hisy lehilahy, na vehivavy, na mpianakavy, na firenena eo aminareo, izay manana fo mivily anio, ka miala amin’i Jehovah Andriamanitsika, handehanany hanompo ny andriamanitr’ireny firenena ireny; fandrao hisy faka eo aminareo izay miteraka zava-mangidy sady mahafaty; '
  '18':
  - type: text
    content: 'ary raha ren’izany olona izany ny tenin’ity fanozonana ity, dia hiarahaba tena ao am-pony izy ka hanao hoe: Hanam-piadanana aho, fa hanaraka ny ditry ny foko,–handringanana ny leony mbamin’ny mangetaheta.'
  - type: note
    content: 'Na: hanampiana fahamamoana amin’ny hetaheta.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ary Jehovah dia tsy hety hamela ny helony, fa hanetroka amin’izany lehilahy izany ny fahatezeran’i Jehovah sy ny fahasaro-piarony, ary hitoetra aminy ny fanozonana rehetra izay voasoratra amin’ity boky ity, ka hovonoin’i Jehovah tsy ho eo ambanin’ny lanitra ny anarany. '
  '2':
  - type: text
    content: 'dia ny fizahan-toetra lehibe, izay efa hitan’ny masonao, dia ireny famantarana sy fahagagana lehibe ireny. '
  '20':
  - type: text
    content: Dia hosarahin’i Jehovah amin’ny firenen’Isiraely rehetra ho amin’ny loza izy, araka ny fanozonana rehetra amin’ny fanekena izay voasoratra amin’ity bokin’ny lalàna ity.
  '21':
  - type: text
    content: 'Ary hiteny ny taranaka any aoriana, dia ny zanakareo izay hitsangana handimby anareo, sy ny vahiny avy amin’ny tany lavitra, raha mahita ny kapoka natao tamin’ity tany ity sy ny faharariana izay nampahararian’i Jehovah azy– '
  '22':
  - type: text
    content: 'fa ho solifara sy sira ary fahamaizana ny tany rehetra eo: tsy hofafazana izy, na hanirian-javatra, sady tsy hisy ahitra akory hitrebona ao, tahaka ny nandravana an’i Sodoma sy Gomora sy Adma ary Zeboima, izay noravan’i Jehovah tamin’ny fahavinirany sy ny fahatezerany– '
  '23':
  - type: text
    content: 'dia hiteny ny firenena rehetra hoe: Nahoana Jehovah no dia nanao toy izany tamin’ity tany ity? Inona no hevitry ny firehetan’izao fahatezerana lehibe izao? '
  '24':
  - type: text
    content: 'Dia hiteny ny vahoaka ka hanao hoe: Satria izy nahafoy ny faneken’i Jehovah, Andriamanitry ny razany, izay nataony taminy fony Izy nitondra azy nivoaka avy tany amin’ny tany Egypta. '
  '25':
  - type: text
    content: 'Fa nandeha izy ka nanompo andriamani-kafa sady niankohoka teo anatrehany, dia andriamanitra izay tsy fantany sady tsy nomena azy; '
  '26':
  - type: text
    content: 'dia nirehitra tamin’ity tany ity ny fahatezeran’i Jehovah, ka nataony tonga taminy avokoa ny fanozonana rehetra izay voasoratra eto amin’ity boky ity; '
  '27':
  - type: text
    content: ary fahavinirana sy fahatezerana ary fahatezerana mirehitra no nandroahan’i Jehovah azy tsy ho eo amin’ny taniny sy nampandehanany azy ho any amin’ny tany hafa, tahaka ny amin’izao anio izao.
  '28':
  - type: text
    content: An’i Jehovah Andriamanitsika ny zava-miafina; fa antsika sy ny zanatsika mandrakizay kosa ny zavatra ambara, hankatoavantsika ny teny rehetra amin’ity lalàna ity.
  '3':
  - type: text
    content: 'Nefa tsy nomen’i Jehovah fo hahalala sy maso hahita ary sofina handre hianareo mandraka andro-any. '
  '4':
  - type: text
    content: 'Dia nitondra anareo tany an-efitra efa-polo taona aho; tsy rovitra teny aminareo ny fitafianareo, ary tsy rovitra teo amin’ny tongotrao ny kapanao. '
  '5':
  - type: text
    content: Tsy mofo no fihinanareo, ary tsy divay na toaka no fisotronareo, mba ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.
  '6':
  - type: text
    content: 'Ary nony tonga tamin’ity tany ity hianareo, dia nivoaka Sihona, mpanjakan’i Hesbona, sy Oga, mpanjakan’i Basana, hiady amintsika, dia resintsika izy roa lahy. '
  '7':
  - type: text
    content: Ary nalaintsika ny taniny ka nomentsika ho zara-tanin’ny Robenita sy ny Gadita ary ny antsasaky ny firenen’i Manase.
  '8':
  - type: text
    content: Dia tandremo ny tenin’izao fanekena izao, ka araho, mba hambinina hianareo amin’izay rehetra ataonareo.
  '9':
  - type: text
    content: 'Hianareo rehetra miseho eto anatrehan’i Jehovah Andriamanitrareo anio–dia ny lehibenareo sy ny firenenareo, ny lohan’ny firenenareo sy ny mpifehy anareo ary ny lehilahy rehetra amin’ny Isiraely, '
