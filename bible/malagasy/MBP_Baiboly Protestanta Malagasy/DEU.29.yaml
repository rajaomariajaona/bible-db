document_id: DEU.29,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niantso ny Isiraely rehetra Mosesy ka nanao taminy hoe: Hianareo efa nahita izay rehetra nataon’i Jehovah teo imasonareo tany amin’ny tany Egypta tamin’i Farao sy ny mpanompony rehetra ary ny taniny rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ny zanakareo madinika koa sy ny vadinareo ary ny vahiny eo amin’ny tobinareo mbamin’ny mpikapa hazonao sy ny mpantsaka ranonao– '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'hidiranao amin’ny faneken’i Jehovah Andriamanitrao sy ny fianianana, izay ataon’i Jehovah Andriamanitrao aminao anio, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: hanandratany anao ho fireneny, ary mba ho Andriamanitrao Izy, araka izay nolazainy taminao sy araka izay nianianany tamin’ny razanao, dia Abrahama sy Isaka ary Jakoba.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary tsy aminareo ihany no anaovako izao fanekena sy fianianana izao, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa amin’izay eto amintsika anio eto anatrehan’i Jehovah Andriamanitsika sy amin’izay tsy eto amintsika anio koa; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa fantatrareo izay nitoerantsika tany amin’ny tany Egypta sy izay nandehanantsika namaky ny tanin’ny jentilisa; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary efa hitanareo ny fahavetavetany sy ny sampiny hazo sy vato sy volafotsy ary volamena, izay teo aminy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fandrao hisy lehilahy, na vehivavy, na mpianakavy, na firenena eo aminareo, izay manana fo mivily anio, ka miala amin’i Jehovah Andriamanitsika, handehanany hanompo ny andriamanitr’ireny firenena ireny; fandrao hisy faka eo aminareo izay miteraka zava-mangidy sady mahafaty; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary raha ren’izany olona izany ny tenin’ity fanozonana ity, dia hiarahaba tena ao am-pony izy ka hanao hoe: Hanam-piadanana aho, fa hanaraka ny ditry ny foko,–handringanana ny leony mbamin’ny mangetaheta.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanampiana fahamamoana amin’ny hetaheta.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Jehovah dia tsy hety hamela ny helony, fa hanetroka amin’izany lehilahy izany ny fahatezeran’i Jehovah sy ny fahasaro-piarony, ary hitoetra aminy ny fanozonana rehetra izay voasoratra amin’ity boky ity, ka hovonoin’i Jehovah tsy ho eo ambanin’ny lanitra ny anarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia ny fizahan-toetra lehibe, izay efa hitan’ny masonao, dia ireny famantarana sy fahagagana lehibe ireny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia hosarahin’i Jehovah amin’ny firenen’Isiraely rehetra ho amin’ny loza izy, araka ny fanozonana rehetra amin’ny fanekena izay voasoratra amin’ity bokin’ny lalàna ity.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hiteny ny taranaka any aoriana, dia ny zanakareo izay hitsangana handimby anareo, sy ny vahiny avy amin’ny tany lavitra, raha mahita ny kapoka natao tamin’ity tany ity sy ny faharariana izay nampahararian’i Jehovah azy– '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'fa ho solifara sy sira ary fahamaizana ny tany rehetra eo: tsy hofafazana izy, na hanirian-javatra, sady tsy hisy ahitra akory hitrebona ao, tahaka ny nandravana an’i Sodoma sy Gomora sy Adma ary Zeboima, izay noravan’i Jehovah tamin’ny fahavinirany sy ny fahatezerany– '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'dia hiteny ny firenena rehetra hoe: Nahoana Jehovah no dia nanao toy izany tamin’ity tany ity? Inona no hevitry ny firehetan’izao fahatezerana lehibe izao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia hiteny ny vahoaka ka hanao hoe: Satria izy nahafoy ny faneken’i Jehovah, Andriamanitry ny razany, izay nataony taminy fony Izy nitondra azy nivoaka avy tany amin’ny tany Egypta. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa nandeha izy ka nanompo andriamani-kafa sady niankohoka teo anatrehany, dia andriamanitra izay tsy fantany sady tsy nomena azy; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'dia nirehitra tamin’ity tany ity ny fahatezeran’i Jehovah, ka nataony tonga taminy avokoa ny fanozonana rehetra izay voasoratra eto amin’ity boky ity; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ary fahavinirana sy fahatezerana ary fahatezerana mirehitra no nandroahan’i Jehovah azy tsy ho eo amin’ny taniny sy nampandehanany azy ho any amin’ny tany hafa, tahaka ny amin’izao anio izao.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: An’i Jehovah Andriamanitsika ny zava-miafina; fa antsika sy ny zanatsika mandrakizay kosa ny zavatra ambara, hankatoavantsika ny teny rehetra amin’ity lalàna ity.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nefa tsy nomen’i Jehovah fo hahalala sy maso hahita ary sofina handre hianareo mandraka andro-any. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nitondra anareo tany an-efitra efa-polo taona aho; tsy rovitra teny aminareo ny fitafianareo, ary tsy rovitra teo amin’ny tongotrao ny kapanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mofo no fihinanareo, ary tsy divay na toaka no fisotronareo, mba ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nony tonga tamin’ity tany ity hianareo, dia nivoaka Sihona, mpanjakan’i Hesbona, sy Oga, mpanjakan’i Basana, hiady amintsika, dia resintsika izy roa lahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary nalaintsika ny taniny ka nomentsika ho zara-tanin’ny Robenita sy ny Gadita ary ny antsasaky ny firenen’i Manase.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia tandremo ny tenin’izao fanekena izao, ka araho, mba hambinina hianareo amin’izay rehetra ataonareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hianareo rehetra miseho eto anatrehan’i Jehovah Andriamanitrareo anio–dia ny lehibenareo sy ny firenenareo, ny lohan’ny firenenareo sy ny mpifehy anareo ary ny lehilahy rehetra amin’ny Isiraely, '
