document_id: 1SA.29,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanesorana an’i Davida tsy hiaraka tamin’ny miaramilan’ny Filistina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY ny Filistina dia namory ny miaramilany rehetra ho ao Afeka; fa ny Isiraely kosa nitoby teo anilan’ny loharano ao Jezirela.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mifohaza maraina koa hianao mbamin’ny mpanompon’ny tomponao izay nanaraka anao; ary rehefa nifoha maraina hianareo, ka mazava ny andro, dia mandehana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Davida sy ny olony nifoha maraina koa handeha maraina hiverina any amin’ny tanin’ny Filistina. Ary ny Filistina dia niakatra nankany Jezirela.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo andrianan’ny Filistina nandroso nitarika ny miaramilany isan-jato sy isan-arivo; fa Davida sy ny olony kosa nandroso teo aoriana niaraka tamin’i Akisy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo andrianan’ny Filistina: Haninona moa ireto Hebreo ireto? Ary hoy Akisy tamin’ireo andrianan’ny Filistina: Tsy io va no Davida, mpanompon’i Saoly, mpanjakan’ny Isiraely, ilay tatỳ amiko elaela ihany izay, ary tsy hitako izay tsininy hatrizay nialany niandany tamiko ka mandraka andro-any?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tezitra taminy ireo andrianan’ny Filistina ka nanao taminy hoe: Avereno ihany ilehio ho any amin’ny fonenany izay efa nomenao azy, fa aza avela hidina hiaraka amintsika hiady izy, fandrao ho tonga fahavalontsika raha miady; fa amin’inona no hahazoan’io sitraka amin’ny tompony? Tsy amin’ny lohan’ireto olona ireto va? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy io moa no Davida, izay nandihizany sy nanaovany hira mifamaly hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',Saoly nahafaty arivoarivo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Davida nahafaty alinalina’?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Akisy niantso an’i Davida ka nanao taminy hoe: Raha velona koa Jehovah, marina hianao, sady sitrako ny iarahanao miditra sy mivoaka amiko eto an-toby, fa tsy hitako izay tsininao hatrizay nahatongavanao teto amiko ka mandraka andro-any; nefa kosa tsy sitrak’ireo andriana ireo hianao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa miverena, ary mandehana soa aman-tsara, mba tsy hanaovanao izay tsy sitrak’ireo andrianan’ny Filistina.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Davida tamin’i Akisy: Inona no nataoko, ary inona no hitanao tamin’ny mpanomponao hatrizay nitoerako tatỳ aminao ka mandraka andro-any, no tsy hahazoako mandeha hiady amin’ny fahavalon’ny mpanjaka tompoko? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Akisy namaly an’i Davida hoe: Fantatro fa tsara eo imasoko tahaka ny anjelin’Andriamanitra hianao; nefa ireo andrianan’ny Filistina no nanao hoe: Tsy hiara-miakatra amintsika hiady izy. '
