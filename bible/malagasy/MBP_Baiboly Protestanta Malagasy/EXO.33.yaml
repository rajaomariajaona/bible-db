document_id: EXO.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitenenan’Andriamanitra ny Zanak’Isiraely, sy ny nanetren’ireo tena.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy hoe: Mandehana miakatra hiala atỳ hianao sy ny firenena izay nentinao niakatra avy tany amin’ny tany Egypta, ho amin’ny tany izay nianianako amin’i Abrahama sy Isaka ary Jakoba hoe: Ny taranakao no homeko azy. '
  '10':
  - type: text
    content: 'Ary hitan’ny olona rehetra ny andri-rahona nijanona teo anoloan’ny varavaran’ny lay; dia nitsangana ny olona rehetra, ka samy niankohoka teo anoloan’ny varavaran’ny lainy avy. '
  '11':
  - type: text
    content: Ary Jehovah niteny nifanatrika tamin’i Mosesy, tahaka ny olona miresaka amin’ny sakaizany. Ary niverina nankeo amin’ny toby izy; fa ny mpanompony, dia Josoa zatovo, zanak’i Nona, tsy niala tamin’ny lay.
  '12':
  - type: text
    content: 'Ary hoy Mosesy tamin’i Jehovah: Indro fa Hianao milaza amiko hoe: Ento miakatra ity firenena ity, ary Hianao tsy mbola nampahafantatra ahy izay hirahinao hiaraka amiko; kanefa Hianao efa nilaza hoe: Mahalala anao tokoa'
  - type: note
    content: Heb. amin’ny anarana.
  - type: text
    content: ' Aho, ary efa nahita fitia eo imasoko koa hianao. '
  '13':
  - type: text
    content: Koa ankehitriny, raha nahita fitia eo imasonao aho, dia ampahafantaro ny làlanao hahalalako Anao, mba hahitako fitia eo imasonao; ary hevero fa olonao ity firenena ity.
  '14':
  - type: text
    content: 'Dia hoy Izy: Ny Tavako'
  - type: note
    content: Izahao Isa. lxiii. 9.
  - type: text
    content: ' no handeha, dia hanome anao fitsaharana Aho.'
  '15':
  - type: text
    content: 'Fa hoy Mosesy taminy: Raha tsy handeha ny Tavanao, dia aza mitondra anay hiakatra hiala atỳ. '
  '16':
  - type: text
    content: Fa inona anefa no hahafantarana fa nahita fitia eo imasonao izaho sy ny olonao? moa tsy amin’ny handehananao miaraka aminay va? dia ho voàvaka amin’ny firenena rehetra ambonin’ny tany izahay, dia izaho sy ny olonao.
  '17':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Izao zavatra nolazainao izao dia hataoko koa; fa nahita fitia eo imasoko hianao, ary mahalala anao tokoa Aho.'
  '18':
  - type: text
    content: 'Ary hoy Mosesy: Mba ampahitao ny voninahitrao aho.'
  '19':
  - type: text
    content: 'Fa hoy kosa Jehovah: Izaho hampandalo ny fahatsarako rehetra eo anatrehanao ka hanonona ny anaran’i Jehovah eo anatrehanao; fa hiantra izay hiantrako Aho, ary hamindra fo amin’izay hamindrako fo. '
  '2':
  - type: text
    content: 'Ary haniraka Anjely Aho hitarika anao eo aloha (ka horoahiko ny Kananita sy ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita), '
  '20':
  - type: text
    content: 'Ary hoy koa Izy: Tsy mahazo mahita ny tavako hianao; fa tsy misy olona mahita Ahy ka ho velona. '
  '21':
  - type: text
    content: 'Dia hoy Jehovah: Indro, misy fitoerana eto anilako; dia hijanona eo ambonin’ny harambato hianao; '
  '22':
  - type: text
    content: 'koa raha mandalo ny voninahitro, dia hataoko eo an-tsefaky ny harambato hianao, ka hosaronako ny tànako hianao mandra-pandaloko. '
  '23':
  - type: text
    content: Dia hanaisotra ny tànako Aho, ka hahita ny vohoko hainao; fa ny tavako tsy ho hita.
  '3':
  - type: text
    content: dia ho amin’izay tany tondra-dronono sy tantely; nefa tsy hiara-miakatra aminao Aho (satria olona mafy hatoka hianao), fandrao handringana anao eny an-dàlana Aho.
  '4':
  - type: text
    content: 'Ary rehefa ren’ny olona izany teny mampahory izany, dia nanjoretra izy, ka tsy nisy olona niravaka intsony. '
  '5':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Lazao amin’ny Zanak’Isiraely hoe: Hianareo dia olona mafy hatoka; koa raha hiara-miakatra aminao Aho, na dia indray mipì-maso aza, dia handringana anao Aho; koa ankehitriny, esory ny firavakao hiala aminao, mba ho fantatro izay hataoko aminao. '
  '6':
  - type: text
    content: Ary ny Zanak’Isiraely dia nanala ny firàvany hatreo an-tendrombohitra Horeba.
  - type: heading
    content: Ny nihaonan’i Mosesy tamin’Andriamanitra, sy ny naneken’Andriamanitra ny fangatahany.
  '7':
  - type: text
    content: ARY fanaon’i Mosesy ny maka ny lay ka manorina azy eo ivelan’ny toby lavidavitra, ary ny anarany dia nataony hoe ’Ny trano-lay fihaonana.’ Ary izay rehetra nitady an’i Jehovah dia nivoaka ho eny amin’ny trano-lay fihaonana izay teo ivelan’ny toby.
  '8':
  - type: text
    content: 'Ary raha nivoaka ho eo amin’ny lay Mosesy, dia nitsangana ny olona rehetra, ka samy nijanona teo anoloan’ny varavaran’ny lainy avy, dia nitazana an’i Mosesy mandra-pahatongany ao amin’ny lay. '
  '9':
  - type: text
    content: 'Ary raha niditra tao amin’ny lay Mosesy, dia nidina ny andri-rahona ka nijanona teo anoloan’ny varavaran’ny lay, ary '
  - type: text
    content: Jehovah
  - type: text
    content: ' dia niresaka tamin’i Mosesy. '
