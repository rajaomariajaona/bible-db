document_id: EXO.33
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitenenan’Andriamanitra ny Zanak’Isiraely, sy ny nanetren’ireo tena.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy hoe: Mandehana miakatra hiala atỳ hianao sy ny firenena izay nentinao niakatra avy tany amin’ny tany Egypta, ho amin’ny tany izay nianianako amin’i Abrahama sy Isaka ary Jakoba hoe: Ny taranakao no homeko azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary haniraka Anjely Aho hitarika anao eo aloha (ka horoahiko ny Kananita sy ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia ho amin’izay tany tondra-dronono sy tantely; nefa tsy hiara-miakatra aminao Aho (satria olona mafy hatoka hianao), fandrao handringana anao eny an-dàlana Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa ren’ny olona izany teny mampahory izany, dia nanjoretra izy, ka tsy nisy olona niravaka intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Lazao amin’ny Zanak’Isiraely hoe: Hianareo dia olona mafy hatoka; koa raha hiara-miakatra aminao Aho, na dia indray mipì-maso aza, dia handringana anao Aho; koa ankehitriny, esory ny firavakao hiala aminao, mba ho fantatro izay hataoko aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny Zanak’Isiraely dia nanala ny firàvany hatreo an-tendrombohitra Horeba.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nihaonan’i Mosesy tamin’Andriamanitra, sy ny naneken’Andriamanitra ny fangatahany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ARY fanaon’i Mosesy ny maka ny lay ka manorina azy eo ivelan’ny toby lavidavitra, ary ny anarany dia nataony hoe ’Ny trano-lay fihaonana.’ Ary izay rehetra nitady an’i Jehovah dia nivoaka ho eny amin’ny trano-lay fihaonana izay teo ivelan’ny toby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha nivoaka ho eo amin’ny lay Mosesy, dia nitsangana ny olona rehetra, ka samy nijanona teo anoloan’ny varavaran’ny lainy avy, dia nitazana an’i Mosesy mandra-pahatongany ao amin’ny lay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha niditra tao amin’ny lay Mosesy, dia nidina ny andri-rahona ka nijanona teo anoloan’ny varavaran’ny lay, ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehovah
  - type: text
    text: ' dia niresaka tamin’i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hitan’ny olona rehetra ny andri-rahona nijanona teo anoloan’ny varavaran’ny lay; dia nitsangana ny olona rehetra, ka samy niankohoka teo anoloan’ny varavaran’ny lainy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Jehovah niteny nifanatrika tamin’i Mosesy, tahaka ny olona miresaka amin’ny sakaizany. Ary niverina nankeo amin’ny toby izy; fa ny mpanompony, dia Josoa zatovo, zanak’i Nona, tsy niala tamin’ny lay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Mosesy tamin’i Jehovah: Indro fa Hianao milaza amiko hoe: Ento miakatra ity firenena ity, ary Hianao tsy mbola nampahafantatra ahy izay hirahinao hiaraka amiko; kanefa Hianao efa nilaza hoe: Mahalala anao tokoa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny anarana.
    marker-yv: yv-n
  - type: text
    text: ' Aho, ary efa nahita fitia eo imasoko koa hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa ankehitriny, raha nahita fitia eo imasonao aho, dia ampahafantaro ny làlanao hahalalako Anao, mba hahitako fitia eo imasonao; ary hevero fa olonao ity firenena ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Izy: Ny Tavako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Izahao Isa. lxiii. 9.
    marker-yv: yv-n
  - type: text
    text: ' no handeha, dia hanome anao fitsaharana Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy Mosesy taminy: Raha tsy handeha ny Tavanao, dia aza mitondra anay hiakatra hiala atỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa inona anefa no hahafantarana fa nahita fitia eo imasonao izaho sy ny olonao? moa tsy amin’ny handehananao miaraka aminay va? dia ho voàvaka amin’ny firenena rehetra ambonin’ny tany izahay, dia izaho sy ny olonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Izao zavatra nolazainao izao dia hataoko koa; fa nahita fitia eo imasoko hianao, ary mahalala anao tokoa Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Mosesy: Mba ampahitao ny voninahitrao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy kosa Jehovah: Izaho hampandalo ny fahatsarako rehetra eo anatrehanao ka hanonona ny anaran’i Jehovah eo anatrehanao; fa hiantra izay hiantrako Aho, ary hamindra fo amin’izay hamindrako fo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy koa Izy: Tsy mahazo mahita ny tavako hianao; fa tsy misy olona mahita Ahy ka ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Jehovah: Indro, misy fitoerana eto anilako; dia hijanona eo ambonin’ny harambato hianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'koa raha mandalo ny voninahitro, dia hataoko eo an-tsefaky ny harambato hianao, ka hosaronako ny tànako hianao mandra-pandaloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hanaisotra ny tànako Aho, ka hahita ny vohoko hainao; fa ny tavako tsy ho hita.
