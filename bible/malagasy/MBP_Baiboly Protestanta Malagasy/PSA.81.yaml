document_id: PSA.81
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana ny Isiraely hifaly amin’Andriamanitra noho ny nitondrany azy nivoaka avy tany Egypta.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Al-gitith. Nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MIHOBIA ho an’Andriamanitra herintsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova feo fifaliana ho an’Andriamanitr’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Asandrato ny hira, ka velezo ny ampongatapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tendreo ny lokanga mahafinaritra mbamin’ny valiha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsofy ny anjomara amin’ny volana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’ny feno-volana, dia amin’ny andro firavoravoantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa lalàna ho an’ny Isiraely izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fitsipik’Andriamanitr’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Notendreny ho vavolombelona eo amin’i Josefa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nandeha namely ny tany Egypta Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandre teny tsy fantatro aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampiala ny sorony tamin’ny entana Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitsahatra tsy nitondra sobiky ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fony azom-pahoriana hianao, dia niantso Ahy, ka namonjy anao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namaly anao tao amin’ny fiafenan’ny kotrokorana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nizaha toetra anao tao amin’ny ranon’i Meriba.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mihainoa, ry oloko, dia hambarako aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie hihaino Ahy hianao, ry Isiraely ô;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza asiana andriamani-kafa eo aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mivavaka amin’ny andriamanitry ny firenena hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izaho no Jehovah Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nitondra anao niakatra avy tany amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atanatanao ny vavanao, dia hofenoiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tsy nihaino ny feoko ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Isiraely tsy nankatò Ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ka dia navelako hanaraka ny ditry ny fony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handehanany manaraka ny fisainan’ny tenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Enga anie ka hihaino Ahy ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handeha amin’ny làlako ny Isiraely;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vetivety dia hampietry ny fahavalony Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamerina ny tànako hamely ny rafiny!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay mankahala an’i Jehovah dia hikoy aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia haharitra mandrakizay ny andron’ny oloko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hampihinana azy vary tsara indrindra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tantely avy amin’ny vatolampy no hamokisako anao.
