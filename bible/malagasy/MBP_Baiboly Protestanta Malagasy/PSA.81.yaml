document_id: PSA.81,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana ny Isiraely hifaly amin’Andriamanitra noho ny nitondrany azy nivoaka avy tany Egypta.
  - type: text
    content: Ho an’ny mpiventy hira. Al-gitith. Nataon’i Asafa.
  - type: text
    content: MIHOBIA ho an’Andriamanitra herintsika;
  - type: text
    content: Manaova feo fifaliana ho an’Andriamanitr’i Jakoba.
  '10':
  - type: text
    content: Izaho no Jehovah Andriamanitrao,
  - type: text
    content: Izay nitondra anao niakatra avy tany amin’ny tany Egypta;
  - type: text
    content: Atanatanao ny vavanao, dia hofenoiko.
  '11':
  - type: text
    content: Fa tsy nihaino ny feoko ny oloko;
  - type: text
    content: Ary ny Isiraely tsy nankatò Ahy;
  '12':
  - type: text
    content: Ka dia navelako hanaraka ny ditry ny fony izy,
  - type: text
    content: Handehanany manaraka ny fisainan’ny tenany.
  '13':
  - type: text
    content: Enga anie ka hihaino Ahy ny oloko,
  - type: text
    content: Dia handeha amin’ny làlako ny Isiraely;
  '14':
  - type: text
    content: Vetivety dia hampietry ny fahavalony Aho
  - type: text
    content: Ka hamerina ny tànako hamely ny rafiny!
  '15':
  - type: text
    content: Izay mankahala an’i Jehovah dia hikoy aminy,
  - type: text
    content: Ka dia haharitra mandrakizay ny andron’ny oloko;
  '16':
  - type: text
    content: Ary hampihinana azy vary tsara indrindra Izy;
  - type: text
    content: Eny, tantely avy amin’ny vatolampy no hamokisako anao.
  '2':
  - type: text
    content: Asandrato ny hira, ka velezo ny ampongatapaka,
  - type: text
    content: Ary tendreo ny lokanga mahafinaritra mbamin’ny valiha.
  '3':
  - type: text
    content: Tsofy ny anjomara amin’ny volana;
  - type: text
    content: Eny, amin’ny feno-volana, dia amin’ny andro firavoravoantsika.
  '4':
  - type: text
    content: Fa lalàna ho an’ny Isiraely izany,
  - type: text
    content: Ary fitsipik’Andriamanitr’i Jakoba.
  '5':
  - type: text
    content: Notendreny ho vavolombelona eo amin’i Josefa izany,
  - type: text
    content: Raha nandeha namely ny tany Egypta Izy;
  - type: text
    content: Nandre teny tsy fantatro aho.
  '6':
  - type: text
    content: Nampiala ny sorony tamin’ny entana Aho;
  - type: text
    content: Nitsahatra tsy nitondra sobiky ny tànany.
  '7':
  - type: text
    content: Fony azom-pahoriana hianao, dia niantso Ahy, ka namonjy anao Aho;
  - type: text
    content: Namaly anao tao amin’ny fiafenan’ny kotrokorana Aho
  - type: text
    content: Ary nizaha toetra anao tao amin’ny ranon’i Meriba.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Mihainoa, ry oloko, dia hambarako aminao;
  - type: text
    content: Enga anie hihaino Ahy hianao, ry Isiraely ô;
  '9':
  - type: text
    content: Aza asiana andriamani-kafa eo aminao;
  - type: text
    content: Ary aza mivavaka amin’ny andriamanitry ny firenena hafa.
