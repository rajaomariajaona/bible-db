document_id: JHN.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nilazan’i Jesosy ny amin’ny hahatongavan’ny Mpananatra, sy ny hihaviany indray.
  - type: text
    content: 'IZANY teny izany dia efa nolazaiko taminareo, mba tsy hahatafintohina anareo. '
  '10':
  - type: text
    content: 'ny fahamarinana, satria mankany amin’ny Ray Aho, ka tsy mahita Ahy intsony hianareo; '
  '11':
  - type: text
    content: ny fitsarana, satria ny andrianan’izao tontolo izao dia efa voatsara.
  '12':
  - type: text
    content: 'Mbola manana zavatra maro holazaina aminareo Aho, nefa tsy zakanareo ankehitriny. '
  '13':
  - type: text
    content: 'Fa raha tonga ny Fanahin’ny fahamarinana, dia Izy no hitari-dàlana anareo ho amin’ny marina rehetra; fa tsy hiteny ho Azy Izy, fa izay ho reny dia holazainy avokoa; ary ny zavatra ho avy aza dia hambarany aminareo. '
  '14':
  - type: text
    content: 'Izy hankalaza Ahy; fa handray avy amin’ny Ahy Izy ka hanambara izany aminareo. '
  '15':
  - type: text
    content: Izay rehetra ananan’ny Ray dia Ahy avokoa, koa izany no nilazako fa mandray avy amin’ny Ahy Izy ka hanambara izany aminareo.
  '16':
  - type: text
    content: 'Vetivety foana dia tsy hahita Ahy intsony hianareo; ary vetivety foana indray dia hahita Ahy hianareo. '
  '17':
  - type: text
    content: 'Ary ny mpianany sasany niresaka hoe: Inona izany nolazainy tamintsika hoe: ,Vetivety foana dia tsy hahita Ahy hianareo; ary vetivety foana indray dia hahita Ahy hianareo,’ ary, ,satria mankany amin’ny Ray Aho’? '
  '18':
  - type: text
    content: 'Ary hoy koa ireo: Inona izany lazainy hoe ,vetivety foana’ izany? Tsy fantatsika izay lazainy.'
  '19':
  - type: text
    content: 'Ary Jesosy nahalala fa ta-hanontany Azy ireo, dia hoy Izy taminy: Mifanontany va hianareo, satria hoy Izaho: ,Vetivety foana dia tsy hahita Ahy hianareo, ary vetivety foana indray dia hahita Ahy hianareo?’ '
  '2':
  - type: text
    content: Handroaka anareo hiala amin’ny synagoga izy; eny, ho avy ny andro,
  - type: note
    content: Gr. ora.
  - type: text
    content: ' ka hataon’izay rehetra mamono anareo fa manatitra fanompoam-pivavahana ho an’Andriamanitra izy. '
  '20':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Hitomany sy hisaona hianareo, fa izao tontolo izao kosa hifaly; ary hianareo halahelo, nefa ny alahelonareo hody fifaliana. '
  '21':
  - type: text
    content: 'Manam-pahoriana ny vehivavy raha miteraka, satria tonga ny fotoany; fa rehefa velon-jaza izy, dia tsy tsaroany intsony ilay fahoriany, noho ny fifaliany fa misy zaza nateraka ho ambonin’ny tany. '
  '22':
  - type: text
    content: 'Ary hianareo dia manana alahelo ankehitriny; fa hahita anareo indray Aho, dia ho faly ny fonareo, ary tsy misy olona manaisotra ny fifalianareo aminareo. '
  '23':
  - type: text
    content: 'Ary amin’izany andro izany dia tsy hanontany Ahy na inona na inona hianareo; lazaiko aminareo marina dia marina tokoa fa na inona na inona hangatahinareo amin’ny Ray dia homeny anareo amin’ny anarako izany. '
  '24':
  - type: text
    content: Mandraka ankehitriny dia tsy mbola nangataka na inona na inona tamin’ny anarako hianareo; mangataha, dia hahazo hianareo, mba ho tanteraka ny fifalianareo.
  '25':
  - type: text
    content: Fanoharana no nilazako izany zavatra izany taminareo; fa ho avy ny andro
  - type: note
    content: Gr. ora.
  - type: text
    content: ' izay tsy hilazako fanoharana aminareo intsony, fa hambarako tsotra aminareo ny amin’ny Ray. '
  '26':
  - type: text
    content: 'Amin’izany andro izany dia hangataka amin’ny anarako hianareo; ary tsy milaza aminareo Aho fa Izaho no hangataka amin’ny Ray ho anareo; '
  '27':
  - type: text
    content: 'fa ny Ray dia tia anareo satria hianareo efa tia Ahy, ary efa nino fa nivoaka avy tamin’ny Ray Aho. '
  '28':
  - type: text
    content: Eny, nivoaka avy tamin’ny Ray Aho ka tonga amin’izao tontolo izao; ary hiala amin’izao tontolo izao indray Aho ka hankany amin’ny Ray.
  '29':
  - type: text
    content: 'Hoy ny mpianany: Indro, milaza tsotra Hianao ankehitriny, fa tsy manao fanoharana akory. '
  '3':
  - type: text
    content: 'Ary izany no hataony, satria tsy fantany ny Ray na Izaho. '
  '30':
  - type: text
    content: Ankehitriny dia fantatray fa mahalala ny zavatra rehetra Hianao ka tsy mitady olona hanontany Anao; izany no inoanay fa nivoaka avy tamin’Andriamanitra Hianao.
  '31':
  - type: text
    content: 'Jesosy namaly azy hoe: Mino va hianareo ankehitriny? '
  '32':
  - type: text
    content: Indro, avy ny andro,
  - type: note
    content: Gr. ora.
  - type: text
    content: ' eny, efa tonga, izay hielezanareo samy ho any amin’ny azy avy, ary hilaozanareo ho irery Aho; kanefa tsy irery Aho, fa ny Ray no ato amiko. '
  '33':
  - type: text
    content: Izany teny izany efa nolazaiko taminareo mba hanananareo fiadanana amiko. Atỳ amin’izao tontolo izao no ahitanareo fahoriana; nefa matokia; Izaho efa naharesy izao tontolo izao.
  '4':
  - type: text
    content: Fa izany teny izany efa nolazaiko taminareo, mba hotsaroanareo, raha tonga ny fotoan’androny, fa Izaho efa nilaza izany taminareo. Ary tsy mba nolazaiko taminareo hatramin’ny voalohany izany, satria mbola tatỳ aminareo ihany Aho.
  '5':
  - type: text
    content: 'Fa ankehitriny mankany amin’Izay naniraka Ahy Aho, ary tsy misy aminareo manontany Ahy hoe: Hankaiza Hianao? '
  '6':
  - type: text
    content: 'Fa satria nilaza izany taminareo Aho, dia vonton’alahelo ny fonareo. '
  '7':
  - type: text
    content: Fa Izaho milaza ny marina aminareo; mahatsara anareo ny fialàko; fa raha tsy hiala Aho, dia tsy ho avy atỳ aminareo ny Mpananatra;
  - type: note
    content: Izahao xiv.16.
  - type: text
    content: ' fa raha handeha Aho, dia hirahiko ho atỳ aminareo Izy. '
  '8':
  - type: text
    content: 'Ary raha tonga Izy, dia hampiaiky izao tontolo izao ny fahotana sy ny fahamarinana ary ny fitsarana: '
  '9':
  - type: text
    content: 'ny fahotana, satria tsy mino Ahy izy; '
