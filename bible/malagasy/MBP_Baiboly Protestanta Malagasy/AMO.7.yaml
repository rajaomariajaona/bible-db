document_id: AMO.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahitana ny amin’ny valala, sy ny afo, ary ny pilao.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAO no nasehon’i Jehovah Tompo tamiko: Indro, nanao ny valala tamin’ny voalohan’ny nitsimohan’ny kolokolon’ahitra Izy; ary, indro, kolokolon’izay nojinjana ho an’ny mpanjaka izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA naniraka tany amin’i Jeroboama, mpanjakan’ny Isiraely, Amazia, ilay mpisorona tao Betela, nanao hoe: Amosa efa nanao tetika hikomy aminao teo amin’ny taranak’Isiraely, ary tsy zakan’ny tany ny teniny rehetra, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria hoy Amosa: Ho fatin-tsabatra Jeroboama, ary hobaboina hiala amin’ny taniny tokoa ny Isiraely.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Amazia tamin’i Amosa: Ry mpahita! andeha mandositra mankany amin’ny tanin’ny Joda hianao, ka mihinàna hanina any, ary maminania any; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa aza maminany eto Betela intsony; fa fitoera-masin’ny mpanjaka sy tranom-panjakana ity. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Amosa ka nanao tamin’i Amazia hoe: Tsy mba mpaminany aho, na zanaky ny mpaminany; fa mpiandry ondry sy mpioty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpandraotra.
      marker-yv: yv-n
    - type: text
      text: ' aviavy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sykomora.
      marker-yv: yv-n
    - type: text
      text: ' ihany aho, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saingy nalain’i Jehovah tany am-piandrasana ondry ka nataony hoe: Mandehana, ka maminania amin’ny Isiraely oloko.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka mba henoy ny tenin’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hianao manao hoe: Aza maminany ny hamelezana ny Isiraely,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza milaza ny hamelezana ny taranak’Isaka;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vadinao hijangajanga ao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zanakao-lahy sy ny zanakao-vavy ho lavon-tsabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taninao hozaraina amin’ny famolaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tenanao ho faty any amin’ny tany maloto;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Isiraely hobaboina hiala amin’ny taniny tokoa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa laniny avokoa ny zava-maniry amin’ny tany, dia hoy izaho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Tompo ô, mifona aminao aho, mamelà heloka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataon’i Jakoba ahoana no fahajanona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa kely izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanenenan’i Jehovah izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy izany, hoy Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no nasehon’i Jehovah Tompo tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Jehovah Tompo miantso hifandahatra hamely amin’ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nandevona ny lalina lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nila handany ny zara lova izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy izaho: Jehovah Tompo ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifona aminao aho, mitsahara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataon’i Jakoba ahoana no fahajanona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa kely izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanenenan’i Jehovah izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy izany, hoy Jehovah Tompo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin’ny mànda natao tamin’ny pilao, sady nisy pilao teny an-tànany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Amosa? Ary hoy izaho: Pilao. Dia hoy ny Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hanisy pilao eo amin’ny Isiraely oloko Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy handefitra aminy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: handalo azy.
      marker-yv: yv-n
    - type: text
      text: ' intsony;'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho foana ny fitoerana avon’Isaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho rava ny fitoera-masin’Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitsangana Aho ka hamely sabatra ny taranak’i Jeroboama.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny natao tamin’i Amosa tao Betela, sy ny teny nataony tamin’izany.
    marker-yv: yv-h
