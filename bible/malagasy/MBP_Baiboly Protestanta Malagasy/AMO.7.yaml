document_id: AMO.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana ny amin’ny valala, sy ny afo, ary ny pilao.
  - type: text
    content: 'IZAO no nasehon’i Jehovah Tompo tamiko: Indro, nanao ny valala tamin’ny voalohan’ny nitsimohan’ny kolokolon’ahitra Izy; ary, indro, kolokolon’izay nojinjana ho an’ny mpanjaka izany. '
  '10':
  - type: text
    content: 'DIA naniraka tany amin’i Jeroboama, mpanjakan’ny Isiraely, Amazia, ilay mpisorona tao Betela, nanao hoe: Amosa efa nanao tetika hikomy aminao teo amin’ny taranak’Isiraely, ary tsy zakan’ny tany ny teniny rehetra, '
  '11':
  - type: text
    content: 'satria hoy Amosa: Ho fatin-tsabatra Jeroboama, ary hobaboina hiala amin’ny taniny tokoa ny Isiraely.'
  '12':
  - type: text
    content: 'Ary hoy Amazia tamin’i Amosa: Ry mpahita! andeha mandositra mankany amin’ny tanin’ny Joda hianao, ka mihinàna hanina any, ary maminania any; '
  '13':
  - type: text
    content: 'fa aza maminany eto Betela intsony; fa fitoera-masin’ny mpanjaka sy tranom-panjakana ity. '
  '14':
  - type: text
    content: 'Dia namaly Amosa ka nanao tamin’i Amazia hoe: Tsy mba mpaminany aho, na zanaky ny mpaminany; fa mpiandry ondry sy mpioty'
  - type: note
    content: 'Na: mpandraotra.'
  - type: text
    content: ' aviavy'
  - type: note
    content: sykomora.
  - type: text
    content: ' ihany aho, '
  '15':
  - type: text
    content: 'saingy nalain’i Jehovah tany am-piandrasana ondry ka nataony hoe: Mandehana, ka maminania amin’ny Isiraely oloko.'
  '16':
  - type: text
    content: 'Ka mba henoy ny tenin’i Jehovah:'
  - type: text
    content: 'Hianao manao hoe: Aza maminany ny hamelezana ny Isiraely,'
  - type: text
    content: Ary aza milaza ny hamelezana ny taranak’Isaka;
  '17':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Ny vadinao hijangajanga ao an-tanàna,
  - type: text
    content: Ary ny zanakao-lahy sy ny zanakao-vavy ho lavon-tsabatra,
  - type: text
    content: Ary ny taninao hozaraina amin’ny famolaina;
  - type: text
    content: Ary ny tenanao ho faty any amin’ny tany maloto;
  - type: text
    content: Ary ny Isiraely hobaboina hiala amin’ny taniny tokoa.
  '2':
  - type: text
    content: 'Ary nony efa laniny avokoa ny zava-maniry amin’ny tany, dia hoy izaho:'
  - type: text
    content: Jehovah Tompo ô, mifona aminao aho, mamelà heloka!
  - type: text
    content: Hataon’i Jakoba ahoana no fahajanona?
  - type: text
    content: Fa kely izy.
  '3':
  - type: text
    content: Nanenenan’i Jehovah izany;
  - type: text
    content: Tsy hisy izany, hoy Jehovah.
  '4':
  - type: text
    content: 'Izao no nasehon’i Jehovah Tompo tamiko:'
  - type: text
    content: Indro, Jehovah Tompo miantso hifandahatra hamely amin’ny afo,
  - type: text
    content: Ka nandevona ny lalina lehibe
  - type: text
    content: Sy nila handany ny zara lova izany.
  '5':
  - type: text
    content: 'Dia hoy izaho: Jehovah Tompo ô,'
  - type: text
    content: Mifona aminao aho, mitsahara!
  - type: text
    content: Hataon’i Jakoba ahoana no fahajanona?
  - type: text
    content: Fa kely izy.
  '6':
  - type: text
    content: Nanenenan’i Jehovah izany;
  - type: text
    content: Tsy hisy izany, hoy Jehovah Tompo.
  '7':
  - type: text
    content: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin’ny mànda natao tamin’ny pilao, sady nisy pilao teny an-tànany. '
  '8':
  - type: text
    content: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Amosa? Ary hoy izaho: Pilao. Dia hoy ny Tompo:'
  - type: text
    content: Indro, hanisy pilao eo amin’ny Isiraely oloko Aho,
  - type: text
    content: Fa tsy handefitra aminy
  - type: note
    content: Heb. handalo azy.
  - type: text
    content: ' intsony;'
  '9':
  - type: text
    content: Dia ho foana ny fitoerana avon’Isaka,
  - type: text
    content: Ary ho rava ny fitoera-masin’Isiraely;
  - type: text
    content: Ary hitsangana Aho ka hamely sabatra ny taranak’i Jeroboama.
  - type: heading
    content: Ny natao tamin’i Amosa tao Betela, sy ny teny nataony tamin’izany.
