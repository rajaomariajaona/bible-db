document_id: NEH.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandrenesan’i Nehemia ny fahantran’ny Jiosy noho ny tsy mbola nanamboarana ny màndan’i Jerosalema, sy ny alahelony noho izany, ary ny vavaka nataony.
  - type: text
    content: NY tantaran’i Nehemia, zanak’i Hakalia.
  - type: text
    content: 'Tamin’ny volana Kisleo tamin’ny taona faharoa-polo, raha tany an-dapa any Sosana aho, '
  '10':
  - type: text
    content: Ary ireo dia mpanomponao sy olonao, izay navotanao tamin’ny herinao lehibe sy ny tànanao mahery.
  '11':
  - type: text
    content: Koa mitaraina aminao aho, ry Jehovah ô, mihainoa ny fivavaky ny mpanomponao sy ny fivavaky ny mpanomponao rehetra izay faly amin’ny fahatahorana ny anaranao; ary hambinina anie ny mpanomponao anio, ary aoka hahazo famindrampo eo imason’io lehilahy io aho.
  - type: note
    content: Heb. izy.
  - type: text
    content: ' Fa mpitondra kapoaky ny mpanjaka aho.'
  '2':
  - type: text
    content: 'dia tonga Hanany, anankiray amin’ny rahalahiko, mbamin’ny lehilahy sasany avy tany Joda; ary nanontaniako azy ny amin’ny Jiosy efa afaka, izay sisa tamin’ny fahababoana, ary ny amin’i Jerosalema. '
  '3':
  - type: text
    content: 'Ka hoy no navaliny ahy: Ny sisa tamin’ny fahababoana izay any amin’ny tany any dia mitondra fahoriana be sy latsa; ary voarodana ny màndan’i Jerosalema sady nodoran’ny afo ny vavahadiny.'
  '4':
  - type: text
    content: 'Ary rehefa nandre izany teny izany aho, dia nipetraka nitomany sady niferinaina andro maro ary nifady hanina sy nivavaka teo anatrehan’Andriamanitry ny lanitra '
  '5':
  - type: text
    content: 'ka nanao hoe: Indrisy! ry Jehovah, Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra, Izay mitandrina fanekena sy famindrampo amin’izay tia Azy sy mitandrina ny didiny, '
  '6':
  - type: text
    content: 'aoka hihaino ny sofinao ary hihiratra ny masonao, mba hohenoinao ny vavaky ny mpanomponao, izay ataoko eto anatrehanao ankehitriny andro aman-alina ho an’ny Zanak’Isiraely mpanomponao sy izay anekeko ny fahotan’ny Zanak’Isiraely, izay efa nanotanay taminao; fa izaho sy ny mpianakavin-draiko dia samy efa nanota avokoa. '
  '7':
  - type: text
    content: Efa nanao izay ratsy indrindra taminao izahay ka tsy nitandrina ny didy, na ny lalàna, na ny fitsipika, izay nandidianao an’i Mosesy mpanomponao.
  '8':
  - type: text
    content: 'Hotsarovanao anie ilay teny nandidianao an’i Mosesy mpanomponao hoe: Raha manao izay mahadiso hianareo, dia hampiely anareo any amin’ny firenena maro Aho; '
  '9':
  - type: text
    content: 'nefa raha miverina amiko kosa hianareo ka mitandrina ny didiko sy mankatò azy, na dia hisy voaroaka hatrany am-paravodilanitra aza hianareo, dia avy any no hanangonako azy, ka ho entiko ho ao amin’ny fitoerana izay nofidiko hampitoerako ny anarako izy. '
