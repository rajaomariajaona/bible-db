document_id: ROM.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aoka ny olona rehetra samy hanaiky ny fahefana lehibe. Fa tsy misy fahefana afa-tsy izay avy amin’Andriamanitra; fa izay misy dia voatendrin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izay manohitra ny fahefana dia manohitra ny voatendrin’Andriamanitra; ary izay manohitra dia hahazo fahamelohana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny mpanapaka dia tsy mba tahotry ny manao tsara, fa ny manao ratsy ihany. Ary ny tsy hatahotra ny fahefana va no tianao? Ataovy ary izay tsara, dia hahazo dera avy aminy hianao; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa mpanompon’Andriamanitra izy hahatsara anao. Fa raha ratsy kosa no nataonao, dia matahora, fa tsy entiny foana tsy akory ny sabatra; fa mpanompon’Andriamanitra izy, dia mpamaly handatsaka fahatezerana amin’izay manao ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa tsy maintsy manaiky ny olona, nefa tsy noho ny fahatezerana ihany, fa noho ny fieritreretana koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa noho izany no andoavanareo vola hetra; fa mpanompon’Andriamanitra mitandrina izany zavatra izany indrindra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mandoava amin’izy rehetra izay tokony ho azy avy: vola hetra ho an’izay tokony handoavan-ketra, fadin-tseranana ho an’izay tokony handoavana fadin-tseranana, tahotra ho an’izay tokony hatahorana, haja ho an’izay tokony hohajaina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza avela hisy tsy voaloa na amin’iza na amin’iza, afa-tsy ny fifankatiavanareo ihany; fa izay tia ny namany dia efa nahatanteraka ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny hoe: ,,Aza mijangajanga, aza mamono olona, aza mangalatra, aza mitsiriritra zavatr’olona’’ (Eks. 20.13–17), mbamin’izay didy hafa rehetra, dia samy efa ao anatin’izao teny izao hoe: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18). '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fitiavana tsy manisy ratsy ny namana; koa dia ny fitiavana no fahatanterahana ny lalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tokony hanao izany indrindra isika, satria fantatsika ny andro, fa ankehitriny izao dia ora tokony hifohazanareo amin’ny fahatoriana; fa ankehitriny ny famonjena antsika dia akaiky noho ny tamin’ny andro vao ninoantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Efa ho lasa ny alina, ka efa mby akaiky kokoa ny andro, koa aoka hariantsika ny asan’ny maizina ka hitafiantsika ny fiadian’ny mazava. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aoka isika hitondra tena tsara toy ny amin’ny andro; tsy amin’ny filalaovan-dratsy, na amin’ny fahamamoana, tsy amin’ny fijangajangana, na amin’ny fijejojejoana, tsy amin’ny fifandirana, na amin’ny fialonana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa itafio Jesosy Kristy Tompo, ary aza miahy ny amin’ny nofo hahatanteraka ny filany.
