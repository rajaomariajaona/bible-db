document_id: GEN.45,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Josefa tsy nahatsindry ny fangorakoraky ny fony intsony teo anatrehan’izay rehetra teo aminy; dia niantso izy ka nanao hoe: Avoahy ny olona rehetra hiala eto amiko. Ary dia tsy nisy olona na dia iray aza nijanona teo amin’i Josefa, raha nanao izay hahafantaran’ny rahalahiny azy izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia honina eo amin’ny tany Gosena hianao, ka ho eo akaikiko hianao sy ny zanakao sy ny zafinao ary ny ondry aman-osinao sy ny ombinao mbamin’izay rehetra anananao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hamelona anao eo aho (fa mbola haharitra dimy taona ny mosary), fandrao ho lany harena hianao sy ny ankohonanao ary izay rehetra anananao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, hitan’ny masonareo sy ny mason’i Benjamina rahalahiko izao fa ny vavako no miteny aminareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hambaranareo amin’ikaky ny voninahitro rehetra atỳ Egypta sy izay rehetra efa hitanareo; koa mandehana faingana hianareo, ka ento midina atỳ ikaky.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namihina ny vozon’i Benjamina rahalahiny izy ka nitomany; ary Benjamina koa dia mba nitomany teo amin’ny vozony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia nanoroka ny rahalahiny rehetra izy ka nitomany teo am-pamihinany azy; ary rehefa afaka izany, dia niresaka taminy ireo rahalahiny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary re tao an-tranon’i Farao ny teny hoe: Tonga ny rahalahin’i Josefa; dia sitrak’i Farao sy ny mpanompony izany.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Farao tamin’i Josefa: Lazao amin’ny rahalahinao: Izao no ataovy: ataingeno ny entana ho entin’ny bibinareo, ka mankanesa any amin’ny tany Kanana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary alao ny rainareo sy ny ankohonanareo, ka mankanesa atỳ amiko; ary dia homeko anareo ny tsara eto amin’ny tany Egypta, ka hihinana ny matavy eto amin’ny tany hianareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny efa nomena teny hianao, ka izao no ataovy: makà sariety amin’ny tany Egypta hitondranareo ny vady aman-janakareo, ary ento ny rainareo, ka mankanesa atỳ. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitomany mafy izy, ka ren’ny Egyptiana, ary ren’ny tao an-tranon’i Farao koa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza malahelo ny amin’ny fanakareo; fa anareo izay tsara eto amin’ny tany Egypta rehetra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataon’ny Zanak’Isiraely izany, ka dia nomen’i Josefa sariety izy, araka ny tenin’i Farao; ary nomeny vatsy koa ho entiny eny an-dàlana izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy rehetra samy nomeny akanjo indray miova avy; fa Benjamina kosa nomeny sekely volafotsy telon-jato sy akanjo indimy miova. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao kosa no nampitondrainy ho an-drainy: borikilahy folo nitondra zava-tsoa avy tany Egypta, sy borikivavy folo nitondra vary sy mofo, ary vatsy ho an’ny rainy ho entiny eny an-dàlana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampandehaniny ny rahalahiny, ka lasa nandeha izy ireo; ary hoy Josefa taminy: Aza mifanditra eny an-dàlana hianareo.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra avy tany Egypta izy ireo ka tonga tany amin’i Jakoba rainy tany amin’ny tany Kanana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza taminy izy ka nanao hoe: Mbola velona ihany Josefa, ary izy no mpanapaka ny tany Egypta rehetra. Kanefa nangatsiaka ihany ny fon’i Jakoba, fa tsy nino azy izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazain’izy ireo ny teny rehetra izay efa nolazain’i Josefa taminy: ary rehefa hitany ny sariety izay efa nampitondrain’i Josefa hitondrana azy, dia izay vao velona indray ny fanahin’i Jakoba rainy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isiraely: Aoka ary, fa mbola velona ihany Josefa zanako; handeha aho ka hahita azy, dieny tsy mbola maty aho.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Josefa tamin’ny rahalahiny: Izaho no Josefa; mbola velona ihany va ikaky? Ary tsy nahavaly azy ny rahalahiny; fa toran-kovitra teo anatrehany ireo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Josefa tamin’ny rahalahiny: Avia, manatòna ahy hianareo. Dia nanatona ireo. Ary hoy Josefa: Izaho no Josefa rahalahinareo, ilay namidinareo ho atỳ Egypta. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, aza malahelo na tezitra amin’ny tenanareo noho ny nivarotanareo ahy ho atỳ; fa hamonjy aina no nampandehanan’Andriamanitra ahy hialoha anareo atỳ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa roa taona izao no efa nisian’ny mosary teto amin’ny tany; ary mbola misy dimy taona koa, izay tsy hisy hiasan-tany na hijinjana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra efa nampandeha ahy hialoha anareo, mba tsy hahalany taranaka anareo amin’ny tany, fa hamelona anareo amin’ny famonjena lehibe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany, tsy hianareo no nampandeha ahy ho atỳ, fa Andriamanitra; ary Izy nanao ahy ho rain’i Farao, sy ho tompon’ny ao an-tranony rehetra, ary ho mpanapaka ny tany Egypta rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andeha miakatra faingana hianareo ho any amin’ikaky, ka lazao aminy hoe: Izao no tenin’i Josefa zanakao: Efa nataon’Andriamanitra ho tompon’i Egypta rehetra aho; ka midìna hankatỳ amiko, fa aza mijanona; '
