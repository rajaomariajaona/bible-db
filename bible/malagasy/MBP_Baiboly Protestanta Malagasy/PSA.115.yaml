document_id: PSA.115
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fampitahana an’Andriamanitry ny Isiraely sy ny sampin’ny jentilisa.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: JEHOVAH ô, aza izahay, aza izahay no omena voninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny anaranao ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny famindramponao sy ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nahoana ny jentilisa no manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza izay Andriamaniny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa any an-danitra Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanao izay sitrapony rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Volafotsy sy volamena ny sampin’ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Asan’ny tànan’olona:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manam-bava izy, fa tsy miteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mana-maso izy, fa tsy mahita;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manan-tsofina izy, fa tsy mandre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manana orona izy, fa tsy manimbolo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manan-tànana izy, fa tsy mandray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manan-tongotra izy, fa tsy mandeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mahaloa-peo ny tendany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ho tahaka azy izay manao azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay rehetra matoky azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ry Isiraely ô, matokia an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heriny sy ampingany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry taranak’i Arona ô, matokia an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heriny sy ampingany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hianareo izay matahotra an’i Jehovah, matokia an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heriny sy ampingany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jehovah mahatsiaro ka mitahy antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitahy ny taranak’i Isiarely Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitahy ny taranak’i Arona Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hotahiny izay matahotra an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny kely na ny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah anie hampitombo anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo mbamin’ny zanakareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hitahy anareo anie Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanao ny lanitra sy ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny lanitra dia an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tany nomeny ho an’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny maty tsy mba hidera an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na izay midina any amin’ny mangingina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa izahay hisaotra an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’izao ka ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haleloia.
