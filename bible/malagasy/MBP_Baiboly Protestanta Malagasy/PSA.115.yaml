document_id: PSA.115,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fampitahana an’Andriamanitry ny Isiraely sy ny sampin’ny jentilisa.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, aza izahay, aza izahay no omena voninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny anaranao ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny famindramponao sy ny fahamarinanao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry taranak’i Arona ô, matokia an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heriny sy ampingany Izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo izay matahotra an’i Jehovah, matokia an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heriny sy ampingany Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah mahatsiaro ka mitahy antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahy ny taranak’i Isiarely Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahy ny taranak’i Arona Izy;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahiny izay matahotra an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny kely na ny lehibe.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah anie hampitombo anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hianareo mbamin’ny zanakareo.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahy anareo anie Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lanitra dia an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tany nomeny ho an’ny zanak’olombelona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maty tsy mba hidera an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na izay midina any amin’ny mangingina;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izahay hisaotra an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao ka ho mandrakizay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nahoana ny jentilisa no manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza izay Andriamaniny?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa any an-danitra Andriamanitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanao izay sitrapony rehetra Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Volafotsy sy volamena ny sampin’ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Asan’ny tànan’olona:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manam-bava izy, fa tsy miteny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mana-maso izy, fa tsy mahita;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-tsofina izy, fa tsy mandre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana orona izy, fa tsy manimbolo;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-tànana izy, fa tsy mandray;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-tongotra izy, fa tsy mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahaloa-peo ny tendany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tahaka azy izay manao azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay rehetra matoky azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Isiraely ô, matokia an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heriny sy ampingany Izy.
