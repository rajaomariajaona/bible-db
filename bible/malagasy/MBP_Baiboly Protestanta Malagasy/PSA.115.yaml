document_id: PSA.115,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana an’Andriamanitry ny Isiraely sy ny sampin’ny jentilisa.
  - type: text
    content: JEHOVAH ô, aza izahay, aza izahay no omena voninahitra,
  - type: text
    content: Fa ny anaranao ihany,
  - type: text
    content: Noho ny famindramponao sy ny fahamarinanao.
  '10':
  - type: text
    content: Ry taranak’i Arona ô, matokia an’i Jehovah;
  - type: text
    content: Heriny sy ampingany Izy.
  '11':
  - type: text
    content: Hianareo izay matahotra an’i Jehovah, matokia an’i Jehovah;
  - type: text
    content: Heriny sy ampingany Izy.
  '12':
  - type: text
    content: Jehovah mahatsiaro ka mitahy antsika;
  - type: text
    content: Hitahy ny taranak’i Isiarely Izy;
  - type: text
    content: Hitahy ny taranak’i Arona Izy;
  '13':
  - type: text
    content: Hotahiny izay matahotra an’i Jehovah,
  - type: text
    content: Na ny kely na ny lehibe.
  '14':
  - type: text
    content: Jehovah anie hampitombo anareo,
  - type: text
    content: Dia hianareo mbamin’ny zanakareo.
  '15':
  - type: text
    content: Hitahy anareo anie Jehovah,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
  '16':
  - type: text
    content: Ny lanitra dia an’i Jehovah;
  - type: text
    content: Fa ny tany nomeny ho an’ny zanak’olombelona.
  '17':
  - type: text
    content: Ny maty tsy mba hidera an’i Jehovah,
  - type: text
    content: Na izay midina any amin’ny mangingina;
  '18':
  - type: text
    content: Fa izahay hisaotra an’i Jehovah
  - type: text
    content: Hatramin’izao ka ho mandrakizay.
  - type: text
    content: Haleloia.
  '2':
  - type: text
    content: 'Nahoana ny jentilisa no manao hoe:'
  - type: text
    content: Aiza izay Andriamaniny?
  '3':
  - type: text
    content: Nefa any an-danitra Andriamanitsika;
  - type: text
    content: Efa nanao izay sitrapony rehetra Izy.
  '4':
  - type: text
    content: Volafotsy sy volamena ny sampin’ireny,
  - type: text
    content: 'Asan’ny tànan’olona:'
  '5':
  - type: text
    content: Manam-bava izy, fa tsy miteny;
  - type: text
    content: Mana-maso izy, fa tsy mahita;
  '6':
  - type: text
    content: Manan-tsofina izy, fa tsy mandre;
  - type: text
    content: Manana orona izy, fa tsy manimbolo;
  '7':
  - type: text
    content: Manan-tànana izy, fa tsy mandray;
  - type: text
    content: Manan-tongotra izy, fa tsy mandeha;
  - type: text
    content: Ary tsy mahaloa-peo ny tendany.
  '8':
  - type: text
    content: Ho tahaka azy izay manao azy
  - type: text
    content: Sy izay rehetra matoky azy.
  '9':
  - type: text
    content: Ry Isiraely ô, matokia an’i Jehovah;
  - type: text
    content: Heriny sy ampingany Izy.
