document_id: JOB.40
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny naneken’i Joba ny fahadisoan-keviny, sy ny navalin’i Jehovah azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah mbola namaly an’i Joba nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiady amin’ny Tsitoha va io mpanadidy Azy io?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny mananatra an’Andriamanitra no hamaly!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Joba dia namaly an’i Jehovah ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, tsinontsinona, aho ka inona no azoko avaly Anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitampim-bava aho izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa niteny indray mandeha aho, ka tsy hamaly intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, indroa aza, fa tsy hanampy teny intsony aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia namaly an’i Joba teo amin’ny tafio-drivotra Jehovah ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misikìna tahaka ny lehilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hanadina anao Aho, ka ampahafantaro Aho:–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanaisotra ny rariny amiko va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanameloka Ahy va hianao, mba hanamarina ny tenanao kosa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manan-tsandry tahaka ny an’Andriamanitra va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahay mampikotrokotro-peo tahaka ny Azy va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miravaha fahalehibiazana sy tabiha hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitafia famirapiratana sy voninahitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alefaso ny fahatezeranao mirehitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary jereo ny avonavona rehetra, ka ampietreo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, jereo ny avonavona rehetra, ka aongàny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary apotrahy eo amin’ny fitoerany ihany ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Asitriho ao amin’ny vovoka avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saròny ao amin’ny fiafenana ny tavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa Izaho kosa dia hidera anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria mahavonjy anao ny tànanao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He! jereo ange ny behemota,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hipopotamosy.
    marker-yv: yv-n
  - type: text
    text: ' izay nataoko tahaka ny nanaovako anao ihany:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho eo aminao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihinana ahitra tahaka ny omby izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, eo amin’ny valahany ny heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo amin’ny ozatra amin’ny kibony ny tanjany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Henjaniny ny rambony ho tahaka ny hazo sedera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifaniditriditra ny ozatra amin’ny feny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny taolany dia tahaka ny fantsom-barahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tahaka ny anja-by ny taolany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voalohany amin’ny asan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlan’.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Mpanao azy no nanome sabatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mamoaka hanina ho azy ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ilalaovan’ny bidi-dia rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eo ambanin’ny hazo lota no andriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any am-pierena anaty zozoro sy fotaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manalokaloka azy ny hazo lota;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hazomalahelo eny amoron’ny ony no manodidina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Indro, na dia maria aza ny ony, tsy manahy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matoky izy, na dia misy Jordana migorodana amin’ny vavany aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa misy mahasambotra azy va, raha mihiratra ny masony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha azon’ny fandrika izy, misy mahatsindrona ny orony va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mahasarika ny mamba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: leviatana.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny farango va hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mahafatotra ny lelany amin’ny mahazaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mahisy tady zozoro amin’ny orony va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mahaboroaka ny valanoranony amin’ny fintana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hifon-jato amin-arivo aminao va izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanao teny malefaka aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hanao fanekena aminao va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Azonao alaina ho andevonao mandrakizay va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hilalao azy tahaka ny filalao voron-kely va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamatotra azy ho an’ny zazavavy ao aminao va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hataon’ny mpaka hazandrano varotra va izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hotsinjarainy amin’ny mpandranto?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mahafeno lefompohy ny hodiny va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na firombaka amin’ny lohany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Atehefo aminy ange ny tànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsaraonao ny ady, dia tsy hanindroa intsony hianao.
