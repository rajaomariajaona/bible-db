document_id: JOB.40,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny naneken’i Joba ny fahadisoan-keviny, sy ny navalin’i Jehovah azy.
  - type: text
    content: 'ARY Jehovah mbola namaly an’i Joba nanao hoe:'
  '10':
  - type: text
    content: Miravaha fahalehibiazana sy tabiha hianao,
  - type: text
    content: Ary mitafia famirapiratana sy voninahitra;
  '11':
  - type: text
    content: Alefaso ny fahatezeranao mirehitra;
  - type: text
    content: Ary jereo ny avonavona rehetra, ka ampietreo.
  '12':
  - type: text
    content: Eny, jereo ny avonavona rehetra, ka aongàny;
  - type: text
    content: Ary apotrahy eo amin’ny fitoerany ihany ny ratsy fanahy.
  '13':
  - type: text
    content: Asitriho ao amin’ny vovoka avokoa izy rehetra;
  - type: text
    content: Saròny ao amin’ny fiafenana ny tavany.
  '14':
  - type: text
    content: Fa Izaho kosa dia hidera anao,
  - type: text
    content: Satria mahavonjy anao ny tànanao ankavanana.
  '15':
  - type: text
    content: He! jereo ange ny behemota,
  - type: note
    content: hipopotamosy.
  - type: text
    content: ' izay nataoko tahaka ny nanaovako anao ihany:'
  - type: note
    content: 'Na: ho eo aminao.'
  - type: text
    content: Mihinana ahitra tahaka ny omby izy.
  '16':
  - type: text
    content: Indro, eo amin’ny valahany ny heriny,
  - type: text
    content: Ary eo amin’ny ozatra amin’ny kibony ny tanjany.
  '17':
  - type: text
    content: Henjaniny ny rambony ho tahaka ny hazo sedera;
  - type: text
    content: Mifaniditriditra ny ozatra amin’ny feny.
  '18':
  - type: text
    content: Ny taolany dia tahaka ny fantsom-barahina,
  - type: text
    content: Eny, tahaka ny anja-by ny taolany.
  '19':
  - type: text
    content: Voalohany amin’ny asan’
  - type: note
    content: Heb. làlan’.
  - type: text
    content: ' Andriamanitra izy;'
  - type: text
    content: Ny Mpanao azy no nanome sabatra azy.
  '2':
  - type: text
    content: Hiady amin’ny Tsitoha va io mpanadidy Azy io?
  - type: text
    content: Aoka ny mananatra an’Andriamanitra no hamaly!
  '20':
  - type: text
    content: Mamoaka hanina ho azy ny tendrombohitra,
  - type: text
    content: Izay ilalaovan’ny bidi-dia rehetra;
  '21':
  - type: text
    content: Eo ambanin’ny hazo lota no andriany,
  - type: text
    content: Any am-pierena anaty zozoro sy fotaka.
  '22':
  - type: text
    content: Manalokaloka azy ny hazo lota;
  - type: text
    content: Ary ny hazomalahelo eny amoron’ny ony no manodidina azy.
  '23':
  - type: text
    content: Indro, na dia maria aza ny ony, tsy manahy izy;
  - type: text
    content: Matoky izy, na dia misy Jordana migorodana amin’ny vavany aza.
  '24':
  - type: text
    content: Moa misy mahasambotra azy va, raha mihiratra ny masony?
  - type: text
    content: Raha azon’ny fandrika izy, misy mahatsindrona ny orony va?
  '25':
  - type: text
    content: Mahasarika ny mamba
  - type: note
    content: Heb. leviatana.
  - type: text
    content: ' amin’ny farango va hianao,'
  - type: text
    content: Na mahafatotra ny lelany amin’ny mahazaka?
  '26':
  - type: text
    content: Mahisy tady zozoro amin’ny orony va hianao,
  - type: text
    content: Na mahaboroaka ny valanoranony amin’ny fintana?
  '27':
  - type: text
    content: Hifon-jato amin-arivo aminao va izy,
  - type: text
    content: Na hanao teny malefaka aminao?
  '28':
  - type: text
    content: Hanao fanekena aminao va izy?
  - type: text
    content: Azonao alaina ho andevonao mandrakizay va izy?
  '29':
  - type: text
    content: Hilalao azy tahaka ny filalao voron-kely va hianao?
  - type: text
    content: Ary hamatotra azy ho an’ny zazavavy ao aminao va hianao?
  '3':
  - type: text
    content: 'Ary Joba dia namaly an’i Jehovah ka nanao hoe:'
  '30':
  - type: text
    content: Hataon’ny mpaka hazandrano varotra va izy,
  - type: text
    content: Ka hotsinjarainy amin’ny mpandranto?
  '31':
  - type: text
    content: Mahafeno lefompohy ny hodiny va hianao,
  - type: text
    content: Na firombaka amin’ny lohany?
  '32':
  - type: text
    content: Atehefo aminy ange ny tànanao;
  - type: text
    content: Raha tsaraonao ny ady, dia tsy hanindroa intsony hianao.
  '4':
  - type: text
    content: Indro, tsinontsinona, aho ka inona no azoko avaly Anao?
  - type: text
    content: Hitampim-bava aho izao.
  '5':
  - type: text
    content: Efa niteny indray mandeha aho, ka tsy hamaly intsony;
  - type: text
    content: Eny, indroa aza, fa tsy hanampy teny intsony aho.
  '6':
  - type: text
    content: 'Dia namaly an’i Joba teo amin’ny tafio-drivotra Jehovah ka nanao hoe:'
  '7':
  - type: text
    content: Misikìna tahaka ny lehilahy;
  - type: text
    content: Fa hanadina anao Aho, ka ampahafantaro Aho:–
  '8':
  - type: text
    content: Hanaisotra ny rariny amiko va hianao?
  - type: text
    content: Hanameloka Ahy va hianao, mba hanamarina ny tenanao kosa?
  '9':
  - type: text
    content: Manan-tsandry tahaka ny an’Andriamanitra va hianao?
  - type: text
    content: Ary mahay mampikotrokotro-peo tahaka ny Azy va hianao?
