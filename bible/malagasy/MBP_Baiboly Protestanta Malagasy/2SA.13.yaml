document_id: 2SA.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny ratsy nataon’i Amnona, sy ny namonoan’i Absaloma azy, ary ny nandosiran’i Absaloma.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony afaka izany, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'dia nisy toy izao:'
    - type: text
      text: ' Absaloma, zanak’i Davida, nanana anabavy tsara tarehy, Tamara no anarany; ary tia azy Amnona, zanak’i Davida. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Amnona tamin’i Tamara: Ento atỳ amin’ny efi-trano ny nahandro hihinanako ny avy eny an-tànanao. Dia nalain’i Tamara ny mofo nataony ka nentiny tao amin’ny efi-trano tao amin’i Amnona anadahiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nenitny tao aminy hohaniny izany; dia nihazona an’i Tamara izy ka nanao taminy hoe: Avia handry amiko, ranabaviko. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny anabaviny: Sanatria, ranadahy! Aza misavika ahy; fa tsy fanao eto amin’ny Isiraely izany; aza manao izany zavatra fady indrindra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahadalana.
      marker-yv: yv-n
    - type: text
      text: ' izany hianao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amiko, ho entiko aiza moa ny henatro? Ary hianao koa ho toy ny anankiray amin’ny adala eto amin’ny Isiraely. Koa trarantitra hianao, lazao amin’ny mpanjaka; fa tsy hisakana ahy tsy ho anao izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy nety nihaino ny feon-drazazavavy izy, fa natanjaka noho izy, dia nisavika azy ka nandry taminy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia halan’i Amnona indrindra izy, ka ny fankahalany azy dia be lavitra noho ny fitiavany azy taloha. Dia hoy Amnona taminy: Mitsangàna, mandehana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy taminy: Aza dia manao ratsy mandroaka ahy hianao, fa ratsy noho ny zavatra hafa nataonao izao. Nefa tsy nety nihaino azy izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso ny zatovony izay nanompo azy izy ka nanao hoe: Esory hiala eto amiko ity vehivavy ity, ka hidio ny varavarana, rehefa tafavoaka izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niakanjo akanjo lava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: akanjo misoratsoratra.
      marker-yv: yv-n
    - type: text
      text: ' razazavavy; fa izany no fanaon’ny zanakavavin’ny mpanjaka ho akanjo ambony, raha mbola virijina izy. Dia navoakan’ilay ankizilahy izy, ka nohidiany ny varavarana, nony tafavoaka izy.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasian’i Tamara lavenona ny lohany, sady notriariny ny akanjo lava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: akanjo misoratsoratra.
      marker-yv: yv-n
    - type: text
      text: ' izay niakanjoany, dia niloloha tànana izy, sady nitomany nidradradradra teny am-pandehanana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Amnona nalahelo ka matiny ihany noho Tamara anabaviny; fa virijina izy, ka sarotra tamin’i Amnona ny haka azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Absaloma anadahiny taminy: Efa tany aminao va Amnona anadahinao? Mangìna ihany aloha, ranabavy, fa anadahinao izy; fa aza malahelo noho izany. Ka dia nitoetra tao an-tranon’i Absaloma anadahiny Tamara sady ory.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony ren’i Davida mpanjaka izany zavatra rehetra izany, dia nirehitra ny fahatezerany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Absaloma tsy nifampiteny tamin’i Amnona rahalahiny akory na soa na ratsy; fa halan’i Absaloma izy noho ny nisavihany an’i Tamara anabaviny.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka roa taona ngarangidina, dia nampanety ondry teo Bala-hazora ao akaiky an’i Efraima Absaloma, ka nanasa ny zanakalahin’ny mpanjaka rehetra izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nankao amin’ny mpanjaka Absaloma ka nanao hoe: Indro, mampanety ondry ny mpanomponao; koa trarantitra hianao, aoka ny mpanjaka sy ny mpanompony handeha hiaraka amiko mpanomponao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanjaka tamin’i Absaloma: Tsia, anaka, aoka tsy handeha avokoa izahay rehetra, fandrao mahavaky tratra anao. Fa Absaloma nanery azy ihany; nefa tsy nety nandeha izy, fa nitso-drano azy ihany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Absaloma: Raha tsy izany ary, trarantitra hianao, aoka Amnona rahalahiko no handeha hiaraka aminay. Ary hoy ny mpanjaka taminy: Ahoana no hiarahany aminao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa nanery azy Absaloma, ka dia nalefany Amnona sy ny zanakalahin’ny mpanjaka rehetra handeha hiaraka aminy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Absaloma nanome teny ny zatovony hoe: Miomàna tsara, fa rehefa faly ny fon’i Amnona azon’ny divay, ka lazaiko aminareo hoe: Asio Amnona, dia ataovy maty izy, fa aza matahotra; tsy izaho va no nanome teny anareo? Matokia, aoka hiseho ho lehilahy mahery hianareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zatovon’i Absaloma nanao tamin’i Amnona araka ny teny nomen’i Absaloma azy. Dia nitsangana avokoa ny zanakalahin’ny mpanjaka rehetra, ary samy nitaingina ny ampondrany ka nandositra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Amnona nanan-tsakaiza, Jonadaba no anarany, zanak’i Simea, rahalahin’i Davida; ary Jonadaba dia olona fetsy loatra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola teny an-dàlana izy ireo, dia tonga tao amin’i Davida ny filazana hoe: Novonoin’i Absaloma avokoa ny zanakalahin’ny mpanjaka, ka tsy nasiany miangana na dia iray akory aza. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny mpanjaka ka nandriatra ny fitafiany, dia nandry tamin’ny tany; ary ny mpanompony rehetra nitsangana teo, samy voatriatra avokoa ny fitafiany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jonadaba, zanak’i Simea, rahalahin’i Davida, nanao hoe: Aoka ny tompoko tsy hanao hoe: Matiny avokoa ny zatovo rehetra, zanakalahin’ny mpanjaka; fa Amnona ihany no maty; fa Absaloma efa nifofo azy hatramin’ny andro nisavihany an’i Tamara anabaviny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aoka ny mpanjaka tompoko tsy hieritreritra am-po fa maty avokoa ny zanakalahin’ny mpanjaka rehetra; fa Amnona ihany no maty.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Absaloma nandositra. Ary ny zatovo mpitily nanopy ny masony ka nahita fa, indreo nisy olona maro avy teo ivohony, teo anilan’ny tendrombohitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jonadaba tamin’ny mpanjaka: Indreo, avy ny zanakalahin’ny mpanjaka, dia araka ny nolazain’ny mpanomponao tokoa. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony efa voalazany izany teny izany, dia indreo, tonga ny zanakalahin’ny mpanjaka, ary nanandratra ny feony izy ka nitomany; ary ny mpanjaka sy ny mpanompony dia mba nitomany mafy dia mafy koa.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Absaloma nandositra nankany amin’i Talmay, zanakalahin’i Amihoda, mpanjakan’i Gesora. Ary nisaona ny zanany mandrakariva Davida. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Absaloma efa nandositra nankany Gesora ka nitoetra tany telo taona. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Davida mpanjaka naniry hivoaka hankany amin’i Absaloma;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Koa izany no nisakana an’i Davida mpanjaka tsy hivoaka hamely an’i Absaloma.
      marker-yv: yv-n
    - type: text
      text: ' fa nionona izy noho ny amin’i Amnona, satria efa maty izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy izy taminy: Nahoana hianao, ry zanaky ny mpanjaka, no mihamahia isan-andro isan-andro? Tsy tianao hambara amiko va izany? Dia hoy Amnona taminy: Tia an’i Tamara, anabavin’i Absaloma rahalahiko, aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jonadaba taminy: Mandria eo amin’ny fandrianao hianao, ka modia marary; ary raha avy mamangy anao rainao, dia ataovy aminy hoe: Trarantitra hianao, aoka Tamara anabaviko mba ho avy hampihinan-kanina ahy ary hanao ny nahandro eto imasoko mba ho hitako ka hihinanako ny avy eny an-tànany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandry Amnona ka nody marary; ary nony avy mamangy azy ny mpanjaka, dia hoy izy taminy: Trarantitra hianao, aoka Tamara anabaviko hankatỳ hanao mofo roa ho ahy eto imasoko hihinanako ny avy eny an-tànany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida naniraka nankany amin’i Tamara any an-tranony nanao hoe: Mankanesa kely any an-tranon’i Amnona anadahinao, ka manaova nahandro ho azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha Tamara nankany an-tranon’i Amnona anadahiny; ary nandry ny anadahiny. Dia naka koba razazavavy, ka nofetafetainy ary nataony mofo teo imasony, ary nendasiny ny mofo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisiny ny fanendasana, ka narosony teo anoloany; fa tsy nety nihinana izy. Ary hoy Amnona: Avoahy ny olona rehetra. Dia nivoaka ny olona rehetra. '
