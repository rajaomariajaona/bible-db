document_id: 1KI.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Abia sy Asa tamin’ny Joda.
  - type: text
    content: 'ARY tamin’ny taona fahavalo ambin’ny folo nanjakan’i Jeroboama, zanak’i Nebata, no vao nanjakan’i Abia tamin’ny Joda. '
  '10':
  - type: text
    content: Ary iraika amby efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin’i Absaloma.
  '11':
  - type: text
    content: 'Ary Asa nanao izay mahitsy eo imason’i Jehovah toy ny nataon’i Davida rainy. '
  '12':
  - type: text
    content: 'Fa nesoriny tamin’ny tany ny olona izay nanolo-tena hijangajanga ho fanompoan-tsampy, sady nariany ny sampy rehetra izay nataon-drainy. '
  '13':
  - type: text
    content: 'Ary na dia Imaka reniny aza dia naetriny tsy ho andriambavy, satria efa nanao sampy ho an’ny Aseraha; ary Asa nikapa ny sampiny ka nandoro azy tao an-dohasahan-driaka Kidrona. '
  '14':
  - type: text
    content: 'Fa ny fitoerana avo tsy mba noravana; nefa nahitsy teo imason’i Jehovah ny fon’i Asa tamin’ny andro rehetra niainany. '
  '15':
  - type: text
    content: Ary nampidiriny ho ao an-tranon’i Jehovah ny zavatra izay nohamasinin-drainy mbamin’izay nohamasinin’ny tenany, dia volafotsy sy volamena ary fanaka.
  '16':
  - type: text
    content: 'Ary niady Asa sy Basa, mpanjakan’ny Isiraely, tamin’ny andro rehetra niainany. '
  '17':
  - type: text
    content: Ary Basa, mpanjakan’ny Isiraely, niakatra hamely ny Joda, dia nanamboatra an’i Rama mba tsy hisy hahazo hivoaka sy hiditra ho any amin’i Asa, mpanjakan’ny Joda.
  '18':
  - type: text
    content: 'Ary Asa naka ny volafotsy sy ny volamena rehetra izay sisa tamin’ny rakitry ny tranon’i Jehovah sy tamin’ny rakitry ny tranon ny mpanjaka, ka natolony teo an-tànan’ny mpanompony; ary Asa mpanjaka nampanatitra azy tany amin’i Beni-hadada, zanak’i Tabrimona, zanak’i Heziona, mpanjakan’i Syria, izay nonina tao Damaskosy, ka nanao hoe: '
  '19':
  - type: text
    content: Aoka hisy
  - type: text
    content: ' fanekena amiko sy aminao toy ny tamin’ny raiko sy ny rainao; koa, indro, mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; andeha, tsoahy ny fanekenao tamin’i Basa, mpanjakan’ny Isiraely, mba hialany amiko. '
  '2':
  - type: text
    content: Telo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin’i Absaloma.
  '20':
  - type: text
    content: Ary Beni-hadada nihaino an’i Asa mpanjaka ka naniraka komandin’ny miaramilany hamely ny tanànan’ny Isiraely; ary namely an’Iona sy Dana sy Abelabeti-maka ary Kinerota rehetra mbamin’ny tanin’ny Naftaly rehetra izy.
  '21':
  - type: text
    content: 'Ary rehefa ren’i Basa izany, dia nitsahatra tsy nanamboatra an’i Rama intsony izy sady nitoetra tao Tirza. '
  '22':
  - type: text
    content: Ary Asa mpanjaka kosa nampandre ny Joda rehetra (tsy nisy tsy nampandrenesiny); ary dia nesorin’ny olona ny vato sy ny hazo tao Rama, izay naorin’i Basa; ary nentin’i Asa mpanjaka nanamboatra an’i Geban’i Benjamina sy Mizpa kosa izany.
  '23':
  - type: text
    content: 'Ary ny tantaran’i Asa sisa rehetra sy ny heriny rehetra mbamin’izay rehetra nataony ary ny tanàna izay nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? Nefa kosa tamin’ny andro fahanterany dia narary tamin’ny tongony izy. '
  '24':
  - type: text
    content: Ary lasa nodimandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-Tanànan’i Davida rainy izy; ary Josafata zanany no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakan’i Nadaba sy Basa sy Elaha sy Zimry ary Omry tamin’ny Isiraely.
  '25':
  - type: text
    content: ARY Nadaba, zanak’i Jeroboama, vao nanjaka tamin’ny Isiraely tamin’ny taona faharoa nanjakan’i Asa, mpanjakan’ny Joda; ary nanjaka roa taona tamin’ny Isiraely izy.
  '26':
  - type: text
    content: Ary nanao izay ratsy eo imason’i Jehovah izy, fa nandeha tamin’ny làlan-drainy sy tamin’ny fahotany izay nampanotany ny Isiraely.
  '27':
  - type: text
    content: 'Ary Basa, zanak’i Ahia, amin’ny taranak’Isakara, nikomy taminy, dia namely azy tao Gibetona, izay an’ny Filistina (fa Nadaba sy ny Isiraely rehetra nanao fahirano an’i Gibetona fahizay). '
  '28':
  - type: text
    content: Ary Basa nahafaty azy tamin’ny taona fahatelo nanjakan’i Asa, mpanjakan’ny Joda, ka dia nanjaka nisolo azy.
  '29':
  - type: text
    content: 'Ary rehefa nanjaka izy, dia namely ny mpianakavin’i Jeroboama rehetra izy, ka tsy nasiany niangana ho an’i Jeroboama na dia olona iray akory aza, fa naringany avokoa ireo araka ny tenin’i Jehovah izay nampilazainy an’i Ahia Silonita mpanompony, '
  '3':
  - type: text
    content: Ary nandeha tamin’ny fahotana rehetra nataon-drainy izy, dia izay nataony teo alohany; ary ny fony tsy mba nahitsy tamin’i Jehovah Andriamaniny tahaka ny fon’i Davida rainy.
  '30':
  - type: text
    content: noho ny fahotana nataon’i Jeroboama sady nampanotany ny Isiraely tamin’izay nataony nampahatezitra an’i Jehovah, Andriamanitry ny Isiraely.
  '31':
  - type: text
    content: 'Ary ny tantaran’i Nadaba sisa mbamin’izay rehetra nataony, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Isiraely va izany? '
  '32':
  - type: text
    content: Ary niady Asa sy Basa, mpanjakan’ny Isiraely, tamin’ny andro rehetra niainany.
  '33':
  - type: text
    content: Tamin’ny taona fahatelo nanjakan’i Asa, mpanjakan’ny Joda, no vao nanjakan’i Basa, zanak’i Ahia, tamin’ny Isiraely rehetra tao Tirza; ary nanjaka efatra amby roa-polo taona izy.
  '34':
  - type: text
    content: Ary nanao izay ratsy eo imason’i Jehovah izy, fa nandeha tamin’ny làlan’i Jeroboama sy tamin’ny fahotany izay nampanotany ny Isiraely.
  '4':
  - type: text
    content: 'Nefa noho ny amin’i Davida dia nomen’i Jehovah Andriamaniny fanilo tany Jerosalema ihany izy, fa natsangany handimby azy ny zanany, sady nampaharitra an’i Jerosalema Izy, '
  '5':
  - type: text
    content: 'satria Davida nanao izay mahitsy eo imason’i Jehovah ka tsy nivily niala tamin’izay nandidiany azy tamin’ny andro rehetra niainany, afa-tsy ilay tamin’i Oria Hetita ihany. '
  '6':
  - type: text
    content: Ary niady Rehoboama sy Jeroboama tamin’ny andro rehetra niainany.
  '7':
  - type: text
    content: 'Ary ny tantaran’i Abia sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? Ary niady Abia sy Jeroboama. '
  '8':
  - type: text
    content: Ary Abia lasa nodi-mandry any amin’ny razany, dia nalevina tao an-Tanànan’i Davida izy; ary Asa zanany no nanjaka nandimby azy.
  '9':
  - type: text
    content: 'Ary tamin’ny taona faharoa-polo nanjakan’i Jeroboama, mpanjakan’ny Isiraely, no vao nanjakan’i Asa tamin’ny Joda. '
