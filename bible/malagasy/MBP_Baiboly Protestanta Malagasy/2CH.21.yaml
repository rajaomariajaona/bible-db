document_id: 2CH.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Josafata sy ny nanjakan’i Jehorama zanany.
  - type: text
    content: ARY Josafata lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-Tanànan’i Davida izy; ary Jehorama zanany no nanjaka nandimby azy.
  '10':
  - type: text
    content: Nefa ny Edomita mbola niodina ka tsy nanoa ny Joda ihany ambaraka andro-any.
  - type: text
    content: Ary tamin’izany andro izany Libna koa niodina tsy nety nanoa an’i Jehorama, satria efa nahafoy an’i Jehovah, Andriamanitry ny razany, izy.
  '11':
  - type: text
    content: 'Ary nanao fitoerana avo teny an-tendrombohitr’i Joda koa izy sady nampijangajanga ny mponina tany Jerosalema ary nitaona ny Joda mangingina hanao izany. '
  '12':
  - type: text
    content: 'Ary nisy taratasy avy tamin’i Elia mpaminany tonga tao aminy nanao hoe: Izao no lazain’i Jehovah, Andriamanitr’i Davida rainao: Noho ny tsy nandehananao tamin’ny làlan’i Josafata rainao, na ny làlan’i Asa, mpanjakan’ny Joda, '
  '13':
  - type: text
    content: 'fa nandeha tamin’ny làlan’ny mpanjakan’ny Isiraely kosa hianao ka nampijangajanga ny Joda sy ny mponina any Jerosalema toy ny fijangajangan’ny taranak’i Ahaba, sady novonoinao koa ny rahalahinao nateraky ny rainao, izay tsara noho hianao, '
  '14':
  - type: text
    content: 'dia, indro, hasian’i Jehovah areti-mandringana ny vahoakanao sy ny zanakao sy ireo vadinao mbamin’ny biby fiompinao rehetra; '
  '15':
  - type: text
    content: ary hianao koa ho azon’ny aretina mafy, dia aretina amin’ny tsinainao, mandra-piàlàlan’ny tsinainao isan-andro isan-andro noho ny aretina.
  '16':
  - type: text
    content: 'Ary Jehovah namporisika ny Filistina sy ny Arabo izay ao akaikin’ny Etiopiana hamely an’i Jehorama; '
  '17':
  - type: text
    content: ary niakatra tany Joda ireo ka nisesika tao, dia nobaboiny ny fananana rehetra izay an’ny ankohonan’ny mpanjaka mbamin’ny zanany sy ny vadiny koa, ka tsy nisy zanany intsony, afa-tsy Joahaza faralahiny ihany.
  '18':
  - type: text
    content: 'Ary nony afaka izany rehetra izany, dia nasian’i Jehovah aretina tsy azo sitranina tamin’ny tsinainy izy. '
  '19':
  - type: text
    content: Ary rehefa ela, nony afaka roa taona, dia niàlàla ny tsinainy azon’ny aretiny; ka dia maty tamin’ny fangirifiriana mafy izy. Ary ny vahoakany tsy mba nandoro zavatra ho fisaonana azy toy ny nataony tamin’ny razany.
  '2':
  - type: text
    content: 'Ary nanan-drahalahy, zanak’i Josafata, koa izy, dia Azaria sy Jehiela sy Zakaria sy Azaria sy Mikaela ary Sefatia; ireo rehetra ireo no zanak’i Josafata, mpanjakan’ny Isiraely. '
  '20':
  - type: text
    content: Roa amby telo-polo taona izy, fony vao nanjaka, ary valo taona no nanjakany tany Jerosalema; koa lasa tsy nisy nalahelo azy izy. Ary nalevina tao an-Tanànan’i Davida ihany izy, nefa tsy mba tao amin’ny fasan’ny mpanjaka.
  '3':
  - type: text
    content: 'Ary nomen-drainy harena betsaka ireo, dia volafotsy sy volamena ary zava-tsoa mbamin’ny tanàna sasany mimànda tany Joda; fa ny fanjakana kosa dia nomeny an’i Jehorama, satria izy no lahimatoa. '
  '4':
  - type: text
    content: Ary raha vao nanjaka tamin’ny fanjakan’ny rainy Jehorama, dia nitombo hery izy ka namono ny rahalahiny rehetra mbamin’ny mpanapaka sasany tamin’ny Isiraely koa tamin’ny sabatra.
  '5':
  - type: text
    content: 'Roa amby telo-polo taona Jehorama, fony izy vao nanjaka, ary valo taona no nanjakany tany Jerosalema. '
  '6':
  - type: text
    content: 'Ary nandeha tamin’ny làlan’ny mpanjakan’ny Isiraely izy, dia tahaka ny nataon’ny taranak’i Ahaba, fa zanakavavin’i Ahaba no vadiny,–eny, nanao izay ratsy eo imason’i Jehovah izy. '
  '7':
  - type: text
    content: Nefa Jehovah tsy nety nandringana ny taranak’i Davida noho ny fanekena nataony tamin’i Davida sy ny nilazany fa homeny jiro mandrakizay izy mbamin’ny taranany.
  '8':
  - type: text
    content: 'Tamin’ny andron’i Jehorama no niodinan’ny Edomita ka tsy nanoa ny Joda, fa nanangana mpanjaka ho azy izy. '
  '9':
  - type: text
    content: 'Ka dia nivoaka Jehorama sy ireo mpanapaka nitondra ny kalesiny rehetra; ary nanaovany latsak’alina ny Edomita izay nanodidina azy sy ny komandin’ny kalesy. '
