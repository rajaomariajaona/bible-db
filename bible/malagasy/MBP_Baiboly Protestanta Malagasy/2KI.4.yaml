document_id: 2KI.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampitomboan’i Elisa ny diloilon’ilay vehivavy maty vady.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nisy vehivavy anankiray, vadin’ny zanaky ny mpaminany, nitaraina tamin’i Elisa hoe: Maty ny vadiko mpanomponao; ary hianao mahalala fa natahotra an’i Jehovah ny mpanomponao; nefa tonga ny tompon-trosa haka ny zanako mirahalahy ho andevony– '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy Elisa taminy: Inona ary no hataoko ho anao? Lazao amiko: Inona avy no anananao ao an-trano? Fa hoy ravehivavy: Ny ankizivavinao tsy manana na inona na inona ao an-trano afa-tsy diloilo iray tavoara monja. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izy: Andeha mindram-bilany amin’ny namanao rehetra manodidina, dia vilany tsy misy zavatra, nefa aza atao vitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa tafiditra hianao, dia aoka hirindrim-baravarana hianao sy izy mirahalahy zanakao, ary manidìna amin’izany vilany rehetra izany, dia atokàny izay feno. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niala teo aminy ravehivavy ka nirindrim-baravarana mbamin’izy mirahalahy zanany, ary izy mirahalahy nitondra ny vilany ho any aminy, fa reniny kosa nanidina ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony feno ny vilany, dia hoy izy tamin’ny zanany: Itondray vilany iray koa aho. Fa hoy kosa ireo taminy: Tsy misy vilany intsony. Ary dia nitsahatra ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia avy ravehivavy ka nilaza tamin’ny lehilahin’Andriamanitra. Ary hoy kosa izy: Mandehana, amidio ny diloilo, ka anefao izay trosan’olona aminao, ary izay sisa dia hivelomanao sy ny zanakao.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ilay vehivavy Sonemita sy ny zanany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ARY tamin’ny indray andro Elisa dia nankany Sonema, ary nisy vehivavy mpanan-karena teo izay nanery azy hihinan-kanina. Ary isaky ny mandalo izy, dia nivily nankao aminy hihinan-kanina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ravehivavy tamin’ny lahy; Indro, fantatro fa masina sady lehilahin’Andriamanitra ilay mpandalo eto amintsika mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Masìna hianao, andeha isika hanao efi-trano kely ambony rihana; ary hasiantsika fandriana sy latabatra sy seza ary fanaovan-jiro ho azy ao; ary raha tonga eto amintsika izy, dia ao no hipetraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tamin’ny indray andro dia tonga tao Elisa ka nipetraka tao amin’ilay efi-trano ambony ary nandry tao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy izy tamin’i Gehazy zatovony: Antsoy ilay Sonemita. Ary rehefa nantsoiny ravehivavy, dia nitsangana teo anatrehany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Elisa tamin’i Gehazy: Mba lazao amin-dravehivavy hoe: Indro, efa niahy anay tamin’izao fiahiana rehetra izao hianao, koa inona kosa no mba hatao ho anao? Tianao holazaina amin’ny mpanjaka va hianao, na amin’ny komandin’ny miaramila? Dia namaly ravehivavy hoe: Mitoetra atỳ amin’ny fireneko aho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Elisa: Fa inona ary no hatao ho anao? Dia namaly Gehazy hoe: Tsy hitanao va fa tsy manan-janaka izy, sady efa antitra ny lahy? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Elisa: Antsoy ary izy. Ary nony nantsoiny izy, dia nitsangana teo am-baravarana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy izy: Raha mby amin’ny fotoana, raha avy ny taona toy izao, dia hitrotro zazalahy hianao. Ary hoy ravehivavy: Tsia, ry tompoko, lehilahin’Andriamanitra, aza mandainga amin’ny ankizivavinao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koanefa nanan-anaka tokoa ravehivavy, ka nony niherina ny taona, dia tera-dahy izy tamin’ilay fotoana nolazain’i Elisa taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony efa lehibe ny zaza, dia nankany amin’ny rainy tany amin’ny mpijinja vary izy indray andro, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy tamin-drainy: Edrey! ny an-dohako! ny an-dohako! Ary hoy rainy tamin’ny zatovo anankiray: Ento ho any amin-dreniny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia notrotroin’ilay zatovo izy ka nentiny ho any amin-dreniny, ary nampofoiny izy mandra-pitataovovonan’ny andro, dia maty. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ravehivavy niakatra ka nampandry azy teo amin’ny fandrian’ilay lehilahin’Andriamanitra, dia narindriny ny trano, ka nivoaka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niantso ny vadiny izy ka nanao hoe: Masìna hianao, asaovy misy zatovo anankiray mankatỳ amiko mitondra borikivavy anankiray, fa handeha faingana ho any amin’ny lehilahin’Andriamanitra aho, dia hiverina indray. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy ny lahy: Inona no hankanesanao any aminy anio, nefa tsy mba andro tsinam-bolana na Sabata tsinona izao? Ary hoy ravehivavy: Ka nahoana aza? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ravehivavy dia nanisy lasely ny borikivavy, ka hoy izy tamin’ny zatovony: Ampandehano, izy ka mizora; aza miahotrahotra akory amin’ny fampandehananao azy, raha tsy ampijanoniko hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia lasa ravehivavy nankany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra Karmela.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary raha vao tazan’ny lehilahin’Andriamanitra avy erỳ izy, dia hoy izy tamin’i Gehazy zatovony: Ilay Sonemita lahy irỳ; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'masìna hianao, mihazakazaha hitsena azy, ka ataovy aminy hoe: Tsara ihany va hianao? Tsara ihany va ny vadinao? Tsara ihany va ny zazalahy? Ary hoy ny famaliny: Tsara ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary rehefa tonga tany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra izy, dia nandray ny tongony; fa Gehazy nanatona hampiala azy. Nefa hoy ny lehilahin’Andriamanitra: Avelao ihany izy, fa ory ny fanahiny ao anatiny, ary Jehovah efa nanafina izany tamiko, fa tsy nanambara tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy ravehivavy: Moa naniry zaza taminao va aho, tompoko? Tsy hoy va aho: Aza mamitaka ahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy izy tamin’i Gehazy: Misikìna, ary ento eny an-tànanao ny tehiko, ka mandehana; raha mifanena amin’olona hianao, aza miarahaba azy; ary raha misy miarahaba anao, aza mamaly azy akory; ary apetraho eo amin’ny tavan’ny zazalahy ny tehiko. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny renin’ny zazalahy: Raha velona koa Jehovah, ary raha velona koa ny ainao, dia tsy hiala aminao mihitsy aho. Ary ilay lehilahin’Andriamanitra nitsangana ka nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Gehazy nialoha azy ka nametraka ny tehina teo amin’ny tavan’ny zazalahy; fa tsy nisy feo na faharenesana. Dia niverina nitsena azy indray izy ka nilaza taminy hoe: Tsy mahatsiaro akory ny zazalahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary rehefa tonga tao an-trano Elisa, indro, maty ny zazalahy sady nampandriana teo am-pandriany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary niditra izy, ka nirindrim-baravarana tao izy roa lahy, ary Elisa nivavaka tamin’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary niakatra izy ka nandry niampatra tambonin’ny zazalahy, ka ny vavany nataony tamin’ny vavany, ary ny masony tamin’ny masony, ary ny tànany tamin’ny tànany, ka dia nafana ny tenan’ny zazalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia niasa-dia tao an-trano izy ary niverina niampatra taminy indray; dia nievina impito ny zazalahy, ary nihiratra ny masony. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary Elisa niantso an’i Gehazy ka nanao hoe: Antsoy ilay Sonemita. Dia nantsoiny izy. Ary rehefa tafiditra tao aminy izy, dia hoy Elisa: Raiso ny zanakao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Dia niditra ravehivavy ka niantoraka tamin’ny tongony sady niankohoka tamin’ny tany, dia nandray ny zanany izy ka lasa nivoaka.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanatsaran’i Elisa ilay hanina saiky nahafaty, sy ny nampitomboany ny mofo roa-polo hahavoky ny olona zato lahy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ARY Elisa niverina nankany Gilgala; ary nisy mosary tamin’ny tany; ary ny zanakalahin’ny mpaminany nipetraka teo anatrehany, ka hoy izy tamin’ny zatovony: Ataovy eo an-tokoana ny vilany lehibe, ary mahandroa hanina ho an’ny zanakalahin’ny mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny anankiray nivoaka tany an-tsaha hitsongo anana ka nahita voantangomboalavo maniry ho azy, dia nanangona voany iray trotroana avy amin’io; ary nony tonga izy, dia nosolatsolarany narotsany tao amin’ny vilany nisy ny hanina, fa tsy nisy nahafantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ka dia noloarany hohanin’ny olona izany. Ary raha mbola nihinana izy, dia nitaraina hoe: Ry lehilahin’Andriamanitra ô, misy mahafaty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.40 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahafatesana.
    marker-yv: yv-n
  - type: text
    text: ' ao am-bilany. Ary tsy azony nohanina. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fa hoy Elisa: Itondray koba. Dia narotsany tao am-bilany ny koba, ka hoy izy: Andoary amin’izao ny olona hohaniny. Ary dia tsy nisy zavatra nampaninona intsony tao am-bilany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nisy lehilahy avy tany Bala-salisa nitondra mofo avy amin’ny voaloham-bokatra ho an’ny lehilahin’Andriamanitra, dia mofo vary hordea roa-polo sy salohim-bary maitso tao an-kitapo. Dia hoy Elisa: Omeo ny olona hohaniny ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa hoy kosa ny mpanompony: Hataoko ahoana no fametraka ity eo anoloan’ny zato lahy? Ary hoy indray Elisa: Omeo ihany ny olona hohaniny; fa izao no lazain’i Jehovah: Hihinana izy, ary mbola hisy sisa tsy lany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia narosony teo anoloany, ka dia nihinana izy, ary mbola nisy sisa tsy lany aza araka ny tenin’i Jehovah
