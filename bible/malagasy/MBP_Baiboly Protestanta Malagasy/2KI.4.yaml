document_id: 2KI.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampitomboan’i Elisa ny diloilon’ilay vehivavy maty vady.
  - type: text
    content: 'ARY nisy vehivavy anankiray, vadin’ny zanaky ny mpaminany, nitaraina tamin’i Elisa hoe: Maty ny vadiko mpanomponao; ary hianao mahalala fa natahotra an’i Jehovah ny mpanomponao; nefa tonga ny tompon-trosa haka ny zanako mirahalahy ho andevony– '
  '10':
  - type: text
    content: Masìna hianao, andeha isika hanao efi-trano kely ambony rihana; ary hasiantsika fandriana sy latabatra sy seza ary fanaovan-jiro ho azy ao; ary raha tonga eto amintsika izy, dia ao no hipetraka.
  '11':
  - type: text
    content: 'Ary tamin’ny indray andro dia tonga tao Elisa ka nipetraka tao amin’ilay efi-trano ambony ary nandry tao. '
  '12':
  - type: text
    content: 'Ary hoy izy tamin’i Gehazy zatovony: Antsoy ilay Sonemita. Ary rehefa nantsoiny ravehivavy, dia nitsangana teo anatrehany izy. '
  '13':
  - type: text
    content: 'Ary hoy Elisa tamin’i Gehazy: Mba lazao amin-dravehivavy hoe: Indro, efa niahy anay tamin’izao fiahiana rehetra izao hianao, koa inona kosa no mba hatao ho anao? Tianao holazaina amin’ny mpanjaka va hianao, na amin’ny komandin’ny miaramila? Dia namaly ravehivavy hoe: Mitoetra atỳ amin’ny fireneko aho. '
  '14':
  - type: text
    content: 'Ary hoy Elisa: Fa inona ary no hatao ho anao? Dia namaly Gehazy hoe: Tsy hitanao va fa tsy manan-janaka izy, sady efa antitra ny lahy? '
  '15':
  - type: text
    content: 'Ary hoy Elisa: Antsoy ary izy. Ary nony nantsoiny izy, dia nitsangana teo am-baravarana. '
  '16':
  - type: text
    content: 'Dia hoy izy: Raha mby amin’ny fotoana, raha avy ny taona toy izao, dia hitrotro zazalahy hianao. Ary hoy ravehivavy: Tsia, ry tompoko, lehilahin’Andriamanitra, aza mandainga amin’ny ankizivavinao. '
  '17':
  - type: text
    content: Koanefa nanan-anaka tokoa ravehivavy, ka nony niherina ny taona, dia tera-dahy izy tamin’ilay fotoana nolazain’i Elisa taminy.
  '18':
  - type: text
    content: 'Ary nony efa lehibe ny zaza, dia nankany amin’ny rainy tany amin’ny mpijinja vary izy indray andro, '
  '19':
  - type: text
    content: 'Ary hoy izy tamin-drainy: Edrey! ny an-dohako! ny an-dohako! Ary hoy rainy tamin’ny zatovo anankiray: Ento ho any amin-dreniny izy. '
  '2':
  - type: text
    content: 'Dia hoy Elisa taminy: Inona ary no hataoko ho anao? Lazao amiko: Inona avy no anananao ao an-trano? Fa hoy ravehivavy: Ny ankizivavinao tsy manana na inona na inona ao an-trano afa-tsy diloilo iray tavoara monja. '
  '20':
  - type: text
    content: 'Dia notrotroin’ilay zatovo izy ka nentiny ho any amin-dreniny, ary nampofoiny izy mandra-pitataovovonan’ny andro, dia maty. '
  '21':
  - type: text
    content: Ary ravehivavy niakatra ka nampandry azy teo amin’ny fandrian’ilay lehilahin’Andriamanitra, dia narindriny ny trano, ka nivoaka izy.
  '22':
  - type: text
    content: 'Ary niantso ny vadiny izy ka nanao hoe: Masìna hianao, asaovy misy zatovo anankiray mankatỳ amiko mitondra borikivavy anankiray, fa handeha faingana ho any amin’ny lehilahin’Andriamanitra aho, dia hiverina indray. '
  '23':
  - type: text
    content: 'Fa hoy ny lahy: Inona no hankanesanao any aminy anio, nefa tsy mba andro tsinam-bolana na Sabata tsinona izao? Ary hoy ravehivavy: Ka nahoana aza? '
  '24':
  - type: text
    content: 'Ary ravehivavy dia nanisy lasely ny borikivavy, ka hoy izy tamin’ny zatovony: Ampandehano, izy ka mizora; aza miahotrahotra akory amin’ny fampandehananao azy, raha tsy ampijanoniko hianao. '
  '25':
  - type: text
    content: Dia lasa ravehivavy nankany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra Karmela.
  - type: text
    content: 'Ary raha vao tazan’ny lehilahin’Andriamanitra avy erỳ izy, dia hoy izy tamin’i Gehazy zatovony: Ilay Sonemita lahy irỳ; '
  '26':
  - type: text
    content: 'masìna hianao, mihazakazaha hitsena azy, ka ataovy aminy hoe: Tsara ihany va hianao? Tsara ihany va ny vadinao? Tsara ihany va ny zazalahy? Ary hoy ny famaliny: Tsara ihany. '
  '27':
  - type: text
    content: 'Ary rehefa tonga tany amin’ny lehilahin’Andriamanitra tany an-tendrombohitra izy, dia nandray ny tongony; fa Gehazy nanatona hampiala azy. Nefa hoy ny lehilahin’Andriamanitra: Avelao ihany izy, fa ory ny fanahiny ao anatiny, ary Jehovah efa nanafina izany tamiko, fa tsy nanambara tamiko. '
  '28':
  - type: text
    content: 'Dia hoy ravehivavy: Moa naniry zaza taminao va aho, tompoko? Tsy hoy va aho: Aza mamitaka ahy?'
  '29':
  - type: text
    content: 'Ary hoy izy tamin’i Gehazy: Misikìna, ary ento eny an-tànanao ny tehiko, ka mandehana; raha mifanena amin’olona hianao, aza miarahaba azy; ary raha misy miarahaba anao, aza mamaly azy akory; ary apetraho eo amin’ny tavan’ny zazalahy ny tehiko. '
  '3':
  - type: text
    content: 'Ary hoy izy: Andeha mindram-bilany amin’ny namanao rehetra manodidina, dia vilany tsy misy zavatra, nefa aza atao vitsy. '
  '30':
  - type: text
    content: 'Ary hoy ny renin’ny zazalahy: Raha velona koa Jehovah, ary raha velona koa ny ainao, dia tsy hiala aminao mihitsy aho. Ary ilay lehilahin’Andriamanitra nitsangana ka nanaraka azy. '
  '31':
  - type: text
    content: 'Ary Gehazy nialoha azy ka nametraka ny tehina teo amin’ny tavan’ny zazalahy; fa tsy nisy feo na faharenesana. Dia niverina nitsena azy indray izy ka nilaza taminy hoe: Tsy mahatsiaro akory ny zazalahy.'
  '32':
  - type: text
    content: 'Ary rehefa tonga tao an-trano Elisa, indro, maty ny zazalahy sady nampandriana teo am-pandriany. '
  '33':
  - type: text
    content: 'Ary niditra izy, ka nirindrim-baravarana tao izy roa lahy, ary Elisa nivavaka tamin’i Jehovah. '
  '34':
  - type: text
    content: 'Ary niakatra izy ka nandry niampatra tambonin’ny zazalahy, ka ny vavany nataony tamin’ny vavany, ary ny masony tamin’ny masony, ary ny tànany tamin’ny tànany, ka dia nafana ny tenan’ny zazalahy. '
  '35':
  - type: text
    content: 'Dia niasa-dia tao an-trano izy ary niverina niampatra taminy indray; dia nievina impito ny zazalahy, ary nihiratra ny masony. '
  '36':
  - type: text
    content: 'Ary Elisa niantso an’i Gehazy ka nanao hoe: Antsoy ilay Sonemita. Dia nantsoiny izy. Ary rehefa tafiditra tao aminy izy, dia hoy Elisa: Raiso ny zanakao. '
  '37':
  - type: text
    content: Dia niditra ravehivavy ka niantoraka tamin’ny tongony sady niankohoka tamin’ny tany, dia nandray ny zanany izy ka lasa nivoaka.
  - type: heading
    content: Ny nanatsaran’i Elisa ilay hanina saiky nahafaty, sy ny nampitomboany ny mofo roa-polo hahavoky ny olona zato lahy.
  '38':
  - type: text
    content: 'ARY Elisa niverina nankany Gilgala; ary nisy mosary tamin’ny tany; ary ny zanakalahin’ny mpaminany nipetraka teo anatrehany, ka hoy izy tamin’ny zatovony: Ataovy eo an-tokoana ny vilany lehibe, ary mahandroa hanina ho an’ny zanakalahin’ny mpaminany. '
  '39':
  - type: text
    content: 'Ary ny anankiray nivoaka tany an-tsaha hitsongo anana ka nahita voantangomboalavo maniry ho azy, dia nanangona voany iray trotroana avy amin’io; ary nony tonga izy, dia nosolatsolarany narotsany tao amin’ny vilany nisy ny hanina, fa tsy nisy nahafantatra. '
  '4':
  - type: text
    content: 'Ary rehefa tafiditra hianao, dia aoka hirindrim-baravarana hianao sy izy mirahalahy zanakao, ary manidìna amin’izany vilany rehetra izany, dia atokàny izay feno. '
  '40':
  - type: text
    content: 'Ka dia noloarany hohanin’ny olona izany. Ary raha mbola nihinana izy, dia nitaraina hoe: Ry lehilahin’Andriamanitra ô, misy mahafaty'
  - type: note
    content: Heb. fahafatesana.
  - type: text
    content: ' ao am-bilany. Ary tsy azony nohanina. '
  '41':
  - type: text
    content: 'Fa hoy Elisa: Itondray koba. Dia narotsany tao am-bilany ny koba, ka hoy izy: Andoary amin’izao ny olona hohaniny. Ary dia tsy nisy zavatra nampaninona intsony tao am-bilany.'
  '42':
  - type: text
    content: 'Ary nisy lehilahy avy tany Bala-salisa nitondra mofo avy amin’ny voaloham-bokatra ho an’ny lehilahin’Andriamanitra, dia mofo vary hordea roa-polo sy salohim-bary maitso tao an-kitapo. Dia hoy Elisa: Omeo ny olona hohaniny ireny. '
  '43':
  - type: text
    content: 'Fa hoy kosa ny mpanompony: Hataoko ahoana no fametraka ity eo anoloan’ny zato lahy? Ary hoy indray Elisa: Omeo ihany ny olona hohaniny; fa izao no lazain’i Jehovah: Hihinana izy, ary mbola hisy sisa tsy lany. '
  '44':
  - type: text
    content: Dia narosony teo anoloany, ka dia nihinana izy, ary mbola nisy sisa tsy lany aza araka ny tenin’i Jehovah
  '5':
  - type: text
    content: 'Dia niala teo aminy ravehivavy ka nirindrim-baravarana mbamin’izy mirahalahy zanany, ary izy mirahalahy nitondra ny vilany ho any aminy, fa reniny kosa nanidina ny diloilo. '
  '6':
  - type: text
    content: 'Ary nony feno ny vilany, dia hoy izy tamin’ny zanany: Itondray vilany iray koa aho. Fa hoy kosa ireo taminy: Tsy misy vilany intsony. Ary dia nitsahatra ny diloilo. '
  '7':
  - type: text
    content: 'Dia avy ravehivavy ka nilaza tamin’ny lehilahin’Andriamanitra. Ary hoy kosa izy: Mandehana, amidio ny diloilo, ka anefao izay trosan’olona aminao, ary izay sisa dia hivelomanao sy ny zanakao.'
  - type: heading
    content: Ny amin’ilay vehivavy Sonemita sy ny zanany.
  '8':
  - type: text
    content: 'ARY tamin’ny indray andro Elisa dia nankany Sonema, ary nisy vehivavy mpanan-karena teo izay nanery azy hihinan-kanina. Ary isaky ny mandalo izy, dia nivily nankao aminy hihinan-kanina. '
  '9':
  - type: text
    content: 'Ary hoy ravehivavy tamin’ny lahy; Indro, fantatro fa masina sady lehilahin’Andriamanitra ilay mpandalo eto amintsika mandrakariva. '
