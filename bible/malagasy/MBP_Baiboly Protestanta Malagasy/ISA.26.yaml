document_id: ISA.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’izany andro izany dia hohiraina eto amin’ny tanin’ny Joda izao fihirana izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manana tanàna mafy isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famonjena no hotendren’i Jehovah ho mànda sy fiarovana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia asiana soa aza ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety mianatra fahamarinana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na dia ao amin’ny tanin’ny fahamarinana aza izy, mbola manao meloka ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mety mijery ny fahalehibiazan’i Jehovah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, avo ny tànanao, nefa tsy jeren’ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy maintsy hojereny ihany anefa ny fahasaro-piaro
    - type: usfm
      marker: it
      children:
      - type: text
        text: nao
    - type: text
      text: ' amin’ny olo'
    - type: usfm
      marker: it
      children:
      - type: text
        text: nao
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hijery ihany anefa izy ka ho menatra noho ny fialonany ny olonao.
      marker-yv: yv-n
    - type: text
      text: ka ho menatra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, afo no handevona ny fahavalonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, manorina fiadanana ho anay Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny asanay rehetra dia tanterahinao ho anay.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitray ô, tsy Hianao ihany no efa nampanompo anay, fa tompo hafa koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Hianao irery ihany no ahazoanay mankalaza ny anaranao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maty tsy ho velona intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny matoatoa tsy mba hitsangana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa novalianao izy ka naringanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nolevoninao avokoa ny fahatsiarovana azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampitombo ny firenena Hianao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nampitombo ny firenena Hianao ka nahazo voninahitra ho Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitarinao halalaka avokoa ny faritry ny tany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, nony azom-pahoriana izy, dia nitady Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony niharan’ny famaizanao izy, dia nanao vavaka anakampo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izay bevohoka efa madiva hiteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miolanolana sy mitaraina noho ny faharariany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka izany izahay teo imasonao, Jehovah ô,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa bevohoka izahay, efa nihetsi-jaza izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tahaka ny nitera-drivotra izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahavita famonjena ho an’ny tany izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy niteraka ny mponina amin’izao tontolo izao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho velona indray ny olonao izay efa maty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fatin’ny oloko hitsangana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mifohaza sy mihobia, hianareo izay mandry ao amin’ny vovoka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny andonao dia tahaka ny andon’ny fahazavana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ando amin’ny anana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany hiteraka ny maty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny matoatoa.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vohay ny vavahady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hidiran’ny firenena marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitana ny fahamarinana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandehana, ry oloko, midira ao amin’ny efi-tranonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mirindrìna varavarana hianao, ka miere kely indray mipì-maso monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahalasan’ny fahatezerana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, Jehovah mivoaka avy amin’ny fitoerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaly ny mponina amin’ny tany noho ny helony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany hampiseho ny ra izay nofohiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hanafina intsony izay novonoina teo aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny saina tsy miovaova dia harovanao amin’ny fiadanana tanteraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria matoky Anao izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matokia an’i Jehovah mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah Tompo no Vatolampy mandrakizay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa naetriny ny mponina avo toerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanàna avo dia arodany, eny, arodany ho amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka azerany ho amin’ny vovoka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsahin’ny tongotra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny tongotry ny ory sy ny faladian’ny mahantra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voaravona ny làlan’ny marina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aravonao ho marina indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hianao, Izay mahitsy, no manamarina.
      marker-yv: yv-n
    - type: text
      text: ' ny alehan’ny marina.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa amin’ny làlan’ny fitsaranao, Jehovah ô, no iandrasanay Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anaranao sy ny fahatsiarovana Anao no irin’ny fanahinay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fanahiko no aniriako Anao nony alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny saiko ato anatiko no itadiavako Anao fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha mamely ny tany ny fitsaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mianatra fahamarinana ny mponina amin’izao tontolo izao.
