document_id: ISA.26,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Amin’izany andro izany dia hohiraina eto amin’ny tanin’ny Joda izao fihirana izao:'
  - type: text
    content: Manana tanàna mafy isika;
  - type: text
    content: Famonjena no hotendren’i Jehovah ho mànda sy fiarovana.
  '10':
  - type: text
    content: Na dia asiana soa aza ny ratsy fanahy,
  - type: text
    content: Tsy mety mianatra fahamarinana izy;
  - type: text
    content: Eny, na dia ao amin’ny tanin’ny fahamarinana aza izy, mbola manao meloka ihany
  - type: text
    content: Ka tsy mety mijery ny fahalehibiazan’i Jehovah.
  '11':
  - type: text
    content: Jehovah ô, avo ny tànanao, nefa tsy jeren’ireo;
  - type: text
    content: Tsy maintsy hojereny ihany anefa ny fahasaro-piaro
  - type: text
    content: nao
  - type: text
    content: ' amin’ny olo'
  - type: text
    content: nao
  - type: text
    content: ', '
  - type: note
    content: 'Na: Hijery ihany anefa izy ka ho menatra noho ny fialonany ny olonao.'
  - type: text
    content: ka ho menatra izy;
  - type: text
    content: Eny, afo no handevona ny fahavalonao.
  '12':
  - type: text
    content: Jehovah ô, manorina fiadanana ho anay Hianao;
  - type: text
    content: Fa ny asanay rehetra dia tanterahinao ho anay.
  '13':
  - type: text
    content: Jehovah Andriamanitray ô, tsy Hianao ihany no efa nampanompo anay, fa tompo hafa koa;
  - type: text
    content: Nefa Hianao irery ihany no ahazoanay mankalaza ny anaranao.
  '14':
  - type: text
    content: Ny maty tsy ho velona intsony,
  - type: text
    content: Ny matoatoa tsy mba hitsangana;
  - type: text
    content: Fa novalianao izy ka naringanao,
  - type: text
    content: Sady nolevoninao avokoa ny fahatsiarovana azy.
  '15':
  - type: text
    content: Nampitombo ny firenena Hianao, Jehovah ô,
  - type: text
    content: Eny, nampitombo ny firenena Hianao ka nahazo voninahitra ho Anao;
  - type: text
    content: Nitarinao halalaka avokoa ny faritry ny tany.
  '16':
  - type: text
    content: Jehovah ô, nony azom-pahoriana izy, dia nitady Anao;
  - type: text
    content: Nony niharan’ny famaizanao izy, dia nanao vavaka anakampo.
  '17':
  - type: text
    content: Tahaka izay bevohoka efa madiva hiteraka
  - type: text
    content: Ka miolanolana sy mitaraina noho ny faharariany,
  - type: text
    content: Dia tahaka izany izahay teo imasonao, Jehovah ô,
  '18':
  - type: text
    content: Efa bevohoka izahay, efa nihetsi-jaza izahay,
  - type: text
    content: Efa tahaka ny nitera-drivotra izahay;
  - type: text
    content: Tsy nahavita famonjena ho an’ny tany izahay,
  - type: text
    content: Ka tsy niteraka ny mponina amin’izao tontolo izao.
  '19':
  - type: text
    content: Ho velona indray ny olonao izay efa maty,
  - type: text
    content: Ny fatin’ny oloko hitsangana;
  - type: text
    content: Koa mifohaza sy mihobia, hianareo izay mandry ao amin’ny vovoka;
  - type: text
    content: Fa ny andonao dia tahaka ny andon’ny fahazavana,
  - type: note
    content: 'Na: ando amin’ny anana.'
  - type: text
    content: Ary ny tany hiteraka ny maty.
  - type: note
    content: Heb. ny matoatoa.
  '2':
  - type: text
    content: Vohay ny vavahady,
  - type: text
    content: Mba hidiran’ny firenena marina,
  - type: text
    content: Izay mitana ny fahamarinana.
  '20':
  - type: text
    content: Mandehana, ry oloko, midira ao amin’ny efi-tranonao,
  - type: text
    content: Ary mirindrìna varavarana hianao, ka miere kely indray mipì-maso monja
  - type: text
    content: Mandra-pahalasan’ny fahatezerana.
  '21':
  - type: text
    content: Fa, indro, Jehovah mivoaka avy amin’ny fitoerany
  - type: text
    content: Hamaly ny mponina amin’ny tany noho ny helony;
  - type: text
    content: Ary ny tany hampiseho ny ra izay nofohiny
  - type: text
    content: Ka tsy hanafina intsony izay novonoina teo aminy.
  '3':
  - type: text
    content: Ny saina tsy miovaova dia harovanao amin’ny fiadanana tanteraka,
  - type: text
    content: Satria matoky Anao izy.
  '4':
  - type: text
    content: Matokia an’i Jehovah mandrakizay,
  - type: text
    content: Fa Jehovah Tompo no Vatolampy mandrakizay.
  '5':
  - type: text
    content: Fa naetriny ny mponina avo toerana;
  - type: text
    content: Ny tanàna avo dia arodany, eny, arodany ho amin’ny tany
  - type: text
    content: Ka azerany ho amin’ny vovoka.
  '6':
  - type: text
    content: Hitsahin’ny tongotra izy,
  - type: text
    content: Dia ny tongotry ny ory sy ny faladian’ny mahantra.
  '7':
  - type: text
    content: 'Voaravona ny làlan’ny marina:'
  - type: text
    content: Eny, aravonao ho marina indrindra
  - type: note
    content: 'Na: Hianao, Izay mahitsy, no manamarina.'
  - type: text
    content: ' ny alehan’ny marina.'
  '8':
  - type: text
    content: Koa amin’ny làlan’ny fitsaranao, Jehovah ô, no iandrasanay Anao,
  - type: text
    content: Ny anaranao sy ny fahatsiarovana Anao no irin’ny fanahinay.
  '9':
  - type: text
    content: Amin’ny fanahiko no aniriako Anao nony alina;
  - type: text
    content: Eny, ny saiko ato anatiko no itadiavako Anao fatratra;
  - type: text
    content: Fa raha mamely ny tany ny fitsaranao,
  - type: text
    content: Dia mianatra fahamarinana ny mponina amin’izao tontolo izao.
