document_id: TIT.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiarahabana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'PAOLY, mpanompon’Andriamanitra sy Apostolin’i Jesosy Kristy hampandroso ny finoan’ny olom-boafidin’Andriamanitra sy ny fahalalana tsara ny marina izay manaraka ny toe-panahy araka an’Andriamanitra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro no maditra, mpitaria foana sy mpamitaka, indrindra fa ny avy amin’ny voafora– '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy maintsy hotampenam-bava ireo–izay mampivadika mpianakavy maro, fa mampianatra izay tsy mety, mba hahazoany harena maloto. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny anankiray amin’ireny, izay mpaminany teo aminy: ,Mpandainga mandrakariva ny Kretana, biby ratsy, kamo be tenda’. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Marina izany vavolombelona izany. Ary noho izany dia anaro mafy izy mba hatanjaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: salama.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny finoana, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy mitandrina ny anganonganon’ny Jiosy sy ny didin’ny olona izay mivily miala amin’ny fahamarinana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Madio avokoa ny zavatra rehetra raha amin’ny olona madio; fa raha amin’ny olona voaloto sady tsy mino kosa dia tsy misy madio na inona na inona; fa voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manaiky fa mahalala an’Andriamanitra izy, nefa mandà Azy amin’ny asany, dia olona vetaveta sady tsy manaraka ary olona tsy izy, izay tsy manao asa tsara na inona na inona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny fanantenana ny fiainana mandrakizay izay nampanantenain’Andriamanitra tsy mahay mandainga hatry ny fony fahagola; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tamin’izay andro voatendry dia nasehony ny teniny tamin’ny tori-teny izay natolotra ho adidiko, araka ny didin’Andriamanitra, Mpamonjy antsika; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho an’i Titosy, tena zanako araka ny finoana iombonantsika, anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy, Mpamonjy antsika.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny miendrika hotendrena ho loholona, sy ny faharatsian’ny toetry ny olona tany Kreta.
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: IZAO no namelako anao tany Kreta, dia ny handaminanao izay mbola tsy tanteraka sy hanendrenao loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny isan-tanàna, araka ny nandidiako anao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha misy tsy manan-tsiny, dia lehilahy manam-bady tokana, manana zanaka mino izay tsy mba ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny mpitandrina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: episkopo.
      marker-yv: yv-n
    - type: text
      text: ' dia tsy maintsy ho tsy manan-tsiny, fa mpitandrina ny an’Andriamanitra, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpimamo lian-ady, tsy mpikapoka, tsy tia harena maloto '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa mampiantrano vahiny, tia ny tsara, mahonon-tena, marina, masina, mahonom-po, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mitana mafy ny teny marina araka ny efa nampianarina, mba hahaizany hananatra amin’ny fampianarana tsy misy kilema
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: salama.
      marker-yv: yv-n
    - type: text
      text: ' sady handresy lahatra ny mpanohitra.'
