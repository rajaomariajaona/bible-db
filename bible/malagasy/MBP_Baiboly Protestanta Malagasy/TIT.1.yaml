document_id: TIT.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana.
  - type: text
    content: 'PAOLY, mpanompon’Andriamanitra sy Apostolin’i Jesosy Kristy hampandroso ny finoan’ny olom-boafidin’Andriamanitra sy ny fahalalana tsara ny marina izay manaraka ny toe-panahy araka an’Andriamanitra, '
  '10':
  - type: text
    content: 'Fa maro no maditra, mpitaria foana sy mpamitaka, indrindra fa ny avy amin’ny voafora– '
  '11':
  - type: text
    content: 'tsy maintsy hotampenam-bava ireo–izay mampivadika mpianakavy maro, fa mampianatra izay tsy mety, mba hahazoany harena maloto. '
  '12':
  - type: text
    content: 'Hoy ny anankiray amin’ireny, izay mpaminany teo aminy: ,Mpandainga mandrakariva ny Kretana, biby ratsy, kamo be tenda’. '
  '13':
  - type: text
    content: Marina izany vavolombelona izany. Ary noho izany dia anaro mafy izy mba hatanjaka
  - type: note
    content: Gr. salama.
  - type: text
    content: ' amin’ny finoana, '
  '14':
  - type: text
    content: tsy mitandrina ny anganonganon’ny Jiosy sy ny didin’ny olona izay mivily miala amin’ny fahamarinana.
  '15':
  - type: text
    content: 'Madio avokoa ny zavatra rehetra raha amin’ny olona madio; fa raha amin’ny olona voaloto sady tsy mino kosa dia tsy misy madio na inona na inona; fa voaloto na ny sainy na ny fieritreretany. '
  '16':
  - type: text
    content: Manaiky fa mahalala an’Andriamanitra izy, nefa mandà Azy amin’ny asany, dia olona vetaveta sady tsy manaraka ary olona tsy izy, izay tsy manao asa tsara na inona na inona.
  '2':
  - type: text
    content: 'amin’ny fanantenana ny fiainana mandrakizay izay nampanantenain’Andriamanitra tsy mahay mandainga hatry ny fony fahagola; '
  '3':
  - type: text
    content: 'fa tamin’izay andro voatendry dia nasehony ny teniny tamin’ny tori-teny izay natolotra ho adidiko, araka ny didin’Andriamanitra, Mpamonjy antsika; '
  '4':
  - type: text
    content: ho an’i Titosy, tena zanako araka ny finoana iombonantsika, anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy, Mpamonjy antsika.
  - type: heading
    content: Ny miendrika hotendrena ho loholona, sy ny faharatsian’ny toetry ny olona tany Kreta.
  '5':
  - type: text
    content: IZAO no namelako anao tany Kreta, dia ny handaminanao izay mbola tsy tanteraka sy hanendrenao loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' amin’ny isan-tanàna, araka ny nandidiako anao; '
  '6':
  - type: text
    content: 'raha misy tsy manan-tsiny, dia lehilahy manam-bady tokana, manana zanaka mino izay tsy mba ampangaina ho mpanaram-po amin’ny ratsy na ho maditra. '
  '7':
  - type: text
    content: Fa ny mpitandrina
  - type: note
    content: Gr. episkopo.
  - type: text
    content: ' dia tsy maintsy ho tsy manan-tsiny, fa mpitandrina ny an’Andriamanitra, tsy mitompo teny fantatra, tsy mora tezitra, tsy mpimamo lian-ady, tsy mpikapoka, tsy tia harena maloto '
  '8':
  - type: text
    content: 'fa mampiantrano vahiny, tia ny tsara, mahonon-tena, marina, masina, mahonom-po, '
  '9':
  - type: text
    content: mitana mafy ny teny marina araka ny efa nampianarina, mba hahaizany hananatra amin’ny fampianarana tsy misy kilema
  - type: note
    content: Gr. salama.
  - type: text
    content: ' sady handresy lahatra ny mpanohitra.'
