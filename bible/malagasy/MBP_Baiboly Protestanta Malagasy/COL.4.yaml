document_id: COL.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hianareo tompo, ataovy amin’ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa hianareo koa mba manana Tompo any an-danitra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny naman’i Paoly, sy fanaovam-beloma ny sakaizany tao Kolosia.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'MAHARETA amin’ny fivavahana, ka miambena amin’izany amin’ny fisaorana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary mangataha koa ho anay, mba hamohan’Andriamanitra varavarana ho an’ny teny hilazanay ny zava-niafina izay an’i Kristy, sady izany no namatorana ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba haharihariko tsara izany tahaka izay tokony hitenenako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mandehana amin’ny fahendrena amin’izay eo ivelany, hararaoty ny andro azo anaovan-tsoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny fiteninareo ho amin’ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny toetro rehetra dia holazain’i Tykiko aminareo, dia ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin’ny Tompo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny anton’ny nanirahako azy ho atỳ aminareo indrindra dia ny hahafantaranareo ny toetray, sy ny mba hamporisihany ny fonareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary Onesimosy, rahalahy mahatoky sy malala izay avy aminareo dia nirahiko koa. Izy roa lahy hampahafantatra anareo ny zavatra rehetra atỳ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manao veloma anareo Aristarko, mpiara-mifatotra amiko, sy Marka, havan’i Barnabasy (ny aminy dia efa nandidiana anareo, ka raha tonga atỳ aminareo izy, dia raiso), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary Jesosy, izay atao hoe Josto; avy amin’ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan’Andriamanitra sady tonga fampiononana ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manao veloma anareo Epafra, ilay anankiray avy aminareo sady mpanompon’i Kristy Jesosy ary mikely aina mandrakariva amin’ny fangatahana ho anareo, mba hitoeranareo marina, ka hatoky tsara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho tanteraka.
    marker-yv: yv-n
  - type: text
    text: ' amin’izay rehetra mety ho sitrapon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa vavolombelony aho fa mikely aina fatratra ho anareo sy ho an’ny any Laodika ary ho an’ny any Hierapolia izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manao veloma anareo Lioka malala, mpanao fanafody sy Demasy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manaova veloma ny rahalahy any Laodikia ary Nymfa sy ny fiangonana ao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary rehefa voavaky atỳ aminareo ity epistily ity, dia asaovy hovakina ao amin’ny fiangonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ny Laodikiana koa; ary vakionareo kosa ilay avy amin’ny Laodikiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary lazao amin’i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin’ny Tompo mba hahatanterahanao izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ity no
  - type: text
    text: ' veloma ataon’ny tànako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.'
