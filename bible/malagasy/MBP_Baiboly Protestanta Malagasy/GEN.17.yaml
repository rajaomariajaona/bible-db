document_id: GEN.17,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanovan’Andriamanitra ny anaran’i Abrama mivady, sy ny nanendreny ny fora ho famantarana ny fanekena nataony taminy, ary ny amin’ny hahaterahan’Isaka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY rehefa sivy amby sivi-folo taona Abrama, dia nisehoan’i Jehovah izy ka nitenenany hoe: Izaho no Andriamanitra Tsitoha; mandehana eo anatrehako, ka aoka ho tsy misy tsiny hianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary izao no fanekeko ho amiko sy ho aminareo sy ny taranakao mandimby anao, dia izay hotandremanareo: hoforana ny lehilahy rehetra eo aminareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoforana hianareo; ary ho famantarana ny fanekena ho amiko sy ho aminareo izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny zazalahy teraka havaloana eo aminareo no hoforana, dia ny lehilahy rehetra amin’ny taranakareo hatramin’ny fara mandimby: na ny ompikely. na izay novidim-bola tamin’ny hafa firenena ka tsy avy amin’ny taranakao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy maintsy hoforana ny ompikelinao sy izay novidinao vola; ary ny fanekeko dia ho ao amin’ny nofonareo ho fanekena mandrakizay. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny lehilahy tsy voafora, izay tsy mbola noforana, dia hofongorana tsy ho amin’ny fireneny; efa nivadika ny fanekeko izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy Andriamanitra tamin’i Abrahama: Ny amin’i Saray vadinao, dia tsy mba hataonao Saray intsony ny anarany, fa Saraha'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saraha = Zanak’andriana.
      marker-yv: yv-n
    - type: text
      text: ' no ho anarany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary hitahy azy Aho ka hampanana azy zazalahy ho anao; eny, hitahy azy Aho, ka ho tonga firenena maro izy; ary hisy mpanjakan’ny firenena maro avy aminy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia niankohoka Abrahama ary nitsiky, dia nanao anakampo hoe: Hiteraka va aho, izay efa zato taona? ary hiteraka va Saraha, izay efa sivi-folo taona? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy Abrahama tamin’Andriamanitra: Enga anie ka Isimaela no ho velona eo anatrehanao!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy Andriamanitra: Tsia, fa Saraha vadinao hiteraka zazalahy aminao; ary ny anarany dia hataonao hoe Isaka; ary ny fanekeko haoriko aminy ho fanekena mandrakizay ho an’ny taranany mandimby azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa Izaho hanao ny fanekeko ho amiko sy ho aminao ary hahamaro anao indrindra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny amin’Isimaela, dia efa nihaino anao Aho; indro, efa nitahy azy Aho ka hahamaro ny taranany sy hampitombo azy indrindra; hiteraka andriana roa ambin’ny folo izy, satria efa notendreko ho firenena lehibe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nefa ny fanekeko haoriko amin’Isaka, izay haterak’i Saraha aminao raha avy ny taona toy izao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary rehefa vita ny teny nataony taminy, dia niakatra Andriamanitra niala teo amin’i Abrahama.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa dia nalain’i Abrahama Isimaela zanany sy ny ompikeliny rehetra mbamin’izay rehetra novidiny vola, dia ny lehilahy rehetra tao an-tranony; dia noforany androtrizay indrindra ireo araka izay nolazain’Andriamanitra taminy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary efa sivy amby sivi-folo taona Abrahama, raha noforana izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary efa telo ambin’ny folo taona Isimaela zanany, raha noforana izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Androtrizay indrindra no namorana an’i Abrahama sy Isimaela zanany; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ary ny lehilahy rehetra tao an-tranony, dia ny ompikely mbamin’izay novidim-bola tamin’ny hafa firenena, dia samy niara-noforana taminy avokoa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia niankohoka Abrama; ary Andriamanitra niteny taminy ka nanao hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha ny amiko, dia, indro, aminao ny fanekeko, ka ho tonga rain’ny firenena maro hianao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary ny anaranao tsy hatao hoe Abrama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abrama = Ray avo (?).
      marker-yv: yv-n
    - type: text
      text: ' intsony, fa hatao hoe Abrahama,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abrahama = Rain’ny maro (?).
      marker-yv: yv-n
    - type: text
      text: ' satria efa nataoko ho rain’ny firenena maro hianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hahamaro ny taranakao indrindra Aho, ka hataoko ho firenena maro hianao; ary hisy mpanjaka hiseho avy aminao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary haoriko ny fanekeko ho amiko sy ho aminao mbamin’ny taranakao mandimby anao hatramin’ny taranaka fara mandimby, ho fanekena mandrakizay, mba ho Andriamanitrao sy ny taranakao mandimby anao Aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary homeko anao sy ny taranakao any aorianao ny tany fivahinianao, dia ny tany Kanana rehetra, ho fananana mandrakizay; ary ho Andriamaniny Aho.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy Andriamanitra tamin’i Abrahama: Fa ny aminao kosa, dia hitandrina ny fanekeko hianao, dia hianao sy ny taranakao mandimby anao hatramin’ny taranaka fara mandimby. '
