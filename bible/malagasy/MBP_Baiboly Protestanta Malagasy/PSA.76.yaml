document_id: PSA.76,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra noho ny nisehoan’ny fitsarany marina.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tonon-kira.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA dia fantatra eo amin’ny Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malaza eo amin’ny Isiraely ny anarany;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny fahatezeran’ny olona hidera Anao tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatezerana sisa dia isikinanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mivoadia, ka efao ny voadinareo amin’i Jehovah Andriamanitrareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izay rehetra manodidina Azy hitondra fanatitra ho an’Izay mahatahotra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manapaka ny reharehan’ny lehibe Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tahotry ny mpanjakan’ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Naoriny ao Salema ny trano-lainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any Ziona ny fonenany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Teo no nanapatapahany ny zana-tsipìka manelatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ampinga sy ny sabatra ary ny fiadiana.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mamirapiratra Hianao sady be voninahitra miseho avy any amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: noho.
      marker-yv: yv-n
    - type: text
      text: ' ny tendrombohitra fitohana.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voababo ny mahery fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renoky ny torimasony izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary samy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ankona
    - type: text
      text: ' tsy nahahetsika'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nahita.
      marker-yv: yv-n
    - type: text
      text: ' ny tànany avokoa ny olo-mahery rehetra.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Noho ny teny mafy nataonao, ry Andriamanitr’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia sondrian-tory ny kalesy sy ny soavaly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hianao no mahatahotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avy tany an-danitra no nampandrenesanao fitsarana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raiki-tahotra ny tany ka sina,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha nitsangana hitsara Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamonjy ny mpandefitra rehetra ambonin’ny tany.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
