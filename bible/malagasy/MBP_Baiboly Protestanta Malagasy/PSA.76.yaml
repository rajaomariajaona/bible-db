      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: noho.
    marker-yv: yv-n
  - type: text
    text: ' ny tendrombohitra fitohana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voababo ny mahery fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Renoky ny torimasony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary samy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ankona
  - type: text
    text: ' tsy nahahetsika'
  - type: usfm
