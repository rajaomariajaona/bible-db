  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mamirapiratra Hianao sady be voninahitra miseho avy any amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '76.4 '
    - type: usfm
