segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny nisehoan’ny fitsarany marina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tonon-kira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA dia fantatra eo amin’ny Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malaza eo amin’ny Isiraely ny anarany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Naoriny ao Salema ny trano-lainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any Ziona ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Teo no nanapatapahany ny zana-tsipìka manelatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ampinga sy ny sabatra ary ny fiadiana.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
