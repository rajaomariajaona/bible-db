document_id: PSA.76,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny nisehoan’ny fitsarany marina.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Asafa. Tonon-kira.
  - type: text
    content: ANDRIAMANITRA dia fantatra eo amin’ny Joda;
  - type: text
    content: Malaza eo amin’ny Isiraely ny anarany;
  '10':
  - type: text
    content: Fa ny fahatezeran’ny olona hidera Anao tokoa;
  - type: text
    content: Ny fahatezerana sisa dia isikinanao.
  '11':
  - type: text
    content: Mivoadia, ka efao ny voadinareo amin’i Jehovah Andriamanitrareo;
  - type: text
    content: Aoka izay rehetra manodidina Azy hitondra fanatitra ho an’Izay mahatahotra.
  '12':
  - type: text
    content: Manapaka ny reharehan’ny lehibe Izy
  - type: text
    content: Sady tahotry ny mpanjakan’ny tany.
  '2':
  - type: text
    content: Naoriny ao Salema ny trano-lainy,
  - type: text
    content: Ary any Ziona ny fonenany.
  '3':
  - type: text
    content: Teo no nanapatapahany ny zana-tsipìka manelatra
  - type: text
    content: Sy ny ampinga sy ny sabatra ary ny fiadiana.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Mamirapiratra Hianao sady be voninahitra miseho avy any amin’
  - type: note
    content: 'Na: noho.'
  - type: text
    content: ' ny tendrombohitra fitohana.'
  '5':
  - type: text
    content: Voababo ny mahery fo;
  - type: text
    content: Renoky ny torimasony izy;
  - type: text
    content: 'Ary samy '
  - type: text
    content: ankona
  - type: text
    content: ' tsy nahahetsika'
  - type: note
    content: Heb. nahita.
  - type: text
    content: ' ny tànany avokoa ny olo-mahery rehetra.'
  '6':
  - type: text
    content: Noho ny teny mafy nataonao, ry Andriamanitr’i Jakoba,
  - type: text
    content: Dia sondrian-tory ny kalesy sy ny soavaly.
  '7':
  - type: text
    content: Hianao no mahatahotra;
  - type: text
    content: Ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao?
  '8':
  - type: text
    content: Avy tany an-danitra no nampandrenesanao fitsarana.
  - type: text
    content: Raiki-tahotra ny tany ka sina,
  '9':
  - type: text
    content: Raha nitsangana hitsara Andriamanitra
  - type: text
    content: Mba hamonjy ny mpandefitra rehetra ambonin’ny tany.
  - type: text
    content: '[Sela.]'
