    - type: usfm
      marker: ft
      children:
      - type: text
        text: nahita.
    marker-yv: yv-n
  - type: text
    text: ' ny tànany avokoa ny olo-mahery rehetra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Noho ny teny mafy nataonao, ry Andriamanitr’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia sondrian-tory ny kalesy sy ny soavaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao no mahatahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avy tany an-danitra no nampandrenesanao fitsarana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raiki-tahotra ny tany ka sina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha nitsangana hitsara Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hamonjy ny mpandefitra rehetra ambonin’ny tany.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny fahatezeran’ny olona hidera Anao tokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahatezerana sisa dia isikinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mivoadia, ka efao ny voadinareo amin’i Jehovah Andriamanitrareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izay rehetra manodidina Azy hitondra fanatitra ho an’Izay mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manapaka ny reharehan’ny lehibe Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tahotry ny mpanjakan’ny tany.
