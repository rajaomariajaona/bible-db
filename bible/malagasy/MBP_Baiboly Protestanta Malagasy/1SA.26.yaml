document_id: 1SA.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’ny Zifita tamin’i Saoly fanindroany izay hahazoany an’i Davida, sy ny tsy netezan’i Davida hahafaty an’i Saoly.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ny Zifita tonga tao amin’i Saoly tany Gibea ka nanao hoe: Tsy miery any amin’ny havoana Hakila manandrify ny efitra va Davida? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Davida: Raha velona koa Jehovah, dia aoka Jehovah no hamely azy; na ho tonga ny androny, ka ho faty izy; na hirotsaka ho amin’ny ady izy, ka any no hahafaty azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sanatria amiko eo anatrehan’i Jehovah, raha haninjitra ny tànako hamely ny voahosotr’i Jehovah aho; fa masìna hianao, ny lefona eo anilan’ny lohany sy ny tavoara fitondran-drano no alao, dia andeha isika handeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nalain’i Davida ny lefona sy ny tavoara izay teo anilan’ny lohan’i Saoly. ka dia lasa izy, ary tsy nisy olona nahita, na nahalala, na nahatsiaro; fa natory izy rehetra, satria nataon’i Jehovah renoky ny torimaso izy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nita nankeny an-dafin-tsaha Davida ka nijanona teo an-tampon’ny tendrombohitra lavidavitra (lavidavitra ihany ny elanelan’izy roa tonta); '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Davida niantso ny olona sy Abnera, zanak’i Nera, hoe: Tsy mamaly va hianao, ry Abnera? Ary Abnera dia namaly hoe: Iza moa hianao, no miantso ho re eto anatrehan’ny mpanjaka? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin’i Abnera: Tsy lehilahy mahery va hianao, ary iza no tahaka anao amin’ny Isiraely? Koa nahoana hianao no tsy miambina ny mpanjaka tomponao? fa nisy anankiray tamin’ny olona tonga teo hamono ny mpanjaka tomponao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mety izany nataonao izany. Raha velona koa Jehovah, dia tokony ho faty hianareo, satria tsy miambina ny tomponareo, ilay voahosotr’i Jehovah. Ary izahao ange, fa aiza moa ny lefon’ny mpanjaka sy ny tavoara fitondran-drano teo anilan’ny lohany?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fantatr’i Saoly ny feon’i Davida, ka hoy izy: Feonao moa izany, ry Davida zanako? Ary hoy Davida: Feoko tokoa, ry mpanjaka tompoko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa izy: Nahoana ny tompoko no manenjika ny mpanompony? Inona no nataoko, ary inona no ratsy amin’ny tànako? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, masìna hianao, ry mpanjaka tompoko, mihainoa ny tenin’ny mpanomponao. Raha Jehovah no nanesika anao hamely ahy, dia aoka handray fanatitra mani-pofona Izy; fa raha zanak’olona kosa, dia aoka ho voaozona eo anatrehan’i Jehovah izy, satria efa nandroaka ahy andro-any tsy hanana anjara amin’ny lova nomen’i Jehovah izy ka nanao hoe: Mandehana, manompoa andriamani-kafa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga Saoly nidina nankany an-efitr’i Zifa, nitondra telo arivo lahy voafantina tamin’ny Isiraely hanaraka azy hitady an’i Davida any an-efitr’i Zifa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aza avela ho latsaka amin’ny tany lavitra an’i Jehovah ny rako; fa ny mpanjakan’ny Isiraely nivoaka nitady parasy iray, tahaka ny manenjika tsi-poy eny an-tendrombohitra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Saoly: Efa nanota aho: miverena, ry Davida zanako, fa tsy hanisy ratsy anao intsony aho, fa soa teo imasonao ny aiko andro-any; indro, efa nanao adala aho ka diso indrindra.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida namaly hoe: Indro ny lefon’ny mpanjaka! koa asaovy misy zatovo anankiray manketỳ haka azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lehilahy izay nanoloran’i Jehovah anao teo an-tànany andro-any dia hovaliany araka ny fahitsiany sy ny fahamarinany, fa tsy nety naninjitra ny tànako hamely ny voahosotr’i Jehovah aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary, indro, fa tahaka ny nanaovako ny ainao ho lehibe andro-any no mba hanaovan’i Jehovah ny aiko ho lehibe kosa ka hanafahany ahy amin’ny fahoriana rehetra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Saoly tamin’i Davida: Hotahina anie hianao, ry Davida zanako; hanao dia hanao hianao sady hahatontosa.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa Davida, fa Saoly kosa nitodi-doha hiverina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitoby tao amin’ny havoana Hakila manandrify ny efitra teo amoron-dàlana izy. Fa Davida kosa nitoetra tany an-efitra, ary hitany fa tonga nanaraka azy tany an-efitra Saoly. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia naniraka mpisafo Davida, ka fantany fa tonga tokoa Saoly.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga Davida ka tonga teo amin’ny nitobian’i Saoly; ary hitan’i Davida izay nandrian’i Saoly sy Abnera, zanak’i Nera, komandin’ny miaramilany; fa Saoly nandry teo anatin’ny sehatra-sariety, sady nitoby manodidina azy ny vahoaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin’i Ahimeleka Hetita sy Abisay, zanak’i Zeroia, rahalahin’i Joaba; Iza no hidina hiaraka amiko ho any amin’i Saoly any an-toby? Dia hoy Abisay: Izaho hidina hiaraka aminao.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tao amin’ny vahoaka Davida sy Abisay nony alina; ary, indro, Saoly nandry ka natory teo anatin’ny sehatra-sariety, ary ny lefony nitsatoka amin’ny tany teo anilan’ny lohany; fa Abnera sy ny vahoaka nandry manodidina azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abisay tamin’i Davida: Efa voahidin’Andriamanitra eo an-tànanao ny fahavalonao izao; koa, masìna hianao, aoka holefoniko indray mandeha monja hataoko miboroaka amin’ny tany izy, fa tsy hamely azy indroa akory aho.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Davida tamin’i Abisay: Aza mamono azy; fa iza no maninjitra ny tànany tamin’ny voahosotr’i Jehovah ka tsy nanan-tsiny? '
