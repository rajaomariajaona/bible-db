document_id: 1SA.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nangatahan’ny Isiraely mpanjaka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa antitra Samoela, dia ny zanany no nataony mpitsara ny Isiraely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nambaran’i Samoela tamin’ny olona izay nangataka mpanjaka taminy ny teny rehetra nolazain’i Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Izao no ho fanaon’ny mpanjaka izay hanjaka aminareo: Ny zanakareo-lahy dia halainy ka hotendreny ho amin’ny kalesiny sy ho mpitaingin-tsoavaliny ary hihazakazaka eo alohan’ny kalesiny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hotendreny ho mpifehy arivo sy ho mpifehy dimam-polo, ary hiasa ny taniny sy hijinja ny vokany ary hanao ny fiadiany sy ny fanaka momba ny kalesiny; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny zanakareo-vavy dia halainy ho mpangaroharo zava-manitra ary ho mpahandro sy mpanao mofo; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny tsara indrindra amin’ny sahanareo sy ny tanimboalobokareo sy ny taninolivanareo dia halainy ka homeny ho an’ny mpanompony; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny ampahafolon’ny voan-javatrareo sy ny tanimboalobokareo dia halainy ka homeny ho an’ny tandapany '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ionoka.
      marker-yv: yv-n
    - type: text
      text: 'sy ny tandonany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny ankizilahinareo sy ny ankizivavinareo sy ny zatovonareo tsara indrindra ary ny borikinareo dia halainy ka hampanaoviny ny asany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary halainy koa ny ampahafolon’ny ondry aman-osinareo; ary ny tenanareo ho tonga mpanompony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitaraina amin’izany andro izany hianareo noho ny mpanjakanareo izay nofidinareo ho anareo, fa Jehovah tsy hamaly anareo amin’izany andro izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy nety nihaino ny tenin’i Samoela ny olona, fa hoy izy: Tsia, fa aoka ihany hisy mpanjaka hanjaka aminay, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joela no anaran’ny lahimatoany, ary Abia no anaran’ny faralahiny; mpitsara tany Beri-sheba izy ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho tahaka ny firenena rehetra koa izahay, ka ny mpanjakanay hitsara anay sy hivoaka eo alohanay ary hitarika ny adinay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ren’i Samoela ny teny rehetra nolazain’ny olona, ka dia nolazainy teo anatrehan’i Jehovah kosa.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Samoela: Henoy ny teniny ka manendre mpanjaka ho azy. Dia hoy Samoela tamin’ny lehilahy amin’ny Isiraely: Samia ary mandeha ho any amin’ny tanànareo avy hianareo rehetra.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa ny zanany tsy nanaraka ny dian-drainy, fa nivily nitady vola aman-karena ka nandray kolikoly sy nanao fitsarana miangatra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loholon’ny Isiraely rehetra nivory tao Rama ho any amin’i Samoela '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Indro, efa antitra hianao, ary ny zanakao tsy manaraka ny dianao; koa manendre mpanjaka ho anay hitsara anay, tahaka ny firenena rehetra.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy sitrak’i Samoela ny nanaovan’ny olona hoe: Omeo mpanjaka izahay hitsara anay. Dia nivavaka tamin’i Jehovah Samoela. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Samoela: Henoy ihany ny tenin’ny olona amin’izany rehetra lazainy aminao; fa tsy hianao no laviny, fa Izaho no laviny tsy hanjaka aminy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny asa rehetra izay nataony hatramin’ny andro nitondrako azy nivoaka avy tany Egypta ka mandraka andro-any, dia ny nahafoizany Ahy sy ny nanompoany andriamani-kafa, dia toy izany koa no ataony aminao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny, henoy ihany ny teniny, kanefa lazao aminy marimarina, ka asehoy azy ny ho fanaon’ny mpanjaka izay hanjaka aminy.
