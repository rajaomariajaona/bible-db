document_id: EST.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanandratana an’i Mordekay, sy ny alahelon’i Hamana noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’iny alina iny tsy nahita torimaso ny mpanjaka ka nampaka ny boky fitadidiana ny tantara; ary novakina teo anatrehan’ny mpanjaka izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Hamana: Faingàna ary, alao ny akanjo sy ny soavaly araka ny voalazanao, ka dia ataovy araka izany amin’i Mordekay Jiosy, izay mipetraka eo am-bavahadin’ny mpanjaka; aza asiana latsaka izay rehetra nolazainao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalain’i Hamana ny akanjo sy ny soavaly, ka nampiakanjo an’i Mordekay izy ary nampitaingina azy tamin’ny soavaly, dia nitondra azy ho eny an-kalalahana teo an-tanàna ka niantso teo alohany hoe: Izao no hatao amin’ny lehilahy izay tian’ny mpanjaka homem-boninahitra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mordekay niverina nankeo amin’ny vavahadin’ny mpanjaka; fa Hamana kosa nody faingana ho any an-tranony sady nalahelo no nisaron-doha. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazain’i Hamana tamin’i Zaresy vadiny sy ny sakaizany rehetra izay zavatra nanjo azy. Ary hoy ny olon-kendry rehetra sy Zaresy vadiny taminy: Raha avy amin’ny taranaky ny Jiosy Mordekay, izay efa niantomboka nandavo anao teo anatrehany, dia tsy haharesy azy mihitsy hianao, fa ho lavo eo anatrehany tokoa.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mbola niresaka taminy ihany ireo, dia tonga ny tsindranolahin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ionoka.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjaka ka naka faingana an’i Hamana ho any amin’ny fanasana izay efa namboarin’i Estera.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka, indro, voasoratra fa Mordekay no niampanga an’i Bigtana sy Taresy, roa lahy isan’ny tsindranolahin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ionoka.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjaka, dia ireo mpiambina teo am-baravarana izay nitady hamono an’i Ahasoerosy mpanjaka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka: Inona moa no fisandratana sy voninahitra mba efa nomena an’i Mordekay noho izany? Fa hoy ny zatovon’ny mpanjaka izay nanompo azy: Tsy mbola nisy nomena azy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka: Iza no ao an-kianja ao? Ary Hamana kosa efa sendra tonga tao an-kianja ivelan’ny tranon’ny mpanjaka tamin’izay hiteny amin’ny mpanjaka ny amin’ny hanantonana an’i Mordekay amin’ilay hazo efa natsangany hanantonana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka hoy ny zatovon’ny mpanjaka taminy: Indro, Hamana no mitsangana ao an-kianja. Ary hoy ny mpanjaka: Asaovy miditra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra Hamana ka hoy ny mpanjaka taminy: Inona no mendrika hatao amin’izay lehilahy tian’ny mpanjaka homem-boninahitra? Ary Hamana nanao anakampo hoe: Koa iza indray moa no ho tian’ny mpanjaka homem-boninahitra afa-tsy izaho? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia hoy Hamana tamin’ny mpanjaka: Ny amin’izay lehilahy tian’ny mpanjaka homem-boninahitra, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aoka halaina izay akanjo fiandrianana efa niakanjoan’ny mpanjaka sy soavaly izay efa nitaingenan’ny mpanjaka sady voaisy satroboninahitra ny lohany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia aoka izany fitafiana sy soavaly izany no hatolotra eo an-tànan’ny anankiray izay malaza indrindra amin’ny mpanapaka voatendrin’ny mpanjaka, ary aoka izay lehilahy tian’ny mpanjaka homem-boninahitra no hampiakanjoina izany ka hampitaingenina amin’ny soavaly, dia ho entina eny an-kalalahana eto an-tanàna, ary aoka hisy hiantso eo alohany hoe: Izao no hatao amin’ny lehilahy izay tian’ny mpanjaka homem-boninahitra.'
