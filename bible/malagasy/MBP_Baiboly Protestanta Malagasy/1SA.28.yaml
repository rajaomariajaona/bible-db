document_id: 1SA.28
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nikambanan’i Davida tamin’ny Filistina, sy ny nivorian’ny Filistina hiady tamin’ny Isiraely, ary ny nankanesan’i Saoly tany amin’ilay vehivavy nanao azy ho tsindrian-javatra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY tamin’izany andro izany ny Filistina dia namory ny miaramilany hanafika ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hoy Akisy tamin’i Davida: Aoka ho fantatrao tsara fa hiara-mivoaka amiko hanafika hianao sy ny olonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Davida tamin’i Akisy: Amin’izao dia ho fantatrao tokoa izay hain’ny mpanomponao hatao. Ary hoy Akisy tamin’i Davida: Noho izany dia hataoko mpiaro ny lohako mandrakizay hianao.'
- type: usfm
  marker: p
  children:
  - type: text
    text: (
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary efa maty Samoela, ka ny Isiraely rehetra efa nisaona azy sy nandevina azy tao Rama, dia tao an-tanànany. Ary efa noroahin’i Saoly hiala amin’ny tany izay nanao azy ho tsindrian-javatra sy ny mpanao hatsarana.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny Filistina nivory, dia tonga ka nitoby tao Sonema; fa Saoly namory ny Isiraely rehetra, ka nitoby tao Gilboa kosa ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Saoly, raha nahita ny miaramilan’ny Filistina, dia raiki-tahotra sady niemponempona ny fony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary Saoly dia nanontany tamin’i Jehovah, fa Jehovah tsy namaly azy, na tamin’ny nofy, na tamin’ny Orima, na tamin’ny mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Saoly tamin’ny mpanompony: Itadiavo vehivavy manao azy ho tsindrian-javatra aho hankanesako any hanontaniako aminy. Ary hoy ny mpanompony taminy: Indro, misy vehivavy manao azy ho tsindrian-javatra eo Andora.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nanova tarehy Saoly ka nitafy fitafiana hafa, dia nandeha izy sy ny olona roa lahy nanaraka azy ka tonga tao amin-dravehivavy nony alina; ary hoy izy: Masìna hianao, manaova fankatovana ho ahy amin’ny zavatra manindry anao, ka ampiakaro ho etỳ amiko izay hotononiko aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ravehivavy taminy: Indro, fantatrao izay nataon’i Saoly, dia ny nandroahany ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana hiala amin’ny tany, ka nahoana hianao no mamandrika ny aiko hahafaty ahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Saoly nianiana tamin’i Jehovah ka nanao taminy hoe: Raha velona koa Jehovah, dia tsy hisy heloka hahazo anao amin’izao zavatra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy ravehivavy: Iza ary no hampiakariko ho eto aminao? Ary hoy izy: Samoela no ampiakaro ho etỳ amiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hitan-dravehivavy Samoela, dia nidradradradra tamin’ny feo mafy izy ka nanao tamin’i Saoly hoe: Nahoana no namitaka ahy hianao? fa hianao no Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Aza matahotra; fa inona no hitanao? Ary hoy ravehivavy tamin’i Saoly: Andriamanitra miakatra avy amin’ny tany no hitako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy izy taminy: Manao ahoana no endriny? Dia hoy izy: Lehilahy antitra no miakatra sady mikapôty izy. Ary fantatr’i Saoly fa Samoela izay, dia niondrika tamin’ny tany izy ka niankohoka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Samoela tamin’i Saoly: Nahoana no korontaninao aho ka ampiakarinao? Dia hoy Saoly: Tery loatra aho, fa miady amiko ny Filistina, ary Andriamanitra efa nahafoy ahy ka tsy mamaly teny ahy intsony, na amin’ny mpaminany, na amin’ny nofy; koa izany no nampanalako anao mba hampahalalanao ahy izay hataoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Samoela: Nahoana no manontany amiko hianao, nefa Jehovah efa mahafoy anao ka tonga fahavalonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Jehovah efa nanao ho Azy araka ny nampilazainy ahy; fa efa nendahany hiala amin’ny tànanao ny fanjakana ka nomeny an’i Davida namanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Satria tsy nihaino ny feon’i Jehovah hianao ka tsy nahatanteraka ny fahatezerany mirehitra tamin’ny Amalekita, dia izany no nanaovan’i Jehovah izao zavatra izao taminao andro-any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hiaraka hatolotr’i Jehovah ho eo an-tànan’ny Filistina ny tenanao sy ny Isiraely; ary rahampitso dia ho etỳ amiko hianao sy ny zanakao; ary ny miaramilan’ny Isiraely koa dia hatolotr’i Jehovah eo an-tànan’ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia lavo niampatra tamin’ny tany niaraka tamin’izay Saoly ka raiki-tahotra indrindra noho ny tenin’i Samoela; sady efa tsy nisy hery intsony izy, satria tsy nihinan-kanina indray andro sy indray alina maninjitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nankao amin’i Saoly ravehivavy ka nahita azy ory indrindra, dia nanao taminy hoe: Indro, ny ankizivavinao nihaino ny feonao, dia nanao ny aiko tsy ho zavatra aho ka nihaino ny teninao izay nolazainao tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ankehitriny, masìna hianao, mba henoy kosa ny tenin’ny ankizivavinao, ary aoka aho handroso sombin-kanina kely eo anoloanao; dia hano izany mba hahatanjaka anao, raha handeha amin’ny alehanao hianao. Fa tsy nety izy, fa hoy izy: Tsy hihinana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny mpanompony sy ravehivavy mbola nanery azy ihany, ka dia nihaino ny feony izy. Dia nitsangana izy ka nipetraka teo am-parafara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ravehivavy nanana zanak’omby mifahy tao an-trano; dia nandeha haingana izy ka namono izany, ary naka koba izy, dia nofetafetainy ka nendasiny ho mofo tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary narosony teo anoloan’i Saoly sy teo anoloan’ny mpanompony izany; dia nihinana izy ireo, ary dia; niainga ka lasa nandeha tamin’iny alina iny ihany.
