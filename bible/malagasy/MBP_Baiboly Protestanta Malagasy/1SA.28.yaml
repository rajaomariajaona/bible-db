document_id: 1SA.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nikambanan’i Davida tamin’ny Filistina, sy ny nivorian’ny Filistina hiady tamin’ny Isiraely, ary ny nankanesan’i Saoly tany amin’ilay vehivavy nanao azy ho tsindrian-javatra.
  - type: text
    content: ARY tamin’izany andro izany ny Filistina dia namory ny miaramilany hanafika ny Isiraely.
  - type: text
    content: 'Ary hoy Akisy tamin’i Davida: Aoka ho fantatrao tsara fa hiara-mivoaka amiko hanafika hianao sy ny olonao. '
  '10':
  - type: text
    content: 'Ary Saoly nianiana tamin’i Jehovah ka nanao taminy hoe: Raha velona koa Jehovah, dia tsy hisy heloka hahazo anao amin’izao zavatra izao. '
  '11':
  - type: text
    content: 'Dia hoy ravehivavy: Iza ary no hampiakariko ho eto aminao? Ary hoy izy: Samoela no ampiakaro ho etỳ amiko.'
  '12':
  - type: text
    content: 'Ary hitan-dravehivavy Samoela, dia nidradradradra tamin’ny feo mafy izy ka nanao tamin’i Saoly hoe: Nahoana no namitaka ahy hianao? fa hianao no Saoly. '
  '13':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Aza matahotra; fa inona no hitanao? Ary hoy ravehivavy tamin’i Saoly: Andriamanitra miakatra avy amin’ny tany no hitako. '
  '14':
  - type: text
    content: 'Ary hoy izy taminy: Manao ahoana no endriny? Dia hoy izy: Lehilahy antitra no miakatra sady mikapôty izy. Ary fantatr’i Saoly fa Samoela izay, dia niondrika tamin’ny tany izy ka niankohoka.'
  '15':
  - type: text
    content: 'Ary hoy Samoela tamin’i Saoly: Nahoana no korontaninao aho ka ampiakarinao? Dia hoy Saoly: Tery loatra aho, fa miady amiko ny Filistina, ary Andriamanitra efa nahafoy ahy ka tsy mamaly teny ahy intsony, na amin’ny mpaminany, na amin’ny nofy; koa izany no nampanalako anao mba hampahalalanao ahy izay hataoko.'
  '16':
  - type: text
    content: 'Ary hoy Samoela: Nahoana no manontany amiko hianao, nefa Jehovah efa mahafoy anao ka tonga fahavalonao. '
  '17':
  - type: text
    content: 'Fa Jehovah efa nanao ho Azy araka ny nampilazainy ahy; fa efa nendahany hiala amin’ny tànanao ny fanjakana ka nomeny an’i Davida namanao. '
  '18':
  - type: text
    content: 'Satria tsy nihaino ny feon’i Jehovah hianao ka tsy nahatanteraka ny fahatezerany mirehitra tamin’ny Amalekita, dia izany no nanaovan’i Jehovah izao zavatra izao taminao andro-any. '
  '19':
  - type: text
    content: Ary hiaraka hatolotr’i Jehovah ho eo an-tànan’ny Filistina ny tenanao sy ny Isiraely; ary rahampitso dia ho etỳ amiko hianao sy ny zanakao; ary ny miaramilan’ny Isiraely koa dia hatolotr’i Jehovah eo an-tànan’ny Filistina.
  '2':
  - type: text
    content: 'Ary hoy Davida tamin’i Akisy: Amin’izao dia ho fantatrao tokoa izay hain’ny mpanomponao hatao. Ary hoy Akisy tamin’i Davida: Noho izany dia hataoko mpiaro ny lohako mandrakizay hianao.'
  - type: text
    content: (
  '20':
  - type: text
    content: Dia lavo niampatra tamin’ny tany niaraka tamin’izay Saoly ka raiki-tahotra indrindra noho ny tenin’i Samoela; sady efa tsy nisy hery intsony izy, satria tsy nihinan-kanina indray andro sy indray alina maninjitra.
  '21':
  - type: text
    content: 'Ary nankao amin’i Saoly ravehivavy ka nahita azy ory indrindra, dia nanao taminy hoe: Indro, ny ankizivavinao nihaino ny feonao, dia nanao ny aiko tsy ho zavatra aho ka nihaino ny teninao izay nolazainao tamiko. '
  '22':
  - type: text
    content: 'Koa ankehitriny, masìna hianao, mba henoy kosa ny tenin’ny ankizivavinao, ary aoka aho handroso sombin-kanina kely eo anoloanao; dia hano izany mba hahatanjaka anao, raha handeha amin’ny alehanao hianao. Fa tsy nety izy, fa hoy izy: Tsy hihinana aho. '
  '23':
  - type: text
    content: 'Fa ny mpanompony sy ravehivavy mbola nanery azy ihany, ka dia nihaino ny feony izy. Dia nitsangana izy ka nipetraka teo am-parafara. '
  '24':
  - type: text
    content: 'Ary ravehivavy nanana zanak’omby mifahy tao an-trano; dia nandeha haingana izy ka namono izany, ary naka koba izy, dia nofetafetainy ka nendasiny ho mofo tsy misy masirasira. '
  '25':
  - type: text
    content: Ary narosony teo anoloan’i Saoly sy teo anoloan’ny mpanompony izany; dia nihinana izy ireo, ary dia; niainga ka lasa nandeha tamin’iny alina iny ihany.
  '3':
  - type: text
    content: Ary efa maty Samoela, ka ny Isiraely rehetra efa nisaona azy sy nandevina azy tao Rama, dia tao an-tanànany. Ary efa noroahin’i Saoly hiala amin’ny tany izay nanao azy ho tsindrian-javatra sy ny mpanao hatsarana.)
  '4':
  - type: text
    content: Ary ny Filistina nivory, dia tonga ka nitoby tao Sonema; fa Saoly namory ny Isiraely rehetra, ka nitoby tao Gilboa kosa ireo.
  '5':
  - type: text
    content: 'Ary Saoly, raha nahita ny miaramilan’ny Filistina, dia raiki-tahotra sady niemponempona ny fony. '
  '6':
  - type: text
    content: Ary Saoly dia nanontany tamin’i Jehovah, fa Jehovah tsy namaly azy, na tamin’ny nofy, na tamin’ny Orima, na tamin’ny mpaminany.
  '7':
  - type: text
    content: 'Ary hoy Saoly tamin’ny mpanompony: Itadiavo vehivavy manao azy ho tsindrian-javatra aho hankanesako any hanontaniako aminy. Ary hoy ny mpanompony taminy: Indro, misy vehivavy manao azy ho tsindrian-javatra eo Andora.'
  '8':
  - type: text
    content: 'Dia nanova tarehy Saoly ka nitafy fitafiana hafa, dia nandeha izy sy ny olona roa lahy nanaraka azy ka tonga tao amin-dravehivavy nony alina; ary hoy izy: Masìna hianao, manaova fankatovana ho ahy amin’ny zavatra manindry anao, ka ampiakaro ho etỳ amiko izay hotononiko aminao. '
  '9':
  - type: text
    content: 'Ary hoy ravehivavy taminy: Indro, fantatrao izay nataon’i Saoly, dia ny nandroahany ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana hiala amin’ny tany, ka nahoana hianao no mamandrika ny aiko hahafaty ahy? '
