document_id: LUK.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahaterahan’i Jesosy tao Betlehema.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY tamin’izany andro izany dia nisy didy navoak’i Aogosto Kaisara hampanoratra ny anaran’ny vahoaka rehetra amin’ny fanjakany. (
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny anjely taminy: Aza matahotra; fa, indro, milaza teny soa mahafaly aminareo aho, dia fifaliana lehibe izay ho an’ny olona rehetra; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Mpamonjy no teraka ho anareo anio ao an-tanànan’i Davida, dia Kristy Tompo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no ho famantarana ho anareo: hianareo hahita Zazakely voahodidina lamban-jaza sady mandry ao am-pihinanam-bilona.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely maro be avy any an-danitra niseho tampoka niaraka tamin’ilay anjely teo ka nidera an’Andriamanitra nanao hoe:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voninahitra any amin’ny avo indrindra ho an’Andriamanitra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fiadanana ho etỳ ambonin’ny tany amin’ny olona ankasitrahany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Fankasitrahana ho amin’ny olona].'
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany rehefa niala teo aminy ireo anjely ireo ka nankany an-danitra, dia niresaka ireo lehilahy mpiandry ondry ka nanao hoe: Andeha isika hankany Betlehema ka hizaha izany zavatra vao tonga izany, izay nampahafantarin’ny Tompo antsika. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha faingana izy ka nahita an’i Maria sy Josefa, ary ny Zazakely nandry teo am-pihinanam-bilona.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa nahita izy, dia nampiely izay teny nolazaina taminy ny amin’izany Zaza izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra nandre dia gaga tamin’izay zavatra nolazain’ny mpiandry ondry taminy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Maria kosa nitadidy izany teny rehetra izany ka nieritreritra azy tao am-pony. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no fanoratana voalohany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tena fanoratana voalohany anefa dia.
      marker-yv: yv-n
    - type: text
      text: ' natao fony Kyrenio nanapaka tany Syria.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpiandry ondry niverina nankalaza sy nidera an’Andriamanitra noho ny zavatra rehetra izay reny sy hitany, araka izay nolazaina taminy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namorana an’i Jesosy, sy ny nitondrana Azy tao amin’ny tempoly.
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa tapitra ny havaloana, ka hoforana ny Zaza, dia nataony hoe '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: jesosy
    - type: text
      text: ' ny anarany, araka ilay nataon’ny anjely, fony tsy mbola torontoronina tao an-kibo Izy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra ny andro fidiovany, araka ny lalàn’i Mosesy, dia nitondra Azy niakatra tany Jerosalema izy mba hatolotra ho an’ny Tompo– '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voasoratra ao amin’ny lalàn’ny Tompo hoe: ,,Ny lahy voalohan-teraka rehetra hatao hoe masina ho an’i Jehovah’’ (Eks. 13.2)– '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mba hanatitra fanatitra araka izay voalaza ao amin’ny lalàn’ny Tompo hoe: ,,domohina roa, na zana-boromailala roa’’ (Lev. 12.8).'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, nisy lehilahy atao hoe Simeona tao Jerosalema; ary marina sady mpivavaka tsara izany lehilahy izany ka niandry ny fampiononana ny Isiraely; ary ny Fanahy Masina dia tao aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa nambaran’ny Fanahy Masina taminy fa tsy hahita fahafatesana izy mandra-pahitany ny Kristin’ny Tompo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nentin’ny Fanahy Masina niditra teo an-kianjan’ny tempoly izy; ary rehefa nampidirin’ny ray aman-dreniny Jesosy zaza mba hanaovany araka ny fomban’ny lalàna ny amin’ny zaza, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitrotro Azy izy ka nidera an’Andriamanitra nanao hoe:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, ankehitriny ny mpanomponao dia alefanao amin’ny fiadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny teninao;
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia samy nankany amin’ny tanànany avy izy rehetra mba hosoratana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny masoko efa nahita ny famonjenao,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namboarinao teo anatrehan’ny firenena rehetra,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fahazavana hahazava ny firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady voninahitry ny Isiraely olonao.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia gaga ny ray aman-dreniny noho ny teny nilazana Azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Simeona nitso-drano azy ireo ka nanao tamin’i Maria, renin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zaza,
    - type: text
      text: ' hoe: Indro, Ity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zaza ity
    - type: text
      text: ' no voatendry ho fandavoana sy ho fananganana ny maro ao amin’ny Isiraely ary ho famantarana holavina– '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fanahinao aza dia hotsatohana sabatra–mba haseho ny hevitry ny fo maro.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mpaminanivavy anankiray, dia Ana, zanakavavin’i Fanoela, avy tamin’ny firenen’i Asera; efa anti-panahy tokoa izy ary efa nitoetra tamin’ny vadiny fito taona taorian’ny naha-virijina azy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary efa mpitondratena tokony ho efatra amby valo-polo taona; ary tsy niala teo an-kianjan’ny tempoly izy, fa nanompo tamin’ny fifadian-kanina sy ny fivavahana andro aman-alina. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony niditra tamin’izany ora izany izy, dia nisaotra an’Andriamanitra ka nilaza Azy tamin’izay rehetra niandry ny fanavotana tao Jerosalema.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niverenan’i Josefa sy Maria ary Jesosy nankany Nazareta, sy ny nitondrana an’i Jesosy niakatra tany Jerosalema, rehefa roa ambin’ny folo taona Izy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 2.19-23.
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY rehefa vitany ny zavatra rehetra araka ny lalàn’ny Tompo, dia niverina tany Galilia izy, dia tao Nazareta tanànany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Josefa koa niakatra avy tany Galilia, dia avy tao an-tanàna Nazareta, hankany Jodia, ho ao an-tanànan’i Davida, izay atao hoe Betlehema (satria avy tamin’ny taranak’i Davida sy ny mpianakaviny), '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Zaza dia nitombo ka nihahery sady feno fahendrena; ary ny fahasoavan’Andriamanitra no tao aminy.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny ray aman-dreniny nankany Jerosalema isan-taona, raha avy ny andro firavoravoana amin’ny Paska. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa roa ambin’ny folo taona Jesosy, dia niakatra izy ireo, araka ny fanao amin’ny andro firavoravoana. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra izany andro izany, ka nody izy, Jesosy zaza dia mbola nitoetra tany Jerosalema ihany, nefa tsy fantatry ny ray aman-dreniny izany; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary satria nataony fa niaraka tamin’ny niara-dia taminy Izy, dia nandeha làlana indray andro izy vao nitady Azy tamin’ny havany sy ny olom-pantany. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tsy nahita Azy izy, dia niverina ho any Jerosalema nitady Azy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka hateloana, dia hitany teo an-kianjan’ny tempoly Izy nipetraka teo afovoan’ny mpampianatra ka nihaino sady nanontany azy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary talanjona izay rehetra nandre Azy noho ny fahalalany sy ny famaliany. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nahita Azy izy, dia talanjona, ka hoy ny reniny taminy: Anaka, nahoana no nanao toy izany taminay Hianao? He! izato alahelon-drainao sy izaho nitady Anao! '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Izy taminy: Nahoana no nitady Ahy hianareo? tsy fantatrareo va fa tsy maintsy ho eto an-tranon’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.49 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eto amin’ny raharahan’.
      marker-yv: yv-n
    - type: text
      text: ' ny Raiko Aho? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hosoratana izy sy Maria fofom-badiny, izay efa bevohoka.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy azon’ireo ny teny izay nolazainy taminy. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niara-nidina taminy nankany Nazareta Izy ka nanoa azy. Ary ny reniny nitahiry izany teny rehetra izany tao am-pony.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy nitombo saina sy tena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.52 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: taona.
      marker-yv: yv-n
    - type: text
      text: ' sady nandroso fitia tamin’Andriamanitra sy ny olona.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nitoetra teo izy, dia tonga ny andro hahavelomany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niteraka ny Lahimatoany izy, dia nohodidininy lamban-jaza ka nampandriny teo amin’ny fihinanam-bilona; fa tsy nisy nitoerany tao an-tranom-bahiny.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’ny anjely tamin’ny mpiandry ondry fa teraka Jesosy.
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nisy mpiandry ondry tamin’izany tany izany nitoetra tany an-tsaha nitandrina ny ondriny tamin’ny alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjelin’ny Tompo nitsangana teo anilany, ary ny voninahitry ny Tompo nanelatrelatra manodidina azy, ka raiki-tahotra indrindra izy. '
