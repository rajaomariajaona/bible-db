document_id: JOB.35,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: text
    content: 'Nefa tsy misy manao hoe:'
  - type: text
    content: Aiza Andriamanitra, Mpanao ahy, Izay mahatonga fiderana amin’ny alina,
  '11':
  - type: text
    content: Izay manome fahalalana antsika mihoatra noho ny an’ny biby ambonin’ny tany,
  - type: text
    content: Dia Izay manome fahendrena antsika mihoatra noho ny an’ny voro-manidina?
  '12':
  - type: text
    content: Eny, mitaraina mafy ireo (fa tsy mamaly Izy)
  - type: text
    content: Noho ny fireharehan’ny ratsy fanahy.
  '13':
  - type: text
    content: Ny fitarainam-poana dia tsy mba henoin’Andriamanitra,
  - type: text
    content: Ary ny Tsitoha tsy mandinika izany.
  '14':
  - type: text
    content: Na dia lazainao fa tsy mahita Azy aza hianao,
  - type: text
    content: Efa mby eo anatrehany ny ady, koa tsy maintsy miandry Azy hianao.
  '15':
  - type: text
    content: Koa raha saingy tsy mihatra ny fahatezerany,
  - type: text
    content: Moa dia tsy fantany tsara koa va ny fihaikana?
  '16':
  - type: text
    content: Mba miloa-bava foana anefa Joba
  - type: text
    content: Ary manao teny maro tsy amim-pahalalana.
  '2':
  - type: text
    content: 'Ataonao va fa marina ny nanaovanao hoe:'
  - type: text
    content: Ny fahamarinako mihoatra noho ny an’Andriamanitra?
  '3':
  - type: text
    content: 'Fa hoy hianao: Mahasoa ahy'
  - type: note
    content: Heb. anao.
  - type: text
    content: ' manao ahoana moa?'
  - type: text
    content: Ary inona no soa azoko mihoatra noho ny avy amin’ny fahotako?
  '4':
  - type: text
    content: Izaho no hiteny hamaly anao
  - type: text
    content: Mbamin’ny namanao.
  '5':
  - type: text
    content: Jereo ary ny lanitra ka zahao;
  - type: text
    content: Ary tsinjovy irỳ habakabaka,–avo loatra iny ka tsy takatrao.
  '6':
  - type: text
    content: Raha manota hianao, moa mahefa inona aminy?
  - type: text
    content: Ary raha maro ny fahotanao, mampaninona Azy moa izany?
  '7':
  - type: text
    content: Raha marina hianao, dia hahazoany inona moa izany?
  - type: text
    content: Na inona no horaisiny avy amin’ny tànanao?
  '8':
  - type: text
    content: Mihatra amin’ny olona tahaka anao ihany ny ratsy ataonao;
  - type: text
    content: Ary mihatra amin’ny olombelona ihany ny fahamarinanao.
  '9':
  - type: text
    content: Noho ny habiazan’ny fampahoriana no itarainan’ny olona;
  - type: text
    content: Eny, minananana izy noho ny sandrin’ny mahery,
