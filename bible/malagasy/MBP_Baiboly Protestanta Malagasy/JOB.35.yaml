document_id: JOB.35
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ataonao va fa marina ny nanaovanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahamarinako mihoatra noho ny an’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy hianao: Mahasoa ahy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anao.
    marker-yv: yv-n
  - type: text
    text: ' manao ahoana moa?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona no soa azoko mihoatra noho ny avy amin’ny fahotako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho no hiteny hamaly anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny namanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jereo ary ny lanitra ka zahao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsinjovy irỳ habakabaka,–avo loatra iny ka tsy takatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha manota hianao, moa mahefa inona aminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha maro ny fahotanao, mampaninona Azy moa izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha marina hianao, dia hahazoany inona moa izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na inona no horaisiny avy amin’ny tànanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mihatra amin’ny olona tahaka anao ihany ny ratsy ataonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihatra amin’ny olombelona ihany ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny habiazan’ny fampahoriana no itarainan’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, minananana izy noho ny sandrin’ny mahery,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa tsy misy manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza Andriamanitra, Mpanao ahy, Izay mahatonga fiderana amin’ny alina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay manome fahalalana antsika mihoatra noho ny an’ny biby ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Izay manome fahendrena antsika mihoatra noho ny an’ny voro-manidina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, mitaraina mafy ireo (fa tsy mamaly Izy)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fireharehan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fitarainam-poana dia tsy mba henoin’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Tsitoha tsy mandinika izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia lazainao fa tsy mahita Azy aza hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa mby eo anatrehany ny ady, koa tsy maintsy miandry Azy hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa raha saingy tsy mihatra ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa dia tsy fantany tsara koa va ny fihaikana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mba miloa-bava foana anefa Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manao teny maro tsy amim-pahalalana.
