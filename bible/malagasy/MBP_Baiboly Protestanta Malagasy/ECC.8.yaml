document_id: ECC.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: Iza no toy ny hendry? Ary iza no mahalala izay anton-javatra? Ny fahendren’ny olona mahamiramirana ny tarehiny, ary voaova ny fahadontoan’ny endriny.
  '10':
  - type: text
    content: Ary tamin’izany dia hitako ny ratsy fanahy nalevina ka tafiditra; fa izay nanao ny marina kosa dia lasa niala tamin’ny fitoeran’ny masina ka nohadinoina tao an-tanàna;
  - type: note
    content: 'Na: ary tafiditra izy ka niala tamin’ny fitoeran’ny masina, ary nohadinoin’ny tao an-tanàna izay efa nanaovany izany.'
  - type: text
    content: ' zava-poana koa izany.'
  '11':
  - type: text
    content: 'Saingy tsy tanterahina vetivety ny famaliana ny ratsy atao, dia izany no ikirizan’ny fon’ny zanak’olombelona amin’ny fanaovan-dratsy. '
  '12':
  - type: text
    content: 'Eny, fa na dia manao ratsy injato aza ny mpanota ka ela velona ihany, dia fantatro kosa fa hisy soa ho an’izay matahotra an’Andriamanitra, dia izay matahotra eo anatrehany. '
  '13':
  - type: text
    content: Fa tsy hisy soa ho an’ny ratsy fanahy; fa ho toy ny aloka izy ka tsy haharitra ela, satria tsy matahotra eo anatrehan’Andriamanitra.
  '14':
  - type: text
    content: 'Izao koa no zava-poana izay atao atỳ ambonin’ny tany: Misy olo-marina iharan’izay tokony ho valin’ny asa ratsy; ary misy olo-meloka mahazo izay tokony ho valin’ny asa marina; hoy izaho: Zava-poana koa izany.'
  '15':
  - type: text
    content: Dia noderaiko ny fifaliana, satria tsy misy mahasoa ny olona atỳ ambanin’ny masoandro afa-tsy ny mihinana sy ny misotro ary ny miravoravo, ka hisy izany amin’ny fisasarany mandritra ny andro hiainany, izay nomen’Andriamanitra azy atỳ ambanin’ny masoandro.
  - type: heading
    content: Ny tsi-fahatakaran’ny saina ny fitondran’Andriamanitra, sy ny tokony hifaliana amin’izay soa hita ary hahazotoana amin’izay rehetra azo atao.
  '16':
  - type: text
    content: 'RAHA nampiasaiko ny foko hahalala fahendrena sy hahita ny raharaha atao atỳ ambonin’ny tany (fa misy tsy mahita torimaso na andro na alina), '
  '17':
  - type: text
    content: dia hitako avokoa ny asan’Andriamanitra, fa tsy takatry ny sain’ny olona ny asa atao atỳ ambanin’ny masoandro; koa na dia mikely aina hitady izany aza ny olona, tsy ho hitany; eny, na ny hendry aza no manao hahafantatra izany, dia tsy ho azony fantarina akory.
  '2':
  - type: text
    content: ' '
  - type: text
    content: Hoy
  - type: text
    content: ' izaho: Tandremo ny didin’ny mpanjaka noho ny efa nianianana tamin’Andriamanitra. '
  '3':
  - type: text
    content: 'Aza malaky miala eo anatrehany; aza mikikitra amin’ny fanaovan-dratsy; fa na inona na inona sitrany dia azony atao avokoa; '
  '4':
  - type: text
    content: 'fa ny tenin’ny mpanjaka dia misy hery, ka iza no mahazo manao aminy hoe: Inona no ataonao?'
  '5':
  - type: text
    content: Izay mitandrina ny didy tsy mba mikambana
  - type: note
    content: Heb. mahalala.
  - type: text
    content: ' amin’ny fanaovan-dratsy; ary ny fon’ny hendry dia mahalala fotoana sy fitsarana; '
  '6':
  - type: text
    content: fa samy manana ny fotoany sy ny fitsarana azy avy ny hevitra rehetra, satria efa be ny heloky
  - type: note
    content: 'Na: fahorian’.'
  - type: text
    content: ' ny olona. '
  '7':
  - type: text
    content: Fa tsy mahafantatra izay ho avy izy; fa iza no hampahafantatra azy izay hihaviany?
  '8':
  - type: text
    content: Tsy misy olona manan-kery hahatana ny ainy, na manan-kery ny amin’ny andro hahafatesana; ary tsy misy fahafahana amin’ny ady, ary ny ratsy fanahy tsy ho voavonjin’ny faharatsiany.
  '9':
  - type: text
    content: 'Izany rehetra izany dia efa hitako avokoa tamin’ny nampiasako ny foko nandinika ny asa rehetra atao atỳ ambanin’ny masoandro. Misy andro anapahan’ny olona ny namany ka ampidirany loza aminy. '
