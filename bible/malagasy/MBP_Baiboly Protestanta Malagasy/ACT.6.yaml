document_id: ACT.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nifidianana ny fito lahy, sy ny nandrosoan’ny fiangonana.
  - type: text
    content: ARY tamin’izany andro izany, rehefa nihamaro ny isan’ny mpianatra, dia nimonomonona tamin’ny Hebreo ny Helenista, satria tsy mba enina tamin’ny fiantrana isan-andro ny mpitondratenany.
  '10':
  - type: text
    content: 'Fa tsy nahatohitra ny fahendrena sy ny Fanahy izay nitenenany ireo; '
  '11':
  - type: text
    content: 'dia nisy olona nomeny vava hanao hoe: Efa renay niteny ratsy'
  - type: note
    content: Gr. nanao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' an’i Mosesy sy Andriamanitra ity. '
  '12':
  - type: text
    content: 'Ary nampitaitra ny olona sy ny loholona ary ny mpanora-dalàna izy, dia nankeo amin’i Stefana ka nisarika azy, dia nitondra azy ho eo amin’ny Synedriona; '
  '13':
  - type: text
    content: 'ary izy nanangana vavolombelona mandainga, izay nanao hoe: Io lehilahy io tsy mitsahatra miteny ratsy ity fitoerana masina ity sy ny lalàna; '
  '14':
  - type: text
    content: 'fa efa renay izy nilaza fa ilay Jesosy avy any Nazareta dia handrava ity fitoerana ity sy hanova ny fomba izay natolotr’i Mosesy antsika. '
  '15':
  - type: text
    content: Ary izay rehetra nipetraka teo amin’ny Synedriona, raha nandinika an’i Stefana, dia nahita ny tarehiny tahaka ny tarehin’anjely.
  '2':
  - type: text
    content: 'Ary ny roa ambin’ny folo lahy nampiangona ny mpianatra rehetra ka nanao hoe: Tsy mety raha mandao ny tenin’Andriamanitra hitandrina latabatra izahay. '
  '3':
  - type: text
    content: 'Koa amin’izany, ry rahalahy, mizahà fito lahy eo aminareo, izay tsara laza sady feno ny Fanahy sy fahendrena, mba hotendrenay hitandrina izany raharaha izany. '
  '4':
  - type: text
    content: Fa izahay kosa haharitra amin’ny fivavahana sy ny fampianarana.
  '5':
  - type: text
    content: 'Dia sitraky ny olona rehetra ny teniny, ka nifidy an’i Stefana izy, lehilahy feno finoana sy ny Fanahy Masina, ary Filipo sy Prokoro sy Nikanora sy Timona sy Parmena ary Nikoleo (proselyta avy any Antiokia), '
  '6':
  - type: text
    content: ireo dia narosony teo anatrehan’ny Apostoly; ary rehefa nivavaka ny Apostoly, dia nametra-tànana taminy.
  '7':
  - type: text
    content: Dia nandroso ny tenin’Andriamanitra; ary nihamaro indrindra ny isan’ny mpianatra tany Jerosalema; ary maro be kosa ny mpisorona nanaiky ny finoana.
  - type: heading
    content: Ny amin’i Stefana.
  '8':
  - type: text
    content: 'ARY Stefana, feno fahasoavana sy hery, dia nanao fahagagana sy famantarana lehibe teo amin’ny vahoaka. '
  '9':
  - type: text
    content: 'Fa ny sasany, izay avy amin’ny synagoga atao hoe Synagogan’ny Libertina sy ny Kyreniana sy ny Aleksandriana mbamin’izay avy any Kilikia sy Asia, dia nitsangana ka niady hevitra tamin’i Stefana. '
