document_id: GEN.35
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nankanesan’i Jakoba tany Betela, sy ny nisehoan’Andriamanitra taminy indray.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hoy Andriamanitra tamin’i Jakoba: Miaingà, miakara any Betela hianao ka monena any; ary manorena alitara any ho an’Andriamanitra Izay niseho taminao, fony hianao nandositra ny tavan’i Esao rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy Jakoba tamin’izay tao an-tranony mbamin’izay rehetra nomba azy: Ario ireo andriamani-kafa, izay ao aminareo, dia madiova, sady ovay ny fitafianareo;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary andeha hiainga isika ka hiakatra any Betela; ary hanao alitara any aho ho an’Andriamanitra, Izay nihaino
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: namaly.
    marker-yv: yv-n
  - type: text
    text: ' ahy tamin’ny andron’ny fahoriako ary nomba ahy tamin’ny làlana izay nalehako. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia natolony teo amin’i Jakoba ny andriamani-kafa rehetra izay notanany sy ny kavina izay teny an-tsofiny; ary dia nalevin’i Jakoba tao am-pototry ny hazo terebinta izay tao akaikin’i Sekema ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia lasa nandeha izy; ary nisy tahotra avy amin’Andriamanitra nahazo ny tanàna manodidina azy, ka tsy nanenjika ny zanak’i Jakoba izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jakoba dia tonga tany Lozy (Betela izany), izay any amin’ny tany Kanana, dia izy sy ny olona rehetra izay nomba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nanorina alitara teo izy, ka nataony hoe El-betela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: El-betela = Andriamanitr’i Betela.
    marker-yv: yv-n
  - type: text
    text: ' no anaran’izany tany izany; fa teo no nisehoan’Andriamanitra taminy, fony izy nandositra ny tavan’ny rahalahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary maty Debora, mpitaiza an-dRebeka, ka naleviny tao am-pototr’i Betela, teo ambanin’ny hazo ôka; ary ny anaran’io dia nataony hoe Alona-bakota.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Alona-bakota = Hazo ôka fitomaniana.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Andriamanitra niseho indray tamin’i Jakoba, raha tonga avy tany Mesopotamia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Padan-arama.
    marker-yv: yv-n
  - type: text
    text: ' izy, ka nitahy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Andriamanitra taminy: Jakoba no anaranao; nefa tsy hatao hoe Jakoba intsony ny anaranao, fa Isiraely no anaranao; dia nataony hoe Isiraely no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Andriamanitra taminy: Izaho no Andriamanitra Tsitoha; maroa fara sy mihabetsaha; firenena maro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fikambanam-pirenena.
    marker-yv: yv-n
  - type: text
    text: ' no hiseho avy aminao, ary hisy mpanjaka amin’ny haterakao; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary ny tany izay nomeko an’i Abrahama sy Isaka dia homeko anao; ary ny taranakao mandimby anao koa no homeko ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Andriamanitra niakatra niala taminy, teo amin’ilay niresahany taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jakoba dia nanorina tsangam-bato teo amin’ny fitoerana izay niresahany taminy ka nanidina fanatitra aidina teo aminy sady nampidina diloilo teo aminy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny anaran’ny tany izay niresahan’Andriamanitra taminy dia nataon’i Jakoba hoe Betela.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nialan’i Jakoba tany Betela, sy ny nahafatesan-dRahely tany andàlana, ary ny anaran’ny zanakalahin’i Jakoba roa ambin’ny folo.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: DIA nifindra niala tany Betela izy; ary nony efa kely foana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'kibra iray, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaram-pandrefesana tokony ho maily iray.
    marker-yv: yv-n
  - type: text
    text: ' no sisa tsy nahatongavany tao Efrata, dia nihetsi-jaza Rahely sady sarotiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony sarotiny toy izany izy, dia hoy ny mpampivelona taminy: Aza matahotra hianao; fa izato koa no zazalahy ho anao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary rehefa hiala aina (fa maty izy), dia nataony hoe Benony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Benony = Zanaky ny fahoriako.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany; fa ny rainy kosa nanao azy hoe Benjamina.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Benjamina = Zanaky ny havanana.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia maty Rahely ka nalevina teo amin’ny làlana mankany Efrata (Betlehema izany). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Jakoba nanorina tsangam-bato teo ambonin’ny fasany, dia ilay tsangam-bato ao amin’ny fasan-dRahely mandraka andro-any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia lasa nifindra Isiraely ka nanorina ny lainy tao ankoatr’i Migdaledera. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary raha nonina teo amin’izany tany izany Isiraely, dia avy Robena ka nandry tamin’i Bila, vadi-tsindranon-drainy; ary nahare izany Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny zanakalahin’i Jakoba dia roa ambin’ny folo mirahalahy: ny zanak’i Lea dia Robena, lahimatoan’i Jakoba, sy Simeona sy Levy sy Joda sy Isakara ary Zebolona; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny zana-dRahely kosa dia Josefa sy Benjamina; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary ny zanak’i Bila, ankizivavin-dRahely, kosa dia Dana sy Naftaly; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary ny zanak’i Zilpa, ankizivavin’i Lea, kosa dia Gada sy Asera. Ireo no zanakalahin’i Jakoba izay naterany tany Mesopotamia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Padan-arama.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Jakoba nankany amin’Isaka rainy tany Mamre, any Kiriat-arba (Hebrona izany), izay nivahinian’i Abrahama sy Isaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny andro niainan’Isaka dia valo-polo amby zato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia niala aina Isaka ka maty, ary voangona any amin’ny razany, rehefa tratrantitra sady ela niainana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voky andro, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: afa-pon’ny miaina.
    marker-yv: yv-n
  - type: text
    text: ' izy; ary dia nandevina azy Esao sy Jakoba zanani-lahy.'
