document_id: GEN.35,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nankanesan’i Jakoba tany Betela, sy ny nisehoan’Andriamanitra taminy indray.
  - type: text
    content: 'ARY hoy Andriamanitra tamin’i Jakoba: Miaingà, miakara any Betela hianao ka monena any; ary manorena alitara any ho an’Andriamanitra Izay niseho taminao, fony hianao nandositra ny tavan’i Esao rahalahinao. '
  '10':
  - type: text
    content: 'Ary hoy Andriamanitra taminy: Jakoba no anaranao; nefa tsy hatao hoe Jakoba intsony ny anaranao, fa Isiraely no anaranao; dia nataony hoe Isiraely no anarany. '
  '11':
  - type: text
    content: 'Ary hoy Andriamanitra taminy: Izaho no Andriamanitra Tsitoha; maroa fara sy mihabetsaha; firenena maro'
  - type: note
    content: Heb. fikambanam-pirenena.
  - type: text
    content: ' no hiseho avy aminao, ary hisy mpanjaka amin’ny haterakao; '
  '12':
  - type: text
    content: ary ny tany izay nomeko an’i Abrahama sy Isaka dia homeko anao; ary ny taranakao mandimby anao koa no homeko ny tany.
  '13':
  - type: text
    content: 'Ary Andriamanitra niakatra niala taminy, teo amin’ilay niresahany taminy. '
  '14':
  - type: text
    content: 'Ary Jakoba dia nanorina tsangam-bato teo amin’ny fitoerana izay niresahany taminy ka nanidina fanatitra aidina teo aminy sady nampidina diloilo teo aminy koa. '
  '15':
  - type: text
    content: Ary ny anaran’ny tany izay niresahan’Andriamanitra taminy dia nataon’i Jakoba hoe Betela.
  - type: heading
    content: Ny nialan’i Jakoba tany Betela, sy ny nahafatesan-dRahely tany andàlana, ary ny anaran’ny zanakalahin’i Jakoba roa ambin’ny folo.
  '16':
  - type: text
    content: DIA nifindra niala tany Betela izy; ary nony efa kely foana
  - type: note
    content: Heb. kibra iray, anaram-pandrefesana tokony ho maily iray.
  - type: text
    content: ' no sisa tsy nahatongavany tao Efrata, dia nihetsi-jaza Rahely sady sarotiny. '
  '17':
  - type: text
    content: 'Ary nony sarotiny toy izany izy, dia hoy ny mpampivelona taminy: Aza matahotra hianao; fa izato koa no zazalahy ho anao. '
  '18':
  - type: text
    content: Ary rehefa hiala aina (fa maty izy), dia nataony hoe Benony
  - type: note
    content: Benony = Zanaky ny fahoriako.
  - type: text
    content: ' ny anarany; fa ny rainy kosa nanao azy hoe Benjamina.'
  - type: note
    content: Benjamina = Zanaky ny havanana.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Dia maty Rahely ka nalevina teo amin’ny làlana mankany Efrata (Betlehema izany). '
  '2':
  - type: text
    content: 'Dia hoy Jakoba tamin’izay tao an-tranony mbamin’izay rehetra nomba azy: Ario ireo andriamani-kafa, izay ao aminareo, dia madiova, sady ovay ny fitafianareo;'
  '20':
  - type: text
    content: Ary Jakoba nanorina tsangam-bato teo ambonin’ny fasany, dia ilay tsangam-bato ao amin’ny fasan-dRahely mandraka andro-any.
  '21':
  - type: text
    content: 'Dia lasa nifindra Isiraely ka nanorina ny lainy tao ankoatr’i Migdaledera. '
  '22':
  - type: text
    content: Ary raha nonina teo amin’izany tany izany Isiraely, dia avy Robena ka nandry tamin’i Bila, vadi-tsindranon-drainy; ary nahare izany Isiraely.
  '23':
  - type: text
    content: 'Ary ny zanakalahin’i Jakoba dia roa ambin’ny folo mirahalahy: ny zanak’i Lea dia Robena, lahimatoan’i Jakoba, sy Simeona sy Levy sy Joda sy Isakara ary Zebolona; '
  '24':
  - type: text
    content: 'ny zana-dRahely kosa dia Josefa sy Benjamina; '
  '25':
  - type: text
    content: 'ary ny zanak’i Bila, ankizivavin-dRahely, kosa dia Dana sy Naftaly; '
  '26':
  - type: text
    content: ary ny zanak’i Zilpa, ankizivavin’i Lea, kosa dia Gada sy Asera. Ireo no zanakalahin’i Jakoba izay naterany tany Mesopotamia.
  - type: note
    content: Heb. Padan-arama.
  '27':
  - type: text
    content: Ary Jakoba nankany amin’Isaka rainy tany Mamre, any Kiriat-arba (Hebrona izany), izay nivahinian’i Abrahama sy Isaka.
  '28':
  - type: text
    content: 'Ary ny andro niainan’Isaka dia valo-polo amby zato taona. '
  '29':
  - type: text
    content: Dia niala aina Isaka ka maty, ary voangona any amin’ny razany, rehefa tratrantitra sady ela niainana
  - type: note
    content: Heb. voky andro, na afa-pon’ny miaina.
  - type: text
    content: ' izy; ary dia nandevina azy Esao sy Jakoba zanani-lahy.'
  '3':
  - type: text
    content: ary andeha hiainga isika ka hiakatra any Betela; ary hanao alitara any aho ho an’Andriamanitra, Izay nihaino
  - type: note
    content: Heb. namaly.
  - type: text
    content: ' ahy tamin’ny andron’ny fahoriako ary nomba ahy tamin’ny làlana izay nalehako. '
  '4':
  - type: text
    content: Dia natolony teo amin’i Jakoba ny andriamani-kafa rehetra izay notanany sy ny kavina izay teny an-tsofiny; ary dia nalevin’i Jakoba tao am-pototry ny hazo terebinta izay tao akaikin’i Sekema ireo.
  '5':
  - type: text
    content: Dia lasa nandeha izy; ary nisy tahotra avy amin’Andriamanitra nahazo ny tanàna manodidina azy, ka tsy nanenjika ny zanak’i Jakoba izy.
  '6':
  - type: text
    content: 'Ary Jakoba dia tonga tany Lozy (Betela izany), izay any amin’ny tany Kanana, dia izy sy ny olona rehetra izay nomba azy. '
  '7':
  - type: text
    content: Ary nanorina alitara teo izy, ka nataony hoe El-betela
  - type: note
    content: El-betela = Andriamanitr’i Betela.
  - type: text
    content: ' no anaran’izany tany izany; fa teo no nisehoan’Andriamanitra taminy, fony izy nandositra ny tavan’ny rahalahiny.'
  '8':
  - type: text
    content: Ary maty Debora, mpitaiza an-dRebeka, ka naleviny tao am-pototr’i Betela, teo ambanin’ny hazo ôka; ary ny anaran’io dia nataony hoe Alona-bakota.
  - type: note
    content: Alona-bakota = Hazo ôka fitomaniana.
  '9':
  - type: text
    content: Ary Andriamanitra niseho indray tamin’i Jakoba, raha tonga avy tany Mesopotamia
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' izy, ka nitahy azy. '
