document_id: NUM.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lalàna ny amin’ny vantotr’ombivavy mena.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '10':
  - type: text
    content: Ary ilay nanangona ny lavenon’ny vantotr’ombivavy dia hanasa ny fitafiany, ary haloto mandra-paharivan’ny andro; ary ho lalàna mandrakizay ho an’ny Zanak’Isiraely sy ny vahiny eo aminy izany.
  '11':
  - type: text
    content: 'Izay mikasika fatin’olona dia haloto hafitoana. '
  '12':
  - type: text
    content: Hanadio ny tenany amin’izany rano izany izy amin’ny andro fahatelo, ary amin’ny andro fahafito dia hadio izy;
  - type: note
    content: 'Na: amin’ny andro fahatelo sy amin’ny andro fahafito, dia hadio izy.'
  - type: text
    content: ' fa raha tsy manadio ny tenany amin’ny andro fahatelo kosa izy, dia tsy hadio amin’ny andro fahafito. '
  '13':
  - type: text
    content: 'Izay rehetra mikasika fatin’olona ka tsy manadio ny tenany dia mandoto ny tabernakelin’i Jehovah ka hofongorana tsy ho amin’ny Isiraely; satria tsy nofafazana ny rano fanadiovana izy, dia haloto: ny fahalotoany mbola eo aminy ihany.'
  '14':
  - type: text
    content: 'Izao no lalàna, raha misy olona maty ao an-day: Izay rehetra miditra ao an-day sy izay rehetra ao anatin’ny lay dia haloto hafitoana. '
  '15':
  - type: text
    content: Ary ny fanaka rehetra misokatra izay tsy misy rakotra voafehy aminy, dia haloto.
  '16':
  - type: text
    content: 'Ary izay rehetra mikasika izay matin-tsabatra any an-tsaha, na fatin’olona, na taolan’olona, na fasana, dia haloto hafitoana. '
  '17':
  - type: text
    content: 'Dia hangalana ho an’ny maloto ny lavenon’ilay nodorana teo ho fanatitra noho ny ota, ary hasiany rano nalaina tamin’ny rano mandeha izany eo am-bilia. '
  '18':
  - type: text
    content: 'Dia haka hysopa ny lehilahy madio anankiray ka hanoboka azy eo amin’ny rano, dia hafafiny amin’ny lay mbamin’ny fanaka rehetra sy ny olona izay eo ary ilay nikasika ny taolana, na ny novonoina, na ny matin’aretina, na ny fasana. '
  '19':
  - type: text
    content: 'Ary ny maloto dia hofafazan’ilay olona madio amin’ny andro fahatelo sy ny fahafito; dia hanadio ny tenany amin’ny andro fahafito izy ka hanasa ny fitafiany sy handro amin’ny rano, dia hadio rehefa hariva. '
  '2':
  - type: text
    content: 'Izao no lalàna hotandremana, izay efa nandidian’i Jehovah: Lazao amin’ny Zanak’Isiraely mba hitondrany vantotr’ombivavy mena, izay tsy misy kilema na tsiny sady tsy mbola nasiana zioga. '
  '20':
  - type: text
    content: 'Fa ny olona izay naloto ka tsy nanadio ny tenany dia hofongorana tsy ho amin’ny fiangonana, satria nandoto ny fitoera-masin’i Jehovah izy; ny rano fanadiovana tsy nafafy taminy: maloto izy. '
  '21':
  - type: text
    content: 'Dia ho lalàna mandrakizay aminy izany, fa izay mamafy ny rano fanadiovana dia hanasa ny fitafiany; ary izay mikasika ny rano fanadiovana dia haloto mandra-paharivan’ny andro. '
  '22':
  - type: text
    content: Ary ny zavatra rehetra izay voakasiky ny maloto dia haloto; ary ny olona izay mikasika azy dia haloto mandra-paharivan’ny andro.
  '3':
  - type: text
    content: 'Ary omeo ho an’i Eleazara mpisorona iny, dia hasaina ho entina eny ivelan’ny toby ka hovonoina eo anatrehany. '
  '4':
  - type: text
    content: 'Dia hanalan’i Eleazara mpisorona amin’ny fanondrony ny rany ka hafafiny impito manandrify ny trano-lay fihaonana. '
  '5':
  - type: text
    content: 'Dia hodorana eo imasony ilay vantotr’ombivavy: ny hodiny sy ny henany ary ny rany mbamin’ny tain-drorohany dia hodorana avokoa. '
  '6':
  - type: text
    content: Ary ny mpisorona dia haka hazo sedera sy hysopa ary jaky ka hanipy azy eo afovoan’ny afo andoroana ny vantotr’ombivavy.
  '7':
  - type: text
    content: 'Dia hosasan’ny mpisorona ny fitafiany, ary handro amin’ny rano izy, ary rehefa afaka izany, dia hankeo amin’ny toby izy; ary haloto mandra-paharivan’ny andro ny mpisorona. '
  '8':
  - type: text
    content: 'Ary izay mandoro ilay ombivavy dia hanasa ny fitafiany sady handro amin ny rano ary haloto mandra-paharivan’ny andro. '
  '9':
  - type: text
    content: 'Dia hangonin’izay lehilahy madio anankiray ny lavenon’ilay vantotr’ombivavy ka hapetrany eo ivelan’ny toby eo amin’izay fitoerana madio anankiray, dia hotehirizina ho an’ny fiangonan’ny Zanak’Isiraely izany ho rano fanadiovana: fanatitra noho ny ota izany. '
