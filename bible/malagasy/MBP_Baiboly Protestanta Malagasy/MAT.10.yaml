document_id: MAT.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy niantso ny mpianany roa ambin’ny folo lahy hankeo aminy ka nanome azy fahefana hamoaka fanahy maloto sy hahasitrana ny aretina rehetra mbamin’ny rofy rehetra.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: na kitapom-batsy ho amin’izay haleha, na akanjo roa, na kapa na tehina; fa ny mpiasa dia miendrika hahazo ny haniny.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay tanàna na vohitra hiakaranareo, dia fantaro tsara izay mendrika ao; ka mitoera ao aminy mandra-pialanareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao miditra ao amin’ny trano hianareo, dia miarahabà ny ao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha mendrika ny ao an-trano, dia aoka ho ao aminy ny fiadanana tononinareo; fa raha tsy mendrika izy, dia aoka hiverina aminareo ny fiadanana voatononareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay tsy hampandroso anareo, na tsy hihaino ny teninareo, raha miala amin’izany trano na tanàna izany hianareo, dia ahintsano ny vovoka amin’ny tongotrareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lazaiko aminareo marina tokoa fa ho moramora kokoa ny ho amin’ny tany Sodoma sy Gomora amin’ny andro fitsarana noho ny ho amin’izany tanàna izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, Izaho maniraka anareo ho tahaka ny ondry ao ampovoan’ny amboadia;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lopa.
      marker-yv: yv-n
    - type: text
      text: ' koa hendre tahaka ny menarana, ary morà'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aoka ho tsotra.
      marker-yv: yv-n
    - type: text
      text: ' tahaka ny voromailala. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mitandrema hianareo noho ny amin’ny olona; fa hatolony ho amin’ny Synedriona sy hokapohiny ao amin’ny synagogany hianareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ho entiny eo anatrehan’ny mpanapaka sy ny mpanjaka hianareo noho ny amiko, ho vavolombelona aminy sy amin’ny jentilisa.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manolotra anareo izy, dia aza manahy ny amin’izay fomba hitenenanareo, na izay holazainareo; fa homena anareo amin’izany ora izany izay holazainareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no anaran’ny Apostoly roa ambin’ny folo lahy: Ny voalohany, Simona, izay atao hoe Petera, dia Andrea rahalahiny; Jakoba, zanak’i Zebedio, sy Jaona rahalahiny; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy hianareo no miteny, fa ny Fanahin’ny Rainareo no miteny ao anatinareo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rahalahy hanolotra ny rahalahiny mba ho faty, ary ny ray hanolotra ny zanany; ary ny zanaka hitsangana hanohitra ny rainy sy ny reniny ka hahafaty azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho halan’ny olona rehetra hianareo noho ny anarako; fa izay maharitra hatramin’ny farany no hovonjena. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha manenjika anareo amin’ny tanàna anankiray ny olona, dia mandosira ho any amin’ny hafa; fa lazaiko aminareo marina tokoa: Tsy hahatapitra ny tanànan’ny Isiraely hianareo tsy akory mandra-pahatongan’ny Zanak’olona.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpianatra tsy mihoatra noho ny mpampianatra, na ny mpanompo noho ny tompony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ampy amin’ny mpianatra, raha tonga tahaka ny mpampianatra azy, ary ny mpanompo, raha tonga tahaka ny tompony. Raha ny tompon-trano no nataony hoe Belzeboba, tsy mainka va ny ankohonany?
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin’izany aza matahotra azy hianareo; fa tsy misy afenina izay tsy haseho, na takona izay tsy ho fantatra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay lazaiko aminareo ao amin’ny maizina, dia ambarao eo amin’ny mazava, ary izay ren’ny sofinareo, dia torio eo ambonin’ny tampon-trano.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza matahotra izay mamono ny tena, nefa tsy mahay mamono ny fanahy; fa aleo matahotra Izay mahay mahavery ny fanahy sy ny tena ao amin’ny helo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gehena.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy varidimiventy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'asaria, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: izay ampahafolon’ny denaria.
      marker-yv: yv-n
    - type: text
      text: ' ihany va no vidin’ny tsintsina roa? nefa tsy misy na dia iray akory aza amin’ireny ho latsaka amin’ny tany, raha tsy avelan’ny Rainareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Filipo sy Bartolomeo; Tomasy sy Matio mpamory hetra; Jakoba, zanak’i Alfeo, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa aza matahotra; fa mihoatra noho ny tsintsina maro hianareo.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’izany na zovy na zovy no hanaiky Ahy eo anatrehan’ny olona, dia hekeko kosa izy eo anatrehan’ny Raiko Izay any an-danitra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na zovy na zovy no handà Ahy eo anatrehan’ny olona, dia holaviko kosa izy eo anatrehan’ny Raiko Izay any an-danitra.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza ataonareo fa tonga hitondra fiadanana ambonin’ny tany Aho; tsy tonga hitondra fiadanana Aho, fa sabatra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tonga Aho hampifandrafy olona amin’ny rainy, ary ny zanakavavy amin’ny reniny, ary ny vinantovavy amin’ny rafozanivavy; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny ankohonan’ny olona ihany no fahavalony (Mik. 7.6).
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tia ray na reny mihoatra noho ny fitiavany Ahy dia tsy mendrika ho Ahy, ary izay tia ny zanani-lahy na ny zanani-vavy mihoatra noho ny fitiavany Ahy dia tsy mendrika ho Ahy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay tsy mitondra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mandray.
      marker-yv: yv-n
    - type: text
      text: ' ny hazofijaliany ka tsy manaraka Ahy dia tsy mendrika ho Ahy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mamonjy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mahita.
      marker-yv: yv-n
    - type: text
      text: ' ny ainy no hamery azy; ary izay mamery ny ainy noho ny amiko dia hahazo azy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy Tadeo; Simona Kananeana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Zelota; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Lio. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vi.15.
      marker-yv: yv-n
    - type: text
      text: ' ary Jodasy Iskariota, ilay namadika Azy.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mandray anareo dia mandray Ahy; ary izay mandray Ahy dia mandray Izay naniraka Ahy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mandray mpaminany, satria mpaminany izy, dia handray ny valim-pitian’ny mpaminany; ary izay mandray olona marina, satria olona marina izy, dia handray ny valim-pitian’ny olona marina. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na zovy na zovy no manome rano mangatsiaka na dia eran’ny kapoaka ihany aza hosotroin’ny anankiray amin’ireo madinika ireo, satria mpianatra izy, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo roa ambin’ny folo lahy ireo dia nirahin’i Jesosy ka nodidiany hoe: Aza mandeha any amin’ny làlan’ny jentilisa, ary aza miakatra amin’izay tanànan’ny Samaritana, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa aleo mankany amin’ny ondry very amin’ny taranak’Isiraely. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mandeha hianareo, dia mitoria hoe: Efa mby akaiky ny fanjakan’ny lanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sitrano ny marary, atsangano ny maty, diovy ny boka, avoahy ny demonia; efa nahazo maimaimpoana hianareo, koa manomeza maimaimpoana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mitady volamena, na volafotsy, na varahina, ho ao anatin’ny fehin-kibonareo, '
